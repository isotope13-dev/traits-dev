defaults:
  platforms: [windows, unix]
  for:
    - go
traits:
  - id: hex
    desc: Decodes hexadecimal strings
    crit: suspicious
    conf: 0.8
    attack: T1140
    if:
      type: string_literal
      substr: hex.DecodeString
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - type: text
        regex: 'X-Slack-Signature|slackSigningSecret|verifyWebHook|crypto/hmac'
  - id: environment-probe-api
    desc: Environment variable probe API
    crit: suspicious
    conf: 0.8
    if:
      id: micro-behaviors/os/env/access::env-access
  - id: environment-probe-indicator-a
    desc: Sandbox and VM vendors
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      case_insensitive: true
      regex: \\b(sandbox|virtualbox|vmware)\\b
  - id: environment-probe-indicator-b
    desc: Emulator and CI environment markers
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      case_insensitive: true
      regex: \\b(qemu|vbox|travis|appveyor)\\b
composite_rules:
  - id: environment-probe-indicator
    desc: Sandbox/VM environment indicator
    crit: suspicious
    conf: 0.7
    any:
      - id: environment-probe-indicator-a
      - id: environment-probe-indicator-b
  - id: environment-check
    desc: Runtime environment checks
    crit: suspicious
    conf: 0.75
    attack: T1497
    all:
      - id: environment-probe-api
      - id: environment-probe-indicator
