defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.9
traits:
  - id: custom-delta-decoding
    desc: Custom delta-decoding loop
    size_min: 1000
    if:
      type: hex
      pattern: '40 02 34 29'
      section: .text
    unless:
      - id: well-known/lib/bun-runtime/
