# Java Class Obfuscation Detection
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
traits:
  - id: java-numeric-classnames
    desc: Java classes with numeric obfuscated names
    crit: suspicious
    conf: 0.85
    mbc: "B0032"
    attack: "T1140"
    for: [class, java]
    count_min: 3
    if:
      type: string
      regex: 'L[0-9]{1,3};'
  # Java misspelled class component traits
  - id: manger-typo
    desc: MANGER typo (Manager)
    crit: component
    for: [class, java]
    if:
      type: string
      word: "MANGER"
  - id: managr-typo
    desc: Managr typo (Manager)
    crit: component
    for: [class, java]
    if:
      type: string
      word: "Managr"
  - id: managerr-typo
    desc: Managerr typo (Manager)
    crit: component
    for: [class, java]
    if:
      type: string
      word: "Managerr"
  - id: java-single-letter-classnames
    desc: Java classes with single-letter obfuscated names
    crit: suspicious
    conf: 0.8
    mbc: "B0032"
    attack: "T1140"
    for: [class, java]
    count_min: 3
    if:
      type: string
      regex: '[a-z]\.class'
composite_rules:
  - id: java-misspelled-system-classes
    desc: Common Java class names with character substitutions
    crit: suspicious
    conf: 0.8
    mbc: "B0032"
    attack: "T1140"
    for: [class, java]
    any:
      - id: manger-typo
      - id: managr-typo
      - id: managerr-typo
  - id: java-adwind-obfuscation-pattern
    desc: Adwind RAT class name obfuscation pattern
    crit: suspicious
    conf: 0.9
    mbc: "B0032"
    attack: "T1140"
    needs: 2
    any:
      - id: java-misspelled-system-classes
      - id: java-numeric-classnames
      - id: java-single-letter-classnames
