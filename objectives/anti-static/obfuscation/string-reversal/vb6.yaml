defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: vb6-reversed-strings
    desc: VB6 binary containing reversed API/system strings
    crit: hostile
    conf: 0.9
    all:
      - id: micro-behaviors/data/encode/string::vb-strreverse
    any:
      - id: reversed-user32
      - id: reversed-kernel32
      - id: reversed-mscoree
      - id: reversed-shell32
      - id: reversed-messageboxa
      - id: reversed-decodepointer
      - id: reversed-getactivewindow
      - id: reversed-getlastactivepopup
      - id: reversed-getprocesswindowstation
      - id: reversed-getuserobjectinformation
traits:
  - id: reversed-user32
    desc: Reversed USER32.DLL string
    crit: component
    if: {type: string, substr: "LLD.23RESU", case_insensitive: true}
  - id: reversed-kernel32
    desc: Reversed KERNEL32.DLL string
    crit: component
    if: {type: string, substr: "LLD.23LENREK", case_insensitive: true}
  - id: reversed-mscoree
    desc: Reversed mscoree.dll string
    crit: component
    if: {type: string, substr: "lld.eerocsm", case_insensitive: true}
  - id: reversed-shell32
    desc: Reversed shell32.dll string
    crit: component
    if: {type: string, substr: "lld.23llehs", case_insensitive: true}
  - id: reversed-messageboxa
    desc: Reversed MessageBoxA string
    crit: component
    if: {type: string, substr: "AxoBegasseM", case_insensitive: true}
  - id: reversed-decodepointer
    desc: Reversed DecodePointer string
    crit: component
    if: {type: string, substr: "retnioPedoceD", case_insensitive: true}
  - id: reversed-getactivewindow
    desc: Reversed GetActiveWindow string
    crit: component
    if: {type: string, substr: "wodniWevitcAteG", case_insensitive: true}
  - id: reversed-getlastactivepopup
    desc: Reversed GetLastActivePopup string
    crit: component
    if: {type: string, substr: "pupoPevitcAtsaLteG", case_insensitive: true}
  - id: reversed-getprocesswindowstation
    desc: Reversed GetProcessWindowStation string
    crit: component
    if: {type: string, substr: "noitatSwodniWssecorPteG", case_insensitive: true}
  - id: reversed-getuserobjectinformation
    desc: Reversed GetUserObjectInformation string
    crit: component
    if: {type: string, substr: "AnoitamrofnItcejbOresUteG", case_insensitive: true}
