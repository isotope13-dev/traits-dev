defaults:
  platforms: [unix, windows, macos]

composite_rules:
  - id: suspicious-massive-string-concatenation
    desc: "Massive string concatenation operations"
    crit: suspicious
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    all:
      - id: objectives/anti-static/obfuscation/string-array::massive-string-concatenation
    downgrade:
      any:
        - id: metadata/dev/testing::test-basename-pattern
        - id: metadata/quality/testing::test-directory
        - id: metadata/dev/testing::test-function-def
        - id: metadata/dev/testing::node-common-require
        - id: micro-behaviors/crypto/symmetric/aes::buffer-hex-key-material
