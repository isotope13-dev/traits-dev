defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1027,T1140,T1059.007
  mbc: B0032

composite_rules:
  - id: js-byte-masked-decoder-eval-loader
    desc: Byte-masked JavaScript decoder feeds indirect eval
    crit: hostile
    conf: 0.98
    for: [javascript]
    scope: file
    all:
      - id: micro-behaviors/data/decode/custom::js-charcode-byte-mask
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call
      - id: micro-behaviors/process/interpreter/eval::js-indirect-eval-variable
      - id: metadata/file/metrics::js-many-very-long-strings
    unless:
      - id: metadata/package/testing/

  - id: js-handwritten-aes-decoder-eval-loader
    desc: JavaScript custom AES decoder feeds indirect eval
    crit: hostile
    conf: 0.99
    for: [javascript]
    scope: file
    all:
      - id: micro-behaviors/crypto/symmetric/aes/script::js-handwritten-aes-decrypt
      - id: micro-behaviors/data/decode/custom::js-alphabet-coded-decoder-source
      - id: micro-behaviors/process/interpreter/eval::js-indirect-eval-variable
    unless:
      - id: metadata/package/testing/
