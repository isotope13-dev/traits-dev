defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.9
composite_rules:
  - id: custom-crypto-no-imports
    desc: Custom crypto used but standard imports missing
    all:
      - id: micro-behaviors/os/random/prng/lcg::lcg-prng-engine
    unless:
      - id: micro-behaviors/crypto/library::capi-key-material-setup
      - id: micro-behaviors/crypto/library::capi-buffer-crypto-operations
      - id: micro-behaviors/crypto/library::crypt-string-to-binary
      - id: micro-behaviors/crypto/library::crypt-decode-object-ex-string
      - id: micro-behaviors/crypto/certificate/install::cert-install-api
      - id: micro-behaviors/os/random/generator::crypt-gen-random
      - id: metadata/signed/platform::microsoft-corporation
