defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.9
composite_rules:
  - id: standard-crypto-library-imports
    desc: Standard crypto library imports present
    any:
      - id: micro-behaviors/crypto/library
  - id: standard-crypto-imports-or-apis
    desc: Standard crypto imports present
    any:
      - id: objectives/anti-static/obfuscation/crypto::standard-crypto-library-imports
      - id: micro-behaviors/crypto/certificate/install::cert-install-api
      - id: micro-behaviors/os/random/generator::crypt-gen-random
  - id: custom-crypto-no-imports
    desc: Custom crypto used but standard imports missing
    all:
      - id: micro-behaviors/os/random/prng/lcg::lcg-prng-engine
      - id: objectives/anti-static/obfuscation/binary-metrics::import-count-under-40
    unless:
      - id: objectives/anti-static/obfuscation/crypto::standard-crypto-imports-or-apis
      - id: metadata/signed/platform::microsoft-corporation
