defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.9
composite_rules:
  - id: custom-crypto-no-imports
    desc: Custom crypto used but standard imports missing
    all:
      - id: micro-behaviors/os/random/prng/lcg::lcg-prng-engine
      - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
    unless:
      - id: micro-behaviors/crypto/library/
      - id: metadata/signed/platform::microsoft-corporation
