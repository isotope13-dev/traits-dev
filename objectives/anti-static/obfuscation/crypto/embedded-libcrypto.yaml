# Embedded Private Crypto Library (LibTomCrypt-derived)
# Malware packs a private fork of LibTomCrypt compiled directly into the binary.
# The source paths in .rdata expose the internal directory structure of this library.
defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: fortuna-prng-src-path
    desc: Fortuna PRNG path in embedded crypto lib
    crit: component
    conf: 0.97
    if:
      type: text
      regex: '[./\\]+src[/\\]Encryption[/\\]prngs[/\\]fortuna\.c'

  - id: aes-cipher-src-path
    desc: AES cipher path in embedded crypto lib
    crit: component
    conf: 0.97
    if:
      type: text
      regex: '[./\\]+src[/\\]Encryption[/\\]ciphers[/\\]aes[/\\]aes\.c'

  - id: sha512-src-path
    desc: SHA-512 path in embedded crypto lib
    crit: component
    conf: 0.97
    if:
      type: text
      regex: '[./\\]+src[/\\]Encryption[/\\]hashes[/\\]sha'

  - id: zeromem-src-path
    desc: Secure wipe path in embedded crypto lib
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '[./\\]+src[/\\]Encryption[/\\]misc[/\\]zeromem\.c'

composite_rules:
  - id: embedded-private-crypto-engine
    desc: Embedded private LibTomCrypt-derived crypto engine (Fortuna+AES+SHA)
    crit: suspicious
    conf: 0.95
    attack: T1027
    all:
      - id: fortuna-prng-src-path
      - id: aes-cipher-src-path
    any:
      - id: sha512-src-path
      - id: zeromem-src-path
