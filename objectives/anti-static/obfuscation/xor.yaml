# XOR obfuscation detection
#
# The previous hex pattern (30 ?? 30 ?? 30 ??) was removed because:
# - 0x30 is both the x86 XOR r/m8,r8 opcode AND ASCII '0'
# - The pattern matched embedded string data ("000", "0Z0Q") not instructions
# - Three adjacent XOR-to-memory instructions is not specific to obfuscation
# - Even with arch:[x86, x86-64], fat Mach-Os and string data caused false positives
#
# Real XOR obfuscation detection requires matching decryption loop patterns
# (XOR + loop counter + memory index), which is better handled by YARA rules
# or the encoded-string detection pipeline.
defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  crit: suspicious
  conf: 0.7
traits: []
composite_rules:
  - id: xor14-proc-paths-a
    desc: XOR-obfuscated Linux /proc paths
    platforms: [linux, unix, android]
    for: [elf]
    crit: suspicious
    conf: 0.86
    needs: 2
    any:
      - id: micro-behaviors/fs/proc/info::proc-dir-xor14
      - id: micro-behaviors/fs/proc/info::proc-net-tcp-xor14
      - id: micro-behaviors/fs/proc/info::process-exe-xor14
  - id: xor14-proc-paths-b
    desc: XOR-obfuscated Linux /proc paths
    platforms: [linux, unix, android]
    for: [elf]
    crit: suspicious
    conf: 0.86
    needs: 2
    any:
      - id: micro-behaviors/fs/proc/info::process-cmdline-xor14
      - id: micro-behaviors/fs/proc/info::process-maps-xor14
  - id: xor14-proc-paths
    desc: XOR-obfuscated Linux /proc paths
    platforms: [linux, unix, android]
    for: [elf]
    crit: suspicious
    conf: 0.9
    any:
      - id: xor14-proc-paths-a
      - id: xor14-proc-paths-b
  - id: xor14-watchdog-paths-a
    desc: XOR-obfuscated watchdog path set
    platforms: [linux, unix, android]
    for: [elf]
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: micro-behaviors/fs/path/device::dev-watchdog-xor14
      - id: micro-behaviors/fs/path/device::dev-misc-watchdog-xor14
  - id: xor14-watchdog-paths-b
    desc: XOR-obfuscated watchdog path set
    platforms: [linux, unix, android]
    for: [elf]
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: micro-behaviors/fs/path/device::dev-ftwdt101-watchdog-xor14
      - id: micro-behaviors/fs/path/device::dev-watchdog0-xor14
  - id: xor14-watchdog-paths
    desc: XOR-obfuscated watchdog path set
    platforms: [linux, unix, android]
    for: [elf]
    crit: suspicious
    conf: 0.92
    any:
      - id: xor14-watchdog-paths-a
      - id: xor14-watchdog-paths-b
  - id: xor-obfuscated-linux-runtime-paths
    desc: XOR-obfuscated Linux runtime paths
    platforms: [linux, unix, android]
    for: [elf]
    crit: suspicious
    conf: 0.9
    all:
      - id: xor14-proc-paths
      - id: xor14-watchdog-paths
  - id: xor-obfuscated-iot-botnet-layout
    desc: XOR-obfuscated IoT botnet path set
    platforms: [linux, unix, android]
    for: [elf]
    crit: suspicious
    conf: 0.94
    all:
      - id: xor-obfuscated-linux-runtime-paths
      - id: metadata/arch/iot::exotic-arch
      - id: metadata/binary::binary-format-checked
