# XOR obfuscation detection
#
# The previous hex pattern (30 ?? 30 ?? 30 ??) was removed because:
# - 0x30 is both the x86 XOR r/m8,r8 opcode AND ASCII '0'
# - The pattern matched embedded string data ("000", "0Z0Q") not instructions
# - Three adjacent XOR-to-memory instructions is not specific to obfuscation
# - Even with arch:[x86, x86-64], fat Mach-Os and string data caused false positives
#
# Real XOR obfuscation detection requires matching decryption loop patterns
# (XOR + loop counter + memory index), which is better handled by YARA rules
# or the encoded-string detection pipeline.
defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  crit: suspicious
  conf: 0.7
traits: []
composite_rules: []
