defaults:
  platforms:
    - windows
    - linux
    - macos
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
  crit: suspicious
  conf: 0.7
traits:
  - id: xor-memory-write
    desc: XOR instruction writing to memory found
    size_max: 5000000
    count_min: 5
    if:
      type: hex
      pattern: 30 ?? 30 ?? 30 ??
      section: .text
composite_rules:
  - id: generic-xor-obfuscation
    desc: Detects a binary with a high number of XOR instructions and high entropy
    all:
      - id: objectives/anti-static/pack/entropy::high-entropy-section
      - id: xor-memory-write
