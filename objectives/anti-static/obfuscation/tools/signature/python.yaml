defaults:
  platforms: [windows, unix]
  crit: notable
  attack: T1027
  mbc: E1014
  for:
  - python
traits:
- id: blankobf-signature
  desc: BlankOBF obfuscator signature
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: Obfuscated with BlankOBF
- id: pyarmor-signature-core
  desc: PyArmor obfuscator signature
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: pyarmor
- id: pyarmor-signature-underscore
  desc: PyArmor obfuscator signature (double underscore)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: __pyarmor
- id: pyobfuscate-signature
  desc: PyObfuscate signature
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: pyobfuscate\s*=\s*\(|https://pyobfuscate\.com
- id: pyminifier-signature
  desc: pyminifier obfuscator signature
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'pyminifier\.obfuscate|pyminifier_obfuscate|from\s+pyminifier\.\w*obfuscat'
- id: pyarmor-runtime-call
  desc: PyArmor runtime call
  crit: suspicious
  conf: 0.92
  if:
    type: symbol
    exact: __pyarmor__
- id: pytransform-runtime-ref--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: pytransform
  count_max: 1031108
- id: pytransform-runtime-ref--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: pyarmor_runtime
  count_max: 1031109
- id: pyconcrete-loader-ref
  desc: pyconcrete encrypted loader
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: pyconcrete|\.pye\b
- id: pyobfuscator-signature
  desc: py-obfuscator signature
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: pyobfuscator|py-obfuscator
- id: enormous-comment-padding
  desc: Enormous comment padding
  crit: component
  conf: 0.85
  if:
    type: metrics
    field: comments.chars
    min: 5000000
- id: oas-obf-signature
  desc: Oas-obf bytecode obfuscator signature
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: Oas-obf
- id: underscore-only-variables
  desc: Underscore only variable names
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: ^_{3,20}=
- id: excessive-underscore-vars
  desc: Excessive underscore variables
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: _{10,50}=
- id: dense-underscore-obfuscation
  desc: Dense underscore variable obfuscation
  crit: suspicious
  conf: 0.92
  count_min: 10
  per_kb_min: 2.0
  if:
    type: text
    regex: _{3,}\s*=
- id: eval-compile-chain
  desc: eval compile execution chain
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: eval\(.{0,50}compile\(
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  - id: micro-behaviors/data/text/security/scanner::defensive-scanner-tool-context
  - type: text
    regex: eval\(compile\(.{0,120}(script|fname|"exec").{0,120}globs
  - type: text
    regex: eval\(compile\("\s*\\n"\.join\(total_lines\)
  - type: text
    regex: eval\(compile\([a-z_.]+\.read\(\)
- id: nested-eval-compile
  desc: Nested eval compile patterns
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: eval\(compile\(.{0,50}eval\(compile
- id: extreme-line-length
  desc: Extreme line length (data table or obfuscation)
  crit: suspicious
  conf: 0.85
  if:
    type: metrics
    field: text.max_line_length
    min: 500000
  unless:
  - type: basename
    regex: \.html?$
  - type: string_literal
    regex: Jinja2
  - type: basename
    regex: \.lib$
- id: obfuscated-import-pattern
  desc: Obfuscated dynamic import feeding compile()
  crit: suspicious
  conf: 0.8
  # Require both to be actual call sites (trailing `(`). A bare comma-list of
  # builtin names — e.g. a security sandbox documenting `__import__, open, eval,
  # exec, compile` as *blocked* — is not an obfuscated import and must not match.
  if:
    type: text
    regex: __import__\s*\(.{0,50}\bcompile\s*\(|\bcompile\s*\(.{0,50}__import__\s*\(
  unless:
  - id: micro-behaviors/data/text/security/scanner::defensive-scanner-tool-context
  not:
  - regex: customize_compiler
  # `__import__('re').compile(...)` is an inline import of stdlib `re` to build a
  # regex — regex compilation, not obfuscated code loading. A plain quoted module
  # literal hides nothing, so it is not an "obfuscated" dynamic import.
  - regex: __import__\s*\(\s*['"]re['"]\s*\)\s*\.\s*compile
composite_rules:
- id: single-line-noise-pad
  desc: Enormous single-line comment padding
  crit: suspicious
  conf: 0.85
  all:
  - id: enormous-comment-padding
  - id: metadata/file/text/metrics::few-comment-lines
- id: pyarmor-signature
  desc: PyArmor obfuscator signature
  crit: suspicious
  conf: 0.9
  any:
  - id: pyarmor-signature-core
  - id: pyarmor-signature-underscore
  - id: pyarmor-runtime-call
  - id: pytransform-runtime-ref
- id: known-obfuscator-detected
  desc: Known obfuscator detected
  crit: suspicious
  conf: 0.95
  any:
  - id: blankobf-signature
  - id: pyarmor-signature
  - id: pyobfuscate-signature
  - id: pyminifier-signature
  - id: pyconcrete-loader-ref
  - id: pyobfuscator-signature
  - id: oas-obf-signature
- id: python-obfuscation-suite
  desc: Python code obfuscation suite
  crit: hostile
  conf: 0.95
  needs: 3
  any:
  - id: eval-compile-chain
  - id: underscore-only-variables
  - id: extreme-line-length
  - id: nested-eval-compile
  - id: known-obfuscator-detected
- id: pytransform-runtime-ref
  desc: PyArmor pytransform runtime
  crit: suspicious
  conf: 0.9
  any:
  - id: pytransform-runtime-ref--rx-1
  - id: pytransform-runtime-ref--rx-2
