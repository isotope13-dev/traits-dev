defaults:
  attack: T1027
  platforms:
  - linux
  - macos
  - windows
  for: [python, pyc, pe]
traits:
- id: blankobf
  desc: Obfuscated with BlankOBF
  crit: suspicious
  conf: 1.0
  for: [python, pyc]
  if:
    type: text
    substr: BlankOBF
- id: pyinstaller-bundling--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(pyinstaller|pyi-makespec)\s+(-[FDhwyans]|--(onefile|onedir))'
    case_insensitive: true
  count_max: 1031127
- id: pyinstaller-bundling--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(pyinstaller|pyi-makespec)\s+(-[FDhwyans]|--(hidden-import|noconsole))'
    case_insensitive: true
  count_max: 1031129
- id: pyinstaller-bundling--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(pyinstaller|pyi-makespec)\s+(-[FDhwyans]|--(windowed|distpath))'
    case_insensitive: true
  count_max: 1031131
- id: pyinstaller-bundling--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(pyinstaller|pyi-makespec)\s+(-[FDhwyans]|--(workpath|specpath))'
    case_insensitive: true
  count_max: 1031133
- id: pyinstaller-bundling--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(pyinstaller|pyi-makespec)\s+(-[FDhwyans]|--(name|icon))'
    case_insensitive: true
  count_max: 1031135
- id: pyinstaller-bundling--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(pyinstaller|pyi-makespec)\s+([\w/.-]+\.spec\b)'
    case_insensitive: true
  count_max: 1031136
- id: pyinstaller-bundling--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(pyinstaller|pyi-makespec)\s+(-[FDhwyans]|--(add-data|add-binary))'
    case_insensitive: true
  count_max: 1031137
composite_rules:
- id: malware-bundler
  desc: Obfuscates malware with bundling tool
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/data/text/malware/terms::suspicious-repo-name
  - id: pyinstaller-bundling
- id: pyinstaller-screenshotter-rat
  desc: PyInstaller bundling screen capture RAT
  crit: hostile
  conf: 0.95
  mbc: B0032
  all:
  - id: pyinstaller-bundling
  - id: micro-behaviors/hardware/display/screen::screen-capture
- id: pyinstaller-bundling
  desc: PyInstaller executable bundling
  crit: suspicious
  conf: 0.9
  any:
  - id: pyinstaller-bundling--rx-1
  - id: objectives/anti-static/obfuscation/tools/bundler::pyinstaller-bundling--rx-10
  - id: pyinstaller-bundling--rx-3
  - id: objectives/anti-static/obfuscation/tools/bundler::pyinstaller-bundling--rx-10
  - id: pyinstaller-bundling--rx-5
  - id: objectives/anti-static/obfuscation/tools/bundler::pyinstaller-bundling--rx-10
  - id: pyinstaller-bundling--rx-7
  - id: objectives/anti-static/obfuscation/tools/bundler::pyinstaller-bundling--rx-10
  - id: pyinstaller-bundling--rx-9
  - id: pyinstaller-bundling--rx-10
  - id: pyinstaller-bundling--rx-11
  - id: objectives/anti-static/obfuscation/tools/bundler::pyinstaller-bundling--rx-10
