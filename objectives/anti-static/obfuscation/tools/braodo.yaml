# Braodo-specific obfuscation and behavior traits
defaults:
  platforms: [windows, unix]
  for: [python, pyc]
  attack: T1027
  mbc: B0032
traits:
  - id: exec-zlib-base64-loader
    desc: exec(zlib.decompress(base64.b64decode(...))) loader
    crit: suspicious
    conf: 0.95
    if:
      type: text
      # Matches various whitespace and optional module prefixes
      regex: 'exec\s*\(\s*(?:[a-zA-Z0-9._]+\.)?zlib\.decompress\s*\(\s*(?:[a-zA-Z0-9._]+\.)?base64\.b64decode'

  - id: enormous-comment-padding
    desc: Enormous comment padding
    crit: component
    conf: 0.85
    if:
      type: metrics
      field: comments.chars
      min: 5000000
  - id: low-comment-line-count
    desc: Low comment line count
    crit: component
    conf: 0.85
    if:
      type: metrics
      field: comments.lines
      max: 5

  - id: pyobfuscate-pyc-payload-text
    desc: PyObfuscate payload with embedded 'pyc' string
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "'pyc'\\s*:\\s*\"\"\""

composite_rules:
  - id: single-line-noise-pad
    desc: Enormous single-line comment padding
    crit: suspicious
    conf: 0.85
    all:
      - id: enormous-comment-padding
      - id: low-comment-line-count

  - id: pyobfuscate-pyc-payload
    desc: PyObfuscate payload with embedded pyc data
    crit: hostile
    conf: 0.9
    all:
      - id: pyobfuscate-pyc-payload-text
      - id: objectives/anti-static/obfuscation/tools::pyobfuscate-signature

  - id: hostile-python-loader
    desc: Hostile Python-based loader (layered obfuscation)
    crit: hostile
    conf: 0.95
    all:
      - id: exec-zlib-base64-loader
    any:
      - id: objectives/anti-static/obfuscation/reflection/dynamic::dunder-import-getattr-dynamic
      - id: objectives/anti-static/obfuscation/syntax::setattr-builtins-tamper
      - id: objectives/persistence/login/python-startup::is-sitecustomize-file

  - id: highly-suspicious-python-execution
    desc: Highly suspicious Python execution patterns
    crit: suspicious
    conf: 0.9
    any:
      - id: objectives/anti-static/obfuscation/reflection/dynamic::dunder-import-getattr-dynamic
      - id: objectives/anti-static/obfuscation/syntax::setattr-builtins-tamper
    all:
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: micro-behaviors/process/interpreter/python::dunder-import-call
