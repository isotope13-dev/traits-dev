defaults:
  attack: T1027
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - shell
    - batch
    - powershell
    - vbs
    - applescript
traits:
  - id: blankobf
    desc: Obfuscated with BlankOBF
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: BlankOBF
  - id: pyinstaller-bundling
    desc: PyInstaller executable bundling
    crit: suspicious
    conf: 0.9
    for:
      - shell
      - batch
      - powershell
    if:
      type: text
      regex: (pyinstaller|pyi-makespec)\s+
      case_insensitive: true
composite_rules:
  - id: malware-bundler
    desc: Obfuscates malware with bundling tool
    crit: hostile
    conf: 0.95
    for:
      - shell
      - batch
      - powershell
    all:
      - id: micro-behaviors/data/text/malware::suspicious-repo-name
      - id: pyinstaller-bundling
  - id: pyinstaller-screenshotter-rat
    desc: PyInstaller bundling screen capture RAT
    crit: hostile
    conf: 0.95
    mbc: B0032
    for:
      - shell
      - batch
      - powershell
    all:
      - id: pyinstaller-bundling
      - id: micro-behaviors/hardware/display/screen::screen-capture
