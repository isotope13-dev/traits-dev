defaults:
  platforms: [windows, unix]
  for: [java, class]
traits:
  - id: caesium
    desc: Obfuscated by Caesium
    crit: notable
    conf: 1.0
    if:
      type: text
      substr: 'Obfuscated-By: Caesium'
  - id: caesium-component
    desc: Caesium obfuscation component naming pattern
    crit: suspicious
    conf: 0.9
    if:
      type: basename
      regex: caesium_\d+\.class
  - id: caesium-debug
    desc: Caesium obfuscator DEBUG build marker in manifest
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: 'Obfuscated-By: Caesium DEBUG'
  - id: caesium-sourcefile
    desc: Caesium obfuscator SourceFile attribute in class
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: "\0\nSourceFile..\0\acaesium"
  - id: caesium-il-methods
    desc: Obfuscated I/l method names from Caesium
    crit: suspicious
    conf: 0.85
    for:
      - class
      - jar
    count_min: 10
    if:
      type: raw
      regex: 'I[Il]{5,}l|l[Il]{5,}I'
  - id: complexer-marker
    desc: Obfuscated by Complexer
    crit: suspicious
    conf: 0.95
    for: [class, jar]
    if:
      type: raw
      substr: obfuscated with complexer
  - id: stringer
    desc: Obfuscated by Stringer
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Stringer
  - id: stringer-licelus
    desc: Obfuscated by Stringer (Licel US)
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Licel US
