defaults:
  platforms: [windows, unix]
  for: [binaries]
  crit: component
  attack: T1027
  size_max: 52428800
traits:
  - id: go-garbled-type-pointer-upper-digit
    desc: Go garbled package type pointer
    crit: suspicious
    conf: 0.9
    count_min: 30
    if:
      type: text
      regex: \*[A-Za-z0-9]*[A-Z][A-Za-z0-9]*[0-9][A-Za-z0-9]*\.[A-Z][A-Za-z0-9_]+
    not:
      - substr: "*cPmuCX16."
    unless:
      - type: text
        substr: unixAhomChamKawiLisuMiaoModiNewa
  - id: go-garbled-type-pointer-digit-upper
    desc: Go garbled package type pointer
    crit: suspicious
    conf: 0.9
    count_min: 30
    if:
      type: text
      regex: \*[A-Za-z0-9]*[0-9][A-Za-z0-9]*[A-Z][A-Za-z0-9]*\.[A-Z][A-Za-z0-9_]+
    not:
      - substr: "*e6cMvRo."
    unless:
      - type: text
        substr: unixAhomChamKawiLisuMiaoModiNewa
  - id: go-garbled-method-receiver-upper-digit
    desc: Go garbled method receiver pattern
    crit: suspicious
    conf: 0.9
    count_min: 15
    if:
      type: text
      regex: \b[a-z]\w*[A-Z]\w*[0-9]\w*\.\(\*\w+\)\.[A-Z][a-z]+
    not:
      - substr: "mqXlA1Vn5R.(*cTzCEKou)"
    unless:
      - type: text
        substr: unixAhomChamKawiLisuMiaoModiNewa
  - id: go-garbled-method-receiver-digit-upper
    desc: Go garbled method receiver pattern
    crit: suspicious
    conf: 0.9
    count_min: 15
    if:
      type: text
      regex: \b[a-z]\w*[0-9]\w*[A-Z]\w*\.\(\*\w+\)\.[A-Z][a-z]+
    not:
      - substr: "mqXlA1Vn5R.(*cTzCEKou)"
    unless:
      - type: text
        substr: unixAhomChamKawiLisuMiaoModiNewa
composite_rules:
  - id: go-garbled-type-pointer
    desc: Go garbled package type pointer
    crit: suspicious
    conf: 0.9
    any:
      - id: go-garbled-type-pointer-upper-digit
      - id: go-garbled-type-pointer-digit-upper
  - id: go-garbled-method-receiver
    desc: Go garbled method receiver pattern
    crit: suspicious
    conf: 0.9
    any:
      - id: go-garbled-method-receiver-upper-digit
      - id: go-garbled-method-receiver-digit-upper
  - id: go-http-capability-garbled
    desc: Garbled Go binary with HTTP client capability
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: micro-behaviors/data/runtime/library::go-http-internals-present
    any:
      - id: go-garbled-type-pointer
      - id: go-garbled-method-receiver
  - id: go-tls-capability-garbled
    desc: Garbled Go binary with TLS capability
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: micro-behaviors/data/runtime/library::go-tls-internals-present
    any:
      - id: go-garbled-type-pointer
      - id: go-garbled-method-receiver
  - id: go-socks-proxy-garbled
    desc: Garbled Go binary with SOCKS5 proxy capability
    crit: hostile
    conf: 0.9
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: micro-behaviors/communications/proxy/socks::socks5-string
    any:
      - id: go-garbled-type-pointer
      - id: go-garbled-method-receiver
  - id: go-garbled-backdoor
    desc: Garbled Go backdoor with HTTP/TLS and proxy
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: micro-behaviors/communications/proxy/socks::socks5-string
      - id: micro-behaviors/data/runtime/library::go-http-internals-present
      - id: micro-behaviors/data/runtime/library::go-tls-internals-present
    any:
      - id: go-garbled-type-pointer
      - id: go-garbled-method-receiver
