# Go OPSEC Build Flags
# Go malware commonly uses -trimpath to hide source paths and c-shared
# buildmode to produce DLLs for sideloading. This combination is strongly
# associated with offensive tooling (Sliver, Merlin, custom implants).
defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: go-opsec-dll
    desc: Go DLL with OPSEC build flags
    crit: suspicious
    conf: 0.85
    attack: "T1027.004"
    all:
      - id: metadata/lang/go-build::go-cshared-dll
      - id: metadata/lang/go-build::go-trimpath
