defaults:
  platforms: [windows, unix]
  for: [binaries]
  crit: component
  attack: T1027
  size_max: 52428800
composite_rules:
  - id: go-http2-transport-core
    desc: Go HTTP/2 transport core
    conf: 0.85
    all:
      - id: micro-behaviors/data/text/runtime::go-http-internal-http2transport
      - id: micro-behaviors/data/text/runtime::go-http-internal-http2clientconn
  - id: go-http2-present
    desc: Go HTTP/2 internals present
    crit: suspicious
    conf: 0.85
    any:
      - id: micro-behaviors/data/text/runtime::go-http2-internals-present
      - id: go-http2-transport-core
  - id: go-tls-present
    desc: Go TLS internals present
    crit: suspicious
    conf: 0.85
    any:
      - id: micro-behaviors/data/text/runtime::go-tls-handshake-internals
      - id: micro-behaviors/data/text/runtime::go-tls-cipher-internals
  - id: go-cryptobyte-present
    desc: Go cryptobyte ASN.1 parsing present
    crit: suspicious
    conf: 0.85
    any:
      - id: micro-behaviors/data/text/runtime::go-cryptobyte-asn1-core
      - id: micro-behaviors/data/text/runtime::go-cryptobyte-asn1-types
      - id: micro-behaviors/data/text/runtime::go-cryptobyte-methods
  - id: go-garble-indicators
    desc: Go garble obfuscation indicators
    crit: suspicious
    conf: 0.9
    any:
      - id: objectives/anti-static/obfuscation/tools/garble::go-garbled-type-pointer
      - id: objectives/anti-static/obfuscation/tools/garble::go-garbled-method-receiver
  - id: go-garbled-http2
    desc: Garbled Go binary with HTTP/2 capability
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: go-http2-present
      - id: go-garble-indicators
  - id: go-garbled-cryptobyte
    desc: Garbled Go binary with x/crypto/cryptobyte (ASN.1 parsing)
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: go-cryptobyte-present
      - id: go-garble-indicators
  - id: go-proxy-internals-core
    desc: Go proxy function internals
    crit: component
    conf: 0.85
    all:
      - id: micro-behaviors/data/text/runtime::go-proxy-connect-header
      - id: micro-behaviors/data/text/runtime::go-proxy-connect-response
  - id: go-garbled-proxy-client
    desc: Garbled Go binary with proxy client capability
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: go-garble-indicators
    any:
      - id: go-proxy-internals-core
      - id: micro-behaviors/data/text/runtime::go-proxy-is-proxy
  - id: go-base64-present
    desc: Go base64 encoding/decoding present
    crit: baseline
    conf: 0.75
    all:
      - id: metadata/lang/compiler/systems::go-binary
    any:
      - id: micro-behaviors/data/encode/base64::go-base64-encode
      - id: micro-behaviors/data/encode/base64::go-base64-decode
  - id: go-bytes-buffer-present
    desc: Go bytes.Buffer usage present
    crit: suspicious
    conf: 0.7
    any:
      - id: micro-behaviors/data/buffer::go-bytes-buffer-io
      - id: micro-behaviors/data/buffer::go-bytes-buffer-methods
  - id: go-garbled-c2-profile
    desc: Garbled Go C2 implant (HTTP/2, TLS, crypto)
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: go-cryptobyte-present
      - id: go-http2-present
      - id: go-tls-present
      - id: go-garble-indicators
