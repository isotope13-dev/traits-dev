defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [binaries]
  attack: T1027
traits:
  - id: garble-random-filenames
    desc: Go binary with Garble randomized filenames
    crit: suspicious
    conf: 0.95
    count_min: 100
    if:
      type: text
      regex: ^[a-zA-Z0-9_]{5,15}\.go$
  - id: garble-random-packages
    desc: Go binary with Garble randomized packages
    crit: suspicious
    conf: 0.95
    count_min: 40
    if:
      type: text
      regex: ^\w*[0-9]\w*\.\(\*\w*[0-9]\w*\)\.\w+$
composite_rules:
  - id: garble-obfuscated-go
    desc: Garble obfuscated Go binary
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang/compiler/systems::go-binary
    any:
      - id: garble-random-filenames
      - id: garble-random-packages
