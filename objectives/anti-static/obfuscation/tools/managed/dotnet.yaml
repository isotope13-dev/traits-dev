defaults:
  attack: T1027
  platforms:
    - windows
  for:
    - pe
    - dll
    - csharp
traits:
  - id: smartassembly-banner
    desc: SmartAssembly banner string
    crit: component
    conf: 0.98
    if:
      type: text
      substr: '#Powered by SmartAssembly'
  - id: smartassembly-namespace
    desc: SmartAssembly namespace reference
    crit: component
    conf: 0.95
    if:
      type: text
      substr: SmartAssembly.Attributes
  - id: smartassembly-poweredby
    desc: SmartAssembly PoweredBy attribute
    crit: component
    conf: 0.95
    if:
      type: text
      substr: PoweredByAttribute
  - id: protector-198-v4-marker
    desc: 198 Protector V4 marker
    crit: component
    conf: 0.98
    if:
      type: text
      exact: 198 Protector V4
composite_rules:
  - id: smartassembly
    desc: Obfuscated with SmartAssembly
    crit: suspicious
    conf: 0.98
    needs: 2
    any:
      - id: smartassembly-banner
      - id: smartassembly-namespace
      - id: smartassembly-poweredby
    unless:
      - id: metadata/signed/developer::progress-software-corporation
  - id: dotnet-198-protector
    desc: Obfuscated with 198 Protector V4
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: protector-198-v4-marker
    unless:
      - id: metadata/signed/platform::microsoft
