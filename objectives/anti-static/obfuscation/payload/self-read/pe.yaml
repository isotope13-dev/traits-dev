# PE Self-Reading Overlay Extraction
# Detects binaries that open and read themselves to extract appended payload data
# ATT&CK: T1027.009 (Embedded Payloads)
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1027.009"
  mbc: "B0032"
traits:
  - id: self-read-file-chain
    desc: "File self-reading API chain (overlay extraction)"
    crit: baseline
    conf: 0.8
    if:
      type: import_combination
      required:
        - "^GetModuleFileName"
        - "^CreateFile"
        - "^ReadFile"
      suspicious:
        - "^SetFilePointer"
        - "^GetFileSize"
      min_suspicious: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: self-read-crt-chain
    desc: CRT self-open via module path
    crit: baseline
    conf: 0.82
    if:
      type: import_combination
      required:
        - "^GetModuleFileNameA$"
        - "^fopen$"
      suspicious:
        - "^fclose$"
      min_suspicious: 1
  - id: embedded-elf-overlay-text
    desc: Embedded ELF relocation table strings
    crit: suspicious
    conf: 0.93
    count_min: 4
    if:
      type: text
      regex: ELFMAINX|LZMA_ELF00
composite_rules:
  - id: versioned-service-binary
    desc: Versioned service installation markers
    crit: baseline
    conf: 0.75
    all:
      - type: trait
        id: metadata/package/versioning::pe-version-resource
    any:
      - id: objectives/persistence/system/service/install::service-install-and-start
      - id: micro-behaviors/os/service/control::service-control-dispatch
  - id: benign-overlay-carrier
    desc: Benign overlay carrier markers
    crit: component
    conf: 0.75
    any:
      - id: metadata/binary/installer::known-benign-installer
      - id: objectives/anti-static/obfuscation/binary-metrics::7zsfx-config-marker
      - id: metadata/binary/installer/script::nsis-sfx-deadbeef-magic
      - id: metadata/document/office::help2-container
      - id: objectives/anti-static/obfuscation/binary-metrics::high-string-density-large-pe
  - id: self-read-overlay-access
    desc: Self-read overlay access chain
    crit: component
    conf: 0.82
    any:
      - id: self-read-file-chain
      - id: self-read-crt-chain
  - id: pe-overlay-self-extractor
    desc: "PE reads own overlay to extract encrypted payload"
    crit: suspicious
    conf: 0.88
    unless:
      - id: benign-overlay-carrier
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::has-overlay
      - id: self-read-overlay-access
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-entropy-overlay
      - id: objectives/anti-static/obfuscation/binary-metrics::binary-encrypted-overlay
    size_max: 2000000
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/lang/compiler/systems::rust-binary
  - id: mixed-exec-overlay-carrier
    desc: Large overlay carries mixed embedded executables
    crit: suspicious
    conf: 0.94
    unless:
      - id: benign-overlay-carrier
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
    all:
      - id: metadata/binary/layout::overlay-over-1mb
      - id: metadata/binary/layout::overlay-over-35pct
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: embedded-elf-overlay-text
    any:
      - id: objectives/anti-static/pack/detect::upx-section
      - id: objectives/anti-static/obfuscation/binary-metrics/section-names::misleading-upx-sections
      - id: objectives/anti-static/polyglot/format::pe-multi-embedded-payload-container
  - id: packed-mixed-overlay-decoy-loader
    desc: Packed overlay loader with mixed decoys
    crit: suspicious
    conf: 0.96
    all:
      - id: mixed-exec-overlay-carrier
      - id: metadata/binary/layout::many-pe-embedded
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
    any:
      - id: objectives/anti-static/pack/detect::upx-section
      - id: objectives/anti-static/obfuscation/binary-metrics::large-overlay
      - id: objectives/anti-static/obfuscation/binary-metrics::has-overlay
  - id: upx-overlay-decoy-loader
    desc: UPX host with mixed decoy overlay
    crit: hostile
    conf: 0.985
    all:
      - id: packed-mixed-overlay-decoy-loader
      - id: metadata/binary/layout::many-pe-embedded
      - id: objectives/anti-static/pack/detect::upx-section
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::large-overlay
      - id: objectives/anti-static/obfuscation/binary-metrics::has-overlay
      - id: metadata/binary/layout::overlay-over-1mb
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::nsis
