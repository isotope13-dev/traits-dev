# PE Self-Reading Overlay Extraction
# Detects binaries that open and read themselves to extract appended payload data
# ATT&CK: T1027.009 (Embedded Payloads)
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1027.009"
  mbc: "B0032"
traits:
- id: ftell-import
  desc: ftell import
  crit: component
  if:
    type: import
    exact: ftell
- id: vmware-tools-marker
  desc: VMware Tools marker
  crit: component
  conf: 0.8
  if:
    type: text
    exact: VMware Tools
# Builder stubs carve their embedded payload from inside a section behind a
# placeholder sentinel (e.g. `[[UNIQUE]]`) that the generator patches per build,
# instead of appending a structural PE overlay that has_overlay/entropy checks
# would catch. Double-bracketed all-caps tokens are a builder-placeholder
# convention that almost never appears in legitimately compiled code.
- id: builder-placeholder-sentinel
  desc: Bracketed builder placeholder sentinel
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '\[\[[A-Z][A-Z0-9_]{2,20}\]\]'
composite_rules:
# Benign-context umbrella: signed/installer/packed distributions that
# legitimately self-read their own image. Referenced as a single unless: leg.
- id: self-read-benign-distribution-context
  desc: Benign signed or installer binary
  crit: component
  conf: 0.9
  any:
  - id: metadata/binary/vendor::windows-system-implementer-dll
  - id: metadata/binary/debug::msqry32-pdb-basename
  - id: metadata/signed/platform::microsoft
  - id: vmware-tools-marker
  - id: metadata/signed/leaf::python-software-foundation
  - id: metadata/binary/installer/sfx::7zip-sfx-archive-profile
  - id: metadata/binary/installer/family::known-benign-installer
  - id: well-known/lib/protection/vmware-thinapp::thinapp-packed-runtime
- id: self-read-file-import-chain
  desc: File self-reading import chain
  crit: component
  conf: 0.8
  all:
  - id: micro-behaviors/os/module/load::get-module-filename-ansi
  - id: micro-behaviors/fs/file/open::file-create-win
  - id: micro-behaviors/fs/file/read::read-file
  any:
  - id: micro-behaviors/fs/file/handle::set-file-pointer-ex
  - id: micro-behaviors/fs/sync/fsync::get-file-size
- id: self-read-crt-open
  desc: CRT file open routine
  crit: component
  conf: 0.82
  any:
  - id: micro-behaviors/fs/file/open::fopen
  - id: micro-behaviors/fs/file/open::fopen64
  - id: micro-behaviors/fs/file/open::fopen-text
- id: self-read-crt-read
  desc: CRT file read routine
  crit: component
  conf: 0.82
  any:
  - id: micro-behaviors/fs/file/read::fread
  - id: micro-behaviors/fs/file/read::read
  - id: micro-behaviors/fs/file/read::fread-text
- id: self-read-crt-seek
  desc: CRT file seek routine
  crit: component
  conf: 0.82
  any:
  - id: micro-behaviors/fs/file/binary::fseek-func
  - id: micro-behaviors/fs/file/binary::fseek-text
  - id: ftell-import
- id: self-read-crt-chain
  desc: CRT self-open via module path
  crit: component
  conf: 0.82
  all:
  - id: micro-behaviors/os/module/load::get-module-filename-ansi
  - id: self-read-crt-open
  - id: self-read-crt-read
  - id: self-read-crt-seek
- id: self-read-file-chain
  desc: File self-reading API chain
  crit: suspicious
  conf: 0.8
  all:
  - id: self-read-file-import-chain
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::has-overlay
  # Suppressors consolidated into the self-read-benign-distribution-context
  # umbrella (one referenced leg instead of eight; identical OR semantics).
  unless:
  - id: self-read-benign-distribution-context
- id: versioned-service-binary
  desc: Versioned service installation markers
  crit: baseline
  conf: 0.75
  all:
  - id: metadata/package/versioning::pe-version-resource
  any:
  - id: objectives/persistence/system/service/install::service-install-and-start
  - id: micro-behaviors/os/service/control::service-control-dispatch
- id: self-read-overlay-access
  desc: Self-read overlay access chain
  crit: component
  conf: 0.82
  any:
  - id: self-read-file-chain
  - id: self-read-crt-chain
- id: pe-overlay-self-extractor
  desc: "PE reads own overlay to extract encrypted payload"
  crit: suspicious
  conf: 0.88
  unless:
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/installer/sfx::7zsfx-config-marker
  - id: metadata/binary/installer/script::nsis-sfx-deadbeef-magic
  - id: metadata/document/office/container::help2-container
  all:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::has-overlay
  - id: self-read-overlay-access
  any:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-entropy-overlay
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::large-overlay
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::binary-encrypted-overlay
  size_max: 5000000
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/lang/compiler/systems::rust-binary
    - id: versioned-service-binary
# Overlay-independent variant of pe-overlay-self-extractor: the stub reads its
# own image and locates the embedded payload by a builder placeholder sentinel
# inside a section, so has_overlay/overlay-entropy never trip. The self-read
# chain plus an unreplaced builder marker is the tell of a generator-built stub.
- id: self-read-marker-delimited-payload
  desc: Self-reads image and carves payload at a builder sentinel
  crit: suspicious
  conf: 0.85
  all:
  - id: self-read-overlay-access
  - id: builder-placeholder-sentinel
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/installer/sfx::7zip-sfx-archive-profile
# A builder stub that carves an embedded payload from its own image AND ships a
# multipart HTTP uploader is a self-extracting dropper / exfil bot: it extracts a
# sentinel-delimited payload and phones it (or collected files) home. No
# legitimate program combines sentinel-self-extraction with a multipart uploader,
# so the conjunction is hostile even without a structural overlay.
- id: self-extracting-payload-uploader
  desc: Self-extracts a sentinel-delimited payload and uploads over HTTP
  crit: hostile
  conf: 0.93
  all:
  - id: self-read-marker-delimited-payload
  - id: objectives/exfiltration/http/upload::multipart-file-upload-transfer
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/installer/family::known-benign-installer
