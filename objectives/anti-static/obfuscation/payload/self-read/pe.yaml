# PE Self-Reading Overlay Extraction
# Detects binaries that open and read themselves to extract appended payload data
# ATT&CK: T1027.009 (Embedded Payloads)
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1027.009"
  mbc: "B0032"
traits:
  - id: self-read-file-chain
    desc: "File self-reading API chain (overlay extraction)"
    crit: notable
    conf: 0.8
    if:
      type: import_combination
      required:
        - "^GetModuleFileName"
        - "^CreateFile"
        - "^ReadFile"
      suspicious:
        - "^SetFilePointer"
        - "^GetFileSize"
      min_suspicious: 1
    unless:
      - id: metadata/signed/platform::microsoft
  - id: self-read-crt-chain
    desc: CRT self-open via module path
    crit: notable
    conf: 0.82
    if:
      type: import_combination
      required:
        - "^GetModuleFileNameA$"
        - "^fopen$"
        - "^fread$"
      suspicious:
        - "^fseek$"
        - "^ftell$"
      min_suspicious: 1
composite_rules:
  - id: versioned-service-binary
    desc: Versioned service installation markers
    crit: baseline
    conf: 0.75
    all:
      - type: trait
        id: metadata/package/versioning::pe-version-resource
    any:
      - id: objectives/persistence/system/service/install::service-install-and-start
      - id: micro-behaviors/os/service/control::service-control-dispatch
  - id: self-read-overlay-access
    desc: Self-read overlay access chain
    crit: component
    conf: 0.82
    any:
      - id: self-read-file-chain
      - id: self-read-crt-chain
  - id: pe-overlay-self-extractor
    desc: "PE reads own overlay to extract encrypted payload"
    crit: suspicious
    conf: 0.88
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: objectives/anti-static/obfuscation/binary-metrics::7zsfx-config-marker
      - id: metadata/binary/installer/script::nsis-sfx-deadbeef-magic
      - id: metadata/document/office::help2-container
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::has-overlay
      - id: self-read-overlay-access
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-entropy-overlay
      - id: objectives/anti-static/obfuscation/binary-metrics::large-overlay
      - id: objectives/anti-static/obfuscation/binary-metrics::binary-encrypted-overlay
    size_max: 2000000
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/lang/compiler/systems::rust-binary
        - id: versioned-service-binary
