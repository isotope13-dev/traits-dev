defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1027.009
  mbc: B0032
traits:
  - id: self-read-executable
    desc: Reads current executable source path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: File.ReadAllText(Application.ExecutablePath)
  - id: self-read-split
    desc: Splits self-read content for payload
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Strings.Split(File.ReadAllText(Application.ExecutablePath)
  - id: appended-delimiter-constant
    desc: Hardcoded appended payload delimiter
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: const\s+string\s+[A-Za-z_][A-Za-z0-9_]*\s*=\s*"[a-z0-9]{40,64}"
composite_rules:
  - id: self-read-appended-payload
    desc: Self-read appended payload extraction
    crit: suspicious
    conf: 0.95
    all:
      - id: self-read-executable
      - id: self-read-split
    any:
      - id: appended-delimiter-constant
      - id: objectives/command-and-control/dropper/staging/embedded::convert-frombase64
