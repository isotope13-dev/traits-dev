# Python crypter decrypt-and-run loader (runtime deobfuscation stage).
#
# Companion to data/embedded/payload/encrypted::embedded-base64-aes-data.
# Where that rule fingerprints the *packed* payload, this one fingerprints the
# *execution* stage of the same stub: the embedded blob is base64-decoded, AES
# decrypted, then handed to a child process (PyInstaller stealers drop the cleared
# payload to a temp path and relaunch the bundled interpreter on it). Decode +
# symmetric-cipher decrypt + process spawn over a megabyte-scale embedded blob is
# a loader, not application logic — benign code does not run what it just decrypted.
defaults:
  platforms: [windows, unix]
  for: [python, pyc]
  attack: T1140
  mbc: B0032
composite_rules:
  - id: python-crypter-decrypt-and-run
    desc: Python decrypt-and-execute payload loader
    crit: hostile
    conf: 0.95
    attack: T1059.006
    all:
      - id: micro-behaviors/data/encode/base64::embedded-base64-blob
      - id: micro-behaviors/crypto/symmetric/aes/library::pycrypto-cipher-module-ref
      - id: micro-behaviors/data/decode/base64::b64decode-string
      - id: micro-behaviors/process/create/subprocess::subprocess-module-pyc
