defaults:
  platforms: [macos]
  for: [macho]
  attack: T1027.009,T1129,T1059.004

composite_rules:
  - id: macho-concealed-runtime-command-loader
    desc: Mach-O concealed runtime command loader
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/metrics/structural::macho-sparse-cstring-section
      - id: metadata/file/metrics::peak-region-cipher-entropy
      - id: micro-behaviors/dylib/load/runtime::dlopen-dlsym
      - id: micro-behaviors/process/create/popen::c-popen
  - id: macho-obfuscated-memory-bootstrap
    desc: Ad-hoc Mach-O decrypts a concealed bootstrap in transient locked memory
    crit: hostile
    conf: 0.99
    attack: T1027,T1055,T1620
    all:
      - id: metadata/binary/metrics/structural::macho-sparse-cstring-section
      - id: metadata/binary/metrics/structural::extreme-text-to-string-ratio
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: micro-behaviors/mem/alloc/executable::mmap-import
      - id: micro-behaviors/mem/lock/pages::mlock-import
      - id: micro-behaviors/fs/memory/mmap::munmap-import
    unless:
      - id: metadata/signed/platform::apple
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
