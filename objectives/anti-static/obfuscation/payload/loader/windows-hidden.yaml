defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009
composite_rules:
- id: concealed-api-encoded-payload-loader
  desc: Concealed API loader with encoded payload
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/anti-static/obfuscation/imports::hidden-loader-api-string-cluster
  - id: metadata/file/encoded::pe-dense-data-base64-like-blobs
  - id: metadata/signed/trust-level::unsigned
  any:
  - id: objectives/anti-static/obfuscation/name-mangling/export-name::randomized-dictionary-export-cluster
  - id: objectives/anti-static/obfuscation/decoy-imports::junk-api-flooding-cluster
  - id: metadata/binary/layout::pe-checksum-mismatch
  unless:
  - id: metadata/binary/installer/family/
  - id: metadata/signed/platform/
- id: packed-memory-api-payload-loader
  desc: Packed PE memory API payload loader
  crit: hostile
  conf: 0.98
  attack: "T1027.002,T1055"
  all:
  - id: metadata/binary/section/metrics::random-exec-payload-section
  - id: metadata/file/encoded::pe-dense-data-base64-like-blobs
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/os/module/load::get-proc-address-import
  - id: metadata/binary/layout::pe-multiple-tls-callbacks
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/framework/
  - id: well-known/tool/reverse-engineering/
