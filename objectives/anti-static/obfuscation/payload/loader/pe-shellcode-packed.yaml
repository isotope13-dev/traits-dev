defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: pe-packed-hardware-rng-loader
    desc: Packed PE loader with hardware RNG/timing probe
    crit: suspicious
    conf: 0.9
    size_min: 32768
    size_max: 1048576
    all:
      - id: metadata/binary/instruction::cpuid-feature-query-sequence
      - id: micro-behaviors/os/random/crypto::rdrand-instruction
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-data-section
    any:
      - id: objectives/anti-analysis/vm-detect/instruction::rdtsc-register-mix
      - id: metadata/binary/layout::pe-entry-itext-section
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-overall-entropy
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform/
  - id: pe-zero-imports-shellcode-dropper
    desc: "PE with zero imports plus obfuscation - likely shellcode or packed malware"
    crit: hostile
    conf: 0.9
    size_min: 16384
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/metrics/structural::dominant-section
      - id: metadata/binary/resource/
      - id: metadata/binary/resource::mui-string
      - id: metadata/binary/resource::resources-dll-extension
      - id: metadata/binary/layout::efi-pe-subsystem
      - id: metadata/signed/platform/
    all:
      - id: metadata/binary/metrics/structural::no-imports
      - id: metadata/binary/metrics/structural::few-functions
    any:
      - id: objectives/anti-static/obfuscation/binary-structure::huge-null-run-text
      - id: micro-behaviors/crypto/symmetric/xor/loop::native-byte-xor-loop
      - id: objectives/anti-analysis/vm-detect/instruction::multiple-rdtsc-instr
  - id: x64-decoded-shellcode-loader
    desc: x64 decoded code copied to executable memory
    crit: hostile
    conf: 0.99
    attack: T1027,T1140,T1620
    all:
      - id: micro-behaviors/crypto/symmetric/xor/loop::x64-xor-immediate-byte-loop
      - id: micro-behaviors/mem/alloc/executable::virtualalloc-readwrite-commit-resolved-x64
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/mem/alloc/executable::protected-buffer-indirect-call
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/family/
      - id: well-known/tool/reverse-engineering/
