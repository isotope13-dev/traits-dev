defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1027
traits:
  - id: py-base64-exec-inline
    desc: Python execs base64 decoded payload
    crit: component
    conf: 0.95
    if:
      type: text
      regex: exec\s*\(\s*base64\.b64decode
  - id: py-base64-exec-inline-ast
    desc: Python execs base64 payload (AST)
    crit: component
    conf: 0.97
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '(^|\.)base64\.\^\(b64decode\|standard_b64decode\|urlsafe_b64decode\)\$$'
  - id: py-subprocess-devnull
    desc: Python subprocess redirects DEVNULL
    crit: component
    conf: 0.9
    if:
      type: text
      regex: subprocess\.(Popen|run)\([\s\S]{0,520}(stdout|stderr)\s*=\s*subprocess\.DEVNULL
  - id: py-subprocess-devnull-ast
    desc: Python subprocess redirects DEVNULL (AST)
    crit: component
    conf: 0.96
    unless:
      - id: metadata/library/python-stdlib
    if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
      type: symbol
      kind: call
      regex: '(^|\.)subprocess\.\^\(Popen\|run\)\$$'
  - id: py-stdin-child-interpreter
    desc: Python child interpreter stdin
    crit: component
    conf: 0.9
    if:
      type: text
      regex: \[\s*sys\.executable\s*,\s*["']-["']\s*\]
  - id: cpython-profiling-child-test
    desc: CPython profiling child process test
    crit: component
    conf: 0.9
    if:
      type: path
      basename: true
      exact: test_children.py
composite_rules:
  - id: py-base64-exec-inline-any
    desc: Python base64 exec pattern
    crit: component
    conf: 0.97
    any:
      - id: py-base64-exec-inline
      - id: py-base64-exec-inline-ast
  - id: py-subprocess-devnull-any
    desc: Python subprocess DEVNULL redirect
    crit: component
    conf: 0.96
    any:
      - id: py-subprocess-devnull
      - id: py-subprocess-devnull-ast
  - id: py-sys-executable-c-popen-any
    desc: Python inline child interpreter
    crit: component
    conf: 0.96
    any:
      - id: micro-behaviors/process/create/subprocess::sys-executable-c-popen
      - id: micro-behaviors/process/create/subprocess::sys-executable-c-popen-ast
  - id: py-base64-inline-exec-loader
    desc: Python execs base64 payload
    crit: hostile
    conf: 0.96
    all:
      - id: py-base64-exec-inline-any
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::single-long-line-outlier
      - id: metadata/binary/metrics/encoded::large-embedded-b64-blob
  - id: py-base64-background-exec
    desc: Hidden base64 Python execution
    crit: hostile
    conf: 0.96
    all:
      - id: py-sys-executable-c-popen-any
      - id: py-base64-exec-inline-any
      - id: py-subprocess-devnull-any
  - id: py-hidden-inline-child-exec
    desc: Inline child Python execution with suppressed stdio
    crit: component
    conf: 0.9
    all:
      - id: py-sys-executable-c-popen-any
      - id: py-subprocess-devnull-any
    unless:
      - id: cpython-profiling-child-test
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
  - id: py-decoded-stage-child-exec
    desc: Decoded payload child interpreter
    crit: component
    conf: 0.94
    all:
      - id: py-stdin-child-interpreter
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: py-subprocess-devnull-any
