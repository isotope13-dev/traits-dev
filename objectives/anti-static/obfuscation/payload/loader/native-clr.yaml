# Native PE that loads a .NET payload via the CLR.
#
# A native (non-.NET) Windows binary that references `mscoree.dll`
# AND calls `CorExitProcess` AND has `LoadLibrary` capability is
# almost certainly hosting a .NET DLL inside a native shell. This is
# the DTProHelper → Engine.dll shape: native PE for cert/signing
# optics on the outside, managed code on the inside.
#
# The pattern catches:
#   - Trojanized vendor binaries dropping .NET payloads
#   - Shellcode loaders that pivot into a .NET runtime
#   - "Mixed-mode native shim + managed DLL" backdoors
#
# Critical exclusion: actual .NET assemblies (BSJB metadata) and
# .NET single-file host runtimes — those legitimately call mscoree
# and CorExitProcess as part of their startup path.
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1620"
  mbc: "B0032"

composite_rules:
  - id: native-clr-encrypted-byte-array-loader
    desc: Native CLR loader executes encrypted byte-array payload
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/framework::mscoree-name
      - id: micro-behaviors/process/interpreter/runtime/clr::clr-native-hosting-apis
      - id: micro-behaviors/process/interpreter/runtime/clr::clr-byte-array-assembly-load
      - id: micro-behaviors/process/interpreter/runtime/clr::clr-entrypoint-invoke
      - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-aes-gcm-decrypt
      - id: micro-behaviors/mem/protect/modify::virtual-protect

  - id: native-pe-loads-dotnet-payload
    desc: Native PE loads .NET payload via CLR
    crit: suspicious
    conf: 0.93
    all:
      - id: metadata/binary/framework::mscoree-name
      - id: micro-behaviors/process/inject/runtime/clr::corexitprocess-string
    any:
      - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
      - id: metadata/binary/layout::cert-table-present
    unless:
      - id: objectives/anti-static/obfuscation/payload/loader/
      - id: well-known/tool/reverse-engineering/cff-explorer/
      - id: well-known/game/steam/
    downgrade:
      any:
        - id: metadata/signed/leaf::bitdefender-srl
        - id: metadata/signed/developer::bitdefender-srl
        - id: well-known/game/mod/
        - id: metadata/binary/vendor/
  - id: native-overlay-clr-stage-loader
    desc: Native overlay wrapper stages CLR payload
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/layout::overlay-over-35pct
      - id: metadata/binary/section/metrics::edata-wrapper-entry-layout
    any:
      - id: metadata/binary/framework::mscoree-name
      - id: micro-behaviors/process/inject/runtime/clr::corexitprocess-string
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    needs: 3
    unless:
      - id: objectives/anti-static/obfuscation/payload/loader/
      - id: metadata/signed/platform/
      - id: metadata/signed/platform::microsoft-windows
      - id: well-known/tool/reverse-engineering/cff-explorer/
  - id: native-clr-dynamic-api-stage-loader
    desc: Native CLR payload loader with dynamic API resolution
    crit: hostile
    conf: 0.96
    all:
      - id: native-pe-loads-dotnet-payload
      - id: objectives/command-and-control/backdoor/implant::peb-walk-dynamic-resolution
    unless:
      - id: objectives/anti-static/obfuscation/payload/loader/
      - id: metadata/signed/platform/
      - id: metadata/signed/platform::microsoft-windows
  - id: native-clr-recognized-marker
    desc: Recognized CLR host marker
    crit: component
    conf: 1.0
    any:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/binary/installer/database::wix-burn-manifest-pair
      - id: metadata/binary/installer/database::wix-bootstrapper-manifest
      - id: well-known/app/protected-benign-pe/
      - id: well-known/app/weamp-pagespeed::native-pagespeed-library
      - id: well-known/app/drivers::ngx-dll-basename
      # WinRAR's native modules (RarExt*.dll, UnRAR.exe, ...) reference mscoree
      # for optional .NET shell-integration; they are signed by win.rar GmbH.
      - id: well-known/tool/sysadmin/winrar::winrar-component
