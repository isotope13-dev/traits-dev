defaults:
  platforms: [windows]
  for: [pe]
traits: []
composite_rules:
  - id: import-table-padding
    desc: Rare padding APIs with sparse function count
    crit: suspicious
    conf: 0.85
    attack: T1027.001
    size_max: 2097152
    all:
      - id: metadata/binary/metrics/anomaly::low-function-count-marker
      - id: metadata/binary/metrics/structural::many-imports
    needs: 2
    any:
      - id: metadata/binary/anomaly/format::import-padding-system-time
      - id: micro-behaviors/time/schedule/callback/create::create-timer-queue-timer-sym
      - id: metadata/binary/anomaly/format::import-padding-write-profile
      - id: metadata/binary/anomaly/format::import-padding-console-alias
