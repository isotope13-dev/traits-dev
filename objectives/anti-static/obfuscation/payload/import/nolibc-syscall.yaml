# Nolibc raw-syscall payloads: a statically linked, section-header-thin binary
# with no libc that reaches a sensitive kernel operation through a direct
# `mov eax, N; syscall` rather than a libc call. Dropping libc is an import-
# minimization / anti-static tactic (T1027): there is no `execve`, `socket`, or
# `ptrace` symbol for an import-table or symbol scan to find, so the capability is
# invisible to detection that keys on names -- the exact blind spot the sample
# samples/benign/handwritten-asm/pong.elf demonstrated for terminal ioctls.
#
# The capability atoms live in micro-behaviors/os/syscall/raw/linux-x64.yaml; here
# they are paired with the nolibc + low-function-count shape that separates a
# hand-written payload from an ordinary statically linked libc program (which is
# also needed-libs-zero but carries hundreds to thousands of functions, and whose
# libc wrappers contain these same syscall bytes). Neutral raw syscalls (a nolibc
# TUI issuing read/write/ioctl like pong) do not reach these composites -- only the
# sensitive-operation syscall numbers do.
defaults:
  platforms: [linux]
  for: [elf]
  arch: [x86-64]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: nolibc-execve-payload
    desc: Nolibc binary execs a program via raw syscall
    crit: suspicious
    conf: 0.85
    attack: T1106
    all:
      - id: micro-behaviors/os/syscall/raw::x64-mov-execve-syscall
      - id: metadata/binary/linking/static::elf-needed-libs-zero
      - id: metadata/binary/metrics/threshold::functions-at-most-32

  - id: nolibc-network-payload
    desc: Nolibc binary opens a network connection via raw syscall
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/binary/linking/static::elf-needed-libs-zero
      - id: metadata/binary/metrics/threshold::functions-at-most-32
    any:
      - id: micro-behaviors/os/syscall/raw::x64-mov-socket-syscall
      - id: micro-behaviors/os/syscall/raw::x64-mov-connect-syscall

  - id: nolibc-ptrace-payload
    desc: Nolibc binary calls ptrace via raw syscall
    crit: suspicious
    conf: 0.8
    attack: T1055.008
    all:
      - id: micro-behaviors/os/syscall/raw::x64-mov-ptrace-syscall
      - id: metadata/binary/linking/static::elf-needed-libs-zero
      - id: metadata/binary/metrics/threshold::functions-at-most-32
