defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1027
traits:
  - id: py-base64-exec-inline
    desc: Python execs base64 decoded payload
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: exec\s*\(\s*base64\.b64decode
  - id: py-subprocess-devnull
    desc: Python subprocess redirects DEVNULL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: subprocess\.(Popen|run)\([\s\S]{0,320}(stdout|stderr)\s*=\s*subprocess\.DEVNULL
  - id: py-stdin-child-interpreter
    desc: Python child interpreter stdin
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \[\s*sys\.executable\s*,\s*["']-["']\s*\]
composite_rules:
  - id: py-base64-background-exec
    desc: Hidden base64 Python execution
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/process/create/subprocess::sys-executable-c-popen
      - id: py-base64-exec-inline
      - id: py-subprocess-devnull
  - id: py-decoded-stage-child-exec
    desc: Decoded payload child interpreter
    crit: suspicious
    conf: 0.94
    all:
      - id: py-stdin-child-interpreter
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: py-subprocess-devnull
