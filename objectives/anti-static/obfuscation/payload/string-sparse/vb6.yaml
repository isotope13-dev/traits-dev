defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1027
  mbc: B0032
traits:
  - id: low-string-count-vb6
    desc: VB6 binary with very few strings
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.string_count
      max: 40
  - id: dominant-text-layout-vb6
    desc: Dominant section for VB6 loader profile
    crit: component
    conf: 0.86
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.95
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - type: metrics
        field: pe.rich_header_present
        min: 1
      - type: metrics
        field: binary.largest_section_ratio
        max: 0
      - type: basename
        regex: \.(winmd|mun|rll)$
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
  - id: three-section-vb6-layout
    desc: VB6 PE with three sections
    crit: component
    conf: 0.84
    if:
      type: metrics
      field: binary.section_count
      min: 3
      max: 3
composite_rules:
  - id: sparse-vb6-loader-profile
    desc: String-sparse VB6 loader profile
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/framework::vb6-application-framework
      - id: low-string-count-vb6
      - id: dominant-text-layout-vb6
      - id: three-section-vb6-layout
