defaults:
  for: [binaries]
  platforms:
    - windows
    - linux
    - macos
  attack: T1027
  mbc: F0001
traits:
  - id: extreme-string-sparsity-macos
    desc: Extreme string sparsity (<0.05%)
    crit: notable
    conf: 0.9
    for:
      - macho
    size_min: 100000
    if:
      type: section
      regex: __cstring
      compare_to: total
      size_ratio_max: 0.0005
    unless:
      - id: metadata/file/extension::macho-so-extension
      - id: metadata/binary/framework::macos-framework-or-runtime
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::rustc-path
      - id: metadata/signed/platform::apple
      - id: well-known/lib/jvm

  - id: very-sparse-strings-macos
    desc: Very sparse string section (<0.2%)
    crit: suspicious
    conf: 0.8
    for:
      - macho
    size_min: 100000
    size_max: 5242880
    if:
      type: section
      regex: __cstring
      compare_to: total
      size_ratio_max: 0.002
    not:
      - regex: \.cpython-\d+-darwin\.so$
    unless:
      - id: metadata/file/extension::macho-so-extension
      - id: metadata/binary/framework::macos-framework-or-runtime
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::rustc-path
      - id: metadata/signed/platform::apple
      - id: well-known/lib/jvm

  - id: high-entropy-data-macos
    desc: High entropy in __DATA section
    crit: suspicious
    conf: 0.85
    for:
      - macho
    entropy_min: 6.5
    if:
      type: section
      exact: __DATA.__data
composite_rules:
  - id: obfuscated-payload-storage
    desc: Obfuscated payload in data section
    crit: suspicious
    conf: 0.9
    for:
      - macho
    all:
      - id: extreme-string-sparsity-macos
      - id: metadata/binary/metrics/structural::large-data-section-ratio
  - id: string-obfuscated-malware
    desc: String-obfuscated malware with shell
    crit: suspicious
    conf: 0.95
    for:
      - macho
    all:
      - id: extreme-string-sparsity-macos
      - id: high-entropy-data-macos
      - id: micro-behaviors/process/create/shell/
  - id: stripped-static-elf-obfuscation
    desc: Stripped static ELF string concealment
    crit: suspicious
    conf: 0.9
    for:
      - elf
    all:
      - id: objectives/anti-static/obfuscation/imports::very-low-strings
      - id: metadata/binary/layout::binary-format-checked
      - id: metadata/binary/linking/static::static-linked-heuristic
    any:
      - id: metadata/arch/iot::exotic-arch
      - id: metadata/binary/metrics/structural::high-code-to-data-ratio
