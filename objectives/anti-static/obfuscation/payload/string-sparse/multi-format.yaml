defaults:
  for: [binaries]
  platforms:
    - windows
    - linux
    - macos
  attack: T1027
  mbc: F0001
traits:
  - id: extreme-string-sparsity-macos
    desc: Extreme string sparsity (<0.05%)
    crit: notable
    conf: 0.9
    for:
      - macho
    size_min: 100000
    if:
      type: section
      regex: __cstring
      compare_to: total
      size_ratio_max: 0.0005
    not:
      - regex: '\.a$'
    unless:
      - id: metadata/file/extension/identity::macho-so-extension
      - id: metadata/binary/framework/
      - id: metadata/lang/compiler/systems/
      - id: metadata/signed/platform::apple
      - id: well-known/lib/jvm
      - id: well-known/app/macos-benign/
      - id: metadata/package/quality/false-positives::benign-native-library-context
      - type: path
        regex: '(?i)(^|[\\/])(libarc-[^\\/]+\.a|libtree-sitter(-[^\\/]+)?\.dylib)$'

  - id: high-entropy-data-macos
    desc: High entropy in __DATA section
    crit: suspicious
    conf: 0.85
    for:
      - macho
    entropy_min: 6.5
    if:
      type: section
      exact: __DATA.__data
composite_rules:
  - id: sparse-macos-system-loader
    desc: Sparse Mach-O invokes a system command
    crit: suspicious
    conf: 0.97
    for: [macho]
    all:
      - id: metadata/binary/section/metrics::tiny-cstring-section
      - id: micro-behaviors/process/create/shell/spawn::system-fn
  - id: obfuscated-payload-storage
    desc: Obfuscated payload in data section
    crit: suspicious
    conf: 0.9
    for:
      - macho
    all:
      - id: extreme-string-sparsity-macos
      - id: metadata/binary/metrics/structural::large-data-section-ratio
  - id: string-obfuscated-malware
    desc: String-obfuscated malware with shell
    crit: suspicious
    conf: 0.95
    for:
      - macho
    all:
      - id: extreme-string-sparsity-macos
      - id: high-entropy-data-macos
      - id: micro-behaviors/process/create/shell/
  - id: stripped-static-elf-obfuscation
    desc: Stripped static ELF string concealment
    crit: suspicious
    conf: 0.9
    for:
      - elf
    all:
      - id: objectives/anti-static/obfuscation/imports::very-low-strings
      - id: metadata/binary/layout::binary-format-checked
      - id: metadata/binary/linking/static::static-linked-heuristic
    any:
      - id: metadata/arch/iot::exotic-arch
      - id: metadata/binary/metrics/structural::high-code-to-data-ratio
