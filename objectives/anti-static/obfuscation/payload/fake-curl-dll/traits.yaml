# Core curl exports are neutral library identity. A small DLL that exports
# them while also carrying TLS/loader and concealed-payload indicators is a
# proxy/loader shape, not ordinary libcurl use.
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1027,T1620

composite_rules:
  - id: concealed-curl-export-loader
    desc: Concealed payload behind curl-compatible exports
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/symbols/curl-exports::curl-api-export-set
      - id: metadata/file/metrics::peak-region-cipher-entropy
      - id: metadata/file/metrics::concealed-payload-mass-8k
    any:
      - id: micro-behaviors/data/encode/payload::large-hex-payload
    unless:
      - id: well-known/lib/benign-runtime-bundles::curl-runtime-library
      - id: well-known/lib/benign-runtime-bundles::curl-windows-runtime-library
      - id: metadata/binary/layout::cert-table-present
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/

  - id: self-issued-curl-junk-loader
    desc: Self-issued curl-export DLL with massive junk padding
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/symbols/curl-exports::curl-api-export-set
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::massive-string-count
      - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
      - id: metadata/signed/unknown/
    unless:
      - id: well-known/lib/benign-runtime-bundles::curl-runtime-library
      - id: well-known/lib/benign-runtime-bundles::curl-windows-runtime-library
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/


  - id: tls-thread-curl-proxy-loader
    desc: TLS-threaded curl proxy loader
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/symbols/curl-exports::curl-api-export-set
      - id: metadata/binary/layout::pe-multiple-tls-callbacks
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/thread/create::create-thread
    unless:
      - id: well-known/lib/benign-runtime-bundles::curl-runtime-library
      - id: well-known/lib/benign-runtime-bundles::curl-windows-runtime-library
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
