defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  mbc: B0032
  attack: T1027.003
traits:
  - id: font-file-extension
    desc: Font file extension
    crit: component
    conf: 1.0
    if:
      type: basename
      regex: \.(woff2?|ttf|otf|eot)$
  - id: js-function-in-noncode
    desc: JavaScript function keyword in non-code file
    crit: component
    conf: 0.9
    if:
      type: string_value
      regex: \bfunction\s+(_?0x[a-fA-F0-9]{2,}|[A-Za-z_$][A-Za-z0-9_$]{0,31})\s*\(
    unless:
      - type: basename
        regex: \.(?:[cm]?js|jsx|tsx?|mjs)$
    not:
      - substr: function OnConnection(
      - substr: function id (
      - substr: Script generated by Fiddler2 export.
      - substr: function ToggleTableContent(
      - substr: function getElementPosition(
      - substr: function ToggleOverlayContentDisplay(
      - substr: function ProcessTableWithLargeCellContent(
      - substr: MathJax.loader&&MathJax.loader.checkVersion(
  - id: js-require-in-noncode
    desc: Node.js require call in non-code file
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: require(
    unless:
      - type: basename
        regex: \.(?:[cm]?[jt]s|jsx|tsx|mjs)$
      - type: string_value
        substr: MathJax.loader&&MathJax.loader.checkVersion(
  - id: js-hex-vars-in-noncode
    desc: Hex-prefixed JS variables in non-code file
    crit: component
    conf: 0.9
    if:
      type: string_value
      substr: _0x
  - id: js-file-extension
    desc: JavaScript/TypeScript file extension
    crit: component
    if:
      type: basename
      regex: '\.(?:[cm]?js|jsx|tsx?|mjs)$'
  - id: source-map-extension
    desc: Source map file extension
    crit: component
    if:
      type: basename
      regex: '\.map$'
  - id: sources-content-json
    desc: Source map sourcesContent array
    crit: component
    if:
      type: raw
      substr: '"sourcesContent":['
  - id: mathjax-webpack-bundle
    desc: Embedded MathJax webpack bundle
    crit: component
    conf: 0.95
    if:
      type: raw
      substr: MathJax.loader&&MathJax.loader.checkVersion(
composite_rules:
  - id: font-steganography-js
    desc: Font file with embedded JavaScript code
    crit: hostile
    conf: 0.98
    near_lines: 10
    all:
      - id: font-file-extension
    any:
      - id: js-function-in-noncode
      - id: js-require-in-noncode
      - id: js-hex-vars-in-noncode
      - id: micro-behaviors/data/source/syntax/keyword::js-keyword-fromcharcode
    needs: 2
  - id: hidden-js-payload
    desc: Non-code file with JavaScript code patterns
    crit: suspicious
    conf: 0.9
    unless:
      - id: js-file-extension
      - id: source-map-extension
      - id: sources-content-json
      - id: mathjax-webpack-bundle
    any:
      - id: js-function-in-noncode
      - id: js-require-in-noncode
      - id: js-hex-vars-in-noncode
      - id: micro-behaviors/data/source/syntax/keyword::js-keyword-fromcharcode
    needs: 3
    downgrade:
      any:
        - id: metadata/binary/metrics::massive-executable
