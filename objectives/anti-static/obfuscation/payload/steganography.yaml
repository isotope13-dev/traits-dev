# Steganographic Payload Detection
# Detects code hidden inside non-code files (fonts, images, data files)
# ATT&CK: T1027.003 (Steganography), T1027 (Obfuscated Files)
# MBC: B0032 (Obfuscated Files or Information)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
  mbc: "B0032"
  attack: "T1027.003"
traits:
  # Font file extensions used as steganographic containers
  - id: font-file-extension
    desc: Font file extension
    crit: component
    conf: 1.0
    if:
      type: basename
      regex: '\.(woff2?|ttf|otf|eot)$'
  # JavaScript syntax found in decoded strings of non-JS files
  - id: js-function-in-noncode
    desc: JavaScript function keyword in non-code file
    crit: component
    conf: 0.9
    if:
      type: string
      regex: '\bfunction\s+(_?0x[a-fA-F0-9]{2,}|[A-Za-z_$][A-Za-z0-9_$]{0,31})\s*\('
  - id: js-require-in-noncode
    desc: Node.js require call in non-code file
    crit: component
    conf: 0.9
    if:
      type: string
      substr: "require("
  - id: js-hex-vars-in-noncode
    desc: Hex-prefixed JS variables in non-code file
    crit: component
    conf: 0.9
    if:
      type: string
      substr: "_0x"
composite_rules:
  # Font file containing obfuscated JavaScript
  - id: font-steganography-js
    desc: Font file with embedded JavaScript code
    crit: hostile
    conf: 0.98
    all:
      - id: font-file-extension
    any:
      - id: js-function-in-noncode
      - id: js-require-in-noncode
      - id: js-hex-vars-in-noncode
      - id: micro-behaviors/data/source/syntax/keyword::js-keyword-fromcharcode
    needs: 2
  # Non-code file with strong JavaScript indicators (no font requirement)
  - id: hidden-js-payload
    desc: Non-code file with JavaScript code patterns
    crit: suspicious
    conf: 0.90
    any:
      - id: js-function-in-noncode
      - id: js-require-in-noncode
      - id: js-hex-vars-in-noncode
      - id: micro-behaviors/data/source/syntax/keyword::js-keyword-fromcharcode
    needs: 3
