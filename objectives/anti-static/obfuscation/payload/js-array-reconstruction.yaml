# JS Array Reconstruction Obfuscation
# Detects reconstruction of payload from hex char array using index array and eval
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  - id: js-hex-array-eval
    desc: Reconstructs and executes code from hex-encoded character array
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/encode/hex::js-hex-char-array
      - id: micro-behaviors/data/encode/arrays::js-large-int-array
      - id: objectives/execution/interpreter/eval/dynamic::eval-symbol
    any:
      - id: micro-behaviors/data/control-flow/analysis::for-loop-ast
      - id: micro-behaviors/data/control-flow/analysis::for-loop-content
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::copyright
      - id: metadata/library/prototype::header-x
  - id: js-trig-token-grid-eval
    desc: Reconstructs and evals code from trig token grid
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/supply-chain/hidden-payload/staging::eval-function-call-arg
      - id: objectives/anti-static/obfuscation/syntax::js-trig-grid-charcode-decoder
    any:
      - id: micro-behaviors/data/control-flow/loop::infinite-loop-header
      - id: objectives/anti-static/obfuscation/syntax::js-obfuscated-increment
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::copyright
      - id: metadata/library/prototype::header-x
