defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: hermit-crab-dropper
    desc: "Tiny loader with massive encrypted payload (Hermit Crab pattern)"
    crit: hostile
    conf: 0.95
    all:
      # Code/Data Ratio: Data section is massive compared to text
      - id: objectives/anti-static/obfuscation/payload/section::data-section-dominant
      # Entropy: The massive section is encrypted
      - id: metadata/binary/section/names::high-entropy-rdata
      # Capability: The intent to execute that data
      - id: micro-behaviors/mem/protect/modify::virtual-protect
