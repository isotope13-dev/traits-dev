# Import table minimization patterns - indicators of string/import obfuscation.
# Malware often uses minimal imports + dynamic loading to evade static analysis.
# Per-API atomics live in their canonical micro-behaviors/ homes (dylib/load,
# mem/protect, crypto/library, process/create/exec, fs/file/open, etc.).
defaults:
  platforms: [linux, macos, windows]
  mbc: "B0032"
  attack: "T1027"
composite_rules:
  # === Helpers ===
  - id: pe-dynamic-resolution
    desc: PE dynamic API resolution primitive
    crit: component
    for: [pe]
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address

  - id: pe-exec-primitive
    desc: PE process-execution primitive
    crit: component
    for: [pe]
    any:
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/process/create/exec::winexec
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/spawn::create-process-w

  - id: pe-memory-allocation-primitive
    desc: PE memory allocation primitive
    crit: component
    for: [pe]
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/mem/alloc/heap::heap-alloc
      - id: micro-behaviors/mem/alloc/heap::heap-free

  - id: elf-dynamic-resolution
    desc: ELF dynamic API resolution primitive
    crit: component
    for: [elf]
    any:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: objectives/anti-static/obfuscation/reflection/class::dlopen

  # === Windows PE Import Patterns ===
  - id: minimal-pe-dynamic-load
    desc: Minimal PE imports with dynamic loading
    crit: notable
    conf: 0.75
    for: [pe]
    all:
      - id: pe-dynamic-resolution
    unless:
      - id: metadata/binary/metrics::many-imports-30
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/symbols::total-commander-packer-plugin
      - id: metadata/binary/layout::svk-packed-section
    downgrade:
      any:
        - id: micro-behaviors/data/encode/pecompact::pecompact-signature
        - id: objectives/anti-static/pack/detect::enigma-protector

  - id: crypto-minimal-pe
    desc: Crypto API with minimal imports
    crit: suspicious
    conf: 0.8
    for: [pe]
    all:
      - id: micro-behaviors/crypto/library::capi-key-material-setup
    any:
      - id: pe-dynamic-resolution
      - id: pe-exec-primitive
    unless:
      - id: metadata/binary/metrics::many-imports-30
      - id: metadata/package::quickbms-utility-context
      - id: metadata/binary/section/names::upx-section
  - id: shell-exec-minimal-imports
    desc: Execution capability with minimal imports
    crit: notable
    conf: 0.85
    for: [pe]
    all:
      - id: pe-exec-primitive
    any:
      - id: pe-dynamic-resolution
      - id: pe-memory-allocation-primitive
    unless:
      - id: metadata/binary/metrics::many-imports-40
      - id: metadata/binary/symbols::total-commander-packer-plugin
      - id: metadata/binary/layout::svk-packed-section
      - id: micro-behaviors/data/encode/pecompact::pecompact-marker
    downgrade:
      any:
        - id: metadata/binary/section/names::upx-section
        - id: micro-behaviors/data/encode/pecompact::pecompact-signature
        - id: metadata/lang/compiler/managed::svkp-delphi-layout
  - id: extreme-minimal-imports
    desc: Extremely minimal import table
    crit: notable
    conf: 0.8
    for: [pe, elf]
    size_min: 32768
    any:
      - id: pe-dynamic-resolution
      - id: pe-memory-allocation-primitive
      - id: pe-exec-primitive
      - id: micro-behaviors/crypto/library::capi-key-material-setup
      - id: elf-dynamic-resolution
      - id: micro-behaviors/process/create/shell::system-fn
    unless:
      - id: metadata/binary/metrics::many-imports-20
      - id: metadata/package/versioning::version-resource-metadata
      - id: metadata/binary/layout::svk-packed-section
    downgrade:
      any:
        - id: metadata/binary/section/names::upx-section
        - id: micro-behaviors/data/encode/pecompact::pecompact-signature
        - id: objectives/anti-static/pack/detect::enigma-protector

  - id: suspicious-ratio-imports
    desc: High ratio of suspicious to total imports
    crit: suspicious
    conf: 0.85
    for: [pe]
    any:
      - id: pe-dynamic-resolution
      - id: pe-memory-allocation-primitive
      - id: pe-exec-primitive
      - id: micro-behaviors/crypto/library::capi-key-material-setup
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/delete::deletefile-a
      - id: micro-behaviors/process/inject/dll::create-remote-thread
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: micro-behaviors/os/registry/access::reg-create-key-ex-w
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-w
      - id: micro-behaviors/communications/socket/init::wsa-startup
      - id: micro-behaviors/communications/socket/init::socket-api
      - id: micro-behaviors/communications/socket/init::connect-api
    needs: 7
    unless:
      - id: metadata/binary/metrics::many-imports-25
    downgrade:
      any:
        - id: metadata/binary/section/names::upx-section

  - id: getprocaddress-large-pe-few-imports
    desc: Large PE with sparse imports
    crit: notable
    conf: 0.85
    for: [pe]
    size_min: 4194304
    all:
      - id: micro-behaviors/dylib/lookup::get-proc-address
    unless:
      - id: metadata/binary/metrics::many-imports-100
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/signed/platform::microsoft
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle

  # === ELF Import Patterns ===
  - id: minimal-elf-dynamic-load
    desc: Minimal ELF imports with dynamic loading
    crit: notable
    conf: 0.75
    for: [elf]
    all:
      - id: elf-dynamic-resolution
    unless:
      - id: metadata/binary/metrics::many-imports-30

  - id: crypto-minimal-elf
    desc: Crypto library with minimal imports
    crit: suspicious
    conf: 0.8
    for: [elf]
    any:
      - id: elf-dynamic-resolution
      - id: micro-behaviors/process/create/shell::system-fn
    needs: 2
    unless:
      - id: metadata/binary/metrics::many-imports-30

  # === Mach-O Import Patterns ===
  - id: macho-max-35-imports
    desc: Mach-O with 35 or fewer imports
    crit: notable
    conf: 0.5
    for: [macho]
    size_min: 524288
    all:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
    unless:
      - id: metadata/binary/metrics::many-imports-40

  - id: macho-stealth-resolution
    desc: Mach-O stealth resolution
    crit: notable
    conf: 0.8
    for: [macho]
    any:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: micro-behaviors/os/syscall/invoke::macos-arm64-direct-syscall

  - id: macho-concealed-capability
    desc: Mach-O concealing capabilities
    crit: suspicious
    conf: 0.85
    for: [macho]
    all:
      - id: macho-max-35-imports
      - id: macho-stealth-resolution
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::math-cipher-imports
      - id: micro-behaviors/process/create/shell::system-fn

  # === PE Ransomware/Dropper Patterns ===
  - id: pe-dropper-minimal-imports
    desc: PE dropper with minimal imports
    crit: hostile
    conf: 0.9
    for: [pe]
    all:
      - id: minimal-pe-dynamic-load
    needs: 2
    any:
      - id: crypto-minimal-pe
      - id: shell-exec-minimal-imports
      - id: extreme-minimal-imports
    unless:
      - id: metadata/binary/section/names::upx-section
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature
      - id: metadata/lang/compiler/managed::svkp-delphi-layout
      - id: metadata/binary/layout::svk-packed-section
      - id: objectives/anti-static/pack/detect::enigma-protector
      - id: metadata/binary/symbols::total-commander-packer-plugin

  - id: pe-concealed-capability
    desc: PE concealing capabilities
    crit: suspicious
    conf: 0.85
    for: [pe]
    needs: 2
    any:
      - id: crypto-minimal-pe
      - id: shell-exec-minimal-imports
      - id: suspicious-ratio-imports
      - id: extreme-minimal-imports
    unless:
      - id: metadata/binary/symbols::total-commander-packer-plugin
      - id: metadata/binary/layout::svk-packed-section
      - id: micro-behaviors/data/encode/pecompact::pecompact-marker
    downgrade:
      any:
        - id: metadata/binary/section/names::upx-section
        - id: micro-behaviors/data/encode/pecompact::pecompact-signature
        - id: metadata/lang/compiler/managed::svkp-delphi-layout
        - id: objectives/anti-static/pack/detect::enigma-protector
  - id: elf-concealed-capability
    desc: ELF concealing capabilities
    crit: suspicious
    conf: 0.85
    for: [elf]
    all:
      - id: minimal-elf-dynamic-load
    any:
      - id: crypto-minimal-elf
      - id: extreme-minimal-imports
