# Import table minimization patterns - indicators of string/import obfuscation
# Malware often uses minimal imports + dynamic loading to evade static analysis
defaults:
  platforms: [linux, macos, windows]
  mbc: "B0032"
  attack: "T1027"
traits:
  # === Windows PE Import Patterns ===
  - id: minimal-pe-dynamic-load
    desc: "Minimal PE imports with dynamic loading"
    crit: notable
    conf: 0.75
    for: [pe]
    if:
      type: import_combination
      required:
        - "^(LoadLibrary|GetProcAddress)"
      max_total: 25
    unless:
      - type: section
        regex: "^(UPX\\d|\\.upx)"
      - type: raw
        regex: "(ELECTRON_ENABLE_LOGGING|NSIS_Error)"
      - id: metadata/binary/installer/script::nsis
    downgrade:
      any:
        - type: raw
          regex: "(PECompac|Enigma Protector)"
        - id: metadata/lang/compiler/managed::svkp-delphi-layout
        - id: objectives/anti-static/pack/detect::aspack-marker
        - id: metadata/lang/compiler/native::watcom-runtime
  - id: crypto-minimal-pe
    desc: "Crypto API with minimal imports"
    crit: suspicious
    conf: 0.8
    for: [pe]
    if:
      type: import_combination
      required:
        - "^Crypt"
      suspicious:
        - "^LoadLibrary"
        - "^GetProcAddress"
        - "^ShellExecute"
        - "^WinExec"
      min_suspicious: 2
      max_total: 20
  - id: shell-exec-minimal-imports
    desc: "Execution capability with minimal imports"
    crit: notable
    conf: 0.85
    for: [pe]
    if:
      type: import_combination
      required:
        - "^(ShellExecute(Ex)?(A|W)?|WinExec|CreateProcess(A|W)?)$"
      suspicious:
        - "^LoadLibrary"
        - "^GetProcAddress"
        - "^Virtual(Alloc|Protect)"
      min_suspicious: 2
      max_total: 20
    downgrade:
      any:
        - type: section
          regex: "^(UPX\\d|\\.upx)" # UPX stub always has dynamic loading + minimal imports
        - type: text
          substr: "PECompac" # PECompact stub uses minimal imports
        - type: trait
          id: metadata/lang/compiler/managed::svkp-delphi-layout
        - type: text
          substr: "Enigma Protector"
        - type: text
          substr: "enigmaprotector.com"
  - id: extreme-minimal-imports
    desc: "Extremely minimal import table"
    crit: notable
    conf: 0.8
    for: [pe, elf]
    size_min: 32768 # Small utilities (<32KB) legitimately have few imports
    if:
      type: import_combination
      suspicious:
        - "^(LoadLibrary|GetProcAddress|dlopen|dlsym)"
        - "^(Virtual|Heap)(Alloc|Free)"
        - "^(Crypt|SSL|crypto)"
        - "^(ShellExecute|WinExec|CreateProcess|system|exec)"
      min_suspicious: 2
      max_total: 15
    downgrade:
      any:
        - type: section
          regex: "^(UPX\\d|\\.upx)" # UPX stub uses minimal imports by design
        - type: raw
          regex: "(PECompac|Enigma Protector)"
        - type: trait
          id: metadata/lang/compiler/managed::svkp-delphi-layout
        - id: metadata/lang/compiler/native::watcom-runtime
        - id: objectives/anti-static/pack/detect::aspack-marker
  - id: suspicious-ratio-imports
    desc: "High ratio of suspicious to total imports"
    crit: suspicious
    conf: 0.85
    for: [pe]
    if:
      type: import_combination
      suspicious:
        # Dynamic loading
        - "^(LoadLibrary|GetProcAddress)"
        # Memory manipulation
        - "^Virtual(Alloc|Free|Protect)"
        - "^Heap(Alloc|Free|Create)"
        # Crypto operations
        - "^Crypt(Acquire|Create|Destroy|Encrypt|Decrypt|Gen|Import)"
        # File operations
        - "^(Create|Open|Write|Delete)File"
        - "^FindFirst|FindNext"
        # Process/Thread
        - "^Create(Thread|Process|RemoteThread)"
        - "^(Open|Terminate)Process"
        # Execution
        - "^(ShellExecute|WinExec)"
        # Registry
        - "^Reg(Open|Create|Set|Delete|Query)Key"
        # Network
        - "^(WSA|socket|connect|send|recv)"
      min_suspicious: 7
      max_total: 20
    downgrade:
      any:
        - type: section
          regex: "^(UPX\\d|\\.upx)" # UPX imports are always "suspicious" by nature
  - id: getprocaddress-large-pe-few-imports
    desc: "Large PE with GetProcAddress and sparse imports"
    crit: notable
    conf: 0.85
    for: [pe]
    size_min: 4194304
    if:
      type: import_combination
      required:
        - "^GetProcAddress"
      max_total: 100
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/signed/platform::microsoft
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
    downgrade:
      any:
        - type: section
          regex: "^(UPX\\d|\\.upx)"
        - type: raw
          regex: "(PECompac|Enigma Protector)"
        - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
  # === ELF Import Patterns ===
  - id: minimal-elf-dynamic-load
    desc: "Minimal ELF imports with dynamic loading"
    crit: notable
    conf: 0.75
    for: [elf]
    if:
      type: import_combination
      required:
        - "^(dlopen|dlsym)"
      max_total: 25
    downgrade:
      all:
        - type: exports_count
          min: 8
        - type: symbol
          exact: "dlopen"
        - type: symbol
          exact: "dlsym"
        - type: symbol
          exact: "dlclose"
        - type: symbol
          exact: "dlerror"
  - id: crypto-minimal-elf
    desc: "Crypto library with minimal imports"
    crit: suspicious
    conf: 0.8
    for: [elf]
    if:
      type: import_combination
      suspicious:
        - "^(SSL|crypto|AES|RSA)"
        - "^dlopen"
        - "^dlsym"
        - "^system$"
        - "^exec"
      min_suspicious: 3
      max_total: 20
  # === Mach-O Import Patterns ===
  - id: macho-max-35-imports
    desc: "Mach-O with 35 or fewer imports"
    crit: notable
    conf: 0.5
    for: [macho]
    size_min: 524288 # 512KB - small utilities legitimately have few imports
    if:
      type: import_combination
      max_total: 35
    unless:
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - type: basename
        regex: \.(map|deb|gz)$
      - type: metrics
        field: binary.import_count
        max: 0
composite_rules:
  # === Mach-O Stealth Resolution ===
  - id: macho-stealth-resolution
    desc: "Mach-O stealth resolution (dlsym or direct syscalls)"
    crit: notable
    conf: 0.8
    for: [macho]
    any:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: micro-behaviors/os/syscall/invoke::macos-arm64-direct-syscall
  # === Mach-O Dropper/Ransomware Patterns ===
  - id: macho-concealed-capability
    desc: "Mach-O binary concealing capabilities via import minimization"
    crit: suspicious
    conf: 0.85
    for: [macho]
    all:
      - id: macho-max-35-imports
      - id: macho-stealth-resolution
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::math-cipher-imports
      - id: micro-behaviors/process/create/shell::system-fn
  # === PE Ransomware/Dropper Patterns ===
  - id: pe-dropper-minimal-imports
    desc: "PE dropper with minimal imports and dynamic loading"
    crit: hostile
    conf: 0.9
    for: [pe]
    all:
      - id: minimal-pe-dynamic-load
    needs: 2
    any:
      - id: crypto-minimal-pe
      - id: shell-exec-minimal-imports
      - id: extreme-minimal-imports
    unless:
      - type: trait
        id: objectives/anti-static/pack/detect::upx-section # UPX stub inherently uses minimal imports
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature
      - type: trait
        id: metadata/lang/compiler/managed::svkp-delphi-layout
      - id: objectives/anti-static/pack/detect::enigma-protector
  - id: pe-concealed-capability
    desc: "PE binary concealing capabilities via import minimization"
    crit: suspicious
    conf: 0.85
    for: [pe]
    needs: 2
    any:
      - id: crypto-minimal-pe
      - id: shell-exec-minimal-imports
      - id: suspicious-ratio-imports
      - id: extreme-minimal-imports
    downgrade:
      any:
        - id: objectives/anti-static/pack/detect::upx-section
        - id: micro-behaviors/data/encode/pecompact::pecompact-signature # PECompact stub has minimal imports
        - type: trait
          id: metadata/lang/compiler/managed::svkp-delphi-layout
        - type: raw
          regex: "(Enigma Protector|enigmaprotector\\.com)" # Enigma Protector uses the same import minimization pattern
  - id: elf-concealed-capability
    desc: "ELF binary concealing capabilities via import minimization"
    crit: suspicious
    conf: 0.85
    for: [elf]
    all:
      - id: minimal-elf-dynamic-load
    any:
      - id: crypto-minimal-elf
      - id: extreme-minimal-imports
