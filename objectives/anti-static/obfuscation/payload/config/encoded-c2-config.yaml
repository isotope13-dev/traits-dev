# Encoded C2-config patterns: file-scope constants whose names label them
# as URL/API/AUTH/KEY material and whose values are encoded byte arrays
# or hex blobs. The combination of "named-like-config" + "encoded
# representation" + "decode operation" has no legitimate use — legit
# code stores URLs and keys as string literals.
defaults:
  platforms: [windows, unix]
  for: [scripts, source]
  attack: T1027
  mbc: B0032

traits:
  # Variables named like API endpoint fragments storing byte arrays or
  # int lists. Pattern: `_API_<X> = bytes([0xNN, ...])` (Python) /
  # `const _API_X = [0xNN, ...]` (JS) / `let _API_X = Uint8Array.of(...)`.
- id: api-named-byte-array-const--rx-1
  desc: Uint8Array constructor/of/from invocation
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    # Match actual Uint8Array invocation rather than just the identifier
    # (which appears in type-check helpers like `isUint8Array(value)` and
    # in every typed-array shim/documentation that mentions the class).
    regex: '\b(new\s+Uint8Array\s*\(\s*\[|Uint8Array\.(of|from)\s*\(\s*(0x|\d))'
  count_max: 1027530
- id: api-named-byte-array-const--rx-2
  desc: ENDPOINT identifier (config name)
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: ENDPOINT
  count_max: 1027531
- id: api-named-byte-array-const--rx-3
  desc: DOMAIN identifier (config name)
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: DOMAIN
  count_max: 1027532
- id: api-named-byte-array-const--rx-4
  desc: SCHEMA identifier (config name)
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: SCHEMA
  count_max: 1027533
- id: api-named-byte-array-const--rx-5
  desc: TARGET identifier (config name)
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: TARGET
  count_max: 1027534
- id: api-named-byte-array-const--rx-6
  desc: bytes() literal (Python byte array)
  crit: component
  conf: 0.92
  # Restrict to Python — the substring "bytes" is far too common in
  # JavaScript/TypeScript/PHP/Ruby (Buffer.byteLength, response.bytes,
  # variable names) to be a meaningful encoded-config fragment there.
  for: [python]
  if:
    type: text
    regex: '\bbytes\s*\(\s*\['
  count_max: 1027535
- id: api-named-byte-array-const--rx-7
  desc: TOKEN := assignment (config-style)
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    regex: "\\bTOKEN\\s*[:=]"
  count_max: 1027536
- id: api-named-byte-array-const--rx-8
  desc: AUTH config-style assignment label
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    id: micro-behaviors/data/text/keywords/credential::auth-upper
  count_max: 1027537
- id: url-component-concat--rx-9
  desc: ENDPOINT URL component identifier
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: ENDPOINT
  count_max: 1027538
- id: url-component-concat--rx-10
  desc: DOMAIN URL component identifier
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: DOMAIN
  count_max: 1027539
- id: url-component-concat--rx-11
  desc: SCHEMA URL component identifier
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: SCHEMA
  count_max: 1027540
- id: url-component-concat--rx-12
  desc: HOST URL component identifier
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    regex: '\bHOST\s*[:=]'
  count_max: 1027541
- id: url-component-concat--rx-13
  desc: PATH := assignment (URL piece)
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    regex: "\\bPATH\\s*[:=]"
  count_max: 1027542
- id: arch-keyed-hex-blob-dict--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: PLATFORM
  count_max: 1027543
- id: arch-keyed-hex-blob-dict--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: android
  count_max: 1027544
- id: arch-keyed-hex-blob-dict--rx-17
  desc: TARGET config key marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: TARGET
  count_max: 1027546
- id: arch-keyed-hex-blob-dict--rx-18
  desc: amd64 architecture config key marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: amd64
  count_max: 1027547
- id: arch-keyed-hex-blob-dict--rx-19
  desc: arm64 architecture config key marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: arm64
  count_max: 1027548
- id: arch-keyed-hex-blob-dict--rx-20
  desc: linux platform config key marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: linux
  count_max: 1027549
- id: arch-keyed-hex-blob-dict--rx-21
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: macos
  count_max: 1027550
- id: arch-keyed-hex-blob-dict--encoded-value
  desc: Architecture keyed hex byte-array value
  crit: component
  conf: 0.94
  count_min: 2
  if:
    type: text
    regex: '\[(\s*0x[0-9A-Fa-f]{2}\s*,){8,}'
- id: cred-named-hex-string-const--rx-22
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 2
  if:
    id: micro-behaviors/data/text/keywords/credential::secret-upper
  count_max: 1027551
- id: cred-named-hex-string-const--rx-23
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 2
  if:
    id: micro-behaviors/data/text/keywords/credential::token-upper
  count_max: 1027552
- id: cred-named-hex-string-const--rx-24
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 2
  if:
    id: micro-behaviors/data/text/keywords/credential::cred-upper
  count_max: 1027553
composite_rules:
  # Aggregator: any encoded-C2-config marker. Listed explicitly because
  # the payload/ parent directory holds many unrelated traits.
- id: encoded-c2-config-marker
  desc: Encoded C2-config marker present
  crit: suspicious
  conf: 0.92
  any:
  - id: api-named-byte-array-const
  - id: url-component-concat
  - id: arch-keyed-hex-blob-dict
  - id: cred-named-hex-string-const

  # Hostile: encoded-C2-config marker + an actual decode operation in the
  # same file. The label says "this is an API endpoint" and the file
  # decodes it — there's no legitimate intent.
- id: encoded-c2-config-with-decode
  desc: Encoded C2-config plus decode operation
  crit: notable
  conf: 0.97
  size_max: 50000
  all:
  - id: encoded-c2-config-marker
  any:
  - id: micro-behaviors/data/encode/xor
  - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
  - id: objectives/anti-static/obfuscation/string/encoding::bytes-fromhex-call
  - id: objectives/anti-static/obfuscation/encoding/arithmetic
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::python-test-file
    - id: metadata/package/testing/presence/harness::test-directory
    - id: well-known/app/piglit
  unless:
  - id: metadata/binary/framework::dotnet-assembly
  - id: micro-behaviors/data/text/keywords/library::urllib3-name
- id: api-byte-array-literal
  desc: Byte-array literal constructor present
  crit: component
  conf: 0.92
  for: [python, javascript, typescript]
  any:
  - id: api-named-byte-array-const--rx-1
  - id: api-named-byte-array-const--rx-6
- id: api-named-byte-array-const
  desc: API-named encoded config constants
  crit: suspicious
  conf: 0.92
  for: [python, javascript, typescript]
  all:
  - id: api-byte-array-literal
  any:
  - id: api-named-byte-array-const--rx-2
  - id: api-named-byte-array-const--rx-3
  - id: api-named-byte-array-const--rx-4
  - id: api-named-byte-array-const--rx-5
  - id: api-named-byte-array-const--rx-7
  - id: api-named-byte-array-const--rx-8
  near_bytes: 4096
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/harness/runtime::is-test
  - id: well-known/lib/json-ts::converter-bundle
  - id: well-known/lib/jruby::jruby-home-path
  - id: metadata/library/structure::js-vite-rollup-vendor-chunk
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: metadata/library/runtime::acquire-vscode-api
- id: url-component-concat
  desc: URL reconstructed from named component constants
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  all:
  - id: url-component-concat--rx-11
  any:
  - id: url-component-concat--rx-9
  - id: url-component-concat--rx-10
  - id: url-component-concat--rx-12
  - id: url-component-concat--rx-13
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/lang/source::python-protobuf-generated
  - id: metadata/lang/source::python-protobuf-stub
  - id: metadata/lang/source::python-mypy-protobuf-generated
  - id: objectives/discovery/system/fingerprint/info::rendered-phpinfo-dump
- id: arch-keyed-hex-blob-dict
  desc: Architecture-keyed hex-blob dictionary
  crit: notable
  conf: 0.94
  for: [python, javascript, typescript, ruby, go, rust, shell]
  needs: 3
  all:
  - id: arch-keyed-hex-blob-dict--encoded-value
  any:
  - id: arch-keyed-hex-blob-dict--rx-14
  - id: arch-keyed-hex-blob-dict--rx-15
  - id: arch-keyed-hex-blob-dict--rx-17
  - id: arch-keyed-hex-blob-dict--rx-18
  - id: arch-keyed-hex-blob-dict--rx-19
  - id: arch-keyed-hex-blob-dict--rx-20
  - id: arch-keyed-hex-blob-dict--rx-21
- id: cred-named-hex-string-const
  desc: Credential-named hex string constant
  crit: suspicious
  conf: 0.88
  for: [python, javascript, typescript, ruby, php, go, rust]
  needs: 2
  any:
  - id: cred-named-hex-string-const--rx-22
  - id: cred-named-hex-string-const--rx-23
  - id: cred-named-hex-string-const--rx-24
