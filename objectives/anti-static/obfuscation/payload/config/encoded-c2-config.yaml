# Encoded C2-config patterns: file-scope constants whose names label them
# as URL/API/AUTH/KEY material and whose values are encoded byte arrays
# or hex blobs. The combination of "named-like-config" + "encoded
# representation" + "decode operation" has no legitimate use — legit
# code stores URLs and keys as string literals.
defaults:
  platforms: [windows, unix]
  for: [python, javascript, ruby, php, go, rust]
  attack: T1027
  mbc: B0032

traits:
  # Variables named like API endpoint fragments storing byte arrays or
  # int lists. Pattern: `_API_<X> = bytes([0xNN, ...])` (Python) /
  # `const _API_X = [0xNN, ...]` (JS) / `let _API_X = Uint8Array.of(...)`.
- id: api-named-byte-array-const--rx-1
  desc: Encoded-config byte-array constructor
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    # Match actual Uint8Array invocation rather than just the identifier
    # (which appears in type-check helpers like `isUint8Array(value)` and
    # in every typed-array shim/documentation that mentions the class).
    regex: '\b(new\s+Uint8Array\s*\(\s*\[|Uint8Array\.(of|from)\s*\(\s*(0x|\d))'
  count_max: 1027530
- id: api-named-byte-array-const--rx-2
  desc: ENDPOINT identifier (config name)
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    regex: '\bENDPOINT(_[A-Z0-9_]+)?\s*[:=]'
  count_max: 1027531
- id: api-named-byte-array-const--rx-3
  desc: DOMAIN identifier with encoded value
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    regex: '\bDOMAIN(_[A-Z0-9_]+)?\s*[:=]\s*(\[|Uint8Array)'
  count_max: 1027532
- id: api-named-byte-array-const--rx-4
  desc: SCHEMA identifier (config name)
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    regex: '\bSCHEMA(_[A-Z0-9_]+)?\s*[:=]'
  count_max: 1027533
- id: api-named-byte-array-const--rx-5
  desc: TARGET identifier (config name)
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    regex: '\bTARGET(_[A-Z0-9_]+)?\s*[:=]'
  count_max: 1027534
- id: api-named-byte-array-const--rx-6
  desc: bytes() literal (Python byte array)
  crit: component
  conf: 0.92
  # Restrict to Python — the substring "bytes" is far too common in
  # JavaScript/TypeScript/PHP/Ruby (Buffer.byteLength, response.bytes,
  # variable names) to be a meaningful encoded-config fragment there.
  for: [python]
  if:
    type: text
    regex: '\bbytes\s*\(\s*\[\s*(0x[0-9A-Fa-f]{2}|\d{1,3})\s*,'
  count_max: 1027535
- id: api-named-byte-array-const--rx-7
  desc: TOKEN := assignment (config-style)
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    regex: "\\bTOKEN\\s*[:=]"
  count_max: 1027536
- id: api-named-byte-array-const--rx-8
  desc: AUTH config-style assignment label
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    id: objectives/credential-access/theft/keywords::auth-upper
  count_max: 1027537
- id: url-component-concat--rx-12
  desc: HOST URL component identifier
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    regex: '\bHOST\s*[:=]'
  count_max: 1027541
- id: arch-keyed-hex-blob-dict--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: PLATFORM
  count_max: 1027543
- id: arch-keyed-hex-blob-dict--rx-15
  desc: android architecture config key marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  # Restrict to a quoted dict key (`"android":` / `'android' =>`); the bare
  # word appears in countless benign paths, comments and user-agent strings.
  if:
    type: text
    regex: '["'']android["'']\s*(:|=>)'
  count_max: 1027544
- id: arch-keyed-hex-blob-dict--rx-18
  desc: amd64 architecture config key marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: amd64
  count_max: 1027547
- id: arch-keyed-hex-blob-dict--rx-19
  desc: arm64 architecture config key marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    regex: '["'']arm64["'']\s*(:|=>)'
  count_max: 1027548
- id: arch-keyed-hex-blob-dict--rx-20
  desc: linux platform config key marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  # Restrict to a quoted dict key (`"linux":` / `'linux' =>`); the bare word
  # appears in countless benign import paths, comments and OS-check strings.
  if:
    type: text
    regex: '["'']linux["'']\s*(:|=>)'
  count_max: 1027549
- id: arch-keyed-hex-blob-dict--rx-21
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [python, javascript, typescript, ruby, php]
  if:
    type: text
    substr: macos
  count_max: 1027550
- id: arch-keyed-hex-blob-dict--encoded-value
  desc: Architecture keyed hex byte-array value
  crit: component
  conf: 0.94
  count_min: 2
  if:
    type: text
    regex: '\[(\s*0x[0-9A-Fa-f]{2}\s*,){8,}'
- id: cred-named-hex-string-const--rx-22
  desc: SECRET-named encoded constant
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '(?i)\bsecret\w*[:=]\s*("(\\x[0-9a-f]{2}){8,}"|(\[ *0x[0-9a-f]{2} *,){8,})'
  count_max: 1027551
- id: cred-named-hex-string-const--rx-23
  desc: TOKEN-named encoded constant
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '(?i)\btoken\w*[:=]\s*("(\\x[0-9a-f]{2}){8,}"|(\[ *0x[0-9a-f]{2} *,){8,})'
  count_max: 1027552
- id: cred-named-hex-string-const--rx-24
  desc: CRED-named encoded constant
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '(?i)\bcred\w*[:=]\s*("(\\x[0-9a-f]{2}){8,}"|(\[ *0x[0-9a-f]{2} *,){8,})'
  count_max: 1027553
composite_rules:
  # Aggregator: any encoded-C2-config marker. Listed explicitly because
  # the payload/ parent directory holds many unrelated traits.
- id: encoded-c2-config-marker
  desc: Encoded C2-config marker present
  crit: suspicious
  conf: 0.92
  any:
  - id: api-named-byte-array-const
  - id: url-component-concat
  - id: arch-keyed-hex-blob-dict
  - id: cred-named-hex-string-const
  unless:
  - id: well-known/app/samba::samba-source-tree
  - id: well-known/lib/wine::wine-source-tree
  - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
  - id: well-known/app/vscode-marketplace/
  - id: metadata/library/generated::sphinx-searchindex-js
  - id: metadata/library/pywin32/
  - id: well-known/app/kilocode::kilo-code-js-bundle
  - id: metadata/library/structure/
  - id: metadata/build/bundler/

  # Hostile: encoded-C2-config marker + an actual decode operation in the
  # same file. The label says "this is an API endpoint" and the file
  # decodes it — there's no legitimate intent.
- id: encoded-c2-config-with-decode
  desc: Encoded C2-config plus decode operation
  crit: notable
  conf: 0.97
  size_max: 50000
  all:
  - id: encoded-c2-config-marker
  any:
  - id: micro-behaviors/data/encode/xor
  - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
  - id: objectives/anti-static/obfuscation/string/encoding::bytes-fromhex-call
  - id: objectives/anti-static/obfuscation/encoding/arithmetic
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::python-test-file
    - id: metadata/package/testing/presence/harness/
    - id: well-known/app/piglit
  unless:
  - id: metadata/binary/framework/
  - id: well-known/lib/urllib3::urllib3-name
- id: api-byte-array-literal
  desc: Byte-array literal constructor present
  crit: component
  conf: 0.92
  for: [python, javascript, typescript]
  any:
  - id: api-named-byte-array-const--rx-1
  - id: api-named-byte-array-const--rx-6
- id: api-named-byte-array-const
  desc: API-named encoded config constants
  crit: suspicious
  conf: 0.92
  for: [python, javascript, typescript]
  all:
  - id: api-byte-array-literal
  any:
  - id: api-named-byte-array-const--rx-2
  - id: api-named-byte-array-const--rx-3
  - id: api-named-byte-array-const--rx-4
  - id: api-named-byte-array-const--rx-5
  - id: api-named-byte-array-const--rx-7
  - id: api-named-byte-array-const--rx-8
  near_bytes: 4096
  # Recognized libraries and published-bundle structures (vite/rollup vendor
  # chunks, large minified media players like dash.js/hls.js, aws-sdk, cheerio,
  # json-ts, jruby) pack Uint8Array literals and config-style identifiers within
  # the 4KB window by coincidence. Collapsed to directory references so the
  # carve-out reads as one semantic ("benign library/bundle") instead of a pile
  # of per-library leaves.
  unless:
  - id: metadata/file/profile/identity::generated-attack-map-context
  - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/
  - id: well-known/lib/
  - id: metadata/library/
  - id: micro-behaviors/process/interpreter/vm/
- id: url-component-concat
  desc: URL reconstructed from named component constants
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, php]
  all:
  - id: objectives/anti-static/obfuscation/payload/config::api-named-byte-array-const--rx-4
  any:
  - id: objectives/anti-static/obfuscation/payload/config::api-named-byte-array-const--rx-2
  - id: objectives/anti-static/obfuscation/payload/config::api-named-byte-array-const--rx-3
  - id: url-component-concat--rx-12
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/lang/source::python-protobuf-generated
  - id: metadata/lang/source::python-protobuf-stub
  - id: metadata/lang/source::python-mypy-protobuf-generated
  - id: objectives/discovery/system/fingerprint/info::rendered-phpinfo-dump
- id: arch-keyed-hex-blob-dict
  desc: Architecture-keyed hex-blob dictionary
  crit: notable
  conf: 0.94
  for: [python, javascript, typescript, ruby, go, rust, shell]
  needs: 3
  all:
  - id: arch-keyed-hex-blob-dict--encoded-value
  any:
  - id: arch-keyed-hex-blob-dict--rx-14
  - id: arch-keyed-hex-blob-dict--rx-15
  - id: objectives/anti-static/obfuscation/payload/config::api-named-byte-array-const--rx-5
  - id: arch-keyed-hex-blob-dict--rx-18
  - id: arch-keyed-hex-blob-dict--rx-19
  - id: arch-keyed-hex-blob-dict--rx-20
  - id: arch-keyed-hex-blob-dict--rx-21
- id: cred-named-hex-string-const
  desc: Credential-named hex string constant
  crit: suspicious
  conf: 0.88
  for: [python, javascript, typescript, ruby, php, go, rust]
  needs: 2
  any:
  - id: cred-named-hex-string-const--rx-22
  - id: cred-named-hex-string-const--rx-23
  - id: cred-named-hex-string-const--rx-24
  unless:
  - id: well-known/app/browser-extension-known/
  - id: well-known/app/kilocode::kilo-code-js-bundle
  - id: metadata/library/generated::sphinx-searchindex-js
  - id: metadata/library/structure::vscode-large-minified-extension-bundle
  - id: metadata/library/structure::vscode-extension-generated-asset
  - id: well-known/app/azure-dev-cli/
  - id: metadata/library/data::aws-sdk-php-generated-model
  - id: metadata/library/runtime::msal-browser-oauth-runtime
  - id: metadata/library/microsoft-auth::ests-login-runtime
