# Executable code where a scanner expects data — x86 prologues and NOP sleds in
# a data section, a shellcode prologue in data, dense base64 in rodata. Putting
# code in non-code sections hides it from disassembly that only walks .text, so
# this is a static-analysis-evasion shape, not a neutral measurement.
defaults:
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: executable-pattern-in-data
    desc: Repeated x86 prologue byte pattern
    crit: notable
    conf: 0.55
    for:
      - elf
      - pe
    count_min: 24
    per_kb_min: 1.0
    if:
      type: hex
      pattern: 55 89 E5
      section: data
  - id: nop-sled-in-data
    desc: Repeated NOP-run pattern in executable section
    crit: notable
    conf: 0.65
    for:
      - elf
      - pe
    size_max: 1000000
    count_min: 4
    if:
      type: hex
      section: .text
      pattern: 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90
  - id: shellcode-prologue-data
    desc: Common shellcode start in data section
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - pe
    if:
      type: hex
      pattern: 31 C0 50 68
      section: data
  - id: base64-in-rodata
    desc: Base64 data in rodata
    crit: notable
    conf: 0.8
    for: [scripts, binaries]
    count_min: 10
    if:
      type: trait
      id: objectives/anti-static/obfuscation/encoding/base64::dense-base64-encoding
