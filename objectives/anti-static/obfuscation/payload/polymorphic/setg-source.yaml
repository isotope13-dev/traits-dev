defaults:
  platforms: [windows, unix]
  for: [c, perl, text, batch]

traits:
  - id: statistical-executable-trash-generator-doc
    desc: Statistical executable trash generator docs
    crit: suspicious
    conf: 0.97
    size_min: 500
    if:
      type: text
      substr: Statistical Executable Trash Generator

  - id: metamorphic-trash-code-purpose-doc
    desc: Metamorphic trash code generation docs
    crit: suspicious
    conf: 0.95
    size_min: 500
    if:
      type: text
      substr: poly/meta-morphic engines

  - id: polymorphic-decryptor-trash-doc
    desc: Polymorphic decryptor trash docs
    crit: suspicious
    conf: 0.95
    size_min: 500
    if:
      type: text
      substr: polymorphic decryptor

  - id: instruction-chain-database-builder-source
    desc: Instruction chain database input source
    crit: suspicious
    conf: 0.95
    size_min: 1000
    if:
      type: text
      substr: n_chains.txt

  - id: weighted-instruction-selection-source
    desc: Weighted instruction selection source
    crit: suspicious
    conf: 0.95
    size_min: 1000
    if:
      type: text
      substr: choose Nth instruction (using weights)

  - id: setg-random-bytecode-sample-writer
    desc: SETG random bytecode sample writer
    crit: suspicious
    conf: 0.96
    size_min: 1000
    if:
      type: text
      regex: 'setg_sample\.bin[\s\S]{0,260}setg_sample\.txt'

  - id: setg-xde-immediate-refiller-source
    desc: SETG XDE immediate/address refiller
    crit: suspicious
    conf: 0.96
    size_min: 1000
    if:
      type: text
      regex: 'setg_sample2\.bin[\s\S]{0,520}xde_disasm[\s\S]{0,260}xde_asm'

  - id: mistfall-chain-extraction-source
    desc: Mistfall instruction chain extraction source
    crit: suspicious
    conf: 0.95
    size_min: 1000
    if:
      type: text
      regex: '(?is)OPCODE_STEMMING.{0,520}process_chain.{0,520}xde_disasm'

  - id: calcchains-mistfall-xde-includes
    desc: Calcchains Mistfall/XDE includes
    crit: suspicious
    conf: 0.95
    size_min: 1000
    if:
      type: text
      regex: '"XDE/xde\.c"[\s\S]{0,160}"MF/mistfall\.cpp"'

  - id: gen-db-calcchains-batch
    desc: SETG calcchains database build batch
    crit: suspicious
    conf: 0.92
    size_min: 300
    if:
      type: text
      substr: calcchains.exe temp2.lst

composite_rules:
  - id: statistical-executable-trash-generator-docs
    desc: Statistical trash generator docs
    crit: hostile
    conf: 0.98
    all:
      - id: statistical-executable-trash-generator-doc
      - id: metamorphic-trash-code-purpose-doc
      - id: polymorphic-decryptor-trash-doc

  - id: setg-weighted-bytecode-generator
    desc: SETG instruction-chain bytecode generator
    crit: hostile
    conf: 0.98
    all:
      - id: instruction-chain-database-builder-source
      - id: weighted-instruction-selection-source
      - id: setg-random-bytecode-sample-writer

  - id: setg-xde-bytecode-refiller
    desc: SETG XDE bytecode refiller
    crit: hostile
    conf: 0.98
    all:
      - id: statistical-executable-trash-generator-doc
      - id: setg-xde-immediate-refiller-source

  - id: mistfall-xde-chain-extractor
    desc: SETG Mistfall/XDE instruction-chain toolchain
    crit: hostile
    conf: 0.98
    all:
      - id: mistfall-chain-extraction-source
      - id: calcchains-mistfall-xde-includes
