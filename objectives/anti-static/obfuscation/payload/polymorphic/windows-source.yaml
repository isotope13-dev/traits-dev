defaults:
  platforms: [windows]
  for: [c]

traits:
  - id: poly-engine-banner-source
    desc: Poly engine banner in documentation
    crit: suspicious
    conf: 0.96
    size_min: 500
    if:
      type: text
      substr: poly  engine
  - id: blacky-virus-attribution-source
    desc: Blacky virus attribution in source
    crit: suspicious
    conf: 0.99
    size_min: 500
    if:
      type: text
      substr: blacky.virus
  - id: poly-decryptor-buffer-doc-source
    desc: Poly decryptor buffer layout in source
    crit: suspicious
    conf: 0.95
    size_min: 500
    if:
      type: text
      substr: POLY_DECRYPTOR
  - id: generatepoly-entry-source
    desc: Generates decryptor stub entrypoint
    crit: suspicious
    conf: 0.97
    size_min: 1000
    if:
      type: text
      word: generatepoly
  - id: random-register-generator-source
    desc: Random register generator in source
    crit: suspicious
    conf: 0.95
    size_min: 1000
    if:
      type: text
      substr: random reg generator
  - id: metamorphic-permutation-engine-source
    desc: Metamorphic permutation engine source
    crit: suspicious
    conf: 0.96
    size_min: 1000
    if:
      type: text
      regex: '(?i)metamorphic.{0,40}permutation.{0,40}engine'
  - id: pcode-mutation-output-source
    desc: P-code mutation output buffer
    crit: suspicious
    conf: 0.94
    size_min: 1000
    if:
      type: text
      regex: '(?is)p-codes?.{0,160}mutated code.{0,120}output buffer'
  - id: user-mutate-disasm-callbacks-source
    desc: Mutator/disassembler callback pair
    crit: suspicious
    conf: 0.94
    size_min: 1000
    if:
      type: text
      regex: 'user_mutate[\s\S]{0,260}user_disasm'
  - id: permutant-block-mix-source
    desc: Permutant block mixing source
    crit: suspicious
    conf: 0.94
    size_min: 1000
    if:
      type: text
      regex: '(?i)(mixx?_blocks|mix created blocks)[\s\S]{0,220}make_permutant'
  - id: metamorphic-win32-engine-banner-source
    desc: Win32 metamorphic engine banner
    crit: suspicious
    conf: 0.95
    size_min: 1000
    if:
      type: text
      regex: "(?i)metamorphic engine.{0,40}win32"
  - id: metamorphic-shrink-expand-source
    desc: Metamorphic shrink/expand engine docs
    crit: suspicious
    conf: 0.94
    size_min: 1000
    if:
      type: text
      regex: '(?is)expand single instruction.{0,260}shrink.{0,260}instruction'
  - id: metamorphic-garbage-morph-source
    desc: Garbage insertion or morphing
    crit: suspicious
    conf: 0.94
    size_min: 1000
    if:
      type: text
      regex: '(?i)(insert garbage code|morph.{0,80}code.{0,80}buffer)'
  - id: random-viral-code-source
    desc: Random viral code generation
    crit: suspicious
    conf: 0.94
    size_min: 1000
    if:
      type: text
      regex: '(?is)random decryptor.{0,220}random viral code'
  - id: morpher-garbager-module-source
    desc: Morpher and garbager modules
    crit: suspicious
    conf: 0.94
    size_min: 1000
    if:
      type: text
      regex: '(?is)morpher\.inc.{0,120}garbager\.inc'
composite_rules:
  - id: runtime-polymorphic-decryptor-source
    desc: Runtime polymorphic decryptor engine source
    crit: hostile
    conf: 0.99
    all:
      - id: generatepoly-entry-source
      - id: micro-behaviors/crypto/symmetric/xor/rotational::add-rol-xor-decryptor-source
      - id: micro-behaviors/os/random/prng/seed::rdtsc-m-sequence-prng-source
    any:
      - id: poly-engine-banner-source
      - id: blacky-virus-attribution-source
      - id: poly-decryptor-buffer-doc-source
      - id: random-register-generator-source
  - id: metamorphic-permutation-engine
    desc: Metamorphic permutation engine source
    crit: hostile
    conf: 0.98
    all:
      - id: metamorphic-permutation-engine-source
      - id: pcode-mutation-output-source
    any:
      - id: user-mutate-disasm-callbacks-source
      - id: permutant-block-mix-source
  - id: win32-metamorphic-engine-source
    desc: Win32 metamorphic engine source
    crit: hostile
    conf: 0.98
    all:
      - id: metamorphic-win32-engine-banner-source
      - id: metamorphic-shrink-expand-source
    any:
      - id: metamorphic-garbage-morph-source
      - id: random-viral-code-source
      - id: morpher-garbager-module-source
