defaults:
  platforms: [windows]
  for: [c, text]
  attack: T1027.016

traits:
  - id: executable-trash-generator-doc
    desc: Executable trash generator docs
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: eXecutable Trash Generator

  - id: polymorphic-trash-use-doc
    desc: Polymorphic trash usage docs
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: stand-alone engine and together with any other engine

  - id: trash-generator-realistic-mode
    desc: Trash generator realistic mode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: XTG_REALISTIC

  - id: trash-generator-mask-mode
    desc: Trash generator mask mode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: XTG_MASK

  - id: trash-generator-struct-call-source
    desc: Trash generator struct call source
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'XTG_TRASH_GEN[\s\S]{0,420}call\s+xTG'

  - id: trash-generator-fake-api-source
    desc: Trash generator fake API source
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: FAKA_FAKEAPI_GEN

composite_rules:
  - id: executable-trash-generator-engine-docs
    desc: Executable trash generator engine docs
    crit: hostile
    conf: 0.98
    all:
      - id: executable-trash-generator-doc
      - id: polymorphic-trash-use-doc
      - id: trash-generator-realistic-mode
      - id: trash-generator-mask-mode

  - id: executable-trash-generator-source
    desc: Executable trash generator source
    crit: hostile
    conf: 0.98
    all:
      - id: trash-generator-struct-call-source
      - id: trash-generator-realistic-mode
      - id: trash-generator-mask-mode
    any:
      - id: trash-generator-fake-api-source
