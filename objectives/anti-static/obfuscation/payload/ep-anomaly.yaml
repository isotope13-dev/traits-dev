defaults:
  platforms: [windows]
  for: [pe]
  crit: suspicious
  conf: 0.85

traits:
  - id: ep-in-last-section-rwx
    desc: Entry point in last RWX section
    if:
      type: yara
      source: |
        import "pe"
        rule EP_Last_Section_RWX {
            condition:
                pe.number_of_sections > 0 and
                pe.entry_point >= pe.sections[pe.number_of_sections - 1].virtual_address and
                pe.entry_point < (pe.sections[pe.number_of_sections - 1].virtual_address + pe.sections[pe.number_of_sections - 1].virtual_size) and
                (pe.sections[pe.number_of_sections - 1].characteristics & pe.SECTION_MEM_EXECUTE) and
                (pe.sections[pe.number_of_sections - 1].characteristics & pe.SECTION_MEM_WRITE)
        }