defaults:
  platforms: [windows]
composite_rules:
  - id: pe-zero-imports-shellcode-dropper
    desc: "PE file with zero imports and obfuscation traits, highly indicative of shellcode/packed malware"
    crit: hostile
    conf: 0.9
    for: [pe]
    size_min: 16384
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/metrics::dominant-section
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/resource::mui-string
      - id: metadata/binary/resource::resources-dll-extension
    all:
      - id: metadata/binary/metrics::no-imports
      - id: metadata/binary/metrics::few-functions
    any:
      - id: objectives/anti-static/obfuscation/binary-structure::huge-null-run-text
      - id: objectives/anti-analysis/self-modify/runtime::xor-loop-pattern
      - id: objectives/anti-analysis/vm-detect::multiple-rdtsc-instr
