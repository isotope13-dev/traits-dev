# Reversed Script Dropper
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027.002
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: js-rev-drop
    desc: Reversed script dropper obfuscation
    crit: hostile
    conf: 0.95
    attack: T1027.002
    mbc: B0032
    for: [javascript]
    all:
      - id: objectives/anti-static/obfuscation/strings/encoding::js-array-join-symbol
      - id: objectives/anti-static/obfuscation/strings/encoding::js-string-split
      - id: objectives/anti-static/obfuscation/strings/encoding::js-array-reverse
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
    any:
      - id: objectives/anti-static/obfuscation/string-conceal::js-reversed-wscript
      - id: objectives/anti-static/obfuscation/string-conceal::js-reversed-return
      - id: objectives/anti-static/obfuscation/string-conceal::js-reversed-function
