# Mach-O Data-to-Code Ratio Objective Composites
defaults:
  platforms: [macos]
  for: [macho]
  mbc: "B0032"
composite_rules:
  - id: macho-high-entropy-data-dropper
    desc: "Mach-O high-entropy data payload dropper"
    crit: hostile
    conf: 0.95
    # Ratio anomaly becomes objective-level only with execution capability.
    all:
      - id: metadata/binary/anomaly::macho-extreme-data-to-code-ratio
      - id: micro-behaviors/process/create/shell::system-fn
    unless:
      - id: metadata/signed/platform::apple
