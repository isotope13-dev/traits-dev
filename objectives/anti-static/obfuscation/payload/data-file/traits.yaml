# Opaque "data" files commonly carry encrypted/XOR'd malware payloads
# (PlugX Canon.dat, Cobalt Strike profile drops, staged shellcode).
# Standalone blobs with no recognised format but high entropy and XOR'd
# platform fingerprints are the classic sideload-payload shape.
defaults:
  for: [data]
  attack: T1027
  mbc: F0001
traits:
  # === NOTABLE: opaque data file with elevated entropy (any OS) ===
  # Note: archive/package containers (zip, crx, xpi, whl, ipa, …) no longer
  # reach these `for: [data]` traits — the engine excludes archive file types
  # from the generic `data` group, so high-entropy containers don't FP here.
  # The basename exclusions below remain for genuinely data-typed compressed
  # blobs (e.g. a `.gz`/`.xz` payload detected as Data, or icudtl.dat).
- id: high-entropy-data-file
  desc: Elevated-entropy data file (format unknown)
  crit: component
  conf: 0.7
  platforms: [windows, linux, macos]
  size_min: 1024
  if:
    type: metrics
    field: binary.overall_entropy
    min: 6.5
  unless:
  - type: basename
    exact: icudtl.dat
  - type: basename
    regex: '\.(xz|gz|bz2|deb)$'
  - type: basename
    regex: '\.(zip|7z|rar|zst)$'
  - id: well-known/app/limine::limine-boot-image-context
  downgrade:
    any:
    - id: well-known/app/tasmota::firmware-image
    - id: well-known/app/marktext/

  # === NOTABLE: very high entropy suggests strong obfuscation/crypto ===
- id: very-high-entropy-data-file
  desc: Very-high-entropy data file (format unknown)
  crit: component
  conf: 0.85
  platforms: [windows, linux, macos]
  size_min: 1024
  if:
    type: metrics
    field: binary.overall_entropy
    min: 7.5
  unless:
  - type: basename
    exact: icudtl.dat
  - type: basename
    regex: '\.(xz|gz|bz2|deb)$'
  - type: basename
    regex: '\.(zip|7z|rar|zst)$'
  downgrade:
    any:
    - id: well-known/app/marktext/

  # === SUSPICIOUS: XOR-decoded PE loader APIs (Windows-only) ===
- id: xor-decoded-sync-api
  desc: XOR-decoded sync-primitive in data file
  crit: suspicious
  conf: 0.85
  platforms: [windows]
  if:
    type: encoded
    encoding: xor
    regex: "InitializeCriticalSection"

  # === SUSPICIOUS: XOR-decoded PE DOS stub text (unambiguous PE header) ===
- id: xor-decoded-pe-dos-stub
  desc: XOR-decoded PE DOS stub string
  crit: suspicious
  conf: 0.95
  platforms: [windows]
  if:
    type: encoded
    encoding: xor
    substr: "This program cannot be run in DOS mode"
- id: short-string-high-entropy-data-file
  desc: Short strings in entropy blob
  crit: component
  conf: 0.88
  platforms: [windows, linux, macos]
  size_min: 524288
  if:
    type: metrics
    field: binary.avg_string_length
    max: 6.0
- id: max-short-string-high-entropy-data-file
  desc: No long strings in entropy blob
  crit: component
  conf: 0.88
  platforms: [windows, linux, macos]
  size_min: 524288
  if:
    type: metrics
    field: binary.max_string_length
    max: 32
  unless:
  - type: basename
    exact: icudtl.dat
  - type: basename
    regex: '\.(xz|gz|bz2|deb)$'
  - type: basename
    regex: '\.(zip|7z|rar|zst)$'
- id: data-file-min-variety
  desc: Data file has varied byte content
  crit: component
  conf: 0.9
  platforms: [windows, linux, macos]
  if:
    type: metrics
    field: binary.overall_entropy
    min: 2.0
  unless:
  - id: well-known/app/limine::limine-boot-image-context
- id: high-byte-dominated-data-file
  desc: High byte dominated data file
  crit: component
  conf: 0.82
  platforms: [windows, linux, macos]
  size_min: 524288
  if:
    type: metrics
    field: text.high_byte_ratio
    min: 0.6
- id: non-ascii-dominated-data-file
  desc: Non-ASCII dominated data file
  crit: component
  conf: 0.82
  platforms: [windows, linux, macos]
  size_min: 524288
  if:
    type: metrics
    field: text.non_ascii_ratio
    min: 0.6
  unless:
  - type: basename
    exact: icudtl.dat
  - type: basename
    regex: '\.(xz|gz|bz2|deb)$'
  - type: basename
    regex: '\.(zip|7z|rar|zst)$'
- id: compressed-response-cache-bin
  desc: Cached compressed response blob
  crit: component
  conf: 0.95
  platforms: [windows, linux, macos]
  if:
    type: path
    basename: true
    regex: '\.(tgz|tar\.gz|gz)\.bin$'
- id: request-cache-data-blob
  desc: Cached HTTP response data blob
  crit: component
  conf: 0.95
  platforms: [windows, linux, macos]
  if:
    type: path
    regex: 'request-cache[\\/]GET[\\/].{0,500}\.bin$'
- id: gzip-magic-data-blob
  desc: Gzip magic in data file
  crit: component
  conf: 0.95
  platforms: [windows, linux, macos]
  if:
    type: hex
    pattern: "1f 8b"
    offset: 0
  unless:
      # Don't flag gzip magic when the file IS legitimately a gzip-family
      # archive — its own format starts with 1f 8b.
  - type: basename
    regex: '\.(gz|tgz|svgz)$'
    case_insensitive: true
  - type: basename
    regex: '\.tar\.gz$'
    case_insensitive: true
  - type: basename
    regex: '\.(xpi|crx)$'
    case_insensitive: true
- id: versioned-cache-bin
  desc: Versioned cache data blob
  crit: component
  conf: 0.9
  platforms: [windows, linux, macos]
  if:
    type: path
    basename: true
    regex: '^v?[0-9][0-9.]{1,30}\.bin$'
- id: powershell-large-base64-convert
  desc: Large Base64 Convert payload in data
  crit: suspicious
  conf: 0.92
  platforms: [windows]
  if:
    type: text
    regex: '(?i)FromBase64String.{0,40}[''"][A-Za-z0-9+/]{2000,}'
- id: standalone-base64-data-blob
  desc: Standalone Base64 data blob
  crit: component
  conf: 0.88
  platforms: [windows, linux, macos]
  size_min: 1024
  if:
    type: text
    regex: '^[A-Za-z0-9+/]{1024,}={0,2}$'
- id: large-base64ish-data-blob
  desc: Large Base64-like data blob
  crit: component
  conf: 0.84
  platforms: [windows, linux, macos]
  size_min: 1024
  if:
    type: text
    regex: '[A-Za-z0-9+/]{1024,}'
- id: large-base64-alpha-data-blob
  desc: Large Base64 blob with non-hex alphabet
  crit: component
  conf: 0.86
  platforms: [windows, linux, macos]
  size_min: 1024
  if:
    type: text
    regex: '[G-Zg-z+/][A-Za-z0-9+/]{1023,}'
- id: single-line-encoded-data-blob
  desc: Single-line encoded data blob
  crit: suspicious
  conf: 0.84
  platforms: [windows, linux, macos]
  size_min: 1024
  unless:
  - type: basename
    regex: '(?i)\.json$'
  if:
    type: metrics
    field: text.max_line_length
    min: 1024
- id: data-file-js-decoder-runtime
  desc: JavaScript decoder runtime in data
  crit: component
  conf: 0.88
  platforms: [windows, linux, macos]
  size_min: 1024
  if:
    type: text
    substr: "decodeURIComponent"
- id: data-file-js-obfuscator-function
  desc: JavaScript obfuscator function in data
  crit: component
  conf: 0.88
  platforms: [windows, linux, macos]
  size_min: 1024
  if:
    type: text
    substr: "function c(b,d)"
- id: jscript-encode-magic-data
  desc: JScript.Encode magic in data
  crit: suspicious
  conf: 0.96
  platforms: [windows]
  if:
    type: hex
    pattern: "23 40 7e 5e"
    offset: 0
- id: jscript-encode-block-delimiters
  desc: JScript.Encode block delimiters
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  count_min: 3
  if:
    type: raw
    substr: "@#@&"
- id: jscript-encode-end-marker
  desc: JScript.Encode end marker
  crit: suspicious
  conf: 0.92
  platforms: [windows]
  if:
    type: raw
    substr: "^#~@"
- id: data-file-stdio-option
  desc: stdio process option in data payload
  crit: component
  conf: 0.86
  platforms: [windows, linux, macos]
  size_min: 4096
  if:
    type: text
    substr: stdio
- id: json-content-o-field
  desc: JSON content_o payload field
  crit: component
  conf: 0.9
  platforms: [windows, linux, macos]
  if:
    type: value
    path: content_o
    exists: true
- id: data-file-telegram-bot-api
  desc: Telegram bot API URL in data payload
  crit: component
  conf: 0.92
  platforms: [windows, linux, macos]
  if:
    type: value
    path: content_o
    substr: api.telegram.org/bot
- id: data-file-telegram-sendmessage
  desc: Telegram sendMessage endpoint in data payload
  crit: component
  conf: 0.92
  platforms: [windows, linux, macos]
  if:
    type: value
    path: content_o
    substr: /sendMessage
- id: data-file-telegram-bot-token
  desc: Campaign Telegram bot token in data payload
  crit: suspicious
  conf: 0.96
  platforms: [windows, linux, macos]
  if:
    type: value
    path: content_o
    substr: "8201485511:AAF_"
- id: data-file-ipinfo-token-url
  desc: ipinfo.io token URL in data payload
  crit: component
  conf: 0.92
  platforms: [windows, linux, macos]
  if:
    type: value
    path: content_o
    substr: ipinfo.io/json?token=
- id: data-file-visitor-info-exfil-text
  desc: 'data file visitor info exfil text'
  crit: component
  conf: 0.9
  platforms: [windows, linux, macos]
  if:
    type: value
    path: content_o
    substr: Visitor\x20Info
- id: data-file-node-windows-hide
  desc: Hidden child process option in data payload
  crit: component
  conf: 0.9
  platforms: [windows, linux, macos]
  if:
    type: value
    path: content_o
    substr: windowsHide
- id: data-file-write-flag-wplus
  desc: Write/create file flag in data payload
  crit: component
  conf: 0.86
  platforms: [windows, linux, macos]
  if:
    type: value
    path: content_o
    substr: "'flag':'w+'"
- id: data-file-child-process-term
  desc: child_process reference in data payload
  crit: component
  conf: 0.88
  platforms: [windows, linux, macos]
  if:
    type: value
    path: content_o
    substr: child_process
- id: data-file-analysis-hostnames
  desc: Analysis-gated hostnames in data payload
  crit: suspicious
  conf: 0.94
  platforms: [windows, linux, macos]
  if:
    type: value
    path: content_o
    regex: "Home PC|vboxuser|Programador"

- id: xor-decoded-loader-api--loadlibrary
  desc: XOR-decoded loader API in data (LoadLibrary)
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  if:
    type: encoded
    encoding: xor
    regex: LoadLibrary

  # === SUSPICIOUS: XOR-decoded PE thread/mem APIs ===
- id: xor-decoded-loader-api--getprocaddress
  desc: XOR-decoded loader API in data (GetProcAddress)
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  if:
    type: encoded
    encoding: xor
    regex: GetProcAddress

  # === SUSPICIOUS: XOR-decoded PE thread/mem APIs ===
- id: xor-decoded-loader-api--virtualalloc
  desc: XOR-decoded loader API in data (VirtualAlloc)
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  if:
    type: encoded
    encoding: xor
    regex: VirtualAlloc

  # === SUSPICIOUS: XOR-decoded PE thread/mem APIs ===
- id: xor-decoded-exec-api--createthread
  desc: XOR-decoded execution API in data (CreateThread)
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  if:
    type: encoded
    encoding: xor
    regex: CreateThread

  # === SUSPICIOUS: XOR-decoded sync primitive (PE runtime init) ===
- id: xor-decoded-exec-api--virtualprotect
  desc: XOR-decoded execution API in (VirtualProtect)
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  if:
    type: encoded
    encoding: xor
    regex: VirtualProtect

  # === SUSPICIOUS: XOR-decoded sync primitive (PE runtime init) ===
- id: xor-decoded-exec-api--rtlmovememory
  desc: XOR-decoded execution API in (RtlMoveMemory)
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  if:
    type: encoded
    encoding: xor
    regex: RtlMoveMemory

  # === SUSPICIOUS: XOR-decoded sync primitive (PE runtime init) ===
- id: ip-geolocation-binary-data-path
  desc: IP geolocation binary data path
  crit: component
  conf: 0.9
  platforms: [windows, linux, macos]
  if:
    type: path
    regex: 'src[\\/]data[\\/]v[46]\.bin$'
- id: der-key-test-vector-hex-data
  desc: DER key hex test vector
  crit: component
  conf: 0.9
  platforms: [windows, linux, macos]
  if:
    type: text
    substr: '308202900282010100'
- id: compression-dictionary-testdata-path
  desc: Compression dictionary testdata path
  crit: component
  conf: 0.92
  platforms: [windows, linux, macos]
  if:
    type: path
    basename: true
    regex: 'dict.{0,40}\.bin(\.gz)?$'

composite_rules:
- id: xor-decoded-loader-api
  desc: XOR-decoded loader API in data file
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  any:
  - id: xor-decoded-loader-api--loadlibrary
  - id: xor-decoded-loader-api--getprocaddress
  - id: xor-decoded-loader-api--virtualalloc
- id: xor-decoded-exec-api
  desc: XOR-decoded execution API in data file
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  any:
  - id: xor-decoded-exec-api--createthread
  - id: xor-decoded-exec-api--virtualprotect
  - id: xor-decoded-exec-api--rtlmovememory
- id: js-obfuscator-runtime-data-file
  desc: JavaScript obfuscator runtime in data file
  crit: suspicious
  conf: 0.93
  platforms: [windows, linux, macos]
  all:
  - id: metadata/lang/javascript-features::js-obfuscator-while-loop
  - id: data-file-js-decoder-runtime
  - id: data-file-js-obfuscator-function
- id: opaque-encrypted-payload-data-file
  desc: Opaque encrypted payload data file
  crit: notable
  conf: 0.9
  platforms: [windows, linux, macos]
  all:
  - id: very-high-entropy-data-file
  - id: short-string-high-entropy-data-file
  - id: max-short-string-high-entropy-data-file
  any:
  - id: high-byte-dominated-data-file
  - id: non-ascii-dominated-data-file
  - id: high-entropy-data-file
  unless:
  - id: metadata/package/testing/presence/harness::registry-request-cache-data
  - id: objectives/anti-static/obfuscation/payload/data-file::compressed-response-cache-bin
  - id: objectives/anti-static/obfuscation/payload/data-file::request-cache-data-blob
  - id: objectives/anti-static/obfuscation/payload/data-file::gzip-magic-data-blob
  - id: objectives/anti-static/obfuscation/payload/data-file::versioned-cache-bin
- id: base64-payload-evidence
  desc: Standalone Base64 payload shape
  crit: notable
  conf: 0.92
  platforms: [windows, linux, macos]
  all:
  - id: standalone-base64-data-blob
  - id: large-base64ish-data-blob
  - id: large-base64-alpha-data-blob
  - id: data-file-min-variety
- id: standalone-base64-payload-data-file
  desc: Standalone Base64 payload data file
  crit: suspicious
  conf: 0.92
  platforms: [windows, linux, macos]
  # A real encoded payload is high-entropy; a degenerate single-character fill
  # (e.g. a raw-disk-image test fixture of 3 MB of 'A's, entropy ~0) satisfies
  # the base64 charset regex but carries no payload. Require real variety.
  all:
  - id: base64-payload-evidence
  unless:
  - id: base64-test-fixture-context
- id: base64-test-fixture-evidence
  desc: Base64 test or standard-data fixture evidence
  crit: notable
  conf: 0.95
  platforms: [windows, linux, macos]
  any:
  - id: base64-test-vector-filename
  - id: base64-test-fixture-path
  - id: commented-base64-test-fixture
  - id: apple-standalone-firmware-path
  - id: ip-geolocation-binary-data-path
  - id: der-key-test-vector-hex-data
  - id: metadata/package/testing/presence/harness::go-tools-testdata-directory-path
  - id: metadata/package/testing/presence/harness::go-test-main
  - id: metadata/package/testing/presence/harness::test-directory-path
  - id: compression-dictionary-testdata-path
- id: base64-test-fixture-context
  desc: Recognized Base64 test or standard-data fixture context
  crit: exception
  conf: 0.95
  platforms: [windows, linux, macos]
  all:
  - id: base64-test-fixture-evidence
  - id: base64-payload-evidence
- id: jscript-encoded-data-block
  desc: JScript.Encode data block
  crit: suspicious
  conf: 0.96
  platforms: [windows]
  all:
  - id: jscript-encode-magic-data
  - id: jscript-encode-block-delimiters
  - id: jscript-encode-end-marker
- id: obfuscated-data-hidden-node-dropper
  desc: Obfuscated data payload launches hidden Node child stages
  crit: hostile
  conf: 0.97
  platforms: [windows, linux, macos]
  attack: T1059.007,T1027,T1105
  size_min: 50000
  all:
  - id: js-obfuscator-runtime-data-file
  - id: objectives/command-and-control/dropper/delivery/fetch-eval::json-cookie-hidden-stage-options
  - id: data-file-stdio-option
- id: obfuscated-data-repeating-hidden-stage
  desc: Obfuscated data payload repeats hidden Node staging
  crit: hostile
  conf: 0.98
  platforms: [windows, linux, macos]
  attack: T1105,T1059.007,T1027
  size_min: 50000
  all:
  - id: js-obfuscator-runtime-data-file
  - id: objectives/command-and-control/dropper/delivery/fetch-eval::json-cookie-hidden-stage-options
  - id: objectives/command-and-control/dropper/delivery/fetch-eval::json-cookie-stage-repeat-or-detach
  - id: data-file-stdio-option
- id: single-line-obfuscated-node-stage-data
  desc: Single-line obfuscated data payload contains Node stage runtime
  crit: hostile
  conf: 0.97
  platforms: [windows, linux, macos]
  attack: T1027,T1059.007
  size_min: 50000
  all:
  - id: single-line-encoded-data-blob
  - id: data-file-js-decoder-runtime
  - id: data-file-js-obfuscator-function
  - id: data-file-stdio-option
- id: json-obfuscated-telegram-exfil-payload
  desc: Obfuscated JSON payload exfiltrates via Telegram
  crit: hostile
  conf: 0.995
  platforms: [windows, linux, macos]
  attack: T1567,T1027
  all:
  - id: js-obfuscator-runtime-data-file
  - id: json-content-o-field
  - id: data-file-telegram-bot-api
  - id: data-file-telegram-sendmessage
  any:
  - id: data-file-telegram-bot-token
  - id: data-file-ipinfo-token-url
  - id: data-file-visitor-info-exfil-text
- id: json-obfuscated-ipinfo-telegram-payload
  desc: Obfuscated JSON payload profiles visitors and sends Telegram message
  crit: hostile
  conf: 0.99
  platforms: [windows, linux, macos]
  attack: T1016,T1567,T1027
  all:
  - id: js-obfuscator-runtime-data-file
  - id: data-file-ipinfo-token-url
  - id: data-file-telegram-bot-token
  any:
  - id: data-file-visitor-info-exfil-text
  - id: data-file-telegram-sendmessage
- id: json-obfuscated-analysis-gated-payload
  desc: Obfuscated JSON payload includes analysis-hostname gating
  crit: hostile
  conf: 0.98
  platforms: [windows, linux, macos]
  attack: T1497.001,T1027
  all:
  - id: js-obfuscator-runtime-data-file
  - id: json-content-o-field
  - id: data-file-analysis-hostnames
  any:
  - id: data-file-node-windows-hide
  - id: data-file-child-process-term
- id: json-obfuscated-hidden-write-exec-payload
  desc: Obfuscated JSON payload writes a stage and launches hidden process
  crit: hostile
  conf: 0.98
  platforms: [windows, linux, macos]
  attack: T1105,T1059.007,T1027
  all:
  - id: js-obfuscator-runtime-data-file
  - id: json-content-o-field
  - id: data-file-node-windows-hide
  - id: data-file-write-flag-wplus

  # Helper: any XOR'd Windows API name reveals PE-shape content under the mask.
- id: xor-decoded-winapi-name
  desc: XOR-decoded Windows API name in data
  crit: component
  conf: 0.9
  platforms: [windows]
  any:
  - id: xor-decoded-loader-api
  - id: xor-decoded-exec-api
  - id: xor-decoded-sync-api

  # === HOSTILE: DOS stub + at least one API-name XOR decode ===
  # One PE clue via XOR can be a coincidence; DOS stub + any API name is the
  # PlugX-style packed payload shape.
- id: xor-encoded-pe-payload-data
  desc: Data file contains XOR-encoded PE payload
  crit: hostile
  conf: 0.95
  platforms: [windows]
  attack: T1027.013
  all:
  - id: xor-decoded-pe-dos-stub
  - id: xor-decoded-winapi-name

  # === HOSTILE: DOS stub + very-high entropy body (packed/crypted PE) ===
- id: xor-encoded-pe-payload-entropy
  desc: XOR-encoded PE with packed crypted body
  crit: hostile
  conf: 0.92
  platforms: [windows]
  attack: T1027.013
  all:
  - id: xor-decoded-pe-dos-stub
  - id: very-high-entropy-data-file
