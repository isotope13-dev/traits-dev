# Opaque "data" files commonly carry encrypted/XOR'd malware payloads
# (PlugX Canon.dat, Cobalt Strike profile drops, staged shellcode).
# Standalone blobs with no recognised format but high entropy and XOR'd
# platform fingerprints are the classic sideload-payload shape.
defaults:
  for: [data]
  attack: T1027
  mbc: F0001
traits:
  # === NOTABLE: opaque data file with elevated entropy (any OS) ===
  - id: high-entropy-data-file
    desc: Opaque data file with elevated entropy
    crit: notable
    conf: 0.7
    platforms: [windows, linux, macos]
    size_min: 1024
    if:
      type: metrics
      field: binary.overall_entropy
      min: 6.5
    unless:
      - type: basename
        exact: icudtl.dat
      - type: basename
        regex: '\.(xz|gz|bz2|deb)$'
      - type: basename
        regex: '\.(zip|7z|rar|zst)$'

  # === NOTABLE: very high entropy suggests strong obfuscation/crypto ===
  - id: very-high-entropy-data-file
    desc: Data file with very high entropy
    crit: notable
    conf: 0.85
    platforms: [windows, linux, macos]
    size_min: 1024
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.5
    unless:
      - type: basename
        exact: icudtl.dat

  # === SUSPICIOUS: XOR-decoded plaintext strings (any OS) ===
  - id: xor-decoded-strings-in-data
    desc: XOR-decoded plaintext in data file
    crit: suspicious
    conf: 0.85
    platforms: [windows, linux, macos]
    if:
      type: encoded
      encoding: xor
      regex: "[A-Za-z]{10,}"
    unless:
      - type: basename
        exact: icudtl.dat
      - type: basename
        regex: '\.(xz|gz|bz2|deb)$'
      - type: basename
        regex: '\.(zip|7z|rar|zst)$'

  # === SUSPICIOUS: XOR-decoded PE loader APIs (Windows-only) ===
  - id: xor-decoded-loader-api
    desc: XOR-decoded loader API in data file
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    if:
      type: encoded
      encoding: xor
      regex: "(LoadLibrary|GetProcAddress|VirtualAlloc)"

  # === SUSPICIOUS: XOR-decoded PE thread/mem APIs ===
  - id: xor-decoded-exec-api
    desc: XOR-decoded execution API in data file
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    if:
      type: encoded
      encoding: xor
      regex: "(CreateThread|VirtualProtect|RtlMoveMemory)"

  # === SUSPICIOUS: XOR-decoded sync primitive (PE runtime init) ===
  - id: xor-decoded-sync-api
    desc: XOR-decoded sync-primitive in data file
    crit: suspicious
    conf: 0.85
    platforms: [windows]
    if:
      type: encoded
      encoding: xor
      regex: "InitializeCriticalSection"

  # === SUSPICIOUS: XOR-decoded PE DOS stub text (unambiguous PE header) ===
  - id: xor-decoded-pe-dos-stub
    desc: XOR-decoded PE DOS stub string
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    if:
      type: encoded
      encoding: xor
      substr: "This program cannot be run in DOS mode"
  - id: short-string-high-entropy-data-file
    desc: Short strings in entropy blob
    crit: component
    conf: 0.88
    platforms: [windows, linux, macos]
    size_min: 524288
    if:
      type: metrics
      field: binary.avg_string_length
      max: 6.0
  - id: max-short-string-high-entropy-data-file
    desc: No long strings in entropy blob
    crit: component
    conf: 0.88
    platforms: [windows, linux, macos]
    size_min: 524288
    if:
      type: metrics
      field: binary.max_string_length
      max: 32
    unless:
      - type: basename
        exact: icudtl.dat
      - type: basename
        regex: '\.(xz|gz|bz2|deb)$'
      - type: basename
        regex: '\.(zip|7z|rar|zst)$'
  - id: high-byte-dominated-data-file
    desc: High byte dominated data file
    crit: component
    conf: 0.82
    platforms: [windows, linux, macos]
    size_min: 524288
    if:
      type: metrics
      field: text.high_byte_ratio
      min: 0.6
  - id: non-ascii-dominated-data-file
    desc: Non-ASCII dominated data file
    crit: component
    conf: 0.82
    platforms: [windows, linux, macos]
    size_min: 524288
    if:
      type: metrics
      field: text.non_ascii_ratio
      min: 0.6
    unless:
      - type: basename
        exact: icudtl.dat
      - type: basename
        regex: '\.(xz|gz|bz2|deb)$'
      - type: basename
        regex: '\.(zip|7z|rar|zst)$'
  - id: compressed-response-cache-bin
    desc: Cached compressed response blob
    crit: component
    conf: 0.95
    platforms: [windows, linux, macos]
    if:
      type: basename
      regex: '\.(tgz|tar\.gz|gz)\.bin$'
  - id: request-cache-data-blob
    desc: Cached HTTP response data blob
    crit: component
    conf: 0.95
    platforms: [windows, linux, macos]
    if:
      type: basename
      regex: '[\\/]request-cache[\\/]GET[\\/].{0,500}\.bin$'
  - id: gzip-magic-data-blob
    desc: Gzip-compressed data blob
    crit: component
    conf: 0.95
    platforms: [windows, linux, macos]
    if:
      type: hex
      pattern: "1f 8b"
      offset: 0
  - id: versioned-cache-bin
    desc: Versioned cache data blob
    crit: component
    conf: 0.9
    platforms: [windows, linux, macos]
    if:
      type: basename
      regex: '^v?[0-9][0-9.]{1,30}\.bin$'

composite_rules:
  - id: opaque-encrypted-payload-data-file
    desc: Opaque encrypted payload data file
    crit: suspicious
    conf: 0.9
    platforms: [windows, linux, macos]
    all:
      - id: very-high-entropy-data-file
      - id: short-string-high-entropy-data-file
      - id: max-short-string-high-entropy-data-file
    any:
      - id: high-byte-dominated-data-file
      - id: non-ascii-dominated-data-file
      - id: high-entropy-data-file
    unless:
      - id: metadata/package/testing/presence::registry-request-cache-data
      - id: objectives/anti-static/obfuscation/payload/data-file::compressed-response-cache-bin
      - id: objectives/anti-static/obfuscation/payload/data-file::request-cache-data-blob
      - id: objectives/anti-static/obfuscation/payload/data-file::gzip-magic-data-blob
      - id: objectives/anti-static/obfuscation/payload/data-file::versioned-cache-bin

  # Helper: any XOR'd Windows API name reveals PE-shape content under the mask.
  - id: xor-decoded-winapi-name
    desc: XOR-decoded Windows API name in data
    crit: component
    conf: 0.9
    platforms: [windows]
    any:
      - id: xor-decoded-loader-api
      - id: xor-decoded-exec-api
      - id: xor-decoded-sync-api

  # === HOSTILE: DOS stub + at least one API-name XOR decode ===
  # One PE clue via XOR can be a coincidence; DOS stub + any API name is the
  # PlugX-style packed payload shape.
  - id: xor-encoded-pe-payload-data
    desc: Data file contains XOR-encoded PE payload
    crit: hostile
    conf: 0.95
    platforms: [windows]
    attack: T1027.013
    all:
      - id: xor-decoded-pe-dos-stub
      - id: xor-decoded-winapi-name

  # === HOSTILE: DOS stub + very-high entropy body (packed/crypted PE) ===
  - id: xor-encoded-pe-payload-entropy
    desc: XOR-encoded PE with packed crypted body
    crit: hostile
    conf: 0.92
    platforms: [windows]
    attack: T1027.013
    all:
      - id: xor-decoded-pe-dos-stub
      - id: very-high-entropy-data-file
