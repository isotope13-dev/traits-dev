defaults:
  for: [data]
  platforms: [windows, linux, macos]

traits:
  - id: base64-test-vector-filename
    desc: Base64 parser test vector filename
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '^def_.*b64.*\.txt$'
  - id: base64-test-fixture-path
    desc: Base64 test fixture path
    crit: component
    conf: 0.95
    if:
      type: path
      regex: '[\\/]test[\\/]data[\\/]base64[\\/][^\\/]+\.txt$'
  - id: commented-base64-test-fixture
    desc: Commented Base64 test fixture
    crit: component
    conf: 0.95
    size_min: 1024
    if:
      type: text
      regex: '^// [^\n]{1,120}\n[A-Za-z0-9+/]{1024,}={0,2}\n?$'
  - id: apple-standalone-firmware-path
    # macOS ships vendor NAND/storage firmware blobs under
    # usr/standalone/firmware/ (bfh_ofw.*.bin). They are binary images whose
    # byte runs coincidentally match the base64 charset — not encoded payloads.
    desc: Apple standalone firmware image path
    crit: component
    conf: 0.95
    if:
      type: path
      regex: '[\\/]usr[\\/]standalone[\\/]firmware[\\/]'
