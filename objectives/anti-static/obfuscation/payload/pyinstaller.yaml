defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.001
  mbc: B0032.001
composite_rules:
  - id: pyinstaller-overlay-mutator
    desc: PyInstaller self-read overlay mutation workflow
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-vt-client
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-appender-module
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-entropy-overlay-raw
      - id: metadata/binary/layout::overlay-over-90pct
  - id: pyinstaller-encrypted-overlay-network
    desc: PyInstaller PE with encrypted overlay and networking
    crit: hostile
    conf: 0.95
    attack: T1027.002
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: objectives/anti-static/obfuscation/binary-metrics::high-entropy-overlay-raw
      - id: metadata/binary/layout::overlay-over-35pct
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/developer/
