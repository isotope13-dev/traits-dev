defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.003
  mbc: F0001.006

traits:
  - id: autoit-au3info-host
    desc: AutoIt Window Info host identity
    crit: component
    conf: 0.97
    if:
      type: text
      exact: AutoIt v3 Window Info
      section: .rdata

  - id: moderately-encoded-rsrc
    desc: Encoded PE resource section
    crit: component
    conf: 0.86
    if:
      type: section
      exact: .rsrc
      length_min: 32768
      entropy_min: 5.8

  - id: pe-has-signature-png
    desc: PE signature is present
    crit: component
    conf: 0.99
    if:
      type: metrics
      field: pe.has_signature
      min: 1
    unless:
      - id: metadata/binary/resource::no-resources

  - id: resource-carrier-c2-endpoint
    desc: Embedded resource C2 endpoint
    crit: component
    conf: 0.99
    if:
      type: text
      exact: 74.19.192.23:10389

composite_rules:
  - id: modified-autoit-png-resource-carrier
    desc: Modified AutoIt PNG resource carrier
    crit: suspicious
    conf: 0.98
    all:
      - id: autoit-au3info-host
      - id: metadata/binary/resource::png-resource-marker
      - id: moderately-encoded-rsrc
      - id: metadata/binary/layout::pe-checksum-mismatch
    any:
      - id: resource-carrier-c2-endpoint
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: pe-has-signature-png
