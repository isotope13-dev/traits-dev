defaults:
  platforms:
    - windows
  for: [binaries, scripts, source]
  attack: T1027
  mbc: B0032
traits:
  - id: high-non-ascii-ratio
    desc: High non ASCII content ratio
    crit: notable
    conf: 0.8
    size_min: 524288
    for:
      - javascript
      - powershell
      - batch
      - vbs
      - lnk
    if:
      type: metrics
      field: text.non_ascii_ratio
      min: 0.65
  - id: many-long-lines
    desc: Many extremely long lines
    crit: suspicious
    conf: 0.8
    size_min: 524288
    for:
      - powershell
      - batch
      - vbs
      - lnk
    if:
      type: metrics
      field: text.lines_over_1000
      min: 500
  - id: many-long-tokens
    desc: Many long opaque tokens
    crit: notable
    conf: 0.8
    size_min: 524288
    for:
      - javascript
      - powershell
      - batch
      - vbs
      - lnk
    if:
      type: metrics
      field: text.long_token_count
      min: 10000
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
