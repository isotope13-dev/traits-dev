defaults:
  platforms: [windows]
  for: [javascript]
  size_min: 8000
  size_max: 500000

traits:
  - id: js-even-index-charat-push
    desc: Even-index charAt push loop
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'i%2==0\)\w+\.push\(\w+\["charAt"\]\(i\)\)'

  - id: js-split-self-reassign
    desc: Split wrapper self reassign
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: "aEXHfgP = aEXHfgP[\"s\"+\"pl\"+\"it\"]('');"

  - id: js-reverse-self-reassign
    desc: Reverse wrapper self reassign
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '\w+\s*=\s*\w+\["r"\+"ever"\+"se"\]\(\)'

  - id: js-join-self-reassign
    desc: Join wrapper self reassign
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: "aEXHfgP = aEXHfgP[\"j\"+\"o\"+\"in\"]('');"

  - id: js-eval-gate-init-eleven
    desc: Variable eleven eval gate
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'var\s+\w+\s*=\s*11;\s*if\s*\(\s*\w+\s*==\s*11\s*\)\s*eval\(\w+\)'

composite_rules:
  - id: js-even-index-reverse-reconstruction
    desc: Even-index reverse eval reconstruction
    crit: suspicious
    conf: 0.99
    all:
      - id: js-even-index-charat-push
      - id: js-split-self-reassign
      - id: js-reverse-self-reassign
      - id: js-join-self-reassign
      - id: js-eval-gate-init-eleven
