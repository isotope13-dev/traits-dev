# JScript/WSH reflective loaders that reassemble a payload from many
# string-returning functions, decode it with char-code arithmetic, and execute
# it through a hidden WScript.Shell Run (often `conhost --headless powershell
# -Command "iex $env:..."` driving an in-memory [Reflection.Assembly]::Load).
# Detection anchors on the obfuscation SHAPE — the payload, command, and
# Reflection calls are all encoded and never appear as literal strings.
defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1027
  mbc: B0032
traits:
  - id: embedded-encrypted-byte-array
    desc: JScript embedded encrypted byte payload array
    crit: component
    conf: 0.97
    if:
      type: text
      substr: 'EncryptedBytes=['
  - id: embedded-secret-key-byte-array
    desc: JScript embedded decryption key byte array
    crit: component
    conf: 0.96
    if:
      type: text
      substr: 'KeyBytes=['
  - id: alternating-xor-stage-decoder
    desc: Alternating XOR embedded JScript decoder
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\^\([^)]{1,80}%2===0\?.{1,80}:.{1,80}\)'
composite_rules:
  - id: js-encrypted-byte-array-function-loader
    desc: Encrypted byte arrays decoded into a Function-based JScript stage
    crit: hostile
    conf: 0.98
    attack: "T1027, T1059.007, T1140"
    all:
      - id: embedded-encrypted-byte-array
      - id: embedded-secret-key-byte-array
      - id: alternating-xor-stage-decoder
      - id: micro-behaviors/process/interpreter/eval::js-charcode-constructor-stage
  - id: js-fragmented-payload-wsh-loader
    desc: Fragmented script payload decoded with char-code arithmetic and run via WSH
    crit: hostile
    conf: 0.95
    attack: T1059.007
    # Hundreds of bare string-returning functions (the payload chunked to defeat
    # string scanners) + a modular char-code decode loop + WSH execution (hidden
    # Run or an obfuscated ActiveX ProgID). The combination is a multi-stage
    # in-memory loader; no benign module fragments a blob across 30+ string
    # returners and then arithmetically decodes and launches it.
    all:
      - id: micro-behaviors/data/source/function/return::js-function-return-string-dense
      - id: objectives/anti-static/obfuscation/encoding/arithmetic::js-fromcharcode-mod-256-decode
    any:
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-hidden-window
      - id: objectives/execution/activex/com::activex-object-computed-progid
