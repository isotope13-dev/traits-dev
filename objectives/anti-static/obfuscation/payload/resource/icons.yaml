defaults:
  platforms: [windows]
  for: [pe]
  attack: T1612
  mbc: B0023

traits:
  - id: icon-count-under-six
    desc: PE has few icon resources
    crit: component
    conf: 0.85
    if:
      type: metrics
      field: pe.icon_count
      max: 5
    unless:
      - id: metadata/binary/resource::no-resources
  - id: large-rsrc-section
    desc: Large PE resource section
    crit: component
    conf: 0.85
    if:
      type: section
      exact: ".rsrc"
      length_min: 262144

composite_rules:
  - id: large-icon-resource
    desc: Disproportionately large icon resources (payload carrier)
    crit: suspicious
    conf: 0.85
    all:
      - id: icon-count-under-six
      - id: large-rsrc-section
    unless:
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-assembly
