defaults:
  platforms: [windows]
  for: [pe]
  attack: T1612
  mbc: B0023

traits:
  - id: icon-count-under-six
    desc: PE has few icon resources
    crit: component
    conf: 0.85
    if:
      type: metrics
      field: pe.icon_count
      max: 5
    unless:
      - id: metadata/binary/resource::no-resources
  - id: large-rsrc-section
    desc: Large PE resource section
    crit: component
    conf: 0.85
    if:
      type: section
      exact: ".rsrc"
      length_min: 262144
composite_rules:
  - id: large-icon-resource
    desc: Large PE resource section with few icons
    crit: notable
    conf: 0.85
    all:
      - id: icon-count-under-six
      - id: large-rsrc-section
    any:
      - id: metadata/binary/resource::pe-resource-icon-list
      - id: metadata/binary/resource::pe-resource-group-icon-list
    unless:
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/lang/compiled::autoit-compiled-script
      - id: metadata/binary/framework::unity-player-framework
      - id: metadata/binary/resource::pe-resource-bitmap-list
      - id: well-known/game/steam/
