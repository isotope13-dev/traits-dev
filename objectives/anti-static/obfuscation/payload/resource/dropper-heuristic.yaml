defaults:
  platforms: [windows]
  for: [pe]
  crit: suspicious

traits:
composite_rules:
  - id: pe-rsrc-dropper-heuristic
    desc: Obfuscated high-entropy resource payload extracted dynamically
    all:
      - id: metadata/binary/resource::large-high-entropy-rsrc-section
      - id: metadata/binary/layout::has-overlay
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
      - id: objectives/anti-analysis/debugger-detect/check::debugger-check-with-guards

  - id: extracted-high-entropy-resource-process-loader
    desc: PE resource extraction before process/network execution
    crit: hostile
    conf: 0.98
    attack: T1027.009,T1059.003,T1071
    for: [pe, dll]
    all:
      - id: metadata/binary/resource::large-high-entropy-rsrc-section
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
      - id: micro-behaviors/process/create/shell/spawn::win-createprocess
      - id: micro-behaviors/process/create/shell/spawn::win-shellexecute
      - id: micro-behaviors/communications/socket/init::connect-api
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/framework/

  - id: extracted-resource-api-resolution-loader
    desc: PE resource extraction with memory and process staging
    crit: hostile
    conf: 0.97
    attack: T1027.009,T1057,T1055
    for: [pe, dll]
    all:
      - id: metadata/binary/resource::large-high-entropy-rsrc-section
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-loader-api-chain
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
      - id: micro-behaviors/process/create/shell/spawn::win-createprocess
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/framework/
