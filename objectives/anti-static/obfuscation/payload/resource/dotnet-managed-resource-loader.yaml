defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: reflective-managed-resource-decryptor
    desc: Reflective .NET resource decryptor
    crit: hostile
    conf: 0.99
    attack: T1027.009
    all:
      - id: metadata/binary/resource::clr-resource-high-entropy
      - id: metadata/binary/resource::clr-resource-large
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-create-decryptor
      - id: micro-behaviors/process/interpreter/reflection/runtime::methodbase-class
      - id: micro-behaviors/process/interpreter/reflection/runtime::activator
      - id: objectives/command-and-control/dropper/staging/embedded::vb-newlatebinding
    unless:
      - id: well-known/lib/baiqisoft::barcode-control-library-context
      - id: well-known/lib/baiqisoft::barcode-control-package-context
  - id: dotnet-embedded-pe-triple-des-resource-loader
    desc: .NET high-entropy resource decrypts embedded PE reflectively
    crit: hostile
    conf: 0.99
    attack: T1027.009,T1140,T1620
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/layout::pe-embedded
      - id: metadata/binary/resource::clr-resource-high-entropy
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: micro-behaviors/crypto/symmetric/3des::triple-des-decrypt-chain
      - id: micro-behaviors/process/interpreter/reflection/runtime::activator
