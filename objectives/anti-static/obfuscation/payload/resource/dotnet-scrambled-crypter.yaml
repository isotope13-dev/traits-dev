# .NET crypter packaging: a managed assembly that enumerates and reads its own
# embedded managed resources (where the encrypted second-stage payload lives)
# while carrying a scrambled/garbage VERSIONINFO string table. Legitimate .NET
# apps that embed resources keep a readable version resource; the conjunction
# with a scrambled identity is the crypter tell. Mirrors the delphi-rcdata-
# crypter precedent (version-info anomaly + embedded payload). Resource
# stream access and ResourceReader access are the read side; reflective
# invocation of the decrypted type is covered by the reflection/invoke crypter
# composite.
defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1027.009
composite_rules:
  - id: dotnet-scrambled-resource-crypter
    desc: .NET assembly reading embedded resources with scrambled identity
    crit: hostile
    conf: 0.95
    mbc: B0032
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: objectives/evasion/masquerade/identity/fabricated::garbled-versioninfo-identity
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource/
