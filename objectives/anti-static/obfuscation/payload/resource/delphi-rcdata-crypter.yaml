defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.013

composite_rules:
  - id: delphi-rcdata-crypter
    desc: Delphi RCDATA fat-resource crypter / loader
    crit: hostile
    conf: 0.93
    size_min: 524288
    all:
      - id: metadata/lang/compiler/managed::delphi
      - id: objectives/anti-static/obfuscation/payload/resource::large-icon-resource
    any:
      - id: metadata/binary/anomaly/format::version-info-string-table-stripped
      - id: objectives/evasion/masquerade/identity/fabricated::pe-versioninfo-single-char-placeholders
      - id: micro-behaviors/dylib/load/wtsapi
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: well-known/tool/development/inno-setup/
