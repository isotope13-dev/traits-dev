defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.013
  mbc: B0032
traits:
- id: jigsaw-padding-pangram
  desc: Pangram filler text in payload region
  crit: component
  conf: 0.92
  if:
    type: text
    substr: The quick brown fox jumps over the lazy dog
    section: .rdata
- id: jigsaw-padding-update-server
  desc: Fake "update server" filler text
  crit: component
  conf: 0.92
  if:
    type: text
    substr: Connecting to update server for latest definitions
    section: .rdata
- id: jigsaw-padding-request-queue
  desc: Fake "request queue" filler text
  crit: component
  conf: 0.92
  if:
    type: text
    substr: Processing request queue and dispatching work item
    section: .rdata
- id: jigsaw-padding-heartbeat--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\b(Heartbeat|Health check|Background task)\b.{0,50}\b(complete|started)\b'
    section: .rdata
  count_max: 1028311
- id: jigsaw-padding-heartbeat--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\b(Heartbeat|Health check|Background task)\b.{0,50}\b(ok|success)\b'
    section: .rdata
  count_max: 1028312
composite_rules:
- id: jigsaw-payload-padding
  desc: English filler text interleaved with payload (entropy normalization)
  crit: suspicious
  conf: 0.9
  needs: 2
  any:
  - id: jigsaw-padding-pangram
  - id: jigsaw-padding-update-server
  - id: jigsaw-padding-request-queue
  - id: jigsaw-padding-heartbeat
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework/
- id: entropy-normalized-shellcode-loader
  desc: Shellcode loader with payload fragmented to defeat entropy detection
  crit: hostile
  conf: 0.94
  arch: [x86-64]
  size_max: 5242880
  all:
  - id: objectives/evasion/process/injection/shellcode::concealed-shellcode-loader-x64
  - id: jigsaw-payload-padding
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework/
- id: jigsaw-padding-heartbeat
  desc: Fake "heartbeat/health check" filler text
  crit: component
  conf: 0.88
  any:
  - id: jigsaw-padding-heartbeat--rx-1
  - id: jigsaw-padding-heartbeat--rx-2
