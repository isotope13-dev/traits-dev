# Embedded script loaders carried by native Windows binaries.
# These rules describe the loader shape rather than an IOC: a native PE that
# stores a PowerShell stage as many base64 fragments and reconstructs it through
# a helper-call loop is materially different from an ordinary Go runtime.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0032

traits:
  - id: pe-script-base64-fragment-calls
    desc: Base64 fragment helper calls
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bCall\s+[A-Za-z][A-Za-z0-9_]{7,}\s*\(\s*["''][A-Za-z0-9+/]{24,}={0,2}["'']'
    count_min: 8

  - id: pe-script-obfuscated-helper-functions
    desc: Long-name embedded VBScript helper functions
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b(Function|Sub)\s+[A-Za-z][A-Za-z0-9_]{7,}\s*\('
    count_min: 2
    unless:
      - id: metadata/binary/installer/family/
      - id: well-known/tool/development/inno-setup::inno-setup-compiler
      - id: metadata/binary/framework::dotnet-assembly

  - id: pe-script-encoded-dotnet-network-stage
    desc: Encoded .NET network stage
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      encoding: base64
      regex: '(?i)(WebRequest|GetResponseStream|MemoryStream)'

  - id: pe-script-encoded-reflective-stage
    desc: Encoded reflective .NET stage
    crit: suspicious
    conf: 0.97
    if:
      type: encoded
      encoding: base64
      regex: '(?i)(Reflection\\.Assembly|Assembly::Load|AppDomain|scriptblock)'

composite_rules:
  - id: pe-obfuscated-script-stage
    desc: Native PE reconstructs an obfuscated embedded script stage
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.001
    all:
      - id: pe-script-base64-fragment-calls
      - id: pe-script-obfuscated-helper-functions
