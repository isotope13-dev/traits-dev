# JS Array Reconstruction Obfuscation
# Detects reconstruction of payload from hex char array using index array and eval
defaults:
  platforms: [linux, windows, macos]
  for: [javascript]
traits:
- id: svga-player-bundle--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: videoEntity
  count_max: 1028478
- id: svga-player-bundle--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: SVGAProto
  count_max: 1028479
- id: svga-player-bundle--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: svgaplayer
  count_max: 1028480
composite_rules:
- id: js-hex-array-eval
  desc: Reconstructs and executes code from hex-encoded character array
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/data/encode/arrays::js-large-int-array
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
  any:
  - id: micro-behaviors/data/control-flow/analysis::for-loop-content
  - id: micro-behaviors/data/control-flow/analysis::for-loop-content
  downgrade:
    any:
    - id: objectives/anti-static/obfuscation/payload/fragmentation/
- id: js-hex-array-eval-recognized-marker
  desc: Recognized JS array eval marker
  crit: baseline
  conf: 0.95
  any:
    - id: metadata/library/jquery
    - id: metadata/library/prototype
    - id: metadata/package/testing/harness/runtime::is-test
    - id: metadata/package/testing/presence/fixture::test-filename-pattern
    - id: metadata/package/testing/presence/harness::test-directory
    - id: metadata/lang/scripted::dts-declaration-file
    - id: svga-player-bundle
    - id: well-known/lib/conda-package::ray-dashboard-speedscope-bundle
    - id: well-known/app/browser-extension::evernote-web-clipper-extension
- id: svga-player-bundle
  desc: SVGA Player web bundle (animation library)
  crit: baseline
  conf: 0.95
  any:
  - id: svga-player-bundle--rx-1
  - id: svga-player-bundle--rx-2
  - id: svga-player-bundle--rx-3
