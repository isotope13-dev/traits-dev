# Fragmented Payload Detection
# Detects patterns where a payload is constructed incrementally (+=) to evade static string analysis.
# Common in PowerShell and JavaScript droppers.
defaults:
  platforms: [windows]
  for: [powershell]
  attack: "T1027"
  mbc: "B0032"
traits:
  - id: ps1-incremental-string
    desc: PowerShell incremental string assignment
    crit: suspicious
    conf: 0.8
    # `$var += "..."` — appending a string literal. A single append is idiomatic
    # output-building; payload reconstruction does it many times, so require a
    # high count (real fragmentation chunks a blob piece by piece).
    count_min: 20
    if:
      type: text
      regex: '\$\w+\s*\+=\s*[''"]'
    unless:
      - type: raw
        regex: '(?i)\$(dockerargs|dockeropts|buildargs)\s*\+='
      - type: raw
        regex: '(?i)\$(args|cmd|env)\s*\+='
      - id: well-known/app/posh-ovirt::ssh-admin-command-context
      - id: well-known/app/maester::report-rendering-context
      - id: well-known/app/maester::module-context
      - id: well-known/tool/development/setup-php::setup-php-action-source
  - id: ps1-incremental-array
    desc: PowerShell incremental array assignment
    crit: suspicious
    conf: 0.8
    # `$var += @(...)` — appending an array literal. Require several appends:
    # one is ordinary list-building, many rebuild a byte-array payload.
    count_min: 5
    if:
      type: text
      regex: '\$\w+\s*\+=\s*@\('
    unless:
      - id: well-known/tool/development/setup-php::setup-php-action-source
  - id: ps1-join-operator
    desc: PowerShell join operator usage
    # A bare `-join` is a ubiquitous PowerShell operator (array→string), not
    # obfuscation on its own. It's only a fragmentation signal in the
    # ps1-fragmented-payload composite alongside heavy incremental array
    # building, so it's a component — a single idiomatic use must not mislabel.
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '(?i)-join\b'
composite_rules:
  - id: ps1-fragmented-payload
    desc: "PowerShell fragmented payload construction"
    crit: suspicious
    conf: 0.85
    all:
      - id: ps1-incremental-array
      - id: ps1-join-operator
