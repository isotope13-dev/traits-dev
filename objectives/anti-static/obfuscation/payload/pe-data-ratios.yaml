defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: low-code-to-data-ratio-pe
    desc: "Very low code-to-data ratio (large PE payload)"
    crit: suspicious
    conf: 0.9
    size_max: 31457280
    if:
      type: metrics
      field: binary.code_to_data_ratio
      max: 0.1
    unless:
      - type: metrics
        field: binary.import_density
        max: 0
      - type: metrics
        field: binary.data_entropy
        max: 4.0
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rdata
        - id: metadata/signed/platform::microsoft
  - id: unusual-alignment-pe
    desc: "Unusual PE section alignment"
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: pe.unusual_alignment
      min: 1
    unless:
      - id: metadata/format/pe::resource-only-dll
composite_rules:
  - id: pe-packed-dropper-anomaly
    desc: "PE extreme data-to-code ratio with unusual alignment"
    crit: suspicious
    conf: 0.95
    all:
      - id: low-code-to-data-ratio-pe
      - id: unusual-alignment-pe
