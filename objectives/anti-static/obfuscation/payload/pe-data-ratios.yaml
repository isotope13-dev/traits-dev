defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: low-code-to-data-ratio-pe
    desc: "Very low code-to-data ratio (large PE payload)"
    crit: component
    conf: 0.9
    size_max: 31457280
    if:
      type: metrics
      field: binary.code_to_data_ratio
      max: 0.1
    unless:
      - type: metrics
        field: binary.import_density
        max: 0
      - type: metrics
        field: binary.data_entropy
        max: 4.0
      - type: metrics
        field: pe.rsrc_size
        min: 131072
      - type: metrics
        field: binary.export_count
        min: 200
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: metadata/signed/platform::microsoft
        - type: raw
          regex: "Qt\\dCore\\.dll"
  - id: unusual-alignment-pe
    desc: "Unusual PE section alignment"
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: pe.unusual_alignment
      min: 1
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/resource::kernel-driver-idata
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: well-known/app/graphics::ncapture-binary
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-metadata
composite_rules:
  - id: pe-packed-dropper-anomaly
    desc: "PE extreme data-to-code ratio with unusual alignment"
    crit: suspicious
    conf: 0.95
    all:
      - id: low-code-to-data-ratio-pe
      - id: unusual-alignment-pe
