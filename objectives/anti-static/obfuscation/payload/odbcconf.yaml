defaults:
  platforms: [windows]
  for: [pe]
  crit: suspicious
  conf: 0.85
traits:
  - id: odbcconf-subversion
    desc: odbcconf command file subversion
    attack: T1218.008
    size_min: 1000
    if:
      type: encoded
      encoding: wide
      regex: "odbcconf.{0,50} /f .{0,50}\\.rsp"
      case_insensitive: true
  - id: command-file-directory-pivot
    desc: Directory pivot combined with command file execution
    if:
      type: encoded
      encoding: wide
      regex: "cd /d .{0,50} && .{0,50} /f .{0,50}\\.rsp"
      case_insensitive: true
