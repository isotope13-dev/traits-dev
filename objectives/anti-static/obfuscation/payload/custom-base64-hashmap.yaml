# Custom Base64 Decoder using Hash Maps
# Detects a specific obfuscation technique where the Base64 alphabet is dynamically inserted into a std::unordered_map
# and the payload is decoded using the BFI (Bitfield Insert) instruction in a loop.
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [macos]
  for: [macho]
  mbc: "B0032"
  attack: "T1027.002"
traits:
  - id: custom-base64-hashmap-decoder
    desc: "Custom Base64 BFI decoder loop"
    crit: suspicious
    conf: 0.95
    if:
      type: hex
      # 37 65 1a 33 : bfi w23, w9, 6, 0x1a (inserts 6-bit Base64 value)
      # 1f 09 00 71 : cmp w8, 2
      # ?? ?? ?? 54 : b.lt ...
      # 18 39 00 11 : add w24, w8, 0xe
      pattern: "37 65 1a 33 1f 09 00 71 ?? ?? ?? 54 18 39 00 11"
composite_rules:
  - id: hashmap-base64-dropper
    desc: "macOS dropper using dynamically generated Base64 map"
    crit: hostile
    conf: 0.95
    all:
      - id: custom-base64-hashmap-decoder
      - id: micro-behaviors/process/create/shell::c-exec-variants
