defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: encrypted-memory-loader
    desc: Encrypted PE payload prepared for execution
    crit: hostile
    conf: 0.96
    for: [pe]
    all:
      - id: metadata/binary/section/metrics::high-entropy-rdata-section
      - id: micro-behaviors/crypto/symmetric/aes/library::rust-aes-crate-path
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/
      - id: well-known/app/
      - id: well-known/tool/development/
  - id: hermit-crab-dropper
    desc: "Tiny loader with massive encrypted payload (Hermit Crab pattern)"
    crit: hostile
    conf: 0.95
    all:
      # Code/Data Ratio: Data section is massive compared to text
      - id: objectives/anti-static/obfuscation/payload/section::data-section-dominant
      # Entropy: The massive section is encrypted
      - id: metadata/binary/section/metrics::high-entropy-rdata-section
      # Capability: The intent to execute that data
      - id: micro-behaviors/mem/protect/modify::virtual-protect
