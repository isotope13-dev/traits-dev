# Concealed High-Entropy Region (intent: payload concealment)
#
# A localized region far more random than the file as a whole — an encrypted or
# compressed payload hidden inside low-entropy padding (binaries) or readable
# source (scripts). Whole-file and section-level entropy average such a region
# away, so the existing section-entropy traits never see it; the windowed
# peak-region measurements (metadata/file/metrics/entropy-region) surface it.
#
# The discriminator is contrast: a high peak while the file overall stays
# low-entropy. That self-excludes packers and archives (their overall entropy
# is high) without an allowlist. ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [windows, unix]
  attack: T1027
composite_rules:
  # Script case: an encoded blob (~6.0 base64, or higher) embedded in otherwise
  # readable source. The absolute bar is lower because base64 caps at 6.0; the
  # low-overall contrast keeps it off normal code and off mostly-blob files.
  - id: concealed-encoded-region-in-source
    desc: Encoded payload region in readable source
    crit: notable
    conf: 0.82
    for: [scripts, -javascript, -typescript]
    all:
      - id: metadata/file/metrics::peak-region-encoded-entropy
      - id: metadata/file/metrics::low-overall-entropy-source
      - id: metadata/file/metrics::script-peak-region-over-1k
    unless:
      - id: metadata/signed/certificate/identity::powershell-signature-block
      - id: well-known/lib/swagger-ui::swagger-ui-bundle-marker
      - id: micro-behaviors/communications/url/encoded::inline-font-data-uri-context
      - id: micro-behaviors/communications/url/encoded::inline-svg-data-uri-context
      - id: metadata/file/profile/language::script-han
      - id: well-known/app/nodpy::nodpy-package-context
      - id: well-known/lib/regula-facesdk::official-face-components-context
      - id: well-known/lib/iconv-lite::iconv-lite-decoding-table-runtime
      - id: metadata/lang/scripted::dts-declaration-file
  - id: concealed-overlay-memory-loader
    desc: Concealed PE payload paired with executable-memory modification
    crit: hostile
    conf: 0.96
    attack: T1027,T1620
    for: [pe, dll]
    all:
      - id: metadata/file/metrics::low-entropy-binary-with-dense-region
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::low-entropy-overlay-inflation
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-memory-allocation-protection-api-pair
      - id: micro-behaviors/data/control-flow/dispatch::indirect-call-r13-x64
      - id: micro-behaviors/data/embedded/payload/header::inline-mz-magic-check
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
  - id: vb6-concealed-high-entropy-dispatch
    desc: VB6 concealed dispatch with high-entropy region
    crit: hostile
    conf: 0.96
    for: [pe, dll]
    all:
      - id: metadata/binary/framework::vb6-application-framework
      - id: micro-behaviors/dylib/lookup::vb6-runtime-api-dispatch
      - id: metadata/file/metrics::peak-region-cipher-entropy
      - id: metadata/file/metrics::binary-peak-region-mass-over-1k
    any:
      - id: micro-behaviors/dylib/lookup::vb6-dll-function-call
      - id: micro-behaviors/data/string/runtime::vb6-ordinal-string-transformation
  - id: pe-rwx-concealed-payload-carrier
    desc: PE RWX section conceals encrypted payload
    crit: hostile
    conf: 0.99
    attack: T1027,T1027.009
    for: [pe, dll]
    all:
      - id: metadata/file/metrics::low-entropy-binary-with-dense-region
      - id: objectives/anti-static/pack/section-anomaly::reloc-rwx-payload-section
      - id: objectives/anti-static/pack/section-anomaly::reloc-dominates-image
