# Concealment pattern: empty executable code combined with a
# cipher-entropy overlay indicates a packed or staged payload.
defaults:
  platforms: [windows]
  attack: T1027

composite_rules:
  - id: embedded-cipher-payload
    desc: Empty code with cipher-entropy overlay
    crit: suspicious
    conf: 0.98
    for: [pe]
    all:
      - id: objectives/anti-static/obfuscation/payload/section::empty-text-section
      - id: metadata/binary/layout::high-entropy-overlay
      - id: metadata/binary/layout::overlay-dominates-third
