# Python AES-encrypted payload crypter (PyInstaller stealer stub).
#
# Blank Grabber, Luna/Empyrean-family grabbers and generic Python crypters ship
# a stub whose real stealer is an AES-encrypted, base64-encoded blob decrypted at
# runtime with a PBKDF2-derived key, then executed. The clear-text stub therefore
# carries: a multi-megabyte base64 constant + PyCryptodome's Cipher/KDF/Padding
# modules. None of these survive as `from Crypto.X import Y` source once compiled,
# so the detection runs on the bytecode-visible dotted module names.
#
# The discriminator from benign PyCryptodome use is the *embedded blob*: a normal
# program that uses AES encrypts data it receives, it does not carry a megabyte
# base64 payload alongside the cipher. Pairing the blob with the cipher and the
# PyCryptodome KDF crypter fingerprint is the packed-payload signature. Padding
# alone is normal AES-CBC application crypto, so it is not enough for hostile.
defaults:
  platforms: [windows, unix]
  for: [python, pyc]
  attack: T1027.002
  mbc: B0032
composite_rules:
  - id: python-aes-encrypted-payload-blob
    desc: Python AES-encrypted packed payload blob
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/anti-static/obfuscation/encoding/base64::embedded-base64-blob
      - id: micro-behaviors/crypto/symmetric/aes/library::pycrypto-cipher-module-ref
      - id: micro-behaviors/crypto/kdf/algorithm::pycryptodome-kdf-module-ref
