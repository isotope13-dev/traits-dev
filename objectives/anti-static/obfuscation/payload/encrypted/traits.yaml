defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [binaries]
  attack: T1027
  mbc: B0032
traits:
  - id: xixa-marker
    desc: Xixa obfuscation marker string
    crit: suspicious
    conf: 0.95
    for:
      - elf
    attack: T1027.002
    if:
      type: string_value
      exact: Xixa
  - id: large-const-section
    desc: Large __const section (>80% of
    crit: suspicious
    conf: 0.8
    for:
      - macho
    size_min: 50000
    if:
      type: section_ratio
      section: __const
      compare_to: total
      min: 0.8
  - id: large-data-section
    desc: Large .data section (>70% of
    crit: notable
    conf: 0.75
    for:
      - elf
      - pe
    size_min: 20000
    if:
      type: section_ratio
      section: \.data
      compare_to: total
      min: 0.7
    downgrade:
      all:
        - id: metadata/format::many-imports
        - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-a
      any:
        - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-b
        - id: metadata/format::many-functions
        - id: metadata/quality/versioning::pe-version-resource
  - id: tiny-cstring
    desc: Tiny __cstring section (<0.1% of
    crit: notable
    conf: 0.7
    for:
      - macho
    if:
      type: section_ratio
      section: __cstring
      compare_to: total
      max: 0.001
    unless:
      - id: metadata/signed/platform::apple
      - type: metrics
        field: binary.string_count
        min: 1000
  - id: minimal-text
    desc: Small code section (<5% of
    crit: notable
    conf: 0.65
    for:
      - macho
    if:
      type: section_ratio
      section: __text
      compare_to: total
      max: 0.05
  - id: high-entropy-const
    desc: High entropy in __const section
    crit: notable
    conf: 0.6
    mbc: C0027
    for:
      - macho
    if:
      type: section
      exact: __const
      entropy_min: 7.5
  - id: high-entropy-data
    desc: High entropy in data section
    crit: notable
    conf: 0.6
    mbc: C0027
    for:
      - elf
      - pe
    if:
      type: section
      regex: \.(data|rdata|rodata)
      entropy_min: 7.5
    downgrade:
      any:
        - type: raw
          substr: Qt6Core.dll
        - id: metadata/format::many-imports
        - id: objectives/anti-static/pack/detect::aspack-marker
  - id: high-entropy-rsrc
    desc: High entropy in .rsrc section
    crit: notable
    conf: 0.6
    mbc: C0027
    for:
      - pe
      - dll
    if:
      type: section
      exact: .rsrc
      entropy_min: 7.0
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/format::many-imports
        - id: metadata/format/installer::nsis-sfx-deadbeef-magic
  - id: dominant-rsrc-section
    desc: Dominant .rsrc section (>60% of binary)
    crit: notable
    conf: 0.7
    platforms:
      - windows
    for:
      - pe
      - dll
    size_min: 20000
    if:
      type: section_ratio
      section: \.rsrc
      compare_to: total
      min: 0.6
    unless:
      - id: metadata/format/pe::resource-only-dll
      - id: metadata/format/document/help2::help2-container
      - type: section
        exact: .rsrc
        entropy_max: 2.0
  - id: high-entropy-text
    desc: High entropy in code section
    crit: suspicious
    conf: 0.9
    mbc: B0032.002
    if:
      type: section
      regex: (__text|\.text)
      length_min: 8192
      length_max: 8388608
      entropy_min: 7.0
    unless:
      - id: metadata/format/pe::dotnet-assembly
      - id: metadata/format/pe::dotnet-metadata
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy-known-fps
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/format/pe::unity-player-framework
        - id: objectives/anti-static/pack/detect::aspack-marker
        - id: objectives/anti-static/pack/detect::upx-marker
  - id: string-concealment
    desc: Very few visible strings (<10)
    crit: notable
    conf: 0.7
    size_min: 51200
    if:
      type: string_count
      max: 10
      min_length: 4
    unless:
      - id: metadata/format::small-elf-binary
      - id: metadata/format::many-imports
      - id: metadata/format::many-functions
      - id: metadata/internal/symbols::icv_iconv
      - type: basename
        regex: ^[^/]+%[^/]+\.so(\.\d+)*$
    downgrade:
      any:
        - type: metrics
          field: binary.section_count
          max: 4
        - type: metrics
          field: binary.function_count
          max: 0
  - id: no-strings-dup
    desc: No visible strings in binary
    crit: suspicious
    conf: 0.8
    if:
      type: string_count
      max: 0
      min_length: 4
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - type: section
          regex: ^(UPX\d|\.upx)
        - type: raw
          substr: PECompac
    unless:
      - id: metadata/format::many-imports
      - id: metadata/format::many-functions
      - type: metrics
        field: binary.import_count
        min: 80
      - type: metrics
        field: binary.function_count
        min: 30
  - id: math-cipher-imports
    desc: Math functions (cipher indicator) with
    crit: suspicious
    conf: 0.85
    for:
      - macho
    if:
      type: import_combination
      required:
        - ^_?system$
      suspicious:
        - ^_?(cos|sin|tan|exp|pow|log|sqrt|fmod|hypot|log1p)$
      min_suspicious: 4
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/format::many-imports
  - id: minimal-imports
    desc: Very few imports (<50) with
    crit: notable
    conf: 0.7
    if:
      type: import_combination
      required:
        - ^_?system$
      max_total: 50
composite_rules:
  - id: encrypted-payload-dropper
    desc: Encrypted payload dropper (large encrypted
    crit: suspicious
    conf: 0.9
    for:
      - macho
    needs: 2
    any:
      - id: large-const-section
      - id: high-entropy-const
      - id: tiny-cstring
      - id: minimal-text
      - id: string-concealment
    unless:
      - id: well-known/tools/sysadmin/par-launcher::par-env-vars
      - type: string_value
        substr: PAR_TEMP
  - id: cipher-dropper
    desc: Cipher-based dropper (math imports +
    crit: suspicious
    conf: 0.9
    mbc: C0027
    for:
      - macho
    all:
      - id: math-cipher-imports
      - id: high-entropy-const
    any:
      - id: string-concealment
      - id: tiny-cstring
  - id: elf-encrypted-dropper
    desc: Encrypted payload dropper (ELF)
    crit: suspicious
    conf: 0.85
    for:
      - elf
    all:
      - id: high-entropy-data
    any:
      - id: large-data-section
      - id: string-concealment
  - id: anonymous-payload-section
    desc: Anonymous encrypted payload section
    crit: suspicious
    conf: 0.95
    for:
      - pe
      - dll
    all:
      - id: metadata/binary/section::anonymous-pe-section-high-entropy
    any:
      - id: metadata/quality/versioning::pe-version-resource
      - id: metadata/format::no-functions
      - id: metadata/format/pe::legacy-few-sections
    needs: 2
  - id: anonymous-section-loader
    desc: Anonymous payload section with loader
    crit: suspicious
    conf: 0.97
    for:
      - pe
      - dll
    all:
      - id: anonymous-payload-section
    any:
      - id: micro-behaviors/data/embedded/payload::pe-resource-loader-api-chain
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/process/thread/create::create-thread
    needs: 2
  - id: obfuscated-macos-daemon-dropper
    desc: Obfuscated macOS daemon dropper (encrypted payload
    crit: hostile
    conf: 0.92
    for:
      - macho
    all:
      - id: high-entropy-const
      - id: tiny-cstring
    any:
      - id: objectives/persistence/system/daemon/init::macos-double-fork-daemon
      - id: micro-behaviors/process/create/shell::shell-execution
  - id: obfuscated-elf-daemon-dropper
    desc: Obfuscated ELF daemon dropper (embedded payload
    crit: hostile
    conf: 0.88
    platforms:
      - linux
    for:
      - elf
    size_max: 2097152
    all:
      - id: micro-behaviors/data/embedded/payload::lzma-magic
      - id: objectives/persistence/system/daemon/init::daemon-fork
    any:
      - id: micro-behaviors/process/create/shell::shell-execution
      - id: micro-behaviors/process/create/shell::shell-execution-indicators
    unless:
      - id: metadata/format::many-imports
  - id: x64-xor-decrypt-loop
    desc: XOR decryption loop with PEB or payload
    crit: suspicious
    conf: 0.85
    attack: T1140
    for:
      - pe
      - dll
    all:
      - id: micro-behaviors/crypto/symmetric/xor::x64-xor-indexed-byte-loop
    any:
      - id: objectives/anti-static/obfuscation/imports::peb-access-x64
      - id: objectives/anti-static/obfuscation/imports::pe-export-walk-primitive
      - id: high-entropy-rsrc
      - id: dominant-rsrc-section
    needs: 1
  - id: pe-encrypted-resource-with-evasion
    desc: PE encrypted resource with anti-analysis
    crit: suspicious
    conf: 0.88
    for:
      - pe
      - dll
    all:
      - id: dominant-rsrc-section
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
    any:
      - id: micro-behaviors/process/enumerate/psapi::enum-processes
      - id: micro-behaviors/process/enumerate/psapi::psapi-process-scan
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
