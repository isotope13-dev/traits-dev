defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [binaries]
  attack: T1027
  mbc: B0032
traits:
- id: xixa-marker
  desc: Xixa obfuscation marker string
  crit: suspicious
  conf: 0.95
  for:
  - elf
  attack: T1027.002
  if:
    type: text
    exact: Xixa
- id: large-const-section
  desc: Large __const section (>80% of
  crit: suspicious
  conf: 0.8
  for:
  - macho
  size_min: 50000
  if:
    type: section
    compare_to: total
    size_ratio_min: 0.8
    substr: __const
  unless:
  - type: section
    regex: __const$
    entropy_max: 6.2
  - type: metrics
    field: binary.string_count
    min: 50
  - type: metrics
    field: binary.string_count
    min: 1000
- id: large-data-section
  desc: Large .data section (>70% of
  crit: component
  conf: 0.75
  for:
  - elf
  - pe
  size_min: 20000
  if:
    type: metrics
    field: binary.data_to_file_ratio
    min: 0.7
  unless:
  - id: well-known/tool/dual-use/zprotect::zprotect-plugin
  - type: text
    substr: X3DOM Runtime, http://www.x3dom.org/
  downgrade:
    all:
    - id: metadata/binary/metrics/structural::many-imports
    - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-a
    any:
    - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-b
    - id: metadata/binary/metrics/structural::many-functions
    - id: metadata/package/versioning::pe-version-resource
- id: tiny-cstring
  desc: Tiny __cstring section (<0.1% of
  crit: suspicious
  conf: 0.7
  for:
  - macho
  if:
    type: section
    compare_to: total
    size_ratio_max: 0.001
    substr: __cstring
  not:
  - regex: \.o$
  unless:
  - id: tiny-cstring-known-benign-context
  # A tiny __cstring section is the norm for Go Mach-O binaries (Go keeps its
  # strings in pclntab/rodata, not __cstring), so this is not a concealment
  # signal there.
  - id: metadata/lang/compiled::go-runtime-marker

- id: minimal-text
  desc: Small code section (<5% of file)
  crit: suspicious
  conf: 0.65
  for:
  - macho
  if:
    type: metrics
    field: binary.text_to_file_ratio
    max: 0.05
  unless:
  - id: metadata/binary/framework::macos-framework-or-runtime
  - id: metadata/signed/platform::apple
  - id: metadata/binary/metrics/structural::sparse-functions
  - id: metadata/binary/layout::macho-object-file
  - id: well-known/lib/jvm
  - type: metrics
    field: exports.count
    min: 20
- id: gcc-amd64-darwin-exec-debug-basename
  desc: gcc-amd64-darwin exec debug basename
  crit: component
  conf: 0.95
  for:
  - macho
  if:
    type: path
    basename: true
    exact: gcc-amd64-darwin-exec-debug
- id: high-entropy-const
  desc: High entropy in __const section
  crit: suspicious
  conf: 0.6
  mbc: C0027
  for:
  - macho
  if:
    type: section
    exact: __const
    entropy_min: 7.5
- id: high-entropy-rsrc
  desc: High entropy in .rsrc section
  crit: notable
  conf: 0.6
  mbc: C0027
  for:
  - pe
  if:
    type: section
    exact: .rsrc
    length_min: 131072
    entropy_min: 7.0
  unless:
  - id: well-known/app/swifttunnel_vpn::swifttunnel
  - id: well-known/app/mcafee-epolicy::mcafee-epolicy-migration
  downgrade:
    any:
    - id: metadata/signed/leaf::malwarebytes-inc
    - id: well-known/app/drivers/
    - id: metadata/binary/installer/script::nsis-sfx-deadbeef-magic
    - id: metadata/binary/layout::import-rich-versioned-pe
    - type: metrics
      field: binary.overall_entropy
      max: 4.0
- id: high-entropy-text
  desc: High entropy in code section
  crit: suspicious
  conf: 0.9
  mbc: B0032.002
  if:
    type: section
    regex: (__text|\.text)
    length_min: 8192
    length_max: 8388608
    entropy_min: 7.0
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-code-entropy-known-fps
  - type: metrics
    field: binary.string_count
    min: 100
  - type: basename
    regex: ^lib.*\.(dylib|so)(\.\d+)*$
  downgrade:
    any:
    - id: metadata/signed/platform::apple
    - id: high-entropy-text-soft-fp
- id: string-concealment
  desc: Very few visible strings (<10)
  crit: suspicious
  conf: 0.7
  size_min: 51200
  if:
    type: metrics
    field: binary.string_count
    max: 10
  not:
  - regex: '\.(node|pak)$'
  - regex: '\.(dat|map)$'
  - regex: '^(snapshot_blob|v8_context_snapshot)\.bin$'
  unless:
  - type: basename
    regex: '\.(node|pak|map|asar)$'
  - type: basename
    regex: '(\.deb|\.gz|snapshot_blob\.bin|v8_context_snapshot\.bin)$'
  - id: metadata/binary/metrics/structural::small-elf-binary
  - id: string-scarcity-rich-binary
  - type: basename
    regex: '^[^/]+%[^/]+\.so(\.\d+)*$'
  # Extracted embedded sub-objects (eBPF bytecode, packer payloads) are
  # intrinsically string-sparse, not concealed standalone payloads. The synthetic
  # sub-object path carries the `!!embedded` marker. (Replaced the niche
  # icv_iconv symbol soft-FP, which the broader embedded gate subsumes in practice.)
  - type: path
    regex: '!!embedded'
  downgrade:
    any:
    - id: string-scarcity-soft-fp

- id: no-strings-dup
  desc: No visible strings in binary
  crit: suspicious
  conf: 0.8
  size_min: 65536
  if:
    type: metrics
    field: binary.string_count
    max: 0
  not:
  - regex: '^snapshot_blob\.bin$'
  - regex: '^v8_context_snapshot\.bin$'
  unless:
  - type: basename
    regex: '\.(node|pak|dat|map)$'
  - type: basename
    regex: '\.(asar|svg|ttf|woff2?)$'
  - type: basename
    regex: '(\.deb|\.gz|snapshot_blob\.bin|v8_context_snapshot\.bin)$'
  - id: string-scarcity-rich-binary
  - type: metrics
    field: imports.count
    min: 80
  - type: metrics
    field: binary.func_count
    min: 30
  downgrade:
    any:
    - id: no-strings-soft-fp
- id: zero-function-count
  desc: Zero recovered functions
  crit: component
  conf: 0.7
  if:
    type: metrics
    field: binary.func_count
    max: 0
  unless:
  - type: basename
    regex: '^(ls\.macOS|liblzma\.so\.5\.4\.5)$'
- id: upx-section-marker
  desc: UPX section naming marker
  crit: component
  conf: 0.8
  if:
    type: section
    regex: ^(UPX\d|\.upx)
- id: pecompact-marker
  desc: PECompact marker string
  crit: component
  conf: 0.85
  if:
    id: micro-behaviors/data/encode/pecompact::pecompact-signature
  # Atomic libm imports for the math-cipher cluster (Mach-O custom crypto
  # typically pulls multiple libm functions + system()).  system() itself
  # lives in `micro-behaviors/process/create/shell/invoke::system-fn`.
- id: libm-cos-import
  desc: libm cos import
  crit: component
  conf: 0.4
  for: [macho]
  if:
    type: import
    regex: ^_?cos$
- id: libm-sin-import
  desc: libm sin import
  crit: component
  conf: 0.4
  for: [macho]
  if:
    type: import
    regex: ^_?sin$
- id: libm-tan-import
  desc: libm tan import
  crit: component
  conf: 0.4
  for: [macho]
  if:
    type: import
    regex: ^_?tan$
- id: libm-exp-import
  desc: libm exp import
  crit: component
  conf: 0.4
  for: [macho]
  if:
    type: import
    regex: ^_?exp$
- id: libm-pow-import
  desc: libm pow import
  crit: component
  conf: 0.4
  for: [macho]
  if:
    type: import
    regex: ^_?pow$
- id: libm-log-import
  desc: libm log import
  crit: component
  conf: 0.4
  for: [macho]
  if:
    type: import
    regex: ^_?log$
- id: libm-sqrt-import
  desc: libm sqrt import
  crit: component
  conf: 0.4
  for: [macho]
  if:
    type: import
    regex: ^_?sqrt$
- id: libm-fmod-import
  desc: libm fmod import
  crit: component
  for: [macho]
  if:
    type: import
    regex: ^_?fmod$
- id: libm-hypot-import
  desc: libm hypot import
  crit: component
  for: [macho]
  if:
    type: import
    regex: ^_?hypot$
- id: libm-log1p-import
  desc: libm log1p import
  crit: component
  for: [macho]
  if:
    type: import
    regex: ^_?log1p$
- id: dominant-rsrc-entropy-threshold
  desc: Dominant .rsrc entropy threshold
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: pe.rsrc_entropy
    min: 6.6
- id: major-rsrc-entropy-threshold
  desc: Major .rsrc entropy threshold
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: pe.rsrc_entropy
    min: 6.4
composite_rules:
- id: tiny-cstring-known-benign-context
  desc: Benign tiny __cstring context
  crit: component
  conf: 0.95
  any:
  - id: metadata/binary/framework::macos-framework-or-runtime
  - id: metadata/signed/platform::apple
  - id: metadata/binary/metrics/structural::sparse-functions
  - id: metadata/binary/layout::macho-object-file
  - id: metadata/binary/linking/runtime::cosmopolitan-ape-runtime
  - id: gcc-amd64-darwin-exec-debug-basename
  - id: well-known/lib/jvm
  - id: metadata/binary/metrics/threshold::string-count-1000-plus
  - id: metadata/package/testing/presence/harness::binary-test-directory
- id: dominant-rsrc-section
  desc: Dominant .rsrc section
  crit: suspicious
  conf: 0.7
  all:
  - id: metadata/binary/section/metrics::dominant-rsrc-section
  - id: dominant-rsrc-entropy-threshold
  downgrade:
    any:
    - id: well-known/app/drivers/
    - id: well-known/app/mcafee-epolicy::mcafee-epolicy-migration
    - id: well-known/app/protected-benign-pe/
    - id: well-known/app/atlantis::atlantis-word-processor-installer
- id: major-rsrc-section
  desc: Major .rsrc section
  crit: suspicious
  conf: 0.8
  all:
  - id: metadata/binary/section/metrics::major-rsrc-section
  - id: major-rsrc-entropy-threshold
  downgrade:
    any:
    - id: metadata/binary/layout::import-rich-versioned-pe
    - id: well-known/app/drivers/
    - id: well-known/app/mcafee-epolicy::mcafee-epolicy-migration
    - id: metadata/binary/framework::asprotect-protector-application
    - id: well-known/app/protected-benign-pe/
    - id: metadata/binary/installer/sfx::freearc-sfx
    - id: well-known/app/atlantis::atlantis-word-processor-installer
- id: string-scarcity-rich-binary
  desc: String-scarcity rich binary context
  crit: component
  conf: 0.9
  any:
  - id: metadata/binary/metrics/structural::many-imports
  - id: metadata/binary/metrics/structural::many-functions
- id: string-scarcity-soft-fp
  desc: String-scarcity soft false positives
  crit: component
  conf: 0.8
  any:
  - id: objectives/command-and-control/infrastructure/config::max-sections-4
  - id: zero-function-count
  # Embedded eBPF/relocatable object files (libbpf skeletons, .o) are
  # intrinsically string-sparse bytecode, not concealed payloads.
  - id: metadata/binary/metrics/structural::elf-relocatable-object
- id: no-strings-soft-fp
  desc: No-strings soft false positives
  crit: component
  conf: 0.85
  any:
  - id: metadata/signed/platform::apple
  - id: upx-section-marker
  - id: pecompact-marker
- id: high-entropy-text-soft-fp
  desc: Benign packed high entropy text profile
  crit: component
  conf: 0.75
  any:
  - id: metadata/binary/framework::unity-player-framework
  - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
  - id: objectives/anti-static/pack/detect::aspack-marker
  - id: objectives/anti-static/pack/detect::upx-marker
- id: encrypted-payload-dropper
  desc: Encrypted payload dropper (large encrypted __const)
  crit: suspicious
  conf: 0.9
  for:
  - macho
  all:
  - id: high-entropy-const
  any:
  - id: large-const-section
  - id: tiny-cstring
  - id: minimal-text
  - id: string-concealment
  unless:
  - id: metadata/binary/framework::macos-framework-or-runtime
  - id: metadata/binary/metrics/structural::few-functions
  - id: well-known/tool/sysadmin/par-launcher::par-env-vars
- id: math-cipher-imports
  desc: Math functions (cipher indicator) with system()
  crit: suspicious
  conf: 0.85
  for:
  - macho
  all:
  - id: micro-behaviors/process/create/shell/invoke::system-fn
  any:
  - id: libm-cos-import
  - id: libm-sin-import
  - id: libm-tan-import
  - id: libm-exp-import
  - id: libm-pow-import
  - id: libm-log-import
  - id: libm-sqrt-import
  - id: libm-fmod-import
  - id: libm-hypot-import
  - id: libm-log1p-import
  needs: 4
  downgrade:
    any:
    - id: metadata/signed/platform::apple
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/binary/framework::terminal-emulator
- id: minimal-imports
  desc: Very few imports (<=50) with system()
  crit: suspicious
  conf: 0.7
  for:
  - macho
  all:
  - id: micro-behaviors/process/create/shell/invoke::system-fn
  unless:
  - id: metadata/binary/metrics/threshold::many-imports-50
- id: cipher-dropper
  desc: Cipher-based dropper (math imports +
  crit: suspicious
  conf: 0.9
  mbc: C0027
  for:
  - macho
  all:
  - id: math-cipher-imports
  - id: high-entropy-const
  any:
  - id: string-concealment
  - id: tiny-cstring
- id: elf-encrypted-dropper
  desc: Encrypted payload dropper (ELF)
  crit: suspicious
  conf: 0.85
  for:
  - elf
  all:
  - id: metadata/binary/metrics/structural::high-entropy-data
  any:
  - id: large-data-section
  - id: string-concealment
- id: anonymous-payload-section
  desc: Anonymous encrypted payload section
  crit: suspicious
  conf: 0.95
  for:
  - pe
  all:
  - id: metadata/binary/resource::anonymous-pe-section-high-entropy
  any:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/binary/metrics/structural::no-functions
  - id: metadata/binary/layout::legacy-few-sections
  needs: 2
  unless:
  - id: metadata/binary/framework::uharc-version-string
  - id: metadata/binary/layout::legacy-watcom-packed-utility
- id: anonymous-section-loader
  desc: Anonymous payload section with loader
  crit: suspicious
  conf: 0.97
  for:
  - pe
  all:
  - id: anonymous-payload-section
  any:
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-loader-api-chain
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/process/thread/create::create-thread
  needs: 2
- id: encrypted-script-payload-stager
  desc: Encrypted script payload staged in dominant data section
  crit: suspicious
  conf: 0.93
  for:
  - pe
  all:
  - id: large-data-section
  - id: metadata/binary/metrics/structural::few-functions
  any:
  - id: objectives/evasion/masquerade/extension/engine::wscript-engine-jscript-override
  - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
  - id: metadata/binary/metrics/structural::high-import-density
  needs: 2
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/installer/family::known-benign-installer
- id: obfuscated-macos-daemon-dropper
  desc: Obfuscated macOS daemon dropper (encrypted payload
  crit: hostile
  conf: 0.92
  for:
  - macho
  all:
  - id: high-entropy-const
  - id: tiny-cstring
  any:
  - id: objectives/persistence/system/daemon/init::macos-double-fork-daemon
  - id: micro-behaviors/process/create/shell/invoke::shell-execution
- id: obfuscated-elf-daemon-dropper
  desc: Obfuscated ELF daemon dropper (embedded payload
  crit: hostile
  conf: 0.88
  platforms:
  - linux
  for:
  - elf
  size_max: 2097152
  all:
  - id: micro-behaviors/data/embedded/payload/compression::lzma-magic
  - id: objectives/persistence/system/daemon/init::daemon-fork
  any:
  - id: micro-behaviors/process/create/shell/invoke::shell-execution
  - id: micro-behaviors/process/create/shell/invoke::shell-execution-indicators
  unless:
  - id: metadata/binary/metrics/structural::many-imports
- id: x64-xor-decrypt-loop
  desc: XOR decryption loop with PEB or payload
  crit: suspicious
  conf: 0.85
  attack: T1140
  for:
  - pe
  all:
  - id: micro-behaviors/crypto/symmetric/xor/loop::x64-xor-indexed-byte-loop
  any:
  - id: objectives/anti-static/obfuscation/imports::peb-access-x64
  - id: objectives/anti-static/obfuscation/imports::pe-export-walk-primitive
  - id: high-entropy-rsrc
  - id: dominant-rsrc-section
- id: pe-encrypted-resource-with-evasion
  desc: PE encrypted resource with anti-analysis
  crit: suspicious
  conf: 0.88
  for:
  - pe
  all:
  - id: dominant-rsrc-section
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  any:
  - id: micro-behaviors/process/enumerate/psapi::psapi-process-scan
  downgrade:
    any:
    - id: metadata/binary/installer/script::nsis
    - id: metadata/signed/developer
    - id: metadata/binary/vendor::is-microsoft-named
- id: crypted-pe-zero-imports
  desc: Crypted PE with high-entropy code and no imports
  crit: hostile
  conf: 0.95
  for:
  - pe
  size_min: 16384
  all:
  - id: high-entropy-text
  - id: metadata/binary/symbols/compat::zero-import-raw
  any:
  - id: objectives/anti-static/obfuscation/payload/section::packed-loader-largest-section-dominates
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::dominant-section
  - id: metadata/binary/layout::pe-checksum-zeroed
  - id: metadata/binary/metrics/structural::no-functions
  needs: 2
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/signed/platform::microsoft
  downgrade:
    any:
    - id: objectives/anti-static/pack/detect::upx-marker
    - id: objectives/anti-static/pack/detect::aspack-marker
