defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027,T1027.009,T1140

composite_rules:
  - id: obfuscated-runtime-api-dropper
    desc: Obfuscated native dropper with runtime API resolution and file staging
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/crypto/symmetric/xor/loop::x64-mask-xor-buffer-loop
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/fs/file/open::createfile-api-text-reference
      - id: micro-behaviors/fs/file/write/direct::writefile-api-text-reference
      - id: micro-behaviors/process/create/launch::create-process-api-name
      - id: metadata/binary/section/metrics::multiple-nonstandard-section-names
      - id: metadata/binary/layout::pe-multiple-tls-callbacks
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/framework/
