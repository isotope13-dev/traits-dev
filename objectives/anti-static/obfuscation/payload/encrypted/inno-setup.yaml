defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009
  mbc: B0032

composite_rules:
  - id: inno-pbkdf2-chacha-crypto-markers
    desc: Inno Setup PBKDF2 ChaCha crypto markers
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/crypto/kdf/algorithm::pbkdf2
      - id: micro-behaviors/crypto/library/keyword::chacha20-keyword

  - id: encrypted-inno-overlay-payload
    desc: Encrypted Inno Setup overlay payload
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/binary/layout::overlay-dominates-third
      - id: metadata/binary/layout::large-overlay-1mb
    any:
      - id: metadata/binary/installer/script::inno-setup-encryption-markers
      - id: inno-pbkdf2-chacha-crypto-markers
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-entropy-overlay-raw
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::binary-encrypted-overlay
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer::open-source-developer
