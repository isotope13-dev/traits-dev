defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009
  mbc: B0032

composite_rules:
  - id: encrypted-inno-overlay-payload
    desc: Encrypted Inno Setup overlay payload
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/binary/installer/script::inno-setup-encryption-markers
      - id: metadata/binary/layout::overlay-dominates-third
      - id: metadata/binary/layout::large-overlay-1mb
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-entropy-overlay-raw
      - id: objectives/anti-static/obfuscation/binary-metrics::binary-encrypted-overlay
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/developer::open-source-developer
