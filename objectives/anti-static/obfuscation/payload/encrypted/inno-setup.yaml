defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009
  mbc: B0032

composite_rules:
  - id: zero-width-encrypted-inno-overlay-payload
    desc: Zero-width-marked encrypted Inno overlay payload
    crit: hostile
    conf: 0.99
    attack: T1027,T1027.009
    all:
      - id: objectives/anti-static/obfuscation/anti-decompile::zero-width-managed-pe-marker-206d
      - id: objectives/anti-static/obfuscation/anti-decompile::zero-width-managed-pe-marker-206f
      - id: metadata/binary/installer/family::inno-delphi-installer-foundation
      - id: metadata/binary/layout::high-entropy-overlay
      - id: metadata/binary/layout::overlay-dominates-90pct
      - id: micro-behaviors/crypto/kdf/algorithm::pbkdf2
      - id: micro-behaviors/crypto/symmetric/stream::chacha20-keyword

  - id: inno-pbkdf2-chacha-crypto-markers
    desc: Inno Setup content-encryption markers
    crit: notable
    conf: 0.94
    all:
      - id: metadata/binary/installer/script::inno-setup-installer-data
      - id: micro-behaviors/crypto/kdf/algorithm::pbkdf2
      - id: micro-behaviors/crypto/symmetric/stream::chacha20-keyword

  - id: malformed-unsigned-inno-crypto-stage
    desc: Malformed unsigned encrypted Inno stage
    crit: hostile
    conf: 0.98
    all:
      - id: inno-pbkdf2-chacha-crypto-markers
      - id: metadata/binary/layout::pe-no-signature-record
      - id: metadata/binary/layout::pe-checksum-zeroed

  - id: encrypted-inno-overlay-payload
    desc: Opaque nested Inno overlay payload
    crit: suspicious
    conf: 0.97
    all:
      - id: objectives/command-and-control/dropper/execution/windows-loader::inno-550-data-in-overlay
      - id: metadata/binary/layout::overlay-dominates-third
      - id: metadata/binary/layout::large-overlay-1mb
      - id: metadata/binary/layout::high-entropy-overlay
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer::open-source-developer

  - id: encrypted-inno-privileged-reboot-loader
    desc: Encrypted Inno privileged reboot loader
    crit: hostile
    conf: 0.98
    all:
      - id: encrypted-inno-overlay-payload
      - id: objectives/impact/system/shutdown::shutdown-privilege-reboot-api
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
