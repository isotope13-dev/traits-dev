defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1027

composite_rules:
  - id: msi-high-entropy-cabinet-payload
    desc: MSI contains a near-random cabinet payload
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/binary/installer/database::msi-filename
      - id: metadata/binary/installer/database::embedded-mscf-cabinet
      - id: metadata/binary/installer/database::msi-opaque-ole-stream-names
      - id: metadata/document/ole::ole-high-entropy
