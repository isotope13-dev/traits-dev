defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1027

composite_rules:
  - id: opaque-wix-msi-fabricated-identity
    desc: Opaque WiX MSI uses unrelated summary identities
    crit: hostile
    conf: 0.98
    attack: T1036.005,T1027,T1195.002
    for: [all]
    size_min: 10000000
    all:
      - id: metadata/package/files/msi::msi-wix-toolset-branding
      - id: metadata/package/files/msi::msi-opaque-stream-cluster
      - id: metadata/package/files/msi::msi-nonstandard-subject-identity
      - id: metadata/package/files/msi::msi-nonstandard-creator-identity

  - id: adobe-opaque-wix-msi-masquerade
    desc: Adobe-branded WiX MSI hides a payload in opaque streams
    crit: hostile
    conf: 0.99
    attack: T1036.005,T1027,T1195.002
    for: [all]
    size_min: 10000000
    all:
      - id: metadata/package/files/msi::msi-adobe-acrobat-subject
      - id: metadata/package/files/msi::msi-adobe-acrobat-creator
      - id: metadata/package/files/msi::msi-wix-toolset-branding
      - id: metadata/package/files/msi::msi-opaque-stream-cluster

  # Fires when MSI is routed as OleDoc (pack bytes + entropy visible).
  - id: encrypted-native-node-loader-msi
    desc: MSI combines encrypted pack and native loader
    crit: hostile
    conf: 0.99
    attack: T1027,T1620,T1195.002
    all:
      - id: metadata/file/profile/identity::spk2-pack-header
      - id: metadata/file/profile/identity::high-entropy-msi-container
      - id: metadata/file/profile/identity::native-node-loader-filename

  # Identity + oversized container — works under msi→Unknown routing via
  # for:[all] value atoms (pack bytes are invisible on that path).
  - id: oversized-node-runtime-encrypted-lure
    desc: Oversized Node Runtime MSI lure with WiX identity
    crit: hostile
    conf: 0.97
    for: [all]
    attack: T1027,T1036.005,T1195.002
    all:
      - id: metadata/package/files/msi::node-runtime-subject
      - id: metadata/package/files/msi::nodejs-foundation-creator
      - id: metadata/package/files/msi::oversized-node-runtime-msi
      - id: metadata/package/files/msi::wix-toolset-application
