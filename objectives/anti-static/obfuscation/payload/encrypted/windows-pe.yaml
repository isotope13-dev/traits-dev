defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
  mbc: B0032
traits:
  - id: fixed-size-stack-payload-copy
    desc: Fixed-size encrypted payload copy
    crit: component
    conf: 0.9
    arch: [x86]
    size_max: 262144
    if:
      type: hex
      section: .text
      pattern: 81 EC 68 0B 00 00 [8-32] B9 65 0B 00 00 [0-16] BE ?? ?? ?? ?? F3 A4
  - id: bitshift-xor-byte-decrypt-loop
    desc: Bitshift-derived XOR decrypt loop
    crit: component
    conf: 0.92
    arch: [x86]
    if:
      type: hex
      section: .text
      pattern: 0F AD ?? F6 C1 20 C4 E2 ?? F7 ?? 0F 44 ?? 30 ?? ?? 00
composite_rules:
  - id: stack-copied-xor-payload
    desc: Stack-copied XOR payload decryptor
    crit: suspicious
    conf: 0.96
    all:
      - id: fixed-size-stack-payload-copy
      - id: bitshift-xor-byte-decrypt-loop
  - id: signed-high-entropy-overlay-wrapper
    desc: Signed compact PE with encrypted overlay payload
    crit: hostile
    conf: 0.96
    attack: T1027.009
    mbc: F0001.006
    ref: sha256:e5321904c73fdf4c0dd39ad5ebb7da2a1837c67aa892d2a268203da3ead9afa1
    all:
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-entropy-overlay-raw
      - id: metadata/binary/layout::large-overlay-1mb
      - id: metadata/binary/layout::overlay-dominates-third
    unless:
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/sfx/
      - id: micro-behaviors/fs/temp/pyinstaller/
  - id: api-resolved-surveillance-payload
    desc: API-resolved encrypted surveillance payload
    crit: hostile
    conf: 0.98
    attack: T1027,T1027.007,T1056.001,T1115
    all:
      - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
      - id: objectives/anti-static/obfuscation/payload/encrypted::medium-entropy-large-rsrc
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state-str
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data-text
      - id: micro-behaviors/communications/ip/literal::external-ipv4-pe-resource-string
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
