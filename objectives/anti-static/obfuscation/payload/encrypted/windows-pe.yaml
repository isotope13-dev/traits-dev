defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
  mbc: B0032
traits:
  - id: fixed-size-stack-payload-copy
    desc: Fixed-size encrypted payload copy
    crit: component
    conf: 0.9
    arch: [x86]
    size_max: 262144
    if:
      type: hex
      section: .text
      pattern: 81 EC 68 0B 00 00 [8-32] B9 65 0B 00 00 [0-16] BE ?? ?? ?? ?? F3 A4
  - id: bitshift-xor-byte-decrypt-loop
    desc: Bitshift-derived XOR decrypt loop
    crit: component
    conf: 0.92
    arch: [x86]
    if:
      type: hex
      section: .text
      pattern: 0F AD ?? F6 C1 20 C4 E2 ?? F7 ?? 0F 44 ?? 30 ?? ?? 00
composite_rules:
  - id: stack-copied-xor-payload
    desc: Stack-copied XOR payload decryptor
    crit: suspicious
    conf: 0.96
    all:
      - id: fixed-size-stack-payload-copy
      - id: bitshift-xor-byte-decrypt-loop
  - id: signed-high-entropy-overlay-wrapper
    desc: Signed compact PE with encrypted overlay payload
    crit: hostile
    conf: 0.96
    attack: T1027.009
    mbc: F0001.006
    ref: sha256:e5321904c73fdf4c0dd39ad5ebb7da2a1837c67aa892d2a268203da3ead9afa1
    all:
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-entropy-overlay-raw
      - id: metadata/binary/layout::large-overlay-1mb
      - id: metadata/binary/layout::overlay-dominates-third
    unless:
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/sfx/
      - id: micro-behaviors/fs/temp/pyinstaller/
