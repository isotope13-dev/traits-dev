defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
  mbc: B0032
traits:
  - id: nop-padded-dword-xor-decryptor
    desc: NOP-padded dword XOR decryptor
    crit: suspicious
    conf: 0.97
    arch: [x86]
    if:
      type: hex
      section: .ajelhf
      pattern: '60 [0-8] B8 ?? ?? ?? ?? [0-8] 6A 04 [0-8] 5F'

  - id: fixed-size-stack-payload-copy
    desc: Fixed-size encrypted payload copy
    crit: component
    conf: 0.9
    arch: [x86]
    size_max: 262144
    if:
      type: hex
      section: .text
      pattern: 81 EC 68 0B 00 00 [8-32] B9 65 0B 00 00 [0-16] BE ?? ?? ?? ?? F3 A4
  - id: bitshift-xor-byte-decrypt-loop
    desc: Bitshift-derived XOR decrypt loop
    crit: component
    conf: 0.92
    arch: [x86]
    if:
      type: hex
      section: .text
      pattern: 0F AD ?? F6 C1 20 C4 E2 ?? F7 ?? 0F 44 ?? 30 ?? ?? 00
composite_rules:
  - id: stack-copied-xor-payload
    desc: Stack-copied XOR payload decryptor
    crit: suspicious
    conf: 0.96
    all:
      - id: fixed-size-stack-payload-copy
      - id: bitshift-xor-byte-decrypt-loop
  - id: signed-high-entropy-overlay-wrapper
    desc: Signed compact PE with encrypted overlay payload
    crit: hostile
    conf: 0.96
    attack: T1027.009
    mbc: F0001.006
    ref: sha256:e5321904c73fdf4c0dd39ad5ebb7da2a1837c67aa892d2a268203da3ead9afa1
    all:
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-entropy-overlay-raw
      - id: metadata/binary/layout::large-overlay-1mb
      - id: metadata/binary/layout::overlay-dominates-third
    unless:
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/sfx/
      - id: micro-behaviors/fs/temp/pyinstaller/
  - id: api-resolved-surveillance-payload
    desc: API-resolved encrypted surveillance payload
    crit: hostile
    conf: 0.98
    attack: T1027,T1027.007,T1056.001,T1115
    all:
      - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
      - id: objectives/anti-static/obfuscation/payload/encrypted::medium-entropy-large-rsrc
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state-str
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data-text
      - id: micro-behaviors/communications/ip/literal::external-ipv4-pe-resource-string
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/

  - id: unsigned-native-crypto-file-io-payload
    desc: Unsigned encrypted native PE with direct NT file I/O
    crit: hostile
    conf: 0.97
    attack: T1027,T1106
    mbc: B0032,F0004
    for: [pe]
    all:
      - id: metadata/binary/section/metrics::high-entropy-rdata-section
      - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
      - id: micro-behaviors/crypto/symmetric/aes/constant::aes-sbox-bytes-pe-rdata
      - id: micro-behaviors/fs/file/open::nt-create-file
      - id: micro-behaviors/os/random/generator::system-function-036-symbol
      - id: metadata/binary/anomaly/provenance::pe-far-future-timestamp
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/

  # Structural-only signal for obfuscated networked stealers that resolve their
  # real APIs at runtime: both a writable .data and .rdata section are encrypted
  # (near-maximal entropy = decrypted-in-place config/strings), the binary pulls
  # in Winsock, and it carries no valid PE checksum (unsigned/tampered). Kept
  # suspicious (not hostile) because a lone packed-and-protected but benign tool
  # can share this geometry; the guards drop the common legitimate categories,
  # and one suspicious cannot by itself convict. Behavioral legs stay obfuscated
  # in samples like this, so this surfaces the anomaly for a verdict.
  - id: encrypted-networked-unsigned-payload
    desc: Unsigned PE with two encrypted sections and Winsock networking
    crit: suspicious
    conf: 0.9
    for: [pe]
    all:
      - id: metadata/binary/anomaly/signing::small-high-entropy-data-section
      - id: metadata/binary/anomaly/signing::high-entropy-rdata-section
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
      - id: metadata/binary/layout::pe-checksum-zeroed
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/
      - id: well-known/app/
      - id: well-known/lib/
  - id: high-entropy-rwx-pe-loader
    desc: High-entropy PE with executable memory staging
    crit: hostile
    conf: 0.98
    attack: T1027,T1055
    all:
      - id: metadata/binary/anomaly/signing::small-high-entropy-data-section
      - id: metadata/binary/anomaly/signing::high-entropy-rdata-section
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/
      - id: well-known/app/
  - id: hashed-writable-pe-stager
    desc: Hashed loader with writable PE data and executable memory staging
    crit: hostile
    conf: 0.98
    attack: T1027,T1055,T1620
    all:
      - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
      - id: metadata/binary/anomaly/signing::small-high-entropy-data-section
      - id: metadata/binary/section/names::writable-rdata
      - id: micro-behaviors/data/embedded/payload/header::pe-header-compare-immediate-multiple
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/

  - id: unsigned-reloc-overlay-pe-loader
    desc: Encrypted overlay with memory PE staging
    crit: hostile
    conf: 0.98
    attack: "T1027.009,T1620"
    for: [pe]
    all:
      - id: objectives/anti-static/pack/section-anomaly::reloc-overhang-dominant
      - id: metadata/binary/layout::overlay-over-90pct
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: well-known/tool/reverse-engineering/
