defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1027.013

traits:
  - id: vb6-loads-custom-stub-resource
    desc: VB6 loads custom stub resource
    crit: suspicious
    conf: 0.94
    if:
      type: text
      exact: Stub = LoadResData(101, "CUSTOM")

  - id: vb6-crypter-delimiter
    desc: VB6 encrypted payload delimiter
    crit: component
    conf: 0.96
    if:
      type: text
      exact: 65356g65/&/BtbN&967fn7/880GV(g=(c76fg(=gf80f80tt8t68R%78487e7)e759ed57e79r96r7rr/)r57er568/

  - id: vb6-hardcoded-decode-key
    desc: VB6 hardcoded decrypt key
    crit: component
    conf: 0.94
    if:
      type: text
      exact: g=(c76fg(=gf80f80tt8t68R%78487e7)

  - id: vb6-read-eof-overlay
    desc: VB6 reads EOF overlay
    crit: component
    conf: 0.93
    if:
      type: text
      substr: ReadEOFData(flatedit1.Text)

  - id: vb6-write-eof-overlay
    desc: VB6 writes EOF overlay
    crit: component
    conf: 0.93
    if:
      type: text
      substr: WriteEOFData(Environ$("TEMP") & "\Crypted.exe", EOF)

composite_rules:
  - id: vb6-preserves-eof-overlay
    desc: VB6 preserves EOF overlay
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/anti-static/obfuscation/payload/vb6-crypter::vb6-read-eof-overlay
      - id: objectives/anti-static/obfuscation/payload/vb6-crypter::vb6-write-eof-overlay

  - id: vb6-resource-stub-payload-builder
    desc: VB6 resource stub payload builder
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/payload/vb6-crypter::vb6-loads-custom-stub-resource
      - id: micro-behaviors/fs/file/read::vb6-full-binary-file-read-source
      - id: micro-behaviors/fs/file/write::vb6-temp-exe-binary-write
      - id: objectives/anti-static/obfuscation/payload/vb6-crypter::vb6-crypter-delimiter
    any:
      - id: objectives/anti-static/obfuscation/payload/vb6-crypter::vb6-preserves-eof-overlay
      - id: objectives/anti-static/obfuscation/payload/vb6-crypter::vb6-hardcoded-decode-key

  - id: vb6-encrypted-exe-crypter-builder
    desc: VB6 encrypted executable crypter builder
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/payload/vb6-crypter::vb6-resource-stub-payload-builder
      - id: micro-behaviors/crypto/symmetric/aes/vb6::rijndael-wrapper-vb6
      - id: micro-behaviors/fs/file/write::vb6-filecopy-output
    any:
      - id: micro-behaviors/crypto/symmetric/aes/vb6::rijndael-buffer-crypto-vb6
      - id: micro-behaviors/data/encode/hex::vb6-bidirectional-hex-codec
