defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [jar, zip]
traits:
  - id: java-archive-slashed-class-folder
    desc: "ZIP entry with slash after class"
    crit: suspicious
    conf: 0.95
    if:
      type: yara
      source: |
        rule java_archive_slashed_class_folder {
          strings:
            $entry = /[A-Za-z0-9_\/]+\.class\// ascii
          condition:
            #entry > 10
        }
  - id: java-archive-class-folder-caesium
    desc: Slashed class folder with Caesium decoys
    crit: suspicious
    conf: 0.99
    if:
      type: yara
      source: |
        rule java_archive_class_folder_caesium {
          strings:
            $decoy = /\.class\/caesium_[0-9]{2}\.class/ ascii
          condition:
            #decoy > 20
        }
composite_rules:
  - id: java-archive-caesium-decoy-layout
    desc: JAR class folder Caesium decoy layout
    crit: suspicious
    conf: 0.99
    all:
      - id: java-archive-slashed-class-folder
      - id: java-archive-class-folder-caesium
