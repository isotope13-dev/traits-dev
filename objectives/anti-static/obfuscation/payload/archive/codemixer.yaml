defaults:
  platforms: [windows]
  for: [archives]
  size_min: 1000
  size_max: 200000
  attack: T1027.016
  mbc: B0032

traits:
  - id: codemixer-doc-member
    desc: Code Mixer documentation member
    crit: component
    conf: 0.98
    if:
      type: basename
      exact: "CMIX.TXT"
  - id: codemixer-source-member
    desc: Code Mixer source member
    crit: component
    conf: 0.99
    if:
      type: basename
      exact: "CMIX.INC"
  - id: codemixer-lde32-member
    desc: Code Mixer LDE32 member
    crit: component
    conf: 0.96
    if:
      type: basename
      exact: "LDE32BIN.INC"
  - id: codemixer-rnd-member
    desc: Code Mixer randomizer member
    crit: component
    conf: 0.95
    if:
      type: basename
      exact: "RND.INC"

composite_rules:
  - id: codemixer-polymorphic-source-archive
    desc: Code mixer polymorphic source archive
    crit: hostile
    conf: 0.99
    all:
      - id: codemixer-doc-member
      - id: codemixer-source-member
      - id: codemixer-lde32-member
    any:
      - id: codemixer-rnd-member
