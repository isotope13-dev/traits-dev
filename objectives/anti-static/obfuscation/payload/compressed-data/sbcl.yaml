defaults:
  platforms: [linux, unix]
  for: [elf]
  attack: "T1027.009"
  mbc: "B0032"
composite_rules:
  - id: sbcl-appended-core-container
    desc: Appended compressed SBCL core container
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/data/embedded/runtime::zstd-compressed-core
      - id: metadata/binary/metrics/size::large-file-1mb
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::has-overlay
      - id: objectives/anti-static/obfuscation/binary-metrics::large-overlay
      - id: micro-behaviors/data/embedded/runtime::core-path
      - id: micro-behaviors/data/embedded/runtime::core-flag
