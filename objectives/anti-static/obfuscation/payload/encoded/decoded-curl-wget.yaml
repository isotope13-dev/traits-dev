defaults:
  platforms: [linux, macos, windows]
  crit: suspicious
  attack: "T1027"
  mbc: "E1014"
  for: [python, shell, elf, macho, pe]

traits:
  - id: decoded-curl-command
    desc: "Curl command in decoded payload"
    crit: suspicious
    conf: 0.95
    if:
      type: encoded
      encoding: base64
      regex: '(?im)(^|[;&])\s*curl\b'
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: well-known/tool/detection/llm-scanner::mvar-security-context
      - id: metadata/package/quality/recognized-contexts::mtrini-template-context
      - id: metadata/package/quality/recognized-contexts::mtrini-wheel-basename
      - id: metadata/package/quality/recognized-contexts::mtrini-template-module
  - id: decoded-wget-command
    desc: "Wget command in decoded payload"
    crit: suspicious
    conf: 0.95
    if:
      type: encoded
      encoding: base64
      regex: '(?im)(^|[;&])\s*wget\b'
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: well-known/tool/detection/llm-scanner::mvar-security-context
      - id: metadata/package/quality/recognized-contexts::mtrini-template-context
      - id: metadata/package/quality/recognized-contexts::mtrini-wheel-basename
      - id: metadata/package/quality/recognized-contexts::mtrini-template-module
  - id: decoded-powershell-download-command
    desc: "PowerShell download command in decoded payload"
    crit: suspicious
    conf: 0.95
    if:
      type: encoded
      encoding: base64
      regex: '(?im)(^|[;&])\s*(Invoke-WebRequest|iwr)\b'
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: well-known/tool/detection/llm-scanner::mvar-security-context
      - id: metadata/package/quality/recognized-contexts::mtrini-template-context
      - id: metadata/package/quality/recognized-contexts::mtrini-wheel-basename
      - id: metadata/package/quality/recognized-contexts::mtrini-template-module
  - id: decoded-local-execution
    desc: "Local executable invocation in decoded payload"
    crit: suspicious
    conf: 0.95
    for: [python, shell]
    if:
      type: encoded
      encoding: base64
      regex: '(?im)(^|[;&])\s*\./[A-Za-z0-9._$-]{1,80}(\s|[;&]|$)'
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: metadata/package/quality/recognized-contexts::mtrini-template-context
      - id: metadata/package/quality/recognized-contexts::mtrini-wheel-basename
      - id: metadata/package/quality/recognized-contexts::mtrini-template-module

composite_rules:
  - id: decoded-curl-wget
    desc: "Download command in decoded payload"
    crit: suspicious
    conf: 0.95
    any:
      - id: decoded-curl-command
      - id: decoded-wget-command
      - id: decoded-powershell-download-command
