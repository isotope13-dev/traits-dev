defaults:
  platforms: [linux, macos, windows]
  crit: suspicious
  attack: "T1027"
  mbc: "E1014"
  for: [python, shell, elf, macho, pe]

traits:
  - id: decoded-curl-wget
    desc: "Download command in decoded payload"
    conf: 0.95
    if:
      type: encoded
      encoding: base64
      regex: "(curl|wget|Invoke-WebRequest|iwr)\\b"
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: well-known/tool/detection/llm-scanner::mvar-security-context
