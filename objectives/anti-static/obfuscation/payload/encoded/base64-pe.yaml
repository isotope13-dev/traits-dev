defaults:
  platforms: [windows, unix]
  for: [scripts]
  mbc: F0001.006
  attack: T1027.009
traits:
  - id: wbindgen-placeholder
    desc: wasm-bindgen placeholder marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "__wbindgen_placeholder__"
composite_rules:
  # Wrap-tolerant: anchor on the canonical base64 PE prefix (MZ + fixed DOS
  # header) rather than a 200-char contiguous run, which missed line-wrapped
  # base64 PEs (certutil/MIME/PowerShell 64-76 char lines). See
  # micro-behaviors/data/encoded::raw-base64-pe-header.
  - id: base64-pe-header
    desc: Base64-encoded PE executable (MZ header)
    crit: suspicious
    conf: 0.95
    unless:
      - id: wbindgen-placeholder
      - id: well-known/app/posh-ovirt/
    all:
      - id: micro-behaviors/data/encoded::raw-base64-pe-header
    any:
      - id: metadata/file/metrics::file-has-30-plus-lines
      - id: metadata/file/metrics::single-long-line
  # An embedded base64 PE whose surrounding source is itself obfuscated with
  # noise-variable substitution (undefined %vars% interleaved with decoy text)
  # is a concealed dropper payload — the obfuscation has no purpose but to hide
  # the staged executable. The fragmentation leg is NOT auto-satisfied by the
  # base64 blob's entropy (it requires the %var% command-assembly pattern), so
  # this stays specific. Anchors the Arabic-noise .cmd LuaJIT loader.
  - id: obfuscation-concealed-encoded-pe
    desc: Obfuscated source conceals encoded PE payload
    crit: hostile
    conf: 0.96
    unless:
      - id: wbindgen-placeholder
    all:
      - id: micro-behaviors/data/encoded::raw-base64-pe-header
      - id: objectives/anti-static/obfuscation/string/concat::batch-fragmented-command-undefined-vars

  # A reversed PE header is an encoded MZ marker. Requiring both a large
  # encoded-data observation and a single oversized script line keeps this
  # objective specific to concealed executable carriers rather than ordinary
  # Base64 configuration or media data.
  - id: reversed-base64-pe-stage
    desc: JavaScript conceals a reversed Base64-encoded PE stage
    crit: hostile
    conf: 0.98
    for: [javascript]
    all:
      - id: micro-behaviors/data/encode/embedded::reversed-pe-base64-header
      - id: metadata/file/metrics::single-long-line
      - id: micro-behaviors/data/encode/embedded::large-encoded-blob
