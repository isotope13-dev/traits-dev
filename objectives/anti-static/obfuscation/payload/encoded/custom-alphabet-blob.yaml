# Binary payloads text-encoded over a custom restricted alphabet (base32/34/36
# style) and appended to a packed executable. Compressed or encrypted payload
# data is high-entropy and non-printable; re-encoding it as printable text
# costs ~35% size and buys nothing operationally — it is done to survive
# content inspection and to keep the blob out of the entropy heuristics that
# flag packed sections. The crypter stub decodes it back at runtime.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.013
  mbc: F0001

traits:
  - id: custom-alphabet-encoded-blob
    desc: Large custom-alphabet encoded blob
    # The `[g-x]` in the middle excludes hex digests and hex-dumped resources,
    # which are the common benign multi-KB single-alphabet run. base64 cannot
    # match either: its uppercase and `+/=` characters break the run.
    crit: notable
    conf: 0.93
    if:
      type: raw
      regex: '[0-9a-x]{200,}[g-x][0-9a-x]{200,}'

composite_rules:
  # A packer's own compressed stream never looks like this. When an MPRESS
  # image additionally carries a multi-KB text-encoded blob that dominates the
  # file, the packer is being used as a crypter around a staged payload.
  - id: packed-pe-encoded-payload-crypter
    desc: Packed PE carrying a text-encoded staged payload
    crit: hostile
    conf: 0.96
    all:
      - id: custom-alphabet-encoded-blob
      - id: objectives/anti-static/pack/mpress::mpress-obfuscated-overlay-loader
      - id: metadata/binary/layout::overlay-dominates-third
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
