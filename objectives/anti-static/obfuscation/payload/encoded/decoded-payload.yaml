# Base64 Decoded Payload Analysis
# Detects malicious behaviors in decoded base64 content
# ATT&CK: T1027 (Obfuscated Files)
# MBC: E1014 (Data Encoding)
defaults:
  platforms: [linux, macos, windows]
  crit: suspicious
  attack: "T1027"
  mbc: "E1014"
  for: [python, shell, elf, macho, pe]
traits:
  # === Shell Commands in Decoded Payload ===
  - id: decoded-shell-command
    desc: "Shell command in decoded payload"
    crit: suspicious
    conf: 0.90
    if:
      type: encoded
      encoding: base64
      regex: "os\\.system|subprocess\\.call"
    not:
      - substr: '"file":"polyglot-no'
    unless:
      - id: objectives/anti-static/obfuscation/encoding/content::encoded-http-url-referrer-param
      - id: metadata/signed/platform/
      - id: metadata/library/versioneer/
  - id: decoded-file-creation-a
    desc: "Decoded payload creates text or exe"
    crit: suspicious
    conf: 0.85
    if:
      type: encoded
      encoding: base64
      regex: '(?im)(^|[;&])\\s*[^<\\r\\n]{0,50}\\.(txt|exe|dll)\\s*>'
    not:
      - substr: '"file":"polyglot-no'
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/versioneer/
      - id: well-known/lib/electron::electron-bundled-node-runtime
      - id: well-known/app/silverbullet::official-silverbullet-context
      - id: metadata/package/quality/recognized-contexts::mtrini-template-context
      - id: metadata/package/quality/recognized-contexts::mtrini-wheel-basename
      - id: metadata/package/quality/recognized-contexts::mtrini-template-module
  - id: decoded-file-creation-b
    desc: "Decoded payload creates script files"
    crit: suspicious
    conf: 0.85
    if:
      type: encoded
      encoding: base64
      regex: '(?im)(^|[;&])\\s*[^<\\r\\n]{0,50}\\.(bat|ps1)\\s*>'
  - id: decoded-windows-type-nul
    desc: "Decoded Windows empty-file command"
    crit: suspicious
    conf: 0.80
    if:
      type: encoded
      encoding: base64
      substr: "type nul"
    not:
      - substr: '"file":"polyglot-no'
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/versioneer/
      - id: well-known/tool/offensive/projectdiscovery/
      - id: micro-behaviors/crypto/certificate/usage::pem-begin
      - type: text
        substr: "-----BEGIN CERTIFICATE-----"
  - id: decoded-windows-echo-redirect
    desc: "Decoded Windows echo file write"
    crit: suspicious
    conf: 0.80
    if:
      type: encoded
      encoding: base64
      regex: '(?im)(^|[;&|])\\s*echo\\s+[^<\\r\\n]{0,50}>'
    not:
      - substr: '"file":"polyglot-no'
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/versioneer/
      - id: well-known/tool/offensive/projectdiscovery/
  - id: decoded-windows-copy-redirect
    desc: "Decoded Windows copy file write"
    crit: suspicious
    conf: 0.80
    if:
      type: encoded
      encoding: base64
      regex: '(?im)(^|[;&|])\\s*copy\\s+[^<\\r\\n]{0,50}>'
    not:
      - substr: '"file":"polyglot-no'
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/versioneer/
      - id: well-known/tool/offensive/projectdiscovery/
      - id: well-known/app/silverbullet::official-silverbullet-context
      - id: metadata/package/quality/recognized-contexts::mtrini-template-context
      - id: metadata/package/quality/recognized-contexts::mtrini-wheel-basename
      - id: metadata/package/quality/recognized-contexts::mtrini-template-module
  - id: decoded-windows-del-command
    desc: "Decoded Windows delete command"
    crit: notable
    conf: 0.80
    if:
      type: encoded
      encoding: base64
      regex: '(?im)(^|[;&])\\s*del\\s+'
    not:
      - substr: '"file":"polyglot-no'
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/versioneer/
      - id: well-known/tool/offensive/projectdiscovery/
      - id: well-known/lib/electron::electron-bundled-node-runtime
      - id: metadata/package/quality/recognized-contexts::mtrini-template-context
      - id: metadata/package/quality/recognized-contexts::mtrini-wheel-basename
      - id: metadata/package/quality/recognized-contexts::mtrini-template-module
  - id: decoded-ip-address
    desc: "IP address in decoded payload"
    crit: suspicious
    conf: 0.85
    if:
      type: encoded
      encoding: base64
      regex: "http://[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}"
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
  - id: decoded-pipe-to-shell-a
    desc: "Decoded payload pipes to shell"
    crit: suspicious
    conf: 0.95
    if:
      type: encoded
      encoding: base64
      regex: "\\|\\s*(shell|sh|zsh)\\b"
    unless:
      - id: metadata/package/testing/
  - id: decoded-pipe-to-shell-b
    desc: "Decoded payload pipes to interpreter"
    crit: suspicious
    conf: 0.95
    if:
      type: encoded
      encoding: base64
      regex: "\\|\\s*(python|perl|ruby)\\b"
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/offensive/projectdiscovery/
  # === Malicious Code Patterns ===
  - id: decoded-python-import-a
    desc: "Python imports os sys subprocess"
    crit: suspicious
    conf: 0.85
    if:
      type: encoded
      encoding: base64
      regex: "import\\s+(os|sys|subprocess)"
    unless:
      - id: metadata/library/versioneer/
  - id: decoded-python-import-b
    desc: "Python imports socket requests"
    crit: suspicious
    conf: 0.85
    if:
      type: encoded
      encoding: base64
      regex: "import\\s+(socket|requests)"
    unless:
      - id: metadata/library/versioneer/
  - id: decoded-eval-exec
    desc: "Code execution in decoded payload"
    crit: notable
    conf: 0.95
    if:
      type: encoded
      encoding: base64
      regex: "eval\\(|exec\\(|compile\\("
    not:
      - substr: '"file":"polyglot-no'
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/versioneer/
      - id: well-known/app/silverbullet::official-silverbullet-context
  - id: decoded-rar-archive
    desc: Decoded RAR archive payload
    crit: suspicious
    conf: 0.88
    if:
      type: encoded
      encoding: base64
      regex: "^Rar!"
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/versioneer/
  - id: decoded-pyinstaller-bootloader-runner
    desc: Decoded PyInstaller bootloader runner
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: encoded
      encoding: base64
      regex: 'pyinstaller-[0-9.]+/bootloader/build/releasew?/runw?\.exe'
composite_rules:
  - id: decoded-file-creation
    desc: "File creation in decoded payload"
    crit: suspicious
    conf: 0.85
    any:
      - id: decoded-file-creation-a
      - id: decoded-file-creation-b
  - id: decoded-pipe-to-shell
    desc: "Piped execution in decoded payload"
    crit: suspicious
    conf: 0.95
    any:
      - id: decoded-pipe-to-shell-a
      - id: decoded-pipe-to-shell-b
  - id: decoded-python-import
    desc: "Python imports in decoded payload"
    crit: suspicious
    conf: 0.85
    any:
      - id: decoded-python-import-a
      - id: decoded-python-import-b
  - id: decoded-windows-command
    desc: "Decoded Windows file command"
    crit: suspicious
    conf: 0.80
    any:
      - id: decoded-windows-type-nul
      - id: decoded-windows-echo-redirect
      - id: decoded-windows-copy-redirect
      - id: decoded-windows-del-command
    unless:
      - id: well-known/app/kilocode::kilo-code-native-runtime
  - id: decoded-rar-payload-blob
    desc: Large decoded RAR payload
    crit: suspicious
    conf: 0.9
    for: [python]
    all:
      - id: decoded-rar-archive
      - id: metadata/binary/metrics/encoded::large-embedded-b64-blob
  - id: decoded-pyinstaller-bootloader-rar
    desc: Decoded PyInstaller bootloader RAR
    crit: suspicious
    conf: 0.92
    for: [python]
    all:
      - id: decoded-rar-payload-blob
      - id: decoded-pyinstaller-bootloader-runner
  # === Decoded Malicious Payload ===
  - id: decoded-malicious-shell
    desc: "Malicious shell command decoded"
    crit: suspicious
    conf: 0.92
    attack: "T1059"
    for: [python, shell]
    any:
      - id: decoded-shell-command
      - id: decoded-windows-command
      - id: decoded-file-creation
      - id: decoded-pipe-to-shell
  - id: decoded-remote-download-execute
    desc: "Decoded remote download-and-execute command"
    crit: hostile
    conf: 0.96
    attack: "T1105"
    mbc: "E1105"
    for: [python, shell, elf, pe]
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/versioneer/
      - id: well-known/app/silverbullet::official-silverbullet-context
      - id: metadata/package/quality/recognized-contexts::mtrini-template-context
      - id: metadata/package/quality/recognized-contexts::mtrini-wheel-basename
      - id: metadata/package/quality/recognized-contexts::mtrini-template-module
    all:
      - id: micro-behaviors/communications/http/url/encoded::base64-decoded-http-url
      - id: objectives/anti-static/obfuscation/payload/encoded::decoded-curl-command
      - id: objectives/anti-static/obfuscation/payload/encoded::decoded-local-execution
  - id: decoded-python-urllib-remote-exec
    desc: Encoded payload imports Python networking and executes decoded code
    crit: hostile
    conf: 0.99
    attack: T1027,T1105,T1059.006
    mbc: E1014,B0024
    for: [python]
    all:
      - id: micro-behaviors/communications/http/url/encoded::base64-decoded-http-url
      - id: decoded-eval-exec
      - id: decoded-python-import-a
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/versioneer/
