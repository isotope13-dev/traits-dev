# Embedded encoded program in JavaScript — the obfuscation shape of a loader
# whose real logic (often child_process/spawn/detached calls) ships as a long
# char-code array or a base64 blob with its matching decoder, or is reached via
# require() of a char-code-decoded module name. These are encoding/obfuscation
# observations: each matcher detects the encoded SHAPE, not any objective, so
# they live here (their identity is the matcher) and the dropper/loader
# composites that infer intent reference them across directories.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1027"
traits:
- id: js-charcode-array-program
  desc: Large char-code numeric array literal
  crit: notable
  conf: 0.85
  for: [javascript]
  if:
    type: text
    regex: '\[\d{1,3}(,\d{1,3}){80,}\]'
  unless:
  - id: metadata/library/structure/
  - id: well-known/app/google-web::official-google-web-asset
  - id: metadata/package/testing/
  - id: well-known/lib/jsbn::low-prime-table
- id: js-base64-blob
  desc: Long base64 string literal
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: '["''][A-Za-z0-9+/]{200,}={0,2}["'']'
  unless:
  - id: metadata/library/structure/
  - id: metadata/package/testing/
  - id: metadata/build/bundler::has-sourcemap
- id: js-encoded-require
  desc: Require of a decoded module name
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: 'require\s*\(\s*\w+\s*\(\s*\['
  unless:
  - id: metadata/library/structure/
  - id: metadata/package/testing/
# The matching decoders, paired with the embedded program above by the loader
# composites that infer intent (cross-directory, in the dropper objective).
- id: js-fromcharcode-decoder
  desc: String built from character codes
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'String\s*[.\[]\s*["'']?from(CharCode|CodePoint)'
- id: js-base64-decode
  desc: Base64 decode call
  crit: component
  conf: 0.7
  attack: "T1140"
  if:
    type: text
    regex: 'Buffer\.from\([^,)]{1,40},\s*["'']base64|\batob\s*\('
