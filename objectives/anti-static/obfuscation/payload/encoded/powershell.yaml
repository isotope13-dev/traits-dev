defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: powershell-opaque-base64-stage
    desc: PowerShell reduced to an opaque Base64 stage
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/encode/payload::large-unpadded-base64-line
      - id: metadata/binary/metrics/encoded::large-embedded-b64-blob
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
