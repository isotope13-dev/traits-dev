defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: powershell-opaque-base64-command-body
    desc: PowerShell hides Base64-like data in a one-line body
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/data/encode/payload::powershell-base64-like-carrier-line
      - id: metadata/binary/metrics/encoded::large-embedded-b64-blob
      - id: metadata/file/metrics::file-one-liner

  - id: powershell-opaque-base64-stage
    desc: PowerShell reduced to an opaque Base64-like stage
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/encode/payload::powershell-base64-like-carrier-line
      - id: metadata/binary/metrics/encoded::large-embedded-b64-blob
      - id: metadata/file/metrics::powershell-long-average-line-profile

  - id: powershell-parser-opaque-data-body
    desc: PowerShell hides data in a parser-opaque body
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/data/encode/payload::powershell-base64-like-carrier-line
      - id: metadata/file/metrics::file-one-liner
      - id: metadata/file/metrics::powershell-single-giant-identifier
      - id: metadata/file/metrics::powershell-single-identifier-body
      - id: metadata/file/metrics::powershell-minimal-ast-body

  - id: powershell-opaque-custom-base32-stage
    desc: PowerShell custom-base32 stage evaluation
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.001
    mbc: C0025,E1059
    all:
      - id: micro-behaviors/data/decode/base32::ps-custom-base32-decoder
      - id: micro-behaviors/data/decode/base32::ps-custom-base32-carrier
      - id: micro-behaviors/process/interpreter/eval::powershell-iex-call
