defaults:
  platforms: [windows]
  for: [batch]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: batch-obfuscated-double-payload-loader
    desc: Batch loader with comment and marker payload carriers
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/encode/payload::batch-comment-base64-carrier
      - id: micro-behaviors/data/encode/payload::batch-marker-base64-carrier
      - id: objectives/command-and-control/dropper/execution/string-reconstruct::batch-long-random-envvar-reassembly

  - id: batch-obfuscated-payload-self-copy
    desc: Obfuscated batch carries payload and self-copy logic
    crit: hostile
    conf: 0.99
    attack: "T1027,T1140,T1547.001"
    all:
      - id: micro-behaviors/data/encode/payload::batch-oversized-data-line
      - id: objectives/command-and-control/dropper/execution/string-reconstruct::batch-long-random-envvar-reassembly
      - id: objectives/persistence/login/self-install/script::batch-obfuscated-self-copy
