defaults:
  platforms: [windows]
  for: [xml]
  attack: T1027
  mbc: B0032

traits:
  - id: heavily-percent-encoded-xml
    desc: Heavily percent-encoded XML payload
    crit: suspicious
    conf: 0.96
    count_min: 100
    if:
      type: text
      regex: '(?i)(%[0-9a-f]{2}){10}'

composite_rules:
  - id: obfuscated-xsl-dotnet-loader
    desc: Obfuscated XSLT .NET payload loader
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.007,T1140
    all:
      - id: heavily-percent-encoded-xml
      - id: objectives/execution/activex/xslt::xslt-scriptlet-binaryformatter-loader
