defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts]
  mbc: F0001.006
  attack: T1027.009
traits:
  - id: base64-pe-header
    desc: Base64-encoded PE executable (MZ header)
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: TVqQ[A-Za-z0-9+/]{200,}
