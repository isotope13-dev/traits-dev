defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: empty-text-section
    desc: Empty .text executable section
    crit: notable
    conf: 0.9
    if:
      type: section
      exact: ".text"
      executable: true
      length_max: 0
  - id: ezdun-section-name
    desc: Non-standard ezdun section name
    crit: notable
    conf: 0.9
    if:
      type: section
      regex: "^ezdun[0-9]+$"
  - id: ezdun-packed-payload-section
    desc: Large high-entropy ezdun payload
    crit: suspicious
    conf: 0.94
    if:
      type: section
      exact: "ezdun1"
      executable: true
      entropy_min: 7.8
      length_min: 1048576
composite_rules:
  - id: custom-packed-pe-layout
    desc: Packed PE with empty .text and ezdun payload
    crit: suspicious
    conf: 0.96
    all:
      - id: empty-text-section
      - id: ezdun-packed-payload-section
      - id: objectives/anti-static/obfuscation/payload::unusual-alignment-pe
    any:
      - id: ezdun-section-name
      - id: metadata/format::dominant-section
