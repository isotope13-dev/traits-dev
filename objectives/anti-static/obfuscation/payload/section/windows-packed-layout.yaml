defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: empty-text-section
    desc: Empty .text executable section
    crit: notable
    conf: 0.9
    if:
      type: trait
      id: metadata/binary/section/metrics::empty-text-section-pe
  - id: ezdun-section-name
    desc: Non-standard ezdun section name
    crit: notable
    conf: 0.9
    if:
      type: section
      regex: "^ezdun[0-9]+$"
  - id: ezdun-packed-payload-section
    desc: Large high-entropy ezdun payload
    crit: suspicious
    conf: 0.94
    if:
      type: section
      exact: "ezdun1"
      executable: true
      entropy_min: 7.8
      length_min: 1048576
  - id: m-padded-hex-shellcode-prefix
    desc: M padded hex shellcode prefix
    crit: suspicious
    conf: 0.99
    if:
      type: text
      section: ".rdata"
      exact: "1M8bM54M24108A02M88M0141424E75M"
  - id: long-hexm-string-cluster
    desc: Long hex M strings in rdata
    crit: component
    conf: 0.84
    count_min: 3
    if:
      type: text
      section: ".rdata"
      regex: '[0-9A-Fa-fM]{200,}'
  - id: large-rwx-debug-section
    desc: Oversized RWX .debug carrier section
    crit: suspicious
    conf: 0.95
    if:
      type: section
      exact: ".debug"
      writable: true
      executable: true
      length_min: 65536
      entropy_min: 5.0
  - id: wavfw-section-name
    desc: Non-standard .WavfW section name
    crit: notable
    conf: 0.99
    if:
      type: section
      exact: ".WavfW"
  - id: ramewe-section-name
    desc: Non-standard .ramewe section name
    crit: notable
    conf: 0.99
    if:
      type: section
      exact: ".ramewe"
  - id: mukaz-section-name
    desc: Non-standard .mukaz section name
    crit: notable
    conf: 0.99
    if:
      type: section
      exact: ".mukaz"
  - id: wavfw-payload-section
    desc: High-entropy .WavfW payload section
    crit: suspicious
    conf: 0.98
    if:
      type: section
      exact: ".WavfW"
      writable: true
      entropy_min: 7.5
      length_min: 4096
  - id: xor-pad-string-cluster
    desc: Repeating XOR pad string cluster
    crit: component
    conf: 0.97
    count_min: 2
    if:
      type: text
      regex: 'zH0ru\*y;ew\$da8P8z'
composite_rules:
  - id: custom-packed-pe-layout
    desc: Packed PE with empty .text and ezdun payload
    crit: suspicious
    conf: 0.96
    all:
      - id: empty-text-section
      - id: ezdun-packed-payload-section
      - id: objectives/anti-static/obfuscation/payload::unusual-alignment-pe
    any:
      - id: ezdun-section-name
      - id: metadata/binary/metrics::dominant-section
  - id: m-padded-shellcode-rdata
    desc: M padded hex shellcode hidden in rdata
    crit: suspicious
    conf: 0.98
    all:
      - id: m-padded-hex-shellcode-prefix
      - id: long-hexm-string-cluster
      - id: metadata/binary/section/metrics::encoded-rdata-loader-layout
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::medium-overlay-size
      - id: micro-behaviors/dylib/library::mfc42-ref
  - id: rwx-debug-loader-layout
    desc: Packed loader with RWX debug payload section
    crit: suspicious
    conf: 0.96
    all:
      - id: large-rwx-debug-section
      - id: metadata/hardening/memory::wx-section
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::encrypted-loader-overlay
      - id: objectives/anti-static/obfuscation/imports::peb-ldr-access
      - id: metadata/binary/metrics::no-functions
  - id: wavfw-encrypted-payload-carrier
    desc: Custom .WavfW encrypted payload carrier
    crit: suspicious
    conf: 0.99
    all:
      - id: wavfw-payload-section
      - id: xor-pad-string-cluster
    any:
      - id: wavfw-section-name
      - id: metadata/binary/layout::legacy-few-sections
      - id: metadata/binary/metrics::no-functions
    needs: 1
  - id: ramewe-mukaz-packed-loader
    desc: Packed PE with .ramewe and .mukaz decoys
    crit: suspicious
    conf: 0.99
    all:
      - id: ramewe-section-name
      - id: mukaz-section-name
      - id: metadata/binary/layout::overlay-over-35pct
      - id: metadata/binary/section/metrics::elevated-text-entropy-section
