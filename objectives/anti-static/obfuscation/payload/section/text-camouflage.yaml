defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0032
traits:
  - id: giant-text-section
    desc: Giant text section dominates PE
    crit: component
    conf: 0.86
    size_min: 1048576
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.98
  - id: code-heavy-loader-ratio
    desc: Code to data ratio favors text
    crit: component
    conf: 0.84
    size_min: 1048576
    if:
      type: metrics
      field: binary.code_to_data_ratio
      min: 50
  - id: low-entropy-rsrc
    desc: Resource section entropy is unusually low
    crit: component
    conf: 0.88
    size_min: 1048576
    if:
      type: metrics
      field: pe.rsrc_entropy
      max: 3.4
  - id: heavy-wide-string-corpus
    desc: Large PE with many wide strings
    crit: component
    conf: 0.82
    size_min: 1048576
    if:
      type: metrics
      field: binary.wide_string_count
      min: 100
  - id: multilingual-padding-corpus
    desc: Multilingual dictionary padding corpus
    crit: component
    conf: 0.96
    size_min: 1048576
    if:
      type: text
      section: .rsrc
      substr: macroeconomic désynchronise
composite_rules:
  - id: text-section-payload-camouflage
    desc: Oversized text section hides payload
    crit: suspicious
    conf: 0.94
    all:
      - id: giant-text-section
      - id: code-heavy-loader-ratio
      - id: metadata/package/metrics::recovered-function-count-under-10
    any:
      - id: metadata/binary/metrics::many-imports
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/data/embedded/payload::find-resource-w
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/framework::dotnet-assembly
  - id: dictionary-padding-entropy-camouflage
    desc: Low entropy resource padding camouflage
    crit: suspicious
    conf: 0.96
    all:
      - id: low-entropy-rsrc
      - id: heavy-wide-string-corpus
      - id: metadata/package/metrics::recovered-function-count-under-10
    any:
      - id: giant-text-section
      - id: multilingual-padding-corpus
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/installer::known-benign-installer
