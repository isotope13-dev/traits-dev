- id: low-entropy-data-padding-carrier
  desc: Low-entropy .data padding carries payload
  crit: suspicious
  conf: 0.97
  for:
  - pe
  platforms:
  - windows
  all:
  - id: massive-low-entropy-dot-data
  - id: dot-data-over-95pct-of-pe
  - id: extreme-loader-code-to-data-imbalance
  any:
  - id: metadata/binary/layout::pe-checksum-zeroed
  - id: metadata/binary/metrics/size::massive-executable
  - id: objectives/evasion/indicator-removal/timestamps::export-timestamp-maxval
  # The three geometry legs (16MB+ writable .data, >=95% of file, code:data<0.05)
  # already exclude every benign runtime — managed frameworks ship their bulk as
  # high-entropy resources/snapshots, not a low-entropy writable .data blob. The
  # exclusions below are light insurance, scoped to specific RUNTIME markers.
  # The previous `metadata/binary/framework/` dir-prefix was too broad: it also
  # matched ATL/WTL RTTI and a bare "mscoree" string, both of which a
  # decoy-stuffed loader trivially fakes, defeating the padding verdict.
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework::flutter-windows-dll
