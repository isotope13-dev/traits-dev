# Encoded Data Section Analysis
# GAP #4: Detects large encoded data sections likely containing C2 config or payloads
# Malware often stores encrypted/encoded configuration in data sections
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [binaries]
  attack: "T1027"
  mbc: "B0032"
traits:
  # Medium-high entropy in data section = likely encoded/encrypted
  - id: high-entropy-data-section
    desc: "High entropy in data section"
    crit: suspicious
    conf: 0.8
    entropy_min: 6.0
    entropy_max: 7.8
    if:
      type: section
      exact: "data"
  # Very high entropy = likely encrypted
  - id: encrypted-data-section
    desc: "Encrypted data section (very high)"
    crit: suspicious
    conf: 0.9
    entropy_min: 7.5
    if:
      type: section
      regex: '\.(data|rdata)'
  # Encrypted rdata section (PE-specific, common in crypters)
  - id: encrypted-rdata-section
    desc: "Encrypted rdata section (PE crypter)"
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    entropy_min: 7.5
    if:
      type: section
      substr: "rdata"
  # Large data section relative to text section
  - id: oversized-data-section
    desc: "Oversized data section vs code"
    crit: baseline
    conf: 0.7
    size_min: 32768
    if:
      type: section_ratio
      section: data
      compare_to: text
      min: 1.5
  # Data section dominates the binary
  - id: data-section-dominant
    desc: "Data section significantly larger than code"
    crit: suspicious
    conf: 0.8
    platforms: [linux, unix, windows, macos]
    if:
      type: section_ratio
      section: data
      compare_to: text
      min: 1.5
    unless:
      - id: well-known/tools/sysadmin/par-launcher::par-env-vars
      - type: string_value
        substr: "PAR_TEMP"
      - id: metadata/signed/platform::apple
      - type: string_value
        substr: "VS_VERSION_INFO"
      - type: metrics
        field: binary.export_count
        min: 50
      - type: metrics
        field: binary.data_entropy
        max: 4.0
      - type: metrics
        field: binary.string_density
        min: 50
  # Large rodata section with medium entropy = encoded strings
  - id: encoded-rodata-section
    desc: "Encoded read-only data section"
    crit: notable
    conf: 0.7
    for: [elf, macho]
    entropy_min: 5.5
    entropy_max: 7.5
    if:
      type: section
      exact: "rodata"
composite_rules:
  # GAP #4: Large encoded data section = configuration/payload storage
  - id: large-encoded-config-section
    desc: "Large encoded configuration data section"
    crit: suspicious
    conf: 0.85
    size_min: 16384 # 16KB minimum
    all:
      - id: high-entropy-data-section
      - id: oversized-data-section
  # Very suspicious: large + encrypted + tiny strings
  - id: encrypted-payload-section
    desc: "Encrypted payload in data section"
    crit: suspicious
    conf: 0.9
    size_min: 8192 # 8KB minimum
    all:
      - id: encrypted-data-section
      - id: objectives/anti-static/obfuscation/payload/encrypted::tiny-cstring
  # Data section larger than code + shell exec = dropper
  - id: data-heavy-dropper-pattern
    desc: "Data-heavy binary with shell execution"
    crit: suspicious
    conf: 0.9
    all:
      - id: data-section-dominant
      - id: micro-behaviors/process/create/shell::shell-execution
    none:
      - id: metadata/signed/platform::apple
