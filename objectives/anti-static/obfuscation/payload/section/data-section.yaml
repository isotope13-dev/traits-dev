defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  attack: T1027
  mbc: B0032
traits:
  - id: high-entropy-data-section
    desc: High entropy in data section
    crit: suspicious
    conf: 0.8
    entropy_min: 6.0
    entropy_max: 7.8
    if:
      type: section
      exact: data
  - id: high-entropy-dot-data-section
    desc: High entropy .data section
    crit: suspicious
    conf: 0.84
    for:
      - pe
    platforms:
      - windows
    if:
      type: section
      exact: .data
      length_min: 4096
      entropy_min: 6.0
      entropy_max: 7.8
    unless:
      - type: metrics
        field: binary.function_count
        min: 500
      - id: dotnet-benign-data-section-context
      - id: metadata/signed/platform::microsoft
      - type: metrics
        field: binary.export_count
        min: 20
      - id: metadata/vendor/pash::zprotect-plugin
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
  - id: encrypted-data-section
    desc: Encrypted data section (very high)
    crit: notable
    conf: 0.9
    entropy_min: 7.5
    if:
      type: section
      regex: \.(data|rdata)
    unless:
      - id: metadata/lang/compiler/managed::versioned-vcl-app
  - id: massive-encrypted-dot-data
    desc: Massive encrypted .data payload
    crit: suspicious
    conf: 0.95
    for:
      - pe
    platforms:
      - windows
    if:
      type: section
      exact: .data
      writable: true
      entropy_min: 7.8
      length_min: 262144
    unless:
      - type: metrics
        field: binary.function_count
        min: 500
      - id: versioned-export-heavy-library
      - id: metadata/signed/platform::microsoft
      - type: symbol
        exact: TaggantPrepare
      - id: objectives/anti-static/pack/detect::aspack-marker
  - id: loader-encrypted-dot-data
    desc: Loader sized encrypted .data blob
    crit: suspicious
    conf: 0.95
    for:
      - pe
    platforms:
      - windows
    if:
      type: section
      exact: .data
      writable: true
      entropy_min: 7.85
      length_min: 49152
    unless:
      - type: metrics
        field: binary.function_count
        min: 500
      - id: versioned-export-heavy-library
      - id: metadata/signed/platform::microsoft
      - type: symbol
        exact: TaggantPrepare
      - id: objectives/anti-static/pack/detect::aspack-marker
  - id: packed-loader-low-code-to-data-ratio
    desc: Packed loader code-to-data ratio below 0.4
    crit: suspicious
    conf: 0.9
    for:
      - pe
    platforms:
      - windows
    size_min: 32768
    entropy_min: 5.0
    if:
      type: metrics
      field: binary.code_to_data_ratio
      max: 0.3
    unless:
      - type: metrics
        field: binary.import_count
        min: 250
      - type: metrics
        field: binary.export_count
        min: 50
      - id: packed-loader-low-code-to-data-benign-context
      - id: objectives/anti-static/pack/detect::aspack-marker
      - type: metrics
        field: binary.function_count
        min: 500
  - id: extreme-packed-loader-code-to-data-ratio
    desc: Packed loader code-to-data ratio below 0.2
    crit: component
    conf: 0.92
    for:
      - pe
    platforms:
      - windows
    size_min: 1048576
    if:
      type: metrics
      field: binary.code_to_data_ratio
      max: 0.2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/resource::resource-only-dll
  - id: encrypted-rdata-section
    desc: Encrypted rdata section (PE crypter)
    crit: notable
    conf: 0.9
    for:
      - pe
    entropy_min: 7.5
    if:
      type: section
      substr: rdata
    unless:
      - id: metadata/lang/compiler/managed::versioned-vcl-app
  - id: oversized-data-section
    desc: Oversized data section vs code
    crit: notable
    conf: 0.7
    size_min: 32768
    if:
      type: section_ratio
      section: data
      compare_to: text
      min: 1.5
    unless:
      - type: metrics
        field: binary.export_count
        min: 50
      - type: metrics
        field: binary.function_count
        min: 500
      - id: metadata/vendor/pash::zprotect-plugin
      - type: text
        substr: X3DOM Runtime, http://www.x3dom.org/
  - id: oversized-rdata-section
    desc: Oversized rdata section vs code
    crit: notable
    conf: 0.82
    for:
      - pe
    platforms:
      - windows
    size_min: 131072
    if:
      type: section_ratio
      section: .rdata
      compare_to: .text
      min: 1.7
    unless:
      - type: metrics
        field: binary.export_count
        min: 50
      - id: metadata/signed/platform::microsoft
      - type: metrics
        field: binary.function_count
        min: 500
  - id: data-section-dominant
    desc: Data section significantly larger than code
    crit: suspicious
    conf: 0.8
    size_min: 32768
    if:
      type: section_ratio
      section: data
      compare_to: text
      min: 1.5
    unless:
      - id: well-known/tools/sysadmin/par-launcher::par-env-vars
      - id: metadata/signed/platform::apple
      - type: text
        substr: VS_VERSION_INFO
      - type: metrics
        field: binary.export_count
        min: 50
      - type: metrics
        field: binary.data_entropy
        max: 5.4
      - type: metrics
        field: binary.import_count
        min: 300
      - type: metrics
        field: binary.function_count
        min: 500
  - id: encoded-rodata-section
    desc: Encoded read-only data section
    crit: notable
    conf: 0.7
    for:
      - elf
      - macho
    entropy_min: 5.5
    entropy_max: 7.5
    if:
      type: section
      exact: rodata
  - id: packed-loader-largest-section-import-rich
    desc: Large-section binary with many imports
    crit: component
    conf: 0.82
    for:
      - pe
    platforms:
      - windows
    if:
      type: metrics
      field: binary.import_count
      min: 251
  - id: packed-loader-largest-section-dominates
    desc: Packed loader largest section ratio above 0.65
    crit: notable
    conf: 0.82
    for:
      - pe
    platforms:
      - windows
    if:
      type: metrics
      field: binary.largest_section_ratio
      min: 0.65
    unless:
      - type: basename
        regex: \.winmd$
      - type: basename
        regex: \.mun$
      - id: metadata/binary/framework::dotnet-assembly
      - id: packed-loader-largest-section-benign
  - id: massive-low-entropy-dot-data
    desc: Massive low-entropy .data padding
    crit: suspicious
    conf: 0.94
    for:
      - pe
    platforms:
      - windows
    size_min: 16777216
    if:
      type: section
      exact: .data
      writable: true
      length_min: 16777216
      entropy_max: 0.8
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/resource::resource-only-dll
  - id: dot-data-over-95pct-of-pe
    desc: .data occupies over ninety-five percent
    crit: component
    conf: 0.92
    for:
      - pe
    platforms:
      - windows
    size_min: 16777216
    if:
      type: section_ratio
      section: .data
      compare_to: total
      min: 0.95
  - id: extreme-loader-code-to-data-imbalance
    desc: Code to data ratio below 0.05
    crit: component
    conf: 0.9
    for:
      - pe
    platforms:
      - windows
    size_min: 16777216
    if:
      type: metrics
      field: binary.code_to_data_ratio
      max: 0.05
composite_rules:
  - id: packed-loader-low-code-to-data-benign-context
    desc: Benign PE packaging in data-heavy layout
    crit: component
    conf: 0.85
    any:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/signed/platform::microsoft
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/binary/installer/sfx::winrar-sfx
  - id: dotnet-benign-data-section-context
    desc: Managed PE framework metadata context
    crit: component
    conf: 0.95
    any:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/platform::.net
  - id: versioned-export-heavy-library
    desc: Versioned export-heavy library layout
    crit: component
    conf: 0.85
    for:
      - dll
    platforms:
      - windows
    all:
      - id: metadata/package/versioning::version-resource-metadata
      - id: metadata/binary/metrics::many-exports-20
  - id: packed-loader-largest-section-benign
    desc: Large-section layout common in benign binaries
    crit: component
    conf: 0.85
    for:
      - pe
    platforms:
      - windows
    any:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/developer::open-source-developer
      - id: packed-loader-largest-section-import-rich
      - id: versioned-export-heavy-library
      - id: metadata/lang/compiler/aot::nativeaot-large-runtime
      - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
      - id: objectives/anti-static/pack/detect::upx-section
      - id: metadata/binary/layout::legacy-watcom-packed-utility
      - id: packed-loader-largest-section-import-rich
      - id: metadata/binary/metrics::high-export-count-marker
  - id: large-encoded-config-section
    desc: Large encoded configuration data section
    crit: suspicious
    conf: 0.85
    size_min: 16384
    all:
      - id: high-entropy-data-section
      - id: oversized-data-section
  - id: encrypted-payload-section
    desc: Encrypted payload in data section
    crit: suspicious
    conf: 0.9
    size_min: 8192
    all:
      - id: encrypted-data-section
      - id: objectives/anti-static/obfuscation/payload/encrypted::tiny-cstring
  - id: data-heavy-dropper-pattern
    desc: Data-heavy binary with shell execution
    crit: suspicious
    conf: 0.9
    all:
      - id: data-section-dominant
      - id: micro-behaviors/process/create/shell::shell-execution
    unless:
      - id: metadata/signed/platform::apple
  - id: packed-loader-data-geometry
    desc: Packed loader with dominant encrypted .data
    crit: suspicious
    conf: 0.95
    for:
      - pe
    platforms:
      - windows
    all:
      - id: massive-encrypted-dot-data
    any:
      - id: packed-loader-low-code-to-data-ratio
      - id: packed-loader-largest-section-dominates
    unless:
      - id: metadata/signed/platform::microsoft
  - id: encrypted-loader-data-geometry
    desc: Encrypted loader data geometry
    crit: suspicious
    conf: 0.96
    for:
      - pe
    platforms:
      - windows
    all:
      - id: loader-encrypted-dot-data
      - id: oversized-data-section
    any:
      - id: packed-loader-low-code-to-data-ratio
      - id: micro-behaviors/crypto/library::capi-keyed-buffer-crypto-chain
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
  - id: packed-anti-analysis-data-loader
    desc: Packed PE loader with anti-analysis data geometry
    crit: suspicious
    conf: 0.97
    for:
      - pe
    platforms:
      - windows
    size_min: 1048576
    all:
      - id: metadata/binary/metrics::large-four-section-pe
      - id: metadata/binary/metrics::dominant-section
      - id: metadata/binary/metrics::high-entropy-data
      - id: extreme-packed-loader-code-to-data-ratio
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/lang/compiler/aot::nativeaot-large-runtime
      - id: metadata/binary/resource::resource-only-dll
  - id: low-entropy-data-padding-carrier
    desc: Low-entropy .data padding carries payload
    crit: suspicious
    conf: 0.97
    for:
      - pe
    platforms:
      - windows
    all:
      - id: massive-low-entropy-dot-data
      - id: dot-data-over-95pct-of-pe
      - id: extreme-loader-code-to-data-imbalance
    any:
      - id: metadata/binary/layout::pe-checksum-zeroed
      - id: metadata/binary/metrics::massive-executable
      - id: objectives/evasion/indicator-removal/timestamps::export-timestamp-maxval
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-assembly
  - id: encoded-rdata-loader-geometry
    desc: Encoded loader payload in rdata
    crit: suspicious
    conf: 0.93
    for:
      - pe
    platforms:
      - windows
    all:
      - id: oversized-rdata-section
      - id: micro-behaviors/data/encode/base64::alphabet-permuted-native
    any:
      - id: micro-behaviors/data/embedded/payload::pe-magic-in-rdata
      - id: metadata/binary/debug::pdb-random-basename
      - id: metadata/package/versioning::pe-productname-field
    needs: 1
  - id: large-encrypted-rdata-loader
    desc: Large PE with encrypted .rdata payload (loader/dropper)
    crit: hostile
    conf: 0.93
    size_min: 4194304
    for:
      - pe
    platforms:
      - windows
    all:
      - id: metadata/binary/section/metrics::extreme-rdata-entropy
      - id: metadata/binary/section/metrics::rdata-ratio-over-5x
      - id: objectives/anti-static/obfuscation/payload::low-code-to-data-ratio-pe
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/section/metrics::benign-large-rdata-layout
      - id: metadata/binary/metrics::dotnet-binary
      - id: metadata/binary/metrics::many-exports-200
