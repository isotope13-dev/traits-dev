composite_rules:
- id: encrypted-data-section-toolchain-profile
  desc: Encrypted data-section toolchain profile
  crit: component
  conf: 0.9
  any:
  - id: metadata/lang/compiler/managed::versioned-vcl-app
  - id: metadata/signed/leaf::google-llc
  - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
  - id: objectives/anti-static/pack/detect::enigma-protector
  - id: metadata/binary/framework::dotnet-assembly
  - id: metadata/signed/platform::microsoft
  - id: well-known/app/drivers/
  - id: well-known/app/protected-benign-pe/
  - id: objectives/anti-static/pack/asprotect::asprotect-protector-application
  # Native CPython crypto extensions (PyCryptodome _ec_ws, etc.) pack optimized
  # constant tables at entropy >7.5 in .rdata — not an encrypted payload.
  - id: metadata/lang/compiler/native::python-msvc-extension
- id: high-entropy-dot-data-runtime-profile
  desc: High-entropy .data runtime profile
  crit: component
  conf: 0.92
  any:
  - id: well-known/tool/dual-use/zprotect::zprotect-plugin
  - id: metadata/lang/compiler/systems::go-pe-binary-context
  - id: well-known/app/drivers/
  - id: well-known/app/hasp-license-manager::hasp-license-manager-service
  - id: well-known/lib/rsa-bsafe::rsa-bsafe-crypto-library

- id: go-inflated-data-loader-layout
  desc: Go PE inflated data loader layout
  crit: suspicious
  conf: 0.9
  for:
  - pe
  platforms:
  - windows
  all:
  - id: metadata/lang/compiler/systems::go-pe-rich-symbols
  - id: metadata/binary/section/metrics::inflated-data-section
  - id: metadata/binary/symbols/imports::pe-single-import-dll
  any:
  - id: micro-behaviors/os/api-resolution/manual::go-syscall-dynamic-api-dispatch
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/process/inject/runtime/thread-context::thread-context-apis-3of4
  needs: 2
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: packed-loader-low-code-to-data-packaging
  desc: Recognized PE packaging in data-heavy layout
  crit: component
  conf: 0.85
  any:
  - id: metadata/binary/resource::resource-only-dll
  - id: metadata/signed/platform::microsoft
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/binary/installer/sfx::winrar-sfx
- id: dotnet-data-section-framework-profile
  desc: Managed PE framework metadata marker
  crit: component
  conf: 0.95
  any:
  - id: metadata/binary/framework::dotnet-assembly
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/signed/platform::.net
- id: versioned-export-heavy-library
  desc: Versioned export-heavy library layout
  crit: component
  conf: 0.85
