defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  attack: T1027
  mbc: B0032
traits:
- id: high-entropy-data-section
  desc: High entropy in data section
  crit: suspicious
  conf: 0.8
  entropy_min: 6.0
  entropy_max: 7.8
  if:
    type: section
    exact: data
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/signed/leaf::microsoft-corporation
  - id: metadata/package/quality/false-positives::microsoft-office-support-bundle-context
- id: high-entropy-dot-data-section
  desc: High entropy .data section
  crit: suspicious
  conf: 0.84
  for:
  - pe
  platforms:
  - windows
  if:
    type: section
    exact: .data
    length_min: 4096
    entropy_min: 6.0
    entropy_max: 7.8
  unless:
  - type: metrics
    field: functions.count
    min: 500
  - id: objectives/anti-static/obfuscation/payload/section/
  - id: metadata/signed/platform/
  - id: metadata/package/quality/false-positives::microsoft-office-support-bundle-context
  - type: metrics
    field: exports.count
    min: 20
  - id: objectives/anti-static/obfuscation/payload/section/
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
- id: encrypted-data-section
  desc: Encrypted data section (very high)
  crit: suspicious
  conf: 0.9
  if:
    type: section
    regex: \.(data|rdata)
    entropy_min: 7.5
  unless:
  - id: objectives/anti-static/obfuscation/payload/section/
  - id: well-known/app/tabby/
  - id: well-known/lib/sharp-libvips/
- id: massive-encrypted-dot-data
  desc: Massive encrypted .data payload
  crit: component
  conf: 0.95
  for:
  - pe
  platforms:
  - windows
  if:
    type: section
    exact: .data
    writable: true
    entropy_min: 7.8
    length_min: 262144
  unless:
  - id: objectives/anti-static/obfuscation/payload/section/
  - type: metrics
    field: functions.count
    min: 500
  - id: objectives/anti-static/obfuscation/payload/section/
  - id: metadata/signed/platform/
  - type: symbol
    exact: TaggantPrepare
  - id: objectives/anti-static/pack/detect::aspack-marker
- id: loader-encrypted-dot-data
  desc: Loader sized encrypted .data blob
  crit: component
  conf: 0.95
  for:
  - pe
  platforms:
  - windows
  if:
    type: section
    exact: .data
    writable: true
    entropy_min: 7.85
    length_min: 49152
  unless:
  - id: objectives/anti-static/obfuscation/payload/section/
  - type: metrics
    field: functions.count
    min: 500
  - id: objectives/anti-static/obfuscation/payload/section/
  - id: metadata/signed/platform/
  - type: symbol
    exact: TaggantPrepare
  - id: objectives/anti-static/pack/detect::aspack-marker
- id: packed-loader-low-code-to-data-ratio
  desc: Packed loader code-to-data ratio below 0.4
  crit: component
  conf: 0.9
  for:
  - pe
  platforms:
  - windows
  size_min: 32768
  entropy_min: 5.0
  if:
    type: metrics
    field: binary.code_to_data_ratio
    max: 0.3
  unless:
  - type: basename
    regex: \.dll$
  - id: objectives/anti-static/obfuscation/payload/section/
  - type: metrics
    field: imports.count
    min: 250
  - type: metrics
    field: exports.count
    min: 50
  - id: objectives/anti-static/obfuscation/payload/section/
  - id: objectives/anti-static/pack/detect::aspack-marker
  - type: metrics
    field: functions.count
    min: 500
- id: extreme-packed-loader-code-to-data-ratio
  desc: Packed loader code-to-data ratio below 0.2
  crit: component
  conf: 0.92
  for:
  - pe
  platforms:
  - windows
  size_min: 1048576
  if:
    type: metrics
    field: binary.code_to_data_ratio
    max: 0.2
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/resource/
- id: encrypted-rdata-section
  desc: Encrypted rdata section (PE crypter)
  crit: suspicious
  conf: 0.9
  for:
  - pe
  if:
    type: section
    substr: rdata
    entropy_min: 7.5
  unless:
  - id: metadata/lang/compiler/managed::versioned-vcl-app
  - id: metadata/binary/framework/
  # Native CPython crypto extensions pack high-entropy constant tables in .rdata.
  - id: objectives/anti-static/obfuscation/imports/
- id: oversized-data-section
  desc: Oversized data section vs code
  crit: component
  conf: 0.7
  size_min: 32768
  if:
    type: section
    compare_to: text
    size_ratio_min: 1.5
    substr: data
  unless:
  - type: basename
    regex: \.dll$
  - id: objectives/anti-static/obfuscation/payload/section/
  - type: metrics
    field: exports.count
    min: 50
  - type: metrics
    field: functions.count
    min: 500
  - id: well-known/tool/dual-use/zprotect/
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
- id: oversized-rdata-section
  desc: Oversized rdata section vs code
  crit: suspicious
  conf: 0.82
  for:
  - pe
  platforms:
  - windows
  size_min: 131072
  if:
    type: section
    regex: .rdata
    compare_to: .text
    size_ratio_min: 1.7
  unless:
  - type: basename
    regex: \.dll$
  - type: metrics
    field: exports.count
    min: 50
  - id: metadata/signed/platform/
  - type: metrics
    field: functions.count
    min: 500
  # Native CPython extensions (unicodedata, PyCryptodome, etc.) carry large
  # constant/lookup tables in .rdata that dwarf their thin code section.
  - id: objectives/anti-static/obfuscation/imports/
  # Wine/ReactOS builtins (codecs, COM type libs) are .rdata-heavy by design.
  - id: metadata/binary/vendor/
- id: data-section-dominant
  desc: Data section significantly larger than code
  crit: component
  conf: 0.8
  size_min: 32768
  if:
    id: objectives/anti-static/obfuscation/payload/section::oversized-data-section
  unless:
  - type: basename
    regex: \.dll$
  - id: objectives/anti-static/obfuscation/payload/section/
  - id: well-known/tool/sysadmin/par-launcher::par-env-vars
  - id: metadata/signed/platform::apple
  - type: metrics
    field: exports.count
    min: 50
  - type: metrics
    field: binary.data_entropy
    max: 5.4
  - type: metrics
    field: functions.count
    min: 500
- id: encoded-rodata-section
  desc: Encoded read-only data section
  crit: suspicious
  conf: 0.7
  for:
  - elf
  - macho
  entropy_min: 5.5
  entropy_max: 7.5
  if:
    type: section
    exact: rodata
- id: packed-loader-largest-section-dominates
  desc: Packed loader largest section ratio above 0.65
  crit: component
  conf: 0.82
  for:
  - pe
  platforms:
  - windows
  if:
    type: metrics
    field: binary.largest_section_ratio
    min: 0.65
  unless:
  - type: basename
    regex: \.dll$
  - type: basename
    regex: \.winmd$
  - type: basename
    regex: \.mun$
  - id: metadata/lang/compiler/systems::go-pe-binary-context
  - id: metadata/binary/framework/
  - id: objectives/anti-static/obfuscation/payload/section/
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: massive-low-entropy-dot-data
  desc: Massive low-entropy .data padding
  crit: suspicious
  conf: 0.94
  for:
  - pe
  platforms:
  - windows
  size_min: 16777216
  # Size-inflation padding is dominated by NUL runs (entropy ~0), but loaders
  # routinely dilute it with stuffed decoy strings (ripped SDK/library text) to
  # masquerade as a complex benign app, lifting .data entropy to ~3-4.5. That is
  # still far below packed/encrypted payloads (6.5+); the 16MB writable floor plus
  # the 95%-of-file and code:data legs in low-entropy-data-padding-carrier keep
  # this near-zero-FP against ordinary mixed-content .data sections.
  if:
    type: section
    exact: .data
    writable: true
    length_min: 16777216
    entropy_max: 4.5
  unless:
  - id: well-known/app/wireshark/
  - id: metadata/signed/platform/
  # Narrowed from the whole metadata/binary/resource/ dir: that prefix matched
  # any PE carrying an icon (pe-resource-icon-list), which suppressed this trait
  # on essentially every real-world executable. Only resource-ONLY DLLs and
  # null-padded resource blobs legitimately present a huge low-entropy section.
  - id: metadata/binary/resource::resource-only-dll
  - id: metadata/binary/resource::large-null-rsrc
- id: dot-data-over-95pct-of-pe
  desc: Largest section over ninety-five percent of file
  crit: component
  conf: 0.92
  for:
  - pe
  platforms:
  - windows
  size_min: 16777216
  # binary.data_to_file_ratio is not produced by the analyzer (phantom field →
  # the trait never fired). largest_section_ratio is the equivalent signal; the
  # composite pairs it with massive-low-entropy-dot-data, which confirms the
  # dominant section is the writable .data blob.
  if:
    type: metrics
    field: binary.largest_section_ratio
    min: 0.95
- id: extreme-loader-code-to-data-imbalance
  desc: Code to data ratio below 0.05
  crit: component
  conf: 0.9
  for:
  - pe
  platforms:
  - windows
  size_min: 16777216
  if:
    type: metrics
    field: binary.code_to_data_ratio
    max: 0.05
