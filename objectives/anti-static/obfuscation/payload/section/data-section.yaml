defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
  attack: T1027
  mbc: B0032
traits:
- id: high-entropy-data-section
  desc: High entropy in data section
  crit: suspicious
  conf: 0.8
  entropy_min: 6.0
  entropy_max: 7.8
  if:
    type: section
    exact: data
- id: high-entropy-dot-data-section
  desc: High entropy .data section
  crit: suspicious
  conf: 0.84
  for:
  - pe
  platforms:
  - windows
  if:
    type: section
    exact: .data
    length_min: 4096
    entropy_min: 6.0
    entropy_max: 7.8
  unless:
  - type: metrics
    field: binary.func_count
    min: 500
  - id: dotnet-benign-data-section-context
  - id: metadata/signed/platform::microsoft
  - type: metrics
    field: binary.export_count
    min: 20
  - id: well-known/tool/dual-use/zprotect::zprotect-plugin
  - id: go-pe-binary-context
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
- id: encrypted-data-section
  desc: Encrypted data section (very high)
  crit: suspicious
  conf: 0.9
  if:
    type: section
    regex: \.(data|rdata)
    entropy_min: 7.5
  unless:
  - id: metadata/lang/compiler/managed::versioned-vcl-app
  - id: metadata/signed/leaf::google-llc
  - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
  - id: objectives/anti-static/pack/detect::enigma-protector
- id: massive-encrypted-dot-data
  desc: Massive encrypted .data payload
  crit: component
  conf: 0.95
  for:
  - pe
  platforms:
  - windows
  if:
    type: section
    exact: .data
    writable: true
    entropy_min: 7.8
    length_min: 262144
  unless:
  - id: signed-anydesk-large-data-context
  - type: metrics
    field: binary.func_count
    min: 500
  - id: versioned-export-heavy-library
  - id: metadata/signed/platform::microsoft
  - type: symbol
    exact: TaggantPrepare
  - id: objectives/anti-static/pack/detect::aspack-marker
- id: loader-encrypted-dot-data
  desc: Loader sized encrypted .data blob
  crit: component
  conf: 0.95
  for:
  - pe
  platforms:
  - windows
  if:
    type: section
    exact: .data
    writable: true
    entropy_min: 7.85
    length_min: 49152
  unless:
  - id: signed-anydesk-large-data-context
  - type: metrics
    field: binary.func_count
    min: 500
  - id: versioned-export-heavy-library
  - id: metadata/signed/platform::microsoft
  - type: symbol
    exact: TaggantPrepare
  - id: objectives/anti-static/pack/detect::aspack-marker
- id: packed-loader-low-code-to-data-ratio
  desc: Packed loader code-to-data ratio below 0.4
  crit: component
  conf: 0.9
  for:
  - pe
  platforms:
  - windows
  size_min: 32768
  entropy_min: 5.0
  if:
    type: metrics
    field: binary.code_to_data_ratio
    max: 0.3
  unless:
  - type: basename
    regex: \.dll$
  - id: signed-anydesk-large-data-context
  - type: metrics
    field: binary.import_count
    min: 250
  - type: metrics
    field: binary.export_count
    min: 50
  - id: packed-loader-low-code-to-data-benign-context
  - id: objectives/anti-static/pack/detect::aspack-marker
  - type: metrics
    field: binary.func_count
    min: 500
- id: extreme-packed-loader-code-to-data-ratio
  desc: Packed loader code-to-data ratio below 0.2
  crit: component
  conf: 0.92
  for:
  - pe
  platforms:
  - windows
  size_min: 1048576
  if:
    type: metrics
    field: binary.code_to_data_ratio
    max: 0.2
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/resource::resource-only-dll
- id: encrypted-rdata-section
  desc: Encrypted rdata section (PE crypter)
  crit: suspicious
  conf: 0.9
  for:
  - pe
  if:
    type: section
    substr: rdata
    entropy_min: 7.5
  unless:
  - id: metadata/lang/compiler/managed::versioned-vcl-app
- id: anydesk-version-info
  desc: PE version resource text
  crit: component
  conf: 0.99
  for:
  - pe
  platforms:
  - windows
  if:
    type: text
    substr: VS_VERSION_INFO
- id: oversized-data-section
  desc: Oversized data section vs code
  crit: component
  conf: 0.7
  size_min: 32768
  if:
    type: section
    compare_to: text
    size_ratio_min: 1.5
    substr: data
  unless:
  - type: basename
    regex: \.dll$
  - id: signed-anydesk-large-data-context
  - type: metrics
    field: binary.export_count
    min: 50
  - type: metrics
    field: binary.func_count
    min: 500
  - id: well-known/tool/dual-use/zprotect::zprotect-plugin
  - type: text
    substr: X3DOM Runtime, http://www.x3dom.org/
- id: oversized-rdata-section
  desc: Oversized rdata section vs code
  crit: suspicious
  conf: 0.82
  for:
  - pe
  platforms:
  - windows
  size_min: 131072
  if:
    type: section
    regex: .rdata
    compare_to: .text
    size_ratio_min: 1.7
  unless:
  - type: basename
    regex: \.dll$
  - type: metrics
    field: binary.export_count
    min: 50
  - id: metadata/signed/platform::microsoft
  - type: metrics
    field: binary.func_count
    min: 500
- id: data-section-dominant
  desc: Data section significantly larger than code
  crit: component
  conf: 0.8
  size_min: 32768
  if:
    type: section
    compare_to: text
    size_ratio_min: 1.5
    substr: data
  unless:
  - type: basename
    regex: \.dll$
  - id: signed-anydesk-large-data-context
  - id: well-known/tool/sysadmin/par-launcher::par-env-vars
  - id: metadata/signed/platform::apple
  - type: metrics
    field: binary.export_count
    min: 50
  - type: metrics
    field: binary.data_entropy
    max: 5.4
  - type: metrics
    field: binary.func_count
    min: 500
- id: encoded-rodata-section
  desc: Encoded read-only data section
  crit: suspicious
  conf: 0.7
  for:
  - elf
  - macho
  entropy_min: 5.5
  entropy_max: 7.5
  if:
    type: section
    exact: rodata
- id: packed-loader-largest-section-import-rich
  desc: Large-section binary with many imports
  crit: component
  conf: 0.82
  for:
  - pe
  platforms:
  - windows
  if:
    type: metrics
    field: binary.import_count
    min: 251
- id: packed-loader-largest-section-dominates
  desc: Packed loader largest section ratio above 0.65
  crit: component
  conf: 0.82
  for:
  - pe
  platforms:
  - windows
  if:
    type: metrics
    field: binary.largest_section_ratio
    min: 0.65
  unless:
  - type: basename
    regex: \.dll$
  - type: basename
    regex: \.winmd$
  - type: basename
    regex: \.mun$
  - id: metadata/binary/framework::dotnet-assembly
  - id: packed-loader-largest-section-benign
- id: massive-low-entropy-dot-data
  desc: Massive low-entropy .data padding
  crit: suspicious
  conf: 0.94
  for:
  - pe
  platforms:
  - windows
  size_min: 16777216
  if:
    type: section
    exact: .data
    writable: true
    length_min: 16777216
    entropy_max: 0.8
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/resource::resource-only-dll
- id: dot-data-over-95pct-of-pe
  desc: .data occupies over ninety-five percent
  crit: component
  conf: 0.92
  for:
  - pe
  platforms:
  - windows
  size_min: 16777216
  if:
    type: metrics
    field: binary.data_to_file_ratio
    min: 0.95
- id: extreme-loader-code-to-data-imbalance
  desc: Code to data ratio below 0.05
  crit: component
  conf: 0.9
  for:
  - pe
  platforms:
  - windows
  size_min: 16777216
  if:
    type: metrics
    field: binary.code_to_data_ratio
    max: 0.05
