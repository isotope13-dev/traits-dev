defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
  mbc: B0032
composite_rules:
- id: encrypted-reloc-payload-carrier
  desc: Encrypted payload hidden in .reloc section
  crit: suspicious
  conf: 0.98
  all:
  - id: metadata/binary/section/metrics::reloc-payload-geometry
  any:
  - id: metadata/package/versioning::version-resource-metadata
  - id: metadata/binary/section/metrics::high-import-count-pe
  - id: metadata/binary/section/metrics::elevated-text-entropy-section
  downgrade:
    any:
    - id: metadata/binary/installer/family/
- id: importless-writable-code-reloc-payload
  desc: Importless PE conceals a high-entropy payload in .reloc beside writable code
  crit: hostile
  conf: 0.97
  all:
  - id: metadata/binary/section/metrics::encrypted-reloc-section
  - id: metadata/binary/metrics/structural::no-imports
  - id: metadata/binary/section/metrics::writable-text-section
  - id: metadata/binary/section/metrics::high-entropy-exec-section
  - id: metadata/binary/section/metrics::pe-entry-in-writable-section
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework/
  - id: metadata/binary/installer/family/
