defaults:
  platforms: [windows]
  for: [pe]
  crit: suspicious
  conf: 0.85

composite_rules:
  - id: ep-in-last-section-rwx
    desc: Entry point in last RWX section
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/binary/anomaly/format::pe-entry-in-last-section
      - id: metadata/hardening/memory::wx-section
    unless:
      - id: objectives/anti-static/pack/detect::enigma-protector
