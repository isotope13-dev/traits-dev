# NativeAOT programs can embed arbitrary data in custom PE sections. A large,
# high-entropy .gfx section is consistent with an opaque payload stage; the
# GFX0INFO record links that section to generated embedded-data accessors.
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1027.009
  mbc: F0001.006

traits:
  - id: large-high-entropy-gfx-section
    desc: Large high-entropy read-only .gfx section
    crit: notable
    conf: 0.95
    if:
      type: section
      exact: .gfx
      entropy_min: 7.9
      length_min: 262144
      readable: true
      writable: false
      executable: false

  - id: nativeaot-gfx-embedded-section-descriptor
    desc: NativeAOT .gfx embedded-section descriptor
    crit: component
    conf: 0.95
    if:
      type: text
      exact: GFX0INFO
      section: .data
