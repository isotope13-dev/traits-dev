# MIPS ELFs with a dominant high-entropy data image and very little native
# code are commonly small loaders carrying an encrypted second stage.  The
# individual measurements remain reviewable; hostile conclusions require the
# architecture, payload shape, and loader hardening anomalies together.
defaults:
  platforms: [unix]
  for: [elf]
  attack: T1027
  mbc: B0032

traits:
  - id: mips-high-entropy-data-blob
    desc: MIPS high-entropy .data blob
    crit: suspicious
    conf: 0.96
    arch: [mips]
    size_max: 5242880
    if:
      type: section
      exact: .data
      length_min: 262144
      entropy_min: 7.9

  - id: mips-code-data-imbalance
    desc: MIPS low code-to-data ratio
    crit: notable
    conf: 0.94
    arch: [mips]
    size_min: 262144
    if:
      type: metrics
      field: binary.code_to_data_ratio
      max: 0.05

composite_rules:
  - id: mips-encrypted-payload-blob
    desc: MIPS ELF carries an encrypted dominant data payload
    crit: hostile
    conf: 0.95
    attack: T1027.002
    all:
      - id: mips-high-entropy-data-blob
      - id: mips-code-data-imbalance

  - id: mips-executable-stack-payload-loader
    desc: MIPS ELF payload loader with an executable stack
    crit: hostile
    conf: 0.98
    attack: T1027.002
    all:
      - id: mips-encrypted-payload-blob
      - id: metadata/hardening/missing::stripped-binary
      - id: metadata/binary/anomaly/format::elf-executable-stack
