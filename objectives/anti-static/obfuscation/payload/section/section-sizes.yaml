defaults:
  for: [binaries]
  platforms:
    - linux
    - macos
    - windows
    - unix
  attack: T1027
traits:
  - id: tiny-cstring-absolute-macos
    desc: Abnormally small __cstring section
    crit: suspicious
    conf: 0.85
    for:
      - macho
    size_min: 100000
    if:
      type: section
      regex: ^__TEXT\.__cstring$
      length_max: 100
  - id: large-data-absolute-macos
    desc: Large __DATA section (8KB+)
    crit: notable
    conf: 0.7
    for:
      - macho
    if:
      type: section
      regex: ^__DATA\.__data$
      length_min: 8192
  - id: tiny-rodata-absolute-elf
    desc: Abnormally small .rodata section
    crit: suspicious
    conf: 0.8
    for:
      - elf
    size_min: 100000
    if:
      type: section
      regex: ^\.rodata$
      length_max: 100
    unless:
      - id: firmware-layout-elf
      - type: metrics
        field: elf.e_type
        min: 1
        max: 1
      - type: text
        substr: linux-vdso.so.1
      - type: text
        regex: __vdso_[a-z_]+
    downgrade:
      any:
        - id: micro-behaviors/os/bpf/program/maps::bpf-map-hash
  - id: large-data-absolute-elf
    desc: Large .data section (16KB+)
    crit: notable
    conf: 0.7
    for:
      - elf
    size_max: 5242880
    if:
      type: section
      regex: ^\.data$
      length_min: 65536
    unless:
      - type: text
        substr: X3DOM Runtime, http://www.x3dom.org/
      - type: metrics
        field: elf.e_type
        min: 1
        max: 1
      - type: basename
        exact: tabby
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
  - id: firmware-sections-40-plus
    desc: ELF has 40 or more sections
    crit: component
    conf: 0.9
    for:
      - elf
    size_min: 200000
    if:
      type: metrics
      field: binary.section_count
      min: 40
  - id: firmware-overlay-ratio-60-plus
    desc: ELF has a large overlay region
    crit: component
    conf: 0.9
    for:
      - elf
    size_min: 200000
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.6
  - id: firmware-overall-entropy-low
    desc: ELF overall entropy is low
    crit: component
    conf: 0.9
    for:
      - elf
    size_min: 200000
    if:
      type: metrics
      field: binary.overall_entropy
      max: 4.5
  - id: firmware-string-count-500-plus
    desc: ELF has 500 or more strings
    crit: component
    conf: 0.9
    for:
      - elf
    size_min: 200000
    if:
      type: metrics
      field: binary.string_count
      min: 500
composite_rules:
  - id: obfuscated-data-payload-macos
    desc: Obfuscated payload in data section
    crit: suspicious
    conf: 0.9
    for:
      - macho
    all:
      - id: tiny-cstring-absolute-macos
      - id: large-data-absolute-macos
    any:
      - id: objectives/anti-static/obfuscation/payload::high-entropy-data-macos
      - id: micro-behaviors/process/create/shell/
  - id: obfuscated-data-payload-elf
    desc: Obfuscated payload in data section
    crit: suspicious
    conf: 0.9
    for:
      - elf
    all:
      - id: tiny-rodata-absolute-elf
      - id: large-data-absolute-elf
    unless:
      - id: firmware-layout-elf
  - id: firmware-layout-elf
    desc: Firmware-like ELF section layout
    crit: baseline
    conf: 0.9
    for:
      - elf
    size_min: 200000
    all:
      - id: firmware-sections-40-plus
      - id: firmware-overall-entropy-low
      - id: firmware-string-count-500-plus
      - id: firmware-overlay-ratio-60-plus
