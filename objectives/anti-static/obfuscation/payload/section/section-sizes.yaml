defaults:
  for: [binaries]
  platforms:
    - linux
    - macos
    - windows
    - unix
  attack: T1027
traits:
  - id: tiny-cstring-absolute-macos
    desc: Abnormally small __cstring section
    crit: suspicious
    conf: 0.85
    for:
      - macho
    size_min: 100000
    if:
      type: section
      regex: ^__TEXT\.__cstring$
      length_max: 100
  - id: large-data-absolute-macos
    desc: Large __DATA section (8KB+)
    crit: notable
    conf: 0.7
    for:
      - macho
    if:
      type: section
      regex: ^__DATA\.__data$
      length_min: 8192
  - id: tiny-rodata-absolute-elf
    desc: Abnormally small .rodata section
    crit: suspicious
    conf: 0.8
    for:
      - elf
    size_min: 100000
    if:
      type: section
      regex: ^\.rodata$
      length_max: 100
    downgrade:
      any:
        - id: micro-behaviors/os/bpf/program/maps::bpf-map-hash
  - id: large-data-absolute-elf
    desc: Large .data section (16KB+)
    crit: notable
    conf: 0.7
    for:
      - elf
    size_max: 5242880
    if:
      type: section
      regex: ^\.data$
      length_min: 16384
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
composite_rules:
  - id: obfuscated-data-payload-macos
    desc: Obfuscated payload in data section
    crit: suspicious
    conf: 0.9
    for:
      - macho
    all:
      - id: tiny-cstring-absolute-macos
      - id: large-data-absolute-macos
    any:
      - id: objectives/anti-static/obfuscation/payload::high-entropy-data-macos
      - id: micro-behaviors/process/create/shell/
  - id: obfuscated-data-payload-elf
    desc: Obfuscated payload in data section
    crit: suspicious
    conf: 0.9
    for:
      - elf
    all:
      - id: tiny-rodata-absolute-elf
      - id: large-data-absolute-elf
