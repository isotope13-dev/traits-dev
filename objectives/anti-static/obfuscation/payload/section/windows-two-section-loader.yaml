defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0032
traits:
- id: two-section-pe
  desc: Large PE with exactly two sections
  crit: component
  conf: 0.9
  size_min: 1048576
  if:
    type: metrics
    field: sections.count
    min: 2
    max: 2
- id: zero-import-dependency-pe
  desc: PE with no imported DLL dependencies
  crit: notable
  conf: 0.95
  size_min: 1048576
  if:
    type: metrics
    field: dependencies.count
    max: 0
- id: giant-writable-text-section
  desc: Giant writable text section payload
  crit: notable
  conf: 0.96
  size_min: 1048576
  if:
    type: section
    exact: ".text"
    writable: true
    executable: true
    length_min: 1048576
    entropy_min: 6.2
- id: tiny-null-rsrc-section
  desc: Tiny null resource stub section
  crit: component
  conf: 0.92
  size_min: 1048576
  if:
    type: section
    exact: ".rsrc"
    length_max: 1024
    entropy_max: 0.05
- id: one-function-large-pe
  desc: Large PE with one function
  crit: component
  conf: 0.94
  size_min: 1048576
  if:
    type: metrics
    field: binary.func_count
    min: 1
    max: 1
- id: extreme-dominant-section
  desc: Single section occupies nearly all bytes
  crit: component
  conf: 0.94
  size_min: 1048576
  if:
    type: metrics
    field: binary.largest_section_ratio
    min: 0.99
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
composite_rules:
- id: importless-rwx-two-section-loader
  desc: Importless PE with a giant encrypted RWX text loader
  crit: hostile
  conf: 0.98
  attack: T1027,T1620
  all:
  - id: giant-writable-text-section
  - id: two-section-pe
  - id: zero-import-dependency-pe
  - id: metadata/binary/section/metrics::large-rwx-text-section
  - id: metadata/binary/resource::executable-rsrc-section
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework/
  - id: metadata/binary/installer/family/
- id: giant-writable-text-loader
  desc: Two section packed loader with writable text
  crit: hostile
  conf: 0.97
  all:
  - id: giant-writable-text-section
  - id: two-section-pe
  - id: tiny-null-rsrc-section
  - id: metadata/binary/symbols/compat::zero-import-count
  any:
  - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
  - id: one-function-large-pe
  - id: extreme-dominant-section
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework/
  - id: metadata/binary/resource/
