defaults:
  platforms: [macos]
  for: [macho]
  attack: T1027
  mbc: F0001
composite_rules:
- id: concealed-shell-execution-macho
  desc: Concealed Mach-O shell execution
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/anti-static/obfuscation/payload/encrypted::tiny-cstring
  - id: metadata/binary/metrics::extreme-text-to-string-ratio
  any:
  - id: micro-behaviors/process/create/shell/invoke::system-fn
  - id: micro-behaviors/process/create/popen::c-popen
  downgrade:
    any:
    - id: metadata/signed/platform::apple
    - id: concealed-shell-execution-macho-cond-1--inline-29236
- id: concealed-command-capture-macho
  desc: Concealed command output capture
  crit: suspicious
  conf: 0.95
  all:
  - id: concealed-shell-execution-macho
  - id: micro-behaviors/process/create/popen::c-popen
  - id: micro-behaviors/process/create/direct::fgets-loop
  downgrade:
    any:
    - id: metadata/signed/platform::apple
- id: concealed-devnull-command-capture-macho
  desc: Concealed command capture with stderr suppression
  crit: suspicious
  conf: 0.95
  all:
  - id: concealed-command-capture-macho
  - id: micro-behaviors/os/console/io::stderr-to-dev-null
  downgrade:
    any:
    - id: metadata/signed/platform::apple
- id: commoncrypto-concealed-shell-macho
  desc: Concealed shell with CommonCrypto
  crit: suspicious
  conf: 0.9
  all:
  - id: concealed-shell-execution-macho
  - id: micro-behaviors/crypto/library::commoncrypto-encryption-kdf
traits:
- id: concealed-shell-execution-macho-cond-1--inline-29236
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: metrics
    field: binary.string_count
    min: 1000
  count_max: 1029237
