defaults:
  for: [text]
  platforms: [windows, unix, linux, macos, android, ios]
traits:
  - id: encryptor-mutation-comment
    desc: Encryptor mutation comment
    crit: suspicious
    conf: 0.95
    if:
      type: string
      substr: 'encrypt virus code, this routine is changed in different virus copies'
  - id: encryptor-variant-count
    desc: Encryptor variant count
    crit: suspicious
    conf: 0.93
    if:
      type: string
      substr: 'possible 9 wariants'
  - id: decryptor-mutation-comment
    desc: Decryptor mutation comment
    crit: suspicious
    conf: 0.95
    if:
      type: string
      substr: 'modify encryption routine (automodyfication)'
  - id: decryptor-variant-table
    desc: Decryptor variant table
    crit: suspicious
    conf: 0.93
    if:
      type: string
      substr: 'table for variants of decrypt routine'
  - id: decryptor-key-comment
    desc: Decryptor key comments
    crit: suspicious
    conf: 0.93
    if:
      type: string
      regex: '(?i)(change decryption key|possible 3 wariants)'
  - id: timer-seeded-variant-selection
    desc: Timer-seeded variant selection
    crit: suspicious
    conf: 0.92
    if:
      type: string
      regex: '(?i)(random number from system timer count|range 0\\.\\.8|multiply BX by 4)'
composite_rules:
  - id: polymorphic-self-encryption-source
    desc: Polymorphic self-encryption source
    crit: suspicious
    conf: 0.98
    all:
      - id: encryptor-mutation-comment
      - id: decryptor-mutation-comment
    any:
      - id: encryptor-variant-count
      - id: decryptor-variant-table
      - id: decryptor-key-comment
      - id: timer-seeded-variant-selection
