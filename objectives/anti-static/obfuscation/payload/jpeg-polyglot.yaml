defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [jpeg]
  attack: T1027
  mbc: B0032
composite_rules:
  - id: encrypted-blob-loader
    desc: Embedded encrypted payload loader
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/data/embedded/payload::oversized-base64-literal
      - id: micro-behaviors/crypto/symmetric/aes::openssl-decrypt-call
  - id: decrypt-eval-loader
    desc: JPEG decrypts and evals payload
    crit: hostile
    conf: 0.99
    attack: T1140
    all:
      - id: micro-behaviors/crypto/symmetric/aes::openssl-decrypt-call
      - id: micro-behaviors/crypto/symmetric/aes::aes-128-ecb-mode
      - id: micro-behaviors/process/interpreter/eval::php-eval-decrypted-content
  - id: encrypted-php-polyglot
    desc: JPEG polyglot with encrypted PHP payload
    crit: hostile
    conf: 0.995
    all:
      - id: micro-behaviors/data/embedded/payload::embedded-php-open-tag
      - id: micro-behaviors/data/embedded/payload::oversized-base64-literal
      - id: micro-behaviors/crypto/symmetric/aes::openssl-decrypt-call
      - id: micro-behaviors/crypto/symmetric/aes::aes-128-ecb-mode
      - id: micro-behaviors/process/interpreter/eval::php-eval-decrypted-content
