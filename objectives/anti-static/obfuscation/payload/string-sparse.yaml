defaults:
  for: [binaries]
  platforms:
    - linux
    - macos
    - windows
    - unix
  attack: T1027
  mbc: F0001
traits:
  - id: extreme-string-sparsity-macos
    desc: Extreme string sparsity (<0.05%)
    crit: suspicious
    conf: 0.9
    for:
      - macho
    if:
      type: section_ratio
      section: __cstring
      compare_to: total
      max: 0.0005
    unless:
      - id: metadata/signed/platform::apple
      - id: well-known/tools/sysadmin/par-launcher::par-env-vars
      - type: string_value
        substr: PAR_TEMP
      - type: metrics
        field: binary.string_count
        min: 1000
  - id: very-sparse-strings-macos
    desc: Very sparse string section (<0.2%)
    crit: suspicious
    conf: 0.8
    for:
      - macho
    if:
      type: section_ratio
      section: __cstring
      compare_to: total
      max: 0.002
    unless:
      - id: metadata/signed/platform::apple
      - id: well-known/tools/sysadmin/par-launcher::par-env-vars
      - type: string_value
        substr: PAR_TEMP
      - type: metrics
        field: binary.string_count
        min: 1000
  - id: large-data-section-macos
    desc: Large __DATA section (8KB+)
    crit: notable
    conf: 0.7
    for:
      - macho
    if:
      type: section_ratio
      section: __DATA.__data
      compare_to: total
      min: 0.03
  - id: high-entropy-data-macos
    desc: High entropy in __DATA section
    crit: suspicious
    conf: 0.85
    for:
      - macho
    entropy_min: 6.5
    if:
      type: section
      exact: __DATA.__data
composite_rules:
  - id: obfuscated-payload-storage
    desc: Obfuscated payload in data section
    crit: suspicious
    conf: 0.9
    for:
      - macho
    all:
      - id: extreme-string-sparsity-macos
      - id: large-data-section-macos
  - id: string-obfuscated-malware
    desc: String-obfuscated malware with shell
    crit: suspicious
    conf: 0.95
    for:
      - macho
    all:
      - id: extreme-string-sparsity-macos
      - id: high-entropy-data-macos
      - id: micro-behaviors/process/create/shell/
  - id: stripped-static-elf-obfuscation
    desc: Stripped static ELF string concealment
    crit: suspicious
    conf: 0.9
    for:
      - elf
    all:
      - id: objectives/anti-static/obfuscation/imports::very-low-strings
      - id: metadata/hardening::stripped-binary
      - id: metadata/hardening::static-linked-heuristic
    any:
      - id: objectives/anti-static/pack/detection::exotic-arch-arm32
      - id: metadata/binary/metrics::high-code-to-data-ratio
