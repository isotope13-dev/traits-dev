defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
traits:
  - id: pyc-magic-cb
    desc: Python 3.11+ bytecode magic
    crit: component
    if:
      type: hex
      pattern: CB 0D 0D 0A
  - id: pyc-magic-a7
    desc: Python 3.10 bytecode magic
    crit: component
    if:
      type: hex
      pattern: A7 0D 0D 0A
  - id: pyc-magic-61
    desc: Python 3.9 bytecode magic
    crit: component
    if:
      type: hex
      pattern: 61 0D 0D 0A
  - id: pyc-magic-42
    desc: Python 3.8 bytecode magic
    crit: component
    if:
      type: hex
      pattern: 42 0D 0D 0A
  - id: pyc-magic-6f
    desc: Python 3.7 bytecode magic
    crit: component
    if:
      type: hex
      pattern: 6F 0D 0D 0A
  - id: pyc-magic-55
    desc: Python 3.6 bytecode magic
    crit: component
    if:
      type: hex
      pattern: 55 0D 0D 0A
  - id: exec-word
    desc: exec keyword
    crit: component
    if:
      type: string_value
      word: exec
  - id: eval-word
    desc: eval keyword
    crit: component
    if:
      type: string_value
      word: eval
  - id: import-dunder
    desc: __import__ function
    crit: component
    if:
      type: string_value
      substr: __import__
  - id: unhexlify-word
    desc: unhexlify function
    crit: component
    if:
      type: string_value
      substr: unhexlify
  - id: open-file-ref
    desc: open(__file__ call
    crit: component
    if:
      type: raw
      substr: open(__file__
  - id: open-file-sp-ref
    desc: open( __file__ call (with space)
    crit: component
    if:
      type: raw
      substr: open( __file__
  - id: open-abspath-ref
    desc: open(os.path.abspath(__file__) call
    crit: component
    if:
      type: raw
      substr: open(os.path.abspath(__file__)
  - id: compile-word
    desc: compile keyword
    crit: component
    if:
      type: string_value
      word: compile
  - id: marshal-word
    desc: marshal module
    crit: component
    if:
      type: string_value
      word: marshal
  - id: setuptools-word
    desc: setuptools package
    crit: component
    if:
      type: string_value
      substr: setuptools
composite_rules:
  - id: pyc-magic-in-py
    desc: Python bytecode magic in .py file
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1036.008
    any:
      - id: pyc-magic-cb
      - id: pyc-magic-a7
      - id: pyc-magic-61
      - id: pyc-magic-42
      - id: pyc-magic-6f
      - id: pyc-magic-55
  - id: bytecode-exec-eval-import
    desc: Bytecode with exec eval and __import__
    crit: suspicious
    conf: 0.85
    mbc: E1059
    attack: T1059
    all:
      - id: exec-word
      - id: eval-word
      - id: import-dunder
      - id: unhexlify-word
  - id: opens-self-file
    desc: Opens own file reference
    crit: component
    any:
      - id: open-file-ref
      - id: open-file-sp-ref
      - id: open-abspath-ref
  - id: exec-functions
    desc: Code execution functions
    crit: component
    any:
      - id: exec-word
      - id: eval-word
      - id: compile-word
  - id: decode-functions
    desc: Decoding/deserialization functions
    crit: component
    any:
      - id: marshal-word
      - id: micro-behaviors/data/encode/compression::zlib-signature
      - id: micro-behaviors/data/decode/base64::b64decode-string
      - id: unhexlify-word
      - id: import-dunder
  - id: bytecode-self-reader
    desc: Bytecode reads own file for payload
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027
    all:
      - id: micro-behaviors/dylib/load::python-file-dunder
      - id: opens-self-file
      - id: exec-functions
      - id: decode-functions
    unless:
      - id: setuptools-word
  - id: bytecode-payload-execution
    desc: Compiled bytecode payload execution pipeline
    crit: hostile
    conf: 0.95
    mbc: B0032
    attack: T1027
    all:
      - id: bytecode-exec-eval-import
      - id: bytecode-self-reader
    any:
      - id: unhexlify-word
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
      - id: objectives/anti-static/obfuscation/tools::known-obfuscator-detected
