# Polymorphic Code Generator Detection
# Detects LCG PRNG engines combined with memory protection changes,
# indicating a polymorphic shellcode generator that produces different
# machine code on each execution
# ATT&CK: T1027.001 (Obfuscated Files or Information: Binary Padding)
defaults:
  platforms: [windows, linux, unix, macos]
  for: [binaries]
  attack: "T1027.001"
  mbc: "B0032.001"
composite_rules:
  - id: polymorphic-code-generator
    desc: "Polymorphic code generator (PRNG + memory protection)"
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/data/prng/lcg::lcg-prng-engine
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/evasion/fileless/memory::alloc-memory-sym
    unless:
      - id: metadata/format::many-imports
