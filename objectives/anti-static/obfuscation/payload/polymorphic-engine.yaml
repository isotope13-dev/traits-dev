defaults:
  platforms:
    - windows
    - unix
  for: [binaries]
  attack: T1027.001
  mbc: B0032.001
composite_rules:
  - id: polymorphic-code-generator
    desc: Polymorphic code generator (PRNG + memory protection)
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/os/random/prng/lcg::lcg-prng-engine
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/evasion/fileless/memory::alloc-memory-sym
    unless:
      - id: metadata/binary/metrics::many-imports
