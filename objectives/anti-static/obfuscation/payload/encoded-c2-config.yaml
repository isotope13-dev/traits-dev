# Encoded C2-config patterns: file-scope constants whose names label them
# as URL/API/AUTH/KEY material and whose values are encoded byte arrays
# or hex blobs. The combination of "named-like-config" + "encoded
# representation" + "decode operation" has no legitimate use — legit
# code stores URLs and keys as string literals.
defaults:
  platforms: [windows, unix]
  for: [scripts, source]
  attack: T1027
  mbc: B0032

traits:
  # Variables named like API endpoint fragments storing byte arrays or
  # int lists. Pattern: `_API_<X> = bytes([0xNN, ...])` (Python) /
  # `const _API_X = [0xNN, ...]` (JS) / `let _API_X = Uint8Array.of(...)`.
- id: api-named-byte-array-const--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: Uint8Array
- id: api-named-byte-array-const--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: ENDPOINT
- id: api-named-byte-array-const--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: DOMAIN
- id: api-named-byte-array-const--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: SCHEMA
- id: api-named-byte-array-const--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
