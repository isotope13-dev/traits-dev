defaults:
  platforms: [windows]
  for: [c, cpp]
  size_min: 500
  size_max: 200000
  attack: T1027.016
  mbc: B0032

traits:
  - id: codemixer-buffer-mixing-doc
    desc: Code buffer mixing documentation
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "to mix 2 code buffers"
  - id: codemixer-polymorphic-decryptor-usage
    desc: Polymorphic decryptor usage note
    crit: component
    conf: 0.99
    if:
      type: text
      substr: "to create polymorphic decryptors"
  - id: codemixer-short-jump-expansion-doc
    desc: Short jump expansion documentation
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "short jmps (7x,EB) are expanded into near jmps"
  - id: codemixer-procedure-source
    desc: Code mixer procedure source
    crit: notable
    conf: 0.99
    if:
      type: text
      substr: "codemixer               proc    pascal"
  - id: codemixer-random-disasm-source
    desc: Random disassembler mixer callbacks
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "arg     _disasm          ; routine: _disasm()"
  - id: codemixer-jump-rewrite-source
    desc: Jump rewrite mixer logic
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "mov     al, 0E9h        ; store near jmp"
  - id: codemixer-link-fix-source
    desc: Relative offset fixup logic
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "arg=label.newofs-(newofs+len)"

composite_rules:
  - id: codemixer-polymorphic-decryptor-doc
    desc: Code mixer polymorphic decryptor docs
    crit: suspicious
    conf: 0.99
    all:
      - id: codemixer-buffer-mixing-doc
      - id: codemixer-polymorphic-decryptor-usage
      - id: codemixer-short-jump-expansion-doc
  - id: codemixer-polymorphic-engine-source
    desc: Code mixer polymorphic engine source
    crit: hostile
    conf: 0.99
    all:
      - id: codemixer-procedure-source
      - id: codemixer-random-disasm-source
      - id: codemixer-jump-rewrite-source
      - id: codemixer-link-fix-source
