defaults:
  platforms: [linux, unix, android]
traits:
  - id: dense-instruction-padding
    desc: Dense repetitive instructions (junk code)
    crit: suspicious
    conf: 0.8
    for: [elf]
    size_max: 1048576 # Only for smaller binaries (<1MB)
    count_min: 400
    per_kb_min: 8.0
    if:
      type: hex
      section: text
      pattern: "?? ?? 00 41"
