defaults:
  platforms: [windows, linux, macos]
  for: [csharp]
  attack: T1027
  mbc: B0032

traits:
  - id: csharp-asm-obfuscator-class
    desc: C# assembly obfuscator class
    crit: component
    conf: 0.9
    if:
      type: function
      exact: AssemblyObfuscator

  - id: csharp-asm-preprocessor-class
    desc: C# assembly preprocessor class
    crit: component
    conf: 0.9
    if:
      type: function
      exact: AssemblyPreprocessor

  - id: csharp-asm-nop-code-config
    desc: C# assembly NOP config files
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      regex: '^nop(_minimal)?\.txt$'

  - id: csharp-asm-junk-tabindent
    desc: C# assembly junk indentation
    crit: component
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '(^|\.)TabIndent$'

  - id: csharp-asm-random-nop-selection
    desc: C# random NOP selection
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)NextObject$'

  - id: csharp-asm-load-string-opcodes
    desc: C# assembly string loader opcodes
    crit: notable
    conf: 0.92
    if:
      type: string_literal
      regex: '^lodstr[aw]$'

  - id: csharp-asm-load-string-opcode-parser
    desc: C# assembly string loader parser
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'lodstra\|lodstrw|case\s+"lodstr[aw]"'

  - id: csharp-asm-emits-instructions
    desc: C# emits assembly instructions
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)Emit$'

  - id: csharp-asm-emits-mov-text
    desc: C# emits mov instructions
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: 'assembly.Emit("mov"'

  - id: csharp-asm-emits-inc-text
    desc: C# emits inc instructions
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: 'assembly.Emit("inc"'

  - id: csharp-asm-emits-add-text
    desc: C# emits add instructions
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: 'assembly.Emit("add"'

  - id: csharp-asm-emits-dec-text
    desc: C# emits dec instructions
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: 'assembly.Emit("dec"'

composite_rules:
  - id: csharp-asm-emits-instructions-text
    desc: C# emits assembly instructions
    crit: notable
    conf: 0.9
    any:
      - id: csharp-asm-emits-mov-text
      - id: csharp-asm-emits-inc-text
      - id: csharp-asm-emits-add-text
      - id: csharp-asm-emits-dec-text

  - id: csharp-assembly-junk-instruction-obfuscator
    desc: C# assembly junk instruction obfuscator
    crit: suspicious
    conf: 0.96
    all:
      - id: csharp-asm-obfuscator-class
      - id: csharp-asm-nop-code-config
    any:
      - id: csharp-asm-junk-tabindent
      - id: csharp-asm-random-nop-selection

  - id: csharp-assembly-string-loader-preprocessor
    desc: C# assembly string loader preprocessor
    crit: suspicious
    conf: 0.95
    all:
      - id: csharp-asm-load-string-opcode-parser
    any:
      - id: csharp-asm-preprocessor-class
      - id: csharp-asm-load-string-opcodes
      - id: csharp-asm-emits-instructions
      - id: csharp-asm-emits-instructions-text
