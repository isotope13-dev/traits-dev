defaults:
  platforms: [windows, linux, macos]
  for: [source, go]
traits:
  - id: go-packer-stubgen-import
    desc: Go source imports packer stubgen package
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      substr: packer/stubgen
  - id: go-junk-insertion-doc
    desc: Go source documents junk instruction generation
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)junk is guaranteed to leave the architectural state unchanged'
  - id: go-polymorphic-package
    desc: Go source package named poly or polymorphic
    crit: baseline
    conf: 0.5
    if:
      type: text
      regex: '^package\s+poly(morphic)?\b'
  - id: go-insert-junk-func
    desc: Go function named InsertJunk
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'func\s+InsertJunk\b'
composite_rules:
  - id: go-packer-polymorphic-junk-engine
    desc: Go source implements polymorphic junk instruction engine for packer
    crit: suspicious
    conf: 0.98
    attack: T1027
    mbc: B0032
    all:
      - id: go-insert-junk-func
    any:
      - id: go-packer-stubgen-import
      - id: go-junk-insertion-doc
