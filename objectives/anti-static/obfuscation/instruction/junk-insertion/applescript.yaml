defaults:
  for:
    - applescript
  platforms:
    - macos
  attack: T1027
traits:
  - id: excessive-vertical-padding
    desc: "AppleScript vertical whitespace padding"
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: ( \s*){50,}
  - id: character-id-string-builder
    desc: AppleScript character-id string builder
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(ASCII character|character id|string id)\s+\{?[0-9]{2,3}'
