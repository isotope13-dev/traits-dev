# Generic Obfuscation and Packing Detection
# Detects high entropy and structural indicators of packing without section name bias
defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: high-entropy-generic
    desc: High-entropy PE section
    crit: notable
    conf: 0.8
    entropy_min: 7.8
    if:
      id: objectives/anti-static/pack/entropy::high-entropy-section
    unless:
      - type: basename
        regex: '^vmlinuz'
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/
      - id: well-known/tool/sysadmin/winrar/
      - id: well-known/lib/divx/
      - id: well-known/tool/reverse-engineering/frida/
      - id: well-known/app/protected-benign-pe/
