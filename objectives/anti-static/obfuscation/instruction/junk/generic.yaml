# Generic Obfuscation and Packing Detection
# Detects high entropy and structural indicators of packing without section name bias
defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: high-entropy-generic
    desc: "High entropy exe section (possible packing)"
    crit: suspicious
    conf: 0.8
    entropy_min: 7.8
    if:
      id: objectives/anti-static/pack/entropy::high-entropy-section
    unless:
      - type: basename
        regex: '^vmlinuz'
      - id: objectives/anti-static/obfuscation/reflection/invoke::namespace-import
      - id: objectives/anti-static/pack/entropy::large-function-surface
      - id: metadata/binary/metrics/size::massive-executable
      - id: metadata/binary/installer/script::inno-setup
      - id: well-known/tool/sysadmin/winrar::winrar-component
    downgrade:
      any:
        - id: well-known/app/protected-benign-pe/
