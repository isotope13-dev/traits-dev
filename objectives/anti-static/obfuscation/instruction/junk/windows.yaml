# Junk Code and Disassembler Frustration
# Detects instructions designed to crash or confuse disassemblers/analyzers
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [linux, macos, windows]
traits:
- id: ud2-junk-code
  desc: Dense undefined instructions (UD2)
  crit: suspicious   # Downgraded from suspicious - can be compiler padding/alignment
  conf: 0.75
  for: [pe, elf, macho, -go, -rust]
  count_min: 20
  size_max: 10485760
  if:
    type: hex
    section: text
    pattern: "0F 0B"
      # per_kb_min removed - count_min is sufficient for detecting deliberate junk
  downgrade:
    any:
    - id: metadata/signed/platform::apple
- id: gettickcount-junk-branches
  desc: "Repeated GetTickCount with small-constant comparisons"
  crit: component
  conf: 0.85
  for: [pe]
  count_min: 4
  size_max: 1048576
  if:
    type: hex
    section: ".text"
      # call [rip+disp32] (IAT); cmp eax, imm8
    pattern: "FF 15 ?? ?? ?? ?? 83 F8"
  unless:
  - id: well-known/app/graphics::ncapture-binary

- id: gettickcount-junk-branches-dense
  desc: "Highly repeated GetTickCount with small-constant comparisons"
  crit: component
  conf: 0.9
  for: [pe]
  count_min: 50
  if:
    type: hex
    section: ".text"
    pattern: "FF 15 ?? ?? ?? ?? 83 F8"
composite_rules:
- id: timing-junk-code-stub
  desc: "Timing API junk branches in minimal stub"
  crit: suspicious
  conf: 0.88
  attack: T1027
  for: [pe]
  size_max: 524288
  scope: archive
  all:
  - id: gettickcount-junk-branches
  any:
  - id: micro-behaviors/time/query::get-tick-count
  - id: objectives/anti-static/obfuscation/imports::peb-access-x64
  unless:
  - id: metadata/signed/trust-level::signed
  - id: well-known/lib/openssl::openssl-cryptogams
  - id: metadata/signed/developer::tencent-technology-shenzhen-company-limited
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/symbols/plugin::x64dbg-plugin-export
  - id: objectives/anti-static/obfuscation/payload/loader::native-clr-benign-context
  - id: micro-behaviors/process/inject/runtime/clr::corexitprocess-string

- id: dense-timing-junk-code
  desc: "High density of timing API junk branches"
  crit: hostile
  conf: 0.95
  attack: T1027
  for: [pe]
  all:
  - id: gettickcount-junk-branches-dense
  - id: micro-behaviors/time/query::get-tick-count
  unless:
  - id: metadata/signed/trust-level::signed
  - id: well-known/game/steam::steam-api-exports
  - id: well-known/game/steam::valve-corp-binary
