defaults:
  platforms: [windows, linux, unix, android, macos, ios]
  for: [binaries]
traits:
  - id: go-garbage-func
    desc: "Junk code or garbage functions for evasion"
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: 'main\.garbageFunc\d+'
  - id: go-mutateself-func
    desc: "Self-mutation / polymorphism function name"
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      exact: "main.mutateSelf"
