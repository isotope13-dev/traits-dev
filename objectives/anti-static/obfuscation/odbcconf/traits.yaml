defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.85

traits:
  - id: odbcconf-subversion
    desc: odbcconf command file subversion
    attack: T1218.008
    size_min: 1000
    if:
      type: string_value
      regex: 'odbcconf.{0,50} /f .{0,50}\.rsp'
      case_insensitive: true
      section: .rdata
