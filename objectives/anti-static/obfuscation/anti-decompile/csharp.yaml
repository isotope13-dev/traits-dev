# C# anti-decompilation and anti-disassembly
defaults:
  for: [csharp]
  platforms: [windows]
  mbc: "B0032"
traits:
  - id: suppress-ildasm
    desc: SuppressIldasm anti-disassembly attribute
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "SuppressIldasm"
    unless:
      - type: text
        substr: "SuppressIldasmAttributeDiagId"
      - type: text
        substr: "LIB0024"
      - id: well-known/lib/spectre-console/

  - id: suppress-ildasm-managed-pe
    desc: SuppressIldasm attribute in managed PE
    crit: suspicious
    conf: 0.95
    attack: T1027
    for: [pe, dll]
    if:
      type: yara
      source: |
        rule suppress_ildasm_managed_pe {
          strings:
            $clr = "BSJB" ascii
            $marker = "SuppressIldasm" ascii wide
          condition:
            $clr and $marker
        }

  - id: zero-width-identifier-marker-206d
    desc: Repeated U+206D markers in C# source
    crit: suspicious
    conf: 0.97
    attack: T1027
    count_min: 2
    if:
      type: hex
      pattern: 'E2 81 AD'
  - id: zero-width-identifier-marker-206f
    desc: Repeated U+206F markers in C# source
    crit: suspicious
    conf: 0.97
    attack: T1027
    count_min: 2
    if:
      type: hex
      pattern: 'E2 81 AF'

  # PE overlays are arbitrary embedded data; the marker bytes are meaningful
  # as obfuscated identifiers only when the PE also has a CLR metadata stream.
  - id: zero-width-managed-pe-marker-206d
    desc: Repeated U+206D markers in managed PE
    crit: suspicious
    conf: 0.97
    attack: T1027
    for: [pe, dll]
    if:
      type: yara
      source: |
        rule zero_width_managed_pe_marker_206d {
          strings:
            $clr = "BSJB" ascii
            $marker = { E2 81 AD }
          condition:
            $clr and #marker >= 2
        }

  - id: zero-width-managed-pe-marker-206f
    desc: Repeated U+206F markers in managed PE
    crit: suspicious
    conf: 0.97
    attack: T1027
    for: [pe, dll]
    if:
      type: yara
      source: |
        rule zero_width_managed_pe_marker_206f {
          strings:
            $clr = "BSJB" ascii
            $marker = { E2 81 AF }
          condition:
            $clr and #marker >= 2
        }

composite_rules:
  - id: zero-width-opaque-inno-payload
    desc: Zero-width obfuscated Inno payload
    crit: hostile
    conf: 0.99
    attack: T1027,T1027.009
    for: [pe]
    all:
      - id: zero-width-managed-pe-marker-206d
      - id: zero-width-managed-pe-marker-206f
      - id: metadata/binary/layout::high-entropy-overlay
      - id: metadata/binary/layout::overlay-dominates-90pct
      - id: metadata/binary/installer/family::inno-delphi-installer-foundation

  - id: zero-width-reflective-resource-loader
    desc: Zero-width-obfuscated reflective resource loader
    crit: hostile
    conf: 0.99
    attack: T1027,T1027.009,T1620
    all:
      - id: zero-width-identifier-marker-206d
      - id: zero-width-identifier-marker-206f
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-getmanifestresourcestream
      - id: metadata/lang/compiler/managed::get-method-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::invoke-token
