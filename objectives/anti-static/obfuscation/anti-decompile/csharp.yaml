# C# anti-decompilation and anti-disassembly
defaults:
  for: [csharp, pe, dll]
  platforms: [windows]
  mbc: "B0032"
traits:
  - id: suppress-ildasm
    desc: SuppressIldasm anti-disassembly attribute
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "SuppressIldasm"
    unless:
      - type: text
        substr: "SuppressIldasmAttributeDiagId"
      - type: text
        substr: "LIB0024"
      - id: well-known/lib/spectre-console/

  - id: zero-width-identifier-marker-206d
    desc: Repeated zero-width Unicode U+206D markers
    crit: suspicious
    conf: 0.97
    attack: T1027
    count_min: 2
    if:
      type: hex
      pattern: 'E2 81 AD'
      offset_range: [1048576, null]
    unless:
      # The signed Postman Electron/Squirrel PE stores this byte sequence in
      # high-entropy .rsrc bytes; it is not an obfuscated managed identifier.
      - id: 'metadata/signed/leaf::postman\'
  - id: zero-width-identifier-marker-206f
    desc: Repeated zero-width Unicode U+206F markers
    crit: suspicious
    conf: 0.97
    attack: T1027
    count_min: 2
    if:
      type: hex
      pattern: 'E2 81 AF'
      offset_range: [1048576, null]
    unless:
      # The signed Postman Electron/Squirrel PE stores this byte sequence in
      # high-entropy .rsrc bytes; it is not an obfuscated managed identifier.
      - id: 'metadata/signed/leaf::postman\'
      - id: metadata/binary/vendor::glarysoft-ltd

composite_rules:
  - id: zero-width-opaque-inno-payload
    desc: Zero-width obfuscated Inno payload
    crit: hostile
    conf: 0.99
    attack: T1027,T1027.009
    for: [pe]
    all:
      - id: zero-width-identifier-marker-206d
      - id: zero-width-identifier-marker-206f
      - id: metadata/binary/layout::high-entropy-overlay
      - id: metadata/binary/layout::overlay-dominates-90pct
      - id: metadata/binary/installer/family::inno-delphi-installer-foundation

  - id: zero-width-reflective-resource-loader
    desc: Zero-width-obfuscated reflective resource loader
    crit: hostile
    conf: 0.99
    attack: T1027,T1027.009,T1620
    all:
      - id: zero-width-identifier-marker-206d
      - id: zero-width-identifier-marker-206f
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-getmanifestresourcestream
      - id: metadata/lang/compiler/managed::get-method-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::invoke-token
