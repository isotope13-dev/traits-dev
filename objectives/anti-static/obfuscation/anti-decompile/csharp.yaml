# C# anti-decompilation and anti-disassembly
defaults:
  for: [csharp, pe, dll]
  platforms: [windows]
  mbc: "B0032"
traits:
  - id: suppress-ildasm
    desc: SuppressIldasm anti-disassembly attribute
    crit: notable
    conf: 0.95
    if:
      type: string_value
      substr: "SuppressIldasm"
    not:
      - substr: "SuppressIldasmAttribute has no effect in .NET 6.0+."
