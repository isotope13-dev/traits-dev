defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1027
  mbc: B0032
traits:
- id: js-junk-number-padding
  desc: High ratio of digit characters (junk padding)
  crit: notable
  conf: 0.85
  size_min: 5000
  size_max: 500000
  if:
    type: metrics
    field: text.digit_ratio
    min: 0.25
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
  - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
  - id: metadata/library/structure::js-any-bundle-output
- id: js-megabyte-single-line
  desc: JS/TS line exceeds 1 MB
  crit: notable
  conf: 0.9
  size_min: 1000000
  if:
    type: metrics
    field: text.max_line_length
    min: 1000000
  unless:
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: metadata/file/text/format::sourcemap-sources-content
  - id: vscode-extension-large-line-context
  - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
  - type: text
    word: tiktoken
  - type: metrics
    field: imports.unique_modules
    min: 100
- id: js-oversized-source-file
  desc: JavaScript source file exceeds 10 MB
  crit: notable
  conf: 0.9
  size_min: 10485760
  if:
    type: path
    basename: true
    regex: '\.([cm]?js|tsx?)$'
  unless:
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: metadata/file/text/format::sourcemap-sources-content
  - id: vscode-extension-large-line-context
composite_rules:
- id: vscode-extension-large-line-context
  desc: VS Code extension bundle context
  crit: component
  conf: 0.9
  any:
  - id: metadata/library/runtime::vscode-webview-bundle
  - id: metadata/library/runtime::acquire-vscode-api
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
