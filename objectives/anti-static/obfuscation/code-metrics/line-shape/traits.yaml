defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1027
  mbc: B0032
traits:
- id: js-junk-number-padding
  desc: High ratio of digit characters (junk padding)
  crit: notable
  conf: 0.85
  size_min: 5000
  size_max: 500000
  if:
    type: metrics
    field: text.digit_ratio
    min: 0.25
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
  - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
- id: js-megabyte-single-line
  desc: JS/TS line exceeds 1 MB (obfuscator)
  crit: suspicious
  conf: 0.9
  size_min: 1000000
  if:
    type: metrics
    field: text.max_line_length
    min: 1000000
  unless:
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: objectives/anti-static/obfuscation/payload/container::sources-content-json
  - type: metrics
    field: imports.unique_modules
    min: 100
- id: js-oversized-source-file
  desc: JavaScript source file exceeds 10 MB
  crit: suspicious
  conf: 0.9
  size_min: 10485760
  if:
    type: basename
    regex: '\.([cm]?js|tsx?)$'
  unless:
  - type: basename
    regex: \.map$
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: objectives/anti-static/obfuscation/payload/container::sources-content-json
