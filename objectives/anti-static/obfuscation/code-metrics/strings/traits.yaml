defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1027
  mbc: B0032
traits:
  - id: high-entropy-strings-dup
    desc: High entropy strings (encoded/encrypted data)
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: strings.avg_entropy
      min: 4.5
      min_size: 4096
    unless:
      - type: text
        substr: scipy
  - id: few-strings
    desc: Very few string literals (string obfuscation indicator)
    crit: notable
    conf: 0.4
    for: [scripts, -shell, binaries]
    if:
      type: metrics
      field: strings.total
      max: 3
      min_size: 2048
    unless:
      - id: few-strings-benign-context
      - type: basename
        regex: '\.blade\.php$'
  - id: comment-heavy-source
    desc: Comment-heavy source context
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: comments.to_code_ratio
      min: 0.35
  - id: whitespace-heavy-source
    desc: Whitespace-heavy source context
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: text.whitespace_ratio
      min: 0.6
  - id: interface-only-source
    desc: Interface declaration source context
    crit: component
    conf: 1.0
    if:
      type: raw
      regex: '^\s*interface\s+[A-Za-z_][A-Za-z0-9_]*'
  - id: typescript-declaration-basename
    desc: .d.ts/.d.mts/.d.cts TypeScript declaration filename
    crit: component
    conf: 1.0
    # Used as negative evidence: TS declaration files legitimately contain
    # very few string literals (types only, no runtime values).
    if:
      type: basename
      regex: \.d\.[cm]?ts$
  - id: flow-declaration-basename
    desc: .js.flow Flow type-declaration filename
    crit: component
    conf: 1.0
    # Negative evidence for few-strings: Flow declaration files are types-only.
    if:
      type: basename
      regex: \.js\.flow$
  - id: symbols-basename
    desc: .symbols metadata filename
    crit: component
    conf: 1.0
    if:
      type: basename
      regex: \.symbols$
  - id: readme-basename
    desc: README basename (markdown/plain text)
    crit: component
    conf: 1.0
    for: [javascript, typescript, html]
    if:
      type: basename
      regex: '(^|[._-])README([._-][^\\/]*)?$'
  - id: unicore-generated-text
    desc: Unicode table generated text
    crit: component
    conf: 1.0
    if:
      type: text
      substr: "machine-generated by lib/unicore"
composite_rules:
  - id: few-strings-benign-context
    desc: Benign few-strings context
    crit: component
    conf: 1.0
    any:
      - id: comment-heavy-source
      - id: whitespace-heavy-source
      - id: interface-only-source
      - id: objectives/anti-static/obfuscation/code-metrics/structure::html-basename
      - id: typescript-declaration-basename
      - id: flow-declaration-basename
      - id: symbols-basename
      - id: readme-basename
      - id: unicore-generated-text
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: objectives/discovery/system/fingerprint/info::rendered-phpinfo-dump
  - id: string-hiding
    desc: String concealment/encoding
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/supply-chain/trojanized/backdoor::high-entropy-strings-dup
    any:
      - id: few-strings
      - id: objectives/anti-static/obfuscation/code-metrics/structure::high-text-entropy
    unless:
      - id: objectives/anti-static/obfuscation/code-metrics/strings::string-hiding__unless_1
