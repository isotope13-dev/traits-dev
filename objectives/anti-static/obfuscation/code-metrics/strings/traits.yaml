defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  attack: T1027
  mbc: B0032
traits:
  - id: high-entropy-strings-dup
    desc: High entropy strings (encoded/encrypted data)
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: strings.avg_entropy
      min: 4.5
      min_size: 4096
    unless:
      - type: raw
        substr: scipy
  - id: few-strings
    desc: Very few string literals (string
    crit: notable
    conf: 0.4
    if:
      type: metrics
      field: strings.total
      max: 5
      min_size: 2048
    unless:
      - type: metrics
        field: comments.to_code_ratio
        min: 0.35
      - type: raw
        regex: '^\s*interface\s+[A-Za-z_][A-Za-z0-9_]*'
      - type: basename
        regex: \.html?$
      - type: basename
        regex: \.d\.[cm]?ts$
      - type: basename
        regex: \.js\.flow$
composite_rules:
  - id: string-hiding
    desc: String concealment/encoding
    crit: notable
    conf: 0.85
    all:
      - id: objectives/command-and-control/backdoor/binary::high-entropy-strings-dup
    any:
      - id: few-strings
      - id: objectives/anti-static/obfuscation/code-metrics/structure::high-text-entropy
    unless:
      - id: objectives/anti-static/obfuscation/code-metrics/strings::string-hiding__unless_1
