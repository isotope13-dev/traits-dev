defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1027
  mbc: B0032
traits:
  - id: few-strings
    desc: 'Very few string literals'
    crit: component
    conf: 0.4
    for: [scripts, -shell, binaries]
    if:
      type: metrics
      field: strings.total
      max: 3
      min_size: 2048
    unless:
      - id: objectives/anti-static/obfuscation/code-metrics/strings/
      - type: basename
        regex: '\.blade\.php$'
  - id: comment-heavy-source
    desc: 'High comment-to-code ratio (≥35%)'
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: comments.to_code_ratio
      min: 0.35
  - id: whitespace-heavy-source
    desc: 'Benign context: high whitespace ratio (≥60%)'
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: text.whitespace_ratio
      min: 0.6
  - id: readme-basename
    desc: README basename (markdown/plain text)
    crit: component
    conf: 1.0
    for: [javascript, typescript, html]
    if:
      type: path
      basename: true
      regex: '(^|[._-])README([._-][^\\/]*)?$'
  - id: unicore-generated-text
    desc: Unicode table generated text
    crit: component
    conf: 1.0
    if:
      type: text
      substr: "machine-generated by lib/unicore"
composite_rules:
  - id: few-strings-benign-context
    desc: Benign few-strings context
    crit: component
    conf: 1.0
    any:
      - id: comment-heavy-source
      - id: whitespace-heavy-source
      - id: metadata/lang/source::interface-only-source
      - id: metadata/file/extension/identity::html-basename
      - id: metadata/file/extension/identity::typescript-declaration-extension
      - id: metadata/file/extension/identity::flow-declaration-extension
      - id: readme-basename
      - id: unicore-generated-text
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/library/web-frameworks::wordpress-block-build-asset
      - id: metadata/library/web-frameworks::wordpress-block-pattern-file
      - id: metadata/library/presentation-lib::photoswipe-dynamic-caption-bundle
      - id: metadata/library/presentation-lib::photoswipe-lightbox-bundle
      - id: objectives/discovery/system/fingerprint/info::rendered-phpinfo-dump
  - id: string-hiding
    desc: String concealment/encoding
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/supply-chain/trojanized/backdoor::high-entropy-strings-dup
    any:
      - id: few-strings
      - id: objectives/anti-static/obfuscation/code-metrics/structure::high-text-entropy
    unless:
      - id: objectives/anti-static/obfuscation/code-metrics/strings::string-hiding__unless_1
