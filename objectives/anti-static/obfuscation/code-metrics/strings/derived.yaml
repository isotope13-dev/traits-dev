defaults:
  platforms:
    - unix
    - windows
  crit: notable
  conf: 1.0
  for: [scripts, binaries]
traits:
  # Exclusion marker only: referenced as the `unless:` of strings::string-hiding
  # to suppress string-concealment findings in SWIG/Sweave generated code. It has
  # no standalone meaning (the word "swig"/"sweave" is not obfuscation), so it must
  # stay `component` — at notable it surfaced as a bogus obfuscation finding on
  # every SWIG binding.
  - id: string-hiding__unless_1
    desc: SWIG/Sweave generated-code marker
    crit: component
    if:
      type: text
      regex: \bsw(eave|ig)\b
    unless:
      - id: metadata/file/catalog/identity::neovim-filetype-registry
