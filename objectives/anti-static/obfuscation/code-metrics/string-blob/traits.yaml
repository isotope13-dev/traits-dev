defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1027
  mbc: B0032
traits:
- id: js-long-string-benign-text--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: QuickLook.Plugin.MarkdownViewer.Resources.js
  count_max: 1023719
- id: js-long-string-benign-text--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: 万与丑专业丛东丝丢两严丧个
  count_max: 1023720
- id: js-long-string-benign-text--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: mermaid-architecture
  count_max: 1023721
- id: js-long-string-benign-text--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: /*! jQuery v
  count_max: 1023722
- id: js-multi-line-blob-benign-text--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: 万与丑专业丛东丝丢两严丧个
  count_max: 1023723
- id: js-multi-line-blob-benign-text--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: data:image
  count_max: 1023724
- id: js-multi-line-blob-benign-text--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: sourceText
  count_max: 1023725
- id: js-multi-line-blob-benign-text--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: base64
  count_max: 1023726
- id: js-multi-line-blob-benign-text--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: chunk
  count_max: 1023727
- id: js-multi-line-blob-benign-text--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: from
  count_max: 1023728
- id: js-multi-line-blob-benign-text--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: jpeg
  count_max: 1023729
- id: js-multi-line-blob-benign-text--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: webp
  count_max: 1023730
- id: js-multi-line-blob-benign-basename
  desc: Benign multiline blob basename
  crit: component
  conf: 0.95
  if:
    type: basename
    regex: '(\.shp$|license)'
- id: js-very-long-string-blobs
  desc: Multiple very long embedded strings
  crit: baseline
  conf: 0.9
  size_min: 8000
  size_max: 30000
  entropy_min: 4.2
  if:
    type: metrics
    field: strings.very_long_strings
    min: 10
  unless:
  - id: js-long-string-benign-context
- id: js-multi-line-blob-layout
  desc: Multiple source lines exceed 1000 chars
  crit: suspicious
  conf: 0.88
  size_min: 32768
  size_max: 3145728
  entropy_min: 4.2
  if:
    type: metrics
    field: text.lines_over_1000
    min: 2
  not:
  - regex: \.nib$
  unless:
  - id: js-multi-line-blob-benign-context
  - type: metrics
    field: imports.unique_modules
    min: 50
- id: js-base64-candidate-cluster
  desc: Multiple base64-like string candidates
  crit: notable
  conf: 0.88
  size_min: 8000
  size_max: 30000
  if:
    type: metrics
    field: strings.base64_candidates
    min: 3
  unless:
  - id: js-base64-candidate-benign-context
  - type: basename
    regex: (?i)(i18n|l10n|locale)\.
  - type: basename
    regex: (?i)translations?\.
- id: js-base64-candidate-electron-bundle-context
  desc: Electron bundle base64 candidate context
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'from"\./chunk-|process\._linkedBinding\("electron_|electron_browser_app'
- id: js-base64-candidate-benign-basename
  desc: Benign base64 candidate basename
  crit: component
  conf: 0.95
  if:
    type: basename
    regex: \.(d\.ts|pug|7z)$
- id: js-base64-candidate-low-string-density
  desc: Low string density base64 context
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: text.string_density
    max: 0.9
- id: js-base64-candidate-large-import-graph
  desc: Large import graph base64 context
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: imports.unique_modules
    min: 60
- id: js-base64-candidate-comment-heavy
  desc: Comment-heavy base64 context
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: comments.to_code_ratio
    min: 0.25
- id: js-base64-candidate-benign-ui-text
  desc: Benign UI base64 candidate text
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'kugoujsbridge://start\.kugou_jsbridge/\?|Toggle zoomed view'
composite_rules:
- id: js-long-string-benign-context
  desc: Benign long string context
  crit: component
  conf: 0.95
  any:
  - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
  - id: js-long-string-benign-text
  - id: metadata/package/testing/harness::is-test
  - id: objectives/anti-static/obfuscation/payload::mathjax-webpack-bundle
  - id: objectives/anti-static/obfuscation/string/reconstruct::mermaid-bundle-marker
  - id: objectives/anti-static/obfuscation/code-metrics::imports-unique-modules-50
- id: js-multi-line-blob-benign-context
  desc: Benign multiline blob context
  crit: component
  conf: 0.95
  any:
  - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
  - id: js-multi-line-blob-benign-basename
  - id: js-multi-line-blob-benign-text
  - id: metadata/package/testing/harness::is-test
  - id: objectives/anti-static/obfuscation/code-metrics::imports-unique-modules-50
  - id: metadata/file/text::frequency-list-catalog
- id: js-base64-candidate-benign-context
  desc: Benign base64 candidate context
  crit: component
  conf: 0.95
  any:
  - id: metadata/package/testing/harness::is-test
  - id: js-base64-candidate-electron-bundle-context
  - id: js-base64-candidate-benign-basename
  - id: js-base64-candidate-low-string-density
  - id: js-base64-candidate-large-import-graph
  - id: js-base64-candidate-comment-heavy
  - id: js-base64-candidate-benign-ui-text
- id: js-compact-encoded-stub
  desc: Compact JavaScript stub with encoded blobs
  crit: suspicious
  conf: 0.94
  size_min: 8000
  size_max: 30000
  all:
  - id: js-very-long-string-blobs
  - id: js-multi-line-blob-layout
  - id: js-base64-candidate-cluster
  any:
  - id: objectives/anti-static/obfuscation/code-metrics/structure::high-text-entropy
  - id: objectives/anti-static/obfuscation/code-metrics::js-high-entropy-identifier-ratio
- id: js-long-string-benign-text
  desc: Benign long string text
  crit: component
  conf: 0.95
  any:
  - id: js-long-string-benign-text--rx-1
  - id: js-long-string-benign-text--rx-2
  - id: js-long-string-benign-text--rx-3
  - id: js-long-string-benign-text--rx-4
- id: js-multi-line-blob-benign-text
  desc: Benign multiline blob text
  crit: component
  conf: 0.95
  any:
  - id: js-multi-line-blob-benign-text--rx-5
  - id: js-multi-line-blob-benign-text--rx-6
  - id: js-multi-line-blob-benign-text--rx-7
  - id: js-multi-line-blob-benign-text--rx-8
  - id: js-multi-line-blob-benign-text--rx-9
  - id: js-multi-line-blob-benign-text--rx-10
  - id: js-multi-line-blob-benign-text--rx-11
  - id: js-multi-line-blob-benign-text--rx-12
