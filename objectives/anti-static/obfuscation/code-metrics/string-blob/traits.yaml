defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1027
  mbc: B0032
traits:
- id: js-long-string-recognized-text--rx-1
  desc: QuickLook MarkdownViewer resource marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: QuickLook.Plugin.MarkdownViewer.Resources.js
  count_max: 1023719
- id: js-multi-line-blob-recognized-basename
  desc: Recognized multiline blob basename
  crit: component
  conf: 0.95
  if:
    type: path
    basename: true
    regex: '(\.shp$|license)'
- id: js-very-long-string-blobs
  desc: Multiple very long embedded strings
  crit: baseline
  conf: 0.9
  size_min: 8000
  size_max: 30000
  entropy_min: 4.2
  if:
    type: metrics
    field: strings.very_long_strings
    min: 10
  unless:
  - id: js-long-string-recognized-marker
  - id: js-multi-line-blob-recognized-marker
- id: js-max-string-over-3000
  # A single >=3000-char embedded string. Neutral on its own (webview HTML/JS
  # templates, embedded data/SVG, config blobs all qualify), so baseline — it is
  # the payload-blob half of the eval-loader dropper composites in
  # command-and-control/dropper/execution/script-dropper, which reference it
  # cross-tier and add the obfuscation + eval context.
  desc: Embedded string exceeds 3000 chars
  crit: baseline
  conf: 0.86
  size_min: 8000
  size_max: 30000
  if:
    type: metrics
    field: strings.max_length
    min: 3000
  unless:
  - id: js-long-string-recognized-marker
  - id: js-multi-line-blob-recognized-marker
  - id: objectives/command-and-control/dropper/execution/script-dropper/
  - id: metadata/file/format/
  - type: text
    substr: "ObjC.import('AppKit')"
  - type: text
    substr: NSBitmapImageRep
- id: js-base64-candidate-cluster
  desc: Base64-like string cluster
  crit: component
  conf: 0.88
  size_min: 8000
  size_max: 30000
  if:
    type: metrics
    field: strings.base64_candidates
    min: 3
  unless:
  - id: js-base64-candidate-recognized-marker
  - id: metadata/library/structure/
  - id: well-known/app/open-webui-computer/
  - type: basename
    regex: (?i)(i18n|l10n|locale)\.
  - type: basename
    regex: (?i)translations?\.
- id: js-base64-candidate-electron-bundle-marker
  desc: Electron bundle base64 candidate marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'from"\./chunk-|electron_browser_app'
- id: js-base64-candidate-recognized-ui-text
  desc: Recognized UI base64 candidate text
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'kugoujsbridge://start\.kugou_jsbridge/\?|Toggle zoomed view'
composite_rules:
- id: js-long-string-recognized-marker
  desc: Recognized long string marker
  crit: component
  conf: 0.95
  any:
  - id: metadata/file/format::source-svg-path-data-marker
  - id: js-long-string-recognized-text
  - id: metadata/package/testing/harness/runtime::is-test
  - id: objectives/anti-static/obfuscation/payload/container::mathjax-webpack-bundle
  - id: metadata/library/mermaid::mermaid-bundle-marker
  - id: metadata/file/metrics::imports-unique-modules-50
- id: js-multi-line-blob-recognized-marker
  desc: Recognized multiline blob marker
  crit: component
  conf: 0.95
  any:
  - id: metadata/library/structure::js-any-bundle-output
  - id: metadata/file/format::source-svg-path-data-marker
  - id: js-multi-line-blob-recognized-basename
  - id: js-multi-line-blob-recognized-text
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/file/metrics::imports-unique-modules-50
  - id: metadata/file/catalog/identity::frequency-list-catalog
  - id: metadata/library/structure::js-dist-asset-bundle
  - id: metadata/library/structure::js-hashed-asset-bundle
  - id: metadata/library/upload::uppy-i18n-bundle
  - id: metadata/library/runtime::fontawesome-free-header
  - id: well-known/lib/pdfjs::pdfjs-bundle
  - id: well-known/lib/jspdf::html2pdf-bundle
  - id: well-known/lib/jspdf::jspdf-standard-font-data
  - id: objectives/anti-static/obfuscation/eval/require::tiktoken-module-marker
- id: js-base64-candidate-recognized-marker
  desc: Recognized base64 candidate marker
  crit: component
  conf: 0.95
  any:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: js-base64-candidate-electron-bundle-marker
  - id: metadata/file/extension/identity::declaration-file-extension
  - id: metadata/file/extension/identity::pug-template-extension
  - id: metadata/file/extension/identity::seven-zip-archive-extension
  - id: metadata/file/metrics::low-string-density-large-file
  - id: metadata/file/metrics::imports-unique-modules-60
  - id: metadata/file/metrics::high-comment-to-code-ratio
  - id: js-base64-candidate-recognized-ui-text
  - id: metadata/library/structure::js-tsc-reexport-barrel
  - id: well-known/lib/jspdf::html2pdf-bundle
  - id: well-known/lib/jspdf::jspdf-standard-font-data
- id: js-compact-encoded-stub
  desc: Compact JavaScript stub with encoded blobs
  crit: suspicious
  conf: 0.94
  size_min: 8000
  size_max: 30000
  all:
  - id: js-very-long-string-blobs
  - id: metadata/file/metrics::multiple-lines-over-1000-chars
  - id: js-base64-candidate-cluster
  any:
  - id: metadata/file/metrics::high-text-entropy
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers::js-high-entropy-identifier-ratio
- id: js-long-string-recognized-text
  desc: Recognized long string text
  crit: component
  conf: 0.95
  any:
  - id: js-long-string-recognized-text--rx-1
  - id: metadata/package/testing/harness/fixture::cjk-long-string-fixture
  - id: metadata/library/mermaid::architecture-fixture
  - id: metadata/library/jquery::header-prefix
- id: js-multi-line-blob-recognized-text
  desc: Recognized multiline blob text
  crit: component
  conf: 0.95
  any:
  - id: metadata/package/testing/harness/fixture::cjk-long-string-fixture
  - id: micro-behaviors/communications/url/encoded::inline-image-data-uri-context
  - id: metadata/file/string/identity::source-text-token
  - id: micro-behaviors/data/encoded::base64-token
  - id: metadata/file/string/identity::chunk-token
