defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1027
  mbc: B0032
traits:
- id: js-many-shell-command-strings
  desc: Many shell command strings in JavaScript
  crit: component
  conf: 0.86
  if:
    type: metrics
    field: strings.shell_command_strings
    min: 20
- id: js-many-network-indicators
  desc: Many network indicators in JavaScript
  crit: component
  conf: 0.86
  if:
    type: metrics
    field: strings.url_count
    min: 50
- id: js-many-ip-indicators
  desc: Many IP address indicators in JavaScript
  crit: component
  conf: 0.86
  if:
    type: metrics
    field: strings.ip_count
    min: 10
composite_rules:
- id: oversized-js-command-network-surface
  desc: Oversized JavaScript carries command and network indicators
  crit: suspicious
  conf: 0.94
  all:
  - id: objectives/anti-static/obfuscation/code-metrics/line-shape::js-oversized-source-file
  - id: js-many-shell-command-strings
  any:
  - id: js-many-network-indicators
  - id: js-many-ip-indicators
  unless:
  - id: objectives/anti-static/obfuscation/payload::source-map-extension
  - id: objectives/anti-static/obfuscation/payload::sources-content-json
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  downgrade:
    any:
    - id: metadata/library/structure::js-large-module-bundle
