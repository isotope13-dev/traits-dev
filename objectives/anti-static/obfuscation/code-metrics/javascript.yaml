defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
  attack: T1027
  mbc: B0032
traits:
  - id: js-arrow-function-abuse
    desc: Excessive anonymous arrow functions (obfuscation
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: functions.anonymous
      min: 100
      min_size: 2048
    unless:
      - type: string_literal
        substr: MathJax
      - type: string_literal
        substr: wgxpath
      - type: string_literal
        substr: trix
      - type: string_literal
        substr: actiontext
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/testing/harness::is-test
  - id: js-deep-callback-nesting
    desc: Deep callback nesting in script
    crit: notable
    conf: 0.75
    if:
      type: metrics
      field: functions.max_nesting_depth
      min: 8
  - id: js-sphinx-searchindex
    desc: Sphinx documentation search index
    crit: notable
    conf: 0.9
    attack: ''
    mbc: ''
    if:
      type: text
      substr: Search.setIndex
  - id: js-iife-heavy
    desc: Repeated immediately invoked function expressions
    crit: notable
    conf: 0.85
    size_min: 2048
    count_min: 15
    per_kb_min: 5.0
    if:
      type: text
      regex: \(\s*(async\s+)?function\s*\([^)]{0,50}\)\s*\{|\(\s*[^)]{0,50}\)\s*=>
    unless:
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/package/testing/harness::is-test
  - id: js-indexof-decoder-heavy
    desc: Large JavaScript with repeated indexOf decoder tables
    crit: notable
    conf: 0.82
    size_min: 32768
    count_min: 20
    if:
      type: text
      regex: 'indexOf\s*\('
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/library/structure::js-large-module-bundle
      - type: text
        substr: fuse.js
      - type: text
        substr: lunr
  - id: js-charcode-decoder-heavy
    desc: Large JavaScript with repeated charCode decoder primitives
    crit: notable
    conf: 0.84
    size_min: 8192
    count_min: 6
    if:
      type: text
      word: charCodeAt
    unless:
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/testing/harness::is-test
  - id: js-junk-number-padding
    desc: High ratio of digit characters (junk padding)
    crit: notable
    conf: 0.85
    size_min: 5000
    size_max: 500000
    if:
      type: metrics
      field: text.digit_ratio
      min: 0.25
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
      - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
  - id: js-megabyte-single-line
    desc: JS/TS line exceeds 1 MB (obfuscator)
    crit: notable
    conf: 0.9
    size_min: 1000000
    if:
      type: metrics
      field: text.max_line_length
      min: 1000000
    unless:
      - id: objectives/anti-static/obfuscation/payload::source-map-extension
      - id: objectives/anti-static/obfuscation/payload::sources-content-json
      - type: metrics
        field: imports.unique_modules
        min: 100
  - id: imports-unique-modules-50
    desc: Many unique import modules
    crit: component
    if:
      type: metrics
      field: imports.unique_modules
      min: 50
  - id: js-long-string-benign-text
    desc: Benign long string text
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'QuickLook\.Plugin\.MarkdownViewer\.Resources\.js|万与丑专业丛东丝丢两严丧个|mermaid-architecture|/\*! jQuery v'
  - id: js-multi-line-blob-benign-text
    desc: Benign multiline blob text
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'sourceText:|from"\./chunk-|data:image/(?:png|jpeg|jpg|gif|webp);base64,|万与丑专业丛东丝丢两严丧个'
  - id: js-multi-line-blob-benign-basename
    desc: Benign multiline blob basename
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '(\.shp$|license)'
  - id: js-very-long-string-blobs
    desc: Multiple very long embedded strings
    crit: suspicious
    conf: 0.9
    size_min: 8000
    size_max: 30000
    entropy_min: 4.2
    if:
      type: metrics
      field: strings.very_long_strings
      min: 10
    unless:
      - id: js-long-string-benign-context
  - id: js-multi-line-blob-layout
    desc: Multiple source lines exceed 1000 chars
    crit: notable
    conf: 0.88
    size_min: 32768
    size_max: 3145728
    entropy_min: 4.2
    if:
      type: metrics
      field: text.lines_over_1000
      min: 2
    not:
      - regex: \.nib$
    unless:
      - id: js-multi-line-blob-benign-context
      - type: metrics
        field: imports.unique_modules
        min: 50
  - id: js-base64-candidate-cluster
    desc: Multiple base64-like string candidates
    crit: notable
    conf: 0.88
    size_min: 8000
    size_max: 30000
    if:
      type: metrics
      field: strings.base64_candidates
      min: 3
    unless:
      - id: js-base64-candidate-benign-context
      - type: basename
        regex: (?i)(i18n|l10n|locale)\.
      - type: basename
        regex: (?i)translations?\.
  - id: js-base64-candidate-electron-bundle-context
    desc: Electron bundle base64 candidate context
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'from"\./chunk-|process\._linkedBinding\("electron_|electron_browser_app'
  - id: js-base64-candidate-benign-basename
    desc: Benign base64 candidate basename
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: \.(?:d\.ts|pug|7z)$
  - id: js-base64-candidate-low-string-density
    desc: Low string density base64 context
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: text.string_density
      max: 0.9
  - id: js-base64-candidate-large-import-graph
    desc: Large import graph base64 context
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: imports.unique_modules
      min: 60
  - id: js-base64-candidate-comment-heavy
    desc: Comment-heavy base64 context
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: comments.to_code_ratio
      min: 0.25
  - id: js-base64-candidate-benign-ui-text
    desc: Benign UI base64 candidate text
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'kugoujsbridge://start\.kugou_jsbridge/\?|Toggle zoomed view'
  - id: js-high-entropy-identifier-ratio
    desc: High ratio of entropy-heavy identifiers
    crit: notable
    conf: 0.84
    size_min: 8000
    size_max: 30000
    if:
      type: metrics
      field: identifiers.high_entropy_ratio
      min: 0.35
    unless:
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: objectives/anti-static/obfuscation/payload::source-map-extension
      - type: basename
        regex: \.ts$
composite_rules:
  - id: js-long-string-benign-context
    desc: Benign long string context
    crit: component
    conf: 0.95
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
      - id: js-long-string-benign-text
      - id: metadata/package/testing/harness::is-test
      - id: objectives/anti-static/obfuscation/payload::mathjax-webpack-bundle
      - id: objectives/anti-static/obfuscation/string/reconstruct::mermaid-bundle-marker
      - id: imports-unique-modules-50
  - id: js-multi-line-blob-benign-context
    desc: Benign multiline blob context
    crit: component
    conf: 0.95
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
      - id: js-multi-line-blob-benign-basename
      - id: js-multi-line-blob-benign-text
      - id: metadata/package/testing/harness::is-test
      - id: imports-unique-modules-50
      - id: metadata/file/text::frequency-list-catalog
  - id: js-base64-candidate-benign-context
    desc: Benign base64 candidate context
    crit: component
    conf: 0.95
    any:
      - id: metadata/package/testing/harness::is-test
      - id: js-base64-candidate-electron-bundle-context
      - id: js-base64-candidate-benign-basename
      - id: js-base64-candidate-low-string-density
      - id: js-base64-candidate-large-import-graph
      - id: js-base64-candidate-comment-heavy
      - id: js-base64-candidate-benign-ui-text
  - id: js-obfuscator-pattern
    desc: JavaScript obfuscator tool output
    crit: suspicious
    conf: 0.9
    needs: 3
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/source::high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics::js-arrow-function-abuse
      - id: objectives/command-and-control/backdoor/binary::high-entropy-strings-dup
      - id: objectives/anti-static/obfuscation/code-metrics/structure::no-comments
    unless:
      - id: micro-behaviors/crypto/certificate/operations::pem-begin
  - id: js-npm-malware-pattern
    desc: npm malware obfuscation pattern (install
    crit: suspicious
    conf: 0.9
    size_max: 50000
    all:
      - id: objectives/anti-static/obfuscation/code-metrics/source::high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics/structure::no-comments
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
    unless:
      - id: js-sphinx-searchindex
      - id: micro-behaviors/crypto/certificate/operations::pem-begin
  - id: js-runtime-string-decoder-bundle
    desc: Large single-line JavaScript with runtime string decoder bundle
    crit: suspicious
    conf: 0.93
    size_min: 32768
    all:
      - id: js-indexof-decoder-heavy
      - id: js-charcode-decoder-heavy
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
      - id: objectives/anti-static/obfuscation/code-metrics/source::high-entropy-identifiers
  - id: js-compact-encoded-stub
    desc: Compact JavaScript stub with encoded blobs
    crit: suspicious
    conf: 0.94
    size_min: 8000
    size_max: 30000
    all:
      - id: js-very-long-string-blobs
      - id: js-multi-line-blob-layout
      - id: js-base64-candidate-cluster
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::high-text-entropy
      - id: js-high-entropy-identifier-ratio
