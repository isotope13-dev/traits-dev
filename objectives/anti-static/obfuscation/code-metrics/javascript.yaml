defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - javascript
    - typescript
  attack: T1027
  mbc: B0032
traits:
  - id: js-arrow-function-abuse
    desc: Excessive anonymous arrow functions (obfuscation
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: functions.anonymous
      min: 100
      min_size: 2048
    unless:
      - type: string_value
        substr: MathJax
      - type: string_value
        substr: wgxpath
      - type: string_value
        substr: trix
      - type: string_value
        substr: actiontext
      - id: metadata/dev/testing::is-test
  - id: js-deep-callback-nesting
    desc: Deep function nesting (callback hell
    crit: notable
    conf: 0.75
    if:
      type: metrics
      field: functions.max_nesting_depth
      min: 6
  - id: js-sphinx-searchindex
    desc: Sphinx documentation search index
    crit: notable
    conf: 0.9
    attack: ''
    mbc: ''
    if:
      type: raw
      substr: Search.setIndex
  - id: js-iife-heavy
    desc: Repeated immediately invoked function expressions
    crit: notable
    conf: 0.85
    size_min: 2048
    count_min: 15
    per_kb_min: 5.0
    if:
      type: raw
      regex: \(\s*(async\s+)?function\s*\([^)]{0,50}\)\s*\{|\(\s*[^)]{0,50}\)\s*=>
    unless:
      - id: metadata/dev/testing::is-test
  - id: js-indexof-decoder-heavy
    desc: Large JavaScript with repeated indexOf decoder tables
    crit: notable
    conf: 0.82
    size_min: 32768
    count_min: 20
    if:
      type: raw
      regex: 'indexOf\s*\('
    unless:
      - id: metadata/dev/testing::is-test
      - type: raw
        substr: fuse.js
      - type: raw
        substr: lunr
  - id: js-charcode-decoder-heavy
    desc: Large JavaScript with repeated charCode decoder primitives
    crit: notable
    conf: 0.84
    size_min: 8192
    count_min: 6
    if:
      type: raw
      word: charCodeAt
    unless:
      - id: metadata/dev/testing::is-test
composite_rules:
  - id: js-obfuscator-pattern
    desc: JavaScript obfuscator tool output
    crit: suspicious
    conf: 0.9
    needs: 3
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/source::high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics::js-arrow-function-abuse
      - id: objectives/command-and-control/backdoor/binary::high-entropy-strings-dup
      - id: objectives/anti-static/obfuscation/code-metrics/structure::no-comments
    none:
      - id: micro-behaviors/crypto/certificate/operations::pem-begin
  - id: js-npm-malware-pattern
    desc: npm malware obfuscation pattern (install
    crit: suspicious
    conf: 0.9
    size_max: 50000
    all:
      - id: objectives/anti-static/obfuscation/code-metrics/source::high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics/structure::no-comments
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
    none:
      - id: js-sphinx-searchindex
      - id: micro-behaviors/crypto/certificate/operations::pem-begin
  - id: js-runtime-string-decoder-bundle
    desc: Large single-line JavaScript with runtime string decoder bundle
    crit: suspicious
    conf: 0.93
    size_min: 32768
    all:
      - id: js-indexof-decoder-heavy
      - id: js-charcode-decoder-heavy
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
      - id: objectives/anti-static/obfuscation/code-metrics/source::high-entropy-identifiers
