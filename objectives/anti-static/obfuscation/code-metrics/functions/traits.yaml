defaults:
  platforms: [windows, unix]
  for: [scripts, pe, elf, macho]
  attack: T1027
  mbc: B0032

traits:
  - id: high-entropy-function-names
    desc: Random-looking source function names
    crit: notable
    conf: 0.85
    size_max: 50000
    unless:
      - type: basename
        exact: jruby-complete.jar
      - type: basename
        regex: (^|[\\/!])jruby-complete\.jar$
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
      - id: well-known/lib/jruby/
      # Long average name length means descriptive camelCase, not obfuscation.
      # The entropy metric scores long readable identifiers
      # (resolveProjectSettingsFilePath) as "random"; real obfuscation produces
      # SHORT high-entropy names (a, qB, _0x4a3f). High avg length rules it out.
      - type: metrics
        field: functions.avg_name_length
        min: 14
    if:
      type: metrics
      field: functions.high_entropy_names
      min: 40

  - id: single-char-function-names
    desc: Single-character function names
    crit: baseline
    conf: 0.8
    size_max: 100000
    unless:
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
    if:
      type: metrics
      field: functions.single_char_names
      min: 8
      min_size: 12288

  - id: many-anonymous-functions
    desc: Many anonymous source function definitions
    crit: baseline
    conf: 0.75
    for: [javascript, typescript]
    size_max: 500000
    unless:
      - type: basename
        regex: '^terminal\.[jt]s$'
      - type: basename
        regex: '^windows(Terminal|PtyAgent)\.js$'
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure/
      - id: objectives/anti-static/obfuscation/code-metrics/functions/
      - type: metrics
        field: imports.unique_modules
        min: 100
      # Readable code (generous whitespace) with many callbacks/handlers is
      # ordinary structure, not obfuscation — obfuscated code is dense.
      - type: metrics
        field: text.whitespace_ratio
        min: 0.14
    if:
      type: metrics
      field: functions.anonymous
      min: 35

  - id: many-one-liner-functions
    desc: Many one-line source function definitions
    crit: baseline
    conf: 0.7
    size_max: 500000
    unless:
      - id: metadata/library/structure/
      - id: objectives/anti-static/obfuscation/code-metrics/functions/
      - id: metadata/lang/source::python-protobuf-stub
      - id: metadata/library/web-frameworks/
      - id: metadata/file/extension/identity::python-type-stub-extension
      - type: metrics
        field: imports.unique_modules
        min: 100
      - id: objectives/anti-static/obfuscation/code-metrics/functions/
    if:
      type: metrics
      field: functions.one_liners
      min: 15
      min_size: 1024

  - id: deep-nesting
    desc: Deep function nesting
    crit: baseline
    conf: 0.75
    unless:
      - id: metadata/library/structure/
      - id: metadata/file/format::sourcemap-sources-content
      - id: well-known/lib/influxdb3-js
      - id: well-known/lib/protobuf-ts
      - id: well-known/lib/apache-arrow
      - id: objectives/anti-static/obfuscation/code-metrics/functions/
      # Readable code (generous whitespace) reaching depth 5 via promise/handler
      # chains is ordinary structure, not obfuscation.
      - type: metrics
        field: text.whitespace_ratio
        min: 0.14
    if:
      type: metrics
      field: functions.max_nesting_depth
      min: 5

  - id: terminal-js-basename
    desc: Terminal JavaScript basename
    crit: component
    conf: 1.0
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: ^terminal\.[jt]s$
  - id: compact-tool-basename
    desc: Compact utility module basename
    crit: component
    conf: 1.0
    for: [javascript]
    if:
      type: path
      basename: true
      regex: ^(rimraf|run-(script-)?os|ipv6(grep)?)$

composite_rules:
  - id: many-anonymous-functions-benign-context
    desc: Benign anonymous-function bundle context
    crit: component
    conf: 1.0
    any:
      - id: metadata/library/web-frameworks::wordpress-block-build-asset
      - id: metadata/library/presentation-lib::photoswipe-dynamic-caption-bundle
      - id: metadata/library/presentation-lib::photoswipe-lightbox-bundle
  - id: one-liner-benign-context
    desc: Generated or bundled one-liner context
    crit: component
    conf: 1.0
    any:
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
      - id: terminal-js-basename
      - id: compact-tool-basename
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - id: objectives/anti-static/obfuscation/code-metrics/source::locale-path
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/web-frameworks::wordpress-block-build-asset
      - id: metadata/build/bundler::webpack-bundled
      - id: steam-trade-content-script-context
  - id: steam-trade-content-script-context
    desc: Steam trade extension script context
    crit: component
    conf: 0.95
    any:
      - id: micro-behaviors/communications/http/services/steam::steam-trade-extension-automation
      - id: micro-behaviors/process/inject/webextension::extension-page-script-injection
      - id: micro-behaviors/ui/window/manage/dom::window-postmessage-opnskin
      - id: micro-behaviors/ui/window/manage/dom::steam-confirm-tradeoffer-call
      - id: micro-behaviors/ui/window/manage/dom::steam-trade-confirm-button
      - id: micro-behaviors/communications/http/services/opnskin::opnskin-steam-trade-bridge
      - id: micro-behaviors/communications/http/services/opnskin::opnskin-trade-state-monitor
  - id: generated-code
    desc: Generated or transformed code
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::identifier-obfuscation
      - id: single-char-function-names
      - id: metadata/file/metrics::single-char-params
    unless:
      - id: metadata/library/structure/
      - id: well-known/lib/pyaigis/
