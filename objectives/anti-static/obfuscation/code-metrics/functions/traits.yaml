defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  attack: T1027
  mbc: B0032
traits:
  - id: high-entropy-function-names
    desc: Functions with random-looking names
    crit: notable
    conf: 0.85
    size_max: 50000
    if:
      type: metrics
      field: functions.high_entropy_names
      min: 16
    unless:
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: basename
        regex: \.pyi$
      - type: metrics
        field: identifiers.avg_length
        min: 12
      - type: raw
        substr: Code generated by private/model/cli/gen-api/main.go
  - id: single-char-function-names
    desc: Functions with single-character names
    crit: notable
    conf: 0.8
    size_max: 100000
    if:
      type: metrics
      field: functions.single_char_names
      min: 8
      min_size: 12288
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: string_value
        substr: MathJax
  - id: many-anonymous-functions
    desc: Many anonymous functions
    crit: notable
    conf: 0.75
    for: [scripts, binaries, -powershell]
    if:
      type: metrics
      field: functions.anonymous
      min: 15
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: metrics
        field: text.whitespace_ratio
        min: 0.2
  - id: high-function-density
    desc: High function density (>20 functions
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: functions.density_per_100_lines
      min: 20
      min_size: 1024
    unless:
      - id: metadata/package::php-manual-empty-function-stubs
      - type: basename
        regex: \.pyi$
      - type: raw
        substr: automatically generated
      - type: raw
        substr: DO NOT MODIFY BY HAND
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/tooling::esmodule-bundled
  - id: many-one-liner-functions
    desc: Many one-liner functions (minified code
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: functions.one_liners
      min: 5
      min_size: 1024
    unless:
      - id: metadata/package::php-manual-empty-function-stubs
      - type: basename
        regex: \.pyi$
      - id: metadata/package/testing/harness::is-test
      - type: metrics
        field: text.whitespace_ratio
        min: 0.2
      - id: metadata/package/tooling::esmodule-bundled
  - id: deep-nesting
    desc: Deeply nested functions (complexity indicator)
    crit: baseline
    conf: 0.75
    if:
      type: metrics
      field: functions.max_nesting_depth
      min: 5
  - id: single-char-params
    desc: Many single-character parameter names
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: functions.single_char_params
      min: 10
  - id: many-no-param-functions
    desc: Many no-parameter functions (obfuscation wrapper)
    crit: notable
    conf: 0.75
    size_min: 5000
    if:
      type: metrics
      field: functions.no_params_count
      min: 25
composite_rules:
  - id: generated-code
    desc: Machine-generated or transformed code
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
      - id: single-char-function-names
      - id: single-char-params
