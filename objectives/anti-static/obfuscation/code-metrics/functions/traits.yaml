defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1027
  mbc: B0032

traits:
  - id: high-entropy-function-names
    desc: Random-looking function names
    crit: notable
    conf: 0.85
    size_max: 50000
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      type: metrics
      field: functions.high_entropy_names
      min: 16

  - id: single-char-function-names
    desc: Single-character function names
    crit: baseline
    conf: 0.8
    size_max: 100000
    unless:
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
    if:
      type: metrics
      field: functions.single_char_names
      min: 8
      min_size: 12288

  - id: many-anonymous-functions
    desc: Many anonymous functions
    crit: notable
    conf: 0.75
    for: [javascript, typescript]
    size_max: 500000
    unless:
      - type: basename
        regex: \.map$
      - type: basename
        regex: '^terminal\.[jt]s$'
      - type: basename
        regex: '^windows(Terminal|PtyAgent)\.js$'
      - id: metadata/package/testing/harness::is-test
      - id: metadata/library/structure::js-webpack-bundle
      - type: metrics
        field: imports.unique_modules
        min: 100
    if:
      type: metrics
      field: functions.anonymous
      min: 35

  - id: high-function-density
    desc: High function density
    crit: baseline
    conf: 0.85
    if:
      type: metrics
      field: functions.density_per_100_lines
      min: 20
      min_size: 1024

  - id: many-one-liner-functions
    desc: Many one-line functions
    crit: notable
    conf: 0.7
    size_max: 500000
    unless:
      - type: basename
        regex: \.map$
      - type: basename
        regex: ^terminal\.[jt]s$
      - type: basename
        regex: ^(rimraf|run-(script-)?os|ipv6(grep)?)$
      - id: metadata/package/testing/harness::is-test
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - type: metrics
        field: imports.unique_modules
        min: 100
    if:
      type: metrics
      field: functions.one_liners
      min: 15
      min_size: 1024

  - id: deep-nesting
    desc: Deep function nesting
    crit: baseline
    conf: 0.75
    if:
      type: metrics
      field: functions.max_nesting_depth
      min: 5

  - id: single-char-params
    desc: Many single-char params
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: functions.single_char_params
      min: 10

  - id: many-no-param-functions
    desc: Many no-param functions
    crit: baseline
    conf: 0.75
    size_min: 5000
    if:
      type: metrics
      field: functions.no_params_count
      min: 25

composite_rules:
  - id: generated-code
    desc: Generated or transformed code
    crit: notable
    conf: 0.85
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
      - id: single-char-function-names
      - id: single-char-params
