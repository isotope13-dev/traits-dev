defaults:
  platforms: [windows, unix]
  # These rules describe Lua source syntax.  Applying them to arbitrary text
  # treats escaped bytes embedded in other languages (for example OCaml's
  # generated Unicode tables) as Lua obfuscation.  Some droppers disguise
  # Lua source as .txt, so the content-specific rules also accept text.
  for: [lua, text]
  attack: T1027
traits:
  - id: lua-packed-return-function-loader
    desc: Packed Lua return-function loader
    crit: suspicious
    conf: 0.94
    # A payload can be mislabeled with a non-Lua extension and be classified
    # by content heuristics as JavaScript.  This matcher is still keyed to
    # Lua syntax, so accepting that classifier is safe and keeps the trait's
    # identity honest.
    for: [lua, javascript, text]
    size_min: 50000
    if:
      type: text
      regex: '^return\(function\(\.\.\.\)return\(function\([A-Za-z,]{20,120}\)'

  - id: lua-indexed-string-permutation-decoder
    desc: Lua indexed string permutation decoder
    crit: suspicious
    conf: 0.93
    for: [lua, javascript, text]
    size_min: 50000
    if:
      type: text
      regex: 'for [A-Za-z]=1,#z/2,1 do [A-Za-z]=[A-Za-z]\.\.z\[#z/2\+z\[[A-Za-z]\]\]end return [A-Za-z]'

  - id: lua-index-loop-concat
    desc: Lua indexed loop concatenates values
    crit: component
    conf: 0.94
    for: [lua, javascript, text]
    size_min: 50000
    if:
      type: text
      regex: 'for\s+[A-Za-z_]\w*\s*=\s*1\s*,\s*#[A-Za-z_]\w*\s*,\s*1\s*do'

  - id: lua-indexed-concat
    desc: Lua concatenates an indexed value
    crit: component
    conf: 0.94
    for: [lua, javascript, text]
    size_min: 50000
    if:
      type: text
      regex: '[A-Za-z_]\w*\s*=\s*[A-Za-z_]\w*\.\.\s*[A-Za-z_]\w*\s*\[\s*[A-Za-z_]\w*\s*\['

  - id: lua-decimal-escape-string-table
    desc: Decimal-escaped Lua string table
    crit: suspicious
    conf: 0.94
    size_min: 50000
    count_min: 100
    if:
      type: text
      regex: '\\[0-9]{3}'

  - id: lua-large-single-line-dispatch
    desc: Large one-line Lua dispatch
    crit: suspicious
    conf: 0.9
    size_min: 50000
    if:
      type: metrics
      field: text.total_lines
      max: 3

  - id: lua-environment-proxy-loader
    desc: Lua environment and proxy loader
    crit: suspicious
    conf: 0.95
    for: [lua, javascript, text]
    if:
      type: text
      regex: '(?s)getfenv.{0,200}newproxy.{0,80}setmetatable'

composite_rules:
  - id: lua-indexed-string-table-reassembly
    desc: Indexed Lua string-table reassembly
    crit: suspicious
    conf: 0.95
    for: [lua, javascript, text]
    size_min: 50000
    all:
      - id: lua-index-loop-concat
      - id: lua-indexed-concat

  - id: packed-lua-loader-obfuscation
    desc: Packed Lua loader obfuscation
    crit: hostile
    conf: 0.96
    for: [lua, javascript, text]
    all:
      - id: lua-packed-return-function-loader
      - id: lua-indexed-string-permutation-decoder

  - id: lua-obfuscated-string-dispatch
    desc: Indexed strings plus one-line Lua dispatch
    crit: hostile
    conf: 0.97
    all:
      - id: lua-indexed-string-table-reassembly
      - id: lua-large-single-line-dispatch

  - id: lua-escaped-string-dispatch
    desc: Indexed strings plus escaped Lua payload
    crit: hostile
    conf: 0.98
    attack: T1027,T1140
    all:
      - id: lua-indexed-string-table-reassembly
      - id: lua-decimal-escape-string-table

  - id: lua-environment-proxy-obfuscated-loader
    desc: Escaped Lua environment/proxy loader
    crit: hostile
    conf: 0.98
    all:
      - id: lua-environment-proxy-loader
      - id: lua-decimal-escape-string-table
      - id: lua-indexed-string-table-reassembly
