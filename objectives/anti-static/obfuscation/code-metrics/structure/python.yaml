# Python-Specific Metrics-Based Obfuscation Detection
# Detects Python obfuscation patterns common in PyPI malware
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1027"
  mbc: "B0032"
traits:
  # === Python-Specific Obfuscation Patterns ===
  - id: py-lambda-abuse
    desc: "Excessive lambda functions (obfuscation via"
    crit: suspicious
    conf: 0.8
    if:
      type: metrics
      field: functions.anonymous
      min: 15
  - id: py-stub-definitions
    desc: "Python stub definitions (def ...: ...)"
    crit: component
    conf: 0.5
    count_min: 5
    if:
      type: text
      regex: 'def\s+\w+\(.{0,200}\).{0,50}:\s*\.\.\.'
    unless:
      - type: basename
        regex: \.pyi$
  - id: py-single-line-heavy
    desc: "Many one-liner functions (compressed code)"
    crit: component
    conf: 0.75
    if:
      type: metrics
      field: functions.one_liners
      min: 10
      min_size: 16384
    unless:
      - id: py-stub-definitions
      - type: basename
        regex: \.pyi$
  - id: py-nested-functions
    desc: "Nested function definitions (closure obfuscation)"
    crit: suspicious
    conf: 0.7
    if:
      type: metrics
      field: functions.nested_functions
      min: 5
  - id: py-encoded-strings
    desc: "High string entropy (base64/hex encoded"
    crit: suspicious
    conf: 0.85
    # Small files with high entropy strings are more suspicious
    size_max: 50000
    if:
      type: metrics
      field: strings.avg_entropy
      min: 5.5
      min_size: 4096
    unless:
      - type: text
        substr: "weave"
  - id: pandas-library
    desc: pandas data analysis library
    crit: component
    if:
      type: text
      substr: pandas

  # Many hex-only strings in a small file = embedded credential/key/IV blob.
  # Legitimate code may have one or two test fixtures; four-plus is the
  # signature of a script that hard-codes secrets or staged decryption keys.
  - id: py-many-hex-strings
    desc: Multiple hex-only string literals
    crit: baseline
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: strings.hex_strings
      min: 8
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory

  # All-zero-param functions = config-builder helper script. Legit Python
  # rarely has 100% no-param functions in a non-trivial file. Combined
  # with `functions.count >= 5` filter via min, this catches the
  # `_k() / _ep() / _sk() / _init()` shape used by stagers.
  - id: py-many-zero-param-helpers
    desc: High count of zero-argument helper functions
    crit: baseline
    conf: 0.72
    size_max: 50000
    if:
      type: metrics
      field: functions.no_params_count
      min: 12
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - type: raw
        regex: 'class\s+\w+\s*\('

  # Almost no comments in a non-test file = de-documented code, common
  # marker of obfuscator output and stager scripts that don't want
  # explanatory text leaking intent. Already partially covered by
  # structure::no-comments — this one is calibrated for tiny scripts.
  - id: py-tiny-comment-ratio-small-file
    desc: Small Python file with almost no comments
    crit: component
    conf: 0.65
    size_min: 1000
    size_max: 10000
    if:
      type: metrics
      field: comments.to_code_ratio
      max: 0.02
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/tooling::stainless-generated-sdk
      - id: metadata/lang/embedded::python
      - type: basename
        regex: '\.(java|kt)$'
  # Extremely long line (>500 chars) with trailing malicious code hidden
  # behind excessive whitespace. Common in PyPI supply-chain attacks where
  # exec/eval calls are pushed off-screen to avoid casual review.
  - id: py-excessive-whitespace-line
    desc: Excessive Python line length
    crit: suspicious
    conf: 0.88
    size_max: 100000
    if:
      type: metrics
      field: text.max_line_length
      min: 12000
    unless:
    - type: basename
      regex: \.pfb$
    - id: metadata/lang/source::python-protobuf-generated
composite_rules:
  - id: py-pyobfuscate-pattern
    desc: "Python obfuscator tool output"
    crit: notable
    conf: 0.85
    needs: 3
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::py-single-line-heavy
      - id: objectives/anti-static/obfuscation/code-metrics/structure::py-stub-definitions
      - id: metadata/file/text/metrics::no-comments-code
      - id: objectives/anti-static/obfuscation/code-metrics/structure::py-lambda-abuse
      - id: objectives/anti-static/obfuscation/code-metrics/structure::py-encoded-strings
      - id: objectives/anti-static/obfuscation/code-metrics/functions::single-char-function-names
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::py-many-high-entropy-identifiers
    unless:
      - id: pandas-library
      - id: metadata/package/quality::has-tests
  - id: py-pypi-malware-pattern
    desc: "PyPI malware obfuscation pattern"
    crit: hostile
    conf: 0.9
    all:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::py-encoded-strings
      - id: metadata/file/text/metrics::no-comments-code
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/functions::single-char-function-names
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::py-many-high-entropy-identifiers
