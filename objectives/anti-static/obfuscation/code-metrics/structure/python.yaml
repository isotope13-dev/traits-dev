# Python-Specific Metrics-Based Obfuscation Detection
# Detects Python obfuscation patterns common in PyPI malware
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: "T1027"
  mbc: "B0032"
traits:
  # === Python-Specific Obfuscation Patterns ===
  - id: py-lambda-abuse
    desc: "High anonymous function count"
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: functions.anonymous
      min: 15
    unless:
      - id: metadata/package/testing/presence/harness::example-directory
      - id: metadata/lang/source/
  - id: py-stub-definitions
    desc: "Python stub definitions (def ...: ...)"
    crit: component
    conf: 0.5
    count_min: 5
    if:
      type: text
      regex: 'def\s+\w+\(.{0,200}\).{0,50}:\s*\.\.\.'
    unless:
      - id: metadata/file/extension/identity::python-type-stub-extension
  - id: py-single-line-heavy
    desc: "Many one-liner functions (compressed code)"
    crit: component
    conf: 0.75
    if:
      type: metrics
      field: functions.one_liners
      min: 10
      min_size: 16384
    unless:
      - id: py-stub-definitions
      - id: metadata/file/extension/identity::python-type-stub-extension
  - id: py-nested-functions
    # A count metric only. Nested functions (decorators, factories, closures,
    # fixtures) are ordinary Python — not obfuscation in themselves. The desc
    # describes the measurement; obfuscation is concluded by composites that
    # combine this with genuine obfuscation signals.
    desc: "5+ nested function definitions"
    crit: baseline
    conf: 0.7
    if:
      type: metrics
      field: functions.nested_functions
      min: 5
  - id: py-padded-base64-string-literals
    desc: Multiple long padded Base64 string literals
    crit: suspicious
    conf: 0.85
    count_min: 3
    # Average string entropy is not evidence of encoding: PEM certificates,
    # localization data, and other legitimate fixtures can be high-entropy.
    unless:
      - type: text
        substr: "weave"
      - id: metadata/package/testing/
      - id: metadata/file/profile/language::script-han
      - id: metadata/file/profile/language::lang-japanese
      - id: metadata/file/profile/language::lang-korean
      - type: text
        regex: '-----BEGIN (?:RSA )?(?:PRIVATE KEY|CERTIFICATE)-----'
    if:
      # Decode metrics are derived from strings and can produce artifacts
      # from ordinary prose.  Match source literals with a strict Base64
      # alphabet instead.
      type: literal
      regex: '^[A-Za-z0-9+/]{32,}={1,2}$'
  # Many hex-only strings in a small file = embedded credential/key/IV blob.
  # Legitimate code may have a few test fixtures; eight-plus is the
  # signature of a script that hard-codes secrets or staged decryption keys.
  - id: py-many-hex-strings
    desc: Multiple hex-only string literals
    crit: baseline
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: strings.hex_strings
      min: 8
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/

  # All-zero-param functions = config-builder helper script. Legit Python
  # rarely has 100% no-param functions in a non-trivial file. Combined
  # with `functions.count >= 5` filter via min, this catches the
  # `_k() / _ep() / _sk() / _init()` shape used by stagers.
  - id: py-many-zero-param-helpers
    desc: High count of zero-argument helper functions
    crit: baseline
    conf: 0.72
    size_max: 50000
    if:
      type: metrics
      field: functions.no_params_count
      min: 12
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - type: raw
        regex: 'class\s+\w+\s*\('

  # Extremely long line with an execution sink hidden behind excessive
  # whitespace. Generated data structures can be deeply indented without
  # being obfuscated, so the sink is part of the matcher.
  - id: py-excessive-whitespace-line
    desc: Excessive whitespace before exec/eval
    crit: suspicious
    conf: 0.88
    size_max: 100000
    if:
      type: text
      regex: '[ \t]{200,}(?=(exec|eval|__import__)\b)'
    unless:
    - type: basename
      regex: \.pfb$
    - type: text
      substr: "GIMP PNM Filter"
    - id: metadata/lang/source::python-protobuf-generated
    - type: path
      regex: '^pulumi_|[\\/]pulumi_'
composite_rules:
  - id: py-pyobfuscate-pattern
    desc: "Python obfuscator tool output"
    crit: notable
    conf: 0.85
    needs: 3
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::py-single-line-heavy
      - id: objectives/anti-static/obfuscation/code-metrics/structure::py-stub-definitions
      - id: metadata/file/metrics::no-comments-code
      - id: objectives/anti-static/obfuscation/code-metrics/structure::py-lambda-abuse
      - id: metadata/file/metrics::python-high-entropy-strings
      - id: objectives/anti-static/obfuscation/code-metrics/functions::single-char-function-names
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::py-many-high-entropy-identifiers
    unless:
      - id: well-known/lib/pandas::import
      - id: metadata/package/testing/
  - id: py-obfuscation-metrics-cluster
    desc: Python has clustered obfuscation metrics
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/file/metrics::python-high-entropy-strings
      - id: metadata/file/metrics::no-comments-code
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/functions::single-char-function-names
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::py-many-high-entropy-identifiers
