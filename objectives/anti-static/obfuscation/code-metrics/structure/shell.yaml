# Ambiguous "dynamic command name" ($A, $1, $cmd) gated tightly: only hostile
# when a tiny script also STAGES the command line out of pieces (set --, an
# IFS field-split, a positional-forwarding function, cryptic defaults, or
# sequential single-letter aliases). A plain `$EDITOR "$1"` wrapper has no
# such staging and is excluded. Size cap keeps real programs (which dwarf
# these stubs) out.
- id: sh-staged-command-reconstruction
  desc: Tiny script stages and runs a hidden command
  crit: hostile
  conf: 0.9
  size_max: 512
  all:
  - id: metadata/lang/shebang::shell-script
  - id: micro-behaviors/process/create/shell/spawn::sh-dynamic-command-target
  any:
  - id: sh-positional-set-reconstruct
  - id: sh-ifs-field-mangle
  - id: sh-function-positional-body
  - id: sh-cryptic-default-param
  - id: sh-sequential-single-letter-identifiers
  unless:
  - id: well-known/lib/
  - id: shell-test-fixture-marker
  - id: well-known/tool/reverse-engineering/radare2/
  - id: sh-tcl-reexec-polyglot
  - id: shell-alpine-homebrew-marker
  - id: chromiumos-generated-helper-marker
  - id: metadata/lang/source::linux-kernel-build-script-path
# Tiny shebang'd script that defines command aliases and nothing of substance.
# Aliasing command words then invoking them hides the call from static scans;
# real alias collections live in large, un-shebang'd rc files (excluded by the
# size cap and the basename guard).
- id: sh-alias-command-reconstruction
  desc: Tiny script aliases then runs a command
  crit: hostile
  conf: 0.85
  size_max: 256
  all:
  - id: metadata/lang/shebang::shell-script
  - id: sh-alias-command-definition
  unless:
  - id: sh-rc-dotfile-basename
  - id: shell-test-fixture-marker
