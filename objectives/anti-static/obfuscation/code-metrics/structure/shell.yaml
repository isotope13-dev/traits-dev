# Shell-Specific Metrics-Based Obfuscation Detection
# Detects shell script obfuscation patterns
defaults:
  platforms: [unix, android, ios]
  for: [shell]
  attack: "T1027"
  mbc: "B0032"
traits:
  # === Shell-Specific Obfuscation Patterns ===
  # Shell scripts legitimately use long descriptive names like:
  # - HOMEBREW_BREW_DEFAULT_GIT_REMOTE
  # - should_install_command_line_tools
  # - check_run_command_as_root
  # These have high entropy but aren't obfuscation - use higher thresholds

  # Override generic many-high-entropy-identifiers for shell
- id: sh-many-high-entropy-identifiers
  desc: "Many high-entropy identifiers in shell"
  crit: notable
  conf: 0.85
  size_min: 1024
  if:
    type: metrics
    field: identifiers.high_entropy_ratio
    min: 0.40
  unless:
  - id: metadata/build/conda::conda-recipe-build-script
    # Long identifiers carry high Shannon entropy because they are
    # descriptive (RELEASE_NOTES_0, release_0_14_gate, OPENBAO_API_COVERAGE),
    # not obfuscated. Genuinely random long names also push avg_entropy past
    # 3.5 and are caught by sh-high-entropy-identifiers; obfuscation that
    # relies on short random tokens keeps avg_length low and still fires here.
  - type: metrics
    field: identifiers.avg_length
    min: 12.0
- id: sh-single-char-vars
  desc: "Excessive single-character variables"
  crit: suspicious
  conf: 0.8
  if:
    type: metrics
    field: identifiers.single_char_ratio
    min: 0.40
  unless:
  - id: metadata/file/text/format::sourcemap-sources-content
    # Ratio over a small population is noise: terse POSIX one-screen scripts
    # (glibc's yearistype: 8 single-char vars of 19) trip 0.40 while real
    # minified/packed shell carries dozens of single-char variables.
  - type: metrics
    field: identifiers.single_char_count
    max: 9
    # getopts option-parsing wrappers inflate single_char_count with their
    # optstring letters as case labels (xfs_metadump: a/e/f/F/g/l/m/o/r/w/v/V
    # => 15 single-char "vars", avg_entropy 1.15). That is an idiomatic POSIX
    # getopts dispatch, not obfuscation; packed/minified shell never carries
    # a getopts loop. Requiring the literal builtin (which obfuscators avoid)
    # excludes these wrappers without weakening detection.
  - type: text
    regex: '(^|[^A-Za-z0-9_])getopts([^A-Za-z0-9_]|$)'
  # Override generic high-entropy-identifiers for shell (avg_entropy)
- id: sh-high-entropy-identifiers
  desc: "High entropy identifiers"
  crit: suspicious
  conf: 0.85
  if:
    type: metrics
    field: identifiers.avg_entropy
    min: 3.5
  unless:
    # "Average entropy across identifiers" is a population statistic; over a
    # handful of tokens it's noise, not an obfuscation signal. A tiny wrapper
    # that just invokes one long hardcoded path (e.g. ddev's `code` launcher
    # calling /Applications/Visual Studio Code.app/.../bin/code) yields two
    # "identifiers" with avg_entropy ~3.7 — descriptive, not obfuscated. Real
    # obfuscated scripts carry many high-entropy identifiers.
  - type: metrics
    field: identifiers.count
    max: 4
  - id: sh-ca-trust-p11-kit-context
  # Override generic high-entropy-function-names for shell
- id: sh-high-entropy-functions
  desc: "High-entropy function names"
  crit: notable
  conf: 0.85
  size_max: 100000
  if:
    type: metrics
    field: functions.high_entropy_names
    min: 10
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: sh-high-entropy-functions-benign-context
  - id: well-known/app/ventoy::runtime-hook-script
  - type: text
    regex: 'PROGRAM=libtool|PACKAGE=libtool|# libtool \(GNU libtool\)'
  - type: text
    regex: 'usage\(\)\s*\{|help\(\)\s*\{|logger\(\)\s*\{|_logger'
  - type: text
    regex: '#( bash completion|compdef\b)|(?m)^\s*(COMPREPLY=|\bcompgen\s+)'
  - type: basename
    regex: '(^|[\\/])bash-completion[\\/]completions[\\/]'
- id: sh-pkgbuild-recipe-context
  desc: PKGBUILD package recipe context
  crit: component
  conf: 0.9
  # Benign-context anchor (feeds the high-entropy-function suppressor), not an
  # obfuscation indicator — drop the inherited T1027/B0032 obfuscation tags.
  attack: ''
  mbc: ''
  if:
    type: basename
    exact: PKGBUILD
- id: sh-ca-trust-p11-kit-context
  desc: CA trust p11-kit extraction context
  crit: component
  conf: 0.9
  if:
    type: text
    substr: p11-kit.exe extract --format=openssl-bundle
- id: sh-long-lines
  desc: "Very long shell lines"
  crit: notable
  conf: 0.8
  if:
    type: metrics
    field: text.max_line_length
    min: 300
  unless:
      # Exclude data files misidentified as shell
  - id: metadata/build/docker::buildkit-dockerfile-frontend
  - type: basename
    regex: "\\.(json|ya?ml|md|md\\.gotmpl)$"
  - type: basename
    regex: "\\.[1-9]$"
  - type: basename
    regex: "^Makefile(\\..*)?$"
      # Exclude sourcemap files misidentified as shell
  - type: basename
    regex: "\\.map$"
      # Exclude OpenSSH public key literals embedded in provisioning scripts.
  - type: text
    regex: 'ssh-(rsa|ed25519|ecdsa)\s+AAAA[A-Za-z0-9+/]{40,}'
  - id: metadata/package/tooling::autoconf-generated-script
- id: sh-no-functions
  desc: "No shell functions (inline obfuscation)"
  crit: component
  conf: 0.6
  if:
    type: metrics
    field: functions.count
    max: 0
    min_size: 2048
  unless:
      # Exclude Perl wrapper scripts (polyglots)
  - type: text
    substr: "eval 'exec perl -wSx \"$0\" \"$@\"'"
      # Exclude autoconf/configure-generated scripts
  - type: text
    regex: 'exec_prefix=|datarootdir=|^prefix='
      # Exclude scripts with --help/--version argument handling
  - type: text
    regex: '--help\)|\busage="?yes'
      # Exclude JSON/YAML/Markdown data files misidentified as shell
  - type: basename
    regex: "\\.(json|ya?ml|md)$|^Makefile(\\..*)?$"
      # Exclude Dart source files misclassified as shell
  - type: basename
    regex: \.dart$
      # Exclude sourcemap files misidentified as shell
  - type: basename
    regex: "\\.map$"
      # Exclude comment-heavy wrapper/setup scripts
  - type: metrics
    field: comments.to_code_ratio
    min: 0.25
  # $'\xNN' hex escapes - ANSI-C quoting for hiding strings
- id: sh-dense-hex-escapes
    # === Density-Based String Obfuscation ===
    # Shell scripts use various encoding tricks to hide payloads.

  desc: Dense ANSI-C hex escapes
  crit: suspicious
  conf: 0.90
  count_min: 5
  per_kb_min: 1.0
  if:
    type: text
    regex: "\\$'[^']{0,120}\\\\x[0-9a-fA-F]{2}"
  # $'\NNN' octal escapes
- id: sh-dense-octal-escapes
  desc: Dense ANSI-C octal escapes
  crit: suspicious
  conf: 0.88
  count_min: 5
  per_kb_min: 1.0
  if:
    type: text
    regex: "\\$'[^']{0,120}\\\\[0-7]{3}"
  unless:
  - type: text
    regex: "=\\$'\\\\033\\["
  not:
  - regex: "\\$'\\\\033\\[[0-9;]*[A-Za-z]'"
  # Command/word shattered into adjacent single-character string fragments,
  # e.g. "b""u"'n' or "m""i""n"'i' — a hallmark of shell command obfuscation
  # used to reconstruct a token (a binary name, a flag) past static scanners.
  # Benign shell never concatenates quoted single characters with no separator.
- id: sh-char-split-concatenation
  desc: Word split into single-character string fragments
  crit: suspicious
  conf: 0.9
  count_min: 3
  per_kb_min: 0.5
  if:
    type: text
    regex: "[\"'][A-Za-z0-9][\"'][\"'][A-Za-z0-9][\"']"
  # Nested command substitution used to hide commands
- id: sh-dense-command-subst
  desc: Dense nested command substitution
  crit: notable
  conf: 0.8
  count_min: 4
  per_kb_min: 0.8
  size_max: 65536
  if:
    type: text
    regex: "\\$\\([^)]{0,120}\\$\\("
  unless:
  # Make build files: their nested `$(` are Make function expansions
  # ($(shell …), $(addprefix …)) — and debian/rules is itself a Makefile —
  # not shell command-substitution nesting. Combined into one basename
  # alternation to stay under the unless-clause cap.
  - type: path
    basename: true
    regex: "^Makefile(\\..*)?$|^rules$|\\.mk$"
  - type: text
    regex: "COMPREPLY[+]?=\\( \\$\\( compgen -W"
  - type: text
    substr: "$(patsubst %.rst,%.8,$("
  - type: text
    regex: "\\$\\((LINK|AR|CC)\\.\\$\\(TOOLSET\\)\\)"
  - type: text
    regex: "\\bquiet_cmd_[A-Za-z0-9_]+\\s*=|\\bcmd_[A-Za-z0-9_]+\\s*=\\s*\\$\\([A-Za-z]+\\.\\$\\(TOOLSET\\)\\)"
  - type: text
    substr: "command_changed = $(or $(subst $(cmd_$(1))"
  not:
  - regex: "\\$\\((word|strip|patsubst|filter|shell|abspath|dir|findstring|notdir|info)\\b"
  - substr: "$(foreach "
  - substr: "$(filter -arch %, $(CFLAGS))"
  # eval chains: eval "$(eval "$(..."
- id: sh-dense-eval-chains
  desc: Dense eval chains
  crit: suspicious
  conf: 0.92
  count_min: 1
  size_max: 500000
  if:
    type: text
    regex: '(^|[;&|]\s*)eval\s+[^\n]{0,80}\beval\s'
  unless:
  - id: sh-dense-eval-chains-unless-cond-1--rx-helper-7
  - type: text
    substr: 'try3() { eval "$*" || eval "$*" || eval "$*"; }'
  - type: text
    regex: 'eval\s+ac_val=|ac_var\b.*\beval\b|eval set -- \$|atf_test_case\b'
      # Tengine/nginx build scripts use nested eval for module lib expansion
  - type: text
    substr: 'eval eval ngx_module_libs="\\\"\$${ngx_module}_LIBS\\\""'
      # Tool subcommands named 'eval' (e.g., mpremote eval) are not shell eval
  - type: text
    regex: '\$\w+\s.*\beval\b'
  - type: text
    substr: "$MPREMOTE"
  # printf with hex/octal used to decode payloads
- id: sh-dense-printf-decode
  desc: Dense printf decoding
  crit: suspicious
  conf: 0.88
  count_min: 4
  per_kb_min: 0.8
  if:
    type: text
    regex: 'printf\s+["\x27](%b|\\\\x|\\\\0[0-7]|\\\\[0-7]{3})'
  unless:
  - id: sh-dense-printf-decode-unless-cond-0--rx-helper-11
- id: json-txt-md-basename
  desc: JSON/text/markdown file extension
  crit: component
  if:
    type: path
    basename: true
    regex: '\.(json|txt|md)$'
- id: type-stub-or-map-basename
  desc: Python/type stub/source map extension
  crit: component
  if:
    type: path
    basename: true
    regex: '\.(py|pyi|d\.ts|map)$'
- id: js-module-basename
  desc: JavaScript module file extension
  crit: component
  if:
    type: path
    basename: true
    regex: '\.(m?js|cjs)$'
- id: ts-module-basename
  desc: TypeScript module file extension
  crit: component
  if:
    type: path
    basename: true
    regex: '\.(m?ts|cts)$'
- id: sh-dense-eval-chains-unless-cond-1--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    regex: '--help\)\s+echo'
      # Autoconf variable patterns in embedded configure sections
  count_max: 1023696
- id: sh-dense-eval-chains-unless-cond-1--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    regex: '--version\)\s+echo'
      # Autoconf variable patterns in embedded configure sections
  count_max: 1023697
- id: sh-dense-eval-chains-unless-cond-1--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    regex: 'Usage:\s'
      # Autoconf variable patterns in embedded configure sections
  count_max: 1023698
- id: sh-dense-eval-chains-unless-cond-1--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    substr: Generated by GNU Autoconf
  count_max: 1023699
- id: sh-dense-eval-chains-unless-cond-1--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    substr: ac_config_headers
  count_max: 1023700
- id: sh-dense-eval-chains-unless-cond-1--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    substr: exec_prefix=
  count_max: 1023701
- id: sh-dense-printf-decode-unless-cond-0--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.88
  per_kb_min: 0.8
  count_min: 4
  if:
    type: text
    substr: MAKECOLOR
  count_max: 1023702
- id: sh-dense-printf-decode-unless-cond-0--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.88
  per_kb_min: 0.8
  count_min: 4
  if:
    type: text
    substr: ENDCOLOR
  count_max: 1023703
- id: sh-dense-printf-decode-unless-cond-0--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.88
  per_kb_min: 0.8
  count_min: 4
  if:
    type: text
    substr: BINCOLOR
  count_max: 1023704
composite_rules:
- id: sh-shattered-command-obfuscation
  # A live command rebuilt from ANSI-C escape fragments AND adjacent single-char
  # string concatenation. Each technique alone has rare-but-real benign uses
  # (color codes, terse quoting); together they are only ever string-hiding —
  # there is no legitimate reason to shatter a command into octal/hex escapes
  # and single-character pieces. Fires file-type-agnostically wherever shell is
  # obfuscated this way (install scriptlet, .sh dropper, Dockerfile RUN).
  desc: Shell command shattered into ANSI-C escapes and single-char fragments
  crit: hostile
  conf: 0.93
  all:
  - id: sh-char-split-concatenation
  any:
  - id: sh-dense-octal-escapes
  - id: sh-dense-hex-escapes
- id: sh-high-entropy-functions-benign-context
  desc: Shell high-entropy function benign context
  crit: component
  conf: 0.9
  any:
  - id: sh-pkgbuild-recipe-context
  - id: metadata/package/testing/presence/harness::qemu-examples-tests
  - id: sh-ca-trust-p11-kit-context
- id: shell-script-context
  desc: Shell script file context
  crit: component
  conf: 0.9
  any:
  - id: metadata/lang/shebang::sh
  - id: metadata/lang/shebang::bash
  - id: metadata/lang/shebang::zsh
  - id: metadata/lang/shebang::dash
  - id: metadata/file/text/profile::missing-shebang-shell-wrapper
- id: sh-encoded-dropper
  desc: "Shell script with encoded payload"
  crit: hostile
  conf: 0.9
  all:
  - id: micro-behaviors/data/encode/payload::shell-base64-payload-literal
  - id: metadata/file/text/metrics::no-comments-code
  any:
  - id: objectives/anti-static/obfuscation/code-metrics/structure::sh-long-lines
  unless:
  - id: metadata/file/text/format::valid
- id: compact-shell-script-obfuscation
  desc: "Compact shell script obfuscation metrics"
  crit: suspicious
  conf: 0.85
  size_min: 512
  size_max: 500000
  all:
  - id: shell-script-context
  needs: 3
  any:
  - id: objectives/anti-static/obfuscation/code-metrics/structure::sh-single-char-vars
  - id: objectives/anti-static/obfuscation/code-metrics/structure::sh-long-lines
  - id: metadata/file/text/metrics::no-comments-code
  - id: objectives/anti-static/obfuscation/code-metrics/structure::sh-no-functions
  - id: objectives/anti-static/obfuscation/code-metrics/structure::low-whitespace
  unless:
  - id: metadata/lang/scripted::ps-valid
      # Exclude common non-shell text/data files misidentified as shell
  - id: json-txt-md-basename
  - id: type-stub-or-map-basename
      # Exclude JavaScript/TypeScript files misidentified as shell
  - id: js-module-basename
  - id: ts-module-basename
  - id: metadata/package/quality::has-tests
- id: sh-dense-eval-chains-unless-cond-1--rx-helper-7
  desc: Regex component marker
  crit: component
  conf: 1.0
  size_max: 500000
  any:
  - id: sh-dense-eval-chains-unless-cond-1--rx-1
  - id: sh-dense-eval-chains-unless-cond-1--rx-2
  - id: sh-dense-eval-chains-unless-cond-1--rx-3
  - id: sh-dense-eval-chains-unless-cond-1--rx-4
  - id: sh-dense-eval-chains-unless-cond-1--rx-5
  - id: sh-dense-eval-chains-unless-cond-1--rx-6
- id: sh-dense-printf-decode-unless-cond-0--rx-helper-11
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: sh-dense-printf-decode-unless-cond-0--rx-8
  - id: sh-dense-printf-decode-unless-cond-0--rx-9
  - id: sh-dense-printf-decode-unless-cond-0--rx-10
