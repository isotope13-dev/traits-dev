# Shell-Specific Metrics-Based Obfuscation Detection
# Detects shell script obfuscation patterns
defaults:
  platforms: [unix, android, ios]
  for: [shell]
  attack: "T1027"
  mbc: "B0032"
traits:
  # === Shell-Specific Obfuscation Patterns ===
  # Shell scripts legitimately use long descriptive names like:
  # - HOMEBREW_BREW_DEFAULT_GIT_REMOTE
  # - should_install_command_line_tools
  # - check_run_command_as_root
  # These have high entropy but aren't obfuscation - use higher thresholds

  # Override generic many-high-entropy-identifiers for shell
- id: sh-many-high-entropy-identifiers
  desc: "Many high-entropy identifiers in shell"
  crit: notable
  conf: 0.85
  size_min: 1024
  if:
    type: metrics
    field: identifiers.high_entropy_ratio
    min: 0.40
  unless:
  - id: metadata/build/conda/
    # Long identifiers carry high Shannon entropy because they are
    # descriptive (RELEASE_NOTES_0, release_0_14_gate, OPENBAO_API_COVERAGE),
    # not obfuscated. Genuinely random long names also push avg_entropy past
    # 3.5. Obfuscation that relies on short random tokens keeps avg_length low
    # and still fires here.
  - type: metrics
    field: identifiers.avg_length
    min: 12.0
- id: sh-single-char-vars
  desc: "Excessive single-character variables"
  crit: suspicious
  conf: 0.8
  if:
    type: metrics
    field: identifiers.single_char_ratio
    min: 0.40
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/encoded/url::shell
  - id: metadata/package/files/system-package::shell-completion-script
  - type: basename
    regex: '##url@[0-9]+$'
    # Ratio over a small population is noise: terse POSIX one-screen scripts
    # (glibc's yearistype: 8 single-char vars of 19) trip 0.40 while real
    # minified/packed shell carries dozens of single-char variables.
  - type: metrics
    field: identifiers.single_char_count
    max: 9
  - type: metrics
    field: identifiers.count
    max: 39
    # getopts option-parsing wrappers inflate single_char_count with their
    # optstring letters as case labels (xfs_metadump: a/e/f/F/g/l/m/o/r/w/v/V
    # => 15 single-char "vars", avg_entropy 1.15). That is an idiomatic POSIX
    # getopts dispatch, not obfuscation; packed/minified shell never carries
    # a getopts loop. Requiring the literal builtin (which obfuscators avoid)
    # excludes these wrappers without weakening detection.
  - type: text
    regex: '(^|[^A-Za-z0-9_])getopts([^A-Za-z0-9_]|$)'
  - id: shell-test-fixture-marker
  # Override generic high-entropy-function-names for shell
- id: sh-high-entropy-functions
  desc: "High-entropy function names"
  crit: notable
  conf: 0.85
  size_max: 100000
  if:
    type: metrics
    field: functions.high_entropy_names
    min: 10
  unless:
  - id: metadata/package/testing/harness/runtime/
  - id: sh-high-entropy-functions-recognized-marker
  - id: well-known/app/ventoy/
  - type: text
    regex: 'PROGRAM=libtool|PACKAGE=libtool|# libtool \(GNU libtool\)'
  - type: text
    regex: 'usage\(\)\s*\{|help\(\)\s*\{|logger\(\)\s*\{|_logger'
  - type: text
    regex: '#( bash completion|compdef\b)|(?m)^\s*(COMPREPLY=|\bcompgen\s+)'
  - type: basename
    regex: '(^|[\\/])bash-completion[\\/]completions[\\/]'
- id: sh-ca-trust-p11-kit-marker
  desc: CA trust p11-kit extraction marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: p11-kit.exe extract --format=openssl-bundle
- id: sh-long-line-nonshell-filename-marker
  desc: Non-shell filename marker
  crit: baseline
  conf: 0.9
  if:
    type: basename
    regex: '\.(json|ya?ml|md|md\.gotmpl|[1-9]|map)$|^Makefile(\..*)?$'
- id: sh-xvfb-test-wrapper-marker
  desc: Xvfb test wrapper marker
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: '\bXvfb\b[\s\S]{0,900}/tmp/\.X\$?[A-Za-z0-9_]*-lock'
- id: sh-no-functions
  desc: "No shell functions (inline obfuscation)"
  crit: component
  conf: 0.6
  if:
    type: metrics
    field: functions.count
    max: 0
    min_size: 2048
  unless:
      # Exclude Perl wrapper scripts (polyglots)
  - type: text
    substr: "eval 'exec perl -wSx \"$0\" \"$@\"'"
      # Exclude autoconf/configure-generated scripts
  - type: text
    regex: 'exec_prefix=|datarootdir=|^prefix='
      # Exclude scripts with --help/--version argument handling
  - type: text
    regex: '--help\)|\busage="?yes'
      # Exclude JSON/YAML/Markdown data files misidentified as shell
  - type: basename
    regex: "\\.(json|ya?ml|md)$|^Makefile(\\..*)?$"
      # Exclude Dart source files misclassified as shell
  - id: metadata/file/extension/identity::dart-source-basename
      # Exclude sourcemap files misidentified as shell
  - type: basename
    regex: "\\.map$"
      # Exclude comment-heavy wrapper/setup scripts
  - type: metrics
    field: comments.to_code_ratio
    min: 0.25
  # $'\xNN' hex escapes - ANSI-C quoting for hiding strings
- id: sh-dense-hex-escapes
    # === Density-Based String Obfuscation ===
    # Shell scripts use various encoding tricks to hide payloads.

  desc: Dense ANSI-C hex escapes
  crit: suspicious
  conf: 0.90
  count_min: 5
  per_kb_min: 1.0
  if:
    type: text
    regex: "\\$'[^']{0,120}\\\\x[0-9a-fA-F]{2}"
  unless:
  - id: metadata/package/testing/presence/harness::shell-test-fixture-source
  - id: metadata/package/files/system-package::zsh-function-script
  - id: metadata/package/files/system-package::initrd-format-inspection-script
  # $'\NNN' octal escapes
- id: sh-dense-octal-escapes
  desc: Dense ANSI-C octal escapes
  crit: suspicious
  conf: 0.88
  count_min: 5
  per_kb_min: 1.0
  if:
    type: text
    regex: "\\$'[^']{0,120}\\\\[0-7]{3}"
  unless:
  - id: metadata/package/testing/presence/harness::shell-test-fixture-source
  - id: micro-behaviors/data/encode/string::shell-json-control-character-escape
  - type: text
    regex: "=\\$'\\\\033\\["
  not:
  - regex: "\\$'\\\\033\\[[0-9;]*[A-Za-z]'"
  # Command/word shattered into adjacent single-character string fragments,
  # e.g. "b""u"'n' or "m""i""n"'i' — a hallmark of shell command obfuscation
  # used to reconstruct a token (a binary name, a flag) past static scanners.
  # Benign shell never concatenates quoted single characters with no separator.
- id: sh-char-split-concatenation
  desc: "Word split into single-character fragments"
  crit: suspicious
  conf: 0.9
  count_min: 3
  per_kb_min: 0.5
  if:
    type: text
    regex: "[\"'][A-Za-z0-9][\"'][\"'][A-Za-z0-9][\"']"
  # === Command-name reconstruction (filefacts call-target metrics) ===
  # filefacts classifies each call's command-name token. This atom records the
  # metric shape only: a target welded from quote-shatter, backslash escapes,
  # a decoding command substitution, a default-value parameter, or expansions
  # glued into a word. The intent claim belongs to the reconstruction composite.
- id: sh-obfuscated-command-target
  desc: Shell reconstructed command target shape
  crit: notable
  conf: 0.9
  if:
    type: metrics
    field: calls.obfuscated_target_count
    min: 1
  unless:
  - id: metadata/build/ocaml::ocaml-shell-polyglot-launcher
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/library/generated::python-polyglot-shell-launcher
  - id: metadata/lang/scripted::shell-perl-polyglot-launcher
  - id: metadata/build/autotools::autoconf-generated-script
  - id: metadata/package/manager::apache-maven-wrapper-startup
- id: sh-sequential-single-letter-identifiers
  desc: Sequential single-letter identifiers
  crit: component
  conf: 0.8
  if:
    type: metrics
    field: identifiers.sequential_names
    min: 3
  # Short A/B/C command-word staging is meaningful; ordinary wrappers such as
  # gendiff have a larger short-variable population and remain configurable.
  unless:
  - type: metrics
    field: identifiers.single_char_count
    min: 5
  # Word rebuilt by interleaving quoted and unquoted single characters, e.g.
  # b"u"n or s"t"a. Distinct from sh-char-split-concatenation (which needs two
  # ADJACENT quoted fragments); this catches the eval-quote-split and mixed
  # forms where quoted chars alternate with bare ones.
- id: sh-inline-char-split
  desc: Word built from interleaved quoted characters
  crit: suspicious
  conf: 0.88
  count_min: 1
  # Double-quote only: single-quote variant matches contractions/possessives
  # and Tcl/sh polyglots (`t'o'm`). Obfuscation samples use double quotes.
  if:
    type: text
    regex: '[A-Za-z]"[A-Za-z]"[A-Za-z]'
  unless:
  - id: shell-test-fixture-marker
  - type: path
    regex: '\.jar([\\/]|$)'
  # JavaScript bundles can be misclassified as shell after an encoded layer
  # is decoded. The shell-only quote-shatter signal is not meaningful for a
  # source file whose extension identifies another language.
  - type: path
    regex: '\.(m?js|cjs)(##(?:xor|unicode-escape)(?:@\d+)?)?$'
  - id: metadata/package/quality/false-positives-marp::marp-vscode-archive-context
  # A Snap is a SquashFS package, not a shell script. When scanned as a
  # standalone archive its compressed bytes can be classified as shell text
  # and accidentally contain this quote-interleaving sequence. Shell files
  # inside the Snap are scanned separately and remain eligible for this rule.
  - type: basename
    regex: '\.(snap|squashfs)$'
  - id: metadata/library/structure::js-medium-minified-line
  - id: well-known/app/kombai::kombai-extension-runtime-context
  - id: well-known/app/kombai::vendor-runtime-brand-marker
  # === Command-line staging setups (gate the ambiguous dynamic targets) ===
  # set -- loads a command line into the positional params for `$1 $2 …` exec.
- id: sh-positional-set-reconstruct
  desc: Positional parameters set then expanded
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '(^|[;&\n])\s*set\s+--\s'
  # IFS reassigned to a non-whitespace delimiter to word-split a packed string
  # into an argv ("a,b,c" + IFS=, then unquoted $var). `IFS= read` (set to
  # empty/space) is the common benign idiom and is excluded by the class.
- id: sh-ifs-field-mangle
  desc: IFS set to a non-whitespace delimiter
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '(^|[;&\n])\s*IFS=[^ \t\n;]'
  # Function whose body begins by running a bare positional param — `f(){ $1 …`
  # — a thin indirection wrapper. Quoted "$@"/"$1" forwarders do not match.
- id: sh-function-positional-body
  desc: Function body runs a bare positional param
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '\)\s*\{\s*\$[1-9@]'
  # Command line welded from cryptic default-value parameters — `${b:-bun}
  # ${i:-install}`. A default-param expansion ALONE is a benign fallback idiom
  # (`${PAGER:-less}`, `${CC:-cc}`), so filefacts deliberately classifies it as
  # dynamic, not obfuscated. The FP-safe tell is the PLACEHOLDER: real fallbacks
  # name a configuration knob (uppercase env-style: PAGER, EDITOR, CC, CFLAGS);
  # a 1-2-char lowercase placeholder that is never assigned exists only to host
  # the `:-payload`, and two of them gluing a command line is reconstruction.
  # Stays a building block: only hostile via the staged-reconstruction composite
  # below, which adds the size<=512 + dynamic-command-target gates.
- id: sh-cryptic-default-param
  desc: Cryptic default-parameter command
  crit: component
  conf: 0.7
  count_min: 2
  if:
    type: text
    regex: '\$\{[a-z]{1,2}:[-=][^}]{1,80}\}'
  # Two or more aliases defined to stand in for command words, then invoked.
- id: sh-alias-command-definition
  desc: Multiple single-letter command aliases
  crit: notable
  conf: 0.6
  count_min: 2
  if:
    type: text
    regex: '(^|[;&\n])\s*alias\s+[A-Za-z]='
  # Tcl/Tk self-re-exec polyglot header (`# \` + `exec wish "$0"`). The body is
  # Tcl, not shell; the bash parser mis-reads it into garbage "command" tokens
  # (`\[0-9\]*`, escaped regex), so suppress shell-obfuscation verdicts on it.
- id: sh-tcl-reexec-polyglot
  desc: Tcl/Tk self-re-exec polyglot header
  crit: component
  conf: 0.95
  attack: ''
  mbc: ''
  if:
    type: text
    regex: 'exec\s+(tclsh|wish|expect|tclkit)\b[^\n]{0,20}\$0'
  # Shell rc/dotfile basenames where alias collections are normal and benign.
- id: sh-rc-dotfile-basename
  desc: Shell rc/profile/alias dotfile basename
  crit: component
  conf: 0.95
  attack: ''
  mbc: ''
  if:
    type: basename
    regex: '^\.?(bash|zsh|ksh)?(rc|_?profile|_?aliases|_login)$'
  # Nested command substitution used to hide commands
- id: sh-dense-command-subst
  desc: Dense nested command substitution
  crit: notable
  conf: 0.8
  count_min: 4
  per_kb_min: 0.8
  size_max: 65536
  if:
    type: text
    regex: "\\$\\([^)]{0,120}\\$\\("
  unless:
  # Make build files: their nested `$(` are Make function expansions
  # ($(shell …), $(addprefix …)) — and debian/rules is itself a Makefile —
  # not shell command-substitution nesting. Combined into one basename
  # alternation to stay under the unless-clause cap.
  - type: path
    basename: true
    regex: "^Makefile(\\..*)?$|^rules$|\\.mk$"
  - type: text
    regex: "COMPREPLY[+]?=\\( \\$\\( compgen -W"
  - type: text
    substr: "$(patsubst %.rst,%.8,$("
  - type: text
    regex: "\\$\\((LINK|AR|CC)\\.\\$\\(TOOLSET\\)\\)"
  - type: text
    regex: "\\bquiet_cmd_[A-Za-z0-9_]+\\s*=|\\bcmd_[A-Za-z0-9_]+\\s*=\\s*\\$\\([A-Za-z]+\\.\\$\\(TOOLSET\\)\\)"
  - type: text
    substr: "command_changed = $(or $(subst $(cmd_$(1))"
  not:
  - regex: "\\$\\((word|strip|patsubst|filter|shell|abspath|dir|findstring|notdir|info)\\b"
  - substr: "$(foreach "
  - substr: "$(filter -arch %, $(CFLAGS))"
  # eval chains: eval "$(eval "$(..."
- id: sh-dense-eval-chains
  desc: Dense eval chains
  crit: suspicious
  conf: 0.92
  count_min: 1
  size_max: 500000
  if:
    type: text
    regex: '(^|[;&|]\s*)eval\s+[^\n]{0,80}\beval\s'
  unless:
  - id: metadata/package/testing/presence/harness::shell-test-fixture-source
  - id: sh-dense-eval-chains-unless-cond-1--rx-helper-7
  - id: metadata/package/files/system-package::system-shell-profile
  - type: text
    substr: 'try3() { eval "$*" || eval "$*" || eval "$*"; }'
  - type: text
    regex: 'eval\s+ac_val=|ac_var\b.*\beval\b|eval set -- \$|atf_test_case\b'
      # Tengine/nginx build scripts use nested eval for module lib expansion
  - type: text
    substr: 'eval eval ngx_module_libs="\\\"\$${ngx_module}_LIBS\\\""'
      # Tool subcommands named 'eval' (e.g., mpremote eval) are not shell eval
  - type: text
    regex: '\$\w+\s.*\beval\b'
  - type: text
    substr: "$MPREMOTE"
  # printf with hex/octal used to decode payloads
- id: sh-dense-printf-decode
  desc: Dense printf decoding
  crit: suspicious
  conf: 0.88
  count_min: 4
  per_kb_min: 0.8
  if:
    type: text
    regex: 'printf\s+["\x27]%b["\x27]\s+["\x27][^"\x27]{0,120}(\\x[0-9a-fA-F]{2}|\\[0-7]{3})'
  unless:
  - id: sh-dense-printf-decode-unless-cond-0--rx-helper-11
- id: json-txt-md-basename
  desc: JSON/text/markdown file extension
  crit: component
  if:
    type: path
    basename: true
    regex: '\.(json|txt|md)$'
# type-stub-or-map-basename relocated to
# metadata/file/extension/identity/text-formats.yaml (neutral extension classifier).
- id: js-module-basename
  desc: JavaScript module file extension
  crit: component
  if:
    type: path
    basename: true
    regex: '\.(m?js|cjs)$'
- id: ts-module-basename
  desc: TypeScript module file extension
  crit: component
  if:
    type: path
    basename: true
    regex: '\.(m?ts|cts)$'
- id: sh-dense-eval-chains-unless-cond-1--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    regex: '--help\)\s+echo'
      # Autoconf variable patterns in embedded configure sections
  count_max: 1023696
- id: sh-dense-eval-chains-unless-cond-1--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    regex: '--version\)\s+echo'
      # Autoconf variable patterns in embedded configure sections
  count_max: 1023697
- id: sh-dense-eval-chains-unless-cond-1--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    regex: 'Usage:\s'
      # Autoconf variable patterns in embedded configure sections
  count_max: 1023698
- id: sh-dense-eval-chains-unless-cond-1--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    substr: Generated by GNU Autoconf
  count_max: 1023699
- id: sh-dense-eval-chains-unless-cond-1--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    substr: ac_config_headers
  count_max: 1023700
- id: sh-dense-eval-chains-unless-cond-1--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.92
  size_max: 500000
  count_min: 1
  if:
    type: text
    substr: exec_prefix=
  count_max: 1023701
- id: sh-dense-printf-decode-unless-cond-0--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.88
  per_kb_min: 0.8
  count_min: 4
  if:
    type: text
    substr: MAKECOLOR
  count_max: 1023702
- id: sh-dense-printf-decode-unless-cond-0--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.88
  per_kb_min: 0.8
  count_min: 4
  if:
    type: text
    substr: ENDCOLOR
  count_max: 1023703
- id: sh-dense-printf-decode-unless-cond-0--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.88
  per_kb_min: 0.8
  count_min: 4
  if:
    type: text
    substr: BINCOLOR
  count_max: 1023704
- id: shell-project-hack-helper-marker
  desc: Shell project hack helper marker
  crit: component
  conf: 0.9
  if:
    type: path
    regex: '(^|[\\/])hack[\\/]crd-schema-checker\.sh$'
- id: chromiumos-config-module-path
  desc: ChromiumOS config module path
  crit: baseline
  conf: 0.95
  if:
    type: path
    substr: "go.chromium.org/chromiumos/config@"
- id: chromiumos-helper-basename
  desc: ChromiumOS helper script basename
  crit: baseline
  conf: 0.95
  if:
    type: basename
    regex: '^(run_pytype|setup_project)\.sh$'
composite_rules:
- id: sh-shattered-command-obfuscation
  # A live command rebuilt from ANSI-C escape fragments AND adjacent single-char
  # string concatenation. Each technique alone has rare-but-real benign uses
  # (color codes, terse quoting); together they are only ever string-hiding —
  # there is no legitimate reason to shatter a command into octal/hex escapes
  # and single-character pieces. Fires file-type-agnostically wherever shell is
  # obfuscated this way (install scriptlet, .sh dropper, Dockerfile RUN).
  desc: Shell command shattered into ANSI-C escapes and single-char fragments
  crit: hostile
  conf: 0.93
  all:
  - id: sh-char-split-concatenation
  any:
  - id: sh-dense-octal-escapes
  - id: sh-dense-hex-escapes
- id: sh-high-entropy-functions-recognized-marker
  desc: Shell high-entropy function recognized marker
  crit: component
  conf: 0.9
  any:
  - id: metadata/file/string/identity::pkgbuild-basename
  - id: metadata/package/testing/presence/harness::qemu-examples-tests
  - id: sh-ca-trust-p11-kit-marker
- id: sh-encoded-dropper
  desc: "Shell script with encoded payload"
  crit: hostile
  conf: 0.9
  all:
  - id: micro-behaviors/data/encode/payload::shell-base64-payload-literal
  - id: metadata/file/metrics::no-comments-code
  any:
  - id: metadata/file/metrics::single-long-line
  unless:
  - id: metadata/file/format::valid
- id: compact-shell-script-obfuscation
  desc: "Compact shell script obfuscation metrics"
  crit: suspicious
  conf: 0.85
  size_min: 512
  size_max: 500000
  all:
  - id: metadata/lang/shebang::shell-script
  needs: 3
  any:
  - id: objectives/anti-static/obfuscation/code-metrics/structure::sh-single-char-vars
  - id: metadata/file/metrics::single-long-line
  - id: metadata/file/metrics::no-comments-code
  - id: objectives/anti-static/obfuscation/code-metrics/structure::sh-no-functions
  - id: metadata/file/metrics::low-whitespace
  unless:
  - id: metadata/lang/scripted::ps-valid
      # Exclude common non-shell text/data files misidentified as shell
  - id: json-txt-md-basename
  - id: metadata/file/extension/identity::type-stub-or-map-basename
      # Exclude JavaScript/TypeScript files misidentified as shell
  - id: js-module-basename
  - id: ts-module-basename
  - id: metadata/package/testing/harness/unit/
  - id: metadata/package/testing/scripted/
- id: sh-dense-eval-chains-unless-cond-1--rx-helper-7
  desc: Regex component marker
  crit: component
  conf: 1.0
  size_max: 500000
  any:
  - id: sh-dense-eval-chains-unless-cond-1--rx-1
  - id: sh-dense-eval-chains-unless-cond-1--rx-2
  - id: sh-dense-eval-chains-unless-cond-1--rx-3
  - id: sh-dense-eval-chains-unless-cond-1--rx-4
  - id: sh-dense-eval-chains-unless-cond-1--rx-5
  - id: sh-dense-eval-chains-unless-cond-1--rx-6
- id: sh-dense-printf-decode-unless-cond-0--rx-helper-11
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: sh-dense-printf-decode-unless-cond-0--rx-8
  - id: sh-dense-printf-decode-unless-cond-0--rx-9
  - id: sh-dense-printf-decode-unless-cond-0--rx-10
# A command name welded from quote-shatter, escapes, a decoding substitution,
# a default-value parameter, or expansions glued into a word — there is no
# benign reason to hide which program runs, so this is hostile on sight.
- id: shell-test-fixture-marker
  desc: Shell test or helper marker
  crit: component
  conf: 0.9
  for: [shell, rust]
  any:
  - id: metadata/package/testing/presence/harness::test-directory
