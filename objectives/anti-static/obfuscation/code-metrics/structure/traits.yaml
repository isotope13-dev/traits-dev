defaults:
  platforms: [unix, windows, macos]
  for: [shell, python, javascript, powershell]
  attack: T1027
  mbc: B0032
traits:
  - id: no-comments
    desc: No comments in code (stripped
    crit: notable
    conf: 0.6
    if:
      type: metrics
      field: comments.total
      max: 0
      min_size: 2048
    unless:
      - id: metadata/dev/testing::is-test
    downgrade:
      any:
        - type: raw
          substr: _interopRequireDefault
        - type: raw
          substr: __esModule
  - id: very-low-comment-ratio
    desc: Very low comment-to-code ratio (<1%)
    crit: notable
    conf: 0.65
    if:
      type: metrics
      field: comments.to_code_ratio
      max: 0.01
      min_size: 2048
    unless:
      - id: metadata/dev/testing::is-test
      - type: raw
        substr: "automatically generated"
      - type: raw
        substr: "DO NOT MODIFY BY HAND"
    downgrade:
      any:
        - type: raw
          substr: _interopRequireDefault
        - type: raw
          substr: __esModule
  - id: very-long-lines
    desc: Very long lines (>1000 chars)
    crit: notable
    conf: 0.85
    if:
      type: metrics
      field: text.max_line_length
      min: 1000
    unless:
      - type: basename
        regex: \.pyc$
      - type: basename
        regex: \.pyd$
      - type: basename
        regex: \.d\.ts$
      - type: raw
        substr: "automatically generated"
      - type: raw
        substr: "DO NOT MODIFY BY HAND"
      - type: string_value
        substr: "pybind11"
  # Invisible Unicode characters present (variation selectors, zero-width,
  # tag chars). Any non-zero count in source is deeply suspicious.
  - id: has-invisible-unicode
    desc: Contains invisible Unicode characters
    crit: component
    conf: 0.95
    for: [scripts, source]
    if:
      type: metrics
      field: text.invisible_chars
      min: 1

  # Component traits for appended-long-line composite
  - id: last-line-over-1000
    desc: Last line is over 1000 chars
    crit: component
    conf: 0.9
    for: [scripts, source]
    if:
      type: metrics
      field: text.last_line_length
      min: 1000
  - id: file-has-30-plus-lines
    desc: File has 30 or more lines
    crit: component
    conf: 0.9
    for: [scripts, source]
    if:
      type: metrics
      field: text.total_lines
      min: 30
  - id: single-long-line-outlier
    desc: Exactly one line exceeds 1000 chars
    crit: component
    conf: 0.9
    for: [scripts, source]
    if:
      type: metrics
      field: text.lines_over_1000
      min: 1
      max: 1
  - id: high-text-entropy
    desc: High overall text entropy (encoded
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: text.char_entropy
      min: 5.7
    unless:
      - type: basename
        regex: \.(s|S|asm)$
      - type: basename
        regex: \.md$
      - type: basename
        regex: \.sh\.in$
  - id: low-whitespace
    desc: Very low whitespace ratio (minified/compressed)
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: text.whitespace_ratio
      max: 0.1
      min_size: 2048
    unless:
      - type: basename
        regex: \.pyc$
      - type: basename
        regex: \.pyd$
      - type: raw
        substr: "Code generated"
      - type: raw
        substr: "automatically generated"
      - type: raw
        substr: "DO NOT MODIFY BY HAND"
      - id: metadata/dev/testing::is-test
      - type: string_value
        substr: "pybind11"
composite_rules:
  - id: minified-code
    desc: Minified/compressed code (multiple indicators)
    crit: notable
    conf: 0.9
    all:
      - id: low-whitespace
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/functions::high-function-density
      - id: objectives/anti-static/obfuscation/code-metrics/functions::many-one-liner-functions
      - id: no-comments
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::sequential-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::py-sequential-identifiers
    unless:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code__unless_1
  # Appended payload line: a 30+ line file where the last line is >1000
  # chars and only one line in the file exceeds 1000 chars. Classic
  # supply-chain injection — append one minified payload to a clean file.
  - id: appended-long-line
    desc: Single appended long line in source
    crit: suspicious
    conf: 0.9
    for: [scripts, source]
    all:
      - id: last-line-over-1000
      - id: file-has-30-plus-lines
      - id: single-long-line-outlier
  # Hostile: appended long line containing invisible Unicode steganography.
  # Language-agnostic — no legitimate source file has invisible characters
  # hidden in a single appended line. Works for JS, Python, Shell, etc.
  - id: appended-steganography
    desc: Steganography payload in appended long line
    crit: hostile
    conf: 0.95
    for: [scripts, source]
    all:
      - id: appended-long-line
      - id: has-invisible-unicode
  # Helper: any encoding/decoding detected (base64, XOR, hex, large payload)
  - id: has-encoding
    desc: Data encoding or decoding detected
    crit: component
    for: [scripts, source]
    any:
      - id: micro-behaviors/data/decode/base64
      - id: micro-behaviors/data/encode/xor
      - id: micro-behaviors/data/encode/payload::large-base64-payload
      - id: micro-behaviors/data/decode/hex
      - id: micro-behaviors/data/encode/payload::hex-byte-format
  # Helper: any dynamic code execution detected (eval/exec/system/spawn)
  - id: has-dynamic-exec
    desc: Dynamic code execution detected
    crit: component
    for: [scripts, source]
    any:
      # Eval/exec (scripting languages)
      - id: micro-behaviors/process/interpreter/eval
      - id: micro-behaviors/process/interpreter/python
      - id: objectives/execution/interpreter/eval
      - id: objectives/anti-static/obfuscation/payload::exec-function-call
      - id: objectives/anti-static/obfuscation/payload::eval-function-call
      # Process creation / shell-out (compiled languages)
      - id: micro-behaviors/process/create/direct
      - id: micro-behaviors/process/create/shell
      - id: objectives/execution/dropper/script
      - id: objectives/command-and-control/dropper/remote-eval
  # Hostile: appended long line with encoded payload + code execution.
  # Language-agnostic — catches base64/XOR/hex payloads decoded and exec'd
  # from an injected line in any script or source file.
  - id: appended-encoded-exec
    desc: Encoded payload executed from appended line
    crit: hostile
    conf: 0.9
    for: [scripts, source]
    all:
      - id: appended-long-line
      - id: has-encoding
      - id: has-dynamic-exec
