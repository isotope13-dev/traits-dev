defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - shell
    - python
    - javascript
    - powershell
    - lua
  attack: T1027
  mbc: B0032
traits:
  - id: no-comments
    desc: No comments in code (stripped
    crit: notable
    conf: 0.6
    if:
      type: metrics
      field: comments.total
      max: 0
      min_size: 2048
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: basename
        regex: \.(Rd|html?)$
      - type: basename
        regex: \.(md|xsd)$
      - type: basename
        regex: \.(xml|dart)$
      - id: metadata/package/tooling::esmodule-bundled
    downgrade:
      any:
        - type: raw
          substr: _interopRequireDefault
        - type: raw
          substr: __esModule
  - id: very-low-comment-ratio
    desc: Very low comment-to-code ratio (<1%)
    crit: component
    conf: 0.65
    if:
      type: metrics
      field: comments.to_code_ratio
      max: 0.008
      min_size: 32768
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: raw
        regex: automatically generated|DO NOT MODIFY BY HAND
    downgrade:
      any:
        - type: raw
          substr: _interopRequireDefault
        - type: raw
          substr: __esModule
  - id: very-long-lines
    desc: Very long lines (>1000 chars)
    crit: notable
    conf: 0.85
    unless:
      - type: raw
        substr: '"comment":"buildkit.dockerfile.v0"'
      - type: structure
        feature: binary/format/python-zipapp
      - type: basename
        regex: (^|[\\/])tests?([\\/]|$)
      - type: basename
        regex: _tests?\.py$
      - id: metadata/package/testing/scripted::pytest
      - type: basename
        regex: \.(pyc|pyd)$|\.d\.ts$
      - type: raw
        regex: automatically generated|DO NOT MODIFY BY HAND
    if:
      type: metrics
      field: text.max_line_length
      min: 1000
  - id: has-invisible-unicode
    desc: Contains invisible Unicode characters
    crit: component
    conf: 0.95
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: metrics
      field: text.invisible_chars
      min: 2
  - id: last-line-over-1000
    desc: Last line is over 1000 chars
    crit: component
    conf: 0.9
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: metrics
      field: text.last_line_length
      min: 1000
  - id: single-long-line-outlier
    desc: Exactly one line exceeds 1000 chars
    crit: component
    conf: 0.9
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: metrics
      field: text.lines_over_1000
      min: 1
      max: 1
  - id: high-text-entropy
    desc: High overall text entropy (encoded
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: text.char_entropy
      min: 5.7
    unless:
      - type: basename
        regex: \.(s|S|asm)$
      - type: basename
        regex: \.md$
      - type: basename
        regex: \.sh\.in$
  - id: buildkit-dockerfile-v0
    desc: BuildKit dockerfile marker
    crit: component
    conf: 0.95
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: raw
      substr: '"comment":"buildkit.dockerfile.v0"'
  - id: python-zipapp-structure
    desc: Python zipapp container structure
    crit: component
    conf: 0.95
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: structure
      feature: binary/format/python-zipapp
  - id: pyc-or-pyd-basename
    desc: Python bytecode or extension file
    crit: component
    conf: 0.95
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: basename
      regex: \.(pyc|pyd)$
  - id: generated-file-marker
    desc: Generated file marker text
    crit: component
    conf: 0.95
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    if:
      type: raw
      regex: automatically generated
  - id: low-whitespace
    desc: Very low whitespace ratio (minified/compressed)
    crit: notable
    conf: 0.7
    unless:
      - id: test-source-file
      - id: known-benign-low-whitespace
    if:
      type: metrics
      field: text.whitespace_ratio
      max: 0.1
      min_size: 2048
  - id: html-basename
    desc: HTML file extension
    crit: component
    if:
      type: basename
      regex: '\.html?$'
  - id: sketch-basename
    desc: Sketch design file
    crit: component
    if:
      type: basename
      regex: '\.sketch$'
  - id: archive-basename
    desc: Archive/package file extension
    crit: component
    if:
      type: basename
      regex: '\.(vsix|zip|jar)$'
  - id: source-map-inline
    desc: Inline source map data URL
    crit: component
    if:
      type: raw
      regex: '//# sourceMappingURL=data:application/json'
composite_rules:
  - id: known-benign-low-whitespace
    desc: Known benign low-whitespace file
    crit: component
    conf: 0.95
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    any:
      - id: buildkit-dockerfile-v0
      - id: python-zipapp-structure
      - id: pyc-or-pyd-basename
      - id: generated-file-marker
      - id: metadata/library/nodeunit::nodeunit
      - id: metadata/package/tooling::esmodule-bundled
  - id: test-source-file
    desc: Test source file markers
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    any:
      - id: metadata/package/testing/presence::mocha-test-file
      - id: metadata/package/testing/presence::jest-test-file
      - id: metadata/package/testing/harness::test-basename-prefix
      - id: metadata/package/testing/harness::test-basename-suffix
      - id: metadata/package/testing/harness::test-basename-spec
  - id: minified-code
    desc: Minified/compressed code (multiple indicators)
    crit: notable
    conf: 0.9
    all:
      - id: low-whitespace
    any:
      - id: very-low-comment-ratio
      - id: objectives/anti-static/obfuscation/code-metrics/functions::high-function-density
      - id: objectives/anti-static/obfuscation/code-metrics/functions::many-one-liner-functions
      - id: no-comments
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::sequential-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::py-sequential-identifiers
    unless:
      - id: html-basename
  - id: appended-long-line
    desc: Single appended long line in source
    crit: notable
    conf: 0.9
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    all:
      - id: last-line-over-1000
      - id: metadata/package/metrics::file-has-30-plus-lines
      - id: single-long-line-outlier
    unless:
      - id: sketch-basename
      - id: archive-basename
      - id: source-map-inline
  - id: appended-steganography
    desc: Steganography payload in appended long line
    crit: hostile
    conf: 0.95
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    all:
      - id: appended-long-line
      - id: has-invisible-unicode
    unless:
      - id: metadata/package/testing/presence::faker-word
  - id: has-encoding
    desc: Data encoding or decoding detected
    crit: component
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    any:
      - id: micro-behaviors/data/decode/base64/
      - id: micro-behaviors/data/encode/xor/
      - id: micro-behaviors/data/encode/payload::large-base64-payload
      - id: micro-behaviors/data/decode/hex/
      - id: micro-behaviors/data/encode/payload::hex-byte-format
  - id: has-dynamic-exec
    desc: Dynamic code execution detected
    crit: component
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    any:
      - id: micro-behaviors/process/interpreter/eval/
      - id: micro-behaviors/process/interpreter/python/
      - id: objectives/execution/interpreter/eval/
      - id: objectives/anti-static/obfuscation/payload::exec-function-call
      - id: objectives/anti-static/obfuscation/payload::eval-function-call
      - id: micro-behaviors/process/create/direct/
      - id: micro-behaviors/process/create/shell/
      - id: objectives/command-and-control/dropper/execution/script/
      - id: objectives/command-and-control/dropper/execution/eval/
  - id: trailing-whitespace-payload
    desc: Trailing whitespace on a line hides code
    crit: suspicious
    conf: 0.9
    for:
      - scripts
      - source
    all:
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::whitespace-hiding
      - id: last-line-over-1000
    any:
      - id: has-encoding
      - id: has-dynamic-exec
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::excessive-single-char-vars
  - id: appended-encoded-exec
    desc: Encoded payload executed from appended line
    crit: hostile
    conf: 0.9
    for:
      - binaries
      - scripts
      - source
      - manifests
      - documents
      - media
      - data
    all:
      - id: appended-long-line
      - id: has-encoding
      - id: has-dynamic-exec
