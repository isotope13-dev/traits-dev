defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1027
  mbc: B0032
traits:
  - id: no-comments
    desc: No comments in code
    crit: component
    conf: 0.6
    for: [scripts, -php, binaries]
    if:
      type: metrics
      field: comments.total
      max: 0
      min_size: 2048
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - type: basename
        regex: \.(Rd|html?|md|xsd)$
      - type: basename
        regex: \.(xml|dart)$
      - id: metadata/package/tooling::esmodule-bundled
      - id: metadata/lang/source::windows-generated-def-path
      - id: metadata/lang/source::windows-generated-def-table
  - id: very-low-comment-ratio
    desc: Very low comment-to-code ratio (<1%)
    crit: component
    conf: 0.65
    for: [scripts, -php, binaries]
    if:
      type: metrics
      field: comments.to_code_ratio
      max: 0.008
      min_size: 32768
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - type: text
        regex: automatically generated|DO NOT MODIFY BY HAND
      - id: metadata/lang/source::windows-generated-def-table
    downgrade:
      any:
        - type: text
          substr: _interopRequireDefault
        - type: text
          substr: __esModule
  - id: very-long-lines
    desc: Multiple long lines (>1000 chars)
    crit: baseline
    conf: 0.85
    for: [scripts]
    size_max: 1000000
    # `lines_over_1000 >= 2` cleanly partitions with
    # `single-long-line-outlier` (which fires at exactly 1) — packed
    # payloads put their bulk on one line; legitimate minified bundles
    # spread across several. No overlap with the outlier means no
    # need for a redundant `unless:` clause.
    unless:
      - id: benign-very-long-lines-context
      - id: metadata/lang/source::windows-generated-def-path
      - id: metadata/package/testing/scripted::pytest
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/file/text/catalog::uproc-tools-catalog
      - type: basename
        regex: \.(pyc|pyd)$|\.d\.ts$
      - type: text
        regex: automatically generated|DO NOT MODIFY BY HAND
    if:
      type: metrics
      field: text.lines_over_1000
      min: 2
  - id: has-invisible-unicode
    desc: Notable invisible Unicode count
    crit: notable
    conf: 0.88
    if:
      type: metrics
      field: text.invisible_chars
      min: 17
      max: 64
    unless:
      - type: basename
        substr: yarn-standalone.js
      - type: text
        substr: /opt/Hyper/resources/bin/yarn-standalone.js
      - type: text
        regex: yarnpkg\.com/en/docs/cli/|nightly\.yarnpkg\.com/latest\.js
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/file/text/invisible-unicode::benign-invisible-unicode-text-context
      - id: metadata/file/text/catalog::uproc-tools-catalog
  - id: high-invisible-unicode
    desc: Suspicious invisible Unicode count
    crit: suspicious
    conf: 0.92
    if:
      type: metrics
      field: text.invisible_chars
      min: 65
    unless:
      - type: basename
        substr: yarn-standalone.js
      - type: text
        substr: /opt/Hyper/resources/bin/yarn-standalone.js
      - type: text
        regex: yarnpkg\.com/en/docs/cli/|nightly\.yarnpkg\.com/latest\.js
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/file/text/invisible-unicode::benign-invisible-unicode-text-context
      - id: metadata/file/text/catalog::uproc-tools-catalog
  - id: last-line-over-1000
    desc: Last line is over 1000 chars
    crit: component
    conf: 0.9

    if:
      type: metrics
      field: text.last_line_length
      min: 1000
  - id: single-long-line-outlier
    desc: Exactly one line exceeds 1000 chars
    crit: component
    conf: 0.9

    if:
      type: metrics
      field: text.lines_over_1000
      min: 1
      max: 1
  - id: high-text-entropy
    desc: High overall text entropy (encoded
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: text.char_entropy
      min: 5.7
    unless:
      - type: basename
        regex: \.(s|S|asm)$
      - id: metadata/library/runtime::next-edge-runtime-bundle
      - type: basename
        regex: \.md$
      - type: basename
        regex: \.sh\.in$
      - type: basename
        regex: (?i)(i18n|l10n|locale)\.
      - type: basename
        regex: (?i)translations?\.
  - id: buildkit-dockerfile-v0
    desc: BuildKit dockerfile marker
    crit: component
    conf: 0.95

    if:
      type: text
      substr: '"comment":"buildkit.dockerfile.v0"'
  - id: python-zipapp-structure
    desc: Python zipapp container structure
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: \.pyz$
  - id: pyc-or-pyd-basename
    desc: Python bytecode or extension file
    crit: component
    conf: 0.95

    if:
      type: basename
      regex: \.(pyc|pyd)$
  - id: generated-file-marker
    desc: Generated file marker text
    crit: component
    conf: 0.95

    if:
      type: text
      substr: automatically generated
  - id: low-whitespace
    desc: Very low whitespace ratio (minified/compressed)
    crit: baseline
    conf: 0.7
    unless:
      - id: test-source-file
      - id: known-benign-low-whitespace
      - id: metadata/lang/source::windows-generated-def-path
      - type: metrics
        field: imports.unique_modules
        min: 100
    if:
      type: metrics
      field: text.whitespace_ratio
      max: 0.1
      min_size: 2048
  - id: html-basename
    desc: HTML file extension
    crit: component
    if:
      type: basename
      regex: '\.html?$'
  - id: sketch-basename
    desc: Sketch design file
    crit: component
    if:
      type: basename
      regex: '\.sketch$'
  - id: archive-basename
    desc: Archive/package file extension
    crit: component
    if:
      type: basename
      regex: '\.(vsix|zip|jar)$'
  - id: ico-resource-basename
    desc: Icon resource file extension
    crit: component
    if:
      type: basename
      regex: '(?i)\.ico$'
  - id: source-map-inline
    desc: Inline source map data URL
    crit: component
    if:
      type: text
      substr: '//# sourceMappingURL=data:application/json'
  - id: test-basename-path
    desc: Test file path or basename
    crit: component
    if:
      type: basename
      regex: (^|[\\/])__?tests?__?([\\/]|$)
  - id: test-basename-suffix
    desc: Test file suffix basename
    crit: component
    if:
      type: basename
      regex: _tests?\.py$
  - id: compressed-archive-basename
    desc: Compressed archive file extension
    crit: component
    if:
      type: basename
      regex: \.(tar(\.\w+)?|tgz|zip)$
  - id: source-svg-element
    desc: Source contains SVG element
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      regex: '<svg\b'
  - id: source-svg-namespace
    desc: Source contains SVG namespace
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      substr: http://www.w3.org/2000/svg
  - id: source-svg-path-data
    desc: Source contains SVG path data
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      regex: '\bd=["''][Mm]?-?\d+(\.\d+)?[ ,]|\b(icon|pathData)\s*:\s*[`"''][Mm]?-?\d+(\.\d+)?[ ,]'
composite_rules:
  - id: wordpress-rest-response-fixture
    desc: WordPress REST response fixture
    crit: component
    conf: 0.95
    all:
      - id: metadata/package/testing/presence/harness::wordpress-rest-route
      - id: metadata/package/testing/presence/harness::wordpress-target-hints
      - id: metadata/package/testing/presence/harness::wordpress-allow-methods-array
  - id: benign-very-long-lines-context
    desc: Benign long line file context
    crit: component
    conf: 0.95
    any:
      - id: buildkit-dockerfile-v0
      - id: python-zipapp-structure
      - id: test-basename-path
      - id: test-basename-suffix
      - id: wordpress-rest-response-fixture
      - id: source-svg-path-data-context
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/runtime::next-edge-runtime-bundle
      - id: metadata/package/testing/scripted::xterm-terminal-recording
      - id: ico-resource-basename
      - id: metadata/file/text/catalog::frequency-list-catalog
  - id: source-svg-path-data-context
    desc: Source SVG path data context
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    all:
      - id: source-svg-element
      - id: source-svg-namespace
      - id: source-svg-path-data
  - id: known-benign-low-whitespace
    desc: Known benign low-whitespace file
    crit: component
    conf: 0.95

    any:
      - id: buildkit-dockerfile-v0
      - id: python-zipapp-structure
      - id: pyc-or-pyd-basename
      - id: generated-file-marker
      - id: metadata/library/nodeunit::nodeunit
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::esmodule-bundled
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/testing/scripted::xterm-terminal-recording
      - id: metadata/lang/source::windows-generated-def-table
      - id: metadata/file/text/catalog::frequency-list-catalog
  - id: test-source-file
    desc: Test source file markers
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    any:
      - id: metadata/package/testing/presence/fixture::mocha-test-file
      - id: metadata/package/testing/presence/fixture::jest-test-file
      - id: metadata/package/testing/harness/runtime::test-basename-prefix
      - id: metadata/package/testing/harness/runtime::test-basename-suffix
      - id: metadata/package/testing/harness/runtime::test-basename-spec
      - id: metadata/package/testing/harness/runtime::v8-js-fuzzer-unicode-fixture-name
  - id: minified-code
    desc: Minified/compressed code (multiple indicators)
    crit: baseline
    conf: 0.9
    all:
      - id: low-whitespace
    any:
      - id: very-low-comment-ratio
      - id: objectives/anti-static/obfuscation/code-metrics/functions::high-function-density
      - id: objectives/anti-static/obfuscation/code-metrics/functions::many-one-liner-functions
      - id: no-comments
      - id: metadata/file/text/profile::sequential-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::py-sequential-identifiers
    unless:
      - id: html-basename
      - id: ico-resource-basename
      - id: metadata/lang/source::windows-generated-def-path
      - id: metadata/lang/source::windows-generated-def-table
  - id: appended-long-line
    desc: Single appended long line in source
    crit: baseline
    conf: 0.9

    all:
      - id: last-line-over-1000
      - id: metadata/file/text/metrics::file-has-30-plus-lines
      - id: single-long-line-outlier
    unless:
      - id: sketch-basename
      - id: archive-basename
      - id: source-map-inline
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/signed/platform::microsoft-corporation
  - id: appended-steganography
    desc: Steganography payload in appended long line
    crit: hostile
    conf: 0.95

    all:
      - id: appended-long-line
      - id: high-invisible-unicode
    unless:
      - id: metadata/package/testing/presence/scripted::faker-word
      - id: metadata/file/text/invisible-unicode::hyper-yarn-standalone-text-fragment
      - id: metadata/file/text/invisible-unicode::benign-invisible-unicode-text-context
      - id: metadata/file/text/invisible-unicode::bundle-or-minified-context
      - id: micro-behaviors/process/create/shell/host::require-vscode
      - id: compressed-archive-basename
  - id: has-encoding
    desc: Data encoding or decoding detected
    crit: component

    any:
      - id: micro-behaviors/data/decode/base64/
      - id: micro-behaviors/data/encode/xor/
      - id: micro-behaviors/data/encode/payload::large-base64-payload
      - id: micro-behaviors/data/decode/hex/
      - id: micro-behaviors/data/encode/payload::hex-byte-format
  - id: has-dynamic-exec
    desc: Dynamic code execution detected
    crit: component

    any:
      - id: micro-behaviors/process/interpreter/eval/
      - id: micro-behaviors/process/interpreter/python/
      - id: objectives/execution/interpreter/eval/
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: micro-behaviors/process/interpreter/python::eval-builtin
      - id: micro-behaviors/process/create/direct/
      - id: micro-behaviors/process/create/shell/
      - id: objectives/command-and-control/dropper/execution/script/
      - id: objectives/command-and-control/dropper/execution/eval/
  - id: trailing-whitespace-payload
    desc: Trailing whitespace on a line hides code
    crit: suspicious
    conf: 0.9
    for:
      - scripts
      - source
    all:
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::whitespace-hiding
      - id: last-line-over-1000
    any:
      - id: has-encoding
      - id: has-dynamic-exec
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::excessive-single-char-vars
  - id: one-line-obfuscated-dropper
    desc: One-line script that decodes and executes or writes a payload (hostile)
    crit: hostile
    conf: 0.95
    for: [scripts, source]
    all:
      - id: metadata/file/text/metrics::file-one-liner
      - id: metadata/file/text/metrics::single-long-line
      - id: has-encoding
    any:
      - id: has-dynamic-exec
      - id: micro-behaviors/fs/write/file
    unless:
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/library/runtime::next-edge-runtime-bundle
      - id: metadata/library/structure::js-closure-compiled-bundle
      - id: well-known/app/tencent-codebuddy::codebuddy-marker

  - id: appended-encoded-exec
    desc: Encoded payload executed from appended line
    crit: hostile
    conf: 0.9

    all:
      - id: appended-long-line
      - id: has-encoding
      - id: has-dynamic-exec
    unless:
      - id: metadata/file/magic::python-bytecode
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-meipass
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
