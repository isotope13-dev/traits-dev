# PowerShell-Specific Metrics-Based Obfuscation Detection
# Detects PowerShell obfuscation patterns used in malware
defaults:
  platforms: [windows]
  for: [powershell]
  attack: "T1027"
  mbc: "B0032"
traits:
  # === PowerShell-Specific Obfuscation Patterns ===
- id: ps-encoded-commands
  desc: High-entropy PowerShell strings
  crit: notable
  conf: 0.85
  if:
    type: metrics
    field: strings.avg_entropy
    min: 4.5
  unless:
  - type: text
    substr: "# SIG # Begin signature block"
  - type: text
    substr: "# Copyright IBM Corp."
  - type: text
    substr: "vcvarsall.bat"
  - id: well-known/app/maester/
- id: ps-obfuscated-vars
  desc: "Obfuscated PowerShell variable names"
  crit: suspicious
  conf: 0.8
  if:
    type: metrics
    field: identifiers.avg_entropy
    min: 3.5
  unless:
  - type: text
    substr: CONDA_BACKUP_
  - type: text
    substr: _CONDA_SET_
  - type: metrics
    field: identifiers.total
    max: 4
  - type: text
    substr: "Install-Chocolatey"
  - id: metadata/build/conda::conda-recipe-prefix-install-script
  - id: well-known/app/azure-dev-cli/
  - id: well-known/app/maester/
- id: ps-suspicious-single-line
  desc: Suspicious long PowerShell line
  crit: suspicious
  conf: 0.85
  if:
    type: metrics
    field: text.max_line_length
    min: 1000
  unless:
  - id: metadata/build/compiler::ap-compiler-header
  - id: well-known/app/posh-ovirt/
  - id: well-known/app/maester/
  - type: text
    substr: "Auto-generated by PowerForge"
  - type: text
    regex: '(?m)^\s*ReleaseNotes\s*='
- id: ps-many-single-char
  desc: "Many single-character variables"
  crit: suspicious
  conf: 0.75
  if:
    type: metrics
    field: identifiers.single_char_ratio
    min: 0.35
- id: ps-no-comments
  desc: "No comments in PowerShell script"
  crit: component
  conf: 0.6
  if:
    type: metrics
    field: comments.total
    max: 0
composite_rules:
- id: ps-invoke-obfuscation
  desc: "PowerShell Invoke-Obfuscation patterns detected"
  crit: suspicious
  conf: 0.95
- id: ps-encoded-downloader
  desc: "Encoded PowerShell downloader"
  crit: suspicious
  conf: 0.9
  all:
  - id: objectives/anti-static/obfuscation/code-metrics/structure::ps-encoded-commands
  - id: objectives/anti-static/obfuscation/code-metrics/structure::ps-no-comments
  any:
  - id: objectives/anti-static/obfuscation/code-metrics/structure::ps-suspicious-single-line
  - id: objectives/anti-static/obfuscation/code-metrics/structure::ps-obfuscated-vars
