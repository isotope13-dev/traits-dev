# Distinguish Legitimate Minification from Malicious Obfuscation
# Minified code is compressed but readable, obfuscated code hides intent
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
  # Legitimate minification patterns (benign compression)
  - id: minification-pattern
    desc: "Code appears minified by webpack/uglify/terser"
    crit: baseline
    conf: 0.8
    all:
      - {id: 'objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines'}
      - {id: 'objectives/anti-static/obfuscation/code-metrics/functions::single-char-function-names'}
    unless:
      - {id: 'metadata/library/structure/'}
      - {id: 'objectives/anti-static/obfuscation/payload/encoded::decode-exec-js'}
  # Hostile obfuscation (encoding combined with execution)
  - id: hostile-obfuscation
    desc: "Hostile encoding or decode-and-execute behavior"
    crit: suspicious
    conf: 0.90
    any:
      - {id: 'objectives/anti-static/obfuscation/payload/encoded::decode-exec-js'}
      - {id: 'objectives/anti-static/obfuscation/payload/encoded::hardcoded-key-decryptor'}
  # Minified code with hostile capabilities
  - id: minified-with-hostile-caps
    desc: "Minified code with hostile execution or obfuscation"
    crit: suspicious
    conf: 0.92
    all:
      - {id: minification-pattern}
    any:
      - {id: 'objectives/execution/activex/com::activex-shell-execution'}
      - {id: 'objectives/command-and-control/backdoor/dispatch/runtime::socket-command-handler'}
      - {id: hostile-obfuscation}
    unless:
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::version-string
      - id: metadata/library/prototype::copyright
      - id: metadata/library/jquery::fn-extend
      - id: metadata/package/manifest/runtime::vscode-extension
      - id: metadata/library/structure::google-tag-manager-bundle
      - id: well-known/app/google-web::google-closure-copyright
      - id: well-known/lib/yui::yui-connection-library
