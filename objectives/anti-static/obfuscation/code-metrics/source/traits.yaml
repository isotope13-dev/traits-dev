defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  crit: notable
  attack: T1027
  mbc: B0032
traits:
  - id: high-entropy-identifiers
    desc: High entropy identifiers (random variable names)
    conf: 0.85
    if:
      type: metrics
      field: identifiers.avg_entropy
      min: 3.0
      min_size: 2048
    unless:
      - id: metadata/quality::php-manual-empty-function-stubs
      - type: metrics
        field: identifiers.total
        max: 64
      - type: metrics
        field: identifiers.avg_length
        min: 20
      - id: metadata/dev/testing::is-test
      - id: metadata/quality::has-tests
  - id: high-entropy-strings
    desc: High entropy strings (encoded/encrypted data)
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: strings.avg_entropy
      min: 4.0
      min_size: 2048
    unless:
      - id: metadata/dev/testing::is-test
      - id: metadata/quality::has-tests
