defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  attack: T1027
  mbc: B0032
traits:
  - id: high-entropy-source-short-text
    desc: Short source text entropy context
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: strings.total
      max: 30
  - id: high-entropy-source-webpack-map
    desc: Webpack source map entropy context
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "sourceURL=webpack:///./0.big.js?"
  - id: high-entropy-source-toy-chain
    desc: Toy chained-call entropy context
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "hello.world();test.a.b.c.d();x(1,2,3,4)"
  - id: high-entropy-source-ssh-key
    desc: SSH public key entropy context
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'ssh-(rsa|ed25519|ecdsa)\s+AAAA[A-Za-z0-9+/]{40,}'
  - id: high-entropy-strings
    desc: High entropy source string literals
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: strings.avg_entropy
      min: 4.0
      min_size: 2048
    unless:
      - id: high-entropy-source-benign-context

composite_rules:
  - id: high-entropy-source-benign-context
    desc: Benign source entropy context
    crit: component
    conf: 0.9
    any:
      - id: high-entropy-source-short-text
      - id: high-entropy-source-webpack-map
      - id: high-entropy-source-toy-chain
      - id: high-entropy-source-ssh-key
      - id: micro-behaviors/data/text/language::script-han
      - id: metadata/file/text/format::han-ideograph-prose
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/quality::has-tests
      - id: metadata/package/tooling::composer-generated-autoload
