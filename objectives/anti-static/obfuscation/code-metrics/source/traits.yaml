defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  attack: T1027
  mbc: B0032
traits:
  - id: high-entropy-strings
    desc: High entropy source string literals
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: strings.avg_entropy
      min: 4.0
      min_size: 2048
    unless:
      # Too few strings for an average entropy to be meaningful.
      - type: metrics
        field: strings.total
        max: 30
      # An embedded SSH public key is legitimately high-entropy.
      - type: text
        regex: 'ssh-(rsa|ed25519|ecdsa)\s+AAAA[A-Za-z0-9+/]{40,}'
      # CJK prose raises average entropy without any obfuscation.
      - id: metadata/file/profile/language::script-han
      - id: metadata/file/format::han-ideograph-prose
      # Test corpora and generated autoloaders ship high-entropy fixtures.
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/quality/profile::has-tests
      - id: metadata/package/tooling::composer-generated-autoload
