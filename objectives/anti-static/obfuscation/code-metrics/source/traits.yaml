defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  attack: T1027
  mbc: B0032
traits:
  - id: high-entropy-identifiers
    desc: High entropy identifiers (random variable names)
    conf: 0.85
    if:
      type: metrics
      field: identifiers.avg_entropy
      min: 3.0
      min_size: 2048
    unless:
      - id: metadata/package::php-manual-empty-function-stubs
      - type: metrics
        field: identifiers.total
        max: 64
      - type: metrics
        field: identifiers.avg_length
        min: 12.5
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package::has-tests
  - id: high-entropy-strings
    desc: High entropy strings (encoded/encrypted data)
    crit: notable
    conf: 0.8
    size_max: 50000
    if:
      type: metrics
      field: strings.avg_entropy
      min: 4.0
      min_size: 2048
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package::has-tests
      # Exclude OpenSSH public key literals, which naturally raise entropy without
      # indicating hidden or encrypted payloads.
      - type: raw
        regex: 'ssh-(rsa|ed25519|ecdsa)\s+AAAA[A-Za-z0-9+/]{40,}'
