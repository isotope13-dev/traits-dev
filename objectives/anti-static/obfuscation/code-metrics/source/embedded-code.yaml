# String-entropy signal used by obfuscation composites. Neutral embedded-code
# candidate counts live under metadata/file/metrics.
defaults:
  platforms: [windows, unix]
traits:
  - id: high-string-entropy-dup
    desc: "High string entropy indicating obfuscation"
    crit: baseline
    conf: 0.6
    for: [javascript, typescript, python]
    if:
      type: metrics
      field: "strings.high_entropy_count"
      min: 10
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/file/format/
      - id: metadata/file/format::cjk-ui-prose-source
      - id: metadata/file/format::han-ideograph-prose
