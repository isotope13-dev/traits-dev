# Embedded Code Detection via Metrics
# Detects high ratios of code-like content in strings
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: high-embedded-code-ratio
    desc: "High ratio of embedded code in strings"
    crit: notable
    conf: 0.8
    for: [javascript, typescript, python]
    size_max: 500000
    if:
      type: metrics
      field: "strings.embedded_code_candidates"
      min: 6
    unless:
      - type: trait
        id: metadata/package/testing/harness::is-test
      - type: trait
        id: metadata/package::has-tests
      - type: trait
        id: metadata/package/documentation::sonar-rule-metadata-json
      - type: raw
        regex: "(?s)language:\\s*['\"`][A-Za-z0-9_+.#-]+['\"`]\\s*,\\s*code:\\s*"
  - id: very-high-embedded-code
    desc: "Extremely high embedded code count"
    crit: notable
    conf: 0.9
    for: [javascript, typescript, python, powershell]
    size_max: 500000
    if:
      type: metrics
      field: "strings.embedded_code_candidates"
      min: 10
    unless:
      - type: trait
        id: metadata/package/testing/harness::is-test
      - type: trait
        id: metadata/package::has-tests
      - type: trait
        id: metadata/package/documentation::sonar-rule-metadata-json
      - type: raw
        regex: "(?s)language:\\s*['\"`][A-Za-z0-9_+.#-]+['\"`]\\s*,\\s*code:\\s*"
  - id: high-string-entropy-dup
    desc: "High string entropy indicating obfuscation"
    crit: notable
    conf: 0.6
    for: [javascript, typescript, python]
    if:
      type: metrics
      field: "strings.high_entropy_count"
      min: 10
