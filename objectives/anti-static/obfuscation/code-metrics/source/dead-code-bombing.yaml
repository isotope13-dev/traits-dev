# Dead Code Bombing Metrics
# Detects code inflation via large numbers of unused functions and low identifier reuse
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, csharp]
traits:
  - id: locale-basename
    desc: Locale or i18n basename
    crit: baseline
    conf: 0.9
    if:
      type: basename
      regex: (?i)(i18n|l10n|locale)\.
  - id: translation-basename
    desc: Translation basename
    crit: baseline
    conf: 0.9
    if:
      type: basename
      regex: (?i)translations?\.
  - id: locale-path
    desc: JavaScript locale resource path
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: (?i)[\\/]locale[\\/]
  - id: javascript-locale-module
    desc: JavaScript locale data module
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: "defineLocale\\(|moment\\.defineLocale|buildLocalizeFn|CLDR #"
  - id: date-fns-format-distance-locale
    desc: date-fns formatDistance locale data
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: formatDistanceLocale
  - id: fluent-translation-file
    desc: Fluent localization resource file
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: (?i)(^|[!:/\\])l10n[^!:/\\]{0,80}[!:/\\].{0,240}\.ftl$|\.ftl$
  - id: excessive-parameterless-functions
    desc: "Excessive parameterless functions (dead code padding)"
    crit: baseline
    conf: 0.7
    size_max: 500000
    if:
      type: metrics
      field: "functions.no_params_count"
      min: 100
      # Large number of parameterless functions is unusual and suggests padding
    unless:
      # Module bundlers emit hundreds of zero-arg helper closures by design.
      - id: metadata/library/structure::js-known-bundler-output
    downgrade:
      any:
        - id: metadata/package/tooling::babel-transpiled
        - type: metrics
          field: functions.avg_length_lines
          min: 3
        - type: metrics
          field: text.whitespace_ratio
          max: 0.05
  - id: high-non-ascii-ratio
    desc: "High non-ASCII character ratio (junk padding)"
    crit: notable
    conf: 0.6
    unless:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::python-zipapp-structure
      - id: objectives/anti-static/obfuscation/code-metrics/structure::ico-resource-basename
      - id: non-ascii-locale-context
      - id: metadata/file/text/format::japanese-prose-source
      - id: well-known/lib/pdfjs::pdfjs-bundle
    downgrade:
      any:
        - id: well-known/lib/jinja2::package-source
        - id: well-known/lib/videojs::release-bundle
    if:
      type: metrics
      field: "text.non_ascii_ratio"
      # >= 40% non-ASCII is genuinely unusual; the previous 25% threshold
      # tripped on legitimate non-English source files that use box-drawing
      # characters for ASCII-art comment dividers (e.g. `// ─────`) plus
      # accented characters in identifiers / docstrings.
      min: 0.40
  - id: excessive-empty-lines
    desc: "Excessive empty lines for code inflation"
    crit: baseline
    conf: 0.5
    # Empty-line ratio is only meaningful for larger source files. Small,
    # documented modules with markdown-style docstrings commonly cross 40%.
    size_min: 10000
    if:
      type: metrics
      field: "text.empty_line_ratio"
      min: 0.40
composite_rules:
  - id: non-ascii-locale-context
    desc: Locale/translation non-ASCII context
    crit: component
    conf: 1.0
    any:
      - id: locale-basename
      - id: translation-basename
      - id: locale-path
      - id: javascript-locale-module
      - id: date-fns-format-distance-locale
      - id: fluent-translation-file
