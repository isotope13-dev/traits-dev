# Dead Code Bombing Metrics
# Detects code inflation via large numbers of unused functions and low identifier reuse
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, python, csharp]
traits:
  - id: locale-basename
    desc: Locale or i18n basename
    crit: baseline
    conf: 0.9
    if:
      type: basename
      regex: (?i)(i18n|l10n|locale)\.
  - id: translation-basename
    desc: Translation basename
    crit: baseline
    conf: 0.9
    if:
      type: basename
      regex: (?i)translations?\.
  - id: excessive-parameterless-functions
    desc: "Excessive parameterless functions (dead code padding)"
    crit: baseline
    conf: 0.7
    size_max: 500000
    if:
      type: metrics
      field: "functions.no_params_count"
      min: 100
      # Large number of parameterless functions is unusual and suggests padding
    downgrade:
      any:
        - id: metadata/package/tooling::babel-transpiled
        - type: metrics
          field: functions.avg_length_lines
          min: 3
        - type: metrics
          field: text.whitespace_ratio
          max: 0.05
  - id: high-non-ascii-ratio
    desc: "High non-ASCII character ratio (junk padding)"
    crit: suspicious
    conf: 0.6
    unless:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::python-zipapp-structure
      - id: objectives/anti-static/obfuscation/code-metrics/structure::ico-resource-basename
      - id: locale-basename
      - id: translation-basename
    if:
      type: metrics
      field: "text.non_ascii_ratio"
      min: 0.25
      # > 25% non-ASCII is very unusual for legitimate code
  - id: excessive-empty-lines
    desc: "Excessive empty lines for code inflation"
    crit: suspicious
    conf: 0.5
    size_min: 1000
    if:
      type: metrics
      field: "text.empty_line_ratio"
      min: 0.40
