defaults:
  for: [pe]
  platforms: [windows]
composite_rules:
- id: excessive-line-length-large-pe
  desc: Downgrade excessive line length for large PEs or archive containers
  crit: suspicious
  conf: 0.5
  all:
  - id: objectives/anti-static/obfuscation/code-metrics/line-length/
  downgrade:
    any:
    - id: metadata/binary/metrics/size::massive-executable
    - id: metadata/file/magic/identity::ar-archive
    - id: excessive-line-length-large-pe-cond-2--inline-24024
    - id: excessive-line-length-large-pe-cond-3--inline-24025
traits:
- id: excessive-line-length-large-pe-cond-2--inline-24024
  desc: Regex component marker
  crit: component
  conf: 0.5
  if:
    type: basename
    regex: \.(crate|json|vsix|zip)$
  count_max: 1024025
- id: excessive-line-length-large-pe-cond-3--inline-24025
  desc: Regex component marker
  crit: component
  conf: 0.5
  if:
    type: metrics
    field: text.total_lines
    max: 5
  count_max: 1024026
# Migrated from the engine (evaluate_composites.rs). Only input is the
# text.max_line_length metric. JS/TS megabyte lines are handled by
# line-shape::js-megabyte-single-line; this covers other scripts/source.
- id: excessive-line-length
  desc: Excessively long lines (>1MB)
  crit: suspicious
  conf: 0.9
  attack: T1027
  # JS/TS handled by line-shape::js-megabyte-single-line. This covers the
  # scripting languages where a >1MB single line signals a packed/obfuscated
  # payload (webshells, packed droppers).
  for: [php, python, perl, ruby, lua]
  platforms: [linux, macos, windows]
  if:
    type: metrics
    field: text.max_line_length
    min: 1000001
  unless:
  # binary-like text blobs (mis-typed binaries, null-padded data)
  - type: metrics
    field: text.null_byte_count
    min: 4096
  - type: metrics
    field: text.non_printable_ratio
    min: 0.30
  downgrade:
    any:
    # serialized data / minified single-line blobs, not obfuscated code
    - type: metrics
      field: text.total_lines
      max: 5
    - type: basename
      regex: \.json$
    - id: metadata/file/format::sourcemap-sources-content
