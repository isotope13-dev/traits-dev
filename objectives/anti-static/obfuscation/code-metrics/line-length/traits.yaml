defaults:
  for: [pe, ole, oledoc]
  platforms: [windows]
composite_rules:
  - id: excessive-line-length-large-pe
    desc: Downgrade excessive line length for large binaries or containers
    crit: notable
    conf: 0.5
    all:
      - id: objectives/anti-static/obfuscation/code-metrics/line-length/
    downgrade:
      any:
        - id: metadata/binary/metrics::massive-executable
        - id: metadata/file/magic::ar-archive
        - type: basename
          regex: \.(crate|json|vsix|zip)$
        - type: basename
          regex: \.(doc|msi|msp|xls)$
        - type: metrics
          field: text.total_lines
          max: 5
