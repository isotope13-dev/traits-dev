defaults:
  for: [pe]
  platforms: [windows]
composite_rules:
  - id: excessive-line-length-large-pe
    desc: Downgrade excessive line length for large PEs or archive containers
    crit: notable
    conf: 0.5
    all:
      - id: objectives/anti-static/obfuscation/code-metrics/line-length/
    downgrade:
      any:
        - id: metadata/format::massive-executable
        - id: metadata/format/magic::ar-archive
        - type: basename
          regex: \.(crate|json|vsix|zip)$
        - type: metrics
          field: text.total_lines
          max: 5
