defaults:
  platforms: [unix, windows]
  for: [text]

composite_rules:
- id: excessive-line-length-protobuf-text
  desc: Downgrade protobuf text line length
  crit: baseline
  conf: 0.45
  all:
  - id: objectives/anti-static/obfuscation/code-metrics/line-length/
  downgrade:
    any:
    - id: excessive-line-length-protobuf-text-cond-0--inline-24027
traits:
- id: excessive-line-length-protobuf-text-cond-0--inline-24027
  desc: Regex component marker
  crit: component
  conf: 0.45
  if:
    type: basename
    regex: \.pbtxt(\.gz)?$
  count_max: 1024028
