defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1027
  mbc: B0032
traits:
  - id: monster-function
    desc: Extremely large function (>500 lines)
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: functions.over_500_lines
      min: 1
    unless:
      - id: metadata/library/structure::js-any-bundle-output
      - id: metadata/package/testing/harness/runtime::is-test
      # A large function in readable (well-whitespaced) source is a complexity
      # smell, not obfuscation — obfuscated giant functions are dense.
      - type: metrics
        field: text.whitespace_ratio
        min: 0.14
      - type: text
        substr: generated module into git
      - type: text
        substr: The path of the emitted Rust module
      - type: text
        substr: The version of the Unicode data files to download
    downgrade:
      any:
        - id: metadata/library/lodash/
  - id: many-large-functions
    desc: Multiple very large source functions
    crit: notable
    conf: 0.7
    size_max: 50000
    if:
      type: metrics
      field: functions.over_100_lines
      min: 5
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::generated-or-bundled-source
      - id: metadata/library/structure::js-large-module-bundle
