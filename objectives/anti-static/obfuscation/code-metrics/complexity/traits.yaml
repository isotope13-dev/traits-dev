defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  attack: T1027
  mbc: B0032
traits:
  - id: monster-function
    desc: Extremely large function (>500 lines)
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: functions.over_500_lines
      min: 1
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: text
        substr: generated module into git
      - type: text
        substr: The path of the emitted Rust module
      - type: text
        substr: The version of the Unicode data files to download
    downgrade:
      any:
        - id: metadata/library/lodash/
  - id: many-large-functions
    desc: Multiple very large functions (>100
    crit: notable
    conf: 0.7
    size_max: 50000
    if:
      type: metrics
      field: functions.over_100_lines
      min: 5
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-directory
  - id: many-params
    desc: Functions with excessive parameters (>7)
    crit: notable
    conf: 0.65
    if:
      type: metrics
      field: functions.many_params_count
      min: 3
