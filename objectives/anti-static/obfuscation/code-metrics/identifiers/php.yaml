# PHP-Specific Metrics-Based Obfuscation Detection
# Detects PHP webshell and malware obfuscation patterns
defaults:
  platforms: [windows, unix]
  for: [php]
  attack: "T1027"
  mbc: "B0032"
traits:
  # === PHP-Specific Obfuscation Patterns ===
  - id: php-encoded-strings
    desc: "High entropy strings (base64/gzinflate encoded)"
    crit: suspicious
    conf: 0.85
    if:
      type: metrics
      field: strings.avg_entropy
      min: 4.5
    unless:
      - type: metrics
        field: strings.total
        max: 3
  - id: php-obfuscated-vars
    desc: "Obfuscated PHP variable names"
    crit: suspicious
    conf: 0.8
    if:
      type: metrics
      field: identifiers.avg_entropy
      min: 3.2
    unless:
      - id: metadata/package/fields/compat::php-manual-empty-function-stubs
      - type: metrics
        field: identifiers.total
        max: 64
      - type: metrics
        field: identifiers.avg_length
        min: 14
    downgrade:
      # PHP interfaces and abstract classes have inherently high identifier
      # entropy from dense method-signature parameters
      # (`function findBy(array $criteria, ?array $orderBy = null)`).
      # That's API surface, not obfuscation. Downgrade in framework /
      # interface contexts so it reports as component instead of suspicious.
      any:
        - id: metadata/library/web-frameworks::symfony-context
        - id: metadata/library/web-frameworks::laravel-context
        - type: text
          regex: '^(interface|abstract\s+class)\s+[A-Z]'
  - id: php-single-long-line
    desc: PHP source contains very long line
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: text.max_line_length
      min: 5000
    unless:
      - id: metadata/package/fields/compat::php-manual-empty-function-stubs
      - id: objectives/discovery/system/fingerprint/info::rendered-phpinfo-dump
      - id: php-long-line-benign-context
  - id: php-numeric-bool-table
    desc: PHP numeric boolean table
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'return\s+array\(\d+\s*=>\s*\\(true|false)'
  - id: php-numeric-array-table
    desc: PHP numeric array table
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'return\s+array\(\d+\s*=>\s*array\('
  - id: php-numeric-string-table
    desc: PHP numeric string table
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'return\s+array\(\d+\s*=>\s*[''"]'
  - id: php-short-string-map-table
    desc: PHP short string map table
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'return\s+array\(''[^'']{1,4}''\s*=>\s*''[^'']{1,4}'''
  - id: php-unicode-key-table
    desc: PHP Unicode key table
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'return\s+array\(''\P{ASCII}{1,4}''\s*=>'
  - id: php-unicode-regexp-table
    desc: PHP generated Unicode regexp table
    crit: component
    conf: 0.9
    if:
      type: text
      substr: unicode.org/Public/UNIDATA
  - id: php-many-short-functions
    desc: "Many short functions (deobfuscation layers)"
    crit: suspicious
    conf: 0.75
    if:
      type: metrics
      field: functions.one_liners
      min: 8
      min_size: 4096
    unless:
      - id: metadata/package/fields/compat::php-manual-empty-function-stubs
      - id: well-known/lib/symfony::package-doc
      - type: text
        regex: '^\s*interface\s+[A-Za-z_][A-Za-z0-9_]*'
      - type: metrics
        field: text.whitespace_ratio
        min: 0.2
  - id: php-high-non-ascii-ratio
    desc: "High non-ASCII byte ratio (packed/obfuscated)"
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: text.non_ascii_ratio
      min: 0.5
  - id: php-non-ascii-variable
    desc: "Variable with non-ASCII name (obfuscation)"
    crit: suspicious
    conf: 0.98
    if:
      type: ast
      node: variable_name
      regex: "[^\\x00-\\x7F]"
  - id: php-non-ascii-name
    desc: "Identifier with non-ASCII characters (obfuscation)"
    crit: suspicious
    conf: 0.98
    if:
      type: ast
      node: name
      regex: "[^\\x00-\\x7F]"
  - id: php-non-ascii-subscript
    desc: "Subscript with non-ASCII characters (obfuscation)"
    crit: suspicious
    conf: 0.98
    if:
      type: ast
      node: subscript_expression
      regex: "[^\\x00-\\x7F]"
composite_rules:
  - id: php-long-line-benign-context
    desc: PHP generated long-line data context
    crit: component
    conf: 0.9
    any:
      - id: well-known/lib/guzzle
      - id: well-known/lib/phpseclib
      - id: well-known/lib/symfony::package-doc
      - id: php-numeric-bool-table
      - id: php-numeric-array-table
      - id: php-numeric-string-table
      - id: php-short-string-map-table
      - id: php-unicode-key-table
      - id: php-unicode-regexp-table

  - id: php-webshell-pattern
    desc: "PHP webshell pattern detected"
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::php-encoded-strings
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::php-single-long-line
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::php-obfuscated-vars
  - id: php-encoded-payload
    desc: "PHP with encoded payload"
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::php-encoded-strings
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::php-obfuscated-vars
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::php-many-short-functions
