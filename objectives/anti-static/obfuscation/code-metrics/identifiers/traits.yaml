defaults:
  platforms: [windows, unix]
  for: [scripts, pe, elf, macho]
  attack: T1027
  mbc: B0032
traits:
- id: many-high-entropy-identifiers
  desc: Many random-looking source identifier names
  crit: component
  conf: 0.7
  if:
    type: metrics
    field: identifiers.high_entropy_ratio
    min: 0.4
    min_size: 10240
  unless:
  - id: metadata/package/testing/
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
  - id: metadata/library/structure::js-large-module-bundle
  - type: string_literal
    substr: actiontext
  - type: text
    regex: 'This script uses the following Unicode tables:|The path of the emitted Rust module'
  downgrade:
    any:
    - type: metrics
      field: identifiers.avg_length
      min: 14.0
- id: python-pydantic-schema-marker
  desc: Python Pydantic schema usage
  crit: component
  conf: 0.95
  for: [python]
  if:
    type: text
    regex: '(^|\n)\s*(from\s+pydantic\s+import\s+BaseModel|import\s+pydantic)'
- id: py-many-high-entropy-identifiers
  desc: Many high-entropy identifiers (>35% have
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: metrics
    field: identifiers.high_entropy_ratio
    min: 0.35
    min_size: 4096
  unless:
  - id: metadata/file/extension/identity::python-type-stub-extension
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
  downgrade:
    any:
    - type: metrics
      field: identifiers.avg_length
      min: 14.0
- id: excessive-single-char-vars
  desc: "Excessive single-character var names (>30%)"
  crit: baseline
  conf: 0.8
  if:
    type: metrics
    field: identifiers.single_char_ratio
    min: 0.31
    min_size: 1024
  unless:
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
- id: py-excessive-single-char-vars
  desc: "Excessive single-character var names (>45%)"
  crit: notable
  conf: 0.8
  for:
  - python
  if:
    type: metrics
    field: identifiers.single_char_ratio
    min: 0.45
    min_size: 2048
  unless:
  - type: basename
    regex: \.(pxd|pyi|jq)$
  - type: text
    substr: automatically generated
  - type: text
    substr: DO NOT MODIFY BY HAND
  - type: text
    substr: "Time complexity:"
  - id: metadata/library/structure::js-large-module-bundle
  - type: text
    substr: "from pybench import"
  - type: text
    regex: 'class\s+\w+\(Test\)'
- id: perl-excessive-single-char-vars
  desc: High Perl single-character identifier ratio
  # Notable, not suspicious: a lone identifier-style code metric (cf. sibling
  # numeric-suffix-identifiers, also notable). Idiomatic terse Perl and
  # one-liner toolkits (Mojolicious ojo exports single-letter helper subs)
  # routinely exceed 0.3; standalone this is an analyst hint, not malice.
  # Real obfuscated Perl escalates by composing this with eval/pack/encoded.
  crit: notable
  conf: 0.7
  for:
  - perl
  if:
    type: metrics
    field: identifiers.single_char_ratio
    min: 0.3
    min_size: 4096
  unless:
  - id: metadata/file/extension/identity::typescript-declaration-extension
  - type: text
    substr: automatically generated
  - type: text
    substr: DO NOT MODIFY BY HAND
- id: numeric-suffix-identifiers
  desc: Many numeric suffix identifier names
  crit: notable
  conf: 0.75
  size_min: 15001
  if:
    type: metrics
    field: identifiers.numeric_suffix_count
    min: 100
    min_size: 15001
  unless:
  - id: metadata/package/testing/presence/harness/
  - id: metadata/package/testing/scripted/
  - type: text
    substr: Code generated
  - type: string_literal
    substr: __esModule
  - type: text
    substr: import numpy
  - type: basename
    regex: '(?i)\.(crt|cer|pem)$'
  # SWIG (Foo_1/Foo_2 overload disambiguation), protobuf, and gRPC stubs emit
  # dense numeric-suffix identifiers by construction; exclude generated source.
  # (benign-sequential-identifier-context already covers is-test, dropped above.)
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
- id: py-sequential-identifiers
  desc: "Excessive sequential identifiers"
  crit: notable
  conf: 0.8
  for:
  - python
  if:
    type: metrics
    field: identifiers.sequential_names
    min: 25
  unless:
  - type: basename
    regex: \.(idl|odl|Rd)$
  - type: basename
    regex: \.(pyi|pxd)$
  - type: basename
    regex: \.(pyc|pyd|pfb|ps)$
  - type: metrics
    field: text.whitespace_ratio
    min: 0.2
  - type: string_literal
    substr: pybind11
  # Machine-generated bindings (SWIG, protobuf, gRPC stubs, etc.) carry high
  # sequential-identifier ratios by construction; exclude them like the sibling
  # py-many-high-entropy-identifiers / excessive-single-char-vars traits do.
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
- id: low-identifier-reuse
  desc: Low identifier reuse ratio
  crit: baseline
  conf: 0.7
  for: [scripts, -shell, binaries]
  size_max: 1000000
  if:
    type: metrics
    field: identifiers.reuse_ratio
    max: 0.15
    min_size: 2048
  unless:
  - type: basename
    regex: (^|[\\/])node_modules[\\/].{0,200}[\\/](test|example)
  - type: text
    substr: eval 'exec perl -wSx "$0" "$@"'
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
  - type: basename
    regex: "^Makefile(\\..*)?$"
  - type: metrics
    field: text.whitespace_ratio
    min: 0.14
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
  - id: metadata/library/structure/
- id: generated-source-marker
  desc: Generated source marker text
  crit: component
  conf: 0.95
  if:
    type: text
    regex: THIS IS GENERATED FILE\. DO NOT MODIFY
- id: rpc-idl-placeholder-identifiers
  desc: RPC IDL placeholder identifier naming
  crit: component
  conf: 0.95
  if:
    type: text
    regex: \bstruct_[A-Z]\b|\belem_[0-9]+\b
- id: private-model-codegen-marker
  desc: Private model codegen marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Code generated by private/model/cli/gen-api/main.go
- id: header-template-file
  desc: C header template file
  crit: component
  conf: 1.0
  for: [c, cpp]
  if:
    type: path
    basename: true
    regex: \.h\.in$
- id: python-embedded-cpp-header-template
  desc: Python embedded C++ header template
  crit: component
  conf: 0.95
  for: [python]
  if:
    type: text
    regex: '=\s*r?"""#ifndef\s+[A-Z0-9_]{8,}'
- id: identifier-obfuscation-cond-0--inline-23810
  desc: Average identifier length >= 22 chars
  crit: component
  conf: 0.9
  # Raised from 14 → 22. Real TypeScript / Java class names commonly push
  # avg_length above 14 without any obfuscation (e.g. CeloNumberGuessClient).
  # Genuine identifier-mangling obfuscation (`_abcdef_xyz123_foo_bar...`)
  # tends to land at 22+. Also skip declaration files and known generated
  # bundles where long names are stylistic, not adversarial.
  if:
    type: metrics
    field: identifiers.avg_length
    min: 22.0
    min_size: 1024
  unless:
  - id: metadata/file/extension/identity::declaration-file-extension
  - id: objectives/anti-static/obfuscation/code-metrics/structure::generated-file-marker
  - id: metadata/library/structure::js-large-module-bundle
- id: jruby-embedded-runtime-member
  for: [java, ruby, jar, class]
  desc: JRuby embedded runtime member path
  crit: component
  conf: 0.99
  if:
    type: path
    regex: '(jruby-complete\.jar|META-INF[\\/]jruby\.home([\\/]|$))'
- id: python-benchmark-timeit-atom
  desc: Python benchmark uses timeit
  crit: component
  conf: 0.95
  for: [python]
  if:
    type: text
    word: timeit
- id: python-benchmark-basename-atom
  desc: Python benchmark-style basename
  crit: component
  conf: 0.95
  for: [python]
  if:
    type: path
    basename: true
    regex: '^(bench|benchmark)[^\\/]*\.py$'
- id: stringbench-marker-atom
  desc: stringbench benchmark marker
  crit: component
  conf: 0.99
  for: [python]
  if:
    type: text
    word: stringbench
- id: python-aws-iam-import
  desc: Python AWS IAM CDK import
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    substr: from aws_cdk import aws_iam as iam
- id: python-iam-action-list-constants
  desc: Python IAM action list constants
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: '[A-Z_]+_ACTIONS\s*=\s*\['
composite_rules:
- id: python-aws-iam-policy-table-marker
  desc: Python AWS IAM policy table marker
  crit: component
  conf: 0.95
  for: [python]
  all:
  - id: python-aws-iam-import
  - id: python-iam-action-list-constants
- id: single-char-var-recognized-marker
  desc: Generated or declaration identifier marker
  crit: component
  conf: 1.0
  any:
  - id: metadata/file/extension/identity::declaration-file-extension
  - id: objectives/anti-static/obfuscation/code-metrics/structure::generated-file-marker
  - id: metadata/library/structure::js-any-bundle-output
  - id: metadata/build/bundler::esmodule-bundled
  - id: metadata/library/structure::js-umd-wrapper-minified
  - id: metadata/library/structure::js-umd-wrapper-amd-minified
  - id: metadata/library/runtime::next-edge-runtime-bundle
  - id: metadata/package/testing/harness/runtime::is-test
  - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-marker
  - id: metadata/build/bundler::js-hashed-bundle-basename
  - id: objectives/anti-static/obfuscation/code-metrics/functions::steam-trade-content-script-marker
- id: generated-or-bundled-source
  desc: Generated or bundled source marker
  crit: component
  conf: 0.95
  any:
  - id: metadata/lang/source::wine-compat-source
  - id: metadata/lang/source::python-protobuf-generated
  - id: metadata/lang/source::python-mypy-protobuf-generated
  - id: metadata/lang/source::python-protobuf-stub
  - id: metadata/lang/source::python-generated-basename
  - id: metadata/lang/source::python-generated-reexport
  - id: metadata/lang/source::python-datamodel-codegen-generated
  - id: micro-behaviors/communications/grpc::grpc-generated-stub
  - id: generated-source-marker
  - id: rpc-idl-placeholder-identifiers
  - id: objectives/anti-static/obfuscation/code-metrics/structure::generated-file-marker
  - id: metadata/lang/source::generated-do-not-edit-text
  - id: metadata/build/bundler::esmodule-bundled
  - id: metadata/build/bundler::rolldown-bundled
  - id: metadata/build/bundler::source-region-bundled
  - id: metadata/build/bundler::js-dist-sourcemap-output
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/file/metrics::imports-unique-modules-50
  - id: metadata/package/manifest/freeform::openclaw-plugin-package
  - id: metadata/file/catalog/identity::frequency-list-catalog
  - id: header-template-file
  - id: python-embedded-cpp-header-template
- id: recognized-sequential-identifier-marker
  desc: Generated or test sequential names
  crit: component
  conf: 0.95
  any:
  - id: private-model-codegen-marker
  - id: metadata/package/testing/harness/runtime::is-test
  - id: generated-or-bundled-source
- id: recognized-low-reuse-marker
  desc: Test or harness low reuse marker
  crit: component
  conf: 0.95
  any:
  - id: metadata/library/structure::js-emscripten-generated-bundle
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/library/nodeunit::nodeunit
  - id: objectives/anti-static/obfuscation/code-metrics/functions::steam-trade-content-script-marker
- id: python-benchmark-harness
  desc: Python benchmark harness marker
  crit: component
  conf: 0.95
  for: [python]
  all:
  - id: python-benchmark-timeit-atom
  any:
  - id: python-benchmark-basename-atom
  - id: stringbench-marker-atom
- id: identifier-obfuscation-recognized-marker
  desc: Generated, test, or runtime identifier marker
  crit: component
  conf: 0.95
  any:
  - id: generated-or-bundled-source
  - id: metadata/file/extension/identity::declaration-file-extension
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/harness/unit::python-unittest-test-module
  - id: header-template-file
  - id: jruby-embedded-runtime-member
  - id: metadata/package/testing/presence/harness::test-spec-path-benign-context
  - id: python-benchmark-harness
  - id: python-pydantic-schema-marker
  - id: metadata/package/testing/harness/unit::phpunit-test-context
  - id: metadata/package/testing/harness/unit::phpunit-test-shape
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context
  - id: well-known/lib/jruby::runtime-context
  - id: well-known/lib/glibc
  - id: python-aws-iam-policy-table-marker
- id: identifier-obfuscation
  desc: Identifier obfuscation (random/encoded names)
  crit: notable
  conf: 0.9
  needs: 2
  any:
  - id: metadata/file/metrics::high-entropy-identifiers
  - id: metadata/file/metrics::high-entropy-identifier-ratio
  - id: many-high-entropy-identifiers
  - id: objectives/anti-static/obfuscation/code-metrics/runtime-indirection::go-many-high-entropy-identifiers
  - id: py-many-high-entropy-identifiers
  - id: objectives/anti-static/obfuscation/code-metrics/functions::high-entropy-function-names
  - id: low-identifier-reuse
  unless:
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
  downgrade:
    any:
    - id: identifier-obfuscation-cond-0--inline-23810
