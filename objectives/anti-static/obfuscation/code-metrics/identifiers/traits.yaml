defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1027
  mbc: B0032
traits:
- id: many-high-entropy-identifiers
  desc: Many random-looking source identifier names
  crit: notable
  conf: 0.9
  if:
    type: metrics
    field: identifiers.high_entropy_ratio
    min: 0.25
    min_size: 10240
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: python-unittest-test-module
  - id: generated-or-bundled-source
  - id: metadata/library/structure::js-large-module-bundle
  - type: string_literal
    substr: actiontext
  - type: text
    regex: 'This script uses the following Unicode tables:|The path of the emitted Rust module'
  downgrade:
    any:
    - type: metrics
      field: identifiers.avg_length
      min: 14.0
- id: py-many-high-entropy-identifiers
  desc: Many high-entropy identifiers (>35% have
  crit: notable
  conf: 0.9
  for: [python]
  if:
    type: metrics
    field: identifiers.high_entropy_ratio
    min: 0.35
    min_size: 4096
  unless:
  - type: basename
    regex: \.pyi$
  - id: python-unittest-test-module
  - id: generated-or-bundled-source
  downgrade:
    any:
    - type: metrics
      field: identifiers.avg_length
      min: 14.0
- id: excessive-single-char-vars
  desc: Excessive single-character variable names (>30%)
  crit: baseline
  conf: 0.8
  if:
    type: metrics
    field: identifiers.single_char_ratio
    min: 0.31
    min_size: 1024
  unless:
  - id: single-char-var-benign-context
- id: py-excessive-single-char-vars
  desc: Excessive single-character variable names (>45%)
  crit: suspicious
  conf: 0.8
  for:
  - python
  if:
    type: metrics
    field: identifiers.single_char_ratio
    min: 0.45
    min_size: 2048
  unless:
  - type: basename
    regex: \.pxd$|\.pyi$
  - type: text
    substr: automatically generated
  - type: text
    substr: DO NOT MODIFY BY HAND
  - type: text
    substr: "Time complexity:"
  - id: metadata/library/structure::js-large-module-bundle
  - type: text
    substr: "from pybench import"
  - type: text
    regex: 'class\s+\w+\(Test\)'
- id: perl-excessive-single-char-vars
  desc: High Perl single-character identifier ratio
  crit: suspicious
  conf: 0.7
  for:
  - perl
  if:
    type: metrics
    field: identifiers.single_char_ratio
    min: 0.3
    min_size: 4096
  unless:
  - type: basename
    regex: \.d\.ts$
  - type: text
    substr: automatically generated
  - type: text
    substr: DO NOT MODIFY BY HAND
- id: declaration-basename
  desc: TS/Cython/Python declaration file basename
  crit: component
  conf: 1.0
  # Matches .d.ts (TypeScript), .pxd (Cython), .pyi (Python stub). Used as
  # negative evidence — declaration files legitimately have many short
  # single-purpose identifiers, no comments, and no runtime code.
  if:
    type: basename
    regex: \.d\.ts$|\.pxd$|\.pyi$
- id: numeric-suffix-identifiers
  desc: Many numeric suffix identifier names
  crit: notable
  conf: 0.75
  size_min: 15001
  if:
    type: metrics
    field: identifiers.numeric_suffix_count
    min: 100
    min_size: 15001
  unless:
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/package/testing/scripted::pytest
  - id: metadata/package/testing/harness/runtime::is-test
  - type: text
    substr: Code generated
  - type: string_literal
    substr: __esModule
  - type: text
    substr: import numpy
- id: py-sequential-identifiers
  desc: Excessive sequential identifiers (a, b, c, >25%)
  crit: notable
  conf: 0.8
  for:
  - python
  if:
    type: metrics
    field: identifiers.sequential_names
    min: 25
  unless:
  - type: basename
    regex: \.(idl|odl|Rd)$
  - type: basename
    regex: \.(pyc|pyd|pfb|ps)$
  - type: metrics
    field: text.whitespace_ratio
    min: 0.2
  - type: string_literal
    substr: pybind11
- id: low-identifier-reuse
  desc: Low identifier reuse ratio
  crit: baseline
  conf: 0.7
  for: [scripts, -shell, binaries]
  size_max: 1000000
  if:
    type: metrics
    field: identifiers.reuse_ratio
    max: 0.15
    min_size: 2048
  unless:
  - type: basename
    regex: (^|[\\/])node_modules[\\/].{0,200}[\\/](test|example)
  - type: text
    substr: eval 'exec perl -wSx "$0" "$@"'
  - id: benign-low-reuse-context
  - type: basename
    regex: "^Makefile(\\..*)?$"
  - type: metrics
    field: text.whitespace_ratio
    min: 0.14
  - id: generated-or-bundled-source
  - id: metadata/library/structure::js-large-module-bundle
- id: generated-source-marker
  desc: Generated source marker text
  crit: component
  conf: 0.95
  if:
    type: text
    regex: THIS IS GENERATED FILE\. DO NOT MODIFY
- id: rpc-idl-placeholder-identifiers
  desc: RPC IDL placeholder identifier naming
  crit: component
  conf: 0.95
  if:
    type: text
    regex: \bstruct_[A-Z]\b|\belem_[0-9]+\b
- id: private-model-codegen-marker
  desc: Private model codegen marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Code generated by private/model/cli/gen-api/main.go
- id: python-unittest-import
  desc: Python unittest import
  crit: component
  conf: 0.95
  for: [python]
  if:
    type: text
    regex: '(^|\n)\s*import\s+unittest\b|(^|\n)\s*from\s+unittest\s+import\b'

- id: python-unittest-assert-raises
  desc: Python unittest assertRaises usage
  crit: component
  conf: 0.95
  for: [python]
  if:
    type: symbol
    exact: assertRaises

- id: python-unittest-testcase-marker
  desc: Python unittest TestCase marker
  crit: component
  conf: 0.95
  for: [python]
  if:
    type: text
    regex: '\bunittest\.TestCase\b|(^|\n)\s*class\s+\w+\s*\(\s*unittest\.TestCase\s*\)\s*:'
- id: header-template-file
  desc: C header template file
  crit: component
  conf: 1.0
  if:
    type: basename
    regex: \.h\.in$
- id: identifier-obfuscation-cond-0--inline-23810
  desc: Average identifier length >= 22 chars
  crit: component
  conf: 0.9
  # Raised from 14 → 22. Real TypeScript / Java class names commonly push
  # avg_length above 14 without any obfuscation (e.g. CeloNumberGuessClient).
  # Genuine identifier-mangling obfuscation (`_abcdef_xyz123_foo_bar...`)
  # tends to land at 22+. Also skip declaration files and known generated
  # bundles where long names are stylistic, not adversarial.
  if:
    type: metrics
    field: identifiers.avg_length
    min: 22.0
  unless:
  - id: declaration-basename
  - id: objectives/anti-static/obfuscation/code-metrics/structure::generated-file-marker
  - id: metadata/library/structure::js-large-module-bundle
composite_rules:
- id: single-char-var-benign-context
  desc: Generated or declaration identifier context
  crit: component
  conf: 1.0
  any:
  - id: declaration-basename
  - id: objectives/anti-static/obfuscation/code-metrics/structure::generated-file-marker
  - id: metadata/package/tooling::esmodule-bundled
  - id: metadata/library/structure::js-umd-wrapper-minified
  - id: metadata/library/structure::js-umd-wrapper-amd-minified
  - id: metadata/library/runtime::next-edge-runtime-bundle
  - id: metadata/package/testing/harness/runtime::is-test
  - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
- id: generated-or-bundled-source
  desc: Generated or bundled source context
  crit: component
  conf: 0.95
  any:
  - id: metadata/lang/source::wine-compat-source
  - id: generated-source-marker
  - id: rpc-idl-placeholder-identifiers
  - id: objectives/anti-static/obfuscation/code-metrics/structure::generated-file-marker
  - id: metadata/file/text/invisible-unicode::generated-do-not-edit-text
  - id: metadata/package/tooling::esmodule-bundled
  - id: metadata/file/text/catalog::frequency-list-catalog
  - id: header-template-file
- id: benign-sequential-identifier-context
  desc: Generated or test sequential names
  crit: component
  conf: 0.95
  any:
  - id: private-model-codegen-marker
  - id: metadata/package/testing/harness/runtime::is-test
  - id: generated-or-bundled-source
- id: python-unittest-test-module
  desc: Python unittest-style test module
  crit: component
  conf: 0.95
  for: [python]
  all:
  - id: python-unittest-import
  any:
  - id: python-unittest-assert-raises
  - id: python-unittest-testcase-marker
- id: benign-low-reuse-context
  desc: Test or harness low reuse context
  crit: component
  conf: 0.95
  any:
  - id: metadata/library/structure::js-emscripten-generated-bundle
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/library/nodeunit::nodeunit
- id: identifier-obfuscation
  desc: Identifier obfuscation (random/encoded names)
  crit: suspicious
  conf: 0.9
  needs: 2
  any:
  - id: objectives/anti-static/obfuscation/code-metrics/source::high-entropy-identifiers
  - id: many-high-entropy-identifiers
  - id: objectives/anti-static/obfuscation/code-metrics/runtime-indirection::go-many-high-entropy-identifiers
  - id: py-many-high-entropy-identifiers
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers::rust-many-high-entropy-identifiers
  - id: objectives/anti-static/obfuscation/code-metrics/functions::high-entropy-function-names
  - id: low-identifier-reuse
  unless:
  - id: generated-or-bundled-source
  - id: declaration-basename
  # Test files have many unique identifiers (one per test case/assertion)
  # and low reuse ratios by nature — both metrics are normal, not obfuscation.
  - id: metadata/package/testing/harness/runtime::is-test
  - id: python-unittest-test-module
  # Scanner pattern databases legitimately contain many high-entropy
  # tokens (CVE IDs, hash literals, regex patterns) without being
  # obfuscated code.
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
  - id: header-template-file
  downgrade:
    any:
    - id: identifier-obfuscation-cond-0--inline-23810
