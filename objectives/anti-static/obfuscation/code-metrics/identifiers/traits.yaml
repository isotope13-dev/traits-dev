defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - shell
    - python
    - javascript
    - powershell
  attack: T1027
  mbc: B0032
traits:
  - id: many-high-entropy-identifiers
    desc: Many high-entropy identifiers (>20% have
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: identifiers.high_entropy_ratio
      min: 0.25
      min_size: 10240
    unless:
      - id: metadata/package/testing::is-test
      - type: string_value
        substr: actiontext
      - type: raw
        substr: "This script uses the following Unicode tables:"
      - type: raw
        substr: "The path of the emitted Rust module"
    downgrade:
      any:
        - type: metrics
          field: identifiers.avg_length
          min: 14.0
  - id: py-many-high-entropy-identifiers
    desc: Many high-entropy identifiers (>35% have
    crit: notable
    conf: 0.9
    if:
      type: metrics
      field: identifiers.high_entropy_ratio
      min: 0.35
      min_size: 4096
    unless:
      - type: basename
        regex: \.pyi$
    downgrade:
      any:
        - type: metrics
          field: identifiers.avg_length
          min: 14.0
  - id: excessive-single-char-vars
    desc: Excessive single-character variable names (>30%)
    crit: notable
    conf: 0.8
    if:
      type: metrics
      field: identifiers.single_char_ratio
      min: 0.31
      min_size: 1024
    unless:
      - type: basename
        regex: \.d\.ts$|\.pxd$|\.pyi$
      - type: raw
        substr: automatically generated
      - type: raw
        substr: DO NOT MODIFY BY HAND
      - id: metadata/package/tooling::esmodule-bundled
  - id: py-excessive-single-char-vars
    desc: Excessive single-character variable names (>45%)
    crit: suspicious
    conf: 0.8
    for:
      - python
    if:
      type: metrics
      field: identifiers.single_char_ratio
      min: 0.45
      min_size: 2048
    unless:
      - type: basename
        regex: \.pxd$|\.pyi$
      - type: raw
        substr: automatically generated
      - type: raw
        substr: DO NOT MODIFY BY HAND
  - id: perl-excessive-single-char-vars
    desc: Excessive single-character variables (Perl)
    crit: suspicious
    conf: 0.8
    for:
      - perl
    if:
      type: metrics
      field: identifiers.single_char_ratio
      min: 0.3
      min_size: 4096
    unless:
      - type: basename
        regex: \.d\.ts$
      - type: raw
        substr: automatically generated
      - type: raw
        substr: DO NOT MODIFY BY HAND
  - id: numeric-suffix-identifiers
    desc: Many numeric suffix identifiers (var1,
    crit: notable
    conf: 0.75
    size_min: 15001
    if:
      type: metrics
      field: identifiers.numeric_suffix_count
      min: 20
      min_size: 15001
    unless:
      - id: metadata/package/testing::test-directory
      - id: metadata/package/testing/scripted::pytest
      - id: metadata/package/testing::is-test
      - type: raw
        substr: Code generated
      - type: string_value
        substr: __esModule
      - type: raw
        substr: import numpy
    downgrade:
      any:
        - type: metrics
          field: identifiers.avg_length
          min: 10.0
  - id: sequential-identifiers
    desc: Sequential identifiers (a, b, c,
    crit: notable
    conf: 0.8
    size_min: 1024
    if:
      type: metrics
      field: identifiers.sequential_names
      min: 5
    unless:
      - type: basename
        regex: \.Rd$
      - type: raw
        substr: Code generated by private/model/cli/gen-api/main.go
      - id: metadata/package/testing::is-test
      - type: raw
        regex: automatically generated|DO NOT MODIFY BY HAND
      - type: metrics
        field: text.whitespace_ratio
        min: 0.2
      - type: string_value
        substr: pybind11
      - id: metadata/package/tooling::esmodule-bundled
  - id: py-sequential-identifiers
    desc: Excessive sequential identifiers (a, b, c, >15%)
    crit: notable
    conf: 0.8
    for:
      - python
    if:
      type: metrics
      field: identifiers.sequential_names
      min: 15
    unless:
      - type: basename
        regex: \.Rd$
      - type: basename
        regex: \.pyc$
      - type: basename
        regex: \.pyd$
      - type: string_value
        substr: pybind11
  - id: low-identifier-reuse
    desc: Low identifier reuse (each variable
    crit: notable
    conf: 0.7
    if:
      type: metrics
      field: identifiers.reuse_ratio
      max: 0.15
      min_size: 2048
    unless:
      - type: raw
        substr: eval 'exec perl -wSx "$0" "$@"'
      - id: metadata/package/testing::is-test
      - id: metadata/library/nodeunit::nodeunit
      - type: basename
        regex: "^Makefile(\\..*)?$"
      - type: metrics
        field: text.whitespace_ratio
        min: 0.14
      - type: raw
        regex: automatically generated|DO NOT MODIFY BY HAND
      - id: metadata/package/tooling::esmodule-bundled
composite_rules:
  - id: identifier-obfuscation
    desc: Identifier obfuscation (random/encoded names)
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/source::high-entropy-identifiers
      - id: many-high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics::go-many-high-entropy-identifiers
      - id: py-many-high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics::rust-many-high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics/functions::high-entropy-function-names
      - id: low-identifier-reuse
    downgrade:
      any:
        - type: metrics
          field: identifiers.avg_length
          min: 14.0
