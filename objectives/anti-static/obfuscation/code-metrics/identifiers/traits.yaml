defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1027
  mbc: B0032
traits:
  - id: many-high-entropy-identifiers
    desc: Many high-entropy identifiers (>20% have
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: identifiers.high_entropy_ratio
      min: 0.25
      min_size: 10240
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: generated-or-bundled-source
      - id: metadata/library/structure::js-large-module-bundle
      - type: string_literal
        substr: actiontext
      - type: text
        substr: "This script uses the following Unicode tables:"
      - type: text
        substr: "The path of the emitted Rust module"
    downgrade:
      any:
        - type: metrics
          field: identifiers.avg_length
          min: 14.0
  - id: py-many-high-entropy-identifiers
    desc: Many high-entropy identifiers (>35% have
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: metrics
      field: identifiers.high_entropy_ratio
      min: 0.35
      min_size: 4096
    unless:
      - type: basename
        regex: \.pyi$
      - id: generated-or-bundled-source
    downgrade:
      any:
        - type: metrics
          field: identifiers.avg_length
          min: 14.0
  - id: excessive-single-char-vars
    desc: Excessive single-character variable names (>30%)
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: identifiers.single_char_ratio
      min: 0.31
      min_size: 1024
    unless:
      - type: basename
        regex: \.d\.ts$|\.pxd$|\.pyi$
      - type: text
        substr: automatically generated
      - type: text
        substr: DO NOT MODIFY BY HAND
      - id: metadata/package/tooling::esmodule-bundled
      - id: metadata/library/runtime::next-edge-runtime-bundle
      - id: metadata/package/testing/harness::is-test
      - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
  - id: py-excessive-single-char-vars
    desc: Excessive single-character variable names (>45%)
    crit: suspicious
    conf: 0.8
    for:
      - python
    if:
      type: metrics
      field: identifiers.single_char_ratio
      min: 0.45
      min_size: 2048
    unless:
      - type: basename
        regex: \.pxd$|\.pyi$
      - type: text
        substr: automatically generated
      - type: text
        substr: DO NOT MODIFY BY HAND
      - type: text
        substr: "Time complexity:"
      - id: metadata/library/structure::js-large-module-bundle
  - id: perl-excessive-single-char-vars
    desc: High Perl single-character identifier ratio
    crit: suspicious
    conf: 0.7
    for:
      - perl
    if:
      type: metrics
      field: identifiers.single_char_ratio
      min: 0.3
      min_size: 4096
    unless:
      - type: basename
        regex: \.d\.ts$
      - type: text
        substr: automatically generated
      - type: text
        substr: DO NOT MODIFY BY HAND
  - id: numeric-suffix-identifiers
    desc: Many numeric suffix identifiers (var1,
    crit: suspicious
    conf: 0.75
    size_min: 15001
    if:
      type: metrics
      field: identifiers.numeric_suffix_count
      min: 100
      min_size: 15001
    unless:
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/scripted::pytest
      - id: metadata/package/testing/harness::is-test
      - type: text
        substr: Code generated
      - type: string_literal
        substr: __esModule
      - type: text
        substr: import numpy
  - id: sequential-identifiers
    desc: Sequential identifiers (a, b, c,
    crit: baseline
    conf: 0.8
    size_min: 1024
    size_max: 1000000
    if:
      type: metrics
      field: identifiers.sequential_names
      min: 6
    unless:
      - type: basename
        exact: CHANGES
      - type: basename
        regex: \.Rd$
      - id: benign-sequential-identifier-context
      - type: metrics
        field: text.whitespace_ratio
        min: 0.2
      - type: string_literal
        substr: pybind11
      - id: metadata/package/tooling::esmodule-bundled
  - id: py-sequential-identifiers
    desc: Excessive sequential identifiers (a, b, c, >25%)
    crit: suspicious
    conf: 0.8
    for:
      - python
    if:
      type: metrics
      field: identifiers.sequential_names
      min: 25
    unless:
      - type: basename
        regex: \.Rd$
      - type: basename
        regex: \.pyc$
      - type: basename
        regex: \.pyd$
      - type: metrics
        field: text.whitespace_ratio
        min: 0.2
      - type: string_literal
        substr: pybind11
  - id: low-identifier-reuse
    desc: Low identifier reuse (each variable
    crit: baseline
    conf: 0.7
    for: [scripts, -shell, binaries]
    size_max: 1000000
    if:
      type: metrics
      field: identifiers.reuse_ratio
      max: 0.15
      min_size: 2048
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/](test|example)
      - type: text
        substr: eval 'exec perl -wSx "$0" "$@"'
      - id: benign-low-reuse-context
      - type: basename
        regex: "^Makefile(\\..*)?$"
      - type: metrics
        field: text.whitespace_ratio
        min: 0.14
      - id: generated-or-bundled-source
      - id: metadata/library/structure::js-large-module-bundle
  - id: generated-source-marker
    desc: Generated source marker text
    crit: component
    conf: 0.95
    if:
      type: text
      regex: automatically generated|DO NOT MODIFY BY HAND|THIS IS GENERATED FILE\. DO NOT MODIFY
  - id: private-model-codegen-marker
    desc: Private model codegen marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Code generated by private/model/cli/gen-api/main.go
composite_rules:
  - id: generated-or-bundled-source
    desc: Generated or bundled source context
    crit: component
    conf: 0.95
    any:
      - id: generated-source-marker
      - id: metadata/package/tooling::esmodule-bundled
      - id: metadata/file/text::frequency-list-catalog
  - id: benign-sequential-identifier-context
    desc: Generated or test sequential names
    crit: component
    conf: 0.95
    any:
      - id: private-model-codegen-marker
      - id: metadata/package/testing/harness::is-test
      - id: generated-or-bundled-source
  - id: benign-low-reuse-context
    desc: Test or harness low reuse context
    crit: component
    conf: 0.95
    any:
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - id: metadata/package/testing/harness::is-test
      - id: metadata/library/nodeunit::nodeunit
  - id: identifier-obfuscation
    desc: Identifier obfuscation (random/encoded names)
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/source::high-entropy-identifiers
      - id: many-high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics::go-many-high-entropy-identifiers
      - id: py-many-high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics::rust-many-high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics/functions::high-entropy-function-names
      - id: low-identifier-reuse
    unless:
      - id: generated-or-bundled-source
    downgrade:
      any:
        - type: metrics
          field: identifiers.avg_length
          min: 14.0
