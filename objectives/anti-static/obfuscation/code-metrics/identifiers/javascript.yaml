defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1027
  mbc: B0032
traits:
- id: js-sphinx-searchindex
  desc: Sphinx documentation search index
  crit: notable
  conf: 0.9
  attack: ''
  mbc: ''
  if:
    type: text
    substr: Search.setIndex
- id: js-high-entropy-identifier-ratio-metric
  desc: High ratio of entropy-heavy identifiers
  crit: component
  conf: 0.84
  size_min: 8000
  size_max: 30000
  if:
    type: metrics
    field: identifiers.high_entropy_ratio
    min: 0.35
composite_rules:
- id: js-high-entropy-identifier-ratio
  desc: High ratio of entropy-heavy identifiers
  crit: suspicious
  conf: 0.84
  all:
  - id: metadata/lang/source::js-ts-source-basename
  - id: js-high-entropy-identifier-ratio-metric
  unless:
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/package/tooling::webpack-bundled
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: metadata/lang/source::c-or-template-basename
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/lang/source::js-test-or-spec-basename
