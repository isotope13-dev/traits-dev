defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1027
  mbc: B0032
traits:
- id: javascript-carrier-high-entropy-identifiers
  desc: JavaScript has highly opaque identifiers
  crit: suspicious
  conf: 0.94
  size_min: 100000
  if:
    type: metrics
    field: identifiers.high_entropy_ratio
    min: 0.5
  unless:
  - type: basename
    regex: '(?i)\.d\.ts$'
  - id: metadata/library/structure/
  - id: well-known/lib/mysql2/

- id: js-sphinx-searchindex
  desc: Sphinx documentation search index
  crit: notable
  conf: 0.9
  attack: ''
  mbc: ''
  if:
    type: text
    substr: Search.setIndex
- id: js-high-entropy-identifier-ratio-metric
  desc: High ratio of entropy-heavy identifiers
  crit: component
  conf: 0.84
  size_min: 8000
  size_max: 30000
  if:
    type: metrics
    field: identifiers.high_entropy_ratio
    min: 0.35
composite_rules:
- id: js-high-entropy-identifier-recognized-marker
  desc: High entropy identifier ratio recognized marker
  crit: component
  any:
  - id: metadata/library/structure::js-known-bundler-output
  - id: metadata/library/structure::js-amd-define
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: metadata/lang/source::c-or-template-basename
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/lang/source::js-test-or-spec-basename
  - id: metadata/lang/source::generated-do-not-edit-text
  - id: metadata/library/structure::js-tsc-reexport-getter
  - id: metadata/library/structure::js-any-bundle-output
  - id: metadata/library/structure::js-large-module-bundle
- id: js-high-entropy-identifier-ratio
  desc: High ratio of entropy-heavy identifiers
  crit: notable
  conf: 0.84
  all:
  - id: metadata/lang/source::js-ts-source-basename
  - id: js-high-entropy-identifier-ratio-metric
  unless:
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers/
