defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1027
  mbc: B0032
traits:
- id: js-sphinx-searchindex
  desc: Sphinx documentation search index
  crit: notable
  conf: 0.9
  attack: ''
  mbc: ''
  if:
    type: text
    substr: Search.setIndex
- id: imports-unique-modules-50
  desc: Many unique import modules
  crit: component
  if:
    type: metrics
    field: imports.unique_modules
    min: 50
- id: js-ts-source-basename
  desc: JavaScript or TypeScript source basename
  crit: component
  if:
    type: basename
    regex: \.([cm]?js|jsx|[cm]?ts|tsx)$
- id: c-or-template-basename
  desc: C-family or template basename
  crit: component
  if:
    type: basename
    regex: \.(h|hpp)\.in$|\.cu$
- id: js-test-or-spec-basename
  desc: JavaScript test or spec basename
  crit: component
  if:
    type: basename
    regex: '(^|[-_.])(test|tests|spec)\.[cm]?[jt]sx?$'
- id: js-high-entropy-identifier-ratio-metric
  desc: High ratio of entropy-heavy identifiers
  crit: component
  conf: 0.84
  size_min: 8000
  size_max: 30000
  if:
    type: metrics
    field: identifiers.high_entropy_ratio
    min: 0.35
composite_rules:
- id: js-high-entropy-identifier-ratio
  desc: High ratio of entropy-heavy identifiers
  crit: suspicious
  conf: 0.84
  all:
  - id: js-ts-source-basename
  - id: js-high-entropy-identifier-ratio-metric
  unless:
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/package/tooling::webpack-bundled
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: c-or-template-basename
  - id: metadata/lang/scripted::dts-declaration-file
  - id: js-test-or-spec-basename
