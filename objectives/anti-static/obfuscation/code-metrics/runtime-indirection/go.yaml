# Go Source Code Metrics for Obfuscation Detection
# Detects obfuscation patterns in Go source code via metrics analysis
defaults:
  platforms: [windows, unix]
  for: [go]
  attack: "T1027"
  mbc: "B0032"
traits:
  - id: go-many-high-entropy-identifiers
    desc: Many high-entropy Go identifiers
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: identifiers.high_entropy_ratio
      min: 0.70
      min_size: 4096
    unless:
      - id: go-high-entropy-identifiers-benign-context
  - id: go-autoconvert-helper-context
    desc: Go autoConvert helper context
    crit: component
    conf: 0.9
    if:
      type: text
      substr: autoConvert_
  - id: go-conversion-scope-context
    desc: Go conversion.Scope context
    crit: component
    conf: 0.9
    if:
      type: text
      substr: conversion.Scope
  - id: go-internal-assignment-context
    desc: Go internal package assignment context
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*[A-Za-z0-9_]+\s*=\s*internal\.'
  - id: go-stdlib-generated-z-basename
    desc: Go stdlib generated z-file basename
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: '^z(types|syscall|sysnum|errors)_'
  - id: go-status-code-const-table-context
    desc: Go status-code constant table
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*(EngineStatus|BsStatus|Status)[A-Za-z0-9]+\s+int32\s*=\s*\d+\s*//'
  - id: go-status-message-map-context
    desc: Go status-code message map
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^var\s+\w*Message\w*\s*=\s*map\[int32\]string\{'
  - id: go-environment-constant-table-context
    desc: Go environment-name constant table
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^\s*Environment[A-Za-z0-9_]{1,80}\s+Environment\s*=\s*".{1,80}"'
  - id: go-package-constant-table-context
    desc: Go package constant table
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^package\s+constants\s+const\s*\(|^package\s+constants[\s\S]{0,400}\bconst\s*\('
  - id: go-tagged-struct-field-table-context
    desc: Go tagged struct field table
    crit: component
    conf: 0.9
    count_min: 20
    if:
      type: text
      regex: '(?m)^\s*[A-Z]\w{12,}\s+\*?[\w.]+\s+`[a-z][\w:-]*:"[\w.:-]{1,32}"`'
  - id: go-demo-object-field-fixture-context
    desc: Go fixture with repeated object field literals
    crit: component
    conf: 0.9
    count_min: 20
    if:
      type: text
      regex: '(?m)^\s*[A-Z]FieldOn[A-Z]\w+Object:'
  - id: go-stringer-generated-context
    desc: Go stringer generated source
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'Code generated by "stringer'
  - id: go-oci-region-table-context
    desc: Go OCI region constant table
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^package common[\s\S]{0,500}\bRegion[A-Z][A-Za-z0-9]+\s+Region\s*='
composite_rules:
  - id: go-high-entropy-identifiers-benign-context
    desc: Benign Go high-entropy identifier context
    crit: component
    conf: 0.9
    any:
      - id: metadata/lang/source::generated-do-not-edit-text
      - id: go-autoconvert-helper-context
      - id: go-conversion-scope-context
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
      - id: go-internal-assignment-context
      - id: go-package-constant-table-context
      # Go stdlib auto-generated files: ztypes_*.go, zsyscall_*.go, zversion.go
      # have opaque system-type names that naturally score high entropy.
      - id: go-stdlib-generated-z-basename
      # Localized/generated status-code tables often contain many long,
      # semantically meaningful identifiers that look high-entropy in metrics.
      - id: go-status-code-const-table-context
      - id: go-status-message-map-context
      # Configuration packages often define long exported environment-key
      # constants. Those identifiers are descriptive, not obfuscated.
      - id: go-environment-constant-table-context
      # Protocol/data-model tables often contain many long exported field names
      # paired with compact struct tags. Those are schema identifiers, not
      # runtime indirection.
      - id: go-tagged-struct-field-table-context
      # Demo/test fixtures can contain large literal object tables with long,
      # descriptive field names. Those are static sample data, not obfuscation.
      - id: go-demo-object-field-fixture-context
      - id: go-stringer-generated-context
      - id: go-oci-region-table-context
