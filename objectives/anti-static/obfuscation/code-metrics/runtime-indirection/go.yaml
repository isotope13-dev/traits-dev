# Go Source Code Metrics for Obfuscation Detection
# Detects obfuscation patterns in Go source code via metrics analysis
defaults:
  platforms: [windows, unix]
  for: [go]
  attack: "T1027"
  mbc: "B0032"
traits:
  - id: go-many-high-entropy-identifiers
    desc: Many high-entropy Go identifiers
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: identifiers.high_entropy_ratio
      min: 0.40
      min_size: 4096
    unless:
      - id: metadata/lang/source::generated-do-not-edit-text
      - type: text
        substr: autoConvert_
      - type: text
        substr: conversion.Scope
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
      - id: well-known/lib/aws-sdk-ruby
      # Go stdlib auto-generated files: ztypes_*.go, zsyscall_*.go, zversion.go
      # have opaque system-type names that naturally score high entropy.
      - type: basename
        regex: '^z(types|syscall|sysnum|errors)_'
  - id: go-plugin-loading
    desc: Uses plugin package for dynamic
    crit: suspicious
    conf: 0.85
    if:
      type: text
      word: plugin
  # === Build Directive Abuse (Stealth/Anti-Analysis) ===
  - id: go-linkname-directive
    desc: Uses //go:linkname to access private
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "//go:linkname"
  - id: go-noescape-directive
    desc: Uses //go:noescape compiler directive
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: "//go:noescape"
  - id: go-cgo-directives
    desc: Uses cgo preprocessor directives for C interop
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: '(?m)^//\s*#cgo\b'
composite_rules: []
