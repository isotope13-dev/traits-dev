defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1027
  mbc: B0032
traits:
- id: js-arrow-function-abuse
  desc: Excessive anonymous arrow function usage
  crit: notable
  conf: 0.8
  size_max: 50000
  if:
    type: metrics
    field: functions.anonymous
    min: 100
    min_size: 2048
  unless:
  - type: string_literal
    regex: MathJax
  - type: string_literal
    regex: wgxpath
  - type: string_literal
    regex: trix
  - type: string_literal
    regex: actiontext
  - id: metadata/library/structure/
  - id: metadata/package/testing/
  - id: well-known/app/open-webui-computer/
- id: js-deep-callback-nesting
  desc: Deep callback nesting in script
  crit: notable
  conf: 0.75
  if:
    type: metrics
    field: functions.max_nesting_depth
    min: 8
  unless:
  - id: metadata/library/upload/
  - id: metadata/library/structure/
- id: js-indexof-decoder-heavy
  desc: 'Large JS with repeated indexOf decoder tables'
  crit: notable
  conf: 0.82
  size_min: 32768
  count_min: 20
  if:
    type: symbol
    exact: indexOf
  unless:
  - id: metadata/package/testing/
  - id: metadata/library/structure::js-large-module-bundle
  - type: text
    substr: fuse.js
  - type: text
    substr: lunr
- id: js-charcode-decoder-heavy
  desc: Repeated charCodeAt-to-fromCharCode transforms
  crit: notable
  conf: 0.84
  size_min: 8192
  count_min: 3
  if:
    type: text
    regex: 'String\.fromCharCode\s*\([^;\n]{0,120}\.charCodeAt\s*\('
  unless:
  - id: metadata/library/structure/
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/library/structure::js-large-minified-bundle
  - id: metadata/library/structure::js-webpack-bundle
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: metadata/library/upload/
  - id: metadata/package/testing/
- id: computed-call-property-access-ast
  desc: 'Computed property access through decoder calls'
  crit: baseline
  conf: 0.95
  attack: ''
  mbc: ''
  count_min: 3
  if:
    type: tree-sitter
    language: javascript
    query: |
      (subscript_expression
        index: (call_expression
          function: (identifier) @decoder
          arguments: (arguments (_))))
  unless:
  - id: metadata/package/testing/
composite_rules:
- id: js-obfuscator-pattern
  desc: JavaScript obfuscator tool output
  crit: suspicious
  conf: 0.9
  needs: 3
  any:
  - id: metadata/file/metrics::high-entropy-identifiers
  - id: objectives/anti-static/obfuscation/code-metrics/runtime-indirection::js-arrow-function-abuse
  - id: objectives/supply-chain/trojanized/backdoor::high-entropy-strings-dup
  - id: metadata/file/metrics::no-comments-code
  unless:
  - id: micro-behaviors/crypto/certificate/usage::pem-begin
- id: js-npm-malware-pattern
  desc: npm malware obfuscation pattern (install
  crit: suspicious
  conf: 0.9
  size_max: 50000
  all:
  - id: metadata/file/metrics::high-entropy-identifiers
  - id: metadata/file/metrics::no-comments-code
  - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
  unless:
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers::js-sphinx-searchindex
  - id: micro-behaviors/crypto/certificate/usage::pem-begin
- id: js-runtime-string-decoder-bundle
  desc: Large single-line JavaScript with runtime string decoder bundle
  crit: suspicious
  conf: 0.93
  size_min: 32768
  all:
  - id: js-indexof-decoder-heavy
  - id: js-charcode-decoder-heavy
  - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
  - id: metadata/file/metrics::high-entropy-identifiers
