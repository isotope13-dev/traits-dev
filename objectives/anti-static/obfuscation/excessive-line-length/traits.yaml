defaults:
  for: [pe]
  platforms: [windows]
composite_rules:
  - id: excessive-line-length-large-pe
    desc: Downgrade excessive line length for large PEs
    crit: notable
    conf: 0.5
    all:
      - id: objectives/anti-static/obfuscation/excessive-line-length
    downgrade:
      any:
        - id: metadata/format::massive-executable
