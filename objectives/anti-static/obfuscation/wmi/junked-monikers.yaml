defaults:
  for:
    - documents
  platforms:
    - windows
traits:
  - id: winmgmts-process-moniker-junked
    desc: Junked Win32_Process WMI moniker
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: qwuhdwqwuhdiqwuhdnmqwuhdgmts:Wqwuhdinqwuhd3qwuhd2_qwuhdProqwuhdceqwuhdsqwuhds
  - id: winmgmts-startup-moniker-junked
    desc: Junked Win32_ProcessStartup moniker
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: wiqwuhdnmqwuhdgmqwuhdtsqwuhd:Wqwuhdinqwuhd32qwuhd_PqwuhdroqwuhdceqwuhdssqwuhdStqwuhdarqwuhdtuqwuhdp
composite_rules:
  - id: wmi-process-startup-obfuscated
    desc: Obfuscated WMI process startup
    crit: suspicious
    conf: 0.98
    all:
      - id: winmgmts-startup-moniker-junked
      - id: winmgmts-process-moniker-junked
