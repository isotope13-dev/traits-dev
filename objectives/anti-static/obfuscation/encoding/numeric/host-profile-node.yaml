defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1027
  mbc: B0032

traits:
  - id: hex-charcode-userinfo-method
    desc: userInfo method concealed as hex codes
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: '[0x75,0x73,0x65,0x72,0x49,0x6e,0x66,0x6f]'

  - id: hex-charcode-hostname-method
    desc: hostname method concealed as hex codes
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: '[0x68,0x6f,0x73,0x74,0x6e,0x61,0x6d,0x65]'

  - id: hex-charcode-cwd-method
    desc: cwd method concealed as hex codes
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: '[0x63,0x77,0x64]'

composite_rules:
  - id: node-charcode-host-profile-methods
    desc: Host profile APIs concealed as character codes
    crit: suspicious
    conf: 0.99
    needs: 2
    any:
      - id: hex-charcode-userinfo-method
      - id: hex-charcode-hostname-method
      - id: hex-charcode-cwd-method
