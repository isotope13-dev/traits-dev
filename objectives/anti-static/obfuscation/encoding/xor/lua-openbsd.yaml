defaults:
  platforms: [openbsd, bsd, unix]
  for: [lua, shell]
  attack: T1027

traits:
  - id: lua-xor-decoder-function
    desc: Lua XOR decoder function
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: local function xdec

  - id: lua-load-xor-decoded
    desc: Lua loads XOR decoded code
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: load(xdec(

composite_rules:
  - id: lua-xor-decoded-loader
    desc: Lua XOR decoded loader
    crit: hostile
    conf: 0.98
    all:
      - id: lua-xor-decoder-function
      - id: lua-load-xor-decoded

