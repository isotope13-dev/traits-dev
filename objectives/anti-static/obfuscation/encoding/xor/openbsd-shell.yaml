defaults:
  platforms: [openbsd, bsd, unix]
  for: [shell]
  attack: T1027

traits:
  - id: shell-xor-byte-loop
    desc: Shell XOR byte decode loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\(\(\s*_xbn\s*\^\s*_kbn\s*\)\)'

  - id: shell-xor-encoded-curl
    desc: Shell XOR encoded curl string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '"curl" XOR'

  - id: shell-xor-encoded-fetch
    desc: Shell XOR encoded fetch string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '"fetch" XOR'

  - id: shell-xor-encoded-wget
    desc: Shell XOR encoded wget string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '"wget" XOR'

  - id: shell-eval-decoded-command
    desc: Shell evals decoded command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'eval\s+["'']\$_TOOL\s+\$_SILENT\s+\$_ARGS'

composite_rules:
  - id: shell-xor-decoded-network-eval
    desc: Shell XOR decoded network eval
    crit: hostile
    conf: 0.98
    all:
      - id: shell-xor-byte-loop
      - id: shell-eval-decoded-command
    any:
      - id: shell-xor-encoded-curl
      - id: shell-xor-encoded-fetch
      - id: shell-xor-encoded-wget
