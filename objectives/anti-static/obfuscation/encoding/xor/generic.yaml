defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: xor-key
    desc: XOR key variable reference
    crit: suspicious
    conf: 0.5
    if:
      type: text
      substr: xor_key
    unless:
    - id: well-known/tool/detection/malware-config-parser
  - id: xor-encrypt
    desc: XOR encrypt function reference
    crit: suspicious
    conf: 0.5
    if:
      type: text
      substr: xor_encrypt
  - id: python-decrypt-helper-name
    desc: Python decrypt helper function
    crit: component
    conf: 0.75
    for: [python]
    if:
      type: text
      regex: 'def\s+decrypt\w*\s*\('
composite_rules:
  - id: encode
    desc: XOR encoding patterns
    crit: suspicious
    conf: 0.66
    mbc: B0032
    attack: T1027
    any:
      - id: xor-key
      - id: xor-encrypt
      - id: objectives/anti-static/obfuscation/encoding/xor::string-decrypt
  - id: c-cyclic-string-decrypt
    desc: C cyclic XOR string decryption
    crit: suspicious
    conf: 0.92
    attack: T1027
    any:
      - id: micro-behaviors/data/encode/xor::cyclic-xor-string-decrypt
      - id: xor-key
      - id: xor-encrypt
    needs: 2
  - id: python-file-byte-inversion
    desc: Python XOR file decryptor
    crit: suspicious
    conf: 0.96
    for: [python]
    attack: T1027
    size_max: 32768
    all:
      - id: micro-behaviors/data/encode/xor::xor-byte-invert-bytes-listcomp
      - id: micro-behaviors/fs/file/open::binary-read-mode
      - id: micro-behaviors/fs/read/file::file-read-content
      - id: micro-behaviors/fs/file/open::binary-write-mode
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::sys-argv-two-positional
      - id: python-decrypt-helper-name
  - id: python-cli-file-decryptor
    desc: Tiny Python CLI decryptor
    crit: suspicious
    conf: 0.98
    for: [python]
    attack: T1027
    size_max: 4096
    all:
      - id: objectives/anti-static/obfuscation/encoding/xor::python-file-byte-inversion
      - id: micro-behaviors/os/sysinfo/platform/runtime::sys-argv-two-positional
      - id: python-decrypt-helper-name
