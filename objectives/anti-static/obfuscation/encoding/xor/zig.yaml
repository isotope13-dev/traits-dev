defaults:
  platforms: [junos, appliance, unix]
  for: [zig]
  attack: T1027
  mbc: F0008

traits:
  - id: zig-packed-byte-arrays
    desc: Zig packed byte arrays
    crit: component
    conf: 0.9
    platforms: [unix]
    count_min: 4
    if:
      type: symbol
      kind: identifier
      regex: '^PACKED_[A-Z0-9_]+$'

  - id: zig-indexed-xor-decoder
    desc: Zig indexed XOR decoder
    crit: suspicious
    conf: 0.92
    platforms: [unix]
    if:
      type: text
      regex: 'out\[i\]\s*=\s*b\s*\^\s*\(XOR_KEY\s*\+[\s\S]{0,120}i\s*%\s*256'

  - id: zig-hex-payload-constant
    desc: Zig hex payload constant
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'const ENCODED_PAYLOAD\s*=[\s\S]{0,180}[0-9a-fA-F]{48,}'

  - id: zig-runtime-hex-decode
    desc: Zig runtime hex decode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'std\.fmt\.parseUnsigned\(u8[\s\S]{0,240}<< 4\) \| lo'

  - id: zig-pid-xor-key
    desc: Zig PID-derived XOR key
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'std\.process\.getPid\(\)[\s\S]{0,220}\^= XOR_KEY_SEED'

composite_rules:
  - id: zig-runtime-xor-packed-arrays
    desc: Zig runtime XOR packed arrays
    crit: suspicious
    conf: 0.95
    platforms: [unix]
    all:
      - id: zig-packed-byte-arrays
      - id: zig-indexed-xor-decoder

  - id: zig-runtime-xor-payload-decode
    desc: Zig runtime XOR payload decode
    crit: hostile
    conf: 0.98
    all:
      - id: zig-hex-payload-constant
      - id: zig-runtime-hex-decode
      - id: zig-pid-xor-key
