defaults:
  platforms: [junos, appliance, unix]
  for: [zig]
  attack: T1027
  mbc: F0008

traits:
  - id: zig-hex-payload-constant
    desc: Zig hex payload constant
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'const ENCODED_PAYLOAD\s*=[\s\S]{0,180}[0-9a-fA-F]{48,}'

  - id: zig-runtime-hex-decode
    desc: Zig runtime hex decode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'std\.fmt\.parseUnsigned\(u8[\s\S]{0,240}<< 4\) \| lo'

  - id: zig-pid-xor-key
    desc: Zig PID-derived XOR key
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'std\.process\.getPid\(\)[\s\S]{0,220}\^= XOR_KEY_SEED'

composite_rules:
  - id: zig-runtime-xor-payload-decode
    desc: Zig runtime XOR payload decode
    crit: hostile
    conf: 0.98
    all:
      - id: zig-hex-payload-constant
      - id: zig-runtime-hex-decode
      - id: zig-pid-xor-key
