defaults:
  platforms: [windows, unix]
  for: [python, pyc]
  mbc: B0032
  attack: T1027

traits:
  - id: slash-delimited-utf8-hex
    desc: Slash-delimited UTF-8 hex payload
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)(?:f0ab[0-9a-f]{4}/){32,}
  - id: unicode-codepoint-offset-decoder
    desc: Unicode codepoint offset decoder
    crit: suspicious
    conf: 0.92
    for: [python]
    if:
      type: text
      regex: ord\([^)]{1,40}\)\s*-\s*[1-9][0-9]{4,6}
  - id: lowercase-digit-alphabet
    desc: Lowercase digit alphabet table
    crit: component
    conf: 0.85
    if:
      type: text
      exact: abcdefghijklmnopqrstuvwxyz0123456789
  - id: alphabet-index-rotation
    desc: Alphabet index rotation decoder
    crit: suspicious
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: \.index\([^)]{1,60}\)\s*\+\s*1.{0,120}\blen\(

composite_rules:
  - id: unicode-offset-alphabet-decoder
    desc: Unicode offset alphabet decoder
    crit: hostile
    conf: 0.95
    for: [python]
    all:
      - id: unicode-codepoint-offset-decoder
      - id: alphabet-index-rotation
      - id: lowercase-digit-alphabet
