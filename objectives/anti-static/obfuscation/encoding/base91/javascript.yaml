defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1027
  mbc: B0032
traits:
  - id: base91-magic-constants--rx-1
    desc: Base91 decoder constant cluster
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 0x5b.{0,200}0x1fff.{0,200}0x58
  - id: base91-magic-constants--rx-2
    desc: Base91 decoder constant cluster
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 0x58.{0,200}0x1fff.{0,200}0x5b
  - id: base91-magic-constants--rx-3
    desc: Base91 decoder constant cluster
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 0x1fff.{0,200}0x5b.{0,200}0x58
  - id: rotated-alphabet-strings
    desc: Rotated alphabet table strings
    crit: component
    conf: 0.82
    count_min: 4
    if:
      type: text
      regex: var\s+\w+\s*=\s*"[^"\\]{85,95}"
    not:
      - regex: 'var\s+\w+\s*=\s*"[A-Za-z_][A-Za-z0-9_]*(\|[A-Za-z_][A-Za-z0-9_]*){4,}"'
composite_rules:
  - id: base91-magic-constants
    desc: Base91 decoder magic constants
    crit: component
    conf: 0.86
    any:
      - id: base91-magic-constants--rx-1
      - id: base91-magic-constants--rx-2
      - id: base91-magic-constants--rx-3
  - id: rotated-base91-decoder
    desc: Rotated Base91 decoder
    crit: suspicious
    conf: 0.9
    size_max: 2000000
    near_bytes: 4096
    all:
      - id: objectives/anti-static/obfuscation/encoding/hex::hex-byte-decoder-constants
      - id: base91-magic-constants
      - id: objectives/anti-static/obfuscation/string/encoding::fromcodepoint-with-base-decode
    any:
      - id: rotated-alphabet-strings
      - id: objectives/anti-static/obfuscation/control-flow/exception::silent-catch-with-side-effect
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling/
      - id: metadata/package/tooling/
