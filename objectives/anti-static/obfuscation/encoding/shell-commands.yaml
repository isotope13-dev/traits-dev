defaults:
  attack: T1027
  for: [binaries]
  platforms: [windows, unix]
traits:
  - id: encoded-shell-pattern-url
    desc: URL encoded /bin/sh marker
    crit: component
    conf: 0.9
    if:
      type: encoded
      regex: '%2fbin%2fsh'
      case_insensitive: true
  - id: encoded-shell-pattern-base64
    desc: Base64 encoded /bin/sh marker
    crit: component
    conf: 0.9
    if:
      type: encoded
      regex: 'L2Jpbi9zaA=='
      case_insensitive: true
  - id: encoded-shell-pattern-escaped
    desc: Escaped /bin/sh string marker
    crit: component
    conf: 0.9
    if:
      type: encoded
      regex: '(\\/bin\\/sh|\\x2fbin\\x2fsh|\\u002fbin\\u002fsh)'
      case_insensitive: true
composite_rules:
  - id: encoded-shell-pattern
    desc: Encoded shell command pattern
    crit: suspicious
    conf: 0.9
    any:
      - id: encoded-shell-pattern-url
      - id: encoded-shell-pattern-base64
      - id: encoded-shell-pattern-escaped
    unless:
      - id: metadata/lang/compiler/managed::mscorlib
      - id: metadata/lang/compiler/aot::native-runtime-large-file
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/layout::many-readable-strings
