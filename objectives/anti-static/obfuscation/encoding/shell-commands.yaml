defaults:
  attack: T1027
  for: [binaries]
  platforms: [linux, macos, windows, unix]
traits:
  - id: encoded-shell-pattern
    desc: Encoded shell command pattern
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      regex: (/bin/sh|/bin/shell)
      case_insensitive: true
    unless:
      - id: metadata/lang/compiler::mscorlib
      - id: metadata/lang/compiler::native-runtime-large-file
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/format/pe::many-readable-strings
