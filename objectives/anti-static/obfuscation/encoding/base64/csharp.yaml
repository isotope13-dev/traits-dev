defaults:
  platforms: [windows]
  for: [csharp]
traits:
  - id: custom-char2sixbit-decoder
    desc: Custom Base64 char-to-sixbit decoder
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "private byte char2sixbit(char c)"
  - id: custom-getdecoded-method
    desc: Custom Base64 decode routine
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "public byte[] GetDecoded()"
  - id: dense-base64-literals
    desc: Many Base64 string decryptor calls
    crit: suspicious
    conf: 0.8
    count_min: 10
    if:
      type: text
      regex: 'decrypt\("[A-Za-z0-9+/=]{8,}"\)'
composite_rules:
  - id: custom-base64-decoder-implementation
    desc: Custom Base64 decoder implementation in C# source
    crit: suspicious
    conf: 0.97
    all:
      - id: custom-char2sixbit-decoder
      - id: custom-getdecoded-method
  - id: custom-base64-string-obfuscation
    desc: Custom Base64-backed string obfuscation in C# source
    crit: suspicious
    conf: 0.98
    all:
      - id: custom-char2sixbit-decoder
      - id: custom-getdecoded-method
      - id: dense-base64-literals
