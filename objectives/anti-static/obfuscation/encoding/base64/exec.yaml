# Base64 Decode-to-Exec Patterns
# Decoding base64 content and piping directly to shell interpreters
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  attack: T1027
  platforms: [unix, android, ios]
  for: [shell]
traits:
  - id: base64-d-pipe-sh
    desc: base64 -d piped to sh
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: 'base64\s+-d\s*\|\s*sh'
  - id: base64-d-pipe-shell
    desc: base64 -d piped to shell
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: 'base64\s+-d\s*\|\s*shell'
  - id: base64-decode-pipe-sh
    desc: base64 --decode piped to sh
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: 'base64\s+--decode\s*\|\s*sh'
  - id: base64-decode-pipe-shell
    desc: base64 --decode piped to shell
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: 'base64\s+--decode\s*\|\s*shell'
  - id: base64-capital-d-pipe-sh
    desc: base64 -D piped to sh
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: 'base64\s+-D\s*\|\s*sh\b'
  - id: base64-capital-d-pipe-shell
    desc: base64 -D piped to shell
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: 'base64\s+-D\s*\|\s*shell\b'
composite_rules:
  - id: base64-decode-exec
    desc: Base64 decode piped to shell
    crit: suspicious
    conf: 0.95
    any:
      - id: base64-d-pipe-sh
      - id: base64-d-pipe-shell
      - id: base64-decode-pipe-sh
      - id: base64-decode-pipe-shell
      - id: base64-capital-d-pipe-sh
      - id: base64-capital-d-pipe-shell
