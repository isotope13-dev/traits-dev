defaults:
  platforms: [unix, windows]
  for: [ruby]
  attack: T1027
  mbc: C0026

traits:
  - id: ruby-frags-array
    desc: Ruby FRAGS payload array
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'FRAGS\s*=\s*\[[\s\S]{0,900}"[A-Za-z0-9+/]{40,}'
  - id: ruby-unpack-m-decode
    desc: Ruby unpack m base64 decode
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.join\.unpack\(["'']m["'']\)\[0\]'

composite_rules:
  - id: ruby-fragmented-base64-payload
    desc: Ruby fragmented base64 payload
    crit: suspicious
    conf: 0.96
    all:
      - id: ruby-frags-array
      - id: ruby-unpack-m-decode
