defaults:
  attack: T1027
  mbc: C0027
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: bcdedit-base64
    desc: Base64 encoded bcdedit command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: YmNkZWRpdC
  - id: bcdedit-cmd-base64
    desc: Base64 encoded cmd.exe /c bcdedit
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: Y21kLmV4ZSAvYyBiY2RlZGl0
  - id: vssadmin-base64
    desc: Base64 encoded vssadmin command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: dnNzYWRtaW4
