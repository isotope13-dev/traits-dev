defaults:
  platforms:
    - unix
    - android
    - ios
traits:
  - id: base64-systemd-path
    desc: Encoded systemd path (base64/xor/hex)
    crit: suspicious
    conf: 0.95
    for:
      - elf
      - shell
    if:
      type: encoded
      substr: /usr/lib/systemd/systemd
    attack: T1547
  - id: base64-ssh-sftp-path
    desc: Encoded SSH SFTP path (base64/xor/hex)
    crit: suspicious
    conf: 0.95
    for:
      - elf
      - shell
    if:
      type: encoded
      substr: /usr/libexecution/openssh/sftp-server
    attack: T1021.004
  - id: base64-hikvision-firmware-path
    desc: Encoded Hikvision path (base64/xor/hex)
    crit: suspicious
    conf: 0.95
    for:
      - elf
      - shell
    if:
      type: encoded
      substr: usr/dvr_main _8182T_1108
    attack: T1046
  - id: base64-anko-dvr-path
    desc: Encoded Anko DVR path (base64/xor/hex)
    crit: suspicious
    conf: 0.95
    for:
      - elf
      - shell
    if:
      type: encoded
      substr: anko-app/ankosample _8182T_1104
    attack: T1046
  - id: base64-path-prefix
    desc: Base64-encoded system path
    crit: suspicious
    conf: 0.8
    for:
      - elf
      - shell
    size_max: 50000
    count_min: 3
    if:
      type: encoded
      encoding: base64
      regex: ^/[a-z]{2,}[a-z_/]*$
    attack: T1027.001
  - id: base64-suspicious-encoding
    desc: Suspicious base64 patterns
    crit: component
    conf: 0.5
    for:
      - elf
    count_min: 2
    if:
      type: text
      regex: ^[a-zA-Z0-9+/]{20,}={1,3}$
    not:
      - ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=
    attack: T1027.001
  - id: dense-base64-encoding
    desc: Dense base64-encoded content
    crit: notable
    conf: 0.85
    for:
      - elf
      - shell
    size_max: 200000
    count_min: 5
    per_kb_min: 0.3
    if:
      type: text
      regex: ^[a-zA-Z0-9+/]{40,}={0,2}$
    not:
      - ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=
      - RgA1ADAANwA4AEYAMwA1AC0AQwA1ADUAMQAtADEAMQBEADMALQA4ADkAQgA5AC0AMAAwADAAMABGADgAMQBGAEUAMgAyADEA
      - nuwmopywnwcjmihwauaevgkbimtnfaiuweikwggjdlupvcnvypcuymxgzsvgudarkidgrkrwvmnqqcoqsigP
      - 6879706572766563746f722e6d652e6476656465762e7275
      - bb1131f893f91f1bf5461285b26c0b622d21a37e
      - regex: ^[0-9a-f]{40,}$
      - regex: ^/
    attack: T1027.001
composite_rules:
  - id: base64-encoded-dvr-targeting
    desc: Encoded DVR targeting (base64/xor/hex)
    crit: suspicious
    conf: 0.93
    for:
      - elf
      - shell
    attack: T1046
    any:
      - id: base64-hikvision-firmware-path
      - id: base64-anko-dvr-path
  - id: base64-obfuscation-evidence
    desc: Base64 obfuscation evidence
    crit: suspicious
    conf: 0.85
    for:
      - elf
      - shell
    attack: T1027.001
    mbc: F0001
    all:
      - id: base64-path-prefix
      - id: base64-suspicious-encoding
