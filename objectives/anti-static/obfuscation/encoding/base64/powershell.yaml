defaults:
  platforms: [windows, unix]
  for: [powershell]
  attack: T1027

traits:
  - id: ps-obfuscated-payload-function
    desc: PowerShell obfuscated payload fn
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: function Invoke-ObfuscatedPayload

  - id: ps-base64-xor-layer
    desc: PowerShell Base64 XOR layer
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'ToBase64String[\s\S]{0,360}-bxor[\s\S]{0,360}FromBase64String'

  - id: ps-runtime-recovered-payload
    desc: PowerShell runtime payload recovery
    crit: suspicious
    conf: 0.91
    if:
      type: text
      substr: Obfuscation layer recovered

composite_rules:
  - id: ps-base64-xor-payload-loader
    desc: PowerShell Base64 XOR loader
    crit: hostile
    conf: 0.98
    all:
      - id: ps-obfuscated-payload-function
      - id: ps-base64-xor-layer
    any:
      - id: ps-runtime-recovered-payload
      - id: micro-behaviors/data/encode/base64::from-base64-string
