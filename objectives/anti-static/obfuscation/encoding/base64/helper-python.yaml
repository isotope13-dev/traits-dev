defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: F0001
traits:
  - id: embedded-base64-blob
    # A multi-kilobyte single base64 token is an embedded blob, not data the
    # program received at runtime. On its own it can be a legit resource (cert,
    # icon), so it is notable; the encrypted-payload composites pair it with
    # crypto-decrypt machinery to reach hostile.
    desc: Large embedded base64 payload blob
    crit: notable
    conf: 0.8
    for: [python, pyc]
    if:
      type: text
      regex: '[A-Za-z0-9+/]{2048,}={0,2}'
composite_rules:
  - id: b64decode-helper-obfuscated-dropper
    desc: Base64 decode helper with encoded C2 and execution
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/decode/base64::b64decode-wrapper-func
      - id: objectives/anti-static/obfuscation/encoding/content::encoded-http-url
    any:
      - id: micro-behaviors/process/create/subprocess::popen-content
      - id: micro-behaviors/process/create/subprocess::sys-executable-popen
    unless:
      - id: metadata/package/testing/
