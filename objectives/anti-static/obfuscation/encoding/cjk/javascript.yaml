# Binary payload encoded as CJK ideographs.
# JScript/WSH loaders smuggle a PE/.NET assembly by mapping each byte to a Han
# ideograph (`byte -> U+4E00 + byte`), then recover it on the host side with
# `[uint16][char] - 19968`. Long runs of identical U+4E00 ("一") come straight
# from the null padding pervasive in PE headers/sections — natural Chinese prose
# never repeats "一" a dozen-plus times, so the run is a binary blob, not language.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1027
  mbc: B0032
traits:
  - id: cjk-ideograph-encoded-blob
    desc: Long CJK ideograph encoded blob
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '[\x{4e00}-\x{9fff}]{32,}'
    unless:
      - id: well-known/lib/iconv-lite::iconv-lite-decoding-table-runtime
  - id: cjk-ideograph-byte-padding-run
    desc: CJK encoded binary padding
    crit: notable
    conf: 0.9
    # 16+ consecutive "一" (U+4E00). Real localized text uses varied, common
    # Hanzi; a long identical run only appears when null bytes of an embedded
    # binary are mapped onto the CJK base code point.
    if:
      type: text
      regex: '\x{4e00}{16,}'
    unless:
      - id: well-known/lib/iconv-lite::iconv-lite-decoding-table-runtime
composite_rules:
  - id: cjk-obfuscated-wsh-loader
    desc: CJK blob feeds an obfuscated WSH loader
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.007,T1564.003
    all:
      - id: cjk-ideograph-encoded-blob
      - id: micro-behaviors/data/decode/custom::js-charcode-mask-unescape-decoder
      - id: micro-behaviors/process/interpreter/jscript::createobject-call
      - id: micro-behaviors/os/env/access::wsh-environment-indexed-staging
      - id: micro-behaviors/process/create/shell/wsh::wsh-run-hidden-window-text
      - id: objectives/execution/interpreter/script/wsh::wscript-scriptfullname
  - id: cjk-encoded-payload-script-loader
    desc: CJK encoded payload loader
    crit: hostile
    conf: 0.95
    # A CJK-encoded binary blob plus any of: a window-hidden WScript Run, an
    # obfuscated ActiveX ProgID, or a modular char-code decode loop. The blob is
    # inert data on its own; pairing it with WSH execution or a deobfuscation
    # primitive is the in-memory loader (PE/.NET smuggled past static scanners).
    all:
      - id: cjk-ideograph-byte-padding-run
    any:
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-hidden-window
      - id: micro-behaviors/process/create/shell/wsh::wsh-run-hidden-window-text
      - id: objectives/execution/activex/com::activex-object-computed-progid
      - id: objectives/anti-static/obfuscation/encoding/arithmetic::js-fromcharcode-mod-256-decode
