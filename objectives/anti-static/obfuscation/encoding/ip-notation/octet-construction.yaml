# Reconstruction of IPv4 addresses from per-octet integer/hex literals
# joined at runtime — pure obfuscation pattern with no legitimate use.
# Examples:
#   ".".join(str(x) for x in [0x68, 0x15, 0x00, 0x01])  # → 104.21.0.1
#   ".".join(map(str, [104, 21, 0, 1]))
#   "%d.%d.%d.%d" % (0x68, 0x15, 0, 1)
defaults:
  platforms: [unix, windows]
  for: [python, javascript, typescript]
  attack: T1027
  mbc: B0032
traits:
  # Allow up to ~80 non-newline chars between `.join(` and the octet list,
  # including inner parens (e.g. `str(x) for x in`). Caps at one line.
- id: join-call
  desc: dot separator join call
  crit: component
  conf: 0.5
  if:
    type: text
    regex: '["'']\.["'']\.join\(|\.join\(["'']\.["'']\)'
- id: hex-octet-list
  desc: Four hex octets list
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '0x[0-9a-fA-F]{1,2},\s*0x[0-9a-fA-F]{1,2},\s*0x'
- id: int-octet-list
  desc: Four integer IPv4 octet list
  crit: component
  conf: 0.88
  # Exactly four comma-separated 1-3 digit ints in brackets — `[104, 21, 0, 1]`.
  # Requiring the closing `]` after the 4th element excludes long char-code
  # arrays like `[40,114,106,...]` (caesar droppers) that a single-octet prefix
  # match wrongly flagged as IP construction.
  if:
    type: text
    regex: '\[\s*\d{1,3}(\s*,\s*\d{1,3}){3}\s*\]'
- id: ipv4-printf-tuple-construction
  desc: IPv4 from literal octets via printf
  # Obfuscation hides a hardcoded IP by splitting it into per-octet literals.
  # `'%d.%d.%d.%d' % (a,b,c,d)` with *variables* is just normal IP formatting
  # (debugger pretty-printers, display code) — require the first octet to be a
  # numeric/hex literal so variable-based formatting no longer matches.
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '["'']%d\.%d\.%d\.%d["'']\s*%\s*\(\s*(0x[\da-fA-F]{1,2}|\d{1,3})\s*,'
- id: ipv4-fstring-bitshift-octets
  desc: IPv4 built via bit-shift f-string from int
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'f["''][^"''\n]{0,40}\{[^}\n]{1,40}>>\s*24[^}\n]{1,40}\}\.\{[^}\n]{1,40}>>\s*16'
- id: ipv4-inet-ntoa-bytes
  desc: socket.inet_ntoa call
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'socket\.inet_ntoa\s*\('
- id: ipv4-struct-pack
  desc: struct.pack with hex IP constant
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'struct\.pack\s*\([^)\n]{0,24}0x[0-9a-fA-F]{4,10}'
- id: ipv4-bytes-call
  desc: bytes array literal constructor
  crit: component
  conf: 0.9
  for: [python]
  # `bytes([...])` — list-literal constructor. Component-only, gated by the
  # `ipv4-inet-ntoa-obfuscated` composite (requires inet_ntoa nearby).
  if:
    type: text
    regex: 'bytes\s*\(\s*\['
- id: ipv4-struct-pack-dec
  desc: struct.pack with decimal IP constant
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'struct\.pack\s*\([^)\n]{0,24}[0-9]{4,10}'
- id: ipv4-ipaddress-from-int
  desc: IPv4 built via ipaddress.IPv4Address(int)
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '(ipaddress\.)?IPv4Address\s*\(\s*(0x[0-9a-fA-F]{6,8}|[0-9]{4,10})\s*\)'
- id: url-with-hex-ip
  desc: URL with hex-encoded IPv4
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'https?://0x[0-9a-fA-F]{6,8}([:/]|$)'
- id: url-with-octal-ip
  desc: URL with octal-encoded IPv4 octet
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'https?://0[0-7]{2,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}'
- id: url-with-dword-ip
  desc: URL with single-DWORD IPv4 (no dots)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: https?://(1[0-9]{8,9}|[2-9][0-9]{8,9}|[1-3][0-9]{9}|4[0-2][0-9
composite_rules:
- id: ipv4-octet-list-hex-join
  desc: IPv4 reconstruction from hex octet list
  crit: suspicious
  conf: 0.95
  all:
  - id: join-call
  - id: hex-octet-list
  near_lines: 2
  downgrade:
    any:
    - id: metadata/library/structure::js-large-module-bundle
    - id: micro-behaviors/process/create/shell/host/
  unless:
  - id: well-known/lib/json-ts/
  - id: well-known/lib/pdfjs/
  - id: metadata/library/structure/
  - id: metadata/package/quality/false-positives::benign-app-fp-context
- id: ipv4-octet-list-int-join
  desc: IPv4 reconstruction from integer octet list
  crit: suspicious
  conf: 0.88
  all:
  - id: join-call
  - id: int-octet-list
  near_lines: 2
  unless:
  - id: well-known/lib/json-ts/
  - id: well-known/lib/pdfjs/
  # ipaddr.js parses/formats addresses from integer octets by design.
  - id: well-known/lib/ipaddr/
  - id: micro-behaviors/process/create/shell/host/
  - id: metadata/library/runtime::acquire-vscode-api
  - id: metadata/library/structure/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
- id: ipv4-construction-aggregator
  desc: IPv4 address built or referenced via obfuscated form
  crit: suspicious
  conf: 0.93
  any:
  - id: ipv4-octet-list-hex-join
  - id: ipv4-octet-list-int-join
  - id: ipv4-printf-tuple-construction
  - id: ipv4-fstring-bitshift-octets
  - id: ipv4-inet-ntoa-obfuscated
  - id: ipv4-ipaddress-from-int
  - id: url-with-hex-ip
  - id: url-with-octal-ip
  - id: url-with-dword-ip
  unless:
  # A dedicated IP-address library (ipaddr.js) constructs addresses from octets
  # as its core function, not to obfuscate a C2 endpoint.
  - id: well-known/lib/ipaddr/
- id: ipv4-inet-ntoa-obfuscated
  desc: IPv4 built via socket.inet_ntoa bytes packing
  crit: suspicious
  conf: 0.95
  near_lines: 2
  all:
  - id: ipv4-inet-ntoa-bytes
  any:
  - id: ipv4-struct-pack
  - id: ipv4-bytes-call
  - id: ipv4-struct-pack-dec
  unless:
  - id: metadata/library/python-stdlib
