defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027
  mbc: B0032

traits:
  - id: pe-low-alphabet-overlay-string
    desc: PE low alphabet overlay string
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '[ADGINPX]{256,}'
      section: .reloc
  - id: tiny-dll-low-alphabet-overlay
    desc: Tiny DLL low alphabet overlay
    crit: suspicious
    conf: 0.9
    size_max: 65536
    if:
      type: trait
      id: pe-low-alphabet-overlay-string
  - id: overlay-exceeds-thirty-percent
    desc: Overlay exceeds thirty percent
    crit: suspicious
    conf: 0.9
    size_max: 65536
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.30

composite_rules:
  - id: tiny-dll-custom-encoded-payload
    desc: Tiny DLL with custom encoded payload
    crit: hostile
    conf: 0.96
    all:
      - id: tiny-dll-low-alphabet-overlay
      - id: overlay-exceeds-thirty-percent
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-string
      - id: micro-behaviors/process/create/shell/script-host::rundll32-exec
