# Obfuscated remote staging in a Node SEA payload
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027,T1105

composite_rules:
  - id: node-sea-obfuscated-remote-staging
    desc: Hides remote archive staging with decoding
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/bundle::nodejs-sea-runtime
      - id: micro-behaviors/data/encode/char-code::node-sea-xor-string-rebuilder
      - id: micro-behaviors/data/decode/base64::node-sea-base64-url-decoder
      - id: micro-behaviors/process/create/spawn::node-sea-hidden-detached-spawn
