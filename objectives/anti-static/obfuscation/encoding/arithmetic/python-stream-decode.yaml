# Python stream-decode patterns using arithmetic instead of XOR.
# Same intent as XOR (single-byte stream cipher), different operator.
# Subtraction and modular addition are the most common alternates.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: B0032
traits:
  - id: subtract-bytes-genexpr
    desc: bytes subtraction decode generator
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'bytes\(\s*\(?\s*\w+\s*-\s*[\w.\[\]()% 0-9x]{1,40}\)?\s*(?:&\s*0x[fF]{2}\s*)?for\s+\w+\s+in\s+'
  - id: add-mod-bytes-genexpr
    desc: bytes addition mod 256 decode generator
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'bytes\(\s*\(\s*\w+\s*\+\s*[\w.\[\]()% 0-9x]{1,40}\)\s*[%&]\s*(?:256|0x100|0xff|0xFF)\s+for\s+\w+\s+in\s+'
  - id: rot-n-chr-ord-decode
    desc: ROT-N char shift decode generator
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: "chr\\s*\\(\\s*\\(?\\s*ord\\s*\\(\\s*\\w+\\s*\\)\\s*[+-]\\s*[\\w.()0-9 ]{1,30}\\)?\\s*%\\s*(?:26|256|128)"
  - id: codecs-rot13-decode
    desc: codecs.decode rot_13 string deobfuscation
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'codecs\.decode\s*\([^,)\n]{1,80},\s*["'']rot[_-]?13["'']'

composite_rules:
  - id: python-stream-decode-aggregator
    desc: Python single-byte stream-decode pattern (any form)
    crit: suspicious
    conf: 0.94
    any:
      - id: subtract-bytes-genexpr
      - id: add-mod-bytes-genexpr
      - id: rot-n-chr-ord-decode
      - id: codecs-rot13-decode
      - id: micro-behaviors/data/encode/xor
