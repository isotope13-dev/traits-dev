# Python stream-decode patterns using arithmetic instead of XOR.
# Same intent as XOR (single-byte stream cipher), different operator.
# Subtraction and modular addition are the most common alternates.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: B0032
traits:
- id: subtract-bytes-genexpr
  desc: bytes subtraction decode generator
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'bytes\([^) ]{0,60}-[^) ]{0,60}\s+for\s+\w+\s+in'
- id: add-mod-bytes-genexpr--rx-2
  desc: bytes() addition genexpr over an iterable
  crit: component
  conf: 0.93
  if:
    type: text
    regex: 'bytes\(.{0,80}\+.{0,80}\bfor\s+\w+\s+in\b'
- id: add-mod-bytes-genexpr--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: text
    substr: '0x100'
  count_max: 1026457
- id: codecs-rot13-decode
  desc: codecs.decode rot_13 string deobfuscation
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'codecs\.decode\s*\([^,) ]{1,80},\s*["'']rot[_-]?13["'']'
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context
composite_rules:
- id: python-stream-decode-aggregator
  desc: Python single-byte stream-decode pattern (any form)
  crit: suspicious
  conf: 0.94
  any:
  - id: subtract-bytes-genexpr
  - id: add-mod-bytes-genexpr
  - id: codecs-rot13-decode
  - id: micro-behaviors/data/encode/xor
  unless:
  - id: micro-behaviors/crypto/library/blockchain::crypto-exchange-sdk-benign-context
- id: add-mod-bytes-genexpr
  desc: bytes addition mod 256 decode generator
  crit: notable
  conf: 0.93
  all:
  - id: add-mod-bytes-genexpr--rx-2
  - id: add-mod-constant
  near_bytes: 128
- id: add-mod-constant
  desc: modulo byte constant
  crit: component
  conf: 0.93
  any:
  - id: add-mod-bytes-genexpr--rx-3
  - id: objectives/anti-static/obfuscation/encoding/hex::hex-byte-token-ff
