defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: nested-math-pow
    desc: Detects excessive Math.pow() calls (often used in
    crit: notable
    count_min: 6
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/library/structure::js-emscripten-preamble-marker
    if:
      type: raw
      substr: Math.pow
