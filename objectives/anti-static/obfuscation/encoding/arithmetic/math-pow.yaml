defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: nested-math-pow
    desc: Detects excessive Math.pow() calls (often used in
    crit: baseline
    count_min: 6
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/library/runtime::next-edge-runtime-bundle
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
    if:
      type: raw
      substr: Math.pow
