defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-arithmetic-array-init
    desc: "Array initialization with repetitive arithmetic expressions (obfuscation)"
    crit: suspicious
    conf: 0.95
    if:
      # Migrated from a tree-sitter `number - number` query (count_min: 50) to
      # the `ast.op.sub` density metric. 50+ subtractions is the obfuscation
      # signal; the high threshold keeps it FP-safe. Counted inline in the
      # single AST walk; O(1) match.
      type: metrics
      field: 'ast.op.sub'
      min: 50
    unless:
      - id: metadata/library/structure::js-webpack-bundle
      - type: basename
        regex: '(?i)^changelog(\.[^/]+)?$'
      - type: basename
        regex: '(?i)^(changes|history|news)(\.[^/]+)?$'
  - id: js-array-transformation-loop
    desc: "Array transformation loop (arithmetic constant)"
    crit: suspicious
    conf: 0.95
    if:
      type: tree-sitter
      language: javascript
      query: |
        (for_statement
          body: (statement_block
            (expression_statement
              (assignment_expression
                left: (subscript_expression)
                right: (binary_expression
                  left: (subscript_expression)
                  operator: "-"
                  right: (number)
                )
              )
            )
          )
        ) @transform_loop
    unless:
      - id: metadata/library/structure::js-webpack-bundle
      - type: text
        regex: 'for \(j = 0; j < 2; j\+\+\) \{\s+m\[0\] = t\[0\] - 0xffed;'
