# JavaScript stream-decode patterns using arithmetic instead of XOR.
# JS analog of arithmetic/python-stream-decode.yaml.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1027
  mbc: B0032
traits:
  # `arr.map(b => (b - k) & 0xff)` or `Uint8Array.from(arr.map(b => b - k))`
- id: js-subtract-bytes-map
  desc: bytes subtraction decode via map
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: \.map\s*\(\s*\(?\s*\w+\s*\)?\s*=>\s*\(?\s*\w+\s*-\s*[\w.()]{1,30
- id: js-add-mod-bytes-map
  desc: bytes addition mod 256 decode via map
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: \.map\s*\(\s*\(?\s*\w+\s*\)?\s*=>\s*\(\s*\w+\s*\+\s*[\w.()]{1,30
- id: js-fromcharcode-mod-256-decode
  desc: ".fromCharCode modular-arithmetic byte decode"
  crit: suspicious
  conf: 0.92
  # `String.fromCharCode((arr[i] - K + 256) % 256)` — a wrap-around subtract/add
  # cipher decode. The `+ 256) % 256` guard exists only to keep a shifted byte in
  # range after subtracting a key; benign minifiers and libraries never wrap a
  # fromCharCode result this way. Anchors the decode loop of JScript droppers that
  # rebuild WScript.Shell / payload strings from numeric arrays.
  if:
    type: text
    regex: 'String\.fromCharCode\(\([^)]{1,40}[-+]\s*\d{1,3}\s*\+\s*256\)\s*%\s*256'
- id: js-rot-n-charcode--rx-4
  desc: Calls charCodeAt()
  crit: component
  conf: 0.92
  if:
    type: symbol
    kind: call
    substr: charCodeAt
  count_max: 1026467
- id: react-hydration-charcode-digit-marker
  desc: "React hydration charCodeAt digit parsing"
  crit: component
  conf: 0.86
  if:
    type: text
    regex: 'charCodeAt\(0\)\s*-\s*48'
- id: js-charcode-range-span
  desc: Character-range span between two char literals
  crit: component
  conf: 0.9
  # `"~".charCodeAt(0)-"!".charCodeAt(0)+1` computes the width of a
  # printable-character range (charset/alphabet builders, nanoid-style
  # random strings). Subtracting one char literal's code point from
  # another is a constant span, the opposite of a cipher that shifts a
  # runtime byte by a key — so it should not count as a ROT-N decode.
  if:
    type: text
    regex: 'charCodeAt\(0\)\s*-\s*["''][^"'']{1,4}["'']\.charCodeAt\(0\)'
- id: js-fullwidth-char-transform
  desc: Fullwidth Unicode char transform
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'String\.fromCharCode\(\s*65280\s*\+\s*\w+\.charCodeAt\(0\)\s*-\s*32\s*\)'
- id: js-alpha-index-bitset-shift
  desc: Lowercase alpha bit shift
  crit: component
  conf: 0.9
  ref: sha256:6f5f0528e5f3e6618a6c831de53be65f3f79290edf4d3e38433938eb118243f2
  if:
    type: text
    regex: '1\s*<<\s*\([^)]{0,40}\.charCodeAt\(0\)\s*-\s*97\)'
- id: js-alpha-index-bitset-fromcharcode
  desc: Lowercase alpha index emit
  crit: component
  conf: 0.9
  ref: sha256:6f5f0528e5f3e6618a6c831de53be65f3f79290edf4d3e38433938eb118243f2
  if:
    type: text
    regex: 'String\.fromCharCode\(\s*97\s*\+\s*\w+\s*\)'
composite_rules:
- id: js-alpha-index-bitset
  desc: Lowercase alpha index bitset
  crit: component
  conf: 0.9
  ref: sha256:6f5f0528e5f3e6618a6c831de53be65f3f79290edf4d3e38433938eb118243f2
  # UI/state packing stores lowercase letters as bit positions and emits the
  # inverse alphabet index; it is not a ROT-N decode stream.
  all:
  - id: js-alpha-index-bitset-shift
  - id: js-alpha-index-bitset-fromcharcode
  near_lines: 20
- id: js-stream-decode-aggregator
  desc: JS single-byte stream-decode pattern (any form)
  crit: suspicious
  conf: 0.94
  any:
  - id: js-subtract-bytes-map
  - id: js-add-mod-bytes-map
  - id: js-rot-n-charcode
- id: js-rot-n-charcode
  desc: ROT-N char shift decode via charCodeAt
  crit: notable
  conf: 0.92
  all:
  - id: micro-behaviors/data/encode/char-code::fromcharcode-call
  - id: micro-behaviors/data/encode/charcode::charcodeat-arithmetic
  unless:
  - id: metadata/library/runtime/
  # Generalized from three specific minified-library bundle markers (uppy,
  # google-web-runtime, tus) to the bundle umbrella — minified webpack/esbuild
  # output (incl. Chrome-extension content scripts and core-js polyfills) uses
  # charCodeAt arithmetic legitimately; avoids per-library band-aids.
  - id: metadata/library/structure/
  - id: metadata/package/files/dependency::node-modules-path
  - id: metadata/library/web-frameworks/
  - id: metadata/library/data::psql-implementation-path
  - id: react-hydration-charcode-digit-marker
  - id: js-charcode-range-span
  - id: js-fullwidth-char-transform
  - id: js-alpha-index-bitset
