# JavaScript stream-decode patterns using arithmetic instead of XOR.
# JS analog of arithmetic/python-stream-decode.yaml.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1027
  mbc: B0032
traits:
  # `arr.map(b => (b - k) & 0xff)` or `Uint8Array.from(arr.map(b => b - k))`
- id: js-subtract-bytes-map
  desc: bytes subtraction decode via map
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: \.map\s*\(\s*\(?\s*\w+\s*\)?\s*=>\s*\(?\s*\w+\s*-\s*[\w.()]{1,30
- id: js-add-mod-bytes-map
  desc: bytes addition mod 256 decode via map
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: \.map\s*\(\s*\(?\s*\w+\s*\)?\s*=>\s*\(\s*\w+\s*\+\s*[\w.()]{1,30
- id: js-rot-n-charcode--rx-3
  desc: String.fromCharCode call marker
  crit: component
  conf: 0.92
  if:
    type: symbol
    kind: call
    substr: String.fromCharCode
  count_max: 1026466
- id: js-rot-n-charcode--rx-4
  desc: charCodeAt call marker
  crit: component
  conf: 0.92
  if:
    type: symbol
    kind: call
    substr: charCodeAt
  count_max: 1026467
- id: react-hydration-charcode-digit-marker
  desc: React hydration charCodeAt digit marker parsing
  crit: component
  conf: 0.86
  if:
    type: text
    regex: 'charCodeAt\(0\)\s*-\s*48'
- id: js-charcode-range-span
  desc: Character-range span between two char literals
  crit: component
  conf: 0.9
  # `"~".charCodeAt(0)-"!".charCodeAt(0)+1` computes the width of a
  # printable-character range (charset/alphabet builders, nanoid-style
  # random strings). Subtracting one char literal's code point from
  # another is a constant span, the opposite of a cipher that shifts a
  # runtime byte by a key — so it should not count as a ROT-N decode.
  if:
    type: text
    regex: 'charCodeAt\(0\)\s*-\s*["''][^"'']{1,4}["'']\.charCodeAt\(0\)'
composite_rules:
- id: js-stream-decode-aggregator
  desc: JS single-byte stream-decode pattern (any form)
  crit: suspicious
  conf: 0.94
  any:
  - id: js-subtract-bytes-map
  - id: js-add-mod-bytes-map
  - id: js-rot-n-charcode
- id: js-rot-n-charcode
  desc: ROT-N char shift decode via charCodeAt
  crit: suspicious
  conf: 0.92
  all:
  - id: js-rot-n-charcode--rx-3
  - id: micro-behaviors/data/encode/caesar::charcodeat-shift
  unless:
  - id: metadata/library/runtime::js-base64-library
  # Generalized from three specific minified-library bundle markers (uppy,
  # google-web-runtime, tus) to the bundle umbrella — minified webpack/esbuild
  # output (incl. Chrome-extension content scripts and core-js polyfills) uses
  # charCodeAt arithmetic legitimately; avoids per-library band-aids.
  - id: metadata/library/structure::js-any-bundle-output
  - id: metadata/library/web-frameworks::wordpress-block-build-asset
  - id: react-hydration-charcode-digit-marker
  - id: js-charcode-range-span
