# JavaScript stream-decode patterns using arithmetic instead of XOR.
# JS analog of arithmetic/python-stream-decode.yaml.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1027
  mbc: B0032
traits:
  # `arr.map(b => (b - k) & 0xff)` or `Uint8Array.from(arr.map(b => b - k))`
  - id: js-subtract-bytes-map
    desc: bytes subtraction decode via map
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\.map\s*\(\s*\(?\s*\w+\s*\)?\s*=>\s*\(?\s*\w+\s*-\s*[\w.()]{1,30}\)?\s*(?:&\s*0x[fF]{2})?\s*\)'

  # `arr.map(b => (b + k) & 0xff)` addition mod 256
  - id: js-add-mod-bytes-map
    desc: bytes addition mod 256 decode via map
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\.map\s*\(\s*\(?\s*\w+\s*\)?\s*=>\s*\(\s*\w+\s*\+\s*[\w.()]{1,30}\)\s*(?:&\s*0x[fF]{2}|%\s*256)'

  # ROT-N via String.fromCharCode((c.charCodeAt(0) - 65 + N) % 26 + 65)
  - id: js-rot-n-charcode
    desc: ROT-N char shift decode via charCodeAt
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'String\.fromCharCode\s*\(\s*\(?\s*\w+\.charCodeAt\s*\(\s*\d+\s*\)\s*[+-]\s*[\w()0-9 ]{1,30}\)?\s*%\s*(?:26|256|128)'

composite_rules:
  - id: js-stream-decode-aggregator
    desc: JS single-byte stream-decode pattern (any form)
    crit: suspicious
    conf: 0.94
    any:
      - id: js-subtract-bytes-map
      - id: js-add-mod-bytes-map
      - id: js-rot-n-charcode
