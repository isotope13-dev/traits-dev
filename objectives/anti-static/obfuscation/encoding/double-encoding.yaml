defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  attack: T1027
  mbc: E1014
  for: [scripts, binaries]
traits:
  - id: rot13-decode
    desc: ROT13 string obfuscation
    crit: notable
    conf: 0.85
    size_max: 10000
    if:
      type: string_literal
      substr: rot13
  - id: codecs-rot13
    desc: codecs ROT13 decoding
    crit: suspicious
    conf: 0.85
    size_max: 10000
    if:
      type: string_literal
      regex: codecs\.decode.{0,20}rot13|rot13.{0,20}codecs
  - id: rot13-encoded-string
    desc: ROT13 encoded string literal
    crit: suspicious
    conf: 0.8
    size_max: 10000
    if:
      type: string_literal
      regex: codecs\.decode\('[^']{10,}'
  - id: base64-then-decode
    desc: Base64 then decode
    crit: suspicious
    conf: 0.84
    for:
      - python
    size_max: 15000
    if:
      type: ast
      query: "(call\n  function: (attribute\n    object: (call\n      function: (attribute\n        object: [\n          (identifier) @mod\n          (attribute\n            object: (identifier) @pkg\n            attribute: (identifier) @submod)\n        ]\n        attribute: (identifier) @decoder)\n      arguments: (argument_list\n        [\n          (string) @encoded\n          (bytes) @encoded\n        ]))\n    attribute: (identifier) @decode_method)\n  arguments: (argument_list)?\n  (#eq? @decode_method \"decode\")\n  (#any-of? @decoder \"b64decode\" \"standard_b64decode\" \"urlsafe_b64decode\")\n  (#any-of? @mod \"base64\" \"binascii\")\n  (#eq? @pkg \"base64\")\n  (#any-of? @submod \"standard_b64decode\" \"urlsafe_b64decode\"))\n"
  - id: base64-with-codecs
    desc: Base64 with codecs
    crit: suspicious
    conf: 0.85
    size_max: 15000
    if:
      type: string_literal
      regex: b64decode.{0,20}codecs|codecs.{0,20}b64decode
  - id: nested-encoding
    desc: Nested encoding call
    crit: suspicious
    conf: 0.85
    size_max: 15000
    if:
      type: string_literal
      regex: (?:de|en)code\([^)\n]{0,40}['"][^'"]{2,}['"][^)\n]{0,20}\).{0,5}(?:de|en)code\(
    unless:
      - type: text
        substr: player.ooyala.com
      - type: text
        substr: ttsurl.encode('utf-8').decode(
      - type: text
        substr: stream_data['streamUrl']
      - type: text
        substr: unicode_escape
  - id: multi-layer-string
    desc: Multi-layer string processing
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: bytes\(.{0,20}encode|str\(.{0,20}decode
  - id: encoded-path-assembly
    desc: Encoded path assembly
    crit: suspicious
    conf: 0.85
    size_max: 10000
    if:
      type: string_literal
      regex: codecs\.encode\('/|decode\('/
composite_rules:
  - id: rot13-obfuscation
    desc: ROT13 string obfuscation
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: rot13-decode
      - id: codecs-rot13
      - id: rot13-encoded-string
  - id: base64-layered-encoding
    desc: Layered base64 encoding
    crit: suspicious
    conf: 0.9
    for:
      - python
      - javascript
    needs: 2
    any:
      - id: base64-then-decode
      - id: base64-with-codecs
      - id: nested-encoding
  - id: double-obfuscation
    desc: Double encoding obfuscation
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: rot13-decode
      - id: base64-with-codecs
      - id: nested-encoding
      - id: multi-layer-string
      - id: encoded-path-assembly
  - id: advanced-string-obfuscation
    desc: Advanced string obfuscation
    crit: hostile
    conf: 0.98
    all:
      - id: rot13-obfuscation
      - id: base64-layered-encoding
