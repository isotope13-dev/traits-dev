defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: "B0032"
  attack: "T1027"
traits:
  # chr(hexdec(...)) custom hex decoder — the "hexa()" function technique
  # encodes function names as hex strings, decodes at runtime to bypass static analysis
  - id: hexdec-chr-decode
    desc: chr(hexdec(...)) custom hex decoder (obfuscation)
    crit: suspicious
    conf: 0.93
    attack: T1027.010
    if:
      type: text
      regex: chr\s*\(\s*hexdec\s*\(

  # Array of uppercase/mixed hex strings used to encode PHP function names
  # Webshells use this to hide shell_exec, file_put_contents, move_uploaded_file, etc.
  - id: hex-string-func-array
    desc: Array of hex-encoded function name literals
    crit: suspicious
    conf: 0.90
    count_min: 10
    per_kb_min: 0.7
    size_min: 1000
    size_max: 500000
    if:
      type: text
      regex: ("[0-9a-fA-F]{16,36}"|'[0-9a-fA-F]{16,36}')
    unless:
      - id: well-known/lib/phpseclib
      - id: well-known/lib/firebase-jwt

  # $func[N](...) — dynamic dispatch via integer-indexed array
  # Avoids direct function name references detectable by static analysis
  - id: integer-indexed-func-dispatch
    desc: Function dispatch via integer-indexed variable array
    crit: suspicious
    conf: 0.87
    count_min: 7
    per_kb_min: 0.4
    attack: T1027.010
    if:
      type: text
      regex: \$\w+\[\s*[0-9]+\s*\]\s*\(

composite_rules:
  - id: php-hex-funcname-obfuscation
    desc: PHP hex-encoded function name dispatch obfuscation
    crit: suspicious
    conf: 0.97
    attack: T1027.010
    all:
      - id: hexdec-chr-decode
      - id: integer-indexed-func-dispatch
    any:
      - id: hex-string-func-array
      - id: micro-behaviors/communications/http/request/
