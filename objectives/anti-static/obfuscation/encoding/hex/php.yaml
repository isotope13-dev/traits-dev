defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: "B0032"
  attack: "T1027"
traits:

  # Array of uppercase/mixed hex strings used to encode PHP function names
  # Webshells use this to hide shell_exec, file_put_contents, move_uploaded_file, etc.
  - id: hex-string-func-array
    desc: Array of hex-encoded function name literals
    crit: suspicious
    conf: 0.90
    count_min: 10
    per_kb_min: 0.7
    size_min: 1000
    size_max: 500000
    if:
      type: text
      regex: ("[0-9a-fA-F]{16,36}"|'[0-9a-fA-F]{16,36}')
    unless:
      - id: well-known/lib/phpseclib
      - id: well-known/lib/firebase-jwt
      - id: metadata/file/magic/identity::php-archive
      # Composer's autoload_files.php / autoload_static.php key file-includes by
      # md5(path) — dozens of 32-char hex literals that are file hashes, not
      # encoded function names.
      - id: metadata/package/tooling::composer-generated-autoload

  # $func[N](...) — dynamic dispatch via integer-indexed array
  # Avoids direct function name references detectable by static analysis
  - id: integer-indexed-func-dispatch
    desc: "func dispatch via integer-indexed var array"
    crit: suspicious
    conf: 0.87
    count_min: 7
    per_kb_min: 0.4
    attack: T1027.010
    if:
      type: text
      regex: \$\w+\[\s*[0-9]+\s*\]\s*\(

composite_rules:
  - id: php-hex-funcname-obfuscation
    desc: PHP hex-encoded function name dispatch obfuscation
    crit: suspicious
    conf: 0.97
    attack: T1027.010
    all:
      - id: micro-behaviors/data/decode/hex::chr-hexdec-call
      - id: integer-indexed-func-dispatch
    any:
      - id: hex-string-func-array
      - id: micro-behaviors/communications/http/request/
