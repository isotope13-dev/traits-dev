defaults:
  platforms: [windows, unix]
  mbc: B0032
  for:
  - javascript
  - typescript
traits:
- id: frequent-hex-literals
  desc: Repeated long hexadecimal literals
  crit: notable
  conf: 0.75
  attack: T1027
  count_min: 5
  per_kb_min: 0.2
  if:
    type: string_literal
    regex: 0x([0-9a-fA-F]{8,39}|[0-9a-fA-F]{41,})
  unless:
  - id: metadata/file/format/
  - id: metadata/package/testing/
  - id: metadata/library/runtime/
  - id: metadata/library/runtime/
  - type: raw
    regex: \bBLOCKED_ADDRESSES\b
  - type: raw
    regex: \bblockedAddresses\b
  - type: raw
    regex: \b(OFAC|sanctioned?|blocklist)\b
  - id: metadata/file/extension/identity::c3-source-basename
  # Single-byte hex tokens commonly appearing inside hex-byte-array
  # alphabet tables. These atoms are deliberately content-free — each is
  # too generic to mean anything on its own; their value comes from
  # appearing together in proximity (handled by the consuming composite,
  # e.g. OtterCookie's base91 alphabet table). Hosting them here instead
  # of under a family directory keeps family attribution out of generic
  # trait IDs.
- id: hex-byte-token-3f
  desc: 0x3f hex byte token
  crit: component
  conf: 0.5
  if:
    type: text
    substr: '0x3f'
- id: hex-byte-token-ff
  desc: 0xff hex byte token
  crit: component
  conf: 0.5
  if:
    type: text
    substr: '0xff'
- id: hex-byte-array-open
  desc: Hex byte array literal opening
  crit: component
  conf: 0.5
  if:
    type: text
    substr: '[0x0'
- id: hex-array-access
  desc: Hexadecimal array indexing
  crit: notable
  conf: 0.85
  attack: T1027
  count_min: 5
  per_kb_min: 0.3
  if:
    type: text
    regex: \w+\[\s*0x[0-9a-fA-F]{2,}\s*\]
  unless:
  - type: text
    substr: FuelAsm.
  # YAML/JSON dumpers index escape tables with hex code points
  # (ESCAPE_SEQUENCES[0x00] = '\\0') — not string obfuscation.
  - type: text
    substr: ESCAPE_SEQUENCES
  - id: metadata/file/extension/identity::c3-source-basename
- id: hex-string-arithmetic
  desc: Hex arithmetic in string operations
  crit: component
  conf: 0.78
  attack: T1027
  count_min: 3
  if:
      # Migrated from a tree-sitter query to a lenient `type: text`
      # match (no per-member cursor walk). Approximates the query's
      # structural intent via its distinctive token(s).
    type: text
    regex: '0x[0-9a-fA-F]+'
  unless:
  - id: metadata/library/structure/
  - type: basename
    regex: '(^|[._-])README([._-][^\\/]*)?$'
  - id: metadata/library/structure::js-emscripten-preamble-marker
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/testing/
  - id: objectives/anti-static/obfuscation/code-metrics/structure::ico-resource-basename
  - id: metadata/file/extension/identity::c3-source-basename
- id: fromcharcode-hex
  desc: Hexadecimal fromCharCode outside source maps
  crit: suspicious
  conf: 0.8
  attack: T1027
  count_min: 3
  per_kb_min: 0.2
  if:
    type: text
    regex: fromCharCode\s*\(\s*0x[0-9a-fA-F]+
  unless:
  # Source maps preserve ordinary source literals, including protocol and
  # character-code tables; they are not executable obfuscation.
  - id: metadata/file/format::sourcemap
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/package/testing/
  - id: metadata/library/runtime/
  - id: metadata/lang/source/
  - id: metadata/file/extension/identity::c3-source-basename
- id: hex-concatenation
  desc: Hexadecimal string concatenation
  crit: suspicious
  conf: 0.77
  attack: T1027
  count_min: 3
  if:
    type: text
    regex: \+\s*['"]0x[0-9a-fA-F]{4,}['"]
  downgrade:
    any:
    - id: metadata/library/structure::js-large-module-bundle
    - id: micro-behaviors/process/interpreter/vm/
  unless:
  - id: metadata/file/format/
  - id: metadata/package/testing/
  - id: well-known/lib/json-ts/
  - id: well-known/lib/pdfjs/
  - id: metadata/library/upload/
- id: mixed-hex-decimal
  desc: Mixed hexadecimal and decimal operations
  crit: component
  conf: 0.72
  attack: T1027
  count_min: 4
  unless:
  - id: metadata/package/testing/
  - id: metadata/library/structure::js-emscripten-preamble-marker
  - id: metadata/library/structure/
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/library/browser-parser::mozilla-readability-library
  - type: text
    substr: '1024 * 1024'
  - type: text
    regex: '\b(hex|decimal|octal|bin)_ip_to_normal_ip\b'
  - id: metadata/file/extension/identity::c3-source-basename
  if:
      # Migrated from a tree-sitter query to a lenient `type: text`
      # match (no per-member cursor walk). Approximates the query's
      # structural intent via its distinctive token(s).
    type: text
    regex: '0x[0-9a-fA-F]+'
- id: hex-conditionals
  desc: Large hexadecimal threshold conditionals
  crit: notable
  conf: 0.82
  attack: T1027
  count_min: 5
  per_kb_min: 1.0
  if:
    type: text
    regex: 'if\s*\([^)]{0,120}0x[0-9a-fA-F]{6,}[^)]{0,120}\)'
  unless:
  - type: text
    regex: \w+\[[^\]]+\]\s*&\s*0x[0-9a-fA-F]{1,2}
  - type: text
    regex: '\(\s*\w+\s*&\s*0xc0\s*\)\s*!==\s*0x80'
  - id: metadata/library/data::psql-implementation-path
  - id: metadata/file/extension/identity::c3-source-basename
- id: js-sniff-attachment-mime-marker
  desc: JavaScript attachment MIME sniffing marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: "sniffAttachmentMime"
composite_rules:
- id: advanced-hex-obfuscation
  desc: Advanced hexadecimal obfuscation pattern
  crit: suspicious
  conf: 0.92
  attack: T1027
  needs: 2
  any:
  - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
  - id: frequent-hex-literals
  - id: hex-array-access
  - id: fromcharcode-hex
  all:
  - id: hex-concatenation
- id: hex-string-decoding
  desc: Hexadecimal string decoding routine
  crit: hostile
  conf: 0.95
  attack: T1027.002
  all:
  - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
  - id: fromcharcode-hex
  any:
  - id: hex-array-access
  - id: micro-behaviors/data/decode/hex::buffer-from-hex-string
- id: hex-control-flow-obfuscation
  desc: Hexadecimal control flow obfuscation
  crit: suspicious
  conf: 0.87
  attack: T1027
  all:
  - id: hex-conditionals
  any:
  - id: mixed-hex-decimal
  - id: hex-string-arithmetic
  - id: frequent-hex-literals
  unless:
  - id: metadata/library/data/
  - id: metadata/library/structure/
  - id: metadata/package/files/dependency::node-modules-path
  - id: js-sniff-attachment-mime-marker
  - id: metadata/lang/source/
- id: hex-byte-decoder-constants
  desc: Hex byte decoder constants
  crit: notable
  conf: 0.86
  attack: T1027
  near_bytes: 4096
  all:
  - id: metadata/lang/scripted::undefined-literal
  - id: metadata/lang/scripted::length-prop
  - id: hex-byte-token-3f
  - id: hex-byte-token-ff
  - id: hex-byte-array-open
