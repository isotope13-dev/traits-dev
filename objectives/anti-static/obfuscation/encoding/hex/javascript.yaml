defaults:
  platforms: [windows, unix]
  mbc: B0032
  for:
    - javascript
    - typescript
traits:
  - id: frequent-hex-literals
    desc: Frequent hexadecimal string literals
    crit: notable
    conf: 0.75
    attack: T1027
    count_min: 5
    per_kb_min: 0.2
    if:
      type: string_literal
      regex: 0x[0-9a-fA-F]{4,}
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: hex-array-access
    desc: Hexadecimal array indexing
    crit: suspicious
    conf: 0.85
    attack: T1027
    count_min: 5
    per_kb_min: 0.3
    if:
      type: text
      regex: \w+\[\s*0x[0-9a-fA-F]{2,}\s*\]
    unless:
      - type: text
        substr: FuelAsm.
  - id: hex-string-arithmetic
    desc: Hex arithmetic in string operations
    crit: notable
    conf: 0.78
    attack: T1027
    count_min: 3
    if:
      type: text
      regex: 0x[0-9a-fA-F]+\s*[-+*]\s*\w
  - id: fromcharcode-hex
    desc: Hexadecimal codes in fromCharCode
    crit: notable
    conf: 0.8
    attack: T1027
    count_min: 3
    per_kb_min: 0.2
    if:
      type: text
      regex: fromCharCode\s*\(\s*0x[0-9a-fA-F]+
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: buffer-hex-encoding
    desc: Buffer-based hex encoding
    crit: notable
    conf: 0.8
    attack: T1027
    count_min: 2
    if:
      type: text
      regex: Buffer\.from\s*\(\s*['"][0-9a-fA-F]+['"]\s*,\s*['"]hex['"]
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
  - id: hex-concatenation
    desc: Hexadecimal string concatenation
    crit: notable
    conf: 0.77
    attack: T1027
    count_min: 3
    if:
      type: text
      regex: \+\s*0x[0-9a-fA-F]{4,}
  - id: mixed-hex-decimal
    desc: Mixed hexadecimal and decimal operations
    crit: notable
    conf: 0.72
    attack: T1027
    count_min: 4
    if:
      type: text
      regex: \d+\s*[\+\-\*\/]\s*0x[0-9a-fA-F]+
  - id: hex-conditionals
    desc: Hexadecimal values in conditionals
    crit: notable
    conf: 0.82
    attack: T1027
    count_min: 5
    per_kb_min: 1.0
    if:
      type: text
      regex: if\s*\([^)]{0,120}0x[0-9a-fA-F]+[^)]{0,120}\)
    unless:
      - type: text
        regex: \w+\[[^\]]+\]\s*&\s*0x[0-9a-fA-F]{1,2}
  - id: hex-pair-regex-decode
    desc: Hex-pair regex decode function (/../g + parseInt/fromCharCode)
    crit: suspicious
    conf: 0.92
    attack: T1027.002
    if:
      type: text
      regex: 'replace\(\/\.\.\/'
composite_rules:
  - id: advanced-hex-obfuscation
    desc: Advanced hexadecimal obfuscation pattern
    crit: suspicious
    conf: 0.92
    attack: T1027
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/string/encoding::js-dense-hex-escapes
      - id: frequent-hex-literals
      - id: hex-array-access
      - id: fromcharcode-hex
    all:
      - id: hex-concatenation
  - id: hex-string-decoding
    desc: Hexadecimal string decoding routine
    crit: hostile
    conf: 0.95
    attack: T1027.002
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::js-dense-hex-escapes
      - id: fromcharcode-hex
    any:
      - id: hex-array-access
      - id: buffer-hex-encoding
  - id: hex-control-flow-obfuscation
    desc: Hexadecimal control flow obfuscation
    crit: suspicious
    conf: 0.87
    attack: T1027
    all:
      - id: hex-conditionals
    any:
      - id: mixed-hex-decimal
      - id: hex-string-arithmetic
      - id: frequent-hex-literals
