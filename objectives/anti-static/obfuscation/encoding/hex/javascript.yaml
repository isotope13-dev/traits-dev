defaults:
  platforms: [windows, unix]
  mbc: B0032
  for:
    - javascript
    - typescript
traits:
  - id: frequent-hex-literals
    desc: Frequent hexadecimal string literals
    crit: notable
    conf: 0.75
    attack: T1027
    count_min: 5
    per_kb_min: 0.2
    if:
      type: string_literal
      regex: 0x([0-9a-fA-F]{4,39}|[0-9a-fA-F]{41,})
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/runtime::js-base64-library
      - id: metadata/library/runtime::js-base64-library
      - type: raw
        regex: \b(BLOCKED_ADDRESSES|blockedAddresses)\b
      - type: raw
        regex: \b(OFAC|sanctioned?|blocklist)\b
  # Single-byte hex tokens commonly appearing inside hex-byte-array
  # alphabet tables. These atoms are deliberately content-free — each is
  # too generic to mean anything on its own; their value comes from
  # appearing together in proximity (handled by the consuming composite,
  # e.g. OtterCookie's base91 alphabet table). Hosting them here instead
  # of under a family directory keeps family attribution out of generic
  # trait IDs.
  - id: hex-byte-token-3f
    desc: 0x3f hex byte token
    crit: component
    conf: 0.5
    if:
      type: text
      substr: '0x3f'
  - id: hex-byte-token-ff
    desc: 0xff hex byte token
    crit: component
    conf: 0.5
    if:
      type: text
      substr: '0xff'
  - id: hex-byte-array-open
    desc: Hex byte array literal opening
    crit: component
    conf: 0.5
    if:
      type: text
      substr: '[0x0'
  - id: hex-array-access
    desc: Hexadecimal array indexing
    crit: notable
    conf: 0.85
    attack: T1027
    count_min: 5
    per_kb_min: 0.3
    if:
      type: text
      regex: \w+\[\s*0x[0-9a-fA-F]{2,}\s*\]
    unless:
      - type: text
        substr: FuelAsm.
  - id: hex-string-arithmetic
    desc: Hex arithmetic in string operations
    crit: component
    conf: 0.78
    attack: T1027
    count_min: 3
    if:
      type: tree-sitter
      language: javascript
      query: |
        (binary_expression
          left: (number) @left
          operator: ["-" "+" "*"]
          right: [
            (identifier)
            (member_expression)
            (call_expression)
            (subscript_expression)
          ]
        ) @expr
        (#match? @left "^0x[0-9a-fA-F]+$")
    unless:
      - id: metadata/library/structure::js-emscripten-generated-bundle
      - type: basename
        regex: '(^|[._-])README([._-][^\\/]*)?$'
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/testing/harness/runtime::is-test
      - id: objectives/anti-static/obfuscation/code-metrics/structure::ico-resource-basename
  - id: fromcharcode-hex
    desc: Hexadecimal codes in fromCharCode
    crit: suspicious
    conf: 0.8
    attack: T1027
    count_min: 3
    per_kb_min: 0.2
    if:
      type: text
      regex: fromCharCode\s*\(\s*0x[0-9a-fA-F]+
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/runtime::js-base64-library
  - id: buffer-hex-encoding
    desc: Buffer-based hex encoding
    crit: notable
    conf: 0.8
    attack: T1027
    count_min: 2
    if:
      type: text
      regex: Buffer\.from\s*\(\s*['"][0-9a-fA-F]+['"]\s*,\s*['"]hex['"]
    unless:
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
  - id: hex-concatenation
    desc: Hexadecimal string concatenation
    crit: suspicious
    conf: 0.77
    attack: T1027
    count_min: 3
    if:
      type: text
      regex: \+\s*0x[0-9a-fA-F]{4,}
    downgrade:
      any:
        - id: metadata/library/structure::js-large-module-bundle
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: well-known/lib/json-ts::converter-bundle
      - id: well-known/lib/pdfjs::pdfjs-bundle
      - id: metadata/library/runtime::tus-js-client-bundle
  - id: mixed-hex-decimal
    desc: Mixed hexadecimal and decimal operations
    crit: notable
    conf: 0.72
    attack: T1027
    count_min: 4
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-emscripten-preamble-marker
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-known-bundler-output
      - type: basename
        regex: '\.(R|Rd)$'
      - type: text
        substr: '1024 * 1024'
    if:
      type: tree-sitter
      language: javascript
      query: |
        (binary_expression
          left: (number) @left
          operator: ["+" "-" "*" "/"]
          right: (number) @right
        ) @expr
        (#match? @left "^[0-9]+$")
        (#match? @right "^0x[0-9a-fA-F]+$")
  - id: hex-conditionals
    desc: Hexadecimal values in conditionals
    crit: suspicious
    conf: 0.82
    attack: T1027
    count_min: 5
    per_kb_min: 1.0
    if:
      type: text
      regex: if\s*\([^)]{0,120}0x[0-9a-fA-F]+[^)]{0,120}\)
    unless:
      - type: text
        regex: \w+\[[^\]]+\]\s*&\s*0x[0-9a-fA-F]{1,2}
  - id: hex-pair-regex-decode
    desc: Hex-pair regex decode function (/../g + parseInt/fromCharCode)
    crit: suspicious
    conf: 0.92
    attack: T1027.002
    if:
      type: text
      regex: 'replace\(\/\.\.\/'
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
composite_rules:
  - id: advanced-hex-obfuscation
    desc: Advanced hexadecimal obfuscation pattern
    crit: suspicious
    conf: 0.92
    attack: T1027
    needs: 2
    any:
      - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
      - id: frequent-hex-literals
      - id: hex-array-access
      - id: fromcharcode-hex
    all:
      - id: hex-concatenation
  - id: hex-string-decoding
    desc: Hexadecimal string decoding routine
    crit: hostile
    conf: 0.95
    attack: T1027.002
    all:
      - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
      - id: fromcharcode-hex
    any:
      - id: hex-array-access
      - id: buffer-hex-encoding
  - id: hex-control-flow-obfuscation
    desc: Hexadecimal control flow obfuscation
    crit: suspicious
    conf: 0.87
    attack: T1027
    all:
      - id: hex-conditionals
    any:
      - id: mixed-hex-decimal
      - id: hex-string-arithmetic
      - id: frequent-hex-literals
  - id: hex-byte-decoder-constants
    desc: Hex byte decoder constants
    crit: component
    conf: 0.86
    attack: T1027
    near_bytes: 4096
    all:
      - id: metadata/lang/scripted::undefined-literal
      - id: metadata/lang/scripted::length-prop
      - id: hex-byte-token-3f
      - id: hex-byte-token-ff
      - id: hex-byte-array-open
