defaults:
  platforms: [zos]
  for: [jcl]
  attack: T1027

traits:
  - id: jcl-hexdeck-dataset
    desc: JCL references hex payload deck
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bDSN=[A-Z0-9.$#@_]+\((HEX[A-Z0-9#$@_]*)\)'

  - id: jcl-runtime-hex-decode-note
    desc: JCL notes runtime hex decode
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)hex-encoded[\s\S]{0,160}decoded at run-?time'

composite_rules:
  - id: jcl-runtime-hex-payload-deck
    desc: JCL runtime hex payload deck
    crit: suspicious
    conf: 0.94
    all:
      - id: jcl-hexdeck-dataset
      - id: jcl-runtime-hex-decode-note
