defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: B0032
traits:
- id: itertools-cycle-xor--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: itertools.cycle
- id: itertools-cycle-xor--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: operator.xor
composite_rules:
- id: xor-base64-exec-loader
  desc: XOR + base64 decode + exec payload loader
  crit: hostile
  conf: 0.95
  all:
  - id: itertools-cycle-xor
  - id: micro-behaviors/process/interpreter/python::exec-builtin
  - id: micro-behaviors/data/decode/base64::b64decode-call
- id: itertools-cycle-xor
  desc: itertools.cycle XOR decode pattern
  crit: suspicious
  conf: 0.9
  any:
  - id: itertools-cycle-xor--rx-1
  - id: itertools-cycle-xor--rx-2
  needs: 1
  unless:
  - id: metadata/package/testing/presence::python-test-file
  - id: metadata/package/testing/presence::test-directory
  - type: text
    regex: itertools\.cycle\([^)]*(COLOR|color|marker|style|linestyle)
  - type: text
    substr: IFYOUWANTTHEARTISTSTOGETPAIDDONOTDOWNLOADFROMMIXCLOUD
