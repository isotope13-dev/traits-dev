defaults:
  platforms: [unix, windows]
  for: [php]
  crit: suspicious
  conf: 0.9
  attack: T1027
  mbc: B0032

traits:
  - id: uuid-literal
    desc: UUID literal present in PHP source
    crit: component
    conf: 0.95
    if:
      type: string_literal
      regex: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"

  - id: uuid-xor-array-index
    desc: UUID XOR decryption with modulo array index
    conf: 0.88
    if:
      type: text
      regex: "\\$\\w+\\[\\$\\w+\\s*%\\s*strlen"

  - id: array-map-xor-decrypt
    desc: Array-based XOR decryption using array_map
    conf: 0.85
    size_max: 500000
    if:
      type: text
      regex: "array_map\\s*\\(.{0,60}(chr|\\^|ord)"
    unless:
      - type: text
        regex: "array_map\\s*\\(\\s*['\"]ord['\"]\\s*,\\s*str_split\\s*\\("
      - type: text
        regex: "array_map\\s*\\(.{0,60}\\[\\^"

  - id: packed-hex-xor-key
    desc: pack(H*) hex-encoded XOR key for decryption
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "pack\\s*\\(\\s*['\"]H\\*['\"]"
    unless:
      - type: text
        regex: "unpack\\s*\\(\\s*['\"]H\\*['\"].{0,80}pack\\s*\\(\\s*['\"]v\\*?['\"]"

  - id: dynamic-function-chr-arith
    desc: Dynamic function name via chr() arithmetic
    conf: 0.85
    if:
      type: text
      regex: "chr\\s*\\(\\s*\\d+\\s*[+\\-*]"
    count_min: 3
    per_kb_min: 0.5

  - id: chr-concat-function-name
    desc: Function name built via chr() concatenation pattern
    conf: 0.88
    if:
      type: text
      regex: "chr\\s*\\(\\s*\\d+\\s*\\)\\s*\\.\\s*chr"
    count_min: 6
    per_kb_min: 0.3

  - id: base64-encode-call
    desc: base64_encode function call for encoding payloads
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: "base64_encode\\s*\\("

  - id: serialize-call
    desc: serialize/unserialize for object serialization
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: "(un)?serialize\\s*\\("

  - id: dynamic-function-call
    desc: Dynamic function call via variable function name
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "\\$\\w+\\s*\\(\\s*\\\\?\\$\\w+"
    count_min: 2
    per_kb_min: 0.5
    unless:
      - type: text
        regex: "(\\\\Closure|callable)\\s+\\$\\w+"
      - type: text
        regex: "\\$decoder\\s*=\\s*function\\s*\\("
      - type: text
        regex: "\\$encoder\\s*=\\s*function\\s*\\("
      - type: text
        regex: "\\$decoder\\s*=\\s*['\"](rawurldecode|urldecode)['\"]"
      - type: text
        regex: "\\$encoder\\s*=\\s*['\"](rawurlencode|urlencode)['\"]"

composite_rules:
  - id: uuid-xor-key
    desc: UUID constant used as XOR decryption key
    crit: suspicious
    conf: 0.95
    all:
      - id: uuid-literal
    any:
      - id: uuid-xor-array-index
      - id: array-map-xor-decrypt
      - id: packed-hex-xor-key
      - id: dynamic-function-chr-arith
      - id: chr-concat-function-name
      - id: dynamic-function-call
