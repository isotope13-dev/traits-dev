# Base64 Encoded Shell Pipe
# Detects base64 decode piped to shell interpreter
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
traits:
  - id: encoded-shell-pipe
    desc: Base64 encoded shell pipe
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027
    if:
      type: string_value
      regex: "base64 (-d|-D) \\| shell"
