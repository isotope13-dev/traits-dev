defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1027,T1027.009,T1059.006"
  mbc: "B0032,B0009"

composite_rules:
  - id: pyinstaller-obfuscated-runtime-source
    desc: PyInstaller XOR-decoded runtime source execution
    crit: hostile
    conf: 0.99
    scope: outer
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-extraction
      - id: micro-behaviors/data/decode/xor::python-xor-string-decoder-bytecode
      - id: metadata/binary/layout::overlay-over-90pct
