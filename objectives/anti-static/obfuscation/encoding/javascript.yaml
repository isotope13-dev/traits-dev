defaults:
  platforms: [windows, unix]
traits:
  # Detects loops that rebuild strings via dictionary/array lookup with concatenation
  # Malware pattern: for(i=0;i<keys.length;i++){result += dict[keys[i]]}
- id: js-dict-lookup-loop--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  for: [javascript, typescript]
  size_max: 50000
  not:
  - substr: "Object.keys(t[s])"
  - substr: "+=this.buildAttrPairStr("
  if:
    type: text
    substr: for\s*\([^)]{0,120}\)\s*(?:\{[^}]{0,250}\w+\s*\+=\s*\w+\s*\[\s*\
- id: js-meredith-base64-decoder
  desc: Meredith-token base64 decoder
  crit: suspicious
  conf: 0.96
  for: [javascript]
  size_max: 50000
  attack: T1027
  mbc: B0032
  if:
    type: text
    regex: 'String\.prototype\.\w+=function\(\)\{.{0,80}replace\(/meredith/g'
composite_rules:
- id: js-dict-lookup-loop
  desc: Loop rebuilds string from token lookup
  crit: suspicious
  conf: 0.75
  for: [javascript, typescript]
  size_max: 50000
  any:
  - id: js-dict-lookup-loop--rx-1
  needs: 1
  not:
  - substr: "Object.keys(t[s])"
  - substr: "+=this.buildAttrPairStr("
