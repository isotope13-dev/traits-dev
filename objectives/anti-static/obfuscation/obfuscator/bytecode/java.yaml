defaults:
  platforms: [windows, unix]
  for: [java, class]
traits:
  - id: caesium
    desc: Obfuscated by Caesium
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: 'Obfuscated-By: Caesium'
  - id: caesium-component
    desc: Caesium obfuscation component naming pattern
    crit: suspicious
    conf: 0.9
    if:
      type: path
      basename: true
      regex: caesium_\d+\.class
  - id: caesium-debug
    desc: "Caesium obfuscator DEBUG build in manifest"
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: 'Obfuscated-By: Caesium DEBUG'
  - id: caesium-sourcefile
    desc: "Caesium obfuscator SourceFile attribute in"
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: "\0\nSourceFile..\0\acaesium"
  - id: caesium-il-methods
    desc: Obfuscated I/l method names from Caesium
    crit: suspicious
    conf: 0.85
    for:
      - class
      - jar
    count_min: 10
    if:
      type: text
      regex: 'I[Il]{5,}l|l[Il]{5,}I'
  - id: complexer-marker
    desc: Obfuscated by Complexer
    crit: suspicious
    conf: 0.95
    for: [class, jar]
    if:
      type: text
      substr: obfuscated with complexer
  - id: stringer
    desc: Obfuscated by Stringer
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: Stringer
  - id: stringer-licelus
    desc: Obfuscated by Stringer (Licel US)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: Licel US
  - id: java-asm-classwriter-source
    desc: Java ASM ClassWriter source
    crit: notable
    conf: 0.88
    for: [java]
    if:
      type: symbol
      kind: call
      exact: ClassWriter
  - id: java-asm-method-instruction-source
    desc: Java ASM method instruction source
    crit: component
    conf: 0.86
    for: [java]
    count_min: 4
    if:
      type: symbol
      kind: call
      regex: '^visit(MethodInsn|FieldInsn|TypeInsn|LdcInsn)$'
  - id: java-asm-processbuilder-payload-string
    desc: Java ASM ProcessBuilder payload string
    crit: notable
    conf: 0.9
    for: [java]
    if:
      type: literal
      exact: java.lang.ProcessBuilder
  - id: java-asm-byte-array-output-source
    desc: Java ASM byte array output source
    crit: component
    conf: 0.84
    for: [java]
    if:
      type: symbol
      kind: call
      exact: toByteArray

composite_rules:
  - id: java-asm-command-payload-generator
    desc: Java ASM command payload generator
    crit: suspicious
    conf: 0.94
    for: [java]
    all:
      - id: java-asm-classwriter-source
      - id: java-asm-method-instruction-source
      - id: java-asm-processbuilder-payload-string
    any:
      - id: java-asm-byte-array-output-source
