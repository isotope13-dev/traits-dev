defaults:
  attack: T1027
  platforms:
    - windows
  for:
    - pe
    - dll
    - csharp
traits:
  - id: smartassembly-banner
    desc: SmartAssembly banner string
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: '#Powered by SmartAssembly'
  - id: smartassembly-namespace
    desc: SmartAssembly namespace reference
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: SmartAssembly.Attributes
  - id: smartassembly-poweredby
    desc: SmartAssembly PoweredBy attribute
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: PoweredByAttribute
  - id: protector-198-v4-marker
    desc: 198 Protector V4 marker
    crit: notable
    conf: 0.98
    if:
      type: text
      exact: 198 Protector V4
  - id: reactor-wide-guid-private-impl-pattern
    desc: Reactor wide GUID metadata pattern
    crit: notable
    conf: 0.86
    if:
      type: hex
      section: .text
      pattern: "33 7B 00 [9] 00 2D 00 [9] 00 2D 00 [9] 00 2D 00 [9] 00 7D 00"
  - id: reactor-module-guid
    desc: Reactor Module GUID marker
    crit: notable
    conf: 0.88
    if:
      type: hex
      section: .text
      pattern: "3C 4D 6F 64 75 6C 65 3E 7B [8] 2D [4] 2D [4] 2D [4] 2D [12] 7D"
  - id: csharp-junk-generation-task
    desc: C# junk generation task
    crit: suspicious
    conf: 0.9
    for: [csharp]
    if:
      type: text
      word: JunkCodeGenerationTask
  - id: csharp-symbol-renaming-task
    desc: C# symbol renaming task
    crit: suspicious
    conf: 0.9
    for: [csharp]
    if:
      type: text
      word: SymbolRenamingTask
  - id: csharp-cecil-obfuscation-marker
    desc: C# Cecil obfuscation marker
    crit: suspicious
    conf: 0.88
    for: [csharp]
    if:
      type: text
      regex: 'ObfuscationContext\s*\(\s*assembly'
composite_rules:
  - id: smartassembly
    desc: Obfuscated with SmartAssembly
    crit: notable
    conf: 0.98
    needs: 2
    any:
      - id: smartassembly-banner
      - id: smartassembly-namespace
      - id: smartassembly-poweredby
    unless:
      - id: metadata/signed/developer::progress-software-corporation
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/resource::pe-resource-version-first
  - id: dotnet-198-protector
    desc: Obfuscated with 198 Protector V4
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: protector-198-v4-marker
    unless:
      - id: metadata/signed/platform/
  - id: dotnet-reactor-obfuscator
    desc: Obfuscated with .NET Reactor
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: reactor-wide-guid-private-impl-pattern
      - id: reactor-module-guid
  - id: csharp-managed-obfuscator-pipeline
    desc: C# managed obfuscator pipeline
    crit: hostile
    conf: 0.96
    for: [csharp]
    all:
      - id: csharp-junk-generation-task
      - id: csharp-symbol-renaming-task
      - id: csharp-cecil-obfuscation-marker
