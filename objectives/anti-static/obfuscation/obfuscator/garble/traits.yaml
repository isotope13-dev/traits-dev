defaults:
  platforms: [windows, unix]
  for: [binaries]
  attack: T1027
traits:
  - id: garble-random-packages
    desc: Garble randomized packages (digit variant)
    crit: suspicious
    conf: 0.95
    count_min: 40
    if:
      type: text
      regex: ^\w*[0-9]\w*\.\(\*\w*[0-9]\w*\)\.\w+$
    not:
      - substr: "uuFleF_K1.(*x048plwcNGd)"
    unless:
      - type: text
        substr: unixAhomChamKawiLisuMiaoModiNewa
  - id: garble-random-packages-no-digit
    desc: Garble randomized packages (non-digit variant)
    crit: suspicious
    conf: 0.9
    count_min: 40
    if:
      type: text
      regex: ^[A-Z][a-zA-Z0-9]{10,24}\.\(\*[A-Z][a-zA-Z0-9]{10,24}\)\.[A-Z][a-zA-Z0-9]{5,15}$
composite_rules:
  - id: garble-obfuscated-go
    desc: Garble obfuscated Go binary
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang/compiler/systems::go-binary
    any:
      - id: garble-random-packages
      - id: garble-random-packages-no-digit
