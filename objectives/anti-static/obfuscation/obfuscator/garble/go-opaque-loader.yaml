# Hostile composites for Go PE loaders that disguise their build identity.
#
# Mass-produced commodity Go droppers (Amadey-Go / Kryptik / Deyma builds
# observed since late 2024) share an identifiable shape:
#   - buildinfo.path / .module.path is a single random alphanumeric token,
#     not a real Go import path
#   - signed by a freshly issued TLS server certificate (no codeSigning EKU)
#     attempting to launder reputation
#   - payload lives in an oversized .rdata, decrypted at runtime, with Win32
#     APIs resolved dynamically via syscall.LazyProc / SyscallN
#
# None of these signals alone justify hostile, but the combinations below
# don't have legitimate occurrences in our benign corpus.
defaults:
  platforms: [windows]
  for: [pe]
  size_min: 65536
  attack: T1027
composite_rules:
  - id: go-pe-loader-abused-tls-cert
    desc: Go PE signed by abused TLS server certificate
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang/compiler/systems::go-buildinfo
      - id: metadata/signed/certificate/identity::pe-signature-verified-kv
      - id: metadata/signed/certificate/identity::pe-cert-leaf-no-code-signing-eku-kv
      - id: metadata/signed/certificate/identity::pe-cert-leaf-domain-subject
  - id: go-pe-opaque-identity-loader
    desc: Go PE with opaque build identity and dynamic API dispatch
    crit: hostile
    conf: 0.92
    all:
      - id: metadata/lang/compiler/systems::go-buildinfo
      - id: metadata/lang/go-build::go-trimpath
      - id: micro-behaviors/os/api-resolution/manual::syscall-syscalln
    any:
      - id: metadata/lang/compiler/systems::go-opaque-module-path
      - id: metadata/lang/compiler/systems::go-opaque-build-path
  - id: go-pe-opaque-rdata-loader
    desc: Go PE loader with opaque identity and oversized rdata payload
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang/compiler/systems::go-buildinfo
      - id: objectives/anti-static/obfuscation/payload/section::oversized-rdata-section
    any:
      - id: metadata/lang/compiler/systems::go-opaque-module-path
      - id: metadata/lang/compiler/systems::go-opaque-build-path
