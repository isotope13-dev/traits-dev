defaults:
  platforms: [windows]
  for: [batch]
traits:
- id: abobus-obfuscator-marker
  desc: Abobus batch obfuscator marker
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: ABOBUS-OBFUSCATOR
- id: abobus-escalag-author
  desc: Abobus EscaLag author marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: __author__=EscaLag
- id: abobus-github-marker
  desc: Abobus GitHub marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: github.com/EscaLag/Abobus-obfuscator
- id: batch-chcp-remap-obfuscator
  desc: Batch CHCP remap obfuscator
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(?i)\bchcp\s+708\b'
- id: batch-manezao-remap-table
  desc: Batch manezao remap table
  crit: component
  conf: 0.94
  if:
    type: text
    substr: 'set "@manezao@='
- id: batch-jasa-remap-table
  desc: Batch jasa remap table
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'set "@jasa@='
composite_rules:
- id: abobus-batch-obfuscator
  desc: Abobus batch obfuscator output
  crit: suspicious
  conf: 0.99
  all:
  - id: abobus-obfuscator-marker
  any:
  - id: abobus-escalag-author
  - id: abobus-github-marker
- id: batch-codepage-remap-obfuscator
  desc: Batch codepage remap obfuscator
  crit: suspicious
  conf: 0.98
  all:
  - id: batch-chcp-remap-obfuscator
  - id: batch-manezao-remap-table
  - id: batch-jasa-remap-table
