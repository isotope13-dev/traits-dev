defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: header-padding
    desc: RTF excessive header padding.
    crit: suspicious
    conf: 0.9
    mbc: "B0032.001"
    if:
      type: raw
      # Match {\rtf followed by at least 500 whitespace/tab characters
      regex: "\\{\\\\rtf[\\s]{500,}"
