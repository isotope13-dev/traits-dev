defaults:
  for: [text, shell, ruby, python, javascript, php, powershell, vbs, applescript]
traits:
  - id: nested-objdata-in-data
    desc: Nested \objdata tag inside hex stream.
    crit: suspicious
    conf: 0.9
    mbc: "B0032.001"
    if:
      type: raw
      regex: '(?i)[0-9a-fA-F]\s*\{\\\*\\objdata\s+'
