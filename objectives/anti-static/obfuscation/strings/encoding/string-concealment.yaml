# String Concealment Detection
# Detects binaries with suspiciously low string counts
# Malware obfuscates strings at compile time to hide behavior
# ATT&CK: T1027.010 (Obfuscated Files or Information: Command Obfuscation)
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  attack: "T1027.010"
  mbc: "F0001.005"
  for: [elf, macho, pe]
traits:
  # === Tiny cstring section ===
  - id: tiny-cstring-section
    desc: "Suspiciously small string section (<100"
    crit: suspicious
    conf: 0.9
    if:
      type: section_ratio
      section: "(__TEXT\\.__cstring|^\\.rodata\\.|^\\.rdata)"
      compare_to: "total"
      max: 0.002 # Less than 0.2% of binary is strings
    unless:
      - id: metadata/format/tiny-elf # Don't flag tiny binaries
        # Resource-only PEs (.mui, etc.) have strings in .rsrc, not .rdata
      - type: metrics
        field: binary.import_density
        max: 0
        # Delphi/Borland compilers store strings in .text, not .rdata
        # A binary with many strings is not concealing them
      - type: metrics
        field: binary.string_count
        min: 200
  - id: minimal-strings
    desc: "Binary has very few readable"
    crit: notable
    conf: 0.7
    size_min: 51200
    if:
      type: string_value_count
      max: 20
      min_length: 4
    unless:
      - id: metadata/format
      - id: metadata/hardening
      - id: metadata/signed/platform::apple
      - type: raw
        substr: "BSJB"
    downgrade:
      any:
        - type: section
          regex: "^(UPX|upx)"
        - type: raw
          substr: "PECompac"
          # String-sparse DLL: DLL with code but almost no readable strings
          # Indicates string obfuscation (XOR, stack strings, encrypted)
  - id: string-sparse-dll
    desc: "DLL with code but minimal strings"
    crit: notable
    conf: 0.75
    for: [pe, dll]
    if:
      type: string_value_count
      max: 15
      min_length: 4
    unless:
      - id: metadata/format/pe::resource-only-dll
composite_rules:
  # String concealment pattern
  - id: string-concealment-comp
    desc: "String obfuscation via runtime decryption"
    crit: suspicious
    conf: 0.9
    all:
      - id: tiny-cstring-section
    any:
      - id: micro-behaviors/process/create/shell
      - id: micro-behaviors/communications/socket/create
      - id: micro-behaviors/fs/file/operations::binary-file-ops
