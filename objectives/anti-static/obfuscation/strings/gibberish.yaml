# Obfuscation: Gibberish Strings
# Detects machine-generated strings using consonant-vowel patterns common in malware DGAs or obfuscators.
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: consonant-vowel-gibberish
    desc: Consonant-vowel sequence (machine-generated)
    crit: notable
    conf: 0.8
    for: [shell, python, javascript, powershell, pe, elf]
    count_min: 2
    if:
      type: string_value
      # Pattern: [consonant][vowel] repeated 5+ times.
      # Matches "lelidugagumizufafa", "gehexigerekalahiwivixifegimoxiji", "noyefigagiguwa"
      # Shortened regex to avoid length warnings. [b-df-hj-np-tv-z] covers all consonants.
      # count_min: 2 avoids FP on legitimate compound words like "lifetimemanager"
      regex: '(?i)\b[b-df-hj-np-tv-z]?([b-df-hj-np-tv-z][aeiou]){7,}[b-df-hj-np-tv-z]?\b'
    not:
      - regex: '[A-Z]'
      - substr: "InUseBefore"
      - substr: "InUseAfter"
      - substr: "Validate"
      - substr: "Enumerator"
      - substr: "Metadata"
      - substr: "MetaFile"
      - substr: "Remove"
      - substr: "Manager"
      - substr: "Parameter"
      - regex: "(?i)catalog"
      - regex: "(?i)isolatin"
