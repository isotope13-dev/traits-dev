# String Obfuscation Detection - Batch
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027, T1059.003
defaults:
  platforms: [windows, linux, unix, macos, android, ios]
  for: [batch, shell]
  mbc: "B0032"
  attack: "T1027"
traits:
  # set%VAR% trick (obfuscated set command)
  - id: batch-obfuscated-set
    desc: Obfuscated set command (set%VAR%)
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '(?i)set%[^% \t\n]{1,80}%'
  # %VAR%set trick (obfuscated command start)
  - id: batch-obfuscated-command-start
    desc: Obfuscated command start (%VAR%cmd)
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: '(?i)%[^% \t\n]{1,80}%set\s+'
  # Fragmented command reconstruction (multiple sets of 1-4 chars)
  - id: batch-command-reconstruction
    desc: Fragmented command reconstruction
    crit: suspicious
    conf: 0.85
    for: [batch]
    count_min: 5
    if:
      type: raw
      regex: '(?i)set\s+[^=]{1,120}=[^ \t\n\r]{1,4}([\t\r\n ]|$)'
  # Base64-like payload in set command
  - id: batch-base64-payload
    desc: Large Base64-like payload in set command
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: 'set\s+[^=]{1,120}=[A-Za-z0-9+/]{100,}'
  # Fragmented command via undefined env vars
  # Pattern: %VAR%s%VAR%e%VAR%t or %VAR%c%VAR%m%VAR%d
  # When vars are undefined, they resolve to empty: %abc%s%def%et → "set"
  - id: batch-fragmented-command-undefined-vars
    desc: Command fragmented via undefined env vars
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      # Matches %VAR%<1-2 chars>%VAR% repeated pattern
      regex: '(%[a-zA-Z][a-zA-Z0-9_]{0,30}%[a-z]{1,2}){2,}'
  # Excessive undefined variable references (noise generation)
  - id: batch-excessive-undefined-vars
    desc: Excessive undefined variable references
    crit: suspicious
    conf: 0.85
    count_min: 10
    if:
      type: raw
      # Long random-looking variable names used as noise
      regex: '%[a-zA-Z][a-zA-Z0-9]{5,30}%'
  # REM comment noise (random words as padding)
  - id: batch-rem-noise-padding
    desc: REM comments with random word padding
    crit: notable
    conf: 0.7
    count_min: 2
    if:
      type: raw
      regex: '(?im)^REM\s+[a-z]+(\s+[a-z]+){4,}\s*$'
composite_rules:
  - id: batch-heavy-obfuscation
    desc: Heavy batch script obfuscation
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: batch-obfuscated-set
      - id: batch-obfuscated-command-start
      - id: batch-command-reconstruction
      - id: batch-base64-payload
      - id: batch-fragmented-command-undefined-vars
      - id: batch-excessive-undefined-vars
