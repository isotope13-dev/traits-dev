# Marker-Based String Junking Obfuscation
# Detection of strings broken up by insertion of junk markers
# Example: "expiraas21tion" where "as21" is a junk marker
defaults:
  platforms: [windows, linux, macos, unix, android, ios]
  for: [pe, dll, csharp]
  crit: suspicious
  conf: 0.85
traits:
  - id: as21-marker
    desc: String junking with as21 marker
    conf: 0.9
    count_min: 5
    if:
      type: string
      regex: '\w{3,}as21\w{3,}'
  - id: underscore-digit-marker
    desc: String junking with underscore-digit markers
    conf: 0.8
    count_min: 5
    if:
      type: string
      regex: '^[a-z]{3,}_[0-9]+_[a-z]{3,}$'
      not:
        - regex: '__\d+_\d+_'
        - regex: '^(get_|set_)'
        - regex: '^VK_[A-Z0-9_]+$'
        - substr: "XMM_"
        - substr: "YMM_"
        - substr: "ZMM_"
    downgrade:
      any:
        - id: metadata/format/pe::dotnet-metadata
        - id: metadata/library/python-runtime::python-runtime
composite_rules:
  - id: string-junking-detected
    desc: String junking obfuscation detected
    crit: suspicious
    conf: 0.9
    any:
      - id: as21-marker
      - id: underscore-digit-marker
