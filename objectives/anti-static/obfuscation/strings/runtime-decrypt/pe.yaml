# Runtime API String Decryption (PE)
# Detects DLL name strings present as wide strings without standard dynamic loading imports,
# indicating runtime decryption and manual API resolution
# ATT&CK: T1027.007 (Dynamic API Resolution)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1027.007"
  mbc: "B0032.014"
traits:
  - id: ntdll-wide-string
    desc: "ntdll.dll as wide string (runtime resolver)"
    crit: component
    if:
      type: string
      exact: "ntdll.dll"
  - id: dll-names-no-loadlibrary
    desc: "DLL name strings without LoadLibrary import"
    crit: component
    conf: 0.8
    if:
      type: import_combination
      max_total: 50
    unless:
      - id: metadata/format/pe::resource-only-dll
      - id: metadata/format/pe::dotnet-assembly
      - id: metadata/format/pe::dotnet-metadata
      - id: metadata/format/pe::dotnet-runtime
      - id: metadata/format/document/help2::help2-container
      - type: symbol
        substr: "LoadLibrary"
      - type: symbol
        substr: "GetProcAddress"
composite_rules:
  - id: runtime-api-decryption
    desc: "Runtime API string decryption (DLL names without loader imports)"
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: ntdll-wide-string
      - id: micro-behaviors/os/api-resolution/manual::kernel32-resolver
    all:
      - id: dll-names-no-loadlibrary
    none:
      - id: metadata/sign/certificate::bitdefender-brand-text
      - id: metadata/format/pe::resource-only-dll
