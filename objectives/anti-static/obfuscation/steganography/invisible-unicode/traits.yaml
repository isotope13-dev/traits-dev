defaults:
  for: [scripts, source]
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: multiple
    desc: Multiple invisible Unicode characters in source
    crit: suspicious
    conf: 0.95
    attack: T1027
    if:
      type: metrics
      field: text.invisible_chars
      min: 60
    unless:
      - id: metadata/package/testing::is-test
      - type: basename
        regex: ([\\/]tests?[\\/])|_tests?\.|(\.(map|d\.ts)$)
      - type: raw
        regex: assert_width!\(|nonASCIIidentifier|emojisList
      - type: raw
        regex: Unicode and the Unicode Logo are registered trademarks
      - type: raw
        regex: Code generated.*DO NOT EDIT|DO NOT MODIFY BY HAND
