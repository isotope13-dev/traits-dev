defaults:
  for: [scripts, source]
  attack: T1027
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: high-non-ascii-ratio
    desc: High non-ASCII ratio in source
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: text.non_ascii_ratio
      min: 0.15
  - id: spec-test-filename
    desc: Spec or test filename markers
    crit: component
    conf: 0.85
    if:
      type: basename
      regex: _spec\.|\.spec\.|\.test\.
  - id: tests-path-filename
    desc: Tests path or filename markers
    crit: component
    conf: 0.85
    if:
      type: basename
      regex: ([\\/])tests?[\\/]|_tests?\.
  - id: generated-artifact-filename
    desc: Generated artifact filename suffix
    crit: component
    conf: 0.85
    if:
      type: basename
      regex: \.(map|d\.ts)$
  - id: width-assert-or-emoji-list-text
    desc: Width assert or emoji list text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: assert_width!\(|nonASCIIidentifier|emojisList
  - id: unicode-trademark-text
    desc: Unicode trademark notice text
    crit: component
    conf: 0.85
    if:
      type: text
      substr: Unicode and the Unicode Logo are registered trademarks
  - id: generated-do-not-edit-text
    desc: Generated code warning text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: Code generated.{0,50}DO NOT EDIT|DO NOT MODIFY BY HAND
  - id: autogenerated-lockfile-text
    desc: Autogenerated lockfile banner
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "# THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY."
  - id: node-emoji-package-text
    desc: Node emoji package data
    crit: component
    conf: 0.85
    if:
      type: text
      substr: '"node-emoji":"^1.6.1"'
  - id: yarn-registry-text
    desc: Yarn registry or docs text
    crit: component
    conf: 0.9
    if:
      type: text
      regex: registry\.yarnpkg\.com|yarnpkg\.com/en/docs/cli
  - id: naughty-strings-sample-text
    desc: Naughty strings sample text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: big-list-of-naughty-strings|sampler\(:naughty
  - id: emoji-library-table-text
    desc: Embedded emoji or codec table text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: emojiByName|Emoji\.emojify|Turns out that on Windows dimmed gray
  - id: few
    desc: Few invisible Unicode characters in source
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: text.invisible_chars
      min: 1
      max: 59
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: high-non-ascii-ratio
  - id: multiple
    desc: Multiple invisible Unicode characters in source
    crit: notable
    conf: 0.95
    if:
      type: metrics
      field: text.invisible_chars
      min: 60
    unless:
      - id: test-file-context
      - id: benign-invisible-unicode-text-context
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: high-non-ascii-ratio
composite_rules:
  - id: test-file-context
    desc: Test or generated file context
    crit: component
    conf: 0.85
    any:
      - id: metadata/package/testing/harness::is-test
      - id: spec-test-filename
      - id: tests-path-filename
      - id: generated-artifact-filename
  - id: benign-invisible-unicode-text-context
    desc: Benign invisible Unicode source text
    crit: component
    conf: 0.85
    any:
      - id: width-assert-or-emoji-list-text
      - id: unicode-trademark-text
      - id: generated-do-not-edit-text
      - id: autogenerated-lockfile-text
      - id: naughty-strings-sample-text
      - id: emoji-library-table-text
      - id: node-emoji-package-text
      - id: yarn-registry-text
      - id: micro-behaviors/communications/http/upload::yarn-standalone-bundle
