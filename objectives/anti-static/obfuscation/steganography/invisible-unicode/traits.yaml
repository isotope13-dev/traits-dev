defaults:
  for: [scripts, source]
  attack: T1027
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: few
    desc: Few invisible Unicode characters in source
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: text.invisible_chars
      min: 1
      max: 59
  - id: multiple
    desc: Multiple invisible Unicode characters in source
    crit: suspicious
    conf: 0.95
    if:
      type: metrics
      field: text.invisible_chars
      min: 60
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: basename
        regex: _spec\.|\.spec\.|\.test\.
      - type: basename
        regex: ([\\/]tests?[\\/])|_tests?\.|(\.(map|d\.ts)$)
      - type: raw
        regex: assert_width!\(|nonASCIIidentifier|emojisList
      - type: raw
        regex: Unicode and the Unicode Logo are registered trademarks
      - type: raw
        regex: Code generated.*DO NOT EDIT|DO NOT MODIFY BY HAND
