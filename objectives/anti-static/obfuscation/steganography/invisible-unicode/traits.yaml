# Override: require at least 20 invisible chars for suspicious
# A single invisible char from a UTF-8 BOM is normal, not steganography.
# Variation Selector-16 (U+FE0F) in emoji (e.g. ℹ️ 🖱️) adds up to ~4-6 per file with emoji logging.
# ZWJ (U+200D) in emoji family sequences (👨‍👩‍👦) contributes 2-3 per emoji × N sequences.
# A file with 8 family emojis in test/log data reaches ~15 ZWJ chars without any steganography.
# Require 20+ to distinguish real steganographic ZWS/ZWJ embedding from normal emoji usage.
defaults:
  for: [scripts, source]
  platforms: [linux, macos, windows]

traits:
  - id: multiple
    desc: Multiple invisible Unicode characters in source
    crit: suspicious
    conf: 0.95
    attack: "T1027"
    if:
      type: metrics
      field: "text.invisible_chars"
      min: 20
