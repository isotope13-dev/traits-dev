defaults:
  for: [scripts, source]
  attack: T1027
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: high-non-ascii-ratio
    desc: High non-ASCII ratio in source
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: text.non_ascii_ratio
      min: 0.15
  - id: spec-test-filename
    desc: Spec or test filename markers
    crit: component
    conf: 0.85
    if:
      type: basename
      regex: _spec\.|\.spec\.|\.test\.
  - id: tests-path-filename
    desc: Tests path or filename markers
    crit: component
    conf: 0.85
    if:
      type: basename
      regex: ([\\/])tests?[\\/]|_tests?\.
  - id: generated-artifact-filename
    desc: Generated artifact filename suffix
    crit: component
    conf: 0.85
    if:
      type: basename
      regex: \.(map|d\.ts)$
  - id: width-assert-or-emoji-list-text
    desc: Width assert or emoji list text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: assert_width!\(|nonASCIIidentifier|emojisList
  - id: terminal-invisible-color-text
    desc: Terminal invisible color handling text
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Turns out that on Windows dimmed gray text becomes invisible
  - id: unicode-trademark-text
    desc: Unicode trademark notice text
    crit: component
    conf: 0.85
    if:
      type: text
      substr: Unicode and the Unicode Logo are registered trademarks
  - id: generated-do-not-edit-text
    desc: Generated code warning text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: Code generated.{0,50}DO NOT EDIT|DO NOT MODIFY BY HAND
  - id: autogenerated-lockfile-text
    desc: Autogenerated lockfile banner
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "# THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY."
  - id: node-emoji-package-text
    desc: Node emoji package data
    crit: component
    conf: 0.85
    if:
      type: text
      substr: '"node-emoji":"^1.6.1"'
  - id: yarn-registry-text
    desc: Yarn registry or docs text
    crit: component
    conf: 0.9
    if:
      type: text
      regex: registry\.yarnpkg\.com|yarnpkg\.com/en/docs/cli
  - id: yarn-standalone-doc-text
    desc: Yarn standalone bundle docs text
    crit: component
    conf: 0.95
    if:
      type: text
      regex: yarnpkg\.com/en/docs/cli/|nightly\.yarnpkg\.com/latest\.js
  - id: hyper-yarn-standalone-text-fragment
    desc: Hyper yarn standalone text fragment
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /opt/Hyper/resources/bin/yarn-standalone.js
  - id: yarn-standalone-bundle-filename
    desc: Yarn standalone bundle filename
    crit: component
    conf: 0.9
    if:
      type: basename
      exact: yarn-standalone.js
  - id: naughty-strings-sample-text
    desc: Naughty strings sample text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: big-list-of-naughty-strings|sampler\(:naughty
  - id: emoji-library-table-text
    desc: Embedded emoji or codec table text
    crit: component
    conf: 0.85
    if:
      type: text
      regex: emojiByName|Emoji\.emojify|Turns out that on Windows dimmed gray
  - id: webpack-bootstrap-text
    desc: Webpack bootstrap bundle text
    crit: component
    conf: 0.9
    if:
      type: text
      substr: // webpackBootstrap
  - id: few
    desc: Few invisible Unicode characters in source
    crit: baseline
    conf: 0.8
    if:
      type: metrics
      field: text.invisible_chars
      min: 1
      max: 59
    unless:
      - id: test-file-context
      - id: benign-invisible-unicode-text-context
      - id: bundle-or-minified-context
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: high-non-ascii-ratio
  - id: multiple
    desc: Multiple invisible Unicode characters in source
    crit: notable
    conf: 0.95
    size_min: 262144
    if:
      type: metrics
      field: text.invisible_chars
      min: 256
    unless:
      - type: basename
        substr: yarn-standalone.js
      - type: text
        substr: Hyper/resources/bin/yarn-standalone.js
      - type: text
        regex: yarnpkg\.com/en/docs/cli/|nightly\.yarnpkg\.com/latest\.js
      - id: hyper-yarn-standalone-path-text
      - id: test-file-context
      - id: benign-invisible-unicode-text-context
      - id: bundle-or-minified-context
composite_rules:
  - id: hyper-yarn-standalone-path-text
    desc: Hyper yarn standalone path text
    crit: component
    conf: 0.9
    any:
      - id: hyper-yarn-standalone-text-fragment
      - id: micro-behaviors/communications/http/upload::yarn-standalone-filename
  - id: test-file-context
    desc: Test or generated file context
    crit: component
    conf: 0.85
    any:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/harness::go-test
      - id: spec-test-filename
      - id: tests-path-filename
      - id: generated-artifact-filename
  - id: benign-invisible-unicode-text-context
    desc: Benign invisible Unicode source text
    crit: component
    conf: 0.85
    any:
      - id: terminal-invisible-color-text
      - id: width-assert-or-emoji-list-text
      - id: unicode-trademark-text
      - id: generated-do-not-edit-text
      - id: autogenerated-lockfile-text
      - id: naughty-strings-sample-text
      - id: emoji-library-table-text
      - id: node-emoji-package-text
      - id: yarn-registry-text
      - id: yarn-standalone-doc-text
      - id: yarn-standalone-bundle-filename
      - id: hyper-yarn-standalone-path-text
      - id: micro-behaviors/communications/http/upload::yarn-standalone-filename
      - id: micro-behaviors/communications/http/upload::yarn-standalone-bundle
  - id: bundle-or-minified-context
    desc: Bundle or minified source context
    crit: component
    conf: 0.85
    any:
      - id: webpack-bootstrap-text
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: high-non-ascii-ratio
