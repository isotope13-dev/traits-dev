defaults:
  for: [scripts, source]
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: multiple
    desc: Multiple invisible Unicode characters in source
    crit: suspicious
    conf: 0.95
    attack: T1027
    if:
      type: metrics
      field: text.invisible_chars
      min: 20
    unless:
      - id: metadata/dev/testing::is-test
      - type: basename
        regex: (^|[\\/])tests?([\\/]|$)|_tests?\.
      - type: basename
        regex: \.(map|d\.ts)$
      - type: basename
        regex: (^|[\\/])(emoji-test|NormalizationTest)\.txt$
      - type: raw
        substr: assert_width!(
      - type: raw
        regex: Emoji Keyboard/Display Test Data for UTS #51|Unicode and the Unicode Logo are registered trademarks
