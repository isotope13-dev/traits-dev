defaults:
  for: [javascript, typescript, python, rust, go]
  platforms: [linux, macos, windows]
  attack: T1027
  mbc: B0032
  crit: component
  conf: 0.85

composite_rules:
  - id: hyper-yarn-standalone-path-text
    desc: Hyper yarn standalone path text
    any:
      - id: metadata/file/invisible-unicode::hyper-yarn-standalone-text-fragment
      - id: metadata/file/invisible-unicode::yarn-standalone-doc-text
  - id: benign-invisible-unicode-text-context
    desc: Benign invisible Unicode text context
    any:
      - id: metadata/file/invisible-unicode::hyper-yarn-standalone-text-fragment
      - id: metadata/file/invisible-unicode::benign-invisible-unicode-text-context
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/file/catalog/identity::uproc-tools-catalog
  - id: bundle-or-minified-context
    desc: Bundle or minified text context
    any:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/file/invisible-unicode::bundle-or-minified-context
      - id: metadata/package/tooling::webpack-bundled
