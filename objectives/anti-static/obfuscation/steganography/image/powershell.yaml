defaults:
  platforms: [windows]
  for: [data]
  attack: T1027.003
  mbc: B0032.001

traits:
  - id: powershell-getpixel-lsb-nibble
    desc: PowerShell pixel low-nibble extraction
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)g`?e`?t`?p`?i`?x`?e`?l.{0,220}-\s*band\s*15'
  - id: powershell-bytearray-pixel-buffer
    desc: PowerShell large pixel byte buffer
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)By.{0,24}te\[\].{0,80}2[0-9]{5}'
  - id: powershell-pixel-loop-bounds
    desc: PowerShell fixed pixel extraction loops
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '0\.\.4[0-9]{2}.{0,80}0\.\.4[0-9]{2}'
  - id: powershell-system-drawing-addtype
    desc: PowerShell System.Drawing load
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)Add-Type.{0,120}AssemblyName'

composite_rules:
  - id: powershell-image-lsb-payload-extraction
    desc: PowerShell image LSB payload extraction
    crit: hostile
    conf: 0.98
    all:
      - id: powershell-getpixel-lsb-nibble
      - id: powershell-pixel-loop-bounds
    any:
      - id: powershell-bytearray-pixel-buffer
      - id: powershell-system-drawing-addtype
      - id: micro-behaviors/communications/http/client/managed::webclient-openread-data
      - id: micro-behaviors/communications/http/client/managed::webrequest-create-data
