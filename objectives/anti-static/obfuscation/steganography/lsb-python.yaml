defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  crit: suspicious
  conf: 0.9
  mbc: B0032.001
  attack: T1027.003
traits:
  - id: lsb-reveal
    desc: LSB steganography payload extraction
    if:
      type: symbol
      substr: lsb.reveal
  - id: lsb-hide
    desc: LSB steganography payload embedding
    if:
      type: symbol
      substr: lsb.hide
  - id: stegano-import
    desc: stegano steganography library
    crit: notable
    if:
      type: symbol
      exact: stegano
  - id: judyb-import
    desc: judyb steganography library
    crit: notable
    if:
      type: symbol
      exact: judyb
  - id: pixel-lsb-extract
    desc: Manual LSB pixel bit extraction
    conf: 0.85
    if:
      type: string_value
      exact: "08b"
composite_rules:
  - id: stego-extract-exec
    desc: Steganography extraction followed by exec
    crit: hostile
    conf: 0.95
    all:
      - id: lsb-reveal
      - id: micro-behaviors/process/interpreter/python::exec-builtin
