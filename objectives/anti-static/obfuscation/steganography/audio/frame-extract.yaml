# Audio Steganography Payload Extraction
# Detects WAV file opened and frames read, combined with XOR decode
# and execution — a technique for hiding payloads in audio data.
# MBC: B0032.001 (Obfuscated Files: Steganography)
# ATT&CK: T1027.003 (Steganography)
defaults:
  platforms: [windows, unix]
  for: [python]
  mbc: "B0032.001"
  attack: "T1027.003"
traits:
  - id: audio-frame-b64decode
    desc: Audio frames decoded as base64 data
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'b64decode[\s\S]{0,60}readframes'
composite_rules:
  - id: audio-stego-data-extraction
    desc: Audio frames treated as encoded data carrier
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/data/embedded/payload/carrier::wave-open
      - id: audio-frame-b64decode
  - id: audio-stego-xor-exec
    desc: Audio steganography payload with XOR decode and execution
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/embedded/payload/carrier::wave-open
      - id: micro-behaviors/data/encode/xor::xor-decoding-loop
    any:
      - id: micro-behaviors/process/create/subprocess::popen-content
      - id: micro-behaviors/process/create/subprocess::sys-executable-popen
      - id: micro-behaviors/process/interpreter/python::exec-builtin
    unless:
      - id: metadata/package/testing/
