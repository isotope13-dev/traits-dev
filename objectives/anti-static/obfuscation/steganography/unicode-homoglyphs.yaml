defaults:
  platforms: [windows, unix]
traits:
  - id: homoglyphs
    desc: "Mathematical homoglyphs used for obfuscation"
    crit: notable
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    for: [python, javascript, typescript, go, rust]
    count_min: 5
    if:
      type: text
      regex: "[\\U0001D400-\\U0001D7FF]"
    unless:
      - type: text
        regex: generated by "scripts/unicode\.py"|Autogenerated\. .*sub-table
