defaults:
  platforms: [windows, unix]
  for: [png]
  mbc: B0032.001
  attack: T1027.003
traits:
  - id: high-pixel-entropy
    desc: Image pixel entropy in steganographic range
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: image.pixel_entropy
      min: 7.5
  - id: high-histogram-flatness
    desc: Image histogram near-uniform distribution
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: image.histogram_flatness
      min: 0.93
  - id: low-edge-density
    desc: Image lacks visual structure
    crit: component
    conf: 0.65
    size_min: 8192
    if:
      type: metrics
      field: image.edge_density
      max: 0.02
  - id: png-high-compression-ratio
    desc: PNG pixel data resists compression
    crit: notable
    conf: 0.7
    size_min: 4096
    if:
      type: metrics
      field: png.compression_ratio
      min: 0.85
  - id: r-channel-high
    desc: Red channel entropy above normal
    crit: component
    conf: 0.6
    if:
      type: metrics
      field: image.r_entropy
      min: 7.0
  - id: g-channel-high
    desc: Green channel entropy above normal
    crit: component
    conf: 0.6
    if:
      type: metrics
      field: image.g_entropy
      min: 7.0
  - id: b-channel-high
    desc: Blue channel entropy above normal
    crit: component
    conf: 0.6
    if:
      type: metrics
      field: image.b_entropy
      min: 7.0
  - id: jpeg-appended-data
    desc: Data appended after JPEG EOI marker
    crit: suspicious
    conf: 0.95
    for: [jpeg]
    if:
      type: metrics
      field: jpeg.appended_bytes
      min: 1
    unless:
      - type: text
        substr: "GCamera:MicroVideoOffset="
      - type: text
        substr: "hdrgm:Version"
  - id: jpeg-large-comment
    desc: Unusually large JPEG comment marker
    crit: suspicious
    conf: 0.85
    for: [jpeg]
    if:
      type: metrics
      field: jpeg.comment_bytes
      min: 1024
  - id: jpeg-large-exif
    desc: Unusually large EXIF block
    crit: notable
    conf: 0.7
    for: [jpeg]
    if:
      type: metrics
      field: jpeg.exif_size
      min: 65536
composite_rules:
  - id: image-steganography-indicators
    desc: Image with steganography indicators
    crit: suspicious
    conf: 0.8
    size_min: 1048576
    all:
      - id: high-pixel-entropy
      - id: high-histogram-flatness
      - id: png-high-compression-ratio
  - id: all-channels-high
    desc: All RGB channels contain high entropy
    crit: suspicious
    conf: 0.8
    size_min: 1048576
    all:
      - id: r-channel-high
      - id: g-channel-high
      - id: b-channel-high
      - id: png-high-compression-ratio
  - id: image-steganography-strong
    desc: Image with strong steganography indicators
    crit: hostile
    conf: 0.95
    size_min: 1048576
    all:
      - id: image-steganography-indicators
      - id: all-channels-high
    any:
      - id: low-edge-density
      - id: png-high-compression-ratio
      - id: jpeg-appended-data
