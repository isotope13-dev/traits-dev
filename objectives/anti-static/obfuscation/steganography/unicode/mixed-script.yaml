defaults:
  platforms: [windows, unix]
  mbc: B0032
  for:
    - javascript
    - typescript
traits:
  - id: dense-non-ascii
    desc: Dense non-ASCII character payload
    crit: component
    conf: 0.6
    attack: T1027
    count_min: 3
    per_kb_min: 0.5
    if:
      type: string_literal
      regex: '[^\x00-\x7F]{10,}'
    unless:
      - id: metadata/file/format/
  - id: international-script-obfuscation
    desc: International script character obfuscation
    crit: component
    conf: 0.5
    attack: T1027
    count_min: 5
    if:
      type: string_literal
      regex: '[\p{Devanagari}\p{Cyrillic}\p{Arabic}\p{Hebrew}\p{Han}]'
    unless:
      - id: metadata/file/format/
  - id: mixed-unicode-blocks
    desc: Mixed Unicode block obfuscation
    crit: suspicious
    conf: 0.85
    attack: T1027
    count_min: 2
    if:
      type: text
      regex: '[\U00010000-\U0010FFFF][\u0900-\u097F][\U0001F000-\U0001F999]'
  - id: unicode-string-concatenation
    desc: Unicode character string concatenation
    crit: notable
    conf: 0.78
    attack: T1027
    for: [javascript, html]
    count_min: 5
    per_kb_min: 0.3
    if:
      type: text
      regex: \+\s*["'][^\x00-\x7F]{3,}["']
  - id: js-nonascii-split-join-cleanup
    desc: Non-ASCII marker split-join cleanup
    crit: suspicious
    conf: 0.94
    attack: T1027.002
    for: [javascript, html]
    count_min: 2
    if:
      type: text
      regex: '\.split\(\s*["''][^\x00-\x7F]{4,}["'']\s*\)\s*\.join\(\s*["'']["'']\s*\)'
    unless:
      - id: metadata/library/structure/
  - id: mixed-ascii-unicode
    desc: Mixed ASCII and Unicode obfuscation
    crit: component
    conf: 0.6
    attack: T1027
    count_min: 10
    if:
      type: string_literal
      regex: '[\x00-\x7F]{3,}[^\x00-\x7F]{3,}[\x00-\x7F]{3,}'
  - id: unicode-variable-declaration
    desc: Unicode variable declaration
    crit: component
    conf: 0.7
    attack: T1027
    count_min: 3
    if:
      type: text
      regex: \b(const|let|var)\s+\S*[^\x00-\x7F]\S*
  - id: unicode-fn-class-name
    desc: Unicode function or class name
    crit: component
    conf: 0.7
    attack: T1027
    count_min: 3
    if:
      type: text
      regex: \b(function|class)\s+\S*[^\x00-\x7F]\S*
  - id: unicode-object-key
    desc: Unicode quoted object key
    crit: component
    conf: 0.65
    attack: T1027
    count_min: 3
    if:
      type: text
      # Require a bounded quoted key immediately after the
      # object delimiter. The old \S* form could consume an entire encoded
      # string and report an object key merely because that string contained
      # an equals sign later on.
      regex: '[{,]\s*["''][^"'']{0,24}[^\x00-\x7F][^"'']{0,24}["'']\s*[:=]'
  - id: moment-locale-lib
    desc: Moment.js locale definition
    crit: component
    if:
      type: text
      substr: defineLocale
  - id: moment-locale-ref
    desc: Moment.js locale reference
    crit: component
    if:
      type: text
      substr: moment.locale
  - id: localize-content
    desc: Localization content
    crit: component
    if:
      type: text
      substr: localize
  - id: i18n-basename
    desc: Internationalization file
    crit: component
    if:
      type: path
      basename: true
      substr: i18n
  - id: l10n-basename
    desc: Localization file
    crit: component
    if:
      type: path
      basename: true
      substr: l10n
  - id: locale-basename
    desc: Locale file
    crit: component
    if:
      type: path
      basename: true
      substr: locale
  - id: locales-directory
    desc: Locales directory path
    crit: component
    if:
      type: path
      regex: '(^|[\\/])locales?[\\/]'
  - id: languages-basename
    desc: Languages file
    crit: component
    if:
      type: path
      basename: true
      substr: languages
  - id: mjsunit-basename
    desc: V8 mjsunit test path
    crit: component
    if:
      type: path
      regex: (^|[\\/])mjsunit([\\/]|$)
  - id: unicode-test-basename
    desc: Unicode test file path
    crit: component
    if:
      type: path
      regex: (^|[\\/])unicode-test\.
composite_rules:
  - id: advanced-unicode-obfuscation
    desc: Advanced Unicode obfuscation pattern
    crit: suspicious
    conf: 0.94
    attack: T1027
    near_lines: 80
    unless:
      - id: metadata/file/invisible-unicode/
      - id: metadata/file/format/
      - id: metadata/file/profile/locale::cjk-ui-prose-source
      - id: metadata/library/structure/
      - id: mjsunit-basename
      - id: unicode-test-basename
      - id: metadata/package/testing/harness/runtime/
    all:
      - id: unicode-string-concatenation
      - id: mixed-unicode-blocks
  - id: unicode-string-hiding
    desc: Unicode-based string hiding technique
    crit: suspicious
    conf: 0.85
    attack: T1027.002
    near_lines: 60
    unless:
      - id: mjsunit-basename
      - id: unicode-test-basename
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/file/format/
      - id: metadata/file/profile/locale::cjk-ui-prose-source
      - id: metadata/library/structure/
    all:
      - id: dense-non-ascii
      - id: mixed-ascii-unicode
    any:
      - id: unicode-variable-names-comp
  - id: international-script-obfuscation-complex
    desc: Complex international script obfuscation
    crit: suspicious
    conf: 0.88
    attack: T1027
    near_lines: 60
    unless:
      - id: metadata/file/format/
      - id: metadata/file/profile/locale::cjk-ui-prose-source
    all:
      - id: international-script-obfuscation
      - id: unicode-string-concatenation
    any:
      - id: objectives/anti-static/obfuscation/string/encoding::dense-unicode-escapes
      - id: mixed-unicode-blocks
  - id: localization-unicode-marker
    desc: Localization Unicode marker
    crit: baseline
    any:
      - id: moment-locale-lib
      - id: moment-locale-ref
      - id: localize-content
      - id: i18n-basename
      - id: l10n-basename
      - id: locale-basename
      - id: locales-directory
      - id: languages-basename
      - id: languages-basename
  - id: unicode-variable-names-comp
    desc: Unicode characters in identifiers
    crit: baseline
    conf: 0.7
    attack: T1027
    any:
      - id: unicode-variable-declaration
      - id: unicode-fn-class-name
      - id: unicode-object-key
    unless:
      - id: objectives/anti-static/obfuscation/steganography/unicode/

  - id: unicode-delimited-wmi-powershell-stage
    desc: Unicode-obfuscated hidden WMI download stage
    crit: hostile
    conf: 0.99
    attack: T1027.002,T1047,T1059.001,T1564.003,T1105
    mbc: B0032,E1043
    for: [html]
    all:
      - id: js-nonascii-split-join-cleanup
      - id: objectives/execution/wmi::wmi-hidden-variable-process-create
      - id: micro-behaviors/os/env/access::wsh-environment-item-assignment
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: micro-behaviors/communications/http/client/webclient::unicode-delimited-webclient-download
