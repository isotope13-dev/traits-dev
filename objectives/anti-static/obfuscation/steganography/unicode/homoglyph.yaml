defaults:
  platforms: [windows, unix]
traits:
  - id: homoglyphs
    desc: "Mathematical homoglyphs used for obfuscation"
    crit: notable
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    for: [python, javascript, typescript, go, rust]
    count_min: 5
    downgrade:
      any:
        - id: well-known/lib/pygments::source-tree
        - id: well-known/lib/videojs::release-bundle
    if:
      type: text
      regex: "[\\U0001D400-\\U0001D7FF]"
    unless:
      - id: vscode-runtime-context
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
      - id: metadata/library/structure::js-any-bundle-output
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - type: text
        regex: generated by "scripts/unicode\.py"|Autogenerated\. .*sub-table
composite_rules:
  # Folds the two VS Code webview/runtime-API markers into one suppression
  # reference, keeping the `homoglyphs` trait under the unless/downgrade cap.
  - id: vscode-runtime-context
    desc: VS Code webview/runtime API context
    crit: notable
    any:
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/library/runtime::acquire-vscode-api
