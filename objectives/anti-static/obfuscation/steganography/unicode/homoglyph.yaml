defaults:
  platforms: [windows, unix]
traits:
  - id: homoglyphs
    desc: "Mathematical homoglyphs used for obfuscation"
    crit: notable
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    for: [python]
    count_min: 5
    downgrade:
      any:
        - id: well-known/lib/pygments::source-tree
        - id: well-known/lib/videojs/
    if:
      # Match non-ASCII identifier tokens, not arbitrary Unicode data tables
      # (for example, a vendored Unicode confusables mapping).
      type: tree-sitter
      kind: identifier
      regex: "[\\U0001D400-\\U0001D7FF]"
    unless:
      - id: metadata/library/runtime/
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
      - id: metadata/library/structure/
      - id: micro-behaviors/process/create/shell/host/
      - type: text
        regex: generated by "scripts/unicode\.py"|Autogenerated\. .*sub-table
