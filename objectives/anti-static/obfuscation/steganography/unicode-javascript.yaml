defaults:
  mbc: B0032
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
traits:
  - id: dense-non-ascii
    desc: Dense non-ASCII character payload
    crit: component
    conf: 0.6
    attack: T1027
    count_min: 3
    per_kb_min: 0.5
    if:
      type: string_value
      regex: '[^\x00-\x7F]{10,}'
  - id: international-script-obfuscation
    desc: International script character obfuscation
    crit: component
    conf: 0.5
    attack: T1027
    count_min: 5
    if:
      type: string_value
      regex: '[\p{Devanagari}\p{Cyrillic}\p{Arabic}\p{Hebrew}\p{Han}]'
  - id: mixed-unicode-blocks
    desc: Mixed Unicode block obfuscation
    crit: suspicious
    conf: 0.85
    attack: T1027
    count_min: 2
    if:
      type: raw
      regex: '[\U00010000-\U0010FFFF][\u0900-\u097F][\U0001F000-\U0001F999]'
  - id: unicode-string-concatenation
    desc: Unicode character string concatenation
    crit: notable
    conf: 0.78
    attack: T1027
    count_min: 5
    per_kb_min: 0.3
    if:
      type: raw
      regex: \+\s*["'][^\x00-\x7F]{3,}["']
  - id: mixed-ascii-unicode
    desc: Mixed ASCII and Unicode obfuscation
    crit: component
    conf: 0.6
    attack: T1027
    count_min: 10
    if:
      type: string_value
      regex: '[\x00-\x7F]{3,}[^\x00-\x7F]{3,}[\x00-\x7F]{3,}'
  - id: unicode-variable-declaration
    desc: Unicode variable declaration
    crit: component
    conf: 0.7
    attack: T1027
    count_min: 3
    if:
      type: raw
      regex: \b(const|let|var)\s+\S*[^\x00-\x7F]\S*
  - id: unicode-fn-class-name
    desc: Unicode function or class name
    crit: component
    conf: 0.7
    attack: T1027
    count_min: 3
    if:
      type: raw
      regex: \b(function|class)\s+\S*[^\x00-\x7F]\S*
  - id: unicode-object-key
    desc: Unicode object key
    crit: component
    conf: 0.65
    attack: T1027
    count_min: 3
    if:
      type: raw
      regex: '[{,(]\s*\S*[^\x00-\x7F]\S*\s*[:=]'
composite_rules:
  - id: advanced-unicode-obfuscation
    desc: Advanced Unicode obfuscation pattern
    crit: suspicious
    conf: 0.94
    attack: T1027
    needs: 2
    any:
      - id: dense-non-ascii
      - id: international-script-obfuscation
      - id: mixed-unicode-blocks
    all:
      - id: unicode-string-concatenation
  - id: unicode-string-hiding
    desc: Unicode-based string hiding technique
    crit: hostile
    conf: 0.95
    attack: T1027.002
    all:
      - id: dense-non-ascii
      - id: mixed-ascii-unicode
    any:
      - id: unicode-variable-names-comp
  - id: international-script-obfuscation-complex
    desc: Complex international script obfuscation
    crit: suspicious
    conf: 0.88
    attack: T1027
    all:
      - id: international-script-obfuscation
      - id: unicode-string-concatenation
    any:
      - id: objectives/anti-static/obfuscation/string/encoding::dense-unicode-escapes
      - id: mixed-unicode-blocks
  - id: unicode-variable-names-comp
    desc: Unicode characters in identifiers
    crit: notable
    conf: 0.7
    attack: T1027
    any:
      - id: unicode-variable-declaration
      - id: unicode-fn-class-name
      - id: unicode-object-key
    unless:
      - type: raw
        substr: defineLocale
      - type: raw
        substr: moment.locale
      - type: raw
        substr: localize
      - type: basename
        substr: i18n
      - type: basename
        substr: l10n
      - type: basename
        substr: locale
