defaults:
  platforms: [windows, unix]
  for: [python]
  crit: suspicious
  conf: 0.9
  mbc: B0032.001
  attack: T1027.003
traits:
  - id: lsb-reveal
    desc: LSB steganography payload extraction
    if:
      type: symbol
      substr: lsb.reveal
  - id: lsb-hide
    desc: LSB steganography payload embedding
    if:
      type: symbol
      substr: lsb.hide
  - id: stegano-import
    desc: stegano steganography library
    crit: suspicious
    if:
      type: symbol
      exact: stegano
  - id: judyb-import
    desc: judyb steganography library
    crit: suspicious
    if:
      type: symbol
      exact: judyb
  - id: binary-byte-format-08b
    desc: 8-bit binary formatting token
    crit: component
    conf: 0.55
    if:
      type: text
      regex: '["'']08b["'']'
  - id: pixel-image-marker
    desc: Pixel or image marker
    crit: component
    conf: 0.72
    if:
      type: text
      regex: '(?i)\b(pixel|image)\b'
  - id: lsb-stego-marker
    desc: LSB steganography marker
    crit: component
    conf: 0.72
    if:
      type: text
      regex: '(?i)\b(lsb|stegano|stego)\b'
composite_rules:
  - id: pixel-lsb-extract
    desc: Manual LSB pixel bit extraction
    crit: suspicious
    conf: 0.85
    near_lines: 12
    all:
      - id: binary-byte-format-08b
    any:
      - id: pixel-image-marker
      - id: lsb-stego-marker
  - id: stego-extract-exec
    desc: Steganography extraction followed by exec
    crit: hostile
    conf: 0.95
    all:
      - id: lsb-reveal
      - id: micro-behaviors/process/interpreter/python::exec-builtin
