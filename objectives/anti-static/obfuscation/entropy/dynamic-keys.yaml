defaults:
  platforms: [unix, windows, macos]
# Dynamic Key Generation for Obfuscation
# Detects random data access near decryption/deobfuscation patterns
composite_rules:
  - id: dynamic-obfuscation-key-gen
    desc: Possible dynamic key generation for payload decryption
    crit: suspicious
    conf: 0.85
    attack: T1027
    all:
      - id: micro-behaviors/os/random/crypto::urandom
    any:
      - id: objectives/anti-analysis/self-modify/runtime::xor-loop-pattern
      - id: objectives/anti-static/obfuscation/control-flow/logic::xor-ror-decryption-loop
    near_bytes: 1024
    unless:
      - id: well-known/app/mcu-ai-debug::helper-binary
