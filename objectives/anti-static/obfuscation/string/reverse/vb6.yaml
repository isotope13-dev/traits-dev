defaults:
  platforms:
    - windows
  for:
    - pe
composite_rules:
  - id: vb6-reversed-strings
    desc: VB6 binary containing reversed API/system strings
    crit: hostile
    conf: 0.9
    all:
      - id: micro-behaviors/data/encode/string::vb-strreverse
    any:
      - id: reversed-user32
      - id: reversed-kernel32
      - id: reversed-mscoree
      - id: reversed-shell32
      - id: reversed-messageboxa
      - id: reversed-decodepointer
      - id: reversed-getactivewindow
      - id: reversed-getlastactivepopup
      - id: reversed-getprocesswindowstation
      - id: reversed-getuserobjectinformation
      - id: reversed-autorun-inf
      - id: reversed-autorun-inf-wide
      - id: reversed-autorun-section
      - id: reversed-autorun-section-wide
      - id: reversed-shellexecute
      - id: reversed-shellexecute-wide
      - id: reversed-found-exe
      - id: reversed-found-exe-wide
traits:
  - id: reversed-user32
    desc: Reversed USER32.DLL string
    crit: component
    if:
      type: text
      substr: LLD.23RESU
      case_insensitive: true
  - id: reversed-kernel32
    desc: Reversed KERNEL32.DLL string
    crit: component
    if:
      type: text
      substr: LLD.23LENREK
      case_insensitive: true
  - id: reversed-mscoree
    desc: Reversed mscoree.dll string
    crit: component
    if:
      type: text
      substr: lld.eerocsm
      case_insensitive: true
  - id: reversed-shell32
    desc: Reversed shell32.dll string
    crit: component
    if:
      type: text
      substr: lld.23llehs
      case_insensitive: true
  - id: reversed-messageboxa
    desc: Reversed MessageBoxA string
    crit: component
    if:
      type: text
      substr: AxoBegasseM
      case_insensitive: true
  - id: reversed-decodepointer
    desc: Reversed DecodePointer string
    crit: component
    if:
      type: text
      substr: retnioPedoceD
      case_insensitive: true
  - id: reversed-getactivewindow
    desc: Reversed GetActiveWindow string
    crit: component
    if:
      type: text
      substr: wodniWevitcAteG
      case_insensitive: true
  - id: reversed-getlastactivepopup
    desc: Reversed GetLastActivePopup string
    crit: component
    if:
      type: text
      substr: pupoPevitcAtsaLteG
      case_insensitive: true
  - id: reversed-getprocesswindowstation
    desc: Reversed GetProcessWindowStation string
    crit: component
    if:
      type: text
      substr: noitatSwodniWssecorPteG
      case_insensitive: true
  - id: reversed-getuserobjectinformation
    desc: Reversed GetUserObjectInformation string
    crit: component
    if:
      type: text
      substr: AnoitamrofnItcejbOresUteG
      case_insensitive: true
  - id: reversed-zwqueryinformationprocess
    desc: Reversed ZwQueryInformationProcess string
    crit: component
    conf: 0.99
    size_min: 2600000
    size_max: 2900000
    if:
      type: text
      exact: ssecorPnoitamrofnIyreuQwZ
      section: .rdata
  - id: reversed-autorun-inf
    desc: Reversed Autorun.inf string
    crit: component
    if:
      type: text
      substr: "fni.nurotuA"
      case_insensitive: true
      section: .rdata
  - id: reversed-autorun-inf-wide
    desc: Reversed Autorun.inf (Wide)
    crit: component
    if:
      type: hex
      pattern: "66 00 6E 00 69 00 2E 00 6E 00 75 00 72 00 6F 00 74 00 75 00 41 00"
      section: .rdata
  - id: reversed-autorun-section
    desc: Reversed [Autorun] string
    crit: component
    if:
      type: text
      substr: "]nurotuA["
      case_insensitive: true
      section: .rdata
  - id: reversed-autorun-section-wide
    desc: Reversed [Autorun] (Wide)
    crit: component
    if:
      type: hex
      pattern: "5D 00 6E 00 75 00 72 00 6F 00 74 00 75 00 41 00 5B 00"
      section: .rdata
  - id: reversed-shellexecute
    desc: Reversed ShellExecute string
    crit: component
    if:
      type: text
      substr: "etucexEllehS"
      case_insensitive: true
      section: .rdata
  - id: reversed-shellexecute-wide
    desc: Reversed ShellExecute (Wide)
    crit: component
    if:
      type: hex
      pattern: "65 00 74 00 75 00 63 00 65 00 78 00 45 00 6C 00 6C 00 65 00 68 00 53 00"
      section: .rdata
  - id: reversed-found-exe
    desc: Reversed FOUND.007.exe string
    crit: component
    if:
      type: text
      substr: "exe.700.DNUOF"
      case_insensitive: true
      section: .rdata
  - id: reversed-found-exe-wide
    desc: Reversed FOUND.007.exe (Wide)
    crit: component
    if:
      type: hex
      pattern: "65 00 78 00 65 00 2E 00 37 00 30 00 30 00 2E 00 44 00 4E 00 55 00 4F 00 46 00"
      section: .rdata
