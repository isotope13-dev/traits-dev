# Python reverse-then-decode obfuscation: encoded payload stored in
# reversed form so naive scanners miss it. The decode step is `s[::-1]`
# (or `reversed()`) followed by base64/hex/exec/eval. Specifically the
# combination — reversal alone is fine, reversal feeding eval is not.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: B0032
traits:
- id: reverse-slice-then-decode--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: a85decode
  count_max: 1027090
- id: reverse-slice-then-decode--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: b32decode
  count_max: 1027091
- id: reverse-slice-then-decode--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: b85decode
  count_max: 1027093
- id: reverse-slice-then-decode--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: unhexlify
  count_max: 1027094
- id: decode-then-reverse-slice--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: a85decode
  count_max: 1027096
- id: decode-then-reverse-slice--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: b32decode
  count_max: 1027097
- id: decode-then-reverse-slice--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: b85decode
  count_max: 1027099
- id: decode-then-reverse-slice--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: unhexlify
  count_max: 1027100
- id: reversed-builtin-then-decode
  desc: reversed() builtin feeding decode call
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'reversed\s*\([^)\n]{1,80}\)[^\n]{0,80}\.(join|decode)\b'
- id: reverse-slice-then-exec
  desc: Reverse-slice then exec/eval
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '\[::\s*-\s*1\][^\n]{0,80}\)\s*\)?\s*(exec|eval)\s*\('

  # Multi-fragment string concatenation density (also a string-fragment
  # decode form — adversaries split a sensitive string into per-character
  # concatenation to defeat substring scanners). Same shape works in
  # Python and JS, so for: covers both.
- id: dense-single-char-concat
  desc: Dense single-char string concatenation
  crit: suspicious
  conf: 0.9
  count_min: 6
  for: [python, javascript, typescript]
  if:
    type: text
    regex: '["''][a-zA-Z0-9_/\\.-]["'']\s*\+\s*["''][a-zA-Z0-9_/\\.-]["'']'

composite_rules:
- id: python-reverse-decode-aggregator
  desc: Python reverse-then-decode obfuscation (any form)
  crit: suspicious
  conf: 0.94
  any:
  - id: reverse-slice-then-decode
  - id: decode-then-reverse-slice
  - id: reversed-builtin-then-decode
  - id: reverse-slice-then-exec
- id: reverse-slice-then-decode
  desc: Reverse-slice followed by base64/hex decode
  crit: suspicious
  conf: 0.92
  any:
  - id: reverse-slice-then-decode--rx-1
  - id: reverse-slice-then-decode--rx-2
  - id: micro-behaviors/data/decode/base64::b64decode-string
  - id: reverse-slice-then-decode--rx-4
  - id: reverse-slice-then-decode--rx-5
  - id: micro-behaviors/data/decode/hex::python-fromhex
- id: decode-then-reverse-slice
  desc: base64/hex decode then reverse-slice
  crit: suspicious
  conf: 0.92
  any:
  - id: decode-then-reverse-slice--rx-7
  - id: decode-then-reverse-slice--rx-8
  - id: micro-behaviors/data/decode/base64::b64decode-string
  - id: decode-then-reverse-slice--rx-10
  - id: decode-then-reverse-slice--rx-11
  - id: micro-behaviors/data/decode/hex::python-fromhex
