# Python reverse-then-decode obfuscation: an encoded payload stored in
# reversed form so naive substring scanners miss it, then un-reversed with
# `s[::-1]` / `reversed()` and fed to base64/hex/exec/eval. The combination —
# a reversal in close proximity to a decode — is the signal. Reversal alone or
# a decode alone is benign: legitimate crypto/JWT code calls
# base64.b64decode / bytes.fromhex constantly, and list reversal is ordinary.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: B0032
traits:
# --- The keystone: a string-reversal operation -----------------------------
- id: reverse-slice-operator
  desc: Reverse-slice operator [::-1]
  crit: component
  conf: 0.6
  if:
    type: text
    regex: '\[::\s*-\s*1\]'

# --- Decode primitives that, paired with a reversal, complete the chain -----
- id: ascii85-decode-ref
  desc: base64.a85decode reference
  crit: component
  conf: 0.6
  if:
    type: text
    substr: a85decode
- id: base32-decode-ref
  desc: base64.b32decode reference
  crit: component
  conf: 0.6
  if:
    type: text
    substr: b32decode
- id: base85-decode-ref
  desc: base64.b85decode reference
  crit: component
  conf: 0.6
  if:
    type: text
    substr: b85decode

- id: reversed-builtin-then-decode
  desc: reversed() builtin feeding decode call
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'reversed\s*\([^)\n]{1,80}\)[^\n]{0,80}\.(join|decode)\b'
  unless:
  - id: metadata/library/data::pycryptodome-selftest
- id: reverse-slice-then-exec
  desc: Reverse-slice then exec/eval
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '\[::\s*-\s*1\][^\n]{0,80}\)\s*\)?\s*(exec|eval)\s*\('
  unless:
  - id: metadata/library/data::pycryptodome-selftest

  # Multi-fragment string concatenation density (also a string-fragment
  # decode form — adversaries split a sensitive string into per-character
  # concatenation to defeat substring scanners). Same shape works in
  # Python and JS, so for: covers both.
- id: dense-single-char-concat
  desc: Dense single-char string concatenation
  crit: suspicious
  conf: 0.9
  count_min: 6
  for: [python, javascript, typescript]
  if:
    type: text
    regex: '["''][a-zA-Z0-9_/\\.-]["'']\s*\+\s*["''][a-zA-Z0-9_/\\.-]["'']'

composite_rules:
- id: python-reverse-decode-aggregator
  desc: Python reverse-then-decode obfuscation (any form)
  crit: suspicious
  conf: 0.94
  any:
  - id: reverse-slice-then-decode
  - id: reversed-builtin-then-decode
  - id: reverse-slice-then-exec
# A reverse-slice within 256 bytes of a base64/hex decode primitive. Both must
# be present and adjacent — this is the deobfuscation tail of a reversed blob.
# Direction (reverse-then-decode vs decode-then-reverse) is irrelevant to the
# signal, so a single proximity rule covers both.
- id: reverse-slice-then-decode
  desc: Reverse-slice adjacent to base64/hex decode
  crit: suspicious
  conf: 0.92
  near_bytes: 256
  all:
  - id: reverse-slice-operator
  any:
  - id: ascii85-decode-ref
  - id: base32-decode-ref
  - id: base85-decode-ref
  - id: micro-behaviors/data/decode/base64::b64decode-string
  - id: micro-behaviors/data/decode/hex::python-unhexlify
  - id: micro-behaviors/data/decode/hex::python-fromhex
  unless:
  - id: metadata/library/data::pycryptodome-selftest
