# JavaScript reverse-then-decode: encoded payload stored reversed so
# substring scanners miss it. Combination of reversal + atob/Buffer.from
# is the smoking gun.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1027
  mbc: B0032
traits:
- id: js-split-reverse-join-chain
  desc: split().reverse().join() deobfuscation chain
  crit: component
  conf: 0.93
  if:
    type: text
    regex: '\.split\s*\([^)]{0,80}\)\s*\.reverse\s*\(\s*\)\s*\.join\s*\('
- id: js-decode-then-reverse-split--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: text
    substr: atob
  count_max: 1027125
- id: js-reverse-assignment-tail
  desc: Variable assigned reverse() deobfuscation tail
  crit: component
  conf: 0.97
  if:
    type: text
    regex: \w+\s*=\s*\w+\.reverse\(\)
  not:
  - substr: "Lodash <https://lodash.com/>"
  unless:
  - type: basename
    regex: '(^|!!).{0,200}lodash\.min\.js$'
composite_rules:
- id: js-reverse-decode-aggregator
  desc: JS reverse-then-decode obfuscation (any form)
  crit: suspicious
  conf: 0.94
  any:
  - id: js-reverse-split-then-decode
  - id: js-reverse-then-eval
- id: js-reverse-split-then-decode
  desc: split.reverse.join then base64/hex decode
  crit: suspicious
  conf: 0.93
  near_bytes: 512
  all:
  - id: objectives/anti-static/obfuscation/string/reverse::js-split-reverse-join-chain
  any:
  - id: micro-behaviors/process/interpreter/vm::buffer-from-call
  - id: objectives/anti-static/obfuscation/string/reverse::js-decode-then-reverse-split--rx-10
  unless:
  - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
  # split/reverse/join string helpers occur naturally in large published
  # minified library bundles (hls.js, etc.); the 512-byte window coincidentally
  # pairs them with a Buffer.from elsewhere in the single minified line.
  - id: metadata/library/structure::js-large-minified-bundle
- id: js-reverse-then-eval
  desc: split.reverse.join then eval/Function
  crit: suspicious
  conf: 0.95
  near_bytes: 512
  all:
  - id: objectives/anti-static/obfuscation/string/reverse::js-split-reverse-join-chain
  any:
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
