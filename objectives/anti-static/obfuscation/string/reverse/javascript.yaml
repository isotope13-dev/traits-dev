# JavaScript reverse-then-decode: encoded payload stored reversed so
# substring scanners miss it. Combination of reversal + atob/Buffer.from
# is the smoking gun.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1027
  mbc: B0032
traits:
- id: js-decode-then-reverse-split--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: text
    substr: ).reverse
  count_max: 1027122
- id: js-decode-then-reverse-split--rx-8
  desc: join marker for decode reverse
  crit: component
  conf: 0.93
  if:
    type: text
    substr: ).join
  count_max: 1027123
- id: js-decode-then-reverse-split--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: text
    regex: \.split\s*\(
  count_max: 1027124
- id: js-decode-then-reverse-split--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.93
  if:
    type: text
    substr: atob
  count_max: 1027125
- id: js-reverse-assignment-tail
  desc: Variable assigned reverse() deobfuscation tail
  crit: component
  conf: 0.97
  if:
    type: text
    regex: \w+\s*=\s*\w+\.reverse\(\)
  not:
  - substr: "Lodash <https://lodash.com/>"
  unless:
  - type: basename
    regex: '(^|!!).{0,200}lodash\.min\.js$'
composite_rules:
- id: js-reverse-decode-aggregator
  desc: JS reverse-then-decode obfuscation (any form)
  crit: suspicious
  conf: 0.94
  any:
  - id: js-reverse-split-then-decode
  - id: js-reverse-then-eval
- id: js-reverse-split-then-decode
  desc: split.reverse.join then base64/hex decode
  crit: suspicious
  conf: 0.93
  near_bytes: 512
  all:
  - id: objectives/anti-static/obfuscation/string/reverse::js-decode-then-reverse-split--rx-7
  - id: objectives/anti-static/obfuscation/string/reverse::js-decode-then-reverse-split--rx-8
  - id: objectives/anti-static/obfuscation/string/reverse::js-decode-then-reverse-split--rx-9
  any:
  - id: micro-behaviors/process/interpreter/vm::buffer-from-call
  - id: objectives/anti-static/obfuscation/string/reverse::js-decode-then-reverse-split--rx-10
- id: js-reverse-then-eval
  desc: split.reverse.join then eval/Function
  crit: suspicious
  conf: 0.95
  near_bytes: 512
  all:
  - id: objectives/anti-static/obfuscation/string/reverse::js-decode-then-reverse-split--rx-7
  - id: objectives/anti-static/obfuscation/string/reverse::js-decode-then-reverse-split--rx-8
  - id: objectives/anti-static/obfuscation/string/reverse::js-decode-then-reverse-split--rx-9
  any:
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
