# JavaScript reverse-then-decode: encoded payload stored reversed so
# substring scanners miss it. Combination of reversal + atob/Buffer.from
# is the smoking gun.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1027
  mbc: B0032
traits:
  - id: js-reverse-split-then-decode
    desc: split.reverse.join then base64/hex decode
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\.split\s*\(\s*["'']{2}\s*\)\.reverse\s*\(\s*\)\.join\s*\(\s*["'']{2}\s*\)[^\n]{0,80}\b(?:atob|Buffer\.from)\b'
  - id: js-decode-then-reverse-split
    desc: base64/hex decode then split.reverse.join
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\b(?:atob|Buffer\.from)\b[^\n]{0,160}\.split\s*\(\s*["'']{2}\s*\)\.reverse\s*\(\s*\)\.join\s*\(\s*["'']{2}\s*\)'
  - id: js-reverse-then-eval
    desc: split.reverse.join then eval/Function
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\.split\s*\(\s*["'']{2}\s*\)\.reverse\s*\(\s*\)\.join\s*\(\s*["'']{2}\s*\)[^\n]{0,80}\b(?:eval|Function)\s*\('

composite_rules:
  - id: js-reverse-decode-aggregator
    desc: JS reverse-then-decode obfuscation (any form)
    crit: suspicious
    conf: 0.94
    any:
      - id: js-reverse-split-then-decode
      - id: js-decode-then-reverse-split
      - id: js-reverse-then-eval
