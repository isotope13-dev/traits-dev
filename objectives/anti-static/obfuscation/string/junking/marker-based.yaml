defaults:
  platforms:
  - unix
  - windows
  for:
  - pe
  - csharp
  crit: suspicious
  conf: 0.85
traits:
- id: as21-marker
  desc: String junking with as21 marker
  conf: 0.9
  count_min: 5
  if:
    type: text
    regex: \w{3,}as21\w{3,}
- id: underscore-digit-marker
  desc: String junking with underscore-digit markers
  crit: suspicious
  conf: 0.8
  count_min: 20
  if:
    type: text
    regex: ^[a-z]{3,}_[0-9]+_[a-z]{3,}$
    not:
    - regex: __\d+_\d+_
    - regex: ^(get_|set_)
    - regex: ^load_[0-9]+_(dst|src)$
    - regex: ^[a-z]+_[0-9]+_(floats?|ints?|uints?|uniforms|constants)$
    - regex: ^VK_[A-Z0-9_]+$
    - regex: ^(max|min)_[0-9]+_exp$
    - regex: ^(latin|utf)_[0-9]+_(en|de)code$
    - regex: (^|/)cpuid_[0-9]+_[a-z0-9_]+$
    - regex: ^aes_(128|192|256)_(ecb|cbc|ofb|ctr|ccm|gcm|xts|wrap)$
    - exact: max_10_exp
    - exact: min_10_exp
    - substr: XMM_
    - substr: YMM_
    - substr: ZMM_
  not:
  - regex: (^|/)cpuid_[0-9]+_[a-z0-9_]+$
  # ONNX quantization graphs commonly expose generated tensor/node names
  # such as val_17_scale and linear_1_scale.  These are model metadata, not
  # source-level junk identifiers.
  - regex: ^(val|linear|transpose|gelu|sum)_[0-9]+_(quantized|scale)$
  - regex: ^load_[0-9]+_(dst|src)$
  - regex: ^[a-z]+_[0-9]+_(floats?|ints?|uints?|uniforms|constants)$
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-metadata
    - id: metadata/library/python-runtime::python-runtime
    - id: metadata/lang/compiled::linux-kernel-banner
- id: crypto-aes-mode-name-table--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 8
  if:
    type: text
    regex: ^aes_(128|192|256)_(ecb|cbc)$
  count_max: 1027637
- id: crypto-aes-mode-name-table--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 8
  if:
    type: text
    regex: ^aes_(128|192|256)_(ofb|ctr)$
  count_max: 1027638
- id: crypto-aes-mode-name-table--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 8
  if:
    type: text
    regex: ^aes_(128|192|256)_(ccm|gcm)$
  count_max: 1027639
- id: crypto-aes-mode-name-table--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 8
  if:
    type: text
    regex: ^aes_(128|192|256)_(xts|wrap)$
  count_max: 1027640
- id: abidik-padding-string
  desc: Abidik repeated padding string
  for:
  - csharp
  count_min: 5
  conf: 0.96
  if:
    type: string_literal
    exact: wafkwaofkawfofkwfwofwkw
composite_rules:
- id: string-junking-detected
  desc: String junking obfuscation detected
  crit: suspicious
  conf: 0.9
  any:
  - id: as21-marker
  - id: abidik-padding-string
  unless:
  - id: objectives/anti-static/obfuscation/string/junking/
- id: abidik-deflate-loader-junking
  desc: Abidik Deflate loader junking
  crit: hostile
  conf: 0.98
  attack: T1027.009
  all:
  - id: abidik-padding-string
  - id: micro-behaviors/data/compress/library::dotnet-deflate-decompress
- id: crypto-aes-mode-name-table
  desc: AES mode name table
  crit: component
  conf: 0.9
  any:
  - id: crypto-aes-mode-name-table--rx-1
  - id: crypto-aes-mode-name-table--rx-2
  - id: crypto-aes-mode-name-table--rx-3
  - id: crypto-aes-mode-name-table--rx-4
