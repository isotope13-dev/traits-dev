# Random Code Generation Detection
# Detects random data passed to a dynamic Function constructor
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  - id: random-code-generation
    desc: Random data combined with dynamic code construction
    crit: suspicious
    conf: 1.0
    attack: T1027
    mbc: B0032
    near_lines: 40
    all:
      - id: micro-behaviors/os/random/prng/stdlib::math-random-call
      - id: micro-behaviors/process/interpreter/eval::js-new-function-variable-argument
    unless:
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: well-known/app/google-web::google-platform-js-asset
    downgrade:
      any:
        - id: metadata/library/jquery/
        - id: metadata/library/d3/
        - id: metadata/library/structure/
        - id: metadata/library/prettier/
