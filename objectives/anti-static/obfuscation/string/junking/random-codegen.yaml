# Random Code Generation Detection
# Detects Math.random used with new Function() for obfuscated code generation
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  - id: random-code-generation
    desc: Detects random code generation via Math.random
    crit: suspicious
    conf: 1.0
    attack: T1027
    mbc: B0032
    near_lines: 40
    all:
      - id: micro-behaviors/os/random/prng/stdlib::math-random-call
      - id: objectives/anti-static/obfuscation/string/encoding::js-new-function
    unless:
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure/
      - id: metadata/package/tooling/
    downgrade:
      any:
        - id: metadata/library/jquery/
        - id: metadata/library/d3/
        - id: metadata/library/structure/
        - id: metadata/library/prettier/
