defaults:
  platforms:
    - windows
    - linux
    - macos
  for: [javascript, html, pe]
  crit: component
  conf: 0.9
traits:
  - id: chromium-test-url
    desc: Chromium test command-line URL
    if:
      type: text
      substr: "example-cmdline.test"
  - id: chromium-test-navigation
    desc: Chromium internal test navigation string
    if:
      type: text
      substr: ui_test_utils::NavigateToURL
  - id: chromium-memory-infra
    desc: Chromium memory infrastructure metric string
    if:
      type: text
      substr: disabled-by-default-memory-infra
  - id: chromium-autofill-test
    desc: Chromium autofill test form string
    if:
      type: text
      substr: form action="https://www.example.com/" method="POST" id="shipping"
  - id: chromium-proxy-source-path
    desc: Chromium proxy source path
    if:
      type: text
      substr: ../../chrome/chrome_proxy/chrome_proxy_main_win.cc
  - id: chromium-pwa-launcher-pdb
    desc: Chromium launcher PDB marker
    if:
      type: text
      substr: chrome_pwa_launcher.exe.pdb
  - id: chromium-notification-helper
    desc: Chromium notification helper marker
    if:
      type: text
      substr: NotificationHelperMetrics
composite_rules:
  - id: chromium-junk-strings
    desc: Chromium test strings used as junk code obfuscation
    needs: 2
    any:
      - id: chromium-test-url
      - id: chromium-test-navigation
      - id: chromium-memory-infra
      - id: chromium-autofill-test
  - id: chromium-decoy-stuffing
    desc: Chromium decoy strings stuffed into binary
    crit: suspicious
    conf: 0.94
    needs: 3
    any:
      - id: objectives/anti-static/obfuscation/string/junking::chromium-test-url
      - id: objectives/anti-static/obfuscation/string/junking::chromium-test-navigation
      - id: objectives/anti-static/obfuscation/string/junking::chromium-memory-infra
      - id: objectives/anti-static/obfuscation/string/junking::chromium-autofill-test
      - id: objectives/anti-static/obfuscation/string/junking::chromium-proxy-source-path
      - id: objectives/anti-static/obfuscation/string/junking::chromium-pwa-launcher-pdb
      - id: objectives/anti-static/obfuscation/string/junking::chromium-notification-helper
