defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
traits:
  - id: iexpress-admqcmd
    desc: IExpress ADMQCMD directive string
    crit: component
    conf: 0.98
    if:
      type: text
      substr: ADMQCMD

  - id: iexpress-extractopt
    desc: IExpress EXTRACTOPT directive string
    crit: component
    conf: 0.98
    if:
      type: text
      substr: EXTRACTOPT

  - id: iexpress-license-cluster
    desc: IExpress license prompt string cluster
    crit: component
    conf: 0.96
    if:
      type: text
      substr: Please read the following license agreement.

composite_rules:
  - id: fake-iexpress-string-padding
    desc: Fake IExpress string padding obfuscation
    crit: suspicious
    conf: 0.98
    all:
      - id: iexpress-admqcmd
      - id: iexpress-extractopt
    any:
      - id: iexpress-license-cluster
      - id: metadata/binary/metrics/structural::malformed-pe-structure
    needs: 2
    unless:
      - id: metadata/binary/installer/database::embedded-mscf-cabinet
      - id: metadata/binary/installer/sfx::cabinet-fdi-extraction
