defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
traits:
  - id: iexpress-directive-cluster
    desc: IExpress directive string cluster
    crit: component
    conf: 0.98
    if:
      type: text
      substr: ADMQCMD

  - id: iexpress-license-cluster
    desc: IExpress license prompt string cluster
    crit: component
    conf: 0.96
    if:
      type: text
      exact: License

  - id: iexpress-no-cab-header
    desc: IExpress strings without CAB header
    crit: component
    conf: 0.96
    if:
      type: raw
      substr: MSCF

composite_rules:
  - id: fake-iexpress-string-padding
    desc: Fake IExpress string padding obfuscation
    crit: suspicious
    conf: 0.98
    all:
      - id: iexpress-directive-cluster
      - id: iexpress-no-cab-header
    any:
      - id: iexpress-license-cluster
      - id: metadata/package/license::license-upper
      - id: metadata/binary/metrics/structural::malformed-pe-structure
    needs: 2