defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: cyrillic-junk-padding
    desc: Non-functional Cyrillic junk strings for obfuscation
    crit: suspicious
    conf: 0.8
    count_min: 10
    if:
      type: string_literal
      regex: "онвас|въйръ"
  - id: dense-cyrillic-literals
    desc: Dense Cyrillic character strings in non-Cyrillic context
    crit: notable
    conf: 0.6
    count_min: 20
    unless:
      - type: basename
        regex: (?i)(i18n|l10n|locale)\.
      - type: basename
        regex: (?i)translations?\.
      - id: metadata/file/text/format::i18n-locale-file
      - id: objectives/anti-static/obfuscation/code-metrics/source::locale-path
      - id: objectives/anti-static/obfuscation/code-metrics/source::javascript-locale-module
      - id: micro-behaviors/ui/controls/widget::qtwidgets-import
    if:
      type: string_literal
      regex: "[а-яА-Я]{4,}"
