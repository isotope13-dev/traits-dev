defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: cyrillic-junk-padding
    desc: 'Non-funcal Cyrillic junk strings for obfuscation'
    crit: suspicious
    conf: 0.8
    count_min: 10
    if:
      type: string_literal
      regex: "онвас|въйръ"
  # NOTE: a generic "20+ Cyrillic words" trait was removed here. Counting
  # Cyrillic string literals detects Russian-language UI content (a neutral
  # language property), not junk obfuscation, so it false-positived on every
  # Russian-localized app. Targeted junk is covered by cyrillic-junk-padding
  # above; broad minification/anomaly is covered by obfuscation/string/anomaly.
