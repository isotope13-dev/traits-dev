defaults:
  platforms: [windows, unix]
traits:
  - id: consonant-vowel-gibberish
    desc: Repeated consonant-vowel token
    crit: notable
    conf: 0.8
    for: [binaries, scripts]
    count_min: 3
    downgrade:
      any:
        - id: well-known/lib/videojs::release-bundle
    if:
      type: text
      regex: (?i)\b[b-df-hj-np-tv-z]?([b-df-hj-np-tv-z][aeiou]){7,}[b-df-hj-np-tv-z]?\b
    not:
      - regex: \.
      - regex: '[A-Z]'
      - substr: InUseBefore
      - substr: InUseAfter
      - substr: Validate
      - substr: Enumerator
      - substr: Metadata
      - substr: MetaFile
      - substr: Remove
      - substr: Manager
      - substr: Parameter
      - substr: decodebin
      - regex: (?i)catalog
      - regex: (?i)isolatin
      - regex: (?i)\b(kitanakagusuku|casadelamoneda|yamatokoriyama)\b
      # PostScript/Adobe glyph naming convention (e.g. lamalefisolatedarabic,
      # seenmedialarabic). These appear in font tables and PDF rendering.
      - regex: (?i)(arabic|hebrew|cyrillic|cjk|katakana|hiragana|devanagari|thai)$
    unless:
      - id: metadata/package/quality::embedded-domain-reputation-catalog
      - id: well-known/lib/pdfjs::pdfjs-bundle
