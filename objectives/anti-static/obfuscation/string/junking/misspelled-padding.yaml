# Misspelled system word padding - repeated misspelled "System" variants
# Used as anti-analysis junk padding to inflate binary and confuse string analysis
defaults:
  for: [pe, dll]
  platforms: [windows]
  crit: suspicious
  conf: 0.9
  mbc: B0032
  attack: T1027
traits:
  - id: systaem-padding
    desc: Misspelled System junk string padding
    if:
      type: text
      regex: "Systaem[a-z]{5}Systaem"
  - id: systeam-padding
    desc: Misspelled System junk string padding
    if:
      type: text
      regex: "Systeam[a-z]{5}Systeam"
