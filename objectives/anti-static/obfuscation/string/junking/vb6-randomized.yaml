defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
  attack: T1027
  mbc: B0032
traits:
- id: long-mixedcase-identifiers
  desc: Long mixed-case identifiers cluster
  crit: component
  conf: 0.86
  count_min: 1
  if:
    type: text
    regex: \b[A-Z][a-z]{2,}[A-Za-z]{6,}[A-Z][A-Za-z]{8,}\b
  unless:
  - id: metadata/document/office/container/
  - id: metadata/binary/resource/
  - type: text
    exact: RegisterServiceCtrlHandler failed
  - id: metadata/lang/compiler/systems::go-pe-symtab
- id: randomized-exe-name
  desc: Randomized executable name string
  crit: component
  conf: 0.82
  if:
    type: text
    regex: \b[A-Za-z0-9]{4,}[0-9][A-Za-z0-9]{5,}\.exe\b
- id: fused-word-salad-identifiers
  desc: Fused dictionary-like identifier strings
  crit: component
  conf: 0.84
  count_min: 4
  if:
    type: text
    regex: \b([A-Z][a-z]{13,}|[a-z]{16,}|[A-Z]{13,})\b
  unless:
  - id: metadata/document/office/container/
  - id: metadata/binary/resource/
  - id: metadata/lang/compiler/systems::go-pe-symtab
- id: numbered-identifier-cluster
  desc: Repeated numbered identifiers in PE text
  crit: component
  conf: 0.9
  count_min: 20
  if:
    type: text
    regex: '\b[A-Za-z]{5,8}[0-9]{1,2}\b'
    section: .text
  unless:
  - id: metadata/document/office/container/
composite_rules:
- id: vb6-randomized-identifiers
  desc: VB6 randomized internal identifiers
  crit: suspicious
  conf: 0.9
  all:
  - id: long-mixedcase-identifiers
  - id: metadata/binary/framework::vb6-application-framework
  any:
  - id: randomized-exe-name
  - id: objectives/anti-static/obfuscation/imports::very-low-strings
  - id: micro-behaviors/time/schedule/interval::vb6-timer-control
- id: vb6-fused-word-salad-identifiers
  desc: VB6 fused word-salad internal identifiers
  crit: suspicious
  conf: 0.9
  all:
  - id: fused-word-salad-identifiers
  - id: metadata/binary/framework::vb6-application-framework
  any:
  - id: micro-behaviors/time/schedule/interval::vb6-timer-control
  - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
  - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued
- id: vb6-timer-word-salad-loader
  desc: VB6 timer loader with word-salad identifiers
  crit: hostile
  conf: 0.92
  all:
  - id: vb6-fused-word-salad-identifiers
  - id: micro-behaviors/time/schedule/interval::vb6-timer-control
  - id: micro-behaviors/dylib/lookup::vb6-runtime-api-dispatch
  any:
  - id: metadata/build/artifact::pe-bound-imports-present
  - id: metadata/binary/metrics/structural::few-sections
  - id: metadata/lang/compiler/native::clang-string
  needs: 2
- id: vb6-numbered-identifier-obfuscation-profile
  desc: VB6 numbered identifiers with concealed dispatch
  crit: hostile
  conf: 0.96
  all:
  - id: metadata/binary/framework::vb6-application-framework
  - id: numbered-identifier-cluster
  - id: micro-behaviors/dylib/lookup::vb6-runtime-api-dispatch
  any:
  - id: micro-behaviors/dylib/lookup::vb6-dll-function-call
  - id: micro-behaviors/data/string/runtime::vb6-ordinal-string-transformation
