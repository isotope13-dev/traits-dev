defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1027

traits:
- id: msi-embedded-registerdata-error-junk
  desc: MSI embedded registerdata error junk
  crit: component
  conf: 0.9
  count_min: 12
  if:
    type: text
    substr: ERR_REGISTERDATA

- id: msi-embedded-registerdata-code-junk
  desc: MSI embedded registerdata code filler
  crit: component
  conf: 0.88
  count_min: 10
  if:
    type: text
    substr: let result = registerdata();

- id: msi-embedded-unregisterdata-code-junk
  desc: MSI embedded unregisterdata code filler
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    substr: let result = unregisterdata();

composite_rules:
- id: msi-embedded-generated-string-junk
  desc: MSI embeds generated string junk
  crit: suspicious
  conf: 0.95
  all:
  - id: metadata/binary/installer/database::embedded-mscf-cabinet
  - id: msi-embedded-registerdata-error-junk
  any:
  - id: msi-embedded-registerdata-code-junk
  - id: msi-embedded-unregisterdata-code-junk
