defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: function-returns-string-literal
    desc: Function that returns a string literal (common
    crit: suspicious
    conf: 0.8
    # Migrated from a `(function_declaration (return_statement (string)))` query
    # (count_min: 5) to the cached `ast.string_return_function_count` metric —
    # 5+ string-returning decoder functions is the substitution-table signal.
    if:
      type: metrics
      field: 'ast.string_return_function_count'
      min: 5
  - id: function-returns-variable-string
    desc: Function returns variable string value
    crit: notable
    conf: 0.8
    count_min: 5
    if:
      type: tree-sitter
      query: |
        (function_declaration
          (statement_block
            (variable_declaration
              (variable_declarator
                name: (identifier) @var
                value: (string)
              )
            )
            (return_statement
              (identifier) @ret
            )
          )
          (#eq? @var @ret)
        )
