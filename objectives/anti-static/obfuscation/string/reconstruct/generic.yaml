defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: string-return-function-count
    desc: Five or more string-literal-returning functions
    crit: component
    conf: 0.8
    # Count floor: functions whose entire body is `return "<literal>"`.
    if:
      type: metrics
      field: 'ast.string_return_function_count'
      min: 5
  - id: string-return-function-ratio
    desc: String-returning functions dominate the functions
    crit: component
    conf: 0.8
    # Density floor: the fraction of all functions that are bare string returners.
    # A substitution-table decoder is almost entirely such functions; a normal
    # module (e.g. 6 of 21 functions = 0.29) stays well under the threshold.
    if:
      type: metrics
      field: 'ast.string_return_function_ratio'
      min: 0.5
  - id: function-returns-variable-string
    desc: Function returns variable string value
    crit: notable
    conf: 0.8
    count_min: 5
    if:
      type: tree-sitter
      query: |
        (function_declaration
          (statement_block
            (variable_declaration
              (variable_declarator
                name: (identifier) @var
                value: (string)
              )
            )
            (return_statement
              (identifier) @ret
            )
          )
          (#eq? @var @ret)
        )
composite_rules:
  - id: function-returns-string-literal
    desc: Function that returns a string literal (common
    crit: suspicious
    conf: 0.8
    # Both a raw floor AND a density floor: many string-returning helpers that
    # also dominate the file. The ratio replaces the old size-scaling count-only
    # gate (`ast.string_return_function_count >= 5`), which fired on any large
    # hand-written module with five string-returning functions.
    all:
      - id: string-return-function-count
      - id: string-return-function-ratio
    unless:
      # Test mock files (vitest/jest) are full of `vi.fn(() => 'string')`
      # stubs returning string literals — not a substitution-table decoder.
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::js-bdd-suite-text
      - id: metadata/file/text/format::jinja-template-source
      # Minified webpack/esbuild bundles legitimately have many small
      # string-returning helpers; not a decoder table.
      - id: metadata/library/structure::js-any-bundle-output
