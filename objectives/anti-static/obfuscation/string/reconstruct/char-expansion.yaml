defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: char-expansion-obfuscation
    desc: Character expansion via spaced concatenation
    crit: suspicious
    conf: 0.9
    count_min: 5
    if:
      type: string_literal
      regex: \s\+\s\s['"][A-Za-z0-9]['"]\s\s\+
  - id: single-char-concat-pattern
    desc: Repeated single-character concatenation
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    count_min: 3
    if:
      type: text
      regex: '["'']\s*\+\s*["''][^"''\\]{0,2}["'']\s*\+'
  - id: js-dominant-char-ratio
    desc: 'Single character dominates content'
    crit: suspicious
    conf: 0.88
    mbc: B0032
    attack: T1027
    if:
      type: metrics
      field: text.most_common_ratio
      min: 0.85
      min_size: 4096
    # Large zero-filled protocol fixtures and other test data can have the
    # same byte ratio without hiding executable logic.
    unless:
      - id: metadata/package/testing/presence/harness::spec-test-filename
  # C/C++ source: char-by-char array construction to hide strings from static analysis
  # e.g.: buf[0]='/'; buf[1]='l'; buf[2]='i'; buf[3]='b'; ... to build "/lib/defs/f"
  # Brackets are stripped from cleave's raw C search, so we detect the repeated char
  # literal assignments (= '/') that appear in sequence.
  - id: c-char-array-path-construction
    desc: 'C char-by-char array construction'
    crit: suspicious
    conf: 0.82
    for: [c, cpp]
    mbc: B0032
    attack: T1027
    count_min: 3
    if:
      type: text
      regex: = '/[a-z]'
    unless:
      - type: text
        substr: automatically generated
      - type: text
        substr: DO NOT EDIT

  - id: dict-key-numeric-obfuscation
    desc: Numeric-keyed dict literals as string store
    crit: suspicious
    conf: 0.88
    for: [javascript]
    attack: T1027
    mbc: B0032
    count_min: 20
    if:
      type: text
      regex: '\["[0-9]{4}"\]'
    unless:
      - id: objectives/anti-static/obfuscation/code-metrics/structure/
      - id: metadata/library/structure::js-dist-asset-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/package/testing/harness/runtime/
      - type: text
        substr: automatically generated
      - type: text
        substr: DO NOT MODIFY BY HAND
