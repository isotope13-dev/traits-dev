defaults:
  platforms: [windows, unix]
traits:
  - id: js-string-key-array
    desc: Array initialized with short strings
    crit: component
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: 'new\s+Array\((\s*[''"][^"'']{2,5}[''"]\s*,?){5,}\)'
  - id: js-string-key-array-literal
    desc: Array literal with short string keys
    crit: suspicious
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      regex: 'var\s+\w+\s*=\s*\[\s*"__\w{2,4}"'
  - id: js-nested-array-table-mapping-dup
    desc: Nested array structure used for table mapping
    crit: suspicious
    conf: 0.8
    for: [javascript]
    size_max: 512000
    count_min: 3
    if:
      type: tree-sitter
      language: javascript
      query: "(array\n  (array)\n  (array)\n)"
  - id: js-indexed-short-token-grid
    desc: Dense indexed short-token grid
    crit: suspicious
    conf: 0.92
    size_max: 256000
    for: [javascript]
    count_min: 80
    if:
      type: text
      regex: \[\d+\]\[\d+\]='[0-9a-z]{1,2}'
  - id: js-string-count-extreme
    desc: Extreme JavaScript string count
    crit: component
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: metrics
      field: strings.total
      min: 10000
  - id: js-max-string-length-short
    desc: JavaScript strings capped at five
    crit: component
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: metrics
      field: strings.max_length
      max: 5
  # String reconstructed via `.split('')...join('')`. Covers both the
  # textbook reverse idiom and more involved transforms — judgement is
  # left to the reader. Kept as `notable` because supply-chain attackers
  # commonly hide reversed strings (domains, commands) this way; in
  # differential analysis, a previously-clean file gaining this pattern
  # is worth surfacing.
  - id: split-join-reconstruction
    desc: String reconstructed via split/join
    crit: notable
    conf: 0.8
    for: [javascript]
    size_max: 10000
    if:
      type: text
      regex: \.split\(\s*['"]['"]\s*\).{0,50}\.join\(\s*['"]['"]\s*\)
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/harness/runtime/
composite_rules:
  - id: js-extreme-short-token-density
    desc: Extreme density of short tokens
    crit: suspicious
    conf: 0.9
    size_max: 2097152
    for:
      - javascript
      - typescript
    all:
      - id: js-string-count-extreme
      - id: js-max-string-length-short
    unless:
      - id: metadata/library/mermaid::mermaid-bundle-marker
      - id: metadata/library/babel::babel-bundle-marker
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/build/bundler::babel-transpiled
  - id: js-indexed-array-string-reconstruction
    desc: Indexed array string reconstruction
    crit: suspicious
    conf: 0.92
    for: [javascript, typescript]
    all:
      - id: micro-behaviors/data/control-flow/analysis::js-map-typeof-string-branch
      - id: micro-behaviors/data/control-flow/analysis::js-map-conditional-index-lookup
      - id: micro-behaviors/data/control-flow/analysis::js-map-result-empty-join
    near_lines: 3
    unless:
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-dist-asset-bundle
      - id: metadata/library/structure::js-hashed-asset-bundle
      - id: metadata/library/structure::next-static-js-chunk
