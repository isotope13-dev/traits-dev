defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-string-key-array
    desc: Array with multiple short string keys
    crit: notable
    conf: 0.7
    for: [javascript, typescript]
    if:
      type: text
      regex: 'var\s+\w+\s*=\s*new\s+Array\(((\s*[''"][^"'']{2,5}[''"]|\s*\w{2,5})\s*,?){5,}\);

'
  - id: js-string-key-array-literal
    desc: Array literal with short string keys
    crit: suspicious
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      regex: 'var\s+\w+\s*=\s*\[\s*"__\w{2,4}"'
  - id: js-nested-array-table-mapping-dup
    desc: Nested array structure used for table mapping
    crit: suspicious
    conf: 0.8
    for: [javascript]
    size_max: 512000
    count_min: 3
    if:
      type: ast
      language: javascript
      query: "(array\n  (array)\n  (array)\n)"
  - id: js-string-dict-map
    desc: Object mapping short strings to single characters
    crit: suspicious
    conf: 0.8
    size_max: 200000
    for: [javascript, typescript]
    if:
      type: text
      regex: 'var\s+\w+\s*=\s*\{\s*"__\w{2,4}":\s*\(1,\s*"'
  - id: js-indexed-short-token-grid
    desc: Dense indexed short-token grid
    crit: suspicious
    conf: 0.92
    size_max: 256000
    for: [javascript]
    count_min: 80
    if:
      type: text
      regex: \[\d+\]\[\d+\]='[0-9a-z]{1,2}'
  - id: js-string-count-extreme
    desc: Extreme JavaScript string count
    crit: component
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: metrics
      field: strings.total
      min: 10000
  - id: js-max-string-length-short
    desc: JavaScript strings capped at five
    crit: component
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: metrics
      field: strings.max_length
      max: 5
  - id: mermaid-bundle-marker
    desc: Mermaid bundled library marker
    crit: baseline
    conf: 0.99
    for: [javascript]
    if:
      type: text
      substr: 'Unknown stretchy delimiter.'
composite_rules:
  - id: js-extreme-short-token-density
    desc: Extreme density of short tokens
    crit: suspicious
    conf: 0.9
    for:
      - javascript
      - typescript
    all:
      - id: js-string-count-extreme
      - id: js-max-string-length-short
    unless:
      - id: mermaid-bundle-marker
