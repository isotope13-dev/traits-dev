defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: substitution-map
    desc: Variable substitution map using comma operator
    crit: suspicious
    conf: 0.95
    count_min: 10
    per_kb_min: 2.0
    if:
      type: text
      regex: '\b(var|let|const)\s+\w+\s*=\s*\[\s*\(\s*["''][^"''\r\n]{1,12}["'']\s*,'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/library/nodeunit/
  - id: array-eval
    desc: Array reconstruction feeding eval
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\[\s*["'']conca["'']\s*\+\s*["'']t["'']\s*\]'
  - id: wv-array
    desc: Character array using comma tuples
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: 'var\s+\w+\s*=\s*\[\s*\(\s*["''][^"'']{1,120}["'']\s*,\s*\w+\s*\)\s*,'
  - id: reconstruction-loop
    desc: String reconstruction loop
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\w+\s*=\s*\w+\[\s*["'']conca["'']\s*\+\s*["'']t["'']\s*\]'
  - id: function-fragmentation
    desc: Function-based string fragmentation
    crit: notable
    conf: 0.95
    size_min: 1000
    size_max: 500000
    # Migrated from a `(function_declaration body: (return_statement (string)))`
    # query (count_min: 20) to the cached `ast.string_return_function_count`
    # metric — 20+ string-returning functions is the fragmentation signal.
    if:
      type: metrics
      field: 'ast.string_return_function_count'
      min: 20
    unless:
      - id: metadata/library/generated::laya-engine-runtime-marker
      - id: well-known/lib/web-ui-vendors::createjs-library-marker
      # Tree-sitter grammar files use many short rule-builder callbacks that
      # return string literals.  That is declarative parser source, not a
      # fragmented string decoder.
      - type: text
        substr: 'module.exports = grammar('
