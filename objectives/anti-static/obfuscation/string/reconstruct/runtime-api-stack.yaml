# Runtime-API stack-string artifacts.
#
# Stack-string obfuscation builds API/program names char-by-char on the
# stack at runtime and resolves them via LoadLibrary+GetProcAddress.
# The stng extractor recovers each ~16-byte register chunk separately,
# producing characteristic *truncated* fragments — `CreateProces`
# (missing trailing `s`), `InternetCloseHan` (truncated mid-word), or
# tightly-anchored short tokens like `cmd.exe ` (4 bytes + trailing
# space within a 16-byte chunk).
#
# A truncated API name is the obfuscation signal — legitimate code
# stores the name as one literal and the extractor sees the whole
# token. These atoms detect the truncation/chunking artifacts only;
# the plain non-truncated strings live in their canonical
# micro-behaviors locations.
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1027.007"
  mbc: "B0032"

traits:
  - id: stack-cmd-exe-chunk
    desc: cmd.exe + space stack-string chunk
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: "^cmd\\.exe\\s$"

  - id: stack-create-process-truncated
    desc: CreateProcess truncated stack fragment
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: CreateProces

  - id: stack-virtualalloc-truncated
    desc: VirtualAlloc truncated stack fragment
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: VirtualAllo

  - id: stack-loadlibrary-truncated
    desc: LoadLibrary truncated stack fragment
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: LoadLibrar

  - id: stack-getprocaddress-truncated
    desc: GetProcAddress truncated stack fragment
    crit: notable
    conf: 0.92
    if:
      type: text
      exact: GetProcAddr
