# Token-placeholder reconstruction inside encoded Python carriers.
# PyPI stubs (xolo* / similar) hide identifiers as __TOKEN__NNNN then rebuild
# them with a long .replace() chain before exec. Outer source only shows
# base64+exec; the rebuild lives in the decoded layer — search with
# type: encoded so the next family variant still matches without pinning
# one package's token alphabet.
#
# Note: encoded facts are one blob per carrier, so density must live inside
# a single regex match (count_min over occurrences will not climb).
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: B0032

traits:
  - id: encoded-dunder-token-placeholders
    desc: Encoded dunder token placeholders
    crit: component
    conf: 0.85
    if:
      type: encoded
      encoding: base64
      regex: '(__[A-Z]{2,6}__\d{2,}[\s\S]{0,80}){8}'

  - id: encoded-token-replace-call
    desc: Encoded .replace of dunder token
    crit: component
    conf: 0.9
    if:
      type: encoded
      encoding: base64
      regex: '(\.replace\(["'']__[A-Z]{2,6}__\d+["'']\s*,\s*["''][^"'']{0,4}["'']\)){6}'

composite_rules:
  - id: python-encoded-token-replace-exec
    desc: Exec after encoded token-replace rebuild
    crit: hostile
    conf: 0.97
    attack: T1027,T1140,T1059.006
    all:
      - id: encoded-token-replace-call
      - id: encoded-dunder-token-placeholders
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/process/interpreter/python::exec-builtin
    unless:
      - id: metadata/library/runtime/
      - id: metadata/package/testing/
