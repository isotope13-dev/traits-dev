defaults:
  platforms: [windows]
  for: [lnk, batch]
traits:
  - id: for-loop-string-reconstruction
    desc: Reconstructs strings using chained for loops
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)(for\s+/f\s+"[^"]{0,50}"\s+%[a-z]\s+in\s+\([^)]{0,150}\)\s+do\s*){3,}'
