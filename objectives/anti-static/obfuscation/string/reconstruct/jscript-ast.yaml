defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-array-parenthesized-init-ast
    desc: Character array with parenthesized elements
    crit: suspicious
    conf: 0.95
    count_min: 8
    size_max: 200000
    if:
      type: ast
      language: javascript
      query: "(array\n  (parenthesized_expression)\n) @js_array\n"
    unless:
      - type: basename
        regex: "(\\.component\\.(pug|vue)|graphviz(\\.min)?\\.js)$"
      - type: basename
        regex: "\\.(rkt|scrbl)$"
      - type: text
        substr: "(ngModel)"
      - type: text
        substr: "@hpcc-js/wasm"
      - type: text
        substr: "Generator is already executing."
      - id: well-known/app/pandoc::package-path
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
  - id: js-var-sequence-init-ast
    desc: Variable initialized from string sequence
    crit: suspicious
    conf: 0.95
    count_min: 10
    if:
      type: ast
      language: javascript
      query: "(assignment_expression\n  right: (parenthesized_expression\n    (sequence_expression\n      (string)\n      (string)\n    )\n  )\n) @js_sequence_init\n"
  - id: js-dynamic-property-concat
    desc: Property access using concatenated strings
    crit: component
    conf: 0.8
    count_min: 3
    if:
      type: ast
      language: javascript
      query: "(subscript_expression\n  index: (binary_expression\n    left: (string)\n    right: (string)\n  )\n) @concat_prop\n"
