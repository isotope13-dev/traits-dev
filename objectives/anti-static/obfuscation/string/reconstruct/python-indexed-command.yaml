defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1027
  mbc: B0032

traits:
  - id: python-indexed-shell-command
    desc: Python shell command from indexed characters
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '\bos\.system\s*\(\s*[A-Za-z_]\w*\[\d+\](\s*\+\s*[A-Za-z_]\w*\[\d+\]){2,}'
