defaults:
  platforms: [windows]
  for: [javascript]
  size_min: 8000
  size_max: 500000

traits:
- id: even-index-charat-loop
  desc: Even-index charAt rebuild loop
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: 'new Array\(\); for \(i=0;i<\w+\.length;i\+\+\)if\(i%2==0\)\w+\.push\('

- id: even-index-loop-guard
  desc: Even-index guarded rebuild loop
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'for\s*\(\w+=0;\w+<\w+\.length;\w+\+\+\)if\(\w+%2==0\)'

- id: plus-equals-charat
  desc: String rebuilt via charAt append
  crit: suspicious
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: '\w+\s*\+=\s*\w+\.charAt\(\w+\)'
  unless:
  - type: trait
    id: vendor-minified-js-name

- id: vendor-minified-js-name
  desc: Common vendor minified JS name
  crit: component
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '^(jquery(-ui)?|swagger).{1,64}\.(js|dll)$|^Swashbuckle.{0,32}SwaggerUI\.dll$'

- id: chunk-js-name
  desc: Chunk-style JavaScript filename
  crit: baseline
  conf: 0.9
  if:
    type: path
    basename: true
    regex: '^(chunk|[a-z][a-z0-9_]*)-[A-Z0-9]{8}\.js$'

- id: swashbuckle-swaggerui-dll-name
  desc: Swashbuckle SwaggerUI DLL name
  crit: baseline
  conf: 0.9
  for: [pe, zip]
  if:
    type: path
    regex: '(^|!!|[\\/])Swashbuckle\.AspNetCore\.SwaggerUI\.dll$'

- id: even-index-charat-append-inline
  desc: Even-index inline charAt append loop
  crit: suspicious
  conf: 0.98
  if:
    type: text
    regex: 'if\(\w+%2==0\)\w+\+=\w+\.charAt\(\w+\)'

- id: bracket-charat-index
  desc: Bracketed charAt index call
  crit: baseline
  conf: 0.2
  if:
    type: text
    substr: '["charAt"](i)'

- id: split-empty-wrapper
  desc: Split empty string wrapper
  crit: component
  conf: 0.96
  if:
    type: text
    substr: "[\"s\"+\"pl\"+\"it\"]('')"

- id: split-empty-wrapper-short
  desc: Split empty string short wrapper
  crit: component
  conf: 0.96
  if:
    type: text
    substr: "[\"spl\"+\"it\"]('')"

- id: split-empty-wrapper-short-assign
  desc: Split wrapper assigned to same buffer
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: "\\w+\\s*=\\s*\\w+\\[\"spl\"\\+\"it\"\\]\\(''\\)"

- id: reverse-wrapper
  desc: Reverse call wrapper
  crit: component
  conf: 0.96
  if:
    type: text
    substr: '["r"+"ever"+"se"]()'

- id: reverse-wrapper-short
  desc: Reverse call short wrapper
  crit: component
  conf: 0.96
  if:
    type: text
    substr: '["rever"+"se"]()'

- id: reverse-wrapper-short-assign
  desc: Reverse wrapper assigned to same buffer
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: '\w+\s*=\s*\w+\["rever"\+"se"\]\(\)'

- id: join-empty-wrapper
  desc: Join empty string wrapper
  crit: component
  conf: 0.96
  if:
    type: text
    substr: "[\"j\"+\"o\"+\"in\"]('')"

- id: join-empty-wrapper-short
  desc: Join empty string short wrapper
  crit: component
  conf: 0.96
  if:
    type: text
    substr: "[\"jo\"+\"in\"]('')"

- id: join-empty-wrapper-short-assign
  desc: Join wrapper assigned to same buffer
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: "\\w+\\s*=\\s*\\w+\\[\"jo\"\\+\"in\"\\]\\(''\\)"

- id: many-comment-chars
  desc: File has many comment characters
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: comments.chars
    min: 20000
  unless:
  - id: metadata/library/structure::js-any-bundle-output
  - id: chunk-js-name
  - id: swashbuckle-swaggerui-dll-name
  - id: micro-behaviors/data/encode/embedded::reversed-pe-base64-header
  - type: basename
    regex: '(^|!!).{0,200}highlight(\.pack)?(\.min)?\.js$'
  - type: text
    substr: swagger_ui_dist

- id: max-line-length-20000
  desc: File has 20k character line
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: text.max_line_length
    min: 20000
  unless:
  - id: metadata/library/structure::js-any-bundle-output
  - id: swashbuckle-swaggerui-dll-name
  - id: micro-behaviors/data/encode/embedded::reversed-pe-base64-header

- id: minified-js-name
  desc: Minified JavaScript filename
  crit: component
  conf: 0.9
  if:
    type: path
    basename: true
    regex: \.min\.js$

- id: blazor-dotnet-interop-marker
  desc: Blazor .NET interop marker present
  crit: component
  conf: 0.9
  if:
    type: text
    substr: __dotNetObject

- id: swagger-ui-dist-marker
  desc: Swagger UI dist asset marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: swagger_ui_dist

- id: swagger-ui-bundle-marker
  desc: Swagger UI bundle symbol marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'SwaggerUIBundle\(|\.swagger-ui'

- id: eval-gate-equals-eleven
  desc: Eval gated on equals eleven
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'if\s*\(\s*\w+\s*==\s*11\s*\)\s*eval\(\w+\)'

- id: eval-gate-equals-one
  desc: Eval gated on equals one
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'if\s*\(\s*\w+\s*==\s*1\s*\)\s*eval\(\w+\)'

- id: comment-tail-eval-gate
  desc: Comment tail eval gate after CC block
  crit: suspicious
  conf: 0.98
  if:
    type: text
    regex: '@\*/\s*if\s*\(\s*\w+\s*==\s*1\s*\)\s*eval\(\w+\)'

composite_rules:
- id: even-index-charat-array-loader
  desc: Even-index charAt array loader
  crit: suspicious
  conf: 0.98
  all:
  - id: even-index-charat-loop
  - id: bracket-charat-index
- id: even-index-charat-append-loader
  desc: Even-index charAt append loader
  crit: suspicious
  conf: 0.98
  all:
  - id: even-index-loop-guard
  - id: plus-equals-charat
- id: comment-blob-layout
  desc: Comment-dominant long-line blob
  crit: component
  conf: 0.9
  all:
  - id: many-comment-chars
  - id: max-line-length-20000
  unless:
  - id: benign-comment-blob-context
  - id: swashbuckle-swaggerui-dll-name
  - id: metadata/build/npm::node-modules
- id: benign-comment-blob-context
  desc: Benign comment blob context
  crit: component
  conf: 0.9
  any:
  - id: metadata/package/tooling::babel-transpiled
  - id: metadata/package/tooling::rollup-bundled
  - id: minified-js-name
  - id: metadata/library/modernizr::build-banner
  - id: blazor-dotnet-interop-marker
  - id: swagger-ui-dist-marker
  - id: swagger-ui-bundle-marker
  - id: chunk-js-name
  - id: metadata/library/structure::js-webpack-bundle
  - id: objectives/supply-chain/trojanized/app/package::benign-svelte-runtime-hidden-listener-context
  - id: metadata/library/runtime::ncc-webpack-runtime-marker
  - id: micro-behaviors/process/create/shell/host::require-vscode
  - id: vendor-minified-js-name
  - id: swashbuckle-swaggerui-dll-name
- id: split-reverse-join-wrapper
  desc: Split reverse join wrapper chain
  crit: suspicious
  conf: 0.98
  all:
  - id: split-empty-wrapper
  - id: reverse-wrapper
  - id: join-empty-wrapper
- id: split-reverse-join-wrapper-short
  desc: Split reverse join short wrapper chain
  crit: suspicious
  conf: 0.98
  all:
  - id: split-empty-wrapper-short
  - id: reverse-wrapper-short
  - id: join-empty-wrapper-short
- id: split-reverse-join-wrapper-short-assign
  desc: Split reverse join short assignments
  crit: suspicious
  conf: 0.99
  all:
  - id: split-empty-wrapper-short-assign
  - id: reverse-wrapper-short-assign
  - id: join-empty-wrapper-short-assign
- id: split-reverse-join-wrapper-any
  desc: Split reverse join wrapper variant
  crit: suspicious
  conf: 0.98
  any:
  - id: split-reverse-join-wrapper
  - id: split-reverse-join-wrapper-short
- id: eval-gate-loader
  desc: Eval gate loader variant
  crit: suspicious
  conf: 0.96
  any:
  - id: eval-gate-equals-eleven
  - id: eval-gate-equals-one
- id: even-index-loader-variant
  desc: Even-index loader variant
  crit: suspicious
  conf: 0.98
  any:
  - id: even-index-charat-array-loader
  - id: even-index-charat-append-loader
- id: even-index-reverse-loader
  desc: Even-index reverse eval loader
  crit: hostile
  conf: 0.99
  all:
  - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-on
  - id: even-index-loader-variant
  - id: split-reverse-join-wrapper-any
  - id: eval-gate-loader
  - id: comment-blob-layout
- id: even-index-reverse-loader-short-append
  desc: Short wrapper even-index eval loader
  crit: hostile
  conf: 0.99
  all:
  - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-on
  - id: even-index-loop-guard
  - id: plus-equals-charat
  - id: split-empty-wrapper-short
  - id: reverse-wrapper-short
  - id: join-empty-wrapper-short
  - id: eval-gate-equals-one
  - id: comment-blob-layout
- id: even-index-reverse-loader-comment-tail
  desc: JScript conditional-comment tail eval loader
  crit: hostile
  conf: 0.995
  attack: T1059.007, T1027
  mbc: B0032
  all:
  - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-on
  - id: comment-blob-layout
  - id: even-index-charat-append-inline
  - id: split-reverse-join-wrapper-short-assign
  - id: comment-tail-eval-gate
- id: even-index-reverse-loader-dotfill
  desc: Dot-fill conditional-comment eval loader
  crit: hostile
  conf: 0.998
  attack: T1059.007, T1027
  mbc: B0032
  all:
  - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-on
  - id: even-index-charat-append-inline
  - id: split-reverse-join-wrapper-short-assign
  - id: comment-tail-eval-gate
  - id: comment-blob-layout
- id: even-index-reverse-loader-cc-tail-chain
  desc: Conditional-comment tail even-index chain
  crit: hostile
  conf: 0.999
  attack: T1059.007, T1027
  mbc: B0032
  all:
  - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-on
  - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-tail-eval
  - id: even-index-charat-append-loader
  - id: split-reverse-join-wrapper-short-assign
  - id: comment-blob-layout
