defaults:
  platforms:
    - windows
  for: [source, documents, binaries, powershell, batch, vbs]
  crit: suspicious
  conf: 0.9
traits:
  - id: cmd-caret-obfuscation
    desc: CMD caretaker obfuscation (^)
    for:
      - pe
      - batch
      - powershell
    if:
      type: text
      regex: ([a-zA-Z0-9]\^){5,}[a-zA-Z0-9]
      section: .text
    unless:
      - id: metadata/binary/framework::dotnet-metadata
  - id: cmd-v-r-flags
    desc: CMD delayed expansion and run flags
    for:
      - pe
      - batch
      - powershell
    if:
      type: text
      regex: (?i)cmd\s+/[vr]\s+/[vr]
      section: .text
composite_rules:
  - id: obfuscated-cmd-execution
    desc: Obfuscated CMD execution
    crit: hostile
    conf: 0.95
    for:
      - pe
      - batch
      - powershell
    all:
      - id: cmd-caret-obfuscation
      - id: cmd-v-r-flags
