defaults:
  attack: T1027
  mbc: F0001.005
  platforms:
    - windows
  for:
    - vbs
traits:
  - id: centrostigmatic-padding-line
    desc: Repeated junk replace padding
    crit: suspicious
    conf: 0.99
    count_min: 1000
    if:
      type: text
      exact: 'byous = byous & Replace("centrostigmatic", "*", "")'
  - id: centrostigmatic-marker
    desc: centrostigmatic delimiter token
    crit: component
    conf: 0.97
    count_min: 100
    if:
      type: text
      substr: centrostigmatic
  - id: falan-marker
    desc: falan delimiter token
    crit: component
    conf: 0.97
    count_min: 100
    if:
      type: text
      substr: falan
  - id: hex-loop-prefix
    desc: Hex decoder &H prefix
    crit: component
    conf: 0.96
    if:
      type: text
      regex: Chr\(38\)\s*&\s*Chr\(72\)
  - id: cint-mid-hex-loop
    desc: CInt Mid hex loop
    crit: component
    conf: 0.96
    if:
      type: text
      substr: Chr(CInt(heteracanth & Mid(
  - id: hex-loop-step-two
    desc: Hex loop step two
    crit: component
    conf: 0.94
    if:
      type: text
      substr: Step 2
  - id: user-env-access
    desc: User environment collection
    crit: component
    conf: 0.94
    if:
      type: text
      substr: 'Environment("User")'
  - id: internal-db-cache-var
    desc: INTERNAL_DB_CACHE env var
    crit: component
    conf: 0.98
    if:
      type: text
      substr: INTERNAL_DB_CACHE
  - id: iex-env-stager
    desc: IEX environment stager
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: 'IEX $env:'
  - id: delimited-iex-env-stager
    desc: Delimited IEX environment stager
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: IcentrostigmaticEcentrostigmaticX.{0,40}\$centrostigmatic
composite_rules:
  - id: custom-hex-loop
    desc: Custom VBScript hex decoder
    crit: suspicious
    conf: 0.97
    all:
      - id: hex-loop-prefix
      - id: cint-mid-hex-loop
      - id: hex-loop-step-two
  - id: env-cache-powershell-stager
    desc: User env PowerShell stager
    crit: suspicious
    conf: 0.98
    all:
      - id: user-env-access
      - id: internal-db-cache-var
    any:
      - id: iex-env-stager
      - id: delimited-iex-env-stager
  - id: delimiter-packed-vbscript-stager
    desc: Delimiter packed VBScript stager
    crit: suspicious
    conf: 0.99
    all:
      - id: centrostigmatic-padding-line
      - id: custom-hex-loop
    any:
      - id: falan-marker
      - id: centrostigmatic-marker
      - id: env-cache-powershell-stager
