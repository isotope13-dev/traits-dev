# Go XOR string deobfuscation patterns.
# Detects rolling-key XOR decode loops and the obfuscated byte-array tables
# that feed them. Common in Go-based stagers/stealers that need to hide
# sensitive paths, URLs, or env-var names from static review.
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1140
  mbc: B0032
traits:
  # out[i] = enc[i] ^ key[i % len(key)]
  - id: go-rolling-xor-loop
    desc: Go XOR modulo loop
    crit: component
    conf: 0.92
    if:
      type: metrics
      field: 'ast.xor_mod_loop_count'
      min: 1
    unless:
      - type: text
        substr: "CalcNativePassword"
      - type: text
        substr: "github.com/go-mysql-org/go-mysql"
      - type: text
        substr: 'package libc // import "modernc.org/libc"'
  - id: go-xor-byte-loop-text
    desc: Go XOR byte-loop indexed by modulo length
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '\^\s*\w+\[\s*\w+\s*%\s*len\('
    unless:
      - type: text
        substr: "CalcNativePassword"
      - type: text
        substr: "github.com/go-mysql-org/go-mysql"
      - type: text
        substr: 'package libc // import "modernc.org/libc"'
  - id: go-obfuscated-byte-table
    desc: Long byte literal table
    # A `[]byte{0x..,..}` table is neutral data on its own — crypto S-boxes,
    # protocol fixtures (proxyprotocol_test.go), embedded lookup tables. It only
    # signals obfuscation paired with a decode loop, so it's a component
    # building block for go-xor-string-decoder, not a standalone verdict.
    crit: component
    conf: 0.85
    count_min: 2
    if:
      type: text
      regex: '\[\]byte\{\s*0x[0-9A-Fa-f]{2}(\s*,\s*0x[0-9A-Fa-f]{2}){15,}'
composite_rules:
  - id: go-base64-xor-string-decoder
    desc: Go base64 XOR string decoder
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/data/decode/base64::std-encoding-decode-string
    any:
      - id: go-rolling-xor-loop
      - id: go-xor-byte-loop-text
  - id: go-xor-string-decoder
    desc: Go program contains XOR string decoder over byte tables
    crit: suspicious
    conf: 0.95
    near_lines: 60
    any:
      - id: go-rolling-xor-loop
      - id: go-xor-byte-loop-text
    all:
      - id: go-obfuscated-byte-table
  - id: go-static-string-evasion
    desc: Multiple static-string evasion techniques in Go source
    crit: notable
    conf: 0.93
    needs: 2
    any:
      - id: go-rolling-xor-loop
      - id: go-xor-byte-loop-text
      - id: go-obfuscated-byte-table
      - id: objectives/anti-static/obfuscation/string/concat::go-string-fragment-joiner
      - id: objectives/anti-static/obfuscation/string/concat::go-many-fragment-joins
