defaults:
  platforms:
  - windows
  - unix
  for:
  - python
traits:
- id: python-xor-byte-loop
  desc: Python loop with XOR byte manipulation
  crit: component
  conf: 0.8
  if:
    type: tree-sitter
    query: "(for_statement\n  body: (block\n    (_\n      (assignment\n        left:\
      \ (subscript)\n        right: (binary_operator) @bin\n      )\n    )\n  )\n\
      \  (#match? @bin \"\\\\^\")\n)\n"
- id: python-printable-char-check
  desc: Python logic checking printable ASCII
  crit: component
  conf: 0.7
  if:
    type: tree-sitter
    query: "(comparison_operator\n  (integer) @min\n  (identifier)\n  (integer) @max\n\
      \  (#eq? @min \"32\")\n  (#match? @max \"^12[67]$\")\n)\n"
- id: python-sliding-key-loop
  desc: Python for-range-over-len(X) loop
  crit: component
  conf: 0.4
  if:
    type: tree-sitter
    query: "(for_statement\n  right: (call\n    function: (identifier) @func\n   \
      \ arguments: (argument_list\n      (call\n        function: (identifier) @len\n\
      \      )\n    )\n  )\n  (#eq? @func \"range\")\n  (#eq? @len \"len\")\n)\n"
- id: python-rolling-xor-loop
  desc: Python rolling-key XOR loop
  crit: suspicious
  conf: 0.9
  # The `a ^ b[i % n]` rolling-XOR shape is a cached AST fact emitted by the
  # unified walker (`ast.xor_mod_loop_count`); `for: [python]` scopes it to
  # Python sources, matching the original language-specific query.
  if:
    id: micro-behaviors/data/encode/xor::xor-decoding-loop
  unless:
  - id: well-known/tool/detection/malware-config-parser
  - id: well-known/tool/detection/security-scanner::defensive-scanner-tool-context
  - id: micro-behaviors/crypto/library/blockchain::crypto-math-library-context
  - id: python-generic-xor-utility-function
  - type: text
    substr: _NETEASE_SALT
  - type: text
    substr: c[e % c_len] ^ c[(e + 1) % c_len]
  # TorchScript mobile-model debug pickles (`__torch__/.../*.py.debug_pkl`)
  # carry quantization/hashing bit-ops that match the rolling-XOR-mod shape —
  # benign ML internals, not string deobfuscation.
  - type: basename
    regex: '\.debug_pkl$'
- id: python-bytearray-string-buffer
  desc: Python bytearray recovery buffer
  crit: component
  conf: 0.7
  if:
    type: text
    regex: \w+\s*=\s*bytearray\(\)
- id: python-ascii-decode-call
  desc: Python ASCII decode call
  crit: component
  conf: 0.8
  if:
    type: text
    substr: decode('ascii')
  unless:
  - type: text
    substr: start.decode('ascii').encode
- id: python-min-string-length-check
  desc: Recovered string length check
  crit: component
  conf: 0.7
  if:
    type: text
    regex: len\(\w+\)\s*>=\s*4
- id: python-offset-range-loop
  desc: Python decoder offset loop
  crit: component
  conf: 0.8
  size_max: 10240
  if:
    type: text
    regex: 'for\s+\w+\s+in\s+range\s*\(\s*len\(\w+\)\s*\)\s*:'
- id: python-offset-decoder-call
  desc: Python offset decoder call
  crit: component
  conf: 0.85
  size_max: 10240
  if:
    type: text
    regex: \w+\s*=\s*\w*(decode|decrypt)\w*\(\w+,\s*(i|offset)\)
- id: python-recovered-string-sink
  desc: Python recovered string print
  crit: component
  conf: 0.75
  if:
    type: text
    regex: \bprint\s*\(\s*\w[\w\[\]\.]*(\s*\)|\s*,)
- id: python-xor-function-name
  desc: Python XOR utility function name
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'def\s+xor\s*\('
- id: python-xor-utility-doc
  desc: Python XOR utility documentation
  crit: component
  conf: 0.8
  if:
    type: text
    substr: perform XOR operations
- id: doc-install-python-file
  desc: Documentation install Python file
  crit: baseline
  conf: 0.95
  if:
    type: path
    basename: true
    exact: doc_install.py
- id: doxygen-config-assignment
  desc: Doxygen config assignment
  crit: baseline
  conf: 0.95
  if:
    type: text
    substr: 'doxygen="'
composite_rules:
- id: python-generic-xor-utility-function
  desc: Python generic XOR utility function
  crit: component
  conf: 0.85
  all:
  - id: python-xor-function-name
  - id: python-xor-utility-doc
- id: python-printable-string-extractor
  desc: Python extracts printable decoded strings
  crit: suspicious
  conf: 0.95
  all:
  - id: python-bytearray-string-buffer
  - id: python-printable-char-check
  - id: python-min-string-length-check
  - id: python-ascii-decode-call
- id: python-offset-decoder-bruteforce
  desc: Python brute-forces decoder offsets
  crit: suspicious
  conf: 0.9
  all:
  - id: python-offset-range-loop
  - id: python-offset-decoder-call
  any:
  - id: python-bytearray-string-buffer
  - id: python-ascii-decode-call
  - id: python-recovered-string-sink
- id: python-deduplicated-string-dump
  desc: Python prints deduplicated recovered strings
  crit: notable
  conf: 0.9
  unless:
  - id: metadata/library/versioneer::source-file
  - id: doc-install-python-file
  - id: doxygen-config-assignment
  all:
  - id: micro-behaviors/data/control-flow/membership::set-construction
  - id: micro-behaviors/data/control-flow/membership::in-membership-check
  - id: micro-behaviors/data/control-flow/membership::not-in-membership-check
  - id: python-recovered-string-sink
