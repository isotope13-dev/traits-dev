defaults:
  platforms: [windows, unix]
  for: [class, jar, zip]
  attack: T1027
  mbc: F0001
traits:
  - id: java-byte-range-copy
    desc: Java byte range copy
    crit: component
    conf: 0.7
    if:
      type: text
      substr: copyOfRange
  - id: java-custom-rc4-class
    desc: Java custom RC4 class
    crit: component
    conf: 0.82
    if:
      type: text
      substr: main/crypto/RC4
  - id: java-decode-string-method
    desc: Java decodeString method
    crit: component
    conf: 0.74
    if:
      type: text
      substr: decodeString
  - id: java-standard-key-size
    desc: Java fixed key size marker
    crit: component
    conf: 0.68
    if:
      type: text
      substr: STANDARD_KEY_SIZE
composite_rules:
  - id: java-base64-cipher-byte-range-cluster
    desc: Java Base64 decode and Cipher use near byte-range copy
    crit: suspicious
    conf: 0.96
    scope: leaf
    near_bytes: 2048
    all:
      - id: micro-behaviors/data/decode/base64::java-base64-decoding-bytecode
      - id: java-byte-range-copy
      - id: micro-behaviors/crypto/library/provider::cipher-init
    unless:
      # Tomcat's PEM/TLS support legitimately combines Base64, byte-range
      # handling, and javax.crypto.Cipher across its implementation classes.
      - id: well-known/lib/tomcat::embedded-core-jar

  - id: java-base64-rc4-string-protection
    desc: Java Base64 RC4 string protection
    crit: suspicious
    conf: 0.9
    scope: leaf
    all:
      - id: micro-behaviors/data/decode/base64::java-base64-decoder-class
      - id: java-byte-range-copy
      - id: java-custom-rc4-class
    any:
      - id: java-decode-string-method
      - id: java-standard-key-size
      - id: micro-behaviors/crypto/library/provider::cipher-init
