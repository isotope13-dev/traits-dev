defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: function-returns-string-literal
    desc: Function that returns a string literal (common
    crit: suspicious
    conf: 0.8
    count_min: 5
    if:
      type: ast
      query: |
        (function_declaration
          (statement_block
            (return_statement
              (string)
            )
          )
        )
  - id: function-returns-variable-string
    desc: Function returns variable string value
    crit: notable
    conf: 0.8
    count_min: 5
    if:
      type: ast
      query: |
        (function_declaration
          (statement_block
            (variable_declaration
              (variable_declarator
                name: (identifier) @var
                value: (string)
              )
            )
            (return_statement
              (identifier) @ret
            )
          )
          (#eq? @var @ret)
        )
