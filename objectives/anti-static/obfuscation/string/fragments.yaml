defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
traits:
  - id: math-random-fragment
    desc: Math.random string fragment in string literal
    count_min: 2
    unless:
      - id: metadata/library/python-runtime::python-runtime
    if:
      type: string_literal
      regex: '^(Math\.ran|ath\.rando|Random\.)$'
