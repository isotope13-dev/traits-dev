defaults:
  platforms:
    - windows
  for:
    - pe
  crit: suspicious
  attack: T1027
traits:
  - id: broken-loadlibrary
    desc: Obfuscated LoadLibrary string (p_adLibraryA)
    conf: 0.95
    if:
      type: text
      exact: p_adLibraryA
  - id: broken-writeprocessmemory
    desc: 'obfuscated WriteProcessMemory string'
    conf: 0.95
    if:
      type: text
      exact: pritePro_____e_ory
  - id: broken-heapcreate
    desc: Obfuscated HeapCreate string (rejpCreate)
    conf: 0.95
    if:
      type: text
      exact: rejpCreate
  - id: broken-wtsapi
    desc: Obfuscated wtsapi32.dll string (vpidsapi.dll)
    conf: 0.95
    if:
      type: text
      exact: vpidsapi.dll
  - id: missing-vowel-ntunmapview
    desc: Missing-vowel NtUnmapViewOfSection API string
    crit: component
    conf: 0.96
    if:
      type: text
      exact: NtUnmapViwOfSction
  - id: missing-vowel-writeprocessmemory
    desc: Missing-vowel WriteProcessMemory API string
    crit: component
    conf: 0.96
    if:
      type: text
      substr: WritProcssMmory
  - id: missing-vowel-createprocess
    desc: Missing-vowel CreateProcess API string
    crit: component
    conf: 0.96
    if:
      type: text
      regex: CratProcss[AW]
  - id: missing-vowel-suspendthread
    desc: Missing-vowel SuspendThread API string
    crit: component
    conf: 0.94
    if:
      type: text
      substr: SuspndThrad
  - id: missing-vowel-regsetvalueex
    desc: Missing-vowel RegSetValueEx API string
    crit: component
    conf: 0.92
    if:
      type: text
      regex: RgStValuEx[AW]
  # ROT+1 hex-encoded API name obfuscation
  # Each API name is ROT+1 encoded then stored as ASCII hex digits
  # e.g. CreateFileW -> DsfbufGjmfX -> "447366627566476A6D6658" in the binary
  - id: rot1-hex-createfilew
    desc: ROT+1 hex-encoded CreateFileW API name
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "447366627566476A6D6658"
  - id: rot1-hex-createprocessw
    desc: ROT+1 hex-encoded CreateProcessW API name
    crit: component
    conf: 0.97
    if:
      type: text
      substr: "4473666275665173706466747458"
  - id: rot1-hex-setfilepointer
    desc: ROT+1 hex-encoded SetFilePointer API name
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "546675476A6D6651706A6F756673"
  - id: rot1-hex-deletefilea
    desc: ROT+1 hex-encoded DeleteFileA API name
    crit: component
    conf: 0.96
    if:
      type: text
      substr: "45666D667566476A6D6642"
  - id: rot1-hex-getfilesize
    desc: ROT+1 hex-encoded GetFileSize API name
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "486675476A6D66546A7B66"
composite_rules:
  - id: rot1-hex-api-cluster
    desc: ROT+1 hex-encoded Win32 API name cluster
    crit: suspicious
    conf: 0.97
    mbc: B0032
    needs: 2
    any:
      - id: rot1-hex-createfilew
      - id: rot1-hex-createprocessw
      - id: rot1-hex-setfilepointer
      - id: rot1-hex-deletefilea
      - id: rot1-hex-getfilesize
  - id: missing-vowel-winapi-cluster
    desc: Missing-vowel Win32 API name cluster
    crit: suspicious
    conf: 0.96
    mbc: B0032
    needs: 3
    any:
      - id: missing-vowel-ntunmapview
      - id: missing-vowel-writeprocessmemory
      - id: missing-vowel-createprocess
      - id: missing-vowel-suspendthread
      - id: missing-vowel-regsetvalueex
