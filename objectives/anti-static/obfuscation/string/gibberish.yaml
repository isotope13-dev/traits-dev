defaults:
  platforms: [windows, unix]
traits:
  - id: consonant-vowel-gibberish
    desc: Consonant-vowel sequence (machine-generated)
    crit: notable
    conf: 0.8
    for: [binaries, scripts]
    count_min: 3
    if:
      type: text
      regex: (?i)\b[b-df-hj-np-tv-z]?([b-df-hj-np-tv-z][aeiou]){7,}[b-df-hj-np-tv-z]?\b
    not:
      - regex: \.
      - regex: '[A-Z]'
      - substr: InUseBefore
      - substr: InUseAfter
      - substr: Validate
      - substr: Enumerator
      - substr: Metadata
      - substr: MetaFile
      - substr: Remove
      - substr: Manager
      - substr: Parameter
      - regex: (?i)catalog
      - regex: (?i)isolatin
    unless:
      - id: metadata/package::embedded-domain-reputation-catalog
