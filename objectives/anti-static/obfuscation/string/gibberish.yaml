defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: consonant-vowel-gibberish
    desc: Consonant-vowel sequence (machine-generated)
    crit: notable
    conf: 0.8
    for: [binaries, scripts]
    count_min: 2
    if:
      type: string_value
      regex: (?i)\b[b-df-hj-np-tv-z]?([b-df-hj-np-tv-z][aeiou]){7,}[b-df-hj-np-tv-z]?\b
    not:
      - regex: '[A-Z]'
      - substr: InUseBefore
      - substr: InUseAfter
      - substr: Validate
      - substr: Enumerator
      - substr: Metadata
      - substr: MetaFile
      - substr: Remove
      - substr: Manager
      - substr: Parameter
      - regex: (?i)catalog
      - regex: (?i)isolatin
    unless:
      - type: string_value
        regex: (?i)\b[b-df-hj-np-tv-z]?([b-df-hj-np-tv-z][aeiou]){7,}[b-df-hj-np-tv-z]?\b
        section: .rsrc
