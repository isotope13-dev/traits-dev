defaults:
  platforms: [windows, unix]
traits:
  - id: base64-function-keyword
    desc: Base64-encoded 'function' keyword
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      substr: ZnVuY3Rpb24
    unless:
      - id: metadata/library/structure/
      - id: objectives/anti-static/obfuscation/code-metrics/structure/
      - type: text
        substr: 'Build https://modernizr.com/download?'
  - id: base64-powershell-prefix
    desc: Base64-encoded PowerShell command prefix
    crit: suspicious
    conf: 0.8
    size_max: 262144
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: (^|[^A-Za-z0-9])JAB[A-Za-z0-9]{20,}
    not:
      - substr: '@@'
    unless:
      - id: metadata/library/structure::js-large-module-bundle
