defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
  crit: notable
  attack: T1027
traits:
  - id: hex-encoding
    desc: Hex-encoded string pattern
    conf: 0.85
    count_min: 5
    if:
      type: string_value
      regex: \\x[0-9a-fA-F]{2}
    downgrade:
      any:
        - id: metadata/quality/testing::test-directory
        - id: metadata/dev/testing/pytest::pytest
