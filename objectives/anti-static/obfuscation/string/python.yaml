defaults:
  platforms: [windows, unix]
  for:
    - python
  crit: component
  attack: T1027
traits:
  - id: hex-encoding
    desc: Hex-encoded string pattern
    conf: 0.85
    count_min: 5
    if:
      type: string_literal
      regex: \\x[0-9a-fA-F]{2}
    downgrade:
      any:
        - id: metadata/package/testing/presence::test-directory
        - id: metadata/package/testing/scripted::pytest
