# C++ Compile-time String Encryption (xorstr)
# Detects patterns associated with xorstr, skCrypter, and similar
# compile-time string encryption libraries used to evade static analysis
# Common in malware stubs, RATs, and infostealers
defaults:
  attack: T1027
  platforms: [unix, windows]
  for: ["c", "cpp"]
traits:
- id: xorstr-macro
  desc: xorstr string encryption macro
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'xorstr_?\('
- id: encrypt-header-include
  desc: Encrypt.h string encryption header
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: "Encrypt.h"
- id: lazy-importer-include
  desc: lazy_importer API hiding header
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: "lazy_importer"
- id: skcrypter-include
  desc: skCrypter string encryption header
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: skCrypter.h
composite_rules:
- id: cpp-string-encryption
  desc: C++ compile-time string encryption
  crit: suspicious
  conf: 0.9
  any:
  - id: xorstr-macro
  - id: lazy-importer-include
  - id: skcrypter-include
  - id: objectives/anti-static/obfuscation/string/encrypt::ec-wrapper
  all:
  - id: encrypt-header-include
