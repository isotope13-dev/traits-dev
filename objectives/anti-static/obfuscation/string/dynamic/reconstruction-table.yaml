defaults:
  platforms: [windows]
  for:
    - powershell
  attack: T1027
  mbc: B0032
traits:
  - id: ps1-mass-int-assignment
    desc: Massive block of integer assignments
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: (\$\w{10,}\s*=\s*\d+;?[\r\n\s]+){5,}
  - id: ps1-mass-array-assignment
    desc: Massive block of array assignments
    crit: suspicious
    conf: 0.9
    count_min: 3
    if:
      type: string_literal
      regex: \$\w{5,}\s*\+?=\s*@\(
    unless:
      - id: well-known/app/moonshiner::seed-fixture-tree
composite_rules:
  - id: ps1-reconstruction-loader
    desc: PowerShell Payload Reconstruction Loader
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/interpreter/eval::powershell-iex-call
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
    any:
      - id: ps1-mass-int-assignment
      - id: ps1-mass-array-assignment
