defaults:
  platforms: [windows]
  for:
    - powershell
  attack: T1027
  mbc: B0032
traits:
  - id: ps1-mass-int-assignment
    desc: Massive block of integer assignments
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: (\$\w{10,}\s*=\s*\d+;?[\r\n\s]+){5,}
  - id: ps1-mass-array-assignment
    desc: Massive block of array assignments
    crit: suspicious
    conf: 0.9
    count_min: 3
    if:
      type: string_literal
      regex: \$\w{5,}\s*\+?=\s*@\(
  - id: ps1-char-array-cast
    desc: Cast to char array (obfuscation)
    crit: notable
    conf: 0.8
    if:
      type: ast
      query: "(cast_expression\n  type: (type_literal) @type\n  (#match? @type \"(?i)\\[char\\[\\]\\]\")\n)\n"
composite_rules:
  - id: ps1-reconstruction-loader
    desc: PowerShell Payload Reconstruction Loader
    crit: notable
    conf: 0.95
    all:
      - id: objectives/execution/interpreter/eval/invoke::iex
      - id: objectives/command-and-control/dropper/staging/embedded::frombase64string
    any:
      - id: ps1-mass-int-assignment
      - id: ps1-mass-array-assignment
