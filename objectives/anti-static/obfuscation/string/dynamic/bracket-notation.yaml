defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.8
traits:
  - id: hex-escaped-bracket-property
    desc: "Property access via hex-escaped in brackets"
    if:
      type: text
      regex: \[\s*["']([^"'\\]{0,120}\\x[0-9a-fA-F]{2}){3,}[^"'\\]{0,120}["']\s*\]
    unless:
      - id: well-known/lib/phpseclib
    not:
      - regex: \[\s*["']\\x1b\[
  - id: hex-escaped-from-char-code
    desc: 'hex escaped from char code'
    if:
      type: text
      regex: \[\s*["']\\x66\\x72\\x6f\\x6d\\x43\\x68\\x61\\x72\\x43\\x6f\\x64\\x65["']\s*\]
  - id: hex-escaped-char-at
    desc: "detection of [\"\\x63\\x68\\x61\\x72\\x41\\x74\"]"
    if:
      type: text
      regex: \[\s*["']\\x63\\x68\\x61\\x72\\x(41|61)\\x74["']\s*\]
composite_rules: []
