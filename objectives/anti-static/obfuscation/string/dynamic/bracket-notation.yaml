defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.8
traits:
  - id: hex-escaped-bracket-property
    desc: "Hex-escaped bracket property access"
    crit: notable
    if:
      type: text
      regex: \[\s*["']([^"'\\]{0,120}\\x[0-9a-fA-F]{2}){3,}[^"'\\]{0,120}["']\s*\]
    unless:
      - id: well-known/lib/phpseclib
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/files/ecosystem::openclaw-evolver-package-member
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
    downgrade:
      any:
        - id: metadata/package/files/ecosystem::openclaw-evolver-archive-container
    not:
      - regex: \[\s*["']\\x1b\[
  - id: hex-escaped-from-char-code
    desc: Hex-escaped fromCharCode property access
    crit: notable
    if:
      type: text
      regex: \[\s*["']\\x66\\x72\\x6f\\x6d\\x43\\x68\\x61\\x72\\x43\\x6f\\x64\\x65["']\s*\]
    unless:
      - id: metadata/package/files/ecosystem::openclaw-evolver-package-member
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
    downgrade:
      any:
        - id: metadata/package/files/ecosystem::openclaw-evolver-archive-container
  - id: hex-escaped-char-at
    desc: Hex-escaped charAt property access
    crit: notable
    if:
      type: text
      regex: \[\s*["']\\x63\\x68\\x61\\x72\\x(41|61)\\x74["']\s*\]
    unless:
      - id: metadata/package/files/ecosystem::openclaw-evolver-package-member
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
    downgrade:
      any:
        - id: metadata/package/files/ecosystem::openclaw-evolver-archive-container
composite_rules: []
