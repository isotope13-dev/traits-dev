defaults:
  platforms: [unix, windows]
  for: [php]
  crit: suspicious
  conf: 0.85
  attack: T1027
  mbc: B0032

traits:
  - id: dynamic-function-chr-arith
    desc: Dynamic function name via chr arithmetic
    if:
      type: text
      regex: "chr\\s*\\(\\s*\\d+\\s*[+\\-*]"
    count_min: 3
    per_kb_min: 0.5

  - id: chr-concat-function-name
    desc: Builds function name from chr calls
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: "chr\\s*\\(\\s*\\d+\\s*\\)\\s*\\.\\s*chr"
    count_min: 6
    per_kb_min: 0.3
