defaults:
  platforms: [windows, unix]
traits:
  - id: base64-function-keyword
    desc: Base64-encoded 'function' keyword
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: string_literal
      substr: ZnVuY3Rpb24
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
      - type: text
        substr: 'Build https://modernizr.com/download?'
  - id: base64-powershell-prefix
    desc: Base64-encoded PowerShell command prefix
    crit: suspicious
    conf: 0.8
    size_max: 262144
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: (^|[^A-Za-z0-9])JAB[A-Za-z0-9]{20,}
    unless:
      - id: metadata/library/structure::js-large-module-bundle
  - id: long-base64-in-strings
    desc: Extremely long base64 strings (likely encoded payloads)
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    count_min: 2
    if:
      type: string_literal
      regex: '[A-Za-z0-9+/]{300,}={0,2}'
    not:
      - substr: data:image/
    unless:
      - id: metadata/package/testing/presence::test-directory
      - id: metadata/package/testing/scripted::pytest
