defaults:
  platforms: [windows, unix]
traits:
  - id: self-modifying-string-replace
    desc: Self-modifying strings via replace chains
    crit: suspicious
    conf: 0.85
    for: [scripts, binaries]
    count_min: 3
    if:
      type: string_literal
      regex: \$\w+\s*=\s*\$\w+\.replace\(
  - id: custom-delimiter-obfuscation
    desc: Custom delimiter markers for deobfuscation
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    size_max: 500000
    count_min: 3
    if:
      type: string_literal
      regex: '%[a-zA-Z]{3,}%'
    not:
      - substr: "%LIB%"
      - '%SbieVer%'
      - '%USERNAME%'
      - '%USERPROFILE%'
      - '%APPDATA%'
      - '%LOCALAPPDATA%'
      - '%DESKTOP%'
      - '%COMP%'
      - '%HOME%'
      - '%HYPERV%'
      - '%MSSQL%'
      - '%TEMP%'
      - '%TMP%'
      - '%PATH%'
      - '%SYSTEMROOT%'
      - '%COMSPEC%'
      - '%this%'
      - '%IMPORTS%'
      - '%NAME%'
      - regex: ^%[sdifjoOc]
    downgrade:
      any:
        - type: metrics
          field: text.whitespace_ratio
          max: 0.1
  - id: powershell-replace-operator
    desc: PowerShell -replace operator for deobfuscation
    crit: notable
    conf: 0.7
    for:
      - javascript
      - powershell
    count_min: 1
    if:
      type: string_literal
      regex: \-replace\s+['"]
  - id: chained-replace-calls
    desc: Chained replace calls for multi-layer deobfuscation
    crit: component
    conf: 0.9
    for:
      - javascript
      - typescript
    count_min: 1
    if:
      type: symbol
      regex: \.replace\.replace
    not:
      - regex: replaceAll
    unless:
      - type: text
        substr: replace(/~/g,"~0").replace(/\//g,"~1")
  - id: variable-self-assignment-replace
    desc: Variable reassigned with replace operation
    crit: notable
    conf: 0.75
    for: [scripts, binaries]
    count_min: 3
    if:
      type: string_literal
      regex: \$\w+\s*=\s*\$\w+\.replace
  - id: js-parallel-token-arrays
    desc: Parallel token arrays for substitution
    crit: notable
    conf: 0.82
    for:
      - javascript
      - typescript
    count_min: 2
    if:
      type: text
      regex: var\s+\w+\s*=\s*\[\s*\w+(\s*,\s*\w+){5,}\s*\]
  - id: js-regexp-substitution-loop
    desc: Token replacement loop using RegExp
    crit: suspicious
    conf: 0.92
    for:
      - javascript
      - typescript
    size_max: 500000
    count_min: 2
    if:
      type: text
      regex: \.replace\s*\(\s*new\s+RegExp\s*\(\s*\w+\s*,\s*\w+\s*\)
  - id: js-indirect-replace-call
    desc: Indirect string replacement call
    crit: component
    conf: 0.75
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: \[\s*\w+\s*\]\s*\(\s*\w+\s*,\s*\w+\s*\)
  - id: js-global-replace-flag
    desc: Global case-insensitive replacement flag
    crit: component
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: var\s+\w+\s*=\s*["']gi["']
composite_rules:
  - id: js-token-substitution-deobfuscation
    desc: Token substitution string deobfuscation
    crit: suspicious
    conf: 0.92
    for:
      - javascript
      - typescript
    all:
      - id: js-parallel-token-arrays
      - id: js-regexp-substitution-loop
    any:
      - id: js-global-replace-flag
      - id: js-indirect-replace-call
