defaults:
  platforms: [windows, linux, unix, macos, android, ios]
  for: [batch, shell]
traits:
  - id: rundll32-obfuscated-env-var
    desc: Obfuscated Rundll32 with environment variables
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)Ru(%[0-9]|%[^%]{1,120}%)32
  - id: rundll32-obfuscated-split
    desc: Obfuscated Rundll32 split strings
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (?i)r.{1,3}u.{1,3}n.{1,3}d.{1,3}l.{1,3}l.{1,3}3.{1,3}2
composite_rules: []
