defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts]
traits:
  - id: partial-protocol-tps
    desc: Obfuscated HTTP protocol fragment 'tps:/'
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)["']tps:[:/]["']
  - id: partial-protocol-tp
    desc: Obfuscated HTTP protocol fragment 'tp:/'
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)["']tp:[:/]["']
