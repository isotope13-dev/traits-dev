defaults:
  platforms: [linux, macos, windows, unix]
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.9
  mbc: B0032
  attack: T1027
traits:
  - id: echo-tr-decode
    desc: echo piped to tr for decoding
    if:
      type: raw
      regex: echo\s+['"].*?['"]\s*\|\s*tr\s+['"].*?['"]\s+['"].*?['"]
    not:
      - substr: echo "$@" | tr " " "\n"
