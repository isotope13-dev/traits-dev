defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.9
  mbc: B0032
  attack: T1027
traits:
  - id: echo-tr-decode
    desc: echo piped to tr for decoding
    for: [shell]
    if:
      type: text
      regex: echo\s+['"].*?['"]\s*\|\s*tr\s+['"].*?['"]\s+['"].*?['"]
    not:
      - substr: echo "$@" | tr " " "\n"
      - substr: echo "$@" | tr 'abcdefghijklmnopqrstuvwxyz'
      - substr: echo "$@" | tr 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'
      - substr: echo "$test" | tr '\n' ' '
      - substr: echo "$VERSION" | tr '.' ','
      - substr: echo "$EXPECTED_PATHVER" | tr '.' '_'
      - substr: echo "$UNAME_SYSTEM"
      - substr: echo "$(ZSTD_NOMT_FILES)" | tr ' ' '\n' | $(GREP) -q zstdmt
