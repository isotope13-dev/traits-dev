defaults:
  platforms: [windows, unix]
  for: [ruby]
traits:
  - id: ruby-httparty-concat
    desc: "HTTParty call with concatenated args"
    crit: suspicious
    conf: 0.85
    # `HTTParty.get|post( "…" + … )` — an HTTParty request whose URL argument is
    # built by string concatenation (obfuscated endpoint). The receiver-method
    # plus a string-then-`+` inside the call is distinctive source text.
    if:
      type: text
      regex: 'HTTParty\.(get|post)\s*\([^)]{0,200}[''"]\s*\+'
