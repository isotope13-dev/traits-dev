# VBScript String Concatenation Obfuscation
# Splits COM ProgIDs and keywords across string literals joined with & to defeat
# static string-matching. Observed in Kimsuky NIDLOG stagers:
#   CreateObject("Microsof"&"t.XML"&"HT"&"TP")
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027, T1059.005
defaults:
  platforms: [windows]
  for: [vbs]
  mbc: "B0032"
  attack: "T1027"
traits:
  - id: vbs-createobject-concat
    desc: VBScript CreateObject with concatenated ProgID
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: CreateObject\s*\([^)]{5,60}&[^)]{3,60}\)
  - id: vbs-dense-string-concat
    desc: Dense VBScript string concatenation (keyword splitting)
    crit: suspicious
    conf: 0.82
    count_min: 8
    per_kb_min: 2.0
    if:
      type: text
      regex: '"[^"]{1,20}"\s*&\s*"[^"]{1,20}"'
composite_rules:
  - id: vbs-progid-concat-obfuscation
    desc: VBScript COM ProgID split via string concatenation
    crit: suspicious
    conf: 0.92
    any:
      - id: vbs-createobject-concat
      - id: vbs-dense-string-concat
