# Go string concatenation / fragmentation for static-analysis evasion.
# Programs that build identifiers and paths from many short literals via
# helper joiners (variadic strings.Builder funcs, string + concatenation)
# defeat naive grep / cleave string extraction.
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1027
  mbc: B0032
  crit: notable
  conf: 0.8
traits:
  - id: go-string-fragment-joiner
    desc: "Variadic joiner used to fragment literals"
    if:
      type: text
      regex: 'func\s+\w+\s*\(\s*\w+\s*\.\.\.\s*string\s*\)\s*string\s*\{[^}]{0,200}strings\.Builder'
  - id: go-many-fragment-joins
    desc: Many short fragments joined
    crit: component
    count_min: 6
    if:
      type: text
      regex: '\w+\(\s*"[A-Za-z_]{1,3}"\s*,\s*"[A-Za-z_=*\\\\n-]{1,4}"\s*,\s*"[A-Za-z_=*\\\\n-]{1,4}"\s*,'
    not:
      - substr: 'exec.Command'
      - substr: 'fmt.Sprintf'
      - substr: 'fmt.Fprintf'
      - substr: 'fmt.Printf'
      - substr: 'fmt.Println'
      - substr: 'strings.Replace'
      - substr: 'strings.Join'
      - substr: 'CombinedOutput'
