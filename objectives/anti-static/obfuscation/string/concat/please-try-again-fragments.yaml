# Fragments of the English phrase "Please try again", split across string
# literals and concatenated at runtime as an anti-static technique. Generic
# phrase fragments; family composites reference them cross-dir.
defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  size_min: 512
  size_max: 500000000
traits:
  - id: frag-plea
    desc: Plea string fragment
    crit: component
    if:
      type: text
      word: Plea
    not:
      - substr: Please contact
      - substr: Please submit
  - id: frag-se
    desc: se comma space fragment
    crit: component
    if:
      type: text
      substr: se, tr
    unless:
      - id: well-known/app/drivers::nvidia-linux-driver-component
  - id: frag-try
    desc: try string fragment
    crit: component
    for: [javascript]
    if:
      type: text
      substr: try ag
  - id: frag-again-excl
    desc: again exclamation fragment
    crit: component
    if:
      type: text
      substr: ain!
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
