# Short string-literal assignments (var="HTTP", var="GET", var="op", ...) used
# to fragment WSH / network keywords across variables that are later
# concatenated, so substring scanners miss them. Generic string-fragmentation
# primitives; family composites reference them cross-dir.
defaults:
  platforms: [windows]
  for: [javascript, vbs]
  size_max: 131072
traits:
  - id: nemucod-wsh-fragment-http
    desc: WSH fragment assignment of "HTTP"
    crit: component
    if:
      type: text
      regex: '\b[A-Za-z_$][\w$]{0,3}\s*=\s*"HTTP"[,;]?'
  - id: nemucod-wsh-fragment-shell
    desc: WSH fragment assignment of "Shell"
    crit: component
    if:
      type: text
      regex: '\b\w+\s*=\s*"Shell"[,;]?'
  - id: nemucod-wsh-fragment-run
    desc: WSH fragment assignment of "Run"
    crit: component
    if:
      type: text
      regex: '\b\w+\s*=\s*"Run"[,;]?'
  - id: nemucod-network-fragment-getpost
    desc: Short GET/POST fragment
    crit: component
    if:
      type: text
      regex: '(^|[;\n])\s*(var\s+)?[A-Za-z_$][\w$]{0,2}\s*=\s*"(GET|POST)"[,;]?'
  - id: nemucod-network-fragment-http
    desc: Short HTTP scheme fragment
    crit: component
    if:
      type: text
      regex: '(^|[;\n])\s*(var\s+)?[A-Za-z_$][\w$]{0,2}\s*=\s*"(http|https)"[,;]?'
  - id: nemucod-network-fragment-op
    desc: Assigns a short "op" network string fragment
    crit: component
    if:
      type: text
      regex: '(^|[;\n])\s*(var\s+)?[A-Za-z_$][\w$]{0,2}\s*=\s*"op"[,;]?'
  - id: nemucod-network-fragment-en
    desc: Assigns a short "en" network string fragment
    crit: component
    if:
      type: text
      regex: '(^|[;\n])\s*(var\s+)?[A-Za-z_$][\w$]{0,2}\s*=\s*"en"[,;]?'
  - id: nemucod-network-fragment-se
    desc: Assigns a short "se" network string fragment
    crit: component
    if:
      type: text
      regex: '(^|[;\n])\s*(var\s+)?[A-Za-z_$][\w$]{0,2}\s*=\s*"se"[,;]?'
  - id: nemucod-network-fragment-nd
    desc: Assigns a short "nd" network string fragment
    crit: component
    if:
      type: text
      regex: '(^|[;\n])\s*(var\s+)?[A-Za-z_$][\w$]{0,2}\s*=\s*"nd"[,;]?'

composite_rules:
  - id: nemucod-network-fragment-opense
    desc: Assigns an op/en/se/nd network string fragment
    crit: component
    any:
      - id: nemucod-network-fragment-op
      - id: nemucod-network-fragment-en
      - id: nemucod-network-fragment-se
      - id: nemucod-network-fragment-nd
