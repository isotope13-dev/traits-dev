# Short string-literal assignments (var="HTTP", var="GET", var="op", ...) used
# to fragment WSH / network keywords across variables that are later
# concatenated, so substring scanners miss them. Generic string-fragmentation
# primitives; family composites reference them cross-dir.
defaults:
  platforms: [windows]
  for: [javascript, vbs]
  size_max: 131072
traits:
  - id: nemucod-wsh-fragment-http
    desc: WSH fragment assignment of "HTTP"
    crit: component
    if:
      type: text
      regex: '\b[A-Za-z_$][\w$]{0,3}\s*=\s*"HTTP"[,;]?'
  - id: nemucod-wsh-fragment-shell
    desc: WSH fragment assignment of "Shell"
    crit: component
    if:
      type: text
      regex: '\b\w+\s*=\s*"Shell"[,;]?'
  - id: nemucod-wsh-fragment-run
    desc: WSH fragment assignment of "Run"
    crit: component
    if:
      type: text
      regex: '\b\w+\s*=\s*"Run"[,;]?'
  - id: nemucod-network-fragment-getpost
    desc: Assigns a GET or POST string fragment
    crit: component
    if:
      type: text
      regex: '\b\w+\s*=\s*"(GET|POST)"[,;]?'
  - id: nemucod-network-fragment-http
    desc: "Network fragment assign of \"http\" / \"https\""
    crit: component
    if:
      type: text
      regex: '\b\w+\s*=\s*"(http|https)"[,;]?'
  - id: nemucod-network-fragment-opense
    desc: "Network fragment assign of \"op\"/\"en\"/\"se\"/\"nd\""
    crit: component
    if:
      type: text
      regex: '\b\w+\s*=\s*"(op|en|se|nd)"[,;]?'
