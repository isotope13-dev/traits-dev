defaults:
  platforms: [macos]
  for: [applescript]
  attack: T1027

traits:
  - id: applescript-concatenated-curl
    desc: AppleScript concatenates curl command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'c"&"u"&"r"&"l'
  - id: applescript-concatenated-osacompile
    desc: AppleScript concatenates osacompile command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'o"&"s"&"a"&"c"&"o"&"m"&"p"&"i"&"l"&"e'
  - id: applescript-concatenated-tmp-path
    desc: AppleScript concatenates tmp path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: '/"&"t"&"m"&"p"&"/'

composite_rules:
  - id: applescript-concatenated-stager-command
    desc: AppleScript concatenated stager command
    crit: suspicious
    conf: 0.98
    needs: 2
    any:
      - id: applescript-concatenated-curl
      - id: applescript-concatenated-osacompile
      - id: applescript-concatenated-tmp-path
