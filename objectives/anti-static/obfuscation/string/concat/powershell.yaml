# String Obfuscation Detection - PowerShell
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027, T1059.001
defaults:
  platforms: [unix, windows]
  for: [powershell, batch, shell]
  mbc: "B0032"
  attack: "T1027"
traits:
  # Character array obfuscation - [char[]]@(...) or -join [char[]]@(...)
- id: ps-chararray
  desc: PowerShell char array obfuscation
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "\\[char\\[\\]\\]@\\(\\s*\\d{1,3}(\\s*,\\s*\\d{1,3}){2,}"
  # Alternative: -join(... charcode patterns
- id: ps-join-char
  desc: PowerShell join with char conversion
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: "-join\\s*\\[char\\[\\]\\]"
  # Numeric character codes pattern (many numbers in array)
- id: ps-numeric-chararray
  desc: Numeric character array payload
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: "@\\(\\d{1,3}(,\\d{1,3}){10,}\\)"
  # [char]N pattern for individual characters
- id: ps-individual-char
  desc: Numeric char casts joined as string
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: "(?is)(\\[char\\]\\d{2,3}\\s*\\+\\s*){3,}\\[char\\]\\d{2,3}"
  not:
  - regex: "\\[char\\]27\\b"
  unless:
  - id: well-known/app/posh-ovirt/
  # ToCharArray with pipeline for ROT cipher
- id: ps-rot-cipher
  desc: ROT cipher pattern
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "(?i)\\.ToCharArray\\(\\)\\s*\\|\\s*%\\s*\\{.{0,200}if\\(\\$c-ge65-and\\$c-le90\\)"
  # Encoded command
- id: ps-encoded-command
  desc: Base64 encoded command
  crit: suspicious
  conf: 0.9
  for: [powershell]
  if:
    type: text
    regex: "(?i)-[Ee]ncoded[Cc]ommand|-[Ee][Cc]\\s"
  unless:
  - type: text
    substr: ChocolateyProcessAsAdmin
  - id: well-known/tool/sysadmin/alpine-packages::alpine-ansible-core-package
  - id: well-known/app/businessdev-albuild/
  - type: text
    substr: Start-ChocolateyProcessAsAdmin
  - id: well-known/app/colorscripts-enhanced::package-context
  downgrade:
    any:
    - type: text
      substr: ChocolateyProcessAsAdmin
    - type: text
      substr: Start-ChocolateyProcessAsAdmin
  # === Density-Based Obfuscation Detection ===
  # Legitimate PowerShell rarely uses many char casts.
  # Obfuscated code builds strings via [char]65+[char]66...
- id: dense-char-casts
  desc: Dense [char]N casts (string obfuscation)
  crit: suspicious
  conf: 0.92
  for: [powershell]
  count_min: 8
  per_kb_min: 2.0
  if:
    type: text
    regex: "\\[char\\]\\d{2,3}"
  # Backtick escaping is used to break up keywords
  # e.g., `I`n`v`o`k`e`-`E`x`p`r`e`s`s`i`o`n
- id: dense-backtick-escapes
  desc: Dense backtick escapes (keyword breaking)
  crit: suspicious
  conf: 0.88
  for: [powershell]
  count_min: 10
  per_kb_min: 3.0
  if:
    type: text
    regex: '[A-Za-z$_-]`[A-Za-z]'
  unless:
  - id: well-known/app/maester/
  - id: well-known/app/moonshiner::seed-fixture-tree
- id: dense-backtick-escapes-data
  desc: Dense PowerShell backtick escapes in data
  crit: suspicious
  conf: 0.9
  for: [data]
  count_min: 12
  per_kb_min: 3.0
  if:
    type: text
    regex: '[A-Za-z$_-]`[A-Za-z]'
  # Format string obfuscation: "{0}{1}" -f 'In','voke'
- id: dense-format-strings
  desc: Dense format string obfuscation
  crit: suspicious
  conf: 0.85
  for: [powershell]
  count_min: 4
  per_kb_min: 1.0
  if:
    type: text
    regex: '"\{\\d+\}"\\s*-f'
- id: dense-format-strings-data
  desc: Dense PowerShell format strings in data
  crit: suspicious
  conf: 0.88
  for: [data]
  count_min: 4
  per_kb_min: 1.0
  if:
    type: text
    regex: '"\{\d+\}\{\d+\}\{\d+\}"\s*-f|"\{\d+\}\{\d+\}"\s*-f'
- id: ps-large-indexed-format-reorder-data
  desc: PowerShell large format reordering
  crit: suspicious
  conf: 0.94
  for: [data]
  if:
    type: text
    regex: '"\{[0-9]{1,4}\}(\{[0-9]{1,4}\}){20,}"\s*-f'
- id: ps-decimal-array-xor-char-data
  desc: PowerShell decimal XOR char decoder
  crit: suspicious
  conf: 0.94
  for: [data]
  if:
    type: text
    regex: '(?is)\(\s*\(\s*\([0-9,\s]{200,}\)\s*\|\s*foreach\s*\{\s*\[char\]\s*\(\s*\$_\s*-bXor'
- id: ps-binary-array-char-decode-data
  desc: PowerShell binary char decoder
  crit: suspicious
  conf: 0.94
  for: [data]
  if:
    type: text
    regex: '(?is)\[convert\]::toint(16|32)\s*\(.{0,60},\s*2\s*\).{0,40}as\s*\[char\]'
- id: ps-pshome-index-invoke-data
  desc: PowerShell PSHome-index invocation in data
  crit: suspicious
  conf: 0.94
  for: [data]
  attack: "T1027, T1059.001"
  if:
    type: text
    regex: '(?i)\|\s*\.\s*\(\s*\$pshome\[[0-9]+\]\s*\+\s*\$pshome\[[0-9]+\]\s*\+\s*[''"]x[''"]\s*\)'
  # String concatenation used to hide commands
- id: dense-string-concat
  desc: Dense string concatenation
  crit: suspicious
  conf: 0.82
  for: [powershell]
  count_min: 6
  per_kb_min: 1.5
  if:
    type: text
    regex: "'[^']{1,10}'\\s*\\+\\s*'[^']{1,10}'"
  # Obfuscated Invoke-WebRequest call via string concat: &('Inv'+'oke-WebRequest')
- id: ps-iwr-concat
  desc: Obfuscated Invoke-WebRequest (string concat)
  crit: suspicious
  conf: 0.95
  attack: "T1059.001"
  if:
    type: text
    regex: "&\\s*\\(\\s*'[A-Za-z-]{1,8}'\\s*\\+\\s*'[A-Za-z-]*WebRequest'"
  # Obfuscated Invoke-Expression call via string concat: &('Inv'+'oke-Expression')
- id: ps-iex-concat
  desc: Obfuscated Invoke-Expression (string concat)
  crit: suspicious
  conf: 0.95
  attack: "T1059.001"
  if:
    type: text
    regex: "&\\s*\\(\\s*'[A-Za-z-]{1,8}'\\s*\\+\\s*'[A-Za-z-]*Expression'"
- id: ps-gv-name-index-invoke-data
  desc: 'PS Get-Variable name-index invocation in data'
  crit: suspicious
  conf: 0.95
  for: [data]
  attack: "T1027, T1059.001"
  if:
    type: text
    regex: '(?i)(Gv|Get-Variable)\s+''\*.{1,24}\*''\)\.Name\[[0-9,\s]+\]\s*-Join'
- id: ps-string-index-invoke-data
  desc: PowerShell string-index invocation
  crit: suspicious
  conf: 0.95
  for: [data]
  attack: "T1027, T1059.001"
  if:
    type: text
    regex: '(?i)\(\s*\[string\]\$[A-Za-z]\w*\)\[[0-9,\s]+\]\s*\+\s*''x''\s*-Join'
- id: ps-evasive-flags-cond-0--inline-28605
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [powershell]
  if:
    type: text
    substr: ChocolateyProcessAsAdmin
  count_max: 1028606
- id: ps-evasive-flags-cond-1--inline-28606
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [powershell]
  if:
    type: text
    substr: Start-ChocolateyProcessAsAdmin
  # Obfuscated download-and-execute: concat-obfuscated IWR piped to concat-obfuscated IEX
  count_max: 1028607
composite_rules:
  # Character array obfuscation pattern
- id: ps-chararray-obfuscation
  desc: PowerShell char array obfuscation
  crit: suspicious
  conf: 0.9
  any:
  - id: ps-chararray
  - id: ps-join-char
  - id: ps-numeric-chararray
  # Obfuscated eval - char array + iex
- id: ps-obfuscated-eval
  desc: Obfuscated PowerShell eval
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/process/interpreter/eval::powershell-iex-call
  any:
  - id: ps-chararray
  - id: ps-join-char
  - id: ps-numeric-chararray
  - id: ps-rot-cipher
  # Evasive execution flags
- id: ps-evasive-flags
  desc: Evasive PowerShell execution
  crit: suspicious
  conf: 0.85
  for: [powershell]
  needs: 2
  any:
  - id: objectives/evasion/security-bypass/policy/execution::bypass-execution-policy
  - id: micro-behaviors/process/create/hidden::powershell-windowstyle-hidden-option
  - id: ps-encoded-command
  downgrade:
    any:
    - id: ps-evasive-flags-cond-0--inline-28605
    - id: ps-evasive-flags-cond-1--inline-28606
  unless:
  - id: well-known/tool/sysadmin/kubernetes/bootstrap::kubernetes-windows-gce-script
- id: ps-concat-download-execute
  desc: Obfuscated PowerShell download and execute via concat
  crit: hostile
  conf: 0.97
  attack: "T1059.001"
  all:
  - id: ps-iwr-concat
  - id: ps-iex-concat
- id: ps-chararray-hidden-downloader
  desc: Hidden chararray PowerShell downloader chain
  crit: hostile
  conf: 0.98
  attack: "T1027, T1059.001"
  for: [powershell]
  all:
  - id: ps-numeric-chararray
  - id: objectives/command-and-control/dropper/execution/fileless::ps-downloader-execute
  - id: micro-behaviors/process/create/hidden::powershell-windowstyle-hidden-option
- id: ps-large-b64-chararray-stager
  desc: Large base64 chararray stager chain
  crit: hostile
  conf: 0.97
  attack: "T1027, T1105"
  for: [powershell]
  all:
  - id: ps-numeric-chararray
  - id: metadata/binary/metrics/encoded::large-embedded-b64-blob
  - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
