defaults:
  platforms: [windows, linux, macos]
  for: [python]
  attack: T1027

traits:
  - id: python-host-parts-list
    desc: Python host parts list
    crit: component
    conf: 0.9
    ref: sha256:c32ab210c704a33aa44c0d7319ee854303abcd0ac41434f5710f91b390cd1e80
    if:
      type: text
      regex: '\b[A-Z_]*HOST_PARTS\s*=\s*\['

  - id: python-host-parts-join
    desc: Python joins host parts
    crit: component
    conf: 0.9
    ref: sha256:c32ab210c704a33aa44c0d7319ee854303abcd0ac41434f5710f91b390cd1e80
    if:
      type: text
      regex: '\.join\s*\(\s*[A-Z_]*HOST_PARTS\s*\)'

  - id: python-host-fstring-url
    desc: Python host f-string URL
    crit: component
    conf: 0.85
    ref: sha256:c32ab210c704a33aa44c0d7319ee854303abcd0ac41434f5710f91b390cd1e80
    if:
      type: text
      regex: 'https?://\{host\}'

composite_rules:
  - id: python-split-host-parts
    desc: Python hostname split into parts
    crit: suspicious
    conf: 0.92
    ref: sha256:c32ab210c704a33aa44c0d7319ee854303abcd0ac41434f5710f91b390cd1e80
    near_bytes: 900
    all:
      - id: python-host-parts-list
      - id: python-host-parts-join
      - id: python-host-fstring-url
    unless:
      - id: well-known/lib/roboflow::twilio-mms-ephemeral-upload
