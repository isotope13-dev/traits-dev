defaults:
  platforms: [windows, unix]
  for: [javascript]
  attack: T1027
  mbc: B0032
traits:
  - id: js-fragmented-url-construction
    desc: URL built from small string fragments
    crit: notable
    conf: 0.95
    size_max: 100000
    if:
      # Migrated from a tree-sitter query to a lenient `type: text`
      # match (no per-member cursor walk). Approximates the query's
      # structural intent via its distinctive token(s).
      type: text
      regex: '[''\"]https?[''\"]'
  - id: js-fragmented-url-regex
    desc: Dense concatenated string fragments
    crit: notable
    conf: 0.9
    size_max: 100000
    count_min: 10
    per_kb_min: 0.5
    if:
      type: text
      regex: '[\"''].{1,40}[\"''](\s*\+\s*(\w+|[\"''].{1,40}[\"''])){3}'
    not:
      - regex: '[\"'']<[/A-Za-z][^>]{0,40}>[\"'']'
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - type: text
        regex: 'twitter\.com/intent|facebook\.com/sharer|t\.me/share'
