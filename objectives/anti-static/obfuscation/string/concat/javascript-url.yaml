defaults:
  platforms: [windows, unix]
  for: [javascript]
  attack: T1027
  mbc: B0032
traits:
  - id: js-fragmented-url-construction
    desc: URL built from small string fragments
    crit: notable
    conf: 0.95
    size_max: 100000
    if:
      # The fragmentation tell is a quoted scheme literal spliced into a string
      # concatenation (`'http' + 's' + '://'`), not a bare `'https'` token — the
      # latter is a benign comparison/enum (`x === 'https'`, `['http','https']`).
      # Require the scheme literal adjacent to a `+` joining another string piece.
      type: text
      regex: '[''"]https?[''"]\s*\+\s*[''"]'
  - id: js-fragmented-url-regex
    desc: Dense concatenated string fragments
    crit: notable
    conf: 0.9
    size_max: 100000
    count_min: 10
    per_kb_min: 0.5
    if:
      type: text
      regex: '[\"''].{1,40}[\"''](\s*\+\s*(\w+|[\"''].{1,40}[\"''])){3}'
    not:
      - regex: '[\"'']<[/A-Za-z][^>]{0,40}>[\"'']'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: text
        regex: 'twitter\.com/intent|facebook\.com/sharer|t\.me/share'
