defaults:
  platforms: [windows, unix]
  for: [ruby]
traits:
  - id: ruby-ast-string-tps
    desc: "Detects 'tps:/' protocol fragment in Ruby code"
    crit: suspicious
    conf: 1.0
    # A string literal beginning `tps:/` (obfuscated `https`→`tps` fragment).
    # Matches the parser-extracted literal directly — no live query.
    if:
      type: literal
      regex: '^tps:/'
  # Canonical home for the truncated `https:/` scheme literal (single slash — a
  # fragment to be reassembled), a string-obfuscation technique. Consolidated
  # here next to `ruby-ast-string-tps` from duplicate definitions that lived in
  # `dropper/execution/script/` and `script-ast/` (the matcher detects string
  # obfuscation, not dropper execution).
  - id: ruby-ast-suspicious-url-scheme
    desc: Suspicious URL scheme string literal (e.g. "https:/")
    crit: suspicious
    conf: 0.8
    if:
      type: literal
      regex: '^https?:/$'
    unless:
      - type: text
        regex: "url_prefix\\s*=\\s*url\\s*\\|\\|\\s*['\"]https?:/['\"]"
      - type: basename
        regex: (_spec|_test)\.rb$
