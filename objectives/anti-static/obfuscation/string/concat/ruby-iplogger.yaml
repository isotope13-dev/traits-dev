# Detects fragmented "iplogger" strings in Ruby code (TacoBell malware)
# Example: "ip" + "logger" or similar concatenation patterns
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [windows, unix]
  for: [ruby]
  crit: suspicious
  conf: 0.85
traits:
  # Only the genuinely-split form lives here: `"ip" + "logger"` never contains
  # the whole `iplogger` substring, so it needs the concat pattern. The former
  # `ruby-concatenated-iplogger-alt` (`… + "iplogger…"`) was just a literal
  # `iplogger` search and is now covered by the canonical
  # `…discovery/network/scan/external::iplogger-keyword` (which now includes ruby).
  - id: ruby-concatenated-iplogger
    desc: Concatenated 'iplogger' string fragment
    if:
      type: text
      regex: '[''"](ip|iplogger)[''"]\s*\+\s*[''"](logger|org)'
