defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
  attack: T1027.007
  mbc: B0032.014
traits:
  - id: ntdll-wide-string
    desc: ntdll.dll as wide string (runtime resolver)
    crit: component
    if:
      type: text
      exact: ntdll.dll
    unless:
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: xs25-template-decrypt-symbol
    desc: XS25 template string decryptor symbols
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: XS25ILy([4-9]|1[0-9])EE7decryptEv
    count_min: 4
  - id: dll-names-no-loadlibrary
    desc: DLL name strings without LoadLibrary import
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: binary.import_count
      max: 50
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/document/office/container::help2-container
      - id: metadata/binary/symbols/imports::few-import-count
      - type: symbol
        substr: LoadLibrary
      - type: symbol
        substr: GetProcAddress
  - id: base64-arithmetic-xor-decoder
    desc: Base64 arithmetic XOR string decoder
    crit: suspicious
    conf: 0.95
    if:
      type: hex
      section: .text
      pattern: 80 c3 7a 88 1c 11 ?? ?? ?? 8a 1c 11 80 c3 fd 88 1c 11 ?? ?? ?? 80 04 11 03 ?? ?? ?? ?? 8a 1c 11 80 f3 19
  - id: rc4-api-table-key-9ae8388b
    desc: RC4 key for encrypted API table
    crit: component
    conf: 0.98
    if:
      type: hex
      section: .data
      pattern: 25 34 68 dc 45 d5 ec bb e3 92 7c 55 00 f4 61 ff
  - id: encrypted-virtualalloc-blob-9ae8388b
    desc: Encrypted VirtualAlloc API-name blob
    crit: component
    conf: 0.98
    if:
      type: hex
      section: .data
      pattern: b2 51 d8 ac d0 f7 b6 28 65 a8 9a 0a 5e
  - id: encrypted-virtualprotect-blob-9ae8388b
    desc: Encrypted VirtualProtect API-name blob
    crit: component
    conf: 0.98
    if:
      type: hex
      section: .data
      pattern: b2 51 d8 ac d0 f7 b6 39 7b ab 81 0c 3d ef 1b
composite_rules:
  - id: rc4-encrypted-kernel32-api-table
    desc: RC4-encrypted kernel32 API table
    crit: suspicious
    conf: 0.98
    all:
      - id: rc4-api-table-key-9ae8388b
      - id: micro-behaviors/os/api-resolution/manual::kernel32-resolver
    any:
      - id: encrypted-virtualalloc-blob-9ae8388b
      - id: encrypted-virtualprotect-blob-9ae8388b
    needs: 2
  - id: runtime-api-decryption-benign-context
    desc: Benign runtime API resolution context
    crit: component
    conf: 0.85
    any:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/package/versioning::pe-version-resource
      - id: well-known/lib/wine::wine-runtime-component
  - id: runtime-api-decryption
    desc: Runtime API string decryption (DLL names without loader imports)
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: ntdll-wide-string
      - id: micro-behaviors/os/api-resolution/manual::kernel32-resolver
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    all:
      - id: dll-names-no-loadlibrary
    unless:
      - id: metadata/signed/certificate::bitdefender-brand-text
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/symbols/imports::few-import-count
      - id: micro-behaviors/os/module/load::get-proc-address-import
    downgrade:
      any:
        - id: runtime-api-decryption-benign-context
