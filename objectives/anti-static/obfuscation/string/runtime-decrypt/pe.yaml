defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
  attack: T1027.007
  mbc: B0032.014
traits:
  - id: ntdll-wide-string
    desc: ntdll.dll as wide string (runtime resolver)
    crit: component
    if:
      type: text
      exact: ntdll.dll
  - id: dll-names-no-loadlibrary
    desc: DLL name strings without LoadLibrary import
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: binary.import_count
      max: 50
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/document/office::help2-container
      - id: metadata/binary/symbols::few-import-count
      - type: symbol
        substr: LoadLibrary
      - type: symbol
        substr: GetProcAddress
composite_rules:
  - id: runtime-api-decryption
    desc: Runtime API string decryption (DLL names without loader imports)
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: ntdll-wide-string
      - id: micro-behaviors/os/api-resolution/manual::kernel32-resolver
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    all:
      - id: dll-names-no-loadlibrary
    unless:
      - id: metadata/signed/certificate::bitdefender-brand-text
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/symbols::few-import-count
      - id: micro-behaviors/os/module/load::get-proc-address-import
    downgrade:
      any:
        - id: metadata/binary/installer/script::nsis
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/package/versioning::pe-version-resource
