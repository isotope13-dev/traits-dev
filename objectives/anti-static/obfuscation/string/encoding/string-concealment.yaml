defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  attack: T1027.010
  mbc: F0001.005
  for: [binaries]
traits:
  - id: tiny-cstring-section
    desc: Suspiciously small string section (<100
    crit: suspicious
    conf: 0.9
    if:
      type: section_ratio
      section: (__TEXT\.__cstring|^\.rodata\.|^\.rdata)
      compare_to: total
      max: 0.002
    unless:
      - type: basename
        regex: '\.o$'
      - id: metadata/binary/metrics::tiny-elf
      - type: metrics
        field: binary.import_density
        max: 0
      - type: metrics
        field: binary.string_count
        min: 200
  - id: minimal-strings
    desc: Binary has very few readable
    crit: notable
    conf: 0.7
    size_min: 51200
    if:
      type: string_count
      max: 20
      min_length: 4
    unless:
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - id: metadata/binary/
      - id: metadata/signed/platform::apple
      - type: raw
        substr: BSJB
    downgrade:
      any:
        - type: section
          regex: ^(UPX|upx)
        - type: text
          substr: PECompac
  - id: string-sparse-dll
    desc: DLL with code but minimal strings
    crit: notable
    conf: 0.75
    for:
      - dll
    size_min: 20480
    if:
      type: string_value_count
      max: 15
      min_length: 4
    unless:
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/symbols::zero-import-count
composite_rules:
  - id: string-concealment-comp
    desc: String obfuscation via runtime decryption
    crit: suspicious
    conf: 0.9
    all:
      - id: tiny-cstring-section
    any:
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/communications/socket/create/
      - id: micro-behaviors/fs/file/operations::binary-file-ops
