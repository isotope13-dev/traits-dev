defaults:
  platforms: [windows, unix]
  attack: T1027.010
  mbc: F0001.005
  for: [binaries]
traits:
  - id: tiny-cstring-section
    desc: Suspiciously small string section (<100
    crit: suspicious
    conf: 0.9
    if:
      type: section_ratio
      section: (__TEXT\.__cstring|^\.rodata\.|^\.rdata)
      compare_to: total
      max: 0.002
    unless:
      - type: basename
        regex: \.mun$
      - type: basename
        regex: '\.o$'
      - type: basename
        regex: \.rll$
      - id: metadata/binary/metrics::tiny-elf
      - id: metadata/binary/resource::resource-only-dll
      - type: metrics
        field: binary.import_density
        max: 0
      - type: metrics
        field: binary.string_count
        min: 200
  - id: minimal-strings
    desc: Binary has very few readable
    crit: notable
    conf: 0.7
    size_min: 51200
    if:
      type: string_count
      max: 20
      min_length: 4
    not:
      - regex: \.(map|asar|tar\.gz|tgz|zip)$
    unless:
      - type: basename
        regex: \.(node|pak|map|asar)$
      - type: basename
        regex: \.(bin|dat)$
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/signed/platform::apple
      - type: raw
        substr: BSJB
    downgrade:
      any:
        - type: section
          regex: ^(UPX|upx)
  - id: string-sparse-dll
    desc: DLL with code but minimal strings
    crit: notable
    conf: 0.75
    for:
      - dll
    size_min: 65536
    if:
      type: string_value_count
      max: 15
      min_length: 4
    not:
      - regex: \.(tar\.gz|tgz|zip)$
    unless:
      - id: metadata/binary/framework::electron-desktop-runtime
      - type: basename
        regex: \.node$
      - id: metadata/signed/developer::open-source-developer
      - type: basename
        regex: \.(asar|map|svg|ttf)$
      - type: basename
        regex: \.(pak|bin|dat|desktop)$
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/symbols::zero-import-count
composite_rules:
  - id: string-concealment-comp
    desc: String obfuscation via runtime decryption
    crit: suspicious
    conf: 0.9
    all:
      - id: tiny-cstring-section
    any:
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/communications/socket/create/
      - id: micro-behaviors/fs/file/operations::binary-file-ops
