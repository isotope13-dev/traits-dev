defaults:
  platforms: [windows, unix]
  attack: T1027.010
  mbc: F0001.005
  for: [binaries]
traits:
  - id: minimal-strings
    desc: Binary has very few readable
    crit: notable
    conf: 0.7
    size_min: 51200
    if:
      type: metrics
      field: binary.string_count
      max: 20
    not:
      - regex: \.(map|asar|tar\.gz|tgz|zip)$
    unless:
      - type: basename
        regex: \.(node|pak|map|asar)$
      - type: basename
        regex: \.(bin|dat)$
      - type: text
        substr: "ELECTRON_ENABLE_LOGGING"
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/signed/platform::apple
      - type: raw
        substr: BSJB
    downgrade:
      any:
        - type: section
          regex: ^(UPX|upx)
  - id: string-sparse-dll
    desc: DLL with code but minimal strings
    crit: notable
    conf: 0.75
    for:
      - dll
    size_min: 65536
    if:
      type: metrics
      field: binary.string_count
      max: 15
    not:
      - regex: \.(tar\.gz|tgz|zip)$
    unless:
      - id: metadata/signed/platform::.net-dac
      - id: metadata/binary/framework::electron-desktop-runtime
      - type: basename
        regex: \.(node|asar|map|svg)$
      - id: metadata/signed/developer::open-source-developer
      - type: basename
        regex: \.(ttf|pak|bin|dat)$
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/symbols::zero-import-count
composite_rules:
  - id: string-concealment-comp
    desc: String obfuscation via runtime decryption
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/section/metrics::tiny-cstring-section
    any:
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/communications/socket/create/
    unless:
      - id: metadata/library/python-runtime::python-runtime
      - id: metadata/binary/framework::dotnet-assembly
