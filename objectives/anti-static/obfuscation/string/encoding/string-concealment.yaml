defaults:
  platforms: [windows, unix]
  attack: T1027.010
  mbc: F0001.005
  for: [binaries]
traits:
  - id: minimal-strings
    desc: Binary has very few readable
    crit: suspicious
    conf: 0.7
    size_min: 51200
    if:
      type: metrics
      field: binary.string_count
      max: 20
    not:
      - regex: \.(map|asar|tar\.gz|tgz|zip)$
    unless:
      - id: minimal-strings-benign-context
    downgrade:
      any:
        - id: metadata/binary/section/names::upx-section
  - id: string-sparse-dll
    desc: DLL with code but minimal strings
    crit: suspicious
    conf: 0.75
    for:
      - dll
    size_min: 65536
    if:
      type: metrics
      field: binary.string_count
      max: 15
    not:
      - regex: \.(tar\.gz|tgz|zip)$
    unless:
      - id: metadata/signed/platform::.net-dac
      - id: metadata/binary/framework::electron-desktop-runtime
      - type: basename
        regex: \.(node|asar|map|svg|ttf|pak|bin|dat)$
      - id: metadata/signed/developer::open-source-developer
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/symbols/compat::zero-import-count
      - id: metadata/binary/vendor::windows-system-implementer-dll
composite_rules:
  - id: string-concealment-comp
    desc: String obfuscation via runtime decryption
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/section/metrics::tiny-cstring-section
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/communications/socket/create/
    unless:
      - id: metadata/library/python-runtime::python-runtime
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/installer/sfx::freearc-sfx
      - id: metadata/library/automation::selenium-ie-driver-benign-binary
      - id: well-known/app/protected-benign-pe/
      # Runtime string decryption conceals plaintext, so genuinely obfuscated
      # binaries retain almost no human-readable sentence-like strings. Benign
      # native daemons that merely import system()/socket() and have a small
      # rodata ratio (e.g. /bin/pw-container) still carry many readable error
      # and log messages; require near-absence of sentence strings to fire.
      - id: metadata/binary/metrics/structural::sentence-strings-20-plus

  - id: minimal-strings-benign-context
    desc: Minimal strings benign context
    crit: baseline
    conf: 0.95
    any:
      # Relocatable object files (ET_REL=1), including embedded eBPF/BPF
      # objects, are not packed standalone executables.
      - id: metadata/binary/metrics/structural::elf-relocatable-object
      - id: objectives/anti-static/obfuscation/imports::low-strings-package-extension
      - id: objectives/anti-static/obfuscation/imports::low-strings-data-extension
      - id: well-known/lib/electron::electron-enable-logging-env
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/signed/platform::apple
      - id: metadata/binary/framework::dotnet-metadata
      # Wine/ReactOS builtin PEs are thin API-provider stubs: string-sparse by
      # design (the implementation lives unix-side), not string-concealed payloads.
      - id: metadata/binary/vendor::windows-system-implementer-dll
