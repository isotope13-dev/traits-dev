# Lua string encoding/concealment techniques
# Covers decimal escape encoding (\ddd), string table shuffling,
# and metrics-based detection of encoded payloads.
defaults:
  platforms: [windows, unix]
  for: [lua]
  crit: notable
  conf: 0.85
  attack: T1027
  mbc: B0032
traits:
  - id: lua-octal-escape-strings
    desc: Dense decimal-escape string encoding
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: text.octal_escape_count
      min: 100

  - id: lua-extreme-escape-density
    desc: Extreme escape sequence density
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: text.escape_density
      min: 3.0
      min_size: 4096

  - id: lua-high-digit-ratio
    desc: Abnormally high digit content (encoded data)
    crit: suspicious
    conf: 0.85
    if:
      type: metrics
      field: text.digit_ratio
      min: 0.50
      min_size: 8192

  - id: lua-string-shuffle-decoder
    desc: String shuffle/index decoder function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'for\s+\w+=1,#\w+/2'

  - id: lua-massive-string-count
    desc: Extreme string count (thousands of encoded fragments)
    if:
      type: metrics
      field: strings.total
      min: 2000
      min_size: 10240

composite_rules:
  - id: lua-string-concealment
    desc: Aggressive string concealment (encoding + shuffling)
    crit: suspicious
    conf: 0.9
    any:
      - id: lua-octal-escape-strings
      - id: lua-extreme-escape-density
      - id: lua-string-shuffle-decoder
