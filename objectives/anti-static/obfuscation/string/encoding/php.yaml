defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - php
  mbc: B0032
  attack: T1027
traits:
  - id: strings-chr-concat
    desc: String obfuscation via chr() concatenation
    crit: notable
    conf: 0.66
    if:
      type: string_value
      regex: chr\(\d+\)\s*\.\s*chr\(\d+\)
  - id: php-dense-chr-calls
    desc: Dense chr() calls (string building)
    crit: suspicious
    conf: 0.9
    count_min: 10
    per_kb_min: 2.0
    if:
      type: raw
      regex: chr\s*\(\s*\d
  - id: dense-pack-calls
    desc: Dense pack() calls (binary encoding)
    crit: suspicious
    conf: 0.88
    count_min: 4
    per_kb_min: 0.8
    if:
      type: raw
      regex: pack\s*\(
  - id: dense-base64-decode
    desc: Dense base64_decode calls
    crit: suspicious
    conf: 0.9
    count_min: 3
    per_kb_min: 0.5
    if:
      type: raw
      regex: base64_decode\s*\(
  - id: dense-gzip-decode
    desc: Dense gzip decompression
    crit: suspicious
    conf: 0.88
    count_min: 2
    per_kb_min: 0.3
    if:
      type: raw
      regex: (gzinflate|gzuncompress|gzdecode)\s*\(
  - id: dense-rot13
    desc: Dense str_rot13 calls
    crit: suspicious
    conf: 0.85
    count_min: 2
    per_kb_min: 0.3
    if:
      type: raw
      regex: str_rot13\s*\(
  - id: dense-variable-variables
    desc: Dense variable variables (indirection)
    crit: suspicious
    conf: 0.85
    count_min: 5
    per_kb_min: 1.0
    if:
      type: raw
      regex: \$\$+[a-zA-Z_]
  - id: dense-eval-calls
    desc: Dense eval/assert calls
    crit: suspicious
    conf: 0.92
    count_min: 3
    per_kb_min: 0.5
    if:
      type: raw
      regex: (eval|assert|create_function)\s*\(\s*\$
  - id: preg-replace-eval
    desc: preg_replace with /e modifier (code execution)
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: preg_replace\s*\(\s*["\x27][^"\x27]{0,120}/e[^"\x27]{0,120}["\x27]
composite_rules:
  - id: php-multi-layer-obfuscation
    desc: Multi-layer PHP obfuscation
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: dense-base64-decode
      - id: dense-gzip-decode
      - id: dense-rot13
      - id: dense-eval-calls
