defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: common-test-require-function
    desc: Common test helper require
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: require\(['"]\.\./common['"]\)|function test\(\) \{
  - id: nemucod-numeric-string-encoding
    desc: Nemucod-style concatenated numeric string encoding
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: (\d{2,3}[^\d\w]){29,}\d{2,3}
    unless:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
      - id: common-test-require-function
    size_max: 500000
    downgrade:
      any:
        - id: nemucod-numeric-benign-context
    attack: T1027
    mbc: B0032
composite_rules:
  - id: nemucod-numeric-benign-context
    desc: Benign numeric string context
    crit: baseline
    conf: 0.9
    any:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/harness::test-basename-pattern
      - id: metadata/library/nodeunit::nodeunit
      - id: metadata/library/structure::js-umd-wrapper-any
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
      - id: objectives/supply-chain/metadata-anomaly/manifest::vscode-extension
