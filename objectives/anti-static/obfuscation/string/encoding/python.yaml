defaults:
  platforms:
    - unix
    - windows
  for: [python, pyc]
  mbc: B0032
  attack: T1027
traits:
  - id: python-octal
    desc: Detects octal-encoded string patterns (\NNN
    crit: component
    conf: 0.7
    for:
      - python
    if:
      type: string_literal
      regex: (\\[0-7]{3}){4,}
  - id: python-chr
    desc: Character code manipulation (chr/ord)
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: \\b(chr|ord)\(
  - id: concatenated-execution
    desc: String concatenation in execution sink
    crit: suspicious
    conf: 0.85
    for:
      - python
    if:
      type: tree-sitter
      query: "((call function: (identifier) @func arguments: (argument_list (binary_operator left: (string) operator: \"+\" right: (string))))\n (#match? @func \"^(exec|eval|b64decode|system|compile)$\"))\n"
  - id: bytes-fromhex-call
    desc: bytes.fromhex function
    crit: component
    conf: 0.5
    if:
      type: text
      substr: bytes.fromhex
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/harness::test-fixture-directory
  - id: bz2-decompress-call
    desc: bz2.decompress function
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: bz2.decompress
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/harness/unit::python-stdlib-test-support
  - id: python-dense-chr-calls
    desc: Dense chr() calls (string building)
    crit: suspicious
    conf: 0.9
    count_min: 15
    per_kb_min: 3.0
    if:
      type: raw
      regex: chr\s*\(\s*\d{1,3}\b
    unless:
      - type: basename
        regex: (?i)^(test_.*|.*_test)\.py$
  - id: dense-octal-escapes
    desc: Dense octal escape sequences
    crit: suspicious
    conf: 0.88
    for:
      - pyc
    count_min: 10
    per_kb_min: 2.0
    if:
      type: text
      regex: (\\[0-7]{3}){4,}
    unless:
      - type: basename
        regex: (?i)^(test_.*|.*_test)\.py$
  - id: dense-ord-calls
    desc: Dense ord() calls (cipher operations)
    crit: suspicious
    conf: 0.85
    for:
      - python
    size_min: 5000
    count_min: 20
    per_kb_min: 3.0
    if:
      type: symbol
      exact: ord
    unless:
      - type: basename
        regex: (?i)^(test_.*|.*_test)\.py$
  - id: dense-lambda-chains
    desc: Dense lambda expressions (obfuscation)
    crit: suspicious
    conf: 0.85
    for:
      - python
    unless:
      - type: basename
        regex: (?i)^(test_.*|.*_test)\.py$
    count_min: 8
    per_kb_min: 2.0
    if:
      type: text
      regex: lambda\s+[a-zA-Z_][a-zA-Z0-9_]*\s*:.{0,50}lambda\s+[a-zA-Z_][a-zA-Z0-9_]*
  - id: reverse-bytes
    desc: Reverses byte order of encoded data
    crit: suspicious
    conf: 0.9
    for:
      - python
    if:
      type: text
      regex: (fromhex|b64decode|unhexlify)\s*\(\s*['\"][A-Za-z0-9+/=\\x]{32,}['\"]\s*\).{0,60}\[::-1\]
    unless:
      - type: text
        substr: audio_url = compat_b64decode(data_fd[::-1]).decode('utf-8')
composite_rules:
  - id: python-decode-functions
    desc: Decoding functions for encoded payloads
    crit: suspicious
    conf: 0.7
    any:
      - id: micro-behaviors/data/decode/base64::b64decode-string
      - id: micro-behaviors/data/decode/hex::python-fromhex
      - id: bytes-fromhex-call
      - id: bz2-decompress-call
      - id: micro-behaviors/data/compress/library::zlib-decompress-symbol
      - id: micro-behaviors/data/serialize/unsafe::marshal-loads-symbol
  - id: execute-decoded-content
    desc: Direct execution of decoded content
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/execution/interpreter/eval/invoke::python-eval
      - id: python-decode-functions
      - id: python-chr
  - id: python-encoded-pattern
    desc: Detects encoded string patterns (hex
    crit: component
    any:
      - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
      - id: python-octal
  - id: obfuscated-execution
    desc: Direct execution of encoded string
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/execution/interpreter/eval/invoke::python-eval
      - id: python-encoded-pattern
      - id: python-chr
