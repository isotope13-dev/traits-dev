defaults:
  platforms: [windows, unix]
  for: [class]
  attack: T1027
  mbc: F0001
traits:
  - id: java-base64-decoder-class
    desc: Java Base64 decoder class
    crit: component
    conf: 0.75
    if:
      type: raw
      substr: java/util/Base64
  - id: java-byte-range-copy
    desc: Java byte range copy
    crit: component
    conf: 0.7
    if:
      type: raw
      substr: copyOfRange
  - id: java-custom-rc4-class
    desc: Java custom RC4 class
    crit: component
    conf: 0.82
    if:
      type: raw
      substr: main/crypto/RC4
  - id: java-decode-string-method
    desc: Java decodeString method
    crit: component
    conf: 0.74
    if:
      type: raw
      substr: decodeString
  - id: java-standard-key-size
    desc: Java fixed key size marker
    crit: component
    conf: 0.68
    if:
      type: raw
      substr: STANDARD_KEY_SIZE
composite_rules:
  - id: java-base64-rc4-string-protection
    desc: Java Base64 RC4 string protection
    crit: suspicious
    conf: 0.9
    all:
      - id: java-base64-decoder-class
      - id: java-byte-range-copy
      - id: java-custom-rc4-class
    any:
      - id: java-decode-string-method
      - id: java-standard-key-size
      - id: micro-behaviors/crypto/library::cipher-init
