defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
traits:
  - id: js-rolling-xor-decryption
    desc: JavaScript rolling XOR decryption loop
    crit: suspicious
    if:
      type: string_literal
      regex: \^=\s*[\w$]{1,20}\s*;\s*[\w$]{1,20}\s*=\s*\([\s\w$+]+\)\s*%\s*256\s*;
