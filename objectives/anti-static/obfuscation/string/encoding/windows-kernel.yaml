defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: xoradd-kernel-api-string-table
    desc: XOR-add encoded kernel API table
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/os/kernel/routines::dynamic-resolution-xoradd-string
    needs: 3
    any:
      - id: micro-behaviors/process/attach/address-space::lookup-process-by-id-xoradd-string
      - id: micro-behaviors/process/attach/address-space::query-process-peb-xoradd-string
      - id: micro-behaviors/mem/query/virtual::zw-query-virtual-memory-xoradd-string
      - id: micro-behaviors/mem/protect/modify::zw-protect-virtual-memory-xoradd-string
      - id: micro-behaviors/mem/read/cross-process::mm-copy-virtual-memory-xoradd-string
      - id: micro-behaviors/os/kernel/device::create-device-object-xoradd-string
      - id: micro-behaviors/os/kernel/device::create-device-symbolic-link-xoradd-string
  - id: atbash-kernel-api-string-table
    desc: Atbash-obfuscated kernel API table
    crit: suspicious
    conf: 0.99
    all:
      - id: micro-behaviors/os/kernel/routines::atbash-export-routine-name
    any:
      - id: micro-behaviors/os/kernel/device::create-device-object-atbash-string
      - id: micro-behaviors/mem/read/cross-process::mm-copy-virtual-memory-atbash-string
      - id: micro-behaviors/process/attach/address-space::lookup-process-by-id-atbash-string
      - id: micro-behaviors/mem/protect/modify::zw-protect-virtual-memory-atbash-string
    needs: 3
