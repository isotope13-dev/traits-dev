defaults:
  platforms: [windows, unix]
traits:
  - id: js-unicode-escape
    desc: Unicode escape sequences in string
    crit: notable
    conf: 0.85
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 3
    if:
      type: string_literal
      regex: (\\u[0-9a-fA-F]{4}){4,}
    not:
      - regex: \\u(1680|180[eE]|200[0-9a-aA-A]|202[fF]|205[fF]|3000)
    unless:
      - id: objectives/anti-static/obfuscation/string/encoding/
    downgrade:
      any:
        - id: metadata/library/structure/
  - id: js-interspersed-hex-escapes
    desc: Interspersed hex escape sequences
    crit: notable
    conf: 0.8
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: (\\x[0-9a-fA-F]{2}.{0,3}){4,}
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/app/open-webui-computer/
      - id: metadata/library/structure/
  - id: js-hex-encoded-require
    desc: Hex-encoded require statement
    crit: suspicious
    conf: 0.92
    mbc: B0032
    attack: T1027
    for:
      - javascript
    if:
      type: text
      regex: require\s*\(\s*Buffer\.from\([^)]{0,120}hex[^)]{0,120}\)\.toString\(\)
  - id: js-b64-encoded-require
    desc: Base64-encoded require statement
    crit: suspicious
    conf: 0.92
    mbc: B0032
    attack: T1027
    for:
      - javascript
    if:
      type: text
      regex: require\(Buffer\.from\([^)]{0,60}base64
  - id: js-base64-xor-decode-chain
    desc: Base64 decoded through XOR loop
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    if:
      type: text
      # The XOR must apply directly to the decoded byte (charCodeAt(...) ^ key);
      # requiring the ^ right after the closing paren avoids matching an
      # unrelated regex-literal anchor (/^) that follows a plain base64→byte
      # decoder (e.g. atob(e)...charCodeAt(s);return...else if(/^...).
      regex: "(atob|Buffer\\.from).{0,80}charCodeAt\\s*\\([^)]{0,25}\\)\\s*\\^"
    not:
      - substr: atob(f.printable)
    unless:
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: well-known/app/docpro::mdland-api-xor-helper
  - id: js-window-write-exec
    desc: window assignment to exec primitive
    crit: component
    conf: 0.7
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      # Parse assignments so commented examples do not count as executable
      # global mutation.
      type: tree-sitter
      kind: assignment
      language: javascript
      # Browser event-handler wiring is ordinary UI code, not a concealed
      # global dispatch table; custom window properties remain in scope.
      regex: \bwindow\.(?!on)\w+\s*=\s*(new\s+Function|Function|eval)\b
  - id: js-window-write-decode
    desc: window assignment to decode primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: tree-sitter
      kind: assignment
      language: javascript
      regex: \bwindow\.\w+\s*=\s*(atob|btoa|Buffer)\b
  - id: js-window-write-network
    desc: window assignment to network primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: tree-sitter
      kind: assignment
      language: javascript
      regex: \bwindow\.\w+\s*=\s*(fetch|XMLHttpRequest|WebSocket)\b
  - id: js-globalthis-write-exec
    desc: globalThis assignment to exec primitive
    crit: component
    conf: 0.7
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: tree-sitter
      kind: assignment
      language: javascript
      regex: \bglobalThis\.\w+\s*=\s*(new\s+Function|Function|eval)\b
  - id: js-globalthis-write-decode
    desc: globalThis assignment to decode primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: tree-sitter
      kind: assignment
      language: javascript
      regex: \bglobalThis\.\w+\s*=\s*(atob|btoa|Buffer)\b
  - id: js-globalthis-write-network
    desc: globalThis assignment to network primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: tree-sitter
      kind: assignment
      language: javascript
      regex: \bglobalThis\.\w+\s*=\s*(fetch|XMLHttpRequest|WebSocket)\b
  - id: js-global-self-bracket-assignment
    desc: Dynamic self bracket property assignment
    crit: suspicious
    conf: 0.6
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bself\[[^\]]{1,120}\]\s*=\s*(eval|Function|atob)\b
  - id: js-require-alias
    desc: Require function aliasing
    crit: suspicious
    conf: 0.9
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: =\\s*require\\s*;
  - id: markdown-it-bundle
    desc: markdown-it bundled library marker
    crit: baseline
    conf: 0.99
    for:
      - javascript
    if:
      type: text
      substr: "/*! markdown-it 14.1.0 https://github.com/markdown-it/markdown-it"
  - id: js-define-locale-call
    desc: Moment locale bundle marker
    crit: baseline
    conf: 0.99
    for:
      - javascript
    if:
      type: symbol
      exact: defineLocale
  - id: js-temp-array-read
    desc: Temporary variable reads an array element
    crit: component
    conf: 0.8
    for:
      - javascript
    if:
      type: text
      regex: '\b(var|let|const)\s+\w+\s*=\s*\w+\s*\[\s*\w+\s*\]'
  - id: js-indexed-array-copy
    desc: Copies one indexed array element to another
    crit: component
    conf: 0.8
    for:
      - javascript
    if:
      type: text
      regex: '\w+\s*\[\s*\w+\s*\]\s*=\s*\w+\s*\[\s*\w+\s*\]'
  - id: js-string-split
    desc: Split to empty-delimiter char array
    crit: component
    conf: 0.6
    for:
      - javascript
    if:
      type: text
      regex: (\.split|\[\s*["'']split["'']\s*\])\s*\(\s*(""|'')\s*\)
  - id: js-array-join-symbol
    desc: Join using empty string delimiter
    crit: component
    conf: 0.5
    for:
      - javascript
    if:
      type: text
      regex: (\.join|\[\s*["'']join["'']\s*\])\s*\(\s*(""|'')\s*\)
  - id: js-array-reverse
    desc: Array reverse method
    crit: baseline
    conf: 0.5
    for:
      - javascript
    count_min: 4
    if:
      type: text
      regex: (\.reverse|\[\s*["'']reverse["'']\s*\])\s*\(\s*\)
    unless:
      - id: well-known/lib/zxcvbn::zxcvbn-ranked-dictionaries
      - type: symbol
        exact: matching
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: js-split-join-cleanup
    desc: String cleanup using split(key).join("")
    crit: suspicious
    conf: 0.8
    for:
      - javascript
    count_min: 2
    if:
      type: text
      regex: \.split\(\s*".{1,30}"\s*\)\.join\(\s*""\s*\)
    downgrade:
      any:
        - id: metadata/library/structure::google-tag-manager-bundle
        - id: metadata/library/structure/
    unless:
      - id: metadata/library/runtime::core-js-runtime-bundle
      - id: metadata/library/structure/
  - id: js-long-marker-split-join-cleanup
    desc: Long marker stripped via split join
    crit: suspicious
    conf: 0.9
    for:
      - javascript
    count_min: 2
    if:
      type: text
      regex: \.split\(\s*["'][A-Za-z0-9]{10,30}["']\s*\)\.join\(
    unless:
      - id: mathjax-or-jquery
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: js-long-delimiter-split-join-cleanup
    desc: Long delimiter stripped via repeated split join
    crit: suspicious
    conf: 0.94
    attack: T1027.002
    mbc: B0032
    for: [javascript]
    count_min: 2
    if:
      type: text
      regex: '\.split\(\s*".{10,100}"\s*\)\.join\(\s*""\s*\)'
    unless:
      - id: metadata/build/bundler::babel-transpiled
      - id: metadata/library/structure::js-large-minified-bundle
  - id: js-repeated-marker-token
    desc: Dense repeated string marker token
    crit: component
    conf: 0.93
    for:
      - javascript
    size_min: 20000
    count_min: 40
    if:
      type: text
      substr: sijRysBVHh
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: js-marker-split-join-cleanup-call
    desc: Marker stripped via split join
    crit: component
    conf: 0.93
    for:
      - javascript
    if:
      type: text
      substr: '.split("sijRysBVHh").join("")'
  - id: js-afcrk-repeated-marker-token
    desc: Dense AFcrk marker padding
    crit: suspicious
    conf: 0.96
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    size_min: 20000
    count_min: 40
    if:
      type: text
      substr: AFcrkFAbmFdInk
  - id: js-gcfombg-repeated-marker-token
    desc: Dense gcFombg marker padding
    crit: suspicious
    conf: 0.97
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    size_min: 20000
    count_min: 40
    if:
      type: text
      substr: gcFombgkSgmerA
  # Deep chained split/join (4+ levels) - string permutation obfuscation
  - id: js-deep-split-join-chain
    desc: Repeated split/join string rewrite chain
    crit: notable
    conf: 0.92
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    count_min: 2
    if:
      type: symbol
      regex: "(\\.split\\.join|\\.join\\.split){3,}"
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - type: string_literal
        substr: "\\0SLASH"
  - id: dense-fromcharcode
    desc: Dense fromCharCode calls (string obfuscation)
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 5
    per_kb_min: 1.0
    if:
      type: string_literal
      regex: fromCharCode\s*\(\s*\d
  - id: fromcodepoint-with-base-decode
    desc: 'fromcodepoint with base decode'
    crit: notable
    conf: 0.9
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 2
    if:
      type: text
      regex: from(CodePoint|CharCode).{0,40}(atob|Buffer\.from)
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/lib/pdfjs::pdfjs-bundle
  - id: dense-unicode-escapes
    desc: Dense Unicode escape sequences
    crit: notable
    conf: 0.88
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 4
    per_kb_min: 0.8
    if:
      type: string_literal
      regex: (\\u[0-9a-fA-F]{4}){3,}
    unless:
      - id: objectives/anti-static/obfuscation/string/encoding/
      - id: metadata/library/upload/
      - type: text
        substr: angular.module("ngLocale")
      - type: basename
        regex: '^angular-locale_'
  - id: js-lzstring-table-split-call
    desc: Splits LZString UTF-16 output
    crit: component
    conf: 0.9
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: 'decompressFromUTF16\s*\([^)]{0,80}\)\s*\.\s*split\s*\('

  - id: dense-bracket-notation
    desc: Obfuscated property calls via brackets
    crit: suspicious
    conf: 0.85
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 3
    if:
      type: text
      regex: \[\s*['"](eval|Function|atob)['"]\s*\]\s*\(
    unless:
      # biome/eslint noGlobalEval-style rule fixtures ship global["eval"](...)
      # examples in tests/specs and .snap snapshots — not real obfuscation.
      - id: metadata/package/testing/presence/harness::test-directory-path
      - id: metadata/package/testing/presence/fixture::snapshot-file
  - id: js-alternating-char-obfuscation
    desc: 'Strings with alternating junk characters'
    crit: notable
    conf: 0.8
    for:
      - javascript
    size_max: 100000
    count_min: 5
    if:
      type: text
      regex: '["''][a-zA-Z0-9_]([^a-zA-Z0-9\s"''\\&=%:]{1,3}[a-zA-Z0-9_]){5,}["'']'
    unless:
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
      - id: well-known/app/atlascode/
  - id: mathjax-or-jquery
    desc: Known JavaScript library source
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      regex: 'MathJax|jquery|jquery-ui|goog\.provide\('
  - id: js-function-return-import
    desc: Function constructor dynamic import idiom
    crit: component
    conf: 0.86
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: 'Function\(["'']return import["'']\)\(\)'
  - id: js-unicode-escape-ui-text
    desc: Unicode escaped UI text assignment
    crit: component
    conf: 0.88
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: '\b(textContent|placeholder)\s*=\s*["''](\\u[0-9a-fA-F]{4}){2,}'
  - id: ts-proto-generated-file
    desc: ts-proto generated file
    crit: component
    conf: 0.98
    for:
      - javascript
      - typescript
    if:
      type: text
      word: tsProtoGlobalThis
composite_rules:
