defaults:
  platforms: [windows, unix]
traits:
  - id: js-unicode-escape
    desc: Unicode escape sequences in string
    crit: notable
    conf: 0.85
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 3
    if:
      type: string_literal
      regex: (\\u[0-9a-fA-F]{4}){4,}
    not:
      - regex: \\u(1680|180[eE]|200[0-9a-aA-A]|202[fF]|205[fF]|3000)
    unless:
      - id: js-unicode-escape-benign-context
    downgrade:
      any:
        - id: metadata/library/structure::vscode-icon-theme-catalog
  - id: js-interspersed-hex-escapes
    desc: Interspersed hex escape sequences
    crit: notable
    conf: 0.8
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: (\\x[0-9a-fA-F]{2}.{0,3}){4,}
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: js-hex-encoded-require
    desc: Hex-encoded require statement
    crit: suspicious
    conf: 0.92
    mbc: B0032
    attack: T1027
    for:
      - javascript
    if:
      type: text
      regex: require\s*\(\s*Buffer\.from\([^)]{0,120}hex[^)]{0,120}\)\.toString\(\)
  - id: js-b64-encoded-require
    desc: Base64-encoded require statement
    crit: suspicious
    conf: 0.92
    mbc: B0032
    attack: T1027
    for:
      - javascript
    if:
      type: text
      regex: require\(Buffer\.from\([^)]{0,60}base64
  - id: js-base64-xor-decode-chain
    desc: Base64 decoded through XOR loop
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: "(atob|Buffer\\.from).{0,80}charCodeAt.{0,40}\\^"
    not:
      - substr: atob(f.printable)
  - id: js-window-write-exec
    desc: window assignment to exec primitive
    crit: component
    conf: 0.7
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bwindow\.\w+\s*=\s*(new\s+Function|Function|eval)\b
  - id: js-window-write-decode
    desc: window assignment to decode primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bwindow\.\w+\s*=\s*(atob|btoa|Buffer)\b
  - id: js-window-write-network
    desc: window assignment to network primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bwindow\.\w+\s*=\s*(fetch|XMLHttpRequest|WebSocket)\b
  - id: js-globalthis-write-exec
    desc: globalThis assignment to exec primitive
    crit: component
    conf: 0.7
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bglobalThis\.\w+\s*=\s*(new\s+Function|Function|eval)\b
  - id: js-globalthis-write-decode
    desc: globalThis assignment to decode primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bglobalThis\.\w+\s*=\s*(atob|btoa|Buffer)\b
  - id: js-globalthis-write-network
    desc: globalThis assignment to network primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bglobalThis\.\w+\s*=\s*(fetch|XMLHttpRequest|WebSocket)\b
  - id: js-global-self-bracket-assignment
    desc: Dynamic self bracket property assignment
    crit: suspicious
    conf: 0.6
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bself\[[^\]]{1,120}\]\s*=\s*(eval|Function|atob)\b
  - id: js-require-alias
    desc: Require function aliasing
    crit: suspicious
    conf: 0.9
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: =\\s*require\\s*;
  - id: js-version-marker
    desc: Malware version tracking pattern
    crit: suspicious
    conf: 0.7
    for:
      - javascript
    if:
      type: string_literal
      regex: ^[0-9]+-[a-z]{3,15}[0-9]{1,4}$
  - id: markdown-it-bundle
    desc: markdown-it bundled library marker
    crit: baseline
    conf: 0.99
    for:
      - javascript
    if:
      type: text
      substr: "/*! markdown-it 14.1.0 https://github.com/markdown-it/markdown-it"
  - id: js-define-locale-call
    desc: Moment locale bundle marker
    crit: baseline
    conf: 0.99
    for:
      - javascript
    if:
      type: symbol
      exact: defineLocale
  - id: js-charat-loop
    desc: charAt in loop pattern
    crit: component
    conf: 0.7
    mbc: B0032
    attack: T1027
    for:
      - javascript
    if:
      type: symbol
      regex: .{0,50}\.charAt
  - id: js-array-swap
    desc: Array element swap pattern
    crit: component
    conf: 0.55
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \b(var|let|const)\s+\w+\s*=.{0,80}\[.{1,80}\].{0,120}\[.{1,80}\]\s*=
  - id: js-string-split
    desc: Split to empty-delimiter char array
    crit: component
    conf: 0.6
    for:
      - javascript
    if:
      type: text
      regex: (\.split|\[\s*["'']split["'']\s*\])\s*\(\s*(""|'')\s*\)
  - id: js-function-call
    desc: Function() constructor
    crit: component
    conf: 0.5
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    if:
      type: symbol
      exact: Function
  - id: js-new-function
    desc: new Function constructor
    crit: baseline
    conf: 0.5
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: new Function\(['"]
    unless:
      - id: metadata/file/extension::typescript-declaration-extension
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: objectives/anti-static/obfuscation/eval/require::dynamic-import-function-constructor
    downgrade:
      any:
        - id: metadata/library/babel
  - id: js-array-join-symbol
    desc: Join using empty string delimiter
    crit: component
    conf: 0.5
    for:
      - javascript
    if:
      type: text
      regex: (\.join|\[\s*["'']join["'']\s*\])\s*\(\s*(""|'')\s*\)
  - id: js-array-reverse
    desc: Array reverse method
    crit: baseline
    conf: 0.5
    for:
      - javascript
    count_min: 4
    if:
      type: text
      regex: (\.reverse|\[\s*["'']reverse["'']\s*\])\s*\(\s*\)
    unless:
      - id: well-known/lib/zxcvbn::zxcvbn-ranked-dictionaries
      - type: symbol
        exact: matching
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: js-split-join-cleanup
    desc: String cleanup using split(key).join("")
    crit: suspicious
    conf: 0.8
    for:
      - javascript
    count_min: 2
    if:
      type: text
      regex: \.split\(\s*".{1,30}"\s*\)\.join\(\s*""\s*\)
    downgrade:
      any:
        - id: metadata/library/structure::google-tag-manager-bundle
        - id: metadata/library/structure::vscode-icon-theme-catalog
    unless:
      - id: metadata/library/runtime::core-js-runtime-bundle
      - id: metadata/library/structure::js-known-bundler-output
  - id: js-long-marker-split-join-cleanup
    desc: Long marker stripped via split join
    crit: suspicious
    conf: 0.9
    for:
      - javascript
    if:
      type: text
      regex: \.split\(\s*["'][A-Za-z0-9]{10,30}["']\s*\)\.join\(
    unless:
      - id: mathjax-or-jquery
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: js-repeated-marker-token
    desc: Dense repeated string marker token
    crit: component
    conf: 0.93
    for:
      - javascript
    size_min: 20000
    count_min: 40
    if:
      type: text
      substr: sijRysBVHh
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: js-marker-split-join-cleanup-call
    desc: Marker stripped via split join
    crit: component
    conf: 0.93
    for:
      - javascript
    if:
      type: text
      substr: '.split("sijRysBVHh").join("")'
  - id: js-afcrk-repeated-marker-token
    desc: Dense AFcrk marker padding
    crit: suspicious
    conf: 0.96
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    size_min: 20000
    count_min: 40
    if:
      type: text
      substr: AFcrkFAbmFdInk
  - id: js-gcfombg-repeated-marker-token
    desc: Dense gcFombg marker padding
    crit: suspicious
    conf: 0.97
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    size_min: 20000
    count_min: 40
    if:
      type: text
      substr: gcFombgkSgmerA
  # Deep chained split/join (4+ levels) - string permutation obfuscation
  - id: js-deep-split-join-chain
    desc: Deep chained split/join operations (4+ levels)
    crit: suspicious
    conf: 0.92
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    count_min: 2
    if:
      type: symbol
      regex: "(\\.split\\.join|\\.join\\.split){3,}"
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - type: string_literal
        substr: "\\0SLASH"
  - id: dense-fromcharcode
    desc: Dense fromCharCode calls (string obfuscation)
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 5
    per_kb_min: 1.0
    if:
      type: string_literal
      regex: fromCharCode\s*\(\s*\d
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: fromcodepoint-with-base-decode
    desc: fromCharCode/fromCodePoint paired with atob or Buffer.from decode
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 2
    if:
      type: text
      regex: from(CodePoint|CharCode).{0,40}(atob|Buffer\.from)
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: dense-unicode-escapes
    desc: Dense Unicode escape sequences
    crit: suspicious
    conf: 0.88
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 4
    per_kb_min: 0.8
    if:
      type: string_literal
      regex: (\\u[0-9a-fA-F]{4}){3,}
    unless:
      - id: js-unicode-escape-benign-context
      - id: metadata/library/runtime::uppy-i18n-bundle
      - type: text
        substr: angular.module("ngLocale")
      - type: basename
        regex: '^angular-locale_'
  - id: js-lzstring-utf16-decode
    desc: LZString UTF16 compressed string decode
    crit: notable
    conf: 0.9
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: '\bLZString\s*\.\s*decompressFromUTF16\s*\('
  - id: js-lzstring-table-split-call
    desc: LZString decoded value split call
    crit: component
    conf: 0.9
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: '\)\s*\.\s*split\s*\(\s*[''"][^''"]{1,8}[''"]\s*\)'

  - id: dense-bracket-notation
    desc: Obfuscated property calls via brackets
    crit: suspicious
    conf: 0.85
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 3
    if:
      type: text
      regex: \[\s*['"](eval|Function|constructor|atob)['"]\s*\]\s*\(
  - id: js-alternating-char-obfuscation
    desc: Strings with alternating junk characters (e.g., f?u?n?c?t)
    crit: suspicious
    conf: 0.8
    for:
      - javascript
    size_max: 100000
    count_min: 5
    if:
      type: text
      regex: '["''][a-zA-Z0-9_]([^a-zA-Z0-9\s"''\\&=%:]{1,3}[a-zA-Z0-9_]){5,}["'']'
  - id: mathjax-or-jquery
    desc: Known JavaScript library source
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      regex: 'MathJax|jquery|jquery-ui|goog\.provide\('
  - id: js-function-return-import
    desc: Function constructor dynamic import idiom
    crit: component
    conf: 0.86
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: 'Function\(["'']return import["'']\)\(\)'
  - id: js-unicode-escape-ui-text
    desc: Unicode escaped UI text assignment
    crit: component
    conf: 0.88
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: '\b(textContent|placeholder)\s*=\s*["''](\\u[0-9a-fA-F]{4}){2,}'
composite_rules:
  - id: js-unicode-escape-benign-context
    desc: Unicode escape benign context
    crit: component
    conf: 0.95
    for:
      - javascript
      - typescript
    any:
      - id: metadata/package/testing/harness/runtime::v8-js-fuzzer-unicode-fixture-name
      - id: metadata/file/text/format::i18n-locale-file
      - id: metadata/file/text/format::angular-locale-bundle-path
      - id: metadata/library/runtime::moment-locale
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-esbuild-bundle
      - id: metadata/library/structure::js-any-bundle-output
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/tooling::rollup-bundled
      - id: js-unicode-escape-ui-text

  - id: js-lzstring-utf16-table-split
    desc: LZString decoded string table split
    crit: suspicious
    conf: 0.94
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
      - typescript
    all:
      - id: js-lzstring-utf16-decode
      - id: js-lzstring-table-split-call
    near_bytes: 512
  - id: js-global-property-write
    desc: Global object property assignment
    crit: suspicious
    conf: 0.8
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    size_max: 500000
    all:
      - id: js-global-property-write-assignment
    any:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: js-function-call
      - id: micro-behaviors/data/decode/base64::atob-decode
      - id: js-new-function
    unless:
      - id: metadata/library/structure::js-umd-wrapper-any
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::copyright
      - id: metadata/library/runtime::shutter-reloaded-lightbox
  - id: js-window-property-write-assignment
    desc: window high-risk property assignment
    crit: component
    conf: 0.7
    any:
      - id: js-window-write-exec
      - id: js-window-write-decode
      - id: js-window-write-network
  - id: js-globalthis-property-write-assignment
    desc: globalThis high-risk property assignment
    crit: component
    conf: 0.7
    any:
      - id: js-globalthis-write-exec
      - id: js-globalthis-write-decode
      - id: js-globalthis-write-network
  - id: js-global-property-write-assignment
    desc: Global object property assignment
    crit: suspicious
    conf: 0.6
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    any:
      - id: js-window-property-write-assignment
      - id: js-globalthis-property-write-assignment
    unless:
      - id: metadata/library/runtime::umd-window-assignment
      - id: metadata/library/structure::js-umd-wrapper-any
  - id: js-string-deobfuscation-benign-context
    desc: Benign context for JavaScript string deobfuscation indicators
    crit: component
    conf: 0.95
    any:
      - id: metadata/library/jquery::domain
      - id: metadata/library/jquery::header-prefix
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/library/structure::js-any-bundle-output
      - id: metadata/library/runtime::core-js-runtime-bundle
      - id: metadata/library/runtime::google-web-runtime-bundle
      - id: metadata/library/runtime::tus-js-client-bundle
      - id: metadata/library/ai::mediapipe-selfie-distribution-js
  - id: js-string-deobfuscation
    desc: String deobfuscation routine
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    size_max: 300000
    all:
      - id: js-array-join-symbol
    needs: 3
    any:
      - id: js-string-split
      - id: js-array-swap
      - id: js-charat-loop
      - id: dense-fromcharcode
      - id: dense-unicode-escapes
      - id: js-lzstring-utf16-table-split
      - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
      - id: js-split-join-cleanup
    downgrade:
      any:
        - id: metadata/package/tooling::babel-transpiled
        - id: metadata/library/structure::vscode-icon-theme-catalog
    unless:
      - id: js-string-deobfuscation-benign-context
  - id: js-reverse-string-obfuscation
    desc: String reversal obfuscation pattern
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    size_max: 300000
    all:
      - id: js-array-join-symbol
      - id: js-string-split
      - id: js-array-reverse
    unless:
      # js-known-bundler-output subsumes webpack (incl. minified) detection.
      - id: metadata/library/structure::js-known-bundler-output
      - id: metadata/library/structure::js-mermaid-bundle
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: metadata/library/runtime::acquire-vscode-api
      - id: well-known/lib/json-ts::converter-bundle
      - id: metadata/library/structure::js-dist-asset-bundle
  - id: js-dynamic-exec
    desc: Dynamic code execution capability
    crit: suspicious
    conf: 0.7
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    any:
      - id: objectives/execution/interpreter/eval/dynamic/
      - id: js-function-call
      - id: js-new-function
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: js-global-manipulation
    desc: Global object manipulation pattern
    crit: suspicious
    conf: 0.85
    attack: T1027.002
    for:
      - javascript
    needs: 2
    any:
      - id: js-global-property-write
      - id: js-require-alias
      - id: js-version-marker
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::global-bracket-require-alias
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::global-bracket-module-alias
  - id: js-dict-string-reconstruction
    desc: JavaScript string reconstructed from dictionary lookup and array iteration
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    all:
      - id: objectives/anti-static/obfuscation/string/reconstruct::js-string-dict-map
    any:
      - id: objectives/anti-static/obfuscation/string/reconstruct::js-string-key-array
      - id: objectives/anti-static/obfuscation/string/reconstruct::js-string-key-array-literal
      - id: objectives/anti-static/obfuscation/string/reconstruct::js-extreme-short-token-density
  - id: js-dict-reconstruction-eval
    desc: Dictionary-rebuilt payload executed with eval
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    all:
      - id: js-dynamic-exec
      - id: js-dict-string-reconstruction
  - id: js-local-fileserver-test-context
    desc: Local Express static test server context
    crit: component
    conf: 0.95
    for:
      - javascript
    all:
      - id: metadata/import/npm::express
      - id: metadata/import/npm::serve-index
      - id: metadata/import/npm::multer
      - id: metadata/import/npm::resources
      - id: metadata/import/npm::httpserver
  - id: js-obfuscated-eval-benign-context
    desc: Benign context for JavaScript obfuscated-eval indicators
    crit: component
    conf: 0.95
    any:
      - id: js-define-locale-call
      - id: mathjax-or-jquery
      - id: metadata/package/testing/harness/runtime::node-common-require
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/harness/runtime::v8-mjsunit-assert-pair
      - id: metadata/library/runtime::core-js-runtime-bundle
      - id: metadata/library/structure::js-any-bundle-output
      - id: markdown-it-bundle
      - id: js-local-fileserver-test-context
      - id: metadata/library/runtime::google-web-runtime-bundle
      - id: metadata/library/runtime::tus-js-client-bundle
      - id: metadata/library/ai::mediapipe-selfie-segmentation-bundle
      - id: metadata/library/ai::mediapipe-selfie-distribution-js
      - id: js-function-return-import
  - id: js-obfuscated-eval
    desc: Obfuscated dynamic code execution
    crit: suspicious
    conf: 0.98
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    size_max: 500000
    all:
      - id: js-dynamic-exec
    any:
      - id: js-string-deobfuscation
      - id: dense-fromcharcode
      - id: js-unicode-escape
      - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
      - id: micro-behaviors/data/decode/base64::buffer-from-base64
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-dup
      - id: js-dict-string-reconstruction
      - id: objectives/anti-static/obfuscation/string/reconstruct::js-extreme-short-token-density
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::char-permutation-deobfuscator
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::permutation-obfuscation
    unless:
      - id: js-obfuscated-eval-benign-context
