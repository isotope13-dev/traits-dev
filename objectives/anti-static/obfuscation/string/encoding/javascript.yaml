defaults:
  platforms: [windows, unix]
traits:
  - id: js-unicode-escape
    desc: Unicode escape sequences in string
    crit: notable
    conf: 0.85
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 3
    if:
      type: string_literal
      regex: (\\u[0-9a-fA-F]{4}){4,}
    not:
      - regex: \\u(1680|180[eE]|200[0-9a-aA-A]|202[fF]|205[fF]|3000)
  - id: js-hex-escape
    desc: Hex escape sequences in string
    crit: notable
    conf: 0.75
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: (\\x[0-9a-fA-F]{2}){4,}
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: js-interspersed-hex-escapes
    desc: Interspersed hex escape sequences
    crit: notable
    conf: 0.8
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: (\\x[0-9a-fA-F]{2}.{0,3}){4,}
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: js-hex-encoded-require
    desc: Hex-encoded require statement
    crit: suspicious
    conf: 0.92
    mbc: B0032
    attack: T1027
    for:
      - javascript
    if:
      type: text
      regex: require\s*\(\s*Buffer\.from\([^)]{0,120}hex[^)]{0,120}\)\.toString\(\)
  - id: js-b64-encoded-require
    desc: Base64-encoded require statement
    crit: suspicious
    conf: 0.92
    mbc: B0032
    attack: T1027
    for:
      - javascript
    if:
      type: text
      regex: require\(Buffer\.from\([^)]{0,60}base64
  - id: js-window-write-exec
    desc: window assignment to exec primitive
    crit: component
    conf: 0.7
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bwindow\.\w+\s*=\s*(new\s+Function|Function|eval)\b
  - id: js-window-write-decode
    desc: window assignment to decode primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bwindow\.\w+\s*=\s*(atob|btoa|Buffer)\b
  - id: js-window-write-network
    desc: window assignment to network primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bwindow\.\w+\s*=\s*(fetch|XMLHttpRequest|WebSocket)\b
  - id: js-globalthis-write-exec
    desc: globalThis assignment to exec primitive
    crit: component
    conf: 0.7
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bglobalThis\.\w+\s*=\s*(new\s+Function|Function|eval)\b
  - id: js-globalthis-write-decode
    desc: globalThis assignment to decode primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bglobalThis\.\w+\s*=\s*(atob|btoa|Buffer)\b
  - id: js-globalthis-write-network
    desc: globalThis assignment to network primitive
    crit: component
    conf: 0.65
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bglobalThis\.\w+\s*=\s*(fetch|XMLHttpRequest|WebSocket)\b
  - id: js-global-self-bracket-assignment
    desc: Dynamic self bracket property assignment
    crit: suspicious
    conf: 0.6
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \bself\[[^\]]{1,120}\]\s*=\s*(eval|Function|atob)\b
  - id: js-require-alias
    desc: Require function aliasing
    crit: suspicious
    conf: 0.9
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: =\\s*require\\s*;
  - id: js-version-marker
    desc: Malware version tracking pattern
    crit: suspicious
    conf: 0.7
    for:
      - javascript
    if:
      type: string_literal
      regex: ^[0-9]+-[a-z]{3,15}[0-9]{1,4}$
  - id: markdown-it-bundle
    desc: markdown-it bundled library marker
    crit: baseline
    conf: 0.99
    for:
      - javascript
    if:
      type: text
      substr: "/*! markdown-it 14.1.0 https://github.com/markdown-it/markdown-it"
  - id: js-define-locale-call
    desc: Moment locale bundle marker
    crit: baseline
    conf: 0.99
    for:
      - javascript
    if:
      type: text
      substr: defineLocale(
  - id: js-charat-loop
    desc: charAt in loop pattern
    crit: component
    conf: 0.7
    mbc: B0032
    attack: T1027
    for:
      - javascript
    if:
      type: symbol
      regex: .{0,50}\.charAt
  - id: js-array-swap
    desc: Array element swap pattern
    crit: component
    conf: 0.55
    mbc: B0032
    for:
      - javascript
    if:
      type: text
      regex: \b(var|let|const)\s+\w+\s*=.{0,80}\[.{1,80}\].{0,120}\[.{1,80}\]\s*=
  - id: js-string-split
    desc: Split to empty-delimiter char array
    crit: component
    conf: 0.6
    for:
      - javascript
    if:
      type: text
      regex: (\.split|\[\s*["'']split["'']\s*\])\s*\(\s*(""|'')\s*\)
  - id: js-function-call
    desc: Function() constructor
    crit: component
    conf: 0.5
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: \bFunction\s*\(
  - id: js-new-function
    desc: new Function constructor
    crit: notable
    conf: 0.5
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: new Function\(['"]
    unless:
      - type: basename
        regex: \.d\.ts$
    downgrade:
      any:
        - id: metadata/library/babel::babel-library
  - id: js-array-join-symbol
    desc: Join using empty string delimiter
    crit: component
    conf: 0.5
    for:
      - javascript
    if:
      type: text
      regex: (\.join|\[\s*["'']join["'']\s*\])\s*\(\s*(""|'')\s*\)
  - id: js-array-reverse
    desc: Array reverse method
    crit: notable
    conf: 0.5
    for:
      - javascript
    count_min: 4
    if:
      type: text
      regex: (\.reverse|\[\s*["'']reverse["'']\s*\])\s*\(\s*\)
    unless:
      - id: metadata/internal/symbols::ranked_dictionaries
      - id: metadata/internal/symbols::matching
  - id: js-split-join-cleanup
    desc: String cleanup using split(key).join("")
    crit: suspicious
    conf: 0.8
    for:
      - javascript
    count_min: 2
    if:
      type: text
      regex: \.split\(\s*".{1,30}"\s*\)\.join\(\s*""\s*\)
    downgrade:
      any:
        - id: metadata/library/structure::google-tag-manager-bundle
  - id: js-repeated-marker-token
    desc: Dense repeated string marker token
    crit: component
    conf: 0.93
    for:
      - javascript
    size_min: 20000
    count_min: 40
    if:
      type: text
      substr: sijRysBVHh
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
  - id: js-marker-split-join-cleanup-call
    desc: Marker stripped via split join
    crit: component
    conf: 0.93
    for:
      - javascript
    if:
      type: text
      substr: '.split("sijRysBVHh").join("")'
  # Deep chained split/join (4+ levels) - string permutation obfuscation
  - id: js-deep-split-join-chain
    desc: Deep chained split/join operations (4+ levels)
    crit: suspicious
    conf: 0.92
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    if:
      type: symbol
      regex: "(\\.split\\.join|\\.join\\.split){3,}"
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - type: string_literal
        substr: "\\0SLASH"
  - id: dense-fromcharcode
    desc: Dense fromCharCode calls (string obfuscation)
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 5
    per_kb_min: 1.0
    if:
      type: string_literal
      regex: fromCharCode\s*\(\s*\d
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: dense-unicode-escapes
    desc: Dense Unicode escape sequences
    crit: notable
    conf: 0.88
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 4
    per_kb_min: 0.8
    if:
      type: string_literal
      regex: (\\u[0-9a-fA-F]{4}){3,}
  - id: js-dense-hex-escapes
    desc: Dense hex escape sequences
    crit: suspicious
    conf: 0.88
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 4
    per_kb_min: 0.8
    if:
      type: string_literal
      regex: (\\x[0-9a-fA-F]{2}){4,}
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: dense-bracket-notation
    desc: Dense bracket notation access (method hiding)
    crit: suspicious
    conf: 0.85
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    count_min: 3
    if:
      type: text
      regex: \[\s*['"](eval|Function|constructor|atob)['"]\s*\]\s*\(
  - id: js-alternating-char-obfuscation
    desc: Strings with alternating junk characters (e.g., f?u?n?c?t)
    crit: suspicious
    conf: 0.8
    for:
      - javascript
    size_max: 100000
    count_min: 5
    if:
      type: text
      regex: '["''][a-zA-Z0-9_]([^a-zA-Z0-9\s"''\\]{1,3}[a-zA-Z0-9_]){5,}["'']'
  - id: mathjax-or-jquery
    desc: MathJax or jQuery library
    crit: component
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: MathJax|jquery|jquery-ui
composite_rules:
  - id: js-global-property-write
    desc: Global object property assignment
    crit: suspicious
    conf: 0.8
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    size_max: 500000
    all:
      - id: js-global-property-write-assignment
    any:
      - id: objectives/execution/interpreter/eval/dynamic::eval-symbol
      - id: js-function-call
      - id: micro-behaviors/data/decode/base64::atob-decode
      - id: js-new-function
    unless:
      - id: metadata/library/structure::js-umd-wrapper-any
      - id: metadata/library/jquery::domain
      - id: metadata/library/prototype::copyright
  - id: js-window-property-write-assignment
    desc: window high-risk property assignment
    crit: component
    conf: 0.7
    any:
      - id: js-window-write-exec
      - id: js-window-write-decode
      - id: js-window-write-network
  - id: js-globalthis-property-write-assignment
    desc: globalThis high-risk property assignment
    crit: component
    conf: 0.7
    any:
      - id: js-globalthis-write-exec
      - id: js-globalthis-write-decode
      - id: js-globalthis-write-network
  - id: js-global-property-write-assignment
    desc: Global object property assignment
    crit: notable
    conf: 0.6
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    any:
      - id: js-window-property-write-assignment
      - id: js-globalthis-property-write-assignment
    unless:
      - id: metadata/library/runtime::umd-window-assignment
      - id: metadata/library/structure::js-umd-wrapper-any
  - id: js-string-deobfuscation
    desc: String deobfuscation routine
    crit: notable
    conf: 0.9
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    size_max: 500000
    all:
      - id: js-array-join-symbol
    needs: 3
    any:
      - id: js-string-split
      - id: js-array-swap
      - id: js-charat-loop
      - id: dense-fromcharcode
      - id: dense-unicode-escapes
      - id: js-dense-hex-escapes
      - id: js-split-join-cleanup
    downgrade:
      any:
        - id: metadata/package/tooling::babel-transpiled
    unless:
      - id: metadata/library/structure::js-large-module-bundle
  - id: js-reverse-string-obfuscation
    desc: String reversal obfuscation pattern
    crit: notable
    conf: 0.9
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    all:
      - id: js-array-join-symbol
      - id: js-string-split
      - id: js-array-reverse
  - id: js-dynamic-exec
    desc: Dynamic code execution capability
    crit: notable
    conf: 0.7
    mbc: B0032
    attack: T1027
    for:
      - javascript
      - typescript
    any:
      - id: objectives/execution/interpreter/eval/dynamic/
      - id: js-function-call
      - id: js-new-function
      - id: objectives/anti-static/obfuscation/eval/dynamic::export-iife-closure
  - id: js-global-manipulation
    desc: Global object manipulation pattern
    crit: suspicious
    conf: 0.85
    attack: T1027.002
    for:
      - javascript
    needs: 2
    any:
      - id: js-global-property-write
      - id: js-require-alias
      - id: js-version-marker
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::global-bracket-require-alias
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::global-bracket-module-alias
  - id: js-dict-string-reconstruction
    desc: JavaScript string reconstructed from dictionary lookup and array iteration
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    all:
      - id: objectives/anti-static/obfuscation/string/reconstruct::js-string-dict-map
    any:
      - id: objectives/anti-static/obfuscation/string/reconstruct::js-string-key-array
      - id: objectives/anti-static/obfuscation/string/reconstruct::js-string-key-array-literal
      - id: objectives/anti-static/obfuscation/string/reconstruct::js-extreme-short-token-density
  - id: js-dict-reconstruction-eval
    desc: Dictionary-rebuilt payload executed with eval
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    all:
      - id: js-dynamic-exec
      - id: js-dict-string-reconstruction
  - id: js-obfuscated-eval
    desc: Obfuscated dynamic code execution
    crit: hostile
    conf: 0.98
    attack: T1027.002
    mbc: B0032
    for:
      - javascript
    size_max: 500000
    all:
      - id: js-dynamic-exec
    any:
      - id: js-string-deobfuscation
      - id: dense-fromcharcode
      - id: js-unicode-escape
      - id: js-hex-escape
      - id: objectives/command-and-control/dropper::buffer-from-base64-dup
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-dup
      - id: js-dict-string-reconstruction
      - id: objectives/anti-static/obfuscation/string/reconstruct::js-extreme-short-token-density
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::char-permutation-deobfuscator
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::permutation-obfuscation
    unless:
      - id: js-define-locale-call
      - id: mathjax-or-jquery
      - id: metadata/package/testing/harness::node-common-require
      - id: metadata/library/structure::js-large-module-bundle
      - id: markdown-it-bundle
    downgrade:
      any:
        - id: metadata/package/tooling::babel-transpiled
  - id: js-obfuscated-requires
    desc: Obfuscated module imports via hex encoding
    crit: hostile
    conf: 0.95
    attack: T1195.002
    mbc: B0032
    for:
      - javascript
    all:
      - id: js-hex-encoded-require
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-dup
  - id: js-obfuscated-requires-b64
    desc: Obfuscated module imports via base64 encoding
    crit: hostile
    conf: 0.95
    attack: T1195.002
    mbc: B0032
    for:
      - javascript
    all:
      - id: js-b64-encoded-require
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::hex-name-mangling
  - id: js-strong-obfuscation
    desc: Strong obfuscation indicators
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1027
    for:
      - javascript
    any:
      - id: dense-fromcharcode
      - id: dense-unicode-escapes
      - id: js-dense-hex-escapes
      - id: js-hex-encoded-require
      - id: js-b64-encoded-require
      - id: js-string-deobfuscation
      - id: js-dict-string-reconstruction
    unless:
      - id: js-define-locale-call
    downgrade:
      any:
        - id: metadata/package/tooling::babel-transpiled
  - id: js-repeated-marker-split-join-cleanup
    desc: Repeated marker stripped via split join
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1027.002
    for:
      - javascript
    all:
      - id: js-repeated-marker-token
      - id: js-marker-split-join-cleanup-call
  - id: js-mixed-encoding-usage
    desc: Mixed encoding usage (Hex and Base64)
    crit: notable
    conf: 0.6
    for:
      - javascript
    all:
      - id: objectives/command-and-control/dropper::buffer-from-base64-dup
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-dup
