# Rust binary string obfuscation via XOR encoding
# Detects XOR-encoded strings in compiled Rust binaries with low sentence ratio
defaults:
  platforms: [linux, android]
  for: [elf]
  attack: T1027
  mbc: B0032

traits:
  - id: rust-xor-encoded-strings
    desc: XOR-encoded strings in Rust binary
    crit: component
    conf: 0.85
    if:
      type: encoded
      encoding: xor
      regex: "."
    count_min: 3

  - id: rust-xor-base64-encoded
    desc: XOR-base64 encoded strings in Rust binary
    crit: component
    conf: 0.88
    if:
      type: encoded
      encoding: [xor, base64]
      regex: "."
    count_min: 2

composite_rules:
  - id: rust-xor-string-obfuscation
    desc: Rust binary with XOR string obfuscation
    crit: suspicious
    conf: 0.88
    all:
      - id: metadata/lang/compiler/systems::rust-binary
    any:
      - id: rust-xor-encoded-strings
      - id: rust-xor-base64-encoded
    needs: 1
    unless:
      - id: well-known/tool/sysadmin/rustdesk::rustdesk-android-package
      - id: well-known/tool/sysadmin/rustdesk::rustdesk-linux-package
      - id: objectives/supply-chain/trojanized/backdoor::lzma-crc64-table
      - id: metadata/lang/compiler/systems::rustc-path
