# Rust binary string obfuscation via XOR encoding
# Detects XOR-encoded strings in compiled Rust binaries with low sentence ratio
defaults:
  platforms: [linux, android]
  for: [elf]
  attack: T1027
  mbc: B0032

traits:
  - id: rust-xor-encoded-strings
    desc: XOR-decoded wordlike string runs
    crit: component
    conf: 0.85
    if:
      type: encoded
      encoding: xor
      # Require a meaningful obfuscated payload: a 4+ lowercase word run flanked
      # by 5+ printable chars (>=9 printable total, as in URLs, paths, commands,
      # host/API names). This rejects the compiler-incidental `xor-stack-pair`
      # heuristic, which only emits short (<=8 byte) register-pair garbage with
      # no sustained word structure (was false-positiving on benign Rust tools:
      # eza, rustfmt, cargo-clippy, rate-mirrors, scx_flow, ...). No lookahead:
      # the regex crate rejects (?=...), so an alternation covers both positions.
      regex: '([\x20-\x7e]{5,}[a-z]{4,})|([a-z]{4,}[\x20-\x7e]{5,})'
    count_min: 8
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - type: metrics
        field: binary.string_density
        min: 40

composite_rules:
  # NOTE: low-reliability heuristic. The `encoded: xor` matcher finds word-like
  # byte runs that occur incidentally in any large compiled Rust binary (eza,
  # rustfmt, cargo-clippy, scx_*), and neither match-volume (count_min) nor
  # plaintext-density cleanly separates those from real string-obfuscation. Until
  # a reliable obfuscation discriminator exists, this stays `notable` (surfaced
  # for analysts/diffs) rather than asserting `suspicious` on benign Rust tools.
  - id: rust-xor-string-obfuscation
    desc: Rust binary with XOR string obfuscation
    crit: notable
    conf: 0.88
    all:
      - id: metadata/lang/compiler/systems::rust-binary
      - id: rust-xor-encoded-strings
    unless:
      - id: well-known/tool/sysadmin/rustdesk/
      - id: well-known/tool/sysadmin/rustdesk/
      - id: objectives/supply-chain/trojanized/backdoor::lzma-crc64-table
      - id: metadata/lang/compiler/systems::rustc-path
      - id: metadata/lang/compiler/systems::rust-src-path
