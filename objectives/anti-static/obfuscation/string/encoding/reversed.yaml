defaults:
  attack: T1027
  mbc: B0032
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: reversed-https-encoded
    desc: Reversed HTTPS URL in encoded data
    crit: suspicious
    conf: 0.92
    if:
      type: encoded
      substr: //:sptth
  - id: reversed-http-encoded
    desc: Reversed HTTP URL in encoded data
    crit: suspicious
    conf: 0.92
    if:
      type: encoded
      substr: //:ptth
composite_rules:
  - id: reversed-url-encoded
    desc: Reversed URL protocol in encoded strings
    crit: suspicious
    conf: 0.92
    any:
      - id: reversed-https-encoded
      - id: reversed-http-encoded
