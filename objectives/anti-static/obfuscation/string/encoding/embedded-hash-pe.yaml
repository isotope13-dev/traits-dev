defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: embedded-sha256-token
    desc: Standalone SHA256 hash string in binary
    crit: notable
    conf: 0.80
    attack: T1027
    if:
      id: metadata/binary/anomaly/format::embedded-sha256-token
    unless:
      - id: well-known/app/swifttunnel_vpn/
      - id: well-known/app/telegram::telegram-desktop-signed-client-context
    not:
      - regex: (?i)sha256
      - regex: (?i)checksum
