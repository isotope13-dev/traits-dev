# Case-randomized command keywords. Malware loaders spell interpreter names
# with anomalous internal casing (`POwerSheLL`, `pOwErShElL`) to defeat
# signature/AMSI string matching while the shell still resolves them
# case-insensitively. Legitimate code only ever uses a handful of canonical
# spellings; any other casing is a deliberate static-analysis evasion. Keyed
# on the technique, so it fires regardless of host language (the keyword may
# sit in a VBScript string, a batch one-liner, an HTA, a .lnk target, or a
# JS dropper).
defaults:
  platforms: [windows]
  for: [vbs, batch, powershell, javascript, html, lnk]
  attack: T1027.010
  mbc: B0032
traits:
  - id: powershell-case-randomized
    desc: Case-randomized PowerShell keyword
    crit: suspicious
    conf: 0.9
    if:
      # Match the keyword in any casing, then suppress the canonical spellings
      # via `unless: substr` below. The engine's regex crate has no lookahead,
      # and `not: exact` compares the whole scan unit (not the span), so neither
      # could express "interior uppercase". A normal spelling present anywhere
      # in the unit means this is ordinary code, not an AMSI-evasion respelling.
      type: text
      regex: '[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]'
    unless:
      - type: text
        substr: powershell
      - type: text
        substr: PowerShell
      - type: text
        substr: Powershell
      - type: text
        substr: powerShell
      - type: text
        substr: POWERSHELL
