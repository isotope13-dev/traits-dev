defaults:
  platforms:
    - windows
  for:
    - pe
  crit: suspicious
  attack: T1027
traits:
  - id: corexitprocess
    desc: Obfuscated CorExitProcess string (CorExitProcesD)
    conf: 0.95
    if:
      type: text
      substr: CorExitProcesD
  - id: multibytetowidechar
    desc: 'obfuscated MultiByteToWideChar string'
    conf: 0.95
    if:
      type: text
      substr: M<tiBy oWivCha>
  - id: rtlfreethreadpooltimer
    desc: 'obfuscated RtlFreeThreadPoolTimer string'
    conf: 0.95
    if:
      type: text
      substr: ranFeW5poolTime
  - id: threadstackguard
    desc: Obfuscated ThreadStackGuard string (pTh.dStackGua)
    conf: 0.95
    if:
      type: text
      substr: pTh.dStackGua
  - id: interleaved-kernel32-dll
    desc: Interleaved kernel32 DLL string
    conf: 0.98
    if:
      type: text
      exact: n2lr3leldke.
  - id: interleaved-loadlibrary-a
    desc: Interleaved LoadLibraryA string
    conf: 0.98
    if:
      type: text
      exact: drAabyoirLLa
  - id: interleaved-getmodulehandle-a
    desc: Interleaved GetModuleHandleA string
    conf: 0.98
    if:
      type: text
      exact: MlnAtuaeedHlGoed
  - id: interleaved-getprocaddress
    desc: Interleaved GetProcAddress string
    conf: 0.98
    if:
      type: text
      exact: PAetcreodsGrds
  - id: run-key-placeholder
    desc: Placeholder-substituted Run key string
    conf: 0.98
    if:
      type: text
      exact: $?6DG1B5]aaaaaaaaaaaaaaaaa]sEBB5>D'5BC9?>]#E>
composite_rules:
  - id: interleaved-loader-apis
    desc: Interleaved loader API strings
    crit: suspicious
    conf: 0.97
    all:
      - id: interleaved-kernel32-dll
      - id: interleaved-loadlibrary-a
      - id: interleaved-getmodulehandle-a
      - id: interleaved-getprocaddress
  - id: layered-string-obfuscation
    desc: Layered string obfuscation markers
    crit: suspicious
    conf: 0.97
    all:
      - id: interleaved-loader-apis
      - id: micro-behaviors/data/encode/charset::lowercase-digits-alphabet
    any:
      - id: run-key-placeholder
      - id: threadstackguard
