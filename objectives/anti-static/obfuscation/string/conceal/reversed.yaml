# Reversed Keyword Detection
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027
defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-reversed-wscript
    desc: Reversed WScript keyword (tpircsw)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)tpircsw'
  - id: js-reversed-return
    desc: Reversed return keyword (nruter)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)nruter'
  - id: js-reversed-array
    desc: Reversed Array identifier or call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      # Require source-like identifier use. A standalone token also occurs in
      # ordinary locale and place-name data (for example, "Yarra Valley").
      regex: '\byarra\s*[\[(=.]'
      case_insensitive: true
  - id: js-reversed-function
    desc: Reversed function keyword (noitcnuf)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)noitcnuf'
    unless:
      - id: micro-behaviors/communications/http/services/google::identity-services-gsi-client
  - id: js-reversed-whitespace
    desc: Reversed whitespace keyword (ecapsetihw)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)ecapsetihw'
