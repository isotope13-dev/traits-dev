# Reversed Keyword Detection
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027
defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-reversed-wscript
    desc: Reversed WScript keyword (tpircsw)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)tpircsw'
  - id: js-reversed-return
    desc: Reversed return keyword (nruter)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)nruter'
  - id: js-reversed-array
    desc: Reversed Array keyword (yarra)
    crit: suspicious
    conf: 0.9
    size_max: 50000
    if:
      type: text
      word: yarra
      case_insensitive: true
  - id: js-reversed-function
    desc: Reversed function keyword (noitcnuf)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)noitcnuf'
  - id: js-reversed-whitespace
    desc: Reversed whitespace keyword (ecapsetihw)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)ecapsetihw'
  - id: js-reversed-eval
    desc: Reversed eval keyword (lave)
    crit: suspicious
    conf: 0.9
    size_max: 50000
    if:
      type: text
      word: lave
      case_insensitive: true
