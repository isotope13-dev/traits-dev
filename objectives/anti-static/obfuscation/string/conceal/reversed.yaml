# Reversed Keyword Detection
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027
defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: js-reversed-wscript
    desc: Reversed WScript keyword (tpircsw)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)tpircsw'
  - id: js-reversed-return
    desc: Reversed return keyword (nruter)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)nruter'
  - id: js-reversed-array
    desc: Reversed Array keyword (yarra)
    crit: suspicious
    conf: 0.9
    size_max: 50000
    if:
      type: text
      # Match the standalone reversed token.  A word-only matcher also sees
      # ordinary identifiers such as `yArray` in bundled Electron code.
      regex: '(^|[^A-Za-z0-9_$])yarra([^A-Za-z0-9_$]|$)'
      case_insensitive: true
  - id: js-reversed-function
    desc: Reversed function keyword (noitcnuf)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)noitcnuf'
    unless:
      - id: micro-behaviors/communications/http/services/google::identity-services-gsi-client
  - id: js-reversed-whitespace
    desc: Reversed whitespace keyword (ecapsetihw)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)ecapsetihw'
