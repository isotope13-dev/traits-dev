defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: js-nemucod-dictionary-map
    desc: Dense short-string dictionary map
    crit: suspicious
    conf: 0.7
    count_min: 10
    per_kb_min: 0.3
    unless:
      - id: objectives/anti-static/obfuscation/string/conceal/
    if:
      type: text
      regex: '"[A-Za-z0-9_]{1,24}"\s*:\s*"[A-Za-z0-9_]{1,2}"'
  - id: js-nemucod-dictionary-loop
    desc: Double-index dictionary loop pattern
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\+=\s*\w+\[\w+\[\w+\]\]'
    unless:
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
      - id: micro-behaviors/process/create/shell/host/
      - id: metadata/library/runtime::acquire-vscode-api
      - id: well-known/lib/pdfjs/
  - id: js-nemucod-ascii-remap
    desc: ASCII remapping assignment markers
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '\=\s*128;\s*\w+\[[^\]]{1,15}\]\s*=\s*129;'
composite_rules:
  - id: js-nemucod-dictionary-benign-context
    desc: Benign dense dictionary map context
    crit: component
    conf: 0.8
    any:
      - id: metadata/package/testing/scripted::xterm-terminal-recording
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/harness/runtime::test-basename-pattern
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/library/structure::js-any-bundle-output
      - id: metadata/package/files/dependency::node-modules-path
      - id: well-known/lib/xml2
      - id: well-known/lib/xslt

  - id: js-nemucod-dictionary-rebuild
    desc: Token dictionary rebuild wrapper
    crit: suspicious
    conf: 0.88
    all:
      - id: js-nemucod-dictionary-map
      - id: js-nemucod-dictionary-loop
