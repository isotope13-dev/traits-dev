defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: js-adodb-position-reversed
    desc: Reversed ADODB position string
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: noitisop
  - id: js-adodb-savetofile-reversed
    desc: Reversed ADODB SaveToFile string
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: eliFoTevaS
  - id: js-xmlhttp-responsebody-reversed
    desc: Reversed XMLHTTP ResponseBody string fragment
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      substr: ydoB
  - id: js-split-reverse-join
    desc: String reversal via split-reverse-join
    crit: notable
    conf: 0.8
    mbc: B0032
    attack: T1027.002
    count_min: 5
    if:
      type: text
      regex: \.split\(.{0,6}\)\.reverse\(\)\.join\(.{0,6}\)
    unless:
      - id: well-known/lib/zxcvbn::zxcvbn-ranked-dictionaries
      - type: symbol
        exact: matching
      - id: micro-behaviors/process/create/shell/host/
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure/
  - id: js-junk-math-1
    desc: 'Junk arithmetic producing small integers'
    # Building block, not a standalone signal: parenthesized constant arithmetic is
    # ubiquitous in benign code (RGB lerp `base + (end - start) * t`, dimensions, time
    # math). It only indicates obfuscation alongside string assembly — used as the
    # corroborating `any:` leg of the eval+char-map composite in
    # objectives/execution/interpreter/eval/dynamic/obfuscated_js.yaml.
    crit: component
    conf: 0.6
    mbc: B0032
    attack: T1027
    count_min: 4
    if:
      type: text
      regex: \(\s*[-+]?\d+\s*[-+*/]\s*[-+]?\d+\s*\)
    not:
      # `(0-N)` is range/limit notation (RGB `(0-255)`, `(0-9)`, time fields),
      # not junk math — a leading-zero operand makes no sense as a computed
      # char code (always negative).
      - regex: \(\s*0\s*-\s*\d{1,3}\s*\)
    unless:
      - id: metadata/file/extension/identity::typescript-declaration-extension
      - id: metadata/package/testing/harness/runtime/
      # Image/graphics/ML codecs in bundles carry constant arithmetic like
      # (1/255) alpha normalization or (1/0); not junk-math obfuscation.
      - id: metadata/library/structure/
  - id: js-createobject-reversed
    desc: Reversed CreateObject string
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: (?i)tcejbOetaerC
  - id: js-comma-string-obfuscation
    desc: String obfuscation using the comma operator
    crit: notable
    conf: 0.8
    mbc: B0032
    attack: T1027
    count_min: 4
    size_max: 100000
    if:
      type: text
      regex: \(["'].{1,20}["'],\s*["'].{1,20}["'],\s*["'].{1,20}["']\)
    not:
      - regex: \.\w{1,5}['"]
      - regex: (\.attr|\.style|translate)\(
      - regex: \.(xor|valid)\(
      - regex: \bfirstEnv\(
      - regex: (?i)\bIN\s*\(
      - regex: '"\+[A-Za-z]\.[rgb]\+"'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: text
        substr: mermaid-architecture
      - type: text
        substr: "(\"\\\\bgroup\",\"{\")"
      - id: micro-behaviors/data/db/sql/
  - id: hex-escaped-get
    desc: Hex-escaped GET method string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)["''](G\\x45|\\x47E)["'']'
  - id: hex-escaped-post
    desc: Hex-escaped POST method string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)["''](P\\x4fS|\\x50OS)["'']'
  - id: js-interspersed-question-marks
    desc: "with interspersed question marks (Nemucod)"
    crit: suspicious
    conf: 0.95
    mbc: "B0032"
    attack: "T1027"
    if:
      type: text
      regex: '([a-zA-Z0-9]\?){10,}'
  - id: js-interspersed-chars-generic
    desc: "with interspersed characters (obfuscation)"
    crit: suspicious
    conf: 0.8
    mbc: "B0032"
    attack: "T1027"
    size_max: 50000
    if:
      type: text
      regex: '"[a-zA-Z0-9][^a-zA-Z0-9"\s]([a-zA-Z0-9][^a-zA-Z0-9"\s]){18,}[a-zA-Z0-9]"'
  - id: js-interspersed-char-obfuscation
    desc: Fixed interleaving character (Nemucod)
    crit: notable
    conf: 0.9
    size_max: 100000
    if:
      type: text
      # Match a pattern like a?b?c?d?e?f? where ? is the same non-standard char
      # Excludes common JS punctuation (,.;:=(){}[] and space) to avoid matching
      # minified code like comma-separated numbers or dot-chained property access.
      regex: '([a-zA-Z0-9][^a-zA-Z0-9,.\s;:=(){}\[\]+\-*/<>!&|"''`]){30,}'
    not:
      - substr: an error while printing
    unless:
      - id: metadata/package/testing/scripted/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture/
composite_rules:
  - id: any-string-concealment
    desc: Any string concealment pattern
    crit: suspicious
    conf: 0.8
    any:
      - id: objectives/anti-static/obfuscation/string/conceal::js-adodb-position-reversed
      - id: objectives/anti-static/obfuscation/string/conceal::js-adodb-savetofile-reversed
      - id: objectives/anti-static/obfuscation/string/conceal::js-xmlhttp-responsebody-reversed
      - id: objectives/anti-static/obfuscation/string/conceal::js-split-reverse-join
      - id: objectives/anti-static/obfuscation/string/conceal::hex-escaped-get
      - id: objectives/anti-static/obfuscation/string/conceal::hex-escaped-post
      - id: objectives/anti-static/obfuscation/string/conceal::js-interspersed-question-marks
      - id: objectives/anti-static/obfuscation/string/conceal::js-interspersed-chars-generic
      - id: objectives/anti-static/obfuscation/string/conceal::js-interspersed-char-obfuscation
      - id: micro-behaviors/process/interpreter/jscript::createobject-fragment-ateobject
