# JavaScript String Concealment Techniques
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  - id: js-adodb-position-reversed
    desc: Reversed ADODB position string
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: "noitisop"
  - id: js-adodb-savetofile-reversed
    desc: Reversed ADODB SaveToFile string
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: "eliFoTevaS"
  - id: js-xmlhttp-responsebody-reversed
    desc: Reversed XMLHTTP ResponseBody string fragment
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: "ydoB"
  - id: js-split-reverse-join
    desc: String reversal via split-reverse-join
    crit: notable
    conf: 0.8
    mbc: "B0032"
    attack: "T1027.002"
    if:
      type: raw
      regex: '\.split\(.{0,6}\)\.reverse\(\)\.join\(.{0,6}\)'
  - id: js-junk-math-1
    desc: Junk arithmetic producing small integers (pattern 1)
    crit: notable
    conf: 0.6
    mbc: "B0032"
    attack: "T1027"
    if:
      type: raw
      # Matches (num + num) or (num - num)
      regex: '\(\s*[-+]?\d+\s*[-+*/]\s*[-+]?\d+\s*\)'
    unless:
      - type: basename
        regex: '\.d\.ts$'
  - id: js-createobject-reversed
    desc: Reversed CreateObject string
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: "(?i)tcejbOetaerC"
  - id: js-comma-string-obfuscation
    desc: String obfuscation using the comma operator
    crit: suspicious
    conf: 0.8
    mbc: "B0032"
    attack: "T1027"
    count_min: 4
    size_max: 100000
    if:
      type: raw
      regex: "\\([\"'].{1,20}[\"'],\\s*[\"'].{1,20}[\"'],\\s*[\"'].{1,20}[\"']\\)"
    unless:
      - id: metadata/dev/testing::is-test
composite_rules:
  - id: any-string-concealment
    desc: Any string concealment pattern
    crit: notable
    conf: 0.8
    any:
      - id: objectives/anti-static/obfuscation/string/conceal::js-adodb-position-reversed
      - id: objectives/anti-static/obfuscation/string/conceal::js-adodb-savetofile-reversed
      - id: objectives/anti-static/obfuscation/string/conceal::js-xmlhttp-responsebody-reversed
      - id: objectives/anti-static/obfuscation/string/conceal::js-split-reverse-join
      - id: micro-behaviors/process/interpreter/jscript::createobject-fragment-ateobject
