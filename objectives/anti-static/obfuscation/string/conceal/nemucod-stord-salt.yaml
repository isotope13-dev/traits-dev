defaults:
  platforms: [windows, unix]
traits:
  - id: js-stord-salt-replacement
    desc: "Nemucod-style replacement of 'STORD' salt"
    crit: suspicious
    conf: 0.95
    for: [javascript]
    if:
      type: text
      regex: '(\.replace|\[\s*[''"]replace[''"]\s*\])\(\s*/STORD/g\s*,\s*[''"][''"]\s*\)'
