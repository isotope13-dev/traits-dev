defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: component
  conf: 0.8
  for:
    - javascript
traits:
  - id: save-to-file-fragment-oFil
    desc: SaveToFile fragment (oFil)
    if:
      type: string_value
      exact: oFil
  - id: stream-fragment-dotstr
    desc: .Stream fragment (.Str)
    if:
      type: string_value
      exact: .Str
