defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.002
  mbc: B0032

composite_rules:
  - id: importless-pe-string-concealment-profile
    desc: Importless PE with concealed strings and packed code
    crit: hostile
    conf: 0.97
    size_min: 196608
    all:
      - id: objectives/anti-static/pack/runtime::pe-no-import-dependencies
      - id: metadata/binary/metrics/structural::high-code-entropy
      - id: metadata/binary/metrics/pe-details::medium-pe-string-concealment-profile
      - id: metadata/binary/section/metrics::high-entropy-exec-section
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/framework/
