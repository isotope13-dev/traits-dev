defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-split-join-deobfuscation-dot
    desc: Uses .split().join("") for string deobfuscation
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.split\([''"]\?[''"]\)\.join\([''"][''"]\)'
  - id: js-split-join-deobfuscation
    desc: Uses ["split"]().join("") for string deobfuscation
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: '\[[''"]split[''"]\]\([''"]\?[''"]\)\.join\([''"][''"]\)'
  - id: js-split-wrapper
    desc: split() function wrapper
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: 'return\s+[a-zA-Z_$][\w$]*\.split\([a-zA-Z_$][\w$]*\);'
  - id: js-join-wrapper
    desc: join() function wrapper
    crit: notable
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: 'return\s+[a-zA-Z_$][\w$]*\.join\([a-zA-Z_$][\w$]*\);'
    not:
      - substr: "pairSeparator"
  - id: js-response-split-join-marker
    desc: responseText split().join() rewrite
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: '\.responseText\.split\([^)]{1,24}\)\.join\('
  - id: js-join-substring-char
    desc: join() uses substring single-char key
    crit: suspicious
    conf: 0.85
    for: [javascript]
    if:
      type: text
      regex: '\.join\([^)]{0,18}\.substring\(\d+,\d+\)\)'
  - id: js-var-split-marker
    desc: Variable-based split with token delimiter
    crit: notable
    conf: 0.8
    for: [javascript]
    if:
      type: text
      regex: '\.split\(\s*[a-zA-Z_$]\w{0,12}\s*\)'
    not:
      - substr: "pairSeparator"
      - substr: "slashSplit"
