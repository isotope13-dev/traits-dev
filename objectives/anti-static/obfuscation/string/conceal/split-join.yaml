defaults:
  platforms: [windows, unix]
traits:
  - id: js-split-join-deobfuscation-dot
    desc: "Uses .split().join(\"\") for deobfuscation"
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: '\.split\([''"]\?[''"]\)\.join\([''"][''"]\)'
    unless:
      - id: well-known/app/meshcentral::meshcentral-package-context
  - id: js-split-join-deobfuscation
    desc: "Uses [\"split\"]().join(\"\") for deobfuscation"
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: '\[[''"]split[''"]\]\([''"]\?[''"]\)\.join\([''"][''"]\)'
  - id: js-split-wrapper
    desc: split() function wrapper
    crit: component
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: 'return\s+[a-zA-Z_$][\w$]*\.split\([a-zA-Z_$][\w$]*\);'
  - id: js-join-wrapper
    desc: join() function wrapper
    crit: component
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: 'return\s+[a-zA-Z_$][\w$]*\.join\([a-zA-Z_$][\w$]*\);'
    not:
      - substr: "pairSeparator"
    unless:
      - id: well-known/lib/json-ts/
  - id: js-response-split-join-marker
    desc: responseText split().join() rewrite
    crit: suspicious
    conf: 0.9
    for: [javascript]
    if:
      type: text
      regex: '\.responseText\.split\([^)]{1,24}\)\.join\('
  - id: js-join-substring-char
    desc: join() uses substring single-char key
    crit: suspicious
    conf: 0.85
    for: [javascript]
    if:
      type: text
      regex: '\.join\([^)]{0,18}\.substring\(\d+,\d+\)\)'
  - id: js-join-empty-assignment-tail
    desc: Variable assigned join('') deobfuscation tail
    crit: component
    conf: 0.97
    for: [javascript, typescript]
    if:
      type: text
      regex: \w+\s*=\s*\w+\.join\(''\)
    not:
      - substr: "finalStr = bits.join('')"
    unless:
      - id: metadata/file/extension/identity::declaration-file-extension

composite_rules:
  - id: js-variable-split-join-concealment
    desc: Variable split and join concealment
    crit: baseline
    conf: 0.95
    near_bytes: 512
    all:
      - id: micro-behaviors/data/string/split::js-var-split-marker
    any:
      - id: js-join-wrapper
      - id: js-join-substring-char
