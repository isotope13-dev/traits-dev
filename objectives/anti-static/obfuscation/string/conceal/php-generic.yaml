defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: "B0032"
  attack: "T1027"
traits:
  - id: bitwise-string-synthesis
    desc: PHP bitwise string synthesis
    crit: suspicious
    conf: 0.93
    count_min: 4
    if:
      type: text
      regex: "\\$\\w+\\s*=\\s*['\"][^'\"]{1,24}['\"]\\s*[\\^\\|&]\\s*['\"][^'\"]{1,24}['\"]"
  - id: concat-bareword-fragments
    desc: Concat bareword string fragments
    crit: suspicious
    conf: 0.9
    count_min: 4
    size_max: 500000
    if:
      type: text
      regex: "(?m)^[^\\n/#*]{0,40}['\"][^'\"\\s]{1,16}['\"]\\s*\\.\\s*[a-z_][A-Za-z0-9_]*\\b"
    unless:
      - type: text
        regex: "['\"][^'\"\\s]{1,16}['\"]\\s*\\.\\s*[a-z_][A-Za-z0-9_]*\\s*\\("
      - type: text
        regex: "['\"][^'\"\\s]{1,16}['\"]\\s*\\.\\s*(self|static|parent)::"
  - id: standalone-junk-string-chain
    desc: Standalone junk string chain
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: ";\\s*['\"][^'\"]{4,24}['\"]\\s*\\.\\s*['\"][^'\"]{4,24}['\"]\\s*;"
  - id: dense-quoted-fragments
    desc: Dense quoted string fragments
    crit: suspicious
    conf: 0.88
    count_min: 10
    per_kb_min: 3.0
    if:
      type: text
      regex: "['\"][A-Za-z0-9_+/=:-]{1,8}['\"]\\s*\\.\\s*['\"][A-Za-z0-9_+/=:-]{1,8}['\"]"
  - id: php-two-char-chunks
    desc: PHP strings fragmented into two-character chunks
    crit: suspicious
    conf: 0.95
    count_min: 3
    if:
      type: text
      regex: "['\"][a-z0-9]{2}['\"]\\s*\\.\\s*['\"][a-z0-9]{2}['\"]"
  - id: fragmented-base64-literals
    desc: Fragmented base64 literal chains
    crit: suspicious
    conf: 0.9
    count_min: 8
    per_kb_min: 2.0
    if:
      type: text
      regex: "['\"][A-Za-z0-9+/=]{4,8}['\"]\\s*\\.\\s*['\"][A-Za-z0-9+/=]{2,8}['\"]"
  - id: indexed-string-table
    desc: Indexed string table lookup
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: "return\\s+\\$[a-z]{1,3}\\s*\\[\\s*\\$[a-z]{1,2}\\s*\\]\\s*;"
    unless:
      - id: well-known/lib/phpseclib
  - id: str-replace-code-deob
    desc: str_replace strips junk marker from variable
    crit: component
    conf: 0.82
    if:
      type: text
      regex: str_replace\s*\(\s*'\w{1,4}'\s*,\s*''\s*,\s*\$
  - id: str-replace-func-name-deob
    desc: str_replace rebuilds function name from junk-obfuscated literal
    crit: suspicious
    conf: 0.95
    attack: T1027.010
    if:
      type: text
      regex: str_replace\s*\(\s*'\w{1,6}'\s*,\s*''\s*,\s*'[a-z_]{12,35}'
composite_rules:
  - id: php-bitwise-fragment-obfuscation
    desc: PHP bitwise fragment obfuscation
    crit: suspicious
    conf: 0.97
    all:
      - id: bitwise-string-synthesis
    any:
      - id: concat-bareword-fragments
      - id: standalone-junk-string-chain
      - id: dense-quoted-fragments
  - id: php-fragmented-string-obfuscation
    desc: PHP fragmented string obfuscation
    crit: suspicious
    conf: 0.94
    all:
      - id: dense-quoted-fragments
      - id: indexed-string-table
    any:
      - id: fragmented-base64-literals
      - id: str-replace-code-deob
