defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: adodb-stream-interspersed
    desc: Obfuscated ADODB.Stream (interspersed)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      # Matches A?D?O?D?B?.?S?t?r?e?a?m?
      regex: 'A\?D\?O\?D\?B\?\.\?S\?t\?r\?e\?a\?m\?'
  - id: xmlhttp-interspersed
    desc: Obfuscated MSXML2.XMLHTTP (interspersed)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      # Matches M?S?X?M?L?2?
      regex: 'M\?S\?X\?M\?L\?2\?\.\?X\?M\?L\?H\?T\?T\?P\?'
  - id: rundll32-interspersed
    desc: Obfuscated rundll32 (interspersed)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      # Matches r?u?n?d?l?l?3?2?
      regex: 'r\?u\?n\?d\?l\?l\?3\?2\?'
  - id: mz-header-check-interspersed
    desc: Obfuscated MZ header check (interspersed)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      # Matches 7?7? ... 9?0?
      regex: '7\?7\?.{0,50}9\?0\?'
  - id: xor-loop-interspersed
    desc: Obfuscated XOR loop (interspersed)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      # Matches ^?=? ... %? ... .?l?e?n?g?t?h?
      regex: '\^\?\=\?.{0,50}%\?.{0,50}l\?e\?n?g\?t\?h\?'
  - id: wscript-shell-interspersed
    desc: Obfuscated WScript.Shell (interspersed)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'W\?S\?c\?r\?i?p?t\?\.\?S\?h\?e\?l\?l\?'
  - id: http-interspersed
    desc: Obfuscated HTTP protocol marker (interspersed)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'h\?t\?t?p\?:\?/\?/\?'
  - id: adodb-save-to-file-interspersed
    desc: Obfuscated ADODB SaveToFile (interspersed)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'S\?a\?v?e?T\?o?F?i?l?e\?'
  - id: adodb-response-body-interspersed
    desc: Obfuscated ADODB ResponseBody (interspersed)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'R\?e\?s?p?o?n?s?e?B\?o?d?y\?'
