defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1027
  mbc: B0032

traits:
  - id: obfuscate-macro-pair
    desc: Repeated Rust obfuscate macro use
    crit: notable
    conf: 0.82
    count_min: 2
    if:
      type: text
      regex: 'obfuscate!\(\s*"[^"\n]{4,120}"\s*\)'
  - id: obfuscate-macro-strings
    desc: Repeated Rust obfuscate macro strings
    crit: suspicious
    conf: 0.88
    count_min: 3
    if:
      type: text
      regex: 'obfuscate!\(\s*"[^"\n]{4,120}"\s*\)'
