defaults:
  platforms: [windows]
  for: [javascript, typescript, vbs]
traits:
  - id: js-fragmented-url-htt
    desc: Fragmented URL scheme (htt+p)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?i)["'']htt["'']\s*\+\s*["'']p[:s]{0,2}["'']'
  - id: js-fragmented-url-ht
    desc: Fragmented URL scheme (ht+tp)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?i)["'']ht["'']\s*\+\s*["'']tp[:s]{0,2}["'']'
  - id: js-fragmented-url-h-ttp
    desc: Fragmented URL scheme (h+ttp)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?i)["'']h["'']\s*\+\s*["'']ttp[:s]{0,2}["'']'
  - id: js-fragmented-url-h-t-t-p
    desc: Fragmented URL scheme (h+t+t+p)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?i)["'']h["'']\s*\+\s*["'']t["'']\s*\+\s*["'']t["'']\s*\+\s*["'']p[:s]{0,2}["'']'
composite_rules:
  - id: js-fragmented-url-scheme
    desc: Fragmented HTTP/HTTPS URL scheme
    crit: suspicious
    conf: 0.8
    any:
      - id: js-fragmented-url-htt
      - id: js-fragmented-url-ht
      - id: js-fragmented-url-h-ttp
      - id: js-fragmented-url-h-t-t-p
