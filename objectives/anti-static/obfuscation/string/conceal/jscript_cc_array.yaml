defaults:
  platforms: [windows]
  for: [javascript]
traits:
  - id: js-gp-token-array
    desc: Dense gp token array
    crit: suspicious
    conf: 0.96
    size_min: 50000
    count_min: 200
    if:
      type: text
      substr: '("x", '
  - id: js-concat-gp-accumulator
    desc: gp array concat rebuild
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: an = an['c'+"o"+'n'+"ca"+"t"](gp[xu]);
  - id: js-char-map-assignment-burst
    desc: Dense char map assignments
    crit: suspicious
    conf: 0.93
    size_min: 50000
    count_min: 40
    if:
      type: text
      substr: =('d', '
  - id: js-f000-return-token-array
    desc: Repeated f000 token-return stubs
    crit: suspicious
    conf: 0.96
    size_min: 50000
    count_min: 200
    if:
      type: text
      substr: '(function f000(){return "'
  - id: js-short-token-hex-map
    desc: Short-token to hex-char map
    crit: suspicious
    conf: 0.95
    size_min: 50000
    count_min: 40
    if:
      type: text
      regex: "['\"]\\w{2,4}['\"]:\\s*'\\\\x[0-9a-f]{2}'"
  - id: js-accumulator-remap-eval
    desc: Token remap loop into eval buffer
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '\w+\s*=\s*\w+\s*\+\s*\w+;\s*}\s*eval\(\w+\)'
composite_rules:
  - id: js-token-remap-reconstruction
    desc: Token-array remap reconstruction
    crit: suspicious
    conf: 0.98
    all:
      - id: js-f000-return-token-array
      - id: js-short-token-hex-map
      - id: js-accumulator-remap-eval
