defaults:
  platforms: [windows]
  for: [javascript]
traits:
  - id: js-gp-token-array
    desc: Dense gp token array
    crit: suspicious
    conf: 0.96
    size_min: 50000
    count_min: 200
    if:
      type: text
      substr: '("x", '
  - id: js-concat-gp-accumulator
    desc: gp array concat rebuild
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: an = an['c'+"o"+'n'+"ca"+"t"](gp[xu]);
  - id: js-char-map-assignment-burst
    desc: Dense char map assignments
    crit: suspicious
    conf: 0.93
    size_min: 50000
    count_min: 40
    if:
      type: text
      substr: =('d', '
  - id: js-f000-return-token-array
    desc: Repeated f000 token-return stubs
    crit: suspicious
    conf: 0.96
    size_min: 50000
    count_min: 200
    if:
      type: text
      substr: '(function f000(){return "'
  - id: js-short-token-hex-map
    desc: Short-token to hex-char map
    crit: suspicious
    conf: 0.95
    size_min: 50000
    count_min: 40
    if:
      type: text
      regex: "['\"]\\w{2,4}['\"]:\\s*'\\\\x[0-9a-f]{2}'"
  - id: js-accumulator-remap-eval
    desc: Token remap loop into eval buffer
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '\w+\s*=\s*\w+\s*\+\s*\w+;\s*}\s*eval\(\w+\)'
  - id: js-hex-char-var-burst
    desc: Burst of hex-char var assignments
    crit: suspicious
    conf: 0.95
    size_min: 40000
    count_min: 40
    if:
      type: text
      regex: "var\\s+\\w{1,4}\\s*=\\s*'\\\\x[0-9a-f]{2}'"
      case_insensitive: true
  - id: js-array-accumulator-concat
    desc: Array element concat rebuild loop
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '\w+\s*=\s*\w+\.concat\(\w+\[\w+\]\)'
  - id: js-comment-buried-script-body
    desc: Heavy script body hidden in comment
    crit: suspicious
    conf: 0.92
    size_min: 20000
    size_max: 120000
    if:
      type: metrics
      field: comments.to_code_ratio
      min: 2.0
  - id: js-comment-exec-body
    desc: Executable code embedded in comment
    crit: notable
    conf: 0.92
    size_min: 20000
    not:
      - substr: "jQuery.fn.extend"
    if:
      type: metrics
      field: comments.code_in_comments
      min: 1
  - id: js-hex-escape-burst
    desc: Dense hex escape count
    crit: notable
    conf: 0.9
    size_min: 20000
    not:
      - substr: "jQuery.fn.extend"
    if:
      type: metrics
      field: text.hex_escape_count
      min: 60
composite_rules:
  - id: js-token-remap-reconstruction
    desc: Token-array remap reconstruction
    crit: suspicious
    conf: 0.98
    all:
      - id: js-f000-return-token-array
      - id: js-short-token-hex-map
      - id: js-accumulator-remap-eval
  - id: js-cc-array-reconstruction
    desc: Comment-hidden hex map array reconstruction
    crit: suspicious
    conf: 0.97
    all:
      - id: js-hex-char-var-burst
      - id: js-array-accumulator-concat
      - id: js-comment-exec-body
    any:
      - id: js-comment-buried-script-body
      - id: js-hex-escape-burst
