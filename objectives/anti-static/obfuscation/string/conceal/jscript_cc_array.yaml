defaults:
  platforms: [windows]
  for: [javascript]
traits:
  - id: js-gp-token-array
    desc: Dense gp token array
    crit: suspicious
    conf: 0.96
    size_min: 50000
    count_min: 200
    if:
      type: text
      substr: '("x", '
  - id: js-concat-gp-accumulator
    desc: gp array concat rebuild
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: an = an['c'+"o"+'n'+"ca"+"t"](gp[xu]);
  - id: js-char-map-assignment-burst
    desc: Dense char map assignments
    crit: suspicious
    conf: 0.93
    size_min: 50000
    count_min: 40
    if:
      type: text
      substr: =('d', '
