defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: nemucod-hash-injection-fragment
    desc: Nemucod string with interspersed #### filler
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '([A-Za-z]####){5,}'
  - id: nemucod-hash-deobfuscation-logic
    desc: "Nemucod deobf logic split(\"####\").join(\"\")"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\.split\("?####"?\)\.join\("?"?\)'
  - id: nemucod-cc-on-obfuscated
    desc: "obf JScript condcomp"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '/####\*####@####c####c####_####o####n'
