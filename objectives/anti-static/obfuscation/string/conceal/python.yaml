defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
traits:
  - id: py-hex-exec-string
    desc: Hex-encoded 'exec' string
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: (?i)65786563
  - id: py-bytes-fromhex-exec
    desc: Bytes fromhex containing 'exec'
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1027
    if:
      type: raw
      regex: bytes\.fromhex\(["'](?i)65786563["']\)
  - id: py-eval-compile-base64
    desc: Dynamic evaluation of base64 compiled code
    crit: suspicious
    conf: 0.8
    mbc: E1059
    attack: T1059.006
    if:
      type: raw
      regex: eval\s*\(\s*compile\s*\(\s*base64\.b64decode
composite_rules:
  - id: py-eval-compile-base64-hexexec
    desc: eval/compile/base64 chain with hex-obfuscated exec
    crit: hostile
    conf: 0.95
    mbc: E1059
    attack: T1059.006
    all:
      - id: py-eval-compile-base64
      - id: py-hex-exec-string
  - id: py-compile-with-hex-exec
    desc: compile() with hex-encoded exec mode string
    crit: hostile
    conf: 0.9
    mbc: B0032
    attack: T1027
    all:
      - id: objectives/anti-static/obfuscation/payload/bytecode::compile-word
    any:
      - id: py-hex-exec-string
      - id: py-bytes-fromhex-exec
