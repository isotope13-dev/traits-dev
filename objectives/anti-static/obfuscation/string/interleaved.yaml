defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: js-interleaved-junk-chars
    for: [scripts]
    count_min: 2
    desc: String contains interleaved junk characters (every 3rd
    crit: suspicious
    conf: 0.8
    not:
      - substr: SunMonTueWedThuFriSatJanFebMarAprMayJunJulAugSepOctNovDecUTC
      - substr: JanFebMarAprMayJunJulAugSepOctNovDec
      - substr: anFebMarAprMayJunJulAugSepOctNovD
      - substr: BlaBlaBlaBlaBla
      - substr: FooFooFooFooFoo
      - substr: BarBarBarBarBar
      - substr: ffBfiBflBfmBhaBiiBijBinBivBixB
      - substr: avg|max|and|asc|any|min|try|as|at|on|or|ln|is|of|in|if
    if:
      type: text
      regex: ([a-z]{2}[^a-z\s=,;:.()\[\]{}]){10,}
    downgrade:
      any:
        - type: metrics
          field: text.whitespace_ratio
          max: 0.1
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
  - id: js-interleaved-lowercase-junk
    for: [scripts]
    desc: String with high density of 3-character interleaved
    crit: notable
    conf: 0.7
    count_min: 2
    not:
      - substr: an error while printing
    if:
      type: text
      regex: ([a-z]{2}[^a-z\s=,;:.()\[\]{}]){20,}
    unless:
      - id: metadata/internal/symbols::ranked_dictionaries
      # Compiled Go/Rust/C binaries contain concatenated symbol-table runs that
      # trivially match this pattern; only meaningful on scripts or non-runtime
      # heavy text where a deliberate obfuscation scheme is the likely source.
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: js-dot-interleaved-charstream
    for: [scripts]
    desc: Dot-delimited interleaved character stream
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(\.[A-Za-z]){24,}'
