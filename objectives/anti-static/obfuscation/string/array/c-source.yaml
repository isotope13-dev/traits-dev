defaults:
  platforms: [windows, linux, macos]
  for: [c, cpp, elf, macho, pe]
traits:
  - id: strings-char-array
    desc: String obfuscation via char array
    crit: suspicious
    conf: 0.66
    mbc: B0032
    attack: T1027
    if:
      type: text
      regex: char\s+\w+\[\]\s*=\s*\{[0-9, ]+\}
    count_min: 10
  - id: strings-hex-raw
    desc: Hex-encoded string patterns
    crit: notable
    conf: 0.66
    count_min: 10
    if:
      type: text
      regex: \\x[0-9a-fA-F]{2}\\x[0-9a-fA-F]{2}\\x[0-9a-fA-F]{2}\\x[0-9a-fA-F]{2}
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - type: basename
        regex: '^(regress|tests?_|_test)'
        case_insensitive: true
      - type: basename
        regex: '^(fixture|mock)'
        case_insensitive: true
      - type: basename
        regex: '\.(test|spec)\.'
        case_insensitive: true
    downgrade:
      any:
        - id: well-known/lib/xml2
        - id: well-known/lib/xslt
