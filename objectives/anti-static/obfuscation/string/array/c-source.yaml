defaults:
  platforms: [windows, linux, macos]
  for: [c, cpp, elf, macho, pe]
traits:
- id: strings-char-array
  desc: String obfuscation via char array
  crit: suspicious
  conf: 0.66
  mbc: B0032
  attack: T1027
  if:
    type: text
    regex: char\s+\w+\[\]\s*=\s*\{[0-9, ]+\}
  unless:
  - type: path
    regex: '(^|[\\/])lib[\\/]dns[\\/]name\.c$'
  - id: well-known/app/nss::nss-crypto-test-data
  count_min: 10
- id: strings-hex-raw
  desc: Hex-encoded string patterns
  crit: notable
  conf: 0.66
  count_min: 10
  if:
    type: text
    regex: \\x[0-9a-fA-F]{2}\\x[0-9a-fA-F]{2}\\x[0-9a-fA-F]{2}\\x[0-9a-fA-F]{2}
  unless:
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: metadata/package/testing/
  - id: metadata/lang/source::linux-kernel-source-tree-path
  - type: text
    substr: "\\bw"
  # Test/fixture/mock source files commonly carry hex-escape vectors; one
  # combined basename exclusion (kept inline — this is an atomic trait).
  - type: basename
    regex: '^(regress|tests?_|_test|fixture|mock)|\.(test|spec)\.'
    case_insensitive: true
  downgrade:
    any:
    - id: well-known/lib/xml2
    - id: well-known/lib/xslt
