defaults:
  platforms: [windows, linux, macos]
  for: [c, cpp, elf, macho, pe]
traits:
  - id: strings-char-array
    desc: String obfuscation via char array
    crit: suspicious
    conf: 0.66
    mbc: B0032
    attack: T1027
    if:
      type: text
      regex: char\s+\w+\[\]\s*=\s*\{[0-9, ]+\}
  - id: strings-hex-raw
    desc: Hex-encoded string patterns
    crit: suspicious
    conf: 0.66
    count_min: 3
    if:
      type: text
      regex: \\x[0-9a-fA-F]{2}\\x[0-9a-fA-F]{2}\\x[0-9a-fA-F]{2}\\x[0-9a-fA-F]{2}
    unless:
      - id: metadata/package/testing/harness::is-test
