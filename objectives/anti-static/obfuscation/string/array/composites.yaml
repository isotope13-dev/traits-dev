defaults:
  platforms: [unix, windows]
traits:
  - id: test-script-basename
    desc: Test script basename
    crit: component
    conf: 0.98
    for: [javascript, typescript, html]
    if:
      type: basename
      regex: '(?i)(^|[\\/!]).*tests?[^\\/!]*\.(js|ts|html?)$'
composite_rules:
  - id: suspicious-massive-string-concatenation
    desc: "Massive string concatenation operations"
    crit: suspicious
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    all:
      - id: objectives/anti-static/obfuscation/string/array::massive-string-concatenation
    unless:
      - id: test-script-basename
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::test-basename-pattern
        - id: metadata/package/testing/presence/harness::test-directory
        - id: metadata/package/testing/harness/runtime::test-function-def
        - id: metadata/package/testing/harness/runtime::node-common-require
        - id: micro-behaviors/crypto/symmetric/aes/library::buffer-hex-key-material
