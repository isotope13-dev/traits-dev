defaults:
  platforms: [unix, windows]
traits:
  - id: test-script-basename
    desc: Test script basename
    crit: component
    conf: 0.98
    for: [javascript, typescript, html]
    if:
      type: path
      basename: true
      case_insensitive: true
      regex: '^.*tests?[^\\/]*\.(js|ts|html?)$'
composite_rules:
  - id: suspicious-massive-string-concatenation
    desc: "Massive string concatenation with obfuscation"
    crit: suspicious
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    all:
      - id: micro-behaviors/data/source/string::massive-string-concatenation
    any:
      - id: objectives/anti-static/obfuscation/string/array::large-random-variables
      - id: objectives/anti-static/obfuscation/string/array::string-array-hex-index
      - id: objectives/anti-static/obfuscation/string/array::hex-array-assignment
      - id: objectives/anti-static/obfuscation/string/array::obfuscated-string-array
    unless:
      - id: test-script-basename
      - id: well-known/lib/ace-editor
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
        - id: metadata/package/testing/presence/harness/
        - id: metadata/package/testing/harness/runtime::test-function-def
        - id: metadata/package/testing/harness/runtime::node-common-require
        - id: micro-behaviors/crypto/symmetric/aes/runtime-library::buffer-hex-key-material
