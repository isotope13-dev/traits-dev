defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: suspicious-massive-string-concatenation
    desc: "Massive string concatenation operations"
    crit: notable
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    all:
      - id: objectives/anti-static/obfuscation/string/array::massive-string-concatenation
    downgrade:
      any:
        - id: metadata/package/testing/harness::test-basename-pattern
        - id: metadata/package/testing/presence::test-directory
        - id: metadata/package/testing/harness::test-function-def
        - id: metadata/package/testing/harness::node-common-require
        - id: micro-behaviors/crypto/symmetric/aes::buffer-hex-key-material
