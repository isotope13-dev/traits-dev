# Advanced String Array Obfuscation - JavaScript
# Detects sophisticated string array obfuscation patterns used in malware
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027
defaults:
  platforms: [windows, unix]
  mbc: B0032
  for: [javascript, typescript]
traits:
  # Large random variable names (>30 chars) typical of obfuscators
  - id: large-random-variables
    desc: Large random variable names (obfuscation)
    crit: suspicious
    conf: 0.75
    attack: "T1027"
    count_min: 3
    per_kb_min: 0.1
    downgrade:
      any:
        - id: well-known/lib/videojs::release-bundle
        - id: well-known/tool/development/vscode-svelte::extension-bundle
    if:
      type: text
      regex: "\\b(var|let|const)\\s+[A-Z][a-zA-Z0-9_]{25,}\\b"
    not:
      - substr: WIN_BUILD_CONPTY_SUPPORTED
  # String array with hexadecimal indexing patterns
  - id: string-array-hex-index
    desc: String array with hex indexing
    crit: suspicious
    conf: 0.85
    attack: "T1027"
    count_min: 10
    per_kb_min: 0.5
    if:
      type: text
      regex: "\\w+\\(\\s*0x[0-9a-fA-F]{2,4}\\s*\\)"
    unless:
      - type: text
        regex: "\\b(String\\.)?fromCharCode\\s*\\("
      - id: metadata/package/testing/harness/runtime::is-test
  # String assignment to array with hex indices
  - id: hex-array-assignment
    desc: Hex array index assignment pattern
    crit: suspicious
    conf: 0.88
    attack: "T1027"
    count_min: 3
    if:
      type: text
      regex: "\\[\\s*['\"][0-9a-fA-F]{2,4}['\"]\\s*\\]\\s*=\\s*['\"][^'\"]{1,120}['\"]"
  # String array declaration with large obfuscated variable names
  - id: obfuscated-string-array
    desc: Obfuscated string array declaration
    crit: suspicious
    conf: 0.82
    attack: "T1027"
    count_min: 3
    if:
      type: text
      regex: "var\\s+[A-Z][a-zA-Z0-9_]{20,}\\s*=\\s*[A-Z][a-zA-Z0-9_]{20,}\\s*;"
    not:
      - substr: _default =
  # Function call with hex string argument pattern
  - id: hex-string-function-call
    desc: Function call with hex string argument
    crit: suspicious
    conf: 0.78
    attack: "T1027"
    count_min: 2
    if:
      type: text
      regex: "\\w+\\s*\\(\\s*['\"][0-9a-fA-F]{6,}['\"]\\s*\\)"
    unless:
      - id: metadata/package/testing/harness/runtime::electron-node-spec-harness
  # Multiple concatenated string literals (typical in deobfuscation)
  - id: massive-string-concatenation
    desc: Massive string concatenation operations
    crit: suspicious
    conf: 0.9
    attack: "T1027"
    count_min: 10
    per_kb_min: 1.0
    if:
      type: text
      regex: "\\+\\s*['\"][^'\"]{20,}['\"]"
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::test-basename-pattern
        - id: metadata/package/testing/presence::test-directory
        - id: metadata/package/testing/harness/runtime::test-function-def
  # Array element access with computed indices
  - id: computed-array-access
    desc: Array access with computed indices
    crit: suspicious
    conf: 0.72
    attack: "T1027"
    count_min: 3
    if:
      type: text
      regex: "\\w+\\[\\s*\\w+\\s*\\+\\s*0x[0-9a-fA-F]+\\s*\\]"
  - id: self-defending-regex
    desc: Self-defending regex guard string
    crit: suspicious
    conf: 0.94
    attack: "T1027"
    if:
      type: string_literal
      exact: "(((.+)+)+)+$"
  - id: constructor-string-split
    desc: Split constructor string access
    crit: suspicious
    conf: 0.94
    attack: "T1027"
    if:
      type: text
      substr: "['constructo'+'r']"
composite_rules:
  # Advanced string array obfuscation composite
  - id: advanced-string-array-obfuscation
    desc: Advanced string array obfuscation pattern
    crit: suspicious
    conf: 0.92
    attack: "T1027"
    needs: 2
    any:
      - id: large-random-variables
      - id: string-array-hex-index
      - id: hex-array-assignment
      - id: obfuscated-string-array
    all:
      - id: massive-string-concatenation
  # String deobfuscation routine
  - id: string-deobfuscation-routine
    desc: String deobfuscation routine
    crit: hostile
    conf: 0.95
    attack: "T1027.002"
    all:
      - id: large-random-variables
      - id: string-array-hex-index
      - id: massive-string-concatenation
    any:
      - id: hex-array-assignment
      - id: computed-array-access
  - id: self-defending-string-array
    desc: Self-defending string-array obfuscation
    crit: suspicious
    conf: 0.97
    attack: "T1027"
    needs: 2
    any:
      - id: advanced-string-array-obfuscation
      - id: string-array-hex-index
      - id: computed-array-access
      - id: constructor-string-split
      - id: self-defending-regex
