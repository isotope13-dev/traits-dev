# Advanced String Array Obfuscation - JavaScript
# Detects sophisticated string array obfuscation patterns used in malware
# MBC: B0032 (Obfuscated Files or Information)
# ATT&CK: T1027
defaults:
  platforms: [windows, unix]
  mbc: B0032
  for: [javascript, typescript]
traits:
  - id: typescript-expect-annotation
    desc: TypeScript expect annotation helper
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "\\$Expect(Error|Type)\\b"

  # Large random variable names (>30 chars) typical of obfuscators
  - id: large-random-variables
    desc: Large random variable names (obfuscation)
    crit: suspicious
    conf: 0.75
    attack: "T1027"
    count_min: 3
    per_kb_min: 0.1
    downgrade:
      any:
        - id: well-known/lib/videojs/
        - id: well-known/tool/development/vscode-svelte/
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/build/bundler::has-sourcemap
      - type: metrics
        field: identifiers.avg_entropy
        max: 3.0
      - id: objectives/anti-static/obfuscation/string/array/
      - type: basename
        regex: '(^|[-_.])(test|tests|spec)\.[cm]?[jt]sx?$'
    if:
      type: text
      regex: "\\b(var|let|const)\\s+[_$A-Za-z][_$A-Za-z]{0,15}[0-9_$][A-Za-z0-9$]{24,}\\b"
    not:
      - substr: WIN_BUILD_CONPTY_SUPPORTED
      - substr: Hydrat
      - regex: '\b[A-Za-z0-9_$]{20,}(Abi|Address)\b'
  # String array with hexadecimal indexing patterns
  - id: string-array-hex-index
    desc: String array with hex indexing
    crit: suspicious
    conf: 0.85
    attack: "T1027"
    count_min: 10
    per_kb_min: 0.5
    if:
      type: text
      regex: "\\b[A-Za-z_$][A-Za-z0-9_$]{2,}\\[\\s*0x[0-9a-fA-F]{2,4}\\s*\\]"
    unless:
      - id: metadata/package/files/system-package::debian-missing-sources-vendored-crate
      - type: text
        regex: "\\b(String\\.)?fromCharCode\\s*\\("
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/files/dependency::node-modules-path
      - id: metadata/library/structure/
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: metadata/package/files/system-package::julia-runtime-path
      - id: well-known/lib/ggml
      - id: well-known/lib/hpc
  # String assignment to array with hex indices
  - id: bracket-concat-rebuild
    desc: Bracket-notation array concat rebuild pattern
    crit: component
    conf: 0.6
    attack: "T1027"
    if:
      type: text
      regex: \['concat'\]\(\w+\[\w+\]\)
  - id: hex-array-assignment
    desc: Hex array index assignment pattern
    crit: suspicious
    conf: 0.88
    attack: "T1027"
    count_min: 3
    if:
      type: text
      regex: "\\[\\s*['\"][0-9a-fA-F]{2,4}['\"]\\s*\\]\\s*=\\s*['\"][^'\"]{1,120}['\"]"
    unless:
      - id: metadata/library/structure/
  # String array declaration with large obfuscated variable names
  - id: obfuscated-string-array
    desc: Obfuscated string array declaration
    crit: suspicious
    conf: 0.82
    attack: "T1027"
    count_min: 3
    if:
      type: text
      regex: "var\\s+[A-Za-z][A-Za-z0-9$]{20,}\\s*=\\s*\\[\\s*['\"][^'\"]{1,120}['\"]"
    not:
      - substr: _default =
    unless:
      - id: metadata/library/react::library-comp
      - id: well-known/tool/development/aube::aube-package-test-fixture
      - id: well-known/lib/geeviz::package-context
      - id: well-known/lib/geeviz::package-path
      - id: well-known/lib/json-ts/
      - id: metadata/library/structure/
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/package/files/dependency::node-modules-path
      - id: well-known/tool/development/yarn::yarn-cli-bundle-marker
  # Multiple concatenated string literals (typical in deobfuscation)
  - id: zod-schema-description-concat
    desc: Zod schema description text
    crit: baseline
    conf: 0.88
    if:
      type: text
      regex: '\.describe\s*\([^)]{0,600}\+\s*["'']'
  - id: prompt-fragment-marker
    desc: Prompt fragment marker
    crit: baseline
    conf: 0.88
    if:
      type: text
      regex: '<(plan-mode|web-search)>'
  - id: self-defending-regex
    desc: Self-defending regex guard string
    crit: suspicious
    conf: 0.94
    attack: "T1027"
    if:
      type: string_literal
      exact: "(((.+)+)+)+$"
  - id: constructor-string-split
    desc: Split constructor string access
    crit: suspicious
    conf: 0.94
    attack: "T1027"
    if:
      type: text
      substr: "['constructo'+'r']"
    unless:
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: metadata/build/bundler::vscode-extension-output-path
      - id: well-known/app/dbcode::extension-context
  - id: inline-font-data-uri
    desc: Inline font data URI asset
    crit: baseline
    if:
      type: text
      regex: 'data:font/[a-z0-9.+-]+;base64,'
  - id: repeated-numeric-array-string-decoding
    desc: Repeated numeric arrays decoded to strings
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: 'String\.fromCharCode\s*\(\s*\.\.\.\s*\[\s*\d{2,3}(\s*,\s*\d{2,3}){3,}\s*\]'
    unless:
      - id: metadata/package/testing/harness/runtime/

composite_rules:
  - id: typescript-annotation-marker
    desc: TypeScript declaration or expect marker
    crit: component
    conf: 0.9
    any:
      - id: metadata/lang/scripted::dts-declaration-file
      - id: typescript-expect-annotation

  # Advanced string array obfuscation composite
  - id: advanced-string-array-obfuscation
    desc: Advanced string array obfuscation pattern
    crit: suspicious
    conf: 0.92
    attack: "T1027"
    needs: 2
    any:
      - id: large-random-variables
      - id: string-array-hex-index
      - id: hex-array-assignment
      - id: obfuscated-string-array
    all:
      - id: micro-behaviors/data/source/string::massive-string-concatenation
  # String deobfuscation routine
  - id: string-deobfuscation-routine
    desc: String deobfuscation routine
    crit: hostile
    conf: 0.95
    attack: "T1027.002"
    all:
      - id: large-random-variables
      - id: string-array-hex-index
      - id: micro-behaviors/data/source/string::massive-string-concatenation
    any:
      - id: hex-array-assignment
      - id: micro-behaviors/data/source/syntax/array::computed-index-hex-array-access
    unless:
      - id: well-known/tool/development/pymobiledevice3
  - id: self-defending-string-array
    desc: Self-defending string-array obfuscation
    crit: suspicious
    conf: 0.97
    attack: "T1027"
    needs: 2
    any:
      - id: advanced-string-array-obfuscation
      - id: string-array-hex-index
      - id: micro-behaviors/data/source/syntax/array::computed-index-hex-array-access
      - id: constructor-string-split
      - id: self-defending-regex
    unless:
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: metadata/build/bundler::vscode-extension-output-path
      - id: well-known/app/dbcode::extension-context
  - id: obfuscated-browser-xhr-client
    desc: Obfuscated browser XHR client
    crit: hostile
    conf: 0.94
    attack: "T1027"
    all:
      - id: string-array-hex-index
      - id: micro-behaviors/communications/http/request/client::xmlhttprequest-new
      - id: micro-behaviors/communications/http/user-agent::navigator-useragent-read
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::push-shift-bracket-pattern
      - id: objectives/anti-static/obfuscation/encoding/hex::mixed-hex-decimal
    needs: 1
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/files/dependency::node-modules-path
      - id: metadata/library/structure/
