defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: B0032
  attack: T1027
traits:
  - id: php-escaped-global-string-table
    desc: PHP escaped global string table
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'GLOBALS.{0,20}=array\("\\x[0-9a-fA-F]{2}\\x[0-9a-fA-F]{2}'
  - id: php-string-table-lookup-function
    desc: PHP string table lookup function
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'function.{0,60}\$GLOBALS\[["''][A-Za-z0-9_]+["'']\]\s*\['
  - id: php-heavy-hex-escape-density
    desc: PHP heavy hex escape density
    crit: component
    conf: 0.86
    if:
      type: metrics
      field: text.hex_escape_count
      min: 1000
      min_size: 8192
  - id: php-string-lookup-call-density
    desc: PHP dense string lookup calls
    crit: component
    conf: 0.85
    count_min: 100
    if:
      type: text
      regex: '_?[A-Za-z0-9_]+\s*\(\s*\d+\s*\)'
composite_rules:
  - id: php-escaped-string-table-obfuscation
    desc: PHP escaped string table obfuscation
    crit: suspicious
    conf: 0.94
    all:
      - id: php-escaped-global-string-table
      - id: php-string-table-lookup-function
    any:
      - id: php-heavy-hex-escape-density
      - id: php-string-lookup-call-density
      - id: objectives/anti-static/obfuscation/imports::dynamic-function-execution
    needs: 1
  - id: php-packed-string-table-dispatch
    desc: PHP packed string table dispatch
    crit: suspicious
    conf: 0.96
    all:
      - id: php-escaped-string-table-obfuscation
      - id: objectives/anti-static/obfuscation/code-metrics::php-single-long-line
    any:
      - id: objectives/anti-static/obfuscation/code-metrics::php-many-short-functions
      - id: objectives/anti-static/obfuscation/imports::dynamic-function-execution
