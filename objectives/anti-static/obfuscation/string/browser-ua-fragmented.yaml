# Browser User-Agent built as fragmented stack strings.
#
# A legitimate program that ships a browser User-Agent stores it as a
# single contiguous literal — the cleave string extractor picks it up
# as one unit, e.g. `Mozilla/5.0 (Windows NT 10.0; Win64; x64) ...`.
#
# Malware that wants the runtime UA but does not want a static IAT
# scanner to see "Mozilla/5.0 (Windows NT 10.0; ..." builds the UA
# character-by-character on the stack at runtime. The stack-string
# extractor recovers each ~16-byte chunk separately, producing
# multiple short fragments (`AppleWebKit/537.36 `, `KHTML, like
# Gecko)`, `Chrome/145.0.0.`, `Safari/537.36 `, `Edg/145.0.0`,
# `dows NT 10.0; Wi`, `n64; x64) AppleW`, etc.) instead of one
# contiguous UA.
#
# The fragmentation itself is the obfuscation signal; pairing
# multiple short fragments inside a single binary is high-precision.
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1027.007"
  mbc: "B0032"

traits:
  - id: ua-fragment-applewebkit
    desc: AppleWebKit UA fragment
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: AppleWebKit/537

  - id: ua-fragment-khtml-gecko
    desc: KHTML like Gecko UA fragment
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: KHTML, like Gecko

  - id: ua-fragment-chrome-version
    desc: Chrome version UA fragment
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "Chrome/[0-9]{2,3}\\.0\\.0"

  - id: ua-fragment-safari-version
    desc: Safari version UA fragment
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: Safari/537

  - id: ua-fragment-edge-version
    desc: Edge version UA fragment
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: "Edg/[0-9]{2,3}\\.0"

  - id: ua-fragment-mozilla-prefix
    desc: Mozilla/5.0 stack-string prefix
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "Mozilla/5.0 (Win"

  - id: ua-fragment-windows-nt
    desc: Windows NT 10 fragment
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: "(?i)dows NT 10\\.0|Windows NT 10\\.0; Win"

composite_rules:
  - id: browser-ua-fragmented-stack-strings
    desc: Browser UA built as fragmented stack strings
    crit: suspicious
    conf: 0.95
    needs: 4
    any:
      - id: ua-fragment-applewebkit
      - id: ua-fragment-khtml-gecko
      - id: ua-fragment-chrome-version
      - id: ua-fragment-safari-version
      - id: ua-fragment-edge-version
      - id: ua-fragment-mozilla-prefix
      - id: ua-fragment-windows-nt
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/framework::dotnet-singlefilehost-runtime
      - id: well-known/app/internet-explorer::internet-explorer-frame-component
      - id: well-known/lib/wine::wine-runtime-component
