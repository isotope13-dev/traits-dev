defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
  attack: T1027
  mbc: B0032
traits:
  - id: low-function-large-code
    desc: Very few functions for code section size
    crit: component
    conf: 0.8
    size_min: 102400
    if:
      type: metrics
      field: binary.func_count
      max: 5
  - id: dominant-text-section
    desc: Code section dominates file layout
    crit: component
    conf: 0.7
    if:
      id: objectives/anti-static/obfuscation/payload/section::packed-loader-largest-section-dominates
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
composite_rules:
  - id: stack-obfuscated-dropper-profile
    desc: Obfuscated dropper with stack strings and hidden capabilities
    crit: hostile
    conf: 0.92
    all:
      - id: objectives/anti-static/obfuscation/string/anomaly::stack-string-obfuscated-pe
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/privilege/manifest::highest-available
      - id: low-function-large-code
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/library/data::pybind11-marker
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-functions
        - id: metadata/binary/installer/family::known-benign-installer
        - id: well-known/app/qdrant::application-bundle
  - id: obfuscated-monolithic-code-blob
    desc: Large code blob with minimal functions and stack strings
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/anti-static/obfuscation/string/anomaly::many-stack-strings
      - id: low-function-large-code
      - id: dominant-text-section
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/platform::microsoft
      - id: metadata/library/data::pybind11-marker
    downgrade:
      any:
        - id: metadata/binary/installer/family::known-benign-installer
        - id: well-known/app/mpv::application-bundle
        - id: well-known/app/qdrant::application-bundle
