defaults:
  platforms: [unix, windows]
traits:
  - id: batch-extreme-line-bloat
    desc: Batch extreme line-length bloat
    crit: suspicious
    conf: 0.95
    for: [batch]
    if:
      type: metrics
      field: text.avg_line_length
      min: 300
      min_size: 65536

  - id: batch-long-line-saturation
    desc: Batch saturated with long lines
    crit: suspicious
    conf: 0.96
    for: [batch]
    if:
      type: metrics
      field: text.lines_over_200
      min: 80
      min_size: 65536

  - id: batch-low-whitespace-density
    desc: Batch unusually low whitespace density
    crit: suspicious
    conf: 0.9
    for: [batch]
    if:
      type: metrics
      field: text.whitespace_ratio
      max: 0.03
      min_size: 65536

  - id: batch-long-token-saturation
    desc: Batch saturated with long tokens
    crit: suspicious
    conf: 0.92
    for: [batch]
    if:
      type: metrics
      field: text.long_token_count
      min: 120
      min_size: 65536

  - id: js-license-overrides-basename
    desc: JavaScript license override basename
    crit: component
    for: [javascript, typescript]
    if:
      type: basename
      exact: license-overrides.js

  - id: js-many-import-modules
    desc: JavaScript many imported modules
    crit: component
    for: [javascript, typescript]
    if:
      type: metrics
      field: imports.unique_modules
      min: 100

  - id: js-image-data-uri
    desc: JavaScript image data URI
    crit: component
    for: [javascript, typescript]
    if:
      type: text
      regex: 'data:image/[A-Za-z0-9.+-]+;base64,'

  - id: js-min-or-map-basename
    desc: JavaScript minified or map basename
    crit: component
    for: [javascript, typescript]
    if:
      type: basename
      regex: '\.(?:min\.js|js\.map)$'

  - id: js-search-index-basename
    desc: JavaScript search index basename
    crit: component
    for: [javascript, typescript]
    if:
      type: basename
      regex: '^(?:member-|module-|package-|type-)?search-index\.js$'

  - id: js-hashed-bundle-basename
    desc: JavaScript hashed bundle basename
    crit: component
    for: [javascript, typescript]
    if:
      type: basename
      regex: '^[a-z][\w.-]*-[A-Za-z0-9]{8}\.js$'
  - id: foamtree-vendor-basename
    desc: Foamtree vendor library basename
    crit: component
    for: [javascript, typescript]
    if:
      type: basename
      exact: carrotsearch.foamtree.js

  - id: javascript-line-bloat
    desc: JavaScript unusually long average lines
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    not:
      - regex: '(sourceText:|window\.gitbook)'
      - regex: '(For license information|prettierPlugins\.typescript=e\(\))'
    unless:
      - id: benign-javascript-line-bloat-context
      - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
    if:
      type: metrics
      field: text.avg_line_length
      min: 180
      min_size: 8192
      max_size: 3145728

  - id: script-host-line-bloat
    desc: PowerShell or VBScript line bloat
    crit: suspicious
    conf: 0.85
    for: [powershell, vbs]
    if:
      type: metrics
      field: text.avg_line_length
      min: 140
      min_size: 4096

composite_rules:
  - id: batch-fragmentation-metrics
    desc: Batch fragmentation and junk-padding profile
    crit: suspicious
    conf: 0.97
    for: [batch]
    needs: 3
    any:
      - id: batch-extreme-line-bloat
      - id: batch-long-line-saturation
      - id: batch-low-whitespace-density
      - id: batch-long-token-saturation

  - id: benign-javascript-line-bloat-context
    desc: Benign JavaScript long-line context
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    any:
      - id: js-license-overrides-basename
      - id: js-many-import-modules
      - id: js-image-data-uri
      - id: js-min-or-map-basename
      - id: js-search-index-basename
      - id: js-hashed-bundle-basename
      - id: foamtree-vendor-basename
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
      - id: metadata/package/testing/harness::is-test
