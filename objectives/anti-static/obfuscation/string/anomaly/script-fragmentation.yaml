defaults:
  platforms: [unix, windows]
traits:
  - id: batch-extreme-line-bloat
    desc: Batch extreme line-length bloat
    crit: suspicious
    conf: 0.95
    for: [batch]
    unless:
      - id: metadata/file/string/identity/
    if:
      type: metrics
      field: text.avg_line_length
      min: 300
      min_size: 65536

  - id: batch-long-line-saturation
    desc: Batch saturated with long lines
    crit: notable
    conf: 0.96
    for: [batch]
    if:
      type: metrics
      field: text.lines_over_200
      min: 80
      min_size: 65536

  - id: batch-low-whitespace-density
    desc: Batch unusually low whitespace density
    crit: suspicious
    conf: 0.9
    for: [batch]
    unless:
      - id: metadata/file/string/identity/
    if:
      type: metrics
      field: text.whitespace_ratio
      max: 0.03
      min_size: 65536

  - id: batch-long-token-saturation
    desc: Batch saturated with long tokens
    crit: notable
    conf: 0.92
    for: [batch]
    if:
      type: metrics
      field: text.long_token_count
      min: 120
      min_size: 65536

  - id: batch-delayed-substring-slicing
    desc: Batch delayed substring reconstruction
    crit: suspicious
    conf: 0.94
    for: [batch]
    count_min: 10
    if:
      type: text
      regex: '![A-Za-z0-9_]{6,}:~[0-9]+,[0-9]+!'
    unless:
      - id: well-known/tool/development/batch-scripts::uup-converter-wimlib-batch

  - id: batch-percent-substring-slicing
    desc: Batch percent substring reconstruction
    crit: suspicious
    conf: 0.94
    for: [batch]
    count_min: 20
    if:
      type: text
      regex: '%[A-Za-z0-9_]{6,}:~[0-9]+,[0-9]+%'

  - id: batch-raw-percent-slice-fragments
    desc: Batch raw percent slice reconstruction fragments
    crit: suspicious
    conf: 0.94
    for: [batch]
    count_min: 20
    if:
      type: text
      regex: ':~[0-9]{1,3},1%%[A-Za-z0-9_]{2,12}%'
    unless:
      - id: well-known/tool/development/batch-scripts::uup-converter-wimlib-batch

  - id: batch-comcom-obfuscator-preamble
    desc: Batch COMCOM obfuscator preamble
    crit: component
    conf: 0.9
    for: [batch]
    if:
      type: text
      regex: '(?s)\ACOMCOM.{0,80}&@cls&@set\s+"[_A-Za-z0-9]'

  - id: batch-certreq-embedded-blob
    desc: Batch certificate-request embedded payload blob
    crit: component
    conf: 0.9
    for: [batch]
    if:
      type: text
      substr: '-----BEGIN NEW CERTIFICATE REQUEST-----'

  - id: batch-large-parse-fallback
    desc: Large batch parse fallback
    crit: component
    conf: 0.86
    for: [batch]
    if:
      type: metrics
      field: parse.error_count
      min: 1
      min_size: 65536

  - id: batch-nonascii-padding
    desc: Batch non-ASCII padding
    crit: component
    conf: 0.9
    for: [batch]
    if:
      type: metrics
      field: text.non_ascii_ratio
      min: 0.5
      min_size: 4096

  - id: batch-many-long-lines
    desc: Batch many long lines
    crit: component
    conf: 0.9
    for: [batch]
    if:
      type: metrics
      field: text.lines_over_200
      min: 50
      min_size: 4096

  - id: batch-parse-extract-panic
    desc: Batch parser extract panic
    crit: component
    conf: 0.9
    for: [batch]
    if:
      type: metrics
      field: parse.error_count
      min: 1

  - id: batch-extension-mismatch
    desc: Batch extension mismatch
    crit: component
    conf: 0.86
    for: [batch]
    if:
      type: metrics
      field: consistency.extension_content_mismatch
      min: 1

  - id: batch-rundll32-fragments
    desc: Batch reconstructs rundll32
    crit: suspicious
    conf: 0.92
    for: [batch]
    if:
      type: text
      regex: '(?is)set\s+[A-Za-z]{18,}=ru.{0,160}=nd.{0,160}=ll.{0,160}=32'

  - id: batch-dat-init-rundll-target
    desc: Batch calls DAT init export
    crit: suspicious
    conf: 0.92
    for: [batch]
    if:
      type: text
      regex: '(?i)\.DAT,init\b'

  - id: batch-colon-padding-lines
    desc: Batch colon padding lines
    crit: notable
    conf: 0.82
    for: [batch]
    count_min: 8
    if:
      type: text
      regex: '(?m)^:{80,}\r?$'

  - id: js-license-overrides-basename
    desc: JavaScript license override basename
    crit: component
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      exact: license-overrides.js

  - id: js-min-or-map-basename
    desc: JavaScript minified or map basename
    crit: component
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '\.(min\.js|js\.map)$'

  - id: js-search-index-basename
    desc: JavaScript search index basename
    crit: component
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      regex: '^(member-|module-|package-|type-)?search-index\.js$'

  - id: foamtree-vendor-basename
    desc: Foamtree vendor library basename
    crit: component
    for: [javascript, typescript]
    if:
      type: path
      basename: true
      exact: carrotsearch.foamtree.js

  - id: javascript-line-bloat
    desc: JavaScript unusually long average lines
    crit: notable
    conf: 0.84
    for: [javascript, typescript]
    not:
      - regex: '(^|[\\/])usr/share/man[\\/]|(?i)\.[1-9](pm)?(\.gz)?$'
      - regex: '(sourceText:|window\.gitbook)'
      - regex: '(For license information|prettierPlugins\.typescript=e\(\))'
    unless:
      - id: objectives/anti-static/obfuscation/string/anomaly/
      - id: objectives/anti-static/obfuscation/code-metrics/structure/
      - type: basename
        exact: license-overrides.js
      - type: metrics
        field: imports.unique_modules
        min: 100
      - id: metadata/file/metrics::low-whitespace
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/package/testing/harness/runtime/
    if:
      type: metrics
      field: text.avg_line_length
      min: 180
      min_size: 8192
      max_size: 3145728

  - id: script-host-line-bloat
    desc: PowerShell or VBScript line bloat
    crit: suspicious
    conf: 0.85
    for: [powershell, vbs]
    if:
      type: metrics
      field: text.avg_line_length
      min: 140
      min_size: 4096
    unless:
      - type: path
        regex: '(^|[\\/])\.git([\\/]|$)'
      - type: basename
        regex: '\.(js|css|ts)\.map$'
      # PowerShell data files commonly contain long documentation records;
      # this rule is for obfuscated executable script, not .psd1 manifests.
      - type: basename
        regex: '(?i)\.psd1$'
      # Authenticode certificate comments and embedded signed payload material
      # can make otherwise readable PowerShell appear to have bloated lines.
      - id: metadata/signed/certificate/identity::powershell-signature-block
      - id: metadata/file/format::sourcemap-sources-content
      - id: well-known/app/maester/
      - id: well-known/app/colorscripts-enhanced::package-context
      - id: metadata/package/testing/presence/fixture/

  - id: vbs-many-long-lines
    desc: VBScript has 500 or more long lines
    crit: notable
    conf: 0.96
    for: [vbs]
    if:
      type: metrics
      field: text.lines_over_200
      min: 500
      min_size: 100000

  - id: vbs-many-long-tokens
    desc: VBScript has 500 or more long tokens
    crit: notable
    conf: 0.96
    for: [vbs]
    if:
      type: metrics
      field: text.long_token_count
      min: 500
      min_size: 100000

  - id: vbs-uppercase-alphabet-loop
    desc: VBScript builds an uppercase alphabet
    crit: suspicious
    conf: 0.94
    for: [vbs]
    if:
      type: text
      regex: '(?i)\bFor\s+\w+\s*=\s*65\s+To\s+90\b'

  - id: vbs-lowercase-alphabet-loop
    desc: VBScript builds a lowercase alphabet
    crit: suspicious
    conf: 0.94
    for: [vbs]
    if:
      type: text
      regex: '(?i)\bFor\s+\w+\s*=\s*97\s+To\s+122\b'

  - id: vbs-alphabet-remap
    desc: VBScript remaps an encoded alphabet
    crit: suspicious
    conf: 0.96
    for: [vbs]
    if:
      type: text
      regex: '(?i)\bInStr\s*\([^\r\n]{0,120}\bMid\s*\('

  - id: vbs-xor-character-code--left
    desc: VBScript XORs a character-code slice
    crit: component
    conf: 0.94
    for: [vbs]
    count_min: 8
    if:
      type: text
      regex: '(?i)\b(Asc|ChrW?|Mid)\s*\([^\r\n]{0,80}\bXor\b'
  - id: vbs-xor-character-code--right
    desc: VBScript XORs a character-code slice
    crit: component
    conf: 0.94
    for: [vbs]
    count_min: 8
    if:
      type: text
      regex: '(?i)\bXor\b[^\r\n]{0,80}\b(Asc|ChrW?|Mid)\s*\('

  - id: dense-obfuscated-powershell
    desc: Dense long-line PowerShell source profile
    crit: suspicious
    conf: 0.96
    for: [powershell]
    size_min: 100000
    if:
      type: metrics
      field: text.lines_over_500
      min: 50
    unless:
      - type: text
        substr: "Code generated by Microsoft (R) AutoRest Code Generator"

composite_rules:
  - id: vbs-repeated-xor-obfuscation
    desc: Repeated VBScript XOR obfuscation
    crit: suspicious
    conf: 0.94
    for: [vbs]
    any:
      - id: vbs-xor-character-code--left
      - id: vbs-xor-character-code--right

  - id: vbs-custom-alphabet-executeglobal-loader
    desc: VBScript custom-alphabet decoder feeds ExecuteGlobal
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.005
    all:
      - id: vbs-uppercase-alphabet-loop
      - id: vbs-lowercase-alphabet-loop
      - id: vbs-alphabet-remap
      - id: micro-behaviors/process/interpreter/eval::vbs-executeglobal

  - id: vbs-bloated-executeglobal-loader
    desc: VBScript long-token obfuscation feeds ExecuteGlobal
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.005
    all:
      - id: vbs-many-long-lines
      - id: vbs-many-long-tokens
      - id: micro-behaviors/process/interpreter/eval::vbs-executeglobal

  - id: powershell-obfuscated-byte-loader
    desc: PowerShell obfuscated byte-array loader
    crit: hostile
    conf: 0.99
    for: [powershell]
    all:
      - id: dense-obfuscated-powershell
      - id: micro-behaviors/crypto/symmetric/xor/loop::indexed-bxor-key-loop
      - id: objectives/anti-static/obfuscation/string/reconstruct::single-char-concat-pattern

  - id: batch-fragmentation-metrics
    desc: Batch fragmentation and junk-padding profile
    crit: suspicious
    conf: 0.97
    for: [batch]
    needs: 3
    any:
      - id: batch-extreme-line-bloat
      - id: batch-long-line-saturation
      - id: batch-low-whitespace-density
      - id: batch-long-token-saturation
      - id: batch-colon-padding-lines

  - id: batch-cjk-long-token-obfuscation
    desc: Batch CJK long-token obfuscation
    crit: suspicious
    conf: 0.96
    for: [batch]
    all:
      - id: objectives/command-and-control/dropper/staging/embedded::batch-has-long-token
      - id: metadata/file/profile/language::script-han
    any:
      - id: metadata/file/metrics::single-long-line
      - id: objectives/evasion/masquerade/interpreter::mislabeled-single-line-source
    needs: 1

  - id: batch-fragmented-rundll32-dat-loader
    desc: Batch fragmented rundll32 DAT loader
    crit: suspicious
    conf: 0.96
    for: [batch]
    all:
      - id: batch-rundll32-fragments
      - id: batch-dat-init-rundll-target

  - id: batch-substring-embedded-payload-obfuscation
    desc: Batch substring-obfuscated embedded payload
    crit: hostile
    conf: 0.97
    for: [batch]
    all:
      - id: batch-raw-percent-slice-fragments
      - id: batch-certreq-embedded-blob
    any:
      - id: batch-comcom-obfuscator-preamble
      - id: batch-large-parse-fallback
    needs: 1

  - id: batch-multiscript-long-token-obfuscation
    desc: Batch multiscript token obfuscation
    crit: suspicious
    conf: 0.94
    for: [batch]
    all:
      - id: batch-cjk-long-token-obfuscation
      - id: metadata/file/profile/language::lang-korean

  - id: batch-appended-line-identifier-obfuscation
    desc: Batch appended-line identifier obfuscation
    crit: suspicious
    conf: 0.95
    for: [batch]
    all:
      - id: metadata/file/metrics::high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics/structure::appended-long-line
      - id: objectives/anti-static/obfuscation/code-metrics/structure::last-line-over-1000

  - id: batch-nonascii-command-padding
    desc: Batch non-ASCII command padding
    crit: suspicious
    conf: 0.95
    for: [batch]
    all:
      - id: batch-nonascii-padding
      - id: batch-many-long-lines
      - id: batch-parse-extract-panic

  - id: batch-mismatched-tiny-stager
    desc: Batch mismatched tiny stager
    crit: suspicious
    conf: 0.92
    for: [batch]
    all:
      - id: batch-extension-mismatch
      - id: metadata/file/profile/identity::tiny-text-script
      - id: micro-behaviors/fs/path/os::hardcoded-windows-root
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::uri-literal-raw
    any:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: micro-behaviors/time/sleep/interval::batch-timeout-delay
    needs: 1

  - id: batch-cjk-percent-slice-command-reconstruction
    desc: CJK-noise batch command reconstruction
    crit: hostile
    conf: 0.97
    attack: T1027
    for: [batch]
    all:
      - id: batch-cjk-long-token-obfuscation
      - id: objectives/command-and-control/dropper/execution/string-reconstruct::batch-dense-percent-slice-operator
      - id: objectives/command-and-control/dropper/execution/string-reconstruct::batch-rouki-obfuscator-marker

  - id: batch-cjk-obfuscator-loader
    desc: CJK-noise obfuscator loader
    crit: hostile
    conf: 0.97
    attack: T1027
    for: [batch]
    all:
      - id: objectives/command-and-control/dropper/execution/string-reconstruct::batch-dense-percent-slice-operator
      - id: objectives/command-and-control/dropper/execution/string-reconstruct::batch-rouki-obfuscator-marker
      - id: metadata/file/profile/language::lang-japanese

  - id: recognized-javascript-line-bloat-marker
    desc: Recognized JavaScript long-line marker
    crit: component
    conf: 0.95
    for: [javascript, typescript]
    any:
      - id: js-license-overrides-basename
      - id: metadata/file/metrics::imports-unique-modules-60
      - id: metadata/library/structure::js-image-data-url
      - id: js-min-or-map-basename
      - id: js-search-index-basename
      - id: metadata/build/bundler::js-hashed-bundle-basename
      - id: foamtree-vendor-basename
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/file/catalog/identity::frequency-list-catalog
