defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
  attack: T1027
  mbc: B0032
traits:
  - id: many-stack-strings
    desc: Many stack-constructed strings detected
    crit: component
    conf: 0.85
    size_min: 51200
    count_min: 30
    if:
      type: encoded
      encoding: stack
      regex: ".{4,}"
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: benign-stack-string-context
    downgrade:
      any:
        - id: benign-stack-string-context
  - id: random-alphanumeric-stack-strings
    desc: Random alphanumeric stack string cluster
    crit: suspicious
    conf: 0.88
    size_min: 51200
    count_min: 15
    if:
      type: encoded
      encoding: stack
      regex: "^[A-Z0-9_]{10,}"
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: benign-stack-string-context
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-functions
        - id: well-known/lib/dioxus
        - id: metadata/signed/platform::microsoft
composite_rules:
  - id: stack-string-obfuscated-pe
    desc: PE with heavy stack string obfuscation
    crit: suspicious
    conf: 0.9
    all:
      - id: many-stack-strings
    any:
      - id: random-alphanumeric-stack-strings
      - id: metadata/binary/anomaly/format::low-function-count-marker
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: benign-stack-string-context
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: benign-stack-string-context
  - id: benign-stack-string-context
    desc: Benign context for compiler-generated stack strings
    crit: component
    conf: 0.9
    any:
      - id: metadata/binary/metrics/structural::many-functions
      - id: well-known/lib/dioxus
      - id: well-known/app/mpv::application-bundle
      - id: well-known/app/qdrant::application-bundle
      - id: well-known/app/swifttunnel_vpn::swifttunnel
      - id: well-known/game/mod::wynncraft-overhaul-installer
      - id: metadata/library/data::pybind11-marker
      - id: micro-behaviors/data/db/conn/postgresql::rust-sqlx-postgres-client
      - id: micro-behaviors/data/db/conn/sql::sql-generic
      - id: metadata/library/qt/
