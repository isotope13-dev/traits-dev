defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
  attack: T1027
  mbc: B0032
traits:
  - id: many-stack-strings
    desc: Many stack-constructed strings detected
    crit: suspicious
    conf: 0.85
    size_min: 51200
    count_min: 30
    if:
      type: encoded
      encoding: stack
      regex: ".{4,}"
    unless:
      - id: metadata/binary/framework::dotnet-assembly
    downgrade:
      any:
        - id: metadata/binary/metrics::many-functions
  - id: random-alphanumeric-stack-strings
    desc: Random alphanumeric stack string cluster
    crit: suspicious
    conf: 0.88
    size_min: 51200
    count_min: 15
    if:
      type: encoded
      encoding: stack
      regex: "^[A-Z0-9_]{10,}"
    unless:
      - id: metadata/binary/framework::dotnet-assembly
    downgrade:
      any:
        - id: metadata/binary/metrics::many-functions
        - id: metadata/signed/platform::microsoft
composite_rules:
  - id: stack-string-obfuscated-pe
    desc: PE with heavy stack string obfuscation
    crit: suspicious
    conf: 0.9
    all:
      - id: many-stack-strings
    any:
      - id: random-alphanumeric-stack-strings
      - id: metadata/binary/anomaly::low-function-count-marker
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    needs: 1
    unless:
      - id: metadata/binary/framework::dotnet-assembly
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics::many-functions
