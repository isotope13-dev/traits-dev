defaults:
  platforms: [unix, windows, macos]
  crit: hostile
  conf: 1.0
composite_rules:
  - id: pe-masquerading-as-image
    desc: PE executable masquerading as an image file
    all:
      - id: metadata/format/magic::pe-dos-stub
      - id: metadata/format/extension::image-extension
    unless:
      - id: metadata/format/extension::exe
