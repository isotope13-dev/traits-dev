defaults:
  platforms:
    - linux
    - macos
    - windows
  attack: T1027.002
  mbc: F0001
  for: [elf, macho, pe]
traits:
  - id: xor-inc-loop-x86
    desc: XOR decryption loop (x86)
    crit: suspicious
    conf: 0.85
    arch: [x86, x86-64]
    count_min: 4
    per_kb_min: 0.05
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 30 ?? 4? E2
  - id: xor-jmp-short-loop
    desc: XOR with short jump loop
    crit: suspicious
    conf: 0.8
    count_min: 4
    per_kb_min: 0.05
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 80 3? ?? EB ??
    unless:
      - type: basename
        regex: '\.o$'
      - id: metadata/package/files/system-package::debian-account-maintainer-tool
      - id: well-known/lib/sqlite/
      # PE .text in an IL-only managed assembly contains arbitrary IL and
      # embedded data bytes; native instruction signatures are not valid there.
      - id: metadata/binary/framework::dotnet-assembly
  - id: dense-xor-operations
    desc: Dense XOR operations in code
    crit: suspicious
    conf: 0.85
    count_min: 10
    per_kb_min: 15.0
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 30|31|32|33
  - id: single-byte-xor-key
    desc: Single-byte XOR decryption stub
    crit: suspicious
    conf: 0.9
    count_min: 3
    per_kb_min: 0.02
    if:
      type: hex
      section: text
      pattern: 33 06 46 E2
  - id: eor-loop-arm
    desc: EOR decryption loop (ARM64)
    crit: suspicious
    conf: 0.85
    platforms:
      - linux
      - macos
    for:
      - elf
    per_kb_min: 10.0
    count_min: 20
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: 4A|CA
  - id: small-encrypted-section
    desc: Small high-entropy section (encrypted stub)
    crit: suspicious
    conf: 0.75
    entropy_min: 6.5
    if:
      type: section
      executable: true
      entropy_min: 6.5
      length_min: 128
      length_max: 2048
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/binary/layout::svk-packed-section
        - id: well-known/app/dell-display-manager/
        - id: well-known/app/portrait-displays-display-tune/
        - id: metadata/package/quality/false-positives::benign-app-fp-context
    unless:
      - id: well-known/lib/onnxruntime::onnxruntime-library
  - id: unusual-entry-point-section
    desc: Entry point in non-standard section
    crit: component
    conf: 0.8
    if:
      type: section
      executable: true
      entropy_min: 6.5
      length_max: 65536
    unless:
      - type: section
        exact: .text
        executable: true
      - type: section
        exact: __text
        executable: true
      - type: section
        exact: __TEXT,__unwind_info
        executable: true
composite_rules:
  - id: packed-stub-indicators
    desc: Packed stub structural indicators
    crit: component
    conf: 0.8
    any:
      - id: small-encrypted-section
      - id: unusual-entry-point-section
  - id: polymorphic-decryptor
    desc: Polymorphic decryption stub
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: xor-inc-loop-x86
      - id: xor-jmp-short-loop
      - id: single-byte-xor-key
      - id: eor-loop-arm
      - id: dense-xor-operations
  - id: packed-with-decryption
    desc: Packed executable with runtime decryption
    crit: hostile
    conf: 0.98
    all:
      - id: packed-stub-indicators
      - id: polymorphic-decryptor
  - id: xor-packer
    desc: Simple XOR-based packer
    crit: hostile
    conf: 0.92
    needs: 2
    any:
      - id: xor-inc-loop-x86
      - id: single-byte-xor-key
      - id: xor-jmp-short-loop
      - id: dense-xor-operations
