defaults:
  platforms: [windows, linux, unix, android, macos, ios]
composite_rules:
  - id: evasive-rc4-loader
    desc: "Evasive packed executable combining RC4 crypto, timing checks, and structural anomalies"
    crit: hostile
    conf: 0.95
    attack: "T1027"
    for: [pe, elf, macho]
    all:
      - id: micro-behaviors/crypto/symmetric/stream::rc4-xor-loop
      - id: objectives/anti-analysis/timing/evasion::timing-sandbox-evasion
    any:
      - id: objectives/anti-static/obfuscation/payload/section::oversized-data-section
      - id: objectives/anti-static/obfuscation/binary-structure::huge-null-run-text
      - id: objectives/anti-static/obfuscation/binary-structure::low-entropy-executable
    unless:
      - id: metadata/binary/metrics/structural::many-exports
      - id: metadata/binary/metrics/structural::many-imports
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics/size::large-file-1mb
