defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  size_min: 32768
  size_max: 16777216

traits:
  - id: high-text-entropy-7p4
    desc: Code section entropy above 7.4
    crit: component
    conf: 0.95
    if:
      type: metrics
      field: binary.code_entropy
      min: 7.4

    unless:
    - id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: very-low-func-count
    desc: Very low recovered function count
    crit: component
    conf: 0.95
    if:
      type: metrics
      field: binary.func_count
      max: 10

  - id: high-string-count-2000
    desc: High plaintext string count
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.string_count
      min: 2000

    unless:
    - id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: low-avg-string-entropy
    desc: Low average string entropy (dictionary text)
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.avg_string_entropy
      max: 3.5

composite_rules:
  - id: packed-pe-dictionary-padding
    desc: Packed PE with dictionary-word padding
    crit: suspicious
    conf: 0.92
    all:
      - id: high-text-entropy-7p4
      - id: very-low-func-count
      - id: high-string-count-2000
      - id: low-avg-string-entropy
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/certificate::pe-signature-verified
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/binary/framework::dotnet-assembly

  - id: polymorphic-win32-infector-shape
    desc: Polymorphic Win32 infector structural shape
    crit: hostile
    conf: 0.93
    all:
      - id: packed-pe-dictionary-padding
      - id: objectives/privilege-escalation/token-manipulation::token-spawn-api-chain
    any:
      - id: micro-behaviors/os/service/control::create-service-import
      - id: micro-behaviors/communications/ipc/named-pipe::connect-named-pipe
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/certificate::pe-signature-verified

  - id: packed-pe-token-spawn-elevation
    desc: Packed PE with user-token spawn pivot
    crit: suspicious
    conf: 0.92
    all:
      - id: high-text-entropy-7p4
      - id: very-low-func-count
      - id: objectives/privilege-escalation/token-manipulation::token-spawn-api-chain
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/certificate::pe-signature-verified

  - id: packed-pe-service-install-pivot
    desc: Packed PE with service install pivot
    crit: suspicious
    conf: 0.9
    all:
      - id: high-text-entropy-7p4
      - id: very-low-func-count
      - id: micro-behaviors/os/service/control::create-service-import
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/certificate::pe-signature-verified
      - id: metadata/binary/installer/family::known-benign-installer
