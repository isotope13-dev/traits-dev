# Petite-packed stub with large overlay containing multiple benign PE
# binaries as camouflage. The stub is tiny (few functions, few imports)
# but the file is large due to appended legitimate executables that
# reduce overall entropy and inject benign vendor metadata.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009
  mbc: B0032
composite_rules:
- id: tiny-truncated-pe-loader-stub
  desc: Tiny PE with truncated loader sections
  crit: hostile
  conf: 0.97
  all:
  - id: metadata/binary/metrics/structural::section-exceeds-file-size
  - id: metadata/binary/metrics/structural::multiple-pe-section-overflows
  - id: metadata/binary/metrics/structural::pe-relocation-table-overhang
  size_max: 4096
  unless:
  - id: metadata/binary/installer/family/
  - id: metadata/signed/platform/
  - id: well-known/lib/benign-runtime-bundles/
- id: petite-stub-multi-pe-overlay
  desc: Petite-packed stub with multiple embedded PE overlays
  crit: hostile
  conf: 0.95
  all:
  - id: objectives/anti-static/pack/detect::petite-section
  - id: metadata/binary/metrics/structural::embedded-pe-three-plus
  - id: metadata/binary/metrics/structural::no-functions
  any:
  - id: objectives/anti-static/obfuscation/string/junking::repeated-padding-marker
  - id: metadata/binary/metrics/structural::malformed-pe-structure
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/installer/script/
  - id: metadata/binary/installer/script/
