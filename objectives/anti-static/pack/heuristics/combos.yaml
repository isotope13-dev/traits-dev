# Anti-Static: Packing and Obfuscation
# Composite rules for detecting packed or obfuscated code
defaults:
  platforms: [windows, linux, macos, unix, android, ios]
composite_rules:
  - id: embedded-compression
    desc: Embedded compressed payload
    crit: notable
    conf: 0.90
    attack: "T1140"
    mbc: "C0032"
    for: ["pe"]
    # Bootloaders and firmware commonly embed compressed payloads
    # Downgraded to notable - not suspicious without additional packing indicators
    any:
      - id: micro-behaviors/data/encode/compression::lzma-signature
      - id: micro-behaviors/data/encode/compression::lzma-magic-dup
  - id: packed-ad-targeting
    desc: Packed binary with Active Directory and Terminal Services imports
    crit: suspicious
    conf: 0.8
    attack: "T1027"
    for: [pe]
    all:
      - id: micro-behaviors/dylib/load/dsprop/
      - id: micro-behaviors/dylib/load/wtsapi/
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
  - id: payload-unpacking
    desc: Embedded payload with unpacking capability
    crit: notable
    conf: 0.85
    attack: "T1140"
    mbc: "C0032"
    for: ["pe"]
    all:
      - id: objectives/anti-static/pack/heuristics::embedded-compression
      - id: objectives/anti-static/obfuscation/reflection/class::dynamic-load-pattern
    downgrade:
      any:
        - id: metadata/vendor/valve::valve-corp-binary
  # Large packed JS with excessive function arguments and string decryptor
  - id: packed-js-payload
    desc: Packed JavaScript payload with string decryptor
    crit: hostile
    conf: 0.98
    attack: "T1027"
    mbc: "B0032"
    for: [javascript, typescript]
    needs: 3
    any:
      - id: micro-behaviors/data/text/keywords/malware::user-get-action-class
      - id: objectives/anti-static/pack::excessive-function-arguments
      - id: objectives/anti-static/pack::packed-string-decryptor
      - id: metadata/binary/metrics::large-source-file-4mb
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
  # Large packed binary with excessive arguments
  - id: packed-excessive-args
    desc: Large packed file with excessive function arguments
    crit: suspicious
    conf: 0.9
    attack: "T1027"
    mbc: "B0032"
    for: [javascript, typescript]
    all:
      - id: objectives/anti-static/pack::excessive-function-arguments
      - id: metadata/binary/metrics::large-source-file-1mb
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
