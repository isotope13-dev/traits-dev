defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: pe-missing-rsrc-with-resource-imports
    desc: Binary has high data inflation, no resources, but imports resource APIs
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/binary/section/metrics::inflated-data-section
      - id: metadata/binary/resource::no-resources
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction