# Tiny MSVC-style PE stubs whose entire job is to resolve KERNEL32 at runtime
# and decrypt/execute a high-entropy overlay payload. Distinct from
# rsrc-overlay-memory-loader (rich resources, LoadLibraryA) and the Delphi
# Inno overlay loaders (Delphi runtime gate). Targets the small-stub +
# encrypted-overlay + dynamic-resolution shape used by classic generic packers
# and shellcode crypters.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.002
  mbc: B0032
composite_rules:
  - id: tiny-stub-encrypted-overlay-loader
    desc: Tiny PE stub with encrypted overlay payload
    crit: suspicious
    conf: 0.92
    size_max: 131072
    all:
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: metadata/binary/layout::overlay-over-90pct
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-entropy-overlay-raw
      - id: metadata/binary/symbols/imports::pe-imports-max-six
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/script::inno-setup-installer-text
      - id: metadata/binary/installer/script::inno-setup-installer-data
      - id: metadata/binary/framework/

  - id: tiny-stub-window-class-anti-debug
    desc: Tiny PE with dynamic resolution and window-class lookup
    crit: suspicious
    conf: 0.88
    attack: T1497.001
    mbc: B0001
    size_max: 131072
    all:
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: metadata/binary/symbols/imports::pe-imports-max-six
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: micro-behaviors/ui/window/manage/control::find-window-a-import
      - id: micro-behaviors/ui/window/manage/control::find-window-w-import
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/framework/
      - id: metadata/package/versioning::pe-version-resource

  - id: tiny-stub-overlay-window-anti-debug
    desc: Tiny overlay-loader stub with window-class anti-debug
    crit: hostile
    conf: 0.94
    attack: T1497.001
    mbc: B0001
    size_max: 131072
    all:
      - id: tiny-stub-encrypted-overlay-loader
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: micro-behaviors/ui/window/manage/control::find-window-a-import
      - id: micro-behaviors/ui/window/manage/control::find-window-w-import
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
