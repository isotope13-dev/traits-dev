defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [binaries]
traits:
  - id: upx-tool-marker
    desc: UPX tool version marker
    crit: baseline
    if:
      type: encoded
      encoding: wide
      substr: "UPX executable packer"
  - id: malformed-elf-downgrade
    desc: Downgrade malformed ELF findings in UPX tool
    crit: notable
    if:
      id: anti-analysis/malformed/elf-header
    downgrade:
      any:
        - id: upx-tool-marker
  - id: upx-packer-downgrade
    desc: Downgrade UPX packer finding for legit tool
    crit: notable
    if:
      id: anti-static/pack/upx
    downgrade:
      any:
        - id: upx-tool-marker
