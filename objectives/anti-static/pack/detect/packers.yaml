defaults:
  platforms:
    - windows
  for:
    - pe
    - pe
traits:
  - id: intellilock-protector
    desc: IntelliLock (Eziriz) protector marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: IntelliLock
  - id: enigma-protector-string
    desc: Enigma Protector marker string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Enigma Protector
  - id: enigma-protector-domain
    desc: Enigma Protector domain marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: enigmaprotector.com
  - id: themida-or-asprotect
    desc: Themida or ASProtect section
    crit: component
    if:
      type: section
      regex: '(\.themida|\.aspr)'
composite_rules:
  - id: enigma-protector
    desc: Enigma Protector packer marker
    crit: notable
    conf: 0.95
    any:
      - id: enigma-protector-string
      - id: enigma-protector-domain
  - id: common-packers
    desc: Common PE packers
    crit: notable
    conf: 0.85
    any:
      - id: objectives/anti-static/pack/detect::upx-section
      - id: objectives/anti-static/pack/detect::upx-marker
      - id: metadata/binary/framework::asprotect
      - id: objectives/anti-static/pack/detect::aspack-marker
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature
      - id: enigma-protector
      - id: intellilock-protector
