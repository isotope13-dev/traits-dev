defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: enigma-protector
  desc: Enigma Protector marker
  if:
    type: text
    substr: Enigma Protector
- id: intellilock-protector
  desc: IntelliLock (Eziriz) protector marker
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: IntelliLock
- id: obsidium-software-marker
  desc: Obsidium software marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Obsidium Software
- id: themida-or-asprotect
  desc: Themida or ASProtect section
  crit: component
  if:
    type: section
    regex: '(\.themida|\.aspr)'
- id: themida-memory-section
  desc: Themida memory-only RWX section
  crit: component
  conf: 0.96
  if:
    type: section
    exact: .themida
    writable: true
    executable: true
    length_max: 0
- id: boot-packed-section
  desc: High-entropy .boot packer section
  crit: component
  conf: 0.94
  if:
    type: section
    exact: .boot
    executable: true
    entropy_min: 7.7
    length_min: 1048576
composite_rules:
- id: themida-boot-loader-layout
  desc: Themida boot loader layout
  crit: notable
  conf: 0.98
  mbc: F0001
  attack: T1027.002
  all:
  - id: themida-memory-section
  - id: boot-packed-section
  - id: metadata/binary/metrics/structural::high-code-entropy
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: self-issued-themida-packed-loader
  desc: Self-issued Themida-packed PE loader
  crit: hostile
  conf: 0.97
  mbc: F0001
  attack: T1027.002,T1036.005
  all:
  - id: themida-boot-loader-layout
  - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
  - id: metadata/signed/unknown/
  - id: metadata/binary/section/names::blank-section-name-cluster
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: themida-sparse-import-loader
  desc: Themida loader with hidden imports
  crit: suspicious
  conf: 0.98
  mbc: F0001
  attack: T1027.002
  all:
  - id: themida-boot-loader-layout
  - id: metadata/binary/symbols/imports::pe-single-import-dll
  - id: metadata/binary/symbols/imports::single-import-raw
  - id: metadata/package/metrics::recovered-function-count-under-10
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: themida-zeroed-provenance-blank-loader
  desc: Themida-packed PE with blank sections and a zeroed build timestamp
  crit: hostile
  conf: 0.99
  mbc: F0001
  attack: T1027.002,T1070.006
  for: [pe]
  all:
  - id: themida-boot-loader-layout
  - id: metadata/binary/section/names::blank-section-name-cluster
  - id: metadata/binary/anomaly/provenance::pe-zero-timestamp
  - id: metadata/binary/metrics/structural::minimal-exports
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: untrusted-themida-future-loader
  desc: Unsigned Themida loader with opaque identity and future timestamp
  crit: hostile
  conf: 0.98
  mbc: F0001
  attack: T1027.002,T1036.005,T1070.006
  all:
  - id: themida-boot-loader-layout
  - id: metadata/binary/symbols/imports::single-import-raw
  - id: objectives/evasion/masquerade/identity/fabricated::opaque-original-filename-token
  - id: metadata/binary/anomaly/provenance::pe-far-future-timestamp
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: npc-packed-pe
  desc: NPC-packed PE payload section
  crit: suspicious
  conf: 0.98
  mbc: F0001
  attack: T1027.002
  all:
  - id: metadata/binary/section/metrics::npc-zero-perm-payload-section
  - id: metadata/binary/section/metrics::large-rwx-text-section
  unless:
  - id: metadata/signed/platform/
- id: tiny-upx-vb6-executable
  desc: Tiny UPX-packed VB6 executable
  crit: suspicious
  conf: 0.94
  mbc: F0001
  attack: T1027.002
  all:
  - id: metadata/binary/section/names::upx-section-pair
  - id: metadata/binary/framework::vb6-application-framework
  - id: metadata/binary/metrics/structural::no-functions
  - id: micro-behaviors/os/module/load::get-proc-address-import
  any:
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  size_max: 32768
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: upx-dynamic-loader-stub
  desc: UPX dynamic loader stub
  crit: notable
  conf: 0.95
  mbc: F0001
  attack: T1027.002
  size_max: 614400
  all:
  - id: metadata/binary/section/names::upx-section-pair
  - id: metadata/binary/section/metrics::pe-nonstandard-entry
  - id: metadata/binary/metrics/structural::no-functions
  - id: micro-behaviors/os/module/load::get-proc-address-import
  any:
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/mem/protect/modify::virtual-free
  needs: 2
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: common-packers
  desc: Common PE packers
  crit: notable
  conf: 0.85
  any:
  - id: metadata/binary/section/names::upx-section
  - id: objectives/anti-static/pack/detect::upx-marker
  - id: objectives/anti-static/pack/asprotect
  - id: objectives/anti-static/pack/detect::aspack-marker
  - id: objectives/anti-static/pack/detect::expressor-packer
  - id: micro-behaviors/data/encode/pecompact::pecompact-signature
  - id: enigma-protector
  - id: intellilock-protector
  - id: obsidium-software-marker
  - id: themida-or-asprotect
- id: tampered-upx-decoy-stub
  desc: UPX-named sections with tampered stub layout
  crit: hostile
  conf: 0.95
  mbc: F0001.008
  attack: T1027.002
  size_max: 524288
  all:
  - id: metadata/binary/section/names::upx-section-pair
  - id: objectives/command-and-control/dropper/execution/loader::empty-rwx-upx0
  - id: metadata/binary/section/metrics::elevated-text-entropy-section
  - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
  - id: micro-behaviors/os/module/load::get-proc-address-import
  unless:
  - id: metadata/signed/platform/
  - id: metadata/signed/developer
  - id: metadata/binary/installer/family/
