# Dean Edwards Packer Detection
# Detects the classic 'eval(function(p,a,c,k,e,d)...' packing pattern
# Often used for legitimate minification but also for obfuscating malicious scripts
# ATT&CK: T1027 (Obfuscated Files or Information)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: dean-edwards
    desc: "Dean Edwards JavaScript Packer detected"
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "eval\\(function\\(p,a,c,k,e,[dr]\\)"
    unless:
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-core
      - id: metadata/library/syntaxhighlighter::syntaxhighlighter-header-url
