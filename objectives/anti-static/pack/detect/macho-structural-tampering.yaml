# Mach-O structural tampering — composite rules elevating clusters of
# segment / EP anomalies to `hostile`. The base atomic traits live at
# `metadata/binary/anomaly/format/macho.yaml`; on their own each is a
# `notable` or `suspicious` signal, but two-or-more-fired together is
# a high-confidence packing / unpacker-stub fingerprint that warrants
# objective-tier classification.
#
# Catches in the validation corpus:
#   * vxshell, d_mac_x64 (DPRK MachOMan): writable-EP + W+X + bad-pagezero
#   * Teams (DPRK Teams masquerade): writable-EP + W+X + chained-fixups
defaults:
  platforms: [macos, ios]
  for: [macho]
  attack: T1027.002
composite_rules:
  # Core cluster — writable EP region AND a W+X loadable segment.
  # Two independent structural signals; together they are the textbook
  # self-modifying / unpacker-stub fingerprint.
  - id: macho-structural-tampering-cluster
    desc: Mach-O writable EP region with W+X segment cluster
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/binary/anomaly/format::macho-entry-in-writable-segment
      - id: metadata/binary/anomaly/format::macho-wx-segment
    unless:
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: well-known/lib/node-notifier/
      - id: well-known/lib/sindresorhus-do-not-disturb/
      - id: well-known/tool/sysadmin/pngpaste/

  # Modern-shaped tampering — writable EP region plus any of the
  # auxiliary tampering signs (W+X, bad PAGEZERO, encrypted section).
  # Catches "modern looking" malware (Teams) where the build tries to
  # blend in via chained-fixups but the loadable geometry betrays it.
  - id: macho-modern-shaped-tampering
    desc: Mach-O writable EP region with auxiliary tampering signs
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/binary/anomaly/format::macho-entry-in-writable-segment
    any:
      - id: metadata/binary/anomaly/format::macho-wx-segment
      - id: metadata/binary/anomaly/format::macho-pagezero-size-anomalous
      - id: metadata/binary/anomaly/format::macho-encrypted-section-present
    unless:
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: well-known/lib/node-notifier/
      - id: well-known/lib/sindresorhus-do-not-disturb/
      - id: well-known/tool/sysadmin/pngpaste/
