defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: upx-marker
    desc: UPX packer marker string
    crit: component
    conf: 0.8
    if:
      type: text
      regex: UPX[!01]
    unless:
      - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
      - id: well-known/tool/dual-use/nirsoft::snremove-utility
  - id: aspack-marker
    desc: ASPack packer marker
    crit: notable
    conf: 0.8
    if:
      type: text
      word: ASPack
      case_insensitive: true
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\baspack\b
  - id: petite-marker
    desc: Petite packer signature string
    crit: component
    conf: 0.95
    if:
      type: text
      regex: (?i)\b(Compressed by Petite|Petite\s+v?\d|Petite\s+\(c\)\s*1999\s+Ian\s+Luck)\b
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bpetite(\.[^\\/\r\n]+)?\b
      - regex: Petite Capitals( From Capitals)?
  - id: petite-section
    desc: Petite packer section name
    for: [elf, macho, pe]
    crit: notable
    conf: 0.85
    if:
      type: section
      regex: ^@?\.?petite$
  - id: themida-marker
    desc: Themida packer marker
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: Themida
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bthemida([^\\/\r\n]{0,80})?\b
  - id: themida-section
    desc: Themida packed binary section
    for: [elf, macho, pe]
    crit: suspicious
    conf: 0.95
    mbc: F0001
    if:
      type: section
      regex: ^@?\.themida$
      entropy_min: 1.0
  - id: vmprotect-marker
    desc: VMProtect packer marker
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)\bVMProtect\s*(v\d|\d)
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bvmprotect([^\\/\r\n]{0,80})?\b
  - id: vmprotect-section
    desc: VMProtect packed binary section name
    for: [elf, macho, pe]
    crit: suspicious
    conf: 0.95
    mbc: F0001
    if:
      type: section
      regex: ^\.vmp[0-9]+$
  - id: expressor-demo-string
    desc: eXPressor demo packer string
    crit: component
    conf: 0.98
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      exact: This program was packed with a demo version of eXPressor
  - id: expressor-v13-marker
    desc: eXPressor version 1.3 marker
    crit: component
    conf: 0.98
    for: [pe, dll]
    platforms: [windows]
    if:
      type: text
      substr: ExPr-v.1.3
  - id: expressor-code-section
    desc: eXPressor code section name
    crit: component
    conf: 0.9
    for: [pe, dll]
    platforms: [windows]
    if:
      type: section
      exact: .ex_cod
composite_rules:
  - id: detect
    desc: Packed/compressed executable
    crit: notable
    conf: 0.66
    mbc: F0001
    attack: T1027.002
    any:
      - id: upx-marker
      - id: aspack-marker
      - id: petite-marker
      - id: petite-section
      - id: themida-marker
      - id: themida-section
      - id: vmprotect-marker
      - id: expressor-packer
  - id: expressor-packer
    desc: eXPressor packed executable
    crit: suspicious
    conf: 0.98
    mbc: F0001
    attack: T1027.002
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: expressor-v13-marker
    any:
      - id: expressor-demo-string
      - id: expressor-code-section
    unless:
      - id: well-known/game/online::moyu-packed-game-context
  - id: packed-decoy-ui
    desc: Packed binary with UI framework
    crit: suspicious
    conf: 0.9
    mbc: F0001
    attack: T1204.001
    all:
      - id: upx-marker
      - id: metadata/binary/metrics/structural::few-sections
      - id: micro-behaviors/dylib/load/runtime::webkit-framework
  - id: empty-text-minimal-import-packed-pe
    desc: Empty text PE with minimal imports and high entropy
    crit: hostile
    conf: 0.96
    attack: T1027.002
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: objectives/anti-static/obfuscation/payload/section::empty-text-section
      - id: metadata/binary/metrics/structural::high-code-entropy
      - id: metadata/binary/symbols/imports::pe-imports-max-six
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/protected-benign-pe/
