defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: upx-marker
    desc: UPX packer marker string
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: UPX[!01]
    unless:
      - id: metadata/binary/symbols::ollydbg-plugin-export
  - id: aspack-marker
    desc: ASPack packer marker
    crit: notable
    conf: 0.8
    if:
      type: text
      word: ASPack
      case_insensitive: true
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\baspack\b
  - id: petite-marker
    desc: Petite packer marker
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (^|[^A-Za-z])Petite([^A-Za-z]|$)
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bpetite(?:\.[^\\/\r\n]+)?\b
      - regex: Petite Capitals( From Capitals)?
  - id: petite-section
    desc: Petite packer section name
    crit: suspicious
    conf: 0.95
    if:
      type: section
      regex: ^@?\.?petite$
  - id: themida-marker
    desc: Themida packer marker
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: Themida
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bthemida(?:[^\\/\r\n]{0,80})?\b
  - id: themida-section
    desc: Themida packed binary section
    crit: suspicious
    conf: 0.95
    mbc: F0001
    if:
      type: section
      regex: ^@?\.themida$
      entropy_min: 1.0
  - id: vmprotect-marker
    desc: VMProtect packer marker
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)\bVMProtect\s*(v\d|\d)
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bvmprotect(?:[^\\/\r\n]{0,80})?\b
  - id: upx-section
    desc: UPX packed binary section name
    crit: notable
    conf: 0.95
    mbc: F0001.008
    if:
      type: section
      regex: (?i)^(\.?UPX\d*)$
    unless:
      - id: metadata/binary/symbols::ollydbg-plugin-export
  - id: vmprotect-section
    desc: VMProtect packed binary section name
    crit: suspicious
    conf: 0.95
    mbc: F0001
    if:
      type: section
      regex: ^\.vmp[0-9]+$
composite_rules:
  - id: detect
    desc: Packed/compressed executable
    crit: notable
    conf: 0.66
    mbc: F0001
    attack: T1027.002
    any:
      - id: upx-marker
      - id: aspack-marker
      - id: petite-marker
      - id: petite-section
      - id: themida-marker
      - id: themida-section
      - id: vmprotect-marker
  - id: packed-decoy-ui
    desc: Packed binary with UI framework
    crit: suspicious
    conf: 0.9
    mbc: F0001
    attack: T1204.001
    all:
      - id: upx-marker
      - id: metadata/binary/metrics::few-sections
      - id: micro-behaviors/dylib/load::webkit-framework
