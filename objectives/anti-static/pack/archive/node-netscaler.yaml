defaults:
  platforms: [netscaler, appliance, unix]
  for: [typescript, javascript]
  attack: T1027

traits:
  - id: node-require-decode-payload
    desc: Requires a Node payload decoder
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)\brequire\s*\([^)]{0,80}\bdecodePayload\b'

  - id: node-import-decode-payload
    desc: Imports a Node payload decoder
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bimport\s+[\s\S]{0,80}\bdecodePayload\b'

  - id: node-packed-payload-log
    desc: Logs unpacking of packed payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "[pack] payload decoded"

  - id: node-unpacked-size-use
    desc: Reads unpacked payload length
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: unpacked.length

composite_rules:
  - id: node-decode-payload-import
    desc: Imports a Node payload decoder
    crit: notable
    conf: 0.92
    any:
      - id: node-require-decode-payload
      - id: node-import-decode-payload

  - id: node-packed-payload-execution
    desc: Node packed payload execution
    crit: hostile
    conf: 0.98
    all:
      - id: node-decode-payload-import
      - id: node-packed-payload-log
    any:
      - id: node-unpacked-size-use
