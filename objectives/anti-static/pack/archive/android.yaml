defaults:
  platforms: [android]
  for: [apk]
  attack: T1406
  mbc: B0024

traits:
  - id: encrypted-classes-dex
    desc: "APK encrypts classes.dex inside ZIP container"
    crit: suspicious
    conf: 0.97
    if:
      type: hex
      pattern: "50 4B 03 04 00 00 01 00 08 00 [16] 0B 00 00 00 63 6C 61 73 73 65 73 2E 64 65 78"

  - id: encrypted-android-manifest
    desc: 'crypto android manifest'
    crit: suspicious
    conf: 0.97
    if:
      type: hex
      pattern: "50 4B 03 04 00 00 01 00 08 00 [16] 13 00 00 00 41 6E 64 72 6F 69 64 4D 61 6E 69 66 65 73 74 2E 78 6D 6C"

  - id: encrypted-libsys-core
    desc: APK encrypts libsys_core native runtime
    crit: suspicious
    conf: 0.96
    if:
      type: hex
      pattern: "50 4B 03 04 00 00 01 00 08 00 [16] 1D 00 00 00 6C 69 62 2F [6] 2F 6C 69 62 73 79 73 5F 63 6F 72 65 2E 73 6F"

  - id: apk-extreme-member-name-length
    desc: APK extreme archive member name
    crit: component
    conf: 0.94
    if:
      type: metrics
      field: archive.max_filename_length
      min: 1024

  - id: apk-encrypted-member-cluster
    desc: APK contains multiple encrypted archive members
    crit: component
    conf: 0.94
    for: [zip]
    if:
      type: metrics
      field: archive.security.encrypted_count
      min: 3

  - id: apk-misplaced-executable-members
    desc: APK has misplaced executables
    crit: component
    conf: 0.9
    for: [archives, apk]
    if:
      type: metrics
      field: archive.misplaced_executable_count
      min: 1

  - id: apk-executable-member-cluster
    desc: APK has clustered executables
    crit: component
    conf: 0.9
    for: [archives]
    if:
      type: metrics
      field: archive.executable_count
      min: 4

  - id: apk-large-member-set
    desc: APK has large member table
    crit: component
    conf: 0.86
    for: [archives, apk]
    if:
      type: metrics
      field: archive.file_count
      min: 500

  - id: apk-heavy-path-traversal
    desc: APK has many path-traversal members
    crit: suspicious
    conf: 0.98
    if:
      type: metrics
      field: archive.path_traversal_count
      min: 20

  - id: apk-rtlo-member-name
    desc: APK has RTLO member name
    crit: suspicious
    conf: 0.94
    for: [archives]
    if:
      type: metrics
      field: archive.rtlo_filename_count
      min: 1

  - id: apk-unicode-member-cluster
    desc: APK has Unicode member cluster
    crit: component
    conf: 0.88
    if:
      type: metrics
      field: archive.unicode_filename_count
      min: 100

  - id: apk-empty-primary-dex-member
    desc: APK primary DEX member is empty
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: "classes\\.dex\\x03\\x00PK"

  - id: apk-resource-table-pseudo-member-cluster
    desc: APK resource table pseudo-member cluster
    crit: component
    conf: 0.9
    count_min: 20
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^resources\\.arsc/[A-Za-z0-9]{12,20}\\.(xml|png|jpe?g|webp)$"

  - id: apk-dummy-filler-member
    desc: APK dummy filler member
    crit: notable
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^dummy[0-9]{5,}$"

  - id: compact-xapk-split-apk-container
    desc: Compact XAPK split APK container
    crit: component
    conf: 0.9
    for: [archives]
    if:
      type: metrics
      field: archive.nested_archive_count
      min: 5

composite_rules:
  - id: encrypted-apk-core
    desc: APK encrypts both manifest and DEX in the ZIP container
    crit: suspicious
    conf: 0.985
    all:
      - id: encrypted-classes-dex
      - id: encrypted-android-manifest

  - id: testkey-excessive-multidex-apk
    desc: Testkey-signed APK with excessive secondary DEX layout
    crit: suspicious
    conf: 0.92
    for: [archives]
    all:
      - id: metadata/signed/platform/android::android-debug-testkey-signature
      - id: metadata/package/files/mobile-package::apk-multiple-secondary-dex
      - id: metadata/package/files/mobile-package::android-apk-archive-layout

  - id: opaque-encrypted-apk-member-name-obfuscation
    desc: APK combines encrypted payload storage with extreme member-name obfuscation
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: micro-behaviors/process/create/loader::high-entropy-stage-asset
      - id: apk-extreme-member-name-length
      - id: micro-behaviors/data/archive/zip::zip-encrypted-entry

  - id: encrypted-apk-member-cluster
    desc: APK archive has encrypted member cluster
    crit: suspicious
    conf: 0.94
    for: [archives]
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: apk-encrypted-member-cluster

  - id: encrypted-apk-native-payload-anomaly
    desc: APK packs encrypted DEX/native payloads with archive integrity anomalies
    crit: hostile
    conf: 0.985
    for: [archives]
    all:
      - id: encrypted-apk-member-cluster
      - id: apk-misplaced-executable-members
      - id: apk-executable-member-cluster

  - id: apk-obfuscated-member-table-payload
    desc: APK hides payload in obfuscated archive member table
    crit: hostile
    conf: 0.975
    for: [archives]
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: micro-behaviors/data/archive/zip::zip-encrypted-entry
      - id: apk-misplaced-executable-members
      - id: apk-large-member-set
      - id: apk-rtlo-member-name
      - id: apk-unicode-member-cluster
      - id: apk-extreme-member-name-length

  - id: apk-unicode-nested-archive-packer
    desc: APK hides nested payload behind Unicode archive names
    crit: suspicious
    conf: 0.96
    all:
      - id: apk-unicode-member-cluster
      - id: metadata/package/files/mobile-package::archive-android-apk-member

  - id: apk-path-poisoned-payload-table
    desc: APK path poisoning with misplaced payload content
    crit: hostile
    conf: 0.99
    all:
      - id: apk-heavy-path-traversal
      - id: apk-misplaced-executable-members
      - id: apk-large-member-set

  - id: apk-empty-dex-obfuscated-resource-table
    desc: APK uses empty DEX with obfuscated resource table
    crit: suspicious
    conf: 0.95
    for: [archives]
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: apk-empty-primary-dex-member
      - id: apk-resource-table-pseudo-member-cluster

  - id: apk-empty-dex-compression-resource-packer
    desc: APK empty DEX resource compression packer
    crit: hostile
    conf: 0.97
    for: [archives]
    all:
      - id: apk-empty-dex-obfuscated-resource-table
      - id: metadata/file/metrics::archive-high-compression-expansion

  - id: apk-high-compression-packer
    desc: APK archive has extreme compression expansion
    crit: hostile
    conf: 0.94
    for: [archives]
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: metadata/file/metrics::archive-high-compression-expansion

  - id: apk-dummy-filler-compression-packer
    desc: APK dummy filler compression packer
    crit: hostile
    conf: 0.96
    for: [archives]
    all:
      - id: apk-high-compression-packer
      - id: apk-dummy-filler-member

  - id: apk-dummy-filler-archive-packer
    desc: APK dummy filler archive packer
    crit: hostile
    conf: 0.95
    for: [archives]
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: apk-dummy-filler-member

  - id: apk-resource-pseudo-dummy-packer
    desc: APK resource pseudo-member dummy packer
    crit: hostile
    conf: 0.96
    for: [archives]
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: apk-resource-table-pseudo-member-cluster
      - id: apk-dummy-filler-member

  - id: xapk-random-cleaner-split-carrier
    desc: XAPK randomized cleaner split package carrier
    crit: suspicious
    conf: 0.94
    for: [archives]
    all:
      - id: objectives/evasion/masquerade/identity/app::xapk-random-cleaner-package-name
      - id: compact-xapk-split-apk-container
      - id: metadata/package/files/mobile-package::archive-android-config-split-apk
      - id: metadata/package/files/mobile-package::archive-nested-apk-count
