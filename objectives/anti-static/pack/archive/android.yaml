defaults:
  platforms: [android]
  for: [apk]
  attack: T1406
  mbc: B0024

traits:
  - id: encrypted-classes-dex
    desc: APK encrypts classes.dex inside the ZIP container
    crit: suspicious
    conf: 0.97
    if:
      type: hex
      pattern: "50 4B 03 04 00 00 01 00 08 00 [16] 0B 00 00 00 63 6C 61 73 73 65 73 2E 64 65 78"

  - id: encrypted-android-manifest
    desc: 'crypto android manifest'
    crit: suspicious
    conf: 0.97
    if:
      type: hex
      pattern: "50 4B 03 04 00 00 01 00 08 00 [16] 13 00 00 00 41 6E 64 72 6F 69 64 4D 61 6E 69 66 65 73 74 2E 78 6D 6C"

  - id: encrypted-libsys-core
    desc: APK encrypts libsys_core native runtime
    crit: suspicious
    conf: 0.96
    if:
      type: hex
      pattern: "50 4B 03 04 00 00 01 00 08 00 [16] 1D 00 00 00 6C 69 62 2F [6] 2F 6C 69 62 73 79 73 5F 63 6F 72 65 2E 73 6F"

composite_rules:
  - id: encrypted-apk-core
    desc: APK encrypts both manifest and DEX in the ZIP container
    crit: suspicious
    conf: 0.985
    all:
      - id: encrypted-classes-dex
      - id: encrypted-android-manifest
