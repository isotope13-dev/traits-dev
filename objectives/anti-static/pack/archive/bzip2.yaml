defaults:
  platforms: [windows, linux, macos, unix]
  for: [data, archives]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: bzip2-packed-payload-container
    desc: Bzip2 carries packed payload
    crit: suspicious
    conf: 0.9
    scope: archive
    all:
      - id: metadata/file/magic/identity::bzip2
    any:
      - id: objectives/anti-static/pack/runtime::dotnet-packed-loader
      - id: objectives/anti-static/pack/section-anomaly::packed-pe-temp-shell-stager
      - id: objectives/anti-static/pack/section-anomaly::tiny-executable-obfuscation-section
      - id: objectives/command-and-control/dropper/staging/memory::stego-bitmap-minimal-import-packed-stub
      - id: objectives/command-and-control/dropper/staging/embedded::assemblyresolve-writealltext-dropper
      - id: objectives/command-and-control/dropper/execution/installer::nsis-system-overlay-shell-stager
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-hidden-exec
