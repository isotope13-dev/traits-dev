# Petite-packed stub with large overlay containing multiple benign PE
# binaries as camouflage. The stub is tiny (few functions, few imports)
# but the file is large due to appended legitimate executables that
# reduce overall entropy and inject benign vendor metadata.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009
  mbc: B0032
composite_rules:
  - id: petite-stub-multi-pe-overlay
    desc: Petite-packed stub with multiple embedded PE overlays
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/anti-static/pack/detect::petite-section
      - id: metadata/binary/metrics::embedded-pe-three-plus
      - id: metadata/binary/metrics::no-functions
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::repeated-padding-marker
      - id: metadata/binary/metrics::malformed-pe-structure
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/binary/installer/script::nsis
