defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1027
  mbc: B0032
traits:
  - id: taggant-section
    desc: Nonstandard .taggant section present
    crit: suspicious
    conf: 0.95
    if:
      type: section
      exact: .taggant
      length_min: 4096
    downgrade:
      any:
        - id: metadata/signed/platform/
  - id: paired-lowercase-sections
    desc: Two eight-letter lowercase sections
    crit: suspicious
    conf: 0.93
    count_min: 2
    if:
      type: section
      regex: '^[a-z]{8}$'
      length_min: 512
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/framework/
composite_rules:
  - id: paired-random-section-heavy-packer
    desc: Heavy packer with paired random RWX sections
    crit: hostile
    conf: 0.95
    attack: T1027.002
    all:
      - id: objectives/anti-static/pack/taggant::paired-lowercase-sections
      - id: metadata/hardening/memory::three-plus-wx-sections
      - id: metadata/binary/section/metrics::pe-nonstandard-entry
    any:
      - id: metadata/binary/metrics/size::large-file-1mb
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::dominant-section
      - id: objectives/command-and-control/dropper/staging/embedded::has-high-entropy-regions
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/family/
  - id: taggant-packed-loader
    desc: Packed Windows loader with .taggant stub
    crit: suspicious
    conf: 0.98
    all:
      - id: objectives/anti-static/pack/taggant::taggant-section
      - id: objectives/anti-static/pack/taggant::paired-lowercase-sections
      - id: metadata/binary/symbols/imports::single-import-raw
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::many-wx-sections
    any:
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
      - id: metadata/binary/layout::overlay-size-metrics
      - id: metadata/binary/layout::pe-signature-present
    needs: 2
    unless:
      - id: metadata/signed/platform/
