defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1027"
  mbc: "B0032"
traits:
  - id: write-only-high-entropy-section
    desc: Write-only high-entropy section payload
    crit: suspicious
    conf: 0.9
    if:
      type: section
      writable: true
      readable: false
      length_min: 4096
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/file::is-windows-named
        - id: well-known/lib/wine::wine-runtime-component
  - id: tiny-executable-obfuscation-section
    desc: Tiny executable nonstandard section stub
    crit: suspicious
    conf: 0.82
    if:
      type: section
      regex: "^\\.[A-Za-z0-9]{3,6}$"
      executable: true
      length_max: 4096
    unless:
      - id: metadata/binary/section/names::pe-standard-loader-section
      - id: metadata/binary/framework::asprotect
      - type: raw
        substr: "BSJB"
      - id: metadata/binary/installer/script::nsis-sfx-deadbeef-magic
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: oversized-reloc-masking
    desc: Oversized low-entropy .reloc masking section
    crit: suspicious
    conf: 0.92
    if:
      type: section
      exact: ".reloc"
      length_min: 1048576
      entropy_max: 4.2
  - id: reloc-rwx-payload-section
    desc: Large RWX .reloc payload section
    crit: suspicious
    conf: 0.96
    if:
      type: section
      exact: ".reloc"
      writable: true
      executable: true
      length_min: 262144
      entropy_max: 4.7
  - id: reloc-rwx-encrypted-payload
    desc: RWX .reloc encrypted payload staging
    crit: suspicious
    conf: 0.98
    if:
      type: section
      exact: ".reloc"
      writable: true
      executable: true
      length_min: 65536
      entropy_min: 6.0
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
    unless:
      - id: metadata/signed/developer::martin-tofall
      - id: well-known/app/internet-explorer::internet-explorer-frame-component
  - id: reloc-readonly-encrypted-payload
    desc: Read-only encrypted .reloc payload
    crit: suspicious
    conf: 0.96
    if:
      type: section
      exact: ".reloc"
      readable: true
      writable: false
      executable: false
      length_min: 262144
      entropy_min: 7.0
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
    unless:
      - id: well-known/app/internet-explorer::internet-explorer-frame-component
  - id: x64-xor-dec-dword-payload-loop
    desc: XOR then decrement dword decode loop
    crit: component
    conf: 0.9
    arch: [x86-64]
    count_min: 2
    if:
      type: hex
      section: .text
      pattern: "41 8b 03 35 ?? ?? ?? ?? ff c8"
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/platform::microsoft
  - id: reloc-dominates-image
    desc: .reloc dominates PE image layout
    crit: notable
    conf: 0.84
    if:
      type: section
      regex: ".reloc"
      compare_to: total
      ratio_min: 0.7
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/file::is-windows-named
  - id: lol-rwx-payload-section
    desc: .lol RWX packed payload section
    crit: suspicious
    conf: 0.98
    if:
      type: section
      exact: ".lol___1"
      writable: true
      executable: true
      length_min: 131072
  - id: sedata-rwx-payload-section
    desc: .sedata RWX packed payload section
    crit: suspicious
    conf: 0.97
    if:
      type: section
      exact: ".sedata"
      writable: true
      executable: true
      entropy_min: 7.0
      length_min: 65536
  # === Attack-context-specific fragments (per TAXONOMY.md exception) ===
  # These regex-combined atoms only appear together in packed-loader decoys —
  # video-capture APIs, MAPI allocator internals, and the shlwapi/path-hash
  # trio have no legitimate reason to cluster in a non-Outlook/non-capture PE.
  # Standalone they're silent; composites below raise the signal.
  - id: res-util-cluster-env-import
    desc: Read failover-cluster env by netname
    crit: component
    if:
      type: symbol
      kind: import
      exact: ResUtilGetEnvironmentWithNetName
  - id: open-driver-import
    desc: Open an MCI multimedia codec driver
    crit: component
    if:
      type: symbol
      kind: import
      exact: OpenDriver
  - id: mpr-setup-protocol-enum-import
    desc: Enumerate installed WNet network providers
    crit: component
    if:
      type: symbol
      kind: import
      exact: MprSetupProtocolEnum
  - id: video-capture-import
    desc: Open a video-capture window
    crit: component
    if:
      type: symbol
      kind: import
      regex: ^(capCreateCaptureWindow[AW]|capGetDriverDescription[AW]|videoThunk32)$
  # MAPI allocator internals (decomposed per ML-feature-depth guidance)
  - id: mapi-free-buffer-import
    desc: Release MAPI-allocated memory buffer
    crit: component
    if:
      type: symbol
      kind: import
      substr: MAPIFreeBuffer
  - id: mapi-sc-bin-from-hex-import
    desc: Convert hex MAPI entry ID to binary
    crit: component
    if:
      type: symbol
      kind: import
      substr: ScBinFromHexBounded
  - id: mapi-decompose-eid-import
    desc: Parse a MAPI Entry Identifier structure
    crit: component
    if:
      type: symbol
      kind: import
      substr: HrDecomposeEID
  - id: mapi-unkobj-allocate-import
    desc: Allocate a MAPI COM object instance
    crit: component
    if:
      type: symbol
      kind: import
      substr: UNKOBJ_ScAllocate
  # shlwapi/hash path niche decomposition
  - id: path-is-unc-server-a-import
    desc: Test path for UNC server root
    crit: component
    if:
      type: symbol
      kind: import
      exact: PathIsUNCServerA
  - id: path-undecorate-w-import
    desc: Strip numeric decoration from a filename
    crit: component
    if:
      type: symbol
      kind: import
      exact: PathUndecorateW
  - id: url-hash-w-import
    desc: Hash a URL via shlwapi URL-hash algorithm
    crit: component
    if:
      type: symbol
      kind: import
      exact: UrlHashW
  - id: reset-write-watch-import
    desc: Clear the dirty-page write-watch bitmap
    crit: component
    if:
      type: symbol
      kind: import
      exact: ResetWriteWatch
  - id: nt-or-virtual-alloc-ex-import
    desc: Allocate cross-process virtual memory (NT or Win32)
    crit: component
    if:
      type: symbol
      kind: import
      regex: ^(NtAllocateVirtualMemory|VirtualAllocEx)$
  - id: pak0-exec-stub-section
    desc: .PAK0 executable unpacking stub section
    crit: suspicious
    conf: 0.96
    if:
      type: section
      exact: ".PAK0"
      executable: true
      length_min: 16384
  - id: pak1-rwx-payload-section
    desc: .PAK1 large RWX encrypted payload
    crit: suspicious
    conf: 0.98
    if:
      type: section
      exact: ".PAK1"
      writable: true
      executable: true
      length_min: 262144
      entropy_min: 7.0
  - id: pak2-low-entropy-key-section
    desc: .PAK2 low-entropy companion key section
    crit: suspicious
    conf: 0.97
    if:
      type: section
      exact: ".PAK2"
      readable: true
      writable: false
      length_min: 262144
      entropy_max: 0.2
  - id: pestub-dll-marker
    desc: PEStub embedded module marker
    crit: notable
    conf: 0.99
    if:
      type: text
      exact: "PEStub.dll"
  - id: venvlauncher-pdb-marker
    desc: Embedded venvlauncher PDB path marker
    crit: component
    conf: 0.97
    if:
      type: text
      substr: "venvlauncher.pdb"
  - id: python-launcher-banner-marker
    desc: Embedded Python Launcher banner string
    crit: component
    conf: 0.97
    if:
      type: text
      exact: "Python Launcher for Windows Version %ls"
  - id: python-launcher-usage-marker
    desc: Embedded Python Launcher usage template
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "usage:\n%ls [launcher-args] [python-args] script [script-args]"
  - id: adobe-helper-acro-pdb-marker
    desc: Embedded Adobe helper Acro PDB marker
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: \badobe_licensing_wf_helper_acro\.pdb\b
  - id: msrle-module-assertion-marker
    desc: MSRLE module assertion marker
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "MSRLE32_hModule != 0"
  - id: msrle-codec-state-marker
    desc: MSRLE codec state marker
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "cannot compress and decompress at same time!"
  - id: amadey-elex-tea-loader-key
    desc: Amadey/Elex TEA loader key
    crit: component
    conf: 0.98
    if:
      type: hex
      section: ".data"
      pattern: C5 AD 46 49 D6 C1 0A 86 FD D0 7D 55 85 20 14 4F
  - id: amadey-elex-tea-decrypt-sum
    desc: Amadey/Elex TEA decrypt sum
    crit: component
    conf: 0.96
    if:
      type: hex
      section: ".idata"
      pattern: 20 37 EF C6
  - id: coderpub-rwx-stub-section
    desc: coderpub RWX unpacking stub
    crit: suspicious
    conf: 0.99
    if:
      type: section
      exact: "coderpub"
      writable: true
      executable: true
      length_min: 1024
      length_max: 8192
  - id: rsrc-rwx-null-payload-section
    desc: Null-filled RWX resource payload
    crit: suspicious
    conf: 0.96
    if:
      type: section
      exact: ".rsrc"
      writable: true
      executable: true
      length_min: 32768
      entropy_max: 0.2
  - id: coderpub-packed-payload-header
    desc: coderpub packed payload header
    crit: component
    conf: 0.99
    if:
      type: hex
      offset: 512
      pattern: 03 50 51 00 00 54 10 01 00 00 30 01 00 74 AF 00
  - id: asus-armoury-sdk-path
    desc: ASUS Armoury SDK DLL path
    crit: component
    conf: 0.94
    count_min: 2
    if:
      type: text
      substr: "\\ASUS\\ArmouryDevice\\dll\\"
  - id: getdeviceversion-pdb-path
    desc: GetDeviceVersion PDB path
    crit: component
    conf: 0.98
    if:
      type: text
      substr: "\\GetDeviceVersion\\Release\\GetDeviceVersion.pdb"
composite_rules:
  - id: shellobject-installer-import-cluster
    desc: Shell object installer import cluster
    crit: suspicious
    conf: 0.94
    attack: "T1546.015"
    mbc: "F0012"
    all:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: micro-behaviors/fs/shell-ops::shell-get-folder-path-a
    any:
      - id: micro-behaviors/fs/file/attributes::set-file-attributes-a
      - id: micro-behaviors/fs/file/delete::deletefile-a
      - id: micro-behaviors/dylib/load::load-library-a
      - id: objectives/evasion/process/injection/atom-bombing::addatoma-api
      - id: objectives/evasion/process/injection/atom-bombing::getatomnama-api
    needs: 4
    unless:
      - id: metadata/binary/metrics::many-imports-100
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/file::is-windows-named
  - id: obscure-win32-probing-import-cluster
    desc: Rare Win32 probing/tamper import cluster
    crit: suspicious
    conf: 0.84
    attack: "T1497"
    mbc: "B0001"
    all:
      - id: micro-behaviors/fs/device::query-dos-device-w
      - id: micro-behaviors/fs/config/system::read-profile-string-wide
      - id: micro-behaviors/os/console/io::get-console-alias-exes-length-w
    any:
      - id: micro-behaviors/fs/file/rename::set-file-short-name-w
      - id: micro-behaviors/fs/volume::delete-volume-mount-point-w
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: micro-behaviors/data/embedded/payload::end-update-resource-w
      - id: micro-behaviors/os/callback/enum::enum-date-formats
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::is-microsoft-named
        - id: well-known/lib/wine::wine-runtime-component
  - id: decoy-import-padding-cluster
    desc: Rare Win32 decoy import padding cluster
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/os/console/io::get-console-alias-exes-a
      - id: micro-behaviors/fs/lock::unlock-file-ex
    any:
      - id: micro-behaviors/fs/volume::set-volume-label-w
      - id: micro-behaviors/os/event::abort-system-shutdown-w
      - id: micro-behaviors/fs/temp/directory::get-temp-file-name
      - id: micro-behaviors/os/env/access::get-environment-strings-wide
    needs: 2
    unless:
      - id: metadata/binary/metrics::many-imports-100
  - id: codec-decoy-urlmon-cluster
    desc: Codec decoy urlmon import cluster
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/ui/window/station::create-desktop-a
      - id: micro-behaviors/communications/http/get::register-bind-status-callback
      - id: res-util-cluster-env-import
    any:
      - id: micro-behaviors/fs/path/check::path-is-system-folder-w
      - id: open-driver-import
      - id: mpr-setup-protocol-enum-import
      - id: micro-behaviors/os/console/io::read-console-output-character-w
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    needs: 4
    unless:
      - id: metadata/binary/metrics::many-imports-100
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/file::is-windows-named
        - id: metadata/binary/vendor::is-microsoft-named
  - id: cross-domain-av-mapi-memory-cluster
    desc: Cross-domain WinAPI loader import mix
    crit: suspicious
    conf: 0.86
    all:
      - id: nt-or-virtual-alloc-ex-import
      - id: video-capture-import
    any:
      - id: mapi-free-buffer-import
      - id: mapi-sc-bin-from-hex-import
      - id: mapi-decompose-eid-import
      - id: mapi-unkobj-allocate-import
      - id: path-is-unc-server-a-import
      - id: path-undecorate-w-import
      - id: url-hash-w-import
      - id: reset-write-watch-import
    needs: 1
    unless:
      - id: metadata/binary/metrics::many-imports-100
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/file::is-windows-named
        - id: metadata/binary/vendor::is-microsoft-named
  - id: coderpub-rsrc-minimal-import-loader
    desc: coderpub loader with packed resource
    crit: hostile
    conf: 0.995
    all:
      - id: coderpub-rwx-stub-section
      - id: rsrc-rwx-null-payload-section
      - id: coderpub-packed-payload-header
      - id: metadata/binary/symbols::few-import-count
      - id: micro-behaviors/dylib/load::load-library-a
      - id: micro-behaviors/os/module/load::get-proc-address-import
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: amadey-elex-idata-tea-loader
    desc: Amadey/Elex idata TEA loader
    crit: hostile
    conf: 0.995
    all:
      - id: amadey-elex-tea-loader-key
      - id: amadey-elex-tea-decrypt-sum
      - id: metadata/binary/section/metrics::pe-nonstandard-entry
      - id: metadata/binary/resource::oversized-rsrc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: msrle-decoy-packed-loader
    desc: MSRLE decoy packed loader
    crit: hostile
    conf: 0.98
    all:
      - id: codec-decoy-urlmon-cluster
      - id: msrle-module-assertion-marker
      - id: msrle-codec-state-marker
      - id: micro-behaviors/communications/http/get::urlmon-dll-reference
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/anti-static/pack/entropy::high-entropy-data-section
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-largest-section-dominates
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/file::is-windows-named
        - id: metadata/binary/vendor::is-microsoft-named
  - id: shellobject-loader-noise-profile
    desc: Cross-domain imports with packed profile
    crit: suspicious
    conf: 0.9
    all:
      - id: cross-domain-av-mapi-memory-cluster
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
      - id: metadata/binary/metrics::few-functions
      - id: metadata/binary/section/names::writable-rdata
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/file::is-windows-named
        - id: metadata/binary/vendor::is-microsoft-named
  - id: decoy-import-padded-loader
    desc: Packed loader with decoy import padding
    crit: suspicious
    conf: 0.95
    all:
      - id: decoy-import-padding-cluster
      - id: objectives/anti-static/obfuscation/payload/section::extreme-packed-loader-code-to-data-ratio
    any:
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-largest-section-dominates
      - id: metadata/binary/resource::resource-heavy-low-entropy-rsrc
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/file::is-windows-named
        - id: metadata/binary/vendor::is-microsoft-named
  - id: lol-shellobject-packed-loader
    desc: ShellObject trojan packed loader profile
    crit: hostile
    conf: 0.99
    all:
      - id: lol-rwx-payload-section
      - id: shellobject-installer-import-cluster
      - id: objectives/anti-static/obfuscation/payload/section::empty-text-section
    any:
      - id: metadata/binary/layout::pe-checksum-mismatch
      - id: objectives/anti-static/obfuscation/binary-metrics::high-overall-entropy
    needs: 1
  - id: rwx-reloc-service-loader
    desc: Packed service loader in RWX reloc
    crit: suspicious
    conf: 0.97
    all:
      - id: reloc-rwx-payload-section
    needs: 3
    any:
      - id: reloc-dominates-image
      - id: oversized-reloc-masking
      - id: micro-behaviors/os/service/control::service-control-dispatch
      - id: micro-behaviors/os/service/control::service-dispatch-triad
      - id: objectives/evasion/masquerade/debug::chrome-elevation-service-decoy
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/os/security/descriptor::initialize-security-descriptor
      - id: micro-behaviors/os/security/descriptor::set-security-descriptor-dacl
  - id: masqueraded-lld-service-loader
    desc: LLD service facade with RWX reloc
    crit: suspicious
    conf: 0.99
    all:
      - id: reloc-rwx-payload-section
    needs: 4
    any:
      - id: reloc-dominates-image
      - id: oversized-reloc-masking
      - id: objectives/evasion/masquerade/debug::fake-chrome-service-facade
      - id: micro-behaviors/os/service/control::service-control-dispatch
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: micro-behaviors/dylib/load::load-library-ex
      - id: micro-behaviors/os/security/descriptor::acl-rewrite-cluster
      - id: metadata/lang/compiler/native::lld-pdb-marker
  - id: reloc-self-reading-loader
    desc: Self-reading loader hidden in RWX reloc
    crit: suspicious
    conf: 0.96
    all:
      - id: reloc-rwx-payload-section
      - id: reloc-dominates-image
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
    any:
      - id: oversized-reloc-masking
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/fs/file/write::write-file
      - id: micro-behaviors/dylib/load::load-library-ex-w
      - id: micro-behaviors/os/module/load::get-proc-address-import
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: rwx-reloc-dynamic-loader
    desc: Dynamic loader staged in RWX reloc
    crit: suspicious
    conf: 0.98
    all:
      - id: reloc-rwx-encrypted-payload
    any:
      - id: objectives/anti-static/obfuscation/payload::unusual-alignment-pe
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/dylib/load::load-library-a
      - id: metadata/package/metrics::recovered-function-count-under-10
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: readonly-reloc-service-apihash-loader
    desc: Service loader with encrypted reloc
    crit: hostile
    conf: 0.99
    all:
      - id: reloc-readonly-encrypted-payload
      - id: reloc-dominates-image
      - id: micro-behaviors/os/service/control::service-dispatch-triad
    any:
      - id: x64-xor-dec-dword-payload-loop
      - id: objectives/evasion/anti-av/api-hashing::api-hash-kernel32-192299a5
      - id: objectives/evasion/anti-av/api-hashing::virtualprotect-suffix-resolution
      - id: objectives/evasion/anti-av/api-hashing::wide-string-uppercase-mask
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: trojanized-python-launcher-reloc-loader
    desc: Trojanized Python Launcher with RWX reloc
    crit: hostile
    conf: 0.99
    all:
      - id: reloc-rwx-payload-section
      - id: reloc-dominates-image
      - id: objectives/evasion/masquerade/version-resource::python-launcher-version-resource
    any:
      - id: oversized-reloc-masking
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/fs/file/write::write-file
      - id: metadata/binary/debug::venvlauncher-pdb
    needs: 3
  - id: trojanized-asus-armoury-reloc-loader
    desc: Trojanized ASUS Armoury RWX reloc loader
    crit: hostile
    conf: 0.99
    all:
      - id: reloc-rwx-payload-section
      - id: reloc-dominates-image
      - id: objectives/evasion/masquerade/version-resource::asus-getdeviceversion-version-resource
    any:
      - id: asus-armoury-sdk-path
      - id: getdeviceversion-pdb-path
      - id: metadata/hardening/memory::wx-section
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    needs: 2
  - id: pak-triplet-loader-layout
    desc: PAK section triplet packed loader layout
    crit: suspicious
    conf: 0.99
    all:
      - id: pak0-exec-stub-section
      - id: pak1-rwx-payload-section
      - id: pak2-low-entropy-key-section
    any:
      - id: metadata/binary/layout::pe-embedded
