defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1027"
  mbc: "B0032"
traits:
  - id: write-only-high-entropy-section
    desc: Write-only high-entropy section payload
    crit: suspicious
    conf: 0.9
    if:
      type: section
      writable: true
      readable: false
      length_min: 4096
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-windows-named
  - id: tiny-executable-obfuscation-section
    desc: Tiny executable nonstandard section stub
    crit: suspicious
    conf: 0.82
    if:
      type: section
      regex: "^\\.[A-Za-z0-9]{3,6}$"
      executable: true
      length_max: 4096
    unless:
      - type: section
        regex: "^\\.(text|code|init|data)$"
      - type: section
        regex: "^\\.(rdata|pdata|xdata|reloc)$"
      - type: section
        exact: ".tls"
      - id: metadata/format/pe::asprotect
      - type: raw
        substr: "BSJB"
      - id: metadata/format/installer::nsis-sfx-deadbeef-magic
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: oversized-reloc-masking
    desc: Oversized low-entropy .reloc masking section
    crit: suspicious
    conf: 0.92
    entropy_max: 4.2
    if:
      type: section
      exact: ".reloc"
      length_min: 1048576
  - id: reloc-rwx-payload-section
    desc: Large RWX .reloc payload section
    crit: suspicious
    conf: 0.96
    entropy_max: 4.4
    if:
      type: section
      exact: ".reloc"
      writable: true
      executable: true
      length_min: 262144
  - id: reloc-dominates-image
    desc: .reloc dominates PE image layout
    crit: notable
    conf: 0.84
    if:
      type: section_ratio
      section: ".reloc"
      compare_to: total
      min: 0.7
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-windows-named
  - id: obscure-win32-probing-import-cluster
    desc: Rare Win32 probing/tamper import cluster
    crit: suspicious
    conf: 0.84
    attack: "T1497"
    mbc: "B0001"
    if:
      type: import_combination
      required:
        - "^QueryDosDeviceW$"
        - "^GetProfileStringW$"
        - "^GetConsoleAliasExesLengthW$"
      suspicious:
        - "^SetFileShortNameW$"
        - "^DeleteVolumeMountPointW$"
        - "^MoveFileExW$"
        - "^EndUpdateResourceW$"
        - "^EnumDateFormatsA$"
      min_suspicious: 2
  - id: cross-domain-av-mapi-memory-cluster
    desc: Cross-domain WinAPI loader import mix
    crit: suspicious
    conf: 0.86
    if:
      type: import_combination
      required:
        - "^(NtAllocateVirtualMemory|VirtualAllocEx)$"
        - "^(capCreateCaptureWindowA|capCreateCaptureWindowW|capGetDriverDescriptionA|capGetDriverDescriptionW|videoThunk32)$"
        - "^(MAPIFreeBuffer@4|ScBinFromHexBounded@12|HrDecomposeEID@28|UNKOBJ_ScAllocate@12|UNKOBJ_ScAllocateMore@16|HrSetOneProp@8|HrThisThreadAdviseSink@8)$"
      suspicious:
        - "^(PathIsUNCServerA|PathUndecorateW|SHEnumKeyExA|UrlHashW|RtlOemToUnicodeN|ResetWriteWatch)$"
      min_suspicious: 1
      max_total: 80
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/vendor/microsoft::is-microsoft-named
composite_rules:
  - id: shellobject-loader-noise-profile
    desc: Cross-domain imports with packed profile
    crit: suspicious
    conf: 0.9
    all:
      - id: cross-domain-av-mapi-memory-cluster
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
      - id: metadata/format::few-functions
      - id: metadata/binary/section::writable-rdata
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: rwx-reloc-service-loader
    desc: Packed service loader in RWX reloc
    crit: suspicious
    conf: 0.97
    all:
      - id: reloc-rwx-payload-section
    needs: 3
    any:
      - id: reloc-dominates-image
      - id: oversized-reloc-masking
      - id: micro-behaviors/os/service/control::service-control-dispatch
      - id: micro-behaviors/os/service/control::service-dispatch-triad
      - id: objectives/evasion/masquerade/debug::chrome-elevation-service-decoy
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/os/security/descriptor::initialize-security-descriptor
      - id: micro-behaviors/os/security/descriptor::set-security-descriptor-dacl
  - id: masqueraded-lld-service-loader
    desc: LLD service facade with RWX reloc
    crit: suspicious
    conf: 0.99
    all:
      - id: reloc-rwx-payload-section
    needs: 4
    any:
      - id: reloc-dominates-image
      - id: oversized-reloc-masking
      - id: objectives/evasion/masquerade/debug::fake-chrome-service-facade
      - id: micro-behaviors/os/service/control::service-control-dispatch
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: micro-behaviors/dylib/load::load-library-ex
      - id: micro-behaviors/os/security/descriptor::acl-rewrite-cluster
      - id: metadata/lang/compiler::lld-pdb-marker
