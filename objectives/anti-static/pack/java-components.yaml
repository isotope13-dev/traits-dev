defaults:
  platforms: [unix, windows]
  for: [java, class]
traits:
  - id: java-jar-usage
    desc: JAR archive operations
    crit: notable
    if:
      type: text
      substr: 'java/util/jar/Jar'
  - id: java-crypto-cipher
    desc: Cryptographic operations
    crit: notable
    if:
      type: raw
      regex: 'javax/crypto/Ciphe[r]'
  - id: java-crypto-security
    desc: Security operations
    crit: notable
    if:
      type: raw
      regex: 'java/security/MessageDiges[t]'
