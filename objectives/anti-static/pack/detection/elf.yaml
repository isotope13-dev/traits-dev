# ELF Binary Anomaly Detection
# Detects structural anomalies common in packed/obfuscated ELF binaries
# ATT&CK: T1027.002 (Software Packing)
defaults:
  platforms: [unix, android]
  for: [elf]
traits:
  - id: elf32-class
    desc: "ELF32 class marker"
    crit: component
    conf: 1.0
    if:
      type: metrics
      field: elf.class_bits
      min: 32
      max: 32
  - id: elf32-sectionless-header
    desc: "ELF32 header omits section table"
    crit: component
    conf: 0.95
    mbc: "F0001"
    attack: "T1027.002"
    if:
      type: hex
      pattern: "00 00 00 00 00 00 10 07 00 34 00 20 00 02 00 28 00 00 00 00"
      offset: 32
  - id: elf64-sectionless-header
    desc: "ELF64 header omits section table"
    crit: component
    conf: 0.95
    mbc: "F0001"
    attack: "T1027.002"
    if:
      type: hex
      pattern: "00 00 00 00 00 00 00 00 ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? 00 00 ?? ??"
      offset: 40
  - id: rwx-segment
    desc: "ELF has writable+executable segment (W^X violation)"
    crit: suspicious
    conf: 0.7
    attack: "T1055"
    if:
      id: metadata/hardening/memory::wx-section
  - id: big-endian
    desc: "Big-endian ELF binary"
    crit: baseline
    conf: 0.7
    if:
      type: raw
      exact: "\u0002"
      offset: 5
  - id: upx-packer-string
    desc: UPX executable packer signature string
    crit: component
    if:
      type: text
      substr: UPX executable packer

composite_rules:
  - id: elf32-no-section-headers
    desc: "ELF32 has no section headers"
    crit: component
    conf: 0.95
    mbc: "F0001"
    attack: "T1027.002"
    all:
      - id: elf32-class
      - id: elf32-sectionless-header
  - id: elf64-no-section-headers
    desc: "ELF64 has no section headers"
    crit: component
    conf: 0.95
    mbc: "F0001"
    attack: "T1027.002"
    all:
      - id: metadata/binary/metrics::elf64-class
      - id: elf64-sectionless-header
  - id: no-section-headers
    desc: "No section headers"
    crit: notable
    conf: 0.8
    mbc: "F0001"
    attack: "T1027.002"
    any:
      - id: elf32-no-section-headers
      - id: elf64-no-section-headers
  - id: stripped-packed
    desc: "Packed ELF binary"
    crit: suspicious
    conf: 0.85
    mbc: "F0001"
    attack: "T1027.002"
    all:
      - id: no-section-headers
      - id: objectives/anti-static/obfuscation/binary-metrics::high-overall-entropy
    unless:
      - id: upx-packer-string
  - id: mirai-like
    desc: "Mirai-like IoT malware pattern: static + stripped + exotic arch + packed"
    crit: hostile
    conf: 0.9
    mbc: "F0001"
    attack: "T1027.002"
    all:
      - id: no-section-headers
    any:
      - id: metadata/binary/linking::static-linked
      - id: metadata/binary/linking::static-linked-heuristic
      - id: metadata/arch/iot::exotic-arch
  - id: iot-target
    desc: "IoT target architecture (exotic arch + static)"
    crit: suspicious
    conf: 0.7
    attack: "T1583.005"
    all:
      - id: metadata/arch/iot::exotic-arch
    any:
      - id: metadata/binary/linking::static-linked
      - id: metadata/binary/linking::static-linked-heuristic
