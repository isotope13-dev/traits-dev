defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1027
  mbc: B0032
traits:
  - id: taggant-section
    desc: Nonstandard .taggant section present
    crit: suspicious
    conf: 0.95
    if:
      type: section
      exact: .taggant
      length_min: 4096
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: paired-lowercase-sections
    desc: Two eight-letter lowercase sections
    crit: suspicious
    conf: 0.93
    count_min: 2
    if:
      type: section
      regex: '^[a-z]{8}$'
      length_min: 512
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/framework::dotnet-assembly
composite_rules:
  - id: taggant-packed-loader
    desc: Packed Windows loader with .taggant stub
    crit: suspicious
    conf: 0.98
    all:
      - id: objectives/anti-static/pack::taggant-section
      - id: objectives/anti-static/pack::paired-lowercase-sections
      - id: metadata/binary/symbols::single-import-raw
      - id: objectives/anti-static/obfuscation/binary-metrics::many-wx-sections
    any:
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
      - id: metadata/binary/layout::overlay-size-metrics
      - id: metadata/binary/layout::pe-signature-present
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
