defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.002
  mbc: F0001
traits:
  - id: mew-riaa-banner
    desc: MEW packer RIAA banner string
    crit: component
    conf: 0.99
    if:
      type: text
      substr: "but i fuck the RIAA !"

  - id: mew-section-t-rwx
    desc: MEW packer t section
    crit: component
    conf: 0.97
    if:
      type: section
      exact: t
      writable: true
      executable: true

  - id: mew-section-a-zeroed
    desc: MEW packer a buffer section
    crit: component
    conf: 0.97
    if:
      type: section
      exact: a
      writable: true
      entropy_max: 0.05
      length_min: 1024

  - id: mew-section-imports-stub
    desc: MEW packer imports stub section
    crit: component
    conf: 0.95
    if:
      type: section
      exact: .imports
      writable: true
      entropy_max: 0.05

composite_rules:
  - id: mew-packed-pe
    desc: MEW-packed PE loader
    crit: hostile
    conf: 0.99
    all:
      - id: mew-riaa-banner
    any:
      - id: mew-section-t-rwx
      - id: mew-section-a-zeroed
      - id: mew-section-imports-stub
    needs: 2

  - id: mew-section-layout
    desc: MEW canonical section layout
    crit: suspicious
    conf: 0.95
    all:
      - id: mew-section-t-rwx
      - id: mew-section-a-zeroed
      - id: mew-section-imports-stub
