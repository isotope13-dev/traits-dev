defaults:
  platforms: [unix, windows, macos]
composite_rules:
- id: ocra-with-evasion
  desc: "OCRA (One-Click Ruby App) executable with anti-analysis/evasion"
  crit: suspicious
  conf: 0.85
  mbc: "B0001"
  attack: "T1497"
  all:
  - id: objectives/anti-static/pack/ocra::ocra-executable-const
  - id: objectives/anti-static/pack/ocra::ocra-stub-marker
  any:
  - id: objectives/anti-analysis/debugger-detect/check::win-comprehensive
  - id: objectives/anti-analysis/vm-detect/instruction::instruction-based-evasion
  - id: micro-behaviors/process/terminate/kill::terminate-process
  - id: objectives/anti-analysis/vm-detect/instruction::multiple-rdtsc-instr
