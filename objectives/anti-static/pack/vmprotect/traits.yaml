defaults:
  platforms:
    - unix
    - windows
  for: [binaries]
  entropy_min: 6.5
traits:
  - id: section
    desc: VMProtect detected via section names
    crit: suspicious
    conf: 0.95
    attack: T1027.002
    if:
      type: section
      regex: ^\.vmp[0-2]
  - id: marker-string
    desc: VMProtect marker string
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)VMProtect (begin|end|VMP)
