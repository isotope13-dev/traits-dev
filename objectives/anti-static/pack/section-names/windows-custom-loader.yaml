defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: wcrt7-rwx-loader-section
    desc: Large .wcrt7 RWX loader section
    crit: suspicious
    conf: 0.98
    size_min: 1500000
    size_max: 3500000
    if:
      type: section
      exact: .wcrt7
      writable: true
      executable: true
      length_min: 262144
  - id: iobf-executable-section
    desc: Executable .iobf packer section
    crit: suspicious
    conf: 0.97
    size_min: 400000
    size_max: 800000
    if:
      type: section
      exact: .iobf
      executable: true
      length_max: 8192
  - id: iylo2-payload-section
    desc: Large .iylo2 packed payload section
    crit: suspicious
    conf: 0.99
    size_min: 3500000
    size_max: 5000000
    if:
      type: section
      exact: .iylo2
      executable: true
      entropy_min: 7.8
      length_min: 2097152
  - id: wzfi-rwx-cavity
    desc: Tiny .wzfi RWX unpacking cavity
    crit: suspicious
    conf: 0.99
    size_min: 3500000
    size_max: 5000000
    if:
      type: section
      exact: .wzfi
      writable: true
      executable: true
      length_max: 8192
      entropy_max: 0.2
