defaults:
  platforms: [unix, windows, macos]
# Java Packer / Obfuscator Objectives
composite_rules:
  - id: java-obfuscated-packer
    desc: Java dropper/packer combining reflection, cryptography and archive handling
    crit: hostile
    conf: 0.9
    all:
      - id: objectives/command-and-control/backdoor/loader/classloader::classloader-string
      - id: objectives/anti-static/pack::java-jar-usage
    any:
      - id: objectives/anti-static/pack::java-crypto-cipher
      - id: objectives/anti-static/pack::java-crypto-security
  - id: stringer-obfuscator
    desc: Java archive protected by Stringer Obfuscator
    crit: suspicious
    any:
      - id: objectives/anti-static/obfuscation/tools::stringer
      - id: objectives/anti-static/obfuscation/tools::stringer-licelus
