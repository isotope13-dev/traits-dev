defaults:
  platforms: [windows]
  for: [c, text]
  attack: T1027.002

traits:
  - id: asm-huffman-compression-structures
    desc: ASM Huffman compression structures
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'HuffmanCode struct[\s\S]{0,220}Length1 db'

  - id: asm-compression-header-fields
    desc: ASM compression header fields
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'CompressSize dd[\s\S]{0,120}DecompressSize dd'

  - id: asm-crc32-compression-routine
    desc: ASM CRC32 compression routine
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'CRC32 proc[\s\S]{0,320}NextByteCRC'

  - id: asm-compress-api-call
    desc: ASM compression API call
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: call bp_compress

  - id: asm-decompress-api-call
    desc: ASM decompression API call
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: call bp_decompress

  - id: asm-mapped-file-compression-demo
    desc: ASM mapped-file compression demo
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'MapFile proc[\s\S]{0,500}CreateFileMappingA[\s\S]{0,300}MapViewOfFile'

composite_rules:
  - id: asm-huffman-compression-engine-source
    desc: ASM Huffman compression engine source
    crit: suspicious
    conf: 0.96
    all:
      - id: asm-huffman-compression-structures
      - id: asm-compression-header-fields
    any:
      - id: asm-crc32-compression-routine
      - id: asm-compress-api-call
      - id: asm-decompress-api-call

  - id: asm-mapped-compression-tool-source
    desc: ASM mapped compression tool source
    crit: suspicious
    conf: 0.95
    all:
      - id: asm-mapped-file-compression-demo
    any:
      - id: asm-compress-api-call
      - id: asm-decompress-api-call
