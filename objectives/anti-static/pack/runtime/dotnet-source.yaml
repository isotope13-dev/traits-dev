defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1027.002
  mbc: B0032

traits:
  - id: dotnet-tail-stream-slice
    desc: .NET reads appended tail
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'stream\.Position = \(long\)[\s\S]{0,80}stream\.Length - \(long\)'

  - id: dotnet-entrypoint-invoke
    desc: .NET invokes loaded entrypoint
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: EntryPoint.Invoke

  - id: dotnet-new-decompress-load
    desc: .NET loads decompressed assembly
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Assembly\.Load\(new [A-Za-z0-9_]+.{0,45}\.Decompress'

  - id: dotnet-resource-base64-getobject
    desc: .NET decodes resource object
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'FromBase64String[\s\S]{0,180}\.GetObject\('

  - id: dotnet-load-getmethod-chain
    desc: .NET load GetMethod chain
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Assembly\.Load[\s\S]{0,140}\.GetType[\s\S]{0,360}\.GetMethod'

composite_rules:
  - id: dotnet-appended-assembly-loader-source
    desc: .NET appended payload loader
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-tail-stream-slice
      - id: objectives/anti-static/obfuscation/reflection/invoke::assembly-load
    any:
      - id: dotnet-new-decompress-load
      - id: dotnet-entrypoint-invoke
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: micro-behaviors/fs/read/self::executable-path-self-reference

  - id: dotnet-resource-reflective-loader-source
    desc: .NET resource reflective loader
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-resource-base64-getobject
      - id: objectives/anti-static/obfuscation/reflection/invoke::assembly-load
      - id: dotnet-load-getmethod-chain
    any:
      - id: micro-behaviors/data/embedded/payload/resource::resourcemanager-getobject-call
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: objectives/anti-static/obfuscation/reflection/invoke::method-invoke-dup
