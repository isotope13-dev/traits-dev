defaults:
  platforms: [routeros, appliance, unix]
  for: [python, pyc]
  attack: T1027
  mbc: B0032

traits:
  - id: python-payload-file-name
    desc: Python payload file name
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'payload\.(enc|dat|bin)'

  - id: python-xor-modulo-key-loop
    desc: Python XOR modulo-key loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\w+\[\w+\]\s*=\s*\w+\[\w+\]\s*\^\s*\w+\[\w+\s*%'
    unless:
      - id: well-known/lib/tornado::library-code

  - id: python-module-exec-loader
    # exec()ing source into a fresh `types.ModuleType` namespace is a dynamic
    # code-loading capability (notable per TAXONOMY), not inherently malicious:
    # it is the standard config-from-file idiom (Flask `Config.from_pyfile`),
    # plugin systems and template compilers. The python-xor-file-runtime-loader
    # composite adds the hex/XOR-decode + payload-file legs for hostile intent.
    desc: Python exec into dynamic module
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'types\.ModuleType[\s\S]{0,180}exec\(.{0,120}__dict__'

composite_rules:
  - id: python-xor-file-runtime-loader
    desc: Python XOR file runtime loader
    crit: hostile
    conf: 0.98
    all:
      - id: python-payload-file-name
      - id: objectives/anti-static/obfuscation/string/encoding::bytes-fromhex-call
      - id: python-xor-modulo-key-loop
    any:
      - id: python-module-exec-loader
      - id: micro-behaviors/process/interpreter/python::exec-builtin
