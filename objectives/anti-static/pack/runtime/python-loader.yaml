defaults:
  platforms: [routeros, appliance, unix]
  for: [python, pyc]
  attack: T1027
  mbc: B0032

traits:
  - id: python-payload-file-name
    desc: Python payload file name
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'payload\.(enc|dat|bin)'

  - id: python-xor-modulo-key-loop
    desc: Python XOR modulo-key loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\w+\[\w+\]\s*=\s*\w+\[\w+\]\s*\^\s*\w+\[\w+\s*%'
    unless:
      - id: well-known/lib/tornado::library-code

composite_rules:
  - id: python-xor-file-runtime-loader
    desc: Python XOR file runtime loader
    crit: hostile
    conf: 0.98
    all:
      - id: python-payload-file-name
      - id: objectives/anti-static/obfuscation/string/encoding::bytes-fromhex-call
      - id: python-xor-modulo-key-loop
    any:
      - id: micro-behaviors/os/api-resolution/dynamic::python-module-dict-exec
      - id: micro-behaviors/process/interpreter/python::exec-builtin
