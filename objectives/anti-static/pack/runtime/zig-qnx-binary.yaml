defaults:
  platforms: [qnx]
  for: [elf]
  attack: T1027

traits:
  - id: qnx-zig-elf-chacha-symbols
    desc: QNX Zig ELF random ChaCha
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/binary/linking/static::ld-linux-interp
    if:
      type: text
      substr: Random.ChaCha

  - id: qnx-zig-elf-chacha20-symbol
    desc: QNX Zig ELF chacha20 symbol
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/binary/linking/static::ld-linux-interp
    if:
      type: text
      substr: crypto.chacha20

  - id: qnx-zig-elf-flate-decode
    desc: QNX Zig ELF flate decode
    crit: notable
    conf: 0.9
    unless:
      - id: metadata/binary/linking/static::ld-linux-interp
    if:
      type: text
      substr: compress.flate.Decompress

  - id: qnx-zig-elf-test-entry
    desc: QNX Zig ELF test entry
    crit: component
    conf: 0.9
    unless:
      - id: metadata/binary/linking/static::ld-linux-interp
    if:
      type: text
      substr: test.main

composite_rules:
  - id: qnx-zig-elf-packed-payload
    desc: QNX Zig ELF packed payload
    crit: hostile
    conf: 0.96
    all:
      - id: qnx-zig-elf-chacha-symbols
      - id: qnx-zig-elf-chacha20-symbol
      - id: qnx-zig-elf-flate-decode
      - id: qnx-zig-elf-test-entry
