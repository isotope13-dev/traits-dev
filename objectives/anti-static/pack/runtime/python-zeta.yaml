defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: exec-join-class-attributes
    desc: exec() called on joined class attributes
    crit: suspicious
    if:
      type: text
      regex: "import\\s+marshal\\s+as\\s+[a-zA-Z0-9_]+\\s+exec\\(''\\.join\\(\\["
composite_rules:
  - id: python-zeta-obfuscator
    desc: Python script obfuscated by Zeta/similar packer (joins long hex strings assigned to class attributes)
    crit: hostile
    all:
      - id: exec-join-class-attributes
      - id: micro-behaviors/data/encode/hex::hex-encoding
      - id: micro-behaviors/process/interpreter/python::exec-builtin
