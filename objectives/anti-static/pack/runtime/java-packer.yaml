defaults:
  platforms: [unix, windows, macos]
# Java Packer / Obfuscator Objectives
composite_rules:
  - id: java-obfuscated-packer
    desc: Java dropper/packer combining reflection, cryptography and archive handling
    crit: hostile
    conf: 0.9
    for: [java, class, jar, zip]
    scope: leaf
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::jvm-classloader-class-ref
      - id: micro-behaviors/data/archive/library::jvm-jar-api-reference
      - id: micro-behaviors/crypto/library/provider::java-payload-decryption
    unless:
      - id: well-known/app/lyric::lyric-toolchain-context
      - id: well-known/app/lyric::lyric-maven-resolver
  - id: stringer-obfuscator
    desc: Java archive protected by Stringer Obfuscator
    crit: suspicious
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/bytecode::stringer
      - id: objectives/anti-static/obfuscation/obfuscator/bytecode::stringer-licelus
