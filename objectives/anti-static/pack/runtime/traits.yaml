defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: pe-import-count-under-10
    desc: PE has under ten imports
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.import_count
      max: 9
    unless:
      - type: metrics
        field: binary.export_count
        min: 20
      - type: metrics
        field: pe.is_dotnet
        min: 1
composite_rules:
  - id: signed-encrypted-api-unpacking-loader
    desc: Signed encrypted-API unpacking loader
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/section/names::executable-textbss-zero-backed
      - id: pe-import-count-under-10
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::rc4-encrypted-kernel32-api-table
      - id: objectives/anti-analysis/debugger-detect/tls::pe-tls-callbacks-metric
      - id: objectives/anti-static/obfuscation/payload/container::pe-has-signature-png
    any:
      - id: micro-behaviors/communications/http/client::winhttp-send-request
      - id: micro-behaviors/dylib/load::load-library-ex-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/framework::dotnet-assembly
  - id: unpacking-api-pattern
    desc: Unpacking API pattern (Alloc + Protect)
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
      - id: objectives/anti-static/obfuscation/binary-metrics::high-overall-entropy
    unless:
      - id: metadata/binary/section/names::upx-section
      - id: objectives/anti-static/pack/detect::upx-marker
      - id: metadata/binary/symbols::total-commander-packer-plugin
      - id: metadata/binary/layout::svk-packed-section
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/installer/script::nsis-error-title
  - id: rwx-uppercase-section-custom-packer
    desc: Custom packer stub with RWX uppercase-name section and entry inside
    crit: hostile
    conf: 0.96
    attack: T1027.002
    all:
      - id: metadata/binary/section/metrics::random-uppercase-rwx-section
      - id: metadata/binary/section/metrics::pe-nonstandard-entry
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
  - id: rwx-uppercase-section-anchor-imports
    desc: RWX uppercase-name section with minimal anchor-import surface
    crit: suspicious
    conf: 0.93
    attack: T1027.002
    all:
      - id: metadata/binary/section/metrics::random-uppercase-rwx-section
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/os/module/load::get-proc-address-import
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/metrics::many-imports
  - id: rwx-uppercase-network-staged-stub
    desc: RWX uppercase-name packer stub with network-anchor imports
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/binary/section/metrics::random-uppercase-rwx-section
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
    any:
      - id: micro-behaviors/communications/socket/init::winsock-startup-ordinal
      - id: micro-behaviors/os/network/interface::get-adapters-addresses
      - id: micro-behaviors/process/create/exec::shell-execute-a
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer

  - id: rwx-mixed-case-section-sparse-iat-packer
    desc: Custom packer with RWX mixed-case section and sparse dynamic-resolution IAT
    crit: hostile
    conf: 0.95
    attack: T1027.002
    all:
      - id: metadata/binary/section/metrics::random-mixed-case-rwx-section
      - id: objectives/anti-static/obfuscation/payload::minimal-pe-dynamic-load
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/section/names::upx-section
      - id: micro-behaviors/data/encode/pecompact::pecompact-signature

  - id: rwx-mixed-case-section-anchor-imports
    desc: RWX mixed-case-name section with minimal anchor-import surface
    crit: suspicious
    conf: 0.92
    attack: T1027.002
    all:
      - id: metadata/binary/section/metrics::random-mixed-case-rwx-section
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/dylib/load::load-library-a
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/metrics::many-imports
