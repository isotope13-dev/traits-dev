defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: pe-import-count-under-10
  desc: PE has under ten imports
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: imports.count
    max: 9
  unless:
  - type: metrics
    field: exports.count
    min: 20
  - type: metrics
    field: pe.is_dotnet
    min: 1
  - id: metadata/binary/framework::dotnet-metadata
composite_rules:
- id: packed-sfx-overlay-loader
  desc: Packed SFX launches multiple overlay stages
  crit: hostile
  conf: 0.98
  attack: T1027.009,T1105
  all:
  - id: objectives/command-and-control/dropper/execution/installer::sfx-multiple-runprogram-stages
  - id: metadata/binary/layout::overlay-over-90pct
  - id: metadata/binary/layout::high-entropy-overlay
  - id: metadata/binary/layout::pe-checksum-zeroed
  - id: micro-behaviors/process/create/shell/spawn::win-shellexecute
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/

- id: aspack-multi-pe-dynamic-loader
  desc: ASPack packed PE loads many embedded PEs
  crit: hostile
  conf: 0.99
  attack: T1027.002,T1027.009,T1620
  all:
  - id: metadata/binary/layout::many-pe-embedded
  - id: metadata/binary/layout::overlay-over-90pct
  - id: metadata/binary/section/metrics::pe-entry-in-writable-section
  - id: objectives/anti-static/pack/detect::aspack-marker
  - id: objectives/anti-static/obfuscation/payload/import::pe-dynamic-resolution
  - id: micro-behaviors/dylib/load/runtime::load-library-a
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/

- id: petite-dynamic-api-overlay-unpacker
  desc: Petite-packed PE dynamically resolves APIs while unpacking an overlay
  crit: hostile
  conf: 0.98
  attack: T1027.002,T1620
  all:
  - id: objectives/anti-static/pack/petite::petite-encoded-overlay-loader
  - id: objectives/anti-static/obfuscation/payload/import::pe-dynamic-resolution
  - id: micro-behaviors/mem/protect/modify::virtual-memory-allocation-protection-api-pair
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/framework/

- id: embedded-pe-executable-memory-loader
  desc: PE validates an embedded image before executable-memory loading
  crit: hostile
  conf: 0.98
  attack: "T1027.009,T1620"
  all:
  - id: micro-behaviors/data/embedded/payload/header::inline-mz-magic-check
  - id: micro-behaviors/data/embedded/payload/header::inline-pe-signature-check
  - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework::dotnet-assembly
  - id: metadata/binary/installer/family/

- id: importless-single-section-high-entropy-body
  desc: Importless PE with opaque single-section code body
  crit: hostile
  conf: 0.98
  attack: T1027.002
  mbc: B0032
  for: [pe]
  size_min: 131072
  all:
