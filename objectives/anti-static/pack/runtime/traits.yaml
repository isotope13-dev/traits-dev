defaults:
  platforms:
  - windows
  for:
  - pe
  - dll
traits:
- id: pe-import-count-under-10
  desc: PE has under ten imports
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: imports.count
    max: 9
  unless:
  - type: metrics
    field: exports.count
    min: 20
  - type: metrics
    field: pe.is_dotnet
    min: 1
  - id: metadata/binary/framework::dotnet-metadata
- id: pe-no-import-dependencies
  desc: PE has no imported DLL dependencies
  crit: notable
  conf: 0.94
  if:
    type: metrics
    field: dependencies.count
    max: 0
composite_rules:
- id: tls-fiber-rwx-unpacking-loader
  desc: Multi-TLS RWX fiber unpacking path
  crit: hostile
  conf: 0.98
  attack: T1027.002
  all:
    - id: metadata/binary/layout::pe-multiple-tls-callbacks
    - id: micro-behaviors/mem/alloc/executable::virtualalloc-rwx-commit-x86-stack
    - id: micro-behaviors/mem/protect/modify::virtual-protect
    - id: micro-behaviors/process/thread/lifecycle::convert-thread-to-fiber
    - id: micro-behaviors/process/thread/lifecycle::switch-to-fiber
- id: signed-encrypted-api-unpacking-loader
  desc: Signed encrypted-API unpacking loader
  crit: hostile
  conf: 0.98
  all:
  - id: metadata/binary/section/names::executable-textbss-zero-backed
  - id: pe-import-count-under-10
  - id: objectives/anti-static/obfuscation/string/runtime-decrypt::rc4-encrypted-kernel32-api-table
  - id: metadata/binary/layout::pe-tls-callback-table
  - id: objectives/anti-static/obfuscation/payload/container::pe-has-signature-png
  any:
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-send-request
  - id: micro-behaviors/dylib/load/runtime::load-library-ex-a
  - id: micro-behaviors/dylib/lookup::get-proc-address
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/framework/
- id: sparse-tls-overlay-packed-dll
  desc: Sparse-import TLS DLL with packed overlay
  crit: hostile
  conf: 0.96
  attack: T1027.002
  all:
  - id: metadata/binary/layout::low-entropy-large-overlay
  - id: pe-import-count-under-10
  - id: metadata/binary/layout::pe-multiple-tls-callbacks
  - id: metadata/binary/metrics/structural::minimal-exports
  any:
  - id: metadata/binary/metrics/threshold::high-overall-entropy-binary
  - id: metadata/binary/metrics/structural::high-code-entropy
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: mingw-reloc-overlay-packed-dll
  desc: MinGW DLL with packed overlay and relocation-heavy loader shape
  crit: hostile
  conf: 0.95
  attack: T1027.002
  all:
  - id: metadata/lang/compiler/native::mingw-runtime-marker
  - id: metadata/binary/layout::low-entropy-large-overlay
  - id: metadata/binary/section/metrics::large-reloc-section
  - id: metadata/binary/metrics/structural::minimal-exports
  - id: metadata/binary/metrics/structural::high-code-entropy
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: nuitka-encrypted-onefile-loader
  desc: Nuitka one-file loader with encrypted payload body
  crit: hostile
  conf: 0.95
  attack: T1027.002
  for: [pe]
  all:
  - id: objectives/command-and-control/dropper/execution/windows-loader::nuitka-packed-process-loader
  - id: metadata/binary/metrics/structural::malformed-pe-structure
  - id: metadata/binary/resource::oversized-low-entropy-rsrc
  any:
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: metadata/package/versioning::pe-version-resource-multi-opaque-tokens
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework/
  - id: metadata/binary/installer/family/
- id: unpacking-api-pattern
  desc: Unpacking API pattern (Alloc + Protect)
  crit: notable
  conf: 0.9
  all:
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  any:
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::dominant-section
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-overall-entropy
  unless:
  - id: metadata/binary/section/names::upx-section
  - id: objectives/anti-static/pack/detect::upx-marker
  - id: metadata/binary/symbols/exports/
  - id: metadata/binary/layout::svk-packed-section
  downgrade:
    any:
    - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
    - id: metadata/signed/platform/
    - id: metadata/binary/installer/script/
- id: importless-rwx-entry-loader
  desc: Importless PE with encrypted RWX text and a writable entry point
  crit: hostile
  conf: 0.97
  attack: T1027,T1620
  all:
  - id: objectives/anti-static/obfuscation/payload/section::giant-writable-text-section
  - id: objectives/anti-static/obfuscation/payload/section::zero-import-dependency-pe
  - id: objectives/anti-static/obfuscation/payload/section::two-section-pe
  - id: objectives/anti-static/pack/upx::entry-in-writable-section
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework/
  - id: metadata/binary/installer/family/
- id: importless-encrypted-reloc-loader
  desc: Importless PE loader with encrypted relocation payload and writable entry code
  crit: hostile
  conf: 0.98
  attack: T1027,T1620
  all:
  - id: pe-no-import-dependencies
  - id: metadata/binary/section/metrics::encrypted-reloc-section
  - id: metadata/binary/section/metrics::writable-text-section
  - id: metadata/binary/metrics/structural::high-code-entropy
  - id: objectives/anti-static/pack/upx::entry-in-writable-section
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework/
  - id: metadata/binary/installer/family/
- id: rwx-uppercase-section-custom-packer
  desc: Custom packer stub with RWX uppercase-name section and entry inside
  crit: hostile
  conf: 0.96
  attack: T1027.002
  all:
  - id: metadata/binary/section/metrics::random-uppercase-rwx-section
  - id: metadata/binary/section/metrics::pe-nonstandard-entry
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: rwx-uppercase-section-anchor-imports
  desc: RWX uppercase-name section with minimal anchor-import surface
  crit: suspicious
  conf: 0.93
  attack: T1027.002
  all:
  - id: metadata/binary/section/metrics::random-uppercase-rwx-section
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/os/module/load::get-proc-address-import
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/metrics/structural::many-imports
- id: rwx-uppercase-network-staged-stub
  desc: RWX uppercase-name packer stub with network-anchor imports
  crit: suspicious
  conf: 0.92
  all:
  - id: metadata/binary/section/metrics::random-uppercase-rwx-section
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  any:
  - id: micro-behaviors/communications/socket/init::winsock-startup-ordinal
  - id: micro-behaviors/os/network/interface::get-adapters-addresses
  - id: micro-behaviors/process/create/exec::shell-execute-a
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/

- id: rwx-mixed-case-section-sparse-iat-packer
  desc: Custom packer with RWX mixed-case section and sparse dynamic-resolution IAT
  crit: hostile
  conf: 0.95
  attack: T1027.002
  all:
  - id: metadata/binary/section/metrics::random-mixed-case-rwx-section
  - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/section/names::upx-section
  - id: micro-behaviors/data/encode/pecompact::pecompact-signature

- id: rwx-mixed-case-section-anchor-imports
  desc: RWX mixed-case-name section with minimal anchor-import surface
  crit: suspicious
  conf: 0.92
  attack: T1027.002
  all:
  - id: metadata/binary/section/metrics::random-mixed-case-rwx-section
  - id: micro-behaviors/os/module/load::get-proc-address-import
  - id: micro-behaviors/dylib/load/runtime::load-library-a
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/metrics/structural::many-imports
