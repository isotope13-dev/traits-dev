defaults:
  attack: T1027.002
  mbc: B0032
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: flattened-clr-loader-benign-context
    desc: Benign CLR loader context
    crit: component
    conf: 0.9
    any:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: well-known/tool/reverse-engineering/x64dbg::titanengine-library
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/signed/developer::tencent-technologyshenzhen-company-limited
      - id: metadata/binary/debug::pdb-cpython-wininst
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
      - id: metadata/binary/metrics/structural::many-imports

  - id: dotnet-packed-loader
    desc: Packed .NET loader with reflection/resource access
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/symbols/imports::single-import-raw
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-code-entropy
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
    unless:
      - id: objectives/anti-static/obfuscation/tools/managed::dotnet-reactor-obfuscator
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/tools/managed::smartassembly

  - id: dotnet-packed-stub
    desc: Packed .NET stub (high entropy, sparse imports)
    crit: suspicious
    conf: 0.88
    all:
      - id: metadata/binary/framework::dotnet-assembly
    needs: 2
    any:
      - id: objectives/command-and-control/dropper/execution/loader::dotnet-single-import
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-code-entropy
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/pack/detect::themida-section
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
        - id: well-known/app/crayens::crayens-installer
        - id: objectives/anti-static/obfuscation/tools/managed::smartassembly

  - id: flattened-packer-clr-loader
    desc: Control-flow-flattened packer with CLR loader marker
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/binary/section/metrics::inflated-data-section
      - id: micro-behaviors/process/inject/runtime/clr::corexitprocess-string
    unless:
      - id: flattened-clr-loader-benign-context
