# Detects "scrambled UPX" anti-unpacker pattern: a PE that carries
# UPX0 + UPX1 section names but whose UPX! identification magic has
# been overwritten so that `upx -d` refuses to decompress.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.002
  mbc: F0001.008
traits:
  - id: upx-magic-bytes
    desc: UPX magic byte sequence
    crit: component
    conf: 0.99
    if:
      type: hex
      offset_range: [0, 16384]
      pattern: 55 50 58 21

  - id: large-zero-rwx-upx0
    desc: Large zero-filled RWX UPX0 memory reservation
    crit: component
    conf: 0.98
    if:
      type: section
      exact: UPX0
      writable: true
      executable: true
      entropy_max: 0.05
      length_min: 32768

  - id: renamed-high-entropy-rwx-payload
    desc: Renamed high-entropy RWX payload section
    crit: component
    conf: 0.94
    if:
      type: section
      regex: '^[A-Za-z][A-Za-z0-9]{3,7}$'
      writable: true
      executable: true
      entropy_min: 7.5
      length_min: 8192
      length_max: 524288

composite_rules:
  - id: single-bookend-renamed-upx-loader
    desc: Magic-stripped UPX loader with renamed compressed payload section
    crit: hostile
    conf: 0.98
    attack: T1027.002,T1620
    all:
      - id: large-zero-rwx-upx0
      - id: renamed-high-entropy-rwx-payload
      - id: metadata/binary/section/metrics::pe-entry-in-writable-section
      - id: objectives/anti-static/pack/runtime::pe-import-count-under-10
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    unless:
      - id: upx-magic-bytes
      - id: metadata/binary/section/names::upx1-section-name
      - id: metadata/signed/trust-level::signer-evidence-present
      - id: metadata/package/testing/presence/harness::binary-test-directory

  - id: upx-benign-tool-exception
    desc: Known UPX utility or SFX exception
    crit: exception
    conf: 0.99
    any:
      - id: well-known/tool/sysadmin/wimlib::bfi-helper
      - id: metadata/binary/framework::upx-tool-identity
      - id: well-known/app/peazip::peazip-freearc-sfx-helper
      - id: well-known/app/dingtalk/

  - id: scrambled-upx-header
    desc: UPX section names but UPX magic erased
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/section/names::upx0-section-name
    any:
      - id: metadata/binary/section/names::upx1-section-name
      - id: metadata/binary/section/names::upx2-section-name
    unless:
      - id: well-known/app/phantomjs::phantomjs-official-binary
      - id: metadata/binary/installer/sfx::freearc-sfx
      - id: well-known/tool/development/cygwin::cygwin-setup-signature
      - id: metadata/package/testing/presence/harness::binary-test-directory
      - id: metadata/binary/framework::upx-tool-marker
      - id: objectives/anti-static/pack/upx::upx-magic-bytes
      - id: micro-behaviors/fs/temp/py2exe::py2exe-pythondll
      - id: upx-benign-tool-exception
      - id: well-known/tool/dual-use/nirsoft::snremove-utility

  - id: upx-rwx-dbk-resource-loader
    desc: UPX PE with RWX resource and DBK wrapper exports
    crit: hostile
    conf: 0.99
    attack: T1027.002,T1620
    all:
      - id: metadata/binary/section/names::upx-section
      - id: metadata/hardening/memory::extreme-wx-section-count-10
      - id: objectives/anti-static/pack/section-anomaly::rsrc-rwx-null-payload-section
      - id: metadata/binary/symbols/exports::dbk-fcall-wrapper-export
      - id: metadata/binary/symbols/exports::dbk-fcall-wrapper-addr-export

  # Masquerade: the file carries UPX section names but no section is actually
  # compressed (entropy too low), so it is not a genuine UPX image and `upx -d`
  # cannot inflate it. Orthogonal to scrambled-upx-header — this fires even when
  # a decoy "UPX!" magic string is left in place, since the entropy ceiling
  # alone excludes real UPX payloads (whose UPX1 sits at ~7.8+).
  - id: upx-sections-not-compressed
    desc: UPX section names but no compressed payload section
    crit: suspicious
    conf: 0.92
    scope: leaf
    all:
      - id: metadata/binary/section/names::upx0-section-name
      # A canonical UPX image has the UPX0/UPX1/UPX2 three-section layout;
      # cleave's synthetic unpack child has a normal multi-section layout.
      - id: metadata/binary/section/metrics::pe-three-sections
      - id: metadata/binary/metrics/threshold::no-compression-grade-section
    any:
      - id: metadata/binary/section/names::upx1-section-name
      - id: metadata/binary/section/names::upx2-section-name
    unless:
      - id: well-known/app/phantomjs::phantomjs-official-binary
      - id: metadata/binary/installer/sfx::freearc-sfx
      - id: well-known/tool/development/cygwin::cygwin-setup-signature
      - id: metadata/package/testing/presence/harness::binary-test-directory
      - id: well-known/tool/sysadmin/wimlib::bfi-helper
      - id: well-known/app/peazip::peazip-freearc-sfx-helper
      - id: well-known/tool/dual-use/nirsoft::snremove-utility

  # The canonical UPX layout is UPX0 (empty RWX), UPX1 (compressed payload)
  # and UPX2 (loader imports). Renaming the UPX1 spine to a benign name
  # (e.g. .data) defeats every UPX1-anchored detector while UPX0/UPX2 and
  # the empty RWX decoy survive. Genuine UPX always keeps UPX1 and the UPX!
  # magic, so their joint absence is conclusive tampering.
  - id: scrambled-upx-renamed-spine-loader
    desc: UPX bookend sections with renamed payload spine
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/binary/section/names::upx0-section-name
      - id: metadata/binary/section/names::upx2-section-name
      - id: objectives/command-and-control/dropper/execution/loader::empty-rwx-upx0
    unless:
      - id: upx-magic-bytes
      - id: metadata/binary/section/names::upx1-section-name
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/

  # The renamed payload section is writable+executable and holds the entry
  # point: the stub decrypts itself in place at runtime. Genuine UPX also
  # runs from a writable section, so the UPX! magic absence is the gate
  # that isolates the tampered, magic-stripped variant.
  - id: wx-entrypoint-scrambled-upx-loader
    desc: Entry point in writable scrambled UPX section
    crit: hostile
    conf: 0.95
    attack: T1620
    mbc: B0030
    all:
      - id: metadata/binary/section/metrics::pe-entry-in-writable-section
      - id: metadata/hardening/memory::wx-section
      - id: metadata/binary/section/names::upx-section
    unless:
      - id: upx-magic-bytes
      # A version resource is not signing evidence.  The old aggregate
      # excluded unsigned payloads that merely carried benign-looking
      # metadata, including modified UPX loaders with decoy exports.
      - id: metadata/signed/trust-level::signer-evidence-present
      # Installer *profiles* only. A bare overlay requireAdministrator literal
      # previously lived under installer/sfx and false-suppressed this rule;
      # that literal now lives under metadata/build/manifest/.
      - id: metadata/binary/installer/sfx/
      - id: micro-behaviors/fs/temp/py2exe::py2exe-pythondll
      - id: well-known/tool/development/cygwin::cygwin-setup-signature
      - id: metadata/package/testing/presence/harness::binary-test-directory
      - id: well-known/tool/sysadmin/wimlib::bfi-helper
      - id: metadata/binary/framework::upx-tool-396-magic

  - id: scrambled-upx-export-decoy-loader
    desc: Modified UPX loader with export decoys
    crit: hostile
    conf: 0.98
    attack: T1027.002,T1620
    mbc: B0030
    all:
      - id: scrambled-upx-header
      - id: metadata/binary/section/metrics::pe-entry-in-writable-section
      - id: metadata/binary/symbols/imports::pe-imports-max-80
      - id: metadata/binary/metrics/threshold::many-exports-100
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    unless:
      - id: upx-magic-bytes
      - id: metadata/signed/trust-level::signer-evidence-present
      - id: metadata/binary/installer/family/

  # A genuinely UPX-compressed image holds almost no readable prose, yet
  # this loader is padded with cleartext license/EULA text (sentence ratio
  # high) to dilute entropy heuristics and look benign. Combined with the
  # empty RWX decoy and minimal dynamic-load imports it is a masquerade.
  - id: packed-loader-license-prose-decoy
    desc: Packed loader padded with license prose decoy
    crit: hostile
    conf: 0.95
    attack: T1027.001
    mbc: B0032
    all:
      - id: metadata/binary/metrics/threshold::rich-sentence-strings-20pct
      - id: metadata/binary/section/names::upx-section
      - id: objectives/command-and-control/dropper/execution/loader::empty-rwx-upx0
      - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
    unless:
      - id: upx-magic-bytes
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/

  # Magic-stripped UPX0/UPX1 bookend with giant RWX payload, virtual-protect
  # stub, and an admin manifest — classic hacked-UPX cryptor loader.
  - id: scrambled-upx-admin-crypt-loader
    desc: Magic-stripped UPX admin crypt loader with giant RWX payload
    crit: hostile
    conf: 0.98
    attack: T1027.002,T1548.002
    all:
      - id: scrambled-upx-header
      - id: objectives/command-and-control/dropper/execution/loader::giant-rwx-upx1
      - id: objectives/command-and-control/dropper/execution/loader::empty-rwx-upx0
      - id: metadata/build/manifest::pe-requires-admin
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/anti-static/pack/runtime::pe-import-count-under-10
    unless:
      - id: upx-magic-bytes
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
      - id: metadata/binary/framework::upx-tool-396-magic

  # A compact UPX stub with the identifying magic removed, an entry point in
  # writable memory, and both dynamic API resolution and page-protection
  # changes is an unpacking loader even when it is too small for the giant
  # payload rules above.
  - id: scrambled-upx-api-resolving-loader
    desc: Magic-stripped UPX stub resolves APIs and changes memory protection
    crit: hostile
    conf: 0.98
    attack: T1027.002,T1620
    mbc: B0030
    all:
      - id: scrambled-upx-header
      - id: metadata/binary/section/metrics::pe-entry-in-writable-section
      - id: objectives/anti-static/pack/runtime::pe-import-count-under-10
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    unless:
      - id: upx-magic-bytes
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
      - id: metadata/binary/framework::upx-tool-396-magic
