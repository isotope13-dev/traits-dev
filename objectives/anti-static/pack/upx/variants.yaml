defaults:
  platforms: [windows, unix]
  for: [binaries]
  entropy_min: 7.0
traits:
  - id: upx-tampered-magic-pattern
    desc: 'Byte pattern matching tampered UPX magic'
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '[A-TV-Z]PX!'
composite_rules:
  - id: upx-tampered-magic
    desc: Tampered UPX magic pattern with UPX section names
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1027
    all:
      - id: upx-tampered-magic-pattern
      - id: metadata/binary/section/names::upx-section

  - id: fake-upx-invalid-import-wrapper
    desc: Fake UPX wrapper with forged import directory
    crit: suspicious
    conf: 0.98
    mbc: B0032
    attack: T1027.001
    all:
      - id: upx-magic-bytes
      - id: metadata/binary/section/names::upx-section-pair
      - id: metadata/binary/anomaly/format::pe-import-dir-rva-10000000
    any:
      - id: metadata/binary/anomaly/format::pe-import-dir-outside-section
      - id: metadata/binary/metrics/structural::few-sections
