defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [elf, macho, pe]
  entropy_min: 7.0  # Tampered UPX magic means the binary is still packed; entropy confirms it isn't just a string reference
traits:
  - id: upx-tampered-magic-pattern
    desc: Byte pattern matching tampered UPX magic ([A-Z]PX!)
    crit: component
    conf: 0.95
    if:
      type: raw
      regex: '[A-TV-Z]PX!'
composite_rules:
  - id: upx-tampered-magic
    desc: Tampered UPX magic pattern with UPX section names
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1027
    all:
      - id: upx-tampered-magic-pattern
      - id: objectives/anti-static/packer/detect::upx-section
