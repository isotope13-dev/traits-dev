defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [elf, macho, pe]
traits:
  - id: uuu-packer-info
    desc: UUU packer info string
    crit: component
    if:
      type: string
      substr: "$Info: This file is packed with the UUU executable packer"
  - id: uuu-packer-id
    desc: UUU packer ID string
    crit: component
    if:
      type: string
      substr: "$Id: UUU 4"
  - id: uuu-tampered-magic
    desc: UUU modified UPX magic bytes
    crit: component
    if:
      type: raw
      regex: 'UUU!'
composite_rules:
  - id: uuu-executable-packer
    desc: UUU executable packer (UPX evasion)
    crit: suspicious
    conf: 1.0
    mbc: B0032
    attack: T1027.002
    any:
      - id: uuu-packer-info
      - id: uuu-packer-id
      - id: uuu-tampered-magic
