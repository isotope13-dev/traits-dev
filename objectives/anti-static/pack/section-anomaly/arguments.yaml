defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: excessive-function-arguments
    desc: "func definition with excessive args (>50)"
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: 'function\s+[a-zA-Z0-9_]+\s*\(([a-zA-Z0-9_]+,){50,}[a-zA-Z0-9_]+\)'
    unless:
      - id: metadata/library/structure::dart-flutter-js-bundle
