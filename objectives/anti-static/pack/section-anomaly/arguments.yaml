defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: excessive-function-arguments
    desc: "func definition with excessive args (>50)"
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: 'function\s+[a-zA-Z0-9_]+\s*\(([a-zA-Z0-9_]+,){50,}[a-zA-Z0-9_]+\)'
    unless:
      - id: metadata/library/structure::dart-flutter-js-bundle
  - id: packed-string-decryptor
    desc: Arithmetic string-decoder wrapper call
    crit: notable
    conf: 0.85
    unless:
      - id: metadata/package/files/dependency::vsix-bundled-output-path
    if:
      type: text
      regex: 'return\s+[a-zA-Z0-9_]+\([a-zA-Z0-9_]+-\s*-0x[0-9a-fA-F]+,[a-zA-Z0-9_]+\)'
