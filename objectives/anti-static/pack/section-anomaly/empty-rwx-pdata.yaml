# Cryptor/packer stubs that reserve a large empty RWX `.pdata` section
# (BSS-style) while placing the entry stub in an executable `.rsrc` with a
# four-import VirtualProtect resolve table. Distinct from real PE exception
# directories, which are not RWX BSS reservations.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.002
  mbc: F0001

traits:
  - id: empty-rwx-pdata-reservation
    desc: Empty RWX .pdata memory reservation
    crit: suspicious
    conf: 0.96
    if:
      type: section
      exact: .pdata
      writable: true
      executable: true
      length_max: 1
      # Virtual size is large; file size near-zero (length_max covers file bytes).
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
      - id: metadata/binary/installer/family/

composite_rules:
  - id: empty-pdata-executable-rsrc-crypt-stub
    desc: Empty RWX .pdata with executable .rsrc crypt stub
    crit: hostile
    conf: 0.97
    all:
      - id: empty-rwx-pdata-reservation
      - id: metadata/binary/resource::executable-rsrc-section
      - id: objectives/anti-static/pack/runtime::pe-import-count-under-10
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    any:
      - id: micro-behaviors/dylib/load/runtime::load-library-a
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
      - id: metadata/binary/installer/family/
