# Suspicious resource-heavy MFC/GUI applications where the resource table shape
# looks tampered or parser-hostile. These rules intentionally stay below hostile:
# MFC imports can explain hooks, BitBlt, resource loading, and memory management.
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1027
composite_rules:
  - id: unsigned-mfc-malformed-resource-table
    desc: Unsigned MFC app with malformed resources
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/signed/trust-level::unsigned
      - id: metadata/binary/metrics/structural::malformed-pe-structure
      - id: metadata/binary/resource::large-null-rsrc
    any:
      - id: metadata/binary/framework::mfc-application-framework
      - id: metadata/package/versioning::pe-version-resource
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
      - id: metadata/binary/metrics/structural::many-imports
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/binary/framework::dotnet-assembly
  - id: packed-gui-null-resource-wrapper
    desc: Packed GUI with null resource wrapper
    crit: suspicious
    conf: 0.91
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-overall-entropy
      - id: metadata/binary/resource::oversized-low-entropy-rsrc
      - id: metadata/binary/metrics/structural::malformed-pe-structure
    any:
      - id: metadata/signed/trust-level::unsigned
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
      - id: metadata/binary/metrics/structural::many-imports
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/installer/script::inno-setup
  - id: malformed-resource-ui-monitor-surface
    desc: Malformed resource app with UI monitoring
    crit: suspicious
    conf: 0.88
    all:
      - id: metadata/binary/metrics/structural::malformed-pe-structure
      - id: metadata/binary/resource::large-null-rsrc
      - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
    any:
      - id: objectives/anti-analysis/sandbox-detect/input::input-foreground-sandbox-gate
      - id: micro-behaviors/hardware/display/screen::get-desktop-window
      - id: micro-behaviors/hardware/display/screen::gdi-bitblt
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
