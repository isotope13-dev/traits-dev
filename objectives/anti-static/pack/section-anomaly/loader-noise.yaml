# Read-only-.reloc loaders (no RWX, so the existing reloc-rwx composites miss
# them) that hide an ENCRYPTED stage: the section is high-entropy AND the
# overhang metric proves most of it is non-relocation data. Two independent
# structural anomalies (entropy + overhang) co-firing on .reloc is effectively
# never benign. Family-agnostic: catches the ACRStealer/Shelma-style loader
# (legit signed host with payload stuffed into an oversized read-only .reloc).
