  crit: suspicious
  conf: 0.9
  if:
    type: section
    writable: true
    readable: false
    length_min: 4096
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/file/string/identity::is-windows-named
    - id: well-known/lib/wine/
- id: tiny-executable-obfuscation-section
  desc: Tiny executable nonstandard section stub
  crit: suspicious
  conf: 0.82
  if:
    type: section
    regex: "^\\.[A-Za-z0-9]{3,6}$"
    executable: true
    length_max: 4096
  unless:
  - id: metadata/binary/section/names/
  - id: objectives/anti-static/pack/asprotect
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/installer/script::nsis-sfx-deadbeef-magic
  downgrade:
    any:
    - id: metadata/signed/platform/
- id: oversized-reloc-masking
  desc: Oversized low-entropy .reloc masking section
  crit: suspicious
  conf: 0.92
  if:
    type: section
    exact: ".reloc"
    length_min: 1048576
    entropy_max: 4.2
- id: reloc-rwx-payload-section
  desc: Large RWX .reloc payload section
  crit: suspicious
  conf: 0.96
  if:
    type: section
    exact: ".reloc"
    writable: true
    executable: true
    length_min: 262144
    entropy_max: 4.7
- id: reloc-rwx-encrypted-payload
  desc: RWX .reloc encrypted payload staging
  crit: suspicious
  conf: 0.98
  if:
    type: section
    exact: ".reloc"
    writable: true
    executable: true
    length_min: 65536
    entropy_min: 6.0
  downgrade:
    any:
    - id: metadata/signed/platform/
  unless:
  - id: metadata/signed/developer::martin-tofall
  - id: well-known/app/internet-explorer/
- id: reloc-readonly-encrypted-payload
  desc: Read-only encrypted .reloc payload
  crit: suspicious
  conf: 0.96
  if:
    type: section
    exact: ".reloc"
    readable: true
    writable: false
    executable: false
    length_min: 262144
    entropy_min: 7.0
  downgrade:
    any:
    - id: metadata/signed/platform/
  unless:
  - id: well-known/app/internet-explorer/
# filefacts walks the base-relocation directory and emits the fraction of the
# hosting section that is NOT real relocation data (pe.reloc_overhang_ratio) and
# the absolute overhang in bytes (pe.reloc_overhang_bytes). A genuine .reloc
# fills its section (overhang ~0); a loader that appends an encrypted second
# stage to .reloc leaves the section vastly larger than the few real relocation
# blocks. The ratio ALONE false-positives on every minimal .reloc: a .NET
# assembly has one 12-byte bootstrap fixup padded to the 512-byte file
# alignment, which is ratio 0.98 but only ~500 bytes of zero padding — not a
# concealed payload. Requiring the absolute overhang to clear the largest
# plausible alignment gap (8 KiB) keeps the ratio meaningful: entropy-
# independent structural evidence of a real hidden stage (catches low-entropy
# stages the entropy traits miss) without firing on alignment slack.
- id: reloc-overhang-bytes-significant
  desc: 'reloc overhang bytes significant'
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: pe.reloc_overhang_bytes
    min: 8192
  unless:
  - id: metadata/lang/compiler/systems::go-pe-binary-context
- id: x64-xor-dec-dword-payload-loop
  desc: XOR then decrement dword decode loop
  crit: component
  conf: 0.9
  arch: [x86-64]
  count_min: 2
  if:
    type: hex
    section: .text
    pattern: "41 8b 03 35 ?? ?? ?? ?? ff c8"
  unless:
  - id: metadata/binary/framework/
  - id: metadata/signed/platform/
- id: reloc-dominates-image
  desc: .reloc dominates PE image layout
  crit: notable
  conf: 0.84
  if:
    type: section
    regex: ".reloc"
    compare_to: total
    size_ratio_min: 0.7
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/file/string/identity::is-windows-named
- id: lol-rwx-payload-section
  desc: .lol RWX packed payload section
