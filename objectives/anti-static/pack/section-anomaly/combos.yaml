# Anti-Static: Packing and Obfuscation
# Composite rules for detecting packed or obfuscated code
defaults:
  platforms: [windows, linux, macos, unix, android, ios]
composite_rules:
  - id: rwx-packed-loader
    desc: PE with RWX section flood and packed payload
    crit: hostile
    conf: 0.99
    attack: T1027.002,T1620
    mbc: B0032
    for: [pe]
    all:
      - id: metadata/hardening/memory::extreme-wx-section-count-10
      - id: large-low-entropy-rwx-section
      - id: metadata/binary/section/metrics::random-rwx-cavity-section
      - id: objectives/anti-static/pack/section-anomaly::rsrc-rwx-null-payload-section
  - id: embedded-compression
    desc: Embedded compressed payload
    crit: notable
    conf: 0.90
    attack: "T1140"
    mbc: "C0032"
    for: ["pe", "dll"]
    # Bootloaders and firmware commonly embed compressed payloads
    # Downgraded to notable - not suspicious without additional packing indicators
    any:
      - id: micro-behaviors/data/encode/compression::lzma-signature
      - id: micro-behaviors/data/encode/compression::lzma-magic-dup
  - id: packed-ad-targeting
    desc: Packed binary with Active Directory and Terminal Services imports
    crit: suspicious
    conf: 0.8
    attack: "T1027"
    for: [pe]
    all:
      - id: micro-behaviors/dylib/load/dsprop/
      - id: micro-behaviors/dylib/load/wtsapi/
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::dominant-section
  - id: payload-unpacking
    desc: Embedded payload with unpacking capability
    crit: notable
    conf: 0.85
    attack: "T1140"
    mbc: "C0032"
    for: ["pe", "dll"]
    all:
      - id: objectives/anti-static/pack/section-anomaly::embedded-compression
      - id: objectives/anti-static/obfuscation/reflection/class::dynamic-load-pattern
    downgrade:
      any:
        - id: well-known/game/steam/
  # Large packed JS with excessive function arguments and string decryptor
  - id: packed-js-payload
    desc: Packed JavaScript payload with string decryptor
    crit: hostile
    conf: 0.98
    attack: "T1027"
    mbc: "B0032"
    for: [javascript, typescript]
    needs: 3
    any:
      - id: objectives/command-and-control/backdoor/keywords::user-get-action-class
      - id: objectives/anti-static/pack/section-anomaly::excessive-function-arguments
      - id: objectives/anti-static/obfuscation/string/dynamic::arithmetic-decoder-wrapper-call
      - id: metadata/binary/metrics/size::large-source-file-4mb
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
  # Large packed binary with excessive arguments
  - id: packed-excessive-args
    desc: Large packed file with excessive function arguments
    crit: suspicious
    conf: 0.9
    attack: "T1027"
    mbc: "B0032"
    for: [javascript, typescript]
    all:
      - id: objectives/anti-static/pack/section-anomaly::excessive-function-arguments
      - id: metadata/binary/metrics/size::large-file-1mb
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
  - id: packed-pe-temp-shell-stager
    desc: Packed PE temp shell stager
    crit: suspicious
    conf: 0.92
    attack: "T1027,T1105"
    mbc: "B0032"
    for: [pe]
    all:
      - id: metadata/binary/section/metrics::high-entropy-rdata-section
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
    any:
      - id: micro-behaviors/process/create/shell/spawn::shell-execution-comp
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/process/terminate/kill::terminate-process
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/vlc::windows-nsis-bundle
      - id: well-known/lib/videolan::videolan-codec-lib
  - id: rwx-flood-low-entropy-overlay-loader
    desc: RWX section flood overlay loader
    crit: hostile
    conf: 0.97
    attack: "T1027.002"
    mbc: "B0032"
    for: [pe]
    ref: sha256:4f0345c5f747afeef5bd5e071a531cdf697d5384f2943a2da854d6117b5de1e9
    all:
      - id: metadata/hardening/memory::extreme-wx-section-count-10
      - id: metadata/binary/layout::low-entropy-large-overlay
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: objectives/anti-static/obfuscation/binary-metrics/sparse-imports::import-count-under-80
      - id: metadata/binary/section/metrics::random-exec-payload-section
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/protected-benign-pe/
      - id: metadata/binary/framework/
