defaults:
  platforms:
    - windows
  for: [pe]
traits:
  - id: section
    desc: Oreans Code Virtualizer / Themida sections
    crit: suspicious
    conf: 0.98
    attack: T1027.002
    if:
      type: section
      regex: "(?i)^\\.(vlizer|vm_sec)"
  - id: custom-vm
    desc: Oreans Code Virtualizer custom VM section
    crit: notable
    conf: 0.95
    if:
      type: section
      exact: .vlizer
      writable: true
      executable: true
      entropy_min: 7.9
