defaults:
  attack: T1027
  mbc: B0032
  platforms:
    - windows
  for:
    - pe
traits:
  - id: mpress-packer-symbol
    desc: MPRESS packer symbol
    crit: suspicious
    conf: 0.95
    entropy_min: 7.0
    if:
      type: symbol
      regex: (?:^|[^a-zA-Z])[Mm][Pp]ress::_
  - id: mpress-packer-string
    desc: MPRESS packer string
    crit: notable
    conf: 0.8
    entropy_min: 7.0
    if:
      type: text
      exact: MPRESS
  - id: mpress1-rwx-section
    desc: RWX MPRESS1 section with high entropy
    crit: suspicious
    conf: 0.95
    if:
      type: section
      exact: .MPRESS1
      writable: true
      executable: true
      entropy_min: 7.0
  - id: mpress2-section
    desc: MPRESS2 section present
    crit: component
    conf: 0.9
    if:
      type: section
      exact: .MPRESS2
composite_rules:
  - id: fake-mpress-memory-wrapper
    desc: Fake MPRESS wrapper with in-memory loader
    crit: hostile
    conf: 0.96
    attack: T1620
    mbc: B0030
    all:
      - id: mpress1-rwx-section
      - id: mpress2-section
      - id: metadata/binary/metrics::low-function-count-marker
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/time/query::get-tick-count
      - id: objectives/anti-static/obfuscation/binary-metrics::many-wx-sections
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/developer/
