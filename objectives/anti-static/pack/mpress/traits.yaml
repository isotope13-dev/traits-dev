defaults:
  for: [pe]
  entropy_min: 7.0  # MPRESS compresses the entire payload; packed PE files always have very high entropy
traits:
  - id: mpress-packer-symbol
    desc: MPRESS packer symbol
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      regex: "(?:^|[^a-zA-Z])[Mm][Pp]ress::_"
    mbc: B0032
    attack: T1027
  - id: mpress-packer-string
    desc: MPRESS packer string
    crit: notable
    conf: 0.8
    if:
      type: string
      exact: "MPRESS"
    mbc: B0032
    attack: T1027
