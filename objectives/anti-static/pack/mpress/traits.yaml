defaults:
  attack: T1027
  mbc: B0032
  platforms:
    - windows
  for:
    - pe
  entropy_min: 7.0
traits:
  - id: mpress-packer-symbol
    desc: MPRESS packer symbol
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      regex: (?:^|[^a-zA-Z])[Mm][Pp]ress::_
  - id: mpress-packer-string
    desc: MPRESS packer string
    crit: notable
    conf: 0.8
    entropy_min: 6.8
    if:
      type: text
      substr: MPRESS
  - id: mpress-section-one
    desc: MPRESS compressed payload section
    crit: component
    conf: 0.95
    entropy_min: 6.8
    if:
      type: section
      exact: .MPRESS1
  - id: mpress-section-two
    desc: MPRESS loader stub section
    crit: component
    conf: 0.95
    entropy_min: 6.8
    if:
      type: section
      exact: .MPRESS2
  - id: mpress-v219-version
    desc: MPRESS v2.19 version marker
    crit: component
    conf: 0.9
    entropy_min: 6.8
    if:
      type: text
      exact: v2.19
composite_rules:
  - id: mpress-two-section-loader
    desc: MPRESS two-section packed PE
    crit: suspicious
    conf: 0.95
    all:
      - id: mpress-section-one
      - id: mpress-section-two
    any:
      - id: mpress-packer-string
      - id: mpress-v219-version
