defaults:
  platforms: [windows, linux, macos]
  for: [java, class]
traits:
  - id: caesium-null-marker
    desc: Empty class used by Caesium obfuscator
    crit: suspicious
    size_max: 1
    if:
      id: objectives/anti-static/obfuscation/tools/bytecode::caesium-component
  - id: caesium-code-bin-name
    desc: Filename indicates hidden class binary (Caesium)
    crit: notable
    if:
      type: path
      basename: true
      regex: '\.class\.bin$'
  - id: caesium-code-bin-magic
    desc: CAFEBABE magic in non-Java binary (polyglot/embedded class)
    crit: notable
    for: [elf, pe]
    if:
      type: hex
      pattern: "ca fe ba be"
      offset: 0
composite_rules:
  - id: caesium-code-bin
    desc: Binary code file used by Caesium obfuscator to hide actual classes
    crit: suspicious
    all:
      - id: caesium-code-bin-name
      - id: caesium-code-bin-magic
