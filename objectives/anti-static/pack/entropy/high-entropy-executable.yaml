defaults:
  platforms:
    - windows
    - linux
    - unix
    - android
    - macos
    - ios
  for: [binaries]
  crit: suspicious
  conf: 0.85
traits:
  - id: high-entropy-exec-section
    desc: High entropy in executable section (possible packing)
    if:
      type: section
      regex: '^(\.(text|code)|__text|CODE)'
      executable: true
      entropy_min: 7.5
    unless:
      - type: raw
        regex: BSJB
      - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - type: raw
          substr: PECompac
