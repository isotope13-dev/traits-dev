defaults:
  platforms:
    - windows
    - linux
    - unix
    - android
    - macos
    - ios
  for: [binaries]
  crit: suspicious
  conf: 0.85
traits:
  - id: high-entropy-exec-section
    desc: High entropy in executable section (possible packing)
    entropy_min: 7.0
    if:
      type: section
      executable: true
    unless:
      - type: raw
        regex: BSJB
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - type: raw
          substr: PECompac
