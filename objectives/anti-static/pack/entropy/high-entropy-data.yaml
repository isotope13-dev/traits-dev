# High entropy in writable data sections
# Indicates obfuscated/encrypted payload data stored in DATA sections
defaults:
  for: [binaries]
  platforms: [windows, linux, unix, macos]
  crit: suspicious
  conf: 0.82

traits:
  - id: high-entropy-data-section
    desc: High entropy in writable data section
    if:
      type: section
      regex: '^(\.(data|rdata)|__data|DATA)'
      writable: true
      entropy_min: 7.0
    unless:
      - id: metadata/vendor/pash::zprotect-plugin
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: metadata/signed/platform::microsoft
        - id: objectives/anti-static/pack/detect::aspack-marker
        - id: objectives/anti-static/pack/detect::upx-marker
        - id: objectives/anti-static/pack/detect::themida-marker
        - id: objectives/anti-static/pack/detect::vmprotect-marker
