# High entropy in writable data sections
# Indicates obfuscated/encrypted payload data stored in DATA sections
defaults:
  for: [binaries]
  platforms: [windows, unix]
  crit: component
  conf: 0.82

traits:
  - id: high-entropy-data-section
    desc: High entropy in writable data section
    if:
      type: section
      regex: '^(\.(data|rdata)|__data|DATA)'
      writable: true
      entropy_min: 7.0
    unless:
      - id: high-entropy-data-known-benign
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/platform::.net
      - type: symbol
        exact: TaggantPrepare
      - type: basename
        regex: '(?i)\.node$'
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  # low-overall-entropy-binary moved to metadata/binary/metrics/thresholds.yaml
  - id: large-function-surface
    desc: Binary has many functions
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.func_count
      min: 500
    unless:
      - id: metadata/file/text/string::system-shell-basename
      - id: metadata/lang/compiler/systems::go-pe-symtab
composite_rules:
  - id: high-entropy-data-known-benign
    desc: Benign high entropy data context
    crit: component
    conf: 0.95
    any:
      - id: well-known/tool/dual-use/zprotect::zprotect-plugin
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::.net
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/linking/runtime::ape-binary-marker
      - id: high-entropy-data-pe-lib-context
  - id: high-entropy-data-pe-lib-context
    desc: Large export PE with low overall entropy
    crit: component
    conf: 0.9
    all:
      - id: metadata/binary/metrics/threshold::low-overall-entropy-binary
    any:
      - id: metadata/binary/metrics/threshold::many-exports-1000
      - id: large-function-surface
    unless:
      - id: metadata/file/text/string::system-shell-basename
      - id: metadata/lang/compiler/systems::go-pe-symtab
