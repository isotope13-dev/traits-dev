# High entropy in writable data sections
# Indicates obfuscated/encrypted payload data stored in DATA sections
defaults:
  for: [binaries]
  platforms: [windows, linux, unix, macos]
  crit: suspicious
  conf: 0.82

traits:
  - id: high-entropy-data-section
    desc: High entropy in writable data section
    if:
      type: section
      regex: '^(\.(data|rdata)|__data|DATA)'
      writable: true
      entropy_min: 7.0
    unless:
      - id: high-entropy-data-known-benign
      - id: metadata/binary/framework::dotnet-assembly
      - type: symbol
        exact: TaggantPrepare
      - type: basename
        regex: '(?i)\.node$'
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: low-overall-entropy-binary
    desc: Binary has low overall entropy
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.overall_entropy
      max: 5.0
  - id: large-export-surface
    desc: Binary exports many symbols
    crit: component
    conf: 0.9
    if:
      type: exports_count
      min: 1000
  - id: large-function-surface
    desc: Binary has many functions
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: binary.function_count
      min: 500

composite_rules:
  - id: high-entropy-data-known-benign
    desc: Benign high entropy data context
    crit: component
    conf: 0.95
    any:
      - id: metadata/vendor/pash::zprotect-plugin
      - id: metadata/signed/platform::microsoft
      - id: objectives/anti-static/obfuscation/binary-metrics::ape-binary-marker
      - id: high-entropy-data-pe-lib-context
  - id: high-entropy-data-pe-lib-context
    desc: Large export PE with low overall entropy
    crit: component
    conf: 0.9
    all:
      - id: low-overall-entropy-binary
    any:
      - id: large-export-surface
      - id: large-function-surface
