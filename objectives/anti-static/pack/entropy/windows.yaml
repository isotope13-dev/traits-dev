# Packing and Entropy-based Detection
# Detects high entropy and structural indicators of packing
defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: high-entropy-section
    desc: High entropy executable section (possible packing)
    crit: notable
    conf: 0.85
    entropy_min: 7.8
    if:
      type: section
      # Only match executable sections (.text, CODE)
      # High entropy in .data/.rsrc is normal (compressed resources, archives)
      regex: '(?i)^(\.|__)(text|code)'
    unless:
      - id: objectives/anti-static/obfuscation/reflection/invoke::namespace-import
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/managed::versioned-vcl-app
      - id: micro-behaviors/data/encode/pecompact::pecompact-seh-trick
  # .NET assemblies with near-maximum entropy in .text carry encrypted payloads
  # Normal .NET IL code has entropy ~5.5-6.5; 7.9+ means encrypted/packed blob
  - id: dotnet-high-entropy-text-raw
    desc: Near-maximum entropy in .text section
    crit: component
    if:
      type: section
      regex: '(?i)^(\.|__)(text|code)'
      executable: true
      entropy_min: 7.9
  - id: dotnet-large-near-high-entropy-text-raw
    desc: Large near-high entropy .text section
    crit: component
    if:
      type: section
      regex: '(?i)^(\.|__)(text|code)'
      executable: true
      entropy_min: 6.9
      length_min: 900000
  - id: many-functions-dotnet-profile
    desc: .NET binary with many functions
    crit: component
    if:
      type: metrics
      field: binary.function_count
      min: 200
    unless:
      - id: metadata/binary/metrics::many-imports-40
  - id: many-strings-dotnet-profile
    desc: .NET binary with many strings
    crit: component
    if:
      type: metrics
      field: binary.string_count
      min: 800
    unless:
      - id: metadata/binary/metrics::many-imports-40
  - id: dotnet-xaml-generated-namespace
    desc: WPF generated XAML namespace marker
    crit: component
    if:
      type: text
      exact: XamlGeneratedNamespace
  - id: dotnet-wpf-component-connector
    desc: WPF component connector marker
    crit: component
    if:
      type: text
      exact: System.Windows.Markup.IComponentConnector.Connect
  - id: dotnet-wpf-component-resource-path
    desc: WPF pack resource path marker
    crit: component
    if:
      type: text
      substr: ;component/Resources/
  - id: dotnet-costura-assembly-loader
    desc: Costura embedded assembly loader symbol
    crit: component
    if:
      type: symbol
      substr: 'Costura::AssemblyLoader::'
  - id: dotnet-costura-compressed-resource
    desc: Costura compressed embedded dependency
    crit: component
    if:
      type: text
      regex: ^costura\..{1,80}\.(dll|pdb)\.compressed$
  - id: magick-net-core-ref
    desc: Magick.NET Core library marker
    crit: component
    if:
      type: text
      exact: Magick.NET.Core
composite_rules:
  - id: dotnet-versioned-resource-library
    desc: Versioned .NET resource library profile
    crit: component
    conf: 0.7
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: micro-behaviors/data/embedded/payload::dotnet-getmanifestresourcestream
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
      - id: many-functions-dotnet-profile
      - id: many-strings-dotnet-profile
  - id: dotnet-wpf-ui-bundle-profile
    desc: WPF UI bundle packed into .text
    crit: component
    conf: 0.8
    all:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/binary/framework::dotnet-assembly
    any:
      - id: dotnet-xaml-generated-namespace
      - id: dotnet-wpf-component-connector
      - id: dotnet-wpf-component-resource-path
      - id: micro-behaviors/data/embedded/payload::wpf-resource-stream-access
      - id: many-strings-dotnet-profile
    needs: 3
  - id: dotnet-costura-bundle-profile
    desc: Costura dependency bundle packed into .text
    crit: component
    conf: 0.85
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/package/versioning::pe-version-resource
      - id: micro-behaviors/data/embedded/payload::dotnet-getmanifestresourcestream
      - id: dotnet-costura-assembly-loader
      - id: dotnet-costura-compressed-resource
  - id: dotnet-benign-packed-text-profile
    desc: Benign .NET packed text profile
    crit: component
    conf: 0.8
    any:
      - id: dotnet-versioned-resource-library
      - id: dotnet-costura-bundle-profile
      - id: dotnet-wpf-ui-bundle-profile
  - id: dotnet-encrypted-text-section
    desc: .NET assembly with encrypted .text section
    crit: suspicious
    conf: 0.9
    attack: "T1027.002"
    all:
      - id: dotnet-high-entropy-text-raw
      - id: metadata/binary/framework::dotnet-assembly
    unless:
      - id: dotnet-benign-packed-text-profile
    downgrade:
      all:
        - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
        - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
      any:
        - id: dotnet-benign-packed-text-profile
  - id: dotnet-large-packed-text
    desc: .NET assembly with giant packed .text
    crit: suspicious
    conf: 0.9
    attack: "T1027.002"
    all:
      - id: dotnet-large-near-high-entropy-text-raw
      - id: metadata/binary/framework::dotnet-assembly
    unless:
      - id: objectives/anti-static/pack/entropy::magick-net-core-ref
      - id: dotnet-benign-packed-text-profile
    downgrade:
      any:
        - id: metadata/signed/developer
        - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
