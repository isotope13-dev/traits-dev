# High entropy in PE resource section (.rsrc)
# Indicates encrypted or compressed payload stored in resources.
# Normal .rsrc contains icons, dialogs, version info - entropy typically 3-5.
# Entropy > 7.0 strongly suggests encrypted payload or packed data.
defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: mun-or-cpl-basename
    desc: MUN or CPL basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)\.(mun|cpl)$'

  - id: high-entropy-rsrc
    desc: High entropy PE resource section
    crit: suspicious
    conf: 0.85
    attack: T1027.002
    size_min: 98304
    if:
      type: section
      substr: ".rsrc"
      entropy_min: 7.2
      length_min: 131072
      length_max: 8388608
    unless:
      - id: metadata/signed/
      - id: metadata/binary/installer/
      - id: metadata/binary/resource/
      - id: micro-behaviors/fs/temp/pyinstaller/
      - id: metadata/binary/layout/
      - id: well-known/app/drivers/
      - id: mun-or-cpl-basename

composite_rules:
  - id: privileged-high-entropy-pe
    desc: Packed elevated PE with token and control APIs
    crit: suspicious
    conf: 0.96
    attack: T1027,T1548.002
    all:
      - id: metadata/binary/metrics/structural::high-code-entropy
      - id: metadata/binary/layout::overlay-dominates-third
      - id: metadata/build/manifest::pe-requires-admin
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges-any
      - id: metadata/binary/section/names::blank-section-name-cluster
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state
      - id: micro-behaviors/os/service/remote::net-user-enum-source
      - id: micro-behaviors/communications/socket/init::socket-api-ordinal
      - id: micro-behaviors/os/network/connections::set-tcp-entry
    needs: 2
