# High entropy in PE resource section (.rsrc)
# Indicates encrypted or compressed payload stored in resources.
# Normal .rsrc contains icons, dialogs, version info - entropy typically 3-5.
# Entropy > 7.0 strongly suggests encrypted payload or packed data.
defaults:
  for: [pe]
  platforms: [windows]

traits:
  - id: mun-or-cpl-basename
    desc: MUN or CPL basename
    crit: notable
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)\.(mun|cpl)$'

  - id: high-entropy-rsrc
    desc: High entropy PE resource section
    crit: suspicious
    conf: 0.85
    attack: T1027.002
    size_min: 98304
    if:
      type: section
      substr: ".rsrc"
      entropy_min: 7.2
      length_min: 131072
      length_max: 8388608
    unless:
      - id: objectives/anti-static/pack/entropy/

composite_rules:
  - id: high-entropy-rsrc-known-benign
    desc: Known benign high-entropy resource context
    crit: notable
    conf: 0.95
    any:
      - id: metadata/signed/developer::bitdefender-srl
      - id: metadata/signed/developer::yandex-llc
      - id: objectives/anti-static/pack/entropy::mun-or-cpl-basename
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-largest-section-import-rich
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/binary/installer/sfx::iexpress
      - id: metadata/binary/resource::png-and-manifest-rsrc
      - id: metadata/binary/resource::png-resource-marker
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/developer::martin-tofall
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: metadata/binary/layout::import-rich-versioned-pe
      - id: well-known/app/drivers/
