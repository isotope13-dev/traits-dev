# High entropy in PE resource section (.rsrc)
# Indicates encrypted or compressed payload stored in resources.
# Normal .rsrc contains icons, dialogs, version info - entropy typically 3-5.
# Entropy > 7.0 strongly suggests encrypted payload or packed data.
defaults:
  for: [pe, dll]
  platforms: [windows]

traits:
  - id: high-entropy-rsrc
    desc: High entropy PE resource section
    crit: suspicious
    conf: 0.85
    attack: T1027.002
    size_min: 98304
    if:
      type: section
      substr: ".rsrc"
      entropy_min: 7.2
      length_min: 8192
      length_max: 8388608
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/sfx::iexpress
      - id: metadata/signed/platform::microsoft
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
    downgrade:
      any:
        - id: metadata/signed/developer::jetbrains-s.r.o.
        - id: metadata/binary/installer::known-benign-installer
