defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: appended-zip-trailer
    desc: ZIP central directory at file end
    crit: notable
    conf: 0.85
    attack: T1027.009
    if:
      type: hex
      pattern: 50 4B 05 06
      offset_range:
        - -1024
        - null
    unless:
      - type: raw
        regex: __main__\.py(PK)?
        offset_range:
          - -512
          - null
  - id: appended-shell-script
    desc: Shell shebang near file end
    crit: suspicious
    conf: 0.8
    size_min: 8193
    for:
      - elf
      - pe
      - macho
      - dll
      - dylib
    if:
      type: raw
      regex: '#!/(bin/|usr/bin/)(sh|shell|zsh)'
      offset_range:
        - -8192
        - null
  - id: appended-python-script
    desc: Python shebang near file end
    crit: suspicious
    conf: 0.8
    size_min: 4097
    if:
      type: raw
      regex: '#!/(usr/bin/|bin/)(python|python3)'
      offset_range:
        - -4096
        - null
  - id: appended-hex-blob
    desc: Hex-encoded data at file end
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: ^[0-9A-Fa-f]*[A-Fa-f][0-9A-Fa-f]{99,}$
      offset_range:
        - -4096
        - null
  - id: appended-elf-binary
    desc: ELF binary appended to file
    crit: suspicious
    conf: 0.9
    size_max: 1000000
    if:
      type: hex
      pattern: 7F 45 4C 46 (01|02) (01|02) 01
      offset_range:
        - 1
        - null
    unless:
      - type: metrics
        field: elf.e_type
        min: 4
        max: 4
      - type: metrics
        field: elf.e_type
        min: 1
        max: 1
      - type: metrics
        field: binary.overlay_size
        max: 4096
    downgrade:
      any:
        - type: metrics
          field: binary.string_count
          min: 50
  - id: appended-pe-binary
    desc: PE binary appended to file
    crit: suspicious
    conf: 0.9
    if:
      type: hex
      pattern: 4D 5A ?? ?? 50 45 00 00
      offset_range:
        - -65536
        - null
  - id: jar-polyglot-prefix
    desc: Data before JAR/ZIP header
    crit: component
    conf: 0.8
    if:
      type: hex
      pattern: 50 4B 03 04
      offset_range:
        - 64
        - null
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiled::go-runtime-marker
  - id: png-trailing-data
    desc: Data after PNG end chunk
    crit: notable
    conf: 0.75
    for:
      - png
    if:
      type: hex
      pattern: 49 45 4E 44 AE 42 60 82
      offset_range:
        - 0
        - -256
composite_rules:
  - id: image-embedded-exec-magic
    desc: Image carries executable header magic
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/data/embedded/payload::elf-magic-in-image-body
      - id: micro-behaviors/data/embedded/payload::pe-magic-in-image-body
  - id: png-trailing-embedded-exec
    desc: PNG trailing data with executable payload
    crit: suspicious
    conf: 0.95
    attack: T1027.009
    all:
      - id: png-trailing-data
      - id: image-embedded-exec-magic
  - id: pe-multi-embedded-payload-container
    desc: PE with many embedded PE headers
    crit: suspicious
    conf: 0.92
    attack: T1027.009
    all:
      - id: micro-behaviors/data/embedded/payload::pe-magic-embedded-multiple
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::large-overlay
      - id: objectives/anti-static/obfuscation/binary-metrics::has-overlay
      - id: metadata/binary/metrics::few-functions
  - id: jar-polyglot-host-indicator
    desc: JAR polyglot host indicators
    crit: suspicious
    conf: 0.85
    attack: T1027.009
    all:
      - id: jar-polyglot-prefix
      - id: appended-zip-trailer
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::has-overlay
    downgrade:
      any:
        - id: micro-behaviors/fs/temp/py2exe::py2exe-bundle
        - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
