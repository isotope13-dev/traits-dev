defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
traits:
  - id: appended-zip-trailer
    desc: ZIP central directory at file end
    crit: notable
    conf: 0.85
    attack: T1027.009
    if:
      type: hex
      pattern: 50 4B 05 06
      offset_range:
        - -1024
        - null
    unless:
      - type: raw
        regex: __main__\.py(PK)?
        offset_range:
          - -512
          - null
  - id: appended-shell-script
    desc: Shell shebang in file trailer
    crit: suspicious
    conf: 0.8
    size_min: 8193
    if:
      type: text
      regex: '#!/(bin/|usr/bin/)(sh|shell|zsh)'
      offset_range:
        - -1024
        - null
  - id: appended-python-script
    desc: Python shebang in file trailer
    crit: suspicious
    conf: 0.8
    size_min: 4097
    if:
      type: text
      regex: '#!/(usr/bin/|bin/)(python|python3)'
      offset_range:
        - -1024
        - null
  - id: upx-lzma-elf32-stub-name
    desc: UPX LZMA ELF32 stub name
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: LZMA_ELF00
  - id: upx-elfmainx-stub-name
    desc: UPX ELFMAINX stub name
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: ELFMAINX
  - id: upx-elfmainz-stub-name
    desc: UPX ELFMAINZ stub name
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: ELFMAINZ
  - id: appended-elf-binary
    desc: ELF64 little-endian binary appended to file
    crit: suspicious
    conf: 0.9
    size_max: 1000000
    if:
      type: hex
      pattern: 7F 45 4C 46 02 01 01
      offset_range:
        - 1
        - null
    unless:
      - id: metadata/binary/linking/runtime::ape-binary-marker
      - id: well-known/app/drivers::gsp-firmware-embedded-elf-path
      - id: objectives/anti-static/pack/detect::upx-marker
      - id: well-known/app/nnn::nnn-icons-static-basename
      # Go's parser test suites ship intentionally-crafted polyglot/appended-ELF
      # fixtures under go/src/**/testdata.
      - id: well-known/tool/development/go-toolchain::go-toolchain-source-path
      # An ELF core dump embeds the crashed program's own image inside a PT_LOAD
      # segment, so an ELF magic appears at a non-zero offset — that is the
      # nature of a core file, not an appended-binary polyglot.
      - type: value
        path: elf.type
        exact: core
      # An already-extracted embedded sub-object (UPX payload, eBPF object) is not
      # a polyglot/appended-ELF file. cleave's synthetic sub-object path carries
      # the `!!embedded` marker, available during evaluation.
      - type: path
        regex: '!!embedded'
      - type: metrics
        field: binary.overlay_size
        max: 4096
    downgrade:
      any:
        - type: metrics
          field: binary.string_count
          min: 50
  - id: appended-elf32-le-binary
    desc: ELF32 little-endian binary appended to file
    crit: suspicious
    conf: 0.9
    size_max: 1000000
    if:
      type: hex
      pattern: 7F 45 4C 46 01 01 01
      offset_range:
        - 1
        - null
    unless:
      - id: metadata/binary/linking/runtime::ape-binary-marker
      - id: well-known/app/drivers::gsp-firmware-embedded-elf-path
      # An already-extracted embedded sub-object (UPX payload, eBPF object) is not
      # a polyglot/appended-ELF file. cleave's synthetic sub-object path carries
      # the `!!embedded` marker, available during evaluation.
      - type: path
        regex: '!!embedded'
      - type: metrics
        field: binary.overlay_size
        max: 4096
      # UPX carries ELF32 decompression-stub templates compiled into the
      # packer itself (the loader code it injects into packed binaries).
      # These stub section names are UPX-internal and absent from a real
      # malicious carrier that merely appends a downloaded ELF32 payload.
      - id: objectives/anti-static/polyglot/format/
    downgrade:
      any:
        - type: metrics
          field: binary.string_count
          min: 50
  - id: appended-pe-binary
    desc: PE binary appended to file
    crit: suspicious
    conf: 0.9
    if:
      type: hex
      pattern: 4D 5A ?? ?? 50 45 00 00
      offset_range:
        - -65536
        - null
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - type: path
        regex: '(^|[\\/])e2e-tests[\\/]signing([\\/]|$)'
  - id: jar-polyglot-prefix
    desc: Data before JAR/ZIP header
    crit: component
    conf: 0.8
    if:
      type: hex
      pattern: 50 4B 03 04
      offset_range:
        - 64
        - null
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiled/
      - id: well-known/app/drivers/
      - id: well-known/app/drivers::ngx-dll-basename
      - id: metadata/binary/section/name::fwimage-section
composite_rules:
  - id: upx-elf32-stub-name
    desc: UPX ELF32 stub name
    crit: notable
    conf: 0.9
    any:
      - id: upx-lzma-elf32-stub-name
      - id: upx-elfmainx-stub-name
      - id: upx-elfmainz-stub-name

  - id: image-embedded-exec-magic
    desc: Image carries executable header magic
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/data/embedded/payload/image::elf-magic-in-image-body
      - id: micro-behaviors/data/embedded/payload/image::pe-magic-in-image-body
  - id: png-trailing-embedded-exec
    desc: PNG trailing data with executable payload
    crit: suspicious
    conf: 0.95
    attack: T1027.009
    all:
      - id: image-embedded-exec-magic
    any:
      - id: metadata/binary/anomaly/format::png-trailing-data
      - id: metadata/image/metrics::png-chunks-after-iend
  - id: pe-multi-embedded-payload-container
    desc: PE with many embedded PE headers
    crit: suspicious
    conf: 0.92
    attack: T1027.009
    all:
      - id: micro-behaviors/data/embedded/payload/header::pe-magic-embedded-multiple
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::large-overlay
      - id: metadata/binary/metrics/structural::few-functions
  - id: pe-image-metadata-polyglot
    desc: PE carrying image metadata polyglot
    crit: hostile
    conf: 0.96
    attack: T1027.009
    ref: sha256:b38ed78c2328a41c8a08e3b6d508edff3ca75b8101cb517b0891be47a14a48e3
    all:
      - id: micro-behaviors/data/embedded/media::photoshop-xmp-conversion-corpus
      - id: metadata/binary/metrics/structural::pe-section-overflow-present
    any:
      - id: metadata/binary/anomaly/format::pe-dos-stub-modified
      - id: metadata/binary/anomaly/format::pe-misaligned-section
  - id: jar-polyglot-host-indicator
    desc: JAR polyglot host indicators
    crit: suspicious
    conf: 0.85
    attack: T1027.009
    unless:
      - id: metadata/binary/linking/runtime::ape-binary-marker
      - id: metadata/binary/layout::jar-manifest-marker
      - id: micro-behaviors/fs/temp/py2exe::py2exe-pythondll
    all:
      - id: jar-polyglot-prefix
      - id: appended-zip-trailer
    any:
      - id: metadata/binary/layout::has-overlay
    downgrade:
      any:
        - id: micro-behaviors/fs/temp/py2exe::py2exe-bundle
        - id: micro-behaviors/fs/temp/pyinstaller/
