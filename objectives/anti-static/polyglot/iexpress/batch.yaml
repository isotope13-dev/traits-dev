defaults:
  platforms: [windows]
traits:
  - id: bat-iexpress-sed-polyglot
    desc: Batch and IExpress SED polyglot pattern
    crit: suspicious
    conf: 0.9
    for: [pe, batch]
    if:
      type: text
      regex: '(?i);iexpress\s+/n\s+/q\s+/m'
    downgrade:
      any:
        - id: well-known/tool/development/batch-scripts::batch-scripts-iexpress-example-path
        - id: well-known/tool/development/batch-scripts::batch-scripts-iexpress-example-name
