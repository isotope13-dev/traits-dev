defaults:
  platforms: [unix, windows, macos]
  for: [pe, elf, macho, python, javascript, shell]
traits:
  - id: xor-key
    desc: XOR key variable reference
    crit: notable
    conf: 0.5
    if:
      type: string_value
      substr: xor_key
  - id: xor-encrypt
    desc: XOR encrypt function reference
    crit: notable
    conf: 0.5
    if:
      type: string_value
      substr: xor_encrypt
  - id: xor-loop-dup
    desc: XOR operation with hex byte
    crit: notable
    conf: 0.7
    size_max: 10485760
    if:
      type: string_value
      regex: \^\s*0x[0-9a-fA-F]{2}
    not:
      - regex: '\^\s*0x7F'
composite_rules:
  - id: encode
    desc: XOR encoding patterns
    crit: notable
    conf: 0.66
    mbc: B0032
    attack: T1027
    any:
      - id: xor-key
      - id: xor-encrypt
      - id: objectives/anti-static/obfuscation/encoding/xor::xor-decode-symbol
      - id: objectives/anti-static/xor/encode::xor-loop-dup
