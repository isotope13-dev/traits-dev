# Polymorphic Decryption Loop Detection
# Detects small decryption loops with XOR operations common in polymorphic malware
# Classic pattern: small loop with XOR instruction followed by unconditional jump
# ATT&CK: T1027.002 (Obfuscated Files or Information: Software Packing)
# ATT&CK: T1140 (Deobfuscate/Decode Files or Information)
defaults:
  platforms: [unix, windows, macos]
  attack: "T1027.002"
  mbc: "F0001"
  for: [pe, elf, macho]
traits:
  # === XOR-based Decryption Patterns (x86/x64) ===

  # XOR with register, increment, loop pattern
  # Pattern: XOR [reg+offset], key ; INC reg ; LOOP
  # Common: 80 ?? XX 33 ?? E2 (xor byte [reg], key; inc; loop)
  - id: xor-inc-loop-x86
    desc: XOR decryption loop (x86)
    crit: suspicious
    conf: 0.85
    count_min: 4 # Require multiple matches to avoid coincidental patterns in large binaries
    per_kb_min: 0.05 # Require density to distinguish stubs from scattered matches
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "30 ?? 4? E2" # xor [reg], al; inc; loop
  # XOR with immediate, increment, conditional jump back
  # 80 3? XX EB (xor byte [reg], imm8; ... jmp short) - mod=00, reg=6 (XOR)
  # Requires count_min to reduce FP from coincidental byte patterns
  - id: xor-jmp-short-loop
    desc: XOR with short jump loop
    crit: suspicious
    conf: 0.8
    count_min: 4
    per_kb_min: 0.05
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "80 3? ?? EB ??"
  # Dense XOR instructions in small code region (polymorphic stub)
  - id: dense-xor-operations
    desc: Dense XOR operations in code
    crit: suspicious
    conf: 0.85
    count_min: 10
    per_kb_min: 15.0 # 15+ XORs per KB
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "30|31|32|33" # XOR opcodes
  # Single-byte XOR key pattern (common in simple packers)
  # XOR [ESI], AL ; INC ESI ; LOOP (33 06 46 E2 FC)
  - id: single-byte-xor-key
    desc: Single-byte XOR decryption stub
    crit: suspicious
    conf: 0.9
    count_min: 3
    per_kb_min: 0.02
    if:
      type: hex
      section: text
      pattern: "33 06 46 E2"
  # ARM64: EOR (XOR) with loop - dense EOR register operations
  # ARM64 EOR encoding: 4A??????/CA?????? (32/64-bit register EOR)
  - id: eor-loop-arm
    # === ARM Decryption Patterns ===

    desc: EOR decryption loop (ARM64)
    crit: suspicious
    conf: 0.85
    platforms: [unix]
    for: [elf]
    per_kb_min: 10.0
    count_min: 20
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "4A|CA" # ARM64 EOR register instruction opcodes
  # Small code section with high entropy (encrypted payload)
  - id: small-encrypted-section
    # === Decryption Loop Indicators ===

    desc: Small high-entropy section (encrypted stub)
    crit: notable
    conf: 0.75
    entropy_min: 6.5
    if:
      type: section
      executable: true
      length_max: 2048 # Small stub (≤2KB)
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  # Entry point in unusual section (common with packers)
  - id: unusual-entry-point-section
    desc: Entry point in non-standard section
    crit: component
    conf: 0.8
    for: [pe, elf]
    if:
      type: section
      regex: '^(?!\.text$|__text$).+'
      executable: true
      entropy_min: 6.5
      length_max: 65536
composite_rules:
  - id: packed-stub-indicators
    desc: Packed stub structural indicators
    crit: component
    conf: 0.8
    any:
      - id: small-encrypted-section
      - id: unusual-entry-point-section
  # Classic polymorphic decryptor
  - id: polymorphic-decryptor
    desc: Polymorphic decryption stub
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: xor-inc-loop-x86
      - id: xor-jmp-short-loop
      - id: single-byte-xor-key
      - id: eor-loop-arm
      - id: dense-xor-operations
  # Packed executable with decryption
  # Requires actual decryption stub evidence, not just entropy
  - id: packed-with-decryption
    desc: Packed executable with runtime decryption
    crit: hostile
    conf: 0.98
    all:
      - id: packed-stub-indicators
      - id: polymorphic-decryptor
  # Simple XOR packer
  - id: xor-packer
    desc: Simple XOR-based packer
    crit: hostile
    conf: 0.92
    needs: 2
    any:
      - id: xor-inc-loop-x86
      - id: single-byte-xor-key
      - id: xor-jmp-short-loop
      - id: dense-xor-operations
