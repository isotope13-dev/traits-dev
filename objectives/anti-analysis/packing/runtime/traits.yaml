# Packing and Unpacking Objectives
defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: unpacking-api-pattern
    desc: "Unpacking API pattern (Alloc + Protect)"
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
      - id: objectives/anti-static/obfuscation/binary-metrics::high-overall-entropy
      - id: metadata/format/pe::large-rsrc-section
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rdata
        - id: metadata/signed/platform::microsoft
        - id: metadata/format/installer::nsis-error-title
        - type: string
          substr: "Inno Setup Setup Data ("
