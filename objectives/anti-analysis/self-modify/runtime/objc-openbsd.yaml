defaults:
  platforms: [openbsd, bsd, unix]
  for: [objc, elf]
  attack: T1027.007

traits:
  - id: objc-rwx-mprotect
    desc: ObjC mprotect RWX change
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: PROT_READ | PROT_WRITE | PROT_EXEC

  - id: objc-code-page-patch
    desc: ObjC code page patch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: mprotect[\s\S]{0,360}memcpy\(targetAddr

composite_rules:
  - id: objc-openbsd-runtime-code-patch
    desc: ObjC runtime code patch
    crit: hostile
    conf: 0.98
    all:
      - id: objc-rwx-mprotect
      - id: objc-code-page-patch
