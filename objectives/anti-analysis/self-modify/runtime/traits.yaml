defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: prot-write
    desc: PROT_WRITE memory protection constant
    crit: notable
    conf: 0.6
    if:
      type: string_value
      word: PROT_WRITE
    downgrade:
      any:
        - type: metrics
          field: binary.string_density
          min: 50
  - id: proc-self-mem
    desc: /proc/self/mem access for self-modification
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: /proc/self/mem
  - id: self-patch-ref
    desc: Self-patch terminology
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: self-patch
      case_insensitive: true
  - id: codecave-ref
    desc: Code cave terminology
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: \bcodecave\b|code cave
      case_insensitive: true
  - id: slack-space-ref
    desc: Slack space terminology
    crit: suspicious
    conf: 0.75
    if:
      type: string_value
      substr: slack space
      case_insensitive: true
  - id: nop-sled
    desc: Long NOP sled byte sequence
    crit: notable
    conf: 0.7
    if:
      type: hex
      section: .text
      pattern: 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90
    unless:
      - id: metadata/compiler::go-binary
    downgrade:
      any:
        - id: metadata/lang/compiler::vcruntime
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/format::many-imports
  - id: inline-hook-ref
    desc: Inline hook terminology
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      substr: inline hook
      case_insensitive: true
  - id: trampoline-ref
    desc: Trampoline hook terminology
    crit: notable
    conf: 0.3
    count_min: 3
    if:
      type: string_value
      substr: trampoline
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: import-descriptor
    desc: PE IMAGE_IMPORT_DESCRIPTOR structure
    crit: component
    conf: 0.5
    if:
      type: string_value
      substr: IMAGE_IMPORT_DESCRIPTOR
  - id: import-address-table
    desc: Import Address Table reference
    crit: notable
    conf: 0.5
    if:
      type: string_value
      substr: ImportAddressTable
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - type: metrics
          field: binary.function_count
          min: 1000
  - id: iat-ref
    desc: IAT abbreviation reference
    crit: baseline
    conf: 0.4
    if:
      type: string_value
      word: IAT
    downgrade:
      any:
        - id: well-known/tools/reverse-engineering::ollydbg-plugin-export
        - id: well-known/tools/reverse-engineering::lordpe-tool
  - id: got-ref
    desc: GOT abbreviation reference
    crit: notable
    conf: 0.4
    for:
      - elf
      - macho
      - shell
      - python
      - javascript
      - powershell
    if:
      type: string_value
      word: GOT
  - id: polymorphic-ref
    desc: Polymorphic code terminology
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: polymorphic
      case_insensitive: true
    unless:
      - type: string_value
        substr: ipa-polymorphic-call.c
      - type: string_value
        substr: ipa_polymorphic_call_context
      - type: string_value
        substr: possible_polymorphic_call_targets
      - type: string_value
        substr: compatible_polymorphic_types_p
  - id: metamorphic-ref
    desc: Metamorphic code terminology
    crit: notable
    conf: 0.8
    if:
      type: string_value
      word: metamorphic
      case_insensitive: true
  - id: self-modifying-ref
    desc: Self-modifying code terms
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      substr: self-modifying
      case_insensitive: true
    downgrade:
      any:
        - id: well-known/tools/reverse-engineering::ollydbg-executable-marker
  - id: xor-loop-pattern
    desc: XOR decryption loop byte pattern
    crit: component
    conf: 0.4
    if:
      type: hex
      section: text
      pattern: 30 ?? 4? 83 ?? ?? 7?
    unless:
      - id: metadata/format/pe::dotnet-assembly
      - id: metadata/signed/platform::microsoft
    downgrade:
      any:
        - id: metadata/format::no-functions
        - id: metadata/lang/compiler::vcruntime
  - id: xor-modulo-key-loop-x64
    desc: XOR loop with modulo key index
    crit: suspicious
    conf: 0.75
    platforms:
      - windows
    for:
      - python
      - javascript
      - powershell
      - pe
    if:
      type: hex
      section: .text
      pattern: 31 C9 89 CA 48 F7 74 24 ?? 48 8B 04 24 44 0F B6 04 10 48 8B 44 24 ?? 48 8B 4C 24 ?? 0F B6 14 08 44 31 C2 88 14 08
composite_rules:
  - id: page-rwx-literal
    desc: PAGE_EXECUTE_READWRITE constant literal
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite
      - id: prot-write
  - id: mprotect
    desc: Memory protection modification
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/mem/protect/modify::mprotect-symbol
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
      - id: prot-write
      - id: micro-behaviors/mem/alloc/executable::prot-exec-const
      - id: page-rwx-literal
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::x11-dga-marker
        - id: micro-behaviors/dylib/library::graphics-lib-marker
        - id: micro-behaviors/dylib/library::system-lib-marker
  - id: self-overwrite
    desc: Self-overwriting code patterns
    crit: suspicious
    conf: 0.8
    any:
      - id: proc-self-mem
      - id: objectives/evasion/process/injection/runtime::write-process-memory-dup
      - id: self-patch-ref
    downgrade:
      any:
        - id: metadata/vendor/valve::valve-corp-binary
  - id: code-cave
    desc: Code cave or slack space
    crit: suspicious
    conf: 0.75
    needs: 2
    any:
      - id: codecave-ref
      - id: slack-space-ref
      - id: nop-sled
    downgrade:
      any:
        - id: metadata/vendor/valve::valve-corp-binary
  - id: hook-install
    desc: Dynamic interposition hook patterns
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/hardware/input/keyboard::set-windows-hook
      - id: inline-hook-ref
      - id: micro-behaviors/data/text/keywords::detour
    downgrade:
      any:
        - id: metadata/vendor/valve::valve-corp-binary
  - id: iat-hook
    desc: Import Address Table hooking
    crit: notable
    conf: 0.7
    needs: 2
    any:
      - id: import-descriptor
      - id: import-address-table
      - id: iat-ref
      - id: metadata/lang/security::got-plt-section
      - id: got-ref
    downgrade:
      any:
        - id: micro-behaviors/fs/file/section::pe-viewer-header-labels
  - id: polymorphic
    desc: Polymorphic or metamorphic code indicators
    crit: suspicious
    conf: 0.75
    needs: 2
    any:
      - id: polymorphic-ref
      - id: metamorphic-ref
      - id: self-modifying-ref
      - id: xor-loop-pattern
      - id: xor-modulo-key-loop-x64
    downgrade:
      any:
        - type: string_value
          substr: JsonPolymorphicAttribute
        - type: string_value
          substr: PolymorphicTypeResolver
        - type: string_value
          substr: System.Text.Json
        - id: well-known/tools/reverse-engineering::ollydbg-executable-marker
        - id: metadata/library/structure::js-webpack-bundle
  - id: active
    desc: Active self-modification behavior
    crit: notable
    conf: 0.9
    all:
      - id: mprotect
    any:
      - id: self-overwrite
      - id: self-modifying-ref
      - id: code-cave
      - id: xor-loop-pattern
    downgrade:
      any:
        - id: metadata/format/pe::dotnet-assembly
        - id: metadata/signed/platform::microsoft
        - id: metadata/format::many-imports
        - id: well-known/tools/reverse-engineering::human-oep-finder
        - id: well-known/tools/reverse-engineering::get-oep-export
  - id: setwindowshook
    desc: Windows SetWindowsHookEx API reference
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/hardware/input/keyboard::set-windows-hook
      - id: micro-behaviors/data/text/keywords::detour
