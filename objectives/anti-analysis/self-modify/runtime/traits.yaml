defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [elf, pe, shell, python, javascript]
traits:
- id: prot-write
  desc: PROT_WRITE memory protection constant
  crit: notable
  conf: 0.6
  if:
    type: text
    word: PROT_WRITE
  unless:
  - id: well-known/tool/detection/malware-config-parser
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/library/structure::js-emscripten-preamble-marker
  - id: metadata/package/tooling::autoconf-generated-script
  downgrade:
    any:
    - id: objectives/anti-static/pack/detect::upx-packer-string
    - type: metrics
      field: binary.string_density
      min: 50
- id: self-patch-ref
  desc: Self-patch terminology
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: self-patch
    case_insensitive: true
- id: codecave-ref
  desc: Code cave terminology
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: \bcodecave\b|code cave
    case_insensitive: true
- id: slack-space-ref
  desc: Slack space terminology
  crit: component
  conf: 0.75
  if:
    type: text
    substr: slack space
    case_insensitive: true
- id: nop-sled
  desc: Long NOP sled byte sequence
  crit: notable
  conf: 0.7
  for: [elf, pe]
  if:
    type: hex
    section: .text
    pattern: 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiler/systems::rust-binary
  - id: well-known/app/drivers::nvidia-linux-driver-component
  - id: well-known/app/drivers::ngx-dll-basename
  downgrade:
    any:
    - id: metadata/lang/compiler/native::vcruntime
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/metrics/structural::many-imports
- id: inline-hook-ref
  desc: Inline hook terminology
  crit: suspicious
  conf: 0.8
  for: [elf, pe, macho, shell, python]
  if:
    type: text
    substr: inline hook
    case_insensitive: true
- id: trampoline-ref
  desc: Trampoline hook terminology
  crit: notable
  conf: 0.3
  count_min: 3
  for: [elf, pe, macho, python]
  if:
    type: text
    substr: trampoline
    case_insensitive: true
  downgrade:
    any:
    - id: metadata/signed/platform::apple
    - id: metadata/signed/platform::microsoft
  unless:
  - id: well-known/tool/reverse-engineering/windows-debugger::gdbserver-debugger-server
  - id: metadata/binary/section/content::freebsd-kernel-image
  - id: metadata/library/python-runtime::python-runtime
  - id: metadata/lang/compiler/systems::go-runtime-context
  - id: well-known/app/drivers::nvidia-linux-driver-component
- id: import-descriptor
  desc: PE IMAGE_IMPORT_DESCRIPTOR structure
  crit: component
  conf: 0.5
  if:
    type: text
    substr: IMAGE_IMPORT_DESCRIPTOR
- id: import-address-table
  desc: Import Address Table reference
  crit: component
  conf: 0.5
  if:
    type: text
    word: ImportAddressTable
  unless:
  - id: metadata/binary/framework::dotnet-assembly
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
    - type: metrics
      field: binary.func_count
      min: 1000
- id: iat-ref
  desc: IAT abbreviation reference
  crit: baseline
  conf: 0.4
  if:
    type: text
    word: IAT
  downgrade:
    any:
    - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
    - id: well-known/tool/reverse-engineering/lordpe::lordpe-tool
- id: got-ref
  desc: GOT abbreviation reference
  crit: component
  conf: 0.4
  for:
  - elf
  - macho
  if:
    type: text
    word: GOT
  unless:
  - id: well-known/app/drivers::nvidia-linux-driver-component
  - type: trait
    id: metadata/file/extension::linux-kernel-package-artifact-basename
# Require malware-code context, not the bare word "polymorphic" — which is
# pervasive in OOP, compilers (GCC devirtualization: "polymorphic call/types"),
# .NET JSON polymorphism, and genomics ("polymorphic position/allele/site").
# The previous bare `word: polymorphic` needed a 7-entry unless: list to cover
# those; requiring "polymorphic <code-noun>" removes the whole FP class. Split
# across atoms so each regex stays within the alternation limit.
- id: polymorphic-code-engine
  desc: Polymorphic code/engine terminology
  crit: component
  conf: 0.5
  if:
    type: text
    case_insensitive: true
    regex: 'polymorphic[\s_-]*(code|engine|generator)'
- id: polymorphic-payload-stage
  desc: Polymorphic decryptor/stub/loader terminology
  crit: component
  conf: 0.5
  if:
    type: text
    case_insensitive: true
    regex: 'polymorphic[\s_-]*(decrypt|stub|loader)'
- id: polymorphic-malware-class
  desc: Polymorphic virus/malware/shellcode terminology
  crit: component
  conf: 0.5
  if:
    type: text
    case_insensitive: true
    regex: 'polymorphic[\s_-]*(virus|malware|shellcode)'
- id: polymorphic-payload-mutate
  desc: 'polymorphic payload mutate'
  crit: component
  conf: 0.5
  if:
    type: text
    case_insensitive: true
    regex: 'polymorphic[\s_-]*(payload|mutat|obfuscat)'
- id: json-polymorphism-runtime-ref
  desc: JSON polymorphism runtime marker
  crit: component
  if:
    type: text
    regex: JsonPolymorphicAttribute|PolymorphicTypeResolver|System\.Text\.Json
- id: metamorphic-ref
  desc: Metamorphic code terminology
  crit: notable
  conf: 0.8
  count_min: 2
  if:
    type: text
    word: metamorphic
    case_insensitive: true
- id: self-modifying-ref
  desc: Self-modifying code terms
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: self-modifying
    case_insensitive: true
  unless:
  - id: well-known/tool/reverse-engineering/ollydbg::ollydbg-executable-marker
  downgrade:
    any:
    - id: metadata/signed/developer::vector-35-inc
- id: xor-loop-pattern
  desc: XOR decryption loop byte pattern
  crit: component
  conf: 0.4
  for: [elf, pe]
  if:
    type: hex
    section: text
    pattern: 30 ?? 4? 83 ?? ?? 7?
  unless:
  - id: xor-loop-pattern-benign-context
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::no-functions
    - id: metadata/lang/compiler/native::vcruntime
- id: xor-modulo-key-loop-x64
  desc: XOR loop with modulo key index
  crit: suspicious
  conf: 0.75
  for:
  - pe
  - elf
  if:
    type: hex
    section: .text
    pattern: 31 C9 89 CA 48 F7 74 24 ?? 48 8B 04 24 44 0F B6 04 10 48 8B 44 24 ?? 48 8B 4C 24 ?? 0F B6 14 08 44 31 C2 88 14 08
- id: elf-manual-loader-cond-0--inline-10757
  desc: Regex component marker
  crit: component
  conf: 0.85
  platforms: [linux, macos]
  for: [elf]
  if:
    type: metrics
    field: imports.count
    min: 200
  unless:
  - id: well-known/app/drivers::nvidia-linux-driver-component
  - type: trait
    id: metadata/file/extension::linux-kernel-package-artifact-basename
  count_max: 1010758
composite_rules:
- id: xor-loop-pattern-benign-context
  desc: Benign XOR-loop byte-pattern context
  crit: component
  conf: 0.9
  any:
  - id: metadata/binary/framework::dotnet-assembly
  - id: metadata/signed/platform::microsoft
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: well-known/app/drivers::nvidia-linux-driver-component
  - id: well-known/app/drivers::ngx-dll-basename
  - type: trait
    id: metadata/file/extension::linux-kernel-package-artifact-basename
- id: polymorphic-ref
  desc: Polymorphic code terminology
  crit: notable
  conf: 0.5
  any:
    - id: polymorphic-code-engine
    - id: polymorphic-payload-stage
    - id: polymorphic-malware-class
    - id: polymorphic-payload-mutate
- id: page-rwx-literal
  desc: PAGE_EXECUTE_READWRITE constant literal
  crit: component
  conf: 0.8
  any:
  - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite
  - id: prot-write
- id: mprotect
  desc: Memory protection modification
  crit: notable
  conf: 0.85
  any:
  - id: micro-behaviors/mem/protect/modify::mprotect-import
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
  - id: prot-write
  - id: micro-behaviors/mem/alloc/executable::prot-exec-const
  - id: page-rwx-literal
  downgrade:
    any:
    - id: micro-behaviors/dylib/library/family::x11-dga-marker
    - id: micro-behaviors/dylib/library/family::graphics-lib-marker
    - id: micro-behaviors/dylib/library/family::system-lib-marker
  unless:
  - id: metadata/library/python-runtime::python-runtime

  # ELF with mmap + mprotect + dladdr: map memory, flip protections, then use
  # dladdr to resolve runtime addresses. This is a "manual loader" pattern —
  # the binary unpacks or injects code at runtime without the dynamic linker.
  # Legitimate use: graphics drivers, JIT engines (JVM, V8/Node.js, LLVM JIT).
  # JIT runtimes use dladdr for stack-trace symbol resolution and have hundreds
  # of imports; downgrade when import_count > 200 to avoid false positives on
  # them while preserving detection of implants (typically < 200 imports).
- id: elf-manual-loader
  desc: ELF mmap+mprotect+dladdr manual loader profile
  crit: suspicious
  conf: 0.85
  platforms: [linux, macos]
  for: [elf]
  attack: T1055.004
  all:
  - id: micro-behaviors/mem/protect/modify::mprotect-import
  - id: micro-behaviors/mem/alloc/executable::mmap-symbol
  - id: micro-behaviors/dylib/lookup::dladdr-import
  unless:
  - id: micro-behaviors/dylib/library/family::graphics-lib-marker
  - id: micro-behaviors/dylib/library/family::system-lib-marker
  - id: metadata/lang/compiler/systems::go-binary
  - id: well-known/lib/android-renderscript
  downgrade:
    any:
    - id: elf-manual-loader-cond-0--inline-10757
- id: self-overwrite
  desc: Self-overwriting code patterns
  crit: suspicious
  conf: 0.8
  needs: 2
  any:
  - id: micro-behaviors/fs/proc/info/memory::proc-self-mem-path
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: self-patch-ref
  downgrade:
    any:
    - id: well-known/game/steam::valve-corp-binary
- id: code-cave
  desc: Code cave or slack space
  crit: suspicious
  conf: 0.75
  needs: 2
  any:
  - id: codecave-ref
  - id: slack-space-ref
  - id: nop-sled
  downgrade:
    any:
    - id: well-known/game/steam::valve-corp-binary
- id: hook-install
  desc: Dynamic interposition hook patterns
  crit: notable
  conf: 0.7
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
  - id: inline-hook-ref
  - id: micro-behaviors/data/text/keywords/hook::detour
  downgrade:
    any:
    - id: well-known/game/steam::valve-corp-binary
- id: iat-hook
  desc: Import Address Table hooking
  crit: suspicious
  conf: 0.7
  platforms: [windows]
  for: [pe]
  needs: 2
  any:
  - id: import-descriptor
  - id: import-address-table
  - id: iat-ref
  downgrade:
    any:
    - id: micro-behaviors/fs/file/section::pe-viewer-header-labels
- id: got-hook
  desc: Global Offset Table hooking
  crit: suspicious
  conf: 0.72
  platforms: [linux, macos]
  for: [elf, macho]
  all:
  - id: got-ref
  any:
  - id: inline-hook-ref
  - id: micro-behaviors/data/text/keywords/hook::detour
- id: polymorphic
  desc: Polymorphic or metamorphic code indicators
  crit: suspicious
  conf: 0.75
  needs: 2
  any:
  - id: polymorphic-ref
  - id: metamorphic-ref
  - id: self-modifying-ref
  - id: xor-loop-pattern
  - id: xor-modulo-key-loop-x64
  downgrade:
    any:
    - id: json-polymorphism-runtime-ref
    - id: well-known/tool/reverse-engineering/ollydbg::ollydbg-executable-marker
    - id: metadata/library/structure::js-webpack-bundle
    - id: metadata/signed/developer::vector-35-inc
    - id: metadata/binary/metrics/size::massive-executable
- id: active
  desc: Active self-modification behavior
  crit: notable
  conf: 0.9
  all:
  - id: objectives/anti-analysis/self-modify/runtime::mprotect
  any:
  - id: objectives/anti-analysis/self-modify/runtime::self-overwrite
  - id: self-modifying-ref
  - id: objectives/anti-analysis/self-modify/runtime::code-cave
  - id: xor-loop-pattern
  downgrade:
    any:
    - id: metadata/binary/framework::dotnet-assembly
    - id: metadata/binary/metrics/structural::many-imports
  unless:
  - id: well-known/tool/sysadmin/logapi::logapi-pipe-marker
  - id: metadata/binary/metrics/threshold::many-exports-200
  - id: well-known/app/drivers::nvidia-linux-driver-component
  - id: well-known/app/drivers::ngx-dll-basename
- id: setwindowshook
  desc: Windows SetWindowsHookEx API reference
  crit: notable
  conf: 0.7
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
  - id: micro-behaviors/data/text/keywords/hook::detour
