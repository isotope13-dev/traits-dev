defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [elf, pe, shell, python, javascript]
traits:
- id: self-patch-ref
  desc: Self-patch terminology
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: self-patch
    case_insensitive: true
- id: codecave-ref
  desc: Code cave terminology
  crit: notable
  conf: 0.5
  if:
    type: text
    regex: \bcodecave\b|code cave
    case_insensitive: true
- id: slack-space-ref
  desc: Slack space terminology
  crit: component
  conf: 0.75
  if:
    type: text
    substr: slack space
    case_insensitive: true
- id: nop-sled
  desc: Long NOP sled byte sequence
  crit: notable
  conf: 0.7
  for: [elf, pe]
  if:
    type: hex
    section: .text
    pattern: 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90 90
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: well-known/app/drivers/
  - id: well-known/app/drivers::ngx-dll-basename
  downgrade:
    any:
    - id: metadata/lang/compiler/native::vcruntime
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/metrics/structural::many-imports
- id: inline-hook-ref
  desc: Inline hook terminology
  crit: notable
  conf: 0.7
  for: [elf, pe, macho, shell, python]
  if:
    type: text
    substr: inline hook
    case_insensitive: true
  unless:
    - id: well-known/tool/reverse-engineering/frida/
- id: trampoline-ref
  desc: Trampoline hook terminology
  crit: notable
  conf: 0.65
  for: [elf, pe, macho, python]
  if:
    type: text
    regex: '\btrampoline\s+hook\b'
    case_insensitive: true
  unless:
  - id: well-known/tool/reverse-engineering/windows-debugger/
  - id: metadata/library/qt/
- id: trampoline-patch-ref
  desc: Trampoline patch terminology
  crit: notable
  conf: 0.65
  for: [elf, pe, macho, python]
  if:
    type: text
    regex: '\btrampoline\s+patch\b'
    case_insensitive: true
  unless:
  - id: well-known/tool/reverse-engineering/windows-debugger/
  - id: metadata/library/qt/
- id: trampoline-stub-ref
  desc: Trampoline stub terminology
  crit: notable
  conf: 0.65
  for: [elf, pe, macho, python]
  if:
    type: text
    regex: '\btrampoline\s+stub\b'
    case_insensitive: true
  unless:
  - id: well-known/tool/reverse-engineering/windows-debugger/
  - id: metadata/library/qt/
- id: hook-trampoline-ref
  desc: Hook trampoline terminology
  crit: notable
  conf: 0.65
  for: [elf, pe, macho, python]
  if:
    type: text
    regex: '\bhook\s+trampoline\b'
    case_insensitive: true
  unless:
  - id: well-known/tool/reverse-engineering/windows-debugger/
  - id: metadata/library/qt/
- id: import-descriptor
  desc: PE IMAGE_IMPORT_DESCRIPTOR structure
  crit: component
  conf: 0.5
  if:
    type: text
    substr: IMAGE_IMPORT_DESCRIPTOR
- id: import-address-table
  desc: Import Address Table reference
  crit: component
  conf: 0.5
  if:
    type: text
    word: ImportAddressTable
  unless:
  - id: metadata/binary/framework/
  - id: metadata/signed/platform/
  - id: metadata/lang/compiler/systems/
  - id: well-known/app/drivers/
  - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
    - type: metrics
      field: binary.func_count
      min: 1000
- id: iat-ref
  desc: IAT abbreviation reference
  crit: baseline
  conf: 0.4
  if:
    type: text
    word: IAT
  downgrade:
    any:
    - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
    - id: well-known/tool/reverse-engineering/lordpe/
- id: got-ref
  desc: GOT abbreviation reference
  crit: component
  conf: 0.4
  for:
  - elf
  - macho
  if:
    type: text
    word: GOT
  unless:
  - id: well-known/app/drivers/
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
# Require malware-code context, not the bare word "polymorphic" — which is
# pervasive in OOP, compilers (GCC devirtualization: "polymorphic call/types"),
# .NET JSON polymorphism, and genomics ("polymorphic position/allele/site").
# The previous bare `word: polymorphic` needed a 7-entry unless: list to cover
# those; requiring "polymorphic <code-noun>" removes the whole FP class. Split
# across atoms so each regex stays within the alternation limit.
- id: polymorphic-code-engine
  desc: Polymorphic code/engine terminology
  crit: component
  conf: 0.5
  if:
    type: text
    case_insensitive: true
    regex: 'polymorphic[\s_-]*(code|engine|generator)'
- id: polymorphic-payload-stage
  desc: Polymorphic decryptor/stub/loader terminology
  crit: component
  conf: 0.5
  if:
    type: text
    case_insensitive: true
    regex: 'polymorphic[\s_-]*(decrypt|stub|loader)'
- id: polymorphic-malware-class
  desc: "Polymorphic virus/malware/shellcode terms"
  crit: component
  conf: 0.5
  if:
    type: text
    case_insensitive: true
    regex: 'polymorphic[\s_-]*(virus|malware|shellcode)'
- id: polymorphic-payload-mutate
  desc: 'polymorphic payload mutate'
  crit: component
  conf: 0.5
  if:
    type: text
    case_insensitive: true
    regex: 'polymorphic[\s_-]*(payload|mutat|obfuscat)'
- id: metamorphic-ref
  desc: Metamorphic code terminology
  crit: notable
  conf: 0.8
  count_min: 2
  if:
    type: text
    word: metamorphic
    case_insensitive: true
- id: self-modifying-ref
  desc: Self-modifying code terms
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: self-modifying
    case_insensitive: true
  unless:
  - id: well-known/tool/reverse-engineering/ollydbg::ollydbg-executable-marker
  downgrade:
    any:
    - id: metadata/signed/developer::vector-35-inc
- id: xor-modulo-key-loop-x64
  desc: XOR loop with modulo key index
  crit: suspicious
  conf: 0.75
  for:
  - pe
  - elf
  if:
    type: hex
    section: .text
    pattern: 31 C9 89 CA 48 F7 74 24 ?? 48 8B 04 24 44 0F B6 04 10 48 8B 44 24 ?? 48 8B 4C 24 ?? 0F B6 14 08 44 31 C2 88 14 08
composite_rules:
- id: polymorphic-ref
  desc: Polymorphic code terminology
  crit: notable
  conf: 0.5
  any:
    - id: polymorphic-code-engine
    - id: polymorphic-payload-stage
    - id: polymorphic-malware-class
    - id: polymorphic-payload-mutate
- id: page-rwx-literal
  desc: PAGE_EXECUTE_READWRITE constant literal
  crit: notable
  conf: 0.8
  any:
  - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite
  - id: micro-behaviors/mem/protect/constant::prot-write

  # ELF with mmap + mprotect + dladdr: map memory, flip protections, then use
  # dladdr to resolve runtime addresses. This is a "manual loader" pattern —
  # the binary unpacks or injects code at runtime without the dynamic linker.
  # Legitimate use: graphics drivers, JIT engines (JVM, V8/Node.js, LLVM JIT).
  # JIT runtimes use dladdr for stack-trace symbol resolution and have hundreds
  # of imports; downgrade when import_count > 200 to avoid false positives on
  # them while preserving detection of implants (typically < 200 imports).
- id: elf-manual-loader
  desc: ELF mmap+mprotect+dladdr manual loader profile
  crit: suspicious
  conf: 0.85
  platforms: [linux, macos]
  for: [elf]
  attack: T1055.004
  all:
  - id: micro-behaviors/mem/protect/modify::mprotect-import
  - id: micro-behaviors/mem/alloc/executable::mmap-symbol
  - id: micro-behaviors/dylib/lookup::dladdr-import
  unless:
  - id: micro-behaviors/dylib/library/family/
  - id: micro-behaviors/dylib/library/family/
  - id: metadata/lang/compiler/systems::go-binary
  - id: well-known/lib/android-renderscript
  downgrade:
    any:
    - id: metadata/binary/metrics/threshold::many-imports-200
- id: self-overwrite
  desc: Self-overwriting code patterns
  crit: suspicious
  conf: 0.8
  needs: 2
  any:
  - id: micro-behaviors/fs/proc/info/memory::proc-self-mem-path
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: self-patch-ref
  downgrade:
    any:
    - id: well-known/game/steam/
- id: code-cave
  desc: Code cave or slack space
  crit: suspicious
  conf: 0.75
  needs: 2
  any:
  - id: codecave-ref
  - id: slack-space-ref
  - id: nop-sled
  downgrade:
    any:
    - id: well-known/game/steam/
- id: hook-install
  desc: Dynamic interposition hook patterns
  crit: notable
  conf: 0.7
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
  - id: inline-hook-ref
  - id: micro-behaviors/process/hook/keywords::detour
  downgrade:
    any:
    - id: well-known/game/steam/
- id: iat-hook
  desc: Import Address Table hooking
  crit: suspicious
  conf: 0.7
  platforms: [windows]
  for: [pe]
  needs: 2
  any:
  - id: import-descriptor
  - id: import-address-table
  - id: iat-ref
  downgrade:
    any:
    - id: micro-behaviors/fs/file/section::pe-viewer-header-labels
- id: got-hook
  desc: Global Offset Table hooking
  crit: suspicious
  conf: 0.72
  platforms: [linux, macos]
  for: [elf, macho]
  all:
  - id: got-ref
  any:
  - id: inline-hook-ref
  - id: micro-behaviors/process/hook/keywords::detour
- id: polymorphic
  desc: Polymorphic or metamorphic code indicators
  crit: suspicious
  conf: 0.75
  needs: 2
  any:
  - id: polymorphic-ref
  - id: metamorphic-ref
  - id: self-modifying-ref
  - id: micro-behaviors/crypto/symmetric/xor/loop::native-byte-xor-loop
  - id: xor-modulo-key-loop-x64
  downgrade:
    any:
    - id: micro-behaviors/data/serialize/json::json-polymorphism-runtime
    - id: well-known/tool/reverse-engineering/ollydbg::ollydbg-executable-marker
    - id: metadata/library/structure::js-webpack-bundle
    - id: metadata/signed/developer::vector-35-inc
    - id: metadata/binary/metrics/size::massive-executable
    # Compiled Rust/Go (scx_* schedulers) emit XOR-loop byte patterns incidentally;
    # documented/licensed tools aren't polymorphic malware.
    - id: micro-behaviors/ui/help/
- id: active
  desc: Active self-modification behavior
  crit: notable
  conf: 0.9
  all:
  - id: micro-behaviors/mem/protect/modify/
  any:
  - id: objectives/anti-analysis/self-modify/runtime::self-overwrite
  - id: self-modifying-ref
  - id: objectives/anti-analysis/self-modify/runtime::code-cave
  - id: micro-behaviors/crypto/symmetric/xor/loop::native-byte-xor-loop
  downgrade:
    any:
    - id: metadata/binary/framework/
    - id: metadata/binary/metrics/structural::many-imports
  unless:
  - id: well-known/tool/sysadmin/logapi::logapi-pipe-marker
  - id: metadata/binary/metrics/threshold::many-exports-200
  - id: metadata/lang/compiler/systems::go-binary-comp
  - id: well-known/app/drivers/
  - id: well-known/app/drivers::ngx-dll-basename
- id: setwindowshook
  desc: Windows SetWindowsHookEx API reference
  crit: notable
  conf: 0.7
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
  - id: micro-behaviors/process/hook/keywords::detour
