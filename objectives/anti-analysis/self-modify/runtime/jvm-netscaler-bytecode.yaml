defaults:
  platforms: [netscaler, appliance, unix]
  for: [class, jar]
  attack: T1027.007

traits:
  - id: jvm-payloadmutated-hex
    desc: JVM PayloadMutated hex
    crit: suspicious
    conf: 0.94
    if:
      type: hex
      pattern: "50 61 79 6C 6F 61 64 4D 75 74 61 74 65 64 2E 63 6C 61 73 73"

  - id: jvm-runnermodified-hex
    desc: JVM RunnerModified hex
    crit: suspicious
    conf: 0.94
    if:
      type: hex
      pattern: "52 75 6E 6E 65 72 4D 6F 64 69 66 69 65 64 2E 6B 74"

  - id: jvm-agent-modified-jar-hex
    desc: JVM agent modified jar hex
    crit: suspicious
    conf: 0.94
    if:
      type: hex
      pattern: "61 67 65 6E 74 2D 6D 6F 64 69 66 69 65 64 2E 6A 61 72"

composite_rules:
  - id: jvm-netscaler-runtime-selfmodify
    desc: JVM NetScaler runtime selfmodify
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-payloadmutated-hex
      - id: jvm-runnermodified-hex
    any:
      - id: jvm-agent-modified-jar-hex
