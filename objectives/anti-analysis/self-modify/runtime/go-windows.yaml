defaults:
  platforms: [windows]
  for: [go]
  attack: T1027.001

traits:
  - id: go-read-own-executable
    desc: Go reads own executable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'os\.Executable\(\)[\s\S]{0,180}os\.ReadFile\(exePath\)'

  - id: go-overwrite-own-executable
    desc: Go overwrites own executable
    crit: suspicious
    conf: 0.94
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
    if:
      type: text
      regex: 'os\.WriteFile\(exePath,'

  - id: go-xor-payload-loop
    desc: Go payload XOR assignment
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'for\s+\w+\s*:=\s*range\s+payload[\s\S]{0,80}payload\[\w+\]\s*\^='

composite_rules:
  - id: go-runtime-self-overwrite
    desc: Go runtime self overwrite
    crit: hostile
    conf: 0.98
    all:
      - id: go-read-own-executable
      - id: go-overwrite-own-executable
    any:
      - id: go-xor-payload-loop
      - id: micro-behaviors/process/info/selfpath::os-executable
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
