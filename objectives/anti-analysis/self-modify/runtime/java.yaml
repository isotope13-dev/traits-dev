defaults:
  platforms: [unix, windows]
  for: [java, class, java_class]
  attack: T1027.005

traits:
  - id: java-selfmodify-method
    desc: References a selfModify routine
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: selfModify

  - id: java-self-fileoutput-write
    desc: Java FileOutputStream write to a File handle
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: new FileOutputStream(f)

  - id: java-bytecode-selfmodify
    desc: selfModify routine name in compiled bytecode
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 73 65 6c 66 4d 6f 64 69 66 79

composite_rules:
  - id: java-class-self-modify
    desc: Java class reads and rewrites own bytecode
    crit: hostile
    conf: 0.98
    all:
      - id: java-selfmodify-method
      - id: micro-behaviors/fs/file/read::java-readallbytes
    any:
      - id: java-self-fileoutput-write
      - id: micro-behaviors/fs/write/file/direct::java-fos-simple

  - id: java-bytecode-self-modify
    desc: Compiled class rewrites own bytecode
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: java-bytecode-selfmodify
      - id: micro-behaviors/fs/file/read::jvm-readallbytes-bytecode
      - id: micro-behaviors/fs/write/file/direct::jvm-fileoutputstream-bytecode
