defaults:
  platforms: [unix, windows, appliance]
  for: [typescript, javascript]
  attack: T1027

traits:
  - id: ts-writes-self-mod-patch
    desc: TS writes self-mod patch
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: self_modified_patch.bin

  - id: ts-xor-mutates-source-buffer
    desc: TS XOR mutates source buffer
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'patchRegion\.base\[i\]\s*\^=|mutated\[i\]\s*=\s*originalSource\[i\]\s*\^'

composite_rules:
  - id: ts-runtime-self-modify
    desc: TS runtime self modification
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/file/read::read-own-source
      - id: ts-writes-self-mod-patch
      - id: ts-xor-mutates-source-buffer
    unless:
      - id: metadata/package/files/ecosystem::openclaw-evolver-binary-build-pipeline
