defaults:
  platforms: [netscaler, appliance, unix]
  for: [kotlin, class, jar]
  attack: T1027.007

traits:
  - id: kotlin-mutated-class-write
    desc: Kotlin mutated class write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: PayloadMutated.class

  - id: kotlin-modified-source-write
    desc: Kotlin modified source write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: RunnerModified.kt

  - id: kotlin-self-replacing-jar
    desc: Kotlin self replacing JAR
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'agent-modified\.jar|self-replacing jar'

composite_rules:
  - id: kotlin-runtime-self-modify
    desc: Kotlin runtime self modify
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-mutated-class-write
      - id: kotlin-modified-source-write
    any:
      - id: kotlin-self-replacing-jar
