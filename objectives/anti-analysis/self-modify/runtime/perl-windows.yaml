defaults:
  platforms: [windows, unix]
  for: [perl]
  attack: T1027.007

traits:
  - id: perl-argv0-self-path
    desc: Perl argv0 self path
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '\$[A-Za-z_][A-Za-z0-9_]{0,31}\s*=\s*\$0\b'

  - id: perl-selfvar-overwrite-open
    desc: Perl opens SELF for overwrite
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\bopen\s+my\s+\$\w{1,32}\s*,\s*[''"]>[''"]\s*,\s*\$SELF\b'

  - id: perl-scriptpath-overwrite-open
    desc: Perl opens script path for overwrite
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bopen\s+my\s+\$\w{1,32}\s*,\s*[''"]>[''"]\s*,\s*\$script_path\b'

  - id: perl-source-line-splice
    desc: Perl splices source lines
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\bsplice\s+\@lines\s*,'

  - id: perl-source-md5-lines
    desc: Perl hashes source lines
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'md5_hex\s*\(\s*join\s*\(\s*[''"]{0,1}[''"]{0,1}\s*,\s*\@lines\s*\)'

composite_rules:
  - id: perl-runtime-self-rewrite
    desc: Perl runtime self rewrite
    crit: hostile
    conf: 0.98
    all:
      - id: perl-argv0-self-path
      - id: perl-source-line-splice
      - id: perl-source-md5-lines
    any:
      - id: perl-selfvar-overwrite-open
      - id: perl-scriptpath-overwrite-open
