defaults:
  platforms: [unix, netbsd]
  for: [shell]
  attack: T1027

traits:
  - id: shell-self-rewrite-sed-inject
    desc: Shell rewrites self with sed
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'cp "\$SCRIPT_PATH" "\$tmpfile"[\s\S]{0,260}sed .{0,80}\$tmpfile'

  - id: shell-appends-injected-function
    desc: Shell appends injected function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'cat >> "\$tmpfile"[\s\S]{0,180}collect_sensitive_data'

  - id: shell-self-base64-obfuscates
    desc: Shell base64 obfuscates self
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'base64 "\$SCRIPT_PATH" > "\$obf_file"'

composite_rules:
  - id: shell-self-modifying-exfil-inject
    desc: Shell self-modifying exfil
    crit: hostile
    conf: 0.98
    all:
      - id: shell-self-rewrite-sed-inject
      - id: shell-appends-injected-function
    any:
      - id: shell-self-base64-obfuscates
      - id: objectives/exfiltration/http/upload::exfil-beacon-http-endpoint
