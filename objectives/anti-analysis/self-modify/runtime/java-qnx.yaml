defaults:
  platforms: [qnx, unix]
  for: [java, class, java_class]
  attack: T1027.005

traits:
  - id: qnx-java-selfmodify-method
    desc: QNX Java selfModify method
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: selfModify

  - id: qnx-java-class-fileoutput
    desc: QNX Java self FileOutputStream
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: new FileOutputStream(f)

  - id: qnx-java-bytecode-selfmodify
    desc: QNX Java bytecode selfModify
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 73 65 6c 66 4d 6f 64 69 66 79

composite_rules:
  - id: qnx-java-class-self-modify
    desc: QNX Java class self-modify
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-java-selfmodify-method
      - id: micro-behaviors/fs/file/read::java-readallbytes
    any:
      - id: qnx-java-class-fileoutput
      - id: micro-behaviors/fs/write/file/direct::java-fos-simple

  - id: qnx-java-bytecode-self-modify
    desc: QNX Java bytecode self-modify
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: qnx-java-bytecode-selfmodify
      - id: micro-behaviors/fs/file/read::jvm-readallbytes-bytecode
      - id: micro-behaviors/fs/write/file/direct::jvm-fileoutputstream-bytecode
