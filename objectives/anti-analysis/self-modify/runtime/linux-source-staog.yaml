defaults:
  platforms:
    - unix
  for: [source]
traits:
  - id: mprotect-rwx-text
    desc: Makes text mapping RWX
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: movl $125,%eax                    # make cs writable
  - id: delta-recalc-pattern
    desc: Delta relocation via call-pop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: call recalc                       # dynamic relocation
  - id: stack-return-stub
    desc: Executes return stub on stack
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: "stackexecode:"
  - id: argv0-callback-load
    desc: Loads callback from first arg slot
    crit: component
    conf: 0.94
    if:
      type: text
      exact: movl 8(%ebp),%ebx                 # rm argv[0]
composite_rules:
  - id: self-delete-temp-installer
    desc: Self-modifying stub deletes temp installer
    crit: suspicious
    conf: 0.94
    all:
      - id: argv0-callback-load
      - id: runtime-self-patching-return
  - id: runtime-self-patching-return
    desc: Runtime self-patching return stub
    crit: suspicious
    conf: 0.97
    all:
      - id: mprotect-rwx-text
      - id: delta-recalc-pattern
      - id: stack-return-stub
