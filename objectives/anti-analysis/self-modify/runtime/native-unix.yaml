defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1027.007

composite_rules:
  - id: native-source-self-exe-rwx-write
    desc: Native source self exe RWX write
    crit: hostile
    conf: 0.98
    for: [c, cpp, objc]
    all:
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
      - id: micro-behaviors/fs/link/symlink::readlink
      - id: micro-behaviors/fs/file/write/direct::write
      - id: objectives/evasion/process/hook/inline::native-mprotect-code-page-rwx

  - id: native-elf-self-exe-rwx-write
    desc: Native ELF self exe RWX write
    crit: hostile
    conf: 0.98
    for: [elf]
    all:
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
      - id: micro-behaviors/fs/link/symlink::readlink
      - id: micro-behaviors/fs/file/write/direct::write
      - id: micro-behaviors/mem/protect/modify::mprotect-import
      - id: micro-behaviors/mem/protect/modify::rwx-prot-bytes
    # These five independent capabilities — current_exe() (/proc/self/exe +
    # readlink), file writes, and runtime mprotect/RWX (allocator, GC, JIT) —
    # co-occur in any managed/JIT runtime (Rust, Go, Mono/.NET tools like pedump,
    # monodis, mono-sgen) without the binary ever rewriting its own image. A real
    # self-rewriting implant is a minimal loader; full runtimes/apps carry many
    # imports, so exclude those (and the rust/go runtimes nop-sled also excludes).
    unless:
      - id: metadata/lang/compiler/systems::rust-binary
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/binary/metrics/structural::many-imports
