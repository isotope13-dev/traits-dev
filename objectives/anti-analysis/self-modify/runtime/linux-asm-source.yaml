defaults:
  platforms: [linux, unix]
  for: [c]

traits:
  - id: writable-executable-code-section
    desc: Declares writable executable code
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      exact: "section code write exec"

  - id: call-pop-delta-asm
    desc: Call d3lta relocation stub
    crit: component
    conf: 0.88
    if:
      type: raw
      exact: "call\td3lta"

  - id: pop-ebp-delta-asm
    desc: Pop EBP delta recovery stub
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: "pop\tebp                  ; ebp should be addr of d3lta"

  - id: mprotect-rwx-source
    desc: Sets PROT_READ WRITE EXEC
    crit: component
    conf: 0.94
    if:
      type: raw
      substr: "mov  edx, 7               ; int prot PROT_READ|PROT_WRITE|PROT_EXEC"

  - id: mprotect-syscall-source
    desc: Uses mprotect syscall directly
    crit: component
    conf: 0.94
    if:
      type: raw
      substr: "mov  eax,125              ; SYS.MPROTECT"

  - id: stack-host-transfer-source
    desc: Describes host code on stack
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: "put the host code onto the stack"

  - id: jmp-stack-source
    desc: Jumps to copied stack code
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: "jmp esp                   ; jump to copied code on the stack"

  - id: sliding-key-encryption-source
    desc: Sliding key encryption comment
    crit: component
    conf: 0.95
    if:
      type: raw
      substr: "Sliding Key Encryption"

  - id: xor-body-encryption-source
    desc: XOR body encryption loop
    crit: component
    conf: 0.95
    if:
      type: raw
      substr: "xor eax,ebx               ; encryption "

  - id: incrementing-key-source
    desc: Increments encryption key
    crit: component
    conf: 0.93
    if:
      type: raw
      substr: "inc ebx                   ; increase ebx"

  - id: encrypted-dropper-check-source
    desc: Checks whether body is encrypted
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: "checking now if the code"

  - id: unencrypted-fast-path-source
    desc: Skips decryption when plaintext
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: "if equal --> code isnt encrypted"

composite_rules:
  - id: call-pop-delta
    desc: Call-pop delta relocation stub
    crit: notable
    conf: 0.9
    all:
      - id: call-pop-delta-asm
      - id: pop-ebp-delta-asm

  - id: mprotect-rwx
    desc: Makes code pages RWX
    crit: suspicious
    conf: 0.96
    all:
      - id: mprotect-rwx-source
      - id: mprotect-syscall-source

  - id: stack-host-transfer
    desc: Copies host code onto stack
    crit: suspicious
    conf: 0.95
    all:
      - id: stack-host-transfer-source
      - id: jmp-stack-source

  - id: sliding-key-encryption
    desc: Sliding key XOR body encryption
    crit: suspicious
    conf: 0.97
    all:
      - id: sliding-key-encryption-source
      - id: xor-body-encryption-source
      - id: incrementing-key-source

  - id: encrypted-dropper-check
    desc: Checks whether body is encrypted
    crit: notable
    conf: 0.9
    all:
      - id: encrypted-dropper-check-source
      - id: unencrypted-fast-path-source

  - id: runtime-self-decrypting-host-restore
    desc: Runtime self decrypts and restores host
    crit: hostile
    conf: 0.98
    attack: T1027
    all:
      - id: mprotect-rwx
      - id: stack-host-transfer
      - id: sliding-key-encryption
    any:
      - id: encrypted-dropper-check
      - id: call-pop-delta
      - id: writable-executable-code-section
    needs: 1

  - id: writable-exec-self-modifying-profile
    desc: Writable executable self modifying code
    crit: suspicious
    conf: 0.95
    all:
      - id: writable-executable-code-section
      - id: mprotect-rwx
    any:
      - id: call-pop-delta
      - id: sliding-key-encryption
      - id: stack-host-transfer
    needs: 3
