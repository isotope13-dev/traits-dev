defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1027

traits:
  - id: php-self-source-rewrite
    desc: PHP rewrites own source
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'file_get_contents\(SELF_PATH\)[\s\S]{0,520}file_put_contents\(SELF_PATH'

  - id: php-self-path-write
    desc: PHP writes SELF_PATH
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: file_put_contents(SELF_PATH

  - id: php-stage-loaded-marker
    desc: PHP stage loaded marker
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /* STAGE_LOADED */

composite_rules:
  - id: php-runtime-self-modify
    desc: PHP runtime self modify
    crit: hostile
    conf: 0.98
    any:
      - id: php-self-source-rewrite
      - id: php-self-path-write
      - id: php-stage-loaded-marker
    needs: 2
