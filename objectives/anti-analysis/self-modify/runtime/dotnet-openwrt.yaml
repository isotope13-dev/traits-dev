defaults:
  platforms: [ios, openwrt, windows]
  for: [csharp, pe, dll]
  attack: T1027.005
traits:
  - id: dotnet-getexecutingassembly-token
    desc: .NET current assembly lookup
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'GetExecutingAssembly|Assembly\.GetExecutingAssembly'
  - id: dotnet-random-nextbytes-token
    desc: .NET random byte generation
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'NextBytes|Random\s*\('
  - id: dotnet-filemode-append-token
    desc: .NET append file mode
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'FileMode\.Append|FileMode[^A-Za-z0-9_]{0,24}Append'
composite_rules:
  - id: dotnet-self-modifying-stager
    desc: .NET self-modifying stager
    crit: hostile
    conf: 0.97
    all:
      - id: dotnet-getexecutingassembly-token
      - id: micro-behaviors/fs/file/read::dotnet-readallbytes-token
    needs: 2
    any:
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: dotnet-random-nextbytes-token
      - id: dotnet-filemode-append-token
      - id: micro-behaviors/fs/write/file/direct::writeallbytes-any
    unless:
      - id: well-known/lib/htmlforgex::htmlforgex-library
      - id: well-known/lib/deb-package::deb-dotnet-runtime-package
      - id: well-known/lib/powerforge::powerforge-library
      - id: metadata/lang/compiler/aot::nativeaot-runtime-markers
