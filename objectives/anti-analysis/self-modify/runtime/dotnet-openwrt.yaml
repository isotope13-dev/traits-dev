defaults:
  platforms: [ios, openwrt, windows]
  for: [csharp, pe, dll]
  attack: T1027.005
traits:
  - id: dotnet-filemode-append-token
    desc: .NET append file mode
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'FileMode\.Append|FileMode[^A-Za-z0-9_]{0,24}Append'
composite_rules:
  - id: dotnet-self-modifying-stager
    desc: .NET self-modifying stager
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/info/current::dotnet-getexecutingassembly-token
      - id: micro-behaviors/fs/file/read::dotnet-readallbytes-token
    needs: 2
    any:
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: micro-behaviors/os/random/prng/stdlib::random-nextbytes
      - id: dotnet-filemode-append-token
      - id: micro-behaviors/fs/write/file/direct::writeallbytes-any
    unless:
      - id: well-known/lib/htmlforgex/
      - id: well-known/lib/deb-package/
      - id: well-known/lib/powerforge/
      - id: metadata/lang/compiler/aot/
      - id: well-known/tool/sysadmin/netch::netch-executable
