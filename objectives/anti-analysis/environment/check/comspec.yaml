defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-cmd-exe-fragment
    desc: "Fragmented check for cmd.exe (anti-analysis)"
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: string_value
      exact: 'ystem32\\cmd.'
      case_insensitive: true
