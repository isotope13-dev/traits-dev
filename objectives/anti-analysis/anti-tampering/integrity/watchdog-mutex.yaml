defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: named-watchdog-mutex
    desc: Specifically-named single-instance watchdog mutex
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/process/sync/mutex::global-mutex-single-instance
    any:
      - id: micro-behaviors/process/sync/mutex::guid-mutex
      - id: micro-behaviors/process/sync/mutex::dense-global-numeric-mutexes
      - id: micro-behaviors/process/sync/mutex::global-once-mutexes
