defaults:
  platforms: [windows, unix]
  for:
    - javascript
  crit: suspicious
  attack: T1497
traits:
  - id: function-tostring-integrity
    desc: Function toString() integrity check
    conf: 0.85
    if:
      type: text
      regex: \.toString\(\)\)\);try\{.{0,60}eval\(
  - id: tamper-detection-message
    desc: Code tampering detection message
    crit: component
    conf: 0.75
    if:
      type: string_literal
      regex: code has been tampered|tamper(ed|ing) detect
      case_insensitive: true
composite_rules:
  - id: tamper-integrity-anti-analysis
    desc: Tamper detection paired with JavaScript integrity check
    crit: suspicious
    conf: 0.9
    all:
      - id: function-tostring-integrity
      - id: tamper-detection-message
