defaults:
  platforms: [windows, unix]
  for:
    - javascript
  crit: suspicious
  attack: T1497
traits:
  - id: function-tostring-integrity
    desc: Function toString() integrity check
    conf: 0.85
    if:
      type: text
      regex: \.toString\(\)\)\);try\{.{0,60}eval\(
  - id: tamper-detection-message
    desc: Code tampering detection message
    conf: 0.9
    if:
      type: string_literal
      regex: code has been tampered|tamper(ed|ing) detect
      case_insensitive: true
  - id: eval-tostring-unpacker
    desc: Eval with toString()-derived key
    conf: 0.85
    if:
      type: ast
      query: "(call_expression\n  function: (identifier) @fn\n  arguments: (arguments\n    (call_expression\n      function: (member_expression\n        property: (property_identifier) @prop)))\n  (#eq? @fn \"eval\")\n  (#eq? @prop \"toString\"))\n"
    unless:
      - id: metadata/package/testing/harness::is-test
