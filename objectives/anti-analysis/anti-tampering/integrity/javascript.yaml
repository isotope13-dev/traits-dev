defaults:
  platforms: [windows, unix]
  for:
    - javascript
  crit: suspicious
  attack: T1497
traits:
  - id: function-tostring-integrity
    desc: Function toString() integrity check
    conf: 0.85
    if:
      type: text
      regex: \.toString\(\)\)\);try\{.{0,60}eval\(
  - id: tamper-detection-message
    desc: Code tampering detection message
    crit: component
    conf: 0.75
    if:
      type: string_literal
      regex: code has been tampered|tamper(ed|ing) detect
      case_insensitive: true
  - id: eval-tostring-unpacker
    desc: Eval with toString()-derived key
    conf: 0.85
    # `eval(X.toString())` — executing the stringified form of a function/value
    # (self-unpacking). The `eval( … .toString())` shape is distinctive text.
    if:
      type: text
      regex: '\beval\s*\(\s*[\w$.]+\.toString\s*\(\s*\)\s*\)'
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/library/structure::vscode-extension-generated-asset
      - id: metadata/library/structure::google-tag-manager-bundle
composite_rules:
  - id: tamper-integrity-anti-analysis
    desc: Tamper detection paired with JavaScript integrity check
    crit: suspicious
    conf: 0.9
    all:
      - id: function-tostring-integrity
      - id: tamper-detection-message
