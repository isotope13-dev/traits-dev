defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
traits:
  - id: opcode-integrity-check
    conf: 0.8
    crit: suspicious
    desc: Verifies opcode at register address to detect debugger breakpoint patches
    if:
      type: raw
      regex: 'cmp byte ptr \[(e[abcd]x|e[sd]i)\], (0x|0)?[AE][19]h?'
