defaults:
  platforms: [unix, windows]
  for: [java, class, jar, zip]
  attack: T1497
traits:
  - id: java-own-class-sha256
    desc: Java SHA-256 class integrity hash
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: SHA-256
  - id: java-jar-entry-count-check
    desc: Java checks JAR entry count
    crit: component
    conf: 0.9
    if:
      type: text
      word: JarFile
  - id: java-classloader-packer-check
    desc: Java checks packer classloader name
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: pack
  - id: java-classloader-obfus-check
    desc: Java checks obfuscator classloader name
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: obfus
composite_rules:
  - id: java-self-integrity-repack-check
    desc: Java self-integrity repackaging check
    crit: suspicious
    conf: 0.95
    unless:
      - id: well-known/lib/jruby::runtime-context
    all:
      - id: java-own-class-sha256
      - id: objectives/evasion/self-delete/file/script::java-own-jar-path
    any:
      - id: java-jar-entry-count-check
      - id: java-classloader-packer-check
      - id: java-classloader-obfus-check
    needs: 1
