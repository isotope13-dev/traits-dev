defaults:
  platforms: [unix, windows]

traits:
  - id: builtin-anti-analysis-archive-path-traversal
    desc: Built-in archive path traversal finding hook
    crit: suspicious
    conf: 0.9
    for: [zip, tar]
    if:
      type: basename
      exact: __cleave_builtin_path_traversal_hook__
    unless:
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/harness::test-scripts-directory-path
      - id: metadata/package/testing/presence/harness::test-fixture-directory-path
      - id: metadata/package/testing/presence/harness::go-tools-testdata-directory-path
      - type: path
        dirname: true
        regex: '(^|[\\/])(_{0,2}fixtures?_{0,2}|testdata)([\\/]|$)'
        case_insensitive: true
      - type: basename
        regex: '\.pkg$'
      - id: metadata/package/files/bsd::openbsd-pkg-rcscript-manifest
      - id: well-known/lib/benign-runtime-bundles/

  - id: builtin-anti-analysis-archive-symlink-escape
    desc: Built-in archive symlink escape finding hook
    crit: suspicious
    conf: 0.9
    for: [zip, tar, archive]
    if:
      type: basename
      exact: __cleave_builtin_symlink_escape_hook__
    unless:
      - id: pkg-safe-symlink-archive-context

composite_rules:
  - id: pkg-safe-symlink-archive-context
    desc: Recognized package archive with intentional symlinks
    crit: exception
    conf: 0.98
    any:
      - id: metadata/package/testing/presence/
      - id: metadata/package/files/bsd::pkgsrc-package-archive-context
      - id: well-known/lib/benign-runtime-bundles/
      - id: archive-package-context
      - id: well-known/tool/sysadmin/alpine-packages/
      - id: system-package-archive-context
      - id: peazip-package-context
      - id: metadata/package/files/bsd::guile-slib-package-archive-basename
      - id: well-known/app/tailscale::tailscale-source-token

  - id: archive-package-context
    desc: Recognized package archive context
    crit: exception
    conf: 0.96
    platforms: [linux]
    for: [tar]
    any:
      - id: well-known/app/grafana::grafana-mimir-runtime
      - id: well-known/app/trino::wolfi-trino-plugin-package
      - id: well-known/tool/sysadmin/k3s::k3s-container-archive
      - id: well-known/app/unionlabs::unionlabs-testnet-release-bundle
  - id: system-package-archive-context
    desc: Recognized system package archive context
    crit: exception
    conf: 0.96
    any:
      - id: metadata/package/files/system-package::alpine-versioned-apk-filename
      - id: metadata/package/files/system-package::arch-pkginfo-manifest
  - id: peazip-package-context
    desc: Recognized PeaZip package context
    crit: exception
    conf: 0.96
    any:
      - id: well-known/app/peazip::peazip-linux-package-context
      - id: well-known/app/peazip::peazip-macos-context
