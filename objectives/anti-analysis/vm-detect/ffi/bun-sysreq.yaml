# Bun single-file agents that resolve firmware-table APIs via bun:ffi while
# recovering XOR-obfuscated VM/hypervisor string tables — anti-sandbox prelude
# for packed stealers. Pair keys rotate per build; correlate packaging with
# firmware API name strings.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1497.001

traits:
  # One [["b64","hexdigits"]] cell from a Bun sysreq-style XOR string table.
  - id: xor-b64-hexkey-string-pair
    desc: Base64-with-hex-key XOR string table pair
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\["[A-Za-z0-9+/=]{4,40}",\s*"[0-9a-f]{5,24}"\]'

composite_rules:
  - id: bun-sysreq-firmware-vm-probe
    desc: Bun sysreq loader probes firmware tables for VM artifacts
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/dropper/bun::bun-vfs-loader-entry
      - id: objectives/command-and-control/dropper/bun::bun-sysreq-module-marker
      - id: micro-behaviors/dylib/load/runtime::bun-ffi-module
      - id: micro-behaviors/os/sysinfo/hardware::get-system-firmware-table-string
      - id: micro-behaviors/os/sysinfo/hardware::enum-system-firmware-tables-string
      - id: xor-b64-hexkey-string-pair
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
