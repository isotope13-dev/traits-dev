defaults:
  platforms: [windows]
  for: [pe]
  attack: T1497.001

traits:
  - id: cpuid-autht-fragment
    desc: CPUID AuthenticAMD vendor check fragment
    crit: component
    conf: 0.85
    if:
      type: text
      exact: Autht
      section: .text

  - id: anti-vm-bypass-flag
    desc: Anti-VM bypass switch string
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: --no-antivm
      section: .rdata

composite_rules:
  - id: split-cpu-vendor-check
    desc: Split CPU vendor anti-VM check
    crit: suspicious
    conf: 0.92
    all:
      - id: cpuid-autht-fragment
      - id: objectives/anti-analysis/vm-detect/vendor::cpuid-genu-string

  - id: cpu-vendor-antivm-gate
    desc: CPU vendor anti-VM gating switch
    crit: suspicious
    conf: 0.95
    all:
      - id: anti-vm-bypass-flag
      - id: split-cpu-vendor-check
