defaults:
  platforms: [windows]
  for: [pe]
  attack: T1497.001

traits:
  - id: anti-vm-bypass-flag
    desc: Anti-VM bypass switch string
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: --no-antivm
      section: .rdata

composite_rules:
  - id: cpu-vendor-antivm-gate
    desc: CPU vendor anti-VM gating switch
    crit: suspicious
    conf: 0.95
    all:
      - id: anti-vm-bypass-flag
      - id: micro-behaviors/os/sysinfo/cpu::split-cpu-vendor-check
