# VM Detection via MAC Address Prefixes - Go source
# Detects Go code that checks network interface MAC addresses for VM vendor prefixes
defaults:
  for: [go]
  platforms: [unix, windows]
  attack: T1497.001
  mbc: B0009

traits:
  - id: go-vm-mac-vmware
    desc: Go code checks VMware MAC prefixes
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(00:0C:29|00:50:56|00:05:69)'
    unless:
      - id: well-known/app/packetfence::source-tree-path
      - id: well-known/lib/vmware-govmomi::govmomi-source-context
      - id: metadata/package/testing/harness/unit::go-test
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/presence/harness::go-tools-testdata-directory-path
  - id: go-vm-mac-virtualbox
    desc: Go code checks VirtualBox MAC prefix
    crit: suspicious
    conf: 0.85
    if:
      type: text
      exact: '08:00:27'
  - id: go-vm-mac-parallels
    desc: Go code checks Parallels MAC prefix
    crit: suspicious
    conf: 0.85
    if:
      type: text
      exact: '00:1C:14'
  - id: go-vm-mac-interface-scan
    desc: Go scans interfaces for MAC addresses
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'net\.Interfaces.{0,100}HardwareAddr'

composite_rules:
  - id: go-vm-mac-detection
    desc: VM detection via MAC prefix checks in Go
    crit: suspicious
    conf: 0.85
    all:
      - id: go-vm-mac-interface-scan
    needs: 2
    any:
      - id: go-vm-mac-vmware
      - id: go-vm-mac-virtualbox
      - id: go-vm-mac-parallels
