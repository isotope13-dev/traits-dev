defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, binaries]
  attack: T1497.001
traits:
- id: cpuid-genu-string
  desc: CPUID GenuineIntel vendor check fragment
  crit: notable
  conf: 0.8
  for: [pe, elf, macho]
  if:
    type: text
    exact: Genu
  unless:
  - id: well-known/lib/klauspost-cpuid::go-klauspost-cpuid-lib
  - id: metadata/package/manifest/compat::virtualbox-platform-component
  - type: text
    exact: GenuineIntel
- id: vendor-xen-upper
  desc: XEN hypervisor (uppercase)
  crit: suspicious
  conf: 0.6
  if:
    type: text
    exact: XEN
- id: vendor-xen-title
  desc: Xen hypervisor (titlecase)
  crit: suspicious
  conf: 0.6
  if:
    type: text
    exact: Xen
  unless:
  - id: well-known/app/gitea::gitea-server-binary
  - id: well-known/app/cliproxyapi/
  - id: well-known/tool/sysadmin/alpine-packages/
- id: vendor-kvm-upper
  desc: KVM hypervisor (uppercase)
  crit: notable
  conf: 0.6
  if:
    type: text
    exact: KVM
- id: vendor-kvm-repeat
  desc: KVMKVMKVM hypervisor signature
  crit: component
  conf: 0.7
  if:
    type: text
    substr: KVMKVMKVM
  unless:
  - type: raw
    regex: qemu-ga.*VBoxSF.*VBoxMouse.*VBoxGuest
  - id: well-known/app/quickemu
  - id: well-known/lib/klauspost-cpuid::go-cpuid-vendor-table
  - type: raw
    regex: AuthenticAMD.*GenuineIntel.*KVMKVMKVMKVM.*Microsoft Hv.*VMware.*XenVMM.*bhyve
  - type: text
    exact: VMware Tools
  downgrade:
    any:
    - id: well-known/lib/klauspost-cpuid::go-klauspost-cpuid-lib
    - id: micro-behaviors/os/sysinfo/hardware::gopsutil-import
- id: vendor-vmware
  desc: VMware hypervisor vendor string
  crit: component
  conf: 0.7
  if:
    type: text
    substr: VMware
    case_insensitive: true
  unless:
  - id: objectives/anti-analysis/vm-detect/vendor/
  - id: metadata/file/catalog/identity/
  - id: well-known/app/open-vm-tools::debian-packaging
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - type: basename
    regex: '(?i)(^|[\\/])vmmouse\.sys$'
  - type: raw
    regex: (?i)\b(kvm|xen|vbox|bhyve)\b
  not:
  - regex: JOHN-PC.{0,300}vmware
  - substr: prl_tgvmware390625
  - regex: ^(VMware, Inc\.|SOFTWARE\\VMware, Inc\\VMware Tools)$
  - regex: VMware (Screen Codec|virtualized renderer|driver)
  - regex: (?i)\bvmware\.\d+\.sg\b
- id: vendor-virtualbox
  desc: VirtualBox hypervisor vendor string
  crit: component
  conf: 0.6
  if:
    type: text
    word: VirtualBox
    case_insensitive: true
  unless:
  - id: objectives/anti-analysis/vm-detect/vendor/
  downgrade:
    any:
    - type: text
      regex: docker-machine|libmachine|minikube|vagrant
- id: virtualbox-mime-recognized-marker
  desc: VirtualBox MIME type marker
  crit: baseline
  conf: 0.8
  if:
    type: text
    regex: application/x-virtualbox-[a-z0-9-]+
- id: virtualbox-guest-service-recognized-marker
  desc: VirtualBox Guest service registry marker
  crit: baseline
  conf: 0.8
  if:
    type: text
    exact: SYSTEM\ControlSet001\Services\VBoxGuest
- id: virtualbox-module-name-recognized-marker
  desc: VirtualBox module or session name marker
  crit: baseline
  conf: 0.8
  if:
    type: text
    regex: (?i)\bvirtualbox\.(session|virtualbox|virtualboxclient)\b
- id: vendor-vbox-short
  desc: VBOX hypervisor short string
  crit: notable
  conf: 0.6
  if:
    type: text
    exact: VBOX
  unless:
  - id: metadata/signed/developer::intel-corporation
  - type: raw
    regex: qemu-ga.*VBoxSF.*VBoxMouse.*VBoxGuest
  - type: text
    exact: SYSTEM\ControlSet001\Services\VBoxGuest
  - id: metadata/package/manifest/compat::virtualbox-platform-component
- id: vendor-hyperv-dash--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.6
  for:
  - binaries
  if:
    type: text
    regex: (?i)(hyper-v.{0,40}(detect|hypervisor)|(detect|hypervisor).{0,40}hyper-v)
    case_insensitive: true
  count_max: 1017186
- id: vendor-hyperv-dash--rx-2
