  count_max: 1017187
- id: vendor-hyperv-dash--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.6
  for:
  - binaries
  if:
    type: text
    regex: (?i)(hyper-v.{0,40}(virtual)|(detect|hypervisor|virtual).{0,40}hyper-v)
    case_insensitive: true
  count_max: 1017188
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: vendor-microsoft-hv
  desc: Microsoft Hv hypervisor string
  crit: component
  conf: 0.6
