    - id: metadata/package/testing/presence/scripted::faker-word
    - id: metadata/package/testing/harness/runtime::test-basename-suffix
- id: analysis-user-abby
  desc: Analysis username 'Abby'
  crit: suspicious
  conf: 0.9
  for: [python, javascript, powershell]
  if:
    type: text
    regex: (?i)(users|home)[\\/][^\n]{0,20}[\\/]abby([\\/]|$)
  unless:
  - type: raw
    regex: defmodule\s+Faker\.Person\.|sampler\(:(first_name|last_name)
  downgrade:
    any:
    - id: metadata/package/testing/presence/scripted::faker-word
    - id: metadata/package/testing/harness/runtime::test-basename-suffix
- id: analysis-user-amf
  desc: Analysis username 'AMF'
  crit: suspicious
  conf: 0.9
  for: [python, javascript, powershell, pe, elf]
  if:
    type: text
    regex: (?i)(users|home)[\\/][^\n]{0,20}[\\/]amf([\\/]|$)
  unless:
  # "AMF" = Adobe Action Message Format (FLV/RTMP media metadata). Flash-video
  # and 3D-model parsers (Three.js AMFLoader) use "AMF" as a format marker,
  # not a sandbox username.
  - type: text
    substr: AMFLoader
  - type: text
    substr: .amf
  - type: text
    substr: Action Message Format
  - type: text
    substr: AMF document
  - type: text
    substr: AMF Material
