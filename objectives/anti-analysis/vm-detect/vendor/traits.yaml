# lshw (Hardware Lister) and its GTK frontend ship a built-in OUI/MAC-prefix
# vendor table to label network interfaces by manufacturer. That table includes
# the VMware/Parallels/VirtualBox prefixes as plain standalone strings, with no
# VM-detection logic. The "Hardware Lister (lshw)" banner (CLI) and the
# "GTK+ frontend for lshw" banner (gtk-lshw frontend) are distinctive markers
# carried only by lshw, never by VM-evasion malware, so they cleanly distinguish
# a benign hardware-vendor lookup table from a malicious MAC-prefix VM check.
- id: lshw-hardware-lister-oui-table
  desc: lshw vendor OUI table
  crit: baseline
  conf: 0.95
  for: [binaries]
  if:
    type: text
    regex: Hardware Lister \(lshw\)|GTK\+ frontend for lshw

composite_rules:

- id: vmware-recognized-vendor-marker
  desc: Recognized VMware vendor markers
  crit: baseline
  conf: 0.9
  any:
  - id: metadata/signed/developer::intel-corporation
  - id: metadata/signed/developer::broadcom-inc
  - id: objectives/collection/keylog/capture::p-user-proxy-dll
  - id: metadata/package/manifest/compat::virtualbox-platform-component
  - id: objectives/supply-chain/trojanized/backdoor::tokenizer-vocab-json
  - id: metadata/file/catalog/identity::frequency-list-catalog

- id: virtualbox-recognized-vendor-marker
  desc: Recognized VirtualBox vendor markers
  crit: baseline
  conf: 0.9
  any:
  - id: metadata/signed/developer::intel-corporation
  - id: metadata/signed/developer::oracle-america
  - id: metadata/package/manifest/compat::virtualbox-platform-component
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: virtualbox-mime-recognized-marker
  - id: virtualbox-guest-service-recognized-marker
  - id: virtualbox-module-name-recognized-marker

- id: hardware-model
  desc: Checks hardware model for VM
  crit: notable
  conf: 0.8
  any:
  - id: cpuid-check
  - id: hardware-model-cmd
  - id: hardware-model-linux-path
  unless:
