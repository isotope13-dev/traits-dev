defaults:
  platforms: [unix]
  for: [c, cpp, objc]
  attack: T1497.001

traits:
  - id: native-vm-vendor-source-a
    desc: Native VM vendor source group A
    crit: component
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '\b(QEMU|KVM|VirtualBox)\b'

  - id: native-vm-vendor-source-b
    desc: Native VM vendor source group B
    crit: component
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '\b(VMware|Hyper-V|Bochs)\b'

  - id: native-vm-vendor-source-c
    desc: Native VM vendor source group C
    crit: component
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '\b(Xen|BHYVE|Parallels)\b'

composite_rules:
  - id: native-vm-vendor-source-list
    desc: Native VM vendor identifier list
    crit: notable
    conf: 0.95
    needs: 2
    any:
      - id: native-vm-vendor-source-a
      - id: native-vm-vendor-source-b
      - id: native-vm-vendor-source-c
    unless:
      - id: metadata/lang/source::linux-kernel-source-tree-path
