# RDTSC Instruction Detection
# Used for timing-based VM detection
defaults:
  platforms: [linux, macos, windows]
  crit: notable
  conf: 0.9
traits:
  - id: rdtsc-instruction
    desc: RDTSC instruction (read time-stamp counter)
    crit: notable
    conf: 0.95
    for: [pe, elf, macho]
    count_min: 2
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "0F 31"
