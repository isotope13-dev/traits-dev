# VM Detection via Processor Features
# Checking CPU features that may differ between physical and virtual machines
# MBC: B0009 (Virtual Machine Detection)
defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.9
traits:
  - id: is-processor-feature-present
    desc: Check processor features (potential VM detection)
    # Component: CRT links this for __isa_available (SSE/AVX feature detection) in
    # virtually every MSVC-compiled binary. Only notable in composites with VM indicators.
    crit: component
    mbc: "B0009"
    if:
      type: symbol
      exact: "IsProcessorFeaturePresent"
