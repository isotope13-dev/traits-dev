defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1497.001
  mbc: B0009

traits:
  - id: explicit-vm-execution-rejection-message
    desc: Explicit VM execution rejection message
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)cannot run under a virtual machine'

composite_rules:
  - id: vm-rejection-concealed-packed-pe
    desc: Packed PE rejects VMs around concealed payload
    crit: hostile
    conf: 0.99
    attack: T1027,T1497.001
    all:
      - id: explicit-vm-execution-rejection-message
      - id: metadata/file/metrics::low-entropy-binary-with-dense-region
      - id: metadata/binary/section/metrics::multiple-nonstandard-section-names
      - id: metadata/binary/anomaly/format::pe-bss-like-sections-multiple
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/family/
