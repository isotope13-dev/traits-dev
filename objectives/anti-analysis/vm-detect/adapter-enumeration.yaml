# VM detection via network adapter description enumeration
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1497.001
traits:
  - id: iphlpapi-dynamic-load
    desc: Dynamic load of iphlpapi.dll
    crit: component
    conf: 0.9
    if:
      type: string_value
      exact: iphlpapi.dll
      section: .data
  - id: adapter-virtual-keyword
    desc: Adapter description checks for virtual
    crit: component
    conf: 0.7
    if:
      type: string_value
      word: Virtual
      section: .data
  - id: adapter-bluetooth-keyword
    desc: Adapter description checks for bluetooth
    crit: component
    conf: 0.7
    if:
      type: string_value
      word: bluetooth
      section: .data
composite_rules:
  - id: adapter-vm-fingerprint
    desc: VM detection via adapter description strings
    crit: suspicious
    conf: 0.9
    all:
      - id: iphlpapi-dynamic-load
    any:
      - id: adapter-virtual-keyword
      - id: adapter-bluetooth-keyword
      - id: objectives/anti-analysis/vm-detect::vendor-vmware
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
