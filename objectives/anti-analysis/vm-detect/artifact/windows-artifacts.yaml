defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  attack: T1497.001
  mbc: B0009
traits:
  - id: vmware-vgauth-registry-key
    desc: VMware VGAuth registry probe
    crit: component
    conf: 0.94
    if:
      type: text
      exact: 'SOFTWARE\VMware, Inc.\VMware VGAuth'
  - id: vboxtray-process-name
    desc: VirtualBox tray process check
    crit: component
    conf: 0.9
    if:
      type: text
      word: VBoxTray
  - id: sandboxie-rpcss-service
    desc: Sandboxie RPC service check
    crit: component
    conf: 0.94
    if:
      type: text
      word: sandboxierpcss
  - id: anti-vm-config-accessors
    desc: Anti-VM config accessors
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '[gs]et_AntiVM'
  - id: anti-sandboxie-config-accessors
    desc: Anti-Sandboxie config accessors
    crit: component
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '[gs]et_AntiSandBoxie'
composite_rules:
  - id: dotnet-vm-sandbox-artifact-checks
    desc: .NET VM and sandbox artifact checks
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/binary/framework::dotnet-assembly
    any:
      - id: vmware-vgauth-registry-key
      - id: vboxtray-process-name
      - id: sandboxie-rpcss-service
      - id: anti-vm-config-accessors
      - id: anti-sandboxie-config-accessors
    needs: 3
    unless:
      - id: well-known/tool/sysadmin/sandboxie::signed-sandboxie-component
      - id: metadata/signed/developer::oracle-america
      - id: metadata/signed/developer::broadcom-inc
