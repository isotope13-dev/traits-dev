defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  crit: suspicious
  mbc: B0009
  attack: T1497.001
traits:
  - id: wmic-model-check
    desc: WMIC hardware model query (VM check)
    conf: 0.9
    if:
      type: text
      regex: wmic\s+computersystem\s+get\s+model
  - id: dmi-product-name-dup
    desc: Linux DMI product name check
    conf: 0.85
    if:
      type: text
      substr: /sys/class/dmi/id/product_name
  - id: wmic-disk-enum
    desc: WMIC logical disk enumeration
    conf: 0.85
    if:
      type: text
      regex: wmic\s+logicaldisk\s+get
  - id: environment-gate-function-cluster
    desc: JavaScript host and GPU gate functions
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: symbol
      kind: function
      regex: '^(checkBlockedNames|checkGpu|checkSystem|getGpuNames)$'
composite_rules:
  - id: js-vm-environment-check
    desc: JavaScript VM environment detection
    crit: notable
    conf: 0.92
    attack: T1497.001 - javascript - typescript
    needs: 2
    any:
      - id: wmic-model-check
      - id: micro-behaviors/os/sysinfo/hardware::system-profiler-hardware
      - id: micro-behaviors/fs/proc/system::system-cpuinfo
      - id: objectives/anti-analysis/vm-detect/artifact::dmi-product-name-dup
    unless:
      - id: well-known/lib/systeminformation/
      - id: well-known/app/baidu-comate::baidu-comate
  - id: js-hardware-profiling
    desc: Cross-platform hardware profiling (VM evasion)
    crit: notable
    conf: 0.93
    attack: T1497.001 - javascript - typescript
    all:
      - id: js-vm-environment-check
    any:
      - id: objectives/anti-analysis/vm-detect/vendor::vendor-vmware
      - id: objectives/anti-analysis/vm-detect/vendor::vendor-virtualbox
      - id: objectives/anti-analysis/vm-detect/vendor::vendor-vbox-short
    unless:
      - id: well-known/lib/systeminformation/
      - id: well-known/app/baidu-comate::baidu-comate
  - id: js-obfuscated-environment-gate
    desc: Obfuscated JavaScript host and GPU analysis gate
    crit: suspicious
    conf: 0.95
    all:
      - id: environment-gate-function-cluster
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator/
    unless:
      - id: well-known/lib/systeminformation/
      - id: well-known/app/baidu-comate::baidu-comate
