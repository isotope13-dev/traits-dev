# VM detection via network adapter description enumeration
defaults:
  for: [pe, dll, c, cpp]
  platforms: [windows]
  attack: T1497.001
traits:
  - id: iphlpapi-dynamic-load
    desc: Dynamic load of iphlpapi.dll
    crit: component
    conf: 0.9
    if:
      type: text
      exact: iphlpapi.dll
      section: .data
  - id: adapter-virtual-keyword
    desc: Adapter description checks for virtual
    crit: component
    conf: 0.7
    if:
      type: text
      word: Virtual
      section: .data
  - id: adapter-bluetooth-keyword
    desc: Adapter description checks for bluetooth
    crit: component
    conf: 0.7
    if:
      type: text
      word: bluetooth
      section: .data
  - id: adapter-description-substring-source
    desc: Adapter description substring comparison
    crit: component
    conf: 0.88
    for: [c, cpp]
    if:
      type: text
      substr: pAdapterInfoPtr->Description
  - id: adapter-description-compare-source
    desc: Adapter description name comparison
    crit: component
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      regex: StrStrI\s*\(\s*pwszConverted\s*,\s*szName\s*\)
  - id: adapter-mac-prefix-compare-source
    desc: Adapter MAC prefix comparison
    crit: component
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      substr: '!memcmp(szMacMultiBytes, pAdapterInfoPtr->Address, 3)'
composite_rules:
  - id: adapter-vm-fingerprint
    desc: VM detection via adapter description strings
    crit: suspicious
    conf: 0.9
    all:
      - id: iphlpapi-dynamic-load
    any:
      - id: adapter-virtual-keyword
      - id: adapter-bluetooth-keyword
      - id: objectives/anti-analysis/vm-detect/vendor::vendor-vmware
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports
  - id: adapter-description-vm-check-source
    desc: VM detection via adapter description checks
    crit: suspicious
    conf: 0.94
    for: [c, cpp]
    all:
      - id: micro-behaviors/os/network/interface::get-adapters-info
      - id: adapter-description-substring-source
      - id: adapter-description-compare-source
  - id: adapter-mac-vm-check-source
    desc: VM detection via adapter MAC prefix
    crit: suspicious
    conf: 0.94
    for: [c, cpp]
    all:
      - id: micro-behaviors/os/network/interface::get-adapters-info
      - id: adapter-mac-prefix-compare-source
