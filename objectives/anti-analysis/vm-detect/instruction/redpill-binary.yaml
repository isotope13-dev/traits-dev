# SIDT "Red Pill" VM detection in compiled x86 binaries
# The SIDT instruction stores the IDT base address; malware checks if it's above 0xD0
# to distinguish VMware/VirtualBox (high IDT) from physical machines.
# Reference: http://www.redpill-or-bluepill.com/
defaults:
  platforms: [windows, linux]
  for: [pe, elf]
  arch: [x86]
  attack: T1497.001
  mbc: B0009
composite_rules:
  - id: borland-stub-vm-evasion
    desc: Borland stub with no imports and SIDT anti-VM probing
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/lang/compiler/managed::borland-section-code
    any:
      - id: metadata/binary/symbols/imports::single-import-count
      - id: metadata/binary/symbols/imports::few-import-count
      - id: micro-behaviors/os/sysinfo/hardware::sidt-stack-destination
      - id: micro-behaviors/os/sysinfo/hardware::sidt-absolute-destination
    needs: 2
