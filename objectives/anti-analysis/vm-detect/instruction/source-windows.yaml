defaults:
  platforms: [windows]
  for: [c, cpp]
  attack: T1497.001
  mbc: B0009
traits:
  - id: cpuid-source-call
    desc: __cpuid source call
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      substr: __cpuid
  - id: vendor-kvm-string
    desc: KVM hypervisor vendor string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: KVMKVMKVM
  - id: vendor-vmware-string
    desc: VMware hypervisor vendor string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: VMwareVMware
  - id: vendor-vbox-string
    desc: VirtualBox hypervisor vendor string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: VBoxVBoxVBox
  - id: vendor-xen-string
    desc: Xen hypervisor vendor string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: XenVMMXenVMM
  - id: vendor-hyperv-string
    desc: Hyper-V hypervisor vendor string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: Microsoft Hv
  - id: idt-base-helper
    desc: IDT base helper reference
    crit: component
    conf: 0.88
    if:
      type: text
      word: get_idt_base
  - id: ldt-base-helper
    desc: LDT base helper reference
    crit: component
    conf: 0.88
    if:
      type: text
      word: get_ldt_base
  - id: gdt-base-helper
    desc: GDT base helper reference
    crit: component
    conf: 0.88
    if:
      type: text
      word: get_gdt_base
  - id: task-register-probe
    desc: STR task register probe
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '__asm\s+str\s+mem|Store Task Register|str_trick'
composite_rules:
  - id: cpuid-vendor-cluster
    desc: Multiple hypervisor vendor strings
    crit: component
    conf: 0.94
    needs: 2
    any:
      - id: vendor-kvm-string
      - id: vendor-vmware-string
      - id: vendor-vbox-string
      - id: vendor-xen-string
      - id: vendor-hyperv-string
  - id: cpuid-hypervisor-vendor-check
    desc: CPUID hypervisor vendor check
    crit: suspicious
    conf: 0.95
    all:
      - id: cpuid-source-call
      - id: cpuid-vendor-cluster
  - id: descriptor-table-vm-probes
    desc: Descriptor table VM probes
    crit: suspicious
    conf: 0.93
    needs: 2
    any:
      - id: idt-base-helper
      - id: ldt-base-helper
      - id: gdt-base-helper
      - id: task-register-probe
