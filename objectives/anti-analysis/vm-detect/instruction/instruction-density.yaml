# Instruction Density-Based Evasion
# Detects anti-analysis and VM evasion via instruction patterns
# ATT&CK: T1497.001 (Virtualization/Sandbox Evasion: System Checks)
defaults:
  platforms: [linux, macos, windows]
  for: [pe, macho, elf, -go, -rust]
  attack: "T1497.001"
traits:
  # CPUID occurrence check
  - id: multiple-cpuid-instr
    desc: Multiple CPUID instructions detected
    crit: suspicious
    conf: 0.7
    size_max: 1048576
    count_min: 5
    if:
      type: hex
      section: text
      pattern: "0F A2"
    unless:
      - type: metrics
        field: imports.count
        min: 80
  # RDTSC occurrence check
  - id: multiple-rdtsc-instr
    desc: High RDTSC instruction density
    crit: suspicious
    conf: 0.7
    size_max: 1048576
    count_min: 5
    if:
      type: hex
      section: text
      pattern: "0F 31"
    unless:
      - type: raw
        substr: "BSJB" # .NET IL bytecode contains 0F 31 sequences that aren't RDTSC
      - type: metrics
        field: imports.count
        min: 80
  - id: sparse-logic-density
    desc: "Extremely low logic density (func sparsity)"
    crit: component
    conf: 0.8
    size_max: 10485760
    if:
      type: metrics
      field: binary.complexity_per_kb
      max: 0.001
    unless:
      - type: basename
        regex: '^liblzma\.so\.5\.4\.5$'
      - id: objectives/anti-analysis/vm-detect/instruction/
composite_rules:
  - id: sparse-logic-recognized-marker
    desc: Recognized sparse-logic binary marker
    crit: notable
    conf: 0.8
    any:
      - id: metadata/signed/platform::apple
      - id: metadata/signed/developer
      - id: metadata/package/quality/profile::versioned
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/native::gnuc-macro
      - id: metadata/binary/metrics/structural::sparse-logic-base
      - id: metadata/binary/metrics/threshold::many-imports-100
  - id: instruction-based-evasion
    desc: Instruction-based anti-analysis/VM detection
    crit: suspicious # Downgraded from suspicious - common in installers for system detection
    conf: 0.8
    any:
      - id: multiple-cpuid-instr
      - id: multiple-rdtsc-instr
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::reflection-namespace
        - id: objectives/anti-static/obfuscation/reflection/invoke/
        - id: objectives/anti-static/obfuscation/reflection/invoke/
        - id: metadata/signed/platform::apple
  - id: sparse-execution-anomaly
    desc: "Sparse execution structural anomaly (possible packer)"
    crit: suspicious
    conf: 0.9
    all:
      - id: sparse-logic-density
      - id: metadata/binary/metrics/structural::no-imports
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::dominant-section
      - id: metadata/binary/anomaly/format::minimal-string-count
    unless:
      - id: metadata/binary/framework/
