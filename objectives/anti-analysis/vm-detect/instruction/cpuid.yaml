# CPUID Instruction Detection
# Used for hypervisor/VM detection
defaults:
  platforms: [linux, macos, windows]
  for: [pe, elf, macho]
  crit: notable
  conf: 0.9
traits:
  - id: cpuid-instruction
    desc: CPUID instruction (hypervisor fingerprinting)
    crit: suspicious
    conf: 0.95
    if:
      type: trait
      id: metadata/binary/instruction::cpuid-instr
  - id: cpuid-feature-probe-instruction
    desc: CPUID feature probe instruction sequence
    crit: component
    conf: 0.82
    count_min: 2
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "0F A2 F?"
