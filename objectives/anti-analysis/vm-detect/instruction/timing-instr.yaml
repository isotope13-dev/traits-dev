# RDTSC Instruction Detection
# Used for timing-based VM detection
defaults:
  platforms: [linux, macos, windows]
  for: [pe, elf, macho]
  crit: notable
  conf: 0.9
traits:
  - id: rdtsc-instruction
    desc: RDTSC instruction (read time-stamp counter)
    crit: suspicious
    conf: 0.95
    count_min: 2
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "0F 31"
  - id: rdrand-instruction
    desc: RDRAND hardware random instruction
    crit: baseline
    conf: 0.45
    count_min: 2
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "0F C7 F?"
  - id: rdtsc-register-mix
    desc: RDTSC value mixed into registers
    crit: component
    conf: 0.82
    count_min: 2
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "0F 31 8B ?? C1 C?"
