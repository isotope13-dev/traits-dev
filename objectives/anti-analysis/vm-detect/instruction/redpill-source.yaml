# Red Pill VM detection in C/C++ source
# SIDT instruction shellcode used to detect virtual machines
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1497.001
  mbc: B0009
traits:
  - id: sidt-shellcode-bytes
    desc: SIDT instruction bytes in source
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '\x0F\x01\x0D'
  - id: rpill-variable
    desc: Red Pill variable name reference
    crit: suspicious
    conf: 0.85
    if:
      type: text
      word: "rpill"
  - id: idt-base-threshold
    desc: IDT base address VM threshold check
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(idt|IDT|sidt|SIDT).{0,60}0x[Dd]0'
composite_rules:
  - id: redpill-vm-detection
    desc: Red Pill SIDT VM detection technique
    crit: suspicious
    conf: 0.93
    any:
      - id: sidt-shellcode-bytes
      - id: rpill-variable
