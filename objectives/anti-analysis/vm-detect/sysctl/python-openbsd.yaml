defaults:
  platforms: [openbsd, bsd, unix]
  for: [python, pyc]
  attack: T1497.001

traits:
  - id: python-openbsd-hypervisor-sysctl
    desc: Python OpenBSD hypervisor sysctl
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sysctl -a 2>/dev/null | grep -i hypervisor

  - id: python-openbsd-bhyve-sysctl
    desc: Python OpenBSD bhyve sysctl
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: sysctl -a 2>/dev/null | grep -c bhyve

  - id: python-openbsd-vm-vendors
    desc: Python OpenBSD VM vendors
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: VirtualBox[\s\S]{0,120}VMware[\s\S]{0,120}bhyve

composite_rules:
  - id: python-openbsd-sysctl-vm-detect
    desc: Python OpenBSD sysctl VM detect
    crit: hostile
    conf: 0.98
    all:
      - id: python-openbsd-hypervisor-sysctl
    any:
      - id: python-openbsd-bhyve-sysctl
      - id: python-openbsd-vm-vendors
