defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1497.001
  mbc: B0009
traits:
  - id: bios-systemmanufacturer-key
    desc: BIOS manufacturer registry path
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: HARDWARE\DESCRIPTION\System\BIOS
  - id: bios-systemmanufacturer-value
    desc: SystemManufacturer registry value
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: SystemManufacturer
composite_rules:
  - id: bios-manufacturer-registry-query
    desc: BIOS manufacturer registry query
    crit: notable
    conf: 0.95
    all:
      - id: bios-systemmanufacturer-key
      - id: bios-systemmanufacturer-value
      - id: micro-behaviors/os/registry/access::reg-open-key-ex-a-symbol
      - id: micro-behaviors/os/registry/access::reg-query-value-ex-a-symbol
  - id: bios-vendor-vm-check
    desc: BIOS manufacturer VM detection
    crit: suspicious
    conf: 0.98
    all:
      - id: bios-manufacturer-registry-query
    any:
      - id: objectives/anti-analysis/vm-detect::vendor-vmware
      - id: objectives/anti-analysis/vm-detect::vendor-virtualbox
      - id: objectives/anti-analysis/vm-detect::vendor-qemu
      - id: objectives/anti-analysis/vm-detect::vendor-parallels
    needs: 2
  - id: bios-vm-check-and-exit
    desc: BIOS VM check then exit
    crit: suspicious
    conf: 0.98
    all:
      - id: bios-vendor-vm-check
      - id: micro-behaviors/process/terminate/kill::exit-process
