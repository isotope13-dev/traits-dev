defaults:
  platforms:
    - macos
  for:
    - macho
  attack: T1497.001
traits:
  - id: sysctl-hw-model
    desc: Checks hardware model via sysctl (hw.model)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: hw.model
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: sysctl-boot-args
    desc: Checks boot arguments (kern.bootargs)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: kern.bootargs
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: ioreg-vendor-query
    desc: Queries IORegistry vendor manufacturer fields
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: ioreg[^\n]{0,60}(Manufacturer|Vendor Name)
    downgrade:
      any:
        - id: metadata/signed/platform::apple
composite_rules:
  - id: macos-vm-hardware-check
    desc: macOS hardware profiling (potential VM detection)
    crit: suspicious
    conf: 0.85
    downgrade:
      any:
        - id: metadata/signed/platform::apple
    all:
      - id: micro-behaviors/os/sysinfo/config::sysctlbyname
    any:
      - id: sysctl-hw-model
      - id: sysctl-boot-args
      - id: ioreg-vendor-query
  - id: macos-evasive-hardware-fingerprint
    desc: Evasive macOS hardware fingerprinting (CPUID + RDTSC + sysctl)
    crit: suspicious
    conf: 0.95
    downgrade:
      any:
        - id: metadata/signed/platform::apple
    all:
      - id: macos-vm-hardware-check
    needs: 2
    any:
      - id: metadata/binary/instruction::cpuid-instr
      - id: objectives/anti-analysis/timing/evasion::rdtsc
      - id: metadata/binary/instruction::xgetbv-instr
  - id: macos-ioreg-vm-vendor-check
    desc: macOS ioreg VM vendor probing
    crit: suspicious
    conf: 0.9
    all:
      - id: ioreg-vendor-query
    any:
      - id: objectives/anti-analysis/vm-detect::vendor-virtualbox
      - id: objectives/anti-analysis/vm-detect::vendor-vmware
      - id: objectives/anti-analysis/vm-detect::vendor-parallels
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::apple
