defaults:
  platforms: [openwrt]
  for: [python]
  attack: T1497.001

traits:
- id: openwrt-python-config-context
  desc: Python OpenWrt config context
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '/etc/config|/overlay'

- id: openwrt-python-package-context--opkg
  desc: Python OpenWrt package context (opkg)
  crit: component
  conf: 0.92
  if:
    type: text
    word: opkg
- id: openwrt-python-package-context--uci
  desc: Python OpenWrt package context (uci)
  crit: component
  conf: 0.92
  if:
    type: text
    word: uci
composite_rules:
- id: openwrt-python-package-context
  desc: Python OpenWrt package context
  crit: component
  conf: 0.92
  any:
  - id: openwrt-python-package-context--opkg
  - id: openwrt-python-package-context--uci
- id: openwrt-python-platform-context
  desc: Python OpenWrt platform context
  crit: component
  conf: 0.92
  any:
  - id: openwrt-python-config-context
  - id: openwrt-python-package-context

- id: openwrt-python-vm-sandbox-detect
  desc: OpenWrt Python VM and sandbox detection
  crit: hostile
  conf: 0.96
  all:
  - id: openwrt-python-platform-context
  any:
  - id: objectives/discovery/system/fingerprint/hardware::dmi-fields
  - id: objectives/anti-analysis/environment-detect/runtime::container-environment-detection
  - id: micro-behaviors/os/sysinfo/platform/kernel::ptrace-debugger
  - id: objectives/anti-analysis/sandbox-detect/script::python-vm-vendor-string-set
  - id: objectives/anti-analysis/sandbox-detect/script::python-sandbox-tool-process-set
  needs: 3
