defaults:
  platforms: [openwrt]
  for: [python]
  attack: T1497.001

traits:
  - id: python-vmware-virtualbox-vendor-string
    desc: Python VMware or VirtualBox vendor string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(vmware|virtualbox)'
  - id: python-qemu-kvm-vendor-string
    desc: Python QEMU or KVM vendor string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(qemu|kvm)'
  - id: python-xen-hyperv-bochs-vendor-string
    desc: Python Xen, Hyper-V, or Bochs vendor string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(xen|hyper-v|bochs)'
  - id: python-strace-ltrace-tool-string
    desc: Python strace or ltrace analysis tool string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(strace|ltrace)'
  - id: python-debugger-tool-string
    desc: Python debugger analysis tool string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(gdb|radare2|objdump)'
  - id: python-packet-analysis-tool-string
    desc: Python packet analysis tool string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(wireshark|tcpdump)'

composite_rules:
  - id: python-vm-vendor-string-set
    desc: Python VM vendor string set
    crit: suspicious
    conf: 0.9
    any:
      - id: python-vmware-virtualbox-vendor-string
      - id: python-qemu-kvm-vendor-string
      - id: python-xen-hyperv-bochs-vendor-string
    needs: 2
  - id: python-sandbox-tool-process-set
    desc: Python sandbox analysis tool process set
    crit: suspicious
    conf: 0.9
    any:
      - id: python-strace-ltrace-tool-string
      - id: python-debugger-tool-string
      - id: python-packet-analysis-tool-string
    needs: 2
  - id: openwrt-python-vm-sandbox-detect
    desc: OpenWrt Python VM and sandbox detection
    crit: hostile
    conf: 0.96
    any:
      - id: objectives/discovery/system/fingerprint/hardware::dmi-fields
      - id: objectives/anti-analysis/environment-detect/runtime::container-environment-detection
      - id: micro-behaviors/os/sysinfo/platform/kernel::ptrace-debugger
      - id: python-vm-vendor-string-set
      - id: python-sandbox-tool-process-set
    needs: 3
