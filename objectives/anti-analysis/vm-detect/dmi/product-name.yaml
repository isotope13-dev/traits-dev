defaults:
  platforms: [routeros, appliance, unix]
  for: [c, cpp, elf]
  attack: T1497.001
  mbc: B0009
traits:
  - id: dmi-product-name-path
    desc: SMBIOS product_name DMI sysfs path
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: /sys/class/dmi/id/product_name
    unless:
      - id: well-known/app/systemd::container-runtime-component-basename
  - id: dmi-board-vendor-path
    desc: SMBIOS board_vendor DMI sysfs path
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '/sys/class/dmi/id/(board_vendor|sys_vendor|bios_vendor)'
    unless:
      - id: well-known/app/systemd::container-runtime-component-basename
  - id: libsystemd-shared-object-basename
    desc: libsystemd shared object basename
    crit: baseline
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '^libsystemd.*\.so(\.[0-9.]+)?$'
  # neofetch-style system-info tools (fastfetch) read the full DMI sysfs id
  # tree and embed hypervisor brand names (QEMU/KVM/VMware/Parallels) purely to
  # pretty-print the host's hardware/hypervisor, not to evade a sandbox. The
  # "fastfetch-cli/fastfetch" self-identification string is carried only by
  # fastfetch and never by VM-evasion malware, so it cleanly separates benign
  # hardware reporting from the malicious DMI fingerprint check.
  - id: fastfetch-sysinfo-tool
    desc: fastfetch system-information tool marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      substr: fastfetch-cli/fastfetch
composite_rules:
  - id: dmi-vm-fingerprint
    desc: VM fingerprint via DMI sysfs read
    crit: hostile
    conf: 0.95
    # SMBIOS DMI strings (product_name, board_vendor, sys_vendor) plus a
    # hypervisor brand string is the standard Mirai/IoT-bot sandbox check.
    # The atom alone is benign sysadmin scripting; pairing with a brand
    # word is the malware shape.
    needs: 1
    all:
      - id: dmi-product-name-path
      - id: dmi-board-vendor-path
    any:
      - id: objectives/anti-analysis/vm-detect/vendor
    unless:
      - id: well-known/app/systemd::legitimate-systemd-helper-basename
      - id: well-known/app/systemd::container-runtime-component-basename
      - id: libsystemd-shared-object-basename
      - id: fastfetch-sysinfo-tool
