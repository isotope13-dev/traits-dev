defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1497.001

traits:
- id: node-container-vm-paths
  desc: Probes paths for VM or container artifacts
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '/proc/1/cgroup|/\.dockerenv|/proc/diskstats'
- id: node-vm-mac-prefixes
  desc: Node VM MAC prefix checks
  crit: suspicious
  conf: 0.88
  count_min: 2
  if:
    type: text
    regex: '00:0c:29|08:00:27|52:54:00|00:16:3e'

- id: node-vm-vendor-strings--qemu
  desc: Node VM vendor string set (QEMU)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    word: QEMU
- id: node-vm-vendor-strings--kvm
  desc: Node VM vendor string set (KVM)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    word: KVM
- id: node-vm-vendor-strings--vmware
  desc: Node VM vendor string set (VMware)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    word: VMware
composite_rules:
- id: node-vm-vendor-strings
  desc: Node VM vendor string set
  crit: suspicious
  conf: 0.9
  any:
  - id: node-vm-vendor-strings--qemu
  - id: node-vm-vendor-strings--kvm
  - id: node-vm-vendor-strings--vmware
  - id: objectives/anti-analysis/vm-detect/vendor::vendor-virtualbox
- id: node-vm-sandbox-detect
  desc: Node VM and sandbox detection
  crit: hostile
  conf: 0.96
  unless:
  - id: metadata/library/structure::js-large-module-bundle
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
  - id: well-known/lib/systeminformation::filesystem-module
  - id: well-known/lib/systeminformation::system-module
  - id: well-known/lib/systeminformation::asar-bundled-library
  any:
  - id: node-vm-vendor-strings
  - id: node-container-vm-paths
  - id: node-vm-mac-prefixes
  - id: objectives/anti-analysis/environment-detect/runtime::container-environment-detection
  - id: objectives/discovery/system/fingerprint/hardware::dmi-fields
  needs: 2
