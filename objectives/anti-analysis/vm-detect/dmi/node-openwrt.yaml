defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1497.001

traits:
- id: stable-machine-id-container-marker
  desc: Stable machine-id container guard
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: "no stable id available"
- id: node-vm-mac-prefixes
  desc: Node VM MAC prefix checks
  crit: suspicious
  conf: 0.88
  count_min: 2
  if:
    type: text
    regex: '00:0c:29|08:00:27|52:54:00|00:16:3e'
  unless:
  - id: well-known/app/baidu-comate::baidu-comate
  - id: metadata/document/html/

- id: node-vm-vendor-strings--qemu
  desc: Node VM vendor string set (QEMU)
  crit: notable
  conf: 0.9
  if:
    type: text
    word: QEMU
  unless:
  - id: well-known/lib/novnc::source-context
  - id: metadata/document/html/
- id: node-vm-vendor-strings--kvm
  desc: Node VM vendor string set (KVM)
  crit: notable
  conf: 0.9
  if:
    type: text
    word: KVM
  unless:
  - id: well-known/lib/novnc::source-context
  - id: metadata/document/html/
- id: node-vm-vendor-strings--vmware
  desc: Node VM vendor string set (VMware)
  crit: notable
  conf: 0.9
  if:
    type: text
    word: VMware
  unless:
  - id: well-known/lib/novnc::source-context
  - id: metadata/document/html/
composite_rules:
- id: node-vm-benign-application-context
  desc: Recognized benign Node application context
  crit: exception
  conf: 0.99
  any:
  - id: well-known/lib/systeminformation/
  - id: well-known/app/tencent-codebuddy::tencent-codebuddy
  - id: well-known/app/dbcode::extension-context
  - id: well-known/app/qwen-code::qwen-code-bundle-text
  - id: well-known/app/baidu-comate::baidu-comate
- id: node-vm-vendor-strings
  desc: Node VM vendor string set
  crit: notable
  conf: 0.9
  any:
  - id: node-vm-vendor-strings--qemu
  - id: node-vm-vendor-strings--kvm
  - id: node-vm-vendor-strings--vmware
  - id: objectives/anti-analysis/vm-detect/vendor::vendor-virtualbox
  needs: 2
  unless:
  - id: well-known/lib/novnc::source-context
  - id: metadata/document/html/
- id: node-vm-sandbox-detect
  desc: Node VM and sandbox detection
  crit: suspicious
  conf: 0.96
  unless:
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/library/generated::sphinx-searchindex-js
  - id: metadata/library/data::aws-sdk-js-v3-bundle
  - id: metadata/library/google-runtime::gcp-metadata-js-bundle
  - id: metadata/package/files/dependency::node-modules-path
  - id: node-vm-benign-application-context
  - id: well-known/lib/novnc::source-context
  - id: metadata/document/html/
  any:
  - id: node-vm-vendor-strings
  - id: node-vm-mac-prefixes
  - id: micro-behaviors/fs/proc/container::multi-marker-runtime-detection
  - id: objectives/discovery/system/fingerprint/hardware::dmi-fields
  needs: 2
