defaults:
  for:
  - pe
  - dll
  - csharp
  crit: component
  conf: 0.85
  mbc: B0009
  platforms:
  - windows
traits:
- id: processor-query
  desc: WMI processor class query
  if:
    type: text
    substr: Win32_Processor
- id: video-controller-query
  desc: WMI video controller class query
  if:
    type: text
    substr: Win32_VideoController
- id: disk-drive-query
  desc: WMI disk drive class query
  if:
    type: text
    substr: Win32_DiskDrive
- id: operating-system-query
  desc: WMI operating system class query
  if:
    type: text
    substr: Win32_OperatingSystem
- id: system-enclosure-query
  desc: WMI enclosure class query
  if:
    type: text
    substr: Win32_SystemEnclosure
- id: computer-system-query
  desc: WMI computer system class query
  if:
    type: text
    substr: Win32_ComputerSystem
- id: bios-query
  desc: WMI BIOS class query
  if:
    type: text
    substr: Win32_BIOS
- id: baseboard-query
  desc: WMI baseboard class query
  if:
    type: text
    substr: Win32_BaseBoard
- id: network-adapter-query
  desc: WMI network adapter class query
  if:
    type: text
    substr: Win32_NetworkAdapterConfiguration
composite_rules:
- id: wmi-vm-fingerprint
  desc: WMI hardware and OS profile query cluster
  crit: notable
  conf: 0.9
  attack: T1082
  needs: 3
  any:
  - id: objectives/anti-analysis/vm-detect/wmi::baseboard-query
  - id: objectives/anti-analysis/vm-detect/wmi::bios-query
  - id: objectives/anti-analysis/vm-detect/wmi::computer-system-query
  - id: objectives/anti-analysis/vm-detect/wmi::disk-drive-query
  - id: objectives/anti-analysis/vm-detect/wmi::network-adapter-query
  - id: objectives/anti-analysis/vm-detect/wmi::operating-system-query
  - id: objectives/anti-analysis/vm-detect/wmi::processor-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-bios-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-cache-memory-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-computer-system-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-fan-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-logical-disk-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-memory-array-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-memory-device-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-processor-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-thermal-zone-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-video-controller-query
  - id: objectives/anti-analysis/vm-detect/wmi::system-enclosure-query
  - id: objectives/anti-analysis/vm-detect/wmi::video-controller-query
  unless:
  - id: well-known/lib/wmi::wmi-win32-provider-versioninfo
- id: wmi-host-profile-queries
  desc: Multiple WMI host profile queries
  crit: notable
  conf: 0.88
  needs: 2
  any:
  - id: objectives/anti-analysis/vm-detect/wmi::baseboard-query
  - id: objectives/anti-analysis/vm-detect/wmi::bios-query
  - id: objectives/anti-analysis/vm-detect/wmi::computer-system-query
  - id: objectives/anti-analysis/vm-detect/wmi::disk-drive-query
  - id: objectives/anti-analysis/vm-detect/wmi::network-adapter-query
  - id: objectives/anti-analysis/vm-detect/wmi::operating-system-query
  - id: objectives/anti-analysis/vm-detect/wmi::processor-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-bios-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-cache-memory-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-computer-system-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-fan-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-logical-disk-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-memory-array-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-memory-device-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-processor-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-thermal-zone-query
  - id: objectives/anti-analysis/vm-detect/wmi::source-video-controller-query
  - id: objectives/anti-analysis/vm-detect/wmi::system-enclosure-query
  - id: objectives/anti-analysis/vm-detect/wmi::video-controller-query
  unless:
  - id: metadata/signed/leaf::malwarebytes-inc
  - id: metadata/signed/developer::vmware
  - id: well-known/lib/wmi::wmi-win32-provider-versioninfo
- id: com-backed-wmi-fingerprint
  desc: COM-backed WMI host fingerprinting
  crit: suspicious
  conf: 0.92
  attack: T1082
  all:
  - id: wmi-host-profile-queries
  - id: micro-behaviors/os/com/invoke::wmi-com-proxy-setup
  unless:
  - id: metadata/signed/leaf::nvidia-corporation
  - id: well-known/tool/dual-use/licensing/
