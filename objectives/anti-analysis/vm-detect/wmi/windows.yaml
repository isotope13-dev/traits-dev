defaults:
  for:
  - pe
  - dll
  - csharp
  crit: component
  conf: 0.85
  mbc: B0009
  platforms:
  - windows
composite_rules:
- id: wmi-evasion-with-run-persistence
  desc: WMI evasion checks with Run-key persistence
  crit: hostile
  conf: 0.98
  attack: T1497.001,T1547.001
  all:
  - id: objectives/discovery/host/security::pe-wmi-av-enumeration
  - id: wmi-vm-display-fingerprint
  - id: objectives/persistence/login/registry/autostart::currentversion-run-key-path
  unless:
  - id: well-known/tool/sysadmin/

- id: wmi-vm-display-fingerprint
  desc: WMI VM display adapter fingerprinting
  crit: suspicious
  conf: 0.92
  attack: T1497.001
  ref: sha256:45415f110b7961eea726dd3b1c07ebed2bbc44d13e8d92d0d8bd1304ba145d73
  all:
  - id: micro-behaviors/os/wmi/query::wmi-video-controller-class
  any:
  - id: objectives/anti-analysis/vm-detect/vendor::vendor-microsoft-render
  - id: objectives/anti-analysis/vm-detect/vendor::vendor-vmware
  - id: objectives/anti-analysis/emulator-detect/hardware::virtualbox-string
  - id: objectives/anti-analysis/emulator-detect/hardware::qemu-string
  unless:
  - id: well-known/lib/wmi::wmi-win32-provider-versioninfo
  - id: metadata/signed/developer::vmware
