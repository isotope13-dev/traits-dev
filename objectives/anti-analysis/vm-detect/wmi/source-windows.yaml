defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1497.001
  mbc: B0009
traits:
  - id: source-processor-query
    desc: WMI processor class query
    crit: component
    conf: 0.88
    if:
      type: text
      substr: Win32_Processor
  - id: source-logical-disk-query
    desc: WMI logical disk class query
    crit: component
    conf: 0.88
    if:
      type: text
      substr: Win32_LogicalDisk
  - id: source-bios-query
    desc: WMI BIOS class query
    crit: component
    conf: 0.88
    if:
      type: text
      substr: Win32_BIOS
  - id: source-computer-system-query
    desc: WMI computer system class query
    crit: component
    conf: 0.88
    if:
      type: text
      substr: Win32_ComputerSystem
  - id: source-thermal-zone-query
    desc: WMI thermal zone query
    crit: component
    conf: 0.9
    if:
      type: text
      substr: MSAcpi_ThermalZoneTemperature
  - id: source-fan-query
    desc: WMI fan class query
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Win32_Fan
  - id: source-video-controller-query
    desc: WMI video controller class query
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Win32_VideoController
  - id: source-cache-memory-query
    desc: WMI cache memory class query
    crit: component
    conf: 0.88
    if:
      type: text
      substr: Win32_CacheMemory
  - id: source-memory-device-query
    desc: WMI memory device class query
    crit: component
    conf: 0.88
    if:
      type: text
      substr: Win32_MemoryDevice
  - id: source-memory-array-query
    desc: WMI memory array class query
    crit: component
    conf: 0.88
    if:
      type: text
      substr: Win32_MemoryArray
composite_rules:
  - id: source-wmi-host-profile-queries
    desc: Multiple WMI host profile queries
    crit: suspicious
    conf: 0.9
    needs: 4
    any:
      - id: source-processor-query
      - id: source-logical-disk-query
      - id: source-bios-query
      - id: source-computer-system-query
      - id: source-thermal-zone-query
      - id: source-fan-query
      - id: source-video-controller-query
      - id: source-cache-memory-query
      - id: source-memory-device-query
      - id: source-memory-array-query
    unless:
    - id: well-known/lib/wine::wine-source-tree
    - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
