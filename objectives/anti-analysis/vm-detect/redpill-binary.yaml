# SIDT "Red Pill" VM detection in compiled x86 binaries
# The SIDT instruction stores the IDT base address; malware checks if it's above 0xD0
# to distinguish VMware/VirtualBox (high IDT) from physical machines.
# Reference: http://www.redpill-or-bluepill.com/
defaults:
  platforms: [windows, linux]
  for: [pe, elf]
  arch: [x86]
  attack: T1497.001
  mbc: B0009
traits:
  - id: sidt-esp-offset
    desc: SIDT via stack pointer (anti-VM probe)
    crit: suspicious
    conf: 0.92
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "0F 01 4C 24 ??"
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/resource::oversized-rsrc

  - id: sidt-abs32
    desc: SIDT with absolute address (anti-VM probe)
    crit: suspicious
    conf: 0.88
    size_max: 10485760
    if:
      type: hex
      section: text
      pattern: "0F 01 0D ?? ?? ?? ??"
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/resource::oversized-rsrc

composite_rules:
  - id: sidt-vm-probe
    desc: SIDT instruction probing IDT for VM detection
    crit: suspicious
    conf: 0.93
    mbc: B0009.m01
    any:
      - id: sidt-esp-offset
      - id: sidt-abs32

  - id: borland-stub-vm-evasion
    desc: Borland stub with no imports and SIDT anti-VM probing
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/lang/compiler/managed::borland-section-code
      - id: sidt-vm-probe
    any:
      - id: metadata/binary/symbols::single-import-count
      - id: metadata/binary/symbols::few-import-count
