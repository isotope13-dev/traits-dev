# Instruction Density-Based Evasion
# Detects anti-analysis and VM evasion via instruction patterns
# ATT&CK: T1497.001 (Virtualization/Sandbox Evasion: System Checks)
defaults:
  platforms: [linux, macos, windows]
  for: [pe, macho, elf, -go, -rust]
  attack: "T1497.001"
traits:
  # CPUID occurrence check
  - id: multiple-cpuid-instr
    desc: Multiple CPUID instructions detected
    crit: notable
    conf: 0.7
    size_max: 1048576
    count_min: 5
    if:
      type: hex
      section: text
      pattern: "0F A2"
    unless:
      - type: metrics
        field: binary.import_count
        min: 80
  # RDTSC occurrence check
  - id: multiple-rdtsc-instr
    desc: High RDTSC instruction density
    crit: notable
    conf: 0.7
    size_max: 1048576
    count_min: 5
    if:
      type: hex
      section: text
      pattern: "0F 31"
    unless:
      - type: raw
        substr: "BSJB" # .NET IL bytecode contains 0F 31 sequences that aren't RDTSC
      - type: metrics
        field: binary.import_count
        min: 80
  - id: sparse-logic-density
    desc: "Extremely low logic density (function sparsity)"
    crit: notable
    conf: 0.8
    size_max: 10485760
    if:
      type: metrics
      field: binary.complexity_per_kb
      max: 0.001
    unless:
      - id: metadata/signed/platform::apple
      - id: metadata/signed/developer
      - id: metadata/package::versioned
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler::gnuc-macro
      - type: metrics
        field: binary.import_density
        max: 0
      - type: metrics
        field: binary.import_count
        min: 100
composite_rules:
  - id: instruction-based-evasion
    desc: Instruction-based anti-analysis/VM detection
    crit: notable # Downgraded from suspicious - common in installers for system detection
    conf: 0.8
    any:
      - id: multiple-cpuid-instr
      - id: multiple-rdtsc-instr
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/reflection/invoke::namespace-import
        - id: objectives/anti-static/obfuscation/reflection/invoke::method-info
        - id: objectives/anti-static/obfuscation/reflection/invoke::property-info
        - id: metadata/signed/platform::apple
  - id: sparse-execution-anomaly
    desc: "Sparse execution structural anomaly (possible packer)"
    crit: suspicious
    conf: 0.9
    all:
      - id: sparse-logic-density
      - id: metadata/binary/metrics::no-imports
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
      - id: metadata/binary/metrics::minimal-string-count
    unless:
      - id: metadata/binary/framework::dotnet-assembly
