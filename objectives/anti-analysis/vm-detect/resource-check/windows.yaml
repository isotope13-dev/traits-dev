# VM Detection via Resource Enumeration
# Checks RAM < 2GB and processor count < 2 to detect virtual environments.
# BurrowShell loader uses these checks before executing payload.
defaults:
  for: [pe, dll]
  platforms: [windows]
  mbc: B0009
  attack: T1497.001
traits:
  - id: low-ram-vm-check
    desc: Low RAM threshold VM detection string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: Less than \d+ GB of RAM
  - id: low-cpu-vm-check
    desc: Low processor count VM detection string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: Less than \d+ processors? detected
  - id: possible-virtual-env
    desc: Virtual environment detection message
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: Possible virtual environment
  - id: global-memory-status-fail
    desc: GlobalMemoryStatusEx failure handling
    crit: component
    conf: 0.8
    if:
      type: text
      substr: GlobalMemoryStatusEx Failed
composite_rules:
  - id: resource-based-vm-detect
    desc: VM detection via system resource checks
    crit: suspicious
    conf: 0.93
    needs: 2
    any:
      - id: objectives/anti-analysis/vm-detect/resource-check::global-memory-status-fail
      - id: objectives/anti-analysis/vm-detect/resource-check::low-cpu-vm-check
      - id: objectives/anti-analysis/vm-detect/resource-check::low-ram-vm-check
      - id: objectives/anti-analysis/vm-detect/resource-check::possible-virtual-env
