defaults:
  platforms: [windows]
  for: [powershell, batch]
  attack: T1497.001
  mbc: B0009

traits:
  - id: powershell-low-memory-exit-check
    desc: PowerShell exits below memory threshold
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?is)Get-CimInstance.{0,420}TotalPhysicalMemory.{0,160}(-lt|<)\s*[0-9.]+'
