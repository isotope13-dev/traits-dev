defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1497.001
  mbc: B0009
traits:
  - id: disk-enum-services-key
    desc: Disk services enum registry path
    crit: component
    conf: 0.96
    if:
      type: text
      exact: System\\CurrentControlSet\\Services\\Disk\\Enum
  - id: ide-enum-key
    desc: IDE enum registry path
    crit: component
    conf: 0.95
    if:
      type: text
      exact: System\\CurrentControlSet\\Enum\\IDE
  - id: scsi-enum-key
    desc: SCSI enum registry path
    crit: component
    conf: 0.95
    if:
      type: text
      exact: System\\CurrentControlSet\\Enum\\SCSI
  - id: disk-enum-count-value
    desc: Disk enum Count value
    crit: component
    conf: 0.9
    if:
      type: text
      exact: Count
  - id: reg-open-key-source
    desc: RegOpenKeyEx source call
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: RegOpenKeyEx
  - id: reg-query-value-source
    desc: RegQueryValueEx source call
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: RegQueryValueEx
  - id: reg-enum-key-source
    desc: RegEnumKeyEx source call
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: RegEnumKeyEx
  - id: reg-query-info-source
    desc: RegQueryInfoKey source call
    crit: component
    conf: 0.88
    if:
      type: symbol
      exact: RegQueryInfoKey
  - id: vendor-qemu-source
    desc: QEMU registry VM marker
    crit: component
    conf: 0.86
    if:
      type: text
      exact: qemu
  - id: vendor-vmware-source
    desc: VMware registry VM marker
    crit: component
    conf: 0.86
    if:
      type: text
      exact: vmware
  - id: vendor-vbox-source
    desc: VirtualBox registry VM marker
    crit: component
    conf: 0.86
    if:
      type: text
      exact: vbox
  - id: vendor-xen-source
    desc: Xen registry VM marker
    crit: component
    conf: 0.84
    if:
      type: text
      exact: xen
  - id: vendor-virtual-source
    desc: Generic virtual registry marker
    crit: component
    conf: 0.82
    if:
      type: text
      exact: Virtual
  - id: virtio-storage-service-registry-source
    desc: VirtIO storage service registry markers
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Services\\\\(vioscsi|viostor|VirtioSerial)'
  - id: virtio-device-service-registry-source
    desc: VirtIO device service registry markers
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Services\\\\(BALLOON|netkvm)'
  - id: virtio-storage-driver-file-source
    desc: VirtIO storage driver file markers
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(vioscsi|vioser|viostor)\.sys'
  - id: virtio-device-driver-file-source
    desc: VirtIO device driver file markers
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(balloon|netkvm|viofs)\.sys'
composite_rules:
  - id: vendor-markers-source
    desc: Multiple source VM vendor markers
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: vendor-qemu-source
      - id: vendor-vmware-source
      - id: vendor-vbox-source
      - id: vendor-xen-source
      - id: vendor-virtual-source
  - id: ide-scsi-enum-registry-path
    desc: IDE or SCSI enum registry path
    crit: component
    conf: 0.92
    any:
      - id: ide-enum-key
      - id: scsi-enum-key
  - id: disk-enum-registry-vm-check
    desc: Disk enum registry VM artifact check
    crit: suspicious
    conf: 0.96
    all:
      - id: disk-enum-services-key
      - id: disk-enum-count-value
      - id: reg-open-key-source
      - id: reg-query-value-source
      - id: vendor-markers-source
  - id: ide-scsi-registry-vm-check
    desc: IDE or SCSI registry VM artifact check
    crit: suspicious
    conf: 0.94
    all:
      - id: ide-scsi-enum-registry-path
      - id: reg-open-key-source
      - id: reg-enum-key-source
      - id: reg-query-info-source
      - id: vendor-markers-source
  - id: kvm-virtio-source-artifact-check
    desc: KVM VirtIO artifact check in source
    crit: suspicious
    conf: 0.94
    needs: 2
    any:
      - id: virtio-storage-service-registry-source
      - id: virtio-device-service-registry-source
      - id: virtio-storage-driver-file-source
      - id: virtio-device-driver-file-source
      - id: micro-behaviors/os/compat/wow64::wow64-disable-redirect
      - id: micro-behaviors/os/compat/wow64::wow64-revert-redirect
  - id: kvm-virtio-driver-file-check
    desc: KVM VirtIO driver file artifact check in source
    crit: suspicious
    conf: 0.93
    all:
      - id: virtio-storage-driver-file-source
      - id: virtio-device-driver-file-source
    any:
      - id: micro-behaviors/os/compat/wow64::wow64-disable-redirect
      - id: micro-behaviors/os/compat/wow64::wow64-revert-redirect
