defaults:
  platforms: [aix, unix]
  for: [java]
  attack: T1497.001
  mbc: B0009
traits:
  - id: java-aix-lpar-vm-check
    desc: Java checks AIX LPAR VM status
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'lparstat -i[\s\S]{0,220}(lpar|pvid)'
  - id: java-aix-prtconf-vm-check
    desc: Java checks AIX prtconf VM markers
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'prtconf 2>/dev/null[\s\S]{0,220}(virtual|emulator)'
  - id: java-aix-odmget-hardware-check
    desc: Java queries AIX ODM hardware data
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "odmget -q 'attribute=serial_number' CuAt"
composite_rules:
  - id: aix-java-vm-detection-report
    desc: AIX Java VM detection report
    crit: hostile
    conf: 0.95
    all:
      - id: java-aix-lpar-vm-check
      - id: java-aix-prtconf-vm-check
    any:
      - id: java-aix-odmget-hardware-check
      - id: objectives/anti-analysis/vm-detect/script::java-qemu-marker
      - id: objectives/anti-analysis/vm-detect/script::java-virtualbox-marker
    needs: 1
