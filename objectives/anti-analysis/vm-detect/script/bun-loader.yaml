defaults:
  platforms: [windows]
  for: [pe, javascript, powershell]
  attack: T1497.001

traits:
  - id: powershell-get-ciminstance
    desc: PowerShell CIM instance query
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bGet-CimInstance\b'
  - id: cim-physicalmemory-query
    desc: CIM physical memory query
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Win32_PhysicalMemory
  - id: powershell-process-count
    desc: PowerShell process count query
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)Get-Process[^\\n]{0,80}\)\.Count'
  - id: vm-indicator-hypervisor-strings
    desc: VM hypervisor string cluster
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '(?i)\b(qemu|vmware|virtualbox|kvm)\b'
  - id: vm-indicator-firmware-strings
    desc: VM firmware string cluster
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '(?i)\b(seabios|bochs|edk ii)\b'
  - id: vm-indicator-bus-strings
    desc: VM bus string cluster
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '(?i)\b(xen|parallels|virtio|vmbus)\b'
  - id: sandbox-analysis-usernames
    desc: Sandbox analysis usernames
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '(?i)\b(sandbox|malware|virus)\b'
  - id: sandbox-default-usernames
    desc: Sandbox default usernames
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '(?i)\b(vmuser|wdagutilityaccount|defaultuser0)\b'

composite_rules:
  - id: bun-loader-cim-host-scoring
    desc: Bun loader CIM host scoring
    crit: suspicious
    conf: 0.95
    all:
      - id: powershell-get-ciminstance
    needs: 3
    any:
      - id: micro-behaviors/os/wmi/query::wmi-disk-drive-class
      - id: cim-physicalmemory-query
      - id: micro-behaviors/os/wmi/query::wmi-bios-class
      - id: micro-behaviors/os/wmi/query::wmi-baseboard-class
      - id: powershell-process-count
  - id: bun-loader-antivm-scoring
    desc: Bun loader anti VM scoring
    crit: suspicious
    conf: 0.97
    all:
      - id: bun-loader-cim-host-scoring
    any:
      - id: vm-indicator-hypervisor-strings
      - id: vm-indicator-firmware-strings
      - id: vm-indicator-bus-strings
      - id: sandbox-analysis-usernames
      - id: sandbox-default-usernames
      - id: metadata/binary/section/name::bun-section-name
