defaults:
  platforms: [android]
  for: [zig]
  attack: T1497.001

traits:
  - id: zig-android-buildprop-emulator
    desc: Zig Android buildprop emulator check
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/system/build\.prop|goldfish|ranchu'

  - id: zig-dmi-vm-paths
    desc: Zig DMI VM paths
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/sys/class/dmi/id/(product_name|sys_vendor)'

  - id: zig-frida-tool-check
    desc: Zig Frida tool check
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "frida"

  - id: zig-gdbserver-tool-check
    desc: Zig gdbserver tool check
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "gdbserver"

  - id: zig-strace-tool-check
    desc: Zig strace tool check
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "strace"

  - id: zig-xposed-tool-check
    desc: Zig Xposed tool check
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "xposed"

  - id: zig-magisk-tool-check
    desc: Zig Magisk tool check
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "magisk"

composite_rules:
  - id: zig-android-vm-emulator-cluster
    desc: Zig Android VM emulator cluster
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: zig-android-buildprop-emulator
      - id: zig-dmi-vm-paths
      - id: zig-frida-tool-check
      - id: zig-gdbserver-tool-check
      - id: zig-strace-tool-check
      - id: zig-xposed-tool-check
      - id: zig-magisk-tool-check
