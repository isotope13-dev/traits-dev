defaults:
  platforms: [windows, unix]
  for: [powershell]
traits:
  - id: powershell-vm-indicators-vm
    desc: 'PS check for VMware/VBox env variables'
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(VMWARE|VBOX|QEMU)'
  - id: powershell-vm-indicators-docker-env
    desc: PowerShell Docker environment check
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(DOCKER_HOST|DOCKER_CONTAINER)'
  - id: powershell-vm-indicators-kubernetes-env
    desc: PowerShell Kubernetes environment check
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(KUBERNETES_SERVICE_HOST|KUBERNETES_PORT)'
  - id: powershell-vm-indicators-sandbox-env
    desc: PowerShell sandbox environment check
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      exact: SANDBOX
  - id: powershell-hyperv-literal
    desc: PowerShell Hyper-V literal
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)\bhyper-v\b'
  - id: powershell-build-preflight-marker
    desc: PowerShell build preflight marker
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Docker Desktop may still work|Preflight passed|Required build files exist'
composite_rules:
  - id: powershell-emulator-detection
    desc: PowerShell script detecting emulator or sandbox environment
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: powershell-vm-indicators-vm
      - id: powershell-vm-indicators-docker-env
      - id: powershell-vm-indicators-kubernetes-env
      - id: powershell-vm-indicators-sandbox-env
      - id: powershell-hyperv-literal
      - id: micro-behaviors/process/enumerate/shell::low-process-count
      - id: micro-behaviors/os/sysinfo/platform/kernel::ptrace-debugger
    unless:
      - id: powershell-build-preflight-marker
      - id: well-known/tool/sysadmin/kubernetes/bootstrap::kubernetes-bootstrap-context
      - id: well-known/tool/sysadmin/vmware-powercli::powercli-launch-script
