defaults:
  platforms: [windows, unix]
  for: [powershell]
traits:
  - id: powershell-vm-indicators-vm
    desc: PowerShell check for VMware/VBox environment variables
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(VMWARE|VBOX|QEMU)'
  - id: powershell-vm-indicators-container
    desc: PowerShell check for Docker/K8s environment variables
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(DOCKER|KUBERNETES|SANDBOX)'
  - id: powershell-disk-check-vm
    desc: PowerShell check for VMware/VBox disk signatures
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(vmware|vbox|qemu)'
  - id: powershell-disk-check-hyperv
    desc: PowerShell check for Hyper-V/Virtual disk signatures
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: '(?i)(virtual|hyper-v)'
composite_rules:
  - id: powershell-emulator-detection
    desc: PowerShell script detecting emulator or sandbox environment
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: powershell-vm-indicators-vm
      - id: powershell-vm-indicators-container
      - id: powershell-disk-check-vm
      - id: powershell-disk-check-hyperv
      - id: micro-behaviors/process/enumerate/shell::low-process-count
      - id: micro-behaviors/os/sysinfo/platform/kernel::ptrace-debugger
