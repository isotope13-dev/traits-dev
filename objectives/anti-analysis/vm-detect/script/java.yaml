defaults:
  platforms: [unix, windows]
  for: [java, class, jar, zip]
  attack: T1497.001
  mbc: B0009

traits:
  - id: java-vm-env-var-roster
    desc: Java VM environment variable checks
    crit: component
    conf: 0.92
    count_min: 3
    if:
      type: raw
      regex: '(VMWARE_USE_TRIPLE_FAULT|QEMU_AUDIO_DRV|LIBGL_ALWAYS_SOFTWARE)'
  - id: java-vmware-marker
    desc: Java VMware marker
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: vmware
  - id: java-virtualbox-marker
    desc: Java VirtualBox marker
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: virtualbox
  - id: java-qemu-marker
    desc: Java QEMU marker
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: qemu
  - id: java-container-marker
    desc: Java container marker
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: container
  - id: java-hw-model-sysctl-check
    desc: Java sysctl hardware model check
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: hw.model

composite_rules:
  - id: java-vm-emulator-detect
    desc: Java VM and emulator detection
    crit: suspicious
    conf: 0.95
    all:
      - id: java-hw-model-sysctl-check
    needs: 3
    any:
      - id: java-vm-env-var-roster
      - id: java-vmware-marker
      - id: java-virtualbox-marker
      - id: java-qemu-marker
      - id: java-container-marker
