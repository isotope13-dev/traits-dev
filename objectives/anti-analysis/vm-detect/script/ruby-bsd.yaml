defaults:
  platforms: [dragonflybsd, unix]
  for: [ruby]
  attack: T1497.001

traits:
  - id: ruby-vm-vendor-regex
    desc: Ruby VM vendor regex
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'qemu\|kvm\|virtualbox\|vmware\|vbox\|xen\|hvm'

  - id: ruby-vm-mac-prefix-regex
    desc: Ruby VM MAC prefix regex
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '00:0c:29\|00:50:56\|00:05:69\|52:54:00\|08:00:27'

  - id: ruby-low-cpu-vm-check
    desc: Ruby low CPU VM check
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'hw\.ncpu.{0,80}ncpu\s*<=\s*2'

composite_rules:
  - id: ruby-bsd-vm-detect-cluster
    desc: Ruby BSD VM detection cluster
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: micro-behaviors/fs/proc/system::system-cpuinfo
      - id: micro-behaviors/os/sysinfo/config::ruby-bsd-sysctl-hardware-query
      - id: ruby-vm-vendor-regex
      - id: ruby-vm-mac-prefix-regex
      - id: ruby-low-cpu-vm-check

  - id: ruby-vm-aware-reverse-shell
    desc: Ruby VM-aware reverse shell
    crit: hostile
    conf: 0.97
    all:
      - id: ruby-bsd-vm-detect-cluster
      - id: objectives/command-and-control/reverse-shell/dup::ruby-tcpsocket-open3-command-loop
