defaults:
  platforms: [ios]
  for: [zig]
  attack: T1497.001

traits:
  - id: zig-ios-sysctl-vm-model
    desc: Zig iOS sysctl VM model check
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'sysctlbyname[\s\S]{0,120}hw\.model'

  - id: zig-ios-vm-device-paths
    desc: Zig iOS VM device path checks
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/dev/vmmon|/dev/vmx'

composite_rules:
  - id: zig-ios-vm-detection
    desc: Zig iOS VM detection
    crit: hostile
    conf: 0.98
    all:
      - id: zig-ios-sysctl-vm-model
      - id: zig-ios-vm-device-paths
