defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [scripts, binaries]
  attack: T1497.001
traits:
  - id: go-klauspost-cpuid-lib
    desc: klauspost cpuid library markers
    crit: baseline
    conf: 0.99
    if:
      type: text
      substr: github.com/klauspost/cpuid/v2
  - id: go-cpuid-vendor-table
    desc: Go cpuid hypervisor vendor table
    crit: baseline
    conf: 0.99
    for:
      - binaries
    if:
      type: text
      substr: TCGTCGTCGTCGMicrosoft HvVMwareVMwareXenVMMXenVMMbhyve bhyve
  - id: vendor-xen-upper
    desc: XEN hypervisor (uppercase)
    crit: suspicious
    conf: 0.6
    if:
      type: text
      exact: XEN
  - id: vendor-xen-title
    desc: Xen hypervisor (titlecase)
    crit: notable
    conf: 0.6
    if:
      type: text
      exact: Xen
  - id: vendor-kvm-upper
    desc: KVM hypervisor (uppercase)
    crit: notable
    conf: 0.6
    if:
      type: text
      exact: KVM
  - id: vendor-kvm-repeat
    desc: KVMKVMKVM hypervisor signature
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: KVMKVMKVM
    unless:
      - type: raw
        regex: qemu-ga.*VBoxSF.*VBoxMouse.*VBoxGuest
      - id: go-cpuid-vendor-table
      - type: raw
        regex: AuthenticAMD.*GenuineIntel.*KVMKVMKVMKVM.*Microsoft Hv.*VMware.*XenVMM.*bhyve
      - type: text
        exact: VMware Tools
    downgrade:
      any:
        - id: go-klauspost-cpuid-lib
        - id: objectives/discovery/system/hardware::gopsutil-import
  - id: vendor-vmware
    desc: VMware hypervisor vendor string
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: VMware
      case_insensitive: true
    unless:
      - id: metadata/signed/developer::intel-corporation
      - type: text
        regex: VMware (Screen Codec|virtualized renderer|driver)
      - type: text
        exact: SOFTWARE\VMware, Inc.\VMware Tools
      - id: metadata/package::virtualbox-platform-component
      - type: raw
        regex: (?i)\b(kvm|xen|vbox|bhyve)\b
      - type: raw
        regex: (?i)\bparallels\b
    not:
      - regex: (?i)\bvmware\.\d+\.sg\b
  - id: vendor-virtualbox
    desc: VirtualBox hypervisor vendor string
    crit: notable
    conf: 0.6
    if:
      type: text
      word: VirtualBox
      case_insensitive: true
    unless:
      - id: metadata/signed/developer::intel-corporation
      - id: metadata/signed/developer::oracle-america
      - id: metadata/package::virtualbox-platform-component
      - type: text
        regex: application/x-virtualbox-[a-z0-9-]+
      - type: text
        exact: SYSTEM\ControlSet001\Services\VBoxGuest
    downgrade:
      any:
        - type: text
          regex: docker-machine|libmachine|minikube|vagrant
  - id: vendor-vbox-short
    desc: VBOX hypervisor short string
    crit: notable
    conf: 0.6
    if:
      type: text
      exact: VBOX
    unless:
      - id: metadata/signed/developer::intel-corporation
      - type: raw
        regex: qemu-ga.*VBoxSF.*VBoxMouse.*VBoxGuest
      - type: text
        exact: SYSTEM\ControlSet001\Services\VBoxGuest
      - id: metadata/package::virtualbox-platform-component
  - id: vendor-hyperv-dash
    desc: Hyper-V hypervisor vendor string
    crit: suspicious
    conf: 0.6
    for:
      - binaries
    if:
      type: text
      substr: Hyper-V
      case_insensitive: true
    unless:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/signed/developer::oracle-america
      - type: text
        regex: (Cannot open WMI provider \{0\}\. Hyper-V|Hyper-V backup works)
      - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - type: metrics
        field: binary.section_count
        max: 0
  - id: vendor-microsoft-hv
    desc: Microsoft Hv hypervisor string
    crit: notable
    conf: 0.6
    if:
      type: text
      exact: Microsoft Hv
      case_insensitive: true
    unless:
      - type: raw
        regex: qemu-ga.*VBoxSF.*VBoxMouse.*VBoxGuest
      - id: metadata/signed/developer::oracle-america
      - id: go-cpuid-vendor-table
      - type: raw
        regex: AuthenticAMD.*GenuineIntel.*KVMKVMKVMKVM.*Microsoft Hv.*VMware.*XenVMM.*bhyve
      - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
      - id: metadata/signed/platform::microsoft
  - id: vendor-microsoft-render
    desc: Microsoft Basic Render (potential VM GPU)
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: Microsoft Basic Render
  - id: analysis-user-george
    desc: Analysis username 'george'
    crit: suspicious
    conf: 0.9
    for: [shell, python, javascript, powershell, pe, elf]
    if:
      type: raw
      regex: (?i)(users|home)[\\/][^\n]{0,20}[\\/]george([\\/]|$)
    unless:
      - type: basename
        regex: (^|[\\/]).*_test\.go$
      - id: micro-behaviors/communications/http/upload::yarn-standalone-bundle
  - id: analysis-user-bruno
    desc: Analysis username 'Bruno'
    crit: suspicious
    conf: 0.9
    for: [python, javascript, powershell]
    if:
      type: text
      substr: '"Bruno"'
    unless:
      - type: raw
        regex: defmodule\s+Faker\.Person\.|sampler\(:(first_name|last_name)
    downgrade:
      any:
        - id: metadata/package/testing/presence::faker-word
  - id: analysis-user-abby
    desc: Analysis username 'Abby'
    crit: suspicious
    conf: 0.9
    for: [python, javascript, powershell]
    if:
      type: text
      substr: '"Abby"'
    unless:
      - type: raw
        regex: defmodule\s+Faker\.Person\.|sampler\(:(first_name|last_name)
    downgrade:
      any:
        - id: metadata/package/testing/presence::faker-word
  - id: analysis-user-amf
    desc: Analysis username 'AMF'
    crit: suspicious
    conf: 0.9
    for: [python, javascript, powershell, pe, elf]
    if:
      type: text
      substr: '"AMF"'
  - id: is-vt-symbol
    desc: Check for 'IsVT' symbol (potential VM detection)
    crit: notable
    conf: 0.8
    for: [elf, macho, pe]
    if:
      type: symbol
      substr: IsVT
  - id: vendor-qemu
    desc: QEMU hypervisor vendor string
    crit: notable
    conf: 0.7
    if:
      type: text
      exact: QEMU
    unless:
      - id: metadata/signed/developer::intel-corporation
      - id: metadata/package::virtualbox-platform-component
  - id: vendor-parallels
    desc: Parallels hypervisor vendor string
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: Parallels
    downgrade:
      any:
        - type: text
          substr: docker-machine
        - type: text
          substr: libmachine
        - type: text
          substr: minikube
        - type: text
          substr: vagrant
  - id: vendor-bhyve
    desc: bhyve hypervisor vendor string
    crit: component
    conf: 0.7
    for: [pe, elf, macho, shell, python, javascript]
    if:
      type: text
      substr: bhyve
    unless:
      - type: text
        exact: 'bhyve bhyve '
      - type: text
        substr: KVMKVMKVMKVMMicrosoft HvVMwareVMwareXenVMMXenVMMbhyve bhyve
      - type: raw
        regex: AuthenticAMD.*GenuineIntel.*KVMKVMKVMKVM.*Microsoft Hv.*VMware.*XenVMM.*bhyve
      - type: raw
        regex: '(?i)\b(vmware|kvm|xen|vbox)\b'
  - id: file-vbox-guest
    desc: VirtualBox guest additions file
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: VBoxGuest
    unless:
      - type: raw
        regex: qemu-ga.*VBoxSF.*VBoxMouse.*VBoxGuest
      - type: text
        substr: AdditionsFacilityType_VBoxGuestDriver
      - type: text
        exact: SYSTEM\ControlSet001\Services\VBoxGuest
      - id: metadata/package::virtualbox-platform-component
  - id: file-vbox-mouse
    desc: VirtualBox mouse driver file
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: VBoxMouse
    unless:
      - id: metadata/signed/developer::intel-corporation
      - type: raw
        regex: qemu-ga.*VBoxSF.*VBoxMouse.*VBoxGuest
      - type: text
        exact: SYSTEM\ControlSet001\Services\VBoxMouse
  - id: file-vbox-sf
    desc: VirtualBox shared folders file
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: VBoxSF
    unless:
      - type: raw
        regex: qemu-ga.*VBoxSF.*VBoxMouse.*VBoxGuest
      - type: text
        exact: SYSTEM\ControlSet001\Services\VBoxSF
  - id: file-vmware-tools
    desc: VMware tools binary
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: vmware-tools
  - id: file-vmtoolsd
    desc: VMware tools daemon
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: vmtoolsd
    unless:
      - type: raw
        regex: qemu-ga.*VBoxSF.*VBoxMouse.*VBoxGuest
  - id: file-vmhgfs
    desc: VMware host-guest filesystem
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: /vmhgfs
  - id: file-qemu-ga
    desc: QEMU guest agent
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: qemu-ga
    unless:
      - type: raw
        regex: qemu-ga.*VBoxSF.*VBoxMouse.*VBoxGuest
  - id: mac-vmware-1
    desc: VMware MAC prefix 00:0c:29
    crit: suspicious
    conf: 0.8
    for:
      - binaries
    if:
      type: text
      substr: 00:0c:29
      case_insensitive: true
    downgrade:
      any:
        - id: micro-behaviors/os/sysinfo/network::get-adapters-addresses
        - id: micro-behaviors/os/sysinfo/network::get-adapters-info
        - type: metrics
          field: binary.string_count
          min: 10000
  - id: mac-vmware-2
    desc: VMware MAC prefix 00:50:56
    crit: suspicious
    conf: 0.8
    for:
      - binaries
    if:
      type: text
      substr: 00:50:56
    downgrade:
      any:
        - id: micro-behaviors/os/sysinfo/network::get-adapters-addresses
        - id: micro-behaviors/os/sysinfo/network::get-adapters-info
        - type: metrics
          field: binary.string_count
          min: 10000
  - id: mac-vmware-3
    desc: VMware MAC prefix 00:05:69
    crit: suspicious
    conf: 0.8
    for:
      - binaries
    if:
      type: text
      substr: 00:05:69
    downgrade:
      any:
        - id: micro-behaviors/os/sysinfo/network::get-adapters-addresses
        - id: micro-behaviors/os/sysinfo/network::get-adapters-info
        - type: metrics
          field: binary.string_count
          min: 10000
  - id: mac-vbox
    desc: VirtualBox MAC prefix 08:00:27
    crit: suspicious
    conf: 0.8
    for:
      - binaries
    if:
      type: text
      substr: 08:00:27
    downgrade:
      any:
        - id: micro-behaviors/os/sysinfo/network::get-adapters-addresses
        - id: micro-behaviors/os/sysinfo/network::get-adapters-info
        - type: metrics
          field: binary.string_count
          min: 10000
  - id: mac-xen
    desc: Xen MAC prefix 00:16:3e
    crit: suspicious
    conf: 0.8
    for:
      - binaries
    if:
      type: text
      substr: 00:16:3e
      case_insensitive: true
    downgrade:
      any:
        - id: micro-behaviors/os/sysinfo/network::get-adapters-addresses
        - id: micro-behaviors/os/sysinfo/network::get-adapters-info
        - type: metrics
          field: binary.string_count
          min: 10000
  - id: mac-hyperv
    desc: Hyper-V MAC prefix 00:15:5d
    crit: suspicious
    conf: 0.8
    for:
      - binaries
    if:
      type: text
      substr: 00:15:5d
      case_insensitive: true
    downgrade:
      any:
        - id: micro-behaviors/os/sysinfo/network::get-adapters-addresses
        - id: micro-behaviors/os/sysinfo/network::get-adapters-info
        - type: metrics
          field: binary.string_count
          min: 10000
  - id: mac-parallels
    desc: Parallels MAC prefix 00:1c:42
    crit: suspicious
    conf: 0.8
    for:
      - binaries
    if:
      type: text
      substr: 00:1c:42
      case_insensitive: true
    downgrade:
      any:
        - type: metrics
          field: binary.string_count
          min: 10000
  - id: mac-qemu
    desc: QEMU/KVM MAC prefix 52:54:00
    crit: suspicious
    conf: 0.8
    for:
      - binaries
    if:
      type: text
      substr: '52:54:00'
    downgrade:
      any:
        - id: micro-behaviors/os/sysinfo/network::get-adapters-addresses
        - id: micro-behaviors/os/sysinfo/network::get-adapters-info
        - type: metrics
          field: binary.string_count
          min: 10000
  - id: cloud-metadata
    desc: Cloud provider metadata access (VM
    crit: suspicious
    conf: 0.7
    for: [shell, python, javascript, powershell, pe, elf]
    if:
      type: text
      substr: 169.254.169.123
  - id: cpuid-check-a
    desc: CPUID with hypervisor vendors A
    crit: suspicious
    conf: 0.9
    if:
      type: text
      case_insensitive: true
      regex: cpuid.{0,80}(hypervisor|vmware|kvm)
    unless:
      - id: metadata/signed/developer::oracle-america
    not:
      - regex: github\.com/klauspost/cpuid/v2\.(hypervisorVendorID|vendorID)
      - regex: (positive|negative) result
      - substr: CPUID hypervisor bit is set
    downgrade:
      any:
        - id: go-klauspost-cpuid-lib
  - id: cpuid-check-b
    desc: CPUID with hypervisor vendors B
    crit: suspicious
    conf: 0.9
    if:
      type: text
      case_insensitive: true
      regex: cpuid.{0,80}(xen|qemu)|hypervisor\s*flag
    not:
      - regex: indicates
  - id: hardware-model-cmd
    desc: Checks hardware model command output
    crit: suspicious
    conf: 0.8
    for: [shell, powershell, python, javascript]
    if:
      type: text
      regex: system_profiler.{0,30}Model|wmic.{0,30}computersystem.{0,30}model
  - id: hardware-model-linux-path
    desc: Checks Linux DMI virtual devices path
    crit: component
    conf: 0.8
    for: [shell, python, javascript, pe, elf]
    if:
      type: text
      substr: /sys/devices/virtual/dmi
composite_rules:
  - id: hardware-model
    desc: Checks hardware model for VM
    crit: suspicious
    conf: 0.8
    any:
      - id: cpuid-check
      - id: hardware-model-cmd
      - id: hardware-model-linux-path
  - id: cpuid-check
    desc: CPUID instruction for hypervisor detection
    crit: suspicious
    conf: 0.9
    any:
      - id: cpuid-check-a
      - id: cpuid-check-b
  - id: vendor-xen
    desc: Xen hypervisor vendor string
    crit: notable
    conf: 0.7
    any:
      - id: vendor-xen-upper
      - id: vendor-xen-title
  - id: vendor-kvm
    desc: KVM hypervisor vendor string
    crit: notable
    conf: 0.7
    any:
      - id: vendor-kvm-upper
      - id: vendor-kvm-repeat
  - id: vendor-vbox
    desc: VirtualBox hypervisor vendor string
    crit: notable
    conf: 0.7
    any:
      - id: vendor-virtualbox
      - id: vendor-vbox-short
  - id: vendor-hyperv
    desc: Hyper-V hypervisor vendor string
    crit: notable
    conf: 0.7
    any:
      - id: vendor-hyperv-dash
      - id: vendor-microsoft-hv
      - id: hypervisor-vendor
  - id: dmi-check
    desc: DMI/SMBIOS check for VM detection
    crit: notable
    conf: 0.85
    any:
      - id: hardware-model
      - id: cpuid-check
  - id: file-check
    desc: Checks for VM-specific files
    crit: notable
    conf: 0.85
    any:
      - id: file-vbox-guest
      - id: file-vbox-mouse
      - id: file-vbox-sf
      - id: file-vmware-tools
      - id: file-vmtoolsd
      - id: file-vmhgfs
      - id: file-qemu-ga
      - id: micro-behaviors/fs/path/device/storage::dev-vda
  - id: mac-prefix
    desc: Checks for VM MAC address
    crit: notable
    conf: 0.85
    for:
      - binaries
    any:
      - id: mac-vmware-1
      - id: mac-vmware-2
      - id: mac-vmware-3
      - id: mac-vbox
      - id: mac-xen
      - id: mac-hyperv
      - id: mac-parallels
      - id: mac-qemu
  - id: container-check
    desc: Container environment detection
    crit: notable
    conf: 0.75
    any:
      - id: micro-behaviors/os/container/runtime/
  - id: comprehensive-evasion
    desc: Multiple VM detection techniques (evasion)
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: vendor-vmware
      - id: vendor-vbox
      - id: vendor-qemu
      - id: vendor-xen
      - id: mac-vmware-1
      - id: mac-vbox
      - id: micro-behaviors/os/container/runtime::dockerenv
      - id: file-vmtoolsd
      - id: micro-behaviors/process/exit/
    unless:
      - id: metadata/package::virtualbox-platform-component
    downgrade:
      any:
        - type: text
          substr: smbios
          case_insensitive: true
        - type: metrics
          field: binary.string_count
          min: 10000
  - id: vm-profiling-exfil
    desc: VM detection with system profiling and exfiltration
    crit: notable
    conf: 0.95
    mbc: B0003
    all:
      - id: hypervisor-vendor
      - id: micro-behaviors/communications/http/request::http-client-usage
      - id: objectives/discovery/system/fingerprint/hardware::js-profiling
  - id: hypervisor-vendor
    desc: Checks for hypervisor vendor strings
    crit: notable
    conf: 0.85
    any:
      - id: vendor-xen
      - id: vendor-kvm
      - id: vendor-vmware
      - id: vendor-vbox
      - id: vendor-hyperv
      - id: vendor-qemu
      - id: vendor-parallels
      - id: vendor-bhyve
    unless:
      - id: metadata/package::virtualbox-platform-component
  - id: vm-aware-beacon
    desc: VM/sandbox detection combined with C2 beaconing
    crit: hostile
    conf: 0.93
    mbc: B0003
    all:
      - id: objectives/command-and-control/beacon/network/periodic::c2-polling-beacon
    any:
      - id: comprehensive-evasion
      - id: dmi-check
      - id: file-check
      - id: objectives/anti-analysis/vm-detect::bios-vm-check-and-exit
