defaults:
  for: [pe]
  platforms: [windows]
  attack: T1497.001
traits:
- id: wildcard-vm-vendor-markers
  desc: Wildcard VM vendor markers
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "*VMWARE*|*VBOX*|*VIRTUAL*|*QEMU*"
  unless:
  - id: metadata/signed/platform::microsoft

- id: disk-enum-vmcheck-cluster
  desc: Disk enum vmcheck cluster
  crit: component
  conf: 0.94
  if:
    type: text
    substr: SYSTEM\ControlSet001\Services\Disk\Enum

- id: vmcheck-debugger-api-block
  desc: vmcheck debugger API block
  crit: component
  conf: 0.94
  if:
    type: text
    substr: GetUserNameA|vmcheck.dll|IsDebuggerPresent

composite_rules:
- id: packed-loader-vmcheck-markers
  desc: Packed loader VM check markers
  crit: suspicious
  conf: 0.94
  all:
  - id: wildcard-vm-vendor-markers
  - id: disk-enum-vmcheck-cluster
  - id: vmcheck-debugger-api-block
  any:
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
  - id: objectives/anti-analysis/vm-detect::vendor-vmware
  - id: objectives/anti-analysis/vm-detect::vendor-vbox-short
  - id: objectives/evasion/process/injection/hollowing::pipe-delimited-hollowing-setup
  unless:
  - id: metadata/signed/platform::microsoft
