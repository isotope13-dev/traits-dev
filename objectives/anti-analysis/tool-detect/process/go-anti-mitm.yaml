defaults:
  platforms: [windows]
  for: [pe, go]
  attack: T1622

traits:
  - id: go-check-anti-mitm
    desc: Go anti-MITM check
    crit: component
    conf: 0.92
    if:
      type: symbol
      exact: main.checkAntiMitm

  - id: go-mitm-process-list
    desc: Go MITM process list
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: main.getMitmProcs

  - id: go-mitm-certificate-check
    desc: Go MITM certificate check
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: main.checkMitmCerts

  - id: go-mitm-issuer-list
    desc: Go MITM issuer list
    crit: component
    conf: 0.88
    if:
      type: symbol
      exact: main.getMitmIssuers

composite_rules:
  - id: go-anti-mitm-tool-detection
    desc: Go anti-MITM tool detection
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: go-check-anti-mitm
      - id: go-mitm-process-list
      - id: go-mitm-certificate-check
      - id: go-mitm-issuer-list

