defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  attack: T1518.001
  mbc: B0013
traits:
- id: fiddler-detection-message
  desc: Fiddler detection warning text
  crit: component
  conf: 0.96
  if:
    type: text
    substr: Fiddler has been detected
- id: fiddler-process-open-message
  desc: Fiddler running warning text
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Fiddler process is openned
- id: fiddler-program-icon-path
  desc: Fiddler program icon path
  crit: component
  conf: 0.82
  if:
    type: text
    substr: '\Programs\Fiddler\App.ico'
- id: httpdebuggerpro-browser-dll
  desc: HTTPDebuggerPro browser DLL path
  crit: component
  conf: 0.95
  if:
    type: text
    substr: 'HTTPDebuggerPro\HTTPDebuggerBrowser.dll'
- id: httpdebuggerpro-install-paths
  desc: Multiple HTTPDebuggerPro paths
  crit: component
  conf: 0.94
  count_min: 2
  if:
    type: text
    regex: '[CDF]:\\Program Files \(x86\)\\HTTPDebuggerPro\\HTTPDebuggerBrowser\.dll'
composite_rules:
- id: dotnet-http-debugger-detection
  desc: .NET HTTP debugger detection
  crit: suspicious
  conf: 0.96
  all:
  - id: metadata/binary/framework::dotnet-assembly
  any:
  - id: fiddler-detection-message
  - id: fiddler-process-open-message
  - id: fiddler-program-icon-path
  - id: httpdebuggerpro-browser-dll
  - id: httpdebuggerpro-install-paths
  needs: 2
- id: dotnet-delete-on-http-debugger
  desc: Deletes itself when HTTP debugger found
  crit: hostile
  conf: 0.97
  all:
  - id: dotnet-http-debugger-detection
  - id: fiddler-detection-message
  - id: objectives/evasion/self-delete/process::windows-ping-delete-command
  any:
  - id: fiddler-process-open-message
  - id: httpdebuggerpro-install-paths
  - id: micro-behaviors/fs/delete/file::dotnet-file-delete-api
  unless:
  - id: well-known/tool/sysadmin/sandboxie::signed-sandboxie-component
