defaults:
  attack: T1518.001
  mbc: B0013
traits:
  - id: wireshark-process
    desc: Wireshark network analyzer process
    crit: notable
    conf: 0.8
    for:
      - pe
      - elf
      - macho
    if:
      type: string
      regex: (?i)(wireshark|tshark|dumpcap)\.exe
  - id: fiddler-process
    desc: Fiddler HTTP debugger process
    crit: notable
    conf: 0.8
    for:
      - pe
    if:
      type: string
      regex: (?i)\bfiddler\.exe\b
  - id: burpsuite-process
    desc: Burp Suite proxy process
    crit: notable
    conf: 0.8
    for:
      - pe
      - elf
      - macho
    if:
      type: string
      regex: (?i)(burpsuite|burp\.jar)
  - id: charles-proxy
    desc: Charles Proxy process
    crit: notable
    conf: 0.8
    for:
      - pe
      - macho
    if:
      type: string
      regex: (?i)charles(\.exe)?
  - id: procmon-process
    desc: Process Monitor (Sysinternals)
    crit: notable
    conf: 0.85
    for:
      - pe
    if:
      type: string
      regex: (?i)proc(mon|exp)(64)?\.exe
  - id: process-hacker-dup
    desc: Process Hacker tool
    crit: notable
    conf: 0.85
    for:
      - pe
    if:
      type: string
      regex: (?i)processhacker(2)?\.exe
  - id: autoruns-process
    desc: Autoruns (Sysinternals)
    crit: notable
    conf: 0.8
    for:
      - pe
    if:
      type: string
      regex: (?i)autoruns(c)?(64)?\.exe
  - id: tcpview-process
    desc: TCPView (Sysinternals)
    crit: notable
    conf: 0.8
    for:
      - pe
    if:
      type: string
      regex: (?i)tcpview(64)?\.exe
  - id: x64dbg-process
    desc: x64dbg/x32dbg debugger
    crit: notable
    conf: 0.9
    for:
      - pe
    if:
      type: string
      regex: (?i)x(32|64)dbg\.exe
  - id: ollydbg-process
    desc: OllyDbg debugger
    crit: notable
    conf: 0.9
    for:
      - pe
    if:
      type: string
      regex: (?i)olly(dbg|ice)\.exe
    downgrade:
      any:
        - id: metadata/purpose/debug-tool::ollydbg-plugin-export
  - id: ida-process
    desc: IDA Pro disassembler
    crit: notable
    conf: 0.9
    for:
      - pe
      - elf
      - macho
    if:
      type: string
      regex: (?i)(ida(64)?|idaq(64)?)\.exe
  - id: windbg-process
    desc: WinDbg debugger
    crit: notable
    conf: 0.85
    for:
      - pe
    if:
      type: string
      regex: (?i)windbg(x)?\.exe
  - id: ghidra-process
    desc: Ghidra reverse engineering tool
    crit: notable
    conf: 0.85
    for:
      - pe
      - elf
      - macho
    if:
      type: string
      regex: (?i)(ghidra|ghidraRun)
  - id: regshot-process
    desc: Regshot registry monitor
    crit: notable
    conf: 0.8
    for:
      - pe
    if:
      type: string
      regex: (?i)regshot(64)?\.exe
  - id: api-monitor
    desc: API Monitor tool
    crit: notable
    conf: 0.85
    for:
      - pe
    if:
      type: string
      regex: (?i)apimonitor(-x64)?\.exe
  - id: http-debugger
    desc: HTTP Debugger UI
    crit: notable
    conf: 0.85
    for:
      - pe
    if:
      type: string
      regex: (?i)httpdebugger(ui)?\.exe
  - id: cheatengine-process
    desc: Cheat Engine memory editor
    crit: notable
    conf: 0.9
    for:
      - pe
    if:
      type: string
      regex: (?i)cheatengine[_-]?(x86[_-]?64|i386|x64)?\.exe
  - id: pestudio-process
    desc: PEStudio analysis tool
    crit: notable
    conf: 0.85
    for:
      - pe
    if:
      type: string
      regex: (?i)pestudio\.exe
  - id: peid-process
    desc: PEiD packer identifier
    crit: notable
    conf: 0.85
    for:
      - pe
    if:
      type: string
      regex: (?i)peid\.exe
composite_rules:
  - id: network-analyzer
    desc: Network analysis tool detection
    crit: notable
    conf: 0.8
    any:
      - id: wireshark-process
      - id: fiddler-process
      - id: burpsuite-process
      - id: charles-proxy
      - id: tcpview-process
  - id: process-analyzer
    desc: Process analysis tool detection
    crit: notable
    conf: 0.85
    any:
      - id: procmon-process
      - id: objectives/anti-analysis/tool-detect/process::process-hacker-dup
      - id: autoruns-process
      - id: api-monitor
      - id: http-debugger
      - id: cheatengine-process
  - id: debugger-tool
    desc: Debugger tool detection
    crit: notable
    conf: 0.85
    any:
      - id: x64dbg-process
      - id: ollydbg-process
      - id: ida-process
      - id: windbg-process
      - id: ghidra-process
  - id: analysis-tool-enumeration
    desc: Multiple analysis tools enumerated
    crit: suspicious
    conf: 0.9
    for:
      - pe
      - elf
      - macho
    needs: 3
    any:
      - id: network-analyzer
      - id: process-analyzer
      - id: debugger-tool
      - id: regshot-process
      - id: pestudio-process
      - id: peid-process
