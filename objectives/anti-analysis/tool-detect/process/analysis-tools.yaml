defaults:
  platforms:
    - linux
    - macos
    - windows
  attack: T1518.001
  mbc: B0013
traits:
  - id: wireshark-process
    desc: Wireshark network analyzer process
    crit: notable
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)(wireshark|tshark|dumpcap)\.exe
    unless:
      - id: well-known/app/wireshark/
      - type: path
        substr: Wireshark-
  - id: fiddler-process
    desc: Fiddler HTTP debugger process
    crit: suspicious
    conf: 0.8
    for:
      - pe
    if:
      type: text
      regex: (?i)\bfiddler\.exe\b
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bfiddler\.exe\b
    unless:
      - id: metadata/signed/leaf::progress-software-corporation
  - id: burpsuite-process
    desc: Burp Suite proxy process
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)\b(burpsuite(pro|community)?\.exe|burp\.jar)\b
    unless:
      - id: well-known/tool/offensive/pwn/
  - id: charles-proxy
    desc: Charles Proxy process
    crit: suspicious
    conf: 0.8
    for:
      - pe
      - macho
    if:
      type: text
      regex: (?i)\bcharles\.exe\b
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bcharles(\.exe)?\b
  - id: procmon-process
    desc: Process Monitor process name
    crit: suspicious
    conf: 0.85
    for:
      - pe
    if:
      type: text
      regex: (?i)procmon(64)?\.exe
    downgrade:
      any:
        - id: well-known/tool/sysadmin/sysinternals/
    unless:
      - id: well-known/tool/sysadmin/sysinternals/
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bproc(mon|exp)(64)?\.exe\b
  - id: procexp-process
    desc: Process Explorer process name
    crit: suspicious
    conf: 0.85
    for: [pe]
    if:
      type: text
      regex: (?i)procexp(64)?\.exe
  - id: autoruns-process
    desc: Autoruns (Sysinternals)
    crit: suspicious
    conf: 0.8
    for:
      - pe
    if:
      type: text
      regex: (?i)autoruns(c)?(64)?\.exe
    downgrade:
      any:
        - id: well-known/tool/sysadmin/sysinternals/
    unless:
      - id: well-known/tool/sysadmin/sysinternals/
  - id: tcpview-process
    desc: TCPView (Sysinternals)
    crit: suspicious
    conf: 0.8
    for:
      - pe
    if:
      type: text
      regex: (?i)tcpview(64)?\.exe
  - id: x64dbg-process
    desc: x64dbg/x32dbg debugger
    crit: suspicious
    conf: 0.9
    for:
      - pe
    if:
      type: text
      regex: (?i)x(32|64)dbg\.exe
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bx(32|64)dbg\.exe\b
    unless:
      - id: well-known/tool/reverse-engineering/x64dbg/
  - id: ollydbg-process
    desc: OllyDbg debugger
    crit: suspicious
    conf: 0.9
    for:
      - pe
    if:
      type: text
      regex: (?i)olly(dbg|ice)\.exe
    downgrade:
      any:
        - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
    unless:
      - id: well-known/tool/reverse-engineering/ollydbg::ollydbg-executable-marker
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bolly(dbg|ice)\.exe\b
  - id: ida-process
    desc: IDA Pro disassembler
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)(ida(64)?|idaq(64)?)\.exe
    unless:
      - id: well-known/tool/reverse-engineering/frida/
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\b(ida(64)?|idaq(64)?)\.exe\b
  - id: windbg-process
    desc: WinDbg debugger
    crit: suspicious
    conf: 0.85
    for:
      - pe
    if:
      type: text
      regex: (?i)windbg(x)?\.exe
  - id: ghidra-process
    desc: Ghidra reverse engineering tool
    crit: suspicious
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      regex: "(?i)\\b(ghidra\\.exe|ghidraRun)\\b"
    not:
      - substr: ghidrahacker
      - substr: unixAhomChamKawiLisuMiaoModiNewa
    unless:
      - type: text
        substr: pepperghidrahacker
      - id: well-known/tool/reverse-engineering/ghidra::ghidra-reverse-engineering-suite
      - id: well-known/app/homebrew::source-tree
  - id: regshot-process
    desc: Regshot registry monitor
    crit: suspicious
    conf: 0.8
    for:
      - pe
    if:
      type: text
      regex: (?i)regshot(64)?\.exe
  - id: api-monitor
    desc: API Monitor tool
    crit: suspicious
    conf: 0.85
    for:
      - pe
    if:
      type: text
      regex: (?i)apimonitor(-x64)?\.exe
  - id: http-debugger
    desc: HTTP Debugger UI
    crit: suspicious
    conf: 0.85
    for:
      - pe
    if:
      type: text
      regex: (?i)httpdebugger(ui)?\.exe
  - id: cheatengine-process
    desc: Cheat Engine memory editor
    crit: suspicious
    conf: 0.9
    for:
      - pe
    if:
      type: text
      regex: (?i)cheatengine[_-]?(x86[_-]?64|i386|x64)?\.exe
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bcheatengine[_-]?(x86[_-]?64|i386|x64)?\.exe\b
  - id: pestudio-process
    desc: PEStudio analysis tool
    crit: suspicious
    conf: 0.85
    for:
      - pe
    if:
      type: text
      regex: (?i)pestudio\.exe
  - id: peid-process
    desc: PEiD packer identifier
    crit: suspicious
    conf: 0.85
    for:
      - pe
    if:
      type: text
      regex: (?i)peid\.exe
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bpeid\.exe\b
composite_rules:
  - id: runtime-process-enumeration
    desc: Runtime process enumeration support
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
      - id: micro-behaviors/process/enumerate/snapshot::dynamic-toolhelp-enumerator
      - id: micro-behaviors/process/enumerate/psapi::psapi-process-scan
      - id: micro-behaviors/process/enumerate/psapi::psapi-dynamic-resolve
  - id: network-analyzer
    desc: Network analysis tool detection
    crit: suspicious
    conf: 0.8
    any:
      - id: wireshark-process
      - id: fiddler-process
      - id: burpsuite-process
      - id: charles-proxy
      - id: tcpview-process
  - id: process-analyzer
    desc: Process analysis tool detection
    crit: suspicious
    conf: 0.85
    any:
      - id: procmon-process
      - id: procexp-process
      - id: objectives/anti-analysis/sandbox-detect/tool-references::process-hacker
      - id: autoruns-process
      - id: api-monitor
      - id: http-debugger
      - id: cheatengine-process
  - id: debugger-tool
    desc: Debugger tool detection
    crit: suspicious
    conf: 0.85
    any:
      - id: x64dbg-process
      - id: ollydbg-process
      - id: ida-process
      - id: windbg-process
      - id: ghidra-process
  - id: analysis-tool-enumeration
    desc: Multiple analysis tools enumerated
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    all:
      - id: runtime-process-enumeration
    needs: 3
    any:
      - id: network-analyzer
      - id: process-analyzer
      - id: debugger-tool
      - id: regshot-process
      - id: pestudio-process
      - id: peid-process
  - id: analysis-tool-aware-credential-stealer
    desc: Credential stealer carries analysis-tool process names
    crit: hostile
    conf: 0.99
    attack: "T1518.001,T1555"
    for: [binaries, scripts]
    all:
      - id: objectives/exfiltration/stealer/file::networked-wallet-and-credential-file-stealer
    any:
      - id: procmon-process
      - id: procexp-process
      - id: objectives/anti-analysis/sandbox-detect/tool-references::process-hacker
    unless:
      - id: well-known/tool/detection/
  - id: overlay-loader-with-analysis-tool-catalog
    desc: PE self-extracting loader enumerates debuggers and analysis tools
    crit: hostile
    conf: 0.98
    attack: T1518.001,T1027.009,T1497
    for: [binaries]
    all:
      - id: analysis-tool-enumeration
      - id: objectives/anti-static/obfuscation/payload/self-read::pe-overlay-self-extractor
      - id: metadata/binary/layout::pe-multiple-tls-callbacks
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
