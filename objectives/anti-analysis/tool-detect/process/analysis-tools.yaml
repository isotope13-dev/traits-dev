# Analysis Tool Detection
# ATT&CK: T1518.001 (Software Discovery: Security Software Discovery)
# MBC: B0013 (Security Software Discovery)
#
# Malware detects the presence of analysis tools (debuggers, network
# analyzers, process monitors) to evade dynamic analysis.
defaults:
  attack: "T1518.001"
  mbc: "B0013"
traits:
  # === Network Analysis Tools ===
  - id: wireshark-process
    desc: Wireshark network analyzer process
    crit: notable
    conf: 0.8
    for: [pe, elf, macho]
    if:
      type: string
      regex: '(?i)(wireshark|tshark|dumpcap)\.exe'
  - id: fiddler-process
    desc: Fiddler HTTP debugger process
    crit: notable
    conf: 0.8
    for: [pe]
    if:
      type: string
      regex: '(?i)\bfiddler\.exe\b'
  - id: burpsuite-process
    desc: Burp Suite proxy process
    crit: notable
    conf: 0.8
    for: [pe, elf, macho]
    if:
      type: string
      regex: '(?i)(burpsuite|burp\.jar)'
  - id: charles-proxy
    desc: Charles Proxy process
    crit: notable
    conf: 0.8
    for: [pe, macho]
    if:
      type: string
      regex: '(?i)charles(\.exe)?'
  # === Sysinternals / Process Analysis ===
  - id: procmon-process
    desc: Process Monitor (Sysinternals)
    crit: notable
    conf: 0.85
    for: [pe]
    if:
      type: string
      regex: '(?i)proc(mon|exp)(64)?\.exe'
  - id: process-hacker
    desc: Process Hacker tool
    crit: notable
    conf: 0.85
    for: [pe]
    if:
      type: string
      regex: '(?i)processhacker(2)?\.exe'
  - id: autoruns-process
    desc: Autoruns (Sysinternals)
    crit: notable
    conf: 0.8
    for: [pe]
    if:
      type: string
      regex: '(?i)autoruns(c)?(64)?\.exe'
  - id: tcpview-process
    desc: TCPView (Sysinternals)
    crit: notable
    conf: 0.8
    for: [pe]
    if:
      type: string
      regex: '(?i)tcpview(64)?\.exe'
  # === Debuggers ===
  - id: x64dbg-process
    desc: x64dbg/x32dbg debugger
    crit: notable
    conf: 0.9
    for: [pe]
    if:
      type: string
      regex: '(?i)x(32|64)dbg\.exe'
  - id: ollydbg-process
    desc: OllyDbg debugger
    crit: notable
    conf: 0.9
    for: [pe]
    if:
      type: string
      regex: '(?i)olly(dbg|ice)\.exe'
  - id: ida-process
    desc: IDA Pro disassembler
    crit: notable
    conf: 0.9
    for: [pe, elf, macho]
    if:
      type: string
      regex: '(?i)(ida(64)?|idaq(64)?)\.exe'
  - id: windbg-process
    desc: WinDbg debugger
    crit: notable
    conf: 0.85
    for: [pe]
    if:
      type: string
      regex: '(?i)windbg(x)?\.exe'
  - id: ghidra-process
    desc: Ghidra reverse engineering tool
    crit: notable
    conf: 0.85
    for: [pe, elf, macho]
    if:
      type: string
      regex: '(?i)(ghidra|ghidraRun)'
  # === Sandbox/VM Tools ===
  - id: regshot-process
    desc: Regshot registry monitor
    crit: notable
    conf: 0.8
    for: [pe]
    if:
      type: string
      regex: '(?i)regshot(64)?\.exe'
  - id: api-monitor
    desc: API Monitor tool
    crit: notable
    conf: 0.85
    for: [pe]
    if:
      type: string
      regex: '(?i)apimonitor(-x64)?\.exe'
  - id: http-debugger
    desc: HTTP Debugger UI
    crit: notable
    conf: 0.85
    for: [pe]
    if:
      type: string
      regex: '(?i)httpdebugger(ui)?\.exe'
  # === Game Hacking / Memory Tools ===
  - id: cheatengine-process
    desc: Cheat Engine memory editor
    crit: notable
    conf: 0.9
    for: [pe]
    if:
      type: string
      regex: '(?i)cheatengine[_-]?(x86[_-]?64|i386|x64)?\.exe'
  # === PE Analysis Tools ===
  - id: pestudio-process
    desc: PEStudio analysis tool
    crit: notable
    conf: 0.85
    for: [pe]
    if:
      type: string
      regex: '(?i)pestudio\.exe'
  - id: peid-process
    desc: PEiD packer identifier
    crit: notable
    conf: 0.85
    for: [pe]
    if:
      type: string
      regex: '(?i)peid\.exe'
composite_rules:
  - id: network-analyzer
    desc: Network analysis tool detection
    crit: notable
    conf: 0.8
    any:
      - id: wireshark-process
      - id: fiddler-process
      - id: burpsuite-process
      - id: charles-proxy
      - id: tcpview-process
  - id: process-analyzer
    desc: Process analysis tool detection
    crit: notable
    conf: 0.85
    any:
      - id: procmon-process
      - id: process-hacker
      - id: autoruns-process
      - id: api-monitor
      - id: http-debugger
      - id: cheatengine-process
  - id: debugger-tool
    desc: Debugger tool detection
    crit: notable
    conf: 0.85
    any:
      - id: x64dbg-process
      - id: ollydbg-process
      - id: ida-process
      - id: windbg-process
      - id: ghidra-process
  - id: analysis-tool-enumeration
    desc: Multiple analysis tools enumerated
    crit: suspicious
    conf: 0.9
    for: [pe, elf, macho]
    needs: 3
    any:
      - id: network-analyzer
      - id: process-analyzer
      - id: debugger-tool
      - id: regshot-process
      - id: pestudio-process
      - id: peid-process
