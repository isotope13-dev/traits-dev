defaults:
  platforms: [routeros, appliance, unix]
  for: [rust, elf]
  attack: T1497.001

traits:
  - id: rust-analysis-tool-name-set
    desc: Rust analysis tool name set
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'gdb[\s\S]{0,220}strace[\s\S]{0,220}wireshark'

  - id: rust-vm-process-name-set
    desc: Rust VM process name set
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'vmware[\s\S]{0,180}vboxservice[\s\S]{0,180}qemu-ga'

  - id: rust-tracerpid-status-read
    desc: Rust TracerPid status read
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/proc/self/status[\s\S]{0,180}TracerPid'
    unless:
      - id: well-known/tool/sysadmin/alpine-packages/

composite_rules:
  - id: rust-analysis-tool-evasion
    desc: Rust analysis tool evasion
    crit: hostile
    conf: 0.98
    all:
      - id: rust-analysis-tool-name-set
      - id: rust-vm-process-name-set
      - id: rust-tracerpid-status-read
