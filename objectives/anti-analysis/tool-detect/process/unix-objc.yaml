defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1518.001
  mbc: B0013

traits:
  - id: proc-cmdline-tree-scan
    desc: Proc cmdline process tree scan
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/proc/%d/cmdline[\s\S]{0,220}/proc/%d/status'
  - id: analysis-tool-name-cluster
    desc: Analysis tool process name cluster
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'strace[\s\S]{0,260}ltrace[\s\S]{0,260}gdb[\s\S]{0,260}lldb'
  - id: process-tree-threat-log
    desc: Process tree threat log
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: '[process-tree] THREAT'

composite_rules:
  - id: unix-process-tree-analysis-detect
    desc: Unix process tree analysis detect
    crit: suspicious
    conf: 0.96
    all:
      - id: proc-cmdline-tree-scan
      - id: analysis-tool-name-cluster
    any:
      - id: process-tree-threat-log
      - id: objectives/anti-analysis/tool-detect/process::wireshark-process
