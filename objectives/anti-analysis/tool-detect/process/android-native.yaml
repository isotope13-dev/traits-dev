defaults:
  platforms: [android, unix]
  for: [c, cpp, elf]
  attack: T1497

traits:
  - id: frida-tool-string
    desc: "Frida dynamic-instrumentation ref"
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "frida"

  - id: android-unidbg-tool-string
    desc: Android unidbg tool string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "unidbg"

composite_rules:
  - id: android-proc-analysis-tool-scan
    desc: Android proc analysis tool scan
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/fs/proc/info/path::process-pid-cmdline-format
    any:
      - id: frida-tool-string
      - id: android-unidbg-tool-string
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-datadog-agent
