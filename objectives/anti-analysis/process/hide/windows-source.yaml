defaults:
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: register-service-process
    desc: RegisterServiceProcess task hiding
    crit: suspicious
    conf: 0.98
    attack: "T1564"
    if:
      type: raw
      word: "RegisterServiceProcess"
composite_rules:
  - id: dynamic-task-manager-hide
    desc: Dynamic task manager hiding
    crit: suspicious
    conf: 0.97
    all:
      - id: register-service-process
      - id: micro-behaviors/dylib/load::load-library-source
      - id: micro-behaviors/dylib/lookup::get-proc-address-source
