defaults:
  platforms: [unix, ios]
  for: [lua]
  attack: T1620

composite_rules:
traits:
  - id: lua-env-gated-exit
    desc: Environment-controlled Lua exit
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'if\s+os\.getenv\s*\(.{0,50}\)\s*(==|~=).{0,80}then[\s\S]{0,256}\bos\.exit\s*\('
