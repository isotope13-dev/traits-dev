defaults:
  platforms: [unix, ios]
  for: [lua]
  attack: T1620

composite_rules:
  - id: lua-env-gated-exit
    desc: Lua execution gated by environment variable
    crit: suspicious
    conf: 0.86
    all:
      - id: micro-behaviors/os/env/access::lua-os-getenv
      - id: micro-behaviors/process/exit/terminate::lua-os-exit
    near_bytes: 192
