defaults:
  platforms: [windows, unix]
traits:
  - id: js-cmd-exe-fragment
    desc: Fragmented check for cmd.exe (anti-analysis)
    crit: suspicious
    conf: 0.8
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      exact: ystem32\\cmd.
      case_insensitive: true
