defaults:
  platforms: [ios]
  for: [kotlin, rust, cpp, objc]
  attack: T1497.001

traits:
  - id: ios-mobile-tool-path-check
    desc: iOS mobile analysis tool check
    crit: suspicious
    conf: 0.92
    unless:
      - id: metadata/package/files/dependency::os-image-root-file-path
      - id: well-known/app/sudo::source-tree
      - id: metadata/package/quality/upstream-source::freerdp-source-tree
    if:
      type: text
      regex: '/usr/bin/frida|/usr/bin/objection|/usr/bin/lldb'

composite_rules:
  - id: ios-jailbreak-analysis-check
    desc: iOS jailbreak analysis check
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/security/runtime::ios-jailbreak-artifact-path
    any:
      - id: ios-mobile-tool-path-check
      - id: objectives/anti-analysis/debugger-detect/check::ios-ptrace-attachexc-source
