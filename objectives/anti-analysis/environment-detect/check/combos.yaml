defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: anti-analysis-core
    desc: Debugger detection + process termination
    crit: notable
    conf: 0.85
    attack: T1562.001
    size_max: 100000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/process/terminate/kill::terminate-process
  - id: directory-scan
    desc: File system enumeration
    crit: component
    conf: 0.8
    size_max: 80000
    all:
      - id: micro-behaviors/fs/enumerate/directory::find-first-file
      - id: micro-behaviors/fs/enumerate/directory::find-next-file
    unless:
      - id: metadata/library/runtime::openmp-runtime
      - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
