defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: native-vm-gate-fields
    desc: Native VM gate fields
    crit: component
    conf: 0.85
    if:
      type: text
      word: vm_flags
  - id: native-debug-gate-fields
    desc: Native debugger gate fields
    crit: component
    conf: 0.85
    if:
      type: text
      word: debug_flags
  - id: native-sandbox-gate-fields
    desc: Native sandbox gate fields
    crit: component
    conf: 0.85
    if:
      type: text
      word: sandbox_flags

composite_rules:
  - id: native-analysis-gating-schema
    desc: VM, debugger, and sandbox gate fields
    crit: suspicious
    conf: 0.95
    all:
      - id: native-vm-gate-fields
      - id: native-debug-gate-fields
      - id: native-sandbox-gate-fields

  - id: native-stealer-analysis-gate
    desc: Native stealer gated by analysis checks
    crit: hostile
    conf: 0.99
    attack: T1497.001,T1555.003,T1119
    for: [pe, dll]
    all:
      - id: native-analysis-gating-schema
      - id: objectives/collection/stealer/browser::native-browser-loot-report-schema
      - id: objectives/anti-static/obfuscation/imports::fnv1a-api-resolution

  - id: anti-analysis-core
    desc: Debugger detection + process termination
    crit: notable
    conf: 0.85
    attack: T1562.001
    size_max: 100000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/process/terminate/kill::terminate-process
    unless:
      - id: well-known/lib/ssh2::ssh2-pageant-helper-context
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/installer/script/
      - id: well-known/app/glary-utilities/
