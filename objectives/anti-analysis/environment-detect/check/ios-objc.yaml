defaults:
  platforms: [ios]
  for: [cpp, objc]
  attack: T1497.001

traits:
  - id: objc-ios-frida-process-scan
    desc: ObjC iOS Frida process scan
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'frida-server|frida-agent|objection'
    unless:
      - id: well-known/lib/skia::source-tree
      - id: well-known/app/drivers/

composite_rules:
  - id: objc-ios-jailbreak-tool-detect
    desc: ObjC iOS jailbreak tool detect
    crit: hostile
    conf: 0.98
    all:
      - id: ios-jailbreak-path-check
      - id: objc-ios-frida-process-scan
