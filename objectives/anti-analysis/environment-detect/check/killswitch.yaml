# Killswitch: file existence check + conditional exit
# Malware checks for a marker file; if absent, terminates silently.
# This is an environmental gate that prevents execution in unauthorized contexts.
defaults:
  for: [elf, macho]
  platforms: [linux, macos]
  attack: T1620
composite_rules:
  - id: access-exit-killswitch
    desc: Killswitch via file existence gate
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/fs/file/stat::stat-exists
      - id: micro-behaviors/process/terminate/signal::_exit
      - id: micro-behaviors/fs/path/check::killswitch-log-file
