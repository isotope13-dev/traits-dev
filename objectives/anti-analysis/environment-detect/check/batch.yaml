defaults:
  platforms: [windows]
  for: [batch]
  attack: T1497.001
traits:
  - id: desktop-current-dir-gate
    desc: Batch gates execution on Desktop
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: (?i)echo\s+%cd%\s*\|\s*findstr\s+/i\s+"Desktop"
  - id: failed-desktop-check-exits
    desc: Failed Desktop check exits
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?is)%errorlevel%[^\r\n]{0,40}neq\s+0[^\)]{0,80}\bexit\b
composite_rules:
  - id: batch-desktop-triage-gate
    desc: Batch Desktop triage gate
    crit: suspicious
    conf: 0.96
    all:
      - id: desktop-current-dir-gate
      - id: failed-desktop-check-exits
