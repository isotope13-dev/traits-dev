defaults:
  platforms: [windows]
  for: [batch]
  attack: T1497.001
traits:
  - id: desktop-current-dir-gate
    desc: Batch tests %cd% for "Desktop" via findstr
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: (?i)echo\s+%cd%\s*\|\s*findstr\s+/i\s+"Desktop"
  - id: findstr-gated-errorlevel-exit
    desc: Batch exits when a findstr test fails
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?is)\bfindstr\b.{0,200}?%errorlevel%.{0,40}?\bneq\s+0\b.{0,80}?\bexit\b
composite_rules:
  - id: batch-desktop-triage-gate
    desc: Batch runs only from a "Desktop" path, else exits
    crit: suspicious
    conf: 0.96
    all:
      - id: desktop-current-dir-gate
      - id: findstr-gated-errorlevel-exit
