# Hostname-based sandbox exits hidden inside an embedded WSH script.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1497.001
  mbc: B0001

traits:
  - id: encoded-wsh-hostname-access
    desc: Encoded WSH hostname access
    crit: suspicious
    conf: 0.92
    if:
      type: encoded
      encoding: base64
      regex: '(?i)(WScript\\.Network|ComputerName)'

  - id: encoded-hostname-shortlist-exit
    desc: Encoded hostname shortlist exit
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      encoding: base64
      regex: '(?is)(ComputerName).{0,360}(InStr|instr).{0,220}(Quit|WScript\\.Quit)'

composite_rules:
  - id: pe-embedded-hostname-sandbox-evasion
    desc: PE exits when its embedded script sees a sandbox-like hostname
    crit: hostile
    conf: 0.98
    all:
      - id: encoded-wsh-hostname-access
      - id: encoded-hostname-shortlist-exit
