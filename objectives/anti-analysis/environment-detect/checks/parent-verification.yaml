defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
traits:
  - id: yarn-cli-bundle-marker
    desc: Bundled Yarn CLI marker
    crit: baseline
    conf: 1.0
    if:
      type: text
      substr: "explicit version specifier from the Yarn CLI"
composite_rules:
  - id: node-ppid-check
    desc: Verifies parent process ID against argument (anti-analysis/sandbox evasion)
    conf: 0.95
    crit: hostile
    attack: T1497
    mbc: B0003
    all:
      - id: micro-behaviors/process/info/current::check-ppid
      - id: micro-behaviors/process/info/commandline::check-argv
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-dup
    unless:
      - id: yarn-cli-bundle-marker
