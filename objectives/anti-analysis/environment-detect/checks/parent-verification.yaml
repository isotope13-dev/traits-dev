defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
composite_rules:
  - id: node-ppid-check
    desc: Verifies parent process ID against argument (anti-analysis/sandbox evasion)
    conf: 0.95
    crit: hostile
    attack: T1497
    mbc: B0003
    unless:
      - id: micro-behaviors/process/interpreter/vm::yarn-release-bundle
    all:
      - id: micro-behaviors/process/info::check-ppid
      - id: micro-behaviors/process/info::check-argv
      - id: objectives/execution/interpreter/eval/dynamic::eval-symbol
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-dup
