defaults:
  platforms: [windows]
  for: [pe]
  attack: T1497.001
  mbc: B0001
composite_rules:
  - id: command-line-gated-loader-activation
    desc: Loader activation gated on command line
    crit: suspicious
    conf: 0.92
    size_max: 524288
    all:
      - id: micro-behaviors/process/info/commandline::compare-command-line-strings
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
    any:
      - id: objectives/anti-static/obfuscation/payload/section::oversized-data-section
      - id: metadata/binary/metrics/structural::single-complex-function
      - id: objectives/anti-static/obfuscation/binary-metrics/imports::import-count-under-40
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/package/versioning::pe-version-resource
