defaults:
  platforms: [aix, unix]
  for: [c, cpp, elf]
traits:
- id: aix-libpath-env-token
  desc: AIX LIBPATH env token
  crit: component
  conf: 0.9
  if:
    type: text
    word: LIBPATH
  not:
  - substr: copyProcessEnvToEnv
- id: zos-env-marker--bpxk-autocvt
  desc: z/OS runtime environment marker (_BPXK_AUTOCVT)
  crit: notable
  conf: 0.9
  if:
    type: text
    word: _BPXK_AUTOCVT
- id: zos-env-marker--cee-runopts
  desc: z/OS runtime environment marker (_CEE_RUNOPTS)
  crit: notable
  conf: 0.9
  if:
    type: text
    word: _CEE_RUNOPTS
- id: zos-env-marker--os390
  desc: z/OS runtime environment marker (os390)
  crit: notable
  conf: 0.9
  if:
    type: text
    word: os390
- id: zos-env-marker--mvs
  desc: z/OS runtime environment marker (__MVS__)
  crit: notable
  conf: 0.9
  if:
    type: text
    word: __MVS__
composite_rules:
- id: zos-env-marker
  desc: z/OS runtime environment marker
  crit: notable
  conf: 0.9
  any:
  - id: zos-env-marker--bpxk-autocvt
  - id: zos-env-marker--cee-runopts
  - id: zos-env-marker--os390
  - id: zos-env-marker--mvs
- id: aix-anti-analysis
  desc: AIX anti-analysis techniques (timing, monitoring, hook detection)
  crit: hostile
  conf: 0.95
    # uname/waitpid/dlsym are universal libc primitives present in nearly every
    # dynamically-linked ELF, so this fired on generic Linux/Android binaries.
    # Anchor on the AIX-specific LIBPATH loader variable so the combination only
    # counts on actual AIX targets. A bare substr on LIBPATH also matched the
    # benign gawk env var AWKLIBPATH and the LIBPATH literal embedded in Node's
    # internal child_process.js (z/OS env propagation), so require a whole-word
    # LIBPATH token and exclude that Node helper.
  all:
  - id: aix-libpath-env-token
  needs: 2
  any:
  - id: micro-behaviors/os/sysinfo/platform/kernel::uname
  - id: micro-behaviors/process/control/wait::waitpid
  - id: micro-behaviors/dylib/lookup::dlsym-symbol
    # LIBPATH is also the z/OS loader var; Node/libuv embed it for os390 support.
    # Real AIX targets do not carry z/OS markers, so suppress when those appear.
  unless:
  - id: objectives/anti-analysis/environment-detect/runtime/
  - id: well-known/lib/jvm::runtime-library-basename
