defaults:
  platforms: [unix, windows]
  for: [php]
composite_rules:
  - id: php-safety-gate
    desc: PHP safety gate checking for a hidden file in HOME
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/env/access::getenv-home
      - id: micro-behaviors/os/stdio::error-reporting-off
      - id: micro-behaviors/os/stdio::error-suppress-prefix
