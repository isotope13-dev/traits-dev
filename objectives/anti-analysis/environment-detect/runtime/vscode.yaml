# VSCode remote environment detection
# Extensions checking vscode.env.remoteName to skip execution in
# remote/container environments. Legitimate for UX, but malware uses
# this to avoid running in Codespaces/DevContainers where analysis
# tools may be present.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: vscode-remote-name-check
    desc: VSCode remote environment check (anti-sandbox)
    crit: component
    conf: 0.8
    if:
      type: string_literal
      exact: "remoteName"
