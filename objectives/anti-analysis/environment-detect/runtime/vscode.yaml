# VSCode remote environment detection
# Extensions checking vscode.env.remoteName to skip execution in
# remote/container environments. Legitimate for UX, but malware uses
# this to avoid running in Codespaces/DevContainers where analysis
# tools may be present.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: vscode-remote-name-check
    desc: VSCode remoteName API access
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "vscode.env.remoteName"

  - id: vscode-remote-name-branch
    desc: VSCode remoteName branch logic
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\bvscode\.env\.remoteName\s*[!=]=|\bvscode\.env\.remoteName\s*\?'

composite_rules:
  - id: vscode-remote-env-check
    desc: VSCode remote environment probe
    crit: suspicious
    conf: 0.82
    all:
      - id: vscode-remote-name-check
    any:
      - id: vscode-remote-name-branch
