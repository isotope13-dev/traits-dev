# Indirect Syscall via Gadget Scanning
# Detects Hell's Gate / Halo's Gate pattern: validate syscall stub signatures,
# extract SSN, and jump through syscall;ret gadget in ntdll
# ATT&CK: T1562.001 (Impair Defenses: Disable or Modify Tools)
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1562.001"
  mbc: "F0004"
composite_rules:
  - id: indirect-syscall-gate
    desc: "Indirect syscall via stub validation"
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/os/syscall/raw::ssn-stub-validation
    any:
      - id: micro-behaviors/os/syscall/raw::syscall-ret-gadget
      - id: objectives/anti-analysis/evasion/syscall::syscall-x64-instruction
      - id: micro-behaviors/os/syscall/raw::mov-eax-syscall
    needs: 1
    unless:
      - type: raw
        substr: "BSJB"
    downgrade:
      any:
        - id: metadata/purpose/browser-sandbox::chromium-helper
