defaults:
  platforms: [unix, windows, macos]
  for: [pe, elf, macho, shell, python, javascript]
traits: []
# Removed cpu-feature-check duplicate - use objectives/anti-analysis/vm-detect/processor-features::is-processor-feature-present
composite_rules:
  - id: evasion-aware-malware
    desc: Malware with multiple anti-analysis awareness checks
    crit: notable
    conf: 0.85
    attack: T1497
    mbc: B0001
    unless:
      - id: metadata/signed/platform::microsoft
      - type: raw
        substr: "BSJB"
    all:
      - id: objectives/anti-analysis/debugger/detect::win-comprehensive
    any:
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/os/time/query::gettimeofday
      - id: micro-behaviors/os/time/query::clock_gettime
      - id: objectives/anti-analysis/vm-detect/processor-features::is-processor-feature-present
      - id: objectives/anti-analysis/emulator/detect::comprehensive
    downgrade:
      any:
        - id: metadata/quality::versioned
  - id: anti-forensics-defensive
    desc: Malware with both anti-analysis AND anti-forensics capabilities
    crit: hostile
    conf: 0.9
    attack: T1562
    mbc: B0005
    all:
      - id: evasion-aware-malware
    any:
      - id: objectives/evasion/log-clear/system::log-clear
      - id: objectives/evasion/log-clear/system::log-clear-windows
      - id: objectives/evasion/self-delete/file::comspec-shortpath-self-delete
      - id: objectives/evasion/self-delete/file::module-path-rename-delete
      - id: objectives/evasion/self-delete/file::self-delete-windows
      - id: objectives/evasion/self-delete/process::aggressive-evidence-removal
