# Anti-Analysis & Evasion - JavaScript
# Composed objectives for JS anti-analysis
defaults:
  attack: T1497
  mbc: B0006
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
  - id: js-self-sigsegv-termination
    desc: Self-termination via SIGSEGV for evasion
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/terminate/kill::js-sigsegv-kill
      - id: micro-behaviors/process/exit/terminate::process-exit
  - id: js-anti-forensics-stdout-clear
    desc: Clears stdout buffer before self-terminating
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/fd/stdio::js-stdout-write-empty
      - id: micro-behaviors/process/terminate/kill::js-sigsegv-kill
