# Sandbox detection via timing checks - Windows C/C++ source
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1497.003
  mbc: B0007
traits:
  - id: gettickcount-timing
    desc: GetTickCount timing measurement
    crit: component
    conf: 0.85
    if:
      type: symbol
      exact: "GetTickCount"
composite_rules:
  - id: timing-sandbox-detect
    desc: Timing-based sandbox detection
    crit: suspicious
    conf: 0.88
    scope: leaf
    near_lines: 80
    all:
      - id: gettickcount-timing
      - id: micro-behaviors/time/timing/delay::sleep-source
      - id: micro-behaviors/process/terminate/kill::exit-process-source
    unless:
      - id: metadata/lang/source::wine-compat-source
      - id: metadata/lang/source::windows-compat-api-source
