defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1497.003
  mbc: B0003.003
traits:
  - id: ping-self-gate
    desc: Self-ping timing gate
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: MyProject.Computer.Network.Ping(MyProject.Computer.Name)
  - id: ping-exception-padding
    desc: Exception padding after ping gate
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      substr: MyProject.Computer.Name.Substring(0, 1)
composite_rules:
  - id: vbnet-ping-delay-loop
    desc: VB.NET ping-based delay loop
    crit: suspicious
    conf: 0.94
    all:
      - id: ping-self-gate
      - id: ping-exception-padding
