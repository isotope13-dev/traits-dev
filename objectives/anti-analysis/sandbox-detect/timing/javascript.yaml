# Sandbox Evasion via Uptime Check
# Detects code that checks system uptime and skips execution if below a threshold,
# evading sandboxes that run on freshly-booted VMs.
# MBC: B0007 (Sandbox Detection)
# ATT&CK: T1497.001 (System Information Discovery: System Network Configuration)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: B0007
  attack: T1497.001

composite_rules:
  - id: uptime-sandbox-gate
    desc: Skips execution if system uptime is below threshold
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/os/sysinfo/platform::os-uptime-call
      - id: uptime-less-than-threshold

  - id: timing-jitter-evasion
    desc: Randomized delay to evade timing-based analysis
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/time/schedule/delay::settimeout-random-delay
      - id: uptime-sandbox-gate

traits:
  - id: uptime-less-than-threshold
    desc: Uptime compared against numeric threshold
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "uptime\\s*<\\s*[0-9]+"
