defaults:
  attack: T1497.003
  mbc: B0007
  platforms: [windows]
  for: [pe, dll]

traits:
- id: pin-download-page-string
  desc: PIN download page prompt
  crit: component
  conf: 0.96
  if:
    type: encoded
    exact: Get the PIN from the download page
- id: game-overlay-required-string
  desc: Game overlay requirement prompt
  crit: component
  conf: 0.96
  if:
    type: encoded
    exact: Make sure the game is running and that Game Overlay is enabled
- id: cs2-steam-overlay-admin-string
  desc: CS2 Steam overlay admin prompt
  crit: component
  conf: 0.96
  if:
    type: encoded
    substr: CS2 is running with steam overlay enabled
- id: timezonedb-host-header
  desc: TimezoneDB host header string
  crit: component
  conf: 0.95
  if:
    type: encoded
    exact: "Host: vip.timezonedb.com"

composite_rules:
- id: steam-overlay-pin-gate
  desc: Steam overlay PIN gate strings
  crit: suspicious
  conf: 0.96
  needs: 2
  any:
  - id: pin-download-page-string
  - id: game-overlay-required-string
  - id: cs2-steam-overlay-admin-string
- id: steam-overlay-pin-gated-injector
  desc: Steam overlay PIN-gated injector
  crit: hostile
  conf: 0.97
  all:
  - id: steam-overlay-pin-gate
  - id: timezonedb-host-header
  - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-symbol
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
  any:
  - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
  - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  unless:
  - id: well-known/game/steam/
