# Process-gated execution in a Node SEA payload
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1057,T1497

composite_rules:
  - id: node-sea-process-gated-payload
    desc: Enumerates processes before payload staging
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/process/enumerate/shell::node-sea-process-list-flags
      - id: micro-behaviors/os/sysinfo/platform/runtime::js-platform-win32-check
      - id: micro-behaviors/process/create/spawn::node-sea-hidden-detached-spawn
