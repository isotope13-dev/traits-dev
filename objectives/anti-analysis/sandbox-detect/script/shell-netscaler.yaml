defaults:
  platforms: [netscaler, appliance, unix]
  for: [shell]
  attack: T1497.001

traits:
  - id: shell-analysis-process-loop
    desc: Shell analysis process loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: for proc in strace ltrace gdb tcpdump

  - id: shell-container-cgroup-check
    desc: Shell container cgroup check
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: "grep -qE 'docker\\|lxc\\|kubepods\\|containerd'"

  - id: shell-tracerpid-check
    desc: Shell TracerPid check
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: grep TracerPid /proc/self/status

composite_rules:
  - id: shell-sandbox-artifact-detect
    desc: Shell sandbox artifact detect
    crit: hostile
    conf: 0.98
    all:
      - id: shell-analysis-process-loop
      - id: shell-container-cgroup-check
    any:
      - id: shell-tracerpid-check
