defaults:
  platforms: [windows]
  for: [powershell, batch, pe, dll, lnk]
  attack: T1497
traits:
  - id: recent-lnk-count-gate
    desc: Recent LNK count gate
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?is)Microsoft\\Windows\\Recent.{0,160}\.lnk.{0,160}Count\s+-ge\s+\d+
  - id: process-count-gate
    desc: Process count sandbox gate
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: (?is)Get-Process.{0,80}Count\s+-ge\s+\d+
composite_rules:
  - id: user-activity-process-gate
    desc: User activity process sandbox gate
    crit: suspicious
    conf: 0.93
    all:
      - id: recent-lnk-count-gate
      - id: process-count-gate
