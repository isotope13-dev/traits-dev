# JavaScript / Node.js sandbox & analysis-environment evasion
# ATT&CK: T1497 (Virtualization/Sandbox Evasion)
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: "T1497"
  mbc: "B0007"
traits:
  - id: js-cpu-count-sandbox-check
    desc: os.cpus() low-count sandbox check
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '\bcpus\(\)[\s\S]{0,60}\.length\s*<\s*[1-4]\b'
composite_rules:
  - id: js-sandbox-check-obfuscated
    desc: Sandbox check in obfuscated script
    crit: suspicious
    conf: 0.9
    size_max: 262144
    all:
    - id: js-cpu-count-sandbox-check
    - id: objectives/exfiltration/sensitive-data::js-custom-string-decoder
    downgrade:
      any:
      - id: metadata/package/testing/
      - id: metadata/signed/platform/
