# Script-side sandbox detection patterns. The sandbox-detect/inline/ tree
# is generic string-derived; this file focuses on Python-specific code
# shapes (gethostname compares, recent-files counts, mouse-position polls,
# /proc/scsi sniffs) that scripts use to skip C2 in analysis VMs.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1497
  mbc: B0007
  crit: suspicious
  conf: 0.9
traits:
  # gethostname compared against sandbox-keyword set
- id: hostname-sandbox-keyword-check--rx-8
  desc: VMware hostname keyword
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: vmware
  count_max: 1014502
- id: hostname-in-sandbox-list--rx-12
  desc: Anubis sandbox hostname keyword
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: anubis
  count_max: 1014506
- id: hostname-in-sandbox-list--rx-14
  desc: JoeBox sandbox hostname keyword
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: joebox
  count_max: 1014508
- id: cwd-sandbox-keyword-check--rx-20
  desc: Malware analysis keyword
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: malware
  count_max: 1014514
- id: cwd-sandbox-keyword-check--rx-21
  desc: Sandbox analysis keyword
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: sandbox
  count_max: 1014515
- id: cwd-sandbox-keyword-check--rx-22
  desc: Cuckoo sandbox keyword
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: cuckoo
  count_max: 1014516
- id: cwd-sandbox-keyword-check--rx-24
  desc: Virus analysis keyword
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: virus
  count_max: 1014518
  # NOTE: a bare cursor-position read (GetCursorPos / pyautogui.position) is a
  # neutral input capability, not sandbox detection — it lives at
  # micro-behaviors/hardware/input/mouse/position::cursor-position-read. Real
  # cursor-based sandbox evasion polls the position in a loop and compares
  # samples; add such a composite here if that pattern is needed.

  # Recent files count check — fresh sandboxes have few recent files
- id: recent-files-empty-check
  desc: Recent-files count checked (sandbox indicator)
  if:
    type: text
    regex: '(%RECENT%|os\.listdir\s*\([^)\n]{0,80}Recent[^)\n]{0,40}\))[^\n]{0,80}(len|count)'

  # CPU count check — sandboxes commonly expose 1-2 CPUs
- id: cpu-count-low-check
  desc: CPU count checked for low-spec sandbox
  if:
    type: text
    regex: '(os\.cpu_count|multiprocessing\.cpu_count|psutil\.cpu_count)\s*\(\s*\)\s*<\s*[1-3]\b'

  # Physical memory check — sandboxes often have <4 GB
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
- id: physical-mem-low-check--rx-25
  desc: Windows physical-memory API
  crit: component
  if:
    type: text
    substr: GetPhysicallyInstalledSystemMemory
  count_max: 1014522
- id: physical-mem-low-check--rx-27
  desc: psutil 2GB memory threshold
  crit: component
  if:
    type: text
    regex: 'psutil\.virtual_memory.{0,80}2147483648'
  count_max: 1014524
- id: physical-mem-low-check--rx-28
  desc: psutil 4GB memory threshold
  crit: component
  if:
    type: text
    regex: 'psutil\.virtual_memory.{0,80}4294967296'
  count_max: 1014525
- id: vm-artifact-vbox-file-check--rx-30
  desc: Python os.path.exists artifact check
  crit: component
  if:
    type: text
    regex: '(os\.path\.(exists|isfile)|Path.{0,20}is_file).{0,80}(VBox|vbox|VirtualBox)'
  unless:
  - id: well-known/tool/detection/security-scanner::penterep-ptsrvtester-package
  count_max: 1014527
- id: vm-artifact-vbox-file-check--rx-31
  desc: Python os.path.isfile artifact check
  crit: component
  if:
    type: text
    regex: '(os\.path\.(exists|isfile)|Path.{0,20}is_file).{0,80}(VBox|vbox|VirtualBox)'
  unless:
  - id: well-known/tool/detection/security-scanner::penterep-ptsrvtester-package
  count_max: 1014528
- id: vm-artifact-vbox-file-check--rx-32
  desc: Python pathlib is_file artifact check
  crit: component
  if:
    type: text
    regex: '(os\.path\.(exists|isfile)|Path.{0,20}is_file).{0,80}(VBox|vbox|VirtualBox)'
  unless:
  - id: well-known/tool/detection/security-scanner::penterep-ptsrvtester-package
  count_max: 1014529
- id: vm-artifact-vbox-file-check--rx-33
  desc: VM service-name artifact marker
  crit: component
  if:
    type: text
    regex: '\b(VBoxService|vboxservice|vboxguest)\b'
  unless:
  - id: well-known/tool/detection/security-scanner::penterep-ptsrvtester-package
  count_max: 1014530
- id: vm-artifact-vbox-file-check--rx-34
  desc: VirtualBox Guest token
  crit: component
  if:
    type: text
    regex: '\b(VirtualBox Guest|Guest Additions|vboxguest)\b'
  unless:
  - id: well-known/tool/detection/security-scanner::penterep-ptsrvtester-package
  count_max: 1014531
- id: vm-artifact-vbox-file-check--rx-35
  desc: VirtualBox Mouse token
  crit: component
  if:
    type: text
    regex: '\b(VBoxMouse|vboxmouse)\b'
  unless:
  - id: well-known/tool/detection/security-scanner::penterep-ptsrvtester-package
  count_max: 1014532
- id: vm-artifact-vbox-file-check--rx-36
  desc: VBox artifact token
  crit: component
  if:
    type: text
    regex: '\b(VBox|vbox|VirtualBox)\b'
  unless:
  - id: well-known/tool/detection/security-scanner::penterep-ptsrvtester-package
  count_max: 1014533
- id: vm-artifact-vmware-file-check--rx-37
  desc: Python VMware tools file check
  crit: component
  if:
    type: text
    regex: '(os\.path\.exists|os\.path\.isfile|Path[^\n]{0,40}is_file)\s*\([^)\n]{0,200}vmtools'
  count_max: 1014534
- id: vm-artifact-vmware-file-check--rx-38
  desc: VMware mouse driver token
  crit: component
  if:
    type: text
    substr: vmmouse
  count_max: 1014535
- id: vm-artifact-vmware-file-check--rx-39
  desc: VMware service token
  crit: component
  if:
    type: text
    substr: vmwsvc
  count_max: 1014536
- id: vm-artifact-proc-scsi-check
  desc: /proc/scsi/scsi inspected for VM strings
  if:
    type: text
    regex: '(open|Path)\s*\(\s*["'']/proc/scsi/scsi["'']'

  # Long sleep before exec — outwait short sandbox runtimes
- id: pre-exec-long-sleep-arg
  desc: Long sleep argument (>=60s)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(time\.sleep|asyncio\.sleep)\s*\(\s*([6-9][0-9]|[1-9][0-9]{2,})\s*\)'
composite_rules:
- id: pre-exec-long-sleep
  desc: Long sleep (>=60s) before subsequent execution
  crit: suspicious
  conf: 0.85
  near_bytes: 512
  all:
  - id: micro-behaviors/time/sleep/interval::python-sleep-call
  - id: pre-exec-long-sleep-arg
  any:
  - id: micro-behaviors/process/create/subprocess::process-execution
  - id: micro-behaviors/process/create/shell/bridge::spawn-call
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/harness/
  - id: micro-behaviors/data/control-flow/loop::python-while-true
  - id: metadata/package/quality/false-positives::benign-app-fp-context
  - id: micro-behaviors/os/service/legitimate/
  - id: well-known/app/walinuxagent::source-tree
  - id: metadata/package/quality/recognized-contexts::stackrox-cluster-ci-context
- id: python-script-sandbox-check
  desc: Python script performs sandbox detection
  crit: suspicious
  conf: 0.94
  any:
  - id: pre-exec-long-sleep
  - id: hostname-sandbox-keyword-check
  - id: hostname-in-sandbox-list
  - id: cwd-sandbox-keyword-check
  - id: physical-mem-low-check
  - id: vm-artifact-vbox-file-check
  - id: vm-artifact-vmware-file-check
  - id: recent-files-empty-check
  - id: cpu-count-low-check
  - id: vm-artifact-proc-scsi-check
  unless:
  - id: micro-behaviors/crypto/library/blockchain/
  - id: metadata/package/testing/presence/harness/
  - id: metadata/package/scripts::jupyter-notebook-file
- id: hostname-sandbox-keyword-check
  desc: Hostname compared to sandbox-keyword
  crit: baseline
  conf: 1.0
  all:
  - id: micro-behaviors/os/sysinfo/hostname::python-socket-gethostname
  any:
  - id: objectives/anti-analysis/sandbox-detect/script::cwd-sandbox-keyword-check--rx-20
  - id: objectives/anti-analysis/sandbox-detect/script::cwd-sandbox-keyword-check--rx-21
  - id: hostname-in-sandbox-list--rx-12
  - id: objectives/anti-analysis/sandbox-detect/script::cwd-sandbox-keyword-check--rx-22
  - id: hostname-in-sandbox-list--rx-14
  - id: hostname-sandbox-keyword-check--rx-8
  near_bytes: 256
- id: hostname-in-sandbox-list
  desc: Hostname checked against sandbox list
  crit: baseline
  conf: 1.0
  all:
  - id: micro-behaviors/os/sysinfo/hostname::python-socket-gethostname
  any:
  - id: cwd-sandbox-keyword-check--rx-20
  - id: cwd-sandbox-keyword-check--rx-21
  - id: hostname-in-sandbox-list--rx-12
  - id: cwd-sandbox-keyword-check--rx-22
  - id: hostname-in-sandbox-list--rx-14
  - id: cwd-sandbox-keyword-check--rx-24
  near_bytes: 256
- id: cwd-sandbox-keyword-check
  desc: cwd checked for sandbox keyword
  crit: baseline
  conf: 1.0
  all:
  - id: micro-behaviors/fs/directory/cwd/
  any:
  - id: cwd-sandbox-keyword-check--rx-20
  - id: cwd-sandbox-keyword-check--rx-21
  - id: cwd-sandbox-keyword-check--rx-22
  - id: cwd-sandbox-keyword-check--rx-24
  near_bytes: 256
- id: physical-mem-low-check
  desc: Physical memory checked for low-spec sandbox
  crit: baseline
  conf: 1.0
  any:
  - id: physical-mem-low-check--rx-25
  - id: physical-mem-low-check--rx-27
  - id: physical-mem-low-check--rx-28
- id: vm-artifact-vbox-file-check
  desc: VirtualBox driver file existence check
  crit: baseline
  conf: 1.0
  all:
  - id: vm-artifact-vbox-file-check-api
  - id: vm-artifact-vbox-artifact-token
- id: vm-artifact-vbox-file-check-api
  desc: Python file-existence API for VM artifact check
  crit: component
  conf: 1.0
  any:
  - id: vm-artifact-vbox-file-check--rx-30
  - id: vm-artifact-vbox-file-check--rx-31
  - id: vm-artifact-vbox-file-check--rx-32
- id: vm-artifact-vbox-artifact-token
  desc: VirtualBox artifact token
  crit: component
  conf: 1.0
  any:
  - id: vm-artifact-vbox-file-check--rx-33
  - id: vm-artifact-vbox-file-check--rx-34
  - id: vm-artifact-vbox-file-check--rx-35
  - id: vm-artifact-vbox-file-check--rx-36
- id: vm-artifact-vmware-file-check
  desc: VMware driver file existence check
  crit: baseline
  conf: 1.0
  any:
  - id: vm-artifact-vmware-file-check--rx-37
  - id: vm-artifact-vmware-file-check--rx-38
  - id: vm-artifact-vmware-file-check--rx-39
