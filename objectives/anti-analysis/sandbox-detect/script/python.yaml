    substr: sample
- id: hostname-in-sandbox-list--rx-16
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: virus
- id: cwd-sandbox-keyword-check--rx-17
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: os.path.basename
- id: cwd-sandbox-keyword-check--rx-18
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: os.getcwd
- id: cwd-sandbox-keyword-check--rx-19
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: Path.cwd
- id: cwd-sandbox-keyword-check--rx-20
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: malware
- id: cwd-sandbox-keyword-check--rx-21
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: sandbox
- id: cwd-sandbox-keyword-check--rx-22
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: cuckoo
- id: cwd-sandbox-keyword-check--rx-23
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: sample
- id: cwd-sandbox-keyword-check--rx-24
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: virus
- id: cursor-position-poll
  desc: Cursor position polled for sandbox detection
  crit: notable
  if:
    type: text
    regex: '(?:GetCursorPos|win32gui\.GetCursorPos|pyautogui\.position|user32\.GetCursorPos)'

  # Recent files count check — fresh sandboxes have few recent files
- id: recent-files-empty-check
  desc: Recent-files count checked (sandbox indicator)
  if:
    type: text
    regex: '(?:%RECENT%|os\.listdir\s*\([^)\n]{0,80}Recent[^)\n]{0,40}\))[^\n]{0,80}(?:len|count)'

  # CPU count check — sandboxes commonly expose 1-2 CPUs
- id: cpu-count-low-check
  desc: CPU count checked for low-spec sandbox
  if:
    type: text
    regex: '(?:os\.cpu_count|multiprocessing\.cpu_count|psutil\.cpu_count)\s*\(\s*\)\s*<\s*[1-3]\b'

  # Physical memory check — sandboxes often have <4 GB
- id: physical-mem-low-check--rx-25
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: GetPhysicallyInstalledSystemMemory
- id: physical-mem-low-check--rx-26
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: psutil.virtual_memory().total
- id: physical-mem-low-check--rx-27
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: '2147483648'
- id: physical-mem-low-check--rx-28
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: '4294967296'
- id: physical-mem-low-check--rx-29
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: '1024'
- id: vm-artifact-vbox-file-check--rx-30
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: os.path.exists
- id: vm-artifact-vbox-file-check--rx-31
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: os.path.isfile
- id: vm-artifact-vbox-file-check--rx-32
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: is_file
- id: vm-artifact-vbox-file-check--rx-33
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Service
- id: vm-artifact-vbox-file-check--rx-34
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Guest
- id: vm-artifact-vbox-file-check--rx-35
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Mouse
- id: vm-artifact-vbox-file-check--rx-36
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: VBox
- id: vm-artifact-vmware-file-check--rx-37
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?:os\.path\.exists|os\.path\.isfile|Path[^\n]{0,40}is_file)\s*\([^)\n]{0,200}vmtools'
- id: vm-artifact-vmware-file-check--rx-38
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'vmmouse'
- id: vm-artifact-vmware-file-check--rx-39
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'vmwsvc'
- id: vm-artifact-proc-scsi-check
  desc: /proc/scsi/scsi inspected for VM strings
  if:
    type: text
    regex: '(?:open|Path)\s*\(\s*["'']/proc/scsi/scsi["'']'

  # Long sleep before exec — outwait short sandbox runtimes
- id: pre-exec-long-sleep
  desc: Long sleep (>=60s) before subsequent execution
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '(?:time\.sleep|asyncio\.sleep)\s*\(\s*(?:[6-9][0-9]|[1-9][0-9]{2,})\s*\)'

  # User-input-prompt sandbox stall — `input()` waits for a human
- id: input-prompt-stall
  desc: input() prompt — stalls automated sandboxes
  crit: suspicious
  conf: 0.78
  if:
    type: text
    case_insensitive: true
    regex: '\binput\s*\(\s*["''][^"''\n]{0,80}(?:continue|press|enter)["'']'

composite_rules:
- id: python-script-sandbox-check
  desc: Python script performs sandbox detection
  crit: suspicious
  conf: 0.94
  any:
  - id: objectives/anti-analysis/sandbox-detect/script
- id: hostname-sandbox-keyword-check
  desc: Hostname compared to sandbox-keyword
  crit: baseline
  conf: 1.0
  any:
  - id: hostname-sandbox-keyword-check--rx-1
  - id: hostname-sandbox-keyword-check--rx-2
  - id: hostname-sandbox-keyword-check--rx-3
  - id: hostname-sandbox-keyword-check--rx-4
