# Script-side sandbox detection patterns. The sandbox-detect/inline/ tree
# is generic string-derived; this file focuses on Python-specific code
# shapes (gethostname compares, recent-files counts, mouse-position polls,
# /proc/scsi sniffs) that scripts use to skip C2 in analysis VMs.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1497
  mbc: B0007
  crit: suspicious
  conf: 0.9
traits:
  # gethostname compared against sandbox-keyword set
- id: hostname-sandbox-keyword-check--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: socket.gethostname
- id: hostname-sandbox-keyword-check--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: malware
- id: hostname-sandbox-keyword-check--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: sandbox
- id: hostname-sandbox-keyword-check--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: anubis
- id: hostname-sandbox-keyword-check--rx-5
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: cuckoo
- id: hostname-sandbox-keyword-check--rx-6
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: joebox
- id: hostname-sandbox-keyword-check--rx-7
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: sample
- id: hostname-sandbox-keyword-check--rx-8
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: vmware
- id: hostname-in-sandbox-list--rx-9
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: socket.gethostname
- id: hostname-in-sandbox-list--rx-10
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: malware
- id: hostname-in-sandbox-list--rx-11
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: sandbox
- id: hostname-in-sandbox-list--rx-12
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
