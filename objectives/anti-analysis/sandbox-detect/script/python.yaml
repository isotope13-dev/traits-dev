# Script-side sandbox detection patterns. The sandbox-detect/inline/ tree
# is generic string-derived; this file focuses on Python-specific code
# shapes (gethostname compares, recent-files counts, mouse-position polls,
# /proc/scsi sniffs) that scripts use to skip C2 in analysis VMs.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1497
  mbc: B0007
  crit: suspicious
  conf: 0.9
traits:
  # gethostname compared against sandbox-keyword set
- id: hostname-sandbox-keyword-check--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: malware
  count_max: 1014496
- id: hostname-sandbox-keyword-check--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: sandbox
  count_max: 1014497
- id: hostname-sandbox-keyword-check--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: anubis
  count_max: 1014498
- id: hostname-sandbox-keyword-check--rx-5
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: cuckoo
  count_max: 1014499
- id: hostname-sandbox-keyword-check--rx-6
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: joebox
  count_max: 1014500
- id: hostname-sandbox-keyword-check--rx-7
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: sample
  count_max: 1014501
- id: hostname-sandbox-keyword-check--rx-8
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: vmware
  count_max: 1014502
- id: hostname-in-sandbox-list--rx-10
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: malware
  count_max: 1014504
- id: hostname-in-sandbox-list--rx-11
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: sandbox
  count_max: 1014505
- id: hostname-in-sandbox-list--rx-12
  desc: Regex component marker
  crit: component
  if:
    type: text
    case_insensitive: true
    substr: anubis
  count_max: 1014506
- id: hostname-in-sandbox-list--rx-13
  desc: Regex component marker
  crit: component
