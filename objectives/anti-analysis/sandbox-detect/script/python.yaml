  count_max: 1014530
- id: vm-artifact-vbox-file-check--rx-34
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Guest
  count_max: 1014531
- id: vm-artifact-vbox-file-check--rx-35
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Mouse
  count_max: 1014532
- id: vm-artifact-vbox-file-check--rx-36
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: VBox
  count_max: 1014533
- id: vm-artifact-vmware-file-check--rx-37
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(os\.path\.exists|os\.path\.isfile|Path[^\n]{0,40}is_file)\s*\([^)\n]{0,200}vmtools'
  count_max: 1014534
- id: vm-artifact-vmware-file-check--rx-38
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: vmmouse
  count_max: 1014535
- id: vm-artifact-vmware-file-check--rx-39
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: vmwsvc
  count_max: 1014536
- id: vm-artifact-proc-scsi-check
  desc: /proc/scsi/scsi inspected for VM strings
  if:
    type: text
    regex: '(open|Path)\s*\(\s*["'']/proc/scsi/scsi["'']'

  # Long sleep before exec — outwait short sandbox runtimes
- id: pre-exec-long-sleep-arg
  desc: Long sleep argument (>=60s)
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(time\.sleep|asyncio\.sleep)\s*\(\s*([6-9][0-9]|[1-9][0-9]{2,})\s*\)'
composite_rules:
- id: pre-exec-long-sleep
  desc: Long sleep (>=60s) before subsequent execution
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/time/sleep/interval::python-sleep-call
  - id: pre-exec-long-sleep-arg
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  - id: micro-behaviors/data/control-flow/loop::python-while-true
  - id: micro-behaviors/data/text/app::clawmetry-observability-dashboard
  - id: micro-behaviors/os/service/legitimate::container-image-release-polling
- id: python-script-sandbox-check
  desc: Python script performs sandbox detection
  crit: suspicious
  conf: 0.94
  any:
