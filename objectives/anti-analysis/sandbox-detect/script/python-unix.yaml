defaults:
  platforms: [routeros, appliance, unix]
  for: [python, pyc]
  attack: T1497
  mbc: B0007

traits:
  # A single VM-vendor word is benign — VM management/forensic tools (e.g.
  # vmwarevmx2hashcat) legitimately reference "vmware". Sandbox-evasion checks
  # multiple vendors, so this is a building block for the needs:2 composite below.
- id: python-xen-hyperv-bochs-vendor-string
  desc: Python Xen, Hyper-V, or Bochs vendor string
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(xen|hyper-v|bochs)\b'
  unless:
  - id: metadata/build/pip::python-packaging-vendored-source
  - id: metadata/build/pip::python-packaging-tool-tests
  - id: metadata/build/pip::pip-wheel-installer-source
  - id: well-known/app/calvyn-code
  - type: path
    regex: '\.j$'

- id: python-dmi-product-name-read
  desc: Python reads DMI product name
  crit: notable
  conf: 0.92
  if:
    type: text
    substr: /sys/class/dmi/id/product_name
  unless:
  - type: path
    regex: '\.j$'

- id: python-proc-tracerpid-read
  desc: Python reads proc TracerPid
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '/proc/\{?pid\}?/status[\s\S]{0,180}TracerPid'

- id: python-frozen-executable-check
  desc: Python frozen executable check
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: 'hasattr\(sys,\s*["'']frozen["'']\)|sys\.base_executable'

- id: python-vmware-virtualbox-vendor-string--virtualbox
  desc: Python VMware or VirtualBox vendor (virtualbox)
  crit: component
  conf: 0.9
  if:
    type: text
    word: virtualbox
  unless:
  - type: path
    regex: '\.j$'
- id: python-qemu-kvm-vendor-string--qemu
  desc: Python QEMU or KVM vendor string (qemu)
  crit: component
  conf: 0.9
  if:
    type: text
    word: qemu
  unless:
  - type: path
    regex: '\.j$'
- id: python-qemu-kvm-vendor-string--kvm
  desc: Python QEMU or KVM vendor string (kvm)
  crit: component
  conf: 0.9
  if:
    type: text
    word: kvm
  unless:
  - type: path
    regex: '\.j$'
- id: python-strace-ltrace-tool-string--strace
  desc: Python strace or ltrace tool string (strace)
  crit: notable
  conf: 0.9
  if:
    type: text
    word: strace
  unless:
  - type: text
    substr: shutdown_forensics
  - type: text
    substr: phantom SIGKILL
  - id: well-known/tool/offensive/sic-security/
- id: python-strace-ltrace-tool-string--ltrace
  desc: Python strace or ltrace tool string (ltrace)
  crit: notable
  conf: 0.9
  if:
    type: text
    word: ltrace
  unless:
  - id: well-known/tool/offensive/sic-security/
- id: python-debugger-tool-string--radare2
  desc: Python debugger tool string (radare2)
  crit: component
  conf: 0.9
  if:
    type: text
    word: radare2
- id: python-debugger-tool-string--objdump
  desc: Python debugger tool string (objdump)
  crit: component
  conf: 0.9
  if:
    type: text
    word: objdump
- id: python-packet-analysis-tool-string--wireshark
  desc: Python packet analysis tool string (wireshark)
  crit: notable
  conf: 0.9
  if:
    type: text
    word: wireshark
  unless:
  - id: well-known/tool/offensive/sic-security/

- id: python-analysis-trace-exit-gate
  desc: Python trace-detection exit gate
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(gettrace|f_trace)[\s\S]{0,260}sys\.exit\s*\('
  unless:
    - id: metadata/lang/source::linux-kernel-secondary-tree-path
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
    - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
- id: python-vmware-virtualbox-vendor-string
  desc: Python VMware or VirtualBox vendor string
  crit: component
  conf: 0.9
  not:
  - regex: '(?i)vmware\s*vmx'
  unless:
  - id: metadata/build/pip::python-packaging-vendored-source
  - id: metadata/build/pip::python-packaging-tool-tests
  - id: metadata/build/pip::pip-wheel-installer-source

  any:
  - id: metadata/vendor/string::vmware-keyword
  - id: python-vmware-virtualbox-vendor-string--virtualbox
- id: python-qemu-kvm-vendor-string
  desc: Python QEMU or KVM vendor string
  crit: component
  conf: 0.9
  unless:
  - id: metadata/build/pip::python-packaging-vendored-source
  - id: metadata/build/pip::python-packaging-tool-tests
  - id: metadata/build/pip::pip-wheel-installer-source

  any:
  - id: python-qemu-kvm-vendor-string--qemu
  - id: python-qemu-kvm-vendor-string--kvm
- id: python-strace-ltrace-tool-string
  desc: Python strace or ltrace tool string
  crit: notable
  conf: 0.9
  unless:
  - id: metadata/build/pip::python-packaging-vendored-source
  - id: metadata/build/pip::python-packaging-tool-tests
  - id: metadata/build/pip::pip-wheel-installer-source

  # A single debugger-tool name is benign — debugger integration/helper scripts
  # (mono-gdb.py, mono-sgen-gdb.py) reference "gdb" by design. Anti-analysis checks
  # several tools, so this is a building block for the needs:2 composite below.
  any:
  - id: python-strace-ltrace-tool-string--strace
  - id: python-strace-ltrace-tool-string--ltrace
- id: python-debugger-tool-string
  desc: Python debugger tool string
  crit: component
  conf: 0.9
  not:
  - regex: '(?i)xdebug'
  unless:
  - id: metadata/build/pip::python-packaging-vendored-source
  - id: metadata/build/pip::python-packaging-tool-tests
  - id: metadata/build/pip::pip-wheel-installer-source

  any:
  - id: micro-behaviors/process/debug/tool-markers::gdb-name-reference
  - id: python-debugger-tool-string--radare2
  - id: python-debugger-tool-string--objdump
- id: python-packet-analysis-tool-string
  desc: Python packet analysis tool string
  crit: notable
  conf: 0.9
  unless:
  - id: metadata/build/pip::python-packaging-vendored-source
  - id: metadata/build/pip::python-packaging-tool-tests
  - id: metadata/build/pip::pip-wheel-installer-source
  - id: well-known/tool/offensive/sic-security/

  any:
  - id: python-packet-analysis-tool-string--wireshark
  - id: micro-behaviors/communications/capture/tcpdump::tcpdump
- id: python-vm-vendor-string-set
  desc: Python VM vendor string pair
  # Multiple vendor names are still incomplete evidence: provisioning and
  # virtualization-management tools commonly enumerate supported hypervisors.
  # Intent is supplied only when this is joined with a host-fingerprint read.
  crit: component
  conf: 0.9
  any:
  - id: python-vmware-virtualbox-vendor-string
  - id: python-qemu-kvm-vendor-string
  - id: python-xen-hyperv-bochs-vendor-string
  needs: 2
  unless:
  - id: metadata/file/profile/language::large-unparsed-source-corpus
  - id: well-known/tool/sysadmin/alpine-packages::alpine-ansible-core-package
  - id: well-known/tool/development/valgrind::valgrind-tool
  - id: well-known/app/gns3::gns3-gui-package-member
  - id: well-known/app/kiwi::kiwi-appliance-builder-package
  - id: well-known/app/kiwi::kiwi-grub2-test-fixture
  - id: well-known/app/kiwi::kiwi-defaults-module
  - id: well-known/app/kiwi::kiwi-grub2-config-module

- id: python-vm-keyword-exit-gate
  desc: Python VM-marker exit gate
  crit: suspicious
  conf: 0.94
  all:
    - id: python-vm-vendor-string-set
    - id: micro-behaviors/process/exit/terminate::python-sys-exit-symbol
  near_lines: 16

- id: python-anti-analysis-fingerprint-exit
  desc: Python combines host fingerprinting with VM and trace exit gates
  crit: hostile
  conf: 0.98
  attack: T1497.001,T1622
  all:
    - id: python-vm-vendor-string-set
    - id: python-analysis-trace-exit-gate
    - id: python-vm-keyword-exit-gate
  any:
    - id: micro-behaviors/os/sysinfo/platform/runtime::python-platform-machine
    - id: micro-behaviors/os/sysinfo/platform/runtime::python-platform-processor

- id: python-sandbox-tool-process-set
  desc: Python sandbox tool string set
  crit: notable
  conf: 0.9
  any:
  - id: python-strace-ltrace-tool-string
  - id: python-debugger-tool-string
  - id: python-packet-analysis-tool-string
  needs: 2
  unless:
  - id: well-known/app/calvyn-code
  - id: well-known/tool/offensive/sic-security/

- id: python-unix-vm-fingerprint-check
  desc: Python Unix VM fingerprint check
  # Host diagnostics and benchmarks may collect the same markers. Require a
  # nearby termination gate so only analysis-evasion use remains suspicious.
  crit: suspicious
  conf: 0.96
  all:
  - id: python-vm-vendor-string-set
  - id: micro-behaviors/process/exit/terminate::python-sys-exit-symbol
  any:
  - id: python-dmi-product-name-read
  - id: micro-behaviors/fs/proc/system::system-cpuinfo
  needs: 1
  near_lines: 16
  unless:
  - id: well-known/tool/sysadmin/alpine-packages::alpine-ansible-core-package
  - id: well-known/tool/sysadmin/container/

- id: python-unix-analysis-evasion-suite
  desc: Python Unix analysis evasion suite
  crit: hostile
  conf: 0.97
  any:
  - id: python-unix-vm-fingerprint-check
  - id: python-proc-tracerpid-read
  - id: python-frozen-executable-check
  - id: objectives/anti-analysis/sandbox-detect/script::hostname-sandbox-keyword-check
  needs: 3
