defaults:
  platforms: [unix]
  for: [python]
  attack: T1497
  mbc: B0003

traits:
- id: python-cpu-count-symbol
  desc: Python CPU count symbol
  crit: component
  conf: 0.84
  if:
    type: symbol
    exact: os.cpu_count
- id: python-sys-exit-symbol
  desc: Python sys.exit symbol
  crit: component
  conf: 0.84
  if:
    type: symbol
    exact: sys.exit
- id: python-lang-env-access
  desc: Python LANG environment access
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: LANG
- id: python-locale-prefix-check
  desc: Python locale prefix check
  crit: component
  conf: 0.84
  if:
    type: symbol
    exact: lang.lower().startswith
- id: python-stdout-redirect-symbol
  desc: Python stdout redirection
  crit: component
  conf: 0.84
  if:
    type: symbol
    exact: redirect_stdout
- id: python-stderr-redirect-symbol
  desc: Python stderr redirection
  crit: component
  conf: 0.84
  if:
    type: symbol
    exact: redirect_stderr
- id: pip-break-system-packages
  desc: pip install break-system-packages flag
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    exact: --break-system-packages

composite_rules:
- id: python-cpu-count-exit-gate
  desc: Python exits on low CPU count
  crit: suspicious
  conf: 0.92
  all:
  - id: python-cpu-count-symbol
  - id: python-sys-exit-symbol
  near_lines: 12
- id: python-lang-prefix-exit-gate
  desc: Python exits on locale prefix
  crit: suspicious
  conf: 0.92
  all:
  - id: python-lang-env-access
  - id: python-locale-prefix-check
  - id: python-sys-exit-symbol
  near_lines: 16
- id: python-silent-module-launch
  desc: Python module launch with stdout and stderr suppressed
  crit: suspicious
  conf: 0.9
  all:
  - id: python-stdout-redirect-symbol
  - id: python-stderr-redirect-symbol
  - id: objectives/persistence/login/python-startup::runpy-run-module
  near_lines: 12
- id: python-gated-silent-launcher
  desc: Python gated silent launcher
  crit: suspicious
  conf: 0.95
  all:
  - id: python-silent-module-launch
  any:
  - id: python-cpu-count-exit-gate
  - id: python-lang-prefix-exit-gate
  - id: pip-break-system-packages
