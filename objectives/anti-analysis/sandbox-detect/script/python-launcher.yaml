defaults:
  platforms: [unix]
  for: [python]
  attack: T1497
  mbc: B0003

traits:
- id: python-locale-prefix-check
  desc: Python locale prefix check
  crit: component
  conf: 0.84
  if:
    type: symbol
    exact: lang.lower().startswith
composite_rules:
- id: python-cpu-count-exit-gate
  desc: Python exits after low CPU count check
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/os/sysinfo/cpu::python-cpu-count-symbol
  - id: micro-behaviors/process/exit/terminate::python-sys-exit-symbol
  near_lines: 12
  unless:
  - id: metadata/lang/scripted::python-cpu-count-integer-division
- id: python-lang-prefix-exit-gate
  desc: Python exits on locale prefix
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/os/env/vars/access::python-lang-env-access
  - id: python-locale-prefix-check
  - id: micro-behaviors/process/exit/terminate::python-sys-exit-symbol
  near_lines: 16
- id: python-silent-module-launch
  desc: Python module launch with stdout and stderr suppressed
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/process/fd/stdio::python-stdout-redirect-symbol
  - id: micro-behaviors/process/fd/stdio::python-stderr-redirect-symbol
  - id: objectives/persistence/login/python-startup::runpy-run-module
  near_lines: 12
- id: python-gated-silent-launcher
  desc: Python gated silent launcher
  crit: suspicious
  conf: 0.95
  all:
  - id: python-silent-module-launch
  any:
  - id: python-cpu-count-exit-gate
  - id: python-lang-prefix-exit-gate
