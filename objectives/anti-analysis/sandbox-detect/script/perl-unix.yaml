defaults:
  platforms: [unix]
  for: [perl]
  attack: T1497
  mbc: B0007

traits:
  - id: perl-proc-tracerpid-read
    desc: Perl reads proc TracerPid
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'TracerPid:[\s\S]{0,80}debugger detected'

  - id: perl-analysis-tool-list
    desc: Perl analysis tool list
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '"strace", "gdb", "ltrace", "tcpdump"'

  - id: perl-sandbox-host-pattern
    desc: Perl sandbox host pattern
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'hostname[\s\S]{0,120}sandbox\|analysis'

  - id: perl-vm-interface-pattern
    desc: Perl VM interface pattern
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ifconfig[\s\S]{0,120}vboxnet\|vmnet'

composite_rules:
  - id: perl-unix-analysis-evasion
    desc: Perl Unix analysis evasion
    crit: hostile
    conf: 0.98
    all:
      - id: perl-analysis-tool-list
    any:
      - id: perl-proc-tracerpid-read
      - id: perl-sandbox-host-pattern
      - id: perl-vm-interface-pattern
    needs: 1
