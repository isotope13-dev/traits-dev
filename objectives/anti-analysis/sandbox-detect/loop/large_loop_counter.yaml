defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: suspicious
  conf: 0.8
  for: [scripts, binaries]
traits:
  - id: large-loop-counter
    desc: Loop check against large number
    mbc: B0003.003
    attack: T1497.003
    size_max: 10485760
    if:
      type: raw
      regex: (if|while|for)\s*\([^)]{1,120}([<>]=?|[!=]=)\s*[1-9][0-9]{13,}
      section: text
    not:
      - substr: '34028234663852886'
      - substr: '34028234663852886e22'
      - substr: '9007199254740991'
      - substr: '4503599627370496'
      - substr: '1099511627776'
      - substr: '1073741824'
      - substr: '11754943508222875'
      - substr: '17976931348623157'
      - substr: '22250738585072014'
      - regex: 922337203685477[0-9]{4}
      - substr: '6100535392761230'
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
        - id: objectives/anti-static/obfuscation/code-metrics::minification-pattern
