defaults:
  platforms: [windows]
  for: [c, cpp]
  attack: T1497.001
  mbc: B0007
traits:
  - id: take-screenshot-path
    desc: take_screenshot sandbox path
    crit: component
    conf: 0.96
    if:
      type: text
      exact: C:\\take_screenshot.ps1
  - id: loaddll-path
    desc: loaddll sandbox path
    crit: component
    conf: 0.96
    if:
      type: text
      exact: C:\\loaddll.exe
  - id: email-doc-path
    desc: email sandbox doc path
    crit: component
    conf: 0.94
    if:
      type: text
      exact: C:\\email.doc
  - id: email-htm-path
    desc: email sandbox htm path
    crit: component
    conf: 0.94
    if:
      type: text
      exact: C:\\email.htm
  - id: email-doc-nested-path
    desc: nested email sandbox doc path
    crit: component
    conf: 0.94
    if:
      type: text
      exact: C:\\123\\email.doc
  - id: email-docx-nested-path
    desc: nested email sandbox docx path
    crit: component
    conf: 0.94
    if:
      type: text
      exact: C:\\123\\email.docx
  - id: foobar-bmp-path
    desc: foobar sandbox bmp path
    crit: component
    conf: 0.94
    if:
      type: text
      exact: C:\\a\\foobar.bmp
  - id: foobar-doc-path
    desc: foobar sandbox doc path
    crit: component
    conf: 0.94
    if:
      type: text
      exact: C:\\a\\foobar.doc
  - id: foobar-gif-path
    desc: foobar sandbox gif path
    crit: component
    conf: 0.94
    if:
      type: text
      exact: C:\\a\\foobar.gif
  - id: cuckoo-hostname
    desc: Cuckoo sandbox hostname
    crit: component
    conf: 0.92
    if:
      type: text
      exact: TEQUILABOOMBOOM
  - id: sandbox-username-wilber
    desc: Sandbox username Wilber
    crit: component
    conf: 0.9
    if:
      type: text
      exact: Wilber
  - id: sandbox-hostname-systemit
    desc: Sandbox hostname SystemIT
    crit: component
    conf: 0.9
    if:
      type: text
      exact: SystemIT
  - id: sandbox-hostname-klone
    desc: Sandbox hostname KLONE_X64-PC
    crit: component
    conf: 0.92
    if:
      type: text
      exact: KLONE_X64-PC
composite_rules:
  - id: paired-sandbox-file-artifacts
    desc: Paired sandbox file artifacts
    crit: suspicious
    conf: 0.96
    all:
      - id: take-screenshot-path
      - id: loaddll-path
  - id: email-sandbox-artifact-cluster
    desc: Email sandbox artifact cluster
    crit: suspicious
    conf: 0.97
    all:
      - id: email-doc-path
      - id: email-htm-path
      - id: email-doc-nested-path
      - id: email-docx-nested-path
  - id: foobar-sandbox-artifact-cluster
    desc: Foobar sandbox artifact cluster
    crit: suspicious
    conf: 0.97
    all:
      - id: foobar-bmp-path
      - id: foobar-doc-path
      - id: foobar-gif-path
  - id: named-sandbox-host-cluster
    desc: Named sandbox host and user markers
    crit: suspicious
    conf: 0.93
    needs: 2
    any:
      - id: cuckoo-hostname
      - id: sandbox-username-wilber
      - id: sandbox-hostname-systemit
      - id: sandbox-hostname-klone
