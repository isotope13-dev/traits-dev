defaults:
  platforms: [unix, appliance, routeros]
  for: [java, kotlin, class, jar]
  attack: T1497

traits:
  - id: jvm-analysis-env-vars
    desc: Checks FRIDA/QEMU analysis env vars
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'FRIDA_SERVER[\s\S]{0,180}QEMU_LOG'

  - id: jvm-selenium-env-var
    desc: Checks for Selenium automation env
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: SELENIUM_BROWSER

  - id: jvm-analysis-tool-which
    desc: Runs 'which' to find analysis tools
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ProcessBuilder\("which"[\s\S]{0,180}(frida|gdb|strace|tcpdump)'

  - id: jvm-analysis-tool-bytecode
    desc: tcpdump string in bytecode (sniffer)
    crit: suspicious
    conf: 0.92
    for: [class]
    if:
      type: hex
      pattern: 74 63 70 64 75 6D 70
    unless:
      - type: hex
        pattern: 74 63 70 64 75 6D 70 20 6F 75 74 70 75 74

  - id: jvm-headless-property-check
    desc: Checks java.awt.headless for sandbox
    crit: suspicious
    conf: 0.91
    if:
      type: text
      substr: java.awt.headless
    unless:
      - id: well-known/app/gitbucket
      - type: text
        substr: JettyLauncher

  - id: jvm-headless-property-bytecode
    desc: headless sandbox check in bytecode
    crit: notable
    conf: 0.92
    for: [class, jar]
    if:
      type: hex
      pattern: 6A 61 76 61 2E 61 77 74 2E 68 65 61 64 6C 65 73 73
    unless:
      - type: path
        substr: net/sourceforge/plantuml/Run.class
      - type: path
        regex: '(^|[\\/!])plantuml\.jar([\\/!]|$)'
      - id: well-known/lib/eclipse-lemminx/
      - id: metadata/library/structure::vscode-language-server-library
      - type: path
        substr: language-server/lib
      - type: text
        substr: org/springframework/boot/SpringApplication

composite_rules:
  - id: jvm-vm-artifact-path-set
    desc: JVM VM artifact path set
    crit: suspicious
    conf: 0.93
    needs: 2
    any:
      - id: micro-behaviors/fs/path/proc::cpuinfo-string
      - id: micro-behaviors/fs/path/proc::version-string
      - id: micro-behaviors/fs/path/dmi::product-name-string
      - id: micro-behaviors/fs/path/dmi::vendor-path-string

  - id: jvm-vm-artifact-path-bytecode
    desc: JVM VM artifact path bytecode
    crit: suspicious
    conf: 0.93
    for: [class, jar]
    needs: 2
    any:
      - id: micro-behaviors/fs/path/proc::cpuinfo-bytecode
      - id: micro-behaviors/fs/path/proc::version-bytecode
      - id: micro-behaviors/fs/path/dmi::product-name-bytecode
    unless:
      - id: well-known/tool/reverse-engineering/frida/
      - id: well-known/app/tiktok::package-member
      - id: micro-behaviors/fs/path/dmi::system-vendor-bytecode
      - id: metadata/package/files/system-package::container-image-tar-name
    scope: leaf

  - id: jvm-sandbox-detect-suite
    desc: JVM sandbox detect suite
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-headless-property-check
      - id: micro-behaviors/process/attach/jvm::jvm-profiler-attach
      - id: jvm-vm-artifact-path-set

  - id: jvm-sandbox-detect-bytecode
    desc: JVM sandbox detect bytecode
    crit: hostile
    conf: 0.98
    for: [class, jar]
    all:
      - id: jvm-headless-property-bytecode
      - id: micro-behaviors/process/attach/jvm::jvm-dynamic-attach-api-bytecode
      - id: jvm-vm-artifact-path-bytecode
    scope: leaf

  - id: jvm-linux-analysis-suite
    desc: JVM Linux analysis suite
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-vm-artifact-path-set
      - id: jvm-analysis-env-vars
    any:
      - id: objectives/anti-analysis/browser-detect::java-puppeteer-browser-env
      - id: jvm-selenium-env-var
      - id: jvm-analysis-tool-which

  - id: jvm-source-analysis-suite
    desc: JVM source analysis suite
    crit: hostile
    conf: 0.98
    for: [java, kotlin]
    all:
      - id: micro-behaviors/fs/path/dmi::vendor-path-string
      - id: jvm-analysis-env-vars
    any:
      - id: jvm-selenium-env-var
      - id: jvm-analysis-tool-which

  - id: jvm-analysis-tool-bytecode-suite
    desc: JVM analysis tool bytecode
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-vm-artifact-path-bytecode
      - id: jvm-analysis-tool-bytecode
      - id: objectives/command-and-control/dropper/execution/http::jvm-fileoutput-process-hex
