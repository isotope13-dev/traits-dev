defaults:
  platforms: [unix, appliance, routeros]
  for: [java, kotlin, class, jar]
  attack: T1497

traits:
  - id: jvm-proc-cpuinfo-path
    desc: Reads /proc/cpuinfo to detect VM
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      exact: /proc/cpuinfo

  - id: jvm-proc-version-path
    desc: Reads /proc/version to detect VM
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      exact: /proc/version

  - id: jvm-dmi-product-path
    desc: Reads DMI product name to detect VM
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      exact: /sys/class/dmi/id/product_name

  - id: jvm-dmi-vendor-paths
    desc: Reads DMI vendor IDs to detect VM
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/sys/class/dmi/id/(sys_vendor|bios_vendor|board_vendor)'

  - id: jvm-analysis-env-vars
    desc: Checks FRIDA/QEMU analysis env vars
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'FRIDA_SERVER[\s\S]{0,180}QEMU_LOG'

  - id: jvm-selenium-env-var
    desc: Checks for Selenium automation env
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: SELENIUM_BROWSER

  - id: jvm-analysis-tool-which
    desc: Runs 'which' to find analysis tools
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ProcessBuilder\("which"[\s\S]{0,180}(frida|gdb|strace|tcpdump)'

  - id: jvm-proc-cpuinfo-bytecode
    desc: /proc/cpuinfo VM check in bytecode
    crit: suspicious
    conf: 0.92
    for: [class, jar]
    if:
      type: hex
      pattern: 2F 70 72 6F 63 2F 63 70 75 69 6E 66 6F

  - id: jvm-proc-version-bytecode
    desc: /proc/version VM check in bytecode
    crit: suspicious
    conf: 0.92
    for: [class, jar]
    if:
      type: hex
      pattern: 2F 70 72 6F 63 2F 76 65 72 73 69 6F 6E

  - id: jvm-dmi-product-bytecode
    desc: DMI product VM check in bytecode
    crit: suspicious
    conf: 0.92
    for: [class, jar]
    if:
      type: hex
      pattern: 2F 73 79 73 2F 63 6C 61 73 73 2F 64 6D 69 2F 69 64 2F 70 72 6F 64 75 63 74 5F 6E 61 6D 65

  - id: jvm-dmi-sys-vendor-bytecode
    desc: DMI sys_vendor VM check in bytecode
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2F 73 79 73 2F 63 6C 61 73 73 2F 64 6D 69 2F 69 64 2F 73 79 73 5F 76 65 6E 64 6F 72

  - id: jvm-analysis-tool-bytecode
    desc: tcpdump string in bytecode (sniffer)
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 74 63 70 64 75 6D 70

  - id: jvm-headless-property-check
    desc: Checks java.awt.headless for sandbox
    crit: suspicious
    conf: 0.91
    if:
      type: text
      substr: java.awt.headless

  - id: jvm-headless-property-bytecode
    desc: headless sandbox check in bytecode
    crit: suspicious
    conf: 0.92
    for: [class, jar]
    if:
      type: hex
      pattern: 6A 61 76 61 2E 61 77 74 2E 68 65 61 64 6C 65 73 73

  - id: jvm-attach-vm-debugger-check
    desc: Detects JVM attach-API debugger
    crit: suspicious
    conf: 0.91
    if:
      type: text
      substr: sun.tools.attach.VirtualMachine

  - id: jvm-attach-vm-bytecode
    desc: JVM attach-API check in bytecode
    crit: suspicious
    conf: 0.92
    for: [class, jar]
    if:
      type: hex
      pattern: 73 75 6E 2E 74 6F 6F 6C 73 2E 61 74 74 61 63 68 2E 56 69 72 74 75 61 6C 4D 61 63 68 69 6E 65

composite_rules:
  - id: jvm-vm-artifact-path-set
    desc: JVM VM artifact path set
    crit: suspicious
    conf: 0.93
    needs: 2
    any:
      - id: jvm-proc-cpuinfo-path
      - id: jvm-proc-version-path
      - id: jvm-dmi-product-path
      - id: jvm-dmi-vendor-paths

  - id: jvm-vm-artifact-path-bytecode
    desc: JVM VM artifact path bytecode
    crit: suspicious
    conf: 0.93
    needs: 2
    any:
      - id: jvm-proc-cpuinfo-bytecode
      - id: jvm-proc-version-bytecode
      - id: jvm-dmi-product-bytecode
      - id: jvm-dmi-sys-vendor-bytecode

  - id: jvm-sandbox-detect-suite
    desc: JVM sandbox detect suite
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-headless-property-check
      - id: jvm-attach-vm-debugger-check
      - id: jvm-vm-artifact-path-set

  - id: jvm-sandbox-detect-bytecode
    desc: JVM sandbox detect bytecode
    crit: hostile
    conf: 0.98
    for: [class, jar]
    all:
      - id: jvm-headless-property-bytecode
      - id: jvm-attach-vm-bytecode
      - id: jvm-vm-artifact-path-bytecode

  - id: jvm-linux-analysis-suite
    desc: JVM Linux analysis suite
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-vm-artifact-path-set
      - id: jvm-analysis-env-vars
    any:
      - id: objectives/anti-analysis/browser-detect::java-puppeteer-browser-env
      - id: jvm-selenium-env-var
      - id: jvm-analysis-tool-which

  - id: jvm-source-analysis-suite
    desc: JVM source analysis suite
    crit: hostile
    conf: 0.98
    for: [java, kotlin]
    all:
      - id: jvm-dmi-vendor-paths
      - id: jvm-analysis-env-vars
    any:
      - id: jvm-selenium-env-var
      - id: jvm-analysis-tool-which

  - id: jvm-analysis-tool-bytecode-suite
    desc: JVM analysis tool bytecode
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-vm-artifact-path-bytecode
      - id: jvm-analysis-tool-bytecode
      - id: objectives/command-and-control/dropper/execution/http::jvm-fileoutput-process-hex
