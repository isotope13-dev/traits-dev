defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1497
  mbc: B0007
traits:
  - id: native-debugger-check-marker
    desc: Native debugger check method marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Check_NativeDebugger
  - id: sandbox-user-check-marker
    desc: Sandbox user check method marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Check_SandboxUser
  - id: analysis-process-check-marker
    desc: Analysis process check method marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Check_AnalysisProcesses
  - id: debugger-window-check-marker
    desc: Debugger window check method marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: Check_DebuggerWindows
  - id: sandbox-score-final-log
    desc: Sandbox score final log
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "@[sandboxScore] FINAL="
  - id: sandbox-skipped-payload-log
    desc: Sandbox skipped payload log
    crit: component
    conf: 0.96
    if:
      type: text
      exact: "@[main] SKIPPED payload (sandbox detected)"
  - id: sandbox-fingerprint-collection
    desc: Multiple sandbox fingerprint method markers
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '\bSuspicious(Processes|Paths|MacPrefixes|Drivers|EnvVars)\b'
    count_min: 3
  - id: windows-sandbox-artifact-collection
    desc: Multiple Windows sandbox artifact markers
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '\bWindowsSandbox(DefaultUser|DnsSuffix|DevicePath|RegistryKey|RegistryValue)\b'
    count_min: 3
composite_rules:
  - id: named-native-anti-analysis-check-cluster
    desc: Native debugger and sandbox check cluster
    crit: notable
    conf: 0.99
    all:
      - id: native-debugger-check-marker
      - id: sandbox-user-check-marker
      - id: analysis-process-check-marker
      - id: debugger-window-check-marker
  - id: native-anti-analysis-check-suite
    desc: Native binary debugger VM and sandbox check suite
    crit: hostile
    conf: 0.99
    attack: T1497,T1622
    all:
      - id: named-native-anti-analysis-check-cluster
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: sandbox-gated-payload-execution
    desc: Sandbox gated payload execution
    crit: suspicious
    conf: 0.96
    all:
      - id: sandbox-score-final-log
      - id: sandbox-skipped-payload-log
    unless:
      - id: metadata/signed/platform/
  - id: anti-analysis-fingerprint-suite
    desc: Anti-analysis fingerprint suite (debugger + locale + timing)
    crit: suspicious
    conf: 0.92
    size_max: 500000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::debugger-api
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
    any:
      - id: objectives/anti-analysis/timing/evasion::high-res-timing
      - id: micro-behaviors/time/timing/delay::query-performance-counter
    needs: 1
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/metrics/threshold::many-exports-200
      - id: metadata/binary/metrics/structural::many-functions
      - id: metadata/binary/framework/
      - id: objectives/anti-analysis/debugger-detect/check/
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-versioninfo
        - id: metadata/binary/layout::pe-embedded
  - id: nsis-environment-gated-opaque-payload
    desc: NSIS environment-gated opaque payload
    crit: hostile
    conf: 0.98
    attack: T1497,T1027,T1105
    all:
      - id: metadata/binary/installer/script::nsis
      - id: objectives/evasion/anti-av/syscall::ssn-field
      - id: metadata/binary/metrics/size::massive-executable
      - id: metadata/binary/layout::overlay-over-90pct
      - id: metadata/binary/layout::high-entropy-overlay
      - id: micro-behaviors/fs/enumerate/volume::get-disk-free-space
      - id: micro-behaviors/fs/sync/fsync::set-file-time
    unless:
      - id: metadata/signed/platform/
  - id: managed-sandbox-fingerprint-suite
    desc: Managed binary fingerprints sandbox and virtualization artifacts
    crit: hostile
    conf: 0.99
    all:
      - id: sandbox-fingerprint-collection
      - id: windows-sandbox-artifact-collection
      - id: metadata/binary/framework::dotnet-metadata
  - id: native-resource-timing-sandbox-gate
    desc: Native loader combines debugger, resource, timing, and opaque-payload checks
    crit: hostile
    conf: 0.98
    attack: T1497,T1622,T1027.009
    for: [pe]
    all:
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
      - id: micro-behaviors/os/sysinfo/hardware::get-system-info
      - id: micro-behaviors/fs/enumerate/volume::get-disk-free-space
      - id: micro-behaviors/time/query::get-tick-count
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: metadata/binary/section/metrics::large-high-entropy-writable-data-section
      - id: objectives/anti-static/obfuscation/string/reconstruct::stack-create-process-truncated
