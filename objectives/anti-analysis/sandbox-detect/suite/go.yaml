defaults:
  platforms: [windows]
  for: [pe]
  attack: T1497

traits:
  - id: debugger-check-runner
    desc: Go stealth anti-debugging runner
    crit: component
    conf: 0.97
    if:
      type: text
      substr: /stealth/adbg.Run

  - id: aggregate-sandbox-checks
    desc: Go aggregate sandbox checks
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: /stealth/avm.AllSandboxChecks

  - id: memory-sandbox-check
    desc: Go memory-based sandbox check
    crit: component
    conf: 0.97
    if:
      type: text
      substr: /stealth/avm.MemoryCheck

  - id: disk-sandbox-check
    desc: Go disk-based sandbox check
    crit: component
    conf: 0.97
    if:
      type: text
      substr: /stealth/avm.DiskCheck

  - id: stealth-check-runner
    desc: Go combined stealth-check runner
    crit: component
    conf: 0.97
    if:
      type: text
      substr: /stealth.RunStealth

composite_rules:
  - id: payload-gated-anti-analysis-suite
    desc: Go dropper gates its payload behind debugger and sandbox checks
    crit: hostile
    conf: 0.99
    all:
      - id: debugger-check-runner
      - id: aggregate-sandbox-checks
      - id: memory-sandbox-check
      - id: disk-sandbox-check
      - id: stealth-check-runner
      - id: objectives/command-and-control/dropper/execution/native::payload-container-type
