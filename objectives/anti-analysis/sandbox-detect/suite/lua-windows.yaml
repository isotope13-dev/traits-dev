defaults:
  platforms: [windows]
  for: [lua]
  attack: T1497

traits:
  - id: lua-windows-vm-tool-processes
    desc: Lua VM tool process list
    crit: suspicious
    conf: 0.93
    count_min: 3
    if:
      type: literal
      regex: '^(vmtoolsd|vboxservice|qemu-ga)\.exe$'

  - id: lua-windows-analysis-tools
    desc: Lua analysis tool process list
    crit: suspicious
    conf: 0.93
    count_min: 3
    if:
      type: literal
      regex: '^(procmon|procexp|wireshark|x64dbg)\.exe$'

  - id: lua-windows-debug-object-query
    desc: Lua Debug Object query
    crit: suspicious
    conf: 0.92
    if:
      type: literal
      substr: 'Session Manager\\Debug Object'

  - id: lua-windows-vm-hardware-checks
    desc: Lua VM hardware checks
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: literal
      regex: '^(getmac /FO CSV|wmic cpu get name|wmic diskdrive get size)'

composite_rules:
  - id: lua-windows-analysis-evasion-suite
    desc: Lua Windows sandbox check suite
    crit: hostile
    conf: 0.98
    all:
      - id: lua-windows-vm-tool-processes
      - id: lua-windows-analysis-tools
      - id: micro-behaviors/process/enumerate/shell::tasklist
    any:
      - id: lua-windows-debug-object-query
      - id: lua-windows-vm-hardware-checks
