defaults:
  platforms: [unix, appliance]
  for: [rust, elf]
  attack: T1497

traits:
  - id: rust-sandbox-env-list
    desc: Rust sandbox env list
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'VMWARE[\s\S]{0,220}VBOX[\s\S]{0,220}QEMU'

  - id: rust-short-uptime-check
    desc: Rust short uptime check
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/proc/uptime[\s\S]{0,260}uptime < 300\.0'

composite_rules:
  - id: rust-sandbox-indicator-suite
    desc: Rust sandbox indicator suite
    crit: hostile
    conf: 0.98
    all:
      - id: rust-sandbox-env-list
      - id: micro-behaviors/fs/proc/system::cpuinfo-hypervisor-marker-check
    any:
      - id: rust-short-uptime-check
