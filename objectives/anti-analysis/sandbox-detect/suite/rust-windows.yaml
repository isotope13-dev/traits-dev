defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1497.001

traits:
  - id: rust-windows-debugger-api-set
    desc: Rust Windows debugger API set
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'IsDebuggerPresent[\s\S]{0,260}NtQueryInformationProcess'

  - id: rust-windows-vm-registry-probes
    desc: Rust Windows VM registry probes
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'DEVICEMAP\\\\Scsi[\s\S]{0,520}ServiceName'

  - id: rust-windows-analysis-tools
    desc: Rust Windows analysis tools
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'procmon\.exe[\s\S]{0,260}x64dbg\.exe[\s\S]{0,260}ida64\.exe'

  - id: rust-windows-vm-resource-checks
    desc: Rust Windows VM resource checks
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'low_ram[\s\S]{0,520}low_cpu_count[\s\S]{0,520}short_uptime'

  - id: rust-cpu-count-environment-log
    desc: Rust CPU-count environment check log
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: '[ENV] cpu_count='

  - id: rust-memory-size-environment-log
    desc: Rust memory-size environment check log
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: '[ENV] memory='

  - id: rust-network-time-validation-log-set
    desc: Rust two-round network-time validation logs
    crit: suspicious
    conf: 0.98
    count_min: 3
    if:
      type: text
      regex: '\[NVS\] (Round[12] T[12]=|delta=.{0,48}threshold=|trying endpoint)'

composite_rules:
  - id: rust-windows-analysis-evasion-suite
    desc: Rust Windows analysis evasion suite
    crit: hostile
    conf: 0.98
    all:
      - id: rust-windows-debugger-api-set
      - id: rust-windows-analysis-tools
      - id: rust-windows-vm-resource-checks
  - id: rust-resource-and-network-time-sandbox-gate
    desc: Rust loader gates execution on CPU, memory, and two-round network-time checks
    crit: hostile
    conf: 0.99
    all:
      - id: rust-cpu-count-environment-log
      - id: rust-memory-size-environment-log
      - id: rust-network-time-validation-log-set
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
      - id: micro-behaviors/time/schedule/waitable::create-and-set-waitable-timer
