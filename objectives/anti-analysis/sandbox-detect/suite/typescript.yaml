defaults:
  platforms: [unix, windows, appliance]
  for: [typescript, javascript]
  attack: T1497

traits:
  - id: ts-debug-env-gate
    desc: TS debugger env gate
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'process\.env[\s\S]{0,360}(LD_PRELOAD|STRACE|LTRACE)'

  - id: ts-virt-indicator-list
    desc: TS virtual tool indicator list
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'VIRT_INDICATORS[\s\S]{0,260}(VBoxService|vmtoolsd|qemu-ga)'

composite_rules:
  - id: ts-env-proc-sandbox-gate
    desc: TS env proc sandbox gate
    crit: hostile
    conf: 0.98
    all:
      - id: ts-debug-env-gate
      - id: micro-behaviors/fs/proc/info/path::process-self-status

  - id: ts-process-sandbox-report
    desc: TS process sandbox report
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-analysis/debugger-detect/combined-checks::ts-debugger-indicator-list
      - id: ts-virt-indicator-list
      - id: objectives/anti-analysis/debugger-detect/combined-checks::ts-analysis-report-post
