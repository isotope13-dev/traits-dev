defaults:
  platforms: [routeros, appliance, unix]
  for: [javascript]
  attack: T1497

traits:
  - id: js-jvm-management-factory
    desc: JS JVM management factory
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ManagementFactory.getRuntimeMXBean

  - id: js-jvm-processor-count
    desc: JS JVM processor count check
    crit: component
    conf: 0.9
    if:
      type: text
      substr: availableProcessors

  - id: js-jvm-total-memory-check
    desc: JS JVM total memory check
    crit: component
    conf: 0.9
    if:
      type: text
      substr: totalMemory

  - id: js-jvm-max-memory-check
    desc: JS JVM max memory check
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: maxMemory

  - id: js-jvm-network-interface-check
    desc: JS JVM network interface check
    crit: component
    conf: 0.9
    if:
      type: text
      substr: NetworkInterface.getNetworkInterfaces

  - id: js-jvm-proc-cgroup-path
    desc: "Reads /proc/1/cgroup detect container runtime"
    crit: component
    conf: 0.91
    if:
      type: string_literal
      exact: /proc/1/cgroup

  - id: js-jvm-hypervisor-path
    desc: JS JVM hypervisor path
    crit: component
    conf: 0.91
    if:
      type: string_literal
      exact: /sys/hypervisor/type

  - id: js-jvm-udev-queue-path
    desc: JS JVM udev queue path
    crit: component
    conf: 0.91
    if:
      type: string_literal
      exact: /dev/.udev/queue

composite_rules:
  - id: js-jvm-runtime-sandbox-checks
    desc: JS JVM runtime sandbox checks
    crit: suspicious
    conf: 0.93
    needs: 3
    any:
      - id: js-jvm-management-factory
      - id: js-jvm-processor-count
      - id: js-jvm-total-memory-check
      - id: js-jvm-max-memory-check
      - id: js-jvm-network-interface-check

  - id: js-jvm-sandbox-artifact-paths
    desc: JS JVM sandbox artifact paths
    crit: suspicious
    conf: 0.93
    needs: 2
    any:
      - id: micro-behaviors/os/container/runtime::dockerenv
      - id: js-jvm-proc-cgroup-path
      - id: js-jvm-hypervisor-path
      - id: js-jvm-udev-queue-path
    unless:
      - id: objectives/anti-analysis/vm-detect/dmi::stable-machine-id-container-marker

  - id: js-jvm-sandbox-detect-suite
    desc: JS JVM sandbox detect suite
    crit: hostile
    conf: 0.98
    all:
      - id: js-jvm-runtime-sandbox-checks
      - id: js-jvm-sandbox-artifact-paths
