defaults:
  platforms: [routeros, appliance, unix]
  for: [javascript]
  attack: T1497

composite_rules:
  - id: js-jvm-runtime-sandbox-checks
    desc: JS JVM runtime sandbox checks
    crit: suspicious
    conf: 0.93
    needs: 3
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::jvm-management-factory-reference
      - id: micro-behaviors/os/sysinfo/cpu::jvm-processor-count-reference
      - id: micro-behaviors/os/sysinfo/hardware::jvm-total-memory-reference
      - id: micro-behaviors/os/sysinfo/hardware::jvm-max-memory-reference
      - id: micro-behaviors/os/network/interface::jvm-network-interface-enumeration

  - id: js-jvm-sandbox-artifact-paths
    desc: JS JVM sandbox artifact paths
    crit: suspicious
    conf: 0.93
    needs: 2
    any:
      - id: micro-behaviors/os/sysinfo/platform/artifact::linux-hypervisor-type-path
      - id: micro-behaviors/os/sysinfo/platform/artifact::udev-queue-path

  - id: js-jvm-sandbox-detect-suite
    desc: JS JVM sandbox detect suite
    crit: hostile
    conf: 0.98
    all:
      - id: js-jvm-runtime-sandbox-checks
      - id: js-jvm-sandbox-artifact-paths
