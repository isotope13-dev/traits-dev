defaults:
  platforms: [windows]
  crit: suspicious
  conf: 0.95
  for: [scripts, binaries]
traits:
  - id: sandbox-pipe-cuckoo
    desc: Cuckoo Sandbox named pipe
    if:
      type: text
      substr: "\\\\.\\pipe\\cuckoo"
  - id: sandbox-pipe-hgfs
    desc: VMware HGFS named pipe
    if:
      type: text
      substr: "\\\\.\\pipe\\hgfs"
  - id: sandbox-pipe-vmci
    desc: VMware VMCI named pipe
    if:
      type: text
      substr: "\\\\.\\pipe\\vmci"
  - id: sandbox-pipe-vbox
    desc: VirtualBox named pipe
    if:
      type: text
      substr: "\\\\.\\pipe\\vbox"
  - id: sandbox-pipe-joe
    desc: Joe Sandbox named pipe
    if:
      type: text
      substr: "\\\\.\\pipe\\joesandbox"
  - id: sandbox-pipe-sandboxie
    desc: Sandboxie named pipe
    if:
      type: text
      substr: "\\\\.\\pipe\\SbieCtrl"
composite_rules:
  - id: sandbox-named-pipe-detect
    desc: Detects sandbox-specific named pipes
    any:
      - id: sandbox-pipe-cuckoo
      - id: sandbox-pipe-hgfs
      - id: sandbox-pipe-vmci
      - id: sandbox-pipe-vbox
      - id: sandbox-pipe-joe
      - id: sandbox-pipe-sandboxie
