defaults:
  platforms: [windows]
  crit: suspicious
  conf: 0.95
  for: [scripts, binaries]
traits:
  - id: sandbox-pipe-cuckoo
    desc: Detects Cuckoo Sandbox named pipe
    if:
      type: text
      substr: "\\\\.\\pipe\\cuckoo"
  - id: sandbox-pipe-hgfs
    desc: Detects VMware HGFS named pipe
    if:
      type: text
      substr: "\\\\.\\pipe\\hgfs"
  - id: sandbox-pipe-vmci
    desc: Detects VMware VMCI named pipe
    if:
      type: text
      substr: "\\\\.\\pipe\\vmci"
  - id: sandbox-pipe-vbox
    desc: Detects VirtualBox named pipe
    if:
      type: text
      substr: "\\\\.\\pipe\\vbox"
composite_rules:
  - id: sandbox-named-pipe-detect
    desc: Detects sandbox-specific named pipes
    any:
      - id: sandbox-pipe-cuckoo
      - id: sandbox-pipe-hgfs
      - id: sandbox-pipe-vmci
      - id: sandbox-pipe-vbox
