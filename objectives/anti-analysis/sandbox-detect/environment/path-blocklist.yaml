defaults:
  platforms:
    - windows
    - linux
    - unix
    - android
    - macos
    - ios
  for: [binaries]
  crit: suspicious
  conf: 0.95
traits:
  - id: sandbox-cuckoo-path
    desc: Cuckoo Sandbox execution path
    if:
      type: string_value
      regex: cuckoo-[a-fA-F0-9]{64}
      case_insensitive: true
  - id: sandbox-user-profile
    desc: Sandbox user profile path
    if:
      type: string_value
      regex: C:\\Users\\(Bruno|Joe Cage|John Doe|azure)
      case_insensitive: true
  - id: sandbox-analysis-artifact-path
    desc: Sandbox analysis artifact path format
    if:
      type: string_value
      regex: c:\\analyse\\\d{9,}\.\d+_[0-9a-f-]{36}
      case_insensitive: true
  - id: sandbox-analysis-prefix-wide
    desc: UTF16 sandbox analysis path prefix
    for:
      - pe
      - dll
    size_max: 52428800
    if:
      type: hex
      section: .text
      pattern: 63 00 3A 00 5C 00 61 00 6E 00 61 00 6C 00 79 00 73 00 65 00 5C 00
