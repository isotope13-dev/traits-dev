defaults:
  platforms: [macos]
  for: [macho, objc, swift]
composite_rules:
  - id: internet-gated-execution
    desc: Internet connectivity gated execution
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/ip/connectivity::macos-reachability-api
      - id: micro-behaviors/communications/http/endpoints::google-web-host
    any:
      - id: objectives/command-and-control/dropper/execution/installer::macos-pkg-dropper
      - id: micro-behaviors/communications/http/url/domain::http-url-binary
    # A reachability API and an unrelated URL/library reference are common in
    # installers and updaters. Keep the objective signal only when the gate
    # evidence is physically close in the same Mach-O input.
    near_bytes: 512
