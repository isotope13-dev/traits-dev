defaults:
  platforms: [macos]
  for: [macho, objc, swift]
traits:
  - id: reachability-api
    desc: SCNetworkReachability connectivity check
    crit: component
    conf: 0.88
    if:
      type: text
      substr: SCNetworkReachability
composite_rules:
  - id: internet-gated-execution
    desc: Internet connectivity gated execution
    crit: suspicious
    conf: 0.9
    all:
      - id: reachability-api
      - id: micro-behaviors/communications/http/endpoints::google-connectivity-probe-host
    any:
      - id: objectives/command-and-control/dropper/execution/installer::macos-pkg-dropper
      - id: objectives/command-and-control/infrastructure/domain/malicious::http-url-binary
