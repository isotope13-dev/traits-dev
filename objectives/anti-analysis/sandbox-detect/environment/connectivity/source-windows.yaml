defaults:
  platforms: [windows]
  for: [c, cpp]
  attack: T1497.001
  mbc: B0007
traits:
  - id: ip-api-hosting-endpoint
    desc: ip-api hosting endpoint check
    crit: component
    conf: 0.95
    if:
      type: text
      exact: GET /json/?fields=hosting HTTP/1.1
  - id: hosting-response-true
    desc: hosting true response check
    crit: component
    conf: 0.92
    if:
      type: text
      exact: '\\"hosting\\":true'
composite_rules:
  - id: cloud-hosting-sandbox-check
    desc: Cloud hosting sandbox check
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/ip-discovery::ip-api-com
      - id: ip-api-hosting-endpoint
      - id: hosting-response-true
    any:
      - id: micro-behaviors/communications/ip/resolve::resolve-getaddrinfo
      - id: micro-behaviors/communications/socket/connect::connect-symbol
      - id: micro-behaviors/communications/socket/send::send-symbol
      - id: micro-behaviors/communications/socket/receive::recv-symbol
    needs: 1
