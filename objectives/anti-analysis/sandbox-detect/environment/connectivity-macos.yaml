defaults:
  platforms: [macos]
  for: [macho, objc, swift]
traits:
  - id: reachability-api
    desc: SCNetworkReachability connectivity check
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: SCNetworkReachability
  - id: google-connectivity-host
    desc: google reachability probe host
    crit: suspicious
    conf: 0.78
    if:
      type: text
      substr: www.google.com
composite_rules:
  - id: internet-gated-execution
    desc: Internet connectivity gated execution
    crit: suspicious
    conf: 0.9
    all:
      - id: reachability-api
      - id: google-connectivity-host
    any:
      - id: objectives/command-and-control/dropper/execution/installer::macos-pkg-dropper
      - id: objectives/command-and-control/infrastructure/domain::http-url-binary
