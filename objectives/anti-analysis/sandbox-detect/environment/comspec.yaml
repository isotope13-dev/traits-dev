defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-comspec-environment-check
    desc: Checks ComSpec environment variable for sandbox evasion
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: 'Environment[\s\S]{0,10}ComSpec'
