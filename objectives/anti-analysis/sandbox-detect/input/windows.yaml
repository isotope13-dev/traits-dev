defaults:
  platforms: [windows]
  for: [pe]
  attack: T1497

composite_rules:
  - id: packed-autoit-input-gate
    desc: Packed AutoIt input-gated execution
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics/section-names::packed-autoit-encrypted-resource
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state
      - id: micro-behaviors/ui/window/manage/enumerate::block-input-import
  - id: input-foreground-sandbox-gate
    desc: Input and foreground window check for sandbox evasion
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
      - id: micro-behaviors/ui/window/manage/control::get-foreground-window
    unless:
      - id: micro-behaviors/ui/framework/imgui/
      - id: metadata/build/framework::tauri-runtime
      - id: metadata/library/gui::juce-cpp-rtti
      - id: metadata/library/gui::openfl-lime-cpp-rtti
