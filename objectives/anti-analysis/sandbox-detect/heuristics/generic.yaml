defaults:
  platforms: [windows, unix]
  mbc: B0007
  attack: T1497
traits:
  - id: cuckoo
    desc: Cuckoo sandbox reference
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      word: cuckoo
      case_insensitive: true
    not:
      - regex: '[a-z]{2,4}\.cuckoo'
      - regex: (?i)\b(an|the|this|that|cuckoo)\s+cuckoo\b|\bcuckoo\s+(clock|clocks|bird|birds|bee|bees|wasp|wasps|bumblebee|bumblebees)\b
  - id: joe-sandbox
    desc: Joe Sandbox reference
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: joe sandbox
      case_insensitive: true
  - id: any-run
    desc: Any.run sandbox reference
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: any.run
  - id: hybrid-analysis
    desc: Hybrid Analysis sandbox reference
    crit: notable
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: hybrid-analysis
      case_insensitive: true
  - id: virustotal
    desc: VirusTotal reference
    crit: baseline
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      substr: virustotal
      case_insensitive: true
  - id: fiddler
    desc: Fiddler tooling reference
    crit: baseline
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      regex: (?i)\bfiddler(?:\.exe|core|rootcertmaker|certmaker)\b
      case_insensitive: true
  - id: procmon
    desc: Process Monitor tool
    crit: baseline
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      word: procmon
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/vendor/microsoft::sysinternals-tool
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bprocmon(?:64)?\.exe\b
  - id: process-monitor
    desc: Process Monitor tool name
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      exact: process monitor
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/vendor/microsoft::sysinternals-tool
  - id: process-hacker
    desc: Process Hacker tool
    crit: notable
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      substr: process hacker
      case_insensitive: true
  - id: x64dbg
    desc: x64dbg debugger
    crit: baseline
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      word: x64dbg
      case_insensitive: true
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bx64dbg(?:_[a-z_]+)?(?:\.qm|\.exe)?\b
  - id: ollydbg
    desc: OllyDbg debugger
    crit: baseline
    conf: 0.6
    for: [scripts, binaries]
    if:
      type: text
      word: ollydbg
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/binary/symbols::ollydbg-plugin-export
    not:
      - regex: (?i)[\\/][^\r\n]{0,200}\bollydbg(?:\.exe|\.ini|\.js|\.lib)?\b
  - id: sandbox-path
    desc: Sandbox/analysis file path
    crit: notable
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      regex: C:\\(sandbox|analysis|malware)
      case_insensitive: true
  - id: js-atomic-sleep
    desc: atomic-sleep module
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: atomic-sleep
  - id: js-date-now-timeout
    desc: Date.now with setTimeout
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: Date\.now\(\).{0,50}setTimeout
  - id: js-performance-now-timeout
    desc: performance.now with setTimeout
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: performance\.now\(\).{0,50}setTimeout
  - id: js-debugger-stmt
    desc: JavaScript debugger statement
    crit: notable
    conf: 0.4
    mbc: B0001
    attack: T1622
    for:
      - javascript
      - typescript
    if:
      type: ast
      query: '(debugger_statement) @stmt

'
  - id: js-func-tostring
    desc: Function.toString check
    crit: notable
    conf: 0.5
    mbc: B0001
    attack: T1622
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: function.toString
  - id: js-console-log-tostring
    desc: console.log.toString check
    crit: notable
    conf: 0.5
    mbc: B0001
    attack: T1622
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: console.log.toString
  - id: js-console-warn-tostring
    desc: console.warn.toString check
    crit: notable
    conf: 0.5
    mbc: B0001
    attack: T1622
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: console.warn.toString
  - id: js-console-error-tostring
    desc: console.error.toString check
    crit: notable
    conf: 0.5
    mbc: B0001
    attack: T1622
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: console.error.toString
  - id: js-react-devtools
    desc: React DevTools detection
    crit: notable
    conf: 0.5
    mbc: B0001
    attack: T1622
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: __REACT_DEVTOOLS
  - id: js-vue-devtools
    desc: Vue DevTools detection
    crit: notable
    conf: 0.5
    mbc: B0001
    attack: T1622
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: __VUE_DEVTOOLS
  - id: js-navigator-webdriver
    desc: navigator.webdriver check
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: navigator.webdriver
  - id: js-plugins-length-zero
    desc: navigator.plugins.length zero check
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: navigator\.plugins\.length\s*===?\s*0
  - id: js-outerwidth-zero
    desc: window.outerWidth zero check
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      regex: window\.outerWidth\s*===?\s*0
composite_rules:
  - id: runtime-process-enumeration
    desc: Runtime process enumeration support
    crit: component
    conf: 0.9
    for: [scripts, binaries]
    any:
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
      - id: micro-behaviors/process/enumerate/snapshot::dynamic-toolhelp-enumerator
      - id: micro-behaviors/process/enumerate/psapi::psapi-process-scan
      - id: micro-behaviors/process/enumerate/psapi::psapi-dynamic-resolve
  - id: js-timing
    desc: Sleep acceleration detection (sandbox evasion)
    crit: suspicious
    conf: 0.8
    for:
      - javascript
      - typescript
    needs: 2
    any:
      - id: js-atomic-sleep
      - id: js-date-now-timeout
      - id: js-performance-now-timeout
  - id: js-headless
    desc: Headless browser detection
    crit: suspicious
    conf: 0.8
    for:
      - javascript
      - typescript
    any:
      - id: js-navigator-webdriver
      - id: js-plugins-length-zero
      - id: js-outerwidth-zero
  - id: sandbox
    desc: Sandbox detection techniques
    crit: suspicious
    conf: 0.66
    for: [scripts, binaries]
    all:
      - id: runtime-process-enumeration
    needs: 2
    any:
      - id: cuckoo
      - id: joe-sandbox
      - id: any-run
      - id: hybrid-analysis
      - id: micro-behaviors/communications/capture/wireshark::wireshark
      - id: procmon
      - id: process-hacker
      - id: x64dbg
      - id: ollydbg
      - id: sandbox-path
  - id: js-console-tostring
    desc: Console method toString check
    crit: notable
    conf: 0.7
    mbc: B0001
    attack: T1622
    for:
      - javascript
      - typescript
    any:
      - id: js-console-log-tostring
      - id: js-console-warn-tostring
      - id: js-console-error-tostring
  - id: js-debugger
    desc: JavaScript debugger detection
    crit: suspicious
    conf: 0.85
    mbc: B0001
    attack: T1622
    for:
      - javascript
      - typescript
    needs: 2
    any:
      - id: js-debugger-stmt
      - id: js-func-tostring
      - id: js-console-tostring
      - id: js-react-devtools
      - id: js-vue-devtools
