defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1497.001
composite_rules:
  - id: user-interaction-trigger-cluster
    desc: User-interaction trigger APIs (mouse/keyboard/window monitoring)
    crit: suspicious
    conf: 0.88
    size_max: 5242880
    needs: 2
    any:
      - id: micro-behaviors/hardware/input/keyboard::get-cursor-pos
      - id: micro-behaviors/hardware/input/keyboard::get-async-key-state
      - id: micro-behaviors/hardware/input/keyboard::get-key-state
      - id: micro-behaviors/ui/window/manage::enum-windows
      - id: micro-behaviors/ui/window/manage::get-foreground-window
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
      - id: objectives/evasion/anti-av/heuristic::gui-message-pump-cluster
      - id: metadata/signed/leaf::huawei-device-co.-ltd.
