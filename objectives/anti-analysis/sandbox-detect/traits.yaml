defaults:
  platforms:
    - unix
    - windows
  for: [shell, python, javascript, powershell, pe]
traits:
  - id: hostname-19olltd
    desc: DESKTOP-19OLLTD sandbox hostname
    crit: suspicious
    mbc: B0007
    attack: T1497.001
    conf: 0.7
    if:
      type: text
      substr: DESKTOP-19OLLTD
  - id: hostname-b0t93d6
    desc: DESKTOP-B0T93D6 sandbox hostname
    crit: suspicious
    mbc: B0007
    attack: T1497.001
    conf: 0.7
    if:
      type: text
      substr: DESKTOP-B0T93D6
  - id: hostname-vrsqlag
    desc: DESKTOP-VRSQLAG sandbox hostname
    crit: suspicious
    mbc: B0007
    attack: T1497.001
    conf: 0.7
    if:
      type: text
      substr: DESKTOP-VRSQLAG
  - id: hostname-john-pc
    desc: JOHN-PC sandbox hostname
    crit: suspicious
    mbc: B0007
    attack: T1497.001
    conf: 0.7
    if:
      type: text
      substr: JOHN-PC
  - id: hostname-julia-pc
    desc: JULIA-PC sandbox hostname
    crit: suspicious
    mbc: B0007
    attack: T1497.001
    conf: 0.7
    if:
      type: text
      substr: JULIA-PC
  - id: hostname-lisa-pc
    desc: LISA-PC sandbox hostname
    crit: suspicious
    mbc: B0007
    attack: T1497.001
    conf: 0.7
    if:
      type: text
      substr: LISA-PC
  - id: path-c-analysis
    desc: C:\analysis sandbox path
    crit: suspicious
    mbc: B0007
    attack: T1497.001
    conf: 0.6
    if:
      type: text
      substr: C:\analysis
  - id: path-c-sandbox
    desc: C:\sandbox sandbox path
    crit: suspicious
    mbc: B0007
    attack: T1497.001
    conf: 0.6
    if:
      type: text
      substr: C:\sandbox
  - id: path-tmp-analysis
    desc: /tmp/analysis sandbox path
    crit: suspicious
    mbc: B0007
    attack: T1497.001
    conf: 0.6
    if:
      type: text
      substr: /tmp/analysis
composite_rules:
  - id: hostname-sandbox
    desc: Sandbox hostname check
    crit: notable
    conf: 0.65
    any:
      - id: hostname-19olltd
      - id: hostname-b0t93d6
      - id: hostname-vrsqlag
      - id: hostname-john-pc
      - id: hostname-julia-pc
      - id: hostname-lisa-pc
  - id: file-check-sandbox
    desc: Sandbox file artifacts check
    crit: notable
    conf: 0.65
    any:
      - id: path-c-analysis
      - id: path-c-sandbox
      - id: path-tmp-analysis
  - id: username-sandbox
    desc: Common sandbox usernames
    crit: notable
    mbc: B0007
    attack: T1497.001
    conf: 0.8
    downgrade:
      any:
        - id: metadata/package/testing/presence::test-file-shell
        - id: well-known/tools/sysadmin/repo-maintenance::git-operations
        - id: well-known/tools/sysadmin/repo-maintenance::hg-operations
    any:
      - id: objectives/anti-analysis/sandbox-detect/inline/
