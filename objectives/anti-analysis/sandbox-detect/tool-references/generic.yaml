defaults:
  platforms: [windows, unix]
  mbc: B0007
  attack: T1497
traits:
- id: cuckoo
  desc: Cuckoo sandbox reference
  crit: component
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    word: cuckoo
    case_insensitive: true
  not:
  - regex: '[a-z]{2,4}\.cuckoo'
  - regex: (?i)\b(an|the|this|that|cuckoo)\s+cuckoo\b|\bcuckoo\s+(clock|clocks|bird|birds|bee|bees|wasp|wasps|bumblebee|bumblebees)\b
- id: joe-sandbox
  desc: Joe Sandbox reference
  crit: suspicious
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    substr: joe sandbox
    case_insensitive: true
- id: any-run
  desc: Any.run sandbox reference
  crit: suspicious
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    substr: any.run
- id: hybrid-analysis
  desc: Hybrid Analysis sandbox reference
  crit: baseline
  conf: 0.7
  for: [scripts, binaries]
  if:
    type: text
    substr: hybrid-analysis
    case_insensitive: true
- id: virustotal
  desc: VirusTotal reference
  crit: notable
  conf: 0.6
  for: [scripts, binaries]
  if:
    type: text
    substr: virustotal
    case_insensitive: true
- id: fiddler
  desc: Fiddler tooling reference
  crit: baseline
  conf: 0.6
  for: [scripts, binaries]
  if:
    type: text
    regex: (?i)\bfiddler(\.exe|core|rootcertmaker|certmaker)\b
    case_insensitive: true
- id: procmon
  desc: Process Monitor tool
  crit: baseline
  conf: 0.6
  for: [scripts, binaries]
  if:
    type: text
    word: procmon
    case_insensitive: true
  downgrade:
    any:
    - id: well-known/tool/sysadmin/sysinternals/
  unless:
  - id: well-known/tool/sysadmin/sysinternals/
  - id: well-known/tool/sysadmin/sysinternals/
  not:
  - regex: (?i)[\\/][^\r\n]{0,200}\bprocmon(64)?\.exe\b
- id: process-monitor
  desc: Process Monitor tool name
  crit: suspicious
  conf: 0.6
  for: [scripts, binaries]
  if:
    type: text
    exact: process monitor
    case_insensitive: true
  downgrade:
    any:
    - id: well-known/tool/sysadmin/sysinternals/
  unless:
  - id: well-known/tool/sysadmin/sysinternals/
  - id: well-known/tool/sysadmin/sysinternals/
- id: process-hacker
  desc: Process Hacker tool
  crit: suspicious
  conf: 0.6
  for: [scripts, binaries]
  if:
    type: text
    substr: process hacker
    case_insensitive: true
  unless:
  - id: well-known/tool/detection/malware-config-parser
- id: x64dbg
  desc: x64dbg debugger
  crit: baseline
  conf: 0.6
  for: [scripts, binaries]
  if:
    type: text
    word: x64dbg
    case_insensitive: true
  not:
  - regex: (?i)[\\/][^\r\n]{0,200}\bx64dbg(_[a-z_]+)?(\.qm|\.exe)?\b
- id: ollydbg
  desc: OllyDbg debugger
  crit: baseline
  conf: 0.6
  for: [scripts, binaries]
  if:
    type: text
    word: ollydbg
    case_insensitive: true
  downgrade:
    any:
    - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
  not:
  - regex: (?i)[\\/][^\r\n]{0,200}\bollydbg(\.exe|\.ini|\.js|\.lib)?\b
- id: sandbox-path
  desc: Sandbox/analysis file path
  crit: suspicious
  conf: 0.75
  for: [scripts, binaries]
  if:
    type: text
    regex: C:\\(sandbox|analysis|malware)
    case_insensitive: true
- id: dotnet-crypter-analysis-gate-call
  desc: .NET crypter template anti-analysis gate calls
  crit: notable
  conf: 0.94
  for: [pe, dll, csharp]
  if:
    type: text
    substr: DWireshark() || IsDebuggerPresent() || DEmulation() ||DSandboxie() || DVM()
- id: dotnet-crypter-sandboxie-module-check
  desc: .NET crypter checks for Sandboxie module
  crit: component
  conf: 0.9
  for: [pe, dll, csharp]
  if:
    type: text
    substr: SbieDll.dll
- id: js-debugger-stmt
  desc: JavaScript debugger statement
  crit: notable
  conf: 0.4
  mbc: B0001
  attack: T1622
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: '(?m)^\s*debugger\s*;'
  downgrade:
    any:
    - id: metadata/file/profile/identity::devtools-injected-script-basename
    - id: well-known/tool/development/firebug/
- id: js-func-tostring
  desc: Function.toString check
  crit: suspicious
  conf: 0.5
  mbc: B0001
  attack: T1622
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: function.toString
- id: js-console-log-tostring
  desc: console.log.toString check
  crit: suspicious
  conf: 0.5
  mbc: B0001
  attack: T1622
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: console.log.toString
- id: js-console-warn-tostring
  desc: console.warn.toString check
  crit: suspicious
  conf: 0.5
  mbc: B0001
  attack: T1622
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: console.warn.toString
- id: js-console-error-tostring
  desc: console.error.toString check
  crit: suspicious
  conf: 0.5
  mbc: B0001
  attack: T1622
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: console.error.toString
- id: js-react-devtools
  desc: React DevTools global marker
  crit: notable
  conf: 0.5
  mbc: B0001
  attack: T1622
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: __REACT_DEVTOOLS
- id: js-react-devtools-text
  desc: React DevTools text marker
  crit: notable
  conf: 0.5
  mbc: B0001
  attack: T1622
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: React DevTools
- id: js-vue-devtools
  desc: Vue DevTools detection
  crit: notable
  conf: 0.5
  mbc: B0001
  attack: T1622
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: __VUE_DEVTOOLS
- id: js-navigator-webdriver
  desc: navigator.webdriver check
  crit: suspicious
  conf: 0.6
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: navigator.webdriver
  unless:
  - id: well-known/app/wordpress-plugins::known-wordpress-plugin
- id: js-plugins-length-zero
  desc: navigator.plugins.length zero check
  crit: suspicious
  conf: 0.5
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    regex: navigator\.plugins\.length\s*===?\s*0
- id: js-outerwidth-zero
  desc: window.outerWidth zero check
  crit: suspicious
  conf: 0.5
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    regex: window\.outerWidth\s*===?\s*0
- id: js-headlesschrome-ua-check
  desc: HeadlessChrome user agent check
  crit: component
  conf: 0.85
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: HeadlessChrome/.test(navigator.userAgent)
- id: js-browser-automation-globals
  desc: Browser automation globals checked
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: '__(webdriver|selenium|fxdriver)_(evaluate|unwrapped)'
- id: js-phantom-nightmare-globals--rx-3
  desc: Nightmare.js automation global check
  crit: component
  conf: 0.88
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: __nightmare
  count_max: 1015243
- id: js-phantom-nightmare-globals--rx-4
  desc: Chrome headless automation global check
  crit: component
  conf: 0.88
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: domAutomationController
  count_max: 1015244
- id: js-webgl-software-renderer-check
  desc: WebGL software renderer check
  crit: component
  conf: 0.88
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: 'WEBGL_debug_renderer_info[\s\S]{0,180}SwiftShader|llvmpipe|softpipe'
- id: js-canvas-blank-fingerprint
  desc: Canvas blank fingerprint check
  crit: component
  conf: 0.82
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: "toDataURL\\(\\)\\s*===\\s*['\\\"]data:,"
- id: js-offline-audio-fingerprint
  desc: OfflineAudio fingerprint rendering
  crit: component
  conf: 0.85
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: 'OfflineAudioContext[\s\S]{0,180}createDynamicsCompressor'
composite_rules:
- id: dotnet-crypter-anti-analysis-template
  desc: .NET crypter template gates execution on debugger/sandbox/VM checks
  crit: hostile
  conf: 0.95
  for: [pe, dll, csharp]
  all:
  - id: metadata/binary/framework::dotnet-assembly
  - id: dotnet-crypter-analysis-gate-call
  - id: objectives/command-and-control/dropper/builder::dotnet-crypter-stub-placeholders
  any:
  - id: dotnet-crypter-sandboxie-module-check
  - id: objectives/anti-analysis/vm-detect/wmi::baseboard-query
- id: runtime-process-enumeration
  desc: Runtime process enumeration support
  crit: component
  conf: 0.9
  for: [scripts, binaries]
  any:
  - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
  - id: micro-behaviors/process/enumerate/snapshot::dynamic-toolhelp-enumerator
  - id: micro-behaviors/process/enumerate/psapi::psapi-process-scan
  - id: micro-behaviors/process/enumerate/psapi::psapi-dynamic-resolve
- id: js-timing
  desc: Sleep acceleration detection (sandbox evasion)
  crit: suspicious
  conf: 0.8
  for:
  - javascript
  - typescript
  needs: 2
  any:
  - id: micro-behaviors/time/sleep/interval::js-atomic-sleep-module
  - id: micro-behaviors/time/timing/delay::js-date-now-timeout
  - id: micro-behaviors/time/timing/delay::js-performance-now-timeout
- id: js-headless
  desc: Headless browser detection
  crit: suspicious
  conf: 0.8
  for:
  - javascript
  - typescript
  any:
  - id: js-navigator-webdriver
  - id: js-plugins-length-zero
  - id: js-outerwidth-zero
  - id: js-headlesschrome-ua-check
- id: js-cloaker-browser-bot-fingerprint
  desc: Browser cloaker bot fingerprinting
  crit: suspicious
  conf: 0.92
  attack: T1497.001
  for:
  - javascript
  - typescript
  needs: 3
  any:
  - id: js-navigator-webdriver
  - id: js-headlesschrome-ua-check
  - id: js-browser-automation-globals
  - id: js-phantom-nightmare-globals
  - id: js-webgl-software-renderer-check
  - id: js-canvas-blank-fingerprint
  - id: js-offline-audio-fingerprint
- id: sandbox
  desc: Sandbox detection techniques
  crit: suspicious
  conf: 0.66
  for: [scripts, binaries]
  all:
  - id: runtime-process-enumeration
  needs: 2
  any:
  - id: cuckoo
  - id: joe-sandbox
  - id: any-run
  - id: hybrid-analysis
  - id: micro-behaviors/communications/capture/wireshark::wireshark
  - id: procmon
  - id: process-hacker
  - id: x64dbg
  - id: ollydbg
  - id: sandbox-path
- id: analyst-tool-name-cluster
  desc: Multi-tool analyst-name catalog (debugger + sandbox + monitor)
  crit: suspicious
  conf: 0.9
  for: [pe, dll]
  platforms: [windows]
  needs: 3
  any:
  - id: procmon
  - id: process-hacker
  - id: x64dbg
  - id: ollydbg
  - id: fiddler
  - id: cuckoo
  - id: joe-sandbox
  - id: any-run
  - id: hybrid-analysis
  - id: micro-behaviors/communications/capture/wireshark::wireshark
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework/
  - id: well-known/tool/sysadmin/sysinternals/
- id: js-console-tostring
  desc: Console method toString check
  crit: suspicious
  conf: 0.7
  mbc: B0001
  attack: T1622
  for:
  - javascript
  - typescript
  any:
  - id: js-console-log-tostring
  - id: js-console-warn-tostring
  - id: js-console-error-tostring
- id: js-debugger
  desc: JavaScript debugger detection
  crit: suspicious
  conf: 0.85
  mbc: B0001
  attack: T1622
  for:
  - javascript
  - typescript
  needs: 2
  any:
  - id: js-debugger-stmt
  - id: js-func-tostring
  - id: js-console-tostring
  - id: js-react-devtools
  - id: js-vue-devtools
  unless:
  - id: well-known/app/qwen-code::qwen-code-bundle-text
  - id: js-react-devtools-text
- id: js-phantom-nightmare-globals
  desc: Phantom Nightmare globals checked
  crit: component
  conf: 0.88
  for:
  - javascript
  - typescript
  any:
  - id: objectives/credential-access/wallet/mnemonic::phantom-word-unless-cond-1--rx-1
  - id: objectives/credential-access/wallet/mnemonic::phantom-word-unless-cond-1--rx-2
  - id: js-phantom-nightmare-globals--rx-3
  - id: js-phantom-nightmare-globals--rx-4

- id: vm-debugger-tool-catalog-gauntlet
  desc: VM and debugger catalog gauntlet
  crit: hostile
  conf: 0.97
  for: [pe, dll]
  platforms: [windows]
  attack: "T1497, T1622"
  all:
  - id: objectives/anti-analysis/emulator-detect/vendor-strings::comprehensive
  - id: analyst-tool-name-cluster
  - id: objectives/anti-analysis/vm-detect/vendor::comprehensive-evasion
  any:
  - id: objectives/anti-analysis/debugger-detect/tls::pe-tls-multi-callbacks
  - id: objectives/anti-analysis/debugger-detect/check::paired-rdtsc-timing
