defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1497.001
  mbc: B0007
composite_rules:
  - id: windows-env-fingerprint-cluster
    desc: Sandbox env-var fingerprint cluster (5+ Windows env-var names)
    crit: suspicious
    conf: 0.85
    size_max: 5242880
    all:
      - id: micro-behaviors/os/env/vars/system-info::windows-env-var-cluster-string
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/installer/family::known-benign-installer
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics/threshold::many-imports-50
  - id: hardware-fingerprint-cluster
    desc: Sandbox hardware fingerprint cluster (CPU/RAM/disk/uptime/screen)
    crit: suspicious
    conf: 0.85
    size_max: 5242880
    needs: 3
    any:
      - id: micro-behaviors/os/sysinfo/hardware::get-system-info
      - id: micro-behaviors/os/sysinfo/hardware::get-memory-status
      - id: micro-behaviors/os/sysinfo/hardware::get-disk-space
      - id: micro-behaviors/time/query::get-tick-count
      - id: micro-behaviors/ui/controls/widget::get-system-metrics
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: well-known/app/cvte-crashrpt::cvte-crashrpt-strong-pin
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/binary/metrics/threshold::many-imports-50
