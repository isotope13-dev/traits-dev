defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
  attack: T1497.001
traits:
  - id: get-last-input-info-source
    desc: GetLastInputInfo idle check
    crit: component
    conf: 0.9
    for: [c, cpp]
    if:
      type: symbol
      exact: GetLastInputInfo
  - id: repeated-cursor-check-around-sleep
    desc: Repeated cursor check around sleep
    crit: component
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      regex: 'GetCursorPos[\s\S]{0,320}Sleep\s*\([\s\S]{0,320}GetCursorPos'
composite_rules:
  - id: user-interaction-trigger-cluster
    desc: User-interaction trigger APIs (mouse/keyboard/window monitoring)
    crit: notable
    conf: 0.88
    size_max: 5242880
    needs: 2
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::get-cursor-pos
      - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state
      - id: micro-behaviors/hardware/input/keyboard/hook::get-key-state
      - id: micro-behaviors/ui/window/manage/enumerate::enum-windows
      - id: micro-behaviors/ui/window/manage/control::get-foreground-window
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: well-known/tool/sysadmin/sysinternals::sysinternals-tool
      - id: objectives/evasion/anti-av/gui-decoy::gui-message-pump-cluster
      - id: metadata/signed/leaf::huawei-device-co.-ltd.
      - id: micro-behaviors/ui/framework/imgui::dear-imgui-library
      - id: metadata/binary/symbols/plugin::x64dbg-plugin-export
  - id: mouse-movement-trigger-check
    desc: Mouse movement sandbox trigger
    crit: suspicious
    conf: 0.9
    for: [c, cpp]
    all:
      - id: micro-behaviors/hardware/input/keyboard/hook::get-cursor-pos
      - id: micro-behaviors/time/timing/delay::sleep-source
      - id: repeated-cursor-check-around-sleep
  - id: idle-input-trigger-check
    desc: Last-input idle sandbox trigger
    crit: suspicious
    conf: 0.92
    for: [c, cpp]
    all:
      - id: get-last-input-info-source
      - id: micro-behaviors/time/query::get-tick-count
      - id: micro-behaviors/time/timing/delay::sleep-source
