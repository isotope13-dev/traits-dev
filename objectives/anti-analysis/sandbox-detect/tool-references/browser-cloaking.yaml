defaults:
  platforms: [windows, unix]
  for: [html, javascript]
  attack: T1497.001
  crit: suspicious
  conf: 0.86
  size_max: 524288
traits:
  - id: webgl-vm-renderer-check
    desc: WebGL VM renderer check
    if:
      type: text
      regex: 'WEBGL_debug_renderer_info[\s\S]{0,220}(VMware|VirtualBox)'
  - id: browser-behavior-score
    desc: Browser behavior score gate
    if:
      type: text
      regex: 'behaviorScore[\s\S]{0,220}(mousemove|scroll|clickDetected)'
  - id: delayed-payload-behavior-gate
    desc: Delayed payload behavior gate
    if:
      type: text
      regex: 'shouldShowPayload[\s\S]{0,220}behaviorScore'
composite_rules:
  - id: browser-cloaked-payload-gate
    desc: Browser-cloaked payload gate
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: webgl-vm-renderer-check
      - id: browser-behavior-score
      - id: delayed-payload-behavior-gate
