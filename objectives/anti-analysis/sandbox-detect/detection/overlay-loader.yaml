# Anti-analysis suite detection for PE overlay loaders.
# Detects the combination of sandbox fingerprinting, process enumeration
# for analysis tool hunting, and exception handler manipulation commonly
# seen in Rust/Go loader stubs with encrypted overlays.
# ATT&CK: T1497 (Virtualization/Sandbox Evasion), T1057 (Process Discovery), T1622 (Debugger Evasion)
# MBC: B0007 (Sandbox Detection), B0001 (Debugger Detection)
defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: overlay-loader-anti-analysis-suite
    desc: Overlay loader anti-analysis suite (fingerprint + process enum + exception handler)
    crit: suspicious
    conf: 0.92
    size_min: 500000
    all:
      - id: metadata/binary/layout::has-overlay
    needs: 3
    any:
      - id: objectives/anti-analysis/sandbox-detect/heuristics::hardware-fingerprint-cluster
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
      - id: micro-behaviors/os/exception/error-handling::add-vectored-exception-handler
      - id: micro-behaviors/os/exception/handler::capture-context
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/lang/compiled::autoit-compiled-script
