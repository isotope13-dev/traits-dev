defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: evasion-checks
    desc: Evasion checks detected (usernames/hostnames/paths)
    crit: suspicious
    for: [javascript, typescript, shell, python]
    any:
      - id: objectives/anti-analysis/sandbox-detect/inline/
    unless:
      - id: metadata/package/help::libxslt-configure-js
      - id: metadata/package/testing/presence::test-file-shell
      - id: well-known/tools/sysadmin/repo-maintenance::hg-operations
