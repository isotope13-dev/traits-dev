defaults:
  platforms: [windows, unix]
traits:
  - id: js-nan-evasion-assignment
    desc: Assigns 0/0 (NaN) for evasion or disruption
    crit: suspicious
    conf: 0.8
    for: [javascript]
    count_min: 2
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/build/bundler::babel-transpiled
      - id: metadata/library/d3/
      - id: metadata/library/structure::vscode-extension-generated-asset
      - type: text
        substr: __defProp
      - type: text
        substr: __commonJS
      - type: path
        basename: true
        regex: '^d3(\.min)?\.js$'
    if:
      type: text
      regex: '=\s*0\s*\/\s*0\s*;'
