# Python sandbox sentinel file checks
# Detects os.path.exists() guards used as kill-switches or sandbox evasion
# ATT&CK: T1497.001 (Virtualization/Sandbox Evasion: System Checks)
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1497.001
  mbc: B0007
traits:
  - id: path-exists-single-char-guard
    desc: Single-char sentinel file existence check
    crit: suspicious
    conf: 0.88
    if:
      type: text
      # Matches: os.path.exists('tahg') or os.path.exists("tahg")
      # Single or 2-char filenames are unusual for legitimate path checks
      regex: os\.path\.exists\s*\(\s*['"][a-zA-Z]{1,2}['"]\s*\)
  - id: bare-try-except-pass
    desc: Bare try/except pass swallowing all errors
    crit: suspicious
    conf: 0.82
    if:
      type: text
      # Matches try: ... except: pass pattern (bare except with pass)
      regex: try:\s*\n.{1,500}except\s*:\s*pass
composite_rules:
  - id: sandbox-sentinel-killswitch
    desc: Sentinel file check gating malicious code
    crit: suspicious
    conf: 0.92
    all:
      - id: path-exists-single-char-guard
      - id: bare-try-except-pass
