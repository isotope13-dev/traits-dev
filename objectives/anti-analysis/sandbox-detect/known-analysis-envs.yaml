defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
traits:
  - id: check-analysis-username
    desc: Checks for known analysis usernames
    crit: suspicious
    if:
      type: text
      regex: (daasadmin)
  - id: check-analysis-hostname
    desc: Checks for known analysis hostnames
    crit: suspicious
    if:
      type: text
      regex: (DESKTOP-4E1IS0K|aws-7grara913oid5jsexgkq|lili-pc)
  - id: check-analysis-path
    desc: Checks for known analysis paths
    crit: suspicious
    if:
      type: text
      regex: (D:\\TRANSFER|/home/lili/vastest/|/root/extract)
  - id: sandbox-root-vid-exe-paths
    desc: Multiple sandbox VID root paths
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    for: [pe, dll]
    count_min: 4
    if:
      type: text
      regex: '^C:\\VID[0-9]{6,12}\.exe$'
  - id: sandbox-sha256-root-paths
    desc: Multiple hash-named sandbox paths
    crit: suspicious
    conf: 0.92
    platforms: [windows]
    for: [pe, dll]
    count_min: 8
    if:
      type: text
      regex: '^C:\\[0-9a-f]{64}C$'
