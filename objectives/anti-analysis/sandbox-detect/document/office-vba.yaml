defaults:
  platforms: [windows]
  for: [oledoc, ooxml]
traits:
  - id: guarded-msiexec-properties
    desc: Guarded MSI execution properties
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      regex: '(?i)\bstep1=commonl\b.{0,40}\bstep2=files\b'
composite_rules:
  - id: office-vba-msi-guardrails
    desc: Office dropper sandbox guardrails
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/format/document/office/excel::excel-vba-project
      - id: micro-behaviors/process/create/shell/lang::msiexec-quiet-install
      - id: guarded-msiexec-properties
