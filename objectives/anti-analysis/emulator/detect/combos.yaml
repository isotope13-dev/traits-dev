defaults:
  attack: T1497.001
  mbc: B0009
  platforms: [unix, windows, macos]

# Composite VM/Emulator Detection Capabilities
composite_rules:
  - id: detect-vendors
    desc: VM detection via vendor/product strings
    crit: suspicious
    conf: 0.9
    needs: 3
    any:
      - id: objectives/anti-analysis/vm/detect::vendor-vmware
      - id: virtualbox-string
      - id: qemu-string
      - id: cpu-vendor
  - id: comprehensive
    desc: Virtual machine environment detection
    crit: suspicious
    conf: 0.9
    needs: 3
    any:
      - id: objectives/anti-analysis/vm/detect::vendor-vmware
      - id: virtualbox-string
      - id: qemu-string
      - id: vm-hardware
