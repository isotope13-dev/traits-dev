defaults:
  platforms: [unix, windows]
  for: [php, scripts, javascript]
  crit: notable
  conf: 0.85
traits:
- id: bot-ua-list--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)(googlebot|bingbot)'
- id: bot-ua-list--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)(baiduspider|yandexbot)'
- id: bot-ua-list--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)(facebot|facebookexternalhit)'
- id: bot-ua-list--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)(twitterbot|ia_archiver)'
- id: bot-ua-list--rx-5
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)(Google-Site-Verification|Google-InspectionTool)'
- id: bot-ua-list--rx-6
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)(APIs-Google|Google-Ads)'
- id: check-ua-server-var
  desc: Checks User-Agent for crawler detection
  if:
    type: text
    regex: '(?i)\$_SERVER\[[''"]HTTP_USER_AGENT[''"]\]'
composite_rules:
- id: crawler-identification
  desc: Logic to identify search engine crawlers
  all:
  - id: check-ua-server-var
  - id: bot-ua-list
- id: bot-ua-list
  desc: List of bot/crawler User-Agents
  crit: baseline
  conf: 1.0
  any:
  - id: bot-ua-list--rx-1
  - id: bot-ua-list--rx-2
  - id: bot-ua-list--rx-3
  - id: bot-ua-list--rx-4
  - id: bot-ua-list--rx-5
  - id: bot-ua-list--rx-6
  needs: 1
