defaults:
  platforms: [unix, windows]
  for: [php, scripts, javascript]
  crit: notable
  conf: 0.85
traits:
  - id: bot-ua-list
    desc: List of bot/crawler User-Agents
    if:
      type: text
      regex: '(?i)(googlebot|bingbot|baiduspider|yandexbot|facebot|facebookexternalhit|twitterbot|ia_archiver|Google-Site-Verification|Google-InspectionTool|APIs-Google|Google-Ads)'
  - id: check-ua-server-var
    desc: Checks User-Agent for crawler detection
    if:
      type: text
      regex: '(?i)\$_SERVER\[[''"]HTTP_USER_AGENT[''"]\]'
composite_rules:
  - id: crawler-identification
    desc: Logic to identify search engine crawlers
    all:
      - id: check-ua-server-var
      - id: bot-ua-list
