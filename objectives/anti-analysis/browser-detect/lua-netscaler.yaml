defaults:
  platforms: [netscaler, appliance, unix]
  for: [lua]
  attack: T1497.003

traits:
  - id: lua-automation-signatures
    desc: Lua automation signatures
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: AUTOMATION_SIGNATURES

  - id: lua-browser-ua-parser
    desc: Lua browser UA parser
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'KNOWN_BROWSERS[\s\S]{0,260}detect_browser'

  - id: lua-analysis-header-flag
    desc: Lua analysis header flag
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: X-Analysis-Detected

  - id: lua-sandbox-header-flag
    desc: Lua sandbox header flag
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: X-Sandbox-Detected

composite_rules:
  - id: lua-browser-automation-detect
    desc: Lua browser automation detect
    crit: hostile
    conf: 0.98
    all:
      - id: lua-automation-signatures
      - id: lua-analysis-header-flag
    any:
      - id: lua-browser-ua-parser
      - id: lua-sandbox-header-flag
