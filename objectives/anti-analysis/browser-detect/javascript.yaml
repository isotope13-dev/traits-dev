defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
traits:
  - id: js-devtools-detect
    desc: Detects DevTools opening
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: window\.devtools|devtools\.open
  - id: js-disable-inspect
    desc: Disables inspection hotkeys (F12, Ctrl+U)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: "e\\.key\\s*===?\\s*[\"']F12[\"']"
  - id: js-disable-contextmenu
    desc: Disables right-click context menu
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: document.addEventListener('contextmenu'
    unless:
      - type: text
        substr: mermaid-architecture
  - id: js-disable-view-source
    desc: Disables Ctrl+Shift+I/J browser shortcuts
    crit: suspicious
    conf: 0.85
    size_max: 100000
    if:
      type: text
      regex: e\.ctrlKey.{0,40}e\.shiftKey.{0,80}e\.key.{0,12}['"](I|J)['"]
    not:
      - substr: "e.altKey"
  - id: js-devtools-size-delta
    desc: DevTools viewport delta heuristic
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: outer(Width|Height)\s*-\s*window\.inner(Width|Height)
  - id: js-console-getter-tripwire
    desc: Console getter DevTools tripwire
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: Object.defineProperty(obj, 'id'
  - id: js-page-blanking
    desc: Blanks page after inspection
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: document\.documentElement\.innerHTML\s*=\s*['"]{2}
  - id: js-document-write-empty
    desc: Empty document write wipe
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: document\.write\(\s*['"]{2}\s*\)
  - id: js-window-stop
    desc: Stops page load after inspection
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: window\.stop\s*\(
composite_rules:
  - id: js-browser-locking
    desc: Browser anti-analysis locking (disable inspect + devtools)
    crit: suspicious
    conf: 0.9
    all:
      - id: js-devtools-detect
      - id: js-disable-inspect
  - id: js-devtools-heuristics
    desc: Browser DevTools heuristic detection
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: js-devtools-detect
      - id: js-devtools-size-delta
      - id: js-console-getter-tripwire
  - id: js-anti-inspection-suite
    desc: Multiple browser inspection countermeasures
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: js-disable-inspect
      - id: js-disable-contextmenu
      - id: js-disable-view-source
  - id: js-destructive-devtools-response
    desc: DevTools detection triggers destructive page wipe
    crit: hostile
    conf: 0.95
    all:
      - id: js-devtools-heuristics
    any:
      - id: js-page-blanking
      - id: js-document-write-empty
      - id: js-window-stop
    needs: 2
