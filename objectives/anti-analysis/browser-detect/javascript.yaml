defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
    - html
traits:
  - id: js-devtools-detect
    desc: Detects DevTools opening
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: window\.devtools|devtools\.open
  - id: js-disable-inspect
    desc: Disables inspection hotkeys (F12, Ctrl+U)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: "e\\.key\\s*===?\\s*[\"']F12[\"']"
  - id: js-disable-contextmenu
    desc: Disables right-click context menu
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: contextmenu.{0,80}(preventDefault\(\)|return\s+false)
  - id: js-disable-view-source
    desc: Disables Ctrl+Shift+I/J browser shortcuts
    crit: suspicious
    conf: 0.85
    size_max: 100000
    if:
      type: text
      regex: "e\\.ctrlKey.{0,20}e\\.shiftKey.{0,20}(73|74|85|Key[IJU])"
    not:
      - substr: "e.altKey"
composite_rules:
  - id: js-browser-locking
    desc: Browser anti-analysis locking (disable inspect + devtools)
    crit: suspicious
    conf: 0.9
    all:
      - id: js-devtools-detect
      - id: js-disable-inspect
  - id: js-anti-inspection-suite
    desc: Multiple browser inspection countermeasures
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: js-disable-inspect
      - id: js-disable-contextmenu
      - id: js-disable-view-source
