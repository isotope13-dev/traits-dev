defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
traits:
  - id: js-devtools-detect
    desc: Detects DevTools opening
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: window\.devtools\b|devtools\.open
  - id: js-f12-key-handler
    desc: F12 key handler
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "e\\.key\\s*===?\\s*[\"']F12[\"']"
    unless:
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/package/config::vscode-webview-extension
      - id: metadata/package/manifest/runtime::vscode-extension
  - id: js-prevent-default-call
    desc: JavaScript preventDefault call
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ".preventDefault("
  - id: js-ctrl-u-shortcut
    desc: Handles Ctrl+U browser shortcut
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: e\.(ctrlKey|metaKey).{0,80}e\.key.{0,12}['"]u['"]
  - id: js-disable-view-source
    desc: Handles Ctrl+Shift+I/J browser shortcuts
    crit: notable
    conf: 0.85
    size_max: 100000
    if:
      type: text
      regex: e\.ctrlKey.{0,40}e\.shiftKey.{0,80}e\.key.{0,12}['"](I|J)['"]
    not:
      - substr: "e.altKey"
  - id: js-devtools-size-delta
    desc: DevTools viewport delta heuristic
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: outer(Width|Height)\s*-\s*window\.inner(Width|Height)
    unless:
      - id: well-known/lib/firebug-lite/
  - id: js-console-getter-tripwire
    desc: Console getter DevTools tripwire
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: Object.defineProperty(obj, 'id'
  - id: js-page-blanking
    desc: Blanks page after inspection
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: document\.documentElement\.innerHTML\s*=\s*['"]{2}
  - id: js-document-write-empty
    desc: Empty document write wipe
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: document\.write\(\s*['"]{2}\s*\)
  - id: js-window-stop
    desc: Stops page load after inspection
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: window\.stop\s*\(
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
composite_rules:
  - id: js-disable-inspect
    desc: Blocks developer-tools shortcuts
    crit: suspicious
    conf: 0.9
    all:
      - id: js-f12-key-handler
      - id: js-prevent-default-call
    any:
      - id: js-ctrl-u-shortcut
      - id: js-disable-view-source
  - id: js-browser-locking
    desc: Browser anti-analysis locking (disable inspect + devtools)
    crit: suspicious
    conf: 0.9
    all:
      - id: js-devtools-detect
      - id: js-disable-inspect
  - id: js-devtools-heuristics
    desc: Browser DevTools heuristic detection
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: js-devtools-detect
      - id: js-devtools-size-delta
      - id: js-console-getter-tripwire
  - id: js-anti-inspection-suite
    desc: Multiple browser inspection countermeasures
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: js-disable-inspect
      - id: micro-behaviors/ui/menu/dom::browser-contextmenu-suppress
      - id: js-disable-view-source
  - id: js-destructive-devtools-response
    desc: DevTools detection triggers destructive page wipe
    crit: hostile
    conf: 0.95
    all:
      - id: js-devtools-heuristics
    any:
      - id: js-page-blanking
      - id: js-document-write-empty
      - id: js-window-stop
    needs: 2
