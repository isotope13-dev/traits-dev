defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
traits:
  - id: js-devtools-detect
    desc: Detects DevTools opening
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: window\.devtools\b|devtools\.open
  - id: js-ctrl-u-shortcut
    desc: Handles Ctrl+U browser shortcut
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: e\.(ctrlKey|metaKey).{0,80}e\.key.{0,12}['"]u['"]
  - id: js-disable-view-source
    desc: Handles Ctrl+Shift+I/J browser shortcuts
    crit: notable
    conf: 0.85
    size_max: 100000
    if:
      type: text
      regex: e\.ctrlKey.{0,40}e\.shiftKey.{0,80}e\.key.{0,12}['"](I|J)['"]
    not:
      - substr: "e.altKey"
  - id: js-devtools-size-delta
    desc: DevTools viewport delta heuristic
    crit: suspicious
    conf: 0.86
    if:
      type: text
      # Require a comparison: bare outer-inner deltas are also used to compute
      # browser-chrome offsets for screenshot/workflow capture (viewportScreenX/Y).
      regex: outer(Width|Height)\s*-\s*window\.inner(Width|Height)\s*[<>]=?
    unless:
      - id: well-known/app/browser-extension-known/
      - id: well-known/lib/firebug-lite/
  - id: js-console-getter-tripwire
    desc: Console getter DevTools tripwire
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: Object.defineProperty(obj, 'id'
  - id: js-extension-probe-fetch-hang
    desc: Hangs fetch probes for extension URLs
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'window\.fetch\s*=\s*function[\s\S]{0,40}new Promise\s*\(\s*\(\)\s*=>\s*\{\}'
  - id: js-extension-probe-xhr-suppress
    desc: Suppresses XHR probes for extension URLs
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'XMLHttpRequest\.prototype\.open\s*=\s*function[\s\S]{0,80}return\s*;'
composite_rules:
  - id: js-disable-inspect
    desc: Blocks developer-tools shortcuts
    crit: suspicious
    conf: 0.9
    near_lines: 5
    all:
      - id: micro-behaviors/hardware/input/event::browser-f12-key-comparison
      - id: micro-behaviors/ui/window/manage/dom::browser-prevent-default-call
  - id: js-browser-locking
    desc: Browser anti-analysis locking (disable inspect + devtools)
    crit: suspicious
    conf: 0.9
    all:
      - id: js-devtools-detect
      - id: js-disable-inspect
  - id: js-devtools-heuristics
    desc: Browser DevTools heuristic detection
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: js-devtools-detect
      - id: js-devtools-size-delta
      - id: js-console-getter-tripwire
  - id: js-anti-inspection-suite
    desc: Multiple browser inspection countermeasures
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: js-disable-inspect
      - id: micro-behaviors/ui/menu/dom::browser-contextmenu-suppress
      - id: js-disable-view-source
  - id: js-destructive-devtools-response
    desc: DevTools detection triggers destructive page wipe
    crit: hostile
    conf: 0.95
    all:
      - id: js-devtools-heuristics
    any:
      - id: micro-behaviors/ui/window/manage/dom::browser-document-element-blanking
      - id: micro-behaviors/ui/window/manage/dom::browser-empty-document-write
      - id: micro-behaviors/ui/window/manage/dom::browser-window-stop
    needs: 2
  - id: js-devtools-navigation-redirect
    desc: Browser anti-inspection logic redirects page navigation
    crit: hostile
    conf: 0.96
    near_lines: 30
    all:
      - id: js-disable-inspect
      - id: micro-behaviors/ui/window/manage/dom::browser-location-href-assign
  - id: js-debugger-navigation-redirect
    desc: Browser debugger tripwire redirects page navigation
    crit: hostile
    conf: 0.97
    near_lines: 30
    all:
      - id: js-disable-inspect
      - id: micro-behaviors/process/debug/event::debugger-statement
      - id: micro-behaviors/ui/window/manage/dom::browser-location-href-assign
  - id: extension-presence-probe-evasion
    desc: Hides extension from page presence probes
    crit: hostile
    conf: 0.99
    near_lines: 30
    all:
      - id: micro-behaviors/communications/url/scheme::chrome-extension-url-prefix-check
    any:
      - id: js-extension-probe-fetch-hang
      - id: js-extension-probe-xhr-suppress
