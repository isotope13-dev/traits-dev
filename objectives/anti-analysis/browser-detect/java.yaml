defaults:
  platforms: [freebsd, unix]
  for: [java, class]
  attack: T1497

traits:
  - id: java-playwright-browser-env
    desc: Java Playwright browser env marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: PLAYWRIGHT_BROWSERS_PATH

  - id: java-puppeteer-browser-env
    desc: Java Puppeteer browser env marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: PUPPETEER_EXECUTABLE_PATH

  - id: java-electron-browser-env
    desc: Java Electron browser env marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ELECTRON_RUN_AS_NODE

  - id: java-qtwebkit-browser-env
    desc: Java QtWebEngine browser env marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: QTWEBENGINE_PROCESS

  - id: java-freebsd-browser-user-agents
    desc: Java FreeBSD browser user agents
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: 'Mozilla/5\.0 \(.{0,80}FreeBSD'

  - id: java-cgroup-browser-sandbox-check
    desc: Java checks browser cgroup sandbox
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/proc/self/cgroup[\s\S]{0,160}(chromium|docker|kubepods)'

composite_rules:
  - id: java-browser-sandbox-detection
    desc: Java detects browser sandbox signals
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: java-playwright-browser-env
      - id: java-puppeteer-browser-env
      - id: java-electron-browser-env
      - id: java-qtwebkit-browser-env
      - id: java-freebsd-browser-user-agents
      - id: java-cgroup-browser-sandbox-check
