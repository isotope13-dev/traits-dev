defaults:
  platforms: [qnx, unix]
  for: [go, elf]
  attack: T1497

traits:
  # Scans /proc for an attached Web Inspector / remote-debugger process — an
  # anti-analysis check run before sensitive payload behavior. QNX exposes a
  # /proc filesystem, so this is a valid QNX-appliance evasion primitive.
  - id: qnx-go-proc-browser-scan
    desc: Scans /proc for attached web inspector
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc[\s\S]{0,260}webinspector'

composite_rules:
  # Anti-debug /proc scan combined with installation of a rogue root CA (for
  # TLS interception). The CA-install leg is itself hostile; pairing it with the
  # debugger-presence check is the distinct evasion+intercept behavior.
  #
  # The former `qnx-go-browser-engine-list` leg (bare substr `qtwebengine`) was
  # removed: it is a ubiquitous Qt library token, not a "browser engine list",
  # and matched every Qt application (e.g. Qt Creator). The proc scan + rogue-CA
  # chain carry the real intent without it.
  - id: qnx-go-browser-detect-ca-install
    desc: Anti-debug proc scan with rogue root CA install
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-proc-browser-scan
      - id: objectives/privilege-escalation/install-certificate::qnx-go-root-ca-install-exfil
