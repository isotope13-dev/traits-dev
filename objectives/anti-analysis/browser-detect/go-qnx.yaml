defaults:
  platforms: [qnx, unix]
  for: [go, elf]
  attack: T1497

traits:
  - id: qnx-go-browser-engine-list
    desc: QNX Go browser engine list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: qtwebengine

  - id: qnx-go-proc-browser-scan
    desc: QNX Go proc browser scan
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc[\s\S]{0,260}webinspector'

composite_rules:
  - id: qnx-go-browser-detect-ca-install
    desc: QNX Go browser detect CA install
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-browser-engine-list
      - id: qnx-go-proc-browser-scan
      - id: objectives/privilege-escalation/install-certificate::qnx-go-root-ca-install-exfil
