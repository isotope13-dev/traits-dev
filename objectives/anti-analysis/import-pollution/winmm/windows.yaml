defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: winmm-library
    desc: winmm library import
    crit: component
    conf: 0.8
    if:
      type: string
      exact: "winmm.dll"
  - id: wave-in-reset
    desc: Wave input reset import
    crit: component
    conf: 0.78
    if:
      type: string
      exact: "waveInReset"
  - id: midi-out-long-msg
    desc: MIDI output long message import
    crit: component
    conf: 0.78
    if:
      type: string
      exact: "midiOutLongMsg"
  - id: mmio-install-ioproc
    desc: MMIO custom I/O proc import
    crit: component
    conf: 0.78
    if:
      type: string
      exact: "mmioInstallIOProcW"
  - id: mixer-line-controls
    desc: Mixer line controls import
    crit: component
    conf: 0.76
    if:
      type: string
      exact: "mixerGetLineControlsA"
composite_rules:
  - id: winmm-heuristic-pollution
    desc: Unusual multimedia import pollution
    crit: suspicious
    conf: 0.9
    all:
      - id: winmm-library
      - id: wave-in-reset
      - id: midi-out-long-msg
    any:
      - id: mmio-install-ioproc
      - id: mixer-line-controls
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/signed/platform::microsoft
        - id: metadata/format::many-exports
        - id: metadata/quality/versioning::pe-version-resource
  - id: packed-winmm-import-pollution
    desc: Packed binary with polluted winmm imports
    crit: suspicious
    conf: 0.93
    all:
      - id: winmm-heuristic-pollution
      - id: objectives/anti-static/obfuscation/binary-metrics::binary-packed
