defaults:
  platforms: [appliance, unix]
  for: [c, cpp, objc, elf]
  attack: T1622
  mbc: B0001

traits:
  - id: vxworks-wdb-core-debug-symbols
    desc: VxWorks WDB core debug symbols
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bwdb(Dbg|Debug|Bp)[A-Za-z]*\b'

  - id: vxworks-wdb-breakpoint-symbols
    desc: VxWorks WDB breakpoint symbols
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bwdb(TaskBp|CtxBp)[A-Za-z]*\b'

  - id: vxworks-dbg-library-symbols
    desc: VxWorks dbg library symbols
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bdbg(Arch|Task|Bp|Ctx)?Lib\b'

  - id: vxworks-taskdbg-symbols
    desc: VxWorks task debug symbols
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\btaskDbg[A-Za-z]*\b'

  - id: vxworks-debug-function-ptr
    desc: VxWorks debug function pointer
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b_func_dbg[A-Za-z]+\b'
    unless:
      - id: well-known/app/drivers::linux-driver-core-library-basename
      - id: well-known/app/drivers::gsp-firmware-binary-path
      - id: well-known/app/drivers::gsp-firmware-embedded-elf-path
      - id: well-known/app/drivers::arch-nvidia-utils-package


  - id: vxworks-wdb-tornado-libraries
    desc: VxWorks WDB library checks
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'lib(wdb|Tornado)'

composite_rules:
  - id: vxworks-debug-variable-check
    desc: VxWorks debug variable check
    crit: suspicious
    conf: 0.92
    any:
      - id: vxworks-wdb-core-debug-symbols
      - id: vxworks-wdb-breakpoint-symbols
      - id: vxworks-dbg-library-symbols
      - id: vxworks-taskdbg-symbols
      - id: vxworks-debug-function-ptr
