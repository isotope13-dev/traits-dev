defaults:
  platforms: [appliance, unix]
  for: [c, cpp, objc, elf]
  attack: T1622
  mbc: B0001

traits:
  - id: vxworks-debug-variable-check
    desc: VxWorks debug variable check
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bdebug\b[\s\S]{0,120}(task|symbol|variable|watch)'

  - id: vxworks-wdb-tornado-libraries
    desc: VxWorks WDB library checks
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'lib(wdb|Tornado)'
