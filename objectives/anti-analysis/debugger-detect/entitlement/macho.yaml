# macOS code-signing entitlement `com.apple.security.get-task-allow`
# permits a process to be attached by a debugger.  It's required for
# Xcode local debugging but should be stripped from any build that
# ships to users — Apple's notarization pipeline rejects binaries
# carrying it.
#
# A *notarized* binary that still carries `get-task-allow` is
# anomalous: either Apple's checks were bypassed, the dev cert was
# stolen, or the build pipeline accidentally promoted a debug
# binary. All three are supply-chain swap signals.
defaults:
  platforms: [macos]
  for: [macho]
  conf: 0.95
  attack: T1622
composite_rules:
  - id: get-task-allow-on-notarized
    desc: Debug entitlement on notarized binary
    crit: suspicious
    all:
      - id: metadata/signed/entitlements::get-task-allow
      - id: metadata/signed/trust-level::macho-notarized
