defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: garbled-tls-thread-context-stager
    desc: Garbled Go TLS PE uses memory and thread context
    crit: hostile
    conf: 0.98
    attack: T1027,T1055,T1622
    mbc: B0032
    all:
      - id: objectives/anti-static/obfuscation/obfuscator/garble::go-garbled-type-pointer
      - id: metadata/binary/layout::pe-multiple-tls-callbacks
      - id: micro-behaviors/mem/protect/modify::virtual-memory-allocation-protection-api-pair
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-text
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-text
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/
