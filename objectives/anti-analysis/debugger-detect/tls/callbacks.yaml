defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: tls-callback-metric
    desc: PE reports TLS callback entries
    crit: component
    conf: 0.96
    if:
      type: metrics
      field: pe.tls_callbacks
      min: 1
  - id: tls-callbacks-multiple
    desc: PE contains multiple TLS callbacks
    crit: suspicious
    conf: 0.92
    if:
      type: metrics
      field: pe.tls_callbacks
      min: 2
  - id: tls-dyn-init-callback-symbol
    desc: TLS init callback symbol
    crit: component
    conf: 0.7
    if:
      type: symbol
      exact: __dyn_tls_init_callback
  - id: tls-index-symbol
    desc: TLS index symbol present
    crit: component
    conf: 0.65
    if:
      type: symbol
      exact: __tls_index
  - id: tls-xl-symbol
    desc: TLS callback array symbol
    crit: component
    conf: 0.65
    if:
      type: symbol
      regex: (^|[^A-Za-z0-9])__xl_[A-Za-z]($|[^A-Za-z0-9])
  - id: tls-callback-function
    desc: TLS callback function reference
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \bTlsCallback(_\d+)?\b
      case_insensitive: true
    unless:
      - type: text
        substr: __mingw_TLScallback
    downgrade:
      any:
        - id: micro-behaviors/fs/file/section::pe-loader-tool
        - id: micro-behaviors/fs/file/section::pe-viewer-machine-types
  - id: tls-callback-anti-debug
    desc: Anti-debug check via TLS callback
    crit: suspicious
    conf: 0.9
    size_max: 5242880
    if:
      type: raw
      regex: \bTlsCallback.{0,100}IsDebuggerPresent
      case_insensitive: true
  - id: tls-used-symbol
    desc: _tls_used symbol reference
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: _tls_used
  - id: address-of-callbacks
    desc: AddressOfCallBacks reference
    crit: component
    conf: 0.8
    if:
      type: text
      word: AddressOfCallBacks
      case_insensitive: true
  - id: tls-callback-array-ref
    desc: TlsCallbackArray reference
    crit: suspicious
    conf: 0.8
    if:
      type: text
      word: TlsCallbackArray
      case_insensitive: true
composite_rules:
  - id: tls-directory-present
    desc: PE TLS directory present
    crit: notable
    conf: 0.7
    any:
      - id: tls-callback-metric
      - id: tls-used-symbol
      - id: tls-dyn-init-callback-symbol
      - id: tls-index-symbol
      - id: tls-xl-symbol
  - id: tls-anti-debug
    desc: TLS callback with anti-debugging
    crit: hostile
    conf: 0.95
    attack: T1622
    all:
      - id: tls-callback-function
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/process/debug/detect::check-remote-debugger
      - id: micro-behaviors/os/syscall/raw::nt-query-info-ssn
    downgrade:
      any:
        - id: micro-behaviors/fs/file/section::pe-loader-tool
        - id: micro-behaviors/fs/file/section::pe-viewer-machine-types
  - id: tls-callback-present
    desc: PE uses TLS callbacks
    crit: suspicious
    conf: 0.8
    needs: 2
    any:
      - id: tls-callbacks-multiple
      - id: tls-callback-function
      - id: tls-directory-present
      - id: address-of-callbacks
      - id: tls-callback-array-ref
      - id: tls-used-symbol
  - id: tls-loader-thread-hijack
    desc: TLS callback anti debug loader
    crit: hostile
    conf: 0.97
    size_max: 5242880
    all:
      - id: tls-callbacks-multiple
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/exception/error-handling::add-vectored-exception-handler
    any:
      - id: objectives/evasion/process/injection::thread-context-apis
      - id: objectives/evasion/process/injection/atom-bombing::atom-bombing-capable
      - id: micro-behaviors/process/control/affinity::set-process-affinity-mask
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
