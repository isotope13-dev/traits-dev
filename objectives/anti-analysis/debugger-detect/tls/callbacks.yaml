# TLS Callback Detection (PE)
# Detects Thread Local Storage (TLS) callbacks in PE executables
# Malware abuses TLS callbacks to execute code before the main entry point,
# often to detect debuggers or decrypt payloads before analysis tools attach
# ATT&CK: T1055.012 (Process Injection: Process Hollowing)
# ATT&CK: T1574.001 (Hijack Execution Flow: DLL Search Order Hijacking)
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1055.012"
traits:
  # TLS directory structure in PE header
  # IMAGE_TLS_DIRECTORY contains AddressOfCallBacks pointer
  - id: tls-dyn-init-callback-symbol
    desc: TLS init callback symbol
    crit: component
    conf: 0.7
    if:
      type: symbol
      exact: "__dyn_tls_init_callback"
  - id: tls-index-symbol
    desc: TLS index symbol present
    crit: component
    conf: 0.65
    if:
      type: symbol
      exact: "__tls_index"
  - id: tls-xl-symbol
    desc: TLS callback array symbol
    crit: component
    conf: 0.65
    if:
      type: symbol
      regex: '(^|[^A-Za-z0-9])__xl_[A-Za-z]($|[^A-Za-z0-9])'
  # TlsCallback functions
  - id: tls-callback-function
    desc: TLS callback function reference
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: "\\bTlsCallback(_\\d+)?\\b"
      case_insensitive: true
    unless:
      - type: string_value
        substr: "__mingw_TLScallback"
    downgrade:
      any:
        - id: micro-behaviors/fs/file/section::pe-loader-tool
        - id: micro-behaviors/fs/file/section::pe-viewer-machine-types
  # Common anti-debug checks in TLS callbacks
  - id: tls-callback-anti-debug
    desc: Anti-debug check via TLS callback
    crit: suspicious
    conf: 0.9
    size_max: 5242880
    if:
      type: raw
      regex: "\\bTlsCallback.{0,100}IsDebuggerPresent"
      case_insensitive: true
  # _tls_used symbol (compiler-generated TLS data)
  - id: tls-used-symbol
    desc: _tls_used symbol reference
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: "_tls_used"
  # TLS callback array initialization
  - id: address-of-callbacks
    desc: AddressOfCallBacks reference
    crit: component
    conf: 0.8
    if:
      type: raw
      word: "AddressOfCallBacks"
      case_insensitive: true
  - id: tls-callback-array-ref
    desc: TlsCallbackArray reference
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      word: "TlsCallbackArray"
      case_insensitive: true
composite_rules:
  - id: tls-directory-present
    desc: PE TLS directory present
    crit: notable
    conf: 0.7
    any:
      - id: tls-used-symbol
      - id: tls-dyn-init-callback-symbol
      - id: tls-index-symbol
      - id: tls-xl-symbol
  # TLS callback with anti-debugging
  - id: tls-anti-debug
    desc: TLS callback with anti-debugging
    crit: hostile
    conf: 0.95
    attack: "T1622"
    all:
      - id: tls-callback-function
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: objectives/anti-analysis/debugger-detect/check::check-remote-debugger
      - id: micro-behaviors/os/syscall/raw::nt-query-info-ssn
    downgrade:
      any:
        - id: micro-behaviors/fs/file/section::pe-loader-tool
        - id: micro-behaviors/fs/file/section::pe-viewer-machine-types
  # TLS callback usage (suspicious if present)
  - id: tls-callback-present
    desc: PE uses TLS callbacks
    crit: suspicious
    conf: 0.8
    needs: 2
    any:
      - id: tls-callback-function
      - id: tls-directory-present
      - id: address-of-callbacks
      - id: tls-callback-array-ref
      - id: tls-used-symbol
