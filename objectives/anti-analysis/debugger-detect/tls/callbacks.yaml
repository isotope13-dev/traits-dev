defaults:
  platforms:
    - windows
  for:
    - pe
  attack: T1055.012
traits:
  - id: tls-dyn-init-callback-symbol
    desc: TLS init callback symbol
    crit: component
    conf: 0.7
    if:
      type: symbol
      exact: __dyn_tls_init_callback
  - id: tls-index-symbol
    desc: TLS index symbol present
    crit: component
    conf: 0.65
    if:
      type: symbol
      exact: __tls_index
  - id: tls-xl-symbol
    desc: TLS callback array symbol
    crit: component
    conf: 0.65
    if:
      type: symbol
      regex: (^|[^A-Za-z0-9])__xl_[A-Za-z]($|[^A-Za-z0-9])
  - id: tls-callback-function
    desc: TLS callback function reference
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \bTlsCallback(_\d+)?\b
      case_insensitive: true
    unless:
      - type: text
        substr: __mingw_TLScallback
    downgrade:
      any:
        - id: micro-behaviors/fs/file/section::pe-loader-tool
        - id: micro-behaviors/fs/file/section::pe-viewer-machine-types
        - id: well-known/app/tls-callback-demo::tls-callback-demo-pdb
  - id: tls-callback-anti-debug
    desc: Anti-debug check via TLS callback
    crit: suspicious
    conf: 0.9
    size_max: 5242880
    if:
      type: text
      regex: \bTlsCallback.{0,100}IsDebuggerPresent
      case_insensitive: true
  - id: tls-used-symbol
    desc: _tls_used symbol reference
    crit: suspicious
    conf: 0.6
    if:
      type: symbol
      exact: _tls_used
  - id: address-of-callbacks
    desc: AddressOfCallBacks reference
    crit: component
    conf: 0.8
    if:
      type: text
      word: AddressOfCallBacks
      case_insensitive: true
  - id: tls-callback-array-ref
    desc: TlsCallbackArray reference
    crit: suspicious
    conf: 0.8
    if:
      type: text
      word: TlsCallbackArray
      case_insensitive: true
  - id: pe-tls-callbacks-metric
    desc: PE TLS callback table present
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: pe.tls_callback_count
      min: 1
  - id: pe-tls-multi-callbacks
    desc: PE has multiple TLS callbacks
    crit: component
    conf: 0.9
    if:
      type: metrics
      field: pe.tls_callback_count
      min: 2
composite_rules:
  - id: tls-directory-present
    desc: PE TLS directory present
    crit: suspicious
    conf: 0.7
    any:
      - id: tls-used-symbol
      - id: tls-dyn-init-callback-symbol
      - id: tls-index-symbol
      - id: tls-xl-symbol
  - id: tls-anti-debug
    desc: TLS callback with anti-debugging
    crit: hostile
    conf: 0.95
    attack: T1622
    all:
      - id: tls-callback-function
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/process/debug/detect::check-remote-debugger
      - id: micro-behaviors/os/syscall/raw::nt-query-info-ssn
    downgrade:
      any:
        - id: micro-behaviors/fs/file/section::pe-loader-tool
        - id: well-known/app/tls-callback-demo::tls-callback-demo-pdb
        - id: micro-behaviors/fs/file/section::pe-viewer-machine-types
  - id: tls-callback-present
    desc: PE uses TLS callbacks
    crit: notable
    conf: 0.8
    needs: 2
    any:
      - id: tls-callback-function
      - id: tls-directory-present
      - id: address-of-callbacks
      - id: tls-callback-array-ref
      - id: tls-used-symbol
      - id: pe-tls-callbacks-metric
    downgrade:
      any:
        - id: metadata/lang/compiler/native::mingw-runtime-marker
        - id: metadata/lang/compiler/native::mingw-built-pe
  - id: tls-callbacks-with-ntquery
    desc: TLS callbacks with process query
    crit: suspicious
    conf: 0.9
    attack: T1622
    all:
      - id: pe-tls-callbacks-metric
      - id: micro-behaviors/os/syscall/raw::nt-query-info-ssn
    any:
      - id: tls-callback-function
      - id: tls-callback-array-ref
      - id: address-of-callbacks
    unless:
      - id: metadata/signed/platform::microsoft
      - id: well-known/tool/reverse-engineering/x64dbg::x64dbg-core
  - id: tls-callback-debugger-api-pair
    desc: TLS callbacks with paired debugger checks
    crit: suspicious
    conf: 0.95
    attack: T1622
    all:
      - id: pe-tls-callbacks-metric
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/process/debug/detect::check-remote-debugger
    unless:
      - id: metadata/signed/platform::microsoft
      - id: well-known/tool/reverse-engineering/x64dbg::x64dbg-core
  - id: multi-tls-callbacks-with-analysis-catalog
    desc: Multi TLS callbacks with analysis catalog
    crit: suspicious
    conf: 0.96
    attack: "T1497, T1622"
    all:
      - id: pe-tls-multi-callbacks
      - id: objectives/anti-analysis/sandbox-detect/heuristics::analyst-tool-name-cluster
      - id: objectives/anti-analysis/vm-detect/vendor::comprehensive-evasion
    any:
      - id: objectives/anti-analysis/debugger-detect/check::paired-rdtsc-timing
      - id: objectives/anti-analysis/emulator-detect/heuristics::comprehensive
