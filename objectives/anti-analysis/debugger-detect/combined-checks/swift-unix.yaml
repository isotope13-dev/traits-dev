defaults:
  platforms: [unix]
  for: [swift]
  attack: T1622

traits:
  - id: swift-analysis-proc-scan
    desc: Swift analysis proc scan
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'detectAnalysisProcesses[\s\S]{0,220}(gdb|strace|frida|ida)'

  - id: swift-integrity-marker-write
    desc: Swift integrity marker write
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: .netscaler_integrity

composite_rules:
  - id: swift-debugger-tamper-check
    desc: Swift debugger tamper check
    crit: hostile
    conf: 0.98
    all:
      - id: swift-analysis-proc-scan
      - id: swift-integrity-marker-write
    any:
      - id: micro-behaviors/fs/proc/info/path::tracerpid-status-field
