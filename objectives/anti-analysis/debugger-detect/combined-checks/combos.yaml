defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits: []
composite_rules:
  - id: evasion-aware-malware
    desc: Multiple anti-analysis awareness checks
    crit: suspicious
    conf: 0.85
    attack: T1497
    mbc: B0001
    unless:
      - id: objectives/anti-static/obfuscation/imports/
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/reverse-engineering/
      - id: metadata/package/testing/
    all:
      - id: objectives/anti-analysis/debugger-detect/check::win-comprehensive
    any:
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/time/query::gettimeofday
      - id: micro-behaviors/time/query::clock_gettime
      - id: objectives/anti-analysis/vm-detect/processor-features::is-processor-feature-present
      - id: objectives/anti-analysis/emulator-detect/vendor-strings::comprehensive
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
  - id: anti-forensics-defensive
    desc: Malware with both anti-analysis AND anti-forensics capabilities
    crit: hostile
    conf: 0.9
    attack: T1562
    mbc: B0005
    all:
      - id: evasion-aware-malware
    any:
      - id: objectives/evasion/indicator-removal/logs::log-clear
      - id: objectives/evasion/indicator-removal/logs::log-clear-windows
      - id: objectives/evasion/self-delete/file/script::comspec-shortpath-self-delete
      - id: objectives/evasion/self-delete/file/script::module-path-rename-delete
      - id: objectives/evasion/self-delete/file/script::self-delete-windows
      - id: objectives/evasion/self-delete/process::aggressive-evidence-removal
