defaults:
  attack: T1622
  platforms: [unix]
  for: [go]
  crit: suspicious
  conf: 0.9

traits:
  - id: go-syscall-ptrace
    desc: Go raw ptrace syscall
    mbc: B0001.m01
    if:
      type: symbol
      kind: call
      exact: syscall.Syscall

  - id: go-sys-ptrace-constant
    desc: Go SYS_PTRACE constant
    mbc: B0001.m01
    if:
      type: text
      substr: SYS_PTRACE

  - id: go-ptrace-traceme-constant
    desc: Go PTRACE_TRACEME constant
    mbc: B0001.m01
    if:
      type: text
      substr: PTRACE_TRACEME

  - id: go-proc-self-status
    desc: Go reads proc self status
    if:
      type: string_literal
      exact: /proc/self/status

  - id: go-tracerpid-field
    desc: Go checks TracerPid field
    if:
      type: string_literal
      exact: "TracerPid:"

  - id: go-ptrace-scope-path
    desc: Go checks Linux ptrace policy
    conf: 0.86
    if:
      type: string_literal
      exact: /proc/sys/kernel/yama/ptrace_scope

  - id: go-proc-dir-literal
    desc: Go proc directory literal
    if:
      type: string_literal
      exact: /proc

  - id: go-proc-cmdline-path
    desc: Go proc cmdline path component
    if:
      type: string_literal
      exact: cmdline

  - id: go-gdb-tool-name
    desc: Go GDB tool name
    if:
      type: string_literal
      exact: gdb

  - id: go-lldb-tool-name
    desc: Go LLDB tool name
    if:
      type: string_literal
      exact: lldb

  - id: go-strace-tool-name
    desc: Go strace tool name
    if:
      type: string_literal
      exact: strace

  - id: go-ltrace-tool-name
    desc: Go ltrace tool name
    if:
      type: string_literal
      exact: ltrace

  - id: go-dtrace-tool-name
    desc: Go dtrace tool name
    if:
      type: string_literal
      exact: dtrace

  - id: go-frida-tool-name
    desc: Go instrumentation tool name
    if:
      type: text
      regex: '\bfrida-(server|gadget)\b'
      case_insensitive: true

  - id: go-objection-tool-name
    desc: Go objection tool name
    if:
      type: string_literal
      exact: objection

  - id: go-proc-self-maps-path
    desc: Go reads proc self maps
    if:
      type: string_literal
      exact: /proc/self/maps

  - id: go-codesign-binary-literal
    desc: Go codesign binary literal
    conf: 0.86
    if:
      type: string_literal
      exact: codesign

  - id: go-codesign-verbose-literal
    desc: Go codesign verbose flag
    conf: 0.84
    if:
      type: string_literal
      exact: --verbose=4

  - id: go-cydia-app-path
    desc: Go checks Cydia app path
    if:
      type: string_literal
      exact: /Applications/Cydia.app

  - id: go-sileo-app-path
    desc: Go checks Sileo app path
    if:
      type: string_literal
      exact: /Applications/Sileo.app

  - id: go-mobilesubstrate-path
    desc: Go checks MobileSubstrate path
    if:
      type: string_literal
      exact: /Library/MobileSubstrate/MobileSubstrate.dylib

  - id: go-ios-apt-path
    desc: Go checks iOS apt path
    if:
      type: string_literal
      exact: /private/var/lib/apt

  - id: go-lookpath-probe
    desc: Go probes executable presence
    conf: 0.84
    if:
      type: symbol
      kind: call
      exact: exec.LookPath

composite_rules:
  - id: go-raw-ptrace-traceme-check
    desc: Go raw ptrace TRACEME check
    crit: suspicious
    conf: 0.95
    all:
      - id: go-syscall-ptrace
      - id: go-sys-ptrace-constant
      - id: go-ptrace-traceme-constant

  - id: go-proc-tracerpid-check
    desc: Go proc TracerPid debugger check
    crit: suspicious
    conf: 0.94
    all:
      - id: go-proc-self-status
      - id: go-tracerpid-field

  - id: go-linux-anti-debug-gate
    desc: Go Linux anti-debug gate
    crit: hostile
    conf: 0.98
    all:
      - id: go-proc-tracerpid-check
    any:
      - id: objectives/anti-analysis/debugger-detect/check::go-ptrace-traceme
      - id: go-raw-ptrace-traceme-check
      - id: go-ptrace-scope-path

  - id: go-proc-debugger-process-scan
    desc: Go scans proc entries for debugger tools
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/fs/read/directory::readdir-call
      - id: go-proc-dir-literal
      - id: go-proc-cmdline-path
      - id: go-debugger-tool-name

  - id: go-debugger-tool-name
    desc: Go debugger tool name
    crit: suspicious
    conf: 0.92
    any:
      - id: go-gdb-tool-name
      - id: go-lldb-tool-name
      - id: go-strace-tool-name
      - id: go-ltrace-tool-name
      - id: go-dtrace-tool-name

  - id: go-frida-instrumentation-scan
    desc: Go scans for dynamic instrumentation tools
    crit: hostile
    conf: 0.96
    all:
      - id: go-frida-tool-name
    any:
      - id: go-proc-debugger-process-scan
      - id: go-proc-self-maps-path
      - id: go-objection-tool-name

  - id: go-darwin-codesign-probe
    desc: Go Darwin code-signing metadata probe
    crit: suspicious
    conf: 0.9
    all:
      - id: go-codesign-binary-literal
      - id: go-codesign-verbose-literal

  - id: go-ios-jailbreak-artifact-scan
    desc: Go scans iOS jailbreak artifacts
    crit: suspicious
    conf: 0.94
    needs: 2
    any:
      - id: go-cydia-app-path
      - id: go-sileo-app-path
      - id: go-mobilesubstrate-path
      - id: go-ios-apt-path
      - id: go-lookpath-probe

  - id: go-mobile-anti-analysis-artifact-scan
    desc: Go mobile anti-analysis artifact scan
    crit: hostile
    conf: 0.95
    all:
      - id: go-ios-jailbreak-artifact-scan
    any:
      - id: go-frida-instrumentation-scan
      - id: go-darwin-codesign-probe
