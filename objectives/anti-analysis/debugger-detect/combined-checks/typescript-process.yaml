defaults:
  platforms: [unix, windows, appliance]
  for: [typescript, javascript]
  attack: T1622

traits:
  - id: ts-debugger-indicator-list
    desc: TS debugger indicator list
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'DEBUGGER_INDICATORS[\s\S]{0,420}(gdb|strace|frida)'

  - id: ts-process-tree-sweep
    desc: TS process tree sweep
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'ps -e -o pid,ppid,comm,args|/proc/\$\{.{1,40}\}/stat'

  - id: ts-analysis-report-post
    desc: TS posts analysis report
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /api/v1/analysis-report

composite_rules:
  - id: ts-process-anti-analysis-report
    desc: TS process anti-analysis report
    crit: hostile
    conf: 0.98
    all:
      - id: ts-debugger-indicator-list
      - id: ts-process-tree-sweep
      - id: ts-analysis-report-post
