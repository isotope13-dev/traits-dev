defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1622
  mbc: B0001

traits:
  - id: csharp-proc-tracerpid-check
    desc: C# checks proc TracerPid
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc/self/status[\s\S]{0,180}TracerPid'

  - id: csharp-ptrace-traceme-check
    desc: C# ptrace TRACEME check
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ptrace[\s\S]{0,220}PTRACE_TRACEME'

  - id: csharp-proc-environ-debug-check
    desc: C# checks debug env
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/proc/self/environ[\s\S]{0,220}LD_PRELOAD[\s\S]{0,120}strace'

composite_rules:
  - id: csharp-linux-anti-debug-gate
    desc: C# Linux anti-debug gate
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-proc-tracerpid-check
      - id: csharp-ptrace-traceme-check
    any:
      - id: csharp-proc-environ-debug-check
