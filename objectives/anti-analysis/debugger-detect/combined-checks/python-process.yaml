defaults:
  platforms: [unix, appliance]
  for: [python, pyc]
  attack: T1622

traits:
  - id: python-gdbserver-tool-name
    desc: Python gdbserver tool name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: gdbserver

  - id: python-frida-tool-name
    desc: Python Frida tool name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      word: frida
    unless:
      - id: well-known/tool/development/pymobiledevice3
      - id: well-known/tool/offensive/sic-security/
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path

  - id: python-proc-tree-walk
    desc: Python proc tree walk
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/proc/%d/cmdline[\s\S]{0,220}/proc/%d/stat'

  - id: python-analysis-exit
    desc: Python exits on analysis tools
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "anti-analysis: suspicious processes detected"

composite_rules:
  - id: python-debugger-tool-set
    desc: Python debugger tool set
    crit: suspicious
    conf: 0.92
    all:
      - id: python-gdbserver-tool-name
      - id: python-frida-tool-name

  - id: python-process-anti-analysis
    desc: Python process anti-analysis
    crit: hostile
    conf: 0.98
    all:
      - id: python-debugger-tool-set
      - id: python-proc-tree-walk
    any:
      - id: python-analysis-exit
      - id: objectives/evasion/masquerade/process/name::python-proc-self-comm-target

  - id: python-pyc-process-anti-analysis
    desc: Python bytecode anti-analysis
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: python-debugger-tool-set
      - id: python-analysis-exit
