defaults:
  platforms: [unix, appliance]
  for: [python, pyc]
  attack: T1622

traits:
  - id: python-proc-tree-walk
    desc: Python proc tree walk
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/proc/%d/cmdline[\s\S]{0,220}/proc/%d/stat'

  - id: python-analysis-exit
    desc: Python exits on analysis tools
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "anti-analysis: suspicious processes detected"

composite_rules:
  - id: python-debugger-tool-set
    desc: Python debugger tool set
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/process/debug/tool-markers::gdbserver-reference
      - id: well-known/tool/reverse-engineering/frida::python-source-reference

  - id: python-process-anti-analysis
    desc: Python process anti-analysis
    crit: hostile
    conf: 0.98
    all:
      - id: python-debugger-tool-set
      - id: python-proc-tree-walk
    any:
      - id: python-analysis-exit
      - id: micro-behaviors/fs/proc/info/path::process-self-comm

  - id: python-pyc-process-anti-analysis
    desc: Python bytecode anti-analysis
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: python-debugger-tool-set
      - id: python-analysis-exit
