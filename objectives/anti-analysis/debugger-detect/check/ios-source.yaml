defaults:
  platforms: [ios]
  for: [kotlin, rust, zig]
  attack: T1622

traits:
  - id: ios-ptrace-attachexc-source
    desc: iOS ptrace attach-exception check
    crit: suspicious
    conf: 0.94
    unless:
      - id: metadata/package/files/system-package::debian-missing-sources-vendored-crate
      - id: well-known/lib/rust-system-bindings::rust-syscall-binding-crate
    if:
      type: text
      substr: PT_ATTACHEXC

  - id: proc-tracerpid-source
    desc: Source reads proc TracerPid
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: TracerPid

composite_rules:
  - id: ios-ptrace-debugger-check
    desc: iOS ptrace debugger check
    crit: hostile
    conf: 0.98
    any:
      - id: ios-ptrace-attachexc-source
      - id: proc-tracerpid-source
