# C# debugger detection via NtQueryInformationProcess P/Invoke
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1106"
  mbc: "B0001"
traits:
  - id: ntquery-pinvoke
    desc: NtQueryInformationProcess P/Invoke declaration
    crit: notable
    conf: 0.95
    if:
      type: symbol
      exact: NtQueryInformationProcess
  - id: process-debug-port
    desc: ProcessDebugPort anti-debug check (class 7)
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'NtQueryInformationProcess\s*\([^)]{0,50},\s*7\s*,'
  - id: entrypoint-invoke-crash
    desc: EntryPoint.Invoke anti-tamper crash
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "Assembly.EntryPoint.Invoke(null, null)"
  - id: public-key-tamper-check
    desc: Assembly public key tamper validation
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "GetEntryAssembly().GetName().GetPublicKey()"
composite_rules:
  - id: ntquery-anti-debug
    desc: NtQueryInformationProcess anti-debug with crash
    crit: hostile
    conf: 0.97
    all:
      - id: ntquery-pinvoke
      - id: entrypoint-invoke-crash
    any:
      - id: process-debug-port
      - id: public-key-tamper-check
