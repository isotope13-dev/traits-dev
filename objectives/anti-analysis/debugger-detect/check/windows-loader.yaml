defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1497.001"
  mbc: "B0001"
composite_rules:
  - id: exception-filtered-packed-loader-windows-loader
    desc: Packed loader with exception filter control
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-data-geometry
    any:
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/process/terminate/kill::terminate-process
  - id: exception-filtered-text-camouflage-loader
    desc: Loader anti debug exception suite
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    any:
      - id: objectives/anti-static/obfuscation/payload/section::text-section-payload-camouflage
      - id: objectives/anti-static/obfuscation/payload/section::dictionary-padding-entropy-camouflage
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: loader-debugger-kill-switch
    desc: Loader anti debug kill switch suite
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
      - id: micro-behaviors/os/exception/error-handling::add-vectored-exception-handler
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    any:
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: objectives/evasion/process/injection::thread-context-apis
      - id: objectives/anti-static/obfuscation/binary-metrics::signed-payload-overlay
    needs: 2
