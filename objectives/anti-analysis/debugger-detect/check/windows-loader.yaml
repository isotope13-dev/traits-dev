defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1497.001"
  mbc: "B0001"
composite_rules:
  - id: exception-filtered-packed-loader-windows-loader
    desc: Packed loader with exception filter control
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-data-geometry
    any:
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/process/terminate/kill::terminate-process
  - id: anti-debug-network-bootstrap-loader
    desc: Packed loader with anti-debug and network bootstrap
    crit: suspicious
    conf: 0.95
    size_max: 450000
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::bsjb-marker
    all:
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-code-entropy
    any:
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::msvcrt
        - id: metadata/lang/compiler/native::vcruntime
  - id: exception-filtered-text-camouflage-loader
    desc: Loader anti debug exception suite
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    any:
      - id: objectives/anti-static/obfuscation/payload/camouflage::text-section-payload-camouflage
      - id: objectives/anti-static/obfuscation/payload/camouflage::dictionary-padding-entropy-camouflage
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/package/versioning::pe-version-resource
