defaults:
  platforms: [windows]
  for: [pe]
  attack: T1622
  mbc: B0001
composite_rules:
  - id: signed-or-debug-build-context
    desc: Signed or debug build context
    crit: component
    conf: 0.85
    any:
      - id: metadata/binary/metrics::many-imports
      - id: metadata/signed/platform::microsoft
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/developer
      - id: metadata/binary/resource::rich-header-present
      - id: metadata/binary/debug::pdb-absolute-path
      - id: metadata/binary/debug::pdb-cpython-wininst
  - id: debugger-check-with-guards
    desc: Debugger check with teardown guards
    crit: suspicious
    conf: 0.93
    size_max: 500000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
    any:
      - id: micro-behaviors/os/console/control::set-console-ctrl-handler
      - id: micro-behaviors/time/timing/delay::sleep-dup
    downgrade:
      any:
        - id: objectives/anti-analysis/debugger-detect/check::signed-or-debug-build-context
    unless:
      - id: metadata/lang/compiler/native::msvcr90-import
