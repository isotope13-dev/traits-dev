defaults:
  platforms: [windows]
  for: [pe, dll]

traits:
- id: cape-rhadamanthys-exit-sequence
  desc: Rhadamanthys loader exit-stub sequence
  crit: component
  conf: 0.99
  if:
    type: hex
    section: .rsrc
    pattern: 6A 00 6A 00 6A 00 6A 00 6A 00 6A 00 8B 95 ?? ?? ?? ?? 52 8B 85 ?? ?? ?? ?? 50 6A 00 68 FF FF 1F 00
- id: cape-rhadamanthys-ntdll-sequence
  desc: Rhadamanthys loader ntdll-name sequence
  crit: component
  conf: 0.99
  if:
    type: hex
    section: .rsrc
    pattern: B9 6E 00 00 00 66 89 8D ?? ?? ?? ?? BA 74 00 00 00 66 89 95 ?? ?? ?? ?? B8 64 00 00 00 66 89 85 ?? ?? ?? ?? B9 6C 00 00 00 66 89 8D ?? ?? ?? ?? BA 6C 00 00 00 66 89 95
composite_rules:
- id: cape-resource-loader-anti-debug
  desc: CAPE loader with TLS anti-debug and process spawn
  crit: hostile
  conf: 0.99
  attack: T1027.009,T1622,T1106
  all:
  - id: cape-rhadamanthys-exit-sequence
  - id: cape-rhadamanthys-ntdll-sequence
  - id: metadata/binary/layout::pe-tls-callback-table
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: micro-behaviors/process/create/spawn::create-process-w
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/
  - id: well-known/tool/reverse-engineering/
- id: tls-process-cleanup-loader
  desc: TLS anti-debug loader with process creation, named-pipe IPC, and file cleanup
  crit: hostile
  conf: 0.98
  attack: T1622,T1106,T1070.004
  all:
  - id: metadata/binary/layout::pe-tls-callback-table
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/communications/ipc/named-pipe::nt-create-named-pipe
  - id: micro-behaviors/fs/file/delete::deletefile-w
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/
  - id: well-known/tool/reverse-engineering/
  - id: well-known/lib/selenium/
- id: self-protecting-encrypted-loader
  desc: Anti-debug encrypted loader with cleanup
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: metadata/binary/section/metrics::high-entropy-rdata-section
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/fs/file/delete::deletefile-w
  - id: micro-behaviors/process/terminate/kill::terminate-process
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/
  - id: well-known/app/
  - id: well-known/tool/development/
- id: custom-resolver-tls-debug-check
  desc: Custom resolver with debugger check and TLS
  crit: hostile
  conf: 0.96
  all:
  - id: objectives/anti-static/obfuscation/imports::pe-loader-manual-export-resolver-x64
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: metadata/binary/layout::pe-tls-callback-table
  - id: metadata/binary/section/metrics::high-entropy-exec-section
  unless:
  - id: metadata/signed/platform/
- id: anti-debugged-resource-toolhelp-loader
  desc: Anti-debugged resource loader with dynamic module enumeration
  crit: hostile
  conf: 0.97
  attack: T1027.009,T1057,T1622
  all:
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: micro-behaviors/process/enumerate/snapshot::dynamic-toolhelp-enumerator
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/
  - id: well-known/app/
  - id: well-known/tool/
- id: resource-process-memory-inspection-loader
  desc: Resource stager inspects process memory before launching code
  crit: hostile
  conf: 0.97
  attack: T1027.009,T1057,T1622
  all:
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: micro-behaviors/mem/query/info::virtualquery-ex
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/process/info/thread::resume-thread-dup
  - id: metadata/binary/layout::overlay-dominates-90pct
  unless:
  - id: metadata/signed/platform/
  - id: well-known/tool/reverse-engineering/

- id: encrypted-tls-process-loader
  desc: Encrypted TLS anti-debug process loader
  crit: hostile
  conf: 0.99
  for: [pe]
  all:
  - id: objectives/anti-static/obfuscation/payload/encrypted::concealed-high-entropy-region
  - id: metadata/binary/layout::pe-tls-callback-table
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: micro-behaviors/mem/protect/modify::virtual-protect

- id: encrypted-pipe-process-loader
  desc: Encrypted named-pipe process loader
  crit: hostile
  conf: 0.99
  for: [pe]
  all:
  - id: objectives/anti-static/obfuscation/payload/encrypted::concealed-high-entropy-region
  - id: micro-behaviors/communications/ipc/named-pipe::nt-create-named-pipe
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: objectives/evasion/masquerade/version-resource/claim::randomized-version-identity
