defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1622
  mbc: B0001
traits:
- id: paired-rdtsc-timing
  desc: Paired canonical RDTSC timing checks
  crit: suspicious
  conf: 0.94
  arch: [x86-64]
  size_max: 5242880
  count_min: 2
  if:
    type: hex
    section: .text
    pattern: 0F 31 48 C1 E2 20 48 09 D0
  unless:
  - id: metadata/binary/vendor::windows-system-implementer-dll
  - id: metadata/binary/framework/
  - id: metadata/lang/compiler/systems/
  - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
  - id: well-known/lib/chromium-angle::chromium-angle-graphics-lib
  - id: metadata/binary/linking/runtime::cosmopolitan-ape-runtime
- id: peb-helper-getter
  desc: PEB getter helper (mov rax gs:0x60; ret)
  crit: component
  conf: 0.9
  arch: [x86-64]
  size_max: 5242880
  if:
    type: hex
    section: .text
    pattern: 65 48 8b 04 25 60 00 00 00 c3
- id: peb-being-debugged-cmp-multi
  desc: PEB.BeingDebugged byte cmp (multiple sites)
  crit: component
  conf: 0.85
  arch: [x86-64]
  size_max: 5242880
  count_min: 2
  if:
    type: hex
    section: .text
    pattern: 80 78 02 00
- id: peb-nt-global-flag-test
  desc: PEB heap-flags test byte [rax+0x90] 0x70
  crit: component
  conf: 0.92
  arch: [x86-64]
  size_max: 5242880
  if:
    type: hex
    section: .text
    pattern: F6 80 90 00 00 00 70
- id: nt-process-debug-port-info-class
  desc: ProcessDebugPort info class (mov edx, 7)
  crit: component
  conf: 0.85
  arch: [x86-64]
  size_max: 5242880
  if:
    type: hex
    section: .text
    pattern: BA 07 00 00 00
  unless:
  - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: well-known/app/drivers::ngx-dll-basename
  - id: well-known/app/pdfarranger::pdf-arranger-identity
- id: nt-process-debug-object-info-class
  desc: 'ProcessDebugObjectHandle info class'
  crit: component
  conf: 0.92
  arch: [x86-64]
  size_max: 5242880
  if:
    type: hex
    section: .text
    pattern: BA 1E 00 00 00
- id: nt-process-debug-flags-info-class
  desc: ProcessDebugFlags info class (mov edx, 0x1F)
  crit: component
  conf: 0.92
  arch: [x86-64]
  size_max: 5242880
  if:
    type: hex
    section: .text
    pattern: BA 1F 00 00 00
  unless:
  - id: well-known/app/drivers::ngx-dll-basename
composite_rules:
- id: ntqip-debug-info-cluster
  desc: NtQueryInformationProcess debug info class cluster
  crit: suspicious
  conf: 0.96
  arch: [x86-64]
  size_max: 5242880
  needs: 2
  any:
  - id: nt-process-debug-port-info-class
  - id: nt-process-debug-object-info-class
  - id: nt-process-debug-flags-info-class
  all:
  - id: micro-behaviors/os/syscall/raw::nt-query-info-ssn
  unless:
  - id: objectives/anti-analysis/debugger-detect/check/
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework/
  - id: metadata/binary/framework::windows-bits
  - id: metadata/signed/leaf::microsoft-corporation
  - id: well-known/tool/sysadmin/sandboxie/
  - id: well-known/tool/reverse-engineering/scyllahide/
- id: peb-anti-debug-flag-cluster
  desc: PEB-walking anti-debug flag checks
  crit: suspicious
  conf: 0.92
  arch: [x86-64]
  size_max: 5242880
  all:
  - id: peb-helper-getter
  any:
  - id: peb-nt-global-flag-test
  - id: peb-being-debugged-cmp-multi
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework/

- id: importless-peb-debug-check-loader
  desc: Importless PE combines PEB or NT anti-debugging with executable memory
  crit: hostile
  conf: 0.98
  attack: T1622,T1055
  arch: [x86-64]
  size_max: 5242880
  all:
  - id: objectives/anti-static/obfuscation/imports::peb-access-x64
  - id: metadata/binary/metrics/structural::no-imports
  - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite-arg-x64
  any:
  - id: peb-being-debugged-cmp-multi
  - id: nt-process-debug-port-info-class
  needs: 1
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework/
  - id: metadata/signed/platform/
- id: anti-debug-gauntlet
  desc: Multi-technique anti-debug gauntlet (NtQIP + RDTSC timing)
  crit: suspicious
  conf: 0.96
  arch: [x86-64]
  size_max: 5242880
  all:
  - id: ntqip-debug-info-cluster
  - id: paired-rdtsc-timing
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework/
