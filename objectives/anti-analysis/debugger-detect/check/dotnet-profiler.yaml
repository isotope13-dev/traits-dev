defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  attack: T1622
  mbc: B0001
traits:
- id: enable-profiling-env-check
  desc: .NET profiler env check
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: _ENABLE_PROFILING
- id: getenv-profiling-api
  desc: GetEnvironmentVariable profiler check
  crit: component
  conf: 0.86
  if:
    type: text
    regex: 'GetEnvironmentVariable(A|W)?'
  unless:
  - id: metadata/lang/compiler/systems::go-buildinfo
composite_rules:
- id: dotnet-profiler-anti-debug
  desc: .NET profiler anti-debug check
  crit: hostile
  conf: 0.97
  all:
  - id: enable-profiling-env-check
  - id: getenv-profiling-api
  unless:
  - id: metadata/signed/platform::microsoft
