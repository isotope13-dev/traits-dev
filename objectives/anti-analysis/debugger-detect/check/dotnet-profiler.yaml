defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  attack: T1622
  mbc: B0001
traits:
- id: enable-profiling-env-check
  desc: .NET profiler env check
  crit: notable
  conf: 0.95
  unless:
  - id: well-known/app/discord-chat-exporter/
  - type: path
    regex: '(?i)DiscordChatExporter'
  if:
    type: text
    substr: _ENABLE_PROFILING
composite_rules:
- id: dotnet-profiler-anti-debug
  desc: .NET profiler anti-debug check
  crit: hostile
  conf: 0.97
  all:
  - id: enable-profiling-env-check
  - id: micro-behaviors/os/env/vars/access::getenv-profiling-api
  unless:
  - id: metadata/signed/leaf::microsoft-corporation
  - id: metadata/signed/platform/
  - id: metadata/binary/framework::dotnet-singlefilehost-runtime
  - id: well-known/app/dynu::dynu-systems-signer
