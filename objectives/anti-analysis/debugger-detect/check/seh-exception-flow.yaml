defaults:
  platforms: [windows]
  for: [pe]
  attack: T1622
  mbc: B0001
traits:
  - id: seh-install-div-zero
    desc: SEH handler install followed by div-by-zero
    crit: suspicious
    conf: 0.92
    arch: [x86]
    size_max: 524288
    if:
      type: hex
      section: text
      pattern: 64 89 2? F7 F?
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics::many-imports
