defaults:
  attack: T1622
  mbc: B0001
  platforms: [unix, windows, macos]
# Composite Debugger Detection Capabilities
composite_rules:
  # IsDebuggerPresent and UnhandledExceptionFilter are standard MSVC CRT
  # imports linked into virtually every Windows binary. Restrict to small
  # binaries where these APIs more likely indicate intentional anti-debug.
  - id: win-basic
    desc: Windows debugger detection (basic)
    crit: suspicious
    conf: 0.85
    platforms: [windows]
    for: [pe, dll]
    size_max: 100000
    unless:
      - id: metadata/signed/platform::microsoft
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/exception/error-handling::unhandled-exception-filter
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::vcruntime
        - id: metadata/lang/compiler/native::msvcrt
        - id: metadata/lang/compiler/native::ms-visual
  - id: win-comprehensive
    desc: Windows debugger/VM detection (multiple signals)
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    for: [pe, dll]
    # IsDebuggerPresent plus QueryPerformanceCounter is common MSVC CRT noise
    # in medium-sized signed DLLs. Keep this heuristic focused on tiny loaders;
    # larger anti-analysis suites are covered by the more specific composites
    # below that require exception filters and additional timing/evasion signals.
    size_max: 100000
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::bsjb-marker
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    any:
      - id: micro-behaviors/os/exception/error-handling::unhandled-exception-filter
      - id: micro-behaviors/time/timing/delay::query-performance-counter
    downgrade:
      any:
        - id: metadata/binary/resource::rich-header-present
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::vcruntime-import
        - id: metadata/binary/debug::pdb-absolute-path
  # Larger PE binaries with multiple anti-analysis signals:
  # IsDebuggerPresent + timing checks + thread affinity manipulation
  - id: win-anti-analysis-suite
    desc: Windows anti-analysis technique suite
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    for: [pe, dll]
    size_max: 350000
    unless:
      - id: metadata/binary/framework::bsjb-marker
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter
    any:
      - id: objectives/anti-analysis/timing/evasion::timing-delta-check
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/process/control/affinity::set-thread-affinity-mask
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/resource::rich-header-present
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/signed/platform::microsoft
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-absolute-path
  - id: unsigned-loader-anti-analysis-suite
    desc: Unsigned loader anti-analysis suite
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    for: [pe, dll]
    size_max: 400000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
    any:
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: objectives/evasion/process/injection/hollowing::ppid-spoofing-attributes
      - id: objectives/anti-static/obfuscation/payload/section::loader-encrypted-dot-data
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: linux-comprehensive
    desc: Linux debugger detection across multiple
    crit: suspicious
    conf: 0.95
    platforms: [linux]
    for: [elf]
    needs: 2
    any:
      - id: micro-behaviors/os/linker/env::ld-debug
      - id: tracerpid-string
      - id: ptrace-traceme-or-deny
  # Large installer binaries (NSIS, Inno Setup) with anti-analysis signals
  # in embedded payloads. The main container is large but the anti-analysis
  # techniques are in the embedded components.
  - id: installer-anti-analysis-suite
    desc: Installer binary with embedded anti-analysis techniques
    crit: suspicious
    conf: 0.88
    platforms: [windows]
    for: [pe]
    size_min: 500000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    needs: 2
    any:
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/time/query::get-tick-count
      - id: micro-behaviors/os/compat/wow64::wow64-fs-redirect
      - id: micro-behaviors/os/compat/wow64::is-wow64-process
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: well-known/app/cvte-crashrpt::cvte-crashrpt-strong-pin
      - id: metadata/binary/section/metrics::edata-wrapper-entry-layout
    downgrade:
      any:
        - id: metadata/binary/resource::rich-header-present
        - id: metadata/binary/metrics/structural::many-imports
