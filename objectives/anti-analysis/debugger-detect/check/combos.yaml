defaults:
  attack: T1622
  mbc: B0001
  platforms: [unix, windows, macos]
# Composite Debugger Detection Capabilities
composite_rules:
  # IsDebuggerPresent and UnhandledExceptionFilter are standard MSVC CRT
  # imports linked into virtually every Windows binary. Restrict to small
  # binaries where these APIs more likely indicate intentional anti-debug.
  - id: win-basic
    desc: Windows debugger detection (basic)
    crit: notable
    conf: 0.85
    platforms: [windows]
    for: [pe, dll]
    size_max: 100000
    unless:
      - id: metadata/signed/platform/
      - id: well-known/lib/jline/
      - id: well-known/lib/jruby/
      - id: metadata/binary/layout::pe-embedded
      - id: objectives/anti-analysis/debugger-detect/check/
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    any:
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
      - id: micro-behaviors/os/exception/error-handling::unhandled-exception-filter-import
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
  - id: win-comprehensive
    desc: Windows debugger/VM detection (multiple signals)
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    for: [pe, dll]
    # IsDebuggerPresent plus QueryPerformanceCounter is common MSVC CRT noise
    # in medium-sized signed DLLs. Keep this heuristic focused on tiny loaders;
    # larger anti-analysis suites are covered by the more specific composites
    # below that require exception filters and additional timing/evasion signals.
    size_max: 100000
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework::bsjb-marker
      - id: objectives/anti-analysis/debugger-detect/check/
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    any:
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
      - id: micro-behaviors/os/exception/error-handling::unhandled-exception-filter-import
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
      - id: micro-behaviors/time/timing/delay::query-performance-counter
    downgrade:
      any:
        - id: metadata/binary/resource::rich-header-present
        - id: metadata/package/versioning::pe-version-resource
  # Larger PE binaries with multiple anti-analysis signals:
  # IsDebuggerPresent + timing checks + thread affinity manipulation
  - id: win-anti-analysis-suite
    desc: Windows anti-analysis technique suite
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    for: [pe, dll]
    size_max: 350000
    unless:
      - id: metadata/binary/framework::bsjb-marker
      - id: objectives/anti-analysis/debugger-detect/check/
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
    any:
      - id: micro-behaviors/os/exception/error-handling::unhandled-exception-filter-import
      - id: objectives/anti-analysis/timing/evasion::timing-delta-check
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/process/control/affinity::set-thread-affinity-mask
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/resource::rich-header-present
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/signed/platform/
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-absolute-path
  - id: unsigned-loader-anti-analysis-suite
    desc: Unsigned loader anti-analysis suite
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    for: [pe, dll]
    size_max: 400000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
    any:
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: objectives/evasion/process/injection/hollowing::ppid-spoofing-attributes
      - id: objectives/anti-static/obfuscation/payload/section::loader-encrypted-dot-data
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform/

  # Require both the debugger marker and payload-transform/PE-loader markers;
  # the debugger constant alone is common compiler or application noise.
  - id: unsigned-inline-pe-loader-anti-analysis
    desc: Unsigned inline-PE loader with debugger-gated execution markers
    crit: hostile
    conf: 0.97
    platforms: [windows]
    for: [pe, dll]
    attack: T1622,T1027.009,T1620
    all:
      - id: metadata/binary/layout::pe-no-signature-record
      - id: objectives/anti-analysis/debugger-detect/check::nt-process-debug-port-info-class
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-walk
      - id: micro-behaviors/crypto/symmetric/xor/loop::x64-xor-imm8-widen-loop
    any:
      - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite-arg-x64
      - id: micro-behaviors/mem/alloc/executable::page-execute-read-arg-x64
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/framework/
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: overlay-wrapper-anti-analysis-suite
    desc: Overlay loader anti-analysis suite
    crit: suspicious
    conf: 0.96
    platforms: [windows]
    for: [pe]
    size_min: 500000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/time/query::get-tick-count
      - id: metadata/binary/section/metrics::edata-wrapper-entry-layout
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/platform::microsoft-windows
  - id: linux-comprehensive
    desc: Linux debugger detection across multiple
    crit: suspicious
    conf: 0.95
    platforms: [linux]
    for: [elf]
    needs: 2
    any:
      - id: micro-behaviors/os/linker/env::ld-debug
      - id: tracerpid-string
      - id: ptrace-traceme-or-deny
  # Large installer binaries (NSIS, Inno Setup) with anti-analysis signals
  # in embedded payloads. The main container is large but the anti-analysis
  # techniques are in the embedded components.
  - id: installer-anti-analysis-suite
    desc: Installer binary with embedded anti-analysis techniques
    crit: suspicious
    conf: 0.88
    platforms: [windows]
    for: [pe]
    size_min: 500000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    needs: 2
    any:
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/time/query::get-tick-count
      - id: micro-behaviors/os/compat/wow64::wow64-fs-redirect
      - id: micro-behaviors/os/compat/wow64::is-wow64-process
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: well-known/app/cvte-crashrpt/
      - id: metadata/binary/section/metrics/
    downgrade:
      any:
        - id: metadata/binary/resource::rich-header-present
        - id: metadata/binary/metrics/structural::many-imports
  - id: signed-firefox-wrapper-anti-analysis
    desc: Signed Firefox wrapper anti-analysis suite
    crit: suspicious
    conf: 0.96
    platforms: [windows]
    for: [pe]
    size_min: 250000
    size_max: 1500000
    all:
      - id: metadata/signed/developer::mozilla-corporation
      - id: well-known/app/mozilla::legacy-firefox-pdb-path
      - id: metadata/binary/layout::pe-embedded
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/time/query::get-tick-count

  - id: tls-debugger-thread-time-tamper
    desc: TLS debugger check with thread and system-time control
    crit: hostile
    conf: 0.98
    attack: T1622,T1055.003
    platforms: [windows]
    for: [pe, dll]
    all:
      - id: metadata/binary/layout::pe-tls-callback-table
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
      - id: micro-behaviors/process/info/thread::resume-thread-dup
      - id: objectives/command-and-control/backdoor/evasive::set-system-time-api
