defaults:
  platforms: [windows]
  for: [c]

traits:
  - id: hardware-breakpoint-doc-source
    desc: Hardware breakpoint clearing described in source
    crit: suspicious
    conf: 0.97
    size_min: 500
    if:
      type: text
      regex: (?i)(clear|clearing|remove|removing|reset|zero|zeroing).{0,80}hardware breakpoints|hardware breakpoints.{0,80}(clear|clearing|remove|removing|reset|zero|zeroing)
    unless:
      - id: micro-behaviors/os/kernel/syscall::sys-sysent-header
  - id: seh-generator-source
    desc: Generates repeated SEH blocks in source
    crit: notable
    conf: 0.92
    size_min: 1000
    if:
      type: text
      word: genseh
  - id: hlt-anti-emulation-source
    desc: HLT anti-emulation branch in source
    crit: suspicious
    conf: 0.97
    size_min: 1000
    if:
      type: text
      substr: hlt instruction if code ain't emulated
composite_rules:
  - id: seh-breakpoint-clearing-source
    desc: SEH clears hardware breakpoints in source
    crit: hostile
    conf: 0.99
    all:
      - id: seh-generator-source
      - id: hardware-breakpoint-doc-source
      - id: micro-behaviors/os/exception/handler::debug-register-seh-handler-source
  - id: hlt-emulator-trap-source
    desc: Faulting HLT emulator trap in source
    crit: suspicious
    conf: 0.97
    all:
      - id: seh-generator-source
      - id: hlt-anti-emulation-source
