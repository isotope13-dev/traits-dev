defaults:
  platforms: [windows]
  for: [c]

traits:
- id: hardware-breakpoint-doc-source--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.97
  size_min: 500
  if:
    type: text
    regex: (?i)(clear|clearing).{0,80}hardware breakpoints
  count_max: 1011234
- id: hardware-breakpoint-doc-source--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.97
  size_min: 500
  if:
    type: text
    regex: (?i)(remove|removing).{0,80}hardware breakpoints
  count_max: 1011235
- id: hardware-breakpoint-doc-source--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.97
  size_min: 500
  if:
    type: text
    regex: (?i)(reset|zero).{0,80}hardware breakpoints
  count_max: 1011236
- id: hardware-breakpoint-doc-source--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.97
  size_min: 500
  if:
    type: text
    regex: (?i)(zeroing).{0,80}hardware breakpoints
  count_max: 1011237
- id: hardware-breakpoint-doc-source--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.97
  size_min: 500
  if:
    type: text
    regex: hardware breakpoints.{0,80}(clear|clearing)
  count_max: 1011238
- id: hardware-breakpoint-doc-source--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.97
  size_min: 500
  if:
    type: text
    regex: hardware breakpoints.{0,80}(remove|removing)
  count_max: 1011239
- id: hardware-breakpoint-doc-source--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.97
  size_min: 500
  if:
    type: text
    regex: hardware breakpoints.{0,80}(reset|zero)
  count_max: 1011240
- id: hardware-breakpoint-doc-source--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.97
  size_min: 500
  if:
    type: text
    regex: hardware breakpoints.{0,80}(zeroing)
  count_max: 1011241
- id: seh-generator-source
  desc: Generates repeated SEH blocks in source
  crit: suspicious
  conf: 0.92
  size_min: 1000
  if:
    type: text
    word: genseh
- id: hlt-anti-emulation-source
  desc: HLT anti-emulation branch in source
  crit: suspicious
  conf: 0.97
  size_min: 1000
  if:
    type: text
    substr: hlt instruction if code ain't emulated
composite_rules:
- id: seh-breakpoint-clearing-source
  desc: SEH clears hardware breakpoints in source
  crit: hostile
  conf: 0.99
  all:
  - id: seh-generator-source
  - id: hardware-breakpoint-doc-source
  - id: micro-behaviors/os/exception/handler::debug-register-seh-handler-source
- id: hlt-emulator-trap-source
  desc: Faulting HLT emulator trap in source
  crit: suspicious
  conf: 0.97
  all:
  - id: seh-generator-source
  - id: hlt-anti-emulation-source
- id: hardware-breakpoint-doc-source
  desc: Hardware breakpoint clearing described in source
  crit: suspicious
  conf: 0.97
  size_min: 500
  any:
  - id: hardware-breakpoint-doc-source--rx-1
  - id: hardware-breakpoint-doc-source--rx-2
  - id: hardware-breakpoint-doc-source--rx-3
  - id: hardware-breakpoint-doc-source--rx-4
  - id: hardware-breakpoint-doc-source--rx-5
  - id: hardware-breakpoint-doc-source--rx-6
  - id: hardware-breakpoint-doc-source--rx-7
  - id: hardware-breakpoint-doc-source--rx-8
  unless:
  - id: micro-behaviors/os/kernel/syscall::sys-sysent-header
