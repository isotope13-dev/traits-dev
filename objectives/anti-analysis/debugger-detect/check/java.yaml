defaults:
  platforms: [unix]
  for: [java, class, java_class, jar, zip]
  attack: T1622
  mbc: B0001
traits:
  - id: java-proc-curproc-status
    desc: Java reads proc curproc status
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /proc/curproc/status
  - id: java-tracerpid-check
    desc: Java checks TracerPid field
    crit: component
    conf: 0.9
    if:
      type: text
      substr: TracerPid
  - id: java-tracerpid-zero-control
    desc: Java handles zero TracerPid
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "TracerPid:"
composite_rules:
  - id: java-proc-tracerpid-debugger-check
    desc: Java proc TracerPid debugger check
    crit: suspicious
    conf: 0.95
    all:
      - id: java-proc-curproc-status
      - id: java-tracerpid-check
      - id: java-tracerpid-zero-control
