# Debugger Detection
# MBC: OB0001 (Anti-Behavioral Analysis) → B0001 (Debugger Detection)
# ATT&CK: T1622 (Debugger Evasion)
# NOTE: /proc/self/status is defined in fs/proc/info/linux.yaml (process-self-status)
defaults:
  attack: T1622
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
traits:
  # === ptrace constant atomic indicators ===
  - id: ptrace-traceme
    desc: PTRACE_TRACEME constant
    crit: suspicious
    mbc: "B0001.m01"
    conf: 0.7
    if:
      type: string_value
      substr: "PTRACE_TRACEME"
    platforms: [linux, unix]
    for: [shell, python, javascript, elf]
  - id: pt-deny-attach
    desc: PT_DENY_ATTACH constant
    crit: suspicious
    mbc: "B0001.m01"
    conf: 0.7
    if:
      type: string_value
      substr: "PT_DENY_ATTACH"
    platforms: [macos]
    for: [shell, python, javascript]
  # === Process inspection micro-behaviors ===
  - id: tracerpid-string
    desc: TracerPid string (debugger detection)
    crit: suspicious
    conf: 0.7
    if:
      type: string_value
      substr: "TracerPid"
    platforms: [linux]
    for: [shell, python, javascript, elf]
    # Removed ld-debug duplicate - use micro-behaviors/os/linker/env::ld-debug
# Windows - individual API presence is notable (standard MSVC CRT imports);
# combinations in composite rules elevate to suspicious
# Removed win-isdebuggerpresent duplicate - use objectives/anti-analysis/debugger-detect/check::is-debugger-present

composite_rules:
  # Process inspection composite (migrated from YARA)
  - id: process-inspection
    desc: Process inspection pattern (potential anti-debug)
    crit: notable
    conf: 0.75
    mbc: "B0001"
    platforms: [linux]
    for: [shell, python, javascript, elf]
    any:
      - id: micro-behaviors/os/syscall/invoke::ptrace-dup
      - id: micro-behaviors/os/syscall/invoke::ptrace-import
      - id: micro-behaviors/fs/proc/info::process-self-status
      - id: micro-behaviors/fs/proc/info::process-self-maps
      - id: tracerpid-string
  # ptrace constant composite
  - id: ptrace-traceme-or-deny
    desc: PTRACE_TRACEME or PT_DENY_ATTACH anti-debugging constants
    crit: suspicious
    mbc: "B0001.m01"
    conf: 0.8
    any:
      - id: ptrace-traceme
      - id: pt-deny-attach
    none:
      - id: metadata/signed/platform::apple
  # Windows debugger detection composite
  - id: win-debugger-detect
    desc: Windows debugger detection API usage
    crit: suspicious
    mbc: "B0001"
    conf: 0.9
    platforms: [windows]
    for: [python, javascript, powershell, pe]
    size_max: 2000000
    needs: 2
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: objectives/anti-analysis/debugger-detect/check::check-remote-debugger
      - id: micro-behaviors/os/syscall/raw::nt-query-info-ssn
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/quality::versioned
        - id: metadata/format::many-imports
        - id: metadata/format::many-exports
  # Full anti-debug composite
  - id: anti-debug-full
    desc: Multiple anti-debugging techniques
    crit: suspicious
    mbc: "B0001"
    conf: 0.85
    needs: 2
    any:
      - id: ptrace-traceme-or-deny
      - id: process-inspection
      - id: win-debugger-detect
      - id: micro-behaviors/os/linker/env::ld-debug
