# Native Android configuration decryptors that gate execution on debugger state.
# The individual atoms remain observable capabilities; the composite captures
# the unusual anti-analysis combination without treating every crypto library
# or JNI helper as hostile.
defaults:
  platforms: [android]
  for: [elf]
  attack: T1622,T1027

traits:
  - id: native-config-decryptor-jni-export
    desc: JNI config decrypt export
    crit: notable
    conf: 0.94
    if:
      type: export
      regex: '^Java_[A-Za-z0-9_]+_decryptConfigNative$'

  - id: native-config-integrity-marker
    desc: HMAC/config decrypt markers
    crit: notable
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: '(?i)(HMAC verification failed|Config decrypted successfully|Decrypting config)'

composite_rules:
  - id: anti-debugging-native-config-loader
    desc: Anti-debug native config loader
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-analysis/debugger-detect/check::unix-tracerpid-debugger-check
      - id: native-config-decryptor-jni-export
      - id: native-config-integrity-marker
    unless:
      - id: well-known/tool/reverse-engineering/
      - id: well-known/app/drivers/
