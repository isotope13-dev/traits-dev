defaults:
  platforms: [android, unix]
  for: [c, cpp, elf]
  attack: T1622

traits:
  - id: android-tracerpid-status-check
    desc: Android TracerPid status check
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "TracerPid:"

composite_rules:
  - id: android-tracerpid-debugger-check
    desc: Android TracerPid debugger check
    crit: suspicious
    conf: 0.95
    all:
      - id: android-tracerpid-status-check
      - id: micro-behaviors/fs/proc/info/path::process-self-status
