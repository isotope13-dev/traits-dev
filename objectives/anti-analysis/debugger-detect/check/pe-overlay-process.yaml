defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: opaque-overlay-debugger-process-loader
    desc: Opaque overlay with anti-debug process loader
    crit: hostile
    conf: 0.98
    attack: T1027.009,T1057,T1622,T1106
    all:
      - id: metadata/binary/layout::overlay-dominates-90pct
      - id: metadata/binary/layout::high-entropy-overlay
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-symbol
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/create/exec::shell-execute-ex
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/
      - id: well-known/tool/reverse-engineering/
