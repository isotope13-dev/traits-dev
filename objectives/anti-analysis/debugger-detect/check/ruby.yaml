defaults:
  platforms: [unix, windows]
  for: [ruby]
  attack: T1622
  mbc: B0001

traits:
  - id: ruby-debug-env-keys
    desc: Ruby debug env key list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'RUBY_DEBUG[\s\S]{0,120}RUBY_DEBUG_PORT[\s\S]{0,120}DEBUGGER'
  - id: ruby-debug-gem-probes
    desc: Ruby debug gem probes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(byebug|pry|debug)[\s\S]{0,240}(LoadError|Gem::LoadError)'

composite_rules:
  - id: ruby-debugger-environment-check
    desc: Ruby debugger environment check
    crit: suspicious
    conf: 0.94
    any:
      - id: ruby-debug-env-keys
      - id: ruby-debug-gem-probes
