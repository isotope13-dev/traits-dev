defaults:
  platforms: [ios]
  for: [javascript, typescript]
  attack: T1622

traits:
  - id: react-native-devsettings-check
    desc: React Native DevSettings check
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: NativeModules.DevSettings

  - id: react-native-debugger-port-check
    desc: React Native debugger port check
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'localhost:\$\{REMOTE_DEBUGGER_PORT\}|localhost:\$\{INSPECTOR_PORT\}'

composite_rules:
  - id: react-native-ios-debugger-detect
    desc: React Native iOS debugger detect
    crit: hostile
    conf: 0.97
    all:
      - id: react-native-devsettings-check
      - id: react-native-debugger-port-check
