defaults:
  platforms: [windows]
  for: [pe]
  attack: T1622
  mbc: B0001

composite_rules:
  - id: resource-loader-debugger-gate
    desc: Resource loader uses debugger and exception gates
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-load-lock-chain
    any:
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/os/exception/handler::capture-context
      - id: objectives/anti-static/obfuscation/imports::peb-access-x64
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/binary/installer/script/
      - id: metadata/package/testing/presence/fixture/
