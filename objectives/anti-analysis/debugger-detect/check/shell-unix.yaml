defaults:
  platforms: [unix]
  for: [shell]
  attack: T1622
  mbc: B0001

traits:
  - id: shell-tracerpid-status-check
    desc: Shell checks TracerPid
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/proc/\$\$/status[\s\S]{0,160}TracerPid'

  - id: shell-debugger-pgrep-cluster
    desc: Shell pgrep debugger cluster
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: pgrep -x gdb strace ltrace valgrind

  - id: shell-vm-sandbox-checks
    desc: Shell VM sandbox checks
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'vboxguest[\s\S]{0,220}virtualbox\|vmware\|kvm\|qemu\|xen'

  - id: shell-setsid-journald-decoy
    desc: Shell setsid journald decoy
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'exec setsid bash -c[\s\S]{0,180}systemd-journald'

composite_rules:
  - id: shell-debugger-sandbox-evasion
    desc: Shell debugger sandbox evasion
    crit: hostile
    conf: 0.98
    all:
      - id: shell-tracerpid-status-check
      - id: shell-debugger-pgrep-cluster
    any:
      - id: shell-vm-sandbox-checks
      - id: shell-setsid-journald-decoy
