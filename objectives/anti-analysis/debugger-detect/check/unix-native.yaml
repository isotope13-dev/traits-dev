defaults:
  platforms: [unix]
  for: [c, cpp, elf]
  attack: T1622

traits:
  - id: debugger-tool-basename
    desc: Debugger tool basename
    crit: notable
    conf: 0.8
    if:
      type: basename
      regex: '(?i)(debugger|crashpad|gdb|lldb)'
    unless:
      - id: well-known/app/drivers/

composite_rules:
  - id: unix-tracerpid-debugger-check
    desc: Unix TracerPid debugger check
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/fs/proc/info/path::tracerpid-status-field
      - id: micro-behaviors/fs/proc/info/path::process-self-status
    unless:
      - id: well-known/app/drivers/
      - id: debugger-tool-basename
      - id: well-known/lib/ggml::ggml-inference-source
      - id: metadata/package/files/dependency::native-vendor-dependency-path
      - id: well-known/tool/sysadmin/alpine-packages/
      - id: well-known/lib/sharp-libvips/
      - id: metadata/package/quality/false-positives::c4core-debugger-helper-context
      - id: well-known/app/renderdoc/
      - id: metadata/library/observability::php-ddtrace-extension
