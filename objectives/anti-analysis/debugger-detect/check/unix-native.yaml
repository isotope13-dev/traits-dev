defaults:
  platforms: [unix]
  for: [c, cpp, elf]
  attack: T1622

composite_rules:
  - id: unix-tracerpid-debugger-check
    desc: Unix ELF TracerPid debugger check
    crit: suspicious
    conf: 0.95
    for: [elf]
    all:
      - id: micro-behaviors/fs/proc/info/path::tracerpid-status-field
      - id: micro-behaviors/fs/proc/info/path::process-self-status
    unless:
      - id: well-known/app/drivers/
      - id: well-known/tool/reverse-engineering/
      - id: well-known/lib/sharp-libvips/
      - id: well-known/app/renderdoc/
      - id: metadata/library/observability::php-ddtrace-extension
  - id: unix-source-tracerpid-debugger-check
    desc: Unix source TracerPid debugger check
    crit: suspicious
    conf: 0.95
    for: [c, cpp]
    all:
      - id: micro-behaviors/fs/proc/info/path::tracerpid-status-field
      - id: micro-behaviors/fs/proc/info/path::process-self-status
    unless:
      - id: well-known/tool/reverse-engineering/
      - id: metadata/package/files/dependency::native-vendor-dependency-path
      - id: metadata/package/quality/recognized-contexts::unix-source-tracerpid-safe-contexts
      - id: metadata/package/quality/recognized-contexts-extra::tinyusdz-acutest-context
