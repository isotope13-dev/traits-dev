defaults:
  platforms: [unix]
  for: [c, cpp, elf]
  attack: T1622

traits:
  - id: unix-tracerpid-status-check
    desc: Unix TracerPid status check
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "TracerPid:"

composite_rules:
  - id: unix-tracerpid-debugger-check
    desc: Unix TracerPid debugger check
    crit: suspicious
    conf: 0.95
    all:
      - id: unix-tracerpid-status-check
      - id: micro-behaviors/fs/proc/info/path::process-self-status
