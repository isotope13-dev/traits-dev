# Debugger Detection - Windows
# MBC: B0001 (Debugger Detection)
# ATT&CK: T1622
defaults:
  attack: T1622
  mbc: B0001
  for: [pe, dll]
  platforms: [windows]
traits:
# IsDebuggerPresent: use objectives/anti-analysis/debugger-detect/check::is-debugger-present (canonical)
# check-remote-debugger moved to micro-behaviors/process/debug/detect/windows.yaml
composite_rules:
  # A single debugger-query import is common in runtimes, crash handlers, and
  # diagnostics. Require corroboration before presenting it as anti-analysis.
  - id: debugger-api
    desc: Multiple debugger-query APIs or a concealed debugger check
    crit: notable
    conf: 0.66
    needs: 2
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: objectives/anti-analysis/debugger-detect/check::anti-debug-api-pair
      - id: micro-behaviors/process/debug/detect::check-remote-debugger
      - id: micro-behaviors/os/syscall/raw::nt-query-info-ssn
    unless:
      - id: well-known/tool/reverse-engineering/cff-explorer/
      - id: well-known/lib/ssh2::ssh2-pageant-helper-context
      - id: well-known/app/telegram::telegram-desktop-signed-client-context
    downgrade:
      any:
        - id: metadata/signed/leaf::malwarebytes-inc
