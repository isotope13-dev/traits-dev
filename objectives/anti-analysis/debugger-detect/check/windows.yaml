defaults:
  attack: T1622
  mbc: B0001
  platforms:
    - windows
  for:
    - pe
    - dll
  crit: notable
  conf: 0.95
traits:
  - id: is-debugger-present
    desc: Check if debugger is attached
    crit: component
    if:
      type: text
      regex: (?:^|_)IsDebuggerPresent(?:@\d+)?$
    not:
      - substr: Fatal error in launcher
    unless:
      - id: metadata/binary/debug::msqry32-pdb-basename
      - id: metadata/vendor/hex-rays::ida-pin-tracer-plugin
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics::many-exports-200
      - id: metadata/vendor/bitdefender::version-resource-product
      - id: metadata/vendor/microsoft::advanced-inf-setup-context
      - id: metadata/signed/platform::shenzhen-goodix-technology-co.
  - id: is-debugger-present-symbol
    desc: Debugger import symbol
    crit: notable
    conf: 0.96
    if:
      type: symbol
      exact: IsDebuggerPresent
    downgrade:
      any:
        - id: metadata/binary/metrics::many-exports
        - id: metadata/binary/metrics::many-imports
        - id: metadata/signed/platform::microsoft
    unless:
      - id: objectives/anti-analysis/debugger-detect/check::win-debugger-benign-context
      - id: metadata/vendor/hex-rays::ida-pin-tracer-plugin
      - id: metadata/vendor/bitdefender::version-resource-product
      - id: metadata/signed/platform::shenzhen-goodix-technology-co.
  - id: output-debug-string
    desc: OutputDebugString anti-debug API
    crit: component
    conf: 0.82
    if:
      type: text
      regex: (?:^|_)OutputDebugString[AW](?:@\d+)?$
  - id: bad-read-ptr
    desc: IsBadReadPtr anti-debug style probe
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: IsBadReadPtr
  - id: bad-write-ptr
    desc: IsBadWritePtr anti-debug style probe
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: IsBadWritePtr
composite_rules:
  - id: anti-debug-api-pair
    desc: Anti-debug API pair present
    crit: notable
    conf: 0.88
    all:
      - id: is-debugger-present
      - id: output-debug-string
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::msvcrt
        - id: metadata/binary/metrics::many-imports
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
    unless:
      - id: objectives/anti-analysis/debugger-detect/check::win-debugger-benign-context
  - id: seh-pointer-probe-anti-debug
    desc: SEH with bad pointer debug probes
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
    any:
      - id: bad-read-ptr
      - id: bad-write-ptr
      - id: output-debug-string
    needs: 2
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::vcruntime
        - id: metadata/lang/compiler/native::msvcrt
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics::many-imports
