# Debugger Detection (Windows)
# APIs used to detect if a debugger is attached
# MBC: B0001 (Debugger Detection)
# ATT&CK: T1622 (Debugger Evasion)
defaults:
  for: [pe, dll]
  crit: notable
  conf: 0.95
traits:
  - id: is-debugger-present
    desc: Check if debugger is attached
    crit: component
    for: [pe]
    attack: "T1622"
    mbc: "B0001"
    if:
      type: string
      exact: "IsDebuggerPresent"
  - id: is-debugger-present-symbol
    desc: Check debugger status via symbol
    crit: component
    for: [dll]
    attack: "T1622"
    mbc: "B0001"
    conf: 0.9
    if:
      type: symbol
      exact: "IsDebuggerPresent"
  - id: output-debug-string
    desc: OutputDebugString anti-debug API
    crit: component
    for: [pe]
    attack: "T1622"
    mbc: "B0001"
    conf: 0.82
    if:
      type: string
      regex: "^OutputDebugString[AW]$"
  - id: output-debug-string-symbol
    desc: OutputDebugString symbol anti-debug API
    crit: component
    for: [dll]
    attack: "T1622"
    mbc: "B0001"
    conf: 0.82
    if:
      type: symbol
      regex: "^OutputDebugString[AW]$"
composite_rules:
  - id: is-debugger-present-either
    desc: IsDebuggerPresent API presence
    crit: component
    attack: "T1622"
    mbc: "B0001"
    conf: 0.9
    any:
      - id: is-debugger-present
      - id: is-debugger-present-symbol
  - id: output-debug-string-either
    desc: OutputDebugString API presence
    crit: component
    attack: "T1622"
    mbc: "B0001"
    conf: 0.86
    any:
      - id: output-debug-string
      - id: output-debug-string-symbol
  - id: anti-debug-api-pair
    desc: Anti-debug API pair present
    crit: notable
    attack: "T1622"
    mbc: "B0001"
    conf: 0.88
    all:
      - id: is-debugger-present-either
      - id: output-debug-string-either
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/lang/compiler::msvcrt
        - id: metadata/format::many-imports
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
