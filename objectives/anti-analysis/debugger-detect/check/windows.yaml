defaults:
  attack: T1622
  mbc: B0001
  platforms:
    - windows
  for:
    - pe
    - dll
  crit: notable
  conf: 0.95
traits:
  - id: is-debugger-present
    desc: Check if debugger is attached
    crit: component
    if:
      type: text
      regex: (^|_)IsDebuggerPresent(@\d+)?$
    not:
      - substr: Fatal error in launcher
    unless:
      - id: metadata/binary/debug::msqry32-pdb-basename
      - id: objectives/anti-analysis/debugger-detect/check/
      - id: metadata/signed/platform/
      - id: metadata/binary/metrics/threshold::many-exports-200
      - id: well-known/lib/advanced-inf::advanced-inf-setup-context
  - id: is-debugger-present-symbol
    desc: Imports IsDebuggerPresent anti-debug API
    crit: suspicious
    conf: 0.96
    if:
      type: symbol
      exact: IsDebuggerPresent
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/binary/metrics/structural::many-functions
        - id: metadata/binary/layout::pe-embedded
    unless:
      - id: objectives/anti-analysis/debugger-detect/check/
      - id: metadata/binary/linking/api-set::api-set-forwarder-dll
      # Authenticode-signed Microsoft runtime DLLs (VCRuntime, msvcp140*)
      # legitimately import IsDebuggerPresent via the CRT fast-fail path.
      - id: metadata/signed/platform/
      - id: well-known/lib/webp/
  - id: is-debugger-present-symbol-wrapper
    desc: IsDebuggerPresent in small wrapper PE
    crit: suspicious
    conf: 0.97
    size_min: 250000
    size_max: 1500000
    if:
      type: symbol
      exact: IsDebuggerPresent
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/signed/platform/
        - id: well-known/lib/rsa-bsafe::rsa-bsafe-product-versioninfo
    unless:
      - id: objectives/anti-analysis/debugger-detect/check/
      - id: metadata/binary/linking/api-set::api-set-forwarder-dll
      - id: metadata/binary/layout::pe-embedded
      - id: well-known/game/steam/
  - id: output-debug-string
    desc: OutputDebugString API reference
    crit: component
    conf: 0.82
    if:
      type: text
      regex: (^|_)OutputDebugString[AW](@\d+)?$
    unless:
      - id: well-known/app/drivers::ngx-dll-basename
  - id: bad-read-ptr
    desc: IsBadReadPtr anti-debug style probe
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: IsBadReadPtr
  - id: bad-write-ptr
    desc: IsBadWritePtr anti-debug style probe
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: IsBadWritePtr
  - id: reversed-isdebuggerpresent
    desc: Reversed IsDebuggerPresent API string
    crit: component
    conf: 0.94
    if:
      type: text
      exact: tneserPreggubeDsi
  - id: reversed-checkremotedebuggerpresent
    desc: Reversed CheckRemoteDebuggerPresent string
    crit: component
    conf: 0.94
    if:
      type: text
      exact: tneserPreggubeDetomeRkcehC
  - id: reversed-sleepex
    desc: Reversed SleepEx API string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: xEpeelS
composite_rules:
  - id: win-debug-symbol-fp-context
    desc: Benign context for Windows debugger import detection
    crit: notable
    conf: 0.9
    any:
      - id: objectives/anti-analysis/debugger-detect/check::win-debugger-benign-context
      - id: well-known/tool/reverse-engineering/ida-pin-tracer::ida-pin-tracer-plugin
      - id: metadata/binary/vendor::bitdefender-product-marker
      - id: metadata/signed/platform::shenzhen-goodix-technology-co.
      - id: well-known/app/drivers::ngx-dll-basename
  - id: dotnet-reversed-debugger-checks
    desc: .NET reversed debugger detection APIs
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: reversed-isdebuggerpresent
    any:
      - id: reversed-checkremotedebuggerpresent
      - id: reversed-sleepex
  - id: anti-debug-api-pair
    desc: Anti-debug API pair present
    crit: suspicious
    conf: 0.88
    all:
      - id: is-debugger-present
      - id: output-debug-string
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::msvcrt
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/binary/vendor::is-microsoft-named
        - id: metadata/signed/platform/
        - id: metadata/build/manifest::pe-has-manifest
    unless:
      - id: objectives/anti-analysis/debugger-detect/check/
  - id: seh-pointer-probe-anti-debug
    desc: SEH with bad pointer debug probes
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
      - id: output-debug-string
    any:
      - id: bad-read-ptr
      - id: bad-write-ptr
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::vcruntime
        - id: metadata/lang/compiler/native::msvcrt
        - id: metadata/signed/platform/
        - id: metadata/binary/metrics/structural::many-imports
    unless:
      - id: metadata/package/quality/
