defaults:
  attack: T1622
  mbc: B0001
  platforms:
    - windows
  for:
    - pe
    - dll
  crit: notable
  conf: 0.95
traits:
  - id: is-debugger-present
    desc: Check if debugger is attached
    crit: notable
    if:
      type: string_value
      regex: (?:^|_)IsDebuggerPresent(?:@\d+)?$
  - id: is-debugger-present-symbol
    desc: Debugger import symbol
    crit: notable
    conf: 0.96
    if:
      type: symbol
      exact: IsDebuggerPresent
    downgrade:
      any:
        - id: metadata/format::many-exports
        - id: metadata/format::many-imports
        - id: metadata/signed/platform::microsoft
  - id: output-debug-string
    desc: OutputDebugString anti-debug API
    crit: component
    conf: 0.82
    if:
      type: string_value
      regex: (?:^|_)OutputDebugString[AW](?:@\d+)?$
  - id: bad-read-ptr
    desc: IsBadReadPtr anti-debug style probe
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: IsBadReadPtr
  - id: bad-write-ptr
    desc: IsBadWritePtr anti-debug style probe
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: IsBadWritePtr
composite_rules:
  - id: anti-debug-api-pair
    desc: Anti-debug API pair present
    crit: notable
    conf: 0.88
    all:
      - id: is-debugger-present
      - id: output-debug-string
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/lang/compiler::msvcrt
        - id: metadata/format::many-imports
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
  - id: seh-pointer-probe-anti-debug
    desc: SEH with bad pointer debug probes
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
    any:
      - id: bad-read-ptr
      - id: bad-write-ptr
      - id: output-debug-string
    needs: 2
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/lang/compiler::vcruntime
        - id: metadata/lang/compiler::msvcrt
        - id: metadata/signed/platform::microsoft
