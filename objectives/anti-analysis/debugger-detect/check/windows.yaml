# Debugger Detection (Windows)
# APIs used to detect if a debugger is attached
# MBC: B0001 (Debugger Detection)
# ATT&CK: T1622 (Debugger Evasion)
defaults:
  for: [pe, dll]
  crit: notable
  conf: 0.95
traits:
  - id: is-debugger-present
    desc: Check if debugger is attached
    # Component: CRT links IsDebuggerPresent for UnhandledExceptionFilter in virtually
    # every PE. Only meaningful when combined with other anti-analysis indicators.
    crit: component
    attack: "T1622"
    mbc: "B0001"
    if:
      type: symbol
      exact: "IsDebuggerPresent"
