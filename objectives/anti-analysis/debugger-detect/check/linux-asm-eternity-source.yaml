defaults:
  platforms: [linux, unix]
  for: [c]
  attack: T1622

traits:
  - id: ptrace-traceme-marker
    desc: PTRACE_TRACEME anti debug source
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: "PTRACE_TRACEME"

  - id: ptrace-syscall-source
    desc: Direct ptrace syscall source
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: "mov eax,26                ; SYS.PTRACE"

  - id: sigtrap-handler-marker
    desc: SIGTRAP registration source
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: "signal SIGTRAP"

  - id: sigtrap-handler-commentary
    desc: SIGTRAP receive handler source
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: "receives signal SIGTRAP"

  - id: debug-exit-branch-marker
    desc: Debugger exit branch
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: "jne near Bye_Bye"

  - id: debugged-commentary
    desc: Debugged failure commentary
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: "debugged!!!"

composite_rules:
  - id: ptrace-traceme-source
    desc: PTRACE_TRACEME anti debug source
    crit: suspicious
    conf: 0.95
    all:
      - id: ptrace-traceme-marker
      - id: ptrace-syscall-source

  - id: sigtrap-handler-source
    desc: SIGTRAP handler anti debug source
    crit: suspicious
    conf: 0.93
    all:
      - id: sigtrap-handler-marker
      - id: sigtrap-handler-commentary

  - id: debug-exit-branch-source
    desc: Exits when tracing detected
    crit: suspicious
    conf: 0.9
    all:
      - id: debug-exit-branch-marker
      - id: debugged-commentary

  - id: ptrace-sigtrap-anti-debug-source
    desc: ptrace and SIGTRAP anti debugging
    crit: suspicious
    conf: 0.97
    mbc: B0001
    all:
      - id: ptrace-traceme-source
      - id: sigtrap-handler-source
    any:
      - id: debug-exit-branch-source
      - id: objectives/anti-analysis/self-modify/runtime::mprotect
    needs: 1
