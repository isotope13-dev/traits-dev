# Anti-debug PEB access in C/C++ source (inline assembly)
# Detects manual PEB walking via FS segment register
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1622
  mbc: B0001
traits:
  - id: peb-fs-30h-source
    desc: PEB access via FS:[30h] in source
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'FS:\[0?x?30h?\]'
      case_insensitive: true
  - id: teb-fs-18h-source
    desc: TEB access via FS:[18h] in source
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'FS:\[0?x?18h?\]'
      case_insensitive: true
  - id: being-debugged-byte-source
    desc: PEB BeingDebugged byte offset check
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\[eax\s*\+\s*(0x)?2\]'
  - id: exit-windows-force-source
    desc: ExitWindowsEx forced power off
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "EWX_POWEROFF"
    unless:
      - id: metadata/lang/source::windows-compat-api-source
      - id: metadata/package/testing/presence/harness::c-source-test-directory
  - id: peb-ldr-data-source
    desc: PEB_LDR_DATA access via PEB offset
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\[eax\s*\+\s*(0x)?[Cc]\]'
    unless:
      - id: well-known/tool/sysadmin/chroot-win::chroot-windows-component
  - id: peb-size-of-image-inflate
    desc: PEB SizeOfImage inflation for anti-dump
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\[eax\s*\+\s*(0x)?20\].{0,50}0x2000'
composite_rules:
  - id: peb-debugger-check-source
    desc: PEB-based debugger detection in source
    crit: suspicious
    conf: 0.92
    all:
      - id: peb-fs-30h-source
    any:
      - id: teb-fs-18h-source
      - id: being-debugged-byte-source
  - id: anti-debug-forced-shutdown
    desc: Anti-debug with forced system shutdown
    crit: suspicious
    conf: 0.93
    all:
      - id: peb-debugger-check-source
      - id: exit-windows-force-source
  - id: anti-dump-peb-source
    desc: Anti-dump PEB SizeOfImage manipulation
    crit: suspicious
    conf: 0.90
    all:
      - id: peb-fs-30h-source
      - id: peb-ldr-data-source
