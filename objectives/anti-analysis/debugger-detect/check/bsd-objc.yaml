defaults:
  platforms: [freebsd, unix]
  for: [objc, macho]
  attack: T1622

traits:
  - id: objc-ptrace-traceme-check
    desc: ObjC ptrace trace-me debugger check
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ptrace\s*\(\s*PT_TRACE_ME'

  - id: objc-bsd-p-traced-check
    desc: ObjC checks BSD P_TRACED flag
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: P_TRACED
    unless:
      - type: raw
        regex: '(?s)#ifdef\s+DEBUG.{0,1000}\bP_TRACED\b'

  - id: objc-proc-curproc-tracerpid
    desc: ObjC reads proc tracer status
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/proc/curproc/status[\s\S]{0,120}TracerPid'

composite_rules:
  - id: objc-freebsd-debugger-detection
    desc: ObjC FreeBSD debugger detection
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: objc-ptrace-traceme-check
      - id: objc-bsd-p-traced-check
      - id: objc-proc-curproc-tracerpid
