defaults:
  platforms:
    - unix
    - android
    - ios
  for: [scripts, binaries]
  mbc: B0001
  attack: T1622
traits:
  - id: gdb-ref
    desc: GDB debugger reference
    crit: notable
    conf: 0.5
    if:
      type: text
      word: gdb
    unless:
      - id: metadata/file/text::neovim-filetype-registry
      - id: metadata/package/tooling::autoconf-generated-script
    downgrade:
      any:
        - id: metadata/signed/entitlements::debugger
        - id: metadata/signed/platform::apple
  - id: lldb-ref
    desc: LLDB debugger reference
    crit: suspicious
    conf: 0.5
    if:
      type: text
      word: lldb
    downgrade:
      any:
        - id: metadata/signed/entitlements::debugger
        - id: metadata/signed/platform::apple
composite_rules:
  - id: debugger-gdb
    desc: References gdb/lldb debugger
    crit: suspicious
    conf: 0.4
    any:
      - id: gdb-ref
      - id: lldb-ref
