defaults:
  platforms:
    - linux
    - unix
    - macos
    - android
    - ios
  for:
    - shell
    - elf
    - macho
  mbc: B0001
  attack: T1622
traits:
  - id: gdb-ref
    desc: GDB debugger reference
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: gdb
    downgrade:
      any:
        - id: metadata/signed/entitlements::debugger
        - id: metadata/signed/platform::apple
  - id: lldb-ref
    desc: LLDB debugger reference
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: lldb
    downgrade:
      any:
        - id: metadata/signed/entitlements::debugger
        - id: metadata/signed/platform::apple
composite_rules:
  - id: debugger-gdb
    desc: References gdb/lldb debugger
    crit: notable
    conf: 0.4
    any:
      - id: gdb-ref
      - id: lldb-ref
