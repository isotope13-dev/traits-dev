defaults:
  platforms:
    - unix
    - android
    - ios
  for: [scripts, binaries]
  mbc: B0001
  attack: T1622
traits:
  - id: gdb-ref
    desc: GDB debugger reference
    crit: component
    conf: 0.5
    if:
      type: text
      word: gdb
    unless:
      - id: metadata/file/catalog/identity/
      - id: metadata/build/autotools::autoconf-generated-script
      - id: well-known/app/drivers/
    downgrade:
      any:
        - id: metadata/signed/entitlements::debugger
        - id: metadata/signed/platform::apple
  - id: lldb-ref
    desc: LLDB debugger reference
    crit: component
    conf: 0.5
    if:
      type: text
      word: lldb
    downgrade:
      any:
        - id: metadata/signed/entitlements::debugger
        - id: metadata/signed/platform::apple
composite_rules:
  - id: debugger-gdb
    desc: References gdb/lldb debugger
    crit: suspicious
    conf: 0.4
    any:
      - id: gdb-ref
      - id: lldb-ref
    unless:
      - id: well-known/app/kilocode::kilo-code-js-bundle
      - id: well-known/app/kilocode::kilo-code-native-runtime
