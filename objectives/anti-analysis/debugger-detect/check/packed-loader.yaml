# Large packed PE anti-debug patterns
defaults:
  attack: T1622
  mbc: B0001
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: packed-loader-anti-debug
    desc: Packed PE anti-debug suite
    crit: suspicious
    conf: 0.92
    size_min: 524288
    none:
      - id: metadata/binary/metrics::many-functions
      - id: metadata/binary/metrics::many-imports
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter
    any:
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: micro-behaviors/os/exception/error-handling::unhandled-exception-filter
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
      - id: metadata/binary/metrics::dominant-section
      - id: metadata/binary/metrics::few-functions
    needs: 4
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::msvcrt
        - id: metadata/lang/compiler/native::vcruntime
  - id: exception-filtered-packed-loader
    desc: Packed loader with exception filter control
    crit: suspicious
    conf: 0.93
    size_min: 524288
    all:
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-data-geometry
    any:
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/process/terminate/kill::terminate-process
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/package/versioning::pe-version-resource
