# JavaScript anti-debugging via Function constructor + 'debugger'
# statement. Pattern: a function expression whose .constructor (i.e. the
# Function constructor) is invoked with the literal string 'debugger',
# then .call()ed in a tight loop. If a real debugger is attached the
# created function pauses execution; the obfuscator detects this via
# elapsed-time timing and triggers anti-analysis behaviour. Standard
# obfuscator.io output and signature for any obfuscator.io-derived
# malware (npm xmlrpc / xmrdropper, etc.).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, shell]
  attack: T1622
  mbc: B0001
traits:
- id: js-constructor-debugger-call
  desc: Function constructor with debugger string
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '\[\s*[''"]constructor[''"]\s*\]\s*\(\s*[''"][^''"]{0,40}debugger[^''"]{0,20}[''"]\s*\)'
- id: js-constructor-debugger-direct
  desc: Direct .constructor('debugger') call
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '\.constructor\s*\(\s*[''"][^''"]{0,40}debugger[^''"]{0,20}[''"]\s*\)'
- id: js-debugger-string-split--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '[''"]debu[''"]\s*\+\s*[''"]gger[''"]'
  count_max: 1011296
- id: js-debugger-string-split--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '[''"]debug[''"]\s*\+\s*[''"]ger[''"]'
  count_max: 1011297
- id: js-debugger-string-split--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '[''"]deb[''"]\s*\+\s*[''"]ugger[''"]'
  count_max: 1011298
- id: js-debugger-string-table-fragments
  desc: debugger fragments in obfuscated string table
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '[''"]debu[''"][\s\S]{0,180}[''"]gger[''"]|[''"]gger[''"][\s\S]{0,180}[''"]debu[''"]'
- id: js-while-true-string-table-fragment
  desc: while true obfuscated string table
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '[''"]while(\\x20|\s)+\(true\)(\\x20|\s)*\{\}[''"]'
composite_rules:
- id: obfuscated-vscode-debugger-trap
  desc: Obfuscated VS Code runtime embeds debugger traps
  crit: hostile
  conf: 0.97
  attack: T1195.002,T1027.002,T1622
  all:
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::push-shift-bracket-pattern
  - id: micro-behaviors/process/debug/event::debugger-statement
  - id: metadata/library/vscode::globalthis-vscode-exposure
  any:
  - id: micro-behaviors/data/source/dynamic/load::node-computed-require-call
  - id: micro-behaviors/data/source/property/computed::js-computed-property-call
  unless:
  - id: metadata/package/testing/
- id: js-constructor-debugger-antidebug
  desc: JS Function-constructor anti-debugger trick
  crit: hostile
  conf: 0.97
  any:
  - id: js-constructor-debugger-call
  - id: js-constructor-debugger-direct
  - id: js-debugger-string-split
- id: js-debugger-string-split
  desc: debugger string split across literals
  crit: suspicious
  conf: 0.92
  any:
  - id: js-debugger-string-split--rx-1
  - id: js-debugger-string-split--rx-2
  - id: js-debugger-string-split--rx-3
- id: js-obfuscator-self-defending-antidebug
  desc: Obfuscated JS self-defending anti-debugger fragments
  crit: hostile
  conf: 0.96
  scope: leaf
  all:
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::any-name-mangling
  - id: objectives/execution/interpreter/eval/dynamic::constructor-property-access
  any:
