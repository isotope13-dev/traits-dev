defaults:
  platforms: [windows]
  for: [binaries, source]
traits:
  - id: hide-thread-from-debugger-marker
    desc: HideThreadFromDebugger anti-analysis marker
    crit: notable
    conf: 0.98
    if:
      type: text
      exact: HideThreadFromDebugger
composite_rules:
  - id: thread-and-memory-anti-analysis-suite
    desc: Thread hiding and memory breakpoint anti-analysis suite
    crit: hostile
    conf: 0.99
    attack: T1622
    all:
      - id: objectives/anti-analysis/sandbox-detect/suite::named-native-anti-analysis-check-cluster
      - id: hide-thread-from-debugger-marker
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup

  # Benign-context umbrella: the binary is itself a legitimate debugger / RE
  # tool (or benign app), for which a debug-attach loop is expected behavior.
  - id: legit-debugger-tool-marker
    desc: Legitimate debugger or RE tool binary
    crit: notable
    conf: 0.9
    any:
      - id: metadata/binary/vendor::windows-system-implementer-dll
      - id: well-known/tool/reverse-engineering/windows-debugger::gdbserver-debugger-server
      - id: well-known/tool/reverse-engineering/ida-debugger::ida-debugger-server
      - id: well-known/tool/reverse-engineering/windows-debugger::debug-event-loop
      - id: well-known/tool/reverse-engineering/ollydbg::ollydbg-executable-marker
      - id: well-known/tool/reverse-engineering/scyllahide::reverse-engineering-tool
      - id: metadata/package/quality/false-positives::quickbms-utility-context
      - id: well-known/app/brave::brave-update-sideload-candidate
      - id: well-known/tool/sysadmin/conemu::conemu-component
  - id: debugger-attach-loop
    desc: Attaches as debugger and enters event loop
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/process/debug/event::debug-active-process
      - id: micro-behaviors/process/debug/event::wait-for-debug-event
      - id: micro-behaviors/process/debug/event::continue-debug-event
    # Suppressors consolidated into the legit-debugger-tool-context umbrella
    # (one referenced leg instead of eight; identical OR semantics).
    unless:
      - id: objectives/anti-analysis/debugger-detect/hardware-breakpoints/
      - id: well-known/tool/reverse-engineering/radare2/
  - id: suspect-browser-snapshot
    desc: Enumerates processes with specific browser focus
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
      - id: objectives/credential-access/browser/chromium::target-browser-library
