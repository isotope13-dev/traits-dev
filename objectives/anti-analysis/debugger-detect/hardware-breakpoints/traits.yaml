defaults:
  platforms: [windows]
  for: [binaries, source]
traits:
  - id: telegram-exfil-artifact
    desc: Telegram bot exfiltration artifact
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "api.telegram.org/bot"
  - id: debug-event-dispatch-sub-ladder
    desc: Debug event dispatching loop (EXCEPTION/CREATE_PROCESS ladder)
    crit: suspicious
    conf: 0.9
    for: [pe]
    if:
      type: hex
      # 8b 44 24 40 : mov eax, dword [rsp + 0x40] (dwDebugEventCode)
      # 83 e8 01    : sub eax, 1 (EXCEPTION_DEBUG_EVENT = 1)
      # 0f 84 ...   : je ...
      # 83 e8 01    : sub eax, 1 (CREATE_THREAD_DEBUG_EVENT = 2)
      pattern: "8b 44 24 40 83 e8 01 0f 84 ?? ?? 00 00 83 e8 01"
      section: .text

composite_rules:
  - id: debug-register-manipulation
    desc: Manipulation of debug registers (DR0-DR7) via thread context
    crit: suspicious
    conf: 0.8
    mbc: B0012
    all:
      - id: micro-behaviors/process/info/thread::set-thread-context
      - id: micro-behaviors/process/info/thread::get-thread-context
  - id: debugger-attach-loop
    desc: Attaches as debugger and enters event loop
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/debug/event::debug-active-process
      - id: micro-behaviors/process/debug/event::wait-for-debug-event
      - id: micro-behaviors/process/debug/event::continue-debug-event
  - id: suspect-browser-snapshot
    desc: Enumerates processes with specific browser focus
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
      - id: objectives/credential-access/browser/chromium::target-browser-library
