defaults:
  platforms: [unix]
  for: [kotlin, class, jar]
  attack: T1497.003

traits:
  - id: kotlin-utc-window-gate
    desc: Kotlin UTC window gate
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Window not open

  - id: kotlin-thread-sleep-check
    desc: Kotlin Thread.sleep check
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Thread.sleep

  - id: kotlin-timing-anomaly-exit
    desc: Kotlin timing anomaly exit
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Timing anomaly detected

  - id: jvm-window-not-open
    desc: JVM window not open
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 57 69 6E 64 6F 77 20 6E 6F 74 20 6F 70 65 6E

  - id: jvm-timing-anomaly
    desc: JVM timing anomaly
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 54 69 6D 69 6E 67 20 61 6E 6F 6D 61 6C 79

composite_rules:
  - id: kotlin-timing-analysis-evasion
    desc: Kotlin timing analysis evasion
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: kotlin-utc-window-gate
      - id: kotlin-thread-sleep-check
      - id: kotlin-timing-anomaly-exit

  - id: jvm-timing-analysis-evasion
    desc: JVM timing analysis evasion
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-window-not-open
      - id: jvm-timing-anomaly
