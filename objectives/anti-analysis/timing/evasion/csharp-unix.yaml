defaults:
  platforms: [qnx, unix, windows]
  for: [csharp, pe]
  attack: T1497.003

traits:
  - id: csharp-anti-analysis-timing-method
    desc: C# anti-analysis timing method
    crit: component
    conf: 0.94
    if:
      type: text
      substr: AntiAnalysisTiming

  - id: csharp-stopwatch-elapsedticks
    desc: C# Stopwatch elapsed ticks
    crit: component
    conf: 0.94
    if:
      type: text
      substr: ElapsedTicks

  - id: csharp-stopwatch-gettimestamp
    desc: C# Stopwatch timestamp check
    crit: component
    conf: 0.94
    if:
      type: text
      substr: GetTimestamp

  - id: csharp-lolbin-execution-method
    desc: C# LOLBin execution method
    crit: component
    conf: 0.94
    if:
      type: text
      substr: LolbinExecution

composite_rules:
  - id: csharp-timed-lolbin-execution
    desc: C# timed LOLBin execution
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-anti-analysis-timing-method
      - id: csharp-stopwatch-elapsedticks
      - id: csharp-stopwatch-gettimestamp
      - id: csharp-lolbin-execution-method
      - id: objectives/execution/lolbin/os::csharp-unix-http-lolbin-exec
