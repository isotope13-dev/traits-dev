defaults:
  platforms: [junos, appliance, unix]
  for: [zig]
  attack: T1497.003
  mbc: B0007

traits:
  - id: zig-random-sleep-jitter
    desc: Zig random sleep jitter
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'std\.crypto\.random\.intRangeAtMost[\s\S]{0,120}time\.sleep'

  - id: zig-sqrt-timing-loop
    desc: Zig sqrt timing loop
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'std\.math\.sqrt\(accumulator \+ 1\.0\)'

  - id: zig-loop-elapsed-threshold
    desc: Zig loop elapsed threshold
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'loop_elapsed\s*<\s*5'

  - id: zig-fixed-gap-sleep
    desc: Zig fixed gap sleep
    crit: component
    conf: 0.93
    if:
      type: text
      substr: 'time.sleep(100 * std.time.ns_per_ms)'

  - id: zig-gap-bounds-check
    desc: Zig gap bounds check
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'gap\s*<\s*80\s+or\s+gap\s*>\s*300'

composite_rules:
  - id: zig-timing-analysis-evasion
    desc: Zig timing analysis evasion
    crit: hostile
    conf: 0.98
    all:
      - id: zig-random-sleep-jitter
      - id: zig-sqrt-timing-loop
      - id: zig-loop-elapsed-threshold
      - id: zig-fixed-gap-sleep
      - id: zig-gap-bounds-check
