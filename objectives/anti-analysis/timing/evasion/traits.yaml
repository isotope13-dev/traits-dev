defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
  mbc: B0001.032
  attack: T1497.001
traits:
  - id: rdtsc
    desc: RDTSC timing instruction present
    crit: baseline
    conf: 0.5
    size_max: 1048576
    count_min: 2
    if:
      type: hex
      section: text
      pattern: 0F 31
    unless:
      - type: raw
        substr: BSJB
      - type: metrics
        field: imports.count
        min: 80
  - id: time-func
    desc: Time query used for delay checks
    crit: notable
    conf: 0.2
    if:
      type: text
      regex: \btime\(\)
    unless:
      - id: metadata/library/python-runtime::python-runtime
composite_rules:
  - id: primitive
    desc: Hardware timing primitive (potential anti-analysis)
    crit: suspicious
    conf: 0.4
    all:
      - id: rdtsc
    any:
      - id: micro-behaviors/time/query::clock_gettime
      - id: micro-behaviors/time/query::gettimeofday
      - id: time-func
