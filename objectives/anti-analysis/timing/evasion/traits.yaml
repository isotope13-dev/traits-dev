# Anti-Analysis - Timing Primitives
# MBC: B0001.032 (Timing/Delay Check)
# ATT&CK: T1497.001 (Virtualization/Sandbox Evasion: System Checks)
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [elf, macho, pe, dll, -go, -rust]
  mbc: "B0001.032"
  attack: "T1497.001"
traits:
  - id: rdtsc
    desc: RDTSC timing instruction present
    crit: baseline
    conf: 0.5
    size_max: 1048576
    count_min: 2
    if:
      type: hex
      section: text
      pattern: "0F 31"
    unless:
      - type: raw
        substr: "BSJB" # .NET IL bytecode contains 0F 31 sequences that aren't RDTSC
      - type: metrics
        field: binary.import_count
        min: 80
  # NOTE: "time" is far too generic - matches Go runtime, standard library, etc.
  # Changed to more specific pattern
  - id: time-func
    desc: time function
    crit: notable
    conf: 0.2
    if:
      type: string_value
      regex: '\btime\(\)'
composite_rules:
  # NOTE: Go runtime uses RDTSC and time functions legitimately for scheduling
  # and performance. Downgraded to baseline to avoid false positives.
  - id: primitive
    desc: "Hardware timing primitive (potential anti-analysis)"
    crit: notable
    conf: 0.4
    all:
      - id: rdtsc
    any:
      - id: micro-behaviors/os/time/query::clock_gettime
      - id: micro-behaviors/os/time/query::gettimeofday
      - id: time-func
