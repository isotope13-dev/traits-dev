defaults:
  platforms: [macos]
  for: [macho]
  attack: T1497.003
  mbc: B0003.005
composite_rules:
  - id: delayed-fork-execution
    desc: Delayed forked execution pattern
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/time/query::sleep
    any:
      - id: micro-behaviors/process/create/shell::system-fn
    unless:
      - id: metadata/signed/platform::apple
  - id: delayed-ransomware-execution
    desc: Delayed execution with ransomware markers
    crit: suspicious
    conf: 0.95
    all:
      - id: delayed-fork-execution
    any:
      - id: objectives/impact/ransom/encrypt::seven-day-ransom-note
      - id: objectives/impact/ransom/encrypt::time-derived-keying
      - id: objectives/impact/ransom/encrypt::file-overwrite-routine
