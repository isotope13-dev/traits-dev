# Timing and Delay Tactics Detection
# Detects sleep/delay functions used for evasion or rate limiting
# ATT&CK: T1497.003 (Virtualization/Sandbox Evasion: Time Based Evasion)
defaults:
  platforms: [unix, windows, macos]
  attack: "T1497.003"
  mbc: "B0003.005"
  crit: notable
traits:
# sleep/usleep/nanosleep: use micro-behaviors/time/query::sleep-func etc. (canonical)
# clock_gettime/gettimeofday: use micro-behaviors/time/query/legacy (canonical)
composite_rules:
  - id: delay-capability
    desc: "Program can delay execution (sleep/timing)"
    crit: suspicious
    conf: 0.5
    any:
      - id: micro-behaviors/time/query::sleep-func
      - id: micro-behaviors/time/query::usleep-func
      - id: micro-behaviors/time/query::nanosleep-func
  # Timing measurement
  # NOTE: clock_gettime and gettimeofday are extremely common in legitimate software
  # including graphics/video libraries (frame timing), database systems (query timing),
  # profilers, async I/O libraries (event scheduling), and any application that
  # measures performance.
  - id: timing-measurement
    desc: "Measures execution time (timing attacks"
    crit: suspicious
    conf: 0.4
    any:
      - id: micro-behaviors/time/query::clock_gettime
      - id: micro-behaviors/time/query::gettimeofday
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::video-lib-marker
        - id: micro-behaviors/dylib/library::graphics-lib-marker
        - id: micro-behaviors/dylib/library::system-lib-marker
        - id: micro-behaviors/dylib/library::async-io-lib-marker
  # Delay with network = evasion or C2 beaconing
  # NOTE: nanosleep + socket is extremely common in any network program.
  # This pattern alone is NOT suspicious - nearly all network tools use this.
  - id: delay-with-network
    desc: "Network communication with delays (C2"
    crit: suspicious
    conf: 0.5
    all:
      - id: delay-capability
    any:
      - id: micro-behaviors/communications/socket/create::client-comp
      - id: micro-behaviors/communications/socket/create::client-macos
      - id: micro-behaviors/communications/http/download/curl::libcurl-http
    unless:
      # Go programs use usleep/sleep for scheduler yielding and network polling,
      # and socket is universal. This pattern has no evasion signal in Go binaries.
      - id: metadata/lang/compiler/systems::go-version-string
      - id: metadata/lang/compiled::go-runtime-marker
  - id: nt-delay-with-debug-check
    desc: Native delay with anti-debug check
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: micro-behaviors/time/timing/delay::nt-delay-execution
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/api-resolution/hash-based::peb-fs-access
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
  # Timing measurement + delay = sandbox evasion
  # NOTE: clock_gettime + nanosleep is extremely common in legitimate software.
  # This pattern alone is NOT suspicious - nearly all async I/O uses this.
  # Only suspicious when combined with actual anti-analysis indicators.
  - id: timing-evasion
    desc: Timing measurement with delay APIs
    crit: notable
    conf: 0.5
    all:
      - id: timing-measurement
      - id: delay-capability
    unless:
      # Go runtime uses clock_gettime + usleep for goroutine scheduling and timers.
      # This pattern is a Go runtime artifact, not sandbox evasion.
      - id: metadata/lang/compiler/systems::go-version-string
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::go-buildinfo-elf
      - id: metadata/signed/platform::apple
      - id: metadata/file::system-shell-basename
