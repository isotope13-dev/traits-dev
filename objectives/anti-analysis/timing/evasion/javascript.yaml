# JavaScript Timing Evasion
# Detects use of Date or performance.now combined with delays to detect analysis.
# MBC: B0001.032 (Timing/Delay Check)
# ATT&CK: T1497.001 (Virtualization/Sandbox Evasion: System Checks)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  mbc: "B0001.032"
  attack: "T1497.001"
traits:
  - id: js-date-loop
    desc: Multiple Date object creations in proximity
    crit: component
    conf: 0.5
    count_min: 3
    if:
      type: ast
      language: javascript
      # Matches: new Date()
      query: >
        (new_expression
          constructor: (identifier) @name
          (#eq? @name "Date")
        )

  - id: js-date-diff
    desc: Date difference measurement
    crit: component
    conf: 0.6
    if:
      type: ast
      language: javascript
      # Matches: t2 - t1
      query: >
        (binary_expression
          left: (identifier)
          operator: "-"
          right: (identifier)
        )
  - id: js-utc-ms-sleep-jitter
    desc: UTC millisecond jitter sleep check
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'getUTCMilliseconds[\s\S]{0,72}Sleep[\s\S]{0,96}getUTCMilliseconds'

composite_rules:
  - id: js-wscript-sleep-timing
    desc: JScript WScript.Sleep timing-based evasion
    crit: suspicious
    conf: 0.8
    all:
      - id: objectives/execution/interpreter/script/wsh::wscript-sleep
    any:
      - id: js-date-loop
      - id: js-utc-ms-sleep-jitter
  - id: js-obfuscated-timing-evasion
    desc: Obfuscated JScript timing-based analysis evasion
    crit: suspicious
    conf: 0.8
    size_max: 50000
    needs: 2
    any:
      - id: objectives/execution/interpreter/script/wsh::timing-fragment-tiny-exact
      - id: objectives/execution/interpreter/script/wsh::wscript-shell-fragment-tiny-exact
      - id: objectives/execution/interpreter/script/wsh::readystate-fragment-tiny-exact
  - id: js-timing-evasion
    desc: JavaScript timing-based analysis evasion
    crit: suspicious
    conf: 0.8
    all:
      - id: js-date-loop
      - id: js-date-diff
  - id: js-jscript-sleep-jitter-evasion
    desc: JScript conditional sleep jitter evasion
    crit: suspicious
    conf: 0.95
    all:
      - id: js-utc-ms-sleep-jitter
      - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-variable
