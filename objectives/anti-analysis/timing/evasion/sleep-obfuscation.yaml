defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1497.003
traits:
- id: protect-cycling-rw-rx-multi
  desc: Multiple W^X protection cycles (RW->RX)
  crit: suspicious
  conf: 0.92
  arch: [x86-64]
  size_max: 5242880
  count_min: 3
  if:
    type: hex
    section: .text
    pattern: 41 (B8|B9) 04 00 00 00 [0-256] 41 (B8|B9) 20 00 00 00
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework::dotnet-assembly
  - id: metadata/package/tooling::official-7zip-component
  - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
  - id: well-known/lib/sdl::sdl-runtime-component
  - id: well-known/lib/llvm::llvm-library
composite_rules:
- id: sleep-obfuscation-loader
  desc: Shellcode loader with sleep-obfuscation memory cycling
  crit: hostile
  conf: 0.95
  arch: [x86-64]
  size_max: 5242880
  all:
  - id: protect-cycling-rw-rx-multi
  any:
  - id: objectives/evasion/process/injection/shellcode::concealed-shellcode-loader-x64
  - id: objectives/anti-static/obfuscation/imports::pe-walk-hash-resolver-x64
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework::dotnet-assembly
  - id: well-known/lib/llvm::llvm-library
