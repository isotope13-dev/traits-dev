defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1497.003
traits:
- id: protect-cycling-rw-rx-multi
  desc: "Many W^X protection constant cycles (RW->RX)"
  crit: component
  conf: 0.82
  arch: [x86-64]
  size_max: 5242880
  count_min: 3
  if:
    type: hex
    section: .text
    pattern: 41 (B8|B9) 04 00 00 00 [0-256] 41 (B8|B9) 20 00 00 00
  unless:
  - id: objectives/anti-analysis/timing/evasion/
- id: source-sleep-obf-technique-config
  desc: "src config selects sleep obfuscation technique"
  crit: suspicious
  conf: 0.96
  for: [c, cpp]
  if:
    type: text
    word: implant.sleep-obf.technique
- id: source-sleep-obf-start-addr-config
  desc: "src config sets sleep obf start address"
  crit: suspicious
  conf: 0.96
  for: [c, cpp]
  if:
    type: text
    word: implant.sleep-obf.start-addr
- id: source-sleep-obf-menu-foliage
  desc: Source exposes Foliage sleep option
  crit: component
  conf: 0.95
  for: [c, cpp]
  if:
    type: text
    word: Foliage
- id: source-sleep-obf-menu-ekko
  desc: Source exposes Ekko sleep option
  crit: component
  conf: 0.95
  for: [c, cpp]
  if:
    type: text
    word: Ekko
- id: source-sleep-obf-menu-wfsoe
  desc: Source exposes unobfuscated sleep option
  crit: component
  conf: 0.95
  for: [c, cpp]
  if:
    type: text
    word: WaitForSingleObjectEx
- id: source-thread-start-spoof-config
  desc: Source config spoofs thread start address
  crit: suspicious
  conf: 0.95
  attack: T1055
  for: [c, cpp]
  if:
    type: text
    word: inject.spoofaddr
composite_rules:
- id: protect-cycling-rw-rx-benign-context
  desc: Benign context for repeated RW/RX protection cycles
  crit: component
  conf: 0.95
  any:
  - id: metadata/binary/framework::dotnet-assembly
  - id: metadata/package/tooling::tool-identity-7zip
  - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
  - id: well-known/lib/sdl::sdl-runtime-component
  - id: metadata/lang/compiler/native::libllvm
  - id: metadata/signed/platform::microsoft
  - id: well-known/tool/reverse-engineering/windows-debugger::gdbserver-debugger-server
- id: sleep-obfuscation-loader
  desc: Shellcode loader with sleep-obfuscation memory cycling
  crit: hostile
  conf: 0.95
  arch: [x86-64]
  size_max: 5242880
  all:
  - id: protect-cycling-rw-rx-multi
  any:
  - id: objectives/evasion/process/injection/shellcode::concealed-shellcode-loader-x64
  - id: objectives/anti-static/obfuscation/imports::pe-walk-hash-resolver-x64
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework/
  - id: metadata/lang/compiler/native::libllvm
- id: source-sleep-obf-menu-suite
  desc: Source exposes multiple sleep obfuscation menu options
  crit: suspicious
  conf: 0.96
  for: [c, cpp]
  needs: 2
  any:
  - id: source-sleep-obf-menu-foliage
  - id: source-sleep-obf-menu-ekko
  - id: source-sleep-obf-menu-wfsoe
- id: source-sleep-obfuscation-config
  desc: Source code configures sleep obfuscation techniques
  crit: suspicious
  conf: 0.97
  for: [c, cpp]
  all:
  - id: source-sleep-obf-technique-config
  - id: source-sleep-obf-start-addr-config
  any:
  - id: source-sleep-obf-menu-suite
  - id: source-thread-start-spoof-config
