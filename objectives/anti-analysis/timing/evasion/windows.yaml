# Timing-Based Anti-Analysis - Windows
# ATT&CK: T1497.003 (Virtualization/Sandbox Evasion: Time Based Evasion)
# MBC: B0003.003 (Time Based Evasion)
#
# Composite rules that combine timing APIs with other anti-analysis
# indicators to detect evasion intent.
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1497.003"
  mbc: "B0003.003"
composite_rules:
- id: high-res-timing
  desc: High-resolution timing API usage
  crit: suspicious
  conf: 0.8
  any:
  - id: micro-behaviors/time/timing/delay::query-performance-counter
  - id: objectives/anti-analysis/timing/evasion::rdtsc
  - id: micro-behaviors/time/timing/check::get-system-time-precise
- id: timing-delta-check
  desc: Multiple timing calls (delta measurement)
  crit: component
  conf: 0.85
  needs: 2
  any:
  - id: micro-behaviors/time/query::get-tick-count
  - id: micro-behaviors/time/timing/delay::query-performance-counter
  - id: micro-behaviors/time/timing/check::timegettime
  - id: objectives/anti-analysis/timing/evasion::rdtsc
    # GetTickCount + QueryPerformanceCounter is standard CRT; only notable in composites
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: metadata/file::is-windows-named
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/metrics::many-imports
    - id: metadata/signed/platform::microsoft
- id: timing-anti-debug
  desc: Timing-based anti-debugging pattern
  crit: suspicious
  conf: 0.9
  all:
  - id: timing-delta-check
  any:
  - id: objectives/anti-analysis/debugger-detect/check::debugger-api
  downgrade:
    any:
    - id: metadata/binary/vendor::microsoft-corp-marker
    - id: metadata/lang/compiler/
    - id: metadata/signed/platform/
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/debug::pdb-absolute-path
- id: timing-check-minimal-stub
  desc: Timing APIs in minimal binary (sandbox evasion)
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/time/query::get-tick-count
  - id: micro-behaviors/time/timing/delay::sleep-dup
  - id: metadata/binary/metrics::no-functions
  unless:
  - id: metadata/binary/metrics::large-binary-500k
  - id: metadata/binary/metrics::many-imports
- id: timing-sandbox-evasion
  desc: Timing-based sandbox evasion
  crit: suspicious
  conf: 0.85
  all:
  - id: timing-delta-check
  any:
  - id: objectives/anti-analysis/vm-detect/
  - id: objectives/anti-analysis/sandbox-detect/inline/
  downgrade:
    any:
    - id: metadata/binary/vendor::microsoft-corp-marker
    - id: metadata/lang/compiler/
    - id: metadata/signed/platform/
    - id: metadata/binary/
- id: ui-timer-keypoll-gate
  desc: Timer-gated key polling anti-analysis
  crit: suspicious
  conf: 0.91
  all:
  - id: micro-behaviors/hardware/input/keyboard::get-key-state
  - id: micro-behaviors/ui/window/manage::set-timer
  - id: micro-behaviors/ui/window/manage::kill-timer
  any:
  - id: micro-behaviors/os/module/load::get-proc-address-import
  - id: objectives/anti-static/obfuscation/payload::unusual-alignment-pe
  - id: objectives/anti-static/obfuscation/binary-metrics::wx-sections
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft-corporation
    - id: metadata/signed/platform::microsoft-code-signing-pca-2011
    - id: metadata/binary/vendor::microsoft-corp-marker
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/binary/installer/
    - id: metadata/binary/metrics::many-imports
  unless:
  - id: objectives/collection/keylog/capture::p-user-proxy-dll
- id: waitable-timer-rich-microsoft-fp
  desc: Microsoft-rich waitable timer context
  crit: component
  conf: 0.8
  all:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/metrics::many-imports
  - id: metadata/binary/metrics::many-exports
- id: waitable-timer-export-heavy-microsoft
  desc: Microsoft export-heavy waitable timer context
  crit: component
  conf: 0.78
  all:
  - id: metadata/binary/vendor::microsoft-corp-marker
  - id: metadata/binary/metrics::many-exports
- id: waitable-timer-sleep-mask
  desc: Waitable timer sleep-mask import cluster
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/time/schedule/waitable::create-waitable-timer-ex
  - id: micro-behaviors/time/schedule/waitable::set-waitable-timer
  - id: micro-behaviors/process/create/spawn::wait-for-single-object
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  any:
  - id: micro-behaviors/time/timing/delay::sleep-dup
  - id: micro-behaviors/time/timing/delay::query-performance-counter
  - id: micro-behaviors/time/timing/check::query-performance-frequency
  unless:
  - id: waitable-timer-rich-microsoft-fp
  - id: waitable-timer-export-heavy-microsoft
  downgrade:
    any:
    - id: metadata/binary/metrics::many-imports
    - id: metadata/lang/compiler/systems::go-binary-comp
    - id: metadata/lang/compiled::go-runtime-marker
- id: timing-evasion-with-payload
  desc: Sandbox timing evasion combined with encrypted payload
  crit: suspicious
  conf: 0.9
  all:
  - id: timing-check-minimal-stub
  any:
  - id: objectives/anti-static/obfuscation/binary-metrics::binary-encrypted-overlay
  - id: objectives/anti-static/obfuscation/payload/self-read::pe-overlay-self-extractor
  downgrade:
    any:
    - id: metadata/binary/vendor::microsoft-corp-marker
    - id: metadata/signed/platform::microsoft
    - id: objectives/anti-static/obfuscation/binary-metrics::7zsfx-config-marker
    - id: metadata/binary/installer/script::inno-setup
    - id: metadata/binary/installer/script::nsis
- id: timing-evasion-large-resource-debugger
  desc: Timing evasion with debugger detection and large resource
  crit: suspicious
  conf: 0.88
  all:
  - id: timing-delta-check
  - id: metadata/binary/resource::resource-heavy-rsrc
  any:
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/binary/vendor::microsoft-corp-marker
- id: locale-timing-debug-fingerprint
  desc: Locale and timing anti-analysis fingerprint
  crit: suspicious
  conf: 0.93
  size_max: 400000
  all:
  - id: objectives/anti-analysis/debugger-detect/check::debugger-api
  - id: micro-behaviors/time/query::get-tick-count
  - id: micro-behaviors/time/query::get-system-time-as-filetime
  - id: micro-behaviors/os/sysinfo/platform::locale-environment-fingerprint
  - id: micro-behaviors/time/query::get-timezone-information
  any:
  - id: objectives/anti-analysis/timing/evasion::high-res-timing
  - id: objectives/anti-analysis/timing/evasion::timing-delta-check
  - id: micro-behaviors/time/timing/delay::sleep-dup
  unless:
  - id: metadata/signed/platform::microsoft
  downgrade:
    any:
    - id: metadata/binary/vendor::microsoft-corp-marker
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/binary/metrics::many-exports
    - id: metadata/binary/metrics::many-imports
