defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: js-subtraction-func-ast
    desc: Function returning simple subtraction (AST)
    crit: component
    if:
      type: ast
      language: javascript
      query: "(function_declaration\n  (statement_block\n    (return_statement\n      (binary_expression\n        operator: \"-\"\n      )\n    )\n  )\n)\n"
  - id: js-subtraction-func-regex
    desc: Function returning simple subtraction (Regex)
    crit: component
    if:
      type: string_literal
      regex: return\s+[a-zA-Z0-9_]+\s*-\s*[a-zA-Z0-9_]+\s*;
  - id: js-triple-date-raw
    desc: 3+ Date.now()/new Date() calls in file (raw)
    crit: component
    conf: 0.4
    count_min: 3
    if:
      type: text
      regex: (Date\s*\.\s*now\s*\(|new\s+Date\s*\()
  - id: js-triple-date-ast
    desc: 3+ new Date() expressions in file (AST)
    crit: component
    conf: 0.4
    count_min: 3
    if:
      type: ast
      language: javascript
      query: "(new_expression\n  constructor: (identifier) @id (#eq? @id \"Date\")\n)\n"
  - id: js-multiple-sleep-raw
    desc: Multiple Sleep calls (anti-emulation) - Raw
    crit: suspicious
    count_min: 2
    if:
      type: text
      regex: \.Sleep\s*\(
  - id: js-multiple-sleep-ast
    desc: Multiple Sleep calls (anti-emulation) - AST
    crit: suspicious
    count_min: 2
    if:
      type: ast
      language: javascript
      query: "(call_expression\n  function: (member_expression\n    property: (property_identifier) @prop (#eq? @prop \"Sleep\")\n  )\n)\n"
composite_rules:
  - id: js-triple-date
    desc: Triple Date/Time retrieval pattern
    crit: component
    any:
      - id: js-triple-date-raw
      - id: js-triple-date-ast
  - id: js-date-diff-jitter-check
    desc: JScript timing jitter check (diff1 != diff2)
    crit: suspicious
    near_bytes: 500
    all:
      - id: js-triple-date
    any:
      - id: js-subtraction-func-ast
      - id: js-subtraction-func-regex
      - id: js-multiple-sleep-raw
      - id: js-multiple-sleep-ast
