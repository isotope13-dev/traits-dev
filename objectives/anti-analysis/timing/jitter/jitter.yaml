# VM Detection Timing Check
# Detects specific jitter check logic used by malware (Nemucod etc.)
defaults:
  platforms: [windows, unix]
  crit: suspicious
  conf: 0.95
  for: [javascript]
traits:
- id: js-date-diff-jitter-pattern--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: performance.now
- id: js-date-diff-jitter-pattern--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: Date.now
- id: js-date-diff-jitter-pattern--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: getTime(
- id: js-date-diff-jitter-pattern--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: new Date
composite_rules:
- id: js-date-diff-jitter-pattern
  desc: Checks for timing jitter using Date differences
  crit: baseline
  conf: 1.0
  any:
  - id: js-date-diff-jitter-pattern--rx-1
  - id: js-date-diff-jitter-pattern--rx-2
  - id: js-date-diff-jitter-pattern--rx-3
  - id: js-date-diff-jitter-pattern--rx-4
  needs: 1
