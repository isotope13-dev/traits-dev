# VM Detection Timing Check
# Detects specific jitter check logic used by malware (Nemucod etc.)
defaults:
  platforms: [windows, unix]
  crit: suspicious
  conf: 0.95
  for: [javascript]
traits:
  - id: js-date-diff-jitter-pattern
    desc: "Checks for timing jitter using Date differences"
    if:
      type: text
      # Require timing-source context; the comparison shape alone is common
      # in benign state-change checks.
      regex: '(?:Date\.now|new Date|getTime\(|performance\.now)[\s\S]{0,240}\(\s*[\w$]+\s*!=\s*[\w$]+\s*\)\s*\|\|\s*\(\s*[\w$]+\s*!=\s*[\w$]+\s*\)|\(\s*[\w$]+\s*!=\s*[\w$]+\s*\)\s*\|\|\s*\(\s*[\w$]+\s*!=\s*[\w$]+\s*\)[\s\S]{0,240}(?:Date\.now|new Date|getTime\(|performance\.now)'
