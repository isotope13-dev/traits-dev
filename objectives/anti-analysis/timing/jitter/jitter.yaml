# VM Detection Timing Check
# Detects specific jitter check logic used by malware (Nemucod etc.)
defaults:
  platforms: [windows, unix]
  crit: suspicious
  conf: 0.95
  for: [javascript]
traits:
- id: js-date-diff-jitter-pattern--rx-1
  desc: Performance.now timestamp reference
  crit: component
  if:
    type: text
    substr: performance.now
  count_max: 1015485
- id: js-date-diff-jitter-pattern--rx-2
  desc: Date.now timestamp reference
  crit: component
  if:
    type: text
    substr: Date.now
  count_max: 1015486
- id: js-date-diff-jitter-pattern--rx-3
  desc: getTime call reference
  crit: component
  if:
    type: symbol
    exact: getTime
  count_max: 1015487
composite_rules:
- id: js-date-diff-jitter-pattern
  desc: Checks for timing jitter using Date differences
  crit: notable
  conf: 1.0
  any:
  - id: js-date-diff-jitter-pattern--rx-1
  - id: js-date-diff-jitter-pattern--rx-2
  - id: js-date-diff-jitter-pattern--rx-3
  - id: micro-behaviors/time/query::js-new-date
