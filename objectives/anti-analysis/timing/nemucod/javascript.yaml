defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: nemucod-jitter-check
    desc: Detects Nemucod-specific timing jitter check for VM evasion
    crit: hostile
    for: [javascript]
    all:
      - id: micro-behaviors/process/interpreter/jscript::is-jscript
      - id: objectives/anti-analysis/timing/jitter::js-date-diff-jitter-check
    any:
      - id: objectives/anti-static/obfuscation/string/conceal::save-to-file-fragment-oFil
      - id: objectives/anti-static/obfuscation/source/syntax::js-fragmented-property-access
