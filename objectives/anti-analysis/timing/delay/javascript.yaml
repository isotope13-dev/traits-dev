defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript, html]
traits:
  - id: nested-settimeout-staging
    desc: Nested setTimeout staging before user interaction
    crit: suspicious
    conf: 0.9
    size_max: 262144
    count_min: 6
    if:
      id: micro-behaviors/time/schedule/interval::setTimeout
    unless:
      - id: metadata/library/structure::js-large-module-bundle
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
  - id: delayed-checkbox-reveal
    desc: Delayed checkbox or loader reveal
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: 'loader-ring[^\n]{0,120}setTimeout|checkbox[^\n]{0,120}setTimeout'
composite_rules:
  - id: staged-ui-delay-chain
    desc: Delayed multi-stage UI reveal
    crit: suspicious
    conf: 0.94
    all:
      - id: nested-settimeout-staging
      - id: delayed-checkbox-reveal
