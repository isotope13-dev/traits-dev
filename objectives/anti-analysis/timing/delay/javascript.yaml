defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, html]
traits:
  - id: nested-settimeout-staging
    desc: "Nested setTimeout staging pre user input"
    crit: notable
    conf: 0.9
    size_max: 262144
    count_min: 6
    if:
      id: micro-behaviors/time/schedule/interval::setTimeout
    unless:
      - id: objectives/anti-analysis/timing/delay/
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/code-metrics/structure/
  - id: delayed-checkbox-reveal
    desc: Delayed checkbox or loader UI transition
    crit: notable
    conf: 0.88
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: objectives/anti-static/obfuscation/code-metrics/structure/
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
      - id: objectives/anti-static/obfuscation/code-metrics/structure/
    if:
      type: text
      regex: 'loader-ring[^\n]{0,120}setTimeout|checkbox[^\n]{0,120}setTimeout'
  - id: hotwired-turbo-marker
    desc: Hotwired Turbo JavaScript marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "@hotwired/turbo"
composite_rules:
  - id: nested-settimeout-benign-context
    desc: Benign nested setTimeout context
    crit: notable
    conf: 0.88
    any:
      - id: micro-behaviors/process/create/spawn::node-eval-signal-test-fixture
      - id: metadata/lang/javascript-features::sourcemap-sources-content
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-large-minified-bundle
      - id: metadata/library/structure::js-any-bundle-output
      - id: metadata/build/bundler::has-sourcemap
      - id: metadata/package/testing/presence/scripted::dot-spec-filename
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/runtime::bootstrap-transition-plugin
      - id: hotwired-turbo-marker

  - id: staged-ui-delay-chain
    desc: Delayed multi-stage UI reveal
    crit: suspicious
    conf: 0.94
    all:
      - id: nested-settimeout-staging
      - id: delayed-checkbox-reveal
    unless:
      - id: well-known/lib/web-ui-vendors/
      - id: well-known/app/matomo/
