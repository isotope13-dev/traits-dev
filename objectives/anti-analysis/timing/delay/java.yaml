defaults:
  platforms: [unix, windows]
  for: [java]
  attack: T1497.003
  mbc: B0007
traits:
  - id: java-thirty-second-sleep
    desc: Java thirty second execution delay
    crit: component
    conf: 0.9
    if:
      type: text
      exact: Thread.sleep(30000)
  - id: java-sixty-second-sleep
    desc: Java sixty second execution delay
    crit: component
    conf: 0.92
    if:
      type: text
      exact: Thread.sleep(60000)
  - id: java-nanotime-loop-check
    desc: Java nanoTime loop check
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'System\.nanoTime\(\)[\s\S]{0,160}50000000[\s\S]{0,160}seconds > 10\.0'
  - id: java-random-stall-delay
    desc: Java random stall delay
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'stallExecution\(5000 \+ \(int\)\(Math\.random\(\) \* 10000\)\)'
composite_rules:
  - id: java-execution-delay
    desc: Java explicit execution delay
    crit: component
    conf: 0.9
    any:
      - id: java-thirty-second-sleep
      - id: java-sixty-second-sleep
  - id: java-analysis-triggered-delay
    desc: Java anti-analysis execution delay
    crit: suspicious
    conf: 0.94
    all:
      - id: java-execution-delay
    any:
      - id: objectives/anti-analysis/vm-detect/script::java-vm-emulator-detect
      - id: objectives/anti-analysis/debugger-detect/check::java-proc-tracerpid-debugger-check
  - id: java-linux-timing-evasion
    desc: Java Linux timing evasion
    crit: hostile
    conf: 0.98
    platforms: [linux, unix]
    all:
      - id: java-nanotime-loop-check
      - id: java-random-stall-delay
    any:
      - id: java-execution-delay
      - id: objectives/anti-analysis/debugger-detect/check::java-tracerpid-check
