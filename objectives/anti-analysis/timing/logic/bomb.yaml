defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
composite_rules:
  - id: self-termination
    desc: 'Self-destruct: terminates own process'
    crit: notable
    mbc: E1562
    attack: T1562
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/spawn/
      - id: objectives/evasion/self-delete/file/
    any:
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: micro-behaviors/process/terminate/kill::process-kill
      - id: objectives/evasion/self-delete/process::windows-ping-delete-command
      - id: objectives/evasion/self-delete/process::dotnet-melt-delete-workflow
    downgrade:
      any:
        - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
        - id: well-known/app/internet-explorer::internet-explorer-frame-component
        - id: well-known/lib/mozilla-nspr::nspr-library
        - id: micro-behaviors/os/service/config::printer-setup-helper
        - id: well-known/app/drivers/
        - id: well-known/app/belkin-local-backup::belkin-local-backup
        - id: well-known/app/mcafee-epolicy::mcafee-epolicy-migration
  - id: logic-bomb-self-destruct
    desc: 'Logic bomb: time-triggered self-destruct with'
    crit: suspicious
    mbc: B0003
    attack: T1480.001
    conf: 0.95
    all:
      - id: micro-behaviors/time/schedule/datetime::hardcoded-datetime
      - id: micro-behaviors/process/create/spawn/
      - id: micro-behaviors/process/terminate/
  - id: logic-bomb-probabilistic-self-destruct
    desc: 'Logic bomb: time-triggered probabilistic self-destruct'
    crit: suspicious
    mbc: B0003
    attack: T1480.001
    conf: 0.95
    all:
      - id: micro-behaviors/time/schedule/datetime::hardcoded-datetime
      - id: micro-behaviors/os/random/prng/stdlib::random-instantiation
      - id: micro-behaviors/process/create/spawn/
      - id: micro-behaviors/process/terminate/
  - id: concentrated-logic-bomb
    desc: 'Concentrated logic bomb: all malicious'
    crit: suspicious
    mbc: B0003
    attack: T1480.001
    conf: 0.98
    near_lines: 30
    all:
      - id: micro-behaviors/time/schedule/datetime::hardcoded-datetime
      - id: micro-behaviors/process/terminate/
