# Time-Bomb / Dormant Code Detection
# ATT&CK: T1497.003 (Time Based Evasion)
# Detects code that activates after a specific date or condition
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: suspicious
  attack: "T1497.003"
traits:
  # ============================================================
  # PYTHON: Time-based triggers
  # ============================================================
  - id: py-time-epoch-compare
    desc: Python compares time to epoch timestamp
    crit: suspicious
    conf: 0.8
    for: [python]
    if:
      type: raw
      regex: 'time\.time\s*\(\s*\)\s*[<>]\s*1[5-9][0-9]{8}'
  - id: py-datetime-compare
    desc: Python datetime comparison to future date
    crit: suspicious
    conf: 0.75
    for: [python]
    if:
      type: raw
      regex: 'datetime\.(now|today)\s*\(\s*\)\s*[<>]'
  # Atomic: Python time check followed by dangerous functions
  - id: py-time-then-exec
    desc: Python time.time() followed by exec
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: raw
      regex: 'time\.time[\s\S]{0,100}\bexec\s*\('
  - id: py-time-then-eval
    desc: Python time.time() followed by eval
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: raw
      regex: 'time\.time[\s\S]{0,100}eval'
  - id: py-time-then-os-system
    desc: Python time.time() followed by os.system
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: raw
      regex: 'time\.time[\s\S]{0,100}os\.system'
  - id: py-datetime-then-exec
    desc: Python datetime followed by exec/eval
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: raw
      regex: 'datetime\.(now|today)[\s\S]{0,100}(exec|eval)'
  - id: py-datetime-then-subprocess
    desc: Python datetime followed by subprocess
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: raw
      regex: 'datetime\.(now|today)[\s\S]{0,100}subprocess'
  - id: py-time-then-subprocess
    desc: Python time.time() followed by subprocess
    crit: suspicious
    conf: 0.9
    for: [python]
    if:
      type: raw
      regex: 'time\.time[\s\S]{0,100}subprocess'
  - id: py-sleep-then-exec
    desc: Python long sleep before execution
    crit: suspicious
    conf: 0.8
    for: [python]
    if:
      type: raw
      regex: 'time\.sleep\s*\(\s*[0-9]{4,}\s*\)[\s\S]{0,200}(exec|eval|requests|urllib)'
  # ============================================================
  # JAVASCRIPT: Time-based triggers
  # ============================================================
  - id: js-date-now-compare
    desc: JavaScript Date.now() comparison
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: raw
      regex: 'Date\.now\s*\(\s*\)\s*[<>]\s*1[5-9][0-9]{11}'
  - id: js-new-date-compare
    desc: JavaScript new Date() comparison
    crit: suspicious
    conf: 0.75
    for: [javascript, typescript]
    if:
      type: raw
      regex: 'new Date\s*\(\s*["'']?[12][0-9]{3}[-/,][^)]{0,24}\)\s*[<>!=]=?'
  - id: js-settimeout-long
    desc: JavaScript very long setTimeout
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: raw
      regex: 'setTimeout\s*\(.{1,50},\s*[0-9]{7,}'
  # Atomic: JavaScript time check followed by dangerous functions
  - id: js-datenow-then-eval
    desc: JavaScript Date.now() followed by eval
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    size_max: 102400
    if:
      type: raw
      regex: 'Date\.now\(\)[^\n]{0,80}[<>!=]=?[^\n]{0,120}eval\s*\('
  - id: js-datenow-then-function
    desc: JavaScript Date.now() followed by Function constructor
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: raw
      regex: 'Date\.now\(\)[^\n]{0,80}[<>!=]=?[^\n]{0,80}(new\s+)?Function\s*\('
  - id: js-datenow-then-fetch
    desc: JavaScript Date.now() followed by fetch
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: raw
      regex: 'Date\.now[\s\S]{0,150}fetch'
  - id: js-newdate-then-eval
    desc: JavaScript new Date() followed by eval
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: raw
      regex: 'new Date[^\n]{0,80}[<>!=]=?[^\n]{0,120}eval\s*\('
  - id: js-newdate-then-function
    desc: JavaScript new Date() followed by Function constructor
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    size_max: 300000
    if:
      type: raw
      regex: 'new Date[^\n]{0,80}[<>!=]=?[^\n]{0,80}(new\s+)?Function\s*\('
  - id: js-newdate-then-fetch
    desc: JavaScript new Date() followed by fetch
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: raw
      regex: 'new Date[^\n]{0,80}[<>!=]=?[^\n]{0,120}fetch\s*\('
  # ============================================================
  # GO: Time-based triggers
  # ============================================================
  - id: go-time-after-check
    desc: Go time.After or time comparison
    crit: suspicious
    conf: 0.75
    for: [go]
    if:
      type: raw
      regex: 'time\.(Now|After|Since)[\s\S]{0,100}exec\.Command'
  - id: go-time-unix-compare
    desc: Go Unix timestamp comparison
    crit: suspicious
    conf: 0.8
    for: [go]
    if:
      type: raw
      regex: 'time\.Now\(\)\.Unix\(\)\s*[<>]\s*1[5-9][0-9]{8}'
  # ============================================================
  # SHELL: Time-based triggers
  # ============================================================
  - id: shell-date-compare
    desc: Shell date comparison
    crit: suspicious
    conf: 0.75
    for: [shell]
    if:
      type: raw
      regex: '\$\(date\s+\+%s\)\s*-[gl]t\s*1[5-9][0-9]{8}'
  - id: shell-sleep-exec
    desc: Shell long sleep before command
    crit: suspicious
    conf: 0.8
    for: [shell]
    if:
      type: raw
      regex: 'sleep\s+[0-9]{4,}\s*[;&]\s*(curl|wget|sh|shell)'
  # Atomic: CI environment detection
  - id: ci-env-github-actions
    # ============================================================
    # ENVIRONMENT-BASED TRIGGERS
    # ============================================================

    desc: GitHub Actions environment check
    crit: suspicious
    conf: 0.85
    for: [python, javascript, shell, go, ruby]
    if:
      type: raw
      regex: 'GITHUB_ACTIONS\s*[=!]'
  - id: ci-env-travis-jenkins
    desc: Travis or Jenkins environment check
    crit: suspicious
    conf: 0.85
    for: [python, javascript, shell, go, ruby]
    if:
      type: raw
      regex: '(TRAVIS|JENKINS)\s*[=!]'
  - id: ci-env-gitlab
    desc: GitLab CI environment check
    crit: suspicious
    conf: 0.85
    for: [python, javascript, shell, go, ruby]
    if:
      type: raw
      regex: 'GITLAB_CI\s*[=!]'
  # Atomic: CI environment followed by exfil methods (decomposed by CI type)
  - id: ci-var-then-curl
    desc: CI variable followed by curl
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: '(\$CI\b|\bCI\s*[=!]=)[\s\S]{0,200}curl'
  - id: ci-var-then-wget
    desc: CI variable followed by wget
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: '(\$CI\b|\bCI\s*[=!]=)[\s\S]{0,200}wget'
  - id: github-actions-then-curl
    desc: GITHUB_ACTIONS followed by curl
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: 'GITHUB_ACTIONS[\s\S]{0,200}curl'
  - id: github-actions-then-wget
    desc: GITHUB_ACTIONS followed by wget
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: 'GITHUB_ACTIONS[\s\S]{0,200}wget'
  - id: travis-then-curl
    desc: TRAVIS followed by curl
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: 'TRAVIS[\s\S]{0,200}curl'
  - id: travis-then-wget
    desc: TRAVIS followed by wget
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: 'TRAVIS[\s\S]{0,200}wget'
  - id: ci-exfil-requests
    desc: CI check followed by requests
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: '(\$CI\b|\bCI\s*[=!]=)[\s\S]{0,200}requests'
  - id: github-actions-then-requests
    desc: GITHUB_ACTIONS followed by requests
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: 'GITHUB_ACTIONS[\s\S]{0,200}requests'
  - id: travis-then-requests
    desc: TRAVIS followed by requests
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: 'TRAVIS[\s\S]{0,200}requests'
  - id: ci-var-then-fetch
    desc: CI variable followed by fetch
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: '(\$CI\b|\bCI\s*[=!]=)[\s\S]{0,200}fetch'
  - id: ci-var-then-http
    desc: CI variable followed by http
    crit: suspicious
    conf: 0.95
    for: [python, javascript]
    if:
      type: raw
      regex: '(\$CI\b|\bCI\s*[=!]=)[\s\S]{0,200}http'
  - id: github-actions-then-fetch
    desc: GITHUB_ACTIONS followed by fetch
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: 'GITHUB_ACTIONS[\s\S]{0,200}fetch'
  - id: github-actions-then-http
    desc: GITHUB_ACTIONS followed by http
    crit: suspicious
    conf: 0.95
    for: [python, javascript]
    if:
      type: raw
      regex: 'GITHUB_ACTIONS[\s\S]{0,200}http'
  - id: travis-then-fetch
    desc: TRAVIS followed by fetch
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell]
    if:
      type: raw
      regex: 'TRAVIS[\s\S]{0,200}fetch'
  - id: travis-then-http
    desc: TRAVIS followed by http
    crit: suspicious
    conf: 0.95
    for: [python, javascript]
    if:
      type: raw
      regex: 'TRAVIS[\s\S]{0,200}http'
composite_rules:
  # === Python Date Conditional Exec (decomposed) ===
  - id: py-date-conditional-exec
    desc: Python exec/eval after date check
    crit: suspicious
    conf: 0.9
    any:
      - id: py-time-then-exec
      - id: py-time-then-eval
      - id: py-time-then-os-system
      - id: py-time-then-subprocess
      - id: py-datetime-then-exec
      - id: py-datetime-then-subprocess
  # === CI Environment Trigger (decomposed) ===
  - id: ci-env-trigger
    desc: Code triggered by CI environment
    crit: suspicious
    conf: 0.85
    any:
      - id: ci-env-github-actions
      - id: ci-env-travis-jenkins
      - id: ci-env-gitlab
  # === CI Conditional Exfil (decomposed) ===
  - id: ci-conditional-exfil
    desc: Exfiltration in CI environment only
    crit: suspicious
    conf: 0.95
    any:
      - id: ci-var-then-curl
      - id: ci-var-then-wget
      - id: github-actions-then-curl
      - id: github-actions-then-wget
      - id: travis-then-curl
      - id: travis-then-wget
      - id: ci-exfil-requests
      - id: github-actions-then-requests
      - id: travis-then-requests
      - id: ci-var-then-fetch
      - id: ci-var-then-http
      - id: github-actions-then-fetch
      - id: github-actions-then-http
      - id: travis-then-fetch
      - id: travis-then-http
  # === Python Time Bomb ===
  - id: python-time-bomb
    desc: Python time-based dormant code
    crit: hostile
    conf: 0.9
    any:
      - id: py-date-conditional-exec
      - id: py-sleep-then-exec
    all:
      - id: py-time-epoch-compare
  # === JavaScript Time Conditional Eval (decomposed) ===
  - id: js-time-conditional-eval
    desc: JavaScript eval/Function/fetch after time check
    crit: suspicious
    conf: 0.9
    any:
      - id: js-datenow-then-eval
      - id: js-datenow-then-function
      - id: js-datenow-then-fetch
      - id: js-newdate-then-eval
      - id: js-newdate-then-function
      - id: js-newdate-then-fetch
  # === JavaScript Time Bomb ===
  - id: javascript-time-bomb
    desc: JavaScript time-based dormant code
    crit: hostile
    conf: 0.9
    any:
      - id: js-time-conditional-eval
      - id: js-settimeout-long
  # === CI-Triggered Malware ===
  - id: ci-triggered-malware
    desc: Code activates only in CI environment
    crit: hostile
    conf: 0.95
    mbc: "B0007"
    all:
      - id: ci-env-trigger
      - id: ci-conditional-exfil
  # === Any Time Bomb ===
  - id: time-bomb-detected
    desc: Time-based dormant code detected
    crit: hostile
    conf: 0.9
    any:
      - id: python-time-bomb
      - id: javascript-time-bomb
      - id: go-time-unix-compare
      - id: shell-sleep-exec
