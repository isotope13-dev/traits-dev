# Time-Bomb / Dormant Code Detection
# ATT&CK: T1497.003 (Time Based Evasion)
# Detects code that activates after a specific date or condition
defaults:
  platforms: [windows, unix]
  crit: suspicious
  attack: "T1497.003"
traits:
  # ============================================================
  # PYTHON: Time-based triggers
  # ============================================================
- id: py-time-epoch-compare
  desc: Python compares time to epoch timestamp
  crit: suspicious
  conf: 0.8
  for: [python]
  if:
    type: text
    regex: 'time\.time\s*\(\s*\)\s*[<>]=?\s*1[5-9][0-9]{8}'
- id: py-datetime-compare--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  for: [python]
  if:
    type: text
    regex: 'datetime\.(datetime\.)?(now|today)\s*\(\s*\)\s*(<=|>=)\s*[^>\n]{1,120}'
  count_max: 1015806
- id: py-datetime-compare--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  for: [python]
  if:
    type: text
    regex: 'datetime\.(datetime\.)?(now|today)\s*\(\s*\)\s*(==|!=)\s*[^>\n]{1,120}'
  count_max: 1015807
- id: py-datetime-compare--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.75
  for: [python]
  if:
    type: text
    regex: 'datetime\.(datetime\.)?(now|today)\s*\(\s*\)\s*(<|>)\s*[^>\n]{1,120}'
  count_max: 1015808
- id: py-long-sleep
  desc: Python long sleep call
  crit: component
  conf: 0.8
  for: [python]
  if:
    type: text
    regex: 'time\.sleep\s*\(\s*[0-9]{4,}\s*\)'
  # ============================================================
  # JAVASCRIPT: Time-based triggers
  # ============================================================
- id: js-date-now-compare
  desc: JavaScript Date.now() comparison
  crit: suspicious
  conf: 0.8
  for: [javascript, typescript]
  if:
    type: text
    regex: 'Date\.now\s*\(\s*\)\s*[<>]\s*1[5-9][0-9]{11}'
- id: js-new-date-compare
  desc: JavaScript new Date() comparison
  crit: suspicious
  conf: 0.75
  for: [javascript, typescript]
  if:
    type: text
    regex: 'new Date\s*\(\s*["'']?[12][0-9]{3}[-/,][^)]{0,24}\)\s*[<>!=]=?'
- id: js-settimeout-long
  desc: JavaScript very long setTimeout
  crit: suspicious
  conf: 0.8
  for: [javascript, typescript]
  if:
    type: text
    regex: 'setTimeout\s*\(.{1,50},\s*[0-9]{7,}'
  unless:
  - id: metadata/package/testing/presence/scripted::dot-spec-filename
  # Atomic: JavaScript time check followed by dangerous functions
- id: js-datenow-then-eval
  desc: JavaScript Date.now() followed by eval
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  size_max: 102400
  if:
    type: text
    regex: 'Date\.now\(\)[^\n]{0,80}[<>!=]=?[^\n]{0,120}eval\s*\('
- id: js-datenow-then-function
  desc: 'JS Date.now() followed by func constructor'
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: 'Date\.now\(\)[^\n]{0,80}[<>!=]=?[^\n]{0,80}(new\s+)?Function\s*\('
- id: js-datenow-then-fetch
  desc: JavaScript Date.now() followed by fetch
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  size_max: 131072
  if:
    type: text
    regex: 'Date\.now\(\)[^\n]{0,80}([<>]=?|={2,3}|!={1,2})[^\n]{0,120}\bfetch\b'
  not:
    - regex: 'Date\.now\(\)\s*-\s*\d+e\d+\s*&&'
    - regex: '\.exp\s*-\s*Date\.now\(\)\s*<\s*\d+e\d+'
    - regex: 'Date\.now\(\)\s*<\s*\d+e\d+\s*\}\s*catch\s*\('
    # Cache/throttle TTL check: `Date.now() - storedTimestamp < ttl) return`
    # serves a cached value when elapsed time is under the threshold. A
    # time-bomb instead gates execution on `Date.now() > absoluteFutureTime`,
    # so an elapsed-under-threshold early return is benign caching.
    - regex: 'Date\.now\(\)\s*-\s*[\w.$]+\s*<\s*\d+e?\d*\s*\)\s*return'
    # Minified retention/retry filters commonly compute a recent-time cutoff,
    # filter cached telemetry records, then fetch a reconciliation endpoint.
    - regex: 'Date\.now\(\)\s*-\s*\d+(e\d+)?\s*,\s*\w+\s*=\s*\w+\.filter\s*\(\s*function'
    # AJAX payloads often include a current timestamp alongside nonce/settings
    # fields before a normal same-origin fetch. That is request metadata, not a
    # time gate controlling dormant code.
    - regex: '\.append\(["'']timestamp["''],Date\.now\(\)\).{0,180}\bfetch\b'
  unless:
    - id: metadata/library/structure::js-large-module-bundle
    - id: metadata/library/structure::js-large-minified-bundle
    - id: metadata/library/structure::js-dist-asset-bundle
    - id: metadata/library/structure::js-hashed-asset-bundle
    - id: metadata/library/structure::js-known-bundler-output
- id: js-newdate-then-function
  desc: 'JS new Date() followed by func constructor'
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  size_max: 300000
  if:
    type: text
    regex: 'new Date[^\n]{0,80}[<>!=]=?[^\n]{0,80}(new\s+)?Function\s*\('
  unless:
    - id: metadata/library/semantic-ui::semantic-ui-library
- id: js-newdate-then-fetch
  desc: JavaScript new Date() followed by fetch
  crit: suspicious
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: 'new Date[^\n]{0,80}[<>!=]=?[^\n]{0,120}fetch\s*\('
  not:
    # Routine scheduled polling: read the local hour and fetch an update feed at
    # a fixed hour. This is common in notification extensions and is not
    # anti-analysis without hidden execution or absolute future activation.
    - regex: 'new Date\s*\(\s*\)[^\n]{0,80}\.getHours\s*\(\s*\)[^\n]{0,80}if\s*\(\s*\w+\s*={2,3}\s*\d{1,2}\s*\)\s*\{\s*fetch\s*\('
  unless:
    - id: metadata/library/structure::js-large-module-bundle
    - id: metadata/library/structure::js-large-minified-bundle
    - id: metadata/library/structure::js-webpack-bundle
    - id: metadata/library/structure::js-dist-asset-bundle
    - id: metadata/library/structure::js-hashed-asset-bundle
  # ============================================================
  # GO: Time-based triggers
  # ============================================================
- id: go-time-unix-compare
  desc: Go Unix timestamp comparison
  crit: suspicious
  conf: 0.8
  for: [go]
  if:
    type: text
    regex: 'time\.Now\(\)\.Unix\(\)\s*[<>]\s*1[5-9][0-9]{8}'
  # ============================================================
  # SHELL: Time-based triggers
  # ============================================================
- id: shell-date-compare
  desc: Shell date comparison
  crit: suspicious
  conf: 0.75
  for: [shell]
  if:
    type: text
    regex: '\$\(date\s+\+%s\)\s*-[gl]t\s*1[5-9][0-9]{8}'
- id: shell-sleep-exec
  desc: Shell long sleep before command
  crit: suspicious
  conf: 0.8
  for: [shell]
  if:
    type: text
    regex: 'sleep\s+[0-9]{4,}\s*[;&]\s*(curl|wget|sh|shell)'
  # Atomic: CI environment detection
- id: ci-env-github-actions
    # ============================================================
    # ENVIRONMENT-BASED TRIGGERS
    # ============================================================

  desc: GitHub Actions environment check
  crit: component
  conf: 0.85
  for: [python, javascript, shell, go, ruby]
  if:
    type: text
    regex: 'GITHUB_ACTIONS\s*[=!]'
- id: ci-env-travis-jenkins
  desc: Travis or Jenkins environment check
  crit: component
  conf: 0.85
  for: [python, javascript, shell, ruby]
  if:
    type: text
    regex: '(TRAVIS|JENKINS)\s*([=!]=|-n|-z)'
- id: ci-env-gitlab
  desc: GitLab CI environment check
  crit: component
  conf: 0.85
  for: [python, javascript, shell, go, ruby]
  if:
    type: text
    regex: 'GITLAB_CI\s*[=!]'
  # Atomic: CI environment followed by exfil methods (decomposed by CI type)
- id: ci-var-then-curl
  desc: CI variable followed by curl
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  if:
    type: text
    regex: '(\$CI\b|\bCI\s*[=!]=)[\s\S]{0,200}curl'
- id: ci-var-then-wget
  desc: CI variable followed by wget
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  if:
    type: text
    regex: '(\$CI\b|\bCI\s*[=!]=)[\s\S]{0,200}wget'
- id: github-actions-then-curl
  desc: GITHUB_ACTIONS followed by curl
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  if:
    type: text
    regex: 'GITHUB_ACTIONS[\s\S]{0,200}curl'
  downgrade:
    any:
    - id: well-known/app/context
    - type: text
      regex: '/\.github/'
    - type: text
      regex: '(curl_version|curl --version|curl -V)\b'
- id: github-actions-then-wget
  desc: GITHUB_ACTIONS followed by wget
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  if:
    type: text
    regex: 'GITHUB_ACTIONS[\s\S]{0,200}wget'
  unless:
  - type: text
    substr: github.com/google/protobuf/releases/download/
  downgrade:
    any:
    - id: well-known/app/context
    - type: text
      regex: '/\.github/'
- id: github-actions-then-fetch
  desc: GITHUB_ACTIONS followed by fetch
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  if:
    type: text
    regex: 'GITHUB_ACTIONS[\s\S]{0,200}\bfetch\s*\('
  unless:
  - type: text
    regex: '\bfunction\s+fetch\b|^fetch\s*\(\)\s*\{'
  downgrade:
    any:
    - id: well-known/app/context
    - type: text
      regex: '/\.github/'

- id: travis-then-curl
  desc: TRAVIS followed by curl
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  if:
    type: text
    regex: 'TRAVIS[\s\S]{0,200}curl'
  unless:
  - type: text
    regex: 'TRAVIS_GO_VERSION[\s\S]{0,200}curl'
  - type: text
    substr: github.com/premake/premake-core/releases/download
- id: travis-then-wget
  desc: TRAVIS followed by wget
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  if:
    type: text
    regex: 'TRAVIS[\s\S]{0,200}wget'
  unless:
  - type: text
    substr: github.com/google/protobuf/releases/download/
- id: ci-exfil-requests
  desc: CI check followed by requests
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  if:
    type: text
    regex: '(\$CI\b|\bCI\s*[=!]=)[\s\S]{0,200}requests'
- id: github-actions-then-requests
  desc: GITHUB_ACTIONS followed by requests
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  unless:
  - id: well-known/tool/detection/security-scanner::defensive-scanner-tool-context
  if:
    type: text
    regex: 'GITHUB_ACTIONS[\s\S]{0,200}requests'
- id: travis-then-requests
  desc: TRAVIS followed by requests
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  if:
    type: text
    regex: 'TRAVIS[\s\S]{0,200}requests'
- id: ci-var-then-fetch
  desc: CI variable followed by fetch
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  if:
    type: text
    regex: '(\$CI\b|\bCI\s*[=!]=)[\s\S]{0,200}fetch'
- id: ci-var-then-http
  desc: CI variable followed by http
  crit: suspicious
  conf: 0.95
  for: [python, javascript]
  if:
    type: text
    regex: '(\$CI\b|\bCI\s*[=!]=)[\s\S]{0,200}(https?://|https?\.(get|request))'
- id: github-actions-then-http
  desc: GITHUB_ACTIONS followed by http
  crit: suspicious
  conf: 0.95
  for: [python, javascript]
  if:
    type: text
    regex: 'GITHUB_ACTIONS[\s\S]{0,200}(https?://|https?\.(get|request))'
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/scripted::dot-spec-filename
  - id: objectives/supply-chain/trojanized/app/context::benign-npm-oidc-token-exchange
  - type: text
    substr: GitHub Actions always skips this regardless of USE_PROXY.
  - id: slsa-provenance-ci-metadata-context
  not:
  - substr: "@see https://github.com/watson/ci-info"
- id: slsa-provenance-string
  desc: SLSA provenance string
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    substr: SLSA provenance
- id: ci-environment-class
  desc: CIEnvironment class reference
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    substr: CIEnvironment
- id: ci-invocation-url-field
  desc: CI invocation URL field
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    substr: invocation_url
- id: travis-then-fetch
  desc: TRAVIS followed by fetch
  crit: suspicious
  conf: 0.95
  for: [python, javascript, shell]
  if:
    type: text
    regex: '\bTRAVIS(_|$|\b)[\s\S]{0,200}fetch'
- id: travis-then-http
  desc: Travis CI environment with HTTP
  crit: suspicious
  conf: 0.95
  for: [python, javascript]
  if:
    type: text
    regex: '\bTRAVIS(_|$|\b)[\s\S]{0,200}https?://'
  not:
