  - id: metadata/package/testing/presence/harness::test-directory
  - type: text
    substr: "api.github.com"
- id: travis-then-http-lib
  desc: Travis CI environment with HTTP client
  crit: suspicious
  conf: 0.95
  for: [python, javascript]
  if:
    type: text
    regex: '\bTRAVIS(_|$|\b)[\s\S]{0,200}https?\.(get|request)'
  not:
  - substr: "registry:"
  - substr: "{npm-version}"
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  - type: text
    substr: "api.github.com"
- id: ci-triggered-malware-cond-0--inline-15841
  desc: Regex component marker
  crit: component
  conf: 0.95
  for: [shell, batch, python, javascript, typescript, go, github-actions]
  if:
    type: text
    substr: /.github/
  count_max: 1015842
