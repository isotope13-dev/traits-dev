# C++ Self-Termination and Anti-Analysis
# Detects techniques where the malware intentionally crashes or terminates to avoid analysis.
# ATT&CK: T1497 (Virtualization/Sandbox Evasion)
# MBC: F0001 (Anti-Analysis)
defaults:
  for: [c, cpp, pe, dll]
  platforms: [windows, linux, macos]
  attack: "T1497"
  mbc: "F0001"
traits:
  - id: null-pointer-dereference-crash
    desc: 'null pointer deref crash'
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "*(uintptr_t*)0 = 0"
composite_rules:
  - id: anti-analysis-self-destruct
    desc: Intentional crash/self-destruct when analysis environment detected
    crit: hostile
    conf: 0.95
    all:
      - id: null-pointer-dereference-crash
    any:
      - id: objectives/anti-analysis/vm-detect/vendor::hypervisor-vendor
      - id: objectives/anti-analysis/vm-detect/vendor::mac-prefix
      - id: objectives/anti-static/obfuscation/control-flow/stack::stack-spoofing-technique
      - id: objectives/anti-analysis/vm-detect/vendor::is-vt-symbol
