defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1497

traits:
  - id: ruby-self-kill-traps
    desc: Ruby self-kill traps
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "trap\\('TERM'\\)[\\s\\S]{0,160}trap\\('INT'\\)"

  - id: ruby-process-kill-self
    desc: Ruby Process.kill self
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Process.kill('KILL', $$)

composite_rules:
  - id: ruby-signal-self-terminate
    desc: Ruby signal self-terminate
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-self-kill-traps
      - id: ruby-process-kill-self
