defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1497

traits:
  - id: ruby-process-kill-self
    desc: Ruby Process.kill self
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Process.kill('KILL', $$)

composite_rules:
  - id: ruby-signal-self-terminate
    desc: Ruby signal self-terminate
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/control/signal::ruby-term-int-signal-handlers
      - id: ruby-process-kill-self
