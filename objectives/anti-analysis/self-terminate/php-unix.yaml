defaults:
  platforms: [unix]
  for: [php]
  attack: T1497

traits:
  - id: php-xdebug-self-exit
    desc: PHP xdebug extension check
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: extension_loaded('xdebug')

  - id: php-analysis-process-list
    desc: PHP analysis process list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "['gdb', 'lldb', 'strace'"

  - id: php-kdp-debugger-check
    desc: PHP KDP debugger check
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sysctl debug.kdp_prefer_kdp

composite_rules:
  - id: php-anti-analysis-self-exit
    desc: PHP anti-analysis self exit
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: php-xdebug-self-exit
      - id: php-analysis-process-list
      - id: php-kdp-debugger-check
