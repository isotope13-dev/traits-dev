defaults:
  platforms: [panos, appliance, unix]
  for: [kotlin, class, java_class, jar]
  attack: T1622

traits:
  - id: kotlin-panos-ack-channel
    desc: Kotlin PAN-OS ack channel
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /ack
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: kotlin-panos-tracerpid-startswith
    desc: Kotlin PAN-OS TracerPid startsWith
    crit: suspicious
    conf: 0.94
    for: [kotlin]
    if:
      type: text
      substr: 'line.startsWith("TracerPid:")'

composite_rules:
  - id: kotlin-panos-traced-self-terminate
    desc: Kotlin PAN-OS traced self-kill
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-panos-ack-channel
    any:
      - id: kotlin-panos-tracerpid-startswith
      - id: micro-behaviors/fs/proc/info/path::tracerpid-status-field
    needs: 1
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
