defaults:
  platforms: [unix]
  for: [shell]
  attack: T1497

traits:
  - id: shell-analysis-tool-pgrep
    desc: Shell pgrep analysis tools
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'pgrep -x "\$proc"[\s\S]{0,260}(lldb|gdb|dtrace|frida)'

  - id: shell-analysis-tool-array
    desc: Shell analysis tool array
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'suspicious_procs=\([^)]{0,120}(lldb|gdb|dtrace|frida)'

  - id: shell-kill-self-analysis
    desc: Shell kills self on analysis
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'kill -9 \$\$[\s\S]{0,120}exit 42'

  - id: shell-macos-vm-self-exit
    desc: Shell macOS VM self exit
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'kextstat[\s\S]{0,220}vmware|ioreg -l[\s\S]{0,220}QEMU'

  - id: shell-vm-detect-exit
    desc: Shell VM detect exits
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: detect_vm && exit 0

  - id: shell-analysis-pattern-list
    desc: Shell analysis pattern list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'SUSPICIOUS_PATTERNS="wireshark|tcpdump|lsof'

  - id: shell-analysis-kill-pid
    desc: Shell analysis kill pid
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: 'kill -9 "$pid"'

  - id: shell-analysis-pkill-loop
    desc: Shell analysis pkill loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'pkill -9 -f "$tool"'

  - id: shell-analysis-parent-kill
    desc: Shell analysis parent kill
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'parent_comm=$(ps -o comm= -p "$ppid"'

composite_rules:
  - id: shell-analysis-self-terminate
    desc: Shell analysis self-terminate
    crit: hostile
    conf: 0.98
    all:
      - id: shell-kill-self-analysis
    any:
      - id: shell-analysis-tool-pgrep
      - id: shell-analysis-tool-array
      - id: shell-macos-vm-self-exit

  - id: shell-vm-self-terminate
    desc: Shell VM self-terminate
    crit: hostile
    conf: 0.98
    all:
      - id: shell-vm-detect-exit
    any:
      - id: shell-macos-vm-self-exit

  - id: shell-kills-analysis-processes
    desc: Shell kills analysis processes
    crit: hostile
    conf: 0.98
    all:
      - id: shell-analysis-kill-pid
    any:
      - id: shell-analysis-pattern-list
      - id: shell-analysis-pkill-loop
      - id: shell-analysis-parent-kill
    needs: 1
  - id: shell-analysis-kill-download-dropper
    desc: Shell kills analysis processes before raw-IP dropper
    crit: hostile
    conf: 0.98
    all:
      - id: shell-analysis-kill-pid
      - id: objectives/command-and-control/dropper/delivery/download-execute::raw-ip-literal-download-chmod-local-exec
