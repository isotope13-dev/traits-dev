defaults:
  platforms: [panos, appliance, windows]
  for: [csharp, pe]
  attack: T1622

traits:
  - id: csharp-panos-analysis-check
    desc: C# PAN-OS analysis check
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: IsBeingAnalyzed

  - id: csharp-panos-self-terminate
    desc: C# PAN-OS self terminate
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SelfTerminate

composite_rules:
  - id: csharp-panos-analysis-self-terminate
    desc: C# PAN-OS analysis self-kill
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-panos-analysis-check
      - id: csharp-panos-self-terminate
