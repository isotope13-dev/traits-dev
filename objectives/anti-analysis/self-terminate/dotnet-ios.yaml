defaults:
  platforms: [ios, unix, windows]
  for: [csharp, pe]
  attack: T1622

traits:
  - id: dotnet-force-self-terminate
    desc: .NET force self-terminate routine
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ForceSelfTerminate

  - id: dotnet-debugger-exit
    desc: .NET debugger-triggered exit
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'Debugger\.IsAttached[\s\S]{0,160}Environment\.Exit'

  - id: dotnet-kill-current-process
    desc: .NET kills current process
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'kill\(Process\.GetCurrentProcess\(\)\.Id|GetCurrentProcess\(\)\.Kill'

composite_rules:
  - id: dotnet-debugger-self-terminate
    desc: .NET debugger self-terminate
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-force-self-terminate
    any:
      - id: dotnet-debugger-exit
      - id: dotnet-kill-current-process
