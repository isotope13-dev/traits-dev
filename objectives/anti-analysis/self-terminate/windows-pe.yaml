defaults:
  platforms: [windows]
  for: [pe]
  attack: T1497
  mbc: F0001
composite_rules:
- id: debugger-check-terminate-process
  desc: Debugger check with forced terminate
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/anti-analysis/debugger-detect/check::win-debugger-detect
  - id: micro-behaviors/process/terminate/kill::terminate-process
  any:
  - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
  - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
  - id: micro-behaviors/os/exception/error-handling::unhandled-exception-filter-import
  - id: micro-behaviors/time/timing/delay::query-performance-counter
  - id: objectives/anti-analysis/vm-detect/processor-features::is-processor-feature-present
  unless:
  - id: objectives/anti-analysis/debugger-detect/check/
  - id: metadata/signed/platform/
  - id: metadata/library/automation/
  - id: metadata/library/automation/
  - id: metadata/build/pip::setuptools-launcher-stub
  downgrade:
    any:
    - id: metadata/binary/layout::pe-embedded
- id: timing-vm-check-self-terminate
  desc: Timing and VM check terminate
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/process/terminate/kill::terminate-process
  - id: objectives/anti-analysis/vm-detect/processor-features::is-processor-feature-present
  - id: micro-behaviors/time/timing/delay::query-performance-counter
  any:
  - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
  unless:
  - id: objectives/anti-analysis/debugger-detect/check/
  - id: well-known/lib/ssh2::ssh2-pageant-helper-context
  - id: metadata/signed/platform/
  - id: metadata/build/pip::setuptools-launcher-stub
  downgrade:
    any:
    - id: metadata/library/automation/
    - id: metadata/library/automation/
    - id: metadata/binary/layout::pe-embedded
