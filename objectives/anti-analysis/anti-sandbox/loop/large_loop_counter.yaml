# Large Loop Counter (Anti-Sandbox)
# Detects loops checking against large numbers (> 10,000,000)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: suspicious
  conf: 0.8
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: large-loop-counter
    desc: "Loop check against large number"
    mbc: "B0003.003" # Evasion::Stalling
    attack: "T1497.003" # Virtualization/Sandbox Evasion::Time Based Evasion
    if:
      type: raw
      # Matches: if (var == 123456789012345) or while (var < 123456789012345)
      # Regex looks for comparison operators followed by at least 14 digits
      regex: '(if|while|for)\s*\([^)]{1,120}([<>]=?|[!=]=)\s*[1-9][0-9]{13,}'
    not:
      - substr: "9007199254740991"
      - substr: "1099511627776"
      - substr: "1073741824"
