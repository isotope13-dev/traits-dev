# Large packed PE anti-debug patterns
defaults:
  attack: T1622
  mbc: B0001
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: packed-loader-anti-debug
    desc: Packed PE anti-debug suite
    crit: suspicious
    conf: 0.92
    size_min: 524288
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/error-handling/exceptions::set-unhandled-exception-filter
    any:
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: micro-behaviors/os/error-handling/exceptions::unhandled-exception-filter
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
      - id: metadata/format::dominant-section
      - id: metadata/format::few-functions
    needs: 4
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/lang/compiler::msvcrt
        - id: metadata/lang/compiler::vcruntime
        - id: metadata/quality/versioning::pe-version-resource
