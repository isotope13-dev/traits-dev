# Debugger Detection - Windows
# MBC: B0001 (Debugger Detection)
# ATT&CK: T1622
defaults:
  attack: T1622
  mbc: B0001
  for: [pe, dll]
  platforms: [windows]
traits:
  # IsDebuggerPresent: use objectives/anti-analysis/debugger-detect/check::is-debugger-present (canonical)
  - id: check-remote-debugger
    desc: CheckRemoteDebuggerPresent API
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "CheckRemoteDebuggerPresent"
composite_rules:
  # debugger-api: composite referencing canonical IsDebuggerPresent plus local variants
  - id: debugger-api
    desc: Debugger detection via Windows API
    crit: notable
    conf: 0.66
    any:
      - id: objectives/anti-analysis/debugger-detect/check::anti-debug-api-pair
      - id: check-remote-debugger
      - id: micro-behaviors/os/syscall/raw::nt-query-info-ssn
