defaults:
  platforms: [unix, windows, macos]

# Composite Debugger Detection Capabilities
composite_rules:
  # IsDebuggerPresent and UnhandledExceptionFilter are standard MSVC CRT
  # imports linked into virtually every Windows binary. Restrict to small
  # binaries where these APIs more likely indicate intentional anti-debug.
  - id: win-basic
    desc: Windows debugger detection (basic)
    crit: suspicious
    mbc: "B0001"
    attack: "T1622"
    conf: 0.85
    platforms: [windows]
    for: [pe, dll]
    size_max: 100000
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/error-handling/exceptions::unhandled-exception-filter
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/lang/compiler::vcruntime
        - id: metadata/lang/compiler::msvcrt
        - id: metadata/lang/compiler::ms-visual
  - id: win-comprehensive
    desc: Windows debugger/VM detection (multiple signals)
    crit: suspicious
    mbc: "B0001"
    attack: "T1622"
    conf: 0.9
    platforms: [windows]
    for: [pe, dll]
    size_max: 150000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    any:
      - id: micro-behaviors/os/error-handling/exceptions::unhandled-exception-filter
      - id: micro-behaviors/time/timing/delay::query-performance-counter
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/lang/compiler::vcruntime
        - id: metadata/lang/compiler::msvcrt
        - id: metadata/lang/compiler::ms-visual
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/format::many-exports
  # Larger PE binaries with multiple anti-analysis signals:
  # IsDebuggerPresent + timing checks + thread affinity manipulation
  - id: win-anti-analysis-suite
    desc: Windows anti-analysis technique suite
    crit: suspicious
    mbc: "B0001"
    attack: "T1622"
    conf: 0.9
    platforms: [windows]
    for: [pe, dll]
    size_max: 350000
    all:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/error-handling/exceptions::set-unhandled-exception-filter
    any:
      - id: objectives/anti-analysis/timing/evasion::timing-delta-check
      - id: micro-behaviors/time/timing/delay::query-performance-counter
      - id: objectives/anti-analysis/evasion/mining::set-thread-affinity
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/lang/compiler::vcruntime
        - id: metadata/lang/compiler::msvcrt
        - id: metadata/lang/compiler::ms-visual
        - id: metadata/format::many-exports
  - id: linux-comprehensive
    desc: Linux debugger detection across multiple
    crit: suspicious
    mbc: "B0001"
    attack: "T1622"
    conf: 0.95
    platforms: [linux]
    for: [elf]
    needs: 2
    any:
      - id: micro-behaviors/os/linker/env::ld-debug
      - id: tracerpid-string
      - id: ptrace-traceme-or-deny
