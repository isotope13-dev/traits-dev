defaults:
  platforms: [unix, openwrt]
  for: [lua]
  attack: T1497

traits:
  - id: lua-tracer-process-name
    desc: Lua references tracer process names
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '"(strace|ltrace|ptrace)"'
  - id: lua-capture-process-name
    desc: Lua references packet capture process names
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '"(tcpdump|wireshark|sysdig)"'
  - id: lua-suspicious-process-termination-log
    desc: Lua logs suspicious process termination
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: terminating suspicious process

composite_rules:
  - id: lua-process-tree-sanitizer
    desc: Lua process tree anti-analysis sanitizer
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/proc/info/path::lua-process-info-path
      - id: micro-behaviors/process/terminate/command::kill-force
    any:
      - id: lua-tracer-process-name
      - id: micro-behaviors/process/debug/tool-markers::gdb-name-reference
      - id: lua-capture-process-name
      - id: lua-suspicious-process-termination-log
    needs: 2
