defaults:
  platforms: [unix, windows]
# Environmental Fingerprinting via Hardware Interrogation
# Detects clusters of instructions like CPUID, RDTSC, etc.
composite_rules:
  - id: hardware-interrogation-cluster
    desc: High density of hardware interrogation instructions
    crit: suspicious
    conf: 0.95
    attack: T1497.001
    all:
      - id: objectives/anti-analysis/vm-detect::cpuid-instruction
      - id: objectives/anti-analysis/vm-detect::rdtsc-instruction
    near_bytes: 512
