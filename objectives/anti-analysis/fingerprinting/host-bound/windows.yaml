defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1497.001
composite_rules:
  - id: host-bound-key-material
    desc: Host-bound decryption key material
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/sysinfo/hardware::get-system-firmware-table
      - id: objectives/discovery/system/fingerprint/machine-id::hardware-id-source
      - id: micro-behaviors/os/registry/access::registry-read-api-chain
    any:
      - id: micro-behaviors/os/sysinfo/machine-id::microsoft-mrt-guid-path
      - id: micro-behaviors/crypto/hash/digest::message-digest
      - id: micro-behaviors/crypto/hash/digest::sha1
      - id: micro-behaviors/crypto/hash/digest::md5
    needs: 2
    unless:
      - id: metadata/signed/platform/
  - id: checksum-anomalous-hash-resolved-host-probe
    desc: Checksum-anomalous PE uses hashed host probing
    crit: hostile
    conf: 0.98
    attack: T1027.007,T1497.001
    all:
      - id: metadata/binary/layout::pe-checksum-mismatch
      - id: micro-behaviors/os/api-resolution/hash-based::multiplicative-hash-loop
      - id: micro-behaviors/os/sysinfo/hardware::get-system-info
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::get-cursor-pos
      - id: micro-behaviors/time/query::get-tick-count
    unless:
      - id: metadata/signed/platform/
      - id: well-known/game/
