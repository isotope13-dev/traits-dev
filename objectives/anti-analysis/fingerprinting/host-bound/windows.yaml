defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1497.001
composite_rules:
  - id: host-bound-key-material
    desc: Host-bound decryption key material
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/sysinfo/hardware::get-system-firmware-table
      - id: objectives/discovery/system/fingerprint/machine-id::hardware-id-source
      - id: micro-behaviors/os/registry/access::registry-read-api-chain
    any:
      - id: objectives/discovery/system/fingerprint/machine-id::microsoft-mrt-guid-path
      - id: micro-behaviors/crypto/hash/digest::message-digest
      - id: micro-behaviors/crypto/hash/digest::sha1
      - id: micro-behaviors/crypto/hash/digest::md5
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
