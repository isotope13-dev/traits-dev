# Suspicious patterns in Apple CodeResources manifests
# Detects debug artifacts, unusual dylib naming in signed app bundles
defaults:
  platforms: [macos]
  for: [plist]
traits:
  - id: debug-dylib-in-codesign
    desc: Debug dylib referenced in code signature
    crit: suspicious
    conf: 0.9
    attack: "T1036"
    if:
      type: string
      substr: "debug.dylib"
      case_insensitive: true
  - id: underscore-prefix-dylib
    desc: Underscore-prefixed dylib in code signature
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "MacOS/__"
composite_rules:
  - id: suspicious-codesign-dylibs
    desc: Code signature with debug or unusual dylibs
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/apple/codesign::coderesources-plist
    any:
      - id: debug-dylib-in-codesign
      - id: underscore-prefix-dylib
