defaults:
  for: [elf]
  platforms: [linux, unix]
  attack: T1036

traits:
  - id: fake-devlog-orbit-path
    desc: Fake devlog orbit stash path
    crit: suspicious
    conf: 0.95
    if:
      type: string
      substr: "/tmp/devlog/orbit/keyring/esd/"

  - id: fake-keyring-subtree
    desc: Fake keyring subtree under /tmp
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: "/orbit/keyring/esd/"

composite_rules:
  - id: telecom-log-masquerade
    desc: Telecom log/keyring temp masquerade
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/fs/path/temp::tmp-path-content
      - id: fake-devlog-orbit-path
    any:
      - id: fake-keyring-subtree
      - id: micro-behaviors/fs/path/temp::temp-tmp
