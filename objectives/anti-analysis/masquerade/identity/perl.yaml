defaults:
  for: [perl]
  platforms: [linux, unix, windows]
  attack: "T1036.005"
  mbc: "F0004"
traits:
  - id: process-title-assign
    desc: Perl process title assignment
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: '\$0\s*=\s*"\$?[A-Za-z_][A-Za-z0-9_]*"\s*\.\s*"\\0"'
  - id: fake-daemon-name
    desc: Fake daemon process path
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: '/usr/sbin/(sshd|cron[d]?|syslogd|smartd)'
  - id: ignore-int
    desc: Ignore SIGINT handler
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "\\$SIG\\{'INT'\\}\\s*=\\s*'IGNORE'"
  - id: ignore-hup
    desc: Ignore SIGHUP handler
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "\\$SIG\\{'HUP'\\}\\s*=\\s*'IGNORE'"
  - id: ignore-term
    desc: Ignore SIGTERM handler
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "\\$SIG\\{'TERM'\\}\\s*=\\s*'IGNORE'"
  - id: ignore-chld
    desc: Ignore SIGCHLD handler
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "\\$SIG\\{'CHLD'\\}\\s*=\\s*'IGNORE'"
composite_rules:
  - id: signal-ignore-burst
    desc: Multiple ignored signal handlers
    crit: suspicious
    conf: 0.88
    needs: 3
    any:
      - id: ignore-int
      - id: ignore-hup
      - id: ignore-term
      - id: ignore-chld
  - id: process-masquerade
    desc: Perl daemon process masquerade
    crit: suspicious
    conf: 0.94
    all:
      - id: process-title-assign
      - id: fake-daemon-name
  - id: stealth-daemon
    desc: Perl stealth daemon behavior
    crit: suspicious
    conf: 0.9
    all:
      - id: signal-ignore-burst
      - id: micro-behaviors/process/fork/clone::fork-call
