# Windows source-code identity masquerading
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1036.005"
  mbc: "F0004"
traits:
  - id: rundll32-window-title
    desc: Window titled as Rundll32.exe
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'this\.Text\s*=\s*"Rundll32\.exe"'
  - id: picture-fax-viewer-title
    desc: Fake Picture and Fax Viewer title
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'AssemblyTitle\s*\(\s*"Windows Resim ve Faks Görüntüleyicisi"\s*\)'
  - id: federiko-author-string
    desc: FEDERIKO author identity string
    crit: notable
    conf: 0.84
    if:
      type: string_value
      exact: "Coded by FEDERIKO"
  - id: sevenzip-title
    desc: Assembly titled as 7-Zip
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: 'AssemblyTitle\s*\(\s*"7-Zip"\s*\)'
  - id: sevenzip-version
    desc: 7-Zip version metadata string
    crit: notable
    conf: 0.9
    if:
      type: string_value
      exact: "9.16.0.0"
  - id: igor-pavlov-copyright
    desc: Igor Pavlov copyright string
    crit: suspicious
    conf: 0.96
    if:
      type: string_value
      exact: "Copyright (c) 1999-2010 Igor Pavlov"
composite_rules:
  - id: windows-dual-identity-masquerade
    desc: Hidden stub claims system identities
    crit: suspicious
    conf: 0.96
    any:
      - id: rundll32-window-title
      - id: picture-fax-viewer-title
  - id: sevenzip-dotnet-masquerade
    desc: .NET source masquerades as 7-Zip
    crit: suspicious
    conf: 0.99
    all:
      - id: sevenzip-title
      - id: sevenzip-version
      - id: igor-pavlov-copyright
