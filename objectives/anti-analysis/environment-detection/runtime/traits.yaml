traits:
  - id: console-check-api
    desc: Console environment check
    crit: baseline
    conf: 0.7
    platforms:
      - windows
    for: [pe]
    if:
      type: symbol
      exact: GetConsoleScreenBufferInfo
    attack: T1497
    mbc: B0001
  - id: getenv-api
    desc: Environment variable access
    crit: baseline
    conf: 0.5
    platforms:
      - windows
      - linux
      - macos
    for: [pe, elf, macho]
    if:
      type: symbol
      regex: ^GetEnvironment(Strings(W|A)?|Variable)$|^FreeEnvironmentStringsW$
composite_rules:
  - id: console-environment-detection
    desc: Console environment detection checks
    crit: notable
    conf: 0.75
    platforms:
      - windows
    for: [pe]
    attack: T1497.001
    mbc: B0001
    needs: 2
    any:
      - id: objectives/anti-analysis/environment-detection/runtime::console-check-api
      - id: micro-behaviors/hardware/display/screen::write-console-w
    unless:
      - id: metadata/vendor/microsoft::openmp-runtime
    downgrade:
      any:
        - id: metadata/format::many-imports
        - id: metadata/quality/versioning::pe-version-resource
  - id: environment-aware-malware
    desc: Environment-aware malware adaptation
    crit: suspicious
    conf: 0.8
    platforms: [unix, windows, macos]
    for: [pe, elf, macho, shell, python, javascript]
    attack: T1497
    mbc: B0001
    any:
      - id: getenv-api
      - id: console-environment-detection
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rdata
        - id: metadata/signed/platform::microsoft
        - id: metadata/quality/versioning::pe-version-resource
  - id: environment-adaptive-behavior
    desc: Adaptive behavior based on environment
    crit: suspicious
    conf: 0.85
    platforms: [unix, windows, macos]
    for: [pe, elf, macho, shell, python, javascript]
    attack: T1497
    mbc: B0001
    all:
      - id: environment-aware-malware
    any:
      - id: objectives/anti-analysis/vm/detect
      - id: objectives/anti-analysis/sandbox/detect
      - id: objectives/anti-analysis/debugger/detect
    needs: 2
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/lang/compiler::ms-visual
        - id: metadata/format::large-executable
        - id: metadata/format::many-imports
        - id: metadata/format::many-exports
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/vendor/microsoft::is-microsoft-named
