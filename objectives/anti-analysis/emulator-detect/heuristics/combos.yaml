defaults:
  attack: T1497.001
  mbc: B0009
  platforms: [unix, windows]
  for: [binaries]
traits:
  - id: virtualization-manager-context
    desc: Virtualization manager tool references
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b(VBoxManage|VBoxManager|qemu-(?:system|img|kvm)|qemu-system-[a-z0-9_-]+|virt-host-validate|qemu-kvm)\b'
# Composite VM/Emulator Detection Capabilities
composite_rules:
  - id: detect-vendors
    desc: VM detection via vendor/product strings
    crit: suspicious
    conf: 0.9
    needs: 3
    any:
      - id: objectives/anti-analysis/vm-detect::vendor-vmware
      - id: objectives/anti-analysis/emulator-detect::virtualbox-string
      - id: objectives/anti-analysis/emulator-detect::qemu-string
      - id: objectives/anti-analysis/vm-detect::vendor-hyperv
    unless:
      - id: metadata/package::virtualbox-platform-component
      - id: metadata/binary/section/content::freebsd-kernel-image
    downgrade:
      any:
        - id: virtualization-manager-context
        - type: raw
          substr: smbios
          case_insensitive: true
        - id: metadata/signed/developer
  - id: comprehensive
    desc: Virtual machine environment detection
    crit: suspicious
    conf: 0.9
    needs: 3
    any:
      - id: objectives/anti-analysis/vm-detect::vendor-vmware
      - id: objectives/anti-analysis/emulator-detect::virtualbox-string
      - id: objectives/anti-analysis/emulator-detect::qemu-string
      - id: objectives/anti-analysis/emulator-detect::vm-hardware
    unless:
      - id: metadata/package::virtualbox-platform-component
      - id: metadata/binary/section/content::freebsd-kernel-image
    downgrade:
      any:
        - id: virtualization-manager-context
        - type: raw
          substr: smbios
          case_insensitive: true
