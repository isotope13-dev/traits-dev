defaults:
  attack: T1497.001
  mbc: B0009
  platforms: [unix, windows]
  for: [binaries]
traits:
- id: virtualization-manager-context--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: virt-host-validate
    case_insensitive: true
  count_max: 1016211
- id: virtualization-manager-context--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: qemu-system
    case_insensitive: true
  count_max: 1016212
- id: virtualization-manager-context--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: VBoxManager
    case_insensitive: true
  count_max: 1016213
- id: virtualization-manager-context--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: qemu-kvm
    case_insensitive: true
  count_max: 1016214
- id: detect-vendors-cond-1--inline-16214
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: raw
    substr: smbios
    case_insensitive: true
  count_max: 1016215
- id: comprehensive-cond-1--inline-16216
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: raw
    substr: smbios
    case_insensitive: true
  count_max: 1016217
composite_rules:
- id: detect-vendors
  desc: VM detection via vendor/product strings
  crit: suspicious
  conf: 0.9
  needs: 3
  any:
  - id: objectives/anti-analysis/vm-detect/vendor::vendor-vmware
  - id: objectives/anti-analysis/emulator-detect::virtualbox-string
  - id: objectives/anti-analysis/emulator-detect::qemu-string
  - id: objectives/anti-analysis/vm-detect/vendor::vendor-hyperv
  unless:
  - id: metadata/package/fields/compat::virtualbox-platform-component
  - id: metadata/binary/section/content::freebsd-kernel-image
  - id: well-known/lib/electron::electron-app-runtime
  downgrade:
    any:
    - id: virtualization-manager-context
    - id: detect-vendors-cond-1--inline-16214
    - id: metadata/signed/developer
- id: comprehensive
  desc: Virtual machine environment detection
  crit: suspicious
  conf: 0.9
  needs: 3
  any:
  - id: objectives/anti-analysis/vm-detect/vendor::vendor-vmware
  - id: objectives/anti-analysis/emulator-detect::virtualbox-string
  - id: objectives/anti-analysis/emulator-detect::qemu-string
  - id: objectives/anti-analysis/emulator-detect::vm-hardware
  unless:
  - id: metadata/package/fields/compat::virtualbox-platform-component
  - id: metadata/binary/section/content::freebsd-kernel-image
  - id: well-known/lib/electron::electron-app-runtime
  downgrade:
    any:
    - id: virtualization-manager-context
    - id: comprehensive-cond-1--inline-16216
- id: virtualization-manager-context
  desc: Virtualization manager tool references
  crit: component
  conf: 0.9
  any:
  - id: virtualization-manager-context--rx-1
  - id: virtualization-manager-context--rx-2
  - id: virtualization-manager-context--rx-3
  - id: virtualization-manager-context--rx-4
