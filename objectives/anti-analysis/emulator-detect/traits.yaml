defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: virtualbox-word
    desc: VirtualBox string detection
    crit: component
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    if:
      type: text
      regex: (?i)VirtualBox
    unless:
      - id: metadata/package::virtualbox-platform-component
  - id: vbox-string
    desc: VBOX string detection
    crit: component
    mbc: B0032
    attack: T1497.001
    conf: 0.5
    if:
      type: text
      regex: (?i)\bvbox\b
    unless:
      - id: metadata/package::virtualbox-platform-component
  - id: qemu-lower
    desc: qemu lowercase string
    crit: notable
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    if:
      type: text
      exact: qemu
  - id: vmxh-string
    desc: VMXH hardware string
    crit: notable
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    if:
      type: text
      exact: VMXH
  - id: virtio-string
    desc: virtio hardware string
    crit: notable
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    for:
      - binaries
    if:
      type: text
      word: virtio
      case_insensitive: true
    unless:
      - id: metadata/package::virtualbox-platform-component
      - type: metrics
        field: binary.section_count
        max: 0
  - id: vmmouse-string
    desc: vmmouse hardware string
    crit: notable
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    if:
      type: text
      regex: (?i)vmmouse
  - id: genuineintel
    desc: GenuineIntel CPU vendor string
    crit: baseline
    mbc: B0009
    conf: 0.4
    if:
      type: text
      substr: GenuineIntel
  - id: authenticamd
    desc: AuthenticAMD CPU vendor string
    crit: baseline
    mbc: B0009
    conf: 0.4
    if:
      type: text
      substr: AuthenticAMD
composite_rules:
  - id: virtualbox-string
    desc: VirtualBox vendor string detection
    crit: notable
    mbc: B0009
    attack: T1497.001
    conf: 0.6
    any:
      - id: virtualbox-word
      - id: vbox-string
  - id: qemu-string
    desc: QEMU vendor string detection
    crit: notable
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    any:
      - id: objectives/anti-analysis/vm-detect::vendor-qemu
      - id: qemu-lower
  - id: vm-hardware
    desc: VM-specific hardware strings
    crit: notable
    mbc: B0009
    attack: T1497.001
    conf: 0.6
    any:
      - id: vmxh-string
      - id: virtio-string
      - id: vmmouse-string
  - id: cpu-vendor
    desc: CPU vendor string checks (Intel/AMD
    crit: baseline
    mbc: B0009
    conf: 0.5
    any:
      - id: genuineintel
      - id: authenticamd
