defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1497.001
  mbc: B0009

traits:
  - id: gpu-vendor-string-set
    desc: GPU vendor string set
    crit: notable
    conf: 0.88
    ref: sha256:a97d6fabe19316c920aed2004cb8d5ea3a699ce3a1a02c54ba60e0b6cabe9b64
    count_min: 4
    if:
      type: text
      regex: '^(nvidia|intel|radeon|geforce|quadro)$'
      case_insensitive: true

composite_rules:
  - id: gpu-vendor-enumeration-check
    desc: GPU vendor enumeration check
    crit: suspicious
    conf: 0.94
    ref: sha256:a97d6fabe19316c920aed2004cb8d5ea3a699ce3a1a02c54ba60e0b6cabe9b64
    all:
      - id: micro-behaviors/os/sysinfo/hardware::enumerate-display-devices
      - id: gpu-vendor-string-set
    unless:
      - id: well-known/app/drivers/
      - id: metadata/signed/platform/
