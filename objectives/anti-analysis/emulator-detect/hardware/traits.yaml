defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: virtualbox-word
    desc: VirtualBox string detection
    crit: component
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    if:
      type: text
      regex: (?i)VirtualBox
    unless:
      - id: metadata/signed/developer::intel-corporation
      - id: metadata/package/fields/compat::virtualbox-platform-component
      - type: text
        regex: application/x-virtualbox-[a-z0-9-]+
  - id: vbox-string
    desc: VBOX string detection
    crit: component
    mbc: B0032
    attack: T1497.001
    conf: 0.5
    if:
      type: text
      regex: (?i)\bvbox\b
    unless:
      - id: metadata/signed/developer::intel-corporation
      - id: metadata/package/fields/compat::virtualbox-platform-component
      - type: text
        regex: application/x-virtualbox-[a-z0-9-]+
  - id: qemu-lower
    desc: qemu lowercase string
    crit: notable
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    if:
      type: text
      exact: qemu
  - id: vmxh-string
    desc: VMXH hardware string
    crit: notable
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    if:
      type: text
      exact: VMXH
  - id: virtio-string
    desc: virtio hardware string
    crit: component
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    for:
      - binaries
    if:
      type: text
      word: virtio
      case_insensitive: true
    unless:
      - id: metadata/package/fields/compat::virtualbox-platform-component
      - type: metrics
        field: sections.count
        max: 0
      - id: metadata/binary/section/content::freebsd-kernel-image
  - id: vmmouse-string
    desc: vmmouse hardware string
    crit: notable
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    if:
      type: text
      regex: (?i)vmmouse
    unless:
      - type: basename
        regex: '(?i)(^|[\\/])vmmouse\.sys$'
  - id: genuineintel
    desc: GenuineIntel CPU vendor string
    crit: baseline
    mbc: B0009
    conf: 0.4
    if:
      type: text
      exact: GenuineIntel
  - id: authenticamd
    desc: AuthenticAMD CPU vendor string
    crit: baseline
    mbc: B0009
    conf: 0.4
    if:
      type: text
      exact: AuthenticAMD
composite_rules:
  - id: virtualbox-string
    desc: VirtualBox vendor string detection
    crit: suspicious
    mbc: B0009
    attack: T1497.001
    conf: 0.6
    any:
      - id: virtualbox-word
      - id: vbox-string
  - id: qemu-string
    desc: QEMU vendor string detection
    crit: suspicious
    mbc: B0009
    attack: T1497.001
    conf: 0.5
    any:
      - id: objectives/anti-analysis/vm-detect/vendor::vendor-qemu
      - id: qemu-lower
  - id: vm-hardware
    desc: VM-specific hardware strings
    crit: suspicious
    mbc: B0009
    attack: T1497.001
    conf: 0.6
    any:
      - id: vmxh-string
      - id: virtio-string
      - id: vmmouse-string
    unless:
      - id: metadata/binary/section/content::freebsd-kernel-image
  - id: cpu-vendor
    desc: CPU vendor string checks (Intel/AMD
    crit: baseline
    mbc: B0009
    conf: 0.5
    any:
      - id: genuineintel
      - id: authenticamd
