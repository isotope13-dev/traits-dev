defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1497.001
traits:
  - id: virtualbox-word
    desc: VirtualBox string detection
    crit: component
    mbc: B0009
    conf: 0.5
    if:
      type: text
      regex: (?i)VirtualBox
    unless:
      - id: metadata/signed/developer::intel-corporation
      - id: metadata/package/manifest/compat::virtualbox-platform-component
      - id: well-known/app/systemd::container-runtime-component-basename
      - type: text
        regex: application/x-virtualbox-[a-z0-9-]+
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: vbox-string
    desc: VBOX string detection
    crit: component
    mbc: B0032
    conf: 0.5
    if:
      type: text
      regex: (?i)\bvbox\b
    unless:
      - id: metadata/signed/developer::intel-corporation
      - id: metadata/package/manifest/compat::virtualbox-platform-component
      - id: well-known/app/systemd::container-runtime-component-basename
      - type: text
        regex: application/x-virtualbox-[a-z0-9-]+
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: qemu-lower
    desc: qemu lowercase string
    crit: notable
    mbc: B0009
    conf: 0.5
    if:
      type: text
      exact: qemu
    unless:
      - id: well-known/app/systemd::container-runtime-component-basename
      - id: well-known/lib/systemd::libsystemd-shared-library
  - id: vmxh-string
    desc: VMXH hardware string
    crit: notable
    mbc: B0009
    conf: 0.5
    if:
      type: text
      exact: VMXH
  - id: virtio-string
    desc: virtio hardware string
    crit: component
    mbc: B0009
    conf: 0.5
    for:
      - binaries
    if:
      type: text
      word: virtio
      case_insensitive: true
    unless:
      - id: metadata/package/manifest/compat::virtualbox-platform-component
      - type: metrics
        field: sections.count
        max: 0
      - id: metadata/vendor/identity/
      - id: well-known/app/systemd::container-runtime-component-basename
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: vmmouse-string
    desc: vmmouse hardware string
    crit: notable
    mbc: B0009
    conf: 0.5
    if:
      type: text
      regex: (?i)\bvmmouse\b
    unless:
      - type: basename
        regex: '(?i)(^|[\\/])vmmouse\.sys$'
      - id: well-known/app/systemd::container-runtime-component-basename
  - id: vmware-registry-path-marker
    desc: UTF-16 VMware registry path marker
    crit: component
    mbc: B0009
    conf: 0.92
    for: [pe, dll]
    if:
      type: raw
      regex: '(?i)V\x00M\x00W\x00A\x00R\x00E\x00'
  - id: virtualbox-registry-path-marker
    desc: UTF-16 VirtualBox registry path marker
    crit: component
    mbc: B0009
    conf: 0.92
    for: [pe, dll]
    if:
      type: raw
      regex: '(?i)V\x00i\x00r\x00t\x00u\x00a\x00l\x00B\x00o\x00x\x00'
composite_rules:
  - id: virtualbox-string
    desc: VirtualBox vendor string detection
    crit: notable
    mbc: B0009
    conf: 0.6
    any:
      - id: virtualbox-word
      - id: vbox-string
  - id: qemu-string
    desc: QEMU marker with multiple VM hardware probes
    crit: suspicious
    mbc: B0009
    conf: 0.5
    all:
      - id: emulator-hardware-pair
    any:
      - id: objectives/anti-analysis/vm-detect/vendor::vendor-qemu
      - id: qemu-lower
    unless:
      - id: well-known/tool/sysadmin/kubernetes/minikube
      - id: well-known/app/systemd::container-runtime-component-basename
      - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - id: well-known/app/gns3::gns3-gui-package-member
      - id: well-known/app/reg-devshell::developer-shell-application
      - id: well-known/lib/systemd::libsystemd-shared-library
  - id: vm-hardware
    desc: VM-specific hardware strings
    crit: suspicious
    mbc: B0009
    conf: 0.6
    # One device name such as virtio is common in kernels, container
    # runtimes, and protocol schemas. VM inference needs two independent
    # hardware markers.
    needs: 2
    any:
      - id: vmxh-string
      - id: virtio-string
      - id: vmmouse-string
    unless:
      - id: well-known/tool/sysadmin/kubernetes/minikube
      - id: metadata/vendor/identity/
      - id: well-known/app/systemd::container-runtime-component-basename
      - id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - id: well-known/app/gns3::gns3-gui-package-member
  - id: emulator-hardware-pair
    desc: Multiple emulator hardware markers
    crit: component
    mbc: B0009
    conf: 0.8
    needs: 2
    any:
      - id: vmxh-string
      - id: virtio-string
      - id: vmmouse-string
  - id: multi-vendor-device-environment-probe
    desc: Multi-vendor VM and physical-drive probes
    crit: suspicious
    mbc: B0009
    conf: 0.97
    all:
      - id: vmware-registry-path-marker
      - id: virtualbox-registry-path-marker
      - id: objectives/impact/system/directory::physical-drive-unc
    unless:
      - id: well-known/tool/reverse-engineering/
      - id: well-known/tool/sysadmin/
      - id: metadata/vendor/identity/
