      type: text
      substr: "bool detect_emulator(void);"

  - id: qnx-cpp-phase0-call
    desc: QNX C++ phase[0] call
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "phases[0]();"

composite_rules:
  - id: qnx-cpp-emulator-phase-call
    desc: QNX C++ emulator phase call
    crit: suspicious
    conf: 0.96
    all:
      - id: qnx-cpp-emulator-phase-decl
      - id: qnx-cpp-phase0-call
