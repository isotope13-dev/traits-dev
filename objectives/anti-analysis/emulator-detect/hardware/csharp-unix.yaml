defaults:
  platforms: [unix, appliance, windows]
  for: [csharp]
  attack: T1497.001

traits:
  - id: dotnet-vm-vendor-strings
    desc: .NET VM vendor strings
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: VirtualBox

  - id: dotnet-qemu-proc-probes
    desc: .NET QEMU proc probes
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: qemu,command-line

  - id: dotnet-cpuinfo-vm-probe
    desc: .NET cpuinfo VM probe
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /proc/cpuinfo

  - id: dotnet-timing-emulation-check
    desc: .NET timing emulation check
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'DetectTimingAnomalies[\s\S]{0,320}Stopwatch'

composite_rules:
  - id: dotnet-emulator-detection-suite
    desc: .NET emulator detection suite
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/sysinfo/network::dotnet-network-interface-enumeration
      - id: dotnet-vm-vendor-strings
      - id: dotnet-qemu-proc-probes
      - id: dotnet-cpuinfo-vm-probe
      - id: dotnet-timing-emulation-check
