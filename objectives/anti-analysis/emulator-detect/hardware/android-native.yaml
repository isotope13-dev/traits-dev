defaults:
  platforms: [android, unix]
  for: [c, cpp, elf]
  attack: T1497.001

traits:
  - id: android-qemud-socket-path
    desc: Android qemud socket path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "/dev/socket/qemud"

composite_rules:
  - id: android-qemu-emulator-check
    desc: Android QEMU emulator check
    crit: suspicious
    conf: 0.94
    all:
      - id: android-qemud-socket-path
      - id: qemu-lower
