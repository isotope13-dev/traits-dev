defaults:
  attack: T1497.001
  mbc: B0009
  platforms: [unix, windows]
  for: [binaries]
traits:
- id: virtualization-manager-context--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: virt-host-validate
    case_insensitive: true
  count_max: 1016211
- id: virtualization-manager-context--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: qemu-system
    case_insensitive: true
  count_max: 1016212
- id: virtualization-manager-context--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: VBoxManager
    case_insensitive: true
  count_max: 1016213
- id: virtualization-manager-context--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: qemu-kvm
    case_insensitive: true
  count_max: 1016214
composite_rules:
- id: detect-vendors
  desc: VM detection via vendor/product strings
  crit: suspicious
  conf: 0.9
  needs: 3
  any:
  - id: objectives/anti-analysis/vm-detect/vendor::vendor-vmware
  - id: objectives/anti-analysis/emulator-detect/hardware::virtualbox-string
  - id: objectives/anti-analysis/emulator-detect/hardware::qemu-string
  - id: micro-behaviors/os/sysinfo/hardware::smbios-token
  - id: objectives/anti-analysis/vm-detect/vendor::vendor-hyperv
  unless:
  - id: metadata/package/manifest/compat::virtualbox-platform-component
  - id: metadata/vendor/identity/
  - id: well-known/lib/electron/
  downgrade:
    any:
    - id: objectives/anti-analysis/emulator-detect/vendor-strings
    - id: metadata/signed/developer
    - id: micro-behaviors/hardware/block/device/
- id: comprehensive
  desc: Virtual machine environment detection
  crit: suspicious
  conf: 0.9
  needs: 3
  any:
  - id: objectives/anti-analysis/vm-detect/vendor::vendor-vmware
  - id: objectives/anti-analysis/emulator-detect/hardware::virtualbox-string
  - id: objectives/anti-analysis/emulator-detect/hardware::qemu-string
  - id: micro-behaviors/os/sysinfo/hardware::smbios-token
  - id: objectives/anti-analysis/emulator-detect/hardware::vm-hardware
  unless:
  - id: metadata/package/manifest/compat::virtualbox-platform-component
  - id: metadata/vendor/identity/
  - id: well-known/lib/electron/
  downgrade:
    any:
    - id: objectives/anti-analysis/emulator-detect/vendor-strings
