defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1497.001
  mbc: B0009

traits:
  - id: encoded-analysis-tool-procmon
    desc: Encoded Process Monitor probe
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\bprocmon\b'

  - id: encoded-analysis-tool-procexp
    desc: Encoded Process Explorer probe
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\bprocexp\b'

  - id: encoded-analysis-tool-debugger
    desc: Encoded debugger probe names
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(x64dbg|x32dbg|ollydbg|windbg)\b'

  - id: encoded-analysis-tool-network
    desc: Encoded network analysis tool names
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)\b(wireshark|fiddler|httpdebugger|fakenet)\b'

  - id: encoded-vm-artifact-vmware
    desc: Encoded VMware artifact probe
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)SOFTWARE\\VMware, Inc\\VMware Tools'

  - id: encoded-vm-artifact-virtualbox
    desc: Encoded VirtualBox artifact probe
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)SOFTWARE\\Oracle\\VirtualBox Guest Additions'

  - id: encoded-vm-artifact-services
    desc: Encoded VirtualBox service probes
    crit: notable
    conf: 0.98
    if:
      type: encoded
      encoding: xor
      regex: '(?i)SYSTEM\\CurrentControlSet\\Services\\VBox(Guest|SF|Video)'

composite_rules:
  - id: encoded-analysis-tool-catalog
    desc: Encoded analysis tool catalog
    crit: suspicious
    conf: 0.99
    any:
      - id: encoded-analysis-tool-procmon
      - id: encoded-analysis-tool-procexp
      - id: encoded-analysis-tool-debugger
      - id: encoded-analysis-tool-network
    needs: 3

  - id: encoded-vm-artifact-probe-set
    desc: Encoded VM artifact probe set
    crit: suspicious
    conf: 0.99
    any:
      - id: encoded-vm-artifact-vmware
      - id: encoded-vm-artifact-virtualbox
      - id: encoded-vm-artifact-services
    needs: 2

  - id: encoded-analysis-environment-gate
    desc: Encoded VM and analyst environment gate
    crit: hostile
    conf: 0.99
    all:
      - id: encoded-analysis-tool-catalog
      - id: encoded-vm-artifact-probe-set

