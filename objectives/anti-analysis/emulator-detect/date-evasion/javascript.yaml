defaults:
  platforms: [windows, unix]
traits:
- id: js-date-setter-getter-check
  desc: Checks if Date setter works (anti-emulation)
  crit: suspicious
  conf: 0.8
  for: [javascript]
  if:
    type: text
    regex: '\b(get|set)(UTC)?FullYear\b'
  downgrade:
    any:
    - id: metadata/library/structure::js-large-module-bundle
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
composite_rules: []
