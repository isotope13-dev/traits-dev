defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
- id: js-date-setter-call
  desc: Calls a Date year setter
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'setFullYear\s*\([^;\n]{0,80}\)'
- id: js-date-getter-conditional-compare
  desc: Conditionally compares a Date year getter
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'if\s*\([^\n]{0,120}getFullYear\s*\(\)[^\n]{0,50}!=='
composite_rules:
- id: js-date-setter-getter-check
  desc: Verifies Date setter with getter comparison
  crit: suspicious
  conf: 0.8
  all:
  - id: js-date-setter-call
  - id: js-date-getter-conditional-compare
  near_lines: 3
  unless:
  - id: micro-behaviors/process/interpreter/vm/
  - id: metadata/library/runtime/
  - id: metadata/library/structure/
  - id: well-known/lib/pdfjs/
  - id: metadata/package/testing/
  - id: metadata/package/quality/recognized-contexts::mdn-date-reference-context
