defaults:
  platforms: [windows, unix]
traits:
- id: js-date-setter-getter-check
  desc: Checks if Date setter works (anti-emulation)
  # The anti-emulation idiom specifically SETS the year then GETs it to
  # verify the setter works. getFullYear alone appears in any date-aware
  # library (date-fns, Moment, luxon, cookie parsers, etc.) — restrict
  # to the setter form which is the distinctive indicator.
  crit: suspicious
  conf: 0.8
  for: [javascript]
  # Requires BOTH setter and getter within 200 chars — the pattern
  # sets the year then immediately reads it back to verify the setter
  # worked. setFullYear or getFullYear alone is standard date math.
  if:
    type: text
    regex: 'set(UTC)?FullYear.{0,200}get(UTC)?FullYear|get(UTC)?FullYear.{0,200}set(UTC)?FullYear'
  unless:
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: metadata/library/runtime::acquire-vscode-api
  - id: metadata/library/structure::js-vite-rollup-vendor-chunk
  - id: metadata/library/structure::js-mermaid-bundle
  - type: text
    substr: FindProxyForURL
composite_rules: []
