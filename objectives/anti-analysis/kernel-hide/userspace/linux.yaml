# Rootkit Detection - Linux Userspace
# MBC: B0003 (Rootkit)
# ATT&CK: T1014
defaults:
  platforms: [linux]
  for: [elf]
traits:
  - id: hide-pid
    desc: hide_pid function
    crit: suspicious
    conf: 0.85
    mbc: "B0003"
    attack: "T1014"
    if:
      type: string
      substr: "hide_pid"
  - id: hide-file
    desc: hide_file function
    crit: suspicious
    conf: 0.85
    mbc: "B0003"
    attack: "T1014"
    if:
      type: string
      substr: "hide_file"
  # === Directory listing hooking ===
  # Note: Rootkit libraries EXPORT malicious readdir/getdents to intercept calls.
  # Normal binaries only IMPORT these from libc. We detect this by requiring
  # the binary has exports (most normal binaries like fd have 0 exports).
  - id: has-exports
    # === LD_PRELOAD Injection ===
    # Removed ld-preload-file duplicate - use objectives/anti-analysis/kernel-hide/userspace::ld-so-preload-file

    desc: Binary exports symbols
    crit: notable
    conf: 0.5
    if:
      type: exports_count
      min: 1
  # === Process Filtering Functions ===
  - id: filter-process-name-core
    desc: Process filter or hide function
    crit: suspicious
    conf: 0.85
    mbc: "B0003"
    attack: "T1014"
    if:
      type: string
      regex: "(process_to_filter|filter_process|hide_process)"
  - id: filter-process-name-alt
    desc: Additional process filter function
    crit: suspicious
    conf: 0.85
    mbc: "B0003"
    attack: "T1014"
    if:
      type: string
      regex: "(should_hide|filtered_process)"
  - id: original-readdir-backup
    desc: Backed-up original readdir function
    crit: suspicious
    conf: 0.85
    mbc: "F0015"
    attack: "T1014"
    if:
      type: string
      regex: "^(orig|original)_readdir$"
  - id: rootkit-so-name-set
    desc: Hidden rootkit shared object names
    crit: suspicious
    conf: 0.94
    mbc: "F0005"
    attack: "T1564.001"
    count_min: 3
    if:
      type: string
      regex: '^(pkit|fkit|skit)(arm)?\.so$'
  - id: spirit-hidden-name
    desc: Hidden Spirit name marker
    crit: component
    conf: 0.9
    mbc: "F0005"
    attack: "T1564.001"
    if:
      type: string
      regex: '^spirit(?:-arm)?$'
  - id: spirit-toolchain-set-a
    desc: Hidden Spirit toolchain set A
    crit: component
    conf: 0.9
    mbc: "F0005"
    attack: "T1564.001"
    count_min: 2
    if:
      type: string
      regex: '^(libgcc_a|gcclib|crtend_b)$'
  - id: spirit-toolchain-set-b
    desc: Hidden Spirit toolchain set B
    crit: component
    conf: 0.9
    mbc: "F0005"
    attack: "T1564.001"
    count_min: 2
    if:
      type: string
      regex: '^(crtres_c|adxintrin_b|\.adxintrin_b|gcc_[yp])$'
composite_rules:
  - id: filter-process-name
    desc: Process filtering function reference
    crit: suspicious
    conf: 0.85
    mbc: "B0003"
    attack: "T1014"
    any:
      - id: filter-process-name-core
      - id: filter-process-name-alt
  - id: spirit-hidden-name-set
    desc: Hidden Spirit component names
    crit: suspicious
    conf: 0.95
    mbc: "F0005"
    attack: "T1564.001"
    all:
      - id: spirit-hidden-name
    any:
      - id: spirit-toolchain-set-a
      - id: spirit-toolchain-set-b
  - id: hidden-entry-list
    desc: Embedded hidden-entry filter list
    crit: suspicious
    conf: 0.96
    mbc: "F0005"
    attack: "T1564.001"
    all:
      - id: objectives/anti-analysis/kernel-hide/userspace::ld-so-preload-file
    any:
      - id: rootkit-so-name-set
      - id: spirit-hidden-name-set
  # Composite for readdir hook detection - requires the binary to have exports
  # (shared libraries export functions, normal executables typically don't)
  - id: readdir-hook
    desc: Exported readdir function (directory listing hook)
    crit: suspicious
    conf: 0.85
    mbc: "F0015"
    attack: "T1014"
    all:
      - id: micro-behaviors/fs/directory/readdir::readdir-readdir
      - id: has-exports
  - id: getdents-hook
    desc: Exported getdents function (directory listing hook)
    crit: suspicious
    conf: 0.85
    mbc: "F0015"
    attack: "T1014"
    all:
      - id: micro-behaviors/fs/directory/readdir::readdir-getdents
      - id: has-exports
  # Direct hooked library rootkit (exported function hooking)
  - id: hooked-library
    desc: Userspace rootkit library with hooked functions
    crit: suspicious
    conf: 0.9
    mbc: "F0015"
    attack: "T1014"
    all:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
    any:
      - id: readdir-hook
      - id: getdents-hook
  # Linux userspace rootkit (migrated from YARA)
  - id: rootkit
    desc: Linux rootkit patterns
    crit: suspicious
    conf: 0.66
    mbc: "B0003"
    attack: "T1014"
    needs: 2
    any:
      - id: micro-behaviors/data/text/malware::rootkit-word
      - id: hide-pid
      - id: hide-file
      - id: objectives/anti-analysis/kernel-hide/userspace::ld-so-preload-file
      - id: readdir-hook
      - id: getdents-hook
  # === HOSTILE: Process-Hiding Rootkit Library ===
  # Detects userspace rootkit libraries that actively hide processes
  # Pattern: exported readdir hook + process filtering logic + backed-up original functions
  # Complexity: for(+1) + all(+3) = 4 >= 4 ✓
  - id: process-hiding-rootkit
    desc: Process-hiding rootkit library
    crit: hostile
    conf: 0.95
    mbc: "B0003"
    attack: "T1014"
    all:
      - id: hooked-library
      - id: filter-process-name
      - id: original-readdir-backup
  - id: file-hiding-rootkit
    desc: File-hiding rootkit library
    crit: hostile
    conf: 0.96
    mbc: "B0003"
    attack: "T1014"
    all:
      - id: hooked-library
      - id: objectives/anti-analysis/kernel-hide/userspace::ld-so-preload-file
      - id: original-readdir-backup
    any:
      - id: micro-behaviors/data/string/operations::strncmp
      - id: micro-behaviors/fs/path/extension::so
