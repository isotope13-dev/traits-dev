defaults:
  platforms: [unix, windows, macos]

composite_rules:
  - id: ksymless-rootkit
    desc: ksymless kernel rootkit signature
    crit: hostile
    conf: 1.0
    all:
      - id: micro-behaviors/os/kernel/module::ksymless-trampoline-stager
      - id: micro-behaviors/os/kernel/module::ksymless-find-address-up
    any:
      - id: objectives/anti-analysis/kernel-hide/rootkit::idr-pid-hiding
      - id: objectives/anti-analysis/kernel-hide/rootkit::procfs-seq-ops-hooking
