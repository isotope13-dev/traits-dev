defaults:
  attack: "T1014"
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: hideme-ioctl
    desc: Rootkit HIDEME IOCTL code
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      substr: "IOCTL_ROOTKIT_HIDEME"
  - id: hideme-dispatch
    desc: HIDEME IOCTL dispatch case
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      substr: "case IOCTL_ROOTKIT_HIDEME:"
  - id: hideme-controller
    desc: HideMe controller routine
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      word: "HideMe"
  - id: eprocess-layout
    desc: EPROCESS hiding structure access
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      substr: "EPROCESS"
composite_rules:
  - id: windows-process-hiding-rootkit
    desc: Windows process-hiding rootkit control
    crit: hostile
    conf: 0.99
    all:
      - id: hideme-ioctl
      - id: hideme-dispatch
    any:
      - id: hideme-controller
      - id: eprocess-layout
