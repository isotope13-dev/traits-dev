# Rootkit magic markers
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
traits:
  - id: magic
    desc: Magic marker string
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: "\b(ebpf|bpf|rootkit|hide)[_-]?magic\b"
      case_insensitive: true
