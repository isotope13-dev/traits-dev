# Rootkit magic markers
defaults:
  for: [text, shell, ruby, python, javascript, php, powershell, vbs, applescript]
traits:
  - id: magic
    desc: Magic marker string
    crit: notable
    conf: 0.6
    if:
      type: string
      regex: "\b(ebpf|bpf|rootkit|hide)[_-]?magic\b"
      case_insensitive: true
