# OpenBSD Kernel Module (LKM) Backdoor Detection
# ATT&CK: T1014 (Rootkit), T1068 (Privilege Escalation)
# Based on OpenBSD LKM API (pre-3.x) using sys/lkm.h
defaults:
  for: [c]
  platforms: [unix]

traits:
  # OPENBSD LKM HEADERS
  - id: sys-lkm-header
    desc: OpenBSD loadable kernel module header
    crit: suspicious
    conf: 0.95
    attack: "T1014"
    if:
      type: raw
      substr: "sys/lkm.h"

  - id: sys-syscallargs-header
    desc: OpenBSD syscall arguments header
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: "sys/syscallargs.h"

  # OPENBSD LKM LIFECYCLE MACROS
  - id: mod-syscall-macro
    desc: OpenBSD MOD_SYSCALL syscall registration
    crit: suspicious
    conf: 0.98
    attack: "T1014"
    if:
      type: raw
      substr: "MOD_SYSCALL"

  - id: dispatch-macro
    desc: OpenBSD LKM DISPATCH lifecycle handler
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: "DISPATCH("

  - id: lkm-table-struct
    desc: OpenBSD lkm_table structure parameter
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: "lkm_table"

  # OPENBSD SYSCALL ARGUMENT ACCESS
  - id: scarg-macro
    desc: BSD SCARG syscall argument extraction
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: "SCARG("

  # PROCESS LOOKUP
  - id: pfind-call
    desc: Kernel process lookup by PID
    crit: notable
    conf: 0.9
    if:
      type: raw
      substr: "pfind("

  # OPENBSD CREDENTIAL CHAIN
  - id: pc-ucred-access
    desc: OpenBSD pc_ucred credential chain access
    crit: suspicious
    conf: 0.95
    attack: "T1068"
    if:
      type: raw
      substr: "pc_ucred"

  - id: p-cred-access
    desc: BSD process credential structure access
    crit: notable
    conf: 0.9
    attack: "T1068"
    if:
      type: raw
      substr: "p_cred"

composite_rules:
  - id: openbsd-kmod-headers
    desc: OpenBSD kernel module header set
    crit: suspicious
    conf: 0.95
    all:
      - id: sys-lkm-header
    any:
      - id: sys-syscallargs-header
      - id: dispatch-macro
      - id: lkm-table-struct

  - id: openbsd-syscall-registration
    desc: OpenBSD custom syscall registration
    crit: suspicious
    conf: 0.98
    attack: "T1014"
    all:
      - id: mod-syscall-macro
      - id: objectives/anti-analysis/kernel-hide/lkm::sysent-struct-decl

  - id: openbsd-privesc
    desc: OpenBSD kernel credential manipulation
    crit: suspicious
    conf: 0.95
    attack: "T1068"
    any:
      - id: pc-ucred-access
      - id: objectives/anti-analysis/kernel-hide/lkm::cr-uid-manipulation

  - id: openbsd-kmod-backdoor
    desc: OpenBSD kernel module backdoor detected
    crit: hostile
    conf: 0.98
    attack: "T1014"
    all:
      - id: sys-lkm-header
    needs: 1
    any:
      - id: openbsd-syscall-registration
      - id: openbsd-privesc
