# Security Product Detection via WMI SecurityCenter2
# Queries for installed AV, firewall, and antispyware products
# MBC: B0013 (Security Product Detection)
defaults:
  for: [pe, dll, csharp]
  crit: component
  conf: 0.9
  mbc: "B0013"
  platforms: [windows]
traits:
  - id: security-center2-namespace
    desc: WMI SecurityCenter2 namespace
    if:
      type: string_value
      regex: 'root[/\\]SecurityCenter2'
  - id: antivirus-product-class
    desc: WMI AntivirusProduct class query
    if:
      type: string_value
      substr: AntivirusProduct
  - id: firewall-product-class
    desc: WMI FirewallProduct class query
    if:
      type: string_value
      substr: FirewallProduct
  - id: antispyware-product-class
    desc: WMI AntiSpywareProduct class query
    if:
      type: string_value
      substr: AntiSpywareProduct
  - id: display-name-field
    desc: Security product displayName field
    crit: baseline
    if:
      type: string_value
      substr: displayName
composite_rules:
  - id: security-product-enumeration
    desc: Security product enumeration via WMI
    crit: suspicious
    conf: 0.95
    attack: "T1518.001"
    all:
      - id: security-center2-namespace
    any:
      - id: antivirus-product-class
      - id: firewall-product-class
      - id: antispyware-product-class
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
