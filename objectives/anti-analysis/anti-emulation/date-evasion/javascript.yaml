defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: js-date-setter-getter-check
    desc: Checks if Date setter works (anti-emulation)
    crit: suspicious
    conf: 0.8
    for: [javascript]
    if:
      type: raw
      regex: 'set(UTC)?FullYear[\s\S]{1,100}if[\s\S]{1,100}get(UTC)?FullYear'
