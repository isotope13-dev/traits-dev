# IP Range Geofencing
# Detects malware that validates target by comparing IP addresses against
# hardcoded ranges to restrict execution to specific countries/regions.
# ATT&CK: T1614 (System Location Discovery)
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux, macos]
  attack: T1614
  crit: notable
  conf: 0.85

traits:
- id: ip-range-comparison--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (?i)(IsTargetCountry|target[-_]?country)

  count_max: 1012909
- id: ip-range-comparison--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: (?i)(check[-_]?(country|region|ip[-_]?range))

  count_max: 1012910
  unless:
  - id: metadata/file/extension::linux-kernel-package-artifact-basename
- id: hardcoded-ip-range-start
  desc: Hardcoded IP range start address
  crit: component
  conf: 0.75
  if:
    type: text
    regex: \b\d{1,3}\.\d{1,3}\.0\.0\b
    is: external_ip

- id: self-destruct-not-target--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (?i)(self[-_]?destruct|SelfDestruct|self[-_]?delete).{0,80}(target|country)

  count_max: 1012912
- id: self-destruct-not-target--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (?i)(self[-_]?destruct|SelfDestruct|self[-_]?delete).{0,80}(region|range)

  count_max: 1012913
- id: operation-restricted-message--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: (?i)(operation|execution).{0,40}(restricted|limited).{0,40}(range|region)

  count_max: 1012914
- id: operation-restricted-message--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: (?i)(operation|execution).{0,40}(restricted|limited).{0,40}(country)

  count_max: 1012915
- id: target-verify-log
  desc: Target verification log file creation
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (?i)target[-_]?verify\.(log|txt)

composite_rules:
- id: ip-range-geofencing
  desc: IP range geofencing with conditional execution
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/communications/ip/parse::ip-to-long-conversion
  - id: ip-range-comparison
  any:
  - id: self-destruct-not-target
  - id: operation-restricted-message
  - id: target-verify-log
  - id: hardcoded-ip-range-start

- id: geofencing-with-self-destruct
  desc: Geofencing with self-destruct on mismatch
  crit: suspicious
  conf: 0.95
  all:
  - id: self-destruct-not-target
  any:
  - id: ip-range-comparison
  - id: operation-restricted-message
  - id: target-verify-log
- id: ip-range-comparison
  desc: IP address range comparison logic
  crit: baseline
  conf: 0.82
  any:
  - id: ip-range-comparison--rx-1
  - id: ip-range-comparison--rx-2
  unless:
  - id: metadata/file/text/catalog::uproc-tools-catalog
- id: self-destruct-not-target
  desc: Self-destruct when not in target region
  crit: suspicious
  conf: 0.92
  any:
  - id: self-destruct-not-target--rx-3
  - id: self-destruct-not-target--rx-4
- id: operation-restricted-message
  desc: Operation restricted to geographic range message
  crit: suspicious
  conf: 0.95
  any:
  - id: operation-restricted-message--rx-5
  - id: operation-restricted-message--rx-6
