# IP Range Geofencing
# Detects malware that validates target by comparing IP addresses against
# hardcoded ranges to restrict execution to specific countries/regions.
# ATT&CK: T1614 (System Location Discovery)
defaults:
  for: [binaries, scripts]
  platforms: [windows, linux, macos]
  attack: T1614
  crit: notable
  conf: 0.85

traits:
  - id: ip-range-comparison
    desc: IP address range comparison logic
    conf: 0.82
    unless:
      - id: metadata/file/text::uproc-tools-catalog
    if:
      type: text
      regex: (?i)(IsTargetCountry|target[-_]?country|check[-_]?(country|region|ip[-_]?range))

  - id: ip-to-long-conversion
    desc: IP-to-numeric conversion for range check
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?i)(IPToLong|ip[-_]?to[-_]?(int|long|number)|inet[-_]?aton)

  - id: hardcoded-ip-range-start
    desc: Hardcoded IP range start address
    crit: component
    conf: 0.75
    if:
      type: text
      regex: \b\d{1,3}\.\d{1,3}\.0\.0\b
      is: external_ip

  - id: self-destruct-not-target
    desc: Self-destruct when not in target region
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: (?i)(self[-_]?destruct|SelfDestruct|self[-_]?delete).{0,80}(target|country|region|range)

  - id: operation-restricted-message
    desc: Operation restricted to geographic range message
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)(operation|execution).{0,40}(restricted|limited).{0,40}(range|region|country)

  - id: target-verify-log
    desc: Target verification log file creation
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)target[-_]?verify\.(log|txt)

composite_rules:
  - id: ip-range-geofencing
    desc: IP range geofencing with conditional execution
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: ip-range-comparison
      - id: ip-to-long-conversion
      - id: self-destruct-not-target
      - id: operation-restricted-message
      - id: target-verify-log
      - id: hardcoded-ip-range-start

  - id: geofencing-with-self-destruct
    desc: Geofencing with self-destruct on mismatch
    crit: suspicious
    conf: 0.95
    all:
      - id: self-destruct-not-target
    any:
      - id: ip-range-comparison
      - id: operation-restricted-message
      - id: target-verify-log
