defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  attack: T1614
  mbc: B0007.003
traits:
- id: env-lc-all-check
  desc: Check LC_ALL environment variable
  crit: component
  conf: 0.5
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    substr: process.env.LC_ALL
- id: env-lc-messages-check
  desc: Check LC_MESSAGES environment variable
  crit: component
  conf: 0.5
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    substr: process.env.LC_MESSAGES
