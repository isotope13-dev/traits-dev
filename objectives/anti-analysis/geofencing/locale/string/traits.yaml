defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  attack: T1614
  mbc: B0007.003
traits:
- id: locale-ru-ru-underscore
  desc: Russian locale (ru_RU)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: "(^|[^A-Za-z0-9/.-])ru_RU([^A-Za-z0-9/.-]|$)"
  not:
  - substr: LANGS =
  - regex: "(?i)(language|languages|locale|i18n|translation).{0,80}ru_RU|ru_RU.{0,80}(Russian|language|locale)"
  - regex: "(?i)ru_RU.{0,40}\\.(mui|pri)(PK)?"
  - substr: "/ru_RU/"
- id: locale-ru-ru-dash
  desc: Russian locale (ru-RU)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: "(^|[^A-Za-z0-9/.-])ru-RU([^A-Za-z0-9/.-]|$)"
  not:
  - substr: LANGS =
  - regex: "(?i)(language|languages|locale|i18n|translation).{0,80}ru-RU|ru-RU.{0,80}(Russian|language|locale)"
  - substr: locale/lang/ru-RU
  - regex: "(?i)(import|from).{0,40}ru-RU"
  - regex: "(?i)ru-RU.{0,40}\\.(mui|pri)(PK)?"
  - substr: "/ru-RU/"
  - substr: ".ru-RU."
  unless:
  - id: well-known/lib/regula-facesdk/
- id: locale-uk-ua
  desc: Ukrainian locale (uk_UA/uk-UA)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: "(^|[^A-Za-z0-9/.-])uk[-_]UA([^A-Za-z0-9/.-]|$)"
  not:
  - substr: LANGS =
  - regex: "(?i)(language|languages|locale|i18n|translation).{0,80}uk[-_]UA|uk[-_]UA.{0,80}(Ukrainian|language|locale)"
  - regex: "(?i)uk[-_]UA.{0,40}\\.(mui|pri)(PK)?"
  - substr: "/uk-UA/"
  - substr: ".uk-UA."
  unless:
  - id: well-known/lib/regula-facesdk/
- id: locale-be-by
  desc: Belarusian locale (be_BY/be-BY)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: "(^|[^A-Za-z0-9/.-])be[-_]BY([^A-Za-z0-9/.-]|$)"
  not:
  - substr: LANGS =
  - regex: "(?i)(language|languages|locale|i18n|translation).{0,80}be[-_]BY|be[-_]BY.{0,80}(Belarusian|language|locale)"
- id: locale-kk-kz
  desc: Kazakh locale (kk_KZ/kk-KZ)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: "(^|[^A-Za-z0-9/.-])kk[-_]KZ([^A-Za-z0-9/.-]|$)"
  not:
  - substr: LANGS =
  - regex: "(?i)(language|languages|locale|i18n|translation).{0,80}kk[-_]KZ|kk[-_]KZ.{0,80}(Kazakh|language|locale)"
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: locale-fa-ir
  desc: Iranian locale (fa_IR/fa-IR)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: "(^|[^A-Za-z0-9])fa[-_]IR([^A-Za-z0-9]|$)"
  not:
  - substr: LANGS =
  - substr: setLanguage=function
  unless:
  - id: micro-behaviors/ui/help/
- id: locale-ko-kp
  desc: North Korean locale (ko_KP/ko-KP)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: "(^|[^A-Za-z0-9])ko[-_]KP([^A-Za-z0-9]|$)"
  not:
  - substr: setLanguage=function
  - regex: "(?i)(language|locale|i18n).{0,80}ko[-_]KP"
  - regex: "(?i)ko[-_]KP.{0,80}(Korean|language|locale)"
composite_rules:
- id: russian-locale
  desc: Russian locale string
  crit: component
  conf: 0.75
  any:
  - id: locale-ru-ru-underscore
  - id: locale-ru-ru-dash
- id: cis-locale
  desc: CIS region locale string
  crit: component
  conf: 0.75
  any:
  - id: russian-locale
  - id: locale-uk-ua
  - id: locale-be-by
  - id: locale-kk-kz
