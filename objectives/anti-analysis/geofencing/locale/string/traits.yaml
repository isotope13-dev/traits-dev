defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  attack: T1614
  mbc: B0007.003
traits:
- id: locale-uk-ua
  desc: Ukrainian locale (uk_UA/uk-UA)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  if:
    # A bare locale token also occurs in language-picker catalogs.  Require
    # code that feeds it from a browser/native locale API instead.
    type: raw
    regex: "(?i)(navigator\\.language|setlocale\\()[^;\\r\\n]{0,48}uk[-_]UA"
  not:
  - substr: LANGS =
  - regex: "(?i)(language|languages|locale|i18n|translation).{0,80}uk[-_]UA|uk[-_]UA.{0,80}(Ukrainian|language|locale)"
  - regex: "(?i)uk[-_]UA.{0,40}\\.(mui|pri)(PK)?"
  - substr: "/uk-UA/"
  - substr: ".uk-UA."
  unless:
  - id: well-known/lib/regula-facesdk/
- id: locale-be-by
  desc: Belarusian locale (be_BY/be-BY)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: "(^|[^A-Za-z0-9/.-])be[-_]BY([^A-Za-z0-9/.-]|$)"
  not:
  - substr: LANGS =
  - regex: "(?i)(language|languages|locale|i18n|translation).{0,80}be[-_]BY|be[-_]BY.{0,80}(Belarusian|language|locale)"
- id: locale-kk-kz
  desc: Kazakh locale (kk_KZ/kk-KZ)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: "(^|[^A-Za-z0-9/.-])kk[-_]KZ([^A-Za-z0-9/.-]|$)"
  not:
  - substr: LANGS =
  - regex: "(?i)(language|languages|locale|i18n|translation).{0,80}kk[-_]KZ|kk[-_]KZ.{0,80}(Kazakh|language|locale)"
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: locale-fa-ir
  desc: Iranian locale (fa_IR/fa-IR)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: "(^|[^A-Za-z0-9])fa[-_]IR([^A-Za-z0-9]|$)"
  not:
  - substr: LANGS =
  - substr: setLanguage=function
  unless:
  - id: micro-behaviors/ui/help/
- id: closure-dependency-locale-catalog
  desc: Google Closure dependency locale catalog
  crit: component
  conf: 0.95
  for:
  - javascript
  if:
    type: text
    substr: 'goog.addDependency('
- id: locale-ko-kp
  desc: North Korean locale (ko_KP/ko-KP)
  crit: component
  conf: 0.7
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: "(^|[^A-Za-z0-9])ko[-_]KP([^A-Za-z0-9]|$)"
  not:
  - substr: setLanguage=function
  - regex: "(?i)(language|locale|i18n).{0,80}ko[-_]KP"
  - regex: "(?i)ko[-_]KP.{0,80}(Korean|language|locale)"
composite_rules:
- id: cis-locale
  desc: CIS region locale string
  crit: component
  conf: 0.75
  any:
  - id: metadata/file/profile/locale::russian-locale
  - id: locale-uk-ua
  - id: locale-be-by
  - id: locale-kk-kz
