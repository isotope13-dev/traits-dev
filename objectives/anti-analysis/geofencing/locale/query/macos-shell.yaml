defaults:
  platforms: [unix]
  for: [shell]
  attack: T1614.001

traits:
  - id: shell-macos-countrycode-read
    desc: Shell reads macOS CountryCode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: defaults read com.apple.International CountryCode

  - id: shell-region-allowlist-exit
    desc: Shell region allowlist exit
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'US.{0,40}CA.{0,40}GB[\s\S]{0,220}exit 42'

composite_rules:
  - id: shell-macos-region-gate
    desc: Shell macOS region gate
    crit: hostile
    conf: 0.98
    all:
      - id: shell-macos-countrycode-read
      - id: shell-region-allowlist-exit
