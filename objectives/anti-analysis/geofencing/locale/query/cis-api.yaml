# Locale-querying API paired with CIS-country-code cluster.
#
# A binary that calls Windows locale-discovery APIs (GetUserDefaultLCID,
# GetSystemDefaultLCID, GetLocaleInfo, GetUserGeoID) AND embeds a
# cluster of CIS country codes (RU, BY, UA, KZ, KG, MD, TJ, UZ, AM, AZ)
# in nearby strings is almost certainly geofencing payload execution
# — either skipping CIS targets (typical for ransomware avoiding
# Russia/Belarus) or restricting to them (banking trojans, regional
# crimeware).
#
# Pure CIS country-code cluster on its own is already covered by
# `objectives/anti-analysis/geofencing/region/cluster::cis-country-codes`.
# This rule adds the "actively reads the locale" leg, which is what
# turns embedded country names from data-table noise into runtime
# geofencing.
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1614"
  mbc: "B0007.003"

composite_rules:
  - id: locale-api-with-cis-cluster
    desc: Locale-API call paired with CIS country codes
    crit: suspicious
    conf: 0.93
    all:
      - id: objectives/anti-analysis/geofencing/region/cluster::cis-country-codes
    any:
      - id: micro-behaviors/os/sysinfo/platform/locale::get-locale-info
      - id: micro-behaviors/os/sysinfo/platform/locale::get-user-default-lcid
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::microsoft-windows
      - id: well-known/tool/development/gnat
      - id: metadata/library/runtime::cygwin-runtime
      - id: metadata/binary/framework::electron-desktop-runtime
