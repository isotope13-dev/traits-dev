defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  attack: T1614
  mbc: B0007.003
traits:
- id: env-lang-check
  desc: Check LANG environment variable
  crit: component
  conf: 0.5
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    substr: process.env.LANG
- id: env-language-check
  desc: Check LANGUAGE environment variable
  crit: component
  conf: 0.5
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    substr: process.env.LANGUAGE
