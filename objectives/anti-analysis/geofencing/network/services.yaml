defaults:
  platforms: [windows, linux, macos]
  for: [scripts, binaries, source]
  attack: T1614
  mbc: B0007.003

composite_rules:
  - id: primary-public-geo-api-cluster
    desc: Primary public geolocation API cluster
    crit: notable
    conf: 0.9
    needs: 2
    any:
      - id: micro-behaviors/communications/http/ip-discovery::ip-api-com
      - id: micro-behaviors/communications/http/ip-discovery::ipwho-is
      - id: micro-behaviors/communications/http/ip-discovery::ipinfo-io
    unless:
      - id: well-known/tool/detection/security-scanner/
  - id: secondary-public-geo-api-cluster
    desc: Secondary public geolocation API cluster
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/ip-discovery::ipapi-co
      - id: micro-behaviors/communications/http/ip-discovery::geoplugin-net
  - id: multi-public-geo-api-check
    desc: Multiple public geolocation API checks
    crit: suspicious
    conf: 0.94
    all:
      - id: primary-public-geo-api-cluster
      - id: secondary-public-geo-api-cluster
  - id: geo-api-target-country-gate
    desc: Public geolocation country execution gate
    crit: hostile
    conf: 0.98
    all:
      - id: multi-public-geo-api-check
      - id: objectives/anti-analysis/geofencing/region/cluster::asia-africa-country-code-cluster
  - id: signed-unknown-pe-geo-cloud-profile
    desc: Signed unknown PE profiles external IP and contacts cloud infrastructure
    crit: hostile
    conf: 0.96
    platforms: [windows]
    for: [pe, dll]
    attack: T1036.004,T1614,T1105
    all:
      - id: objectives/evasion/masquerade/cert::signed-unknown-pe-multi-geo-profile
      - id: micro-behaviors/communications/http/url/cloud::gcs-url

  - id: obfuscated-powershell-public-ip-gate
    desc: Obfuscated PowerShell performs repeated public-IP checks
    crit: hostile
    conf: 0.98
    attack: T1016,T1614,T1027
    mbc: B0007.003,B0032
    for: [powershell]
    all:
      - id: micro-behaviors/communications/http/ip-discovery::fragmented-public-ip-service
      - id: objectives/anti-static/obfuscation/string/anomaly::powershell-obfuscated-byte-loader
