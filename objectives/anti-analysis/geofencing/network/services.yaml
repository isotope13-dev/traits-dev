defaults:
  platforms: [windows, linux, macos]
  for: [scripts, binaries, source]
  attack: T1614
  mbc: B0007.003

composite_rules:
  - id: primary-public-geo-api-cluster
    desc: Primary public geolocation API cluster
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: micro-behaviors/communications/http/ip-discovery::ip-api-com
      - id: micro-behaviors/communications/http/ip-discovery::ipwho-is
      - id: micro-behaviors/communications/http/ip-discovery::ipinfo-io
    unless:
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: secondary-public-geo-api-cluster
    desc: Secondary public geolocation API cluster
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/ip-discovery::ipapi-co
      - id: micro-behaviors/communications/http/ip-discovery::geoplugin-net
  - id: multi-public-geo-api-check
    desc: Multiple public geolocation API checks
    crit: suspicious
    conf: 0.94
    all:
      - id: primary-public-geo-api-cluster
      - id: secondary-public-geo-api-cluster
  - id: geo-api-target-country-gate
    desc: Public geolocation country execution gate
    crit: hostile
    conf: 0.98
    all:
      - id: multi-public-geo-api-check
      - id: objectives/anti-analysis/geofencing/region/cluster::asia-africa-country-code-cluster
