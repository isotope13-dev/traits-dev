defaults:
  platforms: [qnx, unix]
  for: [shell]
  attack: T1614

traits:
  - id: qnx-shell-ping-resolve-gate
    desc: QNX shell ping resolve gate
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "ping -c 1 -W 3 \"\\$BENCHMARK_HOST\"[\\s\\S]{0,120}grep -oP 'PING"

  - id: qnx-shell-private-ip-block
    desc: QNX shell private IP block
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'FIRST_OCTET[\s\S]{0,260}10[\s\S]{0,260}172[\s\S]{0,260}192'

composite_rules:
  - id: qnx-shell-network-geofence
    desc: QNX shell network geofence
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-shell-ping-resolve-gate
      - id: qnx-shell-private-ip-block
