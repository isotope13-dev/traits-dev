defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1480
  mbc: B0027

traits:
  - id: country-code-set
    desc: PowerShell country-code selection set
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?is)\$[A-Za-z_]\w*\s*=\s*@\(\s*["''][A-Z]{2}["''](\s*,\s*["''][A-Z]{2}["'']){7,}'
  - id: country-membership-branch
    desc: PowerShell country-membership execution branch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?is)\$[A-Za-z_]\w*\s*-contains\s*\$[A-Za-z_]\w*\s*\)\s*\{'

composite_rules:
  - id: powershell-country-selected-execution
    desc: PowerShell execution selected by geolocation
    crit: hostile
    conf: 0.98
    attack: T1480,T1614
    all:
      - id: objectives/discovery/host/geo::victim-profiling
      - id: country-code-set
      - id: country-membership-branch
    unless:
      - id: metadata/signed/platform/
