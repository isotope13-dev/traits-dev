defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1480
  mbc: B0003

traits:
  - id: windows-10-release-gate
    desc: Windows 10 release prefix gate
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(release\(\)|os\.release\(\))\.startsWith\(["'']10\.'

composite_rules:
  - id: windows-target-gated-activation
    desc: Execution gated on Windows target version
    crit: suspicious
    conf: 0.95
    all:
      - id: windows-10-release-gate
      - id: micro-behaviors/os/sysinfo/platform/runtime::js-platform-win32-check
