# Python script-side target/locale activation gating. Malware that only
# fires when running on the intended victim or in the intended locale.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1480
  mbc: B0003
  crit: suspicious

traits:
- id: fqdn-substring-gate--rx-2
  desc: Hostname-gating substring computer
  crit: component
  conf: 0.93
  if:
    type: string_literal
    case_insensitive: true
    exact: computer
- id: fqdn-substring-gate--rx-3
  desc: Hostname-gating substring internal
  crit: component
  conf: 0.93
  if:
    type: string_literal
    case_insensitive: true
    exact: internal
- id: fqdn-substring-gate--rx-5
  desc: Hostname-gating substring domain
  crit: component
  conf: 0.93
  if:
    type: string_literal
    case_insensitive: true
    exact: domain
- id: fqdn-substring-gate--rx-6
  desc: Hostname-gating substring local
  crit: component
  conf: 0.93
  if:
    type: string_literal
    case_insensitive: true
    exact: local
- id: fqdn-substring-gate--rx-7
  desc: Hostname-gating substring corp
  crit: component
  conf: 0.93
  if:
    type: string_literal
    exact: corp
- id: fqdn-substring-gate--rx-8
  desc: Hostname-gating substring fqdn
  crit: component
  conf: 0.93
  if:
    type: string_literal
    exact: fqdn
- id: locale-cyrillic-skip--rx-13
  desc: Belarus locale code marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: be_BY
- id: locale-cyrillic-skip--rx-14
  desc: Kazakhstan locale code marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: kk_KZ
- id: locale-cyrillic-skip--rx-15
  desc: Russian locale code marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: ru_RU
- id: locale-cyrillic-skip--rx-16
  desc: Ukrainian locale code marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: uk_UA
- id: domain-join-check
  desc: Workgroup/domain checked for corp join
  conf: 0.88
  for: [python, powershell]
  if:
    type: text
    regex: 'win32com\.client\.GetObject\s*\(\s*["'']winmgmts[^"'']{0,160}Domain'

- id: hostname-conditional-check
  desc: Host identity conditional check
  crit: component
  conf: 0.9
  if:
    type: tree-sitter
    kind: conditional
    regex: '(?s)(gethostname\s*\(|platform\.node\s*\(|["'']HOSTNAME["''])'
composite_rules:
- id: target-activation-gate
  desc: Execution gated on target identity (hostname/locale/domain)
  crit: notable
  conf: 0.94
  any:
  - id: hostname-termination-gate
  - id: fqdn-substring-gate
  - id: locale-cyrillic-skip
  - id: domain-join-check
  - id: objectives/anti-analysis/geofencing/locale
  - id: objectives/anti-analysis/geofencing/timezone
  - id: objectives/anti-analysis/geofencing/region
  - id: objectives/anti-analysis/geofencing/input
  - id: objectives/anti-analysis/geofencing/ip-range
- id: fqdn-substring-gate
  desc: Execution gated on FQDN substring
  crit: notable
  conf: 0.93
  unless:
  - id: well-known/app/open-webui-computer/
  all:
  - id: micro-behaviors/os/sysinfo/hostname::python-socket-gethostname
  near_bytes: 256
  any:
  - id: fqdn-substring-gate--rx-2
  - id: fqdn-substring-gate--rx-3
  - id: fqdn-substring-gate--rx-5
  - id: fqdn-substring-gate--rx-6
  - id: fqdn-substring-gate--rx-7
  - id: fqdn-substring-gate--rx-8
- id: hostname-termination-gate
  desc: Hostname or host-environment check terminates execution
  crit: notable
  conf: 0.92
  all:
  - id: hostname-conditional-check
  - id: micro-behaviors/process/exit/terminate::python-sys-exit-symbol
  - id: micro-behaviors/data/control-flow/analysis::string-literal-equality-check
  near_bytes: 400
- id: locale-cyrillic-skip
  desc: Python locale query paired with a CIS locale marker
  crit: baseline
  conf: 0.9
  all:
  - id: micro-behaviors/os/sysinfo/platform/locale::python-locale-query
  near_lines: 25
  any:
  - id: locale-cyrillic-skip--rx-13
  - id: locale-cyrillic-skip--rx-14
  - id: locale-cyrillic-skip--rx-15
  - id: locale-cyrillic-skip--rx-16
