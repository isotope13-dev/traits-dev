# Python script-side target/locale activation gating. Malware that only
# fires when running on the intended victim or in the intended locale.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1480
  mbc: B0003
  crit: suspicious

traits:
- id: string-literal-equality-check
  desc: String literal equality/membership check
  # Building block only. The previous version matched ANY quoted 3-63 char
  # string and surfaced suspicious on every Python file with a string literal.
  # The hostname-gating signal is the hostname-allowlist-equality composite,
  # which also requires a hostname query nearby.
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(==|!=|\bin\b)\s*[\[(]?\s*[''"][A-Za-z0-9.-]{3,63}[''"]'
- id: fqdn-substring-gate--rx-2
  desc: Hostname-gating substring computer
  crit: component
  conf: 0.93
  if:
    type: string_literal
    case_insensitive: true
    exact: computer
- id: fqdn-substring-gate--rx-3
  desc: Hostname-gating substring internal
  crit: component
  conf: 0.93
  if:
    type: string_literal
    case_insensitive: true
    exact: internal
- id: fqdn-substring-gate--rx-5
  desc: Hostname-gating substring domain
  crit: component
  conf: 0.93
  if:
    type: string_literal
    case_insensitive: true
    exact: domain
- id: fqdn-substring-gate--rx-6
  desc: Hostname-gating substring local
  crit: component
  conf: 0.93
  if:
    type: string_literal
    case_insensitive: true
    exact: local
- id: fqdn-substring-gate--rx-7
  desc: Hostname-gating substring corp
  crit: component
  conf: 0.93
  if:
    type: string_literal
    exact: corp
- id: fqdn-substring-gate--rx-8
  desc: Hostname-gating substring fqdn
  crit: component
  conf: 0.93
  if:
    type: string_literal
    exact: fqdn
- id: fqdn-substring-gate--rx-9
  desc: Hostname-gating substring host
  crit: component
  conf: 0.93
  if:
    type: string_literal
    exact: host
- id: hostname-query-getfqdn
  desc: Python getfqdn hostname query
  crit: component
  conf: 0.85
  if:
    id: micro-behaviors/os/sysinfo/hostname::getfqdn
- id: hostname-query-gethostname
  desc: Python gethostname query
  crit: component
  conf: 0.85
  if:
    type: text
    substr: gethostname
- id: hostname-query-env-hostname
  desc: Python reads HOSTNAME environment variable
  crit: component
  conf: 0.75
  if:
    type: text
    regex: 'os\.(getenv|environ\.get)\s*\(\s*["'']HOSTNAME["'']|os\.environ\s*\[\s*["'']HOSTNAME["'']\s*\]'
- id: hostname-query-env-computername
  desc: COMPUTERNAME environment marker
  crit: component
  conf: 0.75
  if:
    id: micro-behaviors/os/env/vars/system-info::computername-var
- id: hostname-query-platform-node
  desc: platform.node hostname marker
  crit: component
  conf: 0.75
  if:
    type: text
    substr: platform.node
- id: locale-exclusion-check--rx-10
  desc: locale default query marker
  crit: component
  conf: 0.92
  if:
    type: text
    case_insensitive: true
    substr: locale.getdefaultlocale
- id: locale-cyrillic-skip--rx-11
  desc: locale default query for regional skip
  crit: component
  conf: 0.9
  if:
    type: text
    substr: locale.getdefaultlocale
- id: locale-cyrillic-skip--rx-12
  desc: locale.getlocale query marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: locale.getlocale
- id: locale-cyrillic-skip--rx-13
  desc: Belarus locale code marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: be_BY
- id: locale-cyrillic-skip--rx-14
  desc: Kazakhstan locale code marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: kk_KZ
- id: locale-cyrillic-skip--rx-15
  desc: Russian locale code marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: ru_RU
- id: locale-cyrillic-skip--rx-16
  desc: Ukrainian locale code marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: uk_UA
- id: domain-join-check
  desc: Workgroup/domain checked for corp join
  conf: 0.88
  for: [python, powershell]
  if:
    type: text
    regex: 'win32com\.client\.GetObject\s*\(\s*["'']winmgmts[^"'']{0,160}Domain'

composite_rules:
- id: target-activation-gate
  desc: Execution gated on target identity (hostname/locale/domain)
  crit: notable
  conf: 0.94
  any:
  - id: hostname-allowed-list-equality
  - id: fqdn-substring-gate
  - id: locale-exclusion-check--rx-10
  - id: locale-cyrillic-skip
  - id: domain-join-check
  - id: objectives/anti-analysis/geofencing/locale
  - id: objectives/anti-analysis/geofencing/timezone
  - id: objectives/anti-analysis/geofencing/region
  - id: objectives/anti-analysis/geofencing/input
  - id: objectives/anti-analysis/geofencing/ip-range
- id: fqdn-substring-gate
  desc: Execution gated on FQDN substring
  crit: notable
  conf: 0.93
  unless:
  - id: well-known/app/open-webui-computer/
  all:
  - id: hostname-query-marker
  near_bytes: 256
  any:
  - id: fqdn-substring-gate--rx-2
  - id: fqdn-substring-gate--rx-3
  - id: fqdn-substring-gate--rx-5
  - id: fqdn-substring-gate--rx-6
  - id: fqdn-substring-gate--rx-7
  - id: fqdn-substring-gate--rx-8
  - id: fqdn-substring-gate--rx-9
- id: hostname-query-marker
  desc: Hostname query marker
  crit: component
  conf: 0.8
  any:
  - id: hostname-query-getfqdn
  - id: hostname-query-gethostname
  - id: hostname-query-env-hostname
  - id: hostname-query-env-computername
  - id: hostname-query-platform-node
- id: hostname-allowed-list-equality
  desc: Execution gated on specific hostname
  crit: notable
  conf: 0.92
  all:
  - id: hostname-query-marker
  - id: string-literal-equality-check
  near_bytes: 400
- id: locale-cyrillic-skip
  desc: getlocale checked for Cyrillic CIS code
  crit: baseline
  conf: 0.9
  any:
  - id: locale-cyrillic-skip--rx-11
  - id: locale-cyrillic-skip--rx-12
  - id: locale-cyrillic-skip--rx-13
  - id: locale-cyrillic-skip--rx-14
  - id: locale-cyrillic-skip--rx-15
  - id: locale-cyrillic-skip--rx-16
