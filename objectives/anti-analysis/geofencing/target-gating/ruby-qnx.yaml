defaults:
  platforms: [qnx, unix]
  for: [ruby]
  attack: T1497

traits:
  - id: qnx-ruby-vm-indicator-list
    desc: QNX Ruby VM indicator list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'VirtualBox[\s\S]{0,80}QEMU[\s\S]{0,80}VMware'

  - id: qnx-ruby-geofence-report
    desc: QNX Ruby geofence report
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/geofence

  - id: qnx-ruby-tracerpid-gate
    desc: QNX Ruby TracerPid gate
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'TracerPid:'

composite_rules:
  - id: qnx-ruby-geofence-c2-report
    desc: QNX Ruby geofence C2 report
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-ruby-vm-indicator-list
      - id: qnx-ruby-geofence-report
      - id: qnx-ruby-tracerpid-gate
