defaults:
  platforms: [qnx, unix, windows]
  for: [csharp, pe]
  attack: T1480

traits:
  - id: qnx-dotnet-analysis-host-list
    desc: QNX .NET analysis host list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: threatfox

  - id: qnx-dotnet-vm-indicator-list
    desc: QNX .NET VM indicator list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /sys/hypervisor

  - id: qnx-dotnet-analysis-env-list
    desc: QNX .NET analysis env list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: MALWARE_ANALYSIS

composite_rules:
  - id: qnx-dotnet-geofenced-telemetry
    desc: QNX .NET geofenced telemetry
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: qnx-dotnet-analysis-host-list
      - id: qnx-dotnet-vm-indicator-list
      - id: qnx-dotnet-analysis-env-list
    all:
      - id: objectives/exfiltration/stealer/host-profile::qnx-dotnet-system-info-http-exfil
