defaults:
  platforms: [routeros, appliance, unix]
  for: [ruby]
  attack: T1480.001

traits:
  - id: ruby-country-allow-block-lists
    desc: Ruby country allow block lists
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ALLOWED_COUNTRIES[\s\S]{0,160}BLOCKED_COUNTRIES'

  - id: ruby-geolocation-fetch
    desc: Ruby geolocation fetch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /geo/#{ip}

  - id: ruby-dns-geo-indicators
    desc: Ruby DNS geo indicators
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'geo-us\.\#\{C2_HOST\}[\s\S]{0,140}geo-eu'

  - id: ruby-geofence-decision-gate
    desc: Ruby geofence decision gate
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'decision == :blocked[\s\S]{0,120}exit 1'

composite_rules:
  - id: ruby-routeros-geofence-gate
    desc: Ruby RouterOS geofence gate
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-country-allow-block-lists
      - id: ruby-geolocation-fetch
      - id: ruby-dns-geo-indicators
      - id: ruby-geofence-decision-gate
