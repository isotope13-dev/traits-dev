# macOS Input Source Geofencing
# Detects reading AppleEnabledInputSources plist for CIS/Russian geofencing
# Used by AMOS, Shub, MacSync, and many macOS stealers to skip CIS targets
# ATT&CK: T1614 (System Location Discovery)
defaults:
  platforms:
    - macos
  for:
    - applescript
    - shell
    - python
    - javascript
    - typescript
    - macho
  attack: T1614
  mbc: B0007.003
traits:
  - id: apple-enabled-input-sources
    desc: AppleEnabledInputSources plist read
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: AppleEnabledInputSources
  - id: hitoolbox-plist
    desc: HIToolbox plist access
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: com.apple.HIToolbox
  - id: defaults-read-hitoolbox
    desc: defaults read HIToolbox command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: defaults\s+read.{0,60}HIToolbox
  - id: input-source-cyrillic
    desc: Cyrillic input source check
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: InputSources.{0,60}Cyrillic
  - id: input-source-russian-layout
    desc: Russian keyboard layout check
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: com.apple.keylayout.Russian
composite_rules:
  - id: hitoolbox-plist-access
    desc: HIToolbox plist keyboard access
    crit: notable
    conf: 0.85
    any:
      - id: hitoolbox-plist
      - id: defaults-read-hitoolbox
  - id: macos-input-source-geofencing
    desc: macOS input source CIS geofencing
    crit: suspicious
    conf: 0.9
    all:
      - id: hitoolbox-plist-access
    any:
      - id: apple-enabled-input-sources
      - id: input-source-cyrillic
      - id: input-source-russian-layout
