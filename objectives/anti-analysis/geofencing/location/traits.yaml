  conf: 0.8
  for: [javascript, pe, elf, macho, batch, powershell]
  not:
  - regex: (?i)\b(AD|AE|AF|AG|AI|AL|AS|AT|AU|AW|AX|BA|BB|BD|BE|BF|BG|BH|BI|BJ|BL|BM|BN|BO|BQ|BR|BS|BT|BV|BW|CA|CC|CD|CF|CG|CH|CI|CK|CL|CM|CN|CO|CR|CU|CV|CW|CX|CY|CZ)\b
  if:
    type: text
      # Looks for at least 3 CIS codes in close proximity (typical of a blacklist array)
      # interleaved with common delimiters like quotes, commas, spaces.
    regex: (?i)\b(AM|AZ)\b.{0,32}\b(AM|AZ)\b.{0,32}\b(AM|AZ)\b
