defaults:
  platforms: [windows, unix]
  for: [javascript, pe, elf, macho]
  attack: T1614
  mbc: B0007.003
traits:
  - id: locale-ru-ru-underscore
    desc: Russian locale (ru_RU)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (^|[^A-Za-z0-9/.-])ru_RU([^A-Za-z0-9/.-]|$)
    not:
      - substr: LANGS =
      - regex: (?i)(language|languages|locale|i18n|translation).{0,80}ru_RU|ru_RU.{0,80}(Russian|language|locale)
      - regex: (?i)ru_RU.{0,40}\.(mui|pri)(PK)?
      - substr: /ru_RU/
  - id: locale-ru-ru-dash
    desc: Russian locale (ru-RU)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (^|[^A-Za-z0-9/.-])ru-RU([^A-Za-z0-9/.-]|$)
    not:
      - substr: LANGS =
      - regex: (?i)(language|languages|locale|i18n|translation).{0,80}ru-RU|ru-RU.{0,80}(Russian|language|locale)
      - substr: locale/lang/ru-RU
      - regex: (?i)(import|from).{0,40}ru-RU
      - regex: (?i)ru-RU.{0,40}\.(mui|pri)(PK)?
      - substr: /ru-RU/
      - substr: .ru-RU.
  - id: locale-uk-ua
    desc: Ukrainian locale (uk_UA/uk-UA)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (^|[^A-Za-z0-9/.-])uk[-_]UA([^A-Za-z0-9/.-]|$)
    not:
      - substr: LANGS =
      - regex: (?i)(language|languages|locale|i18n|translation).{0,80}uk[-_]UA|uk[-_]UA.{0,80}(Ukrainian|language|locale)
      - regex: (?i)uk[-_]UA.{0,40}\.(mui|pri)(PK)?
      - substr: /uk-UA/
      - substr: .uk-UA.
  - id: locale-be-by
    desc: Belarusian locale (be_BY/be-BY)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (^|[^A-Za-z0-9/.-])be[-_]BY([^A-Za-z0-9/.-]|$)
    not:
      - substr: LANGS =
      - regex: (?i)(language|languages|locale|i18n|translation).{0,80}be[-_]BY|be[-_]BY.{0,80}(Belarusian|language|locale)
  - id: locale-kk-kz
    desc: Kazakh locale (kk_KZ/kk-KZ)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (^|[^A-Za-z0-9/.-])kk[-_]KZ([^A-Za-z0-9/.-]|$)
    not:
      - substr: LANGS =
      - regex: (?i)(language|languages|locale|i18n|translation).{0,80}kk[-_]KZ|kk[-_]KZ.{0,80}(Kazakh|language|locale)
  - id: locale-fa-ir
    desc: Iranian locale (fa_IR/fa-IR)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (^|[^A-Za-z0-9])fa[-_]IR([^A-Za-z0-9]|$)
    not:
      - substr: LANGS =
      - substr: "setLanguage=function"
  - id: locale-ko-kp
    desc: North Korean locale (ko_KP/ko-KP)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (^|[^A-Za-z0-9])ko[-_]KP([^A-Za-z0-9]|$)
    not:
      - substr: "setLanguage=function"
      - regex: (?i)(language|locale|i18n).{0,80}ko[-_]KP
      - regex: (?i)ko[-_]KP.{0,80}(Korean|language|locale)
  - id: archive-container-name
    desc: Archive container basename
    crit: component
    conf: 0.8
    if:
      type: basename
      regex: \.(zip|tar|tgz|gz)$
  - id: jspdf-language-catalog
    desc: jsPDF static language catalog
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "this.internal.languageSettings"
  - id: tz-europe-moscow
    desc: Europe/Moscow timezone string
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Europe/Moscow
    not:
      - regex: (?i)(timezone|Intl\.DateTimeFormat).{0,80}Europe/Moscow
      - regex: (?i)Europe/Moscow.{0,80}(timezone|Intl\.DateTimeFormat)
  - id: tz-europe-minsk
    desc: Europe/Minsk timezone string
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Europe/Minsk
  - id: tz-europe-kiev
    desc: Europe/Kiev timezone string
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Europe/Kiev
  - id: tz-europe-kyiv
    desc: Europe/Kyiv timezone string
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Europe/Kyiv
  - id: tz-asia-almaty
    desc: Asia/Almaty timezone string
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Asia/Almaty
  - id: tz-asia-tehran
    desc: Asia/Tehran timezone string
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Asia/Tehran
  - id: tz-asia-pyongyang
    desc: Asia/Pyongyang timezone string
    crit: component
    conf: 0.8
    if:
      type: text
      substr: Asia/Pyongyang
  - id: env-lang-check
    desc: Check LANG environment variable
    crit: component
    conf: 0.5
    if:
      type: text
      regex: process\.env\.LANG
  - id: env-lc-all-check
    desc: Check LC_ALL environment variable
    crit: component
    conf: 0.5
    if:
      type: text
      regex: process\.env\.LC_ALL
  - id: env-lc-messages-check
    desc: Check LC_MESSAGES environment variable
    crit: component
    conf: 0.5
    if:
      type: text
      regex: process\.env\.LC_MESSAGES
  - id: env-language-check
    desc: Check LANGUAGE environment variable
    crit: component
    conf: 0.5
    if:
      type: text
      regex: process\.env\.LANGUAGE
  - id: js-intl-datetime-options
    desc: Intl.DateTimeFormat().resolvedOptions() (TZ detection)
    crit: component
    conf: 0.6
    if:
      type: text
      regex: Intl\.DateTimeFormat\(.*?\)\.resolvedOptions\(\)
  - id: js-gettimezoneoffset
    desc: Date.prototype.getTimezoneOffset()
    crit: component
    conf: 0.5
    if:
      type: text
      substr: getTimezoneOffset()
  - id: js-timezone-offset-120
    desc: TZ offset 120 (UTC+2)
    crit: component
    if:
      type: raw
      regex: getTimezoneOffset\(\).{0,20}120
  - id: js-timezone-offset-180
    desc: TZ offset 180 (UTC+3)
    crit: component
    if:
      type: raw
      regex: getTimezoneOffset\(\).{0,20}180
  - id: js-timezone-offset-240
    desc: TZ offset 240 (UTC+4)
    crit: component
    if:
      type: raw
      regex: getTimezoneOffset\(\).{0,20}240
  - id: js-timezone-offset-300
    desc: TZ offset 300 (UTC+5)
    crit: component
    if:
      type: raw
      regex: getTimezoneOffset\(\).{0,20}300
  - id: js-timezone-offset-360
    desc: TZ offset 360 (UTC+6)
    crit: component
    if:
      type: raw
      regex: getTimezoneOffset\(\).{0,20}360
  - id: js-timezone-offset-210
    desc: TZ offset 210 (UTC+3:30)
    crit: component
    if:
      type: raw
      regex: getTimezoneOffset\(\).{0,20}210
  - id: js-timezone-offset-270
    desc: TZ offset 270 (UTC+4:30)
    crit: component
    if:
      type: raw
      regex: getTimezoneOffset\(\).{0,20}270
  - id: js-timezone-offset-510
    desc: TZ offset 510 (UTC+8:30)
    crit: component
    if:
      type: raw
      regex: getTimezoneOffset\(\).{0,20}510
  - id: js-timezone-offset-540
    desc: TZ offset 540 (UTC+9)
    crit: component
    if:
      type: raw
      regex: getTimezoneOffset\(\).{0,20}540
  - id: func-name-is-russian
    desc: Function named isRussian
    crit: component
    if:
      type: symbol
      exact: isRussian
  - id: func-name-russian-offset
    desc: Function named isRussianOffset
    crit: component
    if:
      type: symbol
      exact: isRussianOffset
  - id: func-name-russian-region
    desc: Function named isRussianRegion
    crit: component
    if:
      type: symbol
      exact: isRussianRegion
  - id: func-name-check-russian-locale
    desc: Function named checkRussianLocale
    crit: component
    if:
      type: symbol
      exact: checkRussianLocale
  - id: func-name-is-cis
    desc: Function named isCIS
    crit: component
    if:
      type: symbol
      exact: isCIS
  - id: windows-api-locale-check
    desc: Uses Windows API to check UI language
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: GetSystemDefaultUILanguage
    unless:
      - type: exports_count
        min: 100
composite_rules:
  - id: russian-locale
    desc: Russian locale indicators
    crit: notable
    conf: 0.75
    any:
      - id: locale-ru-ru-underscore
      - id: locale-ru-ru-dash
  - id: cis-locale
    desc: CIS region locale indicators
    crit: notable
    conf: 0.75
    any:
      - id: russian-locale
      - id: locale-uk-ua
      - id: locale-be-by
      - id: locale-kk-kz
  - id: cis-timezone
    desc: CIS region timezone checks
    crit: notable
    conf: 0.75
    any:
      - id: tz-europe-moscow
      - id: tz-europe-minsk
      - id: tz-europe-kiev
      - id: tz-europe-kyiv
      - id: tz-asia-almaty
  - id: iran-region-indicator
    desc: Iranian region indicators
    crit: notable
    conf: 0.75
    any:
      - id: locale-fa-ir
      - id: tz-asia-tehran
      - id: js-timezone-offset-210
      - id: js-timezone-offset-270
  - id: dprk-region-indicator
    desc: North Korean region indicators
    crit: notable
    conf: 0.75
    any:
      - id: locale-ko-kp
      - id: tz-asia-pyongyang
      - id: js-timezone-offset-510
      - id: js-timezone-offset-540
  - id: locale-env-access
    desc: Locale environment variable checks
    crit: notable
    conf: 0.6
    needs: 2
    any:
      - id: env-lang-check
      - id: env-lc-all-check
      - id: env-lc-messages-check
      - id: env-language-check
  - id: js-timezone-detection
    desc: JavaScript timezone detection methods
    crit: notable
    conf: 0.65
    any:
      - id: js-intl-datetime-options
      - id: js-gettimezoneoffset
  - id: js-timezone-offset-cis
    desc: CIS region timezone offset checks
    crit: notable
    any:
      - id: js-timezone-offset-120
      - id: js-timezone-offset-180
      - id: js-timezone-offset-240
      - id: js-timezone-offset-300
      - id: js-timezone-offset-360
  - id: func-name-russian-specific
    desc: Specific Russian geofencing function names
    crit: notable
    any:
      - id: func-name-russian-offset
      - id: func-name-russian-region
      - id: func-name-check-russian-locale
  - id: geo-check-logic
    desc: Region check logic indicators
    crit: notable
    conf: 0.8
    any:
      - id: func-name-is-russian
      - id: func-name-russian-specific
      - id: func-name-is-cis
      - id: locale-env-access
      - id: js-timezone-offset-cis
  - id: russian-region-indicator
    desc: Russian region indicators
    crit: notable
    conf: 0.78
    any:
      - id: russian-locale
      - id: cis-timezone
  - id: cis-region-indicator
    desc: CIS region indicators
    crit: notable
    conf: 0.75
    any:
      - id: cis-locale
      - id: cis-timezone
  - id: russian-geofencing
    desc: Russian region geofencing evasion
    crit: suspicious
    conf: 0.9
    all:
      - id: russian-region-indicator
    any:
      - id: func-name-is-russian
      - id: func-name-russian-specific
      - id: locale-env-access
      - id: js-timezone-offset-cis
    unless:
      - id: metadata/library/data::faker-library
  - id: cis-geofencing
    desc: CIS region geofencing evasion evasion
    crit: notable
    conf: 0.85
    all:
      - id: cis-region-indicator
    any:
      - id: func-name-is-russian
      - id: func-name-russian-specific
      - id: func-name-is-cis
      - id: locale-env-access
      - id: js-timezone-offset-cis
      - id: objectives/anti-analysis/geofencing/location::macos-input-source-geofencing
    unless:
      - id: metadata/library/data::faker-library
  - id: restricted-region-geofencing
    desc: Multi-region geofencing (CIS/Iran/DPRK)
    crit: suspicious
    conf: 0.95
    all:
      - id: geo-check-logic
    any:
      - id: russian-region-indicator
      - id: cis-region-indicator
      - id: iran-region-indicator
      - id: dprk-region-indicator
    needs: 2
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: archive-container-name
      - id: jspdf-language-catalog
  - id: locale-gated-loader-exit
    desc: Locale-gated early thread exit
    crit: suspicious
    conf: 0.9
    for: [pe]
    all:
      - id: micro-behaviors/process/thread/create::exit-thread
    any:
      - id: objectives/anti-static/obfuscation/imports::peb-ldr-access
      - id: metadata/hardening/memory::wx-section
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
    unless:
      - id: metadata/library/runtime::cygwin-runtime
