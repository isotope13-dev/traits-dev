defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  attack: T1614
  mbc: B0007.003
traits:
  - id: locale-ru-ru-underscore
    desc: Russian locale (ru_RU)
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: (^|[^A-Za-z0-9])ru_RU([^A-Za-z0-9]|$)
    not:
      - regex: (?i)(language|languages|locale|i18n|translation).{0,80}ru_RU|ru_RU.{0,80}(Russian|language|locale)
  - id: locale-ru-ru-dash
    desc: Russian locale (ru-RU)
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: (^|[^A-Za-z0-9])ru-RU([^A-Za-z0-9]|$)
  - id: locale-uk-ua
    desc: Ukrainian locale (uk_UA/uk-UA)
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: (^|[^A-Za-z0-9])uk[-_]UA([^A-Za-z0-9]|$)
    not:
      - regex: (?i)(language|languages|locale|i18n|translation).{0,80}uk[-_]UA|uk[-_]UA.{0,80}(Ukrainian|language|locale)
  - id: locale-be-by
    desc: Belarusian locale (be_BY/be-BY)
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: (^|[^A-Za-z0-9])be[-_]BY([^A-Za-z0-9]|$)
    not:
      - regex: (?i)(language|languages|locale|i18n|translation).{0,80}be[-_]BY|be[-_]BY.{0,80}(Belarusian|language|locale)
  - id: locale-kk-kz
    desc: Kazakh locale (kk_KZ/kk-KZ)
    crit: component
    conf: 0.7
    if:
      type: string_value
      regex: (^|[^A-Za-z0-9])kk[-_]KZ([^A-Za-z0-9]|$)
    not:
      - regex: (?i)(language|languages|locale|i18n|translation).{0,80}kk[-_]KZ|kk[-_]KZ.{0,80}(Kazakh|language|locale)
  - id: tz-europe-moscow
    desc: Europe/Moscow timezone string
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: Europe/Moscow
  - id: tz-europe-minsk
    desc: Europe/Minsk timezone string
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: Europe/Minsk
  - id: tz-europe-kiev
    desc: Europe/Kiev timezone string
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: Europe/Kiev
  - id: tz-europe-kyiv
    desc: Europe/Kyiv timezone string
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: Europe/Kyiv
  - id: tz-asia-almaty
    desc: Asia/Almaty timezone string
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: Asia/Almaty
  - id: js-intl-datetime-options
    desc: Intl.DateTimeFormat timezone access
    crit: notable
    conf: 0.6
    if:
      type: raw
      substr: DateTimeFormat().resolvedOptions().timeZone
  - id: js-gettimezoneoffset
    desc: getTimezoneOffset() call
    crit: notable
    conf: 0.4
    if:
      type: raw
      substr: getTimezoneOffset()
    downgrade:
      all:
        - id: metadata/binary/metrics::no-functions
        - id: metadata/binary/metrics::no-imports
  - id: js-timezone-offset-cis
    desc: Check for CIS region timezone offset
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: getTimezoneOffset\(\).{0,20}(180|240|300|360)
  - id: env-lang-check
    desc: LANG environment variable access
    crit: notable
    conf: 0.4
    if:
      type: string_value
      regex: (process\.env\.|os\.environ|ENV\[|getenv\()['"]?LANG['"]?
  - id: env-lc-all-check
    desc: LC_ALL environment variable access
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: (process\.env\.|os\.environ|ENV\[|getenv\()['"]?LC_ALL['"]?
  - id: env-lc-messages-check
    desc: LC_MESSAGES environment variable access
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: (process\.env\.|os\.environ|ENV\[|getenv\()['"]?LC_MESSAGES['"]?
  - id: env-language-check
    desc: LANGUAGE environment variable access
    crit: notable
    conf: 0.4
    if:
      type: string_value
      regex: (process\.env\.|os\.environ|ENV\[|getenv\()['"]?LANGUAGE['"]?
  - id: func-name-russian-check
    desc: Function checking for Russian system
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: \b(?:is|check|detect)[A-Za-z0-9_]{0,24}Russian(?:[A-Za-z0-9_]{0,24})\b
  - id: func-name-russian-specific
    desc: Specific Russian geofencing function names
    crit: suspicious
    conf: 1.0
    if:
      type: string_value
      regex: \bisRussian(Offset|Language|System|Timezone)\b
  - id: func-name-cis-check
    desc: Function checking for CIS region
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: "\b(is|check|detect)[A-Za-z0-9_]{0,24}\b.{0,10}\bCIS\b"
  - id: keyboard-layout-russian
    desc: Russian keyboard layout detection
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (keyboard|layout).{0,30}(russian|0419|ru-RU)
      case_insensitive: true
  - id: windows-ui-language-query
    desc: Query Windows UI language
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: GetSystemDefaultUILanguage
composite_rules:
  - id: russian-locale
    desc: Russian locale indicator
    crit: notable
    conf: 0.75
    any:
      - id: locale-ru-ru-underscore
      - id: locale-ru-ru-dash
  - id: cis-locale
    desc: CIS region locale indicator
    crit: notable
    conf: 0.7
    any:
      - id: russian-locale
      - id: locale-uk-ua
      - id: locale-be-by
      - id: locale-kk-kz
  - id: cis-timezone
    desc: CIS region timezone check
    crit: notable
    conf: 0.75
    any:
      - id: tz-europe-moscow
      - id: tz-europe-minsk
      - id: tz-europe-kiev
      - id: tz-europe-kyiv
      - id: tz-asia-almaty
  - id: locale-env-access
    desc: Locale environment variable checks
    crit: notable
    conf: 0.6
    needs: 2
    any:
      - id: env-lang-check
      - id: env-lc-all-check
      - id: env-lc-messages-check
      - id: env-language-check
  - id: js-timezone-detection
    desc: JavaScript timezone detection
    crit: notable
    conf: 0.65
    any:
      - id: js-intl-datetime-options
      - id: js-gettimezoneoffset
  - id: geo-check-logic
    desc: Region check logic indicators
    crit: notable
    conf: 0.8
    any:
      - id: func-name-russian-check
      - id: func-name-russian-specific
      - id: func-name-cis-check
      - id: locale-env-access
      - id: js-timezone-detection
      - id: js-timezone-offset-cis
  - id: russian-region-indicator
    desc: Russian region indicator set
    crit: notable
    conf: 0.78
    any:
      - id: russian-locale
      - id: cis-timezone
  - id: cis-region-indicator
    desc: CIS region indicator set
    crit: notable
    conf: 0.75
    any:
      - id: cis-locale
      - id: cis-timezone
  - id: russian-geofencing
    desc: Russian region geofencing
    crit: suspicious
    conf: 0.9
    all:
      - id: russian-region-indicator
    any:
      - id: func-name-russian-check
      - id: func-name-russian-specific
      - id: locale-env-access
      - id: js-timezone-offset-cis
    unless:
      - id: metadata/library/data::faker-library
  - id: cis-geofencing
    desc: CIS region geofencing evasion
    crit: notable
    conf: 0.85
    all:
      - id: cis-region-indicator
    any:
      - id: func-name-russian-check
      - id: func-name-russian-specific
      - id: func-name-cis-check
      - id: locale-env-access
      - id: js-timezone-offset-cis
      - id: objectives/anti-analysis/geofencing/location::macos-input-source-geofencing
    unless:
      - id: metadata/library/data::faker-library
  - id: locale-gated-loader-exit
    desc: Locale-gated early thread exit
    crit: suspicious
    conf: 0.9
    all:
      - id: windows-ui-language-query
      - id: micro-behaviors/process/thread/create::exit-thread
    any:
      - id: objectives/anti-static/obfuscation/imports::peb-ldr-access
      - id: metadata/hardening/memory::wx-section
