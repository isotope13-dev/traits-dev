defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  - javascript
  attack: T1614
  mbc: B0007.003
traits:
- id: archive-container-name
  desc: Archive container basename
  crit: component
  conf: 0.8
  if:
    type: path
    basename: true
    regex: "\\.(zip|tar|tgz|gz)$"
- id: jspdf-language-catalog
  desc: jsPDF static language catalog
  crit: component
  conf: 0.95
  if:
    type: text
    substr: this.internal.languageSettings
- id: func-name-is-russian
  desc: Function named isRussian
  crit: component
  for: [pe, elf, macho]
  if:
    type: symbol
    exact: isRussian
- id: func-name-russian-offset
  desc: Function named isRussianOffset
  crit: component
  for: [pe, elf, macho]
  if:
    type: symbol
    exact: isRussianOffset
- id: func-name-russian-region
  desc: Function named isRussianRegion
  crit: component
  for: [pe, elf, macho]
  if:
    type: symbol
    exact: isRussianRegion
- id: func-name-check-russian-locale
  desc: Function named checkRussianLocale
  crit: component
  for: [pe, elf, macho]
  if:
    type: symbol
    exact: checkRussianLocale
- id: func-name-is-cis
  desc: Function named isCIS
  crit: component
  for: [pe, elf, macho]
  if:
    type: symbol
    exact: isCIS
- id: country-code-in
  desc: Country code IN token (repeated)
  crit: component
  conf: 0.6
  for: [javascript, pe, elf, macho]
  count_min: 2
  if:
    type: text
    regex: "[\"']IN[\"']"
  unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
    - id: well-known/app/drivers/
    - id: well-known/app/drivers::ngx-dll-basename
- id: country-code-id
  # "ID" the bare token is also the ubiquitous English/identifier word ("raw ID",
  # "user ID"). A real Indonesia geofence uses the quoted literal ('ID', ['US','ID']);
  # match only that form so prose never trips the cluster.
  desc: Repeated country-code-shaped identifier
  crit: component
  conf: 0.6
  for: [javascript, pe, elf, macho]
  count_min: 2
  if:
    type: text
    regex: "[\"']ID[\"']"
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
  - id: well-known/app/drivers::ngx-dll-basename
- id: country-code-za
  desc: Country code ZA token (repeated)
  crit: component
  conf: 0.6
  for: [javascript, pe, elf, macho]
  count_min: 2
  if:
    type: text
    regex: "[\"']ZA[\"']"
  unless:
  - id: well-known/app/drivers/
- id: country-code-kh
  desc: Country code KH token (repeated)
  crit: component
  conf: 0.6
  for: [javascript, pe, elf, macho]
  count_min: 2
  if:
    type: text
    regex: "[\"']KH[\"']"
- id: country-code-jp
  desc: Country code JP token (repeated)
  crit: component
  conf: 0.6
  for: [javascript, pe, elf, macho]
  count_min: 2
  if:
    type: text
    regex: "[\"']JP[\"']"
  unless:
  - id: well-known/app/drivers/
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: country-code-name-catalog-western-prefix
  desc: Country-name catalog western country prefix
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'GB:"united_kingdom".{0,320}US:"united_states"'
- id: country-code-name-catalog-cis-names
  desc: Country-name catalog CIS names
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'RU:"russia".{0,420}UA:"ukraine".{0,160}BY:"belarus"'
- id: js-minified-short-var-name-cluster
  desc: 'Minified JS short variable declaration cluster'
  crit: baseline
  conf: 0.9
  for: [javascript]
  if:
    type: text
    regex: '\bvar\s+[A-Za-z_$][A-Za-z0-9_$]{0,3}(,[A-Za-z_$][A-Za-z0-9_$]{0,3}){20,}'
composite_rules:
- id: country-code-name-catalog
  desc: Recognized country code to country-name catalog
  crit: baseline
  conf: 0.9
  all:
  - id: country-code-name-catalog-western-prefix
  - id: country-code-name-catalog-cis-names
- id: cis-country-code-recognized-marker
  desc: Recognized country code catalog marker
  crit: baseline
  conf: 0.94
  any:
  - id: well-known/tool/development/gnat
  - id: well-known/lib/jvm
  - id: well-known/lib/skiko
  - id: well-known/lib/skia::node-canvas-native-addon
  - id: metadata/library/runtime::lean-intl-runtime-bundle
  - id: metadata/library/runtime::intl-polyfill-locale-data
  - id: metadata/library/runtime::browserify-crypto-bundle
  - id: metadata/library/runtime::libphonenumber-js-bundle
  - id: metadata/library/runtime-phone::intl-tel-input-bundle
  - id: metadata/library/runtime-phone::intl-tel-input-symbols
  - id: country-code-name-catalog
- id: cis-country-codes
  desc: CIS country code cluster
  crit: notable
  conf: 0.8
  unless:
  - id: objectives/anti-analysis/geofencing/region/cluster/
  - id: js-minified-short-var-name-cluster
  - id: well-known/app/atlascode/
  any:
  - id: objectives/anti-analysis/geofencing/region/country-code-a
  - id: objectives/anti-analysis/geofencing/region/country-code-b
  - id: objectives/anti-analysis/geofencing/region/country-code-c
  - id: objectives/anti-analysis/geofencing/region/country-code-d
  needs: 3
  near_bytes: 96
- id: locale-gated-loader-exit
  desc: Locale-gated early thread exit
  crit: suspicious
  conf: 0.9
  for:
  - pe
  all:
  - id: micro-behaviors/process/thread/create::exit-thread
  - id: objectives/anti-analysis/geofencing/region/cluster::restricted-region-geofencing
  any:
  - id: objectives/anti-static/obfuscation/imports::peb-ldr-access
  - id: metadata/hardening/memory::wx-section
  downgrade:
    any:
    - id: metadata/signed/platform/
  unless:
  - id: metadata/library/runtime::cygwin-runtime
- id: iran-region-indicator
  desc: Iranian region indicators
  crit: suspicious
  conf: 0.75
  any:
  - id: objectives/anti-analysis/geofencing/locale/string::locale-fa-ir
  - id: objectives/anti-analysis/geofencing/timezone::tz-asia-tehran
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-210
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-270
  unless:
  - id: well-known/app/turboadb::official-turboadb-gui
  # Closure's generated dependency manifest is a locale catalog, not a
  # runtime region check; its fa_IR entry must not imply geofencing.
  - id: objectives/anti-analysis/geofencing/locale/string::closure-dependency-locale-catalog
- id: dprk-region-indicator
  desc: North Korean region indicators
  crit: suspicious
  conf: 0.75
  any:
  - id: objectives/anti-analysis/geofencing/locale/string::locale-ko-kp
  - id: objectives/anti-analysis/geofencing/timezone::tz-asia-pyongyang
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-510
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-540
  unless:
  - id: well-known/app/turboadb::official-turboadb-gui
- id: geo-check-logic
  desc: Environment-based region check markers
  crit: suspicious
  conf: 0.8
  any:
  - id: func-name-is-russian
  - id: func-name-russian-specific
  - id: func-name-is-cis
  - id: objectives/anti-analysis/geofencing/locale/env-access::locale-env-access
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-cis
- id: russian-region-indicator
  desc: Russian region indicators
  crit: suspicious
  conf: 0.78
  any:
  - id: metadata/file/profile/locale::russian-locale
  - id: objectives/anti-analysis/geofencing/timezone::cis-timezone
  unless:
  - id: well-known/app/vscode-marketplace::openchamber-vsix
- id: cis-region-indicator
  desc: CIS locale or timezone indicator
  crit: component
  conf: 0.75
  any:
  - id: objectives/anti-analysis/geofencing/locale/string::cis-locale
  - id: objectives/anti-analysis/geofencing/timezone::cis-timezone
  unless:
  - id: well-known/app/vscode-marketplace::openchamber-vsix
- id: russian-geofencing
  desc: Russian region geofencing evasion
  crit: suspicious
  conf: 0.9
  all:
  - id: russian-region-indicator
  any:
  - id: func-name-is-russian
  - id: func-name-russian-specific
  - id: objectives/anti-analysis/geofencing/locale/env-access::locale-env-access
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-cis
  unless:
  - id: metadata/library/data/
- id: cis-geofencing
  desc: CIS region geofencing evasion evasion
  crit: suspicious
  conf: 0.85
  all:
  - id: cis-region-indicator
  any:
  - id: func-name-is-russian
  - id: func-name-russian-specific
  - id: func-name-is-cis
  - id: objectives/anti-analysis/geofencing/locale/env-access::locale-env-access
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-cis
  - id: objectives/anti-analysis/geofencing/input::macos-input-source-geofencing
  unless:
  - id: metadata/library/data/
- id: cis-target-exclusion
  desc: Targets CIS region exclusion logic
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/anti-analysis/geofencing/region/cluster::cis-country-codes
  any:
  - id: func-name-is-cis
  - id: geo-check-logic
  unless:
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
- id: restricted-region-geofencing
  desc: Multi-region geofencing (CIS/Iran/DPRK)
  crit: suspicious
  conf: 0.95
  all:
  - id: geo-check-logic
  any:
  - id: russian-region-indicator
  - id: cis-region-indicator
  - id: iran-region-indicator
  - id: dprk-region-indicator
  needs: 2
  unless:
  - id: metadata/package/testing/
  - id: objectives/anti-analysis/geofencing/region/cluster::archive-container-name
  - id: objectives/anti-analysis/geofencing/region/cluster::jspdf-language-catalog
- id: func-name-russian-specific
  desc: Specific Russian geofencing function names
  crit: suspicious
  any:
  - id: func-name-russian-offset
  - id: func-name-russian-region
  - id: func-name-check-russian-locale
- id: asia-africa-country-code-cluster
  desc: Asia Africa country code cluster
  crit: notable
  conf: 0.78
  needs: 3
  near_bytes: 160
  downgrade:
    any:
    - id: metadata/binary/metrics/text-density::shell-high-import-density
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/lang/compiled/
  - id: metadata/lang/compiler/systems::go-binary
  - id: well-known/lib/skia/
  - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
  any:
  - id: country-code-in
  - id: country-code-id
  - id: country-code-za
  - id: country-code-kh
  - id: country-code-jp
  - id: objectives/anti-analysis/geofencing/region/country-code-c::country-code-ru
