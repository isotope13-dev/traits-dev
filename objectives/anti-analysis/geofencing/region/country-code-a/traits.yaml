defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  attack: T1614
  mbc: B0007.003
traits:
- id: country-code-am
  desc: Country code AM token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_])AM([^A-Za-z0-9_]|$)"
  unless:
  - type: trait
    id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers::nvidia-linux-driver-component
- id: country-code-az
  desc: Country code AZ token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_])AZ([^A-Za-z0-9_]|$)"
  unless:
  - type: trait
    id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers::nvidia-linux-driver-component
  - id: metadata/binary/section/name::fwimage-section
- id: country-code-by
  desc: Country code BY token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_])BY([^A-Za-z0-9_]|$)"
  unless:
  - type: trait
    id: metadata/file/extension::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers::nvidia-linux-driver-component
  - id: metadata/binary/section/name::fwimage-section
