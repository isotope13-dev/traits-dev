defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  attack: T1614
  mbc: B0007.003
traits:
- id: country-code-am
  desc: Country code AM token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "[\"']AM[\"']"
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
- id: country-code-az
  desc: Country code AZ token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "[\"']AZ[\"']"
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
  - id: metadata/binary/section/name::fwimage-section
- id: country-code-by
  desc: Country code BY token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "[\"']BY[\"']"
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
  - id: metadata/binary/section/name::fwimage-section
