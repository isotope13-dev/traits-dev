defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  attack: T1614
  mbc: B0007.003
traits:
- id: country-code-ua
  desc: Country code UA token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_])UA([^A-Za-z0-9_]|$)"
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers::nvidia-linux-driver-component
  - id: metadata/binary/section/name::fwimage-section
- id: country-code-uz
  desc: Country code UZ token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_])UZ([^A-Za-z0-9_]|$)"
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers::nvidia-linux-driver-component
  - id: metadata/binary/section/name::fwimage-section
