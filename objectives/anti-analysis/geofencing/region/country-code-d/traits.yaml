defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  attack: T1614
  mbc: B0007.003
traits:
- id: country-code-ua
  desc: Country code UA token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "[\"']UA[\"']"
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
  - id: metadata/binary/section/name::fwimage-section
- id: country-code-uz
  desc: Country code UZ token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "[\"']UZ[\"']"
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
  - id: metadata/binary/section/name::fwimage-section
