defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  attack: T1614
  mbc: B0007.003
traits:
- id: country-code-ua
  desc: Country code UA token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9])UA([^A-Za-z0-9]|$)"
- id: country-code-uz
  desc: Country code UZ token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9])UZ([^A-Za-z0-9]|$)"
