defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  - source
  attack: T1614
  mbc: B0007.003
traits:
- id: archive-container-name
  desc: Archive container basename
  crit: component
  conf: 0.8
  if:
    type: basename
    regex: "\\.(zip|tar|tgz|gz)$"
- id: jspdf-language-catalog
  desc: jsPDF static language catalog
  crit: component
  conf: 0.95
  if:
    type: text
    substr: this.internal.languageSettings
- id: func-name-is-russian
  desc: Function named isRussian
  crit: component
  for: [pe, elf, macho]
  if:
    type: symbol
    exact: isRussian
- id: func-name-russian-offset
  desc: Function named isRussianOffset
  crit: component
  for: [pe, elf, macho]
  if:
    type: symbol
    exact: isRussianOffset
- id: func-name-russian-region
  desc: Function named isRussianRegion
  crit: component
  for: [pe, elf, macho]
  if:
    type: symbol
    exact: isRussianRegion
- id: func-name-check-russian-locale
  desc: Function named checkRussianLocale
  crit: component
  for: [pe, elf, macho]
  if:
    type: symbol
    exact: checkRussianLocale
- id: func-name-is-cis
  desc: Function named isCIS
  crit: component
  for: [pe, elf, macho]
  if:
    type: symbol
    exact: isCIS
- id: country-code-in
  desc: Country code IN token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9])IN([^A-Za-z0-9]|$)"
- id: country-code-id
  desc: Country code ID token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9])ID([^A-Za-z0-9]|$)"
- id: country-code-za
  desc: Country code ZA token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9])ZA([^A-Za-z0-9]|$)"
- id: country-code-kh
  desc: Country code KH token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9])KH([^A-Za-z0-9]|$)"
- id: country-code-jp
  desc: Country code JP token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9])JP([^A-Za-z0-9]|$)"
composite_rules:
- id: cis-country-codes
  desc: CIS country code cluster
  crit: suspicious
  conf: 0.8
  unless:
  - id: well-known/tool/development/gnat::compiler
  any:
  - id: objectives/anti-analysis/geofencing/region/country-code-a::country-code-am
  - id: objectives/anti-analysis/geofencing/region/country-code-a::country-code-az
  - id: objectives/anti-analysis/geofencing/region/country-code-a::country-code-by
  - id: objectives/anti-analysis/geofencing/region/country-code-b::country-code-kg
  - id: objectives/anti-analysis/geofencing/region/country-code-b::country-code-kz
  - id: objectives/anti-analysis/geofencing/region/country-code-b::country-code-md
  - id: objectives/anti-analysis/geofencing/region/country-code-c::country-code-ru
  - id: objectives/anti-analysis/geofencing/region/country-code-c::country-code-tj
  - id: objectives/anti-analysis/geofencing/region/country-code-d::country-code-ua
  - id: objectives/anti-analysis/geofencing/region/country-code-d::country-code-uz
  needs: 3
  near_bytes: 96
- id: locale-gated-loader-exit
  desc: Locale-gated early thread exit
  crit: suspicious
  conf: 0.9
  for:
  - pe
  all:
  - id: micro-behaviors/process/thread/create::exit-thread
  - id: objectives/anti-analysis/geofencing/region::restricted-region-geofencing
  any:
  - id: objectives/anti-static/obfuscation/imports::peb-ldr-access
  - id: metadata/hardening/memory::wx-section
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
  unless:
  - id: metadata/library/runtime::cygwin-runtime
- id: iran-region-indicator
  desc: Iranian region indicators
  crit: suspicious
  conf: 0.75
  any:
  - id: objectives/anti-analysis/geofencing/locale/string::locale-fa-ir
  - id: objectives/anti-analysis/geofencing/timezone::tz-asia-tehran
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-210
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-270
- id: dprk-region-indicator
  desc: North Korean region indicators
  crit: suspicious
  conf: 0.75
  any:
  - id: objectives/anti-analysis/geofencing/locale/string::locale-ko-kp
  - id: objectives/anti-analysis/geofencing/timezone::tz-asia-pyongyang
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-510
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-540
- id: geo-check-logic
  desc: Environment-based region check markers
  crit: suspicious
  conf: 0.8
  any:
  - id: func-name-is-russian
  - id: func-name-russian-specific
  - id: func-name-is-cis
  - id: objectives/anti-analysis/geofencing/locale/env-access::locale-env-access
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-cis
- id: russian-region-indicator
  desc: Russian region indicators
  crit: suspicious
  conf: 0.78
  any:
  - id: objectives/anti-analysis/geofencing/locale/string::russian-locale
  - id: objectives/anti-analysis/geofencing/timezone::cis-timezone
- id: cis-region-indicator
  desc: CIS region indicators
  crit: suspicious
  conf: 0.75
  any:
  - id: objectives/anti-analysis/geofencing/locale/string::cis-locale
  - id: objectives/anti-analysis/geofencing/timezone::cis-timezone
- id: russian-geofencing
  desc: Russian region geofencing evasion
  crit: suspicious
  conf: 0.9
  all:
  - id: russian-region-indicator
  any:
  - id: func-name-is-russian
  - id: func-name-russian-specific
  - id: objectives/anti-analysis/geofencing/locale/env-access::locale-env-access
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-cis
  unless:
  - id: metadata/library/data::faker-library
- id: cis-geofencing
  desc: CIS region geofencing evasion evasion
  crit: suspicious
  conf: 0.85
  all:
  - id: cis-region-indicator
  any:
  - id: func-name-is-russian
  - id: func-name-russian-specific
  - id: func-name-is-cis
  - id: objectives/anti-analysis/geofencing/locale/env-access::locale-env-access
  - id: objectives/anti-analysis/geofencing/timezone::js-timezone-offset-cis
  - id: objectives/anti-analysis/geofencing/input::macos-input-source-geofencing
  unless:
  - id: metadata/library/data::faker-library
- id: cis-target-exclusion
  desc: Targets CIS region exclusion logic
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/anti-analysis/geofencing/region::cis-country-codes
  any:
  - id: func-name-is-cis
  - id: geo-check-logic
  unless:
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
- id: restricted-region-geofencing
  desc: Multi-region geofencing (CIS/Iran/DPRK)
  crit: suspicious
  conf: 0.95
  all:
  - id: geo-check-logic
  any:
  - id: russian-region-indicator
  - id: cis-region-indicator
  - id: iran-region-indicator
  - id: dprk-region-indicator
  needs: 2
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: objectives/anti-analysis/geofencing/region::archive-container-name
  - id: objectives/anti-analysis/geofencing/region::jspdf-language-catalog
- id: func-name-russian-specific
  desc: Specific Russian geofencing function names
  crit: suspicious
  any:
  - id: func-name-russian-offset
  - id: func-name-russian-region
  - id: func-name-check-russian-locale
- id: asia-africa-country-code-cluster
  desc: Asia Africa country code cluster
  crit: suspicious
  conf: 0.78
  needs: 3
  near_bytes: 160
  any:
  - id: country-code-in
  - id: country-code-id
  - id: country-code-za
  - id: country-code-kh
  - id: country-code-jp
  - id: objectives/anti-analysis/geofencing/region/country-code-c::country-code-ru
