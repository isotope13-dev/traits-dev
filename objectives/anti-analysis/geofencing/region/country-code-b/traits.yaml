defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  attack: T1614
  mbc: B0007.003
traits:
- id: country-code-kg
  desc: Country code KG token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_])KG([^A-Za-z0-9_]|$)"
- id: country-code-kz
  desc: Country code KZ token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_])KZ([^A-Za-z0-9_]|$)"
- id: country-code-md
  desc: Country code MD token
  crit: component
  conf: 0.6
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_])MD([^A-Za-z0-9_]|$)"
