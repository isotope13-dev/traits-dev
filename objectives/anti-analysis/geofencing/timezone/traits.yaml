defaults:
  platforms:
  - windows
  - linux
  - macos
  for:
  - javascript
  - pe
  - elf
  - macho
  attack: T1614
  mbc: B0007.003
traits:
- id: tz-europe-moscow
  desc: Europe/Moscow timezone string
  crit: component
  conf: 0.8
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    substr: Europe/Moscow
  not:
  - regex: "(?i)(timezone|Intl\\.DateTimeFormat).{0,80}Europe/Moscow"
  - regex: "(?i)Europe/Moscow.{0,80}(timezone|Intl\\.DateTimeFormat)"
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: tz-europe-minsk
  desc: Europe/Minsk timezone string
  crit: component
  conf: 0.8
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    substr: Europe/Minsk
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: tz-europe-kiev
  desc: Europe/Kiev timezone string
  crit: component
  conf: 0.8
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    substr: Europe/Kiev
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: tz-europe-kyiv
  desc: Europe/Kyiv timezone string
  crit: component
  conf: 0.8
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    substr: Europe/Kyiv
  # Rust's bundled IANA timezone table contains every zone name; a table
  # entry is not a victim-selection check.
  unless:
  - id: metadata/lang/compiler/systems::rustc-path
  - id: metadata/lang/compiler/systems::rust-src-path
- id: tz-asia-almaty
  desc: Asia/Almaty timezone string
  crit: component
  conf: 0.8
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    substr: Asia/Almaty
  not:
  - regex: "(?i)(default|defaults|timezone|timestamp).{0,120}Asia/Almaty"
  - regex: "(?i)Asia/Almaty.{0,120}(default|defaults|timezone|timestamp)"
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
- id: tz-asia-tehran
  desc: Asia/Tehran timezone string
  crit: component
  conf: 0.8
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    substr: Asia/Tehran
- id: tz-asia-pyongyang
  desc: Asia/Pyongyang timezone string
  crit: component
  conf: 0.8
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    substr: Asia/Pyongyang
- id: js-intl-datetime-options
  desc: 'Intl.DateTimeFormat.resolvedOptions'
  crit: component
  conf: 0.6
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: Intl\.DateTimeFormat\(.*?\)\.resolvedOptions\(\)
- id: js-gettimezoneoffset
  desc: Date.prototype.getTimezoneOffset()
  crit: component
  conf: 0.5
  for:
  - javascript
  - typescript
  if:
    type: symbol
    exact: getTimezoneOffset
- id: js-timezone-offset-120
  desc: TZ offset 120 (UTC+2)
  crit: component
  for:
  - javascript
  - pe
  - elf
  - macho
  - batch
  - powershell
  if:
    type: text
    regex: getTimezoneOffset\(\).{0,20}120
- id: js-timezone-offset-180
  desc: TZ offset 180 (UTC+3)
