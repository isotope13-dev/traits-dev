- id: tz-asia-almaty-default-doc
  desc: Asia/Almaty documented default timezone
  crit: component
  conf: 0.7
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: "(?i)(timezone|timestamp).{0,160}\\(defaults? to Asia/Almaty\\)"
composite_rules:
- id: cis-timezone
  desc: CIS-region timezone string cluster
  crit: component
  conf: 0.75
  any:
  - id: tz-europe-moscow
  - id: tz-europe-minsk
  - id: tz-europe-kiev
  - id: tz-europe-kyiv
  - id: tz-asia-almaty
  unless:
  - type: trait
    id: tz-asia-almaty-default-doc
- id: js-timezone-detection
  desc: JavaScript timezone check using a CIS-region offset
  crit: notable
  conf: 0.8
  all:
  - id: js-timezone-offset-cis
  any:
  - id: js-intl-datetime-options
  - id: js-gettimezoneoffset
- id: js-timezone-offset-cis
  desc: CIS region timezone offset checks
  crit: suspicious
  any:
  - id: js-timezone-offset-120
  - id: js-timezone-offset-180
  - id: js-timezone-offset-240
  - id: js-timezone-offset-300
  - id: js-timezone-offset-360
