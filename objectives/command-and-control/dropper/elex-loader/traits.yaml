defaults:
  for: [pe]
  platforms: [windows]
  crit: hostile
  conf: 0.99

traits:
  - id: config-block-dUFYeah
    desc: Elex configuration block dUFYeah
    crit: component
    if:
      type: text
      exact: "dUFYeahgg3MQQ29LR0cLEC8s"

  - id: config-block-VVhD5Mg
    desc: Elex configuration block VVhD5Mg
    crit: component
    if:
      type: text
      exact: "VVhD5MgEqtIkt1cDypcaMTc0KEhY0lIkEm"

  - id: config-block-ZXRmrbB
    desc: Elex configuration block ZXRmrbB
    crit: component
    if:
      type: text
      exact: "ZXRmrbBYczCR4R5FxMY4OhEUyHgoG"

  - id: config-block-aTNpvUj
    desc: Elex configuration block aTNpvUj
    crit: component
    if:
      type: text
      exact: "aTNpvUjp7tLjcdjdQY+jDVYbzAghHvAQ0M0QRs9cG2wKGPQ1WLVHcxxFQY73DQ5M3Phw="

  # Matches the literal escaped-regex string Elex embeds in its loader (a binary
  # artifact), not generic URL parsing — it stays here as an Elex-specific anchor.
  - id: url-parsing-regex
    desc: Elex embedded URL-parsing regex string
    crit: component
    if:
      type: text
      regex: 'https\\\?://\\\(www\\\\\\\.\\\)\\\?\\\(\[\^/\\\]\\\{1,200\\\}\\\)'

composite_rules:
  - id: elex-config-blocks
    desc: Elex base64 configuration blocks
    crit: hostile
    conf: 0.99
    all:
      - id: config-block-dUFYeah
      - id: config-block-VVhD5Mg
      - id: config-block-ZXRmrbB
      - id: config-block-aTNpvUj

  # Anchored by the Elex-embedded URL-parsing regex artifact; the remaining legs
  # reference canonical generic capabilities rather than redefining them here.
  - id: elex-loader-heuristics
    desc: Elex loader heuristics
    crit: hostile
    conf: 0.99
    all:
      - id: url-parsing-regex
      - id: micro-behaviors/os/wmi/query::query-computer-system-product
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-dll-name-text
    any:
      - id: metadata/binary/metrics/structural::extreme-max-complexity
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-overall-entropy
