defaults:
  for: [pe]
  platforms: [windows]
  crit: hostile
  conf: 0.99

traits:
  - id: config-block-dUFYeah
    desc: Elex configuration block dUFYeah
    crit: component
    if:
      type: text
      exact: "dUFYeahgg3MQQ29LR0cLEC8s"

  - id: config-block-VVhD5Mg
    desc: Elex configuration block VVhD5Mg
    crit: component
    if:
      type: text
      exact: "VVhD5MgEqtIkt1cDypcaMTc0KEhY0lIkEm"

  - id: config-block-ZXRmrbB
    desc: Elex configuration block ZXRmrbB
    crit: component
    if:
      type: text
      exact: "ZXRmrbBYczCR4R5FxMY4OhEUyHgoG"

  - id: config-block-aTNpvUj
    desc: Elex configuration block aTNpvUj
    crit: component
    if:
      type: text
      exact: "aTNpvUjp7tLjcdjdQY+jDVYbzAghHvAQ0M0QRs9cG2wKGPQ1WLVHcxxFQY73DQ5M3Phw="

  - id: wmi-computersystemproduct
    desc: WMI query for ComputerSystemProduct
    crit: component
    if:
      type: text
      exact: "SELECT * FROM Win32_ComputerSystemProduct"

  - id: url-parsing-regex
    desc: HTTP/HTTPS URL parsing regular expression
    crit: component
    if:
      type: text
      regex: '^(https?://(www\.)?([^/]{1,200}))(/.{0,200})?$'

  - id: winhttp-dll-string
    desc: WINHTTP.dll string
    crit: component
    if:
      type: text
      exact: "WINHTTP.dll"
      case_insensitive: true

  - id: extreme-max-complexity-700
    desc: Extremely high max function complexity
    crit: component
    if:
      type: metrics
      field: binary.max_complexity
      min: 700

  - id: high-entropy-binary
    desc: High overall binary entropy
    crit: component
    if:
      type: metrics
      field: binary.overall_entropy
      min: 7.0

composite_rules:
  - id: elex-config-blocks
    desc: Elex base64 configuration blocks
    crit: hostile
    conf: 0.99
    all:
      - id: config-block-dUFYeah
      - id: config-block-VVhD5Mg
      - id: config-block-ZXRmrbB
      - id: config-block-aTNpvUj

  - id: elex-loader-heuristics
    desc: Elex dropper or generic loader framework heuristics
    crit: hostile
    conf: 0.99
    all:
      - id: wmi-computersystemproduct
      - id: url-parsing-regex
      - id: winhttp-dll-string
    any:
      - id: extreme-max-complexity-700
      - id: high-entropy-binary