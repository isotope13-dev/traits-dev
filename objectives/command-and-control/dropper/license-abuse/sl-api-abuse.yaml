# Software Licensing API abuse detection
# Windows SL APIs (SLInstallProofOfPurchase, SLInstallLicense, etc.)
# are legitimate activation APIs. When multiple are present in a
# non-Microsoft-signed binary, it indicates license theft or
# activation bypass attempts.
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1552.001
  mbc: B0028

composite_rules:
  - id: sl-api-abuse-cluster
    desc: Software Licensing API cluster (license theft/bypass)
    crit: suspicious
    conf: 0.92
    needs: 3
    any:
      - id: micro-behaviors/os/privilege/licensing::sl-install-proof-of-purchase
      - id: micro-behaviors/os/privilege/licensing::sl-install-license
      - id: micro-behaviors/os/privilege/licensing::sl-activate-product
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
