# LNK file-on-disk execution patterns from Unit 42: the shortcut itself is
# a launcher for a nearby or user-directory payload, often with a lure-like
# filename or a script host executing data under a non-script extension.
defaults:
  platforms: [windows]
  for: [lnk]
  attack: T1204.002
traits:
  - id: lnk-target-desktop-ini-exe
    desc: LNK targets desktop.ini.exe
    crit: suspicious
    conf: 0.96
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)(^|[\\/])desktop\.ini\.exe$'
  - id: lnk-target-downloads-exe
    desc: LNK targets executable in user Downloads
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)\\Users\\[^\\]+\\Downloads\\[^\\]+\.exe$'
  - id: lnk-args-data-extension
    desc: LNK arguments reference data extension
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\S+\.(3gp|txt|log|dat)\b'
  - id: lnk-args-media-extension
    desc: LNK arguments reference media extension
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\S+\.(jpg|jpeg|png)\b'
  - id: lnk-args-document-extension
    desc: LNK arguments reference document extension
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\S+\.(pdf|docx?|xlsx?)\b'
  - id: lnk-relative-data-extension
    desc: LNK relative path uses data extension
    crit: component
    conf: 0.85
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.(3gp|txt|log|dat)$'
  - id: lnk-relative-media-extension
    desc: LNK relative path uses media extension
    crit: component
    conf: 0.85
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.(jpg|jpeg|png)$'
  - id: lnk-relative-document-extension
    desc: LNK relative path uses document extension
    crit: component
    conf: 0.85
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.(pdf|docx?|xlsx?)$'
  - id: lnk-relative-deep-parent-chain
    desc: LNK relative path uses deep traversal
    crit: component
    conf: 0.88
    if:
      type: value
      path: lnk.relative_path
      regex: '(\.\.[\\/]){4,}'
  - id: lnk-relative-user-staging-dir
    desc: LNK relative path enters user staging dir
    crit: component
    conf: 0.88
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)[\\/](Desktop|Downloads|Local[\\/]Temp)[\\/]'
  - id: lnk-relative-plain-exe-target
    desc: LNK relative path targets EXE
    crit: component
    conf: 0.86
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.exe$'
  - id: lnk-relative-random-sibling-exe
    desc: LNK targets random-named sibling EXE
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)^\.[\\/][a-z0-9]{10,}\.exe$'
  - id: lnk-workingdir-user-desktop
    desc: LNK working directory is user Desktop
    crit: component
    conf: 0.84
    if:
      type: value
      path: lnk.working_directory
      regex: '(?i)^C:\\Users\\[^\\]+\\Desktop$'
  - id: lnk-relative-data-extension-exe
    desc: LNK targets data-extension EXE
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.(csv|etl|mst)\.exe$'
  - id: lnk-relative-config-extension-exe
    desc: LNK targets config-extension EXE
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.(inf|ini|xml)\.exe$'
  - id: lnk-relative-log-extension-exe
    desc: LNK targets log-extension EXE
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.log\.exe$'
  - id: lnk-relative-installer-extension-exe
    desc: LNK targets installer-extension EXE
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.(msp|msi|exe)\.exe$'
  - id: lnk-relative-installer-copy-payload
    desc: LNK targets installer copy payload
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.(msi|mst)-copy$'
  - id: lnk-relative-config-copy-payload
    desc: LNK targets config copy payload
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.(ini|xml)-copy$'
  - id: lnk-relative-log-copy-payload
    desc: LNK targets log copy payload
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.(log|etl)-copy$'
  - id: lnk-relative-virus-payload
    desc: LNK targets virus-extension payload
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)\.virus$'
  - id: lnk-relative-temp-short-name
    desc: LNK targets short Temp payload name
    crit: component
    conf: 0.84
    if:
      type: value
      path: lnk.relative_path
      regex: '(?i)[\\/]Local[\\/]Temp[\\/][^\\/.]{1,3}$'
  - id: lnk-target-local-temp-path
    desc: LNK target path is Local Temp
    crit: component
    conf: 0.86
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)^Local[\\/]Temp[\\/]'
  - id: lnk-text-local-temp-path
    desc: LNK text contains Local Temp path
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '(?i)Local.{0,80}Temp'
  - id: lnk-target-roaming-exe-path
    desc: LNK target path is Roaming EXE
    crit: component
    conf: 0.86
    if:
      type: value
      path: lnk.target_path
      regex: '(?i)^Roaming[\\/][^\\/]+[\\/][^\\/]+\.exe$'
  - id: lnk-arg-calc-command
    desc: LNK argument invokes calculator
    crit: suspicious
    conf: 0.88
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)(^|\s)-c\s+calc\b'
  - id: lnk-text-powershell-system32
    desc: LNK text references System32 PowerShell
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)WindowsPowerShell\\\\v1\.0\\\\powershell\.exe|powershell\.exe'
  - id: lnk-text-hta-url-concat
    desc: LNK text builds HTA URL
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: "(?i)https?://.{1,160}'\\s*\\+\\s*'\\.h'\\s*\\+\\s*'ta'|https?://\\S{1,180}\\.hta\\b"
composite_rules:
  - id: lnk-downloads-desktop-ini-exe
    desc: LNK executes desktop.ini.exe from Downloads
    crit: hostile
    conf: 0.97
    all:
      - id: lnk-target-desktop-ini-exe
      - id: lnk-target-downloads-exe
  - id: lnk-script-host-nonscript-input
    desc: LNK script host runs non-script extension input
    crit: hostile
    conf: 0.96
    attack: T1059.005
    all:
      - id: objectives/command-and-control/dropper/lnk/target::script-host-target
    any:
      - id: lnk-args-data-extension
      - id: lnk-args-media-extension
      - id: lnk-args-document-extension
  - id: lnk-relative-lure-script-host
    desc: LNK script host uses lure-like relative path
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/command-and-control/dropper/lnk/target::script-host-target
    any:
      - id: lnk-relative-data-extension
      - id: lnk-relative-media-extension
      - id: lnk-relative-document-extension
  - id: lnk-relative-double-extension-exe
    desc: LNK targets double-extension EXE
    crit: suspicious
    conf: 0.94
    any:
      - id: lnk-relative-data-extension-exe
      - id: lnk-relative-config-extension-exe
      - id: lnk-relative-log-extension-exe
      - id: lnk-relative-installer-extension-exe
  - id: lnk-relative-copy-payload
    desc: LNK targets copied payload extension
    crit: suspicious
    conf: 0.92
    any:
      - id: lnk-relative-installer-copy-payload
      - id: lnk-relative-config-copy-payload
      - id: lnk-relative-log-copy-payload
  - id: lnk-masqueraded-payload-shortcut
    desc: LNK launches masqueraded local payload
    crit: hostile
    conf: 0.96
    all:
      - id: lnk-relative-deep-parent-chain
      - id: lnk-relative-user-staging-dir
    any:
      - id: lnk-relative-double-extension-exe
      - id: lnk-relative-copy-payload
      - id: lnk-relative-virus-payload
      - id: lnk-relative-temp-short-name
    needs: 1
  - id: lnk-userdir-exe-shortcut
    desc: LNK launches user-directory EXE
    crit: suspicious
    conf: 0.91
    all:
      - id: micro-behaviors/fs/traversal/parent::lnk-utf16-relative-parent-chain
      - id: lnk-relative-plain-exe-target
  - id: lnk-desktop-random-exe-shortcut
    desc: LNK launches random sibling EXE from Desktop
    crit: hostile
    conf: 0.94
    all:
      - id: lnk-workingdir-user-desktop
      - id: lnk-relative-random-sibling-exe
  - id: lnk-local-temp-payload-shortcut
    desc: LNK launches Local Temp payload
    crit: suspicious
    conf: 0.91
    all:
      - id: micro-behaviors/fs/traversal/parent::lnk-utf16-relative-parent-chain
    any:
      - id: lnk-target-local-temp-path
      - id: lnk-text-local-temp-path
    needs: 1
  - id: lnk-roaming-exe-payload
    desc: LNK launches Roaming EXE payload
    crit: suspicious
    conf: 0.91
    all:
      - id: micro-behaviors/fs/traversal/parent::lnk-utf16-relative-parent-chain
      - id: lnk-target-roaming-exe-path
  - id: lnk-powershell-hta-command-text
    desc: LNK contains PowerShell HTA downloader
    crit: hostile
    conf: 0.95
    all:
      - id: lnk-text-powershell-system32
      - id: lnk-text-hta-url-concat
