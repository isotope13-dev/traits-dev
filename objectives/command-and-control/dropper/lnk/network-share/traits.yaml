defaults:
  platforms: [windows]
  for: [lnk]

traits:
  - id: unc-ipv4-share-argument
    desc: LNK argument uses an IPv4 UNC share
    crit: suspicious
    conf: 0.95
    attack: T1021.002
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\\\\[0-9]{1,3}(\.[0-9]{1,3}){3}\\'
  - id: unc-executable-argument
    desc: LNK argument launches an UNC executable
    crit: suspicious
    conf: 0.97
    attack: T1021.002
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\\\\[0-9]{1,3}(\.[0-9]{1,3}){3}\\[^"&\r\n]{1,240}\.exe\b'
  - id: unc-launch-chain
    desc: LNK chains launches from multiple UNC shares
    crit: suspicious
    conf: 0.98
    attack: T1021.002
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\\\\\d{1,3}(\.\d{1,3}){3}\\[^&]*&\s*start\b[^&]*\\\\\d{1,3}(\.\d{1,3}){3}\\'

composite_rules:
  - id: cmd-remote-executable-launch
    desc: Minimized cmd launches an executable from a UNC share
    crit: hostile
    conf: 0.99
    attack: T1021.002,T1202
    all:
      - id: objectives/execution/lnk/proxy::command-c-argument
      - id: objectives/command-and-control/dropper/lnk/target::cmd-target
      - id: objectives/command-and-control/dropper/lnk/target::minimized-window
      - id: unc-executable-argument
  - id: cmd-remote-share-launch-chain
    desc: Cmd LNK chains launches from remote shares
    crit: hostile
    conf: 0.99
    attack: T1021.002,T1202
    all:
      - id: objectives/execution/lnk/proxy::command-c-argument
      - id: objectives/command-and-control/dropper/lnk/target::cmd-target
      - id: unc-launch-chain
