defaults:
  platforms: [windows]
  attack: T1204.002
  for: [lnk]
traits:
  - id: powershell-target
    desc: LNK targets PowerShell
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: (?i)powershell\.exe$
  - id: pwsh-target
    desc: LNK targets PowerShell Core (pwsh)
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: (?i)pwsh\.exe$
  - id: cmd-target
    desc: LNK targets cmd.exe
    crit: suspicious
    conf: 0.7
    if:
      type: value
      path: lnk.target_path
      regex: (?i)cmd\.exe$
  - id: has-arguments
    desc: LNK has command-line arguments
    crit: component
    conf: 0.9
    if:
      type: value
      path: lnk.arguments
      exists: true
  - id: wscript-target
    desc: LNK targets Windows Script Host (wscript)
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: (?i)wscript\.exe\.?$
  - id: wscript-text-target
    desc: LNK contains wscript executable
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: '(?i)\\windows\\system32\\wscript\.exe\.?'
  - id: cscript-target
    desc: LNK targets console script host (cscript)
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: (?i)cscript\.exe$
  - id: mshta-target
    desc: LNK targets mshta.exe
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.target_path
      regex: (?i)mshta\.exe$
  - id: regsvr32-target
    desc: LNK targets regsvr32.exe
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: (?i)regsvr32\.exe$
  - id: rundll32-target-dup
    desc: LNK targets rundll32.exe
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: (?i)rundll32\.exe$
  - id: certutil-target
    desc: LNK targets certutil.exe
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: (?i)certutil\.exe$
  - id: hidden-window
    desc: LNK executes with hidden window
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.header.show_command
      exact: hidden
  - id: conhost-target
    desc: LNK targets conhost.exe
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.target_path
      regex: (?i)conhost\.exe$
  - id: powershell-in-args
    desc: LNK arguments begin with powershell
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.arguments
      regex: ^powershell\b
      case_insensitive: true

  - id: powershell-argument-executionpolicy-bypass
    desc: LNK PowerShell arguments bypass execution policy
    crit: suspicious
    conf: 0.94
    attack: T1059.001
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)(^|\s)-(ExecutionPolicy|ep)\s+Bypass\b'

  - id: powershell-argument-encoded-command
    desc: LNK PowerShell arguments carry encoded command
    crit: suspicious
    conf: 0.95
    attack: T1059.001,T1027
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)(^|\s)-(EncodedCommand|enc)\s+[A-Za-z0-9+/=]{24,}'

  - id: wscript-engine-override-arg
    desc: "LNK forces wscript engine override"
    # `wscript.exe //E:<engine> <file>` tells the Windows Script Host
    # to interpret <file> as VBScript / JScript regardless of its
    # extension. The technique is the foundation of ZIP/CHM/PDF-named
    # polyglot droppers (AxiomWallets-style "wscript //E:vbscript
    # ..\Wallets.zip"): the lure looks like an archive or document,
    # the LNK ships its real interpretation alongside.
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: lnk.arguments
      regex: '//E:(vbscript|jscript)\b'
      case_insensitive: true
  - id: minimized-window
    desc: LNK runs minimized without activation
    crit: suspicious
    conf: 0.8
    if:
      type: value
      path: lnk.header.show_command
      exact: minimized_no_active
  - id: msedge-target
    desc: LNK references Microsoft Edge executable
    crit: component
    conf: 0.7
    if:
      type: text
      regex: 'msedge\.exe'
      case_insensitive: true
  - id: lnk-icon-lure-shell32
    desc: 'LNK uses shell32.dll icon lure'
    crit: suspicious
    conf: 0.7
    if:
      type: value
      path: lnk.icon_location
      regex: '(?i)shell32\.dll'
composite_rules:
  - id: cmd-with-args
    desc: LNK targets cmd.exe with arguments
    crit: suspicious
    conf: 0.8
    all:
      - id: cmd-target
      - id: has-arguments
  - id: script-host-target
    desc: LNK targets script host
    crit: suspicious
    conf: 0.85
    any:
      - id: wscript-target
      - id: wscript-text-target
      - id: cscript-target
  - id: lolbin-target
    desc: LNK targets LOLBIN
    crit: suspicious
    conf: 0.9
    any:
      - id: mshta-target
      - id: regsvr32-target
      - id: objectives/command-and-control/dropper/lnk/target::rundll32-target-dup
  - id: powershell-family
    desc: LNK targets PowerShell variant
    crit: suspicious
    conf: 0.85
    any:
      - id: powershell-target
      - id: pwsh-target
  - id: suspicious-lnk-target
    desc: LNK targets suspicious executable
    crit: suspicious
    conf: 0.9
    any:
      - id: script-host-target
      - id: lolbin-target
      - id: certutil-target
  - id: hidden-powershell-lnk
    desc: LNK runs PowerShell with hidden window
    crit: hostile
    conf: 0.95
    all:
      - id: powershell-family
      - id: hidden-window
  - id: hidden-lolbin-lnk
    desc: LNK runs LOLBIN with hidden window
    crit: hostile
    conf: 0.95
    all:
      - id: lolbin-target
      - id: hidden-window
  - id: conhost-powershell-proxy
    desc: LNK uses conhost.exe to proxy PowerShell
    crit: hostile
    conf: 0.95
    attack: T1202
    all:
      - id: conhost-target
      - id: powershell-in-args
  - id: hidden-or-minimized-powershell
    desc: LNK runs an encoded PowerShell command hidden or minimized
    crit: hostile
    conf: 0.95
    all:
      - id: powershell-family
      - id: powershell-argument-encoded-command
    any:
      - id: hidden-window
      - id: minimized-window
  - id: hidden-or-minimized-window
    desc: LNK hidden or minimized window
    crit: suspicious
    conf: 0.9
    any:
      - id: hidden-window
      - id: minimized-window
  - id: lnk-hidden-powershell-web-dropper
    desc: LNK hidden PowerShell web dropper
    crit: hostile
    conf: 0.98
    attack: T1105
    all:
      - id: objectives/command-and-control/dropper/lnk/command-content::kv-http-in-args
      - id: objectives/command-and-control/dropper/lnk/command-content::kv-ep-bypass
      - id: hidden-or-minimized-window
    any:
      - id: powershell-in-args
      - id: powershell-family
      - id: cmd-target
      - id: objectives/command-and-control/dropper/lnk/deflatestream::lnk-kv-powershell-argument
  - id: lnk-powershell-web-dropper
    desc: LNK PowerShell web dropper
    crit: hostile
    conf: 0.97
    attack: T1105
    all:
      - id: objectives/command-and-control/dropper/lnk/command-content::kv-http-in-args
      - id: objectives/command-and-control/dropper/lnk/command-content::kv-ep-bypass
      - id: objectives/command-and-control/dropper/lnk/deflatestream::lnk-kv-powershell-argument
  - id: lnk-hidden-script-host-dropper
    desc: LNK hidden script-host dropper
    crit: hostile
    conf: 0.96
    attack: T1059.005
    all:
      - id: script-host-target
      - id: hidden-window
      - id: has-arguments
  - id: lnk-minimized-webdav-script-host-dropper
    desc: Minimized LNK launches a script host from WebDAV
    crit: hostile
    conf: 0.98
    attack: T1059.005,T1105,T1187
    all:
      - id: script-host-target
      - id: minimized-window
      - id: has-arguments
      - id: micro-behaviors/communications/http/webdav::webdav-ssl-unc-argument
  - id: browser-webdav-js-loader
    desc: LNK uses browser to load remote JS via WebDAV
    crit: hostile
    conf: 0.95
    attack: T1105
    all:
      - id: msedge-target
      - id: objectives/command-and-control/dropper/lnk/command-content::lnk-webdav-unc-ip-port
      - id: objectives/command-and-control/dropper/lnk/command-content::lnk-js-extension
