defaults:
  platforms: [windows, unix]
  for: [swift]
  attack: T1204.002
  mbc: F0012

traits:
  - id: swift-lnk-cmd-c-arguments
    desc: Swift LNK cmd /c arguments
    crit: component
    conf: 0.88
    if:
      type: text
      substr: /c ping -n

  - id: swift-lnk-curl-temp-drop
    desc: Swift LNK curl temp drop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'curl -s http://[\s\S]{0,120}-o %TEMP%\\'

  - id: swift-lnk-temp-exe-run
    desc: Swift LNK temp exe run
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '%TEMP%\\\\[A-Za-z0-9_.-]+\.exe[\s\S]{0,80}%TEMP%\\\\[A-Za-z0-9_.-]+\.exe'

composite_rules:
  - id: swift-lnk-curl-drop-execute
    desc: Swift LNK curl drop execute
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/com/object::swift-shelllink-shortcut-builder
      - id: swift-lnk-cmd-c-arguments
      - id: swift-lnk-curl-temp-drop
      - id: swift-lnk-temp-exe-run
