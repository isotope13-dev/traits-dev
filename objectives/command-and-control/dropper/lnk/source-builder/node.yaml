defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1204.002
  mbc: F0012
traits:
  - id: node-buildlnk-function
    desc: Node LNK builder function
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: buildLnk
  - id: node-buildlnk-named-function
    desc: Node named LNK builder
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'function\s+buildLnk[A-Za-z0-9_]*\s*\('
  - id: shelllink-header-flags-constant
    desc: ShellLink header flags constant
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '0x00010001'
  - id: shelllink-linkinfo-size-constant
    desc: ShellLink LinkInfo size constant
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '0x0000001c'
  - id: shelllink-local-base-offset-constant
    desc: ShellLink local base path offset
    crit: component
    conf: 0.86
    if:
      type: text
      substr: '0x14'
  - id: lnk-target-bin-bash
    desc: LNK targets bin bash
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: /bin/bash
  - id: lnk-target-crontab
    desc: LNK targets crontab
    crit: notable
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: /usr/bin/crontab
  - id: lnk-target-wget
    desc: LNK targets wget
    crit: component
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: /usr/bin/wget
  - id: lnk-target-cat
    desc: LNK targets cat
    crit: component
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: /usr/bin/cat
  - id: lnk-target-env
    desc: LNK targets env
    crit: component
    conf: 0.86
    if:
      type: literal
      kind: string
      exact: /usr/bin/env
composite_rules:
  - id: lnk-execution-target-literals
    desc: LNK execution target literals
    crit: component
    conf: 0.92
    needs: 2
    any:
      - id: lnk-target-bin-bash
      - id: lnk-target-crontab
      - id: lnk-target-wget
      - id: lnk-target-cat
      - id: lnk-target-env
  - id: node-lnk-dropper-builder
    desc: Node builds executable LNK droppers
    crit: hostile
    conf: 0.97
    all:
      - id: shelllink-header-flags-constant
      - id: shelllink-linkinfo-size-constant
      - id: shelllink-local-base-offset-constant
      - id: micro-behaviors/data/buffer::node-buffer-uint32le-writes
      - id: lnk-execution-target-literals
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
    any:
      - id: node-buildlnk-function
      - id: node-buildlnk-named-function
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/library/structure/
