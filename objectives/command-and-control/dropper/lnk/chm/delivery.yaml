defaults:
  platforms: [windows]
  for: [lnk]
  attack: T1105

traits:
  - id: lnk-arg-conhost-headless-cmd
    desc: LNK args proxy cmd through conhost
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\bconhost(\.exe)?\s+--headless\s+cmd(\.exe)?\s+/c\b'

  - id: lnk-arg-curl-output-download
    desc: LNK args curl output download
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\bcurl(\.exe)?\b.{0,200}\s-[A-Za-z]*["'']*o(\s|["'']|%|[\\/])\S{1,80}'

  - id: lnk-arg-hh-decompile
    desc: LNK args decompile CHM payload
    crit: suspicious
    conf: 0.95
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)\bhh(\.exe)?\s+-decomp(ile|i["'']{2}le)\b'

  - id: lnk-arg-launch-second-lnk
    desc: LNK args launch extracted shortcut
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: lnk.arguments
      regex: '(?i)(^|[&|]\s*)\S{1,80}\.lnk\b'

composite_rules:
  - id: lnk-chm-decompile-dropper
    desc: LNK downloads CHM and launches extraction
    crit: hostile
    conf: 0.98
    all:
      - id: lnk-arg-curl-output-download
      - id: lnk-arg-hh-decompile
    any:
      - id: lnk-arg-conhost-headless-cmd
      - id: lnk-arg-launch-second-lnk

  - id: lnk-chm-staged-shortcut-dropper
    desc: LNK downloads and decompiles a staged shortcut
    crit: hostile
    conf: 0.99
    attack: T1105,T1218
    all:
      - id: lnk-arg-curl-output-download
      - id: lnk-arg-hh-decompile
      - id: lnk-arg-launch-second-lnk
      - id: objectives/command-and-control/dropper/lnk/target::hidden-or-minimized-window
