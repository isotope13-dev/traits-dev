# LNK overlay-content execution patterns described by Unit 42:
# attackers append script/payload data after the valid shortcut and use the
# shortcut arguments to locate, decode, and execute that appended content.
defaults:
  platforms: [windows]
  for: [lnk]
  attack: T1204.002
traits:
  - id: lnk-args-findstr-lnk
    desc: LNK arguments search a shortcut with findstr
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: lnk.arguments
      regex: '\bfindstr(\.exe)?\b.{0,240}\.lnk\b'
      case_insensitive: true
  - id: lnk-args-find-lnk
    desc: LNK arguments search a shortcut with find
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.arguments
      regex: '\bfind(\.exe)?\b.{0,240}\.lnk\b'
      case_insensitive: true
  - id: lnk-args-mshta-lnk-input
    desc: LNK arguments feed a shortcut to mshta
    crit: suspicious
    conf: 0.96
    if:
      type: value
      path: lnk.arguments
      regex: '\bmshta(\.exe)?\b.{0,200}\.lnk\b|\.lnk\b.{0,200}\bmshta(\.exe)?\b'
      case_insensitive: true
  - id: lnk-raw-hta-application
    desc: LNK contains HTA application markup
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '<\s*hta:application\b|hta:application\b'
      case_insensitive: true
  - id: lnk-args-select-string-lnk
    desc: LNK arguments search shortcut content with Select-String
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: lnk.arguments
      regex: '\bSelect-String\b.{0,240}\.lnk\b|\.lnk\b.{0,240}\bSelect-String\b'
      case_insensitive: true
  - id: lnk-args-get-content-lnk
    desc: LNK arguments read shortcut content with Get-Content
    crit: suspicious
    conf: 0.92
    if:
      type: value
      path: lnk.arguments
      regex: '\bGet-Content\b.{0,240}\.lnk\b|\.lnk\b.{0,240}\bGet-Content\b'
      case_insensitive: true
  - id: lnk-args-substring-extract
    desc: LNK arguments extract payload with Substring
    crit: suspicious
    conf: 0.85
    if:
      type: value
      path: lnk.arguments
      regex: '\.Substring\s*\('
      case_insensitive: true
  - id: lnk-args-frombase64string
    desc: LNK arguments decode Base64 content
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.arguments
      regex: '\[Convert\]::FromBase64String\b|FromBase64String\s*\('
      case_insensitive: true
  - id: lnk-raw-base64-pe-marker
    desc: LNK contains Base64 PE marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bTVqQ[A-Za-z0-9+/]{40,}'
  - id: lnk-raw-bsd-tvqq-marker
    desc: LNK contains BS:D Base64 PE overlay marker
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'BS:D\s*TVqQ'
composite_rules:
  - id: lnk-findstr-overlay-extractor
    desc: LNK uses find/findstr to extract overlay content
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/command-and-control/dropper/lnk/target::has-arguments
    any:
      - id: lnk-args-findstr-lnk
      - id: lnk-args-find-lnk
  - id: lnk-mshta-self-overlay
    desc: LNK executes appended HTA overlay via mshta
    crit: hostile
    conf: 0.98
    attack: T1218.005
    all:
      - id: lnk-args-mshta-lnk-input
      - id: lnk-raw-hta-application
  - id: lnk-powershell-overlay-extractor
    desc: LNK uses PowerShell to extract and decode overlay content
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/dropper/lnk/target::has-arguments
    needs: 2
    any:
      - id: lnk-args-select-string-lnk
      - id: lnk-args-get-content-lnk
      - id: lnk-args-substring-extract
      - id: lnk-args-frombase64string
      - id: lnk-raw-base64-pe-marker
      - id: lnk-raw-bsd-tvqq-marker
  - id: lnk-overlay-execution
    desc: LNK overlay content execution pattern
    crit: hostile
    conf: 0.98
    any:
      - id: lnk-findstr-overlay-extractor
      - id: lnk-mshta-self-overlay
      - id: lnk-powershell-overlay-extractor
