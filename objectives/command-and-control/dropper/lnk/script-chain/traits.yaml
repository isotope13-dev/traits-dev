# LNK arguments that build and chain script payloads — the canonical
# pattern is "echo <script> > %TEMP%\X.vbs && cscript //b %TEMP%\X.vbs
# && powershell -ExecutionPolicy Bypass -W Hidden -File ...". Each
# stage individually is interesting; chained inside a .lnk's
# argument field they are essentially never legitimate.
defaults:
  platforms: [windows]
  for: [lnk]
  attack: T1059.005
  mbc: F0007
traits:
  - id: lnk-arg-echo-redirect
    desc: LNK arg echoes content to temp file
    crit: suspicious
    conf: 0.93
    if:
      type: kv
      path: arguments
      regex: '\becho\b[^"\n]{0,400}>\s*%TEMP%'
      case_insensitive: true
  - id: lnk-arg-cscript-batch
    desc: LNK arg invokes cscript //b
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: arguments
      regex: 'cscript\s+(//[Bb]|/b)\b'
  - id: lnk-arg-wscript-batch
    desc: LNK arg invokes wscript //b
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: arguments
      regex: 'wscript\s+(//[Bb]|/b)\b'
  - id: lnk-arg-powershell-hidden
    desc: LNK arg uses PowerShell -W Hidden
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: arguments
      regex: '-(W(indowStyle)?|w)\s+Hidden\b'
      case_insensitive: true
  - id: lnk-arg-temp-script-drop-ps
    desc: LNK arg drops .ps1/.vbs/.js to TEMP
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: arguments
      regex: '%TEMP%\\\\?\S{1,40}\.(ps1|vbs|js)'
      case_insensitive: true
  - id: lnk-arg-temp-script-drop-bat
    desc: LNK arg drops .bat/.cmd/.hta to TEMP
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: arguments
      regex: '%TEMP%\\\\?\S{1,40}\.(bat|cmd|hta)'
      case_insensitive: true
  - id: lnk-arg-script-chain-amp
    desc: LNK arg chains commands with &&
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: arguments
      regex: '&&\s*\S{0,20}\s*&&'
  - id: lnk-arg-self-delete-script
    desc: LNK arg deletes dropped script after use
    crit: suspicious
    conf: 0.93
    if:
      type: kv
      path: arguments
      regex: '\bdel\s+\S{0,40}%TEMP%\\\\?\S{1,40}\.(vbs|ps1|js)'
      case_insensitive: true
  - id: lnk-arg-self-delete-bat
    desc: LNK arg deletes dropped batch after use
    crit: suspicious
    conf: 0.93
    if:
      type: kv
      path: arguments
      regex: '\bdel\s+\S{0,40}%TEMP%\\\\?\S{1,40}\.(bat|cmd|hta)'
      case_insensitive: true
  - id: lnk-arg-cmd-c-txt
    desc: LNK arg runs .txt via cmd /c
    crit: suspicious
    conf: 0.97
    if:
      type: kv
      path: arguments
      regex: '\bcmd(\.exe)?\s+/c\s+\S{1,80}\.(txt|log|dat)'
      case_insensitive: true
  - id: lnk-arg-cmd-c-doc
    desc: LNK arg runs document via cmd /c
    crit: suspicious
    conf: 0.97
    if:
      type: kv
      path: arguments
      regex: '\bcmd(\.exe)?\s+/c\s+\S{1,80}\.(docx?|pdf)'
      case_insensitive: true
  - id: lnk-arg-powershell-noprofile
    desc: LNK arg uses PowerShell -noprofile
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: arguments
      regex: '-(NoProfile|nop)\b'
      case_insensitive: true
composite_rules:
  - id: lnk-extension-mismatch-execution
    desc: LNK runs document-extension PE via cmd /c
    crit: hostile
    conf: 0.97
    any:
      - id: lnk-arg-cmd-c-txt
      - id: lnk-arg-cmd-c-doc
  - id: lnk-script-chain-dropper
    desc: LNK echoes/drops/chains script payload
    crit: hostile
    conf: 0.97
    needs: 2
    any:
      - id: lnk-arg-echo-redirect
      - id: lnk-arg-cscript-batch
      - id: lnk-arg-wscript-batch
      - id: lnk-arg-powershell-hidden
      - id: objectives/command-and-control/dropper/lnk/heuristic::kv-ep-bypass
      - id: lnk-arg-temp-script-drop-ps
      - id: lnk-arg-temp-script-drop-bat
      - id: lnk-arg-self-delete-script
      - id: lnk-arg-self-delete-bat
      - id: lnk-arg-powershell-noprofile
