defaults:
  platforms: [windows]
  for: [lnk, batch]
traits:
  - id: script-in-tmp
    desc: Drops script in temporary directory
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?i)(\$env:tmp|%tmp%).{0,50}\.vbs'

composite_rules:
  - id: hostile-script-dropper
    desc: Obfuscated LNK drops and executes script
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/traversal/parent::lnk-utf16-relative-parent-chain
      - id: objectives/command-and-control/dropper/lnk/script-drop::script-in-tmp
      - id: objectives/anti-static/obfuscation/string/reconstruct::for-loop-string-reconstruction
