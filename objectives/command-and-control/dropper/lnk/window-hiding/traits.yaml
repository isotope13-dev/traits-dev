# Working-directory tells in LNK metadata. Native shortcuts to user
# programs use a working_dir matching the program's install path or
# %USERPROFILE%; cmd/powershell shortcuts whose working_dir points at
# %LOCALAPPDATA% / %APPDATA% / %TEMP% / %PUBLIC% are staging-dir
# launchers. Composes with the existing minimized/hidden-window
# traits in suspicious-targets.yaml.
defaults:
  platforms: [windows]
  for: [lnk]
  attack: T1564.003
  mbc: F0008
traits:
  - id: lnk-workingdir-localappdata
    desc: LNK working dir is LOCALAPPDATA/APPDATA
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.working_directory
      regex: '%(LOCAL)?APPDATA%'
      case_insensitive: true
  - id: lnk-workingdir-temp
    desc: LNK working dir is TEMP/TMP
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.working_directory
      regex: '%TEMP%|%TMP%'
      case_insensitive: true
  - id: lnk-workingdir-public
    desc: LNK working dir is PUBLIC user folder
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: lnk.working_directory
      regex: '%PUBLIC%|\\Users\\Public\\'
      case_insensitive: true
  - id: lnk-text-cmd-target
    desc: LNK contains cmd.exe target string
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\bcmd\.exe\b'
      case_insensitive: true
  - id: lnk-text-powershell-target
    desc: LNK contains powershell.exe target
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '\bpowershell(\.exe)?\b'
      case_insensitive: true
composite_rules:
  - id: lnk-shell-from-staging-workdir
    desc: Shell-target LNK runs from staging dir
    crit: hostile
    conf: 0.96
    any:
      - id: lnk-workingdir-localappdata
      - id: lnk-workingdir-temp
      - id: lnk-workingdir-public
    all:
      - id: lnk-text-cmd-target
  - id: lnk-powershell-from-staging-workdir
    desc: PowerShell LNK runs from staging dir
    crit: hostile
    conf: 0.96
    any:
      - id: lnk-workingdir-localappdata
      - id: lnk-workingdir-temp
      - id: lnk-workingdir-public
    all:
      - id: lnk-text-powershell-target
