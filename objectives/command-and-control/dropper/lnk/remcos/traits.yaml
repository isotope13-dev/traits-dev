defaults:
  platforms: [windows]
  for: [lnk, powershell]
  attack: T1204.002
traits:
  - id: powershell-bigint-ref
    desc: PowerShell BigInt type reference
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: "[bigint]"

  - id: powershell-bxor-op
    desc: PowerShell bitwise XOR operator
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: "-bxor"

  - id: powershell-shr-op
    desc: PowerShell bitwise shift right operator
    crit: baseline
    conf: 0.5
    if:
      type: text
      substr: "-shr 8"

  - id: powershell-band-byte-mask
    desc: PowerShell bitwise AND with byte mask
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: "-band 0xFF"

  - id: remcos-ps1-temp-drop
    desc: Remcos stager drops secondary PS1 to TEMP
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)iwr.{0,120}-OutFile\s+\$env:TEMP\\[a-zA-Z0-9]+\.ps1'

composite_rules:
  - id: remcos-bigint-xor-decode
    desc: Remcos-style BigInt XOR domain decryption in PowerShell
    crit: hostile
    conf: 0.98
    all:
      - id: powershell-bigint-ref
      - id: powershell-bxor-op
      - id: powershell-shr-op
      - id: powershell-band-byte-mask

  - id: remcos-lnk-dropper
    desc: Remcos LNK dropper with XOR-encoded PowerShell stager
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/dropper/lnk/target::powershell-target
      - id: remcos-bigint-xor-decode
      - id: remcos-ps1-temp-drop
    any:
      - id: objectives/evasion/masquerade/file::image-double-extension-lnk
      - id: objectives/command-and-control/dropper/lnk/target::lnk-icon-lure-shell32
