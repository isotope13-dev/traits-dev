# LNK files whose cmd-line arguments invoke a COM-based downloader chain.
# The classic VBS-style "ServerXMLHTTP + ADODB.Stream + SaveToFile"
# downloader, embedded directly into a .lnk's argument string and
# echoed into a temp .vbs that cscript executes, has been used by
# state-aligned and commodity actors for over a decade. Each component
# is suspicious individually; the combination inside an LNK is hostile.
defaults:
  platforms: [windows]
  for: [lnk]
  attack: T1105
  mbc: B0030
traits:
  - id: lnk-arg-msxml-serverhttp
    desc: LNK arg uses MSXML2.ServerXMLHTTP
    crit: suspicious
    conf: 0.97
    if:
      type: kv
      path: arguments
      regex: 'MSXML2\.(ServerXMLHTTP|XMLHTTP)'
      case_insensitive: true
  - id: lnk-arg-winhttp-request
    desc: LNK arg uses WinHttpRequest
    crit: suspicious
    conf: 0.97
    if:
      type: kv
      path: arguments
      regex: 'WinHttp\.WinHttpRequest'
      case_insensitive: true
  - id: lnk-arg-adodb-stream
    desc: LNK arg uses ADODB.Stream
    crit: suspicious
    conf: 0.97
    if:
      type: kv
      path: arguments
      regex: 'ADODB\.Stream'
      case_insensitive: true
  - id: lnk-arg-savetofile
    desc: LNK arg calls Stream.SaveToFile
    crit: suspicious
    conf: 0.95
    if:
      type: kv
      path: arguments
      regex: '\.SaveToFile\b'
  - id: lnk-arg-responsebody
    desc: LNK arg reads HTTP responseBody
    crit: suspicious
    conf: 0.92
    if:
      type: kv
      path: arguments
      regex: 'responseBody'
      case_insensitive: true
  - id: lnk-arg-createobject
    desc: LNK arg invokes CreateObject COM
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: arguments
      regex: 'CreateObject\s*\('
      case_insensitive: true
composite_rules:
  - id: lnk-com-downloader
    desc: LNK with COM HTTP download chain
    crit: hostile
    conf: 0.97
    needs: 2
    any:
      - id: lnk-arg-msxml-serverhttp
      - id: lnk-arg-winhttp-request
      - id: lnk-arg-adodb-stream
      - id: lnk-arg-savetofile
      - id: lnk-arg-responsebody
