defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1587.001
  mbc: B0007

traits:
  - id: dnlib-dotnet-import
    desc: dnlib .NET rewriting import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: import
      regex: '^dnlib\.DotNet(\.Emit)?$'
  - id: dnlib-module-load-call
    desc: dnlib module load call
    crit: notable
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: ModuleDefMD.Load
  - id: dnlib-ldstr-patch-loop
    desc: dnlib string operand patch loop
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'OpCodes\.Ldstr[\s\S]{0,160}instruction\.Operand\.ToString\(\)'
  - id: implant-config-field-cluster
    desc: Implant configuration field cluster
    crit: component
    conf: 0.9
    count_min: 4
    if:
      type: text
      regex: 'BuildInfo\.(ip|port|mutex|startup|wdex|path|folder|filename)'
  - id: bundled-client-template
    desc: Client template binary loaded
    crit: component
    conf: 0.88
    if:
      type: literal
      regex: '(?i)\bclient\.bin\b'

composite_rules:
  - id: dotnet-implant-builder-string-patcher
    desc: .NET implant builder string patcher
    crit: hostile
    conf: 0.97
    all:
      - id: dnlib-dotnet-import
      - id: dnlib-module-load-call
      - id: dnlib-ldstr-patch-loop
      - id: implant-config-field-cluster
    any:
      - id: bundled-client-template
      - id: objectives/command-and-control/backdoor/control/hvnc::hvnc-browser-title-source
