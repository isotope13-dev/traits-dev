# MSBuild-based Dropper Factory
# Detects source code that uses MSBuild.exe to compile and deliver malware payloads
# A dropper factory receives build requests, compiles stubs, and uploads them to C2
# ATT&CK: T1127.001 (Trusted Developer Utilities Proxy Execution: MSBuild)
defaults:
  platforms: [windows]
  for: [csharp, source]
  crit: notable
  attack: T1127.001
traits:
  - id: msbuild-exe-path
    desc: MSBuild.exe hardcoded path reference
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)MSBuild\.exe
  - id: msbuild-configuration-release
    desc: MSBuild release configuration argument
    crit: component
    conf: 0.8
    if:
      type: text
      substr: /p:Configuration=Release
  - id: msbuild-platform-x64
    desc: MSBuild x64 platform argument
    crit: component
    conf: 0.75
    if:
      type: text
      substr: /p:Platform=x64
  - id: vcxproj-compile
    desc: Visual C++ project file compilation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \.vcxproj
  - id: ownerid-buildid-placeholder
    desc: OWNERID/BUILDID code placeholder injection
    crit: suspicious
    conf: 0.95
    attack: T1027
    if:
      type: text
      regex: (//OWNERID|//BUILDID|//OwneryID|//BuildyID)
  - id: fake-code-placeholder
    desc: FAKE CODE placeholder for dead code injection
    crit: suspicious
    conf: 0.9
    attack: T1027.001
    if:
      type: text
      regex: /\*FAKE CODE\*/
  - id: msbuild-wait-sleep
    desc: MSBuild compile sleep-wait pattern
    crit: component
    conf: 0.7
    if:
      type: text
      regex: Thread\.Sleep\s*\(\s*1[0-9]{4}
  - id: convert-to-base64-file
    desc: Compiled binary base64-encoded for exfil
    crit: notable
    conf: 0.85
    attack: T1132
    if:
      type: text
      regex: Convert\.ToBase64String\s*\(\s*File\.ReadAllBytes
composite_rules:
  - id: msbuild-dropper-factory
    desc: MSBuild used to compile and deliver malware stubs
    crit: hostile
    conf: 0.95
    all:
      - id: msbuild-exe-path
      - id: msbuild-configuration-release
      - id: msbuild-platform-x64
      - id: vcxproj-compile
    any:
      - id: ownerid-buildid-placeholder
      - id: convert-to-base64-file
  - id: msbuild-dropper-obfuscation
    desc: MSBuild stub with dead code injection
    crit: suspicious
    conf: 0.9
    attack: T1027.001
    all:
      - id: msbuild-exe-path
      - id: msbuild-wait-sleep
    any:
      - id: fake-code-placeholder
      - id: ownerid-buildid-placeholder
