defaults:
  platforms: [windows]
  for: [pe]
  crit: suspicious
  conf: 0.9
  attack: T1055.012
traits:
  - id: self-inject-marker
    desc: Self-injection target placeholder string
    if:
      type: text
      exact: '[itself]'
  - id: regasm-inject-marker
    desc: RegAsm injection target placeholder string
    if:
      type: text
      exact: '[regasm]'
  - id: fake-message-text-marker
    desc: Builder placeholder for fake message box text
    crit: suspicious
    conf: 0.95
    attack: T1036
    if:
      type: text
      exact: '[messagetext-replace]'
  - id: fake-message-title-marker
    desc: Builder placeholder for fake message box title
    crit: suspicious
    conf: 0.95
    attack: T1036
    if:
      type: text
      exact: '[messagetitle-replace]'
  - id: encrypted-resource-name
    desc: .NET resource named Encrypted (payload container)
    crit: component
    conf: 0.85
    attack: T1027.009
    if:
      type: text
      exact: Encrypted
  - id: runpe-class-name
    desc: RunPe class name indicating hollowing toolkit
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      regex: RunPe\d*::(Run|CreateProcess)
composite_rules:
  - id: dotnet-runpe-builder-artifact
    desc: .NET RunPe dropper builder with self/regasm injection targets
    crit: hostile
    conf: 0.97
    mbc: B0007
    any:
      - id: self-inject-marker
      - id: regasm-inject-marker
    all:
      - id: objectives/evasion/process/injection::nt-unmap-section
      - id: objectives/evasion/process/injection::create-process-string
  - id: dotnet-fake-decoy-message
    desc: .NET dropper with fake decoy message box
    crit: suspicious
    conf: 0.95
    attack: T1036
    any:
      - id: fake-message-text-marker
      - id: fake-message-title-marker
    all:
      - id: objectives/evasion/process/injection::nt-unmap-section
  - id: dotnet-encrypted-resource-loader
    desc: .NET loader with encrypted embedded resource and PBKDF2
    crit: hostile
    conf: 0.95
    attack: T1027.009
    mbc: B0009.014
    all:
      - id: encrypted-resource-name
      - id: micro-behaviors/crypto/kdf/operations::rfc2898derivebytes
      - id: micro-behaviors/crypto/symmetric/aes::dotnet-rijndael
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcemanager
