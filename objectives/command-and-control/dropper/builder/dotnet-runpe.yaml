defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: suspicious
  conf: 0.9
  attack: T1055.012
traits:
  - id: self-inject-marker
    desc: Self-injection target placeholder string
    if:
      type: text
      exact: '[itself]'
  - id: regasm-inject-marker
    desc: RegAsm injection target placeholder string
    if:
      type: text
      exact: '[regasm]'
  - id: fake-message-text-marker
    desc: Builder placeholder for fake message box text
    crit: suspicious
    conf: 0.95
    attack: T1036
    if:
      type: text
      exact: '[messagetext-replace]'
  - id: fake-message-title-marker
    desc: Builder placeholder for fake message box title
    crit: suspicious
    conf: 0.95
    attack: T1036
    if:
      type: text
      exact: '[messagetitle-replace]'
  - id: encrypted-resource-name
    desc: .NET resource named Encrypted (payload container)
    crit: component
    conf: 0.85
    attack: T1027.009
    if:
      type: text
      exact: Encrypted
  - id: runpe-class-name
    desc: RunPe class name indicating hollowing toolkit
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      regex: RunPe\d*::(Run|CreateProcess)
  - id: dotnet-crypter-title
    desc: .NET crypter builder title text
    crit: component
    conf: 0.96
    if:
      type: text
      regex: (?i)\b(Morpheous|Morpheus|Eladitos)\s+Crypter\b|Morpheous Crypter Cracked
  - id: dotnet-crypter-ui-file-pumper
    desc: Crypter file pumper UI
    crit: component
    conf: 0.9
    if:
      type: text
      substr: File Pumper
  - id: dotnet-crypter-ui-extension-spoofer
    desc: Crypter extension spoofer UI
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Extension Spoofer
  - id: dotnet-crypter-ui-fake-message
    desc: Crypter fake message UI
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Fake Message
  - id: dotnet-crypter-ui-assembly-info
    desc: Crypter assembly info UI
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Assembly Info
  - id: dotnet-crypter-ui-downloader
    desc: Crypter downloader UI
    crit: component
    conf: 0.88
    if:
      type: text
      substr: Downloader
  - id: dotnet-crypter-core-placeholders
    desc: Core crypter stub placeholders
    crit: component
    conf: 0.94
    count_min: 3
    if:
      type: text
      regex: '\[(ANTI|ENCRYPTION|PERSISTENCE|INJECT)\]'
  - id: dotnet-crypter-disable-placeholders
    desc: Disable-tool stub placeholders
    crit: component
    conf: 0.94
    count_min: 3
    if:
      type: text
      regex: '\[(UAC|TASKMGR|REGEDIT|CMD)\]'
  - id: dotnet-crypter-add-resource
    desc: Crypter AddResource token
    crit: component
    conf: 0.88
    if:
      type: text
      substr: AddResource
  - id: dotnet-crypter-resource-writer
    desc: Crypter ResourceWriter token
    crit: component
    conf: 0.86
    if:
      type: text
      substr: ResourceWriter
  - id: dotnet-crypter-embedded-resources
    desc: Crypter embedded resources token
    crit: component
    conf: 0.86
    if:
      type: text
      substr: EmbeddedResources
  - id: dotnet-crypter-source-delimiter
    desc: .NET crypter packed source delimiter
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'MORPHEOUS|#KILLAMUVZ#'
composite_rules:
  - id: dotnet-crypter-ui-feature-cluster
    desc: .NET crypter builder feature UI labels
    crit: component
    conf: 0.9
    needs: 4
    any:
      - id: dotnet-crypter-ui-file-pumper
      - id: dotnet-crypter-ui-extension-spoofer
      - id: dotnet-crypter-ui-fake-message
      - id: dotnet-crypter-ui-assembly-info
      - id: dotnet-crypter-ui-downloader
  - id: dotnet-crypter-stub-placeholders
    desc: .NET crypter stub template placeholders
    crit: component
    conf: 0.94
    all:
      - id: dotnet-crypter-core-placeholders
      - id: dotnet-crypter-disable-placeholders
  - id: dotnet-crypter-resource-builder
    desc: Crypter resource builder
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: dotnet-crypter-add-resource
      - id: dotnet-crypter-resource-writer
      - id: dotnet-crypter-embedded-resources
      - id: objectives/execution/compile/runtime::generate-executable
  - id: dotnet-crypter-builder-suite
    desc: .NET crypter/dropper builder suite
    crit: hostile
    conf: 0.96
    attack: T1587.001
    mbc: B0007
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/execution/compile/runtime::runtime-code-compilation
      - id: dotnet-crypter-stub-placeholders
      - id: dotnet-crypter-resource-builder
    any:
      - id: dotnet-crypter-title
      - id: dotnet-crypter-ui-feature-cluster
      - id: dotnet-crypter-source-delimiter
    needs: 2
  - id: dotnet-runpe-builder-artifact
    desc: .NET RunPe dropper builder with self/regasm injection targets
    crit: hostile
    conf: 0.97
    mbc: B0007
    any:
      - id: self-inject-marker
      - id: regasm-inject-marker
    all:
      - id: objectives/evasion/process/injection/hollowing::nt-unmap-section
      - id: micro-behaviors/process/create/shell/guard::create-process-string
  - id: dotnet-fake-decoy-message
    desc: .NET dropper with fake decoy message box
    crit: suspicious
    conf: 0.95
    attack: T1036
    any:
      - id: fake-message-text-marker
      - id: fake-message-title-marker
    all:
      - id: objectives/evasion/process/injection/hollowing::nt-unmap-section
  - id: dotnet-encrypted-resource-loader
    desc: .NET loader with encrypted embedded resource and PBKDF2
    crit: hostile
    conf: 0.95
    attack: T1027.009
    mbc: B0009.014
    all:
      - id: encrypted-resource-name
      - id: micro-behaviors/crypto/kdf/password::rfc2898derivebytes
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-resourcemanager
