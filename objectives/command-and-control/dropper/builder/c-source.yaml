# C/C++ payload builders that emit patched executable stubs.
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1027
  mbc: B0024

traits:
  - id: c-builder-create-output-exe
    desc: Builder creates output executable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'CreateFile\s*\(\s*"[^"\r\n]{1,60}\.exe"'
  - id: c-builder-write-embedded-stub
    desc: Builder writes embedded stub bytes
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'WriteFile\s*\(\s*f\s*,\s*[A-Za-z_][A-Za-z0-9_]*\s*,\s*\d+'
  - id: c-builder-write-config-block
    desc: Builder writes patched config block
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'WriteFile\s*\(\s*f\s*,\s*buf\s*,\s*\d+'
  - id: c-builder-padding-random-config
    desc: Builder pads config with random bytes
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "buf[fix] = rand();"
  - id: c-builder-upx-output-exe
    desc: Builder UPX-packs output executable
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ShellExecute\s*\([^\r\n]{0,80}"upx\.exe"[^\r\n]{0,80}"-9\s+.{1,60}\.exe"'

composite_rules:
  - id: c-patched-exe-stub-builder
    desc: C/C++ patched executable stub builder
    crit: hostile
    conf: 0.96
    all:
      - id: c-builder-create-output-exe
      - id: c-builder-write-embedded-stub
      - id: c-builder-write-config-block
    any:
      - id: c-builder-padding-random-config
      - id: c-builder-upx-output-exe
