defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: encodebytes-py
    desc: encodebytes function
    crit: component
    for:
      - python
    if:
      type: string_literal
      substr: encodebytes
  - id: python-backdoor-file-option
    desc: Python backdoor file option
    crit: suspicious
    conf: 0.92
    for: [python]
    if:
      type: text
      substr: "--backdoor-file"
  - id: python-backdoor-source-read
    desc: Python reads backdoor source file
    crit: suspicious
    conf: 0.92
    for: [python]
    if:
      type: text
      substr: "backdoor_to_write = open(option.backdoor"
  - id: python-threaded-backdoor-writer
    desc: Python writes threaded backdoor wrapper
    crit: suspicious
    conf: 0.94
    for: [python]
    if:
      type: text
      regex: 'hm\.write\(["'']thread_2 = threading\.Thread\(target=rma\)\\n["'']\)'
  - id: python-pycompile-output-wrapper
    desc: Python compiles generated output wrapper
    crit: suspicious
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: 'py_compile\.compile\s*\(\s*_output_'
  - id: echo-percent
    desc: echo percent batch pattern
    crit: component
    if:
      type: text
      regex: (?i)\becho\s+%([A-Za-z_][A-Za-z0-9_]*|\d)%
  # NOTE: `open()` and binary-`rb` read are generic file-IO capabilities, not
  # dropper-specific. They live in the canonical neutral home
  # micro-behaviors/fs/file/open (::generic-dup, ::binary-read-mode); the
  # file-read-rb composite below references those cross-tier.
  - id: msxml2-str
    desc: MSXml2 string
    crit: component
    if:
      type: text
      substr: MSXml2
  - id: marshal-loads-import
    desc: from marshal import loads
    crit: component
    for:
      - python
    if:
      type: text
      substr: from marshal import loads
  - id: loads-b
    desc: loads(b prefix
    crit: component
    for:
      - python
    if:
      type: text
      substr: loads(b
  - id: zlib-compressed-hex
    desc: zlib compressed hex pattern
    crit: component
    for:
      - python
    if:
      type: string_literal
      substr: \x78\x9c
  - id: batch-echo
    desc: Batch file generation via echo
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: echo\s+[^>]{0,120}>>[^\n]{0,120}\.(bat|cmd)
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: batch-escape
    desc: Batch special character escaping
    crit: suspicious
    conf: 0.8
    for: [scripts, -javascript, -typescript, binaries]
    if:
      type: text
      regex: replace.{0,50}"\^".{0,160}(bat|cmd|echo|%COMSPEC%)
  - id: shell-namespace
    desc: Shell.Application namespace for ZIP operations
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: Shell\.Application.{0,50}namespace
  - id: msxml2-base64
    desc: MSXml2 Base64 reference
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: MSXml2.{0,50}Base64
  - id: appdata-single
    desc: '%appdata% reference'
    crit: notable
    conf: 0.6
    for:
      - scripts
    if:
      type: text
      substr: '%appdata%'
  - id: appdata-double
    desc: '%%appdata%% reference'
    crit: notable
    conf: 0.6
    for:
      - scripts
    if:
      type: text
      substr: '%%appdata%%'
composite_rules:
  - id: exec-paren
    desc: exec() call alias
    crit: component
    any:
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: micro-behaviors/process/create/shell/spawn::shell-exec
  - id: b64-encode-funcs
    desc: Base64 encoding functions
    crit: component
    for:
      - python
    any:
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/data/encode/base64::encodestring-call
      - id: encodebytes-py
  - id: python-crypter-backdoor-injector
    desc: Python crypter backdoor injector
    crit: hostile
    conf: 0.98
    for: [python]
    attack: T1027, T1059
    mbc: B0023
    all:
      - id: python-backdoor-file-option
      - id: python-backdoor-source-read
      - id: python-threaded-backdoor-writer
  - id: python-threaded-backdoor-wrapper-builder
    desc: Python threaded backdoor wrapper builder
    crit: hostile
    conf: 0.97
    for: [python]
    attack: T1027, T1059
    mbc: B0023
    all:
      - id: python-backdoor-source-read
      - id: python-threaded-backdoor-writer
      - id: python-pycompile-output-wrapper
    any:
      - id: micro-behaviors/process/create/system::python-os-system
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
    needs: 1
  - id: batch-indicators
    desc: Batch file indicators
    crit: component
    any:
      - id: echo-percent
      - id: micro-behaviors/fs/path/extension::bat-dup
      - id: metadata/file/extension/identity::cmd-ext
  - id: script-indicators-comp
    desc: JScript or script extension reference
    crit: component
    any:
      - id: micro-behaviors/process/interpreter/jscript::activex-object
      - id: micro-behaviors/process/interpreter/jscript::is-jscript
      - id: micro-behaviors/fs/path/extension::js-reference
      - id: micro-behaviors/fs/path/extension::vbs
  - id: file-read-rb
    desc: File read in binary mode
    crit: component
    all:
      - id: micro-behaviors/fs/file/open::generic-dup
      - id: micro-behaviors/fs/file/open::binary-read-mode
  - id: exe-to-batch
    desc: EXE to batch file converter
    crit: suspicious
    conf: 0.95
    attack: T1027.002
    mbc: F0001
    size_max: 512000
    all:
      - id: b64-encode-funcs
      - id: batch-indicators
      - id: script-indicators-comp
      - id: file-read-rb
  - id: adodb-or-msxml
    desc: ADODB or MSXML reference
    crit: component
    any:
      - id: micro-behaviors/fs/write/stream::adodb-stream-progid
      - id: msxml2-str
  - id: fso-or-shell
    desc: FileSystemObject or Shell.Application
    crit: component
    any:
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: micro-behaviors/os/com/object::shell-application-progid
  - id: base64-or-save
    desc: Base64 or saveToFile
    crit: component
    any:
      - id: micro-behaviors/data/source/quality/import::usage-base64
      - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file-literal
  - id: jscript-dropper
    desc: JScript-based dropper generator
    crit: suspicious
    conf: 0.95
    attack: T1027.002
    mbc: F0001
    size_max: 1048576
    all:
      - id: micro-behaviors/process/interpreter/jscript::activex-object
      - id: adodb-or-msxml
      - id: fso-or-shell
      - id: base64-or-save
  - id: loads-or-compressed
    desc: loads(b or zlib compressed
    crit: component
    for:
      - python
    any:
      - id: loads-b
      - id: zlib-compressed-hex
  - id: python-marshal
    desc: Python marshal bytecode obfuscation
    crit: suspicious
    conf: 0.85
    for:
      - python
    attack: T1027
    size_max: 5242880
    all:
      - id: marshal-loads-import
      - id: loads-or-compressed
  - id: npm-rat-builder-panel
    desc: npm RAT builder control panel
    crit: hostile
    conf: 0.96
    attack: T1587.001
    for:
      - package.json
    all:
      - id: objectives/command-and-control/backdoor/dispatch/panel::npm-compiled-c2-server-panel
      - id: metadata/import/package::dep-adm-zip
    any:
      - id: metadata/import/package::dep-solana-web3
      - id: metadata/import/package::dep-web-push
