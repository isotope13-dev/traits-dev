defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: encodebytes-py
    desc: encodebytes function
    crit: component
    for:
      - python
    if:
      type: string_literal
      substr: encodebytes
  - id: echo-off-batch
    desc: echo off batch command
    crit: component
    if:
      type: text
      substr: '@echo off'
      case_insensitive: true
    unless:
      - type: basename
        regex: '^run\.bat$'
  - id: echo-percent
    desc: echo percent batch pattern
    crit: component
    if:
      type: text
      regex: (?i)\becho\s+%(?:[A-Za-z_][A-Za-z0-9_]*|\d)%
  - id: bat-ext
    desc: .bat extension
    crit: component
    if:
      type: text
      regex: '\.bat\b'
    unless:
      - type: basename
        regex: '^run\.bat$'
  - id: js-ext
    desc: .js extension
    crit: component
    for: [scripts, -javascript, -typescript, binaries]
    if:
      type: raw
      regex: '["''][^"''\n]{1,120}\.js["'']'
  - id: vbs-ext
    desc: .vbs extension
    crit: component
    if:
      type: text
      substr: .vbs
  - id: open-paren-dup
    desc: open() function call
    crit: component
    for:
      - python
    if:
      type: symbol
      exact: open
  - id: rb-mode
    desc: rb read binary mode
    crit: component
    for:
      - python
    if:
      type: text
      regex: (?m)open\s*\([^\n]{0,120}["']rb["']
    not:
      - substr: os.devnull
  - id: msxml2-str
    desc: MSXml2 string
    crit: component
    if:
      type: text
      substr: MSXml2
  - id: marshal-loads-import
    desc: from marshal import loads
    crit: component
    for:
      - python
    if:
      type: text
      substr: from marshal import loads
  - id: loads-b
    desc: loads(b prefix
    crit: component
    for:
      - python
    if:
      type: text
      substr: loads(b
  - id: zlib-compressed-hex
    desc: zlib compressed hex pattern
    crit: component
    for:
      - python
    if:
      type: string_literal
      substr: \x78\x9c
  - id: activex-object-dup
    desc: ActiveXObject usage (JScript/VBScript)
    crit: component
    conf: 0.85
    if:
      type: text
      regex: ActiveXObject\s*\(
    not:
      - regex: ActiveXObject\s*\(\s*["']htmlfile["']\s*\)
  - id: batch-echo
    desc: Batch file generation via echo
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: echo\s+[^>]{0,120}>>[^\n]{0,120}\.(bat|cmd)
  - id: batch-escape
    desc: Batch special character escaping
    crit: suspicious
    conf: 0.8
    for: [scripts, -javascript, -typescript, binaries]
    if:
      type: text
      regex: replace.{0,50}"\^".{0,160}(bat|cmd|echo|%COMSPEC%)
  - id: shell-namespace
    desc: Shell.Application namespace for ZIP operations
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: Shell\.Application.{0,50}namespace
  - id: msxml2-base64
    desc: MSXml2 Base64 reference
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: MSXml2.{0,50}Base64
  - id: bin-base64
    desc: bin.base64 reference
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: bin.base64
  - id: appdata-single
    desc: '%appdata% reference'
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: '%appdata%'
  - id: appdata-double
    desc: '%%appdata%% reference'
    crit: baseline
    conf: 0.6
    if:
      type: text
      substr: '%%appdata%%'
composite_rules:
  - id: exec-paren
    desc: exec() call alias
    crit: component
    any:
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: micro-behaviors/process/interpreter/eval::shell-exec
  - id: b64-encode-funcs
    desc: Base64 encoding functions
    crit: component
    for:
      - python
    any:
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/data/encode/base64::encodestring-call
      - id: encodebytes-py
  - id: batch-indicators
    desc: Batch file indicators
    crit: component
    any:
      - id: echo-off-batch
      - id: echo-percent
      - id: bat-ext
      - id: metadata/file/extension::cmd-ext
  - id: script-indicators-comp
    desc: Script generation indicators
    crit: component
    any:
      - id: objectives/command-and-control/dropper/builder::activex-object-dup
      - id: micro-behaviors/process/interpreter/jscript::is-jscript
      - id: js-ext
      - id: vbs-ext
  - id: file-read-rb
    desc: File read in binary mode
    crit: component
    all:
      - id: objectives/command-and-control/dropper/builder::open-paren-dup
      - id: rb-mode
  - id: exe-to-batch
    desc: EXE to batch file converter
    crit: suspicious
    conf: 0.95
    attack: T1027.002
    mbc: F0001
    size_max: 512000
    all:
      - id: b64-encode-funcs
      - id: batch-indicators
      - id: script-indicators-comp
      - id: file-read-rb
  - id: adodb-or-msxml
    desc: ADODB or MSXML reference
    crit: component
    any:
      - id: micro-behaviors/fs/write/file::js-adodb-stream-reference
      - id: msxml2-str
  - id: fso-or-shell
    desc: FileSystemObject or Shell.Application
    crit: component
    any:
      - id: objectives/execution/interpreter/scripting/host::filesystem-object-string
      - id: micro-behaviors/os/com/object::shell-application-progid
  - id: base64-or-save
    desc: Base64 or saveToFile
    crit: component
    any:
      - id: micro-behaviors/data/source/quality/import::usage-base64
      - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file-literal
  - id: jscript-dropper
    desc: JScript-based dropper generator
    crit: suspicious
    conf: 0.95
    attack: T1027.002
    mbc: F0001
    size_max: 1048576
    all:
      - id: objectives/command-and-control/dropper/builder::activex-object-dup
      - id: adodb-or-msxml
      - id: fso-or-shell
      - id: base64-or-save
  - id: loads-or-compressed
    desc: loads(b or zlib compressed
    crit: component
    for:
      - python
    any:
      - id: loads-b
      - id: zlib-compressed-hex
  - id: python-marshal
    desc: Python marshal bytecode obfuscation
    crit: suspicious
    conf: 0.85
    for:
      - python
    attack: T1027
    size_max: 5242880
    all:
      - id: marshal-loads-import
      - id: loads-or-compressed
  - id: msxml-base64
    desc: MSXML Base64 usage
    crit: suspicious
    conf: 0.7
    any:
      - id: msxml2-base64
      - id: bin-base64
  - id: npm-rat-builder-panel
    desc: npm RAT builder control panel
    crit: hostile
    conf: 0.96
    attack: T1587.001
    for:
      - package.json
    all:
      - id: objectives/command-and-control/backdoor/script/panel::npm-compiled-c2-server-panel
      - id: metadata/import/npm::dep-adm-zip
    any:
      - id: metadata/import/npm::dep-solana-web3
      - id: metadata/import/npm::dep-web-push
