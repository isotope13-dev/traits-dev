defaults:
  platforms: [windows, unix]
  for: [documents, scripts]
  attack: T1102
  mbc: B0031
traits:
  - id: panel-oss-config-endpoint
    desc: Panel OSS config endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/oss/get
  - id: panel-task-list-endpoint
    desc: Panel task list endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/tasks/list
  - id: panel-task-control-endpoints
    desc: Panel task control endpoints
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '/api/tasks/(add|start|stop|delete)'
composite_rules:
  - id: task-control-builder-panel
    desc: Dropper task control builder panel
    crit: hostile
    conf: 0.97
    all:
      - id: panel-task-list-endpoint
      - id: panel-task-control-endpoints
    any:
      - id: panel-oss-config-endpoint
