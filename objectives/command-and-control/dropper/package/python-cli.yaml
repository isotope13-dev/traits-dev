defaults:
  attack: T1105
  mbc: E1105
  platforms: [unix, windows]
  for: [python]
traits:
  - id: py-github-release-binary-template
    desc: Python GitHub release binary URL
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'releases/download/.{0,80}\{binary_name\}'
  - id: py-release-asset-darwin
    desc: Python release asset for Darwin
    crit: component
    conf: 0.86
    if:
      type: text
      substr: darwin-arm64
  - id: py-release-asset-linux
    desc: Python release asset for Linux
    crit: component
    conf: 0.86
    if:
      type: text
      substr: linux-x64
  - id: py-release-asset-windows
    desc: Python release asset for Windows
    crit: component
    conf: 0.86
    if:
      type: text
      substr: win32-x64
  - id: py-pip-downloader-user-agent
    desc: Python package pip downloader UA
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: "['\"][A-Za-z0-9_.-]{2,80}-pip-downloader['\"]"
  - id: py-response-read-write
    desc: Python writes response.read()
    crit: component
    conf: 0.88
    if:
      type: text
      substr: out_file.write(response.read())
  - id: py-subprocess-binary-path-argv
    desc: Python runs binary_path argv
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'subprocess\.run\(\s*\[\s*binary_path\s*\]\s*\+\s*sys\.argv\[1:\]'
composite_rules:
  - id: py-cross-platform-release-assets
    desc: Python cross-platform release assets
    crit: component
    conf: 0.9
    all:
      - id: py-release-asset-darwin
      - id: py-release-asset-linux
      - id: py-release-asset-windows
  - id: py-runtime-github-binary-loader
    desc: Python downloads and runs release binary
    crit: hostile
    conf: 0.96
    near_lines: 120
    all:
      - id: py-github-release-binary-template
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/fs/file/open::binary-write-mode
      - id: py-response-read-write
      - id: micro-behaviors/fs/chmod/executable/mode
      - id: py-subprocess-binary-path-argv
    unless:
      - id: objectives/command-and-control/dropper/delivery/download-execute::known-benign-download-chmod-context
  - id: py-platform-release-binary-bootstrap
    desc: Python bootstraps platform release binary
    crit: hostile
    conf: 0.94
    all:
      - id: py-github-release-binary-template
      - id: py-cross-platform-release-assets
      - id: py-pip-downloader-user-agent
  - id: py-cli-argv-proxy-staged-binary
    desc: Python proxies argv to staged binary
    crit: hostile
    conf: 0.93
    all:
      - id: py-subprocess-binary-path-argv
      - id: micro-behaviors/fs/chmod/executable/mode
      - id: py-pip-downloader-user-agent
