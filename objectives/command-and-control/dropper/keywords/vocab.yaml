# Generic malware self-description / status vocabulary. These are whole words
# that carry standalone behavioral signal (unlike meaningless component
# fragments), so they are notable: an analyst wants them surfaced. Family
# composites in other directories combine them with family-specific markers.
defaults:
  platforms: [windows, unix]
  for: [elf, pe, shell, python, c, cpp]
  crit: notable
  conf: 0.5
traits:
  - id: probing-status
    desc: '"PROBING" scanner status word'
    count_min: 2
    if:
      type: text
      word: PROBING
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
