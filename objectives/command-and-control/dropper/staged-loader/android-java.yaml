defaults:
  platforms: [android]
  for: [java, class]
  attack: T1627.001
  mbc: B0042

traits:
  - id: android-dexclassloader-source
    desc: Android DexClassLoader source import
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: import
      exact: dalvik.system.DexClassLoader
  - id: android-staged-jar-literal
    desc: Android staged jar/dex literal
    crit: component
    conf: 0.84
    if:
      type: literal
      regex: '^\\.(jar|dex)$'
  - id: java-reflective-start-invoke
    desc: Java reflective start method invocation
    crit: notable
    conf: 0.86
    if:
      type: literal
      exact: start
  - id: android-hide-launcher-component
    desc: Android launcher component disable source
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: setComponentEnabledSetting
  - id: android-wakelock-acquire-source
    desc: Android wakelock acquire source
    crit: component
    conf: 0.82
    if:
      type: symbol
      kind: call
      exact: acquire
  - id: java-network-stage-streams
    desc: Java network stage input/output streams
    crit: notable
    conf: 0.86
    count_min: 2
    if:
      type: symbol
      kind: call
      regex: '^(DataInputStream|DataOutputStream)$'

composite_rules:
  - id: android-staged-dex-payload-loader
    desc: Android staged DEX payload loader
    crit: suspicious
    conf: 0.96
    all:
      - id: android-dexclassloader-source
      - id: java-network-stage-streams
      - id: java-reflective-start-invoke
    any:
      - id: android-staged-jar-literal
      - id: android-hide-launcher-component
      - id: android-wakelock-acquire-source
      - id: micro-behaviors/communications/socket/create::java-socket-create
      - id: micro-behaviors/communications/socket/create::java-serversocket-create
    needs: 2
