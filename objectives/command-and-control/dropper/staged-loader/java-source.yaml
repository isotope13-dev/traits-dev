defaults:
  platforms: [windows, unix]
  for: [java]
  attack: T1105
  mbc: B0042

traits:
  - id: java-base64-stringbuilder-append-source
    desc: Java Base64 StringBuilder append source
    crit: notable
    conf: 0.88
    count_min: 4
    if:
      type: symbol
      kind: call
      exact: append
  - id: java-base64-decode-source
    desc: Java Base64 decoder source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: call
      exact: getDecoder
  - id: java-embedded-zip-base64-source
    desc: Java embedded zip payload Base64 source
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: UEsDB
  - id: java-jar-processbuilder-source
    desc: Java ProcessBuilder jar execution source
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: -jar
  - id: java-jar-command-string-source
    desc: Java command string includes JAR execution
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(command|cmd)\s*=.{0,120}"\s-jar\s"'
  - id: java-pid-output-parser-source
    desc: Java spawned process PID output parser source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: identifier
      exact: pidPattern
  - id: java-runtime-jar-exec-source
    desc: Java Runtime jar execution source
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'Runtime\.getRuntime\(\)\.exec[\s\S]{0,120}-jar'
  - id: java-fileoutputstream-drop-source
    desc: Java FileOutputStream drop source
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: FileOutputStream
  - id: java-delete-on-exit-bytecode
    desc: JVM bytecode deleteOnExit call
    crit: notable
    conf: 0.88
    for: [class, jar]
    if:
      type: import
      exact: java/io/File.deleteOnExit

composite_rules:
  - id: java-embedded-jar-drop-exec
    desc: Java embedded JAR drop and execute
    crit: suspicious
    conf: 0.95
    all:
      - id: java-embedded-zip-base64-source
      - id: java-base64-decode-source
      - id: java-jar-processbuilder-source
      - id: java-fileoutputstream-drop-source
    any:
      - id: java-base64-stringbuilder-append-source
      - id: java-pid-output-parser-source
    needs: 1
  - id: java-embedded-jar-runtime-drop-exec
    desc: Java embedded JAR runtime drop exec
    crit: suspicious
    conf: 0.95
    all:
      - id: java-embedded-zip-base64-source
      - id: java-base64-stringbuilder-append-source
      - id: java-fileoutputstream-drop-source
      - id: java-jar-command-string-source
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
    any:
      - id: objectives/execution/exploit/gadget::java-process-output-capture-source
      - id: java-pid-output-parser-source
    needs: 1
  - id: java-encrypted-file-dropper
    desc: Java decrypts staged file payload
    crit: hostile
    conf: 0.98
    for: [class, jar]
    all:
      - id: micro-behaviors/crypto/library/provider::java-payload-decryption
      - id: objectives/anti-static/obfuscation/string/crypto::java-bytecode-base64-decoding
      - id: micro-behaviors/fs/write/file/direct::jvm-files-write-bytecode
      - id: java-delete-on-exit-bytecode
  - id: java-encrypted-stage-drop-exec
    desc: Java decrypts and executes staged file
    crit: hostile
    conf: 0.99
    for: [class, jar]
    all:
      - id: java-encrypted-file-dropper
      - id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode
      - id: micro-behaviors/process/control/wait::java-process-waitfor-bytecode
