# Android staged loader using a hidden asset DEX and reflective classloader patching.
defaults:
  platforms: [android]
  for: [apk, binaries]
  crit: suspicious
  conf: 0.95
  attack: "T1406"

traits:
  - id: firebase-messaging-event
    desc: Firebase messaging event service
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: "com.google.firebase.MESSAGING_EVENT"

  - id: cleartext-traffic-enabled
    desc: Android app allows cleartext traffic
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: "usesCleartextTraffic"

  - id: foreground-service-permission
    desc: Foreground service permission requested
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: "android.permission.FOREGROUND_SERVICE"

  - id: connectivity-change-receiver
    desc: Receiver watches connectivity changes
    crit: notable
    conf: 0.84
    if:
      type: text
      exact: "android.net.conn.CONNECTIVITY_CHANGE"

composite_rules:
  - id: staged-dex-loader
    desc: APK hides and loads a second-stage DEX from assets
    crit: hostile
    conf: 0.995
    mbc: "B0030"
    all:
      - id: micro-behaviors/process/create/loader::reflective-classloader-patch
      - id: micro-behaviors/process/create/loader::hidden-dex-write

  - id: staged-loader-with-push-control
    desc: Staged Android loader with push and background control hooks
    crit: hostile
    conf: 0.99
    all:
      - id: staged-dex-loader
      - id: firebase-messaging-event
    any:
      - id: foreground-service-permission
      - id: connectivity-change-receiver
      - id: cleartext-traffic-enabled
    needs: 2
