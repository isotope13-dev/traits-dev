defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1027.009

traits:
  - id: resource-resolve-handler
    desc: .NET ResourceResolve handler registration
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: AppDomain.CurrentDomain.ResourceResolve
  - id: manifest-resource-assembly-scan
    desc: .NET manifest resource assembly scan
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'GetManifestResourceNames\s*\(\)[\s\S]{0,260}GetManifestResourceStream\s*\('

composite_rules:
  - id: dotnet-resource-resolve-loader
    desc: .NET resource resolve assembly loader
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/dropper/execution/loader::assembly-load-decrypt-call
      - id: resource-resolve-handler
      - id: manifest-resource-assembly-scan
  - id: dotnet-source-resource-payload-loader
    desc: .NET source resource payload loader
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-source-resource-data-extraction
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-source-resource-blockcopy-trim
  - id: dotnet-source-resource-temp-assembly-loader
    desc: .NET resource temp assembly loader
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-source-manifest-resource-stream-call
      - id: micro-behaviors/fs/path/temp::temp-path-any
      - id: micro-behaviors/fs/write/file/direct::writeallbytes-any
      - id: objectives/anti-static/obfuscation/reflection/invoke::assembly-load-file
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::assembly-load
      - id: objectives/anti-static/obfuscation/reflection/invoke::assembly-load-file
