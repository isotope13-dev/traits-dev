defaults:
  platforms:
    - windows
  for: [pe]
  attack: T1027.009
traits:
  - id: vb6-app-exename
    desc: VB6 self-referencing executable name
    crit: component
    if:
      type: text
      substr: "App.EXEName"

  - id: vb6-binary-self-read
    desc: VB6 opens own binary for reading
    crit: component
    if:
      type: text
      substr: "For Binary Access Read As #"

  - id: vb6-lof-space-read
    desc: VB6 reads full file via LOF
    crit: component
    if:
      type: text
      regex: "Space\\(LOF\\("

  - id: vb6-shell-drop-exe
    desc: VB6 Shell executes dropped EXE
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: "Shell\\s+\"[cC]:\\\\"

  - id: vb6-rc4-function-source
    desc: RC4 cipher function signature in VB6
    crit: suspicious
    conf: 0.88
    mbc: C0027.001
    if:
      type: text
      regex: "Function RC4\\(ByVal Data As String"

  - id: vb6-xor-charcode-cipher
    desc: VB6 XOR cipher with Asc/Mid character loop
    crit: suspicious
    conf: 0.85
    mbc: C0027
    if:
      type: text
      regex: "Asc\\(Mid\\$"

  - id: vb6-binder-delimiter-const
    desc: VB6 binder named delimiter constant
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "Const\\s+[A-Za-z_]+\\s*=\\s*\"[A-Z0-9_-]{4,16}\""
    not:
      - regex: "Const\\s+[A-Za-z_]+\\s*=\\s*\"BC[0-9]{5}\""
      - substr: "Const assemblyName"

  - id: vb6-split-by-delimiter
    desc: VB6 splits binary payload by delimiter constant
    crit: component
    if:
      type: text
      regex: "Split\\([A-Za-z_]+,\\s*[A-Za-z_]+"

  - id: vb6-open-binary-root-write
    desc: VB6 writes binary to C drive root
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: "Open\\s+\"[cC]:\\\\.{1,12}\\.exe\"\\s+For Binary As"

  - id: cmd-rename-command
    desc: Embedded cmd rename command
    crit: component
    conf: 0.97
    if:
      type: text
      exact: cmd /c rename "

  - id: die-extension
    desc: Dropped .die extension marker
    crit: component
    conf: 0.98
    if:
      type: text
      exact: .die

composite_rules:
  - id: vb6-self-read-exe
    desc: VB6 reads own executable file
    crit: suspicious
    conf: 0.87
    all:
      - id: objectives/command-and-control/dropper/binder::vb6-app-exename
      - id: objectives/command-and-control/dropper/binder::vb6-binary-self-read
    any:
      - id: objectives/command-and-control/dropper/binder::vb6-lof-space-read

  - id: vb6-drop-execute
    desc: VB6 drops and executes EXE files
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/command-and-control/dropper/binder::vb6-open-binary-root-write
      - id: objectives/command-and-control/dropper/binder::vb6-shell-drop-exe

  - id: vb6-payload-cipher
    desc: VB6 encrypts or XOR-obfuscates payload data
    crit: suspicious
    conf: 0.85
    mbc: C0027
    any:
      - id: objectives/command-and-control/dropper/binder::vb6-rc4-function-source
      - id: objectives/command-and-control/dropper/binder::vb6-xor-charcode-cipher

  - id: vb6-file-binder
    desc: VB6 file binder (self-read, split payload, drop and execute)
    crit: hostile
    conf: 0.96
    mbc: B0024
    all:
      - id: objectives/command-and-control/dropper/binder::vb6-self-read-exe
      - id: objectives/command-and-control/dropper/binder::vb6-drop-execute
    any:
      - id: objectives/command-and-control/dropper/binder::vb6-split-by-delimiter
      - id: objectives/command-and-control/dropper/binder::vb6-payload-cipher
      - id: objectives/command-and-control/dropper/binder::vb6-binder-delimiter-const

  - id: vb6-runtime-rename-exec-dropper
    desc: VB6 writes .die payload then renames and executes
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/file/write/direct::vb6-file-open
      - id: micro-behaviors/fs/file/write/direct::vb6-put-owner3
      - id: micro-behaviors/process/create/shell/lang::vb6-rtcshell
      - id: objectives/command-and-control/dropper/binder::cmd-rename-command
      - id: objectives/command-and-control/dropper/binder::die-extension
      - id: micro-behaviors/fs/path/extension::exe-dup
    any:
      - id: micro-behaviors/dylib/lookup::vb6-runtime-api-dispatch
      - id: metadata/binary/metrics/structural::few-functions
      - id: objectives/anti-static/obfuscation/payload/string-sparse::three-section-vb6-layout

  - id: vb6-rename-executable-to-die
    desc: VB6 renames executables to .die
    crit: suspicious
    conf: 0.99
    all:
      - id: micro-behaviors/process/create/shell/lang::vb6-rtcshell
      - id: objectives/command-and-control/dropper/binder::cmd-rename-command
      - id: objectives/command-and-control/dropper/binder::die-extension
      - id: micro-behaviors/fs/path/extension::exe-dup

  - id: vb6-executable-sabotage-via-die-rename
    desc: VB6 disables executables via .die rename
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/dropper/binder::vb6-rename-executable-to-die
    any:
      - id: micro-behaviors/dylib/lookup::vb6-runtime-api-dispatch
      - id: metadata/binary/metrics/structural::few-functions
      - id: objectives/anti-static/obfuscation/payload/string-sparse::three-section-vb6-layout
    needs: 2
