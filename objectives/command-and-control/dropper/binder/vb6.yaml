defaults:
  platforms:
    - windows
  for: [pe]
  attack: T1027.009
traits:
  - id: vb6-app-exename
    desc: VB6 self-referencing executable name
    crit: component
    if:
      type: string_value
      substr: "App.EXEName"

  - id: vb6-binary-self-read
    desc: VB6 opens own binary for reading
    crit: component
    if:
      type: string_value
      substr: "For Binary Access Read As #"

  - id: vb6-lof-space-read
    desc: VB6 reads full file via LOF
    crit: component
    if:
      type: string_value
      regex: "Space\\(LOF\\("

  - id: vb6-shell-drop-exe
    desc: VB6 Shell executes dropped EXE
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "Shell\\s+\"[cC]:\\\\"

  - id: vb6-rc4-function-source
    desc: RC4 cipher function signature in VB6
    crit: notable
    conf: 0.88
    mbc: C0027.001
    if:
      type: string_value
      regex: "Function RC4\\(ByVal Data As String"

  - id: vb6-xor-charcode-cipher
    desc: VB6 XOR cipher with Asc/Mid character loop
    crit: notable
    conf: 0.85
    mbc: C0027
    if:
      type: string_value
      regex: "Asc\\(Mid\\$"

  - id: vb6-binder-delimiter-const
    desc: VB6 binder named delimiter constant
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: "Const\\s+[A-Za-z_]+\\s*=\\s*\"[A-Z0-9_-]{4,16}\""

  - id: vb6-split-by-delimiter
    desc: VB6 splits binary payload by delimiter constant
    crit: component
    if:
      type: raw
      regex: "Split\\([A-Za-z_]+,\\s*[A-Za-z_]+"

  - id: vb6-open-binary-root-write
    desc: VB6 writes binary to C drive root
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "Open\\s+\"[cC]:\\\\.{1,12}\\.exe\"\\s+For Binary As"

composite_rules:
  - id: vb6-self-read-exe
    desc: VB6 reads own executable file
    crit: notable
    conf: 0.87
    all:
      - id: objectives/command-and-control/dropper/binder::vb6-app-exename
      - id: objectives/command-and-control/dropper/binder::vb6-binary-self-read
    any:
      - id: objectives/command-and-control/dropper/binder::vb6-lof-space-read

  - id: vb6-drop-execute
    desc: VB6 drops and executes EXE files
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/command-and-control/dropper/binder::vb6-open-binary-root-write
      - id: objectives/command-and-control/dropper/binder::vb6-shell-drop-exe

  - id: vb6-payload-cipher
    desc: VB6 encrypts or XOR-obfuscates payload data
    crit: notable
    conf: 0.85
    mbc: C0027
    any:
      - id: objectives/command-and-control/dropper/binder::vb6-rc4-function-source
      - id: objectives/command-and-control/dropper/binder::vb6-xor-charcode-cipher

  - id: vb6-file-binder
    desc: VB6 file binder (self-read, split payload, drop and execute)
    crit: hostile
    conf: 0.96
    mbc: B0024
    all:
      - id: objectives/command-and-control/dropper/binder::vb6-self-read-exe
      - id: objectives/command-and-control/dropper/binder::vb6-drop-execute
    any:
      - id: objectives/command-and-control/dropper/binder::vb6-split-by-delimiter
      - id: objectives/command-and-control/dropper/binder::vb6-payload-cipher
      - id: objectives/command-and-control/dropper/binder::vb6-binder-delimiter-const
