defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009

traits:
  - id: kawaii-unicorn-text
    desc: Kawaii-Unicorn string marker
    crit: component
    conf: 0.995
    if:
      type: text
      substr: Kawaii-Unicorn

  - id: kawaii-unicorn-filename-text
    desc: Kawaii-Unicorn executable name string
    crit: component
    conf: 0.998
    if:
      type: text
      exact: Kawaii-Unicorn.exe

composite_rules:
  - id: kawaii-unicorn-identity-text
    desc: Kawaii-Unicorn embedded identity string
    crit: component
    conf: 0.998
    any:
      - id: kawaii-unicorn-text
      - id: kawaii-unicorn-filename-text

  - id: photoshop-xmp-decoy-text-cluster
    desc: Photoshop XMP decoy metadata cluster
    crit: component
    conf: 0.997
    all:
      - id: micro-behaviors/data/embedded/media::photoshop-cc-2018-metadata
    any:
      - id: micro-behaviors/data/embedded/media::photoshop-xmp-history-agent
      - id: micro-behaviors/data/embedded/media::xmp-png-jpeg-derivation

  - id: vb6-runtime-text-cluster
    desc: VB6 runtime dispatch string cluster
    crit: component
    conf: 0.995
    any:
      - id: metadata/binary/framework::vb6-runtime-dll
      - id: micro-behaviors/dylib/lookup::vb6-dll-function-call
      - id: micro-behaviors/process/create/shell/lang::vb6-rtcshell
    needs: 2

  - id: vb6-window-dispatch-text-cluster
    desc: VB6 layered-window dispatch string cluster
    crit: component
    conf: 0.997
    all:
      - id: micro-behaviors/ui/window/manage/control::set-layered-window-attributes
      - id: micro-behaviors/ui/window/manage/control::get-window-long-ansi
      - id: micro-behaviors/ui/window/manage/control::set-window-long-ansi
