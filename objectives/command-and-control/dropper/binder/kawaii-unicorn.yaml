defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009

traits:
  - id: kawaii-unicorn-text
    desc: Kawaii-Unicorn string marker
    crit: component
    conf: 0.995
    if:
      type: text
      substr: Kawaii-Unicorn

  - id: kawaii-unicorn-filename-text
    desc: Kawaii-Unicorn executable name string
    crit: component
    conf: 0.998
    if:
      type: text
      exact: Kawaii-Unicorn.exe

  - id: photoshop-cc-2018-text
    desc: Photoshop CC 2018 embedded media tag
    crit: component
    conf: 0.995
    if:
      type: text
      substr: Adobe Photoshop CC 2018 (Windows)

  - id: photoshop-xmp-history-agent-text
    desc: Photoshop XMP history agent string
    crit: component
    conf: 0.997
    if:
      type: text
      substr: stEvt:softwareAgent="Adobe Photoshop CC 2018 (Windows)"

  - id: xmp-png-jpeg-derivation-text
    desc: XMP PNG-to-JPEG conversion trail
    crit: component
    conf: 0.98
    if:
      type: text
      substr: converted from image/png to image/jpeg

  - id: vb6-runtime-dll-text
    desc: VB6 runtime DLL string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: MSVBVM60.DLL

  - id: vb6-dll-function-call-text
    desc: VB6 DllFunctionCall runtime string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: DllFunctionCall

  - id: vb6-rtcshell-text
    desc: VB6 rtcShell runtime string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: rtcShell

  - id: set-layered-window-attributes-text
    desc: SetLayeredWindowAttributes string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: SetLayeredWindowAttributes

  - id: get-window-long-a-text
    desc: GetWindowLongA string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: GetWindowLongA

  - id: set-window-long-a-text
    desc: SetWindowLongA string
    crit: component
    conf: 0.99
    if:
      type: text
      exact: SetWindowLongA

composite_rules:
  - id: kawaii-unicorn-identity-text
    desc: Kawaii-Unicorn embedded identity string
    crit: component
    conf: 0.998
    any:
      - id: kawaii-unicorn-text
      - id: kawaii-unicorn-filename-text

  - id: photoshop-xmp-decoy-text-cluster
    desc: Photoshop XMP decoy metadata cluster
    crit: component
    conf: 0.997
    all:
      - id: photoshop-cc-2018-text
    any:
      - id: photoshop-xmp-history-agent-text
      - id: xmp-png-jpeg-derivation-text

  - id: vb6-runtime-text-cluster
    desc: VB6 runtime dispatch string cluster
    crit: component
    conf: 0.995
    any:
      - id: vb6-runtime-dll-text
      - id: vb6-dll-function-call-text
      - id: vb6-rtcshell-text
    needs: 2

  - id: vb6-window-dispatch-text-cluster
    desc: VB6 layered-window dispatch string cluster
    crit: component
    conf: 0.997
    all:
      - id: set-layered-window-attributes-text
      - id: get-window-long-a-text
      - id: set-window-long-a-text
