defaults:
  attack: T1105
  mbc: B0024
  platforms: [unix, windows]
  for: [python]
traits:
  - id: localappdata-pip-dir
    desc: LOCALAPPDATA pip directory
    crit: baseline
    conf: 0.86
    if:
      type: text
      regex: "LOCALAPPDATA[\\s\\S]{0,160}[\"']pip[\"']"
  - id: home-dot-pip-dir
    desc: Home .pip directory
    crit: baseline
    conf: 0.78
    if:
      type: string_literal
      exact: ".pip"
  - id: python-github-zip-stage
    desc: GitHub release ZIP staging
    crit: component
    conf: 0.92
    if:
      type: text
      regex: "releases/download/[\\s\\S]{0,120}\\.zip"
composite_rules:
  - id: pip-dir-exe-stage
    desc: EXE staged in pip directory
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/fs/path/extension::exe-dup
    any:
      - id: localappdata-pip-dir
      - id: home-dot-pip-dir
  - id: python-github-zip-exe-detached-dropper
    desc: Python GitHub ZIP EXE detached dropper
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/url/external/github::github-release-download
      - id: python-github-zip-stage
      - id: pip-dir-exe-stage
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen
      - id: micro-behaviors/data/archive/extract/zip::python-zipfile-extractall
      - id: micro-behaviors/process/create/subprocess::popen-content
    any:
      - id: objectives/command-and-control/dropper/execution/script::subprocess-detached-session
      - id: micro-behaviors/process/create/flags::python-detached-hidden-hex
  - id: python-inline-github-zip-dropper
    desc: Inline Python GitHub ZIP dropper
    crit: hostile
    conf: 0.97
    all:
      - id: python-github-zip-exe-detached-dropper
      - id: micro-behaviors/process/create/subprocess::sys-executable-c-popen
