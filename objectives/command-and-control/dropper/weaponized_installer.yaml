defaults:
  platforms: [windows]
  for: [pe]
  crit: hostile
  conf: 0.95

composite_rules:
  - id: weaponized-inno-setup-dropper
    desc: Weaponized Inno Setup dropper with COM automation
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/script::inno-setup
      - id: objectives/command-and-control/dropper/execution/installer::inno-crypto-com-loader
    any:
      - id: metadata/binary/section/names::reloc-section-high-entropy
      - id: metadata/binary/layout::pe-checksum-zeroed
    needs: 1
    # Standard installers use the engine for extraction; 
    # broad Inno/Delphi COM and crypto runtime markers alone are
    # common in legitimate installers and are not enough for hostile.
