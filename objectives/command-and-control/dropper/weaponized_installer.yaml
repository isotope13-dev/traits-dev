defaults:
  platforms: [windows]
  for: [pe]
  crit: hostile
  conf: 0.95

composite_rules:
  - id: weaponized-inno-setup-dropper
    desc: Weaponized Inno Setup dropper with COM automation
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/script::inno-setup
      - id: micro-behaviors/os/com::com-safearray-automation-triad
      - id: micro-behaviors/crypto/kdf/operations::pbkdf2
    any:
      - id: metadata/binary/installer/script::nested-inno-header-670
      - id: metadata/binary/section/names::reloc-section-high-entropy
    # Standard installers use the engine for extraction; 
    # they do not typically need standalone PBKDF2 alongside 
    # memory-direct COM array manipulation.
