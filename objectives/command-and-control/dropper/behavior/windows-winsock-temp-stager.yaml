defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1105
  mbc: B0024

composite_rules:
  - id: winsock-temp-payload-stager
    desc: Winsock stager drops Temp payload
    crit: suspicious
    conf: 0.95
    size_max: 262144
    all:
      - id: micro-behaviors/communications/socket/multiplex::winsock-event-loop
      - id: objectives/command-and-control/dropper/behavior::temp-file-execution
    any:
      - id: metadata/binary/layout::overlay-dominates-third
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer

  - id: winsock-overlay-loader-with-anti-debug
    desc: Winsock overlay loader with anti-debug
    crit: hostile
    conf: 0.97
    size_max: 262144
    all:
      - id: micro-behaviors/communications/socket/multiplex::winsock-event-loop
      - id: objectives/command-and-control/dropper/behavior::temp-file-execution
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    any:
      - id: metadata/binary/layout::overlay-dominates-third
      - id: objectives/anti-analysis/debugger-detect/check::seh-pointer-probe-anti-debug
      - id: objectives/anti-analysis/timing/evasion::high-res-timing
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
