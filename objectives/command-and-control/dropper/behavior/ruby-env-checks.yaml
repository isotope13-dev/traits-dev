# Ruby OS Environment Checks
# Detects checks for operating system environment
# ATT&CK: T1497
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: notable
  conf: 0.8
  for: [ruby]
composite_rules:
  - id: ruby-os-check
    desc: Ruby OS check detected
    any:
      - id: objectives/command-and-control/dropper/execution::ruby-ast-check-windows-regex
      - id: objectives/command-and-control/dropper/execution::ruby-ast-host-os-access
