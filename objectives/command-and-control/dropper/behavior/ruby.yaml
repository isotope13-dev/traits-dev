# Ruby Dropper Composite Rules
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [ruby]
composite_rules:
  # === Dropper Behavior via AST ===
  - id: ruby-ast-dropper-behavior
    desc: Dropper download write execute
    crit: suspicious
    conf: 0.93
    attack: "T1059"
    needs: 3
    any:
      - id: objectives/command-and-control/dropper/execution::ruby-ast-http-in-method
      - id: objectives/command-and-control/dropper/execution::ruby-ast-file-binmode-write
      - id: objectives/command-and-control/dropper/execution::ruby-ast-system-in-method
  # === Obfuscated C2 via AST ===
  - id: ruby-ast-obfuscated-c2
    desc: Base64 obfuscated C2 endpoint
    crit: suspicious
    conf: 0.91
    attack: "T1027"
    all:
      - id: objectives/command-and-control/dropper/execution::ruby-ast-base64-dns
      - id: objectives/exfiltration/dns::dns-resolve
  # === Windows Dropper (New) ===
  - id: ruby-windows-dropper
    desc: Detects Windows-specific dropper behavior (OS check + Rename + Exec)
    crit: hostile
    conf: 0.95
    attack: "T1059"
    all:
      - id: objectives/command-and-control/dropper/execution::ruby-ast-check-windows-regex
      - id: objectives/command-and-control/dropper/execution::ruby-ast-rename-img-to-exe
      - id: objectives/command-and-control/dropper/execution::ruby-ast-exec-in-method
