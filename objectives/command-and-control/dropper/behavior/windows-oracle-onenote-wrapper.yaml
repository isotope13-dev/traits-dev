defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024

composite_rules:
  - id: oracle-java-onenote-stage-cluster
    desc: Oracle Java wrapper with OneNote stage markers
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/signed/developer::oracle-america
      - id: metadata/binary/layout::multiple-pe-embedded-loose
      - id: metadata/binary/layout::largest-section-under-8pct
    any:
      - id: objectives/evasion/masquerade/identity/mimicry::onenotem-filename
      - id: metadata/binary/layout::mavinject32-name-loose
      - id: objectives/persistence/system/registry/com::inprocserver32-word
      - id: objectives/evasion/masquerade/identity/fabricated::office-onenote-options-other-policy
      - id: metadata/binary/layout::jar-manifest-marker
    needs: 3

  - id: oracle-java-onenote-com-loader
    desc: Oracle Java wrapper drops OneNote COM loader
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/dropper/behavior::oracle-java-onenote-stage-cluster
      - id: metadata/binary/layout::mavinject32-name-loose
      - id: objectives/persistence/system/registry/com::inprocserver32-word
    any:
      - id: objectives/evasion/masquerade/identity/mimicry::onenotem-filename
      - id: objectives/evasion/masquerade/identity/fabricated::office-onenote-options-other-policy
      - id: metadata/binary/layout::jar-manifest-marker
      - id: micro-behaviors/data/text/keywords::java-platform-string
    needs: 2
