# Download to /tmp, chmod, execute pattern
# MBC: B0024 (Dropper)
# ATT&CK: T1059 (Command and Scripting Interpreter)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
  mbc: "B0024"
  attack: "T1059.006"
traits:
  - id: tmp-path
    desc: Named /tmp execution path
    crit: component
    conf: 0.6
    if:
      type: string_value
      regex: "/tmp/[a-zA-Z_][a-zA-Z0-9_]*"
    not:
      - "/tmp/tmp.XXXXXXXX"
  - id: tmp-path-short
    desc: Reference to /tmp directory path
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: "/tmp/[a-zA-Z_]+$"
    not:
      - "/tmp/lib"
  - id: os-remove
    desc: Python os.remove call to delete
    crit: component
    conf: 0.7
    if:
      type: raw
      regex: "os\\.remove\\("
  - id: popen-call
    desc: subprocess module call
    crit: notable
    conf: 0.5
    for: [python]
    if:
      id: micro-behaviors/process/create/subprocess::methods
composite_rules:
  # Code or process execution composite
  - id: python-exec-any
    desc: Code or process execution
    crit: notable
    conf: 0.5
    for: [python]
    any:
      - id: micro-behaviors/process/create/subprocess
      - id: micro-behaviors/process/create/system::python-os-system
      - id: objectives/execution/interpreter/eval/invoke::exec-call-python
  - id: python-comp
    desc: Download to /tmp, chmod, execute
    conf: 0.95
    crit: suspicious
    needs: 3
    any:
      - id: tmp-path-short
      - id: micro-behaviors/fs/chmod/commands::python-os-chmod
      - id: micro-behaviors/process/create/subprocess/
      - id: os-remove
