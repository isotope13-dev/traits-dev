# Obfuscated JScript Dropper Composite
# Detects heavily obfuscated JScript droppers using property access and anti-sandbox techniques
defaults:
  attack: T1027
  mbc: B0032.001
  platforms: [linux, macos, windows, unix, android, ios]
  crit: hostile
  conf: 0.95
  for: [javascript]
composite_rules:
  - id: obfuscated-jscript-dropper-composite
    desc: "Heavily obfuscated JScript dropper with anti-sandbox loop"
    all:
      - id: objectives/anti-static/obfuscation/source/syntax::js-property-concatenation-obfuscation
    any:
      - id: objectives/anti-analysis/sandbox-detect/loop::large-loop-counter
      - id: objectives/anti-static/obfuscation/control-flow::retry-loop
      - id: objectives/anti-static/obfuscation/source/syntax::comparison-to-obfuscated-property
  - id: obfuscated-payload-check
    desc: "Obfuscated payload check (MZ header comparison)"
    all:
      - id: objectives/anti-static/obfuscation/source/syntax::comparison-to-obfuscated-property
      - id: objectives/anti-static/obfuscation/source/syntax::js-property-concatenation-obfuscation
