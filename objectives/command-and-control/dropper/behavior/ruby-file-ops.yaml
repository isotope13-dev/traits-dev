# Ruby File Operations (Suspicious)
# Detects suspicious file manipulation patterns
# ATT&CK: T1070
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: notable
  conf: 0.8
  for: [ruby]
composite_rules:
  - id: ruby-file-manipulation
    desc: Ruby file manipulation detected (rename/move)
    any:
      - id: objectives/command-and-control/dropper/execution/script::ruby-ast-file-rename
      - id: objectives/command-and-control/dropper/execution/script::ruby-ast-rename-to-exe
      - id: objectives/command-and-control/dropper/execution/script::ruby-ast-rename-img-to-exe
