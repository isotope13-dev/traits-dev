# Obfuscated WSH JScript Dropper
# Detects WSH-based download-and-execute droppers where COM ProgIDs
# (WScript.Shell, MSXML2.XMLHTTP, ADODB.Stream) are obfuscated via
# string splitting, concatenation, and fragment-based reconstruction.
# ATT&CK: T1059.007, T1105, T1027
defaults:
  platforms: [windows]
  for: [javascript, vbs, html]
composite_rules:
  - id: obfuscated-wsh-com-dropper
    desc: Obfuscated WSH dropper with COM fragments
    crit: hostile
    conf: 0.95
    attack: T1059.007
    mbc: B0017
    all:
      - id: objectives/execution/interpreter/script/wsh::wscript-shell-fragment-1
      - id: objectives/execution/interpreter/script/wsh::wsh-adodb-stream-binary
    any:
      - id: objectives/execution/interpreter/script/wsh::xmlhttp-fragment-tiny-exact
      - id: objectives/execution/interpreter/script/wsh::response-body-fragment-2a
      - id: objectives/execution/interpreter/script/wsh::response-body-fragment-2b
    none:
      - id: objectives/execution/interpreter/script/wsh::xmlhttp-progid
