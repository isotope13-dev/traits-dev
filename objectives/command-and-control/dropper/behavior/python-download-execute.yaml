defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  attack: T1105
  mbc: E1105
composite_rules:
  - id: python-url-shortener-download-exec
    desc: Downloads from URL shortener and executes payload
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/exfiltration/oob/shortener::tinyurl
    any:
      - id: micro-behaviors/process/create/subprocess::run-content
      - id: micro-behaviors/process/create/subprocess::call
  - id: python-download-tempfile-exec
    desc: Downloads code to temp file and executes it
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
    any:
      - id: micro-behaviors/process/create/subprocess::run-content
      - id: micro-behaviors/process/create/subprocess::call
