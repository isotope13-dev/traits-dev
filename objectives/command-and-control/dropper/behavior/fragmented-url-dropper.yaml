defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  - id: nemucod-co-uk-fragment
    desc: Nemucod C2 domain fragment variant
    crit: suspicious
    conf: 0.9
    any:
      - id: well-known/malware/dropper/nemucod::co-uk-tld
      - id: well-known/malware/dropper/nemucod::co-uk-tld-nodot
  - id: nemucod-adodb-stream-fragments
    desc: Nemucod ADODB and SaveToFile fragmented strings
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/execution/interpreter/script/wsh::save-to-file-fragment-veto
      - id: objectives/anti-static/obfuscation/string/conceal/nemucod::stream-fragment-dotstr
  - id: nemucod-adodb-write-path
    desc: Nemucod ADODB stream write/save chain (literal or obfuscated)
    crit: suspicious
    conf: 0.92
    any:
      - id: micro-behaviors/fs/write/file::adodb-savetofile
      - id: micro-behaviors/fs/write/file::adodb-savetofile-obfuscated-fragments
      - id: objectives/execution/interpreter/script/wsh::adodb-fragment-tiny-exact
      - id: objectives/command-and-control/dropper/behavior::nemucod-adodb-stream-fragments
  - id: nemucod-run-method
    desc: Nemucod execution method call (literal or dynamic WScript property)
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run
      - id: objectives/anti-static/obfuscation/source/syntax::js-wscript-dynamic-property-raw
      - id: objectives/anti-static/obfuscation/source/syntax::js-wscript-dynamic-property-ast
      - id: objectives/execution/interpreter/eval/dynamic::bracket-function-access
  - id: nemucod-fragment-combination
    desc: Nemucod specific URL fragment combination (qw4o and co.uk)
    crit: suspicious
    conf: 0.9
    all:
      - id: well-known/malware/dropper/nemucod::qw4o-fragment
      - id: objectives/command-and-control/dropper/behavior::nemucod-co-uk-fragment
  - id: fragmented-url-dropper
    desc: Detects Nemucod JScript dropper using fragmented C2 URL construction, download via ADODB.Stream, and execution via WScript.Shell.
    crit: hostile
    conf: 0.98
    attack: T1059.007, T1105, T1027
    mbc: B0017, B0018, B0032
    all:
      - id: objectives/command-and-control/dropper/behavior::nemucod-adodb-write-path
      - id: objectives/command-and-control/dropper/behavior::nemucod-run-method
      - id: objectives/anti-static/obfuscation/source/syntax::nemucod-wsh-fragments
    any:
      - id: well-known/malware/dropper/nemucod::js-fragmented-url-construction
      - id: well-known/malware/dropper/nemucod::js-fragmented-url-regex
      - id: objectives/command-and-control/dropper/behavior::nemucod-fragment-combination
