defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
composite_rules:
  - id: signed-update-masquerade-loader
    desc: Signed updater masquerade loader cluster
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/evasion/masquerade/cert::qihu-signed-windows-updater-masquerade
      - id: objectives/persistence/login/startup/registry::windows-error-reporting-run-key
      - id: objectives/command-and-control/infrastructure/ip-port::embedded-ipv4-endpoint-pair
      - id: micro-behaviors/communications/ip::private-ipv4-port-10-binary
      - id: micro-behaviors/mem/protect/modify::getprocaddr-memory-loader-primitives
    any:
      - id: metadata/binary/debug::project161-visualstudio-pdb
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/time/timing/delay::query-performance-counter
