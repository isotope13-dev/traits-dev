defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1105
  mbc: B0024
composite_rules:
  - id: com-scripted-persistent-dropper
    desc: COM-scripted native dropper with persistence and execution
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/com/invoke::ole-initialize
      - id: micro-behaviors/os/com/invoke::co-create-instance
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/write::write-file
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: micro-behaviors/os/registry/access::registry-transacted-api-chain
    any:
      - id: objectives/evasion/indicator-removal/timestamps::timestomp-with-file-copy
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: micro-behaviors/communications/http/get::wininet-dynamic-load
      - id: micro-behaviors/communications/http/protocol::content-range-bytes-format
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/signed/platform::microsoft
  - id: elevated-com-dropper-profile
    desc: Elevated COM dropper profile with anti-analysis
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/os/com/invoke::ole-initialize
      - id: micro-behaviors/os/com/invoke::co-create-instance
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/hardware/display/screen::get-desktop-window
    any:
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: metadata/binary/section/metrics::encrypted-rdata-installer-stub-layout
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-data
    none:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/signed/platform::microsoft
