defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - html
  attack: T1105
traits:
  - id: encoded-state-key-a
    desc: Encoded site repair state key
    crit: suspicious
    conf: 0.88
    if:
      type: encoded
      encoding: xor
      substr: site_repair_state
  - id: encoded-state-key-b
    desc: Encoded browser download state key
    crit: suspicious
    conf: 0.88
    if:
      type: encoded
      encoding: xor
      substr: bw-downloaded
  - id: encoded-theme-browser
    desc: Encoded browser theme stage map
    crit: notable
    conf: 0.84
    if:
      type: encoded
      encoding: xor
      substr: "browser:'v1.js'"
  - id: encoded-theme-font
    desc: Encoded font theme stage map
    crit: notable
    conf: 0.84
    if:
      type: encoded
      encoding: xor
      substr: "font:'v2.js'"
  - id: encoded-theme-recaptcha
    desc: Encoded recaptcha theme stage map
    crit: notable
    conf: 0.84
    if:
      type: encoded
      encoding: xor
      substr: "recaptcha:'v3.js'"
  - id: encoded-theme-bsod
    desc: Encoded bsod theme stage map
    crit: notable
    conf: 0.84
    if:
      type: encoded
      encoding: xor
      substr: "bsod:'v4.js'"
  - id: encoded-theme-cloudflare
    desc: Encoded cloudflare theme stage map
    crit: notable
    conf: 0.84
    if:
      type: encoded
      encoding: xor
      substr: "cloudflare:'v6.js'"
  - id: encoded-secondary-script-loader
    desc: Encoded dynamic script injection for cf.js stage
    crit: suspicious
    conf: 0.95
    if:
      type: encoded
      encoding: xor
      regex: createElement\(['"]script['"]\)[\s\S]{0,220}cf\.js\?v=1[\s\S]{0,220}appendChild
  - id: encoded-fallback-c2-domain
    desc: Encoded fallback C2 domain
    crit: notable
    conf: 0.86
    if:
      type: encoded
      encoding: xor
      substr: cloudflare-check.cfd
  - id: encoded-api-crypto-a
    desc: Encoded AES-GCM API wrapper
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      encoding: xor
      substr: AES-GCM
  - id: encoded-api-crypto-b
    desc: Encoded RC4 API wrapper
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      encoding: xor
      substr: rc4(
  - id: encoded-api-crypto-c
    desc: Encoded subtle decrypt wrapper
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      encoding: xor
      substr: crypto.subtle.decrypt
  - id: encoded-localstorage-get
    desc: Encoded localStorage getItem gate
    crit: notable
    conf: 0.86
    if:
      type: encoded
      encoding: xor
      substr: localStorage.getItem(LEGACY_STORAGE_KEY)
  - id: encoded-localstorage-set
    desc: Encoded localStorage setItem gate
    crit: notable
    conf: 0.86
    if:
      type: encoded
      encoding: xor
      substr: localStorage.setItem(LOCAL_STORAGE_KEY,legacy)
  - id: encoded-localstorage-remove
    desc: Encoded localStorage removeItem gate
    crit: notable
    conf: 0.86
    if:
      type: encoded
      encoding: xor
      substr: localStorage.removeItem(LEGACY_STORAGE_KEY)
composite_rules:
  - id: encoded-browser-state-keys
    desc: Encoded browser state keys
    crit: suspicious
    conf: 0.9
    all:
      - id: encoded-state-key-a
      - id: encoded-state-key-b
  - id: encoded-multi-theme-mode-map
    desc: Encoded lure theme mode map
    crit: notable
    conf: 0.88
    all:
      - id: encoded-theme-browser
      - id: encoded-theme-font
      - id: encoded-theme-recaptcha
      - id: encoded-theme-bsod
      - id: encoded-theme-cloudflare
  - id: encoded-api-crypto-wrapper
    desc: Encoded API crypto wrapper
    crit: suspicious
    conf: 0.92
    any:
      - id: encoded-api-crypto-a
      - id: encoded-api-crypto-b
      - id: encoded-api-crypto-c
    needs: 2
  - id: encoded-localstorage-gating
    desc: Encoded localStorage migration gate
    crit: notable
    conf: 0.9
    all:
      - id: encoded-localstorage-get
      - id: encoded-localstorage-set
      - id: encoded-localstorage-remove
  - id: browser-blockchain-stage-loader
    desc: Browser loader resolves staging URL from Polygon smart contract and injects remote script
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/infrastructure/blockchain::smart-contract-c2-dead-drop
      - id: encoded-secondary-script-loader
    any:
      - id: encoded-browser-state-keys
      - id: encoded-localstorage-gating
      - id: encoded-api-crypto-wrapper
      - id: encoded-fallback-c2-domain
      - id: encoded-multi-theme-mode-map
  - id: fake-cloudflare-blockchain-loader
    desc: Fake Cloudflare HTML loader with self-decoding blockchain-resolved stage delivery
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/credential-access/phishing/captcha::cloudflare-turnstile
      - id: browser-blockchain-stage-loader
      - id: objectives/anti-static/obfuscation/source/syntax::html-xor-self-decoding-loader
