defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1105
  mbc: B0011
traits:
  - id: programdata-update-dir
    desc: ProgramData Update staging dir
    crit: suspicious
    conf: 0.93
    if:
      type: text
      exact: 'C:\ProgramData\Update'
  - id: commonfiles-update-dir
    desc: Common Files Update dir
    crit: suspicious
    conf: 0.91
    if:
      type: text
      exact: 'C:\Program Files\Common Files\Update'
  - id: wwansvc-drop-path
    desc: WwanSvc fake updater path
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\\Update\\WwanSvc\.exe$'
  - id: wwansvc-run-launch
    desc: WwanSvc run launcher command
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)^"C:\\.{0,120}\\Update\\WwanSvc\.exe" /run$'
  - id: window-update-lure
    desc: Window Update lure string
    crit: suspicious
    conf: 0.88
    if:
      type: text
      exact: 'Window Update'
  - id: cmd-processed-log
    desc: Command processed audit string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: 'CMD:%s PROCESSED AT'
  - id: staged-download-status
    desc: Download status telemetry strings
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: 'Download (success|failure)'
  - id: staged-exec-status
    desc: Execution status telemetry strings
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: 'Execution (success|failure)'
composite_rules:
  - id: fake-update-install-cluster
    desc: Fake updater dual install paths
    crit: suspicious
    conf: 0.95
    all:
      - id: wwansvc-drop-path
    any:
      - id: programdata-update-dir
      - id: commonfiles-update-dir
      - id: wwansvc-run-launch
      - id: window-update-lure
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: runkey-fake-update-stager
    desc: Run-key fake update download stager
    crit: hostile
    conf: 0.97
    all:
      - id: fake-update-install-cluster
      - id: objectives/persistence/login/startup/registry::windows-registry-run-access
    any:
      - id: cmd-processed-log
      - id: staged-download-status
      - id: staged-exec-status
      - id: micro-behaviors/communications/http/get::urlmon-dynamic-load
      - id: micro-behaviors/communications/ip::external-ipv4-binary
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
      - id: micro-behaviors/process/create/exec::winexec
      - id: micro-behaviors/process/create/spawn::create-process-a
    needs: 4
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
