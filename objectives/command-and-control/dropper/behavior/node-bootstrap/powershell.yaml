defaults:
  for: [powershell]
  platforms: [windows]
  mbc: B0024
  attack: T1105
traits:
  - id: windows-terminal-hide-loop
    desc: Hides WindowsTerminal windows
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?s)WindowsTerminal.{0,120}ShowWindow'
  - id: dropped-js-stage-path
    desc: Dropped JavaScript stage path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\\[A-Za-z]{8,16}\.js'
  - id: hidden-node-launch
    desc: Hidden Node start process
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'Start-Process.{0,120}-WindowStyle Hidden'
  - id: node-args-js-domain
    desc: Node args include JS domain
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '-ArgumentList.{0,80}\.js.{0,80}\.[A-Za-z]{2,}'
composite_rules:
  - id: portable-node-js-stager
    desc: PowerShell stages NodeJS payload
    crit: suspicious
    conf: 0.96
    all:
      - id: objectives/command-and-control/dropper/standalone::node-standalone-powershell
      - id: objectives/command-and-control/dropper/staging/encrypted::ps-aes-inline-payload
      - id: micro-behaviors/fs/write/file::write-all-text
    any:
      - id: dropped-js-stage-path
      - id: micro-behaviors/process/create::start-process-dup
      - id: objectives/evasion/process/hidden/execution::ps-hidden-window
  - id: concealed-node-loader
    desc: Hidden PowerShell Node loader
    crit: hostile
    conf: 0.98
    all:
      - id: portable-node-js-stager
      - id: hidden-node-launch
    any:
      - id: node-args-js-domain
      - id: micro-behaviors/process/sync/mutex::global-mutex-single-instance-script
      - id: windows-terminal-hide-loop
      - id: objectives/evasion/process/hidden/execution::ps-hidden-window
      - id: objectives/anti-static/obfuscation/code-metrics::ps-single-line-script
    needs: 3
