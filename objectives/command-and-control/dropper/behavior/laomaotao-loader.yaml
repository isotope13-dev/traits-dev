defaults:
  attack: T1105
  mbc: B0024
  for:
    - pe
    - pe
  platforms:
    - windows
composite_rules:
  - id: laomaotao-packed-admin-dropper
    desc: LaoMaoTao masquerade with embedded downloader
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/evasion/masquerade/identity/fabricated::laomaotao-boot-tool-masquerade
      - id: metadata/binary/layout::pe-embedded
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
    any:
      - id: micro-behaviors/communications/ftp/client::wininet-ftp-api
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: micro-behaviors/os/sysinfo/network::get-adapters-info
      - id: objectives/anti-static/pack/detect::upx-section
      - id: objectives/anti-static/pack/detect::aspack-marker
    needs: 2
