# Native Binary Dropper Detection
# Detects compiled binaries that decode and execute embedded payloads
# MBC: B0030 (Dropper), B0032 (Obfuscation)
# ATT&CK: T1027.009 (Embedded Payloads), T1059 (Command Execution)

defaults:
  for: [macho, elf, pe]
  mbc: "B0030"
  attack: "T1027.009"

traits:
  # Large hex-encoded payload embedded in binary
  # Pattern: long continuous hex string (20000+ chars = 10KB+ decoded)
  # This is a dropper technique: encode payload as hex, decode at runtime
  # Common in AMOS stealer, cryptominers, and other macOS malware
  - id: large-hex-payload
    desc: Large hex-encoded payload string (10KB+)
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: "^[0-9a-fA-F]{20000,}$"

  # Custom encoding alphabet (64 chars with special characters)
  # Malware often uses custom base64-like alphabets for obfuscation
  # Pattern: exactly 64 chars containing letters, digits, AND special chars
  # Examples: ">Ei*=%K6X#<ht!x4P8j(rHF3_pLJc9n1uWy5oqYI7gsbU+$@MSNA&k-)vVCGQZwR"
  # Requires digits to exclude pure alphabetic strings (compressed dictionaries)
  # All real custom base64 alphabets use 0-9, a-z, A-Z, and special chars
  - id: custom-encoding-alphabet
    desc: Custom encoding alphabet (cipher/obfuscation)
    crit: suspicious
    conf: 0.8
    mbc: "B0032"
    attack: "T1027"
    if:
      type: string
      # Custom base64 alphabet: exactly 64 mixed chars with special characters
      regex: "^[A-Za-z0-9_!#%&()*+/=@-]{64}$"
    not:
      # Exclude Vulkan validation IDs and enum references.
      - regex: '^VUID-'
      - regex: '^VK_[A-Z0-9_]+$'
      # Exclude purely alphanumeric/underscore strings (no special chars)
      - regex: "^[A-Za-z0-9_]+$"
      # Exclude standard base64 alphabets and common variants
      - exact: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/"
      - exact: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_"
      - exact: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz+/"
      - exact: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-_"
      - exact: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789+/"
      - exact: "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ@_"
      - exact: "-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefghijklmnopqrstuvwxyz"
      # Exclude comment banners and separator lines (e.g. /***...***/)
      - regex: "^[/*=-]+$"
      # Exclude C format strings and code templates (contain %s, %d, %@, etc.)
      - regex: "%[sdfu@]"
      # Exclude repeated hex format strings (e.g. %02x%02x%02x, %02hhx for GUID/MAC/hash logging)
      - regex: "(%[0-9]*[hlL]*[xXo]){4}"
      # Exclude ASCII character tables (sequential printable ASCII ranges)
      # e.g. !"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ
      # Common in text editors (vim), libc, and other legitimate binaries
      - regex: '!"#\$%&'
      # Exclude Objective-C type encoding strings (method signatures)
      # e.g. "v176@0:8@16@24@32@40@48@56@64q72i80c84q88q96q104@112..."
      # These contain @, digits, and type chars (v,i,c,q,B,Q,d,f,etc.)
      - regex: "^[vV@:iIcCsSqQlLdDfBn^#?{(\\[\\]0-9*]+$"
      # Exclude C++ mangled symbol names (contain ! from mangling artifacts)
      # e.g. "!2EP11HALS_SystemRK13audit_token_tibbbjPK10__CFStringxb..."
      - regex: "HALS_|__CF|RKN?[0-9]|^![0-9]"
      # Exclude CoreMediaIO HAL property tables (reversed FourCC selectors)
      # e.g. "vrdsbolgrrdsbolgiccsbolg#mtstpni..." - repeating 4CC+"bolg" patterns
      - regex: "[a-z]{4}bolg.*[a-z]{4}bolg"
      # Exclude MSVC C++ mangled symbol names (use @@ as namespace separator)
      # e.g. "Init@ElementProvider@DirectUI@@MAEJPAVElement@2@..."
      - substr: "@@"
      # Exclude C++/WinRT mangled names with multiple @Namespace chains
      # e.g. "EnableVirtualCamera@VirtualCameraProxy@implementation@WinRT@Streaming@CrossDevice@winrt@"
      # Encoding alphabets don't have 3+ @UppercaseName patterns
      - regex: "@[A-Za-z].*@[A-Za-z].*@[A-Za-z]"
      # Exclude strings with 6+ repeated special chars (padding/wildcard patterns)
      # e.g. "abcdefghijklmnopqrstuvwxyz0123456789****************************"
      # Real custom alphabets have diverse special characters, not padding runs
      - regex: "[*]{6}|[#]{6}|[!]{6}|[=]{6}|[-]{6}|[+]{6}|[_]{6}"
      # Exclude OpenSSL X.509 flag/constant concatenations
      # e.g. "sslX509_V_FLAG_NOTIFY_POLICY#sslX509_V_FLAG_EXTENDED_CRL_SUPPORT"
      - substr: "_FLAG_"

composite_rules:
  # PE staged loader pattern: resource extraction plus runtime API resolution.
  # Kept suspicious (not hostile) because some installers/updaters can use parts
  # of this chain legitimately.
  - id: pe-resource-staged-loader
    desc: PE resource staged loader chain
    crit: suspicious
    conf: 0.88
    attack: "T1027.009"
    for: [pe, dll]
    size_max: 524288
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-loader-api-chain
      - id: micro-behaviors/dylib/lookup::get-proc-address
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: objectives/anti-analysis/timing/evasion::timing-delta-check
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/format::many-imports
        - id: metadata/lang/compiler::msvc
        - id: metadata/vendor/microsoft::is-microsoft-named

  - id: pe-resource-loader-registry-evasion-chain
    desc: PE resource loader with registry tamper and anti-analysis
    crit: suspicious
    conf: 0.93
    attack: "T1027.009"
    for: [pe, dll]
    size_max: 5242880
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-loader-api-chain
      - id: objectives/execution/reflection/class::dynamic-load-pattern
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: objectives/anti-analysis/timing/evasion::timing-anti-debug
    any:
      - id: micro-behaviors/process/thread/create::create-thread
      - id: micro-behaviors/fs/enumerate/directory::find-next-file
      - id: micro-behaviors/fs/path/check::path-is-directory
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
        - id: metadata/format::many-imports
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/lang/compiler::msvc

  - id: pe-resource-memory-stage-with-hooking
    desc: PE resource loader with memory staging and UI hook setup
    crit: suspicious
    conf: 0.91
    attack: "T1027.009"
    for: [pe, dll]
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: objectives/execution/reflection/class::dynamic-load-pattern
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    any:
      - id: micro-behaviors/hardware/input/keyboard::set-windows-hook
      - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
      - id: objectives/anti-static/obfuscation/payload/section::oversized-data-section
    needs: 1
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft

  # libcurl network dropper: downloads content via libcurl, writes to disk, executes via shell
  # Pattern seen in kworker_pretenders malware family (2024):
  # - Uses libcurl to download payloads
  # - Writes to user home directory files for persistence
  # - Executes downloaded content via system()
  # - Reads /proc/self/exe for self-discovery
  # Malware droppers are typically small (<500KB) - legitimate tools are much larger
  # Complexity: all(4) + for(1) + size_max(1) = 6 >= 4 ✓ HOSTILE
  - id: libcurl-network-dropper
    desc: libcurl dropper (downloads and executes payload)
    crit: hostile
    conf: 0.95
    mbc: "B0030"
    attack: "T1105"
    for: [elf]
    size_max: 500000
    all:
      - id: micro-behaviors/communications/download/curl::libcurl-http
      - id: micro-behaviors/process/create/shell::shell-execution
      - id: micro-behaviors/fs/file/operations::binary-file-ops
      - id: micro-behaviors/fs/proc/info::process-pid-exe

  # Minimal libcurl dropper: stripped binary with curl + system + few imports
  # This variant doesn't need /proc/self/exe but has minimal imports indicating malicious intent
  # Complexity: all(3) + for(1) = 4 >= 4 ✓ HOSTILE
  - id: libcurl-minimal-dropper
    desc: Minimal libcurl dropper (stripped binary)
    crit: hostile
    conf: 0.92
    mbc: "B0030"
    attack: "T1105"
    for: [elf]
    all:
      - id: micro-behaviors/communications/download/curl::libcurl-http
      - id: micro-behaviors/process/create/shell::shell-execution
      - id: objectives/anti-static/obfuscation/payload/encrypted::minimal-imports

  # Hex-encoded dropper: large hex blob + system() + minimal imports
  # This is a classic dropper pattern: decode hex payload and execute via shell
  # Complexity: all(3) + file_types(1) = 4 >= 4 ✓ HOSTILE
  - id: hex-payload-dropper
    desc: Hex-encoded payload dropper (decodes and executes)
    crit: hostile
    conf: 0.95
    mbc: "B0030"
    attack: "T1059"
    for: [macho, elf]
    all:
      - id: large-hex-payload
      - id: objectives/anti-static/obfuscation/payload/encrypted::minimal-imports
      - id: micro-behaviors/process/create/shell::shell-execution

  # Obfuscated payload dropper: custom encoding + large payload + exec
  # This pattern is common in macOS malware like FakeZoom/AMOS stealer
  # Uses custom encoding alphabet to decode embedded payload, then executes
  # Complexity: all(3) + file_types(1) = 4 >= 4 ✓ HOSTILE
  - id: custom-encoded-dropper
    desc: Custom-encoded payload dropper
    crit: hostile
    conf: 0.92
    mbc: "B0030"
    attack: "T1059"
    for: [macho, elf]
    all:
      - id: large-hex-payload
      - id: custom-encoding-alphabet
      - id: micro-behaviors/process/create/shell::shell-execution


  # PE encrypted resource dropper: extracts encrypted resource, writes to disk, executes
  # This is the canonical Windows resource dropper pattern seen in dropper families
  # Signal depth: FindResource + LoadResource + SizeofResource + LockResource + WriteFile
  #              + dominant encrypted .rsrc + ShellExecute = 7+ independent signals
  # Complexity: all(3) + any(1) + for(1) = 5 >= 4 ✓ HOSTILE
  - id: pe-encrypted-resource-dropper
    desc: PE encrypted resource dropper (extract, write, execute)
    crit: hostile
    conf: 0.93
    mbc: "B0030"
    attack: "T1027.009"
    for: [pe, dll]
    size_max: 5242880 # 5MB limit for dropper
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: micro-behaviors/io/console/output::write-file
      - id: objectives/anti-static/obfuscation/payload/encrypted::dominant-rsrc-section
    any:
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/process/create/exec::shell-execute
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/quality/versioning::pe-version-resource

  # PE resource dropper with process scanning (anti-AV reconnaissance)
  # Combines resource extraction + file write + process enumeration
  # Malware scans running processes to detect AV before dropping payload
  # Complexity: all(3) + for(1) = 4 >= 4 ✓ HOSTILE
  - id: pe-resource-dropper-with-process-scan
    desc: PE resource dropper with process scanning
    crit: hostile
    conf: 0.92
    mbc: "B0030"
    attack: "T1027.009"
    for: [pe, dll]
    size_max: 5242880
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: micro-behaviors/io/console/output::write-file
      - id: micro-behaviors/process/enumerate/psapi::enum-processes
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/quality/versioning::pe-version-resource

  # PE resource dropper that stages payload in temp and launches it, while
  # also showing persistence/evasion behavior. Tuned for reusable behavior,
  # not family-specific IoCs.
  - id: pe-resource-temp-stager-persistence-chain
    desc: PE resource dropper with temp staging, spawn, and persistence chain
    crit: hostile
    conf: 0.94
    mbc: "B0030"
    attack: "T1027.009"
    for: [pe, dll]
    size_max: 5242880
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
      - id: micro-behaviors/process/create/spawn::create-process-w
    any:
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: micro-behaviors/os/service/control::reconfigure-and-start-service
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: objectives/anti-analysis/timing/evasion::timing-anti-debug
    needs: 2
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/quality/versioning::pe-version-resource

  - id: pe-resource-service-hijack-stager
    desc: Resource stager with service hijack chain
    crit: hostile
    conf: 0.95
    mbc: "B0030"
    attack: "T1543.003"
    for: [pe, dll]
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/os/service/control::reconfigure-and-start-service
    any:
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: micro-behaviors/process/create/exec::shell-execute
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named

  - id: pe-embedded-payload-sandbox-aware
    desc: Embedded PE payload with sandbox-evasion corpus
    crit: suspicious
    conf: 0.93
    mbc: "B0030"
    attack: "T1027.009"
    for: [pe, dll]
    all:
      - id: micro-behaviors/data/embedded/payload::pe-magic-embedded
    any:
      - id: objectives/anti-analysis/sandbox-evasion/environment
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named

  # PE staged archive loader pattern:
  # multiple embedded ZIP local headers + anti-analysis instruction checks +
  # dynamic loader behavior suggest staged payload extraction.
  - id: pe-zip-staged-loader
    desc: PE staged ZIP payload loader chain
    crit: suspicious
    conf: 0.91
    mbc: "B0030"
    attack: "T1027.009"
    for: [pe, dll]
    all:
      - id: micro-behaviors/data/embedded/payload::zip-magic-multiple-pe
      - id: objectives/anti-analysis/vm/detect::instruction-based-evasion
    any:
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/dylib/load::load-library-w
      - id: objectives/anti-static/polyglot/format::jar-polyglot-prefix

  # Nim-style in-memory payload loader:
  # base64 decode + RC4 decrypt + executable memory APIs.
  # This captures reusable technique chains without family-specific IoCs.
  - id: pe-nim-rc4-memory-loader
    desc: PE Nim RC4 decode to memory-exec chain
    crit: suspicious
    conf: 0.94
    mbc: "B0030"
    attack: "T1055"
    platforms: [windows]
    for: [pe, dll]
    all:
      - id: micro-behaviors/data/encode/base64::nim-base64-decoder-symbol
      - id: micro-behaviors/crypto/symmetric/stream::rc4-symbol-chain
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/execution/native/runtime::shellcode
      - id: micro-behaviors/dylib/lookup::get-proc-address
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/quality/versioning::pe-version-resource
