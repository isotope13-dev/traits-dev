defaults:
  platforms: [unix, windows, macos]
  for: [elf, macho]
  mbc: B0030
  attack: T1027.009
traits:
  - id: aes-newcipher
    desc: Go crypto/aes.NewCipher call
    crit: notable
    conf: 0.8
    if:
      type: string
      substr: crypto/aes.NewCipher
  - id: cfb-decrypter
    desc: Go AES-CFB decrypter
    crit: notable
    conf: 0.8
    if:
      type: string
      substr: cipher.NewCFBDecrypter
  - id: run-from-memory
    desc: Run-from-memory execution pattern
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: runFromMemory
  - id: syscall-exec-dup
    desc: Go syscall.Exec for process execution
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: syscall.Exec
  - id: aes-decrypt-func
    desc: AES decryption function
    crit: notable
    conf: 0.75
    if:
      type: string
      regex: \.(aes|AES)[Dd]ec(rypt)?
composite_rules:
  - id: memory-dropper
    desc: Go memory dropper (decrypt+memexec)
    crit: hostile
    conf: 0.95
    attack: T1620
      - elf
      - macho
    all:
      - id: cfb-decrypter
      - id: run-from-memory
      - id: objectives/command-and-control/dropper/memory-exec::syscall-exec-dup
      - id: aes-newcipher
