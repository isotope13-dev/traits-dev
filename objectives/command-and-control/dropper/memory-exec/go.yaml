defaults:
  platforms: [unix, windows, macos]
  for: [elf, macho]
  mbc: B0030
  attack: T1027.009
traits:
  - id: aes-newcipher
    desc: Go crypto/aes.NewCipher call
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "(crypto/)?aes\\.NewCipher"
  - id: cfb-decrypter
    desc: Go AES-CFB decrypter
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "(crypto/)?cipher\\.(NewCFBDecrypter|newCFB)"
  - id: run-from-memory
    desc: Run-from-memory execution pattern
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: "runFromMemory"
  - id: aes-decrypt-func
    desc: AES decryption function
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: \.(aes|AES)[Dd]ec(rypt)?
composite_rules:
  - id: memory-dropper
    desc: Go memory dropper (decrypt+memexec)
    crit: hostile
    conf: 0.95
    attack: T1620
    all:
      - id: run-from-memory
      - id: micro-behaviors/process/create/direct::execve-import
    any:
      - id: cfb-decrypter
      - id: aes-newcipher
      - id: aes-decrypt-func
      - id: micro-behaviors/crypto/symmetric/aes::aes-sbox-bytes
