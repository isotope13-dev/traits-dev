defaults:
  platforms: [windows]
  for: [batch, powershell, scripts, javascript]
  attack: T1105
traits:
  - id: cpython-windows-installer
    desc: CPython Windows installer filename
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bpython-[0-9]+\.[0-9]+\.[0-9]+([a-z0-9.-]*)-(amd64|win32|arm64)\.exe\b'
  - id: silent-python-install-flags
    desc: Silent Python installer command flags
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)/(quiet|passive)\b[^\r\n]{0,180}\bTargetDir\s*='
  - id: silent-python-user-install-flags
    desc: Silent per-user Python install flags
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "/quiet InstallAllUsers=0 PrependPath=1"
  - id: python-install-target-root
    desc: Root-level Python install target
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?i)\bTargetDir\s*=\s*"?C:\\Python[0-9]{2,3}\b'
  - id: get-pip-script-fetch
    desc: Downloads get-pip bootstrap script
    crit: notable
    conf: 0.86
    unless:
      - id: micro-behaviors/os/package-manager/install::ensurepip-bootstrap
      - id: well-known/app/crunr::crunr-demo-marker
    if:
      type: text
      regex: '(?i)\bget-pip\.py\b'
  - id: python-clipboard-keyboard-pip-install
    desc: Installs clipboard keyboard deps
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "install pyperclip keyboard"
  - id: python-screen-ui-pip-deps
    desc: Installs screen UI automation deps
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "mss pyautogui pywin32 uiautomation comtypes"
  - id: staged-python-script-spawn
    desc: Spawns staged script variable
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bspawn\s*\(\s*[A-Za-z_$][\w$]*\s*,\s*\[\s*[A-Za-z_$][\w$]*\s*\]'
  - id: local-python-script-path
    desc: Local Python script path variable
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "path\\.join\\(.{0,80}\\.py['\"]\\)"
composite_rules:
  - id: silent-cpython-runtime-staging
    desc: Silently stages CPython runtime
    crit: suspicious
    conf: 0.9
    all:
      - id: cpython-windows-installer
      - id: silent-python-install-flags
    any:
      - id: python-install-target-root
      - id: get-pip-script-fetch
      - id: objectives/command-and-control/dropper/execution/batch::download-tool
  - id: python-runtime-bootstrap-chain
    desc: Downloads Python runtime then bootstraps pip
    crit: suspicious
    conf: 0.9
    all:
      - id: silent-cpython-runtime-staging
      - id: get-pip-script-fetch
  - id: javascript-python-overlay-runtime-bootstrap
    desc: JavaScript launcher stages Python overlay surveillance runtime
    crit: hostile
    conf: 0.98
    attack: T1105,T1059.006
    all:
      - id: cpython-windows-installer
      - id: silent-python-user-install-flags
      - id: python-clipboard-keyboard-pip-install
      - id: python-screen-ui-pip-deps
      - id: staged-python-script-spawn
      - id: local-python-script-path
