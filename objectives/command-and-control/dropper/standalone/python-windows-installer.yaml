defaults:
  platforms: [windows]
  for: [batch, powershell, scripts]
  attack: T1105
traits:
  - id: cpython-windows-installer
    desc: CPython Windows installer filename
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bpython-[0-9]+\.[0-9]+\.[0-9]+([a-z0-9.-]*)-(amd64|win32|arm64)\.exe\b'
  - id: silent-python-install-flags
    desc: Silent Python installer command flags
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)/(quiet|passive)\b[^\r\n]{0,180}\bTargetDir\s*='
  - id: python-install-target-root
    desc: Root-level Python install target
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?i)\bTargetDir\s*=\s*"?C:\\Python[0-9]{2,3}\b'
  - id: get-pip-script-fetch
    desc: Downloads get-pip bootstrap script
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bget-pip\.py\b'
composite_rules:
  - id: silent-cpython-runtime-staging
    desc: Silently stages CPython runtime
    crit: suspicious
    conf: 0.9
    all:
      - id: cpython-windows-installer
      - id: silent-python-install-flags
    any:
      - id: python-install-target-root
      - id: get-pip-script-fetch
      - id: objectives/command-and-control/dropper/execution/batch::download-tool
  - id: python-runtime-bootstrap-chain
    desc: Downloads Python runtime then bootstraps pip
    crit: suspicious
    conf: 0.9
    all:
      - id: silent-cpython-runtime-staging
      - id: get-pip-script-fetch
