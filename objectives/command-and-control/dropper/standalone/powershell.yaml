defaults:
  for: [powershell]
  platforms: [windows]
  attack: T1105
  mbc: B0024
traits:
  - id: node-dist-fragmented-url
    desc: Fragmented Node zip URL
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'https://nod.{0,60}dist/v.{0,40}x64\.zip'
      case_insensitive: true
  - id: local-nodejs-dir-fragmented
    desc: Fragmented local Nodejs path
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\\Nod.{0,8}ejs'
  - id: node-runtime-dir-fragmented
    desc: Fragmented Node runtime dir
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'de-.{0,24}wi.{0,12}x64'
  - id: node-exe-fragmented
    desc: Fragmented node executable path
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\\nod.{0,8}e\.e.{0,8}xe'
composite_rules:
  - id: node-standalone-powershell
    desc: Downloads standalone Node runtime
    crit: suspicious
    conf: 0.95
    all:
      - id: node-runtime-dir-fragmented
    any:
      - id: node-dist-fragmented-url
      - id: node-exe-fragmented
      - id: objectives/execution/interpreter/script/wsh::expand-archive-present
      - id: local-nodejs-dir-fragmented
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::iwr-name
    needs: 3
