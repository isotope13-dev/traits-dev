defaults:
  for: [powershell]
  platforms: [windows]
  attack: T1105
  mbc: B0024
traits:
  - id: node-dist-fragmented-url
    desc: Fragmented Node zip URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'https://nod[''"+`\s]+ejs\.org/dist'
      case_insensitive: true
  - id: node-dist-tokenized-url
    desc: Tokenized Node zip URL
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'https://n[''"+`\s]+o[''"+`\s]+d[''"+`\s]+e'
      case_insensitive: true
  - id: local-nodejs-dir-fragmented
    desc: Fragmented local Nodejs path
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\\Nod[''"+`\s]+ejs'
  - id: node-runtime-dir-fragmented
    desc: Fragmented Node runtime dir
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'de-[''"+`\s]+wi[''"+`\s]+x64'
  - id: node-exe-fragmented
    desc: Fragmented node executable path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\\nod[''"+`\s]+e\.e[''"+`\s]+xe'
composite_rules:
  - id: node-standalone-powershell
    desc: Downloads standalone Node runtime
    crit: suspicious
    conf: 0.95
    all:
      - id: node-runtime-dir-fragmented
    any:
      - id: node-dist-fragmented-url
      - id: node-dist-tokenized-url
      - id: node-exe-fragmented
      - id: micro-behaviors/data/archive/extract/zip::powershell-expand-archive
      - id: local-nodejs-dir-fragmented
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::iwr-name
    needs: 3
