defaults:
  platforms: [windows, unix]
traits:
- id: python-standalone-repo1
  desc: indygreg/python-build-standalone repo
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: indygreg/python-build-standalone
- id: python-standalone-repo2
  desc: python-build-standalone releases
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: python-build-standalone/releases
- id: python-standalone-url1
  desc: cpython- prefix
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: cpython-
- id: python-standalone-url2
  desc: install_only.tar.gz suffix
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: -install_only.tar.gz
- id: python-standalone-url3
  desc: python.org/ftp/python URL
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: python.org/ftp/python
- id: node-standalone-url1
  desc: nodejs.org/dist URL
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: nodejs.org/dist
- id: node-standalone-url2
  desc: node-v version prefix
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: node-v
- id: tar-gz-ext
  desc: .tar.gz extension
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: .tar.gz
- id: bin-python
  desc: bin/python path
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: bin/python
- id: python-exe
  desc: python.exe path
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: python.exe
- id: bin-node
  desc: bin/node path
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: bin/node
- id: node-exe
  desc: node.exe path
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: node.exe
- id: bin-ruby
  desc: bin/ruby path
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: bin/ruby
- id: js-python-standalone-release-url--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: github.com/indygreg/python-build-standalone/releases/download
- id: js-python-standalone-release-url--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: install_only.tar.gz
- id: js-python-standalone-release-url--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: cpython
- id: js-python-stdin-payload-exec--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.94
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: stdin.write
- id: js-python-stdin-payload-exec--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.94
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: exec_bin
- id: js-python-stdin-payload-exec--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.94
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: engine
- id: js-python-stdin-payload-exec--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.94
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: python
- id: js-python-stdin-payload-exec--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.94
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: spawn
composite_rules:
- id: python-standalone-repos
  desc: Python standalone repository references
  crit: component
  for: [scripts, binaries]
  any:
  - id: python-standalone-repo1
  - id: python-standalone-repo2
- id: python-standalone-urls
  desc: Python standalone URL patterns
  crit: component
  for: [scripts, binaries]
  all:
  - id: python-standalone-url1
  - id: python-standalone-url2
- id: python-standalone
  desc: Downloads python-build-standalone (interpreter dropper pattern)
  crit: suspicious
  conf: 0.9
  attack: T1105
  for: [scripts, binaries]
  any:
  - id: python-standalone-repos
  - id: python-standalone-urls
  - id: python-standalone-url3
- id: node-standalone-urls
  desc: Node.js distribution URLs
  crit: component
  for: [scripts, binaries]
  all:
  - id: node-standalone-url1
  - id: node-standalone-url2
- id: archive-ext
  desc: Archive extension
  crit: component
  for: [scripts, binaries]
  any:
  - id: tar-gz-ext
  - id: objectives/command-and-control/dropper/staging/archive::zip-ext
- id: node-standalone
  desc: Downloads standalone Node.js interpreter
  crit: suspicious
  conf: 0.85
  attack: T1105
  for: [scripts, binaries]
  all:
  - id: node-standalone-urls
  - id: archive-ext
  - id: objectives/anti-static/obfuscation/payload/bytecode::exec-functions
- id: interpreter-paths
  desc: Interpreter paths
  crit: component
  for:
  - javascript
  - typescript
  any:
  - id: bin-python
  - id: python-exe
  - id: bin-node
  - id: node-exe
  - id: bin-ruby
- id: python-standalone-stdin-loader
  desc: Downloaded Python executes stdin payload
  crit: hostile
  conf: 0.98
  attack: T1059.006
  for:
  - javascript
  - typescript
  all:
  - id: python-standalone
  - id: interpreter-paths
  - id: micro-behaviors/process/create/spawn::child-process-member-spawn
  - id: objectives/anti-static/obfuscation/eval/require::hex-buffer-decode
  any:
  - id: micro-behaviors/communications/url/external/github::github-release-download
  - id: micro-behaviors/data/encode/hex::hex-encoded-https
  - id: objectives/anti-static/obfuscation/string/encoding::js-hex-escape
- id: js-downloaded-python-stdin-loader
  desc: Downloaded Python runs stdin payload
  crit: hostile
  conf: 0.99
  attack: T1059.006
  for:
  - javascript
  - typescript
  all:
  - id: js-python-standalone-release-url
  - id: js-python-stdin-payload-exec
  - id: micro-behaviors/process/create/shell/lang::child-process-require-call
- id: js-python-standalone-release-url
  desc: Python standalone release download URL
  crit: suspicious
  conf: 0.92
  attack: T1105
  for:
  - javascript
  - typescript
  all:
  - id: js-python-standalone-release-url--rx-1
  - id: js-python-standalone-release-url--rx-2
  - id: js-python-standalone-release-url--rx-3
  near_bytes: 4096
- id: js-python-stdin-payload-exec
  desc: Spawned Python executes stdin payload
  crit: suspicious
  conf: 0.94
  attack: T1059.006
  for:
  - javascript
  - typescript
  any:
  - id: js-python-stdin-payload-exec--rx-4
  - id: js-python-stdin-payload-exec--rx-5
  - id: js-python-stdin-payload-exec--rx-6
  - id: js-python-stdin-payload-exec--rx-7
  - id: js-python-stdin-payload-exec--rx-8
  needs: 1
