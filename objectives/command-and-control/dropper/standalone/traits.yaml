defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: python-standalone-repo1
    desc: indygreg/python-build-standalone repo
    crit: component
    for:
      - javascript
      - typescript
      - shell
    if:
      type: string_value
      substr: indygreg/python-build-standalone
  - id: python-standalone-repo2
    desc: python-build-standalone releases
    crit: component
    for:
      - javascript
      - typescript
      - shell
    if:
      type: string_value
      substr: python-build-standalone/releases
  - id: python-standalone-url1
    desc: cpython- prefix
    crit: component
    for:
      - javascript
      - typescript
      - shell
    if:
      type: string_value
      substr: cpython-
  - id: python-standalone-url2
    desc: install_only.tar.gz suffix
    crit: component
    for:
      - javascript
      - typescript
      - shell
    if:
      type: string_value
      substr: -install_only.tar.gz
  - id: python-standalone-url3
    desc: python.org/ftp/python URL
    crit: component
    for:
      - javascript
      - typescript
      - shell
    if:
      type: string_value
      substr: python.org/ftp/python
  - id: node-standalone-url1
    desc: nodejs.org/dist URL
    crit: component
    for:
      - javascript
      - typescript
      - shell
    if:
      type: string_value
      substr: nodejs.org/dist
  - id: node-standalone-url2
    desc: node-v version prefix
    crit: component
    for:
      - javascript
      - typescript
      - shell
    if:
      type: string_value
      substr: node-v
  - id: tar-gz-ext
    desc: .tar.gz extension
    crit: component
    for:
      - javascript
      - typescript
      - shell
    if:
      type: string_value
      substr: .tar.gz
  - id: bin-python
    desc: bin/python path
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: bin/python
  - id: python-exe
    desc: python.exe path
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: python.exe
  - id: bin-node
    desc: bin/node path
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: bin/node
  - id: node-exe
    desc: node.exe path
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: node.exe
  - id: bin-ruby
    desc: bin/ruby path
    crit: component
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: bin/ruby
composite_rules:
  - id: python-standalone-repos
    desc: Python standalone repository references
    crit: component
    for:
      - javascript
      - typescript
      - shell
    any:
      - id: python-standalone-repo1
      - id: python-standalone-repo2
  - id: python-standalone-urls
    desc: Python standalone URL patterns
    crit: component
    for:
      - javascript
      - typescript
      - shell
    all:
      - id: python-standalone-url1
      - id: python-standalone-url2
  - id: python-standalone
    desc: Downloads python-build-standalone (interpreter dropper pattern)
    crit: suspicious
    conf: 0.9
    attack: T1105
    for:
      - javascript
      - typescript
      - shell
    any:
      - id: python-standalone-repos
      - id: python-standalone-urls
      - id: python-standalone-url3
  - id: node-standalone-urls
    desc: Node.js distribution URLs
    crit: component
    for:
      - javascript
      - typescript
      - shell
    all:
      - id: node-standalone-url1
      - id: node-standalone-url2
  - id: archive-ext
    desc: Archive extension
    crit: component
    for:
      - javascript
      - typescript
      - shell
    any:
      - id: tar-gz-ext
      - id: objectives/command-and-control/dropper/staging/archive::zip-ext
  - id: node-standalone
    desc: Downloads standalone Node.js interpreter
    crit: suspicious
    conf: 0.85
    attack: T1105
    for:
      - javascript
      - typescript
      - shell
    all:
      - id: node-standalone-urls
      - id: archive-ext
      - id: objectives/anti-static/obfuscation/payload/bytecode::exec-functions
  - id: interpreter-paths
    desc: Interpreter paths
    crit: component
    for:
      - javascript
      - typescript
    any:
      - id: bin-python
      - id: python-exe
      - id: bin-node
      - id: node-exe
      - id: bin-ruby
