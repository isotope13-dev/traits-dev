defaults:
  platforms: [windows, unix]
traits:
- id: python-standalone-repo1
  desc: indygreg/python-build-standalone repo
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: indygreg/python-build-standalone
- id: python-standalone-repo2
  desc: python-build-standalone releases
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: python-build-standalone/releases
- id: python-standalone-url1
  desc: cpython- prefix
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: cpython-
- id: python-standalone-url2
  desc: install_only.tar.gz suffix
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: -install_only.tar.gz
- id: python-standalone-url3
  desc: python.org/ftp/python URL
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: python.org/ftp/python
- id: node-standalone-url1
  desc: nodejs.org/dist URL
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: nodejs.org/dist
- id: node-standalone-url2
  desc: node-v version prefix
  crit: component
  for: [scripts, binaries]
  if:
    type: string_literal
    substr: node-v
- id: bin-python
  desc: bin/python path
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: bin/python
- id: python-exe
  desc: python.exe path
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: python.exe
- id: bin-node
  desc: bin/node path
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: bin/node
- id: node-exe
  desc: node.exe path
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: node.exe
- id: bin-ruby
  desc: bin/ruby path
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: bin/ruby
- id: js-python-standalone-release-url--rx-1
  desc: python-build-standalone release URL
  crit: component
  conf: 0.92
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: github.com/indygreg/python-build-standalone/releases/download
  count_max: 1007802
- id: js-python-standalone-release-url--rx-2
  desc: install_only tarball marker
  crit: component
  conf: 0.92
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: install_only.tar.gz
  count_max: 1007803
- id: js-python-standalone-release-url--rx-3
  desc: CPython standalone marker
  crit: component
  conf: 0.92
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: cpython
  count_max: 1007804
- id: js-python-stdin-payload-exec--rx-5
  desc: exec_bin payload field marker
  crit: component
  conf: 0.94
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: exec_bin
  count_max: 1007806
composite_rules:
- id: python-standalone-repos
  desc: Python standalone repository references
  crit: component
  for: [scripts, binaries]
  any:
  - id: python-standalone-repo1
  - id: python-standalone-repo2
- id: python-standalone-urls
  desc: Python standalone URL patterns
  crit: component
  for: [scripts, binaries]
  all:
  - id: python-standalone-url1
  - id: python-standalone-url2
- id: python-standalone
  desc: Downloads python-build-standalone (interpreter dropper pattern)
  crit: suspicious
  conf: 0.9
  attack: T1105
  for: [scripts, binaries]
  any:
  - id: python-standalone-repos
  - id: python-standalone-urls
  - id: python-standalone-url3
- id: node-standalone-urls
  desc: Node.js distribution URLs
  crit: component
  for: [scripts, binaries]
  all:
  - id: node-standalone-url1
  - id: node-standalone-url2
- id: node-standalone
  desc: Downloads standalone Node.js interpreter
  crit: suspicious
  conf: 0.85
  attack: T1105
  for: [scripts, binaries]
  all:
  - id: node-standalone-urls
  - id: objectives/anti-static/obfuscation/payload/bytecode::exec-functions
  any:
  - id: micro-behaviors/data/archive/extension::tar-gz
  - id: micro-behaviors/data/archive/extension::zip-extension
- id: interpreter-paths
  desc: Interpreter paths
  crit: component
  for:
  - javascript
  - typescript
  any:
  - id: bin-python
  - id: python-exe
  - id: bin-node
  - id: node-exe
  - id: bin-ruby
- id: python-standalone-stdin-loader
  desc: Downloaded Python executes stdin payload
  crit: hostile
  conf: 0.98
  attack: T1059.006
  for:
  - javascript
  - typescript
  all:
  - id: python-standalone
  - id: interpreter-paths
  - id: micro-behaviors/process/create/spawn::child-process-member-spawn
  - id: micro-behaviors/data/decode/hex::buffer-from-hex-string
  any:
  - id: micro-behaviors/communications/url/external/github::github-release-download
  - id: micro-behaviors/data/encode/hex::hex-encoded-https
  - id: micro-behaviors/data/encode/hex::js-dense-hex-escapes
- id: js-downloaded-python-stdin-loader
  desc: Downloaded Python runs stdin payload
  crit: hostile
  conf: 0.99
  attack: T1059.006
  for:
  - javascript
  - typescript
  all:
  - id: js-python-standalone-release-url
  - id: js-python-stdin-payload-exec
  - id: micro-behaviors/process/create/shell/bridge::child-process-require-call
- id: js-python-standalone-release-url
  desc: Python standalone release download URL
  crit: suspicious
  conf: 0.92
  attack: T1105
  for:
  - javascript
  - typescript
  all:
  - id: js-python-standalone-release-url--rx-1
  - id: js-python-standalone-release-url--rx-2
  - id: js-python-standalone-release-url--rx-3
  near_bytes: 4096
  unless:
  - id: well-known/app/pinokio::app-bundle
  - id: well-known/app/tencent-codebuddy::tencent-codebuddy
  - id: python-runtime-bootstrap-context
- id: js-python-stdin-payload-exec
  desc: Spawned interpreter receives stdin payload
  crit: suspicious
  conf: 0.94
  attack: T1059
  for:
  - javascript
  - typescript
  all:
  - id: micro-behaviors/process/fd/stdio::js-stdin-write
  - id: js-python-stdin-payload-exec--rx-5
  - id: micro-behaviors/process/create/spawn::child-process-member-spawn
  unless:
  - id: metadata/file/format::sourcemap-sources-content
  - id: well-known/lib/raycast-api/

- id: python-runtime-bootstrap-context
  desc: Python standalone runtime bootstrap context
  crit: exception
  conf: 0.96
  all:
  - id: metadata/package/quality/false-positives-runtime::python-runtime-bootstrap-source
  - id: micro-behaviors/communications/http/download/url::archive-url-reference
  - id: micro-behaviors/fs/write/file/direct::js-file-write
