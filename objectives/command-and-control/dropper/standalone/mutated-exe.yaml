defaults:
  attack: T1027
  mbc: E1027
  platforms:
    - windows
  for:
    - pe
traits:
  - id: mutated-exe-dropper-string
    desc: Mutated executable dropper string pattern
    crit: component
    if:
      type: hex
      pattern: 6d 75 74 61 74 65 64 5f 00 2e 65 78 65
      section: .rdata

  - id: mutated-exe-randomizer-string
    desc: 'mutated exe randomizer string'
    crit: component
    if:
      type: hex
      pattern: 30 30 30 31 30 32 30 33 30 34
      section: .rdata

composite_rules:
  - id: mutated-exe-dropper
    desc: Dropper uses hardcoded mutated_*.exe filename
    crit: hostile
    conf: 1.0
    all:
      - id: mutated-exe-dropper-string
      - id: mutated-exe-randomizer-string
      - id: micro-behaviors/process/create/spawn::create-process-a
