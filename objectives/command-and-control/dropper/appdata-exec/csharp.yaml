defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1105"
traits:
  - id: csharp-appdata-writeallbytes
    desc: C# writes payload under AppData
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "File.WriteAllBytes(Environment.GetFolderPath(Environment.SpecialFolder.ApplicationData)"
  - id: csharp-appdata-process-start
    desc: C# starts payload from AppData
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "Process.Start(Environment.GetFolderPath(Environment.SpecialFolder.ApplicationData)"
  - id: csharp-self-copy-appdata
    desc: C# self-copy into AppData
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "File.Copy(fileName1, environmentVariable"
  - id: csharp-current-mainmodule
    desc: C# current MainModule path
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "Process.GetCurrentProcess().MainModule.FileName"
composite_rules:
  - id: csharp-appdata-drop-execute
    desc: C# AppData drop and execute
    crit: hostile
    conf: 0.97
    all:
      - id: csharp-appdata-writeallbytes
      - id: csharp-appdata-process-start
    any:
      - id: csharp-self-copy-appdata
      - id: csharp-current-mainmodule
      - id: objectives/persistence/login/registry/run-key::csharp-run-key-persistence
