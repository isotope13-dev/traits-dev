defaults:
  platforms: [unix, windows]
composite_rules:
  - id: probabilistic-loader-loop
    desc: Probabilistic loader loop pattern
    crit: suspicious
    any:
      - id: objectives/anti-static/obfuscation/control-flow/retry::retry-loop
      - id: objectives/anti-static/obfuscation/control-flow/retry::retry-loop-with-success
  - id: probabilistic-js
    desc: Dropper using probabilistic code generation (random + retry loop)
    crit: hostile
    conf: 4.0
    attack: T1027
    mbc: B0032
    for: [javascript, typescript]
    scope: leaf
    near_lines: 20
    unless:
      - id: metadata/library/structure::js-webpack-bundle
    all:
      - id: objectives/command-and-control/dropper/obfuscated::probabilistic-loader-loop
    any:
      - id: micro-behaviors/os/random/prng/stdlib::math-random-index
      - id: micro-behaviors/data/encode/hex_xor
    downgrade:
      any:
        - id: metadata/library/prettier
