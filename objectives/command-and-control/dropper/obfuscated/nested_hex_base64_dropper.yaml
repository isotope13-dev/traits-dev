defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
  - id: nested-hex-base64-dropper
    desc: Mixed encoded payload dropper and executor
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/decode/buffer::mixed-buffer-encodings
      - id: objectives/anti-static/obfuscation/payload/encoded::large-hex-string-dup
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
      - id: micro-behaviors/process/create/shell/bridge::js-exec
    near_lines: 80
  - id: nested-hex-base64-loader-chain
    desc: Nested hex/base64 decode chain that writes and executes stage
    crit: hostile
    conf: 0.97
    attack: T1027
    mbc: B0032
    all:
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-to-utf8
      - id: micro-behaviors/data/decode/base64::buffer-from-base64-to-utf8
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
      - id: micro-behaviors/process/create/shell/bridge::js-exec
    near_lines: 80
