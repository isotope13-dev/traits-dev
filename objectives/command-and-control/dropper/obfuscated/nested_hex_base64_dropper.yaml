defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
  - id: nested-hex-base64-dropper
    desc: Mixed encoded payload dropper and executor
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::js-mixed-encoding-usage
      - id: objectives/anti-static/obfuscation/payload::large-hex-string-dup
      - id: objectives/command-and-control/dropper::write-file-sync-dup
      - id: micro-behaviors/process/create/shell/lang::js-exec
  - id: nested-hex-base64-loader-chain
    desc: Nested hex/base64 decode chain that writes and executes stage
    crit: hostile
    conf: 0.97
    attack: T1027
    mbc: B0032
    all:
      - id: micro-behaviors/data/decode/hex::buffer-from-hex-to-utf8
      - id: micro-behaviors/data/decode/hex::buffer-from-base64-to-utf8
      - id: objectives/command-and-control/dropper::write-file-sync-dup
      - id: micro-behaviors/process/create/shell/lang::js-exec
