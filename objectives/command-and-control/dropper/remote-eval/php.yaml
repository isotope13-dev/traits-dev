# PHP remote-eval stager patterns
# Detects fetch-and-eval chains where PHP executes code from remote URLs.
# ATT&CK: T1105 (Ingress Tool Transfer), T1059.006 (PHP)
# MBC: B0024 (Download), E1059 (Command and Scripting Interpreter)
defaults:
  for: [php]
traits:
  - id: eval-file-get-contents-url
    desc: eval() executes remote URL content
    crit: suspicious
    conf: 0.97
    attack: "T1105"
    mbc: "E1059"
    if:
      type: raw
      regex: '(?i)eval\s+\([^)]{0,80}file_get_contents\s+\(\s+["'']https?://'
  - id: eval-file-get-contents-php-url
    desc: eval() fetches remote PHP payload
    crit: suspicious
    conf: 0.98
    attack: "T1105"
    mbc: "E1059"
    if:
      type: raw
      regex: '(?i)eval\s+\([^)]{0,80}file_get_contents\s+\([^)]{0,160}\.php'
composite_rules:
  - id: php-remote-eval-stager
    desc: PHP stager fetches and evals remote script
    crit: hostile
    conf: 0.99
    attack: "T1105"
    mbc: "B0024"
    all:
      - id: eval-file-get-contents-url
    any:
      - id: eval-file-get-contents-php-url
