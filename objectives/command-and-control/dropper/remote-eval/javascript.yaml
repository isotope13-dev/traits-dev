# JavaScript/WSH remote-eval dropper patterns
# Focused on ActiveX XMLHTTP response execution in-memory.
defaults:
  attack: T1105
  mbc: B0024
  for: [javascript]
  platforms: [windows]
traits:
  - id: eval-response-text
    desc: eval() on XMLHTTP responseText
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'eval\s*\(\s*[a-zA-Z_$][\w$]*\.responseText'
composite_rules:
  - id: activex-xmlhttp-remote-eval
    desc: ActiveX XMLHTTP remote response eval
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/interpreter/jscript::activex-object
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: micro-behaviors/communications/http/client::response-text
      - id: eval-response-text
    any:
      - id: micro-behaviors/communications/http/client::js-xmlhttp-open
      - id: micro-behaviors/communications/http/client::js-xmlhttp-open-obfuscated-method
      - id: micro-behaviors/communications/http/client::js-xmlhttp-send
  - id: activex-xmlhttp-marker-remote-eval
    desc: ActiveX XMLHTTP marker-rewritten remote eval
    crit: hostile
    conf: 0.99
    all:
      - id: activex-xmlhttp-remote-eval
      - id: objectives/anti-static/obfuscation/string-conceal/split-join::js-response-split-join-marker
      - id: objectives/anti-static/obfuscation/string-conceal/split-join::js-join-substring-char
  - id: wscript-xmlhttp-download-eval
    desc: WScript XMLHTTP download and eval execution
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/execution/interpreter/script/wsh::wscript-createobject
      - id: micro-behaviors/communications/http/client::response-text
    any:
      - id: objectives/execution/interpreter/eval/dynamic::eval-call-js
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
    none:
      - id: metadata/library/jquery::domain
