defaults:
  platforms: [unix, windows, macos]
  crit: suspicious
  attack: T1105
  mbc: B0030
  for:
    - shell
traits:
  - id: download-execute-dup
    desc: Downloads and executes remote script
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: raw
      regex: (curl|wget)\s+[^|]{0,50}\|\s*sh
  - id: download-execute-dup-quiet
    desc: Silent download and execute
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: raw
      regex: (curl\s+-[so]|wget\s+-[qO])\s+[^|]{0,50}\|\s*sh
  - id: download-save-execute
    desc: Downloads, saves, and executes
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: (curl\s+-o|wget\s+-O)\s+\S+[^&]{0,50}&&[^&]{0,30}chmod\s+\+x
  - id: download-url-hardcoded
    desc: Hardcoded download URL
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: (curl|wget)\s+[^\n]{0,50}https?://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+
    unless:
      - type: raw
        regex: 127\.0\.0\.1|0\.0\.0\.0
  - id: md5-verification
    desc: MD5 checksum verification
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: md5sum\s+\S+\s*\|\s*awk
  - id: payload-checksum-compare
    desc: Payload integrity verification
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: \$MD5[^=]{0,20}=[^$]{0,20}\$sum|\$sum[^=]{0,20}=[^$]{0,20}\$MD5|checkExists
  - id: loader-selection-command-test
    desc: Checks command -v for curl or wget
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: command\s+-v\s+(curl|wget)
  - id: loader-selection-env-var
    desc: LDR/WGET/DL env var for curl/wget
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: \b(LDR|WGET|DL)\s*=\s*(curl|wget)
  - id: eval-curl-subshell
    desc: eval "$(curl ..."
    crit: suspicious
    conf: 0.7
    attack: T1059.004
      - '*'
    if:
      type: raw
      regex: eval\s*"\$\(curl
  - id: eval-curl-backtick
    desc: eval `curl ...`
    crit: suspicious
    conf: 0.7
    attack: T1059.004
      - '*'
    if:
      type: raw
      regex: eval\s*`curl
  - id: eval-wget-subshell
    desc: eval "$(wget ..."
    crit: suspicious
    conf: 0.7
    attack: T1059.004
      - '*'
    if:
      type: raw
      regex: eval\s*"\$\(wget
  - id: eval-wget-backtick
    desc: eval `wget ...`
    crit: suspicious
    conf: 0.7
    attack: T1059.004
      - '*'
    if:
      type: raw
      regex: eval\s*`wget
  - id: eval-openssl-subshell
    desc: eval "$(openssl ..." (decrypt and execute payload)
    crit: suspicious
    conf: 0.8
    attack: T1059.004
      - '*'
    if:
      type: raw
      regex: eval\s*"\$\(openssl
  - id: shell-curl-process-sub
    desc: shell <(curl ...)
    crit: suspicious
    conf: 0.7
    attack: T1059.004
      - '*'
    if:
      type: raw
      regex: shell\s+<\(curl
  - id: sh-curl-process-sub
    desc: sh <(curl ...) process substitution
    crit: suspicious
    conf: 0.7
    attack: T1059.004
      - '*'
    if:
      type: raw
      regex: sh\s+<\(curl
  - id: source-curl-process-sub
    desc: source <(curl ...)
    crit: suspicious
    conf: 0.7
    attack: T1059.004
      - '*'
    if:
      type: raw
      regex: source\s+<\(curl
  - id: source-wget-process-sub
    desc: source <(wget ...)
    crit: suspicious
    conf: 0.7
    attack: T1059.004
      - '*'
    if:
      type: raw
      regex: source\s+<\(wget
composite_rules:
  - id: loader-selection
    desc: Selects curl or wget dynamically
    crit: suspicious
    conf: 0.85
    any:
      - id: loader-selection-command-test
      - id: loader-selection-env-var
  - id: verified-dropper
    desc: Verified payload dropper
    crit: hostile
    conf: 0.95
    attack: T1105
    all:
      - id: loader-selection
      - id: download-url-hardcoded
      - id: payload-checksum-compare
      - id: download-save-execute
  - id: simple-dropper
    desc: Simple download-execute dropper
    crit: suspicious
    conf: 0.9
    attack: T1105
    all:
      - id: objectives/command-and-control/dropper/remote-eval::download-execute-dup
      - id: download-url-hardcoded
  - id: fetch-eval
    desc: Remote script fetch and eval
    crit: suspicious
    conf: 0.9
    attack: T1059.004
    any:
      - id: eval-curl-subshell
      - id: eval-curl-backtick
      - id: eval-wget-subshell
      - id: eval-wget-backtick
      - id: eval-openssl-subshell
  - id: process-substitution
    desc: Process substitution for remote execution
    crit: suspicious
    conf: 0.85
    attack: T1059.004
    any:
      - id: shell-curl-process-sub
      - id: sh-curl-process-sub
      - id: source-curl-process-sub
      - id: source-wget-process-sub
