# .NET Steganography Loader
# Detects the pattern of extracting payload bytes from image pixels and loading
# them as a .NET assembly via reflection. Common in .NET stego droppers.
#
# Kill chain:
#   1. Access embedded bitmap resource (ResourceManager + System.Drawing.Bitmap)
#   2. Extract bytes from pixels (GetPixel / LockBits)
#   3. Load extracted bytes as assembly (Assembly.Load + GetTypes + Invoke)
defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: acquire-image-bytes
    desc: AcquireImageBytes method (stego extraction)
    crit: suspicious
    conf: 0.95
    attack: "T1027.003"
    if:
      type: string
      substr: "AcquireImageBytes"
  - id: system-drawing-bitmap
    desc: System.Drawing.Bitmap class reference
    crit: component
    conf: 0.6
    if:
      type: string
      substr: "System.Drawing.Bitmap"
composite_rules:
  # Pixel access + reflection assembly loading = steganography payload extraction
  - id: dotnet-stego-loader
    desc: ".NET steganography payload loader"
    crit: hostile
    conf: 0.95
    attack: "T1027.003"
    mbc: "E1027.m02"
    all:
      - id: micro-behaviors/data/image/pixel::pixel-access
    any:
      - id: objectives/execution/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/execution/reflection/class::dotnet-reflection
  # AcquireImageBytes is a distinctive indicator even without the full chain
  - id: dotnet-stego-acquire
    desc: ".NET steganography byte extraction"
    crit: suspicious
    conf: 0.92
    attack: "T1027.003"
    all:
      - id: acquire-image-bytes
    any:
      - id: micro-behaviors/data/image/pixel::pixel-access-getpixel
      - id: system-drawing-bitmap
