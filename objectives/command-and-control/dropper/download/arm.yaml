# ARM ELF HTTP payload retrieval
# ATT&CK: T1105 (Ingress Tool Transfer)
defaults:
  platforms: [linux, android]
  for: [elf]
  arch: [arm]
  attack: T1105
  mbc: B0032

composite_rules:
  - id: arm-raw-syscall-http-downloader
    desc: Tiny ARM ELF uses raw socket syscalls to retrieve a binary over HTTP
    crit: hostile
    conf: 0.99
    size_max: 51200
    all:
      - id: micro-behaviors/communications/http/get::binary-get-path
      - id: metadata/binary/metrics/structural::small-elf-binary
      - id: metadata/binary/linking/static::elf-needed-libs-zero
    any:
      - id: micro-behaviors/communications/socket/syscall::arm-direct-network-syscalls
      - id: micro-behaviors/communications/socket/syscall::arm-oabi-direct-network-syscalls
      - id: micro-behaviors/communications/socket/syscall::arm-literal-pool-network-syscalls
    unless:
      - id: well-known/tool/sysadmin/unix-benign/
