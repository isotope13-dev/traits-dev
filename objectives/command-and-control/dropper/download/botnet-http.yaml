defaults:
  platforms: [linux]
  for: [elf]
  attack: T1105
  mbc: C0002

traits:
  - id: botnet-http-download-path
    desc: Botnet HTTP download path
    crit: component
    conf: 0.95
    size_max: 8192
    if:
      type: text
      regex: 'GET\s+/[A-Za-z0-9._/-]{0,80}Botnet/[A-Za-z0-9._/-]{1,80}\s+HTTP/1\.[01]'
      case_insensitive: true

composite_rules:
  - id: tiny-botnet-http-downloader
    desc: Tiny ELF botnet HTTP downloader
    crit: hostile
    conf: 0.97
    size_max: 8192
    all:
      - id: botnet-http-download-path
      - id: micro-behaviors/communications/http/get::get
      - id: objectives/command-and-control/botnet/keywords::botnet-term
      - id: metadata/binary/metrics/structural::small-elf-binary
    any:
      - id: metadata/binary/linking/static::elf-needed-libs-zero
      - id: metadata/hardening/missing::stripped-binary
