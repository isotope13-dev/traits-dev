defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: winhttp-temp-dropper
    desc: Downloader fetches payload via WinHTTP and writes to temp directory
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
      - id: micro-behaviors/fs/temp/directory::get-temp-file-name
      - id: micro-behaviors/fs/file/write/direct::write-file
    any:
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/installer/family::known-benign-installer
        - id: well-known/tool/sysadmin/disk-utility::winhex-xways
  - id: winhttp-temp-powershell-loader
    desc: WinHTTP temp dropper launches PowerShell loader
    crit: hostile
    conf: 0.96
    all:
      - id: winhttp-temp-dropper
      - id: objectives/evasion/security-bypass/policy/execution::bypass-execution-policy
      - id: micro-behaviors/process/create/spawn::create-process-w
    any:
      - id: objectives/command-and-control/dropper/staging/archive::winhttp-zip-temp-execute
      - id: objectives/execution/interpreter/script/wsh::expand-archive-present
      - id: objectives/command-and-control/beacon/network/http::direct-http-c2-binary-ip
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/installer/family::known-benign-installer
