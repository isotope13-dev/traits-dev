defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: xor-winhttp-rundll32-download-exec
    desc: XOR-obfuscated WinHTTP payload download launched through rundll32
    crit: hostile
    conf: 0.99
    attack: T1105,T1218.011
    mbc: B0024
    all:
      - id: micro-behaviors/communications/http/client/winhttp::xor-decoded-winhttp-request-flow
      - id: micro-behaviors/communications/http/url/domain::xor-decoded-http-url
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-createprocess-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-rundll32-host
    any:
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-virtual-alloc-api
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/installer/family/

  - id: xor-winhttp-memory-stage-dropper
    desc: XOR-obfuscated WinHTTP stage allocates memory and creates a process
    crit: hostile
    conf: 0.98
    attack: T1105,T1055,T1027.002
    mbc: B0023
    for: [pe, dll]
    all:
      - id: micro-behaviors/communications/http/client/winhttp::xor-decoded-winhttp-request-flow
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-createprocess-api
      - id: objectives/anti-static/obfuscation/decoders::xor-decoded-virtual-alloc-api
      - id: micro-behaviors/fs/file/delete::delete-win
  - id: winhttp-temp-dropper
    desc: Downloader fetches payload via WinHTTP and writes to temp directory
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
      - id: micro-behaviors/fs/temp/directory::get-temp-file-name
      - id: micro-behaviors/fs/file/write/direct::write-file
    any:
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/installer/family/
        - id: well-known/tool/sysadmin/disk-utility::winhex-xways
  - id: winhttp-temp-powershell-loader
    desc: WinHTTP temp dropper launches PowerShell loader
    crit: hostile
    conf: 0.96
    all:
      - id: winhttp-temp-dropper
      - id: objectives/evasion/security-bypass/policy/execution::bypass-execution-policy
      - id: micro-behaviors/process/create/spawn::create-process-w
    any:
      - id: objectives/command-and-control/dropper/staging/archive::winhttp-zip-temp-execute
      - id: micro-behaviors/data/archive/extract/zip::powershell-expand-archive
      - id: objectives/command-and-control/beacon/network/http::direct-http-c2-binary-ip
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/installer/family/
