defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: winhttp-temp-dropper
    desc: Downloader fetches payload via WinHTTP and writes to temp directory
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
      - id: micro-behaviors/fs/temp/directory::get-temp-file-name
      - id: micro-behaviors/fs/file/write/direct::write-file
    any:
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/installer/family::known-benign-installer
