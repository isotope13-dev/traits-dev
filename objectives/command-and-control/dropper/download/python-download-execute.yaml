defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1105
  mbc: E1105
traits:
  - id: powershell-encoded-command-in-string
    desc: PowerShell encoded command in Python string
    crit: suspicious
    conf: 0.95
    attack: T1027
    if:
      type: text
      regex: '(?i)\bpowershell\b.{0,120}\s-e(nc(oded(command)?)?)?\s+[A-Za-z0-9+/=]{20,}'
  - id: encoded-powershell-iwr-utf16le
    desc: UTF16LE encoded Invoke-WebRequest
    crit: component
    conf: 0.95
    attack: T1027
    if:
      type: text
      substr: AEkAbgB2AG8AawBlAC0AVwBlAGIAUgBlAHEAdQBlAHMAdA
  - id: encoded-powershell-outfile-utf16le
    desc: UTF16LE encoded OutFile write
    crit: component
    conf: 0.92
    if:
      type: text
      substr: AE8AdQB0AEYAaQBsAGU
  - id: encoded-powershell-iex-utf16le
    desc: UTF16LE encoded Invoke-Expression
    crit: component
    conf: 0.95
    attack: T1059.001
    if:
      type: text
      substr: AEkAbgB2AG8AawBlAC0ARQB4
  - id: encoded-powershell-expand-archive-utf16le
    desc: UTF16LE encoded Expand-Archive
    crit: component
    conf: 0.92
    attack: T1140
    if:
      type: text
      substr: AEUAeABwAGEAbgBkAC0AQQByAGMAaABpAHYAZQ
  - id: encoded-powershell-javaw-utf16le
    desc: UTF16LE encoded javaw execution
    crit: component
    conf: 0.9
    attack: T1059
    if:
      type: text
      substr: agBhAHYAYQB3AC4AZQB4AGUA
  - id: decoded-powershell-invoke-webrequest-outfile
    desc: Decoded PowerShell downloads to file
    crit: component
    conf: 0.95
    if:
      type: encoded
      regex: '(?i)Invoke-WebRequest.{0,160}-OutFile'
  - id: decoded-powershell-github-raw
    desc: Decoded PowerShell GitHub raw URL
    crit: component
    conf: 0.94
    if:
      type: encoded
      regex: 'github\.com/.{1,180}/raw/'
  - id: decoded-powershell-javaw-jar
    desc: Decoded PowerShell launches javaw jar
    crit: component
    conf: 0.94
    if:
      type: encoded
      regex: '(?is)\$javaw\b.{0,320}-jar'
  - id: powershell-variable-assignment
    desc: Python variable assigned PowerShell command
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b[A-Za-z_]\w*\s*=\s*["''][^"''\r\n]{0,80}\bpowershell\b'
  - id: powershell-long-encoded-jab-token
    desc: Long encoded PowerShell token
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\s-e(nc(oded(command)?)?)?\s+JAB[A-Za-z0-9+/=]{400,}'
  - id: github-raw-exe-url
    desc: GitHub raw executable URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'github\.com/.{1,120}/raw/.{1,160}\.exe\b'
  - id: raw-githubusercontent-exe-url
    desc: raw.githubusercontent executable URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'raw\.githubusercontent\.com/[^\s''"{}]{1,220}\.exe\b'
  - id: powershell-expand-archive
    desc: PowerShell archive extraction in string
    crit: suspicious
    conf: 0.9
    attack: T1140
    if:
      type: string_literal
      substr: Expand-Archive
    unless:
      - type: text
        substr: "Generated by EPL Desktop Project Generator"
      - id: well-known/app/telegram::telegram-desktop-build-prepare-script
composite_rules:
  - id: python-url-shortener-download-exec
    desc: Downloads from URL shortener and executes payload
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/url/shortener::tinyurl
    any:
      - id: micro-behaviors/process/create/subprocess::run-content
      - id: micro-behaviors/process/create/subprocess::call
  - id: python-powershell-irm-iex
    desc: Python launches remote PowerShell content
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/script-host::powershell-irm-iex-command-string
      - id: micro-behaviors/process/create/subprocess::popen-content
  - id: hidden-powershell-policy-bypass-installer
    desc: Hidden PowerShell installer bypasses policy
    crit: suspicious
    conf: 0.96
    near_bytes: 256
    all:
      - id: micro-behaviors/process/create/flags::powershell-hidden-window-flag
      - id: micro-behaviors/process/create/flags::powershell-hidden-window-value
      - id: micro-behaviors/process/create/flags::powershell-policy-bypass-flag
      - id: micro-behaviors/process/create/flags::powershell-policy-bypass-value
  - id: python-hidden-remote-powershell-installer
    desc: Python hides remote PowerShell installer
    crit: hostile
    conf: 0.96
    attack: "T1105, T1059.001, T1562.001"
    all:
      - id: micro-behaviors/process/create/shell/script-host::powershell-irm-iex-command-string
      - id: hidden-powershell-policy-bypass-installer
  - id: python-download-tempfile-exec
    desc: Downloads code to temp file and executes it
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/fs/write/file/direct::python-tempfile
    any:
      - id: micro-behaviors/process/create/subprocess::run-content
      - id: micro-behaviors/process/create/subprocess::call
  - id: python-github-exe-download-exec
    desc: Python downloads GitHub EXE and runs it
    crit: hostile
    conf: 0.98
    all:
      - id: github-raw-exe-url
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlretrieve-dup
    any:
      - id: micro-behaviors/process/create/subprocess::run-content
      - id: micro-behaviors/process/create/subprocess::popen-content
  - id: python-raw-githubusercontent-exe-download-exec
    desc: Python downloads raw GitHub EXE and runs it
    crit: hostile
    conf: 0.98
    all:
      - id: raw-githubusercontent-exe-url
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlretrieve-dup
    any:
      - id: micro-behaviors/process/create/subprocess::run-content
      - id: micro-behaviors/process/create/subprocess::popen-content
  - id: pypi-encoded-powershell-download-exec
    desc: PyPI encoded PowerShell download-execute
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/build/pip::root-setup-py
      - id: powershell-encoded-command-in-string
      - id: encoded-powershell-download-exec
      - id: micro-behaviors/process/create/subprocess::popen-content
  - id: encoded-powershell-download-exec
    desc: Encoded PowerShell download-execute chain
    crit: suspicious
    conf: 0.96
    attack: T1059.001
    all:
      - id: encoded-powershell-iwr-utf16le
      - id: encoded-powershell-outfile-utf16le
      - id: encoded-powershell-iex-utf16le
  - id: powershell-long-encoded-variable
    desc: Python variable stores encoded PowerShell
    crit: suspicious
    conf: 0.95
    all:
      - id: powershell-variable-assignment
      - id: powershell-long-encoded-jab-token
    near_lines: 1
  - id: hidden-encoded-powershell-archive-loader
    desc: Hidden encoded PowerShell archive loader
    crit: hostile
    conf: 0.98
    all:
      - id: powershell-encoded-command-in-string
      - id: encoded-powershell-expand-archive-utf16le
      - id: micro-behaviors/process/daemonize/spawn::powershell-hidden
    any:
      - id: micro-behaviors/process/create/system::python-os-system
      - id: micro-behaviors/process/create/subprocess::process-execution
  - id: hidden-encoded-powershell-execution
    desc: Hidden encoded PowerShell execution
    crit: hostile
    conf: 0.98
    all:
      - id: powershell-encoded-command-in-string
      - id: micro-behaviors/process/daemonize/spawn::powershell-hidden
    any:
      - id: micro-behaviors/process/create/system::python-os-system
      - id: micro-behaviors/process/create/subprocess::process-execution
  - id: hidden-encoded-powershell-variable-loader
    desc: Python launches hidden encoded PowerShell variable
    crit: hostile
    conf: 0.98
    all:
      - id: powershell-long-encoded-variable
      - id: micro-behaviors/process/create/shell/lang::powershell-command-fstring
      - id: micro-behaviors/process/daemonize/spawn::powershell-hidden
    any:
      - id: micro-behaviors/process/create/system::python-os-system
      - id: micro-behaviors/process/create/subprocess::process-execution
  - id: decoded-powershell-github-jar-loader
    desc: Encoded PowerShell stages GitHub jar payload
    crit: hostile
    conf: 0.98
    all:
      - id: decoded-powershell-invoke-webrequest-outfile
      - id: decoded-powershell-github-raw
    any:
      - id: decoded-powershell-javaw-jar
      - id: encoded-powershell-javaw-utf16le
      - id: encoded-powershell-expand-archive-utf16le
      - id: powershell-expand-archive
