defaults:
  platforms: [windows, linux, unix, android, macos, ios]
  for: [binaries]
composite_rules:
  - id: go-evasive-loader
    desc: "Go loader with sandbox evasion, self-mutation, and process injection"
    crit: hostile
    all:
      - id: objectives/anti-static/obfuscation/junk-insertion::go-mutateself-func
      - id: objectives/anti-analysis/sandbox-evasion/environment::go-issandbox-func
      - id: objectives/evasion/process/injection/runtime::suspend-thread
