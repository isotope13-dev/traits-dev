defaults:
  platforms:
  - windows
  for: [scripts, binaries]
traits:
- id: sideloading-host-bugreport
  desc: "Common side-loading host binary"
  crit: suspicious
  conf: 0.8
  for: [pe]
  if:
    type: path
    basename: true
    exact: BugReport.exe
- id: sideload-target-cisco-spark-launcher
  desc: CiscoSparkLauncher.dll sideloading target
  crit: component
  conf: 0.95
  for:
  - pe
  if:
    type: text
    exact: CiscoSparkLauncher.dll
- id: sideload-target-cisco-spark-launcher-wide
  desc: CiscoSparkLauncher.dll wide-string reference
  crit: component
  conf: 0.95
  for:
  - pe
  if:
    type: text
    exact: \CiscoSparkLauncher
- id: sideload-entry-spark-entry-point
  desc: 'SparkEntryPoint export'
  crit: component
  conf: 0.95
  for:
  - pe
  - dll
  if:
    type: text
    exact: SparkEntryPoint
- id: adjacent-shell-dll-reference
  desc: "adjacent _shell.dll sideload target"
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: \w+_shell\.dll
- id: sideload-target-chakra
  desc: Chakra.dll sideloading target
  crit: component
  conf: 0.85
  for:
  - pe
  if:
    type: text
    substr: Chakra.dll
- id: sideload-target-jscript9
  desc: jscript9.dll sideloading target
  crit: component
  conf: 0.85
  for:
  - pe
  if:
    type: text
    substr: jscript9.dll
- id: sideload-target-xpsservices
  desc: XpsServices.dll sideloading target
  crit: component
  conf: 0.85
  for:
  - pe
  if:
    type: text
    substr: XpsServices.dll
- id: sideload-target-mscorsvc
  desc: mscorsvc.dll CLR sideloading target
  crit: component
  conf: 0.85
  for:
  - pe
  if:
    type: text
    substr: mscorsvc.dll
- id: sideload-target-cryptbase
  desc: cryptbase.dll sideloading target
  crit: component
  conf: 0.85
  for:
  - pe
  if:
    type: text
    substr: cryptbase.dll
- id: sideload-target-sppc
  desc: sppc.dll sideloading target
  crit: component
  conf: 0.85
  for:
  - pe
  if:
    type: text
    substr: sppc.dll
- id: sideload-target-osppc
  desc: Office osppc.dll sideloading target
  crit: component
  conf: 0.9
  for:
  - pe
  if:
    type: text
    exact: osppc.dll
- id: sideload-target-osppcext
  desc: Office osppcext.dll sideloading target
  crit: component
  conf: 0.9
  for:
  - pe
  if:
    type: text
    exact: osppcext.dll
- id: office-licensing-datacontract
  desc: Office licensing service contract
  crit: component
  conf: 0.92
  for:
  - pe
  if:
    type: text
    exact: http://schemas.datacontract.org/2004/07/Microsoft.Office.LicensingService.Common
- id: sideload-target-7z-runtime
  desc: 7z.dll sideloading target
  crit: component
  conf: 0.92
  for:
  - pe
  if:
    type: text
    substr: 7z.dll
- id: sideload-target-mapi32
  desc: Mapi32.dll sideloading target
  crit: component
  conf: 0.88
  for:
  - pe
  if:
    type: text
    exact: Mapi32.dll
- id: sideload-target-version
  desc: version.dll sideloading target
  crit: component
  conf: 0.9
  for:
  - pe
  if:
    type: text
    exact: version.dll
- id: hoststorageservice-original-filename
  desc: HostStorageService original filename
  crit: component
  conf: 0.98
  for:
  - pe
  if:
    type: value
    path: pe.version.original_filename
    exact: HostStorageService.exe
- id: hoststorageservice-broadcom-company
  desc: Broadcom HostStorage company field
  crit: component
  conf: 0.98
  for:
  - pe
  if:
    type: value
    path: pe.version.company
    exact: Broadcom Corporation
- id: hoststorageservice-pdb
  desc: HostStorageService PDB path
  crit: component
  conf: 0.96
  for:
  - pe
  if:
    type: value
    path: pe.debug.pdb.path
    regex: '(?i)(^|[\\/])HostStorageService\.pdb$'
- id: hoststorageservice-cvusrifc-ref
  desc: CVUsrIfc sideload target reference
  crit: component
  conf: 0.98
  for:
  - pe
  if:
    type: text
    exact: CVUsrIfc.dll
- id: hoststorageservice-service-name
  desc: Credential Vault Host Storage name
  crit: component
  conf: 0.96
  for:
  - pe
  if:
    type: text
    exact: Credential Vault Host Storage
- id: version-proxy-path-format
  desc: Formatted version.dll proxy path
  crit: component
  conf: 0.96
  for:
  - pe
  if:
    type: text
    exact: '%s\version.dll'
- id: 7zip-gui-host-filename
  desc: 7-Zip GUI original filename
  crit: component
  conf: 0.94
  for:
  - pe
  if:
    type: text
    exact: 7zg.exe
    section: .rsrc
- id: 7zip-gui-host-description
  desc: 7-Zip GUI description string
  crit: component
  conf: 0.9
  for:
  - pe
  if:
    type: text
    substr: 7-Zip GUI
    section: .rsrc
- id: sideload-export-corinitsvclgr
  desc: CorInitSvcLogger export (CLR sideload)
  crit: suspicious
  conf: 0.9
  attack: T1574.002
  for:
  - dll
  if:
    type: symbol
    exact: CorInitSvcLogger

- id: office-appv-sideload-filename
  desc: Filename matches AppV sideload DLL
  crit: component
  conf: 0.95
  for: [pe]
  if:
    type: path
    basename: true
    regex: (?i)^AppvIsvSubsystems(32|64)\.dll$

- id: office-click2run-appv-sideload-filename
  desc: Filename matches Click-to-Run Appv DLL
  crit: component
  conf: 0.9
  for: [pe]
  if:
    type: path
    basename: true
    regex: (?i)^Appv(IsvSubsystems(32|64)|Client)\.dll$

- id: office-click2run-c2r-sideload-filename
  desc: Filename matches Click-to-Run C2R DLL
  crit: component
  conf: 0.9
  for: [pe]
  if:
    type: path
    basename: true
    regex: (?i)^C2R(32|64)\.dll$

- id: office-click2run-msochina-sideload-filename
  desc: Filename matches Click-to-Run MsoChina DLL
  crit: component
  conf: 0.9
  for: [pe]
  if:
    type: path
    basename: true
    exact: MsoChina.dll
    case_insensitive: true

- id: office-click2run-msowin32client-sideload-filename
  desc: "file matches Click-to-Run Mso win32client DLL"
  crit: component
  conf: 0.9
  for: [pe]
  if:
    type: path
    basename: true
    regex: (?i)^mso(20|30|40(ui)?|99L)win32client\.dll$

- id: office-click2run-mso-sideload-ref
  desc: Office Click-to-Run Mso DLL reference
  crit: component
  conf: 0.93
  for: [pe]
  if:
    type: text
    regex: (?i)mso(20|30|40(ui)?|99L)win32client\.dll

- id: office-click2run-mso-core-dll-ref
  desc: Office Click-to-Run MSO.dll reference
  crit: component
  conf: 0.92
  for: [pe]
  if:
    type: text
    exact: MSO.dll

- id: office-namecontrolserver-contact-retriever
  desc: "Office NameControlServer contact retriever"
  crit: component
  conf: 0.97
  for: [pe]
  if:
    type: text
    exact: Microsoft Office Contact Retriever

- id: office-namecontrolserver-com-progid
  desc: Office NameControlServer COM ProgID
  crit: component
  conf: 0.96
  for: [pe]
  if:
    type: text
    substr: NameControlServer.NameCtrl

- id: adobe-notificationservice-overlay-ref
  desc: Adobe notification service overlay marker
  crit: component
  conf: 0.95
  for: [pe]
  if:
    type: text
    exact: com.adobe.NotificationService

- id: office-protocolhandler-exe-ref
  desc: Office ProtocolHandler executable reference
  crit: component
  conf: 0.95
  for: [pe]
  if:
    type: text
    exact: ProtocolHandler.exe

- id: office-appv-sideload-dll-ref
  desc: Office AppV sideload DLL reference
  crit: notable
  conf: 0.97
  for: [pe]
  if:
    type: text
    exact: AppVIsvSubsystems32.dll

- id: office-click2run-c2r-section
  desc: Office Click-to-Run section name
  crit: component
  conf: 0.92
  for: [pe]
  if:
    type: section
    exact: .c2r

- id: hashed-export-name
  desc: DLL export name is hex hash
  crit: suspicious
  conf: 0.92
  for: [pe]
  if:
    type: symbol
    regex: ^x[0-9a-f]{8}$

- id: office-decoy-vpreview
  desc: Office preview host decoy (vpreview.exe)
  crit: component
  conf: 0.9
  if:
    type: text
    exact: vpreview.exe
- id: office-decoy-icons
  desc: Office icons host decoy (icons.exe)
  crit: component
  conf: 0.9
  if:
    type: text
    exact: icons.exe
- id: office-orgchart-config-dat
  desc: Office OrgChart configuration file reference
  crit: component
  conf: 0.95
  if:
    type: text
    regex: (?i)OrgChart(Pref|Clip)\.dat
- id: office-orgchart-intl-dll
  desc: Office OrgChart international DLL reference
  crit: component
  conf: 0.95
  if:
    type: text
    exact: orgcintl.dll
- id: office-orgchart-pdb-path
  desc: Office OrgChart PDB path marker
  crit: component
  conf: 0.99
  for: [pe]
  if:
    type: encoded
    regex: 'postc2r.xone.orgchart\.pdb'

- id: office-msosync-pdb-path
  desc: Office MsoSync PDB path marker
  crit: component
  conf: 0.99
  for: [pe]
  if:
    type: encoded
    regex: 'postc2r.xone.msosync\.pdb'

- id: office-vpreview-pdb-path
  desc: Office VPreview PDB path marker
  crit: component
  conf: 0.99
  for: [pe]
  if:
    type: encoded
    regex: 'postc2r.xone.vpreview\.pdb'

- id: office-postc2r-pdb-path
  desc: Office postc2r build-pipeline PDB path
  crit: component
  conf: 0.99
  for: [pe]
  if:
    type: encoded
    regex: 'postc2r.xone.[a-z][a-z0-9_-]{2,32}\.pdb'
- id: office-orgchart-official-binary
  desc: Official Microsoft Office OrgChart binary
  crit: notable
  conf: 0.98
  for: [pe]
  if:
    type: path
    basename: true
    exact: ORGCHART.EXE
    case_insensitive: true

composite_rules:
- id: broadcom-hoststorage-rsrc-sideload-carrier
  desc: Broadcom HostStorage sideload payload carrier
  crit: hostile
  conf: 0.99
  for: [pe]
  all:
  - id: hoststorageservice-original-filename
  - id: hoststorageservice-broadcom-company
  - id: hoststorageservice-cvusrifc-ref
  - id: metadata/signed/trust-level::unsigned
  - id: metadata/binary/resource::executable-rsrc-section
  - id: metadata/binary/resource::oversized-rsrc
  any:
  - id: hoststorageservice-pdb
  - id: hoststorageservice-service-name
- id: office-click2run-sideload-filename
  desc: Filename matches Office Click-to-Run sideload-vulnerable DLL
  crit: component
  conf: 0.9
  any:
  - id: office-click2run-appv-sideload-filename
  - id: office-click2run-c2r-sideload-filename
  - id: office-click2run-msochina-sideload-filename
  - id: office-click2run-msowin32client-sideload-filename

- id: office-click2run-sideload-target
  desc: Office Click-to-Run sideload target present
  crit: suspicious
  conf: 0.92
  any:
  - id: office-click2run-sideload-filename
  - id: office-click2run-mso-sideload-ref
  - id: office-click2run-mso-core-dll-ref

- id: oversized-office-namecontrolserver-sideload-host
  desc: Oversized Office NameControlServer sideload host
  crit: suspicious
  conf: 0.97
  attack: T1574.002
  for: [pe]
  size_min: 200000
  all:
  - id: office-namecontrolserver-contact-retriever
  - id: office-namecontrolserver-com-progid
  - id: office-click2run-mso-core-dll-ref
  - id: office-click2run-c2r-section
  - id: office-appv-sideload-dll-ref
  - id: micro-behaviors/data/embedded/certificate::microsoft-code-signing-pca
  - id: micro-behaviors/data/embedded/certificate::microsoft-timestamp-chain

- id: padded-namecontrolserver-adobe-overlay
  desc: Padded NameControlServer with Adobe overlay
  crit: hostile
  conf: 0.99
  attack: T1574.002
  for: [pe]
  size_min: 1000000
  all:
  - id: oversized-office-namecontrolserver-sideload-host
  - id: adobe-notificationservice-overlay-ref

- id: office-appv-protocolhandler-bundle
  desc: Office ProtocolHandler AppV sideload bundle
  crit: hostile
  conf: 0.98
  attack: T1574.002
  for: [pe]
  all:
  - id: office-protocolhandler-exe-ref
  - id: office-appv-sideload-dll-ref
  - id: office-click2run-c2r-section

- id: minimalist-hostile-dll
  desc: Hostile DLL with minimal imports and high entropy
  crit: suspicious
  conf: 0.8
  all:
  - id: metadata/binary/metrics/structural::few-functions
  - id: objectives/anti-static/pack/entropy::high-entropy-section
  - id: micro-behaviors/dylib/lookup::get-proc-address
  unless:
- id: suspicious-sideloading-host
  desc: Update executable with sparse DLL sideload logic
  crit: suspicious
  conf: 0.8
  all:
  - id: metadata/file/profile/identity::updater-style-pe-basename
  - id: objectives/anti-analysis/vm-detect/instruction::sparse-logic-density
  any:
  - id: adjacent-shell-dll-reference
  - id: sideload-target-chakra
  - id: sideload-target-jscript9
  - id: sideload-target-xpsservices
  - id: sideload-target-mscorsvc
  - id: sideload-target-cryptbase
  - id: sideload-target-sppc
  - id: sideload-target-osppc
  - id: sideload-target-osppcext
  - id: sideload-target-7z-runtime
  - id: sideload-target-mapi32
  - id: sideload-target-version
- id: sideload-target-search
  desc: Probes for DLL sideloading targets
  crit: notable
  conf: 0.88
  attack: T1574.002
  for:
  - pe
  needs: 2
  any:
  - id: sideload-target-chakra
  - id: sideload-target-jscript9
  - id: sideload-target-xpsservices
  - id: sideload-target-mscorsvc
  - id: sideload-target-cryptbase
  - id: sideload-target-sppc
  - id: sideload-target-osppc
  - id: sideload-target-osppcext
  - id: sideload-target-7z-runtime
  - id: sideload-target-mapi32
  - id: sideload-target-version
  unless:
  - id: metadata/file/string/identity::7zip-gui-official-manifest
  - id: metadata/binary/installer/sfx/
  - id: metadata/binary/installer/sfx/
  - id: well-known/tool/sysadmin/sandboxie/
- id: sfx-sideload-process-stager
  desc: SFX sideload stager enumerates processes
  crit: hostile
  conf: 0.96
  attack: T1574.002
  for: [pe]
  all:
  - id: sideload-target-search
  - id: metadata/binary/layout::overlay-over-90pct
  - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
  any:
  - id: objectives/discovery/process/targeting::toolhelp-enumeration-with-access
  - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
  - id: micro-behaviors/os/service/host::service-config-change
  - id: micro-behaviors/os/privilege/token::adjust-token-privileges
  - id: micro-behaviors/os/compat/wow64::wow64-fs-redirect
  needs: 2
  downgrade:
    any:
    - id: metadata/signed/platform/
  unless:
  - id: metadata/binary/installer/sfx/
  - id: metadata/binary/installer/sfx/
- id: office-licensing-sideload-targets
  desc: Office licensing DLL sideload targets
  crit: suspicious
  conf: 0.94
  attack: T1574.002
  for:
  - pe
  all:
  - id: sideload-target-osppc
  - id: sideload-target-osppcext
  - id: office-licensing-datacontract
  any:
  - id: sideload-target-sppc
  - id: office-click2run-sideload-target
  - id: micro-behaviors/os/privilege/token::adjust-token-privileges
  downgrade:
    any:
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: 7zip-gui-sideload-host
  desc: 7-Zip GUI sideload host
  crit: suspicious
  conf: 0.95
  attack: T1574.002
  for:
  - pe
  all:
  - id: 7zip-gui-host-filename
  - id: sideload-target-mapi32
  any:
  - id: sideload-target-7z-runtime
  - id: metadata/binary/installer/sfx::7zip-registry-key
  unless:
  - id: metadata/file/string/identity::7zip-gui-official-manifest
  - id: metadata/signed/platform/

- id: 7zip-resource-sideload-carrier
  desc: 7-Zip host with hidden resource payload
  crit: suspicious
  conf: 0.97
  attack: T1574.002
  for:
  - pe
  all:
  - id: 7zip-gui-host-filename
  - id: sideload-target-mapi32
  - id: metadata/binary/resource::oversized-rsrc
  - id: metadata/binary/resource::executable-rsrc-section
  - id: metadata/binary/metrics/structural::four-section-pe
  any:
  - id: sideload-target-7z-runtime
  - id: metadata/binary/installer/sfx::7zip-registry-key
  - id: metadata/binary/resource::dominant-executable-rsrc
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::wx-sections
  needs: 3
  unless:
  - id: metadata/signed/platform/
- id: importless-dll-loader
  desc: Importless DLL with dynamic API resolution
  crit: hostile
  conf: 0.9
  attack: T1574.002
  size_max: 51200
  all:
  - id: metadata/binary/metrics/structural::no-imports
  - id: metadata/binary/metrics/structural::minimal-exports
  any:
  - id: objectives/anti-static/obfuscation/imports::djb2-api-resolution
  - id: objectives/anti-static/obfuscation/imports::hash-based-obfuscation
  - id: objectives/anti-static/obfuscation/imports::api-hash-resolution
- id: fake-export-resource-sideload
  desc: Fake-export DLL sideloading loader profile
  crit: hostile
  conf: 0.98
  attack: T1574.002
  for: [pe]
  any:
  - id: metadata/binary/symbols/exports::sideload-export-masquerade-cluster
  - id: metadata/binary/symbols/exports::sideload-export-masquerade-cluster-lite
  - id: micro-behaviors/data/embedded/payload/resource::pe-magic-in-rsrc
  - id: metadata/binary/resource::doc-stuffed-rsrc
  - id: objectives/anti-static/obfuscation/payload/diagnostic-noise::oversized-rdata-diagnostic-noise
  - id: metadata/binary/symbols/exports::sideload-wrapper-gui-padding
  needs: 2

- id: fake-export-apihash-resource-loader
  desc: Fake-export DLL with API-hash resource payload
  crit: suspicious
  conf: 0.99
  attack: T1574.002
  for: [pe]
  all:
  - id: metadata/binary/symbols/exports::sideload-export-masquerade-cluster-lite
  - id: micro-behaviors/data/embedded/payload/resource::pe-magic-in-rsrc-multiple
  - id: objectives/anti-static/obfuscation/imports::pe-api-hashing-indicator-single
  - id: micro-behaviors/process/thread/create::create-thread
  any:
  - id: micro-behaviors/os/module/load::disable-thread-library-calls
  - id: metadata/binary/section/names::duplicated-runtime-section-suffixes
  - id: metadata/binary/section/names::suspicious-reloc-section
- id: version-proxy-hollowing-loader
  desc: Version proxy DLL with hollowing loader chain
  crit: hostile
  conf: 0.99
  attack: T1574.002
  for: [pe]
  all:
  - id: metadata/binary/symbols/version-proxy::version-proxy-extra-loader-exports
  - id: micro-behaviors/communications/socket/init::wsa-startup
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
  - id: micro-behaviors/process/inject/runtime/call::set-thread-context-dup
  - id: micro-behaviors/process/info/thread::resume-thread-dup
  unless:
  - id: metadata/signed/platform/
- id: version-proxy-sideload-launcher
  desc: version.dll proxy sideload launcher
  crit: hostile
  conf: 0.99
  attack: T1574.002
  for: [pe]
  size_min: 524288
  all:
  - id: sideload-target-version
  - id: version-proxy-path-format
  - id: metadata/binary/section/metrics::export-fog-exec-section-mesh
  - id: metadata/binary/section/metrics::long-random-section-name-burst
  - id: micro-behaviors/os/sysinfo/directories::get-system-directory
  any:
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/dylib/lookup::get-proc-address
  - id: micro-behaviors/dylib/load/runtime::load-library-a
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/

- id: office-appv-sideload-loader
  desc: Malicious Office AppV sideload DLL (loader stage)
  crit: hostile
  conf: 0.97
  attack: T1574.002
  for: [pe]
  size_max: 65536
  all:
  - id: office-appv-sideload-filename
  - id: micro-behaviors/os/module/load::disable-thread-library-calls
  - id: micro-behaviors/dylib/load/runtime::load-library-w
  any:
  - id: hashed-export-name
  - id: objectives/anti-static/obfuscation/imports::hash-primitive
  - id: metadata/binary/layout::pe-checksum-missing
  unless:
  - id: metadata/signed/platform/

- id: 7zip-gui-description-sideload-host
  desc: 7-Zip GUI description host with sideload target
  crit: suspicious
  conf: 0.94
  attack: T1574.002
  for: [pe]
  all:
  - id: 7zip-gui-host-description
  any:
  - id: sideload-target-mapi32
  - id: sideload-target-7z-runtime
  - id: metadata/binary/installer/sfx::7zip-registry-key
  unless:
  - id: metadata/file/string/identity::7zip-gui-official-manifest
  - id: metadata/signed/platform/

- id: office-decoy-binary-cluster
  desc: Multiple Office sideload decoy binaries referenced
  crit: suspicious
  conf: 0.92
  attack: T1574.002
  for: [pe]
  any:
  - id: office-decoy-vpreview
  - id: office-decoy-icons
  - id: metadata/binary/layout::mavinject32-name
