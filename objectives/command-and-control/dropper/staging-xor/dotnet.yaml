defaults:
  platforms: [unix, windows]
  for: [csharp, pe, dll]
  attack: T1027

traits:
  - id: dotnet-xor-key-constant
    desc: .NET XOR key constant
    crit: suspicious
    conf: 0.94
    for: [csharp]
    if:
      type: text
      substr: private const byte _xorKey

  - id: dotnet-packed-c2-url-arrays
    desc: .NET packed C2 URL arrays
    crit: suspicious
    conf: 0.93
    for: [csharp]
    if:
      type: text
      regex: '_pBeaconUrl[\s\S]{0,900}_pExfilUrl'

  - id: dotnet-xor-decoder-loop
    desc: .NET XOR decoder loop
    crit: suspicious
    conf: 0.92
    for: [csharp]
    if:
      type: text
      regex: 'outBytes\[i\]\s*=\s*\(byte\)\s*\(data\[i\]\s*\^\s*_xorKey\)'

  - id: dotnet-http-beacon-exfil-calls
    desc: .NET HTTP beacon/exfil calls
    crit: suspicious
    conf: 0.9
    if:
      type: text
      # Require the paired beacon/exfil variables used by a stager. A normal
      # generated API client (for example, Curiosity's many unrelated GET and
      # POST endpoints) otherwise matches this overly broad sequence.
      regex: '(?is)\bGetAsync\s*\(\s*_pBeaconUrl\b[\s\S]{0,300}\bPostAsync\s*\(\s*_pExfilUrl\b'

composite_rules:
  - id: dotnet-xor-http-stager-source
    desc: .NET XOR HTTP stager source
    crit: hostile
    conf: 0.97
    for: [csharp]
    all:
      - id: dotnet-xor-key-constant
      - id: dotnet-xor-decoder-loop
      - id: dotnet-packed-c2-url-arrays
      - id: dotnet-http-beacon-exfil-calls
    any:
      - id: objectives/anti-analysis/self-terminate::dotnet-debugger-exit
      - id: micro-behaviors/process/create/spawn::start-info
      - id: micro-behaviors/process/create/spawn::redirect-standard-output-dotnet

  - id: dotnet-xor-http-stager-assembly
    desc: .NET XOR HTTP stager assembly
    crit: hostile
    conf: 0.96
    for: [pe, dll]
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/communications/url/encoded::encoded-http-url
      - id: micro-behaviors/communications/http/client/managed::httpclient
      - id: micro-behaviors/crypto/symmetric/xor/loop::native-byte-xor-loop
    any:
      - id: micro-behaviors/process/create/spawn::dotnet-redirected-stdio
      - id: micro-behaviors/process/create/spawn::redirect-standard-output-dotnet
      - id: objectives/discovery/system/fingerprint/user::user-info
    unless:
      - id: well-known/tool/sysadmin/netch::netch-executable
      - id: well-known/app/subtitleedit/
      - id: metadata/signed/platform::microsoft
      - id: micro-behaviors/communications/http/devtools/client::cdp-method-runtime-evaluate
