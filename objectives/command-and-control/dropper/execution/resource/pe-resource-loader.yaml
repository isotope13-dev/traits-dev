# PE resource-based payload loader
# Tiny code stub with API hashing + massive encrypted resource section
# Classic pattern: small .text with PEB walking / hash-based import resolution
# loads encrypted payload from .rsrc section
defaults:
  platforms: [windows]
  for: [pe]
traits:
- id: rsrc-on-demand-route-helper-name
  desc: OnDemand route helper resource DLL
  crit: component
  conf: 0.92
  if:
    type: text
    exact: OnDemandConnRouteHelper.DLL
    section: .rsrc
- id: rsrc-startupscan-dll-name
  desc: Startupscan resource DLL
  crit: component
  conf: 0.9
  if:
    type: text
    exact: startupscan.dll
    section: .rsrc
- id: rsrc-ztdnsapi-dll-name
  desc: ZTDNSAPI resource DLL
  crit: component
  conf: 0.92
  if:
    type: text
    exact: ZTDNSAPI.dll
    section: .rsrc
- id: rsrc-deviceassociation-dll-name
  desc: Device association resource DLL
  crit: component
  conf: 0.9
  if:
    type: text
    exact: deviceassociation.dll
    section: .rsrc
- id: rsrc-security-integrity-dll-name
  desc: Security integrity resource DLL
  crit: component
  conf: 0.9
  if:
    type: text
    exact: Windows.Security.Integrity.dll
    section: .rsrc
- id: springfield-armory-version-string
  desc: Springfield Armory version claim
  crit: component
  conf: 0.94
  if:
    type: text
    exact: Springfield Armory, Inc.
    section: .rsrc
- id: tr-configuration-service-string
  desc: Tr Configuration Service claim
  crit: component
  conf: 0.94
  if:
    type: text
    exact: Tr Configuration Service
    section: .rsrc
- id: tjertier6-resource-name
  desc: TJERTIER6 encrypted resource name
  crit: component
  conf: 0.99
  if:
    type: text
    word: TJERTIER6
    section: .rsrc
- id: tke5rhiwr-form-resource
  desc: TKE5RHIWR Delphi form resource
  crit: component
  conf: 0.99
  if:
    type: text
    word: TKE5RHIWR
    section: .rsrc
- id: tke5rhiwr-form-create-caption
  desc: TKE5RHIWR decoy form caption
  crit: component
  conf: 0.98
  if:
    type: text
    exact: 3rqefdas
    section: .rsrc
- id: tjertier6-interleaved-resource-header
  desc: TJERTIER6 interleaved resource header
  crit: component
  conf: 0.99
  if:
    type: hex
    section: .rsrc
    pattern: 00 F0 03 00 [16] 08 79 95 08 08 79 95 08
composite_rules:
- id: windows-component-resource-name-cluster
  desc: Windows component DLL resource cluster
  crit: component
  conf: 0.95
  any:
  - id: rsrc-on-demand-route-helper-name
  - id: rsrc-startupscan-dll-name
  - id: rsrc-ztdnsapi-dll-name
  - id: rsrc-deviceassociation-dll-name
  - id: rsrc-security-integrity-dll-name
  needs: 3
- id: springfield-configuration-version-claim
  desc: Springfield configuration version claim
  crit: component
  conf: 0.96
  all:
  - id: springfield-armory-version-string
  - id: tr-configuration-service-string
- id: windows-component-resource-carrier
  desc: PE carries Windows component resources
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/data/embedded/payload/resource::pe-magic-in-rsrc-multiple
  - id: windows-component-resource-name-cluster
  - id: metadata/signed/trust-level::unsigned
  unless:
  - id: metadata/binary/resource::resource-only-dll
  - id: metadata/binary/installer::known-benign-installer
- id: pe-resource-encrypted-stub-benign-context
  desc: Benign context for PE encrypted resource stub
  crit: component
  conf: 0.85
  any:
