defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009,T1055,T1105
  mbc: B0032

composite_rules:
  - id: resource-memory-loader-with-endpoint
    desc: Resource loader stages executable memory with endpoint data
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-load-lock-chain
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
      - id: micro-behaviors/communications/ip/literal::external-ipv4-pe-resource-string
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/binary/installer/script/
      - id: metadata/lang/compiler/managed/
      - id: metadata/binary/installer/database::advanced-installer-bootstrapper
      - id: well-known/tool/reverse-engineering/
      - id: well-known/app/glary-utilities::glarysoft-signed-component-context

  - id: resource-loader-with-runtime-decoder
    desc: Resource loader combines runtime decoding and memory execution
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-load-lock-chain
      - id: micro-behaviors/data/encode/charset::printable-ascii-substitution-table
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
      - id: micro-behaviors/process/thread/create::create-thread
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/binary/installer/script/
      - id: metadata/lang/compiler/managed/
      - id: metadata/binary/installer/database::advanced-installer-bootstrapper
      - id: well-known/app/glary-utilities::glarysoft-signed-component-context
  - id: resource-anti-debug-memory-loader
    desc: Resource anti-debug memory loader
    crit: hostile
    conf: 0.98
    attack: T1027.009,T1055,T1622
    all:
      - id: metadata/signed/trust-level::unsigned
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
      - id: micro-behaviors/mem/query/info::virtualquery
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/
      - id: metadata/binary/framework/
      - id: well-known/app/
      - id: well-known/tool/
