defaults:
  platforms: [windows]
  for: [powershell]
composite_rules:
  - id: xmlhttp-clsid-any
    desc: Matches any variant of XMLHTTP CLSID
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-b64-unicode
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-raw
      - id: micro-behaviors/os/com/object::xmlhttp-join-fragments
  - id: ps-xmlhttp-downloader
    desc: PowerShell XMLHTTP downloader using COM objects
    crit: hostile
    conf: 0.95
    attack: "T1105"
    mbc: "E1059.001"
    all:
      - id: xmlhttp-clsid-any
      - id: micro-behaviors/os/com/instantiation::create-instance
      - id: micro-behaviors/communications/http/client::response-text
      - id: objectives/execution/interpreter/eval/invoke::iex
  - id: ps-xmlhttp-adodb-download-execute
    desc: PowerShell XMLHTTP ADODB download execute
    crit: hostile
    conf: 0.98
    attack: "T1105"
    mbc: "B0030"
    all:
      - id: micro-behaviors/os/com/object::xmlhttp-join-fragments
      - id: micro-behaviors/os/com/instantiation::new-object-comobject
      - id: micro-behaviors/fs/write/file/stream::adodb-stream-join-fragments
      - id: micro-behaviors/fs/write::adodb-save-to-file
      - id: micro-behaviors/fs/write::adodb-write-response-body
      - id: micro-behaviors/process/create::start-process-dup
    any:
      - id: micro-behaviors/communications/http/client::response-body
      - id: micro-behaviors/fs/write::adodb-type-binary
