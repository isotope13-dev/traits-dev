defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1059.005
traits:
  - id: vbs-win32-process-enum
    desc: VBS enumerates Win32_Process
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '(?i)execquery\("select \* from win32_process"\)'
  - id: vbs-appdata-microsoft-run
    desc: VBS runs AppData Microsoft payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)WshShell\.Run "C:\\Users\\.{1,80}\\AppData\\Roaming\\Microsoft\\'
  - id: vbs-svchcst-masquerade
    desc: VBS svchcst process masquerade
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: svchcst.exe
  - id: vbs-hash-exe-process-name
    desc: VBS hash-named EXE process
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '[a-f0-9]{32,64}\.exe'
  - id: vbs-watchdog-sleep-loop
    desc: VBS watchdog sleep loop
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '(?i)wscript\.sleep\s+\d{2,5}[\s\S]{0,40}loop'
composite_rules:
  - id: vbs-appdata-payload-watchdog
    desc: VBS AppData payload watchdog launcher
    crit: hostile
    conf: 0.97
    all:
      - id: vbs-win32-process-enum
      - id: vbs-appdata-microsoft-run
      - id: vbs-watchdog-sleep-loop
    any:
      - id: vbs-svchcst-masquerade
      - id: vbs-hash-exe-process-name
