defaults:
  for:
    - pe
  platforms:
    - windows
composite_rules:
  - id: unsigned-fake-version-loader
    desc: Unsigned fake-version C2 loader
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/evasion/masquerade/identity/fabricated::networked-fake-version-resource
      - id: objectives/command-and-control/infrastructure/ip-port::mixed-ipv4-endpoint-cluster
      - id: micro-behaviors/mem/protect/modify::getprocaddr-memory-loader-primitives
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
      - id: objectives/anti-analysis/debugger-detect/check::output-debug-string
  - id: unsigned-fake-version-locale-loader
    desc: Unsigned fake-version locale-gated loader
    crit: hostile
    conf: 0.97
    size_max: 524288
    all:
      - id: objectives/evasion/masquerade/identity/fabricated::dotted-quad-version-pair
      - id: objectives/discovery/system/locale::locale-and-environment-profiling-windows-loader
      - id: metadata/binary/section/metrics::elevated-text-entropy-section
    any:
      - id: metadata/binary/metrics/anomaly::low-function-count-marker
      - id: objectives/anti-analysis/debugger-detect/check::output-debug-string
      - id: metadata/binary/debug::pdb-numbered-path
      - id: micro-behaviors/process/terminate/kill::terminate-process
    needs: 2
    unless:
      - id: metadata/signed/platform
      - id: metadata/signed/certificate
      - id: metadata/signed/developer
      - id: metadata/signed/platform::microsoft
  - id: unsigned-fake-version-loader-anti-analysis
    desc: Fake-version loader with anti-analysis
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/evasion/masquerade/identity/fabricated::networked-fake-version-resource
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
    any:
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: objectives/anti-analysis/debugger-detect/check::output-debug-string
      - id: micro-behaviors/time/query::get-tick-count
