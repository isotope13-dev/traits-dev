defaults:
  for:
  - pe
  platforms:
  - windows
composite_rules:
- id: firseria-packed-loader
  desc: Firseria-signed packed loader geometry
  crit: hostile
  conf: 0.99
  size_min: 262144
  all:
  - id: metadata/signed/developer::firseria
  - id: metadata/binary/layout::has-overlay
  any:
  - id: objectives/anti-static/obfuscation/binary-metrics/sparse-imports::import-count-under-80
  - id: metadata/binary/section/metrics::five-section-pe
  - id: objectives/evasion/masquerade/identity/fabricated::lowercase-underscore-internal-name
  - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
  - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
  - id: objectives/anti-static/pack/entropy::high-entropy-data-section
  - id: objectives/anti-static/obfuscation/payload/section::loader-encrypted-dot-data
  - id: objectives/anti-static/obfuscation/payload/section::packed-loader-low-code-to-data-ratio
  needs: 2
- id: signed-update-masquerade-loader
  desc: Signed updater masquerade loader cluster
  crit: hostile
  conf: 0.99
  all:
  - id: objectives/evasion/masquerade/cert::qihu-signed-windows-updater-masquerade
  - id: objectives/persistence/login/startup/registry::windows-error-reporting-run-key
  - id: objectives/command-and-control/infrastructure/ip-port::embedded-ipv4-endpoint-pair
  - id: micro-behaviors/communications/ip/endpoint::private-ipv4-port-10-binary
  - id: micro-behaviors/mem/protect/modify::getprocaddr-memory-loader-primitives
  any:
  - id: metadata/binary/debug::project161-visualstudio-pdb
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
  - id: micro-behaviors/time/timing/delay::query-performance-counter

- id: signed-office-bundle-dropper
  desc: Signed wrapper with embedded PE stages
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/signed/developer::maksim-moisiuk
  - id: metadata/signed/developer::open-source-developer
  - id: metadata/binary/layout::pe-embedded
  any:
  - id: metadata/binary/layout::has-overlay
  - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
  - id: objectives/persistence/login/startup/shortcut::create-shortcut
  - id: micro-behaviors/process/create/spawn::create-process-w
  needs: 2

- id: signed-office-bundle-masquerade
  desc: Signed PE bundle with staged execution
  crit: suspicious
  conf: 0.97
  all:
  - id: metadata/signed/developer::maksim-moisiuk
  - id: metadata/signed/developer::open-source-developer
  - id: metadata/binary/layout::pe-embedded
  - id: metadata/binary/layout::has-overlay
  any:
  - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
  - id: objectives/persistence/login/startup/shortcut::create-shortcut
  - id: micro-behaviors/process/create/spawn::create-process-w
- id: mozilla-office-sync-dropper
  desc: Mozilla signed Office sync dropper
  crit: hostile
  conf: 0.99
  size_min: 900000
  size_max: 3000000
  all:
  - id: metadata/signed/developer::mozilla-corporation
  - id: metadata/binary/layout::pe-embedded
  any:
  - id: metadata/vendor/string::java-platform-string
  - id: micro-behaviors/communications/http/get::url-download-to-file-str
  - id: objectives/persistence/login/startup/registry::software-run-key
  needs: 2

- id: mozilla-firefox-resource-stage-wrapper
  desc: Mozilla signed Firefox wrapper with PE stage
  crit: hostile
  conf: 0.995
  size_min: 250000
  size_max: 1500000
  all:
  - id: metadata/signed/developer::mozilla-corporation
  - id: well-known/app/mozilla::legacy-firefox-bootstrap
  - id: metadata/binary/layout::pe-embedded
  - id: objectives/anti-analysis/debugger-detect/check::signed-firefox-wrapper-anti-analysis

- id: verisign-brand-signed-zip-launcher
  desc: Signed PE masquerading as VeriSign installer with ZIP loader payload
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/evasion/masquerade/brand/installer::verisign-installer-version-resource-decoy
  - id: objectives/command-and-control/dropper/execution/loader::minizip-zip-data-launcher
  - id: metadata/binary/layout::pe-checksum-mismatch
  unless:
  - id: metadata/signed/platform/

- id: verisign-brand-encrypted-loader
  desc: PE masquerading as VeriSign installer carries encrypted loader payload
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/evasion/masquerade/brand/installer::verisign-installer-version-resource-decoy
  - id: objectives/anti-static/obfuscation/payload/section::encrypted-loader-data-geometry
  any:
  - id: micro-behaviors/data/embedded/payload/archive::zip-locals-in-data-pe
  - id: metadata/binary/layout::pe-checksum-mismatch
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
  unless:
  - id: metadata/signed/platform/
