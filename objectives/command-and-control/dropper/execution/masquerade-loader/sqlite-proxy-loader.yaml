defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1036.005, T1574.002"

traits:
  - id: overlay-dominates-pe-file
    desc: Overlay dominates PE file
    crit: suspicious
    conf: 0.94
    ref: sha256:a97d6fabe19316c920aed2004cb8d5ea3a699ce3a1a02c54ba60e0b6cabe9b64
    if:
      type: metrics
      field: binary.overlay_ratio
      min: 0.8
    unless:
      - id: metadata/binary/installer/script::nsis-manifest-exehead
      - id: metadata/binary/installer/script::nsis
      - id: well-known/app/handbrake::handbrake-windows-binary
      - id: metadata/file/string/identity::tool-identity-7zip

composite_rules:
  - id: sqlite-proxy-encrypted-overlay-loader
    desc: SQLite proxy DLL encrypted overlay loader
    crit: hostile
    conf: 0.97
    ref: sha256:a97d6fabe19316c920aed2004cb8d5ea3a699ce3a1a02c54ba60e0b6cabe9b64
    all:
      - id: metadata/binary/symbols/exports::sqlite-api-with-private-wrapper-exports
      - id: overlay-dominates-pe-file
      - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-aes-cbc
      - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-decrypt-api
    any:
      - id: metadata/binary/layout::pe-multiple-tls-callbacks
      - id: objectives/anti-analysis/emulator-detect/hardware::gpu-vendor-enumeration-check
    unless:
      - id: well-known/lib/sqlite/
      - id: metadata/signed/platform/

  - id: sqlite-proxy-native-injection-loader
    desc: SQLite proxy DLL native injection loader
    crit: hostile
    conf: 0.98
    ref: sha256:a97d6fabe19316c920aed2004cb8d5ea3a699ce3a1a02c54ba60e0b6cabe9b64
    all:
      - id: metadata/binary/symbols/exports::sqlite-api-with-private-wrapper-exports
      - id: micro-behaviors/os/syscall/raw::nt-write-ssn
      - id: micro-behaviors/os/syscall/raw::nt-protect-ssn
      - id: micro-behaviors/os/syscall/raw::nt-allocate-ssn
      - id: metadata/binary/layout::pe-multiple-tls-callbacks
    any:
      - id: overlay-dominates-pe-file
      - id: objectives/anti-analysis/emulator-detect/hardware::gpu-vendor-enumeration-check
    unless:
      - id: well-known/lib/sqlite/
      - id: metadata/signed/platform/
