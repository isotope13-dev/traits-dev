defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1036.005
  mbc: B0011
composite_rules:
  - id: telegram-taggant-loader
    desc: Telegram desktop decoy packed loader
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/evasion/masquerade/version-resource/telegram::telegram-desktop-version-resource
      - id: objectives/anti-static/pack/taggant::taggant-section
      - id: objectives/anti-static/pack/taggant::paired-lowercase-sections
      - id: metadata/binary/symbols/imports::single-import-raw
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::many-wx-sections
    any:
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
      - id: metadata/binary/layout::overlay-size-metrics
    needs: 2
    unless:
      - id: metadata/signed/trust-level::signer-evidence-present
      - id: metadata/signed/platform::microsoft
