defaults:
  platforms: [windows]
  for: [pe]
  size_max: 524288
composite_rules:
- id: 7zip-uninstaller-overlay-wrapper
  desc: 7-Zip uninstaller overlay wrapper
  crit: suspicious
  conf: 0.97
  all:
  - id: metadata/binary/installer/sfx::7zip-uninstaller-profile
  - id: metadata/binary/installer/sfx::7zip-sfx-runtime
  - id: metadata/binary/layout::overlay-over-90pct
  any:
  - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
  - id: micro-behaviors/fs/file/copy::copyfile-w
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  needs: 2
- id: 7zip-uninstaller-embedded-decoy
  desc: Packed wrapper with embedded 7-Zip uninstaller decoy
  crit: suspicious
  conf: 0.98
  all:
  - id: metadata/file/string/identity::tool-identity-7zip
  - id: metadata/binary/layout::pe-embedded
  any:
  - id: objectives/command-and-control/dropper/sideload::sideload-target-7z-runtime
  - id: objectives/anti-static/pack/detect::aspack-marker
  - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
  - id: metadata/binary/section/metrics::overlay-over-20pct-pe
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/signed/platform/
- id: 7zip-uninstaller-download-loader
  desc: 7-Zip decoy downloads staged loader
  crit: hostile
  conf: 0.98
  all:
  - id: 7zip-uninstaller-embedded-decoy
  - id: micro-behaviors/communications/http/get::url-download-to-file-str
  - id: objectives/evasion/masquerade/identity/mimicry::non-microsoft-windowsupdate-path
  any:
  - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
  - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
  - id: objectives/anti-static/pack/detect::aspack-marker
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/signed/platform/
- id: 7zip-uninstaller-embedded-dropper
  desc: Packed 7-Zip uninstaller decoy dropper
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/file/string/identity::tool-identity-7zip
  - id: metadata/binary/layout::pe-embedded
  - id: micro-behaviors/process/create/spawn::create-process-w
  any:
  - id: objectives/command-and-control/dropper/sideload::sideload-target-7z-runtime
  - id: objectives/anti-static/pack/detect::aspack-marker
  - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
  unless:
  - id: metadata/binary/installer/sfx/
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/signed/platform/
- id: 7zip-uninstaller-embedded-c2-loader
  desc: Packed 7-Zip decoy with C2 endpoint
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/file/string/identity::tool-identity-7zip
  - id: metadata/binary/layout::pe-embedded
  - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-data-literal
  any:
  - id: objectives/anti-static/pack/detect::aspack-marker
  - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
  - id: metadata/binary/section/metrics::overlay-over-20pct-pe
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/signed/platform/
- id: 7zip-uninstaller-java-stage-dropper
  desc: 7-Zip uninstaller with Java stage
  crit: hostile
  conf: 0.995
  all:
  - id: objectives/command-and-control/dropper/execution/masquerade-loader::7zip-uninstaller-overlay-wrapper
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: metadata/vendor/string::java-platform-string
  any:
  - id: micro-behaviors/data/runtime/keywords
  - id: micro-behaviors/dylib/lookup::get-proc-address
  - id: micro-behaviors/os/registry/access::registry-query-value-api
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/signed/platform/
- id: mozilla-webapprt-7zip-overlay-dropper
  desc: Mozilla WebAppRT 7-Zip overlay dropper
  crit: hostile
  conf: 0.995
  size_min: 1000000
  size_max: 1300000
  all:
  - id: objectives/command-and-control/dropper/staging/signed-bundle::mozilla-webapprt-host
  - id: metadata/signed/developer::mozilla-corporation
  - id: metadata/binary/installer/sfx::7zip-uninstaller-overlay-profile
  - id: metadata/binary/layout::pe-embedded
  - id: micro-behaviors/process/create/spawn::create-process-w
  any:
  - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
  - id: micro-behaviors/os/privilege/manifest::msi-embedded-require-administrator
  - id: micro-behaviors/os/registry/access::reg-open-key-ex-w-symbol
  - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-import-chain
  needs: 2
