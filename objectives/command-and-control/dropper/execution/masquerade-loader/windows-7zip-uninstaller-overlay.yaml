defaults:
  platforms: [windows]
  for: [pe]
  size_max: 524288
composite_rules:
  - id: 7zip-uninstaller-overlay-wrapper
    desc: 7-Zip uninstaller overlay wrapper
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/installer/sfx::7zip-uninstaller-profile
      - id: metadata/binary/installer/sfx::7zip-sfx-runtime
      - id: metadata/binary/layout::overlay-over-90pct
    any:
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/os/privilege/manifest::require-administrator
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/signed/platform::microsoft
  - id: 7zip-uninstaller-java-stage-dropper
    desc: 7-Zip uninstaller with Java stage
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/dropper/execution/masquerade-loader::7zip-uninstaller-overlay-wrapper
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: micro-behaviors/data/text/keywords::java-platform-string
    any:
      - id: micro-behaviors/data/text/keywords::jjs-launcher-string
      - id: micro-behaviors/data/text/keywords::nashorn-shell-string
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/os/registry/access::registry-query-value-api
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/signed/platform::microsoft
