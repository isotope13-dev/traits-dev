defaults:
  for:
    - pe
    - pe
  platforms:
    - windows
  attack: T1105
  mbc: B0011
composite_rules:
  - id: mixed-endpoint-timer-loader
    desc: Mixed-endpoint timer-gated Windows loader
    crit: hostile
    conf: 0.98
    size_max: 500000
    all:
      - id: objectives/command-and-control/infrastructure/ip-port::embedded-ipv4-endpoint-pair
      - id: micro-behaviors/communications/ip::private-ipv4-port-10-binary
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: micro-behaviors/time/schedule/waitable::create-and-set-waitable-timer
    any:
      - id: objectives/anti-analysis/debugger-detect/check::debugger-check-with-guards
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: metadata/binary/debug::pdb-random-basename
      - id: micro-behaviors/os/env/access::set-environment-variable-wide
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: randomized-pdb-bootstrap-loader
    desc: Randomized PDB bootstrap loader profile
    crit: suspicious
    conf: 0.96
    size_max: 500000
    all:
      - id: metadata/binary/debug::pdb-random-basename
      - id: metadata/binary/framework::mscoree-name
      - id: objectives/anti-analysis/timing/evasion::waitable-timer-sleep-mask
    any:
      - id: objectives/command-and-control/infrastructure/ip-port::embedded-ipv4-endpoint-pair
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/os/env/access::set-environment-variable-wide
    unless:
      - id: metadata/signed/platform::microsoft
