# Python crypter drop-to-disk execution stage.
#
# Third facet of the PyInstaller stealer stub (see
# obfuscation/payload/encrypted::python-aes-encrypted-payload-blob and
# obfuscation/payload/loader::python-crypter-decrypt-and-run). After decrypting
# the embedded blob, the stub materialises the cleartext payload to a temporary
# path and launches it in a child process — the classic decrypt-drop-execute
# dropper. Keyed on the embedded blob + symmetric cipher + tempfile + process
# spawn so it fires on the disk-staging behaviour, not the in-memory decode path.
defaults:
  platforms: [windows, unix]
  for: [python, pyc]
  attack: T1059.006
  mbc: B0030
composite_rules:
  - id: python-crypter-temp-drop-execute
    desc: Python decrypt, drop to temp, and execute
    crit: hostile
    conf: 0.94
    all:
      - id: objectives/anti-static/obfuscation/encoding/base64::embedded-base64-blob
      - id: micro-behaviors/crypto/symmetric/aes/library::pycrypto-cipher-module-ref
      - id: micro-behaviors/fs/temp/reference::tempfile-ref
      - id: micro-behaviors/process/create/subprocess::subprocess-module-pyc
