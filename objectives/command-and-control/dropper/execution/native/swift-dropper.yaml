# Swift-based macOS dropper detection
# Detects compiled Mach-O binaries that download, validate, and execute payloads
# Common pattern: curl-based download + quarantine removal + Gatekeeper check + execution
# ATT&CK: T1105 (Ingress Tool Transfer), T1553.001 (Gatekeeper Bypass)
defaults:
  platforms: [macos]
  for: [macho]
  attack: T1105
composite_rules:
  - id: macos-curl-dropper
    desc: macOS binary downloads and executes via curl
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/process/create/shell/invoke::curl-cli-binary
      - id: micro-behaviors/fs/path/temp::unix-temp
    any:
      - id: micro-behaviors/process/create/shell/invoke::nstask-launch
      - id: micro-behaviors/process/create/shell/invoke::bin-zsh-binary
  - id: macos-payload-validator
    desc: macOS dropper validates payload before execution
    crit: suspicious
    conf: 0.92
    attack: T1553.001
    all:
      - id: micro-behaviors/os/security/gatekeeper::spctl-assess
    any:
      - id: micro-behaviors/os/security/gatekeeper::codesign-verify
      - id: micro-behaviors/os/security/gatekeeper::file-mime-check
  - id: macos-swift-dropper
    desc: macOS dropper with download and evasion
    crit: hostile
    conf: 0.95
    attack: T1553.001
    all:
      - id: micro-behaviors/process/create/shell/invoke::curl-cli-binary
      - id: objectives/evasion/anti-av/platform/quarantine::programmatic-quarantine-removal
    any:
      - id: micro-behaviors/os/security/gatekeeper::spctl-assess
      - id: micro-behaviors/os/security/gatekeeper::codesign-verify
      - id: micro-behaviors/fs/path/temp::unix-temp
