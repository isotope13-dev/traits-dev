defaults:
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  attack: T1105

traits:
  - id: payload-container-type
    desc: Go binary defines a PayloadContainer type
    crit: component
    conf: 0.96
    if:
      type: text
      substr: .PayloadContainer

composite_rules:
  - id: compressed-payload-dropper
    desc: Go payload container is Zstandard-decoded, written to disk, and executed
    crit: hostile
    conf: 0.98
    all:
      - id: payload-container-type
      - id: micro-behaviors/data/compress/library::go-zstd-decoder-pclntab
      - id: micro-behaviors/fs/file/write/direct::native-binary-write-file-text
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
