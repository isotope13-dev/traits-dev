defaults:
  platforms: [windows]
  for: [batch]
  attack: T1105

traits:
  - id: temp-exe-stage-path
    desc: Temp executable stage path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(%TEMP%|\\Windows\\Temp\\)[^ \r\n''"]{1,40}\.exe'

  - id: temp-dll-stage-path
    desc: Temp DLL stage path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(%TEMP%|\\Windows\\Temp\\|\\ProgramData\\)[^ \r\n''"]{1,48}\.dll'

  - id: temp-encrypted-stage-path
    desc: Temp encrypted payload path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(%TEMP%|\\Windows\\Temp\\|\\Microsoft\\)[^ \r\n''"]{1,48}\.(tmp|dat)'

  - id: rc4-key-argument-hint
    desc: Loader key argument hint
    crit: baseline
    conf: 0.78
    if:
      type: text
      regex: '(?i)\s(first_match|[A-Za-z0-9_]{8,32})\s*(&&|$)'
    unless:
      - type: path
        substr: testdata/does-nothing/

  - id: curl-programdata-batch-stage
    desc: curl stages batch file into ProgramData
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bcurl(\.exe)?\b[^\r\n]{0,180}\s-o\s+"?C:\\ProgramData\\.{1,60}\.(bat|cmd)"?'

  - id: curl-temp-batch-stage-check
    desc: Batch checks temp script stage before download
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)if\s+not\s+exist\s+"?.{0,80}(\\Temp|/Temp).{1,60}\.(bat|cmd)"?'

  - id: batch-executes-temp-script-stage
    desc: Batch executes temp script stage
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?im)^\s*"?.{0,90}(\\Temp|/Temp).{1,60}\.(bat|cmd)"?\s*$'

composite_rules:
  - id: rundll32-temp-dll-export
    desc: rundll32 loads temp DLL export
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/process/create/shell/script-host::rundll32-exec
      - id: temp-dll-stage-path

  - id: webclient-temp-exe-execute-delete
    desc: WebClient temp exe execute delete
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/command-and-control/dropper/execution/batch::download-file-ps
      - id: temp-exe-stage-path
      - id: micro-behaviors/fs/file/delete::del-command
    any:
      - id: micro-behaviors/process/create/shell/script-host::cmd-exe-c-command
      - id: micro-behaviors/process/create/shell/lang::powershell-invocation

  - id: webclient-rundll32-temp-dll-loader
    desc: WebClient temp DLL rundll32 loader
    crit: hostile
    conf: 0.97
    attack: T1218.011
    all:
      - id: objectives/command-and-control/dropper/execution/batch::download-file-ps
      - id: rundll32-temp-dll-export

  - id: webclient-encrypted-loader-chain
    desc: WebClient encrypted loader chain
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/dropper/execution/batch::download-file-ps
      - id: temp-exe-stage-path
      - id: temp-encrypted-stage-path
      - id: rc4-key-argument-hint

  - id: curl-batch-programdata-temp-loader
    desc: curl downloads batch stage and executes temp script
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/download/curl::batch-curl-call
      - id: curl-programdata-batch-stage
      - id: batch-executes-temp-script-stage
    any:
      - id: curl-temp-batch-stage-check
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
