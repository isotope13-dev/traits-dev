defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  attack: T1105,T1547
  mbc: B0024

composite_rules:
- id: persistent-native-payload-dropper
  desc: Downloads native payload and installs persistence
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/command-and-control/dropper/node-bootstrap::download-file
  - id: objectives/command-and-control/dropper/node-bootstrap::exec-downloaded-raw
  any:
  - id: objectives/persistence/login/registry/autostart::run-key
  - id: objectives/persistence/system/init/boot::linux-xdg-executable
  - id: objectives/persistence/system/launchd/core::launchd-js-runatload-installer
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: well-known/app/pixcode::benign-runtime-context
  - id: well-known/app/pixcode::benign-archive-context
