defaults:
  platforms: [unix, windows]
  for: [scripts]
composite_rules:
  - id: bitsadmin-persistence-chain
    desc: BitsAdmin download with Startup persistence
    crit: hostile
    conf: 0.95
    attack: T1197
    mbc: E1105
    all:
      - id: objectives/command-and-control/dropper/execution/script::bitsadmin-download
      - id: micro-behaviors/os/autorun::startup-keyword
  - id: vbs-dropper-chain
    desc: VBS launcher with C2 download and persistence
    crit: hostile
    conf: 0.95
    attack: T1059.005
    all:
      - id: micro-behaviors/communications/ip::http-ip-url
    any:
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-shell-create
      - id: micro-behaviors/communications/ipc/win32com::wscript-shell-python
    needs: 1
  - id: schtasks-c2-persistence
    desc: Scheduled task persistence with C2 download
    crit: hostile
    conf: 0.95
    attack: T1053.005
    all:
      - id: micro-behaviors/communications/ip::http-ip-url
    any:
      - id: objectives/persistence/login/startup/registry::schtasks-create-cmd
      - id: objectives/persistence/login/startup/registry::schtasks-exe-create
    needs: 1
  - id: startup-folder-c2
    desc: Startup folder persistence with C2 infrastructure
    crit: hostile
    conf: 0.95
    attack: T1547.001
    all:
      - id: micro-behaviors/communications/ip::http-ip-url
      - id: micro-behaviors/os/autorun::startup-keyword
