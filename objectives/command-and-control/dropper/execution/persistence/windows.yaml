defaults:
  platforms: [unix, windows]
  for: [scripts]
composite_rules:
- id: bitsadmin-persistence-chain
  desc: BitsAdmin download with Startup persistence
  crit: hostile
  conf: 0.95
  attack: T1197
  mbc: E1105
  all:
  - id: objectives/command-and-control/dropper/execution/batch::bitsadmin-download
  - id: micro-behaviors/os/autorun/keyword::startup-keyword
- id: vbs-dropper-chain
  desc: VBS launcher with C2 download and persistence
  crit: hostile
  conf: 0.95
  attack: T1059.005
  all:
  - id: micro-behaviors/communications/ip/literal::http-ip-url
  any:
  - id: micro-behaviors/os/wsh/file::wscript-shell-object
  - id: micro-behaviors/communications/ipc/win32com::wscript-shell-python
- id: schtasks-c2-persistence
  desc: Scheduled task persistence with C2 download
  crit: hostile
  conf: 0.95
  attack: T1053.005
  all:
  - id: micro-behaviors/communications/ip/literal::http-ip-url
  any:
  - id: micro-behaviors/os/autorun/scheduled::schtasks-create-cmd
  - id: micro-behaviors/os/autorun/scheduled::schtasks-exe-create
- id: startup-folder-c2
  desc: Startup persistence with raw-IP URL
  crit: hostile
  conf: 0.95
  attack: T1547.001
  all:
  - id: micro-behaviors/communications/ip/literal::http-ip-url
  - id: micro-behaviors/os/autorun/keyword::startup-keyword
- id: startup-folder-tunnel-dropper
  desc: Startup persistence with tunnel download
  crit: hostile
  conf: 0.97
  attack: T1547.001
  all:
  - id: objectives/command-and-control/infrastructure/domain/tunnel::cloudflare-tunnel
  - id: objectives/persistence/login/startup/folder::batch-echo-startup-script
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::batch-powershell-iwr-alias
- id: startup-folder-tunnel-dropper-curl
  desc: Startup persistence with tunnel curl dropper
  crit: hostile
  conf: 0.97
  attack: T1547.001
  for: [batch, powershell]
  all:
  - id: objectives/command-and-control/infrastructure/domain/tunnel::cloudflare-tunnel
  any:
  - id: objectives/persistence/login/startup/folder::batch-echo-startup-script
  - id: objectives/persistence/login/startup/folder::batch-echo-startup-via-var
- id: cf-tunnel-rundll32-loader
  desc: Cloudflare tunnel download executed via rundll32
  crit: hostile
  conf: 0.97
  attack: T1218.011
  for: [batch, powershell]
  all:
  - id: objectives/command-and-control/infrastructure/domain/tunnel::cloudflare-tunnel
  - id: objectives/execution/lolbin/os::rundll32-suspicious-export
