defaults:
  platforms: [windows]
  for: [pyc]
traits:
  - id: pyc-amsi-patch-targets
    desc: Bytecode references AMSI scan patch target
    crit: component
    conf: 0.96
    if:
      type: text
      exact: AmsiScanBuffer
  - id: pyc-hkcu-run-key
    desc: Bytecode references HKCU Run persistence key
    crit: component
    conf: 0.96
    if:
      type: text
      substr: Software\Microsoft\Windows\CurrentVersion\Run
  - id: pyc-reg-setvalueex
    desc: Bytecode sets Windows registry value
    crit: component
    conf: 0.92
    if:
      type: text
      exact: SetValueEx
  - id: pyc-appdata-microsoft-path
    desc: Bytecode builds Microsoft AppData path
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'LOCALAPPDATA.{0,160}Microsoft.{0,80}Windows'
  - id: pyc-masquerade-browser-name
    desc: Bytecode uses fake Edge filename
    crit: component
    conf: 0.9
    if:
      type: text
      exact: nsedge.exe
  - id: pyc-cbc-string
    desc: Bytecode references CBC cipher mode
    crit: component
    conf: 0.84
    if:
      type: text
      exact: CBC
  - id: pyc-cipher-string
    desc: Bytecode references cipher construction API
    crit: component
    conf: 0.84
    if:
      type: text
      exact: Cipher
  - id: pyc-decompress-string
    desc: Bytecode decompresses embedded payload data
    crit: component
    conf: 0.84
    if:
      type: text
      exact: decompress
  - id: pyc-virtualprotect-rw-exec
    desc: Bytecode changes executable memory protection
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: VirtualProtect
  - id: pyc-rtlmovememory-copy
    desc: Bytecode copies bytes into memory
    crit: component
    conf: 0.92
    if:
      type: text
      exact: RtlMoveMemory
  - id: pyc-timerqueue-callback
    desc: Bytecode starts timer callback execution
    crit: component
    conf: 0.94
    if:
      type: text
      exact: CreateTimerQueueTimer
  - id: pyc-dotnet-assembly-string
    desc: Bytecode references .NET assembly reflection
    crit: component
    conf: 0.84
    if:
      type: text
      exact: Assembly
  - id: pyc-dotnet-entrypoint-string
    desc: Bytecode references .NET entry point
    crit: component
    conf: 0.86
    if:
      type: text
      exact: EntryPoint
  - id: pyc-dotnet-invoke-string
    desc: Bytecode invokes reflected .NET method
    crit: component
    conf: 0.86
    if:
      type: text
      exact: Invoke
  - id: pyc-pythonnet-clr-import
    desc: Bytecode imports Python CLR bridge
    crit: component
    conf: 0.86
    if:
      type: text
      exact: clr
composite_rules:
  - id: pyinstaller-bytecode-amsi-memory-patch
    desc: PyInstaller bytecode patches AMSI scanning
    crit: hostile
    conf: 0.99
    attack: T1562.001
    all:
      - id: pyc-amsi-patch-targets
      - id: pyc-virtualprotect-rw-exec
      - id: pyc-rtlmovememory-copy
  - id: pyinstaller-bytecode-run-key-persistence
    desc: PyInstaller bytecode installs Run-key persistence
    crit: suspicious
    conf: 0.97
    attack: T1547.001
    all:
      - id: pyc-hkcu-run-key
      - id: pyc-masquerade-browser-name
    any:
      - id: pyc-reg-setvalueex
      - id: pyc-appdata-microsoft-path
      - id: micro-behaviors/data/decode/base64::b64decode-string
  - id: pyinstaller-bytecode-shellcode-callback
    desc: PyInstaller bytecode runs shellcode callback
    crit: hostile
    conf: 0.98
    attack: T1055
    all:
      - id: pyc-virtualprotect-rw-exec
      - id: pyc-rtlmovememory-copy
      - id: pyc-timerqueue-callback
  - id: pyc-aes-cbc-stage
    desc: Bytecode decrypts AES-CBC payload stage
    crit: component
    conf: 0.94
    all:
      - id: pyc-cipher-string
    any:
      - id: micro-behaviors/crypto/library/keyword::aes-keyword
      - id: pyc-cbc-string
      - id: micro-behaviors/data/decode/base64::b64decode-string
  - id: pyc-base64-zlib-stage
    desc: Bytecode unpacks encoded payload stage
    crit: component
    conf: 0.9
    all:
      - id: micro-behaviors/data/decode/base64::b64decode-string
    any:
      - id: pyc-decompress-string
      - id: pyc-cipher-string
      - id: pyc-virtualprotect-rw-exec
  - id: pyc-dotnet-assembly-load
    desc: Bytecode loads reflected .NET payload
    crit: component
    conf: 0.94
    all:
      - id: pyc-dotnet-assembly-string
      - id: pyc-dotnet-entrypoint-string
    any:
      - id: pyc-dotnet-invoke-string
      - id: pyc-pythonnet-clr-import
      - id: pyc-virtualprotect-rw-exec
  - id: pyinstaller-bytecode-encrypted-dotnet-loader
    desc: PyInstaller bytecode loads encrypted .NET payload
    crit: hostile
    conf: 0.99
    attack: T1620
    all:
      - id: pyc-base64-zlib-stage
      - id: pyc-dotnet-assembly-load
      - id: pyc-cipher-string
    any:
      - id: pyc-pythonnet-clr-import
      - id: pyc-virtualprotect-rw-exec
      - id: pyinstaller-bytecode-amsi-memory-patch
