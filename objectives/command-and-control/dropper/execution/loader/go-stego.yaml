# Go equivalent of the .NET bitmap-stego reflective loader: a Go binary that
# decodes a payload hidden in image data, then maps + reprotects executable
# memory to run it in-process (no file ever written). Decoding an image and
# performing manual RWX memory management are each uncommon in benign Go; the
# combination is a steganographic in-memory loader.
defaults:
  platforms: [linux, macos, windows]
  for: [go]
  attack: T1620
  mbc: E1059
composite_rules:
  - id: go-image-stego-inmemory-loader
    desc: Go binary decodes a payload from image data and executes it in memory
    crit: hostile
    conf: 0.94
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: micro-behaviors/data/embedded/payload/image::go-image-decode
      - id: micro-behaviors/mem/protect/modify::go-rwx-inmemory-exec
      - id: micro-behaviors/data/encode/base64::go-base64-decode
