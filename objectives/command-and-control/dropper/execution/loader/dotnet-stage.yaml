defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: dotnet-resource-zip-staging-marker
    desc: .NET ZIP payload staging marker
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/data/embedded/payload/resource::wpf-resource-stream-access
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: objectives/evasion/process/hidden/execution::dotnet-hidden-process-launch
  - id: dotnet-resource-zip-stage-loader
    desc: .NET resource ZIP stage loader
    crit: suspicious
    conf: 0.95
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/archive/extract/zip::dotnet-zip-extract
      - id: dotnet-resource-zip-staging-marker
    needs: 2
    any:
      - id: micro-behaviors/data/embedded/payload/resource::wpf-resource-stream-access
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-dotnet
      - id: metadata/lang/compiler/managed::reflection-namespace
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-gettypes-token
      - id: objectives/evasion/process/hidden/execution::dotnet-hidden-process-launch
    unless:
      - id: metadata/binary/framework/
      - id: well-known/lib/spectre-console/
      - id: well-known/lib/htmlforgex/
      - id: well-known/lib/powerforge/
      - id: well-known/lib/quantconnect-compression/
  - id: dotnet-admin-batch-stage-loader
    desc: Elevated .NET batch stage loader
    crit: suspicious
    conf: 0.94
    attack: T1059
    all:
      - id: dotnet-resource-zip-stage-loader
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
    any:
      - id: objectives/privilege-escalation/token-manipulation::runas-verb
      - id: micro-behaviors/fs/path/extension::bat-dup
    unless:
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/family/
      - id: well-known/app/installer::openra-installer
