defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: dotnet-resource-zip-stage-loader
    desc: .NET resource ZIP stage loader
    crit: suspicious
    conf: 0.95
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/archive/extract/zip::dotnet-zip-extract
    needs: 2
    any:
      - id: micro-behaviors/data/embedded/payload::wpf-resource-stream-access
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-dotnet
      - id: objectives/anti-static/obfuscation/reflection/invoke::namespace-import
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-gettypes-token
      - id: objectives/evasion/process/hidden/execution::dotnet-hidden-process-launch
  - id: dotnet-admin-batch-stage-loader
    desc: Elevated .NET batch stage loader
    crit: hostile
    conf: 0.94
    attack: T1059
    all:
      - id: dotnet-resource-zip-stage-loader
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
    any:
      - id: objectives/privilege-escalation/token-manipulation::runas-verb
      - id: objectives/command-and-control/dropper/builder::bat-ext
