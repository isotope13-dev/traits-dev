defaults:
  for: [pe]
  platforms: [windows]

composite_rules:
- id: ieexec-pinball-dropper
  desc: IEExec loader with Pinball overlay camouflage
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/command-and-control/dropper/execution/loader::ieexec-overlay-dropper
  - id: objectives/evasion/decoy/overlay::pinball-overlay-camouflage
  - id: metadata/binary/layout::pe-embedded
  any:
  - id: objectives/persistence/login/startup/registry::software-run-key
  - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
  - id: objectives/persistence/system/registry/com-hijack::inprocserver32-write
