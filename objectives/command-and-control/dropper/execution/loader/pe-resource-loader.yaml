# PE resource-based payload loader
# Tiny code stub with API hashing + massive encrypted resource section
# Classic pattern: small .text with PEB walking / hash-based import resolution
# loads encrypted payload from .rsrc section
defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: pe-resource-payload-loader
    desc: PE resource loader with API hashing
    crit: hostile
    conf: 0.95
    attack: T1027.007
    mbc: B0032
    all:
      - id: objectives/anti-static/obfuscation/payload/encrypted::dominant-rsrc-section
      - id: objectives/anti-static/obfuscation/imports::hash-based-obfuscation
    any:
      - id: metadata/format::no-functions
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
      - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
    needs: 1
    none:
      - id: metadata/vendor/microsoft::is-microsoft-named
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/signed/platform::microsoft
  - id: pe-resource-encrypted-stub
    desc: PE stub with encrypted resource payload
    crit: suspicious
    conf: 0.88
    attack: T1027
    unless:
      - id: metadata/format/installer::known-benign-installer
      - id: metadata/format/installer::nsis-sfx-deadbeef-magic
      - id: metadata/format/document/help2::help2-container
      - id: metadata/format/pe::resource-only-dll
    all:
      - id: objectives/anti-static/obfuscation/payload/encrypted::dominant-rsrc-section
      - id: metadata/format::no-functions
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
      - id: objectives/anti-static/obfuscation/imports::pe-export-walk-primitive
      - id: objectives/anti-static/obfuscation/imports::hash-primitive
      - id: objectives/anti-static/obfuscation/imports::peb-access-x64
    needs: 1
    none:
      - id: metadata/vendor/microsoft::is-microsoft-named
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/lang/compiler::dvclal-resource
  - id: pe-resource-syscall-loader
    desc: "Resource loader with indirect syscalls"
    crit: hostile
    conf: 0.96
    attack: T1027.007
    mbc: B0032
    all:
      - id: objectives/anti-static/obfuscation/payload/encrypted::dominant-rsrc-section
      - id: objectives/anti-static/obfuscation/imports::pe-export-walk-primitive
    any:
      - id: objectives/evasion/anti-av/syscall::indirect-syscall-gate
      - id: objectives/evasion/anti-av/syscall::windows-direct-syscalls
    needs: 1
    none:
      - id: metadata/vendor/microsoft::is-microsoft-named
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: metadata/signed/platform::microsoft
  - id: pe-resource-api-loader-camouflage
    desc: Resource API loader with camouflage
    crit: suspicious
    conf: 0.92
    attack: T1027.007
    mbc: B0032
    unless:
      - id: metadata/format/installer::known-benign-installer
      - id: metadata/format/pe::resource-only-dll
      - id: metadata/signed/platform::microsoft
    all:
      - id: micro-behaviors/data/embedded/payload::find-resource-w
      - id: micro-behaviors/data/embedded/payload::load-resource
      - id: micro-behaviors/data/embedded/payload::lock-resource
      - id: micro-behaviors/data/embedded/payload::sizeof-resource
    any:
      - id: objectives/anti-static/obfuscation/payload/section::text-section-payload-camouflage
      - id: objectives/anti-static/obfuscation/payload/section::dictionary-padding-entropy-camouflage
      - id: metadata/quality/metrics::recovered-function-count-under-10
    needs: 1
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
