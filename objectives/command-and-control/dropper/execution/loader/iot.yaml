# Native IoT loaders commonly daemonize after retrieving a stage.
defaults:
  platforms: [unix]
  for: [elf]
  attack: T1105,T1059.004
  mbc: B0024,E1105

composite_rules:
  - id: raw-ip-daemonized-payload-loader
    desc: Native raw-IP downloader daemonizes and executes payload
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/get::manual-http10-dynamic-get
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
      - id: micro-behaviors/process/daemonize/detach::full-daemon
      - id: micro-behaviors/process/create/execv::c-exec-variants
