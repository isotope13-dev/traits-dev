defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1027.009

traits:
  - id: commonappdata-exe-drop
    desc: Common AppData executable drop path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'CommonApplicationData\)\s*\+\s*"\\\\[A-Za-z0-9_-]{4,20}\.exe"'
  - id: inline-pe-base64-drop
    desc: Inline base64 PE written to disk
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: File.WriteAllBytes(path, Convert.FromBase64String("TVqQ
  - id: assembly-load-decrypt-call
    desc: Assembly.Load on decrypted buffer
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'Assembly\.Load\s*\(\s*\w+\.\w+\('
  - id: reflected-getmethod-dispatch
    desc: Reflected GetMethod dispatch helper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: MethodInfo method = type.GetMethod(

composite_rules:
  - id: aes-reflective-stage-dropper
    desc: AES reflective stage dropper source
    crit: hostile
    conf: 0.98
    all:
      - id: assembly-load-decrypt-call
      - id: inline-pe-base64-drop
      - id: micro-behaviors/crypto/kdf/password::dotnet-password-kdf
    any:
      - id: commonappdata-exe-drop
      - id: reflected-getmethod-dispatch
      - id: micro-behaviors/crypto/symmetric/aes/library::aes-decrypt-csharp
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-methodinfo-invoke
