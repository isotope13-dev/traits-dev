defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: delphi-kol-pas-path-objective
    desc: Delphi Key Objects Library (KOL) source path
    crit: component
    if:
      type: text
      substr: kol.pas
  - id: borland-rtl-regkey-objective
    desc: Borland Delphi RTL registry key string
    crit: component
    if:
      type: text
      substr: SOFTWARE\Borland\Delphi\RTL
composite_rules:
  - id: delphi-packed-overlay-dropper
    desc: Delphi packed wrapper/dropper with large overlay payload
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/binary/layout::pe-embedded
    any:
      - id: delphi-kol-pas-path-objective
      - id: borland-rtl-regkey-objective
    unless:
      - id: well-known/app/peazip::peazip-inno-uninstaller
