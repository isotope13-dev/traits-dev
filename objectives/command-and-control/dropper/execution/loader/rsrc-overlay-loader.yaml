defaults:
  for: [pe]
  platforms: [windows]

composite_rules:
  - id: rsrc-overlay-memory-loader
    desc: Resource overlay memory loader
    crit: hostile
    conf: 0.98
    attack: T1620
    mbc: B0030
    all:
      - id: metadata/binary/resource::duplicate-rwx-rsrc-sections
      - id: metadata/binary/layout::overlay-dominates-third
      - id: metadata/binary/layout::pe-checksum-mismatch
      - id: metadata/binary/symbols/imports::few-import-count
      - id: micro-behaviors/dylib/load/runtime::load-library-a
      - id: micro-behaviors/os/module/load::get-proc-address-import
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
      - id: objectives/anti-static/obfuscation/payload/encoded::large-hex-string-dup
      - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/framework::dotnet-assembly
