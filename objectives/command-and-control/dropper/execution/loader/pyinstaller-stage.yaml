defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027,T1055,T1105

composite_rules:
  - id: pyinstaller-cookie-network-shell-loader
    desc: PyInstaller loader reads cookies and launches shell subprocesses
    crit: hostile
    conf: 0.99
    attack: T1185,T1059,T1105
    mbc: B0030,B0032
    scope: outer
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-extraction
      - id: metadata/binary/layout::high-entropy-overlay
      - id: micro-behaviors/communications/http/cookies::http-cookiejar
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/process/create/subprocess::subprocess-shell-pyc
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import

  - id: pyinstaller-network-process-discovery-loader
    desc: PyInstaller loader uses HTTP, key derivation, and process discovery
    crit: hostile
    conf: 0.98
    attack: T1057,T1105
    mbc: B0032
    scope: outer
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-extraction
      - id: metadata/binary/layout::high-entropy-overlay
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/crypto/kdf/algorithm::pbkdf2
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import

  - id: pyinstaller-opaque-embedded-pe-loader
    desc: PyInstaller onefile loader with a high-entropy embedded PE stage
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-bootstrap
      - id: metadata/binary/layout::high-entropy-overlay
      - id: metadata/binary/layout::overlay-dominates-90pct
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-validation-sequence
      - id: micro-behaviors/process/create/shell/spawn::win-createprocess

  - id: pyinstaller-inline-pe-memory-loader
    desc: PyInstaller PE stage changes memory and spawns
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-bootstrap
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-validation-sequence
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/create/shell/spawn::win-createprocess

  - id: pyinstaller-encrypted-reloc-loader
    desc: PyInstaller loader with encrypted relocation payload
    crit: hostile
    conf: 0.98
    attack: T1027.002,T1027.009
    mbc: B0032
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-meipass-elf
      - id: objectives/anti-static/pack/section-anomaly::reloc-encrypted-dominant-overlay
      - id: micro-behaviors/process/create/spawn::create-process-w
