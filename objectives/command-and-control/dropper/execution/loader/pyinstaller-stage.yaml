defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027,T1055,T1105

composite_rules:
  - id: pyinstaller-opaque-embedded-pe-loader
    desc: PyInstaller onefile loader with a high-entropy embedded PE stage
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-bootstrap
      - id: metadata/binary/layout::high-entropy-overlay
      - id: metadata/binary/layout::overlay-dominates-90pct
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-validation-sequence
      - id: micro-behaviors/process/create/shell/spawn::win-createprocess

  - id: pyinstaller-inline-pe-memory-loader
    desc: PyInstaller PE stage changes memory and spawns
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-bootstrap
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-validation-sequence
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/create/shell/spawn::win-createprocess
