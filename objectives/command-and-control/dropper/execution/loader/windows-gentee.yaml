defaults:
  for: [pe, dll]
  platforms: [windows]
composite_rules:
  - id: staged-gentee-runtime-loader
    desc: Staged Gentee runtime DLL loader
    crit: suspicious
    conf: 0.95
    attack: "T1055"
    all:
      - id: micro-behaviors/process/interpreter/gentee::gentee-runtime-init
      - id: micro-behaviors/process/interpreter/gentee::gentee-runtime-load
      - id: micro-behaviors/process/interpreter/gentee::gentee-runtime-temp-dll-template
    any:
      - id: micro-behaviors/process/interpreter/gentee::gentee-launcher-decode-get
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: micro-behaviors/dylib/load/runtime::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/fs/file/delete::deletefile-a
      - id: micro-behaviors/process/sync/mutex::create-mutex
    needs: 3
  - id: chrome-branded-gentee-overlay-loader
    desc: Chrome-branded Gentee loader with a dominant executable overlay
    crit: hostile
    conf: 0.99
    attack: "T1036.005,T1027,T1105"
    all:
      - id: micro-behaviors/process/interpreter/gentee::gentee-launcher-decode-apis
      - id: metadata/binary/layout::overlay-dominates-90pct
      - id: objectives/evasion/masquerade/version-resource/claim::chrome-setup-description-claim
      - id: objectives/evasion/masquerade/version-resource/claim::chrome-product-claim
