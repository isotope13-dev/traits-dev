# Managed remote-binary staging and execution.
# This is intentionally separate from generic .NET loaders: a remote-control
# method cluster is required in addition to write/execute mechanics.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1105,T1059
  mbc: B0023

composite_rules:
  - id: managed-remote-binary-hidden-execution
    desc: Managed remote binary staged and hidden-executed
    crit: hostile
    conf: 0.98
    attack: T1105,T1059,T1564.003
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: objectives/command-and-control/backdoor/binary::managed-remote-control-method-cluster
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: objectives/command-and-control/dropper/delivery/download-execute::processstartinfo-exec-token
      - id: micro-behaviors/process/create/hidden::dotnet-create-no-window
    any:
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-create-decryptor
      - id: micro-behaviors/os/registry/manipulate::dotnet-registry-delete-value-member
      - id: micro-behaviors/process/terminate/kill::dotnet-kill-member-reference
    needs: 2
    unless:
      - id: metadata/signed/platform/
