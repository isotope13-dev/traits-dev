defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1027.009

traits:
  - id: assembly-load-from-bytes
    desc: Assembly.Load from byte array
    crit: suspicious
    conf: 0.96
    mbc: F0001.006
    if:
      type: text
      substr: Assembly.Load(memoryStream.ToArray())
  - id: entrypoint-invoke
    desc: Loaded assembly entry point invoke
    crit: suspicious
    conf: 0.95
    mbc: E1059
    if:
      type: text
      substr: entryPoint.Invoke((object) null, parameters2)
  - id: guid-resource-payload
    desc: GUID named embedded payload
    crit: suspicious
    conf: 0.98
    if:
      type: string_literal
      exact: A6C24BF5-3690-4982-887E-11E1B159B249
  - id: invoke-embedded-app
    desc: Embedded app entry invocation
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: NetzStarter.InvokeApp(NetzStarter.GetAssembly(NetzStarter.GetResource(

composite_rules:
  - id: dotnet-netz-memory-loader
    desc: .NET netz memory loader chain
    crit: suspicious
    conf: 0.98
    mbc: E1059
    all:
      - id: assembly-load-from-bytes
      - id: entrypoint-invoke
      - id: invoke-embedded-app
    any:
      - id: guid-resource-payload
      - id: micro-behaviors/data/compress/library::sharpziplib-inflaterinputstream
      - id: micro-behaviors/data/embedded/payload::netz-resource-loader-primitives
  - id: dotnet-netz-stage-loader
    desc: .NET staged resource loader stub
    crit: hostile
    conf: 0.99
    mbc: F0001.006
    all:
      - id: dotnet-netz-memory-loader
      - id: micro-behaviors/data/embedded/payload::netz-resource-loader-primitives
    any:
      - id: micro-behaviors/data/embedded/payload::netz-dll-probe-fallback
      - id: micro-behaviors/data/compress/library::sharpziplib-inflaterinputstream
      - id: guid-resource-payload
