defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: encrypted-resource-overlay-process-loader
    desc: PE extracts resource data and executes it from an obfuscated overlay
    crit: hostile
    conf: 0.99
    attack: T1027.009
    all:
      - id: micro-behaviors/data/embedded/payload/resource::find-resource-any
      - id: micro-behaviors/data/embedded/payload/resource::load-resource
      - id: micro-behaviors/data/embedded/payload/resource::sizeof-resource
      - id: micro-behaviors/data/embedded/payload/resource::lock-resource
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
      - id: metadata/binary/layout::large-overlay-1mb
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/installer/family/
        - id: well-known/lib/protection/
    unless:
      - id: metadata/binary/installer/database::advanced-installer-bootstrapper
