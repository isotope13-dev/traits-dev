defaults:
  for: [csharp]
  platforms: [windows]
composite_rules:
  - id: temp-payload-exec-dropper
    desc: Temp payload drop and execute
    crit: hostile
    conf: 0.97
    attack: T1059
    all:
      - id: micro-behaviors/fs/write/file::writeallbytes-any
      - id: micro-behaviors/fs/path/temp::temp-randomized-drop-path
      - id: micro-behaviors/process/create/vb-shell::interaction-shell
  - id: temp-payload-exec-with-ping-gate
    desc: Temp dropper with ping gate
    crit: hostile
    conf: 0.95
    all:
      - id: temp-payload-exec-dropper
      - id: objectives/anti-analysis/sandbox-detect/timing::vbnet-ping-delay-loop
