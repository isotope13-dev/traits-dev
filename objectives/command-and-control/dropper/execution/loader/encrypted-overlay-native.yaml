defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
- id: encrypted-overlay-manual-pe-stage
  desc: Encrypted overlay is manually mapped as an in-memory PE stage
  crit: hostile
  conf: 0.98
  attack: "T1027.009, T1620"
  all:
  - id: objectives/anti-static/obfuscation/payload/self-read::pe-overlay-self-extractor
  - id: micro-behaviors/crypto/symmetric/aes/constant::aes-sbox-bytes-pe-rdata
  - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-validation-sequence
  - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
  - id: micro-behaviors/os/exception/register::rtl-add-function-table
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: well-known/tool/reverse-engineering/

- id: tls-inline-pe-memory-loader
  desc: PE inline-PE loader protects high-entropy data
  crit: hostile
  conf: 0.99
  attack: T1036.005,T1027.002,T1027.009,T1620
  all:
  - id: objectives/evasion/masquerade/trust::unsigned-pe-microsoft-version-claim
  - id: metadata/binary/layout::pe-multiple-tls-callbacks
  - id: metadata/binary/section/metrics::high-entropy-rdata-section
  - id: micro-behaviors/fs/file/pe-inspect::inline-pe-signature-check
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  unless:
  - id: metadata/signed/platform/
  - id: metadata/signed/certificate/identity/
  - id: metadata/binary/installer/family/
