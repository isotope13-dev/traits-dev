defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
- id: encrypted-overlay-manual-pe-stage
  desc: Encrypted overlay is manually mapped as an in-memory PE stage
  crit: hostile
  conf: 0.98
  attack: "T1027.009, T1620"
  all:
  - id: objectives/anti-static/obfuscation/payload/self-read::pe-overlay-self-extractor
  - id: micro-behaviors/crypto/symmetric/aes/constant::aes-sbox-bytes-pe-rdata
  - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-validation-sequence
  - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
  - id: micro-behaviors/os/exception/register::rtl-add-function-table
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: well-known/tool/reverse-engineering/
