defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
  attack: T1620
  mbc: B0030
traits:
  - id: beacon-printf-export
    desc: BeaconPrintf BOF API export
    crit: component
    conf: 0.95
    if:
      type: text
      word: BeaconPrintf
  - id: beacon-output-export
    desc: BeaconOutput BOF API export
    crit: component
    conf: 0.95
    if:
      type: text
      word: BeaconOutput
  - id: beacon-data-parse-export
    desc: BeaconDataParse BOF API export
    crit: component
    conf: 0.95
    if:
      type: text
      word: BeaconDataParse
  - id: beacon-data-int-export
    desc: BeaconDataInt BOF API export
    crit: component
    conf: 0.95
    if:
      type: text
      word: BeaconDataInt
  - id: beacon-data-short-export
    desc: BeaconDataShort BOF API export
    crit: component
    conf: 0.95
    if:
      type: text
      word: BeaconDataShort
  - id: beacon-data-length-export
    desc: BeaconDataLength BOF API export
    crit: component
    conf: 0.95
    if:
      type: text
      word: BeaconDataLength
  - id: beacon-data-extract-export
    desc: BeaconDataExtract BOF API export
    crit: component
    conf: 0.95
    if:
      type: text
      word: BeaconDataExtract
  - id: bof-executed-message
    desc: BOF execution status message
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'BOF (executed|execution failed)'
  - id: imp-prefix-marker
    desc: COFF __imp_ prefix marker
    crit: component
    conf: 0.4
    if:
      type: text
      word: __imp_
    unless:
      - id: well-known/app/drivers/
composite_rules:
  - id: cobalt-strike-bof-host
    desc: Beacon Object File (BOF/COFF) loader runtime
    crit: hostile
    conf: 0.97
    # Beacon* API is the Cobalt Strike BOF spec, but Sliver, Brute Ratel,
    # Havoc, Mythic and others all expose the same runtime API. Family
    # attribution belongs in well-known/.
    needs: 4
    any:
      - id: beacon-printf-export
      - id: beacon-output-export
      - id: beacon-data-parse-export
      - id: beacon-data-int-export
      - id: beacon-data-short-export
      - id: beacon-data-length-export
      - id: beacon-data-extract-export
      - id: bof-executed-message
      - id: imp-prefix-marker
