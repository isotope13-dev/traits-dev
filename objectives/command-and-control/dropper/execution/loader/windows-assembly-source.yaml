defaults:
  for: [c, text]
  platforms: [windows]
  attack: T1620
  mbc: B0024
traits:
- id: fasm-pe-gui-source
  desc: FASM PE GUI source header
  crit: component
  conf: 0.84
  if:
    type: text
    substr: 'format PE GUI 4.0'
- id: pebcall-loader-source
  desc: PEB API call loader source
  crit: component
  conf: 0.88
  if:
    type: text
    substr: 'pebcall	PEB_Kernel32Dll, PEB_LoadLibraryW'
- id: fasm-wininet-loadlibrary
  desc: FASM loader imports WinInet
  crit: component
  conf: 0.86
  if:
    type: text
    substr: "lodstrw	'wininet.dll'"
- id: fasm-runpe-include
  desc: RunPE include in assembly loader
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: "include\\s+['\"]RunPE\\.asm['\"]"
- id: fasm-loader-stage-includes
  desc: Assembly loader stage include set
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "include\\s+['\"](Download|Drop|Melt|Compression)\\.asm['\"]"
  count_min: 3
composite_rules:
- id: fasm-peb-runpe-dropper-source
  desc: FASM PEB RunPE dropper source
  crit: hostile
  conf: 0.97
  all:
  - id: fasm-pe-gui-source
  - id: pebcall-loader-source
  - id: fasm-runpe-include
  - id: fasm-loader-stage-includes
  any:
  - id: fasm-wininet-loadlibrary
  - id: objectives/evasion/process/injection/hollowing::runpe-source-code
- id: fasm-wininet-runpe-stage-loader
  desc: FASM WinInet RunPE stage loader
  crit: hostile
  conf: 0.97
  all:
  - id: pebcall-loader-source
  - id: fasm-wininet-loadlibrary
  - id: fasm-runpe-include
  - id: fasm-loader-stage-includes
