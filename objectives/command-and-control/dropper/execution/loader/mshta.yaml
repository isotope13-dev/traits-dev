# Windows MSHTA LOLBin Traits
# Detects abuse of mshta.exe for remote code execution
# MBC: E1218.005 (System Binary Proxy Execution: Mshta)
# ATT&CK: T1218.005
defaults:
  platforms: [unix, windows]
  for: [batch, shell, powershell]
  attack: "T1218.005"
traits:
  - id: mshta-invoke
    desc: MSHTA execution invocation
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(?i)\bmshta\b'
  - id: mshta-remote-url
    desc: MSHTA remote payload fetch
    crit: suspicious
    conf: 0.95
    mbc: "E1218.005"
    if:
      type: text
      regex: '(?i)\bmshta\s+https?://'
  - id: mshta-https-b64-fragment
    desc: Encoded MSHTA HTTPS fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: string_literal
      exact: EuZXhlIGh0dHBzO
  - id: geo-foundation-b64-fragment
    desc: Encoded geo-foundation domain fragment
    crit: component
    conf: 0.95
    for: [powershell]
    if:
      type: string_literal
      exact: ZvdW5kYXRp
  - id: mshta-inline-vbscript
    desc: MSHTA inline VBScript execution
    crit: suspicious
    conf: 0.9
    mbc: "E1218.005"
    if:
      type: text
      regex: '(?i)\bmshta\s+[''"]?vbscript:'
  - id: mshta-inline-javascript
    desc: MSHTA inline JavaScript execution
    crit: suspicious
    conf: 0.9
    mbc: "E1218.005"
    if:
      type: text
      regex: '(?i)\bmshta\s+[''"]?javascript:'
composite_rules:
  - id: ps-fragmented-mshta-remote-url
    desc: Fragmented MSHTA remote payload fetch
    crit: suspicious
    conf: 0.96
    for: [powershell]
    all:
      - id: mshta-https-b64-fragment
      - id: geo-foundation-b64-fragment
