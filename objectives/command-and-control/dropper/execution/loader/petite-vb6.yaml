# Petite-packed VB6 loader: a small PE stub packed with Petite that
# imports msvbvm60.dll (_CIcos) alongside memory allocation APIs
# (VirtualAlloc, VirtualProtect). This pattern is characteristic of
# Elex test-loader variants and similar VB6-based droppers.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.002
  mbc: B0032
composite_rules:
  - id: petite-vb6-memory-loader
    desc: Petite-packed VB6 memory loader
    crit: suspicious
    conf: 0.93
    all:
      - id: objectives/anti-static/pack/detect::petite-section
      - id: metadata/binary/framework::vb6-runtime-dll
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    any:
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/dylib/load::load-library-a
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
