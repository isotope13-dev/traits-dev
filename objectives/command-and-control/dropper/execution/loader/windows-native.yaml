defaults:
  for:
    - pe
  platforms:
    - windows
traits:
  - id: large-export-table
    desc: Large export table
    crit: component
    conf: 0.8
    if:
      type: metrics
      field: binary.export_count
      min: 500
  - id: small-loader-executable
    desc: Small executable with loader-style filename
    crit: notable
    conf: 0.7
    size_min: 512
    size_max: 102400
    if:
      type: text
      regex: (?i)\b[a-z0-9_-]*loader[a-z0-9._-]*\.exe\b
      section: .text
  - id: coreclr-runtime-binary
    desc: CoreCLR runtime binary
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: coreclr.dll
composite_rules:
  - id: common-windows-installer-profile
    desc: Common Windows installer false positive profile
    crit: component
    conf: 0.75
    any:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/vendor/microsoft::is-microsoft-named
      - id: metadata/vendor/microsoft::is-windows-named
      - id: metadata/vendor/microsoft::microsoft-corp-marker
      - id: metadata/signed/platform::microsoft
  - id: mingw-thread-message-loader
    desc: MinGW loader with thread and message queue plumbing
    crit: suspicious
    conf: 0.85
    attack: T1129
    size_max: 102400
    all:
      - id: micro-behaviors/process/thread/create::create-thread
      - id: micro-behaviors/os/message/queue::peek-message-a
      - id: micro-behaviors/os/message/queue::post-thread-message-a
      - id: metadata/lang/compiler/native::gcc-compiler
    unless:
      - id: metadata/binary/metrics::many-exports
  - id: exception-table-loader-control
    desc: Small loader with custom exception table control
    crit: suspicious
    conf: 0.8
    attack: T1006
    all:
      - id: small-loader-executable
      - id: micro-behaviors/os/exception/register::rtl-add-function-table
      - id: micro-behaviors/os/exception/handler::capture-context
      - id: micro-behaviors/os/exception/handler::virtual-unwind
    unless:
      - id: metadata/binary/metrics::many-functions
  - id: exception-registered-memory-loader
    desc: Memory-executing loader with registered exception table
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/os/exception/register::rtl-add-function-table
    unless:
      - id: coreclr-runtime-binary
      - id: metadata/binary/metrics::many-exports
  - id: sparse-manual-pe-loader
    desc: Sparse native manual PE loader
    crit: suspicious
    conf: 0.95
    attack: T1620
    mbc: B0030
    size_min: 65536
    size_max: 262144
    all:
      - id: metadata/binary/section/metrics::sparse-zeroed-loader-layout
      - id: objectives/anti-static/obfuscation/imports::pe-export-walk-primitive
    any:
      - id: objectives/command-and-control/dropper/execution/loader::pe-single-import
      - id: objectives/command-and-control/dropper/execution/loader::pe-few-imports
      - id: metadata/binary/metrics::no-imports
      - id: micro-behaviors/os/exception/handler::seh-chain-access
    needs: 2
    unless:
      - id: common-windows-installer-profile
      - id: metadata/binary/framework::dotnet-assembly
  - id: custom-packed-overlay-native-loader
    desc: Custom packed native loader with overlay payload
    crit: hostile
    conf: 0.98
    attack: T1129
    mbc: B0030
    size_min: 1048576
    all:
      - id: metadata/binary/section/metrics::empty-rdata-section-pe
      - id: metadata/binary/section/metrics::empty-data-section-pe
      - id: metadata/binary/section/metrics::empty-custom-exec-decoy
      - id: metadata/binary/section/metrics::giant-custom-exec-section
      - id: metadata/binary/metrics::dominant-section
      - id: micro-behaviors/os/module/load::get-proc-address-import
    any:
      - id: micro-behaviors/dylib/load::load-library-a
      - id: metadata/binary/metrics::no-functions
      - id: objectives/anti-static/obfuscation/binary-metrics::import-count-under-80
      - id: metadata/binary/layout::has-overlay
    needs: 3
    unless:
      - id: common-windows-installer-profile
      - id: metadata/binary/framework::dotnet-assembly
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed/platform::microsoft
  - id: small-mingw-threaded-loader
    desc: Small MinGW threaded loader with exception registration
    crit: suspicious
    conf: 0.75
    all:
      - id: small-loader-executable
      - id: metadata/lang/compiler/native::gcc-compiler
      - id: micro-behaviors/process/thread/create::create-thread
      - id: micro-behaviors/os/exception/register::rtl-add-function-table
      - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: mingw-c-runtime-loader
    desc: MinGW C runtime loader profile
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/mem/c-runtime/functions::malloc
      - id: micro-behaviors/mem/c-runtime/functions::free-dup
      - id: metadata/lang/compiler/native::gcc-compiler
    unless:
      - id: metadata/lang/compiler/systems::go-binary
  - id: ini-driven-file-stager
    size_max: 5242880
    desc: INI driven file stager with process handoff
    crit: suspicious
    conf: 0.92
    attack: T1106
    mbc: B0030
    all:
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/fs/config/system::ini-read-write-cycle
    any:
      - id: micro-behaviors/fs/file/delete::deletefile-w
      - id: objectives/anti-static/obfuscation/reflection/class::dynamic-load-pattern
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
    needs: 2
    downgrade:
      any:
        - id: common-windows-installer-profile
        - id: metadata/lang/compiler/managed::delphi
        - id: metadata/package/versioning::pe-version-resource
    unless:
      - id: large-export-table
      - id: metadata/lang/compiler/managed::delphi
  - id: ini-driven-plugin-loader
    desc: INI configured DLL plugin loader
    crit: suspicious
    conf: 0.93
    attack: T1574.002
    mbc: B0030
    all:
      - id: micro-behaviors/fs/config/system::ini-read-write-cycle
      - id: micro-behaviors/dylib/load::load-library-w
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/process/thread/create::create-thread
    any:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/process/create/spawn::create-process-w
    needs: 1
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics::many-exports
  - id: self-copy-relaunch-loader
    desc: Self copy append and relaunch
    crit: suspicious
    conf: 0.94
    attack: T1129
    mbc: B0030
    all:
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/fs/path/check::get-module-filename
      - id: micro-behaviors/fs/file/delete::deletefile-w
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/operations::set-file-pointer
      - id: micro-behaviors/fs/file/write::write-file
      - id: micro-behaviors/time/query::get-tick-count
    downgrade:
      any:
        - id: common-windows-installer-profile
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/signed/platform::microsoft
        - id: metadata/package/versioning::pe-fileversion-field
        - id: metadata/package/versioning::pe-version-resource
        - type: metrics
          field: binary.function_count
          min: 1000
  - id: ini-int-configured-plugin-loader
    desc: INI integer configured plugin loader
    crit: suspicious
    conf: 0.91
    attack: T1574.002
    mbc: B0030
    all:
      - id: micro-behaviors/fs/config/system::ini-read-int-write-cycle
      - id: micro-behaviors/dylib/load::load-library-w
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/process/thread/create::create-thread
    any:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/process/create/spawn::create-process-w
    needs: 1
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics::many-exports
  - id: userprofile-staged-native-loader
    desc: User profile staged native loader
    crit: suspicious
    conf: 0.9
    attack: T1027
    mbc: B0032
    all:
      - id: micro-behaviors/os/env/vars/user-info::userprofile-var
      - id: micro-behaviors/fs/directory/mkdir::create-directory-a
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/write::write-file
    any:
      - id: objectives/anti-analysis/self-modify/runtime::xor-modulo-key-loop-x64
      - id: objectives/anti-analysis/self-modify/runtime::xor-loop-pattern
      - id: objectives/anti-static/obfuscation/payload/encrypted::large-data-section
      - id: objectives/anti-static/obfuscation/payload/section::oversized-data-section
      - id: micro-behaviors/dylib/load::load-library-ex-w
      - id: micro-behaviors/dylib/lookup::get-proc-address
    needs: 2
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native::msvc
        - id: metadata/signed/platform::microsoft
  - id: local-decrypt-overwrite-exec
    desc: Local decrypt overwrite and execute
    crit: suspicious
    conf: 0.95
    attack: T1027
    mbc: B0030
    all:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/read::read-file
      - id: micro-behaviors/fs/file/write::write-file
      - id: micro-behaviors/fs/file/truncate::set-end-of-file-win
      - id: micro-behaviors/crypto/symmetric/xor::backward-byte-xor-loop-i386
    any:
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: objectives/anti-static/obfuscation/encoding::rc4-sbox-init
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: registry-aware-encrypted-stager
    desc: Registry aware encrypted file staging loader
    crit: suspicious
    conf: 0.93
    attack: T1027
    mbc: B0030
    all:
      - id: micro-behaviors/fs/file/read::read-file
      - id: micro-behaviors/fs/file/write::write-file
      - id: micro-behaviors/fs/file/truncate::set-end-of-file-win
      - id: micro-behaviors/fs/enumerate/directory::find-first-file
      - id: micro-behaviors/os/registry/access::registry-read-api-chain
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-data
    any:
      - id: objectives/anti-static/obfuscation/payload/section::oversized-data-section
      - id: objectives/anti-static/obfuscation/encoding::rc4-sbox-init
      - id: objectives/anti-analysis/timing/evasion::timing-check-minimal-stub
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    needs: 2
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/vendor/microsoft::is-windows-named
        - id: metadata/signed/platform::microsoft
