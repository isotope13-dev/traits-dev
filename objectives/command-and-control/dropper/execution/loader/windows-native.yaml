defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
traits:
- id: large-export-table
  desc: Large export table
  crit: component
  conf: 0.8
  if:
    type: metrics
    field: binary.export_count
    min: 500
- id: small-loader-executable
  desc: Small executable with loader-style filename
  crit: suspicious
  conf: 0.7
  size_min: 512
  size_max: 102400
  if:
    type: text
    regex: (?i)\b[a-z0-9_-]*loader[a-z0-9._-]*\.exe\b
    section: .text
- id: short-bin-sidecar-reference
  desc: Short BIN sidecar reference
  crit: component
  conf: 0.82
  for: [pe]
  if:
    type: text
    section: .rdata
    regex: '(?i)\b[a-z0-9_]{4,8}\.bin\b'
- id: pe-dir64-relocation-loop-x64
  desc: PE DIR64 relocation loop
  crit: component
  conf: 0.84
  for: [pe]
  if:
    type: hex
    section: .text
    pattern: 41 81 E6 00 F0 00 00 66 41 81 FE 00 A0
- id: x64-indirect-payload-call-r13
  desc: x64 indirect payload call
  crit: component
  conf: 0.7
  for: [pe]
  if:
    type: hex
    section: .text
    pattern: 41 FF D5
