defaults:
  platforms: [windows]
  for: [binaries, scripts]

traits:
  - id: dotnet-packed-resource-stub
    desc: Compatibility alias
    crit: component
    conf: 1.0
    if:
      id: objectives/evasion/masquerade/version-resource::objectives/command-and-control/dropper/execution/loader::dotnet-packed-resource-stub
  - id: dotnet-base64-entrypoint-loader
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      exact: __cleave_missing_dotnet_base64_entrypoint_loader__
  - id: file-write
    desc: Compatibility placeholder
    crit: component
    conf: 1.0
    if:
      type: text
      exact: __cleave_missing_loader_file_write__
