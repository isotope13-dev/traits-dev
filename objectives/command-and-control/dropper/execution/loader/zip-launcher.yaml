# C++ "launcher.cpp" loader scaffold: PE that statically links minizip and
# carries an embedded ZIP archive in its .data section, then extracts and
# executes the staged payload at runtime. Common in commodity dropper-as-a-
# service kits (signed Eilio cert family, Verisign-installer brand decoys).
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1140
  mbc: B0023

traits:
  - id: launcher-cpp-source-leak
    desc: launcher.cpp source filename leak
    crit: component
    conf: 0.85
    if:
      type: text
      word: launcher.cpp

composite_rules:
  - id: minizip-zip-data-launcher
    desc: PE launcher with bundled minizip and ZIP-in-data payload
    crit: suspicious
    conf: 0.93
    all:
      - id: metadata/library/compression::minizip-101-banner
      - id: launcher-cpp-source-leak
      - id: micro-behaviors/data/embedded/payload/archive::zip-locals-in-data-pe
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
  - id: signed-minizip-packed-stage-loader
    desc: Signed minizip loader carries encrypted data
    crit: hostile
    conf: 0.97
    attack: T1027.002
    all:
      - id: minizip-zip-data-launcher
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-data-geometry
    any:
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-data-section
      - id: objectives/anti-analysis/debugger-detect/check::exception-filtered-packed-loader-windows-loader
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: micro-behaviors/dylib/load/runtime::load-library-w
    needs: 2
    unless:
      - id: metadata/signed/platform/
  - id: signed-minizip-checksum-stage-loader
    desc: Signed minizip stage checksum mismatch
    crit: hostile
    conf: 0.98
    attack: T1027.002
    all:
      - id: minizip-zip-data-launcher
      - id: metadata/binary/layout::pe-checksum-mismatch
      - id: objectives/anti-static/obfuscation/payload/section::packed-loader-data-geometry
    any:
      - id: objectives/anti-static/obfuscation/imports::pe-api-hashing-indicator-single
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-data-section
      - id: objectives/anti-analysis/debugger-detect/check::exception-filtered-packed-loader-windows-loader
      - id: micro-behaviors/process/terminate/kill::terminate-process
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform/
