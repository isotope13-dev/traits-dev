# C++ "launcher.cpp" loader scaffold: PE that statically links minizip and
# carries an embedded ZIP archive in its .data section, then extracts and
# executes the staged payload at runtime. Common in commodity dropper-as-a-
# service kits (signed Eilio cert family, Verisign-installer brand decoys).
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1140
  mbc: B0023

traits:
  - id: launcher-cpp-source-leak
    desc: launcher.cpp source filename leak
    crit: component
    conf: 0.85
    if:
      type: text
      word: launcher.cpp

  - id: minizip-banner-component
    desc: minizip 1.01 banner in PE
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'unzip 1.01 Copyright 1998-2004 Gilles Vollant'

composite_rules:
  - id: minizip-zip-data-launcher
    desc: PE launcher with bundled minizip and ZIP-in-data payload
    crit: suspicious
    conf: 0.93
    all:
      - id: minizip-banner-component
      - id: launcher-cpp-source-leak
      - id: micro-behaviors/data/embedded/payload::zip-locals-in-data-pe
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
