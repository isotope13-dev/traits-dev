defaults:
  platforms:
  - unix
  - windows
  for: [makefile]
  attack: T1620
  mbc: B0030

composite_rules:
  - id: bof-module-makefile
    desc: Beacon Object File module build
    crit: notable
    conf: 0.9
    all:
      - id: metadata/build/make::makefile-basename
      - id: metadata/build/make::bof-common-include
      - id: metadata/build/make::objcopy-strip-debug-command
    any:
      - id: metadata/build/make::hidden-visibility-flag
      - id: metadata/build/make::no-stack-protector-flag
  - id: crtless-dual-arch-bof-makefile
    desc: CRT-less dual-arch Beacon Object File build
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/build/make::makefile-basename
      - id: metadata/build/make::dual-arch-mingw-cross-compile
      - id: metadata/build/make::dual-arch-bof-object-targets
    any:
      - id: metadata/build/make::no-ntdll-crt-flag
      - id: metadata/build/make::bof-common-include
      - id: metadata/build/make::objcopy-strip-debug-command
      - id: metadata/build/make::strip-all-symbols-flag
    needs: 2
