defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1105
traits:
  - id: self-exe-read-vb6
    desc: VB6 reads its own executable
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: 'Open App.Path + "\" + App.EXEName + ".exe" For Binary'
  - id: appended-payload-delimiter-vb6
    desc: VB6 appended payload delimiter
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: '##<>()&abcdefg&()<>##'
  - id: split-appended-payload-vb6
    desc: VB6 splits appended payload
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: DataFile = Splitter(Data, FileEnde)(1)
  - id: decrypt-appended-payload-vb6
    desc: VB6 decrypts appended payload
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: Code = cCrypt.DecryptString(DataFile)
  - id: payload-to-byte-loader-vb6
    desc: VB6 converts payload to bytes
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: Loader = StrConv(Code, vbFromUnicode)
  - id: final-loader-call-vb6
    desc: VB6 calls final loader
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: Call Final(InjectionPath, Loader)
  - id: self-path-loader-target-vb6
    desc: VB6 uses self path as target
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: InjectionPath = ThisExe

composite_rules:
  - id: pe-resource-surgery-vb6
    desc: VB6 PE resource surgery support
    crit: suspicious
    conf: 0.9
    all:
      - type: trait
        id: micro-behaviors/fs/file/section::asm-pe-header-manipulation-entrypoint
      - type: trait
        id: micro-behaviors/fs/file/section::pe-viewer-header-labels
  - id: appended-payload-loader-vb6
    desc: VB6 appended payload self loader
    crit: hostile
    conf: 0.98
    all:
      - type: trait
        id: self-exe-read-vb6
      - type: trait
        id: appended-payload-delimiter-vb6
      - type: trait
        id: split-appended-payload-vb6
      - type: trait
        id: decrypt-appended-payload-vb6
      - type: trait
        id: payload-to-byte-loader-vb6
      - type: trait
        id: final-loader-call-vb6
  - id: crypter-builder-loader-vb6
    desc: VB6 crypter builder and loader
    crit: hostile
    conf: 0.97
    all:
      - type: trait
        id: appended-payload-loader-vb6
      - type: trait
        id: micro-behaviors/crypto/library::rc4-buffer-crypto-vb6
    any:
      - type: trait
        id: self-path-loader-target-vb6
      - type: trait
        id: pe-resource-surgery-vb6
