defaults:
  platforms: [windows]
  for: [source, vbs]
  attack: T1105
traits:
- id: self-exe-read-vb6
  desc: VB6 reads its own executable
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'App\.EXEName\s*[+&]\s*"\.exe"'
- id: appended-payload-delimiter-vb6
  desc: VB6 appended payload delimiter
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: '##<>\(\)&abcdefg&\(\)<>##|!!!!!!!!!!!!!!!=\)\)'
- id: split-appended-payload-vb6
  desc: VB6 splits appended payload
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '=\s*Splitter\(.{0,64}\)\(1\)'
- id: decrypt-appended-payload-vb6
  desc: VB6 decrypts appended payload
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: 'cCrypt\.DecryptString\(DataFile\)|DecryptString\(ZXCVBNM\(1\), ZXCVBNM\(2\)\)'
- id: final-loader-call-vb6
  desc: VB6 calls final loader
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'Call Final\(InjectionPath, Loader\)|\b\w{6,}\(\w{3,32}, Command\)'
  unless:
  - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
- id: self-path-loader-target-vb6
  desc: VB6 uses self path as target
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: InjectionPath = ThisExe
- id: builder-stub-read-vb6
  desc: VB6 builder reads local stub
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'Open App\.Path\s*&\s*"\\\\STUB\.exe"\s+For Binary'
- id: eof-payload-read-vb6
  desc: VB6 reads preserved EOF payload
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'ReadEOFData\(|GetNullBytes\(30\)|StrReverse\(sFileBuf\)'
- id: eof-payload-write-vb6
  desc: VB6 writes preserved EOF payload
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'WriteEOFData\(|sFileBuf & sEOFData'
- id: hardcoded-des-key-vb6
  desc: VB6 hardcoded DES payload key
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: VIVALAMADREDELJOSE;;EEEE

- id: image-section-header-typedef
  desc: IMAGE_SECTION_HEADER typedef
  crit: component
  if:
    type: text
    substr: typedef struct _IMAGE_SECTION_HEADER

- id: image-nt-headers-typedef
  desc: IMAGE_NT_HEADERS typedef
  crit: component
  if:
    type: text
    substr: typedef struct _IMAGE_NT_HEADERS

composite_rules:
- id: aes-hex-payload-crypter-vb6
  desc: VB6 AES hex payload crypter
  crit: hostile
  conf: 0.97
  attack: T1027.013
  all:
  - id: micro-behaviors/crypto/symmetric/aes/vb6::rijndael-wrapper-vb6
  - id: micro-behaviors/data/encode/hex::vb6-bidirectional-hex-codec
  - id: micro-behaviors/os/random/prng/stdlib::vb6-rnd-alnum-key-generator
  - id: micro-behaviors/data/string/conversion::vb6-unicode-string-to-bytes

- id: pe-resource-surgery-vb6
  desc: VB6 PE resource surgery support
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/fs/file/section::asm-pe-header-manipulation-entrypoint
  - id: micro-behaviors/fs/file/section::pe-viewer-header-labels
  unless:
  - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: objectives/command-and-control/dropper/execution/loader::image-section-header-typedef
  - id: objectives/command-and-control/dropper/execution/loader::image-nt-headers-typedef
- id: appended-payload-loader-vb6
  desc: VB6 appended payload self loader
  crit: hostile
  conf: 0.98
  all:
  - id: self-exe-read-vb6
  - id: appended-payload-delimiter-vb6
  - id: split-appended-payload-vb6
  - id: decrypt-appended-payload-vb6
  - id: final-loader-call-vb6
  any:
  - id: micro-behaviors/data/string/conversion::vb6-unicode-string-to-bytes
  - id: eof-payload-read-vb6
- id: crypter-builder-loader-vb6
  desc: VB6 crypter builder and loader
  crit: hostile
  conf: 0.97
  all:
  - id: appended-payload-loader-vb6
  any:
  - id: self-path-loader-target-vb6
  - id: pe-resource-surgery-vb6
  - id: hardcoded-des-key-vb6
- id: eof-crypter-builder-vb6
  desc: VB6 EOF crypter builder workflow
  crit: hostile
  conf: 0.98
  all:
  - id: builder-stub-read-vb6
  - id: appended-payload-delimiter-vb6
  - id: hardcoded-des-key-vb6
  any:
  - id: eof-payload-read-vb6
  - id: eof-payload-write-vb6
