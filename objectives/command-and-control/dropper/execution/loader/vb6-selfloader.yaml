defaults:
  platforms: [windows]
  for: [source, vbs]
  attack: T1105
traits:
  - id: self-exe-read-vb6
    desc: VB6 reads its own executable
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'App\.EXEName\s*[+&]\s*"\.exe"'
  - id: appended-payload-delimiter-vb6
    desc: VB6 appended payload delimiter
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '##<>\(\)&abcdefg&\(\)<>##|!!!!!!!!!!!!!!!=\)\)'
  - id: split-appended-payload-vb6
    desc: VB6 splits appended payload
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '=\s*Splitter\(.{0,64}\)\(1\)'
  - id: decrypt-appended-payload-vb6
    desc: VB6 decrypts appended payload
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'cCrypt\.DecryptString\(DataFile\)|DecryptString\(ZXCVBNM\(1\), ZXCVBNM\(2\)\)'
  - id: payload-to-byte-loader-vb6
    desc: VB6 converts payload to bytes
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'StrConv\([^)]{1,48},\s*vbFromUnicode\)'
  - id: final-loader-call-vb6
    desc: VB6 calls final loader
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'Call Final\(InjectionPath, Loader\)|[A-Za-z0-9_]{6,}\(.{0,64}, Command\)'
  - id: self-path-loader-target-vb6
    desc: VB6 uses self path as target
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: InjectionPath = ThisExe
  - id: builder-stub-read-vb6
    desc: VB6 builder reads local stub
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'Open App\.Path\s*&\s*"\\\\STUB\.exe"\s+For Binary'
  - id: eof-payload-read-vb6
    desc: VB6 reads preserved EOF payload
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'ReadEOFData\(|GetNullBytes\(30\)|StrReverse\(sFileBuf\)'
  - id: eof-payload-write-vb6
    desc: VB6 writes preserved EOF payload
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'WriteEOFData\(|sFileBuf & sEOFData'
  - id: hardcoded-des-key-vb6
    desc: VB6 hardcoded DES payload key
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: VIVALAMADREDELJOSE;;EEEE

composite_rules:
  - id: pe-resource-surgery-vb6
    desc: VB6 PE resource surgery support
    crit: suspicious
    conf: 0.9
    all:
      - type: trait
        id: micro-behaviors/fs/file/section::asm-pe-header-manipulation-entrypoint
      - type: trait
        id: micro-behaviors/fs/file/section::pe-viewer-header-labels
  - id: appended-payload-loader-vb6
    desc: VB6 appended payload self loader
    crit: hostile
    conf: 0.98
    all:
      - type: trait
        id: self-exe-read-vb6
      - type: trait
        id: appended-payload-delimiter-vb6
      - type: trait
        id: split-appended-payload-vb6
      - type: trait
        id: decrypt-appended-payload-vb6
      - type: trait
        id: final-loader-call-vb6
    any:
      - type: trait
        id: payload-to-byte-loader-vb6
      - type: trait
        id: eof-payload-read-vb6
  - id: crypter-builder-loader-vb6
    desc: VB6 crypter builder and loader
    crit: hostile
    conf: 0.97
    all:
      - type: trait
        id: appended-payload-loader-vb6
    any:
      - type: trait
        id: self-path-loader-target-vb6
      - type: trait
        id: pe-resource-surgery-vb6
      - type: trait
        id: hardcoded-des-key-vb6
  - id: eof-crypter-builder-vb6
    desc: VB6 EOF crypter builder workflow
    crit: hostile
    conf: 0.98
    all:
      - type: trait
        id: builder-stub-read-vb6
      - type: trait
        id: appended-payload-delimiter-vb6
      - type: trait
        id: hardcoded-des-key-vb6
    any:
      - type: trait
        id: eof-payload-read-vb6
      - type: trait
        id: eof-payload-write-vb6
