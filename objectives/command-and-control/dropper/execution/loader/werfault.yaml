# Resource-backed .NET loaders that borrow the Windows Error Reporting
# identity. AssemblyResolve is a payload-loading surface; paired with process
# creation and the fabricated identity it is a hostile staged-loader pattern.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1129,T1105,T1036.005

composite_rules:
  - id: werfault-assemblyresolve-stage-loader
    desc: WerfaultStub masquerade with AssemblyResolve payload loading
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/evasion/masquerade/identity/fabricated::werfaultstub-original-filename-claim
      - id: objectives/evasion/masquerade/identity/fabricated::com-surrogate-description-claim
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: micro-behaviors/process/create/launch::create-process-api-name
      - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
