defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.013

traits:
  - id: luajit-bytecode-loader
    desc: LuaJIT bytecode module loader format
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: "luaJIT_BC_%s"

  - id: lua-noenv-env
    desc: LUA_NOENV runtime env name
    crit: component
    conf: 0.9
    if:
      type: text
      word: "LUA_NOENV"

  - id: lua-cpath-env
    desc: LUA_CPATH runtime env name
    crit: component
    conf: 0.9
    if:
      type: text
      word: "LUA_CPATH"

  - id: programdata-cache-datestamp
    desc: Date-stamped ProgramData cache drop file
    crit: component
    conf: 0.97
    if:
      type: text
      regex: '\\ProgramData\\cache\d{8}\.dat'

composite_rules:
  - id: luajit-runtime-cluster
    desc: LuaJIT runtime strings cluster
    crit: notable
    conf: 0.95
    all:
      - id: luajit-bytecode-loader
    any:
      - id: lua-noenv-env
      - id: lua-cpath-env

  - id: mfc-luajit-encrypted-rsrc-loader
    desc: Chinese MFC LuaJIT loader with encrypted rsrc
    crit: hostile
    conf: 0.97
    size_min: 524288
    all:
      - id: luajit-bytecode-loader
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
      - id: metadata/binary/framework::mfc-application-framework
    any:
      - id: lua-noenv-env
      - id: lua-cpath-env
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/

  - id: mfc-template-luajit-dropper
    desc: Unfinished MFC template with LuaJIT runtime
    crit: hostile
    conf: 0.97
    size_min: 262144
    all:
      - id: luajit-bytecode-loader
      - id: metadata/binary/framework::mfc-application-framework
    any:
      - id: objectives/evasion/masquerade/version-resource/claim::todo-company-name-zh-placeholder
      - id: objectives/evasion/masquerade/version-resource/claim::todo-product-name-zh-placeholder
      - id: objectives/evasion/masquerade/version-resource/claim::mfc-template-default-filename
    unless:
      - id: metadata/signed/platform/

  - id: programdata-cache-loader-cluster
    desc: ProgramData cache drop with keylog cluster
    crit: hostile
    conf: 0.95
    all:
      - id: programdata-cache-datestamp
      - id: objectives/collection/keylog/capture::windows-keylogger
    any:
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
      - id: micro-behaviors/hardware/display/screen::gdi-bitblt
      - id: micro-behaviors/hardware/input/keyboard/hook::foreground-window-input-state
    unless:
      - id: metadata/signed/platform/
