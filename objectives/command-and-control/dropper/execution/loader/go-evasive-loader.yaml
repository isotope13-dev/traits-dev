defaults:
  platforms:
    - unix
    - windows
  for: [binaries]
composite_rules:
  - id: go-evasive-loader
    desc: Go loader with sandbox evasion, self-mutation, and process injection
    crit: hostile
    all:
      - id: objectives/anti-static/obfuscation/instruction/junk-insertion::go-mutateself-func
      - id: objectives/anti-analysis/sandbox-detect/environment::go-issandbox-func
      - id: objectives/evasion/process/injection/runtime::suspend-thread
