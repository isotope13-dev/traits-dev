defaults:
  platforms: [unix, android]
  for: [elf]
traits:
  - id: elf-mmap-wx
    desc: 'Allocates anonymous EXE memory (WX) via mmap'
    crit: suspicious
    conf: 0.8
    attack: T1055
    mbc: B0004
    if:
      type: hex
      section: ".text"
      pattern: "B9 22 00 00 00 BA 06 00 00 00"
    unless:
      - id: well-known/lib/jax::jaxlib-wheel
