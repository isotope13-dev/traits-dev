defaults:
  for: [pe]
  platforms: [windows]
  attack: T1105

traits:
- id: ieexec-name-string
  desc: IEExec.exe loader name reference
  crit: baseline
  conf: 0.95
  if:
    type: text
    word: IEExec.exe

- id: ieexec-pdb-path
  desc: IEExec PDB path reference
  crit: baseline
  conf: 0.98
  if:
    type: text
    substr: IEExec.pdb

composite_rules:
- id: ieexec-overlay-dropper
  desc: IEExec loader with large overlay dropper
  crit: suspicious
  conf: 0.93
  all:
  - id: ieexec-name-string
  - id: metadata/binary/layout::overlay-over-90pct
  any:
  - id: ieexec-pdb-path
  - id: metadata/binary/layout::pe-embedded
