defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1620
  mbc: E1059

composite_rules:
  - id: dotnet-bitmap-stego-reflective-loader
    desc: .NET bitmap steganographic reflective loader
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload/image::dotnet-bitmap-type-token
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-manager-token
      - id: micro-behaviors/data/encode/image/pixel::pixel-access-getpixel
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-appdomain-exportedtype-invoke
    any:
      - id: objectives/anti-static/obfuscation/steganography/image::harvest-atlas-fragments-token
      - id: objectives/anti-static/pack/entropy::dotnet-large-packed-text
      - id: metadata/binary/symbols/imports::single-import-count
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/resource::resource-only-dll

  # Variant of the loader above that does not use the AppDomain.ExportedTypes
  # reflection form. Reaches the payload type via Type.GetType(name).GetMethod()
  # .Invoke -> Activator.CreateInstance (or LoadAndInvoke/InvokeMember). The
  # packed >=7.9-entropy .text body is REQUIRED here as the discriminator: a
  # benign .NET app may read resource-bitmap pixels and use reflection, but it
  # is not packed to near-maximum entropy. Resilient to the obfuscated method
  # names (e.g. ThermalKilnExtract) and renamed assemblies these crypters ship.
  - id: dotnet-bitmap-pixel-activator-loader
    desc: .NET resource-bitmap pixel-stego reflective loader (packed body)
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/encode/image/pixel::pixel-access-getpixel
      - id: micro-behaviors/data/encode/image/pixel::pixel-access-toargb
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-manager-token
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-reflective-invoke-any
      - id: objectives/anti-static/pack/entropy::dotnet-high-entropy-text-raw
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/resource::resource-only-dll
