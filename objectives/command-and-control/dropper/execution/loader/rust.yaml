defaults:
  platforms: [windows, unix]
  for:
    - rust
traits:
  - id: client-get
    desc: HTTP client.get call
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: client.get
  - id: write-body
    desc: Write HTTP body to file
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: .write(&body)
composite_rules:
  - id: rust-download-exec
    desc: Downloads and executes a file
    crit: suspicious
    conf: 0.95
    attack: T1105
    mbc: B0024
    all:
      - id: client-get
      - id: write-body
      - id: micro-behaviors/process/create/direct::rust-spawn
