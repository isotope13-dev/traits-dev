defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009
  mbc: B0032

composite_rules:
  - id: rustdesk-flutter-self-read-stage-loader
    desc: RustDesk-themed self-reading stage loader
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/vendor/rustdesk::rustdesk-windows-runner-markers
      - id: metadata/binary/framework::flutter-windows-desktop-runner
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-import-chain
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
    any:
      - id: objectives/anti-static/obfuscation/imports::peb-access-x64
      - id: objectives/anti-static/obfuscation/instruction/junk::gettickcount-junk-branches
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: rustdesk-flutter-obfuscated-stage-loader
    desc: RustDesk-themed obfuscated stage loader
    crit: hostile
    conf: 0.99
    all:
      - id: rustdesk-flutter-self-read-stage-loader
      - id: objectives/anti-static/obfuscation/imports::peb-access-x64
      - id: objectives/anti-static/obfuscation/instruction/junk::gettickcount-junk-branches
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
