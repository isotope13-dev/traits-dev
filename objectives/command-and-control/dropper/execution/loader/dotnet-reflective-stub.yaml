defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1620
  mbc: B0030
composite_rules:
  - id: dotnet-reflective-stage-stub
    desc: .NET reflective stage loader stub
    crit: hostile
    conf: 0.96
    size_max: 16384
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/metrics::tiny-dotnet
      - id: metadata/binary/metrics::no-functions
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-appdomain-byte-array-load
    any:
      - id: objectives/evasion/process/injection::managed-injection-stub
      - id: metadata/binary/symbols::single-import-count
      - id: metadata/binary/layout::tiny-single-function-pe
    unless:
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/binary/resource::resource-only-dll
