defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: giant-rwx-upx1
    desc: Giant RWX UPX1 payload section
    crit: suspicious
    conf: 0.98
    if:
      type: section
      exact: UPX1
      length_min: 524288
      entropy_min: 7.7
      writable: true
      executable: true
    unless:
      - id: metadata/binary/symbols::ollydbg-plugin-export
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/developer/
  - id: compact-rwx-upx1
    desc: Compact RWX UPX1 payload section
    crit: suspicious
    conf: 0.96
    if:
      type: section
      exact: UPX1
      length_min: 32768
      length_max: 262144
      entropy_min: 7.7
      writable: true
      executable: true
    unless:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/developer/
  - id: empty-rwx-upx0
    desc: Empty RWX UPX0 decoy section
    crit: component
    conf: 0.96
    if:
      type: section
      exact: UPX0
      length_max: 1
      writable: true
      executable: true
    unless:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/developer/
composite_rules:
  - id: fake-upx-memory-wrapper
    desc: Fake UPX wrapper with in-memory payload layout
    crit: suspicious
    conf: 0.97
    attack: T1027
    mbc: B0032
    all:
      - id: giant-rwx-upx1
      - id: empty-rwx-upx0
      - id: objectives/anti-static/pack/detect::upx-section
      - id: metadata/binary/resource::minimal-resources
      - id: metadata/binary/metrics::low-function-count-marker
      - id: objectives/anti-static/obfuscation/binary-metrics::import-count-under-40
    unless:
      - id: objectives/command-and-control/dropper/execution/loader::common-windows-installer-profile
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
  - id: fake-upx-threaded-memory-loader
    desc: Fake UPX threaded in-memory loader
    crit: hostile
    conf: 0.98
    attack: T1620
    mbc: B0030
    all:
      - id: giant-rwx-upx1
      - id: empty-rwx-upx0
      - id: objectives/anti-static/pack/detect::upx-section
      - id: metadata/binary/resource::minimal-resources
      - id: metadata/binary/metrics::low-function-count-marker
      - id: objectives/anti-static/obfuscation/binary-metrics::import-count-under-40
      - id: micro-behaviors/process/thread/create::create-thread
    any:
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: micro-behaviors/dylib/load::load-library-ex-a
      - id: micro-behaviors/dylib/load::load-library-ex-w
      - id: micro-behaviors/mem/protect/modify::virtual-free
    needs: 3
    unless:
      - id: objectives/command-and-control/dropper/execution/loader::common-windows-installer-profile
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
  - id: compact-fake-upx-memory-wrapper
    desc: Compact fake UPX wrapper with memory-loader layout
    crit: suspicious
    conf: 0.96
    attack: T1027
    mbc: B0032
    all:
      - id: compact-rwx-upx1
      - id: empty-rwx-upx0
      - id: objectives/anti-static/pack/detect::upx-section
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: metadata/binary/metrics::single-complex-function
      - id: objectives/anti-static/obfuscation/binary-metrics::import-count-under-40
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/dylib/load::load-library-a
    needs: 2
    unless:
      - id: objectives/command-and-control/dropper/execution/loader::common-windows-installer-profile
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
  - id: compact-fake-upx-memory-loader
    desc: Compact fake UPX in-memory loader
    crit: hostile
    conf: 0.97
    attack: T1620
    mbc: B0030
    all:
      - id: compact-rwx-upx1
      - id: empty-rwx-upx0
      - id: objectives/anti-static/pack/detect::upx-section
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: metadata/binary/metrics::single-complex-function
      - id: objectives/anti-static/obfuscation/binary-metrics::import-count-under-40
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    any:
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/dylib/load::load-library-a
      - id: metadata/binary/layout::has-overlay
    needs: 2
    unless:
      - id: objectives/command-and-control/dropper/execution/loader::common-windows-installer-profile
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/signed/platform::microsoft
