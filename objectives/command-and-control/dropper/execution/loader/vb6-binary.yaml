defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105

composite_rules:
- id: vb6-embedded-shell-apihash-loader
  desc: VB6 shell loader embeds hashed payload
  crit: hostile
  conf: 0.96
  all:
  - id: micro-behaviors/process/create/shell/lang::vb6-shell-execution
  - id: metadata/binary/layout::pe-embedded
  any:
  - id: objectives/anti-static/obfuscation/imports::pe-walk-hash-resolver-x64
  - id: metadata/binary/metrics/structural::malformed-pe-structure
  - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-rdata-pair
  - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
  needs: 2
- id: vb6-urlmon-hollowing-loader
  desc: VB6 URLMon downloader with process hollowing
  crit: hostile
  conf: 0.97
  all:
  - id: metadata/binary/framework::vb6-application-framework
  - id: micro-behaviors/communications/http/get::url-download-to-file-str
  - id: objectives/evasion/process/injection/hollowing::process-hollowing-alloc-write-context
  any:
  - id: micro-behaviors/communications/http/get::delete-url-cache-entry
  - id: metadata/binary/metrics/structural::malformed-pe-structure
  - id: micro-behaviors/data/string/runtime::vb6-runtime-string-decoding
  needs: 2
