# Signed PE binaries with strong anomaly clusters — abused-certificate
# droppers. A code-signature is innocence-by-default for analysts, so
# attackers use stolen / abused / fraudulently-issued certificates to
# bypass static scanners. The combination of a valid signature with
# manual-API-resolution + AssemblyResolve hijack + multiple embedded
# PEs + multistage resource layout is the abuse pattern.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1553.002
  mbc: B0009
composite_rules:
  - id: signed-pe-anomaly-recognized-marker
    desc: Recognized signed bundle marker
    crit: notable
    conf: 0.9
    any:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-bundle
      - id: metadata/signed/developer::tencent-technologyshenzhen-company-limited
      - id: metadata/signed/certificate/identity::benign-consumer-leaves
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/binary/installer/database::wix-bootstrapper-manifest
      - id: well-known/app/protected-benign-pe/
  - id: signed-pe-with-anomaly-cluster
    desc: Signed PE with abuse-pattern cluster
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/signed/trust-level::signer-evidence-present
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: micro-behaviors/os/api-resolution/manual
    any:
      - id: objectives/command-and-control/dropper/execution/resource::signed-multistage-resource-carrier
      - id: micro-behaviors/crypto/symmetric/aes
    unless:
      - id: objectives/command-and-control/dropper/execution/loader/
