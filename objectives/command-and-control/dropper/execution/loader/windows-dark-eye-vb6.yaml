defaults:
  for: [pe]
  platforms: [windows]
  attack: T1620
  mbc: B0030

traits:
- id: dark-eye-upx0-zero-padding
  desc: Large zero-entropy UPX0 section
  crit: component
  conf: 0.96
  if:
    type: section
    exact: UPX0
    writable: true
    executable: true
    length_min: 1500000
    length_max: 1600000
    entropy_max: 0.05
- id: dark-eye-upx1-zero-loader
  desc: Large zero-entropy UPX1 section
  crit: component
  conf: 0.96
  if:
    type: section
    exact: UPX1
    writable: true
    executable: true
    length_min: 300000
    length_max: 320000
    entropy_max: 0.05
- id: dark-eye-getprocaddress-string
  desc: GetProcAddress loader API string
  crit: component
  conf: 0.9
  if:
    type: text
    exact: GetProcAddress
  unless:
  - id: metadata/lang/compiler/systems::go-pe-symtab
composite_rules:
- id: dark-eye-fake-upx-vb6-loader
  desc: Dark Eye fake UPX VB6 loader
  crit: hostile
  conf: 0.98
  all:
  - id: metadata/binary/provenance::dark-eye-vb6-project-path
  - id: dark-eye-upx0-zero-padding
  - id: dark-eye-upx1-zero-loader
  - id: metadata/binary/section/names::upx-section-pair
  - id: metadata/binary/framework::vb6-runtime-dll
  - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
  - id: dark-eye-getprocaddress-string
  - id: micro-behaviors/mem/protect/modify::virtual-protect-string
  - id: micro-behaviors/mem/protect/modify::virtual-alloc-string
  any:
  - id: micro-behaviors/dylib/lookup::vb6-dll-function-call
  - id: micro-behaviors/dylib/lookup::vb6-runtime-api-dispatch
  - id: micro-behaviors/os/env/access::vb6-environ-bstr
