defaults:
  for: [pe]
  platforms: [windows]
  attack: T1620
  mbc: B0030

traits:
  - id: dark-eye-crypter-project-path
    desc: Dark Eye crypter project path
    crit: component
    conf: 0.99
    if:
      type: text
      substr: Malware Writers\Dark EYE\Projects\FRPHNXW.vbp
  - id: dark-eye-upx0-zero-padding
    desc: Large zero-entropy UPX0 section
    crit: component
    conf: 0.96
    if:
      type: section
      exact: UPX0
      writable: true
      executable: true
      length_min: 1500000
      length_max: 1600000
      entropy_max: 0.05
  - id: dark-eye-upx1-zero-loader
    desc: Large zero-entropy UPX1 section
    crit: component
    conf: 0.96
    if:
      type: section
      exact: UPX1
      writable: true
      executable: true
      length_min: 300000
      length_max: 320000
      entropy_max: 0.05
  - id: dark-eye-loadlibrarya-string
    desc: LoadLibraryA loader API string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: LoadLibraryA
  - id: dark-eye-getprocaddress-string
    desc: GetProcAddress loader API string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: GetProcAddress
    unless:
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: dark-eye-virtualprotect-string
    desc: VirtualProtect loader API string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: VirtualProtect
  - id: dark-eye-virtualalloc-string
    desc: VirtualAlloc loader API string
    crit: component
    conf: 0.9
    if:
      type: text
      exact: VirtualAlloc
    unless:
      - id: metadata/lang/compiler/systems::go-pe-symtab

composite_rules:
  - id: dark-eye-fake-upx-vb6-loader
    desc: Dark Eye fake UPX VB6 loader
    crit: hostile
    conf: 0.98
    all:
      - id: dark-eye-crypter-project-path
      - id: dark-eye-upx0-zero-padding
      - id: dark-eye-upx1-zero-loader
      - id: metadata/binary/section/names::upx-section-pair
      - id: metadata/binary/framework::vb6-runtime-dll
      - id: dark-eye-loadlibrarya-string
      - id: dark-eye-getprocaddress-string
      - id: dark-eye-virtualprotect-string
      - id: dark-eye-virtualalloc-string
    any:
      - id: micro-behaviors/dylib/lookup::vb6-dll-function-call
      - id: micro-behaviors/dylib/lookup::vb6-runtime-api-dispatch
      - id: micro-behaviors/os/env/access::vb6-environ-bstr
    needs: 1
