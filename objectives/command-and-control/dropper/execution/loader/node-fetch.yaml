defaults:
  platforms:
    - unix
    - windows
  for:
    - javascript
    - typescript
  attack: T1059.007
  mbc: B0024
traits:
  - id: fetch-then-json
    desc: fetch().then JSON parse
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: fetch\(.{0,50}\.then\(.{0,50}\.json\(
  - id: spawnSync-call-dup
    desc: spawnSync function call
    crit: notable
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-filename-pattern
      - type: text
        exact: "Publishing version:"
    if:
      type: text
      regex: \.spawnSync\s*\(
  - id: spawn-call-dup
    desc: spawn function call
    crit: notable
    conf: 0.6
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-filename-pattern
      - type: text
        exact: "Publishing version:"
    if:
      type: text
      regex: \.spawn\s*\(
  - id: spawn-node
    desc: spawn node interpreter
    crit: notable
    conf: 0.7
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]test[\\/]
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
    if:
      type: text
      regex: spawn(Sync)?\s*\(['"]node['"]
  - id: unlinkSync-call
    desc: fs.unlinkSync call
    crit: notable
    conf: 0.6
    unless:
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]test[\\/]
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
      - type: text
        substr: "path.resolve(Utils.getSavePath()"
      - type: basename
        regex: ^post-install\.js$|^rimraf$
    not:
      - substr: '"version":3,"file":'
      - substr: builtin-plugins/tabby-ssh/node_modules/tmp/
      - substr: builtin-plugins/tabby-ssh/node_modules/winston/
      - substr: options.unlinkSync(p)
      - substr: dist.attempt.unlinkSync(filePath)
      - substr: fs.attempt.unlinkSync(filePath)
      - substr: fs.unlinkSync(fdPath[1])
      - substr: fs.unlinkSync(this.tempFile)
      - substr: options.unlinkSync(p);
    if:
      type: text
      regex: \.unlinkSync\s*\(
  - id: unlink-call
    desc: fs.unlink call
    crit: notable
    conf: 0.6
    count_min: 2
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-[^\\/]+[\\/]
      - type: basename
        regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]test[\\/]
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: metadata/package/testing/presence::test-directory
    if:
      type: text
      regex: \.unlink\s*\(
    not:
      - substr: options.unlink(p, er =>
      - substr: fs.unlink(fdPath[1], _handler)
  - id: temp-js-file
    desc: Temporary .js file path
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: \./tmp[^/]{0,120}\.js|/tmp/[^/]{0,120}\.js
  - id: random-temp-filename
    desc: Random/unusual temp filename
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: tmppppp|temp[0-9a-f]{8}|rand[0-9]+\.js
  - id: iife-start
    desc: IIFE pattern start
    crit: component
    conf: 0.5
    if:
      type: string_literal
      regex: ^\(function\s*\(|^\(async\s+function
  - id: iife-arrow
    desc: IIFE with arrow function
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: ^\(\(\)\s*=>|^\(async\s*\(\)\s*=>
    unless:
      - type: text
        substr: '"version":3,"file":'
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/tooling::webpack-bundled
      - id: metadata/package/tooling::esbuild-bundled
      - id: metadata/package/tooling::rollup-bundled
composite_rules:
  - id: file-write-comp
    desc: File write operation
    crit: baseline
    conf: 0.7
    any:
      - id: micro-behaviors/fs/write/file::write-file-sync
      - id: micro-behaviors/fs/write/file::write-file-async
  - id: file-delete
    desc: File delete operation
    crit: baseline
    conf: 0.7
    any:
      - id: unlinkSync-call
      - id: unlink-call
  - id: process-exec
    desc: Process execution (spawn/spawnSync)
    crit: notable
    conf: 0.7
    any:
      - id: objectives/command-and-control/dropper/execution/loader::spawnSync-call-dup
      - id: objectives/command-and-control/dropper/execution/loader::spawn-call-dup
      - id: spawn-node
  - id: detached-process-comp
    desc: Detached process spawn
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: micro-behaviors/process/create/flags::detached-process
  - id: temp-js
    desc: Temporary JavaScript file
    crit: notable
    conf: 0.8
    any:
      - id: temp-js-file
      - id: random-temp-filename
  - id: iife-pattern
    desc: Immediately invoked function
    crit: notable
    conf: 0.6
    any:
      - id: iife-start
      - id: iife-arrow
  - id: fetch-write-exec
    desc: Fetch and write then execute
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/request::fetch-string
      - id: file-write
      - id: process-exec
  - id: write-exec-delete
    desc: Write file, execute, delete
    crit: suspicious
    conf: 0.92
    all:
      - id: file-write
      - id: process-exec
      - id: file-delete
    unless:
      - id: metadata/package/testing/harness::node-common-require
