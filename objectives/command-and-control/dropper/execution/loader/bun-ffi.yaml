defaults:
  platforms: [windows]
  for: [pe, javascript]
  attack: T1106

traits:
  - id: ffi-rtladdfunctiontable-api
    desc: FFI RtlAddFunctionTable API name
    crit: component
    conf: 0.93
    if:
      type: text
      word: RtlAddFunctionTable
  - id: ffi-createthread-api
    desc: FFI CreateThread API name
    crit: component
    conf: 0.9
    for: [javascript]
    if:
      type: text
      word: CreateThread
  - id: ffi-searchpatha-api
    desc: FFI SearchPathA API name
    crit: component
    conf: 0.88
    if:
      type: text
      word: SearchPathA

composite_rules:
  - id: bun-ffi-native-loader-api-set
    desc: Bun FFI native loader APIs
    crit: suspicious
    conf: 0.95
    needs: 5
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-string
      - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: ffi-rtladdfunctiontable-api
      - id: ffi-createthread-api
      - id: ffi-searchpatha-api
      - id: micro-behaviors/mem/protect/modify::virtual-protect-string
  - id: bun-ffi-self-injection-loader
    desc: Bun FFI self injection loader
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/dylib/load/runtime::bun-ffi-module
      - id: bun-ffi-native-loader-api-set
    any:
      - id: metadata/binary/section/name::bun-section-name
      - id: objectives/command-and-control/dropper/delivery/http::bun-loader-api-protocol
