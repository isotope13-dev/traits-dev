# .NET Packed Loader Detection
# Detects .NET assemblies that are packed/obfuscated and use reflection to
# dynamically load and execute payloads. Key indicators:
#   - High entropy .text section (packed/encrypted IL)
#   - Single import (_CorExeMain via mscoree.dll)
#   - Reflection-based assembly loading and invocation
#   - Embedded resource access for payload retrieval
defaults:
  attack: T1027.002
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: forgoten-rsetp-dll-metadata-name
    desc: forgoten/rSetp DLL metadata name
    crit: component
    conf: 0.98
    size_min: 200000
    size_max: 1000000
    if:
      type: text
      regex: forgoten\.dll|rSetp\.dll
      section: .rsrc
  - id: remoteprocess-program-token
    desc: Managed RemoteProcess loader entry token
    crit: component
    conf: 0.92
    size_min: 200000
    size_max: 1000000
    if:
      type: text
      regex: RemoteProcess\.Program|PublicMethod
      section: .rdata
  - id: confuserex-version-banner
    desc: Confuser/ConfuserEx version banner string
    crit: component
    conf: 0.95
    size_min: 200000
    size_max: 1000000
    if:
      type: text
      regex: Confuser(Ex)? v(0\.1\.0-21-g8d974cf|1\.9\.0\.0)
  # Generic import count traits (not .NET-specific)
  - id: pe-single-import
    desc: "PE with single import"
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: binary.import_count
      max: 1
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/document/office::help2-container
  - id: pe-few-imports
    desc: "PE with very few imports"
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: binary.import_count
      max: 2
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/document/office::help2-container
composite_rules:
  # .NET-specific import checks (require .NET assembly evidence)
  - id: dotnet-single-import
    desc: ".NET assembly with single import (packed)"
    crit: component
    conf: 0.85
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/symbols::single-import-count
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/pack/detect::themida-section
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
  - id: dotnet-bootstrap-imports
    desc: ".NET assembly with bootstrap-only imports"
    crit: component
    conf: 0.9
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/symbols::few-import-count
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/pack/detect::themida-section
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
  # .NET packed loader: high entropy + single import + reflection
  - id: dotnet-packed-loader
    desc: "Packed .NET loader with reflection execution"
    crit: hostile
    conf: 0.95
    mbc: "B0032"
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/symbols::single-import-raw
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
  # .NET packed stub: high entropy + single import (no reflection required)
  - id: dotnet-packed-stub
    desc: "Packed .NET stub (high entropy, single import)"
    crit: suspicious
    conf: 0.88
    mbc: "B0032"
    all:
      - id: metadata/binary/framework::dotnet-assembly
    needs: 2
    any:
      - id: dotnet-single-import
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/pack/detect::themida-section
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: dotnet-packed-themida-stub
    desc: "Packed .NET Themida bootstrap stub"
    crit: suspicious
    conf: 0.94
    mbc: "F0001"
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bootstrap-imports
      - id: objectives/anti-static/pack/detect::themida-section
    any:
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
  - id: pe-sparse-import-stub
    desc: Generic sparse import stub (potential packer/loader)
    crit: suspicious
    conf: 0.75
    any:
      - id: pe-single-import
      - id: pe-few-imports
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: dotnet-network-resource-loader
    desc: .NET network resource PE loader
    crit: hostile
    conf: 0.95
    attack: T1027.009
    unless:
      - id: metadata/file/extension::dotnet-native-image
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/layout::pe-embedded
      - id: micro-behaviors/communications/http/client::request
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-any
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: micro-behaviors/process/terminate/kill::get-processes-by-name
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/developer
  - id: dotnet-encrypted-resource-reflective-loader
    desc: .NET encrypted reflective resource loader
    crit: hostile
    conf: 0.96
    attack: T1027.009
    mbc: B0009.014
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/layout::pe-embedded
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-any
      - id: objectives/anti-static/obfuscation/reflection/invoke::resolver-api-cluster
    any:
      - id: metadata/binary/layout::dotnet-low-entropy-text-carrier
      - id: metadata/binary/symbols::single-import-raw
      - id: objectives/evasion/process/injection/toolkit::dotnet-split-winapi-injection-loader
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource::resource-only-dll
  - id: dotnet-encrypted-resource-downloader
    desc: .NET encrypted resource downloader
    crit: hostile
    conf: 0.95
    attack: T1105
    mbc: B0009
    all:
      - id: dotnet-encrypted-resource-reflective-loader
      - id: objectives/command-and-control/dropper/delivery/download-execute::dotnet-downloadfile-token
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource::resource-only-dll
  - id: dotnet-image-resource-reflective-loader
    desc: .NET image resource reflective loader
    crit: hostile
    conf: 0.97
    attack: T1027.009
    mbc: B0009.014
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-image-resource-set-access
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-delegate-invoke
      - id: metadata/binary/symbols::single-import-raw
    any:
      - id: metadata/binary/layout::dotnet-low-entropy-text-carrier
      - id: objectives/anti-static/pack/entropy::dotnet-large-packed-text
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource::resource-only-dll
