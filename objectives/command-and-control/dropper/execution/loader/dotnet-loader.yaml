# .NET Packed Loader Detection
# Detects .NET assemblies that are packed/obfuscated and use reflection to
# dynamically load and execute payloads. Key indicators:
#   - High entropy .text section (packed/encrypted IL)
#   - Single import (_CorExeMain via mscoree.dll)
#   - Reflection-based assembly loading and invocation
#   - Embedded resource access for payload retrieval
defaults:
  attack: T1027.002
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: forgoten-rsetp-dll-metadata-name
    desc: forgoten/rSetp DLL metadata name
    crit: component
    conf: 0.98
    size_min: 200000
    size_max: 1000000
    if:
      type: text
      regex: forgoten\.dll|rSetp\.dll
      section: .rsrc
  - id: remoteprocess-program-token
    desc: Managed RemoteProcess loader entry token
    crit: component
    conf: 0.92
    size_min: 200000
    size_max: 1000000
    if:
      type: text
      regex: RemoteProcess\.Program|PublicMethod
      section: .rdata
  - id: confuserex-version-banner
    desc: Confuser/ConfuserEx version banner string
    crit: component
    conf: 0.95
    size_min: 200000
    size_max: 1000000
    if:
      type: text
      # Include 0.4.x (Fareit/Olock-era crypters) and common 1.x banners.
      # Avoid bare "Confuser" without a version — too ambiguous.
      regex: Confuser(Ex)? v(0\.[1-9]\.\d+|1\.\d+(\.\d+)?)

  # Generic import count traits (not .NET-specific)
  - id: pe-single-import
    desc: "PE with single import"
    crit: component
    conf: 0.7
    if:
      type: metrics
      field: imports.count
      max: 1
    unless:
      - id: metadata/binary/resource/
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/document/office/container/
  - id: pe-few-imports
    desc: "PE with very few imports"
    crit: component
    conf: 0.7
    # Aliases the canonical few-imports matcher; adds dotnet-loader-specific guards.
    if:
      id: metadata/binary/symbols/imports::few-import-count
    unless:
      - id: metadata/binary/resource/
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/document/office/container/
composite_rules:
  # .NET-specific import checks (require .NET assembly evidence)
  - id: dotnet-single-import
    desc: ".NET assembly with single import (packed)"
    crit: component
    conf: 0.85
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/symbols/imports::single-import-count
    any:
      - id: metadata/binary/metrics/structural::high-code-entropy
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/pack/detect::themida-section
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
  - id: dotnet-bootstrap-imports
    desc: ".NET assembly with bootstrap-only imports"
    crit: component
    conf: 0.9
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/symbols/imports::few-import-count
    any:
      - id: metadata/binary/metrics/structural::high-code-entropy
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/pack/detect::themida-section
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
  - id: dotnet-packed-themida-stub
    desc: "Packed .NET Themida bootstrap stub"
    crit: suspicious
    conf: 0.94
    mbc: "F0001"
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: dotnet-bootstrap-imports
      - id: objectives/anti-static/pack/detect::themida-section
    any:
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::dominant-section
  - id: dotnet-confuserex-microsoft-masquerade
    desc: ConfuserEx-packed .NET claims Microsoft
    crit: hostile
    conf: 0.94
    attack: "T1027.002,T1036.005"
    all:
      - id: confuserex-version-banner
      - id: objectives/evasion/masquerade/trust::unsigned-pe-microsoft-version-claim
    any:
      - id: metadata/binary/section/metrics::random-exec-payload-section
      - id: metadata/binary/metrics/structural::high-code-entropy
    unless:
      - id: metadata/signed/platform/
  - id: dotnet-confuserex-entropy-loader
    desc: ConfuserEx .NET entropy loader
    crit: hostile
    conf: 0.95
    attack: "T1027.002,T1036.005"
    all:
      - id: dotnet-confuserex-microsoft-masquerade
    any:
      - id: metadata/binary/section/metrics::random-exec-payload-section
      - id: metadata/binary/metrics/structural::high-code-entropy
  - id: pe-sparse-import-stub
    desc: Generic sparse import stub (potential packer/loader)
    crit: suspicious
    conf: 0.75
    any:
      - id: pe-single-import
      - id: pe-few-imports
    downgrade:
      any:
        - id: metadata/signed/platform/
  - id: dotnet-network-resource-loader
    desc: .NET network resource PE loader
    crit: hostile
    conf: 0.95
    attack: T1027.009
    unless:
      - id: metadata/file/extension/identity::dotnet-native-image
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/layout::pe-embedded
      - id: micro-behaviors/communications/http/client/managed::request
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-any
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: micro-behaviors/process/enumerate/managed::get-processes-by-name
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/developer
  - id: dotnet-persistent-resource-payload-loader
    desc: .NET resource payload loader with Run-key persistence
    crit: hostile
    conf: 0.96
    attack: "T1027.009,T1547.001"
    all:
      - id: metadata/binary/layout::pe-embedded
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-resource-reader-access
      - id: objectives/persistence/login/registry/autostart::currentversion-run-key-path
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/sfx/
  - id: dotnet-resource-temp-exe-launcher
    desc: .NET resource temp executable launcher
    crit: suspicious
    conf: 0.94
    attack: T1105
    mbc: B0023
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/layout::pe-embedded
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-resource-reader-access
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: micro-behaviors/fs/path/temp::dotnet-gettempfilename-token
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-split-tokens
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/framework/
      - id: metadata/binary/resource/
      - id: well-known/app/bible-converter/
  - id: dotnet-encrypted-resource-reflective-loader
    desc: .NET encrypted reflective resource loader
    crit: suspicious
    conf: 0.96
    attack: T1027.009
    mbc: B0009.014
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/layout::pe-embedded
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-any
      - id: micro-behaviors/process/interpreter/reflection/resolve::resolver-api-cluster
    any:
      - id: metadata/binary/layout::dotnet-low-entropy-text-carrier
      - id: metadata/binary/symbols/imports::single-import-raw
      - id: objectives/evasion/process/injection/toolkit::dotnet-split-winapi-injection-loader
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource/
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/obfuscator/managed/
  - id: dotnet-encrypted-overlay-dropper
    desc: .NET encrypted overlay is reflectively executed as a payload
    crit: hostile
    conf: 0.98
    attack: "T1027.009,T1140,T1620"
    mbc: "B0030,B0040"
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/layout::overlay-dominates-80pct
      - id: micro-behaviors/fs/file/read::dotnet-readallbytes-token
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-create-decryptor
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-method-lookup-invoke
      - id: micro-behaviors/process/interpreter/reflection/runtime::activator
  - id: dotnet-encrypted-resource-downloader
    desc: .NET encrypted resource downloader
    crit: hostile
    conf: 0.95
    attack: T1105
    mbc: B0009
    all:
      - id: dotnet-encrypted-resource-reflective-loader
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource/
  - id: dotnet-reactor-jit-resource-loader
    desc: Reactor-protected .NET JIT resource loader
    crit: hostile
    conf: 0.97
    attack: T1027.009
    mbc: B0009.014
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: objectives/evasion/process/hook/jit::dotnet-clrjit-hook-loader
      - id: objectives/anti-static/obfuscation/obfuscator/managed::dotnet-reactor-obfuscator
    needs: 2
    any:
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: objectives/command-and-control/dropper/staging/embedded::managed-resource-reflection-loader
      - id: objectives/command-and-control/dropper/staging/embedded::dotnet-aes-resource-dropper
      - id: objectives/command-and-control/dropper/staging/encrypted::dotnet-hex-chunk-reassembly
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-any
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource/
  - id: dotnet-image-resource-reflective-loader
    desc: .NET image resource reflective loader
    crit: hostile
    conf: 0.97
    attack: T1027.009
    mbc: B0009.014
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-image-resource-set-access
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-delegate-invoke
      - id: metadata/binary/symbols/imports::single-import-raw
    any:
      - id: metadata/binary/layout::dotnet-low-entropy-text-carrier
      - id: objectives/anti-static/pack/entropy::dotnet-large-packed-text
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource/
  - id: dotnet-reactor-aes-web-dropper
    desc: Reactor-protected AES web resource dropper
    crit: hostile
    conf: 0.98
    attack: T1105,T1027.009
    all:
      - id: objectives/anti-static/obfuscation/obfuscator/managed::dotnet-reactor-obfuscator
      - id: objectives/command-and-control/dropper/staging/embedded::dotnet-aes-resource-dropper
      - id: micro-behaviors/communications/http/client/managed::downloadstring

  # ConfuserEx stub that LockBits-extracts a high-entropy managed bitmap
  # resource and reflectively invokes / Process.Starts the result. Catches
  # Fareit/Olock-style .NET crypters that never use GetPixel.
  - id: confuserex-lockbits-resource-loader
    desc: ConfuserEx LockBits resource payload loader
    crit: hostile
    conf: 0.97
    attack: T1027.002,T1027.003,T1620
    mbc: F0001,B0009
    all:
      - id: confuserex-version-banner
      - id: metadata/binary/resource::dotnet-large-high-entropy-managed-resource
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-bitmap-pixel-readback
      - id: micro-behaviors/data/encode/image/pixel::pixel-access-lockbits
      - id: micro-behaviors/process/interpreter/reflection/runtime::invoke-member-token
    any:
      - id: micro-behaviors/process/create/spawn::process-start-member-token
      - id: metadata/binary/symbols/imports::single-import-count
      - id: metadata/binary/symbols/imports::single-import-raw
    unless:
      - id: metadata/signed/platform/
