# .NET Packed Loader Detection
# Detects .NET assemblies that are packed/obfuscated and use reflection to
# dynamically load and execute payloads. Key indicators:
#   - High entropy .text section (packed/encrypted IL)
#   - Single import (_CorExeMain via mscoree.dll)
#   - Reflection-based assembly loading and invocation
#   - Embedded resource access for payload retrieval
defaults:
  attack: T1027.002
  platforms: [windows]
  for: [pe]
traits:
  # Generic import count traits (not .NET-specific)
  - id: pe-single-import
    desc: "PE with single import"
    crit: component
    conf: 0.7
    if:
      type: import_combination
      max_total: 1
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/document/office::help2-container
  - id: pe-few-imports
    desc: "PE with very few imports"
    crit: component
    conf: 0.7
    if:
      type: import_combination
      max_total: 2
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/document/office::help2-container
  - id: dotnet-bootstrap-single-import-raw
    desc: ".NET assembly has single bootstrap import"
    crit: component
    conf: 0.9
    if:
      type: import_combination
      max_total: 1
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/document/office::help2-container
  - id: dotnet-bootstrap-few-imports-raw
    desc: ".NET assembly has bootstrap-only imports"
    crit: component
    conf: 0.9
    if:
      type: import_combination
      max_total: 2
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/document/office::help2-container
  - id: wix-dtf-windowsinstaller-ref
    desc: WiX DTF Windows Installer marker
    crit: component
    if:
      type: text
      exact: WixToolset.Dtf.WindowsInstaller
  - id: quicklook-common-ref
    desc: QuickLook.Common assembly marker
    crit: component
    if:
      type: text
      exact: QuickLook.Common
composite_rules:
  # .NET-specific import checks (require .NET assembly evidence)
  - id: dotnet-single-import
    desc: ".NET assembly with single import (packed)"
    crit: component
    conf: 0.85
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bootstrap-single-import-raw
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/pack/detect::themida-section
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
  - id: dotnet-bootstrap-imports
    desc: ".NET assembly with bootstrap-only imports"
    crit: component
    conf: 0.9
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bootstrap-few-imports-raw
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/pack/detect::themida-section
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
  # .NET packed loader: high entropy + single import + reflection
  - id: dotnet-packed-loader
    desc: "Packed .NET loader with reflection execution"
    crit: hostile
    conf: 0.95
    mbc: "B0032"
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bootstrap-single-import-raw
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcemanager
      - id: micro-behaviors/data/embedded/payload::dotnet-filterresources-iterator
  - id: dotnet-resource-reflection-loader
    desc: ".NET resource reflection loader"
    crit: hostile
    conf: 0.96
    attack: T1027.009
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bootstrap-single-import-raw
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
    any:
      - id: micro-behaviors/data/embedded/payload::dotnet-filterresources-iterator
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcereader
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcemanager
      - id: objectives/anti-static/obfuscation/reflection/invoke::namespace-import
      - id: objectives/anti-static/obfuscation/reflection/invoke::activator
    needs: 3
  - id: dotnet-image-carried-resource-loader
    desc: ".NET loader with image-like embedded payload"
    crit: suspicious
    conf: 0.93
    attack: T1027.003
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
      - id: micro-behaviors/data/embedded/payload::jpeg-marker-in-text
    any:
      - id: micro-behaviors/data/embedded/payload::dotnet-filterresources-iterator
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcereader
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcemanager
    needs: 2
  - id: dotnet-packed-resource-stub
    desc: ".NET packed resource loader stub"
    crit: hostile
    conf: 0.95
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bootstrap-single-import-raw
      - id: metadata/binary/section/metrics::elevated-text-entropy-section
    any:
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcereader
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcemanager
      - id: objectives/anti-static/obfuscation/reflection/invoke::namespace-import
      - id: objectives/anti-static/obfuscation/reflection/invoke::activator
    needs: 3
    unless:
      - id: objectives/command-and-control/dropper/execution/loader::wix-dtf-windowsinstaller-ref
      - id: objectives/command-and-control/dropper/execution/loader::quicklook-common-ref
      - id: metadata/lang/compiler/aot::native-runtime-large-file
      - id: objectives/anti-static/pack/entropy::dotnet-versioned-resource-library
      - id: objectives/anti-static/pack/entropy::dotnet-wpf-ui-bundle-profile
      - id: objectives/anti-static/pack/entropy::dotnet-costura-bundle-profile
  # .NET packed stub: high entropy + single import (no reflection required)
  - id: dotnet-packed-stub
    desc: "Packed .NET stub (high entropy, single import)"
    crit: suspicious
    conf: 0.88
    mbc: "B0032"
    all:
      - id: metadata/binary/framework::dotnet-assembly
    needs: 2
    any:
      - id: dotnet-single-import
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/pack/detect::themida-section
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: dotnet-obfuscated-native-bridge-loader
    desc: ".NET obfuscated native bridge loader"
    crit: hostile
    conf: 0.96
    mbc: "B0032"
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bootstrap-single-import-raw
      - id: objectives/anti-static/obfuscation/binary-metrics::dotnet-obfuscated-winapi-bridge
    any:
      - id: metadata/binary/section/metrics::elevated-text-entropy-section
      - id: metadata/lang/compiler/managed::runtime-interop
      - id: objectives/anti-static/obfuscation/reflection/invoke::activator
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcereader
    needs: 2
  - id: dotnet-reflective-hex-loader
    desc: ".NET reflective loader with hex payload markers"
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: objectives/anti-static/pack/entropy::dotnet-large-near-high-entropy-text-raw
      - id: objectives/anti-static/obfuscation/reflection/invoke::resolver-api-cluster
      - id: micro-behaviors/data/encode/hex::repeated-upper-hex-blocks
    any:
      - id: metadata/binary/symbols::zero-import-count
      - id: metadata/binary/symbols::few-import-count
      - id: micro-behaviors/ui/controls/widget::winforms-progress-decoy-controls
      - id: objectives/anti-static/obfuscation/binary-metrics::dotnet-hash-renamed-symbols
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: dotnet-packed-themida-stub
    desc: "Packed .NET Themida bootstrap stub"
    crit: suspicious
    conf: 0.94
    mbc: "F0001"
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-bootstrap-imports
      - id: objectives/anti-static/pack/detect::themida-section
    any:
      - id: objectives/anti-static/pack/polymorphic::unusual-entry-point-section
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
  - id: pe-sparse-import-stub
    desc: Generic sparse import stub (potential packer/loader)
    crit: notable
    conf: 0.75
    unless:
      - id: metadata/binary/resource::resource-only-dll
      - id: metadata/signed/platform::microsoft
    any:
      - id: pe-single-import
      - id: pe-few-imports
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: dotnet-network-resource-loader
    desc: .NET network resource PE loader
    crit: hostile
    conf: 0.95
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/layout::pe-embedded
      - id: micro-behaviors/communications/http/client::request
    any:
      - id: micro-behaviors/crypto/symmetric/aes::dotnet-rijndael-any
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/process/terminate/kill::terminate-process
      - id: micro-behaviors/process/terminate/kill::get-processes-by-name
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/developer
