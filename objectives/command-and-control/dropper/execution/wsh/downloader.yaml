defaults:
  platforms: [windows]
  for: [html, vbs]
  attack: T1105

traits:
  - id: wsh-shell-create
    desc: WSH creates shell object
    crit: suspicious
    conf: 0.85
    unless:
      - type: basename
        exact: scrcpy-noconsole.vbs
    if:
      type: text
      regex: '(?i)CreateObject\s*\(\s*["'']WScript\.Shell["'']'
  - id: wsh-run-hidden-zero
    desc: WSH runs hidden window
    crit: suspicious
    conf: 0.92
    unless:
      - type: basename
        exact: scrcpy-noconsole.vbs
    if:
      type: text
      regex: '(?i)\.Run\s*[(\s][^,\r\n]{1,80},\s*0\b'
  - id: wsh-unc-exe-path
    desc: WSH references UNC EXE
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\\\\[A-Za-z0-9_.-]{1,80}\\[^"''\r\n]{0,80}\.exe'
  - id: wsh-filesystemobject-html
    desc: HTML WSH creates FileSystemObject
    crit: suspicious
    conf: 0.85
    for: [html]
    if:
      type: text
      substr: Scripting.FileSystemObject
  - id: wsh-temp-expand
    desc: WSH expands TEMP path
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ExpandEnvironmentStrings("%TEMP%")
  - id: wsh-copyfile-call
    desc: WSH copies file
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: CopyFile
  - id: wsh-xmlhttp-progid
    desc: WSH references XMLHTTP
    crit: suspicious
    conf: 0.9
    for: [html, vbs, javascript]
    if:
      type: text
      regex: '(?i)(ActiveX|Create)Object\s*\(\s*[''"](MSXML2?\.(Server)?XMLHTTP|Microsoft\.XMLHTTP)'
    unless:
      - id: metadata/document/html::ndoc-generated-page
      - type: text
        regex: 'return\s+new\s+[a-zA-Z0-9_]+\.ActiveXObject\(\s*["'']Microsoft\.XMLHTTP["'']\s*\)'
  - id: wsh-adodb-stream-html
    desc: HTML WSH references ADODB Stream
    crit: suspicious
    conf: 0.9
    for: [html]
    if:
      type: text
      substr: ADODB.Stream
  - id: wsh-savetofile
    desc: WSH saves stream to file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: SaveToFile
  - id: wsh-hex-decode-loop
    desc: WSH hex decode loop
    crit: suspicious
    conf: 0.92
    attack: T1027
    if:
      type: text
      substr: "Step 2:h=h&Chr(CLng(\"&H\"&Mid"
  - id: wsh-xor-decode-loop
    desc: WSH XOR decode loop
    crit: suspicious
    conf: 0.92
    attack: T1027
    if:
      type: text
      regex: '\bXor\b.{0,50}\bAsc\(Mid\('
  - id: wsh-decoded-createobject
    desc: WSH decoded CreateObject call
    crit: suspicious
    conf: 0.94
    attack: T1027
    if:
      type: text
      regex: 'CreateObject\s*\(\s*x\(["''][0-9A-F]{20,}["'']\)'

composite_rules:
  - id: wsh-unc-exe-hidden-run-dropper
    desc: WSH hidden UNC EXE dropper
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    all:
      - id: wsh-shell-create
      - id: wsh-run-hidden-zero
      - id: wsh-unc-exe-path
  - id: wsh-copy-unc-exe-dropper
    desc: WSH copies UNC EXE dropper
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    all:
      - id: wsh-filesystemobject-ref
      - id: wsh-temp-expand
      - id: wsh-copyfile-call
      - id: wsh-unc-exe-path
      - id: wsh-run-hidden-zero
  - id: wsh-xmlhttp-adodb-execute-dropper
    desc: WSH downloads saves and executes
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    all:
      - id: wsh-xmlhttp-progid
      - id: wsh-adodb-stream-ref
      - id: micro-behaviors/process/create/script/wsh::responsebody-marker
      - id: wsh-savetofile
      - id: wsh-run-hidden-zero
  - id: wsh-obfuscated-xor-save-run
    desc: WSH XOR decoded save and run
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: T1027
    all:
      - id: wsh-hex-decode-loop
      - id: wsh-xor-decode-loop
      - id: wsh-decoded-createobject
      - id: micro-behaviors/process/create/script/wsh::responsebody-marker
      - id: wsh-savetofile
      - id: wsh-run-hidden-zero
  - id: wsh-embedded-pe-adodb-runner
    desc: WSH embedded PE staged through ADODB stream
    crit: hostile
    conf: 0.97
    mbc: "B0023"
    attack: T1059.005, T1105
    all:
      - id: objectives/anti-static/obfuscation/payload/encoded::base64-pe-header
      - id: objectives/execution/interpreter/script/wsh::wsh-adodb-stream-binary
    any:
      - id: wsh-shell-create
      - id: wsh-run-hidden-zero
      - id: objectives/execution/wmi::wmi-process-spawn
      - id: objectives/execution/interpreter/script/wsh::powershell-bypass-hidden
    needs: 2
  - id: wsh-hidden-powershell-pe-stage
    desc: WSH launches hidden PowerShell around embedded PE stage
    crit: hostile
    conf: 0.96
    mbc: "B0023"
    attack: T1059.001, T1059.005
    all:
      - id: objectives/anti-static/obfuscation/payload/encoded::base64-pe-header
      - id: objectives/execution/interpreter/script/wsh::powershell-bypass-hidden
    any:
      - id: wsh-shell-create
      - id: wsh-run-hidden-zero
      - id: objectives/execution/wmi::wmi-process-spawn
      - id: micro-behaviors/fs/write/file/stream::adodb-stream
    needs: 2

  - id: wsh-adodb-stream-ref
    desc: WSH ADODB Stream reference
    crit: component
    conf: 0.9
    any:
      - id: wsh-adodb-stream-html
      - id: micro-behaviors/process/create/macro/office::createobject-adodb-stream

  - id: wsh-filesystemobject-ref
    desc: WSH FileSystemObject reference
    crit: component
    conf: 0.85
    any:
      - id: wsh-filesystemobject-html
      - id: micro-behaviors/process/create/macro/office::createobject-scripting-fso

  - id: wsh-xmlhttp-fso-execute-dropper
    desc: WSH downloads via XMLHTTP writes via FSO and executes
    crit: hostile
    conf: 0.98
    for: [html, vbs, javascript]
    mbc: "B0023"
    all:
      - id: wsh-xmlhttp-progid
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: micro-behaviors/fs/write/text::create-text-file-api
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-hidden-window
