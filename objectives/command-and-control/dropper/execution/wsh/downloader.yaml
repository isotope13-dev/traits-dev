defaults:
  platforms: [windows]
  for: [html, vbs]
  attack: T1105

traits:
  - id: wsh-run-hidden-zero
    desc: WSH runs hidden window
    crit: suspicious
    conf: 0.92
    unless:
      - type: basename
        exact: scrcpy-noconsole.vbs
      - type: basename
        regex: '^xray_no_window\.vbs$'
      - id: well-known/lib/deb-package::firefox-omni-basename
      - id: well-known/tool/development/agents-live::run-hidden-wrapper-tool
    if:
      type: text
      regex: '(?i)\.Run\s*[(\s][^,\r\n]{1,80},\s*(0|&H0)\b'
  - id: wsh-unc-exe-path
    desc: WSH references UNC EXE
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\\\\[A-Za-z0-9_.-]{1,80}\\[^"''\r\n]{0,80}\.exe'
    unless:
      - id: metadata/document/html/
      - id: metadata/library/structure::javascript-source-map-file
      - id: metadata/file/format::sourcemap
      - id: metadata/file/format::sourcemap-sources-content
      - id: well-known/lib/deb-package::firefox-omni-basename
      - type: text
        substr: CopyFileEx_meth
      - type: text
        substr: _WinAPI_CopyFileEx
      - type: text
        substr: function simulates the move by using the CopyFile
  - id: wsh-filesystemobject-html
    desc: HTML WSH creates FileSystemObject
    crit: suspicious
    conf: 0.85
    for: [html]
    if:
      type: text
      substr: Scripting.FileSystemObject
    unless:
      - id: metadata/document/html/
      - type: text
        substr: codeSnippetLink
      - type: text
        substr: Doxygen
      - type: text
        substr: Generated by
      - type: text
        substr: docs.microsoft.com
  - id: wsh-temp-expand
    desc: WSH expands TEMP path
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ExpandEnvironmentStrings("%TEMP%")
  - id: wsh-copyfile-call
    desc: WSH copies file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: CopyFile
    unless:
      - id: metadata/document/html/
      - type: text
        substr: codeSnippetLink
      - type: text
        substr: Doxygen
      - type: text
        substr: Generated by
      - type: text
        substr: CopyFileEx_meth
      - type: text
        substr: _WinAPI_CopyFileEx
      - type: text
        substr: function simulates the move by using the CopyFile
  - id: wsh-adodb-stream-html
    desc: HTML WSH references ADODB Stream
    crit: suspicious
    conf: 0.9
    for: [html]
    if:
      type: text
      substr: ADODB.Stream
  - id: wsh-savetofile
    desc: WSH saves stream to file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: SaveToFile
    unless:
      - id: metadata/document/html/
      - type: text
        substr: codeSnippetLink
      - type: text
        substr: Doxygen
      - type: text
        substr: Generated by
      - type: text
        substr: Convert data into png
      - type: text
        substr: Saves the JPG
      - type: text
        regex: '[A-Z]{3}\.SaveToFile'
      - id: metadata/package/quality/source::security-tracker-cve-leaf
  - id: wsh-hex-decode-loop
    desc: WSH hex decode loop
    crit: suspicious
    conf: 0.92
    attack: T1027
    if:
      type: text
      substr: "Step 2:h=h&Chr(CLng(\"&H\"&Mid"
  - id: wsh-xor-decode-loop
    desc: WSH XOR decode loop
    crit: suspicious
    conf: 0.92
    attack: T1027
    if:
      type: text
      regex: '\bXor\b.{0,50}\bAsc\(Mid\('
  - id: wsh-vbs-numeric-array-decoder
    desc: WSH numeric array decoder
    crit: suspicious
    conf: 0.9
    attack: T1027
    for: [vbs]
    if:
      type: text
      regex: '(?i)\)\s*-\s*\(.{1,80}\bAnd\b'
    unless:
      # Source maps may be heuristically typed as VBS because their embedded
      # JavaScript contains VBScript-like arithmetic text.
      - id: metadata/file/format::sourcemap
      - id: metadata/file/format::sourcemap-sources-content
      - id: metadata/library/structure::javascript-source-map-file
  - id: wsh-responsebody-pk-check
    desc: WSH checks downloaded PK header
    crit: suspicious
    conf: 0.92
    for: [vbs]
    if:
      type: text
      regex: '(?i)\)\s*=\s*80\s+And\s+AscB.{0,80}\)\s*=\s*75\s+Then'
  - id: wsh-vbs-run-decoded-argument
    desc: WSH runs decoded argument
    crit: suspicious
    conf: 0.9
    for: [vbs]
    if:
      type: text
      regex: '(?i)\.Run\s+[A-Za-z][A-Za-z0-9_]{5,}\s*\('
  - id: wsh-decoded-createobject
    desc: WSH decoded CreateObject call
    crit: suspicious
    conf: 0.94
    attack: T1027
    if:
      type: text
      regex: 'CreateObject\s*\(\s*x\(["''][0-9A-F]{20,}["'']\)'
  - id: wsh-shell-object-create
    desc: WSH creates a shell automation object
    crit: notable
    conf: 0.88
    for: [vbs]
    if:
      type: text
      regex: '(?i)CreateObject\s*\(\s*["''](WScript\.Shell|Shell\.Application)["'']\s*\)'
  - id: wsh-process-run-method
    desc: WSH process runner method
    crit: notable
    conf: 0.88
    for: [vbs]
    if:
      type: text
      regex: '(?i)\.(Run|ShellExecute)\b'
  - id: wsh-assembled-executable-name
    desc: WSH builds executable before ShellExecute
    crit: suspicious
    conf: 0.94
    attack: T1027,T1106
    for: [vbs]
    if:
      type: text
      regex: '(?is)\b\w+\s*=\s*\w+(\s*\+\s*[\w"'']+){3,8}[\s\S]{0,600}\.ShellExecute\b'
  - id: wsh-high-byte-script-text
    desc: WSH high-byte text
    crit: component
    conf: 0.88
    if:
      type: metrics
      field: text.high_byte_ratio
      min: 0.12
  - id: wsh-variable-run-call
    desc: WSH runs variable command
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: '(?i)\.Run\s*\(?[A-Za-z][A-Za-z0-9_]{6,}\)?\s*,?\s*false'
  - id: wsh-long-variable-hidden-run-call
    desc: WSH runs long variable hidden command
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: text
      regex: '(?i)\.Run\s+[A-Za-z][A-Za-z0-9_]{80,}\s*,\s*0\s*,\s*False\b'
  - id: wsh-split-powershell-path
    desc: WSH split PowerShell path
    crit: suspicious
    conf: 0.94
    attack: T1059.001
    for: [vbs]
    if:
      type: text
      regex: '(?i)Pow[A-Za-z0-9]{1,24}er[A-Za-z0-9]{1,24}She[A-Za-z0-9]{1,24}ll(\.exe)?'
    unless:
      - id: metadata/package/quality/source::security-tracker-cve-leaf
      # Source maps can contain normal PowerShell identifiers; they are not
      # WSH launchers.
      - id: metadata/file/format::sourcemap
  - id: wsh-split-frombase64string
    desc: WSH reconstructs Base64 decode API
    crit: suspicious
    conf: 0.94
    attack: T1027
    for: [vbs]
    if:
      type: text
      # WSH launchers commonly insert an alphanumeric marker inside the
      # method name, including between the final characters of String.
      regex: '(?i)Base.{0,12}64S.{0,12}t.{0,12}r.{0,12}i.{0,12}n.{0,12}g'
    unless:
      - id: metadata/file/format::sourcemap
      - id: metadata/file/format::sourcemap-sources-content
  - id: wsh-split-bxor-loop
    desc: WSH reconstructs split PowerShell XOR operator
    crit: suspicious
    conf: 0.92
    attack: T1027
    for: [vbs]
    if:
      type: text
      # Permit the same marker style between the operand and PowerShell's
      # -bxor operator, while retaining the strong operator anchor.
      regex: '(?i)\)\s*[A-Za-z0-9]{0,24}-bxor\b'
  - id: wsh-comspec-iex-fragment
    desc: WSH reconstructs ComSpec IEX invocation
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    for: [vbs]
    if:
      type: text
      regex: '(?i)Com.{0,12}S.{0,12}pec\s*\[[0-9A-Za-z,\s]{3,}\]\s*-.{0,12}join'
  - id: wsh-marker-cleanup
    desc: WSH strips a staging marker
    crit: suspicious
    conf: 0.94
    attack: T1027
    for: [vbs]
    if:
      type: text
      regex: '(?i)\bReplace\s*\(\s*[A-Za-z_]\w*\s*,\s*["''][A-Za-z0-9]{4,16}["'']\s*,\s*["'']{2}\s*\)'

  - id: wsh-vbs-xor-charcode
    desc: WSH XORs numeric character codes
    crit: suspicious
    conf: 0.92
    attack: T1027
    for: [vbs]
    if:
      type: text
      regex: '(?i)CLng.{0,120}Xor'

  - id: wsh-vbs-xor-modulo-key
    desc: WSH indexes XOR key modulo length
    crit: suspicious
    conf: 0.92
    attack: T1027
    for: [vbs]
    if:
      type: text
      regex: '(?i)\b[A-Za-z_]\w*\s*\(\s*[A-Za-z_]\w*\s+Mod\s+[A-Za-z_]\w*\s*\)'

  - id: js-computed-sync-com-method
    desc: Computed synchronous automation method call
    crit: suspicious
    conf: 0.93
    attack: T1105,T1027
    for: [javascript]
    if:
      type: text
      regex: '\[\w+\(\[[0-9,\s]{3,}\]\)\]\([^,]{1,160},\w+,false\)'

  - id: js-computed-stream-save-overwrite
    desc: Computed stream method saves with overwrite mode
    crit: suspicious
    conf: 0.94
    attack: T1105,T1027
    for: [javascript]
    if:
      type: text
      regex: '\[\w+\(\[[0-9,\s]{12,}\]\)\]\(\w+,2\)'

  - id: js-computed-hidden-run
    desc: Computed method launches a hidden process
    crit: notable
    conf: 0.94
    attack: T1059.007
    for: [javascript]
    if:
      type: text
      regex: '\[\w+\(\[[0-9,\s]{3,}\]\)\]\(\w+,0,false\)'

  - id: vbs-repeated-encoded-call-stager
    desc: VBScript encoded call accumulator
    crit: suspicious
    conf: 0.96
    attack: T1027
    for: [vbs]
    count_min: 8
    if:
      type: text
      regex: '(?im)^\s*Call\s+[A-Za-z_][A-Za-z0-9_]*\s*\(\s*["''][A-Za-z0-9+/]{20,}'

composite_rules:
  - id: wsh-fragmented-base64-hidden-loader
    desc: Fragmented Base64 payload runs hidden under WSH
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.005,T1564.003
    for: [vbs]
    all:
      - id: objectives/anti-static/obfuscation/multi-layer::vbs-base64-fragment-helper-calls
      - id: objectives/anti-static/obfuscation/multi-layer::vbs-fragmented-frombase64string-call
      - id: wsh-run-hidden-zero
  - id: wsh-high-byte-obfuscated-script
    desc: WSH high-byte script with obfuscation or hidden execution signals
    crit: suspicious
    conf: 0.92
    attack: T1027
    all:
      - id: wsh-high-byte-script-text
    any:
      - id: wsh-variable-run-call
      - id: wsh-long-variable-hidden-run-call
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-execute-dynamic
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
      - id: objectives/anti-static/obfuscation/string/anomaly::vbs-many-long-tokens
    needs: 1
  - id: wsh-obfuscated-temp-script-dropper
    desc: WSH decodes, writes, and runs a hidden temp script
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    attack: "T1027,T1059.005,T1105"
    for: [vbs]
    all:
      - id: wsh-vbs-xor-payload-decode
      - id: micro-behaviors/fs/write/content::create-text-file-api
      - id: objectives/anti-static/obfuscation/wsh::vbs-createobject-variable-arg
      - id: objectives/execution/interpreter/vbscript/loader::execute-variable
      - id: wsh-run-hidden-zero

  - id: wsh-obfuscated-encoded-script-stager
    desc: Obfuscated VBScript decodes, stages, and runs a hidden script
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    attack: "T1027,T1059.001,T1059.005,T1564.003"
    for: [vbs]
    all:
      - id: wsh-vbs-xor-charcode
      - id: micro-behaviors/fs/write/content::create-text-file-api
      - id: objectives/anti-static/obfuscation/wsh::vbs-createobject-variable-arg
      - id: wsh-savetofile
      - id: wsh-run-hidden-zero
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat

  - id: wsh-vbs-xor-payload-decode
    desc: WSH XOR-decodes numeric text
    crit: suspicious
    conf: 0.92
    attack: T1027
    for: [vbs]
    all:
      - id: wsh-vbs-xor-charcode
      - id: wsh-vbs-xor-modulo-key

  - id: wsh-runner-call
    desc: WSH invokes a process runner
    crit: suspicious
    conf: 0.88
    attack: T1027
    for: [vbs]
    all:
      - id: wsh-shell-object-create
      - id: wsh-process-run-method
    unless:
      - id: well-known/tool/development/agents-live::run-hidden-wrapper-tool
    near_bytes: 240

  - id: wsh-unc-exe-hidden-run-dropper
    desc: WSH hidden UNC EXE dropper
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: wsh-run-hidden-zero
      - id: wsh-unc-exe-path
  - id: wsh-copy-unc-exe-dropper
    desc: WSH copies UNC EXE dropper
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    all:
      - id: wsh-filesystemobject-ref
      - id: wsh-temp-expand
      - id: wsh-copyfile-call
      - id: wsh-unc-exe-path
      - id: wsh-run-hidden-zero
  - id: wsh-xmlhttp-adodb-execute-dropper
    desc: WSH downloads saves and executes
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    all:
      - id: micro-behaviors/os/com/object::activex-http-progid
      - id: wsh-adodb-stream-ref
      - id: micro-behaviors/process/create/script/wsh::responsebody-marker
      - id: wsh-savetofile
    any:
      - id: wsh-runner-call
      - id: wsh-run-hidden-zero
  - id: wsh-http-stream-save-run-dropper
    desc: WSH HTTP response saved to disk and executed
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    attack: "T1105,T1059.005"
    all:
      - id: micro-behaviors/os/com/object::activex-http-progid
      - id: micro-behaviors/communications/http/client/vba::http-open-send
      - id: micro-behaviors/fs/write/file/stream::adodb-stream
      - id: wsh-savetofile
      - id: wsh-runner-call
  - id: js-obfuscated-wsh-download-save-run
    desc: Obfuscated WSH remote binary download save and hidden execution
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    attack: "T1027,T1059.007,T1105"
    for: [javascript]
    all:
      - id: micro-behaviors/data/decode/custom::js-offset-array-fromcharcode-decode
      - id: objectives/anti-static/obfuscation/syntax::js-computed-constructor-from-numeric-decoder
      - id: js-computed-sync-com-method
      - id: js-computed-stream-save-overwrite
      - id: js-computed-hidden-run
    near_bytes: 4096
  - id: js-obfuscated-wsh-binary-stage
    desc: Obfuscated WSH binary stream staging
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: "T1027,T1105"
    for: [javascript]
    all:
      - id: js-computed-stream-save-overwrite
      - id: micro-behaviors/data/decode/custom::js-offset-array-fromcharcode-decode
      - id: objectives/anti-static/obfuscation/syntax::js-computed-constructor-from-numeric-decoder
      - id: js-computed-sync-com-method
    near_bytes: 4096
  - id: wsh-obfuscated-xor-save-run
    desc: WSH XOR decoded save and run
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: T1027
    all:
      - id: wsh-hex-decode-loop
      - id: wsh-xor-decode-loop
      - id: wsh-decoded-createobject
      - id: micro-behaviors/process/create/script/wsh::responsebody-marker
      - id: wsh-savetofile
      - id: wsh-run-hidden-zero
  - id: wsh-xor-downloaded-payload-run
    desc: WSH downloads XOR payload and runs it
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    attack: "T1059.005,T1105,T1027"
    all:
      - id: wsh-vbs-numeric-array-decoder
      - id: micro-behaviors/process/create/script/wsh::responsebody-marker
      - id: wsh-responsebody-pk-check
      - id: wsh-vbs-xor-payload-decode
      - id: wsh-vbs-run-decoded-argument
    any:
      - id: objectives/anti-static/obfuscation/wsh::vbs-createobject-variable-arg
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run
  - id: wsh-embedded-pe-adodb-runner
    desc: WSH embedded PE staged through ADODB stream
    crit: hostile
    conf: 0.97
    mbc: "B0023"
    attack: T1059.005, T1105
    all:
      - id: objectives/anti-static/obfuscation/payload/encoded::base64-pe-header
      - id: objectives/execution/interpreter/script/wsh::wsh-adodb-stream-binary
    any:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
  - id: wsh-obfuscated-hidden-runner
    desc: Obfuscated WSH hidden command runner
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: T1059.005, T1027
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: wsh-variable-run-call
    any:
      - id: wsh-runner-call
      - id: wsh-high-byte-obfuscated-script
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
      - id: wsh-run-hidden-zero
      - id: objectives/execution/wmi::wmi-process-spawn
      - id: objectives/execution/interpreter/script/wsh::powershell-bypass-hidden
    needs: 2
  - id: wsh-bloated-hidden-script-runner
    desc: WSH bloated hidden script runner
    crit: hostile
    conf: 0.96
    mbc: "B0023"
    attack: T1059.005,T1027
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
    any:
      - id: wsh-runner-call
      - id: wsh-high-byte-obfuscated-script
      - id: wsh-run-hidden-zero
      - id: objectives/execution/wmi::wmi-hidden-variable-process-create
    needs: 2
  - id: wsh-obfuscated-variable-command-runner
    desc: WSH obfuscated variable command runner
    crit: hostile
    conf: 0.97
    mbc: "B0023"
    attack: T1059.005, T1027
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: wsh-high-byte-obfuscated-script
    any:
      - id: wsh-variable-run-call
      - id: wsh-long-variable-hidden-run-call
    needs: 1
  - id: wsh-hidden-powershell-pe-stage
    desc: WSH launches hidden PowerShell around embedded PE stage
    crit: hostile
    conf: 0.96
    mbc: "B0023"
    attack: T1059.001, T1059.005
    all:
      - id: objectives/anti-static/obfuscation/payload/encoded::base64-pe-header
      - id: objectives/execution/interpreter/script/wsh::powershell-bypass-hidden
    any:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: wsh-run-hidden-zero
      - id: objectives/execution/wmi::wmi-process-spawn
      - id: micro-behaviors/fs/write/file/stream::adodb-stream
    needs: 2
  - id: wsh-obfuscated-hidden-activex-runner
    desc: WSH obfuscated hidden ActiveX runner
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: T1059.005,T1027
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: wsh-run-hidden-zero
      - id: wsh-runner-call
    any:
      - id: objectives/anti-static/obfuscation/wsh::vbs-execute-concat-code
      - id: objectives/anti-static/obfuscation/wsh::vbs-hidden-wscript-run
      - id: objectives/execution/activex/xslt::xslt-shell-exec-call
      - id: micro-behaviors/process/io/wsh::wsh-process-output-readall
    needs: 2
  - id: wsh-array-byte-execute-loader
    desc: WSH array-byte dynamic loader
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.005
    all:
      - id: micro-behaviors/data/encode/char-code::array-payload-reconstruction
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-execute-dynamic
      - id: micro-behaviors/data/decode/base64::msxml-domdocument-progid
  - id: wsh-msxml-xor-dynamic-code-loader
    desc: WSH executes XOR-decoded MSXML script bytes
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.005
    all:
      - id: objectives/execution/interpreter/vbscript/loader::executeglobal-variable
      - id: wsh-xor-decode-loop
      - id: micro-behaviors/data/decode/base64::msxml-node-typed-value
  # VBS writes a temp .cmd carrying PowerShell irm|iex, then ShellExecute-hidden.
  - id: vbs-temp-cmd-fileless-powershell-dropper
    desc: VBS drops temp CMD with PowerShell IRM eval and launches hidden
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    attack: "T1059.005,T1059.001,T1105,T1564.003"
    for: [vbs]
    all:
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: micro-behaviors/fs/write/content::create-script-file
      - id: objectives/command-and-control/dropper/execution/fileless::ps-irm-pipeline-eval
      - id: micro-behaviors/os/com/object::shell-application-progid
      - id: micro-behaviors/process/create/shell/wsh::shellexecute-hidden-showcmd

  - id: wsh-hidden-powershell-xor-loader
    desc: WSH hidden PowerShell XOR loader
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: T1059.005,T1059.001,T1027
    all:
      - id: wsh-run-hidden-zero
      - id: wsh-split-powershell-path
      - id: wsh-split-frombase64string
      - id: wsh-split-bxor-loop
    any:
