defaults:
  platforms: [windows]
  for: [html, vbs]
  attack: T1105

traits:
  - id: wsh-shell-create
    desc: WSH creates shell object
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?i)CreateObject\s*\(\s*["'']WScript\.Shell["'']'
  - id: wsh-run-hidden-zero
    desc: WSH runs hidden window
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)\.Run\s+[^,\r\n]{1,80},\s*0\b'
  - id: wsh-unc-exe-path
    desc: WSH references UNC EXE
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\\\\[A-Za-z0-9_.-]{1,80}\\[^"''\r\n]{0,80}\.exe'
  - id: wsh-filesystemobject
    desc: WSH creates FileSystemObject
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: Scripting.FileSystemObject
  - id: wsh-temp-expand
    desc: WSH expands TEMP path
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: ExpandEnvironmentStrings("%TEMP%")
  - id: wsh-copyfile-call
    desc: WSH copies file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: CopyFile
  - id: wsh-xmlhttp-progid
    desc: WSH references XMLHTTP
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)(MSXML2?\.XMLHTTP|Microsoft\.XMLHTTP)'
  - id: wsh-adodb-stream
    desc: WSH references ADODB Stream
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: ADODB.Stream
  - id: wsh-responsebody
    desc: WSH reads responseBody
    crit: notable
    conf: 0.9
    if:
      type: text
      word: responseBody
  - id: wsh-savetofile
    desc: WSH saves stream to file
    crit: notable
    conf: 0.9
    if:
      type: text
      word: SaveToFile
  - id: wsh-hex-decode-loop
    desc: WSH hex decode loop
    crit: suspicious
    conf: 0.92
    attack: T1027
    if:
      type: text
      substr: "Step 2:h=h&Chr(CLng(\"&H\"&Mid"
  - id: wsh-xor-decode-loop
    desc: WSH XOR decode loop
    crit: suspicious
    conf: 0.92
    attack: T1027
    if:
      type: text
      regex: '\bXor\b.{0,50}\bAsc\(Mid\('
  - id: wsh-decoded-createobject
    desc: WSH decoded CreateObject call
    crit: suspicious
    conf: 0.94
    attack: T1027
    if:
      type: text
      regex: 'CreateObject\s*\(\s*x\(["''][0-9A-F]{20,}["'']\)'

composite_rules:
  - id: wsh-unc-exe-hidden-run-dropper
    desc: WSH hidden UNC EXE dropper
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    all:
      - id: wsh-shell-create
      - id: wsh-run-hidden-zero
      - id: wsh-unc-exe-path
  - id: wsh-copy-unc-exe-dropper
    desc: WSH copies UNC EXE dropper
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    all:
      - id: wsh-filesystemobject
      - id: wsh-temp-expand
      - id: wsh-copyfile-call
      - id: wsh-unc-exe-path
      - id: wsh-run-hidden-zero
  - id: wsh-xmlhttp-adodb-execute-dropper
    desc: WSH downloads saves and executes
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    all:
      - id: wsh-xmlhttp-progid
      - id: wsh-adodb-stream
      - id: wsh-responsebody
      - id: wsh-savetofile
      - id: wsh-run-hidden-zero
  - id: wsh-obfuscated-xor-save-run
    desc: WSH XOR decoded save and run
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: T1027
    all:
      - id: wsh-hex-decode-loop
      - id: wsh-xor-decode-loop
      - id: wsh-decoded-createobject
      - id: wsh-responsebody
      - id: wsh-savetofile
      - id: wsh-run-hidden-zero
