defaults:
  platforms: [windows]
  for: [html, vbs]
  attack: T1105

traits:
  - id: wsh-run-hidden-zero
    desc: WSH runs hidden window
    crit: suspicious
    conf: 0.92
    unless:
      - type: basename
        exact: scrcpy-noconsole.vbs
      - id: well-known/lib/deb-package::firefox-omni-basename
    if:
      type: text
      regex: '(?i)\.Run\s*[(\s][^,\r\n]{1,80},\s*0\b'
  - id: wsh-unc-exe-path
    desc: WSH references UNC EXE
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\\\\[A-Za-z0-9_.-]{1,80}\\[^"''\r\n]{0,80}\.exe'
    unless:
      - id: metadata/document/html/
      - id: metadata/library/structure::vscode-source-map-file
      - id: well-known/lib/deb-package::firefox-omni-basename
      - type: text
        substr: CopyFileEx_meth
      - type: text
        substr: _WinAPI_CopyFileEx
      - type: text
        substr: function simulates the move by using the CopyFile
  - id: wsh-filesystemobject-html
    desc: HTML WSH creates FileSystemObject
    crit: suspicious
    conf: 0.85
    for: [html]
    if:
      type: text
      substr: Scripting.FileSystemObject
    unless:
      - id: metadata/document/html/
      - type: text
        substr: codeSnippetLink
      - type: text
        substr: Doxygen
      - type: text
        substr: Generated by
      - type: text
        substr: docs.microsoft.com
  - id: wsh-temp-expand
    desc: WSH expands TEMP path
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ExpandEnvironmentStrings("%TEMP%")
  - id: wsh-copyfile-call
    desc: WSH copies file
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: CopyFile
    unless:
      - id: metadata/document/html/
      - type: text
        substr: codeSnippetLink
      - type: text
        substr: Doxygen
      - type: text
        substr: Generated by
      - type: text
        substr: CopyFileEx_meth
      - type: text
        substr: _WinAPI_CopyFileEx
      - type: text
        substr: function simulates the move by using the CopyFile
  - id: wsh-xmlhttp-progid
    desc: WSH references XMLHTTP
    crit: notable
    conf: 0.9
    for: [html, vbs, javascript]
    if:
      type: text
      regex: '(?i)(ActiveX|Create)Object\s*\(\s*[''"](MSXML2?\.(Server)?XMLHTTP|Microsoft\.XMLHTTP)'
    unless:
      - id: metadata/document/html/
      - id: well-known/app/browser-extension::honey-popover-wallet-bundle
      - type: text
        regex: 'return\s+new\s+[a-zA-Z0-9_]+\.ActiveXObject\(\s*["'']Microsoft\.XMLHTTP["'']\s*\)'
  - id: wsh-adodb-stream-html
    desc: HTML WSH references ADODB Stream
    crit: suspicious
    conf: 0.9
    for: [html]
    if:
      type: text
      substr: ADODB.Stream
  - id: wsh-savetofile
    desc: WSH saves stream to file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: SaveToFile
    unless:
      - id: metadata/document/html/
      - type: text
        substr: codeSnippetLink
      - type: text
        substr: Doxygen
      - type: text
        substr: Generated by
      - type: text
        substr: Convert data into png
      - type: text
        substr: Saves the JPG
      - type: text
        regex: '[A-Z]{3}\.SaveToFile'
  - id: wsh-hex-decode-loop
    desc: WSH hex decode loop
    crit: suspicious
    conf: 0.92
    attack: T1027
    if:
      type: text
      substr: "Step 2:h=h&Chr(CLng(\"&H\"&Mid"
  - id: wsh-xor-decode-loop
    desc: WSH XOR decode loop
    crit: suspicious
    conf: 0.92
    attack: T1027
    if:
      type: text
      regex: '\bXor\b.{0,50}\bAsc\(Mid\('
  - id: wsh-vbs-numeric-array-decoder
    desc: WSH numeric array decoder
    crit: suspicious
    conf: 0.9
    attack: T1027
    for: [vbs]
    if:
      type: text
      regex: '(?i)\)\s*-\s*\(.{1,80}\bAnd\b'
  - id: wsh-responsebody-pk-check
    desc: WSH checks downloaded PK header
    crit: suspicious
    conf: 0.92
    for: [vbs]
    if:
      type: text
      regex: '(?i)\)\s*=\s*80\s+And\s+AscB.{0,80}\)\s*=\s*75\s+Then'
  - id: wsh-vbs-xor-payload-decode
    desc: WSH XOR decodes payload bytes
    crit: suspicious
    conf: 0.92
    attack: T1027
    for: [vbs]
    if:
      type: text
      regex: '(?i)ChrW\s*\(.{0,80}\bXOR\b.{0,120}MOD\s+16'
  - id: wsh-vbs-run-decoded-argument
    desc: WSH runs decoded argument
    crit: suspicious
    conf: 0.9
    for: [vbs]
    if:
      type: text
      regex: '(?i)\.Run\s+[A-Za-z][A-Za-z0-9_]{5,}\s*\('
  - id: wsh-decoded-createobject
    desc: WSH decoded CreateObject call
    crit: suspicious
    conf: 0.94
    attack: T1027
    if:
      type: text
      regex: 'CreateObject\s*\(\s*x\(["''][0-9A-F]{20,}["'']\)'
  - id: wsh-obfuscated-runner-bloat
    desc: WSH obfuscated runner bloat
    crit: suspicious
    conf: 0.88
    attack: T1027
    if:
      type: metrics
      field: text.lines_over_200
      min: 20
  - id: wsh-high-byte-obfuscated-script
    desc: WSH high-byte obfuscated script
    crit: suspicious
    conf: 0.88
    attack: T1027
    if:
      type: metrics
      field: text.high_byte_ratio
      min: 0.12
  - id: wsh-variable-run-call
    desc: WSH runs variable command
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: '(?i)\.Run\s*\(?[A-Za-z][A-Za-z0-9_]{6,}\)?\s*,?\s*false'
  - id: wsh-long-variable-hidden-run-call
    desc: WSH runs long variable hidden command
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: text
      regex: '(?i)\.Run\s+[A-Za-z][A-Za-z0-9_]{80,}\s*,\s*0\s*,\s*False\b'
  - id: wsh-split-powershell-path
    desc: WSH split PowerShell path
    crit: suspicious
    conf: 0.94
    attack: T1059.001
    for: [vbs]
    if:
      type: text
      substr: PowerShela
  - id: wsh-split-frombase64string
    desc: WSH split FromBase64String API
    crit: suspicious
    conf: 0.94
    attack: T1027
    for: [vbs]
    if:
      type: text
      substr: se64String
  - id: wsh-split-bxor-loop
    desc: WSH split PowerShell XOR loop
    crit: suspicious
    conf: 0.92
    attack: T1027
    for: [vbs]
    if:
      type: text
      substr: ")-bxo"
  - id: wsh-comspec-iex-fragment
    desc: WSH ComSpec IEX fragment
    crit: suspicious
    conf: 0.9
    attack: T1059.001
    for: [vbs]
    if:
      type: text
      substr: "c[4,2"

composite_rules:
  - id: wsh-unc-exe-hidden-run-dropper
    desc: WSH hidden UNC EXE dropper
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: wsh-run-hidden-zero
      - id: wsh-unc-exe-path
  - id: wsh-copy-unc-exe-dropper
    desc: WSH copies UNC EXE dropper
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    all:
      - id: wsh-filesystemobject-ref
      - id: wsh-temp-expand
      - id: wsh-copyfile-call
      - id: wsh-unc-exe-path
      - id: wsh-run-hidden-zero
  - id: wsh-xmlhttp-adodb-execute-dropper
    desc: WSH downloads saves and executes
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    all:
      - id: wsh-xmlhttp-progid
      - id: wsh-adodb-stream-ref
      - id: micro-behaviors/process/create/script/wsh::responsebody-marker
      - id: wsh-savetofile
      - id: wsh-run-hidden-zero
  - id: wsh-obfuscated-xor-save-run
    desc: WSH XOR decoded save and run
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: T1027
    all:
      - id: wsh-hex-decode-loop
      - id: wsh-xor-decode-loop
      - id: wsh-decoded-createobject
      - id: micro-behaviors/process/create/script/wsh::responsebody-marker
      - id: wsh-savetofile
      - id: wsh-run-hidden-zero
  - id: wsh-xor-downloaded-payload-run
    desc: WSH downloads XOR payload and runs it
    crit: hostile
    conf: 0.99
    mbc: "B0023"
    attack: "T1059.005,T1105,T1027"
    all:
      - id: wsh-vbs-numeric-array-decoder
      - id: micro-behaviors/process/create/script/wsh::responsebody-marker
      - id: wsh-responsebody-pk-check
      - id: wsh-vbs-xor-payload-decode
      - id: wsh-vbs-run-decoded-argument
    any:
      - id: objectives/anti-static/obfuscation/wsh::vbs-createobject-variable-arg
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run
  - id: wsh-embedded-pe-adodb-runner
    desc: WSH embedded PE staged through ADODB stream
    crit: hostile
    conf: 0.97
    mbc: "B0023"
    attack: T1059.005, T1105
    all:
      - id: objectives/anti-static/obfuscation/payload/encoded::base64-pe-header
      - id: objectives/execution/interpreter/script/wsh::wsh-adodb-stream-binary
    any:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
  - id: wsh-obfuscated-hidden-runner
    desc: Obfuscated WSH hidden command runner
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: T1059.005, T1027
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: wsh-variable-run-call
    any:
      - id: wsh-obfuscated-runner-bloat
      - id: wsh-high-byte-obfuscated-script
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
      - id: wsh-run-hidden-zero
      - id: objectives/execution/wmi::wmi-process-spawn
      - id: objectives/execution/interpreter/script/wsh::powershell-bypass-hidden
    needs: 2
  - id: wsh-bloated-hidden-script-runner
    desc: WSH bloated hidden script runner
    crit: hostile
    conf: 0.96
    mbc: "B0023"
    attack: T1059.005,T1027
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
    any:
      - id: wsh-obfuscated-runner-bloat
      - id: wsh-high-byte-obfuscated-script
      - id: wsh-run-hidden-zero
      - id: objectives/execution/wmi::wmi-hidden-variable-process-create
    needs: 2
  - id: wsh-obfuscated-variable-command-runner
    desc: WSH obfuscated variable command runner
    crit: hostile
    conf: 0.97
    mbc: "B0023"
    attack: T1059.005, T1027
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: wsh-high-byte-obfuscated-script
    any:
      - id: wsh-variable-run-call
      - id: wsh-long-variable-hidden-run-call
    needs: 1
  - id: wsh-hidden-powershell-pe-stage
    desc: WSH launches hidden PowerShell around embedded PE stage
    crit: hostile
    conf: 0.96
    mbc: "B0023"
    attack: T1059.001, T1059.005
    all:
      - id: objectives/anti-static/obfuscation/payload/encoded::base64-pe-header
      - id: objectives/execution/interpreter/script/wsh::powershell-bypass-hidden
    any:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: wsh-run-hidden-zero
      - id: objectives/execution/wmi::wmi-process-spawn
      - id: micro-behaviors/fs/write/file/stream::adodb-stream
    needs: 2
  - id: wsh-obfuscated-hidden-activex-runner
    desc: WSH obfuscated hidden ActiveX runner
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: T1059.005,T1027
    all:
      - id: micro-behaviors/os/wsh/file::wscript-shell-object
      - id: wsh-run-hidden-zero
      - id: wsh-obfuscated-runner-bloat
    any:
      - id: objectives/anti-static/obfuscation/wsh::vbs-execute-concat-code
      - id: objectives/anti-static/obfuscation/wsh::vbs-hidden-wscript-run
      - id: objectives/execution/activex/xslt::xslt-shell-exec-call
      - id: objectives/execution/activex/xslt::xslt-stdout-readall
    needs: 2
  - id: wsh-hidden-powershell-xor-loader
    desc: WSH hidden PowerShell XOR loader
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: T1059.005,T1059.001,T1027
    all:
      - id: wsh-run-hidden-zero
      - id: wsh-split-powershell-path
      - id: wsh-split-frombase64string
      - id: wsh-split-bxor-loop
    any:
      - id: wsh-comspec-iex-fragment
      - id: wsh-obfuscated-runner-bloat

  - id: wsh-adodb-stream-ref
    desc: WSH ADODB Stream reference
    crit: component
    conf: 0.9
    any:
      - id: wsh-adodb-stream-html
      - id: micro-behaviors/process/create/macro/office::createobject-adodb-stream

  - id: wsh-filesystemobject-ref
    desc: WSH FileSystemObject reference
    crit: component
    conf: 0.85
    any:
      - id: wsh-filesystemobject-html
      - id: micro-behaviors/process/create/macro/office::createobject-scripting-fso

  - id: wsh-xmlhttp-fso-execute-dropper
    desc: WSH downloads via XMLHTTP writes via FSO and executes
    crit: hostile
    conf: 0.98
    for: [html, vbs, javascript]
    mbc: "B0023"
    all:
      - id: wsh-xmlhttp-progid
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: micro-behaviors/fs/write/content::create-text-file-api
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-hidden-window
