# XML-hosted JScript downloader/stager traits.
# XML is used because cleave analyzes WSF content as XML with embedded script.
defaults:
  platforms: [windows]
  for: [xml]
  attack: T1027,T1059.001,T1105

traits:
  - id: xml-wsh-powershell-policy-bypass
    desc: PowerShell bypass launch command
    crit: suspicious
    conf: 0.97
    attack: T1059.001
    if:
      type: text
      regex: '(?i)\bpowershell(\.exe)?\\x20-nop\\x20-ep\\x20bypass\\x20-file\b'

  - id: xml-wsh-powershell-stage-file
    desc: References a staged PowerShell script file
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: '.ps1'

  - id: xml-wsh-response-text-access
    desc: Reads downloaded response text
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: responseText

composite_rules:
  - id: xml-xslt-jscript-com-script-dropper
    desc: XSLT-hosted JScript combines COM download and script-file creation
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/interpreter/jscript::activex-object-text
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: micro-behaviors/fs/write/content::create-text-file-api
      - id: micro-behaviors/fs/write/content::create-script-file
      - id: objectives/execution/activex/xslt::xslt-jscript-language

  - id: xml-wsh-script-file-loader
    desc: XML WSH downloads and launches a PowerShell script stage
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: xml-wsh-response-text-access
      - id: micro-behaviors/os/com/object::wscript-shell-literal
      - id: micro-behaviors/fs/write/content::create-text-file-api
      - id: xml-wsh-powershell-stage-file
      - id: xml-wsh-powershell-policy-bypass
