defaults:
  platforms: [netscaler, appliance, unix]
  for: [perl]
  attack: T1059

traits:
  - id: perl-base64-eval-payload
    desc: Perl base64 eval payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'decode_base64[\s\S]{0,160}eval \$decoded'

  - id: perl-decode-payload-eval
    desc: Perl decode payload eval
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'decode_payload\(\$encoded\)[\s\S]{0,80}eval \$decoded'

  - id: perl-polyglot-marker
    desc: Perl polyglot marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: polyglot marker

  - id: perl-polyglot-b64-marker
    desc: Perl polyglot b64 marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: cHJpbnQgIiJ7ICMgcG9seWdsb3Q

  - id: perl-self-modify-backup
    desc: Perl self-modify backup
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '__FILE__[\s\S]{0,260}rename\(\$backup, \$self\)'

composite_rules:
  - id: perl-polyglot-eval-dropper
    desc: Perl polyglot eval dropper
    crit: hostile
    conf: 0.98
    all:
      - id: perl-decode-payload-eval
      - id: perl-polyglot-b64-marker
    any:
      - id: perl-self-modify-backup
      - id: perl-polyglot-marker
      - id: perl-base64-eval-payload
