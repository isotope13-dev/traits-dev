defaults:
  platforms: [unix]
  for: [shell]
  attack: T1059.004

traits:
  - id: shell-self-tail-extract
    desc: Shell extracts payload from own tail
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\btail\s+-[0-9]+\s+\$0\b'

  - id: shell-uudecode-stdout
    desc: Shell decodes uuencoded payload to stdout
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\buudecode\s+-o\s+/dev/stdout\b'

  - id: shell-uudecode-command
    desc: Shell invokes uudecode
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: uudecode

  - id: shell-run-uname-named-stage
    desc: Shell executes stage named from uname output
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bsh\s+`uname\s+-[A-Za-z]+`'

  - id: shell-remove-uname-named-stage
    desc: Shell removes stage named from uname output
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\brm\s+`uname\s+-[A-Za-z]+`'

composite_rules:
  - id: shell-uuencoded-self-extract-dropper
    desc: Shell uuencoded self-extracting dropper
    crit: hostile
    conf: 0.97
    all:
      - id: shell-self-tail-extract
      - id: shell-uudecode-stdout
      - id: shell-run-uname-named-stage
      - id: shell-remove-uname-named-stage
    any:
      - id: shell-uudecode-command
      - id: micro-behaviors/process/create/shell/pipeline::excessive-pipes
