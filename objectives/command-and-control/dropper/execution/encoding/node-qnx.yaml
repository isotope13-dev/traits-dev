defaults:
  platforms: [qnx, unix]
  for: [javascript, typescript]
  attack: T1059

traits:
  - id: qnx-node-payload-api
    desc: QNX Node payload API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/payload

  - id: qnx-node-dropper-api
    desc: QNX Node dropper API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/dropper.js

  - id: qnx-node-base64-new-function
    desc: QNX Node base64 new Function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Buffer\.from\(payload\.script[\s\S]{0,220}new Function'

composite_rules:
  - id: qnx-node-c2-dropper-exec
    desc: QNX Node C2 dropper exec
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-node-payload-api
      - id: qnx-node-dropper-api
      - id: qnx-node-base64-new-function
