defaults:
  platforms: [netscaler, appliance, unix]
  for: [shell]
  attack: T1059.004

traits:
  - id: shell-polyglot-decode-chain
    desc: Shell polyglot decode chain
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'xxd -r -p[\s\S]{0,120}base64 -d'

  - id: shell-eval-decoded-command
    desc: Shell eval decoded command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'eval "\$\(echo "\$hex_encoded"'

  - id: shell-gateway-api-path
    desc: Shell gateway API path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/gateway

composite_rules:
  - id: shell-polyglot-eval-dropper
    desc: Shell polyglot eval dropper
    crit: hostile
    conf: 0.98
    all:
      - id: shell-polyglot-decode-chain
      - id: shell-eval-decoded-command
    any:
      - id: shell-gateway-api-path
