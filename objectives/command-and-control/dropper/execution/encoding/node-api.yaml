defaults:
  platforms: [windows, unix, qnx]
  for: [javascript, typescript]
  attack: T1059

traits:
  - id: node-payload-api-path
    desc: Node payload API path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/payload

  - id: node-dropper-api-path
    desc: Node dropper API path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/v1/dropper.js

  - id: node-base64-new-function-payload
    desc: Node base64 payload new Function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Buffer\.from\(payload\.script[\s\S]{0,220}new Function'

composite_rules:
  - id: node-api-base64-dropper-exec
    desc: Node API base64 dropper exec
    crit: hostile
    conf: 0.98
    all:
      - id: node-payload-api-path
      - id: node-dropper-api-path
      - id: node-base64-new-function-payload
