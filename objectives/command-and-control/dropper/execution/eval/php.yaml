# PHP remote-eval stager patterns
# Detects fetch-and-eval chains where PHP executes code from remote URLs.
# ATT&CK: T1105 (Ingress Tool Transfer), T1059.006 (PHP)
# MBC: B0024 (Download), E1059 (Command and Scripting Interpreter)
defaults:
  platforms: [windows, unix]
  attack: T1105
  for: [php]
traits:
  - id: eval-file-get-contents-url
    desc: eval() executes remote URL content
    crit: suspicious
    conf: 0.97
    mbc: "E1059"
    if:
      type: text
      regex: '(?i)@?eval\s*\([^)]{0,80}file_get_contents\s*\(\s*["'']https?://'
  - id: eval-file-get-contents-php-url
    desc: eval() fetches remote PHP payload
    crit: suspicious
    conf: 0.98
    mbc: "E1059"
    if:
      type: text
      regex: '(?i)@?eval\s*\([^)]{0,80}file_get_contents\s*\([^)]{0,160}\.php'
composite_rules:
  - id: php-remote-eval-stager
    desc: PHP stager fetches and evals remote script
    crit: hostile
    conf: 0.99
    mbc: "B0024"
    all:
      - id: eval-file-get-contents-url
      - id: micro-behaviors/communications/ip::http-ip-url
  - id: php-suppressed-remote-eval-stager
    desc: PHP silently evals remote script content
    crit: hostile
    conf: 0.99
    mbc: "B0024"
    all:
      - id: eval-file-get-contents-url
      - id: objectives/execution/interpreter/eval/remote::eval-error-suppressed
  - id: php-encoded-json-eval-stager
    desc: Encoded JSON PHP remote eval stager
    crit: hostile
    conf: 0.995
    mbc: "B0024"
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::encoded-json-callback-array
      - id: objectives/anti-static/obfuscation/string/encoding::encoded-eval-file-get-contents-http
      - id: objectives/anti-static/obfuscation/string/encoding::php-reversed-urlencode-base64-stager
