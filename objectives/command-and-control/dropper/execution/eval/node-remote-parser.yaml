---
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

composite_rules:
  - id: node-obfuscated-remote-parser-vm-loader
    desc: Node package executes an obfuscated remote parser in a VM
    crit: hostile
    conf: 0.99
    attack: T1195.002,T1027,T1105,T1059.007
    mbc: B0024,B0032
    for: [javascript, package.json, archives]
    # All loader legs must occur in the same source file.  Pooling across an
    # extension and its ordinary dependencies turns unrelated lodash/HTTP/VM
    # capabilities into a hostile remote-parser finding.
    scope: file
    all:
      - id: micro-behaviors/data/serialize/json::json-parse-call
      - id: micro-behaviors/communications/http/request/client::https-get
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call
      - id: micro-behaviors/process/interpreter/vm::vm-runInContext
      - id: micro-behaviors/data/source/dynamic/load::node-variable-require-call

  - id: batch-remote-parser-runtime-launch
    desc: Batch downloads and launches a remote runtime parser
    crit: hostile
    conf: 0.99
    for: [batch]
    platforms: [windows]
    attack: "T1059.003,T1105"
    all:
      - id: micro-behaviors/process/create/script/file::batch-variable-runtime-script-launch
      - id: micro-behaviors/process/create/start-process::batch-start-process-self-arg
    any:
      - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
      - id: micro-behaviors/communications/http/download/curl::batch-curl-http-url
    needs: 1
