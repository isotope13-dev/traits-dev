defaults:
  platforms: [panos, appliance, unix]
  for: [ruby]
  attack: T1059

traits:
  - id: ruby-panos-data-hidden-eval
    desc: Ruby PAN-OS DATA hidden eval
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'DATA section[\s\S]{0,120}eval\(hidden\)'

  - id: ruby-panos-frags-payload-array
    desc: Ruby PAN-OS FRAGS payload array
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: HEX_FRAGS

composite_rules:
  - id: ruby-panos-data-eval-payload
    desc: Ruby PAN-OS DATA eval payload
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-panos-data-hidden-eval
      - id: ruby-panos-frags-payload-array
