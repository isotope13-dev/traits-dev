# JavaScript/WSH remote-eval dropper patterns
# Focused on ActiveX XMLHTTP response execution in-memory.
defaults:
  attack: T1105
  mbc: B0024
  for: [javascript]
  platforms: [windows]
traits:
  - id: eval-response-text
    desc: eval() on XMLHTTP responseText
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(^|[^.$A-Za-z0-9_])eval\s*\(\s*[a-zA-Z_$][\w$]*\.responseText'
    unless:
      # Browser polyfill code checks window.XMLHttpRequest as an alternative to
      # ActiveXObject. WSH/JScript droppers never reference window.XMLHttpRequest
      # because the window object doesn't exist in WSH.
      - type: text
        substr: 'window.XMLHttpRequest'
      - id: metadata/library/runtime::websharper-runtime-marker
      - id: well-known/lib/requirejs::requirejs-browser-xhr-loader
composite_rules:
  - id: packed-custom-decoder-eval-dropper
    desc: Large JavaScript custom decoder feeds an indirect eval sink
    crit: hostile
    conf: 0.97
    attack: T1027,T1059.007
    mbc: B0032
    all:
      - id: metadata/library/structure::js-large-minified-bundle
      - id: micro-behaviors/data/decode/custom::js-indexof-charat-alphabet-loop
      - id: micro-behaviors/process/interpreter/eval::js-indirect-eval-variable
  - id: activex-xmlhttp-remote-eval
    desc: ActiveX XMLHTTP remote response eval
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/interpreter/jscript::activex-object
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: micro-behaviors/communications/http/client/response-body::response-text
      - id: eval-response-text
    any:
      - id: micro-behaviors/communications/http/client/xmlhttp::js-xmlhttp-open
      - id: micro-behaviors/communications/http/client/xmlhttp::js-xmlhttp-open-obfuscated-method
      - id: micro-behaviors/communications/http/client/xmlhttp::js-xmlhttp-send
  - id: activex-xmlhttp-marker-remote-eval
    desc: ActiveX XMLHTTP marker-rewritten remote eval
    crit: hostile
    conf: 0.99
    all:
      - id: activex-xmlhttp-remote-eval
      - id: objectives/anti-static/obfuscation/string/conceal::js-response-split-join-marker
      - id: objectives/anti-static/obfuscation/string/conceal::js-join-substring-char
  - id: wscript-xmlhttp-download-eval
    desc: WScript XMLHTTP download and eval execution
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/execution/interpreter/script/wsh::wscript-createobject
      - id: micro-behaviors/communications/http/client/response-body::response-text
    any:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
    unless:
      - id: metadata/library/jquery::domain
