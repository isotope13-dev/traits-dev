defaults:
  platforms: [unix]
  crit: suspicious
  attack: T1105
  mbc: B0030
  for: [shell]
traits:
  - id: download-execute-script
    desc: Downloads and executes remote script
    crit: notable
    conf: 0.95
    attack: T1059.004
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: basename
        exact: METADATA
      - type: basename
        exact: PKG-INFO
      - type: basename
        regex: '^README(\..*)?$'
        case_insensitive: true
      - id: metadata/file/extension/identity::markdown-file-basename
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
    if:
      type: text
      regex: '(?m)^[[:space:]]*[^#\n]{0,80}\b(curl|wget)\s+[^|\n]{0,50}\|\s*sh\b'
    not:
      - substr: "curl http://npmjs.org/install.sh"
      - substr: apt.u.doover.com/install.sh
      - substr: "https://install.fuel.sh"
      - substr: "https://install.fuel.network"
      - substr: astral.sh # uv installer (well-known Python package manager)
      - substr: aka.ms/apm-unix # APM installer documentation
      - substr: golangci-lint.run/install.sh # well-known Go linter installer
      - substr: ollama.com # ollama installer (well-known LLM runtime)
      - substr: rustup.rs # rustup bootstrap installer
      - substr: "melange"
    downgrade:
      any:
        - {id: 'metadata/package/testing/harness/runtime/'}
  - id: download-execute-quiet
    desc: Silent download and execute
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: '(?m)^[[:space:]]*[^#\n]{0,80}\b(curl\s+-[so]|wget\s+-[qO])\s+[^|\n]{0,50}\|\s*sh\b'
    unless:
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
    not:
      - substr: apt.u.doover.com/install.sh
  - id: download-save-execute
    desc: Downloads, saves, and executes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (curl\s+-o|wget\s+-O)\s+\S+[^&]{0,50}&&[^&]{0,30}chmod\s+\+x
  - id: download-url-hardcoded
    desc: Hardcoded download URL
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (curl|wget)\s+[^\n]{0,50}https?://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+
    unless:
      - type: text
        regex: 127\.0\.0\.1|0\.0\.0\.0
  - id: md5-verification
    desc: MD5 checksum verification
    # `md5sum X | awk` is a normal shell idiom for extracting the hex digest.
    # Only meaningful as a dropper signal alongside download + write + exec.
    crit: component
    conf: 0.8
    if:
      type: text
      regex: md5sum\s+\S+\s*\|\s*awk
  - id: payload-checksum-compare
    desc: Payload integrity verification
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \$MD5[^=]{0,20}=[^$]{0,20}\$sum|\$sum[^=]{0,20}=[^$]{0,20}\$MD5|checkExists
    unless:
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
      - id: metadata/file/format::sourcemap-sources-content
      - id: well-known/app/vscode-marketplace::claude-code-gauge-member-path
      - type: basename
        regex: '\.map$'
      - type: text
        regex: 'claude-code-gauge|Claude Code Gauge'
  - id: loader-selection-env-var
    desc: LDR/WGET/DL env var for curl/wget
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \b(LDR|WGET|DL)\s*=\s*(curl|wget)
  - id: toolchain-command-check-cluster
    desc: Toolchain command checks
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'command -v rg[\s\S]{0,180}command -v curl'
  - id: eval-curl-subshell
    desc: eval "$(curl ..."
    crit: suspicious
    conf: 0.7
    attack: T1059.004 - '*'
    if:
      type: text
      regex: eval\s*"\$\(curl
  - id: eval-curl-backtick
    desc: eval `curl ...`
    crit: suspicious
    conf: 0.7
    attack: T1059.004 - '*'
    if:
      type: text
      regex: eval\s*`curl
  - id: eval-wget-subshell
    desc: eval "$(wget ..."
    crit: suspicious
    conf: 0.7
    attack: T1059.004 - '*'
    if:
      type: text
      regex: eval\s*"\$\(wget
  - id: eval-wget-backtick
    desc: eval `wget ...`
    crit: suspicious
    conf: 0.7
    attack: T1059.004 - '*'
    if:
      type: text
      regex: eval\s*`wget
  - id: curl-pipe-eval
    desc: curl output piped to eval
    crit: suspicious
    conf: 0.9
    attack: T1059.004 - '*'
    if:
      type: text
      regex: \bcurl\b.{0,120}\|\s*\beval\b
    unless:
      - id: well-known/tool/detection/clawker::adversarial-payload-fixture
  - id: wget-pipe-eval
    desc: wget output piped to eval
    crit: suspicious
    conf: 0.9
    attack: T1059.004 - '*'
    if:
      type: text
      regex: wget.{0,120}\|\s*eval\b|eval.{0,120}wget
  - id: eval-openssl-subshell
    desc: "eval \"$(openssl ...\""
    crit: suspicious
    conf: 0.8
    attack: T1059.004 - '*'
    if:
      type: text
      regex: eval\s*"\$\(openssl
  - id: curl-command-substitution-assignment
    desc: curl response assigned to variable
    crit: component
    conf: 0.88
    attack: T1059.004 - '*'
    for: [shell, macho]
    if:
      type: text
      regex: '\b[A-Za-z_][A-Za-z0-9_]{1,24}=\$\(curl\b[^)]{0,400}\)'
  - id: evals-shell-variable
    desc: eval executes variable content
    crit: notable
    conf: 0.86
    attack: T1059.004 - '*'
    for: [shell, macho]
    unless:
      - id: metadata/package/testing/presence/harness/
    if:
      type: text
      regex: '\beval\s+"\$[A-Za-z_][A-Za-z0-9_]{1,24}"'
  - id: shell-curl-process-sub
    desc: shell <(curl ...)
    crit: suspicious
    conf: 0.7
    attack: T1059.004 - '*'
    if:
      type: text
      regex: shell\s+<\(curl
  - id: sh-curl-process-sub
    desc: sh <(curl ...) process substitution
    crit: notable
    conf: 0.7
    attack: T1059.004 - '*'
    if:
      type: text
      regex: (^|[^A-Za-z])sh\s+<\(curl
    not:
      - substr: raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash
      - substr: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint
  - id: source-curl-process-sub
    desc: source <(curl ...)
    crit: notable
    conf: 0.7
    attack: T1059.004 - '*'
    if:
      type: text
      regex: source\s+<\(curl
  - id: source-wget-process-sub
    desc: source <(wget ...)
    crit: notable
    conf: 0.7
    attack: T1059.004 - '*'
    if:
      type: text
      regex: source\s+<\(wget
composite_rules:
  - id: loader-selection
    desc: Selects curl or wget dynamically
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/communications/http/download/shell::curl-wget-command-check
      - id: loader-selection-env-var
    unless:
      - id: well-known/app/nvidia-nvcf::ci-dependency-tooling
      - id: well-known/app/openai-codex/
      - id: toolchain-command-check-cluster
  - id: verified-dropper
    desc: Verified payload dropper
    crit: hostile
    conf: 0.95
    all:
      - id: loader-selection
      - id: download-url-hardcoded
      - id: md5-verification
      - id: payload-checksum-compare
      - id: download-save-execute
  - id: simple-dropper
    desc: Simple download-execute dropper
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/command-and-control/dropper/execution/eval::download-execute-script
      - id: download-url-hardcoded
  - id: fetch-eval
    desc: Remote script fetch and eval
    crit: suspicious
    conf: 0.9
    attack: T1059.004
    for: [shell, macho]
    any:
      - id: eval-curl-subshell
      - id: eval-curl-backtick
      - id: eval-wget-subshell
      - id: eval-wget-backtick
      - id: eval-openssl-subshell
      - id: curl-variable-eval
  - id: curl-variable-eval
    desc: curl response variable eval
    crit: hostile
    conf: 0.97
    attack: T1059.004
    for: [shell, macho]
    near_bytes: 600
    all:
      - id: curl-command-substitution-assignment
      - id: evals-shell-variable
  - id: process-substitution
    desc: Shell process substitution with remote content
    crit: notable
    conf: 0.85
    attack: T1059.004
    any:
      - id: shell-curl-process-sub
      - id: sh-curl-process-sub
      - id: source-curl-process-sub
      - id: source-wget-process-sub
