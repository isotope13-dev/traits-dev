defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009

traits:
  - id: iexpress-autoit-script-payload
    desc: IExpress cabinet launches AutoIt script payload
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(?i)"AutoIt3\.exe"\s+[^\r\n"]{1,80}\.a3x\b'

composite_rules:
  - id: msi-iexpress-autoit-dropper
    desc: MSI embeds IExpress AutoIt dropper
    crit: hostile
    conf: 0.99
    for: [oledoc, ole]
    all:
      - id: metadata/file/profile/identity::iexpress-autoit-stage
      - id: metadata/file/profile/identity::iexpress-wextract-manifest
      - id: metadata/binary/installer/database::internet-explorer-wrapper-title
  - id: iexpress-encrypted-autoit-dropper
    desc: IExpress encrypted AutoIt payload dropper
    crit: hostile
    conf: 0.99
    all:
      - id: iexpress-autoit-script-payload
      - id: metadata/binary/installer/sfx::wextract-tool
      - id: metadata/lang/compiled::autoit-resource-magic
      - id: objectives/anti-static/obfuscation/payload/encrypted::dominant-resource-packed-payload
