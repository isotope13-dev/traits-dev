defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009

traits:
  - id: iexpress-autoit-script-payload
    desc: IExpress cabinet launches AutoIt script payload
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(?i)"AutoIt3\.exe"\s+[^\r\n"]{1,80}\.a3x\b'

composite_rules:
  - id: iexpress-encrypted-autoit-dropper
    desc: IExpress encrypted AutoIt payload dropper
    crit: hostile
    conf: 0.99
    all:
      - id: iexpress-autoit-script-payload
      - id: metadata/binary/installer/sfx::wextract-tool
      - id: metadata/lang/compiled::autoit-resource-magic
      - id: objectives/anti-static/obfuscation/payload/encrypted::dominant-resource-packed-payload
  - id: iexpress-autoit-persistence-dropper
    desc: IExpress AutoIt payload with persistence
    crit: hostile
    conf: 0.99
    attack: "T1027.009,T1547.001,T1547.009"
    mbc: "B0030,F0003"
    all:
      - id: iexpress-autoit-script-payload
      - id: metadata/binary/installer/sfx::wextract-tool
      - id: metadata/lang/compiled::autoit-script-resource-entry
      - id: objectives/persistence/login/registry/autostart::currentversion-run-key-path
      - id: objectives/persistence/system/registry/session-manager::boot-rename-persistence
    unless:
      - id: metadata/signed/platform/
