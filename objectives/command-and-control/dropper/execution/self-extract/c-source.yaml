defaults:
  platforms: [unix, android, ios]
  for: [c]
  attack: T1059.004
  mbc: E1059
traits:
- id: local-hidden-tool-launch
  desc: Hidden local tool launch template
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: "\"\\./\\.[A-Za-z0-9_-]+\\s+%s\\s+>>\\s+[A-Za-z0-9_.-]+\\s*&\""
- id: shell-command-buffer
  desc: Shell command buffer construction
  crit: suspicious
  conf: 0.84
  if:
    type: text
    regex: "snprintf\\s*\\([^\\n]{0,160}(system|popen)\\s*\\("
- id: system-buffer-exec
  desc: system call on prepared buffer
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: "(^|[^A-Za-z0-9_])system\\s*\\(\\s*[A-Za-z_][A-Za-z0-9_]*\\s*\\)"
  unless:
  - type: text
    substr: "-silent -register"
- id: background-log-redirect
  desc: Background log redirection shell
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: ">>\\s*[A-Za-z/][A-Za-z0-9_./-]*\\s*&"
- id: back-orifice-installer-comment
  desc: Back Orifice installer wrapper
  platforms: [windows]
  for: [c, cpp]
  crit: suspicious
  conf: 0.99
  if:
    type: text
    regex: 'Back Orifice.{0,24}installer'
- id: fixed-offset-self-extract
  desc: Fixed offset self extraction
  platforms: [windows]
  for: [c, cpp]
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'fseek\s*\(\s*input\s*,\s*FIRST_OFFSET\s*,\s*SEEK_SET\s*\)'
- id: second-payload-seek
  desc: Second embedded payload seek
  platforms: [windows]
  for: [c, cpp]
  crit: suspicious
  conf: 0.91
  if:
    type: text
    regex: 'fileNumber==1|fseek\s*\(\s*input\s*,\s*len\s*,\s*SEEK_CUR\s*\)'
- id: visible-decoy-showdefault
  desc: Visible decoy process launch
  platforms: [windows]
  for: [c, cpp]
  crit: suspicious
  conf: 0.86
  if:
    type: text
    word: SW_SHOWDEFAULT
  unless:
  - type: text
    regex: '#define\s+SW_SHOWDEFAULT'
  - id: metadata/lang/source::wine-compat-source
- id: detached-process-flag
  desc: Detached hidden installer launch
  platforms: [windows]
  for: [c, cpp]
  crit: component
  conf: 0.9
  if:
    type: text
    word: DETACHED_PROCESS
composite_rules:
- id: background-probe-launch-source
  desc: Background shell handoff to local tool
  crit: suspicious
  conf: 0.95
  all:
  - id: local-hidden-tool-launch
  - id: system-buffer-exec
  any:
  - id: shell-command-buffer
  - id: background-log-redirect
- id: fixed-offset-self-extract-dropper
  desc: Fixed offset self-extracting dropper
  platforms: [windows]
  for: [c, cpp]
  crit: suspicious
  conf: 0.96
  all:
  - id: micro-behaviors/fs/read/self::commandline-self-read
  - id: fixed-offset-self-extract
  any:
  - id: second-payload-seek
  - id: back-orifice-installer-comment
- id: hidden-installer-decoy-dropper
  desc: Hidden installer plus decoy dropper
  platforms: [windows]
  for: [c, cpp]
  crit: hostile
  conf: 0.99
  all:
  - id: fixed-offset-self-extract-dropper
  - id: objectives/evasion/process/hidden/window::hidden-process-create
  - id: detached-process-flag
  any:
  - id: back-orifice-installer-comment
  - id: visible-decoy-showdefault
