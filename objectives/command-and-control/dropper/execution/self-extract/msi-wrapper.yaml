defaults:
  platforms: [windows]
  attack: T1027.009

composite_rules:
  - id: msi-embedded-iexpress-autoit-dropper
    desc: MSI embeds an IExpress AutoIt payload
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/file/profile/identity::msi-wrapper-internet-explorer-title
      - id: metadata/file/profile/identity::iexpress-autoit-stage
      - id: metadata/file/profile/identity::iexpress-wextract-manifest
