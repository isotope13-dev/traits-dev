defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1027.009

traits:
  - id: msi-iexpress-autoit-launch
    desc: MSI embeds IExpress AutoIt launch command
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '(?i)"AutoIt3\.exe"[^\r\n"]{1,80}\.a3x\b'

composite_rules:
  - id: msi-embedded-iexpress-autoit-dropper
    desc: MSI embeds an IExpress AutoIt payload
    crit: hostile
    conf: 0.99
    all:
      - id: msi-iexpress-autoit-launch
      - id: metadata/file/profile/identity::iexpress-wextract-manifest
      - id: metadata/document/ole::ole-high-entropy
