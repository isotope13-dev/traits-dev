defaults:
  platforms: [windows]
  attack: T1027.009

composite_rules:
  - id: msi-embedded-iexpress-autoit-dropper
    desc: Masqueraded MSI stages AutoIt payload
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/create/exec::autoit-a3x-command
      - id: metadata/file/profile/identity::iexpress-wextract-manifest-embedded
      - id: metadata/binary/installer/database::msi-wrapper-application
      - id: metadata/binary/installer/database::internet-explorer-wrapper-title
