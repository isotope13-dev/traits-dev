defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.009
  mbc: B0023

composite_rules:
  - id: self-copy-and-launch-from-system-directory
    desc: Copies its image to Windows System and launches it
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/info/selfpath::argv0-passed-to-imported-call-x64
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-crt-open
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-crt-read
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-crt-seek
      - id: micro-behaviors/fs/file/binary::binary-read-write-ops
      - id: micro-behaviors/fs/path/system::windows-system-directory
      - id: micro-behaviors/process/create/spawn::create-process-w
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: metadata/binary/framework/
