defaults:
  platforms: [macos]
  for: [macho]
  attack: T1059.004
  mbc: B0022
composite_rules:
  - id: obfuscated-shell-dropper
    desc: Obfuscated shell dropper with cleanup
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/signed/trust-level::adhoc
      - id: micro-behaviors/process/create/shell::system-fn
      - id: micro-behaviors/fs/file/read::fscanf
      - id: micro-behaviors/fs/file/delete::delete-comp
    any:
      - id: micro-behaviors/crypto/symmetric/xor/arm64::repeating-key-buffer-decode
      - id: micro-behaviors/crypto/symmetric/xor/arm64::indexed-dword-table-decode
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-const
  - id: daemonized-shell-dropper
    desc: Daemonized shell dropper with cleanup
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/signed/trust-level::adhoc
      - id: micro-behaviors/process/create/shell::system-fn
      - id: micro-behaviors/fs/file/read::fscanf
      - id: micro-behaviors/fs/file/delete::delete-comp
      - id: objectives/persistence/system/daemon/init::unix-daemon-persistence
  - id: sparse-daemon-shell-dropper
    desc: String-sparse daemonized shell dropper
    crit: hostile
    conf: 0.97
    all:
      - id: daemonized-shell-dropper
      - id: objectives/anti-static/obfuscation/control-flow/native::sparse-strings
