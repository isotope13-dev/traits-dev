defaults:
  platforms: [macos]
  for: [macho]
  attack: T1059.004
  mbc: B0022
composite_rules:
  - id: obfuscated-shell-dropper
    desc: Obfuscated shell dropper with cleanup
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/signed/trust-level::adhoc
      - id: micro-behaviors/process/create/shell::system-fn
      - id: micro-behaviors/fs/file/read::fscanf
      - id: micro-behaviors/fs/file/delete::delete-comp
    any:
      - id: micro-behaviors/crypto/symmetric/xor/arm64::repeating-key-buffer-decode
      - id: micro-behaviors/crypto/symmetric/xor/arm64::indexed-dword-table-decode
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-const
  - id: compact-native-shell-loader
    desc: Compact native shell loader with staged file parsing and cleanup
    crit: hostile
    conf: 0.96
    size_min: 32768
    size_max: 131072
    all:
      - id: metadata/signed/trust-level::adhoc
      - id: micro-behaviors/process/create/shell::system-fn
      - id: micro-behaviors/fs/file/open::fopen
      - id: micro-behaviors/fs/file/read::fscanf
      - id: micro-behaviors/fs/file/delete::delete-comp
    any:
      - id: well-known/malware/trojan/wsj::sparse-visible-strings
      - id: objectives/anti-static/obfuscation/payload/encrypted::minimal-imports
      - id: metadata/binary/metrics::sparse-sentence-string-ratio
      - id: metadata/binary/metrics::high-behavioral-import-ratio
  - id: compact-native-system-cleanup-loader
    desc: Compact native loader that executes shell commands and cleans staged artifacts
    crit: suspicious
    conf: 0.93
    size_min: 32768
    size_max: 131072
    all:
      - id: metadata/signed/trust-level::adhoc
      - id: micro-behaviors/process/create/shell::system-fn
      - id: micro-behaviors/fs/file/delete::delete-comp
    any:
      - id: micro-behaviors/fs/file/read::fscanf
      - id: micro-behaviors/fs/file/open::fopen
      - id: well-known/malware/trojan/wsj::sparse-visible-strings
      - id: metadata/binary/metrics::no-sentence-strings
      - id: metadata/binary/metrics::clustered-string-lengths
