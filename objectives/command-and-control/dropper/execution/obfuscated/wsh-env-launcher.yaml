defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1059.007

traits:
  - id: env-large-unicode-stage
    desc: Environment variable stores large unicode stage
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '[A-Za-z_$][A-Za-z0-9_$]{5,}\(\s*["''][A-Za-z0-9]{8,24}["'']\s*\)\s*=\s*"[^"]{400,}"'
  - id: iex-env-variable
    desc: Invoke-Expression from env variable
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)iex.{0,40}\$e.{0,8}nv:.{0,32}[A-Za-z0-9]{6,24}'
  - id: iex-env-variable-split
    desc: Split-join Invoke-Expression from env variable
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '["'']i["''].{0,24}["'']ex ["''].{0,24}["'']\$env:["'']'
  - id: conhost-powershell-split-join
    desc: Split-join conhost powershell launcher
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '["'']con["''].{0,24}["'']host["''].{0,120}["'']s p["''].{0,24}["'']ower["'']'
  - id: cmd-powershell-split-join
    desc: Split-join cmd slash-c powershell launcher
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '["'']cm["''].{0,24}["'']d /["''].{0,40}["'']c po["''].{0,24}["'']wersh["''].{0,24}["'']ell'
  - id: powershell-bypass-flags-split-join
    desc: Split-join PowerShell hidden noninteractive bypass flags
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '["'']w H -["''].{0,24}["'']NO["''].{0,24}["'']P -["'']'
  - id: cjk-byte-shift-minus-19968
    desc: CJK character byte shift constant
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '["'']-19["''].{0,24}["'']968["'']'
  - id: powershell-aesmanaged-split
    desc: Split-join PowerShell AesManaged usage
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']Aes["''].{0,24}["'']Manag["''].{0,24}["'']ed'
  - id: powershell-gzipstream-split
    desc: Split-join PowerShell GZipStream usage
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']\.GZi["''].{0,24}["'']pS["''].{0,24}["'']tre["'']'
  - id: powershell-assembly-load-split
    desc: Split-join PowerShell assembly load
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '["'']mbly\]["''].{0,24}["'']::["''].{0,24}["'']Load["'']'
  - id: scriptfull-self-stash
    desc: Stashes WScript.ScriptFullName
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '[A-Za-z_$][A-Za-z0-9_$]{5,}\(\s*["''][A-Za-z0-9]{8,24}["'']\s*\)\s*=\s*WScript\.ScriptFullName'

composite_rules:
  - id: obfuscated-wsh-env-stager
    desc: Obfuscated WSH environment stager
    crit: suspicious
    conf: 0.97
    all:
      - id: objectives/execution/interpreter/scripting/host::array-join-empty-string-ast
      - id: micro-behaviors/os/env/access::wsh-process-environment
      - id: micro-behaviors/os/env/access::env-dynamic-assignment
    any:
      - id: env-large-unicode-stage
      - id: scriptfull-self-stash
    needs: 1
  - id: obfuscated-wsh-env-stager-split
    desc: Obfuscated WSH environment stager
    crit: suspicious
    conf: 0.97
    all:
      - id: objectives/execution/interpreter/scripting/host::array-join-empty-string-ast
      - id: micro-behaviors/os/env/access::wsh-process-environment-split
      - id: micro-behaviors/os/env/access::env-dynamic-assignment
    any:
      - id: env-large-unicode-stage
      - id: scriptfull-self-stash
    needs: 1
  - id: obfuscated-wsh-expandenv-reader
    desc: Obfuscated WSH reads staged environment payload
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/interpreter/jscript::activex-object
    any:
      - id: micro-behaviors/os/env/access::expandenv-random-variable
      - id: micro-behaviors/os/env/access::env-item-random-variable
    needs: 1
  - id: shell-application-headless-powershell
    desc: Shell.Application launches headless PowerShell
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/execution/interpreter/scripting/host::shell-application-split-join
      - id: objectives/execution/activex/com::shell-execute-method
    any:
      - id: micro-behaviors/process/create/hidden::conhost-headless
      - id: micro-behaviors/process/create/hidden::conhost-headless-split-join
      - id: conhost-powershell-split-join
      - id: objectives/execution/activex/com::activex-shell-app-execute
    needs: 1
  - id: shell-application-powershell-policy-bypass
    desc: Shell.Application launches obfuscated PowerShell bypass chain
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/execution/interpreter/scripting/host::shell-application-split-join
      - id: objectives/execution/activex/com::shell-execute-method
      - id: powershell-bypass-flags-split-join
    any:
      - id: conhost-powershell-split-join
      - id: objectives/execution/activex/com::activex-shell-app-execute
    needs: 1
  - id: wscript-shell-run-powershell-bypass
    desc: WScript.Shell Run launches obfuscated PowerShell bypass chain
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/execution/interpreter/scripting/host::run-invocation-patterns
      - id: powershell-bypass-flags-split-join
    any:
      - id: objectives/execution/interpreter/scripting/host::wscript-shell-split-join
      - id: objectives/execution/interpreter/scripting/host::environment-symbol
      - id: cmd-powershell-split-join
      - id: conhost-powershell-split-join
      - id: micro-behaviors/process/create/hidden::conhost-name-split-join
    needs: 2
  - id: wscript-shell-exec-powershell-bypass
    desc: WScript.Shell Exec launches obfuscated PowerShell bypass chain
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/execution/interpreter/scripting/host::exec-invocation-patterns
      - id: powershell-bypass-flags-split-join
    any:
      - id: objectives/execution/interpreter/scripting/host::wscript-shell-split-join
      - id: objectives/execution/interpreter/scripting/host::environment-symbol
      - id: cmd-powershell-split-join
      - id: conhost-powershell-split-join
      - id: micro-behaviors/process/create/hidden::conhost-name-split-join
    needs: 2
  - id: env-expand-run-launcher
    desc: WScript.Shell launches PowerShell from staged environment variable
    crit: hostile
    conf: 0.99
    all:
      - id: obfuscated-wsh-env-stager
      - id: obfuscated-wsh-expandenv-reader
      - id: objectives/execution/interpreter/scripting/host::run-invocation-patterns
    any:
      - id: wscript-shell-run-powershell-bypass
      - id: cmd-powershell-split-join
      - id: conhost-powershell-split-join
      - id: micro-behaviors/process/create/hidden::conhost-name-split-join
    needs: 1
  - id: env-iex-headless-launcher
    desc: Headless PowerShell evals env payload
    crit: hostile
    conf: 0.99
    all:
      - id: iex-env-variable
      - id: env-large-unicode-stage
      - id: micro-behaviors/os/env/access::wsh-process-environment
      - id: micro-behaviors/os/env/access::env-dynamic-assignment
    any:
      - id: shell-application-headless-powershell
      - id: shell-application-powershell-policy-bypass
      - id: wscript-shell-run-powershell-bypass
      - id: wscript-shell-exec-powershell-bypass
      - id: conhost-powershell-split-join
      - id: powershell-bypass-flags-split-join
    needs: 1
  - id: env-iex-headless-launcher-split
    desc: Headless PowerShell evals env payload
    crit: hostile
    conf: 0.99
    all:
      - id: iex-env-variable-split
      - id: env-large-unicode-stage
      - id: micro-behaviors/os/env/access::wsh-process-environment-split
      - id: micro-behaviors/os/env/access::env-dynamic-assignment
    any:
      - id: shell-application-headless-powershell
      - id: shell-application-powershell-policy-bypass
      - id: wscript-shell-run-powershell-bypass
      - id: wscript-shell-exec-powershell-bypass
      - id: conhost-powershell-split-join
      - id: powershell-bypass-flags-split-join
    needs: 1
  - id: env-cjk-dotnet-reflective-loader
    desc: Environment-staged CJK reflective .NET loader
    crit: hostile
    conf: 0.99
    all:
      - id: env-large-unicode-stage
      - id: iex-env-variable-split
      - id: micro-behaviors/os/env/access::wsh-process-environment-split
      - id: cjk-byte-shift-minus-19968
    any:
      - id: powershell-aesmanaged-split
      - id: powershell-gzipstream-split
      - id: powershell-assembly-load-split
      - id: objectives/execution/activex/com::shell-execute-method
      - id: conhost-powershell-split-join
      - id: powershell-bypass-flags-split-join
    needs: 3
