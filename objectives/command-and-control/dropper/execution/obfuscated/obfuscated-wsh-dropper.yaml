# Obfuscated WSH JScript Dropper
# Detects WSH-based download-and-execute droppers where COM ProgIDs
# (WScript.Shell, MSXML2.XMLHTTP, ADODB.Stream) are obfuscated via
# string splitting, concatenation, and fragment-based reconstruction.
# ATT&CK: T1059.007, T1105, T1027
defaults:
  platforms: [windows]
  for: [javascript, vbs, html]
  attack: T1059.007
traits:
  - id: split-expand-env-chain
    desc: Split ExpandEnvironmentStrings fragment chain
    crit: component
    conf: 0.92
    size_max: 50000
    if:
      type: text
      regex: '["'']Expan["'']\)\s*\+\s*["'']dE["'']\s*\+\s*["'']nv["'']'
  - id: split-temp-env-chain
    desc: Split %TEMP% environment fragment chain
    crit: component
    conf: 0.92
    size_max: 50000
    if:
      type: text
      regex: '["'']%["'']\s*\+\s*\(.{0,48}["'']TE["'']\)\s*\+\s*["'']MP%["'']'
  - id: comma-activex-replace-shard
    desc: Comma-sharded ActiveXObject constructor
    crit: component
    conf: 0.94
    size_max: 50000
    if:
      type: text
      regex: '"A"\+"Rt"\+\(.{0,160}"i"\)\+3\+"Ob"\+"jec\+"'
  - id: comma-xmlhttp-replace-shard
    desc: Comma-sharded XMLHTTP ProgID
    crit: component
    conf: 0.94
    size_max: 50000
    if:
      type: text
      regex: '"SX"\+"ML"\+\(.{0,80}"2\."\)\+"XM"\+"LHTT"'
  - id: comma-wscript-replace-shard
    desc: Comma-sharded WScript ProgID
    crit: component
    conf: 0.94
    size_max: 50000
    if:
      type: text
      regex: '"WU"\+\(.{0,160}"cr"\)\+\(.{0,160}"ip"\)\+\(.{0,160}"t:"\)'
  - id: replace-normalized-adodb-stream
    desc: Replace-normalized ADODB.Stream
    crit: component
    conf: 0.94
    size_max: 50000
    if:
      type: text
      regex: '"A"\+"lODB"\+"\.S"\+"tr"'
  - id: responsebody-skillful-shard
    desc: ResponseBody assembled with shard variable
    crit: component
    conf: 0.93
    size_max: 50000
    if:
      type: text
      regex: '"R"\+\(.{0,160}"es"\)\+"pon"\+skillful'
  - id: savetofile-comma-shard
    desc: SaveToFile comma-sharded method
    crit: component
    conf: 0.92
    size_max: 50000
    if:
      type: text
      regex: '"sav"\+"eT"\+"oF"\+\(.{0,160}"ile"\)'
  - id: temp-exe-comma-shard
    desc: TEMP EXE comma-sharded path
    crit: component
    conf: 0.92
    size_max: 50000
    if:
      type: text
      regex: '"%"\+"TE"\+\(.{0,160}"MP%"\).{0,160}"\."\+"exe"'
composite_rules:
  - id: obfuscated-wsh-com-dropper
    desc: Obfuscated WSH dropper with COM fragments
    crit: hostile
    conf: 0.95
    mbc: B0017
    all:
      - id: objectives/execution/interpreter/script/wsh-fragments::wscript-shell-fragment-1
      - id: objectives/execution/interpreter/script/wsh::wsh-adodb-stream-binary
    any:
      - id: objectives/execution/interpreter/script/wsh
  - id: split-join-wsh-dropper
    desc: WSH dropper with split-join string reconstruction
    crit: hostile
    conf: 0.93
    all:
      - id: objectives/execution/interpreter/script/wsh-fragments::readystate-fragment-tiny-exact
      - id: objectives/anti-static/obfuscation/string/encoding::js-split-join-cleanup
      - id: objectives/execution/interpreter/script/wsh-fragments::save-to-file-fragment
    any:
      - id: objectives/anti-static/obfuscation/string/conceal::js-comma-string-obfuscation
      - id: objectives/anti-static/obfuscation/string::single-char-concat-pattern
  - id: split-join-wsh-temp-exe-run
    desc: Split-join WSH temp payload drop and run
    crit: hostile
    conf: 0.96
    attack: T1059.007, T1105, T1027
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::js-split-join-cleanup
      - id: split-expand-env-chain
      - id: split-temp-env-chain
      - id: micro-behaviors/fs/write::adodb-open
      - id: objectives/execution/interpreter/script/wsh-fragments::savetofile-fragment-tiny-2
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-indirect
    any:
      - id: objectives/anti-static/obfuscation/string/conceal::js-comma-string-obfuscation
      - id: objectives/anti-static/obfuscation/string::single-char-concat-pattern
  - id: comma-sharded-wsh-responsebody-dropper
    desc: Comma-sharded WSH ResponseBody dropper
    crit: hostile
    conf: 0.97
    attack: T1059.007, T1105, T1027
    all:
      - id: comma-activex-replace-shard
      - id: comma-xmlhttp-replace-shard
      - id: comma-wscript-replace-shard
      - id: replace-normalized-adodb-stream
      - id: responsebody-skillful-shard
      - id: savetofile-comma-shard
      - id: temp-exe-comma-shard
