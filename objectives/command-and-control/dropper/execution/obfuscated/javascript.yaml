defaults:
  platforms: [windows]
  for: [javascript]

traits:
  - id: fragmented-http-get-verb
    desc: Fragmented GET verb in HTTP open call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '"G"\+\([^\\n]{0,40}ET'
  - id: xhr-ready-state-handler
    desc: XMLHTTP readyState callback assignment
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'onreadystatechange\s*=\s*function'

composite_rules:
  - id: wsh-obfuscated-array-temp-exe-dropper
    desc: Obfuscated WSH temp EXE dropper via string table
    crit: hostile
    conf: 0.98
    attack: "T1105"
    all:
      - id: objectives/anti-static/obfuscation/syntax::js-dynamic-global-access-indexed-array
      - id: objectives/anti-static/obfuscation/syntax::js-array-splice-reindex
      - id: objectives/anti-static/obfuscation/syntax::js-new-from-indexed-string-table
      - id: objectives/anti-static/obfuscation/string/conceal::js-fragmented-url-h-ttp
      - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file-literal
      - id: xhr-ready-state-handler
      - id: objectives/anti-static/obfuscation/string/conceal::js-comma-string-obfuscation
    any:
      - id: fragmented-http-get-verb
      - id: objectives/execution/interpreter/script/wsh::readystate-fragment-tiny-exact
      - id: objectives/execution/interpreter/script/wsh::wscript-shell-fragment-tiny-exact-2
      - id: objectives/execution/interpreter/script/wsh::save-to-file-fragment-etof
