defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
- id: jscript-dropper-context
  desc: JScript WSH dropper context
  crit: component
  conf: 0.9
  any:
  - id: micro-behaviors/fs/write/file::js-adodb-stream-create
  - id: micro-behaviors/process/script/wsh::wsh-adodb-download
  - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-obfuscated
  - id: objectives/execution/interpreter/script/wsh::wscript-process-execution
- id: obfuscated-jscript-dropper
  desc: "Obfuscated JScript dropper behavior (conditional compilation + eval + string manipulation)"
  crit: hostile
  conf: 0.85
  all:
  - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-eval
  any:
  - id: objectives/anti-static/obfuscation/syntax::js-split-string-property
  - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
  - id: objectives/anti-static/obfuscation/syntax::js-comma-sequence-obfuscation-v2
  attack: "T1027"
  mbc: "B0032"
- id: jscript-obfuscated-bat-dropper
  desc: "Obfuscated JScript dropper executing batch script"
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-on
  - id: micro-behaviors/process/create/script::batch-script-execution
  any:
  - id: objectives/anti-static/obfuscation/string/conceal::js-createobject-reversed
  - id: objectives/anti-static/obfuscation/string/conceal::js-adodb-savetofile-reversed
  - id: objectives/anti-static/obfuscation/string/conceal::js-xmlhttp-responsebody-reversed
  attack: "T1059.003"
  mbc: "E1100"
- id: jscript-nemucod-dict-dropper
  desc: "Obfuscated JScript Dropper using dict array mapping"
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/data/encode/map::js-nested-object-table-mapping
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
  attack: "T1027"
  mbc: "B0032"
- id: jscript-split-join-dropper
  desc: "Obfuscated JScript Dropper using split/join substitution"
  crit: hostile
  conf: 0.90
  all:
  - id: micro-behaviors/process/interpreter/jscript::is-jscript
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
  - id: jscript-dropper-context
  any:
  - id: objectives/anti-static/obfuscation/string/conceal::js-split-wrapper
  - id: objectives/anti-static/obfuscation/string/conceal::js-join-wrapper
  - id: objectives/anti-static/obfuscation/string/conceal::js-split-join-deobfuscation-dot
  attack: "T1027"
  mbc: "B0032"
- id: js-substitution-dropper
  desc: Javascript dropper using a substitution map.
  crit: hostile
  conf: 0.95
  all:
  - id: objectives/anti-static/obfuscation/syntax::js-substitution-map-deobfuscation
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
- id: js-comma-dropper
  desc: Javascript dropper using useless comma operator obfuscation.
  crit: hostile
  conf: 0.95
  all:
  - id: objectives/anti-static/obfuscation/syntax::js-comma-sequence-obfuscation-v2
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
  - id: objectives/anti-static/obfuscation/string/reconstruct::js-string-dict-map
  - id: objectives/anti-static/obfuscation/syntax::js-split-string-property
- id: jscript-obfuscated-http-dropper-self-delete
  desc: Obfuscated JScript HTTP dropper with self-delete
  crit: hostile
  conf: 0.95
  attack: "T1105"
  mbc: "B0021"
  all:
  - id: micro-behaviors/process/interpreter/jscript::is-jscript
  - id: micro-behaviors/process/interpreter/jscript::activex-object
  - id: micro-behaviors/data/encode/string::decimal-string-blob
  - id: micro-behaviors/data/control-flow/analysis::js-dynamic-method-call
  - id: micro-behaviors/fs/delete/file::js-self-delete-obfuscated
- id: nemucod-adodb-file-drop
  desc: Nemucod ADODB.Stream File Drop (JS)
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/fs/write/file::js-adodb-stream-create
  - id: micro-behaviors/fs/write/file::js-adodb-stream-set-type
  - id: micro-behaviors/fs/write/file::js-adodb-stream-write-responsebody
  - id: micro-behaviors/fs/write/file::js-adodb-stream-savetofile-dynamic-path
- id: js-pe-mz-check-dropper
  desc: JScript checking for PE MZ header
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/data/format::js-pe-mz-check
  - id: micro-behaviors/data/encode/skip-step::js-concat-chain
- id: jscript-cc-reverse-eval-dropper
  desc: JScript CC block containing eval of reversed concatenation string
  crit: hostile
  conf: 0.95
  attack: T1027
  mbc: B0032
  for:
  - javascript
  all:
  - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-on
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
  - id: objectives/anti-static/obfuscation/string/encoding::js-reverse-string-obfuscation
