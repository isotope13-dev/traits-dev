defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1105
traits:
  - id: wsh-slice-adodb-stream-fragment
    desc: Slice-obfuscated ADODB.Stream fragment
    crit: component
    conf: 0.92
    if:
      type: text
      exact: "'23027ODB.S'.slice(5)"
  - id: wsh-slice-response-body-fragment
    desc: Slice-obfuscated responseBody fragment
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "'67965eBody'.slice(5)"
  - id: wsh-slice-http-status-fragment
    desc: Slice-obfuscated HTTP status fragment
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "'2864978tatus'.slice(7)"
  - id: wsh-slice-send-fragment
    desc: Slice-obfuscated XMLHTTP send fragment
    crit: component
    conf: 0.86
    if:
      type: text
      exact: "'74538send'.slice(5)"
  - id: wsh-slice-run-fragment
    desc: Slice-obfuscated WScript Run fragment
    crit: component
    conf: 0.88
    if:
      type: text
      exact: "'70435.Run('.slice(5)"
  - id: wsh-slice-temp-env-fragment
    desc: Slice-obfuscated TEMP path fragment
    crit: component
    conf: 0.84
    if:
      type: text
      exact: "'68075%TEM'.slice(5)"
  - id: wsh-slice-exe-fragment
    desc: Slice-obfuscated exe extension fragment
    crit: component
    conf: 0.82
    count_min: 2
    if:
      type: text
      regex: "'[0-9]+exe'\\.slice\\([0-9]+\\)"
composite_rules:
  - id: wsh-slice-http-file-dropper
    desc: Obfuscated WSH HTTP file dropper
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::numeric-suffix-identifiers
      - id: micro-behaviors/data/encode/skip-step::js-concat-chain
      - id: wsh-slice-adodb-stream-fragment
      - id: wsh-slice-response-body-fragment
      - id: wsh-slice-http-status-fragment
      - id: wsh-slice-send-fragment
      - id: wsh-slice-run-fragment
      - id: wsh-slice-temp-env-fragment
      - id: wsh-slice-exe-fragment
