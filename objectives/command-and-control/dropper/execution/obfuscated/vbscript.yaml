defaults:
  attack: T1059.005
  platforms:
    - windows
  for:
    - vbs
composite_rules:
  - id: obfuscated-vbscript-ipfs-dropper
    desc: Obfuscated VBScript IPFS dropper
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/anti-static/obfuscation/string/delimiter::delimiter-packed-vbscript-stager
      - id: objectives/execution/interpreter/vbscript::hidden-wmi-powershell-stager
    any:
      - id: objectives/persistence/login/startup/folder::startup-self-copy-via-powershell
      - id: objectives/command-and-control/infrastructure/blockchain::ipfs-gateway-hex-stager
