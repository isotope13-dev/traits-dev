defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: nemucod-cp437-dropper
    desc: Nemucod JScript dropper variant using CP437 character mapping and ADODB.Stream
    crit: hostile
    for: [javascript]
    needs: 3
    any:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: objectives/anti-static/obfuscation/string/encoding::js-reverse-string-obfuscation
      - id: objectives/execution/interpreter/script/wsh::adodb-fragment-tiny-exact
      - id: micro-behaviors/data/encode/charset::js-cp437-array-mapping
      - id: objectives/anti-static/obfuscation/string/encoding::js-rolling-xor-decryption
      - id: micro-behaviors/data/format/executable::js-mz-header-array-check
