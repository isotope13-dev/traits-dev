defaults:
  platforms: [unix, windows]
composite_rules:
  - id: jscript-nested-dictionary-dropper
    desc: Highly obfuscated JScript dropper using nested dictionary and conditional compilation
    crit: hostile
    conf: 0.95
    for: [javascript]
    all:
      - id: micro-behaviors/process/interpreter/scripting/jscript::jscript-cc-on
      - id: objectives/anti-static/obfuscation/string/conceal::js-nested-dictionary-array-mapping
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
