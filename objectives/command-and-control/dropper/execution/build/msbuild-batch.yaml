defaults:
  platforms: [windows]
  for: [batch]
  attack: T1127.001

traits:
  - id: batch-msbuild-exe-path
    desc: Batch invokes MSBuild.exe by framework path
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)\\Microsoft\.NET\\Framework(64)?\\v[0-9.]+\\MSBuild\.exe\b'

  - id: batch-msbuild-project-argument
    desc: Batch passes project file to MSBuild
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bMSBuild\.exe\s+[^\r\n]{0,120}\.(csproj|vbproj|xml)\b'

  - id: batch-msbuild-shellcode-template-comment
    desc: Batch labels MSBuild shellcode template
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)(shellcode\.xml|exec\s+shellcode|msbuild XML template execution)'

composite_rules:
  - id: batch-msbuild-proxy-template-exec
    desc: Batch MSBuild proxy execution template
    crit: hostile
    conf: 0.98
    all:
      - id: batch-msbuild-exe-path
      - id: batch-msbuild-project-argument
      - id: batch-msbuild-shellcode-template-comment
