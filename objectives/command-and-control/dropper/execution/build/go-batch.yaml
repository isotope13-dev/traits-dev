defaults:
  platforms: [windows]
  for:
    - batch
traits:
  - id: go-build-cmd
    desc: Go build command
    crit: component
    conf: 0.8
    unless:
      - id: metadata/build/conda/
    if:
      type: text
      regex: (?i)\bgo\s+build\b
  - id: go-ldflags-strip
    desc: Go build strips binary symbols
    crit: notable
    conf: 0.85
    size_max: 5000
    unless:
      - id: metadata/build/conda/
      - type: text
        substr: mkall
    if:
      type: text
      regex: ldflags.{0,50}(-s\s+-w|\s-s\s+|\s-s\b)
  - id: go-ldflags-hide-gui
    desc: Go hide GUI window flag
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)-H=windowsgui
  - id: go-linkmode-external
    desc: Go external linkmode
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)linkmode=external
composite_rules:
  - id: go-build-stealth
    desc: Go build with stealth flags
    crit: notable
    conf: 0.92
    unless:
      - id: metadata/build/conda/
    all:
      - id: go-build-cmd
    any:
      - id: go-ldflags-strip
      - id: go-ldflags-hide-gui
