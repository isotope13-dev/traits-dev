# MSBuild inline-task dropper (.csproj / .xml LOLBAS).
#
# `<UsingTask TaskFactory="CodeTaskFactory">` with an embedded `<Code
# Language="cs">...</Code>` block tells msbuild.exe to compile and execute the
# enclosed C# code — a well-known living-off-the-land pattern (ATT&CK
# T1127.001, Trusted Developer Utilities Proxy Execution: MSBuild). The
# .csproj / .xml file itself IS the stager; msbuild acts as the loader.
#
# Atoms here query the parsed XML (kv paths rooted at `Project.*`) plus the
# embedded C# source text to surface common dropper behaviors.
defaults:
  platforms: [windows]
  for: [xml]
  attack: T1127.001

traits:
- id: msbuild-project-root
  desc: Project root with MSBuild schema
  crit: component
  if:
    type: value
    path: Project.@xmlns
    regex: msbuild

- id: msbuild-code-task-factory
  desc: UsingTask TaskFactory=CodeTaskFactory
  crit: component
  conf: 0.95
  if:
    type: value
    path: Project.UsingTask.@TaskFactory
    exact: CodeTaskFactory

- id: msbuild-inline-csharp
  desc: Inline C# code block
  crit: component
  conf: 0.95
  if:
    type: value
    path: Project.UsingTask.Task.Code.@Language
    regex: '^(cs|C#|csharp)$'

- id: msbuild-code-download-string
  desc: MSBuild inline-code download token
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\bDownload(String|Data|File)\b'

- id: msbuild-code-process-start
  desc: MSBuild inline-code process token
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '\bProcess\.Start\b'

- id: msbuild-code-virtualalloc
  desc: MSBuild inline-code VirtualAlloc token
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\bVirtualAlloc(Ex)?\b'

- id: msbuild-code-marshal-delegate
  desc: MSBuild inline-code delegate token
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\bMarshal\.GetDelegateForFunctionPointer\b'

- id: msbuild-code-reflection-invoke
  desc: MSBuild inline-code reflection token
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '\bAssembly\.Load\b|\bAssembly\.Reflection'

- id: msbuild-code-freeze-loop
  desc: MSBuild inline-code loop token
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '\bwhile\s*\(\s*true\s*\)'

- id: msbuild-code-automation
  desc: MSBuild inline-code PowerShell token
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\bSystem\.Management\.Automation\b'
  unless:
  - type: text
    substr: '<helpItems schema="maml">'
  - type: text
    substr: '<parameterValue required="true" variableLength="false">System.Management.Automation.'

- id: msbuild-build-packaging-freeswitch
  desc: FreeSWITCH build cache token
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: '\b(FreeSWITCHBuildCachePath|7za1701\.exe)\b'

- id: msbuild-inline-vb--vb
  desc: Inline VB.NET code block (vb)
  crit: component
  conf: 0.9
  if:
    type: value
    path: Project.UsingTask.Task.Code.@Language
    exact: vb
- id: msbuild-inline-vb--vb-2
  desc: Inline VB.NET code block (VB)
  crit: component
  conf: 0.9
  if:
    type: value
    path: Project.UsingTask.Task.Code.@Language
    exact: VB
- id: msbuild-code-webclient-in-code-block
  desc: MSBuild code block references WebClient
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)<Code.{0,80}>.{0,512}\bWebClient\b'
- id: msbuild-code-httpclient-in-code-block
  desc: MSBuild code block references HttpClient
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)<Code.{0,80}>.{0,512}\bHttpClient\b'
- id: msbuild-build-packaging-task-name--buildpackagestask
  desc: MSBuild custom packaging (BuildPackagesTask)
  crit: notable
  conf: 0.85
  if:
    type: text
    word: BuildPackagesTask
- id: msbuild-build-packaging-task-name--downloadpackagetask
  desc: MSBuild custom packaging (DownloadPackageTask)
  crit: notable
  conf: 0.85
  if:
    type: text
    word: DownloadPackageTask
- id: msbuild-build-packaging-fs-helper--createfromdirectory
  desc: MSBuild filesystem (CreateFromDirectory)
  crit: notable
  conf: 0.85
  if:
    type: text
    word: CreateFromDirectory
- id: msbuild-build-packaging-fs-helper--copyfilesrecursively
  desc: MSBuild filesystem (CopyFilesRecursively)
  crit: notable
  conf: 0.85
  if:
    type: text
    word: CopyFilesRecursively
composite_rules:
- id: msbuild-inline-vb
  desc: Inline VB.NET code block
  crit: component
  conf: 0.9
  any:
  - id: msbuild-inline-vb--vb
  - id: msbuild-inline-vb--vb-2
- id: msbuild-code-webclient
  desc: MSBuild inline-code WebClient token
  crit: component
  conf: 0.9
  any:
  - id: msbuild-code-webclient-in-code-block
  - id: msbuild-code-httpclient-in-code-block
- id: msbuild-code-create-thread
  desc: MSBuild inline-code thread token
  crit: component
  conf: 0.95
  any:
  - id: objectives/evasion/process/injection/dll::create-remote-thread-text
  - id: micro-behaviors/process/thread/create::create-thread-source
- id: msbuild-build-packaging-task-name
  desc: MSBuild custom packaging task name
  crit: notable
  conf: 0.85
  any:
  - id: msbuild-build-packaging-task-name--buildpackagestask
  - id: msbuild-build-packaging-task-name--downloadpackagetask
- id: msbuild-build-packaging-fs-helper
  desc: MSBuild filesystem packaging helper
  crit: notable
  conf: 0.85
  any:
  - id: msbuild-build-packaging-fs-helper--createfromdirectory
  - id: msbuild-build-packaging-fs-helper--copyfilesrecursively
- id: msbuild-inline-task
  desc: MSBuild inline task with code
  crit: suspicious
  conf: 0.95
  all:
  - id: msbuild-project-root
  - id: msbuild-code-task-factory
  any:
  - id: msbuild-inline-csharp
  - id: msbuild-inline-vb
  downgrade:
    any:
    - id: objectives/command-and-control/dropper/execution/build/
    - id: objectives/command-and-control/dropper/execution/build/
    - id: msbuild-build-packaging-freeswitch
  unless:
  - id: well-known/app/oneget::oneget-msbuild-build-context

- id: msbuild-proxy-exec
  desc: MSBuild inline task runs a payload
  crit: hostile
  conf: 0.95
  all:
  - id: msbuild-inline-task
  any:
  - id: msbuild-code-download-string
  - id: msbuild-code-virtualalloc
  - id: msbuild-code-create-thread
  - id: msbuild-code-marshal-delegate
  - id: msbuild-code-reflection-invoke
  - id: msbuild-code-freeze-loop
  - id: msbuild-code-automation
  unless:
  - id: well-known/app/oneget::oneget-msbuild-build-context

- id: msbuild-inline-dropper
  desc: MSBuild inline task downloads and runs
  crit: hostile
  conf: 0.95
  all:
  - id: msbuild-inline-task
  - id: msbuild-code-webclient
  any:
  - id: msbuild-code-download-string
  - id: msbuild-code-process-start
