defaults:
  platforms: [windows]
  for: [oledoc, ole]

traits:
  # MSI custom-action tables commonly store the command as an encoded or
  # escaped string.  Keep text-layer variants for parsers that expose the
  # decoded table text rather than the OLE byte stream.
  - id: msi-wscript-powershell-launch-text
    desc: MSI text launches PowerShell via WScript
    crit: notable
    conf: 0.98
    attack: T1059.001
    if:
      type: text
      regex: '(?i)CreateObject.{0,80}powershell.{0,40}-NoP.{0,40}-Enc'
  - id: msi-hidden-encoded-command-launch-text
    desc: MSI text hides encoded PowerShell
    crit: suspicious
    conf: 0.98
    attack: T1059.001,T1027,T1564.003
    if:
      type: text
      regex: '(?i)powershell(\.exe)?.{0,30}-NoP.{0,30}-W.{0,30}(Hidden|Enc)'
  - id: msi-wscript-powershell-launch
    desc: MSI runs PowerShell through WScript
    crit: notable
    conf: 0.98
    attack: T1059.001
    if:
      type: raw
      regex: '(?i)CreateObject.{0,80}powershell.{0,50}-NoP.{0,30}-Enc'
  - id: msi-hidden-encoded-command-launch
    desc: MSI hides an encoded PowerShell command
    crit: notable
    conf: 0.98
    attack: T1059.001,T1027
    if:
      type: raw
      regex: '(?i)powershell(\.exe)?.{0,30}-NoP.{0,30}-W.{0,30}-Enc\b'
  - id: msi-scheduled-task-action
    desc: MSI creates a scheduled-task action
    crit: suspicious
    conf: 0.97
    attack: T1053.005
    if:
      type: text
      substr: New-ScheduledTaskAction
      case_insensitive: true
  - id: msi-scheduled-task-registration
    desc: MSI registers a scheduled task
    crit: suspicious
    conf: 0.97
    attack: T1053.005
    if:
      type: text
      substr: Register-ScheduledTask
      case_insensitive: true
  - id: msi-run-key-persistence-reference
    desc: MSI embeds a Windows Run-key reference
    crit: suspicious
    conf: 0.96
    attack: T1547.001
    if:
      type: raw
      regex: '(?i)Software\\Microsoft\\Windows\\CurrentVersion\\Run'

  - id: msi-wscript-powershell-launch-encoded
    desc: Decoded MSI references WScript.Shell
    crit: notable
    conf: 0.98
    attack: T1059.001
    if:
      type: encoded
      encoding: base64
      substr: Wscript.Shell
  - id: msi-hidden-encoded-command-launch-encoded
    desc: Decoded MSI uses a hidden window option
    crit: notable
    conf: 0.98
    attack: T1059.001,T1027,T1564.003
    if:
      type: encoded
      encoding: base64
      substr: '-W Hidden'
  - id: msi-run-key-persistence-reference-encoded
    desc: Decoded MSI references a Windows Run key
    crit: suspicious
    conf: 0.96
    attack: T1547.001
    if:
      type: encoded
      encoding: base64
      substr: 'Software\Microsoft\Windows\CurrentVersion\Run'
      case_insensitive: true

composite_rules:
  - id: msi-hidden-powershell-launch-text
    desc: MSI text layer launches hidden encoded PowerShell
    crit: suspicious
    conf: 0.99
    all:
      - id: msi-wscript-powershell-launch-text
      - id: msi-hidden-encoded-command-launch-text
  - id: msi-hidden-powershell-launch-encoded
    desc: MSI decoded layer launches hidden encoded PowerShell
    crit: suspicious
    conf: 0.99
    all:
      - id: msi-wscript-powershell-launch-encoded
      - id: msi-hidden-encoded-command-launch-encoded
      - id: micro-behaviors/process/create/exec::msi-powershell-executable-encoded
      - id: micro-behaviors/process/create/exec::msi-encoded-command-option
  - id: msi-hidden-powershell-launch
    desc: MSI launches hidden encoded PowerShell in a text or decoded layer
    crit: suspicious
    conf: 0.99
    any:
      - id: msi-hidden-powershell-launch-text
      - id: msi-hidden-powershell-launch-encoded
  - id: msi-hidden-powershell-persistence
    desc: MSI combines encoded PowerShell with persistence
    crit: hostile
    conf: 0.99
    attack: T1059.001,T1053.005,T1547.001
    all:
      - id: metadata/package/files/msi::ole2-installer-kind
      - id: msi-hidden-powershell-launch
    any:
      - id: msi-scheduled-task-action
      - id: msi-scheduled-task-registration
      - id: msi-run-key-persistence-reference
      - id: micro-behaviors/os/autorun/scheduled::new-scheduledtaskaction-encoded
      - id: micro-behaviors/os/autorun/scheduled::register-scheduledtask-encoded
      - id: msi-run-key-persistence-reference-encoded
