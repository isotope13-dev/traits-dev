defaults:
  platforms: [windows]
  for: [ole]

traits:
  - id: msi-wscript-powershell-launch
    desc: MSI runs PowerShell through WScript
    crit: notable
    conf: 0.98
    attack: T1059.001
    if:
      type: text
      regex: '(?i)CreateObject.{0,80}powershell.{0,50}-NoP.{0,30}-Enc'
  - id: msi-hidden-encoded-command-launch
    desc: MSI hides an encoded PowerShell command
    crit: notable
    conf: 0.98
    attack: T1059.001,T1027
    if:
      type: text
      regex: '(?i)powershell(\.exe)?.{0,30}-NoP.{0,30}-W.{0,30}-Enc\b'
  - id: msi-scheduled-task-action
    desc: MSI creates a scheduled-task action
    crit: suspicious
    conf: 0.97
    attack: T1053.005
    if:
      type: text
      substr: New-ScheduledTaskAction
      case_insensitive: true
  - id: msi-scheduled-task-registration
    desc: MSI registers a scheduled task
    crit: suspicious
    conf: 0.97
    attack: T1053.005
    if:
      type: text
      substr: Register-ScheduledTask
      case_insensitive: true
  - id: msi-run-key-persistence-reference
    desc: MSI embeds a Windows Run-key reference
    crit: suspicious
    conf: 0.96
    attack: T1547.001
    if:
      type: text
      substr: 'Software\Microsoft\Windows\CurrentVersion\Run'
      case_insensitive: true

composite_rules:
  - id: msi-hidden-powershell-persistence
    desc: MSI combines encoded PowerShell with persistence
    crit: hostile
    conf: 0.99
    attack: T1059.001,T1053.005,T1547.001
    all:
      - id: msi-wscript-powershell-launch
      - id: msi-hidden-encoded-command-launch
    any:
      - id: msi-scheduled-task-action
      - id: msi-scheduled-task-registration
      - id: msi-run-key-persistence-reference
