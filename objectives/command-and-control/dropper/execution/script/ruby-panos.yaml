defaults:
  platforms: [panos, appliance, unix]
  for: [ruby]
  attack: T1059

traits:
  - id: ruby-panos-open3-bash-c
    desc: Ruby PAN-OS Open3 bash -c
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Open3.capture3("bash", "-c", cmd)

  - id: ruby-panos-assembled-frags-command
    desc: Ruby PAN-OS assembled command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: assemble(HEX_FRAGS, HOST)

composite_rules:
  - id: ruby-panos-assembled-bash-exec
    desc: Ruby PAN-OS assembled bash exec
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-panos-open3-bash-c
      - id: ruby-panos-assembled-frags-command
