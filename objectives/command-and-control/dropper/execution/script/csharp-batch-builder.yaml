defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1059.003
  mbc: B0030

traits:
  - id: csharp-builds-hidden-powershell-batch
    desc: C# builds hidden PowerShell batch
    crit: component
    conf: 0.92
    if:
      type: string_literal
      regex: 'powershell\s+-w\s+h(\s+-e)?'

  - id: csharp-builds-iex-downloadstring
    desc: C# builds IEX DownloadString
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "iex ([System.Net.WebClient]::new()).DownloadString"

  - id: csharp-builds-iex-base64-decode
    desc: C# builds IEX Base64 decoder
    crit: component
    conf: 0.94
    if:
      type: string_literal
      substr: "iex ([System.Text.Encoding]::UTF8.GetString"

  - id: csharp-upload-before-stager-build
    desc: C# uploads payload before stager
    crit: component
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '(^|\.)Upload$'

  - id: csharp-percent-variable-batch-obfuscation
    desc: C# emits percent variable batch obfuscation
    crit: notable
    conf: 0.86
    if:
      type: string_literal
      exact: "{0}%{1}%"

composite_rules:
  - id: csharp-batch-powershell-stager-builder
    desc: C# batch PowerShell stager builder
    crit: suspicious
    conf: 0.96
    all:
      - id: csharp-builds-hidden-powershell-batch
      - id: micro-behaviors/data/encode/base64::dotnet-to-base64string
    needs: 2
    any:
      - id: csharp-builds-iex-downloadstring
      - id: csharp-builds-iex-base64-decode
      - id: csharp-upload-before-stager-build
      - id: csharp-percent-variable-batch-obfuscation

  - id: csharp-uploading-encoded-powershell-stager
    desc: C# uploading encoded PowerShell stager
    crit: hostile
    conf: 0.97
    all:
      - id: csharp-batch-powershell-stager-builder
      - id: csharp-builds-iex-downloadstring
      - id: csharp-upload-before-stager-build
    any:
      - id: csharp-builds-iex-base64-decode
      - id: csharp-percent-variable-batch-obfuscation
