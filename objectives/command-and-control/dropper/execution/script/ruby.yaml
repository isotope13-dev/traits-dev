# Ruby Script Dropper Patterns
defaults:
  for: [ruby]
  platforms: [unix, windows]

traits:
  - id: net-http-single-quote
    desc: '''net/http'' require string'
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      substr: '''net/http'''
  - id: net-http-double-quote
    desc: '"net/http" require string'
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      substr: '"net/http"'
  - id: uri-single-quote
    desc: '''uri'' require string'
    crit: suspicious
    conf: 0.6
    if:
      type: string_literal
      exact: '''uri'''
  - id: uri-double-quote
    desc: '"uri" require string'
    crit: suspicious
    conf: 0.6
    if:
      type: string_literal
      exact: '"uri"'
  - id: base64-single-quote
    desc: '''base64'' require string'
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      substr: '''base64'''
  - id: base64-double-quote
    desc: '"base64" require string'
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      substr: '"base64"'
  - id: resolv-single-quote
    desc: '''resolv'' require string'
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      substr: '''resolv'''
  - id: resolv-double-quote
    desc: '"resolv" require string'
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      substr: '"resolv"'
  - id: socket-single-quote
    desc: '''socket'' require string'
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      substr: '''socket'''
  - id: socket-double-quote
    desc: '"socket" require string'
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      substr: '"socket"'
  - id: tempfile-single-quote
    desc: '''tempfile'' require string'
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      substr: '''tempfile'''
  - id: tempfile-double-quote
    desc: '"tempfile" require string'
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      substr: '"tempfile"'
  - id: open-uri-single-quote
    desc: '''open-uri'' require string'
    crit: suspicious
    conf: 0.75
    unless:
      - id: well-known/lib/jruby::archive-basename
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::stdlib-archive-marker
    if:
      type: string_literal
      substr: '''open-uri'''
  - id: open-uri-double-quote
    desc: '"open-uri" require string'
    crit: suspicious
    conf: 0.75
    unless:
      - id: well-known/lib/jruby::archive-basename
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::stdlib-archive-marker
    if:
      type: string_literal
      substr: '"open-uri"'
  - id: pty-single-quote
    desc: '''pty'' require string'
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      exact: '''pty'''
  - id: pty-double-quote
    desc: '"pty" require string'
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      exact: '"pty"'
  - id: base64-separator-obfuscation
    desc: Base64 with separator obfuscation
    crit: suspicious
    conf: 0.88
    attack: T1027
    if:
      type: text
      regex: "gsub\\(.{0,10}[\"']---[\"']|\\.gsub\\(.{0,10}[\"']---[\"']"
  - id: vbs-script-write
    desc: VBS script file creation
    crit: suspicious
    conf: 0.85
    attack: T1059
    if:
      type: text
      regex: "File\\.open\\(.{0,50}\\.vbs|\\.vbs.{0,50}File\\.open"
  - id: ruby-commented-fileutils-chmod
    desc: Commented FileUtils chmod example
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '#\s*FileUtils\.chmod'
  - id: ruby-vagrant-plugins-module
    desc: Vagrant plugins module marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: module VagrantPlugins
  - id: ruby-unzip-helper-marker
    desc: Ruby unzip helper marker
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bUnzip\.|is_zip\?'

  # `ruby-ast-suspicious-url-scheme` consolidated to its string-obfuscation home
  # at `objectives/anti-static/obfuscation/string/concat::ruby-ast-suspicious-url-scheme`
  # (the matcher detects a truncated `https:/` scheme literal — obfuscation, not
  # dropper execution).
composite_rules:
  - id: wscript-execution
    desc: WScript execution
    crit: suspicious
    conf: 0.85
    attack: T1059
    any:
      - id: micro-behaviors/process/create/shell/script-host::wscript-exe
      - id: micro-behaviors/process/create/shell/script-host::cscript-exe
      - id: micro-behaviors/fs/path/extension::vbs
  - id: ruby-require-net-http
    desc: Imports HTTP client library
    crit: suspicious
    conf: 0.8
    any:
      - id: net-http-single-quote
      - id: net-http-double-quote
  - id: ruby-require-uri
    desc: Imports URI parsing library
    crit: suspicious
    conf: 0.75
    any:
      - id: uri-single-quote
      - id: uri-double-quote
  - id: ruby-require-base64
    desc: Imports Base64 library
    crit: suspicious
    conf: 0.8
    any:
      - id: base64-single-quote
      - id: base64-double-quote
  - id: ruby-require-resolv
    desc: Imports DNS resolution library
    crit: suspicious
    conf: 0.8
    any:
      - id: resolv-single-quote
      - id: resolv-double-quote
  - id: ruby-require-socket
    desc: Imports socket library
    crit: suspicious
    conf: 0.85
    any:
      - id: socket-single-quote
      - id: socket-double-quote
  - id: ruby-require-tempfile
    desc: Imports temporary file library
    crit: suspicious
    conf: 0.8
    any:
      - id: tempfile-single-quote
      - id: tempfile-double-quote
  - id: ruby-require-open-uri
    desc: Imports Open-URI library
    crit: suspicious
    conf: 0.85
    any:
      - id: open-uri-single-quote
      - id: open-uri-double-quote
  - id: ruby-require-pty
    desc: Imports PTY (pseudo-terminal) library
    crit: suspicious
    conf: 0.85
    any:
      - id: pty-single-quote
      - id: pty-double-quote
  - id: ruby-http-dropper
    desc: HTTP dropper downloads and executes
    conf: 0.95
    crit: suspicious
    unless:
      - id: well-known/lib/jruby/
      - id: micro-behaviors/communications/http/endpoints/
      - id: well-known/lib/tina4ruby/
    # `needs: 3 of any:` over directory references was too loose — three
    # matches inside `fs/write/file/` alone (e.g. two FileUtils.rm_rf
    # sites + an rm_f) would satisfy it, with no actual HTTP fetch or
    # shell-spawn anywhere. `all:` requires each category to fire at
    # least once; the default `file` scope requires the three signals
    # to land in the same .rb file (real droppers do this in one
    # script — gems legitimately split HTTP / writes / shell across
    # modules).
    all:
      - id: micro-behaviors/communications/http/message/
      - id: micro-behaviors/fs/write/file/
      - id: micro-behaviors/process/create/shell/
  - id: ruby-obfuscated-c2
    desc: Obfuscated C2 with Base64
    conf: 0.92
    crit: suspicious
    needs: 3
    any:
      - id: micro-behaviors/data/decode/base64::base64-decode
      - id: micro-behaviors/communications/dns/lookup/resolver::dns-resolve
      - id: micro-behaviors/communications/http/lib/netlib::net-http
      - id: micro-behaviors/communications/http/get/
  - id: ruby-tmp-execution
    desc: Write to /tmp, chmod, and execute
    conf: 0.93
    crit: suspicious
    # `needs: 3 of any:` over directory references fired on isodoc 3.6.3:
    # FileUtils.rm_rf cleanup + FileUtils.chmod 0o777 on a render dir
    # was enough to hit two categories with multiple sub-traits each,
    # crossing the 3-match threshold without any shell-spawn ever
    # happening. `all:` requires each category once; the default
    # `file` scope requires the trio to land in the same .rb file —
    # a real tmp-drop-chmod-exec dropper is one script, not a codebase.
    all:
      - id: micro-behaviors/fs/write/file/
      - id: micro-behaviors/fs/chmod/
      - id: micro-behaviors/process/create/shell/
    unless:
      - id: metadata/package/testing/presence/harness::ruby-test-file
      - id: ruby-commented-fileutils-chmod
      - id: ruby-vagrant-plugins-module
    downgrade:
      any:
        - id: metadata/library/data::wal-shipper-header
        - id: metadata/library/data::wal-shipper-config
  - id: ruby-reverse-shell
    desc: Reverse shell connection
    conf: 0.9
    crit: suspicious
    unless:
      - id: well-known/lib/jruby/
      - id: well-known/lib/jruby::bundler-thor-open-uri-helper
    all:
      - id: micro-behaviors/communications/socket/listen::ruby-tcp-socket
    any:
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/process/tty/pty::ruby-pty
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::ruby-test-file
  - id: ruby-windows-vbs-dropper
    desc: Windows VBS payload dropper
    conf: 0.94
    crit: suspicious
    needs: 4
    any:
      - id: micro-behaviors/os/sysinfo/platform/runtime::windows-os-check
      - id: base64-separator-obfuscation
      - id: vbs-script-write
      - id: wscript-execution
      - id: micro-behaviors/process/create/system::ruby-system
      - id: micro-behaviors/data/decode/base64::base64-decode
      - id: micro-behaviors/data/decode/base64::decode64-symbol
  - id: ruby-binary-dropper
    desc: Downloads and writes binary payload
    conf: 0.94
    crit: suspicious
    unless:
      - id: well-known/lib/jruby/
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::bundler-thor-open-uri-helper
      - id: well-known/lib/ruby-openuri::openuri-stdlib-module
      - id: well-known/lib/ruby-openuri::openuri-stdlib-meta
      - id: ruby-unzip-helper-marker
    all:
      - id: micro-behaviors/communications/http/lib/netlib::request-ruby
      - id: micro-behaviors/fs/write/file/direct::ruby-file-open-write-binary
    not:
      - regex: 'URI\.send\(:open,\s*source,\s*config\.fetch\(:http_headers'
      - substr: URI.send(:open, source
      - substr: config.fetch(:http_headers, {})
      - substr: input.binmode.read
  # === Dropper Behavior via AST ===
  - id: ruby-ast-dropper-behavior
    desc: Dropper download write execute
    crit: suspicious
    conf: 0.93
    attack: "T1059"
    needs: 3
    any:
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-http-in-method
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-file-binmode-write
      - id: micro-behaviors/process/create/shell/lang::ruby-system-dup
  # === Obfuscated C2 via AST ===
  - id: ruby-ast-obfuscated-c2
    desc: Base64 obfuscated C2 endpoint
    crit: suspicious
    conf: 0.91
    attack: "T1027"
    all:
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-base64-dns
      - id: micro-behaviors/communications/dns/lookup/resolver::dns-resolve
  # === Windows Dropper (New) ===
  - id: ruby-windows-dropper
    desc: Detects Windows-specific dropper behavior (OS check + Rename + Exec)
    crit: hostile
    conf: 0.95
    attack: "T1059"
    all:
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-check-windows-regex
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-rename-img-to-exe
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-exec-in-method
