# Windows MSHTA script-host execution traits.
defaults:
  platforms: [unix, windows]
  for: [batch, shell, powershell, javascript]
  attack: T1218.005
traits:
  - id: mshta-invoke
    desc: MSHTA execution invocation
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?i)\bmshta\b'
  - id: mshta-remote-url
    desc: MSHTA remote payload fetch
    crit: suspicious
    conf: 0.95
    mbc: E1218.005
    if:
      type: text
      regex: '(?i)\bmshta\s+https?://'
  - id: mshta-remote-msixbundle-url
    desc: MSHTA fetches remote MSIX bundle
    crit: suspicious
    conf: 0.98
    mbc: E1218.005
    if:
      type: text
      regex: '(?i)\bmshta(\.exe)?\s+https?://[^\s"''#]{1,200}\.msixbundle\b'
  - id: mshta-remote-archive-url
    desc: MSHTA fetches remote archive file
    crit: suspicious
    conf: 0.95
    mbc: E1218.005
    if:
      type: text
      regex: '(?i)\bmshta(\.exe)?\s+https?://[^\s"''#]{1,200}\.(zip|rar|7z)\b'
  - id: mshta-https-b64-fragment
    desc: Encoded MSHTA HTTPS fragment
    crit: component
    conf: 0.9
    for: [powershell]
    if:
      type: string_literal
      exact: EuZXhlIGh0dHBzO
  - id: geo-foundation-b64-fragment
    desc: Encoded geo-foundation domain fragment
    crit: component
    conf: 0.95
    for: [powershell]
    if:
      type: string_literal
      exact: ZvdW5kYXRp
  - id: mshta-inline-vbscript
    desc: MSHTA inline VBScript execution
    crit: notable
    conf: 0.9
    mbc: E1218.005
    if:
      type: text
      regex: '(?i)\bmshta\s+[''"]?vbscript:'
  - id: mshta-inline-javascript
    desc: MSHTA inline JavaScript execution
    crit: notable
    conf: 0.9
    mbc: E1218.005
    if:
      type: text
      regex: '(?i)\bmshta\s+[''"]?javascript:'
composite_rules:
  - id: ps-fragmented-mshta-remote-url
    desc: Fragmented MSHTA remote payload fetch
    crit: suspicious
    conf: 0.96
    for: [powershell]
    all:
      - id: mshta-https-b64-fragment
      - id: geo-foundation-b64-fragment
  - id: mshta-remote-package-url
    desc: MSHTA fetches remote package file
    crit: suspicious
    conf: 0.98
    any:
      - id: mshta-remote-msixbundle-url
      - id: mshta-remote-archive-url
  - id: npm-preinstall-mshta-remote-stage
    desc: npm preinstall launches remote MSHTA stage
    crit: hostile
    conf: 0.995
    attack: T1195.002
    mbc: E1218.005
    scope: archive
    for: [javascript, package.json, archives]
    all:
      - id: metadata/package/scripts::has-preinstall-script
      - id: mshta-remote-url
    any:
      - id: micro-behaviors/process/create/exec::exec-api-call
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
