# Obfuscated JScript decoder-loader behavior
# Focuses on high-confidence obfuscated JScript loader structure without
# hardcoding campaign-specific IOCs.
defaults:
  attack: T1027.002
  mbc: B0032
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
composite_rules:
  - id: obfuscated-jscript-decoder-loader
    desc: Obfuscated JScript loader with decoder loop and high-entropy structure
    crit: suspicious
    conf: 0.93
    all:
      - id: objectives/command-and-control/dropper/obfuscated::probabilistic-loader-loop
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::decoder-loop-keyword-triad
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::many-high-entropy-identifiers
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
  - id: obfuscated-jscript-signed-comment-loader
    desc: Obfuscated JScript loader with dual signature comment blocks
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/command-and-control/dropper/execution/script::obfuscated-jscript-decoder-loader
      - id: metadata/signed::sig-comment-double-signature-block
  - id: obfuscated-jscript-signed-entropy-loader
    desc: Obfuscated JScript loader with dual signature blocks and high text entropy
    crit: suspicious
    conf: 0.96
    all:
      - id: objectives/command-and-control/dropper/execution/script::obfuscated-jscript-decoder-loader
      - id: metadata/signed::sig-comment-double-signature-block
      - id: objectives/anti-static/obfuscation/code-metrics/structure::high-text-entropy
