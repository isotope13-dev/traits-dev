defaults:
  platforms: [windows]
  for: [batch]
traits:
  - id: batch-saps-self-relaunch
    desc: PowerShell relaunches batch itself
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "saps '%~f0' 's'"
  - id: batch-runas-hidden-window
    desc: RunAs hidden window launch
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)-Verb\s+RunAs.{0,48}-(Wi|WindowStyle)\s+Hidden'
  - id: batch-self-path-env-stash
    desc: Batch path stashed in env
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)set\s+"[A-Za-z0-9_]{3,}=%~f0"'
  - id: ps-readalllines-call
    desc: PowerShell reads all script lines
    crit: component
    conf: 0.88
    if:
      type: text
      substr: ReadAllLines
  - id: ps-final-line-index
    desc: PowerShell selects final line
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\$[A-Za-z0-9_]{3,}\[\$[A-Za-z0-9_]{3,}\.Length\s*-\s*1\]'
  - id: ps-aesmanaged-fragment
    desc: Fragmented AesManaged class name
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "'.Ae' + 'sMa' + 'nag' + 'ed'"
  - id: ps-createdecryptor-fragment
    desc: Fragmented CreateDecryptor method
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "'Cr' + 'eat' + 'eDe' + 'cry' + 'ptor'"
  - id: ps-transformfinalblock-fragment
    desc: Fragmented TransformFinalBlock method
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "'Tr' + 'ans' + 'for' + 'mFi' + 'nal' + 'Blo' + 'ck'"
  - id: ps-gzipstream-fragment
    desc: Fragmented GZipStream class name
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "'.GZ' + 'ipS' + 'tre' + 'am'"
  - id: ps-gzip-copyto
    desc: GZip stream copies bytes
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ".CopyTo("
  - id: ps-reflection-assembly-fragment
    desc: Fragmented Reflection.Assembly name
    crit: component
    conf: 0.93
    if:
      type: text
      substr: "'.As' + 'se' + 'mb' + 'ly'"
  - id: ps-load-byte-array
    desc: Assembly loads byte array
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)::\$[A-Za-z0-9_]{3,}\(\[byte\[\]\]\$'
  - id: ps-entrypoint-fragment
    desc: Fragmented EntryPoint property
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "'En' + 'try' + 'Po' + 'int'"
  - id: ps-invoke-fragment
    desc: Fragmented Invoke method
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "'In' + 'vo' + 'ke'"
  - id: ps-entrypoint-variable-call
    desc: EntryPoint invoked through variable
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(?i)\$[A-Za-z0-9_]{3,}\.\$[A-Za-z0-9_]{3,}\(\$null'
  - id: ps-tochararray-stage
    desc: Payload split into characters
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ".ToCharArray()"
  - id: ps-array-reverse-stage
    desc: Payload character array reversed
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "[Array]::Reverse"
composite_rules:
  - id: batch-hidden-runas-self-relaunch
    desc: Hidden elevated batch relaunch
    crit: suspicious
    conf: 0.96
    attack: T1059.003
    all:
      - id: batch-saps-self-relaunch
      - id: batch-runas-hidden-window
  - id: batch-self-lastline-payload
    desc: Batch reads final payload line
    crit: component
    conf: 0.94
    all:
      - id: batch-self-path-env-stash
      - id: ps-readalllines-call
      - id: ps-final-line-index
  - id: ps-aes-decryptor-stage
    desc: PowerShell AES decryptor stage
    crit: component
    conf: 0.96
    all:
      - id: ps-aesmanaged-fragment
      - id: ps-createdecryptor-fragment
      - id: ps-transformfinalblock-fragment
  - id: ps-gzip-decompress-stage
    desc: PowerShell GZip decompress stage
    crit: component
    conf: 0.94
    all:
      - id: ps-gzipstream-fragment
      - id: ps-gzip-copyto
  - id: ps-byte-array-assembly-load
    desc: Byte array assembly load
    crit: component
    conf: 0.95
    all:
      - id: ps-reflection-assembly-fragment
      - id: ps-load-byte-array
  - id: ps-entrypoint-indirect-invoke
    desc: Indirect EntryPoint invocation
    crit: component
    conf: 0.95
    all:
      - id: ps-entrypoint-fragment
      - id: ps-invoke-fragment
      - id: ps-entrypoint-variable-call
  - id: ps-reversed-base64-stage
    desc: Reversed Base64 stage payload
    crit: component
    conf: 0.92
    all:
      - id: ps-tochararray-stage
      - id: ps-array-reverse-stage
      - id: objectives/command-and-control/dropper/execution/batch::frombase64-ps-stage
  - id: batch-encrypted-reflective-dotnet-loader
    desc: Batch encrypted reflective .NET loader
    crit: hostile
    conf: 0.99
    attack: T1620
    mbc: B0024
    all:
      - id: batch-self-lastline-payload
      - id: ps-aes-decryptor-stage
      - id: ps-gzip-decompress-stage
      - id: ps-byte-array-assembly-load
      - id: ps-entrypoint-indirect-invoke
    any:
      - id: batch-hidden-runas-self-relaunch
      - id: ps-reversed-base64-stage
      - id: objectives/anti-static/obfuscation/string/anomaly::batch-extreme-line-bloat
      - id: objectives/command-and-control/dropper/execution/batch::powershell-launcher
    needs: 2
  - id: batch-elevated-encrypted-dotnet-stage
    desc: Elevated encrypted .NET stage loader
    crit: hostile
    conf: 0.98
    attack: T1059.003
    mbc: B0030
    all:
      - id: batch-hidden-runas-self-relaunch
      - id: objectives/anti-static/obfuscation/string/concat::ps-ep-bypass
      - id: ps-aes-decryptor-stage
      - id: ps-gzip-decompress-stage
      - id: ps-byte-array-assembly-load
    any:
      - id: ps-entrypoint-indirect-invoke
      - id: batch-self-lastline-payload
      - id: objectives/anti-static/obfuscation/string/anomaly::batch-extreme-line-bloat
