defaults:
  attack: "T1027, T1059.007, T1105"
  platforms: [windows, unix]
  for: [batch, shell, javascript, text, data]

traits:
- id: decoded-js-eval-getobject
  desc: Decoded JScript eval uses GetObject
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(?i)eval\(''var[\s\S]{0,320}GetObject\('
- id: getobject-concat-url-stager
  desc: GetObject concatenates staged URL
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(?i)GetObject\([A-Z_$][A-Z0-9_$]{0,32}\+[^)]{0,140}//[A-Z0-9]'
