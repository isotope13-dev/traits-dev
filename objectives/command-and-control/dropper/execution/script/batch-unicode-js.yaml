defaults:
  attack: "T1027, T1059.003, T1105"
  platforms: [windows]
  for: [batch]
traits:
- id: comspec-delayed-command
  desc: ComSpec delayed command execution
  crit: component
  conf: 0.9
  if:
    type: text
    substr: '%ComSpec% /V/D/c'
- id: batch-echo-unicode-js-eval
  desc: Batch echoes unicode JS eval
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(?i)echo\s+eval\(''\\u[0-9a-f]{4}'
- id: delayed-js-stage-call
  desc: Delayed JS stage write and call
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(?i)>\s*![A-Z0-9_]+!\s*&&ca\^ll\s+![A-Z0-9_]+!'
- id: script-protocol-getobject
  desc: GetObject fetches script URL
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(?i)GetObject[^\r\n]{0,120}//[A-Za-z0-9]'
composite_rules:
- id: batch-unicode-js-url-stager
  desc: Batch unicode-escaped JS URL stager
  crit: hostile
  conf: 0.98
  all:
  - id: comspec-delayed-command
  - id: batch-echo-unicode-js-eval
  - id: delayed-js-stage-call
  - id: script-protocol-getobject
