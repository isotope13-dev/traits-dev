# Batch-based Dropper Objectives
# Detects intentional payload delivery via Windows Batch scripts
defaults:
  attack: T1105
  crit: hostile
  conf: 0.9
  platforms: [windows]
  for: [batch]
composite_rules:
  - id: batch-lolbin-dropper
    desc: Batch script using LOLBins to download and execute
    mbc: "C0002"
    all:
      - id: objectives/command-and-control/dropper/execution/script::download-tool
      - id: objectives/command-and-control/dropper/execution/script::exec-cmd
    any:
      - id: objectives/command-and-control/dropper/execution/script::certutil-urlcache
      - id: objectives/command-and-control/dropper/execution/script::bitsadmin-download
      - id: objectives/command-and-control/dropper/execution/script::powershell-download
  - id: batch-staging-dropper
    desc: Batch script downloading and executing from staging directory
    mbc: "E1074"
    all:
      - id: objectives/command-and-control/dropper/execution/script::download-tool
      - id: objectives/command-and-control/dropper/execution/script::exec-cmd
    any:
      - id: micro-behaviors/fs/file/write/staging::users-public-path
      - id: objectives/command-and-control/dropper/execution/script::run-from-temp
  - id: batch-arch-aware-dropper
    desc: Architecture-aware batch dropper
    mbc: "C0002"
    all:
      - id: objectives/command-and-control/dropper/execution/script::download-tool
      - id: objectives/command-and-control/dropper/execution/script::wmic-arch-check
    any:
      - id: objectives/command-and-control/dropper/execution/script::exec-cmd
      - id: micro-behaviors/fs/file/write/staging::users-public-path
  - id: batch-certutil-tcp-stager
    desc: Batch certutil stager with TCP stage query and architecture split
    mbc: "B0024"
    all:
      - id: objectives/command-and-control/infrastructure/ip::staged-tcp-query
      - id: objectives/command-and-control/dropper/execution/script::certutil-urlcache-split-force
      - id: objectives/command-and-control/dropper/execution/script::wmic-arch-check
      - id: micro-behaviors/fs/file/write/staging::users-public-path
    any:
      - id: objectives/command-and-control/dropper/execution/script::exec-cmd
      - id: micro-behaviors/fs/file/delete::del-command
