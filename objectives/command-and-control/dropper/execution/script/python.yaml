# Python Script Dropper Patterns
# Detects Python scripts that download and execute remote payloads
# ATT&CK: T1059.006 (Python), T1105 (Ingress Tool Transfer)
defaults:
  attack: T1105
  mbc: B0024
  platforms: [linux, macos, windows]
  for: [python]

traits:
  - id: python-memfd-uname
    desc: Python machine type check for fileless exec
    if:
      type: symbol
      exact: 'os.uname'
  - id: python-memfd-write
    desc: Python memory write for fileless exec
    if:
      type: symbol
      exact: 'os.write'
  - id: cross-platform-git-bash-exe
    desc: Git bash.exe on Windows for shell scripts
    crit: suspicious
    for: [python, ruby, javascript]
    if:
      type: string_literal
      substr: 'Git\\bin\\bash.exe'
  - id: python-mktemp-bash
    desc: Python generating a bash script with mktemp
    crit: suspicious
    if:
      type: string_literal
      substr: '_q="$(mktemp)"'
  - id: setup-py-bash-c-curl
    desc: setup.py executing bash -c curl
    crit: suspicious
    if:
      type: text
      regex: "subprocess\\.Popen\\(.{0,50}bash.{0,50}-c.{0,50}curl"
  - id: python-requests-exec-get
    desc: Python fetch-and-execute pattern via requests
    if:
      type: ast
      query: |
        (call
          function: (identifier) @func (#eq? @func "exec")
          arguments: (argument_list
            (call
              function: (attribute
                object: (call
                  function: (attribute
                    object: (identifier) @lib (#eq? @lib "requests")
                    attribute: (identifier) @method (#eq? @method "get"))
                )
              )
            )
          )
        )

composite_rules:
  # Python subprocess executing a download-and-pipe-to-shell pattern
  # e.g., subprocess.run("curl ... | shell", shell=True)
  - id: subprocess-download-execute
    desc: Python subprocess download-and-execute dropper
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/subprocess::methods
      - id: objectives/command-and-control/dropper/delivery/pipe::download-pipe-exec
    any:
      - id: micro-behaviors/process/create/subprocess::shell-true
  # Python file with subprocess shell=True and curl|shell
  # Broader: catches cases where methods composite doesn't fire but raw subprocess does
  - id: shell-true-curl-pipe
    desc: Python shell=True with curl pipe to interpreter
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: objectives/command-and-control/dropper/delivery/pipe::download-pipe-exec

  - id: python-cross-platform-dropper
    desc: Python cross-platform shell dropper
    crit: hostile
    conf: 0.95
    all:
      - id: python-mktemp-bash
    any:
      - id: cross-platform-git-bash-exe
  - id: python-memfd-exec
    desc: Python fileless execution via memfd_create
    crit: hostile
    all:
      - id: python-memfd-uname
      - id: python-memfd-write
      - id: micro-behaviors/process/create/subprocess::os-execve
  - id: python-hostile-memfd-execution
    desc: Hostile Python fileless execution via memfd and /proc/self/fd
    crit: hostile
    all:
      - id: python-memfd-exec
      - id: objectives/evasion/fileless/memory::proc-self-fd-dup
  - id: python-fetch-exec-hostile
    desc: Hostile Python fetch-and-execute from remote URL
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
  - id: python-fileless-dropper
    desc: Python fileless dropper via memfd
    crit: hostile
    all:
      - id: python-memfd-exec
      - id: micro-behaviors/communications/http/request
