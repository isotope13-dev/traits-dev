# Python Script Dropper Patterns
# Detects Python scripts that download and execute remote payloads
# ATT&CK: T1059.006 (Python), T1105 (Ingress Tool Transfer)
defaults:
  attack: T1105
  mbc: B0024
  platforms: [unix, windows]
  for: [python]
traits:
  - id: curl-slo-variable-output
    desc: Python curl writes variable path
    crit: suspicious
    conf: 0.9
    platforms: [unix]
    if:
      type: text
      regex: 'curl\s+-sLo\s+\{?[A-Za-z_][A-Za-z0-9_]*\}?'
  - id: chmod-variable-output
    desc: Python chmods variable path
    crit: component
    conf: 0.9
    platforms: [unix]
    if:
      type: text
      regex: '&&\s*chmod\s+\+x\s+\{?[A-Za-z_][A-Za-z0-9_]*\}?'
  - id: echo-config-piped-to-var
    desc: Echoed config piped to variable
    crit: component
    conf: 0.9
    platforms: [unix]
    if:
      type: text
      regex: "echo\\s+['\"]\\{?[A-Za-z_][A-Za-z0-9_]*\\}?['\"]\\s*\\|"
  - id: subprocess-detached-session
    desc: subprocess detached session
    crit: component
    conf: 0.85
    platforms: [unix]
    if:
      type: text
      substr: "start_new_session=True"
composite_rules:
  - id: shell-curl-chmod-dropper
    desc: Python shell subprocess curl chmod dropper
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: curl-slo-variable-output
      - id: chmod-variable-output
  - id: detached-stdin-config-dropper
    desc: Python detached stdin config dropper
    crit: hostile
    conf: 0.96
    all:
      - id: shell-curl-chmod-dropper
      - id: echo-config-piped-to-var
      - id: subprocess-detached-session
    any:
      - id: micro-behaviors/fs/file/delete::py-remove
      - id: micro-behaviors/fs/directory/delete::shutil-rmtree
  # Python subprocess executing a download-and-pipe-to-shell pattern
  # e.g., subprocess.run("curl ... | shell", shell=True)
  - id: subprocess-download-execute
    desc: Python subprocess download-and-execute dropper
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/subprocess::methods
      - id: objectives/command-and-control/dropper/delivery/pipe::download-pipe-exec
    any:
      - id: micro-behaviors/process/create/subprocess::shell-true
  # Python file with subprocess shell=True and curl|shell
  # Broader: catches cases where methods composite doesn't fire but raw subprocess does
  - id: shell-true-curl-pipe
    desc: Python shell=True with curl pipe to interpreter
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: objectives/command-and-control/dropper/delivery/pipe::download-pipe-exec
