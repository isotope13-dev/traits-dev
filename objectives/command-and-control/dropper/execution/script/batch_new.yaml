defaults:
  platforms:
    - linux
    - unix
    - macos
    - android
    - ios
    - windows
traits:
  - id: curl-to-temp
    desc: Download to TEMP directory
    crit: suspicious
    conf: 0.9
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)(curl|wget).{0,120}(\\Temp\\|%TMP%)
  - id: certutil-download
    desc: Certutil download abuse
    crit: suspicious
    conf: 0.95
    for:
      - shell
      - batch
    if:
      type: text
      regex: certutil\s+.{0,50}-urlcache.{0,30}-split.{0,30}-f
  - id: bitsadmin-download
    desc: BitsAdmin download abuse
    crit: suspicious
    conf: 0.95
    for: [scripts]
    if:
      type: text
      regex: bitsadmin\s+.{0,50}\/transfer
  - id: start-hidden-dup
    desc: Start process hidden
    crit: suspicious
    conf: 0.85
    for:
      - batch
    if:
      type: text
      regex: start\s+["']?["']?\s*/[Bb]
  - id: run-from-temp
    desc: Execute binary from TEMP directory
    crit: suspicious
    conf: 0.9
    for:
      - batch
    if:
      type: text
      regex: (?i)start[^\n]{0,220}(%TEMP%|%TMP%)[^\n]{0,220}\.exe
  - id: done-marker
    desc: Execution marker file
    crit: notable
    conf: 0.75
    for:
      - shell
      - batch
    if:
      type: text
      regex: if exist.{0,30}\.done|echo\.>.{0,30}\.done|\.installed|\.complete
  - id: echo-off
    desc: Echo off
    crit: notable
    conf: 0.6
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)@echo\s+off
    not:
      - substr: 'Copyright (c)'
      - substr: 'SET dp0=%~dp0'
      - substr: 'goto #_undefined_# 2>NUL'
    unless:
      - type: basename
        regex: ^vcbuild\.bat$
      - type: basename
        regex: ^clink\.bat$
      - type: basename
        regex: ^GetCommitHash\.bat$
      - type: basename
        regex: ^UpdateGenVersion\.bat$
      - type: basename
        regex: ^build-pty4j-libpty\.bat$
  - id: redirect-null
    desc: Redirect output to null
    crit: notable
    conf: 0.7
    for:
      - shell
      - batch
    unless:
      - type: basename
        regex: ^(GetCommitHash|UpdateGenVersion)\.bat$
      - type: basename
        regex: ^build-pty4j-libpty\.bat$
    if:
      type: text
      regex: (?i)>nul|2>nul
  - id: delayed-expansion
    desc: Delayed expansion enabled
    crit: notable
    conf: 0.5
    for:
      - shell
      - batch
    if:
      type: text
      substr: EnableDelayedExpansion
  - id: curl-cmd-dup
    desc: curl command
    crit: notable
    conf: 0.5
    for:
      - batch
    if:
      type: text
      regex: (?i)\bcurl\b
  - id: download-file-ps
    desc: PowerShell DownloadFile
    crit: notable
    conf: 0.5
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)DownloadFile
  - id: certutil-cmd
    desc: certutil command
    crit: notable
    conf: 0.5
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)\bcertutil\b
  - id: certutil-urlcache
    desc: certutil urlcache
    crit: suspicious
    conf: 0.95
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)certutil[^\n]{0,220}-urlcache
  - id: certutil-urlcache-split-force
    desc: certutil urlcache with split force
    crit: suspicious
    conf: 0.98
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)certutil(\.exe)?\s+[^\n]{0,120}-urlcache[^\n]{0,60}-split[^\n]{0,60}-f
  - id: certutil-decode
    desc: certutil base64 decode (LOLBas payload staging)
    crit: suspicious
    conf: 0.9
    attack: T1140
    for:
      - shell
      - batch
      - powershell
      - vbs
    if:
      type: text
      regex: (?i)certutil(\.exe)?\s+[^\n]{0,60}-decode\b
  - id: wmic-arch-check
    desc: Check OS architecture via WMIC
    crit: notable
    conf: 0.8
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)wmic[^\n]{0,220}osarchitecture
  - id: bitsadmin-cmd
    desc: bitsadmin command
    crit: notable
    conf: 0.5
    for: [scripts]
    if:
      type: text
      word: bitsadmin
      case_insensitive: true
  - id: start-exe
    desc: Start an executable
    crit: notable
    conf: 0.6
    for:
      - batch
      - shell
    if:
      type: text
      regex: (?i)start\s+[^\n]{0,120}\.exe
    unless:
      - type: basename
        regex: ^clink\.bat$
  - id: curl-remote-exe
    desc: Download and run remote executable
    crit: suspicious
    conf: 0.9
    for:
      - batch
      - shell
    if:
      type: text
      regex: (?i)curl\s+[^\n]{0,120}https?://[^\n]{0,120}\.exe
  - id: output-flag
    desc: Output flag -o
    crit: notable
    conf: 0.4
    for:
      - batch
    if:
      type: text
      regex: (?i)\bcurl\b[^\n]{0,120}\s-o\s
  - id: call-label
    desc: Call local batch label
    crit: notable
    conf: 0.4
    for:
      - batch
    if:
      type: text
      regex: (?im)^\s*@?call\s+:[A-Za-z0-9_.$-]+
    not:
      - substr: 'SET dp0=%~dp0'
      - substr: 'goto #_undefined_# 2>NUL'
    unless:
      - type: basename
        regex: ^clink\.bat$
  - id: call-comspec
    desc: Call COMSPEC interpreter
    crit: notable
    conf: 0.4
    for:
      - batch
    if:
      type: text
      regex: (?im)^\s*@?call\s+%comspec%\b
  - id: call-cmd
    desc: Call cmd interpreter
    crit: notable
    conf: 0.4
    for:
      - batch
    if:
      type: text
      regex: (?im)^\s*@?call\s+cmd(\.exe)?\b
  - id: call-script
    desc: Call batch script file
    crit: notable
    conf: 0.4
    for:
      - batch
    if:
      type: text
      regex: (?im)^\s*@?call\s+\"?[A-Za-z0-9_./\\%-]+\.(bat|cmd)\b
    not:
      - substr: 'build-gyp\\gyp.bat'
    unless:
      - type: basename
        regex: ^vcbuild\.bat$
  - id: powershell-command
    desc: PowerShell command flag
    crit: notable
    conf: 0.7
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)powershell[^\n]{0,220}-[Cc]\s
  - id: powershell-file-flag
    desc: PowerShell file execution flag
    crit: notable
    conf: 0.82
    for:
      - batch
      - shell
    if:
      type: text
      regex: (?i)powershell(\.exe)?[^\n]{0,220}-f\s
  - id: temp-ps1-stage-path
    desc: Temp PowerShell script stage path
    crit: notable
    conf: 0.88
    for:
      - batch
      - shell
      - powershell
    if:
      type: text
      regex: (?i)(%TEMP%|%TMP%|\$env:TEMP|\$env:TMP)[^\\\r\n]{0,40}\\[A-Za-z0-9._-]+\.ps1
  - id: temp-tmp-stage-path
    desc: Temp intermediate stage file path
    crit: notable
    conf: 0.82
    for:
      - batch
      - shell
      - powershell
    if:
      type: text
      regex: (?i)(%TEMP%|%TMP%|\$env:TEMP|\$env:TMP)[^\\\r\n]{0,40}\\[A-Za-z0-9._-]+\.tmp
  - id: temp-raw-base64-rebuild
    desc: Temp file raw base64 rebuild chain
    crit: notable
    conf: 0.93
    for:
      - batch
      - powershell
    if:
      type: text
      regex: '(?i)Get-Content.{0,80}\.tmp.{0,40}-Raw'
  - id: frombase64-ps-stage
    desc: FromBase64String in PowerShell stage
    crit: notable
    conf: 0.86
    for:
      - batch
      - powershell
    if:
      type: text
      word: FromBase64String
  - id: out-file-ps1-stage
    desc: Out-File writes ps1 stage
    crit: notable
    conf: 0.9
    for:
      - batch
      - powershell
    if:
      type: text
      regex: '(?i)Out-File.{0,80}\.ps1'
  - id: set-content-ps1-stage
    desc: Set-Content writes ps1 stage
    crit: notable
    conf: 0.88
    for:
      - batch
      - powershell
    if:
      type: text
      regex: '(?i)Set-Content.{0,80}\.ps1'
  - id: batch-echo-base64-stage
    desc: Batch echoes large base64 stage
    crit: notable
    conf: 0.9
    for:
      - batch
    count_min: 3
    if:
      type: text
      regex: '(?i)echo\s+[A-Za-z0-9+/=]{80,}\s*>>?\s*"?%TEMP%\\[A-Za-z0-9._-]+\.tmp"?'
  - id: outfile-param
    desc: OutFile parameter
    crit: notable
    conf: 0.75
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)-OutFile
  - id: go-build-cmd
    desc: Go build command
    crit: notable
    conf: 0.8
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)\bgo\s+build\b
  - id: go-ldflags-strip
    desc: Go strip flag
    crit: notable
    conf: 0.85
    for:
      - shell
      - batch
    size_max: 5000
    if:
      type: text
      regex: ldflags.{0,50}(-s\s+-w|\s-s\s+|\s-s\b)
    unless:
      - type: text
        substr: mkall
  - id: go-ldflags-hide-gui
    desc: Go hide GUI window flag
    crit: suspicious
    conf: 0.85
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)-H=windowsgui
  - id: go-linkmode-external
    desc: Go external linkmode
    crit: notable
    conf: 0.7
    for:
      - shell
      - batch
    if:
      type: text
      regex: (?i)linkmode=external
composite_rules:
  - id: powershell-download
    desc: PowerShell download cradle in batch
    crit: notable
    conf: 0.9
    for:
      - shell
      - batch
    any:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::invoke-webrequest
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::webclient-download
  - id: download-tool
    desc: Download tool usage
    crit: notable
    conf: 0.7
    for:
      - shell
      - batch
    any:
      - id: objectives/command-and-control/dropper/execution/script::curl-cmd-dup
      - id: micro-behaviors/communications/http/download/curl::wget-path
      - id: download-file-ps
      - id: certutil-cmd
      - id: bitsadmin-cmd
  - id: exec-cmd
    desc: Execution command
    crit: notable
    conf: 0.6
    for:
      - shell
      - batch
    any:
      - id: objectives/command-and-control/dropper/execution/script::start-hidden-dup
      - id: run-from-temp
      - id: call-label
      - id: call-comspec
      - id: call-cmd
      - id: call-script
  - id: batch-download-execute
    desc: Download and execute pattern (batch)
    crit: suspicious
    conf: 0.95
    for:
      - batch
    all:
      - id: echo-off
      - id: download-tool
      - id: exec-cmd
      - id: output-flag
  - id: powershell-launcher
    desc: PowerShell launcher in batch
    crit: notable
    conf: 0.8
    for:
      - shell
      - batch
    all:
      - id: micro-behaviors/process/create/shell/lang::powershell-invocation
      - id: powershell-command
  - id: powershell-download-cradle
    desc: PowerShell download cradle
    crit: notable
    conf: 0.9
    for:
      - shell
      - batch
    all:
      - id: micro-behaviors/process/create/shell/lang::powershell-invocation
    any:
      - id: outfile-param
      - id: powershell-download
  - id: temp-powershell-stage-rebuild
    desc: Batch rebuilds temp PowerShell stage
    crit: suspicious
    conf: 0.96
    for:
      - batch
    all:
      - id: powershell-launcher
      - id: temp-raw-base64-rebuild
      - id: frombase64-ps-stage
    any:
      - id: temp-ps1-stage-path
      - id: temp-tmp-stage-path
      - id: batch-echo-base64-stage
      - id: out-file-ps1-stage
      - id: set-content-ps1-stage
    needs: 2
  - id: batch-temp-powershell-exec-chain
    desc: Batch rebuilds and runs temp PowerShell
    crit: hostile
    conf: 0.98
    for:
      - batch
    all:
      - id: temp-powershell-stage-rebuild
      - id: powershell-file-flag
      - id: temp-ps1-stage-path
  - id: go-build-stealth
    desc: Go build with stealth flags
    crit: notable
    conf: 0.92
    for:
      - shell
      - batch
    all:
      - id: go-build-cmd
    any:
      - id: go-ldflags-strip
      - id: go-ldflags-hide-gui
  - id: batch-dropper-hostile
    desc: Hostile Batch Dropper
    crit: hostile
    conf: 0.99
    for:
      - batch
    all:
      - id: micro-behaviors/fs/file/delete::batch-self-delete
    any:
      - id: powershell-download
      - id: powershell-download-cradle
      - id: certutil-download
      - id: bitsadmin-download
      - id: curl-to-temp
      - id: batch-download-execute
      - id: objectives/anti-static/obfuscation/string::rundll32-obfuscated-env-var
