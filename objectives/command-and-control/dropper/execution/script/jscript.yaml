defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: jscript-xmlhttp-adodb-dropper
    desc: "JScript downloader using XMLHTTP and ADODB.Stream"
    crit: hostile
    conf: 0.95
    attack: "T1105"
    all:
      - id: objectives/execution/interpreter/script/wsh::wscript-shell
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run
      - id: micro-behaviors/fs/write::adodb-save-to-file
    any:
      - id: micro-behaviors/communications/http/client/xmlhttp::js-xmlhttp-open
      - id: micro-behaviors/communications/http/client/xmlhttp::js-xmlhttp-send
  - id: jscript-embedded-base64-adodb-dropper
    desc: "JScript embedded base64 payload drop-and-exec"
    crit: hostile
    conf: 0.98
    attack: "T1059.007"
    platforms: [windows]
    for: [javascript]
    all:
      - id: micro-behaviors/data/decode/base64::msxml-bin-base64-decode
      - id: micro-behaviors/fs/write/file/stream::adodb-stream
      - id: micro-behaviors/fs/write::adodb-save-to-file
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run
  - id: jscript-rundll32-dropper
    desc: "JScript dropper that executes payload via rundll32"
    crit: hostile
    conf: 1.0
    attack: "T1218.011"
    near_lines: 40
    all:
      - id: micro-behaviors/process/create/shell/invoke::rundll32-exec-with-args
    any:
      - id: micro-behaviors/fs/write::adodb-save-to-file
      - id: micro-behaviors/fs/write/file/direct::js-file-write
      - id: objectives/anti-static/obfuscation/syntax::js-comma-constant-obfuscation
  - id: jscript-xor-numeric-encoded-dropper
    desc: "JScript dropper with XOR/numeric encoded COM strings"
    crit: hostile
    conf: 0.93
    attack: "T1059.007"
    mbc: "B0017"
    platforms: [windows]
    for: [javascript]
    all:
      - id: micro-behaviors/process/interpreter/jscript::activex-object
      - id: objectives/execution/interpreter/script/wsh-fragments::wscript-shell-fragment-1
      - id: micro-behaviors/data/control-flow/analysis::loop-string-access-dynamic-method
    any:
      - id: micro-behaviors/data/encode/string::decimal-string-blob
      - id: objectives/anti-static/obfuscation/string/array::hex-string-function-call
