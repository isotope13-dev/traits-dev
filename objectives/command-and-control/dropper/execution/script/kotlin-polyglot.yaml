defaults:
  platforms: [unix]
  for: [shell, kotlin, jar, class, java_class]
  attack: T1059

traits:
  - id: shell-kotlin-polyglot-marker
    desc: Shell Kotlin polyglot marker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "###KOTLIN###"

  - id: shell-kotlinc-jar-run
    desc: Shell kotlinc jar run
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'kotlinc[\s\S]{0,120}java -jar /tmp/_ag_poly\.jar'

  - id: jvm-hex-decoder-function
    desc: JVM hex decoder function
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: _hx:(Ljava/lang/String;)Ljava/lang/String;

composite_rules:
  - id: shell-kotlin-polyglot-exec
    desc: Shell Kotlin polyglot exec
    crit: hostile
    conf: 0.98
    all:
      - id: shell-kotlin-polyglot-marker
      - id: shell-kotlinc-jar-run

  - id: jvm-hex-decoded-payload
    desc: JVM hex decoded payload
    crit: hostile
    conf: 0.97
    all:
      - id: jvm-hex-decoder-function
    any:
      - id: objectives/exfiltration/ftp::jvm-ftp-stor-bytecode
      - id: objectives/exfiltration/ftp::jvm-ftp-user-pass-bytecode
