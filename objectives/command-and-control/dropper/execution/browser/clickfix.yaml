defaults:
  platforms: [windows, unix]
  for: [javascript, html]
  attack: T1105
  mbc: B0024
traits:
  - id: browser-contract-stage-loader-yara
    desc: Browser smart-contract stage loader
    crit: suspicious
    conf: 0.99
    if:
      type: yara
      source: |
        rule browser_contract_stage_loader_b64xor255 {
          strings:
            $wrap = "atob(s);var len=s.length" ascii
            $state = "jJaLmqCNmo+elo2gjIuei5rY" ascii
            $contract = "z4eevceZy8bMyMiZnMfJy8vMyMvLyJq7x7nGvbnKzcrMxrrHvb7Ox73O" ascii
            $eth_call = "ai5egnJ6Tk9jT" ascii
            $api_js = "0J6PltCWkZuah9GPl4/AnsKVjNmSkJuaw" ascii
          condition:
            filesize < 200KB and all of them
        }
  - id: b64xor-site-repair-state
    desc: Base64 XOR site repair state key
    crit: baseline
    conf: 0.96
    if:
      type: text
      substr: jJaLmqCNmo+elo2gjIuei5rY
  - id: b64xor-bw-downloaded-state
    desc: Base64 XOR browser download state key
    crit: baseline
    conf: 0.96
    if:
      type: text
      substr: 2I0puQiJGTkJ6bmpvY
  - id: b64xor-browser-mode-map
    desc: Base64 XOR browser lure mode map
    crit: baseline
    conf: 0.93
    if:
      type: text
      substr: djZCIjJqNxdiJztGVjNg
  - id: b64xor-cloudflare-mode-map
    desc: Base64 XOR Cloudflare lure mode map
    crit: baseline
    conf: 0.93
    if:
      type: text
      substr: yTkIqbmZOejZrF2InJ0ZWM2
  - id: b64xor-api-js-mode-stage
    desc: Base64 XOR API mode script stage
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: 0J6PltCWkZuah9GPl4/AnsKVjNmSkJuaw
  - id: b64xor-state-key-pair
    desc: Base64 XOR browser state keys
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: jJaLmqCNmo\+elo2gjIuei5rY[\s\S]{0,100}2I0puQiJGTkJ6bmpvY
  - id: b64xor-dual-lure-modes
    desc: Base64 XOR dual lure modes
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: djZCIjJqNxdiJztGVjNg[\s\S]{0,120}yTkIqbmZOejZrF2InJ0ZWM2
  - id: clickfix-finger-command
    desc: ClickFix finger command lure
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bfinger(\.exe)?\s+[a-z0-9._-]{2,64}@[a-z0-9.-]{3,253}\.[a-z]{2,24}\b'
  - id: clickfix-finger-ip-command
    desc: ClickFix finger IP command
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bfinger(\.exe)?\s+[a-z0-9._-]{2,64}@(\d{1,3}\.){3}\d{1,3}\b'
  - id: clickfix-renamed-finger-command
    desc: ClickFix renamed finger command
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)(copy|cp|move|ren)\s+[^\r\n]{0,120}finger\.exe[^\r\n]{0,160}\\ct\.exe'
  - id: clickfix-base64-finger-cmd
    desc: ClickFix base64 finger command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)(atob|btoa|base64|fromCharCode).{0,240}\bfinger(\.exe)?\s+[A-Za-z0-9._-]{2,64}@'
  - id: crashfix-browser-abnormal-warning
    desc: CrashFix browser abnormal warning
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)browser\s+(has\s+)?stopped\s+abnormally|chrome\s+(has\s+)?stopped\s+abnormally'
composite_rules:
  - id: clickfix-state-key-pair
    desc: ClickFix browser state key pair
    crit: suspicious
    conf: 0.96
    all:
      - id: b64xor-site-repair-state
      - id: b64xor-bw-downloaded-state
  - id: clickfix-lure-mode-map
    desc: ClickFix lure mode map
    crit: suspicious
    conf: 0.94
    all:
      - id: b64xor-browser-mode-map
      - id: b64xor-cloudflare-mode-map
  - id: browser-contract-stage-loader
    desc: Browser smart-contract stage loader
    crit: hostile
    conf: 0.99
    all:
      - id: browser-contract-stage-loader-yara
      - id: objectives/anti-static/obfuscation/string/encoding::js-base64-xor-decode-chain
      - id: micro-behaviors/data/source/dynamic/eval::new-function-iife
  - id: clickfix-finger-lolbin-stage
    desc: ClickFix finger LOLBin stage
    crit: hostile
    conf: 0.97
    any:
      - id: clickfix-finger-command
      - id: clickfix-finger-ip-command
      - id: clickfix-base64-finger-cmd
      - id: objectives/command-and-control/channel/finger::finger-output-command-execution
    all:
      - id: objectives/execution/lure/clipboard::browser-clipboard-write
  - id: crashfix-finger-browser-lure
    desc: CrashFix finger browser lure
    crit: hostile
    conf: 0.98
    all:
      - id: crashfix-browser-abnormal-warning
    any:
      - id: clickfix-finger-command
      - id: clickfix-finger-ip-command
      - id: clickfix-renamed-finger-command
