defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: dom-createelement-symbol
    desc: JavaScript calls document.createElement
    crit: component
    conf: 0.8
    if:
      type: symbol
      kind: member
      exact: document.createElement
  - id: string-fromcharcode-symbol
    desc: JavaScript uses String.fromCharCode
    crit: component
    conf: 0.8
    if:
      type: symbol
      kind: member
      exact: String.fromCharCode
  - id: encoded-https-charcode
    desc: HTTPS URL encoded as character codes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'fromCharCode\s*\(104,116,116,112,115,58,47,47,'
  - id: dom-script-src-bind-symbol
    desc: JavaScript assigns script src
    crit: component
    conf: 0.85
    if:
      type: symbol
      kind: member
      exact: elem.src
  - id: cloudfront-script-stage-url
    desc: CloudFront hosted script stage URL
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '//[a-z0-9-]{12,64}\.cloudfront\.net/[A-Za-z0-9._~!$&()*+,;=:@/?%-]{12,}'
  - id: createelement-fragment-teel
    desc: JavaScript createElement teEl fragment
    crit: component
    conf: 0.86
    if:
      type: string_literal
      exact: teEl
composite_rules:
  - id: encoded-remote-dom-script-loader
    desc: Encoded remote DOM script loader
    crit: hostile
    conf: 0.95
    all:
      - id: dom-createelement-symbol
      - id: string-fromcharcode-symbol
      - id: encoded-https-charcode
      - id: dom-script-src-bind-symbol
      - id: micro-behaviors/ui/window/manage/dom::browser-append-child
    attack: T1105
  - id: obfuscated-cloudfront-dom-script-loader
    desc: Obfuscated CloudFront DOM script loader
    crit: hostile
    conf: 0.96
    attack: T1105
    all:
      - id: cloudfront-script-stage-url
      - id: createelement-fragment-teel
      - id: micro-behaviors/process/create/load/remote-code::js-dom-script-literal
      - id: micro-behaviors/process/create/load/remote-code::js-dom-script-src-literal
      - id: micro-behaviors/process/create/load/remote-code::js-dom-appendchild-literal
      - id: micro-behaviors/crypto/symmetric/xor/loop::js-xor-charcode-assignment
