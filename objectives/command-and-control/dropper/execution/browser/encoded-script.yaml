defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: string-fromcharcode-symbol
    desc: JavaScript uses String.fromCharCode
    crit: component
    conf: 0.8
    if:
      type: symbol
      kind: member
      exact: String.fromCharCode
  - id: encoded-https-charcode
    desc: HTTPS URL encoded as character codes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'fromCharCode\s*\(104,116,116,112,115,58,47,47,'
  - id: dom-script-src-bind-symbol
    desc: JavaScript assigns script src
    crit: component
    conf: 0.85
    if:
      type: symbol
      kind: member
      exact: elem.src
  - id: dom-script-src-charcode-assign
    desc: JavaScript assigns encoded URL to script src
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\.src\s*=\s*String\.fromCharCode\s*\('
  - id: dom-head-charcode-target
    desc: Encoded document head string
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'fromCharCode\s*\(104,101,97,100\)'
  - id: createelement-fragment-teel
    desc: JavaScript createElement teEl fragment
    crit: component
    conf: 0.86
    if:
      type: string_literal
      exact: teEl
  - id: dom-script-text-body-assign
    desc: Assigns script-like text into a DOM element
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)createElement\s*\(\s*[''\"]script[''\"]\).{0,200}(textContent|innerHTML)\s*='
composite_rules:
  # Encoded stage URL built either as literal fromCharCode args or a XOR loop
  - id: encoded-stage-url-construction
    desc: Encoded URL reconstruction near DOM sink
    crit: suspicious
    conf: 0.9
    near_bytes: 2048
    unless:
      - id: well-known/lib/web-ui-vendors/
      - id: well-known/lib/pdfjs/
      - id: well-known/app/web-to-epub::wte-extension-context
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::twicc-vite-data-asset-path
    all:
      - id: dom-script-content-sink
      - id: micro-behaviors/ui/window/manage/dom::browser-create-element
    any:
      - id: encoded-https-charcode
      - id: micro-behaviors/data/encode/char-code::fromcharcode-xor-rebuild
  # Remote script body landed via src binding or a text/innerHTML assignment
  - id: dom-script-content-sink
    desc: DOM script content sink
    crit: component
    conf: 0.85
    any:
      - id: dom-script-src-bind-symbol
      - id: dom-script-src-charcode-assign
      - id: dom-script-text-body-assign
  - id: encoded-remote-dom-script-loader
    desc: Encoded remote DOM script loader
    crit: hostile
    conf: 0.95
    near_bytes: 1024
    all:
      - id: micro-behaviors/ui/window/manage/dom::browser-create-element
      - id: string-fromcharcode-symbol
      - id: encoded-stage-url-construction
      - id: dom-script-content-sink
      - id: micro-behaviors/ui/window/manage/dom::browser-append-child
    attack: T1105
    unless:
      - id: well-known/lib/web-ui-vendors/
      - id: metadata/build/bundler/
      - id: metadata/library/structure/
      - id: well-known/app/modrinth-extras/
      - id: well-known/app/web-to-epub::wte-extension-context
      - id: well-known/tool/sysadmin/alpine-packages::alpine-langfuse-package
      - id: well-known/tool/sysadmin/alpine-packages::alpine-langfuse-next-app-path
      - id: metadata/package/quality/false-positives::twicc-vite-data-asset-path
  - id: encoded-dom-head-script-injection
    desc: Encoded DOM head script injection
    crit: hostile
    conf: 0.94
    all:
      - id: string-fromcharcode-symbol
      - id: dom-script-src-charcode-assign
      - id: dom-head-charcode-target
      - id: micro-behaviors/ui/window/manage/dom::browser-append-child
    attack: T1105
    unless:
      - id: well-known/lib/web-ui-vendors/
      - id: metadata/build/bundler/
      - id: metadata/library/structure/
      - id: well-known/app/web-to-epub::wte-extension-context
  - id: obfuscated-cloudfront-dom-script-loader
    desc: Obfuscated CloudFront DOM script loader
    crit: hostile
    conf: 0.96
    attack: T1105
    all:
      - id: micro-behaviors/communications/http/client/cdn::cloudfront-asset-url
      - id: createelement-fragment-teel
      - id: micro-behaviors/process/create/load/remote-code::js-dom-script-literal
      - id: micro-behaviors/process/create/load/remote-code::js-dom-script-src-literal
      - id: micro-behaviors/process/create/load/remote-code::js-dom-appendchild-literal
      - id: micro-behaviors/crypto/symmetric/xor/loop::js-xor-charcode-assignment
