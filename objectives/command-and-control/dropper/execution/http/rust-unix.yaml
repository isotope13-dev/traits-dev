defaults:
  platforms: [unix]
  for: [rust, macho, elf]
  attack: T1105

traits:
  - id: rust-dropper-deploy-path
    desc: Rust dropper deploy path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /deploy/payload

  # `from_mode(0o755)` is a generic "make this file executable" call (self-
  # updaters, installers, build tooling all chmod +x downloaded artifacts).
  # Notable capability; the dropper intent is the composite below (deploy-path
  # + set-executable + nohup-spawn together).
  - id: rust-dropper-set-executable
    desc: Rust sets file mode executable (chmod 0o755)
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: from_mode(0o755)

  - id: rust-dropper-nohup-spawn
    desc: Rust dropper nohup spawn
    crit: notable
    conf: 0.94
    unless:
      - id: well-known/app/openai-codex/
    if:
      type: text
      substr: Command::new("nohup")

composite_rules:
  - id: rust-http-download-execute
    desc: Rust HTTP download execute
    crit: hostile
    conf: 0.98
    all:
      - id: rust-dropper-deploy-path
      - id: rust-dropper-set-executable
      - id: rust-dropper-nohup-spawn
