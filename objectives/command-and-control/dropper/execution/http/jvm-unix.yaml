defaults:
  platforms: [unix]
  for: [java, kotlin, shell, class, java_class, jar]
  attack: T1105

traits:
  - id: jvm-http-temp-update-path
    desc: JVM HTTP temp update path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 2F746D702F2E757064617465

  - id: jvm-http-temp-update-hex
    desc: JVM HTTP temp update hex
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar, zip]
    if:
      type: hex
      pattern: 32 46 37 34 36 44 37 30 32 46 32 45 37 35 37 30 36 34 36 31 37 34 36 35

  - id: jvm-fileoutput-process-hex
    desc: JVM ProcessBuilder bytecode
    crit: component
    conf: 0.92
    for: [class, java_class, jar, zip]
    if:
      type: hex
      pattern: 50 72 6F 63 65 73 73 42 75 69 6C 64 65 72

  - id: jvm-payload-path-hex
    desc: JVM payload path hex
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 7061796C6F6164

  - id: jvm-payload-path-hex-bytes
    desc: JVM payload path hex bytes
    crit: suspicious
    conf: 0.9
    for: [class, java_class, jar, zip]
    if:
      type: hex
      pattern: 37 30 36 31 37 39 36 43 36 46 36 31 36 34

composite_rules:
  - id: jvm-http-download-temp-exec
    desc: JVM HTTP temp download exec
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-http-temp-update-path
      - id: micro-behaviors/fs/write/file/direct::java-fileoutputstream-source
      - id: micro-behaviors/process/create/spawn::java-processbuilder-source
      - id: jvm-payload-path-hex

  - id: jvm-bytecode-download-temp-exec
    desc: JVM bytecode download exec
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: jvm-http-temp-update-hex
      - id: jvm-fileoutput-process-hex
      - id: jvm-payload-path-hex-bytes
