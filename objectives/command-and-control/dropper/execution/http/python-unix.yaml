defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1105

traits:
  - id: python-beacon-download-url
    desc: Python beacon payload URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/api/v1/beacon/\{AGENT_ID\}'

  - id: python-temp-exec-payload
    desc: Python temp exec payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'tempfile\.gettempdir\(\)[\s\S]{0,260}os\.chmod\(payload_path'

  - id: python-popen-detached-payload
    desc: Python detached payload exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'subprocess\.Popen\([\s\S]{0,220}start_new_session=True'

composite_rules:
  - id: python-http-dropper-exec
    desc: Python HTTP dropper exec
    crit: hostile
    conf: 0.98
    all:
      - id: python-beacon-download-url
      - id: python-temp-exec-payload
      - id: python-popen-detached-payload
