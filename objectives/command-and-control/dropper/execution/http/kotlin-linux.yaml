defaults:
  platforms: [unix]
  for: [kotlin, class, jar]
  attack: T1105

traits:
  - id: kotlin-firmware-payload-url
    desc: Kotlin firmware payload URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/firmware/microcode-update.bin

  - id: kotlin-firmware-cache-decode
    desc: Kotlin firmware cache decode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/tmp/\.fw-cache[\s\S]{0,180}base64 -d[\s\S]{0,180}chmod 700'

  - id: kotlin-payload-execute
    desc: Kotlin executes payload
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'executePayload[\s\S]{0,260}payload launched'

composite_rules:
  - id: kotlin-http-firmware-dropper
    desc: Kotlin HTTP firmware dropper
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-firmware-payload-url
    any:
      - id: kotlin-firmware-cache-decode
      - id: kotlin-payload-execute
