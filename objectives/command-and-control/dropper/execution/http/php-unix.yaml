defaults:
  platforms: [unix]
  for: [php]
  attack: T1105

traits:
  - id: php-http-payload-fetch-decode
    desc: PHP HTTP payload fetch decode
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/api/v2/payload[\s\S]{0,520}base64_decode'

  - id: php-health-module-exec
    desc: PHP health module exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'health-module\.so[\s\S]{0,260}proc_open'

composite_rules:
  - id: php-http-payload-dropper
    desc: PHP HTTP payload dropper
    crit: hostile
    conf: 0.98
    all:
      - id: php-http-payload-fetch-decode
      - id: php-health-module-exec
