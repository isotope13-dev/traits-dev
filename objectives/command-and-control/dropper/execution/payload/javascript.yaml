# JavaScript/Electron loaders that conceal and launch a second executable.
defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1027,T1059.007

traits:
  - id: fragmented-aes-cbc-decryptor
    desc: Fragmented AES-CBC payload decryptor
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: "(?i)aes-2[\\s\\S]{0,24}56-cb"

  - id: aes-cbc-mode-prefix
    desc: AES-CBC mode string fragment
    crit: component
    conf: 0.96
    if:
      type: text
      substr: aes-2

  - id: aes-cbc-mode-suffix
    desc: AES-CBC mode suffix fragment
    crit: component
    conf: 0.96
    if:
      type: text
      substr: 56-cb

  - id: payload-decrypt-function
    desc: JavaScript payload decryption function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: decryptPayload

  - id: payload-extraction-function
    desc: JavaScript payload extraction function
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: extractPayload

  - id: fragmented-executable-payload-name
    desc: Fragmented executable payload filename
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: "(?i)(outputFile|resourceName)[\\s\\S]{0,220}\\.exe"

composite_rules:
  - id: encrypted-executable-payload-extraction
    desc: AES-CBC encrypted executable payload extraction
    crit: hostile
    conf: 0.99
    mbc: B0032
    all:
      - id: aes-cbc-mode-prefix
      - id: aes-cbc-mode-suffix
      - id: payload-decrypt-function
      - id: payload-extraction-function
    scope: file
    unless:
      - id: metadata/package/testing/
