# JavaScript/Electron loaders that conceal and launch a second executable.
defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1027,T1059.007

traits:
  - id: payload-decrypt-function
    desc: JavaScript payload decryption function
    crit: suspicious
    conf: 0.94
    if:
      type: symbol
      kind: function
      exact: decryptPayload

  - id: payload-extraction-function
    desc: Payload extraction function name fragment
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: extractPayload

  - id: fragmented-executable-payload-name
    desc: Fragmented executable payload filename
    crit: notable
    conf: 0.92
    unless:
      - id: well-known/lib/nextjs/
    if:
      type: text
      regex: "(?i)(outputFile|resourceName)[\\s\\S]{0,220}\\.exe"

composite_rules:
  - id: encrypted-executable-payload-extraction
    desc: AES-CBC encrypted executable payload extraction
    crit: hostile
    conf: 0.99
    mbc: B0032
    all:
      - id: micro-behaviors/crypto/symmetric/aes/runtime-library::createDecipheriv
      - id: payload-decrypt-function
      - id: payload-extraction-function
      - id: fragmented-executable-payload-name
    scope: file
    unless:
      - id: metadata/package/testing/
