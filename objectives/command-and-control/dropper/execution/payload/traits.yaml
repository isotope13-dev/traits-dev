defaults:
  platforms: [windows, unix]
  crit: suspicious
  attack: T1059
  mbc: E1059
  for:
  - python
  - shell
traits:
- id: cp-execute
  desc: Shell copies a file then executes it
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: "(?m)(^|[;&\"'])\\s*cp\\s+[^\\n]{0,80}(&&|;)\\s*exec\\b"
  unless:
  - id: well-known/tool/sysadmin/nmap::nmap-source-tree
- id: gcc-compile-execute
  desc: GCC compile followed by payload execution
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    # A compiler flag such as `-bundle` is not execution. Require a shell
    # separator followed by a non-compiler command, which captures the
    # compile-then-run payload pattern without flagging build wrappers.
    regex: (?i)\bgcc\b[^;\n]{0,120}&&\s*(exec\s+)?[./][A-Za-z0-9_./-]+
  unless:
  - id: well-known/lib/wine::wine-source-tree
  - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
  - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
- id: compiler-payload-build-gcc
  desc: Compiler builds payload (gcc/g++)
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: \b(gcc|g\+\+)\b.{0,15}\.(c|cpp|o).{0,15}exec
- id: compiler-payload-build-clang
  desc: Compiler builds payload (clang/cc)
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: \b(clang|cc)\b.{0,15}\.(c|cpp|o).{0,15}exec
- id: preexec-function
  desc: 'preexec_fn=os.setpgrp process isolation'
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    substr: preexec_fn=os.setpgrp
- id: hidden-dir-before-exec
  desc: Hidden directory path before exec
  crit: component
  conf: 0.86
  if:
    type: string_literal
    regex: (?i)\.[\w-]{1,32}[\\/][^'"\n]{0,60}\bexec\b
- id: exec-before-hidden-dir
  desc: exec before hidden directory path
  crit: component
  conf: 0.86
  if:
    type: string_literal
    regex: (?i)\bexec\b[^'"\n]{0,60}[\\/]\.[\w-]{1,32}[\\/]
- id: detached-process-exec
  desc: Detached process execution
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    regex: DETACHED_PROCESS.{0,20}exec|exec.{0,20}DETACHED_PROCESS
- id: devnull-redirect
  desc: stdout/stderr to DEVNULL
  crit: component
  conf: 0.8
  if:
    type: string_literal
    regex: DEVNULL.{0,20}stdout|stdout=.{0,20}DEVNULL
composite_rules:
- id: hidden-dir-execution
  desc: Execute from hidden directory
  crit: suspicious
  conf: 0.9
  any:
  - id: hidden-dir-before-exec
  - id: exec-before-hidden-dir
  unless:
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: well-known/lib/scikit-learn
  - id: well-known/lib/psutil/
- id: compiler-execution
  desc: Compile and execute payload
  crit: suspicious
  conf: 0.9
  any:
  - id: gcc-compile-execute
  - id: compiler-payload-build-gcc
  - id: compiler-payload-build-clang
- id: stealth-execution
  desc: Stealth payload execution
  crit: suspicious
  conf: 0.95
  for:
  - python
  needs: 2
  any:
  - id: preexec-function
  - id: detached-process-exec
  - id: devnull-redirect
  - id: hidden-dir-execution

- id: macos-encoded-launchagent-payload-stager
  desc: Encoded macOS LaunchAgent payload stager
  crit: hostile
  conf: 0.99
  attack: T1027,T1105,T1059.002,T1543.004
  mbc: B0032,B0024
  platforms: [macos]
  for: [shell]
  all:
  - id: micro-behaviors/os/service/config::shell-launchagent-plist-write
  - id: micro-behaviors/process/create/script/osascript::osascript-exec
  - id: micro-behaviors/data/encode/payload::shell-base64-payload-literal
  - id: micro-behaviors/data/decode/base64::base64-d-cmd
  - id: objectives/anti-static/obfuscation/payload/encoded::decoded-http-url
