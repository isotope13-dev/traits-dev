defaults:
  platforms: [windows, unix]
  crit: suspicious
  attack: T1059
  mbc: E1059
  for:
  - python
  - shell
traits:
- id: cp-execute
  desc: cp command for execution
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: cp\s+-b|cp\s+.{0,15}\bexec(\s|$)
- id: gcc-compile-execute
  desc: gcc compile and execute
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    regex: gcc.{0,20}-b|gcc.{0,20}compile.{0,10}exec
- id: compiler-payload-build-gcc
  desc: Compiler builds payload (gcc/g++)
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: (gcc|g\+\+).{0,15}\.(c|cpp|o).{0,15}exec
- id: compiler-payload-build-clang
  desc: Compiler builds payload (clang/cc)
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: (clang|cc).{0,15}\.(c|cpp|o).{0,15}exec
- id: shell-execute-file
  desc: Shell executes file
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    regex: shell=True.{0,20}exec|exec.{0,20}shell=True
- id: preexec-function
  desc: preexec_fn=os.setpgrp process isolation (specific variant)
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    substr: preexec_fn=os.setpgrp
- id: hidden-dir-execution
  desc: Execute from hidden directory
  crit: suspicious
  conf: 0.9
  if:
    type: string_literal
    regex: (?i)(^|[\\/'"])\.[A-Za-z0-9_-]{1,32}[\\/][^'"\n]{0,80}\bexec|exec[^'"\n]{0,80}[\\/]\.[A-Za-z0-9_-]{1,32}[\\/]
  unless:
  - type: basename
    regex: \.map$
  - id: well-known/lib/scikit-learn::package
  - id: well-known/lib/psutil::python-package
- id: dot-prefix-execution
  desc: Dot-prefixed execution path
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: \..{0,10}[a-z]\.[a-z]{2,}exec|exec\..{0,10}[a-z]\.[a-z]{2,}
  unless:
  - type: basename
    regex: (?i)\.jsonl$
- id: detached-process-exec
  desc: Detached process execution
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    regex: DETACHED_PROCESS.{0,20}exec|exec.{0,20}DETACHED_PROCESS
- id: devnull-redirect
  desc: stdout/stderr to DEVNULL
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: DEVNULL.{0,20}stdout|stdout=.{0,20}DEVNULL
composite_rules:
- id: compiler-execution
  desc: Compile and execute payload
  crit: suspicious
  conf: 0.9
  any:
  - id: gcc-compile-execute
  - id: compiler-payload-build-gcc
  - id: compiler-payload-build-clang
- id: stealth-execution
  desc: Stealth payload execution
  crit: suspicious
  conf: 0.95
  for:
  - python
  needs: 2
  any:
  - id: preexec-function
  - id: detached-process-exec
  - id: devnull-redirect
  - id: hidden-dir-execution
