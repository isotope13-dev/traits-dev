defaults:
  platforms: [windows, unix]
  crit: suspicious
  attack: T1059
  mbc: E1059
  for:
  - python
  - shell
traits:
- id: cp-execute
  desc: Copy command adjacent to exec token
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: cp\s+.{0,15}\bexec(\s|$)
- id: gcc-compile-execute
  desc: gcc compile and execute
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    regex: gcc\s+.{0,20}-b|gcc\s+.{0,20}compile.{0,10}exec
  unless:
  - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
- id: compiler-payload-build-gcc
  desc: Compiler builds payload (gcc/g++)
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: (gcc|g\+\+).{0,15}\.(c|cpp|o).{0,15}exec
- id: compiler-payload-build-clang
  desc: Compiler builds payload (clang/cc)
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: (clang|cc).{0,15}\.(c|cpp|o).{0,15}exec
- id: shell-execute-file
  desc: Shell executes file
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    regex: shell=True.{0,20}exec|exec.{0,20}shell=True
- id: preexec-function
  desc: 'preexec_fn=os.setpgrp process isolation'
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    substr: preexec_fn=os.setpgrp
- id: hidden-dir-before-exec
  desc: Hidden directory path before exec
  crit: component
  conf: 0.86
  if:
    type: string_literal
    regex: (?i)\.[\w-]{1,32}[\\/][^'"\n]{0,60}\bexec
- id: exec-before-hidden-dir
  desc: exec before hidden directory path
  crit: component
  conf: 0.86
  if:
    type: string_literal
    regex: (?i)exec[^'"\n]{0,60}[\\/]\.[\w-]{1,32}[\\/]
- id: detached-process-exec
  desc: Detached process execution
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    regex: DETACHED_PROCESS.{0,20}exec|exec.{0,20}DETACHED_PROCESS
- id: devnull-redirect
  desc: stdout/stderr to DEVNULL
  crit: component
  conf: 0.8
  if:
    type: string_literal
    regex: DEVNULL.{0,20}stdout|stdout=.{0,20}DEVNULL
composite_rules:
- id: hidden-dir-execution
  desc: Execute from hidden directory
  crit: suspicious
  conf: 0.9
  any:
  - id: hidden-dir-before-exec
  - id: exec-before-hidden-dir
  unless:
  - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
  - id: well-known/lib/scikit-learn
  - id: well-known/lib/psutil/
- id: compiler-execution
  desc: Compile and execute payload
  crit: suspicious
  conf: 0.9
  any:
  - id: gcc-compile-execute
  - id: compiler-payload-build-gcc
  - id: compiler-payload-build-clang
- id: stealth-execution
  desc: Stealth payload execution
  crit: suspicious
  conf: 0.95
  for:
  - python
  needs: 2
  any:
  - id: preexec-function
  - id: detached-process-exec
  - id: devnull-redirect
  - id: hidden-dir-execution
