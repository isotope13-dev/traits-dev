defaults:
  platforms: [windows, unix]
  for: [java, class, java_class, jar]

traits:
  - id: jar-allatori-obfuscator-marker
    desc: JAR Allatori obfuscator marker
    crit: suspicious
    conf: 0.92
    for: [jar]
    if:
      type: text
      substr: Obfuscation by Allatori Obfuscator

  - id: java-stacktrace-string-decoder
    desc: Stacktrace-keyed Java string decoder
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'LinkageError.{0,80}StackTraceElement'

  - id: java-ii-obfuscated-class-name
    desc: Java I/i obfuscated class name
    crit: suspicious
    conf: 0.9
    for: [java_class, class]
    if:
      type: basename
      regex: '^[iI]{6,}\.class$'

composite_rules:
  - id: java-resource-scriptengine-loader
    desc: Java loads bundled script into ScriptEngine
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/embedded/payload/resource::java-getresourceasstream
      - id: micro-behaviors/process/interpreter/runtime/jvm::java-scriptengine-api
      - id: micro-behaviors/process/interpreter/runtime/jvm::java-scriptengine-eval-descriptor
      - id: micro-behaviors/process/interpreter/jscript::java-javascript-engine-name
    any:
      - id: micro-behaviors/data/compress/library::gzip-inputstream
      - id: micro-behaviors/crypto/library/provider::secretkeyspec
      - id: jar-allatori-obfuscator-marker
      - id: java-stacktrace-string-decoder

  - id: java-obfuscated-scriptengine-eval
    desc: Obfuscated Java ScriptEngine payload eval
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/interpreter/runtime/jvm::java-scriptengine-eval-api
      - id: java-ii-obfuscated-class-name

  - id: java-obfuscated-resource-loader
    desc: Obfuscated Java bundled resource loader
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/data/embedded/payload/resource::java-getresourceasstream
      - id: java-ii-obfuscated-class-name

  - id: java-obfuscated-js-engine-helper
    desc: Obfuscated JavaScript engine helper
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/process/interpreter/runtime/jvm::java-scriptengine-api
      - id: micro-behaviors/process/interpreter/runtime/jvm::java-scriptengine-getenginebyname
      - id: java-ii-obfuscated-class-name
