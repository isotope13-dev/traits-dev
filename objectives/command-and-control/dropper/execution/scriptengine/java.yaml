defaults:
  platforms: [windows, unix]
  for: [java, class, java_class, jar]

traits:
  - id: jar-allatori-obfuscator-marker
    desc: JAR Allatori obfuscator marker
    crit: suspicious
    conf: 0.92
    for: [jar]
    if:
      type: text
      substr: Obfuscation by Allatori Obfuscator

  - id: java-scriptengine-api
    desc: Java ScriptEngine API reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: javax/script/ScriptEngine

  - id: java-scriptengine-eval-api
    desc: Java ScriptEngine eval reference
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ScriptEngine.eval

  - id: java-scriptengine-eval-descriptor
    desc: Java ScriptEngine eval descriptor
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'eval:(Ljava/'

  - id: java-javascript-engine-name
    desc: JavaScript engine name in bytecode
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: JavaScript

  - id: java-scriptengine-getenginebyname
    desc: Java ScriptEngineManager getEngineByName use
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: getEngineByName

  - id: java-stacktrace-string-decoder
    desc: Stacktrace-keyed Java string decoder
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'LinkageError.{0,80}StackTraceElement'

  - id: java-ii-obfuscated-class-name
    desc: Java I/i obfuscated class name
    crit: suspicious
    conf: 0.9
    for: [java_class, class]
    if:
      type: basename
      regex: '^[iI]{6,}\.class$'

composite_rules:
  - id: java-resource-stream-load
    desc: Java loads bundled resource stream
    crit: notable
    conf: 0.9
    any:
      - id: objectives/anti-static/obfuscation/reflection/class::java-getresourceasstream
      - id: objectives/command-and-control/backdoor/loader/classloader::getresourceasstream-string

  - id: java-resource-scriptengine-loader
    desc: Java loads bundled script into ScriptEngine
    crit: hostile
    conf: 0.98
    all:
      - id: java-resource-stream-load
      - id: java-scriptengine-api
      - id: java-scriptengine-eval-descriptor
      - id: java-javascript-engine-name
    any:
      - id: micro-behaviors/data/compress/library::gzip-inputstream
      - id: micro-behaviors/crypto/library/provider::secretkeyspec
      - id: jar-allatori-obfuscator-marker
      - id: java-stacktrace-string-decoder

  - id: java-obfuscated-scriptengine-eval
    desc: Obfuscated Java ScriptEngine payload eval
    crit: hostile
    conf: 0.97
    all:
      - id: java-scriptengine-eval-api
      - id: java-ii-obfuscated-class-name

  - id: java-obfuscated-resource-loader
    desc: Obfuscated Java bundled resource loader
    crit: hostile
    conf: 0.96
    all:
      - id: java-resource-stream-load
      - id: java-ii-obfuscated-class-name

  - id: java-obfuscated-js-engine-helper
    desc: Obfuscated JavaScript engine helper
    crit: hostile
    conf: 0.96
    all:
      - id: java-scriptengine-api
      - id: java-scriptengine-getenginebyname
      - id: java-ii-obfuscated-class-name
