defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1059.007
  mbc: B0024
traits:
- id: spawnSync-call-dup
  desc: spawnSync child process API call
  # Duplicate of micro-behaviors/process/create/spawn (the canonical capability,
  # which fires independently). Only meaningful here as a leg of process-exec.
  crit: component
  conf: 0.6
  unless:
  - id: metadata/package/testing/
  - id: metadata/library/structure::vscode-vendor-output-path
  - id: metadata/library/structure::vscode-vendor-output-path
  - id: metadata/library/structure::vscode-extension-generated-asset
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - type: text
    exact: "Publishing version:"
  if:
    type: text
    regex: \.spawnSync\s*\(
- id: spawn-call-dup
  desc: spawn function call
  # Duplicate of micro-behaviors/process/create/spawn (the canonical capability,
  # which fires independently). Only meaningful here as a leg of process-exec.
  crit: component
  conf: 0.6
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - type: text
    exact: "Publishing version:"
  if:
    type: text
    regex: \.spawn\s*\(
- id: call-arg-node-string
  desc: Call with node string arg
  crit: component
  conf: 0.85
  if:
    type: symbol
    kind: call
    substr: node
    arg:
      kind: string
      exact: node
- id: unlink-call
  desc: Repeated Node unlink calls
  crit: component
  conf: 0.6
  count_min: 2
  unless:
  - id: well-known/app/tabby::tabby-builtin-plugin-path
  - type: basename
    regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]test[\\/]
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/manifest::test-fixtures
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/presence/harness/
  - id: metadata/library/structure::js-large-module-bundle
  if:
    type: text
    regex: \.unlink\s*\(
  not:
  - substr: options.unlink(p, er =>
  - substr: fs.unlink(fdPath[1], _handler)
- id: temp-js-file
  desc: Temporary JavaScript file path literal
  crit: component
  conf: 0.75
  if:
    type: string_literal
    regex: '(\./tmp[^/]{0,120}|/tmp/[^/]{0,120})\.js\b'
- id: random-temp-filename
  desc: Random/unusual temp filename
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: tmppppp|temp[0-9a-f]{8}|rand[0-9]+\.js
# IIFE code-shape atoms live under micro-behaviors/data/control-flow/module-exec
# because they are neutral, universal JavaScript structures.
- id: buffer-base64-string-decoder
  desc: Buffer base64 string decoder
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: Buffer\s*\[[^\]]{0,80}\]\s*\([^)]{0,80},\s*[A-Za-z_$][\w$]*\s*\)\s*\[[^\]]{0,80}\]\s*\(
  unless:
  - id: metadata/package/testing/
  - id: metadata/library/structure::vscode-vendor-output-path
- id: xor-array-string-decoder
  desc: XOR hex-array string constants
  crit: suspicious
  conf: 0.92
  count_min: 4
  if:
    type: text
    substr: (\b(const|let|var)\s+|,)\s*[A-Za-z_$][\w$]*\s*=\s*\[(0x[0-
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/quality/false-positives::benign-build-tooling-context
- id: detached-stdio-obfuscated-options
  desc: Detached stdio process options
  crit: suspicious
  conf: 0.9
  unless:
  - id: metadata/package/files/ecosystem::openclaw-evolver-package-member
  if:
    type: text
    regex: "detached['\"]?\\s*:\\s*!!\\[\\][\\s\\S]{0,180}stdio['\"]?\\s*:"
- id: bom-temp-write
  desc: BOM temp script write
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "\\[[^\\]]{1,80}\\]\\s*\\([^,]{1,160},\\s*['\"]\\\\uFEFF['\"]\\s*\\+"
- id: timeout-bracket-delete
  desc: setTimeout bracketed call
  crit: component
  conf: 0.82
  if:
    type: text
    regex: "setTimeout[\\s\\S]{0,500}\\[[^\\]]{1,80}\\]\\s*\\("
  unless:
  - id: metadata/library/structure/
  - id: metadata/library/jquery/
  - id: metadata/file/extension/identity::type-stub-or-map-basename
  - type: path
    regex: '(^|[\\/])bootstrap(\.min)?\.js$'
- id: dynamic-new-archive
  desc: JavaScript archive constructor call
  crit: component
  conf: 0.78
  if:
    type: text
    regex: "new\\s+(AdmZip|JSZip|ZipArchive|ZipFile)\\s*\\("
- id: auto-retry-helper
  desc: Auto-retry helper self-spawn
  crit: notable
  conf: 0.9
  if:
    type: text
    substr: function buildAutoRetryScript
composite_rules:
- id: obfuscated-detached-network-stage
  desc: Obfuscated Node code detaches a hidden runtime stage
  crit: hostile
  conf: 0.98
  attack: T1027,T1059.007,T1564.003
  all:
  - id: detached-stdio-obfuscated-options
  - id: micro-behaviors/process/create/spawn::windowshide-obfuscated-true
  - id: objectives/anti-static/obfuscation/string/dynamic::arithmetic-decoder-wrapper-call
  - id: micro-behaviors/data/source/dynamic/load::node-computed-require-call
  unless:
  - id: metadata/package/testing/

- id: wallet-targeted-obfuscated-process-dropper
  desc: Obfuscated JavaScript targets wallets and exits via process control
  crit: hostile
  conf: 0.98
  attack: "T1027,T1059.007,T1555.003"
  mbc: B0028
  all:
  - id: objectives/credential-access/wallet/extension::multi-wallet-targeting
  - id: micro-behaviors/process/exit/terminate::process-exit
  - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling-with-string-table-rotation
  # Do not suppress on weak @metamask package-scope substrings that stealers
  # also decode; only skip genuine extension packaging markers.
  unless:
  - id: well-known/app/browser-extension-known::metamask-crx-member
  - id: well-known/app/browser-extension-known::metamask-official-manifest
  - id: well-known/app/browser-extension-known::metamask-lavamoat-webpack
  - id: well-known/app/browser-extension-known::lastpass-crx-member
- id: process-exec
  desc: Process execution (spawn/spawnSync)
  crit: notable
  conf: 0.7
  any:
  - id: objectives/command-and-control/dropper/execution/network-stage::spawnSync-call-dup
  - id: objectives/command-and-control/dropper/execution/network-stage::spawn-call-dup
  - id: spawn-node
  - id: micro-behaviors/process/create/system::js-execfile-call
- id: spawn-node
  desc: Spawn node inline or temp stage
  crit: notable
  conf: 0.88
  near_bytes: 256
  all:
  - id: micro-behaviors/process/create/shell/bridge::spawn-call
  - id: call-arg-node-string
  any:
  - id: micro-behaviors/process/create/spawn::spawn-node-eval
  - id: micro-behaviors/process/create/spawn::spawn-node-eval-var
  - id: temp-js-file
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/manifest::test-fixtures
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/presence/harness/
  - id: metadata/library/structure::js-large-module-bundle
- id: detached-process-comp
  desc: Detached process spawn
  crit: notable
  conf: 0.8
  any:
  - id: micro-behaviors/process/create/spawn::detached-true
  - id: micro-behaviors/process/create/flags::detached-process
- id: date-temp-write-delete
  desc: Dated temp write-delete
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/data/source/property/computed::js-computed-date-method-call
  - id: bom-temp-write
  - id: timeout-bracket-delete
- id: admzip-extract-spawn-exit
  desc: AdmZip extract-spawn-exit
  crit: suspicious
  conf: 0.92
  all:
  - id: dynamic-new-archive
  - id: objectives/anti-static/obfuscation/syntax::obfuscated-true-call-argument
  - id: micro-behaviors/process/exit/terminate::process-exit
  - id: micro-behaviors/data/archive/library::adm-zip-lib
- id: temp-js
  desc: Temporary JavaScript file
  crit: suspicious
  conf: 0.8
  all:
  - id: temp-js-file
  any:
  - id: random-temp-filename
  - id: process-exec
  unless:
  - id: well-known/app/neurolink::benign-archive-context
- id: fetch-write-exec
  desc: Fetch and write then execute
  crit: suspicious
  conf: 0.9
  near_bytes: 4096
  all:
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: micro-behaviors/fs/write/file/direct::js-file-write
  - id: process-exec
  downgrade:
    any:
    - id: micro-behaviors/process/interpreter/vm/
    - id: micro-behaviors/os/service/legitimate::npm-native-binary-wrapper-postinstall
  unless:
  - id: auto-retry-helper
  - id: metadata/library/nodeunit/
  - id: well-known/app/pulumi::pulumi-source-tree
- id: fetch-write-exec-delete
  desc: Fetch, write, execute, delete
  crit: notable
  conf: 0.92
  near_bytes: 8192
  all:
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: micro-behaviors/fs/write/file/direct::js-file-write
  - id: process-exec
  - id: micro-behaviors/fs/file/delete/
- id: windows-system-directory-fetch-write-exec
  desc: Fetches an executable, writes it under Windows System32, and executes it
  crit: hostile
  conf: 0.99
  attack: "T1105,T1059.007"
  near_bytes: 1024
  all:
  - id: fetch-write-exec
  - id: micro-behaviors/fs/path/system::javascript-windows-system32
  - id: micro-behaviors/communications/http/download/url::executable-url-reference-a
- id: obfuscated-node-hidden-stage-exec
