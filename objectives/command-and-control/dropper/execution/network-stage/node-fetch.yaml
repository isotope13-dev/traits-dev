defaults:
  platforms:
  - unix
  - windows
  for:
  - javascript
  - typescript
  attack: T1059.007
  mbc: B0024
traits:
- id: fetch-then-json
  desc: fetch().then JSON parse
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: fetch\(.{0,50}\.then\(.{0,50}\.json\(
- id: spawnSync-call-dup
  desc: spawnSync child process API call
  crit: notable
  conf: 0.6
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - type: text
    exact: "Publishing version:"
  if:
    type: text
    regex: \.spawnSync\s*\(
- id: spawn-call-dup
  desc: spawn function call
  crit: notable
  conf: 0.6
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - type: text
    exact: "Publishing version:"
  if:
    type: text
    regex: \.spawn\s*\(
- id: spawn-node
  desc: spawn node interpreter
  crit: suspicious
  conf: 0.7
  unless:
  - type: basename
    regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]test[\\/]
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/manifest::test-fixtures
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/library/structure::js-large-module-bundle
  if:
    type: text
    regex: spawn(Sync)?\s*\(['"]node['"]
- id: unlink-call
  desc: Node deletes file after execution
  crit: suspicious
  conf: 0.6
  count_min: 2
  unless:
  - type: basename
    regex: (^|[\\/])builtin-plugins[\\/]tabby-[^\\/]+[\\/]
  - type: basename
    regex: (^|[\\/])node_modules[\\/].{0,200}[\\/]test[\\/]
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/manifest::test-fixtures
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/library/structure::js-large-module-bundle
  if:
    type: text
    regex: \.unlink\s*\(
  not:
  - substr: options.unlink(p, er =>
  - substr: fs.unlink(fdPath[1], _handler)
- id: temp-js-file
  desc: Temporary .js file path
  crit: component
  conf: 0.75
  if:
    type: string_literal
    regex: \./tmp[^/]{0,120}\.js|/tmp/[^/]{0,120}\.js
- id: random-temp-filename
  desc: Random/unusual temp filename
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    regex: tmppppp|temp[0-9a-f]{8}|rand[0-9]+\.js
- id: iife-start
  desc: IIFE pattern start
  crit: component
  conf: 0.5
  if:
    type: string_literal
    regex: ^\(function\s*\(|^\(async\s+function
- id: iife-arrow
  desc: Arrow function IIFE syntax pattern
  crit: notable
  conf: 0.5
  if:
    type: string_literal
    regex: ^\(\(\)\s*=>|^\(async\s*\(\)\s*=>
  unless:
  - type: text
    substr: '"version":3,"file":'
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/tooling::webpack-bundled
  - id: metadata/package/tooling::esbuild-bundled
  - id: metadata/package/tooling::rollup-bundled
- id: obfuscated-require-decoder-calls
  desc: Obfuscated require decoder calls
  crit: suspicious
  conf: 0.92
  count_min: 4
  if:
    type: text
    regex: \brequire\s*\(\s*[A-Za-z_$][\w$]*\s*\(
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/manifest::test-fixtures
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/tooling::webpack-bundled
  - id: metadata/package/tooling::esbuild-bundled
  - id: metadata/package/tooling::rollup-bundled
- id: buffer-base64-string-decoder
  desc: Buffer base64 string decoder
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: Buffer\s*\[[^\]]{0,80}\]\s*\([^)]{0,80},\s*[A-Za-z_$][\w$]*\s*\)\s*\[[^\]]{0,80}\]\s*\(
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
- id: xor-array-string-decoder
  desc: XOR hex-array string constants
  crit: suspicious
  conf: 0.92
  count_min: 4
  if:
    type: text
    substr: (\b(const|let|var)\s+|,)\s*[A-Za-z_$][\w$]*\s*=\s*\[(0x[0-
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/tooling::webpack-bundled
- id: hidden-windows-exec-options
  desc: Hidden Windows process options
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: windowsHide['"]?\s*:\s*!!\[\]
- id: detached-stdio-obfuscated-options
  desc: Detached stdio process options
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "detached['\"]?\\s*:\\s*!!\\[\\][\\s\\S]{0,180}stdio['\"]?\\s*:"
composite_rules:
- id: file-write-comp
  desc: File write operation
  crit: notable
  conf: 0.7
  any:
  - id: micro-behaviors/fs/write/file/direct::write-file-sync
  - id: micro-behaviors/fs/write/file/direct::write-file-async
- id: file-delete
  desc: File delete operation
  crit: notable
  conf: 0.7
  any:
  - id: micro-behaviors/fs/file/delete::fs-unlinkSync
  - id: unlink-call
- id: process-exec
  desc: Process execution (spawn/spawnSync)
  crit: suspicious
  conf: 0.7
  any:
  - id: objectives/command-and-control/dropper/execution/network-stage::spawnSync-call-dup
  - id: objectives/command-and-control/dropper/execution/network-stage::spawn-call-dup
  - id: spawn-node
- id: detached-process-comp
  desc: Detached process spawn
  crit: suspicious
  conf: 0.8
  any:
  - id: micro-behaviors/process/create/spawn::detached-true
  - id: micro-behaviors/process/create/flags::detached-process
- id: temp-js
  desc: Temporary JavaScript file
  crit: suspicious
  conf: 0.8
  all:
  - id: temp-js-file
  any:
  - id: random-temp-filename
  - id: process-exec
- id: iife-pattern
  desc: Immediately invoked function
  crit: suspicious
  conf: 0.6
  any:
  - id: iife-start
  - id: iife-arrow
- id: fetch-write-exec
  desc: Fetch and write then execute
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/communications/http/request/client::fetch-string
  - id: file-write-comp
  - id: process-exec
  downgrade:
    any:
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
- id: write-exec-delete
  desc: Write file, execute, delete
  crit: suspicious
  conf: 0.92
  all:
  - id: file-write-comp
  - id: process-exec
  - id: file-delete
  unless:
  - id: metadata/package/testing/harness/runtime::node-common-require
  downgrade:
    any:
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
- id: obfuscated-node-hidden-stage-exec
  desc: Obfuscated Node hidden stage execution
  crit: hostile
  conf: 0.98
  all:
  - id: obfuscated-require-decoder-calls
  - id: hidden-windows-exec-options
  any:
  - id: detached-stdio-obfuscated-options
  - id: micro-behaviors/process/create/spawn::windowshide-obfuscated-true
  - id: micro-behaviors/process/create/spawn::detached-true
- id: obfuscated-node-staged-loader
  desc: Obfuscated Node staged payload loader
  crit: hostile
  conf: 0.98
  attack: T1105
  all:
  - id: obfuscated-require-decoder-calls
  - id: buffer-base64-string-decoder
  - id: xor-array-string-decoder
  any:
  - id: hidden-windows-exec-options
  - id: detached-stdio-obfuscated-options
  - id: micro-behaviors/process/create/spawn::windowshide-obfuscated-true
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
