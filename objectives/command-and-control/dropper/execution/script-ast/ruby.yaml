# Ruby AST-based behavioral detection patterns
# Uses AST patterns to detect suspicious Ruby code structures
# ATT&CK: T1059 (Command Execution), T1071 (Application Layer Protocol)
defaults:
  for: [ruby]
  platforms: [unix, windows]
traits:
  # === HTTP Download in Method ===
  - id: ruby-ast-http-in-method
    desc: HTTP request inside method
    crit: suspicious
    conf: 0.88
    attack: "T1071"
    if:
      type: symbol
      kind: call
      exact: "Net::HTTP.get_response"
  # === File Write with Binary Mode ===
  - id: ruby-ast-file-binmode-write
    desc: File binmode followed by write
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      kind: call
      exact: ".binmode"
  # === File Chmod 777 ===
  - id: ruby-ast-chmod-777
    desc: File permission change to 777
    crit: suspicious
    conf: 0.90
    attack: "T1222"
    if:
      type: symbol
      kind: call
      exact: ".chmod(0777)"
  # === Base64 Decode in DNS Resolution ===
  - id: ruby-ast-base64-dns
    desc: Base64 decode before DNS lookup
    crit: suspicious
    conf: 0.92
    attack: "T1027"
    if:
      type: symbol
      kind: call
      exact: "Base64.decode64"
  # === System Execution in Method ===
  - id: ruby-ast-system-in-method
    desc: System command execution in method
    crit: suspicious
    conf: 0.88
    attack: "T1059"
    if:
      type: symbol
      kind: call
      exact: "system("
  # === Exec Execution ===
  - id: ruby-ast-exec-in-method
    desc: Exec command execution
    crit: suspicious
    conf: 0.88
    attack: "T1059"
    if:
      type: symbol
      kind: call
      exact: "exec("
  # === File Open Binary Write ===
  # `ruby-ast-file-open-wb` was removed: its `kind: member` fact carried only
  # the receiver-qualified call `File.open` (not the mode argument), so despite
  # the "binary write mode" label it matched every File.open and surfaced
  # standalone as an FP. It had no composite consumers, and binary-write is
  # already covered precisely by `ruby-ast-file-binmode-write` (`.binmode`)
  # and the `micro-behaviors/fs/write/file/direct::ruby-file-open-write-binary`
  # micro-behavior.
  # === File Rename ===
  - id: ruby-ast-file-rename
    desc: File rename operation
    crit: component
    conf: 0.95
    if:
      # Identical to the canonical `File.rename` member-chain atom; delegate to
      # it rather than duplicating the matcher. Keeps this id stable for the
      # rename-exec / rubygems-anomaly composites that reference it.
      id: micro-behaviors/fs/file/rename::ruby-rename
  # === File Rename Image to Exe ===
  - id: ruby-ast-rename-img-to-exe
    desc: Rename image file to executable
    crit: suspicious
    conf: 0.95
    # `File.rename("*.png", "*.exe")` — disguising a payload by renaming an
    # image to an executable. Matched on the cached call fact with a multi-arg
    # filter: one string arg with an image extension AND a distinct string arg
    # with an executable extension (each ≤4 alternatives, alt-chain limit; the
    # common disguise extensions, narrower than the former 8-img/7-exe query).
    if:
      type: symbol
      kind: call
      exact: rename
      args:
        - {kind: string, regex: '\.(png|jpe?g|gif|bmp)$'}
        - {kind: string, regex: '\.(exe|com|bat|cmd)$'}
  # === File Rename to Executable ===
  - id: ruby-ast-rename-to-exe
    desc: Rename file to executable extension
    crit: suspicious
    conf: 0.90
    # A `rename(..., "*.exe")` call — matched on the cached call fact plus an
    # arg-value filter on the destination string. The `.exe` destination is the
    # dominant signal; renaming any file to an executable extension is the tell.
    if:
      type: symbol
      kind: call
      exact: rename
      arg:
        kind: string
        regex: '\.exe[''"]?$'
  # === Windows OS Check (Regex) ===
  - id: ruby-ast-check-windows-regex
    desc: "Win OS detection via RbConfig host_os tokens"
    # Building block: meaningful only inside the dropper composites that
    # require it alongside rename-to-exe / exec (e.g. `ruby-windows-dropper`,
    # `extconf-os-check-exec`). Component so it never surfaces standalone.
    crit: component
    conf: 0.85
    if:
      # The earlier lenient migration matched `kind: call, exact: 'match'`,
      # i.e. ANY `.match` call in any Ruby file. The real signal is a host_os
      # platform check — the canonical RbConfig::CONFIG['host_os'] values that
      # Ruby uses to detect Windows. Match those distinctive tokens directly.
      type: text
      regex: '\b(mswin|mingw|cygwin|bccwin)\b'
  # `ruby-ast-url-concatenation` was removed: its lenient `type: text`
  # regex `https?:` matched every ordinary URL (firing standalone-suspicious
  # on any gem with an `https://...` string), and it had no composite
  # consumers. The truncated-scheme signal it was meant to capture is now
  # the canonical `objectives/anti-static/obfuscation/string/concat::ruby-ast-suspicious-url-scheme`
  # (consolidated there as a string-obfuscation literal).
  # === Fragmented URL Fetch ===
  - id: ruby-ast-fragmented-url-fetch
    desc: Net::HTTP client fetch call
    # Building block for `extconf-fragmented-download` (requires it alongside
    # an extconf.rb build file). Component so it never surfaces standalone.
    crit: component
    conf: 0.85
    if:
      # The earlier lenient migration matched bare `kind: call` names
      # `get|post|request`, i.e. ANY method so named (`hash.get`, `params.get`,
      # a `request` accessor, ...). Call facts are receiver-qualified, so anchor
      # to the canonical Ruby HTTP client `Net::HTTP.<call>` to keep this a real
      # network fetch (other clients/open-uri are covered by their own atoms).
      type: symbol
      kind: call
      regex: '^Net::HTTP\.'
