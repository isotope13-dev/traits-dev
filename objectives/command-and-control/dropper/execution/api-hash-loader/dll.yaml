# Small, hand-rolled DLLs that hide their imports by walking the PEB and
# matching exported function names against hardcoded hashes at runtime.
# This is the PlugX/Korplug sideload loader shape: tiny file, one or zero
# declared imports, a handful of exports, and unmistakable PEB+hash constants
# in .text.
defaults:
  platforms: [windows]
  for: [pe, dll]
  # These rules establish runtime API resolution.  DLL side-loading is a
  # separate delivery mechanism and is only annotated on the dedicated rule.
  attack: T1027.007
composite_rules:
  # === HELPER (component): minimal-import small DLL with PEB/hash machinery ===
  - id: api-hash-micro-dll-core
    desc: Tiny DLL with PEB and hash-based resolution
    crit: component
    conf: 0.88
    size_max: 65536
    all:
      - id: objectives/anti-static/obfuscation/imports::pe-export-walk-primitive
    any:
      - id: metadata/binary/metrics/structural::no-imports
      - id: metadata/binary/symbols/imports::single-import-raw
      - id: metadata/binary/symbols/imports::few-import-count

  # === SUSPICIOUS: tiny DLL walks PEB + carries a hash seed ===
  # PEB access alone could be CRT boilerplate; combined with a hash-algorithm
  # constant (DJB2/ROR/FNV) in a tiny DLL it is a manual-resolver signature.
  - id: api-hash-sideload-dll
    desc: Tiny DLL with manual API-hash resolution
    crit: suspicious
    conf: 0.9
    size_max: 65536
    all:
      - id: api-hash-micro-dll-core
      - id: objectives/anti-static/obfuscation/imports::api-hash-family-any

  # === HOSTILE: all loader signals present — PlugX/Korplug sideload shape ===
  # Tiny DLL + PEB walk + hash seed + sparse strings/functions.  The sparse
  # footprint is the tell that the apparent "empty" code is a loader with the
  # real logic pulled in after resolution.
  - id: plugx-style-sideload-loader-dll
    desc: PlugX-style sideload loader DLL
    crit: hostile
    conf: 0.95
    attack: T1574.002
    size_max: 65536
    all:
      - id: api-hash-sideload-dll
    any:
      - id: objectives/anti-static/obfuscation/payload/string-sparse::low-string-count-vb6
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
  - id: djb2-native-file-backed-callback-loader
    desc: DJB2 native file-read/protection wait loader
    crit: hostile
    conf: 0.98
    attack: T1027.007,T1620
    size_max: 65536
    all:
      - id: micro-behaviors/os/api-resolution/hash-based::pe-export-directory-walk-x86
      - id: micro-behaviors/os/api-resolution/hash-based::peb-ldr-list-access-x86
      - id: objectives/anti-static/obfuscation/native-api-hash::djb2-native-ntdll-hash-profile
      - id: objectives/anti-static/obfuscation/native-api-hash::ntcreatefile-djb2-hash
      - id: objectives/anti-static/obfuscation/native-api-hash::ntqueryinformationfile-djb2-hash
      - id: objectives/anti-static/obfuscation/native-api-hash::ntreadfile-djb2-hash
      - id: objectives/anti-static/obfuscation/native-api-hash::ntclose-djb2-hash
      - id: objectives/anti-static/obfuscation/native-api-hash::ntprotectvirtualmemory-djb2-hash
      - id: objectives/anti-static/obfuscation/native-api-hash::rtlregisterwait-djb2-hash
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
