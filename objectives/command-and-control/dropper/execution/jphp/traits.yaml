defaults:
  platforms: [windows]
  for: [pe, data, php, xml]

traits:
  - id: jphp-launch4j-fxlauncher
    desc: Launch4j JPHP JavaFX launcher
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: org.develnext.jphp.ext.javafx.FXLauncher

  - id: jphp-bootstrap-config
    desc: JPHP bootstrap configuration
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: JPHP-INF/.bootstrap

  - id: jphp-timer-action-handler
    desc: JPHP timer action handler
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '@event timer.action'

  - id: jphp-timerscript-component
    desc: JPHP TimerScript component
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'script\\TimerScript'

  - id: jphp-autostart-timer-property
    desc: JPHP auto-start timer property
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: autoStart

  - id: jphp-http-zip-url
    desc: JPHP hardcoded HTTP ZIP URL
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'https?://[^\x00\s''"]{1,180}\.zip'

  - id: jphp-process-class
    desc: JPHP process execution class
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: 'php\\lang\\Process'

  - id: jphp-process-start-and-wait
    desc: JPHP blocking process launch
    crit: component
    conf: 0.9
    if:
      type: text
      substr: startAndWait

  - id: jphp-stream-api
    desc: JPHP stream API usage
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: 'php\\io\\Stream'

  - id: jphp-stream-getcontents
    desc: JPHP stream getContents call
    crit: component
    conf: 0.9
    if:
      type: text
      substr: getContents

  - id: jphp-stream-putcontents
    desc: JPHP stream putContents call
    crit: component
    conf: 0.9
    if:
      type: text
      substr: putContents

  - id: jphp-zipfile-class
    desc: JPHP ZipFile archive API
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: 'php\\compress\\ZipFile'

  - id: jphp-unpack-call
    desc: JPHP archive unpack call
    crit: component
    conf: 0.88
    for: [data, php, xml]
    if:
      type: text
      substr: unpack

  - id: jphp-extracted-exe-path
    desc: JPHP path to extracted Windows executable
    crit: component
    conf: 0.91
    if:
      type: text
      regex: '/[A-Za-z0-9._-]{2,80}/[A-Za-z0-9._-]{2,80}\.exe'

  - id: jphp-base64-decode
    desc: JPHP base64 decode call
    crit: component
    conf: 0.9
    if:
      type: text
      substr: base64_decode

  - id: jphp-file-put-contents
    desc: JPHP file write call
    crit: component
    conf: 0.9
    if:
      type: text
      substr: file_put_contents

  - id: jphp-robot-script-component
    desc: JPHP RobotScript component
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'script\\RobotScript'

  - id: jphp-macro-script-component
    desc: JPHP MacroScript component
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'script\\MacroScript'

  - id: jphp-tiny-main-form
    desc: JPHP tiny main form
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'prefHeight="5"'

  - id: jphp-tiny-main-form-width
    desc: JPHP tiny main form width
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: 'prefWidth="5"'

  - id: jphp-hidden-control-opacity
    desc: JPHP hidden form controls
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: 'opacity="0"'

composite_rules:
  - id: jphp-powershell-defender-exclusion
    desc: JPHP PowerShell Defender exclusion
    crit: suspicious
    conf: 0.97
    all:
      - id: objectives/evasion/anti-av/platform/defender::defender-exclusion-cmdlet-raw
    any:
      - id: jphp-launch4j-fxlauncher
      - id: jphp-bootstrap-config
      - id: jphp-process-class
      - id: jphp-file-put-contents

  - id: jphp-autostart-zip-downloader
    desc: JPHP auto-start timer downloads ZIP payload
    crit: hostile
    conf: 0.97
    all:
      - id: jphp-timer-action-handler
      - id: jphp-autostart-timer-property
      - id: jphp-http-zip-url

  - id: jphp-stream-zip-stager
    desc: JPHP downloads and writes ZIP content through stream APIs
    crit: hostile
    conf: 0.96
    all:
      - id: jphp-stream-api
      - id: jphp-stream-getcontents
      - id: jphp-stream-putcontents
      - id: jphp-http-zip-url

  - id: jphp-download-unpack-execute
    desc: JPHP downloads ZIP, unpacks it, and references extracted EXE
    crit: hostile
    conf: 0.98
    all:
      - id: jphp-http-zip-url
      - id: jphp-zipfile-class
      - id: jphp-unpack-call
      - id: jphp-extracted-exe-path

  - id: jphp-powershell-defender-exclusion-runner
    desc: JPHP writes and runs a PowerShell Defender exclusion script
    crit: hostile
    conf: 0.98
    all:
      - id: jphp-base64-decode
      - id: jphp-file-put-contents
      - id: jphp-process-class
      - id: jphp-process-start-and-wait
      - id: jphp-powershell-defender-exclusion

  - id: jphp-hidden-process-downloader
    desc: Hidden JPHP form stages ZIP and launches process
    crit: hostile
    conf: 0.97
    all:
      - id: jphp-process-class
      - id: jphp-http-zip-url
      - id: jphp-tiny-main-form
      - id: jphp-tiny-main-form-width

  - id: jphp-robot-macro-runner
    desc: JPHP Robot and macro runner in hidden app
    crit: hostile
    conf: 0.96
    all:
      - id: jphp-robot-script-component
      - id: jphp-macro-script-component
      - id: jphp-tiny-main-form
      - id: jphp-hidden-control-opacity

  - id: jphp-admin-autostart-process-stager
    desc: Admin JPHP auto-start process stager
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: jphp-autostart-timer-property
      - id: jphp-process-class
      - id: jphp-launch4j-fxlauncher

  - id: jphp-admin-hidden-launcher
    desc: Admin JPHP hidden Launch4j application
    crit: hostile
    conf: 0.97
    scope: outer
    all:
      - id: jphp-launch4j-fxlauncher
      - id: jphp-bootstrap-config
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: jphp-tiny-main-form
      - id: jphp-hidden-control-opacity

  - id: jphp-admin-sfx-process-launcher
    desc: Admin JPHP self-extracting process launcher
    crit: hostile
    conf: 0.97
    scope: outer
    all:
      - id: jphp-launch4j-fxlauncher
      - id: jphp-bootstrap-config
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: metadata/binary/layout::large-overlay-1mb
    any:
      - id: micro-behaviors/process/create/shell/spawn::win-createprocess
      - id: micro-behaviors/process/create/shell/spawn::win-shellexecute
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/exec::shell-execute-a
