defaults:
  platforms: [windows]
  for: [javascript, text, data]
  attack: T1059.007

traits:
- id: env-large-unicode-stage
  desc: "WSH env item stores encoded stage"
  crit: suspicious
  conf: 0.95
  for: [javascript, vbs]
  if:
    type: text
    regex: '[A-Za-z_$][A-Za-z0-9_$]{2,}\(\s*["''][A-Za-z0-9]{8,24}["'']\s*\)\s*=\s*"[^"]{400,}"'
- id: iex-env-variable
  desc: Invoke-Expression from env variable
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '(?i)iex.{0,40}\$e.{0,8}nv:.{0,32}[A-Za-z0-9]{6,24}'
- id: invoke-expression-env-variable
  desc: Invoke-Expression evaluates environment variable
  crit: suspicious
  conf: 0.97
  for: [javascript, html, vbs, powershell, text, data]
  if:
    type: text
    regex: '(?i)\bInvoke-Expression\s+\$env:[A-Za-z_][A-Za-z0-9_]*\b'
- id: iex-env-variable-split
  desc: Split-join Invoke-Expression from env variable
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '["'']i["''].{0,24}["'']ex ["''].{0,24}["'']\$env:["'']'
- id: iex-env-variable-fragment
  desc: Fragmented Invoke-Expression env variable
  crit: suspicious
  conf: 0.95
  if:
    type: string_literal
    exact: "x $en"
- id: iex-env-variable-fragment-ex-env
  desc: Fragmented Invoke-Expression env variable
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: "ex $e"
- id: env-loader-variable-fragment
  desc: Loader environment variable fragment
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: "env:dU"
- id: iex-env-variable-fragmented
  desc: Fragmented Invoke-Expression env variable
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '["'']iex \$["''].{0,32}["'']env:["'']'
- id: conhost-powershell-split-join
  desc: Split-join conhost powershell launcher
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '["'']con["''].{0,24}["'']host["''].{0,120}["'']s p["''].{0,24}["'']ower["'']'
- id: conhost-powershell-split-join-sharded
  desc: Split-join conhost powershell launcher
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '["'']con["''].{0,24}["'']host\.["''].{0,80}["'']shel["''].{0,24}["'']l\.e["'']'
- id: conhost-name-fragment
  desc: Fragmented conhost executable name
  crit: component
  conf: 0.88
  if:
    type: string_literal
    exact: conho
- id: powershell-name-fragment
  desc: Fragmented PowerShell executable name
  crit: component
  conf: 0.88
  if:
    type: string_literal
    exact: "l.ex"
- id: cmd-powershell-split-join
  desc: Split-join cmd slash-c powershell launcher
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '["'']cm["''].{0,24}["'']d /["''].{0,40}["'']c po["''].{0,24}["'']wersh["''].{0,24}["'']ell'
- id: powershell-bypass-flags-split-join
  desc: "Split-join PS noninteractive bypass flags"
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '["'']w H -["''].{0,24}["'']NO["''].{0,24}["'']P -["'']'
- id: powershell-bypass-flags-lower-split
  desc: Split-join PowerShell bypass flags
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '["'']h -no["''].{0,24}["'']P ["''].{0,48}["'']p byp["''].{0,24}["'']ass '
- id: powershell-bypass-flag-fragment
  desc: Fragmented PowerShell bypass flag
  crit: suspicious
  conf: 0.9
  if:
    type: string_literal
    exact: YPAsS
- id: powershell-hidden-noni-fragments
  desc: "Fragmented hidden noninteractive PS flags"
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '["'']-W H["''].{0,80}["'']-nonI["'']'
- id: cjk-byte-shift-minus-19968
  desc: CJK character byte shift constant
  crit: component
  conf: 0.94
  if:
    type: text
    regex: '["'']-19["''].{0,24}["'']968["'']'
