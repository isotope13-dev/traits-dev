- id: powershell-assembly-load-split
  desc: Split-join PowerShell assembly load
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '["'']mbly\]["''].{0,24}["'']::["''].{0,24}["'']Load["'']'
- id: powershell-assembly-fragment
  desc: Fragmented PowerShell assembly reference
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: embly
- id: powershell-assembly-load-fragment
  desc: Fragmented PowerShell assembly load
  crit: component
  conf: 0.9
