  conf: 0.9
  if:
    type: text
    regex: '["'']\.A["''].{0,24}["'']esMa["''].{0,24}["'']naged["'']'
- id: powershell-aesmanaged-fragment
  desc: Fragmented PowerShell AesManaged usage
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: sMana
- id: powershell-aes-namespace-fragment
  desc: Fragmented PowerShell AES namespace
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: y.Ae
- id: powershell-gzipstream-split
  desc: Split-join PowerShell GZipStream usage
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '["'']\.GZi["''].{0,24}["'']pS["''].{0,24}["'']tre["'']'
- id: powershell-gzipstream-sharded
  desc: Sharded PowerShell GZipStream usage
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '["'']GZi["''].{0,24}["'']pStre["''].{0,24}["'']am\('
- id: powershell-gzipstream-fragment
  desc: Fragmented PowerShell GZipStream usage
  crit: component
  conf: 0.9
