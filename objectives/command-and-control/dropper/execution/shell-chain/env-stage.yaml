    regex: '["'']Ent["''].{0,24}["'']ryP["''].{0,48}["'']vo["''].{0,24}["'']ke\('
composite_rules:
- id: vbs-environment-array-reflective-loader
  desc: VBScript stages an encoded environment payload through hidden PowerShell
  crit: hostile
  conf: 0.99
  attack: T1027,T1059.001,T1059.005,T1564.003
  for: [vbs]
  all:
    - id: env-large-unicode-stage
    - id: objectives/execution/interpreter/vbscript/interpreter::vbs-hidden-async-run
    - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
    - id: micro-behaviors/process/interpreter/eval::vbs-executeglobal
  any:
    - id: micro-behaviors/data/encode/char-code::array-payload-reconstruction
    - id: micro-behaviors/process/interpreter/eval::vbs-eval-function
  needs: 1
- id: obfuscated-wsh-env-wmi-powershell-loader
  desc: Obfuscated WSH environment-staged WMI PowerShell loader
  crit: hostile
  conf: 0.98
  attack: T1059.007, T1059.001, T1047, T1564.003
  all:
