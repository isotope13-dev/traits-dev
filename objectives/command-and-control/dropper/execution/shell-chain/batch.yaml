# Windows Batch Dropper Objectives
# Combines batch dropper techniques with C2 indicators and defense evasion
# MBC: B0030 (Dropper), C0002 (Download)
# ATT&CK: T1059.003, T1105, T1562.001
defaults:
  platforms: [windows, linux, unix, macos, android, ios]
composite_rules:
  # Download + Execute + Security Bypass (AV disable/exclusion)
  # This is the classic malware dropper pattern:
  # 1. Disable/bypass security tools
  # 2. Download payload from remote URL
  # 3. Execute the downloaded payload
  # Complexity: all(3) + file_types(1) = 4 -> hostile
  - id: security-bypass-dropper
    desc: Dropper with security tool bypass
    crit: hostile
    conf: 0.95
    mbc: "B0030"
    attack: "T1562.001"
    for: [batch, shell]
    all:
      - id: objectives/evasion/anti-av/platform::bypass
      - id: objectives/command-and-control/dropper/execution/batch::download-tool
      - id: objectives/command-and-control/dropper/execution/batch::exec-cmd
  # Download + Execute + Defender Exclusion specifically
  # Complexity: all(3) + file_types(1) = 4 -> hostile
  - id: defender-exclusion-dropper
    desc: Dropper with Defender exclusion
    crit: hostile
    conf: 0.95
    mbc: "B0030"
    attack: "T1562.001"
    for: [batch, shell, powershell]
    all:
      - id: objectives/evasion/anti-av/platform::defender-exclusion
      - id: objectives/command-and-control/dropper/execution/batch::download-file-ps
      - id: objectives/command-and-control/dropper/execution/batch::exec-cmd
  # PowerShell download cradle in batch with security bypass
  # Complexity: all(3) + file_types(1) = 4 -> hostile
  - id: ps-cradle-security-bypass
    desc: PowerShell cradle with security bypass
    crit: hostile
    conf: 0.95
    mbc: "B0030"
    attack: "T1059.001"
    for: [batch, shell]
    all:
      - id: objectives/evasion/anti-av/platform::bypass
      - id: objectives/command-and-control/dropper/execution/batch::powershell-download
      - id: objectives/command-and-control/dropper/execution/batch::exec-cmd
  # UAC bypass + Download + Execute
  # Complexity: all(3) + file_types(1) = 4 -> hostile
  - id: uac-bypass-dropper
    desc: UAC bypass dropper
    crit: hostile
    conf: 0.95
    mbc: "B0030"
    attack: "T1548.002"
    for: [batch, shell, powershell]
    all:
      - id: objectives/evasion/anti-av/platform::start-process-runas
      - id: objectives/command-and-control/dropper/execution/batch::download-tool
      - id: objectives/command-and-control/dropper/execution/batch::exec-cmd
  # AV check (tasklist) + Security bypass + dropper
  # Classic pattern: check for AV, disable it, then download/execute
  # Complexity: all(4) = 4 -> hostile
  - id: av-aware-dropper
    desc: AV-aware dropper with bypass
    crit: hostile
    conf: 0.95
    mbc: "B0030"
    attack: "T1562.001"
    for: [batch, shell]
    all:
      - id: objectives/evasion/anti-av/platform::tasklist-av-check
      - id: objectives/evasion/anti-av/platform::bypass
      - id: objectives/command-and-control/dropper/execution/batch::download-tool
      - id: objectives/command-and-control/dropper/execution/batch::exec-cmd
  # Malwarebytes disable + dropper
  # Complexity: all(3) + file_types(1) = 4 -> hostile
  - id: malwarebytes-bypass-dropper
    desc: Malwarebytes bypass dropper
    crit: hostile
    conf: 0.95
    mbc: "B0030"
    attack: "T1562.001"
    for: [batch, shell]
    all:
      - id: objectives/evasion/anti-av/platform::malwarebytes-stop-service
      - id: objectives/command-and-control/dropper/execution/batch::download-tool
      - id: objectives/command-and-control/dropper/execution/batch::exec-cmd
  # MSHTA remote fetch with obfuscated IP address
  # LOLBin proxy execution + IP evasion = strong dropper signal
  # Precision: all(2 traits) -> sum of both trait precisions > 4.0
  - id: mshta-obfuscated-dropper
    desc: MSHTA dropper with obfuscated IP
    crit: hostile
    conf: 0.95
    mbc: "E1218.005"
    attack: "T1218.005"
    for: [batch, shell, powershell]
    all:
      - id: objectives/command-and-control/dropper/execution/script::mshta-remote-url
      - id: objectives/anti-static/obfuscation/encoding/ip-notation::hex-octal-ip-in-url
  # Heavy Obfuscation + PowerShell Execution + MOTW Removal
  # Complexity: all(3) + file_types(1) = 4 -> hostile
  - id: obfuscated-powershell-loader
    desc: Obfuscated PowerShell loader in batch
    crit: hostile
    conf: 0.95
    mbc: "B0032"
    attack: "T1027"
    for: [batch, shell]
    all:
      - id: objectives/anti-static/obfuscation/string/concat::batch-heavy-obfuscation
      - id: objectives/execution/interpreter/script::powershell-exe-comp
      - id: objectives/evasion/indicator-removal/cleanup::motw-removal-stream
