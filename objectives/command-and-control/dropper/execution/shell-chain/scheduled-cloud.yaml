defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1059.005
  mbc: B0024
traits:
  - id: vbs-wmi-process-create
    desc: VBScript WMI process launcher
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)(winmgmts|Win32_Process)'
  - id: vbs-scheduled-task-com
    desc: VBScript scheduled task COM
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)(Schedule\.Service|schtasks)'
  - id: vbs-hidden-powershell-iex
    desc: Hidden PowerShell IEX launch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?is)powershell.{0,120}(-windowstyle\s+hidden|-w\s+hidden).{0,120}IEX'
    unless:
      - id: metadata/package/quality/recognized-contexts-extra::hashed-text-record
  - id: vbs-appdata-stage-path
    desc: APPDATA staging path
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)(%APPDATA%|APPDATA)'
composite_rules:
  - id: vbs-wmi-scheduled-cloud-stager
    desc: VBScript scheduled cloud image stager
    crit: hostile
    conf: 0.97
    all:
      - id: vbs-wmi-process-create
      - id: vbs-scheduled-task-com
      - id: vbs-hidden-powershell-iex
      - id: objectives/command-and-control/dropper/delivery/http::suspicious-cloud-image-object
    any:
      - id: vbs-appdata-stage-path
      - id: objectives/command-and-control/dropper/delivery/http::short-numeric-image-object
    unless:
      - id: metadata/package/quality/recognized-contexts-extra::hashed-text-record
