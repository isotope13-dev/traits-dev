defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
traits:
- id: small-loader-executable
  desc: Small executable with loader-style filename
  crit: suspicious
  conf: 0.7
  size_min: 512
  size_max: 102400
  if:
    type: text
    regex: (?i)\b[a-z0-9_-]*loader[a-z0-9._-]*\.exe\b
    section: .text
- id: pe-dir64-relocation-loop-x64
  desc: PE DIR64 relocation loop
  crit: component
  conf: 0.84
  for: [pe]
  if:
    type: hex
    section: .text
    pattern: 41 81 E6 00 F0 00 00 66 41 81 FE 00 A0
- id: inno-550-data-in-overlay
  desc: Inno 5.5 data in overlay
  crit: component
  conf: 0.92
  if:
    type: hex
    pattern: "49 6E 6E 6F 20 53 65 74 75 70 20 53 65 74 75 70 20 44 61 74 61 20 28 35 2E 35 2E 30 29"
    offset_range: [1048576, null]
