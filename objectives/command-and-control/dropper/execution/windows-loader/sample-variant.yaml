defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1620

traits:
  - id: x86-decoded-buffer-indirect-call
    desc: x86 XOR-decoded buffer indirect call
    crit: suspicious
    conf: 0.96
    arch: [x86]
    if:
      type: hex
      section: .text
      # Decode loop followed by an indirect call through the transformed
      # buffer. Wildcards cover compiler-selected stack slots and addresses.
      pattern: 'C7 45 ?? 42 00 00 00 0F B6 4D ?? 83 F1 4E 89 4D ?? C7 45 ?? 00 00 00 00 EB ?? 8B 55 ?? 83 C2 01 89 55 ?? 8B 45 ?? 3B 05 ?? ?? ?? ?? 73 ?? 8B 0D ?? ?? ?? ?? 03 4D ?? 0F B6 11 33 55 ?? 03 55 ?? A1 ?? ?? ?? ?? 03 45 ?? 88 10 EB ?? FF 15 ?? ?? ?? ??'

composite_rules:
  - id: x86-rwx-decoded-buffer-loader
    desc: x86 DLL decodes and executes an RWX file-backed buffer
    crit: hostile
    conf: 0.99
    attack: T1027,T1055,T1620
    all:
      - id: micro-behaviors/mem/alloc/executable::virtualalloc-rwx-commit-x86-indirect
      - id: micro-behaviors/data/encode/xor::x86-xor-add-buffer-decoder-loop
      - id: x86-decoded-buffer-indirect-call
      - id: micro-behaviors/dylib/load/runtime::load-library-a
