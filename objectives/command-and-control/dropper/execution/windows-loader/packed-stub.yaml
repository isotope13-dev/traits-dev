# Opaque packed PE stubs: empty .text, decoy IAT, entry in a nonstandard
# high-entropy section, and no version resource — the common shape of
# VMProtect/Themida-style malware droppers once import protection is applied.
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1027.002,T1105
  mbc: F0001

composite_rules:
  - id: opaque-packed-dropper-stub
    desc: Opaque packed dropper stub with sparse timing imports
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/payload/section::empty-text-section
      - id: objectives/anti-static/pack/detect::empty-text-minimal-import-packed-pe
      - id: metadata/binary/resource::pe-no-version-info-resource
      - id: micro-behaviors/time/timing/check::query-performance-frequency
      - id: micro-behaviors/ui/window/manage/control::get-message-time
      - id: metadata/binary/symbols/imports::few-import-count
      - id: metadata/binary/anomaly/section-header::pe-entry-in-punctuated-section
      - id: metadata/binary/section/metrics::multiple-nonstandard-section-names
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: well-known/app/protected-benign-pe/
