defaults:
  platforms: [windows]
  for: [go]
  attack: T1105,T1059.001
  mbc: B0030
composite_rules:
  - id: go-hidden-powershell-downloader
    desc: Go source launches hidden PowerShell downloader
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/direct::exec-command
      - id: micro-behaviors/process/create/direct::go-powershell-command
      - id: micro-behaviors/communications/http/download/cli::go-powershell-web-download-to-file
      - id: micro-behaviors/process/create/hidden::go-powershell-windowstyle-hidden
      - id: micro-behaviors/process/create/start-process::go-powershell-start-process
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: go-powershell-certutil-stage
    desc: Go PowerShell downloader decodes and runs a script
    crit: hostile
    conf: 0.99
    attack: T1105,T1140,T1059.001,T1564.003
    mbc: B0030,C0026
    all:
      - id: micro-behaviors/process/create/direct::exec-command
      - id: micro-behaviors/process/create/direct::go-powershell-command
      - id: micro-behaviors/communications/http/download/cli::go-powershell-web-download-to-file
      - id: micro-behaviors/data/decode/command::certutil-decode-command
      - id: micro-behaviors/data/decode/command::certutil-decodes-powershell-script
      - id: micro-behaviors/process/create/start-process::go-powershell-start-process
      - id: micro-behaviors/process/create/hidden::go-powershell-windowstyle-hidden
    unless:
      - id: metadata/package/testing/harness/runtime/
