defaults:
  platforms: [windows]
  for: [go]
  attack: T1105,T1059.001
  mbc: B0030
traits:
  - id: go-hidden-powershell-window
    desc: Go embeds hidden PowerShell window launch
    crit: component
    conf: 0.92
    if:
      type: text
      substr: '-WindowStyle", "Hidden"'
      case_insensitive: true
  - id: go-powershell-iwr-outfile
    desc: Go embeds PowerShell web download to file
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?is)\b(Invoke-WebRequest|iwr)\b.{0,360}-OutFile\b'
  - id: go-powershell-startprocess-hidden
    desc: Go embeds hidden PowerShell Start-Process
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?is)Start-Process\b.{0,260}powershell(\.exe)?.{0,260}-WindowStyle\s*[''"]?\s*Hidden\b'
  - id: go-powershell-literal
    desc: PowerShell literal in Go source
    crit: component
    conf: 0.85
    if:
      type: text
      substr: powershell
      case_insensitive: true
composite_rules:
  - id: go-hidden-powershell-downloader
    desc: Go source launches hidden PowerShell downloader
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/direct::exec-command
      - id: go-powershell-literal
      - id: go-hidden-powershell-window
      - id: go-powershell-iwr-outfile
      - id: go-powershell-startprocess-hidden
    unless:
      - id: metadata/package/testing/harness/runtime/
