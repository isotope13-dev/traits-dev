defaults:
  platforms: [windows]
  for: [powershell]
traits:
  - id: ps-deno-install-script
    desc: PowerShell downloads Deno installer
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)\birm\b.{0,80}https://deno\.land/install\.ps1'
  - id: ps-deno-runtime-path
    desc: PowerShell references Deno runtime
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)\$env:USERPROFILE\\\.deno\\bin\\deno\.exe'
  - id: ps-deno-data-uri-exec
    desc: PowerShell runs Deno data URI
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '(?is)\.deno\\bin\\deno\.exe.{0,80}-A.{0,120}data:application/javascript;base64,'
  - id: encoded-deno-username-env
    desc: Encoded Deno username environment lookup
    crit: component
    conf: 0.92
    if:
      type: encoded
      encoding: base64
      substr: 'Deno.env.get("USERNAME")'
  - id: encoded-deno-hostname-call
    desc: Encoded Deno hostname lookup
    crit: component
    conf: 0.92
    if:
      type: encoded
      encoding: base64
      substr: Deno.hostname()
  - id: encoded-deno-system-memory
    desc: Encoded Deno memory fingerprinting
    crit: component
    conf: 0.92
    if:
      type: encoded
      encoding: base64
      substr: Deno.systemMemoryInfo()
  - id: encoded-deno-osrelease
    desc: Encoded Deno OS release lookup
    crit: component
    conf: 0.92
    if:
      type: encoded
      encoding: base64
      substr: Deno.osRelease()
  - id: encoded-deno-mutex-bind
    desc: Encoded Deno localhost bind mutex
    crit: suspicious
    conf: 0.97
    if:
      type: encoded
      encoding: base64
      regex: 'Deno\.listen\(\{port:n,hostname:"127\.0\.0\.1",transport:"tcp"\}'
  - id: encoded-deno-health-check
    desc: Encoded Deno C2 health check
    crit: suspicious
    conf: 0.97
    if:
      type: encoded
      encoding: base64
      regex: '(?s)Promise\.any\(.{0,220}/health.{0,220}Promise\.race'
  - id: encoded-deno-jwt-stage-fetch
    desc: Encoded Deno JWT stage fetch
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      encoding: base64
      regex: '/mv2/[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+/'
  - id: encoded-deno-fileless-import
    desc: Encoded Deno fileless JS import
    crit: suspicious
    conf: 0.98
    if:
      type: encoded
      encoding: base64
      regex: 'import\("data:application/javascript;base64,"\+btoa'
composite_rules:
  - id: encoded-deno-host-fingerprint
    desc: Encoded Deno host fingerprinting
    crit: suspicious
    conf: 0.97
    all:
      - id: encoded-deno-username-env
      - id: encoded-deno-hostname-call
      - id: encoded-deno-system-memory
      - id: encoded-deno-osrelease
  - id: ps-deno-bootstrap
    desc: PowerShell bootstraps Deno runtime
    crit: suspicious
    conf: 0.96
    all:
      - id: ps-deno-install-script
      - id: ps-deno-runtime-path
  - id: ps-fileless-deno-loader
    desc: PowerShell launches fileless Deno loader
    crit: hostile
    conf: 0.99
    all:
      - id: ps-deno-runtime-path
      - id: ps-deno-data-uri-exec
  - id: encoded-deno-c2-loader
    desc: Encoded Deno C2 loader
    crit: hostile
    conf: 0.99
    all:
      - id: encoded-deno-host-fingerprint
      - id: encoded-deno-mutex-bind
      - id: encoded-deno-health-check
      - id: encoded-deno-jwt-stage-fetch
      - id: encoded-deno-fileless-import
