defaults:
  platforms: [unix]
  for: [perl]
  attack: T1059.006
  mbc: B0022

traits:
  - id: perl-base64-runtime-payload
    desc: Perl decodes runtime payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'decode_base64\(\$blob\)'

  - id: perl-fork-fileless-exec
    desc: Perl forks fileless payload
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'my \$pid = fork\(\)'

composite_rules:
  - id: perl-fileless-python-payload
    desc: Perl fileless Python payload
    crit: hostile
    conf: 0.98
    all:
      - id: perl-base64-runtime-payload
      - id: micro-behaviors/process/interpreter/python::python-inline-command
      - id: perl-fork-fileless-exec
