composite_rules:
- id: ps-restmethod-eval-call
  desc: PowerShell evaluates an Invoke-RestMethod response
  crit: suspicious
  conf: 0.96
  mbc: "B0030"
  attack: "T1105"
  all:
  - id: micro-behaviors/process/interpreter/eval::powershell-iex-call
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::invoke-restmethod
  near_bytes: 256
- id: ps-remote-command-response-field
  desc: PowerShell HTTP request with command/task response property
  crit: suspicious
  conf: 0.96
  attack: T1059.001
  all:
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::request-powershell
  any:
  - id: ps-response-command-field
  - id: ps-response-task-field
  - id: ps-task-command-field
  - id: ps-task-script-field
- id: hidden-policy-bypassed-remote-eval
  desc: Hidden policy-bypassed remote script execution
  crit: hostile
  conf: 0.99
  mbc: "B0030"
  attack: "T1059.001, T1105, T1564.003"
  all:
  # Use the flag atom directly so native .ps1 files match; the
  # execution-policy-bypass composite incorrectly requires powershell-keyword,
  # which excludes PowerShell itself (meant for embedding hosts only).
  - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass-flag
  - id: micro-behaviors/process/create/hidden::start-process-windowstyle-hidden
  - id: ps-restmethod-bare-domain-eval-call
- id: restmethod-http-pipe-iex
  desc: PowerShell evaluates an HTTP response returned by Invoke-RestMethod
  # This is a real download-and-evaluate capability, but it is also used by
  # first-party installers. Keep the capability notable; hostile intent needs
  # the stealth, policy-bypass, or embedded-payload composites.
  crit: notable
  conf: 0.96
  mbc: "B0030"
  attack: "T1105"
  for: [batch, powershell]
  # Both legs are structured call facts, so comments and string-valued
  # update instructions cannot form a fileless execution pipeline.
  all:
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::invoke-restmethod
  - id: micro-behaviors/process/interpreter/eval::powershell-iex-call
  near_bytes: 256
- id: ps-downloadfile-call
  desc: PowerShell DownloadFile call
  crit: suspicious
  conf: 0.9
  attack: T1105
  any:
  - id: ps-downloadfile-exe-dll
  - id: ps-downloadfile-shell-script
  - id: ps-downloadfile-script-host
- id: ps-tiny-hidden-irm-eval
  desc: Tiny hidden PowerShell IRM eval
  crit: hostile
  conf: 0.99
  mbc: "B0030"
  attack: "T1059.001"
  all:
  - id: objectives/command-and-control/dropper/execution/fileless::ps-tiny-hidden-ep-launcher
  - id: objectives/command-and-control/dropper/execution/fileless::ps-tiny-irm-eval
- id: ps-encoded-scriptblock-web-stager
  desc: Encoded PowerShell web stager via ScriptBlock
  crit: hostile
  conf: 0.98
  mbc: "B0030"
  attack: "T1105"
  all:
  - id: ps-encoded-iwr-http-fragment
  - id: ps-encoded-scriptblock-fragment
- id: ps-downloader-execute
  desc: "PowerShell downloads and launches payload with stealth or policy bypass"
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::download
  - id: micro-behaviors/process/create/start-process::start-process-call
  - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
  any:
  - id: micro-behaviors/process/create/hidden::start-process-windowstyle-hidden
  - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass-flag
  unless:
  - id: well-known/tool/sysadmin/kubernetes/bootstrap::kubernetes-bootstrap-context
  near_bytes: 1024
- id: ps-fileless-download-eval
  desc: "PowerShell fileless download and eval"
  crit: hostile
  conf: 0.98
  mbc: "B0030"
  attack: "T1059.001"
  for: [pe, batch, powershell]
  size_min: 1
  ref: sha256:4c666890a558a284ac2f14950f096f255f622b9b4e32771d17f4667d63d2847d
  # Requires a corroborating stealth/bypass/embedded-host signal in `all:` so
  # this is not a needs<=1 any-only rule (those are filtered from scan output).
  all:
  - id: objectives/command-and-control/dropper/execution/fileless::ps-restmethod-eval-call
  any:
  - id: micro-behaviors/process/create/hidden::start-process-windowstyle-hidden
  - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass-flag
  - id: objectives/command-and-control/dropper/execution/fileless::ps-restmethod-bare-domain-eval-call
  - id: objectives/command-and-control/dropper/execution/fileless::ps-network-eval-pipeline
  - id: objectives/command-and-control/dropper/execution/fileless::embedded-powershell-command
- id: ps-hidden-start-irm-bare-domain
  desc: Hidden Start-Process launches bare-domain IRM eval
  crit: hostile
  conf: 0.99
  mbc: "B0030"
  attack: "T1059.001,T1105,T1564.003"
  for: [powershell, batch, pe]
  all:
  - id: micro-behaviors/process/create/hidden::start-process-windowstyle-hidden
  - id: objectives/command-and-control/dropper/execution/fileless::ps-restmethod-bare-domain-eval-call
  any:
  - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass-flag
  - id: objectives/command-and-control/dropper/execution/fileless::ps-tiny-irm-eval
- id: embedded-powershell-irm-iex
  desc: Embedded PowerShell irm iex
  crit: hostile
  conf: 0.98
  mbc: "B0030"
  attack: "T1059.001"
  for: [pe, batch, powershell]
  ref: sha256:4c666890a558a284ac2f14950f096f255f622b9b4e32771d17f4667d63d2847d
