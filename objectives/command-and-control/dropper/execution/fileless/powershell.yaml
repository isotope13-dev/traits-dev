- id: wsh-policy-bypassed-remote-powershell
  desc: Policy-bypassed remote PowerShell eval
  crit: hostile
  conf: 0.99
  mbc: "B0030"
  attack: "T1059.001,T1059.005,T1105"
  for: [vbs]
  all:
  - id: objectives/execution/interpreter/vbscript/interpreter::vbs-powershell-launch
  - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass
  - id: ps-irm-pipeline-eval
- id: ps-network-eval-defender-exclusion
