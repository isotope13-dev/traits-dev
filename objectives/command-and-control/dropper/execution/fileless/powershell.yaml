defaults:
  platforms: [windows]
  for: [powershell]
traits:
- id: ps-tiny-hidden-ep-launcher
  desc: Tiny hidden PowerShell EP bypass
  crit: suspicious
  conf: 0.96
  mbc: "B0030"
  attack: "T1059.001"
  size_min: 1
  size_max: 256
  if:
    type: text
    substr: "powershell -W H -EP B -c"
- id: ps-tiny-irm-eval
  desc: Tiny PowerShell IRM eval
  crit: suspicious
  conf: 0.98
  mbc: "B0030"
  attack: "T1105"
  size_min: 1
  size_max: 256
  if:
    type: text
    substr: "iex(irm "
- id: ps-encoded-iwr-http-fragment
  desc: Encoded IWR HTTP launcher fragment
  crit: suspicious
  conf: 0.93
  mbc: "B0030"
  attack: "T1105"
  if:
    type: text
    substr: aQB3AHIAIAAiAGgAdAB0AHAA
- id: ps-encoded-scriptblock-fragment
  desc: Encoded ScriptBlock launcher fragment
  crit: suspicious
  conf: 0.95
  mbc: "B0030"
  attack: "T1059.001"
  if:
    type: text
    substr: QBbAHMAYwByAGkAcAB0AGIAbABvAGMAawBdADoAOg
- id: ps-network-eval-pipeline
  desc: PowerShell network response piped to eval
  crit: suspicious
  conf: 0.92
  mbc: "B0030"
  attack: "T1105"
  if:
    type: text
    regex: "(?i)\\biwr\\b[^\\n|]{0,220}\\|\\s*iex\\b"
  not:
    # Trusted code-hosting source: `iwr <raw repo URL> | iex` is the canonical
    # vendor install one-liner (rustup/scoop/this project). Untrusted-source
    # iwr|iex (raw IP, pastebin, throwaway domain) still fires.
    - regex: '(?i)githubusercontent\.com'
    - regex: '(?i)//github\.com/'
- id: curl-zoom-user-agent-piped-iex--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: powershell
    case_insensitive: true
  count_max: 1012318
- id: curl-zoom-user-agent-piped-iex--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: ZoomSDK
    case_insensitive: true
  count_max: 1012320
- id: curl-zoom-user-agent-piped-iex--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    id: micro-behaviors/communications/http/lib/invoke-webrequest::curl-alias
  count_max: 1012321
- id: iwr-zoom-user-agent-content-iex--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.97
  if:
    type: text
    substr: ).Content
    case_insensitive: true
  count_max: 1012325
- id: iwr-zoom-user-agent-content-iex--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.97
  if:
    type: text
    substr: UserAgent
    case_insensitive: true
  count_max: 1012326
- id: iwr-zoomsdk-chromechip-log--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.97
  if:
    type: text
    substr: chromechip.log
    case_insensitive: true
  count_max: 1012329
- id: iwr-zoomsdk-chromechip-log--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.97
  if:
    type: text
    substr: OutFile
    case_insensitive: true
  count_max: 1012331
- id: chromechip-log-stage-path
  desc: Chromechip log stage path
  crit: component
  conf: 0.94
  mbc: "B0030"
  attack: "T1105"
  if:
    type: text
    substr: chromechip.log
- id: hidden-powershell-getcontent-iex--rx-22
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Start-Process
    case_insensitive: true
  count_max: 1012339
- id: hidden-powershell-getcontent-iex--rx-23
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Get-Content
    case_insensitive: true
  count_max: 1012340
- id: hidden-powershell-getcontent-iex--rx-24
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: WindowStyle
    case_insensitive: true
  count_max: 1012341
- id: hidden-powershell-getcontent-iex--rx-26
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: Hidden
    case_insensitive: true
  count_max: 1012343
- id: curl-custom-ua-piped-powershell--rx-27
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Invoke-Expression
    case_insensitive: true
  count_max: 1012344
- id: curl-custom-ua-piped-powershell--rx-29
  desc: Custom User-Agent option token
  crit: component
  conf: 0.9
  if:
    type: text
    substr: user-agent
    case_insensitive: true
  count_max: 1012346
- id: curl-custom-ua-piped-powershell--rx-30
  desc: PowerShell command argument token
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Command
    case_insensitive: true
  count_max: 1012347
- id: curl-custom-ua-piped-powershell--rx-31
  desc: curl alias in PowerShell
  crit: component
  conf: 0.9
  if:
    id: micro-behaviors/communications/http/lib/invoke-webrequest::curl-alias
  count_max: 1012348
- id: curl-custom-ua-piped-powershell--rx-32
  desc: pwsh execution token
  crit: component
  conf: 0.9
  if:
    type: text
    substr: pwsh
  count_max: 1012349
- id: ps-restmethod-eval-call
  desc: PowerShell RestMethod response to eval
  crit: suspicious
  conf: 0.96
  mbc: "B0030"
  attack: "T1105"
  size_min: 1
  if:
    type: text
    regex: '\biex\s*\(\s*(irm|Invoke-RestMethod)\s+[^)\r\n]{1,120}\)'
    case_insensitive: true
- id: ps-restmethod-bare-domain-eval-call
  desc: PowerShell evals RestMethod bare domain
  crit: suspicious
  conf: 0.97
  mbc: "B0030"
  attack: "T1105"
  size_min: 1
  if:
    type: text
    regex: '\biex\s*\(\s*irm\s+[a-z0-9][a-z0-9.-]*\.[a-z]{2,}\s*\)'
    case_insensitive: true
- id: ps-msi-installer-download
  desc: PowerShell downloads MSI installer
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: (?i)Downloadfile\(\$url,\s*\$msiInstaller\)
- id: ps-msiexec-install
  desc: PowerShell starts msiexec installer
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: Start-Process msiexec.exe
- id: ps-webclient-concatenated-object
  desc: Concatenated PowerShell WebClient object
  crit: suspicious
  conf: 0.94
  attack: T1027
  if:
    type: text
    regex: "(?is)New-Object\\s+\\([^\\r\\n]{0,80}Web[^\\r\\n]{0,80}Client"
- id: ps-webclient-concat-token
  desc: PowerShell concatenated WebClient token
  crit: suspicious
  conf: 0.94
  attack: T1027
  if:
    type: text
    substr: "Web'+'Client"
- id: ps-temp-char-exe-path
  desc: PowerShell builds TEMP EXE path with chars
  crit: suspicious
  conf: 0.94
  attack: T1027
  if:
    type: text
    regex: "(?is)\\$env:TEMP\\s*\\+[^\\r\\n]{0,80}\\[char\\]\\s*101[^\\r\\n]{0,80}\\[char\\]\\s*101"
- id: ps-char-exe-fragment
  desc: PowerShell char-built EXE fragment
  crit: suspicious
  conf: 0.94
  attack: T1027
  if:
    type: text
    substr: "[char]101+'x'+[char]101"
- id: ps-downloadfile-exe-dll
  desc: PowerShell DownloadFile EXE or DLL
  crit: component
  conf: 0.9
  attack: T1105
  if:
    type: text
    regex: '(?is)\.DownloadFile\([^,\r\n]{1,240},\s*[^)\r\n]{0,160}\.(exe|dll)\b'
  unless:
  - type: text
    substr: github.com
- id: ps-downloadfile-shell-script
  desc: PowerShell DownloadFile PS1 or BAT
  crit: component
  conf: 0.9
  attack: T1105
  if:
    type: text
    regex: '(?is)\.DownloadFile\([^,\r\n]{1,240},\s*[^)\r\n]{0,160}\.(ps1|bat)\b'
  unless:
  - type: text
    substr: github.com
- id: ps-downloadfile-script-host
  desc: PowerShell DownloadFile CMD JS or HTA
  crit: component
  conf: 0.9
  attack: T1105
  if:
    type: text
    regex: '(?is)\.DownloadFile\([^,\r\n]{1,240},\s*[^)\r\n]{0,160}\.(cmd|js|hta)\b'
  unless:
  - type: text
    substr: github.com
  - type: text
    regex: '(?i)DownloadFile\(\s*["'']https://go\.dev/dl/'
- id: ps-downloadfile-variable-invoke-temp
  desc: PowerShell invokes temp-path variable
  crit: component
  conf: 0.9
  attack: T1059.001
  if:
    type: text
    regex: "(?m)^\\s*&\\s*\\$(temp|tmp|out|outfile)[A-Za-z0-9_]*\\b"
- id: ps-downloadfile-variable-invoke-fetch
  desc: PowerShell invokes download payload variable
  crit: component
  conf: 0.9
  attack: T1059.001
  if:
    type: text
    regex: "(?m)^\\s*&\\s*\\$(download|downloaded|payload)[A-Za-z0-9_]*\\b"
- id: ps-downloadfile-variable-invoke-stage
  desc: PowerShell invokes staged payload variable
  crit: component
  conf: 0.9
  attack: T1059.001
  if:
    type: text
    regex: "(?m)^\\s*&\\s*\\$(drop|stage)[A-Za-z0-9_]*\\b"
- id: ps-downloadfile-variable-invoke-exec
  desc: PowerShell invokes executable variable
  crit: component
  conf: 0.9
  attack: T1059.001
  if:
    type: text
    regex: "(?m)^\\s*&\\s*\\$(exe|bin|cmd)[A-Za-z0-9_]*\\b"
- id: ps-downloadfile-variable-invoke-file
  desc: PowerShell invokes file-path variable
  crit: component
  conf: 0.9
  attack: T1059.001
  if:
    type: text
    regex: "(?m)^\\s*&\\s*\\$(runme|file)[A-Za-z0-9_]*\\b"
composite_rules:
- id: ps-downloadfile-call
  desc: PowerShell DownloadFile call
  crit: suspicious
  conf: 0.9
  attack: T1105
  any:
  - id: ps-downloadfile-exe-dll
  - id: ps-downloadfile-shell-script
  - id: ps-downloadfile-script-host
- id: ps-tiny-hidden-irm-eval
