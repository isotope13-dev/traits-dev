defaults:
  platforms: [windows]
  for: [powershell]
traits:
- id: ps-c2-register-endpoint
  desc: PowerShell HTTP request to a /register endpoint
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(?i)\b(Invoke-RestMethod|Invoke-WebRequest|curl(\.exe)?)\b[^\r\n]{0,180}/register\b'
- id: ps-c2-poll-endpoint
  desc: PowerShell HTTP request to a /poll endpoint
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(?i)\b(Invoke-RestMethod|Invoke-WebRequest|curl(\.exe)?)\b[^\r\n]{0,180}/poll\b'
- id: ps-c2-report-endpoint
  desc: PowerShell HTTP request to a /report endpoint
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(?i)\b(Invoke-RestMethod|Invoke-WebRequest|curl(\.exe)?)\b[^\r\n]{0,180}/report\b'
- id: ps-response-command-field
  desc: PowerShell response/result command property
  crit: component
  conf: 0.96
  attack: T1059.001
  if:
    type: text
    # Generic object properties such as `$hookDef.command` are common in
    # installers and configuration code, not evidence of C2 tasking.
    regex: '(?i)\$(response|result)\.(command|cmd)\b'
- id: ps-response-task-field
  desc: PowerShell response/result task property token
  crit: component
  conf: 0.96
  attack: T1059.001
  if:
    type: text
    regex: '(?i)\$(response|result)\.(task|script)\b'
- id: ps-task-command-field
  desc: PowerShell task command property token
  crit: component
  conf: 0.96
  attack: T1059.001
  if:
    type: text
    regex: '(?i)\$(task|tasking|commandResponse)\.(command|cmd)\b'
- id: ps-task-script-field
  desc: PowerShell task script property token
  crit: component
  conf: 0.96
  attack: T1059.001
  if:
    type: text
    regex: '(?i)\$(task|tasking|commandResponse)\.(task|script)\b'
- id: ps-tiny-hidden-ep-launcher
  desc: Tiny hidden PowerShell EP bypass
  crit: suspicious
  conf: 0.96
  mbc: "B0030"
  attack: "T1059.001"
  size_min: 1
  size_max: 256
  if:
    type: text
    substr: "powershell -W H -EP B -c"
- id: ps-tiny-irm-eval
  desc: Tiny PowerShell IRM eval
  crit: suspicious
  conf: 0.98
  mbc: "B0030"
  attack: "T1105"
  size_min: 1
  size_max: 256
  if:
    type: text
    substr: "iex(irm "
- id: ps-encoded-iwr-http-fragment
  desc: Encoded IWR HTTP launcher fragment
  crit: suspicious
  conf: 0.93
  mbc: "B0030"
  attack: "T1105"
  if:
    type: text
    substr: aQB3AHIAIAAiAGgAdAB0AHAA
- id: ps-encoded-scriptblock-fragment
  desc: Encoded ScriptBlock launcher fragment
  crit: suspicious
  conf: 0.95
  mbc: "B0030"
  attack: "T1059.001"
  if:
    type: text
    substr: QBbAHMAYwByAGkAcAB0AGIAbABvAGMAawBdADoAOg
- id: ps-network-eval-pipeline
  desc: PowerShell network response piped to eval
  crit: suspicious
  conf: 0.92
  mbc: "B0030"
  attack: "T1105"
  if:
    type: text
    regex: "(?im)^(?!\\s*#)\\s*\\biwr\\b[^\\r\\n|]{0,220}\\|\\s*iex\\b"
  not:
    # Trusted code-hosting source: `iwr <raw repo URL> | iex` is the canonical
    # vendor install one-liner (rustup/scoop/this project). Untrusted-source
    # iwr|iex (raw IP, pastebin, throwaway domain) still fires.
    - regex: '(?i)githubusercontent\.com'
    - regex: '(?i)//github\.com/'
- id: ps-irm-pipeline-eval
  desc: IRM response piped to IEX
  crit: suspicious
  conf: 0.97
  mbc: "B0030"
  attack: "T1059.001,T1105"
  # Native binaries frequently embed vendor documentation or installer help
  # containing the canonical Bun `irm|iex` command.  This rule is for script
  # source, where the pipeline is executable code rather than inert PE text.
  for: [vbs, powershell, batch]
  if:
    type: text
    # Do not treat a commented install example as executable code.
    regex: '(?im)^(?!\s*#)\s*\b(irm|Invoke-RestMethod)\b[^\r\n|]{0,240}\|\s*iex\b'
- id: curl-zoom-user-agent-piped-iex--rx-4
