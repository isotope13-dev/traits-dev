defaults:
  platforms: [windows]
  for: [powershell]
traits:
  - id: ps-tiny-hidden-ep-launcher
    desc: Tiny hidden PowerShell EP bypass
    crit: suspicious
    conf: 0.96
    mbc: "B0030"
    attack: "T1059.001"
    size_min: 1
    size_max: 256
    if:
      type: text
      substr: "powershell -W H -EP B -c"
  - id: ps-tiny-irm-eval
    desc: Tiny PowerShell IRM eval
    crit: suspicious
    conf: 0.98
    mbc: "B0030"
    attack: "T1105"
    size_min: 1
    size_max: 256
    if:
      type: text
      substr: "iex(irm "
  - id: ps-encoded-iwr-http-fragment
    desc: Encoded IWR HTTP launcher fragment
    crit: suspicious
    conf: 0.93
    mbc: "B0030"
    attack: "T1105"
    if:
      type: text
      substr: aQB3AHIAIAAiAGgAdAB0AHAA
  - id: ps-encoded-scriptblock-fragment
    desc: Encoded ScriptBlock launcher fragment
    crit: suspicious
    conf: 0.95
    mbc: "B0030"
    attack: "T1059.001"
    if:
      type: text
      substr: QBbAHMAYwByAGkAcAB0AGIAbABvAGMAawBdADoAOg
  - id: ps-network-eval-pipeline
    desc: PowerShell network response piped to eval
    crit: suspicious
    conf: 0.92
    mbc: "B0030"
    attack: "T1105"
    if:
      type: text
      regex: "(?i)\\biwr\\b[^\\n|]{0,220}\\|\\s*iex\\b"
  - id: ps-restmethod-eval-call
    desc: PowerShell RestMethod response to eval
    crit: suspicious
    conf: 0.96
    mbc: "B0030"
    attack: "T1105"
    size_min: 1
    if:
      type: text
      regex: '\biex\s*\(\s*(irm|Invoke-RestMethod)\s+[^)\r\n]{1,120}\)'
      case_insensitive: true
  - id: ps-restmethod-bare-domain-eval-call
    desc: PowerShell evals RestMethod bare domain
    crit: suspicious
    conf: 0.97
    mbc: "B0030"
    attack: "T1105"
    size_min: 1
    if:
      type: text
      regex: '\biex\s*\(\s*irm\s+[a-z0-9][a-z0-9.-]*\.[a-z]{2,}\s*\)'
      case_insensitive: true
  - id: ps-msi-installer-download
    desc: PowerShell downloads MSI installer
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)Downloadfile\(\$url,\s*\$msiInstaller\)
  - id: ps-msiexec-install
    desc: PowerShell starts msiexec installer
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: Start-Process msiexec.exe
  - id: ps-webclient-concatenated-object
    desc: Concatenated PowerShell WebClient object
    crit: suspicious
    conf: 0.94
    attack: T1027
    if:
      type: text
      regex: "(?is)New-Object\\s+\\([^\\r\\n]{0,80}Web[^\\r\\n]{0,80}Client"
  - id: ps-webclient-concat-token
    desc: PowerShell concatenated WebClient token
    crit: suspicious
    conf: 0.94
    attack: T1027
    if:
      type: text
      substr: "Web'+'Client"
  - id: ps-temp-char-exe-path
    desc: PowerShell builds TEMP EXE path with chars
    crit: suspicious
    conf: 0.94
    attack: T1027
    if:
      type: text
      regex: "(?is)\\$env:TEMP\\s*\\+[^\\r\\n]{0,80}\\[char\\]\\s*101[^\\r\\n]{0,80}\\[char\\]\\s*101"
  - id: ps-char-exe-fragment
    desc: PowerShell char-built EXE fragment
    crit: suspicious
    conf: 0.94
    attack: T1027
    if:
      type: text
      substr: "[char]101+'x'+[char]101"
  - id: ps-downloadfile-call
    desc: PowerShell DownloadFile call
    crit: notable
    conf: 0.9
    attack: T1105
    if:
      type: text
      substr: .DownloadFile(
  - id: ps-downloadfile-variable-invoke
    desc: PowerShell invokes downloaded variable path
    crit: component
    conf: 0.96
    attack: T1059.001
    if:
      type: text
      regex: "(?m)^\\s*&\\s*\\$[A-Za-z_][A-Za-z0-9_]*\\b"
composite_rules:
  - id: ps-tiny-hidden-irm-eval
    desc: Tiny hidden PowerShell IRM eval
    crit: hostile
    conf: 0.99
    mbc: "B0030"
    attack: "T1059.001"
    all:
      - id: objectives/command-and-control/dropper/execution/fileless::ps-tiny-hidden-ep-launcher
      - id: objectives/command-and-control/dropper/execution/fileless::ps-tiny-irm-eval
  - id: ps-encoded-scriptblock-web-stager
    desc: Encoded PowerShell web stager via ScriptBlock
    crit: hostile
    conf: 0.98
    mbc: "B0030"
    attack: "T1105"
    all:
      - id: ps-encoded-iwr-http-fragment
      - id: ps-encoded-scriptblock-fragment
  - id: ps-downloader-indicators
    desc: Helper for downloader indicators
    crit: notable
    any:
      - id: micro-behaviors/os/env/vars::env-temp-dup
      - id: objectives/command-and-control/dropper/execution/batch::outfile-param
  - id: ps-downloader-execute
    desc: "PowerShell script downloads and executes payload"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::download
      - id: micro-behaviors/process/create/exec::start-process-dup
      - id: objectives/command-and-control/dropper/execution/fileless::ps-downloader-indicators
    unless:
      - type: trait
        id: micro-behaviors/os/security/auth/verify::authenticode-verification-workflow
      - type: trait
        id: objectives/command-and-control/dropper/execution/fileless::ps-msi-installer-download
      - type: trait
        id: objectives/command-and-control/dropper/execution/fileless::ps-msiexec-install
  - id: ps-fileless-download-eval
    desc: "PowerShell fileless download and eval"
    crit: hostile
    conf: 0.98
    mbc: "B0030"
    attack: "T1059.001"
    size_min: 1
    any:
      - id: objectives/command-and-control/dropper/execution/fileless::ps-network-eval-pipeline
      - id: objectives/command-and-control/dropper/execution/fileless::ps-restmethod-eval-call
      - id: objectives/command-and-control/dropper/execution/fileless::ps-restmethod-bare-domain-eval-call
  - id: ps-webclient-concat-indicator
    desc: PowerShell concatenated WebClient indicator
    crit: suspicious
    conf: 0.94
    any:
      - id: ps-webclient-concatenated-object
      - id: ps-webclient-concat-token
  - id: ps-temp-char-exe-indicator
    desc: PowerShell char-built TEMP EXE indicator
    crit: suspicious
    conf: 0.94
    any:
      - id: ps-temp-char-exe-path
      - id: ps-char-exe-fragment
  - id: ps-webclient-temp-exe-invoke
    desc: PowerShell WebClient TEMP EXE invoke
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    attack: T1105
    all:
      - id: ps-downloadfile-call
      - id: ps-downloadfile-variable-invoke
      - id: ps-webclient-concat-indicator
      - id: ps-temp-char-exe-indicator
