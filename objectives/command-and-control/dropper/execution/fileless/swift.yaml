defaults:
  platforms: [freebsd, unix]
  for: [swift]
  attack: T1059.004

traits:
  - id: swift-urlsession-shell-pipe
    desc: Swift pipes HTTP payload to shell
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'URLSession\.shared\.dataTask[\s\S]{0,460}standardInput\s*=\s*pipe'

  - id: swift-shell-stdin-write
    desc: Swift writes script to shell stdin
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'stdin\.write[\s\S]{0,100}script\.data'

composite_rules:
  - id: swift-fileless-shell-download-exec
    desc: Swift fileless shell download execution
    crit: hostile
    conf: 0.98
    all:
      - id: swift-urlsession-shell-pipe
      - id: swift-shell-stdin-write

