defaults:
  platforms: [unix]
  for: [shell]
traits:
- id: wget-output-stdout
  desc: "wget output to stdout flag"
  crit: suspicious
  if:
    type: text
    regex: '\bwget(\.exe)?\b[^\n]{0,160}\s-O\s*-(\s|$)'
- id: execute-dot-slash
  desc: "./ execution pattern"
  crit: component
  conf: 0.6
  attack: T1059.004
  if:
    type: text
    regex: '(^|\n|[;&|]{1,2}|\bnohup\s+)\s*\./[a-zA-Z0-9_][a-zA-Z0-9_.-]+'
- id: inline__curl-silent-stdout__any_1
  desc: "Curl silent download pattern 1"
  crit: notable
  unless:
  - id: benign-coingecko-price-api
  if:
    type: text
    regex: 'curl(\.exe)?\s+[^|&\n]{0,120}-s[^|&\n]{0,120}(https?://|ftp://)'
  not:
  - substr: api.coingecko.com/api/v3/simple/price
- id: inline__curl-silent-stdout__any_2
  desc: "Curl silent download pattern 2"
  crit: suspicious
  unless:
  - id: benign-coingecko-price-api
  if:
    type: text
    regex: 'curl(\.exe)?\s+[^|&\n]{0,120}--silent[^|&\n]{0,120}(https?://|ftp://)'
  not:
  - substr: api.coingecko.com/api/v3/simple/price
- id: benign-coingecko-price-api
  desc: Benign CoinGecko price API fetch
  crit: component
  conf: 0.9
  if:
    type: text
    substr: api.coingecko.com/api/v3/simple/price
- id: gpg-import-pipe
  desc: GPG key import via pipe
  crit: component
  if:
    type: text
    regex: '\|\s*([a-z/]+/)?gpg\b\s+--import'
- id: apt-key-add-pipe
  desc: APT key add via pipe
  crit: component
  if:
    type: text
    regex: '\|\s*sudo\s+apt-key\s+add\s+-'
- id: pipe-to-shell
  desc: Pipe output into shell
  crit: component
  if:
    type: text
    regex: '\|\s*(bash|sh)\b'
- id: ghcup-bootstrap-pipe
  desc: GHCup bootstrap installer pipe
  crit: baseline
  if:
    type: text
    regex: (?i)get-ghcup\.haskell\.org.{0,40}\|\s*(bash|sh)\b
- id: miner-hijack-config
  desc: Hijacking other miner configurations
  crit: suspicious
  if:
    type: text
    substr: 'kill_list.patterns'
- id: miner-config-poisoning
  desc: Poisoning other miner configurations
  crit: suspicious
  if:
    type: text
    substr: 'hijacked_${_hhex}'
- id: python-inline-socket-listener
  desc: Inline Python background socket listener
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "python3?\\s+-c\\s+[\"'].{0,50}socket\\.socket.{0,50}bind.{0,50}listen.{0,50}os\\.fork"
- id: benign-os-curl-domain--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)((net|free)bsd|kernel)\.org
  count_max: 1010829
- id: benign-os-curl-domain--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: (?i)((open|dragonfly)bsd|kernel)\.org
  count_max: 1010830
- id: benign-platform-curl-domain
  desc: Benign platform bootstrap curl domain
  crit: baseline
  if:
    type: text
    regex: (?i)(github|google)\.com

composite_rules:
- id: python-inline-mutex-hostile
  desc: Hostile Python inline socket mutex script
  crit: hostile
  conf: 0.95
  all:
  - id: python-inline-socket-listener
  - id: micro-behaviors/os/sysinfo/network::ss
- id: hostile-miner-hijack
  desc: Known hostile miner hijacking behavior
  crit: hostile
  any:
  - id: miner-hijack-config
  - id: miner-config-poisoning
- id: xmr-miner-config-hijack
  desc: Monero miner configuration hijack chain
  crit: hostile
  conf: 0.98
  attack: T1496
  all:
  - id: miner-hijack-config
  - id: miner-config-poisoning
  any:
  - id: objectives/impact/cryptojacking/wallet::monero-wallet-4-bounded
  - id: objectives/impact/cryptojacking/pool::domain-2
  - id: objectives/impact/cryptojacking/pool::pool-port-3333-dup
  needs: 2
- id: evasive-xmr-config-poisoner
  desc: Evasive Monero miner config poisoner
  crit: hostile
  conf: 0.97
  attack: T1496
  all:
  - id: xmr-miner-config-hijack
  - id: objectives/evasion/indicator-removal/history::histfile-devnull
- id: shell-fetch-exec-bash
  desc: Shell script downloads and executes via pipe to bash
  crit: hostile
  conf: 0.98
  attack: T1105
  unless:
  - id: ghcup-bootstrap-pipe
  all:
  - id: micro-behaviors/process/create/shell::bash-exec
  - id: pipe-to-shell
  any:
  - id: curl-silent-stdout
  - id: wget-silent-stdout
- id: shell-fetch-exec-curl
  desc: Shell script downloads via curl and executes via pipe
  crit: hostile
  conf: 0.95
  attack: T1105
  unless:
  - id: ghcup-bootstrap-pipe
  all:
  - id: micro-behaviors/communications/http/download/curl::curl-cmd
  - id: curl-silent-stdout
  - id: pipe-to-shell
  any:
  - id: micro-behaviors/process/create/shell::bash-exec
  - id: micro-behaviors/process/create/shell::bin-sh
- id: shell-fetch-exec-wget
  desc: Shell script downloads via wget and executes via pipe
  crit: hostile
  conf: 0.95
  attack: T1105
  all:
  - id: micro-behaviors/communications/http/download/curl::wget-cmd
  - id: wget-silent-stdout
  - id: pipe-to-shell
  any:
  - id: micro-behaviors/process/create/shell::bash-exec
  - id: micro-behaviors/process/create/shell::bin-sh
- id: wget-silent-stdout
  desc: "Silent wget output to stdout"
  crit: suspicious
  conf: 0.9
  mbc: C0002
  attack: T1105
  all:
  - id: micro-behaviors/communications/http/download/curl::wget-cmd
  - id: micro-behaviors/communications/http/download::wget-q-flag
  - id: wget-output-stdout
  unless:
  - id: gpg-import-pipe
  - id: apt-key-add-pipe
- id: curl-silent-stdout
  desc: "Silent curl output to stdout"
  crit: suspicious
  conf: 0.9
  mbc: C0002
  attack: T1105
  size_max: 5000
  any:
  - id: inline__curl-silent-stdout__any_1
  - id: inline__curl-silent-stdout__any_2
  unless:
  - id: benign-os-curl-domain
  - id: benign-platform-curl-domain
  - id: benign-coingecko-price-api
- id: benign-os-curl-domain
  desc: Benign OS project curl domain
  crit: baseline
  conf: 1.0
  any:
  - id: benign-os-curl-domain--rx-1
  - id: benign-os-curl-domain--rx-2
