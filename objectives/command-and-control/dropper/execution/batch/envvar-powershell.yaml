defaults:
  attack: "T1027, T1059.001, T1105"
  platforms: [windows]
  for: [batch]

traits:
  - id: short-env-cmd-fragments
    desc: Short envvar cmd fragments
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)%![A-Z0-9]%m\^%![A-Z0-9]%'

  - id: short-env-powershell-fragments
    desc: Short envvar PowerShell fragments
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)o\^w\^%![A-Z0-9]%r\^sh'

  - id: short-env-downloadstring
    desc: Short envvar DownloadString
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)oa\^%![A-Z0-9]%S\^tri\^%![A-Z0-9]%'

  - id: short-env-iex
    desc: Short envvar IEX fragment
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\^I\^%![A-Z0-9]%X\^'

  - id: batch-ps1-url-assignment
    desc: Batch assigns PS1 URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)set\s+[A-Z0-9_!]{4,}\s*=\s*''?https?://.{1,60}\.Ps1''?'

composite_rules:
  - id: short-envvar-powershell-downloadstring
    desc: Short-envvar PowerShell stager
    crit: hostile
    conf: 0.97
    all:
      - id: short-env-cmd-fragments
      - id: short-env-powershell-fragments
      - id: short-env-downloadstring
      - id: short-env-iex
      - id: batch-ps1-url-assignment
