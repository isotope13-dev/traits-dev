defaults:
  platforms:
  - windows
traits:
- id: curl-to-temp
  desc: Download to TEMP directory
  crit: suspicious
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: (?i)(curl|wget).{0,120}(\\Temp\\|%TMP%)
- id: certutil-download
  desc: Certutil download abuse
  crit: suspicious
  conf: 0.95
  for:
  - batch
  if:
    type: text
    regex: certutil\s+.{0,50}-urlcache.{0,30}-split.{0,30}-f
- id: bitsadmin-download
  desc: BitsAdmin download abuse
  crit: suspicious
  conf: 0.95
  for: [scripts]
  if:
    type: text
    regex: bitsadmin\s+.{0,50}\/transfer
- id: start-hidden-dup
  desc: Start minimized process
  crit: component
  conf: 0.85
  for:
  - batch
  if:
    type: text
    regex: (?i)start\s+["']?["']?\s*/min\b
- id: hidden-self-relaunch
  desc: Hidden self relaunch through cmd and call
  crit: suspicious
  conf: 0.94
  for:
  - batch
  if:
    type: text
    regex: (?i)start\s+["']?["']?\s*/min\s+cmd(\.exe)?\s+/c\s+call\s+"?%~f0"?
- id: self-relaunch-via-cmd
  desc: Batch relaunches itself through cmd call chain
  crit: suspicious
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: (?i)start[^\n]{0,120}cmd(\.exe)?[^\n]{0,80}/c[^\n]{0,80}call[^\n]{0,40}%~f0
- id: run-from-temp
  desc: Execute binary from TEMP directory
  crit: suspicious
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: (?i)start[^\n]{0,220}(%TEMP%|%TMP%)[^\n]{0,220}\.exe
  unless:
  - type: text
    regex: (?i)bootstrapper\.exe[^\n]{0,160}--action\s+install[^\n]{0,120}--eula=accept
- id: done-marker
  desc: Execution marker file
  crit: suspicious
  conf: 0.75
  for:
  - batch
  if:
    type: text
    regex: (?i)(if\s+exist|echo\.\s*>)[^\r\n]{0,80}\.(done|installed|complete)\b
- id: echo-off
  desc: Echo off
  crit: component
  conf: 0.6
  for:
  - batch
  if:
    type: text
    regex: (?i)@echo\s+off
  not:
  - substr: 'Copyright (c)'
  - substr: 'SET dp0=%~dp0'
  - substr: 'goto #_undefined_# 2>NUL'
  unless:
  - type: basename
    regex: '^run\.bat$'
  - type: basename
    regex: ^vcbuild\.bat$
  - type: basename
    regex: ^clink\.bat$
  - type: basename
    regex: ^GetCommitHash\.bat$
  - type: basename
    regex: ^UpdateGenVersion\.bat$
  - type: basename
    regex: ^build-pty4j-libpty\.bat$
- id: redirect-null
  desc: Redirect output to null
  crit: component
  conf: 0.7
  for:
  - batch
  unless:
  - type: basename
    regex: ^(GetCommitHash|UpdateGenVersion)\.bat$
  - type: basename
    regex: ^build-pty4j-libpty\.bat$
  if:
    type: text
    regex: (?i)>nul|2>nul
- id: delayed-expansion
  desc: Delayed expansion enabled
  crit: component
  conf: 0.5
  for:
  - batch
  if:
    type: text
    substr: EnableDelayedExpansion
- id: curl-cmd-dup
  desc: curl command
  crit: component
  conf: 0.5
  for:
  - batch
  if:
    type: text
    regex: (?i)\bcurl\b
- id: download-file-ps
  desc: PowerShell DownloadFile
  crit: notable
  conf: 0.5
  for:
  - batch
  if:
    type: text
    regex: (?i)DownloadFile
- id: certutil-cmd
  desc: certutil command
  crit: notable
  conf: 0.5
  for:
  - batch
  if:
    type: text
    regex: (?i)\bcertutil\b
- id: certutil-urlcache
  desc: certutil urlcache
  crit: suspicious
  conf: 0.95
  for:
  - batch
  if:
    type: text
    regex: (?i)certutil[^\n]{0,220}-urlcache
- id: certutil-urlcache-split-force
  desc: certutil urlcache with split force
  crit: suspicious
  conf: 0.98
  for:
  - batch
  if:
    type: text
    regex: (?i)certutil(\.exe)?\s+[^\n]{0,120}-urlcache[^\n]{0,60}-split[^\n]{0,60}-f
- id: certutil-decode
  desc: certutil base64 decode (LOLBas payload staging)
  crit: suspicious
  conf: 0.9
  attack: T1140
  for: [scripts, binaries]
  if:
    type: text
    regex: (?i)certutil(\.exe)?\s+[^\n]{0,60}-decode\b
- id: cscript-nologo
  desc: cscript launched without logo banner
  crit: notable
  conf: 0.82
  for:
  - batch
  if:
    type: text
    regex: (?i)\bcscript(\.exe)?\b[^\n]{0,80}/nologo\b
- id: cert-fragment-var
  desc: Variable assigned cert fragment
  crit: component
  conf: 0.88
  for:
  - batch
  if:
    type: text
    regex: '[A-Za-z0-9_]{4,}=cert\b'
- id: util-fragment-var
  desc: Variable assigned util fragment
  crit: component
  conf: 0.88
  for:
  - batch
  if:
    type: text
    regex: '[A-Za-z0-9_]{4,}=util\b'
- id: cscript-fragment-var
  desc: Variable assigned cscript fragment
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: '[A-Za-z0-9_]{4,}=cscript /'
- id: nologo-fragment-var
  desc: Variable assigned nologo fragment
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: '[A-Za-z0-9_]{4,}=/nologo /'
- id: vbscript-engine-fragment-var
  desc: Variable assigned VBScript engine fragment
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: '[A-Za-z0-9_]{4,}=/e:vbscri'
- id: vbscript-engine-tail-var
  desc: Variable assigned VBScript engine tail
  crit: component
  conf: 0.86
  for:
  - batch
  if:
    type: text
    regex: '[A-Za-z0-9_]{4,}=pt\b'
- id: decode-flag
  desc: Decode flag in staged command
  crit: suspicious
  conf: 0.82
  for:
  - batch
  if:
    type: text
    word: -decode
- id: del-fragment-d-var
  desc: Variable assigned d fragment
  crit: component
  conf: 0.84
  for:
  - batch
  if:
    type: text
    regex: '[A-Za-z0-9_]{4,}=d\b'
- id: del-fragment-e-var
  desc: Variable assigned e fragment
  crit: component
  conf: 0.84
  for:
  - batch
  if:
    type: text
    regex: '[A-Za-z0-9_]{4,}=e\b'
- id: del-fragment-l-var
  desc: Variable assigned l fragment
  crit: component
  conf: 0.84
  for:
  - batch
  if:
    type: text
    regex: '[A-Za-z0-9_]{4,}=l\b'
- id: batch-vbscript-set-literal
  desc: Batch contains VBScript Set assignment
  crit: notable
  conf: 0.86
  for:
  - batch
  if:
    type: text
    regex: '\bSet\s+[A-Za-z][A-Za-z0-9]{3,}\s*='
- id: batch-chr-construction
  desc: Batch contains dense Chr reconstruction
  crit: suspicious
  conf: 0.88
  count_min: 6
  for:
  - batch
  if:
    type: text
    regex: 'Chr\([0-9]{2,3}\)'
- id: cscript-vbscript-engine
  desc: cscript explicit VBScript engine launch
  crit: suspicious
  conf: 0.92
  for:
  - batch
  if:
    type: text
    regex: (?i)\bcscript(\.exe)?\b[^\n]{0,120}/e:vbscript\b
- id: wmic-arch-check
  desc: Check OS architecture via WMIC
  crit: suspicious
  conf: 0.8
  for:
  - batch
  if:
    type: text
    regex: (?i)wmic[^\n]{0,220}osarchitecture
- id: bitsadmin-cmd
  desc: bitsadmin command
  crit: suspicious
  conf: 0.5
  for: [scripts]
  if:
    type: text
    word: bitsadmin
    case_insensitive: true
  unless:
  - id: metadata/library/structure::js-vite-rollup-vendor-chunk
  - id: metadata/library/runtime::acquire-vscode-api
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
- id: start-exe
  desc: Start an executable
  crit: component
  conf: 0.6
  for:
  - batch
  if:
    type: text
    regex: (?i)start\s+[^\n]{0,120}\.exe
  unless:
  - type: basename
    regex: ^clink\.bat$
- id: curl-remote-exe
  desc: Download and run remote executable
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: (?i)\bcurl(\.exe)?\s+[^\n]{0,120}https?://[^\s&|"]{1,200}\.exe\b
- id: output-flag
  desc: curl writes downloaded output file
  crit: component
  conf: 0.4
  for:
  - batch
  if:
    type: text
    regex: (?i)\bcurl\b[^\n]{0,120}\s-o\s
- id: call-label
  desc: Call local batch label
  crit: component
  conf: 0.4
  for:
  - batch
  if:
    type: text
    regex: (?im)^\s*@?call\s+:[A-Za-z0-9_.$-]+
  not:
  - substr: 'SET dp0=%~dp0'
  - substr: 'goto #_undefined_# 2>NUL'
  unless:
  - type: basename
    regex: ^clink\.bat$
- id: call-comspec
  desc: Call COMSPEC interpreter
  crit: suspicious
  conf: 0.4
  for:
  - batch
  if:
    type: text
    regex: (?im)^\s*@?call\s+%comspec%\b
- id: call-cmd
  desc: Call cmd interpreter
  crit: suspicious
  conf: 0.4
  for:
  - batch
  not:
  - regex: (?im)^\s*@?call\s+cmd(\.exe)?\s+%\*\s*$
  unless:
  - type: text
    regex: (?im)^\s*@?call\s+cmd(\.exe)?\s+%\*\s*$
  - type: basename
    exact: start-ssh-agent.cmd
  if:
    type: text
    regex: (?im)^\s*@?call\s+cmd(\.exe)?\b
- id: powershell-command
  desc: PowerShell command flag
  crit: notable
  conf: 0.7
  for:
  - batch
  if:
    type: text
    regex: (?i)powershell[^\n]{0,220}-[Cc]\s
- id: powershell-file-flag
  desc: PowerShell file execution flag
  crit: suspicious
  conf: 0.82
  for:
  - batch
  if:
    type: text
    regex: (?i)powershell(\.exe)?[^\n]{0,220}-f\s
- id: temp-ps1-stage-path
  desc: Temp PowerShell script stage path
  crit: suspicious
  conf: 0.88
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (?i)(%TEMP%|%TMP%|\$env:TEMP|\$env:TMP)[^\\\r\n]{0,40}\\[A-Za-z0-9._-]+\.ps1
- id: temp-tmp-stage-path
  desc: Temp intermediate stage file path
  crit: suspicious
  conf: 0.82
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (?i)(%TEMP%|%TMP%|\$env:TEMP|\$env:TMP)[^\\\r\n]{0,40}\\[A-Za-z0-9._-]+\.tmp
  unless:
  - type: text
    regex: (?i)(%TEMP%|%TMP%)\\_(envset|envget)\.tmp\b
- id: temp-dat-stage-path
  desc: Temp DAT intermediate stage path
  crit: suspicious
  conf: 0.84
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (?i)(%TEMP%|%TMP%|\$env:TEMP|\$env:TMP)[^\\\r\n]{0,40}\\[A-Za-z0-9._-]+\.dat
- id: webdav-ip-unc-pushd
  desc: Changes into external WebDAV share
  crit: suspicious
  conf: 0.94
  for:
  - batch
  if:
    type: text
    regex: '(?im)^\s*pushd\s+\\\\([0-9]{1,3}\.){3}[0-9]{1,3}\\DavWWWRoot\b'
- id: copy-exe-to-temp
  desc: Copies executable into TEMP path
  crit: notable
  conf: 0.82
  for:
  - batch
  if:
    type: text
    regex: '(?im)^\s*copy\s+[^\r\n]{1,120}\.exe\s+%TEMP%\\[A-Za-z0-9._-]+\.exe\b'
- id: copy-bin-to-temp-dat
  desc: Copies binary payload into TEMP
  crit: suspicious
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: '(?im)^\s*copy\s+[^\r\n]{1,120}\.bin\s+%TEMP%\\[A-Za-z0-9._-]+\.dat\b'
- id: keyed-temp-payload-launch--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - batch
  if:
    type: text
    substr: start
    case_insensitive: true
  count_max: 1010158
- id: grouped-echo-stage-redirect--rx-3
  desc: Batch echo redirects staged content
  crit: component
  conf: 0.94
  for:
  - batch
  if:
    type: text
    regex: '(?im)^\s*\(?\s*e\^?c\^?h\^?o\s+.{1,200}>>?\s*'
  count_max: 1010160
- id: embedded-pe-base64-prefix
  desc: Embedded PE base64 prefix in echoed payload
  crit: suspicious
  conf: 0.92
  for:
  - batch
  if:
    type: text
    regex: (?im)^\s*echo\s+TVpQAAIA[A-Za-z0-9+/=]{20,}
- id: set-temp-stage-var
  desc: Variable assigned temp stage file path
  crit: suspicious
  conf: 0.86
  for:
  - batch
  if:
    type: text
    regex: (?i)\bset\s+[A-Za-z0-9_]{3,}=(%TEMP%|%TMP%)[^\r\n]{0,80}\.(dat|tmp)\b
- id: delete-stage-var
  desc: Deletes staged variable-backed temp file
  crit: notable
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: (?i)\bdel\b[^\r\n]{0,20}%[A-Za-z0-9_]{3,}%\b
- id: temp-raw-base64-rebuild
  desc: Temp file raw base64 rebuild chain
  crit: suspicious
  conf: 0.93
  for:
  - batch
  - powershell
  if:
    type: text
    regex: '(?i)Get-Content.{0,80}\.tmp.{0,40}-Raw'
- id: ps-regex-repaired-base64
  desc: PowerShell regex repairs Base64
  crit: suspicious
  conf: 0.94
  for:
  - batch
  - powershell
  if:
    type: text
    regex: '(?i)FromBase64String.{0,80}\[regex\]::Replace'
- id: wide-b64-reflection-assembly
  desc: Encoded Reflection.Assembly load
  crit: suspicious
  conf: 0.94
  for:
  - batch
  - powershell
  if:
    type: text
    substr: AFIAZQBmAGwAZQBjAHQAaQBvAG4ALgBBAHMAcwBlAG0AYgBsAHkAXQA6ADo
- id: out-file-ps1-stage
  desc: Out-File writes ps1 stage
  crit: suspicious
  conf: 0.9
  for:
  - batch
  - powershell
  if:
    type: text
    regex: '(?i)Out-File.{0,80}\.ps1'
- id: set-content-ps1-stage
  desc: Set-Content writes ps1 stage
  crit: suspicious
  conf: 0.88
  for:
  - batch
  - powershell
  if:
    type: text
    regex: '(?i)Set-Content.{0,80}\.ps1'
- id: batch-echo-base64-stage
  desc: Batch echoes large base64 stage
  crit: suspicious
  conf: 0.9
  for:
  - batch
  count_min: 3
  if:
    type: text
    regex: '(?i)echo\s+[A-Za-z0-9+/=]{80,}\s*>>?\s*"?%TEMP%\\[A-Za-z0-9._-]+\.tmp"?'
- id: rem-marker-hidden-payload
  desc: Batch hides payload in REM markers
  crit: suspicious
  conf: 0.96
  for:
  - batch
  count_min: 2
  if:
    type: text
    regex: (?i)r\^?e\^?m\s+(wjiwkghu|cqtljtup)
- id: nuget-flatcontainer-fragment
  desc: Obfuscated NuGet flatcontainer URL
  crit: component
  conf: 0.93
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (?i)v3-fl.{0,16}at.{0,16}co.{0,24}(nta|#E-f#Enta)
- id: globalcdn-nuget-fragment
  desc: Obfuscated NuGet package CDN URL
  crit: component
  conf: 0.93
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (?i)(globalcdn\.nuget\.org|obalc.{0,16}Ed.{0,32}gun\.n)
- id: roslyn-csharp-package-fragment
  desc: Obfuscated Roslyn CodeAnalysis package
  crit: component
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (?i)codea.{0,40}nal
- id: outfile-param
  desc: OutFile parameter
  crit: component
  conf: 0.75
  for:
  - batch
  if:
    type: text
    regex: (?i)-OutFile
- id: python-bin-payload-arg
  desc: Python script binary payload arg
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: '(?i)\bpython(\.exe)?\s+[^\r\n]{1,80}\.py\s+-p\s+\S+\.bin\b'
- id: python-json-key-arg
  desc: Python script JSON key arg
  crit: component
  conf: 0.86
  for:
  - batch
  if:
    type: text
    regex: '(?i)\s-k\s+\S+\.json\b'
composite_rules:
- id: batch-python-staged-payload-launcher
  desc: Batch launches staged Python payload
  crit: hostile
  conf: 0.97
  attack: T1059.006
  for:
  - batch
  all:
  - id: micro-behaviors/process/interpreter/python::python-script-from-batch
  - id: micro-behaviors/fs/path/location::localappdata-short-subdir
  - id: python-bin-payload-arg
  - id: python-json-key-arg
  any:
  - id: micro-behaviors/process/create/hidden::start-minimized-self
  - id: micro-behaviors/fs/path/check::batch-multiple-if-exist-gates
  - id: micro-behaviors/os/console/io::windows-stdout-to-nul
  - id: micro-behaviors/os/console/io::stderr-redirect
  needs: 2
- id: batch-certutil-vbscript-stager
  desc: Batch decodes embedded payload then launches VBScript
  crit: hostile
  conf: 0.97
  attack: T1059.005
  all:
  - id: cert-fragment-var
  - id: util-fragment-var
  - id: decode-flag
  - id: cscript-fragment-var
  - id: nologo-fragment-var
  - id: vbscript-engine-fragment-var
  - id: vbscript-engine-tail-var
- id: batch-decoder-cleanup-stager
  desc: Batch decoder launches staged script then self-deletes
  crit: hostile
  conf: 0.98
  attack: T1070.004
  all:
  - id: batch-certutil-vbscript-stager
  - id: del-fragment-d-var
  - id: del-fragment-e-var
  - id: del-fragment-l-var
  - id: micro-behaviors/process/info/selfpath::self-path-fragment
  any:
  - id: redirect-null
  - id: delayed-expansion
  - id: micro-behaviors/data/encode/char-code::dense-chr-construction
- id: batch-obfuscated-vbscript-loader
  desc: Heavily obfuscated batch with embedded VBScript loader
  crit: hostile
  conf: 0.97
  attack: T1059.005
  all:
  - id: objectives/anti-static/obfuscation/string/anomaly::batch-fragmentation-metrics
  - id: batch-vbscript-set-literal
  - id: objectives/execution/interpreter/script/wsh::wscript-sleep
  any:
  - id: batch-chr-construction
  - id: objectives/command-and-control/dropper/execution/batch::redirect-null
- id: batch-obfuscated-self-deleting-loader
  desc: Obfuscated batch loader with self-delete cleanup
  crit: hostile
  conf: 0.96
  attack: T1070.004
  all:
  - id: objectives/anti-static/obfuscation/string/anomaly::batch-fragmentation-metrics
  - id: micro-behaviors/process/info/selfpath::self-path-fragment
  - id: redirect-null
  - id: objectives/command-and-control/dropper/execution/batch::echo-off
- id: batch-obfuscated-cleanup-dropper
  desc: Obfuscated batch dropper with staged cleanup pattern
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/anti-static/obfuscation/string/anomaly::batch-fragmentation-metrics
  - id: micro-behaviors/process/info/selfpath::self-path-fragment
  - id: redirect-null
  - id: objectives/command-and-control/dropper/execution/batch::echo-off
  - id: micro-behaviors/fs/file/delete::del-command
- id: powershell-download
  desc: PowerShell download cradle in batch
  crit: suspicious
  conf: 0.9
  for:
  - batch
  any:
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::invoke-webrequest
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::webclient-download
- id: download-tool
  desc: Download tool usage
  crit: suspicious
  conf: 0.7
  for:
  - batch
  any:
  - id: objectives/command-and-control/dropper/execution/batch::curl-cmd-dup
  - id: micro-behaviors/communications/http/download/curl::wget-path
  - id: download-file-ps
  - id: certutil-cmd
  - id: bitsadmin-cmd
- id: exec-cmd
  desc: Execution command
  crit: suspicious
  conf: 0.6
  for:
  - batch
  any:
  - id: objectives/command-and-control/dropper/execution/batch::start-hidden-dup
  - id: run-from-temp
  - id: call-label
  - id: call-comspec
  - id: call-cmd
- id: batch-download-execute
  desc: Download and execute pattern (batch)
  crit: suspicious
  conf: 0.95
  for:
  - batch
  near_lines: 30
  all:
  - id: echo-off
  - id: download-tool
  - id: exec-cmd
  - id: output-flag
- id: powershell-launcher
  desc: PowerShell launcher in batch
  crit: notable
  conf: 0.8
  for:
  - batch
  all:
  - id: micro-behaviors/process/create/shell/lang::powershell-invocation
  - id: powershell-command
- id: powershell-download-cradle
  desc: PowerShell download cradle
  crit: notable
  conf: 0.9
  for:
  - batch
  all:
  - id: micro-behaviors/process/create/shell/lang::powershell-invocation
  any:
  - id: outfile-param
  - id: powershell-download
  unless:
  - id: objectives/impact/deface/wallpaper::remote-downloaded-wallpaper-defacement
- id: temp-powershell-stage-rebuild
  desc: Batch rebuilds temp PowerShell stage
  crit: suspicious
  conf: 0.96
  for:
  - batch
  all:
