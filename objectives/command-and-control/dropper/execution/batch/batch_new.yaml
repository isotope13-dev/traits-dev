defaults:
  platforms:
  - windows
traits:
- id: curl-to-temp
  desc: Download to TEMP directory
  crit: notable
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: (?i)(curl|wget).{0,120}(\\Temp\\|%TMP%)
- id: certutil-download
  desc: Certutil download abuse
  crit: notable
  conf: 0.95
  for:
  - batch
  if:
    type: text
    regex: certutil\s+.{0,50}-urlcache.{0,30}-split.{0,30}-f
- id: bitsadmin-download
  desc: BitsAdmin download abuse
  crit: notable
  conf: 0.95
  for: [scripts]
  if:
    type: text
    regex: bitsadmin\s+.{0,50}\/transfer
  unless:
  - id: objectives/command-and-control/dropper/delivery/download-fallback/
- id: hidden-self-relaunch
  desc: Hidden self relaunch through cmd and call
  crit: suspicious
  conf: 0.94
  for:
  - batch
  if:
    type: text
    regex: (?i)start\s+["']?["']?\s*/min\s+cmd(\.exe)?\s+/c\s+call\s+"?%~f0"?
- id: self-relaunch-via-cmd
  desc: Batch relaunches itself through cmd call chain
  crit: suspicious
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: (?i)start[^\n]{0,120}cmd(\.exe)?[^\n]{0,80}/c[^\n]{0,80}call[^\n]{0,40}%~f0
- id: run-from-temp
  desc: Execute binary from TEMP directory
  crit: notable
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: (?i)start[^\n]{0,220}(%TEMP%|%TMP%)[^\n]{0,220}\.exe
  unless:
  - type: text
    regex: (?i)bootstrapper\.exe[^\n]{0,160}--action\s+install[^\n]{0,120}--eula=accept
- id: done-marker
  desc: Execution marker file
  crit: suspicious
  conf: 0.75
  for:
  - batch
  if:
    type: text
    regex: (?i)(if\s+exist|echo\.\s*>)[^\r\n]{0,80}\.(done|installed|complete)\b
- id: delayed-expansion
  desc: Delayed expansion enabled
  crit: component
  conf: 0.5
  for:
  - batch
  if:
    type: text
    substr: EnableDelayedExpansion
- id: download-file-ps
  desc: Downloads a file with PowerShell DownloadFile
  crit: notable
  conf: 0.5
  for:
  - batch
  if:
    type: text
    regex: (?i)DownloadFile
  unless:
  - id: metadata/package/manager::maven-wrapper-script
- id: certutil-cmd
  desc: certutil command
  crit: notable
  conf: 0.5
  for:
  - batch
  if:
    type: text
    regex: (?i)\bcertutil\b
- id: certutil-urlcache
  desc: certutil urlcache
  crit: suspicious
  conf: 0.95
  for:
  - batch
  unless:
  - type: text
    substr: CONTOOLS_BUILD_TOOLS_ROOT
  if:
    type: text
    regex: (?i)certutil[^\n]{0,220}-urlcache
- id: certutil-urlcache-split-force
  desc: certutil urlcache with split force
  crit: suspicious
  conf: 0.98
  for:
  - batch
  unless:
  - type: text
    substr: CONTOOLS_BUILD_TOOLS_ROOT
  if:
    type: text
    regex: (?i)certutil(\.exe)?\s+[^\n]{0,120}-urlcache[^\n]{0,60}-split[^\n]{0,60}-f
- id: certutil-decode
  desc: "certutil b64 decode (LOLBas payload staging)"
  crit: suspicious
  conf: 0.9
  attack: T1140
  # This atom describes a command-line batch operation.  The same command
  # text in a Python/Go test or documentation file is not execution evidence.
  for: [batch]
  if:
    type: text
    regex: (?i)certutil(\.exe)?\s+[^\n]{0,60}-decode\b
- id: cscript-nologo
  desc: cscript launched without logo banner
  crit: notable
  conf: 0.82
  for:
  - batch
  if:
    type: text
    regex: (?i)\bcscript(\.exe)?\b[^\n]{0,80}/nologo\b
- id: bitsadmin-cmd
  desc: bitsadmin command
  crit: notable
  conf: 0.75
  for: [scripts]
  if:
    type: text
    regex: '(?i)\bbitsadmin(\.exe)?\s+[\w-]+'
  unless:
  - id: metadata/library/structure::js-vite-rollup-vendor-chunk
  - id: metadata/library/runtime::acquire-vscode-api
  - id: micro-behaviors/process/interpreter/vm/
- id: start-exe
  desc: Start an executable
  crit: component
  conf: 0.6
  for:
  - batch
  if:
    type: text
    regex: (?i)start\s+[^\n]{0,120}\.exe
  unless:
  - type: basename
    regex: ^clink\.bat$
- id: batch-rename-text-to-rar
  desc: Batch renames text file to RAR archive
  crit: suspicious
  conf: 0.9
  for: [batch]
  if:
    type: text
    regex: (?im)^\s*rename\s+\S+\.txt\s+\S+\.rar\s*$
- id: batch-password-rar-extract
  desc: Batch extracts passworded RAR payload
  crit: suspicious
  conf: 0.92
  for: [batch]
  if:
    type: text
    regex: (?im)^\s*"?[A-Za-z0-9_.-]+\.exe"?\s+e\s+-p\S+\s+\S+\.rar\s*$
- id: batch-starts-vbs-payload
  desc: Batch starts VBS payload
  crit: suspicious
  conf: 0.9
  for: [batch]
  if:
    type: text
    regex: '(?im)^\s*start\s+(""\s+)?"?%~dp0[^"\r\n]{1,40}\.vbs"?\s*$'
- id: batch-rar-script-cleanup
  desc: Batch deletes staged RAR and script artifacts
  crit: component
  conf: 0.86
  for: [batch]
  count_min: 2
  if:
    type: text
    regex: (?im)^\s*del\s+/f\s+/q\s+"?.{1,120}\.(rar|bat)"?\s*$
- id: start-http-php-url
  desc: Batch starts HTTP PHP URL
  crit: suspicious
  conf: 0.9
  for: [batch]
  if:
    type: text
    regex: '(?i)\bstart\s+https?://[^\s"''&|]{1,120}\.php\b'
- id: curl-remote-exe
  desc: Download and run remote executable
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: (?i)\bcurl(\.exe)?\s+[^\n]{0,120}https?://[^\s&|"]{1,200}\.exe\b
- id: output-flag
  desc: curl writes downloaded output file
  crit: component
  conf: 0.4
  for:
  - batch
  if:
    type: text
    regex: (?i)\bcurl\b[^\n]{0,120}\s-o\s
- id: call-label
  desc: Call local batch label
  crit: component
  conf: 0.4
  for:
  - batch
  if:
    type: text
    regex: (?im)^\s*@?call\s+:[A-Za-z0-9_.$-]+
  not:
  - substr: 'SET dp0=%~dp0'
  - substr: 'goto #_undefined_# 2>NUL'
  unless:
  - type: basename
    regex: ^clink\.bat$
- id: call-comspec
  desc: Call COMSPEC interpreter
  crit: suspicious
  conf: 0.4
  for:
  - batch
  if:
    type: text
    regex: (?im)^\s*@?call\s+%comspec%\b
- id: call-cmd
  desc: Call cmd interpreter
  crit: notable
  conf: 0.4
  for:
  - batch
  not:
  - regex: (?im)^\s*@?call\s+cmd(\.exe)?\s+%\*\s*$
  unless:
  - type: text
    regex: (?im)^\s*@?call\s+cmd(\.exe)?\s+%\*\s*$
  - type: basename
    exact: start-ssh-agent.cmd
  if:
    type: text
    regex: (?im)^\s*@?call\s+cmd(\.exe)?\b
- id: powershell-command
  desc: PowerShell command flag
  crit: notable
  conf: 0.7
  for:
  - batch
  if:
    type: text
    regex: (?i)powershell[^\n]{0,220}-[Cc]\s
- id: powershell-file-flag
  desc: PowerShell file execution flag
  crit: notable
  conf: 0.82
  for:
  - batch
  unless:
  - type: text
    substr: Stop-Process -f -ProcessName explorer
  - type: text
    substr: Media.SoundPlayer
  - id: well-known/app/wireshark/
  - type: text
    substr: ':PSDownload <URL> <FileLocation>'
  - id: metadata/file/string/identity/
  if:
    type: text
    regex: (?i)powershell(\.exe)?[^\n]{0,120}-(File|F)\s
- id: temp-ps1-stage-path
  desc: Temp PowerShell script stage path
  crit: suspicious
  conf: 0.88
  for:
  - batch
  - powershell
  unless:
  - type: text
    substr: ':PSDownload <URL> <FileLocation>'
  - id: well-known/tool/development/setup-php::setup-php-action-source
  if:
    type: text
    regex: (?i)(%TEMP%|%TMP%|\$env:TEMP|\$env:TMP)[^\\\r\n]{0,40}\\[A-Za-z0-9._-]+\.ps1
- id: temp-tmp-stage-path
  desc: Temp intermediate stage file path
  crit: suspicious
  conf: 0.82
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (?i)(%TEMP%|%TMP%|\$env:TEMP|\$env:TMP)[^\\\r\n]{0,40}\\[A-Za-z0-9._-]+\.tmp
  unless:
  - type: text
    regex: (?i)(%TEMP%|%TMP%)\\_(envset|envget)\.tmp\b
  - type: text
    substr: pscult.tmp
- id: temp-dat-stage-path
  desc: Temp DAT intermediate stage path
  crit: suspicious
  conf: 0.84
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (?i)(%TEMP%|%TMP%|\$env:TEMP|\$env:TMP)[^\\\r\n]{0,40}\\[A-Za-z0-9._-]+\.dat
- id: temp-jpg-payload-copy
  desc: Copies JPG payload to executable
  crit: suspicious
  conf: 0.92
  for:
  - batch
  count_min: 3
  if:
    type: text
    regex: '(?i)copy.{0,40}%temp%\\.{1,80}\.jpg.{0,120}\.(exe|dll|cmd|msi|ini)'
- id: ultravnc-ini-stage
  desc: Stages UltraVNC configuration
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: UltraVNC.ini
- id: ultravnc-settings-stage
  desc: Stages UltraVNC settings helper
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: uvnc_settings.exe
- id: ultravnc-hooks-stage
  desc: Stages UltraVNC hook DLL
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: vnchooks.dll
- id: ultravnc-viewer-stage
  desc: Stages UltraVNC viewer
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: vncviewer.exe
- id: user-profile-system-name-launch
  desc: Starts system-named exe from user profile
  crit: component
  conf: 0.88
  for:
  - batch
  if:
    type: text
    regex: '(?i)start\s+""\s+"C:\\Users\\[^"\r\n]{1,70}\\(services|system|wmiprvse)\.exe"'
- id: tasks-system-name-launch
  desc: Starts system-named exe from Windows Tasks
  crit: component
  conf: 0.88
  for:
  - batch
  if:
    type: text
    regex: '(?i)start\s+""\s+"C:\\Windows\\Tasks\\(services|system|wmiprvse)\.exe"'
- id: w32tm-local-delay
  desc: w32tm localhost delay command
  crit: suspicious
  conf: 0.86
  for:
  - batch
  if:
    type: text
    regex: '(?i)w32tm\s+/stripchart\s+/computer:localhost.{0,80}/samples:\d+'
- id: renamed-regsvr32-temp-exec
  desc: Renamed regsvr32 temp execution
  crit: suspicious
  conf: 0.94
  for:
  - batch
  if:
    type: text
    regex: '(?is)%[A-Za-z][A-Za-z0-9_]*%32\\\\%1vr32\.exe.{0,180}%temp%\\\\.{1,80}\.exe.{0,180}\.dat'
- id: obfuscated-powershell-webclient-downloadfile
  desc: Obfuscated PowerShell WebClient download
  crit: suspicious
  conf: 0.95
  attack: T1105
  for:
  - batch
  if:
    type: text
    regex: '(?is)Down.{0,40}loAdFi.{0,40}le.{0,180}Update-KB.{0,40}\.ps1'
- id: obfuscated-powershell-hidden-file
  desc: Obfuscated hidden PowerShell file execution
  crit: suspicious
  conf: 0.95
  attack: T1059.001
  for:
  - batch
  if:
    type: text
    regex: '(?is)Win.{0,60}dOw.{0,40}stY.{0,40}le.{0,60}hI.{0,40}d.{0,40}Den.{0,180}\.ps1'
- id: batch-python-remote-base64-exec
  desc: Batch Python fetches base64
  crit: suspicious
  conf: 0.96
  attack: T1059.006
  for:
  - batch
  if:
    type: text
    regex: '(?i)requests,base64;\s*exec\(base64\.b64decode\(requests\.get\('
- id: batch-python-remote-base64-exec-bytes
  desc: Batch Python executes base64 bytes
  crit: suspicious
  conf: 0.96
  attack: T1059.006
  for:
  - batch
  if:
    type: hex
    pattern: "72 65 71 75 65 73 74 73 2c 62 61 73 65 36 34 3b 20 65 78 65 63 28 62 61 73 65 36 34 2e 62 36 34 64 65 63 6f 64 65 28 72 65 71 75 65 73 74 73 2e 67 65 74 28"
- id: public-exe-python-command
  desc: Public executable runs Python command
  crit: suspicious
  conf: 0.94
  attack: T1036.005
  for:
  - batch
  if:
    type: text
    regex: '(?i)\\Users\\Public\\[^"\r\n]{1,80}\.exe"?\s+-c\s+"import'
- id: webdav-ip-unc-pushd
  desc: Changes into external WebDAV share
  crit: suspicious
  conf: 0.94
  for:
  - batch
  if:
    type: text
    regex: '(?im)^\s*pushd\s+\\\\([0-9]{1,3}\.){3}[0-9]{1,3}\\DavWWWRoot\b'
- id: copy-exe-to-temp
  desc: Copies executable into TEMP path
  crit: notable
  conf: 0.82
  for:
  - batch
  if:
    type: text
    regex: '(?im)^\s*copy\s+[^\r\n]{1,120}\.exe\s+%TEMP%\\[A-Za-z0-9._-]+\.exe\b'
- id: copy-bin-to-temp-dat
  desc: Copies binary payload into TEMP
  crit: suspicious
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: '(?im)^\s*copy\s+[^\r\n]{1,120}\.bin\s+%TEMP%\\[A-Za-z0-9._-]+\.dat\b'
- id: dat-payload-to-temp-wildcard
  desc: Copies DAT payload into TEMP wildcard target
  crit: suspicious
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: '(?i)\.dat\s+%TEMP%\\\*'
- id: fragmented-rundll32-temp-dat-export
  desc: Fragmented rundll32 loads TEMP DAT export
  crit: suspicious
  conf: 0.94
  for:
  - batch
  if:
    type: text
    regex: '(?i)%[A-Za-z0-9_]{4,}%32\s+%TEMP%\\[^,\r\n]{1,60}\.dat,'
- id: single-letter-var-substitution-table
  desc: Batch single-letter substitution table
  crit: suspicious
  conf: 0.92
  for:
  - batch
  count_min: 16
  if:
    type: text
    regex: '(?im)^set\s+[a-z]{6,12}=[a-z]\r?$'
- id: fragmented-ll32-temp-call
  desc: Fragmented ll32 call into TEMP
  crit: suspicious
  conf: 0.93
  for:
  - batch
  if:
    type: text
    regex: '(?i)%[A-Za-z0-9_]+%%[A-Za-z0-9_]+%32\s+%TEMP%\\'
- id: fragmented-temp-export-path
  desc: Fragmented TEMP export path
  crit: suspicious
  conf: 0.92
  for:
  - batch
  if:
    type: text
    regex: '(?i)%TEMP%\\%[A-Za-z0-9_]+%[^ \r\n]{1,120},%[A-Za-z0-9_]+%'
- id: fragmented-copy-to-temp-wildcard
  desc: Fragmented copy into TEMP wildcard
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    substr: '%TEMP%\*'
- id: batch-delimiter-token-variable
  desc: Batch delimiter token variable
  crit: suspicious
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: "(?im)^SET\\s+[A-Z0-9_]{2,8}='[A-Z0-9]{6,12}'"
- id: batch-long-quoted-base64-variable
  desc: Batch long quoted base64 variable
  crit: suspicious
  conf: 0.94
  for:
  - batch
  if:
    type: text
    regex: "(?im)^SET\\s+[A-Z0-9_]{2,8}='[A-Za-z0-9+/]{300,}"
- id: keyed-temp-payload-launch--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - batch
  if:
    type: text
    substr: start
    case_insensitive: true
  count_max: 1010158
- id: grouped-echo-stage-redirect--rx-3
  desc: Batch echo redirects staged content
  crit: component
  conf: 0.94
  for:
  - batch
  if:
    type: text
    regex: '(?im)^\s*\(?\s*e\^?c\^?h\^?o\s+.{1,200}>>?\s*'
  count_max: 1010160
- id: embedded-pe-base64-prefix
  desc: Embedded PE base64 prefix in echoed payload
  crit: suspicious
  conf: 0.92
  for:
  - batch
  if:
    type: text
    regex: (?im)^\s*echo\s+TVpQAAIA[A-Za-z0-9+/=]{20,}
- id: delete-stage-var
  desc: Deletes staged variable-backed temp file
  crit: notable
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: (?i)\bdel\b[^\r\n]{0,20}%[A-Za-z0-9_]{3,}%\b
- id: temp-raw-base64-rebuild
  desc: Temp file raw base64 rebuild chain
  crit: suspicious
  conf: 0.93
  for:
  - batch
  - powershell
  if:
    type: text
    regex: '(?i)Get-Content.{0,80}\.tmp.{0,40}-Raw'
- id: ps-regex-repaired-base64
  desc: PowerShell regex repairs Base64
  crit: suspicious
  conf: 0.94
  for:
  - batch
  - powershell
  if:
    type: text
    regex: '(?i)FromBase64String.{0,80}\[regex\]::Replace'
- id: wide-b64-reflection-assembly
  desc: Encoded Reflection.Assembly load
  crit: suspicious
  conf: 0.94
  for:
  - batch
  - powershell
  if:
    type: text
    substr: AFIAZQBmAGwAZQBjAHQAaQBvAG4ALgBBAHMAcwBlAG0AYgBsAHkAXQA6ADo
- id: out-file-ps1-stage
  desc: Out-File writes ps1 stage
  crit: suspicious
  conf: 0.9
  for:
  - batch
  - powershell
  if:
    type: text
    regex: 'Out-File[^\n]{0,120}\.ps1'
  unless:
  - type: path
    regex: '(^|[\\/])Create-IntuneRemediation\.ps1$'
- id: batch-echo-base64-stage
  desc: Batch echoes large base64 stage
  crit: suspicious
  conf: 0.9
  for:
  - batch
  count_min: 3
  if:
    type: text
    regex: '(?i)echo\s+[A-Za-z0-9+/=]{80,}\s*>>?\s*"?%TEMP%\\[A-Za-z0-9._-]+\.tmp"?'
- id: rem-marker-hidden-payload
  desc: Batch hides payload in REM markers
  crit: suspicious
  conf: 0.96
  for:
  - batch
  count_min: 2
  if:
    type: text
    regex: (?i)r\^?e\^?m\s+(wjiwkghu|cqtljtup)
- id: nuget-flatcontainer-fragment
  desc: Obfuscated NuGet flatcontainer URL
  crit: component
  conf: 0.93
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (?i)v3-fl.{0,16}at.{0,16}co.{0,24}(nta|#E-f#Enta)
- id: globalcdn-nuget-fragment
  desc: Obfuscated NuGet package CDN URL
  crit: component
  conf: 0.93
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (?i)(globalcdn\.nuget\.org|obalc.{0,16}Ed.{0,32}gun\.n)
- id: roslyn-csharp-package-fragment
  desc: Obfuscated Roslyn CodeAnalysis package
  crit: component
  conf: 0.95
  for:
  - batch
  - powershell
  if:
    type: text
    regex: (?i)codea.{0,40}nal
- id: python-bin-payload-arg
  desc: Python script binary payload arg
  crit: component
  conf: 0.9
  for:
  - batch
  if:
    type: text
    regex: '(?i)\bpython(\.exe)?\s+[^\r\n]{1,80}\.py\s+-p\s+\S+\.bin\b'
- id: python-json-key-arg
  desc: Python script JSON key arg
  crit: component
  conf: 0.86
  for:
  - batch
  if:
    type: text
    regex: '(?i)\s-k\s+\S+\.json\b'
composite_rules:
- id: batch-rar-vbs-payload-dropper
  desc: Batch passworded RAR to VBS payload dropper
  crit: hostile
  conf: 0.97
  for: [batch]
  all:
  - id: batch-rename-text-to-rar
  - id: batch-password-rar-extract
  - id: batch-starts-vbs-payload
  any:
  - id: batch-rar-script-cleanup
  - id: objectives/impact/degrade/system/file::batch-deletes-desktop-exe
  needs: 1
- id: batch-python-staged-payload-launcher
  desc: Batch launches staged Python payload
  crit: hostile
  conf: 0.97
  attack: T1059.006
  for:
  - batch
  all:
  - id: micro-behaviors/process/interpreter/python::python-script-from-batch
  - id: micro-behaviors/fs/path/location::localappdata-short-subdir
  - id: python-bin-payload-arg
  - id: python-json-key-arg
  any:
  - id: micro-behaviors/process/create/hidden::start-minimized-self
  - id: micro-behaviors/fs/path/check::batch-multiple-if-exist-gates
  - id: micro-behaviors/os/console/io::windows-stdout-to-nul
  - id: micro-behaviors/os/console/io::stderr-redirect
  needs: 2
- id: batch-obfuscated-self-deleting-loader
  desc: Obfuscated batch loader with self-delete cleanup
  crit: hostile
  conf: 0.96
  attack: T1070.004
  all:
  - id: objectives/anti-static/obfuscation/string/anomaly::batch-fragmentation-metrics
  - id: micro-behaviors/process/info/selfpath::self-path-fragment
  - id: micro-behaviors/os/console/io::output-suppression
- id: batch-obfuscated-cleanup-dropper
  desc: Obfuscated batch dropper with staged cleanup pattern
  crit: hostile
  conf: 0.97
  all:
