defaults:
  platforms: [windows]
  for: [batch]
  attack: T1105

traits:
  - id: temp-exe-stage-path
    desc: Temp executable stage path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(%TEMP%|\\Windows\\Temp\\)[^ \r\n''"]{1,40}\.exe'

  - id: temp-dll-stage-path
    desc: Temp DLL stage path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(%TEMP%|\\Windows\\Temp\\|\\ProgramData\\)[^ \r\n''"]{1,48}\.dll'

  - id: temp-encrypted-stage-path
    desc: Temp encrypted payload path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(%TEMP%|\\Windows\\Temp\\|\\Microsoft\\)[^ \r\n''"]{1,48}\.(tmp|dat)'

  - id: rc4-key-argument-hint
    desc: Loader key argument hint
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '(?i)\s(first_match|[A-Za-z0-9_]{8,32})\s*(&&|$)'

composite_rules:
  - id: rundll32-temp-dll-export
    desc: rundll32 loads temp DLL export
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/process/create/shell/invoke::rundll32-exec
      - id: temp-dll-stage-path

  - id: webclient-temp-exe-execute-delete
    desc: WebClient temp exe execute delete
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/command-and-control/dropper/execution/batch::download-file-ps
      - id: temp-exe-stage-path
      - id: micro-behaviors/fs/file/delete::del-command
    any:
      - id: micro-behaviors/process/create/shell/invoke::cmd-exe-c-command
      - id: micro-behaviors/process/create/shell/lang::powershell-invocation

  - id: webclient-rundll32-temp-dll-loader
    desc: WebClient temp DLL rundll32 loader
    crit: hostile
    conf: 0.97
    attack: T1218.011
    all:
      - id: objectives/command-and-control/dropper/execution/batch::download-file-ps
      - id: rundll32-temp-dll-export

  - id: webclient-encrypted-loader-chain
    desc: WebClient encrypted loader chain
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/dropper/execution/batch::download-file-ps
      - id: temp-exe-stage-path
      - id: temp-encrypted-stage-path
      - id: rc4-key-argument-hint
