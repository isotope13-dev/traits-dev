# Batch launchers that rebuild Start-Process / Hidden / -ep bypass via
# short string concatenation, then WriteAllText a extracted PowerShell stage.
# Catches MulDrop / invoice-lure BAT families that fragment PS keywords so
# naive substring scanners miss the relaunch chain.
defaults:
  platforms: [windows]
  for: [batch]
  attack: T1027,T1059.001,T1059.003,T1564.003
  mbc: B0032,E1059

composite_rules:
  - id: batch-concat-hidden-ps-launcher
    desc: Batch hidden PS via concat fragments
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/start-process::start-process-string-concat
      - id: micro-behaviors/process/create/hidden::hidden-windowstyle-string-concat
      - id: micro-behaviors/process/create/hidden::ep-bypass-flag
    any:
      - id: micro-behaviors/fs/write/file/direct::write-all-text
      - id: micro-behaviors/fs/write/file/direct::write-all-text-via-type
      - id: micro-behaviors/fs/write/file/direct::write-all-bytes
    needs: 1
