# Batch-based Dropper Objectives
# Detects intentional payload delivery via Windows Batch scripts
defaults:
  attack: T1105
  crit: hostile
  conf: 0.9
  platforms: [windows]
  for: [batch]
traits:
  - id: python-bin-input-arg
    desc: Python script binary input arg
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bpython(\.exe)?\s+[^\r\n]{1,80}\.py\s+-i\s+\S+\.bin\b'
  - id: python-txt-key-arg
    desc: Python script text key arg
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\s-k\s+\S+\.txt\b'
  - id: python-embed-zip-url
    desc: Python embeddable runtime URL
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '(?i)python-[0-9.]+[a-z0-9.-]*-embed-amd64\.zip'
composite_rules:
  - id: batch-python-bin-txt-payload-launcher
    desc: Batch launches Python bin/key payload
    crit: hostile
    conf: 0.98
    attack: T1059.006
    all:
      - id: micro-behaviors/process/interpreter/python::python-script-from-batch
      - id: python-bin-input-arg
      - id: python-txt-key-arg
    any:
      - id: micro-behaviors/fs/path/location::localappdata-short-subdir
      - id: micro-behaviors/process/create/hidden::powershell-windowstyle-hidden
      - id: objectives/persistence/login/startup/folder::batch-echo-startup-script
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::batch-powershell-iwr-alias
      - id: python-embed-zip-url
    needs: 2
  - id: batch-lolbin-dropper
    desc: Batch script using LOLBins to download and execute
    mbc: "C0002"
    all:
      - id: objectives/command-and-control/dropper/execution/batch::download-tool
      - id: objectives/command-and-control/dropper/execution/batch::exec-cmd
    any:
      - id: objectives/command-and-control/dropper/execution/batch::certutil-urlcache
      - id: objectives/command-and-control/dropper/execution/batch::bitsadmin-download
      - id: objectives/command-and-control/dropper/execution/batch::powershell-download
  - id: batch-staging-dropper
    desc: Batch script downloading and executing from staging directory
    mbc: "E1074"
    all:
      - id: objectives/command-and-control/dropper/execution/batch::download-tool
      - id: objectives/command-and-control/dropper/execution/batch::exec-cmd
    any:
      - id: micro-behaviors/fs/file/write/staging::users-public-path
      - id: objectives/command-and-control/dropper/execution/batch::run-from-temp
  - id: batch-arch-aware-dropper
    desc: Architecture-aware batch dropper
    mbc: "C0002"
    all:
      - id: objectives/command-and-control/dropper/execution/batch::download-tool
      - id: objectives/command-and-control/dropper/execution/batch::wmic-arch-check
    any:
      - id: objectives/command-and-control/dropper/execution/batch::exec-cmd
      - id: micro-behaviors/fs/file/write/staging::users-public-path
  - id: batch-certutil-tcp-stager
    desc: Batch certutil stager with TCP stage query and architecture split
    mbc: "B0024"
    all:
      - id: objectives/command-and-control/infrastructure/ip::staged-tcp-query
      - id: objectives/command-and-control/dropper/execution/batch::certutil-urlcache-split-force
      - id: objectives/command-and-control/dropper/execution/batch::wmic-arch-check
      - id: micro-behaviors/fs/file/write/staging::users-public-path
    any:
      - id: objectives/command-and-control/dropper/execution/batch::exec-cmd
      - id: micro-behaviors/fs/file/delete::del-command
