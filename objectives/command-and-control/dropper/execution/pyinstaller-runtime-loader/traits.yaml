defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1027,T1059.006"
  mbc: "B0032,B0009"

composite_rules:
  - id: pyinstaller-runtime-source-loader
    desc: PyInstaller loader executes XOR-decoded Python source
    crit: hostile
    conf: 0.99
    scope: outer
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-extraction
      - id: micro-behaviors/data/decode/xor::python-xor-string-decoder-bytecode
      - id: micro-behaviors/process/interpreter/reflection/runtime::python-runtime-compile-exec-tail
