# JavaScript Script Dropper Patterns
defaults:
  platforms: [linux, unix, macos, windows, android, ios]
  for: [javascript]

traits:
  - id: jscript-rundll32-dropper
    desc: JScript executing rundll32
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "rundll32(\\.exe)?\\s+.{0,100}DllRegisterServer"
  - id: jscript-xor-numeric-encoded-dropper
    desc: JScript with numeric XOR encoding
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: "String\\.fromCharCode\\(.{0,50}\\^\\s*\\d+\\)"

  - id: obfuscated-jscript-signed-comment-loader
    desc: JScript loader with signed comments
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/package/tooling::has-sourcemap
    if:
      type: text
      substr: "//# sourceMappingURL=data:application/json;base64,"
  - id: obfuscated-jscript-signed-entropy-loader
    desc: JScript loader with high entropy comments
    crit: suspicious
    conf: 0.85
    for: [none]
    size_min: 200
    if:
      type: text
      regex: '(^|\n)//[A-Za-z0-9+/=\n]{200,}'
    unless:
      - type: text
        regex: "///[A-Za-z0-9+/]{100,}"
      - type: text
        regex: '//\s*0x[0-9a-fA-F]{64,}'
      - type: text
        substr: "github.com/owl-factory/lantern/blob/"
      - type: text
        substr: "See also https://github.com/"
      - type: basename
        regex: \.min\.js$
      - type: structure
        feature: binary/format/pe
  - id: wsh-percent-encoded-unescape-loader
    desc: JScript percent-encoded unescape loader
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    if:
      type: text
      substr: al(un?scap?(
  - id: wsh-percent-encoded-xmlhttp-url
    desc: Encoded MSXML2 XMLHTTP fragment
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    if:
      type: text
      substr: MSXML:32:2EXMLHT
  - id: wsh-percent-encoded-http-url
    desc: Encoded HTTP URL fragment
    crit: notable
    conf: 0.92
    platforms: [windows]
    if:
      type: text
      substr: http:3A:2F:2F
  - id: wsh-percent-encoded-admin-php
    desc: Encoded admin.php path fragment
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    if:
      type: text
      substr: admin:2Ephp:3Ff:3D:34:30:34
  - id: wsh-percent-encoded-templates-exe
    desc: Encoded Templates folder fragment
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    if:
      type: text
      substr: Sp?cialFold?rs:28:22T?mplat?s:22
  - id: wsh-percent-encoded-exe-ext
    desc: Encoded EXE extension fragment
    crit: suspicious
    conf: 0.93
    platforms: [windows]
    if:
      type: text
      substr: 2B:22:2E?x?:22:3B:0D
  - id: wsh-percent-encoded-shell-exec-path
    desc: Encoded ShellExecute path fragment
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    if:
      type: text
      substr: x?cut?:28path
  - id: wsh-percent-encoded-shell-app
    desc: Encoded Shell.Application fragment
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    if:
      type: text
      substr: sh?ll:2Eapplication
  - id: wsh-percent-encoded-open-verb
    desc: Encoded open verb fragment
    crit: component
    conf: 0.9
    platforms: [windows]
    if:
      type: text
      substr: op?n:22:2C:20:31:29

composite_rules:
  - id: jscript-xmlhttp-adodb-dropper
    desc: JScript XMLHTTP and ADODB.Stream dropper
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: micro-behaviors/fs/write/file::js-adodb-stream-create
  - id: jscript-embedded-base64-adodb-dropper
    desc: JScript with embedded base64 and ADODB.Stream
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/decode/base64::base64-decode
      - id: micro-behaviors/fs/write/file::js-adodb-stream-create
  - id: obfuscated-jscript-decoder-loader
    desc: Obfuscated JScript decoder and loader
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/data/decode/base64::base64-decode
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
  - id: wsh-temp-exe-download-exec
    desc: WSH temp EXE download and execute
    crit: hostile
    conf: 0.98
    attack: "T1105"
    all:
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: micro-behaviors/fs/write/file::js-adodb-stream-reference
      - id: objectives/execution/interpreter/script/wsh::wsh-response-body
      - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file
      - id: objectives/execution/interpreter/script/wsh::wsh-expand-env-strings
      - id: micro-behaviors/fs/path/temp::any-temp-path
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-via-brackets
      - id: micro-behaviors/process/create/script/wsh::wsh-do-wait-readystate
  - id: wsh-percent-encoded-download-chain
    desc: Percent-encoded WSH download chain
    crit: suspicious
    conf: 0.97
    platforms: [windows]
    all:
      - id: wsh-percent-encoded-xmlhttp-url
      - id: wsh-percent-encoded-admin-php
      - id: wsh-percent-encoded-templates-exe
      - id: wsh-percent-encoded-exe-ext
    any:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: objectives/execution/interpreter/eval/dynamic::eval-transformed-code
      - id: wsh-percent-encoded-unescape-loader
  - id: wsh-percent-encoded-download-exec
    desc: Percent-encoded WSH EXE drop and launch
    crit: hostile
    conf: 0.99
    attack: T1059.007, T1105, T1027
    platforms: [windows]
    all:
      - id: objectives/execution/activex/com::activex-object-create
      - id: wsh-percent-encoded-download-chain
      - id: wsh-percent-encoded-shell-app
      - id: wsh-percent-encoded-shell-exec-path
      - id: wsh-percent-encoded-open-verb
