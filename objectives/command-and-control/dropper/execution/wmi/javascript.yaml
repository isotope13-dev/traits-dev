defaults:
  platforms: [windows]
  for: [javascript]

traits:
  - id: afcrk-split-powershell-launch
    desc: AFcrk-split PowerShell launch command
    crit: component
    conf: 0.96
    if:
      type: text
      substr: powAFcrkFAbmFdInkerAFcrkFAbmFdInksh
  - id: afcrk-split-frombase64string
    desc: AFcrk-split FromBase64String call
    crit: component
    conf: 0.96
    if:
      type: text
      substr: se6AFcrkFAbmFdInk4s
  - id: afcrk-split-iex
    desc: AFcrk-split PowerShell iex call
    crit: component
    conf: 0.96
    if:
      type: text
      substr: ieAFcrkFAbmFdInkx $
  - id: afcrk-split-replace-token
    desc: AFcrk-split replacement token
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "'fAFcrkFAbmFdInk#'"

composite_rules:
  - id: wsh-hidden-base64-powershell-wmi-loader
    desc: WSH hidden base64 PowerShell WMI loader
    crit: hostile
    conf: 0.98
    attack: T1059.007, T1059.001, T1047
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::js-afcrk-repeated-marker-token
      - id: objectives/execution/interpreter/scripting/host::winmgmts-string
      - id: objectives/execution/wmi::hidden-window-flag-dup
      - id: afcrk-split-powershell-launch
      - id: afcrk-split-frombase64string
    any:
      - id: afcrk-split-iex
      - id: afcrk-split-replace-token
      - id: objectives/execution/wmi::process-startup-spawninstance-symbol
