defaults:
  platforms: [windows]
  for: [javascript]

traits:
  - id: afcrk-split-powershell-launch
    desc: AFcrk-split PowerShell launch command
    crit: component
    conf: 0.96
    if:
      type: text
      substr: powAFcrkFAbmFdInkerAFcrkFAbmFdInksh
  - id: afcrk-split-frombase64string
    desc: AFcrk-split FromBase64String call
    crit: component
    conf: 0.96
    if:
      type: text
      substr: se6AFcrkFAbmFdInk4s
  - id: afcrk-split-iex
    desc: AFcrk-split PowerShell iex call
    crit: component
    conf: 0.96
    if:
      type: text
      substr: ieAFcrkFAbmFdInkx $
  - id: afcrk-split-replace-token
    desc: AFcrk-split replacement token
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "'fAFcrkFAbmFdInk#'"
  - id: gcfombg-split-powershell-launch
    desc: gcFombg-split PowerShell launch command
    crit: component
    conf: 0.96
    if:
      type: text
      substr: pogcFombgkSgmerAwegcFombgkSgmerAr
  - id: gcfombg-split-copyitem
    desc: gcFombg-split Copy-Item persistence
    crit: component
    conf: 0.95
    if:
      type: text
      substr: CgcFombgkSgmerAopygcFombgk
  - id: gcfombg-split-replace-token
    desc: gcFombg-split replacement token
    crit: component
    conf: 0.94
    if:
      type: text
      substr: fgcFombgkSgmerA#

composite_rules:
  - id: unicode-obfuscated-wsh-wmi-stage
    desc: Unicode-obfuscated WSH WMI staged process launcher
    crit: hostile
    conf: 0.99
    attack: "T1027.002,T1047,T1059.001,T1059.007,T1564.003"
    mbc: E1043
    all:
      - id: objectives/execution/wmi::js-hidden-process-create-sequence
      - id: objectives/execution/activex/com::activex-wscript-shell-literal
      - id: objectives/anti-static/obfuscation/steganography/unicode::js-nonascii-split-join-cleanup
      - id: micro-behaviors/data/decode/base64::decoded-text-carrier
      - id: micro-behaviors/os/env/access::wsh-environment-item-assignment

  - id: wsh-hidden-base64-powershell-wmi-loader
    desc: WSH hidden base64 PowerShell WMI loader
    crit: hostile
    conf: 0.98
    attack: T1059.007, T1059.001, T1047
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::js-afcrk-repeated-marker-token
      - id: objectives/execution/interpreter/scripting/host::winmgmts-string
      - id: objectives/execution/wmi::hidden-window-flag-dup
      - id: afcrk-split-powershell-launch
      - id: afcrk-split-frombase64string
    any:
      - id: afcrk-split-iex
      - id: afcrk-split-replace-token
      - id: objectives/execution/wmi::process-startup-spawninstance-symbol
  - id: wsh-hidden-gcfombg-powershell-wmi-loader
    desc: WSH hidden gcFombg PowerShell WMI loader
    crit: hostile
    conf: 0.98
    attack: T1059.007, T1059.001, T1047
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::js-gcfombg-repeated-marker-token
      - id: objectives/execution/wmi::wmi-hidden-startup-process
      - id: gcfombg-split-powershell-launch
      - id: gcfombg-split-copyitem
    any:
      - id: gcfombg-split-replace-token
      - id: objectives/execution/wmi::win32-process-fragmented
  - id: obfuscated-wsh-hidden-wmi-startup
    desc: Obfuscated WSH hidden WMI process startup
    crit: hostile
    conf: 0.96
    attack: "T1059.007,T1047,T1564.003"
    all:
      - id: objectives/execution/wmi::wmi-hidden-startup-process
      - id: objectives/anti-static/obfuscation/string/encoding::js-long-marker-split-join-cleanup
      - id: micro-behaviors/process/interpreter/jscript::activex-object
  - id: env-staged-hidden-wmi-launcher
    desc: Env-staged hidden WMI launcher
    crit: hostile
    conf: 0.98
    attack: "T1059.007,T1059.001,T1047,T1564.003"
    all:
      - id: objectives/execution/wmi::wmi-hidden-startup-process
      - id: objectives/anti-static/obfuscation/string/encoding::js-split-join-cleanup
      - id: micro-behaviors/process/interpreter/jscript::activex-object
      - id: micro-behaviors/os/env/access::env-item-random-variable
  - id: unicode-separator-hidden-wmi-powershell-loader
    desc: Unicode-obfuscated hidden WMI PowerShell loader
    crit: hostile
    conf: 0.99
    attack: "T1027.002,T1047,T1059.001,T1059.007,T1564.003"
    mbc: B0032
    all:
      - id: objectives/execution/wmi::wmi-staged-hidden-powershell-process
      - id: objectives/anti-static/obfuscation/steganography/unicode::js-nonascii-split-join-cleanup
      - id: micro-behaviors/os/env/access::env-item-random-variable
      - id: micro-behaviors/communications/http/url/domain::workers-dev-url
