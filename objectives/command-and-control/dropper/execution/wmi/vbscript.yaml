defaults:
  platforms: [windows]
  for: [vbs]
  attack: "T1027,T1047,T1059.001,T1105"

composite_rules:
  - id: vbs-encoded-url-hidden-wmi-stager
    desc: VBScript encoded URL hidden WMI stager
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/execution/wmi::wmi-hidden-variable-process-create
      - id: micro-behaviors/communications/http/url/encoded::vbs-encoded-http-url
      - id: objectives/anti-static/obfuscation/wsh::vbs-obfuscated-getobject-target
