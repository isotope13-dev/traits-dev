defaults:
  attack: "T1027, T1059.001, T1105"
  platforms: [windows]
  for: [batch]
traits:
- id: caret-split-powershell-launch
  desc: Caret-split PowerShell launch
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(?i)C\^M\^D[^\r\n]{0,900}P\^OW[^\r\n]{0,900}RSH'
- id: obfuscated-powershell-hide-bypass-flags
  desc: Obfuscated PowerShell hidden bypass flags
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(?i)-N\^O\^P[^\r\n]{0,80}-WI\^N\^D\s+HIDD'
- id: delayed-expansion-downloadstring-fragments
  desc: Delayed WebClient DownloadString fragments
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(?i)(BCLI|NT\))\.?[^ \r\n]{0,80}DOWNLO[^\r\n]{0,220}ADSTRING'
- id: delayed-expansion-iex-newobject-fragments
  desc: Delayed-expansion IEX New-Object fragments
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(?i)I[^\r\n]{0,20}X\(N[^\r\n]{0,30}W-OBJ[^\r\n]{0,20}CT'
- id: downloadstring-tail-fragment
  desc: Fragmented DownloadString tail
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: 'NT).DOWNLO'
- id: replace-adstring-fragment
  desc: Replace-built DownloadString suffix
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: ADSTRING
- id: iex-hex-variable-concat
  desc: IEX over hex variable concat
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '%X\(\$[A-F0-9]{24,}'
composite_rules:
- id: batch-obfuscated-ps-webclient-stage
  desc: Obfuscated batch PowerShell WebClient stager
  crit: hostile
  conf: 0.98
  all:
  - id: caret-split-powershell-launch
  - id: obfuscated-powershell-hide-bypass-flags
  - id: delayed-expansion-downloadstring-fragments
  - id: delayed-expansion-iex-newobject-fragments
- id: batch-obfuscated-ps-downloadstring-tail
  desc: Obfuscated batch PowerShell download stager
  crit: hostile
  conf: 0.98
  all:
  - id: obfuscated-powershell-hide-bypass-flags
  - id: downloadstring-tail-fragment
  - id: replace-adstring-fragment
  - id: iex-hex-variable-concat
