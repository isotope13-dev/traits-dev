defaults:
  attack: "T1027, T1105"
  platforms: [windows]
  for: [batch]

traits:
  - id: batch-shortvar-percent-substring-slicing
    desc: Batch short-var percent slicing
    crit: suspicious
    conf: 0.94
    count_min: 20
    if:
      type: text
      regex: '%[^%\r\n]{2,12}:~[0-9]+,[0-9]+%'
    unless:
      - id: well-known/tool/development/batch-scripts::uup-converter-wimlib-batch

  - id: batch-dense-percent-slice-operator
    desc: Dense batch percent substring slice operators
    crit: suspicious
    conf: 0.94
    count_min: 20
    if:
      type: text
      regex: ':~[0-9]+,1%'

  - id: batch-rouki-obfuscator-marker
    desc: Rouki-style batch obfuscator marker
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: '(?i)(:Rouki-OBFUSCATOR|__github__\s*=\s*github\.com/rouki)'

  - id: gitlab-upload-exe-url
    desc: GitLab project upload EXE URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '://gitlab\.com/-/project/[0-9]+/uploads/[0-9a-f]{16,}/.{1,120}\.exe'

composite_rules:
  - id: batch-substring-gitlab-exe-dropper
    desc: Batch substring-reconstructed GitLab EXE dropper
    crit: hostile
    conf: 0.98
    all:
      - id: gitlab-upload-exe-url
      - id: micro-behaviors/os/env/vars/access::temp-env-var
    any:
      - id: batch-shortvar-percent-substring-slicing
      - id: batch-dense-percent-slice-operator
    needs: 1

  - id: batch-rouki-obfuscated-loader
    desc: Rouki-obfuscated batch loader
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.003
    all:
      - id: batch-rouki-obfuscator-marker
      - id: batch-dense-percent-slice-operator
      - id: objectives/anti-static/obfuscation/string/anomaly::batch-cjk-long-token-obfuscation
