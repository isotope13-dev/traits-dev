# Obfuscated WSH JScript Dropper
# Detects WSH-based download-and-execute droppers where COM ProgIDs
# (WScript.Shell, MSXML2.XMLHTTP, ADODB.Stream) are obfuscated via
# string splitting, concatenation, and fragment-based reconstruction.
# ATT&CK: T1059.007, T1105, T1027
defaults:
  platforms: [windows]
  for: [javascript, vbs, html]
  attack: T1059.007
traits:
- id: split-expand-env-chain
  desc: Split ExpandEnvironmentStrings fragment chain
  crit: component
  conf: 0.92
  size_max: 50000
  if:
    type: text
    regex: '["'']Expan["'']\)\s*\+\s*["'']dE["'']\s*\+\s*["'']nv["'']'
- id: split-temp-env-chain
  desc: Split %TEMP% environment fragment chain
  crit: component
  conf: 0.92
  size_max: 50000
  if:
    type: text
    regex: '["'']%["'']\s*\+\s*\(.{0,48}["'']TE["'']\)\s*\+\s*["'']MP%["'']'
- id: comma-activex-replace-shard
  desc: Comma-sharded ActiveXObject constructor
  crit: component
  conf: 0.94
  size_max: 50000
  if:
    type: text
    regex: '"A"\+"Rt"\+\(.{0,160}"i"\)\+3\+"Ob"\+"jec\+"'
- id: comma-xmlhttp-replace-shard
  desc: Comma-sharded XMLHTTP ProgID
  crit: notable
  conf: 0.94
  size_max: 50000
  if:
    type: text
    regex: '"SX"\+"ML"\+\(.{0,80}"2\."\)\+"XM"\+"LHTT"'
- id: comma-wscript-replace-shard
  desc: Comma-sharded WScript ProgID
  crit: component
  conf: 0.94
  size_max: 50000
  if:
    type: text
    regex: '"WU"\+\(.{0,160}"cr"\)\+\(.{0,160}"ip"\)\+\(.{0,160}"t:"\)'
- id: replace-normalized-adodb-stream
  desc: Replace-normalized ADODB.Stream
  crit: component
  conf: 0.94
  size_max: 50000
  if:
    type: text
    regex: '"A"\+"lODB"\+"\.S"\+"tr"'
- id: responsebody-skillful-shard
  desc: ResponseBody assembled with shard variable
  crit: component
  conf: 0.93
  size_max: 50000
  if:
    type: text
    regex: '"R"\+\(.{0,160}"es"\)\+"pon"\+skillful'
- id: savetofile-comma-shard
  desc: SaveToFile comma-sharded method
  crit: component
  conf: 0.92
  size_max: 50000
  if:
    type: text
    regex: '"sav"\+"eT"\+"oF"\+\(.{0,160}"ile"\)'
- id: temp-exe-comma-shard
  desc: TEMP EXE comma-sharded path
  crit: component
  conf: 0.92
  size_max: 50000
  if:
    type: text
    regex: '"%"\+"TE"\+\(.{0,160}"MP%"\).{0,160}"\."\+"exe"'
- id: singapore-delimiter-cleanup
  desc: Singapore delimiter string cleanup
  crit: component
  conf: 0.95
  size_max: 50000
  if:
    type: text
    substr: 'split("singapore").join("")'
- id: singapore-activex-shard
  desc: Singapore-delimited ActiveXObject shard
  crit: component
  conf: 0.94
  size_max: 50000
  if:
    type: text
    substr: 'poreeXsingaporeObsingapore'
- id: singapore-wscript-shard
  desc: Singapore-delimited WScript.Shell shard
  crit: component
  conf: 0.94
  size_max: 50000
  if:
    type: text
    substr: '"W"+"Sc"+"si"+"ng"'
- id: singapore-xmlhttp-shard
  desc: Singapore-delimited MSXML2.XMLHTTP shard
  crit: notable
  conf: 0.94
  size_max: 50000
  if:
    type: text
    substr: 'oreSXs'
- id: split-adodb-stream-progid
  desc: Split ADODB.Stream ProgID
  crit: component
  conf: 0.93
  size_max: 50000
  if:
    type: text
    regex: '"A"\+.{0,180}"DB\.".{0,80}"S"\+"tr"\+"eam"'
- id: split-responsebody-write
  desc: Split ResponseBody stream write
  crit: component
  conf: 0.93
  size_max: 50000
  if:
    type: text
    substr: '"R"+("slide","eschew","appreciation","gaming","es")+"pon"'
- id: split-savetofile-overwrite
  desc: Split SaveToFile overwrite call
  crit: component
  conf: 0.93
  size_max: 50000
  if:
    type: text
    substr: '+"oF"+"ile"](boating, 2)'
- id: temp-exe-fragmented-path
  desc: Fragmented TEMP EXE staging path
  crit: component
  conf: 0.92
  size_max: 50000
  if:
    type: text
    substr: '""+"%"+"TE"+'
- id: xmlhttp-com-progid-text
  desc: XMLHTTP/WinHTTP COM ProgID reference
  crit: component
  conf: 0.9
  size_max: 50000
  if:
    type: text
    # Match the Windows COM ProgIDs used by WSH downloaders.  Do not match
    # browser XMLHttpRequest or the generic ActiveXObject constructor; those
    # are ordinary capabilities and are covered by their neutral traits.
    regex: '(?i)\b(MSXML(2\.)?\.XMLHTTP(\.\d+\.\d+)?|WinHttp\.WinHttpRequest(\.\d+)?)\b'
- id: xmlhttp-status-code-200
  desc: HTTP status 200 check
  crit: component
  conf: 0.85
  size_max: 50000
  unless:
    # WebSharper's synchronous same-origin script loader uses the same
    # response-status idiom as a WSH downloader, but is a benign framework
    # runtime and has no WSH/COM execution context.
    - id: metadata/library/runtime::websharper-runtime-marker
  if:
    type: text
    regex: '\b\w+\.status\s*==\s*200'
- id: meredith-encoded-activexobject
  desc: Meredith encoded ActiveXObject
  crit: component
  conf: 0.97
  size_max: 50000
  if:
    type: text
    substr: 'meredithQWmeredithN0aXZmeredithlWE9iameredithmVjdA='
- id: meredith-encoded-expandenv
  desc: Meredith encoded ExpandEnvironmentStrings
  crit: component
  conf: 0.97
  size_max: 50000
  if:
    type: text
    substr: 'meredithRXhwYW5meredithkRW52aXmeredithJvbm1lbnRTdHJ'
- id: meredith-encoded-wscript-host
  desc: Meredith encoded Windows Script Host
  crit: component
  conf: 0.96
  size_max: 50000
  if:
    type: text
    substr: 'V2luZGmeredith93cyBTY3JpcHQgmeredithSG9zdA='
- id: meredith-encoded-responsebody
  desc: Meredith encoded responseBody suffix
  crit: component
  conf: 0.95
  size_max: 50000
  if:
    type: text
    substr: 'Respon"+scour.U.toLowerCase()+"e"+"Qmeredithm9keQ='
- id: meredith-encoded-http-prefix
  desc: Meredith encoded HTTP prefix
  crit: component
  conf: 0.95
  size_max: 50000
  if:
    type: text
    substr: 'aHRmeredith0cDmeredithovLw='
- id: meredith-encoded-run-method
  desc: Meredith encoded WScript Run
  crit: component
  conf: 0.95
  size_max: 50000
  if:
    type: text
    substr: '"UnVu".forego4()'
- id: token-array-powershell-exe
  desc: Token-array PowerShell executable fragments
  crit: component
  conf: 0.94
  size_max: 50000
  if:
    type: text
    substr: "'powersh'"
- id: token-array-powershell-command
  desc: Token-array PowerShell command
  crit: component
  conf: 0.94
  size_max: 50000
  if:
    type: text
    substr: powershell
- id: token-array-powershell-exe-suffix
  desc: Token-array PowerShell exe suffix
  crit: component
  conf: 0.94
  size_max: 50000
  if:
    type: text
    substr: "'ell.exe'"
- id: token-array-powershell-nop
  desc: Token-array PowerShell NoProfile flag
  crit: component
  conf: 0.95
  size_max: 50000
  if:
    type: text
    substr: "'-nop'"
- id: token-array-powershell-ep
  desc: Token-array PowerShell execution policy flag
  crit: component
  conf: 0.95
  size_max: 50000
  if:
    type: text
    substr: "'-ep'"
- id: token-array-powershell-bypass
  desc: Token-array PowerShell bypass token
  crit: component
  conf: 0.95
  size_max: 50000
  if:
    type: text
    substr: "'bypass'"
- id: token-array-powershell-file
  desc: Token-array PowerShell file flag
  crit: component
  conf: 0.95
  size_max: 50000
  if:
    type: text
    substr: "'-file'"
- id: token-array-msxml-xmlhttp
  desc: Token-array MSXML2 XMLHTTP fragments
  crit: component
  conf: 0.93
  size_max: 50000
  if:
    type: text
    substr: "'MSXML2.'"
- id: token-array-msxml-xml-fragment
  desc: Token-array MSXML2 XML fragment
  crit: component
  conf: 0.93
  size_max: 50000
  if:
    type: text
    substr: MSXML2.XML
- id: token-array-xmlhttp-suffix
  desc: Token-array XMLHTTP suffix
  crit: component
  conf: 0.93
  size_max: 50000
  if:
    type: text
    substr: "'XMLHTTP'"
- id: token-array-http-ps1-url
  desc: Token-array HTTP PS1 URL
  crit: component
  conf: 0.96
  size_max: 50000
  if:
    type: text
    regex: (?i)http://[-A-Za-z0-9./_]{1,160}\.ps1\b
- id: token-array-powershell-exe-nop-escaped
  desc: Token-array PowerShell exe NoProfile fragment
  crit: component
  conf: 0.94
  if:
    type: text
    substr: '.exe\x20-nop\x20'
- id: token-array-powershell-nop-ep-bypass-escaped
  desc: 'token array PS nop ep bypass escaped'
  crit: component
  conf: 0.96
  if:
    type: text
    substr: '-nop\x20-ep\x20b'
- id: token-array-powershell-file-escaped
  desc: Token-array PowerShell file argument fragment
  crit: component
  conf: 0.95
  if:
    type: text
    substr: '\x20-file\x20\x22'
- id: token-array-response-text-fragment
  desc: Uses responseText in string reconstruction
  crit: component
  conf: 0.94
  if:
    type: text
    substr: responseTe
- id: token-array-create-text-fragment
  desc: "-array FSO CreateText fragment"
  crit: component
  conf: 0.9
  if:
    type: text
    substr: CreateText
- id: token-array-msxml-xml-fragment-wide
  desc: "-array MSXML2 XML fragment in large script"
  crit: component
  conf: 0.93
  if:
    type: text
    substr: MSXML2.XML
composite_rules:
- id: xmlhttp-status-200-check
  desc: XMLHTTP status 200 check
  crit: component
  conf: 0.9
  size_max: 50000
  near_lines: 20
  all:
