defaults:
  platforms: [unix, windows]
  for: [ruby]
  attack: T1105

traits:
  - id: ruby-github-release-api-lookup
    desc: Ruby queries a GitHub release API
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'https://api\.github\.com/repos/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+/releases/latest'

  - id: ruby-binary-response-write
    desc: Ruby writes HTTP response as binary file
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'File\.binwrite\s*\([^\n]{0,120}\br\.body\b'

  - id: ruby-tar-archive-extract
    desc: Ruby extracts tar archive through shell
    crit: notable
    conf: 0.96
    if:
      type: symbol
      kind: call
      exact: system
      arg:
        kind: string
        exact: tar

  - id: ruby-exec-local-binary
    desc: Ruby executes a local binary variable
    crit: notable
    conf: 0.96
    if:
      type: symbol
      kind: call
      exact: exec
      arg:
        kind: identifier
        name: bin

composite_rules:
  - id: ruby-xmrig-fetch-extract-exec
    desc: Ruby downloads and launches an XMRig miner
    crit: hostile
    conf: 0.99
    mbc: B0024
    attack: T1105,T1496
    all:
      - id: ruby-github-release-api-lookup
      - id: ruby-binary-response-write
      - id: ruby-tar-archive-extract
      - id: ruby-exec-local-binary
      - id: metadata/file/string/identity::xmrig-product
      - id: objectives/impact/cryptojacking/miner/pool::known-pool-domains
