defaults:
  platforms: [unix, windows]
  for: [ruby]
  attack: T1105

traits:
  - id: ruby-binary-response-write
    desc: Ruby writes HTTP response as binary file
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'File\.binwrite\s*\([^\n]{0,120}\br\.body\b'

composite_rules:
  - id: ruby-xmrig-fetch-extract-exec
    desc: Ruby downloads and launches an XMRig miner
    crit: hostile
    conf: 0.99
    mbc: B0024
    attack: T1105,T1496
    all:
      - id: micro-behaviors/communications/http/services/github::github-release-api
      - id: ruby-binary-response-write
      - id: micro-behaviors/data/archive/extract/tar::ruby-tar-archive-extract
      - id: micro-behaviors/process/create/shell/local::ruby-exec-local-variable
      - id: metadata/file/string/identity::xmrig-product
      - id: objectives/impact/cryptojacking/miner/pool::known-pool-domains
