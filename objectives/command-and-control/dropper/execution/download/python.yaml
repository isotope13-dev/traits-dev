defaults:
  platforms: [windows, unix]
  for: [python]

composite_rules:
  - id: python-discord-cdn-executable-run
    desc: Python downloads and runs Discord CDN executable
    crit: hostile
    conf: 0.98
    attack: T1105
    mbc: "B0030"
    all:
      - id: objectives/command-and-control/channel/discord::discord-cdn-executable
      - id: objectives/supply-chain/install-hook/dropper/setup-hook::executable-download
      - id: micro-behaviors/process/create/subprocess::call
