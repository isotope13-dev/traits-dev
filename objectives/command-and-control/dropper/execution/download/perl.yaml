defaults:
  platforms: [unix]
  for: [perl]
  attack: T1105
  mbc: E1105

traits:
  - id: perl-hidden-home-payload
    desc: Perl hidden HOME payload path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\$ENV\{HOME\}\\x2F\\x2E[0-9A-Fa-f\\x]{6,80}'

  - id: perl-chmod-hidden-home-payload
    desc: Perl chmods hidden HOME payload
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '\\x63\\x68\\x6D\\x6F\\x64\\x20\\x2B\\x78\\x20\$ENV\{HOME\}\\x2F\\x2E'

composite_rules:
  - id: perl-lwp-hidden-home-download
    desc: Perl LWP hidden home download
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/lib/lwp::perl-lwp-get-call
      - id: perl-hidden-home-payload
      - id: perl-chmod-hidden-home-payload
    any:
      - id: micro-behaviors/communications/http/lib/lwp::perl-lwp-content-file-option
      - id: micro-behaviors/communications/http/lib/lwp::perl-lwp-content-file-hex
