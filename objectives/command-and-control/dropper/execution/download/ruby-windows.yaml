defaults:
  platforms: [windows]
  for: [ruby]
  attack: T1105

traits:
  - id: ruby-nethttp-get-temp-exe
    desc: Ruby NetHTTP temp exe download
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Net::HTTP\.new[\s\S]{0,260}http\.get[\s\S]{0,260}_payload\.exe'

  - id: ruby-file-write-binary-response
    desc: Ruby writes binary HTTP response
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'File\.write[\s\S]{0,120}response\.body[\s\S]{0,80}mode: .wb.'

composite_rules:
  - id: ruby-http-temp-exe-dropper
    desc: Ruby HTTP temp exe dropper
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-nethttp-get-temp-exe
      - id: ruby-file-write-binary-response
