defaults:
  platforms: [windows]
  for: [pe]
  conf: 0.98

traits:
  - id: driverpack-solution-setup-desc
    desc: DriverPack Solution setup description
    crit: component
    conf: 0.99
    if:
      type: value
      path: pe.version.description
      exact: DriverPack Solution Setup

  - id: maombi-ru-leaf-subject
    desc: Maombi Ru LLC signing subject
    crit: component
    conf: 1.0
    if:
      type: value
      path: pe.signatures[0].subject
      regex: '^CN=Maombi Ru LLC(,|$)'

  - id: maombi-driverpack-serial
    desc: Maombi DriverPack signing serial
    crit: component
    conf: 1.0
    if:
      type: value
      path: pe.signatures[0].serial
      exact: 72e57440bafc5bf3d66392dd

composite_rules:
  - id: signed-driverpack-overlay-dropper
    desc: Signed DriverPack Inno overlay dropper
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/dropper/execution/installer::inno-delphi-overlay-loader
      - id: driverpack-solution-setup-desc
      - id: maombi-ru-leaf-subject
      - id: micro-behaviors/process/create/spawn::create-process-w
    any:
      - id: maombi-driverpack-serial
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/write/direct::write-file
      - id: micro-behaviors/fs/file/delete::deletefile-w
      - id: micro-behaviors/fs/directory/mkdir::create-directory-w
    needs: 2

  - id: driverpack-privileged-overlay-installer
    desc: DriverPack overlay installer with privileges
    crit: hostile
    conf: 0.98
    all:
      - id: signed-driverpack-overlay-dropper
      - id: objectives/privilege-escalation/token-manipulation::token-manipulation-cluster
    any:
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
      - id: micro-behaviors/os/privilege/token::lookup-privilege-value
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
      - id: micro-behaviors/os/sysinfo/hardware::get-disk-space
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer::open-source-developer
