# Stealth Node.js Dropper Patterns
# ATT&CK: T1195.002 (Supply Chain Compromise), T1059.007 (JavaScript)
# MBC: B0024 (Downloader), F0011 (Background process)
#
# Pattern: NPM packages that spawn detached Node.js processes to execute
# secondary payloads while hiding all I/O. Common in supply-chain attacks.
defaults:
  platforms: [windows, unix]
  mbc: B0024
  for: [javascript, typescript]
traits:
- id: github-raw-batch-url
  desc: GitHub raw batch payload URL
  crit: suspicious
  conf: 0.95
  attack: "T1105"
  for: [javascript]
  if:
    type: text
    regex: 'github\.com/.{1,40}/.{1,60}/raw/refs/heads/.{1,40}/.{1,80}\.(bat|cmd)'
composite_rules:
  # === Stealth dropper composite ===

  # Main pattern: detached + stdio hidden + unref = stealthy background execution
  # Complexity: file_types (1) + all (3) = 4 (meets HOSTILE threshold)
- id: stealth-spawn
  desc: Stealthy detached process spawn
  crit: suspicious
  conf: 0.9
  attack: "T1195.002"
  for: [javascript]
  all:
  - id: micro-behaviors/process/create/spawn::detached-true
  - id: micro-behaviors/process/create/spawn::stdio-ignore
  any:
  - id: micro-behaviors/process/create/spawn::child-unref-call
  - id: micro-behaviors/process/create/spawn::windowshide-option
  unless:
  - id: metadata/package/testing/presence::test-filename-pattern
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/compiled::benchmark
  - id: metadata/package/testing/harness/runtime::browser-benchmark-harness
  - id: metadata/package/testing/presence::test-fixtures
  # Node.js self-spawning dropper pattern
  # Detached self-spawn alone is often daemonization or fixture behavior.
  # Require payload staging or retrieval context before labeling as a dropper.
- id: node-dropper
  desc: Node.js dropper spawning payload
  crit: hostile
  conf: 0.95
  attack: "T1059.007"
  for: [javascript]
  near_bytes: 8192
  all:
  - id: micro-behaviors/process/create/spawn::process-execpath-spawn
  - id: stealth-spawn
  any:
  - id: micro-behaviors/fs/write/file/direct::write-file-sync
  - id: micro-behaviors/fs/temp/directory::os-tmpdir
  - id: micro-behaviors/communications/http/request::fetch-string
  - id: micro-behaviors/data/encode/embedded::pe-base64-blob
  - id: micro-behaviors/data/encode/embedded::gzip-base64-blob
  unless:
  - id: objectives/command-and-control/dropper/execution/integrity::node-sha256-download-verification
  - id: objectives/command-and-control/dropper/execution/integrity::node-validated-npm-runtime-bootstrapper
  - id: metadata/package/testing/presence::test-filename-pattern
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence::test-fixtures
  # Supply-chain dropper: child_process + stealth spawn + no exports
  # Require payload staging or retrieval context; imports plus detached
  # execution are too common in benign tooling and tests.
- id: supply-chain-dropper
  desc: Supply-chain attack dropper
  crit: hostile
  conf: 0.95
  attack: "T1195.002"
  for: [javascript]
  near_bytes: 8192
  all:
  - id: micro-behaviors/process/create/shell/bridge::child-process-require
  - id: stealth-spawn
  any:
  - id: micro-behaviors/fs/write/file/direct::write-file-sync
  - id: micro-behaviors/fs/temp/directory::os-tmpdir
  - id: micro-behaviors/communications/http/request::fetch-string
  - id: micro-behaviors/data/encode/embedded::pe-base64-blob
  - id: micro-behaviors/data/encode/embedded::gzip-base64-blob
  unless:
  - id: objectives/command-and-control/dropper/execution/integrity::node-sha256-download-verification
  - id: objectives/command-and-control/dropper/execution/integrity::node-validated-npm-runtime-bootstrapper
- id: supply-chain-dropper-destructured-child-process
  desc: Supply-chain dropper via destructured child_process
  crit: hostile
  conf: 0.96
  attack: "T1195.002"
  for: [javascript]
  all:
  - id: micro-behaviors/process/create/shell/bridge::child-process-destructure-require
  - id: stealth-spawn
  any:
  - id: micro-behaviors/fs/temp/directory::os-tmpdir
  - id: micro-behaviors/communications/http/request::https-get
  - id: micro-behaviors/fs/write/file/direct::create-write-stream
- id: node-stealth-java-sidecar
  desc: Hidden Node launches Java sidecar
  crit: hostile
  conf: 0.96
  attack: "T1059.007"
  for: [javascript]
  near_bytes: 8192
  all:
  - id: stealth-spawn
  - id: micro-behaviors/process/create/spawn::node-jar-launch-argument
  any:
  - id: micro-behaviors/process/create/spawn::node-java-process-target
  - id: micro-behaviors/fs/path/extension::exe-dup
  - id: objectives/supply-chain/trojanized/application::asar-reference
  unless:
  - id: metadata/package/testing/presence::test-filename-pattern
  - id: metadata/package/testing/harness/runtime::is-test
- id: embedded-pe-stealth-dropper
  desc: Embedded PE dropped and run detached
  crit: hostile
  conf: 0.99
  attack: "T1105"
  for: [javascript]
  all:
  - id: micro-behaviors/data/encode/embedded::pe-base64-blob
  - id: micro-behaviors/fs/write/file/direct::write-file-sync
  - id: micro-behaviors/fs/chmod::node-chmod
  - id: micro-behaviors/fs/temp/directory::os-tmpdir
  - id: stealth-spawn
  any:
  - id: objectives/command-and-control/dropper/staging/embedded::exepath-var
  - id: micro-behaviors/fs/path/extension::exe-dup
- id: hidden-native-download-exec
  desc: Hidden native payload download and execute
  crit: hostile
  conf: 0.96
  attack: "T1105"
  all:
  - id: objectives/command-and-control/dropper/node-bootstrap::download-file
  - id: micro-behaviors/process/create/system::js-execfile-call
  - id: micro-behaviors/process/create/spawn::windowshide-option
  any:
  - id: micro-behaviors/data/encode/xor::js-xor-decoder-ast
  - id: objectives/command-and-control/dropper/node-bootstrap::base64-buffer
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence::test-filename-pattern
  - id: metadata/library/structure::js-webpack-bundle
- id: github-temp-shell-stager
  desc: GitHub temp shell stager with detached exec
  crit: hostile
  conf: 0.98
  attack: "T1195.002"
  for: [javascript]
  all:
  - id: micro-behaviors/process/create/shell/bridge::child-process-require
  - id: micro-behaviors/process/create/spawn::detached-true
  - id: micro-behaviors/process/create/spawn::stdio-ignore
  - id: micro-behaviors/fs/chmod/executable::shell-plus-x
  - id: micro-behaviors/fs/path/temp::temp-var-tmp
  - id: objectives/command-and-control/channel/deaddrop/github::suspicious-github-fetch
  any:
  - id: objectives/command-and-control/channel/deaddrop/github::fetch-github-raw-curl
  - id: objectives/command-and-control/channel/deaddrop/github::raw-githubusercontent-script-file
