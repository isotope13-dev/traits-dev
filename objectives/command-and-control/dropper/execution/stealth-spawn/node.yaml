# Module-load fire-and-forget loader: a detached/ignored/unref'd child whose
# argv is a curl|wget-piped-to-shell one-liner. No legitimate library spawns a
# background shell that pipes a remote download into an interpreter at import.
- id: node-detached-remote-shell-loader
  desc: Detached spawn runs curl-piped-to-shell loader
  crit: hostile
  conf: 0.95
  attack: "T1059.007"
  # The detached spawn and remote shell loader must be part of the same
  # compact loader; unrelated helpers elsewhere in a source file do not form
  # this behavior.
  near_lines: 128
  all:
  - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
  - id: objectives/command-and-control/dropper/execution/pipe::curl-download-pipe-shell
  unless:
  - id: well-known/app/qwen-code::qwen-code-bundle-text
  - id: well-known/app/vellum::cli-package-context
# Ciphertext decrypted then written to a detached, ignored Node stdin — classic
# import-time stage that hides the second payload outside the primary bundle.
- id: decrypt-to-detached-node-stdin
  desc: Cipher decrypt feeds detached Node via stdin
  crit: hostile
  conf: 0.97
  attack: "T1059.007, T1027, T1195.002"
  for: [javascript]
  # Bundlers can place the decrypt helper and its launch site several dozen
  # lines apart while keeping them in the same import-time loader.
  near_lines: 128
  all:
  - id: micro-behaviors/crypto/symmetric/decrypt::cryptojs-block-cipher-decrypt-call
  - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
  - id: micro-behaviors/process/fd/stdio::js-stdin-write
  any:
  - id: micro-behaviors/process/create/script/file::spawn-node-process
  - id: micro-behaviors/process/create/spawn::node-interpreter-target
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
