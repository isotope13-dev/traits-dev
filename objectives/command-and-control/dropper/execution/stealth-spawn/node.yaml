# Stealth Node.js Dropper Patterns
# ATT&CK: T1195.002 (Supply Chain Compromise), T1059.007 (JavaScript)
# MBC: B0024 (Downloader), F0011 (Background process)
#
# Pattern: NPM packages that spawn detached Node.js processes to execute
# secondary payloads while hiding all I/O. Common in supply-chain attacks.
defaults:
  platforms: [windows, unix]
  mbc: B0024
  for: [javascript, typescript]
traits:
- id: github-raw-batch-url
  desc: GitHub raw batch payload URL
  crit: suspicious
  conf: 0.95
  attack: "T1105"
  for: [javascript]
  if:
    type: text
    regex: 'github\.com/.{1,40}/.{1,60}/raw/refs/heads/.{1,40}/.{1,80}\.(bat|cmd)'
# When the encoded loader moves out of the manifest into a bundled .js install
# script (postinstall: node install.js), its child_process/spawn/detached calls
# are char-code-encoded too, so the AST spawn atoms below cannot see them. These
# text atoms recover the loader from the raw .js by the obfuscation shape of its
# embedded program: a long char-code array OR a long base64 blob, paired with the
# matching decoder. The blob/array is the rare discriminator; bundles excluded.
- id: js-charcode-array-program
  desc: Large char-code numeric array literal
  crit: notable
  conf: 0.85
  attack: "T1027"
  if:
    type: text
    regex: '\[\d{1,3}(,\d{1,3}){80,}\]'
  unless:
  - id: metadata/library/structure/
  - id: metadata/package/testing/
- id: js-fromcharcode-decoder
  desc: String built from character codes
  crit: component
  conf: 0.8
  attack: "T1027"
  if:
    type: text
    regex: 'String\s*[.\[]\s*["'']?from(CharCode|CodePoint)'
# Base64 variant of the embedded program: a long base64 string literal. Bundles,
# tests and source-mapped output (which legitimately carry large base64) excluded.
- id: js-base64-blob
  desc: Long base64 string literal
  crit: notable
  conf: 0.8
  attack: "T1027"
  if:
    type: text
    regex: '["''][A-Za-z0-9+/]{200,}={0,2}["'']'
  unless:
  - id: metadata/library/structure/
  - id: metadata/package/testing/
  - id: metadata/package/tooling::has-sourcemap
- id: js-base64-decode
  desc: Base64 decode call
  crit: component
  conf: 0.7
  attack: "T1140"
  if:
    type: text
    regex: 'Buffer\.from\([^,)]{1,40},\s*["'']base64|\batob\s*\('
# require() of a decoder applied to an array literal — require(fn([99,104,..]))
# loads a module by a char-code-decoded name. Survives the runtime-fetch variant
# (https/net required by decoded name) where no program is embedded at all.
- id: js-encoded-require
  desc: Require of a decoded module name
  crit: notable
  conf: 0.85
  attack: "T1027"
  if:
    type: text
    regex: 'require\s*\(\s*\w+\s*\(\s*\['
  unless:
  - id: metadata/library/structure/
  - id: metadata/package/testing/
composite_rules:
  # Umbrellas over the embedded-program forms, so the loader composite survives an
  # attacker swapping a char-code array for a base64 blob.
- id: js-charcode-encoded-program
  desc: Embedded char-code program
  crit: component
  near_bytes: 16384
  all:
  - id: js-charcode-array-program
  - id: js-fromcharcode-decoder
- id: js-base64-encoded-program
  desc: Embedded base64 program
  crit: component
  near_bytes: 16384
  all:
  - id: js-base64-blob
  - id: js-base64-decode
  # Encoded self-respawn loader inside a .js file: an embedded encoded program
  # (char-code array or base64 blob) + a process.execPath self-spawn, all as raw
  # text because the spawn/child_process calls are themselves encoded. The
  # combination is not produced by benign code; bundles and tests excluded.
- id: js-encoded-node-self-respawn-loader
  desc: Encoded JS loader respawns Node on a decoded program
  crit: hostile
  conf: 0.96
  attack: "T1027, T1059.007"
  mbc: "B0032, E1027"
  near_bytes: 16384
  all:
  - id: micro-behaviors/process/create/spawn::process-execpath-spawn
  any:
  - id: js-charcode-encoded-program
  - id: js-base64-encoded-program
  unless:
  - id: metadata/library/structure/
  - id: metadata/package/testing/
  - id: micro-behaviors/process/create/spawn::node-self-respawn
  # Encoded dynamic-require loader: a .js file that requires a module by a decoded
  # name AND defines the matching decoder. Catches the runtime-fetch variant where
  # the payload is downloaded (https/net required by decoded name) and the
  # execPath self-spawn anchor is absent. Bundles and tests excluded.
- id: js-encoded-dynamic-require-loader
  desc: JS loader requires modules by decoded name
  crit: hostile
  conf: 0.95
  attack: "T1027, T1105, T1059.007"
  mbc: "B0032, E1027"
  near_bytes: 16384
  all:
  - id: js-encoded-require
  any:
  - id: js-fromcharcode-decoder
  - id: js-base64-decode
  unless:
  - id: metadata/library/structure/
  - id: metadata/package/testing/
  # Self-respawning obfuscated install loader: a package manifest whose lifecycle
  # command char-code-decodes a program AND references process.execPath is
  # re-launching the Node interpreter on the decoded body (typically detached
  # with ignored stdio so it survives the install and hides its output). The
  # child_process/spawn/detached calls are themselves char-code-encoded, so this
  # anchors on the manifest-text shape rather than AST symbols.
- id: npm-hook-node-self-respawn-loader
  desc: Install hook self-respawns Node on a decoded program
  crit: hostile
  conf: 0.98
  attack: "T1059.007, T1027, T1195.002"
  mbc: "B0032, F0011"
  for: [package.json]
  all:
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::lifecycle-node-eval-charcode-program
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::manifest-node-execpath-respawn
  # Temp directory use is normal for lock files and telemetry dedupe. Treat it
  # as dropper staging only when the temp path is paired with payload writes.
- id: temp-payload-staging
  desc: Temporary payload staging write
  crit: component
  conf: 0.9
  for: [javascript]
  near_lines: 80
  all:
  - id: micro-behaviors/fs/temp/directory::os-tmpdir
  any:
  - id: micro-behaviors/fs/write/file/direct::create-write-stream
  - id: micro-behaviors/fs/chmod/modify::node-chmod
- id: node-payload-retrieval-or-staging
  desc: Node payload retrieval or staging context
  crit: component
  conf: 0.9
  for: [javascript]
  any:
  - id: temp-payload-staging
  - id: objectives/command-and-control/dropper/execution/network-stage::fetch-write-exec
  - id: objectives/command-and-control/dropper/execution/network-stage::write-exec-delete
  - id: objectives/command-and-control/dropper/execution/download-exec::js-download-write-execute
  - id: github-raw-batch-url
  - id: micro-behaviors/data/encode/embedded::pe-base64-blob
  - id: micro-behaviors/data/encode/embedded::gzip-base64-blob
  # === Stealth dropper composite ===

  # Node.js self-spawning dropper pattern
  # Detached self-spawn alone is often daemonization or fixture behavior.
  # Require payload staging or retrieval context before labeling as a dropper;
  # generic fetch() health checks are common in benign daemons.
- id: node-dropper
  desc: Node.js dropper spawning payload
  crit: hostile
  conf: 0.95
  attack: "T1059.007"
  for: [javascript]
  near_bytes: 8192
  all:
  - id: micro-behaviors/process/create/spawn::process-execpath-spawn
  - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
  - id: node-payload-retrieval-or-staging
  unless:
  - id: objectives/command-and-control/dropper/execution/integrity/
  - id: objectives/command-and-control/dropper/execution/integrity/
  - id: micro-behaviors/process/create/spawn/
  - id: micro-behaviors/process/create/spawn::node-self-respawn
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/manifest::test-fixtures
  # Supply-chain dropper: child_process + stealth spawn + no exports
  # Require payload staging or retrieval context; imports plus detached
  # execution are too common in benign tooling and tests.
- id: supply-chain-dropper
  desc: Supply-chain attack dropper
  crit: hostile
  conf: 0.95
  attack: "T1195.002"
  for: [javascript]
  near_bytes: 8192
  all:
  - id: micro-behaviors/process/create/shell/bridge::child-process-require
  - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
  - id: node-payload-retrieval-or-staging
  unless:
  - id: objectives/command-and-control/dropper/execution/integrity/
  - id: objectives/command-and-control/dropper/execution/integrity/
  - id: micro-behaviors/process/create/spawn/
  - id: micro-behaviors/process/create/spawn::node-self-respawn
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/manifest::test-fixtures
- id: supply-chain-dropper-destructured-child-process
  desc: Supply-chain dropper via destructured child_process
  crit: hostile
  conf: 0.96
  attack: "T1195.002"
  for: [javascript]
