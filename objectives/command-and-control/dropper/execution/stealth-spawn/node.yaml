# Launcher that spawns a DETACHED, output-suppressed copy of a bundled sibling
# script (the second stage ships inside the package, so there is no network
# retrieval in the launcher itself — express-denv's index.js spawns ./lib/caller.js).
# Excludes the legitimate lazy-daemon pattern (health-probed entry resolution).
- id: node-detached-sibling-stage-spawn
  desc: Node detached sibling spawn with payload staging or retrieval
  crit: hostile
  conf: 0.9
  attack: "T1059.007"
  for: [javascript]
  near_lines: 60
  all:
  - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
  - id: micro-behaviors/fs/path/construct::local-script-path
  - id: node-payload-retrieval-or-staging
  any:
  - id: micro-behaviors/process/create/shell/bridge::child-process-require
  - id: micro-behaviors/process/create/shell/bridge::child-process-destructure-require
  unless:
  - id: micro-behaviors/process/create/spawn::node-lazy-daemon-spawn
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/manifest::test-fixtures
  - id: micro-behaviors/os/console/control::chcp-65001-command
# Fork-based variant of the above: child_process.fork of a script with
# detached:true survives the parent and runs an independent background stage —
# unlike a normal attached worker/fork pool. Robust to attackers swapping
# spawn() for the idiomatic fork() sibling launcher.
- id: node-detached-fork-stage
  desc: Module forks detached background stage
