# Nezha agent dropper chain
# Detects the full dropper chain: HTTP download + write to disk + chmod + exec + unlink
# Used by @eooce/ws and similar supply-chain malware to deploy Nezha monitoring agents.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1105
  mbc: B0023
composite_rules:
  - id: nezha-agent-dropper
    desc: Nezha agent binary dropper (download + chmod + exec + unlink)
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/lib/axios::axios
      - id: micro-behaviors/fs/write/file::create-write-stream
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
      - id: micro-behaviors/process/daemonize::setsid-command
    any:
      - id: micro-behaviors/data/text/nezha::nezha-v1-config-template
      - id: micro-behaviors/data/text/nezha::nezha-v0-stealth-flags
      - id: micro-behaviors/communications/http/urls/c2-domains::ssss-nyc-mn
  - id: nezha-dropper-with-masquerade
    desc: Nezha dropper with npm binary masquerade
    crit: hostile
    conf: 0.97
    all:
      - id: nezha-agent-dropper
      - id: micro-behaviors/fs/write/file/npm-masquerade::write-binary-as-npm
  - id: nezha-dropper-with-self-erase
    desc: Nezha dropper with delayed self-erase
    crit: hostile
    conf: 0.97
    all:
      - id: nezha-agent-dropper
      - id: micro-behaviors/fs/write/file/npm-masquerade::exec-local-npm-binary
      - id: objectives/command-and-control/dropper/execution/loader::unlink-call
