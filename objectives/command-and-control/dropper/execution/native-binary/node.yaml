# Native-binary stealth dropper (Node.js).
#
# A JavaScript module that downloads a file to disk, marks it executable, and
# launches it as a detached/output-suppressed process. This is the
# language-agnostic dropper shape used by npm supply-chain loaders that fetch a
# compiled stealer/implant from a code-hosting release and run it out-of-band.
#
# Behavior over IOCs: no hash, URL, package name, or guard-tag literal is keyed.
# The signal is the data-flow shape fetch -> chmod +x -> run, which survives
# obfuscation-seed rotation, account rotation, and filename changes.
#
# FP boundary: benign binary-wrapper packages (esbuild, @vscode/ripgrep,
# playwright) also download + chmod + spawn a platform binary, but they run it
# ATTACHED with inherited/piped stdio to surface its output. The stealth
# execution leg (detached + stdio:'ignore' / windowsHide, or an execPath
# self-respawn) is the discriminator — a wrapper has no reason to hide its tool.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1105
  mbc: B0024
composite_rules:
  - id: node-fetch-chmod-exec-stealth-dropper
    desc: Node downloads a binary, makes it executable, runs it hidden
    crit: hostile
    conf: 0.95
    attack: "T1105, T1059.007, T1564.003"
    mbc: "B0024, F0011"
    near_bytes: 8192
    all:
      - id: objectives/command-and-control/dropper/node-bootstrap::download-file
      - id: micro-behaviors/fs/chmod/executable/mode::node-chmod-make-executable
    any:
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: micro-behaviors/process/create/spawn::node-self-respawn
    needs: 1
    unless:
      - id: metadata/package/testing/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::benign-app-fp-context
