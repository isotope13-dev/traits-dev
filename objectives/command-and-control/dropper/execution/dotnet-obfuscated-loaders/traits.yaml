# High-confidence .NET loader combinations observed in the triaged samples.
# The members are generic capabilities; the hostile verdict comes from their
# combination with an embedded concealed stage and staged child execution.
defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: dotnet-concealed-stage-child-loader
    desc: Obfuscated .NET stage writes and launches child payload
    crit: hostile
    conf: 0.98
    attack: "T1027.009,T1140,T1059.003"
    mbc: "B0032,B0009.014,B0023"
    all:
      - id: metadata/file/metrics::low-entropy-binary-with-dense-region
      - id: objectives/anti-static/obfuscation/reflection/invoke::activator-getmethod-pair
      - id: objectives/command-and-control/dropper/delivery/download-execute::processstartinfo-exec-token
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token

  - id: dotnet-concealed-network-stage-loader
    desc: Obfuscated .NET network-capable stage launcher
    crit: hostile
    conf: 0.97
    attack: "T1027.009,T1105,T1059.003"
    mbc: "B0032,C0002,B0023"
    all:
      - id: metadata/file/metrics::low-entropy-binary-with-dense-region
      - id: micro-behaviors/communications/socket/create::networkstream-dotnet-str
      - id: objectives/command-and-control/dropper/delivery/download-execute::processstartinfo-exec-token
      - id: micro-behaviors/process/create/hidden::dotnet-create-no-window

  - id: dotnet-aes-pastebin-stage-loader
    desc: .NET AES resource loader retrieves Pastebin configuration
    crit: hostile
    conf: 0.99
    attack: "T1027.009,T1140,T1105"
    mbc: "B0009.014,C0002"
    all:
      - id: objectives/command-and-control/dropper/staging/embedded::dotnet-aes-resource-dropper
      - id: objectives/command-and-control/infrastructure/paste::pastebin
      - id: micro-behaviors/communications/http/client/managed::downloadstring

  - id: dotnet-aes-hidden-process-loader
    desc: .NET encrypted stage launches hidden process with redirected I/O
    crit: hostile
    conf: 0.98
    attack: "T1027.009,T1059.003,T1564.003"
    mbc: "B0009.014,B0023"
    all:
      - id: objectives/command-and-control/dropper/staging/embedded::dotnet-aes-resource-dropper
      - id: micro-behaviors/process/create/hidden::dotnet-create-no-window
      - id: micro-behaviors/process/create/spawn::dotnet-redirected-stdio
      - id: micro-behaviors/process/terminate/kill::dotnet-kill-member-reference
