# Malicious extconf.rb Dropper
# ATT&CK: T1105 (Ingress Tool Transfer), T1059 (Command Execution)
defaults:
  platforms: [unix, windows]
  crit: hostile
  conf: 1.0
composite_rules:
  - id: extconf-rename-exec
    desc: extconf.rb renames a file to executable (Dropper)
    all:
      - id: metadata/build/package::filename-extconf
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-rename-to-exe
  - id: extconf-fragmented-download
    desc: extconf.rb performs fragmented URL download
    all:
      - id: metadata/build/package::filename-extconf
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-fragmented-url-fetch
  - id: extconf-os-check-exec
    desc: extconf.rb checks for Windows and executes command
    for: [ruby]
    unless:
      - id: metadata/package/files/dependency::ruby-vendor-bundle-gem-path
    all:
      - id: metadata/build/package::filename-extconf
      - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-check-windows-regex
      - id: micro-behaviors/process/create/shell/lang::ruby-exec
