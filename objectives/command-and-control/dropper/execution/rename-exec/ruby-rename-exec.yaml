# Ruby Dropper Behavior: Rename and Execute
# ATT&CK: T1105, T1059
defaults:
  platforms: [unix, windows]
  crit: hostile
  conf: 0.95
composite_rules:
- id: ruby-dropper-rename-exec
  desc: Ruby script renames file to executable and executes it
  all:
  - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-rename-img-to-exe
  - id: micro-behaviors/process/create/shell/lang::ruby-exec
  any:
  - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-check-windows-regex
  - id: objectives/command-and-control/dropper/execution/script-ast::ruby-ast-host-os-access
  - id: micro-behaviors/os/sysinfo/platform/runtime::windows-os-check
