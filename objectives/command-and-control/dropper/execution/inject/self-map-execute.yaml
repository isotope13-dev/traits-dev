# Self-mapping dropper: maps own executable, extracts payload, executes it
defaults:
  for: [pe]
  platforms: [windows]
traits:
- id: geta-oep-banner-marker
  desc: GeTaOEP banner marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: GeTaOEP by Dilla
- id: self-map-extract-execute-cond-4--inline-11988
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: binary.func_count
    min: 1000
  unless:
  - id: metadata/lang/compiler/systems::go-buildinfo
  count_max: 1011989
composite_rules:
- id: self-map-extract-execute
  desc: Self-mapping dropper extracts and executes payload
  crit: suspicious
  conf: 0.9
  attack: T1204
  all:
  - id: micro-behaviors/process/info/current::get-module-filename
  - id: micro-behaviors/fs/memory/mmap::win32-file-mapping
  - id: micro-behaviors/fs/file/write/direct::write-file
  any:
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/process/create/exec::shell-execute-ex
  unless:
  - id: metadata/binary/metrics/threshold::many-exports-200
  - id: geta-oep-banner-marker
  - id: metadata/binary/metrics/structural::many-imports
  - id: metadata/binary/metrics/size::massive-executable
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/installer/
    - id: self-map-extract-execute-cond-4--inline-11988
