defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024
composite_rules:
  - id: accessbridge-wrapper-multistage-loader
    desc: Access Bridge wrapper with staged malware
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/library/runtime::jabswitch-cli-banner
      - id: metadata/library/runtime::access-bridge-config-line
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::largest-section-under-8pct
      - id: metadata/binary/layout::avg-section-under-24k
    any:
      - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
      - id: objectives/persistence/system/registry/com-hijack::inprocserver32-path
      - id: objectives/collection/keylog/capture::windows-hook-keylogger
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: micro-behaviors/os/privilege/manifest::require-administrator
    needs: 2

  - id: accessbridge-wrapper-masquerade-cluster
    desc: Access Bridge wrapper with Office Adobe lures
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/library/runtime::jabswitch-cli-banner
      - id: metadata/library/runtime::access-bridge-config-line
      - id: metadata/binary/layout::multiple-pe-embedded
    any:
      - id: metadata/library/runtime::oracle-javaaccessbridge-key
      - id: metadata/library/runtime::accessbridge-pdb-path
      - id: objectives/evasion/masquerade/identity/fabricated::office-policy-registry
      - id: objectives/evasion/masquerade/version-resource/contradiction::adobe-pdb-path
    needs: 2

  - id: accessbridge-wrapper-injector
    desc: Access Bridge wrapper with process injection
    crit: hostile
    conf: 0.97
    all:
      - id: accessbridge-wrapper-masquerade-cluster
    any:
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime/call::read-process-memory
      - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex-name
      - id: objectives/privilege-escalation/process-injection::debug-privilege-injection
    needs: 2
    unless:
      - id: metadata/signed/platform/
