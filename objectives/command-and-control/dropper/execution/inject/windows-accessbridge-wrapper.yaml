defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024
traits:
  - id: jabswitch-cli-banner
    desc: JABSwitch command banner
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: jabswitch [/enable | /disable | /version | /?]

  - id: access-bridge-config-line
    desc: Java Access Bridge config
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: assistive_technologies=com.sun.java.accessibility.AccessBridge

  - id: oracle-javaaccessbridge-key
    desc: Oracle Access Bridge registry key
    crit: suspicious
    conf: 0.92
    if:
      type: text
      exact: oracle_javaaccessbridge

  - id: accessbridge-pdb-path
    desc: JABSwitch build PDB path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: jabswitch\jabswitch.pdb

composite_rules:
  - id: accessbridge-wrapper-multistage-loader
    desc: Access Bridge wrapper with staged malware
    crit: hostile
    conf: 0.99
    all:
      - id: jabswitch-cli-banner
      - id: access-bridge-config-line
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::largest-section-under-8pct
      - id: metadata/binary/layout::avg-section-under-24k
    any:
      - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
      - id: objectives/persistence/system/registry/com-hijack::inprocserver32-path
      - id: objectives/collection/keylog/capture::windows-hook-keylogger
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: micro-behaviors/os/privilege/manifest::require-administrator
    needs: 2

  - id: accessbridge-wrapper-masquerade-cluster
    desc: Access Bridge wrapper with Office Adobe lures
    crit: suspicious
    conf: 0.97
    all:
      - id: jabswitch-cli-banner
      - id: access-bridge-config-line
      - id: metadata/binary/layout::multiple-pe-embedded
    any:
      - id: oracle-javaaccessbridge-key
      - id: accessbridge-pdb-path
      - id: objectives/evasion/masquerade/identity/fabricated::office-policy-registry
      - id: objectives/evasion/masquerade/version-resource::adobe-pdb-path
    needs: 2

  - id: accessbridge-wrapper-injector
    desc: Access Bridge wrapper with process injection
    crit: hostile
    conf: 0.97
    all:
      - id: accessbridge-wrapper-masquerade-cluster
    any:
      - id: micro-behaviors/process/inject/runtime::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime::read-process-memory
      - id: micro-behaviors/process/inject/runtime::create-remote-thread-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex-name
      - id: objectives/privilege-escalation/process-injection::debug-privilege-injection
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
