defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024

composite_rules:
- id: native-embedded-wsh-dropper
  desc: Native PE with embedded WSH dropper
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/process/script/wsh::embedded-http-file-dropper
  - id: micro-behaviors/process/create/exec::shell-execute-ex
  any:
  - id: micro-behaviors/os/privilege/manifest::admin-manifest
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
  - id: objectives/anti-analysis/timing/evasion::timing-delta-check
  - id: micro-behaviors/communications/http/client::winhttp-request-com
  needs: 2
  unless:
  - id: metadata/signed/platform::microsoft

- id: native-embedded-wsh-dropper-telemetry
  desc: Native PE dropper with callback telemetry
  crit: suspicious
  conf: 0.96
  all:
  - id: micro-behaviors/process/script/wsh::embedded-http-file-dropper
  - id: micro-behaviors/process/script/wsh::embedded-http-status-telemetry
  any:
  - id: micro-behaviors/os/com/object::filesystemobject-progid
  - id: micro-behaviors/communications/http/client::winhttp-request-com
  - id: micro-behaviors/os/privilege/manifest::admin-manifest
