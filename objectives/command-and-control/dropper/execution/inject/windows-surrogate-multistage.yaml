defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024
traits:
- id: office-protocolhandler-pdb
  desc: Office protocol handler PDB marker
  crit: notable
  conf: 0.94
  if:
    type: text
    substr: protocolhandler.pdb

- id: office-protocol-handler-name
  desc: Office Protocol Handler marker
  crit: notable
  conf: 0.9
  if:
    type: text
    exact: Office Protocol Handler
    section: .rdata

- id: officecompleted-marker
  desc: OfficeCompleted stage marker
  crit: notable
  conf: 0.88
  if:
    type: text
    exact: OfficeCompleted

- id: office-help-viewer-name
  desc: Office Help Viewer marker
  crit: notable
  conf: 0.9
  if:
    type: text
    exact: Microsoft Office Help Viewer

- id: office-help-path
  desc: Office help virtual path marker
  crit: notable
  conf: 0.88
  if:
    type: text
    exact: /MsOfficeHelp16/

- id: office-help-user-agent
  desc: Office help telemetry User-Agent format
  crit: suspicious
  conf: 0.92
  if:
    type: text
    exact: 'User-Agent: %s%sX-OfApp: %s%sX-OfVer: %s%sX-Office-Version: %d.%d.%04d.0%sX-OfHelpLcid: %s%sX-OfUILcid: %s%sX-OfSysLcid: %s%s'

- id: office-help-watson-url
  desc: Office Watson help telemetry URL
  crit: suspicious
  conf: 0.86
  if:
    type: text
    exact: http://watson.microsoft.com/dw/dcp.asp

- id: mighost-command-template
  desc: MigHost surrogate command template
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: MigHost.exe {SurrogateCLSID} /InitDoneEvent:<event_name> /LogDir:<path> /ParentPID:<pid>

- id: mighost-load-dll-server
  desc: MigHost surrogate DLL server loader path
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: CMigPluginSurrogate::LoadDllServer

- id: mighost-parent-exit-guard
  desc: Parent process watchdog termination string
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: Parent process unexpectedly exited. Terminating host.

- id: mighost-volatile-reg-write
  desc: MigHost volatile registry write log
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: CreateVolatileRegValue(%s, %s, %s)

- id: proxystubclsid32-registry-fragment
  desc: ProxyStubClsid32 registry fragment
  crit: suspicious
  conf: 0.9
  unless:
  - id: metadata/binary/vendor/
  - type: text
    exact: Software\Microsoft\OleAut
  if:
    type: text
    exact: \ProxyStubClsid32

- id: rundll32main-export
  desc: RunDll32Main export token inside stage
  crit: suspicious
  conf: 0.88
  if:
    type: text
    exact: RunDll32Main

- id: mighost-pdb
  desc: MigHost PDB marker
  crit: notable
  conf: 0.92
  if:
    type: text
    exact: mighost.pdb

- id: wcchrome-native-host-name
  desc: Adobe Chrome native host name
  crit: suspicious
  conf: 0.97
  if:
    type: text
    exact: WCChromeNativeMessagingHost.exe

- id: adobe-create-pdf-listener
  desc: Adobe Create PDF listener name
  crit: suspicious
  conf: 0.95
  if:
    type: text
    exact: Adobe Create PDF plug-in listener for Chrome

- id: diagtrackrunner-pdb
  desc: DiagTrackRunner PDB marker
  crit: notable
  conf: 0.92
  if:
    type: text
    exact: diagtrackrunner.pdb

- id: diagtrack-dll-stage-name
  desc: DiagTrack DLL stage name
  crit: component
  conf: 0.9
  if:
    type: text
    exact: diagtrack.dll

- id: jjs-pdb-stage-path
  desc: Java jjs PDB stage path
  crit: component
  conf: 0.92
  if:
    type: text
    substr: \jjs_objs\jjs.pdb

- id: chrome-wow-helper-pdb
  desc: Chrome WOW helper PDB marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: chrome_wow_helper.pdb

- id: adobe-reader-wow-helper-name
  desc: Adobe Reader WOW helper name
  crit: component
  conf: 0.92
  if:
    type: text
    exact: Adobe Reader WOW Helper

- id: msoxmled-pdb
  desc: Office msoxmled.exe PDB marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: msoxmled.pdb

- id: full-trust-notifier-pdb
  desc: Adobe Reader FullTrustNotifier PDB marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: FullTrustNotifier.pdb

- id: vsto-installer-pdb-stage
  desc: Microsoft VSTOInstaller PDB stage marker
  crit: component
  conf: 0.94
  if:
    type: text
    exact: VSTOInstaller.pdb

- id: ensure-vsto-component-stage
  desc: 'ensure vsto component stage'
  crit: component
  conf: 0.93
  if:
    type: text
    exact: EnsureVSTOComponent

composite_rules:
- id: signed-surrogate-pe-wrapper
  desc: Signed surrogate host wrapper with embedded PE stages
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: mighost-command-template
  - id: proxystubclsid32-registry-fragment
  - id: micro-behaviors/os/registry/access::reg-create-key-ex-w
  - id: micro-behaviors/os/registry/access::reg-set-value-ex-w
  - id: micro-behaviors/dylib/load/runtime::load-library-ex-w
  - id: micro-behaviors/os/module/load::get-proc-address-import
  any:
  - id: mighost-load-dll-server
  - id: mighost-parent-exit-guard
  - id: mighost-volatile-reg-write
  - id: micro-behaviors/data/embedded/payload/resource::find-resource-ex-w
  - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
  needs: 2

- id: mighost-com-stage-wrapper
  desc: MigHost wrapper with COM-hijack stage cluster
  crit: hostile
  conf: 0.98
  size_min: 4194304
  all:
  - id: metadata/binary/layout::pe-signature-present
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: metadata/binary/layout::largest-section-under-8pct
  - id: mighost-command-template
  - id: mighost-load-dll-server
  - id: mighost-volatile-reg-write
  - id: proxystubclsid32-registry-fragment
  any:
  - id: objectives/persistence/system/registry/com-hijack::inprocserver32-write
  - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
  - id: objectives/evasion/process/injection/toolkit::notepad-target
  - id: micro-behaviors/communications/http/post::multipart-form
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-send-request-text
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-receive-response-text
  - id: micro-behaviors/os/privilege/token::adjust-token-privileges-text
  - id: objectives/credential-access/credential-manager/store-api::credential-manager-read-client
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
  - id: micro-behaviors/os/sysinfo/platform/artifact::get-user-default-ui-language
  needs: 3

- id: embedded-admin-dotnet-network-stage
  desc: Embedded PE wrapper with elevated hidden .NET network stage
  crit: hostile
  conf: 0.98
  all:
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: micro-behaviors/os/privilege/manifest::admin-manifest
  - id: objectives/evasion/process/hidden/execution::dotnet-hidden-process-launch
  - id: micro-behaviors/communications/http/client/managed::httpwebrequest
  any:
  - id: rundll32main-export
- id: microsoft-pdb-mashup-wrapper
  desc: Microsoft-signed wrapper with mixed embedded PDB identities
  crit: suspicious
  conf: 0.96
  all:
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
  - id: mighost-pdb
  - id: diagtrackrunner-pdb

- id: multi-vendor-pdb-stuffing-loader
  desc: Multi-vendor PDB stuffing in unsigned PE (Office + MigHost + Adobe)
  crit: hostile
  conf: 0.98
  attack: T1036.005
  all:
  - id: metadata/signed/trust-level::unsigned
  - id: metadata/binary/metrics/structural::embedded-pe-multi
  needs: 2
  any:
  - id: msoxmled-pdb
  - id: mighost-pdb
  - id: full-trust-notifier-pdb
  - id: chrome-wow-helper-pdb
  - id: diagtrackrunner-pdb
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/

- id: mighost-surrogate-unsigned-loader
  desc: MigHost surrogate strings in unsigned PE with embedded payloads
  crit: hostile
  conf: 0.97
  attack: T1574.002
  all:
  - id: mighost-command-template
  - id: mighost-load-dll-server
  - id: metadata/signed/trust-level::unsigned
  - id: metadata/binary/metrics/structural::embedded-pe-multi
  unless:
  - id: metadata/signed/platform/
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/binary/installer/family/

- id: mighost-surrogate-unsigned
  desc: MigHost surrogate strings in unsigned PE
  crit: suspicious
  conf: 0.93
  attack: T1574.002
  all:
  - id: mighost-command-template
  - id: metadata/signed/trust-level::unsigned
  any:
  - id: mighost-load-dll-server
  - id: mighost-parent-exit-guard
  - id: mighost-volatile-reg-write
  - id: mighost-pdb
  unless:
  - id: metadata/signed/platform/
  - id: metadata/signed/platform::microsoft-windows
  - id: metadata/binary/installer/family/

- id: office-protocolhandler-multistage-wrapper
  desc: Office protocol handler wrapper with embedded PE stages
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/signed/platform::microsoft-certificate-chain
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: office-protocolhandler-pdb
  - id: office-protocol-handler-name
  - id: office-help-viewer-name
  - id: office-help-user-agent
  any:
  - id: officecompleted-marker
  - id: office-help-path
  - id: office-help-watson-url
  - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
  - id: micro-behaviors/os/registry/keys::windows-registry-run-access
  - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
  needs: 2

- id: office-help-embedded-stage-loader
  desc: Office Help embedded PE stage loader
  crit: hostile
  conf: 0.98
  all:
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: office-help-user-agent
  any:
  - id: office-help-path
  - id: office-help-viewer-name
  - id: micro-behaviors/os/registry/access::registry-transacted-api-chain
  - id: micro-behaviors/process/control/info::nt-set-information-process
  needs: 2

- id: office-protocolhandler-embedded-token-wrapper
  desc: Embedded Office ProtocolHandler token-spawn wrapper
  crit: hostile
  conf: 0.98
  size_min: 1000000
  all:
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: office-protocolhandler-pdb
  - id: objectives/privilege-escalation/token-manipulation::token-spawn-api-chain
  any:
  - id: objectives/command-and-control/dropper/sideload::office-protocolhandler-exe-ref
  - id: micro-behaviors/data/embedded/certificate::microsoft-code-signing-pca
  - id: metadata/signed/developer::mozilla-corporation
  needs: 2

- id: office-protocolhandler-token-spawn-apis
  desc: Embedded Office ProtocolHandler token-spawn APIs
  crit: hostile
  conf: 0.985
  size_min: 1000000
  all:
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: office-protocolhandler-pdb
  - id: micro-behaviors/os/privilege/token::open-process-token
  - id: micro-behaviors/os/privilege/token::duplicate-token-ex
  - id: micro-behaviors/process/create/spawn::create-process-with-token
  any:
  - id: objectives/command-and-control/dropper/sideload::office-protocolhandler-exe-ref
  - id: micro-behaviors/data/embedded/certificate::microsoft-code-signing-pca
  - id: metadata/signed/developer::mozilla-corporation
  - id: officecompleted-marker
  needs: 2

- id: adobe-mighost-com-hijack-wrapper
  desc: Adobe-signed wrapper with MigHost COM hijack stage
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/signed/platform::adobe
  - id: objectives/persistence/system/registry/com-hijack::active-setup-com-hijack-persistence
  - id: mighost-load-dll-server
  - id: mighost-volatile-reg-write
  - id: proxystubclsid32-registry-fragment
  any:
  - id: micro-behaviors/os/com/invoke::clsid-from-string
  - id: micro-behaviors/os/registry/access::registry-read-api-chain
  - id: objectives/persistence/login/startup/registry::active-setup-key
- id: adobe-wcchrome-mighost-com-hijack-wrapper
  desc: Adobe native host with MigHost COM hijack
  crit: hostile
  conf: 0.995
  all:
  - id: metadata/signed/platform::adobe
  - id: wcchrome-native-host-name
  - id: adobe-create-pdf-listener
  - id: mighost-command-template
  - id: mighost-load-dll-server
  - id: proxystubclsid32-registry-fragment
  - id: micro-behaviors/os/registry/access::active-setup-fragment
  - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
  any:
  - id: objectives/persistence/system/registry/com-hijack::clsid-registry-path
  - id: objectives/persistence/system/registry/com-hijack::inprocserver32-write
  - id: micro-behaviors/os/com/invoke::clsid-from-string
  - id: objectives/persistence/login/startup/registry::active-setup-key
- id: adobe-java-diagtrack-surrogate-injector
  desc: Adobe helper with Java and DiagTrack injection stages
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/binary/vendor::adobe-systems-inc-marker
  - id: metadata/binary/layout::multiple-pe-embedded
  - id: objectives/evasion/masquerade/version-resource/jjs::jjs-original-filename-string
  - id: diagtrackrunner-pdb
  any:
  - id: jjs-pdb-stage-path
  - id: diagtrack-dll-stage-name
  - id: rundll32main-export
  - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
  - id: micro-behaviors/process/inject/runtime/call::read-process-memory
  - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
  - id: micro-behaviors/process/create/spawn::open-process
  - id: micro-behaviors/os/module/load::get-proc-address-import
  needs: 5
