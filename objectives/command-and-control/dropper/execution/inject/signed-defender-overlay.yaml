    desc: Signed Defender-masquerading overlay injection dropper
    crit: hostile
    conf: 0.98
    attack: T1055
    mbc: B0033
    ref: sha256:e5321904c73fdf4c0dd39ad5ebb7da2a1837c67aa892d2a268203da3ead9afa1
    all:
      - id: objectives/evasion/masquerade/version-resource/security-vendor::defender-extension-non-microsoft-signed
      - id: objectives/anti-static/obfuscation/payload/encrypted::signed-high-entropy-overlay-wrapper
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
    any:
      - id: micro-behaviors/process/inject/runtime/call::read-process-memory
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
      - id: micro-behaviors/process/inject/runtime/call::resume-thread-dup
      - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
