defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024
traits:
  - id: acrobroker-pdb
    desc: AcroBroker PDB marker
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: AcroBroker.pdb

  - id: acrobroker-write-warning
    desc: AcroBroker write warning string
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: "AcroBroker: Unexpected Write Warning!!"

  - id: adobe-acrobat-security-path
    desc: Adobe Acrobat security registry path
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: Software\Adobe\Adobe Acrobat\11.0\Security

  - id: adobe-reader-featurelockdown-path
    desc: Adobe Reader FeatureLockDown path
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: SOFTWARE\Policies\Adobe\Acrobat Reader\11.0\FeatureLockDown

  - id: mapi-logon-ex
    desc: Extended MAPI logon API
    crit: component
    conf: 0.95
    if:
      type: text
      exact: MAPILogonEx

  - id: mapi-initialize
    desc: Extended MAPI initialize API
    crit: component
    conf: 0.95
    if:
      type: text
      exact: MAPIInitialize

  - id: sqlite-pref-events-create
    desc: SQLite pref_events table create
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: CREATE TABLE pref_events

  - id: sqlite-pref-events-insert
    desc: SQLite pref_events row insert
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: INSERT INTO pref_events

composite_rules:
  - id: mapi-bootstrap-apis
    desc: Extended MAPI bootstrap API names
    crit: component
    conf: 0.95
    all:
      - id: objectives/command-and-control/dropper/execution/inject::mapi-logon-ex
      - id: objectives/command-and-control/dropper/execution/inject::mapi-initialize

  - id: sqlite-pref-events-schema
    desc: SQLite pref_events schema strings
    crit: suspicious
    conf: 0.96
    all:
      - id: objectives/command-and-control/dropper/execution/inject::sqlite-pref-events-create
      - id: objectives/command-and-control/dropper/execution/inject::sqlite-pref-events-insert

  - id: mavinject-adobe-overlay-bundle
    desc: Packed overlay dropper with Adobe inject surrogate
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/layout::multiple-pe-embedded-loose
      - id: metadata/binary/layout::overlay-over-90pct
      - id: objectives/anti-static/pack/detect::petite-section
      - id: metadata/binary/layout::mavinject-acrobroker-stage-pair

  - id: mavinject-adobe-overlay-injector
    desc: Packed multistage dropper abusing mavinject and AcroBroker
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/dropper/execution/inject::mavinject-adobe-overlay-bundle
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
    any:
      - id: micro-behaviors/process/inject/runtime/call::read-process-memory
      - id: micro-behaviors/process/control::nt-set-information-process
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    needs: 2

  - id: acrobroker-mail-policy-cluster
    desc: AcroBroker mail policy and storage cluster
    crit: suspicious
    conf: 0.98
    all:
      - id: objectives/command-and-control/dropper/execution/inject::acrobroker-pdb
    any:
      - id: objectives/command-and-control/dropper/execution/inject::acrobroker-write-warning
      - id: objectives/command-and-control/dropper/execution/inject::adobe-acrobat-security-path
      - id: objectives/command-and-control/dropper/execution/inject::adobe-reader-featurelockdown-path
      - id: objectives/command-and-control/dropper/execution/inject::mapi-bootstrap-apis
      - id: objectives/command-and-control/dropper/execution/inject::sqlite-pref-events-schema
    needs: 3

  - id: acrobroker-packed-mail-stage
    desc: Packed AcroBroker mail and policy stage
    crit: hostile
    conf: 0.995
    all:
      - id: metadata/binary/layout::multiple-pe-embedded-loose
      - id: metadata/binary/layout::overlay-over-90pct
      - id: objectives/command-and-control/dropper/execution/inject::acrobroker-mail-policy-cluster
    any:
      - id: micro-behaviors/process/control::nt-set-information-process
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/os/registry/access::reg-create-key-transacted-name
      - id: micro-behaviors/os/registry/access::reg-open-key-transacted-name
      - id: micro-behaviors/os/registry/access::reg-delete-key-transacted-name
    needs: 2
