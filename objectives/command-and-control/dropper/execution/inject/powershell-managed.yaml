defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1055.012,T1620
  mbc: B0009.014
traits:
  - id: ps-byte-payload-invokemember
    desc: PowerShell InvokeMember byte payload dispatch
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?is)InvokeMember\(.{0,260}\[byte\[\]\]\$[A-Za-z0-9_.$]+PayloadBytes.{0,160}TargetProcess'
  - id: ps-msbuild-injection-target
    desc: PowerShell targets MSBuild for injection
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)Windows\\Microsoft\.NET\\Framework64\\v4\.0\.30319\\MSBuild\.exe'
  - id: ps-reflected-resumethread
    desc: PowerShell reflectively resumes remote thread
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?is)InvokeMember\([''"]ResumeThread[''"]'
composite_rules:
  - id: ps-managed-injection-target-marker
    desc: PowerShell managed injection target marker
    crit: suspicious
    conf: 0.94
    any:
      - id: ps-msbuild-injection-target
      - id: ps-reflected-resumethread
  - id: ps-encrypted-managed-payload-injector
    desc: PowerShell decrypts managed payload and injects into MSBuild
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/backdoor/loader/managed-reflect::ps-appdomain-reflected-load-invoke
      - id: ps-byte-payload-invokemember
      - id: ps-managed-injection-target-marker
    any:
      - id: objectives/command-and-control/dropper/staging/encrypted::ps-aes-inline-payload
      - id: objectives/command-and-control/dropper/staging/encrypted::ps-base32-aes-embedded-stage
