# JavaScript Script Dropper Patterns
defaults:
  platforms: [unix, windows]
  for: [javascript]

traits:
  - id: jscript-rundll32-dropper
    desc: JScript executing rundll32
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "rundll32(\\.exe)?\\s+.{0,100}DllRegisterServer"
  - id: jscript-xor-numeric-encoded-dropper
    desc: JScript with numeric XOR encoding
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: "String\\.fromCharCode\\(.{0,50}\\^\\s*\\d+\\)"
    unless:
      - type: basename
        exact: carrotsearch.foamtree.js
  - id: delimiter-split-powershell-launch
    desc: Delimiter-split PowerShell launch command
    crit: component
    conf: 0.95
    platforms: [windows]
    if:
      type: text
      substr: psijRysBVHhosijRysBVHhwsijRysBVHhesijR
  - id: delimiter-split-encodedcommand
    desc: Delimiter-split EncodedCommand flag
    crit: component
    conf: 0.95
    platforms: [windows]
    if:
      type: text
      substr: -sijRysBVHhEsijRysBVHhn

  - id: obfuscated-jscript-signed-comment-loader
    desc: JScript loader with signed comments
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '//# sourceMappingURL=data:application/json;base64,[A-Za-z0-9+/=]+'
    not:
      - regex: '//# sourceMappingURL=data:application/json;base64,e[wy].{0,24}J2ZXJ'
    unless:
      - id: metadata/package/tooling::has-sourcemap
  - id: obfuscated-jscript-signed-entropy-loader
    desc: JScript loader with high entropy comments
    crit: suspicious
    conf: 0.85
    size_min: 200
    if:
      type: text
      regex: '(^|\n)//[A-Za-z][A-Za-z0-9+/=]{179,}'
    unless:
      - type: text
        regex: "///[A-Za-z0-9+/]{100,}"
      - type: text
        regex: '//\s*0x[0-9a-fA-F]{64,}'
      - type: text
        substr: "github.com/owl-factory/lantern/blob/"
      - type: text
        substr: "See also https://github.com/"
      - type: basename
        regex: \.min\.js$
  - id: wsh-percent-encoded-unescape-loader
    desc: JScript percent-encoded unescape loader
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    if:
      type: text
      substr: al(un?scap?(
  - id: wsh-percent-encoded-xmlhttp-url
    desc: Encoded MSXML2 XMLHTTP fragment
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    if:
      type: text
      substr: MSXML:32:2EXMLHT
  - id: wsh-percent-encoded-http-url
    desc: Encoded HTTP URL fragment
    crit: suspicious
    conf: 0.92
    platforms: [windows]
    if:
      type: text
      substr: http:3A:2F:2F
  - id: wsh-percent-encoded-admin-php
    desc: Encoded admin.php path fragment
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    if:
      type: text
      substr: admin:2Ephp:3Ff:3D:34:30:34
  - id: wsh-percent-encoded-templates-exe
    desc: Encoded Templates folder fragment
    crit: suspicious
    conf: 0.95
    platforms: [windows]
    if:
      type: text
      substr: Sp?cialFold?rs:28:22T?mplat?s:22
  - id: wsh-percent-encoded-exe-ext
    desc: Encoded EXE extension fragment
    crit: suspicious
    conf: 0.93
    platforms: [windows]
    if:
      type: text
      substr: 2B:22:2E?x?:22:3B:0D
  - id: wsh-percent-encoded-shell-exec-path
    desc: Encoded ShellExecute path fragment
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    if:
      type: text
      substr: x?cut?:28path
  - id: wsh-percent-encoded-shell-app
    desc: Encoded Shell.Application fragment
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    if:
      type: text
      substr: sh?ll:2Eapplication
  - id: wsh-percent-encoded-open-verb
    desc: Encoded open verb fragment
    crit: component
    conf: 0.9
    platforms: [windows]
    if:
      type: text
      substr: op?n:22:2C:20:31:29
  - id: payload-js-write
    desc: Writes fetched content to payload.js
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'writeFileSync\s*\(\s*[''"]payload\.js[''"]'
  - id: json-cookie-write
    desc: Writes json.cookie property to local payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'writeFileSync\s*\(\s*[''"]payload\.js[''"]\s*,\s*[A-Za-z_$][A-Za-z0-9_$]*\.cookie'
  - id: browser-uint8array-stage
    desc: Uint8Array stage buffer allocation
    crit: component
    conf: 0.85
    if:
      type: text
      substr: Uint8Array(len)
  - id: browser-textdecoder-utf8
    desc: TextDecoder utf8 stage decode
    crit: component
    conf: 0.85
    if:
      type: text
      substr: TextDecoder("utf-8")
  - id: local-download-helper-call
    desc: Calls local download helper
    crit: component
    conf: 0.82
    unless:
      - id: micro-behaviors/ui/window/manage/browser-extension::chrome-downloads-api
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (identifier) @fn
          (#match? @fn "^download[A-Za-z0-9_$]*$")
        )
  - id: local-fetch-helper-call
    desc: Calls local fetch helper
    crit: component
    conf: 0.82
    unless:
      - type: text
        regex: 'https://(www|data)\.sec\.gov/'
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (identifier) @fn
          (#match? @fn "^fetch[A-Z_$][A-Za-z0-9_$]*$")
        )
  - id: js-max-string-over-3000
    desc: Embedded string exceeds 3000 chars
    crit: notable
    conf: 0.86
    size_min: 8000
    size_max: 30000
    if:
      type: metrics
      field: strings.max_length
      min: 3000
    unless:
      - id: large-string-benign-context
      - type: text
        substr: "ObjC.import('AppKit')"
      - type: text
        substr: NSBitmapImageRep
  - id: wsh-comma-temp-env-fragment
    desc: Comma-split TEMP environment path
    crit: component
    conf: 0.9
    platforms: [windows]
    if:
      type: text
      regex: '"%"\+\(.{0,40}["'']T["'']\)\+"E"\+"MP%"'
  - id: wsh-comma-exe-url-fragment
    desc: Comma-split EXE download URL
    crit: component
    conf: 0.92
    platforms: [windows]
    if:
      type: text
      regex: '"/logs/98yh"\+\(.{0,40}["'']b["'']\)\+"764"\+"d"\+"\.exe"'
  - id: manpage-section-basename
    desc: Manpage section path
    crit: component
    conf: 1.0
    if:
      type: basename
      regex: '[\\/]man[0-9][\\/]'
  - id: microsoft-copyright-text
    desc: Microsoft library copyright text
    crit: component
    conf: 1.0
    if:
      type: text
      substr: '//! Copyright (C) Microsoft.'
  - id: sha256-digest-hex-call
    desc: Node SHA-256 createHash with hex digest
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'createHash\(\s*[''"]sha(256|512)[''"]\s*\)[\s\S]{0,120}\.digest\(\s*[''"]hex[''"]'
  - id: checksum-mismatch-error
    desc: Source mentions checksum/hash mismatch error
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '[Cc]hecksum mismatch|[Hh]ash mismatch|[Ii]ntegrity mismatch'
  - id: github-release-version-url
    desc: GitHub release download URL pinned to version
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'releases/download/v?\$\{?(VERSION|version)\}?'

composite_rules:
  - id: verified-github-binary-installer
    desc: Verified GitHub-release binary installer (legit npm wrapper)
    crit: component
    conf: 0.95
    all:
      - id: sha256-digest-hex-call
      - id: github-release-version-url
      - id: checksum-mismatch-error
  - id: large-string-benign-context
    desc: Benign embedded large-string context
    crit: component
    conf: 1.0
    any:
      - id: metadata/package/testing/scripted::xterm-terminal-recording
      - id: metadata/package/documentation::unix-manpage
      - id: manpage-section-basename
      - id: metadata/package/testing/harness/fixture::cjk-long-string-fixture
      - id: metadata/library/mermaid::architecture-fixture
      - id: objectives/anti-static/obfuscation/string/reconstruct::mermaid-bundle-marker
      - id: metadata/library/jquery::header-prefix
      - id: microsoft-copyright-text
      - id: objectives/anti-static/obfuscation/code-metrics/structure::source-svg-path-data-context
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: metadata/library/web-frameworks::wordpress-block-build-asset
      - id: metadata/library/presentation-lib::photoswipe-dynamic-caption-bundle
      - id: metadata/library/presentation-lib::photoswipe-lightbox-bundle
      - id: micro-behaviors/fs/path/application/config::codex-hook-script
  - id: compact-js-download-call
    desc: Compact JavaScript download step
    crit: component
    conf: 0.86
    unless:
      - id: micro-behaviors/ui/window/manage/browser-extension::chrome-downloads-api
    any:
      - id: objectives/command-and-control/dropper/node-bootstrap::download-file
      - id: local-download-helper-call
      - id: local-fetch-helper-call
  - id: jscript-xmlhttp-adodb-dropper
    desc: JScript XMLHTTP and ADODB.Stream dropper
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: micro-behaviors/fs/write/file/stream::js-adodb-stream-create
  - id: jscript-embedded-base64-adodb-dropper
    desc: JScript with embedded base64 and ADODB.Stream
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/data/decode/base64::base64-decode
      - id: micro-behaviors/fs/write/file/stream::js-adodb-stream-create
  - id: obfuscated-jscript-decoder-loader
    desc: Obfuscated JScript decoder and loader
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/data/decode/base64::base64-decode
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
  - id: jscript-xor-numeric-decoder-loader
    desc: JScript XOR decoder with execution context
    crit: suspicious
    conf: 0.9
    attack: T1027
    all:
      - id: jscript-xor-numeric-encoded-dropper
    any:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: objectives/execution/interpreter/eval/dynamic::eval-transformed-code
      - id: micro-behaviors/process/interpreter/jscript::activex-object
  - id: wsh-hidden-encoded-powershell-dropper
    desc: WSH hidden encoded PowerShell dropper
    crit: hostile
    conf: 0.98
    attack: T1059.007, T1059.001, T1105
    platforms: [windows]
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::js-repeated-marker-split-join-cleanup
      - id: objectives/execution/wmi::wmi-hidden-startup-process
      - id: objectives/execution/interpreter/scripting/host::run-invocation-patterns
      - id: delimiter-split-powershell-launch
      - id: delimiter-split-encodedcommand
    any:
      - id: micro-behaviors/process/interpreter/jscript::activex-object
      - id: objectives/exfiltration/oob/endpoint::http-b64
  - id: wsh-temp-exe-download-exec
    desc: WSH temp EXE download and execute
    crit: hostile
    conf: 0.98
    attack: "T1105"
    all:
      - id: micro-behaviors/os/com/object::clsid-xmlhttp-generic
      - id: micro-behaviors/fs/write/file/stream::js-adodb-stream-reference
      - id: objectives/execution/interpreter/script/wsh::wsh-response-body
      - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file
      - id: objectives/execution/interpreter/script/wsh::wsh-expand-env-strings
      - id: micro-behaviors/fs/path/temp::any-temp-path
      - id: micro-behaviors/fs/path/extension::exe-dup
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-via-brackets
      - id: micro-behaviors/process/create/script/wsh::wsh-do-wait-readystate
  - id: wsh-comma-fragment-download-exec
    desc: WSH comma-fragment download execute dropper
    crit: hostile
    conf: 0.98
    attack: T1105
    all:
      - id: objectives/execution/interpreter/scripting/host::wscript-shell-comma-obfuscated
      - id: objectives/execution/interpreter/scripting/host::xmlhttp-comma-obfuscated
      - id: objectives/execution/interpreter/scripting/host::adodb-stream-comma-obfuscated
      - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file
      - id: objectives/execution/interpreter/script/wsh::wsh-expand-env-strings
      - id: micro-behaviors/fs/path/temp::any-temp-path
      - id: micro-behaviors/fs/path/extension::exe-dup
  - id: wsh-split-join-obfuscated-download-exec
    desc: WSH split-join download execute dropper
    crit: hostile
    conf: 0.98
    attack: T1105, T1027
    all:
      - id: objectives/anti-static/obfuscation/string/encoding::js-split-join-cleanup
      - id: objectives/anti-static/obfuscation/syntax::js-comma-sequence-obfuscation-v2
      - id: objectives/execution/interpreter/script/wsh-fragments::readystate-fragment-tiny-exact
      - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file
      - id: micro-behaviors/fs/write/stream::adodb-open
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-indirect
    any:
      - id: objectives/anti-static/obfuscation/string/conceal::js-comma-string-obfuscation
      - id: objectives/anti-static/obfuscation/string/reconstruct::single-char-concat-pattern
  - id: wsh-fragmented-counter-exe-download-exec
    desc: Fragmented WSH counter EXE download execute
    crit: hostile
    conf: 0.98
    attack: T1059.007, T1105, T1027
    all:
      - id: objectives/anti-static/obfuscation/syntax::js-dense-string-building
      - id: metadata/file/text/metrics::many-no-param-functions
      - id: objectives/execution/interpreter/script/wsh-fragments::payload-handling-fragment-tiny-exact
      - id: objectives/execution/interpreter/script/wsh-fragments::run-fragment-tiny-exact
      - id: objectives/execution/interpreter/script/wsh-fragments::save-to-file-fragment
      - id: objectives/command-and-control/channel/http/uri::uri-fragment-counter-rnd-param
  - id: wsh-comma-temp-exe-download-exec
    desc: WSH comma TEMP EXE download execute
    crit: hostile
    conf: 0.98
    attack: T1059.007, T1105, T1027
    platforms: [windows]
    all:
      - id: objectives/anti-static/obfuscation/string/conceal::js-comma-string-obfuscation
      - id: wsh-comma-temp-env-fragment
      - id: wsh-comma-exe-url-fragment
      - id: objectives/execution/interpreter/script/wsh-fragments::readystate-fragment-tiny-exact
      - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-indirect
  - id: wsh-percent-encoded-download-chain
    desc: Percent-encoded WSH download chain
    crit: suspicious
    conf: 0.97
    platforms: [windows]
    all:
      - id: wsh-percent-encoded-xmlhttp-url
      - id: wsh-percent-encoded-admin-php
      - id: wsh-percent-encoded-templates-exe
      - id: wsh-percent-encoded-exe-ext
    any:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: objectives/execution/interpreter/eval/dynamic::eval-transformed-code
      - id: wsh-percent-encoded-unescape-loader
  - id: wsh-percent-encoded-download-exec
    desc: Percent-encoded WSH EXE drop and launch
    crit: hostile
    conf: 0.99
    attack: T1059.007, T1105, T1027
    platforms: [windows]
    all:
      - id: objectives/execution/activex/com::activex-object-create
      - id: wsh-percent-encoded-download-chain
      - id: wsh-percent-encoded-shell-app
      - id: wsh-percent-encoded-shell-exec-path
      - id: wsh-percent-encoded-open-verb
  - id: browser-xor-stage-decoder
    desc: Browser XOR stage decoder routine
    crit: suspicious
    conf: 0.96
    all:
      - id: browser-uint8array-stage
      - id: browser-textdecoder-utf8
      - id: micro-behaviors/crypto/symmetric/xor/loop::js-xor-charcode-assignment
  - id: obfuscated-browser-stage-loader
    desc: Browser self-decoding stage loader
    crit: suspicious
    conf: 0.95
    all:
      - id: browser-xor-stage-decoder
      - id: micro-behaviors/data/decode/url::browser-escape-fallback-decoder
      - id: objectives/anti-static/obfuscation/syntax::html-xor-self-decoding-loader
      - id: micro-behaviors/data/source/dynamic/eval::new-function-iife
  - id: hidden-browser-payload-execution
    desc: Hidden browser payload decoded and executed
    crit: hostile
    conf: 0.985
    all:
      - id: obfuscated-browser-stage-loader
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::hex-variable-names
      - id: objectives/anti-static/obfuscation/tools/js-obfuscator::hex-function-names
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
  - id: local-dropper
    desc: Writes a file and executes it locally
    crit: suspicious
    conf: 0.85
    attack: "T1105"
    near_lines: 25
    all:
      - id: micro-behaviors/fs/write/file/direct::js-file-write
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
    any:
      - id: micro-behaviors/process/create/shell/bridge::js-exec
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
      - id: micro-behaviors/process/create/shell/bridge::js-spawn
    unless:
      - id: metadata/package/testing/harness/runtime::node-common-require
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::node-common-require
        - id: metadata/library/prettier
        - id: metadata/package/documentation::has-jsdoc
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: compact-js-fetch-chmod-exec
    desc: JavaScript downloads, chmods, and executes file
    crit: suspicious
    conf: 0.95
    attack: T1105,T1059.007
    mbc: B0024
    near_lines: 140
    all:
      - id: compact-js-download-call
      - id: micro-behaviors/fs/chmod/modify::node-chmod
    any:
      - id: micro-behaviors/process/create/system::js-execfile-direct-call
      - id: micro-behaviors/process/create/system::js-execfile-call
      - id: micro-behaviors/process/create/shell/bridge::js-exec
      - id: micro-behaviors/process/create/shell/bridge::js-spawn
    unless:
      - id: metadata/package/testing/harness/runtime::node-common-require
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/manifest::test-fixtures
      - id: metadata/library/prettier
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
      - id: verified-github-binary-installer
  - id: compact-js-fetch-chmod-exec-cleanup
    desc: JavaScript download-execute loader deletes staged file
    crit: hostile
    conf: 0.97
    attack: T1105,T1059.007,T1070.004
    mbc: B0024
    near_lines: 160
    all:
      - id: compact-js-fetch-chmod-exec
    any:
      - id: micro-behaviors/fs/file/delete::fs-rmSync
      - id: micro-behaviors/fs/file/delete::fs-unlinkSync
      - id: micro-behaviors/fs/directory/delete::fs-rm-recursive
    unless:
      - id: metadata/package/testing/harness/runtime::node-common-require
      - id: metadata/package/testing/harness/runtime::is-test
      - id: verified-github-binary-installer
  - id: obfuscated-local-dropper
    desc: Obfuscated local dropper (Hostile)
    crit: hostile
    conf: 0.95
    attack: "T1027"
    mbc: "B0032"
    all:
      - id: local-dropper
      - id: objectives/anti-static/obfuscation/string/encoding::js-strong-obfuscation
  - id: js-malware-hosting-powershell
    desc: References PowerShell script on known malware hosting (Dropper)
    crit: hostile
    conf: 0.95
    attack: "T1105"
    all:
      - id: objectives/command-and-control/infrastructure/domain/hosting::malware-hosting
      - id: micro-behaviors/process/create/script/file::powershell-script-execution
  - id: staged-json-payload-dropper
    desc: Fetches staged JSON payload and writes a JavaScript file
    crit: suspicious
    conf: 0.88
    attack: "T1105"
    near_lines: 20
    all:
      - id: micro-behaviors/communications/http/request/client::https-request
      - id: objectives/command-and-control/infrastructure/paste::jsonkeeper
      - id: micro-behaviors/data/serialize/json::json-parse-call
      - id: payload-js-write
    any:
      - id: json-cookie-write
      - id: objectives/command-and-control/dropper/builder::js-ext
    unless:
      - id: metadata/package/testing/harness/runtime::node-common-require
      - id: metadata/package/testing/harness/runtime::is-test
  - id: secret-header-staged-json-dropper
    desc: Header-gated staged JSON payload dropper
    crit: suspicious
    conf: 0.92
    attack: "T1105"
    all:
      - id: staged-json-payload-dropper
      - id: objectives/exfiltration/http/upload::secret-key
  - id: secret-gated-remote-js-stage
    desc: Secret-gated remote JavaScript stage written to disk
    crit: hostile
    conf: 0.96
    attack: "T1105"
    near_lines: 20
    all:
      - id: secret-header-staged-json-dropper
      - id: objectives/command-and-control/infrastructure/paste::jsonkeeper
    any:
      - id: objectives/command-and-control/dropper/builder::js-ext
      - id: micro-behaviors/data/text/keywords/lexicon::payload
    unless:
      - id: metadata/package/testing/harness/runtime::node-common-require
      - id: metadata/package/testing/harness/runtime::is-test
  - id: obfuscated-eval-stage-loader
    desc: Obfuscated eval loader with staged blobs
    crit: hostile
    conf: 0.97
    attack: T1059.007
    mbc: B0032.001
    size_min: 8000
    size_max: 30000
    all:
      - id: objectives/anti-static/obfuscation/syntax::js-trig-charcode-decoder
      - id: objectives/anti-static/obfuscation/code-metrics/string-blob::js-very-long-string-blobs
      - id: objectives/anti-static/obfuscation/code-metrics/string-blob::js-multi-line-blob-layout
      - id: objectives/anti-static/obfuscation/code-metrics/string-blob::js-base64-candidate-cluster
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::high-text-entropy
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::js-high-entropy-identifier-ratio
      - id: js-max-string-over-3000
      - id: objectives/anti-static/obfuscation/code-metrics/structure::very-long-lines
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: jscript-cc-token-stage-wrapper
    desc: JScript conditional tokenized stage wrapper
    crit: hostile
    conf: 0.97
