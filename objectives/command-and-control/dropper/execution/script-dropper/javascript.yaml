# JavaScript Script Dropper Patterns
defaults:
  platforms: [unix, windows]
  for: [javascript]

traits:
- id: jscript-rundll32-dropper
  desc: JScript executing rundll32
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "rundll32(\\.exe)?\\s+.{0,100}DllRegisterServer"
- id: delimiter-split-powershell-launch
  desc: Delimiter-split PowerShell launch command
  crit: component
  conf: 0.95
  platforms: [windows]
  if:
    type: text
    substr: psijRysBVHhosijRysBVHhwsijRysBVHhesijR
- id: delimiter-split-encodedcommand
  desc: Delimiter-split EncodedCommand flag
  crit: component
  conf: 0.95
  platforms: [windows]
  if:
    type: text
    substr: -sijRysBVHhEsijRysBVHhn

- id: obfuscated-jscript-signed-comment-loader
  desc: JScript loader with signed comments
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '//# sourceMappingURL=data:application/json;base64,[A-Za-z0-9+/=]+'
  not:
  - regex: '//# sourceMappingURL=data:application/json;base64,e[wy].{0,24}J2ZXJ'
  unless:
  - id: metadata/build/bundler::has-sourcemap
- id: obfuscated-jscript-signed-entropy-loader
  desc: JScript loader with high entropy comments
  crit: suspicious
  conf: 0.85
  size_min: 200
  if:
    type: text
    regex: '(^|\n)//[A-Za-z][A-Za-z0-9+/=]{179,}'
  unless:
  - type: text
    regex: "///[A-Za-z0-9+/]{100,}"
  - type: text
    regex: '//\s*0x[0-9a-fA-F]{64,}'
  - type: text
    substr: "github.com/owl-factory/lantern/blob/"
  - type: text
    substr: "See also https://github.com/"
  - type: basename
    regex: \.min\.js$
- id: wsh-percent-encoded-unescape-loader
  desc: JScript percent-encoded unescape loader
  crit: suspicious
  conf: 0.94
  platforms: [windows]
  if:
    type: text
    substr: al(un?scap?(
- id: wsh-percent-encoded-xmlhttp-url
  desc: Encoded MSXML2 XMLHTTP fragment
  crit: suspicious
  conf: 0.94
  platforms: [windows]
  if:
    type: text
    substr: MSXML:32:2EXMLHT
- id: wsh-percent-encoded-http-url
  desc: Encoded HTTP URL fragment
  crit: suspicious
  conf: 0.92
  platforms: [windows]
  if:
    type: text
    substr: http:3A:2F:2F
- id: wsh-percent-encoded-admin-php
  desc: Encoded admin.php path fragment
  crit: suspicious
  conf: 0.95
  platforms: [windows]
  if:
    type: text
    substr: admin:2Ephp:3Ff:3D:34:30:34
- id: wsh-percent-encoded-templates-exe
  desc: Encoded Templates folder fragment
  crit: suspicious
  conf: 0.95
  platforms: [windows]
  if:
    type: text
    substr: Sp?cialFold?rs:28:22T?mplat?s:22
- id: wsh-percent-encoded-exe-ext
  desc: Encoded EXE extension fragment
  crit: suspicious
  conf: 0.93
  platforms: [windows]
  if:
    type: text
    substr: 2B:22:2E?x?:22:3B:0D
- id: wsh-percent-encoded-shell-exec-path
  desc: Encoded ShellExecute path fragment
  crit: suspicious
  conf: 0.94
  platforms: [windows]
  if:
    type: text
    substr: x?cut?:28path
- id: wsh-percent-encoded-shell-app
  desc: Encoded Shell.Application fragment
  crit: suspicious
  conf: 0.94
  platforms: [windows]
  if:
    type: text
    substr: sh?ll:2Eapplication
- id: wsh-percent-encoded-open-verb
  desc: Encoded open verb fragment
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    substr: op?n:22:2C:20:31:29
- id: payload-js-write
  desc: Writes fetched content to payload.js
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: 'writeFileSync\s*\(\s*[''"]payload\.js[''"]'
- id: json-cookie-write
  desc: Writes json.cookie property to local payload
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'writeFileSync\s*\(\s*[''"]payload\.js[''"]\s*,\s*[A-Za-z_$][A-Za-z0-9_$]*\.cookie'
- id: browser-uint8array-stage
  desc: Uint8Array stage buffer allocation
  crit: component
  conf: 0.85
  if:
    type: text
    substr: Uint8Array(len)
- id: browser-textdecoder-utf8
  desc: TextDecoder utf8 stage decode
  crit: component
  conf: 0.85
  if:
    type: text
    substr: TextDecoder("utf-8")
- id: local-payload-download-helper-call
  desc: Calls a helper that downloads a payload
  crit: component
  conf: 0.82
  unless:
  - id: micro-behaviors/communications/http/download/webextension::chrome-downloads-api
  if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
    type: symbol
    kind: call
    regex: '^download(Payload|File|Code|Data)$'
- id: local-payload-fetch-helper-call
  desc: Calls a helper that fetches a payload
  crit: component
  conf: 0.82
  unless:
  - type: text
    regex: 'https://(www|data)\.sec\.gov/'
  if:
      # Migrated from a tree-sitter query to a `kind: call` match on
      # the pre-extracted call fact (no per-member cursor walk).
    type: symbol
    kind: call
    regex: '^fetch(Payload|File|Code|Data)$'
  # NOTE: the generic "max embedded string length" metric lives in
  # objectives/anti-static/obfuscation/code-metrics/string-blob (a neutral
  # long-string code metric, at baseline, beside js-very-long-string-blobs).
  # RULES.md: binary/string metrics belong in neutral tiers even when used as
  # composite building blocks — the eval-loader composites below reference it
  # cross-tier rather than carrying it as a notable dropper signal here.
- id: wsh-comma-temp-env-fragment
  desc: Comma-split TEMP environment path
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: '"%"\+\(.{0,40}["'']T["'']\)\+"E"\+"MP%"'
- id: wsh-comma-exe-url-fragment
  desc: Comma-split EXE download URL
  crit: component
  conf: 0.92
  platforms: [windows]
  if:
    type: text
    regex: '"/logs/98yh"\+\(.{0,40}["'']b["'']\)\+"764"\+"d"\+"\.exe"'
- id: manpage-section-basename
  desc: Manpage section path
  crit: notable
  conf: 1.0
  if:
    type: path
    regex: '[\\/]man[0-9][\\/]'
- id: microsoft-copyright-text
  desc: Microsoft library copyright text
  crit: notable
  conf: 1.0
  if:
    type: text
    substr: '//! Copyright (C) Microsoft.'
- id: sha256-digest-hex-call
  desc: Node SHA-256 createHash with hex digest
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'createHash\(\s*[''"]sha(256|512)[''"]\s*\)[\s\S]{0,120}\.digest\(\s*[''"]hex[''"]'
- id: checksum-mismatch-error
  desc: Source mentions checksum/hash mismatch error
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '[Cc]hecksum mismatch|[Hh]ash mismatch|[Ii]ntegrity mismatch'
- id: github-release-version-url
  desc: GitHub release download URL pinned to version
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'releases/download/v?\$\{?(VERSION|version)\}?'
  unless:
  - id: verified-github-binary-installer
- id: js-tmp-filepath-assignment
  desc: JavaScript assigns temp payload path
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "filePath\\s*=\\s*['\"]/tmp/[^'\"]{1,80}['\"]"
- id: js-shell-chmod-filepath
  desc: JavaScript shell chmod on payload variable
  crit: component
  conf: 0.9
  if:
    type: text
    substr: chmod +x ${filePath}
- id: js-exec-filepath-call
  desc: JavaScript executes payload variable
  crit: component
  conf: 0.9
  if:
    type: text
    substr: exec(filePath

composite_rules:
- id: wsh-powershell-path-dropper
  desc: JScript writes and launches PowerShell payload
  crit: hostile
  conf: 0.98
  attack: T1059.007, T1059.001, T1105
  platforms: [windows]
  all:
  - id: micro-behaviors/fs/write/content::create-text-file-method-name
  - id: micro-behaviors/process/create/shell/wsh::shell-application-shellexecute-hidden
  - id: micro-behaviors/os/registry/access::powershell-app-paths-registry-read
  - id: objectives/execution/interpreter/script/wsh::wsh-expand-env-strings-literal
- id: verified-github-binary-installer
  desc: Verified GitHub-release binary installer (legit npm wrapper)
  crit: notable
  conf: 0.95
  all:
  - id: sha256-digest-hex-call
  - id: github-release-version-url
  - id: checksum-mismatch-error
- id: compact-js-download-call
  desc: Compact JavaScript download step
  crit: component
  conf: 0.86
  unless:
  - id: micro-behaviors/communications/http/download/webextension::chrome-downloads-api
  any:
  - id: micro-behaviors/communications/http/download/handler::node-http-stream-to-file
  - id: local-payload-download-helper-call
