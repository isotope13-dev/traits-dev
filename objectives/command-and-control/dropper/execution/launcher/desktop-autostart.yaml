# Weaponized .desktop dropper execution — the APT36 / Tank-Dropper pattern.
#
# The .desktop file IS the dropper: Exec= assembles a decode-write-execute
# chain, the entry is marked for XDG autostart, and Icon=/Name= masquerade
# as a benign document to survive file-manager inspection.
#
# Reference: CYFIRMA APT36 BOSS-Linux autostart-files campaign, 2026.
defaults:
  platforms: [linux]
  for: [desktop-entry]
  mbc: E1105
  attack: T1547.013

traits:
  - id: desktop-decoded-wget-tmp-stage
    desc: Desktop decoded wget temp stage
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(^|[\s;])(/usr/bin/)?wget\b[^\n]{1,260}\s+-O\s+/tmp/'
  - id: desktop-decoded-chmod-pipe-exec
    desc: Desktop decoded chmod pipe exec
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'chmod\s+\+x\s+[A-Za-z0-9._/-]{1,80};[^\n]{1,180}\|\s+\./[A-Za-z0-9._/-]+'

composite_rules:
  - id: weaponized-autostart
    desc: Desktop autostart runs a dropper
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/file/format::desktop-type-application
      - id: metadata/file/format::desktop-exec-present
      - id: metadata/file/format::desktop-terminal-hidden
      - id: objectives/persistence/login/xdg::autostart-enabled
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-dropper-chain

  - id: weaponized-launcher
    desc: Desktop launcher runs a dropper
    crit: hostile
    conf: 0.9
    all:
      - id: metadata/file/format::desktop-type-application
      - id: metadata/file/format::desktop-exec-present
      - id: metadata/file/format::desktop-terminal-hidden
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-dropper-chain
    unless:
      - id: objectives/persistence/login/xdg/

  - id: document-lure-dropper
    desc: Document-masquerade dropper entry
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-dropper-chain
    any:
      - id: objectives/evasion/masquerade/document::document-icon-shell-exec
      - id: objectives/evasion/masquerade/document::document-lure-dropper
  - id: document-lure-decoded-payload-dropper
    desc: Document lure decodes payload dropper
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-base64-decode
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-pipe-to-shell
      - id: desktop-decoded-wget-tmp-stage
      - id: desktop-decoded-chmod-pipe-exec
    any:
      - id: objectives/evasion/masquerade/document::document-icon-shell-exec
      - id: objectives/evasion/masquerade/document::document-lure-dropper
