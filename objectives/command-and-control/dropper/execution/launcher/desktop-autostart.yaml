# Weaponized .desktop dropper execution — the APT36 / Tank-Dropper pattern.
#
# The .desktop file IS the dropper: Exec= assembles a decode-write-execute
# chain, the entry is marked for XDG autostart, and Icon=/Name= masquerade
# as a benign document to survive file-manager inspection.
#
# Reference: CYFIRMA APT36 BOSS-Linux autostart-files campaign, 2026.
defaults:
  platforms: [linux]
  for: [desktop-entry]
  mbc: E1105
  attack: T1547.013

composite_rules:
  - id: weaponized-autostart
    desc: Desktop autostart runs a dropper
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/persistence/login/xdg::desktop-launcher
      - id: objectives/persistence/login/xdg::autostart-enabled
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-dropper-chain

  - id: weaponized-launcher
    desc: Desktop launcher runs a dropper
    crit: hostile
    conf: 0.9
    all:
      - id: objectives/persistence/login/xdg::desktop-launcher
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-dropper-chain
    unless:
      - id: objectives/persistence/login/xdg/

  - id: document-lure-dropper
    desc: Document-masquerade dropper entry
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/anti-static/obfuscation/eval/desktop::desktop-exec-dropper-chain
    any:
      - id: objectives/evasion/masquerade/document::document-icon-shell-exec
      - id: objectives/evasion/masquerade/document::document-lure-dropper
