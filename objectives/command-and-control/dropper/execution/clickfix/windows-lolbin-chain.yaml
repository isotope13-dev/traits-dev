defaults:
  platforms: [windows]
  attack: T1204.002
  mbc: B0024
traits:
- id: cmdkey-external-ip-credential-stage
  desc: cmdkey credential stage for external IP
  crit: suspicious
  conf: 0.93
  for: [batch, powershell, text, html, javascript]
  if:
    type: text
    regex: '(?i)\bcmdkey(\.exe)?\s+/add:([1-9][0-9]{0,2}\.){3}[0-9]{1,3}\s+/user:\S{1,80}'
- id: schtasks-remote-unc-xml--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.93
  for: [batch, powershell, text, html, javascript, pe, dll]
  if:
    type: text
    substr: schtasks
    case_insensitive: true
  count_max: 1009300
- id: schtasks-remote-unc-xml-unc-path
  desc: schtasks remote UNC XML path
  crit: component
  conf: 0.93
  for: [batch, powershell, text, html, javascript, pe, dll]
  if:
    type: text
    regex: '(?i)/(xml|tn)\s+["'']?\|\[^\s]{1,120}\[^\s]{1,120}\.xml\b'
    case_insensitive: true
  count_max: 1009301
- id: schtasks-remote-xml-url
  desc: schtasks remote XML URL
  crit: component
  conf: 0.9
  for: [batch, powershell, text, html, javascript, pe, dll]
  if:
    type: text
    regex: 'https?://[^\s]{1,240}\.xml\b'
    case_insensitive: true
- id: clickfix-rem-not-robot-comment
  desc: ClickFix not robot REM comment
  crit: suspicious
  conf: 0.9
  for: [batch, powershell, text, html, javascript]
  if:
    type: text
    regex: '(?i)\bREM\s+I\s+am\s+not\s+a\s+robot\b'
- id: cmd-chained-shell-command
  desc: cmd.exe chained shell command
  crit: suspicious
  conf: 0.86
  for: [batch, powershell, text, html, javascript]
  if:
    type: text
    regex: '(?i)\bcmd(\.exe)?\s+/c\b.{0,120}(&&|&)'
  unless:
  - path:
    - regex: '(?i)test'
- id: dllregisterserver-string
  desc: DllRegisterServer export string
  crit: component
  conf: 0.88
  for: [pe, dll]
  if:
    type: text
    exact: DllRegisterServer
- id: dllunregisterserver-string
  desc: DllUnregisterServer export string
  crit: component
  conf: 0.88
  for: [pe, dll]
  if:
    type: text
    exact: DllUnregisterServer
- id: short-pdb-marker
  desc: Short PDB marker
  crit: component
  conf: 0.76
  for: [pe, dll]
  if:
    type: text
    regex: '\b[A-Za-z0-9_.-]{1,32}\.pdb\b'
- id: movabs-cookie-fragment
  desc: movabs cookie fragment
  crit: component
  conf: 0.74
  for: [pe, dll]
  if:
    type: hex
    section: .text
    pattern: B8 32 A2 DF 2D 99 2B
composite_rules:
- id: schtasks-remote-unc-xml--rx-3
  desc: schtasks remote XML path
  crit: component
  conf: 0.93
  for: [batch, powershell, text, html, javascript, pe, dll]
  any:
  - id: schtasks-remote-unc-xml-unc-path
  - id: schtasks-remote-xml-url
- id: dllregisterserver-remote-schtasks
  desc: DLLRegisterServer remote XML task
  crit: hostile
  conf: 0.97
  all:
  - id: schtasks-remote-unc-xml
  - id: dllregisterserver-string
  - id: dllunregisterserver-string
  any:
  - id: short-pdb-marker
  - id: movabs-cookie-fragment
- id: clickfix-cmdkey-regsvr32-unc-chain
  desc: ClickFix cmdkey and regsvr32 UNC DLL chain
  crit: hostile
  conf: 0.98
  for: [batch, powershell, text, html, javascript]
  all:
  - id: cmdkey-external-ip-credential-stage
  - id: micro-behaviors/process/create/tool::regsvr32
  any:
  - id: objectives/execution/lure/clipboard::browser-clipboard-write
  - id: clickfix-rem-not-robot-comment
  - id: cmd-chained-shell-command
- id: schtasks-remote-unc-xml
  desc: schtasks creates task from remote UNC XML
  crit: suspicious
  conf: 0.93
  for: [batch, powershell, text, html, javascript, pe, dll]
  all:
  - id: schtasks-remote-unc-xml--rx-2
  - id: schtasks-remote-unc-xml--rx-3
  near_bytes: 4096
