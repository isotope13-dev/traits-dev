defaults:
  platforms: [windows]
  attack: T1204.002
  mbc: B0024
traits:
  - id: cmdkey-external-ip-credential-stage
    desc: cmdkey credential stage for external IP
    crit: suspicious
    conf: 0.93
    for: [batch, powershell, text, html, javascript]
    if:
      type: text
      regex: '(?i)\bcmdkey(?:\.exe)?\s+/add:(?:[1-9][0-9]{0,2}\.){3}[0-9]{1,3}\s+/user:\S{1,80}'
  - id: regsvr32-silent-unc-dll
    desc: regsvr32 silently loads DLL from UNC path
    crit: suspicious
    conf: 0.94
    for: [batch, powershell, text, html, javascript]
    if:
      type: text
      regex: '(?i)\bregsvr32(?:\.exe)?\s+/s\s+\\\\(?:[1-9][0-9]{0,2}\.){3}[0-9]{1,3}\\[^&|"\r\n]{1,160}\.dll\b'
  - id: schtasks-remote-unc-xml
    desc: schtasks creates task from remote UNC XML
    crit: suspicious
    conf: 0.93
    for: [batch, powershell, text, html, javascript, pe, dll]
    if:
      type: text
      regex: '(?i)\bschtasks(?:\.exe)?\s+/Create\s+/TN\s+"?[^"\r\n]{3,80}"?\s+/XML\s+"?\\\\(?:[1-9][0-9]{0,2}\.){3}[0-9]{1,3}\\[^"\r\n]{1,160}\.xml\b'
  - id: clickfix-rem-not-robot-comment
    desc: ClickFix not robot REM comment
    crit: suspicious
    conf: 0.9
    for: [batch, powershell, text, html, javascript]
    if:
      type: text
      regex: '(?i)\bREM\s+I\s+am\s+not\s+a\s+robot\b'
  - id: cmd-chained-shell-command
    desc: cmd.exe chained shell command
    crit: suspicious
    conf: 0.86
    for: [batch, powershell, text, html, javascript]
    if:
      type: text
      regex: '(?i)\bcmd(?:\.exe)?\s+/c\b.{0,120}(?:&&|&)'
  - id: dllregisterserver-string
    desc: DllRegisterServer export string
    crit: component
    conf: 0.88
    for: [pe, dll]
    if:
      type: text
      exact: DllRegisterServer
  - id: dllunregisterserver-string
    desc: DllUnregisterServer export string
    crit: component
    conf: 0.88
    for: [pe, dll]
    if:
      type: text
      exact: DllUnregisterServer
  - id: short-pdb-marker
    desc: Short PDB marker
    crit: component
    conf: 0.76
    for: [pe, dll]
    if:
      type: text
      regex: '\b[A-Za-z0-9_.-]{1,32}\.pdb\b'
  - id: movabs-cookie-fragment
    desc: movabs cookie fragment
    crit: component
    conf: 0.74
    for: [pe, dll]
    if:
      type: hex
      section: .text
      pattern: B8 32 A2 DF 2D 99 2B
composite_rules:
  - id: dllregisterserver-remote-schtasks
    desc: DLLRegisterServer remote XML task
    crit: hostile
    conf: 0.97
    all:
      - id: schtasks-remote-unc-xml
      - id: dllregisterserver-string
      - id: dllunregisterserver-string
    any:
      - id: short-pdb-marker
      - id: movabs-cookie-fragment
  - id: clickfix-cmdkey-regsvr32-unc-chain
    desc: ClickFix cmdkey and regsvr32 UNC DLL chain
    crit: hostile
    conf: 0.98
    for: [batch, powershell, text, html, javascript]
    all:
      - id: cmdkey-external-ip-credential-stage
      - id: regsvr32-silent-unc-dll
    any:
      - id: objectives/execution/lure/clipboard::browser-clipboard-write
      - id: clickfix-rem-not-robot-comment
      - id: cmd-chained-shell-command
