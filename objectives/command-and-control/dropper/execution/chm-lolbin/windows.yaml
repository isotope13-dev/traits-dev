defaults:
  platforms: [windows]
  for: [batch, powershell, text]
  attack: T1105

traits:
  - id: headless-conhost-cmd-curl
    desc: Headless conhost runs curl download
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bconhost(\.exe)?\s+--headless\s+cmd(\.exe)?\s+/c.{0,160}\bcurl(\.exe)?\b'

  - id: curl-download-then-hh-decompile
    desc: curl download feeds hh decompile
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bcurl(\.exe)?\b.{0,240}\s-o\s+\S{1,80}.{0,180}\bhh(\.exe)?\s+-decompile\b'

  - id: hh-decompile-then-lnk-launch
    desc: hh decompile chains LNK launch
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bhh(\.exe)?\s+-decompile\b.{0,160}[&|]\s*\S{1,80}\.lnk\b'

composite_rules:
  - id: headless-curl-chm-lnk-dropper
    desc: Headless curl CHM decompile dropper
    crit: hostile
    conf: 0.98
    all:
      - id: headless-conhost-cmd-curl
      - id: curl-download-then-hh-decompile
      - id: hh-decompile-then-lnk-launch
