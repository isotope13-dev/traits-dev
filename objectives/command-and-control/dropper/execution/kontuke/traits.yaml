# Kontuke PowerShell Dropper
# A PowerShell-based dropper family that uses numeric character array joining
# to obfuscate its primary payload delivery commands.
defaults:
  platforms: [windows]
traits:
  - id: kontuke-wrapper
    desc: Kontuke-specific PowerShell wrapper
    crit: suspicious
    conf: 0.95
    for: [batch, powershell]
    if:
      type: text
      regex: '(?i)powershell\.exe.{0,100}-c\s+iex\s*\(-join\s*\[char\[\]\]@\('
  - id: conhost-headless-cmd
    desc: conhost headless cmd launcher
    crit: suspicious
    conf: 0.92
    for: [batch, powershell, text]
    if:
      type: text
      regex: '(?i)\bconhost(\.exe)?\s+--headless\s+cmd(\.exe)?\s+/c\b'
  - id: curl-sklo-temp-single-letter
    desc: curl insecure temp single-letter download
    crit: suspicious
    conf: 0.88
    for: [batch, powershell, text]
    if:
      type: text
      regex: '(?i)\bcurl(\.exe)?\s+-[a-z]*sklo[a-z]*\s+%TMP%\\x\\[a-z]\s+https?://'
  - id: temp-tar-extract-delete-chain
    desc: temp tar extraction and cleanup chain
    crit: suspicious
    conf: 0.86
    for: [batch, powershell, text]
    if:
      type: text
      regex: '(?i)\bpushd\s+%TMP%\\x\s*&\s*tar\s+xf\s+[a-z]\s*&\s*del\s+[a-z]\b'
  - id: endpointdlp-rundll32-ordinal
    desc: endpointdlp.dll launched by rundll32 ordinal
    crit: suspicious
    conf: 0.96
    for: [batch, powershell, text]
    if:
      type: text
      regex: '(?i)\brundll32(\.exe)?\s+endpointdlp\.dll,#1\b'
  - id: endpointdlp-dll-name
    desc: Endpoint DLP DLL name
    crit: component
    conf: 0.88
    for: [pe]
    if:
      type: text
      section: .rdata
      exact: endpointdlp.dll
  - id: endpointdlp-dlpinitialize-export
    desc: Endpoint DLP initialize export
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: symbol
      exact: DlpInitialize
composite_rules:
  - id: kontuke
    desc: Kontuke PowerShell dropper
    crit: hostile
    conf: 1.0
    all:
      - id: micro-behaviors/process/create/shell/lang::powershell-invocation
      - id: objectives/command-and-control/dropper/execution/batch::powershell-command
      - id: objectives/execution/interpreter/eval/invoke::iex
      - id: objectives/anti-static/obfuscation/string/concat::ps-numeric-chararray
  - id: kontuke-conhost-curl-tar-rundll32-chain
    desc: Kontuke conhost curl tar rundll32 chain
    crit: hostile
    conf: 0.99
    for: [batch, powershell, text]
    all:
      - id: conhost-headless-cmd
      - id: curl-sklo-temp-single-letter
      - id: temp-tar-extract-delete-chain
      - id: endpointdlp-rundll32-ordinal
  - id: endpointdlp-family-loader
    desc: Kontuke Endpoint DLP first-stage loader
    crit: hostile
    conf: 0.98
    for: [pe]
    all:
      - id: endpointdlp-dll-name
      - id: endpointdlp-dlpinitialize-export
      - id: objectives/command-and-control/dropper/execution/loader::sidecar-exception-memory-loader
    any:
      - id: objectives/evasion/indicator-removal/timestamps::future-pe-debug-timestamps
      - id: objectives/anti-analysis/debugger-detect/tls::tls-callback-present
      - id: metadata/signed::unsigned
