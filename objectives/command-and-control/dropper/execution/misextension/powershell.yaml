defaults:
  platforms: [windows]
  for: [png, text]
  attack: T1059.001
  mbc: B0024

traits:
  - id: ps-wscript-shell-run
    desc: WScript Shell Run in text carrier
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'WScript\.Shell'

  - id: ps-frombase64-decode
    desc: PowerShell Base64 command decode
    crit: component
    conf: 0.86
    if:
      type: text
      substr: FromBase64String

  - id: ps-downloadfile-exe-tasks
    desc: Downloads EXE into Windows Tasks
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)DownloadFile.{0,64}\.exe.{0,64}windows\\\\tasks'

  - id: ps-downloadstring-text
    desc: DownloadString in text carrier
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: DownloadString

composite_rules:
  - id: ps-text-image-downloader
    desc: Image text PowerShell downloader
    crit: hostile
    conf: 0.99
    all:
      - id: ps-wscript-shell-run
      - id: ps-frombase64-decode
      - id: ps-downloadfile-exe-tasks
      - id: ps-downloadstring-text
