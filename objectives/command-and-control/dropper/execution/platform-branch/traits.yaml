# Platform-Branched Dropper Detection
# Detects Node.js droppers that branch on OS to deliver platform-specific payloads.
defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  attack: T1059.007
composite_rules:
  - id: platform-branched-dropper
    desc: Platform-branched payload dropper
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/sysinfo/platform/runtime::multi-platform-branch
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
    any:
      - id: micro-behaviors/process/create/shell/bridge::execSync-call
      - id: micro-behaviors/process/create/shell/bridge::js-exec
      - id: micro-behaviors/process/create/shell/bridge::spawn-call
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: objectives/command-and-control/dropper/node-bootstrap/
      - id: metadata/library/ai/
  - id: platform-branched-supply-chain-dropper
    desc: Supply chain platform-branched dropper
    crit: hostile
    conf: 0.95
    attack: T1195.002
    all:
      - id: platform-branched-dropper
    any:
      - id: objectives/evasion/self-delete/file/script::node-self-delete
      - id: objectives/evasion/self-delete/file/script::manifest-swap
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
