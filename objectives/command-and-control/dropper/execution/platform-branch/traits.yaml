# Platform-Branched Dropper Detection
# Detects Node.js droppers that branch on OS to deliver platform-specific payloads
# Used by axios hijack, and other cross-platform supply chain attacks
# ATT&CK: T1059.007 (JavaScript), T1082 (System Information Discovery)
defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  attack: T1059.007
traits:
  - id: platform-darwin-branch
    desc: Platform check for macOS (darwin)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (process\.platform|os\.platform\(\))\s*===?\s*"darwin"
  - id: platform-win32-branch
    desc: Platform check for Windows (win32)
    crit: component
    conf: 0.7
    unless:
      - type: text
        substr: const isWindows = process.platform === "win32";
      - type: basename
        regex: (^|[\\/])app\.asar\.unpacked[\\/]dist[\\/]
      - id: well-known/app/tabby::tabby-builtin-plugin-path
      - type: basename
        regex: (^|[\\/])node_modules[\\/](native-process-working-directory|node-pty)[\\/]
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]node_modules[\\/]rimraf[\\/]
    if:
      type: text
      regex: (process\.platform|os\.platform\(\))\s*===?\s*"win32"
    not:
      - substr: module.exports = process.platform === 'win32'
      - substr: self.root = self.root.replace(/\\/g, "/")
      - substr: const isWindows = process.platform === "win32";
  - id: platform-linux-branch
    desc: Platform check for Linux
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (process\.platform|os\.platform\(\))\s*===?\s*"linux"
  - id: platform-switch-statement
    desc: Switch statement on platform
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: switch\s*\(\s*os\.platform\(\)\s*\)
composite_rules:
  - id: multi-platform-branch
    desc: Multi-platform OS branching logic
    crit: notable
    conf: 0.8
    attack: T1082
    needs: 2
    any:
      - id: objectives/command-and-control/dropper/execution/platform-branch::platform-darwin-branch
      - id: objectives/command-and-control/dropper/execution/platform-branch::platform-linux-branch
      - id: objectives/command-and-control/dropper/execution/platform-branch::platform-switch-statement
      - id: objectives/command-and-control/dropper/execution/platform-branch::platform-win32-branch
    unless:
      - id: metadata/library/structure::js-large-module-bundle
  - id: platform-branched-dropper
    desc: Platform-branched payload dropper
    crit: suspicious
    conf: 0.9
    all:
      - id: multi-platform-branch
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
    any:
      - id: micro-behaviors/process/create/shell/bridge::execSync-call
      - id: micro-behaviors/process/create/shell/bridge::js-exec
      - id: micro-behaviors/process/create/shell/bridge::spawn-call
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: objectives/command-and-control/dropper/node-bootstrap/
      - id: metadata/library/ai/
  - id: platform-branched-supply-chain-dropper
    desc: Supply chain platform-branched dropper
    crit: hostile
    conf: 0.95
    attack: T1195.002
    all:
      - id: platform-branched-dropper
    any:
      - id: objectives/evasion/self-delete/file/script::node-self-delete
      - id: objectives/evasion/self-delete/file/script::manifest-swap
      - id: objectives/supply-chain/install-hook/scripts/lifecycle::install-hook-exists
