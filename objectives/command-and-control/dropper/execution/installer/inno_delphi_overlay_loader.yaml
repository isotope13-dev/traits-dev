defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.9

traits:
  - id: appmutex-string
    desc: AppMutex string marker
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: AppMutex

  - id: setupmutex-string
    desc: SetupMutex string marker
    crit: notable
    conf: 0.86
    if:
      type: text
      exact: SetupMutex

  - id: nvidia-driver-loader-banner
    desc: Driver-themed loader banner
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: (?i)Nvidia driver loader,\s+version

  - id: winhttp-system32-manifest
    desc: WinHTTP system32 manifest dependency
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: (?i)<file name="winhttp\.dll" loadFrom="%SystemRoot%\\system32\\"

  - id: delphi-compiler-banner
    desc: Embarcadero Delphi compiler banner
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: (?i)Embarcadero Delphi for Win32 compiler version

composite_rules:
  - id: inno-delphi-installer-foundation
    desc: Inno Setup binary with Delphi runtime profile
    crit: notable
    conf: 0.93
    all:
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/lang/compiler/managed::delphi

  - id: inno-mutex-pair
    desc: Inno-style mutex pair marker
    crit: suspicious
    conf: 0.9
    all:
      - id: appmutex-string
      - id: setupmutex-string

  - id: inno-delphi-overlay-loader
    desc: Delphi/Inno installer with dominant staged overlay
    crit: suspicious
    conf: 0.96
    all:
      - id: inno-delphi-installer-foundation
      - id: metadata/binary/layout::overlay-over-90pct
      - id: objectives/command-and-control/dropper/execution/installer::large-overlay-bundle
    unless:
      - id: metadata/signed/developer::open-source-developer

  - id: inno-crypto-com-loader
    desc: Inno/Delphi loader with COM array staging and PBKDF2
    crit: suspicious
    conf: 0.97
    all:
      - id: inno-delphi-installer-foundation
      - id: micro-behaviors/os/com::com-safearray-automation-triad
      - id: micro-behaviors/crypto/kdf/operations::pbkdf2
    any:
      - id: metadata/binary/installer/script::inno-password-canary
      - id: metadata/binary/installer/script::inno-bcrypt-random
      - id: metadata/binary/layout::pe-checksum-zeroed
    needs: 1

  - id: inno-privilege-aware-loader
    desc: Inno/Delphi loader with locale and token reconnaissance
    crit: suspicious
    conf: 0.95
    all:
      - id: inno-delphi-installer-foundation
      - id: objectives/anti-analysis/geofencing/location::windows-api-locale-check
      - id: objectives/privilege-escalation/token-manipulation::token-manipulation-cluster
    any:
      - id: micro-behaviors/fs/enumerate/volume::get-volume-info
      - id: micro-behaviors/os/sysinfo/hardware::get-disk-space
      - id: objectives/privilege-escalation/token-manipulation::dynamic-token-privilege-chain
    needs: 1

  - id: inno-driver-themed-loader
    desc: Driver-themed Inno/Delphi loader profile
    crit: suspicious
    conf: 0.95
    all:
      - id: inno-delphi-installer-foundation
    any:
      - id: nvidia-driver-loader-banner
      - id: winhttp-system32-manifest
      - id: inno-mutex-pair
      - id: delphi-compiler-banner
    needs: 2

  - id: inno-staged-rat-loader
    desc: Overlay-heavy Inno/Delphi staged loader with COM and crypto
    crit: hostile
    conf: 0.99
    all:
      - id: inno-delphi-overlay-loader
      - id: micro-behaviors/os/com::com-safearray-automation-triad
      - id: micro-behaviors/crypto/kdf/operations::pbkdf2
    any:
      - id: metadata/binary/installer/script::inno-password-canary
      - id: metadata/binary/installer/script::inno-bcrypt-random
      - id: metadata/binary/layout::pe-checksum-zeroed
      - id: metadata/signed::unsigned-pe-executable
    needs: 2

  - id: inno-privileged-overlay-stage-loader
    desc: Overlay-heavy Inno/Delphi loader with privilege and geofence logic
    crit: hostile
    conf: 0.99
    all:
      - id: inno-delphi-overlay-loader
      - id: objectives/anti-analysis/geofencing/location::windows-api-locale-check
      - id: micro-behaviors/process/inject/runtime::suspend-thread
    any:
      - id: objectives/privilege-escalation/token-manipulation::token-manipulation-cluster
      - id: micro-behaviors/os/com::com-safearray-automation-triad
      - id: metadata/binary/installer/script::inno-password-canary
      - id: metadata/binary/layout::pe-checksum-zeroed
    needs: 2

  - id: fake-driver-inno-stage-loader
    desc: Driver-masquerading Inno/Delphi staged loader
    crit: hostile
    conf: 0.98
    all:
      - id: inno-delphi-overlay-loader
      - id: inno-driver-themed-loader
    any:
      - id: metadata/binary/installer/script::inno-password-canary
      - id: metadata/binary/installer/script::inno-bcrypt-random
      - id: metadata/signed::unsigned-pe-executable
    needs: 1
