defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.9

traits:
- id: nvidia-driver-loader-banner
  desc: Driver-themed loader banner
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: (?i)Nvidia driver loader,\s+version

composite_rules:
- id: inno-delphi-installer-foundation
  desc: Inno Setup binary with Delphi runtime profile
  crit: suspicious
  conf: 0.93
  all:
  - id: metadata/lang/compiler/managed::delphi
  any:
  - id: metadata/binary/installer/script::inno-setup-installer-text
  - id: metadata/binary/installer/script::inno-setup-installer-data
  - id: metadata/binary/installer/script::inno-setup-550-data-marker
- id: inno-delphi-overlay-loader
  desc: Delphi/Inno installer with dominant staged overlay
  crit: component
  conf: 0.96
  all:
  - id: inno-delphi-installer-foundation
  - id: metadata/binary/layout::overlay-over-90pct
  - id: metadata/binary/layout::large-overlay-1mb
  unless:
  - id: metadata/signed/developer::open-source-developer
  - id: metadata/signed/leaf::johannes-schindelin

- id: inno-opaque-overlay-loader
  desc: Inno/Delphi installer with opaque staged overlay
  crit: suspicious
  conf: 0.97
  all:
  - id: inno-delphi-installer-foundation
  - id: metadata/binary/layout::overlay-dominates-third
  - id: metadata/binary/layout::large-overlay-1mb
  - id: objectives/anti-static/obfuscation/binary-metrics::high-entropy-overlay-raw
  any:
  - id: objectives/evasion/indicator-removal/timestamps::inno-55-pre2000-timestamp
  - id: metadata/binary/installer/script::inno-password-canary
  - id: metadata/binary/installer/script::inno-bcrypt-random
  - id: metadata/binary/layout::pe-checksum-zeroed
  unless:
  - id: metadata/signed/developer::open-source-developer
  - id: metadata/signed/leaf::johannes-schindelin
  - id: metadata/signed/platform::microsoft

- id: inno-privileged-opaque-dropper
  desc: Privilege-aware Inno opaque overlay dropper
  crit: hostile
  conf: 0.98
  all:
  - id: inno-opaque-overlay-loader
  - id: metadata/signed/trust-level::unsigned
  - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
  - id: objectives/privilege-escalation/token-manipulation::dynamic-token-privilege-chain
  - id: objectives/impact/system/shutdown::shutdown-privilege-reboot-api
  any:
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: micro-behaviors/fs/file/write/direct::write-file
  - id: micro-behaviors/fs/file/delete::deletefile-a
  - id: micro-behaviors/fs/directory/mkdir::create-directory-a
  needs: 2
  unless:
  - id: metadata/binary/installer::known-benign-installer
  - id: metadata/signed/developer::open-source-developer
  - id: metadata/signed/platform::microsoft

- id: inno-crypto-com-loader
  desc: Inno/Delphi loader with COM array staging and PBKDF2
  crit: suspicious
  conf: 0.97
  all:
  - id: inno-delphi-installer-foundation
  - id: micro-behaviors/os/com::safearray-put-element
  - id: micro-behaviors/crypto/kdf::pbkdf2
  any:
  - id: metadata/binary/installer/script::inno-password-canary
  - id: metadata/binary/installer/script::inno-bcrypt-random
  - id: metadata/binary/layout::pe-checksum-zeroed
- id: inno-privilege-aware-loader
  desc: Inno/Delphi loader with dynamic privilege control
  crit: suspicious
  conf: 0.95
  all:
  - id: inno-delphi-installer-foundation
  - id: micro-behaviors/os/sysinfo/platform/locale::get-system-default-ui-language
  - id: objectives/privilege-escalation/token-manipulation::token-manipulation-cluster
  - id: objectives/privilege-escalation/token-manipulation::dynamic-token-privilege-chain
  any:
  - id: micro-behaviors/fs/enumerate/volume::get-volume-info
  - id: micro-behaviors/os/sysinfo/hardware::get-disk-space
  - id: micro-behaviors/os/com::safearray-put-element
  unless:
  - id: metadata/signed/developer::open-source-developer
  - id: metadata/signed/leaf::johannes-schindelin
  - id: metadata/signed/platform::microsoft

- id: inno-driver-themed-loader
  desc: Driver-themed Inno/Delphi loader profile
  crit: suspicious
  conf: 0.95
  all:
  - id: inno-delphi-installer-foundation
  - id: nvidia-driver-loader-banner
  any:
  - id: metadata/binary/installer::winhttp-system32-manifest
  - id: metadata/lang/compiler/managed::embarcadero-delphi-compiler-banner
- id: inno-staged-rat-loader
  desc: Overlay-heavy Inno/Delphi staged loader with COM and crypto
  crit: hostile
  conf: 0.99
  all:
  - id: inno-delphi-overlay-loader
  - id: micro-behaviors/os/com::safearray-put-element
  - id: micro-behaviors/crypto/kdf::pbkdf2
  any:
  - id: metadata/binary/installer/script::inno-password-canary
  - id: metadata/binary/installer/script::inno-bcrypt-random
  - id: metadata/binary/layout::pe-checksum-zeroed
  - id: metadata/signed/trust-level::unsigned-pe-executable
  needs: 2

- id: inno-encrypted-overlay-thread-loader
  desc: Encrypted Inno overlay controls thread
  crit: hostile
  conf: 0.97
  attack: T1027.002
  mbc: B0032
  all:
  - id: inno-delphi-installer-foundation
  - id: objectives/anti-static/obfuscation/payload/encrypted::encrypted-inno-overlay-payload
  any:
  - id: micro-behaviors/process/inject/runtime::resume-thread-dup
  - id: micro-behaviors/process/inject/runtime::suspend-thread
  - id: micro-behaviors/process/inject/dll::load-library-a-remote-resolution
  - id: micro-behaviors/os/privilege/token::shutdown-privilege-name
  - id: objectives/privilege-escalation/token-manipulation::token-manipulation-cluster
  needs: 2
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft

- id: inno-privileged-overlay-stage-loader
  desc: Overlay-heavy Inno/Delphi loader with privilege and geofence logic
  crit: hostile
  conf: 0.99
  all:
  - id: inno-delphi-overlay-loader
  - id: micro-behaviors/os/sysinfo/platform/locale::get-system-default-ui-language
  - id: micro-behaviors/process/inject/runtime::suspend-thread
  any:
  - id: objectives/privilege-escalation/token-manipulation::dynamic-token-privilege-chain
  - id: micro-behaviors/os/com::safearray-put-element
  - id: metadata/binary/installer/script::inno-password-canary
  - id: metadata/binary/layout::pe-checksum-zeroed
  needs: 2
  unless:
  - id: metadata/signed/developer::open-source-developer
  - id: metadata/signed/leaf::johannes-schindelin
  - id: metadata/signed/platform::microsoft

- id: inno-privileged-opaque-stage-loader
  desc: Opaque Inno/Delphi loader with privilege control
  crit: hostile
  conf: 0.99
  all:
  - id: inno-opaque-overlay-loader
  - id: metadata/signed/trust-level::unsigned
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/process/inject/runtime::suspend-thread
  - id: micro-behaviors/os/privilege/token::shutdown-privilege-name
  - id: objectives/privilege-escalation/token-manipulation::token-manipulation-cluster
  any:
  - id: objectives/privilege-escalation/token-manipulation::dynamic-token-privilege-chain
  - id: micro-behaviors/os/sysinfo/platform/locale::get-system-default-ui-language
  - id: micro-behaviors/os/com::safearray-put-element
  - id: metadata/binary/installer::winhttp-system32-manifest
  needs: 2
  unless:
  - id: metadata/signed/developer::open-source-developer
  - id: metadata/signed/leaf::johannes-schindelin
  - id: metadata/signed/platform::microsoft

- id: fake-driver-inno-stage-loader
  desc: Driver-masquerading Inno/Delphi staged loader
  crit: hostile
  conf: 0.98
  all:
  - id: inno-delphi-overlay-loader
  - id: inno-driver-themed-loader
  any:
  - id: metadata/binary/installer/script::inno-password-canary
  - id: metadata/binary/installer/script::inno-bcrypt-random
  - id: metadata/signed/trust-level::unsigned-pe-executable
- id: nvidia-masquerade-encrypted-inno-dropper
  desc: NVIDIA-masquerading encrypted Inno dropper
  crit: hostile
  conf: 0.99
  all:
  - id: objectives/anti-static/obfuscation/payload/encrypted::encrypted-inno-overlay-payload
  - id: objectives/evasion/masquerade/version-resource::nvidia-labs-driver-version-masquerade
  - id: metadata/signed/trust-level::unsigned
  - id: micro-behaviors/process/create/spawn::create-process-w
  any:
  - id: micro-behaviors/fs/file/write/direct::write-file
  - id: micro-behaviors/fs/file/open::file-create-win
  - id: micro-behaviors/os/privilege/token::adjust-token-privileges
  - id: micro-behaviors/os/privilege/token::shutdown-privilege-name
  needs: 2
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/signed/developer::open-source-developer
