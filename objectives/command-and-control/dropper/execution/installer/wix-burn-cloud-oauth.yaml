defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: E1105

composite_rules:
  - id: wix-burn-runonce-bootstrapper
    desc: WiX Burn bootstrapper persists via RunOnce
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
      - id: objectives/persistence/login/registry/autostart::run-once-key
    any:
      - id: micro-behaviors/communications/http/get::wininet-http-flow
      - id: micro-behaviors/communications/http/get::wininet-http-flow-import-strings
  - id: wix-burn-cloud-oauth-bundle
    desc: WiX Burn bundle with cloud OAuth theft surface
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
      - id: objectives/credential-access/cloud/token::multi-provider-cloud-oauth-surface
      - id: metadata/binary/layout::multiple-pe-embedded
    any:
      - id: objectives/persistence/login/registry/autostart::run-once-key
      - id: micro-behaviors/communications/http/get::wininet-http-flow-import-strings
  - id: wix-burn-cloud-stealer-dropper
    desc: WiX Burn dropper with cloud token theft
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
      - id: objectives/persistence/login/registry/autostart::run-once-key
      - id: objectives/credential-access/cloud/token::multi-provider-cloud-oauth-surface
    any:
      - id: micro-behaviors/communications/http/get::wininet-http-flow
      - id: micro-behaviors/communications/http/get::wininet-http-flow-import-strings
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: objectives/command-and-control/dropper/behavior::self-map-extract-execute
    needs: 1
