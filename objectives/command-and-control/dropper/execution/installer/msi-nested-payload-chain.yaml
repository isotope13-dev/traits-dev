defaults:
  platforms: [windows]
  for: [all]
  attack: T1204.002,T1548.002,T1036.007

composite_rules:
  - id: msi-flash-elevated-ai-packaged-dropper
    desc: Flash-lure MSI elevates AI package
    crit: hostile
    conf: 0.99
    scope: outer
    all:
      - id: metadata/file/profile/identity::msi-bytes-enforced-runasadmin
      - id: metadata/package/files/msi::msi-office-flashplayer-application
      - id: metadata/file/profile/identity::msi-bytes-advanced-installer-product
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family::known-benign-installer

  - id: msi-opaque-brand-ai-packaged-dropper
    desc: Opaque-brand Advanced Installer MSI
    crit: hostile
    conf: 0.97
    attack: T1036.005,T1027.009,T1204.002
    scope: outer
    all:
      - id: metadata/package/files/msi::msi-office-opaque-product-brand
      - id: metadata/package/files/msi::msi-office-opaque-product-subject
      - id: metadata/file/profile/identity::msi-bytes-advanced-installer-product
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family::known-benign-installer
