# MSI packages that embed an ISAPI-capable DLL behind a high-entropy overlay.
# Real IIS extensions are delivered as signed DLLs, not as opaque installer
# cabinets with fabricated product identity.
defaults:
  platforms: [windows]
  for: [oledoc, ole, pe, dll]
  attack: T1505.004,T1105

composite_rules:
  - id: msi-packed-isapi-extension-dropper
    desc: Installer packs ISAPI extension behind high-entropy overlay
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/server/module::http-extension-proc-export
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::embedded-cipher-payload
      - id: objectives/anti-static/obfuscation/payload/section::empty-code-high-entropy-overlay
      - id: metadata/binary/layout::high-entropy-overlay
    needs: 2
