defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0022

composite_rules:
  - id: yinginstall-opaque-overlay-loader
    desc: YingInstall wrapper with opaque LZMA overlay
    crit: suspicious
    conf: 0.98
    size_min: 4000000
    all:
      - id: metadata/binary/installer/family::yinginstall-wrapper
      - id: micro-behaviors/data/embedded/payload/compression::overlay-lzma-header
      - id: metadata/binary/metrics/structural::malformed-pe-structure
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: metadata/build/manifest::pe-requires-admin
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/exec::shell-execute-a
    needs: 3
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform/

  - id: yinginstall-staged-rat-loader
    desc: YingInstall staged RAT loader
    crit: hostile
    conf: 0.98
    size_min: 1000000
    all:
      - id: objectives/command-and-control/dropper/execution/installer::yinginstall-opaque-overlay-loader
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::foreground-window-input-state
      - id: objectives/anti-analysis/timing/evasion::ui-timer-keypoll-gate
      - id: objectives/collection/screenshot/capture::gdi-window-capture
      - id: objectives/impact/system/shutdown::shutdown-privilege-reboot-api
    needs: 2
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform/
