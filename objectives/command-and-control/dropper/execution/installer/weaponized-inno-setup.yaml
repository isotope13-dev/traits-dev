defaults:
  platforms: [windows]
  for: [pe]
  crit: hostile
  conf: 0.95

composite_rules:
- id: weaponized-inno-setup-dropper
  desc: Weaponized Inno Setup dropper with COM automation
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/binary/installer/script::inno-setup
  - id: objectives/command-and-control/dropper/execution/installer::inno-crypto-com-loader
  any:
  - id: metadata/binary/section/names::suspicious-reloc-section
  - id: metadata/binary/layout::pe-checksum-zeroed
- id: self-issued-chrome-opaque-inno-dropper
  desc: Self-issued Chrome-branded Inno opaque dropper
  crit: hostile
  conf: 0.99
  attack: T1027.009,T1036.005,T1106
  mbc: B0032
  all:
  - id: metadata/package/versioning::pe-product-name-chrome
  - id: metadata/package/versioning::pe-file-description-chrome-setup
  - id: metadata/binary/installer/family::inno-delphi-installer-foundation
  - id: metadata/signed/certificate/identity::pe-cert-leaf-self-issued-kv
  - id: metadata/binary/layout::high-entropy-overlay
  - id: metadata/binary/layout::large-overlay-1mb
  - id: micro-behaviors/os/com/array::safearray-data-manipulation-cluster
  - id: micro-behaviors/process/create/spawn::create-process-w
