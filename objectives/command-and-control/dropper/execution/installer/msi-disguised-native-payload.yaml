defaults:
  platforms: [windows]
  for: [all]
  attack: T1027.009
composite_rules:
  - id: msi-disguised-native-payload
    desc: MSI bundles a disguised native payload
    crit: hostile
    conf: 0.96
    mbc: E1105
    all:
      - id: metadata/file/profile/identity::msi-disguised-backup-component
      - id: metadata/file/profile/identity::msi-delphi-runtime-bundle
      - id: metadata/file/profile/identity::msi-madcollection-runtime-bundle
