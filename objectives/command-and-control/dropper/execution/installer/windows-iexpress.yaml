defaults:
  platforms: [windows]
  for: [pe]
  attack: T1218
  mbc: B0024
traits:
  - id: cmd-comspec-pipe-launch
    desc: Cmd pipes dropped AIFF to ComSpec
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: cmd /c oLIjA & type Dropped.aiff | %comspec%
  - id: dropped-aiff-stage
    desc: Dropped AIFF stage filename
    crit: component
    conf: 0.96
    if:
      type: text
      exact: Dropped.aiff
  - id: advpack-delnode-rundll32
    desc: Rundll32 advpack DelNode cleanup
    crit: suspicious
    conf: 0.95
    count_min: 2
    if:
      type: text
      exact: rundll32.exe %sadvpack.dll,DelNodeRunDLL32 "%s"
  - id: rundll32-inf-install
    desc: Rundll32 InstallHinfSection launcher
    crit: suspicious
    conf: 0.97
    count_min: 2
    if:
      type: text
      exact: rundll32.exe %s,InstallHinfSection %s 128 %s
  - id: inf-install-entrypoint
    desc: InstallHinfSection entrypoint string
    crit: notable
    conf: 0.94
    if:
      type: text
      exact: InstallHinfSection
  - id: do-inf-install
    desc: DoInfInstall helper string
    crit: notable
    conf: 0.92
    count_min: 2
    if:
      type: text
      exact: DoInfInstall
composite_rules:
  - id: iexpress-command-pipe-dropper
    desc: IExpress installer executes piped dropped payload
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/sfx::iexpress
      - id: metadata/binary/installer/sfx::iexpress-config-directives
      - id: objectives/command-and-control/dropper/execution/installer::cmd-comspec-pipe-launch
      - id: micro-behaviors/process/create/spawn::create-process-a
  - id: iexpress-inf-install-dropper
    desc: IExpress installer launches INF payload stage
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/installer/sfx::iexpress
      - id: metadata/binary/installer/sfx::iexpress-config-directives
      - id: metadata/binary/installer/sfx::cabinet-fdi-extraction
      - id: micro-behaviors/process/create/spawn::create-process-a
    any:
      - id: objectives/command-and-control/dropper/execution/installer::rundll32-inf-install
      - id: objectives/command-and-control/dropper/execution/installer::inf-install-entrypoint
      - id: objectives/command-and-control/dropper/execution/installer::do-inf-install
    needs: 1
  - id: iexpress-legacy-installer-tradecraft
    desc: IExpress dropper with legacy cleanup commands
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/installer/sfx::iexpress-resource-heavy-sfx
    any:
      - id: objectives/command-and-control/dropper/execution/installer::advpack-delnode-rundll32
      - id: objectives/command-and-control/dropper/execution/installer::dropped-aiff-stage
      - id: micro-behaviors/os/msdos/internal::check-command-com
    needs: 2
