defaults:
  platforms: [windows]
  for: [batch]
  attack: T1218.007

traits:
  - id: batch-msiexec-scrambled-fragment
    desc: Batch stores scrambled msiexec fragment
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bSet\s+"?[A-Za-z0-9_]{6,}=esix"?'

  - id: batch-cmd-scrambled-fragment
    desc: Batch stores scrambled cmd fragment
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bSet\s+"?[A-Za-z0-9_]{6,}=Cdm"?'

  - id: batch-dynamic-install-switch
    desc: Batch reconstructs installer switch
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'Set\s+"?[A-Za-z0-9_]{6,}=/![A-Za-z0-9_]{6,}:~[0-9]+,[0-9]+!'

  - id: batch-image-extension-stage
    desc: Batch stages image-extension payload
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bSet\s+"?[A-Za-z0-9_]{6,}=\.[bjpt][a-z]?[mp]'

composite_rules:
  - id: obfuscated-msiexec-temp-image-launcher
    desc: Obfuscated BAT launches temp image MSI
    crit: hostile
    conf: 0.97
    all:
      - id: batch-msiexec-scrambled-fragment
      - id: batch-cmd-scrambled-fragment
      - id: batch-dynamic-install-switch
      - id: batch-image-extension-stage
      - id: objectives/anti-static/obfuscation/string/anomaly::batch-delayed-substring-slicing
