defaults:
  platforms: [windows, unix]
  for: [java, class]
traits:
  - id: allatori-demo-marker
    desc: Allatori demo marker in compact installer
    crit: suspicious
    conf: 0.9
    size_max: 12000
    if:
      type: text
      substr: ALLATORIxDEMO
  - id: os-gate-bytecode-chain
    desc: Dense Allatori string table blob
    crit: suspicious
    conf: 0.96
    size_max: 12000
    if:
      type: text
      exact: &
  - id: pgzi-decoder-table
    desc: Compact Allatori decoder table marker
    crit: notable
    conf: 0.94
    size_max: 12000
    if:
      type: text
      exact: PGZI-,$&IJcJIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIIJcJIIIIIIIIIII
  - id: obfuscated-helper-qy-y
    desc: Obfuscated helper symbol QY_Y
    crit: suspicious
    conf: 0.86
    size_max: 12000
    if:
      type: text
      exact: QY_Y
  - id: obfuscated-helper-iooi
    desc: Obfuscated helper symbol IOOI
    crit: suspicious
    conf: 0.86
    size_max: 12000
    if:
      type: text
      exact: IOOI
  - id: obfuscated-helper-zyxy
    desc: Obfuscated helper symbol ZYXY
    crit: suspicious
    conf: 0.86
    size_max: 12000
    if:
      type: text
      exact: ZYXY
composite_rules:
  - id: allatori-installer-primitives
    desc: Allatori Java installer primitives
    crit: suspicious
    conf: 0.95
    all:
      - id: allatori-demo-marker
      - id: obfuscated-helper-qy-y
      - id: obfuscated-helper-iooi
      - id: obfuscated-helper-zyxy
