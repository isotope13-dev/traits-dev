defaults:
  for: [java, class]
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: allatori-demo-marker
    desc: Allatori demo marker in compact installer
    crit: suspicious
    conf: 0.9
    size_max: 12000
    if:
      type: raw
      substr: ALLATORIxDEMO
  - id: compact-obfuscated-class
    desc: Compact obfuscated Java installer class
    crit: component
    conf: 0.78
    size_max: 12000
    if:
      type: string_value_count
      max: 110
      min_length: 4
  - id: getproperty-branch
    desc: System property branch helper
    crit: suspicious
    conf: 0.83
    if:
      type: raw
      word: getProperty
  - id: lower-case-branch
    desc: Lowercase branch helper
    crit: component
    conf: 0.8
    if:
      type: raw
      word: toLowerCase
  - id: contains-branch
    desc: String contains branch helper
    crit: component
    conf: 0.8
    if:
      type: raw
      word: contains
composite_rules:
  - id: os-name-branch
    desc: OS name gate in installer logic
    crit: suspicious
    conf: 0.83
    all:
      - id: getproperty-branch
      - id: lower-case-branch
      - id: contains-branch
  - id: allatori-installer-primitives
    desc: Allatori Java installer primitives
    crit: suspicious
    conf: 0.95
    all:
      - id: allatori-demo-marker
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode
      - id: micro-behaviors/process/info/current::protection-domain-self-path
      - id: micro-behaviors/fs/file/copy::java-stream-copy
  - id: compact-allatori-installer-dropper
    desc: Compact Allatori installer dropper
    crit: hostile
    conf: 0.98
    all:
      - id: allatori-installer-primitives
      - id: compact-obfuscated-class
    any:
      - id: os-name-branch
