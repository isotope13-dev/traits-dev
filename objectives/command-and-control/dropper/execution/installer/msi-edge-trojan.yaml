# MSI trojan that uses msedge_proxy.exe as application front
# while embedding persistence/management libraries
defaults:
  platforms: [windows]
  for: [oledoc]
  conf: 0.92
traits:
  - id: msi-edge-install-path
    desc: MSI installs to Edge Application path
    crit: component
    if:
      type: text
      substr: \Microsoft\Edge\Application\msedge_proxy.exe
composite_rules:
  - id: msi-edge-proxy-trojan
    desc: MSI trojan fronted by Edge proxy app
    crit: hostile
    conf: 0.96
    attack: T1036.005
    all:
      - id: objectives/execution/lolbin/os::msi-edge-proxy-app
      - id: metadata/binary/installer/database::msi-persistence-libraries
    any:
      - id: objectives/persistence/login/startup/shortcut::create-shortcut
      - id: metadata/binary/installer/database::msi-anti-tamper
  - id: msi-lolbin-persistence-combo
    desc: MSI with LOLBin launch and scheduler
    crit: suspicious
    conf: 0.93
    all:
      - id: objectives/execution/lolbin/os::msi-edge-proxy-app
    any:
      - id: metadata/binary/installer/database::embedded-taskscheduler-dll
      - id: metadata/binary/installer/database::embedded-wmi-dll
