defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0022
traits:
  - id: large-overlay-bundle
    desc: Large overlay bundle
    crit: suspicious
    conf: 0.96
    size_min: 1000000
    if:
      type: metrics
      field: binary.overlay_size
      min: 1000000
composite_rules:
  - id: signed-7zip-sfx-stage-loader
    desc: 7-Zip SFX bundle with staged loader behavior
    crit: suspicious
    conf: 0.98
    size_min: 1000000
    all:
      - id: objectives/command-and-control/dropper/execution/installer::large-overlay-bundle
      - id: metadata/format/installer::7zip-sfx-runtime
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    needs: 2
    any:
      - id: micro-behaviors/crypto/certificate/install::cert-install-api
      - id: micro-behaviors/os/sysinfo/platform::locale-fingerprinting-imports
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
    none:
      - id: metadata/signed/platform::microsoft
      - id: metadata/format/installer::known-benign-installer
