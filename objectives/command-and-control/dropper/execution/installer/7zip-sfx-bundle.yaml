defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0022
traits:
  - id: large-overlay-bundle
    desc: Large overlay bundle component
    crit: component
    conf: 0.96
    size_min: 1000000
    if:
      type: metrics
      field: binary.overlay_size
      min: 1000000
    unless:
      - id: signed-benign-large-overlay-developer
    downgrade:
      any:
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/binary/installer/script::inno-setup-installer
        - id: metadata/binary/installer/script::nsis
        - id: metadata/binary/installer/sfx::7zsfx-config-marker
        - id: micro-behaviors/fs/temp/py2exe::py2exe-bundle
composite_rules:
  - id: signed-benign-large-overlay-developer
    desc: Signed benign large overlay developer
    crit: component
    conf: 0.95
    any:
      - id: metadata/signed/developer::win.rar-gmbh
      - id: metadata/signed/developer::valve-corp.
      - id: metadata/signed/developer::martin-tofall
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::ip-zinukhov-stanislav-igorevich
  - id: large-overlay-installer-context
    desc: Known installer context for large overlay bundles
    crit: component
    conf: 0.9
    any:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/installer/script::inno-setup-installer
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/installer/sfx::7zsfx-config-marker
      - id: micro-behaviors/fs/temp/py2exe::py2exe-bundle
  - id: signed-7zip-sfx-stage-loader
    desc: 7-Zip SFX bundle with staged loader behavior
    crit: suspicious
    conf: 0.98
    size_min: 1000000
    all:
      - id: metadata/binary/layout::large-overlay-1mb
      - id: metadata/binary/installer/sfx::7zip-sfx-runtime
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
    needs: 2
    any:
      - id: micro-behaviors/crypto/certificate/install::cert-install-api
      - id: micro-behaviors/os/sysinfo/platform/locale::locale-fingerprinting-imports
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
  - id: signed-sfx-wrapper-layout
    desc: Signed SFX wrapper layout
    crit: suspicious
    conf: 0.97
    size_min: 900000
    size_max: 1300000
    all:
      - id: metadata/binary/layout::signed-pe-wrapper
      - id: metadata/binary/installer/sfx::7zip-sfx-archive-profile
