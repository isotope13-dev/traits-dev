defaults:
  platforms: [unix, windows, macos]
traits: []
composite_rules:
  - id: suspicious-massive-inno-setup
    desc: "Oversized Inno Setup installer (>50MB), sparse logic - bundled or packed payload"
    crit: suspicious
    all:
      - id: metadata/binary/installer/script::inno-setup
      - id: metadata/binary/metrics/size::massive-executable
      - id: objectives/anti-analysis/vm-detect/instruction::sparse-logic-density
