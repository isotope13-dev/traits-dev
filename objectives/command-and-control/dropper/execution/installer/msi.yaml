defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1105
traits:
  - id: installfolder-wscript-launcher
    desc: MSI launches installed VBS
    crit: suspicious
    conf: 0.96
    if:
      type: string_value
      regex: wscript\.exe\s+"\[INSTALLFOLDER\].{0,200}\.vbs"
  - id: installfolder-powershell-payload
    desc: MSI references installed PS1
    crit: notable
    conf: 0.92
    if:
      type: string_value
      regex: \[INSTALLFOLDER\].{0,200}\.ps1
  - id: embedded-script-filenames
    desc: MSI embeds named script files
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: string_value
      regex: \b[a-z]+_[a-z]+\d{2}\.(vbs|ps1)\b
composite_rules:
  - id: msi-script-launcher
    desc: MSI launches staged script payload
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/format/installer::script-payload-cabinet
      - id: embedded-script-filenames
      - id: installfolder-wscript-launcher
  - id: msi-script-dropper-persistence
    desc: MSI dropper with Run persistence
    crit: hostile
    conf: 0.98
    all:
      - id: msi-script-launcher
      - id: objectives/persistence/login/startup/registry::windows-run-key-script-launcher
