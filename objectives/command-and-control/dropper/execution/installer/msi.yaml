defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1105
traits:
  - id: installfolder-wscript-launcher
    desc: MSI launches installed VBS
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: wscript\.exe\s+"\[INSTALLFOLDER\].{0,200}\.vbs"
  - id: installfolder-powershell-payload
    desc: MSI references installed PS1
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: \[INSTALLFOLDER\].{0,200}\.ps1
  - id: embedded-script-filenames
    desc: MSI embeds named script stages
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: (?i)\b(november_block25\.vbs|charlie_script48\.ps1)\b
  - id: embedded-vbs-stage
    desc: MSI embeds VBS stage
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: (?i)\b[a-z0-9_]{6,}\.vbs\b
  - id: embedded-ps1-stage
    desc: MSI embeds PS1 stage
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: (?i)\b[a-z0-9_]{6,}\.ps1\b
  - id: wscript-extensionless-vbscript
    desc: MSI runs extensionless VBScript
    crit: suspicious
    conf: 0.97
    attack: T1059.005
    if:
      type: raw
      regex: wscript\.exe\s+//B\s+/e:vbscript\s+"[A-Za-z0-9_-]{6,}"
  - id: randomized-exe-install-names
    desc: MSI installs randomized EXE names
    crit: component
    conf: 0.88
    if:
      type: raw
      regex: '[A-Za-z0-9_-]{6,}\|[A-Za-z0-9_-]{6,}\.exe'
  - id: msi-defender-exclusion-powershell
    desc: MSI PowerShell adds Defender exclusion
    crit: suspicious
    conf: 0.96
    attack: T1562.001
    if:
      type: raw
      regex: (?i)Add-MpPrefer`?ence.{0,80}-Exclusion(Path|Process)
  - id: msi-webclient-payload-download
    desc: MSI PowerShell downloads staged payload
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: (?i)Net\.WebClient.{0,80}\.Download(File|Data)\(
  - id: msi-disguised-stage-url
    desc: MSI downloads disguised payload URL
    crit: component
    conf: 0.92
    if:
      type: raw
      regex: (?i)https://[A-Za-z0-9.-]{4,80}/[^"']{1,80}\.(png|jar)
  - id: msi-conhost-hidden-powershell
    desc: MSI schedules headless PowerShell
    crit: suspicious
    conf: 0.96
    attack: T1053.005
    if:
      type: raw
      regex: (?i)conhost\.exe.{0,40}--headless.{0,40}powershell\.exe
  - id: msi-scheduledtask-logon
    desc: MSI registers logon scheduled task
    crit: suspicious
    conf: 0.95
    attack: T1053.005
    if:
      type: raw
      regex: (?i)New-ScheduledTaskTrigger\s+-AtLogOn
  - id: msi-aes-reflective-loader
    desc: MSI embeds PBKDF AES loader
    crit: suspicious
    conf: 0.97
    attack: T1620
    if:
      type: raw
      substr: Rfc2898DeriveBytes
  - id: msi-reflective-assembly-load
    desc: MSI embeds reflective assembly load
    crit: suspicious
    conf: 0.97
    attack: T1620
    if:
      type: raw
      regex: (?i)Reflection\.Assembly.{0,24}::Load\(
  - id: msi-systeminfo-json-beacon
    desc: MSI beacons antivirus metadata
    crit: suspicious
    conf: 0.94
    attack: T1082
    if:
      type: raw
      regex: (?i)AntiVirusProduct.{0,240}ConvertTo-Json
composite_rules:
  - id: embedded-script-filename-pair
    desc: MSI embeds both stage names
    crit: suspicious
    conf: 0.95
    all:
      - id: embedded-vbs-stage
      - id: embedded-ps1-stage
  - id: msi-script-launcher
    desc: MSI launches staged script payload
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/installer/database::script-payload-cabinet
      - id: embedded-script-filenames
      - id: installfolder-wscript-launcher
  - id: msi-vbs-powershell-chain
    desc: MSI stages a VBS launcher for a PowerShell payload
    crit: suspicious
    conf: 0.98
    all:
      - id: embedded-script-filename-pair
      - id: installfolder-wscript-launcher
      - id: installfolder-powershell-payload
  - id: msi-script-dropper-persistence
    desc: MSI dropper with Run persistence
    crit: hostile
    conf: 0.98
    all:
      - id: msi-vbs-powershell-chain
      - id: objectives/persistence/login/startup/registry::windows-registry-run-access
      - id: objectives/persistence/login/startup/registry::script-style-run-value
  - id: msi-wscript-userland-dropper
    desc: MSI WScript staged payload dropper
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: metadata/binary/installer/database::embedded-mscf-cabinet
      - id: metadata/binary/installer/database::localappdata-installfolder-raw
      - id: metadata/binary/installer/database::wscript-vbscript-custom-action-raw
      - id: metadata/binary/installer/database::random-software-installed-marker-raw
      - id: wscript-extensionless-vbscript
      - id: randomized-exe-install-names
  - id: advanced-installer-powershell-loader
    desc: Advanced Installer PowerShell payload loader
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/database::ai-powershell-launcher-dll-raw
      - id: metadata/binary/installer/database::ai-custom-action-dll-raw
      - id: msi-webclient-payload-download
      - id: msi-aes-reflective-loader
      - id: msi-reflective-assembly-load
    any:
      - id: msi-conhost-hidden-powershell
      - id: msi-scheduledtask-logon
    needs: 1
  - id: msi-defender-bypass-persistent-loader
    desc: MSI disables Defender and persists loader
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/database::ai-powershell-launcher-dll-raw
      - id: msi-webclient-payload-download
      - id: msi-aes-reflective-loader
      - id: msi-reflective-assembly-load
      - id: msi-defender-exclusion-powershell
      - id: msi-scheduledtask-logon
  - id: msi-defender-wsh-amsi-bypass
    desc: MSI disables Defender and WSH AMSI
    crit: hostile
    conf: 0.99
    attack: T1562.001
    all:
      - id: metadata/binary/installer/database::ai-powershell-launcher-dll-raw
      - id: msi-defender-exclusion-powershell
      - id: objectives/evasion/anti-av/platform::windows-script-amsi-disable-registry
