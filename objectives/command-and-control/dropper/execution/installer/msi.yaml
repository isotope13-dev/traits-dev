defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1105
traits:
- id: chrome-updater-msi-identity
  desc: MSI claims Chrome updater identity
  crit: notable
  conf: 0.98
  if:
    type: value
    path: office.subject
    exact: ChromeUpdate
- id: installfolder-wscript-launcher
  desc: MSI launches installed VBS
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: wscript\.exe\s+"\[INSTALLFOLDER\].{0,200}\.vbs"
- id: installfolder-powershell-payload
  desc: MSI references installed PS1
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: \[INSTALLFOLDER\].{0,200}\.ps1
- id: embedded-script-filenames
  desc: MSI embeds named script stages
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)\b(november_block25\.vbs|charlie_script48\.ps1)\b
- id: embedded-vbs-stage
  desc: MSI references VBS stage
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: .vbs
    case_insensitive: true
- id: embedded-ps1-stage
  desc: MSI references PS1 stage
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: .ps1
    case_insensitive: true
- id: wscript-vbs-file-vbscript
  desc: MSI runs VBS through WScript
  crit: suspicious
  conf: 0.97
  attack: T1059.005
  if:
    type: text
    regex: '(?i)wscript\.exe\s+//B\s+//?E:vbscript\s+"[\w.-]{6,}\.vbs"'
- id: wscript-extensionless-vbscript
  desc: MSI runs extensionless VBScript
  crit: suspicious
  conf: 0.97
  attack: T1059.005
  if:
    type: text
    regex: wscript\.exe\s+//B\s+/e:vbscript\s+"[A-Za-z0-9_-]{6,}"
- id: randomized-vbs-install-names
  desc: MSI installs randomized VBS names
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: (?i)[A-Za-z0-9_-]{6,}\|[A-Za-z0-9_-]{6,}\.vbs
- id: localappdata-random-directory
  desc: MSI uses randomized LocalAppData directory
  crit: component
  conf: 0.9
  if:
    type: raw
    regex: (?i)LocalAppDataFolder.{0,120}[A-Za-z0-9_-]{6,}\|[A-Za-z0-9_-]{8,24}
- id: msi-vbs-localappdata-exe-path
  desc: MSI VBS builds LocalAppData EXE path
  crit: suspicious
  conf: 0.95
  attack: T1059.005
  if:
    type: text
    regex: '%LOCALAPPDATA%"\).{0,160}\\[A-Za-z0-9]{8,24}\\[A-Za-z0-9]{8,16}\.exe'
- id: msi-vbs-hidden-shell-run
  desc: MSI VBS runs process hidden
  crit: suspicious
  conf: 0.95
  attack: T1059.005
  if:
    type: text
    regex: '\.Run\s+[A-Za-z0-9_]{6,},0,False'
- id: msi-wscript-shell-run
  desc: MSI WScript.Shell Run invocation
  crit: suspicious
  conf: 0.96
  attack: T1059.005
  if:
    type: text
    regex: '(?i)CreateObject\(\s*["'']WScript\.Shell["'']\s*\)\s*\.Run\b'
- id: msi-vbs-hidden-command-run
  desc: MSI VBS runs PowerShell hidden
  crit: suspicious
  conf: 0.96
  attack: T1059.005
  if:
    type: text
    regex: '(?i)\.Run\s+"powershell.{1,240},\s*0,\s*False'
- id: msi-powershell-irm-iex-pipeline
  desc: MSI PowerShell IRM eval pipeline
  crit: suspicious
  conf: 0.98
  if:
    type: text
    regex: '(?i)powershell\s+""?irm\s+[a-z0-9][a-z0-9.-]*\.[a-z]{2,}\|iex'
- id: msi-vbs-sleep-before-exec
  desc: MSI VBS sleeps before execution
  crit: component
  conf: 0.88
  attack: T1497.003
  if:
    type: text
    regex: 'WScript\.Sleep\s+[1-9][0-9]{3,5}'
- id: msi-defender-exclusion-powershell
  desc: MSI PowerShell adds Defender exclusion
  crit: suspicious
  conf: 0.96
  attack: T1562.001
  if:
    type: text
    regex: (?i)Add-MpPrefer`?ence.{0,80}-Exclusion(Path|Process)
- id: msi-webclient-payload-download
  desc: MSI PowerShell downloads staged payload
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: (?i)Net\.WebClient.{0,80}\.Download(File|Data)\(
- id: msi-disguised-stage-url
  desc: MSI downloads disguised payload URL
  crit: component
  conf: 0.92
  if:
    type: text
    regex: (?i)https://[A-Za-z0-9.-]{4,80}/[^"']{1,80}\.(png|jar)
- id: msi-conhost-hidden-powershell
  desc: MSI schedules headless PowerShell
  crit: suspicious
  conf: 0.96
  attack: T1053.005
  if:
    type: text
    regex: (?i)conhost\.exe.{0,40}--headless.{0,40}powershell\.exe
- id: msi-scheduledtask-logon
  desc: MSI registers logon scheduled task
  crit: suspicious
  conf: 0.95
  attack: T1053.005
  if:
    type: text
    regex: (?i)New-ScheduledTaskTrigger\s+-AtLogOn
- id: msi-aes-reflective-loader
  desc: MSI embeds PBKDF AES loader
  crit: suspicious
  conf: 0.97
  attack: T1620
  if:
    type: text
    substr: Rfc2898DeriveBytes
- id: msi-gzip-decompress-stage
  desc: MSI contains GZip stage decompressor
  crit: suspicious
  conf: 0.94
  attack: T1027
  if:
    type: text
    regex: (?i)System\.IO\.Compression\.GZipStream|GZipStream
- id: msi-reflective-assembly-load
  desc: MSI embeds reflective assembly load
  crit: suspicious
  conf: 0.97
  attack: T1620
  if:
    type: text
    regex: (?i)Reflection\.Assembly.{0,24}::Load\(
- id: msi-reflective-entrypoint-invoke
  desc: MSI invokes reflected assembly entrypoint
  crit: suspicious
  conf: 0.96
  attack: T1620
  if:
    type: text
    regex: (?i)(EntryPoint|GetMethod).{0,80}\.Invoke\(
- id: msi-powershell-exe-raw
  desc: MSI embeds PowerShell executable text
  crit: component
  conf: 0.9
  attack: T1059.001
  if:
    type: text
    regex: (?i)powershell(\.exe)?
- id: msi-hidden-window-raw
  desc: MSI embeds hidden window flag
  crit: component
  conf: 0.9
  attack: T1059.001
  if:
    type: text
    regex: (?i)(WindowStyle\s+Hidden|-w\s+h|-w\s+hidden)
- id: msi-encoded-command-raw
  desc: MSI embeds encoded command flag
  crit: component
  conf: 0.9
  attack: T1059.001
  if:
    type: raw
    regex: (?i)([-/](EncodedCommand|enc)\b|(powershell|pwsh)(\.exe)?.{0,80}[-/]e\b)
- id: msi-systeminfo-json-beacon
  desc: MSI beacons antivirus metadata
  crit: suspicious
  conf: 0.94
  attack: T1082
  if:
    type: text
    regex: (?i)AntiVirusProduct.{0,240}ConvertTo-Json
- id: msi-batch-vbs-launcher-files
  desc: MSI stages BAT with VBS launcher
  crit: suspicious
  conf: 0.96
  attack: T1059.003
  if:
    type: text
    regex: (?i)\.bat\|[A-Za-z0-9_]+\.bat.{0,120}\.vbs\|[A-Za-z0-9_]+\.vbs
- id: msi-localappdata-wscript-bat
  desc: MSI installs WScript-named BAT
  crit: suspicious
  conf: 0.96
  attack: T1059.003
  if:
    type: text
    regex: (?i)LocalAppDataFolder.{0,160}wscript_[0-9]{3,6}\.bat
- id: msi-explorer-folder-vbs-target
  desc: MSI uses Windows explorer directory
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \[WindowsFolder\]explorer\.exe.{0,120}\.vbs
- id: msi-generated-ca-dll
  desc: MSI embeds generated custom-action DLL
  crit: component
  conf: 0.92
  if:
    type: text
    regex: msi_ca_[0-9]{8,12}\.dll
- id: msi-userprofile-desktop-stage
  desc: MSI payload references user desktop
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: USERPROFILE.{0,32}\\Desktop\\
- id: msi-sideload-target-cryptbase-raw
  desc: MSI references cryptbase.dll sideload target
  crit: component
  conf: 0.86
  if:
    type: text
    substr: cryptbase.dll
- id: msi-sideload-target-version-raw
  desc: MSI references version.dll sideload target
  crit: component
  conf: 0.9
  if:
    type: text
    substr: version.dll
- id: msi-exe2msi-winrar-sfx-profile
  desc: MSI exe2msi WinRAR SFX profile
  crit: suspicious
  conf: 0.98
  if:
    type: yara
    source: |
      rule msi_exe2msi_winrar_sfx_profile {
        strings:
          $title = "exe2msiSetupPackage" ascii wide
          $author = "QwertyLab" ascii wide
          $sfx = "WinRAR SFX module" ascii wide
          $path = "Path=C:\\Program Files (x86)" ascii wide
          $setup = "Setup=" ascii wide
          $silent = "Silent=1" ascii wide
          $overwrite = "Overwrite=1" ascii wide
        condition:
          uint32(0) == 0xe011cfd0 and
          $title and $author and $sfx and $path and
          #setup >= 2 and $silent and $overwrite
      }
- id: msi-sfx-sideload-targets-yara
  desc: MSI SFX sideload target pair
  crit: component
  conf: 0.92
  if:
    type: yara
    source: |
      rule msi_sfx_sideload_targets {
        strings:
          $version = "version.dll" ascii wide
          $cryptbase = "cryptbase.dll" ascii wide
        condition:
          uint32(0) == 0xe011cfd0 and $version and $cryptbase
      }
