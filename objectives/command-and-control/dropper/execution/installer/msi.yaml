defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1105
traits:
  - id: installfolder-wscript-launcher
    desc: MSI launches installed VBS
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: wscript\.exe\s+"\[INSTALLFOLDER\].{0,200}\.vbs"
  - id: installfolder-powershell-payload
    desc: MSI references installed PS1
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: \[INSTALLFOLDER\].{0,200}\.ps1
  - id: embedded-script-filenames
    desc: MSI embeds named script stages
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: (?i)\b(november_block25\.vbs|charlie_script48\.ps1)\b
  - id: embedded-vbs-stage
    desc: MSI references VBS stage
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: .vbs
      case_insensitive: true
  - id: embedded-ps1-stage
    desc: MSI references PS1 stage
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: .ps1
      case_insensitive: true
  - id: wscript-vbs-file-vbscript
    desc: MSI runs VBS through WScript
    crit: suspicious
    conf: 0.97
    attack: T1059.005
    if:
      type: raw
      regex: '(?i)wscript\.exe\s+//B\s+//?E:vbscript\s+"[\w.-]{6,}\.vbs"'
  - id: wscript-extensionless-vbscript
    desc: MSI runs extensionless VBScript
    crit: suspicious
    conf: 0.97
    attack: T1059.005
    if:
      type: raw
      regex: wscript\.exe\s+//B\s+/e:vbscript\s+"[A-Za-z0-9_-]{6,}"
  - id: randomized-exe-install-names
    desc: MSI installs randomized EXE names
    crit: component
    conf: 0.88
    if:
      type: raw
      regex: '[A-Za-z0-9_-]{6,}\|[A-Za-z0-9_-]{6,}\.exe'
  - id: randomized-vbs-install-names
    desc: MSI installs randomized VBS names
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: (?i)[A-Za-z0-9_-]{6,}\|[A-Za-z0-9_-]{6,}\.vbs
  - id: localappdata-random-directory
    desc: MSI uses randomized LocalAppData directory
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: (?i)LocalAppDataFolder.{0,120}[A-Za-z0-9_-]{6,}\|[A-Za-z0-9_-]{8,24}
  - id: msi-vbs-localappdata-exe-path
    desc: MSI VBS builds LocalAppData EXE path
    crit: suspicious
    conf: 0.95
    attack: T1059.005
    if:
      type: raw
      regex: '%LOCALAPPDATA%"\).{0,160}\\[A-Za-z0-9]{8,24}\\[A-Za-z0-9]{8,16}\.exe'
  - id: msi-vbs-hidden-shell-run
    desc: MSI VBS runs process hidden
    crit: suspicious
    conf: 0.95
    attack: T1059.005
    if:
      type: raw
      regex: '\.Run\s+[A-Za-z0-9_]{6,},0,False'
  - id: msi-wscript-shell-run
    desc: MSI WScript.Shell Run invocation
    crit: suspicious
    conf: 0.96
    attack: T1059.005
    if:
      type: raw
      substr: 'CreateObject("WScript.Shell").Run'
  - id: msi-vbs-hidden-command-run
    desc: MSI VBS runs PowerShell hidden
    crit: suspicious
    conf: 0.96
    attack: T1059.005
    if:
      type: raw
      regex: '(?i)\.Run\s+"powershell.{1,240},\s*0,\s*False'
  - id: msi-powershell-irm-iex-pipeline
    desc: MSI PowerShell IRM eval pipeline
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: '(?i)powershell\s+""?irm\s+[a-z0-9][a-z0-9.-]*\.[a-z]{2,}\|iex'
  - id: msi-vbs-sleep-before-exec
    desc: MSI VBS sleeps before execution
    crit: component
    conf: 0.88
    attack: T1497.003
    if:
      type: raw
      regex: 'WScript\.Sleep\s+[1-9][0-9]{3,5}'
  - id: msi-defender-exclusion-powershell
    desc: MSI PowerShell adds Defender exclusion
    crit: suspicious
    conf: 0.96
    attack: T1562.001
    if:
      type: raw
      regex: (?i)Add-MpPrefer`?ence.{0,80}-Exclusion(Path|Process)
  - id: msi-webclient-payload-download
    desc: MSI PowerShell downloads staged payload
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: (?i)Net\.WebClient.{0,80}\.Download(File|Data)\(
  - id: msi-disguised-stage-url
    desc: MSI downloads disguised payload URL
    crit: component
    conf: 0.92
    if:
      type: raw
      regex: (?i)https://[A-Za-z0-9.-]{4,80}/[^"']{1,80}\.(png|jar)
  - id: msi-conhost-hidden-powershell
    desc: MSI schedules headless PowerShell
    crit: suspicious
    conf: 0.96
    attack: T1053.005
    if:
      type: raw
      regex: (?i)conhost\.exe.{0,40}--headless.{0,40}powershell\.exe
  - id: msi-scheduledtask-logon
    desc: MSI registers logon scheduled task
    crit: suspicious
    conf: 0.95
    attack: T1053.005
    if:
      type: raw
      regex: (?i)New-ScheduledTaskTrigger\s+-AtLogOn
  - id: msi-aes-reflective-loader
    desc: MSI embeds PBKDF AES loader
    crit: suspicious
    conf: 0.97
    attack: T1620
    if:
      type: raw
      substr: Rfc2898DeriveBytes
  - id: msi-reflective-assembly-load
    desc: MSI embeds reflective assembly load
    crit: suspicious
    conf: 0.97
    attack: T1620
    if:
      type: raw
      regex: (?i)Reflection\.Assembly.{0,24}::Load\(
  - id: msi-systeminfo-json-beacon
    desc: MSI beacons antivirus metadata
    crit: suspicious
    conf: 0.94
    attack: T1082
    if:
      type: raw
      regex: (?i)AntiVirusProduct.{0,240}ConvertTo-Json
  - id: msi-batch-vbs-launcher-files
    desc: MSI stages BAT with VBS launcher
    crit: suspicious
    conf: 0.96
    attack: T1059.003
    if:
      type: raw
      regex: (?i)\.bat\|[A-Za-z0-9_]+\.bat.{0,120}\.vbs\|[A-Za-z0-9_]+\.vbs
  - id: msi-localappdata-wscript-bat
    desc: MSI installs WScript-named BAT
    crit: suspicious
    conf: 0.96
    attack: T1059.003
    if:
      type: raw
      regex: (?i)LocalAppDataFolder.{0,160}wscript_[0-9]{3,6}\.bat
  - id: msi-explorer-folder-vbs-target
    desc: MSI uses Windows explorer directory
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: \[WindowsFolder\]explorer\.exe.{0,120}\.vbs
  - id: msi-generated-ca-dll
    desc: MSI embeds generated custom-action DLL
    crit: component
    conf: 0.92
    if:
      type: raw
      regex: msi_ca_[0-9]{8,12}\.dll
  - id: msi-userprofile-desktop-stage
    desc: MSI payload references user desktop
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: USERPROFILE.{0,32}\\Desktop\\
  - id: msi-sideload-target-cryptbase-raw
    desc: MSI references cryptbase.dll sideload target
    crit: component
    conf: 0.86
    if:
      type: raw
      exact: cryptbase.dll
  - id: msi-sideload-target-version-raw
    desc: MSI references version.dll sideload target
    crit: component
    conf: 0.9
    if:
      type: raw
      exact: version.dll
composite_rules:
  - id: embedded-script-filename-pair
    desc: MSI embeds both stage names
    crit: suspicious
    conf: 0.95
    all:
      - id: embedded-vbs-stage
      - id: embedded-ps1-stage
  - id: msi-randomized-userland-payload-stage
    desc: MSI stages randomized userland payloads
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/binary/installer/database::localappdata-installfolder-raw
      - id: randomized-exe-install-names
      - id: randomized-vbs-install-names
      - id: localappdata-random-directory
  - id: msi-localappdata-vbs-exe-launcher
    desc: MSI launches randomized userland EXE via VBS
    crit: hostile
    conf: 0.98
    attack: T1059.005
    all:
      - id: msi-randomized-userland-payload-stage
      - id: wscript-vbs-file-vbscript
  - id: msi-script-launcher
    desc: MSI launches staged script payload
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/installer/database::script-payload-cabinet
      - id: embedded-script-filenames
      - id: installfolder-wscript-launcher
  - id: msi-vbs-powershell-chain
    desc: MSI stages a VBS launcher for a PowerShell payload
    crit: suspicious
    conf: 0.98
    all:
      - id: embedded-script-filename-pair
      - id: installfolder-wscript-launcher
      - id: installfolder-powershell-payload
  - id: msi-script-dropper-persistence
    desc: MSI dropper with Run persistence
    crit: hostile
    conf: 0.98
    all:
      - id: msi-vbs-powershell-chain
      - id: objectives/persistence/login/startup/registry::windows-registry-run-access
      - id: objectives/persistence/login/startup/registry::script-style-run-value
  - id: msi-wscript-userland-dropper
    desc: MSI WScript staged payload dropper
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: metadata/binary/installer/database::embedded-mscf-cabinet
      - id: metadata/binary/installer/database::localappdata-installfolder-raw
      - id: metadata/binary/installer/database::wscript-vbscript-custom-action-raw
      - id: wscript-extensionless-vbscript
      - id: localappdata-random-directory
      - id: randomized-exe-install-names
  - id: msi-localappdata-vbs-exe-dropper
    desc: MSI LocalAppData VBS EXE dropper
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: metadata/binary/installer/database::embedded-mscf-cabinet
      - id: metadata/binary/installer/database::localappdata-installfolder-raw
      - id: randomized-exe-install-names
      - id: msi-vbs-localappdata-exe-path
      - id: msi-vbs-hidden-shell-run
    any:
      - id: metadata/binary/installer/database::wscript-vbscript-custom-action-raw
      - id: wscript-vbs-file-vbscript
      - id: wscript-extensionless-vbscript
    needs: 1
  - id: msi-extensionless-vbs-hidden-exe
    desc: MSI extensionless VBS hidden EXE launcher
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: metadata/binary/installer/database::wscript-vbscript-custom-action-raw
      - id: wscript-extensionless-vbscript
      - id: msi-vbs-localappdata-exe-path
      - id: msi-vbs-hidden-shell-run
    any:
      - id: randomized-exe-install-names
      - id: msi-vbs-sleep-before-exec
      - id: metadata/binary/installer/database::random-software-installed-marker-raw
    needs: 1
  - id: msi-hidden-powershell-irm-eval
    desc: MSI hidden PowerShell IRM eval
    crit: hostile
    conf: 0.99
    attack: T1059.001
    all:
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: msi-wscript-shell-run
      - id: msi-vbs-hidden-command-run
      - id: msi-powershell-irm-iex-pipeline
  - id: advanced-installer-powershell-loader
    desc: Advanced Installer PowerShell payload loader
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/database::ai-powershell-launcher-dll-raw
      - id: metadata/binary/installer/database::ai-custom-action-dll-raw
      - id: msi-webclient-payload-download
      - id: msi-aes-reflective-loader
      - id: msi-reflective-assembly-load
    any:
      - id: msi-conhost-hidden-powershell
      - id: msi-scheduledtask-logon
    needs: 1
  - id: msi-defender-bypass-persistent-loader
    desc: MSI disables Defender and persists loader
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/database::ai-powershell-launcher-dll-raw
      - id: msi-webclient-payload-download
      - id: msi-aes-reflective-loader
      - id: msi-reflective-assembly-load
      - id: msi-defender-exclusion-powershell
      - id: msi-scheduledtask-logon
  - id: msi-defender-wsh-amsi-bypass
    desc: MSI disables Defender and WSH AMSI
    crit: hostile
    conf: 0.99
    attack: T1562.001
    all:
      - id: metadata/binary/installer/database::ai-powershell-launcher-dll-raw
      - id: msi-defender-exclusion-powershell
      - id: objectives/evasion/anti-av/platform::windows-script-amsi-disable-registry
  - id: msi-localappdata-wscript-batch-dropper
    desc: MSI stages WScript-launched batch dropper
    crit: hostile
    conf: 0.99
    attack: T1059.003
    all:
      - id: metadata/binary/installer/database::msi-installer-raw
      - id: metadata/binary/installer/database::embedded-mscf-cabinet
      - id: metadata/binary/installer/database::localappdata-installfolder-raw
      - id: msi-batch-vbs-launcher-files
      - id: msi-localappdata-wscript-bat
      - id: msi-explorer-folder-vbs-target
  - id: msi-custom-action-hollowing-dropper
    desc: MSI custom-action process hollowing dropper
    crit: hostile
    conf: 0.99
    attack: T1055.012
    all:
      - id: metadata/binary/installer/database::python-msi-library
      - id: msi-generated-ca-dll
      - id: micro-behaviors/process/create/spawn::msi-embedded-create-process-a
      - id: micro-behaviors/process/inject/runtime::msi-embedded-set-thread-context
      - id: micro-behaviors/process/inject/runtime::msi-embedded-write-process-memory
      - id: micro-behaviors/mem/protect/modify::msi-embedded-virtual-alloc-ex
    any:
      - id: micro-behaviors/process/inject/runtime::msi-embedded-get-thread-context
      - id: micro-behaviors/process/inject/runtime::msi-embedded-resume-thread
      - id: msi-userprofile-desktop-stage
      - id: objectives/evasion/masquerade/identity/fabricated::visual-cpp-kingston-msi-masquerade
      - id: objectives/persistence/login/startup/registry::shortcut-arguments
    needs: 2
  - id: msi-sideload-target-pair
    desc: MSI references common sideload DLL targets
    crit: notable
    conf: 0.91
    attack: T1574.002
    all:
      - id: msi-sideload-target-cryptbase-raw
      - id: msi-sideload-target-version-raw
  - id: msi-exe2msi-winrar-sfx-stager
    desc: exe2msi wrapper stages WinRAR SFX
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/installer/database::exe2msi-wrapper-package
      - id: metadata/binary/installer/database::winrar-sfx-silent-setup-script
      - id: metadata/binary/installer/database::sfx-program-files-x86-path-raw
  - id: msi-winrar-sfx-sideload-stager
    desc: MSI WinRAR SFX stages sideload payloads
    crit: hostile
    conf: 0.98
    all:
      - id: msi-exe2msi-winrar-sfx-stager
      - id: msi-sideload-target-pair
  - id: msi-resource-backed-hollowing-loader
    desc: MSI resource-backed hollowing loader
    crit: hostile
    conf: 0.99
    attack: T1055.012
    all:
      - id: msi-custom-action-hollowing-dropper
      - id: micro-behaviors/data/embedded/payload::msi-embedded-resource-loader-apis
      - id: micro-behaviors/dylib/load::msi-embedded-load-library-a
      - id: micro-behaviors/dylib/lookup::msi-embedded-get-proc-address
