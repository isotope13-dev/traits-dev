  - id: chrome-updater-msi-identity
  - id: metadata/binary/installer/database::msi-ntuser-member-raw
  - id: metadata/binary/installer/database::embedded-disk1-cab-raw

- id: embedded-script-filename-pair
  desc: MSI embeds both stage names
  crit: suspicious
  conf: 0.95
