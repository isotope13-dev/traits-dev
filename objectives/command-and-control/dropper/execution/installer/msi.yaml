defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1105
traits:
  - id: installfolder-wscript-launcher
    desc: MSI launches installed VBS
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      regex: wscript\.exe\s+"\[INSTALLFOLDER\].{0,200}\.vbs"
  - id: installfolder-powershell-payload
    desc: MSI references installed PS1
    crit: notable
    conf: 0.92
    if:
      type: raw
      regex: \[INSTALLFOLDER\].{0,200}\.ps1
    not:
      - substr: "[INSTALLFOLDER]etc\\netdata\\claim"
  - id: embedded-script-filenames
    desc: MSI embeds named script stages
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: (?i)\b(november_block25\.vbs|charlie_script48\.ps1)\b
  - id: embedded-vbs-stage
    desc: MSI embeds VBS stage
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: (?i)\b[a-z0-9_]{6,}\.vbs\b
  - id: embedded-ps1-stage
    desc: MSI embeds PS1 stage
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: (?i)\b[a-z0-9_]{6,}\.ps1\b
    not:
      - substr: copy_files.ps1
composite_rules:
  - id: embedded-script-filename-pair
    desc: MSI embeds both stage names
    crit: suspicious
    conf: 0.95
    all:
      - id: embedded-vbs-stage
      - id: embedded-ps1-stage
  - id: msi-script-launcher
    desc: MSI launches staged script payload
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/installer/database::script-payload-cabinet
      - id: embedded-script-filenames
      - id: installfolder-wscript-launcher
  - id: msi-vbs-powershell-chain
    desc: MSI stages a VBS launcher for a PowerShell payload
    crit: suspicious
    conf: 0.98
    all:
      - id: embedded-script-filename-pair
      - id: installfolder-wscript-launcher
      - id: installfolder-powershell-payload
  - id: msi-script-dropper-persistence
    desc: MSI dropper with Run persistence
    crit: hostile
    conf: 0.98
    all:
      - id: msi-vbs-powershell-chain
      - id: objectives/persistence/login/startup/registry::windows-registry-run-access
      - id: objectives/persistence/login/startup/registry::script-style-run-value
  - id: wix-ahk-bundled-dropper
    desc: WiX MSI bundles renamed AHK dropper
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/installer/database::wix-authored-msi
      - id: metadata/binary/installer/database::ahk-stage-pair
    any:
      - id: metadata/binary/installer/database::msi-anti-tamper
      - id: metadata/binary/installer/database::embedded-mscf-cabinet
    needs: 1
  - id: wix-ahk-dropper-with-anti-tamper
    desc: WiX MSI dropper resists user repair
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/binary/installer/database::wix-authored-msi
      - id: metadata/binary/installer/database::ahk-stage-pair
      - id: metadata/binary/installer/database::msi-anti-tamper
