defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1105

composite_rules:
  - id: msi-packed-embedded-pe-loader
    desc: MSI carries packed embedded PE loader
    crit: hostile
    conf: 0.98
    for: [pe, oledoc, ole]
    all:
      - id: objectives/anti-static/obfuscation/payload/section::empty-text-section
      - id: objectives/anti-static/pack/entropy::high-entropy-section
      - id: metadata/binary/layout::overlay-dominates-third
      - id: objectives/command-and-control/backdoor/loader/native-reflect::runtime-loader-with-encoded-data-cond-4--inline-14359

  - id: msi-embedded-privileged-api-loader
    desc: MSI embeds privileged API-capable loader
    crit: suspicious
    conf: 0.96
    size_min: 10000000
    all:
      - id: metadata/binary/installer/database::embedded-mscf-cabinet
      - id: micro-behaviors/os/privilege/manifest::msi-embedded-require-administrator
    any:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/communications/socket/init::msi-embedded-ws2-32-dll
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-w
      - id: micro-behaviors/dylib/load/runtime::msi-embedded-load-library-a
      - id: micro-behaviors/dylib/lookup::msi-embedded-get-proc-address
    needs: 4

  - id: googleapi-signed-msi-stage-loader
    desc: GoogleAPI-branded MSI stage loader
    crit: hostile
    conf: 0.99
    size_min: 10000000
    all:
      - id: msi-embedded-privileged-api-loader
      - id: objectives/evasion/masquerade/identity/fabricated::googleapi-xiamen-msi-masquerade
      - id: objectives/anti-static/obfuscation/string/junking::msi-embedded-generated-string-junk
