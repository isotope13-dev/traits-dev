defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: iexpress-polyglot-dropper
    desc: IExpress SED Polyglot silent execution dropper
    crit: hostile
    conf: 0.95
    attack: "T1027"
    mbc: "B0032"
    for: [batch, pe]
    all:
      - id: objectives/anti-static/polyglot/iexpress::bat-iexpress-sed-polyglot
    any:
      - id: micro-behaviors/fs/path/temp::win-temp-env
    unless:
      - id: well-known/tool/development/batch-scripts::batch-scripts-iexpress-example-path
      - id: well-known/tool/development/batch-scripts::batch-scripts-iexpress-example-name
      - id: well-known/tool/development/batch-scripts::batch-scripts-bat2exe-example-name
