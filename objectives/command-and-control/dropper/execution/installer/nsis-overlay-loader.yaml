defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0022

traits:
- id: payment-receipt-exe-lure
  desc: Payment receipt executable lure
  crit: suspicious
  conf: 0.94
  if:
    type: basename
    regex: (?i)\b(justificante|comprobante)\s+de\s+pago\.exe$
- id: dominant-overlay-high-entropy
  desc: Dominant high entropy overlay
  crit: component
  conf: 0.9
  if:
    type: metrics
    field: binary.overlay_entropy
    min: 7.8
- id: nsis-randomized-version-loader
  desc: NSIS randomized version loader
  crit: suspicious
  conf: 0.99
  if:
    type: yara
    source: |
      rule nsis_randomized_version_loader {
        strings:
          $nsis = "NullsoftInst" ascii
          $call = "CallWindowProcW" ascii
          $comment = "julaceous" wide
          $legal = "thegnhood skambudte tabslisterne" wide
        condition:
          uint16(0) == 0x5a4d and all of them
      }
- id: julaceous-version-comment
  desc: Randomized version comment
  crit: component
  conf: 0.97
  if:
    type: text
    exact: julaceous
    section: .rsrc
- id: thegnhood-version-copyright
  desc: Randomized version copyright
  crit: component
  conf: 0.97
  if:
    type: text
    exact: thegnhood skambudte tabslisterne
    section: .rsrc

composite_rules:
- id: nsis-admin-inetc-downloader
  desc: Elevated NSIS INetC downloader
  crit: suspicious
  conf: 0.94
  all:
  - id: metadata/binary/installer/script::nsis
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: metadata/binary/installer/plugin::nsis-inetc-plugin
  - id: micro-behaviors/communications/http/get::wininet-http-flow
  any:
  - id: micro-behaviors/communications/http/post::wininet-post
  - id: micro-behaviors/communications/ftp/client::wininet-ftp-api
  - id: micro-behaviors/communications/http/headers::auth-header
  unless:
  - id: metadata/signed/platform::microsoft
- id: nsis-admin-download-execute-scaffold
  desc: Elevated NSIS download execute scaffold
  crit: hostile
  conf: 0.95
  all:
  - id: objectives/command-and-control/dropper/execution/installer::nsis-admin-inetc-downloader
  - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
  any:
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: micro-behaviors/process/create/exec::shell-execute-a
  - id: objectives/command-and-control/dropper/staging::temp-file-execution
  unless:
  - id: metadata/signed/platform::microsoft
- id: nsis-inetc-system-loader-scaffold
  desc: NSIS INetC System loader scaffold
  crit: hostile
  conf: 0.96
  all:
  - id: objectives/command-and-control/dropper/execution/installer::nsis-admin-download-execute-scaffold
  - id: metadata/binary/installer/plugin::nsis-system-plugin
  - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
  any:
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: objectives/anti-static/obfuscation/payload::minimal-pe-dynamic-load
  unless:
  - id: metadata/signed/platform::microsoft
- id: nsis-dominant-encrypted-overlay
  desc: NSIS dominant encrypted overlay
  crit: suspicious
  conf: 0.92
  needs: 3
  any:
  - id: metadata/binary/installer/script::nsis-manifest-exehead
  - id: metadata/binary/layout::overlay-dominates-third
  - id: objectives/command-and-control/dropper/execution/installer::dominant-overlay-high-entropy
  unless:
  - id: metadata/signed/platform::microsoft
- id: nsis-payment-lure-stage-loader
  desc: NSIS payment lure stage loader
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/command-and-control/dropper/execution/installer::payment-receipt-exe-lure
  - id: metadata/binary/installer/script::nsis-manifest-exehead
  - id: metadata/binary/layout::overlay-dominates-third
  needs: 3
  any:
  - id: objectives/command-and-control/dropper/execution/installer::dominant-overlay-high-entropy
  - id: objectives/command-and-control/dropper/execution/installer::julaceous-version-comment
  - id: objectives/command-and-control/dropper/execution/installer::thegnhood-version-copyright
  - id: objectives/command-and-control/dropper/execution/loader::self-copy-relaunch-loader
  - id: objectives/command-and-control/dropper/execution/loader::ini-driven-file-stager
  - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
  - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
  unless:
  - id: metadata/signed/platform::microsoft
