defaults:
  platforms: [windows]
  for: [oledoc, ole]
  attack: T1105
composite_rules:
  - id: wixsharp-source-installer
    desc: WixSharp source-backed installer chain
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/binary/installer/database::wixsharp-managed-ui-msi
      - id: metadata/binary/installer/database::source-backed-beforeinstall-hook
  - id: wixsharp-userland-dropper
    desc: Userland WixSharp dropper installer
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/dropper/execution/installer::wixsharp-source-installer
      - id: metadata/binary/installer/database::userland-source-hooked-installer
      - id: metadata/binary/installer/database::msi-anti-tamper
