defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1105
traits:
  - id: beforeinstall-hook
    desc: Installer BeforeInstall event hook
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: project.BeforeInstall +=
  - id: per-user-install-scope
    desc: Installer uses per-user scope
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: project.Scope = InstallScope.perUser;
  - id: force-modern-tls
    desc: Forces modern TLS security protocol
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: SecurityProtocol.{0,32}15360
  - id: create-install-dir
    desc: Creates installer working directory
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: Directory.CreateDirectory(Constants.installedDir);
  - id: write-install-state
    desc: Writes install mode state file
    crit: notable
    conf: 0.93
    if:
      type: text
      substr: File.WriteAllText(Constants.installedDir
  - id: engine-download
    desc: Installer engine download handoff
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: engine.Download();
  - id: engine-install-file
    desc: Installer engine file deployment
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: engine.InstallFile();
  - id: engine-install-progress
    desc: Installer engine progress staging
    crit: component
    conf: 0.88
    if:
      type: text
      substr: engine.InstallProgress();
composite_rules:
  - id: staged-installer-download-handoff
    desc: Installer source stages download flow
    crit: suspicious
    conf: 0.98
    all:
      - id: beforeinstall-hook
      - id: engine-download
      - id: engine-install-file
  - id: userland-installer-state-write
    desc: Per-user installer writes state file
    crit: suspicious
    conf: 0.97
    all:
      - id: per-user-install-scope
      - id: create-install-dir
      - id: write-install-state
  - id: userland-installer-dropper-source
    desc: Source-backed per-user installer dropper
    crit: hostile
    conf: 0.99
    all:
      - id: staged-installer-download-handoff
      - id: userland-installer-state-write
      - id: force-modern-tls
