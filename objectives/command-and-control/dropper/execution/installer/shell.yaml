# Install-Time Shell Dropper Detection
# Detects dropper patterns in install/setup scripts
# ATT&CK: T1105
defaults:
  platforms: [linux, unix, macos, android, ios]
  for: [shell]
  attack: T1105
composite_rules:
  - id: install-native-compile
    desc: Installer script compiles native payload
    crit: suspicious
    conf: 0.82
    unless:
      - id: well-known/app/ventoy/
    all:
      - id: micro-behaviors/process/create/shell/build::gcc-invocation
      - id: micro-behaviors/data/archive/extract/tar::tar-extract
  - id: install-hidden-compiled-output
    desc: Installer compiles hidden output binary
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/process/create/shell/build::gcc-invocation
      - id: objectives/evasion/file-hiding/dotfile-create::compiler-output-hidden-dotfile
  - id: install-time-native-dropper
    desc: Install-time native dropper workflow
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/command-and-control/dropper/execution/installer::install-hidden-compiled-output
      - id: objectives/evasion/self-delete/file/script::rm-install-artifacts
  - id: github-source-build-installer
    desc: GitHub source archive installer workflow
    crit: suspicious
    conf: 0.91
    all:
      - id: micro-behaviors/communications/url/external/github::github-archive-ref-download
      - id: micro-behaviors/data/archive/extract/tar::tar-extract
      - id: micro-behaviors/process/create/shell/build::local-build-install-script
    any:
      - id: micro-behaviors/communications/url/external/github::github-release-api-latest
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
  - id: elevated-github-source-installer
    desc: Elevated GitHub source installer workflow
    crit: suspicious
    conf: 0.93
    all:
      - id: objectives/command-and-control/dropper/execution/installer::github-source-build-installer
      - id: micro-behaviors/process/create/shell/build::sudo-local-build-install-script
