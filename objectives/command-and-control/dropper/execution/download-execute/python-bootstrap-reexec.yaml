defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1059.006
composite_rules:
  - id: shell-command-bootstrap-reexec
    desc: Shell command bootstrap re-executes Python
    crit: hostile
    conf: 0.94
    mbc: E1059
    all:
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
      - id: micro-behaviors/process/create/subprocess::run-ast
      - id: micro-behaviors/process/create/subprocess::os-execve
    # Benign self-patch context: a package bootstrapping the OFFICIAL Astral uv
    # installer (astral.sh/uv/install.sh) to re-launch itself under a supported
    # Python is a recognized, non-malicious pattern. A malicious bootstrap pipes
    # an attacker script to the shell, not the official uv installer, so this
    # suppresses the FP without weakening real download-and-reexec detection.
    unless:
      - id: well-known/tool/development/uv::uv-install-sh-bootstrap-url
