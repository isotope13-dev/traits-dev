defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1059.006
composite_rules:
  - id: shell-command-bootstrap-reexec
    desc: Shell command bootstrap re-executes Python
    crit: hostile
    conf: 0.94
    mbc: E1059
    all:
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
      - id: micro-behaviors/process/create/subprocess::run-ast
      - id: micro-behaviors/process/create/subprocess::os-execve
