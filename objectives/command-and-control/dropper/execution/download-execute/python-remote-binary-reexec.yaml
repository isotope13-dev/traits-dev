defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1105
composite_rules:
  - id: remote-binary-shell-reexec
    desc: Remote binary fetch followed by shell re-exec
    crit: hostile
    conf: 0.96
    mbc: E1105
    attack: T1105, T1059.006
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: micro-behaviors/process/create/subprocess::os-execve
