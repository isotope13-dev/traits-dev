# Ruby Script Dropper Patterns
defaults:
  for: [ruby]
  platforms: [unix, windows]

traits:
  - id: net-http-single-quote
    desc: '''net/http'' require string'
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: '''net/http'''
  - id: net-http-double-quote
    desc: '"net/http" require string'
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: '"net/http"'
  - id: uri-single-quote
    desc: '''uri'' require string'
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      exact: '''uri'''
  - id: uri-double-quote
    desc: '"uri" require string'
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      exact: '"uri"'
  - id: base64-single-quote
    desc: '''base64'' require string'
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: '''base64'''
  - id: base64-double-quote
    desc: '"base64" require string'
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: '"base64"'
  - id: resolv-single-quote
    desc: '''resolv'' require string'
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: '''resolv'''
  - id: resolv-double-quote
    desc: '"resolv" require string'
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: '"resolv"'
  - id: socket-single-quote
    desc: '''socket'' require string'
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: '''socket'''
  - id: socket-double-quote
    desc: '"socket" require string'
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: '"socket"'
  - id: tempfile-single-quote
    desc: '''tempfile'' require string'
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: '''tempfile'''
  - id: tempfile-double-quote
    desc: '"tempfile" require string'
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: '"tempfile"'
  - id: open-uri-single-quote
    desc: '''open-uri'' require string'
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: '''open-uri'''
  - id: open-uri-double-quote
    desc: '"open-uri" require string'
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: '"open-uri"'
  - id: pty-single-quote
    desc: '''pty'' require string'
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      exact: '''pty'''
  - id: pty-double-quote
    desc: '"pty" require string'
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      exact: '"pty"'
  - id: base64-separator-obfuscation
    desc: Base64 with separator obfuscation
    crit: suspicious
    conf: 0.88
    attack: T1027
    if:
      type: text
      regex: "gsub\\(.{0,10}\"---\"|\\.gsub\\(.{0,10}\"---\"|decode64.{0,50}gsub"
  - id: vbs-script-write
    desc: VBS script file creation
    crit: suspicious
    conf: 0.85
    attack: T1059
    if:
      type: text
      regex: "File\\.open\\(.{0,50}\\.vbs|\\.vbs.{0,50}File\\.open"

  - id: ruby-ast-http-in-method
    desc: HTTP request inside method
    crit: notable
    conf: 0.88
    attack: "T1071"
    if:
      type: ast
      kind: call
      exact: "Net::HTTP.get_response"
  - id: ruby-ast-file-binmode-write
    desc: File binmode followed by write
    crit: notable
    conf: 0.85
    if:
      type: ast
      kind: call
      exact: ".binmode"
  - id: ruby-ast-chmod-777
    desc: File permission change to 777
    crit: notable
    conf: 0.90
    attack: "T1222"
    if:
      type: ast
      kind: call
      exact: ".chmod(0777)"
  - id: ruby-ast-base64-dns
    desc: Base64 decode before DNS lookup
    crit: notable
    conf: 0.92
    attack: "T1027"
    if:
      type: ast
      kind: call
      exact: "Base64.decode64"
  - id: ruby-ast-system-in-method
    desc: System command execution in method
    crit: notable
    conf: 0.88
    attack: "T1059"
    if:
      type: ast
      kind: call
      exact: "system("
  - id: ruby-ast-exec-in-method
    desc: Exec command execution
    crit: notable
    conf: 0.88
    attack: "T1059"
    if:
      type: ast
      kind: call
      exact: "exec("
  - id: ruby-ast-file-open-wb
    desc: File binary write mode
    crit: notable
    conf: 0.82
    if:
      type: ast
      query: |
        ((call
          receiver: (constant) @const
          method: (identifier) @method
          arguments: (argument_list
            (string) @mode))
         (#eq? @const "File")
         (#eq? @method "open")
         (#match? @mode "wb|w\\+b|ab|a\\+b"))
  - id: ruby-ast-file-rename
    desc: File rename operation
    crit: component
    conf: 0.95
    if:
      type: ast
      query: |
        ((call
          receiver: (constant) @const
          method: (identifier) @method)
         (#eq? @const "File")
         (#eq? @method "rename"))
  - id: ruby-ast-rename-img-to-exe
    desc: Rename image file to executable
    crit: suspicious
    conf: 0.95
    if:
      type: ast
      query: |
        ((call
          receiver: (constant) @const
          method: (identifier) @method
          arguments: (argument_list
            (string) @source
            (string) @dest))
         (#eq? @const "File")
         (#eq? @method "rename")
         (#match? @source "\\.(png|jpg|jpeg|gif|bmp|ico|svg|webp)[\"']?$")
         (#match? @dest "\\.(exe|com|bat|cmd|sh|elf|bin)[\"']?$"))
  - id: ruby-ast-rename-to-exe
    desc: Rename file to executable extension
    crit: suspicious
    conf: 0.90
    if:
      type: ast
      query: |
        ((call
          receiver: (constant) @const
          method: (identifier) @method
          arguments: (argument_list
            (_) @source
            (string) @dest))
         (#eq? @const "File")
         (#eq? @method "rename")
         (#match? @dest "\\.exe[\"']?$"))
  - id: ruby-ast-check-windows-regex
    desc: Check for Windows OS via regex
    crit: notable
    conf: 0.85
    if:
      type: ast
      query: |
        ((call
          method: (identifier) @method
          arguments: (argument_list (regex) @pattern))
         (#match? @pattern "mswin|mingw|cygwin|wince|msys|bccwin|emc")
         (#eq? @method "match"))
  - id: ruby-ast-url-concatenation
    desc: String concatenation of URL scheme
    crit: suspicious
    conf: 0.85
    if:
      type: ast
      query: |
        ((binary
          left: (string) @left
          right: (string) @right)
         (#match? @left "https?:")
         (#match? @right "^/"))
  - id: ruby-ast-suspicious-url-scheme
    desc: Suspicious URL scheme string literal
    crit: notable
    conf: 0.8
    unless:
      - type: text
        regex: "url_prefix\\s*=\\s*url\\s*\\|\\|\\s*['\"]https?:/['\"]"
      - type: basename
        regex: (_spec|_test)\.rb$
    if:
      type: ast
      query: |
        ((string) @str
         (#match? @str "^[\"']https?:/[\"']$"))
  - id: ruby-ast-fragmented-url-fetch
    desc: Network fetch with fragmented URL construction
    crit: suspicious
    conf: 0.85
    if:
      type: ast
      query: |
        (call
          method: (identifier) @method
          arguments: (argument_list
            (binary
              left: (binary
                operator: "+")
              operator: "+"
              right: (_)))
          (#match? @method "^(get|post|request)$")
        )
  - id: ruby-ast-host-os-access
    desc: Access host OS configuration
    crit: notable
    conf: 0.9
    if:
      type: ast
      query: |-
        ((element_reference
          object: (constant_resolution
            scope: (constant) @scope
            name: (constant) @name)
          index: (string) @key)
         (#eq? @scope "RbConfig")
         (#eq? @name "CONFIG")
         (#match? @key "host_os"))

composite_rules:
  - id: wscript-execution
    desc: WScript execution
    crit: notable
    conf: 0.85
    attack: T1059
    any:
      - id: micro-behaviors/process/create/shell/wsh::wscript-exe
      - id: micro-behaviors/process/create/shell/wsh::cscript-exe
      - id: micro-behaviors/fs/path/extension::vbs
  - id: ruby-require-net-http
    desc: Imports HTTP client library
    crit: notable
    conf: 0.8
    any:
      - id: net-http-single-quote
      - id: net-http-double-quote
  - id: ruby-require-uri
    desc: Imports URI parsing library
    crit: notable
    conf: 0.75
    any:
      - id: uri-single-quote
      - id: uri-double-quote
  - id: ruby-require-base64
    desc: Imports Base64 library
    crit: notable
    conf: 0.8
    any:
      - id: base64-single-quote
      - id: base64-double-quote
  - id: ruby-require-resolv
    desc: Imports DNS resolution library
    crit: notable
    conf: 0.8
    any:
      - id: resolv-single-quote
      - id: resolv-double-quote
  - id: ruby-require-socket
    desc: Imports socket library
    crit: notable
    conf: 0.85
    any:
      - id: socket-single-quote
      - id: socket-double-quote
  - id: ruby-require-tempfile
    desc: Imports temporary file library
    crit: notable
    conf: 0.8
    any:
      - id: tempfile-single-quote
      - id: tempfile-double-quote
  - id: ruby-require-open-uri
    desc: Imports Open-URI library
    crit: notable
    conf: 0.85
    any:
      - id: open-uri-single-quote
      - id: open-uri-double-quote
  - id: ruby-require-pty
    desc: Imports PTY (pseudo-terminal) library
    crit: notable
    conf: 0.85
    any:
      - id: pty-single-quote
      - id: pty-double-quote
  - id: ruby-http-dropper
    desc: HTTP dropper downloads and executes
    conf: 0.95
    crit: suspicious
    needs: 3
    any:
      - id: micro-behaviors/communications/http/protocol/
      - id: micro-behaviors/fs/write/file/
      - id: micro-behaviors/process/create/shell/
  - id: ruby-obfuscated-c2
    desc: Obfuscated C2 with Base64
    conf: 0.92
    crit: suspicious
    needs: 3
    any:
      - id: micro-behaviors/data/decode/base64::base64-decode
      - id: objectives/exfiltration/dns::dns-resolve
      - id: micro-behaviors/communications/http/lib/netlib::net-http
      - id: micro-behaviors/communications/http/get/
  - id: ruby-tmp-execution
    desc: Write to /tmp, chmod, and execute
    conf: 0.93
    crit: suspicious
    needs: 3
    any:
      - id: micro-behaviors/fs/write/file/
      - id: micro-behaviors/fs/chmod/
      - id: micro-behaviors/process/create/shell/
    downgrade:
      any:
        - id: metadata/library/data::wal-shipper-header
        - id: metadata/library/data::wal-shipper-config
  - id: ruby-reverse-shell
    desc: Reverse shell connection
    conf: 0.9
    crit: suspicious
    needs: 2
    any:
      - id: micro-behaviors/communications/socket/listen::ruby-tcp-socket
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/process/tty/pty::ruby-pty
    downgrade:
      any:
        - id: metadata/package/testing/presence::ruby-test-file
  - id: ruby-windows-vbs-dropper
    desc: Windows VBS payload dropper
    conf: 0.94
    crit: suspicious
    needs: 4
    any:
      - id: micro-behaviors/os/sysinfo/platform::windows-os-check
      - id: base64-separator-obfuscation
      - id: vbs-script-write
      - id: wscript-execution
      - id: micro-behaviors/process/create/system::ruby-system
      - id: micro-behaviors/data/decode/base64::base64-decode
      - id: micro-behaviors/data/decode/base64::decode64-symbol
  - id: ruby-binary-dropper
    desc: Downloads and writes binary payload
    conf: 0.94
    crit: notable
    needs: 2
    any:
      - id: micro-behaviors/communications/http/lib/netlib::request-ruby
      - id: micro-behaviors/fs/write/file::ruby-file-open-write-binary
  # === Dropper Behavior via AST ===
  - id: ruby-ast-dropper-behavior
    desc: Dropper download write execute
    crit: suspicious
    conf: 0.93
    attack: "T1059"
    needs: 3
    any:
      - id: objectives/command-and-control/dropper/execution::ruby-ast-http-in-method
      - id: objectives/command-and-control/dropper/execution::ruby-ast-file-binmode-write
      - id: objectives/command-and-control/dropper/execution::ruby-ast-system-in-method
  # === Obfuscated C2 via AST ===
  - id: ruby-ast-obfuscated-c2
    desc: Base64 obfuscated C2 endpoint
    crit: suspicious
    conf: 0.91
    attack: "T1027"
    all:
      - id: objectives/command-and-control/dropper/execution::ruby-ast-base64-dns
      - id: objectives/exfiltration/dns::dns-resolve
  # === Windows Dropper (New) ===
  - id: ruby-windows-dropper
    desc: Detects Windows-specific dropper behavior (OS check + Rename + Exec)
    crit: hostile
    conf: 0.95
    attack: "T1059"
    all:
      - id: objectives/command-and-control/dropper/execution::ruby-ast-check-windows-regex
      - id: objectives/command-and-control/dropper/execution::ruby-ast-rename-img-to-exe
      - id: objectives/command-and-control/dropper/execution::ruby-ast-exec-in-method
