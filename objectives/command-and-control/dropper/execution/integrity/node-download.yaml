defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
traits:
  - id: node-createhash-sha256-call
    desc: Node.js creates SHA-256 hash
    conf: 0.88
    if:
      type: text
      regex: 'createHash\)\(["'']sha256["'']\)|createHash\(["'']sha256["'']\)'
  - id: node-hash-digest-hex-symbol
    crit: notable
    desc: Node.js hex digest call
    conf: 0.88
    if:
      type: symbol
      regex: '(^|\.)hash\.digest$|^hash\.digest$'
  - id: node-actualhash-symbol
    crit: notable
    desc: Download hash variable
    conf: 0.84
    if:
      type: symbol
      exact: actualHash
  - id: node-archive-sha256-field
    crit: notable
    desc: Download manifest SHA-256 field
    conf: 0.88
    if:
      type: text
      regex: '\barchive\.sha256\b'
  - id: node-runtime-package-name-symbol
    crit: notable
    desc: Runtime package name constant
    conf: 0.84
    if:
      type: symbol
      exact: RUNTIME_PACKAGE_NAME
  - id: node-runtime-manifest-url-symbol
    crit: notable
    desc: Runtime manifest URL constant
    conf: 0.84
    if:
      type: symbol
      exact: RUNTIME_MANIFEST_URL
  - id: node-download-tarball-symbol
    crit: notable
    desc: Runtime tarball download helper
    conf: 0.84
    if:
      type: symbol
      exact: downloadTarball
  - id: node-install-downloaded-runtime-symbol
    crit: notable
    desc: Runtime install helper
    conf: 0.84
    if:
      type: symbol
      exact: installDownloadedRuntime
  - id: node-validate-runtime-stage-symbol
    crit: notable
    desc: Runtime stage validation helper
    conf: 0.88
    if:
      type: symbol
      exact: validateRuntimeStage
  - id: node-promote-runtime-stage-symbol
    crit: notable
    desc: Runtime promotion helper
    conf: 0.84
    if:
      type: symbol
      exact: promoteRuntimeStage
composite_rules:
  - id: node-sha256-download-verification
    crit: notable
    desc: Node.js verifies downloaded archive with SHA-256
    conf: 0.92
    near_bytes: 2048
    all:
      - id: node-createhash-sha256-call
      - id: node-hash-digest-hex-symbol
      - id: node-actualhash-symbol
      - id: node-archive-sha256-field
  - id: node-validated-npm-runtime-bootstrapper
    crit: notable
    desc: Node.js npm runtime bootstrapper with staged validation
    conf: 0.9
    near_bytes: 32768
    all:
      - id: node-runtime-package-name-symbol
      - id: node-runtime-manifest-url-symbol
      - id: node-download-tarball-symbol
      - id: node-install-downloaded-runtime-symbol
      - id: node-validate-runtime-stage-symbol
      - id: node-promote-runtime-stage-symbol
