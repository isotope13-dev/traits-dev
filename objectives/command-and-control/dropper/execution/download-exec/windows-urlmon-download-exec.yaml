defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: urlmon-download-exec-cleanup
    desc: Windows binary downloads a file, executes a process, and cleans up a file
    crit: hostile
    conf: 0.98
    attack: T1105
    all:
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/fs/file/write/direct::write-file
      - id: micro-behaviors/fs/file/delete::deletefile-w
      - id: micro-behaviors/communications/http/url/domain::http-url-binary

  - id: urlmon-obfuscated-download-exec
    desc: XOR-obfuscated Windows download-and-execute chain
    crit: hostile
    conf: 0.98
    attack: T1027.002
    all:
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/communications/http/url/domain::xor-decoded-http-url
      - id: micro-behaviors/communications/http/url/domain::http-url-binary
