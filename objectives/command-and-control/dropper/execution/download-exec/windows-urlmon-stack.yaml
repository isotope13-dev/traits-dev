defaults:
  for: [pe]
  platforms: [windows]
  attack: T1105

traits:
- id: stack-built-windrx-marker
  desc: Stack-built windrx marker path
  crit: component
  conf: 0.98
  size_min: 120000
  size_max: 262144
  if:
    type: hex
    section: .zero
    pattern: "BA 25 00 00 00 66 89 95 ?? ?? ?? ?? B8 61 00 00 00 66 89 85 ?? ?? ?? ?? B9 70 00 00 00 66 89 8D ?? ?? ?? ?? BA 70 00 00 00 66 89 95 ?? ?? ?? ?? B8 64 00 00 00 66 89 85 ?? ?? ?? ?? B9 61 00 00 00 66 89 8D ?? ?? ?? ?? BA 74 00 00 00"

- id: stack-built-pei-url
  desc: Stack-built PEI download URL
  crit: component
  conf: 0.99
  size_min: 120000
  size_max: 262144
  if:
    type: hex
    section: .zero
    pattern: "BA 68 00 00 00 66 89 95 ?? ?? ?? ?? B8 74 00 00 00 66 89 85 ?? ?? ?? ?? B9 74 00 00 00 66 89 8D ?? ?? ?? ?? BA 70 00 00 00 66 89 95 ?? ?? ?? ?? B8 3A 00 00 00 66 89 85 ?? ?? ?? ?? B9 2F 00 00 00 66 89 8D ?? ?? ?? ?? BA 2F 00 00 00"

- id: stack-built-pei-exe-suffix
  desc: Stack-built PEI executable suffix
  crit: component
  conf: 0.98
  size_min: 120000
  size_max: 262144
  if:
    type: hex
    section: .zero
    pattern: "B8 70 00 00 00 66 89 85 ?? ?? ?? ?? B9 65 00 00 00 66 89 8D ?? ?? ?? ?? BA 69 00 00 00 66 89 95 ?? ?? ?? ?? B8 2E 00 00 00 66 89 85 ?? ?? ?? ?? B9 65 00 00 00 66 89 8D ?? ?? ?? ?? BA 78 00 00 00 66 89 95 ?? ?? ?? ?? B8 65 00 00 00"

- id: stack-built-zone-identifier
  desc: Stack-built Zone.Identifier ADS
  crit: component
  conf: 0.98
  size_min: 120000
  size_max: 262144
  attack: T1553.005
  if:
    type: hex
    section: .zero
    pattern: "B9 25 00 00 00 66 89 8D ?? ?? ?? ?? BA 73 00 00 00 66 89 95 ?? ?? ?? ?? B8 3A 00 00 00 66 89 85 ?? ?? ?? ?? B9 5A 00 00 00 66 89 8D ?? ?? ?? ?? BA 6F 00 00 00 66 89 95 ?? ?? ?? ?? B8 6E 00 00 00 66 89 85 ?? ?? ?? ?? B9 65 00 00 00"

- id: appended-urlmon-loader-stub
  desc: Appended URLMon loader stub
  crit: component
  conf: 0.98
  size_min: 120000
  size_max: 262144
  if:
    type: hex
    section: .zero
    pattern: "55 8B EC 81 EC 78 09 00 00 E8 C2 0C 00 00 89 85 C4 FD FF FF 83 BD C4 FD FF FF 00"

- id: direct-windrx-marker
  desc: windrx staging marker filename
  crit: component
  conf: 0.99
  if:
    type: text
    exact: windrx.txt

- id: direct-appdata-marker
  desc: '%appdata% staging directory marker'
  crit: component
  conf: 0.97
  if:
    type: text
    exact: '%appdata%'

composite_rules:
- id: stack-built-download-target
  desc: Stack-built payload URL and path
  crit: suspicious
  conf: 0.98
  all:
  - id: stack-built-windrx-marker
  - id: stack-built-pei-url
  - id: stack-built-pei-exe-suffix

- id: stack-built-motw-cleanup
  desc: Stack-built MotW cleanup path
  crit: suspicious
  conf: 0.97
  attack: T1553.005
  all:
  - id: stack-built-zone-identifier
  - id: appended-urlmon-loader-stub
  - id: metadata/binary/section/metrics::pe-nonstandard-entry

- id: appended-urlmon-download-exec
  desc: Appended URLMon download execute loader
  crit: hostile
  conf: 0.99
  all:
  - id: stack-built-windrx-marker
  - id: stack-built-pei-url
  - id: stack-built-pei-exe-suffix
  - id: stack-built-zone-identifier
  - id: appended-urlmon-loader-stub
  - id: metadata/binary/section/metrics::pe-nonstandard-entry
  any:
  - id: micro-behaviors/communications/http/get::urlmon-dll-reference
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
  - id: objectives/anti-static/obfuscation/payload/section::unusual-alignment-pe

- id: urlmon-appdata-windrx-stage
  desc: URLMon AppData windrx staging markers
  crit: suspicious
  conf: 0.98
  all:
  - id: direct-windrx-marker
  - id: direct-appdata-marker
  - id: micro-behaviors/communications/http/get::urlmon-dll-reference
  any:
  - id: micro-behaviors/fs/path/construct::path-combine
  - id: micro-behaviors/fs/path/check::path-file-exists
  - id: micro-behaviors/fs/file/open::file-create-win
