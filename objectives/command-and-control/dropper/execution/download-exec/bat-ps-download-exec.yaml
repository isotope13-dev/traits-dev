# BAT → PowerShell ScriptBlock Download-and-Execute
# Detects a Windows batch file that launches a hidden PowerShell process which
# downloads remote content via Invoke-WebRequest and executes it in-memory via
# ScriptBlock::Create — the standard first-stage loader pattern for this campaign.
# Also covers the VBScript staging variant: Node.js dropper writes a .vbs that
# invokes cmd.exe /c curl to download a PS1, runs it via a renamed PS binary,
# then self-deletes via cscript //nologo && del.
# ATT&CK: T1059.001 (PowerShell), T1105 (Ingress Tool Transfer), T1059.005 (VBScript)
defaults:
  platforms:
    - windows
  for:
    - batch
  attack: T1059.001
traits:
  - id: bat-start-min-ps
    desc: BAT launches minimized hidden PowerShell
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: (?i)start\s+/min\s+powershell\s+-w\s+h
  - id: bat-scriptblock-iwr
    desc: ScriptBlock::Create executes Invoke-WebRequest response
    crit: suspicious
    conf: 0.95
    attack: T1105
    if:
      type: text
      regex: (?i)ScriptBlock\]::Create.{0,200}Invoke-WebRequest
  - id: vbs-cmd-curl-ps-exec
    desc: VBScript cmd curl downloads and runs PS1
    crit: suspicious
    conf: 0.92
    attack: T1105
    for:
      - vbs
      - javascript
      - typescript
      - python
    if:
      type: text
      regex: cmd\.exe\s*/c\s*curl.{0,200}-ep\s+bypass.{0,200}-file
  - id: vbs-ep-bypass-hidden
    desc: VBScript runs PS with ep bypass hidden
    crit: suspicious
    conf: 0.9
    for:
      - vbs
      - javascript
      - typescript
      - python
    if:
      type: text
      regex: -ep\s+bypass.{0,80}-file.{0,200}-w\s+hidden|-w\s+hidden.{0,80}-ep\s+bypass
composite_rules:
  - id: bat-ps-scriptblock-download-exec
    desc: BAT downloads and executes remote PowerShell via ScriptBlock
    crit: hostile
    conf: 0.97
    attack: T1105
    all:
      - id: bat-start-min-ps
      - id: bat-scriptblock-iwr
  - id: vbs-curl-ps-exec-chain
    desc: VBScript curl downloads then executes hidden PS1
    crit: hostile
    conf: 0.97
    attack: T1105
    for:
      - vbs
      - javascript
      - typescript
      - python
    all:
      - id: vbs-cmd-curl-ps-exec
      - id: vbs-ep-bypass-hidden
