defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024

composite_rules:
  - id: self-copy-gzip-dropper
    desc: Self-reading PE copies gzip payload
    crit: suspicious
    conf: 0.94
    size_max: 32768
    all:
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/fs/file/write::write-file
    any:
      - id: micro-behaviors/data/embedded/payload::gzip-magic
      - id: micro-behaviors/fs/path/location::desktop-pb-payload-path
      - id: objectives/evasion/masquerade/version-resource::placeholder-assembly-identity
      - id: metadata/binary/resource::minimal-resources
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer

  - id: desktop-pb-stager-profile
    desc: Desktop pb stager with self-copy chain
    crit: hostile
    conf: 0.97
    size_max: 131072
    all:
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/fs/file/write::write-file
      - id: micro-behaviors/fs/path/location::desktop-pb-payload-path
      - id: objectives/evasion/masquerade/version-resource::placeholder-assembly-identity
    any:
      - id: micro-behaviors/data/embedded/payload::gzip-magic
      - id: metadata/binary/resource::minimal-resources
      - id: objectives/anti-static/obfuscation/binary-metrics::import-count-under-40
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer

  - id: winsock-temp-payload-stager
    desc: Winsock stager drops Temp payload
    crit: suspicious
    conf: 0.95
    size_max: 262144
    all:
      - id: micro-behaviors/communications/socket/multiplex::winsock-event-loop
      - id: objectives/command-and-control/dropper/staging::temp-file-execution
    any:
      - id: metadata/binary/layout::overlay-dominates-third
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer

  - id: winsock-overlay-loader-with-anti-debug
    desc: Winsock overlay loader with anti-debug
    crit: hostile
    conf: 0.97
    size_max: 262144
    all:
      - id: micro-behaviors/communications/socket/multiplex::winsock-event-loop
      - id: objectives/command-and-control/dropper/staging::temp-file-execution
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    any:
      - id: metadata/binary/layout::overlay-dominates-third
      - id: objectives/anti-analysis/debugger-detect/check::seh-pointer-probe-anti-debug
      - id: objectives/anti-analysis/timing/evasion::high-res-timing
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
