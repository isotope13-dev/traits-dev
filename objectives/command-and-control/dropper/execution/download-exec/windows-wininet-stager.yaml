defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105

composite_rules:
  - id: temp-cmd-wininet-stager
    desc: Temp-staged WinInet command stager
    crit: hostile
    conf: 0.95
    size_max: 262144
    all:
      - id: micro-behaviors/process/create/exec::cmd-shell-via-createprocess
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
      - id: micro-behaviors/communications/http/get::ansi-wininet-session-stack
    any:
      - id: micro-behaviors/communications/http/headers::file-upload-headers
      - id: micro-behaviors/communications/http/post::post-string-pe
      - id: micro-behaviors/communications/http/post::url-encoded-content-type
      - id: metadata/binary/section/metrics::compact-loader-like-layout
      - id: objectives/anti-static/obfuscation/imports::hash-based-obfuscation
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
