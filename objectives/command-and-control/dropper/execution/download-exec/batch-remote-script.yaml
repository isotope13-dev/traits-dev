defaults:
  platforms: [windows]
  for: [batch]
  attack: T1059.003,T1105
  mbc: B0030

traits: []

composite_rules:
  - id: batch-raw-ip-script-download-execute
    desc: Batch downloads and calls a remote script from TEMP
    crit: hostile
    conf: 0.99
    near_lines: 8
    all:
      - id: micro-behaviors/communications/http/download/curl::batch-curl-call
      - id: micro-behaviors/communications/http/download/curl::batch-curl-output-temp
      - id: micro-behaviors/communications/http/download/curl::batch-curl-http-url
      - id: micro-behaviors/process/create/script/file::batch-call-script
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
