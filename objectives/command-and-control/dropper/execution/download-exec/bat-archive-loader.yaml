# Batch archive download, extraction, and execution chain.
defaults:
  platforms: [windows]
  for: [batch]

traits:
  - id: temp-extracted-exe-launch
    desc: Batch starts an executable from TEMP
    crit: suspicious
    conf: 0.9
    attack: T1105
    if:
      type: text
      regex: '(?im)\bstart\s+""\s+["'']?[!%][A-Za-z_][A-Za-z0-9_]{0,40}[!%]["'']?.{0,100}\.exe'

composite_rules:
  - id: hidden-archive-downloader
    desc: Batch silently downloads and extracts a remote archive
    crit: hostile
    conf: 0.98
    attack: T1059.001,T1105
    all:
      - id: micro-behaviors/process/create/hidden::powershell-windowstyle-hidden
      - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
      - id: objectives/command-and-control/dropper/staging/archive::powershell-archive-extract

  - id: archive-payload-execution
    desc: Batch launches an executable extracted from a remote archive
    crit: hostile
    conf: 0.99
    attack: T1105,T1204.002
    all:
      - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
      - id: objectives/command-and-control/dropper/staging/archive::powershell-archive-extract
      - id: temp-extracted-exe-launch
