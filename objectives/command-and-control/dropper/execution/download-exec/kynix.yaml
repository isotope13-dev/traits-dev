defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: E1105

traits:
  - id: download-wininet-helper
    desc: WinInet payload download helper symbol
    crit: component
    conf: 0.98
    if:
      type: symbol
      kind: export
      substr: download_wininet(

  - id: execute-stealth-helper
    desc: Stealth payload execution helper symbol
    crit: component
    conf: 0.98
    if:
      type: symbol
      kind: export
      substr: execute_stealth(

  - id: drop-marker
    desc: Payload drop marker string
    crit: component
    conf: 0.96
    if:
      type: text
      exact: KYNIX_DROP

composite_rules:
  - id: wininet-stealth-download-exec
    desc: WinInet download and stealth execute workflow
    crit: hostile
    conf: 0.98
    all:
      - id: download-wininet-helper
      - id: execute-stealth-helper
    any:
      - id: drop-marker
      - id: objectives/anti-static/obfuscation/imports::pe-api-hashing-indicator-single
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::xs25-template-decrypt-symbol
    needs: 2
