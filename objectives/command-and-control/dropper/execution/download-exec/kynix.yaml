defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: E1105

traits:
  - id: download-wininet-helper
    desc: WinInet payload download helper name
    crit: component
    conf: 0.98
    if:
      type: text
      substr: download_wininet

  - id: execute-stealth-helper
    desc: Stealth payload execution helper name
    crit: component
    conf: 0.98
    if:
      type: text
      substr: execute_stealth

composite_rules:
  - id: wininet-stealth-download-exec
    desc: WinInet download and stealth execute workflow
    crit: hostile
    conf: 0.98
    all:
      - id: download-wininet-helper
      - id: execute-stealth-helper
    any:
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::xs25-template-decrypt-symbol
      - id: objectives/anti-analysis/vm-detect/vendor::anti-vm-bypass-flag
      - id: objectives/anti-static/obfuscation/imports::custom-api-resolver-helpers
      - id: objectives/anti-static/obfuscation/imports::wininet-import-absent
    needs: 1
