# Obfuscated Node loaders that maintain a WebSocket control channel and use
# runtime decoding plus filesystem/OS access to stage a second payload.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1105,T1059.007,T1027

traits:
  - id: node-relay-config-marker
    desc: Relay or control config key
    crit: suspicious
    conf: 0.95
    if:
      type: literal
      kind: string
      regex: '\b(relay|c2|control)[_-][a-z][a-z0-9_-]*\b'
      case_insensitive: true
  - id: node-secret-config-marker
    desc: Admin or secret config key
    crit: suspicious
    conf: 0.95
    if:
      type: literal
      kind: string
      regex: '\b(admin|secret|private)[_-][a-z][a-z0-9_-]*\b'
      case_insensitive: true
  - id: node-download-handler
    desc: Node download handler
    crit: suspicious
    conf: 0.97
    attack: T1105
    if:
      type: text
      regex: '(?i)\b(handle|process)[A-Za-z0-9_]*download[A-Za-z0-9_]*\b'
  - id: node-upload-handler
    desc: Node upload handler
    crit: suspicious
    conf: 0.97
    attack: T1105
    if:
      type: text
      regex: '(?i)\b(handle|process)[A-Za-z0-9_]*upload[A-Za-z0-9_]*\b'
  - id: node-runtime-privilege-profile
    desc: Node privilege-state config key
    crit: suspicious
    conf: 0.95
    attack: T1033
    if:
      type: literal
      kind: string
      regex: '\b(privilege|elevat[a-z]*)[_-][a-z][a-z0-9_-]*\b'
      case_insensitive: true

composite_rules:
  - id: obfuscated-node-websocket-stage-loader
    desc: Obfuscated Node WebSocket stage loader
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/library/structure::js-large-minified-bundle
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::push-shift-bracket-pattern
      - id: micro-behaviors/crypto/symmetric/xor/loop::xor-modulo-key-loop
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call
      - id: micro-behaviors/communications/http/websocket::websocket-class
      - id: metadata/import/builtin::require-fs
      - id: metadata/import/builtin::require-os

  - id: obfuscated-node-remote-agent
    desc: Obfuscated Node remote agent with file transfer and privilege profiling
    crit: hostile
    conf: 0.99
    attack: T1059.007,T1105,T1033
    mbc: B0030
    all:
      - id: node-relay-config-marker
      - id: node-secret-config-marker
      - id: node-download-handler
      - id: node-upload-handler
      - id: node-runtime-privilege-profile
      - id: micro-behaviors/communications/http/websocket::websocket-class
      - id: micro-behaviors/process/create/shell/bridge::js-spawnsync
