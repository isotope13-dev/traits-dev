defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1059.001,T1105,T1564.003
  mbc: B0030

traits: []

composite_rules:
  - id: powershell-hidden-exe-download-launch
    desc: Hidden PowerShell downloads and launches an executable
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/process/create/shell/remote-powershell::powershell-hidden-window
      - id: micro-behaviors/communications/http/download/url::executable-url-reference-a
      - id: micro-behaviors/process/create/start-process::start-process-filepath

  - id: powershell-hidden-url-exe-download-execute
    desc: Hidden PowerShell downloads and launches a URL EXE
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/dropper/delivery/download-execute::powershell-iwr-exe-to-temp
      - id: micro-behaviors/process/create/start-process::saps-alias
      - id: micro-behaviors/process/create/hidden::powershell-hidden-window
