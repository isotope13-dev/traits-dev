defaults:
  platforms: [unix, windows]
  for: [javascript]
composite_rules:
- id: js-download-write-execute
  desc: Downloads payload to disk and executes it
  crit: hostile
  conf: 0.95
  attack: T1105
  mbc: E1105
  all:
  - id: micro-behaviors/communications/ip/literal::external-ipv4-script
  - id: micro-behaviors/fs/write/file/direct::write-file-sync
  - id: micro-behaviors/process/create/shell/bridge::js-exec
- id: js-obfuscated-com-dropper
  desc: Obfuscated COM stream stages a payload
  crit: hostile
  conf: 0.98
  attack: T1027,T1105,T1106
  mbc: B0032,E1105
  all:
  - id: objectives/anti-static/obfuscation/syntax::js-obfuscated-com-overwrite
  - id: micro-behaviors/fs/write/file/stream::js-adodb-stream-savetofile-dynamic-path
  - id: objectives/anti-static/obfuscation/syntax::js-computed-call-false-argument
- id: js-tls-bypass-c2-fetch
  desc: TLS verification bypass while downloading and executing a payload
  crit: hostile
  conf: 0.95
  attack: T1553.004
  all:
  - id: micro-behaviors/communications/socket/ssl::node-tls-verification-env-disable
  - id: micro-behaviors/fs/write/file/direct::write-file-sync
  - id: micro-behaviors/process/create/shell/bridge::js-exec
  any:
  - id: micro-behaviors/communications/ip/literal::external-ipv4-script
  - id: micro-behaviors/communications/ip/literal::http-ip-url
  - id: micro-behaviors/communications/http/url/cloud::alibaba-oss-executable-url
  unless:
  - id: well-known/app/mastergo::mastergo-application-context
  - id: well-known/app/codewhale::codewhale-application-context
