defaults:
  platforms: [unix, windows]
  for: [javascript]
composite_rules:
- id: js-download-write-execute
  desc: Downloads payload to disk and executes it
  crit: hostile
  conf: 0.95
  attack: T1105
  mbc: E1105
  all:
  - id: micro-behaviors/communications/ip::external-ipv4-script
  - id: micro-behaviors/fs/write/file::write-file-sync
  - id: micro-behaviors/process/create/shell/bridge::js-exec
- id: js-tls-bypass-c2-fetch
  desc: TLS bypass with C2 server communication
  crit: hostile
  conf: 0.95
  attack: T1553.004
  all:
  - id: objectives/evasion/security-bypass/tls::node-tls-reject-disabled
  any:
  - id: micro-behaviors/communications/ip::external-ipv4-script
  - id: micro-behaviors/communications/ip::http-ip-url
