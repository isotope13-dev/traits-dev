defaults:
  platforms: [unix, windows]
  for: [javascript]
traits:
- id: nemucod-disability-base64-noise
  desc: Nemucod polluted Base64 marker
  crit: suspicious
  conf: 0.9
  count_min: 3
  if:
    type: text
    regex: 'disability[A-Za-z0-9+/]{2,80}disability'
- id: nemucod-polluted-http-prefix
  desc: Nemucod polluted HTTP prefix
  crit: component
  conf: 0.95
  if:
    type: text
    substr: aHRdisability0cDdisabilityovLw=disability=
- id: wsh-host-base64-literal
  desc: Windows Script Host Base64 literal
  crit: component
  conf: 0.95
  if:
    type: text
    substr: V2luZG93cyBTY3JpcHQgSG9zdA==
composite_rules:
- id: nemucod-polluted-base64-wsh-marker
  desc: Nemucod polluted Base64 WSH downloader marker
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/process/interpreter/jscript::is-jscript
  - id: objectives/command-and-control/dropper/execution/download-exec::nemucod-disability-base64-noise
  - id: objectives/command-and-control/dropper/execution/download-exec::nemucod-polluted-http-prefix
  - id: objectives/command-and-control/dropper/execution/download-exec::wsh-host-base64-literal
- id: nemucod-polluted-base64-download-execute
  desc: Nemucod polluted Base64 download and execute
  crit: hostile
  conf: 0.97
  attack: T1059.007, T1105, T1027
  mbc: B0017, B0018, B0032
  all:
  - id: objectives/command-and-control/dropper/execution/download-exec::nemucod-polluted-base64-wsh-marker
  - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file-method
  - id: objectives/anti-static/obfuscation/syntax::js-dynamic-global-access-array
  any:
  - id: objectives/anti-static/obfuscation/syntax::js-prototype-extension
  - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
- id: nemucod-adodb-write-path
  desc: Nemucod ADODB stream write/save chain (literal or obfuscated)
  crit: suspicious
  conf: 0.92
  any:
  - id: micro-behaviors/fs/write/file/stream::adodb-savetofile
  - id: micro-behaviors/fs/write/file/stream::adodb-savetofile-obfuscated-fragments
- id: nemucod-run-method
  desc: Nemucod execution method call (literal or dynamic WScript property)
  crit: component
  conf: 0.5
  any:
  - id: micro-behaviors/process/create/shell/script-host::wscript-shell-run
  - id: objectives/anti-static/obfuscation/syntax::js-wscript-dynamic-property-raw
  - id: objectives/anti-static/obfuscation/syntax::js-wscript-dynamic-property-ast
- id: fragmented-url-dropper
  desc: Detects Nemucod JScript dropper using fragmented C2 URL construction, download via ADODB.Stream, and execution via WScript.Shell.
  crit: hostile
  conf: 0.98
  attack: T1059.007, T1105, T1027
  mbc: B0017, B0018, B0032
  all:
  - id: objectives/command-and-control/dropper/execution/download-exec::nemucod-adodb-write-path
  - id: objectives/command-and-control/dropper/execution/download-exec::nemucod-run-method
