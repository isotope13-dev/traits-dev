defaults:
  platforms: [windows]
  for: [vbs, html, javascript]
  attack: T1218.005
  mbc: E1059
traits:
  - id: cloudflare-tunnel-url
    desc: trycloudflare tunnel URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: '.tryc" + "loud" + "flare'
  - id: epub-hta-stage-url
    desc: Remote epub HTA stage URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: '"ep" + "ub"'
  - id: fragmented-mshta-exe
    desc: Fragmented mshta.exe string
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'm["'']?\s*\+\s*["'']sh["'']?\s*\+\s*["'']ta["'']?\s*\+\s*["'']\.exe'
  - id: wscript-run-variable
    desc: WScript Shell runs variable command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: ").Run causehRK"
composite_rules:
  - id: hta-mshta-remote-stage
    desc: HTA launches remote mshta stage
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/file/format::hta-application-element
      - id: wscript-run-variable
      - id: fragmented-mshta-exe
    any:
      - id: cloudflare-tunnel-url
      - id: epub-hta-stage-url
