defaults:
  platforms: [windows]
  for: [vbs, html]
  attack: T1218.005
  mbc: E1059
traits:
  - id: cloudflare-tunnel-url
    desc: trycloudflare tunnel URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: '.tryc" + "loud" + "flare'
  - id: epub-hta-stage-url
    desc: Remote epub HTA stage URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: '"ep" + "ub"'
  - id: fragmented-mshta-exe
    desc: Fragmented mshta.exe string
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'm["'']?\s*\+\s*["'']sh["'']?\s*\+\s*["'']ta["'']?\s*\+\s*["'']\.exe'
  - id: wscript-run-variable
    desc: WScript Shell runs variable command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: ").Run causehRK"
  - id: hidden-hta-window
    desc: HTA hides itself off-screen or minimized
    crit: suspicious
    conf: 0.94
    for: [javascript, html, vbs, text, data]
    if:
      type: text
      regex: '(?is)<hta:application[^>]{0,120}(showInTaskbar|windowState)'
  - id: hta-offscreen-resize
    desc: HTA hides window bounds
    crit: suspicious
    conf: 0.9
    for: [javascript, html, vbs, text, data]
    if:
      type: text
      regex: '(?i)window\.(resizeTo|moveTo)\s*\(\s*-?[0-9]+,\s*-?[0-9]+\s*\)'
  - id: windows-script-msxml-base64-decoder
    desc: Windows script MSXML Base64 decoder
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: 'dataType = "bin.base64"'
    unless:
      - id: well-known/app/pinokio::app-bundle
  - id: windows-script-adodb-temp-gzip-write
    desc: Windows script writes temporary gzip
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: 'oStream.SaveToFile tempZip'
  - id: windows-script-powershell-gzip-decompress
    desc: Windows script PowerShell gzip decoder
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: 'IO.Compression.GzipStream'
  - id: windows-script-runs-decoded-temp-batch
    desc: Windows script runs decoded temporary batch
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(?i)objShell\.Run\s+tempBat'

  - id: hta-computed-activex-object
    desc: HTA computed ActiveXObject ProgID
    crit: suspicious
    conf: 0.95
    for: [html, text, data]
    if:
      type: text
      regex: 'new\s+ActiveXObject\s*\(\s*[A-Za-z_$][A-Za-z0-9_$]{1,40}\s*\('

  - id: hta-fso-create-text-file
    desc: HTA creates text file via FSO
    crit: suspicious
    conf: 0.94
    for: [html]
    if:
      type: text
      regex: '\.CreateTextFile\s*\('
    unless:
      - id: well-known/app/wazuh/
      - id: metadata/package/testing/presence/harness::test-directory-path
      - id: metadata/package/testing/presence/fixture::snapshot-file

  - id: hta-open-text-stream
    desc: HTA opens file text stream
    crit: suspicious
    conf: 0.92
    for: [html]
    if:
      type: text
      regex: '\.OpenAsTextStream\s*\('

  - id: hta-wscript-hidden-run
    desc: HTA WScript hidden Run call
    crit: suspicious
    conf: 0.95
    for: [html]
    if:
      type: text
      regex: '\.Run\s*\(.{0,640},\s*0\s*,\s*(true|false)'

  - id: hta-create-shortcut-call
    desc: HTA creates Windows shortcut
    crit: component
    conf: 0.94
    for: [html]
    if:
      type: text
      regex: '\.CreateShortcut\s*\('

  - id: hta-shortcut-target-path
    desc: HTA assigns shortcut TargetPath
    crit: suspicious
    conf: 0.93
    for: [html]
    if:
      type: text
      regex: '\.TargetPath\s*='

composite_rules:
  - id: hta-msxml-dynamic-vbs-loader
    desc: Hidden HTA decodes and executes a VBScript stage
    crit: hostile
    conf: 0.99
    attack: "T1027,T1059.005,T1140,T1218.005"
    all:
      - id: hidden-hta-window
      - id: micro-behaviors/data/decode/base64::msxml-node-typed-value
      - id: objectives/execution/interpreter/vbscript/loader::executeglobal-variable

  - id: hta-hex-xor-string-decoder
    desc: HTA hex-pair XOR string decoder
    crit: suspicious
    conf: 0.95
    for: [javascript, html, vbs]
    all:
      - id: metadata/file/format::hta-application-element
      - id: micro-behaviors/data/decode/custom::js-hex-xor-character-decode

  - id: hta-encoded-eval-loader
    desc: HTA hex-XOR decode-and-eval loader
    crit: hostile
    conf: 0.99
    attack: "T1027,T1059.007,T1140"
    for: [javascript, html, vbs]
    all:
      - id: objectives/anti-static/obfuscation/payload/jscript::js-hta-application-element
      - id: hta-hex-xor-string-decoder
      - id: micro-behaviors/data/encode/base64::large-string-assignment
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-text

  - id: hta-mshta-remote-stage
    desc: HTA launches remote mshta stage
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/file/format::hta-application-element
      - id: wscript-run-variable
      - id: fragmented-mshta-exe
    any:
      - id: cloudflare-tunnel-url
      - id: epub-hta-stage-url
  - id: hta-base64-gzip-tempbat-loader
    desc: Hidden HTA decodes gzip payload to a temporary batch file and runs it
    crit: hostile
    conf: 0.99
    all:
      - id: hidden-hta-window
      - id: windows-script-msxml-base64-decoder
      - id: windows-script-adodb-temp-gzip-write
      - id: windows-script-powershell-gzip-decompress
      - id: windows-script-runs-decoded-temp-batch
    any:
      - id: hta-offscreen-resize
      - id: metadata/file/format::hta-application-element
  - id: hta-obfuscated-com-tempbat-loader
    desc: HTA obfuscated COM temp batch loader
    crit: hostile
    conf: 0.98
    all:
      - id: hta-base64-gzip-tempbat-loader
      - id: objectives/command-and-control/dropper/execution/string-reconstruct::obfuscated-wsh-com-dropper

  - id: vbs-base64-gzip-tempbat-loader
    desc: VBScript decodes and runs a hidden Base64 gzip batch payload
    crit: hostile
    conf: 0.99
    for: [vbs]
    all:
      - id: windows-script-msxml-base64-decoder
      - id: windows-script-adodb-temp-gzip-write
      - id: windows-script-powershell-gzip-decompress
      - id: windows-script-runs-decoded-temp-batch
      - id: objectives/command-and-control/dropper/execution/wsh::wsh-run-hidden-zero

  - id: hta-obfuscated-wscript-file-runner
    desc: HTA writes and runs obfuscated script
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/file/format::hta-application-element
      - id: hta-hex-xor-string-decoder
      - id: hta-computed-activex-object
      - id: hta-fso-create-text-file
      - id: hta-open-text-stream
      - id: hta-wscript-hidden-run

  - id: hta-obfuscated-shortcut-persistence
    desc: HTA builds obfuscated shortcut persistence
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/file/format::hta-application-element
      - id: hta-hex-xor-string-decoder
      - id: hta-computed-activex-object
      - id: hta-create-shortcut-call
      - id: hta-shortcut-target-path
      - id: micro-behaviors/os/wsh/file::shortcut-save

  # The loader family is intentionally described by behavior, not by its
  # staging hostname: a hidden HTA launches a hidden WMI process, fetches
  # bytes, decodes them, and reflectively loads a .NET assembly in memory.
  - id: hidden-hta-remote-reflective-loader
    desc: Hidden HTA downloads and reflectively loads .NET payload
    crit: hostile
    conf: 0.99
    attack: "T1059.001,T1047,T1105,T1140,T1620,T1564.003"
    for: [html]
    scope: file
    all:
      - id: hidden-hta-window
      - id: hta-offscreen-resize
      - id: objectives/execution/wmi::wmi-hidden-variable-process-create
      - id: micro-behaviors/communications/http/client/webclient::webclient-download-data
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/process/interpreter/reflection/runtime::powershell-appdomain-split-reflected-load
      - id: objectives/command-and-control/dropper/execution/shell-chain::invoke-expression-env-variable
