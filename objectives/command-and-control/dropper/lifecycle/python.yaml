defaults:
  platforms: [unix, windows]
  for: [python]
  crit: component
  mbc: B0024
  attack: T1105

traits:
  - id: download-with-delete-param
    desc: Download call with delete parameter
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\b(download|fetch|get|safe_download)\w*\s*\([^\n)]{0,120}\bdelete\s*=\s*True\b'
    unless:
      - type: text
        regex: 'def\s+[^\n]+\bdelete=True'
