defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  mbc: B0024
  attack: T1059.006
traits:
  - id: tmp-path-short
    desc: Reference to /tmp directory path
    crit: component
    conf: 0.7
    if:
      type: text
      regex: /tmp/[a-zA-Z_]+$
    not:
      - /tmp/tkt
      - /tmp/lib
      - /tmp/RecoveryTemp
      - /tmp/KernelCache
      - /tmp/com
    unless:
      - id: well-known/app/drivers::nvidia-linux-driver-component
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: popen-call
    desc: subprocess module call
    crit: component
    conf: 0.5
    for:
      - python
    if:
      type: trait
      id: micro-behaviors/process/create/subprocess::methods
  - id: download-status-msg
    desc: Loader-style download status message
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)Download\s*failed|Download\s*OK'
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: launch-status-msg
    desc: Loader-style launch status message
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)Launch\s*failed|Launch\s*OK'
  - id: python-cross-language-bootstrap-context
    desc: Python package bootstrap orchestration context
    crit: component
    conf: 0.9
    for:
      - python
    if:
      type: text
      regex: 'cross-language dependency orchestration|node_modules|npm install'
  - id: python-dev-environment-context
    desc: Python developer environment setup context
    crit: component
    conf: 0.9
    for:
      - python
    if:
      type: text
      regex: 'ensure_dev_environment|run_postinstall|self-heal'
composite_rules:
  - id: python-dropper-exec-capability
    desc: Python process or exec capability
    crit: component
    conf: 0.8
    for:
      - python
    any:
      - id: micro-behaviors/process/create/subprocess/
      - id: micro-behaviors/process/create/system::python-os-system
      - id: micro-behaviors/process/interpreter/python::exec-builtin
  - id: python-dropper-context
    desc: Python dropper loader context
    crit: component
    conf: 0.8
    for:
      - python
    any:
      - id: tmp-path-short
      - id: download-status-msg
      - id: launch-status-msg
      - id: micro-behaviors/communications/http/download/
      - id: objectives/command-and-control/dropper/download/
    unless:
      - id: micro-behaviors/communications/http/upload::curl-upload-file
  - id: python-exec-any
    desc: Python dropper-style execution
    crit: suspicious
    conf: 0.84
    for:
      - python
    all:
      - id: python-dropper-exec-capability
      - id: python-dropper-context
    unless:
      - id: well-known/lib/pyaigis::pyaigis-context
      - id: well-known/tool/dual-use/aitun::aitun-tunnel-client
      - id: python-cross-language-bootstrap-context
      - id: python-dev-environment-context
      - id: metadata/file/catalog/service::deployment-helper-context
  - id: python-comp
    desc: Download to /tmp, chmod, execute
    conf: 0.95
    crit: suspicious
    all:
      - id: tmp-path-short
      - id: micro-behaviors/fs/chmod/modify::python-os-chmod
      - id: micro-behaviors/process/create/subprocess/
    any:
      - id: micro-behaviors/fs/file/delete::py-remove
      - id: micro-behaviors/communications/http/download/
      - id: objectives/command-and-control/dropper/download/
  - id: download-and-launch-status
    desc: Download and launch status messages
    crit: component
    conf: 0.9
    all:
      - id: download-status-msg
      - id: launch-status-msg
  - id: hostile-cloud-dropper
    desc: Downloads and launches executable from cloud storage
    crit: hostile
    conf: 0.95
    attack: T1584.004
    all:
      - id: download-and-launch-status
      - id: micro-behaviors/communications/http/url/cloud::cloud-executable-url

  - id: proxy-loader-indicators
    desc: Forwarded export cluster for proxy loader
    crit: component
    all:
      - id: metadata/binary/symbols/exports::dll-forwarded-export
      - id: metadata/binary/symbols/exports::high-forwarder-ratio

  - id: hostile-proxy-loader
    desc: Hostile proxy DLL loader
    crit: hostile
    conf: 0.98
    all:
      - id: download-and-launch-status
    any:
      - id: metadata/binary/symbols/exports::pure-proxy-dll
      - id: proxy-loader-indicators

  - id: hostile-proxy-sideload
    desc: Hostile proxy DLL in sideload context
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/binary/symbols/exports::pure-proxy-dll
      - id: objectives/evasion/masquerade/dll/sideload::nvbackend-sideload-host
  - id: hostile-proxy-hidden-stager
    desc: Proxy DLL hidden payload stager
    crit: hostile
    conf: 0.98
    platforms: [windows]
    for: [pe, dll]
    attack: T1105
    all:
      - id: metadata/binary/symbols/exports::pure-proxy-dll
      - id: micro-behaviors/process/create/flags::hidden-winexec
      - id: objectives/anti-static/obfuscation/payload/encrypted::stack-copied-xor-payload
