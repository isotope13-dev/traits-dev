defaults:
  platforms: [unix, windows]
  for: [python]
composite_rules:
  - id: python-write-capability
    desc: Python file write capability
    crit: component
    conf: 0.8
    any:
      - id: micro-behaviors/fs/write/file/direct::python-open-write-binary
      - id: micro-behaviors/fs/write/file/direct::python-write-response-content
      - id: objectives/supply-chain/install-hook/dropper/setup-hook::binary-file-drop
  - id: python-exec-capability
    desc: Python execution capability
    crit: component
    conf: 0.8
    any:
      - id: micro-behaviors/process/create/shell/spawn::shell-execution
      - id: micro-behaviors/process/create/shell/spawn::shell-execution-indicators
      - id: objectives/command-and-control/dropper/lifecycle::python-dropper-exec-capability
      - id: objectives/execution/condition/platform::executes-commands
