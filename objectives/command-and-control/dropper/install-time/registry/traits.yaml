# npm Registry Metadata Supply Chain Dropper Detection
# Detects malicious patterns in npm registry metadata (CouchDB docs)
# These files are not detected as package.json by cleave, requiring
# raw pattern matching with broad file type coverage.
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
defaults:
  for: [package.json]
  platforms: [linux, macos, windows, unix, android, ios]
  conf: 0.85
traits:
  - id: npm-registry-metadata
    desc: npm registry metadata structure
    crit: component
    conf: 0.95
    if:
      type: raw
      substr: '"dist-tags"'
  - id: postinstall-node-exec
    desc: Postinstall runs node in registry metadata
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    if:
      type: raw
      regex: '"postinstall"\s*:\s*"node \w+\.js"'
  - id: preinstall-node-exec
    desc: Preinstall runs node in registry metadata
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    if:
      type: raw
      regex: '"preinstall"\s*:\s*"node \w+\.js"'
  - id: resolved-temp-dir
    desc: Package published from temp directory
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    if:
      type: raw
      regex: '"_resolved"\s*:\s*"(/var/folders/|/tmp/)'
  - id: resolved-npm-update-temp
    desc: Package resolved from npm-update temp path
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    if:
      type: raw
      substr: "npm-update-"
composite_rules:
  - id: registry-postinstall-dropper
    desc: Registry metadata with postinstall dropper
    crit: hostile
    conf: 0.95
    attack: "T1195.002"
    all:
      - id: npm-registry-metadata
    any:
      - id: postinstall-node-exec
      - id: preinstall-node-exec
  - id: registry-temp-dir-publish
    desc: Registry metadata published from temp dir
    crit: hostile
    conf: 0.95
    attack: "T1195.002"
    all:
      - id: npm-registry-metadata
      - id: resolved-temp-dir
    any:
      - id: postinstall-node-exec
      - id: preinstall-node-exec
