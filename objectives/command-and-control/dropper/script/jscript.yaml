# JScript Dropper Objectives
composite_rules:
  - id: jscript-xmlhttp-adodb-dropper
    desc: "JScript downloader using XMLHTTP and ADODB.Stream"
    crit: hostile
    conf: 0.95
    attack: "T1105"
    all:
      - id: micro-behaviors/process/create/shell/lang::wscript-shell
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run
      - id: micro-behaviors/os/fs/write::adodb-save-to-file
    any:
      - id: micro-behaviors/communications/http/client::js-xmlhttp-open
      - id: micro-behaviors/communications/http/client::js-xmlhttp-send
  - id: jscript-embedded-base64-adodb-dropper
    desc: "JScript embedded base64 payload drop-and-exec"
    crit: hostile
    conf: 0.98
    attack: "T1059.007"
    platforms: [windows]
    for: [javascript]
    all:
      - id: micro-behaviors/data/encode/base64::msxml-bin-base64-decode
      - id: micro-behaviors/fs/write/file::adodb-stream
      - id: micro-behaviors/os/fs/write::adodb-save-to-file
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run
  - id: jscript-rundll32-dropper
    desc: "JScript dropper that executes payload via rundll32"
    crit: hostile
    conf: 1.0
    attack: "T1218.011"
    all:
      - id: micro-behaviors/process/create/shell::rundll32-exec-with-args
    any:
      - id: micro-behaviors/os/fs/write::adodb-save-to-file
      - id: micro-behaviors/fs/write/file::js-file-write
      - id: objectives/anti-static/obfuscation/source/syntax::js-comma-constant-obfuscation
