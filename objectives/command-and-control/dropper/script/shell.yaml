# Shell Script Dropper Patterns
# Detects one-liner shell droppers
# ATT&CK: T1105
defaults:
  platforms: [linux, unix, macos, android, ios]
composite_rules:
  - id: oneliner-dropper
    desc: Shell one-liner dropper pattern
    crit: hostile
    conf: 0.95
    for: [shell]
    mbc: "B0024"
    attack: "T1105"
    all:
      - id: micro-behaviors/communications/download/curl::curl-cmd
      - id: objectives/command-and-control/botnet/iot::pipe-to-shell
