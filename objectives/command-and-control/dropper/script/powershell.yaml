traits:
  - id: ps-network-eval-pipeline
    desc: PowerShell network response piped to eval
    crit: suspicious
    conf: 0.92
    mbc: "B0030"
    attack: "T1105"
    for: [powershell]
    if:
      type: raw
      regex: "(?i)\\biwr\\b[^\\n|]{0,220}\\|\\s*iex\\b"
composite_rules:
  - id: ps-downloader-indicators
    desc: Helper for downloader indicators
    crit: notable
    any:
      - id: micro-behaviors/os/env/vars::env-temp
      - id: objectives/execution/dropper/script::outfile-param
  - id: ps-downloader-execute
    desc: "PowerShell script downloads and executes payload"
    crit: hostile
    conf: 0.95
    for: [powershell]
    all:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::download
      - id: objectives/execution/process/control::start-process
      - id: objectives/command-and-control/dropper/script::ps-downloader-indicators
  - id: ps-fileless-download-eval
    desc: "PowerShell fileless download and eval"
    crit: hostile
    conf: 0.98
    mbc: "B0030"
    attack: "T1059.001"
    for: [powershell]
    all:
      - id: objectives/command-and-control/dropper/script::ps-network-eval-pipeline
      - id: objectives/execution/interpreter/eval/invoke::iex
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::invoke-webrequest
