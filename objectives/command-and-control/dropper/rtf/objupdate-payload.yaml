defaults:
  attack: T1203
  platforms: [linux, macos, windows, unix, android, ios]
  for: [rtf]
composite_rules:
  - id: rtf-objupdate-embedded-payload
    desc: RTF document with objupdate trigger and embedded payload
    crit: hostile
    conf: 0.95
    mbc: "B0009.029"
    all:
      - id: objectives/execution/trigger/rtf::objupdate
    any:
      - id: objectives/anti-static/obfuscation/payload::large-hex-string-dup
      - id: objectives/anti-static/obfuscation/rtf::suspicious-hex-escape
      - id: objectives/anti-static/obfuscation/rtf::nested-objdata-in-data
    needs: 1
  - id: rtf-objupdate-ole-exploit
    desc: RTF document with objupdate trigger and OLE object embedding
    crit: hostile
    conf: 0.95
    mbc: "B0009.029"
    all:
      - id: objectives/execution/trigger/rtf::objupdate
      - id: objectives/lateral-movement/exploit/document/rtf-ole::rtf-ole-object-embedding
    any:
      - id: objectives/anti-static/obfuscation/rtf::suspicious-hex-escape
      - id: objectives/anti-static/obfuscation/payload::large-hex-string-dup
      - id: micro-behaviors/data/encoding/hex::hex-encoded-http
    needs: 1
  - id: rtf-exploit-mathtype-objclass
    desc: RTF with MathType objclass and exploit indicators
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/format/rtf/object::mathtype-object
    any:
      - id: objectives/execution/trigger/rtf::objupdate
      - id: objectives/anti-static/obfuscation/payload::large-hex-string-dup
      - id: micro-behaviors/data/encoding/hex::hex-encoded-http
    needs: 1
  - id: rtf-exploit-mathtype-section
    desc: RTF with MathType OLE section and exploit indicators
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/format/rtf/object::mathtype-section
    any:
      - id: objectives/execution/trigger/rtf::objupdate
      - id: objectives/anti-static/obfuscation/payload::large-hex-string-dup
      - id: micro-behaviors/data/encoding/hex::hex-encoded-http
    needs: 1
