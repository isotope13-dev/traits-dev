# Download-Execute Dropper Patterns
# Detects stealthy download and execute patterns
# ATT&CK: T1105
composite_rules:
  - id: hostile-downloader-wininet
    desc: Hostile Downloader (Network -> Memory -> Process)
    crit: hostile
    conf: 0.9
    mbc: E1105
    attack: T1105
    size_max: 524288
    all:
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/process/create/spawn::create-process-w
  - id: wininet-memory-stager
    desc: WinInet downloader with in-memory staging
    crit: suspicious
    conf: 0.92
    mbc: E1105
    attack: T1105
    platforms: [windows]
    for: [pe, dll]
    size_max: 262144
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
    any:
      - id: micro-behaviors/fs/memory/mmap::win32-file-mapping
      - id: micro-behaviors/fs/path/check::self-directory-switch
      - id: micro-behaviors/fs/path/temp::word-temp-staging-file
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: micro-behaviors/process/terminate/kill::exit-process
    needs: 2
  - id: hostile-downloader-wininet-memory-or-process
    desc: Hostile downloader with memory or process exec
    crit: hostile
    conf: 0.9
    mbc: E1105
    attack: T1105
    platforms: [windows]
    for: [pe, dll]
    size_max: 524288
    all:
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
    any:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: wininet-memory-stager
