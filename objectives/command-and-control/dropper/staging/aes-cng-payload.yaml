# AES-CBC Payload Decryption via Windows CNG/BCrypt
# Loader reads encrypted blob from disk, decrypts with AES-CBC via BCrypt API,
# executes in memory via VirtualAlloc + CreateThread.
# Seen in Office DLL sideloading chains (rtc.dll reading cache161.db).
defaults:
  for: [pe]
  platforms: [windows]
  mbc: B0023
  attack: T1140

composite_rules:
  - id: aes-cbc-payload-decrypt
    desc: AES-CBC decryption of staged payload via Windows CNG
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/crypto/symmetric/aes::bcrypt-aes-cbc
      - id: micro-behaviors/fs/file/read::read-file
    unless:
      - id: metadata/binary/metrics::many-exports
      - id: metadata/signed/platform::microsoft

  - id: aes-cng-memory-exec
    desc: AES-CBC decryption then in-memory execution via CNG
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/crypto/symmetric/aes::bcrypt-aes-cbc
      - id: micro-behaviors/fs/file/read::read-file
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/process/thread/create::create-thread
    unless:
      - id: metadata/binary/metrics::many-exports
      - id: metadata/signed/platform::microsoft
