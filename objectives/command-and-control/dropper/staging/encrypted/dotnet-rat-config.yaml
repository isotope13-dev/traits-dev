defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  attack: T1027
traits:
  - id: dotnet-md5-crypto-service
    desc: .NET MD5CryptoServiceProvider use
    crit: component
    conf: 0.88
    if:
      type: text
      substr: MD5CryptoServiceProvider
  - id: dotnet-ecb-mode-config
    desc: .NET ECB mode config
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '(?i)(CipherMode\.ECB|Mode\s*=\s*ECB|KeySize\s*=\s*256|PaddingMode\.Zeros)'
  - id: rat-config-field-set
    desc: RAT config field set
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '(?s)\bHost\b.{0,120}\bPort\b.{0,120}\bMutex\b.{0,120}\b(SPL|InstallName)\b'
  - id: angle-pipe-config-separator
    desc: Angle pipe config separator
    crit: component
    conf: 0.9
    if:
      type: text
      exact: "<|>"
composite_rules:
  - id: dotnet-md5-aes-ecb-rat-config
    desc: .NET AES ECB RAT config decryptor
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/crypto/symmetric/aes::rijndael-managed
      - id: dotnet-md5-crypto-service
      - id: rat-config-field-set
    any:
      - id: dotnet-ecb-mode-config
      - id: angle-pipe-config-separator
    needs: 1
