defaults:
  platforms: [windows]
  for: [javascript]
  attack: T1027
  mbc: B0022

traits:
- id: electron-asar-aes-exe-decrypt
  desc: Electron ASAR decrypts EXE
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '63726561746544656369706865726976.{0,160}6165732d3235362d636263'
- id: electron-asar-temp-exe-write
  desc: Electron writes temp EXE
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'tmpdir.{0,360}2e657865.{0,520}writeFileSync'
- id: electron-asar-hidden-exe-spawn
  desc: Electron spawns hidden EXE
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '737061776e.{0,900}77696e646f777348696465.{0,160}6465746163686564'

composite_rules:
- id: electron-asar-decrypt-drop-execute
  desc: Electron decrypts drops executes EXE
  crit: hostile
  conf: 0.99
  attack: T1105
  all:
  - id: electron-asar-aes-exe-decrypt
  - id: electron-asar-temp-exe-write
  - id: electron-asar-hidden-exe-spawn
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
