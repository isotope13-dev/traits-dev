# ZEROCRYP encrypted overlay dropper detection.
# Detects Rust-based PE loaders that embed an AES-CTR encrypted payload
# in a large appended overlay, separated by the unique "ZEROCRYP" magic
# string followed by MIT License padding for EDR size-limit evasion.
# ATT&CK: T1027 (Obfuscated Files or Information), T1620 (Reflective Code Loading)
# MBC: B0032 (Anti-Static Analysis), B0023 (Dynamic Loading)
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0032

traits:
  - id: zerocryp-overlay-marker
    desc: ZEROCRYP encrypted overlay magic string
    crit: component
    conf: 0.99
    if:
      type: text
      substr: ZEROCRYP

composite_rules:
  - id: zerocryp-encrypted-overlay-dropper
    desc: ZEROCRYP encrypted overlay dropper with AES-CTR loader
    crit: hostile
    conf: 0.97
    all:
      - id: zerocryp-overlay-marker
      - id: metadata/binary/layout::has-overlay
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: micro-behaviors/crypto/symmetric/aes/ctr::rust-aes-crate-path
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
