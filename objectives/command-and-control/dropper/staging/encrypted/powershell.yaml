defaults:
  for: [powershell]
  platforms: [windows]
  attack: T1027
  mbc: C0025
traits:
  - id: aes-create
    desc: .NET AES object creation
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: '[System.Security.Cryptography.Aes]::Create'
  - id: create-decryptor
    desc: AES decryptor creation
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CreateDecryptor
  - id: base64-triple-decode
    desc: Multiple base64 decode calls
    crit: suspicious
    conf: 0.88
    count_min: 3
    if:
      type: text
      substr: FromBase64String
  - id: crypto-stream-write
    desc: CryptoStream write mode
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: CryptoStreamMode]::Write
composite_rules:
  - id: ps-aes-inline-payload
    desc: AES-decrypts embedded payload
    crit: suspicious
    conf: 0.94
    all:
      - id: aes-create
      - id: create-decryptor
      - id: base64-triple-decode
    any:
      - id: crypto-stream-write
      - id: micro-behaviors/fs/write/file::write-all-text
