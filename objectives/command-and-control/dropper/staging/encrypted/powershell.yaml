defaults:
  for: [powershell]
  platforms: [windows]
  attack: T1027
  mbc: C0025
traits:
- id: aes-create
  desc: .NET AES object creation
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: '[System.Security.Cryptography.Aes]::Create'
- id: rijndael-managed-create
  desc: RijndaelManaged decryptor object
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: System.Security.Cryptography.RijndaelManaged
- id: create-decryptor
  desc: AES decryptor creation
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: CreateDecryptor
- id: base64-triple-decode
  desc: Multiple base64 decode calls
  crit: suspicious
  conf: 0.88
  count_min: 3
  if:
    type: text
    substr: FromBase64String
- id: multiple-base64-literals
  desc: Multiple embedded base64 literals
  crit: component
  conf: 0.86
  count_min: 3
  if:
    type: string_literal
    regex: '^[A-Za-z0-9+/]{20,}={0,2}$'
- id: crypto-stream-write
  desc: CryptoStream write mode
  crit: suspicious
  conf: 0.86
  if:
    type: text
    substr: CryptoStreamMode]::Write
- id: crypto-stream-read
  desc: CryptoStream read mode
  crit: suspicious
  conf: 0.86
  if:
    type: text
    substr: CryptoStreamMode]::Read
- id: decrypt-aes-function
  desc: Decrypt-AES helper function
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: '(?i)function\s+Decrypt-AES\b'
- id: decrypt-aes-chunk-accumulator
  desc: Repeated AES chunk accumulation
  crit: suspicious
  conf: 0.94
  count_min: 8
  if:
    type: text
    substr: Decrypt-AES
- id: decrypted-string-join
  desc: Joins decrypted chunks into a final string
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '\[string\]::Join\(\s*''''\s*,\s*\$[A-Za-z_][A-Za-z0-9_]*\s*\)'
- id: iex-finalscript
  desc: Invoke-Expression on reconstructed final script
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'Invoke-Expression\s+\$(final|script|payload|cmd)\w*'
composite_rules:
- id: ps-aes-inline-payload
  desc: AES-decrypts embedded payload
  crit: suspicious
  conf: 0.94
  all:
  - id: create-decryptor
  any:
  - id: base64-triple-decode
  - id: multiple-base64-literals
  - id: aes-create
  - id: rijndael-managed-create
  - id: crypto-stream-write
  - id: crypto-stream-read
  - id: micro-behaviors/fs/write/file/direct::write-all-text
  needs: 2
- id: ps-aes-chunked-stage-loader
  desc: AES-decrypts many embedded chunks and evals the joined script
  crit: hostile
  conf: 0.98
  all:
  - id: ps-aes-inline-payload
  - id: decrypt-aes-function
  - id: decrypt-aes-chunk-accumulator
  - id: decrypted-string-join
  - id: iex-finalscript
- id: ps-document-masquerade-stage-loader
  desc: Document-masqueraded encrypted PowerShell stage loader
  crit: hostile
  conf: 0.98
  all:
  - id: ps-aes-chunked-stage-loader
  - id: objectives/evasion/masquerade/file/double-ext::pdf-double-extension-ps1
