defaults:
  for: [powershell]
  platforms: [windows]
  attack: T1027
  mbc: C0025
traits:
  - id: aes-create
    desc: .NET AES object creation
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: '[System.Security.Cryptography.Aes]::Create'
  - id: create-decryptor
    desc: AES decryptor creation
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CreateDecryptor
  - id: base64-triple-decode
    desc: Multiple base64 decode calls
    crit: suspicious
    conf: 0.88
    count_min: 3
    if:
      type: text
      substr: FromBase64String
  - id: crypto-stream-write
    desc: CryptoStream write mode
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: CryptoStreamMode]::Write
  - id: decrypt-aes-function
    desc: Decrypt-AES helper function
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)function\s+Decrypt-AES\b'
  - id: decrypt-aes-chunk-accumulator
    desc: Repeated AES chunk accumulation
    crit: suspicious
    conf: 0.94
    count_min: 8
    if:
      type: text
      regex: '\$[A-Za-z_][A-Za-z0-9_]*\s*\+=\s*Decrypt-AES\s+"[A-Za-z0-9+/=]{40,}"\s+\$[A-Za-z_][A-Za-z0-9_]*\s+\$[A-Za-z_][A-Za-z0-9_]*'
  - id: decrypted-string-join
    desc: Joins decrypted chunks into a final string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\[string\]::Join\(\s*''''\s*,\s*\$[A-Za-z_][A-Za-z0-9_]*\s*\)'
  - id: iex-finalscript
    desc: Invoke-Expression on reconstructed final script
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'Invoke-Expression\s+\$(final|script|payload|cmd)\w*'
composite_rules:
  - id: ps-aes-inline-payload
    desc: AES-decrypts embedded payload
    crit: suspicious
    conf: 0.94
    all:
      - id: aes-create
      - id: create-decryptor
      - id: base64-triple-decode
    any:
      - id: crypto-stream-write
      - id: micro-behaviors/fs/write/file::write-all-text
  - id: ps-aes-chunked-stage-loader
    desc: AES-decrypts many embedded chunks and evals the joined script
    crit: hostile
    conf: 0.98
    all:
      - id: ps-aes-inline-payload
      - id: decrypt-aes-function
      - id: decrypt-aes-chunk-accumulator
      - id: decrypted-string-join
      - id: iex-finalscript
  - id: ps-document-masquerade-stage-loader
    desc: Document-masqueraded encrypted PowerShell stage loader
    crit: hostile
    conf: 0.98
    all:
      - id: ps-aes-chunked-stage-loader
      - id: objectives/evasion/masquerade/file::pdf-double-extension-ps1
