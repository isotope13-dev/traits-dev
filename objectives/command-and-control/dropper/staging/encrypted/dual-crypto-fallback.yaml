# Dual-implementation crypto fallback: combines the high-level Python
# cryptography library with direct ctypes calls
# into Windows BCrypt CNG (or libcrypto on Unix). This is a useful
# component of stagers, but the native API usage and surrounding payload
# behavior are required before treating it as hostile.
#
# Legitimate code can also use a native fallback, so the atoms below are
# intentionally limited to concrete library/API references.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1027
  mbc: B0032
traits:
  # Try-block importing or using cryptography.hazmat with except branch
  # invoking ctypes-based crypto.
- id: dual-crypto-bcrypt-fallback--rx-2
  desc: cryptography library fallback marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: cryptography
  count_max: 1008895
- id: dual-crypto-bcrypt-fallback--rx-3
  desc: bcrypt fallback marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: bcrypt
  count_max: 1008896
- id: dual-crypto-libcrypto-fallback--rx-6
  desc: ctypes CDLL fallback marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: ctypes.CDLL
  count_max: 1008899
- id: bcrypt-cng-direct-usage--rx-9
  desc: BCrypt OpenAlgorithmProvider entry point
  crit: component
  conf: 0.88
  if:
    type: text
    substr: OpenAlgorithmProvider
  count_max: 1008902
- id: bcrypt-cng-direct-usage--rx-10
  desc: BCrypt GenerateSymmetricKey entry point
  crit: component
  conf: 0.88
  if:
    type: text
    substr: GenerateSymmetricKey
  count_max: 1008903
- id: bcrypt-cng-direct-usage--rx-11
  desc: ctypes loads Windows BCrypt library
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'ctypes\.WinDLL\s*\(\s*["'']bcrypt(\.dll)?["'']'
  count_max: 1008904
  # The bare `Encrypt`, `Decrypt`, and `bcrypt` substrings have been
  # removed: they fired on every crypto-aware Python file in the
  # bundled stdlib (cryptography, smbprotocol, etc.). The
  # remaining atoms target Windows BCrypt CNG API entry points and
  # `ctypes.WinDLL`, which are specific to the ctypes-based fallback
  # this rule is meant to catch.
- id: bcrypt-cng-direct-usage--rx-12
  desc: BCryptEncrypt CNG entry point
  crit: component
  conf: 0.94
  if:
    type: text
    word: BCryptEncrypt
- id: bcrypt-cng-direct-usage--rx-13
  desc: BCryptDecrypt CNG entry point
  crit: component
  conf: 0.94
  if:
    type: text
    word: BCryptDecrypt
- id: bcrypt-cng-direct-usage--rx-14
  desc: ctypes.WinDLL bcrypt load
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'WinDLL\s*\(\s*["'']bcrypt(\.dll)?["'']'
composite_rules:
- id: stager-grade-crypto-stack
  desc: Stager-grade crypto stack (lib + native fallback)
  crit: hostile
  conf: 0.96
  any:
  - id: dual-crypto-bcrypt-fallback
  - id: dual-crypto-libcrypto-fallback
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::python-test-file
    - id: metadata/package/testing/presence/harness/

  # File-level dual-implementation: same module both imports the high-
  # level cryptography library AND uses ctypes BCrypt directly.
  # The try/except wiring may be in a different function from the imports,
  # so this version is laxer than the regex-based fallback above.
- id: dual-crypto-file-level
  desc: Same file uses cryptography lib and ctypes BCrypt
  crit: hostile
  conf: 0.94
  all:
  - id: bcrypt-cng-direct-usage
  - id: micro-behaviors/crypto/symmetric/aes/library::cryptography-aes
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::python-test-file
    - id: metadata/package/testing/presence/harness/
- id: dual-crypto-bcrypt-fallback
  desc: High-level crypto paired with native ctypes BCrypt
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/command-and-control/dropper/staging/encrypted::bcrypt-cng-direct-usage--rx-11
  - id: dual-crypto-bcrypt-fallback--rx-2
  - id: dual-crypto-bcrypt-fallback--rx-3
  near_bytes: 4096
- id: dual-crypto-libcrypto-fallback
  desc: High-level crypto paired with native ctypes libcrypto
  crit: suspicious
  conf: 0.95
  all:
  - id: objectives/command-and-control/dropper/staging/encrypted::dual-crypto-bcrypt-fallback--rx-2
  - id: dual-crypto-libcrypto-fallback--rx-6
  - id: micro-behaviors/dylib/library/ssl::libcrypto-ref
  near_bytes: 4096
- id: bcrypt-cng-direct-usage
  desc: Direct ctypes BCrypt CNG bypass
  crit: suspicious
  conf: 0.88
  any:
  - id: bcrypt-cng-direct-usage--rx-9
  - id: bcrypt-cng-direct-usage--rx-10
  - id: bcrypt-cng-direct-usage--rx-11
  - id: bcrypt-cng-direct-usage--rx-12
  - id: bcrypt-cng-direct-usage--rx-13
  - id: bcrypt-cng-direct-usage--rx-14
