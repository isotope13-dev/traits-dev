defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  attack: T1027
  mbc: C0025
traits:
  - id: decrypt-call-dup
    desc: .decrypt() method call
    crit: component
    conf: 0.65
    if:
      type: symbol
      exact: decrypt
  - id: js-staged-generator
    desc: Generator function yielding eval
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: function\*.{0,50}yield\s+eval\(
composite_rules:
  - id: decryption-methods
    desc: Decryption method calls
    any:
      - id: micro-behaviors/crypto/symmetric/aes/runtime-library::create-decipher-call
      - id: micro-behaviors/crypto/symmetric/aes/runtime-library::createDecipheriv
      - id: objectives/command-and-control/dropper/staging/encrypted::decrypt-call-dup
  - id: code-execution-methods
    desc: Dynamic code execution methods
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/process/interpreter/eval::js-eval-raw
      - id: micro-behaviors/process/interpreter/eval::js-new-function-constructor
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/runtime/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: metadata/library/structure/
  - id: encoded-data
    desc: Encoded data (blobs or buffer decoding)
    any:
      - id: micro-behaviors/data/encode/embedded::large-encoded-blob
      - id: micro-behaviors/data/decode/buffer::buffer-decoding
  - id: js-decrypt-eval
    desc: Decrypts hardcoded payload and executes it
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/crypto/library/provider::crypto-module-import
      - id: decryption-methods
      - id: code-execution-methods
      - id: encoded-data
