defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  attack: T1027
  mbc: C0025
traits:
  - id: dotnet-decryptdata-method
    desc: .NET DecryptData method
    crit: component
    conf: 0.9
    if:
      type: text
      exact: DecryptData
  - id: dotnet-get-exported-types
    desc: .NET exported types enumeration
    crit: component
    conf: 0.84
    if:
      type: text
      exact: GetExportedTypes
  - id: dotnet-injection-persistence-token
    desc: Injection persistence config token
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "%InjectionPersist%"
  - id: dotnet-startup-persistence-token
    desc: Startup persistence config token
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "%StartupPersist%"
  - id: dotnet-loader-host-process-list
    desc: .NET host process target list
    crit: component
    conf: 0.92
    count_min: 3
    if:
      type: text
      regex: 'RegAsm\.exe|InstallUtil\.exe|mscorsvw\.exe|AddInProcess32\.exe'
  - id: dotnet-msbuild-host-token
    desc: MSBuild host process token
    crit: component
    conf: 0.8
    if:
      type: text
      exact: MSBuild.exe
  - id: dotnet-aspnet-host-process-list
    desc: ASP.NET host process list
    crit: component
    conf: 0.86
    count_min: 3
    if:
      type: text
      regex: 'aspnet_(compiler|regiis|state|wp)\.exe'
  - id: dotnet-complus-host-env
    desc: COMPLUS host environment tokens
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: 'COMPLUS_(INSTALLROOT|VERSION)'
composite_rules:
  - id: dotnet-encrypted-reflection-loader
    desc: Encrypted .NET reflection loader
    crit: hostile
    conf: 0.97
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: dotnet-decryptdata-method
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-any
      - id: objectives/anti-static/obfuscation/reflection/invoke::invokemember-token
    any:
      - id: dotnet-get-exported-types
      - id: objectives/anti-static/obfuscation/reflection/invoke::get-methods-call
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-assembly-load
      - id: micro-behaviors/data/encode/base64::dotnet-to-base64string
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/lang/compiler/managed::reflection-emit
  - id: dotnet-injection-persistent-loader-config
    desc: Persistent .NET injection loader config
    crit: hostile
    conf: 0.98
    attack: T1055
    all:
      - id: dotnet-encrypted-reflection-loader
      - id: dotnet-injection-persistence-token
      - id: dotnet-loader-host-process-list
    any:
      - id: dotnet-startup-persistence-token
      - id: dotnet-msbuild-host-token
      - id: dotnet-aspnet-host-process-list
      - id: dotnet-complus-host-env
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
