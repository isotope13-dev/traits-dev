defaults:
  platforms: [windows]
  for: [data]
  attack: T1105
  mbc: B0024

traits:
  - id: powershell-data-culture-derived-key
    desc: PowerShell culture-derived payload key
    crit: suspicious
    conf: 0.92
    attack: T1027
    mbc: B0032
    if:
      type: text
      regex: '(?i)Get-Culture.{0,80}EnglishName|et-Cul.{0,80}ture.{0,160}eN.{0,12}lIsHName'
  - id: powershell-data-http-head-contentlength
    desc: PowerShell ContentLength gate
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?is)(ContentLength.{0,160}\bHEAD\b|\bHEAD\b.{0,160}ContentLength)'
  - id: powershell-data-head-method
    desc: PowerShell HEAD method
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bHEAD\b|[''"]D[''"].{0,16}[''"]HEA[''"]'
  - id: powershell-data-hmacsha1-fragmented
    desc: Fragmented HMACSHA1 reference
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)HMACSHA1|ACSHA1.{0,80}HM|HM.{0,80}ACSHA1'
composite_rules:
  - id: powershell-data-compressed-base64-loader
    desc: PowerShell data compressed Base64 loader
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-data
      - id: micro-behaviors/data/compress/library::powershell-data-deflatestream
  - id: powershell-data-streamreader-decoded-script
    desc: PowerShell data decoded script reader
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/data/compress/library::powershell-data-streamreader-readtoend
      - id: micro-behaviors/data/compress/library::powershell-data-deflate-decompress
  - id: powershell-data-deflate-base64-eval-stager
    desc: PowerShell data Deflate Base64 eval stager
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/string/concat::ps-gv-name-index-invoke-data
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-data
      - id: micro-behaviors/data/compress/library::powershell-data-deflatestream
      - id: micro-behaviors/data/compress/library::powershell-data-compressionmode-decompress
  - id: powershell-data-compressed-script-rehydration
    desc: PowerShell data compressed script rehydration
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-data
      - id: micro-behaviors/data/compress/library::powershell-data-deflate-decompress
      - id: micro-behaviors/data/compress/library::powershell-data-streamreader-readtoend
    any:
      - id: objectives/anti-static/obfuscation/string/concat::ps-gv-name-index-invoke-data
      - id: objectives/anti-static/obfuscation/string/concat::dense-backtick-escapes-data
  - id: powershell-data-obfuscated-compressed-stager
    desc: Obfuscated compressed PowerShell data stager
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-data
      - id: micro-behaviors/data/compress/library::powershell-data-deflatestream
    any:
      - id: objectives/anti-static/obfuscation/string/concat::ps-gv-name-index-invoke-data
      - id: objectives/anti-static/obfuscation/string/concat::dense-format-strings-data
      - id: objectives/anti-static/obfuscation/string/concat::dense-backtick-escapes-data
    needs: 1
  - id: powershell-data-image-decryptor-stager
    desc: PowerShell image decryptor stager
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/steganography/image::powershell-image-lsb-payload-extraction
      - id: micro-behaviors/crypto/symmetric/aes/dotnet-data::create-decryptor
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-obfuscated-data
    any:
      - id: micro-behaviors/crypto/kdf/password::rfc2898derivebytes-data
      - id: powershell-data-hmacsha1-fragmented
      - id: powershell-data-culture-derived-key
  - id: powershell-data-remote-image-keyed-loader
    desc: PowerShell remote image keyed loader
    crit: hostile
    conf: 0.98
    all:
      - id: powershell-data-http-head-contentlength
      - id: powershell-data-head-method
      - id: powershell-data-culture-derived-key
      - id: objectives/anti-static/obfuscation/steganography/image::powershell-getpixel-lsb-nibble
      - id: micro-behaviors/communications/http/client/managed::webrequest-create-data
  - id: powershell-data-pbkdf-aes-image-loader
    desc: PowerShell PBKDF AES image loader
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/steganography/image::powershell-getpixel-lsb-nibble
      - id: micro-behaviors/crypto/kdf/password::rfc2898derivebytes-data
      - id: micro-behaviors/crypto/symmetric/aes/dotnet-data::cbc-mode
      - id: micro-behaviors/crypto/symmetric/aes/dotnet-data::create-decryptor
