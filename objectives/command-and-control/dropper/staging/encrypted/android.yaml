defaults:
  platforms: [android, linux, macos, windows, unix]
  for: [binaries, scripts]
  mbc: B0024
  attack: T1027.002
traits:
  - id: apk-numeric-asset-filename
    desc: APK asset with numeric-only filename
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: "assets/[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]"
  - id: apk-obfuscated-resource-names
    desc: APK resources with obfuscated short names
    crit: component
    conf: 0.85
    count_min: 50
    if:
      type: raw
      regex: "res/[a-zA-Z][a-zA-Z0-9]?\\."
composite_rules:
  - id: apk-encrypted-payload-dropper
    desc: APK with encrypted asset and obfuscated resources
    crit: suspicious
    conf: 0.92
    all:
      - id: apk-numeric-asset-filename
      - id: apk-obfuscated-resource-names
