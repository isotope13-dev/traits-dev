defaults:
  platforms: [android]
  for: [apk, zip]
  mbc: B0024
  attack: T1027.002
traits:
  - id: apk-numeric-asset-filename
    desc: APK asset with numeric-only filename
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^assets/[0-9]{10}"
  - id: apk-obfuscated-resource-names
    desc: "APK rsrcs with dense short obfuscated names"
    crit: component
    conf: 0.9
    count_min: 150
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^res/[0-9A-Za-z_-]{1,3}\\.(xml|png|webp)$"
  - id: apk-obfuscated-ninepatch-names
    desc: 'apk obfuscated ninepatch names'
    crit: component
    conf: 0.9
    count_min: 60
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^res/[0-9A-Za-z_-]{1,3}\\.9\\.png$"
  - id: apk-guid-asset-filenames
    desc: APK ships many GUID-named asset blobs
    crit: suspicious
    conf: 0.94
    count_min: 8
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^assets/asset_[0-9a-f-]{36}\\.dat$"
  - id: apk-large-metadata-dat
    desc: APK bundles a large metadata.dat payload
    crit: suspicious
    conf: 0.9
    size_min: 8000000
    if:
      type: value
      path: "archive.members[*].path"
      exact: assets/metadata.dat
  - id: apk-libsys-core-runtime
    desc: APK includes libsys_core native runtime
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^lib/(arm64-v8a|armeabi-v7a)/libsys_core\\.so$"
  - id: apk-hex-asset-filename
    desc: APK asset has short hex filename
    crit: suspicious
    conf: 0.94
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^assets/[0-9a-f]{8}\\."
  - id: apk-opaque-two-level-asset
    desc: APK opaque two-level asset payload
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^assets/[a-z0-9]{2,48}/[a-z0-9]{5,12}$"
  - id: apk-firebase-messaging-module
    desc: APK bundles firebase messaging module
    crit: component
    conf: 0.86
    if:
      type: value
      path: "archive.members[*].path"
      exact: META-INF/com.google.firebase-firebase-messaging.kotlin_module
  - id: apk-retrofit-module
    desc: APK bundles retrofit networking module
    crit: component
    conf: 0.82
    if:
      type: value
      path: "archive.members[*].path"
      exact: META-INF/retrofit.kotlin_module
  - id: apk-okhttp-publicsuffix-data
    desc: APK bundles OkHttp network client data
    crit: component
    conf: 0.82
    if:
      type: value
      path: "archive.members[*].path"
      exact: okhttp3/internal/publicsuffix/publicsuffixes.gz
  - id: apk-libgdx-native-game-runtime
    desc: APK bundles multi-ABI LibGDX runtime
    crit: component
    conf: 0.88
    count_min: 4
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^lib/(x86|armeabi|armeabi-v7a)/libgdx(-box2d)?\\.so$"
  - id: apk-protobuf-registry-service
    desc: APK bundles protobuf registry service
    crit: component
    conf: 0.82
    if:
      type: value
      path: "archive.members[*].path"
      exact: META-INF/services/com.google.protobuf.GeneratedExtensionRegistryLoader
  - id: apk-libgdx-hmp-level-assets
    desc: APK bundles LibGDX HMP level assets
    crit: component
    conf: 0.86
    count_min: 3
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^assets/(game|level|main)\\.hmp$"
composite_rules:
  - id: apk-obfuscated-resource-pack
    desc: APK resource table uses dense short-name obfuscation
    crit: suspicious
    conf: 0.95
    all:
      - id: apk-obfuscated-resource-names
      - id: apk-obfuscated-ninepatch-names
  - id: apk-guid-asset-stage-bundle
    desc: APK stages payload data in many GUID-named assets
    crit: suspicious
    conf: 0.96
    all:
      - id: apk-guid-asset-filenames
      - id: apk-large-metadata-dat
  - id: apk-encrypted-payload-dropper
    desc: APK stages encrypted payload material behind obfuscated resources
    crit: suspicious
    conf: 0.95
    any:
      - id: apk-numeric-asset-filename
      - id: apk-guid-asset-filenames
    all:
      - id: apk-obfuscated-resource-pack
  - id: apk-encrypted-core-dropper
    desc: APK encrypts core runtime and stages payload blobs behind obfuscated resources
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/anti-static/pack/archive::encrypted-apk-core
      - id: apk-guid-asset-stage-bundle
      - id: apk-obfuscated-resource-pack
      - id: apk-libsys-core-runtime
  - id: apk-firebase-hex-asset-dropper
    desc: APK stages hex asset behind obfuscated resources
    crit: hostile
    conf: 0.99
    all:
      - id: apk-obfuscated-resource-pack
      - id: apk-hex-asset-filename
      - id: apk-firebase-messaging-module
      - id: apk-retrofit-module
  - id: apk-networked-libgdx-game-shell
    desc: APK game shell bundles downloader networking stack
    crit: suspicious
    conf: 0.93
    all:
      - id: apk-libgdx-native-game-runtime
      - id: apk-retrofit-module
      - id: apk-okhttp-publicsuffix-data
  - id: apk-networked-libgdx-protobuf-game-shell
    desc: APK LibGDX game shell bundles protobuf downloader stack
    crit: suspicious
    conf: 0.95
    all:
      - id: apk-networked-libgdx-game-shell
      - id: apk-protobuf-registry-service
      - id: apk-libgdx-hmp-level-assets
