# Hostile composite linking AES/cipher decryption with immediate
# dynamic execution of the decrypted output. This is the canonical
# JavaScript "encrypted payload loader" tradecraft: ship a ciphertext
# in a constant, AES-decrypt it at runtime, then feed it to a
# `new Function(require, decoded)(require)` invocation so the payload
# runs with full Node `require()` capability — even though the package
# itself contains no visible install-hook.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1027.013
  mbc: B0024
composite_rules:
  - id: decrypt-then-new-function-require
    desc: Decrypts a payload then evals via new Function
    crit: hostile
    conf: 0.97
    near_lines: 80
    all:
      - id: micro-behaviors/crypto/symmetric/aes/library::createDecipheriv
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/library/structure::js-large-module-bundle
  - id: package-level-decrypt-eval-loader
    desc: Package decrypts and evals an embedded payload
    crit: hostile
    conf: 0.98
    attack: T1027.013, T1059.007
    for: [javascript, typescript, archives, package.json]
    scope: archive
    all:
      - id: objectives/anti-static/obfuscation/payload/encrypted::hardcoded-key-with-large-blob
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::createDecipheriv
      - id: micro-behaviors/crypto/library/provider::node-memory-hard-kdf
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
