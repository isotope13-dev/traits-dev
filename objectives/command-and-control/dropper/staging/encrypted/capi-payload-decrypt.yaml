defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1140
  mbc: B0023
composite_rules:
  - id: capi-file-payload-decrypt-loader
    desc: CryptoAPI file decryption loader markers
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/crypto/library/provider::crypt-acquire-context
      - id: micro-behaviors/crypto/library/provider::crypt-import-key
      - id: micro-behaviors/crypto/library/provider::crypt-decrypt
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/read::read-file
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/thread/create::create-thread
    downgrade:
      any:
        - id: metadata/binary/installer/family/
        - id: metadata/binary/vendor::is-microsoft-named
        # Endpoint-security vendors legitimately ship CryptoAPI-based
        # signed-payload decrypt loaders (downloaded definition/module files).
        - id: metadata/signed/leaf::nortonlifelock-inc.
        - id: well-known/tool/reverse-engineering/frida/
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/frida/
      # SAP HANA's native client uses CryptoAPI for normal database/TLS
      # support; it is not a staged payload loader.
      - id: well-known/lib/sap-hana/

  - id: capi-inline-pe-memory-loader
    desc: CryptoAPI-decrypted inline PE staged in protected memory
    crit: hostile
    conf: 0.98
    attack: T1140,T1620
    all:
      - id: micro-behaviors/crypto/library/provider::capi-keyed-buffer-crypto-chain
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/data/embedded/payload/header::inline-mz-magic-check
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-walk
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
