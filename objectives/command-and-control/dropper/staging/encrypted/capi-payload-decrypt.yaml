defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1140
  mbc: B0023
composite_rules:
  - id: capi-file-payload-decrypt-loader
    desc: CryptoAPI file decryption loader markers
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/crypto/library/provider::crypt-acquire-context
      - id: micro-behaviors/crypto/library/provider::crypt-import-key
      - id: micro-behaviors/crypto/library/provider::crypt-decrypt
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/read::read-file
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/thread/create::create-thread
    downgrade:
      any:
        - id: metadata/binary/installer/family::known-benign-installer
        - id: metadata/binary/vendor::is-microsoft-named
        # Endpoint-security vendors legitimately ship CryptoAPI-based
        # signed-payload decrypt loaders (downloaded definition/module files).
        - id: metadata/signed/leaf::nortonlifelock-inc.
    unless:
      - id: metadata/signed/platform::microsoft
