defaults:
  platforms: [windows, unix]
  for:
    - python
  mbc: B0024
  attack: T1027.002
traits:
  - id: hardcoded-aes-key
    desc: Hardcoded AES key in base64
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: b64decode\(['"][A-Za-z0-9+/]{43}=['"]\)
  - id: hardcoded-aes-iv
    desc: Hardcoded AES IV in base64
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: b64decode\(['"][A-Za-z0-9+/]{20,24}[=]{0,2}['"]\)
  - id: aes-file-extension
    desc: AES encrypted file reference
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: \\.aes['"]
  - id: decrypt-function-def
    desc: Decrypt function definition
    crit: suspicious
    conf: 0.75
    if:
      type: ast
      kind: function_definition
      regex: ^decrypt$
composite_rules:
  - id: encrypted-loader
    desc: Decrypts and loads code from encrypted file
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/crypto/symmetric/aes/
    any:
      - id: objectives/anti-static/obfuscation/reflection/class::python-zipimporter-load
      - id: micro-behaviors/data/decode/base64::b64decode-string
      - id: micro-behaviors/fs/temp/pyinstaller::pyinstaller-meipass
      - id: hardcoded-aes-key
      - id: aes-file-extension
    needs: 2
  - id: embedded-zlib-base64-exec-loader
    desc: Embedded Python payload decoded with base64 and zlib then exec'd
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: micro-behaviors/data/compress/library::zlib-decompress-dynamic
      - id: micro-behaviors/data/decode/base64::b64decode-string
      - id: micro-behaviors/data/encode/payload::large-base64-string-literals
    any:
      - id: micro-behaviors/process/interpreter/python::dunder-import-call
      - id: objectives/anti-static/obfuscation/reflection/class::python-import-chain
