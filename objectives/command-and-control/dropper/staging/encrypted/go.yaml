defaults:
  platforms: [linux]
  for: [elf]
  attack: T1027.009,T1059
  mbc: B0032,E1059

traits:
  - id: staged-payload-name
    desc: Embedded encrypted payload filename
    crit: component
    conf: 0.98
    if:
      type: text
      exact: payload.enc

composite_rules:
  - id: go-encrypted-embedded-payload
    desc: Go binary embeds encrypted payload
    crit: suspicious
    conf: 0.95
    all:
      - id: staged-payload-name
      - id: metadata/binary/section/content::go-large-noptrdata
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::go-newgcm-error-string
      - id: micro-behaviors/crypto/symmetric/aes/library::go-new-cipher-string

  - id: go-gcm-temp-payload-launcher
    desc: Go temp-file payload launcher
    crit: hostile
    conf: 0.98
    all:
      - id: go-encrypted-embedded-payload
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
    any:
      - id: micro-behaviors/os/env/vars/access::tmpdir-var
      - id: micro-behaviors/fs/temp/mktemp::create-temp-runtime-string
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
    needs: 2
