defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0003

composite_rules:
- id: chacha-bndl-payload-bundle
  desc: ChaCha-encrypted BNDL executable bundle
  crit: suspicious
  conf: 0.96
  size_max: 1048576
  all:
  - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
  - id: micro-behaviors/data/archive/custom::bndl-exe-archive
  - id: metadata/binary/section/metrics::high-entropy-rdata-section
  unless:
  - id: metadata/binary/metrics/structural::many-imports
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/

- id: temp-exe-dropper-launcher
  desc: Writes temp executable then launches
  crit: suspicious
  conf: 0.9
  size_max: 1048576
  all:
  - id: micro-behaviors/data/archive/custom::bndl-exe-archive
  - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
  - id: micro-behaviors/fs/directory/mkdir::create-directory-w
  - id: micro-behaviors/fs/file/write/direct::write-file
  - id: micro-behaviors/process/create/spawn::create-process-w
  any:
  - id: micro-behaviors/time/query::get-tick-count
  - id: micro-behaviors/fs/file/open::file-create-win
  unless:
  - id: metadata/binary/metrics/structural::many-imports
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/

- id: chacha-bndl-temp-exe-dropper
  desc: Encrypted bundle drops and launches executables
  crit: hostile
  conf: 0.98
  attack: T1105
  mbc: B0024
  all:
  - id: chacha-bndl-payload-bundle
  - id: temp-exe-dropper-launcher

- id: chacha-bndl-c2-payload-config
  desc: Encrypted bundle carries C2 endpoints
  crit: suspicious
  conf: 0.94
  attack: T1105
  mbc: B0034
  all:
  - id: chacha-bndl-payload-bundle
  - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-rdata-pair
