defaults:
  platforms: [windows]
  for: [pe, dll, csharp]
  attack: T1027
  mbc: C0025
traits:
- id: dotnet-stringbuilder-append
  desc: .NET StringBuilder Append use
  crit: component
  conf: 0.82
  if:
    type: text
    regex: 'StringBuilder|Append\('
- id: dotnet-hexstring-conversion
  desc: .NET hex string conversion
  crit: component
  conf: 0.86
  if:
    type: text
    regex: 'HexString|FromHexString|Convert\.ToByte'
- id: dotnet-assembly-or-temp-run
  desc: .NET assembly or temp execution
  # Process.Start / Assembly.Load appear in any C# application; this
  # atom only has meaning inside the hostile
  # dotnet-hex-xor-payload-loader composite.
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'Assembly\.Load|EntryPoint\.Invoke|Path\.GetTempPath|Process\.Start'
- id: dotnet-xor-ca-payload-key--0xca
  desc: .NET XOR CA payload key (0xCA)
  crit: component
  conf: 0.78
  if:
    type: text
    word: '0xCA'
- id: dotnet-xor-ca-payload-key--202
  desc: .NET XOR CA payload key (202)
  crit: component
  conf: 0.78
  if:
    type: text
    word: '202'
composite_rules:
- id: dotnet-xor-ca-payload-key
  desc: .NET XOR CA payload key
  crit: component
  conf: 0.78
  unless:
  - id: metadata/lang/compiler/systems::go-buildinfo
  any:
  - id: dotnet-xor-ca-payload-key--0xca
  - id: dotnet-xor-ca-payload-key--202
- id: dotnet-hex-chunk-reassembly
  desc: .NET hex chunk reassembly
  # Hex decoding plus StringBuilder usage is too generic to stand alone as an
  # objective; keep it as a building block for higher-precision loader rules.
  crit: component
  conf: 0.88
  all:
  - id: dotnet-stringbuilder-append
  - id: dotnet-hexstring-conversion
- id: dotnet-hex-xor-payload-loader
  desc: .NET hex XOR payload loader
  crit: suspicious
  conf: 0.9
  attack: T1620
  all:
  - id: metadata/binary/framework::dotnet-assembly
  - id: dotnet-hex-chunk-reassembly
  - id: dotnet-xor-ca-payload-key
  - id: dotnet-assembly-or-temp-run
  any:
  - id: objectives/anti-static/obfuscation/reflection/class::dotnet-assembly-load
  unless:
  - id: well-known/app/subtitleedit/
  - id: micro-behaviors/process/create/spawn::create-process-w
