# RC4 Payload Decryption Pattern
# Loader reads encrypted file from disk, decrypts with RC4, executes in memory.
# SloppyLemming: mscorsvc.dll reads system32.dll, RC4 decrypts via SystemFunction033.
# Generic pattern applicable to many loaders.
defaults:
  for: [pe, dll]
  platforms: [windows]
  mbc: B0023
  attack: T1140
composite_rules:
  - id: rc4-wininet-remote-injector
    desc: RC4 WinInet payload and remote injection
    crit: hostile
    conf: 0.99
    mbc: E1055
    all:
      - id: micro-behaviors/crypto/symmetric/stream::rc4-strings
      - id: micro-behaviors/communications/http/get::wininet-http-flow
      - id: objectives/evasion/process/injection/dll::injection-trinity-text
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: well-known/tool/reverse-engineering/
  - id: rc4-payload-decrypt
    desc: RC4 decryption of staged payload file
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/crypto/symmetric/stream::rc4-bytecode
      - id: micro-behaviors/crypto/symmetric/stream::rc4-symbol-chain
      - id: micro-behaviors/crypto/symmetric/stream::systemfunction033-symbol
    all:
      - id: micro-behaviors/fs/file/
    unless:
      - id: metadata/binary/metrics/structural::many-exports
  - id: systemfunction033-payload-loader
    desc: SystemFunction033 RC4 payload decryption and execution
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/crypto/symmetric/stream::systemfunction033-symbol
      - id: micro-behaviors/mem/alloc/
    any:
      - id: objectives/anti-static/obfuscation/imports::api-hash-resolution
      - id: objectives/anti-static/obfuscation/imports::hash-based-obfuscation
    unless:
      - id: metadata/binary/vendor/
