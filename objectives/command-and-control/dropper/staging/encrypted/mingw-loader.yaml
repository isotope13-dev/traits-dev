# MinGW-compiled dropper with encrypted payload, TLS callbacks,
# and API hashing. These loaders decrypt embedded payloads at runtime
# via RC4 or similar XOR loops, then execute via process hollowing
# or reflective loading. The combination of encryption + anti-analysis
# + injection in a cross-compiled PE is a strong dropper signal.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.007, T1055.012
  mbc: E1105

composite_rules:
  - id: mingw-encrypted-payload-dropper
    desc: MinGW dropper with encrypted payload and injection
    crit: hostile
    conf: 0.95
    size_min: 65536
    all:
      - id: metadata/lang/compiler/native::mingw-built-pe
      - id: micro-behaviors/crypto/symmetric/stream::rc4-xor-loop
      - id: objectives/anti-analysis/debugger-detect/tls::pe-tls-multi-callbacks
    any:
      - id: objectives/evasion/process/injection/hollowing
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
      - id: metadata/binary/metrics/structural::many-exports
      - id: well-known/lib/videolan::vlc-plugin-dll-path
      - id: well-known/lib/videolan::vlc-known-plugin-dll-name

  - id: cross-compiled-encrypted-loader
    desc: Cross-compiled loader with payload encryption and API hashing
    crit: suspicious
    conf: 0.92
    size_min: 65536
    all:
      - id: metadata/lang/compiler/native::mingw-built-pe
      - id: micro-behaviors/crypto/symmetric/stream::rc4-xor-loop
      - id: objectives/anti-static/obfuscation/imports::pe-api-hashing-indicator-single
    any:
      - id: objectives/anti-analysis/debugger-detect/tls::pe-tls-multi-callbacks
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/inject/runtime/call::get-thread-context-dup
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/metrics/structural::many-exports
      - id: well-known/lib/ffmpeg::ffmpeg-lib-marker
      - id: well-known/lib/videolan::vlc-plugin-dll-path
      - id: well-known/lib/videolan::vlc-known-plugin-dll-name
