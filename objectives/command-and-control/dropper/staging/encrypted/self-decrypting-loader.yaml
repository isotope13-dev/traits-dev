# Self-decrypting loader detection for Windows PE binaries.
# Detects the classic Mira-style dropper profile: RWX .text (self-modifying
# decoder), RWX .rsrc (encrypted resource payload), and large encrypted overlay.
# The stub decrypts code in-place and stages a second-stage payload.
# ATT&CK: T1027 (Obfuscated Files or Information)
# MBC: B0023 (Dynamic Loading), B0032 (Anti-Static Analysis)
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027
  mbc: B0023

composite_rules:
  # Self-decrypting loader: RWX .text + encrypted RWX .rsrc + encrypted overlay.
  # Both .text and .rsrc being RWX is a strong W^X violation — legitimate PE
  # binaries never make .text writable, and .rsrc is almost always read-only.
  # Combined with high entropy in .rsrc and a large encrypted overlay, this
  # is the hallmark of a self-decrypting loader/dropper.
  - id: self-decrypting-loader-rwx-text-rsrc-overlay
    desc: Self-decrypting loader with RWX text and encrypted resource section
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/hardening/memory::wx-section
      - id: metadata/binary/resource::executable-rsrc-section
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::binary-encrypted-overlay
    # RWX .text + RWX high-entropy .rsrc + encrypted overlay is essentially
    # unique to self-decrypting loaders and droppers.
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
