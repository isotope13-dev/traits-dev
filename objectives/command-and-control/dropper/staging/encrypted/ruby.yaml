defaults:
  platforms: [unix, windows]
  for: [ruby]
  attack: T1027
  mbc: B0032
traits:
  - id: ruby-zlib-base64-eval-stager
    desc: Ruby zlib Base64 eval stager
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'Base64\.decode64[\s\S]{0,180}Zlib::Inflate\.inflate[\s\S]{0,220}eval\s*\('
composite_rules:
  - id: ruby-compressed-eval-stager
    desc: Ruby compressed eval stager
    crit: hostile
    conf: 0.97
    all:
      - id: ruby-zlib-base64-eval-stager
      - id: objectives/anti-static/obfuscation/payload/encoded::ruby-eval-zlib-base64-decode
