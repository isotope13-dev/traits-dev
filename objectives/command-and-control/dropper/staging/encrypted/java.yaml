defaults:
  platforms: [unix]
  for: [class, jar, zip]
  attack: T1027.009,T1059
  mbc: B0032,E1059

traits:
  - id: java-payload-endpoint
    desc: Java payload retrieval endpoint
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: /payload
  - id: java-xor-decode-method
    desc: Java XOR decode method
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: xorDecode
  - id: java-temp-shell-payload-name
    desc: Java temporary payload prefix
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: payload_
composite_rules:
  - id: java-encrypted-temp-shell-dropper
    desc: Java encrypted temporary shell dropper
    crit: hostile
    conf: 0.99
    all:
      - id: java-payload-endpoint
      - id: java-xor-decode-method
      - id: java-temp-shell-payload-name
      - id: micro-behaviors/fs/write/file/direct::java-owner-execute-permission
      - id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
