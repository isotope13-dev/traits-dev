# A separate delivery signal: the README gives a public-CDN download and
# password-extraction recipe for the encrypted offensive skill archive.
defaults:
  platforms: [unix, windows]
  for: [markdown, html, javascript, json, github-actions, text]
  attack: T1027.013,T1105,T1195.002

composite_rules:
  - id: hack-skills-offensive-archive-delivery
    desc: Public CDN delivers encrypted offensive skill archive
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: well-known/app/yaklang-hack-skills::yaklang-hack-skills-docs
      - id: objectives/evasion/anti-av/content::public-aes-password-archive
      - id: objectives/evasion/anti-av/content::skill-archive-download
      - id: objectives/evasion/anti-av/content::skill-archive-password-extraction
      - id: objectives/evasion/anti-av/content::offensive-agent-skill-corpus
