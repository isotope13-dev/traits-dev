defaults:
  platforms: [linux]
  for: [elf]
  attack: T1027.009,T1105
  crit: suspicious
  conf: 0.9

traits: []

composite_rules:
  - id: go-rodata-elf-payload
    desc: Go embeds ELF binary
    crit: suspicious
    conf: 0.93
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/binary/metrics/size::large-file-1mb
    any:
      # This directory contains only the ELF-header atoms.  Keep the loader
      # breadcrumbs in the parent directory out of this payload signal.
      - id: micro-behaviors/data/embedded/payload/native-elf
    unless:
      - id: micro-behaviors/os/bpf/program/loader::go-ebpf-program-loader
      - id: micro-behaviors/os/bpf/program/loader::libbpfgo-import
      - id: well-known/tool/sysadmin/alpine-packages::alpine-dogstatsd
      - id: well-known/tool/sysadmin/alpine-packages::alpine-datadog-agent

  - id: go-elf-payload-user-persistence
    desc: Go ELF payload persistence
    crit: hostile
    conf: 0.98
    mbc: F0001.006,F0006
    attack: T1027.009,T1543.002,T1547.013
    all:
      - id: go-rodata-elf-payload
      - id: objectives/persistence/system/init/boot::linux-user-systemd
      - id: objectives/persistence/system/init/boot::linux-xdg-executable

  - id: embedded-elf-payload-concealment
    desc: Embedded ELF payload concealment
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/binary/section/metrics::dominant
      - id: metadata/lang/compiler/systems::go-binary
    any:
      - id: micro-behaviors/data/embedded/payload/native-elf
  - id: embedded-rust-peer-control-payload
    desc: Embedded ELF carrying Rust peer-control and persistence logic
    crit: hostile
    conf: 0.97
    near_bytes: 32768
    all:
      - id: objectives/impact/degrade/rival-bot/killer::rust-destructive-control-source-cluster
    any:
      - id: micro-behaviors/data/embedded/payload/native
