defaults:
  platforms: [linux]
  for: [elf]
  attack: T1027.009,T1105
  crit: suspicious
  conf: 0.9

traits: []

composite_rules:
  - id: go-rodata-elf-payload
    desc: Go embeds ELF payload
    crit: suspicious
    conf: 0.93
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: micro-behaviors/data/embedded/payload/native::rodata-embedded-elf
      - id: metadata/binary/metrics/size::large-file-1mb

  - id: go-elf-payload-user-persistence
    desc: Go ELF payload persistence
    crit: hostile
    conf: 0.98
    mbc: F0001.006,F0006
    attack: T1027.009,T1543.002,T1547.013
    all:
      - id: go-rodata-elf-payload
      - id: objectives/persistence/system/init/boot::linux-user-systemd
      - id: objectives/persistence/system/init/boot::linux-xdg-executable

  - id: embedded-elf-payload-concealment
    desc: Embedded ELF payload concealment
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/data/embedded/payload/native::rodata-embedded-elf
      - id: metadata/binary/section/metrics::dominant
      - id: metadata/lang/compiler/systems::go-binary
