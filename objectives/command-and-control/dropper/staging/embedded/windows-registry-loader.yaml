defaults:
  platforms: [windows]
  for: [pe, dll]
  mbc: B0030
  attack: T1027.009
composite_rules:
  - id: resource-loader-admin-registry-network-profile
    desc: Admin PE resource loader with staged registry and network profile
    crit: hostile
    conf: 0.96
    unless:
      - id: metadata/binary/installer::known-benign-installer
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-loader-api-chain
      - id: objectives/anti-static/obfuscation/reflection/class::dynamic-load-pattern
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: micro-behaviors/os/registry/access::registry-transacted-api-chain
      - id: objectives/anti-analysis/timing/evasion::timing-anti-debug
      - id: micro-behaviors/os/privilege/manifest::require-administrator
    any:
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-dup
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
      - id: micro-behaviors/ui/window/station::window-station-query-chain
      - id: micro-behaviors/fs/file/move::move-file-ex
    needs: 2
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/metrics::many-imports
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler::msvc
  - id: resource-loader-admin-registry-evasion-profile
    desc: Admin PE resource loader with registry staging and evasion
    crit: suspicious
    conf: 0.97
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/vendor/microsoft::is-microsoft-named
      - id: metadata/signed/platform::microsoft
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-loader-api-chain
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: micro-behaviors/ui/window/station::window-station-query-chain
    any:
      - id: micro-behaviors/process/thread/create::create-thread
      - id: micro-behaviors/dylib/load::load-library-ex-w
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/os/registry/access::registry-transacted-api-chain
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
    needs: 3
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
