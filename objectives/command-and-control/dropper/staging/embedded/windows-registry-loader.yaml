defaults:
  platforms: [windows]
  for: [pe, dll]
  mbc: B0030
  attack: T1027.009
composite_rules:
  - id: resource-registry-command-cleanup-loader
    desc: Resource loader combines registry, command, anti-debug, and file cleanup
    crit: hostile
    conf: 0.97
    attack: T1027.009,T1112,T1059.003,T1106,T1622
    all:
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: micro-behaviors/process/create/exec::cmd-exe-reference
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
      - id: micro-behaviors/process/create/shell/spawn::win-createprocess
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/fs/file/delete::deletefile-w
    unless:
      - id: metadata/binary/installer/family/

  - id: obfuscated-resource-process-registry-loader
    desc: Resource loader with registry and anti-debug
    crit: hostile
    conf: 0.98
    attack: T1027.009,T1112,T1057,T1622,T1106
    all:
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: micro-behaviors/process/create/shell/spawn::win-createprocess
      - id: objectives/discovery/system/locale::locale-and-environment-profiling
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor::is-microsoft-named
  - id: packed-transacted-registry-stage-loader
    desc: Packed loader with transacted registry staging
    crit: hostile
    conf: 0.97
    attack: T1112,T1027.002
    mbc: B0032
    ref: sha256:194bef1eb8770c78baf6b4fb42b7866943d15c0cb8d96ca9fbed44171ceab307
    all:
      - id: micro-behaviors/os/registry/access::registry-transacted-api-chain
      - id: objectives/anti-static/pack/section-anomaly::virtual-text-rwx-payload-loader
      - id: metadata/binary/section/metrics::hex-suffix-rwx-payload-section
      - id: metadata/binary/section/metrics::pe-entry-in-writable-section
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/installer/family/
  - id: resource-loader-admin-registry-network-profile
    desc: Admin PE resource loader with staged registry and network profile
    crit: hostile
    conf: 0.96
    unless:
      - id: metadata/binary/installer/family/
    all:
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-loader-api-chain
      - id: objectives/anti-static/obfuscation/reflection/class::dynamic-load-pattern
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: micro-behaviors/os/registry/access::registry-transacted-api-chain
      - id: objectives/anti-analysis/timing/evasion::timing-anti-debug
      - id: micro-behaviors/os/privilege/manifest::require-administrator
    any:
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-dup
      - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
      - id: micro-behaviors/ui/window/station::window-station-query-chain
      - id: micro-behaviors/fs/file/move::move-file-ex
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/vendor::is-microsoft-named
        - id: metadata/signed/platform/
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/lang/compiler/native/
  - id: resource-loader-admin-registry-evasion-profile
    desc: Admin PE resource loader with registry staging and evasion
    crit: suspicious
    conf: 0.97
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/binary/vendor::is-microsoft-named
      - id: metadata/signed/platform/
    all:
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-loader-api-chain
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: micro-behaviors/ui/window/station::window-station-query-chain
    any:
      - id: micro-behaviors/process/thread/create::create-thread
      - id: micro-behaviors/dylib/load/runtime::load-library-ex-w
      - id: micro-behaviors/os/module/load::get-proc-address-import
      - id: micro-behaviors/os/registry/access::registry-transacted-api-chain
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-chain
    needs: 3
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports
