# Staging facet of NativeAOT RunPE loaders: the generated GFX0INFO descriptor
# exposes a large high-entropy .gfx blob through EmbeddedData, while the paired
# RunPE/Syscall types identify the blob's in-memory execution path.
defaults:
  for: [pe]
  platforms: [windows]
  attack: T1027.009, T1055.012
  mbc: F0001.006

composite_rules:
  - id: nativeaot-embedded-payload-hollowing-dropper
    desc: NativeAOT dropper stages an opaque payload for RunPE hollowing
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/lang/compiler/aot::nativeaot-runtime-markers
      - id: objectives/anti-static/obfuscation/payload/section::large-high-entropy-gfx-section
      - id: objectives/anti-static/obfuscation/payload/section::nativeaot-gfx-embedded-section-descriptor
      - id: objectives/evasion/process/injection/hollowing::nativeaot-runpe-type-cluster
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
