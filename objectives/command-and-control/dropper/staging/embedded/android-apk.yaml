# Android dropper: source code that drops and silently installs an
# embedded APK via PackageInstaller.Session. Composite combines the
# install-session API surface with the REQUEST_INSTALL_PACKAGES
# permission and a raw-resource APK payload reference.
defaults:
  platforms: [android]
  for: [java, kotlin]
  crit: suspicious
  conf: 0.9
  attack: "T1631"

traits:
  - id: android-raw-resource-apk-loader
    desc: Reads APK payload from res/raw via openRawResource
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: "openRawResource"

  - id: android-install-session-write-apk
    desc: Writes embedded APK into install session
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "session\\.openWrite\\("
composite_rules:
  - id: android-embedded-apk-dropper
    desc: Source drops and silently installs embedded APK
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/package-manager/install::android-silent-apk-install
      - id: android-install-session-write-apk
    any:
      - id: android-raw-resource-apk-loader
      - id: micro-behaviors/os/package-manager/install::android-package-installer-open-session
