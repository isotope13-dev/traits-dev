defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: encrypted-reflective-network-loader
    desc: Encrypted reflective .NET network loader
    crit: hostile
    conf: 0.99
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/resource::dotnet-large-high-entropy-managed-resource
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-create-decryptor
      - id: micro-behaviors/process/interpreter/reflection/runtime::activator
      - id: micro-behaviors/communications/http/client/managed::soap-http-client-protocol
      - id: vb-newlatebinding
    unless:
      - id: well-known/lib/baiqisoft::barcode-control-library-context
      - id: well-known/lib/baiqisoft::barcode-control-package-context
