defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.85
composite_rules:
  - id: pe-resource-temp-stager-persistence-chain
    desc: Resource extraction to temp directory
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
