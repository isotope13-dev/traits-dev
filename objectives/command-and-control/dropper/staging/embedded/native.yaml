defaults:
  platforms: [windows]
  for: [pe]
  crit: notable
  conf: 0.85
traits:
  - id: embedded-io-create-device
    desc: Embedded IoCreateDevice string marker
    crit: component
    conf: 0.95
    if:
      type: text
      exact: IoCreateDevice
  - id: embedded-ioctl-request
    desc: Embedded IoBuildDeviceIoControlRequest marker
    crit: component
    conf: 0.95
    if:
      type: text
      exact: IoBuildDeviceIoControlRequest
  - id: embedded-ntoskrnl
    desc: Embedded ntoskrnl driver string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: ntoskrnl.exe
  - id: embedded-usbd-sys
    desc: Embedded USBD.SYS driver string
    crit: component
    conf: 0.95
    if:
      type: text
      exact: USBD.SYS
composite_rules:
  - id: pe-resource-temp-stager-persistence-chain
    desc: Resource extraction to temp directory
    crit: baseline
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/jetbrains::signed-jetbrains-binary
  - id: dynamic-resource-extraction-dropper
    desc: Dynamically resolved resource extraction with temp staging
    crit: suspicious
    conf: 0.9
    attack: T1027.009
    all:
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: objectives/anti-static/obfuscation/payload/encrypted::dominant-rsrc-section
    any:
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: objectives/anti-static/obfuscation/imports::pe-header-walk
    needs: 1
    downgrade:
      any:
        - id: metadata/binary/installer/script::nsis
        - id: metadata/signed/platform::microsoft
        - id: metadata/signed/developer
        - id: micro-behaviors/fs/temp/py2exe::py2exe-bundle
        - id: metadata/binary/resource::oversized-rsrc
        - id: micro-behaviors/data/embedded/payload::zip-magic-multiple-pe
  - id: embedded-driver-overlay-stage
    desc: Embedded kernel driver staged in overlay
    crit: suspicious
    conf: 0.96
    attack: T1027.009
    all:
      - id: metadata/binary/layout::pe-embedded
      - id: metadata/binary/layout::overlay-over-35pct
      - id: embedded-io-create-device
      - id: embedded-ioctl-request
    any:
      - id: embedded-ntoskrnl
      - id: embedded-usbd-sys
      - id: metadata/package/versioning::version-resource-metadata
      - id: objectives/anti-static/obfuscation/binary-structure::kernel-driver-string
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
        - id: metadata/binary/installer/script::nsis
  - id: embedded-driver-runkey-dropper
    desc: Embedded driver dropper with Run key
    crit: hostile
    conf: 0.99
    attack: T1547.001
    all:
      - id: embedded-driver-overlay-stage
      - id: objectives/persistence/login/startup/registry::run-key-open-set-exec
    any:
      - id: metadata/signed::unsigned-pe-executable
      - id: objectives/evasion/process/injection::notepad-target
      - id: micro-behaviors/fs/file/copy::copyfile-a
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::is-microsoft-named
