defaults:
  platforms: [windows]
  for: [pe, dll]
  crit: notable
  conf: 0.85

composite_rules:
- id: runtime-decrypted-file-process-stager
  desc: Runtime-decrypted payload written to a user-profile path and launched
  crit: hostile
  conf: 0.99
  attack: T1027.009,T1105,T1106,T1140
  all:
    - id: micro-behaviors/crypto/symmetric/xor/loop::x64-mask-xor-buffer-loop
    - id: micro-behaviors/mem/protect/modify::virtual-alloc
    - id: micro-behaviors/fs/shell-ops::shell-get-folder-path-a
    - id: micro-behaviors/os/module/load::get-module-handle-ansi
    - id: micro-behaviors/os/module/load::get-proc-address-import
    - id: micro-behaviors/fs/file/open::createfile-api-text-reference
    - id: micro-behaviors/fs/file/write/direct::writefile-api-text-reference
    - id: micro-behaviors/process/create/launch::create-process-api-name
    - id: micro-behaviors/fs/file/delete::deletefile-a-text
  unless:
    - id: metadata/signed/platform/
    - id: metadata/binary/installer/family/
    - id: metadata/binary/framework/
- id: inno-embedded-process-stager
  desc: Inno embedded process stager
  crit: hostile
  conf: 0.98
  attack: T1027.009,T1105
  all:
  - id: metadata/binary/installer/family::inno-delphi-installer-foundation
  - id: metadata/binary/layout::pe-embedded
  - id: micro-behaviors/process/create/spawn::create-process-w
  any:
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/process/info/thread::resume-thread
  unless:
  - id: metadata/binary/installer/family/
- id: pe-resource-extraction-to-temp
  desc: Extracts an embedded PE resource to a temporary path; common in installers
  crit: component
  conf: 0.9
  attack: T1027.009
  all:
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
  unless:
  - id: metadata/binary/debug::msqry32-pdb-basename
  - id: metadata/binary/metrics/threshold::many-exports-200
  - id: metadata/signed/platform::ip-zinukhov-stanislav-igorevich
  - id: metadata/signed/developer::yandex-llc
  - id: objectives/command-and-control/dropper/execution/inject::geta-oep-banner-marker
- id: embedded-pe-resource-process-stager
  desc: Embedded PE resource staged for process launch
  crit: suspicious
  conf: 0.95
  attack: T1027.009,T1105
  all:
  - id: metadata/binary/layout::pe-embedded
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: micro-behaviors/process/create/spawn::create-process-a
  any:
  - id: objectives/anti-static/obfuscation/payload/encrypted::dominant-rsrc-section
  - id: metadata/binary/layout::pe-multiple-tls-callbacks
  - id: micro-behaviors/os/env/vars/access::temp-var
  needs: 2
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: pushenabledapplication-resource-dropper
  desc: PushEnabledApplication decoy resource dropper
  crit: hostile
  conf: 0.99
  attack: T1036.005,T1027.009,T1105
  all:
  - id: objectives/evasion/masquerade/identity/mimicry::unsigned-pushenabledapplication-masquerade
  - id: metadata/binary/layout::pe-embedded
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: micro-behaviors/process/create/spawn::create-process-a
  any:
  - id: objectives/anti-static/obfuscation/payload/encrypted::dominant-rsrc-section
  - id: metadata/binary/layout::pe-multiple-tls-callbacks
  - id: micro-behaviors/os/env/vars/access::temp-var
  needs: 2
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: pe-resource-openas-temp-exec
  desc: Resource temp stager via OpenAs_RunDLL
  crit: hostile
  conf: 0.96
  all:
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
  - id: micro-behaviors/fs/file/write/direct::write-file
  - id: objectives/execution/lolbin/os::rundll32-openas-execution
  any:
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: micro-behaviors/process/create/exec::shell-execute-a
  downgrade:
    any:
    - id: metadata/signed/platform/
- id: dynamic-resource-extraction-dropper
  desc: Dynamically resolved resource extraction with temp staging
  crit: notable
  conf: 0.9
  attack: T1027.009
  all:
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: objectives/anti-static/obfuscation/payload/encrypted::dominant-rsrc-section
  any:
  - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
  - id: objectives/anti-static/obfuscation/imports::pe-header-walk
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: micro-behaviors/fs/temp/py2exe::py2exe-bundle
    - id: well-known/app/drivers/
    - id: well-known/app/mcafee-epolicy/
  unless:
  - id: metadata/signed/platform::ip-zinukhov-stanislav-igorevich
  - id: metadata/signed/developer::yandex-llc
  - id: objectives/command-and-control/dropper/execution/inject::geta-oep-banner-marker
- id: embedded-pe-hidden-random-stager
  desc: Embedded PE hides random API resolution
  crit: hostile
  conf: 0.97
  attack: T1027.009
  all:
  - id: metadata/binary/layout::pe-embedded
  - id: objectives/anti-static/obfuscation/imports::hidden-advapi32-rtlgenrandom-resolution
  - id: objectives/evasion/masquerade/identity/mimicry::non-microsoft-windowsupdate-path
  any:
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
  - id: metadata/binary/layout::pe-multiple-tls-callbacks
- id: targeted-resource-service-stager
  desc: Host-targeted resource stager with service control
  crit: hostile
  conf: 0.96
  attack: "T1027.009,T1543.003"
  all:
  - id: pe-resource-extraction-to-temp
  - id: micro-behaviors/os/service/control::reconfigure-and-start-service
  - id: micro-behaviors/os/sysinfo/hostname::get-computer-name
  any:
  - id: objectives/anti-analysis/debugger-detect/check::win-debugger-detect
  - id: objectives/anti-static/pack/entropy::high-entropy-rsrc
  - id: objectives/anti-static/obfuscation/payload/section::high-entropy-dot-data-section
  - id: micro-behaviors/fs/temp/directory::get-temp-file-name
  - id: micro-behaviors/process/create/spawn::create-process-w
  needs: 3
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/installer/family/
    - id: well-known/app/protected-benign-pe/
- id: encrypted-resource-module-loader
  desc: Encrypted resource payload resolves loader APIs
  crit: hostile
  conf: 0.96
  attack: T1027.009
  all:
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-rsrc
  - id: micro-behaviors/dylib/load/runtime::load-library-a-string-no-import
  any:
  - id: micro-behaviors/process/enumerate/snapshot::toolhelp-module-enumeration
  - id: micro-behaviors/crypto/symmetric/stream::rc4-xor-loop
  - id: metadata/binary/resource::oversized-rsrc
  - id: micro-behaviors/process/terminate/kill::terminate-process
  needs: 2
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/installer/family/
    - id: well-known/app/protected-benign-pe/
- id: privileged-encrypted-resource-loader
  desc: Admin encrypted resource loader checks sandbox
  crit: hostile
  conf: 0.98
  attack: T1027.009,T1497
  all:
  - id: encrypted-resource-module-loader
  - id: objectives/anti-analysis/environment-detect/runtime::desktop-aware-sandbox-check
  any:
  - id: micro-behaviors/os/privilege/token::shutdown-privilege-name
  - id: metadata/binary/resource::executable-rsrc-section
  needs: 2
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/installer/family/
- id: native-opaque-data-file-process-dropper
  desc: Native loader decodes opaque data, writes files, and launches a process
  crit: hostile
  conf: 0.99
  attack: T1027.009,T1105,T1106
  all:
    - id: metadata/binary/section/metrics::large-high-entropy-writable-data-section
    - id: objectives/anti-static/obfuscation/string/reconstruct::stack-create-process-truncated
    - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    - id: micro-behaviors/mem/protect/modify::virtual-protect
    - id: micro-behaviors/fs/file/open::file-create-win
    - id: micro-behaviors/fs/file/write/direct::write-file
    - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  unless:
    - id: metadata/binary/installer/family/
- id: delphi-crypto-resource-process-stager
  desc: Delphi resource stager combines crypto markers and process launch
  crit: hostile
  conf: 0.98
  attack: T1027.009,T1106,T1134
  all:
  - id: metadata/lang/compiler/managed::delphi
  - id: metadata/binary/layout::overlay-dominates-90pct
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: micro-behaviors/crypto/symmetric/stream::chacha20-keyword
  - id: micro-behaviors/crypto/kdf/algorithm::pbkdf2
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/os/privilege/token::adjust-token-privileges-any
  unless:
  - id: metadata/signed/platform/
  - id: well-known/tool/reverse-engineering/
