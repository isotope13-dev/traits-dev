# PE Resource Dropper - drops embedded payload to system directory
# Detects PE binaries that extract a resource-embedded payload (DLL/EXE)
# to a Windows system directory (System32/SysWOW64)
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1035.003
  mbc: B0023
composite_rules:
- id: pe-resource-system32-dropper
  desc: PE resource extraction with System32 drop
  crit: hostile
  conf: 0.95
  size_min: 40000
  all:
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  - id: micro-behaviors/fs/file/write/direct::write-file
  - id: micro-behaviors/os/sysinfo/directories::get-system-directory
  any:
  - id: micro-behaviors/os/service/host::system32-service-dll-target
  - id: micro-behaviors/fs/path/system::system32-substr
  downgrade:
    any:
    - id: metadata/binary/installer/family/
    - id: metadata/signed/platform/
    - id: metadata/binary/vendor/
    - id: metadata/binary/vendor/
    - id: well-known/app/internet-explorer/
    - id: well-known/tool/sysadmin/sysinternals/
