defaults:
  platforms: [windows]
  for: [batch, powershell, pe]
  attack: T1027,T1112,T1059.001
traits:
- id: hklm-software-guid-key
  desc: HKLM Software GUID registry key
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: '(?i)HKLM\\Software\\\{[0-9A-F]{8}(-[0-9A-F]{4}){3}-[0-9A-F]{12}\}'
- id: registry-powershell-byte-payload--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: Set-ItemProperty
  count_max: 1008471
- id: registry-powershell-byte-payload--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: EncodedCommand
  count_max: 1008472
- id: registry-powershell-byte-payload--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: RegSetValueEx
  count_max: 1008473
- id: registry-powershell-byte-payload--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: REG_BINARY
  count_max: 1008475
- id: registry-powershell-byte-payload--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: '[byte[]]'
  count_max: 1008476
- id: powershell-encoded-command-line
  desc: PowerShell encoded command invocation
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(?i)\bpowershell(\.exe)?\b[^\r\n]{0,180}-(EncodedCommand|enc)\b'
- id: decoded-temp-batch-write
  desc: Decoded PowerShell writes temp batch
  crit: suspicious
  conf: 0.96
  for: [batch, powershell]
  if:
    type: encoded
    regex: '\[IO\.File\]::WriteAllBytes\(\$batch,\s*\[Convert\]::FromBase64String\(\$payload\)\)'
- id: decoded-temp-batch-exec
  desc: Decoded PowerShell executes temp batch
  crit: suspicious
  conf: 0.94
  for: [batch, powershell]
  if:
    type: encoded
    regex: '&\s+\$batch\b'
- id: decoded-stage-self-delete
  desc: Decoded stage removes loader files
  crit: suspicious
  conf: 0.95
  for: [batch, powershell]
  if:
    type: encoded
    regex: 'Remove-Item\s+\$batch\s+-Force[\s\S]{0,180}Remove-Item\s+\$env:UPDATEPATH'
- id: nested-base64-batch-payload
  desc: Nested base64 batch payload
  crit: suspicious
  conf: 0.95
  for: [batch, powershell]
  if:
    type: encoded
    regex: '\$payload\s*=\s*[''"]QGVj[a-zA-Z0-9+/=]{80,}'
- id: cacls-runas-self-elevation
  desc: Batch checks admin with cacls
  crit: suspicious
  conf: 0.94
  for: [batch]
  attack: T1548.002
  if:
    type: text
    regex: '(?is)cacls\.exe.{0,120}config\\system'
- id: batch-has-long-token
  desc: Batch has long encoded token
  crit: component
  conf: 0.9
  for: [batch]
  if:
    type: metrics
    field: text.long_token_count
    min: 1
- id: batch-near-zero-whitespace
  desc: Batch has near-zero whitespace
  crit: component
  conf: 0.86
  for: [batch]
  size_min: 2048
  if:
    type: metrics
    field: text.whitespace_ratio
    max: 0.02
composite_rules:
- id: hklm-guid-powershell-payload
  desc: HKLM GUID key stores PowerShell payload
  crit: hostile
  conf: 0.96
  all:
  - id: hklm-software-guid-key
  - id: registry-powershell-byte-payload
  any:
  - id: micro-behaviors/data/encode/base64::from-base64-string
  - id: micro-behaviors/data/encode/base64::from-base64-string-literal
  - id: powershell-encoded-command-line
- id: registry-powershell-byte-payload
  desc: Registry stores encoded PowerShell bytes
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/process/create/shell/lang::powershell-keyword
  any:
  - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
  - id: registry-powershell-byte-payload--rx-2
  - id: registry-powershell-byte-payload--rx-3
  - id: registry-powershell-byte-payload--rx-4
  - id: registry-powershell-byte-payload--rx-6
  - id: registry-powershell-byte-payload--rx-7
- id: encoded-temp-batch-stage
  desc: Encoded PowerShell writes batch stage
  crit: hostile
  conf: 0.98
  attack: "T1027, T1059.001, T1059.003"
  all:
  - id: powershell-encoded-command-line
  - id: decoded-temp-batch-write
  - id: decoded-temp-batch-exec
- id: nested-base64-batch-loader
  desc: Encoded PowerShell unwraps nested batch
  crit: hostile
  conf: 0.98
  attack: "T1027, T1105, T1059.003"
  all:
  - id: powershell-encoded-command-line
  - id: nested-base64-batch-payload
  - id: decoded-temp-batch-write
- id: elevated-self-deleting-batch-stage
  desc: Elevated batch stage deletes itself
  crit: hostile
  conf: 0.98
  attack: "T1548.002, T1070.004"
  all:
  - id: cacls-runas-self-elevation
  - id: decoded-stage-self-delete
  - id: micro-behaviors/process/create/start-process::batch-start-process-self-arg
  - id: objectives/evasion/anti-av/platform/defender::start-process-runas
- id: encoded-command-metric-stager
  desc: Encoded command with batch metric stager
  crit: hostile
  conf: 0.97
  attack: "T1027, T1059.001, T1059.003"
  all:
  - id: powershell-encoded-command-line
  - id: objectives/anti-static/obfuscation/code-metrics/structure::single-long-line-outlier
  - id: batch-has-long-token
  - id: batch-near-zero-whitespace
