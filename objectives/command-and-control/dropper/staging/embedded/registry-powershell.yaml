defaults:
  platforms: [windows]
  for: [batch, powershell, pe]
  attack: T1027,T1112,T1059.001
traits:
  - id: hklm-software-guid-key
    desc: HKLM Software GUID registry key
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)HKLM\\Software\\\{[0-9A-F]{8}(?:-[0-9A-F]{4}){3}-[0-9A-F]{12}\}'
  - id: registry-powershell-byte-payload
    desc: Registry stores encoded PowerShell bytes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?is)(?:reg(?:\.exe)?\s+add|RegSetValueEx|Set-ItemProperty)[\s\S]{0,260}(?:REG_BINARY|byte\[\]|\[byte\[\]\]|FromBase64String|-EncodedCommand|powershell)'
  - id: powershell-encoded-command-line
    desc: PowerShell encoded command invocation
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bpowershell(?:\.exe)?\b[^\r\n]{0,180}-(?:EncodedCommand|enc)\b'
composite_rules:
  - id: hklm-guid-powershell-payload
    desc: HKLM GUID key stores PowerShell payload
    crit: hostile
    conf: 0.96
    all:
      - id: hklm-software-guid-key
      - id: registry-powershell-byte-payload
    any:
      - id: micro-behaviors/data/encode/base64::from-base64-string
      - id: micro-behaviors/data/encode/base64::from-base64-string-literal
      - id: powershell-encoded-command-line
