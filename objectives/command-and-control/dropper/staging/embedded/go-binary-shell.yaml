defaults:
  platforms: [unix, windows]
  for: [elf, macho, pe]
  attack: T1027.009,T1059.004
  mbc: B0023

composite_rules:
  - id: go-binary-hidden-shell-stage
    desc: Go binary hidden shell stage
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/location::hidden-shell-script-path
      - id: micro-behaviors/process/create/shell/encoded::bin-sh-binary-text
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
      - id: micro-behaviors/fs/file/write/direct::go-binary-write-file-text
      - id: micro-behaviors/fs/chmod/modify::go-binary-chmod-text
      - id: micro-behaviors/process/create/direct::go-binary-combined-output-text
    unless:
      - id: well-known/tool/detection/
