defaults:
  platforms: [linux]
  for: [elf]
  attack: T1027.009,T1105

traits: []

composite_rules:
  - id: static-encrypted-embedded-elf-loader
    desc: Static encrypted embedded ELF loader
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/linking/static::static-linked
      - id: metadata/binary/metrics/structural::single-complex-function
      - id: objectives/anti-static/polyglot/format::appended-elf-binary
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-data-section
    any:
      - id: micro-behaviors/crypto/symmetric/stream::rc4-stack-key-bytecode
      - id: micro-behaviors/os/syscall/raw::x64-raw-syscall-wrapper
      - id: micro-behaviors/os/syscall/raw::x86-int80-wrapper
  - id: rc4-embedded-elf-loader
    desc: RC4 embedded ELF loader
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/polyglot/format::appended-elf-binary
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-data-section
      - id: micro-behaviors/crypto/symmetric/stream::rc4-stack-key-bytecode
    any:
      - id: metadata/binary/linking/static::static-linked
      - id: metadata/binary/metrics/structural::single-complex-function

