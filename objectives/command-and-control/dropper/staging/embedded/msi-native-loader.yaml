# Rugmi / HijackLoader-class dropper delivered as a Windows Installer package.
# The MSI drops a native Delphi/RAD-Studio loader (shipped with its VCL runtime
# packages) together with an encrypted second-stage payload smuggled into the
# File table under a non-installable ".bak"/".dat" extension. Legitimate software
# installers do not ship a multi-megabyte "backup" file as an installed component,
# so the pairing of a native app runtime with a disguised payload blob inside a
# WiX MSI is the loader-in-installer shape — matched by structure, not by this
# build's randomized component names, so repacks are still caught.
defaults:
  for: [all]
  platforms: [windows]
composite_rules:
  - id: msi-delphi-loader-disguised-payload
    desc: MSI drops Delphi loader and disguised payload
    crit: hostile
    conf: 0.9
    mbc: "E1105, F0001"
    attack: "T1105, T1027"
    all:
      - id: metadata/file/profile/identity::msi-format-database-title
      - id: metadata/file/profile/identity::msi-disguised-backup-component
      - id: metadata/file/profile/identity::msi-delphi-runtime-bundle
