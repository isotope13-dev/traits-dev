defaults:
  mbc: B0030
  attack: T1140
  platforms:
    - windows
  for:
    - powershell
    - pe
    - csharp
traits:
  - id: vb-loader-data-resource
    desc: VB loader data.dat resource
    crit: component
    conf: 0.96
    if:
      type: text
      word: data.dat
  - id: vb-loader-lzma-resource
    desc: VB loader lzma.dat resource
    crit: component
    conf: 0.94
    if:
      type: text
      word: lzma.dat
  - id: sevenzip-helper
    desc: SevenZip helper class marker
    crit: component
    conf: 0.94
    if:
      type: text
      word: SevenZipHelper
  - id: sevenzip-lzma-namespace
    desc: SevenZip LZMA namespace marker
    crit: component
    conf: 0.94
    if:
      type: text
      word: SevenZip.Compression.LZMA
  - id: vb-newlatebinding
    desc: VB NewLateBinding dispatch helper
    crit: notable
    conf: 0.92
    if:
      type: text
      word: NewLateBinding
    unless:
      - id: metadata/signed/platform::microsoft
  - id: vb-lateget-token
    desc: VB LateGet dispatch token
    crit: component
    conf: 0.9
    if:
      type: text
      word: LateGet
  - id: resolveeventhandler-token
    desc: ResolveEventHandler delegate token
    crit: component
    conf: 0.88
    if:
      type: text
      word: ResolveEventHandler
  - id: convert-frombase64
    desc: Convert.FromBase64String call
    crit: component
    conf: 0.8
    if:
      type: text
      regex: Convert.{0,10}FromBase64String|\[Convert\]::FromBase64String
  - id: frombase64-long-literal
    desc: Embedded base64 literal decode
    crit: component
    conf: 0.86
    if:
      type: text
      regex: FromBase64String\s*\(\s*['"][A-Za-z0-9+/=]{80,}
  - id: io-file-openwrite
    desc: System.IO.File OpenWrite call
    crit: component
    conf: 0.72
    if:
      type: text
      regex: System\.IO\.File\.OpenWrite|\[System\.IO\.File\]::OpenWrite
  - id: io-file-writeall
    desc: System.IO.File WriteAll call
    crit: component
    conf: 0.72
    if:
      type: text
      regex: System\.IO\.File\.WriteAll(Bytes|Lines|Text)
  - id: io-file-append
    desc: System.IO.File append call
    crit: component
    conf: 0.68
    if:
      type: text
      regex: System\.IO\.File\.Append(All(Lines|Text)?|Text)?
  - id: io-file-create
    desc: System.IO.File create call
    crit: component
    conf: 0.66
    if:
      type: text
      regex: System\.IO\.File\.Create(Text)?
  - id: vbs-file-write
    desc: VBS file path reference
    crit: component
    conf: 0.7
    if:
      type: text
      regex: \.vbs['"]
    not:
      - substr: vm-support.vbs
    unless:
      - id: metadata/signed/developer::vmware
  - id: bat-file-write
    desc: BAT file written to disk
    # A bare .bat path is only meaningful when combined with decode/write
    # behavior in the script-dropper composites below.
    crit: component
    conf: 0.8
    attack: T1059.003
    if:
      type: text
      regex: \.bat['"]|WriteAllBytes.{0,50}\.bat
  - id: ps1-file-write
    desc: PS1 file written to disk
    crit: component
    conf: 0.8
    attack: T1059.001
    if:
      type: text
      regex: '(WriteAllBytes|File\.Write(AllText|AllBytes)).{0,80}\.ps1'
    unless:
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: wixsharp-runtime-dll-path
    desc: WixSharp runtime DLL path
    crit: notable
    conf: 0.96
    if:
      type: path
      substr: WixSharp.dll
composite_rules:
  - id: dotnet-embedded-executable-resource-stager
    desc: .NET encrypted resource stager with hidden command launch
    crit: hostile
    conf: 0.98
    attack: "T1027.009,T1140,T1059.001,T1105"
    mbc: "B0009.014"
    for: [pe]
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/layout::pe-embedded
      - id: metadata/binary/resource::dotnet-large-high-entropy-managed-resource
      - id: micro-behaviors/process/lifecycle/auto-exec::dotnet-module-initializer
      - id: micro-behaviors/data/archive/extract/zip::extract-to-directory
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-create-decryptor
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: micro-behaviors/process/interpreter/reflection/runtime::activator
      - id: micro-behaviors/process/create/hidden::dotnet-create-no-window
      - id: micro-behaviors/process/create/exec::cmd-exe-reference
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/signed/platform::microsoft-corporation
      - id: micro-behaviors/data/embedded/payload/resource::costura-bundle-marker
  - id: io-file-write
    desc: System.IO.File write method
    # Generic file-write APIs are only meaningful here as dropper building
    # blocks; standalone writes are common in benign .NET source.
    crit: component
    conf: 0.7
    any:
      - id: io-file-openwrite
      - id: io-file-writeall
      - id: io-file-append
      - id: io-file-create
  - id: vb-loader-resource-pair
    desc: VB loader data and lzma resources
    crit: component
    conf: 0.96
    all:
      - id: vb-loader-data-resource
      - id: vb-loader-lzma-resource
  - id: sevenzip-helper-lzma
    desc: SevenZip helper LZMA stub
    crit: component
    conf: 0.94
    all:
      - id: sevenzip-helper
      - id: sevenzip-lzma-namespace
  - id: obfuscated-resource-loader
    desc: Obfuscated .NET resource loader
    crit: suspicious
    conf: 0.92
    attack: T1027.009
    all:
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::reflection-method-access
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
    any:
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: convert-frombase64
    downgrade:
      any:
        - id: metadata/lang/compiler/managed/
        - id: metadata/signed/leaf::progress-software-corporation
        - id: well-known/app/windows-desktop-tools::steamtools-member
    unless:
      - id: well-known/app/windows-desktop-tools::steamtools-member
  - id: managed-resource-reflection-loader
    desc: .NET managed resource reflection loader
    crit: suspicious
    conf: 0.94
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
    needs: 3
    any:
      - id: objectives/command-and-control/dropper/execution/loader::dotnet-single-import
      - id: objectives/anti-static/obfuscation/binary-metrics/symbols::dotnet-randomized-symbols
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: micro-behaviors/process/interpreter/reflection/runtime::reflection-method-access
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-activator-createinstance
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-methodinfo-invoke
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/package/versioning::pe-companyname-field
        - id: metadata/binary/debug::pdb-visual-studio
        - id: metadata/signed/platform/
        - id: well-known/app/connectify/
        - id: metadata/signed/leaf::progress-software-corporation
    unless:
      - id: well-known/app/windows-desktop-tools::steamtools-member
  - id: dotnet-surveillance-rat-stage
    desc: .NET surveillance RAT stages a network payload
    crit: hostile
    conf: 0.99
    attack: T1056.001,T1113,T1125,T1105,T1140
    for: [pe]
    all:
      - id: objectives/collection/screenshot/capture::dotnet-multimedia-surveillance-tcp
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
    any:
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: micro-behaviors/communications/http/client/managed::downloaddata
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
  - id: assemblyresolve-resource-stage-loader
    desc: .NET AssemblyResolve resource stage loader
    crit: suspicious
    conf: 0.96
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
    needs: 2
    any:
      - id: metadata/lang/compiler/managed::reflection-namespace
      - id: metadata/lang/compiler/managed::get-method-token
      - id: objectives/anti-static/obfuscation/reflection/invoke::appdomain-currentdomain
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/package/versioning::pe-companyname-field
        - id: metadata/binary/debug::pdb-visual-studio
        - id: metadata/signed/platform/
        - id: well-known/app/connectify/
    unless:
      - id: well-known/app/windows-desktop-tools::steamtools-member
  - id: vbnet-lzma-resource-stage-loader
    desc: VB.NET LZMA resource stage loader
    crit: hostile
    conf: 0.98
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/managed::visual-basic-runtime
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: vb-loader-resource-pair
    needs: 2
    any:
      - id: sevenzip-helper-lzma
      - id: vb-newlatebinding
      - id: metadata/lang/compiler/managed::get-method-token
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: vbnet-split-reflection-stage-loader
    desc: VB.NET split token resource stage loader
    crit: hostile
    conf: 0.99
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/managed::visual-basic-runtime
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: vb-loader-data-resource
      - id: vb-loader-lzma-resource
    any:
      - id: sevenzip-helper
      - id: sevenzip-lzma-namespace
      - id: vb-newlatebinding
      - id: objectives/anti-static/obfuscation/reflection/invoke::vb-latecall-token
      - id: vb-lateget-token
      - id: resolveeventhandler-token
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
    needs: 4
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: vbnet-lzma-latebind-token-cluster
    desc: VB.NET LZMA late bind stage tokens
    crit: hostile
    conf: 0.99
    attack: T1027.009
    all:
      - id: vb-loader-resource-pair
      - id: sevenzip-helper-lzma
      - id: vb-newlatebinding
      - id: objectives/anti-static/obfuscation/reflection/invoke::vb-latecall-token
      - id: vb-lateget-token
      - id: resolveeventhandler-token
      - id: micro-behaviors/process/interpreter/reflection/runtime::create-instance-token
  - id: base64-file-dropper
    desc: Base64 decode and write file
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: frombase64-long-literal
  - id: assemblyresolve-writealltext-dropper
    desc: AssemblyResolve file materializer
    crit: suspicious
    conf: 0.9
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: micro-behaviors/fs/write/file/direct::dotnet-writealltext-token
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/windows-desktop-tools::steamtools-member
      - id: well-known/app/windows-desktop-tools::steamkit2-library
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: well-known/app/sharepoint/
      - id: wixsharp-runtime-dll-path
      - id: well-known/app/connectify/
      - id: well-known/app/windows-desktop-tools::quicklook-release-path
  - id: dotnet-resx-temp-exec-dropper
    desc: .NET RESX temp execution dropper
    crit: hostile
    conf: 0.97
    attack: T1027.009
    all:
      - id: convert-frombase64
      - id: micro-behaviors/data/embedded/payload/resource::resourcemanager-getobject-call
      - id: micro-behaviors/data/embedded/payload/resource::resourcemanager-getresourceset-call
      - id: micro-behaviors/fs/path/temp::get-temp-path-raw
      - id: micro-behaviors/fs/file/write/direct::filestream-create
      - id: micro-behaviors/process/create/spawn::vbnet-latebound-process-start
  - id: csharp-vbs-dropper
    desc: .NET VBScript dropper
    crit: suspicious
    conf: 0.95
    attack: T1059.005
    all:
      - id: base64-file-dropper
      - id: vbs-file-written-to-disk
  - id: vbs-file-written-to-disk
    desc: VBS file written to disk
    crit: component
    conf: 0.85
    attack: T1059.005
    all:
      - id: vbs-file-write
    any:
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: io-file-write
  - id: csharp-script-dropper
    desc: .NET script file dropper
    crit: suspicious
    conf: 0.9
    attack: T1059
    all:
      - id: base64-file-dropper
    any:
      - id: vbs-file-written-to-disk
      - id: bat-file-write
      - id: ps1-file-write
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
        - id: metadata/binary/vendor::microsoft-corp-versioninfo
  # Requires actual embedded-resource access — not just AES + file-write, which
  # every backup/secure-storage/config-encryption app has. Without the resource
  # leg the description's "resource extraction" was unsupported and it fired on
  # any .NET app that encrypts and writes a file.
  - id: dotnet-aes-resource-dropper
    desc: .NET AES resource extraction dropper
    crit: suspicious
    conf: 0.92
    attack: T1027.009
    unless:
      - id: metadata/file/extension/identity::netstandard-dll-basename
    all:
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-embedded-resource-read-any
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-aes-managed
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-create-decryptor
    downgrade:
      any:
        - id: micro-behaviors/ui/help/
        - id: metadata/package/quality/profile/
  - id: dropper-with-cleanup
    desc: .NET dropper with anti-forensics
    crit: hostile
    conf: 0.95
    attack: T1070.004
    all:
      - id: csharp-vbs-dropper
      - id: objectives/evasion/self-delete/file/script::vbs-file-delete
    any:
      - id: micro-behaviors/process/interpreter/powershell/host::sma-namespace
      - id: micro-behaviors/process/interpreter/powershell/host::runspace-factory
  - id: csharp-powershell-vbs-dropper
    desc: .NET PowerShell VBS dropper
    crit: hostile
    conf: 0.95
    attack: T1059.001
    all:
      - id: csharp-vbs-dropper
      - id: micro-behaviors/process/interpreter/powershell/host::sma-namespace
      - id: micro-behaviors/process/interpreter/powershell/host::add-script
  - id: dotnet-reactor-aes-process-dropper
    desc: Reactor-protected AES process dropper
    crit: hostile
    conf: 0.98
    attack: T1027.009,T1105
    all:
      - id: objectives/anti-static/obfuscation/obfuscator/managed::dotnet-reactor-obfuscator
      - id: dotnet-aes-resource-dropper
      - id: micro-behaviors/process/create/launch::create-process-api-name

  - id: dotnet-embedded-payload-process-replacement
    desc: Embedded payload replaces and hides matching process
    crit: hostile
    conf: 0.98
    attack: T1027.009,T1564.003
    mbc: F0006
    for: [pe]
    all:
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-getmanifestresourcestream
      - id: micro-behaviors/process/enumerate/managed::get-processes-by-name
      - id: micro-behaviors/process/terminate/kill::dotnet-kill-member-reference
      - id: micro-behaviors/process/create/launch::create-process-api-name
      - id: micro-behaviors/ui/window/manage/visibility::hide-all-windows-for-process-token
  - id: dotnet-compressed-assemblyresolve-embedded-pe-loader
    desc: .NET compressed encrypted embedded PE stage loader
    crit: hostile
    conf: 0.99
    attack: T1027.009,T1140,T1620
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/layout::pe-embedded
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-managed-resource-access
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: micro-behaviors/crypto/symmetric/3des::triple-des-decrypt-chain
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
      - id: micro-behaviors/process/interpreter/reflection/runtime::activator
