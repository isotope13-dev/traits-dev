defaults:
  mbc: B0030
  attack: T1140
  platforms:
    - windows
  for:
    - powershell
    - pe
    - csharp
traits:
  - id: vb-loader-data-resource
    desc: VB loader data.dat resource
    crit: component
    conf: 0.96
    if:
      type: text
      exact: data.dat
  - id: vb-loader-lzma-resource
    desc: VB loader lzma.dat resource
    crit: component
    conf: 0.94
    if:
      type: text
      exact: lzma.dat
  - id: sevenzip-helper
    desc: SevenZip helper class marker
    crit: component
    conf: 0.94
    if:
      type: text
      exact: SevenZipHelper
  - id: sevenzip-lzma-namespace
    desc: SevenZip LZMA namespace marker
    crit: component
    conf: 0.94
    if:
      type: text
      exact: SevenZip.Compression.LZMA
  - id: vb-newlatebinding
    desc: VB NewLateBinding dispatch helper
    crit: component
    conf: 0.92
    if:
      type: text
      exact: NewLateBinding
  - id: vb-latecall-token
    desc: VB LateCall dispatch token
    crit: component
    conf: 0.9
    if:
      type: text
      exact: LateCall
  - id: vb-lateget-token
    desc: VB LateGet dispatch token
    crit: component
    conf: 0.9
    if:
      type: text
      exact: LateGet
  - id: resolveeventhandler-token
    desc: ResolveEventHandler delegate token
    crit: component
    conf: 0.88
    if:
      type: text
      exact: ResolveEventHandler
  - id: createinstance-token
    desc: CreateInstance activation token
    crit: component
    conf: 0.84
    if:
      type: text
      exact: CreateInstance
  - id: frombase64string
    desc: Base64 string decoding
    crit: component
    conf: 0.75
    if:
      type: text
      substr: FromBase64String
  - id: convert-frombase64
    desc: Convert.FromBase64String call
    crit: component
    conf: 0.8
    if:
      type: text
      regex: Convert.{0,10}FromBase64String|\[Convert\]::FromBase64String
  - id: writeallbytes
    desc: File.WriteAllBytes call
    crit: component
    conf: 0.75
    if:
      type: text
      substr: WriteAllBytes
  - id: io-file-write
    desc: System.IO.File write method
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: System\.IO\.File.{0,20}Write|\[System\.IO\.File\]::Write
  - id: vbs-file-write
    desc: VBS file path reference
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \.vbs['"]
    not:
      - substr: vm-support.vbs
    unless:
      - id: metadata/signed/developer::vmware
  - id: bat-file-write
    desc: BAT file written to disk
    # A bare .bat path is only meaningful when combined with decode/write
    # behavior in the script-dropper composites below.
    crit: component
    conf: 0.8
    attack: T1059.003
    if:
      type: text
      regex: \.bat['"]|WriteAllBytes.{0,50}\.bat
  - id: ps1-file-write
    desc: PS1 file written to disk
    crit: notable
    conf: 0.8
    attack: T1059.001
    if:
      type: text
      regex: \.ps1['"]|WriteAllBytes.{0,50}\.ps1
composite_rules:
  - id: vb-loader-resource-pair
    desc: VB loader data and lzma resources
    crit: component
    conf: 0.96
    all:
      - id: vb-loader-data-resource
      - id: vb-loader-lzma-resource
  - id: sevenzip-helper-lzma
    desc: SevenZip helper LZMA stub
    crit: component
    conf: 0.94
    all:
      - id: sevenzip-helper
      - id: sevenzip-lzma-namespace
  - id: obfuscated-resource-loader
    desc: Obfuscated .NET resource loader
    crit: suspicious
    conf: 0.92
    attack: T1027.009
    all:
      - id: writeallbytes
      - id: objectives/anti-static/obfuscation/reflection/invoke::method-info
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
    any:
      - id: frombase64string
      - id: convert-frombase64
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::reflection-emit
  - id: managed-resource-reflection-loader
    desc: .NET managed resource reflection loader
    crit: suspicious
    conf: 0.94
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
    needs: 2
    any:
      - id: objectives/command-and-control/dropper/execution/loader::dotnet-single-import
      - id: objectives/anti-static/obfuscation/binary-metrics::dotnet-randomized-symbols
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/invoke::method-info
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-activator-createinstance
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-methodinfo-invoke
      - id: micro-behaviors/data/embedded/payload::assemblyresolve-hook
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: assemblyresolve-resource-stage-loader
    desc: .NET AssemblyResolve resource stage loader
    crit: suspicious
    conf: 0.96
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
      - id: micro-behaviors/data/embedded/payload::assemblyresolve-hook
    needs: 2
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::namespace-import
      - id: objectives/anti-static/obfuscation/reflection/invoke::get-method-call
      - id: objectives/anti-static/obfuscation/reflection/invoke::appdomain-currentdomain
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: vbnet-lzma-resource-stage-loader
    desc: VB.NET LZMA resource stage loader
    crit: hostile
    conf: 0.98
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/managed::visual-basic-runtime
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
      - id: micro-behaviors/data/embedded/payload::assemblyresolve-hook
      - id: vb-loader-resource-pair
    needs: 2
    any:
      - id: sevenzip-helper-lzma
      - id: vb-newlatebinding
      - id: objectives/anti-static/obfuscation/reflection/invoke::get-method-call
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: vbnet-split-reflection-stage-loader
    desc: VB.NET split token resource stage loader
    crit: hostile
    conf: 0.99
    attack: T1027.009
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/lang/compiler/managed::visual-basic-runtime
      - id: micro-behaviors/data/embedded/payload::dotnet-managed-resource-access
      - id: micro-behaviors/data/embedded/payload::assemblyresolve-hook
      - id: vb-loader-data-resource
      - id: vb-loader-lzma-resource
    any:
      - id: sevenzip-helper
      - id: sevenzip-lzma-namespace
      - id: vb-newlatebinding
      - id: vb-latecall-token
      - id: vb-lateget-token
      - id: resolveeventhandler-token
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
    needs: 4
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/debug::pdb-visual-studio
  - id: vbnet-lzma-latebind-token-cluster
    desc: VB.NET LZMA late bind stage tokens
    crit: hostile
    conf: 0.99
    attack: T1027.009
    all:
      - id: vb-loader-resource-pair
      - id: sevenzip-helper-lzma
      - id: vb-newlatebinding
      - id: vb-latecall-token
      - id: vb-lateget-token
      - id: resolveeventhandler-token
      - id: createinstance-token
  - id: base64-file-dropper
    desc: Base64 decode and write file
    crit: notable
    conf: 0.9
    all:
      - id: writeallbytes
    any:
      - id: frombase64string
      - id: convert-frombase64
  - id: dotnet-resx-temp-exec-dropper
    desc: .NET RESX temp execution dropper
    crit: hostile
    conf: 0.97
    attack: T1027.009
    all:
      - id: convert-frombase64
      - id: micro-behaviors/data/embedded/payload::resourcemanager-getobject-call
      - id: micro-behaviors/data/embedded/payload::resourcemanager-getresourceset-call
      - id: micro-behaviors/fs/path/temp::get-temp-path-raw
      - id: micro-behaviors/fs/file/write::filestream-create
      - id: micro-behaviors/process/create/spawn::vbnet-latebound-process-start
  - id: csharp-vbs-dropper
    desc: .NET VBScript dropper
    crit: suspicious
    conf: 0.95
    attack: T1059.005
    all:
      - id: base64-file-dropper
      - id: vbs-file-written-to-disk
  - id: vbs-file-written-to-disk
    desc: VBS file written to disk
    crit: suspicious
    conf: 0.85
    attack: T1059.005
    all:
      - id: vbs-file-write
    any:
      - id: writeallbytes
      - id: io-file-write
  - id: csharp-script-dropper
    desc: .NET script file dropper
    crit: suspicious
    conf: 0.9
    attack: T1059
    all:
      - id: base64-file-dropper
    any:
      - id: vbs-file-written-to-disk
      - id: bat-file-write
      - id: ps1-file-write
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - id: metadata/vendor/microsoft::microsoft-corp-versioninfo
  - id: dotnet-aes-resource-dropper
    desc: .NET AES resource extraction dropper
    crit: suspicious
    conf: 0.92
    attack: T1027.009
    all:
      - id: writeallbytes
    any:
      - id: micro-behaviors/crypto/symmetric/aes::dotnet-rijndael
      - id: micro-behaviors/crypto/symmetric/aes::dotnet-aes-managed
      - id: micro-behaviors/crypto/symmetric/aes::dotnet-create-decryptor
    downgrade:
      any:
        - id: metadata/package::has-help
        - id: metadata/package::versioned
  - id: dropper-with-cleanup
    desc: .NET dropper with anti-forensics
    crit: hostile
    conf: 0.95
    attack: T1070.004
    all:
      - id: csharp-vbs-dropper
      - id: objectives/evasion/self-delete/file::vbs-file-delete
    any:
      - id: objectives/command-and-control/backdoor/reflective-load::sma-namespace
      - id: objectives/command-and-control/backdoor/reflective-load::runspace-factory
  - id: csharp-powershell-vbs-dropper
    desc: .NET PowerShell VBS dropper
    crit: hostile
    conf: 0.95
    attack: T1059.001
    all:
      - id: csharp-vbs-dropper
      - id: objectives/command-and-control/backdoor/reflective-load::sma-namespace
      - id: objectives/command-and-control/backdoor/reflective-load::add-script
