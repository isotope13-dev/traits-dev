# Windows Script Host Dropper Composites
# Detects WSH-based dropper patterns including UTF-16 encoded variants
defaults:
  platforms: [windows]
  for: [javascript]
composite_rules:
  - id: wsh-activex-dropper
    desc: WSH dropper via COM and ShellExecute
    crit: hostile
    conf: 0.9
    attack: "T1059.007"
    mbc: "E1243"
    all:
      - id: objectives/execution/activex/com::utf16-wsh-com-objects
      - id: objectives/execution/activex/com::shell-execute-utf16
    any:
      - id: objectives/execution/activex/com::frombase64-utf16
      - id: objectives/execution/activex/com::copyfile-utf16
      - id: micro-behaviors/fs/file/write/staging::users-public-path-utf16

  - id: pe-embedded-wsh-powershell-loader
    desc: Native PE embeds WSH that decodes and executes PowerShell
    crit: hostile
    conf: 0.99
    attack: T1027,T1059.001,T1059.005
    for: [pe, dll]
    all:
      - id: micro-behaviors/os/com/object::wscript-com-progid
      - id: micro-behaviors/process/script/wsh::wsh-powershell-base64-decode
      - id: micro-behaviors/process/script/wsh::wsh-powershell-scriptblock-create
      - id: micro-behaviors/process/script/wsh::wsh-shell-run-hidden

  - id: pe-embedded-wsh-obfuscated-loader
    desc: Native PE embeds an obfuscated WSH command loader
    crit: hostile
    conf: 0.98
    attack: T1027,T1059.005
    for: [pe, dll]
    all:
      - id: micro-behaviors/os/com/object::wscript-com-progid
      - id: micro-behaviors/process/script/wsh::wsh-obfuscated-base64-fragments
      - id: micro-behaviors/process/script/wsh::wsh-powershell-scriptblock-create
      - id: micro-behaviors/process/script/wsh::wsh-shell-run-hidden
