defaults:
  platforms: [windows, unix]
  for: [binaries, c, cpp]
  attack: T1027.009
traits:
- id: lua-wormlet-config--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.96
  count_min: 3
  if:
    type: text
    regex: \b(build_wormlet_table|scm_wormlet_(propagate_system|install|init))\b
- id: lua-wormlet-config--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.96
  count_min: 3
  if:
    type: text
    regex: \b(scm_copy_payload|phase_1_prop_delay)\b
- id: lua-wormlet-config--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.96
  count_min: 3
  if:
    type: text
    regex: \b(ok_to_propagate|no_firewall_check)\b
- id: lua-wormlet-config--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.96
  count_min: 3
  if:
    type: text
    regex: \b(unpropagate)\b
- id: lua-implant-install-config--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: \b(install_implant|implant_installed)\b
- id: lua-implant-install-config--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: \b(implant_internal_name|implant_files)\b
- id: lua-implant-install-config--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: \b(implant_owner|check_implant_reg_values)\b
- id: lua-implant-install-config--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.95
  count_min: 3
  if:
    type: text
    regex: \b(set_implant_reg_values|implant_install_failure_action)\b
- id: service-carrier-storage-record
  desc: Embedded carrier storage record
  crit: suspicious
  conf: 0.9
  for: [pe, dll]
  if:
    type: hex
    section: .rdata
    pattern: "CC 00 00 00 05 00 00 00 66 69 6C 65 00 CD 00 00 00"
composite_rules:
- id: embedded-lua-service-carrier
  desc: Embedded Lua service carrier
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/process/interpreter/lua::embedded-lua-vm
  - id: objectives/persistence/system/service/install::service-install-dispatch-chain
  any:
  - id: lua-wormlet-config
  - id: lua-implant-install-config
  - id: service-carrier-storage-record
  needs: 1
- id: lua-wormlet-implant-carrier
  desc: Lua wormlet implant carrier
  crit: hostile
  conf: 0.98
  all:
  - id: lua-wormlet-config
  - id: lua-implant-install-config
  any:
  - id: micro-behaviors/process/interpreter/lua::embedded-lua-vm
  - id: service-carrier-storage-record
  - id: objectives/persistence/system/service/install::service-install-dispatch-chain
  needs: 1
- id: lua-wormlet-config
  desc: Lua wormlet propagation config
  crit: suspicious
  conf: 0.96
  any:
  - id: lua-wormlet-config--rx-1
  - id: lua-wormlet-config--rx-2
  - id: lua-wormlet-config--rx-3
  - id: lua-wormlet-config--rx-4
  needs: 1
- id: lua-implant-install-config
  desc: Lua implant install config
  crit: suspicious
  conf: 0.95
  any:
  - id: lua-implant-install-config--rx-5
  - id: lua-implant-install-config--rx-6
  - id: lua-implant-install-config--rx-7
  - id: lua-implant-install-config--rx-8
  needs: 1
