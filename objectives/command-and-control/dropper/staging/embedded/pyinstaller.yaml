defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1105"
  mbc: "B0030"

composite_rules:
  - id: pyinstaller-pyarmor-embedded-exe-sidecar
    desc: PyInstaller PyArmor embedded EXE sidecar
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-extraction
      - id: micro-behaviors/fs/temp/pyinstaller::archive-pyarmor-runtime
      - id: micro-behaviors/fs/temp/pyinstaller::archive-embedded-exe-member
      - id: micro-behaviors/fs/temp/pyinstaller::archive-numbered-sidecar-payload-set
  - id: pyinstaller-pyarmor-xor-sidecar-stage
    desc: PyInstaller PyArmor XOR sidecar stage
    crit: hostile
    conf: 0.96
    scope: outer
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-extraction
      - id: micro-behaviors/fs/temp/pyinstaller::archive-pyarmor-runtime
      - id: micro-behaviors/fs/temp/pyinstaller::archive-numbered-sidecar-payload-set
      - id: micro-behaviors/crypto/symmetric/xor/loop::xor-modulo-key-loop
  - id: pyinstaller-pyarmor-bootloader-rar-stage
    desc: PyInstaller PyArmor bootloader RAR stage
    crit: hostile
    conf: 0.97
    scope: outer
    all:
      - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-extraction
      - id: micro-behaviors/fs/temp/pyinstaller::archive-pyarmor-runtime
      - id: micro-behaviors/fs/temp/pyinstaller::archive-embedded-exe-member
      - id: micro-behaviors/fs/temp/pyinstaller::archive-numbered-sidecar-payload-set
      - id: objectives/anti-static/obfuscation/payload/encoded::decoded-pyinstaller-bootloader-rar
