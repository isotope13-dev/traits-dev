defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: endswith-exe
    desc: endsWith .exe check
    crit: suspicious
    conf: 0.6
    attack: T1105
    if:
      type: string_literal
      regex: endsWith\(['"]\.(exe)['"]\)
  - id: endswith-bat
    desc: endsWith .bat check
    crit: suspicious
    conf: 0.6
    attack: T1105
    if:
      type: string_literal
      regex: endsWith\(['"]\.(bat)['"]\)
  - id: endswith-cmd
    desc: endsWith .cmd check
    crit: suspicious
    conf: 0.6
    attack: T1105
    if:
      type: string_literal
      regex: endsWith\(['"]\.(cmd)['"]\)
  - id: endswith-ps1
    desc: endsWith .ps1 check
    crit: suspicious
    conf: 0.6
    attack: T1105
    if:
      type: string_literal
      regex: endsWith\(['"]\.(ps1)['"]\)
  - id: endswith-sh
    desc: endsWith .sh check
    crit: suspicious
    conf: 0.6
    attack: T1105
    if:
      type: string_literal
      regex: endsWith\(['"]\.(sh)['"]\)
  - id: endswith-elf
    desc: endsWith .elf check
    crit: suspicious
    conf: 0.6
    attack: T1105
    if:
      type: string_literal
      regex: endsWith\(['"]\.(elf)['"]\)
  - id: endswith-bin
    desc: endsWith .bin check
    crit: suspicious
    conf: 0.6
    attack: T1105
    if:
      type: string_literal
      regex: endsWith\(['"]\.(bin)['"]\)
  - id: find-exe-pattern
    desc: find() with .exe pattern
    crit: suspicious
    conf: 0.6
    attack: T1105
    if:
      type: string_literal
      regex: find\([^)]{0,120}\.exe
  - id: find-bat-pattern
    desc: find() with .bat pattern
    crit: suspicious
    conf: 0.6
    attack: T1105
    if:
      type: string_literal
      regex: find\([^)]{0,120}\.bat
  - id: find-cmd-pattern
    desc: find() with .cmd pattern
    crit: suspicious
    conf: 0.6
    attack: T1105
    if:
      type: string_literal
      regex: find\([^)]{0,120}\.cmd
  - id: exepath-var
    desc: exePath variable
    crit: suspicious
    conf: 0.5
    if:
      type: string_literal
      word: exePath
  - id: exefile-var
    desc: exeFile variable
    crit: suspicious
    conf: 0.5
    if:
      type: string_literal
      word: exeFile
