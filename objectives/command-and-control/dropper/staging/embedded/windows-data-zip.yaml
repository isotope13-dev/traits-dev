defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009
  mbc: B0032
composite_rules:
  - id: self-reading-data-zip-stager
    desc: Self-reading embedded ZIP payload stager
    crit: hostile
    conf: 0.97
    size_min: 200000
    size_max: 2000000
    all:
      - id: micro-behaviors/data/embedded/payload::zip-locals-in-data-pe
      - id: metadata/binary/layout::overlay-size-256
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-import-chain
    any:
      - id: objectives/anti-static/pack/entropy::high-entropy-data-section
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
      - id: objectives/anti-analysis/debugger-detect/check::win-debugger-detect
      - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/installer::known-benign-installer
