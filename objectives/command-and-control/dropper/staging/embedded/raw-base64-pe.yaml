defaults:
  platforms: [windows]
  # Base64-PE stages hide in script droppers (batch/powershell/vbs), not just
  # plain-text files — `text` alone excluded the batch-typed .cmd loader.
  for: [text, scripts]
  attack: T1027.009
  mbc: B0024
traits:
  - id: brass-audio-dll-asset-path
    desc: Brass audio DLL TypeScript asset path
    crit: component
    conf: 0.98
    for: [javascript, typescript, text]
    if:
      type: path
      regex: 'brassAudio\.dll\.(ts|js)$'

  - id: ooxml-parse-error
    desc: Office document parser error
    crit: component
    conf: 0.9
    for: [data, ooxml]
    if:
      type: metrics
      field: parse.error_count
      min: 1
composite_rules:
  - id: raw-base64-pe-stage-blob
    desc: Raw Base64 encoded PE stage
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/encoded::raw-base64-pe-header
      - id: micro-behaviors/data/encoded::raw-base64-pe-dos-stub
    unless:
      - id: well-known/app/posh-ovirt/
      - id: well-known/tool/development/go-toolchain::go-buildid-testdata-path
      - id: brass-audio-dll-asset-path
  # The dos-stub substr above cannot match LINE-WRAPPED base64 (the stub's base64
  # straddles a CRLF). For wrapped PEs the canonical-prefix header is the anchor;
  # a >=128 KB file carrying it holds a full base64-encoded executable. Catches
  # the Arabic-noise batch loader that embeds a base64 LuaJIT PE.
  - id: raw-base64-pe-stage-blob-wrapped
    desc: Raw Base64 PE stage line-wrapped
    crit: hostile
    conf: 0.97
    size_min: 131072
    all:
      - id: micro-behaviors/data/encoded::raw-base64-pe-header
      - id: metadata/file/metrics::file-has-30-plus-lines
    unless:
      - id: well-known/app/posh-ovirt/
      - id: well-known/tool/development/go-toolchain::go-buildid-testdata-path
      - id: brass-audio-dll-asset-path

  - id: malformed-office-raw-base64-pe-stage
    desc: Raw file carries Base64 PE stage
    crit: hostile
    conf: 0.98
    for: [data, ooxml]
    all:
      - id: micro-behaviors/data/encoded::raw-file-base64-pe-header
      - id: micro-behaviors/data/encoded::raw-file-base64-pe-dos-stub
    any:
      - id: micro-behaviors/data/encoded::raw-file-base64-pe-clr-entry
      - id: ooxml-parse-error
