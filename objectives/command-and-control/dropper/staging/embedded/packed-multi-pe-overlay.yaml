# Packed PE overlays carrying several executable stages.
# This is a staging/dropper shape, not a claim that every self-extracting
# archive is malicious; installer and signed-platform exceptions are retained.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009
  mbc: B0024

composite_rules:
  - id: packed-multi-pe-overlay-stager
    desc: Packed PE overlay carrying multiple executable stages
    crit: hostile
    conf: 0.97
    all:
      - id: metadata/binary/metrics/structural::embedded-pe-three-plus
      - id: metadata/binary/layout::overlay-over-90pct
      - id: objectives/anti-static/pack/detect::aspack-marker
      - id: micro-behaviors/dylib/load/runtime::load-library-a
    unless:
      - id: metadata/binary/installer/sfx/
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform/
