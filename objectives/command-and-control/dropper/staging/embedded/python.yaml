# Python Embedded Payload Dropper
# Detects Python scripts that decode and execute embedded payloads
# ATT&CK: T1059.006 (Python), T1027.009 (Embedded Payloads)
# MBC: E1059 (Command Execution)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  attack: "T1059.006"
  mbc: "E1059"
composite_rules:
  # Base64-decode embedded PE + write to disk + execute
  - id: base64-pe-dropper
    desc: Base64-decoded PE written and executed
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/anti-static/obfuscation/payload/encoded::base64-pe-header
      - id: micro-behaviors/data/decode/base64::b64decode-call
    any:
      - id: micro-behaviors/process/create/launch::os-startfile-call
      - id: micro-behaviors/process/create/subprocess::process-execution
      - id: micro-behaviors/fs/chmod/executable::any
