# .NET Dropper Configuration Patterns
# Detects structured configuration strings used by .NET droppers/loaders
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1027"
traits:
  # Pattern: "filename.exe-=>True-=>False" used by dropper families
  # to configure which components to deploy
  - id: arrow-delimited-config
    desc: Arrow-delimited dropper config pattern
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: '\.exe-=>(?:True|False)'
