defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
composite_rules:
  - id: js-base64-source-carrier
    desc: JavaScript hides code in Base64-like identifiers
    crit: hostile
    conf: 0.98
    attack: T1027.009
    for: [javascript]
    all:
      - id: objectives/anti-static/obfuscation/payload/data-file::javascript-standalone-base64-carrier
      - id: objectives/anti-static/obfuscation/payload/data-file::javascript-base64-like-identifiers

  - id: js-base64-comment-carrier
    desc: JavaScript hides a Base64 carrier as comment text
    crit: hostile
    conf: 0.97
    attack: T1027.009
    for: [javascript]
    all:
      - id: objectives/anti-static/obfuscation/payload/data-file::javascript-standalone-base64-carrier
      - id: micro-behaviors/data/encode/embedded::base64-like-comment-content

  - id: js-base64-opaque-identifier-carrier
    desc: JavaScript hides a carrier behind opaque identifiers
    crit: hostile
    conf: 0.98
    attack: T1027
    for: [javascript]
    all:
      - id: objectives/anti-static/obfuscation/payload/data-file::javascript-standalone-base64-carrier
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::javascript-carrier-high-entropy-identifiers

  - id: js-base64-powershell-delegate-carrier
    desc: JavaScript carries an encoded PowerShell delegate stage
    crit: hostile
    conf: 0.99
    attack: "T1027,T1059.001"
    for: [javascript]
    all:
      - id: objectives/anti-static/obfuscation/payload/data-file::javascript-standalone-base64-carrier
      - id: objectives/anti-static/obfuscation/payload/data-file::encoded-powershell-delegate

  - id: js-reversed-base64-pe-dropper
    desc: JavaScript reversed base64 PE dropper
    crit: hostile
    conf: 0.96
    attack: T1027.013
    for: [javascript]
    all:
      - id: micro-behaviors/data/encode/embedded::reversed-pe-base64-header
      - id: micro-behaviors/data/string/concat::massive-concatenation-chain
  - id: js-reversed-base64-pe-carrier
    desc: JavaScript carries a reversed Base64-encoded PE stage
    crit: hostile
    conf: 0.98
    attack: T1027.009
    for: [javascript]
    all:
      - id: micro-behaviors/data/encode/embedded::reversed-pe-base64-header
      - id: metadata/file/metrics::single-long-line
      - id: micro-behaviors/data/encode/embedded::large-encoded-blob
      - id: micro-behaviors/data/encode/embedded::base64-like-comment-content
  - id: js-bun-dropper
    desc: JavaScript Bun runtime download and execution
    crit: suspicious
    conf: 0.95
    attack: T1105
    for:
      - javascript
    unless:
      - id: metadata/package/quality/false-positives::benign-app-fp-context
      - id: well-known/app/vellum::cli-package-context
    all:
      - id: micro-behaviors/process/create/shell/bridge::js-bun-exec
    any:
      - id: micro-behaviors/os/package-manager/install::bun-installer-url
      - id: micro-behaviors/os/package-manager/install::bun-powershell-piped-installer-command
