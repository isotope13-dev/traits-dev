defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: bun-install-url
    desc: Bun installation URL
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      substr: bun.sh/install
  - id: powershell-bun-install
    desc: PowerShell Bun installation command
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: irm\s+bun\.sh/install\.ps1
composite_rules:
  - id: js-reversed-base64-pe-dropper
    desc: JavaScript reversed base64 PE dropper
    crit: hostile
    conf: 0.96
    attack: T1027.013
    for: [javascript]
    all:
      - id: micro-behaviors/data/encode/embedded::reversed-pe-base64-header
      - id: micro-behaviors/data/encode/skip-step::js-concat-chain
  - id: js-bun-dropper
    desc: JavaScript Bun runtime download and execution
    crit: suspicious
    conf: 0.95
    attack: T1105
    for:
      - javascript
    all:
      - id: micro-behaviors/process/create/shell/bridge::js-bun-exec
    any:
      - id: bun-install-url
      - id: powershell-bun-install
