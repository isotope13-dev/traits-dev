# Bun Dropper - JavaScript
# Detects Bun runtime installation and execution as a dropper mechanism
# ATT&CK: T1105 (Ingress Tool Transfer), T1059 (Command and Scripting Interpreter)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript, powershell, shell]
traits:
  - id: bun-install-url
    desc: Bun installation URL
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: "bun.sh/install"
  - id: powershell-bun-install
    desc: PowerShell Bun installation command
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: 'irm\s+bun\.sh/install\.ps1'
composite_rules:
  - id: js-bun-dropper
    desc: Bun runtime dropper (downloads and runs bun)
    crit: suspicious
    conf: 0.95
    attack: "T1105"
    for: [javascript]
    all:
      - id: micro-behaviors/process/create/shell/lang::js-bun-exec
    any:
      - id: bun-install-url
      - id: micro-behaviors/communications/download/curl::curl-cmd
      - id: micro-behaviors/communications/download/curl::wget-cmd
      - id: objectives/command-and-control/dropper/execution/script::curl-silent-stdout
      - id: powershell-bun-install
