# Multi-stage Dropper
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1105
traits:
  - id: has-high-entropy-regions
    desc: Binary contains high-entropy data regions
    crit: component
    if:
      type: metrics
      field: binary.high_entropy_regions
      min: 1
composite_rules:
  - id: packed-pe-overlay-writable-entry-dropper
    desc: Packed PE embeds many PEs at writable entry
    crit: hostile
    conf: 0.99
    attack: T1027.002,T1027.009,T1105
    all:
      - id: metadata/binary/layout::many-pe-embedded
      - id: metadata/binary/layout::overlay-over-90pct
      - id: metadata/binary/section/metrics::pe-entry-in-writable-section
      - id: objectives/anti-static/pack/detect::aspack-marker
      - id: objectives/anti-static/obfuscation/payload/import::pe-dynamic-resolution
      - id: micro-behaviors/dylib/load/runtime::load-library-a
    unless:
      - id: metadata/binary/installer/family/
      - id: metadata/signed/platform/

  - id: multi-stage-pe-dropper
    desc: Binary contains 3+ embedded PE payloads with high entropy
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/data/embedded/payload/header::pe-magic-embedded-multiple
    any:
      - id: metadata/binary/metrics/threshold::high-overall-entropy-binary
      - id: has-high-entropy-regions
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: well-known/lib/sharpshell::sharpshell-framework
        - id: well-known/app/ipodme/
        - id: well-known/lib/ffmpeg/
        - id: well-known/lib/gpac/
        - id: well-known/app/connectify/
        - id: well-known/app/logitech/
        - id: metadata/binary/metrics/structural::many-imports
