defaults:
  platforms: [windows]
  for: [pe]
  attack: T1027.009
  mbc: B0030
traits:
  - id: temp-exe-config-pair
    desc: Multiple temp EXE dropper configs
    crit: component
    conf: 0.96
    count_min: 2
    if:
      type: text
      regex: '\.exe\|True\|False\|False\|%Temp%\|False\|False\|False'
composite_rules:
  - id: dotnet-gzip-resource-temp-exec
    desc: .NET GZip resource temp execution dropper
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-resource-reader-access
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-split-tokens
      - id: micro-behaviors/fs/path/temp::win-temp-env
      - id: temp-exe-config-pair
    unless:
      - id: metadata/signed/platform::microsoft-windows
