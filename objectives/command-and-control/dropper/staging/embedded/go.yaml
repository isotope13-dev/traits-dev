defaults:
  platforms: [linux]
  for: [go]

traits:
  - id: go-bindata-auto-generated
    desc: go-bindata auto-generated marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "Code generated by go-bindata"

  - id: go-bindata-restore-asset
    desc: go-bindata RestoreAsset method
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "func RestoreAsset("

  - id: go-bindata-restore-assets
    desc: go-bindata RestoreAssets method
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "func RestoreAssets("

  - id: go-bindata-object-file-asset
    desc: Embedded object file asset (.o)
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(/|\b)[a-z0-9_-]+\.o\b'
    unless:
      - id: metadata/package/testing
      - id: well-known/lib/golang-x-tools/

composite_rules:
  - id: go-bindata-dropper-payload
    desc: go-bindata used to drop executable object payloads
    crit: hostile
    conf: 0.95
    attack: "T1027"
    mbc: "E1105"
    all:
      - id: go-bindata-auto-generated
      - id: micro-behaviors/fs/file/write/direct::ioutil-write-file
      - id: go-bindata-object-file-asset
    any:
      - id: go-bindata-restore-asset
      - id: go-bindata-restore-assets
    unless:
      - id: metadata/package/testing
