defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: random-executable-dropper
    desc: Drops random executables in root temp
    crit: hostile
    conf: 0.9
    all:
      - id: micro-behaviors/fs/file/create::random-named-exe-in-root
      - id: micro-behaviors/fs/file/create::random-named-exe-in-temp
  - id: mpress-random-executable-dropper
    desc: MPRESS-packed random executable dropper
    crit: hostile
    conf: 0.97
    all:
      - id: random-executable-dropper
      - id: objectives/anti-static/pack/mpress::mpress-versioned-stub
      - id: objectives/anti-static/pack/mpress::mpress-sparse-dynamic-loader
    any:
      - id: objectives/anti-analysis/sandbox-detect/environment::sandbox-user-profile
      - id: objectives/anti-static/pack/polymorphic::small-encrypted-section
