defaults:
  platforms: [windows]
composite_rules:
  - id: random-executable-dropper
    desc: Drops random executables in root temp
    crit: hostile
    conf: 0.9
    for: [pe]
    all:
      - id: micro-behaviors/fs/file/create::random-named-exe-in-root
      - id: micro-behaviors/fs/file/create::random-named-exe-in-temp
