defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024

traits:
  - id: acrord32info-host
    desc: Adobe AcroRd32Info host marker
    crit: notable
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: AcroRd32Info.exe
  - id: acrord32-dll-ref
    desc: Adobe AcroRd32 DLL reference
    crit: notable
    conf: 0.9
    size_min: 524288
    if:
      type: text
      exact: AcroRd32.dll
  - id: groove-migrator-host
    desc: GrooveMigrator signed host marker
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: GrooveMigrator.exe
  - id: appvlp-host
    desc: App-V appvlp signed host
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: appvlp.exe
  - id: wow-helper-host
    desc: Firefox wow helper host
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: wow_helper.exe
  - id: pack200-host
    desc: Oracle pack200 signed host
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: pack200.exe
  - id: servertool-host
    desc: Oracle servertool signed host
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: servertool.exe
  - id: appv-subsystems-dll
    desc: App-V sideload DLL reference
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: AppVIsvSubsystems32.dll
  - id: adobe-air-dll
    desc: Adobe AIR sideload DLL path
    crit: suspicious
    conf: 0.93
    size_min: 524288
    if:
      type: text
      substr: Adobe AIR.dll
  - id: jli-dll-proxy
    desc: Oracle jli DLL proxy marker
    crit: suspicious
    conf: 0.92
    size_min: 524288
    if:
      type: text
      exact: jli.dll

composite_rules:
  - id: adobe-java-sideload-bundle
    desc: Adobe and Java sideload bundle
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/layout::pe-signature-present
    any:
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::multiple-pe-embedded-loose
      - id: acrord32info-host
      - id: acrord32-dll-ref
      - id: wow-helper-host
      - id: pack200-host
      - id: servertool-host
      - id: jli-dll-proxy
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
    needs: 3
  - id: proxy-host-cluster
    desc: Multiple signed proxy host markers
    crit: suspicious
    conf: 0.98
    any:
      - id: groove-migrator-host
      - id: appvlp-host
      - id: wow-helper-host
      - id: pack200-host
      - id: servertool-host
    needs: 3
  - id: nsis-signed-sideload-bundle
    desc: NSIS signed host sideload bundle
    crit: suspicious
    conf: 0.99
    all:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::overlay-over-90pct
      - id: proxy-host-cluster
    any:
      - id: jli-dll-proxy
      - id: appv-subsystems-dll
      - id: adobe-air-dll
      - id: acrord32-dll-ref
    needs: 1
  - id: nsis-proxy-sideload-loader
    desc: NSIS proxy sideload loader bundle
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/dropper/staging/signed-bundle::nsis-signed-sideload-bundle
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: objectives/persistence/login/startup/registry::runonce-word
    any:
      - id: objectives/evasion/masquerade/identity/fabricated::office-policy-registry
      - id: objectives/persistence/login/startup/registry::currentversion-run
      - id: objectives/persistence/login/registry/autostart::run-once-key
    needs: 1
  - id: sideload-browser-stealer-bundle
    desc: Signed sideload bundle with browser theft residue
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/dropper/staging/signed-bundle::adobe-java-sideload-bundle
      - id: objectives/credential-access/browser/multi-target::embedded-browser-stealer-residue
    any:
      - id: metadata/binary/layout::largest-section-under-8pct
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
      - id: objectives/persistence/login/startup/registry::runonce-word
      - id: objectives/persistence/login/startup/registry::currentversion-run
    needs: 2
