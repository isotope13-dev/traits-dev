defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024

traits:
  - id: acrord32info-host
    desc: Adobe AcroRd32Info host marker
    crit: notable
    conf: 0.94
    size_min: 1048576
    if:
      type: text
      exact: AcroRd32Info.exe
  - id: acrord32-dll-ref
    desc: Adobe AcroRd32 DLL reference
    crit: notable
    conf: 0.9
    size_min: 1048576
    if:
      type: text
      exact: AcroRd32.dll
  - id: jli-dll-proxy
    desc: Oracle jli DLL proxy marker
    crit: suspicious
    conf: 0.92
    size_min: 1048576
    if:
      type: text
      exact: jli.dll

composite_rules:
  - id: adobe-java-sideload-bundle
    desc: Adobe and Java sideload bundle
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/layout::multiple-pe-embedded-loose
      - id: metadata/binary/layout::pe-signature-present
    any:
      - id: acrord32info-host
      - id: acrord32-dll-ref
      - id: jli-dll-proxy
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
    needs: 3
  - id: sideload-browser-stealer-bundle
    desc: Signed sideload bundle with browser theft residue
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/dropper/staging/signed-bundle::adobe-java-sideload-bundle
      - id: objectives/credential-access/browser/multi-target::embedded-browser-stealer-residue
    any:
      - id: metadata/binary/layout::largest-section-under-8pct
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
      - id: objectives/persistence/login/startup/registry::runonce-word
      - id: objectives/persistence/login/startup/registry::currentversion-run
    needs: 2
