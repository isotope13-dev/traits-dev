defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024

traits:
  - id: acrord32info-host
    desc: Adobe AcroRd32Info host marker
    crit: notable
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: AcroRd32Info.exe
  - id: acrord32-dll-ref
    desc: Adobe AcroRd32 DLL reference
    crit: notable
    conf: 0.9
    size_min: 524288
    if:
      type: text
      exact: AcroRd32.dll
  - id: groove-migrator-host
    desc: GrooveMigrator signed host marker
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: GrooveMigrator.exe
  - id: appvlp-host
    desc: App-V appvlp signed host
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: appvlp.exe
  - id: wow-helper-host
    desc: Firefox wow helper host
    crit: component
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: wow_helper.exe
  - id: pack200-host
    desc: Oracle pack200 signed host
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: pack200.exe
  - id: servertool-host
    desc: Oracle servertool signed host
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: servertool.exe
  - id: appv-subsystems-dll
    desc: App-V sideload DLL reference
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: AppVIsvSubsystems32.dll
    unless:
      - id: objectives/evasion/masquerade/binary::multi-vendor-goodware-appendage
  - id: mozilla-webapprt-host
    desc: Mozilla WebAppRT host marker
    crit: component
    conf: 0.96
    size_min: 524288
    if:
      type: text
      exact: webapprt-stub.exe
      section: .rdata
  - id: adobe-logtransport2-host
    desc: Adobe LogTransport2 host marker
    crit: component
    conf: 0.96
    size_min: 524288
    if:
      type: text
      exact: LogTransport2.exe
      section: .rsrc
  - id: adobe-usage-registry-key
    desc: Adobe usage registry key
    crit: component
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: Software\Adobe\CommonFiles\Usage
  - id: adobe-apip-policy-key
    desc: Adobe APIP policy key
    crit: component
    conf: 0.95
    size_min: 524288
    if:
      type: text
      substr: SOFTWARE\Policies\Adobe\APIP
  - id: adobe-hllog-config
    desc: Adobe HLLog config marker
    crit: component
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: HLLog.config
  - id: adobe-air-dll
    desc: Adobe AIR sideload DLL path
    crit: suspicious
    conf: 0.93
    size_min: 524288
    if:
      type: text
      substr: Adobe AIR.dll
  - id: jli-dll-proxy
    desc: Oracle jli DLL proxy marker
    crit: component
    conf: 0.92
    size_min: 524288
    if:
      type: text
      exact: jli.dll
  - id: mozilla-maintenance-service-key
    desc: Mozilla Maintenance Service key
    crit: notable
    conf: 0.93
    size_min: 524288
    if:
      type: text
      exact: Software\\Mozilla\\MaintenanceService
  - id: mozilla-maintenance-uninstall-key
    desc: Mozilla Maintenance uninstall key
    crit: notable
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\MozillaMaintenanceService
  - id: mozilla-crashreporter-host
    desc: Mozilla crashreporter host marker
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: crashreporter.exe
  - id: mozilla-crash-reporter-key
    desc: Mozilla Crash Reporter key
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: Software\\Mozilla\\Crash Reporter
  - id: spider-solitaire-host
    desc: Spider Solitaire host marker
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: spidersolitaire.exe
  - id: spades-cmnclim-dll
    desc: Spades CmnCliM DLL marker
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: CmnCliM.dll
  - id: active-setup-ie-clsid
    desc: IE Active Setup component key
    crit: notable
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: Software\Microsoft\Active Setup\Installed Components\{89820200-ECBD-11CF-8B85-00AA005B4383}
    unless:
      - id: metadata/vendor/microsoft::internet-explorer-frame-component
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::microsoft-corp-marker
  - id: sevenzip-shell-clsid
    desc: 7-Zip shell extension CLSID
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: CLSID\{23170F69-40C1-278A-1000-000100020000}
    unless:
      - id: metadata/binary/installer/sfx::7zip-sfx-installer
  - id: lync99-host-mutex
    desc: Lync99 host mutex marker
    crit: suspicious
    conf: 0.96
    size_min: 524288
    if:
      type: text
      exact: Lync99GlobalMutex
  - id: adobe-acrobat-updater-stage-claim
    desc: Adobe Acrobat updater stage claim
    crit: component
    conf: 0.95
    size_min: 1000000
    size_max: 2500000
    if:
      type: text
      exact: Adobe Acrobat Updater
  - id: windows-error-reporter-stage-claim
    desc: Windows Error Reporter stage claim
    crit: component
    conf: 0.94
    size_min: 1000000
    size_max: 2500000
    if:
      type: text
      exact: name="Microsoft.Windows.ErrorReporter"
  - id: dw20-error-reporting-stage
    desc: DW20 error reporting stage name
    crit: component
    conf: 0.93
    size_min: 1000000
    size_max: 2500000
    if:
      type: text
      exact: DW20.Exe
  - id: embedded-hook-api-stage
    desc: Embedded stage Windows hook API
    crit: component
    conf: 0.92
    size_min: 1000000
    size_max: 2500000
    if:
      type: text
      exact: SetWindowsHookExW
  - id: embedded-remote-thread-stage
    desc: Embedded stage remote thread API
    crit: component
    conf: 0.92
    size_min: 1000000
    size_max: 2500000
    if:
      type: text
      exact: CreateRemoteThread
  - id: media-center-extensibility-host
    desc: Media Center extensibility host marker
    crit: component
    conf: 0.94
    size_min: 2500000
    size_max: 4000000
    if:
      type: text
      exact: ehExtHost.exe
  - id: mahjong-titans-stage-decoy
    desc: Mahjong Titans embedded stage decoy
    crit: component
    conf: 0.94
    size_min: 2500000
    size_max: 4000000
    if:
      type: text
      substr: Mahjong Titans
  - id: adobe-logtransport-user-agent
    desc: Adobe LogTransport User-Agent
    crit: component
    conf: 0.95
    size_min: 2500000
    size_max: 4000000
    if:
      type: text
      exact: "User-Agent: Adobe Log Transport"
  - id: embedded-stage-keyboard-hook
    desc: Embedded stage keyboard hook API
    crit: component
    conf: 0.94
    size_min: 2500000
    size_max: 4000000
    if:
      type: text
      exact: SetWindowsHookExW
  - id: embedded-stage-screen-capture
    desc: Embedded stage screen capture APIs
    crit: component
    conf: 0.94
    size_min: 2500000
    size_max: 4000000
    if:
      type: text
      exact: CreateDIBSection

composite_rules:
  - id: signed-autoit-spyware-stage-bundle
    desc: Signed AutoIt spyware stage bundle
    crit: hostile
    conf: 0.997
    size_min: 1000000
    size_max: 2500000
    all:
      - id: metadata/signed/developer::autoit-consulting-ltd
      - id: metadata/lang/compiled::autoit-syntax-checker-runtime
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: micro-behaviors/communications/http/get::wininet-dynamic-load
      - id: objectives/persistence/login/startup/registry::software-run-key
    any:
      - id: adobe-acrobat-updater-stage-claim
      - id: windows-error-reporter-stage-claim
      - id: dw20-error-reporting-stage
      - id: embedded-hook-api-stage
      - id: embedded-remote-thread-stage
      - id: objectives/command-and-control/dropper/execution/inject::office-help-watson-url
    needs: 4
  - id: adobe-java-sideload-bundle
    desc: Adobe and Java sideload bundle
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/layout::pe-signature-present
    any:
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::multiple-pe-embedded-loose
      - id: acrord32info-host
      - id: acrord32-dll-ref
      - id: wow-helper-host
      - id: pack200-host
      - id: servertool-host
      - id: jli-dll-proxy
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
    needs: 3
  - id: proxy-host-cluster
    desc: Multiple signed proxy host markers
    crit: suspicious
    conf: 0.98
    any:
      - id: groove-migrator-host
      - id: appvlp-host
      - id: wow-helper-host
      - id: pack200-host
      - id: servertool-host
    needs: 3
  - id: mozilla-spades-decoy-cluster
    desc: Mozilla and Spades decoy host cluster
    crit: suspicious
    conf: 0.99
    any:
      - id: mozilla-crashreporter-host
      - id: mozilla-crash-reporter-key
      - id: spider-solitaire-host
      - id: spades-cmnclim-dll
    needs: 3
  - id: nsis-signed-sideload-bundle
    desc: NSIS signed host sideload bundle
    crit: suspicious
    conf: 0.99
    all:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::overlay-over-90pct
      - id: proxy-host-cluster
    any:
      - id: jli-dll-proxy
      - id: appv-subsystems-dll
      - id: adobe-air-dll
      - id: acrord32-dll-ref
    needs: 1
  - id: adobe-logtransport-amadey-loader
    desc: Adobe LogTransport Amadey loader bundle
    crit: hostile
    conf: 0.997
    all:
      - id: metadata/vendor/adobe::adobe-systems-inc-marker
      - id: adobe-logtransport2-host
      - id: adobe-usage-registry-key
      - id: adobe-apip-policy-key
      - id: micro-behaviors/communications/ip::external-ipv4-port-binary-literal
    any:
      - id: adobe-hllog-config
      - id: micro-behaviors/communications/http/get::wininet-http-flow
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-w
      - id: metadata/binary/layout::overlay-dominates-third
    needs: 3
  - id: nsis-proxy-sideload-loader
    desc: NSIS proxy sideload loader bundle
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/dropper/staging/signed-bundle::nsis-signed-sideload-bundle
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: objectives/persistence/login/startup/registry::runonce-word
    any:
      - id: objectives/evasion/masquerade/identity/fabricated::office-policy-registry
      - id: objectives/persistence/login/startup/registry::currentversion-run
      - id: objectives/persistence/login/registry/autostart::run-once-key
    needs: 1
  - id: nsis-office-maintenance-sideload-bundle
    desc: NSIS Office maintenance sideload bundle
    crit: hostile
    conf: 0.996
    all:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::overlay-over-35pct
      - id: objectives/command-and-control/dropper::office-click2run-sideload-target
    any:
      - id: active-setup-ie-clsid
      - id: sevenzip-shell-clsid
      - id: mozilla-maintenance-service-key
      - id: mozilla-maintenance-uninstall-key
    needs: 3
  - id: nsis-lync99-maintenance-sideload-bundle
    desc: NSIS Lync99 maintenance sideload bundle
    crit: hostile
    conf: 0.995
    all:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::overlay-over-35pct
      - id: objectives/command-and-control/dropper::office-click2run-mso-sideload-ref
      - id: lync99-host-mutex
    any:
      - id: active-setup-ie-clsid
      - id: sevenzip-shell-clsid
      - id: mozilla-maintenance-service-key
      - id: mozilla-maintenance-uninstall-key
      - id: micro-behaviors/os/privilege/manifest::require-administrator
    needs: 1
  - id: sideload-browser-stealer-bundle
    desc: Signed sideload bundle with browser theft residue
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/dropper/staging/signed-bundle::adobe-java-sideload-bundle
      - id: objectives/credential-access/browser/multi-target::embedded-browser-stealer-residue
    any:
      - id: metadata/binary/layout::largest-section-under-8pct
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
      - id: objectives/persistence/login/startup/registry::runonce-word
      - id: objectives/persistence/login/startup/registry::currentversion-run
    needs: 2
  - id: wix-burn-mozilla-spades-loader
    desc: WiX Burn bundle with Mozilla and Spades decoys
    crit: hostile
    conf: 0.997
    all:
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
      - id: mozilla-crashreporter-host
      - id: spider-solitaire-host
      - id: metadata/binary/layout::overlay-dominates-third
    any:
      - id: mozilla-crash-reporter-key
      - id: spades-cmnclim-dll
      - id: objectives/command-and-control/dropper/staging/signed-bundle::mozilla-spades-decoy-cluster
    needs: 1
  - id: active-setup-7zip-stage-bundle
    desc: Active Setup 7-Zip staged sideload bundle
    crit: hostile
    conf: 0.994
    all:
      - id: active-setup-ie-clsid
      - id: sevenzip-shell-clsid
      - id: metadata/binary/layout::pe-embedded
    any:
      - id: metadata/binary/layout::overlay-dominates-third
      - id: metadata/package/tooling::tool-identity-7zip
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: metadata/signed/platform::microsoft
    needs: 2
  - id: active-setup-7zip-dump-stage
    desc: Active Setup 7-Zip dump-capable stage
    crit: hostile
    conf: 0.997
    all:
      - id: objectives/command-and-control/dropper/staging/signed-bundle::active-setup-7zip-stage-bundle
      - id: objectives/credential-access/dump/process::minidump-write-dump
    any:
      - id: objectives/execution/interpreter/scripting/host::winhttp-string
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-symbol
      - id: micro-behaviors/process/terminate/kill::toolhelp-kill-loop-source
    needs: 1
  - id: office-appv-matryoshka-loader
    desc: Office App-V sideload matryoshka loader
    crit: hostile
    conf: 0.996
    all:
      - id: appv-subsystems-dll
      - id: objectives/command-and-control/dropper::office-click2run-c2r-section
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: micro-behaviors/communications/http/get::wininet-dynamic-load
      - id: micro-behaviors/os/service/control::reconfigure-and-start-service
    any:
      - id: objectives/persistence/login/startup/registry::software-run-key
      - id: objectives/persistence/system/registry/com-hijack::inprocserver32-write
      - id: objectives/persistence/login/startup/registry::create-shortcut
      - id: objectives/evasion/masquerade/identity/fabricated::office-policy-registry
    needs: 2
  - id: media-center-appv-surveillance-loader
    desc: Media Center App-V surveillance loader
    crit: hostile
    conf: 0.997
    size_min: 2500000
    size_max: 4000000
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::overlay-over-90pct
      - id: appv-subsystems-dll
      - id: micro-behaviors/communications/http/get::wininet-dynamic-load
    any:
      - id: objectives/command-and-control/dropper/execution/inject::office-protocolhandler-pdb
      - id: embedded-stage-keyboard-hook
      - id: embedded-stage-screen-capture
      - id: adobe-logtransport-user-agent
      - id: micro-behaviors/os/service/control::reconfigure-and-start-service
      - id: objectives/anti-analysis/timing/evasion::ui-timer-keypoll-gate
      - id: objectives/evasion/masquerade/identity/fabricated::office-policy-registry
      - id: media-center-extensibility-host
      - id: mahjong-titans-stage-decoy
    needs: 5
  - id: mozilla-appv-com-inject-loader
    desc: Mozilla App-V COM injection loader
    crit: hostile
    conf: 0.998
    size_min: 2500000
    size_max: 4500000
    all:
      - id: appv-subsystems-dll
      - id: objectives/persistence/system/registry/com-hijack::inprocserver32-write
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
      - id: micro-behaviors/process/inject/runtime::write-process-memory-dup
    any:
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/signed/developer::mozilla-corporation
      - id: metadata/binary/layout::pe-checksum-mismatch
      - id: mozilla-webapprt-host
      - id: micro-behaviors/communications/http/get::wininet-dynamic-load
      - id: objectives/persistence/login/registry/run-key::masquerade-trusted-installer
      - id: objectives/evasion/process/injection/memory::process-inject-api
      - id: objectives/anti-analysis/timing/evasion::ui-timer-keypoll-gate
      - id: objectives/privilege-escalation/token-manipulation::dynamic-token-privilege-chain
    needs: 4
