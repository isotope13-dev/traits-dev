defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024

traits:
  - id: acrord32info-host
    desc: Adobe AcroRd32Info host marker
    crit: notable
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: AcroRd32Info.exe
  - id: acrord32-dll-ref
    desc: Adobe AcroRd32 DLL reference
    crit: notable
    conf: 0.9
    size_min: 524288
    if:
      type: text
      exact: AcroRd32.dll
  - id: groove-migrator-host
    desc: GrooveMigrator signed host marker
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: GrooveMigrator.exe
  - id: appvlp-host
    desc: App-V appvlp signed host
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: appvlp.exe
  - id: wow-helper-host
    desc: Firefox wow helper host
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: wow_helper.exe
  - id: pack200-host
    desc: Oracle pack200 signed host
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: pack200.exe
  - id: servertool-host
    desc: Oracle servertool signed host
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: servertool.exe
  - id: appv-subsystems-dll
    desc: App-V sideload DLL reference
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: AppVIsvSubsystems32.dll
  - id: adobe-air-dll
    desc: Adobe AIR sideload DLL path
    crit: suspicious
    conf: 0.93
    size_min: 524288
    if:
      type: text
      substr: Adobe AIR.dll
  - id: jli-dll-proxy
    desc: Oracle jli DLL proxy marker
    crit: suspicious
    conf: 0.92
    size_min: 524288
    if:
      type: text
      exact: jli.dll
  - id: mozilla-maintenance-service-key
    desc: Mozilla Maintenance Service key
    crit: notable
    conf: 0.93
    size_min: 524288
    if:
      type: text
      exact: Software\\Mozilla\\MaintenanceService
  - id: mozilla-maintenance-uninstall-key
    desc: Mozilla Maintenance uninstall key
    crit: notable
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\MozillaMaintenanceService
  - id: mozilla-crashreporter-host
    desc: Mozilla crashreporter host marker
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: crashreporter.exe
  - id: mozilla-crash-reporter-key
    desc: Mozilla Crash Reporter key
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: Software\\Mozilla\\Crash Reporter
  - id: spider-solitaire-host
    desc: Spider Solitaire host marker
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: spidersolitaire.exe
  - id: spades-cmnclim-dll
    desc: Spades CmnCliM DLL marker
    crit: suspicious
    conf: 0.94
    size_min: 524288
    if:
      type: text
      exact: CmnCliM.dll
  - id: active-setup-ie-clsid
    desc: IE Active Setup component key
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: Software\\Microsoft\\Active Setup\\Installed Components\\{89820200-ECBD-11CF-8B85-00AA005B4383}
  - id: sevenzip-shell-clsid
    desc: 7-Zip shell extension CLSID
    crit: suspicious
    conf: 0.95
    size_min: 524288
    if:
      type: text
      exact: CLSID\\{23170F69-40C1-278A-1000-000100020000}
  - id: lync99-host-mutex
    desc: Lync99 host mutex marker
    crit: suspicious
    conf: 0.96
    size_min: 524288
    if:
      type: text
      exact: Lync99GlobalMutex

composite_rules:
  - id: adobe-java-sideload-bundle
    desc: Adobe and Java sideload bundle
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/binary/layout::pe-signature-present
    any:
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::multiple-pe-embedded-loose
      - id: acrord32info-host
      - id: acrord32-dll-ref
      - id: wow-helper-host
      - id: pack200-host
      - id: servertool-host
      - id: jli-dll-proxy
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
    needs: 3
  - id: proxy-host-cluster
    desc: Multiple signed proxy host markers
    crit: suspicious
    conf: 0.98
    any:
      - id: groove-migrator-host
      - id: appvlp-host
      - id: wow-helper-host
      - id: pack200-host
      - id: servertool-host
    needs: 3
  - id: mozilla-spades-decoy-cluster
    desc: Mozilla and Spades decoy host cluster
    crit: suspicious
    conf: 0.99
    any:
      - id: mozilla-crashreporter-host
      - id: mozilla-crash-reporter-key
      - id: spider-solitaire-host
      - id: spades-cmnclim-dll
    needs: 3
  - id: nsis-signed-sideload-bundle
    desc: NSIS signed host sideload bundle
    crit: suspicious
    conf: 0.99
    all:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::overlay-over-90pct
      - id: proxy-host-cluster
    any:
      - id: jli-dll-proxy
      - id: appv-subsystems-dll
      - id: adobe-air-dll
      - id: acrord32-dll-ref
    needs: 1
  - id: nsis-proxy-sideload-loader
    desc: NSIS proxy sideload loader bundle
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/dropper/staging/signed-bundle::nsis-signed-sideload-bundle
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: objectives/persistence/login/startup/registry::runonce-word
    any:
      - id: objectives/evasion/masquerade/identity/fabricated::office-policy-registry
      - id: objectives/persistence/login/startup/registry::currentversion-run
      - id: objectives/persistence/login/registry/autostart::run-once-key
    needs: 1
  - id: nsis-office-maintenance-sideload-bundle
    desc: NSIS Office maintenance sideload bundle
    crit: hostile
    conf: 0.996
    all:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::overlay-over-35pct
      - id: objectives/command-and-control/dropper::office-click2run-sideload-target
    any:
      - id: active-setup-ie-clsid
      - id: sevenzip-shell-clsid
      - id: mozilla-maintenance-service-key
      - id: mozilla-maintenance-uninstall-key
    needs: 3
  - id: nsis-lync99-maintenance-sideload-bundle
    desc: NSIS Lync99 maintenance sideload bundle
    crit: hostile
    conf: 0.995
    all:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::overlay-over-35pct
      - id: objectives/command-and-control/dropper::office-click2run-mso-sideload-ref
      - id: lync99-host-mutex
    any:
      - id: active-setup-ie-clsid
      - id: sevenzip-shell-clsid
      - id: mozilla-maintenance-service-key
      - id: mozilla-maintenance-uninstall-key
      - id: micro-behaviors/os/privilege/manifest::require-administrator
    needs: 1
  - id: sideload-browser-stealer-bundle
    desc: Signed sideload bundle with browser theft residue
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/command-and-control/dropper/staging/signed-bundle::adobe-java-sideload-bundle
      - id: objectives/credential-access/browser/multi-target::embedded-browser-stealer-residue
    any:
      - id: metadata/binary/layout::largest-section-under-8pct
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
      - id: objectives/persistence/login/startup/registry::runonce-word
      - id: objectives/persistence/login/startup/registry::currentversion-run
    needs: 2
  - id: wix-burn-mozilla-spades-loader
    desc: WiX Burn bundle with Mozilla and Spades decoys
    crit: hostile
    conf: 0.997
    all:
      - id: metadata/binary/installer/database::wix-burn-bootstrapper
      - id: mozilla-crashreporter-host
      - id: spider-solitaire-host
      - id: metadata/binary/layout::overlay-dominates-third
    any:
      - id: mozilla-crash-reporter-key
      - id: spades-cmnclim-dll
      - id: objectives/command-and-control/dropper/staging/signed-bundle::mozilla-spades-decoy-cluster
    needs: 1
  - id: active-setup-7zip-stage-bundle
    desc: Active Setup 7-Zip staged sideload bundle
    crit: hostile
    conf: 0.994
    all:
      - id: active-setup-ie-clsid
      - id: sevenzip-shell-clsid
      - id: metadata/binary/layout::pe-embedded
    any:
      - id: metadata/binary/layout::overlay-dominates-third
      - id: metadata/package/tooling::tool-identity-7zip
      - id: micro-behaviors/os/privilege/manifest::require-administrator
      - id: metadata/signed/platform::microsoft
    needs: 2
