defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: registry-write-text
    desc: Registry write API text references
    crit: component
    conf: 0.92
    size_min: 400000
    size_max: 800000
    if:
      type: text
      exact: RegSetValueExW
      section: .rdata
  - id: get-temp-path-w-import
    desc: GetTempPathW import
    crit: component
    size_min: 500000
    size_max: 700000
    if:
      type: symbol
      kind: import
      exact: GetTempPathW
  - id: move-file-ex-w-import
    desc: MoveFileExW import
    crit: component
    size_min: 500000
    size_max: 700000
    if:
      type: symbol
      kind: import
      exact: MoveFileExW
  - id: wnet-add-connection-2-w-import
    desc: WNetAddConnection2W import
    crit: component
    size_min: 1000000
    size_max: 1200000
    if:
      type: symbol
      kind: import
      exact: WNetAddConnection2W
  - id: net-share-get-info-import
    desc: NetShareGetInfo import
    crit: component
    size_min: 1000000
    size_max: 1200000
    if:
      type: symbol
      kind: import
      exact: NetShareGetInfo
  - id: internet-connect-a-import
    desc: InternetConnectA import
    crit: component
    size_min: 1000000
    size_max: 1200000
    if:
      type: symbol
      kind: import
      exact: InternetConnectA
  - id: internet-open-a-import
    desc: InternetOpenA import
    crit: component
    size_min: 1000000
    size_max: 1200000
    if:
      type: symbol
      kind: import
      exact: InternetOpenA
  - id: get-computer-name-a-import
    desc: GetComputerNameA import
    crit: component
    size_min: 2600000
    size_max: 2900000
    if:
      type: symbol
      kind: import
      exact: GetComputerNameA
  - id: create-service-w-import
    desc: CreateServiceW import
    crit: component
    size_min: 2600000
    size_max: 2900000
    if:
      type: symbol
      kind: import
      exact: CreateServiceW
  - id: ping-handoff-argument
    desc: Ping cleanup handoff argument
    crit: component
    conf: 0.94
    size_min: 2600000
    size_max: 2900000
    if:
      type: text
      exact: --ping
      section: .rdata
  - id: resource-heavy-helper-layout
    desc: Resource-heavy helper executable layout
    crit: component
    conf: 0.98
    size_min: 2600000
    size_max: 2900000
    if:
      type: metrics
      field: pe.rsrc_size
      min: 2200000
      max: 2500000
  - id: offeradw-ui-token
    desc: OfferAdw installer UI token
    crit: component
    conf: 0.96
    size_min: 300000
    size_max: 900000
    if:
      type: text
      exact: OfferAdw
composite_rules:
  - id: resource-temp-import-cluster
    desc: Resource temp loader imports
    crit: suspicious
    conf: 0.98
    size_min: 500000
    size_max: 700000
    all:
      - id: micro-behaviors/data/embedded/payload::find-resource-w
      - id: micro-behaviors/data/embedded/payload::load-resource
      - id: get-temp-path-w-import
    any:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/fs/temp/directory::get-temp-file-name
      - id: micro-behaviors/data/embedded/payload::find-resource-ex-w
      - id: move-file-ex-w-import
    needs: 2
    unless:
      - id: metadata/binary/metrics::many-imports-100
      - id: well-known/lib/wine::wine-runtime-component
  - id: share-temp-exec-import-cluster
    desc: Network share execution imports
    crit: suspicious
    conf: 0.98
    size_min: 1000000
    size_max: 1200000
    all:
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: wnet-add-connection-2-w-import
      - id: net-share-get-info-import
    any:
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-w
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: internet-connect-a-import
      - id: internet-open-a-import
    needs: 2
    unless:
      - id: metadata/binary/metrics::many-imports-100
  - id: resource-service-imports
    desc: Resource service staging imports
    crit: suspicious
    conf: 0.995
    size_min: 2600000
    size_max: 2900000
    all:
      - id: get-computer-name-a-import
      - id: micro-behaviors/fs/temp/directory::get-temp-file-name
      - id: micro-behaviors/process/create/spawn::create-process-w
    any:
      - id: micro-behaviors/data/embedded/payload::find-resource-w
      - id: micro-behaviors/data/embedded/payload::load-resource
      - id: micro-behaviors/process/inject/runtime::read-process-memory
      - id: create-service-w-import
      - id: micro-behaviors/os/privilege/token::adjust-token-privileges
    needs: 3
    unless:
      - id: metadata/binary/metrics::many-imports-100
