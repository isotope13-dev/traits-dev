defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1140
  mbc: B0023
composite_rules:
  - id: capi-file-payload-decrypt-loader
    desc: CryptoAPI file payload decrypt loader
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/crypto/library::crypt-acquire-context
      - id: micro-behaviors/crypto/library::crypt-import-key
      - id: micro-behaviors/crypto/library::crypt-decrypt
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/read::read-file
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/process/thread/create::create-thread
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/installer::known-benign-installer
        - id: metadata/vendor/microsoft::is-microsoft-named
