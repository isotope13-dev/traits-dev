defaults:
  platforms:
    - windows
  for:
    - javascript
    - powershell
traits:
  - id: public-folder-short-random
    desc: Short random filename in C:\Users\Public
    crit: suspicious
    conf: 0.8
    attack: T1564.001
    if:
      type: string_value
      regex: C:\\\\Users\\\\Public\\\\[a-zA-Z]{5}\.
  - id: public-folder-reference
    desc: Reference to C:\Users\Public folder
    crit: notable
    conf: 0.5
    count_min: 2
    if:
      type: string_value
      regex: C:\\\\Users\\\\Public\\\\
