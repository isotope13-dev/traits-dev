defaults:
  platforms:
    - windows
  for:
    - javascript
    - powershell
traits:
  - id: public-folder-short-random
    desc: Short staged executable name in Users Public
    crit: suspicious
    conf: 0.8
    attack: T1564.001
    if:
      type: text
      regex: '(?i)Users[\\/]+Public[\\/]+[a-z0-9_-]{5,8}\.(exe|dll|bin)\b'
  - id: public-folder-staging-pattern
    desc: Public-folder path near staging operation
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '(?is)(copy|download|write).{0,240}Users[\\/]+Public'
