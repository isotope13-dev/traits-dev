defaults:
  platforms:
    - windows
  for:
    - javascript
    - powershell
traits:
  - id: public-folder-short-random
    desc: Short random filename in C:\Users\Public
    crit: suspicious
    conf: 0.8
    attack: T1564.001
    if:
      type: text
      regex: (?i)C:.{0,12}Users.{0,12}Public.{0,24}[a-z]{5}.{0,24}\.
  - id: public-folder-reference
    desc: Reference to C:\Users\Public folder
    crit: suspicious
    conf: 0.5
    count_min: 2
    if:
      type: text
      regex: (?i)C:.{0,12}Users.{0,12}Public
