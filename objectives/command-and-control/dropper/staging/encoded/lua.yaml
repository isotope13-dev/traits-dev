defaults:
  platforms: [unix, openwrt]
  for: [lua]
  attack: T1027
  mbc: B0032

composite_rules:
  - id: lua-hex-decoded-stage-exec
    desc: Lua hex decoded stage execution
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/data/encode/payload::large-hex-string-literal
      - id: metadata/lang/scripted::exec-dynamic-load
    any:
      - id: micro-behaviors/process/create/shell/hex::hex-encoded-curl
      - id: micro-behaviors/process/create/shell/hex::hex-encoded-wget
      - id: micro-behaviors/process/create/shell/hex::hex-encoded-sh
      - id: micro-behaviors/data/encode/hex::hex-encoded-http
      - id: micro-behaviors/process/create/shell/invoke::lua-os-execute
    needs: 2
