defaults:
  platforms: [zos]
  for: [jcl]
  attack: T1027, T1059, T1105

traits:
  - id: jcl-socksend-member-exec
    desc: JCL executes socket-send member
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: "(?s)\\bEXEC\\s+'[A-Z0-9.$#@_]+\\(SOCK[A-Z0-9#$@_]*\\)'"

  - id: jcl-socket-stage-dds
    desc: JCL socket stage data DDs
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?s)//[A-Z0-9#$@_]+\.SYSPROC\s+DD\s+DSN=[^\n]{1,120}\n//[A-Z0-9#$@_]+\.SYSDATA\s+DD\s+DSN='

composite_rules:
  - id: jcl-encoded-rexx-socket-stager
    desc: JCL encoded REXX socket stager
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/interpreter/scripting/jcl::jcl-ikjeft01-tso-exec
      - id: objectives/anti-static/obfuscation/encoding/hex::jcl-runtime-hex-payload-deck
      - id: jcl-socksend-member-exec
    any:
      - id: micro-behaviors/process/interpreter/scripting/jcl::jcl-systsin-exec-member
      - id: jcl-socket-stage-dds
