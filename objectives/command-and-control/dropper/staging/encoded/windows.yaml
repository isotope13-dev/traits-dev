defaults:
  platforms: [windows]
  for: [dll]
  attack: T1620
  mbc: B0023

traits:
  - id: rundll32-export-name
    desc: DLL exports rundll32 entrypoint
    crit: suspicious
    conf: 0.9
    if:
      type: export
      exact: rundll32
  - id: loadlibraryw-import
    desc: LoadLibraryW import
    crit: notable
    conf: 0.9
    size_max: 65536
    if:
      type: import
      exact: LoadLibraryW
  - id: getprocaddress-import
    desc: GetProcAddress import
    crit: notable
    conf: 0.9
    size_max: 65536
    if:
      type: import
      exact: GetProcAddress

composite_rules:
  - id: minimal-dll-dynamic-loader
    desc: Minimal DLL dynamic loader imports
    crit: suspicious
    conf: 0.9
    size_max: 65536
    all:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-string
      - id: loadlibraryw-import
      - id: getprocaddress-import
  - id: rundll32-custom-encoded-loader
    desc: rundll32 DLL loads custom encoded payload
    crit: hostile
    conf: 0.97
    all:
      - id: rundll32-export-name
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-string
      - id: loadlibraryw-import
      - id: getprocaddress-import
      - id: objectives/anti-static/obfuscation/encoding/custom::tiny-dll-low-alphabet-overlay
      - id: metadata/binary/layout::overlay-dominates-third
