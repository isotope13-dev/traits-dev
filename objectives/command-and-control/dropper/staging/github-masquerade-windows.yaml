defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1105
  mbc: B0024
traits:
  - id: sandbox-downloader-user-agent
    desc: SandboxDownloader custom user agent
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: SandboxDownloader/1.0
  - id: raw-github-host
    desc: raw.githubusercontent.com host string
    crit: notable
    conf: 0.84
    if:
      type: text
      exact: raw.githubusercontent.com
  - id: github-dat-staging-path
    desc: GitHub DAT staging path
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: ^/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+/main/[A-Za-z0-9._/-]{1,120}\.dat$
  - id: numbered-dat-payload-name
    desc: Numbered DAT payload filename
    crit: component
    conf: 0.8
    if:
      type: text
      regex: ^[A-Za-z][A-Za-z0-9]{2,15}[12]\.dat$
  - id: blueline-ran-marker
    desc: BlueLine execution marker file
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: \BlueLine_Ran.txt
  - id: appdata-envvar
    desc: APPDATA environment variable
    crit: component
    conf: 0.5
    if:
      type: text
      exact: "%APPDATA%"
  - id: update-exe-string
    desc: Update.exe persistence filename
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: Update\.exe
    unless:
      - id: metadata/binary/installer::known-benign-installer
composite_rules:
  - id: github-dat-downloader
    desc: WinHTTP downloader pulls GitHub DAT payloads
    crit: suspicious
    conf: 0.95
    size_max: 500000
    all:
      - id: micro-behaviors/communications/http/client::winhttp-downloader-flow
      - id: raw-github-host
      - id: github-dat-staging-path
    any:
      - id: sandbox-downloader-user-agent
      - id: numbered-dat-payload-name
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/write::write-file
      - id: micro-behaviors/process/create/spawn::create-process-w
    needs: 2
  - id: appdata-update-run-persistence
    desc: APPDATA Update.exe Run persistence cluster
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/persistence/login/startup/registry::software-run-key
      - id: micro-behaviors/os/registry/access::reg-set-value-ex-w
      - id: appdata-envvar
      - id: update-exe-string
    any:
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/fs/path/check::get-module-filename
    needs: 1
    unless:
      - id: objectives/discovery/host/system::windows-stealer-recon-known-benign
      - id: metadata/package::high-string-count-pe
  - id: marker-gated-github-stager
    desc: Marker-gated GitHub masquerade stager
    crit: suspicious
    conf: 0.96
    size_max: 500000
    all:
      - id: github-dat-downloader
      - id: appdata-update-run-persistence
      - id: objectives/evasion/masquerade/process::unsigned-system-process-name-set
    any:
      - id: blueline-ran-marker
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present-symbol
      - id: objectives/anti-analysis/timing/evasion::filetime-systemtime-delta-check
    needs: 1
