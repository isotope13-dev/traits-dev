defaults:
  platforms: [openwrt]
  for: [zig]
  attack: T1059.004
  mbc: B0023

traits:
  - id: zig-hidden-temp-shell-path
    desc: Zig hidden temp shell path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/tmp/\.[A-Za-z0-9_.-]{3,64}\.sh'
  - id: zig-shell-payload-commands
    desc: Zig shell payload commands
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'id\\nuname -a\\nwhoami'
  - id: zig-bin-sh-c
    desc: Zig /bin/sh -c execution
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '"/bin/sh"[\s\S]{0,80}"-c"'

composite_rules:
  - id: openwrt-zig-temp-shell-stage
    desc: OpenWrt Zig temp shell stage
    crit: hostile
    conf: 0.97
    all:
      - id: zig-hidden-temp-shell-path
      - id: zig-shell-payload-commands
      - id: micro-behaviors/process/create/direct::zig-child-init
      - id: zig-bin-sh-c
