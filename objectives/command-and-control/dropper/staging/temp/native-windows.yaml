defaults:
  platforms: [windows]
  for: [c, cpp, pe, dll]
  attack: T1105

traits:
  - id: native-base64-temp-driver-drop
    desc: Native base64 temp driver drop
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'CryptStringToBinaryA[\s\S]{0,480}GetTempPathA[\s\S]{0,300}\.sys'

  - id: native-kernel-driver-service-stage
    desc: Native kernel driver service stage
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CreateServiceA[\s\S]{0,260}SERVICE_KERNEL_DRIVER'

    unless:
    - id: well-known/lib/wine::wine-source-tree
    - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
composite_rules:
  - id: native-temp-driver-service-dropper
    desc: Native temp driver service dropper
    crit: hostile
    conf: 0.98
    all:
      - id: native-base64-temp-driver-drop
      - id: native-kernel-driver-service-stage
    any:
      - id: objectives/persistence/system/service/install::create-service-api
      - id: micro-behaviors/crypto/library/encoding::crypt-string-to-binary
