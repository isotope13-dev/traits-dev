defaults:
  platforms: [unix, appliance]
  for: [ruby]
  attack: T1105

traits:
  - id: ruby-http-hidden-module-fetch
    desc: Ruby HTTP hidden module fetch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'payload_url[\s\S]{0,180}/update/.{0,80}module\.bin'

composite_rules:
  - id: ruby-hidden-module-download-exec
    desc: Ruby hidden module download exec
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-http-hidden-module-fetch
      - id: objectives/command-and-control/dropper/execution/script::ruby-http-write-process-cluster
