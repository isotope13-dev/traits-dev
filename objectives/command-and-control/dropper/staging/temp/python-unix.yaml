defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1105
  mbc: E1105

traits:
  - id: python-hidden-temp-stager-dir
    desc: Python hidden temp stager dir
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'tempfile\.mkdtemp\(prefix="\.svc_"'

  - id: python-stager-symlink-create
    desc: Python stager symlink create
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: os.symlink(source_path, link_path)

  - id: python-symlink-subprocess-exec
    desc: Python symlink subprocess exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'subprocess\.run\([\s\S]{0,120}sys\.executable[\s\S]{0,80}link_path'

  - id: python-decoded-stager-write
    desc: Python decoded stager write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: _generate_stager()

  - id: python-stager-file-write
    desc: Python stager file write
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: open(stager_path, "w")

  - id: python-stager-exec-chmod
    desc: Python stager exec chmod
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: os.chmod(stager_path, 0o755)

composite_rules:
  - id: python-hidden-symlink-stager
    desc: Python hidden symlink stager
    crit: hostile
    conf: 0.98
    all:
      - id: python-hidden-temp-stager-dir
      - id: python-stager-symlink-create
      - id: python-symlink-subprocess-exec
      - id: python-decoded-stager-write
      - id: python-stager-file-write
      - id: python-stager-exec-chmod
