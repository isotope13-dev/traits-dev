defaults:
  platforms: [unix]
  for: [elf]
  attack: T1059.004
composite_rules:
  - id: native-hidden-shell-stager
    desc: Native binary stages a hidden numeric file through /bin/sh
    crit: hostile
    conf: 0.97
    attack: T1059.004,T1564.001
    mbc: B0028,F0005
    all:
      - id: micro-behaviors/fs/path/temp::native-hidden-numeric-file-template
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
