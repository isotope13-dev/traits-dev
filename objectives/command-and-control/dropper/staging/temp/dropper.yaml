defaults:
  platforms:
  - windows
  for:
  - pe
traits:
- id: temp-dropper-dummy
  desc: dummy
  crit: notable
  if:
    type: text
    exact: dummy_not_found_ever_temp
- id: dmd-msvcr120-runtime-dll
  desc: DMD bundled Microsoft CRT runtime DLL
  crit: notable
  conf: 0.96
  if:
    type: path
    substr: bin64/msvcr120.dll
composite_rules:
- id: encoded-temp-command-stager
  desc: PE stages an encoded command through Temp and starts a process
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/anti-static/obfuscation/payload/encoded::large-base64-string-dup
  - id: micro-behaviors/fs/temp/directory::temp-file-staging-primitives
  - id: micro-behaviors/process/create/exec::cmd-exe-reference
  - id: micro-behaviors/process/create/shell/spawn::win-createprocess
- id: temp-dropper
  desc: Writes file to Temp directory and executes it
  crit: suspicious
  conf: 0.8
  size_max: 10485760
  all:
  - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
  - id: micro-behaviors/fs/file/open::fopen
  any:
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: micro-behaviors/process/create/exec::shell-execute-a
  unless:
  - id: dmd-msvcr120-runtime-dll
  - id: metadata/signed/platform/
  - id: metadata/library/msvc/
  - id: well-known/app/peazip::peazip-zpaq-helper
  - id: well-known/tool/development/cygwin::cygwin-setup-signature
  - id: metadata/binary/installer/script::nsis-sfx-deadbeef-magic
  - id: metadata/binary/debug::cpython-wininst-stub-context
  - id: metadata/package/quality/recognized-contexts/
