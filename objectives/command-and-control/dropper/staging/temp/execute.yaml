defaults:
  platforms: [windows]
composite_rules:
  - id: temp-file-execution
    desc: Drop and execute file from Temp directory
    crit: suspicious
    conf: 0.85
    for: [pe, powershell, batch]
    size_max: 524288
    all:
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: micro-behaviors/fs/file/write/direct::write-file
    any:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/exec::shell-execute-a
    downgrade:
      any:
        - id: metadata/binary/installer/
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor/
        - id: metadata/package/versioning::pe-version-resource
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: metadata/binary/metrics/structural::many-imports
        - id: micro-behaviors/os/service/config/
  - id: overlay-self-read-service-dropper
    desc: Self-reading overlay dropper with service persistence
    crit: hostile
    conf: 0.97
    for: [pe]
    all:
      - id: objectives/anti-static/obfuscation/payload/self-read::self-read-file-import-chain
      - id: metadata/binary/layout::has-overlay
      - id: micro-behaviors/os/service/control::create-service
      - id: micro-behaviors/os/service/control::service-control-dispatch
    any:
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: objectives/persistence/login/registry/autostart::run-key
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/installer/family/
        - id: well-known/tool/sysadmin/sandboxie/
