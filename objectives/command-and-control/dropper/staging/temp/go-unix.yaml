defaults:
  platforms: [unix]
  for: [go, elf]
  attack: T1105

traits:
  - id: go-stage2-payload-path
    desc: Go stage2 payload path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: stage2.bin

  - id: go-c2-download-payload-func
    desc: Go C2 download payload function
    crit: suspicious
    conf: 0.9
    for: [elf]
    if:
      type: text
      substr: main.c2DownloadPayload

composite_rules:
  - id: go-hidden-stage2-download
    desc: Go hidden stage2 download
    crit: hostile
    conf: 0.98
    all:
      - id: go-stage2-payload-path
      - id: objectives/persistence/login/shell/config::go-hidden-sysmon-launcher
    any:
      - id: go-c2-download-payload-func
      - id: micro-behaviors/communications/http/lib/netlib::net-http-import
