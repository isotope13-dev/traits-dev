# Staged loader: a host file that secretly is an interpreter one-liner
# (python3 -c / node -e / php -r) which reads a second-stage file from disk and
# decompresses it before use. This is the dropper-unpack stage of campaigns like
# SiteGuarding, where a small PHP/data stub materializes the real backdoor from a
# compressed companion blob. cleave extracts the hidden interpreter body and
# parses it, so its file-read + decompression surface on the host. The host-type
# gate (non-python, non-shell) is the disguise discriminator: these embedded
# atoms on a PHP/JS/etc. file mean an interpreter program is concealed inside it,
# never an ordinary standalone script.
defaults:
  platforms: [linux, macos, windows]
  conf: 0.95
  attack: T1105

composite_rules:
  # === HOSTILE: hidden interpreter reads + unpacks an external stage ========
  - id: embedded-interpreter-stage-unpacker
    desc: Hidden interpreter unpacks external stage file
    crit: hostile
    conf: 0.96
    attack: T1105,T1140
    for: [php, javascript, ruby, perl, lua, powershell]
    all:
      - id: micro-behaviors/data/compress/library::script-decompress-call
      - id: micro-behaviors/fs/file/open::file-read-call
      - id: micro-behaviors/data/compress/library::decompress-decoded-to-text
