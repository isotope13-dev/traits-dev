# .NET downloaders that retrieve payloads and invoke them from memory
defaults:
  attack: T1105
  mbc: B0030
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: fetch-compressed-resource
    desc: FetchCompressedResource stage method
    crit: component
    conf: 0.95
    if:
      type: text
      exact: FetchCompressedResource
  - id: decompress-payload
    desc: DecompressPayload stage method
    crit: component
    conf: 0.95
    if:
      type: text
      exact: DecompressPayload
  - id: prepare-assembly
    desc: PrepareAssembly stage method
    crit: component
    conf: 0.95
    if:
      type: text
      exact: PrepareAssembly
  - id: fast-create-instance
    desc: FastCreateInstance loader method
    crit: component
    conf: 0.96
    if:
      type: text
      exact: FastCreateInstance
  - id: stage3-type-resolution
    desc: Stage3_TypeResolution marker
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Stage3_TypeResolution
  - id: stage4-execution
    desc: Stage4_Execution marker
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Stage4_Execution
  - id: get-network-resource
    desc: GetNetworkResource stage method
    crit: component
    conf: 0.94
    if:
      type: text
      exact: GetNetworkResource
  - id: siphon-image-data-method
    desc: SiphonImageData bitmap extraction method
    crit: component
    conf: 0.92
    if:
      type: text
      exact: SiphonImageData
  - id: accumulate-raw-channels-method
    desc: AccumulateRawChannels bitmap extraction method
    crit: component
    conf: 0.92
    if:
      type: text
      exact: AccumulateRawChannels
composite_rules:
  - id: http-reflection-loader
    desc: .NET HTTP in-memory assembly loader
    crit: suspicious
    conf: 0.95
    size_max: 500000
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/communications/http/client/managed::request
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-in-memory-assembly-invoke
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-entrypoint-reflection
    unless:
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
  - id: http-entrypoint-loader
    desc: .NET HTTP download-decode-load-invoke chain
    crit: suspicious
    conf: 0.95
    size_max: 500000
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/communications/http/client/managed::request
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-entrypoint-reflection
    unless:
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token

  - id: dotnet-http-decoded-reflective-stage
    desc: .NET HTTP response decoded and passed to reflected method invocation
    crit: hostile
    conf: 0.96
    attack: "T1105,T1140,T1620"
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/communications/http/client/managed::request
      - id: micro-behaviors/communications/http/client/managed::getstringasync
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-method-lookup-invoke
    near_bytes: 4096
    unless:
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
  - id: dotnet-network-resource-aes-stage
    desc: .NET network resource AES reflective stage
    crit: hostile
    conf: 0.97
    attack: "T1105,T1140,T1620"
    mbc: E1059
    all:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-network-resource-method-loader
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael-decryptor
  - id: http-aes-reflection-injection-stage
    desc: .NET HTTP AES reflection injection stage
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/dropper/staging/memory::http-reflection-loader
      - id: micro-behaviors/communications/http/client/managed::dotnet-http-client-with-aes
      - id: objectives/evasion/process/injection/toolkit::dotnet-split-winapi-injection-loader
    any:
      - id: micro-behaviors/process/interpreter/reflection/runtime::delegate-invocation-chain
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-resource-resolver-loader
      - id: metadata/binary/symbols/imports::single-import-raw
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource/
  - id: disguised-media-loader
    desc: HTTP loader fetches media-named payload
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/command-and-control/dropper/staging/memory::http-reflection-loader
      - id: micro-behaviors/communications/http/url/path::wav-file-url
  - id: stage-method-cluster
    desc: Managed staged loader method cluster
    crit: suspicious
    conf: 0.97
    all:
      - id: fetch-compressed-resource
      - id: decompress-payload
      - id: prepare-assembly
      - id: fast-create-instance
    any:
      - id: stage3-type-resolution
      - id: stage4-execution
      - id: get-network-resource
  - id: http-3des-reflection-loader
    desc: .NET HTTP TripleDES reflection loader
    crit: hostile
    conf: 0.98
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/communications/http/client/managed::httpclient-bytearray-download
      - id: micro-behaviors/crypto/symmetric/3des::triple-des-decrypt-chain
      - id: micro-behaviors/process/interpreter/reflection/runtime::invoke-member-token
      - id: objectives/command-and-control/dropper/staging/memory::stage-method-cluster
    any:
      - id: micro-behaviors/communications/http/client/managed::custom-user-agent-headers
      - id: micro-behaviors/communications/http/user-agent::ipad-safari-15-ua-pe
      - id: micro-behaviors/communications/http/url/path::wav-file-url
    unless:
      - id: metadata/signed/platform/
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
  - id: glitch-media-3des-loader
    desc: .NET Glitch WAV stage loader
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/dropper/staging/memory::http-3des-reflection-loader
      - id: micro-behaviors/communications/http/url/path::wav-file-url
      - id: micro-behaviors/communications/http/user-agent::ipad-safari-15-ua-pe
  - id: stego-bitmap-byte-extraction-chain
    desc: .NET bitmap channel byte extraction chain
    crit: suspicious
    conf: 0.94
    attack: T1027.003
    mbc: E1027.m02
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-bitmap-pixel-readback
    any:
      - id: siphon-image-data-method
      - id: accumulate-raw-channels-method
      - id: objectives/command-and-control/dropper/delivery/stego::dotnet-stego-acquire
      - id: objectives/command-and-control/dropper/delivery/stego::dotnet-harvestimage-pixel-extract
    needs: 2
  - id: stego-bitmap-reflection-invoke
    desc: .NET bitmap stego reflection invoke chain
    crit: suspicious
    conf: 0.90
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-appdomain-exportedtype-invoke
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-exportedtype-constructor-invoke
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
  - id: minimal-import-stub-signal
    desc: Single-import managed stub signal
    crit: component
    conf: 0.9
    any:
      - id: metadata/binary/symbols/imports::single-import-count
      - id: metadata/binary/symbols/imports::single-import-raw
  - id: stego-bitmap-packing-signal
    desc: .NET bitmap stego packing indicator
    crit: suspicious
    conf: 0.90
    all:
      - id: minimal-import-stub-signal
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-bitmap-pixel-readback
    any:
      - id: objectives/anti-static/pack/entropy::dotnet-large-packed-text
      - id: objectives/anti-static/pack/runtime::dotnet-packed-stub
    unless:
      - id: well-known/app/protected-benign-pe/
      - id: well-known/lib/spectre-console/
      - id: well-known/lib/htmlforgex/
  - id: stego-bitmap-minimal-import-packed-stub
    desc: .NET bitmap loader packed stub with minimal imports
    crit: suspicious
    conf: 0.93
    attack: T1027.003
    mbc: F0001
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/symbols/imports::single-import-raw
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-bitmap-pixel-readback
    any:
      - id: objectives/anti-static/pack/runtime::dotnet-packed-stub
      - id: metadata/binary/section/metrics::random-exec-payload-section
      - id: metadata/binary/metrics/structural::high-code-entropy
    needs: 2
    downgrade:
      any:
        - id: well-known/app/crayens/
  - id: stego-bitmap-stage-load-chain
    desc: .NET bitmap stage in-memory load chain
    crit: suspicious
    conf: 0.95
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-bitmap-pixel-readback
    any:
      - id: objectives/command-and-control/dropper/staging/memory::stego-bitmap-reflection-invoke
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-appdomain-callbyname-load
  - id: stego-bitmap-memory-loader
    desc: .NET steganographic bitmap in-memory loader
    crit: hostile
    conf: 0.96
    attack: T1027.003
    mbc: E1105
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/command-and-control/dropper/staging/memory::stego-bitmap-byte-extraction-chain
      - id: objectives/command-and-control/dropper/staging/memory::stego-bitmap-minimal-import-packed-stub
      - id: objectives/command-and-control/dropper/staging/memory::stego-bitmap-packing-signal
      - id: objectives/command-and-control/dropper/staging/memory::stego-bitmap-stage-load-chain
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/resource/

  # ConfuserEx-tagged stub that already looks like a packed bitmap stego
  # loader (minimal imports + LockBits/GetPixel resource readback) and
  # also reflectively invokes / starts a process. Separates Olock/Fareit
  # crypters from unsigned ConfuserEx IP-protection on benign apps that
  # never LockBits a high-entropy managed resource.
  - id: confuserex-stego-bitmap-stub
    desc: ConfuserEx packed bitmap stego stub
    crit: hostile
    conf: 0.96
    attack: T1027.002,T1027.003,T1620
    mbc: F0001,E1105
    all:
      - id: objectives/command-and-control/dropper/execution/loader::confuserex-version-banner
      - id: stego-bitmap-minimal-import-packed-stub
      - id: micro-behaviors/process/interpreter/reflection/runtime::invoke-member-token
      - id: metadata/binary/resource::dotnet-large-high-entropy-managed-resource
    any:
      - id: micro-behaviors/process/create/spawn::process-start-member-token
      - id: micro-behaviors/data/encode/image/pixel::pixel-access-lockbits
    unless:
      - id: metadata/signed/platform/
  - id: dotnet-packed-vb-resource-loader
    desc: .NET packed VB resource-backed loader
    crit: suspicious
    conf: 0.9
    attack: T1620
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/command-and-control/dropper/staging/embedded::vb-newlatebinding
      - id: metadata/binary/section/metrics::random-exec-payload-section
    any:
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-backed-bitmap
      - id: micro-behaviors/data/embedded/payload/resource::dotnet-resource-reader
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-walk
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-token
    needs: 2
    unless:
      - id: metadata/signed/platform/
  - id: dotnet-template-resource-section-loader
    desc: .NET template resource section loader
    crit: suspicious
    conf: 0.9
    attack: T1620
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/build/manifest::pe-manifest-myapplication-template
      - id: metadata/binary/section/metrics::random-exec-payload-section
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-backed-bitmap
    unless:
      - id: metadata/signed/platform/
  - id: dotnet-template-gzip-resource-loader
    desc: .NET template GZip resource loader
    crit: suspicious
    conf: 0.92
    attack: T1620
    all:
      - id: dotnet-template-resource-section-loader
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
    unless:
      - id: metadata/signed/platform/
  - id: dotnet-template-writealltext-loader
    desc: .NET template writes staged text
    crit: suspicious
    conf: 0.9
    attack: T1620
    all:
      - id: dotnet-template-resource-section-loader
      - id: micro-behaviors/fs/write/file/direct::dotnet-writealltext-token
    unless:
      - id: metadata/signed/platform/
  - id: dotnet-vb-bitmap-write-loader
    desc: .NET VB bitmap write loader
    crit: suspicious
    conf: 0.9
    attack: T1620
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/command-and-control/dropper/staging/embedded::vb-newlatebinding
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-backed-bitmap
    any:
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: micro-behaviors/fs/write/file/direct::dotnet-writealltext-token
    unless:
      - id: metadata/signed/platform/

  - id: dotnet-vb-bitmap-inline-pe-stager
    desc: .NET VB bitmap loader stages an embedded PE payload
    crit: hostile
    conf: 0.97
    attack: T1620,T1027.003
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/command-and-control/dropper/staging/embedded::vb-newlatebinding
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-backed-bitmap
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-walk
      - id: metadata/binary/section/metrics::random-exec-payload-section
      - id: micro-behaviors/fs/write/file/direct::dotnet-writealltext-token
    unless:
      - id: metadata/signed/platform/
      - id: objectives/anti-static/obfuscation/obfuscator/managed/
      - id: well-known/app/protected-benign-pe/

  - id: dotnet-bitmap-resource-stager
    desc: .NET bitmap resource in-memory stager
    crit: hostile
    conf: 0.96
    attack: T1620,T1027.003
    mbc: E1059
    all:
      - id: stego-bitmap-minimal-import-packed-stub
      - id: dotnet-template-resource-section-loader
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/protected-benign-pe/
  - id: dotnet-bitmap-reflective-activator-loader
    desc: .NET bitmap resource reflective Activator loader
    crit: hostile
    conf: 0.96
    attack: T1620,T1027.003
    mbc: E1059
    all:
      - id: dotnet-template-resource-section-loader
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-bitmap-pixel-readback
      - id: micro-behaviors/process/interpreter/reflection/runtime::activator
      - id: metadata/lang/compiler/managed::get-method-token
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/protected-benign-pe/
  - id: dotnet-bitmap-packed-inmemory-stager
    desc: .NET packed bitmap payload staged for in-memory execution
    crit: hostile
    conf: 0.96
    attack: "T1027.003,T1620"
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/symbols/imports::single-import-raw
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-bitmap-pixel-readback
      - id: micro-behaviors/process/interpreter/reflection/runtime::activator
      - id: metadata/binary/metrics/structural::high-code-entropy
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/protected-benign-pe/
  # HOSTILE (T1140 Deobfuscate/Decode + in-memory execution): a .NET assembly
  # whose body is a large random high-entropy section (the encrypted payload)
  # which it decodes at runtime and runs via the reflective load+instantiate
  # chain — the payload never touches disk in cleartext. This is the
  # SnakeKeyLogger / commodity MSIL-crypter in-memory delivery shape.
  - id: dotnet-inmemory-staged-encrypted-payload
    desc: .NET decodes an embedded encrypted payload and runs it in memory
    crit: hostile
    conf: 0.88
    attack: T1140
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-reflective-loader-chain
      - id: metadata/binary/section/metrics::random-exec-payload-section
    unless:
      - id: metadata/signed/platform::microsoft-corporation
  - id: dotnet-packed-encrypted-resource-stager
    desc: .NET packed encrypted resource stager
    crit: hostile
    conf: 0.94
    attack: T1620
    mbc: E1059
    all:
      - id: objectives/anti-static/obfuscation/payload/resource::dotnet-managed-resource-decryptor
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-activator-resource-invoker
      - id: objectives/anti-static/pack/runtime::dotnet-packed-stub
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/resource/
