# .NET downloaders that retrieve payloads and invoke them from memory
defaults:
  attack: T1105
  mbc: B0030
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: fetch-compressed-resource
    desc: FetchCompressedResource stage method
    crit: component
    conf: 0.95
    if:
      type: text
      exact: FetchCompressedResource
  - id: decompress-payload
    desc: DecompressPayload stage method
    crit: component
    conf: 0.95
    if:
      type: text
      exact: DecompressPayload
  - id: prepare-assembly
    desc: PrepareAssembly stage method
    crit: component
    conf: 0.95
    if:
      type: text
      exact: PrepareAssembly
  - id: fast-create-instance
    desc: FastCreateInstance loader method
    crit: component
    conf: 0.96
    if:
      type: text
      exact: FastCreateInstance
  - id: stage3-type-resolution
    desc: Stage3_TypeResolution marker
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Stage3_TypeResolution
  - id: stage4-execution
    desc: Stage4_Execution marker
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Stage4_Execution
  - id: get-network-resource
    desc: GetNetworkResource stage method
    crit: component
    conf: 0.94
    if:
      type: text
      exact: GetNetworkResource
composite_rules:
  - id: http-reflection-loader
    desc: .NET fileless HTTP reflection loader
    crit: suspicious
    conf: 0.95
    size_max: 500000
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/communications/http/client/managed::request
      - id: objectives/anti-static/obfuscation/reflection/invoke::method-info
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-invoke-token
      - id: objectives/anti-static/obfuscation/reflection/invoke::activator
      - id: metadata/lang/compiler/managed::reflection-emit
    unless:
      - id: objectives/command-and-control/dropper/staging/embedded::writeallbytes
  - id: http-entrypoint-loader
    desc: .NET HTTP download-decode-load-invoke chain
    crit: suspicious
    conf: 0.95
    size_max: 500000
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/communications/http/client/managed::request
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-entrypoint-reflection
    unless:
      - id: objectives/command-and-control/dropper/staging/embedded::writeallbytes
  - id: disguised-media-loader
    desc: HTTP loader fetches media-named payload
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/command-and-control/dropper/staging/memory::http-reflection-loader
      - id: objectives/evasion/masquerade/file/lure::wav-payload-url
  - id: stage-method-cluster
    desc: Managed staged loader method cluster
    crit: suspicious
    conf: 0.97
    all:
      - id: fetch-compressed-resource
      - id: decompress-payload
      - id: prepare-assembly
      - id: fast-create-instance
    any:
      - id: stage3-type-resolution
      - id: stage4-execution
      - id: get-network-resource
  - id: http-3des-reflection-loader
    desc: .NET HTTP TripleDES reflection loader
    crit: hostile
    conf: 0.98
    attack: T1620
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/communications/http/client/managed::httpclient-bytearray-download
      - id: micro-behaviors/crypto/symmetric/3des::triple-des-decrypt-chain
      - id: objectives/anti-static/obfuscation/reflection/invoke::invokemember-token
      - id: objectives/command-and-control/dropper/staging/memory::stage-method-cluster
    any:
      - id: micro-behaviors/communications/http/client/managed::custom-user-agent-headers
      - id: micro-behaviors/communications/http/user-agent::ipad-safari-15-ua-pe
      - id: objectives/evasion/masquerade/file/lure::wav-payload-url
    unless:
      - id: metadata/signed/platform::microsoft
      - id: objectives/command-and-control/dropper/staging/embedded::writeallbytes
  - id: glitch-media-3des-loader
    desc: .NET Glitch WAV stage loader
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/dropper/staging/memory::http-3des-reflection-loader
      - id: objectives/evasion/masquerade/file/lure::wav-payload-url
      - id: micro-behaviors/communications/http/user-agent::ipad-safari-15-ua-pe
  - id: stego-bitmap-reflection-invoke
    desc: .NET bitmap stego reflection invoke chain
    crit: suspicious
    conf: 0.90
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-appdomain-exportedtype-invoke
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-exportedtype-constructor-invoke
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
  - id: stego-bitmap-packing-signal
    desc: .NET bitmap stego packing indicator
    crit: suspicious
    conf: 0.90
    any:
      - id: objectives/anti-static/pack/entropy::dotnet-large-packed-text
      - id: metadata/binary/symbols/imports::single-import-count
  - id: stego-bitmap-memory-loader
    desc: .NET steganographic bitmap in-memory loader
    crit: hostile
    conf: 0.96
    attack: T1027.003
    mbc: E1105
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-bitmap-pixel-readback
      - id: objectives/command-and-control/dropper/staging/memory::stego-bitmap-reflection-invoke
      - id: objectives/command-and-control/dropper/staging/memory::stego-bitmap-packing-signal
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/resource::resource-only-dll
