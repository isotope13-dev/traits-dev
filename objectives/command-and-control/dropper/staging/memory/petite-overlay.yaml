defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.002,T1620
  mbc: B0032

composite_rules:
- id: petite-overlay-memory-stager
  desc: Petite-packed PE stages an encoded overlay in executable memory
  crit: hostile
  conf: 0.98
  all:
  - id: objectives/anti-static/pack/petite::petite-encoded-overlay-loader
  - id: objectives/anti-static/pack/runtime::unpacking-api-pattern
  - id: objectives/anti-static/obfuscation/payload/import::pe-dynamic-resolution
  - id: metadata/binary/layout::overlay-dominates-third
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/framework/
