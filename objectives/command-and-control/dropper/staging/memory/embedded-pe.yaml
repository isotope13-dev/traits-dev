# Native PE with an obfuscated, encoded in-memory script stage.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1620
  mbc: B0032

traits:
  - id: pe-corrupted-base64-fragments
    desc: Marker-corrupted base64 fragments
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)Call\s+\w{8,}\([^"'']{0,20}["''][A-Za-z0-9+/]{16,}[^"'']{0,32}@'
    count_min: 2

composite_rules:
  - id: pe-encoded-script-memory-stage
    desc: Obfuscated encoded script memory stage
    crit: hostile
    conf: 0.99
    attack: T1027,T1620
    all:
      - id: objectives/anti-static/obfuscation/payload/fragmentation::pe-script-base64-fragment-calls
      - id: objectives/anti-static/obfuscation/payload/fragmentation::pe-script-obfuscated-helper-functions
      - id: pe-corrupted-base64-fragments
