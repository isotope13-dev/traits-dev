defaults:
  platforms: [appliance, unix]
  for: [c, cpp, objc, elf]
  attack: T1620
  mbc: E1055

traits:
  - id: vxworks-payload-magic-string
    desc: VxWorks payload magic string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: VXWS

  - id: vxworks-payload-magic-constant
    desc: VxWorks payload magic constant
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "0x56585753"

  - id: vxworks-memory-payload-magic-hex
    desc: VxWorks payload magic bytes
    crit: component
    conf: 0.9
    if:
      type: hex
      section: text
      pattern: "53 57 58 56"

  - id: native-exec-memory-mapping
    desc: Native executable memory map
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'mmap[\s\S]{0,160}PROT_EXEC'
    unless:
      - id: well-known/lib/hpc
      - id: metadata/lang/source::wine-compat-source
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - type: text
        substr: ucm_get_page_size

  - id: native-length-prefixed-stage
    desc: Native length-prefixed stage
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'recv\([^;]{0,120}(hdr|header|length|payload_len)'

composite_rules:
  - id: vxworks-memory-stage-exec
    desc: VxWorks memory stage exec
    crit: hostile
    conf: 0.98
    all:
      - id: native-exec-memory-mapping
      - id: micro-behaviors/communications/socket/receive::recv-symbol
    any:
      - id: vxworks-payload-magic-string
      - id: vxworks-payload-magic-constant
      - id: vxworks-memory-payload-magic-hex
      - id: native-length-prefixed-stage

  - id: vxworks-memory-stage-rwx-symbols
    desc: VxWorks RWX memory stage
    crit: hostile
    conf: 0.98
    all:
      - id: vxworks-memory-payload-magic-hex
      - id: micro-behaviors/communications/socket/receive::recv-symbol
      - id: micro-behaviors/mem/protect/modify::mprotect-import
      - id: micro-behaviors/mem/alloc/executable::mmap-symbol
