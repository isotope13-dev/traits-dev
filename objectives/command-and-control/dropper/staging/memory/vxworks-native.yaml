defaults:
  platforms: [appliance, unix]
  for: [c, cpp, objc, elf]
  attack: T1620
  mbc: E1055

traits:
  - id: vxworks-payload-magic-string
    desc: VxWorks payload magic string
    crit: component
    conf: 0.95
    if:
      type: text
      substr: VXWS

  - id: vxworks-payload-magic-constant
    desc: VxWorks payload magic constant
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "0x56585753"

  - id: vxworks-memory-payload-magic-hex
    desc: VxWorks payload magic bytes
    crit: component
    conf: 0.9
    if:
      type: hex
      section: text
      pattern: "53 57 58 56"

  # `mmap ... PROT_EXEC` is a neutral memory-allocation capability and lives in
  # micro-behaviors/mem/alloc/executable/. Defining it here as a dropper-staging
  # trait meant it fired on every JIT and interpreter, which is why it had
  # accumulated seven carve-outs (libpython, PHP, radare2, wine, hpc, ...).
  # The composite below supplies the VxWorks payload-staging intent.

composite_rules:
  - id: vxworks-memory-stage-exec
    desc: VxWorks memory stage exec
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/mem/alloc/executable::mmap-exec-source
      - id: micro-behaviors/communications/socket/receive::recv-symbol
    any:
      - id: vxworks-payload-magic-string
      - id: vxworks-payload-magic-constant
      - id: vxworks-memory-payload-magic-hex
      - id: micro-behaviors/data/parse/length-prefix::length-prefixed-receive-source

  - id: vxworks-memory-stage-rwx-symbols
    desc: VxWorks RWX memory stage
    crit: hostile
    conf: 0.98
    all:
      - id: vxworks-memory-payload-magic-hex
      - id: micro-behaviors/communications/socket/receive::recv-symbol
      - id: micro-behaviors/mem/protect/modify::mprotect-import
      - id: micro-behaviors/mem/alloc/executable::mmap-symbol
