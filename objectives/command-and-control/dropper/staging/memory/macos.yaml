defaults:
  for: [shell]
  platforms: [macos]
  attack: "T1059.002"
traits:
  - id: curl-osascript
    desc: "Piping curl to osascript"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'curl\s+.{0,300}\|\s*osascript'
  - id: curl-short-timeout
    desc: "curl with short max-time"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'curl\s+.{0,120}--max-time\s+(?:[1-9]|[12][0-9]|30)\b'
  - id: curl-custom-api-key-header
    desc: "curl custom api-key header"
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '-H\s+["'']api-key:\s*[$A-Za-z0-9_{}.-]+'
  - id: curl-token-query-param
    desc: "curl tokenized query parameter"
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'curl.{0,120}(?:\?|&)(?:txd|token|build|id)=[$A-Za-z0-9_{}.-]+'
  - id: mac-browser-user-agent-header
    desc: "macOS browser-like User-Agent header"
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'User-Agent:\s*Mozilla/5\.0\s+\(Macintosh;'
composite_rules:
  - id: osascript-pipe-or-stdin
    desc: "osascript fed from a shell pipeline or stdin"
    crit: suspicious
    conf: 0.9
    any:
      - {id: 'micro-behaviors/process/create/script::osascript-stdin'}
      - {id: 'micro-behaviors/process/create/script::pipe-osascript'}
  - id: fileless-dropper
    desc: "macOS fileless dropper (curl | osascript -)"
    crit: hostile
    conf: 1.0
    all:
      - {id: curl-osascript}
      - {id: osascript-pipe-or-stdin}
  - id: tokenized-fileless-osascript-stager
    desc: "macOS tokenized curl-to-osascript stager"
    crit: hostile
    conf: 0.97
    all:
      - {id: curl-osascript}
      - {id: osascript-pipe-or-stdin}
    needs: 2
    any:
      - {id: curl-custom-api-key-header}
      - {id: curl-token-query-param}
      - {id: curl-short-timeout}
      - {id: mac-browser-user-agent-header}
