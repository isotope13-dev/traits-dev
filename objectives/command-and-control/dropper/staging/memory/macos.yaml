defaults:
  for: [shell, applescript, javascript, html, macho]
  platforms: [macos]
  attack: "T1059.002"
traits:
  - id: curl-osascript
    desc: "Piping curl to osascript"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'curl\s+.{0,300}\|\s*(/usr/bin/)?osascript\b'
  - id: mach-o-aplib-depacker-symbols
    desc: aPLib depacker symbol cluster
    crit: suspicious
    conf: 0.9
    for: [macho]
    attack: T1027.002
    if:
      type: text
      substr: "aP_depack_"
composite_rules:
  - id: mach-o-memory-module-stager
    desc: Mach-O in-memory module stager
    crit: hostile
    conf: 0.98
    for: [macho]
    attack: T1620
    all:
      - id: micro-behaviors/mem/create/fileless::mach-o-memory-module-loader
    any:
      - id: micro-behaviors/os/module/load::mach-o-object-image-loader-export
      - id: mach-o-aplib-depacker-symbols
      - id: metadata/binary/anomaly/ratios::macho-extreme-data-to-code-ratio
    needs: 2
  - id: fileless-dropper
    desc: "macOS fileless dropper (curl | osascript -)"
    crit: hostile
    conf: 1.0
    all:
      - {id: curl-osascript}
      - {id: 'micro-behaviors/process/create/script/osascript::osascript-stdin'}
  - id: macho-transient-memory-payload-stager
    desc: Mach-O dynamically resolves and decrypts a concealed transient-memory payload
    crit: hostile
    conf: 0.98
    for: [macho]
    attack: T1027,T1129,T1620
    all:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: micro-behaviors/mem/alloc/executable::mmap-import
      - id: micro-behaviors/mem/lock/pages::mlock-import
      - id: micro-behaviors/fs/memory/mmap::munmap-import
      - id: metadata/binary/metrics/structural::extreme-text-to-string-ratio
    unless:
      - id: metadata/signed/platform::apple
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
