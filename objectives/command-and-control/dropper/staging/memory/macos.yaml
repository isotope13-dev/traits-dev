defaults:
  for: [shell, applescript, javascript, html, macho]
  platforms: [macos]
  attack: "T1059.002"
traits:
  - id: curl-osascript
    desc: "Piping curl to osascript"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'curl\s+.{0,300}\|\s*(/usr/bin/)?osascript\b'
  - id: mach-o-object-image-loader-export
    desc: Mach-O memory loader export
    crit: suspicious
    conf: 0.92
    for: [macho]
    attack: T1620
    if:
      type: export
      regex: '(^|_)[A-Za-z0-9_]{0,32}loader$'
    unless:
      - id: well-known/app/macos-benign/
      - id: metadata/package/files/wheel-sdist::python-wheel-vendored-shlib-dir
      - id: metadata/lang/compiler/generated::nuitka-compiled-symbol
  - id: mach-o-aplib-depacker-symbols
    desc: aPLib depacker symbol cluster
    crit: suspicious
    conf: 0.9
    for: [macho]
    attack: T1027.002
    if:
      type: text
      substr: "aP_depack_"
composite_rules:
  - id: mach-o-memory-module-stager
    desc: Mach-O in-memory module stager
    crit: hostile
    conf: 0.98
    for: [macho]
    attack: T1620
    all:
      - id: micro-behaviors/mem/create/fileless::mach-o-memory-module-loader
    any:
      - id: mach-o-object-image-loader-export
      - id: mach-o-aplib-depacker-symbols
      - id: metadata/binary/anomaly/ratios::macho-extreme-data-to-code-ratio
    needs: 2
  - id: fileless-dropper
    desc: "macOS fileless dropper (curl | osascript -)"
    crit: hostile
    conf: 1.0
    all:
      - {id: curl-osascript}
      - {id: 'micro-behaviors/process/create/script/osascript::osascript-stdin'}
