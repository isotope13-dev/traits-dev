defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1105,T1027,T1620
  mbc: E1105

composite_rules:
  - id: embedded-encrypted-memory-loader
    desc: Embedded source decrypts staged data before invoking a memory loader
    crit: hostile
    conf: 0.98
    attack: T1027,T1105,T1620
    all:
      - id: micro-behaviors/mem/create/fileless::custom-memory-loader-module
      - id: micro-behaviors/crypto/symmetric/aes/runtime-library::createDecipheriv
      - id: objectives/evasion/security-bypass/tls::reject-unauthorized-false-native
      - id: micro-behaviors/communications/http/post::raw-content-length-header
    unless:
      # Bun's single-file runtime embeds AES + custom loaders for its own PE.
      - id: well-known/lib/bun-runtime::runtime-context
