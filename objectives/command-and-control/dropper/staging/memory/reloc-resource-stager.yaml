# RWX .reloc stager with PE resource extraction and self-deletion
# Detects packed PE loaders that stage encrypted payloads in .reloc,
# extract PE resources, and self-delete after execution.
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1105
  mbc: B0023

composite_rules:
  - id: reloc-resource-selfdelete-stager
    desc: RWX reloc stager with resource extraction and self-delete
    crit: hostile
    conf: 0.96
    size_min: 200000
    all:
      - id: objectives/anti-static/pack/section-anomaly::reloc-rwx-encrypted-payload
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
      - id: objectives/evasion/self-delete/file/script::module-path-delete
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/hardware/input/keyboard/hook::foreground-window-input-state
      - id: micro-behaviors/os/privilege/manifest::require-administrator
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor/
  - id: encrypted-overlay-loader-stager
    desc: Packed PE stages encrypted overlay and extracts resources
    crit: hostile
    conf: 0.98
    attack: T1027.002,T1027.009,T1105
    mbc: B0032
    all:
      - id: objectives/anti-static/pack/section-anomaly::reloc-encrypted-dominant-overlay
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
