# AppleScript Droppers
defaults:
  for: [applescript]
  platforms: [macos]
composite_rules:
  - id: applescript-in-memory-downloader
    desc: "AppleScript downloads and executes remote script in memory"
    crit: hostile
    conf: 0.95
    attack: "T1105"
    all:
      - id: micro-behaviors/process/create/script::shell-dup-execution
      - id: micro-behaviors/process/create/script::run-script-variable
    any:
      - id: objectives/command-and-control/dropper/execution/script::curl-cmd-dup
      - id: micro-behaviors/communications/http/curl::curl-cmd
  - id: applescript-lure-downloader
    desc: "AppleScript uses background decoy while staging payload"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/script::open-g-flag
      - id: objectives/command-and-control/dropper/staging/memory::applescript-in-memory-downloader
  - id: applescript-insecure-download-exec
    desc: "AppleScript curl -k download then in-memory execution"
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/dropper/staging/memory::applescript-in-memory-downloader
      - id: micro-behaviors/communications/http/curl::curl-insecure
