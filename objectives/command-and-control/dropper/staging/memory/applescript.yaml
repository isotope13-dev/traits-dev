# AppleScript Droppers
defaults:
  for: [applescript]
  platforms: [macos]
traits:
  - id: tmp-applescript-stage-path
    desc: Temporary AppleScript stage path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/"&"t"&"m"&"p"&"/.{0,80}\."&"s"&"c"&"p"&"t|/tmp/[A-Za-z0-9_.-]{3,80}\.scpt'
  - id: fragmented-curl-quiet-insecure-flags
    desc: Fragmented curl quiet insecure flags
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '-"&"f.{0,35}-"&"s.{0,35}-"&"S.{0,35}-"&"L.{0,35}-"&"k'
  - id: curl-quiet-insecure-flags
    desc: curl uses quiet insecure flags
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bcurl\s+-[A-Za-z-]*f[A-Za-z-]*s[A-Za-z-]*S[A-Za-z-]*L[A-Za-z-]*k[A-Za-z-]*\b'
  - id: curl-https-scpt-download
    desc: curl downloads scpt over HTTPS
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'https://.{3,160}\.scpt\b'
  - id: curl-https-stage-download
    desc: curl downloads staged HTTPS path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'https://.{3,160}/(check|update|download|stage)\b'
  - id: curl-output-tempfile-stage
    desc: curl writes AppleScript temp stage
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '-"&"o.{0,80}TempFile'
  - id: cleartext-curl-output-tempfile-stage
    desc: curl writes temporary stage file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bcurl\b.{0,220}\s-o\s+.{0,40}TempFile'
  - id: osacompile-over-tempfile
    desc: osacompile rewrites staged script
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(osacompile|o"&"s"&"a"&"c"&"o"&"m"&"p"&"i"&"l"&"e).{0,120}TempFile.{0,80}TempFile'
  - id: osacompile-over-scpt-stage
    desc: osacompile rewrites script stage
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\bosacompile\b.{0,160}\.scpt\b.{0,80}\.scpt\b'
  - id: curl-osascript-module-substitution
    desc: curl fetched osascript module
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'osascript.{0,40}\$\(curl.{0,260}/s/'
  - id: curl-insecure-variable-script
    desc: curl fetches script into AppleScript variable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'set [A-Za-z_][A-Za-z0-9_]{0,40} to do shell script "curl -L -k'
  - id: compiled-applescript-delete-event
    desc: Compiled AppleScript deletion event
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: sysodelanull
  - id: compiled-applescript-buildvendor-var
    desc: Compiled AppleScript build vendor variable
    crit: component
    conf: 0.9
    if:
      type: text
      substr: buildvendor
  - id: compiled-applescript-buildversion-var
    desc: Compiled AppleScript build version variable
    crit: component
    conf: 0.9
    if:
      type: text
      substr: buildversion
  - id: compiled-applescript-username-var
    desc: Compiled AppleScript username variable
    crit: component
    conf: 0.9
    if:
      type: text
      substr: username
composite_rules:
  - id: curl-https-script-download
    desc: curl downloads HTTPS script stage
    crit: notable
    conf: 0.9
    any:
      - id: curl-https-scpt-download
      - id: curl-https-stage-download
  - id: curl-stage-download
    desc: curl downloads AppleScript stage payload
    crit: suspicious
    conf: 0.96
    all:
      - id: curl-https-script-download
    any:
      - id: fragmented-curl-quiet-insecure-flags
      - id: curl-quiet-insecure-flags
      - id: curl-output-tempfile-stage
      - id: cleartext-curl-output-tempfile-stage
  - id: curl-insecure-quiet-script-download
    desc: Insecure quiet curl script download
    crit: suspicious
    conf: 0.96
    all:
      - id: objectives/anti-static/obfuscation/string/concat::applescript-concatenated-curl
      - id: fragmented-curl-quiet-insecure-flags
    any:
      - id: objectives/evasion/masquerade/brand/meeting::teams-live-lookalike-domain
      - id: objectives/evasion/masquerade/brand/meeting::meeting-live-lookalike-domain
      - id: curl-https-script-download
  - id: osacompile-stage-rewrite
    desc: osacompile rewrites downloaded script stage
    crit: suspicious
    conf: 0.96
    any:
      - id: osacompile-over-tempfile
      - id: osacompile-over-scpt-stage
  - id: applescript-download-compile-load
    desc: AppleScript downloads compiles then loads stage
    crit: hostile
    conf: 0.99
    attack: T1105
    all:
      - id: osacompile-stage-rewrite
      - id: micro-behaviors/process/create/script/apple-event::load-script-posix-file
    any:
      - id: curl-insecure-quiet-script-download
      - id: curl-stage-download
  - id: applescript-meeting-lure-dropper
    desc: Meeting lure AppleScript stage dropper
    crit: hostile
    conf: 0.99
    attack: T1204
    all:
      - id: applescript-download-compile-load
      - id: objectives/evasion/masquerade/brand/meeting::meeting-sdk-update-lure
    any:
      - id: objectives/evasion/self-delete/file/script::applescript-rm-tempfile
      - id: objectives/evasion/masquerade/brand/meeting::teams-live-lookalike-domain
      - id: objectives/evasion/masquerade/brand/meeting::meeting-lookalike-stage-lure
  - id: applescript-in-memory-downloader
    desc: "AppleScript downloads and executes a script in memory"
    crit: hostile
    conf: 0.95
    attack: "T1105"
    all:
      - id: micro-behaviors/process/create/script/apple-event::shell-dup-cmd
      - id: objectives/collection/keylog/capture::osascript-exec
    any:
      - id: micro-behaviors/communications/http/download/curl::curl-cmd-dup
      - id: micro-behaviors/communications/http/curl::curl-cmd
  - id: applescript-c2-module-exec
    desc: AppleScript executes fetched C2 module
    crit: hostile
    conf: 0.98
    attack: T1105,T1059.002
    all:
      - id: micro-behaviors/process/create/script/apple-event::shell-dup-cmd
      - id: micro-behaviors/process/create/script/osascript::osascript-exec
      - id: curl-osascript-module-substitution
  - id: compiled-applescript-module-vars
    desc: Compiled AppleScript module identity variables
    crit: suspicious
    conf: 0.92
    all:
      - id: compiled-applescript-buildvendor-var
      - id: compiled-applescript-buildversion-var
      - id: compiled-applescript-username-var
  - id: compiled-applescript-c2-module-dropper
    desc: Compiled AppleScript C2 module dropper
    crit: hostile
    conf: 0.98
    attack: T1105,T1059.002
    all:
      - id: micro-behaviors/process/create/script/apple-event::compiled-shell-exec-event
      - id: compiled-applescript-module-vars
  - id: compiled-applescript-update-stage-dropper
    desc: Compiled AppleScript update stage dropper
    crit: hostile
    conf: 0.97
    attack: T1105,T1059.002
    all:
      - id: micro-behaviors/process/create/script/apple-event::compiled-shell-exec-event
      - id: micro-behaviors/process/create/script/apple-event::compiled-load-script-event
      - id: compiled-applescript-delete-event
      - id: objectives/impact/degrade/rival-bot/competitor::update-agent-target
  - id: applescript-lure-downloader
    desc: "AppleScript uses a background lure while acting as a dropper"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/script/osascript::open-g-bg
      - id: objectives/command-and-control/dropper/staging/memory::applescript-in-memory-downloader
  - id: applescript-run-downloaded-script-variable
    desc: AppleScript runs downloaded script variable
    crit: hostile
    conf: 0.97
    attack: T1105,T1059.002
    all:
      - id: curl-insecure-variable-script
      - id: micro-behaviors/process/create/script/apple-event::run-script-variable
    any:
      - id: objectives/evasion/masquerade/brand/meeting::meeting-lookalike-stage-lure
      - id: objectives/evasion/masquerade/brand/meeting::meeting-sdk-update-lure
      - id: objectives/evasion/masquerade/brand/meeting::meeting-live-lookalike-domain
