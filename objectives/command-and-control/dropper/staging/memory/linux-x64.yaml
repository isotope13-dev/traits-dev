defaults:
  platforms: [linux]
  for: [elf]
  attack: T1620
  mbc: B0030

composite_rules:
  - id: linux-x64-reverse-tcp-memory-stager
    desc: Reverse TCP in-memory stager
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/syscall/raw::x64-socket-inline-connect-early
      - id: micro-behaviors/os/syscall/raw::x64-mmap-rwx-syscall-early
      - id: micro-behaviors/os/syscall/raw::x64-read-stage-jump-rsi
      - id: objectives/anti-static/pack/detection::elf64-no-section-headers
      - id: metadata/binary/metrics/size::micro-elf
