defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1620
  mbc: B0024

composite_rules:
  - id: ps-ipfs-firebase-appdomain-stage-loader
    desc: PowerShell cloud AppDomain stage loader
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/backdoor/loader/managed-reflect::ps-appdomain-base64-method-loader
      - id: objectives/command-and-control/infrastructure/domain::reversed-firebase-storage
    any:
      - id: objectives/command-and-control/infrastructure/blockchain::ipfs-gateway
      - id: micro-behaviors/fs/write/file/direct::out-file
      - id: objectives/anti-static/obfuscation/string/concat::ps-ep-bypass
  - id: ps-pastebin-appdomain-stage-loader
    desc: PowerShell Pastebin AppDomain stage loader
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/backdoor/loader/managed-reflect::ps-appdomain-base64-method-loader
      - id: objectives/command-and-control/infrastructure::pastebin
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::download
    any:
      - id: micro-behaviors/fs/write/file/direct::out-file
      - id: micro-behaviors/fs/write/file/direct::set-content
  - id: ps-myfirebase-appdomain-stage-loader
    desc: PowerShell myfirebase AppDomain stage loader
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/backdoor/loader/managed-reflect::ps-appdomain-base64-method-loader
      - id: objectives/command-and-control/infrastructure/domain::reversed-myfirebase-host
    any:
      - id: micro-behaviors/fs/write/file/direct::out-file
      - id: objectives/anti-static/obfuscation/string/concat::ps-ep-bypass
