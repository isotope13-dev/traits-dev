defaults:
  for: [pe]
  platforms: [windows]
  size_max: 10485760
  attack: T1105
  mbc: B0023

traits:
- id: firefox-139-windows-user-agent
  desc: Firefox 139 Windows User-Agent
  crit: component
  conf: 0.9
  if:
    type: text
    exact: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:139.0) Gecko/20100101 Firefox/139.0"

composite_rules:
- id: wininet-bcrypt-gcm-native-section-loader
  desc: WinInet AES-GCM native section loader
  crit: hostile
  conf: 0.98
  attack: T1620
  mbc: B0032
  all:
  - id: micro-behaviors/communications/http/get::wininet-http-flow
  - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-aes-gcm-decrypt
  - id: micro-behaviors/mem/create/fileless::nt-section-map-exec-primitives
  - id: metadata/signed/trust-level::unsigned
  any:
  - id: metadata/binary/section/metrics::high-entropy-rdata-section
  - id: metadata/binary/section/metrics::rdata-ratio-over-2pt5x
  - id: firefox-139-windows-user-agent
  needs: 2
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/metrics/structural::many-exports

- id: self-installing-wininet-native-section-loader
  desc: Self-installing WinInet native section loader
  crit: hostile
  conf: 0.98
  all:
  - id: wininet-bcrypt-gcm-native-section-loader
  - id: objectives/persistence/login/self-install/copy::windows-appdata-self-copy
  any:
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
  - id: micro-behaviors/process/debug/detect::check-remote-debugger
  - id: objectives/privilege-escalation/elevation-control/uac-bypass/com::com-elevation-moniker-binding
  unless:
  - id: metadata/signed/platform/
