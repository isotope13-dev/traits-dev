defaults:
  platforms: [windows]
  for: [pe]
  arch: [x86-64]
  attack: "T1620"
  mbc: "B0032"
composite_rules:
  - id: kernel-registry-triggered-pe-loader
    desc: Kernel registry-triggered PE loader
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/kernel/callback::registry-thread-callback-lifecycle
      - id: micro-behaviors/os/registry/access::kernel-reg-binary-setvalue-size-filter
      - id: objectives/command-and-control/backdoor/loader/native-reflect::x64-manual-pe-mapper
  - id: sparse-kernel-callback-pe-loader
    desc: Sparse kernel callback PE loader
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/os/kernel/callback::registry-and-thread-callbacks
      - id: objectives/command-and-control/backdoor/loader/native-reflect::x64-manual-pe-mapper
      - id: metadata/binary/symbols/imports::pe-imports-max-six
      - id: metadata/binary/symbols/imports::pe-single-import-dll
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/binary/framework::dotnet-assembly
