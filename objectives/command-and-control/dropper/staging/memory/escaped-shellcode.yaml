# A shellcode blob emitted into source/script text as "\xNN" escapes that
# commits its own read/write memory and resolves the allocator through a PEB
# walk — the staging half of a self-contained in-memory loader.
#
# Shape this detects: the blob carries an opaque payload (typically packed or
# encrypted, so nothing else in the file is matchable), commits an RW region
# sized for the unpacked image, reconstructs the payload into it, and hands
# control over. Nothing touches disk, so there is no dropped file to scan.
#
# The RW commit is deliberate: a loader that unpacks first and only then makes
# the region executable (or maps it as an image) never allocates RWX, which is
# what most injection rules key on. Pairing the commit with the PEB walk is what
# separates it from ordinary buffer allocation — code that legitimately commits
# memory calls VirtualAlloc by name through the import table, and has no reason
# to locate kernel32 by hand.
defaults:
  platforms: [windows]
  for: [c, cpp, python, powershell, ruby, php, javascript]
  attack: T1027.002
  mbc: B0023
composite_rules:
  - id: escaped-x86-shellcode-memory-stager
    desc: Escaped x86 shellcode stages payload in memory
    crit: hostile
    conf: 0.93
    all:
      - id: micro-behaviors/data/embedded/payload/array::quoted-byte-escape-rows
      - id: micro-behaviors/os/api-resolution/hash-based::escaped-x86-teb-self-ref
      - id: micro-behaviors/mem/protect/modify::escaped-x86-virtualalloc-rw-commit
    downgrade:
      any:
        - id: well-known/tool/offensive/payload-corpus::payloadsallthethings-reference
