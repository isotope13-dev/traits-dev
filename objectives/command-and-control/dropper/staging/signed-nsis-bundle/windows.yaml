defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0024
composite_rules:
  - id: microsoft-nsis-injector-bundle
    desc: Microsoft signed NSIS injector bundle
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::many-pe-embedded
      - id: metadata/binary/layout::overlay-over-1mb
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/installer/script::nsis-plugin-bundle
      - id: micro-behaviors/process/inject/runtime::write-process-memory-dup
      - id: micro-behaviors/process/inject/runtime::create-remote-thread-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    any:
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: metadata/binary/layout::mavinject32-name
      - id: metadata/binary/layout::tnameserv-name
      - id: metadata/binary/installer/script::nsis-uac-bridge
    needs: 2

  - id: signed-overlay-stage-bundle
    desc: Signed overlay multistage PE bundle
    crit: suspicious
    conf: 0.97
    all:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: metadata/binary/layout::overlay-over-1mb
      - id: metadata/binary/layout::overlay-over-35pct
    any:
      - id: metadata/binary/layout::mavinject32-name
      - id: metadata/binary/layout::tnameserv-name
      - id: metadata/binary/installer/script::nsis
      - id: objectives/anti-static/polyglot/format::pe-multi-embedded-payload-container
    needs: 2

  - id: nsis-sideload-runonce-stage-bundle
    desc: NSIS sideload bundle with RunOnce persistence
    crit: hostile
    conf: 0.995
    attack: T1574.002,T1027.009
    all:
      - id: metadata/binary/installer/script::nsis
      - id: metadata/binary/layout::multiple-pe-embedded
      - id: objectives/command-and-control/dropper/sideload::sideload-target-search
    any:
      - id: objectives/persistence/login/startup/registry::runonce-word
      - id: objectives/persistence/login/registry/autostart::run-once-key
      - id: objectives/persistence/login/registry/run-key::masquerade-trusted-installer
      - id: metadata/binary/layout::low-entropy-large-overlay
      - id: micro-behaviors/os/privilege/token::shutdown-privilege-name
    needs: 3
