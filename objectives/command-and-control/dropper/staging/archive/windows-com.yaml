defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: temp-zip-name
    desc: Temporary ZIP filename
    crit: component
    conf: 0.8
    if:
      type: string_value
      exact: "temp.zip"
composite_rules:
  - id: com-textfile-dropper
    desc: COM text file staging behavior
    crit: suspicious
    conf: 0.88
    attack: "T1105"
    all:
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: micro-behaviors/os/fs/write::create-text-file-api
  - id: com-zip-extraction
    desc: COM ZIP extraction behavior
    crit: suspicious
    conf: 0.9
    attack: "T1105"
    all:
      - id: micro-behaviors/os/com/object::shell-application-progid
      - id: micro-behaviors/os/com/object::shell-namespace-copyhere
    any:
      - id: temp-zip-name
      - id: objectives/command-and-control/dropper/staging/archive::zip-ext
