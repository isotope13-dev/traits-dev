defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  attack: T1105
  mbc: E1105
  for: [scripts, binaries]
traits:
  - id: tar-exec-path-temp
    desc: tar extract into temp-like path
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\btar\b.{0,15}-C.{0,15}/(tmp|var/tmp|dev/shm|run)\b'
  - id: tar-exec-path-bin
    desc: tar extract into executable path
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\btar\b.{0,15}-C.{0,15}/(usr/(local/)?bin|bin|sbin)\b'
  - id: tar-exec-path-persist
    desc: tar extract into persistence path
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\btar\b.{0,15}-C.{0,15}/etc/(init\.d|cron)\b'
  - id: tar-exec-path-local
    desc: tar extract into current directory
    crit: component
    conf: 0.72
    if:
      type: text
      regex: '\btar\b.{0,15}-C.{0,15}\./'
  - id: tar-extract-x
    desc: tar archive extraction (x flag)
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: tar\s+-?x[fzv]*
    unless:
      - type: text
        substr: tar xf -
      - type: text
        substr: '"comment":"buildkit.dockerfile.v0"'
  - id: tar-extract-word
    desc: tar archive extraction (word)
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      substr: tar extract
    not:
      - substr: tar extract failed
  - id: tar-gzip-extract
    desc: tar.gz extraction command
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: tar.{0,20}[zx].{0,40}\.tar\.gz
    unless:
      - type: text
        substr: '"comment":"buildkit.dockerfile.v0"'
  - id: unzip-command
    desc: unzip archive extraction
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: unzip\s+-|extract.{0,15}\.zip
  - id: tar-temp-archive
    desc: tar extracts temp archive
    crit: suspicious
    conf: 0.65
    if:
      type: string_literal
      regex: tar\s+x.{0,80}(temp|tmp).{0,15}\.(tar|zip|gz)
    unless:
      - type: text
        substr: '"comment":"buildkit.dockerfile.v0"'
  - id: unzip-temp-archive
    desc: unzip extracts temp archive
    crit: suspicious
    conf: 0.65
    if:
      type: string_literal
      regex: unzip.{0,80}(temp|tmp).{0,15}\.(tar|zip|gz)
  - id: hidden-archive-path
    desc: Hidden path archive extraction
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: \/\.[^.].{0,20}\.(tar|gz|zip)
    unless:
      - type: basename
        regex: \.map$
  - id: extract-to-temp
    desc: Extract payload to temp
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: (tempdir|gettempdir).{0,15}extract|extract.{0,15}tempdir
composite_rules:
  - id: tar-execute
    desc: tar extract and execute
    crit: suspicious
    conf: 0.85
    any:
      - id: tar-exec-path-temp
      - id: tar-exec-path-bin
      - id: tar-exec-path-persist
      - id: tar-exec-path-local
    unless:
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
      - id: objectives/anti-static/obfuscation/code-metrics/structure::buildkit-dockerfile-v0
    downgrade:
      any:
        - id: well-known/tool/sysadmin/kubernetes
  - id: tar-extract
    desc: tar archive extraction
    crit: component
    conf: 0.7
    any:
      - id: tar-extract-x
      - id: tar-extract-word
      - id: micro-behaviors/data/archive/extract/tar::tar-extract
  - id: temp-archive-path
    desc: Temporary directory archive
    crit: suspicious
    conf: 0.7
    any:
      - id: tar-temp-archive
      - id: unzip-temp-archive
  - id: chmod-exec-staged-target
    desc: chmod makes staged file executable
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-local-file
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-tmp-file
  - id: archive-extraction
    desc: Archive extraction capability
    crit: notable
    conf: 0.75
    needs: 2
    any:
      - id: tar-extract
      - id: tar-gzip-extract
      - id: unzip-command
      - id: micro-behaviors/data/archive/extract/zip::python-zipfile-class
  - id: payload-extraction
    desc: Payload extraction behavior
    crit: suspicious
    conf: 0.85
    for:
      - python
      - shell
    needs: 2
    any:
      - id: temp-archive-path
      - id: hidden-archive-path
      - id: extract-to-temp
    all:
      - id: archive-extraction
  - id: extract-and-execute
    desc: Extract and execute payload (tar extract then exec)
    crit: suspicious
    conf: 0.9
    attack: T1204
    for:
      - python
      - javascript
    all:
      - id: archive-extraction
      - id: tar-execute
  - id: extract-and-chmod
    desc: Extract archive and make executable
    crit: suspicious
    conf: 0.85
    attack: T1204
    for:
      - shell
    all:
      - id: chmod-exec-staged-target
    any:
      - id: unzip-command
      - id: tar-extract
    unless:
      - id: micro-behaviors/data/text/app
    downgrade:
      any:
        - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
        - id: metadata/package/testing/presence/platform_suites::gnu-coreutils-test
