defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  attack: T1105
  mbc: E1105
  for: [scripts, binaries]
traits:
  - id: tar-exec-path-temp
    desc: tar extract into temp-like path
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\btar\b.{0,15}-C.{0,15}/(tmp|var/tmp|dev/shm|run)\b'
  - id: tar-exec-path-bin
    desc: tar extract into executable path
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\btar\b.{0,15}-C.{0,15}/(usr/(local/)?bin|bin|sbin)\b'
  - id: tar-exec-path-persist
    desc: tar extract into persistence path
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\btar\b.{0,15}-C.{0,15}/etc/(init\.d|cron)\b'
  - id: tar-exec-path-local
    desc: tar extract into current directory
    crit: component
    conf: 0.72
    if:
      type: text
      regex: '\btar\b.{0,15}-C.{0,15}\./'
  - id: hidden-archive-path
    desc: Hidden path archive extraction
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: \/\.[^.].{0,20}\.(tar|gz|zip)
  - id: extract-to-temp
    desc: Extract payload to temp
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: (tempdir|gettempdir).{0,15}extract|extract.{0,15}tempdir
composite_rules:
  - id: tar-execute
    desc: tar extract and execute
    crit: suspicious
    conf: 0.85
    any:
      - id: tar-exec-path-temp
      - id: tar-exec-path-bin
      - id: tar-exec-path-persist
      - id: tar-exec-path-local
    unless:
      - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
      - id: objectives/anti-static/obfuscation/code-metrics/structure::buildkit-dockerfile-v0
      - id: well-known/app/reg-devshell::developer-shell-application
    downgrade:
      any:
        - id: well-known/tool/sysadmin/kubernetes
  - id: payload-extraction
    desc: Payload extraction behavior
    crit: suspicious
    conf: 0.85
    for:
      - python
      - shell
    needs: 2
    any:
      - id: micro-behaviors/data/archive/extract/tar::tar-temp-archive-command
      - id: hidden-archive-path
      - id: extract-to-temp
      - id: micro-behaviors/data/archive/extract/zip::python-unzip-temp-archive-command
    all:
      - id: micro-behaviors/data/archive/extract/capability::archive-extraction-capability
  - id: extract-and-execute
    desc: Extract archive then execute
    crit: suspicious
    conf: 0.9
    attack: T1204
    for:
      - python
      - javascript
    all:
      - id: micro-behaviors/data/archive/extract/capability::archive-extraction-capability
      - id: tar-execute
