defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  attack: T1105
  mbc: E1105
  for: [scripts, binaries]
traits:
  - id: tar-extract-x
    desc: tar archive extraction (x flag)
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: tar\s+-?x[fzv]*
    unless:
      - type: text
        substr: tar xf -
      - type: text
        substr: '"comment":"buildkit.dockerfile.v0"'
  - id: tar-extract-word
    desc: tar archive extraction (word)
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      substr: tar extract
    not:
      - substr: tar extract failed
  - id: tar-extract-command
    desc: tar archive extraction command
    crit: notable
    conf: 0.74
    for: [batch, powershell, shell, text]
    if:
      type: text
      regex: (?i)\btar(\.exe)?\s+-?x[fzv]*\s+\S+
    unless:
      - type: text
        substr: tar xf -
      - type: text
        substr: '"comment":"buildkit.dockerfile.v0"'
  - id: tar-gzip-extract
    desc: tar.gz extraction command
    crit: component
    conf: 0.7
    if:
      type: string_literal
      regex: tar.{0,20}[zx].{0,40}\.tar\.gz
    unless:
      - type: text
        substr: '"comment":"buildkit.dockerfile.v0"'
  - id: tar-execute
    desc: tar extract and execute
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \btar\b.{0,15}-C.{0,15}(/|\./|exec\b)
    unless:
      - type: basename
        regex: \.map$
      - type: text
        substr: '"comment":"buildkit.dockerfile.v0"'
    downgrade:
      any:
        - id: well-known/tool/sysadmin/kubernetes
  - id: unzip-command
    desc: unzip archive extraction
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: unzip\s+-|extract.{0,15}\.zip
  - id: zipfile-module
    desc: Python zipfile module
    crit: component
    conf: 0.7
    if:
      type: string_literal
      substr: zipfile
  - id: tar-temp-archive
    desc: tar extracts temp archive
    crit: suspicious
    conf: 0.65
    if:
      type: string_literal
      regex: tar\s+x.{0,80}(temp|tmp).{0,15}\.(tar|zip|gz)
    unless:
      - type: text
        substr: '"comment":"buildkit.dockerfile.v0"'
  - id: unzip-temp-archive
    desc: unzip extracts temp archive
    crit: suspicious
    conf: 0.65
    if:
      type: string_literal
      regex: unzip.{0,80}(temp|tmp).{0,15}\.(tar|zip|gz)
  - id: hidden-archive-path
    desc: Hidden path archive extraction
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: \/\.[^.].{0,20}\.(tar|gz|zip)
    unless:
      - type: basename
        regex: \.map$
  - id: extract-to-temp
    desc: Extract payload to temp
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: (tempdir|gettempdir).{0,15}extract|extract.{0,15}tempdir
composite_rules:
  - id: tar-extract
    desc: tar archive extraction
    crit: component
    conf: 0.7
    any:
      - id: tar-extract-x
      - id: tar-extract-word
      - id: tar-extract-command
  - id: temp-archive-path
    desc: Temporary directory archive
    crit: suspicious
    conf: 0.7
    any:
      - id: tar-temp-archive
      - id: unzip-temp-archive
  - id: archive-extraction
    desc: Archive extraction capability
    crit: notable
    conf: 0.75
    needs: 2
    any:
      - id: tar-extract
      - id: tar-gzip-extract
      - id: unzip-command
      - id: zipfile-module
  - id: payload-extraction
    desc: Payload extraction behavior
    crit: suspicious
    conf: 0.85
    for:
      - python
      - shell
    needs: 2
    any:
      - id: temp-archive-path
      - id: hidden-archive-path
      - id: extract-to-temp
    all:
      - id: archive-extraction
  - id: extract-and-execute
    desc: Extract and execute payload (tar extract then exec)
    crit: suspicious
    conf: 0.9
    attack: T1204
    for:
      - python
      - javascript
    all:
      - id: archive-extraction
      - id: tar-execute
  - id: extract-and-chmod
    desc: Extract archive and make executable
    crit: suspicious
    conf: 0.85
    attack: T1204
    for:
      - shell
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
    any:
      - id: unzip-command
      - id: tar-extract
    unless:
      - id: micro-behaviors/data/text/app
    downgrade:
      any:
        - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
        - id: metadata/package/testing/presence/platform_suites::gnu-coreutils-test
