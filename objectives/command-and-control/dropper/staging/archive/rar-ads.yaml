defaults:
  platforms: [windows]

composite_rules:
  - id: rar-ads-traversal-programdata-staging
    desc: RAR ADS traversal stages ProgramData payloads
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/file/magic/identity::rar-v5
      - id: micro-behaviors/data/archive/rar::repeated-ads-parent-traversal
      - id: micro-behaviors/data/archive/rar::programdata-member-paths
