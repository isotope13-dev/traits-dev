defaults:
  platforms: [unix, windows]
  for: [python, go, rust, php]
  attack: T1105
  mbc: E1105
traits:
- id: json-downloadurl-field
  # Component-only — "downloadUrl" appears in countless benign contexts
  # (asset metadata, embed players, software updaters). Surfaces only via
  # the staged-archive-platform-loader / google-drive-archive-loader chains.
  desc: '"downloadUrl" field reference'
  crit: component
  conf: 0.9
  if:
    type: text
    substr: downloadUrl
- id: staged-zip-archive-name
  desc: Stages named ZIP payload archive
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: "(ecw_update|logbundle_tmp)\\.zip"
- id: contagious-temp-extract-dir
  desc: Uses campaign temp extraction directory
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: 410BB449A-72C6-4500-9765-ACD04JBV827V32V
- id: platform-payload-names
  desc: References platform payload filenames
  crit: component
  conf: 0.94
  count_min: 2
  if:
    type: text
    regex: "com\\.apple\\.systemevents|systemd-resolved"
- id: google-drive-direct-rewrite
  desc: Rewrites Google Drive direct download
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: "drive\\.google\\.com/file/d/[\\s\\S]{0,260}drive\\.usercontent\\.google\\.com/download"
- id: platform-query-download-api
  desc: Queries platform-specific download API
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: "getAddress\\?platform=|[?&]platform=[^=\\s\"']{1,20}"
composite_rules:
- id: staged-archive-platform-loader
  desc: Platform archive loader
  crit: hostile
  conf: 0.98
  all:
  - id: json-downloadurl-field
  - id: staged-zip-archive-name
  any:
  - id: contagious-temp-extract-dir
  - id: platform-payload-names
  - id: google-drive-direct-rewrite
  - id: platform-query-download-api
  needs: 2
- id: google-drive-archive-loader
  desc: Google Drive archive loader
  crit: hostile
  conf: 0.97
  all:
  - id: google-drive-direct-rewrite
  - id: staged-zip-archive-name
  any:
  - id: json-downloadurl-field
  - id: platform-payload-names
  - id: contagious-temp-extract-dir
