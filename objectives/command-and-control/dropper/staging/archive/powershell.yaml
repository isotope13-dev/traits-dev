defaults:
  platforms: [windows]
  for: [powershell, scripts, binaries]
  attack: T1204.002
traits:
  - id: recursive-lure-zip-search
    desc: Recursive lure archive search
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: (?is)where(\.exe)?\s+/r\s+\$env:USERPROFILE.{0,160}\.zip
  - id: recycle-bin-zip-stage
    desc: Recycle Bin ZIP staging
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: (?is)\$RECYCLE\.BIN.{0,160}Rename-Item.{0,160}\.zip
  - id: hidden-powershell-expanded-archive
    desc: Hidden PowerShell expanded archive
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: (?is)Start-Process.{0,80}-Wi.{0,30}Hidden.{0,40}powershell
  - id: powershell-expand-archive-programdata
    desc: PowerShell expands archive into ProgramData
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: (?is)Expand-Archive.{0,260}(C:\\ProgramData|%ProgramData%|\$env:ProgramData)
  - id: powershell-download-archive-tool
    desc: PowerShell archive download tool marker
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: (?i)(DownloadFile|Invoke-WebRequest|iwr|curl)

  - id: powershell-archive-extension
    desc: PowerShell archive file extension marker
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: (?i)\.(zip|7z|rar)

  - id: powershell-archive-extract
    desc: PowerShell archive extraction command marker
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: (?i)(Expand-Archive|tar\s+-|7z)

  - id: powershell-archive-execute
    desc: PowerShell executes archive payload command
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: (?i)(Start-Process|Invoke-Item|&\s*['"][^'"]{1,120}\.exe)
composite_rules:
  - id: powershell-download-archive-execute
    desc: PowerShell downloads archive then executes
    crit: suspicious
    conf: 0.92
    all:
      - id: powershell-download-archive-tool
      - id: powershell-archive-extension
      - id: powershell-archive-extract
      - id: powershell-archive-execute

  - id: archive-lnk-hidden-powershell-stage
    desc: Archive LNK hidden PowerShell stage
    crit: hostile
    conf: 0.97
    needs: 2
    any:
      - id: recursive-lure-zip-search
      - id: recycle-bin-zip-stage
      - id: hidden-powershell-expanded-archive
  - id: powershell-cloud-archive-programdata-exec
    desc: PowerShell cloud archive ProgramData execution
    crit: hostile
    conf: 0.96
    attack: T1105
    all:
      - id: powershell-expand-archive-programdata
      - id: powershell-download-archive-execute
    any:
      - id: objectives/command-and-control/infrastructure/cloud
