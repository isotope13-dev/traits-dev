defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: archive-password-option
    desc: Archive password option in extraction call
    crit: component
    conf: 0.5
    unless:
      - id: metadata/library/runtime/
      - id: metadata/build/bundler::has-sourcemap
      - id: metadata/library/structure::javascript-source-map-file
    if:
      type: tree-sitter
      kind: call
      regex: '(?is)\b(extract(Full|AllTo)|unzip)\b[^)]{0,240}\bpassword\s*:'
  - id: archive-password-query
    desc: Archive password query parameter
    crit: component
    conf: 0.5
    unless:
      - id: metadata/build/bundler::has-sourcemap
      - id: metadata/library/structure::javascript-source-map-file
    if:
      type: literal
      regex: (^|[?&])password=
composite_rules:
  - id: archive-password-parameter
    desc: Archive password parameter
    crit: component
    conf: 0.65
    any:
      - id: archive-password-option
      - id: archive-password-query
  - id: passworded-archive-parameter
    desc: Passworded archive parameter
    crit: suspicious
    conf: 0.65
    near_bytes: 4096
    all:
      - id: archive-password-parameter
      - id: micro-behaviors/data/archive/extract/capability::archive-extraction-context
    unless:
      - id: well-known/app/opencode-swarm/
  - id: download-archive
    desc: Downloads archive from remote and writes it locally
    crit: suspicious
    conf: 0.85
    attack: T1105
    near_bytes: 4096
    all:
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/http/download/url::archive-url-reference
      - id: micro-behaviors/fs/write/file/direct::js-file-write
    unless:
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
      - id: metadata/library/structure::js-medium-minified-line
      - id: well-known/tool/development/action-download-artifact::source-tree
      - id: well-known/app/comfy-desktop::comfy-bootstrap-fetch-path
      - id: well-known/app/pulumi::github-action-retry-wrapper
      - id: micro-behaviors/communications/http/download/url::github-source-archive-url
      # The Cline source tree pins and fetches official ripgrep release assets
      # for its own cross-platform search helper.
      - id: well-known/tool/sysadmin/ripgrep::repository-marker
      - id: well-known/app/opensearch::tesseract-model-download-url
