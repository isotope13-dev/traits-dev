defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: extract-full
    desc: extractFull call
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      substr: extractFull
  - id: extract-call
    desc: extract() call
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: extract\(
  - id: extract-all-to
    desc: adm-zip extractAllTo call
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: extractAllTo
  - id: unzip-call
    desc: unzip reference
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      word: unzip
    downgrade:
      any:
        - id: metadata/library/lodash/
  - id: archive-password-option
    desc: Archive password option in extraction call
    crit: component
    conf: 0.5
    unless:
      - id: metadata/library/runtime/
      - id: metadata/build/bundler::has-sourcemap
      - id: metadata/library/structure::vscode-source-map-file
    if:
      type: tree-sitter
      kind: call
      regex: '(?is)\b(extract(Full|AllTo)|unzip)\b[^)]{0,240}\bpassword\s*:'
  - id: archive-password-query
    desc: Archive password query parameter
    crit: component
    conf: 0.5
    unless:
      - id: metadata/build/bundler::has-sourcemap
      - id: metadata/library/structure::vscode-source-map-file
    if:
      type: literal
      regex: (^|[?&])password=
  - id: binary-extensions-symbol
    desc: Binary extensions list symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: BINARY_EXTENSIONS
  - id: is-binary-extension-symbol
    desc: Binary extension classifier symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: isBinaryExtension
  - id: get-path-extension-symbol
    desc: Path extension helper symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: getPathExtension
  - id: zip-ext
    desc: .zip extension
    crit: component
    conf: 0.4
    if:
      type: string_literal
      exact: .zip
  - id: tar-ext
    desc: .tar extension
    crit: component
    conf: 0.4
    if:
      type: string_literal
      exact: .tar
composite_rules:
  - id: archive-password-parameter
    desc: Archive password parameter
    crit: component
    conf: 0.65
    any:
      - id: archive-password-option
      - id: archive-password-query
  - id: archive-context-indicator
    desc: Archive extraction context
    crit: component
    conf: 0.65
    any:
      - id: zip-ext
      - id: tar-ext
      - id: micro-behaviors/data/archive/format::application-zip-mime
      - id: extract-full
      - id: extract-call
      - id: extract-all-to
      - id: unzip-call
  - id: passworded-archive-parameter
    desc: Passworded archive parameter
    crit: suspicious
    conf: 0.65
    near_bytes: 4096
    all:
      - id: archive-password-parameter
      - id: archive-context-indicator
  - id: file-explorer-binary-extension-list
    desc: File explorer binary-extension classifier
    crit: notable
    conf: 0.9
    any:
      - id: binary-extensions-symbol
      - id: is-binary-extension-symbol
      - id: get-path-extension-symbol
  - id: download-zip
    desc: Downloads zip archive from remote
    crit: suspicious
    conf: 0.85
    attack: T1105
    near_bytes: 4096
    all:
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/http/download/url::archive-url-reference
      - id: micro-behaviors/fs/write/file/direct::js-file-write
    unless:
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
      - id: metadata/library/structure::js-medium-minified-line
      - id: well-known/tool/development/action-download-artifact::source-tree
