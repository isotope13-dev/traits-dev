defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: extract-full
    desc: extractFull call
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      substr: extractFull
  - id: extract-call
    desc: extract() call
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: extract\(
  - id: extract-all-to
    desc: adm-zip extractAllTo call
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: extractAllTo
  - id: unzip-call
    desc: unzip reference
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      word: unzip
    downgrade:
      any:
        - id: metadata/library/lodash/
  - id: password-colon
    desc: 'password: parameter'
    crit: component
    conf: 0.5
    unless:
      - id: metadata/library/runtime::next-edge-runtime-bundle
    if:
      type: string_literal
      substr: 'password:'
  - id: password-equals
    desc: password= parameter
    crit: component
    conf: 0.5
    if:
      type: string_literal
      regex: (^|[?&])password=
  - id: zip-ext
    desc: .zip extension
    crit: component
    conf: 0.4
    if:
      type: string_literal
      exact: .zip
  - id: 7z-ext
    desc: 7z archive file extension marker
    crit: suspicious
    conf: 0.4
    if:
      type: string_literal
      exact: .7z
  - id: tar-ext
    desc: .tar extension
    crit: component
    conf: 0.4
    if:
      type: string_literal
      exact: .tar
  - id: rar-ext
    desc: RAR archive file extension marker
    crit: suspicious
    conf: 0.4
    if:
      type: string_literal
      exact: .rar
  - id: application-zip-mime
    desc: application/zip MIME type
    crit: component
    if:
      type: string_literal
      substr: application/zip
composite_rules:
  - id: passworded-archive-parameter
    desc: Passworded archive parameter
    crit: suspicious
    conf: 0.65
    any:
      - id: password-colon
      - id: password-equals
  - id: archive-indicators
    desc: Archive file indicators
    crit: component
    any:
      - id: zip-ext
      - id: 7z-ext
      - id: tar-ext
      - id: application-zip-mime
  - id: download-zip
    desc: Downloads zip archive from remote
    crit: suspicious
    conf: 0.85
    attack: T1105
    near_bytes: 4096
    all:
      - id: micro-behaviors/communications/http/request/
      - id: archive-indicators
      - id: micro-behaviors/fs/write/file/direct::js-file-write
