# Archive file extension and extraction patterns
# Detects code referencing archive formats and extraction operations
# ATT&CK: T1105 (Ingress Tool Transfer), T1140 (Deobfuscate/Decode)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
traits:
  # === Archive extraction methods ===
  - id: extract-full
    desc: "extractFull call"
    crit: notable
    conf: 0.5
    if:
      type: string_value
      substr: "extractFull"
  - id: extract-call
    desc: "extract() call"
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: "extract\\("
  - id: unzip-call
    desc: "unzip reference"
    crit: notable
    conf: 0.5
    if:
      type: string_value
      word: "unzip"
    downgrade:
      any:
        - id: metadata/library/lodash
  - id: 7z-ref
    desc: "7z reference"
    crit: notable
    conf: 0.5
    if:
      type: string_value
      exact: "7z"
  # === Password-protected archive parameters ===
  - id: password-colon
    desc: "password: parameter"
    crit: notable
    conf: 0.5
    if:
      type: string_value
      substr: "password:"
  - id: password-equals
    desc: "password= parameter"
    crit: notable
    conf: 0.5
    if:
      type: string_value
      substr: "password="
  - id: p-flag
    desc: "-p flag"
    crit: notable
    conf: 0.4
    if:
      type: string_value
      exact: "-p"
  # === 7-zip atomic indicators ===
  - id: 7zip-bin-module
    desc: "7zip-bin module"
    crit: notable
    conf: 0.6
    attack: "T1140"
    if:
      type: string_value
      substr: "7zip-bin"
  - id: node-7z-module
    desc: "node-7z module"
    crit: notable
    conf: 0.6
    attack: "T1140"
    if:
      type: string_value
      substr: "node-7z"
  - id: path7za
    desc: "path7za reference"
    crit: notable
    conf: 0.6
    attack: "T1140"
    if:
      type: string_value
      substr: "path7za"
  # === Archive extension atomics ===
  - id: zip-ext
    desc: ".zip extension"
    crit: component
    conf: 0.4
    if:
      type: string_value
      exact: ".zip"
  - id: 7z-ext
    desc: ".7z extension"
    crit: notable
    conf: 0.4
    if:
      type: string_value
      exact: ".7z"
  - id: tar-ext
    desc: ".tar extension"
    crit: notable
    conf: 0.4
    if:
      type: string_value
      exact: ".tar"
  - id: rar-ext
    desc: ".rar extension"
    crit: notable
    conf: 0.4
    if:
      type: string_value
      exact: ".rar"
  # === Download atomic indicators ===
  - id: application-zip-mime
    desc: application/zip MIME type
    crit: component
    if:
      type: string_value
      substr: "application/zip"
composite_rules:
  # Archive indicators
  - id: archive-indicators
    desc: Archive file indicators
    crit: component
    any:
      - id: zip-ext
      - id: 7z-ext
      - id: application-zip-mime
  # Download zip composite - uses directory reference for HTTP and existing write composite
  - id: download-zip
    desc: Downloads zip archive from remote
    crit: notable
    conf: 0.85
    attack: "T1105"
    all:
      - id: micro-behaviors/communications/http/request
      - id: archive-indicators
      - id: micro-behaviors/fs/write/file::js-file-write
  - id: 7z-exe
    desc: "7z.exe reference"
    crit: notable
    conf: 0.6
    attack: "T1140"
    all:
      - id: 7z-ref
      - id: micro-behaviors/fs/path/extension::exe-dup
