defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
traits:
  - id: extract-full
    desc: extractFull call
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      substr: extractFull
  - id: extract-call
    desc: extract() call
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: extract\(
  - id: extract-all-to
    desc: adm-zip extractAllTo call
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: extractAllTo(
  - id: unzip-call
    desc: unzip reference
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      word: unzip
    downgrade:
      any:
        - id: metadata/library/lodash/
  - id: 7z-ref
    desc: 7z reference
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      exact: 7z
  - id: password-colon
    desc: 'password: parameter'
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      substr: 'password:'
  - id: password-equals
    desc: password= parameter
    crit: component
    conf: 0.5
    if:
      type: string_literal
      regex: (^|[?&])password=
  - id: p-flag
    desc: -p flag
    crit: baseline
    conf: 0.4
    if:
      type: string_literal
      exact: -p
  - id: 7zip-bin-module
    desc: 7zip-bin module
    crit: notable
    conf: 0.6
    attack: T1140
    if:
      type: string_literal
      substr: 7zip-bin
  - id: node-7z-module
    desc: node-7z module
    crit: notable
    conf: 0.6
    attack: T1140
    if:
      type: string_literal
      substr: node-7z
  - id: path7za
    desc: path7za reference
    crit: notable
    conf: 0.6
    attack: T1140
    if:
      type: string_literal
      substr: path7za
  - id: zip-ext
    desc: .zip extension
    crit: component
    conf: 0.4
    if:
      type: string_literal
      exact: .zip
  - id: 7z-ext
    desc: .7z extension
    crit: notable
    conf: 0.4
    if:
      type: string_literal
      exact: .7z
  - id: tar-ext
    desc: .tar extension
    crit: notable
    conf: 0.4
    if:
      type: string_literal
      exact: .tar
  - id: rar-ext
    desc: .rar extension
    crit: notable
    conf: 0.4
    if:
      type: string_literal
      exact: .rar
  - id: application-zip-mime
    desc: application/zip MIME type
    crit: component
    if:
      type: string_literal
      substr: application/zip
composite_rules:
  - id: passworded-archive-parameter
    desc: Passworded archive parameter
    crit: notable
    conf: 0.65
    any:
      - id: password-colon
      - id: password-equals
  - id: archive-indicators
    desc: Archive file indicators
    crit: component
    any:
      - id: zip-ext
      - id: 7z-ext
      - id: application-zip-mime
  - id: download-zip
    desc: Downloads zip archive from remote
    crit: notable
    conf: 0.85
    attack: T1105
    all:
      - id: micro-behaviors/communications/http/request/
      - id: archive-indicators
      - id: micro-behaviors/fs/write/file::js-file-write
  - id: 7z-exe
    desc: 7z.exe reference
    crit: notable
    conf: 0.6
    attack: T1140
    all:
      - id: 7z-ref
      - id: micro-behaviors/fs/path/extension::exe-dup
