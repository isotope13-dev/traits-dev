defaults:
  platforms: [windows]
  for: [powershell]
  attack: "T1105,T1027.009"
  mbc: "B0030,B0032"

traits:
  - id: extracted-stage-hidden-attribute
    desc: PowerShell hides extracted archive file
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?is)\b(ExtractToFile|Expand-Archive)\b.{0,500}\.Attributes\s*=.{0,100}\bHidden\b'

composite_rules:
  - id: hidden-archive-download-dropper
    desc: Downloads extracts and hides archive payload
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/download/url::archive-url-reference-a
      - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
      - id: micro-behaviors/data/archive/extract/zip::zipfile-openread
      - id: micro-behaviors/data/archive/extract/zip::powershell-extract-to-file
      - id: extracted-stage-hidden-attribute
      - id: micro-behaviors/process/create/start-process::start-process-filepath

  - id: logon-persistence-for-dropped-payload
    desc: Dropped payload gains logon persistence
    crit: hostile
    conf: 0.99
    attack: "T1547.001,T1053.005"
    all:
      - id: objectives/persistence/login/registry/autostart::powershell-hkcu-run-path
      - id: objectives/persistence/login/scheduled-task/cli::schtasks-onlogon-trigger
      - id: micro-behaviors/process/create/start-process::start-process-filepath
