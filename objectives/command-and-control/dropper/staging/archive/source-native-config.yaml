defaults:
  platforms: [unix, windows]
  for: [zip]
  attack: T1105
  mbc: E1105

composite_rules:
  - id: source-archive-cross-platform-native-stage
    desc: Source archive stages cross-platform native payloads
    crit: hostile
    conf: 0.9
    ref: sha256:2b9abb9bb2abc5158ee389aff85055f397ce874a57b5ac9d807fa6c527a949bd
    scope: archive
    all:
      - id: metadata/package/quality/source::source-archive-member
      - id: metadata/build/archive::github-source-root-windows-executable-entry
      - id: metadata/build/archive::archive-pgp-config-entry
    any:
      - id: metadata/build/archive::github-source-root-linux-binary-entry
      - id: metadata/build/archive::github-source-root-macos-binary-entry
