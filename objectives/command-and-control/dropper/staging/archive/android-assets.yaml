defaults:
  platforms: [android]
  for: [apk, zip]
  mbc: B0024
  attack: T1027.002

traits:
  - id: apk-b4a-bal-asset
    desc: APK bundles Basic4Android BAL screen assets
    crit: component
    conf: 0.86
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^assets/[^/]{1,32}\\.bal$"

  - id: apk-hoal-even-asset
    desc: APK hides opaque payload under assets/hoal/even
    crit: component
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      exact: assets/hoal/even

  - id: apk-mbm-opaque-assets
    desc: APK carries an MBM-named opaque asset
    crit: component
    conf: 0.84
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^assets/[^/]+\\.mbm$"

  - id: apk-large-extensionless-asset
    desc: APK carries a large extensionless asset blob
    crit: component
    conf: 0.84
    size_min: 250000
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^assets/([^/.]+|[^/]+/[^/.]+)$"

  - id: apk-obfuscated-long-resource-names
    desc: APK resources use long random-looking names
    crit: component
    conf: 0.86
    count_min: 8
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^res/(layout|xml|drawable|mipmap[^/]*)/[a-z]{7,14}\\.(xml|png|jpg)$"

  - id: apk-device-admin-resource
    desc: APK declares device-admin resource XML
    crit: component
    conf: 0.88
    if:
      type: value
      path: "archive.members[*].path"
      exact: res/xml/device_admin_sample.xml

  - id: apk-lock-screen-layout
    desc: APK includes lock-screen UI layout
    crit: component
    conf: 0.86
    if:
      type: value
      path: "archive.members[*].path"
      regex: "^res/layout/(lock_screen|main_uninstall_admin_device)\\.xml$"

composite_rules:
  - id: apk-b4a-firebase-stager
    desc: APK combines Firebase/GMS client modules with Basic4Android asset staging
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: apk-b4a-bal-asset
      - id: objectives/command-and-control/dropper/staging/encrypted::apk-okhttp-publicsuffix-data

  - id: apk-hoal-opaque-asset-stager
    desc: APK hides an opaque payload in the assets/hoal/even location
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: apk-hoal-even-asset
      - id: apk-large-extensionless-asset

  - id: apk-mbm-opaque-asset-stager
    desc: APK combines an MBM-named asset with a large opaque asset blob
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: apk-mbm-opaque-assets
      - id: apk-large-extensionless-asset

  - id: apk-obfuscated-resource-stager
    desc: APK resource table uses long random-looking resource names
    crit: suspicious
    conf: 0.93
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: apk-obfuscated-long-resource-names

  - id: apk-device-admin-lockscreen
    desc: APK packages device-admin and lock-screen UI resources
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/package/files/mobile-package::android-apk-archive-layout
      - id: apk-device-admin-resource
      - id: apk-lock-screen-layout
