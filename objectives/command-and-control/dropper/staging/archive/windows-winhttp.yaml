defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1105
traits:
  - id: hardcoded-http-zip-url
    desc: Hardcoded HTTP ZIP payload URL
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: (?i)^https?://[^\\s]{4,220}\\.zip$
  - id: branded-application-zip-url
    desc: Branded application ZIP delivery URL
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: (?i)^https?://.{0,180}(application|setup|update).{0,180}\\.zip$
  - id: remote-png-lure-url
    desc: Remote PNG lure or branding URL
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: (?i)^https?://[^\\s]{4,220}\\.png$
composite_rules:
  - id: winhttp-zip-temp-execute
    desc: WinHTTP ZIP downloader stages and executes payload
    crit: suspicious
    conf: 0.97
    mbc: B0024
    size_max: 5242880
    unless:
      - id: metadata/binary/installer::known-benign-installer
      - id: metadata/signed/platform::microsoft
      - id: well-known/lib/wine::wine-runtime-component
    all:
      - id: micro-behaviors/communications/http/client::winhttp-downloader-flow
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/fs/file/write::write-file
    any:
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/fs/file/move::move-file-ex
      - id: micro-behaviors/fs/temp/directory::get-temp-file-name
      - id: hardcoded-http-zip-url
      - id: branded-application-zip-url
      - id: remote-png-lure-url
      - id: objectives/discovery/system/locale::windows-locale-fingerprint
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/metrics::many-imports
