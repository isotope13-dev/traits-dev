defaults:
  platforms: [windows]
  for: [batch, powershell, text]
  attack: T1105

traits:
  - id: tar-extract-to-appdata
    desc: tar extracts archive into AppData
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)\btar(\.exe)?\s+-C\s+%APPDATA%\s+-x[a-z]*f\s+\S{1,80}'

  - id: appdata-exe-launch
    desc: Launches executable from AppData
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)%APPDATA%\\[^"''\s&|]{1,80}\\[^"''\s&|]{1,80}\.exe\b'

  - id: explorer-decoy-office-document-open
    desc: Opens office decoy document with Explorer
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bexplorer(\.exe)?\s+"?[^"&|]{1,120}\.(pdf|docx?|xlsx?|pptx?)"?'

  - id: explorer-decoy-image-open
    desc: Opens image decoy with Explorer
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '(?i)\bexplorer(\.exe)?\s+"?[^"&|]{1,120}\.(jpg|jpeg|png)"?'

composite_rules:
  - id: explorer-decoy-document-open
    desc: Opens decoy document with Explorer
    crit: suspicious
    conf: 0.88
    any:
      - id: explorer-decoy-office-document-open
      - id: explorer-decoy-image-open

  - id: appdata-tar-decoy-installer
    desc: AppData tar extraction with decoy launch
    crit: hostile
    conf: 0.97
    all:
      - id: tar-extract-to-appdata
      - id: appdata-exe-launch
    any:
      - id: explorer-decoy-document-open
      - id: objectives/evasion/masquerade/extension::document-extension-lnk-masquerade
