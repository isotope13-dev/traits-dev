defaults:
  platforms: [windows]
  for: [pe, batch, powershell]
  attack: T1105
  mbc: B0030

traits:
  - id: github-release-7z-payload-url
    desc: GitHub release 7z payload
    crit: component
    conf: 0.94
    ref: sha256:4c666890a558a284ac2f14950f096f255f622b9b4e32771d17f4667d63d2847d
    if:
      type: text
      regex: 'https://github\.com/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+/releases/download/[^"''\s]{1,220}\.7z\b'
      case_insensitive: true

  - id: github-release-7zr-extractor-url
    desc: GitHub release 7zr extractor
    crit: component
    conf: 0.92
    ref: sha256:4c666890a558a284ac2f14950f096f255f622b9b4e32771d17f4667d63d2847d
    if:
      type: text
      regex: 'github\.com/.{1,80}/releases/download/.{1,80}/7zr\.exe\b'
      case_insensitive: true

  - id: sevenzip-password-extract-flag
    desc: Passworded 7z extraction flag
    crit: component
    conf: 0.9
    ref: sha256:4c666890a558a284ac2f14950f096f255f622b9b4e32771d17f4667d63d2847d
    if:
      type: text
      regex: '(^|[\s"''])-p[^"''\s]{4,64}\s+-y\b'
      case_insensitive: true

composite_rules:
  - id: github-passworded-7z-stager
    desc: GitHub passworded 7z stager
    crit: hostile
    conf: 0.98
    ref: sha256:4c666890a558a284ac2f14950f096f255f622b9b4e32771d17f4667d63d2847d
    all:
      - id: github-release-7z-payload-url
      - id: github-release-7zr-extractor-url
      - id: sevenzip-password-extract-flag
    any:
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::download
      - id: micro-behaviors/process/create/spawn::create-process-a
