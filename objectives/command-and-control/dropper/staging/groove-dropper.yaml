defaults:
  platforms: [windows]
  for: [pe]

composite_rules:
  - id: groove-migrator-dropper-payloads
    desc: Unsigned PE masquerading as Microsoft dropping multiple payloads
    crit: hostile
    conf: 0.98
    attack: T1027.009
    all:
      - id: metadata/binary/metrics::embedded-pe-three-plus
      - id: objectives/anti-analysis/emulator-detect::genuineintel
      - id: micro-behaviors/fs/memory/mmap::create-file-mapping-w-import
      - id: metadata/signed::unsigned
    any:
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
      - id: objectives/command-and-control/dropper/staging/signed-bundle::groove-migrator-host
