defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: ocra-c2-hostile
    desc: OCRA packed executable with C2 indicators
    crit: hostile
    conf: 1.0
    all:
      - id: objectives/anti-static/pack/ocra
    any:
      - id: objectives/command-and-control/infrastructure/ip/
      - id: objectives/command-and-control/infrastructure/domain/
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-elf
