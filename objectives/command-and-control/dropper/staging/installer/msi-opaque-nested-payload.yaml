defaults:
  platforms: [windows]
  for: [all]
  attack: T1036.005,T1027.009,T1204.002

composite_rules:
  - id: msi-opaque-brand-oversized-ai-dropper
    desc: Oversized opaque-brand AI MSI dropper
    crit: hostile
    conf: 0.98
    scope: outer
    size_min: 40000000
    all:
      - id: metadata/package/files/msi::msi-office-opaque-product-brand
      - id: metadata/file/profile/identity::msi-bytes-advanced-installer-product
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family::known-benign-installer
