# Stager Detection
# Detects minimal stagers and shellcode wrappers
# ATT&CK: T1105 (Ingress Tool Transfer)
defaults:
  platforms: [linux, unix, android]
  for: [elf]
  crit: hostile
  mbc: "B0024" # Software Stager
  attack: "T1105"
composite_rules:
  # Helper: Network syscalls
  - id: arm-network-syscalls
    desc: ARM direct network syscalls
    crit: suspicious
    any:
      - id: micro-behaviors/communications/socket/syscall::svc-socket
      - id: micro-behaviors/communications/socket/syscall::svc-connect
  # Helper: Structural anomalies
  # NOTE: Stripped binaries are normal for release builds. Require additional
  # indicators beyond just being stripped to flag as suspicious.
  - id: structural-anomalies
    desc: Suspicious binary structure
    crit: suspicious
    all:
      - id: metadata/binary/metrics/size::text-section-ratio-dominant
    any:
      - id: metadata/hardening/missing::minimal-hardening
  - id: tiny-network-stager
    desc: "Tiny network stager"
    crit: hostile
    all:
      - id: metadata/binary/metrics/size::tiny-elf
      - id: arm-network-syscalls
      - id: structural-anomalies
  - id: arm-direct-network-shellcode
    desc: "ARM direct network syscalls"
    crit: suspicious
    needs: 2
    any:
      - id: micro-behaviors/communications/socket/syscall::svc-socket
      - id: micro-behaviors/communications/socket/syscall::svc-connect

  - id: native-direct-network-syscalls
    desc: Native direct socket and connect syscalls
    crit: suspicious
    conf: 0.98
    any:
      - id: micro-behaviors/communications/socket/syscall::arm-direct-network-syscalls
      - id: micro-behaviors/communications/socket/syscall::arm-oabi-direct-network-syscalls
      - id: micro-behaviors/communications/socket/syscall::mips-direct-network-syscalls

  - id: native-world-writable-open
    desc: Native world-writable staged-file creation
    crit: suspicious
    conf: 0.98
    any:
      - id: micro-behaviors/fs/file/open::native-open-create-mode-0777-arm
      - id: micro-behaviors/fs/file/open::native-open-create-mode-0777-mips-be
      - id: micro-behaviors/fs/file/open::native-open-create-mode-0777-mips-le

  - id: native-http-file-stager
    desc: Tiny static native HTTP downloader writes staged file
    crit: hostile
    conf: 0.98
    attack: T1071.001,T1105
    size_max: 4096
    all:
      - id: metadata/binary/metrics/size::tiny-elf
      - id: metadata/hardening/missing::stripped-binary
      - id: metadata/binary/linking/static::elf-needed-libs-zero
      - id: micro-behaviors/communications/http/get::get
      - id: native-direct-network-syscalls
      - id: native-world-writable-open
  - id: tiny-sh-http-syscall-stager
    desc: Tiny stripped SuperH ELF HTTP syscall stager
    crit: suspicious
    conf: 0.97
    attack: T1071.001,T1105
    all:
      - id: metadata/binary/metrics/size::tiny-elf
      - id: metadata/hardening/missing::stripped-binary
      - id: metadata/binary/linking/static::elf-needed-libs-zero
      - id: micro-behaviors/os/syscall/raw::sh-trapa-syscall
      - id: micro-behaviors/communications/http/get::get
