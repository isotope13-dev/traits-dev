defaults:
  platforms: [panos, appliance, unix]
  for: [javascript, typescript]
  attack: T1105

traits:
  - id: panos-node-payload-download
    desc: PAN-OS Node payload download
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'downloadPayload[\s\S]{0,260}payloadPath'

  - id: panos-node-downloaded-exec
    desc: PAN-OS Node downloaded exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'downloadedPayload[\s\S]{0,220}executePayload'

  - id: panos-node-temp-payload-exec
    desc: PAN-OS Node temp payload exec
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'downloadPayload\(fullUrl, dest\)[\s\S]{0,260}execSync'

composite_rules:
  - id: panos-node-download-execute
    desc: PAN-OS Node download execute
    crit: hostile
    conf: 0.98
    any:
      - id: panos-node-downloaded-exec
      - id: panos-node-temp-payload-exec
    all:
      - id: panos-node-payload-download
