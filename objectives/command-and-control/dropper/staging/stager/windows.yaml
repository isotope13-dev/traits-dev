defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: updater-branding-string
    desc: Updater-themed binary branding strings
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: (?i)\b(auto[_ -]?updater(\.exe|\.pdb)?|pc\s*app\s*store(\s*updater)?)\b
    downgrade:
      any:
        - id: well-known/lib/v8::isolate-symbol
    unless:
      - id: well-known/lib/v8::isolate-symbol
composite_rules:
  - id: obfuscated-winhttp-updater-stager
    desc: Obfuscated WinHTTP staged updater dropper
    crit: suspicious
    conf: 0.93
    attack: T1105
    mbc: B0024
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: metadata/signed/platform::ip-zinukhov-stanislav-igorevich
    all:
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/os/registry/access::registry-read-api-chain
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-string-density-large-pe
    any:
      - id: micro-behaviors/data/embedded/payload/resource::pe-resource-loader-api-chain
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/fs/file/delete::deletefile-w
      - id: micro-behaviors/fs/directory/mkdir::create-directory-w
      - id: updater-branding-string
    needs: 2
