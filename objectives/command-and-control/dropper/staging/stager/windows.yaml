defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: updater-branding-string
    desc: Updater-themed binary branding strings
    crit: notable
    conf: 0.72
    if:
      type: string_value
      regex: (?i)\b(auto[_ -]?updater\.(exe|pdb)|pc\s*app\s*store(?:\s*updater)?)\b
composite_rules:
  - id: microsoft-rich-updater-stager-fp
    desc: Microsoft-rich updater stager context
    crit: component
    conf: 0.8
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
      - id: metadata/binary/metrics::many-imports
      - id: metadata/binary/metrics::many-exports
  - id: microsoft-export-heavy-updater-stager
    desc: Microsoft export-heavy updater context
    crit: component
    conf: 0.78
    all:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
      - id: metadata/package/versioning::version-resource-metadata
      - id: metadata/binary/metrics::many-exports
  - id: obfuscated-winhttp-updater-stager
    desc: Obfuscated WinHTTP staged updater dropper
    crit: suspicious
    conf: 0.93
    attack: T1105
    mbc: B0024
    unless:
      - id: microsoft-rich-updater-stager-fp
      - id: microsoft-export-heavy-updater-stager
    all:
      - id: micro-behaviors/communications/http/client::winhttp-request-flow
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/os/registry/access::registry-read-api-chain
      - id: objectives/anti-static/obfuscation/binary-metrics::high-string-density-large-pe
    any:
      - id: micro-behaviors/data/embedded/payload::pe-resource-loader-api-chain
      - id: micro-behaviors/fs/file/copy::copyfile-w
      - id: micro-behaviors/fs/file/delete::deletefile-w
      - id: micro-behaviors/fs/directory/mkdir::create-directory-w
      - id: updater-branding-string
    needs: 2
