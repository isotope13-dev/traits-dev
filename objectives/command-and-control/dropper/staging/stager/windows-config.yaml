defaults:
  platforms: [windows]
  for: [data]
  attack: T1105
  mbc: B0024

traits:
  - id: spawn-executable-config
    desc: Spawn executable staging config
    crit: suspicious
    conf: 0.9
    size_max: 512
    if:
      type: text
      regex: '(?i)Spawn=\d+'
  - id: random-executable-config
    desc: Random executable staging config
    crit: suspicious
    conf: 0.9
    size_max: 512
    if:
      type: text
      regex: '(?i)Executable=[A-Za-z0-9]{6,12}\.exe'
  - id: temp-83-dat-path-config
    desc: Temp 8.3 DAT path staging config
    crit: suspicious
    conf: 0.9
    size_max: 512
    if:
      type: text
      regex: '(?i)C:\\DOCUME~1\\[^\\]{1,16}\\LOCALS~1\\Temp\\[^,]{1,40}\.dat,\d'
  - id: repeated-temp-dat-config
    desc: Repeated temp DAT staging config
    crit: suspicious
    conf: 0.88
    size_max: 512
    count_min: 2
    if:
      type: text
      regex: '(?i)\\Temp\\[^,]{1,40}\.dat,\d'

composite_rules:
  - id: random-spawn-executable-config
    desc: Random executable spawn staging config
    crit: suspicious
    conf: 0.95
    all:
      - id: spawn-executable-config
      - id: random-executable-config
  - id: temp-dat-staging-config
    desc: Temp DAT staging config
    crit: suspicious
    conf: 0.94
    all:
      - id: temp-83-dat-path-config
      - id: repeated-temp-dat-config
