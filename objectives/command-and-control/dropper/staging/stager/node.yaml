# Node.js staging chain. JS equivalent of the Python staging composite:
# remote-fetched bytes are validated against an executable magic, written
# to a disposable temp file, executed hidden via spawn, then erased.
defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: T1105
  mbc: B0023

composite_rules:
  # The write+rename+unlink + hidden-spawn shape is also exactly how a
  # well-behaved daemon does atomic state writes (tmp + rename), lock-file
  # cleanup, and detached self-respawn. The discriminator MUST be genuine
  # executable-payload evidence (PE/MZ magic check, .exe rename target, or
  # artifact-prefix masquerade) — `windowsHide`/`stdio:ignore` alone are
  # daemon-generic and were removed from the `any:` set.
  - id: node-pe-stager-chain
    desc: Node writes, renames, executes, and deletes an EXE payload
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/write/file/direct::write-file-sync
      - id: micro-behaviors/fs/file/rename::fs-rename-sync
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/fs/file/delete::fs-unlinkSync
    any:
      - id: micro-behaviors/fs/file/rename::rename-target-exe-js
      - id: objectives/evasion/masquerade/file/prefix::artifact-prefix-masquerade
      - id: micro-behaviors/data/format/executable/header::js-pe-mz-check
    downgrade:
      any:
        - id: micro-behaviors/process/create/spawn::node-self-respawn
        - id: metadata/package/testing/harness/runtime/
        - id: metadata/package/testing/presence/harness/

  - id: node-pe-magic-validated-stager
    desc: Node validates exec-format magic before staging payload
    crit: hostile
    conf: 0.97
    near_lines: 120
    all:
      - id: micro-behaviors/process/create/spawn
      - id: micro-behaviors/data/format/executable/header::js-pe-mz-check
    any:
      - id: micro-behaviors/process/create/spawn::windowshide-option
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/create/spawn::detached-true
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
        - id: metadata/package/testing/presence/harness/

  # Variant: artifact-prefix masquerade + spawn — same as Python form,
  # but specifically for Node.
  - id: node-artifact-masquerade-execution
    desc: Node artifact-prefix masqueraded temp file executed
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/evasion/masquerade/file/prefix::artifact-prefix-masquerade
      - id: micro-behaviors/process/create/spawn
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime/
        - id: metadata/package/testing/presence/harness/
