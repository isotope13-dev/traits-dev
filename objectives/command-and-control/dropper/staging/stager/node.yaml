# Node.js staging chain. JS equivalent of the Python staging composite:
# remote-fetched bytes are validated against an executable magic, written
# to a disposable temp file, executed hidden via spawn, then erased.
defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: T1105
  mbc: B0023

composite_rules:
  - id: node-pe-stager-chain
    desc: Node writes, renames, executes, and deletes an EXE payload
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/write/file::write-file-sync
      - id: micro-behaviors/fs/file/rename::fs-rename-sync
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/fs/file/delete::fs-unlinkSync
    any:
      - id: micro-behaviors/fs/file/rename::rename-target-exe-js
      - id: micro-behaviors/process/create/spawn::windowshide-option
      - id: objectives/evasion/masquerade/file::artifact-prefix-masquerade
      - id: micro-behaviors/data/format::js-pe-mz-check
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
        - id: metadata/package/testing/presence::test-directory

  - id: node-pe-magic-validated-stager
    desc: Node validates exec-format magic before staging payload
    crit: hostile
    conf: 0.97
    near_lines: 120
    all:
      - id: micro-behaviors/process/create/spawn
      - id: micro-behaviors/data/format::js-pe-mz-check
    any:
      - id: micro-behaviors/process/create/spawn::windowshide-option
      - id: micro-behaviors/process/create/spawn::stdio-ignore
      - id: micro-behaviors/process/create/spawn::detached-true
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
        - id: metadata/package/testing/presence::test-directory

  # Variant: artifact-prefix masquerade + spawn — same as Python form,
  # but specifically for Node.
  - id: node-artifact-masquerade-execution
    desc: Node artifact-prefix masqueraded temp file executed
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/evasion/masquerade/file::artifact-prefix-masquerade
      - id: micro-behaviors/process/create/spawn
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
        - id: metadata/package/testing/presence::test-directory
