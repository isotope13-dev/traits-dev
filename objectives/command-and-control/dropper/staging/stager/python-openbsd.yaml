defaults:
  platforms: [openbsd, bsd, unix]
  for: [python, pyc]
  attack: T1105

traits:
  - id: python-stage-fetch-execute
    desc: Python stage fetch execute
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: fetch_and_execute_stages|subprocess\.run\(\[path\]

  - id: python-stage-urlopen-agent
    desc: Python stage urlopen agent
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: urlopen\(.*?/agent|/agent.*?urlopen

composite_rules:
  - id: python-openbsd-fetch-exec-stage
    desc: Python fetch exec stage
    crit: hostile
    conf: 0.98
    all:
      - id: python-stage-fetch-execute
      - id: python-stage-urlopen-agent
