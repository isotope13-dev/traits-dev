# Shell Stager Patterns
# Detects command substitution and inline execution for download-execute
# ATT&CK: T1059.004 (Unix Shell)
defaults:
  platforms: [linux, unix, macos, android, ios]
  for: [shell]
  attack: T1059.004
traits:
  - id: shell-c-curl-subshell
    desc: Download-execute via shell -c with command substitution
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'shell\s+-c\s+.{0,10}\$\(curl'
  - id: sh-c-curl-subshell
    desc: Download-execute via sh -c with command substitution
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'sh\s+-c\s+.{0,10}\$\(curl'
  - id: shell-c-wget-subshell
    desc: Download-execute via shell -c with wget substitution
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'shell\s+-c\s+.{0,10}\$\(wget'
composite_rules:
  - id: shell-subshell-stager
    desc: Shell stager via command substitution
    crit: suspicious
    conf: 0.9
    any:
      - id: shell-c-curl-subshell
      - id: sh-c-curl-subshell
      - id: shell-c-wget-subshell
