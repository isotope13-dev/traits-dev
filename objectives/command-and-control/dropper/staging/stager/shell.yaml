# Shell Stager Patterns
# Detects command substitution and inline execution for download-execute
# ATT&CK: T1059.004 (Unix Shell)
defaults:
  platforms: [unix, android, ios]
  for: [shell]
  attack: T1059.004
traits:
  - id: architecture-payload-to-variable
    desc: Architecture payload copied into variable file
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '\bcat\s+[A-Za-z0-9._/-]+\.\$[A-Za-z_][A-Za-z0-9_]*\s*>\s*\$[A-Za-z_][A-Za-z0-9_]*'
  - id: noexec-filesystem-enumeration
    desc: Enumerates noexec-mounted filesystems
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(findmnt|cat\s+/proc/mounts)\b.{0,80}\bnoexec\b'
  - id: directory-write-test-before-copy
    desc: Tests directory writes before payload copy
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?m)^\s*if\s+cd\s+.{0,120}&&\s+touch\b.{0,120}(dd\s+if=/dev/zero|truncate\b)'
  - id: variable-payload-copy-into-directory
    desc: Copies recursive payload using a variable path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\bcp\s+-r\s+.{0,80}\$[A-Za-z_][A-Za-z0-9_]*'
  - id: shell-c-curl-subshell
    desc: 'shell c curl subshell'
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'shell\s+-c\s+.{0,10}\$\(curl'
  - id: sh-c-curl-subshell
    desc: 'sh c curl subshell'
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'sh\s+-c\s+.{0,10}\$\(curl'
    unless:
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
      - id: micro-behaviors/os/service/legitimate::installer-script
  - id: shell-c-wget-subshell
    desc: 'shell c wget subshell'
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'shell\s+-c\s+.{0,10}\$\(wget'
composite_rules:
  - id: architecture-variable-payload-loader
    desc: Architecture-selected payload made executable and run
    crit: hostile
    conf: 0.99
    attack: T1059.004,T1222.002
    all:
      - id: architecture-payload-to-variable
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-var-target
      - id: micro-behaviors/process/create/local-exec::local-execution
      - id: micro-behaviors/fs/directory/delete::rm-rf
    near_lines: 20
  - id: writable-dir-payload-staging-loader
    desc: Writable-directory payload staging and execution
    crit: hostile
    conf: 0.99
    attack: T1059.004,T1222.002
    all:
      - id: noexec-filesystem-enumeration
      - id: micro-behaviors/fs/path/temp::temporary-directory-candidate-loop
      - id: directory-write-test-before-copy
      - id: variable-payload-copy-into-directory
      - id: micro-behaviors/process/create/local-exec::local-execution
      - id: micro-behaviors/fs/directory/delete::rm-rf
  - id: shell-subshell-stager
    desc: Shell stager via command substitution
    crit: suspicious
    conf: 0.9
    any:
      - id: shell-c-curl-subshell
      - id: sh-c-curl-subshell
      - id: shell-c-wget-subshell
  - id: shell-ip-curl-subshell-loader
    desc: Shell executes IP curl payload
    crit: hostile
    conf: 0.98
    all:
      - id: sh-c-curl-subshell
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/communications/http/download/curl::curl-silent
  - id: bash-c-curl-ip-loader
    desc: Bash command loads IP payload
    crit: hostile
    conf: 0.98
    all:
      - id: sh-c-curl-subshell
      - id: micro-behaviors/process/create/shell/spawn::sh-c-exec
      - id: objectives/command-and-control/infrastructure/ip::ip-address-url
