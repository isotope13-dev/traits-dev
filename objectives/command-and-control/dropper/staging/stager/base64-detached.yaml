defaults:
  platforms: [unix, windows]
  for: [python]
composite_rules:
  - id: python-base64-tempfile-detached-dropper
    desc: "Base64-decoded data is written to a named temporary file and launched detached"
    conf: 0.95
    crit: hostile
    mbc: "B0032"
    attack: "T1105"
    near_lines: 64
    all:
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/fs/temp/mktemp::tempfile-named-temporary-file
      - id: micro-behaviors/process/create/subprocess::popen-ast
      - id: micro-behaviors/process/create/flags::creationflags
