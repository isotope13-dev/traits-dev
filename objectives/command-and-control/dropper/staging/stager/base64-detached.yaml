defaults:
  platforms: [unix, windows]
composite_rules:
  - id: base64-decode-any
    desc: "Helper for any base64 decode"
    conf: 0.8
    crit: component
    any:
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/data/decode/base64::b64decode-string
  - id: detached-execution-any
    desc: "Helper for any detached execution"
    conf: 0.8
    crit: component
    any:
      - id: micro-behaviors/process/create/flags::creationflags
      - id: micro-behaviors/process/create/direct::python-preexec-hook
  - id: python-base64-detached-dropper
    desc: "Decodes base64 payload, writes to temp, runs via detached subprocess"
    conf: 0.95
    crit: hostile
    for: [python]
    mbc: "B0032"
    attack: "T1105"
    all:
      - id: base64-decode-any
      - id: micro-behaviors/fs/temp/directory::temp-directory
      - id: detached-execution-any
      - id: micro-behaviors/fs/read/file::file-open-content
