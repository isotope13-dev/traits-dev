defaults:
  platforms:
    - windows
  for: [scripts, binaries]
traits:
  - id: sideloading-host-bugreport
    desc: Common side-loading host binary (BugReport.exe)
    crit: notable
    conf: 0.8
    if:
      type: basename
      exact: BugReport.exe
  - id: sideloading-host-generic-1
    desc: Potential side-loading host (BugReport/CrashReport/Update)
    crit: notable
    conf: 0.6
    if:
      type: basename
      regex: (?i)^(BugReport|CrashReport|Update)\.exe$
  - id: sideloading-host-generic-2
    desc: Potential side-loading host (Setup/OneDriveStandaloneUpdater)
    crit: notable
    conf: 0.6
    if:
      type: basename
      regex: (?i)^(Setup|OneDriveStandaloneUpdater)\.exe$
  - id: adjacent-shell-dll-reference
    desc: Reference to adjacent _shell.dll sideload target
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \w+_shell\.dll
  - id: sideload-target-chakra
    desc: Chakra.dll sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
    if:
      type: text
      substr: Chakra.dll
  - id: sideload-target-jscript9
    desc: jscript9.dll sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
    if:
      type: text
      substr: jscript9.dll
  - id: sideload-target-xpsservices
    desc: XpsServices.dll sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
    if:
      type: text
      substr: XpsServices.dll
  - id: sideload-target-mscorsvc
    desc: mscorsvc.dll CLR sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
    if:
      type: text
      substr: mscorsvc.dll
  - id: sideload-target-cryptbase
    desc: cryptbase.dll sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
    if:
      type: text
      substr: cryptbase.dll
  - id: sideload-target-sppc
    desc: sppc.dll sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
    if:
      type: text
      substr: sppc.dll
  - id: sideload-target-7z-runtime
    desc: 7z.dll sideloading target
    crit: component
    conf: 0.92
    for:
      - pe
    if:
      type: text
      substr: 7z.dll
  - id: sideload-target-mapi32
    desc: Mapi32.dll sideloading target
    crit: component
    conf: 0.88
    for:
      - pe
    if:
      type: text
      exact: Mapi32.dll
  - id: sideload-target-version
    desc: version.dll sideloading target
    crit: component
    conf: 0.9
    for:
      - pe
    if:
      type: text
      exact: version.dll
  - id: version-proxy-path-format
    desc: Formatted version.dll proxy path
    crit: component
    conf: 0.96
    for:
      - pe
    if:
      type: text
      exact: '%s\version.dll'
  - id: 7zip-gui-host-filename
    desc: 7-Zip GUI original filename
    crit: component
    conf: 0.94
    for:
      - pe
    if:
      type: text
      exact: 7zg.exe
      section: .rsrc
  - id: 7zip-gui-host-description
    desc: 7-Zip GUI description string
    crit: component
    conf: 0.9
    for:
      - pe
    if:
      type: text
      substr: 7-Zip GUI
      section: .rsrc
  - id: sideload-export-corinitsvclgr
    desc: CorInitSvcLogger export (CLR sideload)
    crit: suspicious
    conf: 0.9
    attack: T1574.002
    for:
      - dll
    if:
      type: symbol
      exact: CorInitSvcLogger

  - id: office-appv-sideload-filename
    desc: Filename matches AppV sideload DLL
    crit: component
    conf: 0.95
    for: [pe]
    if:
      type: basename
      regex: (?i)^AppvIsvSubsystems(32|64)\.dll$

  - id: office-click2run-appv-sideload-filename
    desc: Filename matches Click-to-Run Appv DLL
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: basename
      regex: (?i)^Appv(IsvSubsystems(32|64)|Client)\.dll$

  - id: office-click2run-c2r-sideload-filename
    desc: Filename matches Click-to-Run C2R DLL
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: basename
      regex: (?i)^C2R(32|64)\.dll$

  - id: office-click2run-msochina-sideload-filename
    desc: Filename matches Click-to-Run MsoChina DLL
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: basename
      exact: MsoChina.dll
      case_insensitive: true

  - id: office-click2run-msowin32client-sideload-filename
    desc: Filename matches Click-to-Run Mso win32client DLL
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: basename
      regex: (?i)^mso(20|30|40(ui)?|99L)win32client\.dll$

  - id: office-click2run-mso-sideload-ref
    desc: Office Click-to-Run Mso DLL reference
    crit: component
    conf: 0.93
    for: [pe]
    if:
      type: text
      regex: (?i)mso(20|30|40(ui)?|99L)win32client\.dll

  - id: hashed-export-name
    desc: DLL export name is hex hash
    crit: suspicious
    conf: 0.92
    for: [pe]
    if:
      type: symbol
      regex: ^x[0-9a-f]{8}$
composite_rules:
  - id: office-click2run-sideload-filename
    desc: Filename matches Office Click-to-Run sideload-vulnerable DLL
    crit: component
    conf: 0.9
    any:
      - id: office-click2run-appv-sideload-filename
      - id: office-click2run-c2r-sideload-filename
      - id: office-click2run-msochina-sideload-filename
      - id: office-click2run-msowin32client-sideload-filename

  - id: office-click2run-sideload-target
    desc: Office Click-to-Run sideload target present
    crit: notable
    conf: 0.92
    any:
      - id: office-click2run-sideload-filename
      - id: office-click2run-mso-sideload-ref

  - id: sideloading-host-generic
    desc: Potential side-loading host binary name
    crit: notable
    conf: 0.6
    any:
      - id: sideloading-host-generic-1
      - id: sideloading-host-generic-2
  - id: minimalist-hostile-dll
    desc: Hostile DLL with minimal imports and high entropy
    crit: suspicious
    conf: 0.8
    all:
      - id: metadata/binary/metrics::few-functions
      - id: objectives/anti-static/pack/entropy::high-entropy-section
      - id: micro-behaviors/dylib/lookup::get-proc-address
    unless: null
  - id: suspicious-sideloading-host
    desc: Suspicious side-loading host with minimal logic
    crit: suspicious
    conf: 0.8
    all:
      - id: sideloading-host-generic
      - id: objectives/anti-analysis/vm-detect::sparse-logic-density
  - id: sideload-target-search
    desc: Probes for DLL sideloading targets
    crit: notable
    conf: 0.88
    attack: T1574.002
    for:
      - pe
    needs: 2
    any:
      - id: sideload-target-chakra
      - id: sideload-target-jscript9
      - id: sideload-target-xpsservices
      - id: sideload-target-mscorsvc
      - id: sideload-target-cryptbase
      - id: sideload-target-sppc
      - id: sideload-target-7z-runtime
      - id: sideload-target-mapi32
      - id: sideload-target-version
  - id: 7zip-gui-sideload-host
    desc: 7-Zip GUI sideload host
    crit: suspicious
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    all:
      - id: 7zip-gui-host-filename
      - id: sideload-target-mapi32
    any:
      - id: sideload-target-7z-runtime
      - id: 7zip-gui-host-description
      - id: metadata/binary/installer/sfx::7zip-registry-key
    needs: 1
  - id: 7zip-resource-sideload-carrier
    desc: 7-Zip host with hidden resource payload
    crit: suspicious
    conf: 0.97
    attack: T1574.002
    for:
      - pe
    all:
      - id: 7zip-gui-host-filename
      - id: sideload-target-mapi32
      - id: metadata/binary/resource::oversized-rsrc
      - id: metadata/binary/resource::executable-rsrc-section
      - id: metadata/binary/metrics::four-section-pe
    any:
      - id: sideload-target-7z-runtime
      - id: metadata/binary/installer/sfx::7zip-registry-key
      - id: metadata/binary/resource::dominant-executable-rsrc
      - id: objectives/anti-static/obfuscation/binary-metrics::wx-sections
    needs: 3
    unless:
      - id: metadata/signed/platform::microsoft
  - id: importless-dll-loader
    desc: Importless DLL with dynamic API resolution
    crit: hostile
    conf: 0.9
    attack: T1574.002
    size_max: 51200
    all:
      - id: metadata/binary/metrics::no-imports
      - id: metadata/binary/metrics::minimal-exports
    any:
      - id: objectives/anti-static/obfuscation/imports::djb2-api-resolution
      - id: objectives/anti-static/obfuscation/imports::hash-based-obfuscation
      - id: objectives/anti-static/obfuscation/imports::api-hash-resolution
  - id: fake-export-resource-sideload
    desc: Fake-export DLL sideloading loader profile
    crit: hostile
    conf: 0.98
    attack: T1574.002
    for: [pe]
    all:
      - id: metadata/binary/symbols::sideload-export-masquerade-cluster
      - id: micro-behaviors/os/module/load::disable-thread-library-calls
    any:
      - id: metadata/binary/resource::doc-stuffed-rsrc
      - id: metadata/binary/section/content::oversized-rdata-diagnostic-noise
      - id: metadata/binary/symbols::sideload-wrapper-gui-padding
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
  - id: version-proxy-sideload-launcher
    desc: version.dll proxy sideload launcher
    crit: hostile
    conf: 0.99
    attack: T1574.002
    for: [pe]
    size_min: 524288
    all:
      - id: sideload-target-version
      - id: version-proxy-path-format
      - id: metadata/binary/section/metrics::export-fog-exec-section-mesh
      - id: metadata/binary/section/metrics::long-random-section-name-burst
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
    any:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/dylib/load::load-library-a
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer

  - id: office-appv-sideload-loader
    desc: Malicious Office AppV sideload DLL (loader stage)
    crit: hostile
    conf: 0.97
    attack: T1574.002
    for: [pe]
    size_max: 65536
    all:
      - id: office-appv-sideload-filename
      - id: micro-behaviors/os/module/load::disable-thread-library-calls
      - id: micro-behaviors/dylib/load::load-library-w
    any:
      - id: hashed-export-name
      - id: objectives/anti-static/obfuscation/imports::hash-primitive
      - id: metadata/binary/layout::pe-checksum-missing
    unless:
      - id: metadata/signed/platform::microsoft
