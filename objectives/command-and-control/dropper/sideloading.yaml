defaults:
  platforms:
    - windows
  for:
    - python
    - javascript
    - powershell
    - pe
traits:
  - id: sideloading-host-bugreport
    desc: Common side-loading host binary (BugReport.exe)
    crit: notable
    conf: 0.8
    if:
      type: basename
      exact: BugReport.exe
  - id: sideloading-host-generic-1
    desc: Potential side-loading host (BugReport/CrashReport/Update)
    crit: notable
    conf: 0.6
    if:
      type: basename
      regex: (?i)^(BugReport|CrashReport|Update)\.exe$
  - id: sideloading-host-generic-2
    desc: Potential side-loading host (Setup/OneDriveStandaloneUpdater)
    crit: notable
    conf: 0.6
    if:
      type: basename
      regex: (?i)^(Setup|OneDriveStandaloneUpdater)\.exe$
  - id: adjacent-shell-dll-reference
    desc: Reference to adjacent _shell.dll sideload target
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \w+_shell\.dll
  - id: sideload-target-chakra
    desc: Chakra.dll sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
      - dll
    if:
      type: text
      substr: Chakra.dll
  - id: sideload-target-jscript9
    desc: jscript9.dll sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
      - dll
    if:
      type: text
      substr: jscript9.dll
  - id: sideload-target-xpsservices
    desc: XpsServices.dll sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
      - dll
    if:
      type: text
      substr: XpsServices.dll
  - id: sideload-target-mscorsvc
    desc: mscorsvc.dll CLR sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
      - dll
    if:
      type: text
      substr: mscorsvc.dll
  - id: sideload-target-cryptbase
    desc: cryptbase.dll sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
      - dll
    if:
      type: text
      substr: cryptbase.dll
  - id: sideload-target-sppc
    desc: sppc.dll sideloading target
    crit: component
    conf: 0.85
    for:
      - pe
      - dll
    if:
      type: text
      substr: sppc.dll
  - id: sideload-target-7z-runtime
    desc: 7z.dll sideloading target
    crit: component
    conf: 0.92
    for:
      - pe
      - dll
    if:
      type: text
      substr: 7z.dll
  - id: sideload-target-mapi32
    desc: Mapi32.dll sideloading target
    crit: component
    conf: 0.88
    for:
      - pe
      - dll
    if:
      type: text
      exact: Mapi32.dll
  - id: 7zip-gui-host-filename
    desc: 7-Zip GUI original filename
    crit: component
    conf: 0.94
    for:
      - pe
    if:
      type: text
      exact: 7zg.exe
      section: .rsrc
  - id: 7zip-gui-host-description
    desc: 7-Zip GUI description string
    crit: component
    conf: 0.9
    for:
      - pe
    if:
      type: text
      substr: 7-Zip GUI
      section: .rsrc
  - id: sideload-export-corinitsvclgr
    desc: CorInitSvcLogger export (CLR sideload)
    crit: suspicious
    conf: 0.9
    attack: T1574.002
    for:
      - dll
    if:
      type: symbol
      exact: CorInitSvcLogger
composite_rules:
  - id: sideloading-host-generic
    desc: Potential side-loading host binary name
    crit: notable
    conf: 0.6
    any:
      - id: sideloading-host-generic-1
      - id: sideloading-host-generic-2
  - id: minimalist-hostile-dll
    desc: Hostile DLL with minimal imports and high entropy
    crit: suspicious
    conf: 0.8
    all:
      - id: metadata/binary/metrics::few-functions
      - id: objectives/anti-static/pack/entropy::high-entropy-section
      - id: micro-behaviors/dylib/lookup::get-proc-address
    unless: null
  - id: suspicious-sideloading-host
    desc: Suspicious side-loading host with minimal logic
    crit: suspicious
    conf: 0.8
    all:
      - id: sideloading-host-generic
      - id: objectives/anti-analysis/vm-detect::sparse-logic-density
  - id: sideload-target-search
    desc: Probes for DLL sideloading targets
    crit: notable
    conf: 0.88
    attack: T1574.002
    for:
      - pe
      - dll
    needs: 2
    any:
      - id: sideload-target-chakra
      - id: sideload-target-jscript9
      - id: sideload-target-xpsservices
      - id: sideload-target-mscorsvc
      - id: sideload-target-cryptbase
      - id: sideload-target-sppc
      - id: sideload-target-7z-runtime
      - id: sideload-target-mapi32
  - id: 7zip-gui-sideload-host
    desc: 7-Zip GUI sideload host
    crit: suspicious
    conf: 0.95
    attack: T1574.002
    for:
      - pe
    all:
      - id: 7zip-gui-host-filename
      - id: sideload-target-mapi32
    any:
      - id: sideload-target-7z-runtime
      - id: 7zip-gui-host-description
      - id: metadata/binary/installer/sfx::7zip-registry-key
    needs: 1
  - id: 7zip-resource-sideload-carrier
    desc: 7-Zip host with hidden resource payload
    crit: suspicious
    conf: 0.97
    attack: T1574.002
    for:
      - pe
    all:
      - id: 7zip-gui-host-filename
      - id: sideload-target-mapi32
      - id: metadata/binary/resource::oversized-rsrc
      - id: metadata/binary/resource::executable-rsrc-section
      - id: metadata/binary/metrics::four-section-pe
    any:
      - id: sideload-target-7z-runtime
      - id: metadata/binary/installer/sfx::7zip-registry-key
      - id: metadata/binary/resource::dominant-executable-rsrc
      - id: objectives/anti-static/obfuscation/binary-metrics::wx-sections
    needs: 3
    unless:
      - id: metadata/signed/platform::microsoft
  - id: importless-dll-loader
    desc: Importless DLL with dynamic API resolution
    crit: hostile
    conf: 0.9
    attack: T1574.002
    size_max: 51200
    all:
      - id: metadata/binary/metrics::no-imports
      - id: metadata/binary/metrics::minimal-exports
    any:
      - id: objectives/anti-static/obfuscation/imports::djb2-api-resolution
      - id: objectives/anti-static/obfuscation/imports::hash-based-obfuscation
      - id: objectives/anti-static/obfuscation/imports::api-hash-resolution
  - id: fake-export-resource-sideload
    desc: Fake-export DLL sideloading loader profile
    crit: hostile
    conf: 0.98
    attack: T1574.002
    for: [pe, dll]
    all:
      - id: metadata/binary/symbols::sideload-export-masquerade-cluster
      - id: micro-behaviors/os/module/load::disable-thread-library-calls
    any:
      - id: metadata/binary/resource::doc-stuffed-rsrc
      - id: metadata/binary/section/content::oversized-rdata-diagnostic-noise
      - id: metadata/binary/symbols::sideload-wrapper-gui-padding
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
