defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  mbc: B0024
  attack: T1059.006
traits:
  - id: tmp-path
    desc: Named /tmp execution path
    crit: component
    conf: 0.6
    if:
      type: text
      regex: /tmp/[a-zA-Z_][a-zA-Z0-9_]*
    not:
      - /tmp/tmp.XXXXXXXX
  - id: tmp-path-short
    desc: Reference to /tmp directory path
    crit: component
    conf: 0.7
    if:
      type: text
      regex: /tmp/[a-zA-Z_]+$
    not:
      - /tmp/tkt
      - /tmp/lib
      - /tmp/RecoveryTemp
      - /tmp/KernelCache
      - /tmp/com
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: os-remove
    desc: Python os.remove call to delete
    crit: component
    conf: 0.7
    if:
      type: text
      regex: os\.remove\(
  - id: popen-call
    desc: subprocess module call
    crit: notable
    conf: 0.5
    for:
      - python
    if:
      type: trait
      id: micro-behaviors/process/create/subprocess::methods
  - id: download-status-msg
    desc: Loader-style download status message
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: '(?i)Download\s*failed|Download\s*OK'
  - id: launch-status-msg
    desc: Loader-style launch status message
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: '(?i)Launch\s*failed|Launch\s*OK'

composite_rules:
  - id: python-exec-any
    desc: Code or process execution
    crit: notable
    conf: 0.5
    for:
      - python
    any:
      - id: micro-behaviors/process/create/subprocess/
      - id: micro-behaviors/process/create/system::python-os-system
      - id: objectives/execution/interpreter/eval/invoke::exec-call-python
  - id: python-comp
    desc: Download to /tmp, chmod, execute
    conf: 0.95
    crit: suspicious
    needs: 3
    any:
      - id: tmp-path-short
      - id: micro-behaviors/fs/chmod/commands::python-os-chmod
      - id: micro-behaviors/process/create/subprocess/
      - id: os-remove
  - id: download-and-launch-status
    desc: Loader-style download and launch status messages
    crit: notable
    conf: 0.9
    all:
      - id: download-status-msg
      - id: launch-status-msg
  - id: hostile-cloud-dropper
    desc: Downloads and launches executable from cloud storage
    crit: hostile
    conf: 0.95
    attack: T1584.004
    all:
      - id: download-and-launch-status
      - id: micro-behaviors/communications/http/url::cloud-executable-url

  - id: proxy-loader-indicators
    desc: Forwarded export cluster for proxy loader
    crit: component
    all:
      - id: metadata/binary/symbols::dll-forwarded-export
      - id: metadata/binary/symbols::high-forwarder-ratio

  - id: hostile-proxy-loader
    desc: Hostile proxy DLL loader
    crit: hostile
    conf: 0.98
    all:
      - id: download-and-launch-status
    any:
      - id: metadata/binary/symbols::pure-proxy-dll
      - id: proxy-loader-indicators

  - id: hostile-proxy-sideload
    desc: Hostile proxy DLL in sideload context
    crit: hostile
    conf: 0.96
    all:
      - id: metadata/binary/symbols::pure-proxy-dll
      - id: objectives/evasion/masquerade/dll::nvbackend-sideload-host
