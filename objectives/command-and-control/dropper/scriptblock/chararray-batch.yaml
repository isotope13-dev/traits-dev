defaults:
  for: [batch]
  platforms: [windows]
  attack: T1059.001

traits:
  - id: powershell-char-array-stage
    desc: PowerShell char array stage
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: '[char[]]('

  - id: powershell-char-array-join
    desc: PowerShell char array string reconstruction
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\[char\[\]\]\([0-9,\s]{80,}\)\s*-join'

  - id: powershell-empty-join
    desc: PowerShell empty-string join reconstruction
    crit: suspicious
    conf: 0.84
    unless:
      - id: metadata/file/string/identity/
      - id: metadata/package/manager::maven-wrapper-script
    if:
      type: text
      regex: '(?i)-join\s*(''''|"")'

  - id: decoded-scriptblock-create
    desc: Decoded PowerShell ScriptBlock.Create
    crit: suspicious
    conf: 0.94
    if:
      type: encoded
      encoding: script
      substr: '[ScriptBlock]::Create'

  - id: decoded-webclient-downloadstring
    desc: Decoded WebClient DownloadString
    crit: suspicious
    conf: 0.94
    attack: T1105
    if:
      type: encoded
      encoding: script
      regex: 'Net\.WebClient.{0,80}DownloadString'

  - id: powershell-iex-variable
    desc: PowerShell iex variable call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\biex\s*\(\s*\$[A-Za-z_]\w*\s*\)'

composite_rules:
  - id: batch-decoded-powershell-webclient
    desc: Batch decoded PowerShell WebClient
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/shell/lang::powershell-invocation
      - id: powershell-char-array-stage
      - id: powershell-char-array-join
      - id: decoded-scriptblock-create
      - id: decoded-webclient-downloadstring
    any:
      - id: powershell-empty-join
      - id: powershell-iex-variable
      - id: objectives/execution/interpreter/eval/invoke::iex
