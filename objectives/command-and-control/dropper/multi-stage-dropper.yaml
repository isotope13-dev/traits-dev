# Multi-stage Dropper
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1105
traits:
  - id: multi-stage-pe-dropper
    desc: Binary contains 3+ embedded PE payloads
    crit: suspicious
    conf: 0.98
    if:
      type: trait
      id: metadata/format/pe::pe-embedded
      count_min: 3
