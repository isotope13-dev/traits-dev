defaults:
  platforms: [windows, unix]
  for: [javascript]

traits:
  - id: temp-env-fragment
    desc: Temp environment variable fragment
    crit: component
    conf: 0.8
    if:
      type: string_literal
      exact: "%TEMP"

  - id: split-space-fragment
    desc: Split method fragment
    crit: component
    conf: 0.8
    if:
      type: string_literal
      exact: ".spl"

  - id: split-args-fragment
    desc: Split argument fragment
    crit: component
    conf: 0.8
    if:
      type: text
      substr: 'ngs("'

  - id: from-charcode-fragment
    desc: fromCharCode path fragment
    crit: component
    conf: 0.84
    if:
      type: string_literal
      exact: fromC

  - id: backslash-charcode-fragment
    desc: Backslash charcode fragment
    crit: component
    conf: 0.84
    if:
      type: string_literal
      exact: 92)+

  - id: exe-suffix-fragment
    desc: EXE suffix fragment
    crit: component
    conf: 0.84
    if:
      type: string_literal
      exact: '+".e'

  - id: run-dot-fragment
    desc: WScript Run dot fragment
    crit: component
    conf: 0.84
    if:
      type: string_literal
      exact: .R

  - id: run-call-fragment
    desc: WScript Run call fragment
    crit: component
    conf: 0.84
    if:
      type: text
      substr: un(fn

  - id: save-fragment-vet
    desc: SaveToFile veT fragment
    crit: component
    conf: 0.84
    if:
      type: string_literal
      exact: veT

  - id: counter-path-fragment-counte
    desc: Counter URL path fragment
    crit: component
    conf: 0.86
    if:
      type: string_literal
      exact: /counte

  - id: counter-path-fragment-id
    desc: Counter id parameter fragment
    crit: component
    conf: 0.86
    if:
      type: string_literal
      exact: r/?id=

  - id: from-charcode-member-fragment
    desc: String.fromCharCode member fragment
    crit: component
    conf: 0.86
    if:
      type: string_literal
      exact: g.fromC

  - id: backslash-charcode-seed-fragment
    desc: Backslash charcode seed fragment
    crit: component
    conf: 0.86
    if:
      type: string_literal
      exact: '(92)+"1'

  - id: temp-env-quoted-fragment
    desc: Quoted TEMP environment fragment
    crit: component
    conf: 0.86
    if:
      type: string_literal
      exact: '%TEMP%"'

  - id: exe-extension-quoted-fragment
    desc: Quoted EXE extension fragment
    crit: component
    conf: 0.86
    if:
      type: string_literal
      exact: '.exe"'

  - id: xmlhttp-msxml-fragment
    desc: Split MSXML2.XMLHTTP fragments
    crit: component
    conf: 0.9
    count_min: 3
    if:
      type: string_literal
      regex: '^("MSXM|L2\.XM|LHTTP)$'

composite_rules:
  - id: download-infra
    desc: Fragmented WSH downloader infrastructure
    crit: suspicious
    conf: 0.93
    all:
      - id: objectives/execution/interpreter/script/wsh-fragments::wscript-shell-fragment
      - id: objectives/execution/interpreter/script/wsh-fragments::adodb-fragment
      - id: temp-env-fragment
      - id: save-fragment-vet
      - id: objectives/anti-static/obfuscation/string/conceal::save-to-file-fragment-oFil
    any:
      - id: objectives/anti-static/obfuscation/string/conceal::js-fragmented-url-htt
      - id: run-dot-fragment
      - id: micro-behaviors/data/encode/skip-step::js-concat-chain

  - id: http-exe-staging
    desc: Fragmented HTTP temp EXE staging
    crit: suspicious
    conf: 0.94
    all:
      - id: download-infra
      - id: split-space-fragment
      - id: split-args-fragment
      - id: from-charcode-fragment
      - id: backslash-charcode-fragment
      - id: exe-suffix-fragment
    any:
      - id: run-call-fragment
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code

  - id: counter-url-fragment-alt
    desc: Fragmented counter URL request
    crit: suspicious
    conf: 0.94
    all:
      - id: counter-path-fragment-counte
      - id: counter-path-fragment-id
      - id: objectives/command-and-control/channel/http/uri::uri-fragment-counter-rnd-param
      - id: micro-behaviors/data/encode/hex::long-hex-string

  - id: temp-exe-staging-alt
    desc: Fragmented TEMP EXE staging
    crit: suspicious
    conf: 0.94
    all:
      - id: temp-env-quoted-fragment
      - id: from-charcode-member-fragment
      - id: backslash-charcode-seed-fragment
      - id: exe-extension-quoted-fragment
      - id: objectives/execution/interpreter/script/wsh-fragments::save-to-file-fragment-aveto
      - id: run-call-fragment

  - id: obfuscated-wsh-counter-exe-dropper-v2
    desc: Obfuscated WSH counter EXE dropper
    crit: hostile
    conf: 0.98
    attack: T1059.007, T1105, T1027
    mbc: B0017, B0018, B0032
    all:
      - id: micro-behaviors/data/source/dynamic/eval::js-eval-assignment-return
      - id: objectives/anti-static/obfuscation/code-metrics/functions::many-no-param-functions
      - id: xmlhttp-msxml-fragment
      - id: objectives/execution/interpreter/script/wsh-fragments::variant-staging-fragment-1
      - id: objectives/execution/interpreter/script/wsh-fragments::adodb-fragment-2
      - id: counter-url-fragment-alt
      - id: temp-exe-staging-alt

  - id: obfuscated-wsh-http-exe-dropper
    desc: Obfuscated WSH HTTP EXE dropper
    crit: hostile
    conf: 0.97
    attack: T1059.007, T1105, T1027
    mbc: B0017, B0018, B0032
    all:
      - id: micro-behaviors/data/source/dynamic/eval::js-eval-assignment-return
      - id: download-infra
      - id: http-exe-staging
      - id: run-dot-fragment
      - id: run-call-fragment
    any:
      - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
      - id: objectives/anti-static/obfuscation/code-metrics/identifiers::sequential-identifiers
