defaults:
  platforms: [windows, unix]
  for: [javascript]

traits:
- id: temp-env-fragment
  desc: Temp environment variable fragment
  crit: component
  conf: 0.8
  if:
    type: string_literal
    exact: "%TEMP"

- id: split-space-fragment
  desc: Split method fragment
  crit: component
  conf: 0.8
  if:
    type: string_literal
    exact: ".spl"

- id: split-args-fragment
  desc: Split argument fragment
  crit: component
  conf: 0.8
  if:
    type: text
    substr: 'ngs("'

- id: from-charcode-fragment
  desc: fromCharCode path fragment
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: fromC

- id: backslash-charcode-fragment
  desc: Backslash charcode fragment
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: 92)+

- id: exe-suffix-fragment
  desc: EXE suffix fragment
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: '+".e'


- id: run-call-fragment
  desc: WScript Run call fragment
  crit: component
  conf: 0.84
  if:
    type: text
    substr: un(fn

- id: save-fragment-vet
  desc: SaveToFile veT fragment
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: veT

- id: counter-path-fragment-counte
  desc: Counter URL path fragment
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: /counte

- id: counter-path-fragment-id
  desc: Counter id parameter fragment
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: r/?id=

- id: from-charcode-member-fragment
  desc: String.fromCharCode member fragment
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: g.fromC

- id: backslash-charcode-seed-fragment
  desc: Backslash charcode seed fragment
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: '(92)+"1'

- id: temp-env-quoted-fragment
  desc: Quoted TEMP environment fragment
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: '%TEMP%"'

- id: exe-extension-quoted-fragment
  desc: Quoted EXE extension fragment
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: '.exe"'

- id: xmlhttp-msxml-fragment
  desc: Split MSXML2.XMLHTTP fragments
  crit: component
  conf: 0.9
  count_min: 3
  if:
    type: string_literal
    regex: '^("MSXM|L2\.XM|LHTTP)$'

- id: responsebody-fragment-res
  desc: responseBody receiver fragment
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: xo.res

- id: responsebody-fragment-body
  desc: responseBody suffix fragment
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: Body)

- id: stream-size-fragment
  desc: ADODB stream size fragment
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: xa.siz

- id: size-threshold-fragment
  desc: Payload size threshold fragment
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: e > 100

composite_rules:
- id: download-infra
  desc: Fragmented WSH downloader infrastructure
  crit: suspicious
  conf: 0.93
  all:
  - id: temp-env-fragment
  - id: save-fragment-vet
  - id: objectives/anti-static/obfuscation/string/conceal::save-to-file-fragment-oFil
  any:
  - id: micro-behaviors/communications/url/construction/fragment::js-fragmented-url-protocol
  - id: micro-behaviors/data/string/concat::massive-concatenation-chain

- id: http-exe-staging
  desc: Fragmented HTTP temp EXE staging
  crit: suspicious
  conf: 0.94
  all:
  - id: download-infra
  - id: split-space-fragment
  - id: split-args-fragment
  - id: from-charcode-fragment
  - id: backslash-charcode-fragment
  - id: exe-suffix-fragment
  any:
  - id: run-call-fragment
  - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code

- id: counter-url-fragment-alt
  desc: Fragmented counter URL request
  crit: suspicious
  conf: 0.94
  all:
  - id: counter-path-fragment-counte
  - id: counter-path-fragment-id
  - id: objectives/command-and-control/channel/http/uri::uri-fragment-counter-rnd-param

- id: temp-exe-staging-alt
  desc: Fragmented TEMP EXE staging
  crit: suspicious
  conf: 0.94
  all:
  - id: temp-env-quoted-fragment
  - id: from-charcode-member-fragment
  - id: backslash-charcode-seed-fragment
  - id: exe-extension-quoted-fragment
  - id: run-call-fragment

- id: responsebody-size-gated-save
  desc: Fragmented responseBody size-gated save
  crit: suspicious
  conf: 0.95
  all:
  - id: micro-behaviors/data/source/dynamic/eval::js-eval-assignment-return
  - id: metadata/file/metrics::many-no-param-functions
  - id: xmlhttp-msxml-fragment
  - id: responsebody-fragment-res
  - id: responsebody-fragment-body
  - id: stream-size-fragment
  - id: size-threshold-fragment
- id: obfuscated-wsh-counter-exe-dropper-v2
  desc: Obfuscated WSH counter EXE dropper
  crit: hostile
  conf: 0.98
  attack: T1059.007, T1105, T1027
  mbc: B0017, B0018, B0032
  all:
  - id: micro-behaviors/data/source/dynamic/eval::js-eval-assignment-return
  - id: metadata/file/metrics::many-no-param-functions
  - id: xmlhttp-msxml-fragment
  - id: counter-url-fragment-alt
  - id: temp-exe-staging-alt

- id: obfuscated-wsh-http-exe-dropper
  desc: Obfuscated WSH HTTP EXE dropper
  crit: hostile
  conf: 0.97
  attack: T1059.007, T1105, T1027
  mbc: B0017, B0018, B0032
  all:
  - id: micro-behaviors/data/source/dynamic/eval::js-eval-assignment-return
  - id: download-infra
  - id: http-exe-staging
  - id: run-call-fragment
  any:
  - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
  - id: metadata/file/profile/identity::sequential-identifiers
