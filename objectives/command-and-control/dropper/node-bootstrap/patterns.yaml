defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: dash-flag-single
  desc: dash flag for stdin (single quote)
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    exact: '[''-'']'
- id: dash-flag-double
  desc: dash flag for stdin (double quote)
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    exact: '["-"]'
- id: comma-dash-flag-single
  desc: comma dash flag (single quote)
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    exact: ', [''-'']'
- id: comma-dash-flag-double
  desc: comma dash flag (double quote)
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    exact: ', ["-"]'
- id: slash-node
  desc: /node path
  crit: component
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    regex: /node([/?#]|$)
- id: release-asset-verifier-basename
  desc: Release asset verifier script
  crit: notable
  for:
  - javascript
  - typescript
  if:
    type: basename
    exact: verifyReleaseAssets.mjs
- id: npm-postinstall-script-path
  desc: npm postinstall JavaScript path
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: path
    regex: '(^|/)postinstall\.[cm]?js$'
- id: spawn-sync-symbol
  desc: spawnSync symbol
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: symbol
    exact: spawnSync
- id: sevenzip-stdout-flag
  desc: 7z stdout extraction flag
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    exact: -so
- id: sevenzip-password-flag-template
  desc: 7z password flag template
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: -p${PASSWORD}
- id: pe-offset-read
  desc: PE offset read
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: readUInt32LE(60)
- id: pe-magic-symbol
  desc: PE magic symbol
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: peMagic
- id: temp-exe-name-symbol
  desc: temp exe name symbol
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: TEMP_EXE_NAME
- id: drop-payload-path-symbol
  desc: dropped payload path symbol
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: text
    substr: DROP_PAYLOAD_PATH
- id: dot-exe-string
  desc: .exe string literal
  crit: component
  conf: 0.9
  attack: T1105
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    exact: .exe
- id: powershell-startprocess-payload
  desc: PowerShell starts a temporary executable
  # This is a launch capability shared by legitimate elevation helpers and
  # installers. Dropper intent is supplied by the hostile composites below
  # (download/write/packing context), so the atom itself stays notable.
  crit: notable
  conf: 0.9
  attack: T1059.001
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: "Start-Process[\\s\\S]{0,180}(DROP_PAYLOAD_PATH|\\.exe|TEMP|TMP)"
  unless:
  - id: metadata/library/structure::vscode-extension-generated-asset
  - id: well-known/app/pinokio::app-bundle
  - id: well-known/app/qwen-code::qwen-code-bundle-text
  - id: well-known/lib/sudo-prompt/
- id: exec-temp-unix-path
  desc: Exec call references /tmp path
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: \bexec(Sync|File)?\s*\([^)\n]{0,220}/tmp/
- id: exec-temp-env-path
  desc: Exec call references TEMP or TMP env
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: \bexec(Sync|File)?\s*\([^)\n]{0,220}process\.env\.(TEMP|TMP)
- id: exec-temp-os-tmpdir
  desc: Exec call references os.tmpdir()
  crit: component
  conf: 0.9
  for:
  - javascript
  - typescript
  if:
    type: text
    regex: \bexec(Sync|File)?\s*\([^)\n]{0,220}os\.tmpdir\(\)
