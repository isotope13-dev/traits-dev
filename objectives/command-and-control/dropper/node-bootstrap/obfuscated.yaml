# Obfuscated Node.js Dropper Patterns
# ATT&CK: T1105 (Ingress Tool Transfer) / T1027 (Obfuscated Files or Information)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
  - id: js-local-paths
    desc: JavaScript local paths
    crit: component
    any:
      - id: micro-behaviors/fs/path/construct::local-script-path
      - id: micro-behaviors/fs/path/construct::path-join-dirname
  - id: node-exec-dropped-file
    desc: Writes a file to local directory and executes it
    crit: suspicious
    conf: 0.75
    mbc: B0024
    attack: T1105
    all:
      - id: micro-behaviors/fs/write/file::write-file-sync
      - id: js-local-paths
    any:
      - id: micro-behaviors/process/create/shell/bridge::exec-call
      - id: micro-behaviors/process/create/shell/bridge::execSync-call
      - id: micro-behaviors/process/create/shell/bridge::spawn-call
    downgrade:
      any:
        - id: metadata/library/prettier::prettier-detection
  - id: obfuscated-node-dropper
    desc: Highly obfuscated Node.js file dropper and executor
    crit: hostile
    conf: 0.95
    mbc: B0024
    attack: T1105
    all:
      - id: node-exec-dropped-file
    any:
      - id: objectives/anti-static/obfuscation/string/encoding::js-mixed-encoding-usage
      - id: objectives/anti-static/obfuscation/payload/encoded::large-hex-string-dup
      - id: objectives/anti-static/obfuscation/payload/encoded::large-base64-string-dup
