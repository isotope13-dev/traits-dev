defaults:
  platforms: [unix, windows]
  for: [npm]

composite_rules:
  - id: raw-github-script-bootstrap
    desc: Package downloads mutable raw-GitHub content and executes scripts
    crit: suspicious
    conf: 0.94
    attack: "T1105,T1059"
    scope: archive
    all:
      - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-refs
      - id: micro-behaviors/communications/http/download/handler::node-http-stream-to-file
    any:
      - id: micro-behaviors/process/create/script/file::spawn-node-process
      - id: micro-behaviors/process/create/spawn::spawn-bash
