defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: sfx-runprogram-directive
    desc: SFX RunProgram directive
    crit: component
    conf: 0.9
    if:
      type: text
      substr: RunProgram=
  - id: sfx-hidden-cmd-stdin
    desc: SFX hidden cmd stdin execution
    crit: suspicious
    conf: 0.96
    attack: T1204.002
    mbc: B0023
    if:
      type: text
      substr: 'hidcon:cmd /c cmd <'
  - id: sfx-video-extension-stdin
    desc: SFX command reads video file
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\.(mpg|mpeg|avi|mp4)"'
  - id: sfx-media-named-entry
    desc: SFX media-named payload entry
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)[A-Za-z0-9_. -]{1,80}\.(mpg|mpeg|avi|mp4),'
  - id: sfx-temp-path-directive
    desc: SFX extracts to temp directory
    crit: component
    conf: 0.9
    if:
      type: text
      exact: Path=%temp%
  - id: sfx-silent-directive
    desc: SFX silent execution directive
    crit: component
    conf: 0.9
    if:
      type: text
      exact: Silent=1
  - id: sfx-xeno-injector-payload
    desc: SFX contains Xeno injector payload
    crit: suspicious
    conf: 0.96
    attack: T1204.002
    if:
      type: text
      exact: xenoinjector.exe
  - id: sfx-xeno-tool-payload
    desc: SFX contains Xeno injector tool
    crit: suspicious
    conf: 0.96
    attack: T1204.002
    if:
      type: text
      regex: '(?i)Xeno-v[0-9][A-Za-z0-9_.-]*\.exe'
composite_rules:
  - id: alzip-sfx-upx-wrapped
    desc: ALZip self-extractor wrapped in UPX packer
    crit: suspicious
    conf: 0.93
    mbc: B0032
    attack: T1027.002
    all:
      - id: metadata/binary/installer/sfx::alzip-sfx
      - id: metadata/binary/section/names::upx-section-pair
  - id: sfx-hidden-cmd-media-dropper
    desc: SFX hidden command executes media-named payload
    crit: hostile
    conf: 0.99
    attack: "T1204.002, T1059.003, T1036.008"
    mbc: "B0023, E1059"
    all:
      - id: sfx-runprogram-directive
      - id: micro-behaviors/process/create/hidden::sfx-hidcon-prefix
      - id: micro-behaviors/process/create/exec::cmd-shell-via-createprocess
      - id: sfx-hidden-cmd-stdin
      - id: sfx-video-extension-stdin
      - id: sfx-media-named-entry
  - id: winrar-sfx-xeno-injector-dropper
    desc: WinRAR SFX silently drops Xeno injector
    crit: hostile
    conf: 0.98
    attack: "T1204.002, T1055"
    mbc: "B0023, E1055"
    all:
      - id: sfx-temp-path-directive
      - id: sfx-silent-directive
      - id: sfx-xeno-injector-payload
      - id: sfx-xeno-tool-payload
    any:
      - id: metadata/binary/installer/sfx::winrar-sfx
      - id: metadata/binary/installer/sfx::dialog-start
      - id: metadata/binary/installer/sfx::registry-key
    unless:
      - id: metadata/signed/platform/
