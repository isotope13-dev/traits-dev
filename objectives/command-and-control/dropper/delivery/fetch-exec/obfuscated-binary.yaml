defaults:
  platforms: [linux]
  for: [elf]
  crit: component
  conf: 0.86

traits:
  - id: interleaved-wget-token
    desc: Interleaved wget command token
    if:
      type: string_literal
      regex: 'w.{1,4}g.{1,4}e.{1,4}t'
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: interleaved-chmod-token
    desc: Interleaved chmod command token
    if:
      type: string_literal
      regex: 'c.{1,4}h.{1,4}m.{1,4}o.{1,4}d'
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: interleaved-tftp-token
    desc: Interleaved tftp command token
    if:
      type: string_literal
      regex: 't.{1,4}f.{1,4}t.{1,4}p'
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: interleaved-bin-sh-token
    desc: Interleaved bin sh token
    if:
      type: string_literal
      regex: '/.{1,4}b.{1,4}i.{1,4}n.{1,4}/.{1,4}s.{1,4}h'
    unless:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::go-pe-symtab

composite_rules:
  - id: interleaved-download-exec-payload
    desc: Interleaved download-execute shell payload
    crit: suspicious
    conf: 0.92
    all:
      - id: interleaved-chmod-token
      - id: interleaved-bin-sh-token
    any:
      - id: interleaved-wget-token
      - id: interleaved-tftp-token
    needs: 1
    unless:
      - id: well-known/app/shotwell::shotwell-package-member
  - id: interleaved-download-exec-rwx-payload
    desc: Interleaved download-execute with RWX constants
    crit: suspicious
    conf: 0.9
    all:
      - id: interleaved-download-exec-payload
      - id: micro-behaviors/mem/protect/modify::repeated-07-byte-constant
    unless:
      - id: well-known/app/shotwell::shotwell-package-member
