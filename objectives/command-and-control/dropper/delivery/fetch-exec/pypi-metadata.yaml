defaults:
  platforms: [unix, windows]
  for: [pkginfo]
  attack: T1195.002

traits:
  - id: pypi-summary-fetch-run-phrase
    desc: PyPI summary fetch-run phrase
    crit: component
    conf: 0.88
    if:
      type: value
      path: summary
      regex: '\b(fetches|downloads?)\s+and\s+(runs?|executes?)\b'
      case_insensitive: true
  - id: pypi-summary-remote-phrase
    desc: PyPI summary remote phrase
    crit: component
    conf: 0.86
    if:
      type: value
      path: summary
      regex: '\bremote(ly)?\b'
      case_insensitive: true
  - id: pypi-description-downloads-runs-arabic
    desc: PyPI description claims download-run
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'تحميل.{0,80}تشغيل|تشغيل.{0,80}تحميل'

composite_rules:
  - id: pypi-summary-remote-fetch-run-claim
    desc: PyPI summary claims remote fetch-run
    crit: suspicious
    conf: 0.9
    all:
      - id: pypi-summary-fetch-run-phrase
      - id: pypi-summary-remote-phrase
  - id: pypi-metadata-remote-fetch-run-claim
    desc: PyPI metadata claims remote fetch-run
    crit: suspicious
    conf: 0.92
    any:
      - id: pypi-summary-remote-fetch-run-claim
      - id: pypi-description-downloads-runs-arabic
  - id: empty-wheel-remote-loader-claim
    desc: Empty wheel claims remote loader
    crit: suspicious
    conf: 0.92
    for: [whl]
    scope: archive
    all:
      - id: pypi-metadata-remote-fetch-run-claim
      - id: metadata/package/metrics::tiny-wheel-archive-content
