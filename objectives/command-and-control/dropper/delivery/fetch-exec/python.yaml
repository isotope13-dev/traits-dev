# Python fetch-execute-cleanup objective: downloaded code is made executable,
# launched, and removed in a nearby operation.
# MBC: B0030 (Dropper)
# ATT&CK: T1059.006, T1105
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: stealth-dropper
    desc: Nearby Python download, executable chmod, subprocess launch, and cleanup
    crit: suspicious
    conf: 0.95
    mbc: "B0030"
    attack: "T1059.006"
    for: [python]
    near_lines: 40
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::python-executable
      - id: micro-behaviors/fs/file/delete::py-remove
      - id: micro-behaviors/process/create/subprocess/
    any:
      - id: micro-behaviors/communications/http/download/
      - id: objectives/command-and-control/dropper/download/
