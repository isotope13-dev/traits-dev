defaults:
  attack: T1105
  mbc: B0030
  platforms: [unix]
  for: [shell]
traits:
  - id: shadowsocks-build-deb-bootstrap
    desc: Shadowsocks build helper bootstrap URL
    crit: component
    conf: 1.0
    if:
      type: text
      substr: "raw.githubusercontent.com/shadowsocks/shadowsocks-libev/master/scripts/build_deb.sh"
  - id: supplysrv-payload-names
    desc: Repeated SupplySrv payload names
    crit: component
    conf: 0.98
    count_min: 6
    if:
      type: text
      regex: '\bSupplySrv(arm|arm5|arm6|arm7|m68k|mips|mpsl|ppc|sh4|spc|x64|x86)\b'
  - id: spl-payload-names
    desc: Repeated spl payload names
    crit: component
    conf: 0.98
    count_min: 6
    if:
      type: text
      regex: '\bspl(arm|arm5|arm6|arm7|m68k|mips|mpsl|ppc|sh4|spc|x86)\b'
  - id: arch-args-arm
    desc: ARM-family payload selector arguments
    crit: component
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: '\b(arn|arn5|arn6|arn7|splarm|splarm5|splarm6|splarm7)\b'
  - id: arch-args-mips
    desc: MIPS-family payload selector arguments
    crit: component
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: '\b(m68k|mips|mpsl|ppc|splm68k|splmips|splmpsl|splppc)\b'
  - id: arch-args-misc
    desc: Mixed architecture payload selector arguments
    crit: component
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: '\b(sh4|spc|x64|x86|splsh4|splspc|splx86)\b'
  - id: uname-m-arch-var
    desc: uname architecture variable
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'ARCH=$(uname -m)'
  - id: arch-var-url-path
    desc: architecture variable in URL path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '/$ARCH'
  - id: hidden-dotfile-chmod-exec
    desc: hidden payload chmod then exec
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'chmod\s+\+x\s+\.[\w-]{1,12}\s+&&\s+\./\.[\w-]{1,12}'
  - id: temp-dir-fallback-chain
    desc: temp directory fallback chain
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'cd /tmp || cd /var/run || cd /dev/shm'
composite_rules:
  - id: multi-arch-payload-bundle
    desc: Download script stages many architecture variants
    crit: suspicious
    conf: 0.95
    any:
      - id: supplysrv-payload-names
      - id: spl-payload-names
    needs: 2
    all:
      - id: arch-args-arm
      - id: arch-args-mips
      - id: arch-args-misc
  - id: shell-download-chmod-exec
    desc: "Downloads, makes executable, and executes a payload"
    crit: hostile
    conf: 0.95
    near_lines: 20
    unless:
      - id: shadowsocks-build-deb-bootstrap
    all:
      - id: micro-behaviors/communications/http/download
      - id: micro-behaviors/fs/chmod/executable::any
      - id: micro-behaviors/process/create/local-exec::local-execution
  - id: shell-download-exec-delete
    desc: "Downloads, executes, and cleans up a payload"
    crit: hostile
    conf: 0.95
    near_lines: 20
    all:
      - id: micro-behaviors/communications/http/download
      - id: micro-behaviors/fs/chmod/executable::any
      - id: micro-behaviors/process/create/local-exec::local-execution
      - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
  - id: botnet-multi-arch-dropper
    desc: "Botnet dropper targeting multiple architectures"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/download
      - id: micro-behaviors/fs/chmod/executable::any
      - id: micro-behaviors/process/create/local-exec::local-execution
      - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
      - id: objectives/command-and-control/dropper/delivery/fetch-exec::multi-arch-payload-bundle
  - id: arch-adaptive-hidden-payload-loader
    desc: Architecture-adaptive hidden payload loader
    crit: hostile
    conf: 0.96
    near_lines: 8
    all:
      - id: uname-m-arch-var
      - id: arch-var-url-path
      - id: hidden-dotfile-chmod-exec
      - id: temp-dir-fallback-chain
      - id: micro-behaviors/communications/http/download/curl::wget-output-file
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
