defaults:
  attack: T1105
  mbc: B0030
  platforms: [unix, android, ios]
  for: [shell]
traits:
  - id: get-helm-installer-script
    desc: Helm installer helper script
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "./get_helm.sh"
  - id: conda-bootstrap-bash-invoke
    desc: Conda bootstrap bash invocation
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'bash "$TMP_DIR/$fname" -b -p "$DIR_CONDA"'
  - id: conda-profile-activate-chain
    desc: Conda profile activation chain
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'source \"$DIR_CONDA/etc/profile.d/conda.sh\" activate &&'
  - id: plugin-binary-install-path
    desc: Plugin binary install path
    crit: component
    conf: 0.95
    if:
      type: text
      substr: '"/usr/local/bin/${binary_name}"'
  - id: plugin-release-selector
    desc: Plugin release selector
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'Could not find a matching release for ${os}-${arch}'
  - id: alpine-minirootfs-download
    desc: Alpine minirootfs download
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'alpine-minirootfs-${ALPINE_VERSION}.0-${ALPINE_ARCH}.tar.gz'
  - id: qemu-preflight-check
    desc: QEMU preflight check
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'qemu-system-x86_64'
  - id: variable-host-http-url
    desc: HTTP URL via shell host variable
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: https?://\$[A-Za-z_][A-Za-z0-9_]*(/[\$A-Za-z0-9._-]+){1,2}
  - id: cd-unix-temp
    desc: Changes directory into temp path
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (^|[;&|]\s*|do\s+)cd\s+/(var/)?tmp\b
  - id: chmod-plus-x-wildcard
    desc: chmod +x on wildcard payload set
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: chmod\s+\+x\s+\*
  - id: repeated-long-staging-lines
    desc: Many long one-line staging chains
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '(;|&&|\|\|).{80,200}(wget|curl|chmod)'
composite_rules:
  - id: shell-network-stage
    desc: Shell downloader has staged network locator
    crit: suspicious
    conf: 0.9
    any:
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
      - id: micro-behaviors/communications/ip::http-ip-url
      - id: variable-host-http-url
  - id: shell-temp-stage
    desc: Shell stages payload in temp directory
    crit: suspicious
    conf: 0.88
    any:
      - id: micro-behaviors/fs/path/temp::unix-temp
      - id: objectives/command-and-control/dropper::tmp-path-short
      - id: cd-unix-temp
  - id: dual-fetch-stage
    desc: Shell stages payload with dual HTTP fetchers
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/communications/http/download/curl::wget-cmd
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: repeated-long-staging-lines
      - id: shell-network-stage
      - id: shell-temp-stage
  - id: shell-download-chmod-exec
    desc: "Downloads, makes executable, and executes a payload"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/download/curl/
      - id: micro-behaviors/fs/chmod/executable/
      - id: micro-behaviors/process/create/local-exec::local-execution
      - id: shell-network-stage
    any:
      - id: micro-behaviors/communications/http/protocol::http-url-literal
      - id: variable-host-http-url
  - id: shell-download-exec-delete
    desc: "Downloads, makes executable, executes, and deletes a payload"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/download/curl::wget-output-file
      - id: micro-behaviors/fs/chmod/executable/
      - id: micro-behaviors/process/create/local-exec::local-execution
      - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
  - id: shell-chmod-exec
    desc: "chmod and shell script execution"
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
      - id: micro-behaviors/fs/chmod/executable::shell-7xx
      - id: micro-behaviors/fs/chmod/executable/dangerous::shell-777
  - id: shell-download-chmod-exec-raw
    desc: "Downloads, chmods, and executes payload"
    crit: hostile
    conf: 0.95
    unless:
      - id: get-helm-installer-script
      - id: conda-bootstrap-bash-invoke
      - id: conda-profile-activate-chain
      - id: plugin-binary-installer-flow
      - id: alpine-rootfs-test-harness
    downgrade:
      any:
        - id: objectives/command-and-control/channel/deaddrop::fetch-github-raw-curl
        - id: objectives/command-and-control/channel/deaddrop::raw-githubusercontent-script-file
    all:
      - id: shell-chmod-exec
      - id: micro-behaviors/process/create/script::shell-script-execution-any
    any:
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: micro-behaviors/communications/http/download/curl::wget-output-file
      - id: micro-behaviors/communications/http/download/busybox::wget
      - id: micro-behaviors/communications/http/download/busybox::tftp
    needs: 1
  - id: plugin-binary-installer-flow
    desc: Plugin binary installer flow
    crit: component
    conf: 0.95
    all:
      - id: plugin-binary-install-path
      - id: plugin-release-selector
  - id: alpine-rootfs-test-harness
    desc: Alpine rootfs test harness
    crit: component
    conf: 0.95
    all:
      - id: alpine-minirootfs-download
      - id: qemu-preflight-check
  - id: iot-shell-dropper
    desc: "IoT shell dropper with busybox fallbacks"
    crit: hostile
    conf: 0.95
    all:
      - id: shell-download-chmod-exec-raw
      - id: objectives/command-and-control/botnet/iot::multi-protocol
  - id: botnet-multi-arch-dropper
    desc: "Botnet dropper targeting multiple architectures"
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/command-and-control/dropper/delivery/fetch-exec::shell-download-chmod-exec
      - id: objectives/discovery/system/architecture::shell-multi-arch-array
  - id: wget-multi-arch-ip-temp-cleanup
    desc: "Multi-arch wget temp payload dropper"
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/download/curl::wget-output-file
      - id: micro-behaviors/fs/chmod/executable/dangerous::shell-777
      - id: micro-behaviors/process/create/local-exec::local-execution
      - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
      - id: micro-behaviors/os/sysinfo/platform::multi-arch-target
      - id: shell-network-stage
      - id: shell-temp-stage
  - id: dual-fetch-exec-cleanup
    desc: "Dual-fetch shell dropper with wildcard exec cleanup"
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/dropper/delivery/fetch-exec::dual-fetch-stage
      - id: chmod-plus-x-wildcard
      - id: micro-behaviors/process/create/local-exec::local-execution
      - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
