defaults:
  attack: T1105
  mbc: B0030
  platforms: [linux, unix, macos, android, ios]
  for: [shell]
composite_rules:
  - id: shell-download-chmod-exec
    desc: "Downloads, makes executable, and executes a payload"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/download/curl/
      - id: micro-behaviors/fs/chmod/executable/
      - id: micro-behaviors/process/create/local-exec::local-execution
    any:
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
      - id: micro-behaviors/communications/http/protocol::http-url-literal
      - id: micro-behaviors/communications/ip::http-ip-url
  - id: shell-download-exec-delete
    desc: "Downloads, makes executable, executes, and deletes a payload"
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/download/curl::wget-output-file
      - id: micro-behaviors/fs/chmod/executable/
      - id: micro-behaviors/process/create/local-exec::local-execution
      - id: micro-behaviors/fs/directory/traverse::rm-rf-cmd
  - id: shell-chmod-exec
    desc: "chmod and shell script execution"
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
      - id: micro-behaviors/fs/chmod/executable::shell-7xx
      - id: micro-behaviors/fs/chmod/executable/dangerous::shell-777
  - id: shell-download-chmod-exec-raw
    desc: "Downloads, chmods, and executes payload"
    crit: hostile
    conf: 0.95
    not:
      - substr: "./get_helm.sh"
    downgrade:
      any:
        - id: objectives/command-and-control/channel/deaddrop::fetch-github-raw-curl
        - id: objectives/command-and-control/channel/deaddrop::raw-githubusercontent-script-file
    all:
      - id: shell-chmod-exec
      - id: micro-behaviors/process/create/script::shell-script-execution-any
    any:
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: micro-behaviors/communications/http/download/curl::wget-output-file
      - id: micro-behaviors/communications/http/download/busybox::wget
      - id: micro-behaviors/communications/http/download/busybox::tftp
    needs: 1
  - id: iot-shell-dropper
    desc: "IoT shell dropper with busybox fallbacks"
    crit: hostile
    conf: 0.95
    all:
      - id: shell-download-chmod-exec-raw
      - id: objectives/command-and-control/botnet/iot::multi-protocol
  - id: botnet-multi-arch-dropper
    desc: "Botnet dropper targeting multiple architectures"
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/command-and-control/dropper/delivery/fetch-exec::shell-download-chmod-exec
      - id: objectives/discovery/system/architecture::shell-multi-arch-array
