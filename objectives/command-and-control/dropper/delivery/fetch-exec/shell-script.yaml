defaults:
  platforms: [unix]
  for: [shell]
  attack: T1105
  mbc: B0030

composite_rules:
  - id: shell-download-chmod-script-exec
    desc: Downloads, chmods, and executes shell script
    crit: hostile
    conf: 0.96
    near_lines: 20
    all:
      - id: micro-behaviors/communications/http/download
      - id: micro-behaviors/fs/chmod/executable/mode
      - id: micro-behaviors/communications/http/download/shell::shell-script-url-download
    any:
      - id: micro-behaviors/process/create/script/file::shell-script-execution-any
      - id: micro-behaviors/process/create/script/file::nohup-shell-script-execution
      - id: objectives/command-and-control/botnet/iot::multi-protocol
      - id: objectives/command-and-control/botnet/iot::busybox-shell
      - id: micro-behaviors/communications/ftp/download/tftp::command
      - id: micro-behaviors/communications/ftp/download/busybox::ftpget
    unless:
      - id: well-known/tool/offensive/pentestkit/
      - id: well-known/lib/adios2::adios2-ci-setup-context
