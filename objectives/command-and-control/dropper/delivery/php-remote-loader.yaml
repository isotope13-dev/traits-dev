defaults:
  platforms: [unix, windows]
  for: [php]
  crit: suspicious
  conf: 0.9
  attack: T1584
traits:
  - id: php-remote-spam-header
    desc: PHP header redirect based on C2 response
    if:
      type: text
      regex: '(?si)preg_match\s*\(\s*[''"]/\^http/.{0,200}header\s*\(\s*[''"]Location:'
  - id: php-remote-spam-injection
    desc: PHP SEO spam injection marker (## prefix)
    if:
      type: text
      regex: 'preg_match\s*\(\s*[''"]/\^##/'
  - id: php-seo-cloaking
    desc: PHP SEO search engine cloaking (fake sitemap/html)
    if:
      type: text
      regex: '(?si)strlen\s*\([^)]{0,50}>\s*90.{0,200}strstr\s*\([^,]{0,50}([a-z_]{1,10}\([0-9]{1,2}\)|[''"](</urlset>|<html))'
  - id: php-dynamic-curl-exec
    desc: PHP dynamic curl_exec call from lookup table
    if:
      type: text
      regex: '(?si)\$[a-z0-9_]{1,10}\s*=\s*(\$this->)?[a-z0-9_]{1,10}\(9\).{0,200}\$[a-z0-9_]{1,10}\(\$[a-z0-9_]{1,10}\)'
  - id: php-base64-backlink-fetch
    desc: PHP base64 backlink fetch call
    if:
      type: text
      substr: "echo file_get_contents(base64_decode("
  - id: php-backlink-feed-endpoint
    desc: Encoded backlink feed endpoint
    if:
      type: encoded
      substr: "/tools/backlink/data_backlink/backlink_all.php?domain="
  - id: php-offscreen-link-block
    desc: Off-screen hidden link block
    if:
      type: text
      substr: "position:absolute;left:-9999px;top:-9999px;"
  - id: wordpress-wp-head-hook
    desc: WordPress wp_head hook
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: wp_head
  - id: wordpress-wp-body-open-hook
    desc: WordPress wp_body_open hook
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: wp_body_open
  - id: wordpress-theme-brand-marker
    desc: Twenty Fourteen theme marker
    crit: component
    conf: 0.93
    if:
      type: text
      word: twentyfourteen
composite_rules:
  - id: php-seo-spam-loader
    desc: PHP dynamic SEO spam remote loader
    crit: hostile
    any:
      - id: php-remote-spam-header
      - id: php-remote-spam-injection
      - id: php-seo-cloaking
      - id: php-dynamic-curl-exec
  - id: php-obfuscation-variant
    desc: PHP obfuscation patterns
    any:
      - id: objectives/anti-static/obfuscation/string::php-two-char-chunks
      - id: objectives/anti-static/obfuscation/imports::dynamic-function-execution
      - id: objectives/anti-static/obfuscation/imports::member-lookup-execution
  - id: php-seo-spam-obfuscated
    desc: Obfuscated PHP SEO spam injector
    crit: hostile
    all:
      - id: php-seo-spam-loader
      - id: php-obfuscation-variant
  - id: php-seo-backlink-wordpress-theme
    desc: WordPress theme backlink spam loader
    crit: hostile
    conf: 0.98
    all:
      - id: php-base64-backlink-fetch
      - id: php-backlink-feed-endpoint
      - id: objectives/command-and-control/dropper/delivery::php-dofollow-link-farm
      - id: wordpress-theme-header-hook
    any:
      - id: php-offscreen-link-block
      - id: wordpress-theme-brand-marker
  - id: wordpress-theme-header-hook
    desc: WordPress theme header hook pair
    crit: component
    conf: 0.95
    all:
      - id: wordpress-wp-head-hook
      - id: wordpress-wp-body-open-hook
