# Blockchain-Staged Payload Delivery
# Detects retrieval of payloads from blockchain explorers or smart contracts.
# ATT&CK: T1105 (Ingress Tool Transfer)
defaults:
  platforms: [windows, unix]
  for: [javascript, python, shell]
traits:
- id: blockchain-explorer-link--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(?i)(tronscan\.org|bscscan\.com)'

  count_max: 1007389
- id: blockchain-explorer-link--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(?i)(etherscan\.io|polygonscan\.com)'

  count_max: 1007390
- id: blockchain-explorer-link--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(?i)(solscan\.io|aptoslabs\.com)'

  count_max: 1007391
- id: blockchain-explorer-link--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(?i)(trongrid\.io|api\.blockcypher\.com)'

  count_max: 1007392
- id: blockchain-explorer-link--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(?i)(etherscan-api|bscscan-api)'

  count_max: 1007393
composite_rules:
- id: blockchain-transaction-eval-loader
  desc: Blockchain transaction eval loader
  crit: hostile
  conf: 0.96
  attack: T1105
  all:
  - id: objectives/command-and-control/infrastructure/blockchain::multi-chain-c2
  any:
  - id: objectives/execution/interpreter/eval::eval-variable
  - id: objectives/execution/interpreter/eval/dynamic::eval-variable
  - id: objectives/supply-chain/hidden-payload/staging::eval-function-call-arg
  - id: micro-behaviors/process/interpreter/eval::js-eval-raw
- id: blockchain-payload-execution
  desc: Executes blockchain explorer response data
  crit: hostile
  conf: 0.9
  all:
  - id: blockchain-explorer-link
  any:
  - id: objectives/command-and-control/dropper/delivery/fetch-eval::checked-json-message-base64-exec
  - id: objectives/command-and-control/dropper/delivery/fetch-eval::fetch-atob-json-eval-loader
  - id: objectives/command-and-control/dropper/delivery/fetch-eval::node-https-eval-loader
- id: blockchain-staged-delivery
  desc: Staged payload delivery through blockchain infrastructure
  crit: hostile
  conf: 0.95
  all:
  - id: blockchain-explorer-link
  any:
  - id: blockchain-payload-execution
- id: blockchain-explorer-link
  desc: Blockchain explorer endpoint or page reference
  crit: component
  conf: 0.75
  any:
  - id: blockchain-explorer-link--rx-1
  - id: blockchain-explorer-link--rx-2
  - id: blockchain-explorer-link--rx-3
  - id: blockchain-explorer-link--rx-4
  - id: blockchain-explorer-link--rx-5
