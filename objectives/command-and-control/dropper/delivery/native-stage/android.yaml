defaults:
  platforms: [android]
  for: [elf]
  attack: "T1105, T1059"
  mbc: "B0024"

traits:
  - id: native-stage-new-format
    desc: Native stage new-file suffix
    crit: component
    conf: 0.86
    if:
      type: text
      exact: "%s.new"

  - id: app-process-launch-name
    desc: Android app_process launch name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: app_process

composite_rules:
  - id: android-native-http-hidden-tmp-stage
    desc: Android native HTTP hidden tmp stage
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/get::manual-http10-dynamic-get
      - id: micro-behaviors/fs/path/temp::android-hidden-local-tmp-dotfile
      - id: native-stage-new-format
      - id: app-process-launch-name
