# Python multi-stage delivery patterns: stage 1 retrieves config or stage 2
# from a non-HTTP channel (DNS TXT, image steganography, /sync-style API)
# before the actual payload is fetched/executed.
#
# These complement the existing stego (delivery/stego/) and infrastructure
# (channel/tunnel/, infrastructure/ip/stego-c2.yaml) traits which focus on
# binary stego — this file covers script-side multi-stage retrieval.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1105
  mbc: B0023

traits:
  # Stage-2 URL retrieved from DNS TXT record. Indicator: dnspython resolve
  # for type='TXT' followed by base64/hex decoding of the response.
- id: dns-txt-config-retrieve
  desc: Stage-2 config retrieved from DNS TXT record
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'dns\.resolver\.(?:resolve|query)\s*\([^)\n]{0,200}["'']TXT["'']'

  # JSON config endpoint retrieval where the config drives staging:
  # response field "url" / "endpoint" / "stage" is fed back into a download.
- id: stage-config-endpoint-retrieve--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: manifest.json
  count_max: 1006445
- id: stage-config-endpoint-retrieve--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: config.json
  count_max: 1006446
- id: stage-config-endpoint-retrieve--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: session
  count_max: 1006447
- id: stage-config-endpoint-retrieve--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: api/v
  count_max: 1006448
- id: stage-config-endpoint-retrieve--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: stage
  count_max: 1006449
- id: stage-config-endpoint-retrieve--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: auth
  count_max: 1006450
- id: stage-config-endpoint-retrieve--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: data
  count_max: 1006451
- id: stage-config-endpoint-retrieve--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: init
  count_max: 1006452
- id: pil-image-bit-extract
  desc: PIL bit-level extraction from image
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'Image\.open\s*\([^)\n]{0,160}\)\.getdata\s*\(\s*\)'

  # Image LSB extraction shape: bit & 1 in a generator over pixels.
- id: pil-lsb-loop--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: getdata
  count_max: 1006454
- id: pil-lsb-loop--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: pixels
  count_max: 1006455
- id: pil-lsb-loop--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: image
  count_max: 1006456
- id: exif-comment-retrieve
  desc: EXIF comment field retrieved as payload
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '_getexif\s*\(\s*\)\s*\.\s*get\s*\(\s*0x9286'

  # Pastebin/gist as stage-2 source — URL endpoints commonly used as drop boxes.
- id: pastebin-raw-fetch--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: gist.githubusercontent.com
  count_max: 1006458
- id: pastebin-raw-fetch--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: hastebin.com/raw
  count_max: 1006459
- id: pastebin-raw-fetch--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: pastebin.com/raw
  count_max: 1006460
- id: pastebin-raw-fetch--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: controlc.com
  count_max: 1006461
- id: pastebin-raw-fetch--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: paste.ee/r
  count_max: 1006462
composite_rules:
- id: multi-stage-delivery
  desc: Multi-stage payload delivery (any form)
  crit: suspicious
  conf: 0.94
  any:
  - id: dns-txt-config-retrieve
  - id: stage-config-endpoint-retrieve
  - id: pil-image-bit-extract
  - id: pil-lsb-loop
  - id: exif-comment-retrieve
  - id: pastebin-raw-fetch

  # Stage-1 retrieve + stage-2 exec is the canonical two-stage pattern.
- id: two-stage-fetch-and-exec
  desc: Stage-2 retrieved then executed
  crit: hostile
  conf: 0.96
  all:
  - id: multi-stage-delivery
  any:
  - id: micro-behaviors/process/create/subprocess
  - id: micro-behaviors/process/interpreter/python::exec-builtin
  - id: micro-behaviors/process/interpreter/python::eval-builtin
  downgrade:
    any:
    - id: metadata/package/testing/presence::python-test-file
    - id: metadata/package/testing/presence::test-directory
  unless:
    - id: well-known/lib/scikit-learn::package
    - id: well-known/lib/psutil::python-package
    - id: well-known/app/piglit::package
- id: stage-config-endpoint-retrieve
  desc: Config endpoint retrieved before stage-2 fetch
  crit: suspicious
  conf: 0.85
  any:
  - id: stage-config-endpoint-retrieve--rx-1
  - id: stage-config-endpoint-retrieve--rx-2
  - id: stage-config-endpoint-retrieve--rx-3
  - id: stage-config-endpoint-retrieve--rx-4
  - id: stage-config-endpoint-retrieve--rx-5
  - id: stage-config-endpoint-retrieve--rx-6
  - id: stage-config-endpoint-retrieve--rx-7
  - id: stage-config-endpoint-retrieve--rx-8
- id: pil-lsb-loop
  desc: PIL LSB extraction loop
  crit: suspicious
  conf: 0.94
  any:
  - id: pil-lsb-loop--rx-9
  - id: pil-lsb-loop--rx-10
  - id: pil-lsb-loop--rx-11
- id: pastebin-raw-fetch
  desc: Pastebin/gist raw URL fetched for stage-2
  crit: suspicious
  conf: 0.92
  any:
  - id: pastebin-raw-fetch--rx-12
  - id: pastebin-raw-fetch--rx-13
  - id: pastebin-raw-fetch--rx-14
  - id: pastebin-raw-fetch--rx-15
  - id: pastebin-raw-fetch--rx-16
