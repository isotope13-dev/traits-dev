  - id: micro-behaviors/process/create/shell/bridge::child-process-require
  - id: micro-behaviors/process/create/shell/bridge::child-process-exec
  - id: objectives/command-and-control/infrastructure/domain::workers-dev-url
- id: workers-fetch-text-eval-loader
  desc: Workers URL fetches text into eval
  crit: hostile
  conf: 0.98
  attack: T1059.007
  all:
  - id: await-fetch-text-eval
  - id: objectives/command-and-control/infrastructure/domain::workers-dev-url
  any:
  - id: micro-behaviors/process/create/spawn::detached-true
  - id: objectives/supply-chain/metadata-anomaly/markers/npm::child-dot-unref
- id: new-function-variable-body
  desc: Function constructor with payload body
  crit: suspicious
  conf: 0.85
  attack: T1059.007
  any:
  - id: new-function-variable-body--rx-1
  - id: new-function-variable-body--rx-2
  - id: new-function-variable-body--rx-3
  - id: new-function-variable-body--rx-4
  - id: new-function-variable-body--rx-5
  - id: new-function-variable-body--rx-6
  - id: new-function-variable-body--rx-7
  - id: new-function-variable-body--rx-8
  not:
