  crit: hostile
  conf: 0.99
  attack: T1059.007
  mbc: B0009.016
  all:
  - id: micro-behaviors/communications/http/get::axios-require-get-call
  - id: eval-response-data-content
  - id: micro-behaviors/process/interpreter/vm::base64-url
  unless:
  - id: metadata/package/testing/harness::is-test
  - id: metadata/package/testing/presence::test-fixtures
- id: fetch-to-function-constructor
