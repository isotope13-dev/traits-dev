# Fetch-to-eval dropper pattern
# Detects code that fetches remote JSON and executes the response via Function constructor
# Common in npm supply-chain malware: fetch(c2) → response.json() → new Function(data.field)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.8
  attack: T1105
traits:
  - id: fetch-response-json
    desc: HTTP fetch with JSON response parsing
    crit: component
    conf: 0.7
    if:
      type: text
      substr: response.json()
  - id: fetch-then-json-callback
    desc: fetch promise parses JSON response
    crit: component
    conf: 0.82
    if:
      type: text
      regex: fetch\(.{1,120}\)\.then\(\w+\s*=>\s*\w+\.json\(\)\)
  - id: fetch-atob-json-callback
    desc: fetch decodes URL then parses JSON
    crit: component
    conf: 0.92
    if:
      type: text
      regex: fetch\s*\(\s*atob\s*\(.{1,80}\)\s*\)[\s\S]{0,160}\.json\s*\(
  - id: eval-json-content-field
    desc: eval executes JSON content field
    crit: suspicious
    conf: 0.96
    attack: T1059.007
    if:
      type: text
      regex: const\s+[A-Za-z_$][\w$]*\s*=\s*\w+\.content;\s*eval\s*\(
  - id: eval-direct-json-content
    desc: eval directly executes JSON content
    crit: suspicious
    conf: 0.98
    attack: T1059.007
    if:
      type: text
      regex: \beval\s*\(\s*[A-Za-z_$][\w$]*\.content\s*\)
  - id: function-result-invoked-require
    desc: Generated function invoked with require
    crit: component
    conf: 0.92
    attack: T1059.007
    if:
      type: text
      regex: \b[A-Za-z_$][\w$]*\(\s*require\s*\)
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: object-values-to-validation-handler
    desc: JSON object values routed to handler
    crit: component
    conf: 0.86
    if:
      type: text
      regex: Object\.keys\(\w+\)\.forEach\(\w+\s*=>\s*\w+\(\w+\[\w+\]\)\)
  - id: jsonkeeper-b64-endpoint
    desc: Base64 encoded jsonkeeper endpoint
    crit: component
    conf: 0.98
    if:
      type: encoded
      encoding: base64
      regex: https://(www\.)?jsonkeeper\.com/b/[A-Za-z0-9_-]{4,16}
  - id: await-fetch-text-eval
    desc: eval awaits fetched response text
    crit: suspicious
    conf: 0.98
    attack: T1059.007
    if:
      type: text
      regex: eval\s*\(\s*await\s*\(\s*await\s+fetch\(.{1,120}\)\)\.text\(\)\s*\)
  - id: userjs-endpoint
    desc: User JavaScript endpoint path
    crit: component
    conf: 0.9
    if:
      type: string_literal
      substr: /api/userjs/
  - id: fetch-text-function-code
    desc: Fetched text executed as Function
    crit: suspicious
    conf: 0.96
    attack: T1059.007
    if:
      type: text
      regex: '\.text\(\)[\s\S]{0,120}new Function\(\s*code\s*\)'
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
  - id: new-function-variable-body
    desc: Function constructor with payload body
    crit: notable
    conf: 0.85
    attack: T1059.007
    if:
      type: text
      regex: new Function\([^)]{0,200}\b(?:data|payload|content|body|script|source|result|json)\b[^)]{0,200}\)
    not:
      - substr: '"use strict"'
      - substr: "'use strict'"
      - substr: "new Function(this.args("
      - substr: "new Function('return this')"
      - substr: 'new Function("return this")'
  - id: recursive-retry-pattern
    desc: Recursive function retry on failure
    crit: component
    conf: 0.7
    if:
      type: text
      regex: if \(\w+ > 0\) \{\s+\w+\(\w+ - 1\)
  - id: url-string-concatenation
    desc: URL built from protocol separator domain
    crit: component
    conf: 0.65
    if:
      type: text
      regex: protocol.{0,30}separator.{0,30}domain.{0,30}path
composite_rules:
  - id: fetch-eval-remote-code
    desc: Fetch remote code and eval in memory
    crit: hostile
    conf: 0.95
    attack: T1059.007
    mbc: B0009.016
    not:
      - substr: "fromText eval for "
    all:
      - id: micro-behaviors/communications/http/request::js-fetch-call
      - id: objectives/command-and-control/dropper/execution::js-eval-call
    any:
      - id: objectives/anti-static/obfuscation/encoding::encoded-http-url
      - id: objectives/anti-static/obfuscation/string/encoding::js-hex-escape
      - id: objectives/supply-chain/hidden-payload/staging::eval-function-call-arg
    needs: 1
    downgrade:
      any:
        - id: metadata/library/structure::js-large-module-bundle
        - id: metadata/package/tooling::webpack-bundled
  - id: fetch-atob-json-eval-loader
    desc: Base64 URL JSON payload eval loader
    crit: hostile
    conf: 0.98
    attack: T1059.007
    mbc: B0009.016
    all:
      - id: fetch-atob-json-callback
    any:
      - id: eval-json-content-field
      - id: eval-direct-json-content
    needs: 1
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
  - id: fetch-to-function-constructor
    desc: Remote fetch feeding Function constructor
    crit: hostile
    conf: 0.95
    attack: T1059.007
    mbc: B0009.016
    all:
      - id: fetch-response-json
      - id: new-function-variable-body
    any:
      - id: recursive-retry-pattern
      - id: url-string-concatenation
      - id: micro-behaviors/communications/http/request::fetch-string
      - id: objectives/supply-chain/impersonation::js-require-shadow
  - id: browser-userjs-function-loader
    desc: Browser fetches and executes user JavaScript
    crit: hostile
    conf: 0.98
    attack: T1059.007
    mbc: B0009.016
    all:
      - id: userjs-endpoint
      - id: fetch-text-function-code
      - id: micro-behaviors/communications/http/request::fetch-string
    any:
      - id: objectives/anti-analysis/sandbox-detect/heuristics::js-cloaker-browser-bot-fingerprint
      - id: micro-behaviors/communications/http/request::post-method-text
    needs: 1
  - id: fetch-json-function-constructor-require
    desc: Remote JSON executed via require-enabled Function
    crit: hostile
    conf: 0.99
    attack: T1059.007
    mbc: B0009.016
    all:
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require
      - id: function-result-invoked-require
      - id: object-values-to-validation-handler
    any:
      - id: fetch-then-json-callback
      - id: objectives/command-and-control/dropper/execution/loader::fetch-then-json
    needs: 1
    unless:
      - id: metadata/package/testing/harness::is-test
  - id: jsonkeeper-remote-eval-loader
    desc: Jsonkeeper payload executed via Function
    crit: hostile
    conf: 0.995
    attack: T1102.001
    all:
      - id: fetch-json-function-constructor-require
      - id: jsonkeeper-b64-endpoint
  - id: detached-fetch-text-eval-loader
    desc: Detached process fetches and evals text
    crit: hostile
    conf: 0.99
    attack: T1059.007
    all:
      - id: await-fetch-text-eval
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::child-dot-unref
    any:
      - id: micro-behaviors/process/create/shell/lang::child-process-require
      - id: micro-behaviors/process/create/shell/lang::child-process-exec
      - id: objectives/command-and-control/infrastructure/domain::workers-dev-url
  - id: workers-fetch-text-eval-loader
    desc: Workers URL fetches text into eval
    crit: hostile
    conf: 0.98
    attack: T1059.007
    all:
      - id: await-fetch-text-eval
      - id: objectives/command-and-control/infrastructure/domain::workers-dev-url
    any:
      - id: micro-behaviors/process/create/spawn::detached-true
      - id: objectives/supply-chain/metadata-anomaly/markers/npm::child-dot-unref
