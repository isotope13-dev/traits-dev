# Download and Execute Pattern Detection
# Detects malware that downloads payloads and executes them
# ATT&CK: T1105 (Ingress Tool Transfer), T1059 (Command Execution)
# MBC: E1105 (Tool Transfer)
defaults:
  platforms: [windows, unix]
  crit: suspicious
  attack: "T1105"
  mbc: "E1105"
  for: [python, shell]
traits:
  # === Download to Home Directory ===
- id: download-to-home
  desc: Download to home directory
  crit: notable
  conf: 0.85
    # Small files downloading to home are more suspicious
  size_max: 5000
  if:
    type: text
    regex: "(?m)^\\s*\\$?(curl|wget)\\b[^\\n]{0,50}(HOME|~/|\\$HOME)"
  not:
  - regex: "(?i)netbsd\\.org"
  - regex: "(?i)freebsd\\.org"
  - regex: "(?i)openbsd\\.org"
  - regex: "(?i)dragonflybsd\\.org"
  - regex: "(?i)kernel\\.org"
  - regex: "(?i)github\\.com"
  - regex: "(?i)google\\.com"
  unless:
  - type: text
    substr: codacy-coverage-reporter
  # Dockerfile RUN layers (analyzed as embedded shell) routinely fetch
  # installers into the build container's home — not a victim's home.
  - id: metadata/build/docker::dockerfile-basename
- id: curl-silent-output
  desc: Silent curl with output
  crit: component
  conf: 0.75
  if:
    type: text
    regex: "curl.{0,50}--silent.{0,50}--output|curl.{0,50}-s.{0,50}-o"
  # === Cookie-based Download Tracking ===
- id: curl-with-cookie
  desc: curl with tracking cookie
  crit: suspicious
  conf: 0.80
  if:
    type: text
    regex: "\\bcurl\\b[^\\n]{0,80}(--cookie(\\s|=)|\\s-b(\\s|=))[^\\n]{0,50}[0-9]{10,}"
  # === Download and Execute Chain ===
- id: download-chmod-execute
  desc: Download chmod execute chain
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: "(curl|wget).{0,50}chmod.{0,50}\\+x.{0,50}os\\.system"
- id: write-binary-execute
  desc: Write binary and execute
  crit: suspicious
  conf: 0.90
  if:
    type: text
    regex: "write\\(fileData\\).{0,50}system.{0,50}&|write\\(.{0,50}\\).{0,50}chmod.{0,50}\\+x"
- id: python-temp-exe-download-buffer
  desc: Python downloads to temp exe
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: 'tempfile\.mktemp\(suffix=["'']\.exe["'']\)'
- id: python-run-temp-exe
  desc: Python runs temp exe
  crit: component
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: 'subprocess\.run\(\[tmp\]'
composite_rules:
- id: python-download-run-temp-exe
  desc: Python downloads and runs temp exe
  crit: suspicious
  conf: 0.94
  for: [python]
  all:
  - id: python-temp-exe-download-buffer
  - id: python-run-temp-exe
  - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
- id: shell-silent-hardcoded-output-staging
  desc: Shell silently stages hardcoded remote file
  crit: suspicious
  conf: 0.9
  for: [shell]
  all:
  - id: curl-silent-output
  - id: objectives/command-and-control/dropper/execution/eval::download-url-hardcoded
  - id: micro-behaviors/communications/http/download/curl::curl-output-file
- id: shell-silent-external-ip-download
  desc: Shell silently downloads external-IP response
  crit: suspicious
  conf: 0.92
  for: [shell]
  all:
  - id: micro-behaviors/communications/http/download/curl::curl-silent
  - id: micro-behaviors/communications/http/url/external-ip::curl-external-ip-request
  - id: micro-behaviors/communications/http/download/curl::curl-output-staging-path
- id: shell-home-silent-hardcoded-download
  desc: Shell script silently downloads hardcoded URL to home path
  crit: hostile
  conf: 0.96
  for: [shell]
  all:
  - id: download-to-home
  - id: curl-silent-output
  - id: objectives/command-and-control/dropper/execution/eval::download-url-hardcoded
- id: shell-silent-hardcoded-download-staging
  desc: Shell script silently stages a hardcoded remote payload
  crit: hostile
  conf: 0.96
  for: [shell]
  all:
  - id: curl-silent-output
  - id: objectives/command-and-control/dropper/execution/eval::download-url-hardcoded
  any:
  - id: objectives/command-and-control/infrastructure/
  - id: micro-behaviors/communications/http/download/curl/
  - id: micro-behaviors/communications/http/download/curl::curl-quiet-http-request
  unless:
  - id: metadata/file/string/cloud::aws-imds-v2-token-ttl-header
  - id: metadata/file/string/cloud::aws-imds-v2-token-endpoint
- id: download-and-execute
  desc: Download and execute payload
  crit: suspicious
  conf: 0.96
  needs: 2
  any:
  - id: download-chmod-execute
  - id: write-binary-execute
  - id: micro-behaviors/process/daemonize/devnull::background-execution-devnull
- id: shell-hidden-wget-chmod-detached-stage
  desc: Shell stages hidden payload and detaches it
  crit: hostile
  conf: 0.98
  attack: "T1105, T1059.004"
  mbc: "B0024"
  for: [shell]
  near_lines: 20
  all:
  - id: micro-behaviors/fs/path/location::hidden-writable-path
  - id: objectives/command-and-control/dropper/execution/eval::download-url-hardcoded
  - id: micro-behaviors/communications/http/download/curl::wget-output-file
  - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-var-target
  - id: micro-behaviors/process/daemonize/detach::nohup-hidden-output
- id: shell-hidden-payload-download-chmod-exec
  desc: Shell downloads and arms hidden shell payload
  crit: hostile
  conf: 0.97
  attack: "T1105, T1059.004"
  mbc: "B0024"
  for: [shell]
  near_lines: 20
  all:
  - id: micro-behaviors/fs/path/location::hidden-writable-path
  - id: objectives/command-and-control/dropper/execution/eval::download-url-hardcoded
  - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-var-target
  - id: micro-behaviors/process/create/script/file::nohup-shell-script-execution
