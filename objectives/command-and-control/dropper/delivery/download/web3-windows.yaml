defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1105
composite_rules:
  - id: arweave-graphql-documents-dropper
    desc: Arweave GraphQL dead-drop downloader staging payload in Documents
    crit: suspicious
    conf: 0.985
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
    all:
      - id: objectives/command-and-control/infrastructure/blockchain/arweave::arweave-tagged-dead-drop
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
      - id: micro-behaviors/fs/shell-ops::shell-get-folder-path
    any:
      - id: micro-behaviors/communications/http/ip-discovery::api-myip-com
      - id: objectives/discovery/system/locale::windows-locale-fingerprint
      - id: metadata/binary/section/names::writable-rdata
      - id: micro-behaviors/fs/path/location::path-screenshot-album-dir
      - id: micro-behaviors/fs/directory/mkdir::create-directory-w
      - id: micro-behaviors/fs/file/open::createfile-api
      - id: micro-behaviors/fs/file/write/direct::writefile-api
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/fs/path/extension::exe-dup
    needs: 4
  - id: arweave-graphql-documents-exec-dropper
    desc: Arweave dead-drop fetches and executes EXE from Documents staging path
    crit: hostile
    conf: 0.997
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
    all:
      - id: arweave-graphql-documents-dropper
      - id: micro-behaviors/process/create/exec::shell-execute
    any:
      - id: micro-behaviors/fs/path/location::path-screenshot-album-payload
      - id: micro-behaviors/fs/file/open::createfile-api
      - id: micro-behaviors/fs/file/write/direct::writefile-api
      - id: metadata/binary/section/names::writable-rdata
    needs: 2
