# Package runner remote payload execution
# Detects use of npm/bun/pnpm/yarn package runners to download and
# execute remote packages directly from URLs — a common supply-chain
# dropper technique.
defaults:
  platforms: [windows, unix]
  for:
    - shell
    - javascript
    - typescript
    - python
    - ruby
    - powershell
  attack: T1059.007
traits:
  # Use raw matching — in shell these are commands, not string literals.
  # raw also matches inside JS string literals so both languages are covered.

  - id: npx-url-exec
    desc: npx remote package execution from URL
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'npx\s+(-y\s+)?https?://'

  - id: bunx-url-exec
    desc: bunx remote package execution from URL
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'bunx\s+https?://'

  - id: pnpx-url-exec
    desc: pnpx remote package execution from URL
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'pnpx\s+https?://'

  - id: yarn-dlx-url-exec
    desc: yarn dlx remote package execution from URL
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'yarn\s+dlx\s+https?://'

  - id: pip-install-url-exec
    desc: pip install from remote URL
    crit: suspicious
    conf: 0.9
    for:
      - shell
      - python
    if:
      type: text
      regex: 'pip3?\s+install\s+https?://'
    unless:
      - id: well-known/app/calvyn-code

  - id: gem-install-url-exec
    desc: gem install from remote URL
    crit: suspicious
    conf: 0.9
    for:
      - shell
      - ruby
    if:
      type: text
      regex: 'gem\s+install\s+https?://'

  - id: deno-run-url-exec
    desc: Deno run from remote URL
    crit: suspicious
    conf: 0.95
    for:
      - shell
      - javascript
      - typescript
    if:
      type: text
      regex: 'deno\s+run\s+https?://'
    unless:
      - id: objectives/command-and-control/channel/deaddrop/url::security-rule-runtime-script-floating-url

composite_rules:
  - id: multi-runner-url-fallback
    desc: Multiple package runners fetch same URL
    crit: suspicious
    conf: 0.98
    needs: 2
    any:
      - id: npx-url-exec
      - id: bunx-url-exec
      - id: pnpx-url-exec
      - id: yarn-dlx-url-exec

  - id: package-runner-dropper
    desc: Node.js package runner remote payload dropper
    crit: hostile
    conf: 0.98
    any:
      - id: npx-url-exec
      - id: bunx-url-exec
      - id: pnpx-url-exec
      - id: yarn-dlx-url-exec
    all:
      - id: micro-behaviors/process/create/shell/bridge::child-process-exec

  - id: package-runner-fallback-dropper
    desc: Multi-runner remote package execution fallback
    crit: hostile
    conf: 0.99
    all:
      - id: multi-runner-url-fallback
      - id: micro-behaviors/process/create/shell/bridge::child-process-exec

  - id: script-runner-dropper
    desc: Script package runner remote payload dropper
    crit: hostile
    conf: 0.95
    for:
      - shell
      - python
      - ruby
      - javascript
      - typescript
    any:
      - id: pip-install-url-exec
      - id: gem-install-url-exec
      - id: deno-run-url-exec
    unless:
      - id: well-known/app/calvyn-code
