defaults:
  platforms: [windows]
  for: [class, jar, zip]
  attack: "T1105"
  mbc: "E1105"
traits:
  - id: windows-exe-temp-staging
    desc: Windows executable filename in bytecode
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '[A-Za-z0-9_.-]{3,40}\.exe\b'
  - id: start-process-filepath-hidden
    desc: Start-Process hidden FilePath
    crit: component
    conf: 0.92
    if:
      type: raw
      regex: 'Start-Process.{0,80}FilePath'
composite_rules:
  - id: java-cloud-exe-hidden-powershell-dropper
    desc: Java hidden PowerShell cloud payload dropper
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/url::dropbox-exe-url-raw
      - id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
      - id: micro-behaviors/process/create/hidden::java-powershell-windowstyle-hidden
      - id: micro-behaviors/process/create/hidden::java-powershell-executionpolicy-bypass
      - id: micro-behaviors/fs/path/temp::java-tmpdir-property
      - id: windows-exe-temp-staging
      - id: start-process-filepath-hidden
