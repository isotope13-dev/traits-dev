defaults:
  platforms: [windows]
  for: [class, jar, zip]
  attack: "T1105,T1059.003"
  mbc: "E1105,E1059.003"

composite_rules:
  - id: java-url-temp-executable-cmd-dropper
    desc: Java downloads an executable to a temporary path and launches it through cmd
    crit: suspicious
    conf: 0.96
    # Eclipse Foundation-signed Java tooling legitimately combines URL
    # connections, temporary files, and ProcessBuilder while managing
    # platform launchers.  Keep this hostile composite for unsigned or
    # otherwise unidentified Java artifacts.
    unless:
      - id: metadata/signed/leaf::eclipse.org-foundation-inc.
    all:
      - id: micro-behaviors/communications/http/lib/urlconnection::jvm-http-urlconnection-class-ref
      - id: micro-behaviors/communications/http/lib/urlconnection::jvm-http-urlconnection-inputstream
      - id: micro-behaviors/fs/file/copy::java-files-copy
      - id: micro-behaviors/fs/path/temp::java-tmpdir-property-class
      - id: micro-behaviors/fs/path/extension::java-executable-reference
      - id: micro-behaviors/process/create/spawn::java-processbuilder-cmd-start
