defaults:
  platforms: [windows]
  for: [class, jar, zip]
  attack: "T1105"
  mbc: "E1105"
traits:
  - id: windows-exe-temp-staging
    desc: Windows executable filename in bytecode
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '[A-Za-z0-9_.-]{3,40}\.exe\b'
  - id: start-process-filepath-hidden
    desc: Start-Process hidden FilePath
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'Start-Process.{0,80}FilePath'
  - id: java-openstream-bytecode
    desc: Java URL openStream call
    crit: component
    conf: 0.84
    if:
      type: text
      word: openStream
  - id: java-set-executable-bytecode
    desc: Java setExecutable call
    crit: component
    conf: 0.82
    if:
      type: text
      word: setExecutable
  - id: javaw-exe-staging
    desc: javaw.exe staging filename
    crit: component
    conf: 0.9
    if:
      type: text
      exact: javaw.exe
  - id: java-cmd-exe-c-pair
    desc: cmd.exe /c pair in Java bytecode
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 'cmd\.exe.{0,32}/c|/c.{0,32}cmd\.exe'
composite_rules:
  - id: java-url-temp-exe-cmd-dropper
    desc: Java URL download to temp executable with process launch
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/http/lib/urlconnection::java-url-class-bytecode
      - id: java-openstream-bytecode
      - id: micro-behaviors/fs/file/copy::fileoutputstream-class
      - id: micro-behaviors/fs/path/temp::java-tmpdir-property
      - id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
    any:
      - id: windows-exe-temp-staging
      - id: java-set-executable-bytecode
    needs: 1
  - id: java-temp-javaw-cmd-dropper
    desc: Java dropper stages javaw.exe in temp and executes via cmd
    crit: hostile
    conf: 0.96
    all:
      - id: java-url-temp-exe-cmd-dropper
      - id: javaw-exe-staging
      - id: java-cmd-exe-c-pair
  - id: java-cloud-exe-hidden-powershell-dropper
    desc: Java hidden PowerShell cloud payload dropper
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/url/cloud::dropbox-exe-url-raw
      - id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
      - id: micro-behaviors/process/create/hidden::java-powershell-windowstyle-hidden
      - id: micro-behaviors/process/create/hidden::java-powershell-executionpolicy-bypass
      - id: micro-behaviors/fs/path/temp::java-tmpdir-property
      - id: windows-exe-temp-staging
      - id: start-process-filepath-hidden
