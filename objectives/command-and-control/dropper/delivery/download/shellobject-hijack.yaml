defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105

traits:
  - id: encoded-kvic-jpg-payload-url
    desc: Encoded JPG payload staging URL
    crit: component
    conf: 0.99
    if:
      type: text
      exact: 9/Pz76m8vPT09L349fYAvfnvvAP8APC8+AWvp7357wSf
  - id: encoded-kvic-probe-path
    desc: Encoded PHP probe request path
    crit: component
    conf: 0.98
    if:
      type: text
      exact: vAP8APC87/H8AQK97/fvnw==
  - id: encoded-temp-res-file-template
    desc: Encoded temp result file template
    crit: component
    conf: 0.96
    if:
      type: text
      exact: 0u3+8evyy8Lenw==

composite_rules:
  - id: encoded-jpg-payload-download
    desc: Encoded JPG payload download and staging
    crit: suspicious
    conf: 0.99
    all:
      - id: encoded-kvic-jpg-payload-url
      - id: objectives/command-and-control/dropper/delivery/download::wininet-download-write-exec
    any:
      - id: encoded-kvic-probe-path
      - id: encoded-temp-res-file-template
      - id: objectives/anti-static/obfuscation/string/runtime-decrypt::base64-arithmetic-xor-decoder
    needs: 2
