defaults:
  for: [javascript]
  platforms: [windows]
composite_rules:
  - id: js-downloader-wsh-classic
    crit: hostile
    conf: 0.95
    desc: JavaScript WSH downloader with file drop and execute
    all:
      - id: objectives/execution/interpreter/script/wsh::wscript-shell
      - id: micro-behaviors/communications/http/client/xmlhttp::http-client-any
      - id: micro-behaviors/process/create/exec::file-execution
      - id: objectives/command-and-control/dropper/execution/loader::file-write
  - id: js-downloader-wsh-obfuscated
    crit: hostile
    conf: 0.95
    desc: Obfuscated JavaScript WSH downloader execution chain
    all:
      - id: objectives/execution/interpreter/script/wsh::wscript-shell
      - id: objectives/execution/interpreter/script/wsh-fragments::wscript-shell-fragment
      - id: objectives/execution/interpreter/script/wsh-fragments::adodb-fragment
      - id: objectives/execution/interpreter/script/wsh-fragments::response-body-fragment
      - id: objectives/execution/interpreter/script/wsh-fragments::expand-env-fragment
      - id: micro-behaviors/process/create/exec::file-execution
