defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: elex-curl-downloader
    desc: "Elex-style libcurl downloader"
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/download/curl::libcurl-http
      - id: micro-behaviors/fs/path/config::configure-xml-tracking-composite
    any:
      - id: micro-behaviors/ui/framework::duilib-zipres-marker
      - id: micro-behaviors/communications/http/download/curl::libcurl-custom-headers