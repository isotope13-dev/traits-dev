defaults:
  platforms: [android]
  for: [c, cpp, elf]
  attack: T1105

traits:
  - id: android-native-dropper-url
    desc: Android native dropper URL path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/api/v1/dropper|dropper\.sh'

  - id: android-native-dropper-am-start
    desc: Android native starts staged payload
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'am start -n.{0,80}--es payload'

  - id: android-native-init-service-stage
    desc: Android native init service stage
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'backdoor\.rc|/init\.play_update\.rc'

composite_rules:
  - id: android-native-dropper-stage-exec
    desc: Android native dropper stage exec
    crit: hostile
    conf: 0.98
    all:
      - id: android-native-dropper-url
    any:
      - id: android-native-dropper-am-start
      - id: android-native-init-service-stage
