defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: form-urlencoded-header
    desc: Form URL encoded HTTP payload header
    crit: notable
    conf: 0.75
    attack: T1071.001
    if:
      type: text
      exact: Content-Type:application/x-www-form-urlencoded
  - id: uid-file-telemetry-query
    desc: UID file telemetry query format string
    crit: suspicious
    conf: 0.85
    attack: T1071.001
    if:
      type: text
      regex: '\?uid=%s&ft=\d+&st=%d&fn=%s&fl=%d'
composite_rules:
  - id: wininet-download-write-stage
    desc: WinInet download and file staging chain
    crit: notable
    conf: 0.92
    attack: T1105
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/fs/file/write/direct::write-file
    any:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/spawn::create-process-w
    unless:
      - id: metadata/binary/vendor/
      - id: well-known/tool/reverse-engineering/x64dbg/
      - id: metadata/binary/framework/
    downgrade:
      any:
        - id: metadata/signed/certificate/identity::pe-signature-verified
        - id: metadata/binary/framework/
  - id: unsigned-wininet-download-write-stage
    desc: Unsigned WinInet downloader stages a downloaded file
    crit: suspicious
    conf: 0.94
    attack: T1105
    all:
      - id: wininet-download-write-stage
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: micro-behaviors/process/sync/mutex::global-mutex-single-instance
      - id: micro-behaviors/time/timing/delay::sleep-dup
    unless:
      - id: metadata/binary/framework/
  - id: wininet-uid-beacon-telemetry
    desc: WinInet UID beacon and telemetry reporting
    crit: suspicious
    conf: 0.9
    attack: T1071.001
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/communications/http/message::http-prefix
    any:
      - id: uid-file-telemetry-query
      - id: form-urlencoded-header
      - id: micro-behaviors/os/registry/access::internet-settings-autodial-tamper
