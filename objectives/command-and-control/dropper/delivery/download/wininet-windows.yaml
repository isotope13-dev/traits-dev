defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
traits:
  - id: form-urlencoded-header
    desc: Form URL encoded HTTP payload header
    crit: notable
    conf: 0.75
    attack: T1071.001
    if:
      type: text
      exact: Content-Type:application/x-www-form-urlencoded
  - id: uid-file-telemetry-query
    desc: UID file telemetry query format string
    crit: suspicious
    conf: 0.85
    attack: T1071.001
    if:
      type: text
      regex: \\?uid=%s&ft=\\d+&st=%d&fn=%s&fl=%d
composite_rules:
  - id: wininet-download-write-exec
    desc: WinInet download write and execute chain
    crit: suspicious
    conf: 0.92
    attack: T1105
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/fs/file/write/direct::write-file
    any:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/fs/file/delete::deletefile-a
      - id: micro-behaviors/fs/file/delete::deletefile-w
      - id: micro-behaviors/os/exception/error-handling::get-last-error
      - id: micro-behaviors/fs/shell-ops::shell-get-folder-path
    downgrade:
      any:
        - id: metadata/signed/certificate::pe-signature-verified
        - id: metadata/binary/framework::java-localhost-launcher
      all:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/metrics/structural::many-imports
    unless:
      - id: metadata/binary/framework::java-localhost-launcher
  - id: unsigned-wininet-download-write-exec
    desc: Unsigned WinInet downloader drops and runs payload
    crit: hostile
    conf: 0.96
    attack: T1105
    all:
      - id: wininet-download-write-exec
      - id: metadata/signed/trust-level::unsigned
    any:
      - id: micro-behaviors/process/sync/mutex::global-mutex-single-instance
      - id: micro-behaviors/fs/shell-ops::shell-get-folder-path
      - id: micro-behaviors/time/timing/delay::sleep-dup
    unless:
      - id: metadata/binary/framework::java-localhost-launcher
  - id: wininet-uid-beacon-telemetry
    desc: WinInet UID beacon and telemetry reporting
    crit: suspicious
    conf: 0.9
    attack: T1071.001
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/communications/http/message::http-prefix
    any:
      - id: uid-file-telemetry-query
      - id: form-urlencoded-header
      - id: micro-behaviors/os/registry/access::internet-settings-autodial-tamper
