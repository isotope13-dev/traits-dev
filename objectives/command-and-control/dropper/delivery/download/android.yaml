defaults:
  platforms: [android, unix, windows]
  for: [apk, zip]
  crit: suspicious
  conf: 0.9
  attack: "T1105"
  mbc: "E1105"

traits:
- id: android-packageinstaller-session
  desc: Android PackageInstaller session API
  crit: component
  conf: 0.9
  if:
    type: text
    substr: "Landroid/content/pm/PackageInstaller$Session;"

- id: android-install-receiver-class
  desc: Android install receiver class
  crit: component
  conf: 0.86
  if:
    type: text
    substr: "InstallReceiver"

- id: android-install-activity-class
  desc: Android install activity class
  crit: component
  conf: 0.86
  if:
    type: text
    substr: "InstallingActivity"

- id: android-install-telemetry-event
  desc: Android app installation telemetry
  crit: component
  conf: 0.84
  if:
    type: text
    substr: "app_installation"

- id: android-opaque-asset-bundle
  desc: APK bundles opaque asset payloads
  crit: component
  conf: 0.84
  if:
    type: value
    path: "archive.members[*].path"
    regex: "^assets/[A-Za-z0-9]{8,}$"

composite_rules:
- id: android-remote-apk-installer
  desc: Android remote APK installer
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/command-and-control/channel/http/uri::android-support-c2-workflow
  - id: micro-behaviors/os/package-manager/install::android-apk-mime-type
  - id: micro-behaviors/os/package-manager/install::package-installer-service-class

- id: android-apk-install-telemetry
  desc: Android APK install telemetry
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/os/package-manager/install::android-apk-mime-type
  - id: objectives/command-and-control/channel/http/uri::android-support-install-status
  any:
  - id: objectives/command-and-control/channel/http/uri::android-support-success-status
  - id: objectives/command-and-control/channel/http/uri::android-support-activity-status
  - id: objectives/command-and-control/channel/http/uri::android-support-client-checkin

- id: android-opaque-package-installer
  desc: Android opaque package installer
  crit: suspicious
  conf: 0.94
  all:
  - id: android-packageinstaller-session
  - id: android-opaque-asset-bundle
  any:
  - id: android-install-receiver-class
  - id: android-install-activity-class
  - id: android-install-telemetry-event
