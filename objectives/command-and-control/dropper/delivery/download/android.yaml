defaults:
  platforms: [android, unix, windows]
  for: [apk, zip]
  crit: suspicious
  conf: 0.9
  attack: "T1105"
  mbc: "E1105"

composite_rules:
- id: android-remote-apk-installer
  desc: Android remote APK installer
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/command-and-control/channel/http/uri::android-support-c2-workflow
  - id: micro-behaviors/os/package-manager/install::android-apk-mime-type
  - id: micro-behaviors/os/package-manager/install::package-installer-service-class

- id: android-apk-install-telemetry
  desc: Android APK install telemetry
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/os/package-manager/install::android-apk-mime-type
  - id: objectives/command-and-control/channel/http/uri::android-support-install-status
  any:
  - id: objectives/command-and-control/channel/http/uri::android-support-success-status
  - id: objectives/command-and-control/channel/http/uri::android-support-activity-status
  - id: objectives/command-and-control/channel/http/uri::android-support-client-checkin
