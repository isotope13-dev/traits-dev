defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105

composite_rules:
  - id: encrypted-resource-urlmon-dropper
    desc: Obfuscated PE resource with URLMon download capability
    crit: hostile
    conf: 0.96
    attack: T1027.002,T1105
    all:
      - id: objectives/anti-static/obfuscation/payload/encrypted::medium-entropy-large-rsrc
      - id: metadata/binary/layout::cert-table-truncated
      - id: micro-behaviors/communications/http/get::url-open-stream-import
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
