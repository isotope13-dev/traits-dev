defaults:
  platforms: [macos]
  for: [macho, shell]
  attack: T1105
  mbc: E1105
composite_rules:
  - id: macos-zip-app-download-staging
    desc: macOS app ZIP download and extraction staging
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: micro-behaviors/data/archive/extract/zip::unzip-extraction
      - id: micro-behaviors/data/text/archive::app-archive-name
  - id: meeting-app-archive-dropper
    desc: Meeting-themed archive download and staging
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/execution/lure/video-meeting::meeting-app-archive-lure
      - id: macos-zip-app-download-staging
