defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105

traits:
  - id: mpress-wininet-com-import-profile
    desc: MPRESS WinInet COM import profile
    crit: suspicious
    conf: 0.96
    size_min: 32768
    size_max: 49152
    if:
      type: import_combination
      required:
        - GetProcAddress
        - InternetOpenW
        - CoInitialize
      suspicious:
        - GetModuleHandleA
        - RegCloseKey
        - SHGetFolderPathW
        - SetParent
      min_suspicious: 3
      max_total: 12

composite_rules:
  - id: packed-wininet-network-loader
    desc: Packed WinInet network loader
    crit: suspicious
    conf: 0.94
    size_max: 262144
    all:
      - id: objectives/anti-static/pack/mpress::mpress-section-one
      - id: objectives/anti-static/pack/mpress::mpress-section-two
      - id: mpress-wininet-com-import-profile
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/os/module/load::get-proc-address-import
    any:
      - id: micro-behaviors/os/module/load::get-module-handle-ansi
      - id: micro-behaviors/os/com/invoke::co-initialize
      - id: micro-behaviors/fs/shell-ops/commands::shell-get-folder-path
      - id: metadata/hardening/memory::wx-section
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
