defaults:
  platforms: [windows]
  for: [all]
  attack: T1036.007,T1548.002,T1218

composite_rules:
  - id: ai-branded-elevated-flash-dropper
    desc: Elevated Flash-branded MSI installer
    crit: hostile
    conf: 0.98
    scope: outer
    all:
      - id: metadata/file/profile/identity::msi-bytes-enforced-runasadmin
      - id: metadata/package/files/msi::msi-office-flashplayer-subject
      - id: metadata/package/files/msi::msi-office-flashplayer-application
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family::known-benign-installer
