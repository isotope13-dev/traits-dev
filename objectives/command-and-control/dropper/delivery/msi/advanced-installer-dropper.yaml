defaults:
  platforms: [windows]
  for: [documents, oledoc, ole]

traits:
  - id: ai-file-download-table
    desc: 'Advanced Installer FileDownload action table'
    crit: component
    conf: 0.98
    if:
      type: text
      substr: AI_FileDownload

  - id: ai-expand-archive-table
    desc: 'Advanced Installer ExpandArchive action table'
    crit: component
    conf: 0.98
    if:
      type: text
      substr: AI_ExpandArchive

  - id: ai-http-post-msg
    desc: Advanced Installer HTTPPost progress message
    crit: component
    conf: 0.95
    if:
      type: text
      substr: HttpPostMsg

  - id: ai-download-php-url
    desc: 'ai download php url'
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'download\.php\?file='

  - id: ai-filedownload-zip-name
    desc: ZIP name near FileDownload action
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)AI_FileDownload[^\r\n]{0,80}\b[\w.-]+\.zip\b'

  - id: ai-url-zip-name
    desc: ZIP name in Advanced Installer URL
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)download\.php\?file=[^\r\n"'' ]{1,80}\.zip\b'

  - id: ai-enforced-embedded-exe-elevation
    desc: MSI forces embedded EXE elevation
    crit: suspicious
    conf: 0.97
    for: [all]
    if:
      id: metadata/file/profile/identity::msi-bytes-enforced-runasadmin
    unless:
      - id: metadata/signed/platform/

  - id: ai-flash-branded-executable
    desc: Flash-branded executable name in MSI
    crit: component
    conf: 0.9
    for: [all]
    if:
      id: metadata/package/files/msi::msi-office-flashplayer-application
    unless:
      - id: metadata/signed/platform/

  - id: ai-browser-update-executable
    desc: Browser or updater executable name in MSI
    crit: component
    conf: 0.85
    for: [oledoc]
    if:
      type: text
      regex: '(?i)\b(chrome(update)?|firefox|browser|updater)\.exe\b'

  - id: ai-multiple-embedded-exe-names
    desc: MSI contains multiple executable payload names
    crit: notable
    conf: 0.96
    for: [oledoc]
    count_min: 3
    if:
      type: text
      substr: .exe

composite_rules:
  - id: ai-branded-executable
    desc: Branded embedded executable name in MSI
    crit: notable
    conf: 0.9
    any:
      - id: ai-flash-branded-executable
      - id: ai-browser-update-executable

  - id: ai-branded-multiple-executable-pair
    desc: MSI contains branded and multiple executables
    crit: suspicious
    conf: 0.91
    all:
      - id: ai-branded-executable
      - id: ai-multiple-embedded-exe-names

  - id: ai-payload-zip-name
    desc: Advanced Installer ZIP target
    crit: component
    conf: 0.85
    any:
      - id: ai-filedownload-zip-name
      - id: ai-url-zip-name

  - id: ai-file-download-dropper
    desc: Advanced Installer MSI downloads remote payload at install time
    crit: suspicious
    conf: 0.95
    all:
      - id: ai-file-download-table
    any:
      - id: ai-download-php-url
      - id: ai-payload-zip-name

  - id: ai-dropper-with-exfil
    desc: Advanced Installer MSI downloads payload and exfiltrates data
    crit: hostile
    conf: 0.92
    all:
      - id: ai-file-download-dropper
      - id: ai-http-post-msg

  - id: ai-dropper-with-extract
    desc: Advanced Installer MSI downloads and extracts payload archive
    crit: hostile
    conf: 0.93
    all:
      - id: ai-file-download-dropper
      - id: ai-expand-archive-table
