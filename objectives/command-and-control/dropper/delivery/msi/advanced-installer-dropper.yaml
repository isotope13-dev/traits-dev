# Advanced Installer MSI dropper detection
# Detects MSI installers that use AI_FileDownload to fetch remote payloads
# and AI_ExpandArchive to extract them during installation.
# Common in Brazilian banking-trojan delivery (Coyote/Casbaneiro/Mekotio/Astaroth).
defaults:
  platforms: [windows]
  for: [oledoc, ole, msi]

traits:
  - id: ai-file-download-table
    desc: Advanced Installer FileDownload custom action table
    crit: component
    conf: 0.98
    if:
      type: raw
      substr: AI_FileDownload

  - id: ai-expand-archive-table
    desc: Advanced Installer ExpandArchive custom action table
    crit: component
    conf: 0.98
    if:
      type: raw
      substr: AI_ExpandArchive

  - id: ai-http-post-msg
    desc: Advanced Installer HTTPPost progress message
    crit: component
    conf: 0.95
    if:
      type: raw
      substr: HttpPostMsg

  - id: ai-download-php-url
    desc: AI_FileDownload source points at PHP download endpoint
    crit: component
    conf: 0.92
    if:
      type: raw
      regex: 'download\.php\?file='

  - id: ai-payload-zip-name
    desc: AI_FileDownload target archive filename
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: '\b\w+\.zip\b'

composite_rules:
  - id: ai-file-download-dropper
    desc: Advanced Installer MSI downloads remote payload at install time
    crit: suspicious
    conf: 0.95
    all:
      - id: ai-file-download-table
    any:
      - id: ai-download-php-url
      - id: ai-payload-zip-name

  - id: ai-dropper-with-exfil
    desc: Advanced Installer MSI downloads payload and exfiltrates data
    crit: hostile
    conf: 0.92
    all:
      - id: ai-file-download-dropper
      - id: ai-http-post-msg

  - id: ai-dropper-with-extract
    desc: Advanced Installer MSI downloads and extracts payload archive
    crit: hostile
    conf: 0.93
    all:
      - id: ai-file-download-dropper
      - id: ai-expand-archive-table
