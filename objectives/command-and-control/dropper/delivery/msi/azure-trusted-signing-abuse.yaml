# Azure Trusted Signing abuse detection
# Detects MSI installers signed via Microsoft Azure Trusted Signing
# (Author-of-Code / AOC CA) that also exhibit dropper behavior.
# This is a recurring supply-chain abuse vector for Brazilian banking trojans.
defaults:
  platforms: [windows]

composite_rules:
  - id: azure-trusted-signing-dropper
    desc: MSI dropper signed via Azure Trusted Signing (AOC CA)
    crit: hostile
    conf: 0.9
    all:
      - id: metadata/signed/certificate::binary-signed-with-individual-cert
      - id: objectives/command-and-control/dropper/delivery/msi::ai-file-download-dropper

  - id: azure-trusted-signing-exfil-dropper
    desc: MSI dropper with exfil signed via Azure Trusted Signing (AOC CA)
    crit: hostile
    conf: 0.92
    all:
      - id: metadata/signed/certificate::binary-signed-with-individual-cert
      - id: objectives/command-and-control/dropper/delivery/msi::ai-dropper-with-exfil
