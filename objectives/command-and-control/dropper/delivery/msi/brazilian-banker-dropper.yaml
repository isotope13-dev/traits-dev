# Brazilian banking-trojan MSI dropper detection
# Detects the pattern of Advanced Installer MSI droppers used by
# Coyote/Casbaneiro/Mekotio/Astaroth-class banking trojans.
# Key indicators: pt-BR branding, Azure Trusted Signing, AI_FileDownload,
# HTTPPost exfil, embedded PE with cert-store install + screen capture.
defaults:
  platforms: [windows]
  for: [oledoc, ole]
traits:
  - id: pt-br-msi-locale
    desc: MSI authored in Brazilian Portuguese locale
    crit: component
    conf: 0.9
    if:
      type: raw
      exact: ProductLanguage1046

  - id: pt-br-msi-sql-browse-msg
    desc: MSI SQL server discovery message in Portuguese
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: Examinando SQL Servers na rede

  - id: adobe-masquerade-domain
    desc: Adobe-themed masquerade domain in MSI strings
    crit: component
    conf: 0.95
    if:
      type: raw
      regex: 'adobe\w+\.online'

composite_rules:
  - id: brazilian-banker-msi-dropper
    desc: Brazilian banking-trojan MSI dropper (pt-BR + AI_FileDownload + exfil)
    crit: hostile
    conf: 0.93
    all:
      - id: objectives/command-and-control/dropper/delivery/msi::ai-dropper-with-exfil
    any:
      - id: pt-br-msi-locale
      - id: micro-behaviors/communications/http/post::pt-br-msi-http-post-msg
      - id: adobe-masquerade-domain

  - id: brazilian-banker-sql-recon
    desc: Brazilian banking-trojan MSI with SQL server recon
    crit: hostile
    conf: 0.9
    all:
      - id: objectives/command-and-control/dropper/delivery/msi::ai-file-download-dropper
      - id: pt-br-msi-sql-browse-msg
