# HTTPPost exfil, embedded PE with cert-store install + screen capture.
defaults:
  platforms: [windows]
  for: [oledoc]


traits:
  - id: pt-br-msi-locale
    desc: MSI authored in Brazilian Portuguese locale
    crit: component
    conf: 0.9
    if:
      type: text
      exact: ProductLanguage1046

  - id: pt-br-msi-sql-browse-msg
    desc: MSI SQL server discovery message in Portuguese
    crit: component
    conf: 0.92
    if:
      type: text
      substr: Examinando SQL Servers na rede

  - id: adobe-masquerade-domain
    desc: Adobe-themed masquerade domain in MSI strings
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'adobe\w+\.online'

composite_rules:
  - id: brazilian-banker-msi-dropper
    desc: Brazilian banking-trojan MSI dropper (pt-BR + AI_FileDownload + exfil)
    crit: hostile
    conf: 0.93
    all:
      - id: objectives/command-and-control/dropper/delivery/msi::ai-dropper-with-exfil
    any:
      - id: pt-br-msi-locale
      - id: micro-behaviors/communications/http/post::pt-br-msi-http-post-msg
      - id: adobe-masquerade-domain

  - id: brazilian-banker-sql-recon
    desc: Brazilian banking-trojan MSI with SQL server recon
    crit: hostile
    conf: 0.9
    all:
      - id: objectives/command-and-control/dropper/delivery/msi::ai-file-download-dropper
      - id: pt-br-msi-sql-browse-msg

  # Banker payload capability cluster on the embedded PE:
  # certificate-store install (TLS-MITM enabler) + WinInet HTTP transport +
  # SC Manager service control + SQL keywords or screen capture or Toolhelp
  # process enumeration. The conjunction is rare outside Brazilian banker
  # payloads regardless of the MSI cover identity.
  - id: banker-payload-cluster-pe
    desc: Banker capability cluster in embedded PE
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    all:
      - id: micro-behaviors/crypto/certificate/install::pfx-import
      - id: micro-behaviors/crypto/certificate/install::cert-add-to-store
      - id: micro-behaviors/communications/http/post::wininet-post
      - id: micro-behaviors/os/service/control::start-service
    any:
      - id: micro-behaviors/data/db/sql::sql-keywords
      - id: micro-behaviors/hardware/display/screen::gdi-bitmap-transfer-primitives
      - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration-symbol
