defaults:
  platforms: [windows]
  for: [oledoc, ole]

composite_rules:
  - id: msi-hidden-powershell-runkey-dropper
    desc: MSI hidden encoded PowerShell Run-key dropper
    crit: hostile
    conf: 0.99
    attack: T1059.001,T1027,T1547.001
    all:
      - id: objectives/command-and-control/dropper/execution/script::msi-hidden-powershell-launch
      - id: objectives/command-and-control/dropper/execution/script::msi-run-key-persistence-reference
