defaults:
  for: [php, html, text]
  platforms: [windows, unix]
  attack: T1105
traits:
- id: asx-htmlview-param
  desc: ASX HTMLView parameter
  crit: component
  conf: 0.9
  if:
    type: text
    substr: HTMLView
- id: asx-php-htmlview-target
  desc: ASX HTMLView targets PHP page
  crit: component
  conf: 0.9
  if:
    type: text
    substr: /tr.php
- id: asx-ref-gif-stage
  desc: ASX references GIF stage
  crit: component
  conf: 0.86
  if:
    type: text
    substr: /002.gif
composite_rules:
- id: php-generated-asx-htmlview-stage
  desc: PHP generated ASX HTMLView stage
  crit: hostile
  conf: 0.96
  all:
  - id: asx-htmlview-param
  - id: asx-php-htmlview-target
  - id: asx-ref-gif-stage
  any:
  - id: micro-behaviors/communications/http/request/params::server-dup
  - id: metadata/lang/scripted::php-open-tag
