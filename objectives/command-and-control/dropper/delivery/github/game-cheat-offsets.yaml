# Game Cheat GitHub Offset Fetching Detection
# Game cheats often fetch memory offsets dynamically from GitHub repositories
# to stay functional across game updates. This is a common pattern in
# CS2, Valorant, and other game cheats.
# ATT&CK: T1105 (Ingress Tool Transfer)
defaults:
  for: [pe]
  platforms: [windows]
  attack: "T1105"
  mbc: "B0024"
composite_rules:
  - id: game-cheat-github-offset-fetcher
    desc: Game cheat fetching offsets from GitHub raw content
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
      - id: objectives/command-and-control/dropper/delivery/github::raw-github-host
    any:
      - id: micro-behaviors/ui/framework/imgui::dear-imgui-library
    needs: 1
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::microsoft-corp-marker
