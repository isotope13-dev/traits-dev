defaults:
  for: [scala]
  platforms: [linux, macos, windows]
  attack: T1105
  mbc: B0024
traits:
- id: tmp-hidden-sshd-stage
  desc: hidden /tmp/.sshd stage path
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: /tmp/.sshd
- id: github-latest-release-asset-url
  desc: GitHub latest-release asset URL
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'github\.com/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+/releases/latest/download/'
- id: curl-insecure-silent-follow
  desc: curl ignores TLS and follows redirects silently
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\bcurl\s+-[A-Za-z]*s[A-Za-z]*k[A-Za-z]*L|curl\s+-[A-Za-z]*s[A-Za-z]*L[A-Za-z]*k'
- id: hidden-stage-background-exec
  desc: hidden stage executed in background
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '/tmp/\.[A-Za-z0-9._-]+\s*&'
composite_rules:
- id: github-latest-hidden-sshd-stage
  desc: GitHub latest release drops hidden /tmp/.sshd stage
  crit: hostile
  conf: 0.97
  all:
  - id: tmp-hidden-sshd-stage
  - id: github-latest-release-asset-url
  unless:
  - id: metadata/package/quality/source::source-archive-member
- id: curl-insecure-hidden-stage-background
  desc: curl drops hidden stage and backgrounds execution
  crit: hostile
  conf: 0.96
  near_lines: 1
  all:
  - id: curl-insecure-silent-follow
  - id: hidden-stage-background-exec
  - id: objectives/command-and-control/dropper/delivery/download-execute::chmod-hidden-stage
  unless:
  - id: metadata/package/quality/source::source-archive-member
