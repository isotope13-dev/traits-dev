# GitHub Attachment Dropper
# Detects malicious scripts that download payloads from GitHub attachments and execute them.
# This technique leverages trust in github.com to bypass filters.
defaults:
  platforms: [unix, android, ios]
  for: [shell]
  attack: T1105
  mbc: B0030
composite_rules:
  - id: github-attachment-dropper
    desc: "Downloads payload from GitHub attachment and executes it"
    crit: hostile
    conf: 1.0
    all:
      - id: micro-behaviors/communications/url/external/github::github-attachment-url
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: objectives/command-and-control/dropper/execution/script::execute-dot-slash
    any:
      - id: micro-behaviors/fs/chmod/executable::shell-7xx
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
  - id: github-attachment-background-dropper
    desc: "Downloads payload from GitHub attachment and executes it in background"
    crit: hostile
    conf: 1.0
    all:
      - id: micro-behaviors/communications/url/external/github::github-attachment-url
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: micro-behaviors/process/daemonize::nohup-command
    any:
      - id: micro-behaviors/fs/chmod/executable::shell-7xx
      - id: micro-behaviors/fs/chmod/executable::shell-plus-x
      - id: objectives/command-and-control/dropper/execution/script::execute-dot-slash
