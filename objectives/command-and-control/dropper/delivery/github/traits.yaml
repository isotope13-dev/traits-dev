defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: blob-api
    desc: GitHub blob API download
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: api\.github\.com.{0,50}/git/blobs
composite_rules:
  - id: python-exec-chmod
    desc: Python subprocess execution or chmod
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/fs/chmod::python-os-chmod
      - id: micro-behaviors/process/create/subprocess/
  - id: execute-comp
    desc: Download from GitHub blob API
    conf: 0.95
    crit: suspicious
    mbc: B0024
    attack: T1195.002
    all:
      - id: blob-api
      - id: python-exec-chmod
