defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
composite_rules:
  - id: execute-comp
    desc: GitHub blob endpoint used with local execution
    conf: 0.95
    crit: suspicious
    mbc: B0024
    attack: T1195.002
    near_bytes: 768
    all:
      - id: micro-behaviors/communications/http/services/github::github-git-blob-api-endpoint
    any:
      - id: micro-behaviors/fs/chmod/modify::python-os-chmod
      - id: micro-behaviors/process/create/subprocess/
    unless:
      - id: micro-behaviors/crypto/library/blockchain/
      - id: metadata/package/testing/presence/harness::test-directory-path
