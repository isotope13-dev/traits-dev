defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: blob-api
    desc: GitHub blob API download
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: api\.github\.com.{0,50}/git/blobs
    unless:
      - id: metadata/library/github-actions/
      - id: well-known/app/homebrew::source-tree
composite_rules:
  - id: execute-comp
    desc: Download from GitHub blob API
    conf: 0.95
    crit: suspicious
    mbc: B0024
    attack: T1195.002
    all:
      - id: blob-api
    any:
      - id: micro-behaviors/fs/chmod/modify::python-os-chmod
      - id: micro-behaviors/process/create/subprocess/
    unless:
      - id: micro-behaviors/crypto/library/blockchain/
