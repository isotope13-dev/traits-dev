# JScript Download-Execute Dropper
# Detects JScript/WSH droppers using obfuscated COM objects
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: hostile
  conf: 0.95
  for: [javascript, xml]
traits:
  - id: wsf-charcode-webdav-bat-path
    desc: WSF charcode WebDAV batch path
    crit: suspicious
    conf: 0.96
    platforms: [windows]
    for: [xml]
    if:
      type: text
      regex: 'Array\(.{0,260}92\s*,\s*92.{0,260}64\s*,\s*83\s*,\s*83\s*,\s*76\s*,\s*92\s*,\s*68\s*,\s*97\s*,\s*118\s*,\s*87\s*,\s*87\s*,\s*87\s*,\s*82\s*,\s*111\s*,\s*111\s*,\s*116.{0,220}100\s*,\s*97\s*,\s*116\s*,\s*46\s*,\s*98\s*,\s*97\s*,\s*116'
  - id: wsf-fso-copyfile-stage
    desc: WSF copies staged payload file
    crit: suspicious
    conf: 0.92
    platforms: [windows]
    for: [xml]
    if:
      type: text
      regex: '(?is)CreateObject.{0,80}FileSystemObject.{0,700}\.CopyFile\s+e\s*,\s*h\s*,\s*True'
  - id: wsf-hidden-cmd-bat-run
    desc: WSF hidden cmd batch execution
    crit: suspicious
    conf: 0.94
    platforms: [windows]
    for: [xml]
    if:
      type: text
      regex: '(?is)\.Run\s*"c"&"m"&"d"&"\."&"e"&"x"&"e".{0,180},\s*0\s*,\s*False'
composite_rules:
  - id: wsf-webdav-hidden-bat-dropper
    desc: WSF WebDAV hidden batch dropper
    platforms: [windows]
    for: [xml]
    attack: "T1059.005, T1105"
    all:
      - id: wsf-charcode-webdav-bat-path
      - id: wsf-fso-copyfile-stage
      - id: wsf-hidden-cmd-bat-run
  - id: wsf-webdav-copy-run-chain
    desc: WSF WebDAV copy run chain
    platforms: [windows]
    for: [xml]
    crit: hostile
    conf: 0.98
    attack: "T1059.005, T1105"
    all:
      - id: wsf-webdav-hidden-bat-dropper
      - id: wsf-fso-copyfile-stage
  - id: js-wsh-webdav-temp-batch-stage
    desc: JScript WebDAV temp batch stage
    platforms: [windows]
    crit: suspicious
    conf: 0.94
    attack: "T1105"
    all:
      - id: micro-behaviors/communications/http/webdav::windows-webdav-unc
      - id: micro-behaviors/fs/file/copy::fso-copyfile
      - id: micro-behaviors/fs/path/temp::win-temp-env
      - id: micro-behaviors/fs/path/extension::bat-dup
  - id: js-wsh-webdav-bat-dropper
    desc: JScript WebDAV batch dropper
    platforms: [windows]
    attack: "T1059.007, T1105"
    all:
      - id: js-wsh-webdav-temp-batch-stage
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-hidden-run
  - id: js-obfuscated-dropper-combo
    desc: "Obfuscated JScript Download-Execute Combo"
    mbc: "B0032.001"
    attack: "T1059.007"
    all:
      - id: objectives/execution/interpreter/scripting/host::activex-object-obfuscated
      - id: objectives/execution/interpreter/scripting/host::xmlhttp-obfuscated
      - id: objectives/execution/interpreter/scripting/host::adodb-stream-obfuscated
    any:
      - id: micro-behaviors/data/format/executable::mz-header-check
      - id: objectives/anti-static/obfuscation/syntax::js-property-concatenation-obfuscation
      - id: micro-behaviors/communications/http/url::dropper-common-params
  - id: js-wsh-responsebody-save-dropper
    desc: "Obfuscated WSH ResponseBody dropper"
    platforms: [windows]
    attack: "T1059.007, T1105"
    all:
      - id: objectives/execution/interpreter/scripting/host::wscript-shell-obfuscated-dup
      - id: objectives/execution/interpreter/scripting/host::adodb-stream-obfuscated
      - id: objectives/execution/interpreter/script/wsh::wsh-response-body
      - id: objectives/execution/interpreter/script/wsh::wsh-save-to-file
    any:
      - id: objectives/execution/interpreter/script/wsh::wsh-expand-env-strings
      - id: micro-behaviors/process/create/shell/wsh::wscript-shell-run-indirect
