defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1105
  mbc: B0024

composite_rules:
  - id: node-remote-agent-skill-deployment
    desc: Node downloads and deploys an AI-agent skill
    crit: hostile
    conf: 0.98
    scope: file
    attack: "T1105,T1059.007,T1195.002"
    all:
      - id: micro-behaviors/communications/http/request/client::https-get
      - id: micro-behaviors/fs/write/file/stream::node-live-append-stream
      - id: micro-behaviors/fs/file/copy::fs-copyfileSync
      - id: micro-behaviors/fs/path/application/config::ai-agent-skill-install-directory
      - id: micro-behaviors/process/create/shell/bridge::js-execsync

  - id: node-remote-archive-execute
    desc: Node remote archive download and execute
    crit: hostile
    conf: 0.99
    scope: file
    attack: "T1105,T1059.007"
    all:
      - id: micro-behaviors/communications/http/request/client::node-scheme-selected-http-client
      - id: micro-behaviors/fs/file/write/direct::node-write-file-sync
      - id: objectives/supply-chain/install-hook/scripts/dynamic-install::node-tar-gzip-strip-extract
      - id: micro-behaviors/process/create/shell/bridge::execSync-call
      - id: micro-behaviors/data/source/dynamic/load::node-variable-require-call
