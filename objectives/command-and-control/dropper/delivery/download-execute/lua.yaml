defaults:
  platforms: [unix, openwrt]
  for: [lua]
  attack: T1105
  mbc: E1105

traits:
  - id: lua-payload-download-name
    desc: Lua payload download filename
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'payload\.(bin|lua)|inject\.so'
  - id: lua-https-stream-download
    desc: Lua HTTPS stream download
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'https\.request[\s\S]{0,360}ltn12\.sink\.file'
composite_rules:
  - id: lua-wget-payload-dropper
    desc: Lua wget payload dropper
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/download/curl::wget-output-file
      - id: lua-payload-download-name
    any:
      - id: micro-behaviors/fs/path/location::hidden-dir-literal
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-make-executable
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
      - id: metadata/lang/scripted::exec-dynamic-load
      - id: micro-behaviors/dylib/load/runtime::lua-package-loadlib
    needs: 2

  - id: lua-https-download-execute
    desc: Lua HTTPS download execute
    crit: hostile
    conf: 0.98
    all:
      - id: lua-https-stream-download
      - id: micro-behaviors/fs/path/location::hidden-dir-literal
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
      - id: micro-behaviors/process/create/shell/invoke::lua-os-execute
