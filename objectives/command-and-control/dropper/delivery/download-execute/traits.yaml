defaults:
  attack: T1105
  mbc: E1105
  platforms: [unix, windows]
  for: [pe, dll]
# Download-Execute Dropper Patterns
# Detects stealthy download and execute patterns
# ATT&CK: T1105
traits:
- id: compact-import-table
  desc: Compact PE import table
  crit: component
  conf: 0.8
  if:
    type: metrics
    field: imports.count
    max: 80
  unless:
  - id: metadata/lang/compiler/systems::go-pe-symtab
composite_rules:
- id: hostile-downloader-wininet
  desc: Hostile Downloader (Network -> Memory -> Process)
  crit: hostile
  conf: 0.9
  size_max: 524288
  unless:
  - id: well-known/game/steam::valve-corp-binary
  - id: metadata/binary/installer/script::nsis
  all:
  - id: micro-behaviors/communications/http/get::internet-read-file
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: compact-import-table
- id: wininet-memory-stager
  desc: WinInet downloader with in-memory staging
  crit: suspicious
  conf: 0.92
  platforms: [windows]
  size_max: 262144
  all:
  - id: micro-behaviors/communications/http/get::internet-open
  - id: micro-behaviors/communications/http/get::internet-read-file
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  any:
  - id: micro-behaviors/fs/memory/mmap::win32-file-mapping
  - id: micro-behaviors/fs/path/check::self-directory-switch
  - id: micro-behaviors/fs/path/temp::word-temp-staging-file
  - id: micro-behaviors/time/timing/delay::sleep-dup
  - id: micro-behaviors/process/terminate/kill::exit-process
  needs: 2
  unless:
  - id: metadata/binary/installer/script::nsis
  downgrade:
    any:
    - id: metadata/lang/compiler/managed::delphi
- id: hostile-downloader-wininet-memory-or-process
  desc: Hostile downloader with memory or process exec
  crit: hostile
  conf: 0.9
  platforms: [windows]
  size_max: 524288
  unless:
  - id: well-known/game/steam::valve-corp-binary
  - id: metadata/binary/installer/script::nsis
  all:
  - id: micro-behaviors/communications/http/get::internet-read-file
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: compact-import-table
  any:
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: wininet-memory-stager
  downgrade:
    any:
    - id: metadata/binary/symbols/plugin::ollydbg-plugin-export
    - id: well-known/tool/reverse-engineering/windows-debugger::debug-event-loop
    - id: metadata/lang/compiler/managed::delphi
  # URLDownloadToFile + memory execution (urlmon-based dropper)
- id: urlmon-memory-exec
  desc: "URLDownloadToFile with memory execution"
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  size_max: 524288
  unless:
  - id: well-known/tool/sysadmin/logapi::logapi-pipe-marker
  - id: metadata/binary/installer/family::known-benign-installer
  all:
  - id: micro-behaviors/communications/http/get::urlmon-dynamic-load
  any:
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: objectives/evasion/fileless/memory::alloc-or-protect
- id: hostile-urlmon-dropper
  desc: "URLDownloadToFile dropper with PEB API resolution"
  crit: hostile
  conf: 0.92
  platforms: [windows]
  size_max: 524288
  all:
  - id: urlmon-memory-exec
  any:
  - id: objectives/anti-static/obfuscation/imports::manual-getprocaddress
  - id: objectives/anti-static/obfuscation/imports::hash-based-obfuscation
- id: packed-wininet-downloader
  desc: Packed binary with WinInet and dynamic loading
  crit: suspicious
  conf: 0.88
  platforms: [windows]
  size_max: 524288
  all:
  - id: micro-behaviors/communications/http/get::internet-open
  - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
  any:
  - id: metadata/binary/section/names::upx-section
  - id: objectives/anti-static/pack/detect::upx-marker
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-overall-entropy
  - id: objectives/anti-static/obfuscation/binary-metrics/shape::high-code-entropy
- id: urlmon-shell-execute-dropper
  desc: URLMon download and shell execute dropper
  crit: suspicious
  conf: 0.93
  platforms: [windows]
  size_max: 524288
  all:
  - id: micro-behaviors/communications/http/get::url-download-to-file-str
  - id: micro-behaviors/process/create/system::shell-execute-ex-a
  - id: compact-import-table
  any:
  - id: micro-behaviors/communications/http/get::internet-open
  - id: micro-behaviors/communications/http/get::wininet-dll-import-name
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  needs: 2
  unless:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/binary/installer/family::known-benign-installer
- id: urlmon-shell-execute-stager
  desc: URLMon download then ShellExecute stager
  crit: suspicious
  conf: 0.94
  platforms: [windows]
  size_max: 524288
  all:
  - id: micro-behaviors/communications/http/get::url-download-to-file-str
  - id: micro-behaviors/process/create/shell/invoke::win-shellexecute
  any:
  - id: micro-behaviors/time/timing/delay::sleep-dup
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
  - id: metadata/hardening/memory::wx-section
  needs: 2
  unless:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/installer/script::nsis
- id: hostile-urlmon-sandbox-gated-stager
  desc: Sandbox-gated URLMon payload stager
  crit: hostile
  conf: 0.96
  platforms: [windows]
  size_max: 524288
  all:
  - id: urlmon-shell-execute-stager
  - id: micro-behaviors/process/enumerate/snapshot::toolhelp-process-enumeration
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: metadata/signed/trust-level::unsigned
  any:
  - id: metadata/hardening/memory::wx-section
  - id: micro-behaviors/time/timing/delay::sleep-dup
  unless:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/installer/script::nsis
- id: packed-urlmon-shell-execute-dropper
  desc: Packed URLMon shell-execute payload dropper
  crit: hostile
  conf: 0.95
  platforms: [windows]
  size_max: 524288
  all:
  - id: micro-behaviors/communications/http/get::url-download-to-file-str
  - id: micro-behaviors/process/create/system::shell-execute-ex-a
  - id: metadata/binary/section/names::upx-section-pair
  any:
  - id: micro-behaviors/communications/http/get::internet-open
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/os/module/load::get-proc-address-import
  - id: micro-behaviors/dylib/load/runtime::load-library-a
  - id: objectives/evasion/self-delete/file/script::slash-c-del-fragment
  - id: objectives/anti-static/obfuscation/string/delimiter::repeated-xhash-overlay-delimiter
  needs: 2
  unless:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/binary/installer/family::known-benign-installer
- id: packed-autoit-wininet-dropper
  desc: Packed AutoIt WinInet input-gated dropper
  crit: hostile
  conf: 0.96
  platforms: [windows]
  all:
  - id: objectives/anti-static/obfuscation/binary-metrics/section-names::packed-autoit-encrypted-resource
  - id: micro-behaviors/communications/http/get::wininet-http-flow
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/ui/window/manage/enumerate::block-input-import
  - id: micro-behaviors/hardware/input/keyboard/hook::get-async-key-state
  any:
  - id: micro-behaviors/os/network/share::wnet-share-connect-cycle
  - id: micro-behaviors/communications/http/get::internet-read-file
- id: packed-autoit-wininet-runpe-dropper
  desc: Packed AutoIt WinInet RunPE dropper
  crit: hostile
  conf: 0.97
  platforms: [windows]
  size_min: 900000
  size_max: 1800000
  all:
  - id: objectives/evasion/process/injection/hollowing::packed-autoit-runpe-primitives
  - id: micro-behaviors/communications/http/get::wininet-http-request-strings
  - id: micro-behaviors/ui/window/manage/enumerate::block-input-import
  any:
  - id: micro-behaviors/hardware/input/keyboard/hook::get-keyboard-state-str
  - id: micro-behaviors/hardware/input/mouse/synthesis::synthetic-user-input
  - id: micro-behaviors/hardware/display/screen::gdi-getdibits
  - id: micro-behaviors/os/autorun/keyword::startup-keyword
  needs: 2
