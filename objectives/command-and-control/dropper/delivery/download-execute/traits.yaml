defaults:
  attack: T1105
  mbc: E1105
  platforms: [unix, windows, macos]
  for: [pe, dll]
# Download-Execute Dropper Patterns
# Detects stealthy download and execute patterns
# ATT&CK: T1105
composite_rules:
  - id: hostile-downloader-wininet
    desc: Hostile Downloader (Network -> Memory -> Process)
    crit: hostile
    conf: 0.9
    size_max: 524288
    unless:
      - id: metadata/vendor/valve::valve-corp-binary
      - id: file/sfx/nsis
    all:
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/process/create/spawn::create-process-w
  - id: wininet-memory-stager
    desc: WinInet downloader with in-memory staging
    crit: suspicious
    conf: 0.92
    platforms: [windows]
    size_max: 262144
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
    any:
      - id: micro-behaviors/fs/memory/mmap::win32-file-mapping
      - id: micro-behaviors/fs/path/check::self-directory-switch
      - id: micro-behaviors/fs/path/temp::word-temp-staging-file
      - id: micro-behaviors/time/timing/delay::sleep-dup
      - id: micro-behaviors/process/terminate/kill::exit-process
    needs: 2
    unless:
      - id: file/sfx/nsis
    downgrade:
      any:
        - id: metadata/lang/compiler/managed::delphi
  - id: hostile-downloader-wininet-memory-or-process
    desc: Hostile downloader with memory or process exec
    crit: hostile
    conf: 0.9
    platforms: [windows]
    size_max: 524288
    unless:
      - id: metadata/vendor/valve::valve-corp-binary
      - id: file/sfx/nsis
    all:
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
    any:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: wininet-memory-stager
    downgrade:
      any:
        - id: well-known/tools/reverse-engineering::ollydbg-plugin-export
        - id: well-known/tools/reverse-engineering::debug-event-loop
        - id: metadata/lang/compiler/managed::delphi
  # URLDownloadToFile + memory execution (urlmon-based dropper)
  - id: urlmon-memory-exec
    desc: "URLDownloadToFile with memory execution"
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    size_max: 524288
    all:
      - id: micro-behaviors/communications/http/get::urlmon-dynamic-load
    any:
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/evasion/fileless/memory::alloc-or-protect
  - id: hostile-urlmon-dropper
    desc: "URLDownloadToFile dropper with PEB API resolution"
    crit: hostile
    conf: 0.92
    platforms: [windows]
    size_max: 524288
    all:
      - id: urlmon-memory-exec
    any:
      - id: objectives/anti-static/obfuscation/imports::manual-getprocaddress
      - id: objectives/anti-static/obfuscation/imports::hash-based-obfuscation
  - id: packed-wininet-downloader
    desc: Packed binary with WinInet and dynamic loading
    crit: suspicious
    conf: 0.88
    platforms: [windows]
    size_max: 524288
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: objectives/anti-static/obfuscation/payload::minimal-pe-dynamic-load
    any:
      - id: objectives/anti-static/pack/detect::upx-section
      - id: objectives/anti-static/pack/detect::upx-marker
      - id: objectives/anti-static/obfuscation/binary-metrics::high-overall-entropy
      - id: objectives/anti-static/obfuscation/binary-metrics::high-code-entropy
