# Language-agnostic detection of the fetch -> chmod -> background-exec hidden
# implant idiom. Fires whether the bytes live inside a shell script,
# package.json postinstall, setup.py cmdclass, Rakefile, Dockerfile RUN,
# Makefile target, GitHub Actions step, Jenkinsfile, AppleScript do-shell-
# script, Kotlin/Scala ProcessBuilder, etc.
#
# Hidden stage path = a leading dot under a writable scratch directory
# (/tmp/.x, /var/tmp/.x, /dev/shm/.x, ~/.x, $HOME/.x). Per-destination atoms
# keep individual regexes short and machine-grouped.
defaults:
  for: [scripts, source, manifests, dockerfile, package-lock.json]
  platforms: [linux, macos, windows]
  attack: T1105
  mbc: B0024

composite_rules:
  - id: fetch-output-hidden-stage
    desc: fetch writes hidden stage path
    crit: component
    conf: 0.92
    near_lines: 1
    all:
      - id: micro-behaviors/fs/path/location::hidden-writable-path
    any:
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-script
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-build-file
  - id: chmod-hidden-stage
    desc: chmod targets hidden stage
    crit: component
    conf: 0.92
    near_lines: 1
    all:
      - id: micro-behaviors/fs/path/location::hidden-writable-path
    any:
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-make-executable
      - id: micro-behaviors/fs/chmod/executable/mode::pyproject-chmod-make-executable
      - id: micro-behaviors/fs/chmod/executable/mode::composer-chmod-make-executable

  # ---- Three hostile pairings, so a complete chain lights up 3 findings ----
  - id: stealth-fetch-hidden-stage
    desc: fetch then chmod hidden stage
    crit: hostile
    conf: 0.97
    near_lines: 20
    all:
      - id: fetch-output-hidden-stage
      - id: chmod-hidden-stage
  - id: external-ip-fetch-hidden-stage
    desc: external IP fetch hidden stage
    crit: hostile
    conf: 0.98
    near_lines: 20
    all:
      - id: micro-behaviors/communications/http/request/client::curl-external-ip-request
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-make-executable
      - id: micro-behaviors/fs/path/location::hidden-writable-path
  - id: quiet-fetch-hidden-stage
    desc: Quiet download writes hidden stage
    crit: hostile
    conf: 0.97
    near_lines: 1
    all:
      - id: micro-behaviors/fs/path/location::hidden-writable-path
    any:
      - id: micro-behaviors/communications/http/download/curl::curl-quiet-http-request
      - id: micro-behaviors/communications/http/download/curl::curl-silent
      - id: micro-behaviors/communications/http/download/cli::wget-q-flag
    unless:
      - id: well-known/lib/huggingface::sandbox-server-bootstrap
      - id: well-known/app/vscode/
      - id: metadata/package/quality/source::source-archive-member
      - id: well-known/tool/sysadmin/atuin::atuin-install-script-path
  - id: chmod-arms-hidden-stage
    desc: chmod arms hidden stage
    crit: hostile
    conf: 0.97
    near_lines: 1
    all:
      - id: micro-behaviors/fs/path/location::hidden-writable-path
    any:
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-make-executable
      - id: micro-behaviors/fs/chmod/executable/mode::pyproject-chmod-make-executable
      - id: micro-behaviors/fs/chmod/executable/mode::composer-chmod-make-executable
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: metadata/file/catalog/identity::elastic-license-v2
      - id: metadata/build/jenkins::job-name
      - id: well-known/tool/development/setup-php::setup-php-action-source
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-initd-script-executable
      - id: metadata/package/quality/false-positives::app-version-home-dotfile
      - id: metadata/package/quality/false-positives::noop-clear-wrapper
      - id: metadata/package/quality/source::source-archive-member
  - id: manifest-fetch-chmod-hidden-stage
    desc: Manifest downloads and arms hidden stage
    crit: hostile
    conf: 0.98
    for: [pyproject.toml, composer.json]
    all:
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-build-file
    any:
      - id: micro-behaviors/fs/chmod/executable/mode::pyproject-chmod-make-executable
      - id: micro-behaviors/fs/chmod/executable/mode::composer-chmod-make-executable
  - id: manifest-fetch-background-hidden-stage
    desc: Manifest downloads and backgrounds hidden stage
    crit: hostile
    conf: 0.98
    for: [pyproject.toml, composer.json]
    all:
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-build-file
    any:
      - id: micro-behaviors/process/create/local-exec::pyproject-hidden-tmp-background-exec
      - id: micro-behaviors/process/create/local-exec::composer-hidden-tmp-background-exec
  - id: pyproject-chmod-background-hidden-stage
    desc: PyProject arms and backgrounds hidden stage
    crit: hostile
    conf: 0.98
    for: [pyproject.toml]
    all:
      - id: micro-behaviors/process/create/local-exec::pyproject-hidden-tmp-background-exec
      - id: micro-behaviors/fs/chmod/executable/mode::pyproject-chmod-make-executable
  - id: composer-chmod-background-hidden-stage
    desc: Composer hook arms and backgrounds hidden stage
    crit: hostile
    conf: 0.98
    for: [composer.json]
    all:
      - id: micro-behaviors/process/create/local-exec::composer-hidden-tmp-background-exec
      - id: micro-behaviors/fs/chmod/executable/mode::composer-chmod-make-executable
  - id: structured-download-chmod-background-hidden-stage
    desc: Structured command downloads and backgrounds hidden stage
    crit: hostile
    conf: 0.98
    for: [vbs, package-lock.json, plist]
    near_lines: 3
    all:
      - id: fetch-output-hidden-stage
      - id: chmod-hidden-stage
      - id: micro-behaviors/process/create/local-exec::structured-hidden-tmp-background-exec
  - id: dockerfile-fetch-hidden-stage-output
    desc: Dockerfile fetch writes hidden stage
    crit: hostile
    conf: 0.97
    for: [dockerfile]
    near_lines: 1
    all:
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
    any:
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-script
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-build-file
    unless:
      - id: metadata/package/quality/source::source-archive-member
  - id: dockerfile-chmod-hidden-stage
    desc: Dockerfile chmod arms hidden stage
    crit: hostile
    conf: 0.97
    for: [dockerfile]
    near_lines: 1
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
    unless:
      - id: metadata/package/quality/source::source-archive-member
  - id: dockerfile-stealth-fetch-hidden-stage
    desc: Dockerfile fetch then chmod hidden stage
    crit: hostile
    conf: 0.97
    for: [dockerfile]
    near_lines: 20
    all:
      - id: dockerfile-fetch-hidden-stage-output
      - id: dockerfile-chmod-hidden-stage
