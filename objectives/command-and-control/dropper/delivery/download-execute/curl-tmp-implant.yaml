# Language-agnostic detection of the fetch -> chmod -> background-exec hidden
# implant idiom. Fires whether the bytes live inside a shell script,
# package.json postinstall, setup.py cmdclass, Rakefile, Dockerfile RUN,
# Makefile target, GitHub Actions step, Jenkinsfile, AppleScript do-shell-
# script, Kotlin/Scala ProcessBuilder, etc.
#
# Hidden stage path = a leading dot under a writable scratch directory
# (/tmp/.x, /var/tmp/.x, /dev/shm/.x, ~/.x, $HOME/.x). Per-destination atoms
# keep individual regexes short and machine-grouped.
defaults:
  for: [scripts, source, manifests, dockerfile]
  platforms: [linux, macos, windows]
  attack: T1105
  mbc: B0024

traits:
  # ---- Hidden stage path atoms (one per scratch directory) ----
  - id: stage-path-tmp
    desc: hidden dotfile under /tmp
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '/tmp/\.[A-Za-z0-9._-]+'
  - id: stage-path-vartmp
    desc: hidden dotfile under /var/tmp
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '/var/tmp/\.[A-Za-z0-9._-]+'
  - id: stage-path-devshm
    desc: hidden dotfile under /dev/shm
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '/dev/shm/\.[A-Za-z0-9._-]+'
  - id: stage-path-tilde-home
    desc: hidden dotfile under home
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(^|[\s;&|`("''])~/\.[A-Za-z0-9._-]+($|[\s;&|`"'')])'
    not:
      - regex: '~/\.(cache|config|local|ssh|aws|gnupg|claude|openclaw|cloudshell|steam|var)(/|$)'
      - regex: '~/\.cdk\.json\b'
      - regex: '~/\.buildroot-ccache'
      - regex: '~/\.buildman\b'
      # Standard build-tool / package-manager repo & cache dirs that
      # legitimately receive downloaded artifacts (Maven, Cargo, Gradle, npm…).
      - regex: '~/\.(m2|cargo|rustup|gradle|npm|nuget|ivy2|sbt|gem|bundle|composer|yarn|go|pub-cache|cpan|nvm|rvm|rbenv|sdkman)(/|$)'
      - regex: '~/\.(bashrc|bash_profile|profile|zshrc|zprofile|kshrc|cshrc|tcshrc|inputrc|gemrc)($|[\s;&|`"'')])'
      - regex: '~/\.[A-Za-z0-9._-]*rc(\.sh)?($|[\s;&|`"'')])'
  - id: stage-path-env-home
    desc: hidden dotfile under HOME
    crit: component
    conf: 0.9
    unless:
      - type: text
        substr: ".steam/steam"
      - type: text
        substr: "com.valvesoftware.Steam"
    if:
      type: text
      regex: '\$HOME/\.[A-Za-z0-9._-]+($|[\s;&|`"'')])'
    not:
      - regex: '\$HOME/\.(cache|config|local|ssh|aws|gnupg|cloudshell|steam|var)(/|$)'
      - regex: '\$HOME/\.buildroot-ccache'
      # Standard build-tool / package-manager repo & cache dirs.
      - regex: '\$HOME/\.(m2|cargo|rustup|gradle|npm|nuget|ivy2|sbt|gem|bundle|composer|yarn|go|pub-cache|cpan|nvm|rvm|rbenv|sdkman)(/|$)'
      - regex: '\$HOME/\.(bashrc|bash_profile|profile|zshrc|zprofile|kshrc|cshrc|tcshrc|inputrc|gemrc)($|[\s;&|`"'')])'

  # ---- Action atoms ----
  - id: gradlew-basename
    desc: Gradle wrapper script basename
    crit: component
    conf: 0.99
    for: [shell]
    if:
      type: basename
      exact: gradlew

  - id: gradle-wrapper-script-text
    desc: Gradle wrapper script text
    crit: component
    conf: 0.99
    if:
      type: text
      substr: "Gradle wrapper script"
composite_rules:
  # ---- Aggregator: any hidden-stage destination ----
  - id: any-hidden-stage-path
    desc: hidden dotfile stage path
    crit: notable
    conf: 0.9
    any:
      - id: stage-path-tmp
      - id: stage-path-vartmp
      - id: stage-path-devshm
      - id: stage-path-tilde-home
      - id: stage-path-env-home
  - id: fetch-output-hidden-stage
    desc: fetch writes hidden stage path
    crit: component
    conf: 0.92
    near_lines: 1
    all:
      - id: any-hidden-stage-path
    any:
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-script
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-build-file
  - id: chmod-hidden-stage
    desc: chmod targets hidden stage
    crit: component
    conf: 0.92
    near_lines: 1
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-make-executable
      - id: any-hidden-stage-path

  # ---- Three hostile pairings, so a complete chain lights up 3 findings ----
  - id: stealth-fetch-hidden-stage
    desc: fetch then chmod hidden stage
    crit: hostile
    conf: 0.97
    near_lines: 20
    all:
      - id: fetch-output-hidden-stage
      - id: chmod-hidden-stage
  - id: external-ip-fetch-hidden-stage
    desc: external IP fetch hidden stage
    crit: hostile
    conf: 0.98
    near_lines: 20
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-download-external-ip
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-make-executable
      - id: any-hidden-stage-path
  - id: fetch-then-stage-output
    desc: fetch writes hidden stage path
    crit: hostile
    conf: 0.97
    near_lines: 1
    all:
      - id: any-hidden-stage-path
    any:
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-script
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-build-file
    unless:
      - id: gradlew-basename
      - id: gradle-wrapper-script-text
      - id: metadata/package/quality/false-positives::release-version-home-dotfile
      - id: well-known/app/vscode/
  - id: chmod-arms-hidden-stage
    desc: chmod arms hidden stage
    crit: hostile
    conf: 0.97
    near_lines: 1
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-make-executable
      - id: any-hidden-stage-path
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: metadata/file/catalog/identity::elastic-license-v2
      - id: metadata/build/jenkins::job-name
      - id: well-known/tool/development/setup-php::setup-php-action-source
      - id: micro-behaviors/fs/chmod/executable/mode::chmod-initd-script-executable
      - id: metadata/package/quality/false-positives::app-version-home-dotfile
      - id: metadata/package/quality/false-positives::noop-clear-wrapper
  - id: dockerfile-fetch-hidden-stage-output
    desc: Dockerfile fetch writes hidden stage
    crit: hostile
    conf: 0.97
    for: [dockerfile]
    near_lines: 1
    all:
      - id: stage-path-tmp
    any:
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-script
      - id: micro-behaviors/communications/http/download/cli::fetch-output-flag-build-file
  - id: dockerfile-chmod-hidden-stage
    desc: Dockerfile chmod arms hidden stage
    crit: hostile
    conf: 0.97
    for: [dockerfile]
    near_lines: 1
    all:
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
      - id: stage-path-tmp
  - id: dockerfile-stealth-fetch-hidden-stage
    desc: Dockerfile fetch then chmod hidden stage
    crit: hostile
    conf: 0.97
    for: [dockerfile]
    near_lines: 20
    all:
      - id: dockerfile-fetch-hidden-stage-output
      - id: dockerfile-chmod-hidden-stage
