composite_rules:
  - id: squiblydoo
    desc: Squiblydoo (Regsvr32 bypass) technique detected
    crit: hostile
    conf: 0.95
    attack: T1218.010
    any:
      - id: objectives/command-and-control/dropper/delivery/download-execute::squiblydoo-plain
      - id: objectives/command-and-control/dropper/delivery/download-execute::squiblydoo-encoded
      - id: objectives/command-and-control/dropper/delivery/download-execute::squiblydoo-raw-hex
  - id: squiblydoo-plain
    desc: Squiblydoo pattern (plain text)
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/process/create/hcom::regsvr32
      - id: micro-behaviors/dylib/library/com::scrobj
      - id: objectives/command-and-control/dropper/delivery/download-execute::url-arg
  - id: squiblydoo-encoded
    desc: Squiblydoo pattern (encoded)
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/process/create/hcom::regsvr32-encoded
      - id: micro-behaviors/dylib/library/com::scrobj-encoded
      - id: objectives/command-and-control/dropper/delivery/download-execute::url-arg-encoded
  - id: squiblydoo-raw-hex
    desc: Squiblydoo pattern (hex encoded)
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/process/create/hcom::regsvr32-raw-hex
      - id: micro-behaviors/dylib/library/com::scrobj-raw-hex
      - id: objectives/command-and-control/dropper/delivery/download-execute::url-arg-raw-hex
defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: url-arg
    desc: Regsvr32 /i:URL argument
    crit: suspicious
    if:
      type: text
      regex: /i:https?://
      case_insensitive: true
  - id: url-arg-encoded
    for: [powershell, batch, vbs, javascript, html, pe]
    desc: Regsvr32 /i:URL argument (encoded)
    crit: suspicious
    if:
      type: encoded
      encoding:
        - base64
        - hex
      regex: /i:https?://
      case_insensitive: true
  - id: url-arg-raw-hex
    desc: Regsvr32 /i:URL argument (hex encoded)
    crit: suspicious
    if:
      type: text
      substr: 2f693a68747470
      case_insensitive: true
