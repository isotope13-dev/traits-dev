defaults:
  for: [pe, batch, powershell, javascript, vbs, python, csharp, cpp]
  platforms: [windows]
  attack: T1105
  mbc: E1105

composite_rules:
  - id: download-manager-runafter-fetch
    desc: Download manager fetch then execute
    crit: suspicious
    conf: 0.94
    ref: sha256:b04113b35cd1f0b0dcb7fedb99bd3d83ac35d9388745ee49763e7d226239dabf
    all:
      - id: micro-behaviors/communications/http/download/manager::url-intake-and-extraction
      - id: micro-behaviors/process/create/launch::downloader-run-after-fetch
    any:
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
      - id: micro-behaviors/communications/socket/init::connect-api
      - id: micro-behaviors/communications/socket/init::socket-api
      - id: micro-behaviors/communications/ftp/client/
    # A recognized GetRightToGo downloader already has a product-specific
    # suspicious signal; avoid duplicating its expected fetch/launch flow.
    unless:
      - id: well-known/unwanted/download-manager::getrighttogo-runafterdownloader
