defaults:
  platforms: [unix]
  for: [xml]
  attack: T1105
  mbc: E1105

composite_rules:
  - id: xml-raw-ip-download-chmod-exec
    desc: XML shell downloads raw-IP binary and executes it
    crit: hostile
    conf: 0.99
    attack: T1105,T1222.002,T1059.004
    all:
      - id: objectives/execution/interpreter/document::xml-shell-remote-fetch
      - id: objectives/execution/interpreter/document::xml-shell-world-writable-mode
      - id: objectives/execution/interpreter/document::xml-shell-local-binary-exec
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
    near_bytes: 240
