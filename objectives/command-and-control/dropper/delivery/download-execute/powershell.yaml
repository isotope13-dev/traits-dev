defaults:
  platforms: [windows]
  for: [powershell, batch]
  attack: T1105
  mbc: B0030

traits:
  - id: webclient-downloadfile-exe
    desc: WebClient fetches EXE URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: (?is)DownloadFile\s*\(\s*['"]https?://[^'"]{1,220}\.exe['"]
  - id: webclient-downloadfile-msi
    desc: WebClient fetches MSI URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: (?is)DownloadFile\s*\(\s*['"]https?://[^'"]{1,220}\.msi['"]
  - id: webclient-downloads-js-to-exe
    desc: WebClient writes JS as EXE
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: (?is)DownloadFile\s*\(\s*['"]https?://[^'"]{1,220}\.js['"]\s*,\s*['"][^'"]{1,220}\.exe['"]
  - id: start-process-exe-target
    desc: Start-Process executable target
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)Start-Process\s+[^;\r\n]{0,80}\.exe\b
  - id: msiexec-programdata-msi
    desc: msiexec installs ProgramData MSI
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)msiexec(\.exe)?.{0,80}(C:\\ProgramData|%ProgramData%).{0,80}\.msi
  - id: dated-product-msi-name
    desc: Dated product MSI filename
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (?i)\b[a-z]{4,24}[0-1][0-9][0-3][0-9]\.msi\b

composite_rules:
  - id: powershell-download-exe-execute
    desc: PowerShell downloads and runs EXE
    crit: hostile
    conf: 0.97
    all:
      - id: webclient-downloadfile-exe
      - id: start-process-exe-target
  - id: powershell-js-to-exe-masquerade
    desc: PowerShell downloads JS as EXE
    crit: hostile
    conf: 0.98
    all:
      - id: webclient-downloads-js-to-exe
      - id: start-process-exe-target
  - id: powershell-msi-programdata-install
    desc: PowerShell stages ProgramData MSI
    crit: hostile
    conf: 0.98
    all:
      - id: webclient-downloadfile-msi
      - id: msiexec-programdata-msi
    any:
      - id: dated-product-msi-name
      - id: objectives/execution/lolbin/os::msiexec-execution
