defaults:
  platforms: [windows]
  for: [powershell, batch, pe]
  attack: T1105
  mbc: B0030

traits:
  - id: webclient-downloadfile-exe-url
    desc: WebClient fetches EXE URL
    crit: component
    conf: 0.94
    if:
      type: text
      regex: (?is)DownloadFile\s*\(\s*['"]https?://[^'"]{1,220}\.exe['"]
  - id: webclient-downloadfile-msi
    desc: WebClient fetches MSI URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: (?is)DownloadFile\s*\(\s*['"]https?://[^'"]{1,220}\.msi['"]
  - id: webclient-downloads-js-to-exe
    desc: WebClient writes JS as EXE
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: (?is)DownloadFile\s*\(\s*['"]https?://[^'"]{1,220}\.js['"]\s*,\s*['"][^'"]{1,220}\.exe['"]
  - id: msiexec-programdata-msi
    desc: msiexec installs ProgramData MSI
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)msiexec(\.exe)?.{0,80}(C:\\ProgramData|%ProgramData%).{0,80}\.msi
  - id: dated-product-msi-name
    desc: Dated product MSI filename
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (?i)\b[a-z]{4,24}[0-1][0-9][0-3][0-9]\.msi\b
  - id: github-raw-msi-url
    desc: GitHub raw MSI payload URL
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'https://github\.com/.{1,40}/.{1,40}/raw/.{1,40}/.{1,80}\.msi'
  - id: msiexec-quiet-install-args
    desc: Quiet msiexec install arguments
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)/i\s+`?["'']?\$[A-Za-z_][A-Za-z0-9_]*`?["'']?\s+/qn\b'
    unless:
      - type: text
        substr: install_virtualbox
      - type: basename
        exact: install_virtualbox.ps1
      # Tailscale's documented Windows bootstrap legitimately downloads and
      # silently installs its MSI with these arguments.
      - id: well-known/app/tailscale::tailscale-source-token
  - id: msiexec-norestart-arg
    desc: msiexec no-restart argument
    crit: component
    conf: 0.9
    if:
      type: text
      word: /norestart

composite_rules:
  - id: powershell-hidden-network-stage
    desc: Hidden PowerShell retrieves and launches a stage
    crit: hostile
    conf: 0.99
    attack: T1059.001,T1105,T1564.003
    all:
      - id: micro-behaviors/process/create/shell/remote-powershell::powershell-hidden-window
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::invoke-webrequest
      - id: micro-behaviors/process/create/start-process::start-process-call

  - id: webclient-downloadfile-exe
    desc: WebClient stages EXE in writable path
    crit: suspicious
    conf: 0.94
    near_lines: 3
    all:
      - id: webclient-downloadfile-exe-url
    any:
      - id: micro-behaviors/fs/path/temp::win-temp-env
      - id: micro-behaviors/fs/path/temp::win-temp-path
      - id: micro-behaviors/fs/path/location::programdata-directory-path
      - id: micro-behaviors/fs/path/location::programdata-executable-path
      - id: micro-behaviors/fs/path/location::roaming-appdata-executable-path
      - id: micro-behaviors/fs/file/write/staging::users-public-path
  - id: powershell-download-exe-execute
    desc: PowerShell downloads and runs EXE
    crit: hostile
    conf: 0.97
    all:
      - id: webclient-downloadfile-exe
      - id: micro-behaviors/process/create/start-process::start-process-call
  - id: powershell-country-gated-download-execute
    desc: PowerShell country-gated executable dropper
    crit: hostile
    conf: 0.99
    attack: T1480,T1105,T1204.002
    mbc: B0027,B0030
    all:
      - id: objectives/anti-analysis/geofencing/target-gating::powershell-country-selected-execution
      - id: micro-behaviors/communications/http/client/webclient::net-webclient-object
      - id: micro-behaviors/communications/http/download/url::executable-url-reference
      - id: micro-behaviors/process/create/start-process::start-process-call
    unless:
      - id: metadata/signed/platform/
  - id: powershell-js-to-exe-masquerade
    desc: PowerShell downloads JS as EXE
    crit: hostile
    conf: 0.98
    all:
      - id: webclient-downloads-js-to-exe
      - id: micro-behaviors/process/create/start-process::start-process-call
  - id: powershell-msi-programdata-install
    desc: PowerShell stages ProgramData MSI
    crit: hostile
    conf: 0.98
    all:
      - id: webclient-downloadfile-msi
      - id: msiexec-programdata-msi
    any:
      - id: dated-product-msi-name
      - id: objectives/execution/lolbin/os::msiexec-execution
  - id: powershell-temp-msi-install
    desc: PowerShell stages and installs TEMP MSI
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
      - id: micro-behaviors/fs/path/temp::temp-msi-staging
      - id: micro-behaviors/process/create/start-process::start-process-msiexec
      - id: msiexec-quiet-install-args
    any:
      - id: micro-behaviors/process/create/hidden::start-process-windowstyle-hidden
      - id: msiexec-norestart-arg
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::useb-flag
  - id: github-raw-msi-dropper
    desc: GitHub raw MSI PowerShell dropper
    crit: hostile
    conf: 0.99
    all:
      - id: github-raw-msi-url
      - id: objectives/command-and-control/dropper/delivery/download-execute::powershell-temp-msi-install
  - id: powershell-cert-bypass-archive-download-execute
    desc: PowerShell disables TLS checks while staging and launching an archive
    crit: hostile
    conf: 0.99
    attack: T1105,T1204.002,T1553
    all:
      - id: micro-behaviors/communications/http/client/managed::httpclient
      - id: micro-behaviors/communications/http/client/managed::getasync
      - id: micro-behaviors/communications/http/client/managed::readasbytearrayasync
      - id: micro-behaviors/communications/http/client/managed::server-certificate-validation-callback-accept-all
      - id: micro-behaviors/fs/write/file/direct::write-all-bytes
      - id: micro-behaviors/data/archive/extract/zip::powershell-expand-archive
      - id: micro-behaviors/process/create/start-process::start-process-call
    near_lines: 120
  - id: powershell-unblocked-archive-hidden-launch
    desc: PowerShell downloads, unblocks, extracts, and hides payload launch
    crit: hostile
    conf: 0.99
    attack: T1105,T1204.002,T1553.005,T1564.003
    mbc: B0030,B0032,E1059
    for: [powershell]
    near_bytes: 8192
    all:
      - id: micro-behaviors/communications/http/client/managed::webrequest-create
      - id: micro-behaviors/communications/http/client/managed::getresponse
      - id: micro-behaviors/data/archive/extract/zip::powershell-expand-archive
      - id: objectives/evasion/indicator-removal/cleanup::unblock-file
      - id: micro-behaviors/process/create/start-process::start-process-call
      - id: micro-behaviors/process/create/hidden::start-process-windowstyle-hidden
