defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1105
  mbc: E1105
traits:
- id: payload-worker-download-log
  desc: Payload worker download log
  crit: component
  conf: 0.96
  if:
    type: text
    exact: "@[payloadWorker] downloading from:"
- id: download-payload-url-log
  desc: Download payload URL log
  crit: component
  conf: 0.96
  if:
    type: text
    exact: "@[downloadPayload] url="
- id: serverxmlhttp-download-success-log
  desc: ServerXMLHTTP payload download log
  crit: component
  conf: 0.95
  if:
    type: text
    exact: "@[downloadPayload] OK via ServerXMLHTTP, size="
- id: urlmon-download-success-log
  desc: URLMon payload download log
  crit: component
  conf: 0.95
  if:
    type: text
    exact: "@[downloadPayload] OK via URLMon, size="
- id: execute-payload-command-log
  desc: Execute payload command log
  crit: component
  conf: 0.96
  if:
    type: text
    exact: "@[executePayload] cmd="
composite_rules:
- id: nim-url-payload-download-execute
  desc: Nim URL payload download execute
  crit: hostile
  conf: 0.98
  all:
  - id: payload-worker-download-log
  - id: download-payload-url-log
  - id: execute-payload-command-log
  any:
  - id: serverxmlhttp-download-success-log
  - id: urlmon-download-success-log
  - id: micro-behaviors/communications/http/client::http-client-any
  - id: micro-behaviors/communications/http/get::url-download-to-file-str
  unless:
  - id: metadata/binary/installer::known-benign-installer
  - id: metadata/signed/platform::microsoft
