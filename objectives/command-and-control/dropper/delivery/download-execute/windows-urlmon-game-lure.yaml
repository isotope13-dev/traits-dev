defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1105, T1204.002"
  mbc: "E1105"

traits:
  - id: local-host-life-download-raw-url
    desc: local-host.life download_raw URL
    crit: component
    conf: 0.96
    count_min: 2
    if:
      type: text
      substr: https://local-host.life/download_raw/
  - id: staged-game-config-downloads
    desc: Game config staged downloads
    crit: component
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: (?i)(camera_|focus_|config_re).{0,48}\.txt
  - id: png-to-exe-stage-names
    desc: PNG renamed executable stages
    crit: component
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: (?i)(modulo_rete\.png|Servizio\.exe|Rete\.exe)
  - id: italian-download-status-burst
    desc: Italian staged download status
    crit: component
    conf: 0.9
    count_min: 4
    if:
      type: text
      regex: (?i)(Scaricando|scaricata|scaricato|download)

composite_rules:
  - id: urlmon-game-lure-multistage-dropper
    desc: URLMon game lure multistage dropper
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: local-host-life-download-raw-url
      - id: staged-game-config-downloads
      - id: png-to-exe-stage-names
      - id: micro-behaviors/process/create/spawn::create-process-a
    any:
      - id: micro-behaviors/os/registry/keys::windows-registry-run-access
      - id: micro-behaviors/os/registry/manipulate::registry-write-api-chain
      - id: micro-behaviors/fs/file/move::move-file
      - id: italian-download-status-burst
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft-corporation
      - id: metadata/binary/vendor::microsoft-corp-versioninfo
