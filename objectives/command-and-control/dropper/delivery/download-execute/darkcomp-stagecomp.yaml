defaults:
  platforms: [windows]
  for: [pe, batch, powershell]
  attack: T1105
  mbc: B0024

traits:
  - id: stagecomp-ms-upd-name
    desc: Stagecomp updater filename
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bms_upd\.exe\b'
  - id: stagecomp-moonzonet-domain
    desc: Stagecomp moonzonet domain
    crit: notable
    conf: 0.99
    if:
      type: text
      regex: '(?i)\bmoonzonet\.com\b'
  - id: stagecomp-register-endpoint
    desc: Stagecomp register endpoint
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(/|%2f)register\b'
  - id: stagecomp-check-endpoint
    desc: Stagecomp check endpoint
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(/|%2f)check\b'
  - id: stagecomp-approved-status
    desc: Stagecomp approved status
    crit: component
    conf: 0.8
    if:
      type: text
      word: approved
  - id: stagecomp-downloading-status
    desc: Stagecomp downloading status
    crit: component
    conf: 0.8
    if:
      type: text
      word: downloading
  - id: stagecomp-game-dll-source
    desc: Stagecomp Game DLL component
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bGame\.dll\b'
  - id: stagecomp-game-config-source
    desc: Stagecomp Game config component
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bGame\.config\b'
  - id: stagecomp-visualwincomp-output
    desc: Stagecomp visualwincomp output
    crit: component
    conf: 0.96
    if:
      type: text
      regex: '(?i)\bvisualwincomp\.txt\b'

composite_rules:
  - id: stagecomp-register-check-protocol
    desc: Stagecomp register check protocol
    crit: notable
    conf: 0.97
    # Require the protocol fragments to occur in one request-handling
    # neighborhood.  Separate generic web routes/status words are common in
    # legitimate servers and embedded web UIs.
    near_bytes: 512
    all:
      - id: stagecomp-register-endpoint
      - id: stagecomp-check-endpoint
    any:
      - id: stagecomp-moonzonet-domain
      - id: stagecomp-approved-status
      - id: stagecomp-downloading-status
  - id: stagecomp-webview2-component-download
    desc: Stagecomp WebView2 component download
    crit: hostile
    conf: 0.98
    all:
      - id: stagecomp-register-check-protocol
      - id: stagecomp-moonzonet-domain
      - id: stagecomp-game-dll-source
      - id: stagecomp-game-config-source
      - id: stagecomp-visualwincomp-output
