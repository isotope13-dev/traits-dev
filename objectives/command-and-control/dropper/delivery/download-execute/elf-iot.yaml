defaults:
  platforms: [linux]
  for: [elf]
  attack: "T1105,T1059.004"
  mbc: E1105

traits: []

composite_rules:
  - id: raw-ip-download-chmod-relative-exec
    desc: ELF raw-IP download chmod and execute chain
    crit: hostile
    conf: 0.99
    attack: "T1105,T1059.004,T1222.002"
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
      - id: micro-behaviors/process/create/shell/spawn::system-fn
      - id: micro-behaviors/fs/chmod/executable/dangerous::shell-777
      - id: micro-behaviors/process/create/local-exec::native-relative-executable-string

  # The three-way combination is specific to an IoT bot dropper: a raw-IP
  # download, an executable-mode change, and a Mirai credential table. Each
  # leg is neutral or suspicious on its own, but together they describe the
  # payload-delivery behavior.
  - id: raw-ip-iot-download-chmod-exec
    desc: IoT bot downloads and executes raw-IP payload
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
      - id: micro-behaviors/process/create/shell/spawn::system-fn
      - id: objectives/lateral-movement/brute-force/iot-creds::mirai-credential-access
