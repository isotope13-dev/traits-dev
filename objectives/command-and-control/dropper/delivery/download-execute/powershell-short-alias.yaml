defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1105
  mbc: B0030

traits: []

composite_rules:
  - id: powershell-iwr-exe-to-temp
    desc: PowerShell stages a URL EXE in TEMP
    crit: suspicious
    conf: 0.97
    near_lines: 1
    all:
      - id: micro-behaviors/communications/http/download/cli::iwr-exe-url
      - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
      - id: micro-behaviors/fs/path/temp::env-temp
  - id: powershell-hidden-url-exe-stager
    desc: Hidden PowerShell stages a URL EXE in TEMP
    crit: hostile
    conf: 0.98
    attack: T1105,T1564.003
    all:
      - id: powershell-iwr-exe-to-temp
      - id: micro-behaviors/process/create/hidden::powershell-hidden-window
      - id: micro-behaviors/fs/path/temp::env-temp
