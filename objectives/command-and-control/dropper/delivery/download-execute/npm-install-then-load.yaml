defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.007
  mbc: B0024
traits:
  - id: spawn-close-then-invoke
    desc: spawn close handler invokes function
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\.on\(\s*["'']close["'']\s*,\s*\(\s*\)\s*=>\s*\w+\s*\(\s*\)\s*\)'
  - id: require-uppercase-const
    desc: require with uppercase const identifier
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\brequire\(\s*[A-Z][A-Z0-9_]{2,}\s*\)'
composite_rules:
  - id: npm-install-then-load-chain
    desc: npm install completion triggers decoded require
    crit: hostile
    conf: 0.97
    attack: T1195.002,T1027,T1059.007
    near_bytes: 2200
    all:
      - id: objectives/supply-chain/install-hook/scripts/dynamic-install::stdio-windowshide-spawn
      - id: objectives/supply-chain/install-hook/scripts/dynamic-install::base64-decoded-module-const
      - id: spawn-close-then-invoke
      - id: require-uppercase-const
