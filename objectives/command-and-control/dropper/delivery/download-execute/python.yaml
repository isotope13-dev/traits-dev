# Download and Execute - Python
# GuardDog-inspired: Detects downloading and making executable remote binaries
# ATT&CK: T1105 (Ingress Tool Transfer)
# MBC: E1105 (Ingress Tool Transfer)
defaults:
  attack: T1105
  mbc: E1105
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
traits:
  - id: official-llamafile-huggingface-model
    desc: Official llamafile HuggingFace model URL
    crit: component
    conf: 0.95
    platforms: [unix, windows]
    if:
      type: text
      substr: "huggingface.co/jartine/Mistral-7B-Instruct-v0.2-llamafile/"
  - id: llamafile-server-argument
    desc: Llamafile server argument
    crit: component
    conf: 0.9
    platforms: [unix, windows]
    if:
      type: string_literal
      exact: "--server"
  - id: official-evo-release-template
    desc: Official evo GitHub release URL template
    crit: component
    conf: 0.95
    platforms: [unix, windows]
    if:
      type: text
      substr: "github.com/evo-hq/evo/releases/download/v{version}/{asset}"
  - id: evo-hook-drain-asset-name
    desc: evo hook drain release asset name
    crit: component
    conf: 0.95
    platforms: [unix, windows]
    if:
      type: text
      substr: "evo-hook-drain-"
composite_rules:
  - id: official-llamafile-runner-context
    desc: Official llamafile model runner context
    crit: component
    conf: 0.95
    all:
      - id: well-known/app/dev-tool-downloads::official-llamafile-github-release
      - id: official-llamafile-huggingface-model
      - id: llamafile-server-argument
  - id: official-evo-hook-drain-release
    desc: Official evo hook drain GitHub release asset
    crit: component
    conf: 0.95
    platforms: [unix, windows]
    all:
      - id: official-evo-release-template
      - id: evo-hook-drain-asset-name
  - id: known-benign-download-chmod-context
    desc: Known benign download and chmod installer context
    crit: component
    conf: 0.95
    any:
      - id: objectives/command-and-control/channel/deaddrop/github::official-flamegraph-script-url
      - id: official-llamafile-runner-context
      - id: well-known/app/dev-tool-downloads::official-flutter-linux-release-url
      - id: well-known/app/dev-tool-downloads::official-chromedriver-url
      - id: well-known/app/dev-tool-downloads::official-totvs-tds-vscode-marketplace-url
      - id: official-evo-hook-drain-release
      - id: well-known/app/observability::clawmetry-observability-dashboard
  # GuardDog: Download + make executable
  - id: download-and-chmod
    desc: Downloads file and makes it executable
    crit: hostile
    conf: 0.95
    near_lines: 80
    all:
      # Make executable capability
      - id: micro-behaviors/fs/chmod/executable/mode
      # Pair the chmod with a real runtime stage launch.
      - id: micro-behaviors/process/create/subprocess::process-execution
    any:
      # HTTP download capability
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlretrieve-dup
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/communications/http/request/client::http-response
    unless:
      - id: objectives/command-and-control/dropper/delivery/download-execute/
    downgrade:
      # Legitimate installers may download and chmod binaries
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
  # GuardDog: Write exe file + chmod/execute
  - id: write-exe-execute
    desc: Writes .exe file and executes
    crit: hostile
    conf: 0.95
    all:
      # Write to .exe file
      - id: micro-behaviors/fs/write/file/direct::write-exe
    any:
      # HTTP download or execution
      - id: micro-behaviors/communications/http/request/client::http-response
      - id: micro-behaviors/fs/chmod/executable/mode
      - id: micro-behaviors/process/create/subprocess::process-execution
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
  # GuardDog: Combined download-and-execute pattern
  - id: download-execute-pattern
    desc: Download and execute remote binary
    crit: hostile
    conf: 0.95
    any:
      - id: download-and-chmod
      - id: write-exe-execute
  - id: python-google-drive-jar-dropper
    desc: Google Drive JAR download and execute
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/fs/file/open::binary-write-mode
      - id: micro-behaviors/process/create/subprocess::java-jar-argv
      - id: objectives/command-and-control/infrastructure/domain/malicious::google-drive-download
