defaults:
  for: [scripts, macho]
  platforms: [unix]
traits:
- id: quiet-domain-download-exec
  desc: Quiet curl domain download execution
  crit: notable
  conf: 0.92
  attack: T1204
  if:
    type: text
    regex: '\bcurl\s+-\S{1,8}[fkLsS]{2,}\S*\s+https?://\S{1,80}\s*[|>]\s*\S{0,40}/tmp/\S+'
  not:
  - regex: 'https?://(127\.0\.0\.1|localhost|::1|0\.0\.0\.0)\b'
  unless:
  - id: well-known/tool/sysadmin/kubernetes
- id: ai-workflow-update-download
  desc: Downloads AI workflow update helper
  crit: suspicious
  conf: 0.9
  attack: T1204
  if:
    type: text
    regex: 'curl\b.{0,120}/(n8n|workflow|agent)/(update|helper)\b'
- id: curl-command-check
  desc: command -v curl check
  crit: suspicious
  conf: 0.88
  for: [macho, shell]
  if:
    type: text
    exact: command -v curl >/dev/null 2>&1
- id: wget-command-check
  desc: command -v wget check
  crit: suspicious
  conf: 0.88
  for: [macho, shell]
  if:
    type: text
    exact: command -v wget >/dev/null 2>&1
- id: localbin-path
  desc: Hidden local-bin staging path
  crit: suspicious
  conf: 0.9
  for: [macho]
  if:
    type: text
    substr: /.local/bin/
  unless:
    - id: objectives/supply-chain/trojanized/app/debug-probe/
    - id: well-known/app/macos-benign::zed-official-signed-member
- id: curl-output-quoted
  desc: curl quoted output file
  crit: suspicious
  conf: 0.88
  for: [macho]
  if:
    type: text
    exact: 'curl -f -L -s -o "'
- id: wget-output-quoted
  desc: wget quoted output file
  crit: suspicious
  conf: 0.88
  for: [macho]
  if:
    type: text
    exact: 'wget -q -O "'
- id: tmpdir-copy-binary-src
  desc: Copies BINARY_SRC into TMPDIR
  crit: suspicious
  conf: 0.9
  for: [macho]
  if:
    type: text
    substr: 'cp -f "$BINARY_SRC" "$TMPDIR/'
- id: tmpdir-chmod-path
  desc: chmod +x on TMPDIR path
  crit: suspicious
  conf: 0.88
  for: [macho]
  if:
    type: text
    substr: 'chmod +x "$TMPDIR/'
- id: tmpdir-exec-path
  desc: exec on TMPDIR path
  crit: suspicious
  conf: 0.9
  for: [macho]
  if:
    type: text
    substr: 'exec "$TMPDIR/'
- id: localbin-download-stage
  desc: Downloads payload into local-bin path
  crit: suspicious
  conf: 0.92
  for: [macho]
  if:
    type: text
    regex: '(curl -f -L -s -o "|wget -q -O ").{0,120}/\.local/bin/'
composite_rules:
- id: curl-wget-fallback-selection
  desc: Chooses curl or wget downloader
  crit: suspicious
  conf: 0.9
  all:
  - id: curl-command-check
  - id: wget-command-check
- id: localbin-download-stage-composite
  desc: Downloads payload into local-bin path
  crit: suspicious
  conf: 0.92
  all:
  - id: localbin-path
  any:
  - id: curl-output-quoted
  - id: wget-output-quoted
- id: localbin-to-tmpdir-exec
  desc: Stages local-bin payload in TMPDIR
  crit: suspicious
  conf: 0.94
  for: [macho]
  all:
  - id: tmpdir-copy-binary-src
  - id: tmpdir-chmod-path
  - id: tmpdir-exec-path
- id: tmpdir-curl-download-exec
  desc: TMPDIR curl download execution
  crit: hostile
  conf: 0.98
  attack: T1105
  all:
  - id: micro-behaviors/fs/directory/chdir::tmpdir-change-directory
  - id: micro-behaviors/process/create/local-exec::execute-dot-slash-literal
  any:
  - id: micro-behaviors/communications/http/url/external-ip::curl-external-ip-request
  - id: micro-behaviors/communications/http/download/curl::curl-quiet-http-request
- id: xattr-chmod-download-exec
  desc: Quarantine-clearing download execution
  crit: hostile
  conf: 0.98
  attack: T1204
  all:
  - id: micro-behaviors/communications/http/url/external-ip::curl-external-ip-request
  - id: micro-behaviors/fs/attributes/xattr::xattr-clear-local-file
  - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-local-file
  - id: micro-behaviors/process/create/local-exec::execute-dot-slash-literal
- id: tmp-file-xattr-chmod-download-exec
  desc: /tmp file quarantine-clearing download execution
  crit: hostile
  conf: 0.98
  attack: T1204
  all:
  - id: micro-behaviors/communications/http/download/curl::curl-download-tmp-file
  - id: micro-behaviors/fs/attributes/xattr::xattr-clear-tmp-file
  - id: micro-behaviors/fs/chmod/executable/mode::chmod-exec-tmp-file
  - id: micro-behaviors/process/create/shell/spawn::executes-tmp-file
- id: ai-agent-masqueraded-helper-exec
  desc: AI workflow helper download execution
  crit: hostile
  conf: 0.98
  attack: T1204
  all:
  - id: tmp-file-xattr-chmod-download-exec
  any:
  - id: ai-workflow-update-download
  - id: micro-behaviors/communications/http/download/curl::curl-workflow-update-path
  - id: micro-behaviors/communications/http/download/curl::curl-quiet-hash-path
- id: localbin-launchagent-temp-stager
  desc: Local-bin payload staged to TMPDIR
  crit: hostile
  conf: 0.97
  attack: T1105,T1059.004
  for: [macho]
  all:
  - id: curl-wget-fallback-selection
  - id: localbin-download-stage-composite
  - id: localbin-to-tmpdir-exec
  any:
  - id: micro-behaviors/process/create/shell/spawn::system-fn
  - id: micro-behaviors/fs/chmod/executable/mode::shell-plus-x
