defaults:
  for: [scripts]
  platforms: [unix]
traits:
- id: quiet-domain-download-exec
  desc: Quiet curl domain download execution
  crit: suspicious
  conf: 0.92
  attack: T1204
  if:
    type: text
    regex: '\bcurl\s+-\S{1,8}[fkLsS]{2,}\S*\s+https?://\S{1,80}\s*[|>]\s*\S{0,40}/tmp/\S+'
  not:
  - regex: 'https?://(127\.0\.0\.1|localhost|::1|0\.0\.0\.0)\b'
  unless:
  - id: well-known/tool/sysadmin/kubernetes::minikube
- id: ai-workflow-update-download
  desc: Downloads AI workflow update helper
  crit: suspicious
  conf: 0.9
  attack: T1204
  if:
    type: text
    regex: 'curl\b.{0,120}/(n8n|workflow|agent)/(update|helper)\b'
composite_rules:
- id: tmpdir-curl-download-exec
  desc: TMPDIR curl download execution
  crit: hostile
  conf: 0.98
  attack: T1105
  all:
  - id: micro-behaviors/data/text/dropper::tmpdir-change-directory
  - id: micro-behaviors/data/text/dropper::executes-local-downloaded-file
  any:
  - id: micro-behaviors/data/text/dropper::curl-download-external-ip
  - id: micro-behaviors/data/text/dropper::curl-download-quiet-domain
- id: xattr-chmod-download-exec
  desc: Quarantine-clearing download execution
  crit: hostile
  conf: 0.98
  attack: T1204
  all:
  - id: micro-behaviors/data/text/dropper::curl-download-external-ip
  - id: micro-behaviors/data/text/dropper::xattr-clear-local-file
  - id: micro-behaviors/data/text/dropper::chmod-exec-local-file
  - id: micro-behaviors/data/text/dropper::executes-local-downloaded-file
- id: tmp-file-xattr-chmod-download-exec
  desc: /tmp file quarantine-clearing download execution
  crit: hostile
  conf: 0.98
  attack: T1204
  all:
  - id: micro-behaviors/data/text/dropper::curl-download-tmp-file
  - id: micro-behaviors/data/text/dropper::xattr-clear-tmp-file
  - id: micro-behaviors/data/text/dropper::chmod-exec-tmp-file
  - id: micro-behaviors/data/text/dropper::executes-tmp-file
- id: ai-agent-masqueraded-helper-exec
  desc: AI workflow helper download execution
  crit: hostile
  conf: 0.98
  attack: T1204
  all:
  - id: tmp-file-xattr-chmod-download-exec
  any:
  - id: ai-workflow-update-download
  - id: micro-behaviors/data/text/dropper::curl-workflow-update-path
  - id: micro-behaviors/data/text/dropper::curl-quiet-hash-path
