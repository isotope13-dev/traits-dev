defaults:
  attack: T1105
  mbc: B0024
  platforms:
    - unix
    - windows
  for:
    - shell
traits:
  - id: wget-tar-nohup-chain
    desc: 'wget tar nohup chain'
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: (wget|curl).{1,200}&&\s*tar.{1,50}&&\s*cd.{1,50}&&\s*nohup
  - id: wget-chmod-nohup-chain
    desc: 'Downloads, makes EXE, and background executes'
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: (wget|curl).{1,200}&&\s*chmod\s+\+x.{1,50}&&\s*nohup
  - id: adb-argument-local-payload
    desc: local variable launched with adb tag
    crit: suspicious
    conf: 0.9
    attack: T1059.004
    if:
      type: text
      regex: '\./\$[A-Za-z_][A-Za-z0-9_]*\s+adb\.\$[A-Za-z_][A-Za-z0-9_]*'
composite_rules:
  - id: shell-download-chmod-local-exec
    desc: Shell download chmod local execute
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/process/create/local-exec::chmod-exec-var-local
    any:
      - id: micro-behaviors/communications/http/download/shell::fetch-var-output-var
      - id: micro-behaviors/communications/http/download/shell::wget-loop-variable-download
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: micro-behaviors/communications/http/download/curl::wget-cmd
    unless:
      - id: metadata/package/quality/source::source-archive-member
      - id: metadata/build/autotools::autoconf-generated-script
  - id: raw-ip-download-chmod-local-exec
    desc: Raw IP download chmod local execute
    crit: hostile
    conf: 0.97
    all:
      - id: shell-download-chmod-local-exec
    any:
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
  - id: raw-ip-literal-download-chmod-local-exec
    desc: Raw IP literal download chmod local execute
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/download/shell::wget-http-literal-download
      - id: micro-behaviors/process/create/local-exec::chmod-exec-literal-local
    any:
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
    unless:
      - id: metadata/package/quality/source::source-archive-member
      - id: metadata/build/autotools::autoconf-generated-script
      - id: metadata/package/testing/
  - id: raw-ip-curl-literal-download-chmod-local-exec
    desc: Raw IP curl download chmod local execute
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/download/shell::curl-http-literal-download
      - id: micro-behaviors/process/create/local-exec::chmod-exec-literal-local
    any:
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
    unless:
      - id: metadata/package/quality/source::source-archive-member
      - id: metadata/build/autotools::autoconf-generated-script
      - id: metadata/package/testing/
  - id: self-deleting-download-chmod-exec
    desc: Self-deleting download chmod execute
    crit: hostile
    conf: 0.97
    attack: "T1105, T1070.004"
    all:
      - id: shell-download-chmod-local-exec
    any:
      - id: objectives/evasion/self-delete/file/script::self-delete-shell
      - id: objectives/evasion/self-delete/cleanup/remove::rm-self-dollar-zero
  - id: self-deleting-multiarch-download-dropper
    desc: Self-deleting multi-architecture download dropper
    crit: hostile
    conf: 0.98
    attack: "T1105, T1059.004, T1070.004"
    all:
      - id: self-deleting-download-chmod-exec
      - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-runtime-wordlist
    any:
      - id: objectives/command-and-control/dropper/delivery/download::shell-silent-hardcoded-download-staging
      - id: objectives/command-and-control/dropper/delivery/download::shell-silent-external-ip-download
      - id: objectives/command-and-control/botnet/iot::busybox-shell
  - id: raw-ip-loop-download-chmod-exec
    desc: Raw IP loop download chmod execute
    crit: hostile
    conf: 0.98
    all:
      - id: raw-ip-download-chmod-local-exec
      - id: micro-behaviors/communications/http/download/shell::wget-loop-variable-download
  - id: raw-ip-bulk-download-chmod-exec
    desc: Raw IP bulk download chmod execute
    crit: hostile
    conf: 0.98
    all:
      - id: raw-ip-literal-download-chmod-local-exec
      - id: micro-behaviors/communications/http/download/shell::wget-http-literal-download-cluster
  - id: raw-ip-bulk-multiarch-download-exec
    desc: Raw IP bulk multi-architecture download execute
    crit: hostile
    conf: 0.98
    all:
      - id: raw-ip-bulk-download-chmod-exec
      - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-runtime-wordlist
  - id: raw-ip-redirected-download-chmod-exec
    desc: Raw IP redirected download chmod execute
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/download/shell::fetch-output-to-literal
      - id: micro-behaviors/process/create/local-exec::chmod-exec-literal-local
    any:
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/communications/ip/literal::external-ipv4-http-url
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
  - id: raw-ip-redirected-multiarch-dropper
    desc: Raw IP redirected multi-architecture dropper
    crit: hostile
    conf: 0.98
    all:
      - id: raw-ip-redirected-download-chmod-exec
      - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-runtime-wordlist
  - id: busybox-redirected-multiarch-dropper
    desc: BusyBox redirected multi-architecture dropper
    crit: hostile
    conf: 0.98
    all:
      - id: raw-ip-redirected-download-chmod-exec
      - id: objectives/command-and-control/botnet/iot::busybox-shell
      - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-runtime-wordlist
  - id: busybox-raw-ip-bulk-multiarch-dropper
    desc: BusyBox raw-IP bulk multi-architecture dropper
    crit: hostile
    conf: 0.98
    all:
      - id: raw-ip-bulk-download-chmod-exec
      - id: objectives/command-and-control/botnet/iot::busybox-shell
      - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-runtime-wordlist
  - id: raw-ip-curl-bulk-download-chmod-exec
    desc: Raw IP curl bulk download chmod execute
    crit: hostile
    conf: 0.98
    all:
      - id: raw-ip-curl-literal-download-chmod-local-exec
      - id: micro-behaviors/communications/http/download/shell::curl-http-literal-download-cluster
  - id: raw-ip-curl-bulk-multiarch-dropper
    desc: Raw IP curl bulk multi-architecture dropper
    crit: hostile
    conf: 0.98
    all:
      - id: raw-ip-curl-bulk-download-chmod-exec
      - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-runtime-wordlist
  - id: raw-ip-bulk-self-deleting-dropper
    desc: Raw IP bulk self-deleting dropper
    crit: hostile
    conf: 0.98
    attack: "T1105, T1070.004"
    any:
      - id: raw-ip-bulk-download-chmod-exec
      - id: raw-ip-curl-bulk-download-chmod-exec
    all:
      - id: objectives/evasion/self-delete/cleanup/remove::rm-self-dollar-zero
  - id: multiarch-download-execute-loop
    desc: Multi-architecture download execute loop
    crit: hostile
    conf: 0.98
    attack: "T1105, T1059.004"
    all:
      - id: micro-behaviors/os/sysinfo/platform/arch::multi-arch-target
      - id: shell-download-chmod-local-exec
    any:
      - id: micro-behaviors/communications/http/download/shell::fetch-var-output-var
      - id: micro-behaviors/communications/http/download/shell::wget-loop-variable-download
      - id: adb-argument-local-payload
    needs: 2
  - id: raw-ip-multiarch-dropper
    desc: Raw IP multi-architecture dropper
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: multiarch-download-execute-loop
  - id: adb-tagged-multiarch-dropper
    desc: ADB-tagged multi-architecture dropper
    crit: hostile
    conf: 0.98
    attack: "T1105, T1059.004"
    all:
      - id: adb-argument-local-payload
      - id: multiarch-download-execute-loop
