defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1105,T1553.005,T1566.001

composite_rules:
  - id: pe-smtp-download-and-cleanup-chain
    desc: PE mails ZIP then downloads and removes web markers
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/email/send/direct::pe-direct-smtp-client
      - id: micro-behaviors/communications/email/mime::mime-zip-attachment-pe
      - id: micro-behaviors/communications/http/get::dynamic-wininet-api-set--internetopenurla
      - id: objectives/evasion/indicator-removal/cleanup::pe-motw-removal
