# Remote-driven forced global npm (re)install — a self-updating dropper.
#
# A CLI that fetches a version/URL from a remote server and then runs
# `npm install -g … --force` (optionally via a `--registry=` mirror) pulls and
# overwrites a globally-scoped package with server-chosen code, then typically
# re-execs. When the consent prompt is bypassed this is a remote code-push
# channel: the operator ships any future version that runs automatically. Seen in
# trojanized "channel switcher" CLIs that grab their next stage from an object
# store rather than the public registry.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, shell]
  attack: T1195.002
traits:
  - id: npm-global-force-install
    desc: Force-reinstalls a global npm package
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'npm\s+install\s+-g\b[\s\S]{0,120}--force|--force[\s\S]{0,80}npm\s+install\s+-g\b'
  - id: npm-registry-mirror-override
    desc: Installs from non-default npm registry
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '--registry=https?://'
  - id: obfuscated-global-package-update-spawn
    desc: Obfuscated launcher spawns global package update
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: "child_process_\\d+\\s*\\[\\s*['\"]spawn['\"]\\s*\\][\\s\\S]{0,320}['\"]-g['\"]\\s*,\\s*PACKAGE_NAME"
composite_rules:
  # Remote fetch feeding a forced global install = the agent pulls its next stage
  # from a server and overwrites a global package. Dual-use auto-updaters exist,
  # so suspicious; the mirror override raises confidence it bypasses the registry.
  - id: remote-driven-global-package-install
    desc: Remote fetch drives forced global npm install
    crit: suspicious
    conf: 0.85
    all:
      - id: npm-global-force-install
      - id: micro-behaviors/communications/http/request/client::js-fetch-call

  # Remote fetch → forced global install from a non-default registry → spawn the
  # reinstalled CLI. Fetch-install-execute with --force + a mirror registry +
  # re-exec is the auto-update-backdoor signature, well past a benign updater.
  - id: remote-self-update-reexec
    desc: Remote-driven global install then re-executes
    crit: hostile
    conf: 0.85
    all:
      - id: npm-global-force-install
      - id: npm-registry-mirror-override
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/process/create/shell/bridge::js-spawnsync
  - id: obfuscated-detached-global-package-update
    desc: Detached obfuscated global package self-update
    crit: suspicious
    conf: 0.98
    all:
      - id: obfuscated-global-package-update-spawn
      - id: micro-behaviors/process/daemonize/detach::detached-obfuscated-true
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
