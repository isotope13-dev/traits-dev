# Node loader that hides a remote command in character-code arrays, downloads
# into a package-local cache, loads the result, and removes the cache file.
defaults:
  platforms: [unix, windows]
  for: [javascript, package.json, npm]
  attack: T1027,T1059.007,T1105,T1070.004

composite_rules:
  - id: node-encoded-cache-download-loader
    desc: Node encoded command downloads and loads a cache payload
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
      - id: micro-behaviors/process/create/shell/bridge::child-process-exec
      - id: micro-behaviors/data/encode/char-code::fromcharcode-call
      - id: micro-behaviors/data/encode/char-code::numeric-array-literal
      - id: micro-behaviors/data/source/dynamic/load::node-variable-require-call
      - id: micro-behaviors/fs/path/check::js-exists-sync-call
      - id: micro-behaviors/fs/file/delete::fs-unlinkSync
    unless:
      - id: well-known/lib/benign-runtime-bundles::node-windows-distribution-archive
      - id: well-known/lib/benign-runtime-bundles::node-windows-runtime-binary
