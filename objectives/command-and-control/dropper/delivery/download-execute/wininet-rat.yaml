defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
  attack: "T1105, T1059"
  mbc: B0022
traits:
  - id: download-run-command
    desc: Download-and-run command prefix
    crit: component
    conf: 0.88
    if:
      type: text
      substr: DOWNLOAD_RUN
composite_rules:
  - id: wininet-c2-download-run
    desc: C2 download and immediate execution
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/command-and-control/channel/http::client-file-transfer-endpoint
      - id: download-run-command
    any:
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/communications/http/get::wininet-http-flow
      - id: micro-behaviors/communications/http/get::wininet-http-client-src
