defaults:
  platforms: [windows]
  for: [batch]

composite_rules:
  - id: hidden-remote-runtime-dropper
    desc: Hidden batch download and runtime execution chain
    crit: hostile
    conf: 0.99
    attack: "T1059.003,T1105,T1027"
    all:
      - id: micro-behaviors/process/create/script/file::batch-variable-runtime-script-launch
      - id: micro-behaviors/process/create/hidden::powershell-windowstyle-hidden
      - id: micro-behaviors/process/create/shell/build::npm-install-command
    any:
      - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
      - id: micro-behaviors/communications/http/download/curl::batch-curl-http-url
    needs: 1
    unless:
      - id: metadata/package/testing/presence/harness/
