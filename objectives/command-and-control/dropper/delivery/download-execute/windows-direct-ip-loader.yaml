defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1105,T1059.003

composite_rules:
  - id: direct-ip-memory-staging-loader
    desc: Windows direct-IP memory-staging loader
    crit: hostile
    conf: 0.98
    attack: T1105,T1620
    # Download, PE-header staging, and memory protection must belong to this
    # executable rather than being assembled from sibling archive members.
    scope: leaf
    all:
      - id: micro-behaviors/communications/http/url/external-ip::url-external-ip-port-binary
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-validation-sequence
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
