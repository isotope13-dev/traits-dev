defaults:
  platforms: [windows]
  for: [go]
  attack: T1105
  mbc: B0030

traits:
  - id: go-remote-download-helper
    desc: Downloads staged file with progress
    crit: notable
    conf: 0.93
    for: [pe]
    if:
      type: text
      exact: main.downloadToFileWithProgress

  - id: go-archive-extract-helper
    desc: Extracts staged archive
    crit: notable
    conf: 0.9
    for: [pe]
    if:
      type: text
      regex: 'main\.unzipTo(SkipLocked)?\b'

  - id: go-remote-config-helper
    desc: Loads remote download configuration
    crit: suspicious
    conf: 0.92
    for: [pe]
    if:
      type: text
      regex: 'main\.(initRemoteConfig|fetchDownloadURLs)\b'

composite_rules:
  - id: go-remote-vpn-stager
    desc: Remote SoftEther component staging
    crit: hostile
    conf: 0.98
    for: [pe]
    all:
      - id: go-remote-download-helper
      - id: go-archive-extract-helper
      - id: go-remote-config-helper
