defaults:
  platforms: [unix, android]
  for: [elf, shell, c, cpp]
  attack: "T1105, T1059.004"
  mbc: "B0022"
composite_rules:
  - id: android-tmp-binary-download-execute
    desc: Android tmp binary download execute
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/data/text/dropper::android-local-tmp-path
      - id: micro-behaviors/data/text/dropper::android-tmp-output-download
      - id: micro-behaviors/data/text/dropper::android-tmp-chmod-exec
  - id: android-adb-shell-download-execute
    desc: Android ADB shell download execute
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/socket/tcp::shell-v2-session
      - id: micro-behaviors/data/text/dropper::android-local-tmp-cd
      - id: micro-behaviors/data/text/dropper::shell-executes-downloaded-scripts
    any:
      - id: micro-behaviors/data/text/dropper::busybox-wget-http-script
      - id: micro-behaviors/data/text/dropper::curl-http-script
      - id: micro-behaviors/communications/ip::http-ip-url
    needs: 2
