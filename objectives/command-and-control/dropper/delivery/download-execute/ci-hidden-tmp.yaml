defaults:
  for: [github-actions]
  platforms: [linux, macos]
  size_min: 80
  size_max: 20000
  attack: T1105
  mbc: B0024

traits:
  - id: ci-release-download-hidden-tmp
    desc: CI release download hidden temp
    crit: suspicious
    conf: 0.98
    if:
      type: value
      path: jobs.*.steps[*].run
      regex: 'releases/latest/download/.{1,80}\s-o\s+/tmp/\.'

  - id: ci-chmod-hidden-tmp
    desc: CI chmod hidden temp payload
    crit: suspicious
    conf: 0.98
    if:
      type: value
      path: jobs.*.steps[*].run
      regex: 'chmod\s+\+x\s+/tmp/\.[A-Za-z0-9._-]+'

  - id: ci-background-hidden-tmp
    desc: CI background hidden temp payload
    crit: suspicious
    conf: 0.98
    if:
      type: value
      path: jobs.*.steps[*].run
      regex: '(?m)^\s*/tmp/\.[A-Za-z0-9._-]+\s*&\s*$'

composite_rules:
  - id: ci-hidden-tmp-download-chmod
    desc: CI hidden temp download chmod
    crit: hostile
    conf: 0.98
    near_lines: 6
    all:
      - id: ci-release-download-hidden-tmp
      - id: ci-chmod-hidden-tmp

  - id: ci-hidden-tmp-chmod-execute
    desc: CI hidden temp chmod execute
    crit: hostile
    conf: 0.98
    near_lines: 6
    all:
      - id: ci-chmod-hidden-tmp
      - id: ci-background-hidden-tmp

  - id: ci-hidden-tmp-download-execute
    desc: CI hidden temp download execute
    crit: hostile
    conf: 0.99
    near_lines: 6
    all:
      - id: ci-release-download-hidden-tmp
      - id: ci-chmod-hidden-tmp
      - id: ci-background-hidden-tmp
