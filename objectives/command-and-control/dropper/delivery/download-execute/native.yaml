# Native downloader flow: a raw-IP HTTP GET followed by a child-process launch.
defaults:
  platforms: [linux, unix]
  for: [elf]
  attack: T1105,T1059.004
  mbc: B0024,E1105

composite_rules:
  - id: raw-ip-http-download-fork-execute
    desc: Native raw-IP HTTP downloader forks and executes payload
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/get::manual-http10-dynamic-get
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/create/execv::c-exec-variants
