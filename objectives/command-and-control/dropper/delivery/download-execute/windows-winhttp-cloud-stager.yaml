defaults:
  for: [pe]
  platforms: [windows]
  attack: T1105
  mbc: E1105

traits:
- id: c2-healthcheck-query-path
  desc: Hardcoded healthcheck C2 path
  crit: component
  conf: 0.92
  if:
    type: text
    regex: ^/good\?[a-z]=[A-Za-z0-9_-]{4,32}&substr=[A-Za-z0-9_-]{4,32}$

composite_rules:
- id: winhttp-cloud-stage-with-c2
  desc: WinHTTP cloud stage with hardcoded C2
  crit: suspicious
  conf: 0.95
  size_max: 524288
  all:
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-downloader-flow-text
  - id: micro-behaviors/communications/http/url/cloud::gdrive-download-url
  - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-binary
  any:
  - id: c2-healthcheck-query-path
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
  - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
  needs: 2
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/installer/script::nsis
- id: api-hashed-winhttp-stage-loader
  desc: API-hashed WinHTTP staged loader
  crit: hostile
  conf: 0.96
  size_max: 524288
  all:
  - id: winhttp-cloud-stage-with-c2
  - id: objectives/anti-static/obfuscation/imports::pe-api-hashing-indicator-single
  - id: metadata/signed/trust-level::unsigned
  any:
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
  - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
  needs: 3
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/installer/family::known-benign-installer
  - id: metadata/binary/installer/script::nsis
