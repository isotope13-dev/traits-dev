defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1105
  mbc: E1105
composite_rules:
  - id: signed-urlmon-download-execute
    desc: Signed URLMon downloader executes payload
    crit: suspicious
    conf: 0.95
    size_max: 524288
    all:
      - id: micro-behaviors/communications/http/get::branded-urlmon-downloader
      - id: micro-behaviors/os/security/auth/verify::winverifytrust-symbol
    any:
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/process/create/spawn::create-process-w
    downgrade:
      any:
        - id: metadata/vendor/valve::valve-corp-binary
        - id: metadata/signed/platform::microsoft
  - id: signed-downloader-with-host-recon
    desc: Signed downloader with session reconnaissance
    crit: hostile
    conf: 0.97
    size_max: 524288
    all:
      - id: micro-behaviors/communications/http/get::branded-urlmon-downloader
      - id: micro-behaviors/os/security/auth/verify::winverifytrust-symbol
      - id: objectives/discovery/account/lookup::interactive-session-account-enumeration
    any:
      - id: micro-behaviors/process/create/exec::shell-execute-ex
      - id: micro-behaviors/process/create/spawn::create-process-w
    needs: 1
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
  - id: signed-downloader-network-stager
    desc: Signed downloader with staged endpoints
    crit: hostile
    conf: 0.96
    size_max: 524288
    all:
      - id: micro-behaviors/communications/http/get::branded-urlmon-downloader
      - id: micro-behaviors/os/security/auth/verify::winverifytrust-symbol
      - id: objectives/command-and-control/infrastructure/ip-port::embedded-ipv4-endpoint-pair
    any:
      - id: micro-behaviors/fs/file/open::createfile-api
      - id: micro-behaviors/fs/file/write::writefile-api
      - id: micro-behaviors/fs/file/write::write-file
  - id: signed-downloader-stager-profile
    desc: Signed downloader with staged network profile
    crit: suspicious
    conf: 0.94
    size_max: 524288
    all:
      - id: micro-behaviors/communications/http/get::branded-urlmon-downloader
      - id: objectives/command-and-control/infrastructure/ip-port::embedded-ipv4-endpoint-pair
    any:
      - id: micro-behaviors/fs/file/open::createfile-api
      - id: micro-behaviors/fs/file/write::writefile-api
      - id: micro-behaviors/fs/file/write::write-file
