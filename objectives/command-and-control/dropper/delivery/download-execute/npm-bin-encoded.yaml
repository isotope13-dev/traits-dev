defaults:
  platforms: [unix, windows]
  for: [package.json]
composite_rules:
  - id: npm-bin-encoded-download-execute
    desc: npm bin hides download-execute payload
    crit: hostile
    conf: 0.995
    attack: "T1027, T1105, T1059.004, T1195.002"
    mbc: "B0024"
    all:
      - id: objectives/supply-chain/hidden-payload/encoding::npm-bin-base64-shell-payload
      - id: objectives/supply-chain/hidden-payload/encoding::npm-bin-b64-curl-http
      - id: objectives/supply-chain/hidden-payload/encoding::npm-bin-b64-tmp-hidden-path
      - id: objectives/supply-chain/hidden-payload/encoding::npm-bin-b64-chmod-plus-x
      - id: objectives/supply-chain/hidden-payload/encoding::npm-bin-b64-devnull-background
