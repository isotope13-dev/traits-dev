defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1059.003,T1105,T1218.007

composite_rules:
  - id: vbs-curl-msi-dropper
    desc: VBScript downloads and silently installs an MSI
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: micro-behaviors/communications/http/download/curl::curl-output-file
      - id: micro-behaviors/process/create/exec::vbs-msiexec-quiet-install
      - id: micro-behaviors/process/create/shell/script-host::cmd-exe-c-command
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-hidden-async-run
