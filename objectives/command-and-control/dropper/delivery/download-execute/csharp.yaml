# C# download-and-execute patterns
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1105"
traits:
  - id: webclient-downloadfile
    desc: WebClient.DownloadFile usage
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\.DownloadFile\s*\('
  - id: process-start-downloaded
    desc: Process.Start on downloaded file
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "Process.Start("
  - id: temp-path-download
    desc: Download to TEMP directory
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "GetEnvironmentVariable\\s*\\(.{0,30}TEMP"
  - id: use-shell-execute-false
    desc: UseShellExecute disabled for stealth
    crit: component
    conf: 0.75
    if:
      type: text
      substr: "UseShellExecute = false"
  - id: kingspy-wudfhost-payload-url
    desc: Kingspy WUDFHost payload URL
    crit: suspicious
    conf: 0.99
    for: [pe]
    if:
      type: text
      exact: http://dosya.kingspy.info/WUDFhost.exe
  - id: relative-taskhost-drop-path
    desc: Relative taskhost drop path
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: text
      exact: \taskhost.exe
  - id: dotnet-getenvironmentvariable-token
    desc: .NET environment variable token
    crit: component
    conf: 0.75
    for: [pe]
    if:
      type: text
      exact: GetEnvironmentVariable
  - id: raw-github-svchost-zowner-url
    desc: GitHub raw svchost.zowner stage URL
    crit: suspicious
    conf: 0.99
    for: [pe]
    if:
      type: text
      exact: https://raw.githubusercontent.com/inqcode/skq12kjj3jj1/main/svchost.zowner
  - id: svchost-zowner-stage-name
    desc: svchost.zowner stage filename
    crit: suspicious
    conf: 0.95
    for: [pe]
    if:
      type: text
      word: svchost.zowner
  - id: processstartinfo-exec-token
    desc: ProcessStartInfo execution token
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: text
      word: ProcessStartInfo
  - id: managed-update-loader-method-cluster
    desc: Managed update-launch method cluster
    crit: suspicious
    conf: 0.98
    for: [pe]
    if:
      type: text
      regex: '\b(ExecuteUpdateProcess|DownloadResourceFile|ProcessDownloadedItems|LaunchExecutable)\b'
    count_min: 4
composite_rules:
  - id: download-execute-csharp
    desc: Download and execute remote payload
    crit: hostile
    conf: 0.94
    all:
      - id: webclient-downloadfile
    any:
      - id: process-start-downloaded
      - id: temp-path-download
      - id: use-shell-execute-false
    needs: 2
  - id: dotnet-kingspy-download-execute
    desc: .NET Kingspy download and execute
    crit: hostile
    conf: 0.99
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: kingspy-wudfhost-payload-url
      - id: micro-behaviors/communications/http/client/managed::webclient
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-split-tokens
    any:
      - id: relative-taskhost-drop-path
      - id: dotnet-getenvironmentvariable-token
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
  - id: dotnet-github-httpclient-download-exec
    desc: .NET GitHub raw downloader drops and runs stage
    crit: hostile
    conf: 0.99
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::httpclient-bytearray-download
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: processstartinfo-exec-token
    any:
      - id: raw-github-svchost-zowner-url
      - id: svchost-zowner-stage-name
      - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-script-file
      - id: objectives/evasion/masquerade/process/name::svchost-name
    needs: 2
  - id: dotnet-downloaddata-writeallbytes-shell
    desc: .NET downloads bytes, writes executable, and shells it
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/client/managed::downloaddata
      - id: micro-behaviors/fs/write/file/direct::writeallbytes-any
      - id: micro-behaviors/process/create/vb-shell::interaction-shell
  - id: dotnet-downloadfile-execute-chain
    desc: .NET DownloadFile then Process.Start
    crit: suspicious
    conf: 0.92
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-split-tokens
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/ai::openai-dotnet-official-library
      - id: well-known/lib/guna-ui2::guna-ui2-library-marker
      - id: well-known/app/windows-desktop-tools::steamtools-member
  - id: dotnet-downloadfile-temp-execute
    desc: .NET downloads file to temp and executes it
    crit: hostile
    conf: 0.96
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-split-tokens
    any:
      - id: micro-behaviors/fs/path/temp::dotnet-gettempfilename-token
      - id: micro-behaviors/fs/write/file/direct::dotnet-writealltext-token
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: micro-behaviors/communications/http/client/managed::getresponse
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/ai::openai-dotnet-official-library
  - id: dotnet-webclient-write-execute
    desc: .NET WebClient write and execute chain
    crit: hostile
    conf: 0.95
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::request
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-split-tokens
    any:
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: micro-behaviors/communications/http/client/managed::downloaddata
      - id: micro-behaviors/fs/write/file/direct::dotnet-writealltext-token
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/ai::openai-dotnet-official-library
  # The four staging capabilities must CLUSTER (one small stager class), not be
  # scattered library-wide. Without proximity, this fired on any comprehensive
  # .NET library that merely contains download + base64 + gzip + file-write as
  # unrelated utilities (NewLife/Pek, cloud SDKs, config/asset caches) — 100KB+
  # apart in the metadata heap, never a real download→decode→decompress→write
  # chain. A focused dropper keeps them within one method/type.
  - id: dotnet-encoded-stage-write-cluster
    desc: Clustered download-decode-gzip-write chain
    crit: component
    conf: 0.9
    for: [pe]
    near_bytes: 16384
    all:
      - id: micro-behaviors/communications/http/client/managed::downloadstring
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/data/compress/library::gzipstream-dotnet
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
  - id: dotnet-downloadstring-encoded-file-stage
    desc: .NET downloads and writes encoded compressed stage
    crit: hostile
    conf: 0.98
    attack: "T1105,T1140"
    for: [pe]
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: dotnet-encoded-stage-write-cluster
    unless:
      - id: metadata/signed/platform/
  - id: dotnet-encoded-payload-write-execute
    desc: .NET embedded Base64 payload is written and launched
    crit: hostile
    conf: 0.99
    attack: "T1027,T1105,T1140,T1059"
    for: [pe]
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: objectives/anti-static/obfuscation/payload/encoded::large-base64-string-dup
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: metadata/file/string/artifact::process-word-token
      - id: micro-behaviors/process/create/spawn::process-start-member-token
  - id: dotnet-temp-encoded-payload-stager
    desc: .NET encoded payload staged through a temporary file
    crit: hostile
    conf: 0.99
    attack: "T1027,T1105,T1140,T1059"
    for: [pe]
    all:
      - id: dotnet-encoded-payload-write-execute
      - id: micro-behaviors/fs/path/temp::dotnet-gettempfilename-token
  - id: dotnet-networked-archive-loader
    desc: .NET networked archive loader with process execution and SOCKS5 transport
    crit: hostile
    conf: 0.97
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::httpclient
      - id: micro-behaviors/data/archive/extract/zip::dotnet-zip-entry-extract
      - id: micro-behaviors/process/create/spawn::process-token-dotnet
      - id: micro-behaviors/communications/proxy/socks::socks5-version-greeting-bytes
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
  - id: managed-sandbox-gated-download-launch
    desc: Managed sandbox-aware downloader launches retrieved items
    crit: hostile
    conf: 0.99
    for: [pe]
    all:
      - id: managed-update-loader-method-cluster
      - id: objectives/anti-analysis/sandbox-detect/suite::managed-sandbox-fingerprint-suite
      - id: micro-behaviors/communications/http/client/managed::httpclient
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-split-tokens
      - id: micro-behaviors/process/create/hidden::dotnet-create-no-window
