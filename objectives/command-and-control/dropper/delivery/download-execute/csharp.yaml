# C# download-and-execute patterns
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1105"
traits:
  - id: webclient-downloadfile
    desc: WebClient.DownloadFile usage
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\.DownloadFile\s*\('
  - id: process-start-downloaded
    desc: Process.Start on downloaded file
    crit: component
    conf: 0.85
    if:
      type: text
      substr: "Process.Start("
  - id: temp-path-download
    desc: Download to TEMP directory
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "GetEnvironmentVariable\\s*\\(.{0,30}TEMP"
  - id: use-shell-execute-false
    desc: UseShellExecute disabled for stealth
    crit: component
    conf: 0.75
    if:
      type: text
      substr: "UseShellExecute = false"
  - id: kingspy-wudfhost-payload-url
    desc: Kingspy WUDFHost payload URL
    crit: suspicious
    conf: 0.99
    for: [pe]
    if:
      type: text
      exact: http://dosya.kingspy.info/WUDFhost.exe
  - id: relative-taskhost-drop-path
    desc: Relative taskhost drop path
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: text
      exact: \taskhost.exe
  - id: dotnet-getenvironmentvariable-token
    desc: .NET environment variable token
    crit: component
    conf: 0.75
    for: [pe]
    if:
      type: text
      exact: GetEnvironmentVariable
  - id: raw-github-svchost-zowner-url
    desc: GitHub raw svchost.zowner stage URL
    crit: suspicious
    conf: 0.99
    for: [pe]
    if:
      type: text
      exact: https://raw.githubusercontent.com/inqcode/skq12kjj3jj1/main/svchost.zowner
  - id: svchost-zowner-stage-name
    desc: svchost.zowner stage filename
    crit: suspicious
    conf: 0.95
    for: [pe]
    if:
      type: text
      word: svchost.zowner
  - id: processstartinfo-exec-token
    desc: ProcessStartInfo execution token
    crit: component
    conf: 0.9
    for: [pe]
    if:
      type: text
      word: ProcessStartInfo
composite_rules:
  - id: download-execute-csharp
    desc: Download and execute remote payload
    crit: hostile
    conf: 0.94
    all:
      - id: webclient-downloadfile
    any:
      - id: process-start-downloaded
      - id: temp-path-download
      - id: use-shell-execute-false
    needs: 2
  - id: dotnet-kingspy-download-execute
    desc: .NET Kingspy download and execute
    crit: hostile
    conf: 0.99
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: kingspy-wudfhost-payload-url
      - id: micro-behaviors/communications/http/client/managed::webclient
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-split-tokens
    any:
      - id: relative-taskhost-drop-path
      - id: dotnet-getenvironmentvariable-token
      - id: micro-behaviors/data/compress/library::dotnet-gzip-compression
  - id: dotnet-github-httpclient-download-exec
    desc: .NET GitHub raw downloader drops and runs stage
    crit: hostile
    conf: 0.99
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::httpclient-bytearray-download
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: processstartinfo-exec-token
    any:
      - id: raw-github-svchost-zowner-url
      - id: svchost-zowner-stage-name
      - id: objectives/command-and-control/channel/deaddrop/github::raw-githubusercontent-url
      - id: objectives/evasion/masquerade/process/name::svchost-name
    needs: 2
  - id: dotnet-downloaddata-writeallbytes-shell
    desc: .NET downloads bytes, writes executable, and shells it
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/client/managed::downloaddata
      - id: micro-behaviors/fs/write/file/direct::writeallbytes-any
      - id: micro-behaviors/process/create/vb-shell::interaction-shell
  - id: dotnet-downloadfile-execute-chain
    desc: .NET DownloadFile then Process.Start
    crit: suspicious
    conf: 0.92
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-split-tokens
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/ai::openai-dotnet-official-library
      - id: well-known/app/windows-desktop-tools::steamtools-member
  - id: dotnet-downloadfile-response-chain
    desc: .NET DownloadFile with HTTP response
    crit: suspicious
    conf: 0.9
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: micro-behaviors/communications/http/client/managed::getresponse
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/ai::openai-dotnet-official-library
  - id: dotnet-downloadfile-temp-execute
    desc: .NET downloads file to temp and executes it
    crit: hostile
    conf: 0.96
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-split-tokens
    any:
      - id: micro-behaviors/fs/path/temp::dotnet-gettempfilename-token
      - id: micro-behaviors/fs/write/file/direct::dotnet-writealltext-token
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
      - id: micro-behaviors/communications/http/client/managed::getresponse
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/ai::openai-dotnet-official-library
  - id: dotnet-webclient-write-execute
    desc: .NET WebClient write and execute chain
    crit: hostile
    conf: 0.95
    for: [pe]
    all:
      - id: micro-behaviors/communications/http/client/managed::request
      - id: micro-behaviors/process/create/spawn::dotnet-process-start-split-tokens
    any:
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: micro-behaviors/communications/http/client/managed::downloaddata
      - id: micro-behaviors/fs/write/file/direct::dotnet-writealltext-token
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/library/ai::openai-dotnet-official-library
  - id: dotnet-downloadstring-encoded-file-stage
    desc: .NET downloads and writes encoded compressed stage
    crit: hostile
    conf: 0.98
    attack: "T1105,T1140"
    for: [pe]
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: micro-behaviors/communications/http/client/managed::downloadstring
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
      - id: micro-behaviors/data/compress/library::gzipstream-dotnet
      - id: micro-behaviors/fs/write/file/direct::dotnet-writeallbytes-token
    unless:
      - id: metadata/signed/platform/
