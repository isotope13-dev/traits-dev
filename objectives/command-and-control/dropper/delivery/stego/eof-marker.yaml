defaults:
  platforms: [unix, windows]
  for: [media, scripts]
  attack: T1027.003
  mbc: E1027.m02
traits:
- id: marker-after-image-eof
  desc: Payload marker after image EOF
  crit: suspicious
  conf: 0.92
  if:
    type: raw
    regex: '(?s)\xFF\xD9.{0,4096}(IN-/-in1|INICIO)'
- id: vt-tail-marker
  desc: VT tail marker string
  crit: suspicious
  conf: 0.9
  if:
    type: raw
    regex: '(Qq)?VT-in1'
- id: textual-stego-tail-marker
  desc: Stego tail marker string
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\b(IN-/-in1|INICIO)\b'
- id: reversed-pe-base64-marker
  desc: Reversed PE base64 marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: VFZA
composite_rules:
- id: appended-image-payload-marker
  desc: Image with appended payload markers
  crit: hostile
  conf: 0.96
  all:
  - id: marker-after-image-eof
  any:
  - id: reversed-pe-base64-marker
  - id: vt-tail-marker
  - id: objectives/command-and-control/dropper/staging/embedded::frombase64string
  - id: objectives/command-and-control/dropper/delivery/http::cloud-image-stager
- id: jpeg-appended-vt-tail-carrier
  desc: JPEG carrier with appended VT tail marker
  crit: hostile
  conf: 0.96
  all:
  - id: objectives/anti-static/obfuscation/steganography::jpeg-appended-data
  - id: vt-tail-marker
- id: text-described-stego-payload
  desc: Scripted image stego payload extraction
  crit: hostile
  conf: 0.9
  all:
  - id: textual-stego-tail-marker
  - id: reversed-pe-base64-marker
  any:
  - id: objectives/command-and-control/dropper/staging/embedded::frombase64string
  - id: micro-behaviors/data/decode/base64/
  - id: objectives/anti-static/obfuscation/encoding/
- id: cloud-image-pe-lolbin-stager
  desc: Cloud image PE LOLBin stager
  crit: hostile
  conf: 0.96
  all:
  - id: objectives/command-and-control/dropper/delivery/http::cloud-image-stager
  - id: objectives/anti-static/obfuscation/payload/encoded::base64-pe-header
  any:
  - id: objectives/execution/lolbin/os::mshta-execution
  - id: objectives/execution/interpreter/eval/invoke::iex
