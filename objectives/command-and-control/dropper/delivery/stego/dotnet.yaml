defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: dotnet-bitmap-aes-dropper
    desc: "Steganography Dropper (Bitmap + AES + Download)"
    crit: hostile
    conf: 0.9
    mbc: "B0027"
    attack: "T1027.003"
    all:
      - id: micro-behaviors/data/encode/image/pixel::pixel-access
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-rijndael
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
    any:
      - id: micro-behaviors/communications/http/client/
    unless:
      - id: objectives/anti-static/obfuscation/obfuscator/managed/
