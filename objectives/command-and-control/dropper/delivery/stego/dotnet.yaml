defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: dotnet-bitmap-aes-dropper
    desc: "Steganography Dropper (Bitmap + AES + Download)"
    crit: hostile
    conf: 0.9
    mbc: "B0027"
    attack: "T1027.003"
    all:
      - id: micro-behaviors/data/encode/image::pixel-access
      - id: micro-behaviors/crypto/symmetric/aes::dotnet-rijndael
      - id: objectives/command-and-control/dropper/staging/embedded::frombase64string
    any:
      - id: micro-behaviors/communications/http/client/
