defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: acquire-image-bytes
    desc: AcquireImageBytes method (stego extraction)
    crit: suspicious
    conf: 0.95
    attack: T1027.003
    if:
      type: string_value
      substr: AcquireImageBytes
  - id: system-drawing-bitmap
    desc: System.Drawing.Bitmap class reference
    crit: component
    conf: 0.6
    if:
      type: string_value
      substr: System.Drawing.Bitmap
composite_rules:
  - id: dotnet-stego-loader
    desc: .NET steganography payload loader
    crit: hostile
    conf: 0.95
    attack: T1027.003
    mbc: E1027.m02
    all:
      - id: micro-behaviors/data/encode/image::pixel-access
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
    unless:
      - id: metadata/format::large-executable
  - id: dotnet-stego-acquire
    desc: .NET steganography byte extraction
    crit: suspicious
    conf: 0.92
    attack: T1027.003
    all:
      - id: acquire-image-bytes
    any:
      - id: micro-behaviors/data/encode/image::pixel-access-getpixel
      - id: system-drawing-bitmap
