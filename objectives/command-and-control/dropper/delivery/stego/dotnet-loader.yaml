defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: acquire-image-bytes
    desc: AcquireImageBytes method (stego extraction)
    crit: suspicious
    conf: 0.95
    attack: T1027.003
    if:
      type: text
      substr: AcquireImageBytes
  - id: harvest-image-data-method
    desc: HarvestImageData stego extraction method
    crit: suspicious
    conf: 0.96
    attack: T1027.003
    if:
      type: text
      substr: HarvestImageData
  - id: system-drawing-bitmap
    desc: System.Drawing.Bitmap class reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: System.Drawing.Bitmap
  - id: sbytetypein-resource-accessor
    desc: SByteTypeIn resource accessor
    crit: suspicious
    conf: 0.98
    attack: T1027.003
    if:
      type: text
      exact: get_SByteTypeIn
  - id: sbytetypein-resource-key-hex
    desc: Hex-encoded SByteTypeIn key
    crit: component
    conf: 0.99
    attack: T1027.003
    if:
      type: text
      exact: "534279746554797065496E"
  - id: stego-secondary-key-hex
    desc: Hex-encoded stego key
    crit: component
    conf: 0.98
    attack: T1027.003
    if:
      type: text
      exact: "3556777067494B55"
composite_rules:
  - id: dotnet-stego-loader
    desc: .NET bitmap/resource steganography indicators
    crit: suspicious
    conf: 0.82
    attack: T1027.003
    mbc: E1027.m02
    all:
      - id: micro-behaviors/data/encode/image::pixel-access
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
      - id: sbytetypein-resource-accessor
      - id: sbytetypein-resource-key-hex
    unless:
      - id: metadata/binary/metrics/size::large-file-1mb
      - id: metadata/signed/platform::microsoft
  - id: dotnet-stego-acquire
    desc: .NET steganography byte extraction
    crit: suspicious
    conf: 0.92
    attack: T1027.003
    all:
      - id: acquire-image-bytes
    any:
      - id: micro-behaviors/data/encode/image::pixel-access-getpixel
      - id: system-drawing-bitmap
  - id: dotnet-harvestimage-pixel-extract
    desc: .NET pixel harvest byte extraction
    crit: suspicious
    conf: 0.94
    attack: T1027.003
    all:
      - id: harvest-image-data-method
      - id: micro-behaviors/data/encode/image::pixel-access-getpixel
      - id: system-drawing-bitmap
  - id: dotnet-stego-resource-reflection-loader
    desc: .NET bitmap stego reflection loader
    crit: hostile
    conf: 0.98
    attack: T1027.003
    mbc: E1027.m02
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/embedded/payload/image::dotnet-resource-bitmap-pixel-readback
      - id: harvest-image-data-method
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-token
      - id: objectives/anti-static/obfuscation/reflection/invoke::get-exported-types-token
      - id: objectives/anti-static/obfuscation/reflection/invoke::appdomain-getdomain-token
    needs: 3
  - id: dotnet-stego-keyed-resource-loader
    desc: .NET keyed stego resource loader
    crit: hostile
    conf: 0.99
    attack: T1027.003
    mbc: E1027.m02
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/encode/image::pixel-access-getpixel
      - id: sbytetypein-resource-accessor
    any:
      - id: sbytetypein-resource-key-hex
      - id: stego-secondary-key-hex
      - id: objectives/evasion/process/hidden/execution::dotnet-hidden-process-launch
      - id: micro-behaviors/process/create/spawn::dotnet-redirected-stdio
      - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
      - id: micro-behaviors/hardware/display/screen::gdi-window-capture-primitives
    needs: 2
    unless:
      - id: metadata/binary/metrics/size::large-file-1mb
  - id: dotnet-stego-surveillance-loader
    desc: .NET stego loader with surveillance APIs
    crit: hostile
    conf: 0.98
    attack: T1027.003
    mbc: E1027.m02
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: micro-behaviors/data/encode/image::pixel-access-getpixel
      - id: sbytetypein-resource-accessor
    any:
      - id: micro-behaviors/hardware/input/keyboard/hook::windows-hook-lifecycle
      - id: micro-behaviors/hardware/display/screen::gdi-window-capture-primitives
      - id: micro-behaviors/process/create/spawn::dotnet-redirected-stdio
    needs: 2
    unless:
      - id: metadata/binary/metrics/size::large-file-1mb
