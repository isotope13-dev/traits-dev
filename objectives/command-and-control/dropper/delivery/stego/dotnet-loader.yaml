defaults:
  platforms:
    - windows
  for:
    - pe
traits:
  - id: createinstanceandunwrap
    desc: AppDomain CreateInstanceAndUnwrap token
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: CreateInstanceAndUnwrap
  - id: assemblyresolve-hook-token
    desc: AssemblyResolve event hook token
    crit: notable
    conf: 0.9
    if:
      type: text
      exact: add_AssemblyResolve
    unless:
      - id: objectives/anti-static/pack/entropy::dotnet-costura-compressed-resource
  - id: marshalbyrefobject-proxy
    desc: MarshalByRefObject proxy type
    crit: component
    conf: 0.88
    if:
      type: text
      exact: MarshalByRefObject
  - id: runtimehelpers-initarray
    desc: RuntimeHelpers InitializeArray token
    crit: component
    conf: 0.9
    if:
      type: text
      exact: InitializeArray
  - id: privateimpldetails
    desc: PrivateImplementationDetails storage type
    crit: component
    conf: 0.88
    if:
      type: text
      exact: <PrivateImplementationDetails>
  - id: loader-name-incarcator
    desc: Incarcator loader class marker
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: Incarcator
  - id: sequential-guid-resource-stem
    desc: Sequential GUID-like resource stem
    crit: component
    conf: 0.92
    count_min: 4
    if:
      type: text
      regex: ^e08b1044-4b71-69[0-5]$
  - id: acquire-image-bytes
    desc: AcquireImageBytes method (stego extraction)
    crit: suspicious
    conf: 0.95
    attack: T1027.003
    if:
      type: text
      substr: AcquireImageBytes
  - id: system-drawing-bitmap
    desc: System.Drawing.Bitmap class reference
    crit: component
    conf: 0.6
    if:
      type: text
      substr: System.Drawing.Bitmap
composite_rules:
  - id: dotnet-png-guid-resource-loader
    desc: .NET loader with chunked PNG resources
    crit: suspicious
    conf: 0.96
    attack: T1027.003
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/resource::chunked-png-payloads-in-text
      - id: system-drawing-bitmap
    any:
      - id: sequential-guid-resource-stem
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcereader
      - id: runtimehelpers-initarray
      - id: privateimpldetails
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/developer
  - id: dotnet-stego-appdomain-loader
    desc: .NET stego AppDomain loader
    crit: hostile
    conf: 0.99
    attack: T1027.003
    mbc: E1059
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/symbols::single-import-raw
      - id: metadata/binary/resource::chunked-png-payloads-in-text
      - id: micro-behaviors/data/embedded/payload::dotnet-resourcereader
      - id: system-drawing-bitmap
      - id: createinstanceandunwrap
      - id: assemblyresolve-hook-token
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::appdomain-currentdomain
      - id: objectives/anti-static/obfuscation/reflection/invoke::get-entrypoint
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-methodbase-token
      - id: marshalbyrefobject-proxy
      - id: loader-name-incarcator
      - id: sequential-guid-resource-stem
    needs: 4
  - id: dotnet-stego-loader
    desc: .NET steganography payload loader
    crit: hostile
    conf: 0.95
    attack: T1027.003
    mbc: E1027.m02
    all:
      - id: micro-behaviors/data/encode/image::pixel-access
    any:
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-reflection
    unless:
      - id: metadata/binary/metrics::large-executable
  - id: dotnet-stego-acquire
    desc: .NET steganography byte extraction
    crit: suspicious
    conf: 0.92
    attack: T1027.003
    all:
      - id: acquire-image-bytes
    any:
      - id: micro-behaviors/data/encode/image::pixel-access-getpixel
      - id: system-drawing-bitmap
