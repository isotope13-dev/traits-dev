defaults:
  platforms: [windows]
  for: [pe, javascript]
  attack: T1105

traits:
  - id: bun-loader-report-endpoint
    desc: Bun loader report endpoint
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(/|%2f)api(/|%2f)report\b'
  - id: bun-loader-status-endpoint
    desc: Bun loader status endpoint
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(/|%2f)api(/|%2f)status\b'
  - id: bun-loader-update-endpoint
    desc: Bun loader update endpoint
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(/|%2f)api(/|%2f)update\b'
  - id: bun-loader-build-id
    desc: Bun loader build identifier
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bBUILD_ID\b|build[_-]?id'
  - id: bun-loader-aes-cbc
    desc: Bun loader AES CBC marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)AES-?256-?CBC|aes-256-cbc'
  - id: bun-loader-silent-harvester-domain
    desc: Bun loader silent harvester domain
    crit: component
    conf: 0.99
    if:
      type: text
      regex: '(?i)\bsilent-harvester\.cc\b'
  - id: bun-loader-silent-orbit-domain
    desc: Bun loader silent orbit domain
    crit: component
    conf: 0.99
    if:
      type: text
      regex: '(?i)\bsilent-orbit\.cc\b'
  - id: bun-loader-support-onion-domain
    desc: Bun loader support onion domain
    crit: component
    conf: 0.99
    if:
      type: text
      regex: '(?i)\bsupport-onion\.club\b'
  - id: nwhstealer-cosmic-nebula-domain
    desc: NWHStealer cosmic nebula domain
    crit: component
    conf: 0.99
    if:
      type: text
      regex: '(?i)\bcosmic-nebula\.cc\b'
  - id: nwhstealer-whale-ether-domain
    desc: NWHStealer whale ether domain
    crit: component
    conf: 0.99
    if:
      type: text
      regex: '(?i)\bwhale-ether\.pro\b'

composite_rules:
  - id: bun-loader-api-protocol
    desc: Bun loader report status update protocol
    crit: suspicious
    conf: 0.96
    all:
      - id: bun-loader-report-endpoint
      - id: bun-loader-status-endpoint
      - id: bun-loader-update-endpoint
    any:
      - id: bun-loader-build-id
      - id: micro-behaviors/communications/http/ip-discovery::ipify-api
      - id: bun-loader-aes-cbc
  - id: nwh-bun-loader-c2-profile
    desc: NWHStealer Bun loader C2 profile
    crit: hostile
    conf: 0.98
    all:
      - id: bun-loader-api-protocol
    any:
      - id: bun-loader-silent-harvester-domain
      - id: bun-loader-silent-orbit-domain
      - id: bun-loader-support-onion-domain
      - id: nwhstealer-cosmic-nebula-domain
      - id: nwhstealer-whale-ether-domain
