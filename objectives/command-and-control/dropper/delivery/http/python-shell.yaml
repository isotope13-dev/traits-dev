# Python Shell Dropper Patterns
# ATT&CK: T1105 (Ingress Tool Transfer)
# MBC: B0024 (Dropper)
defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  for: [python, pyc]
  mbc: "B0024"
  attack: "T1105"
composite_rules:
  - id: python-shell-dropper
    desc: "Inline Python download and execute pattern"
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/lang::python-c-flag
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/process/interpreter/python::exec-builtin
