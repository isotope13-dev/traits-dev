# Python Shell Dropper Patterns
# ATT&CK: T1105 (Ingress Tool Transfer)
# MBC: B0024 (Dropper)
defaults:
  platforms: [unix, windows]
  for: [python, pyc]
  mbc: "B0024"
  attack: "T1105"
composite_rules:
  - id: python-shell-dropper
    desc: "Inline Python download and execute pattern"
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell::python-c-flag
      - id: micro-behaviors/process/create/shell::python-inline-urlopen
      - id: micro-behaviors/process/create/shell::python-inline-exec
