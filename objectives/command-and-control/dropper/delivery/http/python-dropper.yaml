defaults:
  platforms: [windows, unix]
  for:
    - python
  mbc: B0024
  attack: T1105
traits:
  - id: download-and-execute-func-1
    desc: download_and_execute function (snake_case)
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      substr: download_and_execute
  - id: download-and-execute-func-2
    desc: download_execute function (snake_case)
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      # Anchor the trailing boundary so this matches download_execute /
      # download_execute_payload but NOT download_executer / download_executor
      # (a benign "download executor" dispatch function, common in launchers).
      regex: 'download_execute([^a-zA-Z]|$)'
  - id: download-and-execute-func-3
    desc: downloadAndExecute function (camelCase)
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      substr: downloadAndExecute
  - id: download-and-execute-func-4
    desc: downloadExecute function (camelCase)
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      # Trailing boundary excludes downloadExecuter / downloadExecutor.
      regex: 'downloadExecute([^a-zA-Z]|$)'
  - id: is-process-running-func-1
    desc: is_process_running function (snake_case)
    crit: component
    conf: 0.85
    if:
      type: function
      substr: is_process_running
  - id: is-process-running-func-2
    desc: isProcessRunning function (camelCase)
    crit: component
    conf: 0.85
    if:
      type: function
      substr: isProcessRunning
  - id: is-process-running-func-3
    desc: check_if_running function
    crit: component
    conf: 0.85
    if:
      type: function
      substr: check_if_running
  - id: is-process-running-func-4
    desc: process_running function
    crit: component
    conf: 0.85
    if:
      type: function
      substr: process_running
  - id: kill-process-md5
    desc: MD5-based process termination
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: kill_process.{0,30}md5|md5.{0,30}kill.{0,30}process
  - id: kill-process-mismatch
    desc: Kill process if mismatch
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      regex: kill.{0,20}if.{0,20}mismatch|mismatch.{0,20}kill
    unless:
      - id: well-known/tool/detection/
  - id: platform-architecture-check
    desc: Platform architecture check
    crit: component
    conf: 0.85
    if:
      type: symbol
      kind: call
      regex: '(^|\.)architecture$'
  - id: arch-64bit-check
    desc: 64-bit architecture check
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: 64bit
    unless:
    - id: well-known/tool/detection/malware-config-parser
  - id: multi-persist-dirs
    desc: Multiple persistence directories
    crit: component
    conf: 0.9
    if:
      type: text
      regex: /tmp.{0,50}/var/tmp|/var/tmp.{0,50}/dev/shm|/tmp.{0,50}/dev/shm
    unless:
      - type: basename
        regex: ^tempfile\.py$
      - id: metadata/lang/javascript-features::sourcemap-sources-content
  - id: http-ip-port-url
    desc: HTTP URL with IP:port
    crit: component
    conf: 0.85
    if:
      type: string_literal
      regex: http://[0-9]+(\.[0-9]+){3}:[0-9]+(/[^\s'"<>{}]{0,200})?
      is: external_ip
    not:
      - regex: /thumb\b
      - substr: http://192.99.219.222:82
    unless:
      - type: text
        regex: pytest|def test_|def test[A-Z]|unittest\.TestCase
      - id: metadata/package/testing/presence/harness/
      - id: micro-behaviors/crypto/library/blockchain/
  - id: bin-endpoint-path
    desc: Binary download endpoint path
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: http.{0,60}/bin($|"|\')
composite_rules:
  - id: download-and-execute-func
    desc: download_and_execute function patterns
    crit: suspicious
    conf: 0.9
    any:
      - id: download-and-execute-func-1
      - id: download-and-execute-func-2
      - id: download-and-execute-func-3
      - id: download-and-execute-func-4
  - id: is-process-running-func
    desc: is_process_running function patterns
    crit: component
    conf: 0.85
    any:
      - id: is-process-running-func-1
      - id: is-process-running-func-2
      - id: is-process-running-func-3
      - id: is-process-running-func-4
  - id: anti-duplicate-infection
    desc: Anti-duplicate infection pattern
    crit: suspicious
    conf: 0.9
    any:
      - id: kill-process-md5
      - id: kill-process-mismatch
  - id: arch-payload-selection
    desc: Architecture-based payload selection
    crit: suspicious
    conf: 0.85
    all:
      - id: platform-architecture-check
      - id: arch-64bit-check
    any:
      - id: http-ip-port-url
      - id: download-and-execute-func
