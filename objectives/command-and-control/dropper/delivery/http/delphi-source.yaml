# Delphi/Pascal source that serves a copy of itself over HTTP.
defaults:
  for: [c]
  platforms: [windows]
  attack: T1105
  mbc: B0024

traits:
  - id: delphi-http-copy-paramstr0
    desc: Delphi HTTP server copies own executable
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "CopyFile(pChar(ParamStr(0)), pChar(FileName), False);"
  - id: delphi-http-jpg-exe-lure
    desc: Delphi HTTP image-extension executable lure
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "FileName := FileName + '.jpg.exe';"
  - id: delphi-http-download-content-type
    desc: HTTP executable download content type
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "ContentType := 'application/x-msdownload'"
  - id: delphi-http-meta-refresh-selfcopy
    desc: Meta-refresh redirects to self-copy
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "Write(F, '<meta http-equiv=''refresh'' content=''0;url='+FileName+'''>');"
  - id: delphi-http-threaded-listener
    desc: Threaded Winsock HTTP listener
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "CreateThread(NIL, 0, @ReadSock, @SocketData"

composite_rules:
  - id: delphi-http-selfcopy-exe-delivery
    desc: Delphi HTTP self-copy executable delivery
    crit: hostile
    conf: 0.97
    all:
      - id: delphi-http-copy-paramstr0
      - id: delphi-http-jpg-exe-lure
      - id: delphi-http-download-content-type
    any:
      - id: delphi-http-meta-refresh-selfcopy
      - id: delphi-http-threaded-listener
