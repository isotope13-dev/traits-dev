defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1105
  mbc: B0024
composite_rules:
  - id: python-c2-xor-download-exec
    desc: Downloads XOR-encoded payload from IP and executes
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/command-and-control/dropper/delivery/http::http-ip-port-url
      - id: micro-behaviors/data/encode/xor::xor-decoding-loop
    any:
      - id: micro-behaviors/process/create/subprocess::popen-content
      - id: micro-behaviors/process/create/subprocess::sys-executable-popen
      - id: micro-behaviors/process/interpreter/python::exec-builtin
    unless:
      - id: metadata/package/quality/profile::has-tests
