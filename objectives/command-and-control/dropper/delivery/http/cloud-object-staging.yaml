defaults:
  platforms: [unix, windows]
  for: [scripts, documents]
  attack: T1105
  mbc: B0024
traits:
- id: aliyun-oss-object-url
  desc: Alibaba OSS object URL
  crit: baseline
  conf: 0.85
  if:
    type: text
    regex: '(?i)https?://[A-Za-z0-9._-]+\.oss-[A-Za-z0-9-]+\.aliyuncs\.com/[A-Za-z0-9._~/-]+'
- id: suspicious-cloud-image-object--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: storage.googleapis.com
    case_insensitive: true
- id: suspicious-cloud-image-object--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: blob.core.windows.net
    case_insensitive: true
- id: suspicious-cloud-image-object--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: amazonaws.com
    case_insensitive: true
- id: suspicious-cloud-image-object--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: aliyuncs.com
    case_insensitive: true
- id: suspicious-cloud-image-object--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: webp
    case_insensitive: true
- id: short-numeric-image-object
  desc: Short numeric image object name
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)/[0-9]{4,8}\.(?:png|jpe?g|gif|webp)\b'
composite_rules:
- id: aliyun-cloud-image-stager
  desc: Alibaba OSS image object staging
  crit: suspicious
  conf: 0.9
  all:
  - id: aliyun-oss-object-url
  - id: suspicious-cloud-image-object
  any:
  - id: short-numeric-image-object
  - id: objectives/command-and-control/dropper/delivery/stego::marker-after-image-eof
  - id: objectives/command-and-control/dropper/delivery/stego::reversed-pe-base64-marker
  needs: 1
- id: cloud-image-stager
  desc: Cloud image object used for staging
  crit: suspicious
  conf: 0.9
  all:
  - id: suspicious-cloud-image-object
  any:
  - id: short-numeric-image-object
  - id: objectives/command-and-control/dropper/delivery/stego::marker-after-image-eof
  - id: objectives/command-and-control/dropper/delivery/stego::reversed-pe-base64-marker
  needs: 1
- id: suspicious-cloud-image-object
  desc: Cloud-hosted image object
  crit: component
  conf: 0.86
  any:
  - id: suspicious-cloud-image-object--rx-1
  - id: suspicious-cloud-image-object--rx-2
  - id: suspicious-cloud-image-object--rx-3
  - id: suspicious-cloud-image-object--rx-4
  - id: suspicious-cloud-image-object--rx-5
  needs: 1
