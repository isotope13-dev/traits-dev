defaults:
  platforms: [unix, windows]
  for: [scripts, documents]
  attack: T1105
  mbc: B0024
traits:
  - id: aliyun-oss-object-url
    desc: Alibaba OSS object URL
    crit: component
    conf: 0.85
    if:
      type: text
      regex: '(?i)https?://[A-Za-z0-9._-]+\.oss-[A-Za-z0-9-]+\.aliyuncs\.com/[A-Za-z0-9._~/-]+'
  - id: suspicious-cloud-image-object
    desc: Cloud-hosted image staging object
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '(?i)https?://[A-Za-z0-9._-]+\.(?:oss-[A-Za-z0-9-]+\.aliyuncs\.com|s3[.-][A-Za-z0-9-]+\.amazonaws\.com|blob\.core\.windows\.net|storage\.googleapis\.com)/[A-Za-z0-9._~/-]+\.(?:png|jpe?g|gif|webp)\b'
  - id: short-numeric-image-object
    desc: Short numeric image object name
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '(?i)/[0-9]{4,8}\.(?:png|jpe?g|gif|webp)\b'
composite_rules:
  - id: cloud-image-stager
    desc: Cloud image object used for staging
    crit: suspicious
    conf: 0.9
    all:
      - id: suspicious-cloud-image-object
    any:
      - id: aliyun-oss-object-url
      - id: short-numeric-image-object
      - id: objectives/command-and-control/dropper/delivery/stego::marker-after-image-eof
      - id: objectives/command-and-control/dropper/delivery/stego::reversed-pe-base64-marker
    needs: 1
