defaults:
  platforms: [unix, windows]
  for: [scripts, html]
  attack: T1105
  mbc: B0024
traits:
# aliyun-oss-object-url relocated to
# micro-behaviors/communications/http/endpoints::aliyun-oss-object-url — a bare
# Aliyun OSS URL is a neutral cloud-storage endpoint; the stego-staging
# composite references it cross-tier.
- id: suspicious-cloud-image-object--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: storage.googleapis.com
    case_insensitive: true
  count_max: 1006953
- id: suspicious-cloud-image-object--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: blob.core.windows.net
    case_insensitive: true
  count_max: 1006954
- id: suspicious-cloud-image-object--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: aliyuncs.com
    case_insensitive: true
  count_max: 1006956
- id: short-numeric-image-object
  desc: Short numeric image object name
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)/[0-9]{4,8}\.(png|jpe?g|gif|webp)\b'
composite_rules:
- id: aliyun-cloud-image-stager
  desc: Alibaba OSS image object staging
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/communications/http/endpoints::aliyun-oss-object-url
  - id: suspicious-cloud-image-object
  any:
  - id: short-numeric-image-object
  - id: objectives/command-and-control/dropper/delivery/stego::marker-after-image-eof
  - id: objectives/command-and-control/dropper/delivery/stego::reversed-pe-base64-marker
- id: cloud-image-stager
  desc: Cloud image object used for staging
  crit: suspicious
  conf: 0.9
  all:
  - id: suspicious-cloud-image-object
  any:
  - id: objectives/command-and-control/dropper/delivery/stego::marker-after-image-eof
  - id: objectives/command-and-control/dropper/delivery/stego::reversed-pe-base64-marker
- id: suspicious-cloud-image-object
  desc: Cloud-hosted image object
  crit: component
  conf: 0.86
  any:
  - id: suspicious-cloud-image-object--rx-1
  - id: suspicious-cloud-image-object--rx-2
  - id: micro-behaviors/communications/http/endpoints::aws-api-endpoint
  - id: suspicious-cloud-image-object--rx-4
