# Blockchain-Staged Payload Delivery
# Detects retrieval of payloads from blockchain explorers or smart contracts.
# ATT&CK: T1105 (Ingress Tool Transfer)
defaults:
  platforms: [windows, unix]
  for: [javascript, python, shell]
traits:
  - id: blockchain-explorer-link
    desc: References a blockchain explorer API or page
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)(tronscan\.org|bscscan\.com|etherscan\.io|polygonscan\.com|solscan\.io|aptoslabs\.com|trongrid\.io|api\.blockcypher\.com|etherscan-api|bscscan-api)'

composite_rules:
  - id: blockchain-payload-execution
    desc: Executes blockchain-retrieved data
    crit: hostile
    conf: 0.9
    all:
      - id: blockchain-explorer-link
    any:
      - id: objectives/execution/interpreter/eval
      - id: objectives/execution/lolbin
      - id: micro-behaviors/process/create/shell
  - id: blockchain-staged-delivery
    desc: Payload delivered via blockchain infrastructure
    crit: hostile
    conf: 0.95
    all:
      - id: blockchain-explorer-link
    any:
      - id: blockchain-payload-execution
