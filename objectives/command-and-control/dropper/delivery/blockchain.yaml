# Blockchain-Staged Payload Delivery
# Detects retrieval of payloads from blockchain explorers or smart contracts.
# ATT&CK: T1105 (Ingress Tool Transfer)
defaults:
  platforms: [windows, unix]
  for: [javascript, python, shell]
traits:
  - id: blockchain-explorer-link
    desc: Blockchain explorer endpoint or page reference
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '(?i)(tronscan\.org|bscscan\.com|etherscan\.io|polygonscan\.com|solscan\.io|aptoslabs\.com|trongrid\.io|api\.blockcypher\.com|etherscan-api|bscscan-api)'

composite_rules:
  - id: blockchain-payload-execution
    desc: Executes blockchain explorer response data
    crit: hostile
    conf: 0.9
    all:
      - id: blockchain-explorer-link
    any:
      - id: objectives/command-and-control/dropper/delivery::checked-json-message-base64-exec
      - id: objectives/command-and-control/dropper/delivery::fetch-atob-json-eval-loader
      - id: objectives/command-and-control/dropper/delivery::node-https-eval-loader
  - id: blockchain-staged-delivery
    desc: Staged payload delivery through blockchain infrastructure
    crit: hostile
    conf: 0.95
    all:
      - id: blockchain-explorer-link
    any:
      - id: blockchain-payload-execution
