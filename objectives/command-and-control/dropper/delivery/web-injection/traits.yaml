defaults:
  platforms: [windows, unix]
  attack: T1105

traits:
  - id: ndsw-guard-block
    desc: NDSW injected JavaScript guard block
    crit: suspicious
    conf: 0.96
    for: [source, html, text]
    if:
      type: text
      substr: if(ndsw===undefined)

  - id: ndsw-xhr-client
    desc: NDSW JavaScript XMLHttpRequest client
    crit: suspicious
    conf: 0.96
    for: [source, html, text]
    if:
      type: text
      regex: 'HttpClient=function[\s\S]{0,260}new XMLHttpRequest\('

  - id: ndsw-eval-response-callback
    desc: NDSW JavaScript response eval callback
    crit: suspicious
    conf: 0.96
    for: [source, html, text]
    if:
      type: text
      regex: 'function\(E\)[\s\S]{0,80}\beval\b'

  - id: ndsw-tokenized-eval-string
    desc: NDSW tokenized eval string
    crit: suspicious
    conf: 0.94
    for: [source, html, text]
    if:
      type: text
      substr: ",'eval',"

  - id: stat-js-clock-include
    desc: Injected stat.js clock loader
    crit: suspicious
    conf: 0.94
    for: [source, html, text]
    if:
      type: text
      regex: '<script[^>]{0,120}src=[''"]https?://.{1,160}/stat\.js\?v=clock[''"]'

  - id: travelfornamewalking-loader
    desc: Travelfornamewalking injected loader domain
    crit: suspicious
    conf: 0.98
    for: [source, html, text]
    if:
      type: text
      substr: travelfornamewalking.ga/stat.js?v=clock

composite_rules:
  - id: ndsw-web-injected-loader
    desc: NDSW injected web loader
    crit: hostile
    conf: 0.98
    all:
      - id: ndsw-guard-block
      - id: ndsw-xhr-client
    any:
      - id: ndsw-eval-response-callback
      - id: ndsw-tokenized-eval-string

  - id: stat-js-clock-web-injected-loader
    desc: Stat.js clock web injected loader
    crit: hostile
    conf: 0.97
    all:
      - id: stat-js-clock-include
      - id: travelfornamewalking-loader
