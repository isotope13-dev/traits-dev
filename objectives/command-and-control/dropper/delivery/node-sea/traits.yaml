# High-confidence Node SEA downloader chain
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105,T1140

composite_rules:
  - id: node-sea-download-extract-execute
    desc: Downloads extracts and launches an executable
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/download/handler::node-sea-archive-http-fetch
      - id: micro-behaviors/data/archive/extract/zip::node-sea-zip-reader
      - id: micro-behaviors/communications/http/download/handler::node-sea-executable-discovery
      - id: micro-behaviors/process/create/spawn::node-sea-executable-launch
