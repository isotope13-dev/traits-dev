defaults:
  platforms: [unix, windows]
  for: [github-actions]
  attack: T1059.004

traits:
- id: gha-golangci-pipe-installer
  desc: golangci-lint installer pipe
  crit: component
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: raw.githubusercontent.com/golangci/golangci-lint/
- id: gha-apm-pipe-installer
  desc: Microsoft APM installer pipe
  crit: component
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: raw.githubusercontent.com/microsoft/apm/
- id: gha-rustup-pipe-installer
  desc: rustup installer pipe
  crit: component
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: https://sh.rustup.rs
- id: gha-nodesource-pipe-installer
  desc: NodeSource installer pipe
  crit: component
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: https://deb.nodesource.com/setup_
- id: gha-anchore-grype-pipe-installer
  desc: Anchore Grype installer pipe
  crit: component
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: raw.githubusercontent.com/anchore/grype/main/install.sh
- id: gha-cargo-binstall-pipe-installer
  desc: cargo-binstall installer pipe
  crit: component
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh
- id: gha-chainloop-pipe-installer
  desc: Chainloop installer pipe
  crit: component
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: dl.chainloop.dev/cli/install.sh
- id: gha-dagger-pipe-installer
  desc: Dagger installer pipe
  crit: component
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: https://dl.dagger.io/dagger/install.sh
- id: gha-download-pipe-shell
  desc: Workflow download piped to shell
  crit: suspicious
  conf: 0.94
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: '\b(curl|wget)\b[^\n|]{0,200}\|\s*(bash|sh)\b'
  unless:
  - id: gha-known-benign-pipe-installer
  downgrade:
    any:
    - id: gha-anchore-grype-pipe-installer

composite_rules:
- id: gha-known-benign-pipe-installer
  desc: Known benign GitHub Actions pipe installer
  crit: component
  conf: 0.9
  any:
  - id: gha-golangci-pipe-installer
  - id: gha-apm-pipe-installer
  - id: gha-rustup-pipe-installer
  - id: gha-nodesource-pipe-installer
  - id: gha-cargo-binstall-pipe-installer
  - id: gha-chainloop-pipe-installer
  - id: gha-dagger-pipe-installer
