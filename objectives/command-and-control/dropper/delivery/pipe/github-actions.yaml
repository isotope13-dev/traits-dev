defaults:
  platforms: [unix, windows]
  for: [github-actions]
  attack: T1059.004

traits:
- id: gha-download-pipe-shell
  desc: Workflow download piped to shell
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '\b(curl|wget)\b[^\n|]{0,200}\|\s*(bash|sh)\b'
  not:
  - regex: '\bcurl\b[^\n|]{0,200}raw\.githubusercontent\.com/golangci/golangci-lint/[^\n|]{0,80}/install\.sh[^\n|]{0,200}\|\s*sh\b'
  - regex: '\bcurl\b[^\n|]{0,200}raw\.githubusercontent\.com/microsoft/apm/[^\n|]{0,80}/install\.sh[^\n|]{0,200}\|\s*bash\b'
