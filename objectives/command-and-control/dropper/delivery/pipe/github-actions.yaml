defaults:
  platforms: [unix, windows]
  for: [github-actions]
  attack: T1059.004

traits:
- id: gha-golangci-pipe-installer
  desc: golangci-lint installer pipe
  crit: notable
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: raw.githubusercontent.com/golangci/golangci-lint/
- id: gha-apm-pipe-installer
  desc: Microsoft APM installer pipe
  crit: notable
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: raw.githubusercontent.com/microsoft/apm/
- id: gha-rustup-pipe-installer
  desc: rustup installer pipe
  crit: notable
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: https://sh.rustup.rs
- id: gha-nodesource-pipe-installer
  desc: NodeSource installer pipe
  crit: notable
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: https://deb.nodesource.com/setup_
- id: gha-anchore-grype-pipe-installer
  desc: Anchore Grype installer pipe
  crit: notable
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: raw.githubusercontent.com/anchore/grype/main/install.sh
- id: gha-cargo-binstall-pipe-installer
  desc: cargo-binstall installer pipe
  crit: notable
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh
- id: gha-chainloop-pipe-installer
  desc: Chainloop installer pipe
  crit: notable
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: dl.chainloop.dev/cli/install.sh
- id: gha-dagger-pipe-installer
  desc: Dagger installer pipe
  crit: notable
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    substr: https://dl.dagger.io/dagger/install.sh
  # A getter/installer-named HOST (`get.*`, `install.*`, `setup.*`) whose root
  # URL is piped straight to a shell is the canonical toolchain-bootstrap idiom
  # (`curl -sSL https://get.haskellstack.org/ | sh`, get.rvm.io, get.docker.com).
  # `getter-script-pipe` in micro-behaviors only matches a getter-named *path*
  # ending in the pipe, so a bare host root with a trailing slash slips past it.
  # This recognizes that benign host-root shape so the C2/tamper composites
  # suppress (standalone) rather than flag every CI toolchain bootstrap.
- id: gha-curl-pipe-installer
  desc: curl getter-host root piped to shell
  crit: notable
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: 'curl\b[^|]{0,160}//(get|install|setup)[\w.-]*/?\s*\|\s*(bash|sh)\b'
- id: gha-wget-pipe-installer
  desc: wget getter-host root piped to shell
  crit: notable
  conf: 0.9
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: 'wget\b[^|]{0,160}//(get|install|setup)[\w.-]*/?\s*\|\s*(bash|sh)\b'
- id: gha-download-pipe-shell
  desc: Workflow download piped to shell
  crit: notable
  conf: 0.94
  if:
    type: value
    path: jobs.*.steps[*].run
    regex: '\b(curl|wget)\b[^\n|]{0,200}\|\s*(bash|sh)\b'
  unless:
  - id: objectives/command-and-control/dropper/delivery/pipe/
  # A conventionally-named install/get/setup script (or getter-host root) piped
  # to a shell is a toolchain bootstrap, not a dropper. Suppress the STANDALONE
  # finding — the hostile stager composites (gha-comment/issue/pr/head_ref) that
  # reference this trait still fire, because an atom's `unless:` does not
  # suppress its use as a composite leg; they supply the malicious co-signal
  # (untrusted GitHub input feeding the shell).
  - id: micro-behaviors/os/service/legitimate::install-script-pipe
  - id: micro-behaviors/os/service/legitimate::getter-script-pipe
  downgrade:
    any:
    - id: gha-anchore-grype-pipe-installer

composite_rules:
- id: gha-known-benign-pipe-installer
  desc: Known benign GitHub Actions pipe installer
  crit: notable
  conf: 0.9
  any:
  - id: gha-golangci-pipe-installer
  - id: gha-apm-pipe-installer
  - id: gha-rustup-pipe-installer
  - id: gha-nodesource-pipe-installer
  - id: gha-cargo-binstall-pipe-installer
  - id: gha-chainloop-pipe-installer
  - id: gha-dagger-pipe-installer
  - id: gha-curl-pipe-installer
  - id: gha-wget-pipe-installer
