  - id: curl-pipe-python
    desc: curl piped to python
    crit: suspicious
    conf: 0.75
    attack: T1059.006
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*python
    not:
      - substr: install.python-poetry.org
  - id: wget-pipe-python
    desc: wget piped to python
    crit: suspicious
    conf: 0.75
    attack: T1059.006
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*python
  - id: curl-pipe-perl
    desc: curl piped to perl
    crit: suspicious
    conf: 0.75
    attack: T1059.005
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*perl
  - id: wget-pipe-perl
    desc: wget piped to perl
    crit: suspicious
    conf: 0.75
    attack: T1059.005
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*perl
  - id: curl-pipe-node
    desc: curl piped to node
    crit: suspicious
    conf: 0.75
    attack: T1059.007
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*node
  - id: wget-pipe-node
    desc: wget piped to node
    crit: suspicious
    conf: 0.75
    attack: T1059.007
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*node
  - id: curl-pipe-ruby
    desc: curl piped to ruby
    crit: suspicious
    conf: 0.75
    attack: T1059
    if:
      type: text
