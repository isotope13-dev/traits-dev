composite_rules:
  - id: curl-pipe-interpreters
    desc: Curl piped to various interpreters
    any:
      - id: curl-pipe-sh
      - id: curl-pipe-shell-word
      - id: curl-pipe-zsh
      - id: curl-pipe-ksh
      - id: curl-pipe-dash
      - id: curl-pipe-python
      - id: curl-pipe-perl
      - id: curl-pipe-node
      - id: curl-pipe-ruby
  - id: wget-pipe-interpreters
    desc: Wget piped to various interpreters
    any:
      - id: wget-pipe-sh
      - id: wget-pipe-shell-word
      - id: wget-pipe-zsh
      - id: wget-pipe-ksh
      - id: wget-pipe-dash
      - id: wget-pipe-python
      - id: wget-pipe-perl
      - id: wget-pipe-node
      - id: wget-pipe-ruby
  - id: download-pipe-exec
    desc: Download piped to interpreter (dropper
    crit: suspicious
    conf: 0.9
    attack: T1059
    any:
      - id: curl-pipe-interpreters
      - id: wget-pipe-interpreters
  - id: curl-pipe-shell
    desc: Curl output piped to shell
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    any:
      - id: curl-pipe-sh
      - id: curl-pipe-shell-word
      - id: curl-pipe-zsh
      - id: curl-pipe-ksh
      - id: curl-pipe-dash
  - id: wget-pipe-shell
    desc: Wget output piped to shell
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    any:
      - id: wget-pipe-sh
      - id: wget-pipe-shell-word
      - id: wget-pipe-zsh
      - id: wget-pipe-ksh
      - id: wget-pipe-dash
