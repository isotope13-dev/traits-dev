defaults:
  platforms: [windows, linux, macos]
  for: [shell, python, javascript, ruby, perl, applescript]
traits:
  - id: curl-pipe-sh
    desc: curl piped to sh
    crit: notable
    conf: 0.7
    attack: T1059.004
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
      - id: metadata/library/structure::js-any-bundle-output
      - type: basename
        regex: '^(METADATA|PKG-INFO)$'
      - id: metadata/file/extension::markdown-file-basename
      - type: text
        substr: "Install this version of wasmer:"
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*sh\b
    not:
      - regex: curl\s+.{0,200}npmjs\.org/install\.sh.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}rustwasm\.github\.io/wasm-pack/installer/init\.sh.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}install\.fuel\.sh.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}install\.fuel\.network.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}golangci-lint\.run/install\.sh.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}raw\.githubusercontent\.com/golangci/golangci-lint/.{0,80}/install\.sh.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}aka\.ms/apm-unix.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}astral\.sh.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}ollama\.com.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}rustup\.rs.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}get\.docker\.com.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}get\.k3s\.io.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}tailscale\.com/install\.sh.{0,200}\|\s*sh\b
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::is-test
  - id: curl-pipe-bash
    desc: curl piped to bash
    crit: notable
    conf: 0.7
    attack: T1059.004
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
      - id: metadata/library/structure::js-any-bundle-output
      - type: basename
        regex: '^(METADATA|PKG-INFO)$'
      - id: metadata/file/extension::markdown-file-basename
      - type: text
        substr: "Install this version of wasmer:"
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*bash\b
    not:
      - regex: curl\s+.{0,200}npmjs\.org/install\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}deb\.nodesource\.com/.{0,80}\|\s*bash\b
      - regex: curl\s+.{0,200}rustwasm\.github\.io/wasm-pack/installer/init\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}install\.fuel\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}install\.fuel\.network.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}raw\.githubusercontent\.com/IceWhaleTech/get/main/update\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}raw\.githubusercontent\.com/microsoft/apm/.{0,80}/install\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}astral\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}ollama\.com.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}rustup\.rs.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}wasmtime\.dev/install\.sh.{0,200}\|\s*bash\b
      - substr: curl -fsSL https://bun.com/install | bash
      - regex: curl\s+.{0,200}raw\.githubusercontent\.com/different-ai/openwork/dev/apps/opencode-router/install\.sh.{0,200}\|\s*bash\b
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::is-test
  - id: curl-pipe-shell-word
    desc: curl piped to shell
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    unless:
      - id: metadata/library/structure::js-any-bundle-output
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*shell\b
  - id: curl-pipe-zsh
    desc: curl piped to zsh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*zsh\b
  - id: curl-pipe-ksh
    desc: curl piped to ksh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*ksh\b
  - id: curl-pipe-dash
    desc: curl piped to dash
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*dash\b
  - id: wget-pipe-sh
    desc: wget piped to sh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    unless:
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
      - type: basename
        regex: (?i)(^|[\\/!])(METADATA|PKG-INFO|README(\..*)?)$
      - id: metadata/package/fields/freeform::pkg-description-content-type-markdown
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*sh\b
    not:
      - substr: apt.u.doover.com/install.sh
  - id: wget-pipe-bash
    desc: wget piped to bash
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    unless:
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
      - type: basename
        regex: (?i)(^|[\\/!])(METADATA|PKG-INFO|README(\..*)?)$
      - id: metadata/package/fields/freeform::pkg-description-content-type-markdown
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*bash\b
    not:
      - substr: apt.u.doover.com/install.sh
      - substr: imagenetloader.torch
      - substr: pi.dk/3
  - id: wget-pipe-shell-word
    desc: wget piped to shell
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    unless:
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
      - type: basename
        regex: (?i)(^|[\\/!])(METADATA|PKG-INFO|README(\..*)?)$
      - id: metadata/package/fields/freeform::pkg-description-content-type-markdown
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*shell\b
    not:
      - substr: apt.u.doover.com/install.sh
  - id: wget-pipe-zsh
    desc: wget piped to zsh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*zsh\b
  - id: wget-pipe-ksh
    desc: wget piped to ksh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*ksh\b
  - id: wget-pipe-dash
    desc: wget piped to dash
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*dash\b
  - id: curl-pipe-python
    desc: curl piped to python
    crit: notable
    conf: 0.75
    attack: T1059.006
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*python
    unless:
      - type: text
        substr: install.python-poetry.org
      - type: text
        substr: bootstrap.pypa.io/get-pip.py
      - type: text
        regex: '\|\s*python3?\s+-m\s+json\.tool'
  - id: wget-pipe-python
    desc: wget piped to python
    crit: suspicious
    conf: 0.75
    attack: T1059.006
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*python
  - id: python-c-wget-command-substitution
    desc: python -c executes wget command substitution
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [shell, python]
    attack: T1059.006
    if:
      type: text
      regex: 'python3?\s+-c\s+"\$\(wget\s+-q\s+-O-\s+http://'
  - id: curl-pipe-perl
    desc: curl piped to perl
    crit: suspicious
    conf: 0.75
    attack: T1059.005
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*perl
  - id: wget-pipe-perl
    desc: wget piped to perl
    crit: suspicious
    conf: 0.75
    attack: T1059.005
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*perl
  - id: curl-pipe-node
    desc: curl piped to node
    crit: suspicious
    conf: 0.75
    attack: T1059.007
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*node
  - id: wget-pipe-node
    desc: wget piped to node
    crit: suspicious
    conf: 0.75
    attack: T1059.007
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*node
  - id: curl-pipe-ruby
    desc: curl piped to ruby
    crit: suspicious
    conf: 0.75
    attack: T1059
    unless:
      - id: well-known/lib/jruby::archive-basename
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::embedded-runtime-path
      - id: well-known/lib/jruby::jruby-home-path
      - id: well-known/lib/jruby::module-marker
      - id: well-known/lib/jruby::stdlib-archive-marker
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*ruby
    not:
      - substr: encoding.spec.whatwg.org/encodings.json
  - id: wget-pipe-ruby
    desc: wget piped to ruby
    crit: suspicious
    conf: 0.75
    attack: T1059
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*ruby
  - id: curl-pipe-shell-exception-tailscale
    desc: Tailscale install script reference
    crit: component
    conf: 0.92
    if:
      type: text
      substr: tailscale.com/install.sh
  - id: curl-pipe-shell-exception-ollama
    desc: Ollama install script reference
    crit: component
    conf: 0.92
    if:
      type: text
      substr: ollama.com/install.sh
  - id: curl-pipe-shell-exception-evil-sh
    desc: Literal curl evil.sh pipe-to-bash reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: curl evil.sh | bash
  - id: curl-pipe-shell-exception-ellipsis-bash
    desc: Ellipsis-marked curl-to-bash reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: curl ... | bash
  - id: curl-pipe-shell-exception-phone-bridge
    desc: Phone bridge installer reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: install-phone-bridge.sh
  - id: curl-pipe-shell-exception-into-bash
    desc: curl-into-bash reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: curl-into-bash
composite_rules:
  - id: curl-pipe-shell-exceptions
    desc: Known benign usages of curl-pipe-shell
    crit: component
    conf: 0.9
    any:
      - id: curl-pipe-shell-exception-tailscale
      - id: curl-pipe-shell-exception-ollama
      - id: curl-pipe-shell-exception-evil-sh
      - id: curl-pipe-shell-exception-ellipsis-bash
      - id: curl-pipe-shell-exception-phone-bridge
      - id: curl-pipe-shell-exception-into-bash
  - id: node-curl-pipe-shell-exec
    desc: Node.js executes curl pipe shell
    crit: hostile
    conf: 0.94
    attack: "T1105, T1059.004"
    mbc: "B0032.001"
    all:
      - id: micro-behaviors/process/create/shell/bridge::child-process-inline-exec-call
      - id: curl-pipe-interpreters
    any:
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/communications/ip/literal::malformed-http-ip-url
  - id: curl-pipe-interpreters
    desc: Curl piped to various interpreters
    any:
      - id: curl-pipe-sh
      - id: curl-pipe-bash
      - id: curl-pipe-shell-word
      - id: curl-pipe-zsh
      - id: curl-pipe-ksh
      - id: curl-pipe-dash
      - id: curl-pipe-python
      - id: curl-pipe-perl
      - id: curl-pipe-node
      - id: curl-pipe-ruby
  - id: wget-pipe-interpreters
    desc: Wget piped to various interpreters
    any:
      - id: wget-pipe-sh
      - id: wget-pipe-bash
      - id: wget-pipe-shell-word
      - id: wget-pipe-zsh
      - id: wget-pipe-ksh
      - id: wget-pipe-dash
      - id: wget-pipe-python
      - id: wget-pipe-perl
      - id: wget-pipe-node
      - id: wget-pipe-ruby
  - id: download-pipe-exec
    desc: Download piped to interpreter dropper
    crit: suspicious
    conf: 0.9
    attack: T1059
    any:
      - id: curl-pipe-interpreters
      - id: wget-pipe-interpreters
    unless:
      - id: curl-pipe-shell-exceptions
  - id: curl-pipe-shell
    desc: Curl output piped to shell
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    any:
      - id: curl-pipe-sh
      - id: curl-pipe-bash
      - id: curl-pipe-shell-word
      - id: curl-pipe-zsh
      - id: curl-pipe-ksh
    unless:
      - id: curl-pipe-shell-exceptions
      - id: curl-pipe-dash
  - id: wget-pipe-shell
    desc: Wget output piped to shell
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    any:
      - id: wget-pipe-sh
      - id: wget-pipe-bash
      - id: wget-pipe-shell-word
      - id: wget-pipe-zsh
      - id: wget-pipe-ksh
      - id: wget-pipe-dash
  - id: dropper-pipe-obfuscated
    desc: Obfuscated download piped to interpreter (hostile)
    crit: hostile
    conf: 0.95
    for: [shell, applescript]
    size_max: 1000
    all:
      - id: objectives/anti-static/obfuscation/string/recovery::echo-tr-decode
      - id: micro-behaviors/communications/http/download/curl::curl-insecure
      - id: micro-behaviors/communications/http/download/curl::curl-silent
      - id: micro-behaviors/process/create/shell/invoke::sh-c-exec
    any:
      - { id: curl-pipe-sh }
      - { id: curl-pipe-shell-word }
      - { id: curl-pipe-zsh }
      - { id: curl-pipe-ksh }
      - { id: curl-pipe-dash }
      - { id: curl-pipe-python }
      - { id: curl-pipe-perl }
      - { id: curl-pipe-node }
      - { id: curl-pipe-ruby }
      - { id: wget-pipe-sh }
      - { id: wget-pipe-shell-word }
      - { id: wget-pipe-zsh }
      - { id: wget-pipe-ksh }
      - { id: wget-pipe-dash }
      - { id: wget-pipe-python }
      - { id: wget-pipe-perl }
      - { id: wget-pipe-node }
      - { id: wget-pipe-ruby }
