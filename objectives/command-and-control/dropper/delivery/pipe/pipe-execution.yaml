defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts]
traits:
  - id: curl-pipe-sh
    desc: curl piped to sh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: raw
      regex: curl\s+.{0,200}\|\s*sh\b
    not:
      - substr: astral.sh
      - substr: ollama.com
      - substr: rustup.rs
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
  - id: curl-pipe-shell-word
    desc: curl piped to shell
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: raw
      regex: curl\s+.{0,200}\|\s*shell\b
