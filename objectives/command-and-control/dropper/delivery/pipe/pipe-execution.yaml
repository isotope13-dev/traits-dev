defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts]
traits:
  - id: curl-pipe-sh
    desc: curl piped to sh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: basename
        regex: \.md$
        case_insensitive: true
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*sh\b
    not:
      - substr: "Install this version of wasmer:"
      - substr: "curl http://npmjs.org/install.sh"
      - substr: "https://rustwasm.github.io/wasm-pack/installer/init.sh"
      - substr: "https://install.fuel.sh"
      - substr: "https://install.fuel.network"
      - substr: astral.sh
      - substr: ollama.com
      - substr: rustup.rs
    downgrade:
      any:
        - id: metadata/package/testing/harness::is-test
  - id: curl-pipe-shell-word
    desc: curl piped to shell
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*shell\b
  - id: curl-pipe-zsh
    desc: curl piped to zsh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*zsh\b
  - id: curl-pipe-ksh
    desc: curl piped to ksh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*ksh\b
  - id: curl-pipe-dash
    desc: curl piped to dash
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*dash\b
  - id: wget-pipe-sh
    desc: wget piped to sh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*sh\b
  - id: wget-pipe-shell-word
    desc: wget piped to shell
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*shell\b
  - id: wget-pipe-zsh
    desc: wget piped to zsh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*zsh\b
  - id: wget-pipe-ksh
    desc: wget piped to ksh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*ksh\b
  - id: wget-pipe-dash
    desc: wget piped to dash
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*dash\b
  - id: curl-pipe-python
    desc: curl piped to python
    crit: suspicious
    conf: 0.75
    attack: T1059.006
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*python
    not:
      - substr: install.python-poetry.org
  - id: wget-pipe-python
    desc: wget piped to python
    crit: suspicious
    conf: 0.75
    attack: T1059.006
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*python
  - id: curl-pipe-perl
    desc: curl piped to perl
    crit: suspicious
    conf: 0.75
    attack: T1059.005
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*perl
  - id: wget-pipe-perl
    desc: wget piped to perl
    crit: suspicious
    conf: 0.75
    attack: T1059.005
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*perl
  - id: curl-pipe-node
    desc: curl piped to node
    crit: suspicious
    conf: 0.75
    attack: T1059.007
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*node
  - id: wget-pipe-node
    desc: wget piped to node
    crit: suspicious
    conf: 0.75
    attack: T1059.007
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*node
  - id: curl-pipe-ruby
    desc: curl piped to ruby
    crit: suspicious
    conf: 0.75
    attack: T1059
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*ruby
  - id: wget-pipe-ruby
    desc: wget piped to ruby
    crit: suspicious
    conf: 0.75
    attack: T1059
    if:
      type: text
      regex: wget\s+.{0,200}\|\s*ruby
composite_rules:
  - id: curl-pipe-interpreters
    desc: Curl piped to various interpreters
    any:
      - id: curl-pipe-sh
      - id: curl-pipe-shell-word
      - id: curl-pipe-zsh
      - id: curl-pipe-ksh
      - id: curl-pipe-dash
      - id: curl-pipe-python
      - id: curl-pipe-perl
      - id: curl-pipe-node
      - id: curl-pipe-ruby
  - id: wget-pipe-interpreters
    desc: Wget piped to various interpreters
    any:
      - id: wget-pipe-sh
      - id: wget-pipe-shell-word
      - id: wget-pipe-zsh
      - id: wget-pipe-ksh
      - id: wget-pipe-dash
      - id: wget-pipe-python
      - id: wget-pipe-perl
      - id: wget-pipe-node
      - id: wget-pipe-ruby
  - id: download-pipe-exec
    desc: Download piped to interpreter (dropper
    crit: suspicious
    conf: 0.9
    attack: T1059
    any:
      - id: curl-pipe-interpreters
      - id: wget-pipe-interpreters
  - id: curl-pipe-shell
    desc: Curl output piped to shell
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    any:
      - id: curl-pipe-sh
      - id: curl-pipe-shell-word
      - id: curl-pipe-zsh
      - id: curl-pipe-ksh
      - id: curl-pipe-dash
  - id: wget-pipe-shell
    desc: Wget output piped to shell
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    any:
      - id: wget-pipe-sh
      - id: wget-pipe-shell-word
      - id: wget-pipe-zsh
      - id: wget-pipe-ksh
      - id: wget-pipe-dash
  - id: dropper-pipe-obfuscated
    desc: Obfuscated download piped to interpreter (hostile)
    crit: hostile
    conf: 0.95
    for: [shell, applescript]
    size_max: 1000
    all:
      - id: objectives/anti-static/obfuscation/string::echo-tr-decode
      - id: micro-behaviors/communications/http/download/curl::curl-insecure
      - id: micro-behaviors/communications/http/download/curl::curl-silent
      - id: micro-behaviors/process/create/shell::sh-c-exec
    any:
      - { id: curl-pipe-sh }
      - { id: curl-pipe-shell-word }
      - { id: curl-pipe-zsh }
      - { id: curl-pipe-ksh }
      - { id: curl-pipe-dash }
      - { id: curl-pipe-python }
      - { id: curl-pipe-perl }
      - { id: curl-pipe-node }
      - { id: curl-pipe-ruby }
      - { id: wget-pipe-sh }
      - { id: wget-pipe-shell-word }
      - { id: wget-pipe-zsh }
      - { id: wget-pipe-ksh }
      - { id: wget-pipe-dash }
      - { id: wget-pipe-python }
      - { id: wget-pipe-perl }
      - { id: wget-pipe-node }
      - { id: wget-pipe-ruby }
