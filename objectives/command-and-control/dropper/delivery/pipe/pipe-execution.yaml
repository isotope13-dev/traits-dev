defaults:
  platforms: [windows, linux, macos]
  for: [shell, python, javascript, ruby, perl, applescript]
traits:
  - id: curl-pipe-sh
    desc: curl piped to sh
    crit: notable
    conf: 0.7
    attack: T1059.004
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/tool/detection/security-scanner/
      - id: objectives/command-and-control/channel/deaddrop/url::security-rule-runtime-script-floating-url
      - id: metadata/library/structure/
      - type: basename
        regex: '^(METADATA|PKG-INFO)$'
      - id: metadata/file/extension/identity::markdown-file-basename
      - type: text
        substr: "Install this version of wasmer:"
      - id: well-known/tool/development/uv::uv-install-sh-bootstrap-url
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*sh\b
    not:
      - regex: curl\s+.{0,200}npmjs\.org/install\.sh.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}rustwasm\.github\.io/wasm-pack/installer/init\.sh.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}install\.fuel\.sh.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}install\.fuel\.network.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}golangci-lint\.run/install\.sh.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}raw\.githubusercontent\.com/golangci/golangci-lint/.{0,80}/install\.sh.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}aka\.ms/apm-unix.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}astral\.sh.{0,200}\|\s*sh\b
      # Docstring / template forms of the Astral uv installer (URL held in UV_INSTALL_URL)
      - regex: curl\s+-LsSf\s+\.\.\.\s*\|\s*sh\b
      - regex: curl\s+.{0,80}\{UV_INSTALL_URL\}\s*\|\s*sh\b
      - regex: curl\s+.{0,200}ollama\.com.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}rustup\.rs.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}get\.docker\.com.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}get\.k3s\.io.{0,200}\|\s*sh\b
      - regex: curl\s+.{0,200}tailscale\.com/install\.sh.{0,200}\|\s*sh\b
  - id: curl-pipe-bash
    desc: Shell executes curl output with Bash
    crit: notable
    conf: 0.7
    # A source-language docstring can describe an install command without
    # executing it.  Direct pipe execution is unambiguous in shell files;
    # source-language subprocess execution has its own process rules.
    for: [shell]
    attack: T1059.004
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: well-known/tool/detection/security-scanner/
      - id: objectives/command-and-control/channel/deaddrop/url::security-rule-runtime-script-floating-url
      - id: metadata/library/structure/
      - type: basename
        regex: '^(METADATA|PKG-INFO)$'
      - id: metadata/file/extension/identity::markdown-file-basename
      - type: text
        substr: "Install this version of wasmer:"
    if:
      type: text
      # Match a shell command line, not a source-language string or template
      # that merely documents the command.
      # Require a concrete URL: generated UI commands such as
      # `curl -fsSL ${base}/... | bash` are command text, not execution.
      regex: '(?m)^[[:space:]]*curl\s+.{0,80}https?://.{0,80}\|\s*bash\b'
    not:
      - regex: '(?m)^[[:space:]]*(echo|printf)\b[^\n]{0,240}\bcurl\s+.{0,80}https?://.{0,80}\|\s*bash\b'
      - regex: '(?m)^[[:space:]]*[^\n]*(chalk\.(cyan|gray|yellow|red)|console\.(log|error))\s*\([^\n]{0,240}\bcurl\s+.{0,80}https?://.{0,80}\|\s*bash\b'
      - regex: curl\s+.{0,200}npmjs\.org/install\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}deb\.nodesource\.com/.{0,80}\|\s*bash\b
      - regex: curl\s+.{0,200}rustwasm\.github\.io/wasm-pack/installer/init\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}install\.fuel\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}install\.fuel\.network.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}raw\.githubusercontent\.com/IceWhaleTech/get/main/update\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}raw\.githubusercontent\.com/microsoft/apm/.{0,80}/install\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}astral\.sh.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}ollama\.com.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}rustup\.rs.{0,200}\|\s*bash\b
      - regex: curl\s+.{0,200}wasmtime\.dev/install\.sh.{0,200}\|\s*bash\b
      - substr: curl -fsSL https://bun.com/install | bash
      - regex: curl\s+.{0,200}raw\.githubusercontent\.com/different-ai/openwork/dev/apps/opencode-router/install\.sh.{0,200}\|\s*bash\b
  - id: curl-pipe-shell-word
    desc: curl piped to shell
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    unless:
      - id: metadata/library/structure/
      - id: objectives/command-and-control/channel/deaddrop/url::security-rule-runtime-script-floating-url
      - id: well-known/tool/detection/
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*shell\b
  - id: curl-pipe-zsh
    desc: curl piped to zsh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*zsh\b
  - id: curl-pipe-ksh
    desc: curl piped to ksh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*ksh\b
  - id: curl-pipe-dash
    desc: curl piped to dash
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*dash\b
  - id: wget-pipe-sh
    desc: wget piped to sh
    crit: notable
    conf: 0.7
    attack: T1059.004
    unless:
      - id: well-known/tool/detection/
      - id: objectives/command-and-control/channel/deaddrop/url::security-rule-runtime-script-floating-url
      - type: basename
        regex: (?i)(^|[\\/!])(METADATA|PKG-INFO|README(\..*)?)$
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
      - id: metadata/package/files/dependency::vsix-bundled-output-path
      - id: well-known/tool/sysadmin/alpine-packages::alpine-docker-machine-binary
      - id: metadata/build/docker::dockerfile-basename
      - id: metadata/package/testing/
    if:
      type: text
      regex: '(?m)^[[:space:]]*(wget\b|[^#[:space:]][^\n]{0,220}\bwget\s+).{0,200}\|\s*sh\b'
    not:
      - substr: apt.u.doover.com/install.sh
  - id: wget-pipe-bash
    desc: wget piped to bash
    crit: notable
    conf: 0.7
    attack: T1059.004
    unless:
      - id: well-known/tool/detection/
      - id: objectives/command-and-control/channel/deaddrop/url::security-rule-runtime-script-floating-url
      - type: basename
        regex: (?i)(^|[\\/!])(METADATA|PKG-INFO|README(\..*)?)$
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
      - id: metadata/package/files/dependency::vsix-bundled-output-path
      - id: well-known/tool/sysadmin/alpine-packages::alpine-docker-machine-binary
      - id: metadata/build/docker::dockerfile-basename
      - id: metadata/package/testing/
    if:
      type: text
      regex: '(?m)^[[:space:]]*(wget\b|[^#[:space:]][^\n]{0,220}\bwget\s+).{0,200}\|\s*bash\b'
    not:
      - substr: apt.u.doover.com/install.sh
      - substr: imagenetloader.torch
      - substr: pi.dk/3
  - id: wget-pipe-shell-word
    desc: wget piped to shell
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    unless:
      - id: well-known/tool/detection/
      - id: objectives/command-and-control/channel/deaddrop/url::security-rule-runtime-script-floating-url
      - type: basename
        regex: (?i)(^|[\\/!])(METADATA|PKG-INFO|README(\..*)?)$
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown
      - id: metadata/package/files/dependency::vsix-bundled-output-path
      - id: metadata/build/docker::dockerfile-basename
      - id: metadata/package/testing/
    if:
      type: text
      regex: '(?m)^[[:space:]]*(wget\b|[^#[:space:]][^\n]{0,220}\bwget\s+).{0,200}\|\s*shell\b'
    not:
      - substr: apt.u.doover.com/install.sh
  - id: wget-pipe-zsh
    desc: wget piped to zsh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: '(?m)^[[:space:]]*(wget\b|[^#[:space:]][^\n]{0,220}\bwget\s+).{0,200}\|\s*zsh\b'
  - id: wget-pipe-ksh
    desc: wget piped to ksh
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: '(?m)^[[:space:]]*(wget\b|[^#[:space:]][^\n]{0,220}\bwget\s+).{0,200}\|\s*ksh\b'
  - id: wget-pipe-dash
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-docker-machine-binary
      - id: metadata/build/docker::dockerfile-basename
      - id: metadata/package/testing/
    desc: wget piped to dash
    crit: suspicious
    conf: 0.7
    attack: T1059.004
    if:
      type: text
      regex: '(?m)^[[:space:]]*(wget\b|[^#[:space:]][^\n]{0,220}\bwget\s+).{0,200}\|\s*dash\b'
  - id: curl-pipe-python
    desc: curl piped to python
    crit: notable
    conf: 0.75
    attack: T1059.006
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*python
    unless:
      - type: text
        substr: install.python-poetry.org
      - type: text
        substr: bootstrap.pypa.io/get-pip.py
      - type: text
        regex: '\|\s*python3?\s+-m\s+json\.tool'
      - type: text
        regex: '\|\s*python3?\s+-c\s+["''][^"'']{0,140}json\.load\(sys\.stdin\)'
  - id: wget-pipe-python
    desc: wget piped to python
    crit: suspicious
    conf: 0.75
    attack: T1059.006
    if:
      type: text
      regex: '(?m)^[[:space:]]*(wget\b|[^#[:space:]][^\n]{0,220}\bwget\s+).{0,200}\|\s*python'
    unless:
      - id: well-known/app/vscode-marketplace::bwat-dev-vsix
      - id: well-known/app/vscode-marketplace::bwat-dev-member-path
  - id: python-c-wget-command-substitution
    desc: python -c executes wget command substitution
    crit: suspicious
    conf: 0.9
    platforms: [unix, windows]
    for: [shell, python]
    attack: T1059.006
    if:
      type: text
      regex: 'python3?\s+-c\s+"\$\(wget\s+-q\s+-O-\s+http://'
  - id: curl-pipe-perl
    desc: curl piped to perl
    crit: suspicious
    conf: 0.75
    for: [shell]
    attack: T1059.005
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*perl
    unless:
      - id: metadata/package/testing/presence/harness::git-tests-directory
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
  - id: wget-pipe-perl
    desc: wget piped to perl
    crit: suspicious
    conf: 0.75
    attack: T1059.005
    if:
      type: text
      regex: '(?m)^[[:space:]]*(wget\b|[^#[:space:]][^\n]{0,220}\bwget\s+).{0,200}\|\s*perl'
    unless:
      - id: well-known/app/vscode-marketplace::bwat-dev-vsix
      - id: well-known/app/vscode-marketplace::bwat-dev-member-path
  - id: curl-pipe-node
    desc: curl piped to node
    crit: suspicious
    conf: 0.75
    attack: T1059.007
    if:
      type: text
      regex: '(?m)^[[:space:]]*curl\s+.{0,200}\|\s*node\b'
  - id: wget-pipe-node
    desc: wget piped to node
    crit: suspicious
    conf: 0.75
    attack: T1059.007
    if:
      type: text
      regex: '(?m)^[[:space:]]*(wget\b|[^#[:space:]][^\n]{0,220}\bwget\s+).{0,200}\|\s*node'
    unless:
      - id: well-known/app/vscode-marketplace::bwat-dev-vsix
      - id: well-known/app/vscode-marketplace::bwat-dev-member-path
  - id: curl-pipe-ruby
    desc: curl piped to ruby
    crit: suspicious
    conf: 0.75
    attack: T1059
    unless:
      - id: well-known/lib/jruby::archive-basename
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::embedded-runtime-path
      - id: well-known/lib/jruby::jruby-home-path
      - id: well-known/lib/jruby::module-marker
      - id: well-known/lib/jruby::stdlib-archive-marker
    if:
      type: text
      regex: curl\s+.{0,200}\|\s*ruby
    not:
      - substr: encoding.spec.whatwg.org/encodings.json
  - id: wget-pipe-ruby
    desc: wget piped to ruby
    crit: suspicious
    conf: 0.75
    attack: T1059
    if:
      type: text
      regex: '(?m)^[[:space:]]*(wget\b|[^#[:space:]][^\n]{0,220}\bwget\s+).{0,200}\|\s*ruby'
    unless:
      - id: well-known/app/vscode-marketplace::bwat-dev-vsix
      - id: well-known/app/vscode-marketplace::bwat-dev-member-path
  - id: curl-pipe-shell-exception-ollama
    desc: Ollama install script reference
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: ollama.com/install.sh
  - id: curl-pipe-shell-exception-evil-sh
    desc: Literal curl evil.sh pipe-to-bash reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: curl evil.sh | bash
  - id: curl-pipe-shell-exception-phone-bridge
    desc: Phone bridge installer reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: install-phone-bridge.sh
  - id: curl-pipe-shell-exception-into-bash
    desc: curl-into-bash reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: curl-into-bash
  - id: hosted-reverse-shell-service
    desc: hosted reverse shell service URL
    crit: suspicious
    conf: 0.96
    attack: T1105
    if:
      type: text
      substr: reverse-shell.
composite_rules:
  - id: curl-pipe-shell-carveouts
    desc: Known recognized usages of curl-pipe-shell
    crit: notable
    conf: 0.9
    any:
      - id: well-known/app/tailscale::install-script-url
      - id: curl-pipe-shell-exception-ollama
      - id: curl-pipe-shell-exception-evil-sh
      - id: metadata/file/string/identity::abbreviated-curl-bash-reference
      - id: curl-pipe-shell-exception-phone-bridge
      - id: curl-pipe-shell-exception-into-bash
  - id: node-curl-pipe-shell-exec
    desc: Node.js executes curl pipe shell
    crit: hostile
    conf: 0.94
    attack: "T1105, T1059.004"
    mbc: "B0032.001"
    all:
      - id: micro-behaviors/process/create/shell/bridge::child-process-inline-exec-call
      - id: curl-pipe-interpreters
    any:
      - id: micro-behaviors/communications/ip/literal::http-ip-url
      - id: micro-behaviors/communications/ip/literal::malformed-http-ip-url
      - id: hosted-reverse-shell-service
  - id: node-hosted-reverse-shell-pipe
    desc: Node executes hosted reverse shell
    crit: hostile
    conf: 0.96
    attack: "T1105, T1059.004"
    mbc: "B0032.001"
    all:
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
      - id: curl-pipe-shell
      - id: hosted-reverse-shell-service
  - id: node-hosted-reverse-shell-curl-pipe
    desc: Node executes hosted reverse shell service
    crit: hostile
    conf: 0.97
    attack: "T1105, T1059.004"
    mbc: "B0032.001"
    all:
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
      - id: hosted-reverse-shell-service
    any:
      - id: curl-pipe-sh
      - id: curl-pipe-bash
      - id: curl-pipe-shell-word
      - id: curl-pipe-zsh
      - id: curl-pipe-ksh
      - id: curl-pipe-dash
  - id: curl-pipe-interpreters
    desc: Curl piped to various interpreters
    any:
      - id: curl-pipe-sh
      - id: curl-pipe-bash
      - id: curl-pipe-shell-word
      - id: curl-pipe-zsh
      - id: curl-pipe-ksh
      - id: curl-pipe-dash
      - id: curl-pipe-python
      - id: curl-pipe-perl
      - id: curl-pipe-node
      - id: curl-pipe-ruby
  - id: wget-pipe-interpreters
    desc: Wget piped to various interpreters
    any:
      - id: wget-pipe-sh
      - id: wget-pipe-bash
      - id: wget-pipe-shell-word
      - id: wget-pipe-zsh
      - id: wget-pipe-ksh
      - id: wget-pipe-dash
      - id: wget-pipe-python
      - id: wget-pipe-perl
      - id: wget-pipe-node
      - id: wget-pipe-ruby
  - id: download-pipe-exec
    desc: Download piped to interpreter dropper
    crit: suspicious
    conf: 0.9
    attack: T1059
    any:
      - id: curl-pipe-interpreters
      - id: wget-pipe-interpreters
    unless:
      - id: objectives/command-and-control/dropper/delivery/pipe/
  - id: curl-pipe-shell
    desc: Curl output piped to shell
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    any:
      - id: curl-pipe-sh
      - id: curl-pipe-bash
      - id: curl-pipe-shell-word
      - id: curl-pipe-zsh
      - id: curl-pipe-ksh
    unless:
      - id: objectives/command-and-control/dropper/delivery/pipe/
      - id: curl-pipe-dash
  - id: wget-pipe-shell
    desc: Wget output piped to shell
    crit: notable
    conf: 0.95
    attack: T1059.004
    any:
      - id: wget-pipe-sh
      - id: wget-pipe-bash
      - id: wget-pipe-shell-word
      - id: wget-pipe-zsh
      - id: wget-pipe-ksh
      - id: wget-pipe-dash
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-docker-machine-binary
      - id: well-known/tool/detection/mcp-fence::context
  - id: dropper-pipe-obfuscated
    desc: Obfuscated download piped to interpreter (hostile)
    crit: hostile
    conf: 0.95
    for: [shell, applescript]
    size_max: 1000
    all:
      - id: micro-behaviors/data/string/replace::shell-echo-tr-transform
      - id: micro-behaviors/communications/http/download/curl::curl-insecure
      - id: micro-behaviors/communications/http/download/curl::curl-silent
      - id: micro-behaviors/process/create/shell/spawn::sh-c-exec
    any:
      - { id: curl-pipe-sh }
      - { id: curl-pipe-shell-word }
      - { id: curl-pipe-zsh }
      - { id: curl-pipe-ksh }
      - { id: curl-pipe-dash }
      - { id: curl-pipe-python }
      - { id: curl-pipe-perl }
      - { id: curl-pipe-node }
      - { id: curl-pipe-ruby }
      - { id: wget-pipe-sh }
      - { id: wget-pipe-shell-word }
      - { id: wget-pipe-zsh }
      - { id: wget-pipe-ksh }
      - { id: wget-pipe-dash }
      - { id: wget-pipe-python }
      - { id: wget-pipe-perl }
      - { id: wget-pipe-node }
      - { id: wget-pipe-ruby }

  - id: encoded-curl-pipe-zsh-stage
    desc: Base64-decoded URL piped from curl to zsh
    crit: hostile
    conf: 0.98
    attack: T1027,T1105,T1059.004
    near_bytes: 256
    all:
      - id: curl-pipe-zsh
      - id: micro-behaviors/data/decode/base64::base64-d-cmd
      - id: objectives/anti-static/obfuscation/payload/encoded::decoded-http-url

  - id: embedded-iot-password-dropper
    desc: IoT password injection downloads and executes shell stage
    crit: hostile
    conf: 0.99
    attack: T1059.004,T1105,T1210
    near_bytes: 260
    all:
      - id: objectives/lateral-movement/exploit/network-device::iot-password-command-injection
      - id: micro-behaviors/fs/chmod/executable/dangerous::shell-777
