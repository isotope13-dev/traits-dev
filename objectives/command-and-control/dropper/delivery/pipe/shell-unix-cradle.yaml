defaults:
  platforms: [unix]
  for: [shell]
  attack: T1105

traits:
  - id: shell-curl-ksh-cradle
    desc: Shell curl ksh cradle
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'curl -s "[^"]{1,120}/api/payload" \| /usr/bin/ksh'

  - id: shell-api-payload-ksh
    desc: Shell API payload ksh
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/payload" \| /usr/bin/ksh'

  - id: shell-escaped-api-payload-ksh
    desc: Shell escaped payload ksh
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/payload\" | /usr/bin/ksh

  - id: shell-hidden-stage-path
    desc: Shell hidden stage path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/.sysmon_update

composite_rules:
  - id: shell-hidden-curl-ksh-stage
    desc: Shell hidden curl ksh stage
    crit: hostile
    conf: 0.98
    all:
      - id: shell-hidden-stage-path
    any:
      - id: shell-curl-ksh-cradle
      - id: shell-api-payload-ksh
      - id: shell-escaped-api-payload-ksh
