defaults:
  platforms:
    - unix
    - windows
  for:
    - shell
  crit: notable
  conf: 0.6
  attack: T1059.004
traits:
  - id: pipe-sh-dup
    desc: pipe to sh
    if:
      type: string_literal
      regex: ' \|\s*sh\b'
  - id: pipe-shell-dup
    desc: pipe to shell
    if:
      type: string_literal
      regex: ' \|\s*shell\b'
  - id: output-pipe-sh
    desc: -O- | sh pattern
    crit: suspicious
    conf: 0.85
    mbc: B0024
    if:
      type: string_literal
      regex: -[Oo]-?\s*\|\s*sh\b
composite_rules:
  - id: objectives/command-and-control/dropper/delivery/pipe::pipe-sh-dup-or-shell
    desc: Pipe to shell (sh or shell)
    any:
      - id: objectives/command-and-control/dropper/delivery/pipe::pipe-sh-dup
      - id: objectives/command-and-control/dropper/delivery/pipe::pipe-shell-dup
