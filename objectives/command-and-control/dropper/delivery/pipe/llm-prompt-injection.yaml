defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]
  attack: "T1105, T1059"

composite_rules:
  - id: llm-override-download-pipe-execution
    desc: LLM prompt override requests download-pipe execution
    crit: hostile
    conf: 0.97
    near_bytes: 360
    all:
      - id: objectives/evasion/security-bypass/llm/override::llm-prior-instruction-override
      - id: objectives/execution/lure/shell::download-pipe-exec
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/tool/detection/security-scanner/
