defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]
  attack: "T1105, T1059"

composite_rules:
  - id: llm-override-download-pipe-execution
    desc: LLM prompt override requests download-pipe execution
    crit: hostile
    conf: 0.97
    near_bytes: 360
    all:
      - id: micro-behaviors/data/text/llm/override::llm-prior-instruction-override
      - id: objectives/execution/lure/shell::download-pipe-exec
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
      - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
