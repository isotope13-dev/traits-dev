defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1105
  mbc: E1105
traits:
  - id: response-json-call
    desc: Parses HTTP response body as JSON
    crit: component
    conf: 0.85
    if:
      type: ast
      query: |
        (call
          function: (attribute
            attribute: (identifier) @meth)
          (#eq? @meth "json"))

  - id: json-message-field
    desc: Extracts payload from JSON message field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: \.get\(['"]message['"]

  - id: raise-for-status
    desc: Checks HTTP response status before payload handling
    crit: component
    conf: 0.8
    if:
      type: ast
      query: |
        (call
          function: (attribute
            attribute: (identifier) @meth)
          (#eq? @meth "raise_for_status"))

composite_rules:
  - id: json-message-base64-exec
    desc: Fetches base64 code from JSON and executes it
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: response-json-call
      - id: json-message-field
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/process/interpreter/python::exec-builtin

  - id: checked-json-message-base64-exec
    desc: Validates HTTP response, extracts JSON payload, and executes decoded code
    crit: hostile
    conf: 0.995
    all:
      - id: json-message-base64-exec
      - id: raise-for-status
    any:
      - id: objectives/anti-static/obfuscation/string/encoding::bytes-fromhex-call
      - id: micro-behaviors/data/encode/hex::hex-encoded-https
