defaults:
  platforms: [windows]
  for: [chm]
  attack: "T1218.001"

traits:
  - id: chm-embedded-javascript-page
    desc: CHM embeds JavaScript page
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(?i)<script\s+language=["'']?javascript'

  - id: chm-js-document-write-decoder
    desc: CHM JavaScript document write decoder
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'document\s*(\.write|\[[^\]\r\n]{1,80}\])\s*\('

  - id: chm-js-base64-decoder-function
    desc: CHM JavaScript base64 decoder
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'fromCharCode.{0,180}charAt.{0,180}indexOf'

  - id: chm-base64-shortcut-param-fragment
    desc: CHM base64 HTML Help parameter
    crit: suspicious
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: '(UEFSQU0g|T0JKRUNUIGlk|Ikl0ZW0xIiB2)'

composite_rules:
  - id: chm-obfuscated-shortcut-decoder
    desc: CHM decodes hidden Shortcut payload
    crit: hostile
    conf: 0.98
    all:
      - id: chm-embedded-javascript-page
      - id: chm-js-document-write-decoder
      - id: chm-js-base64-decoder-function
      - id: chm-base64-shortcut-param-fragment

  - id: chm-obfuscated-shortcut-container
    desc: CHM obfuscated Shortcut container
    crit: hostile
    conf: 0.98
    all:
      - id: chm-obfuscated-shortcut-decoder
      - id: metadata/document/chm::chm-has-objinst
      - id: metadata/document/chm::chm-small-entry-count
