# CHM dropper-shape composites.
#
# All atoms — container ratios, presence flags, locale checks,
# `#SYSTEM` consistency markers — live in
# `metadata/document/chm/structure.yaml` because they are neutral
# observations about the file. This file holds *only* the composites
# that combine those atoms into intent inference (dropper shape,
# foreign-locale-dropper). Per the project rule, behavioral / intent
# detection lives in `objectives/`; the underlying observations live
# in `metadata/`.
#
# Cross-tier references resolve via cleave's tier-dependency policy:
# `objectives/` may reference any `metadata/` atom.
defaults:
  platforms: [windows]
  for: [chm]
  attack: "T1218.001"
  mbc: "E1218"

composite_rules:
  # Tiny single-page CHM = dropper shape regardless of locale or
  # active content. Marked `notable` so it stays a triage hint
  # rather than a trigger on its own.
  - id: chm-tiny-payload
    desc: CHM with a single small HTML payload
    crit: notable
    conf: 0.85
    all:
      - id: metadata/document/chm::chm-small-entry-count
      - id: metadata/document/chm::chm-small-user-entry

  # Single-page, mostly-overhead CHM that includes active content.
  # The combination is the dropper *shape* — the actual ShortCut+cmd
  # patterns live in `htmlhelp-shortcut-active.yaml` and fire on the
  # nested HTML.
  - id: chm-dropper-shape
    desc: CHM small active overhead dropper
    crit: hostile
    conf: 0.92
    all:
      - id: chm-tiny-payload
      - id: metadata/document/chm::chm-mostly-overhead
      - id: metadata/document/chm::chm-has-objinst

  # Classic foreign-locale dropper shape: tiny payload with an LCID
  # the file name doesn't advertise. Treats the locale as
  # corroborating evidence on top of the dropper shape.
  - id: chm-foreign-lcid-dropper
    desc: CHM foreign-locale dropper shape
    crit: hostile
    conf: 0.95
    all:
      - id: chm-dropper-shape
    any:
      - id: metadata/document/chm::chm-russian-lcid
      - id: metadata/document/chm::chm-korean-lcid
      - id: metadata/document/chm::chm-chinese-lcid
