# HTML Help "ShortCut" active-content dropper.
#
# A common CHM-phishing technique embeds an `<OBJECT>` element using
# the HTML Help Shortcut control's CLSID
# `52a2aaae-085d-4187-97ea-8c30db990436`. The control's `ShortCut`
# command is configured (via `<PARAM name="Command" value="ShortCut">`
# and `<PARAM name="Item1" value=",cmd.exe,/c …">`) to launch an
# arbitrary process — typically `cmd.exe /c powershell -Command …`
# that downloads and runs a payload from a hard-coded URL. The OBJECT
# is then auto-fired with `x.Click()` from inline JavaScript when the
# CHM opens its first HTML page.
#
# Reference: T1218.001 (Compiled HTML File). The technique works on
# any CHM that the user double-clicks; legitimate help files never
# need the Shortcut control.
#
# Atoms here match against the embedded HTML inside the CHM (cleave
# treats the inner pages as `html` files); composites further up tie
# this to specific campaigns.
defaults:
  platforms: [windows]
  for: [html]
  attack: "T1218.001"
  mbc: "E1218"

traits:
  - id: htmlhelp-shortcut-clsid
    desc: HTML Help Shortcut ActiveX CLSID
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'classid\s*=\s*["'']clsid:\s*52a2aaae-085d-4187-97ea-8c30db990436'

  - id: htmlhelp-hhctrl-clsid
    desc: HTML Help HHCtrl ActiveX CLSID
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(?i)classid\s*=\s*["'']clsid:\s*adb880a6-d8ff-11cf-9377-00aa003b7a11'

  - id: htmlhelp-shortcut-command-param
    desc: PARAM Command=ShortCut for HTML Help control
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)<param[^>]{0,200}name\s*=\s*["'']Command["''][^>]{0,200}value\s*=\s*["'']ShortCut["'']'

  - id: htmlhelp-shortcut-item1-param
    desc: PARAM Item1 for HTML Help control
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)<param[^>]{0,300}name\s*=\s*["'']Item1["'']'

  - id: htmlhelp-shortcut-item1-cmd
    desc: HTML Help Shortcut launches cmd
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'value\s*=\s*["''][,;]?cmd(\.exe)?\b'

  - id: htmlhelp-shortcut-item1-powershell
    desc: HTML Help Shortcut launches PowerShell
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'value\s*=\s*["''][,;]?powershell(\.exe)?\b'

  - id: htmlhelp-shortcut-item1-schtasks
    desc: HTML Help Shortcut launches schtasks
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'value\s*=\s*["''][,;]?schtasks\b'

  - id: htmlhelp-shortcut-item1-named-target
    desc: HTML Help Shortcut named target
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'name\s*=\s*["'']Item1["''][^>]{0,120}value\s*=\s*["''],[A-Za-z0-9_ .-]{3,80},'

  - id: htmlhelp-schtasks-create
    desc: HTML Help creates scheduled task
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'schtasks\b.{0,80}/create\b'

  - id: htmlhelp-shortcut-item1-concat-powershell
    desc: HTML Help Shortcut concatenates PowerShell
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'Item1[^<]{0,260}value[^<]{0,120},\s*power'

  - id: htmlhelp-hidden-powershell
    desc: Hidden PowerShell in HTML Help
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'powershell(\.exe)?\s+-W\s+hidden'

  - id: htmlhelp-powershell-webrequest-iex
    desc: PowerShell WebRequest IEX loader
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'iex\(\[IO\.StreamReader\].{0,80}WebRequest'

  - id: htmlhelp-shortcut-item1-script-host
    desc: HTML Help Shortcut launches script host
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'value\s*=\s*["''][,;]?(wscript|cscript)(\.exe)?\b'

  - id: htmlhelp-shortcut-item1-lolbin
    desc: HTML Help Shortcut launches LOLBin
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'value\s*=\s*["''][,;]?(mshta|rundll32)(\.exe)?\b'

  - id: htmlhelp-object-auto-click
    desc: "HTML Help OBJECT auto-clicked via inline"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\b([a-zA-Z_][a-zA-Z0-9_]{0,20})\.Click\s*\(\s*\)'

  - id: htmlhelp-onerror-auto-click
    desc: HTML Help onerror auto-click
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'onerror\s*=\s*["''][^"'']{0,80}\.Click\s*\('

  - id: htmlhelp-getelement-auto-click
    desc: HTML Help getElementById auto-click
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'getElementById\s*\([^)]{1,80}\)\.Click\s*\('

  - id: htmlhelp-hidden-start-button
    desc: Hidden start button stages Shortcut
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '<button[^>]{0,160}id\s*=\s*["'']start["''][^>]{0,160}display\s*:\s*none'

composite_rules:
  - id: htmlhelp-shortcut-cmd-dropper
    desc: HTML Help Shortcut launches process
    crit: hostile
    conf: 0.99
    all:
      - id: htmlhelp-shortcut-command-param
      - id: htmlhelp-shortcut-item1-cmd-exec
    any:
      - id: htmlhelp-shortcut-clsid
      - id: htmlhelp-hhctrl-clsid

  - id: htmlhelp-shortcut-auto-fire-cmd-dropper
    desc: HTML Help Shortcut auto-fires process
    crit: hostile
    conf: 0.995
    all:
      - id: htmlhelp-shortcut-cmd-dropper
      - id: htmlhelp-object-auto-click

  # Binary-agnostic auto-fire dropper. `Command=ShortCut` PARAM plus an
  # inline `x.Click()` auto-fire is the invariant weaponization; the third
  # leg corroborates it as the HTML Help Shortcut control via EITHER the
  # ActiveX CLSID OR an Item1 process launch. This catches DPRK CHM lures
  # that (a) invoke PowerShell via a path/env-var form the Item1 token list
  # misses, or (b) omit/vary the CLSID. No legitimate help file auto-fires
  # a ShortCut control.
  - id: htmlhelp-shortcut-auto-fire-dropper
    desc: HTML Help Shortcut control auto-fired on load
    crit: hostile
    conf: 0.97
    all:
      - id: htmlhelp-shortcut-command-param
      - id: htmlhelp-object-auto-click
    any:
      - id: htmlhelp-shortcut-clsid
      - id: htmlhelp-hhctrl-clsid
      - id: htmlhelp-shortcut-item1-cmd-exec

  - id: htmlhelp-shortcut-auto-fire-powershell
    desc: HTML Help Shortcut auto-fires PowerShell
    crit: hostile
    conf: 0.99
    all:
      - id: htmlhelp-shortcut-command-param
      - id: htmlhelp-shortcut-item1-concat-powershell
      - id: htmlhelp-object-auto-click
    any:
      - id: htmlhelp-shortcut-clsid
      - id: htmlhelp-hhctrl-clsid

  - id: htmlhelp-shortcut-powershell-webclient-dropper
    desc: HTML Help Shortcut PowerShell WebClient downloader
    crit: hostile
    conf: 0.99
    all:
      - id: htmlhelp-shortcut-item1-concat-powershell
      - id: micro-behaviors/communications/http/download/webclient::webclient-downloadfile-call

  - id: htmlhelp-auto-click-webclient-dropper
    desc: HTML Help auto-click WebClient downloader
    crit: hostile
    conf: 0.99
    all:
      - id: htmlhelp-getelement-auto-click
      - id: htmlhelp-shortcut-item1-concat-powershell
      - id: micro-behaviors/communications/http/download/webclient::webclient-downloadfile-call

  - id: htmlhelp-schtasks-webrequest-dropper
    desc: HTML Help scheduled WebRequest dropper
    crit: hostile
    conf: 0.99
    all:
      - id: htmlhelp-shortcut-command-param
      - id: htmlhelp-schtasks-create
      - id: htmlhelp-hidden-powershell
      - id: htmlhelp-powershell-webrequest-iex
    any:
      - id: htmlhelp-object-auto-click
      - id: htmlhelp-onerror-auto-click

  - id: htmlhelp-shortcut-named-target
    desc: HTML Help Shortcut launches named target
    crit: hostile
    conf: 0.97
    all:
      - id: htmlhelp-shortcut-command-param
      - id: htmlhelp-shortcut-item1-named-target
    any:
      - id: htmlhelp-shortcut-clsid
      - id: htmlhelp-hhctrl-clsid

  - id: htmlhelp-autofire-schtasks-webrequest
    desc: HTML Help auto-fires scheduled loader
    crit: hostile
    conf: 0.99
    all:
      - id: htmlhelp-object-auto-click
      - id: htmlhelp-schtasks-create
      - id: htmlhelp-hidden-powershell
      - id: htmlhelp-powershell-webrequest-iex

  - id: htmlhelp-shortcut-schtasks-dropper
    desc: HTML Help Shortcut schedules payload
    crit: hostile
    conf: 0.98
    all:
      - id: htmlhelp-shortcut-item1-schtasks
      - id: htmlhelp-schtasks-create
      - id: htmlhelp-powershell-webrequest-iex

  - id: htmlhelp-hidden-shortcut-autostart
    desc: Hidden HTML Help Shortcut autostart
    crit: hostile
    conf: 0.98
    all:
      - id: htmlhelp-hidden-start-button
      - id: htmlhelp-object-auto-click
    any:
      - id: htmlhelp-shortcut-clsid
      - id: htmlhelp-hhctrl-clsid

  - id: htmlhelp-shortcut-item1-cmd-exec
    desc: HTML Help Shortcut Item1 launches process
    crit: suspicious
    conf: 0.96
    near_bytes: 512
    all:
      - id: htmlhelp-shortcut-item1-param
    any:
      - id: htmlhelp-shortcut-item1-cmd
      - id: htmlhelp-shortcut-item1-powershell
      - id: htmlhelp-shortcut-item1-schtasks
      - id: htmlhelp-shortcut-item1-script-host
      - id: htmlhelp-shortcut-item1-lolbin
