# HTML Help "ShortCut" active-content dropper.
#
# A common CHM-phishing technique embeds an `<OBJECT>` element using
# the HTML Help Shortcut control's CLSID
# `52a2aaae-085d-4187-97ea-8c30db990436`. The control's `ShortCut`
# command is configured (via `<PARAM name="Command" value="ShortCut">`
# and `<PARAM name="Item1" value=",cmd.exe,/c …">`) to launch an
# arbitrary process — typically `cmd.exe /c powershell -Command …`
# that downloads and runs a payload from a hard-coded URL. The OBJECT
# is then auto-fired with `x.Click()` from inline JavaScript when the
# CHM opens its first HTML page.
#
# Reference: T1218.001 (Compiled HTML File). The technique works on
# any CHM that the user double-clicks; legitimate help files never
# need the Shortcut control.
#
# Atoms here match against the embedded HTML inside the CHM (cleave
# treats the inner pages as `html` files); composites further up tie
# this to specific campaigns.
defaults:
  platforms: [windows]
  for: [html]
  attack: "T1218.001"
  mbc: "E1218"

traits:
  - id: htmlhelp-shortcut-clsid
    desc: HTML Help Shortcut ActiveX CLSID
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'classid\s*=\s*["'']clsid:\s*52a2aaae-085d-4187-97ea-8c30db990436'

  - id: htmlhelp-shortcut-command-param
    desc: PARAM Command=ShortCut for HTML Help control
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '<PARAM[^>]{0,200}name\s*=\s*["'']Command["''][^>]{0,200}value\s*=\s*["'']ShortCut["'']'

  - id: htmlhelp-shortcut-item1-param
    desc: PARAM Item1 for HTML Help control
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '<PARAM[^>]{0,200}name\s*=\s*["'']Item1["'']'

  - id: htmlhelp-shortcut-item1-cmd
    desc: HTML Help Shortcut launches cmd
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'value\s*=\s*["''][,;]?cmd(\.exe)?\b'

  - id: htmlhelp-shortcut-item1-powershell
    desc: HTML Help Shortcut launches PowerShell
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'value\s*=\s*["''][,;]?powershell(\.exe)?\b'

  - id: htmlhelp-shortcut-item1-script-host
    desc: HTML Help Shortcut launches script host
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'value\s*=\s*["''][,;]?(wscript|cscript)(\.exe)?\b'

  - id: htmlhelp-shortcut-item1-lolbin
    desc: HTML Help Shortcut launches LOLBin
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'value\s*=\s*["''][,;]?(mshta|rundll32)(\.exe)?\b'

  - id: htmlhelp-object-auto-click
    desc: "HTML Help OBJECT auto-clicked via inline"
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\b([a-zA-Z_][a-zA-Z0-9_]{0,20})\.Click\s*\(\s*\)'

composite_rules:
  - id: htmlhelp-shortcut-cmd-dropper
    desc: HTML Help Shortcut control launches cmd payload
    crit: hostile
    conf: 0.99
    all:
      - id: htmlhelp-shortcut-clsid
      - id: htmlhelp-shortcut-command-param
      - id: htmlhelp-shortcut-item1-cmd-exec

  - id: htmlhelp-shortcut-auto-fire-cmd-dropper
    desc: HTML Help Shortcut auto-fires cmd payload on load
    crit: hostile
    conf: 0.995
    all:
      - id: htmlhelp-shortcut-cmd-dropper
      - id: htmlhelp-object-auto-click

  # Binary-agnostic auto-fire dropper. `Command=ShortCut` PARAM plus an
  # inline `x.Click()` auto-fire is the invariant weaponization; the third
  # leg corroborates it as the HTML Help Shortcut control via EITHER the
  # ActiveX CLSID OR an Item1 process launch. This catches DPRK CHM lures
  # that (a) invoke PowerShell via a path/env-var form the Item1 token list
  # misses, or (b) omit/vary the CLSID. No legitimate help file auto-fires
  # a ShortCut control.
  - id: htmlhelp-shortcut-auto-fire-dropper
    desc: HTML Help Shortcut control auto-fired on load
    crit: hostile
    conf: 0.97
    all:
      - id: htmlhelp-shortcut-command-param
      - id: htmlhelp-object-auto-click
    any:
      - id: htmlhelp-shortcut-clsid
      - id: htmlhelp-shortcut-item1-cmd-exec

  - id: htmlhelp-shortcut-item1-cmd-exec
    desc: HTML Help Shortcut Item1 launches process
    crit: suspicious
    conf: 0.96
    near_bytes: 512
    all:
      - id: htmlhelp-shortcut-item1-param
    any:
      - id: htmlhelp-shortcut-item1-cmd
      - id: htmlhelp-shortcut-item1-powershell
      - id: htmlhelp-shortcut-item1-script-host
      - id: htmlhelp-shortcut-item1-lolbin
