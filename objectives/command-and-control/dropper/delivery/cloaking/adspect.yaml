defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1105
  mbc: B0009.016

composite_rules:
  - id: adspect-cloaked-js-loader
    desc: Adspect cloaked JavaScript loader
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/evasion/decoy/cloaking::adspect-server-controlled-routing
    any:
      - id: objectives/evasion/decoy/cloaking::adspect-remote-js-execution
      - id: objectives/evasion/decoy/cloaking::adspect-remote-content-injection
      - id: objectives/evasion/decoy/cloaking::adspect-remote-content-actions
      - id: objectives/command-and-control/infrastructure/domain/tld::suspicious-php-endpoint
