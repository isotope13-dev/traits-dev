defaults:
  platforms: [windows]
  for: [text, lnk]
  attack: T1105
traits:
  - id: internet-shortcut-header
    desc: Windows InternetShortcut file
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "[InternetShortcut]"
  - id: url-shortcut-basename
    desc: URL shortcut file extension
    crit: component
    conf: 0.95
    if:
      type: path
      basename: true
      regex: '(?i)\.url$'
  - id: url-shortcut-http-target
    desc: URL shortcut HTTP target
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)^URL=https?://.{1,180}$'
  - id: url-shortcut-archive-target
    desc: URL shortcut downloads archive
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)^URL=https?://.{1,160}\.(zip|7z|rar)$'
  - id: url-shortcut-zip-icon
    desc: URL shortcut uses ZIP icon
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)^IconFile=.{0,160}zipfldr\.dll$'
  - id: url-shortcut-document-lure-name
    desc: URL shortcut document lure name
    crit: suspicious
    conf: 0.9
    if:
      type: path
      basename: true
      regex: '(?i)\.(pdf|docx?|xlsx?|rtf)\.url$'
composite_rules:
  - id: url-shortcut-archive-download-lure
    desc: URL shortcut archive download lure
    crit: suspicious
    conf: 0.96
    all:
      - id: internet-shortcut-header
      - id: url-shortcut-basename
      - id: url-shortcut-archive-target
    any:
      - id: url-shortcut-zip-icon
      - id: url-shortcut-document-lure-name
