defaults:
  platforms: [windows]
  attack: T1204.002

traits:
  - id: search-ms-remote-unc-location
    desc: search-ms opens remote UNC location
    crit: suspicious
    conf: 0.98
    for: [html]
    if:
      type: text
      regex: '(?i)search-ms:[^"'']{0,80}crumb=location:\\\\'
  - id: search-ms-auto-redirect
    desc: HTML auto-redirects to search-ms
    crit: suspicious
    conf: 0.95
    for: [html]
    if:
      type: text
      substr: 'setTimeout(function(){location.href="search-ms:'

composite_rules:
  - id: search-ms-remote-share-lure
    desc: search-ms remote share lure
    crit: hostile
    conf: 0.99
    for: [html]
    all:
      - id: search-ms-remote-unc-location
    any:
      - id: search-ms-auto-redirect
      - id: micro-behaviors/communications/ip::external-ipv4-script

  - id: search-connector-external-ip-delivery
    desc: Search Connector external IP delivery
    crit: hostile
    conf: 0.98
    for: [documents, data]
    all:
      - id: micro-behaviors/communications/http/webdav::search-connector-description
      - id: micro-behaviors/communications/http/webdav::search-connector-simple-location
      - id: micro-behaviors/communications/http/webdav::search-connector-http-ip-url

  - id: rar-search-connector-document-lure
    desc: RAR carries Search Connector document lure
    crit: hostile
    conf: 0.97
    for: [rar]
    all:
      - id: metadata/file/magic::rar-v5
      - id: micro-behaviors/data/archive/rar::search-connector-member-extension
      - id: micro-behaviors/data/archive/rar::document-lure-search-connector-member
