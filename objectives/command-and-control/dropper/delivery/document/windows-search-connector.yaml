defaults:
  platforms: [windows]
  attack: T1204.002

traits:
  - id: search-ms-remote-unc-location
    desc: search-ms opens remote UNC location
    crit: suspicious
    conf: 0.98
    for: [html]
    if:
      type: text
      regex: '(?i)search-ms:[^"'']{0,80}crumb=location:\\\\'
  - id: search-ms-query-invoice
    desc: search-ms invoice query parameter
    crit: component
    conf: 0.92
    for: [html]
    if:
      type: text
      substr: search-ms:query=Invoice
  - id: search-ms-displayname-onedrive
    desc: search-ms OneDrive displayname text
    crit: suspicious
    conf: 0.95
    for: [html]
    if:
      type: text
      substr: displayname=OneDrive%20-%20Invoices
  - id: invoice-portal-onedrive-title
    desc: OneDrive invoice portal title
    crit: suspicious
    conf: 0.95
    for: [html]
    if:
      type: text
      substr: Invoice Portal - Microsoft OneDrive
  - id: invoice-documents-heading
    desc: Invoice documents heading text
    crit: suspicious
    conf: 0.9
    for: [html]
    if:
      type: text
      exact: Invoice Documents
  - id: shared-invoice-documents-lure
    desc: Shared invoice documents lure
    crit: suspicious
    conf: 0.92
    for: [html]
    if:
      type: text
      exact: Click below to view your shared invoice documents
  - id: onedrive-shared-note
    desc: Shared via OneDrive note
    crit: suspicious
    conf: 0.92
    for: [html]
    if:
      type: text
      exact: Shared via Microsoft OneDrive
  - id: search-ms-auto-redirect
    desc: HTML auto-redirects to search-ms
    crit: suspicious
    conf: 0.95
    for: [html]
    if:
      type: text
      substr: 'setTimeout(function(){location.href="search-ms:'

composite_rules:
  - id: search-ms-remote-share-lure
    desc: search-ms remote share lure
    crit: hostile
    conf: 0.99
    for: [html]
    all:
      - id: search-ms-remote-unc-location
    any:
      - id: search-ms-auto-redirect
      - id: search-ms-displayname-onedrive
      - id: invoice-portal-onedrive-title
      - id: shared-invoice-documents-lure

  - id: search-ms-onedrive-brand-lure
    desc: search-ms OneDrive brand lure
    crit: hostile
    conf: 0.98
    for: [html]
    all:
      - id: search-ms-remote-unc-location
    any:
      - id: search-ms-displayname-onedrive
      - id: invoice-portal-onedrive-title
      - id: onedrive-shared-note

  - id: search-ms-invoice-document-lure
    desc: search-ms invoice document lure
    crit: hostile
    conf: 0.98
    for: [html]
    all:
      - id: search-ms-remote-unc-location
    any:
      - id: search-ms-query-invoice
      - id: invoice-documents-heading
      - id: shared-invoice-documents-lure

  - id: search-connector-external-ip-delivery
    desc: Search Connector external IP delivery
    crit: hostile
    conf: 0.98
    for: [documents, data]
    all:
      - id: micro-behaviors/communications/http/webdav::search-connector-description
      - id: micro-behaviors/communications/http/webdav::search-connector-simple-location
      - id: micro-behaviors/communications/http/webdav::search-connector-http-ip-url

  - id: rar-search-connector-document-lure
    desc: RAR carries Search Connector document lure
    crit: hostile
    conf: 0.97
    for: [rar]
    all:
      - id: metadata/file/magic::rar-v5
      - id: micro-behaviors/data/archive/rar::search-connector-member-extension
      - id: micro-behaviors/data/archive/rar::document-lure-search-connector-member
