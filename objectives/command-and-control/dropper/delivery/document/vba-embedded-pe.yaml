defaults:
  for: [vbs]
  platforms: [windows]
  crit: suspicious
  conf: 0.92
traits:
  - id: mz-header-string
    desc: MZ PE header string in VBA source
    conf: 0.95
    if:
      type: string_value
      exact: "4D5A"
  - id: shell-execute-method
    desc: ShellExecute method invocation
    conf: 0.9
    if:
      type: string_value
      regex: "(?i)\\bShellExecute\\b"
  - id: exe-extension-write
    desc: EXE extension in file path string
    conf: 0.9
    if:
      type: raw
      regex: '(?i)[A-Za-z0-9_.-]+\.exe'
composite_rules:
  - id: vba-drop-and-execute-pe
    desc: VBA drops and executes PE file
    crit: hostile
    conf: 0.98
    all:
      - id: exe-extension-write
    any:
      - id: micro-behaviors/fs/write/vba::vba-open-for-output
      - id: metadata/lang::scripting-fso
      - id: metadata/lang::adodb-stream
    needs: 1
  - id: vba-hardcoded-pe-payload
    desc: VBA with hardcoded PE payload data
    crit: hostile
    conf: 0.97
    all:
      - id: mz-header-string
      - id: micro-behaviors/data/encode/char-code::array-payload-reconstruction
