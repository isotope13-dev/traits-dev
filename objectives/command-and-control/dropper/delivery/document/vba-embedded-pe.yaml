defaults:
  for:
  - vbs
  platforms:
  - windows
  crit: suspicious
  conf: 0.92
traits:
- id: mz-header-string
  desc: MZ PE header string in VB-family script
  conf: 0.95
  if:
    type: string_literal
    exact: 4D5A
- id: exe-extension-write
  desc: EXE extension in file path string
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)[A-Za-z0-9_-]+\.exe\b
  not:
  - regex: "(?i)Proxycfg\\.Exe"
  - regex: "(?i)\\w+Handler\\.Exe"
  - regex: "(?i)\\w+Generator\\.Exe"
composite_rules:
- id: vba-drop-and-execute-pe
  desc: VB-family script drops and executes PE file
  crit: hostile
  conf: 0.98
  all:
  - id: exe-extension-write
  - id: objectives/execution/interpreter/vbscript/interpreter::wscript-host-exec
  any:
  - id: micro-behaviors/fs/write/stream::adodb-save-to-file
  - id: micro-behaviors/fs/write/stream::adodb-save-to-file-unicode
  - id: objectives/command-and-control/dropper/execution/wsh::wsh-copyfile-call
  - id: micro-behaviors/fs/write/vba::vba-open-for-output
  unless:
  - id: well-known/lib/benign-runtime-bundles/
- id: obfuscated-vbs-drop-and-hidden-run-pe
  desc: Obfuscated VBScript drops PE and runs it hidden
  crit: hostile
  conf: 0.97
  all:
  - id: vba-drop-and-execute-pe
  - id: objectives/command-and-control/dropper/execution/wsh::wsh-run-hidden-zero
  any:
  - id: objectives/command-and-control/dropper/execution/wsh::wsh-runner-call
  - id: objectives/anti-static/obfuscation/string/anomaly::script-host-line-bloat
- id: vba-hardcoded-pe-payload
  desc: VB-family script with hardcoded PE payload data
  crit: hostile
  conf: 0.97
  all:
  - id: mz-header-string
  - id: micro-behaviors/data/encode/char-code::array-payload-reconstruction
