defaults:
  attack: T1203
  mbc: "B0009.029"
  platforms: [windows, unix]
  for: [rtf]
composite_rules:
  - id: obfuscated-activex-remote-fetch
    desc: Obfuscated RTF ActiveX remote fetch
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/anti-static/obfuscation/document/rtf::axeminvurl89-obfuscation-flood
      - id: metadata/document/rtf/ole::null-objclass-placeholder
      - id: metadata/document/rtf/ole::activex-objocx-feature
  - id: obfuscated-activex-multi-object
    desc: Obfuscated RTF with multiple hidden ActiveX objects
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/anti-static/obfuscation/document/rtf::axeminvurl89-obfuscation-flood
      - id: metadata/document/rtf/ole::multiple-activex-objects
      - id: metadata/document/rtf/ole::activex-objocx-feature
  - id: obfuscated-hidden-ole-exploit
    desc: Obfuscated RTF with hidden OLE exploit objects
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/document/rtf::axeminvurl89-obfuscation-flood
      - id: metadata/document/rtf/ole::multiple-activex-objects
      - id: metadata/document/rtf/ole::null-objclass-placeholder
