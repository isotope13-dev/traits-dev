defaults:
  for: [documents]
  platforms: [windows]
composite_rules:
  - id: excel4-obfuscated-dropper-stager
    desc: Obfuscated Excel 4.0 dropper stager
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/document/office/macro::excel4-ooxml-macrosheet
      - id: metadata/document/office/macro::excel4-veryhidden-sheet
      - id: metadata/document/office/macro::excel4-auto-open-name
      - id: micro-behaviors/process/create/macro/office::formula-fill-runtime-write
      - id: micro-behaviors/process/create/macro/office::run-dispatch-chain
      - id: objectives/anti-static/obfuscation/document::excel4-style-keyed-char-obfuscation
    any:
      - id: objectives/anti-analysis/timing/document::excel4-day-keyed-decryption
      - id: objectives/anti-analysis/sandbox-detect/document::excel4-environment-keyed-macro
