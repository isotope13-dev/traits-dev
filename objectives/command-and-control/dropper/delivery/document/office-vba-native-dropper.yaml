defaults:
  platforms: [windows]
  for: [oledoc, ooxml]
  attack: T1105

composite_rules:
  - id: auto-open-vba-stream-dropper
    desc: Auto-open VBA stream file dropper
    crit: hostile
    conf: 0.99
    attack: T1059.005
    all:
      - id: micro-behaviors/process/create/macro/office::raw-auto-open-entrypoint
      - id: micro-behaviors/fs/write/file/stream::vba-adodb-stream-file-write
      - id: micro-behaviors/process/create/shell/lang::vba-windows-shell-run
