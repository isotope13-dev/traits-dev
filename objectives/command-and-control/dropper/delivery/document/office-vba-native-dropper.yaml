defaults:
  platforms: [windows]
  for: [oledoc, ooxml]
  attack: T1105

composite_rules:
  - id: auto-open-vba-stream-dropper
    desc: Auto-open VBA stream file dropper
    crit: hostile
    conf: 0.99
    attack: T1059.005
    all:
      - id: micro-behaviors/process/create/macro/office::raw-auto-open-entrypoint
      - id: micro-behaviors/fs/write/file/stream::vba-adodb-stream-file-write
      - id: micro-behaviors/process/create/shell/lang::vba-windows-shell-run
  - id: concealed-ooxml-vba-container
    desc: Concealed OOXML VBA container
    crit: suspicious
    conf: 0.98
    attack: T1027
    all:
      - id: objectives/anti-static/obfuscation/document/macro::ooxml-vba-sparse-content-concealment
      - id: metadata/document/office/markup::ooxml-executable-archive-member
      - id: metadata/document/office/macro::office-vba-project-value
  - id: ooxml-vba-veryhidden-compressed-stage
    desc: Macro workbook stages compressed data in a hidden worksheet
    crit: hostile
    conf: 0.98
    attack: "T1027,T1059.005,T1204.002"
    all:
      - id: objectives/anti-static/obfuscation/document/macro::ooxml-vba-veryhidden-worksheet
      - id: metadata/document/office/macro::excel-sharedstrings-part
      - id: metadata/document/office/markup::ooxml-executable-archive-member
      - id: metadata/document/office/markup::ooxml-eightfold-compression-expansion
