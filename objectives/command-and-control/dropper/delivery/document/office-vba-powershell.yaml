defaults:
  for: [documents]
  platforms: [windows]
traits: []
composite_rules:
  - id: office-vba-hidden-userform-stager
    desc: Word UserForm hidden stager
    crit: suspicious
    conf: 0.98
    all:
      - id: metadata/document/office/macro::word-vba-project
      - id: metadata/document/office/macro::forms-textbox-payload-surface
      - id: micro-behaviors/process/create/shell/lang::createobject-call
  - id: office-vba-comspec-url-dropper
    desc: Office VBA COMSPEC URL dropper
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint
      - id: micro-behaviors/process/create/shell/invoke::wscript-shell
      - id: micro-behaviors/process/create/shell/lang::createobject-call
      - id: micro-behaviors/process/create/shell/lang::comspec-batch-stager
      - id: micro-behaviors/process/create/shell/lang::multi-url-download-list
      - id: objectives/anti-static/obfuscation/document/ui-controls::cmd-env-substring-expansion
  - id: office-vba-webclient-powershell-dropper
    desc: Office VBA WebClient PowerShell dropper
    crit: suspicious
    conf: 0.99
    all:
      - id: office-vba-comspec-url-dropper
      - id: micro-behaviors/communications/http/download::webclient-downloadfile-office-vba
    any:
      - id: micro-behaviors/process/create/shell/lang::multi-url-download-list
      - id: micro-behaviors/process/create/shell/lang::public-exe-drop-path
  - id: office-vba-wmi-powershell-stager
    desc: Office VBA WMI PowerShell stager
    crit: suspicious
    conf: 0.99
    all:
      - id: office-vba-hidden-userform-stager
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint
      - id: micro-behaviors/process/create/shell/lang::powershell-encoded-flag-junked
      - id: objectives/anti-static/obfuscation/wmi::wmi-process-startup-obfuscated
      - id: objectives/anti-static/obfuscation/document::office-vba-qwuhd-stager
