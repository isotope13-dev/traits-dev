defaults:
  platforms: [windows]
composite_rules:
  - id: office-vba-encrypted-embedded-dropper
    desc: Office VBA encrypted payload dropper
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/document/office::ooxml-word-vba-embedded-ole
      - id: metadata/document/office::ooxml-word-encrypted-embedded-payload
      - id: micro-behaviors/process/create/shell/lang::autoopen-entrypoint-universal
      - id: micro-behaviors/process/create/shell/lang::office-vba-embedded-ole-extract
      - id: micro-behaviors/process/create/shell/lang::office-vba-open-encrypted-document
      - id: micro-behaviors/process/create/shell/lang::second-stage-macro-name
    any:
      - id: objectives/anti-analysis/timing/document::office-vba-sandbox-delay
      - id: micro-behaviors/process/create/shell/lang::office-vba-string-fragmentation
      - id: metadata/document/office::ooxml-word-external-image-fetch
