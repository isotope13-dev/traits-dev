defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1204.002

composite_rules:
  - id: xls-stdolelink-vba-delivery
    desc: XLS document delivers StdOleLink with VBA project metadata
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/execution/interpreter/document::stdolelink-dangerous-clsid
      - id: metadata/document/ole::vba-project-metadata
      - id: objectives/evasion/masquerade/document::basename-xls-extension
    any:
      - id: objectives/evasion/masquerade/document::compobj-claims-excel
      - id: metadata/document/ole::ole-high-entropy
