defaults:
  platforms: [windows]
  for: [oledoc]
  attack: T1204.002

composite_rules:
  - id: xls-obfuscated-stdolelink-delivery
    desc: Excel document delivers a remote payload through an obfuscated StdOleLink
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/execution/interpreter/document::stdolelink-obfuscated-remote-execution
      - id: metadata/document/office/container::basename-xls-extension
    any:
      - id: metadata/document/office/container::compobj-claims-excel
      - id: metadata/document/office/macro::ole-compound-file
