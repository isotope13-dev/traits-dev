# Python multi-stage delivery patterns: stage 1 retrieves config or stage 2
# from a non-HTTP channel (DNS TXT, image steganography, /sync-style API)
# before the actual payload is fetched/executed.
#
# These complement the existing stego (delivery/stego/) and infrastructure
# (channel/tunnel/, infrastructure/ip/stego-c2.yaml) traits which focus on
# binary stego — this file covers script-side multi-stage retrieval.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1105
  mbc: B0023

traits:
  # Stage-2 URL retrieved from DNS TXT record. Indicator: dnspython resolve
  # for type='TXT' followed by base64/hex decoding of the response.
- id: dns-txt-config-retrieve
  desc: Stage-2 config retrieved from DNS TXT record
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'dns\.resolver\.(resolve|query)\s*\([^)\n]{0,200}["'']TXT["'']'

  # JSON config endpoint retrieval where the config drives staging:
  # response field "url" / "endpoint" / "stage" is fed back into a download.
  #
  # Atoms must match URL-shaped path components (leading `/`) or
  # JSON-key shapes — bare words like `init` / `auth` / `data` show
  # up in every Python stdlib file and cause cross-file FPs.
- id: stage-config-endpoint-retrieve--config-json
  desc: config.json endpoint literal
  crit: component
  conf: 0.85
  if:
    type: string_literal
    word: config.json
- id: stage-config-endpoint-retrieve--session-path
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: string_literal
    regex: '"session_id"|''session_id'''
- id: stage-config-endpoint-retrieve--api-v-path
  desc: Versioned API path literal
  crit: component
  conf: 0.85
  if:
    type: string_literal
    regex: "/api/v[0-9]"
- id: stage-config-endpoint-retrieve--stage-path
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: string_literal
    regex: '"stage_url"|''stage_url'''
- id: stage-config-endpoint-retrieve--auth-path
  desc: Authentication endpoint literal
  crit: component
  conf: 0.85
  if:
    type: string_literal
    regex: '"auth_token"|''auth_token'''
- id: stage-config-endpoint-retrieve--data-path
  desc: Data endpoint literal
  crit: component
  conf: 0.85
  if:
    type: string_literal
    regex: '"data_url"|''data_url'''
- id: stage-config-endpoint-retrieve--init-path
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: string_literal
    regex: '"init_url"|''init_url'''
- id: pil-image-bit-extract
  desc: PIL bit-level extraction from image
  crit: suspicious
  conf: 0.93
  if:
    type: text
    regex: 'Image\.open\s*\([^)\n]{0,160}\)\.getdata\s*\(\s*\)'

  # Image LSB extraction shape: bit & 1 over PIL pixel data.
  # Atoms below capture concrete PIL-LSB code shape, not bare words.
- id: pil-lsb-loop--image-getdata
  desc: PIL Image.getdata pixel iteration
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(Image|image|img)\.getdata\s*\('
- id: pil-lsb-loop--image-getpixel
  desc: PIL Image.getpixel pixel access
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(Image|image|img)\.getpixel\s*\('
- id: pil-lsb-loop--lsb-bit-mask-a
  desc: Bit & 1 LSB extraction mask
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '\b(pixel|byte|val)\s*&\s*1\b'
- id: pil-lsb-loop--lsb-bit-mask-b
  desc: Short variable LSB extraction mask
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '\b(p|b)\s*&\s*1\b'
- id: exif-comment-retrieve
  desc: EXIF comment field retrieved as payload
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '_getexif\s*\(\s*\)\s*\.\s*get\s*\(\s*0x9286'

  # Pastebin/gist as stage-2 source — URL endpoints commonly used as drop boxes.
- id: pastebin-raw-fetch--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: gist.githubusercontent.com
  count_max: 1006458
- id: pastebin-raw-fetch--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: hastebin.com/raw
  count_max: 1006459
- id: pastebin-raw-fetch--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: pastebin.com/raw
  count_max: 1006460
- id: pastebin-raw-fetch--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: controlc.com
  count_max: 1006461
- id: pastebin-raw-fetch--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: paste.ee/r
  count_max: 1006462
composite_rules:
- id: multi-stage-delivery
  desc: Multi-stage payload delivery (any form)
  crit: suspicious
  conf: 0.94
  any:
  - id: dns-txt-config-retrieve
  - id: stage-config-endpoint-retrieve
  - id: pil-image-bit-extract
  - id: pil-lsb-loop
  - id: exif-comment-retrieve
  - id: pastebin-raw-fetch

  # Stage-1 retrieve + stage-2 exec is the canonical two-stage pattern.
- id: two-stage-fetch-and-exec
  desc: Stage-2 retrieved then executed
  crit: hostile
  conf: 0.96
  all:
  - id: multi-stage-delivery
  any:
  - id: micro-behaviors/process/create/subprocess
  - id: micro-behaviors/process/interpreter/python::exec-builtin
  - id: micro-behaviors/process/interpreter/python::eval-builtin
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::python-test-file
    - id: metadata/package/testing/presence/harness/
  unless:
    - id: well-known/lib/scikit-learn
    - id: well-known/lib/psutil/
    - id: well-known/app/piglit
- id: stage-config-endpoint-retrieve
  desc: Config endpoint retrieved before stage-2 fetch
  crit: suspicious
  conf: 0.85
  near_lines: 80
  all:
  - id: stage-config-endpoint-retrieve--config-source
  - id: stage-config-endpoint-retrieve--stage-control
  unless:
  - id: metadata/library/data::pulumi-python-provider-generated
- id: stage-config-endpoint-retrieve--config-source
  desc: Config source endpoint marker
  crit: component
  any:
  - id: metadata/package/config::stage-config-endpoint-retrieve--manifest-json
  - id: stage-config-endpoint-retrieve--config-json
  - id: stage-config-endpoint-retrieve--api-v-path
- id: stage-config-endpoint-retrieve--stage-control
  desc: Stage control endpoint marker
  crit: component
  any:
  - id: stage-config-endpoint-retrieve--stage-path
  - id: stage-config-endpoint-retrieve--data-path
  - id: stage-config-endpoint-retrieve--init-path
  - id: stage-config-endpoint-retrieve--auth-path
  - id: stage-config-endpoint-retrieve--session-path
- id: pil-lsb-loop
  desc: PIL LSB extraction loop
  crit: suspicious
  conf: 0.94
  near_lines: 30
  all:
  - id: pil-lsb-loop--lsb-bit-mask
  any:
  - id: pil-lsb-loop--image-getdata
  - id: pil-lsb-loop--image-getpixel
- id: pil-lsb-loop--lsb-bit-mask
  desc: Bit & 1 LSB extraction mask
  crit: component
  conf: 0.85
  any:
  - id: pil-lsb-loop--lsb-bit-mask-a
  - id: pil-lsb-loop--lsb-bit-mask-b
- id: pastebin-raw-fetch
  desc: Pastebin/gist raw URL fetched for stage-2
  crit: suspicious
  conf: 0.92
  near_lines: 40
  all:
  - id: pastebin-raw-url
  - id: pastebin-fetch-capability
  unless:
  - id: metadata/lang/source/
- id: pastebin-raw-url
  desc: Pastebin/gist raw URL marker
  crit: component
  any:
  - id: pastebin-raw-fetch--rx-12
  - id: pastebin-raw-fetch--rx-13
  - id: pastebin-raw-fetch--rx-14
  - id: pastebin-raw-fetch--rx-15
  - id: pastebin-raw-fetch--rx-16
- id: pastebin-fetch-capability
  desc: HTTP client fetch capability
  crit: component
  any:
  - id: micro-behaviors/communications/http/request/client/
  - id: micro-behaviors/communications/http/lib/requests/
