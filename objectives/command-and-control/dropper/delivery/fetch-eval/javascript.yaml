  any:
  - id: new-function-body-named-buffer
  - id: new-function-body-named-payload
  not:
  - substr: '"use strict"'
  - substr: "'use strict'"
  - substr: "new Function(this.args("
  - substr: "new Function('return this')"
  - substr: 'new Function("return this")'
- id: dynamic-fetch-constructor-eval
  desc: Function constructor executes a dynamically-built fetch call
  # A bare `Function(...)()` (or `new Function(...)()`) sink combined with a
  # string literal that starts a `fetch(` call is the textbook runtime-fetch
  # construction pattern used by JS supply-chain droppers to defeat static
  # URL/HTTP scanning.
  crit: hostile
  conf: 0.97
  attack: T1059.007
  mbc: B0009.016
  near_lines: 40
  all:
  - id: objectives/anti-static/obfuscation/string/encoding::js-function-call
  - id: fetch-call-literal-string
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
