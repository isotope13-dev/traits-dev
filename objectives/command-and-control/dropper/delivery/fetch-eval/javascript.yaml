  - id: well-known/lib/duckdb::duckdb-library
  - id: well-known/lib/pdfjs::pdfjs-bundle
  - id: well-known/app/browser-extension::known-wallet-extension-bundle
  - id: well-known/app/setup-bun::setup-bun-action-bundle
