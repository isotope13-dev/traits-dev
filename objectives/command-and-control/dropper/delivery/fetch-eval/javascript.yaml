  - id: well-known/tool/detection/security-scanner/
# Two-step remote loader: assign a fetched object's `.content` into a binding,
# then immediately `eval(...)` that binding. Common for gist/paste JSON APIs
# where the response is `{files: {name: {content: "..."}}}` rather than raw JS.
- id: fetch-content-field-eval-loader
  desc: Fetched .content field executed via eval
  crit: hostile
  conf: 0.97
  attack: T1059.007,T1105
  mbc: B0009.016
  near_bytes: 512
  all:
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: eval-json-content-field
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/manifest::test-fixtures
  downgrade:
    any:
    - id: metadata/library/structure::js-large-module-bundle
    - id: metadata/package/quality/false-positives::benign-build-tooling-context

# A browser extension that both sends page-derived content to a remote LLM and
# immediately invokes JavaScript returned by that service has a remote-code
# execution path spanning its content script and background worker.
- id: extension-remote-ai-page-code-execution
  desc: All-site extension executes JavaScript returned by a remote LLM
  crit: hostile
  conf: 0.98
  attack: T1105,T1059.007
  scope: archive
  for: [xpi, crx, zip, archives]
  all:
  # Provider-agnostic: naming one vendor's host meant swapping the base URL to
  # any other OpenAI-compatible provider evaded the rule entirely.
  - id: micro-behaviors/communications/http/llm::llm-chat-api-endpoint
  - id: micro-behaviors/data/source/dynamic/eval::new-function-iife
  - id: micro-behaviors/communications/ipc/message::chrome-runtime-send-message
  - id: metadata/permission/manifest::permission-all-urls
  # Page content is fed to the model that supplies the executed code — the leg
  # that makes this a prompt-injectable RCE path rather than a fixed API call.
  # Either indicator suffices; requiring one specific message field name meant
  # renaming that property defeated the rule.
  any:
  - id: micro-behaviors/ui/window/manage/enumerate::page-script-element-enumeration
  - id: micro-behaviors/communications/ipc/message::chrome-runtime-page-dom-field
