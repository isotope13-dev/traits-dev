# Fetch-to-eval dropper pattern
# Detects code that fetches remote JSON and executes the response via Function constructor
# Common in npm supply-chain malware: fetch(c2) → response.json() → new Function(data.field)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  crit: notable
  conf: 0.8
  attack: T1105
traits:
- id: remote-code-helper-identifier
  desc: Remote-code fetch helper identifier
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\b(fetchRemote[A-Za-z0-9_$]*|getRemote(Code|Log)Url)\b'
  unless:
    - id: metadata/package/testing/harness/runtime/
    - id: metadata/package/testing/presence/fixture::test-filename-pattern
- id: fetch-atob-json-callback
  desc: fetch decodes URL then parses JSON
  crit: component
  conf: 0.92
  if:
    type: text
    regex: fetch\s*\(\s*atob\s*\(.{1,80}\)\s*\)[\s\S]{0,160}\.json\s*\(
- id: eval-json-content-field
  desc: Assigns .content then immediately evals
  crit: suspicious
  conf: 0.96
  attack: T1059.007
  # Covers both `const x = obj.content; eval(x)` and nested
  # `const x = data.files[name].content; eval(x)` gist/API shapes.
  if:
    type: text
    regex: '=\s*[^\n;]{0,120}\.content\s*;\s*eval\s*\('
- id: eval-direct-json-content
  desc: eval directly executes JSON content
  crit: suspicious
  conf: 0.98
  attack: T1059.007
  if:
    type: text
    regex: \beval\s*\(\s*[A-Za-z_$][\w$]*\.content\s*\)
- id: eval-response-data-content
  desc: eval executes HTTP response content
  crit: suspicious
  conf: 0.98
  attack: T1059.007
  if:
    type: text
    regex: \beval\s*\(\s*[A-Za-z_$][\w$]*\.data\.content(_[A-Za-z0-9_$]+)?\s*\)
- id: json-parse-body-call
  desc: JSON.parse body call
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\bJSON\.parse\s*\(\s*body\s*\)'
- id: function-result-invoked-require
  desc: Generated function invoked with require
  crit: component
  conf: 0.92
  attack: T1059.007
  if:
    type: text
    regex: \b[A-Za-z_$][\w$]*\(\s*require\s*\)
  unless:
  - id: metadata/package/testing/
- id: function-require-response-data-ast
  desc: Function executes HTTP response data
  crit: suspicious
  conf: 0.98
  attack: T1059.007
  # `new Function("require", resp.data)` — the Function constructor built with a
  # literal `require` parameter and an HTTP-response `.data` body. The token
  # sequence is distinctive enough as source text.
  if:
    type: text
    regex: 'new\s+Function\s*\(\s*[''"]require[''"][\s\S]{0,80}\.data\b'
- id: request-callback-b-param
  desc: Request callback exposes body parameter
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\breq\s*\([^)]{1,80},\s*\([^)]{0,30},\s*[^)]{0,30},\s*b\s*\)\s*=>'
- id: function-constructor-require-b
  desc: Function constructor uses body variable
  crit: suspicious
  conf: 0.96
  attack: T1059.007
  if:
    type: text
    regex: 'Function\.constructor\)?\s*\(\s*[''"]require[''"]\s*,\s*b\s*\)'
- id: json-message-base64-decode
  desc: Decodes JSON message payload
  crit: component
  conf: 0.96
  attack: T1140
  if:
    type: text
    regex: "\\.message[\\s\\S]{0,220}Buffer\\.from\\s*\\([^)]{1,80}['\"]base64['\"]"
  unless:
  - id: micro-behaviors/process/interpreter/vm/
  - id: metadata/library/runtime::acquire-vscode-api
- id: function-require-decoded-code
  desc: Executes decoded code with require
  crit: suspicious
  conf: 0.97
  attack: T1059.007
  if:
    type: text
    regex: "new\\s+Function\\s*\\(\\s*['\"]require['\"][^)]{1,120}\\)\\s*\\(\\s*require\\s*\\)"
- id: object-values-to-validation-handler
  desc: JSON object values routed to handler
  crit: component
  conf: 0.86
  if:
    type: text
    regex: Object\.keys\(\w+\)\.forEach\(\w+\s*=>\s*\w+\(\w+\[\w+\]\)\)
- id: await-fetch-text-eval
  desc: eval awaits fetched response text
  crit: suspicious
  conf: 0.98
  attack: T1059.007
  if:
    type: text
    regex: eval\s*\(\s*await\s*\(\s*await\s+fetch\(.{1,120}\)\)\.text\(\)\s*\)
# Point-free form: `.then(eval)` hands the resolved value straight to eval —
# after a fetch chain that is the response body executed as code. No legitimate
# code pipes a promise result into the global eval.
- id: then-eval-pointfree
  desc: Promise resolution piped into eval
  crit: suspicious
  conf: 0.92
  attack: T1059.007
  if:
    type: text
    regex: '\.then\s*\(\s*eval\s*\)'
  unless:
  - id: well-known/lib/benign-runtime-bundles::node-source-tree
  # Cited in prose, not executed: a JSDoc/`//` comment line, or the
  # pseudocode-ellipsis form `fetch(...).then(eval)` that runbooks and
  # security notes use to WARN against this idiom. Real remote-eval loaders
  # pass a live URL/binding, never a literal `(...)`.
  - type: text
    regex: '(?m)\(\s*\.\.\.\s*\)\s*\.then\s*\(\s*eval\s*\)|^\s*(//|\*).{0,120}\.then\s*\(\s*eval\s*\)'
- id: userjs-endpoint
  desc: User JavaScript endpoint path
  crit: component
  conf: 0.9
  if:
    type: string_literal
    substr: /api/userjs/
- id: fetch-text-function-code
  desc: Fetched text executed as Function
  crit: suspicious
  conf: 0.96
  attack: T1059.007
  if:
    type: text
    regex: 'fetch\s*\(\s*["'']https?://[\s\S]{0,240}\.text\(\)[\s\S]{0,120}new Function\(\s*code\s*\)'
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/manifest::test-fixtures
- id: recursive-retry-pattern
  desc: Recursive function retry on failure
  crit: component
  conf: 0.7
  if:
    type: text
    regex: if \(\w+ > 0\) \{\s+\w+\(\w+ - 1\)
- id: url-string-concatenation
  desc: URL built from protocol separator domain
  crit: component
  conf: 0.65
  if:
    type: text
    regex: protocol.{0,30}separator.{0,30}domain.{0,30}path
- id: post-method-literal-string
  desc: Literal string contains a POST method fragment
  crit: component
  conf: 0.85
  if:
    type: literal
    kind: string
    regex: method\s*:\s*['"]POST['"]
- id: axios-atob-data-content
  desc: Axios decoded URL content fetch
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'axios\.get\s*\(\s*atob\s*\(\s*\w+\s*\)\s*\)[\s\S]{0,40}\.data\.content'
- id: axios-get-atob-url
  desc: Axios GET uses Base64-decoded URL
  crit: suspicious
  conf: 0.96
  attack: T1105,T1140
  if:
    type: text
    regex: 'axios\.get\s*\(\s*atob\s*\(\s*[A-Za-z_$][A-Za-z0-9_$]*\s*\)\s*\)'
- id: node-module-instance-compile
  desc: Node module instance compile
  crit: notable
  conf: 0.96
  attack: T1059.007
  if:
    type: text
    regex: '\._compile\s*\(\s*\w+\s*,\s*["''][^"'']{1,40}\.js'
- id: node-error-js-module-facade
  desc: Fake error.js module facade
  crit: component
  conf: 0.95
  attack: T1036
  if:
    type: text
    regex: 'new\s+\w+\.Module\s*\(\s*["'']error\.js'
