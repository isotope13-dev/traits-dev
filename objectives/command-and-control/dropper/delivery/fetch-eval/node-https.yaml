# Node.js https.request → eval(<dynamic>) loader pattern.
# The fetch-to-eval composites in fetch-to-eval.yaml require fetch();
# packages that use Node's built-in https module to deliver remote
# JavaScript also belong to this attack class.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1105
traits:
- id: response-end-then-eval
  desc: Response end handler then eval
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'on\s*\(\s*["'']end["''][^;]{0,400}eval\s*\('
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/manifest::test-fixtures
composite_rules:
- id: node-https-eval-loader
  desc: Node https.request response evaluated
  crit: hostile
  conf: 0.96
  attack: T1059.007
  mbc: B0009.016
  all:
  - id: micro-behaviors/communications/http/request/client::https-request
  - id: objectives/execution/interpreter/eval/dynamic::eval-variable
  any:
  - id: response-end-then-eval
  - id: micro-behaviors/communications/http/request/client::request-write-call
  - id: objectives/discovery/system/fingerprint/hardware::node-platform
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/manifest::test-fixtures
