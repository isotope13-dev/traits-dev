defaults:
  platforms: [unix, windows]
  for: [documents, data, javascript]
  attack: T1105
  mbc: B0009.016
traits:
- id: json-cookie-js-source-field
  desc: JSON cookie field contains JavaScript
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '["'']cookie["'']\s*:\s*["''](const|let|var|function)\s+[A-Za-z_$]'
- id: json-cookie-obfuscated-loop
  desc: JSON cookie contains decoder loop
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '["'']cookie["''][\s\S]{0,500}while\s*\(\s*!!\s*\[\s*\]\s*\)[\s\S]{0,500}push'
- id: json-cookie-hidden-stage-options
  desc: JSON cookie contains hidden stage
  crit: component
  conf: 0.97
  if:
    type: text
    substr: windowsHide
- id: json-cookie-stage-repeat-or-detach--detached
  desc: JSON cookie repeats or detaches stage (detached)
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '["'']cookie["'']\s*:\s*["''][\s\S]{0,900}\bdetached\b'
- id: json-cookie-stage-repeat-or-detach--unref
  desc: JSON cookie repeats or detaches stage (unref)
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '["'']cookie["'']\s*:\s*["''][\s\S]{0,900}\bunref\b'
composite_rules:
- id: json-cookie-stage-repeat-or-detach
  desc: JSON cookie repeats or detaches stage
  crit: component
  conf: 0.9
  any:
  - id: json-cookie-stage-repeat-or-detach--detached
  - id: micro-behaviors/time/schedule/interval::setInterval
  - id: json-cookie-stage-repeat-or-detach--unref
- id: json-cookie-obfuscated-stage
  desc: JSON cookie wraps obfuscated stage
  crit: hostile
  conf: 0.995
  all:
  - id: json-cookie-js-source-field
  - id: json-cookie-obfuscated-loop
  - id: json-cookie-hidden-stage-options
  any:
  - id: json-cookie-stage-repeat-or-detach
