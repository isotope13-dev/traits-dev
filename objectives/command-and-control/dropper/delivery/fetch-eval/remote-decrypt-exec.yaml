# Remote responses are decrypted and passed to a shell interpreter.
# This is an execution chain, not a generic HTTP or cryptography observation.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1105,T1059.007,T1027.013
  mbc: B0024,B0032

composite_rules:
  - id: remote-response-endpoint
    desc: Remote or encoded response endpoint
    crit: component
    conf: 0.95
    any:
      - id: micro-behaviors/communications/http/url/domain::js-remote-host-url
      - id: micro-behaviors/communications/http/url/php-endpoint::url-php-endpoint-encoded

  - id: remote-decrypt-shell-execution
    desc: Remote response decrypted and executed as a shell command
    crit: hostile
    conf: 0.99
    near_lines: 40
    all:
      - id: micro-behaviors/crypto/symmetric/decrypt::cryptojs-block-cipher-decrypt-call
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: objectives/command-and-control/dropper/delivery/fetch-eval::remote-response-endpoint
    any:
      - id: micro-behaviors/process/create/shell/bridge::js-exec
      - id: micro-behaviors/process/interpreter/eval::js-base64-decoded-computed-call
    unless:
      - id: metadata/package/testing/

  - id: javascript-encoded-remote-command-loader
    desc: JavaScript hides a remote command loader behind encoded strings
    crit: hostile
    conf: 0.995
    attack: T1105,T1059.007,T1027
    all:
      - id: micro-behaviors/communications/http/url/php-endpoint::url-php-endpoint-encoded
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/process/interpreter/eval::js-base64-decoded-computed-call
      - id: objectives/anti-static/obfuscation/string/encoding::js-b64-encoded-require
    unless:
      - id: metadata/package/testing/
