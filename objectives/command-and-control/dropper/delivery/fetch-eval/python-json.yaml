defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1105
  mbc: E1105
traits:
  # response-json-call / raise-for-status relocated to
  # micro-behaviors/communications/http/lib/requests (standard requests Response
  # methods, neutral); referenced cross-directory by the composites below.
  - id: json-message-field
    desc: Extracts payload from JSON message field
    crit: component
    conf: 0.9
    if:
      type: text
      regex: \.get\(['"]message['"]

  - id: json-cmd-field
    desc: Extracts command from JSON field
    crit: component
    conf: 0.94
    attack: T1059.001
    if:
      type: text
      regex: json\.loads\([^)]{1,80}\)\.get\(['"]cmd['"]\)

  - id: checksum-named-loader-function
    desc: Checksum function hides loader behavior
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: _verify_checksum_integrity

composite_rules:
  - id: json-message-base64-exec
    desc: Fetches base64 code from JSON and executes it
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: micro-behaviors/communications/http/lib/requests::response-json-call
      - id: json-message-field
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/process/interpreter/python::exec-builtin

  - id: checked-json-message-base64-exec
    desc: Validates HTTP response, extracts JSON payload, and executes decoded code
    crit: hostile
    conf: 0.995
    all:
      - id: json-message-base64-exec
      - id: micro-behaviors/communications/http/lib/requests::raise-for-status
    any:
      - id: objectives/anti-static/obfuscation/string/encoding::bytes-fromhex-call
      - id: micro-behaviors/data/encode/hex::hex-encoded-https

  - id: jsonkeeper-hidden-powershell-loader
    desc: JSONKeeper command launches hidden PowerShell
    crit: hostile
    conf: 0.98
    attack: "T1105, T1059.001, T1027"
    mbc: "B0030, B0009"
    all:
      - id: objectives/command-and-control/infrastructure/paste::jsonkeeper-b64-endpoint
      - id: json-cmd-field
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen
      - id: micro-behaviors/process/create/subprocess::popen-content
      - id: micro-behaviors/process/daemonize/spawn::powershell-hidden

  - id: insecure-json-command-powershell
    desc: Insecure JSON command launches PowerShell
    crit: hostile
    conf: 0.98
    attack: "T1105, T1059.001, T1553.004"
    all:
      - id: micro-behaviors/communications/socket/ssl::tls-validation-fully-disabled
      - id: json-cmd-field
      - id: micro-behaviors/process/create/subprocess::popen-content
      - id: objectives/execution/interpreter/script/wsh::execution-policy-bypass

  - id: disguised-checksum-json-command-loader
    desc: Disguised checksum function stages command
    crit: hostile
    conf: 0.97
    attack: "T1105, T1059.001"
    all:
      - id: checksum-named-loader-function
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/data/serialize/json::json-loads-call
      - id: json-cmd-field
      - id: micro-behaviors/process/create/subprocess::popen-content
