defaults:
  platforms: [windows]
  for: [powershell, batch, pe, csharp]
  attack: T1105
  mbc: E1105
traits:
- id: curl-follow-output-download
  desc: curl downloads output file
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '(?i)\bcurl(\.exe)?\b[^\r\n]{0,120}-L[^\r\n]{0,120}-o\b'
- id: bitsadmin-transfer-output
  desc: bitsadmin transfer output file
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '(?i)\bbitsadmin\b[^\r\n]{0,160}/transfer\b'
  unless:
  - id: objectives/command-and-control/dropper/delivery/download-fallback/
- id: fallback-set-url-arg
  desc: Download fallback SET URL arg
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(?i)\bSET\s+URL=%1\b'
- id: fallback-where-curl
  desc: Download fallback checks curl.exe
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(?i)\bWHERE\s+curl\.exe\b'
- id: fallback-bitsadmin-transfer
  desc: Download fallback uses bitsadmin transfer
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(?i)\bbitsadmin\s+/transfer\b'
- id: fallback-curl-retry-dest
  desc: Download fallback curl retry to DEST
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(?i)\bcurl\s+--retry\s+5\b[^\r\n]{0,120}-o\s+"%DEST%"'
- id: plugin-payload-target
  desc: Plugin payload download target
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(?i)\\(TEMP|Windows\\Temp)\\[^\\/\r\n]{1,80}\.exe|\\whealth\\'
- id: python-downloader-user-agent
  desc: PythonDownloader User-Agent string
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: PythonDownloader
- id: dated-archive-payload-url
  desc: Dated archive payload URL
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: 'https?://[A-Za-z0-9.-]{4,80}/[A-Z]{2}[0-9]{12,16}\.zip'
- id: powershell-tls-cert-bypass-download
  desc: PowerShell TLS bypass download
  crit: suspicious
  conf: 0.9
  if:
    type: trait
    id: powershell-tls-cert-bypass-download-parts
- id: powershell-tls12-setting
  desc: PowerShell sets TLS 1.2
  crit: component
  conf: 0.8
  if:
    type: text
    substr: SecurityProtocolType]::Tls12
- id: powershell-cert-validation-callback
  desc: PowerShell certificate callback
  crit: component
  conf: 0.85
  if:
    type: text
    substr: ServerCertificateValidationCallback
- id: mill-launcher-download-context
  desc: Mill launcher download context
  crit: component
  conf: 0.9
  for: [batch]
  if:
    type: text
    regex: '(?i)MILL_DOWNLOAD_(URL|FILE|PATH)'
composite_rules:
- id: curl-bitsadmin-download-fallback-context
  desc: Curl and bitsadmin download fallback context
  crit: notable
  conf: 0.92
  all:
  - id: fallback-set-url-arg
  - id: micro-behaviors/process/create/shell/batch::normalizepath-label-call
  - id: fallback-where-curl
  - id: fallback-bitsadmin-transfer
  - id: fallback-curl-retry-dest
  near_bytes: 8192
- id: powershell-tls-cert-bypass-download-parts
  desc: PowerShell TLS bypass download parts
  crit: suspicious
  conf: 0.9
  all:
  - id: powershell-tls12-setting
  - id: powershell-cert-validation-callback
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::iwr-name
  unless:
  - id: well-known/app/posh-ovirt/
- id: multi-method-payload-download
  desc: Multi-method payload download fallback
  crit: suspicious
  conf: 0.95
  needs: 2
  any:
  - id: curl-follow-output-download
  - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
  - id: bitsadmin-transfer-output
  unless:
  - id: objectives/command-and-control/dropper/delivery/download-fallback/
  - id: mill-launcher-download-context
- id: plugin-download-fallback-chain
  desc: Plugin download fallback chain
  crit: hostile
  conf: 0.97
  all:
  - id: multi-method-payload-download
  - id: plugin-payload-target
  any:
  - id: objectives/command-and-control/infrastructure/domain/tunnel::cloudflare-tunnel
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::iwr-name
  - id: objectives/command-and-control/dropper/execution/batch::bitsadmin-download
- id: native-download-fallback-chain
  desc: Native redundant payload download fallback
  crit: suspicious
  conf: 0.96
  needs: 2
  any:
  - id: micro-behaviors/communications/http/get::wininet-read-file-src
  - id: micro-behaviors/communications/http/get::url-download-to-file-str
  - id: micro-behaviors/communications/http/download/cli::iwr-outfile-download
  - id: powershell-tls-cert-bypass-download-parts
  - id: python-downloader-user-agent
  unless:
  - id: well-known/app/posh-ovirt/
  downgrade:
    any:
    - id: metadata/binary/vendor/
    - id: well-known/app/internet-explorer/
- id: archive-download-fallback-loader
  desc: Redundant dated archive payload downloader
  crit: hostile
  conf: 0.98
  all:
  - id: native-download-fallback-chain
  - id: dated-archive-payload-url
  any:
  - id: python-downloader-user-agent
  - id: powershell-tls-cert-bypass-download-parts
