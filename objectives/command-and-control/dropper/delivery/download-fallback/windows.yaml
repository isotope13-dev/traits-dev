defaults:
  platforms: [windows]
  for: [powershell, batch, pe, csharp]
  attack: T1105
  mbc: E1105
traits:
- id: curl-follow-output-download
  desc: curl downloads output file
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '(?i)\bcurl(\.exe)?\b[^\r\n]{0,120}-L[^\r\n]{0,120}-o\b'
- id: powershell-outfile-download
  desc: PowerShell downloads output file
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: '(?i)(Invoke-WebRequest|iwr)[^\r\n]{0,160}-(OutFile|o)\b'
- id: bitsadmin-transfer-output
  desc: bitsadmin transfer output file
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '(?i)\bbitsadmin\b[^\r\n]{0,160}/transfer\b'
- id: plugin-payload-target
  desc: Plugin payload download target
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(?i)\\(TEMP|Windows\\Temp)\\[^\\/\r\n]{1,80}\.exe|\\whealth\\'
- id: python-downloader-user-agent
  desc: PythonDownloader User-Agent string
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: PythonDownloader
- id: dated-archive-payload-url
  desc: Dated archive payload URL
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: 'https?://[A-Za-z0-9.-]{4,80}/[A-Z]{2}[0-9]{12,16}\.zip'
- id: powershell-tls-cert-bypass-download
  desc: PowerShell TLS bypass download
  crit: suspicious
  conf: 0.9
  if:
    type: trait
    id: powershell-tls-cert-bypass-download-parts
- id: powershell-tls12-setting
  desc: PowerShell sets TLS 1.2
  crit: component
  conf: 0.8
  if:
    type: text
    substr: SecurityProtocolType]::Tls12
- id: powershell-cert-validation-callback
  desc: PowerShell certificate callback
  crit: component
  conf: 0.85
  if:
    type: text
    substr: ServerCertificateValidationCallback
composite_rules:
- id: powershell-tls-cert-bypass-download-parts
  desc: PowerShell TLS bypass download parts
  crit: suspicious
  conf: 0.9
  all:
  - id: powershell-tls12-setting
  - id: powershell-cert-validation-callback
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::iwr-name
- id: multi-method-payload-download
  desc: Multi-method payload download fallback
  crit: suspicious
  conf: 0.95
  needs: 2
  any:
  - id: curl-follow-output-download
  - id: powershell-outfile-download
  - id: bitsadmin-transfer-output
- id: plugin-download-fallback-chain
  desc: Plugin download fallback chain
  crit: hostile
  conf: 0.97
  all:
  - id: multi-method-payload-download
  - id: plugin-payload-target
  any:
  - id: objectives/command-and-control/infrastructure/domain/tunnel::cloudflare-tunnel
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::iwr-name
  - id: objectives/command-and-control/dropper/execution/batch::bitsadmin-download
- id: native-download-fallback-chain
  desc: Native redundant payload download fallback
  crit: suspicious
  conf: 0.96
  needs: 2
  any:
  - id: micro-behaviors/communications/http/get::wininet-read-file-src
  - id: micro-behaviors/communications/http/get::url-download-to-file-str
  - id: powershell-outfile-download
  - id: powershell-tls-cert-bypass-download-parts
  - id: python-downloader-user-agent
  downgrade:
    any:
    - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
    - id: well-known/app/internet-explorer::internet-explorer-frame-component
- id: archive-download-fallback-loader
  desc: Redundant dated archive payload downloader
  crit: hostile
  conf: 0.98
  all:
  - id: native-download-fallback-chain
  - id: dated-archive-payload-url
  any:
  - id: python-downloader-user-agent
  - id: powershell-tls-cert-bypass-download-parts
