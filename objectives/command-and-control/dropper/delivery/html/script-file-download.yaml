defaults:
  platforms: [windows]
  for: [html]
  attack: T1204.002

traits:
  - id: html-downloads-wsf
    desc: HTML downloads WSF script
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '\.download\s*=\s*["''][^"'']{0,60}\.wsf["'']'
  - id: html-downloads-cmd
    desc: HTML downloads CMD script
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '\.download\s*=\s*["''][^"'']{0,60}\.cmd["'']'
  - id: html-atob-decoder
    desc: HTML decodes base64 content
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: atob(
  - id: html-double-click-script-instruction
    desc: HTML instructs double-click script
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)Double-click[^<\r\n]{0,80}\.(wsf|hta|vbs|cmd)'

composite_rules:
  - id: html-script-download-file
    desc: HTML downloads script file
    crit: suspicious
    conf: 0.96
    any:
      - id: html-downloads-wsf
      - id: html-downloads-cmd
  - id: html-generated-script-dropper
    desc: HTML generates script dropper
    crit: hostile
    conf: 0.98
    mbc: "B0023"
    all:
      - id: micro-behaviors/communications/http/download/handler::browser-forced-download
      - id: html-script-download-file
    any:
      - id: html-atob-decoder
      - id: micro-behaviors/process/create/flags::powershell-policy-bypass-flag
      - id: html-double-click-script-instruction
