defaults:
  platforms: [windows]
  for: [html]
  attack: T1204.002
  mbc: F0007

traits:
  - id: fetches-remote-lnk
    desc: HTML fetches remote LNK
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'fetch\s*\(\s*[''"]https?://[^''"]{1,180}\.lnk[''"]\s*\)'
      case_insensitive: true
  - id: rename-download-to-lnk
    desc: Instructs renaming download to LNK
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: (?i)\.download.{0,24}rename.{0,16}\.lnk
  - id: invoice-ready-heading
    desc: Invoice ready heading text
    crit: component
    conf: 0.9
    if:
      type: text
      exact: Invoice Ready
  - id: download-invoice-button
    desc: Download invoice button text
    crit: component
    conf: 0.9
    if:
      type: text
      exact: Download Invoice
  - id: invoice-document-ready-text
    desc: Invoice document ready text
    crit: component
    conf: 0.92
    if:
      type: text
      exact: Your invoice document is ready. Click below to download.

composite_rules:
  - id: invoice-download-lure
    desc: Invoice download lure text
    crit: suspicious
    conf: 0.94
    any:
      - id: invoice-ready-heading
      - id: download-invoice-button
      - id: invoice-document-ready-text
  - id: html-shortcut-blob-dropper
    desc: HTML fetches and drops shortcut
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/dropper/delivery/html::drive-by-fetch-blob
      - id: objectives/command-and-control/dropper/delivery/html::drive-by-create-anchor
      - id: objectives/command-and-control/dropper/delivery/html::drive-by-anchor-click
      - id: objectives/command-and-control/dropper/delivery/html::drive-by-download-attribute-shortcut
    any:
      - id: fetches-remote-lnk
      - id: micro-behaviors/communications/ip/literal::http-ip-url
  - id: html-shortcut-extension-coercion
    desc: HTML coerces browser shortcut save
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/dropper/delivery/html::drive-by-download-attribute-shortcut
      - id: rename-download-to-lnk
  - id: html-invoice-shortcut-lure
    desc: Invoice lure fronts shortcut download
    crit: hostile
    conf: 0.98
    all:
      - id: invoice-download-lure
      - id: objectives/command-and-control/dropper/delivery/html::drive-by-download-attribute-shortcut
    any:
      - id: fetches-remote-lnk
      - id: rename-download-to-lnk
