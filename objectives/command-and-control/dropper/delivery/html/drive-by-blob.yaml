# HTML drive-by-download via fetch + Blob + URL.createObjectURL +
# programmatic <a download> click chain. Each fragment is a generic
# browser API used by legitimate file-download UIs; only the chain
# (multiple fragments in proximity, with an attacker-supplied
# filename and extension) is the malicious signal. Sibling
# script-file-download.yaml covers .wsf/.cmd-specific cases; this
# file extends coverage to general document/archive/PE filenames.
defaults:
  platforms: [windows, unix]
  for: [html, javascript]
  attack: T1204.002
  mbc: F0007
traits:
  - id: drive-by-fetch-blob
    desc: fetch().blob() response unwrap
    crit: component
    conf: 0.7
    if:
      type: text
      regex: 'fetch\s*\([^)]{0,200}\)[^.]{0,40}\.then\s*\([^)]{0,80}\.blob\s*\(\s*\)'
  - id: drive-by-create-anchor
    desc: createElement anchor for download
    crit: component
    conf: 0.7
    if:
      type: text
      regex: 'createElement\s*\(\s*[''"]a[''"]\s*\)'
  - id: drive-by-download-attribute-archive
    desc: a.download attribute set to archive
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.download\s*=\s*[''"][^''"]{1,80}\.(zip|rar|7z|iso|img|vhd)[''"]'
      case_insensitive: true
  - id: drive-by-download-attribute-pe
    desc: a.download attribute set to PE/installer
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\.download\s*=\s*[''"][^''"]{1,80}\.(exe|msi|hta|jse|wsf)[''"]'
      case_insensitive: true
  - id: drive-by-download-attribute-doc
    desc: a.download attribute set to document
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '\.download\s*=\s*[''"][^''"]{1,80}\.(pdf|docx?|xlsx?|pptx?)[''"]'
      case_insensitive: true
  - id: drive-by-anchor-click
    desc: Programmatic anchor click trigger
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '[a-zA-Z_$][\w$]{0,40}\.click\s*\(\s*\)'
composite_rules:
  - id: html-fetch-blob-download-chain
    desc: HTML drive-by fetch+Blob+download chain
    crit: hostile
    conf: 0.97
    needs: 3
    any:
      - id: drive-by-fetch-blob
      - id: drive-by-create-anchor
      - id: drive-by-download-attribute-archive
      - id: drive-by-download-attribute-pe
      - id: drive-by-download-attribute-doc
      - id: drive-by-anchor-click
      - id: objectives/command-and-control/dropper/delivery/html::html-blob-constructor
      - id: objectives/command-and-control/dropper/delivery/html::html-object-url-download
