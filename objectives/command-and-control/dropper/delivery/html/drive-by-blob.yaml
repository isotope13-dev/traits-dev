# HTML drive-by-download via fetch + Blob + URL.createObjectURL +
# programmatic <a download> click chain. Each fragment is a generic
# browser API used by legitimate file-download UIs; only the chain
# (multiple fragments in proximity, with an attacker-supplied
# filename and extension) is the malicious signal. Sibling
# script-file-download.yaml covers .wsf/.cmd-specific cases; this
# file extends coverage to general document/archive/PE filenames.
defaults:
  platforms: [windows, unix]
  for: [html, javascript]
  attack: T1204.002
  mbc: F0007
traits:
- id: drive-by-fetch-blob
  desc: fetch().blob() response unwrap
  crit: component
  conf: 0.7
  if:
    type: text
    regex: 'fetch\s*\([^)]{0,200}\)[^.]{0,40}\.then\s*\([^)]{0,80}\.blob\s*\(\s*\)'
- id: drive-by-create-anchor
  desc: createElement anchor for download
  crit: component
  conf: 0.7
  if:
    type: text
    regex: 'createElement\s*\(\s*[''"]a[''"]\s*\)'
- id: drive-by-download-attribute-archive--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\.download\s*=\s*[''"][^''"]{1,80}\.(zip|rar)[''"]'
    case_insensitive: true
  count_max: 1007585
- id: drive-by-download-attribute-archive--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\.download\s*=\s*[''"][^''"]{1,80}\.(7z|iso)[''"]'
    case_insensitive: true
  count_max: 1007586
- id: drive-by-download-attribute-archive--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '\.download\s*=\s*[''"][^''"]{1,80}\.(img|vhd)[''"]'
    case_insensitive: true
  count_max: 1007587
- id: drive-by-download-attribute-pe--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\.download\s*=\s*[''"][^''"]{1,80}\.(exe|msi)[''"]'
    case_insensitive: true
  count_max: 1007588
- id: drive-by-download-attribute-pe--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\.download\s*=\s*[''"][^''"]{1,80}\.(hta|jse)[''"]'
    case_insensitive: true
  count_max: 1007589
- id: drive-by-download-attribute-pe--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\.download\s*=\s*[''"][^''"]{1,80}\.(wsf)[''"]'
    case_insensitive: true
  count_max: 1007590
- id: drive-by-download-attribute-appref
  desc: a.download attribute set to appref-ms
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: '\.download\s*=\s*[''"][^''"]{1,80}\.appref-ms[''"]'
    case_insensitive: true
- id: drive-by-download-attribute-doc
  desc: a.download attribute set to document
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: '\.download\s*=\s*[''"][^''"]{1,80}\.(pdf|docx?|xlsx?|pptx?)[''"]'
    case_insensitive: true
- id: drive-by-download-attribute-shortcut
  desc: a.download attribute set to shortcut
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: '\.download\s*=\s*[''"][^''"]{1,80}\.lnk[''"]'
    case_insensitive: true
- id: drive-by-anchor-click
  desc: Programmatic anchor click trigger
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '[a-zA-Z_$][\w$]{0,40}\.click\s*\(\s*\)'
  not:
    - regex: '\w*(Ref|Input|Button|Menu|Modal|Form|Field|Element)\w*\.click\s*\('
    - regex: 'fileInput\w*\.click\s*\('
    - regex: 'inputRef\w*\.click\s*\('
    - regex: 'current\.click\s*\('
composite_rules:
- id: html-fetch-blob-download-chain
  desc: HTML fetches remote content into a programmatic download chain
  crit: suspicious
  conf: 0.9
  all:
  - id: drive-by-fetch-blob
  - id: drive-by-create-anchor
  - id: drive-by-anchor-click
  any:
  - id: drive-by-download-attribute-archive
  - id: drive-by-download-attribute-pe
  - id: drive-by-download-attribute-appref
  - id: drive-by-download-attribute-doc
  - id: drive-by-download-attribute-shortcut
- id: html-appref-ms-blob-dropper
  desc: HTML drops ClickOnce appref-ms launcher
  crit: hostile
  conf: 0.98
  all:
  - id: drive-by-download-attribute-appref
  - id: drive-by-anchor-click
  - id: objectives/command-and-control/dropper/delivery/html::html-blob-constructor
  - id: objectives/command-and-control/dropper/delivery/html::html-atob-decoder
- id: drive-by-download-attribute-archive
  desc: a.download attribute set to archive
  crit: suspicious
  conf: 0.92
  any:
  - id: drive-by-download-attribute-archive--rx-1
  - id: drive-by-download-attribute-archive--rx-2
  - id: drive-by-download-attribute-archive--rx-3
- id: drive-by-download-attribute-pe
  desc: a.download attribute set to PE/installer
  crit: suspicious
  conf: 0.95
  any:
  - id: drive-by-download-attribute-pe--rx-4
  - id: drive-by-download-attribute-pe--rx-5
  - id: drive-by-download-attribute-pe--rx-6
