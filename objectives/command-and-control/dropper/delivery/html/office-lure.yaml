defaults:
  platforms: [windows, unix]
  for: [html]
  attack: T1204.002
  mbc: F0007
  crit: suspicious
  conf: 0.9

traits:
- id: anchor-download-attribute
  desc: HTML anchor download attribute
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: <a[^>]{0,120}\bdownload\b
    case_insensitive: true
# A bare "Ctrl+O" is the universal Open-file shortcut and appears in countless
# benign help files (e.g. WinRAR.chm). It only signals a lure inside the
# macro-delivery composites below (paired with a remote macro download link),
# so it carries no standalone intent — component, not suspicious.
- id: browser-open-shortcut
  desc: Browser reopen shortcut instruction
  crit: component
  conf: 0.95
  if:
    type: text
    regex: (?i)\bCtrl\s*\+\s*O\b
- id: downloads-macro-reopen-instruction
  desc: Downloads folder macro reopen instruction
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: (?i)\bDownloads?\b.{0,40}\.(docm|dotm)\b
- id: redownload-decrypted-claim
  desc: Decrypted redownload social claim
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: (?i)\bre-?download\b.{0,40}\bdecrypted\b
- id: encrypted-cloud-share-lure
  desc: Encrypted cloud share lure text
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: (?i)\bEncrypted\b.{0,24}\bShared\b.{0,24}\bDropbox\b
- id: secure-share-language
  desc: Secure file sharing lure text
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (?i)\bsecurely shared with you\b

composite_rules:
- id: remote-macro-download-link
  desc: HTML remote macro document download link
  crit: suspicious
  conf: 0.96
  all:
  - id: micro-behaviors/communications/http/url/path::office-macro-document-url
  - id: anchor-download-attribute
- id: macro-reopen-instructions
  desc: Browser instructions reopen macro document
  crit: suspicious
  conf: 0.96
  all:
  - id: browser-open-shortcut
  - id: downloads-macro-reopen-instruction
- id: html-macro-delivery-lure
  desc: HTML lure delivers remote macro document
  crit: hostile
  conf: 0.98
  all:
  - id: remote-macro-download-link
  - id: macro-reopen-instructions
- id: html-decrypted-redownload-macro-lure
  desc: HTML claims decrypted re-download of macro document
  crit: hostile
  conf: 0.98
  all:
  - id: remote-macro-download-link
  - id: redownload-decrypted-claim
- id: html-cloud-share-macro-lure
  desc: Cloud share lure fronts remote macro document
  crit: hostile
  conf: 0.97
  all:
  - id: remote-macro-download-link
  any:
  - id: encrypted-cloud-share-lure
  - id: secure-share-language
