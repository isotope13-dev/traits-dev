# SVG-based HTML smuggling. A distributed SVG (vector image) embeds a
# <script> that reconstructs an HTML document client-side and opens it via a
# Blob object URL in a new browser tab on user interaction — delivering a
# phishing page without the HTML ever traversing the network or disk as HTML.
# The image carrier and click gate evade content/URL scanners. Each browser
# API is benign alone; the SVG-script + Blob(text/html) + window.open chain is
# the smuggling signal. Sibling drive-by-blob.yaml covers fetch-based <a download>
# variants; this covers self-contained, embedded-payload SVG carriers.
defaults:
  platforms: [windows, unix]
  for: [svg, html, javascript]
  attack: T1027.006
  mbc: F0007
traits:
  - id: svg-full-viewport-style
    desc: SVG root covers full viewport
    crit: component
    conf: 0.9
    for: [svg]
    if:
      type: text
      regex: 'position\s*:\s*fixed\s*;[\s\S]{0,180}(width\s*:\s*100%|height\s*:\s*100%)'
composite_rules:
  - id: svg-embedded-html-smuggling
    desc: SVG script builds and opens HTML payload
    crit: hostile
    conf: 0.95
    attack: T1027.006, T1204.001
    all:
      - id: micro-behaviors/data/format/html::inline-svg-script-body
      - id: micro-behaviors/data/format/html::blob-html-document
      - id: micro-behaviors/ui/window/manage/dom::objecturl-open-new-tab
  - id: svg-obfuscated-remote-loader
    desc: SVG hides remote loader behind code constructor
    crit: hostile
    conf: 0.96
    attack: T1027, T1059.007, T1105
    all:
      - id: micro-behaviors/data/format/html::inline-svg-script-body
      - id: svg-full-viewport-style
      - id: objectives/execution/interpreter/eval/dynamic::svg-constructor-property-chain
      - id: micro-behaviors/data/encode/hex::svg-long-hex-string-literal
      - id: objectives/execution/interpreter/eval/dynamic::svg-base64-literal
