# SVG-based HTML smuggling. A distributed SVG (vector image) embeds a
# <script> that reconstructs an HTML document client-side and opens it via a
# Blob object URL in a new browser tab on user interaction — delivering a
# phishing page without the HTML ever traversing the network or disk as HTML.
# The image carrier and click gate evade content/URL scanners. Each browser
# API is benign alone; the SVG-script + Blob(text/html) + window.open chain is
# the smuggling signal. Sibling drive-by-blob.yaml covers fetch-based <a download>
# variants; this covers self-contained, embedded-payload SVG carriers.
defaults:
  platforms: [windows, unix]
  for: [svg, html, javascript]
  attack: T1027.006
  mbc: F0007
traits:
  - id: svg-script-element
    desc: Executable script element inside SVG image
    crit: notable
    conf: 0.8
    for: [svg]
    if:
      type: text
      regex: '<script[\s>]'
  - id: blob-html-document
    desc: Builds in-memory HTML document as Blob
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'new Blob\s*\(\s*\[[^\]]{0,200}\]\s*,\s*\{[^}]{0,80}type\s*:\s*[''"]text/html'
  - id: objecturl-open-new-tab
    desc: Opens Blob object URL in new tab
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'createObjectURL[\s\S]{0,300}window\.open'
composite_rules:
  - id: svg-embedded-html-smuggling
    desc: SVG script builds and opens HTML payload
    crit: hostile
    conf: 0.95
    attack: T1027.006, T1204.001
    all:
      - id: svg-script-element
      - id: blob-html-document
      - id: objecturl-open-new-tab
