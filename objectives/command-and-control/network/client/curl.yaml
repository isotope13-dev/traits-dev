defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
traits:
  - id: curl-cmd-dup
    desc: curl command
    crit: notable
    conf: 0.3
    if:
      type: string_value
      regex: \bcurl(\s+http|\s+--|\s+-[A-CE-Za-ce-z])
  - id: wget-cmd-dup
    desc: wget command
    crit: notable
    conf: 0.3
    if:
      type: string_value
      regex: \bwget(\s+-|\s+http|\s+--)
  - id: curl-post-x
    desc: curl -X POST
    crit: notable
    conf: 0.5
    mbc: C0002
    if:
      type: string_value
      regex: curl\s+-X\s+POST\s+-H
  - id: curl-user-header
    desc: curl with user header
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: 'curl.{0,50}-H.{0,30}user:'
  - id: curl-buildid-header
    desc: curl with BuildID header
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: curl.{0,50}-H.{0,30}BuildID
  - id: curl-form-upload
    desc: curl -F form upload
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: curl\s+.{0,50}-F\s+
  - id: curl-data-binary
    desc: curl --data-binary
    crit: notable
    conf: 0.5
    if:
      type: string_value
      regex: \bcurl\b.{0,120}--data-binary\b
  - id: curl-at-tmp
    desc: curl @/tmp/ file upload
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: curl.{0,50}@/tmp/
  - id: curl-s-flag
    desc: curl silent flag (-s)
    crit: baseline
    conf: 0.6
    if:
      type: raw
      regex: curl\s+-[a-zA-Z]*s[a-zA-Z]*\b
  - id: wget-q-flag
    desc: wget quiet flag (-q)
    crit: baseline
    conf: 0.6
    if:
      type: raw
      regex: wget\s+-[a-zA-Z]*q[a-zA-Z]*\b
  - id: wget-stdout-flag
    desc: wget stdout output flag (-O -)
    crit: baseline
    conf: 0.6
    if:
      type: raw
      regex: wget\s+[^\n]{0,40}-O\s+-
composite_rules:
  - id: client-comp
    desc: HTTP client command line tool
    crit: notable
    conf: 0.5
    any:
      - id: objectives/command-and-control/network/client::curl-cmd-dup
      - id: objectives/command-and-control/network/client::wget-cmd-dup
  - id: curl-post
    desc: curl POST with custom headers
    crit: notable
    conf: 0.7
    mbc: C0002
    any:
      - id: curl-post-x
      - id: curl-user-header
      - id: curl-buildid-header
  - id: curl-upload
    desc: curl file upload
    crit: notable
    conf: 0.6
    any:
      - id: curl-form-upload
      - id: curl-data-binary
      - id: curl-at-tmp
