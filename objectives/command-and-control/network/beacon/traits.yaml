defaults:
  attack: T1071.001
  mbc: B0030
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: beacon-keyword
    desc: "Beacon C2 protocol keyword"
    crit: notable
    conf: 0.6
    for: [shell, python, javascript, powershell, pe, elf]
    if:
      type: string
      word: "beacon"
      case_insensitive: true
  - id: compact-beacon-a
    desc: "Dense C2 patterns in compact binary"
    crit: suspicious
    conf: 0.88
    for: [elf, macho, pe]
    size_max: 100000
    count_min: 3
    per_kb_min: 0.3
    if:
      type: string
      regex: '(User-Agent:\s|Host:\s|Content-Type:\s|HTTP/1\.[01])'
composite_rules:
  - id: direct-http-c2
    desc: "Direct HTTP C2 infrastructure"
    crit: notable
    conf: 0.95
    size_max: 1500000
    all:
      - id: objectives/command-and-control/infrastructure/ip
    any:
      - id: micro-behaviors/communications/http/request
      - id: objectives/command-and-control/infrastructure/ip::port-number-constant
      - id: compact-beacon-a
      - id: micro-behaviors/communications/http/protocol::http-url-literal
    # Kernel drivers (TDI/WFP) and versioned PE files legitimately handle HTTP traffic
    downgrade:
      any:
        - id: metadata/format/pe::kernel-driver
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/format/pe::resource-only-dll
