# Swift NWConnection C2 channel patterns
defaults:
  platforms: [macos, ios]
  crit: suspicious
  attack: "T1071"
  mbc: "B0030"
  for: [macho]
composite_rules:
  - id: swift-nwconnection-c2-channel
    desc: Swift NWConnection bidirectional channel
    conf: 0.9
    all:
      - id: micro-behaviors/communications/socket/connect::nwconnection-connect
      - id: micro-behaviors/communications/socket/send::nwconnection-send
      - id: micro-behaviors/communications/socket/receive::nwconnection-receive
    downgrade:
      any:
        - id: metadata/signed/platform::apple
