# Rust Download-and-Execute Stager Patterns
# Detects Rust binaries that download payloads and execute them
# ATT&CK: T1105 (Ingress Tool Transfer)
# MBC: B0030 (Dropper/Stager)
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [elf, macho, pe]
  mbc: "B0030"
  attack: "T1105"
composite_rules:
  # Rust binary with HTTP download and execution capability
  - id: rust-stager-behavior
    desc: Rust-based downloader/stager behavior
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/lib::rust-http-client
    any:
      - id: micro-behaviors/process/create/stdlib::rust-process-exec
      - id: micro-behaviors/fs/write/stdlib::rust-fs-write
  # More specific: requires BOTH execution AND filesystem plus HTTP URL
  - id: rust-likely-stager
    desc: Likely Rust stager with download, write, and execute
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/lib::rust-http-client
      - id: objectives/command-and-control/http/protocol::http-protocol
      - id: micro-behaviors/process/create/stdlib::rust-process-exec
      - id: micro-behaviors/fs/write/stdlib::rust-fs-write
