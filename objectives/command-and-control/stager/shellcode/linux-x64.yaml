defaults:
  for:
    - elf
  platforms:
    - linux
  mbc: B0030
traits:
  - id: sockaddr-in-immediate
    desc: sockaddr_in with hardcoded IP/port
    crit: notable
    conf: 0.75
    size_max: 262144
    if:
      type: hex
      pattern: 48 b9 02 00
  - id: tiny-elf-dup
    desc: Small ELF binary (stager-sized)
    crit: notable
    conf: 0.7
    size_max: 8192
composite_rules:
  - id: linux-x64-reverse-stager
    desc: x86-64 Linux reverse shell stager
    crit: hostile
    conf: 0.95
    attack: T1059.004
    for:
      - elf
    all:
      - id: micro-behaviors/os/syscall/raw::x64-mmap-syscall
      - id: micro-behaviors/os/syscall/raw::x64-socket-syscall
      - id: micro-behaviors/os/syscall/raw::x64-connect-syscall
      - id: micro-behaviors/mem/shellcode/transfer::register-transfer
  - id: tiny-shellcode-elf
    desc: Tiny ELF with raw syscalls
    crit: hostile
    conf: 0.9
    attack: T1059
    for:
      - elf
    all:
      - id: objectives/command-and-control/stager/shellcode::tiny-elf-dup
      - id: micro-behaviors/os/syscall/raw::x64-socket-syscall
      - id: micro-behaviors/mem/shellcode/transfer::register-transfer
  - id: network-stager-hardcoded-c2
    desc: Network stager with hardcoded C2 address
    crit: hostile
    conf: 0.92
    attack: T1071.001
    for:
      - elf
    all:
      - id: micro-behaviors/os/syscall/raw::x64-socket-syscall
      - id: micro-behaviors/os/syscall/raw::x64-connect-syscall
      - id: sockaddr-in-immediate
      - id: micro-behaviors/mem/shellcode/transfer::register-transfer
  - id: linux-x64-reverse-stager-retry
    desc: x86-64 Linux reverse stager with retry
    crit: hostile
    conf: 0.95
    attack: T1059.004
    for:
      - elf
    all:
      - id: micro-behaviors/os/syscall/raw::x64-mmap-syscall
      - id: micro-behaviors/os/syscall/raw::x64-socket-syscall
      - id: micro-behaviors/os/syscall/raw::x64-connect-syscall
      - id: micro-behaviors/os/syscall/raw::x64-nanosleep-syscall
      - id: micro-behaviors/mem/shellcode/transfer::register-transfer
