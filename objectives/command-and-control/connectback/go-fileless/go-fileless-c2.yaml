defaults:
  attack: T1071.001
  platforms: [unix, windows, macos]

# Detects Go-compiled malware exhibiting ConnectBack C2 behavior and fileless execution via memfd_create.
composite_rules:
  - id: go-fileless-connectback-c2
    desc: Go connect-back malware with fileless memory launch
    crit: hostile
    conf: 0.98
    mbc: C0002
    all:
      - id: metadata/compiler::go-binary
      - id: micro-behaviors/communications/infrastructure/hardcoded/ip-port::hardcoded-ipv4-port-list
      - id: micro-behaviors/os/process/fileless-execution::memfd-fileless-runtime-flow
    any:
      - id: objectives/anti-analysis/vm/detect::cpuid-instruction
  - id: go-aggressive-behavior
    desc: Go malware with aggressive function naming and persistence
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/compiler::go-binary
      - id: micro-behaviors/data/source/function/names::aggressive-go-punishment
    any:
      - id: objectives/persistence/registry/run-key/
      - id: objectives/anti-analysis/vm/detect::cpuid-instruction
