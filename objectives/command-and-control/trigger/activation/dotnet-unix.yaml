defaults:
  platforms: [unix, windows]
  for: [csharp]
  attack: T1205

traits:
  - id: dotnet-http-trigger-endpoint
    desc: .NET HTTP trigger endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /trigger

  - id: dotnet-trigger-activation-words
    desc: .NET trigger activation words
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'execute[\s\S]{0,80}activate'
    unless:
      - id: well-known/app/windows-desktop-tools::playnite-source-file

  - id: pe-http-trigger-endpoint-token
    desc: HTTP trigger endpoint token
    crit: component
    conf: 0.78
    for: [pe]
    if:
      type: text
      substr: /trigger

  - id: pe-trigger-activate-token
    desc: Trigger activate token
    crit: component
    conf: 0.74
    for: [pe]
    if:
      type: text
      substr: activate

composite_rules:
  - id: dotnet-http-trigger-activation
    desc: .NET HTTP trigger activation
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-http-trigger-endpoint
      - id: dotnet-trigger-activation-words

  - id: dotnet-pe-http-trigger-activation
    desc: .NET PE HTTP trigger
    crit: suspicious
    conf: 0.98
    for: [pe]
    all:
      - id: metadata/binary/framework::dotnet-assembly
      - id: pe-http-trigger-endpoint-token
      - id: pe-trigger-activate-token
    unless:
      - id: well-known/tool/reverse-engineering/frida/
