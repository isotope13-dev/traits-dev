defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1205

traits:
  - id: dotnet-http-trigger-endpoint
    desc: .NET HTTP trigger endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /trigger

  - id: dotnet-trigger-activation-words
    desc: .NET trigger activation words
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'execute[\s\S]{0,80}activate'

  - id: dotnet-trigger-execute-word
    desc: .NET trigger execute word
    crit: component
    conf: 0.88
    if:
      type: text
      substr: execute

  - id: dotnet-trigger-activate-word
    desc: .NET trigger activate word
    crit: component
    conf: 0.88
    if:
      type: text
      substr: activate

composite_rules:
  - id: dotnet-http-trigger-activation
    desc: .NET HTTP trigger activation
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-http-trigger-endpoint
      - id: dotnet-trigger-activation-words

  - id: dotnet-pe-http-trigger-activation
    desc: .NET PE HTTP trigger
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-http-trigger-endpoint
      - id: dotnet-trigger-execute-word
      - id: dotnet-trigger-activate-word
