defaults:
  platforms: [linux, unix]
  for: [c, html]
traits:
  - id: syn-sequence-doc
    desc: TCP SYN knock sequence docs
    crit: notable
    conf: 0.9
    attack: "T1205"
    if:
      type: string
      substr: "send several packets (TCP SYN) to ports"
  - id: code-ports-define
    desc: hardcoded code ports define
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "#define CDR_PORTS"
  - id: code-reset-define
    desc: wrong-knock reset define
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: "CDR_CODERESET"
  - id: sender-lock-define
    desc: sender lock define
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: "CDR_SENDER_ADDR"
  - id: open-door-function
    desc: backdoor open door function
    crit: suspicious
    conf: 0.92
    if:
      type: string
      substr: "cdr_open_door"
composite_rules:
  - id: port-knock-activation
    desc: port-knock shell activation
    crit: suspicious
    conf: 0.97
    attack: "T1205"
    all:
      - id: syn-sequence-doc
      - id: code-ports-define
      - id: open-door-function
    any:
      - id: code-reset-define
      - id: sender-lock-define
      - id: micro-behaviors/communications/capture/pcap::listener
  - id: port-knock-evasion-options
    desc: port-knock anti-reset options
    crit: suspicious
    conf: 0.92
    all:
      - id: code-reset-define
      - id: sender-lock-define
