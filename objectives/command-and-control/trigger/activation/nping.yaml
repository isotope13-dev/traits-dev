defaults:
  platforms:
    - unix
  for:
    - shell
traits:
  - id: rootkit-listening-text
    desc: Rootkit listener usage text
    crit: component
    conf: 0.95
    if:
      type: text
      substr: rootkit is listening
  - id: backdoor-key-arg
    desc: Backdoor key packet argument
    crit: component
    conf: 0.95
    if:
      type: text
      substr: <Backdoor KEY>
  - id: nping-root-required
    desc: nping raw packet root requirement
    crit: component
    conf: 0.95
    if:
      type: text
      substr: nping settings we use require root
composite_rules:
  - id: nping-secret-knock-context
    desc: nping secret knock context
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/communications/benchmark/nping::source-port
      - id: micro-behaviors/communications/benchmark/nping::payload-data
    any:
      - id: rootkit-listening-text
      - id: backdoor-key-arg
      - id: nping-root-required
  - id: nping-backdoor-activation
    desc: Crafted nping packet activates backdoor
    crit: hostile
    conf: 0.98
    attack: T1205
    mbc: B0022
    all:
      - id: micro-behaviors/communications/benchmark/nping::nping
      - id: micro-behaviors/communications/benchmark/nping::tcp-mode
      - id: micro-behaviors/communications/benchmark/nping::flags-option
      - id: nping-secret-knock-context
