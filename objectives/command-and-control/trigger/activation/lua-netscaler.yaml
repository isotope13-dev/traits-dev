defaults:
  platforms: [netscaler, appliance, unix]
  for: [lua]
  attack: T1204

traits:
  - id: lua-vserver-trigger-count
    desc: Lua vserver trigger count
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'vs_count > 2|svc_count > 5'

  - id: lua-ssl-cert-trigger
    desc: Lua SSL cert trigger
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'has_ssl[\s\S]{0,120}ssl_certs'

  - id: lua-trigger-payload-build
    desc: Lua trigger payload build
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'fingerprint = fp[\s\S]{0,120}discovery = disc'

  - id: lua-deliver-on-trigger
    desc: Lua deliver on trigger
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'if evaluate_trigger\(disc\)[\s\S]{0,260}deliver\(body\)'

composite_rules:
  - id: lua-netscaler-conditional-delivery
    desc: Lua NetScaler conditional delivery
    crit: hostile
    conf: 0.98
    all:
      - id: lua-vserver-trigger-count
      - id: lua-deliver-on-trigger
    any:
      - id: lua-ssl-cert-trigger
      - id: lua-trigger-payload-build
