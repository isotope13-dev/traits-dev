defaults:
  platforms: [panos, appliance, unix]
  for: [python]
  attack: T1204

traits:
  - id: python-panos-trigger-file
    desc: Python PAN-OS trigger file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: TRIGGER_FILE = "/tmp/.sysmon_update"

  - id: python-panos-poll-trigger
    desc: Python PAN-OS poll trigger
    crit: suspicious
    conf: 0.94
    if:
      type: text
      word: poll_trigger

composite_rules:
  - id: python-panos-triggered-archive
    desc: Python PAN-OS triggered archive
    crit: hostile
    conf: 0.98
    all:
      - id: python-panos-trigger-file
      - id: python-panos-poll-trigger
      - id: objectives/exfiltration/stealer/file::python-panos-collection-tar
