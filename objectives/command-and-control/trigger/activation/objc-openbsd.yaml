defaults:
  platforms: [openbsd, bsd, unix]
  for: [objc, elf]
  attack: T1204

traits:
  - id: objc-http-trigger-request
    desc: ObjC HTTP trigger request
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "GET /trigger HTTP/1.1"

  - id: objc-trigger-marker-path
    desc: ObjC trigger marker path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.trigger_marker

composite_rules:
  - id: objc-openbsd-c2-file-trigger
    desc: ObjC C2 file trigger
    crit: hostile
    conf: 0.98
    any:
      - id: objc-http-trigger-request
      - id: objc-trigger-marker-path
    needs: 2
