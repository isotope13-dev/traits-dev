defaults:
  platforms: [routeros, appliance, unix]
  for: [perl]
  attack: T1059.006

traits:
  - id: perl-trigger-check-path
    desc: Polls C2 for activation trigger
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /trigger/check?id=

  - id: perl-trigger-fired-marker
    desc: Perl trigger fired marker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: TRIGGER_FIRED

  - id: perl-trigger-result-path
    desc: Posts command output to C2
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /trigger/result

  - id: perl-trigger-backtick-exec
    desc: Runs C2 command via backticks
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'my \$cmd = \$1;[\s\S]{0,160}`\$cmd 2>&1`'

composite_rules:
  - id: perl-triggered-command-c2
    desc: Perl triggered command C2
    crit: hostile
    conf: 0.98
    all:
      - id: perl-trigger-check-path
      - id: perl-trigger-fired-marker
      - id: perl-trigger-result-path
      - id: perl-trigger-backtick-exec
