defaults:
  platforms: [qnx, unix]
  for: [zig]
  attack: T1204

traits:
  - id: qnx-zig-trigger-file
    desc: QNX Zig trigger file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.trigger

  - id: qnx-zig-trigger-payload
    desc: QNX Zig trigger shell payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'TRIGGER_PAYLOAD[\s\S]{0,260}/bin/sh -c'

  - id: qnx-zig-trigger-execve
    desc: QNX Zig trigger execve
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'check_trigger[\s\S]{0,420}posix\.execve'

composite_rules:
  - id: qnx-zig-file-triggered-shell
    desc: QNX Zig file-triggered shell
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-zig-trigger-file
      - id: qnx-zig-trigger-payload
      - id: qnx-zig-trigger-execve
