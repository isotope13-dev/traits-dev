# Use-time activation behind an exported-API facade. Instead of an install hook
# or import-time IIFE, the payload fires when the host app *invokes* the
# package's exported function — classically an Express middleware factory that
# returns (req,res,next)=>next() but spawns/evals a stage as a side effect
# (express-denv's index.js). This evades install-hook and import-time scanners.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.007
traits:
  - id: middleware-factory-shape
    desc: Returns an Express middleware function
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'return\s*\(?\s*_?req\w*\s*,\s*_?res\w*\s*,\s*_?next\b'
composite_rules:
  - id: middleware-factory-stealth-trigger
    desc: Middleware factory triggers hidden exec
    crit: hostile
    conf: 0.9
    near_lines: 30
    all:
      - id: middleware-factory-shape
    any:
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: micro-behaviors/process/create/spawn::detached-fork
      - id: objectives/anti-static/obfuscation/eval/dynamic::iife-remote-eval
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
