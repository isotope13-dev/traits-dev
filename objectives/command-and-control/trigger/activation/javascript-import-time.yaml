# JavaScript / Node.js import-time / first-touch C2 hooks. JS equivalent
# of objectives/command-and-control/trigger/activation/python-import-time-decorator.yaml.
#
# In JS the canonical first-call shape is the higher-order-function
# (HOC) wrapper: a function takes another function and returns a wrapped
# version that runs setup once on first invocation. This is the same
# semantic role as Python's @ensure_env decorator.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1195.002
  mbc: B0024

traits:
  # `function ensureEnv(fn) { let ready = false; return (...args) => { if (!ready) { init(); ready = true; } return fn(...args); }; }`
  # AST captures the structural shape — outer fn returns inner fn that
  # closes over a one-shot `ready`/`initialized` boolean.
  - id: js-hoc-ensure-env-arrow
    desc: HOC ensure-env wrapper (arrow form)
    crit: suspicious
    conf: 0.92
    if:
      type: tree-sitter
      query: |
        (function_declaration
          name: (identifier) @outer
          parameters: (formal_parameters
            (identifier) @param)
          body: (statement_block
            (return_statement
              (arrow_function)))
          (#match? @outer "^(ensure|guard|require|init|bootstrap|setup)_?(Env|env|Runtime|runtime|Setup|setup|Deps|deps)$")
          (#eq? @param "fn"))

  # Same shape but inner is a classical function expression
  - id: js-hoc-ensure-env-classic
    desc: HOC ensure-env wrapper (classic form)
    crit: suspicious
    conf: 0.92
    if:
      type: tree-sitter
      query: |
        (function_declaration
          name: (identifier) @outer
          parameters: (formal_parameters
            (identifier) @param)
          body: (statement_block
            (return_statement
              (function_expression)))
          (#match? @outer "^(ensure|guard|require|init|bootstrap|setup)_?(Env|env|Runtime|runtime|Setup|setup|Deps|deps)$")
          (#eq? @param "fn"))

  # `process.on('exit', ...)` / `process.on('beforeExit', ...)` — the
  # JS equivalent of Python atexit.register. Used for delayed shutdown C2.
  - id: js-process-on-exit-hook
    desc: process.on exit/beforeExit hook
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bprocess\.on\s*\(\s*["''](exit|beforeExit)["'']'
    unless:
      - id: metadata/package/testing/harness/runtime::is-test

  # Side-effect-only require: `require('./_init')` whose only effect is
  # running module-top-level code. Common in Node.js stagers that hide
  # the C2 in a separate module. Kept at component because the canonical
  # CLI bin-shim pattern (`#!/usr/bin/env node` followed by `require('../lib/cli');`)
  # uses the same shape; the composite js-import-time-hook-installation
  # promotes it when paired with another import-time trigger.
  - id: js-side-effect-require
    desc: Side-effect require (no binding)
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '^\s*require\s*\(\s*["''](\./|\.\./|/)[^"''\n]{1,80}["'']\s*\)\s*;?\s*$'
    unless:
      - type: text
        regex: '^#!/usr/bin/env\s+node\b'

  # Custom Module loader hook: `require.extensions['.xyz'] = ...` or
  # Module._resolveFilename override.
  - id: js-require-extensions-mutate
    desc: require.extensions mutated (custom loader)
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'require\.extensions\s*\[\s*["''][^"''\n]{1,40}["'']\s*\]\s*='
  - id: js-module-resolvefilename-override
    desc: Module._resolveFilename override
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'Module\._resolveFilename\s*='
    not:
      - substr: "originalModuleResolveFilename"

  - id: js-exit-hook-file-read
    desc: JS exit hook reads file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'process\.on\s*\(\s*["''](exit|beforeExit)["''][^;]{0,400}readFile(Sync)?\s*\('
  - id: express-robots-route
    desc: Express robots.txt route
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '\.get\s*\(\s*["'']/robots\.txt["'']'
  - id: verify-destroy-query
    desc: verify destroy query trigger
    crit: component
    conf: 0.96
    if:
      type: text
      regex: 'req\.query\.verify\s*={2,3}\s*["'']destroy["'']'

composite_rules:
  - id: js-import-time-hook-installation
    desc: JS import-time / first-touch C2 hook installation
    crit: suspicious
    conf: 0.92
    any:
      - id: js-hoc-ensure-env-arrow
      - id: js-hoc-ensure-env-classic
      - id: js-process-on-exit-hook
      - id: js-side-effect-require
      - id: js-require-extensions-mutate
      - id: js-module-resolvefilename-override

  - id: js-import-time-network-stager
    desc: JS import-time hook runs network call
    # Notable rather than hostile: any module-top-level IIFE counts as
    # an "import-time hook" (electron preload scripts, init wrappers,
    # build tools), and the HTTP fragment match fires on string constants
    # like Content-Type values. Real stagers are still escalated when
    # paired with other malware indicators (anti-static, dropper objectives).
    crit: notable
    conf: 0.97
    all:
      - id: js-import-time-hook-installation
    any:
      - id: micro-behaviors/communications/http/post
      - id: micro-behaviors/communications/http/options
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
      - id: micro-behaviors/process/create/spawn::detached-fork
    downgrade:
      any:
        - id: metadata/package/testing/harness/runtime::is-test
        - id: metadata/package/testing/presence/harness::test-directory
    unless:
      - id: well-known/lib/node-edge::edge-network-runtime-library
  - id: express-robots-destroy-trigger
    desc: Express robots route triggers destruction
    crit: hostile
    conf: 0.99
    attack: "T1102, T1485"
    all:
      - id: express-robots-route
      - id: verify-destroy-query
      - id: objectives/impact/wipe/disk/mass-delete::node-self-destruct-src-wipe
