defaults:
  platforms: [qnx, unix]
  for: [perl]
  attack: T1204

traits:
  - id: qnx-perl-trigger-file
    desc: QNX Perl trigger file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.sys_health_check

  - id: qnx-perl-trigger-beacon
    desc: QNX Perl trigger beacon
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: beacon('triggered'

  - id: qnx-perl-report-api
    desc: QNX Perl report API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST /api/v1/report HTTP/1.1

composite_rules:
  - id: qnx-perl-triggered-worm-beacon
    desc: QNX Perl triggered worm beacon
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-trigger-file
      - id: qnx-perl-trigger-beacon
      - id: qnx-perl-report-api
