defaults:
  platforms: [unix]
  for: [kotlin, class, jar]
  attack: T1204

traits:
  # Endpoint matchers require an AST-backed route string that *terminates* at
  # the path segment (e.g. "/commands", "…/commands"). AST-backed literals
  # deliberately exclude documentation/comments such as BeanShell's
  # `importCommands("/bsh/commands")` help text.
  - id: kotlin-trigger-endpoint
    desc: Kotlin trigger endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: string_literal
      regex: '(^|/)trigger$'

  - id: kotlin-commands-endpoint
    desc: Kotlin commands endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: string_literal
      regex: '(^|/)commands$'

  - id: kotlin-timing-window-gate
    desc: Kotlin timing window gate
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: now.hour !in 2..5

composite_rules:
  - id: kotlin-timed-c2-trigger
    desc: Kotlin timed C2 trigger
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-trigger-endpoint
      - id: kotlin-commands-endpoint
    any:
      - id: kotlin-timing-window-gate
