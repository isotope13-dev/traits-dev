defaults:
  platforms: [unix]
  for: [kotlin, class, jar]
  attack: T1204

traits:
  # Endpoint matchers require the path to be a quoted HTTP route string that
  # *terminates* at the path segment (e.g. "/commands", "…/commands") — not a
  # `/commands/` directory fragment in a docs path (doc/commands/build_command.md,
  # docs.../stable/commands/build_command). A trailing slash or non-quote char
  # after the segment means it's a path component, not a C2 endpoint.
  - id: kotlin-trigger-endpoint
    desc: Kotlin trigger endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: /trigger["'`]

  - id: kotlin-commands-endpoint
    desc: Kotlin commands endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: /commands["'`]

  - id: kotlin-timing-window-gate
    desc: Kotlin timing window gate
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: now.hour !in 2..5

composite_rules:
  - id: kotlin-timed-c2-trigger
    desc: Kotlin timed C2 trigger
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-trigger-endpoint
      - id: kotlin-commands-endpoint
    any:
      - id: kotlin-timing-window-gate
