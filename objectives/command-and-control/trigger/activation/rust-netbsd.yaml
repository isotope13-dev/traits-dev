defaults:
  platforms: [netbsd, unix]
  for: [rust, elf]
  attack: T1204

traits:
  - id: rust-c2-trigger-message
    desc: Rust C2 trigger message
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: c2 trigger received

  - id: rust-beacon-trigger-path
    desc: Rust beacon trigger path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /beacon?id=

composite_rules:
  - id: rust-c2-triggered-exfil
    desc: Rust C2 triggered exfil
    crit: hostile
    conf: 0.98
    all:
      - id: rust-c2-trigger-message
      - id: rust-beacon-trigger-path
    any:
      - id: objectives/exfiltration/stealer/credential/http::rust-netbsd-credential-upload
