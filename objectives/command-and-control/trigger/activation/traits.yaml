defaults:
  platforms:
    - unix
    - windows
  for: [c, go, python, pe, elf]
traits:
  - id: icmp-rcv
    desc: ICMP receive handler
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: icmp_rcv
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: magic-0x539
    desc: Magic value 0x539 (1337)
    crit: component
    conf: 0.5
    unless:
      - type: path
        regex: '(^|[\\/])golang\.org[\\/]x[\\/]text@[^\\/]+[\\/].*tables[0-9.]*\.go$'
    if:
      type: text
      regex: '\b0x0*539\b'
  - id: revshell-keyword-upper
    desc: REVSHELL keyword (uppercase)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: REVSHELL
  - id: revshell-keyword-title
    desc: Revshell keyword (titlecase)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: Revshell
  - id: magic-1337-prefix
    desc: 1337 credential or magic marker
    crit: component
    conf: 0.5
    if:
      type: text
      regex: 1337.{0,4}(pass|key|magic)
  - id: magic-1337-suffix
    desc: Credential or magic 1337 marker
    crit: component
    conf: 0.5
    if:
      type: text
      regex: (pass|key|magic).{0,4}1337
  - id: trigger-keyword-lower-prefix
    desc: trigger keyword (lowercase prefix)
    crit: component
    conf: 0.3
    if:
      type: text
      regex: (backdoor|payload|shell).{0,2}trigger
  - id: trigger-keyword-lower-suffix
    desc: trigger keyword (lowercase suffix)
    crit: component
    conf: 0.3
    if:
      type: text
      regex: trigger.{0,2}(backdoor|payload|shell)
  - id: trigger-keyword-upper-prefix
    desc: TRIGGER keyword (uppercase prefix)
    crit: component
    conf: 0.3
    if:
      type: text
      regex: (BACKDOOR|PAYLOAD|SHELL).{0,2}TRIGGER
  - id: trigger-keyword-upper-suffix
    desc: TRIGGER keyword (uppercase suffix)
    crit: component
    conf: 0.3
    if:
      type: text
      regex: TRIGGER.{0,2}(BACKDOOR|PAYLOAD|SHELL)
  - id: trigger-keyword-title-prefix
    desc: Trigger keyword (titlecase prefix)
    crit: component
    conf: 0.3
    if:
      type: text
      regex: (Backdoor|Payload|Shell).{0,2}Trigger
  - id: trigger-keyword-title-suffix
    desc: Trigger keyword (titlecase suffix)
    crit: component
    conf: 0.3
    if:
      type: text
      regex: Trigger.{0,2}(Backdoor|Payload|Shell)
  - id: activate-keyword-lower
    desc: activate keyword (lowercase)
    crit: notable
    conf: 0.3
    if:
      type: text
      regex: backdoor.{0,2}activate|activate.{0,2}backdoor
  - id: activate-keyword-upper
    desc: ACTIVATE keyword (uppercase)
    crit: notable
    conf: 0.3
    if:
      type: text
      regex: BACKDOOR.{0,2}ACTIVATE|ACTIVATE.{0,2}BACKDOOR
  - id: activate-keyword-title
    desc: Activate keyword (titlecase)
    crit: notable
    conf: 0.3
    if:
      type: text
      regex: Backdoor.{0,2}Activate|Activate.{0,2}Backdoor
  - id: revshell-keyword-lower
    desc: revshell keyword (lowercase)
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (trigger|activate)[_\-\s]*revshell|revshell[_\-\s]*(trigger|activate)
composite_rules:
  - id: icmp-marker
    desc: ICMP packet handling marker
    any:
      - id: micro-behaviors/os/bpf/program/icmp::icmphdr-struct
      - id: icmp-rcv
  - id: magic-values
    desc: Magic trigger values
    crit: component
    any:
      - id: magic-1337-prefix
      - id: magic-1337-suffix
      - id: magic-0x539
  - id: trigger-keywords
    desc: C2 trigger activation keywords
    any:
      - id: trigger-keyword-lower-prefix
      - id: trigger-keyword-lower-suffix
      - id: trigger-keyword-upper-prefix
      - id: trigger-keyword-upper-suffix
      - id: trigger-keyword-title-prefix
      - id: trigger-keyword-title-suffix
      - id: activate-keyword-lower
      - id: activate-keyword-upper
      - id: activate-keyword-title
      - id: revshell-keyword-lower
      - id: revshell-keyword-upper
      - id: revshell-keyword-title
      - id: micro-behaviors/communications/icmp/ping::icmp-echo-api-constant
  - id: icmp-magic-packet
    desc: ICMP packet inspection for magic
    crit: suspicious
    conf: 0.95
    attack: T1205.001
    for: [scripts, binaries]
    all:
      - id: icmp-marker
      - id: magic-values
      - id: trigger-keywords
