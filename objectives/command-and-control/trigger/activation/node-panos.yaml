defaults:
  platforms: [appliance, unix]
  for: [javascript, typescript]
  attack: T1205

traits:
  - id: hidden-trigger-filename
    desc: Hidden .trigger_ filename literal
    crit: component
    conf: 0.9
    if:
      type: literal
      regex: '(^|[/\\])\.trigger_[A-Za-z0-9_.-]{1,64}$'

composite_rules:
  - id: hidden-file-rest-trigger
    desc: Hidden trigger file paired with REST endpoint
    crit: suspicious
    conf: 0.94
    all:
      - id: hidden-trigger-filename
      - id: micro-behaviors/communications/http/endpoints::api-trigger-endpoint-path
