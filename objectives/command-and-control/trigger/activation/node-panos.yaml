defaults:
  platforms: [panos, appliance, unix]
  for: [javascript, typescript]
  attack: T1204

traits:
  - id: panos-node-trigger-file
    desc: PAN-OS Node trigger file
    crit: suspicious
    conf: 0.94
    if:
      type: string_literal
      substr: '.trigger_'
    unless:
      - type: text
        substr: '_trigger'
      - id: well-known/app/packetfence::source-tree-path

  - id: panos-node-trigger-c2-post
    desc: PAN-OS Node trigger C2 POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/trigger

composite_rules:
  - id: panos-node-file-c2-trigger
    desc: PAN-OS Node file C2 trigger
    crit: hostile
    conf: 0.98
    all:
      - id: panos-node-trigger-file
      - id: panos-node-trigger-c2-post
