defaults:
  platforms: [panos, appliance, windows]
  for: [csharp, pe]
  attack: T1204

traits:
  - id: csharp-panos-trigger-token
    desc: C# PAN-OS trigger token
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: a768f-trigger

  - id: csharp-panos-trigger-listener
    desc: C# PAN-OS trigger listener
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /opt/panos/trigger-listener

  - id: csharp-panos-trigger-execute
    desc: C# PAN-OS trigger execute
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /trigger/execute

composite_rules:
  - id: csharp-panos-triggered-execution
    desc: C# PAN-OS triggered execution
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-panos-trigger-token
      - id: csharp-panos-trigger-listener
      - id: csharp-panos-trigger-execute
