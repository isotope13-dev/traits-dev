# Go package init() functions with side effects.
# Go's init() runs automatically on package import, before main(). When init
# launches goroutines that perform network I/O, filesystem mutation, or
# credential collection, the package compromises any program that imports it
# — the supply-chain equivalent of Python's import-time decorator C2.
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1195.002
  mbc: B0024
traits:
  - id: go-init-with-goroutine
    desc: init() launches background goroutine
    crit: notable
    conf: 0.85
    if:
      type: ast
      query: |
        (function_declaration
          name: (identifier) @name
          body: (block
            (go_statement)))
        (#eq? @name "init")
  - id: go-init-deferred-sleep
    desc: init() goroutine with delayed start
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'func\s+init\s*\(\s*\)\s*\{[\s\S]{0,200}go\s+func[\s\S]{0,200}time\.Sleep'
composite_rules:
  - id: go-init-network-stager
    desc: Go package init() runs network I/O on import
    crit: hostile
    conf: 0.95
    all:
      - id: go-init-with-goroutine
    any:
      - id: micro-behaviors/communications/http/lib/netlib::go-http-newrequest
      - id: micro-behaviors/communications/socket/connect::dial
      - id: micro-behaviors/communications/socket/connect::go-dial-methods
  - id: go-init-credential-collector
    desc: Go init() collects environment/credential context on import
    crit: hostile
    conf: 0.95
    all:
      - id: go-init-with-goroutine
      - id: micro-behaviors/os/env/access::os-environ
    any:
      - id: micro-behaviors/communications/http/lib/netlib::go-http-newrequest
      - id: micro-behaviors/fs/file/read::os-readfile
