defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1205
  mbc: B0030

traits:
  - id: trigger-execute-verb
    desc: Libcurl EXECUTE trigger verb
    crit: component
    conf: 0.86
    if:
      type: text
      substr: '"EXECUTE"'
  - id: trigger-activate-verb
    desc: Libcurl ACTIVATE trigger verb
    crit: component
    conf: 0.86
    if:
      type: text
      substr: '"ACTIVATE"'
  - id: trigger-trigger-verb
    desc: Libcurl TRIGGER trigger verb
    crit: component
    conf: 0.86
    if:
      type: text
      substr: '"TRIGGER"'
  - id: trigger-deploy-verb
    desc: Libcurl DEPLOY trigger verb
    crit: component
    conf: 0.86
    if:
      type: text
      substr: '"DEPLOY"'
  - id: libcurl-client-id-header
    desc: Libcurl X-Client-Id header
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: X-Client-Id
composite_rules:
  - id: c2-trigger-verb-set
    desc: C2 trigger verb set
    crit: suspicious
    conf: 0.92
    near_bytes: 600
    any:
      - id: trigger-execute-verb
      - id: trigger-activate-verb
      - id: trigger-trigger-verb
      - id: trigger-deploy-verb
    needs: 3
  - id: libcurl-activation-trigger
    desc: Libcurl activation trigger
    crit: hostile
    conf: 0.96
    all:
      - id: c2-trigger-verb-set
      - id: libcurl-client-id-header
      - id: micro-behaviors/communications/http/download/curl::curl-easy-perform
