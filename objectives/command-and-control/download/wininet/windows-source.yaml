defaults:
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: update-command
    desc: Update command handler string
    crit: component
    conf: 0.95
    if:
      type: string
      exact: "update"
  - id: download-command
    desc: Download command handler string
    crit: component
    conf: 0.95
    if:
      type: string
      exact: "download"
  - id: xor-buffer-routine
    desc: XOR buffer decode routine
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      word: "Xorbuff"
composite_rules:
  - id: wininet-download-execute-source
    desc: WinInet download and execute flow
    crit: suspicious
    conf: 0.98
    attack: "T1105"
    all:
      - id: micro-behaviors/communications/http/get::wininet-open-url-src
    any:
      - id: micro-behaviors/process/create/spawn::create-process-source
      - id: micro-behaviors/process/create/exec::shell-execute-source
      - id: micro-behaviors/communications/http/get::wininet-read-file-src
      - id: xor-buffer-routine
    needs: 2
  - id: authenticated-download-command-surface
    desc: Download and update command surface
    crit: suspicious
    conf: 0.96
    all:
      - id: objectives/command-and-control/irc/bot::irc-protocol
    any:
      - id: update-command
      - id: download-command
      - id: wininet-download-execute-source
    needs: 2
