defaults:
  platforms: [windows]
  for: [csharp]
  attack: "T1048"
traits:
  - id: ftp-host-sk
    desc: Hardcoded FTP exfiltration host
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      exact: "ftp.host.sk"
  - id: ftp-upload-call
    desc: FTP upload method invocation
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: "ftpClient.upload("
  - id: inventory-os-version
    desc: Logs OS version to an output report
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: "OS Version   :"
  - id: inventory-machine-name
    desc: Logs machine name to an output report
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: "Machine Name :"
  - id: inventory-username
    desc: Logs username to an output report
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: "Username     :"
  - id: inventory-host-name
    desc: Logs host name to an output report
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: "Host Name    :"
  - id: inventory-ip-address
    desc: Logs IP addresses to an output report
    crit: component
    conf: 0.95
    if:
      type: raw
      substr: 'Program.decrypt("SVAgQWRkcmVzcyB7MH0gOiB7MX0g")'
composite_rules:
  - id: ftp-system-inventory-exfil
    desc: FTP upload of collected host inventory
    crit: hostile
    conf: 0.99
    all:
      - id: ftp-host-sk
      - id: ftp-upload-call
      - id: inventory-os-version
      - id: inventory-machine-name
      - id: inventory-username
      - id: inventory-host-name
    any:
      - id: inventory-ip-address
