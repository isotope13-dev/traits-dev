# Phishing / Credential Harvesting - JavaScript
# Detects phishing pages and credential harvesting scripts
# ATT&CK: T1566.002 (Phishing: Spearphishing Link), T1056 (Input Capture)
defaults:
  for: [javascript]
traits:
  - id: js-microsoft-logo
    desc: Microsoft logo reference
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "Microsoft_logo.svg"
  - id: js-microsoft-login-text
    desc: Microsoft login branding
    crit: notable
    conf: 0.8
    if:
      type: string
      regex: 'Microsoft\s+(account|login|sign.?in|365)'
    unless:
      - type: string
        substr: "Microsoft Visual"
      - type: string
        substr: "Microsoft Corporation"
  - id: js-fake-login
    desc: Fake login form logic
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: 'id="emailInput"|id="passwordInput"|name="login-password"|id="login_form"'
    downgrade:
      any:
        - id: metadata/quality/testing::ruby-test-file
        - id: metadata/quality/testing::ruby-integration-test
  - id: webdriver-check
    desc: navigator.webdriver check
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: 'navigator\.webdriver'
  - id: headlesschrome-useragent
    desc: HeadlessChrome user agent check
    crit: component
    conf: 0.85
    if:
      type: raw
      regex: 'userAgent[\s\S]{0,80}HeadlessChrome'
  - id: headlesschrome-match
    desc: HeadlessChrome string match
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: 'HeadlessChrome[\s\S]{0,80}(includes|indexOf|match)'
  - id: is-headless-check
    desc: isHeadless or detect headless
    crit: component
    conf: 0.75
    if:
      type: raw
      regex: 'isHeadless\s*[:=(]|detect.{0,20}headless'
  - id: js-honeypot-field
    desc: Honeypot form field (anti-bot)
    crit: notable
    conf: 0.8
    if:
      type: string
      regex: 'honeypot-field|class="honeypot"'
  - id: js-document-lure
    desc: Document sharing/preview lure
    crit: notable
    conf: 0.8
    if:
      type: string
      regex: 'securely shared|Specification\.pdf|Project descriptions'
composite_rules:
  - id: js-ms-branding-indicators
    desc: Microsoft branding indicators
    crit: notable
    any:
      - id: js-microsoft-logo
      - id: js-microsoft-login-text
  - id: headlesschrome-checks
    desc: HeadlessChrome detection checks
    crit: component
    conf: 0.85
    any:
      - id: headlesschrome-useragent
      - id: headlesschrome-match
  - id: js-bot-detection
    desc: Browser bot detection logic
    crit: suspicious
    conf: 0.9
    any:
      - id: webdriver-check
      - id: headlesschrome-checks
      - id: is-headless-check
  - id: js-microsoft-phishing-page
    desc: Microsoft credential phishing page
    crit: hostile
    conf: 0.98
    attack: "T1566.002"
    all:
      - id: js-ms-branding-indicators
      - id: js-fake-login
    any:
      - id: js-bot-detection
      - id: js-document-lure
      - id: js-honeypot-field
