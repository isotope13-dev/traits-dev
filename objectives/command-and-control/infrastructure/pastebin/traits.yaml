# Codesharing and Paste Services
# Detects references to common pastebins and codesharing sites
# ATT&CK: T1102 (Command and Control: Web Service)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: notable
  conf: 0.70
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: pastebin
    desc: Pastebin.com reference
    if:
      type: string_value
      regex: 'pastebin\.com'
  - id: hastebin
    desc: Hastebin reference
    if:
      type: string_value
      regex: 'hastebin\.com'
  - id: ghostbin
    desc: Ghostbin reference
    if:
      type: string_value
      regex: 'ghostbin\.(com|site|co)'
  - id: paste-ee
    desc: Paste.ee reference
    if:
      type: string_value
      regex: 'paste\.ee'
  - id: dpaste
    desc: Dpaste reference
    if:
      type: string_value
      regex: 'dpaste\.(com|org)'
  - id: privatebin
    desc: PrivateBin reference
    if:
      type: string_value
      regex: 'privatebin\.net'
  - id: rentry
    desc: Rentry.co reference
    if:
      type: string_value
      regex: 'rentry\.(co|org)'
  - id: ctrlv
    desc: CtrlV.it reference
    if:
      type: string_value
      regex: 'ctrlv\.it'
  - id: termbin
    desc: Termbin reference (netcat-based)
    if:
      type: string_value
      regex: 'termbin\.com'
  - id: pastery
    desc: Pastery reference
    if:
      type: string_value
      regex: 'pastery\.net'
  # JSON hosting services - increasingly used as C2 staging
  - id: jsonkeeper
    desc: JSONkeeper.com reference
    if:
      type: string_value
      substr: 'jsonkeeper.com'
  - id: jsonbin
    desc: JSONBin.io reference
    if:
      type: string_value
      substr: 'jsonbin.io'
  - id: npoint
    desc: npoint.io reference
    if:
      type: string_value
      substr: 'npoint.io'
  - id: jsonblob
    desc: JSONBlob.com reference
    if:
      type: string_value
      substr: 'jsonblob.com'
  - id: mockapi
    desc: MockAPI.io reference
    if:
      type: string_value
      substr: 'mockapi.io'
