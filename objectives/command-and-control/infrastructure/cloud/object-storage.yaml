defaults:
  platforms:
    - unix
    - windows
  for:
    - scripts
    - binaries
  mbc: B0030
  attack: T1102.002
traits:
  - id: aws-s3-disguised-payload
    desc: AWS S3 disguised payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: https?://.{1,80}\.s3.{0,40}\.amazonaws\.com/.{1,120}\.(png|jpe?g|gif|pdf)$
    not:
      - substr: emojipedia-us.s3.amazonaws.com/
      - substr: https://bucket.s3.amazonaws.com/
    unless:
      - id: well-known/lib/youtube-dl/
      - id: well-known/lib/youtube-dl::youtube-dl-package-context
      - id: well-known/app/wordpress-plugins::known-wordpress-plugin
composite_rules:
  - id: cloud-payload-dropper
    desc: Cloud storage payload dropper
    crit: hostile
    conf: 0.95
    attack: T1105 - elf - macho - pe
    all:
      - id: aws-s3-disguised-payload
      - id: micro-behaviors/fs/proc/info/exe::process-pid-exe
      - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
    any:
      - id: micro-behaviors/communications/http/lib/crate::ureq-crate
      - id: micro-behaviors/crypto/library/provider::rustls-crate-path
  - id: rust-cloud-stager
    desc: Rust cloud storage stager
    crit: hostile
    conf: 0.92
    attack: T1105 - elf - macho - pe
    all:
      - id: micro-behaviors/communications/http/lib/crate::ureq-crate
      - id: micro-behaviors/crypto/library/provider::rustls-crate-path
      - id: micro-behaviors/fs/proc/info/exe::process-pid-exe
      - id: aws-s3-disguised-payload
  - id: cloud-crypto-implant
    desc: Cloud-hosted crypto implant
    crit: suspicious
    conf: 0.82
    mbc: B0030 - elf - macho - pe
    all:
      - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
      - id: micro-behaviors/fs/proc/info/exe::process-pid-exe
    any:
      - id: aws-s3-disguised-payload
    downgrade:
      any:
        - id: metadata/binary/metrics/size::massive-executable
        - id: metadata/lang/compiler/systems::go-binary
