defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: etherscan-api-prefix
    desc: Etherscan API endpoint (api.etherscan.io)
    crit: notable
    conf: 0.8
    attack: T1102
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: api.etherscan.io
  - id: etherscan-api-suffix
    desc: Etherscan API path (etherscan.io/api)
    crit: notable
    conf: 0.8
    attack: T1102
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: etherscan.io/api
  - id: bscscan-api
    desc: Uses BSCScan API (potential blockchain-based
    crit: suspicious
    conf: 0.85
    attack: T1102
    for:
      - javascript
      - typescript
    if:
      type: string_value
      regex: api\.bscscan\.com|bscscan\.com/api
  - id: polygonscan-api
    desc: Uses PolygonScan API (potential blockchain-based
    crit: suspicious
    conf: 0.85
    attack: T1102
    for:
      - javascript
      - typescript
    if:
      type: string_value
      regex: api\.polygonscan\.com|polygonscan\.com/api
  - id: eth-call
    desc: eth_call RPC method
    crit: notable
    conf: 0.6
    attack: T1102
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: eth_call
  - id: eth-getstorageat
    desc: eth_getStorageAt RPC method
    crit: notable
    conf: 0.6
    attack: T1102
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: eth_getStorageAt
  - id: contract-keyword
    desc: contract keyword
    crit: notable
    conf: 0.3
    for:
      - javascript
      - typescript
    if:
      type: string_value
      regex: (?i)contract
  - id: rpc-provider
    desc: Uses blockchain RPC provider (monitor
    crit: notable
    conf: 0.6
    attack: T1102
    for:
      - javascript
      - typescript
    if:
      type: string_value
      regex: infura\.io/v3/|alchemy\.com/v2/|quicknode\.com|ankr\.com
  - id: ipfs-gateway
    desc: Uses IPFS gateway (decentralized content
    crit: notable
    conf: 0.7
    attack: T1102
    for:
      - javascript
      - typescript
      - shell
    if:
      type: string_value
      regex: ipfs\.io/ipfs/|gateway\.pinata\.cloud|cloudflare-ipfs\.com|dweb\.link
  - id: arweave-net
    desc: Arweave.net gateway
    crit: notable
    conf: 0.6
    attack: T1102
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: arweave.net/
  - id: ar-io-net
    desc: AR-IO.net gateway
    crit: notable
    conf: 0.6
    attack: T1102
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: ar-io.net/
composite_rules:
  - id: etherscan-api
    desc: Uses Etherscan API (potential blockchain-based
    crit: suspicious
    conf: 0.85
    attack: T1102
    for:
      - javascript
      - typescript
    any:
      - id: etherscan-api-prefix
      - id: etherscan-api-suffix
  - id: contract-read
    desc: Reads smart contract storage (potential
    crit: notable
    conf: 0.75
    attack: T1102
    for:
      - javascript
      - typescript
    all:
      - id: eth-rpc-method
      - id: contract-or-address
  - id: eth-rpc-method
    desc: Ethereum RPC method
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
    any:
      - id: eth-call
      - id: eth-getstorageat
  - id: contract-or-address
    desc: Contract keyword or Ethereum address
    crit: notable
    conf: 0.3
    for:
      - javascript
      - typescript
    any:
      - id: contract-keyword
      - id: objectives/collection/clipboard/capture::eth-address-literal
  - id: arweave-gateway
    desc: Uses Arweave gateway (permanent content
    crit: notable
    conf: 0.7
    attack: T1102
    for:
      - javascript
      - typescript
    any:
      - id: arweave-net
      - id: ar-io-net
