# C2 Client Tracking Database/Schema Detection
# Detects data structures used by C2 servers to track compromised endpoints
# ATT&CK: T1071 (Application Layer Protocol)
defaults:
  platforms: [windows, unix]
  crit: component
  conf: 0.7
  for: [javascript, php, python, java, csharp]
traits:
  # === C2 tasking fields - JSON/Python style ===
  - id: command-field
    desc: Command tasking field in schema
    if:
      type: text
      regex: '(?i)["'']command["'']\s*:'
  - id: sleep-interval-field
    desc: Sleep/beacon interval field
    if:
      type: text
      regex: '(?i)["'']sleep(_interval)?["'']\s*:'
  - id: persist-field
    desc: Persistence tracking field
    if:
      type: text
      regex: '(?i)["'']persist(ence)?["'']\s*:'
  - id: last-result-field
    desc: Command result storage field
    if:
      type: text
      regex: '(?i)["''](last_result|result)["'']\s*:'
  # === C2 tasking fields - Peewee/ORM style ===
  - id: command-field-peewee
    desc: Command field in Peewee model
    if:
      type: text
      regex: 'command\s*=.{0,50}Field'
  - id: sleep-interval-field-peewee
    desc: Sleep interval field in Peewee model
    if:
      type: text
      regex: 'sleep\s*=.{0,50}Field'
  - id: persist-field-peewee
    desc: Persistence field in Peewee model
    if:
      type: text
      regex: 'persist\s*=.{0,50}Field'
  - id: last-result-field-peewee
    desc: Last result field in Peewee model
    if:
      type: text
      regex: 'last_result\s*=.{0,50}Field'
  # === Victim tracking fields - JSON style ===
  - id: av-json-field
    desc: AV JSON field
    conf: 0.75
    if:
      type: text
      regex: '(?i)["'']av["'']\s*:'
  # === Victim tracking fields - Peewee/ORM style ===
  - id: av-assignment-field
    desc: AV field in Peewee model
    if:
      type: text
      regex: '\bAv\b\s*=.{0,50}Field'
  - id: last-seen-field
    desc: Last seen timestamp field
    if:
      type: text
      regex: 'last_seen\s*[=:]'
  - id: last-seen-field-peewee
    desc: Last seen field in Peewee model
    if:
      type: text
      regex: 'last_seen\s*=.{0,50}Field'
  # === IP/Country tracking - Peewee style ===
  - id: ip-field-peewee
    desc: IP address field in Peewee model
    if:
      type: text
      regex: '(?i)\bip\b\s*=.{0,50}Field'
  - id: country-field-peewee
    desc: Country field in Peewee model
    if:
      type: text
      regex: 'country\s*=.{0,50}Field'
  # === Client table/database references ===
  - id: clients-table
    desc: Clients table name reference
    if:
      type: text
      regex: '(?i)["'']clients["'']\s*[:=\(]'
  - id: clients-table-peewee
    desc: Clients table in Peewee model
    if:
      type: text
      regex: 'table_name\s*=\s*["'']clients["'']'
  - id: client-model-class
    desc: Client model class definition
    if:
      type: text
      regex: '^class\s+Client\s*\('
  # === Victim info field patterns - JSON style ===
  - id: username-field
    desc: Username tracking field
    if:
      type: text
      regex: '(?i)\b(username|user_name)\b\s*[=:]'
  - id: computer-field
    desc: Computer name tracking field
    if:
      type: text
      word: "Computer"
  - id: domain-field
    desc: Domain tracking field
    if:
      type: text
      regex: '(?i)\b(domain|domain_name)\b\s*[=:]'
  - id: windows-field
    desc: Windows OS version field
    if:
      type: text
      regex: 'Windows\s*='
  # === Victim info field patterns - Peewee/ORM style ===
  - id: username-field-peewee
    desc: Username field in Peewee model
    if:
      type: text
      regex: 'Username\s*=.{0,50}Field'
  - id: computer-field-peewee
    desc: Computer field in Peewee model
    if:
      type: text
      regex: 'Computer\s*=.{0,50}Field'
  - id: domain-field-peewee
    desc: Domain field in Peewee model
    if:
      type: text
      regex: 'Domain\s*=.{0,50}Field'
  - id: windows-field-peewee
    desc: Windows field in Peewee model
    if:
      type: text
      regex: 'Windows\s*=.{0,50}Field'
  # === Database initialization patterns ===
  - id: databases-init-peewee
    desc: Database initialization with DatabaseProxy
    for: [python]
    if:
      type: symbol
      exact: DatabaseProxy
  - id: sqllitedb-init
    desc: SqliteDatabase initialization
    for: [python]
    if:
      type: symbol
      exact: SqliteDatabase
composite_rules:
  # C2 server database schema: tasking + tracking fields together
  - id: c2-tasking-schema
    desc: C2 client tasking database schema
    crit: notable
    conf: 0.8
    attack: "T1071"
    any:
      - id: command-field
      - id: sleep-interval-field
      - id: persist-field
      - id: last-result-field
      - id: command-field-peewee
      - id: sleep-interval-field-peewee
      - id: persist-field-peewee
      - id: last-result-field-peewee
    needs: 3
  # Victim system info fields composite
  - id: victim-info-fields
    desc: Victim system info tracking fields
    crit: notable
    conf: 0.75
    attack: "T1082"
    any:
      - id: username-field
      - id: computer-field
      - id: domain-field
      - id: windows-field
      - id: username-field-peewee
      - id: computer-field-peewee
      - id: domain-field-peewee
      - id: windows-field-peewee
    needs: 3
  # C2 victim tracking schema: system info + tasking
  - id: c2-victim-tracking
    desc: C2 victim tracking data structure
    crit: suspicious
    conf: 0.85
    attack: "T1082"
    all:
      - id: victim-info-fields
    any:
      - id: command-field
      - id: sleep-interval-field
      - id: persist-field
      - id: av-json-field
      - id: av-assignment-field
    needs: 1
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: micro-behaviors/process/interpreter/vm::yarn-release-bundle
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/code-metrics/structure::minified-code
        - id: metadata/package/tooling::esbuild-bundled
  # Full C2 server database: all indicators
  - id: c2-server-database
    desc: C2 server client management database
    crit: hostile
    conf: 0.95
    attack: "T1071"
    all:
      - id: c2-tasking-schema
    any:
      - id: victim-info-fields
      - id: av-json-field
      - id: av-assignment-field
      - id: last-seen-field
      - id: last-seen-field-peewee
      - id: clients-table
      - id: clients-table-peewee
      - id: client-model-class
      - id: ip-field-peewee
      - id: country-field-peewee
      - id: databases-init-peewee
      - id: sqllitedb-init
    needs: 1
