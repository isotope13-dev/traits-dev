defaults:
  platforms: [unix, windows]
  for: [json]
  crit: suspicious
  conf: 0.9

traits:
  - id: json-rat-app-self-description
    desc: JSON RAT app metadata
    if:
      type: text
      regex: 'Remote Administration Tool[\s\S]{0,160}generate binaries'
      case_insensitive: true

  - id: json-exploit-module-list
    desc: JSON exploit module list
    if:
      type: text
      regex: 'exploit/(windows|linux)/[\s\S]{0,80}(rce|payload)'
      case_insensitive: true

  - id: json-postex-module-schema
    desc: JSON postex module schema
    if:
      type: text
      regex: '"base"\s*:\s*\{[\s\S]{0,900}"commands"\s*:\s*\['
      case_insensitive: true

  - id: json-powershell-download-exec-module
    desc: JSON downloads PowerShell
    if:
      type: text
      regex: 'powershell\.exe[\s\S]{0,260}(DownloadString|IEX|Invoke-)'
      case_insensitive: true

  - id: json-credential-dump-description
    desc: JSON credential dump text
    if:
      type: text
      regex: '(dump credentials|credentials out of LSASS|plaintext credentials in memory)'
      case_insensitive: true

  - id: json-remote-registry-backdoor-description
    desc: JSON remote registry backdoor
    if:
      type: text
      regex: 'remote registry backdoor[\s\S]{0,180}(machine account hash|malicious ACEs)'
      case_insensitive: true

  - id: json-container-breakout-description
    desc: JSON container breakout
    if:
      type: text
      regex: '(Container Breakout|Break out from the container|docker\.sock|kubelet API)'
      case_insensitive: true

  - id: json-wsh-payload-http-key-config
    desc: JSON WSH HTTP payload
    if:
      type: text
      regex: '"Language"\s*:\s*"jscript"[\s\S]{0,600}"Payload"[\s\S]{0,320}"HttpKeyUrl"'
      case_insensitive: true

  - id: json-token-bypass-tool-setting
    desc: JSON token bypass flag
    if:
      type: text
      regex: '"onlinetokens\s*\(BETTER BYPASS\)"\s*:\s*true'
      case_insensitive: true

  - id: json-lsass-minidump-module
    desc: JSON LSASS minidump
    if:
      type: text
      regex: '(lsass\.exe|MiniDumpWriteDump|sekurlsa::minidump)'
      case_insensitive: true

  - id: json-minidump-upload-description
    desc: JSON minidump upload
    if:
      type: text
      regex: 'dumps out to a temporary file[\s\S]{0,120}uploads the minidump'
      case_insensitive: true

  - id: json-memshell-generator-ui
    desc: JSON memshell UI
    if:
      type: text
      regex: 'Generate Shell[\s\S]{0,320}(Bytecode|ScriptEngine|ShellClassName)'
      case_insensitive: true

  - id: json-memshell-probe-controls
    desc: JSON memshell probes
    if:
      type: text
      regex: 'ProbeContent[\s\S]{0,240}ProbeMethod[\s\S]{0,240}DNSLog'
      case_insensitive: true

  - id: json-password-logging-enabled
    desc: JSON password logging
    if:
      type: text
      regex: '"passwordBeingLogged"\s*:\s*true'
      case_insensitive: true

  - id: json-command-chat-visibility-controls
    desc: JSON command visibility
    if:
      type: text
      regex: '"logChatAndCommand"|"(invisiblePlayers|isBeingFiltered)"'
      case_insensitive: true

composite_rules:
  - id: json-offensive-module-descriptor
    desc: JSON post-exploitation module descriptor
    crit: hostile
    all:
      - id: json-postex-module-schema
    any:
      - id: json-powershell-download-exec-module
      - id: json-credential-dump-description
      - id: json-remote-registry-backdoor-description
      - id: json-container-breakout-description

  - id: json-lsass-minidump-credential-module
    desc: JSON LSASS minidump credential module
    crit: hostile
    all:
      - id: json-postex-module-schema
      - id: json-lsass-minidump-module
      - id: json-minidump-upload-description

  - id: json-memshell-generator-strings
    desc: JSON memshell generator UI string bundle
    crit: hostile
    all:
      - id: json-memshell-generator-ui
      - id: json-memshell-probe-controls

  - id: json-password-logging-config
    desc: JSON password logging control config
    crit: hostile
    all:
      - id: json-password-logging-enabled
      - id: json-command-chat-visibility-controls
