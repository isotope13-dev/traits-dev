defaults:
  platforms: [unix, windows]
  for: [json]
  crit: suspicious
  conf: 0.9

traits:
  - id: json-rat-app-self-description
    desc: JSON RAT app metadata
    if:
      type: value
      path: description
      regex: 'Remote Administration Tool[\s\S]{0,160}generate binaries'
      case_insensitive: true

  - id: json-rat-app-name-label
    desc: JSON RAT name keyword
    if:
      type: value
      path: name
      regex: '\b(Remote Administration Tool|RAT)\b'
      case_insensitive: true

  - id: json-rat-app-control-description
    desc: JSON RAT remote control description
    if:
      type: value
      path: description
      regex: 'control remote operating systems|generate binaries'
      case_insensitive: true

  - id: json-exploit-module-list
    desc: JSON exploit module list
    if:
      type: text
      regex: 'exploit/(windows|linux)/[\s\S]{0,80}(rce|payload)'
      case_insensitive: true

  - id: json-exploit-array-entry
    desc: JSON exploit array entry
    count_min: 8
    if:
      type: value
      path: "exploits[*]"
      regex: '^exploit/[a-z0-9_/-]+'
      case_insensitive: true

  - id: json-exploit-rce-array-entry
    desc: JSON RCE exploit array entry
    count_min: 3
    if:
      type: value
      path: "exploits[*]"
      regex: '(rce|cmd|exec|payload|upload|sqli)'
      case_insensitive: true

  - id: json-many-exploit-path-entries
    desc: JSON many exploit path entries
    count_min: 12
    if:
      type: text
      regex: '"exploit/[a-z0-9_/-]+'
      case_insensitive: true

  # Loose keyword-count fragment: rce|cmd|exec|payload|upload|sqli appear as
  # substrings in ordinary code and metadata (afterToolExecute, executeContext,
  # npm dist-tag names), so on its own a count of 4+ is not suspicious. It only
  # carries weight as the `all:` leg of json-exploit-framework-catalog, which is
  # anchored by 8+ "exploit/..." path entries. Component-tier on its own.
  - id: json-many-exploit-execution-entries
    desc: JSON repeats exploit-execution keywords
    crit: component
    count_min: 4
    if:
      type: text
      regex: '"exploit/[a-z0-9_/-]+.{0,70}(rce|cmd|exec|payload|upload|sqli)'
      case_insensitive: true

  - id: json-postex-module-schema
    desc: JSON postex module schema
    if:
      type: text
      regex: '"base"\s*:\s*\{[\s\S]{0,900}"commands"\s*:\s*\['
      case_insensitive: true

  - id: json-powershell-download-exec-module
    desc: JSON downloads PowerShell
    if:
      type: text
      regex: 'powershell\.exe[\s\S]{0,260}(DownloadString|IEX|Invoke-)'
      case_insensitive: true

  - id: json-credential-dump-description
    desc: JSON credential dump text
    if:
      type: value
      path: base.description
      regex: '(dump credentials|credentials out of LSASS|plaintext credentials in memory)'
      case_insensitive: true

  - id: json-remote-registry-backdoor-description
    desc: JSON remote registry backdoor
    if:
      type: text
      regex: 'remote registry backdoor[\s\S]{0,180}(machine account hash|malicious ACEs)'
      case_insensitive: true

  - id: json-container-breakout-description
    desc: JSON container breakout
    crit: notable
    if:
      type: text
      regex: '(Container Breakout|Break out from the container|docker\.sock|kubelet API)'
      case_insensitive: true

  - id: json-wsh-payload-http-key-config
    desc: JSON WSH HTTP payload
    if:
      type: text
      regex: '"Language"\s*:\s*"jscript"[\s\S]{0,600}"Payload"[\s\S]{0,320}"HttpKeyUrl"'
      case_insensitive: true

  - id: json-wsh-jscript-language
    desc: JSON WSH JScript language
    if:
      type: value
      path: Language
      exact: jscript

  - id: json-wsh-auto-version
    desc: JSON WSH auto version
    if:
      type: value
      path: WSHAutoVersion
      exact: "Yes"

  - id: json-wsh-payload-field
    desc: JSON WSH payload field
    if:
      type: value
      path: Payload
      regex: '.+'

  - id: json-wsh-host-env-collection
    desc: JSON WSH host environment collection
    if:
      type: value
      path: EnvVars.USERNAME
      regex: '.+'

  - id: json-wsh-http-key-field
    desc: JSON WSH HTTP key field
    if:
      type: value
      path: HttpKeyUrl
      regex: '.*'

  - id: json-token-bypass-tool-setting
    desc: JSON token bypass flag
    if:
      type: text
      regex: '"onlinetokens\s*\(BETTER BYPASS\)"\s*:\s*true'
      case_insensitive: true

  - id: json-lsass-minidump-module
    desc: JSON LSASS minidump
    if:
      type: value
      path: base.description
      regex: '(lsass\.exe|MiniDumpWriteDump|sekurlsa::minidump)'
      case_insensitive: true

  - id: json-minidump-default-process
    desc: JSON minidump default process
    if:
      type: value
      path: "base.options[*].value"
      exact: lsass.exe

  - id: json-minidump-upload-value-description
    desc: JSON minidump upload value description
    if:
      type: value
      path: base.description
      regex: 'MiniDumpWriteDump[\s\S]{0,160}uploads the minidump'
      case_insensitive: true

  - id: json-minidump-credential-notes
    desc: JSON minidump credential parsing notes
    if:
      type: value
      path: base.notes
      regex: 'sekurlsa::minidump[\s\S]{0,120}sekurlsa::logonPasswords'
      case_insensitive: true

  - id: json-minidump-upload-description
    desc: JSON minidump upload
    if:
      type: text
      regex: 'dumps out to a temporary file[\s\S]{0,120}uploads the minidump'
      case_insensitive: true

  - id: json-memshell-generator-ui
    desc: JSON memshell UI
    if:
      type: text
      regex: 'Generate Shell[\s\S]{0,320}(Bytecode|ScriptEngine|ShellClassName)'
      case_insensitive: true

  - id: json-memshell-probe-controls
    desc: JSON memshell probes
    if:
      type: text
      regex: 'ProbeContent[\s\S]{0,240}ProbeMethod[\s\S]{0,240}DNSLog'
      case_insensitive: true

  - id: json-password-logging-enabled
    desc: JSON password logging
    if:
      type: text
      regex: '"passwordBeingLogged"\s*:\s*true'
      case_insensitive: true

  - id: json-command-chat-visibility-controls
    desc: JSON command visibility
    if:
      type: text
      regex: '"logChatAndCommand"|"(invisiblePlayers|isBeingFiltered)"'
      case_insensitive: true

composite_rules:
  - id: json-rat-application-descriptor
    desc: JSON remote administration application descriptor
    crit: hostile
    conf: 0.95
    all:
      - id: json-rat-app-self-description
      - id: json-rat-app-control-description
    any:
      - id: json-rat-app-name-label
      - id: objectives/command-and-control/infrastructure/framework/module::json-module-docker-description
      - id: objectives/command-and-control/infrastructure/framework/module::json-module-container-description

  - id: json-exploit-framework-catalog
    desc: JSON exploit framework catalog
    crit: hostile
    conf: 0.96
    any:
      - id: json-exploit-array-entry
      - id: json-many-exploit-path-entries
    all:
      - id: json-many-exploit-execution-entries

  - id: json-offensive-module-descriptor
    desc: JSON post-exploitation module descriptor
    crit: hostile
    all:
      - id: json-postex-module-schema
    any:
      - id: json-powershell-download-exec-module
      - id: json-credential-dump-description
      - id: json-remote-registry-backdoor-description
      - id: json-container-breakout-description

  - id: json-lsass-minidump-credential-module
    desc: JSON LSASS minidump credential module
    crit: hostile
    all:
      - id: json-minidump-default-process
      - id: json-minidump-upload-value-description
      - id: json-minidump-credential-notes
    any:
      - id: json-lsass-minidump-module
      - id: json-minidump-upload-description

  - id: json-wsh-http-payload-runner-config
    desc: JSON WSH HTTP payload runner config
    crit: hostile
    conf: 0.93
    all:
      - id: json-wsh-jscript-language
      - id: json-wsh-auto-version
      - id: json-wsh-payload-field
      - id: json-wsh-http-key-field
    any:
      - id: json-wsh-payload-http-key-config
      - id: json-wsh-host-env-collection

  - id: json-memshell-generator-strings
    desc: JSON memshell generator UI string bundle
    crit: hostile
    all:
      - id: json-memshell-generator-ui
      - id: json-memshell-probe-controls

  - id: json-password-logging-config
    desc: JSON password logging control config
    crit: hostile
    all:
      - id: json-password-logging-enabled
      - id: json-command-chat-visibility-controls
