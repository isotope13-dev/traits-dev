# C2 Server Framework Detection
# Detects complete C2 server-side frameworks by combining:
#   - Command dispatch protocols
#   - Operator UI vocabulary
#   - Hardcoded crypto key material
# ATT&CK: T1071 (Application Layer Protocol)
# MBC: B0030 (C2 Communication)
defaults:
  mbc: B0030
  platforms: [unix, windows]
  for: [python, ruby, perl, go]

traits:
  - id: server-start-error
    desc: Generic server start error message
    crit: component
    conf: 0.6
    if:
      type: text
      substr: 'Error starting server:'

  - id: field-job-queue
    desc: Job queue data field
    crit: component
    if:
      type: text
      regex: '(?i)(JobQueue|Job_Queue|job_queue|task_queue)'
  - id: field-port-forwards
    desc: Port forwarding data field
    crit: component
    if:
      type: text
      regex: '(?i)(PortFwd|port_fwd|portfwd|PortForward)'
  - id: field-socks-clients
    desc: Socks client data field
    crit: component
    if:
      type: text
      regex: '(?i)(SocksCli|socks_cli|socksclient)'
  - id: field-socks-servers
    desc: Socks server data field
    crit: component
    if:
      type: text
      regex: '(?i)(SocksSvr|socks_svr|socksserver)'
  - id: field-sleep-jitter
    desc: Sleep jitter data field
    crit: component
    if:
      type: text
      regex: '(?i)(SleepJitter|sleep_jitter|SleepDelay)'
  - id: field-kill-date
    desc: Kill date data field
    crit: component
    if:
      type: text
      regex: '(?i)(KillDate|kill_date|WorkingHours)'

composite_rules:
  # Go C2 Server wrapper
  - id: go-c2-server-wrapper
    desc: Go application wrapping an interactive C2 console
    crit: hostile
    conf: 0.95
    attack: "T1071"
    all:
      - id: objectives/command-and-control/infrastructure/operator::cli-operator-console
      - id: server-start-error

  # C2 framework with command dispatch and operator UI
  - id: c2-server-framework
    desc: C2 server framework with operator UI and command dispatch
    crit: hostile
    conf: 0.95
    attack: "T1071"
    all:
      - id: objectives/command-and-control/channel/transport::c2-command-dispatch
      - id: objectives/command-and-control/infrastructure/operator::c2-operator-ui

  # C2 framework with encrypted comms
  - id: c2-encrypted-framework
    desc: C2 framework with hardcoded crypto and command dispatch
    crit: hostile
    conf: 0.95
    attack: "T1573"
    all:
      - id: objectives/command-and-control/channel/transport::c2-command-dispatch
      - id: micro-behaviors/crypto/symmetric/aes/library::hardcoded-key-material

  # Generic C2 Agent structure fields
  - id: c2-agent-management-structs
    desc: C2 teamserver agent management data structures
    crit: suspicious
    conf: 0.85
    attack: "T1071"
    needs: 3
    any:
      - id: field-job-queue
      - id: field-port-forwards
      - id: field-socks-clients
      - id: field-socks-servers
      - id: field-sleep-jitter
      - id: field-kill-date
