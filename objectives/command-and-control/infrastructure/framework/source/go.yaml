defaults:
  platforms: [unix, windows]
  for: [go]
  crit: suspicious
  conf: 0.9

traits:
  - id: go-encrypted-command-pull-loop
    desc: Go encrypted command pull
    if:
      type: text
      regex: 'PullCommand\(\)[\s\S]{0,420}DecryptPacket'

  - id: go-c2-result-push
    desc: Go C2 result push
    if:
      type: text
      regex: 'MakePacket\([\s\S]{0,180}PushResult\('

  - id: go-agent-file-transfer-commands
    desc: Go file transfer commands
    if:
      type: text
      regex: 'CMD_TYPE_UPLOAD_(START|LOOP)[\s\S]{0,700}CMD_TYPE_DOWNLOAD'

  - id: go-agent-self-copy-persistence
    desc: Go agent self-copy
    if:
      type: text
      regex: 'io\.Copy\(tmpFile,\s*srcFile\)[\s\S]{0,520}os\.Rename\(tmpPath,\s*targetPath\)'

  - id: go-ebpf-file-hide-actions
    desc: Go eBPF hide actions
    if:
      type: text
      substr: FaHideFileAction

  - id: go-ebpf-path-action-map
    desc: Go eBPF path action
    if:
      type: text
      regex: 'FNVHashStr\(p\.Path\)[\s\S]{0,520}(Action|OverrideID|ReturnValue|HiddenHash)'

  - id: go-c2-profile-sync-message
    desc: Go C2 profile sync
    if:
      type: text
      regex: 'C2SyncMessage[\s\S]{0,520}(c2_profile|C2profile|c2Sync)'
      case_insensitive: true

  - id: go-c2-profile-autostart
    desc: Go C2 profile autostart
    if:
      type: text
      regex: 'updateC2Parameters[\s\S]{0,700}autoStartC2Profile'

  - id: go-lsass-dump-marker
    desc: Go source names LSASS or credential-dump tooling
    crit: component
    if:
      type: text
      regex: '(?i)lsass\\.exe|sekurlsa::(logonPasswords|minidump)'

  - id: go-agent-plugin-loader
    desc: Go agent plugin loader
    if:
      type: text
      regex: 'PluginOnLoad[\s\S]{0,260}(callback bridge|plugin)'
      case_insensitive: true
  - id: go-cgo-plugin-export-entrypoints
    desc: Go cgo plugin export entrypoints
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?m)^//export Plugin(OnLoad|OnEvent|SetCallback)'
    count_min: 2
  - id: go-plugin-host-callback-bridge
    desc: Go plugin host callback bridge
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'callbackPtr[\s\S]{0,260}syscall\.SyscallN|syscall\.SyscallN[\s\S]{0,260}callbackPtr'
  - id: go-cgo-host-buffer-decode
    desc: Go cgo host buffer decode
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'C\.Go(Bytes|StringN)\([\s\S]{0,120}(unsafe\.Pointer|payloadLen|eventLen)'

  - id: go-c2-agent-message-route
    desc: Go C2 agent message route
    if:
      type: string_literal
      exact: /agent_message

  - id: go-c2-agent-message-webhook
    desc: Go C2 agent message webhook
    if:
      type: text
      substr: AgentMessageWebhook

  - id: go-c2-create-payload-webhook
    desc: Go C2 create payload webhook
    if:
      type: text
      substr: CreatePayloadWebhook

  - id: go-c2-create-task-webhook
    desc: Go C2 create task webhook
    if:
      type: text
      substr: CreateTaskWebhook

  - id: go-c2-create-credential-webhook
    desc: Go C2 create credential webhook
    if:
      type: text
      substr: CreateCredentialWebhook

  - id: go-c2-create-keylog-webhook
    desc: Go C2 create keylog webhook
    if:
      type: text
      substr: CreateKeylogWebhook

  - id: go-c2-start-profile-webhook
    desc: Go C2 start profile webhook
    if:
      type: text
      substr: StartStopC2ProfileWebhook

  - id: go-c2-profile-status-webhook
    desc: Go C2 profile status webhook
    if:
      type: text
      substr: C2ProfileStatusWebhook

  - id: go-c2-profile-output-webhook
    desc: Go C2 profile output webhook
    if:
      type: text
      substr: C2ProfileOutputWebhook

  - id: go-c2-profile-sample-webhook
    desc: Go C2 profile sample webhook
    if:
      type: text
      substr: C2ProfileSampleMessageWebhook

  - id: go-c2-parameter-webhook
    desc: Go C2 profile parameter webhook
    if:
      type: text
      substr: CreateC2ParameterInstanceWebhook

  - id: go-c2-api-token-webhook
    desc: Go C2 API token webhook
    if:
      type: text
      substr: GenerateAPITokenWebhook

  - id: go-c2-password-update-webhook
    desc: Go C2 operator password webhook
    if:
      type: text
      substr: UpdateOperatorPasswordWebhook

  - id: go-c2-secrets-webhook
    desc: Go C2 secrets webhook
    if:
      type: text
      substr: GetSecretsWebhook

  - id: go-c2-jwt-auth-middleware
    desc: Go C2 JWT auth middleware
    if:
      type: text
      substr: JwtAuthMiddleware

  - id: go-c2-cookie-auth-middleware
    desc: Go C2 cookie auth middleware
    if:
      type: text
      substr: CookieAuthMiddleware

  - id: go-redirector-acme-selfsigned-tls
    desc: Go redirector ACME with self-signed TLS fallback
    if:
      type: text
      regex: 'certmagic\.ACMEIssuer[\s\S]{0,900}(self-signed|CreateCertificate)'
      case_insensitive: true

  - id: go-redirector-short-lived-certs
    desc: Go redirector short-lived certificate profile
    crit: notable
    if:
      type: string_literal
      exact: shortlived

  - id: go-ecdsa-ephemeral-cert-key
    desc: Go ephemeral ECDSA certificate key
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'ecdsa\.GenerateKey|elliptic\.P256'

  - id: go-random-cert-subject-fields
    desc: Go randomized certificate serial field
    crit: component
    conf: 0.86
    if:
      type: text
      substr: SerialNumber

  - id: go-certificate-template-marker
    desc: Go certificate template marker
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'x509\.Certificate|pkix\.Name'
  - id: go-camouflage-infra-label
    desc: Infrastructure camouflage label
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'System Infrastructure|Internal Services|Mesh Node'
  - id: go-camouflage-kubernetes-label
    desc: Kubernetes camouflage label
    crit: component
    conf: 0.86
    if:
      type: text
      substr: Kubernetes Cluster
  - id: go-mutual-tls-cert-usage
    desc: Go mutual TLS certificate usage
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'ExtKeyUsage(ServerAuth|ClientAuth)[\s\S]{0,140}ExtKeyUsage(ServerAuth|ClientAuth)'
  - id: go-backdated-certificate-template
    desc: Go backdated certificate template
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'NotBefore:\s*time\.Now\(\)\.Add\(-[0-9]+ \* time\.Hour\)'

  - id: go-smb-ntlm-session-state
    desc: Go SMB NTLM session state
    if:
      type: text
      regex: 'SMB2 session[\s\S]{0,700}(NTLMChallenge|SigningKey|NTLMDowngradeLevel)'

  - id: go-smb-share-handle-management
    desc: Go SMB share and handle management
    if:
      type: text
      substr: smbHandle

  - id: go-null-sink-helper
    desc: Go null-sink helper marker
    crit: component
    if:
      type: text
      substr: IsNullSink

  - id: go-smb-session-context-marker
    desc: Go SMB session context marker
    crit: component
    if:
      type: text
      regex: '\bSMB[A-Za-z0-9_]*Session[A-Za-z0-9_]*\b'

  - id: go-smb-channel-context-marker
    desc: Go SMB channel context marker
    crit: component
    if:
      type: text
      regex: '\bSMB[A-Za-z0-9_]*Channel[A-Za-z0-9_]*\b'

  - id: go-smb-command-context-marker
    desc: Go SMB command context marker
    crit: component
    if:
      type: text
      regex: '\bSMB[A-Za-z0-9_]*Command[A-Za-z0-9_]*\b'

  - id: go-smb-task-context-marker
    desc: Go SMB task context marker
    crit: component
    if:
      type: text
      regex: '\bSMB[A-Za-z0-9_]*Task[A-Za-z0-9_]*\b'

  - id: go-smb-agent-context-marker
    desc: Go SMB agent context marker
    crit: component
    if:
      type: text
      regex: '\bSMB[A-Za-z0-9_]*Agent[A-Za-z0-9_]*\b'

  - id: go-smb-share-root-state
    desc: Go SMB share root state
    if:
      type: text
      regex: '(?i)\b(SMB|smb)[A-Za-z0-9_]{0,40}RootPath|RootPath[A-Za-z0-9_]{0,40}(SMB|smb)\b'

  - id: go-smb-delete-on-close-state
    desc: Go SMB delete-on-close state
    if:
      type: text
      substr: DeleteOnClose

  - id: go-framework-creds-command
    desc: Go framework credentials command
    if:
      type: symbol
      exact: CredsCmd

  - id: go-framework-rpc-creds-call
    desc: Go framework RPC credentials call
    if:
      type: symbol
      exact: con.Rpc.Creds

composite_rules:
  - id: go-smb-context-marker
    desc: Go SMB session or task context marker
    crit: component
    any:
      - id: go-smb-session-context-marker
      - id: go-smb-channel-context-marker
      - id: go-smb-command-context-marker
      - id: go-smb-task-context-marker
      - id: go-smb-agent-context-marker

  - id: go-lsass-minidump-control
    desc: Go calls MiniDumpWriteDump near LSASS or credential-dump markers
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/credential-access/dump/process::minidump-write-dump-go-source
      - id: go-lsass-dump-marker
    near_lines: 32

  - id: go-camouflage-cert-subjects
    desc: Go camouflage certificate subject strings
    crit: notable
    conf: 0.86
    all:
      - id: go-certificate-template-marker
    any:
      - id: go-camouflage-infra-label
      - id: go-camouflage-kubernetes-label
    near_bytes: 300

  - id: go-encrypted-c2-agent-loop
    desc: Go encrypted C2 agent command loop
    crit: hostile
    all:
      - id: go-encrypted-command-pull-loop
      - id: go-c2-result-push
    any:
      - id: go-agent-file-transfer-commands

  - id: go-launchagent-agent-persistence
    desc: Go macOS LaunchAgent agent persistence
    crit: hostile
    all:
      - id: micro-behaviors/os/service/config::go-launchagent-plist-template
      - id: go-agent-self-copy-persistence

  - id: go-ebpf-rootkit-file-actions
    desc: Go eBPF rootkit file action controls
    crit: hostile
    all:
      - id: go-ebpf-file-hide-actions
      - id: go-ebpf-path-action-map

  - id: go-c2-profile-sync-controller
    desc: Go C2 profile sync controller
    crit: hostile
    all:
      - id: go-c2-profile-sync-message
      - id: go-c2-profile-autostart

  - id: go-c2-teamserver-web-routes
    desc: Go C2 teamserver web routes
    crit: hostile
    all:
      - id: go-c2-agent-message-route
      - id: go-c2-agent-message-webhook
    needs: 2
    any:
      - id: go-c2-create-payload-webhook
      - id: go-c2-create-task-webhook
      - id: go-c2-create-credential-webhook
      - id: go-c2-create-keylog-webhook
      - id: go-c2-start-profile-webhook
      - id: go-c2-profile-status-webhook
      - id: go-c2-profile-output-webhook
      - id: go-c2-profile-sample-webhook
      - id: go-c2-parameter-webhook
      - id: go-c2-api-token-webhook
      - id: go-c2-password-update-webhook
      - id: go-c2-secrets-webhook
      - id: go-c2-jwt-auth-middleware
      - id: go-c2-cookie-auth-middleware

  - id: go-c2-redirector-tls-provisioning
    desc: Go C2 redirector TLS provisioning
    crit: hostile
    all:
      - id: go-redirector-acme-selfsigned-tls
      - id: go-redirector-short-lived-certs
    unless:
      - id: well-known/app/sing-box::source-tree

  - id: go-camouflaged-selfsigned-tls
    desc: Go camouflaged self-signed TLS certificate
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/crypto/certificate/usage::go-create-certificate
      - id: go-ecdsa-ephemeral-cert-key
      - id: go-random-cert-subject-fields
      - id: go-camouflage-cert-subjects
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: well-known/app/sing-box::source-tree
  - id: go-ephemeral-mutual-tls-c2-cert
    desc: Go ephemeral mutual TLS C2 certificate
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/crypto/certificate/usage::go-create-certificate
      - id: go-mutual-tls-cert-usage
      - id: go-backdated-certificate-template
    any:
      - id: go-ecdsa-ephemeral-cert-key
      - id: go-camouflage-cert-subjects
  - id: go-cgo-callback-agent-plugin
    desc: Go cgo callback agent plugin
    crit: suspicious
    conf: 0.92
    all:
      - id: go-cgo-plugin-export-entrypoints
      - id: go-plugin-host-callback-bridge
    any:
      - id: micro-behaviors/dylib/load/ffi::go-cgo-import
      - id: go-cgo-host-buffer-decode

  - id: go-smb-c2-server-session
    desc: Go SMB C2 server session handling
    crit: hostile
    all:
      - id: go-smb-ntlm-session-state
      - id: go-smb-share-handle-management
      - id: go-null-sink-helper
      - id: go-smb-context-marker
    any:
      - id: go-smb-share-root-state
      - id: go-smb-delete-on-close-state

  - id: go-c2-credential-command
    desc: Go C2 credential command
    crit: hostile
    all:
      - id: go-framework-creds-command
      - id: go-framework-rpc-creds-call
