defaults:
  platforms: [windows]
  for: [csharp]
  crit: component
  conf: 0.9
  attack: T1219

traits:
  - id: dotnet-agent-job-service-registration
    desc: .NET agent job service registration
    if:
      type: symbol
      kind: call
      regex: 'AddScoped<[^>]*(IAgentService|AgentService)[^>]*>'

  - id: dotnet-job-service-registration
    desc: .NET job service registration
    if:
      type: symbol
      kind: call
      regex: 'AddScoped<[^>]*(IJobService|JobService)[^>]*>'

  - id: dotnet-beacon-handler-registration
    desc: .NET beacon handler registration
    if:
      type: symbol
      kind: call
      regex: 'AddScoped<[^>]*Beacon[^>]*Handler[^>]*>'

  - id: dotnet-handshake-handler-registration
    desc: .NET handshake handler registration
    if:
      type: symbol
      kind: call
      regex: 'AddScoped<[^>]*Handshake[^>]*Handler[^>]*>'

  - id: dotnet-remote-shell-handler-registration
    desc: .NET shell handler registration
    if:
      type: symbol
      kind: call
      regex: 'AddScoped<[^>]*Shell[^>]*Handler[^>]*>'

  - id: dotnet-download-handler-registration
    desc: .NET download handler registration
    if:
      type: symbol
      kind: call
      regex: 'AddScoped<[^>]*Download[^>]*Handler[^>]*>'

  - id: dotnet-result-dispatcher-registration
    desc: .NET result dispatcher registration
    if:
      type: symbol
      kind: call
      regex: 'AddScoped<[^>]*ResultDispatcher[^>]*>'

  - id: dotnet-signal-dispatcher-registration
    desc: .NET signal dispatcher registration
    if:
      type: symbol
      kind: call
      regex: 'AddScoped<[^>]*SignalDispatcher[^>]*>'

  - id: dotnet-dns-service-registration
    desc: .NET DNS service registration
    if:
      type: symbol
      kind: call
      regex: 'AddHostedService<[^>]*DnsService[^>]*>'

  - id: dotnet-chunked-transfer-service-registration
    desc: .NET chunked transfer service registration
    if:
      type: symbol
      kind: call
      regex: 'AddSingleton<[^>]*Chunked(T|Tr)ansfers[^>]*>'

composite_rules:
  - id: dotnet-c2-control-plane-registration
    desc: .NET C2 control plane registration
    crit: suspicious
    conf: 0.96
    all:
      - id: dotnet-agent-job-service-registration
      - id: dotnet-job-service-registration
      - id: dotnet-beacon-handler-registration
    needs: 3
    any:
      - id: dotnet-handshake-handler-registration
      - id: dotnet-remote-shell-handler-registration
      - id: dotnet-download-handler-registration
      - id: dotnet-result-dispatcher-registration
      - id: dotnet-signal-dispatcher-registration
      - id: dotnet-dns-service-registration
      - id: dotnet-chunked-transfer-service-registration

  - id: dotnet-c2-command-handler-set
    desc: .NET C2 command handler set
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-c2-control-plane-registration
      - id: dotnet-handshake-handler-registration
      - id: dotnet-remote-shell-handler-registration
    any:
      - id: dotnet-download-handler-registration
      - id: dotnet-dns-service-registration
      - id: dotnet-chunked-transfer-service-registration
