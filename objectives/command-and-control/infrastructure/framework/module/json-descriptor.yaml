defaults:
  platforms: [unix, windows]
  for: [json]
  crit: suspicious
  conf: 0.9

traits:
  - id: json-base-standard-module
    desc: JSON standard module descriptor
    if:
      type: value
      path: base.type
      exact: standard

  - id: json-base-command-entry
    desc: JSON module command entry
    if:
      type: value
      path: "base.commands[*]"
      regex: '.+'

  - id: json-module-credentials-path
    desc: JSON module credentials path
    if:
      type: value
      path: "base.path[*]"
      exact: credentials

  - id: json-module-privesc-path
    desc: JSON module privesc path
    if:
      type: value
      path: "base.path[*]"
      exact: privesc

  - id: json-module-persistence-path
    desc: JSON module persistence path
    if:
      type: value
      path: "base.path[*]"
      exact: persistence

  - id: json-module-lateral-path
    desc: JSON module lateral path
    if:
      type: value
      path: "base.path[*]"
      exact: lateral

  - id: json-module-exec-path
    desc: JSON module exec path
    if:
      type: value
      path: "base.path[*]"
      exact: exec

  - id: json-module-shell-path
    desc: JSON module shell path
    if:
      type: value
      path: "base.path[*]"
      exact: shell

  - id: json-module-bash-path
    desc: JSON module bash path
    if:
      type: value
      path: "base.path[*]"
      exact: bash

  - id: json-module-powershell-path
    desc: JSON module PowerShell path
    if:
      type: value
      path: "base.path[*]"
      exact: powershell

  - id: json-module-sh-path
    desc: JSON module sh path
    if:
      type: value
      path: "base.path[*]"
      exact: sh

  - id: json-module-shell-interpreter-command
    desc: JSON module shell interpreter command
    if:
      type: value
      path: "base.commands[*]"
      regex: '(^/bin/(ba)?sh$|^sh$|^-c$|powershell\.exe$)'
      case_insensitive: true

  - id: json-module-download-command
    desc: JSON module download command
    if:
      type: value
      path: "base.commands[*]"
      regex: '(^"?wget$|^"?curl$|raw\.githubusercontent\.com|https?://)'
      case_insensitive: true

  - id: json-module-temp-script-command
    desc: JSON module temp script command
    if:
      type: value
      path: "base.commands[*]"
      regex: '/tmp/[A-Za-z0-9._-]+\.sh'
      case_insensitive: true

  - id: json-module-chmod-command
    desc: JSON module chmod command
    if:
      type: value
      path: "base.commands[*]"
      regex: '^chmod$|chmod\s+\+x|\+x'
      case_insensitive: true

  - id: json-module-temp-cleanup-command
    desc: JSON module temp cleanup command
    if:
      type: value
      path: "base.commands[*]"
      regex: 'rm\s+/tmp/[A-Za-z0-9._-]+\.sh'
      case_insensitive: true

  - id: json-module-credential-description
    desc: JSON module credential description
    if:
      type: value
      path: base.description
      regex: 'credentials?|passwords?|mimikatz'
      case_insensitive: true

  - id: json-module-privilege-description
    desc: JSON module privilege description
    if:
      type: value
      path: base.description
      regex: 'privilege|privesc|post-exploitation'
      case_insensitive: true

  # container/enumerate/docker/swap below are bare single-word matchers that
  # only carry meaning as `any:` legs of the offensive-framework command-module
  # composites. Standalone they match any document mentioning these common dev
  # terms (e.g. npm dist-tag branch names like "snapshot-docker-sandbox" or
  # "core-swap"), so they are component-tier fragments. The composites' `all:`
  # anchors (standard-module + command-entry + shell-interpreter) carry intent.
  - id: json-module-container-description
    desc: JSON module container description
    crit: component
    if:
      type: value
      path: base.description
      regex: '\bcontainer\b'
      case_insensitive: true

  - id: json-module-kubernetes-cluster-description
    desc: JSON module Kubernetes cluster description
    if:
      type: value
      path: base.description
      regex: 'Kubernetes cluster|cluster.*CVEs?|known CVEs'
      case_insensitive: true

  - id: json-module-recon-description
    desc: JSON module describes enumeration
    crit: component
    if:
      type: text
      word: enumerate

  - id: json-module-docker-description
    desc: JSON module description mentions Docker
    crit: component
    if:
      type: value
      path: base.description
      regex: '\bdocker\b'
      case_insensitive: true

  - id: json-module-swap-description
    desc: JSON module mentions swap
    crit: component
    if:
      type: text
      word: swap

  - id: json-module-lsass-description
    desc: JSON module LSASS description
    if:
      type: value
      path: base.description
      regex: '\blsass\b'

  - id: json-module-go-interpreter
    desc: JSON module Go interpreter
    if:
      type: value
      path: base.GoInterpreter
      exact: "true"

  - id: json-module-sourcecode-command
    desc: JSON module sourcecode command
    if:
      type: value
      path: "base.commands[*]"
      regex: '^data/modules/sourcecode/'
      case_insensitive: true

  - id: json-module-mainfunc-command
    desc: JSON module main function command wrapper
    if:
      type: value
      path: "base.commands[*]"
      regex: '^mainfunc\('
      case_insensitive: true

  - id: json-module-kubelet-option
    desc: JSON module kubelet option
    if:
      type: value
      path: "base.options[*].description"
      substr: kubelet API

  - id: json-module-container-option
    desc: JSON module container option
    if:
      type: value
      path: "base.options[*].description"
      regex: 'pods?|container|namespace'
      case_insensitive: true

  - id: json-module-rce-option
    desc: JSON module RCE option
    if:
      type: value
      path: "base.options[*].description"
      regex: '\bRCE\b'

  - id: json-module-nodeip-option
    desc: JSON module NodeIp option
    if:
      type: value
      path: "base.options[*].name"
      exact: NodeIp

  - id: json-module-nodehost-option
    desc: JSON module NodeHost option
    if:
      type: value
      path: "base.options[*].name"
      exact: NodeHost

  - id: json-module-nodeaddress-option
    desc: JSON module NodeAddress option
    if:
      type: value
      path: "base.options[*].name"
      exact: NodeAddress

  - id: json-module-bash-c-operator-notes
    desc: JSON module bash -c operator notes
    if:
      type: value
      path: base.notes
      substr: /bin/bash -c

  - id: json-module-kubelet-description
    desc: JSON module kubelet operation description
    if:
      type: value
      path: base.description
      substr: kubelet API

  - id: json-module-container-command-description
    desc: JSON module container command description
    if:
      type: value
      path: base.description
      regex: 'run command on container|search for containers with RCE'
      case_insensitive: true

  - id: json-module-kubernetes-pods-description
    desc: JSON module Kubernetes pods description
    if:
      type: value
      path: base.description
      regex: '\bpods?\b'
      case_insensitive: true

  - id: json-module-kubernetes-token-description
    desc: JSON module Kubernetes token description
    if:
      type: value
      path: base.description
      regex: '\btoken\b'
      case_insensitive: true

  - id: json-module-load-script-from-path
    desc: JSON module loads script from path
    if:
      type: value
      path: base.LoadScriptFromPath
      exact: "true"

  - id: json-module-hidden-powershell-option
    desc: JSON module hidden PowerShell option
    if:
      type: value
      path: "base.options[*].value"
      exact: Hidden

  - id: json-module-encoded-command-option
    desc: JSON module encoded command option
    if:
      type: value
      path: "base.options[*].name"
      exact: EncodedCommand

composite_rules:
  - id: json-offensive-framework-command-module
    desc: JSON offensive framework command module
    crit: hostile
    conf: 0.94
    all:
      - id: json-base-standard-module
      - id: json-base-command-entry
      - id: json-module-shell-interpreter-command
    any:
      - id: json-module-credentials-path
      - id: json-module-privesc-path
      - id: json-module-persistence-path
      - id: json-module-lateral-path
      - id: json-module-exec-path
      - id: json-module-shell-path
      - id: json-module-bash-path
      - id: json-module-powershell-path
      - id: json-module-sh-path
      - id: json-module-credential-description
      - id: json-module-privilege-description
      - id: json-module-container-description
      - id: json-module-kubernetes-cluster-description
      - id: json-module-recon-description
      - id: json-module-docker-description
      - id: json-module-swap-description
      - id: json-module-lsass-description

  - id: json-script-module-download-execute-cleanup
    desc: JSON module downloads executes and cleans temp script
    crit: hostile
    conf: 0.97
    all:
      - id: json-base-standard-module
      - id: json-module-download-command
      - id: json-module-temp-script-command
      - id: json-module-chmod-command
      - id: json-module-temp-cleanup-command

  - id: json-local-script-loader-module
    desc: JSON local script loader module
    crit: hostile
    conf: 0.92
    all:
      - id: json-base-standard-module
      - id: json-module-load-script-from-path
      - id: json-module-shell-interpreter-command
    any:
      - id: json-module-credential-description
      - id: json-module-privilege-description
      - id: json-module-container-description
      - id: json-module-recon-description
      - id: json-module-docker-description
      - id: json-module-swap-description
      - id: json-module-lsass-description

  - id: json-go-kubernetes-postex-module
    desc: JSON Go Kubernetes post-exploitation module
    crit: hostile
    conf: 0.95
    all:
      - id: json-base-standard-module
      - id: json-module-go-interpreter
      - id: json-module-sourcecode-command
      - id: json-module-mainfunc-command
    any:
      - id: json-module-kubelet-option
      - id: json-module-container-option
      - id: json-module-rce-option
      - id: json-module-kubernetes-cluster-description
      - id: json-module-node-target-option
      - id: json-module-bash-c-operator-notes
      - id: json-module-kubelet-description
      - id: json-module-container-command-description
      - id: json-module-kubernetes-pods-description
      - id: json-module-kubernetes-token-description
      - id: objectives/command-and-control/infrastructure/framework/json::json-container-breakout-description

  - id: json-hidden-powershell-command-module
    desc: JSON hidden PowerShell command module
    crit: hostile
    conf: 0.96
    all:
      - id: json-base-standard-module
      - id: json-module-shell-interpreter-command
      - id: json-module-hidden-powershell-option
      - id: json-module-encoded-command-option

  - id: json-module-node-target-option
    desc: JSON module node target option
    any:
      - id: json-module-nodeip-option
      - id: json-module-nodehost-option
      - id: json-module-nodeaddress-option
