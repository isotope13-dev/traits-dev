defaults:
  platforms: [unix, windows]
  for: [dockerfile]
  crit: suspicious
  conf: 0.9

traits:
  - id: dockerfile-apache-backdoor-module-build
    desc: Dockerfile Apache backdoor
    if:
      type: text
      regex: 'apxs\s+-i\s+-a\s+-c\s+mod_backdoor\.c'
      case_insensitive: true
  - id: dockerfile-apache-loads-backdoor-module
    desc: Dockerfile loads Apache backdoor module
    if:
      type: text
      regex: 'LoadModule\s+backdoor_module.{0,120}mod_backdoor\.so'
      case_insensitive: true

  - id: dockerfile-c2-controller-entrypoint
    desc: Dockerfile C2 entrypoint
    if:
      type: text
      regex: '(ENTRYPOINT|CMD)\s+.{0,80}(Controller\.py|mythic_server|merlinserver)'
      case_insensitive: true
  - id: dockerfile-mythic-server-artifact
    desc: Dockerfile Mythic server artifact copy
    if:
      type: text
      regex: 'COPY\s+--from=builder\s+/mythic_server\s+/mythic_server'
      case_insensitive: true

  - id: dockerfile-offensive-framework-directory
    desc: Dockerfile C2 worktree
    if:
      type: text
      regex: '(COPY|ADD)[^\n]{0,120}(/C2|/opt/.{0,40}C2)[\s\S]{0,300}(install\.sh|requirements\.txt)'
      case_insensitive: true
  - id: dockerfile-c2-worktree-entrypoint
    desc: Dockerfile C2 worktree entrypoint
    if:
      type: text
      regex: 'ENTRYPOINT\s+\[[^\n]{0,160}/C2[A-Za-z0-9_.-]{0,40}/'
      case_insensitive: true

  - id: dockerfile-untrusted-local-apk-install
    desc: Dockerfile untrusted APK
    if:
      type: text
      regex: 'COPY\s+packages/.{1,80}\.apk\s+/tmp/[\s\S]{0,260}apk\s+add\s+--allow-untrusted'
      case_insensitive: true
  - id: dockerfile-local-apk-staging
    desc: Dockerfile stages local APK package
    if:
      type: text
      regex: 'COPY\s+packages/.{1,100}\.apk\s+/tmp/'
      case_insensitive: true

  - id: dockerfile-ghostdog-infection-check
    desc: Dockerfile infection check
    if:
      type: text
      regex: 'dummy shell script[\s\S]{0,260}(infect|infected)'
      case_insensitive: true

  - id: dockerfile-ssh-root-password-backdoor
    desc: Dockerfile root SSH
    if:
      type: text
      regex: 'PermitRootLogin yes[\s\S]{0,240}PasswordAuthentication yes'
      case_insensitive: true

  - id: dockerfile-cross-compile-windows-implant
    desc: Dockerfile Windows cross-compile
    crit: notable
    if:
      type: text
      regex: '(rustup target add|GOOS=windows)[\s\S]{0,220}(x86_64-pc-windows|GOARCH=amd64)'
      case_insensitive: true

  - id: dockerfile-windows-gui-cross-compile
    desc: Dockerfile Windows GUI cross-compile
    if:
      type: text
      regex: 'GOOS=windows[\s\S]{0,260}(GOARCH=amd64|x86_64-w64-mingw32)[\s\S]{0,260}-H[ =]windowsgui'
      case_insensitive: true

  - id: dockerfile-garble-literal-build
    desc: Dockerfile garble literal obfuscation build
    if:
      type: text
      regex: '\bgarble\b.{0,120}-literals.{0,120}\bbuild\b'
      case_insensitive: true

  - id: dockerfile-upx-packed-build-output
    desc: Dockerfile UPX packed build output
    if:
      type: text
      regex: '\bupx(\s+--force)?\s+/(dist|build|out|tmp)/.{1,160}'
      case_insensitive: true

  - id: dockerfile-tor-enabled-implant-build
    desc: Dockerfile Tor-enabled implant build
    if:
      type: text
      word: tor-static
      case_insensitive: true

  - id: dockerfile-client-server-artifact-output
    desc: Dockerfile client and server artifact output
    if:
      type: text
      regex: '/dist/(client|server)[\s\S]{0,400}/dist/(server|client)'
      case_insensitive: true

  - id: dockerfile-multi-os-client-build-matrix
    desc: Dockerfile multi-OS client build matrix
    if:
      type: text
      regex: 'TARGETS.{0,80}windows/amd64[\s\S]{0,180}linux/amd64[\s\S]{0,180}darwin/amd64'
      case_insensitive: true

  - id: dockerfile-build-clients-entrypoint
    desc: Dockerfile client build entrypoint
    if:
      type: text
      regex: 'ENTRYPOINT\s+\[[^\n]{0,120}build-clients\.sh'
      case_insensitive: true

  - id: dockerfile-c2-beacon-command
    desc: Dockerfile runs C2 beacon client
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CMD\s+\[[\s\S]{0,220}(c2|beacon)[_\-/][A-Za-z0-9_.-]*\.py'
      case_insensitive: true

  - id: dockerfile-self-labeled-malware-service
    desc: Dockerfile self-labeled malware service
    if:
      type: text
      regex: '(FROM.{0,120}as\s+malware_service|WORKDIR\s+/malware_service)'
      case_insensitive: true

  - id: dockerfile-copy-malware-service-tree
    desc: Dockerfile copies malware service tree
    if:
      type: text
      regex: 'COPY\s+\./\s+/malware_service'
      case_insensitive: true

  - id: dockerfile-exploit-lab-env
    desc: Dockerfile exploit lab environment flag
    if:
      type: text
      regex: 'ENV\s+EXPLOIT_[A-Z0-9_]{1,40}=1'
      case_insensitive: true

  - id: dockerfile-implant-build-marker
    desc: Dockerfile implant marker
    if:
      type: text
      regex: 'COPY[^\n]{0,140}\b(implant|payload-loader|shellcode)\b'
      case_insensitive: true
  - id: dockerfile-c2-client-source-layout
    desc: Dockerfile C2 client source layout
    if:
      type: text
      regex: 'COPY\s+c2\s+/c2[\s\S]{0,220}COPY\s+client\s+/client'
      case_insensitive: true
  - id: dockerfile-exploit-server-command
    desc: Dockerfile runs exploit server
    if:
      type: text
      regex: 'CMD\s+\[[\s\S]{0,180}exploit_server\.py'
      case_insensitive: true
  - id: dockerfile-lab-target-app-copy
    desc: Dockerfile copies exploit lab target app
    if:
      type: text
      regex: 'COPY\s+infra/lab/target-app/'
      case_insensitive: true

  - id: dockerfile-rootkit-build-marker
    desc: Dockerfile kernel/eBPF build marker
    crit: notable
    if:
      type: text
      regex: '(linux-headers|libbpf|ebpf)[\s\S]{0,360}(make|cargo)'
      case_insensitive: true
    unless:
      - id: well-known/tool/detection/clawker::source-tree
      - id: well-known/tool/dual-use/shadowsocks-libev::shadowsocks-libev-source
  - id: dockerfile-kernel-rust-header-tree
    desc: Dockerfile kernel Rust header tree
    if:
      type: text
      regex: 'linux-lib-rust-.{0,40}-generic[\s\S]{0,260}linux-headers-.{0,40}-generic'
      case_insensitive: true

composite_rules:
  - id: dockerfile-c2-framework-container
    desc: Dockerfile builds or runs a C2 framework container
    crit: hostile
    needs: 2
    any:
      - id: dockerfile-c2-controller-entrypoint
      - id: dockerfile-offensive-framework-directory
      - id: dockerfile-c2-worktree-entrypoint
  - id: dockerfile-mythic-server-container
    desc: Dockerfile builds Mythic C2 server container
    crit: hostile
    conf: 0.94
    all:
      - id: dockerfile-c2-controller-entrypoint
      - id: dockerfile-mythic-server-artifact
  - id: dockerfile-apache-backdoor-container
    desc: Dockerfile builds and loads Apache backdoor module
    crit: hostile
    conf: 0.95
    all:
      - id: dockerfile-apache-backdoor-module-build
      - id: dockerfile-apache-loads-backdoor-module

  - id: dockerfile-implant-build-container
    desc: Dockerfile builds implant or loader artifacts
    crit: hostile
    all:
      - id: dockerfile-cross-compile-windows-implant
      - id: dockerfile-implant-build-marker

  - id: dockerfile-packed-garbled-windows-gui-implant-build
    desc: Dockerfile builds packed garbled Windows GUI implant
    crit: hostile
    conf: 0.95
    all:
      - id: dockerfile-cross-compile-windows-implant
      - id: dockerfile-windows-gui-cross-compile
      - id: dockerfile-garble-literal-build
      - id: dockerfile-upx-packed-build-output

  - id: dockerfile-tor-client-server-implant-build
    desc: Dockerfile builds Tor client/server implant artifacts
    crit: hostile
    conf: 0.94
    all:
      - id: dockerfile-cross-compile-windows-implant
      - id: dockerfile-tor-enabled-implant-build
      - id: dockerfile-client-server-artifact-output

  - id: dockerfile-garbled-tor-client-server-implant-build
    desc: Dockerfile builds obfuscated Tor client/server implant artifacts
    crit: hostile
    conf: 0.96
    all:
      - id: dockerfile-cross-compile-windows-implant
      - id: dockerfile-windows-gui-cross-compile
      - id: dockerfile-garble-literal-build
      - id: dockerfile-tor-enabled-implant-build
      - id: dockerfile-client-server-artifact-output
    any:
      - id: dockerfile-upx-packed-build-output
      - id: dockerfile-implant-build-marker
  - id: dockerfile-root-ssh-password-container
    desc: Dockerfile enables root SSH with password
    crit: hostile
    conf: 0.95
    all:
      - id: dockerfile-ssh-root-password-backdoor
      - id: micro-behaviors/os/security/auth/password::dockerfile-root-password-set
  - id: dockerfile-untrusted-local-apk-container
    desc: Dockerfile installs staged untrusted APK
    crit: suspicious
    conf: 0.93
    all:
      - id: dockerfile-untrusted-local-apk-install
      - id: dockerfile-local-apk-staging
  - id: dockerfile-multi-os-agent-builder
    desc: Dockerfile builds multi-OS client agents
    crit: hostile
    conf: 0.93
    all:
      - id: dockerfile-multi-os-client-build-matrix
      - id: dockerfile-build-clients-entrypoint
  - id: dockerfile-c2-beacon-lab-container
    desc: Dockerfile launches C2 beacon lab container
    crit: hostile
    conf: 0.94
    all:
      - id: dockerfile-c2-beacon-command
      - id: dockerfile-exploit-lab-env
  - id: dockerfile-malware-service-container
    desc: Dockerfile builds self-labeled malware service
    crit: suspicious
    conf: 0.92
    all:
      - id: dockerfile-self-labeled-malware-service
      - id: dockerfile-copy-malware-service-tree
  - id: dockerfile-c2-client-container
    desc: Dockerfile builds C2 client container
    crit: hostile
    conf: 0.93
    all:
      - id: dockerfile-implant-build-marker
      - id: dockerfile-c2-client-source-layout
  - id: dockerfile-exploit-server-container
    desc: Dockerfile runs exploit server container
    crit: hostile
    conf: 0.93
    all:
      - id: dockerfile-exploit-lab-env
      - id: dockerfile-exploit-server-command
  - id: dockerfile-exploit-target-container
    desc: Dockerfile runs exploit lab target container
    crit: suspicious
    conf: 0.9
    all:
      - id: dockerfile-exploit-lab-env
      - id: dockerfile-lab-target-app-copy
  - id: dockerfile-rootkit-kernel-build-container
    desc: Dockerfile builds kernel rootkit target
    crit: hostile
    conf: 0.94
    all:
      - id: dockerfile-rootkit-build-marker
      - id: dockerfile-kernel-rust-header-tree
