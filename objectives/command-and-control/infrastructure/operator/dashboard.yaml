defaults:
  platforms: [windows, unix]
  for: [php]
  crit: component
traits:
  - id: web-live-connection-map
    desc: Web UI string for live connection map
    conf: 0.8
    if:
      type: text
      substr: "Live Connection Map"
  - id: web-global-connections
    desc: Web UI string for global connections
    conf: 0.8
    if:
      type: text
      substr: "Live Global Connections"
  - id: jqvmap-world-map
    desc: Uses JQVMap for world visualization
    conf: 0.7
    if:
      type: text
      substr: "jquery.vmap.world.js"
composite_rules:
  - id: c2-botnet-dashboard
    desc: C2 Botnet geographical visualization dashboard
    crit: hostile
    conf: 0.95
    attack: T1041
    needs: 3
    any:
      - id: web-live-connection-map
      - id: web-global-connections
      - id: jqvmap-world-map
      - id: micro-behaviors/data/db/mysql::php-mysqli-connect
      - id: micro-behaviors/communications/http/client/cdn::cdnjs-asset
    all:
      - id: micro-behaviors/data/format/html::html-generator-tags
      - id: objectives/impact/cryptojacking/miner/context::miner-word
