# C2 Endpoint Path Masquerading
# Malware disguises C2 endpoints as legitimate Microsoft services
# BurrowShell uses Windows Update, device management, and telemetry paths
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1036.005
  mbc: B0030
traits:
  - id: windows-update-endpoint
    desc: Windows Update service endpoint path
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: /WindowsUpdate/ClientWebService
  - id: device-management-endpoint
    desc: Device management API endpoint path
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: /deviceManagement/managedDevices
  - id: onecollector-endpoint
    desc: Microsoft OneCollector telemetry endpoint path
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: /OneCollector/
  - id: sync-updates-endpoint
    desc: Windows Update sync endpoint path
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: /SyncUpdates
  - id: windows-update-useragent
    desc: Windows Update Agent user-agent string
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: Windows-Update-Agent/
composite_rules:
  - id: c2-endpoint-masquerade
    desc: C2 endpoints masquerading as Microsoft services
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: windows-update-endpoint
      - id: device-management-endpoint
      - id: onecollector-endpoint
      - id: sync-updates-endpoint
      - id: windows-update-useragent
    unless:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
  - id: c2-masquerade-with-http
    desc: Microsoft-masquerading endpoints with HTTP client
    crit: hostile
    conf: 0.95
    all:
      - id: c2-endpoint-masquerade
    any:
      - id: micro-behaviors/communications/http/client::winhttp-open
      - id: micro-behaviors/communications/http/client/
    unless:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
