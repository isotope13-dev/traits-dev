# DNS resolution bypass / pinning patterns: code that side-steps the system
# resolver to force traffic at hardcoded IPs. Strong indicator of malware
# evading DNS-based blocklists, EDR DNS hooks, and sinkholes.
defaults:
  platforms: [windows, unix]
  attack: T1090.004
  mbc: B0030

traits:
- id: inverted-dns-loopback-check
  desc: "Inverted DNS check returns None non-loopback"
  crit: suspicious
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: '\.split\(["'']\.["'']\)\[0\]\s*!=\s*["'']127["'']'

  # Monkey-patching the resolver — `socket.getaddrinfo = my_resolver` swaps
  # out the standard library's lookup function process-wide. Used by
  # stagers to redirect every subsequent connection.
  # dnspython direct query targeting a specific nameserver. Legitimate
  # code lets the OS resolver pick.
- id: dnspython-direct-where
  desc: dnspython query targets specific nameserver
  crit: suspicious
  conf: 0.92
  for: [python]
  if:
    type: text
    regex: 'dns\.query\.(udp|tcp|tls|https)\s*\([^)\n]{0,200}\bwhere\s*='
  # Writing to /etc/hosts or hosts file from a script — the cross-platform
  # form of curl --resolve. Different from existing hosts-file/ traits
  # which focus on AV/security-vendor blocking; this one is for C2 redirect.
  # Self-contained "write into the hosts file" matchers: each bundles a write
  # verb with the hosts path (`*/etc/hosts`, covering both `/etc/hosts` and the
  # Windows `...\drivers\etc\hosts` tail) so a bare read, comment, or unrelated
  # `sed -i` of another file does not fire. This is the cross-platform form of
  # `curl --resolve` — pinning a cover hostname to an attacker IP.
- id: hosts-write-shell-append
  desc: Shell append-redirect into the hosts file
  crit: component
  conf: 0.92
  for: [shell, batch, python]
  if:
    type: text
    regex: '(>>|tee\s+-a)[^\n]{0,40}etc[\\/]+hosts'
- id: hosts-write-cmdlet-sed
  desc: PowerShell/sed write into the hosts file
  crit: component
  conf: 0.92
  for: [shell, powershell, python]
  if:
    type: text
    regex: '(Add-Content|Out-File|sed\s+-i)[^\n]{0,60}etc[\\/]+hosts'
- id: hosts-write-python-open
  desc: Python write-open of the hosts file
  crit: component
  conf: 0.92
  for: [python]
  if:
    type: text
    regex: 'open\([^)]{0,40}etc[\\/]+hosts[^)]{0,12}["''][aw]'
composite_rules:
  # Aggregator: any DNS-pin / resolver-bypass mechanism in this directory.
- id: dns-pin-mechanism
  desc: DNS resolution bypass mechanism (any form)
  crit: component
  conf: 0.93
  any:
  - id: inverted-dns-loopback-check
  - id: micro-behaviors/communications/dns/lookup/resolver::python-resolver-monkey-patch
  - id: dnspython-direct-where
  - id: hosts-file-c2-write
  - id: js-dns-pin-mechanism

- id: dns-pinning-bypass
  desc: DNS resolution bypass for hardcoded fallback
  crit: hostile
  conf: 0.96
  for: [scripts, source]
  all:
  - id: dns-pin-mechanism
  - id: micro-behaviors/communications/ip/literal::external-ipv4-script
  unless:
  - id: well-known/app/calvyn-code
  - id: micro-behaviors/communications/http/services/telegram::python-telegram-seed-fallback-list
  - id: well-known/tool/sysadmin/openwrt/passwall/
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::python-test-file
    - id: metadata/package/testing/presence/harness/
- id: hosts-file-c2-write
  desc: Script writes an entry into the system hosts file
  crit: notable
  conf: 0.94
  for: [python, shell, batch, powershell]
  any:
  - id: hosts-write-shell-append
  - id: hosts-write-cmdlet-sed
  - id: hosts-write-python-open
  unless:
  - id: well-known/lib/pyaigis/
  - id: well-known/tool/sysadmin/kubernetes/minikube
  - id: metadata/file/format/
  - id: well-known/app/olares::cli-source-tree
  - id: well-known/tool/sysadmin/alpine-packages::alpine-docker-machine-binary
  - id: well-known/lib/praisonaiagents::permission-pattern-doctest
