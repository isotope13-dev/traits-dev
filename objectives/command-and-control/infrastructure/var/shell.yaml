defaults:
  platforms: [unix, android, ios]
  for: [shell]
traits:
  - id: shell-c2-var
    desc: Shell script C2 variable
    crit: suspicious
    if:
      type: text
      regex: "(^|\n)\\s*[cC][2cC]=[\"']?https?://"
  - id: shell-c2-callback-var
    desc: Shell script C2 callback variable
    crit: suspicious
    if:
      type: text
      regex: "(^|\n)\\s*([sS]erver|[cC]allback|[bB]eacon)=[\"']?https?://"
