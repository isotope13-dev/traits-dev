defaults:
  for: [groovy]
  platforms: [unix, windows]

traits:
  - id: groovy-shell-lc-execute
    desc: Groovy bash -lc execute
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\[\s*["'']bash["'']\s*,\s*["'']-lc["'']\s*,.{0,80}\]\.execute\s*\('

  - id: groovy-dynamic-evaluate
    desc: Groovy dynamic evaluate
    crit: suspicious
    conf: 0.84
    if:
      type: text
      regex: '\bevaluate\s*\(\s*[a-zA-Z_]\w*\s*\)'

  - id: groovy-cmd-c-execute
    desc: Groovy cmd /c execute
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\[\s*["'']cmd["'']\s*,\s*["'']/c["'']\s*,.{0,80}\]\.execute\s*\('

  - id: groovy-classloader-defineclass
    desc: Groovy ClassLoader defineClass
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'extends ClassLoader[\s\S]{0,400}defineClass\s*\('

  - id: groovy-base64-bytecode-load
    desc: Groovy Base64 bytecode load
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'Base64\.getDecoder[\s\S]{0,220}defineClass'

  - id: groovy-curl-pipe-shell
    desc: curl piped to shell
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'curl[^\n]{0,80}\|\s*(bash|sh)\b'

  - id: groovy-wget-pipe-shell
    desc: wget piped to shell
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'wget[^\n]{0,80}\|\s*(bash|sh)\b'

  - id: groovy-certutil-download
    desc: certutil download command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bcertutil\b[^\n]{0,100}(http|-urlcache)'

  - id: groovy-bitsadmin-download
    desc: bitsadmin transfer command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bbitsadmin\b[^\n]{0,100}(/transfer|http)'

  - id: groovy-regsvr32-scriptlet
    desc: regsvr32 scriptlet command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bregsvr32\b[^\n]{0,100}(\.sct|/i:)'

  - id: groovy-rundll32-js-scriptlet
    desc: rundll32 JavaScript scriptlet
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'rundll32\.exe\s+javascript:'

  - id: groovy-scriptlet-getobject
    desc: remote scriptlet GetObject
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'GetObject("script:'

  - id: groovy-jenkins-scriptapproval
    desc: Jenkins ScriptApproval use
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ScriptApproval

  - id: groovy-jenkins-clear-approved
    desc: Jenkins approved scripts clear
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: clearApprovedScripts

  - id: groovy-jenkins-crumb-issuer
    desc: Jenkins crumb issuer access
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: crumbIssuer

  - id: groovy-jenkins-hpi-artifact
    desc: Jenkins HPI artifact
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: .hpi

  - id: groovy-jenkins-agent-jar
    desc: Jenkins agent jar
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: agent.jar

  - id: groovy-jenkins-shared-library
    desc: Jenkins shared library
    crit: suspicious
    conf: 0.84
    if:
      type: text
      regex: '(sharedLibraries|workflow-libs)'

  - id: groovy-jenkins-plugin-inventory
    desc: Jenkins plugin inventory
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: '$JENKINS_HOME/plugins'

  - id: groovy-credentials-xml
    desc: Jenkins credentials XML
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: credentials.xml

  - id: groovy-jenkins-secret-key
    desc: Jenkins secret key
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: secret.key

  - id: groovy-npmrc-token
    desc: npm registry token file
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: .npmrc

  - id: groovy-pypirc-token
    desc: PyPI token file
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: pypirc

  - id: groovy-jfrog-cli-config
    desc: JFrog CLI config file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: .jfrog/jfrog-cli.conf

  - id: groovy-cloud-metadata-ip
    desc: cloud metadata IP
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 169.254.169.254

  - id: groovy-kube-service-token
    desc: Kubernetes service token
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: serviceaccount/token

  - id: groovy-aws-secret-env
    desc: AWS secret environment variable
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: AWS_SECRET_ACCESS_KEY

  - id: groovy-rclone-exfil
    desc: rclone exfil command
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\brclone\b[^\n]{0,100}(\$WORKSPACE|copy|sync)'

  - id: groovy-mega-exfil
    desc: MEGA exfil command
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\bmega-put\b[^\n]{0,100}\$WORKSPACE'

  - id: groovy-rsync-exfil
    desc: rsync exfil command
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\brsync\b[^\n]{0,100}(\$WORKSPACE|ssh|:)'

  - id: groovy-scp-exfil
    desc: scp exfil command
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\bscp\b[^\n]{0,100}(\$WORKSPACE|:)'

  - id: groovy-kubectl-delete
    desc: kubectl delete command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: kubectl delete

  - id: groovy-terraform-destroy
    desc: terraform destroy command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: terraform destroy

  - id: groovy-aws-s3-rm
    desc: AWS S3 delete command
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: aws s3 rm

  - id: groovy-database-drop
    desc: database drop command
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'DROP\s+(DATABASE|SCHEMA)\b'

  - id: groovy-docker-image-wipe
    desc: Docker image wipe command
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bdocker\s+rmi\b[^\n]{0,80}-f'

  - id: groovy-jenkins-home-wipe
    desc: Jenkins home wipe command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'rm\s+-rf[^\n]{0,120}\$JENKINS_HOME/(jobs|plugins)'

  - id: groovy-build-artifact-overwrite
    desc: build artifact overwritten
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\bcp\s+/tmp/[^\n]{0,80}\s+target/[^\n]{0,80}\.(jar|war|zip|exe)'

  - id: groovy-pom-repository-inject
    desc: POM repository block injection
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: '<repositories><repository>'

  - id: groovy-pom-xml-rewrite
    desc: POM XML filename reference
    crit: component
    conf: 0.86
    if:
      type: text
      substr: pom.xml

  - id: groovy-nexus-artifact-upload
    desc: Nexus artifact upload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'curl[^\n]{0,120}--upload-file[^\n]{0,120}/repository/'

  - id: groovy-npm-postinstall-write
    desc: npm postinstall hook write
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: scripts.postinstall

  - id: groovy-composer-postinstall-write
    desc: Composer postinstall hook write
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: post-install-cmd

  - id: groovy-package-json-rewrite
    desc: package.json rewrite command
    crit: component
    conf: 0.86
    if:
      type: text
      substr: package.json

  - id: groovy-composer-json-rewrite
    desc: composer.json rewrite command
    crit: component
    conf: 0.86
    if:
      type: text
      substr: composer.json

  - id: groovy-jenkins-vars-build-poison
    desc: Jenkins vars build poison
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: /vars/build.groovy

  - id: groovy-wevtutil-clear
    desc: Windows log clear
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: wevtutil cl

  - id: groovy-vssadmin-delete
    desc: shadow copy deletion
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: vssadmin delete shadows

  - id: groovy-history-clear
    desc: shell history clear
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: history -c

  - id: groovy-workspace-wipe
    desc: workspace wipe command
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: rm -rf $WORKSPACE

  - id: groovy-log-truncate
    desc: log truncate command
    crit: suspicious
    conf: 0.84
    if:
      type: text
      substr: truncate -s 0

  - id: groovy-authorized-keys
    desc: authorized keys write
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: authorized_keys

  - id: groovy-crontab-persistence
    desc: crontab persistence
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: crontab

  - id: groovy-launchagent-persistence
    desc: LaunchAgent persistence
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: LaunchAgents

  - id: groovy-ld-preload
    desc: LD_PRELOAD injection
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: LD_PRELOAD

  - id: groovy-suid-chmod
    desc: SUID chmod command
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'chmod\s+u\+s'

  - id: groovy-ssh-lateral
    desc: SSH lateral command
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\bssh\b[^\n]{0,100}(cmd|shell|exec)'

  - id: groovy-ansible-lateral
    desc: Ansible lateral command
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\bansible\b[^\n]{0,100}(shell|command)'

  - id: groovy-winrm-lateral
    desc: WinRM lateral command
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\b(winrs|winrm)\b[^\n]{0,100}(cmd|powershell)'

  - id: groovy-smb-copy
    desc: SMB payload copy
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '\bsmbclient\b[^\n]{0,100}(put|copy)'

  - id: groovy-process-recon
    desc: process recon command
    crit: suspicious
    conf: 0.78
    if:
      type: text
      substr: ps aux

  - id: groovy-host-recon
    desc: host recon command
    crit: suspicious
    conf: 0.78
    if:
      type: text
      substr: hostnamectl

  - id: groovy-network-recon
    desc: network recon command
    crit: suspicious
    conf: 0.78
    if:
      type: text
      regex: '(ip addr|arp -a)'

  - id: groovy-openssl-encrypt
    desc: openssl file encrypt
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bopenssl enc\b[^\n]{0,100}(\$WORKSPACE|\.enc)'

  - id: groovy-gpg-encrypt
    desc: GPG file encrypt
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bgpg --batch\b[^\n]{0,100}(\$WORKSPACE|\.gpg)'

composite_rules:
  - id: groovy-download-shell-execution
    desc: Groovy download shell execution
    crit: hostile
    conf: 0.96
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-curl-pipe-shell
      - id: groovy-wget-pipe-shell

  - id: groovy-lolbin-download-execution
    desc: Groovy LOLBin download execution
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-certutil-download
      - id: groovy-bitsadmin-download
      - id: groovy-regsvr32-scriptlet

  - id: groovy-rundll32-scriptlet-execution
    desc: Groovy rundll32 scriptlet execution
    crit: hostile
    conf: 0.95
    all:
      - id: groovy-cmd-c-execute
      - id: groovy-rundll32-js-scriptlet
      - id: groovy-scriptlet-getobject

  - id: groovy-jenkins-control-tamper
    desc: Groovy Jenkins control tamper
    crit: hostile
    conf: 0.95
    all:
      - id: groovy-dynamic-evaluate
    any:
      - id: groovy-jenkins-scriptapproval
      - id: groovy-jenkins-clear-approved
      - id: groovy-jenkins-crumb-issuer

  - id: groovy-jenkins-plugin-dropper
    desc: Groovy Jenkins artifact drop
    crit: hostile
    conf: 0.93
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-jenkins-hpi-artifact
      - id: groovy-jenkins-agent-jar
      - id: groovy-jenkins-shared-library

  - id: groovy-ci-secret-exfiltration
    desc: Groovy CI secret exfiltration
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-credentials-xml
      - id: groovy-jenkins-secret-key
      - id: groovy-npmrc-token
      - id: groovy-pypirc-token
      - id: groovy-jfrog-cli-config
      - id: micro-behaviors/fs/config/build::groovy-build-config-file-reference

  - id: groovy-jenkins-plugin-inventory-exfil
    desc: Groovy Jenkins plugin inventory exfil
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
      - id: groovy-jenkins-plugin-inventory
      - id: micro-behaviors/communications/http/upload::curl-data-binary-stdin

  - id: groovy-jenkins-token-crumb-probe
    desc: Groovy Jenkins token crumb probe
    crit: hostile
    conf: 0.93
    all:
      - id: groovy-shell-lc-execute
      - id: groovy-jenkins-crumb-issuer
      - id: micro-behaviors/communications/http/curl::curl-basic-auth-token

  - id: groovy-cloud-token-exfiltration
    desc: Groovy cloud token exfiltration
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-cloud-metadata-ip
      - id: groovy-kube-service-token
      - id: groovy-aws-secret-env

  - id: groovy-exfil-tool-execution
    desc: Groovy exfil tool execution
    crit: hostile
    conf: 0.93
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-rclone-exfil
      - id: groovy-mega-exfil
      - id: groovy-rsync-exfil
      - id: groovy-scp-exfil

  - id: groovy-destructive-ci-command
    desc: Groovy destructive CI command
    crit: hostile
    conf: 0.95
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-kubectl-delete
      - id: groovy-terraform-destroy
      - id: groovy-aws-s3-rm
      - id: groovy-database-drop
      - id: groovy-docker-image-wipe
      - id: groovy-jenkins-home-wipe

  - id: groovy-artifact-wipe-execution
    desc: Groovy artifact wipe execution
    crit: hostile
    conf: 0.93
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-wevtutil-clear
      - id: groovy-history-clear
      - id: groovy-workspace-wipe
      - id: groovy-log-truncate

  - id: groovy-build-artifact-poisoning
    desc: Groovy build artifact poisoning
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-build-artifact-overwrite
      - id: groovy-nexus-artifact-upload

  - id: groovy-package-hook-poisoning
    desc: Groovy package hook poisoning
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-npm-postinstall-write
      - id: groovy-composer-postinstall-write
    needs: 1

  - id: groovy-npm-package-json-poisoning
    desc: Groovy npm package poisoning
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
      - id: groovy-npm-postinstall-write
      - id: groovy-package-json-rewrite

  - id: groovy-composer-json-poisoning
    desc: Groovy Composer hook poisoning
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
      - id: groovy-composer-postinstall-write
      - id: groovy-composer-json-rewrite

  - id: groovy-jenkins-shared-lib-poisoning
    desc: Groovy Jenkins shared-lib poisoning
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
      - id: groovy-jenkins-vars-build-poison

  - id: groovy-pom-repository-poisoning
    desc: Groovy POM repository poisoning
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
      - id: groovy-pom-repository-inject
      - id: groovy-pom-xml-rewrite

  - id: groovy-shadow-copy-deletion
    desc: Groovy shadow copy deletion
    crit: hostile
    conf: 0.95
    all:
      - id: groovy-cmd-c-execute
      - id: groovy-vssadmin-delete

  - id: groovy-memory-class-loader
    desc: Groovy memory class loader
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-classloader-defineclass
      - id: groovy-base64-bytecode-load

  - id: groovy-persistence-execution
    desc: Groovy persistence execution
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-authorized-keys
      - id: groovy-crontab-persistence
      - id: groovy-launchagent-persistence
      - id: groovy-ld-preload
      - id: groovy-suid-chmod

  - id: groovy-lateral-execution
    desc: Groovy lateral execution
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-ssh-lateral
      - id: groovy-ansible-lateral
      - id: groovy-winrm-lateral
      - id: groovy-smb-copy

  - id: groovy-file-encryption-execution
    desc: Groovy file encryption execution
    crit: hostile
    conf: 0.94
    all:
      - id: groovy-shell-lc-execute
    any:
      - id: groovy-openssl-encrypt
      - id: groovy-gpg-encrypt
