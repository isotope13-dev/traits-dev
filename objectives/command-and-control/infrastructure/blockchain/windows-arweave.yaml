defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1102
traits:
  - id: arweave-net-graphql
    desc: Arweave GraphQL gateway
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: arweave.net/graphql
  - id: arweave-goldsky-graphql
    desc: Goldsky Arweave GraphQL gateway
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: arweave-search.goldsky.com/graphql
  - id: arweave-fllstck-graphql
    desc: fllstck Arweave GraphQL gateway
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: arweave.fllstck.dev/graphql
  - id: arweave-vnnode-graphql
    desc: vnnode Arweave GraphQL gateway
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: ar.vnnode.com/graphql
  - id: arweave-koltigin-graphql
    desc: koltigin Arweave GraphQL gateway
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: ario.koltigin.xyz/graphql
  - id: arweave-owlstake-graphql
    desc: Owlstake Arweave GraphQL gateway
    crit: notable
    conf: 0.92
    if:
      type: text
      substr: ar.owlstake.com/graphql
  - id: arweave-ainodes-gateway
    desc: AINodes Arweave gateway
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: ainodes.xyz
  - id: arweave-transactions-owners-query
    desc: Arweave transaction query filtered by owners
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: transactions(owners:[$owner],first:$first,sort:HEIGHT_DESC)
  - id: arweave-owner-json-fragment
    desc: Arweave GraphQL variables owner field
    crit: component
    conf: 0.92
    if:
      type: text
      substr: '"variables":{"owner":"'
  - id: arweave-wallet-owner-hardcoded
    desc: Hardcoded Arweave wallet owner
    crit: component
    conf: 1.0
    if:
      type: text
      exact: Gt7Wu5A1ciy6tQx04xkqzzPTJWbuZZWkOVFgDIw7cUs
  - id: arweave-tag-name-ff
    desc: Arweave tag name ff
    crit: component
    conf: 0.96
    if:
      type: text
      exact: '"name":"ff"'
  - id: arweave-tag-value-265
    desc: Arweave tag value 265
    crit: component
    conf: 0.96
    if:
      type: text
      exact: '"value":"265"'
composite_rules:
  - id: arweave-graphql-endpoint-cluster
    desc: Multiple Arweave GraphQL gateways
    crit: suspicious
    conf: 0.97
    any:
      - id: arweave-net-graphql
      - id: arweave-goldsky-graphql
      - id: arweave-fllstck-graphql
      - id: arweave-vnnode-graphql
      - id: arweave-koltigin-graphql
      - id: arweave-owlstake-graphql
      - id: arweave-ainodes-gateway
    needs: 3
  - id: arweave-owner-query
    desc: Arweave owner-filtered GraphQL transaction query
    crit: suspicious
    conf: 0.97
    all:
      - id: arweave-graphql-endpoint-cluster
      - id: arweave-transactions-owners-query
    any:
      - id: arweave-owner-json-fragment
      - id: arweave-wallet-owner-hardcoded
    needs: 1
  - id: arweave-tagged-dead-drop
    desc: Tagged Arweave GraphQL dead-drop resolver
    crit: suspicious
    conf: 0.995
    all:
      - id: arweave-owner-query
    any:
      - id: arweave-wallet-owner-hardcoded
      - id: arweave-tag-name-ff
      - id: arweave-tag-value-265
    needs: 2
