defaults:
  attack: T1102
  platforms:
    - windows
  for:
    - vbs
traits:
  - id: hex-ipfs-token
    desc: Hex-delimited IPFS token
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: 69falan70falan66falan73
  - id: hex-dweb-token
    desc: Hex-delimited dweb token
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: 64falan77falan65falan62
  - id: hex-bafy-token
    desc: Hex-delimited bafy token
    crit: notable
    conf: 0.95
    if:
      type: raw
      substr: 62falan61falan66falan79
  - id: hex-https-prefix
    desc: Hex-delimited HTTPS prefix
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: 68falan74falan74falan70falan73
composite_rules:
  - id: ipfs-gateway-hex-stager
    desc: Obfuscated IPFS gateway stager
    crit: suspicious
    conf: 0.98
    all:
      - id: hex-ipfs-token
      - id: hex-dweb-token
      - id: hex-bafy-token
    any:
      - id: hex-https-prefix
      - id: objectives/anti-static/obfuscation/string/delimiter::custom-hex-loop
