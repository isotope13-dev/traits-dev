defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  attack: T1102
traits:
  - id: malicious-solana-program-id
    desc: 'Known malicious Solana Program ID'
    crit: suspicious
    conf: 1.0
    if:
      type: string_literal
      substr: 6YGcuyFRJKZtcaYCCFba9fScNUvPkGXodXE1mJiSzqDJ
composite_rules:
  - id: npm-c2-builder-solana-web3
    desc: npm C2 builder uses Solana Web3
    crit: suspicious
    conf: 0.94
    for: [package.json]
    all:
      - id: objectives/command-and-control/dropper/builder::npm-rat-builder-panel
      - id: metadata/import/npm::dep-solana-web3
  - id: solana-payload-fetch
    desc: Fetches payload from Solana program accounts
    crit: hostile
    conf: 0.95
    mbc: B0024
    all:
      - id: micro-behaviors/communications/http/url/rpc::solana-rpc-method-any
      - id: micro-behaviors/communications/http/url/rpc::solana-rpc-url
      - id: malicious-solana-program-id
  - id: solana-rpc-function-constructor-loader
    desc: Solana RPC fetched data executed via Function constructor
    crit: hostile
    conf: 0.96
    mbc: B0024
    all:
      - id: micro-behaviors/communications/http/url/rpc::solana-rpc-method-any
      - id: micro-behaviors/communications/http/url/rpc::solana-rpc-url
      - id: objectives/anti-static/obfuscation/eval/require::function-constructor-require-arg
