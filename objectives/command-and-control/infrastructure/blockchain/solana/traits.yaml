defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  attack: T1102
traits:
  - id: solana-getprogramaccounts
    desc: Solana getProgramAccounts RPC method
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      word: getProgramAccounts
  - id: solana-getaccountinfo
    desc: Solana getAccountInfo RPC method
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      word: getAccountInfo
  - id: solana-getsignaturesforaddress
    desc: Solana getSignaturesForAddress RPC method
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      word: getSignaturesForAddress
  - id: solana-rpc-mainnet
    desc: Solana mainnet RPC endpoint
    crit: notable
    conf: 0.82
    if:
      type: string_literal
      substr: solana-mainnet
  - id: solana-rpc-api-mainnet
    desc: Solana api.mainnet-beta RPC endpoint
    crit: notable
    conf: 0.82
    for: [javascript, typescript, binaries]
    if:
      type: text
      substr: api.mainnet-beta.solana.com
  - id: solana-rpc-publicnode
    desc: Solana publicnode RPC endpoint
    crit: notable
    conf: 0.82
    if:
      type: string_literal
      substr: solana.publicnode.com
  - id: solana-rpc-unreal-bot
    desc: Solana api.unreal.bot RPC endpoint
    crit: notable
    conf: 0.82
    if:
      type: string_literal
      substr: solana.api.unreal.bot
  - id: malicious-solana-program-id
    desc: Known malicious Solana Program ID (Glassworm/Zig Trojan)
    crit: suspicious
    conf: 1.0
    if:
      type: string_literal
      substr: 6YGcuyFRJKZtcaYCCFba9fScNUvPkGXodXE1mJiSzqDJ
composite_rules:
  - id: solana-rpc-method
    desc: Solana RPC method
    crit: notable
    any:
      - id: solana-getprogramaccounts
      - id: solana-getaccountinfo
      - id: solana-getsignaturesforaddress
  - id: solana-rpc-endpoint
    desc: Solana RPC endpoint
    crit: notable
    any:
      - id: solana-rpc-mainnet
      - id: solana-rpc-api-mainnet
      - id: solana-rpc-publicnode
      - id: solana-rpc-unreal-bot
  - id: solana-payload-fetch
    desc: Fetches payload from Solana program accounts
    crit: hostile
    conf: 0.95
    mbc: B0024
    all:
      - id: solana-rpc-method
      - id: solana-rpc-endpoint
  - id: solana-rpc-cluster
    desc: Multiple Solana RPC indicators
    crit: suspicious
    conf: 0.9
    any:
      - id: solana-rpc-method
      - id: solana-rpc-endpoint
    needs: 2
