defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  attack: T1102
traits:
  - id: malicious-solana-program-id
    desc: Known malicious Solana Program ID (Glassworm/Zig Trojan)
    crit: suspicious
    conf: 1.0
    if:
      type: string_literal
      substr: 6YGcuyFRJKZtcaYCCFba9fScNUvPkGXodXE1mJiSzqDJ
composite_rules:
  - id: solana-payload-fetch
    desc: Fetches payload from Solana program accounts
    crit: hostile
    conf: 0.95
    mbc: B0024
    all:
      - id: micro-behaviors/communications/http/url::solana-rpc-method-any
      - id: micro-behaviors/communications/http/url::solana-rpc-url
      - id: malicious-solana-program-id
