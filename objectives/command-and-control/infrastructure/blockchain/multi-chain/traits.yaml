# Native PE/DLL that resolves mutable C2 URLs through a BSC/EVM eth_call and
# then downloads/executes the returned payload (PowerShell or similar). The
# public RPC host + eth_call body alone is notable; pairing them with a
# download-and-run stage is hostile dead-drop C2.
- id: bsc-public-rpc-host
  desc: Binance Smart Chain public RPC host
  crit: notable
  conf: 0.88
  attack: T1102
  for: [pe, dll, csharp, binaries, scripts, source]
