defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts, source]
traits:
  - id: polygon-lava-build
    desc: Polygon lava build RPC endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: text
      substr: polygon.lava.build
  - id: polygon-publicnode
    desc: Polygon publicnode RPC endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: text
      substr: polygon-bor-rpc.publicnode.com
  - id: polygon-nodies
    desc: Polygon nodies RPC endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: text
      substr: polygon-public.nodies.app
  - id: polygon-drpc
    desc: Polygon drpc endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: text
      substr: polygon.drpc.org
  - id: polygon-subquery
    desc: Polygon subquery RPC endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: text
      substr: polygon.rpc.subquery.network/public
  - id: polygon-pokt
    desc: Polygon pokt endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: text
      substr: polygon-pokt.nodies.app
  - id: polygon-tenderly
    desc: Polygon tenderly endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: text
      substr: polygon.gateway.tenderly.co
  - id: polygon-tenderly-public
    desc: Tenderly public Polygon endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: text
      substr: gateway.tenderly.co/public/polygon
  - id: polygon-zan
    desc: Polygon zan endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: text
      substr: api.zan.top/polygon-mainnet
  - id: polygon-lava-build-encoded
    desc: Encoded Polygon lava endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: polygon.lava.build
  - id: polygon-publicnode-encoded
    desc: Encoded Polygon publicnode endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: polygon-bor-rpc.publicnode.com
  - id: polygon-nodies-encoded
    desc: Encoded Polygon nodies endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: polygon-public.nodies.app
  - id: polygon-drpc-encoded
    desc: Encoded Polygon drpc endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: polygon.drpc.org
  - id: polygon-subquery-encoded
    desc: Encoded Polygon subquery endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: polygon.rpc.subquery.network/public
  - id: polygon-pokt-encoded
    desc: Encoded Polygon pokt endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: polygon-pokt.nodies.app
  - id: polygon-tenderly-encoded
    desc: Encoded Polygon tenderly endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: polygon.gateway.tenderly.co
  - id: polygon-tenderly-public-encoded
    desc: Encoded Tenderly public Polygon endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: gateway.tenderly.co/public/polygon
  - id: polygon-zan-encoded
    desc: Encoded Polygon zan endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: api.zan.top/polygon-mainnet
  - id: public-evm-rpc-endpoint
    desc: Public EVM RPC endpoint
    crit: notable
    conf: 0.84
    attack: T1102
    for: [javascript, typescript, php]
    if:
      type: text
      regex: polygon\.lava\.build|polygon-bor-rpc\.publicnode\.com|polygon-public\.nodies\.app|polygon\.drpc\.org|polygon\.rpc\.subquery\.network/public|polygon-pokt\.nodies\.app|polygon\.gateway\.tenderly\.co|gateway\.tenderly\.co/public/polygon|api\.zan\.top/polygon-mainnet
  - id: contract-address-encoded
    desc: XOR or encoded smart contract address
    crit: suspicious
    conf: 0.9
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      regex: 0x[a-fA-F0-9]{40}
  - id: function-selector-encoded
    desc: Encoded 4-byte smart contract selector
    crit: component
    conf: 0.8
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      regex: FUNCTION_SELECTOR['"]?\s*:\s*['"][a-fA-F0-9]{8}['"]|38bcdc1c
  # Tron blockchain endpoints
  - id: trongrid-api
    desc: TronGrid API endpoint (Tron blockchain)
    crit: notable
    conf: 0.82
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: api.trongrid.io
  - id: trongrid-api-encoded
    desc: Encoded TronGrid API endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: api.trongrid.io
  # Aptos blockchain endpoints
  - id: aptos-fullnode
    desc: Aptos fullnode mainnet endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: fullnode.mainnet.aptoslabs.com
  - id: aptos-fullnode-encoded
    desc: Encoded Aptos fullnode endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: fullnode.mainnet.aptoslabs.com
  # BSC (Binance Smart Chain) public RPC endpoints
  - id: bsc-dataseed
    desc: BSC dataseed RPC endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: bsc-dataseed.binance.org
  - id: bsc-publicnode
    desc: BSC publicnode RPC endpoint
    crit: notable
    conf: 0.82
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: bsc-rpc.publicnode.com
  - id: bsc-defibit
    desc: BSC defibit RPC endpoint
    crit: notable
    conf: 0.83
    attack: T1102
    for: [javascript, typescript]
    if:
      type: text
      substr: bsc-dataseed1.defibit.io
  - id: bsc-dataseed-encoded
    desc: Encoded BSC dataseed RPC endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: bsc-dataseed.binance.org
  - id: bsc-publicnode-encoded
    desc: Encoded BSC publicnode RPC endpoint
    crit: suspicious
    conf: 0.92
    attack: T1102
    for: [javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: bsc-rpc.publicnode.com
  - id: bsc-defibit-jshex
    desc: Hex-escaped BSC defibit RPC endpoint
    crit: suspicious
    conf: 0.95
    attack: T1102
    for: [javascript, typescript]
    if:
      type: text
      substr: \x68\x74\x74\x70\x73\x3A\x2F\x2F\x62\x73\x63\x2D\x64\x61\x74\x61\x73\x65\x65\x64\x31\x2E\x64\x65\x66\x69\x62\x69\x74\x2E\x69\x6F
  # eth_getTransactionByHash RPC method (used to read payload from tx data)
  - id: eth-gettransactionbyhash
    desc: eth_getTransactionByHash RPC method
    crit: notable
    conf: 0.7
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: eth_getTransactionByHash
  - id: eth-gettransactionbyhash-encoded
    desc: Encoded eth_getTransactionByHash RPC method
    crit: suspicious
    conf: 0.88
    attack: T1102
    for: [javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: eth_getTransactionByHash
  - id: etherscan-api-prefix
    desc: Etherscan API endpoint (api.etherscan.io)
    crit: notable
    conf: 0.8
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: api.etherscan.io
  - id: etherscan-api-suffix
    desc: Etherscan API path (etherscan.io/api)
    crit: notable
    conf: 0.8
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: etherscan.io/api
  - id: bscscan-api
    desc: Uses BSCScan API (potential blockchain-based
    crit: suspicious
    conf: 0.85
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: api\.bscscan\.com|bscscan\.com/api
  - id: polygonscan-api
    desc: Uses PolygonScan API (potential blockchain-based
    crit: suspicious
    conf: 0.85
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: api\.polygonscan\.com|polygonscan\.com/api
  - id: eth-call
    desc: eth_call RPC method
    crit: notable
    conf: 0.6
    attack: T1102
    for: [javascript, typescript, php]
    if:
      type: string_literal
      substr: eth_call
  - id: eth-call-encoded
    desc: Encoded eth_call RPC method
    crit: suspicious
    conf: 0.88
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      substr: eth_call
  - id: eth-getstorageat
    desc: eth_getStorageAt RPC method
    crit: notable
    conf: 0.6
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: eth_getStorageAt
  - id: contract-keyword
    desc: contract keyword
    crit: component
    conf: 0.3
    for: [javascript, typescript]
    unless:
      - id: metadata/file/text::uproc-tools-catalog
    if:
      type: string_literal
      regex: (?i)contract
  - id: rpc-provider
    desc: Uses blockchain RPC provider (monitor
    crit: notable
    conf: 0.6
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: infura\.io/v3/|alchemy\.com/v2/|quicknode\.com|ankr\.com
  - id: ipfs-gateway
    desc: Uses IPFS gateway (decentralized content
    crit: notable
    conf: 0.7
    attack: T1102
    for: [javascript, typescript, shell, powershell]
    if:
      type: string_literal
      regex: ipfs\.io/ipfs/|gateway\.pinata\.cloud|cloudflare-ipfs\.com|dweb\.link|myfilebase\.com/ipfs/
  - id: electrum-be
    desc: Electrum.be server
    crit: component
    if:
      type: text
      word: electrum.be
  - id: electrum-org
    desc: Electrum.org server
    crit: component
    if:
      type: text
      word: electrum.org
  - id: electrumx
    desc: ElectrumX server
    crit: component
    if:
      type: text
      word: electrumx
  - id: bitaroo-net
    desc: Bitaroo.net server
    crit: component
    if:
      type: text
      word: bitaroo.net
  - id: emzy-de
    desc: Emzy.de server
    crit: component
    if:
      type: text
      word: emzy.de
  - id: eth-rpc-method-get-code
    desc: eth_getCode RPC method (potential contract-based payload)
    crit: notable
    conf: 0.7
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: eth_getCode
  - id: arweave-net
    desc: Arweave.net gateway
    crit: notable
    conf: 0.6
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: arweave.net/
  - id: ar-io-net
    desc: AR-IO.net gateway
    crit: notable
    conf: 0.6
    attack: T1102
    for: [javascript, typescript]
    if:
      type: string_literal
      substr: ar-io.net/
  - id: blockscout-txlist-api
    desc: Blockscout transaction list API
    crit: suspicious
    conf: 0.94
    attack: T1102
    for: [scripts, source, pe, dll]
    if:
      type: text
      regex: 'blockscout\.com[\s\S]{0,220}module=account[\s\S]{0,120}action=txlist'
  - id: tx-input-field-parse
    desc: Parses blockchain transaction input
    crit: notable
    conf: 0.86
    attack: T1102
    for: [scripts, source, pe, dll]
    if:
      type: text
      regex: '\\?["'']input\\?["''][\s\S]{0,700}(0x|hex[_-]?(decode|to|2)|fromhex|XOR|xor)'
  - id: multi-chain-blockscout-hosts
    desc: Multiple Blockscout chain explorers
    crit: suspicious
    conf: 0.95
    attack: T1102
    for: [scripts, source, pe, dll]
    count_min: 2
    if:
      type: text
      regex: '(eth|base|optimism)\.blockscout\.com'
composite_rules:
  - id: btc-electrum-server
    desc: Bitcoin Electrum server endpoint (potential C2)
    crit: suspicious
    any:
      - id: electrum-be
      - id: electrum-org
      - id: electrumx
      - id: bitaroo-net
      - id: emzy-de
  - id: blockchain-c2-fetch
    desc: Fetches payload from blockchain infrastructure (dead-drop)
    crit: hostile
    conf: 0.95
    attack: T1102
    any:
      - id: objectives/command-and-control/infrastructure/blockchain/solana::solana-payload-fetch
      - id: blockchain-tx-payload
      - id: btc-electrum-server
      - id: objectives/command-and-control/infrastructure/blockchain/polygon::polygon-smart-contract-loader-c2
      - id: blockscout-transaction-deaddrop-c2
  - id: blockscout-transaction-deaddrop-c2
    desc: Blockscout transaction dead-drop C2
    crit: hostile
    conf: 0.98
    attack: T1102
    all:
      - id: blockscout-txlist-api
      - id: tx-input-field-parse
    any:
      - id: multi-chain-blockscout-hosts
      - id: micro-behaviors/data/text/crypto::eth-address-literal
  - id: polygon-rpc-host-cluster
    desc: Multiple public Polygon RPC endpoints
    crit: suspicious
    conf: 0.93
    attack: T1102
    for: [html, javascript, typescript]
    any:
      - id: polygon-lava-build
      - id: polygon-publicnode
      - id: polygon-nodies
      - id: polygon-drpc
      - id: polygon-subquery
      - id: polygon-pokt
      - id: polygon-tenderly
      - id: polygon-tenderly-public
      - id: polygon-zan
      - id: polygon-lava-build-encoded
      - id: polygon-publicnode-encoded
      - id: polygon-nodies-encoded
      - id: polygon-drpc-encoded
      - id: polygon-subquery-encoded
      - id: polygon-pokt-encoded
      - id: polygon-tenderly-encoded
      - id: polygon-tenderly-public-encoded
      - id: polygon-zan-encoded
      - id: objectives/command-and-control/infrastructure/blockchain-rpc
    needs: 3
  - id: etherscan-api
    desc: Uses Etherscan API (potential blockchain-based
    crit: suspicious
    conf: 0.85
    attack: T1102
    for: [javascript, typescript]
    any:
      - id: etherscan-api-prefix
      - id: etherscan-api-suffix
  - id: contract-read
    desc: Reads smart contract storage (potential
    crit: notable
    conf: 0.75
    attack: T1102
    for: [javascript, typescript]
    all:
      - id: eth-rpc-method
      - id: contract-or-address
  - id: eth-rpc-method
    desc: Ethereum RPC method
    crit: notable
    conf: 0.6
    for: [javascript, typescript]
    any:
      - id: eth-call
      - id: objectives/command-and-control/infrastructure/blockchain/polygon::eth-call-b64xor255
      - id: eth-getstorageat
      - id: eth-call-encoded
      - id: eth-gettransactionbyhash
      - id: eth-gettransactionbyhash-encoded
  - id: contract-or-address
    desc: Contract keyword or Ethereum address
    crit: component
    conf: 0.3
    for: [html, javascript, typescript]
    any:
      - id: contract-keyword
      - id: objectives/collection/clipboard/capture::eth-address-literal
      - id: micro-behaviors/data/text/crypto::eth-address-literal
      - id: contract-address-encoded
      - id: objectives/command-and-control/infrastructure/blockchain/polygon::contract-address-b64xor255
  - id: smart-contract-c2-dead-drop
    desc: Smart contract read over public blockchain RPC for remote configuration
    crit: suspicious
    conf: 0.97
    attack: T1102
    for: [html, javascript, typescript]
    all:
      - id: polygon-rpc-host-cluster
      - id: eth-rpc-method
      - id: contract-or-address
    any:
      - id: function-selector-encoded
      - id: contract-read
  - id: smart-contract-c2-dead-drop-b64xor255
    desc: Base64 XOR smart contract C2 dead drop
    crit: suspicious
    conf: 0.98
    attack: T1102
    for: [javascript, html]
    all:
      - id: objectives/command-and-control/infrastructure/blockchain-rpc::polygon-rpc-pair-b64xor255
      - id: objectives/command-and-control/infrastructure/blockchain/polygon::contract-address-b64xor255
      - id: objectives/command-and-control/infrastructure/blockchain/polygon::eth-call-b64xor255
  # Multi-chain blockchain C2: uses multiple blockchain networks as dead-drop
  - id: multi-chain-c2
    desc: Multiple blockchain networks as C2 channels
    crit: suspicious
    conf: 0.95
    attack: T1102
    for: [javascript, typescript]
    needs: 2
    any:
      - id: trongrid-api
      - id: trongrid-api-encoded
      - id: aptos-fullnode
      - id: aptos-fullnode-encoded
      - id: bsc-dataseed
      - id: bsc-defibit
      - id: bsc-publicnode
      - id: bsc-dataseed-encoded
      - id: bsc-defibit-jshex
      - id: bsc-publicnode-encoded
      - id: etherscan-api
      - id: polygon-rpc-host-cluster
  # Blockchain transaction data as payload source
  - id: blockchain-tx-payload
    desc: Blockchain transaction data used as payload source
    crit: hostile
    conf: 0.95
    attack: T1102
    mbc: B0024
    for: [javascript, typescript]
    all:
      - id: eth-rpc-method
    any:
      - id: trongrid-api
      - id: trongrid-api-encoded
      - id: aptos-fullnode
      - id: aptos-fullnode-encoded
      - id: bsc-dataseed
      - id: bsc-defibit
      - id: bsc-publicnode
      - id: bsc-dataseed-encoded
      - id: bsc-defibit-jshex
      - id: bsc-publicnode-encoded
  - id: arweave-gateway
    desc: Uses Arweave gateway (permanent content
    crit: notable
    conf: 0.7
    attack: T1102
    for: [javascript, typescript]
    any:
      - id: arweave-net
      - id: ar-io-net
