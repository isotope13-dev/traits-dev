  - id: contract-address-literal
    desc: Hardcoded smart contract address
    crit: notable
    conf: 0.72
    attack: T1102
    for: [html]
    if:
      type: string_value
      regex: \b0x[a-fA-F0-9]{40}\b
  - id: contract-address-encoded
    desc: XOR or encoded smart contract address
    crit: suspicious
    conf: 0.9
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      regex: 0x[a-fA-F0-9]{40}
  - id: function-selector-encoded
    desc: Encoded 4-byte smart contract selector
    crit: component
    conf: 0.8
    attack: T1102
    for: [html, javascript, typescript]
    if:
      type: encoded
      encoding: xor
      regex: FUNCTION_SELECTOR['"]?\s*:\s*['"][a-fA-F0-9]{8}['"]|38bcdc1c
