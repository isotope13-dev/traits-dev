defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1102

traits:
  - id: polygon-rpc-com-endpoint
    desc: Polygon RPC public endpoint
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: polygon-rpc.com
  - id: loader-polygon-user-agent
    desc: Loader Polygon resolver user agent
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: LoaderPolygonResolver/1.0
  - id: loader-polygon-env-var
    desc: Loader Polygon resolver environment variable
    crit: component
    conf: 0.94
    if:
      type: text
      word: LOADER_POLYGON_RESOLVER
  - id: loader-polygon-rpc-env-var
    desc: Loader Polygon RPC environment variable
    crit: component
    conf: 0.94
    if:
      type: text
      word: LOADER_POLYGON_RPC
  - id: json-rpc-eth-call-body
    desc: JSON RPC eth_call request body
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: '{"jsonrpc":"2.0","id":1,"method":"eth_call"'

composite_rules:
  - id: polygon-smart-contract-loader-c2
    desc: Polygon smart contract loader C2
    crit: hostile
    conf: 0.97
    mbc: B0024
    all:
      - id: polygon-rpc-com-endpoint
      - id: json-rpc-eth-call-body
    any:
      - id: loader-polygon-user-agent
      - id: loader-polygon-env-var
      - id: loader-polygon-rpc-env-var
    needs: 2
