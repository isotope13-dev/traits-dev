defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: C0001

composite_rules:
  - id: aspack-dynamic-ipv4-stager
    desc: ASPack stager with hardcoded endpoint
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/anti-static/pack/detect::aspack-marker
      - id: micro-behaviors/communications/ip::external-ipv4-port-pe-literal
      - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
    any:
      - id: micro-behaviors/communications/socket/init::wsa-startup
      - id: micro-behaviors/communications/socket/init::ws2-32-ordinal-115
      - id: metadata/binary/layout::overlay-dominates-third
      - id: objectives/anti-static/obfuscation/payload/import::minimal-pe-dynamic-load
      - id: micro-behaviors/os/compat/wow64::wow64-fs-redirect
    needs: 2
    unless:
      - id: metadata/binary/installer::known-benign-installer
