defaults:
  platforms: [linux]
  for: [elf]
  attack: T1071.001,T1556.003

composite_rules:
  - id: native-pam-uid-agent-fixed-endpoint
    desc: Native ELF with PAM, UID/GID control, and fixed external endpoint
    crit: hostile
    conf: 0.98
    mbc: B0030
    all:
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-elf
      - id: micro-behaviors/os/pam/auth::pam-auth-api-raw-reference
      - id: micro-behaviors/process/identity/setuid::uid-gid-cgo-api-cluster
