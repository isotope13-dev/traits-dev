defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: hardcoded-c2-ip-port
    desc: Hardcoded external IP:port likely used as C2
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/communications/ip::external-ipv4-port-binary-literal
      - id: micro-behaviors/communications/ip::external-ipv4-port-data-literal
      - id: micro-behaviors/communications/ip::external-ipv4-port-pe-literal
    unless:
      - id: metadata/lang/compiler/managed::dotnet-ipv4-like-version
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/vendor::is-microsoft-named
