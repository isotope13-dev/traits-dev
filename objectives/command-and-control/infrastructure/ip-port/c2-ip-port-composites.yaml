defaults:
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: hardcoded-c2-ip-port
    desc: Hardcoded external IP:port likely used as C2
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-binary-literal
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-data-literal
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-pe-literal
    unless:
      - id: metadata/lang/compiler/managed::dotnet-ipv4-like-version
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor::is-microsoft-named
  - id: winsock-post-c2-ip-port
    desc: Winsock POST client with C2 endpoint
    crit: hostile
    conf: 0.97
    all:
      - id: hardcoded-c2-ip-port
      - id: micro-behaviors/communications/http/post::form-urlencoded-header-pe
      - id: micro-behaviors/communications/socket/init::connect-api-ordinal
    any:
      - id: micro-behaviors/communications/socket/init::send-api-ordinal
      - id: micro-behaviors/communications/socket/init::recv-api-ordinal
      - id: micro-behaviors/communications/socket/init::socket-api-ordinal
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor::is-microsoft-named
  - id: external-endpoint-with-host-profiling
    desc: External endpoint with AES and host profiling
    crit: hostile
    conf: 0.98
    attack: T1071.001,T1082,T1497.001
    mbc: B0030
    all:
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-pe-with-networking
      - id: micro-behaviors/crypto/symmetric/aes/constant::aes-sbox-bytes-pe-rdata
    any:
      - id: micro-behaviors/os/sysinfo/hardware::get-system-info
      - id: micro-behaviors/os/sysinfo/hardware::get-memory-status
      - id: micro-behaviors/fs/enumerate/volume::get-disk-free-space
      - id: micro-behaviors/time/query::get-tick-count
      - id: micro-behaviors/ui/controls/widget::get-system-metrics
    needs: 3
  - id: connected-hardware-fingerprint-client
    desc: External endpoint with connected host fingerprint
    crit: hostile
    conf: 0.96
    attack: T1041,T1082,T1497.001
    mbc: B0030
    all:
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-pe-with-networking
      - id: micro-behaviors/communications/socket/init::connect-api
    any:
      - id: micro-behaviors/os/sysinfo/hardware::get-system-info
      - id: micro-behaviors/os/sysinfo/hardware::get-memory-status
      - id: micro-behaviors/fs/enumerate/volume::get-disk-free-space
      - id: micro-behaviors/time/query::get-tick-count
      - id: micro-behaviors/ui/controls/widget::get-system-metrics
    needs: 3
