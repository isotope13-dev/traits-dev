defaults:
  platforms: [android]
  for: [media]

traits:
  - id: default-image-resource-name
    desc: Android default image resource
    crit: component
    conf: 0.86
    if:
      type: basename
      exact: "default_image.png"

composite_rules:
  - id: android-image-resource-c2-endpoint
    desc: Android image resource C2 endpoint
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/ip::external-ipv4-port-android-media
      - id: default-image-resource-name
