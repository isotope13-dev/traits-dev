# Hardcoded C2 IPv4:port literal in a Windows loader that resolves NT
# syscalls dynamically. Existing external-ipv4-port rules cap at 2 MB to
# avoid false positives on .NET version strings; this composite re-allows
# the literal when the binary also exposes the direct-syscall trinity,
# which is rare in benign large binaries.
defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: external-ipv4-port-rdata-large
    desc: External IPv4:port literal in rdata
    crit: component
    conf: 0.93
    if:
      type: text
      regex: ^([0-9]{1,3}\.){3}[0-9]{1,3}:[0-9]{2,5}$
      is: external_ip
      section: rdata
    unless:
      - id: metadata/lang/compiler/managed::dotnet-ipv4-like-version
composite_rules:
  - id: syscall-loader-hardcoded-c2
    desc: Direct-syscall loader with hardcoded IPv4 C2 endpoint
    crit: hostile
    conf: 0.96
    mbc: B0030
    attack: T1106,T1071
    all:
      - id: external-ipv4-port-rdata-large
      - id: objectives/evasion/process/injection/syscall::syscall-injection-trinity
    any:
      - id: metadata/binary/section/names::rdata2-section
      - id: objectives/anti-static/obfuscation/payload/section::oversized-rdata-section
      - id: micro-behaviors/os/syscall/invoke::ntdll-import
    unless:
      - id: metadata/binary/vendor/
  # Import-based sibling of the above: a hardcoded external C2 IPv4:port literal
  # in .rdata combined with the VirtualAllocEx + WriteProcessMemory +
  # CreateRemoteThread injection trinity. A binary that both phones a raw C2
  # endpoint and injects into other processes is a RAT implant — no benign use.
  - id: c2-endpoint-with-remote-injection
    desc: Hardcoded C2 endpoint with remote-thread injection
    crit: hostile
    conf: 0.95
    mbc: B0030
    attack: T1055.001,T1071
    all:
      - id: external-ipv4-port-rdata-large
      - id: objectives/evasion/process/injection/dll::injection-trinity-text
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor/
