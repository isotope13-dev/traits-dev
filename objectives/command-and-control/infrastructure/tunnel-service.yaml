defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: notable
  conf: 0.8
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: ngrok
    desc: ngrok tunneling service
    if:
      type: string_value
      regex: ngrok(-free)?\.(io|app)\b
    unless:
      - id: metadata/quality::has-tests
  - id: localhost-run-dup
    desc: localhost.run tunneling service
    if:
      type: string_value
      regex: localhost\.run\b
  - id: trycloudflare
    desc: Cloudflare Tunnel (TryCloudflare)
    if:
      type: string_value
      regex: trycloudflare\.com\b
  - id: pipe-run
    desc: pipe.run tunneling service
    if:
      type: string_value
      regex: pipe\.run\b
  - id: serveo
    desc: serveo.net tunneling service
    if:
      type: string_value
      regex: serveo\.net\b
  - id: telebit
    desc: telebit.cloud tunneling service
    if:
      type: string_value
      regex: telebit\.cloud\b
  - id: pinggy
    desc: Pinggy tunneling service
    if:
      type: string_value
      regex: pinggy\.(io|link)\b
