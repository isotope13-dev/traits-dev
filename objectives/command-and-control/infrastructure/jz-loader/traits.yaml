defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: jz-c2-infrastructure
    desc: JZ_C2 malware infrastructure marker
    crit: suspicious
    conf: 1.0
    if:
      type: text
      exact: JZ_C2

  - id: diego-build-path
    desc: Unique developer build path (Diego)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: 'C:\Users\Diego\Desktop\work\client\exe\front\'
