defaults:
  platforms: [unix]
  for: [javascript, typescript]

traits:
  - id: node-c2-execute-action
    desc: Node execute action keyword
    crit: component
    conf: 0.94
    if:
      type: text
      substr: parsed.action === "execute"
  - id: node-api-beacon-path
    desc: Node API beacon path
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: /api/v1/beacon
  - id: node-api-register-path
    desc: Node API register path
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /api/v1/register
  - id: node-command-results-post
    desc: Node command results POST pattern
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '/api/v1/(result|beacon|collect)[\s\S]{0,300}POST'
