# Google Apps Script (GAS) C2 channel.
#
# Attackers abuse `script.google.com/macros/s/<deployment-id>/exec`
# (Google Apps Script Web Apps) as a free serverless C2 endpoint.
# The `AKfycb...` deployment-ID prefix is Google-issued and is a
# stable shape across all Apps Script deployments.
#
# Legitimate uses exist (form responses, lightweight automations),
# but a binary or script that hard-codes a `script.google.com/macros`
# URL and POSTs/GETs to it as part of an exec/exfil flow is almost
# always a malware C2 / exfil channel — see Braodo (T1 sitecustomize
# uploads stolen ZIPs to a hardcoded GAS endpoint), and the wider
# pattern of Vietnamese / Asia-Pacific stealers using Apps Script as
# free C2.
defaults:
  platforms: [windows, unix]
  for: [scripts, source, binaries]
  attack: "T1102.001"
  mbc: "B0030"

traits:
  - id: google-apps-script-host
    desc: script.google.com Apps Script host
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: script.google.com

  - id: google-apps-script-macros-path
    desc: Apps Script macros deployment path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "script\\.google\\.com/macros/s/[A-Za-z0-9_-]{20,}"

  - id: google-apps-script-akfycb-deployment
    desc: Apps Script AKfycb deployment ID prefix
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: "AKfycb[A-Za-z0-9_-]{30,}"

composite_rules:
  - id: google-apps-script-c2-endpoint
    desc: Google Apps Script C2 / exfil endpoint
    crit: suspicious
    conf: 0.95
    all:
      - id: google-apps-script-macros-path
    any:
      - id: google-apps-script-akfycb-deployment
      - id: micro-behaviors/communications/http/post
      - id: micro-behaviors/communications/http/client
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
