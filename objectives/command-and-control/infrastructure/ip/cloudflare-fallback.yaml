# Hostile composite: Cloudflare proxy IP combined with octet-construction
# obfuscation. Legitimate code reaches CF-fronted services by hostname (one
# DNS lookup) and never bothers reconstructing IPv4 from per-octet integer
# literals. Both signals together are diagnostic for a malware-style
# DNS-bypass fallback to a CF-fronted C2.
defaults:
  platforms: [windows, unix]
  for: [scripts, source]
  attack: T1090.004
  mbc: B0030

composite_rules:
  - id: cloudflare-obfuscated-fallback
    desc: Obfuscated Cloudflare proxy IP fallback
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/ip::cloudflare-proxy-ip-present
    any:
      - id: objectives/anti-static/obfuscation/encoding/ip-notation::ipv4-construction-aggregator
    downgrade:
      any:
        - id: metadata/package/testing/presence::python-test-file
        - id: metadata/package/testing/presence::test-directory
