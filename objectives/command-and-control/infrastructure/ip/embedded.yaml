# Hardcoded IPv4:port C2 endpoint lists in non-standard / encrypted file containers.
# Password-protected ZIPs and other unrecognized file types are classified as
# "unknown" by cleave; their IP:port pairs still leak from unencrypted regions
# (Central Directory, inter-entry padding). Rules here apply to all file types.
# ATT&CK: T1071.001 (Web Protocols), T1573 (Encrypted Channel)
# MBC: B0030 (C2 Communication)
defaults:
  platforms: [windows, unix]
  for: [scripts, source, manifests]
  mbc: B0030
  attack: T1071.001

traits:
  - id: no-network-interfaces
    desc: No network interface data
    crit: component
    if:
      type: kv
      path: network.interfaces
      size_max: 0
  - id: external-ipv4-port-any-3plus
    desc: Three-plus external IPv4 endpoints
    crit: component
    count_min: 3
    if:
      id: micro-behaviors/communications/ip::external-ipv4-port-any
composite_rules:
  # Requires 3+ distinct external IP:port strings — consistent with a C2 server
  # list (fallback infrastructure), not a coincidental occurrence.
  - id: hardcoded-ipv4-port-list-any
    desc: Multiple hardcoded external IPv4 endpoints
    crit: suspicious
    conf: 0.9
    all:
      - id: external-ipv4-port-any-3plus
    unless:
      - id: no-network-interfaces
      - id: metadata/package/testing/presence::registry-request-cache-data
