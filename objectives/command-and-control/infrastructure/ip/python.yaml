defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  mbc: C0002
  attack: T1071.001
  crit: suspicious
traits:
  - id: python-fstring-url-host
    desc: URL f-string from host
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{host\}["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-fstring-url-ip
    desc: URL f-string from ip
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{ip\}["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-fstring-url-server
    desc: URL f-string from server
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{server\}["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-fstring-url-domain
    desc: URL f-string from domain
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{domain\}["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
      - type: text
        substr: "MConstants.PROVER_DOTCOM"
  - id: python-fstring-url-with-port-host
    desc: URL f-string with host
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{host\}:\d+["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-fstring-url-with-port-ip
    desc: URL f-string with ip
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{ip\}:\d+["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-fstring-url-with-port-server
    desc: URL f-string with server
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{server\}:\d+["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-fstring-url-with-port-domain
    desc: URL f-string with domain
    conf: 0.85
    if:
      type: string_literal
      regex: f["']https?://\{domain\}:\d+["'?/#]
    unless:
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/scripted::pytest
      - type: text
        regex: base_url\s*=\s*f["']https?://
  - id: python-string-concat-url
    desc: URL constructed via string concatenation
    conf: 0.85
    if:
      type: string_literal
      regex: '["'']https?://["'']\s*\+\s*\w+'
    not:
      - regex: url
  - id: python-assigned-ipv4
    desc: Hardcoded IPv4 address assigned to
    conf: 0.9
    if:
      type: string_literal
      regex: \w+\s*=\s*["'](\d{1,3}\.){3}\d{1,3}["']
      is: external_ip
  - id: python-requests-ip-url
    desc: HTTP request to IP-based URL
    conf: 0.9
    if:
      type: string_literal
      regex: requests\.(get|post)\([^)]{0,120}https?://\d{1,3}(\.\d{1,3}){3}
      is: external_ip
  - id: python-urllib-ip-url
    desc: urllib request to IP-based URL
    conf: 0.9
    if:
      type: string_literal
      regex: urlopen\([^)]{0,120}https?://\d{1,3}(\.\d{1,3}){3}
      is: external_ip
composite_rules:
  - id: python-fstring-url
    desc: URL constructed with f-string variable
    conf: 0.85
    any:
      - id: python-fstring-url-host
      - id: python-fstring-url-ip
      - id: python-fstring-url-server
      - id: python-fstring-url-domain
  - id: python-fstring-url-with-port
    desc: f-string URL construction with host
    conf: 0.85
    any:
      - id: python-fstring-url-with-port-host
      - id: python-fstring-url-with-port-ip
      - id: python-fstring-url-with-port-server
      - id: python-fstring-url-with-port-domain
  - id: python-url-construction
    desc: C2 URL constructed from host
    conf: 0.85
    any:
      - id: python-fstring-url
      - id: python-fstring-url-with-port
      - id: python-string-concat-url
