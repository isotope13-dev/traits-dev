# C2 infrastructure signals: a hardcoded external IPv4 literal as the request
# target. Pinning a literal external IP (rather than a hostname) bypasses DNS,
# sinkholes and reputation blocklists. Generic URL-construction-from-a-variable
# capabilities (f"https://{host}/..." etc.) are NOT C2 on their own and live at
# micro-behaviors/communications/http/url/build (notable).
defaults:
  platforms:
    - unix
    - windows
  for:
    - python
  mbc: C0002
  attack: T1071.001
  crit: suspicious
traits:
  - id: python-assigned-ipv4
    desc: Hardcoded IPv4 address assigned to
    conf: 0.9
    if:
      type: string_literal
      regex: \w+\s*=\s*["'](\d{1,3}\.){3}\d{1,3}["']
      is: external_ip
  - id: python-requests-ip-url
    desc: HTTP request to IP-based URL
    conf: 0.9
    if:
      type: string_literal
      regex: requests\.(get|post)\([^)]{0,120}https?://\d{1,3}(\.\d{1,3}){3}
      is: external_ip
  - id: python-urllib-ip-url
    desc: urllib request to IP-based URL
    conf: 0.9
    if:
      type: string_literal
      regex: urlopen\([^)]{0,120}https?://\d{1,3}(\.\d{1,3}){3}
      is: external_ip
