defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  mbc: C0002
  attack: T1071.001
  crit: suspicious
traits:
  - id: amadey-c2-ip-194-169-175-128
    desc: "Hardcoded Amadey C2 IPv4 194.169.175.128"
    crit: suspicious
    conf: 0.99
    for: [pe]
    if:
      type: text
      exact: "194.169.175.128"

  - id: hardcoded-ipv4-script
    desc: Hardcoded external IPv4 address
    crit: notable
    conf: 0.85
    size_max: 5000
    if:
      id: micro-behaviors/communications/ip/literal::external-ipv4-script
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: micro-behaviors/communications/dns/client/
      - type: text
        regex: '\bAddProvider\s*\([^\n]{0,240}:853'
  - id: port-443
    desc: Port 443 (HTTPS)
    crit: component
    conf: 0.4
    if:
      type: text
      regex: :443\b
  - id: port-4444
    desc: Port 4444 (Metasploit default)
    crit: component
    conf: 0.6
    if:
      type: text
      regex: :4444\b
    unless:
      - type: text
        regex: 'https?://localhost:4444/|localhost:4444\b'
      - type: text
        regex: 'https?://127\.0\.0\.1:4444/|127\.0\.0\.1:4444\b'
  - id: port-1337-source-literal
    desc: Port 1337 (leet)
    crit: notable
    conf: 0.5
    for: [scripts, source]
    if:
      type: literal
      kind: string
      regex: '\b\d{1,3}(\.\d{1,3}){3}:1337\b'
      is: external_ip
  - id: port-1337-text
    desc: Port 1337 (leet)
    crit: notable
    conf: 0.5
    for: [binaries, manifests, data]
    if:
      type: text
      regex: '\b\d{1,3}(\.\d{1,3}){3}:1337\b'
      is: external_ip
  - id: port-31337-source-literal
    desc: Port 31337 (eleet)
    crit: notable
    conf: 0.6
    for: [scripts, source]
    if:
      type: literal
      kind: string
      regex: '\b\d{1,3}(\.\d{1,3}){3}:31337\b'
      is: external_ip
  - id: port-31337-text
    desc: Port 31337 (eleet)
    crit: notable
    conf: 0.6
    for: [binaries, manifests, data]
    if:
      type: text
      regex: '\b\d{1,3}(\.\d{1,3}){3}:31337\b'
      is: external_ip
  - id: payload-download-path-marker
    desc: Download path in a URL
    crit: component
    conf: 0.8
    for: [scripts, source, binaries, data]
    if:
      type: text
      regex: '(?i)\\b(https?|ftp)://[^\\s"''<>]{0,160}/download\\b'
  - id: payload-payload-path-marker
    desc: Payload path in a URL
    crit: component
    conf: 0.8
    for: [scripts, source, binaries, data]
    if:
      type: text
      regex: '(?i)\\b(https?|ftp)://[^\\s"''<>]{0,160}/payload\\b'
  - id: payload-stage-path-marker
    desc: Staging path in a URL
    crit: component
    conf: 0.8
    for: [scripts, source, binaries, data]
    if:
      type: text
      regex: '(?i)\\b(https?|ftp)://[^\\s"''<>]{0,160}/stage\\b'
  - id: ip-address-url
    desc: Direct external IP address in URL
    crit: component
    conf: 0.8
    for: [scripts, binaries, documents]
    attack: T1071
    if:
      type: text
      regex: https?://\d{1,3}(\.\d{1,3}){3}(:\d{1,5})?(/[^\s'"<>{}]{0,200})?
      is: external_ip
    not:
      - regex: /thumb\b
      - regex: 0\.0\.0\.0
      - regex: 192\.168\.
      - regex: 10\.\d{1,3}\.
      - regex: 100\.(6[4-9]|[7-9]\d|[01]\d|12[0-7])\.
      - regex: 172\.(1[6-9]|2\d|3[0-1])\.
      - regex: 127\.\d{1,3}\.
      - regex: 169\.254\.
      - regex: 1\.1\.1\.1
      - regex: 8\.8\.8\.8
      - regex: https?://1\.2\.3\.4(:\d{1,5})?(/[^\s'"<>{}]{0,200})?
      - regex: ^\s*#
    unless:
      - type: text
        substr: split_anaconda_token(
composite_rules:
  - id: payload-staging-path-marker
    desc: Payload staging path in a URL
    crit: component
    conf: 0.8
    for: [scripts, source, binaries, data]
    any:
      - id: payload-download-path-marker
      - id: payload-payload-path-marker
      - id: payload-stage-path-marker
  - id: port-1337
    desc: Port 1337 (leet)
    crit: notable
    conf: 0.5
    any:
      - id: port-1337-source-literal
      - id: port-1337-text
  - id: port-31337
    desc: Port 31337 (eleet)
    crit: notable
    conf: 0.6
    any:
      - id: port-31337-source-literal
      - id: port-31337-text
  - id: staged-tcp-query
    desc: Raw IP URL with payload staging marker
    crit: notable
    conf: 0.7
    attack: T1105
    near_bytes: 512
    all:
      - id: payload-staging-path-marker
    any:
      - id: micro-behaviors/communications/ip/literal::http-ip-url-source-literal
      - id: micro-behaviors/communications/ip/literal::http-ip-url-text
  - id: encoded-ipv4-overlay-pe
    desc: Large overlay PE with encoded IPv4
    crit: suspicious
    conf: 0.92
    for: [pe]
    size_min: 2000000
    size_max: 10000000
    all:
      - id: micro-behaviors/communications/ip/literal::encoded-external-ipv4-binary
      - id: metadata/binary/layout::overlay-over-90pct
    any:
      - id: metadata/binary/metrics/structural::no-imports
      - id: objectives/anti-static/obfuscation/binary-metrics/shape::zero-entropy-executable-section
      - id: metadata/signed/trust-level::unsigned
    needs: 2
    unless:
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/script/
      - id: metadata/signed/platform/
  - id: port-number-constant
    desc: Common C2 port number (23,
    crit: component
    conf: 0.6
    mbc: B0030
    attack: T1571
    any:
      - id: port-443
      - id: micro-behaviors/communications/http/url/port::http-alt-port-8080
      - id: port-4444
      - id: port-1337
      - id: port-31337
  - id: version-resource-ip-values
    desc: External IPv4 values in PE version metadata
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
      - id: metadata/package/versioning::version-resource-metadata

  - id: driver-control-with-hardcoded-endpoint
    desc: Driver-control binary with hardcoded external endpoint
    crit: hostile
    conf: 0.98
    for: [pe]
    platforms: [windows]
    all:
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-pe
      - id: micro-behaviors/fs/file/handle::device-io-control-win
      - id: objectives/evasion/anti-av/driver::antivirus-process-enumeration-routine
      - id: metadata/binary/layout::low-entropy-large-overlay
    any:
      - id: objectives/evasion/anti-av/driver::driver-install-and-start-routine
      - id: objectives/evasion/anti-av/driver::driver-stop-and-delete-routine
      - id: objectives/evasion/anti-av/driver::driver-payload-retrieval-routine
    needs: 2
  - id: packed-pe-hardcoded-c2-ip
    desc: Packed unsigned PE with hardcoded external IP
    crit: suspicious
    conf: 0.92
    for: [pe]
    platforms: [windows]
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
      - id: metadata/binary/section/metrics::high-entropy-exec-section
      - id: metadata/signed/trust-level::unsigned
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/script/
      - id: metadata/binary/installer/script/
      - id: metadata/binary/framework/
      - id: metadata/package/versioning/
  - id: packed-pe-c2-ip-tampered
    desc: Tampered packed PE with hardcoded C2 IP
    crit: hostile
    conf: 0.95
    for: [pe]
    platforms: [windows]
    all:
      - id: packed-pe-hardcoded-c2-ip
    any:
      - id: metadata/binary/layout::pe-checksum-mismatch
      - id: objectives/anti-static/obfuscation/string/junking::consonant-vowel-gibberish
      - id: objectives/evasion/process/injection/toolkit::module-stomping-target
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/script/
      - id: metadata/binary/framework/
  # Multiple Cloudflare IPs in a binary indicate a DNS-bypass fallback pool.
  # Legitimate code resolves CF-fronted services by hostname (one DNS lookup).
  # Baking in multiple CF IPs is a malware pattern for resilient C2.
  - id: cloudflare-ip-pool-binary
    desc: Hardcoded Cloudflare IP pool in binary
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: micro-behaviors/communications/ip/proxy::cloudflare-104-16-23
    any:
      - id: micro-behaviors/communications/ip/proxy::cloudflare-162-158-159
      - id: micro-behaviors/communications/ip/proxy::cloudflare-172-64-71
      - id: micro-behaviors/communications/ip/proxy::cloudflare-173-245
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
