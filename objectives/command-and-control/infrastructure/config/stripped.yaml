defaults:
  platforms: [linux, macos, windows]
# Stripped Binary with C2 Configuration
# Detects stripped binaries containing hardcoded C2 lists
# Strong indicator of malware attempting to hide infrastructure
traits:
  - id: max-sections-4
    desc: Binary has 4 or fewer sections
    crit: component
    for: [pe, elf, macho]
    if:
      type: metrics
      field: sections.count
      max: 4
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
composite_rules:
  - id: c2-indicators
    desc: Indicators of C2 infrastructure (internal helper)
    crit: notable
    conf: 0.8
    any:
      - id: objectives/command-and-control/infrastructure/config::embedded-c2-list
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-list
  - id: stripped-binary-with-c2-list
    desc: Stripped binary with multiple hardcoded C2 addresses
    crit: hostile
    conf: 0.95
    for: [pe, elf, macho, shell, python, javascript]
    mbc: "C0002"
    attack: "T1043"
    unless:
      - id: metadata/binary/metrics/threshold::many-sections-20
      - id: max-sections-4
      - id: metadata/binary/metrics/structural::no-functions
    all:
      - id: metadata/binary/layout::binary-format-checked
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-list
  - id: stripped-encrypted-c2-config
    desc: Stripped binary with encrypted C2 config
    crit: suspicious
    conf: 0.9
    mbc: "C0002"
    attack: "T1043"
    all:
      - id: metadata/binary/layout::binary-format-checked
      - id: objectives/command-and-control/infrastructure/network::ipv4-port-string
      - id: micro-behaviors/crypto/symmetric/stream::rc4-bytecode
