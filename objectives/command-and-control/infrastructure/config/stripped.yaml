defaults:
  platforms: [unix, windows, macos]
# Stripped Binary with C2 Configuration
# Detects stripped binaries containing hardcoded C2 lists
# Strong indicator of malware attempting to hide infrastructure
composite_rules:
  - id: c2-indicators
    desc: Indicators of C2 infrastructure (internal helper)
    crit: notable
    conf: 0.8
    any:
      - id: objectives/command-and-control/infrastructure/config::embedded-c2-list
      - id: objectives/command-and-control/infrastructure/network::ipv4-port-string
  - id: stripped-binary-with-c2-list
    desc: Stripped binary with multiple hardcoded C2 addresses
    crit: hostile
    conf: 0.95
    platforms: [linux, macos, windows]
    for: [pe, elf, macho, shell, python, javascript]
    mbc: "C0002"
    attack: "T1043"
    unless:
      - type: metrics
        field: binary.section_count
        min: 20
      - type: metrics
        field: binary.section_count
        max: 4
      - type: metrics
        field: binary.function_count
        max: 0
    all:
      - id: metadata/hardening::stripped-binary
      - id: c2-indicators
  - id: stripped-encrypted-c2-config
    desc: Stripped binary with encrypted C2 config
    crit: suspicious
    conf: 0.9
    mbc: "C0002"
    attack: "T1043"
    all:
      - id: metadata/hardening::stripped-binary
      - id: objectives/command-and-control/infrastructure/network::ipv4-port-string
      - id: micro-behaviors/crypto/symmetric/stream::rc4-bytecode
