defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: fofa-ollama-search-endpoint
    desc: FOFA search API for infrastructure discovery
    crit: component
    conf: 0.98
    if:
      type: text
      substr: https://fofa.info/api/v1/search/all

  - id: fofa-ollama-search-query
    desc: FOFA query for exposed Ollama servers
    crit: component
    conf: 0.99
    if:
      type: text
      substr: 'port="11434" && body="Ollama"'

  - id: ollama-model-server-map
    desc: Maps models to discovered server URLs
    crit: component
    conf: 0.96
    if:
      type: text
      substr: model_to_servers

  - id: ollama-v1-server-relay
    desc: Routes model requests through discovered servers
    crit: component
    conf: 0.96
    if:
      type: text
      regex: 'server_url.{0,80}/v1'

composite_rules:
  - id: fofa-ollama-server-discovery
    desc: Searches FOFA for exposed Ollama servers
    crit: hostile
    conf: 0.99
    attack: T1595
    all:
      - id: fofa-ollama-search-endpoint
      - id: fofa-ollama-search-query
      - id: micro-behaviors/communications/http/lib/requests::requests-get

  - id: ollama-open-server-inference-relay
    desc: Uses discovered public Ollama servers as inference relays
    crit: hostile
    conf: 0.99
    all:
      - id: ollama-model-server-map
      - id: ollama-v1-server-relay
      - id: objectives/discovery/network/scan/http::many-public-http-endpoint-literals
