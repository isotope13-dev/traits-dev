defaults:
  platforms: [windows]
  for: [data, text]
  attack: T1105
  mbc: B0030

traits:
  - id: json-cmd-powershell-value
    desc: JSON command embeds PowerShell
    crit: component
    conf: 0.94
    if:
      type: raw
      regex: '"cmd"\s*:\s*"\[Net\.ServicePointManager\]::SecurityProtocol='

  - id: webclient-downloadfile-bat
    desc: WebClient downloads batch stage
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: WebClient\)\.DownloadFile\(\$u,\$o\)

  - id: temp-update-bat-path
    desc: Temp update.bat output path
    crit: component
    conf: 0.92
    if:
      type: raw
      regex: Join-Path\s+\$env:TEMP\s+['"]update\.bat['"]

  - id: start-process-cmd-bat-arg
    desc: Start-Process runs batch with cmd
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: Start-Process\s+cmd\.exe\s+-ArgumentList\s+['"]/k['"],\$o

  - id: eth-fastscan-batch-url
    desc: eth-fastscan batch stage URL
    crit: component
    conf: 0.98
    if:
      type: raw
      substr: https://api.eth-fastscan.org/update.bat

composite_rules:
  - id: json-powershell-download-execute-batch
    desc: JSON command downloads and runs batch
    crit: hostile
    conf: 0.98
    attack: "T1105, T1059.003, T1059.001"
    all:
      - id: json-cmd-powershell-value
      - id: webclient-downloadfile-bat
      - id: temp-update-bat-path
      - id: start-process-cmd-bat-arg

  - id: json-remote-batch-stage-config
    desc: JSON config points to batch stage
    crit: hostile
    conf: 0.97
    attack: "T1105, T1059.003"
    all:
      - id: json-cmd-powershell-value
      - id: eth-fastscan-batch-url
      - id: start-process-cmd-bat-arg
