# MSI payloads that resolve a controller and execute configuration staged in
# the registry. These indicators are format-independent C2 configuration.
defaults:
  platforms: [windows]
  for: [all]

traits:
  - id: script-dns-controller-resolution
    desc: Script resolves a remote DNS endpoint
    crit: notable
    conf: 0.96
    attack: T1071.004
    if:
      type: text
      regex: '(?i)\[Net\.Dns\]::GetHostEntry\s*\(\s*["''][^"'']{3,120}["'']'
  - id: registry-base64-scriptblock
    desc: Script executes Base64 data from the registry
    crit: notable
    conf: 0.97
    attack: T1059.001,T1027
    if:
      type: text
      regex: '(?i)FromBase64String.{0,240}scriptblock'

composite_rules:
  - id: registry-staged-controller-script
    desc: Script runs registry-staged controller data
    crit: hostile
    conf: 0.99
    attack: T1071.004,T1059.001,T1027
    all:
      - id: script-dns-controller-resolution
      - id: registry-base64-scriptblock
