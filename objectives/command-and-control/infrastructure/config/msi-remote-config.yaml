# MSI payloads that resolve a controller and execute configuration staged in
# the registry. The DNS capability is defined in the communications taxonomy.
defaults:
  platforms: [windows]
  for: [oledoc]

traits:
  - id: powershell-registry-config-read
    desc: PowerShell reads a registry configuration value
    crit: notable
    conf: 0.93
    attack: T1112
    if:
      type: encoded
      encoding: base64
      regex: '(?i)\b(gp|Get-ItemProperty)\s+["''](HKCU|HKLM):\\'
  - id: registry-base64-scriptblock
    desc: PowerShell decodes and runs Base64 ScriptBlock
    crit: notable
    conf: 0.97
    attack: T1059.001,T1027
    if:
      type: encoded
      encoding: base64
      regex: '(?i)FromBase64String.{0,240}scriptblock'

composite_rules:
  - id: registry-staged-controller-script
    desc: Script runs registry-staged controller data
    crit: hostile
    conf: 0.99
    attack: T1071.004,T1059.001,T1027
    all:
      - id: micro-behaviors/communications/dns/lookup/resolver::powershell-gethostentry
      - id: powershell-registry-config-read
      - id: registry-base64-scriptblock
