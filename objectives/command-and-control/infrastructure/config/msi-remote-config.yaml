# MSI payloads that resolve a controller and execute configuration staged in
# the registry. The DNS capability is defined in the communications taxonomy.
defaults:
  platforms: [windows]
  for: [oledoc, ole]

traits:
  - id: msi-large-base64-config-carrier
    desc: MSI stores a large Base64 registry config
    crit: notable
    conf: 0.98
    attack: T1027,T1112
    if:
      type: raw
      regex: '(?i)Software\\Microsoft\\EdgeUpdatecfg[A-Za-z0-9+/]{512,}'
  - id: powershell-registry-config-read
    desc: PowerShell reads a registry configuration value
    crit: notable
    conf: 0.93
    attack: T1112
    if:
      type: encoded
      encoding: base64
      regex: '(?i)\b(gp|Get-ItemProperty)\s+["''](HKCU|HKLM):\\'
  - id: registry-base64-scriptblock
    desc: PowerShell decodes and runs Base64 ScriptBlock
    crit: notable
    conf: 0.97
    attack: T1059.001,T1027
    if:
      type: encoded
      encoding: base64
      regex: '(?i)FromBase64String.{0,240}scriptblock'

composite_rules:
  - id: msi-registry-staged-controller
    desc: MSI registry-backed encoded PowerShell stager
    crit: hostile
    conf: 0.99
    attack: T1059.001,T1027,T1112,T1105
    all:
      - id: micro-behaviors/process/create/exec::msi-powershell-hidden-window-option
      - id: micro-behaviors/process/create/exec::msi-powershell-executionpolicy-bypass
      - id: micro-behaviors/process/create/exec::msi-powershell-encoded-command-option
      - id: msi-large-base64-config-carrier

  - id: registry-staged-controller-script
    desc: Script runs registry-staged controller data
    crit: hostile
    conf: 0.99
    attack: T1071.004,T1059.001,T1027
    all:
      - id: micro-behaviors/communications/dns/lookup/resolver::powershell-gethostentry
      - id: powershell-registry-config-read
      - id: registry-base64-scriptblock
