defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  attack: T1071.001
  mbc: C0002
traits:
  - id: hardcoded-server-host
    desc: Hardcoded server host constant
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: \bconst\s+SERVER_HOST\s*=\s*["'][A-Za-z0-9.-]+\.[A-Za-z]{2,}["']
    not:
      - substr: localhost
      - substr: example.com
      - regex: '\.(local|lan|internal|home|example|invalid)["'']'
      - regex: '["''](?:0\.0\.0\.0|127(?:\.\d{1,3}){3})["'']'
  - id: http-port-literal
    desc: Literal HTTP port constant
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \bconst\s+HTTP_PORT\s*=\s*\d{2,5}\s*;
  - id: https-port-literal
    desc: Literal HTTPS port constant
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \bconst\s+HTTPS_PORT\s*=\s*\d{2,5}\s*;
  - id: upload-path-transfer
    desc: Upload path constant for transfer
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \bconst\s+UPLOAD_PATH\s*=\s*["']/(upload|submit|collect|report)["']
  - id: upload-path-telemetry
    desc: Upload path constant for telemetry
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \bconst\s+UPLOAD_PATH\s*=\s*["']/(stats|telemetry|beacon|sync)["']
  - id: upload-path-api
    desc: Upload path constant for API
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: \bconst\s+UPLOAD_PATH\s*=\s*["']/api(/[A-Za-z0-9._-]+)?["']
composite_rules:
  - id: dedicated-http-https-ports
    desc: Separate HTTP and HTTPS port constants
    crit: notable
    conf: 0.8
    all:
      - id: http-port-literal
      - id: https-port-literal
  - id: upload-endpoint-path
    desc: Dedicated upload endpoint path constant
    crit: notable
    conf: 0.82
    any:
      - id: upload-path-transfer
      - id: upload-path-telemetry
      - id: upload-path-api
  - id: hardcoded-dual-port-c2-config
    desc: Hardcoded dual-port C2 configuration sidecar
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/config::server-host-const
      - id: metadata/package/config::http-port-const
      - id: metadata/package/config::https-port-const
      - id: metadata/package/config::upload-path-const
      - id: metadata/package/config::short-sidecar-file
      - id: hardcoded-server-host
      - id: dedicated-http-https-ports
      - id: upload-endpoint-path
  - id: telemetry-upload-config
    desc: Hardcoded telemetry-style upload endpoint configuration
    crit: suspicious
    conf: 0.92
    attack: T1041
    all:
      - id: hardcoded-dual-port-c2-config
      - id: upload-path-telemetry
