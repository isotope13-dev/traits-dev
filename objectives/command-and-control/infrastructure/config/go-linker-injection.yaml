defaults:
  platforms: [linux, windows, macos]
  for: [binaries, go]
  attack: T1071.001
traits:
  - id: go-linker-c2-url
    desc: C2 URL injected via Go linker flag
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'agent\.c2url=https?://[A-Za-z0-9.-]+\.[a-z]{2,}'

  - id: go-linker-c2-secret
    desc: C2 secret injected via Go linker flag
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'agent\.secret=[0-9a-f]{32}'

  - id: go-linker-c2-sleep
    desc: C2 sleep interval (Go linker)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'agent\.(min|max)sleep='

  - id: go-linker-c2-formfield
    desc: C2 form field (Go linker)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'agent\.formfield='

composite_rules:
  - id: go-linker-staged-c2-config
    desc: Go binary with staged C2 configuration (linker injected)
    crit: hostile
    conf: 0.99
    all:
      - id: go-linker-c2-url
      - id: go-linker-c2-secret
