defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1071.001

composite_rules:
  - id: encoded-http-winsock-post-c2
    desc: Encoded HTTP C2 with Winsock POST
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/url/encoded::encoded-http-url
      - id: micro-behaviors/communications/http/post::form-urlencoded-header-pe
      - id: micro-behaviors/communications/socket/init::connect-api-ordinal
    any:
      - id: micro-behaviors/communications/socket/init::send-api-ordinal
      - id: micro-behaviors/communications/socket/init::recv-api-ordinal
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-c2-ip-port
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/vendor::is-microsoft-named
      - id: well-known/lib/youtube-dl/
      - id: well-known/lib/youtube-dl::youtube-dl-package-context
