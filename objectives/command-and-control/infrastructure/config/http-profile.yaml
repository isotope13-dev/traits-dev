defaults:
  platforms: [linux, macos, windows]
  for: [binaries, python, javascript]
  attack: T1071.001
  mbc: C0002

traits:
  - id: http-c2-aes-psk-schema
    desc: HTTP C2 AES PSK schema
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'json:"AESPSK"|["'']AESPSK["'']'

  - id: http-c2-callback-host-schema
    desc: HTTP C2 callback host schema
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'json:"callback_host"|["'']callback_host["'']'

  - id: http-c2-callback-timing-schema
    desc: HTTP C2 callback interval schema
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'json:"callback_interval"|["'']callback_interval["'']'

  - id: http-c2-callback-jitter-schema
    desc: HTTP C2 callback jitter schema
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'json:"callback_jitter"|["'']callback_jitter["'']'

  - id: http-c2-task-uri-schema
    desc: HTTP C2 task URI schema
    crit: component
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: 'json:"get_uri"|["'']get_uri["'']|json:"post_uri"|["'']post_uri["'']'

  - id: http-c2-encrypted-exchange-schema
    desc: HTTP C2 encrypted exchange schema
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'json:"encrypted_exchange_check"|["'']encrypted_exchange_check["'']'

  - id: http-c2-query-path-schema
    desc: HTTP C2 query path schema
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'json:"query_path_name"|["'']query_path_name["'']'

  - id: encoded-aes-psk-field
    desc: Encoded C2 AES PSK
    crit: suspicious
    conf: 0.96
    if:
      type: encoded
      encoding: base64
      regex: '"AESPSK"\s*:\s*"[A-Za-z0-9+/=]{24,}"'

  - id: encoded-callback-host-field
    desc: Encoded C2 callback host
    crit: suspicious
    conf: 0.94
    if:
      type: encoded
      encoding: base64
      regex: '"callback_host"\s*:\s*"https?://[^"]+"'

  - id: encoded-callback-timing-fields
    desc: Encoded C2 callback timing
    crit: suspicious
    conf: 0.93
    if:
      type: encoded
      encoding: base64
      regex: '"callback_interval"\s*:\s*\d+.{0,120}"callback_jitter"\s*:\s*\d+'

  - id: encoded-http-task-uri-fields
    desc: Encoded C2 task URIs
    crit: suspicious
    conf: 0.94
    if:
      type: encoded
      encoding: base64
      regex: '"get_uri"\s*:\s*"[^"]+".{0,320}"post_uri"\s*:\s*"[^"]+"'

  - id: encoded-encrypted-exchange-field
    desc: Encoded C2 encrypted exchange
    crit: suspicious
    conf: 0.92
    if:
      type: encoded
      encoding: base64
      regex: '"encrypted_exchange_check"\s*:\s*true'

  - id: encoded-query-path-field
    desc: Encoded C2 query path
    crit: notable
    conf: 0.88
    if:
      type: encoded
      encoding: base64
      regex: '"query_path_name"\s*:\s*"[^"]+"'

  - id: c2-transport-profile-loader-doc
    desc: C2 transport profile loader documentation
    crit: component
    conf: 0.92
    for: [python]
    if:
      type: text
      regex: 'Transport Profile Loader[\s\S]{0,180}C2 profiles|Loads a C2 transport profile'

  - id: c2-profile-beacon-hot-reload
    desc: Beacon C2 profile hot reload
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'hot[_-]reload[\s\S]{0,360}beacon|beacon[\s\S]{0,360}poll_reload'

  - id: c2-profile-websocket-grpc-transports
    desc: C2 profile websocket and gRPC transports
    crit: component
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: 'websocket[\s\S]{0,220}grpc[\s\S]{0,220}dns_over_https'

  - id: c2-profile-http-smb-transports
    desc: C2 HTTP polling SMB transports
    crit: component
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: 'http_polling[\s\S]{0,220}passive_smb_pipe'

composite_rules:
  - id: encoded-http-c2-profile
    desc: Encoded HTTP C2 profile
    crit: hostile
    conf: 0.98
    near_bytes: 4096
    all:
      - id: encoded-aes-psk-field
      - id: encoded-callback-host-field
      - id: encoded-http-task-uri-fields
      - id: encoded-encrypted-exchange-field
    any:
      - id: encoded-callback-timing-fields
      - id: encoded-query-path-field

  - id: http-c2-profile-schema
    desc: HTTP C2 profile schema
    crit: suspicious
    conf: 0.97
    all:
      - id: http-c2-aes-psk-schema
      - id: http-c2-callback-host-schema
      - id: http-c2-task-uri-schema
      - id: http-c2-encrypted-exchange-schema
    any:
      - id: http-c2-callback-timing-schema
      - id: http-c2-callback-jitter-schema
      - id: http-c2-query-path-schema

  - id: c2-transport-profile-loader
    desc: C2 transport profile loader
    crit: suspicious
    conf: 0.95
    all:
      - id: c2-transport-profile-loader-doc
      - id: c2-profile-beacon-hot-reload
    any:
      - id: c2-profile-websocket-grpc-transports
      - id: c2-profile-http-smb-transports
      - id: micro-behaviors/communications/grpc::grpc-python-import
