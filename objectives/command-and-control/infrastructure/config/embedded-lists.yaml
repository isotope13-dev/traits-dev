defaults:
  platforms:
    - unix
    - windows
  for: [binaries]
  attack: T1043
  mbc: C0002
traits:
  - id: dirmngr-root-hints-context
    desc: dirmngr DNS root hints context
    crit: baseline
    conf: 0.94
    if:
      type: text
      regex: '\b(S\.dirmngr|dirmngr(\.conf|_ldapservers\.conf))\b'
composite_rules:
  - id: embedded-c2-list
    desc: Hardcoded C2 network infrastructure
    crit: notable
    conf: 0.85
    any:
      - id: objectives/command-and-control/infrastructure/domain/campaign/
      - id: objectives/command-and-control/infrastructure/domain/extraction/
      - id: objectives/command-and-control/infrastructure/domain/family/
      - id: objectives/command-and-control/infrastructure/domain/malicious::c2-domain
      - id: objectives/command-and-control/infrastructure/domain/malicious::hardcoded-v3-onion-url
      - id: objectives/command-and-control/infrastructure/domain/known/
      - id: objectives/command-and-control/infrastructure/domain/xor18/
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-binary
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-encoded
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-list
    unless:
      - id: metadata/signed/platform::apple
      - id: metadata/library/qt
      - id: well-known/app/keepassxc/
  - id: hardcoded-c2-infrastructure
    desc: Self-contained C2 with hardcoded addresses
    crit: suspicious
    conf: 0.8
    all:
      - id: embedded-c2-list
      - id: micro-behaviors/communications/socket/connect/
    unless:
      - id: metadata/package/versioning::pe-version-resource
      - id: metadata/library/qt
      - id: well-known/app/keepassxc/
      - id: well-known/tool/sysadmin/kubernetes::minikube-text
      - id: well-known/tool/sysadmin/kubernetes::minikube-symbol
      # GnuPG dirmngr embeds the IANA DNS root-server hint list (128.63.2.53,
      # 192.112.36.4, ...) as external IPv4 literals and does socket connect for
      # keyserver/CRL fetches. The dirmngr config/assuan-socket fingerprint is
      # GnuPG-internal and never appears in C2 malware embedding real C2 IPs.
      - id: dirmngr-root-hints-context
  - id: botnet-commander-pattern
    desc: Hardcoded C2 infrastructure with socket capability
    crit: notable
    conf: 0.9
    all:
      - id: embedded-c2-list
      - id: micro-behaviors/communications/socket/
    unless:
      - id: well-known/app/sq::go-module-path
