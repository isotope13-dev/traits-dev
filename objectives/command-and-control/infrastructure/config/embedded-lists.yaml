defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [binaries]
  attack: T1043
  mbc: C0002
composite_rules:
  - id: embedded-c2-list
    desc: Multiple hardcoded C2 IP addresses or distributed C2 infrastructure redundancy
    crit: suspicious
    conf: 0.85
    any:
      - id: micro-behaviors/communications/ip/
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-list
    unless:
      - id: metadata/signed/platform::apple
  - id: hardcoded-c2-infrastructure
    desc: Self-contained C2 with hardcoded addresses
    crit: suspicious
    conf: 0.8
    all:
      - id: embedded-c2-list
      - id: micro-behaviors/communications/socket/connect/
    unless:
      - id: metadata/package/versioning::pe-version-resource
  - id: botnet-commander-pattern
    desc: Botnet commander with hardcoded infrastructure
    crit: notable
    conf: 0.9
    all:
      - id: embedded-c2-list
      - id: micro-behaviors/communications/socket/
