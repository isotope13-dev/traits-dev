defaults:
  for: [pe, dll]
  platforms: [windows]
  mbc: "C0002"
  attack: "T1071.001"
composite_rules:
  - id: encoded-version-resource-config
    desc: C2-like config hidden in version resource
    crit: suspicious
    conf: 0.92
    all:
      - id: metadata/package/versioning::anomalous-version-resource
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::high-entropy-data
      - id: objectives/anti-static/obfuscation/reflection/class::dynamic-load-pattern
    downgrade:
      any:
        - id: metadata/binary/installer/script::nsis
        - id: metadata/binary/installer/script::inno-setup
        - id: metadata/signed/certificate::bitdefender-brand-text
        - id: metadata/binary/resource::resource-only-dll
        - id: micro-behaviors/data/embedded/payload::pe-magic-in-rsrc
        - id: metadata/binary/metrics::many-imports
  - id: sid-locked-version-resource-config
    desc: SID-keyed config hidden in version resource
    crit: suspicious
    conf: 0.95
    all:
      - id: metadata/package/versioning::compact-opaque-version-resource
      - id: micro-behaviors/crypto/library::capi-key-material-setup
    any:
      - id: objectives/discovery/account/lookup::sid-string-conversion
      - id: micro-behaviors/os/user/lookup::lookup-account-name
      - id: micro-behaviors/os/group/lookup::lookup-account-sid
      - id: micro-behaviors/crypto/library::crypt-string-to-binary
    needs: 2
    downgrade:
      any:
        - id: metadata/binary/installer/script::nsis
        - id: metadata/binary/installer/script::inno-setup
        - id: metadata/binary/resource::resource-only-dll
        - id: metadata/binary/metrics::many-imports
