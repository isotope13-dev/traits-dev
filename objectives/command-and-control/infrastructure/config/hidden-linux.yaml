defaults:
  platforms: [linux]
  for: [elf, go, shell, python]
  attack: T1573
traits:
  - id: hidden-tmp-encrypted-config
    desc: Hidden encrypted config in tmp
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '/tmp/\.[A-Za-z0-9._-]{2,48}\.(enc|cfg|conf|key|dat)\b'
  - id: hidden-tmp-state-switch
    desc: Hidden state file in tmp
    crit: notable
    conf: 0.72
    if:
      type: text
      regex: '/tmp/\.[A-Za-z0-9._-]{2,48}-(switch|state|lock|pid)\b'
  - id: uppercase-config-env
    desc: Uppercase config environment variable
    crit: component
    conf: 0.55
    if:
      type: text
      regex: '\b[A-Z][A-Z0-9]{1,24}_(CFG|CONFIG)\b'
  - id: uppercase-key-env
    desc: Uppercase key environment variable
    crit: component
    conf: 0.55
    if:
      type: text
      regex: '\b[A-Z][A-Z0-9]{1,24}_KEY(_FILE)?\b'
    unless:
      - id: metadata/file::system-shell-basename
  - id: go-decryption-key-symbol
    desc: Go decryption key symbol
    crit: component
    conf: 0.55
    if:
      type: text
      regex: '\b(decryptionKey|decryptionKey[0-9]+)\b'

composite_rules:
  - id: hidden-encrypted-runtime-config
    desc: Hidden encrypted runtime config
    crit: suspicious
    conf: 0.9
    all:
      - id: hidden-tmp-encrypted-config
    any:
      - id: hidden-tmp-state-switch
      - id: uppercase-config-env
      - id: uppercase-key-env
      - id: go-decryption-key-symbol
    needs: 2
