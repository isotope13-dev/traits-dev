# C2 bot tracking database access
# Detects server-side scripts that query databases to track/manage
# compromised endpoints (bots/miners) in a C2 infrastructure.
# ATT&CK: T1071.001 (Application Layer Protocol: Web Protocols)
# ATT&CK: T1082 (System Information Discovery)
defaults:
  for: [php]
  platforms: [windows, unix]
  crit: suspicious
  attack: T1071.001

traits:
  - id: bot-tracking-data-marker
    desc: Bot-management data marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b(beacon|implant|miner|last[_ -]?seen)\b'
  - id: bot-status-data-marker
    desc: Bot status or command queue marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b(bot[_ -]?(id|status)|command[_ -]?queue)\b'

composite_rules:
  - id: c2-bot-data-api
    desc: Database API for bot-management data
    crit: hostile
    conf: 0.95
    mbc: B0030
    all:
      - id: micro-behaviors/data/db/mysql::php-mysqli-connect
      - id: micro-behaviors/data/db/sql::sql-select
    any:
      - id: bot-tracking-data-marker
      - id: bot-status-data-marker
    unless:
      - id: well-known/app/wordpress-plugins::wordpress-maintenance-plugin
