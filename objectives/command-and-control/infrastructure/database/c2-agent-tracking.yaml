# C2 infrastructure agent tracking DB
# Detects database query patterns used by C2 teamservers to track compromised agents.
defaults:
  for: [go, elf, macho, pe, python]
  platforms: [linux, macos, windows]
  attack: T1071
  mbc: B0030

traits:
  - id: c2-parent-agent-id
    desc: ParentAgentID used in C2 topology
    crit: suspicious
    conf: 0.8
    if:
      type: text
      word: ParentAgentID

  - id: c2-link-agent-id
    desc: LinkAgentID used in C2 topology
    crit: suspicious
    conf: 0.8
    if:
      type: text
      word: LinkAgentID

composite_rules:
  - id: c2-agent-topology-db
    desc: C2 teamserver agent topology database
    crit: suspicious
    conf: 0.95
    all:
      - id: c2-parent-agent-id
      - id: c2-link-agent-id
