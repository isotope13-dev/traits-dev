defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.7
  for:
    - scripts
    - binaries
traits:
  - id: pastebin
    desc: Pastebin.com reference
    if:
      type: text
      regex: pastebin\.com
    unless:
      - type: text
        substr: ShareX.UploadersLib
  - id: hastebin
    desc: Hastebin reference
    if:
      type: text
      regex: hastebin\.com
    unless:
      - type: text
        substr: ShareX.UploadersLib
  - id: ghostbin
    desc: Ghostbin reference
    if:
      type: text
      regex: ghostbin\.(com|site|co)
  - id: paste-ee
    desc: Paste.ee reference
    if:
      type: text
      regex: paste\.ee
    unless:
      - type: text
        substr: ShareX.UploadersLib
  - id: pastefy
    desc: Pastefy reference
    if:
      type: text
      regex: pastefy\.app
  - id: dpaste
    desc: Dpaste reference
    if:
      type: text
      regex: dpaste\.(com|org)
  - id: privatebin
    desc: PrivateBin reference
    if:
      type: text
      regex: privatebin\.net
  - id: rentry
    desc: Rentry.co reference
    if:
      type: text
      regex: rentry\.(co|org)
  - id: ctrlv
    desc: CtrlV.it reference
    if:
      type: text
      regex: ctrlv\.it
  - id: termbin
    desc: Termbin reference (netcat-based)
    if:
      type: text
      regex: termbin\.com
  - id: pastery
    desc: Pastery reference
    if:
      type: text
      regex: pastery\.net
  - id: jsonkeeper
    desc: JSONkeeper.com reference
    if:
      type: text
      substr: jsonkeeper.com
  - id: jsonbin
    desc: JSONBin.io reference
    if:
      type: text
      substr: jsonbin.io
  - id: npoint
    desc: npoint.io reference
    if:
      type: text
      substr: npoint.io
  - id: jsonblob
    desc: JSONBlob.com reference
    if:
      type: text
      substr: jsonblob.com
  - id: mockapi
    desc: MockAPI.io reference
    if:
      type: text
      substr: mockapi.io
  - id: textbin
    desc: Textbin.net reference
    if:
      type: text
      regex: textbin\.net
