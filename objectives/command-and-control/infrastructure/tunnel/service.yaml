defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.8
  for:
    - scripts
    - binaries
traits:
  # ngrok and localhost.run live canonically in
  # objectives/command-and-control/infrastructure/domain/tunnel/traits.yaml
  # (per-variant atoms + the ngrok-tunnel composite). Referencing composites
  # point there; this file holds only services unique to it.
  - id: pipe-run
    desc: pipe.run tunneling service
    if:
      type: text
      regex: pipe\.run\b
  - id: serveo
    desc: serveo.net tunneling service
    if:
      type: text
      regex: serveo\.net\b
    unless:
      # ConnectWise's test fixture uses a Serveo URL as sample configuration;
      # it is not an endpoint contacted by the package.
      - id: metadata/package/testing/presence/fixture/
      - type: basename
        regex: '(?i)^fixtures(?:\.cpython-[0-9]+)?\.pyc?$'
  - id: telebit
    desc: telebit.cloud tunneling service
    if:
      type: text
      regex: telebit\.cloud\b
  - id: pinggy
    desc: Pinggy tunneling service
    if:
      type: text
      regex: pinggy\.(io|link)\b

composite_rules:
  - id: anonymous-pinggy-ssh-forward
    desc: Anonymous Pinggy SSH port-forward tunnel
    crit: hostile
    conf: 0.99
    attack: T1572
    all:
      - id: pinggy
      - id: well-known/lib/paramiko::paramiko-python-library
      - id: micro-behaviors/communications/ssh/client::python-empty-password-auth
      - id: micro-behaviors/communications/ssh/connect::python-ssh-request-port-forward
