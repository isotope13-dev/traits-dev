defaults:
  platforms: [windows, unix]
  crit: notable
  conf: 0.8
  for:
    - scripts
    - binaries
traits:
  - id: ngrok
    desc: ngrok tunneling service
    if:
      type: text
      regex: '\b[a-z0-9-]+\.ngrok(-free)?\.(io|app|dev)\b'
    unless:
      - id: metadata/package/quality::has-tests
      - id: metadata/library/qt
      - id: well-known/app/keepassxc/
      - type: basename
        regex: (^|[\\/]).*_test\.go$
  - id: localhost-run-dup
    desc: localhost.run tunneling service
    if:
      type: text
      regex: localhost\.run\b
  - id: pipe-run
    desc: pipe.run tunneling service
    if:
      type: text
      regex: pipe\.run\b
  - id: serveo
    desc: serveo.net tunneling service
    if:
      type: text
      regex: serveo\.net\b
  - id: telebit
    desc: telebit.cloud tunneling service
    if:
      type: text
      regex: telebit\.cloud\b
  - id: pinggy
    desc: Pinggy tunneling service
    if:
      type: text
      regex: pinggy\.(io|link)\b
