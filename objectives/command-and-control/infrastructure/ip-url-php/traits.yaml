# Hardcoded http(s)://<external-ip>/<file>.php endpoints are the
# canonical webshell drop-box / supply-chain implant C2 shape. There is
# essentially no legitimate engineering reason to combine bypass-DNS
# via a literal external IP with a raw .php request URI in production
# code. Encoded variants additionally require operator wrapping behind
# a decoder, which is itself an obfuscation signal.
defaults:
  platforms: [unix, windows]
  for: [scripts, source, binaries]
  mbc: C0002
  attack: T1071.001
composite_rules:
  - id: external-ip-php-endpoint
    desc: URL combines external IP and .php
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/url/external-ip::url-external-ip-script
      - id: micro-behaviors/communications/http/url/php-endpoint::url-php-endpoint-script
    near_bytes: 256
    unless:
      - id: well-known/app/wordpress-plugins::wordpress-plugin-path-ninjafirewall

  - id: external-ip-php-endpoint-encoded
    desc: Encoded URL has IP and .php
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/url/external-ip::url-external-ip-encoded
      - id: micro-behaviors/communications/http/url/php-endpoint::url-php-endpoint-encoded

  - id: external-ip-php-query-endpoint
    desc: URL has external IP and .php query
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/url/external-ip::url-external-ip-script
      - id: micro-behaviors/communications/http/url/php-endpoint::url-php-query-script
    near_bytes: 256
    unless:
      - id: well-known/app/wordpress-plugins::wordpress-plugin-path-ninjafirewall
