# Detects the specific C2 domain "profile.doubledating.ru"
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: suspicious
  conf: 0.9
  mbc: "C0011"
  attack: "T1071.001"
traits:
  - id: doubledating-ru
    desc: "Malicious C2 domain profile.doubledating.ru"
    if:
      type: string
      regex: "(?i)profile\\.doubledating\\.ru"
