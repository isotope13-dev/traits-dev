# Brand-Impersonating Serverless Domains
# Detects well-known brand names used as subdomains on free hosting platforms
# Heavily abused by DPRK (Contagious Interview) and commodity malware
# ATT&CK: T1583.001 (Acquire Infrastructure: Domains)
defaults:
  platforms: [windows, unix]
  for:
    - scripts
    - binaries
  attack: T1583.001
  mbc: C0002
traits:
  # --- Cloud provider brand impersonation ---
  - id: brand-cloud-vercel
    desc: Cloud brand on Vercel
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (cloudflare|aws|azure)[-a-z0-9]*\.vercel\.app
  - id: brand-cloud-netlify
    desc: Cloud brand on Netlify
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (cloudflare|aws|azure)[-a-z0-9]*\.netlify\.app
  - id: brand-cloud-herokuapp
    desc: Cloud brand on Heroku
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (cloudflare|aws|azure)[-a-z0-9]*\.herokuapp\.com
  # --- Dev platform brand impersonation ---
  - id: brand-dev-vercel
    desc: GitHub/GitLab/npm-named Vercel domain
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (github|gitlab|npm)[-a-z0-9]*\.vercel\.app
    # These are official GitHub README widget services hosted on Vercel, not
    # brand impersonation. Keep the exclusion at the stable service-name
    # level so unrelated GitHub-branded Vercel hosts remain detectable.
    not:
      - regex: github-readme-(stats|activity-graph)\.vercel\.app
  - id: brand-dev-netlify
    desc: Dev platform brand on Netlify
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (github|gitlab|npm)[-a-z0-9]*\.netlify\.app
  - id: brand-dev-herokuapp
    desc: Dev platform brand on Heroku
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (github|gitlab|npm)[-a-z0-9]*\.herokuapp\.com
  # --- Big tech brand impersonation ---
  - id: brand-tech-vercel
    desc: Big tech brand on Vercel
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (google|microsoft|discord)[-a-z0-9]*\.vercel\.app
  - id: brand-tech-netlify
    desc: Big tech brand on Netlify
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (google|microsoft|discord)[-a-z0-9]*\.netlify\.app
  - id: brand-tech-herokuapp
    desc: Big tech brand on Heroku
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (google|microsoft|discord)[-a-z0-9]*\.herokuapp\.com
  # --- Minor hosting platforms ---
  - id: brand-cloud-railway
    desc: Cloud brand on Railway
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (cloudflare|aws|azure)[-a-z0-9]*\.railway\.app
  - id: brand-cloud-render
    desc: Cloud brand on Render
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (cloudflare|aws|azure)[-a-z0-9]*\.onrender\.com
  - id: brand-cloud-glitch
    desc: Cloud brand on Glitch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (cloudflare|aws|azure)[-a-z0-9]*\.glitch\.me
composite_rules:
  - id: brand-impersonation-serverless
    desc: Brand-impersonating serverless domain
    crit: suspicious
    conf: 0.9
    any:
      - id: brand-cloud-vercel
      - id: brand-cloud-netlify
      - id: brand-cloud-herokuapp
      - id: brand-dev-vercel
      - id: brand-dev-netlify
      - id: brand-dev-herokuapp
      - id: brand-tech-vercel
      - id: brand-tech-netlify
      - id: brand-tech-herokuapp
      - id: brand-cloud-railway
      - id: brand-cloud-render
      - id: brand-cloud-glitch
