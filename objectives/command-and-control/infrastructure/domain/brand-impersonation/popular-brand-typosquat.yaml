# Popular-brand typosquat domains. Domain names that contain a major
# brand keyword but are not the canonical brand-owned domain (e.g.
# meetingszoom.com vs zoom.us, microsoft-update.net vs microsoft.com,
# teams-office.live vs microsoft.com). Used in phishing landing pages
# and fake-update lures.
defaults:
  platforms: [windows, unix]
  for: [html, javascript, typescript]
  attack: T1583.001
  mbc: C0002
traits:
- id: zoom-typosquat-domain--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  not:
  - regex: '(?i)zoom\.us|zoomgov\.us|zoom\.com|@zoom\b'
  if:
    type: text
    regex: 'https?://[A-Za-z0-9-]{1,40}zoom[A-Za-z0-9-]{1,40}\.(com|net)'
- id: zoom-typosquat-domain--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  not:
  - regex: '(?i)zoom\.us|zoomgov\.us|zoom\.com|@zoom\b'
  if:
    type: text
    regex: 'https?://[A-Za-z0-9-]{1,40}zoom[A-Za-z0-9-]{1,40}\.(org|info)'
- id: zoom-typosquat-domain--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  not:
  - regex: '(?i)zoom\.us|zoomgov\.us|zoom\.com|@zoom\b'
  if:
    type: text
    regex: 'https?://[A-Za-z0-9-]{1,40}zoom[A-Za-z0-9-]{1,40}\.(live|app)'
- id: zoom-typosquat-domain--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  not:
  - regex: '(?i)zoom\.us|zoomgov\.us|zoom\.com|@zoom\b'
  if:
    type: text
    regex: 'https?://[A-Za-z0-9-]{1,40}zoom[A-Za-z0-9-]{1,40}\.(site|online)'
