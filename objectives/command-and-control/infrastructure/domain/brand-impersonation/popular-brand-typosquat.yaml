# Popular-brand typosquat domains. Domain names that contain a major
# brand keyword but are not the canonical brand-owned domain (e.g.
# meetingszoom.com vs zoom.us, microsoft-update.net vs microsoft.com,
# teams-office.live vs microsoft.com). Used in phishing landing pages
# and fake-update lures.
defaults:
  platforms: [windows, unix]
  for: [html, javascript, typescript]
  attack: T1583.001
  mbc: C0002
traits:
  - id: zoom-typosquat-domain
    desc: Zoom-typosquat domain reference
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'https?://[A-Za-z0-9-]{1,40}zoom[A-Za-z0-9-]{1,40}\.(com|net|org|info|live|app|site|online)'
    not:
      - regex: '(?i)zoom\.us|zoomgov\.us|zoom\.com|@zoom\b'
  - id: microsoft-typosquat-domain
    desc: Microsoft-typosquat domain reference
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'https?://[A-Za-z0-9-]{1,40}(microsoft|msstore|ms-store|msoffice)[A-Za-z0-9-]{1,40}\.(com|net|org|info|live|app|site|online)'
    not:
      - regex: '(?i)microsoft\.com|microsoftonline\.com|live\.com|office\.com'
  - id: teams-typosquat-domain
    desc: Teams-typosquat domain reference
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'https?://[A-Za-z0-9-]{1,40}teams[A-Za-z0-9-]{1,40}\.(com|net|org|info|live|app|site|online)'
    not:
      - regex: '(?i)microsoft\.com|teams\.microsoft\.com|@teams\b'
  - id: docusign-typosquat-domain
    desc: Docusign-typosquat domain reference
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'https?://[A-Za-z0-9-]{1,40}docusign[A-Za-z0-9-]{1,40}\.(com|net|org|info|live|app|site|online)'
    not:
      - regex: '(?i)docusign\.com|docusign\.net'
  - id: zoom-php-endpoint
    desc: Zoom-typosquat domain serves .php endpoint
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'https?://[A-Za-z0-9-]{1,40}zoom[A-Za-z0-9-]{1,40}\.(com|net|info)/[A-Za-z0-9._-]{1,40}\.php'
    not:
      - regex: '(?i)zoom\.us|zoom\.com'
composite_rules:
  - id: brand-typosquat-domain
    desc: Popular-brand typosquat domain
    crit: suspicious
    conf: 0.93
    any:
      - id: zoom-typosquat-domain
      - id: microsoft-typosquat-domain
      - id: teams-typosquat-domain
      - id: docusign-typosquat-domain
  - id: brand-typosquat-with-php-delivery
    desc: Brand-typosquat with PHP delivery endpoint
    crit: hostile
    conf: 0.96
    all:
      - id: brand-typosquat-domain
      - id: zoom-php-endpoint
