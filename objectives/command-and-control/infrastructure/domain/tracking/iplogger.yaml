defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: browser-cookie-blocklist-rules
    desc: Browser cookie blocklist rules
    crit: component
    conf: 0.9
    for: [scripts]
    if:
      type: text
      substr: "var commons="
  - id: iplogger-domain-b
    desc: Detects iplogger tracking domains
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \b(2no\.co|yip\.su)\b
    unless:
      - type: text
        regex: \b(2no\.co|yip\.su)\b
        section: .rsrc
      - id: metadata/package/quality/context::embedded-domain-reputation-catalog
composite_rules:
  - id: iplogger-domain
    desc: Detects iplogger tracking domains
    crit: suspicious
    conf: 0.95
    any:
      - id: objectives/discovery/network/ip-tracker::iplogger
      - id: iplogger-domain-b
  - id: tracking-services-domain
    desc: Detects tracking domains in malware beacons
    crit: suspicious
    conf: 0.9
    any:
      - id: objectives/discovery/network/ip-tracker/
  - id: iplogger-keyword-context
    desc: Detects 'iplogger' keyword with HTTP indicators
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/discovery/network/scan/external::iplogger-keyword
    any:
      - id: micro-behaviors/communications/http/message::http-prefix
      - id: micro-behaviors/communications/http/message::https-prefix
    unless:
      - id: browser-cookie-blocklist-rules
  - id: fragmented-tracking-beacon
    desc: Detects fragmented tracking/logging URL construction
    crit: suspicious
    conf: 0.9
    any:
      - id: objectives/discovery/network/scan/external::iplogger-keyword
      - id: iplogger-domain
      - id: tracking-services-domain
