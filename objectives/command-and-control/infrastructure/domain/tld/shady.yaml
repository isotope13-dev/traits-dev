defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, documents]
  crit: suspicious
  attack: T1071
traits:
  - id: tld-xyz
    desc: URL with .xyz TLD
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.xyz([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
      - substr: https://ainodes.xyz
      - substr: https://ario.koltigin.xyz/graphql
      - substr: together.xyz
      - substr: cljdoc.xyz       # official Clojure ecosystem documentation host
  - id: tld-tk
    desc: .tk domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.tk([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
      - substr: https://www.tcl.tk/
      - substr: http://www.tcl.tk/
      - substr: http://calimero.tk/
      - substr: tip.tcl.tk
      - substr: core.tcl.tk
    unless:
      - type: basename
        regex: ^api-(temp|test)\.js$
  - id: tld-ml
    desc: .ml domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.ml([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - substr: https://clear.ml/
    unless:
      - id: well-known/tool/offensive/projectdiscovery::nuclei-engine
  - id: tld-ga
    desc: .ga domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.ga([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - substr: https://educourse.ga/
    unless:
      - id: well-known/tool/offensive/projectdiscovery::nuclei-engine
  - id: tld-cf
    desc: .cf domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.cf([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
  - id: tld-gq
    desc: .gq domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.gq([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
  - id: tld-sbs
    desc: URL with .sbs TLD (commonly abused)
    conf: 0.85
    if:
      type: raw
      regex: https?://[A-Za-z0-9.-]{1,120}\.sbs([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-top
    desc: URL with .top TLD
    conf: 0.7
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.top([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - substr: https://video.dtube.top/
      - substr: http://ali.mantv.top/
      - substr: https://api.zan.top/
      - substr: https://jsonrpc.planq.nodestake.top
    unless:
      - id: well-known/tool/offensive/projectdiscovery::nuclei-engine
  - id: tld-zip
    desc: .zip domain (confusing)
    conf: 0.85
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.zip([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: /[^\s/]+\.zip$
      - substr: cosmo.zip
  - id: tld-life
    desc: .life domain (free, commonly abused)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.life([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: tld-zone
    desc: .zone domain (commonly abused)
    conf: 0.75
    crit: notable
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.zone([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-cc
    desc: .cc domain (commonly abused)
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: https?://[A-Za-z0-9.-]{1,120}\.cc(:[0-9]{1,5})?([/?#\s"'<>]|$)
    unless:
      - type: text
        substr: ShareX.UploadersLib
  - id: tld-su
    desc: .su URL
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: https?://.{1,120}\.su(/|\s|$)
  - id: eu-org-free-dns
    desc: .eu.org free DNS domain (C2 infrastructure)
    conf: 0.85
    crit: suspicious
    count_max: 5
    if:
      type: raw
      # Match URL form like sibling TLD rules; bare "x.eu.org" matches author email addresses in docs.
      regex: https?://[A-Za-z0-9.-]{1,120}\.eu\.org(:[0-9]{1,5})?([/?#\s"'<>]|$)
    unless:
      - type: raw
        substr: http://elm.eu.org/
  - id: php-endpoint-url
    desc: URL with .php endpoint
    crit: component
    conf: 0.6
    if:
      type: raw
      regex: https?://.{1,120}\.php\b
  - id: discord-api
    desc: Discord API URL (non-invite)
    crit: notable
    conf: 0.75
    attack: T1567
    if:
      type: text
      regex: 'discord\.com/api/(webhooks/[0-9]{7,}|v[0-9])'
    not:
      - substr: "discord.com/api/webhooks/123456"
      - regex: discord\\.com/(invite|oauth2/authorize)
      - regex: ^\s*#
    unless:
      - id: metadata/package/quality::has-tests
      - id: objectives/exfiltration/messaging/webhook::webhook-notification-settings-context
  - id: ip-address-url
    desc: Direct IP address in URL
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?m)^[^\r\n#]{0,240}https?://\d{1,3}(\.\d{1,3}){3}(:\d{1,5})?(/[^\s'"<>{}]{0,200})?
    not:
      - regex: /thumb\b
      - regex: 0\.0\.0\.0
      - regex: 192\.168\.
      - regex: 10\.\d{1,3}\.
      - regex: 172\.(1[6-9]|2\d|3[0-1])\.
      - regex: 127\.\d{1,3}\.
      - regex: 169\.254\.
      - regex: 1\.1\.1\.1
      - regex: 8\.8\.8\.8
      - regex: ^\s*#
composite_rules:
  - id: free-tld
    desc: Free/abused top-level domain
    crit: suspicious
    conf: 0.8
    any:
      - id: tld-tk
      - id: tld-ml
      - id: tld-ga
      - id: tld-cf
      - id: tld-gq
  - id: suspicious-tld
    desc: Suspicious top-level domain
    crit: suspicious
    conf: 0.75
    any:
      - id: free-tld
      - id: tld-xyz
      - id: tld-sbs
      - id: tld-top
      - id: tld-zip
      - id: tld-cc
      - id: tld-su
      - id: tld-zone
      - id: tld-life
      - id: objectives/command-and-control/infrastructure/domain/abused-tlds
      - id: eu-org-free-dns
  - id: oob-service
    desc: Out-of-band interaction service
    crit: suspicious
    conf: 0.85
    attack: T1567
    any:
      - id: objectives/exfiltration/oob/
  - id: url-shortener
    desc: URL shortening service
    crit: notable
    conf: 0.8
    attack: T1027
    any:
      - id: objectives/exfiltration/oob/shortener/
  - id: php-c2-endpoint
    desc: PHP endpoint on suspicious domain
    crit: hostile
    conf: 0.95
    near_bytes: 500
    all:
      - id: php-endpoint-url
      - id: suspicious-tld
  - id: shady-url
    desc: Suspicious URL detected
    crit: suspicious
    conf: 0.8
    any:
      - id: suspicious-tld
      - id: objectives/command-and-control/infrastructure/domain/heuristic::tunnel-service
      - id: objectives/command-and-control/infrastructure/domain/hosting::transfer-sh
      - id: oob-service
      - id: url-shortener
      - id: objectives/command-and-control/infrastructure/domain/tracking::tracking-services-domain
      - id: discord-api
      - id: ip-address-url
