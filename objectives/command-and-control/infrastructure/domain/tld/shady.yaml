defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, documents]
  crit: suspicious
  attack: T1071
traits:
  - id: tld-tk
    desc: .tk domain (free)
    # Source comments and documentation are handled by the string-literal
    # variant below; this atom remains for binary/document content.
    for: [binaries, documents]
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.tk([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*!
      - regex: ^\s*//
      - substr: https://www.tcl.tk/
      - substr: http://www.tcl.tk/
      - substr: http://calimero.tk/
      - substr: tip.tcl.tk
      - substr: core.tcl.tk
    unless:
      - type: basename
        regex: ^api-(temp|test)\.js$
      - id: metadata/package/documentation::package-doc-reference-basename
      - id: metadata/library/generated::sphinx-searchindex-js
      - id: metadata/package/documentation::documentation-dir-path
      - id: metadata/file/format::adblock-filter-list
      - id: well-known/app/browser-extension::adblock-marker-easylist
      - id: well-known/app/browser-extension::adblock-marker-ublock
  - id: tld-ml
    desc: .ml endpoint URL in binary content
    # Binary URL literals are endpoint evidence. Source files use the
    # call-scoped variant below so documentation and example URLs do not
    # masquerade as network behavior.
    for: [binaries]
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.ml([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*!
      - substr: https://clear.ml/
      - substr: https://api.bfl.ml/
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: well-known/lib/youtube-dl/
      - id: well-known/lib/youtube-dl::youtube-dl-package-context
      - id: metadata/package/documentation::package-doc-reference-basename
      - id: metadata/file/format::adblock-filter-list
      - type: path
        regex: '(^|[\\/])README\.(md|markdown|txt)$'
  - id: tld-ml-source-get
    desc: .ml URL passed to Python HTTP method
    # A URL in a Python docstring or an unrelated call is data, not a
    # network endpoint. Match hardcoded URLs passed to requests/httpx.
    for: [python]
    crit: notable
    conf: 0.8
    if:
      type: tree-sitter
      kind: call
      regex: '\b(requests|httpx)\.(get|post)\([^)]{0,240}https?://[^)]{1,120}\.ml'
    not:
      - regex: '^\s*#'
      - regex: '^\s*!'
      - substr: https://clear.ml/
      - substr: https://api.bfl.ml/
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: well-known/lib/youtube-dl/
      - id: well-known/lib/youtube-dl::youtube-dl-package-context
      - id: metadata/file/format::adblock-filter-list
  - id: tld-ml-source-request
    desc: .ml URL passed to requests method
    for: [python]
    crit: notable
    conf: 0.8
    if:
      type: tree-sitter
      kind: call
      regex: '\brequests\.request\([^)]{0,240}https?://[^)]{1,120}\.ml'
    not:
      - regex: '^\s*#'
      - regex: '^\s*!'
      - substr: https://clear.ml/
      - substr: https://api.bfl.ml/
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: well-known/lib/youtube-dl/
      - id: well-known/lib/youtube-dl::youtube-dl-package-context
      - id: metadata/file/format::adblock-filter-list
  - id: tld-ga
    desc: .ga domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.ga([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*!
      - substr: https://educourse.ga/
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: metadata/file/format::adblock-filter-list
      - id: metadata/package/quality/false-positives-regional::google-regional-search-domain-list
      # A cited hyperlink in a static web page is not a network endpoint.
      - id: metadata/file/profile/identity::static-html-shell
  - id: tld-cf
    desc: .cf domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.cf([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*!
    unless:
      - id: metadata/file/format::adblock-filter-list
      - id: metadata/package/quality/false-positives-regional::google-regional-search-domain-list
      - id: well-known/app/browser-extension::adblock-marker-easylist
      - id: well-known/app/browser-extension::adblock-marker-ublock
      # A cited hyperlink in a static web page is not a network endpoint.
      - id: metadata/file/profile/identity::static-html-shell
  - id: tld-gq
    desc: .gq domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.gq([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
    unless:
      # A cited hyperlink in a static web page is not a network endpoint.
      - id: metadata/file/profile/identity::static-html-shell
  - id: tld-zip
    desc: URL uses the .zip top-level domain
    # A URL in prose, a feed-history list, or other documentation is not
    # evidence that the artifact contacts a .zip host.  Keep this objective
    # signal on executable/script content where it can describe an endpoint
    # used by the program.
    for: [scripts, binaries]
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.zip([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: /[^\s/]+\.zip$
      - substr: https://file.zip
      - substr: cosmo.zip
    unless:
      - id: well-known/app/homebrew::source-tree
      - id: metadata/package/quality/source::security-tracker-cve-leaf
  - id: tld-zone
    desc: .zone domain (commonly abused)
    # Same boundary as the other infrastructure atoms: documentation may
    # freely link to .zone sites without the package using that host.
    for: [scripts, binaries]
    conf: 0.75
    crit: notable
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.zone([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: eu-org-free-dns
    desc: .eu.org free DNS domain (C2 infrastructure)
    # Plain documentation commonly cites .eu.org sites; the domain becomes
    # an infrastructure signal only in executable or script content.
    for: [scripts, binaries]
    conf: 0.85
    crit: suspicious
    count_max: 5
    if:
      type: literal
      # Match URL form like sibling TLD rules; bare "x.eu.org" matches author email addresses in docs.
      regex: https?://[A-Za-z0-9.-]{1,120}\.eu\.org(:[0-9]{1,5})?([/?#\s"'<>]|$)
    not:
      # Public proxy/CDN checker used by proxypool-style Cloudflare IP lists;
      # the URL is data in the list, not C2 infrastructure in the package.
      - substr: https://zip.baipiao.eu.org
    unless:
      - type: raw
        substr: http://elm.eu.org/
      - type: raw
        substr: gutenberg.eu.org
      # eSTREAM / eCRYPT is the European academic stream-cipher project; its URL is
      # cited in the docs of ChaCha/Salsa20 crypto crates (rand_chacha, chacha20).
      - type: raw
        substr: ecrypt.eu.org
      - id: well-known/app/homebrew::source-tree
