defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, documents]
  crit: suspicious
  attack: T1071
traits:
  - id: tld-tk
    desc: .tk domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.tk([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
      - substr: https://www.tcl.tk/
      - substr: http://www.tcl.tk/
      - substr: http://calimero.tk/
      - substr: tip.tcl.tk
      - substr: core.tcl.tk
    unless:
      - type: basename
        regex: ^api-(temp|test)\.js$
  - id: tld-ml
    desc: .ml domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.ml([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - substr: https://clear.ml/
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: metadata/package/documentation::package-doc-reference-basename
      - type: path
        regex: '(^|[\\/])README\.(md|markdown|txt)$'
  - id: tld-ga
    desc: .ga domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.ga([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - substr: https://educourse.ga/
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
  - id: tld-cf
    desc: .cf domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.cf([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
  - id: tld-gq
    desc: .gq domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.gq([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
  - id: tld-sbs
    desc: URL with .sbs TLD (commonly abused)
    conf: 0.85
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.sbs([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-top
    desc: URL with .top TLD
    conf: 0.7
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.top([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - substr: https://video.dtube.top/
      - substr: http://ali.mantv.top/
      - substr: https://api.zan.top/
      - substr: https://jsonrpc.planq.nodestake.top
      - substr: ghfast.top       # well-known public GitHub download accelerator/mirror
    unless:
      - id: metadata/file/extension/identity::markdown-file-basename
      - id: metadata/package/documentation::references-changelog-history
      - id: well-known/tool/offensive/projectdiscovery/
      # An adblock/EasyList filter list enumerates abused-TLD ad domains as the
      # rules it blocks — that is the list's purpose, not C2 infrastructure.
      - id: metadata/file/format::adblock-filter-list
  - id: tld-zip
    desc: .zip domain (confusing)
    conf: 0.85
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.zip([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: /[^\s/]+\.zip$
      - substr: https://file.zip
      - substr: cosmo.zip
  - id: tld-life
    desc: .life domain (free, commonly abused)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.life([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/file/format::adblock-filter-list
  - id: tld-zone
    desc: .zone domain (commonly abused)
    conf: 0.75
    crit: notable
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.zone([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-cc
    desc: .cc domain (commonly abused)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.cc(:[0-9]{1,5})?([/?#\s"'<>]|$)
    not:
      - substr: ghps.cc       # well-known public GitHub download accelerator/mirror
    unless:
      - id: objectives/credential-access/cloud/token/oauth::sharex-uploaderslib-assembly
  - id: tld-su
    desc: .su URL
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: https?://.{1,120}\.su(/|\s|$)
  - id: eu-org-free-dns
    desc: .eu.org free DNS domain (C2 infrastructure)
    conf: 0.85
    crit: suspicious
    count_max: 5
    if:
      type: text
      # Match URL form like sibling TLD rules; bare "x.eu.org" matches author email addresses in docs.
      regex: https?://[A-Za-z0-9.-]{1,120}\.eu\.org(:[0-9]{1,5})?([/?#\s"'<>]|$)
    unless:
      - type: raw
        substr: http://elm.eu.org/
      # eSTREAM / eCRYPT is the European academic stream-cipher project; its URL is
      # cited in the docs of ChaCha/Salsa20 crypto crates (rand_chacha, chacha20).
      - type: raw
        substr: ecrypt.eu.org
  - id: php-endpoint-url
    desc: URL with .php endpoint
    crit: component
    conf: 0.6
    if:
      type: text
      regex: https?://.{1,120}\.php\b
    not:
      - regex: (?i)://jrsoftware\.org/ishelp/index\.php\b
  - id: discord-api
    desc: Discord API URL (non-invite)
    crit: notable
    conf: 0.75
    attack: T1567
    if:
      type: text
      regex: 'discord\.com/api/(webhooks/[0-9]{7,}|v[0-9])'
    not:
      - substr: "discord.com/api/webhooks/123456"
      - regex: discord\\.com/(invite|oauth2/authorize)
      - regex: ^\s*#
    unless:
      - id: metadata/package/testing/
      - id: objectives/exfiltration/messaging/webhook/
