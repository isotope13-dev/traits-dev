defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, documents]
  crit: suspicious
  attack: T1071
traits:
  - id: tld-tk
    desc: .tk domain (free)
    for: [scripts, binaries, documents, -markdown]
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.tk([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*!
      - regex: ^\s*//
      - substr: https://www.tcl.tk/
      - substr: http://www.tcl.tk/
      - substr: http://calimero.tk/
      - substr: tip.tcl.tk
      - substr: core.tcl.tk
    unless:
      - type: basename
        regex: ^api-(temp|test)\.js$
      - id: metadata/library/generated::sphinx-searchindex-js
      - id: metadata/package/documentation::documentation-dir-path
      - id: metadata/file/format::adblock-filter-list
      - id: well-known/app/browser-extension::adblock-marker-easylist
      - id: well-known/app/browser-extension::adblock-marker-ublock
  - id: tld-ml
    desc: .ml domain (free)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.ml([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*!
      - substr: https://clear.ml/
      - substr: https://api.bfl.ml/
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: well-known/lib/youtube-dl/
      - id: well-known/lib/youtube-dl::youtube-dl-package-context
      - id: metadata/package/documentation::package-doc-reference-basename
      - id: metadata/file/format::adblock-filter-list
      - type: path
        regex: '(^|[\\/])README\.(md|markdown|txt)$'
  - id: tld-ga
    desc: .ga domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.ga([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*!
      - substr: https://educourse.ga/
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
      - id: metadata/file/format::adblock-filter-list
  - id: tld-cf
    desc: .cf domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.cf([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*!
    unless:
      - id: metadata/file/format::adblock-filter-list
      - id: well-known/app/browser-extension::adblock-marker-easylist
      - id: well-known/app/browser-extension::adblock-marker-ublock
  - id: tld-gq
    desc: .gq domain (free)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.gq([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
  - id: tld-zip
    desc: .zip domain (confusing)
    conf: 0.85
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.zip([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: /[^\s/]+\.zip$
      - substr: https://file.zip
      - substr: cosmo.zip
  - id: tld-zone
    desc: .zone domain (commonly abused)
    conf: 0.75
    crit: notable
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.zone([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-cc
    desc: .cc domain (commonly abused)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.cc(:[0-9]{1,5})?([/?#\s"'<>]|$)
    not:
      - substr: ghps.cc       # well-known public GitHub download accelerator/mirror
    unless:
      - id: objectives/credential-access/cloud/token/oauth::sharex-uploaderslib-assembly
  - id: eu-org-free-dns
    desc: .eu.org free DNS domain (C2 infrastructure)
    for: [scripts, binaries, documents, -markdown, -html]
    conf: 0.85
    crit: suspicious
    count_max: 5
    if:
      type: text
      # Match URL form like sibling TLD rules; bare "x.eu.org" matches author email addresses in docs.
      regex: https?://[A-Za-z0-9.-]{1,120}\.eu\.org(:[0-9]{1,5})?([/?#\s"'<>]|$)
    not:
      # Public proxy/CDN checker used by proxypool-style Cloudflare IP lists;
      # the URL is data in the list, not C2 infrastructure in the package.
      - substr: https://zip.baipiao.eu.org
    unless:
      - type: raw
        substr: http://elm.eu.org/
      - type: raw
        substr: gutenberg.eu.org
      # eSTREAM / eCRYPT is the European academic stream-cipher project; its URL is
      # cited in the docs of ChaCha/Salsa20 crypto crates (rand_chacha, chacha20).
      - type: raw
        substr: ecrypt.eu.org
  - id: php-endpoint-url
    desc: URL with .php endpoint
    crit: component
    conf: 0.6
    if:
      type: text
      regex: https?://.{1,120}\.php\b
    not:
      - regex: (?i)://jrsoftware\.org/ishelp/index\.php\b
