# Hardcoded country-code TLD (ccTLD) domains.
#
# A hardcoded .ru / .cn domain is a NEUTRAL observation: the largest e-commerce,
# search, mail and cloud providers in those regions use these TLDs (wildberries.ru,
# ozon.ru, avito.ru, yandex.ru, mail.ru; aliyun, feishu, modelscope, …). These are
# weak building blocks only — the C2 inference lives in the `c2-domain` /
# `hardcoded-domain-suspicious-pattern` composites in ../malicious/traits.yaml,
# which combine a ccTLD reference with a small-file / dynamic-DNS context.
defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [python, javascript, powershell, pe, elf, macho]
  crit: notable
  conf: 0.6
  mbc: C0002
  attack: T1071.001
traits:
  - id: hardcoded-domain-ru
    desc: Hardcoded .ru country-TLD domain
    if:
      type: text
      regex: '[''\"](https?://)?([a-zA-Z0-9-]{1,63}\.){1,4}ru[''"/:]'
    unless:
    - id: metadata/package/testing/presence/harness::go-test-file
    not:
    - regex: '[''\"]config\.ru[''\"]'
    - substr: language.ru
    downgrade:
      any:
      - type: raw
        regex: defmodule\s+Faker\.Internet\.|sampler\(:free_email_service
  - id: hardcoded-domain-cn
    desc: Hardcoded .cn country-TLD domain
    if:
      type: text
      regex: '[''\"](https?://)?([a-zA-Z0-9-]{1,63}\.){1,4}cn[''"/:]'
    unless:
    - id: metadata/package/testing/presence/harness::go-test-file
    # Major Chinese cloud-provider API hosts (Azure China, Feishu, Zhipu, AWS
    # China, Aliyun, Tencent Cloud) and legitimate model hubs / university mirrors.
    - type: text
      regex: chinacloudapi\.cn|feishu\.cn|bigmodel\.cn
    - type: text
      regex: amazonaws\.com\.cn|aliyuncs\.com\.cn|tencentcloudapi\.cn
    - type: text
      regex: modelscope\.cn|cernet\.edu\.cn|nju\.edu\.cn
    - type: text
      regex: portal\.azure\.cn
