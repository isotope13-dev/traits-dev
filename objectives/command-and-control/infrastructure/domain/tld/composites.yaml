defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, documents]
  attack: T1071

composite_rules:
  - id: free-tld
    desc: Free/abused top-level domain
    crit: suspicious
    conf: 0.8
    any:
      - id: tld-tk
      - id: tld-ml
      - id: tld-ga
      - id: tld-cf
      - id: tld-gq
  - id: suspicious-tld
    desc: Suspicious top-level domain
    crit: suspicious
    conf: 0.75
    any:
      - id: free-tld
      - id: tld-xyz
      - id: tld-sbs
      - id: tld-top
      - id: tld-zip
      - id: tld-cc
      - id: tld-su
      - id: tld-zone
      - id: tld-life
      - id: objectives/command-and-control/infrastructure/domain/abused-tlds
    unless:
      - id: metadata/library/data::public-suffix-list
      - id: metadata/library/data::mozilla-public-suffix-list-path
      - id: metadata/library/data::publicsuffix-org-list-header
      - id: eu-org-free-dns
      - id: micro-behaviors/crypto/library/blockchain::crypto-exchange-sdk-benign-context
      - id: well-known/app/blockstream::native-extension-init
      - id: well-known/tool/dual-use/aitun::aitun-tunnel-client
  - id: oob-service
    desc: Out-of-band interaction service
    crit: suspicious
    conf: 0.85
    attack: T1567
    any:
      - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
      - id: objectives/exfiltration/oob/interactsh::suspicious-interactsh-usage
    unless:
      - id: micro-behaviors/crypto/library/blockchain::crypto-exchange-sdk-benign-context
      - id: well-known/lib/pyaigis::pyaigis-context
  - id: url-shortener
    desc: URL shortening service
    crit: notable
    conf: 0.8
    attack: T1027
    any:
      - id: micro-behaviors/communications/url/shortener/
  - id: php-c2-endpoint
    desc: PHP endpoint on suspicious domain
    crit: hostile
    conf: 0.95
    near_bytes: 500
    all:
      - id: php-endpoint-url
      - id: suspicious-tld
    unless:
      - id: well-known/lib/youtube-dl::youtube-dl-extractor-module
  - id: shady-url
    desc: Suspicious URL detected
    crit: suspicious
    conf: 0.8
    any:
      - id: suspicious-tld
      - id: objectives/command-and-control/infrastructure/domain/malicious::tunnel-service
      - id: objectives/command-and-control/infrastructure/domain/hosting::transfer-sh
      - id: oob-service
      - id: url-shortener
      - id: objectives/command-and-control/infrastructure/domain/tracking::tracking-services-domain
      - id: discord-api
      - id: micro-behaviors/communications/ip/literal::http-ip-url
    unless:
      - id: micro-behaviors/crypto/library/blockchain::crypto-exchange-sdk-benign-context
