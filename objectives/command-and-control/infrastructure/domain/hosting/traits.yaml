defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries, source]
  mbc: C0002
  attack: T1105
traits:
  - id: bullethost-cloud
    desc: Bullethost.cloud file hosting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: bullethost.cloud
  - id: anonfiles-com
    desc: Anonfiles.com file hosting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: anonfiles.com
  - id: gofile-io
    desc: Gofile.io file hosting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: gofile.io
  - id: transfer-sh
    desc: Transfer.sh file hosting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: transfer.sh
  - id: tmpfiles-org
    desc: Tmpfiles.org file hosting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: tmpfiles.org
  - id: catbox-moe
    desc: Catbox.moe file hosting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: catbox.moe
  - id: uguu-se
    desc: Uguu.se file hosting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: uguu.se
  - id: pomf-cat
    desc: Pomf.cat file hosting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: pomf.cat
  - id: 0x0-st
    desc: 0x0.st file hosting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: 0x0.st
  - id: file-io
    desc: File.io file hosting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: file.io
  - id: filedropper-com
    desc: Filedropper.com file hosting
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: filedropper.com
  - id: doko-moe
    desc: Doko.moe file hosting (commonly abused)
    crit: notable
    conf: 0.7
    if:
      type: string
      substr: doko.moe
  - id: freehostia-com
    desc: Freehostia.com free web hosting
    crit: notable
    conf: 0.7
    for: [binaries]
    if:
      type: string
      substr: freehostia.com
  - id: blogspot-url-binary
    desc: Blogspot URL in binary (C2 dead drop)
    crit: notable
    conf: 0.75
    for: [binaries]
    size_max: 10485760
    if:
      type: string
      substr: blogspot.com
    not:
      - regex: '(?i)(https?://\S+blogspot\.com\S{0,80})\s*\*/'
composite_rules:
  - id: malware-hosting
    desc: Contacts known malware/payload hosting service
    crit: notable
    conf: 0.95
    any:
      - id: bullethost-cloud
      - id: anonfiles-com
      - id: gofile-io
      - id: transfer-sh
      - id: tmpfiles-org
      - id: catbox-moe
      - id: uguu-se
      - id: pomf-cat
      - id: 0x0-st
      - id: file-io
      - id: filedropper-com
      - id: doko-moe
      - id: freehostia-com
      - id: blogspot-url-binary
