defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, source]
  mbc: C0002
  attack: T1105
traits:
  - id: bullethost-cloud
    desc: Bullethost.cloud file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: bullethost.cloud
  - id: anonfiles-com
    desc: Anonfiles.com file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: anonfiles.com
  - id: gofile-io
    desc: Gofile.io file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: gofile.io
  - id: transfer-sh
    desc: Transfer.sh file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: transfer.sh
    unless:
      - type: text
        substr: ShareX.UploadersLib
  - id: tmpfiles-org
    desc: Tmpfiles.org file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: tmpfiles.org
  - id: catbox-moe
    desc: Catbox.moe file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: catbox.moe
  - id: uguu-se
    desc: Uguu.se file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: uguu.se
    unless:
      - type: text
        substr: ShareX.UploadersLib
  - id: pomf-cat
    desc: Pomf.cat file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: pomf.cat
  - id: 0x0-st
    desc: 0x0.st file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: 0x0.st
  - id: file-io
    desc: File.io file hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: file.io
  - id: filedropper-com
    desc: Filedropper.com file hosting
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: filedropper.com
  - id: doko-moe
    desc: Doko.moe file hosting (commonly abused)
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: doko.moe
  - id: freehostia-com
    desc: Freehostia.com free web hosting
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: freehostia.com
    unless:
      - id: metadata/package/quality::embedded-domain-reputation-catalog
  - id: blogspot-url-binary
    desc: Blogspot URL reference
    crit: notable
    conf: 0.75
    size_max: 10485760
    if:
      type: text
      regex: 'https?://[^\s]{1,120}blogspot\.com([/?#: ]|$)'
    not:
      - regex: (?i)(https?://\S+blogspot\.com\S{0,80})\s*\*/
    unless:
      - id: metadata/package/quality::has-tests
      - id: well-known/tool/development/debugpy
      - type: basename
        regex: (^|[\\/]).*_test\.go$
composite_rules:
  - id: malware-hosting
    desc: Contacts known malware/payload hosting service
    crit: notable
    conf: 0.95
    any:
      - id: bullethost-cloud
      - id: anonfiles-com
      - id: gofile-io
      - id: transfer-sh
      - id: tmpfiles-org
      - id: catbox-moe
      - id: uguu-se
      - id: pomf-cat
      - id: 0x0-st
      - id: file-io
      - id: filedropper-com
      - id: doko-moe
      - id: freehostia-com
      - id: blogspot-url-binary
