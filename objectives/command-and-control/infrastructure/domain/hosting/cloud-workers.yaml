# Cloudflare Workers infrastructure
# Cloudflare Workers (*.workers.dev) is common legitimate hosting, but is
# also abused for C2 and delivery because it provides free HTTPS hosting
# that blends with CDN traffic.
defaults:
  for: [binaries, scripts, source]
  platforms: [unix, windows]
  attack: T1583.006
  mbc: B0030
traits:
  - id: workers-dev-domain
    desc: Cloudflare Workers domain reference
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: .workers.dev
    unless:
      - id: metadata/package/quality::embedded-domain-reputation-catalog
  - id: workers-dev-gov-impersonation
    desc: "CF Workers domain impersonating government"
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: \w+-gov-\w+\.workers\.dev
  - id: workers-dev-url
    desc: HTTPS URL pointing to Cloudflare Workers
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: https?://[\w.-]+\.workers\.dev/
composite_rules:
  - id: workers-dev-http-endpoint
    desc: Cloudflare Workers HTTP endpoint
    crit: notable
    conf: 0.9
    all:
      - id: workers-dev-domain
    any:
      - id: micro-behaviors/communications/http/client/
      - id: micro-behaviors/communications/http/post/
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker
