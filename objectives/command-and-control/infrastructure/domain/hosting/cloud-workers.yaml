# Cloudflare Workers infrastructure
# Cloudflare Workers (*.workers.dev) is common legitimate hosting, but is
# also abused for C2 and delivery because it provides free HTTPS hosting
# that blends with CDN traffic.
defaults:
  for: [binaries, scripts, source]
  platforms: [unix, windows]
  attack: T1583.006
  mbc: B0030
traits:
  - id: workers-dev-gov-impersonation
    desc: "CF Workers domain impersonating government"
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: \w+-gov-\w+\.workers\.dev

composite_rules:
  - id: vbs-workers-dev-irm-hidden-dropper
    desc: VBS drops PowerShell IRM eval from workers.dev and launches hidden
    crit: hostile
    conf: 0.99
    attack: "T1059.005,T1059.001,T1105,T1564.003,T1583.006"
    for: [vbs]
    all:
      - id: micro-behaviors/communications/http/url/domain::workers-dev-url
      - id: objectives/command-and-control/dropper/execution/fileless::ps-irm-pipeline-eval
      - id: micro-behaviors/fs/write/content::create-text-file-api
      - id: micro-behaviors/process/create/shell/wsh::shellexecute-hidden-showcmd
