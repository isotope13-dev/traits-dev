defaults:
  crit: suspicious
  attack: T1071.001
  mbc: B0030
  for:
    - python
    - shell
    - javascript
  platforms:
    - unix
    - windows
traits:
  - id: webhostapp-domain
    desc: 000webhostapp domain
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: 000webhostapp\.com
  - id: webhostapp-http
    desc: 000webhost HTTP endpoint
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: 000webhostapp.{0,50}http|http.{0,50}000webhostapp
  - id: free-webhost-domain
    desc: Free webhosting domain
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: (freehostia|byethost|000webhost|infinityfree)\.
  - id: free-webhost-c2-url
    desc: Free webhost C2 URL
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: (freehost|byethost|000webhost).{0,50}:[0-9]+
  - id: cloudflare-pages
    desc: Cloudflare Pages domain
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: \.pages\.dev
    unless:
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    - id: well-known/tool/detection/sast::sast-scanner-integration
    downgrade:
      any:
      - id: metadata/signed/platform::mozilla-extension
# github-pages relocated to micro-behaviors/communications/http/endpoints::
# github-pages — `*.github.io` is mainstream benign static hosting, not C2
# infrastructure. The free-webhost-c2-channel composite below only references
# the genuine abuse-hosts (000webhostapp/freehostia/byethost/infinityfree).
composite_rules:
  - id: free-webhost-c2-channel
    desc: Free webhosting C2 channel
    crit: suspicious
    conf: 0.9
    any:
      - id: webhostapp-domain
      - id: free-webhost-domain
      - id: free-webhost-c2-url
