- id: onion-domain
  desc: .onion domain reference
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: (?i)\b[a-z2-7]{16,56}\.onion\b
- id: hardcoded-v3-onion-url
  desc: Hardcoded Tor onion URL
  crit: suspicious
  conf: 0.88
  for: [scripts, binaries, manifests]
  attack: T1090.003
  if:
    type: text
    regex: (?i)https?://[a-z2-7]{56}\.onion\b
  unless:
  - id: well-known/app/onion-mirror
  - id: well-known/app/blockstream::native-extension-init
  - type: text
    substr: "blockstream/green/gdk"
- id: short-domain-url-pattern
  desc: Very short domain in URL
  crit: component
  conf: 0.8
  if:
    type: text
    regex: https?://[a-zA-Z0-9]{2,3}\.[a-zA-Z]{2,4}[/:]
