# NOTE: generic managed-PaaS/serverless endpoints (AWS API Gateway, Azure
# Websites, Google Cloud Functions, Vercel, Netlify) are ubiquitous legitimate
# platforms, not malicious by themselves. Relocated to
# micro-behaviors/communications/http/endpoints/cloud-api as neutral comms
# capabilities; C2 composites reference them cross-tier when combined with
# malicious context.
- id: replit-dev
  desc: Replit.dev endpoint
  crit: notable
  conf: 0.6
  attack: T1071
  if:
    type: text
    regex: ([a-z0-9-]{1,63}\.){1,6}replit\.dev
  unless:
  - id: metadata/library/data::public-suffix-list
  - id: metadata/package/testing/presence/harness::go-test-file
  - id: metadata/library/qt
- id: repl-co
  desc: Repl.co endpoint
  crit: notable
  conf: 0.6
  attack: T1071
  if:
    type: text
    regex: 'https?://([a-z0-9-]{1,63}\.){1,6}repl\.co([/?#: ]|$)'
  unless:
  - id: metadata/package/testing/presence/harness::go-test-file
- id: replit-id-domain
  desc: Replit ID endpoint (commonly abused)
  crit: suspicious
  conf: 0.85
  attack: T1071
  if:
    type: text
    regex: '[a-f0-9-]+\.id\.repl\.co'
- id: glitch-hosted
  desc: Contacts Glitch-hosted endpoint
  crit: suspicious
  conf: 0.8
  attack: T1071
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - type: text
    substr: "describe('first party sets'"
  if:
    type: text
    regex: '[a-z0-9-]+\.glitch\.me'
- id: railway-hosted
  desc: Contacts Railway-hosted endpoint
  crit: notable
  conf: 0.75
  attack: T1071
  if:
    type: text
    regex: '[a-z0-9-]+\.railway\.app'
  unless:
  - id: metadata/library/data::public-suffix-list
  - id: metadata/package/testing/presence/harness::go-test-file
- id: render-hosted
  desc: Contacts Render-hosted endpoint
  crit: notable
  conf: 0.75
  attack: T1071
  if:
    type: text
    regex: '[a-f0-9-]{8,}\.onrender\.com'
- id: heroku-hosted
  desc: Contacts Heroku-hosted endpoint
  crit: notable
  conf: 0.7
  attack: T1071
  if:
    type: text
    regex: '[a-z0-9-]+\.herokuapp\.com'
  not:
  - substr: mm-resource-service.herokuapp.com
# NOTE: the neutral ccTLD atoms `hardcoded-domain-ru` / `hardcoded-domain-cn`
# moved to ../tld/country.yaml (a hardcoded .ru/.cn domain is not malicious on
# its own). The composites below reference them cross-directory.
- id: suspicious-php-filename
  desc: Suspicious PHP endpoint URL (gate/upload/etc)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: https?://[^/]{1,120}/.{0,120}(gate|cmd|shell|payload)\.php
  not:
  - substr: https://video.sibnet.ru/shell.php
- id: wecan-hasthe-upload-endpoint
  desc: Wecan Hasthe Technology upload endpoint
  crit: suspicious
  conf: 0.94
  attack: T1041
  if:
    type: text
    exact: http://wecan.hasthe.technology/upload
- id: internal-api-probe-local
  desc: Probes internal/localhost API endpoints
  crit: notable
  conf: 0.9
  attack: T1046
  if:
    type: text
    regex: http://(internal|localhost)[-a-zA-Z0-9.]*/(api|health|status)
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
- id: internal-api-probe-10
  desc: Probes 10.x API endpoints
  crit: notable
  conf: 0.9
  attack: T1046
  if:
    type: text
    regex: http://10\.[-a-zA-Z0-9.]*/(api|health|status)
  unless:
  - id: well-known/tool/offensive/projectdiscovery::nuclei-engine
  - id: well-known/tool/offensive/projectdiscovery::attribution
- id: dynamic-dns-domain-pattern--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (^|[^@A-Za-z0-9._-])[a-zA-Z0-9][-a-zA-Z0-9]*\.(duckdns|no-ip)\.[a-z]{2,6}\b
  count_max: 1006729
- id: dynamic-dns-domain-pattern--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: (^|[^@A-Za-z0-9._-])[a-zA-Z0-9][-a-zA-Z0-9]*\.(ddns|hopto)\.[a-z]{2,6}\b
  count_max: 1006730
- id: dynamic-dns-domain-pattern-cond-0--inline-6730
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b[a-zA-Z0-9][-a-zA-Z0-9]*\.(duckdns|no-ip|ddns|hopto)\.[a-z]{2,6}\b
    section: .rsrc
  count_max: 1006731
- id: cloudfront-php-file-parameter
  desc: CloudFront PHP endpoint with file parameter
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'https://[a-z0-9-]{10,32}\.cloudfront\.net/[^?\s]{4,48}\.php\?file='
composite_rules:
- id: internal-api-probe
  desc: Probes internal network API endpoints
  crit: notable
  conf: 0.9
  attack: T1046
  any:
  - id: internal-api-probe-local
  - id: internal-api-probe-10
- id: hardcoded-domain-suspicious-pattern
  desc: Hardcoded suspicious TLD domain pattern
  crit: notable
  conf: 0.7
  any:
  - id: objectives/command-and-control/infrastructure/domain/tld::hardcoded-domain-ru
  - id: objectives/command-and-control/infrastructure/domain/tld::hardcoded-domain-cn
- id: c2-domain
  desc: Likely C2 domain (suspicious TLD)
  crit: suspicious
  conf: 0.85
  size_max: 5000
  any:
  - id: hardcoded-domain-suspicious-pattern
  - id: dynamic-dns-domain-pattern
- id: php-collector-comp
  desc: Contacts PHP data collection endpoint
  crit: notable
  conf: 0.85
  attack: T1041
  any:
  - id: objectives/command-and-control/infrastructure/domain/malicious::php-collect-dup
  - id: objectives/command-and-control/infrastructure/domain/malicious::php-log-dup
  - id: objectives/command-and-control/infrastructure/domain/malicious::php-report-dup
  - id: objectives/command-and-control/infrastructure/domain/malicious::php-beacon-dup
  - id: php-gate
- id: replit-hosted
  desc: Contacts Replit-hosted endpoint (commonly abused)
  crit: suspicious
  conf: 0.85
  attack: T1071
  any:
  - id: replit-dev
  - id: repl-co
  - id: replit-id-domain
  unless:
  - id: metadata/library/qt
  - id: well-known/app/keepassxc/
  - id: well-known/app/tencent-codebuddy::tencent-codebuddy-sdk-bundle
- id: tunnel-service
  desc: Contacts tunneling service endpoint
  crit: suspicious
  conf: 0.85
  attack: T1572
  any:
  - id: objectives/command-and-control/infrastructure/domain/tunnel/
  unless:
  - id: metadata/library/qt
  - id: well-known/app/keepassxc/
- id: dynamic-dns-domain-pattern
  desc: Dynamic DNS domain pattern
  crit: suspicious
  conf: 0.9
  any:
  - id: dynamic-dns-domain-pattern--rx-1
  - id: dynamic-dns-domain-pattern--rx-2
  unless:
  - id: dynamic-dns-domain-pattern-cond-0--inline-6730
  not:
  - regex: \b[a-z]{2,4}\.(ddns|hopto|duckdns|no-ip)\.
  - substr: slimxxxtubealn.ddns.name
  - regex: \b(slimxxxtube|tube8vids|xpornstars)[a-z]{3}\.ddns\.name\b
  - substr: webwidgetz.duckdns.org
