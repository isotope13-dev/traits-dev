defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [python, javascript, powershell, pe, elf, macho]
  mbc: C0002
  attack: T1071.001
traits:
- id: ipcheck-cloud
  desc: ipcheck.cloud malicious domain (C2/Dropper)
  crit: suspicious
  conf: 1.0
  if:
    type: text
    substr: ipcheck.cloud
- id: evilpacket-net
  desc: Evilpacket.net malicious domain
  crit: suspicious
  conf: 1.0
  if:
    type: text
    substr: evilpacket.net
- id: healdsburgdistricthospital-net
  desc: "healdsburgdistricthospital.net C2 domain"
  crit: suspicious
  conf: 1.0
  if:
    type: text
    substr: healdsburgdistricthospital.net
- id: filioruters-com
  desc: filioruters.com malicious domain
  crit: suspicious
  conf: 1.0
  attack: T1105
  if:
    type: text
    substr: filioruters.com
- id: anti-theft-web-heroku
  desc: 'Anti-theft-web.herokuapp.com malicious domain'
  crit: suspicious
  conf: 1.0
  if:
    type: text
    substr: anti-theft-web.herokuapp.com
- id: onion-domain
  desc: .onion domain reference
  crit: notable
  conf: 0.6
  if:
    type: text
    regex: (?i)\b[a-z2-7]{16,56}\.onion\b
- id: hardcoded-v3-onion-url
  desc: Hardcoded Tor onion URL
  crit: suspicious
  conf: 0.88
  for: [scripts, binaries, manifests]
  attack: T1090.003
  if:
    type: text
    regex: (?i)https?://[a-z2-7]{56}\.onion\b
  unless:
  - id: well-known/app/onion-mirror
  - id: well-known/app/blockstream::esplora-source-tree
  - id: well-known/app/blockstream::native-extension-init
  - id: well-known/lib/deb-package::firefox-omni-basename
  - type: text
    substr: "blockstream/green/gdk"
- id: short-domain-url-pattern
  desc: Very short domain in URL
  crit: component
  conf: 0.8
  if:
    type: text
    regex: https?://[a-zA-Z0-9]{2,3}\.[a-zA-Z]{2,4}[/:]
  unless:
  - type: text
    substr: bit.ly/CRA-PWA
  - id: objectives/credential-access/cloud/token/oauth::sharex-uploaderslib-assembly
  - id: metadata/file/catalog/identity/
  not:
  - substr: http://ehc.ac/
  - substr: http://eev.ee/
  - substr: http://ok.hu/
  - substr: ok.ru
  - substr: aka.ms/
  - substr: go.dev/
  - substr: go.microsoft.com/fwlink/
  - substr: gnu.org
  - substr: zgp.org/
  - substr: w3.org
  - substr: eff.org
  - substr: fsf.org
  - substr: iso.org
  - substr: osi.org
  - substr: ietf.org
  - substr: xml.org/
  - substr: hex.pm
  - substr: npm.io
  - substr: pypi.io
  - substr: hf.co/
  - substr: dvc.org/
  - substr: git.io
  - substr: fb.me/
  - substr: lua.org/
  - substr: bun.sh
  - substr: deno.land
  - substr: foo.com/
  - substr: bar.com/
  - substr: baz.com/
  - substr: qux.com/
  - substr: foo.bar/
  - regex: \.(home|local|internal|localhost|lan|test|example|invalid)[\s:/]
- id: numeric-lookalike-c2-host
  desc: URL host with numeric-prefixed brand label
  crit: suspicious
  conf: 0.8
  for: [binaries, scripts, manifests]
  attack: T1583.001
  # A registrable host label of the form `<4+ digits>-<word>` -- a random numeric
  # prefix fronting a brand, e.g. `348672-shakepay.com` impersonating Shakepay --
  # is the shape of throwaway/lookalike C2 infrastructure. Requiring the trailing
  # `-word` keeps it specific: legit numeric hosts (AWS ECR
  # `<12-digit-account>.dkr.ecr...`, GCP project numbers, Sentry `o123456` ingest
  # hosts) carry long digit runs but are not a digits-hyphen-word label.
  if:
    type: text
    regex: (?i)https?://([a-z0-9-]{1,63}\.){0,3}[0-9]{4,}-[a-z][a-z0-9-]*\.[a-z]{2,24}
  unless:
  - id: metadata/file/catalog/identity/
- id: openclaw-c2-domain
  desc: OpenClaw C2 domain
  crit: suspicious
  conf: 1.0
  if:
    type: text
    substr: setup-service.com
- id: h5-helloniubi-shop
  desc: h5.helloniubi.shop malicious C2 domain
  crit: suspicious
  conf: 1.0
  if:
    type: text
    substr: h5.helloniubi.shop
- id: appwrite-storage
  desc: Appwrite cloud storage (commonly abused)
  crit: suspicious
  conf: 0.85
  attack: T1105
  if:
    type: text
    regex: '[a-z0-9-]+\.cloud\.appwrite\.io/v[0-9]+/storage/buckets/[a-z0-9]+/files/'
- id: firebase-storage
  desc: Firebase storage endpoint (can be abused)
  crit: notable
  conf: 0.7
  attack: T1105
  if:
    type: text
    regex: firebasestorage\.googleapis\.com/v[0-9]+/b/[^/]{1,120}/o/
- id: reversed-firebase-storage
  desc: Reversed Firebase storage endpoint
  crit: suspicious
  conf: 0.88
  attack: T1105
  for: [powershell, javascript, typescript, shell, batch]
  if:
    type: string_literal
    substr: moc.sipaelgoog.egarotsesaberif
- id: reversed-myfirebase-host
  desc: Reversed myfirebase host
  crit: suspicious
  conf: 0.9
  attack: T1105
  for: [powershell, javascript, typescript, shell, batch]
  if:
    type: string_literal
    substr: moc.esabelifym
- id: php-collect-dup
  desc: PHP collect endpoint
  crit: suspicious
  conf: 0.6
  attack: T1041
  if:
    type: text
    regex: /collect[_-]?(info|data|stats)?\.php
- id: php-log-dup
  desc: PHP log endpoint
  crit: notable
  conf: 0.6
  attack: T1041
  if:
    type: text
    regex: /log[_-]?(info|data)?\.php
- id: php-report-dup
  desc: PHP report endpoint
  crit: suspicious
  conf: 0.6
  attack: T1041
  if:
    type: text
    substr: /report.php
  unless:
  - id: well-known/app/abacus-ai::abacus-ai-vscode-extension
- id: php-beacon-dup
  desc: PHP beacon endpoint
  crit: baseline
  conf: 0.8
  attack: T1041
  if:
    type: text
    substr: /beacon.php
- id: php-gate
  desc: PHP gate endpoint
  crit: suspicious
  conf: 0.6
  attack: T1041
  if:
    type: text
    substr: /gate.php
# NOTE: generic managed-PaaS/serverless endpoints (AWS API Gateway, Azure
# Websites, Google Cloud Functions, Vercel, Netlify) are ubiquitous legitimate
# platforms, not malicious by themselves. Relocated to
# micro-behaviors/communications/http/endpoints/cloud-api as neutral comms
# capabilities; C2 composites reference them cross-tier when combined with
# malicious context.
- id: replit-dev
  desc: Replit.dev endpoint
  crit: notable
  conf: 0.6
  attack: T1071
  if:
    type: text
    regex: ([a-z0-9-]{1,63}\.){1,6}replit\.dev
  unless:
  - id: metadata/library/data/
  - id: metadata/package/testing/presence/harness::go-test-file
  - id: metadata/library/qt
- id: repl-co
  desc: Repl.co endpoint
  crit: notable
  conf: 0.6
  attack: T1071
  if:
    type: text
    regex: 'https?://([a-z0-9-]{1,63}\.){1,6}repl\.co([/?#: ]|$)'
  unless:
  - id: metadata/package/testing/presence/harness::go-test-file
- id: replit-id-domain
  desc: Replit ID endpoint (commonly abused)
  crit: suspicious
  conf: 0.85
  attack: T1071
  if:
    type: text
    regex: '[a-f0-9-]+\.id\.repl\.co'
- id: glitch-hosted
  desc: Contacts Glitch-hosted endpoint
  crit: notable
  conf: 0.8
  attack: T1071
  unless:
  - id: metadata/package/testing/
  - type: text
    substr: "describe('first party sets'"
  if:
    type: text
    regex: '[a-z0-9-]+\.glitch\.me'
- id: railway-hosted
  desc: Contacts Railway-hosted endpoint
  crit: notable
  conf: 0.75
  attack: T1071
  if:
    type: text
    regex: '[a-z0-9-]+\.railway\.app'
  unless:
  - id: metadata/library/data/
  - id: metadata/package/testing/presence/harness::go-test-file
- id: render-hosted
  desc: Contacts Render-hosted endpoint
  crit: notable
  conf: 0.75
  attack: T1071
  if:
    type: text
    regex: '[a-f0-9-]{8,}\.onrender\.com'
# NOTE: the neutral ccTLD atoms `hardcoded-domain-ru` / `hardcoded-domain-cn`
# moved to ../tld/country.yaml (a hardcoded .ru/.cn domain is not malicious on
# its own). The composites below reference them cross-directory.
- id: suspicious-php-filename
  desc: Suspicious PHP endpoint URL (gate/upload/etc)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: https?://[^/]{1,120}/.{0,120}(gate|cmd|shell|payload)\.php
  not:
  - substr: https://video.sibnet.ru/shell.php
- id: wecan-hasthe-upload-endpoint
  desc: Wecan Hasthe Technology upload endpoint
  crit: suspicious
  conf: 0.94
  attack: T1041
  if:
    type: text
    exact: http://wecan.hasthe.technology/upload
- id: hardcoded-domain-suspicious-pattern
  desc: Dynamic DNS hostname reference
  crit: notable
  conf: 0.8
  count_min: 1
  if:
    id: micro-behaviors/communications/url/host::dynamic-dns-hostname
- id: cloudfront-php-file-parameter
  desc: CloudFront PHP endpoint with file parameter
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'https://[a-z0-9-]{10,32}\.cloudfront\.net/[^?\s]{4,48}\.php\?file='
composite_rules:
- id: c2-domain
  desc: Likely C2 domain infrastructure
  crit: suspicious
  conf: 0.85
  size_max: 5000
  any:
  - id: numeric-lookalike-c2-host
  - id: openclaw-c2-domain
  - id: h5-helloniubi-shop
  - id: ipcheck-cloud
  - id: evilpacket-net
  unless:
  - id: well-known/app/web-to-epub::wte-extension-context
- id: php-collector-comp
  desc: Contacts PHP data collection endpoint
  crit: notable
  conf: 0.85
  attack: T1041
  any:
  - id: objectives/command-and-control/infrastructure/domain/malicious::php-collect-dup
  - id: objectives/command-and-control/infrastructure/domain/malicious::php-log-dup
  - id: objectives/command-and-control/infrastructure/domain/malicious::php-report-dup
  - id: objectives/command-and-control/infrastructure/domain/malicious::php-beacon-dup
  - id: php-gate
- id: replit-hosted
  desc: Contacts Replit-hosted endpoint (commonly abused)
  crit: suspicious
  conf: 0.85
  attack: T1071
  any:
  - id: replit-dev
  - id: repl-co
  - id: replit-id-domain
  unless:
  - id: metadata/library/qt
  - id: well-known/app/keepassxc/
  - id: well-known/app/tencent-codebuddy/
- id: tunnel-service
  desc: Contacts tunneling service endpoint
  crit: notable
  conf: 0.85
  attack: T1572
  any:
  - id: objectives/command-and-control/infrastructure/domain/tunnel/
  unless:
  - id: metadata/library/qt
  - id: well-known/app/keepassxc/
