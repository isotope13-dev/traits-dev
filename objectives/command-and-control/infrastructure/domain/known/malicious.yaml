defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: suspicious
  conf: 1.0
traits:
  - id: iterators-core-c2
    desc: C2 domain for iterators-core malware
    if:
      type: text
      substr: 425a2.33mail.ga
  - id: bootstrapcdn-fun-c2
    desc: C2 domain impersonating Bootstrap CDN
    if:
      type: text
      substr: start.bootstrapcdn.fun
