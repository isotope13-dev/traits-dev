defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1572
traits:
  - id: localtunnel-me
    desc: 'Localtunnel.me endpoint'
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: localtunnel.me
    unless:
      - type: basename
        regex: '(?i)\.(test|spec)\.[a-z0-9]+$'
  - id: localtunnel
    desc: 'Localtunnel endpoint'
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '[a-z0-9-]+\.loca\.lt'
    unless:
      - type: basename
        regex: '(?i)\.(test|spec)\.[a-z0-9]+$'
  - id: localhost-run
    desc: Localhost.run tunnel endpoint
    # Dual-use ingress/tunnel service like ngrok and trycloudflare below
    # (legitimately used to expose local web UIs from Colab/Kaggle). Keep at
    # the same notable capability level as those peers; malicious intent is
    # inferred by the reverse-shell/backdoor composites that reference it.
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '[a-z0-9-]+\.localhost\.run'
  - id: pinggy-io
    desc: Pinggy tunnel endpoint
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: ([a-z0-9-]{1,63}\.){0,3}pinggy\.(io|link)
  - id: cloudflare-tunnel
    desc: Cloudflare tunnel endpoint
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '[a-z0-9-]+\.trycloudflare\.com'
      not:
        - substr: api.trycloudflare.com
        - substr: github.com/cloudflare/cloudflared
    unless:
      - id: metadata/signed/developer::cloudflare
      - id: well-known/app/bobi/
  - id: ngrok-io-endpoint
    desc: Ngrok.io tunnel endpoint
    crit: notable
    conf: 0.7
    attack: T1071
    if:
      type: text
      regex: \b[a-z0-9]+\.ngrok\.io\b
    unless:
      - id: metadata/library/data/
      - id: metadata/package/testing/
      - id: metadata/library/qt
      - type: text
        regex: \b[a-z0-9]+\.ngrok\.io\b
        section: .rsrc
composite_rules:
  - id: ngrok-free-app-endpoint
    desc: Ngrok-free tunnel endpoint
    crit: notable
    conf: 0.7
    attack: T1071
    any:
      - id: objectives/exfiltration/oob/endpoint::ngrok-free
    unless:
      - id: metadata/package/testing/
      - id: metadata/package/config::wordpress-development-config-file

  - id: ngrok-tunnel
    desc: Contacts ngrok tunnel endpoint
    crit: notable
    conf: 0.9
    attack: T1071
    any:
      - id: ngrok-io-endpoint
      - id: ngrok-free-app-endpoint
    unless:
      - id: metadata/library/qt
