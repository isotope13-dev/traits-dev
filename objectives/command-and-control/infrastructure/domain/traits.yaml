  - id: h5-helloniubi-shop
    desc: h5.helloniubi.shop malicious C2 domain
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: h5.helloniubi.shop
  - id: appwrite-storage
    desc: Appwrite cloud storage (commonly abused)
    crit: suspicious
    conf: 0.85
    attack: T1105
    if:
      type: text
      regex: '[a-z0-9-]+\.cloud\.appwrite\.io/v[0-9]+/storage/buckets/[a-z0-9]+/files/'
  - id: supabase-storage
    desc: Supabase storage endpoint (can be abused)
    crit: notable
    conf: 0.75
    attack: T1105
    if:
      type: text
      regex: '[a-z0-9]+\.supabase\.co/storage/v[0-9]+/'
    not:
      - substr: xguihxuzqibwxjnimxev.supabase.co/storage/v1/
  - id: firebase-storage
    desc: Firebase storage endpoint (can be abused)
    crit: notable
    conf: 0.7
    attack: T1105
    if:
      type: text
      regex: firebasestorage\.googleapis\.com/v[0-9]+/b/[^/]{1,120}/o/
  - id: reversed-firebase-storage
    desc: Reversed Firebase storage endpoint
    crit: suspicious
    conf: 0.88
    attack: T1105
    for: [powershell, javascript, typescript, shell, batch]
    if:
      type: string_literal
      substr: moc.sipaelgoog.egarotsesaberif
  - id: reversed-myfirebase-host
    desc: Reversed myfirebase host
    crit: suspicious
    conf: 0.9
    attack: T1105
    for: [powershell, javascript, typescript, shell, batch]
    if:
      type: string_literal
      substr: moc.esabelifym
  - id: google-drive-download
    desc: Google Drive download link (payload delivery)
    crit: suspicious
    conf: 0.8
    attack: T1105
    not:
      - substr: "drive.google.com/uc?export=download&id="
      - substr: "/view?usp="
    if:
      type: text
      regex: drive\.google\.com/uc\?export=download&id=|drive\.usercontent\.google\.com/download
  - id: php-collect-dup
    desc: PHP collect endpoint
    crit: suspicious
    conf: 0.6
    attack: T1041
    if:
      type: text
      regex: /collect[_-]?(info|data|stats)?\.php
  - id: php-log-dup
    desc: PHP log endpoint
    crit: notable
    conf: 0.6
    attack: T1041
    if:
      type: text
      regex: /log[_-]?(info|data)?\.php
  - id: php-report-dup
    desc: PHP report endpoint
    crit: suspicious
    conf: 0.6
    attack: T1041
    if:
      type: text
      substr: /report.php
  - id: php-beacon-dup
    desc: PHP beacon endpoint
    crit: suspicious
    conf: 0.6
    attack: T1041
    if:
      type: text
      substr: /beacon.php
  - id: php-gate
    desc: PHP gate endpoint
    crit: suspicious
    conf: 0.6
    attack: T1041
    if:
      type: text
      substr: /gate.php
  - id: php-url
    desc: PHP URL endpoint (often used for C2)
    crit: notable
    conf: 0.75
    attack: T1071
    if:
      type: text
      regex: https?://[a-zA-Z0-9][-a-zA-Z0-9.]{1,120}(:[0-9]+)?/.{0,220}\.php([?#]|$)
    unless:
      - type: text
        substr: ShareX.UploadersLib
    not:
      - regex: (?i)sourceforge\.net
      - regex: (?i)vim\.org
      - regex: (?i)docs\.
      - regex: (?i)pypi\.org
      - regex: (?i)npmjs\.com
      - regex: (?i)github\.com
      - regex: (?i)khngai\.com/chinese/charmap
      - regex: (?i)facebook\.com
      - regex: (?i)twitter\.com
      - regex: (?i)linkedin\.com
      - regex: (?i)factordb\.com
      - regex: (?i)php\.net
      - regex: (?i)iobit\.com
      - regex: (?i)(^|[./])cd4o\.com
      - regex: (?i)driverbooster
      - regex: (?i)tools\.medialab\.sciences-po\.fr
      - regex: (?i)virtualbox\.org
      - regex: (?i)forums?\.
      - regex: (?i)bittorrent\.com
      - regex: (?i)utorrent\.com
      - regex: (?i)jrsoftware\.org
      - regex: (?i)(^|[./])sy\.guanjia\.qq\.com
      - regex: (?i)(^|[./])pcmgr\.wsd\.com
      - regex: (?i)pcgamingwiki\.com/api/appid\.php
    downgrade:
      any:
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
        - id: metadata/package::playnite-steam-plugin
  - id: aws-api-gateway
    desc: AWS API Gateway endpoint
    crit: notable
    conf: 0.5
    attack: T1071
    if:
      type: text
      regex: execute-api\.[a-z0-9-]+\.amazonaws\.com
    unless:
      - type: basename
        regex: (^|[\\/]).*_test\.go$
  - id: azure-websites
    desc: Azure Websites endpoint
    crit: notable
    conf: 0.5
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.azurewebsites\.net'
  - id: google-cloud-functions
    desc: Google Cloud Functions endpoint
    crit: notable
    conf: 0.5
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.cloudfunctions\.net'
  - id: vercel-app
    desc: Vercel app endpoint
    crit: notable
    conf: 0.5
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.vercel\.app'
  - id: netlify-app
    desc: Netlify app endpoint
    crit: notable
    conf: 0.5
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.netlify\.app'
  - id: ngrok-io-endpoint
    desc: Ngrok.io tunnel endpoint
    crit: notable
    conf: 0.7
    attack: T1071
    if:
      type: text
      regex: \b[a-z0-9]+\.ngrok\.io\b
    unless:
      - id: metadata/package::has-tests
      - type: text
        regex: \b[a-z0-9]+\.ngrok\.io\b
        section: .rsrc
  - id: ngrok-free-app-endpoint
    desc: Ngrok-free tunnel endpoint
    crit: notable
    conf: 0.7
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.ngrok-free\.(app|dev)'
    unless:
      - id: metadata/package::has-tests
  - id: vercel-serverless
    desc: Contacts Vercel serverless function (commonly abused)
    crit: notable
    conf: 0.85
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.vercel\.app(/|$)'
  - id: replit-dev
    desc: Replit.dev endpoint
    crit: notable
    conf: 0.6
    attack: T1071
    if:
      type: text
      regex: ([a-z0-9-]{1,63}\.){1,6}replit\.dev
    unless:
      - type: basename
        regex: (^|[\\/]).*_test\.go$
  - id: repl-co
    desc: Repl.co endpoint
    crit: notable
    conf: 0.6
    attack: T1071
    if:
      type: text
      regex: 'https?://([a-z0-9-]{1,63}\.){1,6}repl\.co([/?#: ]|$)'
    unless:
      - type: basename
        regex: (^|[\\/]).*_test\.go$
  - id: replit-id-domain
    desc: Replit ID endpoint (commonly abused)
    crit: suspicious
    conf: 0.85
    attack: T1071
    if:
      type: text
      regex: '[a-f0-9-]+\.id\.repl\.co'
  - id: glitch-hosted
    desc: Contacts Glitch-hosted endpoint
    crit: suspicious
    conf: 0.8
    attack: T1071
    unless:
      - id: metadata/package/testing/harness::is-test
      - type: text
        substr: "describe('first party sets'"
    if:
      type: text
      regex: '[a-z0-9-]+\.glitch\.me'
  - id: railway-hosted
    desc: Contacts Railway-hosted endpoint
    crit: notable
    conf: 0.75
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.railway\.app'
    unless:
      - type: basename
        regex: (^|[\\/]).*_test\.go$
  - id: render-hosted
    desc: Contacts Render-hosted endpoint
    crit: notable
    conf: 0.75
    attack: T1071
    if:
      type: text
      regex: '[a-f0-9-]{8,}\.onrender\.com'
  - id: heroku-hosted
    desc: Contacts Heroku-hosted endpoint
    crit: notable
    conf: 0.7
    attack: T1071
    if:
      type: text
      regex: '[a-z0-9-]+\.herokuapp\.com'
  - id: hardcoded-domain-ru
    desc: Hardcoded .ru domain
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: '[''\"](https?://)?([a-zA-Z0-9-]{1,63}\.){1,4}ru[''"/:]'
    unless:
      - type: basename
        regex: (^|[\\/]).*_test\.go$
    not:
      - regex: '[''\"]config\.ru[''\"]'
    downgrade:
      any:
        - type: raw
          regex: defmodule\s+Faker\.Internet\.|sampler\(:free_email_service
  - id: hardcoded-domain-cn
    desc: Hardcoded .cn domain
    crit: baseline
    conf: 0.6
    if:
      type: raw
      regex: '[''\"](https?://)?([a-zA-Z0-9-]{1,63}\.){1,4}cn[''"/:]'
    unless:
      - type: basename
        regex: (^|[\\/]).*_test\.go$
      - type: text
        substr: chinacloudapi.cn
      - type: raw
        substr: open.feishu.cn
  - id: hardcoded-domain-xyz
    desc: Hardcoded .xyz domain
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: '[''\"](https?://)?([a-zA-Z0-9-]{1,63}\.){1,4}xyz[''"/:]'
    unless:
      - type: basename
        regex: (^|[\\/]).*_test\.go$
    not:
      - substr: source.xyz
  - id: hardcoded-domain-sbs
    desc: Hardcoded .sbs domain (commonly abused)
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: '[''\"](https?://)?([a-zA-Z0-9-]{1,63}\.){1,4}sbs[''"/:]'
  - id: hardcoded-domain-top
    desc: Hardcoded .top domain
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: '[''\"](https?://)?([a-zA-Z0-9-]{1,63}\.){1,4}top[''"/:]'
    not:
      - substr: style.top
    unless:
      - type: basename
        regex: (^|[\\/]).*_test\.go$
  - id: suspicious-php-filename
    desc: Suspicious PHP endpoint URL (gate/upload/etc)
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: https?://[^/]{1,120}/.{0,120}(gate|cmd|shell|payload)\.php
    not:
      - substr: https://video.sibnet.ru/shell.php
  - id: internal-api-probe-local
    desc: Probes internal/localhost API endpoints
    crit: notable
    conf: 0.9
    attack: T1046
    if:
      type: text
      regex: http://(internal|localhost)[-a-zA-Z0-9.]*/(api|health|status)
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
  - id: internal-api-probe-10
    desc: Probes 10.x API endpoints
    crit: suspicious
    conf: 0.9
    attack: T1046
    if:
      type: text
      regex: http://10\.[-a-zA-Z0-9.]*/(api|health|status)
  - id: dynamic-dns-domain-pattern
    desc: Dynamic DNS domain pattern
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (^|[^@A-Za-z0-9._-])[a-zA-Z0-9][-a-zA-Z0-9]*\.(duckdns|no-ip|ddns|hopto)\.[a-z]{2,6}\b
    not:
      - regex: \b[a-z]{2,4}\.(ddns|hopto|duckdns|no-ip)\.
      - substr: slimxxxtubealn.ddns.name
      - regex: \b(slimxxxtube|tube8vids|xpornstars)[a-z]{3}\.ddns\.name\b
      - substr: webwidgetz.duckdns.org
    unless:
      - type: text
        regex: \b[a-zA-Z0-9][-a-zA-Z0-9]*\.(duckdns|no-ip|ddns|hopto)\.[a-z]{2,6}\b
        section: .rsrc
composite_rules:
  - id: internal-api-probe
    desc: Probes internal network API endpoints
    crit: notable
    conf: 0.9
    attack: T1046
    any:
      - id: internal-api-probe-local
      - id: internal-api-probe-10
  - id: hardcoded-domain-suspicious-pattern
    desc: Hardcoded suspicious TLD domain pattern
    crit: notable
    conf: 0.7
    any:
      - id: hardcoded-domain-ru
      - id: hardcoded-domain-cn
      - id: hardcoded-domain-xyz
      - id: hardcoded-domain-sbs
      - id: hardcoded-domain-top
  - id: c2-domain
    desc: Likely C2 domain (suspicious TLD)
    crit: notable
    conf: 0.85
    size_max: 5000
    any:
      - id: hardcoded-domain-suspicious-pattern
      - id: dynamic-dns-domain-pattern
  - id: php-collector-comp
    desc: Contacts PHP data collection endpoint
    crit: notable
    conf: 0.85
    attack: T1041
    any:
      - id: objectives/command-and-control/infrastructure/domain::php-collect-dup
      - id: objectives/command-and-control/infrastructure/domain::php-log-dup
      - id: objectives/command-and-control/infrastructure/domain::php-report-dup
      - id: objectives/command-and-control/infrastructure/domain::php-beacon-dup
      - id: php-gate
  - id: serverless-function
    desc: Contacts serverless function endpoint (Lambda, etc)
    crit: notable
    conf: 0.7
    attack: T1071
    any:
      - id: aws-api-gateway
      - id: azure-websites
      - id: google-cloud-functions
      - id: vercel-app
      - id: netlify-app
  - id: ngrok-tunnel
    desc: Contacts ngrok tunnel endpoint
    crit: notable
    conf: 0.9
    attack: T1071
    any:
      - id: ngrok-io-endpoint
      - id: ngrok-free-app-endpoint
  - id: replit-hosted
    desc: Contacts Replit-hosted endpoint (commonly abused)
    crit: suspicious
    conf: 0.85
    attack: T1071
    any:
      - id: replit-dev
      - id: repl-co
      - id: replit-id-domain
  - id: chisel-tunnel
    desc: Chisel reverse tunnel infrastructure
    crit: suspicious
    conf: 0.95
    attack: T1572
    any:
  - id: tunnel-service
    desc: Contacts tunneling service endpoint
    crit: suspicious
    conf: 0.85
    attack: T1572
    any:
      - id: objectives/command-and-control/infrastructure/
