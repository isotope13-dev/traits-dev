defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [python, javascript, powershell, pe, elf, macho]
  mbc: C0002
  attack: T1071.001
traits:
  - id: ipcheck-cloud
    desc: ipcheck.cloud malicious domain (C2/Dropper)
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: ipcheck.cloud
  - id: evilpacket-net
    desc: Evilpacket.net malicious domain
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: evilpacket.net
  - id: healdsburgdistricthospital-net
    desc: healdsburgdistricthospital.net malicious domain (Nemucod)
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: healdsburgdistricthospital.net
  - id: filioruters-com
    desc: filioruters.com malicious domain
    crit: suspicious
    conf: 1.0
    attack: T1105
    if:
      type: text
      substr: filioruters.com
  - id: anti-theft-web-heroku
    desc: Anti-theft-web.herokuapp.com malicious domain (phpass malware)
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: anti-theft-web.herokuapp.com
  - id: onion-domain
    desc: .onion domain reference
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)\b[a-z2-7]{16,56}\.onion\b
  - id: short-domain-url-pattern
    desc: Very short domain in URL
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: https?://[a-zA-Z0-9]{2,3}\.[a-zA-Z]{2,4}[/:]
    unless:
      - type: text
        substr: bit.ly/CRA-PWA
      - type: text
        substr: ShareX.UploadersLib
      - id: metadata/file/text::uproc-tools-catalog
    not:
      - substr: http://ehc.ac/
      - substr: http://eev.ee/
      - substr: http://ok.hu/
      - substr: ok.ru
      - substr: aka.ms/
      - substr: go.dev/
      - substr: go.microsoft.com/fwlink/
      - substr: gnu.org
      - substr: zgp.org/
      - substr: w3.org
      - substr: eff.org
      - substr: fsf.org
      - substr: iso.org
      - substr: osi.org
      - substr: ietf.org
      - substr: xml.org/
      - substr: hex.pm
      - substr: npm.io
      - substr: pypi.io
      - substr: hf.co/
      - substr: dvc.org/
      - substr: git.io
