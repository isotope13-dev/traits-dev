      - substr: lua.org/
      - substr: bun.sh
      - substr: deno.land
      - substr: foo.com/
      - substr: bar.com/
      - substr: baz.com/
      - substr: qux.com/
      - substr: foo.bar/
      - regex: \.(home|local|internal|localhost|lan|test|example|invalid)[\s:/]
  - id: http-url-binary
    desc: Network URL with domain name (binary)
    crit: notable
    conf: 0.7
    for:
      - binaries
    size_max: 1000000
    if:
      type: text
