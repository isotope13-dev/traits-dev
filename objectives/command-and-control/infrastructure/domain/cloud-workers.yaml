# Cloudflare Workers C2 Infrastructure
# Cloudflare Workers (*.workers.dev) increasingly abused for C2
# because it provides free HTTPS hosting that blends with CDN traffic.
# SloppyLemming campaign uses workers.dev for all C2 and delivery.
defaults:
  for: [binaries, scripts, source]
  platforms: [unix, windows]
  attack: T1583.006
  mbc: B0030
traits:
  - id: workers-dev-domain
    desc: Cloudflare Workers domain reference
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: .workers.dev
  - id: workers-dev-gov-impersonation
    desc: Cloudflare Workers domain impersonating government
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: \w+-gov-\w+\.workers\.dev
  - id: workers-dev-url
    desc: HTTPS URL pointing to Cloudflare Workers
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: https?://[\w.-]+\.workers\.dev/
composite_rules:
  - id: workers-dev-c2
    desc: Cloudflare Workers used as C2 infrastructure
    crit: suspicious
    conf: 0.9
    all:
      - id: workers-dev-domain
    any:
      - id: micro-behaviors/communications/http/client/
      - id: micro-behaviors/communications/http/post/
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
