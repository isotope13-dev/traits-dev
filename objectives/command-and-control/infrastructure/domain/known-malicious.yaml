# Known Malicious Domains
# Detects hardcoded domains associated with specific malware campaigns
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
  crit: suspicious
  conf: 1.0
traits:
  - id: iterators-core-c2
    desc: C2 domain for iterators-core malware
    if:
      type: string
      substr: "425a2.33mail.ga"
