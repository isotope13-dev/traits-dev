# VX (Virus Exchange) Community Infrastructure
# Known domains used by virus writing groups
defaults:
  crit: suspicious
  for: [scripts, binaries, source]
  platforms: [unix, windows, macos]
traits:
  - id: vx-netlux
    desc: VX community hosting domain
    conf: 0.95
    if:
      type: raw
      substr: "vx.netlux.org"
  - id: rrlf-domain
    desc: rRlf virus writing group domain
    conf: 0.90
    if:
      type: raw
      substr: "rRlf.de"
      case_insensitive: true
