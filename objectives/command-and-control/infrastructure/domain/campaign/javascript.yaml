defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  mbc: C0002
  attack: T1071.001
traits:
  - id: rsnd-convertyfileapp-com
    desc: rsnd.convertyfileapp.com malicious domain
    crit: suspicious
    conf: 1.0
    if:
      type: string_literal
      word: rsnd.convertyfileapp.com
  - id: mediu-idbroker-c2-domain
    desc: mediu-idbroker launcher C2 domain
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: api.mediu-idbroker.com
  - id: mediu-idbroker-notify-endpoint
    desc: mediu-idbroker telemetry endpoint
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: api.mediu-idbroker.com/launcher-notify.php
  - id: mediu-idbroker-config-endpoint
    desc: mediu-idbroker config endpoint
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: api.mediu-idbroker.com/launcher-config.php

composite_rules:
  - id: mediu-idbroker-launcher-c2
    desc: mediu-idbroker launcher C2 endpoints
    crit: hostile
    conf: 1.0
    all:
      - id: mediu-idbroker-notify-endpoint
      - id: mediu-idbroker-config-endpoint
