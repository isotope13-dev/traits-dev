defaults:
  platforms: [windows]
  for: [pe, dll]
  mbc: C0002
  attack: T1071.001

traits:
  - id: downthat-script-reporting
    desc: downthat status callback domain
    crit: suspicious
    conf: 1.0
    if:
      type: text
      word: bi.downthat.com
  - id: secdls-api-config
    desc: secdls API config endpoint
    crit: suspicious
    conf: 0.99
    size_min: 300000
    size_max: 900000
    if:
      type: encoded
      substr: http://api.v2.secdls.com/index.php/api
  - id: paleokits-static-config
    desc: paleokits static config endpoint
    crit: suspicious
    conf: 0.99
    size_min: 300000
    size_max: 900000
    if:
      type: encoded
      substr: http://staticrr.paleokits.net/
  - id: aquiempieza-payload-tag
    desc: AquiEmpiezaElPayload overlay tag
    crit: suspicious
    conf: 0.995
    size_min: 300000
    size_max: 900000
    if:
      type: encoded
      substr: </AquiEmpiezaElPayload>
