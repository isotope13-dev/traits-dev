defaults:
  platforms: [windows]
  for: [pe]
  mbc: C0002
  attack: T1071.001

traits:
  - id: downthat-script-reporting
    desc: downthat status callback domain
    crit: suspicious
    conf: 1.0
    if:
      type: text
      word: bi.downthat.com
  - id: samplogger-ru
    desc: samplogger.ru C2 domain
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: samplogger.ru
  - id: samplogger-php-endpoint
    desc: samplogger tokenized PHP endpoint
    crit: suspicious
    conf: 1.0
    if:
      type: text
      exact: http://samplogger.ru/0sfdSMfs8FdffkhjiKlee8q18.php?data=
  - id: gtasteal-pdb
    desc: gtasteal developer PDB path
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: '\gtasteal\Release\gtasteal.pdb'
  - id: gtasteal-dll
    desc: gtasteal DLL artifact name
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: gtasteal.dll
  - id: radmir-parser-devpath
    desc: radmir parser developer path
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: '\crmplogger_universal\radmir_parser215\dllfunc.cpp'
