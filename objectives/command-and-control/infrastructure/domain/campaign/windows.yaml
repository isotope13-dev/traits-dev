defaults:
  platforms: [windows]
  for: [pe]
  mbc: C0002
  attack: T1071.001

traits:
  - id: downthat-script-reporting
    desc: downthat status callback domain
    crit: suspicious
    conf: 1.0
    if:
      type: text
      word: bi.downthat.com
  - id: samplogger-ru
    desc: samplogger.ru C2 domain
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: samplogger.ru
  - id: gtasteal-pdb
    desc: gtasteal developer PDB path
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: '\gtasteal\Release\gtasteal.pdb'
