defaults:
  crit: suspicious
  attack: T1071.001
  mbc: B0030
  for:
    - python
    - shell
    - javascript
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: webhostapp-domain
    desc: 000webhostapp domain
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: 000webhostapp\.com
  - id: webhostapp-http
    desc: 000webhost HTTP endpoint
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: 000webhostapp.{0,50}http|http.{0,50}000webhostapp
  - id: free-webhost-domain
    desc: Free webhosting domain
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: (freehostia|byethost|000webhost|infinityfree)\.
  - id: free-webhost-c2-url
    desc: Free webhost C2 URL
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: (freehost|byethost|000webhost).{0,50}:[0-9]+
  - id: cloudflare-pages
    desc: Cloudflare Pages domain
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: \.pages\.dev
  - id: github-pages
    desc: GitHub Pages hosting domain
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: .github.io
composite_rules:
  - id: free-webhost-c2-channel
    desc: Free webhosting C2 channel
    crit: suspicious
    conf: 0.9
    platforms:
      - unix
      - windows
    any:
      - id: webhostapp-domain
      - id: free-webhost-domain
      - id: free-webhost-c2-url
      - id: github-pages
