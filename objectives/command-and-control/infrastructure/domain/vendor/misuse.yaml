defaults:
  attack: T1071.001
  mbc: C0002
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: tencent-infrastructure-misuse
    desc: Tencent domain used on port 8080
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (?i)(crash\.browser\.qq\.com|qbwupacc\.imtt\.qq\.com):8080
  - id: alibaba-infrastructure
    desc: Alibaba domain
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: 5334.com
  - id: generic-vendor-port-8080
    desc: Vendor subdomain on port 8080
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)\b(update|crash|api)\.[\w-]+\.(qq|microsoft)\.com:8080\b
  - id: generic-vendor-port-8443
    desc: Vendor subdomain on port 8443
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)\b(update|crash|api)\.[\w-]+\.(qq|microsoft)\.com:8443\b
composite_rules:
  - id: generic-vendor-port-misuse
    desc: Vendor subdomain on non-standard port
    crit: notable
    conf: 0.7
    any:
      - id: generic-vendor-port-8080
      - id: generic-vendor-port-8443
