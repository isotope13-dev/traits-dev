# Newer commercial TLDs (.space, .icu, .click, .pw) that are heavily
# abused for malware delivery and C2 due to cheap registration and
# permissive registrars. Aggregated into the parent
# objectives/command-and-control/infrastructure/domain/tld::suspicious-tld
# composite for downstream consumers.
defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: component
  attack: T1071
traits:
  - id: tld-space
    desc: URL with .space TLD (commonly abused)
    conf: 0.78
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.space([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
      - substr: admx.help
      - substr: hub.docker.com
    unless:
      - id: micro-behaviors/communications/http/services/blockchain::mempool-space-endpoint
  - id: tld-icu
    desc: URL with .icu TLD (commonly abused)
    conf: 0.85
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.icu([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-click
    desc: URL with .click TLD (commonly abused)
    conf: 0.82
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.click([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-pw
    desc: URL with .pw TLD (commonly abused)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.pw([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-shop
    desc: URL with .shop TLD (commonly abused)
    conf: 0.78
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.shop([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-vip
    desc: URL with .vip TLD (commonly abused)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.vip([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-cyou
    desc: URL with .cyou TLD (commonly abused)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.cyou([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-help
    desc: URL with .help TLD (commonly abused)
    conf: 0.76
    if:
      # Restrict source matches to URL literals.  A documentation comment
      # linking to a vendor's .help site is not an endpoint used by the code.
      type: literal
      kind: string
      regex: https?://[A-Za-z0-9.-]{1,120}\.help([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
      - substr: admx.help
