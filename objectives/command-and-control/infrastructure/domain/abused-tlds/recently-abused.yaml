# Newer commercial TLDs (.space, .icu, .click, .pw) that are heavily
# abused for malware delivery and C2 due to cheap registration and
# permissive registrars. Aggregated into the parent
# objectives/command-and-control/infrastructure/domain::suspicious-tld
# composite for downstream consumers.
defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: suspicious
  attack: T1071
traits:
  - id: tld-space
    desc: URL with .space TLD (commonly abused)
    conf: 0.78
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.space([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
      - substr: hub.docker.com
  - id: tld-icu
    desc: URL with .icu TLD (commonly abused)
    conf: 0.85
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.icu([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-click
    desc: URL with .click TLD (commonly abused)
    conf: 0.82
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.click([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
  - id: tld-pw
    desc: URL with .pw TLD (commonly abused)
    conf: 0.8
    if:
      type: text
      regex: https?://[A-Za-z0-9.-]{1,120}\.pw([:/?#\s"'<>]|$)
    not:
      - regex: ^\s*#
      - regex: ^\s*//
