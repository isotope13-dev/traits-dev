defaults:
  for:
    - all
traits:
  - id: ipv4-port-string
    desc: IPv4 address with port number string
    crit: notable
    for: [elf, pe, macho]
    unless:
      - type: raw
        regex: require\(['"]\.\./common['"]\)
      - type: raw
        regex: function test\s*\(\)\s*\{
    if:
      type: string
      regex: \d{1,3}(\.\d{1,3}){3}:[0-9]{1,5}
      external_ip: true
    downgrade:
      any:
        - type: metrics
          field: binary.section_count
          max: 4
        - type: metrics
          field: binary.function_count
          max: 0
        - type: metrics
          field: binary.import_count
          min: 200
composite_rules: []
