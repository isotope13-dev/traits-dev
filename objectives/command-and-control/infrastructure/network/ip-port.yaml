defaults:
  platforms: [linux, unix, android, windows, macos, ios]
  for: [binaries, scripts, source]
traits:
  - id: ipv4-port-string
    desc: IPv4 address with port number string
    crit: notable
    for: [elf, pe, macho]
    count_min: 2
    unless:
      - type: raw
        regex: require\(['"]\.\./common['"]\)
      - type: raw
        regex: function test\s*\(\)\s*\{
      - id: metadata/format/pe::resource-only-dll
    if:
      type: raw
      regex: \d{1,3}(\.\d{1,3}){3}:[0-9]{1,5}
      external_ip: true
    downgrade:
      any:
        - type: metrics
          field: binary.section_count
          max: 4
        # Versioned, high-import vendor binaries often include endpoint-like literals
        # that are not C2 indicators by themselves.
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/signed/platform::microsoft
composite_rules: []
