defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.8
traits:
  - id: fragmented-url-scheme
    desc: Fragmented URL scheme string (e.g., "https:/")
    unless:
      - type: metrics
        field: binary.import_count
        min: 30
    if:
      type: string_value
      regex: ^(https?:/|ftp:/|sftp:/)$
      case_insensitive: true
