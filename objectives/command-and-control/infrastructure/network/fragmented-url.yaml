defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.8
traits:
  - id: fragmented-url-scheme
    desc: Fragmented URL scheme string (e.g., "https:/")
    unless:
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/package/tooling::webpack-bundled
      - type: metrics
        field: imports.count
        min: 30
      - type: raw
        regex: url_prefix\s*=\s*url\s*\|\|\s*['"]https?:/['"]
      - type: basename
        regex: (_spec|_test)\.rb$
    if:
      type: text
      regex: ^(https?:/|ftp:/|sftp:/)$
      case_insensitive: true
