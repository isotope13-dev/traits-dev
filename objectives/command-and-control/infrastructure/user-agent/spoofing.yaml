    desc: Mirai botnet HTTP client spoofing
    crit: hostile
    conf: 0.95
    mbc: B0030
    all:
      - id: objectives/evasion/masquerade/identity/user-agent::xor-user-agent-spoofing
      - id: micro-behaviors/communications/http/client/
