defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, javascript, batch, powershell, shell]
  crit: suspicious
  conf: 0.9
  attack: T1071
traits:
  - id: analyst-server-reference
    desc: References "analyst server" (malware C2 indicator)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "analyst server"
      case_insensitive: true
    mbc: E1101
