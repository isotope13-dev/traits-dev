defaults:
  platforms: [windows]
  for: [scripts, javascript, batch, powershell, shell]
  crit: suspicious
  conf: 0.9
  attack: T1071
traits:
  - id: analyst-server-reference
    desc: References "analyst server" (malware C2 indicator)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(["''`]|=\s*)analyst server(["''`]|[\s,;)}\]])'
      case_insensitive: true
    not:
      - substr: Network Analyst Server
    mbc: E1101
