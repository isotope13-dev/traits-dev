# Cross-language DNS TXT tasking. Each composite requires a response-capture
# operation and a dynamic execution sink in the same short source region.
# A lookup alone remains a neutral DNS capability.
defaults:
  platforms: [windows, unix]
  attack: T1071.004
  mbc: B0030

composite_rules:
  - id: python-dns-txt-code-exec
    desc: Python executes DNS TXT response
    for: [python]
    crit: hostile
    conf: 0.98
    near_lines: 20
    all:
      - id: micro-behaviors/communications/dns/lookup/txt::python-dns-txt-response-capture
    any:
      - id: micro-behaviors/process/interpreter/python::exec-variable
      - id: micro-behaviors/process/interpreter/python::eval-builtin

  - id: node-dns-txt-code-exec
    desc: Node.js executes DNS TXT response
    for: [javascript, typescript]
    crit: hostile
    conf: 0.98
    near_lines: 20
    all:
      - id: micro-behaviors/communications/dns/lookup/txt::node-resolve-txt-response-capture
    any:
      - id: micro-behaviors/process/interpreter/eval::js-eval-variable-argument
      - id: micro-behaviors/process/interpreter/eval::js-new-function-variable-argument
      - id: micro-behaviors/process/interpreter/eval::js-indirect-eval-variable

  - id: ruby-dns-txt-code-exec
    desc: Ruby executes DNS TXT response
    for: [ruby]
    crit: hostile
    conf: 0.98
    near_lines: 20
    all:
      - id: micro-behaviors/communications/dns/lookup/txt::ruby-dns-txt-response-capture
      - id: micro-behaviors/process/interpreter/eval::ruby-eval

  - id: php-dns-txt-code-exec
    desc: PHP executes DNS TXT response
    for: [php]
    crit: hostile
    conf: 0.98
    near_lines: 20
    all:
      - id: micro-behaviors/communications/dns/lookup/txt::php-dns-txt-response-capture
      - id: micro-behaviors/process/interpreter/eval::eval-symbol

  - id: perl-dns-txt-code-exec
    desc: Perl executes DNS TXT response
    for: [perl]
    crit: hostile
    conf: 0.98
    near_lines: 20
    all:
      - id: micro-behaviors/communications/dns/lookup/txt::perl-dns-txt-response-capture
      - id: micro-behaviors/process/interpreter/eval::perl-eval-variable

  - id: shell-dns-txt-code-exec
    desc: Shell executes DNS TXT response
    for: [shell]
    crit: hostile
    conf: 0.98
    near_lines: 20
    all:
      - id: micro-behaviors/communications/dns/lookup/txt::shell-dns-txt-response-capture
      - id: micro-behaviors/process/interpreter/eval::shell-eval
