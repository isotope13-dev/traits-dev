defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: hex-tostring-call
    desc: Hex toString call
    crit: component
    conf: 0.82
    if:
      type: text
      substr: toString(16)
  - id: hex-path-p-wrapping
    desc: Wraps encoded path chunks with 'p' characters
    crit: component
    if:
      type: tree-sitter
      language: javascript
      query: "((assignment_expression\n  left: (identifier) @str\n  right: (binary_expression\n    left: (call_expression\n      function: (member_expression\n        object: (identifier) @str2\n        property: (property_identifier) @slice\n      )\n      arguments: (arguments\n        (number)\n        (unary_expression\n          operator: \"-\"\n          argument: (number)\n        )\n      )\n    )\n    operator: \"+\"\n    right: (string (string_fragment) @p)\n  )\n)\n(#eq? @str @str2)\n(#eq? @slice \"slice\")\n(#eq? @p \"p\"))\n"
composite_rules:
  - id: hex-path-chunk-split
    desc: Splits path into chunks for hex encoding
    crit: component
    conf: 0.9
    near_bytes: 1000
    all:
      - id: micro-behaviors/data/string/split::js-split-call
      - id: hex-tostring-call
      - id: hex-path-p-wrapping
