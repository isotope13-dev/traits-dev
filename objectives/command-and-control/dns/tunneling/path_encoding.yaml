defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: hex-tostring-call
    desc: Hex toString call
    crit: component
    conf: 0.82
    if:
      type: text
      substr: toString(16)
  - id: hex-path-p-wrapping
    desc: Wraps encoded path chunks with 'p' characters
    crit: component
    if:
      type: tree-sitter
      language: javascript
      kind: assignment
      regex: '\.slice\s*\(\s*[0-9]+\s*,\s*-[0-9]+\s*\)\s*\+\s*["'']p["'']'
composite_rules:
  - id: hex-path-chunk-split
    desc: Splits path into chunks for hex encoding
    crit: notable
    conf: 0.9
    near_bytes: 1000
    all:
      - id: micro-behaviors/data/string/split::js-split-call
      - id: hex-tostring-call
      - id: hex-path-p-wrapping
