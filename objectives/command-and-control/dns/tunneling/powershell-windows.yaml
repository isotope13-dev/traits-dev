defaults:
  platforms: [windows]
  for: [powershell, html]
  attack: T1071.004
  mbc: B0030

composite_rules:
  - id: powershell-dns-txt-command-exec
    desc: PowerShell executes DNS TXT response
    crit: hostile
    conf: 0.98
    near_bytes: 1024
    all:
      - id: micro-behaviors/communications/dns/lookup/txt::powershell-nslookup-txt-capture
      - id: micro-behaviors/process/interpreter/eval::embedded-powershell-iex-alias

  - id: powershell-explicit-resolver-dns-txt-exec
    desc: PowerShell executes TXT from explicit resolver
    crit: hostile
    conf: 0.99
    near_bytes: 1024
    all:
      - id: powershell-dns-txt-command-exec
      - id: micro-behaviors/communications/dns/lookup/txt::nslookup-txt-explicit-resolver

  - id: powershell-reconstructed-host-dns-txt-exec
    desc: PowerShell reconstructs DNS tasking hostname
    crit: hostile
    conf: 0.98
    near_bytes: 1024
    all:
      - id: powershell-dns-txt-command-exec
      - id: micro-behaviors/data/string/concat::powershell-string-join

  - id: powershell-dns-txt-double-eval
    desc: PowerShell twice evaluates DNS TXT response
    crit: hostile
    conf: 0.99
    near_bytes: 1024
    all:
      - id: powershell-dns-txt-command-exec
      - id: micro-behaviors/process/interpreter/eval::embedded-powershell-chained-iex
