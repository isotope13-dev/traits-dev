defaults:
  platforms: [routeros, appliance, unix]
  for: [objc, elf]
  attack: T1071.004

traits:
  - id: objc-dns-command-label
    desc: ObjC DNS command label
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "cmd-%ld"

  - id: objc-dns-beacon-label
    desc: ObjC DNS beacon label
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "beacon-%s"

composite_rules:
  - id: objc-resolver-dns-c2
    desc: ObjC resolver DNS C2
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/dns/lookup/native::lookup-res-query
      - id: micro-behaviors/communications/dns/lookup/txt::ns-t-txt-constant
      - id: objc-dns-command-label
      - id: objc-dns-beacon-label
