defaults:
  platforms: [ios, unix, windows]
  for: [java, class]
  attack: T1071.004

traits:
  - id: java-dns-c2-method
    desc: Java DNS C2 method
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: commandAndControlViaDns

  - id: java-dns-tunnel-label
    desc: Java tunnel label
    crit: component
    conf: 0.9
    if:
      type: text
      substr: tunnel

  - id: jvm-dns-c2-method
    desc: JVM DNS C2 method
    crit: suspicious
    conf: 0.9
    for: [class]
    if:
      type: hex
      pattern: 63 6F 6D 6D 61 6E 64 41 6E 64 43 6F 6E 74 72 6F 6C 56 69 61 44 6E 73

  - id: jvm-dns-getallbyname
    desc: JVM DNS getAllByName call
    crit: component
    conf: 0.9
    for: [class]
    if:
      type: hex
      pattern: 67 65 74 41 6C 6C 42 79 4E 61 6D 65

  - id: jvm-dns-tunnel-label
    desc: JVM tunnel label
    crit: component
    conf: 0.9
    for: [class]
    if:
      type: hex
      pattern: 74 75 6E 6E 65 6C

composite_rules:
  - id: java-ios-dns-c2
    desc: Java iOS DNS C2
    crit: hostile
    conf: 0.97
    all:
      - id: java-dns-c2-method
      - id: java-dns-tunnel-label

  - id: jvm-ios-dns-c2
    desc: JVM iOS DNS C2
    crit: hostile
    conf: 0.97
    all:
      - id: jvm-dns-c2-method
      - id: jvm-dns-getallbyname
      - id: jvm-dns-tunnel-label
