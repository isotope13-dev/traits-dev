defaults:
  platforms: [qnx]
  for: [elf]
  attack: T1071.004

traits:
  - id: qnx-zig-elf-dns-response-type
    desc: QNX Zig ELF DNS response type
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/binary/linking/static::ld-linux-interp
    if:
      type: text
      substr: Io.net.HostName.DnsResponse

  - id: qnx-zig-elf-socket-receive
    desc: QNX Zig ELF socket receive
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/binary/linking/static::ld-linux-interp
    if:
      type: text
      substr: Io.net.Socket.receiveManyTimeout

  - id: qnx-zig-elf-net-send-symbol
    desc: QNX Zig ELF net send symbol
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/binary/linking/static::ld-linux-interp
    if:
      type: text
      substr: Io.Threaded.netSendPosix

composite_rules:
  - id: qnx-zig-elf-dns-c2-channel
    desc: QNX Zig ELF DNS C2 channel
    crit: hostile
    conf: 0.96
    all:
      - id: qnx-zig-elf-dns-response-type
      - id: qnx-zig-elf-socket-receive
      - id: qnx-zig-elf-net-send-symbol
