defaults:
  platforms: [qnx, unix]
  for: [objc]
  attack: T1071.004

traits:
  - id: qnx-objc-dns-label-hex
    desc: QNX ObjC DNS label hex
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: hex_encode((const uint8_t *)(data + offset)

  - id: qnx-objc-dns-txt-query
    desc: QNX ObjC DNS TXT query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: QTYPE=TXT

  - id: qnx-objc-dns-c2-exfil
    desc: QNX ObjC DNS C2 exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: dns_c2_exfil

composite_rules:
  - id: qnx-objc-dns-c2-tunnel
    desc: QNX ObjC DNS C2 tunnel
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-objc-dns-label-hex
      - id: qnx-objc-dns-txt-query
      - id: qnx-objc-dns-c2-exfil
