defaults:
  platforms: [openbsd, bsd, unix]
  for: [kotlin, class]
  attack: T1071.004

traits:
  - id: kotlin-dns-txt-query
    desc: Kotlin builds DNS TXT query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: dnsBuildTxtQuery

  - id: kotlin-dns-command-exec
    desc: Kotlin executes DNS command
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: dnsExecute(cmd

composite_rules:
  - id: kotlin-dns-txt-command-channel
    desc: Kotlin DNS TXT command channel
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-dns-txt-query
      - id: kotlin-dns-command-exec
      - id: micro-behaviors/fs/path/config/system::config-resolv
    unless:
      - id: well-known/tool/development/stoobly-agent/
      - id: metadata/package/files/system-package::os-info-documentation
      # Files with an unknown source extension can be heuristically parsed as
      # Kotlin by the generic source walker. A Nix module is not Kotlin.
      - id: metadata/file/extension/identity::nix-source-extension
