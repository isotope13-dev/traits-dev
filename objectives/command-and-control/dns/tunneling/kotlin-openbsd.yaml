defaults:
  platforms: [openbsd, bsd, unix]
  for: [kotlin, class]
  attack: T1071.004

traits:
  - id: kotlin-dns-txt-query
    desc: Kotlin builds DNS TXT query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: dnsBuildTxtQuery

  - id: kotlin-dns-command-exec
    desc: Kotlin executes DNS command
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: dnsExecute(cmd

  - id: kotlin-dns-resolver-read
    desc: Kotlin reads DNS resolver
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /etc/resolv.conf
    unless:
      - id: well-known/tool/development/stoobly-agent::stoobly-agent-context

composite_rules:
  - id: kotlin-dns-txt-command-channel
    desc: Kotlin DNS TXT command channel
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-dns-txt-query
      - id: kotlin-dns-command-exec
      - id: kotlin-dns-resolver-read
