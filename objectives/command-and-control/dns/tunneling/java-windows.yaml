defaults:
  platforms: [windows]
  for: [java, class, java_class, jar]
  attack: T1071.004

traits:
  - id: java-dns-beacon-label
    desc: Java DNS beacon label
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: beacon

  - id: java-dns-task-label
    desc: Java DNS task label
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '"(cmd|tasks)"|cmd\.'

  - id: java-dns-data-label
    desc: Java DNS data label
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '"data"|''data''|\.data\b|data\.'

  - id: java-raw-dns-tcp-port
    desc: Java raw DNS TCP socket
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'new\s+Socket\s*\([^;\n]{0,180},\s*53\s*\)'

  - id: jvm-dns-c2-label-set
    desc: JVM DNS C2 label set
    crit: suspicious
    conf: 0.92
    for: [class, java_class, jar]
    if:
      type: raw
      regex: 'beacon[\s\S]{0,120}(cmd|tasks)[\s\S]{0,120}data'

  - id: jvm-build-dns-query-method
    desc: JVM buildDnsQuery method
    crit: suspicious
    conf: 0.9
    for: [class, java_class, jar]
    if:
      type: text
      substr: buildDnsQuery

composite_rules:
  - id: java-dns-c2-subdomain-beacon
    desc: Java DNS C2 subdomain beacon
    crit: hostile
    conf: 0.98
    for: [java]
    all:
      - id: java-dns-beacon-label
      - id: java-dns-task-label
      - id: java-dns-data-label
    any:
      - id: micro-behaviors/communications/dns/lookup/resolver::jvm-inetaddress-getbyname-source
      - id: micro-behaviors/communications/dns/lookup/resolver::jvm-inetaddress-getallbyname-source

  - id: java-raw-dns-c2-socket
    desc: Java raw DNS C2 socket
    crit: hostile
    conf: 0.98
    for: [java]
    all:
      - id: java-raw-dns-tcp-port
      - id: java-dns-beacon-label
      - id: java-dns-task-label
      - id: java-dns-data-label

  - id: jvm-bytecode-dns-c2-beacon
    desc: JVM bytecode DNS C2 beacon
    crit: hostile
    conf: 0.97
    for: [class, java_class, jar]
    all:
      - id: jvm-dns-c2-label-set
    any:
      - id: micro-behaviors/communications/dns/lookup/resolver::jvm-inetaddress-getbyname-bytecode
      - id: micro-behaviors/communications/dns/lookup/resolver::jvm-inetaddress-getallbyname-bytecode
      - id: jvm-build-dns-query-method
