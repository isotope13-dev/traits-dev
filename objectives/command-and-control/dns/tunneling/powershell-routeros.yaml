defaults:
  platforms: [routeros, appliance, windows]
  for: [powershell]
  attack: T1071.004

traits:
  - id: ps-dns-c2-query-domain
    desc: PS DNS C2 query domain
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: $queryDomain

  - id: ps-dns-exfil-chunk-label
    desc: PS DNS exfil chunk label
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "exfil.$chunk.$SessionId"

  - id: ps-dns-label-base64-clean
    desc: PS DNS label base64 cleanup
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ToBase64String\(\$bytes\) -replace .\[\+\/=\].'

  - id: ps-dns-label-chunk-size
    desc: PS DNS label chunk size
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ".{1,63}"

composite_rules:
  - id: ps-routeros-dns-c2-exfil
    desc: PS RouterOS DNS C2 exfil
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/network/dns::resolve-dns-name
      - id: objectives/command-and-control/channel/tunnel/dns::dns-txt-query-flag
      - id: ps-dns-c2-query-domain
      - id: ps-dns-exfil-chunk-label
      - id: ps-dns-label-base64-clean
      - id: ps-dns-label-chunk-size
