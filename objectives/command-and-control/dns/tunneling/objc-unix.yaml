defaults:
  platforms: [unix]
  for: [objc, elf]
  attack: T1071.004

traits:
  - id: objc-dns-txt-wire-query
    desc: ObjC builds DNS TXT query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'QTYPE = TXT[\s\S]{0,160}QCLASS = IN'

  - id: objc-dns-c2-label
    desc: ObjC DNS C2 label
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: _c2.%s

  - id: objc-dns-udp-sendto
    desc: ObjC sends UDP DNS packet
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sendto(sd, pkt

  - id: objc-dns-hex-chunk-exfil
    desc: ObjC DNS hex chunk exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'hexEncode[\s\S]{0,360}d%04zx\.%s'

composite_rules:
  - id: objc-dns-txt-c2-query
    desc: ObjC DNS TXT C2 query
    crit: hostile
    conf: 0.98
    all:
      - id: objc-dns-txt-wire-query
      - id: objc-dns-c2-label
      - id: objc-dns-udp-sendto

  - id: objc-dns-txt-data-exfil
    desc: ObjC DNS TXT data exfil
    crit: hostile
    conf: 0.98
    all:
      - id: objc-dns-txt-wire-query
      - id: objc-dns-udp-sendto
      - id: objc-dns-hex-chunk-exfil
