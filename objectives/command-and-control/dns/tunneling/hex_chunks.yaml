defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [javascript]
traits:
  - id: hex-chunk-concat-loop
    desc: Hex chunk concatenation loop
    crit: suspicious
    if:
      type: ast
      language: javascript
      query: "(assignment_expression\n  left: (identifier) @str\n  right: (binary_expression\n    left: (binary_expression\n      left: (identifier) @str2\n      operator: \"+\"\n      right: (call_expression\n        function: (identifier) @func\n      )\n    )\n    operator: \"+\"\n    right: (string (string_fragment) @dot)\n  )\n)\n(#eq? @dot \".\")\n(#match? @func \"(?i)hex\")\n(#eq? @str @str2)\n"
