defaults:
  platforms: [windows, unix]
  for: [javascript]
traits:
  - id: hex-encoded-dot-label
    desc: Hex conversion followed by dot label
    crit: suspicious
    if:
      type: text
      regex: "(?i)\\b[a-z_]*hex[a-z_]*\\([^)]{0,80}\\)\\s*\\+\\s*['\"]\\.['\"]"
    unless:
      - id: metadata/library/structure/
      - id: metadata/build/bundler/
      - id: well-known/app/bitwarden::bitwarden-browser-extension
    not:
      - regex: 'generateRandomCustomElementName|hyphenIndices|generateRandomChars'
