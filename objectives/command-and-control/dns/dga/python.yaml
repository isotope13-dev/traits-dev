defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
  attack: T1568.002
  mbc: B0031
traits:
  - id: generate-domain-func
    desc: Domain generation function name
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: generate.?domain
composite_rules:
  - id: dga-python
    desc: Domain generation algorithm
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/import/python::hashlib
      - id: generate-domain-func
