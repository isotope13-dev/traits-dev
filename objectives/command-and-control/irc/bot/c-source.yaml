defaults:
  platforms: [windows, linux, unix, macos]
  for: [c, cpp]
traits:
  - id: privmsg
    desc: IRC PRIVMSG command string
    crit: notable
    conf: 0.9
    if:
      type: string
      exact: "PRIVMSG"
  - id: nick-user
    desc: IRC NICK USER registration format
    crit: notable
    conf: 0.95
    if:
      type: raw
      regex: 'NICK %s\\r\\n"\s*"USER %s [^\\r\\n"]{1,32}:[^\\r\\n"]{1,32}\\r\\n'
  - id: nick-format
    desc: IRC NICK registration command
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "NICK %s"
  - id: user-registration
    desc: IRC USER registration command
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "USER %s"
  - id: join-channel
    desc: IRC JOIN with channel key
    crit: notable
    conf: 0.95
    if:
      type: raw
      regex: 'JOIN %s\s+:?%s\\r\\n'
  - id: join-simple
    desc: IRC JOIN channel command
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "JOIN %s"
  - id: pong-keepalive
    desc: IRC PONG keepalive format
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "PONG %s"
  - id: userhost-lookup
    desc: IRC USERHOST lookup command
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: 'USERHOST %s\\r\\n'
  - id: kick-command
    desc: IRC KICK command in source
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "KICK %s"
  - id: mode-command
    desc: IRC MODE command in source
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "MODE %s"
  - id: topic-command
    desc: IRC TOPIC command in source
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "TOPIC %s"
  - id: notice-command
    desc: IRC NOTICE command in source
    crit: notable
    conf: 0.85
    if:
      type: string
      substr: "NOTICE %s"
  - id: irc-port-6667
    desc: Default IRC port 6667
    crit: component
    conf: 0.8
    if:
      type: string
      substr: "6667"
composite_rules:
  - id: irc-protocol-source
    desc: IRC protocol implementation in C source
    crit: suspicious
    conf: 0.97
    all:
      - id: privmsg
    needs: 2
    any:
      - id: nick-user
      - id: nick-format
      - id: user-registration
      - id: join-channel
      - id: join-simple
      - id: pong-keepalive
      - id: userhost-lookup
  - id: irc-channel-management
    desc: IRC channel management commands
    crit: suspicious
    conf: 0.9
    all:
      - id: privmsg
    needs: 2
    any:
      - id: kick-command
      - id: mode-command
      - id: topic-command
      - id: notice-command
      - id: irc-port-6667
