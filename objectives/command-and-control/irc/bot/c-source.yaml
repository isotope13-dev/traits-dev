defaults:
  platforms: [windows, linux, unix, macos]
  for: [c, cpp]
traits:
  - id: privmsg
    desc: IRC PRIVMSG command string
    crit: notable
    conf: 0.9
    if:
      type: string
      exact: "PRIVMSG"
  - id: nick-user
    desc: IRC NICK USER registration format
    crit: notable
    conf: 0.95
    if:
      type: raw
      regex: 'NICK %s\\r\\n"\s*"USER %s [^\\r\\n"]{1,32}:[^\\r\\n"]{1,32}\\r\\n'
  - id: join-channel
    desc: IRC JOIN with channel key
    crit: notable
    conf: 0.95
    if:
      type: raw
      regex: 'JOIN %s\s+:?%s\\r\\n'
  - id: pong-keepalive
    desc: IRC PONG keepalive format
    crit: notable
    conf: 0.9
    if:
      type: string
      substr: "PONG %s"
  - id: userhost-lookup
    desc: IRC USERHOST lookup command
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: 'USERHOST %s\\r\\n'
composite_rules:
  - id: irc-protocol-source
    desc: IRC protocol implementation in C source
    crit: suspicious
    conf: 0.97
    all:
      - id: privmsg
      - id: nick-user
    any:
      - id: join-channel
      - id: pong-keepalive
      - id: userhost-lookup
