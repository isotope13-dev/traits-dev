defaults:
  attack: "T1071.001"
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: advscan-command
    desc: Reptile advscan IRC command
    crit: suspicious
    conf: 0.96
    if:
      type: string
      exact: "advscan"
  - id: scanall-command
    desc: Reptile scanall IRC command
    crit: suspicious
    conf: 0.96
    if:
      type: string
      exact: "scanall"
  - id: sniffer-command
    desc: Reptile sniffer IRC command
    crit: suspicious
    conf: 0.95
    if:
      type: string
      exact: "sniffer"
  - id: pstore-command
    desc: Reptile pstore IRC command
    crit: suspicious
    conf: 0.95
    if:
      type: string
      exact: "pstore"
  - id: clearlogs-command
    desc: Reptile clearlogs IRC command
    crit: suspicious
    conf: 0.96
    if:
      type: string
      exact: "clearlogs"
  - id: hidepid-command
    desc: Reptile hide pid command
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: 'hide.{0,16}pid'
  - id: aim-command
    desc: Reptile AIM spread command
    crit: suspicious
    conf: 0.94
    if:
      type: string
      exact: "aim"
  - id: server-list-command
    desc: Reptile server list command
    crit: component
    conf: 0.95
    if:
      type: raw
      regex: 'server.{0,8}list'
  - id: server-jump-command
    desc: Reptile server jump command
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'server.{0,8}jump'
composite_rules:
  - id: reptile-irc-command-set
    desc: Reptile IRC operator command set
    crit: hostile
    conf: 0.99
    needs: 4
    any:
      - id: advscan-command
      - id: scanall-command
      - id: sniffer-command
      - id: pstore-command
      - id: clearlogs-command
      - id: hidepid-command
      - id: aim-command
      - id: server-list-command
      - id: server-jump-command
