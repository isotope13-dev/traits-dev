defaults:
  attack: T1071.001
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: exploit-channel
    desc: Reptile exploit IRC channel
    crit: suspicious
    conf: 0.96
    if:
      type: string
      exact: "#exp"
  - id: sniffer-channel
    desc: Reptile sniffer IRC channel
    crit: suspicious
    conf: 0.96
    if:
      type: string
      exact: "#sniff"
  - id: encrypted-config-switch
    desc: Reptile encrypted config switch
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: "#ifndef NO_CRYPT"
composite_rules:
  - id: reptile-source-botnet
    desc: Win32.Reptile source botnet family
    crit: hostile
    conf: 0.99
    all:
      - id: exploit-channel
      - id: sniffer-channel
    any:
      - id: objectives/persistence/service/install::default-service-name
      - id: objectives/persistence/service/install::default-display-name
      - id: encrypted-config-switch
      - id: objectives/discovery/network/scan/exploit::multi-exploit-scan-suite
      - id: objectives/anti-analysis/kernel-hide/rootkit::windows-process-hiding-rootkit
