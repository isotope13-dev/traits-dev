defaults:
  platforms: [unix, windows, macos]
  attack: T1620
composite_rules:
  - id: go-mem-loader
    desc: "Detects Go-based memory loader with self-deletion or shellcode"
    crit: hostile
    mbc: C0016 # In-Memory Execution
    all:
      - id: objectives/execution/interpreter/go::go-mem-exec
    any:
      - id: objectives/execution/interpreter/go::go-self-delete
      - id: objectives/evasion/process/injection/shellcode::hex-xor-loop-stub
  - id: go-aes-callback-shellcode-stager
    desc: Go AES callback shellcode stager
    crit: hostile
    conf: 0.995
    mbc: B0005
    all:
      - id: metadata/lang/compiler/systems::go-pe-rich-symbols
      - id: micro-behaviors/os/api-resolution/manual::go-lazyproc-resolution
      - id: micro-behaviors/os/callback/enum::cert-enum-system-store-location
      - id: micro-behaviors/crypto/symmetric/aes::go-aes-ecb-decryptor
    any:
      - id: metadata/lang/compiler/systems::certenum-source-path
      - id: micro-behaviors/crypto/symmetric/aes::hardcoded-aes-test-key
      - id: micro-behaviors/communications/http/get::wininet-dynamic-load
      - id: objectives/command-and-control/infrastructure/domain::h5-helloniubi-shop
      - id: micro-behaviors/communications/http/user-agent::windows-phone-mobile-ua
    downgrade:
      any:
        - id: metadata/binary/vendor::is-microsoft-named
        - id: metadata/signed/platform::microsoft
