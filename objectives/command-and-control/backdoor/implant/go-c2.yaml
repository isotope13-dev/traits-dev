defaults:
  platforms: [linux, macos, windows]
  # Go-syntax matchers (struct/field declarations) — meaningless in the other
  # `source` languages and FP-prone there (e.g. `UUID string` in prose/docs).
  for: [go]
traits:
  - id: go-c2-agent-struct-bot
    desc: Go struct representing a C2 agent/implant
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*Implant\s+struct|type\s+(C2Agent|RemoteAgent|C2Bot)\s+struct'
  - id: go-c2-agent-struct-victim
    desc: Go struct representing a C2 victim
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*Victim\s+struct'
  - id: go-c2-agent-id-field
    desc: Go struct field for agent UUID/ID
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '\b(UUID|AgentID|BotID)\s+string\b'
  - id: go-c2-agent-machine-field
    desc: Go struct field for machine HWID
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '\b(MachineID|HWID)\s+string\b'
  - id: go-c2-agent-cwd-field
    desc: Go struct field for agent working directory
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'CWD\s+string'
  - id: go-c2-server-struct-c2
    desc: Go struct explicitly named for C2
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*C2\s+struct'
  - id: go-c2-server-struct-command
    desc: Go agent command struct
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*(Agent|Bot|Implant|Task)Command\s+struct'
  - id: go-c2-operator-field
    desc: Go struct field for C2 operator/user
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'Operator[s]?\s+\*?(operator\.)?Operator'
  - id: go-c2-job-field
    desc: Go struct field for C2 job/task
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'Job[s]?\s+\*?(job\.)?Job'

composite_rules:
  - id: go-c2-agent-struct
    desc: Go struct representing a C2 agent/implant
    crit: notable
    conf: 0.85
    any:
      - id: go-c2-agent-struct-bot
      - id: go-c2-agent-struct-victim
  - id: go-c2-agent-uuid-field
    desc: Go struct field for agent UUID/ID
    crit: baseline
    conf: 0.8
    any:
      - id: go-c2-agent-id-field
      - id: go-c2-agent-machine-field
  - id: go-c2-server-struct
    desc: Go struct representing a C2 server state
    crit: notable
    conf: 0.85
    any:
      - id: go-c2-server-struct-c2
      - id: go-c2-server-struct-command
  - id: go-c2-agent-definition
    desc: Go source defines C2 agent tracking structure
    crit: suspicious
    conf: 0.95
    attack: T1059
    mbc: B0022
    all:
      - id: go-c2-agent-struct
    any:
      - id: go-c2-agent-uuid-field
      - id: go-c2-agent-cwd-field
  - id: go-c2-server-definition
    desc: Go source defines C2 server state structure
    crit: suspicious
    conf: 0.95
    attack: T1059
    mbc: B0022
    all:
      - id: go-c2-server-struct
    any:
      - id: go-c2-operator-field
      - id: go-c2-job-field
  - id: go-c2-framework-component
    desc: Go source implements C2 framework components (agent + server)
    crit: hostile
    conf: 0.98
    attack: T1059
    mbc: B0022
    all:
      - id: go-c2-agent-definition
      - id: go-c2-server-definition
