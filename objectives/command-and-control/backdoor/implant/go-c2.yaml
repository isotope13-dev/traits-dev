defaults:
  platforms: [linux, macos, windows]
  # Go-syntax matchers (struct/field declarations) — meaningless in the other
  # `source` languages and FP-prone there (e.g. `UUID string` in prose/docs).
  for: [go]
traits:
  - id: go-c2-agent-struct-bot
    desc: Go struct representing a C2 agent/implant
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*Implant\s+struct|type\s+(C2Agent|RemoteAgent|C2Bot)\s+struct'
  - id: go-c2-agent-struct-victim
    desc: Go struct representing a C2 victim
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*Victim\s+struct'
  - id: go-c2-agent-id-field
    desc: Go struct field for agent UUID/ID
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '\b(UUID|AgentID|BotID)\s+string\b'
  - id: go-c2-agent-machine-field
    desc: Go struct field for machine HWID
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '\b(MachineID|HWID)\s+string\b'
  - id: go-c2-agent-cwd-field
    desc: Go struct field for agent working directory
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'CWD\s+string'
  - id: go-c2-server-struct-c2
    desc: Go struct explicitly named for C2
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*C2\s+struct'
  - id: go-c2-server-struct-command
    desc: Go agent command struct
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*(Agent|Bot|Implant|Task)Command\s+struct'
  - id: go-c2-operator-field
    desc: Go struct field for C2 operator/user
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'Operator[s]?\s+\*?(operator\.)?Operator\b'
  - id: go-c2-job-field
    desc: Go struct field for C2 job/task
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'Job[s]?\s+\*?(job\.)?Job'
  - id: go-c2-agent-host-field
    desc: Go agent host field
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bhost\s+Host\b'
  - id: go-c2-agent-process-field
    desc: Go agent process field
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bprocess\s+Process\b'
  - id: go-c2-agent-comms-field
    desc: Go agent comms field
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bcomms\s+Comms\b'
  - id: go-c2-agent-linked-field
    desc: Go linked agents field
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '\blinkedAgents\s+\[\]uuid\.UUID\b'
  - id: go-c2-agent-listener-field
    desc: Go agent listener field
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '\blistener\s+uuid\.UUID\b'
  - id: go-c2-agent-secret-field
    desc: Go byte-slice secret field
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '\bsecret\s+\[\]byte\b'
  - id: go-c2-agent-data-directory
    desc: Go C2 agent data dir
    crit: component
    conf: 0.78
    if:
      type: text
      regex: 'filepath\.Join\(.{0,80}"data".{0,80}"agents"'
  - id: go-c2-mesh-connect-opcode
    desc: Go mesh connect-C2 opcode
    crit: notable
    conf: 0.9
    if:
      type: text
      word: OpcodeConnectC2
  - id: go-c2-mesh-dial-gateway
    desc: Go mesh dials gateway
    crit: component
    conf: 0.8
    if:
      type: text
      word: DialGateway
  - id: go-c2-load-listeners-func
    desc: Go loads C2 listeners
    crit: notable
    conf: 0.84
    if:
      type: symbol
      exact: loadListenersFromConfig
  - id: go-c2-listeners-dir-literal
    desc: Go listeners directory
    crit: component
    conf: 0.76
    if:
      type: string_literal
      exact: listeners
  - id: go-c2-listener-unmarshal
    desc: Go listener JSON unmarshal
    crit: component
    conf: 0.76
    if:
      type: text
      substr: json.Unmarshal(data, &listener)
  - id: go-c2-listener-endpoint-set
    desc: Go listener endpoint set
    crit: component
    conf: 0.76
    if:
      type: text
      substr: listener.Endpoint = normalizedEndpoint
  - id: go-c2-deferred-update-func
    desc: Go deferred updater func
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: writeDeferredUpdateBatch
  - id: go-c2-update-copy-line
    desc: Go updater copy line
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: '  copy /Y \"%SRC%\" \"%DST%\" >> \"%LOG%\" 2>&1 && (set \"COPIED=1\" & goto copied)'
  - id: go-c2-update-start-line
    desc: Go updater start line
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: '  start \"\" \"%DST%\" >> \"%LOG%\" 2>&1'
  - id: go-c2-update-delete-line
    desc: Go updater delete line
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: 'del /F /Q \"%~f0\" >NUL 2>&1'
  - id: go-c2-startup-target-func
    desc: Go startup target func
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: startupTargetPath
  - id: go-c2-copy-executable-func
    desc: Go copies agent exe
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: copyExecutableAtomic
  - id: go-c2-persistence-configure
    desc: Go configures persistence
    crit: component
    conf: 0.82
    if:
      type: text
      substr: persistence.Configure(startupPath)
  - id: go-c2-drop-all-data-func
    desc: Go drops teamserver data
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: DropAllData
  - id: go-c2-beacon-history-delete
    desc: Go deletes beacon history
    crit: component
    conf: 0.8
    if:
      type: text
      substr: client.BeaconHistory.Delete().Exec
  - id: go-c2-shell-task-delete
    desc: Go deletes shell tasks
    crit: component
    conf: 0.8
    if:
      type: text
      substr: client.ShellTask.Delete().Exec
  - id: go-c2-host-credential-delete
    desc: Go deletes host creds
    crit: component
    conf: 0.8
    if:
      type: text
      substr: client.HostCredential.Delete().Exec
  - id: go-c2-scheduled-task-delete
    desc: Go deletes scheduled tasks
    crit: component
    conf: 0.8
    if:
      type: text
      substr: client.ScheduledTask.Delete().Exec
  - id: go-c2-conv-handle-init
    desc: Go ConvPacket init handler
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: HandleInit(packet *convpb.ConvPacket)
  - id: go-c2-total-chunks-field
    desc: Go total chunks field
    crit: component
    conf: 0.8
    if:
      type: text
      word: TotalChunks
  - id: go-c2-status-packet-type
    desc: Go status packet type
    crit: component
    conf: 0.8
    if:
      type: text
      word: PacketType_PACKET_TYPE_STATUS
  - id: go-c2-acks-field
    desc: Go ACK ranges field
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\bAcks:'
  - id: go-c2-get-jobs-func
    desc: Go C2 get jobs RPC
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: GetJobs
  - id: go-c2-restart-jobs-func
    desc: Go C2 restart jobs RPC
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: RestartJobs
  - id: go-c2-kill-job-func
    desc: Go C2 kill job RPC
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: KillJob
  - id: go-c2-start-mtls-listener
    desc: Go starts MTLS listener
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: StartMTLSListener
  - id: go-c2-crackstations-func
    desc: Go crackstations RPC
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: Crackstations
  - id: go-c2-crack-trigger-func
    desc: Go crack trigger RPC
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: CrackstationTrigger
  - id: go-c2-crack-task-update
    desc: Go crack task update
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: CrackTaskUpdate
  - id: go-c2-crack-benchmark
    desc: Go crack benchmark
    crit: component
    conf: 0.82
    if:
      type: symbol
      exact: CrackstationBenchmark
  - id: go-c2-bulk-download-func
    desc: Go bulk file webhook
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: DownloadBulkFilesWebhook
  - id: go-c2-agent-file-id-field
    desc: Go agent file id field
    crit: component
    conf: 0.8
    if:
      type: text
      substr: agent_file_id
  - id: go-c2-download-tag
    desc: Go download tag marker
    crit: component
    conf: 0.8
    if:
      type: text
      word: tagTypeDownload
  - id: go-c2-filemeta-path
    desc: Go filemeta path use
    crit: component
    conf: 0.8
    if:
      type: text
      substr: filemeta.Path
  - id: go-c2-event-import-func
    desc: Go event import webhook
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: EventingImportWebhook
  - id: go-c2-save-uploaded-file
    desc: Go saves uploaded file
    crit: component
    conf: 0.8
    if:
      type: text
      word: SaveUploadedFile
  - id: go-c2-eventing-ingest
    desc: Go eventing ingest
    crit: component
    conf: 0.8
    if:
      type: text
      substr: eventing.Ingest
  - id: go-c2-graphql-query-literal
    desc: Go graphql query tool
    crit: notable
    conf: 0.86
    if:
      type: string_literal
      exact: graphql_query
  - id: go-c2-graphql-handler-context
    desc: Go GraphQL handler context
    crit: component
    conf: 0.8
    if:
      type: symbol
      exact: graphqlHandlerFromContext
  - id: go-c2-graphql-post-request
    desc: Go GraphQL POST request
    crit: component
    conf: 0.8
    if:
      type: text
      substr: httptest.NewRequest("POST", "/graphql"

composite_rules:
  - id: go-c2-agent-struct
    desc: Go struct representing a C2 agent/implant
    crit: notable
    conf: 0.85
    any:
      - id: go-c2-agent-struct-bot
      - id: go-c2-agent-struct-victim
  - id: go-c2-agent-uuid-field
    desc: Go struct field for agent UUID/ID
    crit: baseline
    conf: 0.8
    any:
      - id: go-c2-agent-id-field
      - id: go-c2-agent-machine-field
  - id: go-c2-server-struct
    desc: Go struct representing a C2 server state
    crit: notable
    conf: 0.85
    any:
      - id: go-c2-server-struct-c2
      - id: go-c2-server-struct-command
  - id: go-c2-agent-definition
    desc: Go source defines C2 agent tracking structure
    crit: suspicious
    conf: 0.95
    attack: T1059
    mbc: B0022
    all:
      - id: go-c2-agent-struct
    any:
      - id: go-c2-agent-uuid-field
      - id: go-c2-agent-cwd-field
  - id: go-c2-agent-aggregate-definition
    desc: Go C2 agent state struct
    crit: suspicious
    conf: 0.94
    attack: T1059
    mbc: B0022
    all:
      - id: go-c2-agent-aggregate-fields
      - id: go-c2-agent-secret-listener-state
    any:
      - id: go-c2-agent-data-directory
  - id: go-c2-agent-any-definition
    desc: Go C2 agent tracking struct
    crit: suspicious
    conf: 0.94
    attack: T1059
    mbc: B0022
    any:
      - id: go-c2-agent-definition
      - id: go-c2-agent-aggregate-definition
  - id: go-c2-server-definition
    desc: Go source defines C2 server state structure
    crit: suspicious
    conf: 0.95
    attack: T1059
    mbc: B0022
    all:
      - id: go-c2-server-struct
    any:
      - id: go-c2-operator-field
      - id: go-c2-job-field
  - id: go-c2-framework-component
    desc: Go source implements C2 framework components (agent + server)
    crit: hostile
    conf: 0.98
    attack: T1059
    mbc: B0022
    all:
      - id: go-c2-agent-any-definition
      - id: go-c2-server-definition
  - id: go-c2-mesh-gateway-transport
    desc: Go mesh gateway C2 transport
    crit: suspicious
    conf: 0.94
    attack: T1572
    mbc: B0030
    all:
      - id: go-c2-mesh-connect-opcode
      - id: go-c2-mesh-dial-gateway
  - id: go-c2-listener-config-management
    desc: Go C2 listener config
    crit: suspicious
    conf: 0.9
    attack: T1071
    mbc: B0030
    all:
      - id: go-c2-listener-config-store
      - id: go-c2-listener-endpoint-set
  - id: go-c2-agent-aggregate-fields
    desc: Go C2 agent state fields
    crit: notable
    conf: 0.86
    near_lines: 14
    all:
      - id: go-c2-agent-host-field
      - id: go-c2-agent-process-field
      - id: go-c2-agent-comms-field
  - id: go-c2-agent-secret-listener-state
    desc: Go C2 listener secret state
    crit: notable
    conf: 0.84
    near_lines: 14
    all:
      - id: go-c2-agent-linked-field
      - id: go-c2-agent-listener-field
      - id: go-c2-agent-secret-field
  - id: go-c2-listener-config-store
    desc: Go C2 listener JSON config
    crit: notable
    conf: 0.84
    near_lines: 35
    all:
      - id: go-c2-load-listeners-func
      - id: go-c2-listeners-dir-literal
      - id: go-c2-listener-unmarshal
  - id: go-c2-deferred-agent-update-batch
    desc: Go deferred update batch
    crit: suspicious
    conf: 0.93
    all:
      - id: go-c2-deferred-update-func
      - id: go-c2-update-copy-line
      - id: go-c2-update-start-line
      - id: go-c2-update-delete-line
  - id: go-c2-agent-update-refreshes-startup
    desc: Go agent refreshes startup
    crit: suspicious
    conf: 0.9
    all:
      - id: go-c2-startup-target-func
      - id: go-c2-copy-executable-func
      - id: go-c2-persistence-configure
  - id: go-c2-teamserver-drop-all-data
    desc: Go C2 data purge mutation
    crit: suspicious
    conf: 0.91
    needs: 4
    any:
      - id: go-c2-drop-all-data-func
      - id: go-c2-beacon-history-delete
      - id: go-c2-shell-task-delete
      - id: go-c2-host-credential-delete
      - id: go-c2-scheduled-task-delete
  - id: go-c2-conversation-chunk-manager
    desc: Go C2 chunked conversation
    crit: suspicious
    conf: 0.9
    all:
      - id: go-c2-conv-handle-init
      - id: go-c2-total-chunks-field
      - id: go-c2-status-packet-type
      - id: go-c2-acks-field
  - id: go-c2-job-listener-control
    desc: Go C2 listener job RPC
    crit: suspicious
    conf: 0.92
    all:
      - id: go-c2-get-jobs-func
      - id: go-c2-restart-jobs-func
      - id: go-c2-kill-job-func
      - id: go-c2-start-mtls-listener
  - id: go-c2-crackstation-tasking-rpc
    desc: Go C2 cracking task RPC
    crit: suspicious
    conf: 0.9
    all:
      - id: go-c2-crackstations-func
      - id: go-c2-crack-trigger-func
      - id: go-c2-crack-task-update
      - id: go-c2-crack-benchmark
  - id: go-c2-filemeta-bulk-download-webhook
    desc: Go C2 bulk file webhook
    crit: suspicious
    conf: 0.9
    all:
      - id: go-c2-bulk-download-func
      - id: go-c2-agent-file-id-field
      - id: go-c2-download-tag
      - id: go-c2-filemeta-path
  - id: go-c2-event-import-file-ingest
    desc: Go C2 event import
    crit: suspicious
    conf: 0.88
    all:
      - id: go-c2-event-import-func
      - id: go-c2-save-uploaded-file
      - id: go-c2-eventing-ingest
  - id: go-c2-mcp-graphql-query-tool
    desc: Go C2 MCP GraphQL bridge
    crit: suspicious
    conf: 0.86
    all:
      - id: go-c2-graphql-query-literal
      - id: go-c2-graphql-handler-context
      - id: go-c2-graphql-post-request
  - id: go-c2-agent-self-update-startup
    desc: Go agent refreshes startup
    crit: hostile
    conf: 0.96
    attack: T1105,T1547.001
    mbc: F0004
    all:
      - id: go-c2-deferred-agent-update-batch
      - id: go-c2-agent-update-refreshes-startup
  - id: go-c2-agent-self-update-hidden
    desc: Go agent relaunches hidden
    crit: hostile
    conf: 0.94
    attack: T1105
    mbc: F0004
    all:
      - id: go-c2-deferred-agent-update-batch
      - id: micro-behaviors/process/create/flags::create-no-window
  - id: go-c2-agent-self-update-persistence
    desc: Go agent self-update persistence
    crit: hostile
    conf: 0.96
    attack: T1105,T1547.001
    mbc: F0004
    any:
      - id: go-c2-agent-self-update-startup
      - id: go-c2-agent-self-update-hidden
