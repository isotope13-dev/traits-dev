defaults:
  platforms: [linux, macos, windows]
  for: [source, go]
traits:
  - id: go-c2-agent-struct-bot
    desc: Go struct representing a C2 agent/implant
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*(Agent|Implant|Bot)\s+struct'
  - id: go-c2-agent-struct-client
    desc: Go struct representing a C2 client/victim
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*(Client|Victim)\s+struct'
  - id: go-c2-agent-id-field
    desc: Go struct field for agent UUID/ID
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '(UUID|AgentID|BotID)\s+string'
  - id: go-c2-agent-machine-field
    desc: Go struct field for machine HWID
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: '(MachineID|HWID)\s+string'
  - id: go-c2-agent-cwd-field
    desc: Go struct field for agent working directory
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'CWD\s+string'
  - id: go-c2-server-struct-1
    desc: Go struct representing a C2 server state
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*(Server|C2|Command)\s+struct'
  - id: go-c2-server-struct-2
    desc: Go struct representing a listener state
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'type\s+[A-Za-z0-9_]*(Listener|State|Context)\s+struct'
  - id: go-c2-operator-field
    desc: Go struct field for C2 operator/user
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'Operator[s]?\s+\*?(operator\.)?Operator'
  - id: go-c2-job-field
    desc: Go struct field for C2 job/task
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'Job[s]?\s+\*?(job\.)?Job'

composite_rules:
  - id: go-c2-agent-struct
    desc: Go struct representing a C2 agent/implant
    crit: notable
    conf: 0.85
    any:
      - id: go-c2-agent-struct-bot
      - id: go-c2-agent-struct-client
  - id: go-c2-agent-uuid-field
    desc: Go struct field for agent UUID/ID
    crit: baseline
    conf: 0.8
    any:
      - id: go-c2-agent-id-field
      - id: go-c2-agent-machine-field
  - id: go-c2-server-struct
    desc: Go struct representing a C2 server state
    crit: notable
    conf: 0.85
    any:
      - id: go-c2-server-struct-1
      - id: go-c2-server-struct-2
  - id: go-c2-agent-definition
    desc: Go source defines C2 agent tracking structure
    crit: suspicious
    conf: 0.95
    attack: T1059
    mbc: B0022
    all:
      - id: go-c2-agent-struct
    any:
      - id: go-c2-agent-uuid-field
      - id: go-c2-agent-cwd-field
  - id: go-c2-server-definition
    desc: Go source defines C2 server state structure
    crit: suspicious
    conf: 0.95
    attack: T1059
    mbc: B0022
    all:
      - id: go-c2-server-struct
    any:
      - id: go-c2-operator-field
      - id: go-c2-job-field
  - id: go-c2-framework-component
    desc: Go source implements C2 framework components (agent + server)
    crit: hostile
    conf: 0.98
    attack: T1059
    mbc: B0022
    all:
      - id: go-c2-agent-definition
      - id: go-c2-server-definition
