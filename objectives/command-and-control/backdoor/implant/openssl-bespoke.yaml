defaults:
  platforms: [windows]
  for: [pe]
  attack: T1571

composite_rules:
  - id: openssl-http-client-msgs
    desc: OpenSSL OSSL_HTTP client diagnostics cluster
    crit: component
    conf: 0.95
    needs: 2
    any:
      - id: micro-behaviors/communications/http/client/library
    unless:
      - id: well-known/lib/openssl/

  - id: bespoke-openssl-implant
    desc: Bespoke OpenSSL static implant with raw Winsock
    crit: hostile
    conf: 0.93
    size_min: 524288
    all:
      - id: openssl-http-client-msgs
      - id: well-known/lib/openssl::openssl-cryptogams
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
    any:
      - id: micro-behaviors/communications/socket/init::connect-api-ordinal
      - id: micro-behaviors/communications/socket/init::winsock-startup-ordinal
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/certificate/identity::pe-signature-verified
      - id: well-known/lib/openssl/
      - id: well-known/app/protected-benign-pe/
      - id: well-known/app/keepassxc/
      - id: well-known/tool/reverse-engineering/frida/

  - id: openssl-http-with-raw-winsock
    desc: OpenSSL HTTP client over raw Winsock
    crit: suspicious
    conf: 0.85
    size_min: 65536
    all:
      - id: openssl-http-client-msgs
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
    unless:
      - id: metadata/signed/platform/
      - id: well-known/lib/openssl/
      - id: well-known/app/protected-benign-pe/
      - id: well-known/app/keepassxc/
      - id: well-known/tool/reverse-engineering/frida/
      - id: well-known/app/qbittorrent/
      - id: well-known/app/telegram::telegram-desktop-official-client

  - id: peb-walk-dynamic-resolution
    desc: PEB-walk with dynamic API resolution chain
    crit: suspicious
    conf: 0.85
    size_min: 65536
    all:
      - id: micro-behaviors/os/api-resolution/hash-based::peb-fs-access
      - id: micro-behaviors/process/enumerate/snapshot::dynamic-toolhelp-enumerator
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/certificate/identity::pe-signature-verified
      - id: well-known/tool/sysadmin/conemu/
      - id: well-known/app/ventoy/
      - id: well-known/lib/electron::electron-chromium-runtime-strong
    downgrade:
      any:
        - id: metadata/binary/vendor/
        - id: well-known/app/internet-explorer/
