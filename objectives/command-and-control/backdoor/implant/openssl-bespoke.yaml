defaults:
  platforms: [windows]
  for: [pe]
  attack: T1571

traits:
  - id: openssl-http-routines-msg
    desc: OpenSSL HTTP routines diagnostic
    crit: component
    conf: 0.9
    if:
      type: text
      exact: 'HTTP routines'
      section: rdata

  - id: openssl-https-proxy-msg
    desc: OpenSSL https proxy request diagnostic
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 'https proxy request'
      section: rdata

  - id: openssl-redirect-https-http-msg
    desc: OpenSSL redirect https to http diagnostic
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 'redirection from https to http'
      section: rdata

  - id: openssl-wrong-http-version-msg
    desc: OpenSSL received wrong http version
    crit: component
    conf: 0.95
    if:
      type: text
      exact: 'received wrong http version'
      section: rdata

composite_rules:
  - id: openssl-http-client-msgs
    desc: OpenSSL OSSL_HTTP client diagnostics cluster
    crit: component
    conf: 0.95
    needs: 2
    any:
      - id: openssl-http-routines-msg
      - id: openssl-https-proxy-msg
      - id: openssl-redirect-https-http-msg
      - id: openssl-wrong-http-version-msg

  - id: bespoke-openssl-implant
    desc: Bespoke OpenSSL static implant with raw Winsock
    crit: hostile
    conf: 0.93
    size_min: 524288
    all:
      - id: openssl-http-client-msgs
      - id: well-known/lib/openssl::openssl-cryptogams
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
    any:
      - id: micro-behaviors/communications/socket/init::connect-api-ordinal
      - id: micro-behaviors/communications/socket/init::winsock-startup-ordinal
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/certificate/identity::pe-signature-verified
      - id: well-known/lib/openssl::openssl-library
      - id: well-known/app/protected-benign-pe/
      - id: well-known/app/keepassxc/
      - id: well-known/tool/reverse-engineering/frida::frida-tool-context

  - id: openssl-http-with-raw-winsock
    desc: OpenSSL HTTP client over raw Winsock
    crit: suspicious
    conf: 0.85
    size_min: 65536
    all:
      - id: openssl-http-client-msgs
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
    unless:
      - id: metadata/signed/platform::microsoft
      - id: well-known/lib/openssl::openssl-library
      - id: well-known/app/protected-benign-pe/
      - id: well-known/app/keepassxc/
      - id: well-known/tool/reverse-engineering/frida::frida-tool-context

  - id: peb-walk-dynamic-resolution
    desc: PEB-walk with dynamic API resolution chain
    crit: suspicious
    conf: 0.85
    size_min: 65536
    all:
      - id: micro-behaviors/os/api-resolution/hash-based::peb-fs-access
      - id: micro-behaviors/process/enumerate/snapshot::dynamic-toolhelp-enumerator
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/certificate/identity::pe-signature-verified
      - id: well-known/tool/sysadmin/conemu::conemu-component
    downgrade:
      any:
        - id: metadata/binary/vendor::benign-unsigned-microsoft-import-heavy-context
        - id: well-known/app/internet-explorer::internet-explorer-frame-component
