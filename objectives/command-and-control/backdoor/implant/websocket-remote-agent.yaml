# Tasking markers are attack-context-specific: they identify a remote agent
# protocol rather than generic filesystem or encoding capabilities.
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1059.001,T1105,T1071.001"

traits:
  - id: remote-agent-file-task-markers
    desc: Remote agent file transfer task markers
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '__((LISTDIR)|(DOWNLOAD)|(UPLOAD)|(INVENTORY))__'

  - id: remote-agent-file-base64-transfer
    desc: Base64 file transfer handler markers
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)base64\.b64encode\b'

  - id: remote-agent-file-read
    desc: Remote file read handler
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bread_bytes\b'

  - id: remote-agent-file-write
    desc: Remote file write handler
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bwrite_bytes\b'

composite_rules: []
