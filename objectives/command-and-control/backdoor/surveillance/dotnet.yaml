defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1219
  mbc: B0025
composite_rules:
- id: dotnet-surveillance-capture-backdoor
  desc: .NET RAT capture primitives
  crit: suspicious
  conf: 0.95
  any:
  - id: micro-behaviors/hardware/display/screen::copyfromscreen-dotnet
  - id: micro-behaviors/hardware/display/screen::dotnet-copyfromscreen-capture
  - id: micro-behaviors/hardware/input::avicap32-device-enum
  - id: micro-behaviors/hardware/input::avicap32-dll
  needs: 2
  downgrade:
    any:
    - id: metadata/lang/compiler/managed::winforms-ui
  unless:
  - id: well-known/lib/wine::wine-runtime-component
- id: dotnet-surveillance-rat-backdoor
  desc: .NET networked surveillance RAT
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/communications/http/client::dotnet-http-client-with-aes
  - id: dotnet-surveillance-capture-backdoor
  any:
  - id: objectives/anti-static/obfuscation/reflection/invoke::get-entrypoint
  - id: objectives/evasion/anti-av/edr-detect/wmi::security-product-enumeration
  - id: objectives/command-and-control/dropper/delivery/download-execute::dotnet-downloadfile-token
  - id: objectives/command-and-control/dropper/staging/embedded::base64-file-dropper
