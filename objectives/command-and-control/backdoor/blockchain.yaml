# Blockchain Dead-Drop C2
# MBC: B0025 (Remote Command Execution)
# ATT&CK: T1102 (Web Service)
defaults:
  attack: T1102
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: icp-canister-url
    desc: Internet Computer Protocol (ICP) canister URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "[a-z0-9-]+\\.raw\\.icp[0-9]\\.io"

  - id: canisterworm-canister-id
    desc: CanisterWorm C2 canister ID
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "tdtqy-oyaaa-aaaae-af2dq-cai"

  - id: eth-l2-explorer-url
    desc: Ethereum L2 explorer transaction URL
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "(?i)(basescan\\.org|optimistic\\.etherscan\\.io|polygonscan\\.com|arbiscan\\.io)/tx/"

  - id: eth-jsonrpc-method
    desc: Ethereum JSON-RPC transaction or log retrieval method
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "eth_(getLogs|getTransactionByHash|getTransactionReceipt)"

composite_rules:
  - id: eth-l2-rpc-transaction-lookup
    desc: Ethereum L2 transaction lookup over explorer/RPC
    crit: notable
    conf: 0.82
    all:
      - id: eth-jsonrpc-method
      - id: eth-l2-explorer-url
  - id: blockchain-dead-drop-c2
    desc: Blockchain-based command retrieval dead drop
    crit: suspicious
    conf: 0.9
    any:
      - id: icp-canister-url
      - id: canisterworm-canister-id
