# Bind shell: socket bind() + listen() + interactive shell exec.
# Listener-side counterpart to reverse-shell.
defaults:
  for: [scripts, binaries, c, cpp]
  platforms: [unix, windows]
  attack: T1059
  mbc: B0030.003

traits:
  - id: source-winexec-client-command
    desc: WinExec on parsed client command
    crit: suspicious
    conf: 0.94
    for: [c, cpp]
    platforms: [windows]
    if:
      type: text
      substr: "WinExec(cutstr(cmd)+"
  - id: source-recv-client-request
    desc: recv into client request buffer
    crit: suspicious
    conf: 0.9
    for: [c, cpp]
    if:
      type: text
      substr: "recv(client,request"
  - id: source-command-dispatch-switch
    desc: command dispatch switch
    crit: component
    conf: 0.86
    for: [c, cpp]
    if:
      type: text
      substr: "switch(i)"

composite_rules:
  - id: bind-shell
    desc: Bind shell pattern with socket listener and shell launch
    crit: suspicious
    conf: 0.95
    size_max: 500000
    near_lines: 80
    all:
      - id: micro-behaviors/communications/socket/bind/function::bind
      - id: micro-behaviors/communications/socket/listen::listen
    any:
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
      - id: micro-behaviors/process/create/shell/spawn::bin-shell
      - id: micro-behaviors/process/create/shell/spawn::system-fn
    unless:
      - id: micro-behaviors/process/fork/clone::daemon-dup
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family/
        - id: micro-behaviors/dylib/library/family/
        - id: objectives/persistence/system/daemon/init/
        - id: micro-behaviors/ui/help/
  - id: winsock-command-bind-shell-source
    desc: Winsock listener executes client commands
    crit: hostile
    conf: 0.97
    size_max: 500000
    near_lines: 140
    all:
      - id: micro-behaviors/communications/socket/bind/function::bind
      - id: micro-behaviors/communications/socket/listen::server-socket-source
      - id: micro-behaviors/communications/socket/listen::accept-call-source
    any:
      - id: source-winexec-client-command
      - id: source-command-dispatch-switch
      - id: micro-behaviors/process/create/shell/spawn::c-popen-call
