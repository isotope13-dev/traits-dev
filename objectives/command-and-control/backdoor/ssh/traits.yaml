# Generic SSH-backdoor detection. This is not a named malware family — it
# detects the shared techniques of SSH/sshd backdoors (hardcoded master
# credentials, authentication bypass, credential logging, backdoor-toolkit
# naming). Lives in objectives/ because it expresses an attacker goal, not a
# specific corpus signature. The generic credential/auth-bypass markers it
# composes live in micro-behaviors/data/text/keywords/credential.
defaults:
  platforms:
    - unix
  for: [scripts, binaries]
traits:
  - id: sshdoor-word
    size_min: 512
    size_max: 500000000
    desc: sshdoor backdoor name
    crit: notable
    conf: 0.9
    if:
      type: text
      word: sshdoor
      section: .text
  - id: sshkit-word
    size_min: 512
    size_max: 500000000
    desc: sshkit backdoor toolkit name
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: sshkit
      section: .text
composite_rules:
  - id: ssh-backdoor-names
    size_min: 512
    size_max: 500000000
    desc: SSH backdoor family names
    any:
      - id: sshdoor-word
      - id: sshkit-word
  - id: ssh-hardcoded-credential-access
    size_min: 512
    size_max: 500000000
    desc: Hardcoded SSH credential strings
    any:
      - id: micro-behaviors/data/text/keywords/credential::hardcoded-master-password
      - id: micro-behaviors/data/text/keywords/credential::hardcoded-backdoor-pass
      - id: micro-behaviors/data/text/keywords/credential::hardcoded-magic-password
  - id: ssh-auth-bypass
    size_min: 512
    size_max: 500000000
    desc: SSH auth bypass markers
    any:
      - id: micro-behaviors/data/text/keywords/credential::auth-bypass-marker
      - id: micro-behaviors/data/text/keywords/credential::skip-auth-marker
  - id: ssh-cred-logging
    size_min: 512
    size_max: 500000000
    desc: SSH credential logging
    any:
      - id: micro-behaviors/data/text/keywords/credential::password-log-marker
      - id: micro-behaviors/data/text/keywords/credential::cred-log-marker
  - id: ssh-detected
    size_min: 512
    size_max: 500000000
    desc: SSH backdoor detected
    crit: suspicious
    conf: 0.95
    attack: T1556.004
    mbc: B0022
    needs: 2
    any:
      - id: ssh-backdoor-names
      - id: ssh-hardcoded-credential-access
      - id: ssh-auth-bypass
      - id: ssh-cred-logging
