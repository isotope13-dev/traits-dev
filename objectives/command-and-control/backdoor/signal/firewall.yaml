# Iptables Backdoor
# Detects backdoors using iptables redirection
# MBC: B0022 (Backdoor)
# ATT&CK: T1059
defaults:
  platforms: [unix, android]
  for: [elf, shell, c, cpp]
  mbc: "B0022"
  attack: "T1059"
traits:
  - id: bot-listener-banner
    desc: Inbound bot listener banner
    crit: component
    conf: 0.85
    if:
      type: text
      substr: hi im here, i think
  - id: bind-to-ip-token
    desc: Bind-to-IP listener token
    crit: component
    conf: 0.82
    if:
      type: text
      substr: bindtoip
composite_rules:
  # Stealth Iptables Backdoor
  # Complexity: all(2) = 2 >= 2 SUSPICIOUS or HOSTILE
  - id: iptables-redirect-backdoor
    desc: Network backdoor using iptables PREROUTING REDIRECT
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/impact/degrade/firewall::iptables-prerouting-redirect
      - id: micro-behaviors/communications/socket/create::create
  - id: iptables-accept-listener-backdoor
    desc: Opens firewall for inbound bot listener
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/impact/degrade/firewall::iptables-accept-dport
    any:
      - id: micro-behaviors/communications/socket/listen::listen
      - id: bot-listener-banner
      - id: bind-to-ip-token
  - id: pty-iptables-history-backdoor
    desc: PTY backdoor with iptables redirect
    crit: hostile
    conf: 0.96
    all:
      - id: iptables-redirect-backdoor
      - id: micro-behaviors/process/tty/pty::pty-network-backdoor
      - id: objectives/evasion/indicator-removal
  - id: stealth-backdoor-history-suppression
    desc: Backdoor with shell history suppression
    crit: hostile
    conf: 0.95
    all:
      - id: iptables-redirect-backdoor
      - id: objectives/evasion/indicator-removal
  - id: native-filter-stealth-backdoor
    desc: Native packet filter stealth backdoor
    crit: hostile
    conf: 0.94
    all:
      - id: micro-behaviors/communications/socket/options::options-filter-native
    any:
      - id: objectives/impact/degrade
      - id: objectives/evasion/indicator-removal
