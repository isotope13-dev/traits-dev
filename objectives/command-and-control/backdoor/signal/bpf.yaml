# BPF/eBPF Backdoor Patterns
# Detects BPF-based backdoor techniques including BPFDoor-style packet filter backdoors
# ATT&CK: T1205 (Traffic Signaling)
defaults:
  platforms: [linux]
  for: [c, elf]

traits:
  - id: icmp-module-obj
    desc: Build includes ICMP trigger module
    crit: component
    conf: 0.98
    for: [c, cpp, shell, makefile]
    if:
      type: text
      substr: modules/icmp.o
  - id: bpf-hook-module-obj
    desc: Build includes BPF hook module
    crit: component
    conf: 0.98
    for: [c, cpp, shell, makefile]
    if:
      type: text
      substr: modules/bpf_hook.o
  - id: cbpf-http-9999-magic
    desc: BPF HTTP 9999 magic
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "0x39393939"
  - id: cbpf-udp-icmp-7255-magic
    desc: BPF UDP ICMP magic
    crit: component
    conf: 0.78
    if:
      type: text
      substr: "0x00007255"
  - id: cbpf-icmp-5572-magic
    desc: BPF ICMP relay magic
    crit: component
    conf: 0.76
    if:
      type: text
      substr: "0x5572"
  - id: cbpf-tcp-5293-magic
    desc: BPF TCP magic constant
    crit: component
    conf: 0.78
    if:
      type: text
      substr: "0x00005293"

composite_rules:
  # BPF filter attachment helper
  - id: bpf-attachment
    desc: BPF filter attachment
    crit: suspicious
    conf: 0.7
    any:
      - id: micro-behaviors/communications/socket/options::options-filter
      - id: micro-behaviors/os/bpf/program/network::so-attach-bpf
  # Raw socket helper
  - id: raw-socket
    desc: Raw packet socket
    crit: suspicious
    conf: 0.6
    any:
      - id: micro-behaviors/os/bpf/program/network::af-packet
      - id: micro-behaviors/communications/ip/spoof::sock-raw-constant
  # Magic/knock patterns helper
  - id: magic-knock-patterns
    desc: "Magic packet/knock sequences in BPF"
    crit: suspicious
    conf: 0.7
    any:
      - id: micro-behaviors/os/bpf/program/icmp::icmp-sequence-1234
      - id: micro-behaviors/os/bpf/program/icmp::pid-derived-icmp-bpf-filter
      - id: objectives/command-and-control/channel/covert::hip-routing-bpf-channel
      - id: objectives/command-and-control/channel/covert::icmp-seq-1234-channel
      - id: objectives/command-and-control/channel/covert::rc4-icmp-tunnel
  # BPF backdoor (migrated from YARA)
  - id: backdoor
    desc: BPF packet filtering for backdoor
    crit: suspicious
    conf: 0.8
    attack: "T1205"
    all:
      - id: bpf-attachment
      - id: raw-socket
      - id: magic-knock-patterns
  - id: bpfdoor-modern-packet-filter
    desc: Magic BPF packet filter
    crit: suspicious
    conf: 0.9
    all:
      - id: bpf-attachment
    needs: 2
    any:
      - id: cbpf-http-9999-magic
      - id: cbpf-icmp-5572-magic
      - id: cbpf-udp-icmp-7255-magic
      - id: cbpf-tcp-5293-magic
      - id: micro-behaviors/os/bpf/program/network::af-packet-dgram-filter-source
  # BPF packet inspection helper
  # NOTE: Require at least 2 indicators to avoid false positives.
  # Individual functions like recvfrom are common in networking code.
  - id: bpf-packet-inspection
    desc: BPF packet inspection components
    crit: suspicious
    conf: 0.6
    # Removed 'for: [elf, c]' as it matches file default
    needs: 2
    any:
      - id: micro-behaviors/os/bpf/network-infra/
      - id: micro-behaviors/os/bpf/program/network/
      - id: micro-behaviors/os/bpf/program/loader/
  # Shell activation helper
  # NOTE: dup2 + execve is extremely common in legitimate programs.
  # Only suspicious in context of /bin/sh execution with fd redirection.
  - id: shell-activation
    desc: Shell execution components
    crit: notable
    conf: 0.6
    # Removed 'for: [elf, c]' as it matches file default
    all:
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
    any:
      - id: micro-behaviors/process/fd/dup::dup2
      - id: micro-behaviors/process/create/execv::c-execve
  # Protocol trigger helper
  - id: protocol-trigger
    desc: ICMP/UDP protocol triggers
    crit: notable
    conf: 0.6
    # Removed 'for: [elf, c]' as it matches file default
    any:
      - id: micro-behaviors/communications/ip/services::ipproto-icmp
      - id: micro-behaviors/communications/socket/udp::ipproto-udp
  # BPFDoor-style helper
  # Requires both shell activation AND protocol trigger to be suspicious
  - id: bpfdoor-activation
    desc: BPFDoor activation components
    crit: suspicious
    conf: 0.85
    # Removed 'for: [elf, c]' as it matches file default
    all:
      - id: shell-activation
      - id: protocol-trigger
  # BPFDoor-style backdoor (migrated from YARA)
  - id: bpfdoor-style
    desc: BPFDoor-style packet filter backdoor
    crit: suspicious
    conf: 0.9
    attack: "T1205"
    # Removed 'for: [elf, c]' as it matches file default
    all:
      - id: bpf-packet-inspection
      - id: bpfdoor-activation
  - id: icmp-bpf-trigger-build
    desc: ICMP BPF trigger module build
    crit: suspicious
    conf: 0.96
    for: [makefile]
    all:
      - id: micro-behaviors/os/kernel/module::linux-kbuild-module-build
      - id: icmp-module-obj
      - id: bpf-hook-module-obj
    any:
      - id: objectives/evasion/kernel-hide/lkm/rootkit::hiding-tcp-module-obj
      - id: objectives/evasion/kernel-hide/lkm/rootkit::hide-module-obj
