defaults:
  platforms: [macos, ios]
  for: [macho, c]
  attack: T1622
traits:
  - id: task-set-exception-ports
    desc: task_set_exception_ports API call
    crit: component
    if:
      type: symbol
      exact: task_set_exception_ports
  - id: thread-set-exception-ports
    desc: thread_set_exception_ports API call
    crit: component
    if:
      type: symbol
      exact: thread_set_exception_ports
  - id: mach-exception-id-2406
    desc: Mach exception ID 2406 (Predator channel)
    crit: component
    conf: 0.95
    if:
      type: hex
      # 0x966 (2406) -> 66 09 00 00
      pattern: "66 09 00 00"
      section: .text
    unless:
      - type: basename
        exact: libGLESv2.dylib
composite_rules:
  - id: mach-exception-handler
    desc: Registers Mach exception handler
    crit: suspicious
    any:
      - id: task-set-exception-ports
      - id: thread-set-exception-ports
  - id: mach-exception-hijack
    desc: Mach exception-based covert channel detected
    crit: hostile
    conf: 1.0
    all:
      - id: mach-exception-handler
      - id: mach-exception-id-2406
    unless:
      - id: micro-behaviors/os/kernel/routines::thread-get-state
      - id: micro-behaviors/os/kernel/routines::thread-set-state
      - id: well-known/lib/jvm
      - id: well-known/app/luau-lsp::luau-lsp-vsix-member
      - id: well-known/app/luau-lsp/
