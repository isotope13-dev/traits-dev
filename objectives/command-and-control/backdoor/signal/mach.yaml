# Mach exception-port C2 requires coordinated task and thread exception-port
# registration plus direct thread-state manipulation.  A single exception API
# is a normal crash-reporting/runtime capability and is defined in the neutral
# micro-behavior tier instead.
defaults:
  platforms: [macos, ios]
  for: [macho, c]
  attack: T1622

composite_rules:
- id: mach-exception-handler
  desc: Coordinates task and thread Mach exception ports
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/os/exception/register::task-set-exception-ports
  - id: micro-behaviors/os/exception/register::thread-set-exception-ports
  unless:
  - id: well-known/app/macos-benign::zed-official-signed-member

- id: mach-exception-hijack
  desc: Mach exception ports with thread-state manipulation
  crit: hostile
  conf: 0.98
  all:
  - id: mach-exception-handler
  - id: micro-behaviors/os/kernel/routines::thread-get-state
  - id: micro-behaviors/os/kernel/routines::thread-set-state
  unless:
  - id: well-known/app/macos-benign::zed-official-signed-member
