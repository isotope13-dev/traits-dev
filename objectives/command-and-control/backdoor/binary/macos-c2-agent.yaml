# macOS Native C2 Agent — curl + osascript + codesign resign + C2 protocol
# Detects a compiled macOS C2 agent that drops payloads to /private/tmp, re-signs
# them ad-hoc with codesign to satisfy Gatekeeper, and executes AppleScript via
# osascript. Combined with a legacy IE8 User-Agent and standard C2 JSON protocol.
# ATT&CK: T1071.001 (HTTP), T1059.002 (AppleScript), T1553.001 (Code Signing)
defaults:
  platforms:
    - macos
  for:
    - macho
  attack: T1071.001
composite_rules:
  - id: macos-native-c2-agent
    desc: macOS osascript/codesign C2 agent
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/evasion/security-bypass::codesign-force-adhoc
      - id: micro-behaviors/process/create/script::osascript-binary-ref
      - id: micro-behaviors/fs/temp/mktemp::mkstemps-fn
      - id: objectives/evasion/masquerade/identity::user-agent-msie8
    any:
      - id: objectives/discovery/host/system::apple-setup-done-ctime
      - id: well-known/malware/supply-chain/axios-hijack::rsp-peinject-protocol
    needs: 1
