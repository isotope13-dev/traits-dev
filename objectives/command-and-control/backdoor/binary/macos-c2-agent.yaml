# macOS Native C2 Agent — curl + osascript + codesign resign + C2 protocol
# Detects a compiled macOS C2 agent that drops payloads to /private/tmp, re-signs
# them ad-hoc with codesign to satisfy Gatekeeper, and executes AppleScript via
# osascript. Combined with a legacy IE8 User-Agent and standard C2 JSON protocol.
# Also detects nlohmann::json embedded C++ library (toolchain fingerprint) and
# POSIX ps process enumeration, both present in the axios/NukeSped Mach-O.
# ATT&CK: T1071.001 (HTTP), T1059.002 (AppleScript), T1553.001 (Code Signing)
defaults:
  platforms:
    - macos
  for:
    - macho
  attack: T1071.001
composite_rules:
  - id: macos-pty-socket-shell-backdoor
    desc: macOS PTY socket shell backdoor
    crit: hostile
    conf: 0.98
    attack: T1059,T1071
    mbc: B0009,C0001
    all:
      - id: micro-behaviors/process/tty/pty::openpty-call
      - id: micro-behaviors/process/create/execv::c-exec-variants
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/fd/dup::dup2
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/communications/socket/send::send-symbol
      - id: micro-behaviors/communications/socket/receive::recv-symbol
    unless:
      - id: micro-behaviors/dylib/library::terminal-editor-marker
      - id: micro-behaviors/dylib/library::debugger-tool-marker
      - id: metadata/binary/framework::terminal-emulator
  - id: macos-native-c2-agent
    desc: macOS osascript/codesign C2 agent
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/evasion/security-bypass::codesign-force-adhoc
      - id: micro-behaviors/process/create/script::osascript-binary-ref
      - id: micro-behaviors/fs/temp/mktemp::mkstemps-fn
      - id: objectives/evasion/masquerade/identity::user-agent-msie8
    any:
      - id: objectives/discovery/host/system::apple-setup-done-ctime
    needs: 1
  - id: macos-go-encrypted-http-implant
    desc: macOS Go encrypted HTTP implant
    crit: hostile
    conf: 0.96
    attack: T1071.001,T1059,T1573
    mbc: B0030,C0002,C0021.001
    all:
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: objectives/discovery/network/scan::external-recon-service
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
      - id: micro-behaviors/crypto/symmetric/aes::go-new-cipher-string
      - id: micro-behaviors/crypto/symmetric/aes::json-ciphertext-field
    any:
      - id: objectives/discovery/system/fingerprint::macos-command-host-fingerprint
      - id: objectives/persistence/system/launchd::launchd
    needs: 1
    unless:
      - id: metadata/signed/platform::apple
