# Simple POSIX Backdoor Logic
# Detects minimal bind shells that use socket+bind+dup2+system/exec pattern
defaults:
  platforms: [linux, unix, macos]
  for: [elf, macho, c, cpp]
  crit: hostile
  conf: 0.9
  attack: "T1059.004"
  mbc: "B0022"

composite_rules:
  - id: posix-bind-shell-source
    desc: C source bind shell (bind+dup2+system)
    for: [c, cpp]
    size_max: 500000
    near_lines: 80
    all:
      - id: micro-behaviors/communications/socket/bind::bind
      - id: micro-behaviors/communications/socket/listen::listen
      - id: micro-behaviors/process/fd/dup::dup2
    any:
      - id: micro-behaviors/process/create/shell::system-fn
      - id: micro-behaviors/process/create/shell::bin-sh
      - id: micro-behaviors/process/create/execv::c-execve
