defaults:
  platforms: [unix]
  for: [elf, macho]
  crit: hostile
  conf: 0.82
  attack: T1059

composite_rules:
  - id: socket-command-backdoor
    desc: Socket command backdoor surface
    all:
      - id: micro-behaviors/communications/socket/tcp::socket-io-api-surface
      - id: micro-behaviors/process/create/shell/spawn::system-symbol-text
      - id: micro-behaviors/process/create/execv::exec-variant-symbol-text
    unless:
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/tool/development/flow-bin/

  - id: accepting-command-backdoor
    desc: Accepting command backdoor surface
    all:
      - id: micro-behaviors/communications/socket/tcp::accepting-server-api-surface
      - id: micro-behaviors/process/create/shell/spawn::system-symbol-text
      - id: micro-behaviors/process/create/execv::exec-variant-symbol-text
    unless:
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/tool/development/flow-bin/

  - id: daemonized-socket-command-backdoor
    desc: Daemonized socket command backdoor
    all:
      - id: micro-behaviors/communications/socket/tcp::accepting-server-api-surface
      - id: micro-behaviors/process/create/shell/spawn::system-symbol-text
      - id: micro-behaviors/process/create/execv::exec-variant-symbol-text
      - id: micro-behaviors/process/create/setsid::symbol-text
    unless:
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/tool/development/flow-bin/

  - id: local-setuid-file-replacement-backdoor
    desc: Local setuid file replacement backdoor
    crit: suspicious
    conf: 0.86
    all:
      - id: micro-behaviors/process/identity/setuid::setuid-dup--setreuid
      - id: micro-behaviors/os/privilege/query::geteuid
      - id: micro-behaviors/fs/file/rename::rename
    unless:
      - id: metadata/binary/linking/runtime::musl-loader-basename
      - id: objectives/credential-access/dump/system/
  - id: local-setuid-checked-file-replacement
    desc: Checked setuid file replacement backdoor
    crit: suspicious
    conf: 0.88
    all:
      - id: local-setuid-file-replacement-backdoor
      - id: micro-behaviors/fs/file/stat::stat-exists
    unless:
      - id: metadata/binary/linking/runtime::musl-loader-basename
      - id: objectives/credential-access/dump/system/
