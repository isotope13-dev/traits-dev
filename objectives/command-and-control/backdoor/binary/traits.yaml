defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [binaries]
  attack: T1195.002
  mbc: B0025
traits:
  - id: high-entropy-strings-dup
    desc: Large obfuscated data blob
    crit: suspicious
    conf: 0.7
    if:
      type: metrics
      field: binary.high_entropy_strings
      min: 20
    unless:
      - type: metrics
        field: binary.avg_string_entropy
        max: 3.2
      - type: metrics
        field: binary.string_count
        min: 1000
      - id: metadata/binary/resource::kernel-driver-idata
    downgrade:
      all:
        - id: metadata/binary/metrics::many-imports
        - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-a
      any:
        - id: micro-behaviors/dylib/library/abi-graphics::opengl-ref-b
        - id: metadata/binary/metrics::many-exports-200
  - id: massive-code-blob
    desc: Extremely large average function size
    crit: component
    conf: 0.85
    if:
      type: metrics
      field: binary.avg_function_size
      min: 10000
    unless:
      - type: metrics
        field: binary.function_count
        max: 50
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: many-huge-functions
    desc: Many huge functions (>64KB) -
    crit: suspicious
    conf: 0.9
    if:
      type: metrics
      field: binary.huge_functions
      min: 4
  - id: xz-backdoor-entry
    desc: XZ backdoor entry pattern bytes
    crit: suspicious
    conf: 0.95
    for:
      - elf
    if:
      type: hex
      section: .text
      pattern: F3 0F 1E FA 55 48 89 E5 48 89 7D D8 48 C7 45 E8
  - id: lzma-crc64-table
    desc: lzma_crc64_table reference
    crit: notable
    conf: 0.4
    if:
      type: text
      substr: lzma_crc64_table
  - id: xz-obf-pattern
    desc: XZ obfuscated function marker bytes
    crit: notable
    conf: 0.7
    for:
      - elf
    if:
      type: hex
      section: .text
      pattern: 0F B6 ?? ?? 0F B6 ?? ?? 31 ?? 0F B6 ?? ?? 31
  - id: xz-cpuid-mask-check
    desc: XZ backdoor CPUID mask
    crit: suspicious
    conf: 0.95
    for:
      - elf
    if:
      type: hex
      section: .text
      pattern: 0F A2 F7 D1 81 E1 02 02 08 00
  - id: libsystemd-ref
    desc: libsystemd reference
    crit: notable
    conf: 0.4
    if:
      type: text
      substr: libsystemd
  - id: mm-answer-keyallowed
    desc: mm_answer_keyallowed SSH function
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      exact: mm_answer_keyallowed
    for: [elf, macho, so]
    unless:
      - type: basename
        regex: '\.o$'
  - id: mm-answer-authpassword
    desc: mm_answer_authpassword SSH function
    crit: suspicious
    conf: 0.8
    if:
      type: symbol
      exact: mm_answer_authpassword
    for: [elf, macho, so]
    unless:
      - type: basename
        regex: '\.o$'
  - id: pubkey-auth-ref
    desc: pubkey_auth reference
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: pubkey_auth
    unless:
      - type: basename
        regex: '\.o$'
  - id: rtld-global-ref
    desc: __rtld_global reference
    crit: notable
    conf: 0.6
    for:
      - elf
    if:
      type: text
      substr: __rtld_global
  - id: la-symbind-ref
    desc: la_symbind audit hook
    crit: notable
    conf: 0.7
    for:
      - elf
    if:
      type: text
      substr: la_symbind
    unless:
      - id: objectives/evasion/hijack-execution-flow/linker::dynamic-linker-binary
  - id: plaintext-exec-command-token
    desc: Plaintext exec command token
    crit: component
    conf: 0.55
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      word: exec
  - id: plaintext-sleep-command-token
    desc: Plaintext sleep command token
    crit: component
    conf: 0.55
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      word: sleep
  - id: plaintext-hello-beacon-token
    desc: Plaintext hello beacon token
    crit: component
    conf: 0.55
    platforms:
      - windows
    for:
      - pe
      - dll
    if:
      type: text
      word: hello
composite_rules:
  - id: symbol-interposition
    desc: Symbol interposition/override pattern
    crit: suspicious
    conf: 0.7
    for:
      - elf
    all:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
    any:
      - id: micro-behaviors/dylib/lookup::rtld-next
    downgrade:
      any:
        - type: basename
          regex: ^libc\.so(\.[0-9]+)*$
  - id: xz-crc-pattern
    desc: XZ CRC64 patterns
    crit: suspicious
    conf: 0.6
    for:
      - elf
    needs: 2
    any:
      - id: lzma-crc64-table
      - id: metadata/binary/linking::ifunc
  - id: xz-backdoor-signature
    desc: XZ Utils backdoor signature (CVE-2024-3094)
    crit: hostile
    conf: 0.99
    for:
      - elf
    all:
      - id: xz-crc-pattern
    any:
      - id: xz-backdoor-entry
      - id: xz-obf-pattern
  - id: xz-ifunc-pattern
    desc: IFUNC resolver pattern (potential function
    crit: notable
    conf: 0.4
    for:
      - elf
    all:
      - id: metadata/binary/instruction::cpuid-instr
      - id: metadata/binary/linking::resolver-markers
      - id: metadata/binary/linking::ifunc-markers
  - id: rsa-in-compression-lib
    desc: RSA operations in compression library
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/crypto/asymmetric/rsa::rsa-operations
      - id: metadata/library/compression::compression-lib
  - id: ssh-hook-pattern
    desc: SSH authentication hooking pattern
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/os/service/remote::sshd-ref
    any:
      - id: micro-behaviors/crypto/asymmetric/rsa::rsa-public-decrypt
      - id: mm-answer-keyallowed
      - id: mm-answer-authpassword
      - id: pubkey-auth-ref
    unless:
      - id: metadata/signed/platform::apple
    downgrade:
      any:
        - id: micro-behaviors/communications/ssh/connect::openssh
        - type: basename
          regex: ^ssh(-.+)?(\.exe)?$
  - id: glibc-hijack
    desc: glibc function hijacking patterns
    crit: suspicious
    conf: 0.7
    for:
      - elf
    all:
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
    any:
      - id: rtld-global-ref
      - id: la-symbind-ref
      - id: micro-behaviors/os/linker/env::ld-preload
      - id: micro-behaviors/os/linker/env::ld-audit
    downgrade:
      any:
        - id: micro-behaviors/dylib/library::graphics-lib-marker
        - id: micro-behaviors/dylib/library::system-lib-marker
  - id: benign-network-client-context
    desc: Benign network-capable utility context
    crit: baseline
    conf: 0.9
    any:
      - id: metadata/package::has-help
      - id: micro-behaviors/communications/http/lib::hyper-crate
      - id: micro-behaviors/communications/http/request::user-agent-header
  - id: benign-network-library-context
    desc: Benign network-capable library context
    crit: baseline
    conf: 0.9
    any:
      - id: micro-behaviors/dylib/library
  - id: unexpected-socket-ops
    desc: Socket operations in non-network library
    crit: notable
    conf: 0.6
    all:
      - id: micro-behaviors/communications/socket/create::create
      - id: micro-behaviors/communications/socket/connect::connect
    unless:
      - id: benign-network-library-context
      - id: metadata/lang/compiled::go-runtime-marker
      - id: metadata/signed/platform::apple
    downgrade:
      any:
        - id: benign-network-client-context
  - id: plaintext-command-vocabulary
    desc: Plaintext command protocol vocabulary
    crit: suspicious
    conf: 0.82
    platforms:
      - windows
    for:
      - pe
      - dll
    needs: 3
    any:
      - id: plaintext-exec-command-token
      - id: plaintext-sleep-command-token
      - id: plaintext-hello-beacon-token
    unless:
      - type: text
        substr: '{"!": 0, "\"": 1'
  - id: winsock-command-exec-backdoor
    desc: Winsock command execution backdoor
    crit: hostile
    conf: 0.94
    platforms:
      - windows
    for:
      - pe
      - dll
    all:
      - id: micro-behaviors/communications/socket/init::winsock-client-lifecycle
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: plaintext-command-vocabulary
    any:
      - id: micro-behaviors/process/sync/mutex::mutex-api
      - id: micro-behaviors/time/timing/delay::sleep-dup
  - id: unexpected-process-ops
    desc: Process operations in utility library
    crit: suspicious
    conf: 0.75
    needs: 2
    any:
      - id: micro-behaviors/process/fork/clone::fork
      - id: micro-behaviors/process/create/shell/
    unless:
      - id: metadata/lang/compiled::go-runtime-marker
      - id: micro-behaviors/dylib/library
      - id: metadata/lang/compiler/native::libllvm
      - id: metadata/signed/platform::apple
      - id: micro-behaviors/os/security/sandbox::pledge
    downgrade:
      any:
        - id: metadata/package::has-help
        - id: metadata/binary/metrics::many-imports
  - id: unexpected-crypto
    desc: Cryptographic operations in non-crypto library
    crit: suspicious
    conf: 0.75
    needs: 2
    any:
      - id: micro-behaviors/crypto/symmetric/aes::aes-sbox-bytes
      - id: micro-behaviors/crypto/asymmetric/rsa::rsa-operations
      - id: micro-behaviors/crypto/asymmetric/rsa::ed25519-constant-bytes
    unless:
      - id: micro-behaviors/dylib/library/ssl::libcrypto-ref
      - id: metadata/vendor/openssl::openssl-project-copyright
    downgrade:
      any:
        - type: metrics
          field: binary.section_count
          min: 20
  - id: unexpected-capabilities
    desc: Unexpected capability combination in library
    crit: suspicious
    conf: 0.8
    needs: 2
    any:
      - id: unexpected-socket-ops
      - id: unexpected-process-ops
      - id: unexpected-crypto
  - id: injected-code-pattern
    desc: Injected code pattern in library
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/command-and-control/backdoor/binary::high-entropy-strings-dup
    any:
      - id: unexpected-crypto
      - id: unexpected-socket-ops
  - id: packed-rust-http-ws-c2
    desc: Packed Rust HTTP/WebSocket C2 implant
    crit: hostile
    conf: 0.95
    for:
      - pe
    platforms:
      - windows
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::binary-encrypted-overlay
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
    needs: 2
    any:
      - id: micro-behaviors/communications/http/lib::reqwest-crate
      - id: micro-behaviors/communications/http/lib::hyper-crate
      - id: micro-behaviors/communications/http/websocket::websocket-class
      - id: micro-behaviors/os/registry/access::internet-settings-key
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
      - id: objectives/anti-static/obfuscation/binary-metrics::signed-7zsfx-installer
  - id: packed-rust-proxy-aware-ws-c2
    desc: Packed Rust proxy-aware WebSocket implant
    crit: hostile
    conf: 0.96
    attack: T1090
    for:
      - pe
    platforms:
      - windows
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics::binary-encrypted-overlay
      - id: objectives/evasion/indicator-removal/timestamps::timestamp-anomaly
      - id: micro-behaviors/communications/proxy/tunnel::windows-http-proxy-tunnel
    needs: 2
    any:
      - id: micro-behaviors/communications/http/lib::reqwest-crate
      - id: micro-behaviors/communications/http/lib::hyper-crate
      - id: micro-behaviors/communications/http/websocket::websocket-class
      - id: micro-behaviors/os/registry/access::internet-settings-key
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer::known-benign-installer
      - id: objectives/anti-static/obfuscation/binary-metrics::signed-7zsfx-installer
  - id: xz-style-attack
    desc: XZ-style supply chain backdoor pattern
    crit: suspicious
    conf: 0.9
    all:
      - id: many-huge-functions
    any:
      - id: xz-crc-pattern
      - id: xz-obf-pattern
      - id: ssh-hook-pattern
      - id: rsa-in-compression-lib
  - id: potential-code-injection
    desc: Potential code injection indicators
    crit: suspicious
    conf: 0.8
    all:
      - id: massive-code-blob
    any:
      - id: many-huge-functions
      - id: glibc-hijack
  - id: auth-bypass-indicator
    desc: Authentication bypass backdoor indicator
    crit: suspicious
    conf: 0.95
    any:
      - id: ssh-hook-pattern
      - id: rsa-in-compression-lib
      - id: symbol-interposition
  - id: function-hooking-behavior
    desc: Dynamic function hooking patterns
    crit: suspicious
    conf: 0.8
    all:
      - id: glibc-hijack
    any:
      - id: symbol-interposition
      - id: rtld-global-ref
      - id: la-symbind-ref
  - id: rwx-with-injection
    desc: RWX memory protection with code
    crit: suspicious
    conf: 0.75
    all:
      - id: micro-behaviors/mem/protect/modify::rwx-prot-bytes
    any:
      - id: glibc-hijack
      - id: symbol-interposition
      - id: objectives/command-and-control/backdoor/binary::high-entropy-strings-dup
    downgrade:
      any:
        - type: basename
          regex: ^libc\.so(\.[0-9]+)*$
  - id: compression-lib-backdoor
    desc: Compression library with hidden payload and geofencing
    crit: hostile
    conf: 0.95
    for:
      - elf
    all:
      - id: metadata/library/compression::compression-lib
      - id: micro-behaviors/data/embedded/payload::multiple-compressed-payloads
    any:
      - id: objectives/evasion/masquerade/naming/
      - id: objectives/anti-analysis/geofencing/location::cis-timezone
  - id: compression-lib-embedded-binary
    desc: Compression library with embedded executable
    crit: hostile
    conf: 0.95
    for:
      - elf
    all:
      - id: metadata/library/compression::compression-lib
    any:
      - id: micro-behaviors/data/embedded/payload::elf-magic-embedded
      - id: micro-behaviors/data/embedded/payload::pe-magic-embedded
    unless:
      - id: metadata/library/compression::archive-lib
  - id: library-payload-geofencing
    desc: Library with embedded payload and geofencing
    crit: suspicious
    conf: 0.85
    for:
      - elf
    all:
      - id: micro-behaviors/data/embedded/payload::multiple-compressed-payloads
      - id: objectives/anti-analysis/geofencing/location::cis-geofencing
  - id: compression-lib-backdoor-cpuid
    desc: Compression library with hidden payload and suspicious CPUID
    crit: hostile
    conf: 0.95
    for:
      - elf
    all:
      - id: metadata/library/compression::compression-lib
      - id: micro-behaviors/data/embedded/payload::multiple-compressed-payloads
      - id: xz-cpuid-mask-check
