defaults:
  platforms: [unix]
  for: [elf, macho]
  crit: hostile
  conf: 0.82
  attack: T1059

traits:
  - id: system-fn-backdoor-component
    desc: Native backdoor shell-call component
    crit: component
    conf: 0.9
    if:
      id: micro-behaviors/process/create/shell/spawn::system-fn
    unless:
      - id: well-known/lib/htcondor/

composite_rules:
  - id: socket-command-backdoor
    desc: Socket command backdoor surface
    all:
      - id: micro-behaviors/communications/socket/create::posix-socket-import
      - id: micro-behaviors/communications/socket/receive::recv-symbol
      - id: micro-behaviors/communications/socket/send::send-symbol
      - id: system-fn-backdoor-component
      - id: micro-behaviors/process/create/execv::exec-variant-symbol-text
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
    unless:
      - id: well-known/tool/sysadmin/network::socat-utility
      - id: well-known/tool/development/gnu-awk::gawk-binary
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/tool/development/flow-bin/
      - id: well-known/app/godot::godot-native-runtime
      - id: well-known/app/anthropic-claude-code::native-linux-cli-member
      - id: well-known/app/falco::falco-monitoring-context
      - id: well-known/tool/reverse-engineering/gdb::gdb-debugger-context

  - id: accepting-command-backdoor
    desc: Accepting command backdoor surface
    all:
      - id: micro-behaviors/communications/socket/listen::accepting-server-api-surface
      - id: system-fn-backdoor-component
      - id: micro-behaviors/process/create/execv::exec-variant-symbol-text
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
    unless:
      - id: well-known/tool/sysadmin/network::socat-utility
      - id: well-known/tool/development/gnu-awk::gawk-binary
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/tool/development/flow-bin/
      - id: well-known/app/godot::godot-native-runtime
      - id: well-known/app/anthropic-claude-code::native-linux-cli-member
      - id: well-known/app/falco::falco-monitoring-context
      - id: well-known/tool/reverse-engineering/gdb::gdb-debugger-context

  - id: daemonized-socket-command-backdoor
    desc: Daemonized socket command backdoor
    all:
      - id: micro-behaviors/communications/socket/listen::accepting-server-api-surface
      - id: system-fn-backdoor-component
      - id: micro-behaviors/process/create/execv::exec-variant-symbol-text
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
      - id: micro-behaviors/process/daemonize/detach::setsid-import
    unless:
      - id: well-known/tool/sysadmin/network::socat-utility
      - id: well-known/tool/development/gnu-awk::gawk-binary
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/tool/development/flow-bin/
      - id: well-known/app/godot::godot-native-runtime
      - id: well-known/app/anthropic-claude-code::native-linux-cli-member
      - id: well-known/tool/reverse-engineering/gdb::gdb-debugger-context

  - id: vless-upnp-native-backdoor
    desc: Native VLESS proxy with UPnP exposure
    crit: hostile
    conf: 0.98
    attack: T1090,T1105
    all:
      - id: micro-behaviors/communications/proxy/vless::native-vless-websocket-marker
      - id: micro-behaviors/communications/http/request/upnp::add-port-mapping-soap
      - id: micro-behaviors/os/syscall/raw::raw-network-syscalls

  - id: local-setuid-file-replacement-backdoor
    desc: Local setuid file replacement backdoor
    crit: suspicious
    conf: 0.86
    all:
      - id: micro-behaviors/process/identity/setuid::setuid-dup--setreuid
      - id: micro-behaviors/os/privilege/query::geteuid
      - id: micro-behaviors/fs/file/rename::rename
    unless:
      - id: metadata/binary/linking/runtime::musl-loader-basename
      - id: metadata/package/files/included::so-extension-basename
      - id: well-known/lib/bun-runtime/
      - id: well-known/app/kilocode::kilo-code-native-runtime
      - id: well-known/app/opencode::opencode-bun-runtime
      - id: objectives/credential-access/dump/system/
      - id: well-known/tool/sysadmin/container::podman-distribution
      - id: metadata/package/files/dependency::os-image-root-file-path
      - id: well-known/lib/sap-hana/
  - id: local-setuid-checked-file-replacement
    desc: Checked setuid file replacement backdoor
    crit: suspicious
    conf: 0.88
    all:
      - id: local-setuid-file-replacement-backdoor
      - id: micro-behaviors/fs/file/stat::stat-exists
    unless:
      - id: metadata/binary/linking/runtime::musl-loader-basename
      - id: metadata/package/files/included::so-extension-basename
      - id: well-known/lib/bun-runtime/
      - id: well-known/app/kilocode::kilo-code-native-runtime
      - id: well-known/app/opencode::opencode-bun-runtime
      - id: objectives/credential-access/dump/system/
      - id: well-known/tool/sysadmin/container::podman-distribution
      - id: metadata/package/files/dependency::os-image-root-file-path
      - id: well-known/lib/sap-hana/
