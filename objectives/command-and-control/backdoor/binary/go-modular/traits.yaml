defaults:
  platforms: [windows, unix]
  for: [binaries]
  attack: T1105
traits:
- id: register-heartbeat-protocol
  desc: Go RAT register heartbeat protocol
  crit: component
  conf: 0.92
  if:
    type: text
    regex: \b(SendRegister|SendHeartbeat)\b
- id: module-command-handler
  desc: Go RAT module command handler
  crit: component
  conf: 0.92
  if:
    type: text
    regex: \b(executeModuleCommand|module_cmd|RegisterModule)\b
- id: shell-command-handler
  desc: Go RAT shell command handler
  crit: component
  conf: 0.92
  if:
    type: text
    regex: \b(executeShellCommand|SendOutput)\b
- id: surveillance-modules
  desc: Go RAT surveillance modules
  crit: suspicious
  conf: 0.94
  count_min: 2
  if:
    type: text
    regex: \b(KeyloggerModule|ClipboardModule|ScreenshotModule|FingerprintModule)\b
- id: operator-module-set--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    regex: \b(CredStealerModule|FileOpsModule)\b
- id: operator-module-set--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    regex: \b(InjectorModule|PersistModule)\b
- id: operator-module-set--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    regex: \b(UACModule)\b
composite_rules:
- id: go-modular-rat-implant
  desc: Go modular RAT implant
  crit: hostile
  conf: 0.98
  all:
  - id: register-heartbeat-protocol
  - id: module-command-handler
  - id: shell-command-handler
  any:
  - id: surveillance-modules
  - id: operator-module-set
- id: operator-module-set
  desc: Go RAT operator module set
  crit: suspicious
  conf: 0.94
  any:
  - id: operator-module-set--rx-1
  - id: operator-module-set--rx-2
  - id: operator-module-set--rx-3
  needs: 1
