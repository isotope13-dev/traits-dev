defaults:
  for: [pe]
  platforms: [windows]
  attack: T1071
  mbc: C0002

composite_rules:
  - id: packed-autoit-socket-backdoor-wrapper
    desc: Packed AutoIt dual network wrapper
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics/section-names::packed-autoit-encrypted-resource
      - id: micro-behaviors/communications/socket/init::wsock32-dll-marker
      - id: micro-behaviors/process/create/spawn::create-process-w
    any:
      - id: micro-behaviors/communications/http/get::wininet-http-flow
      - id: micro-behaviors/os/network/share::wnet-share-connect-cycle
      - id: micro-behaviors/ui/window/manage::block-input-import
      - id: micro-behaviors/hardware/input/keyboard::get-async-key-state
    needs: 2
  - id: packed-autoit-network-capable-wrapper
    desc: Packed AutoIt network-capable wrapper
    crit: suspicious
    conf: 0.94
    all:
      - id: metadata/lang/compiled::autoit-compiled-script
      - id: micro-behaviors/fs/path/location::roaming-appdata-executable-path
    any:
      - id: micro-behaviors/communications/http/get::wininet-dll-import-name
      - id: micro-behaviors/communications/socket/init::wsock32-dll-marker
      - id: micro-behaviors/os/network/share::wnet-add-connection
      - id: metadata/binary/metrics::dominant-section
      - id: metadata/hardening/memory::wx-section
      - id: metadata/binary/symbols::few-import-count
    needs: 4
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
