defaults:
  for: [oledoc]
  platforms: [windows]
  attack: T1219

traits:
- id: screenconnect-msi-relay-launch-url
  desc: ScreenConnect relay launch URL
  crit: component
  conf: 0.98
  if:
    type: raw
    regex: \?h=[a-z0-9-]+-relay\.screenconnect\.com(&amp;|&)p=443
- id: screenconnect-msi-launch-constraint
  desc: ScreenConnect constrained launch config
  crit: component
  conf: 0.96
  if:
    type: raw
    substr: ScreenConnect.ApplicationSettings
- id: screenconnect-msi-access-mode
  desc: ScreenConnect access session mode
  crit: component
  conf: 0.93
  if:
    type: raw
    substr: SERVICE_CLIENT_LAUNCH_PARAMETERS?e=Access
- id: screenconnect-msi-backstage-shell
  desc: ScreenConnect backstage shell payload
  crit: component
  conf: 0.96
  if:
    type: raw
    substr: ProcessExecutablePathsToTerminate=[INSTALLLOCATION]ScreenConnect.WindowsBackstageShell.exe
- id: screenconnect-msi-credential-storage
  desc: ScreenConnect credential storage UI
  crit: component
  conf: 0.94
  if:
    type: raw
    substr: Store credentials to enter on the logon screen later

composite_rules:
- id: screenconnect-msi-relay-service
  desc: ScreenConnect relay service installer
  crit: suspicious
  conf: 0.99
  all:
  - id: metadata/binary/installer/database::msi-installer-raw
  - id: screenconnect-msi-launch-constraint
  - id: screenconnect-msi-relay-launch-url
  - id: objectives/persistence/system/service/install::msi-service-wrapper-binaries
  any:
  - id: screenconnect-msi-access-mode
  - id: screenconnect-msi-backstage-shell
- id: screenconnect-msi-remote-access-backdoor
  desc: ScreenConnect remote access backdoor
  crit: hostile
  conf: 0.99
  all:
  - id: screenconnect-msi-relay-service
  - id: objectives/persistence/login/winlogon/credential-provider::msi-credential-provider-persistence
  any:
  - id: screenconnect-msi-backstage-shell
  - id: screenconnect-msi-credential-storage
