defaults:
  platforms:
    - unix
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.9
traits:
  - id: suspicious-hidden-log
    desc: Hidden log file under /var/log
    if:
      type: text
      regex: /var/log/\.[a-z]{3,12}\b
  - id: suspicious-tmp-log
    desc: Log file dropped in /var/tmp
    if:
      type: text
      regex: /var/tmp/[a-z]{3,12}\.(log|l|txt)$
