defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
  mbc: B0024
traits:
  - id: go-socks-proxy-module
    desc: Go SOCKS proxy module reference
    crit: suspicious
    conf: 0.9
    mbc: B0030
    attack: T1090.001
    for:
      - go
    if:
      type: string_literal
      regex: socks5Quick|socksProxy|proxy/socks
  - id: go-port-forward-inforward
    desc: Go inForward port forwarding module
    crit: suspicious
    conf: 0.9
    attack: T1090
    if:
      type: text
      regex: inForward\.(Start|Stop|addTask)
  - id: go-port-forward-portforward
    desc: Go portForward module
    crit: suspicious
    conf: 0.9
    attack: T1090
    if:
      type: text
      exact: portForward
  - id: go-port-forward-tunnelforward
    desc: Go tunnelForward module
    crit: suspicious
    conf: 0.9
    attack: T1090
    if:
      type: text
      exact: tunnelForward
  - id: go-clean-history-cleanhistory
    desc: Go history cleaning function
    crit: suspicious
    conf: 0.95
    for:
      - go
    attack: T1070.003
    if:
      type: string_literal
      exact: CleanHistory
  - id: go-clean-history-clearhistory
    desc: Go history cleaning function
    crit: suspicious
    conf: 0.95
    for:
      - go
    attack: T1070.003
    if:
      type: string_literal
      exact: clearHistory
  - id: go-clean-history-historyclear
    desc: Go history cleaning function
    crit: suspicious
    conf: 0.95
    for:
      - go
    attack: T1070.003
    if:
      type: string_literal
      exact: HistoryClear
  - id: go-timestomp-change-self-time
    desc: Go timestomping function
    crit: suspicious
    conf: 0.95
    attack: T1070.006
    if:
      type: text
      exact: ChangeSelfTime
  - id: go-timestomp-modify-timestamp
    desc: Go timestomping function
    crit: suspicious
    conf: 0.95
    attack: T1070.006
    if:
      type: symbol
      exact: modifyTimestamp
  - id: go-timestomp-touch-time
    desc: Go timestomping function
    crit: suspicious
    conf: 0.95
    attack: T1070.006
    if:
      type: text
      exact: TouchTime
  - id: go-file-utils
    desc: Go file transfer utilities
    crit: suspicious
    conf: 0.85
    attack: T1105
    if:
      type: text
      regex: utils\.(Upload|Download|SendDataByPost)
  - id: go-system-recon-method-name
    desc: Go RAT system information method name
    crit: component
    conf: 0.85
    attack: T1082
    if:
      type: text
      regex: (getSystemInfo|UpdateSysteminfo|makeSystemInfo)
  - id: go-dir-enum-get-dir-list
    desc: Directory enumeration method name
    crit: suspicious
    conf: 0.8
    attack: T1083
    if:
      type: text
      exact: GetDirList
  - id: go-dir-enum-list-directory
    desc: Directory enumeration method name
    crit: suspicious
    conf: 0.8
    attack: T1083
    if:
      type: text
      exact: ListDirectory
  - id: go-dir-enum-read-dir
    desc: Go directory enumeration
    crit: suspicious
    conf: 0.8
    attack: T1083
    for:
      - go
    if:
      type: string_literal
      exact: ReadDir
  - id: interactive-shell-string-interactive
    desc: Interactive shell mode strings
    crit: suspicious
    conf: 0.85
    if:
      type: text
      exact: interactive_shell
    unless:
      - id: metadata/file::system-shell-basename
  - id: interactive-shell-string-exec-shell
    desc: Interactive shell mode strings
    crit: suspicious
    conf: 0.85
    if:
      type: text
      exact: Exec_shell
  - id: interactive-shell-string-execshell
    desc: Interactive shell mode strings
    crit: suspicious
    conf: 0.85
    if:
      type: text
      exact: execShell
  - id: socket-quick-control
    desc: Socket quick control functions
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: socket_quick_(start|stop)
composite_rules:
  - id: go-system-recon
    desc: Go RAT system information gathering
    crit: suspicious
    conf: 0.85
    attack: T1082
    all:
      - id: go-system-recon-method-name
    any:
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::go-version-string
      - id: metadata/lang/compiled::go-runtime-marker
  - id: go-port-forward-module
    desc: Go port forwarding module
    crit: suspicious
    conf: 0.9
    attack: T1090
    any:
      - id: go-port-forward-inforward
      - id: go-port-forward-direct
  - id: go-port-forward-direct
    desc: Go portForward/tunnelForward module
    crit: suspicious
    conf: 0.9
    attack: T1090
    any:
      - id: go-port-forward-portforward
      - id: go-port-forward-tunnelforward
  - id: go-rat-shell-proxy
    desc: Go RAT with shell and SOCKS proxy
    crit: hostile
    conf: 0.98
    attack: T1059.004
    all:
      - id: interactive-shell-string
      - id: go-socks-proxy-module
      - id: micro-behaviors/process/create/shell::go-shell-strings
  - id: go-rat-full
    desc: Go RAT with full C2 capabilities
    crit: hostile
    conf: 0.98
    attack: T1059.004
    all:
      - id: interactive-shell-string
      - id: go-file-utils
      - id: go-system-recon
      - id: micro-behaviors/process/create/shell::go-shell-strings
  - id: go-rat-antiforensics
    desc: Go RAT with anti-forensics capabilities
    crit: hostile
    conf: 0.98
    attack: T1070
    all:
      - id: interactive-shell-string
      - id: go-clean-history
      - id: micro-behaviors/process/create/shell::go-shell-strings
  - id: go-rat-timestomp
    desc: Go RAT with timestomping
    crit: hostile
    conf: 0.98
    attack: T1070.006
    all:
      - id: interactive-shell-string
      - id: go-timestomp
      - id: micro-behaviors/process/create/shell::go-shell-strings
  - id: go-implant-proxy-transfer
    desc: Go implant with proxy and file transfer
    crit: hostile
    conf: 0.95
    mbc: B0030
    attack: T1090.001
    all:
      - id: go-socks-proxy-module
      - id: go-file-utils
      - id: micro-behaviors/process/create/shell::go-shell-strings
  - id: go-clean-history
    desc: Go history cleaning function
    crit: suspicious
    conf: 0.95
    attack: T1070.003
    any:
      - id: go-clean-history-cleanhistory
      - id: go-clean-history-clearhistory
      - id: go-clean-history-historyclear
  - id: go-timestomp
    desc: Go timestomping function
    crit: suspicious
    conf: 0.95
    attack: T1070.006
    any:
      - id: go-timestomp-change-self-time
      - id: go-timestomp-modify-timestamp
      - id: go-timestomp-touch-time
  - id: go-dir-enum
    desc: Go directory enumeration
    crit: suspicious
    conf: 0.8
    attack: T1083
    any:
      - id: go-dir-enum-get-dir-list
      - id: go-dir-enum-list-directory
      - id: go-dir-enum-read-dir
  - id: interactive-shell-string
    desc: Interactive shell mode strings
    crit: suspicious
    conf: 0.85
    any:
      - id: interactive-shell-string-interactive
      - id: interactive-shell-string-exec-shell
      - id: interactive-shell-string-execshell
