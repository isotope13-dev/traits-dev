defaults:
  platforms: [android]
  for: [apk, zip]

traits:
  - id: android-registration-paths
    desc: Android registration protocol paths
    crit: component
    conf: 0.94
    count_min: 3
    if:
      type: text
      regex: ":3030/reg[A-Za-z]{2,12}"

  - id: android-heartbeat-path
    desc: Android heartbeat protocol path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: ":3030/heart[a-z]{4}"

  - id: android-tcp-worker-threads
    desc: Android TCP worker threads
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: "(Heartbeat-Loop|ScreenInfo-Loop|TCP-Worker)"

  - id: android-transaction-telemetry-fields
    desc: Android transaction telemetry fields
    crit: component
    conf: 0.94
    count_min: 3
    if:
      type: text
      regex: "(pinDigits|transactionType|reqJsonRaw)"

  - id: android-rat-packet-class
    desc: Android RAT packet class
    crit: component
    conf: 0.84
    if:
      type: text
      substr: "PacketClass"

  - id: android-rat-encryption-class
    desc: Android RAT encryption class
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "EncryptionCUtils"

  - id: android-encoded-external-ipv4
    desc: Encoded Android external IPv4
    crit: suspicious
    conf: 0.9
    if:
      type: encoded
      encoding: base64
      regex: "^([0-9]{1,3}\\.){3}[0-9]{1,3}$"
      is: external_ip

composite_rules:
  - id: android-encrypted-socket-rat
    desc: Android encrypted socket RAT
    crit: hostile
    conf: 0.97
    all:
      - id: android-rat-packet-class
      - id: android-rat-encryption-class
      - id: micro-behaviors/communications/socket/create::android-secondary-socket-class
    any:
      - id: android-encoded-external-ipv4
      - id: micro-behaviors/communications/socket/create::java-socket-bytecode-reference
      - id: micro-behaviors/communications/socket/create::java-datagram-socket-bytecode-reference
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-service-config

  - id: android-transaction-control-protocol
    desc: Android transaction control protocol
    crit: suspicious
    conf: 0.96
    all:
      - id: android-registration-paths
      - id: android-heartbeat-path
      - id: android-transaction-telemetry-fields
    any:
      - id: android-tcp-worker-threads
      - id: micro-behaviors/communications/socket/create::java-socket-bytecode-reference
      - id: micro-behaviors/communications/ip::external-ipv4-android-apk
