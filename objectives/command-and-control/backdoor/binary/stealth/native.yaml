defaults:
  platforms:
    - linux
    - unix
    - android
  for:
    - elf
  mbc: B0030
traits:
  - id: socks5h-proto
    desc: SOCKS5h protocol string
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: socks5h
  - id: socks4a-proto
    desc: SOCKS4a protocol string
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: socks4a
  - id: onion-domain-handling
    desc: Tor onion domain handling
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: '[a-z2-7A-Z0-9][\w-]*\.onion$'
  - id: libcurl-version
    desc: libcurl version string
    crit: notable
    conf: 0.95
    if:
      type: string_value
      regex: libcurl [0-9]+\.[0-9]+\.[0-9]+
  - id: musl-libc-triple
    desc: musl libc target triple
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: x86_64-[a-z]+-linux-musl
    unless:
      - id: metadata/lang/compiler/systems::rust-binary
  - id: alpine-gcc
    desc: Alpine GCC build indicator
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: 'GCC: \(Alpine [0-9]+\.[0-9]+\.[0-9]+\)'
  - id: min-max-threads
    desc: Thread pool configuration strings
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: '(min|max) threads: %u'
    downgrade:
      any:
        - id: metadata/vendor/openssl::openssl-version-symbol
  - id: websocket-headers
    desc: WebSocket protocol headers
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: Sec-WebSocket-(Key|Version)
  - id: http-connect-proxy
    desc: HTTP CONNECT proxy tunneling
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: HTTP CONNECT
    downgrade:
      any:
        - id: metadata/vendor/openssl::openssl-version-symbol
  - id: openssl-chacha-poly
    desc: OpenSSL ChaCha20-Poly1305
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: ChaCha20-Poly1305
    downgrade:
      any:
        - id: metadata/vendor/openssl::openssl-version-symbol
  - id: ecdh-compute-key
    desc: ECDH_compute_key reference
    crit: notable
    conf: 0.9
    if:
      type: string_value
      exact: ECDH_compute_key
    downgrade:
      any:
        - id: metadata/vendor/openssl::openssl-version-symbol
  - id: ec-key-generate-key
    desc: EC_KEY_generate_key reference
    crit: notable
    conf: 0.9
    if:
      type: string_value
      exact: EC_KEY_generate_key
    downgrade:
      any:
        - id: metadata/vendor/openssl::openssl-version-symbol
composite_rules:
  - id: ecdh-key-exchange
    desc: ECDH key exchange functions
    crit: notable
    conf: 0.9
    any:
      - id: ecdh-compute-key
      - id: ec-key-generate-key
  - id: native-tor-implant
    desc: Native C2 implant with Tor
    crit: hostile
    conf: 0.95
    attack: T1572
    all:
      - id: socks5h-proto
      - id: onion-domain-handling
      - id: libcurl-version
      - id: ecdh-key-exchange
  - id: native-alpine-implant
    desc: Alpine static implant with SOCKS
    crit: hostile
    conf: 0.93
    attack: T1090
    all:
      - id: musl-libc-triple
      - id: alpine-gcc
      - id: socks5h-proto
      - id: ecdh-key-exchange
  - id: native-crypto-proxy-implant
    desc: Native crypto proxy implant
    crit: hostile
    conf: 0.92
    attack: T1573
    all:
      - id: libcurl-version
      - id: ecdh-key-exchange
      - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
    any:
      - id: socks5h-proto
      - id: socks4a-proto
      - id: onion-domain-handling
      - id: http-connect-proxy
  - id: native-websocket-implant
    desc: Native WebSocket C2 implant
    crit: hostile
    conf: 0.9
    attack: T1071.001
    all:
      - id: websocket-headers
      - id: libcurl-version
      - id: ecdh-key-exchange
    any:
      - id: socks5h-proto
      - id: onion-domain-handling
      - id: openssl-chacha-poly
