defaults:
  platforms: [android]
  for: [elf]
  attack: T1071
  mbc: B0030

traits:
  - id: shell-command-prefix
    desc: Shell tasking command prefix
    crit: component
    conf: 0.96
    if:
      type: hex
      section: .rodata
      pattern: "53 48 45 4C 4C 3A 00"

  - id: shell-output-json-template
    desc: Shell output JSON template
    crit: component
    conf: 0.98
    attack: T1059.004
    mbc: E1059.004
    if:
      type: text
      exact: '{"type":"shell_out","output":"%.7800s"}'

  - id: shell-cwd-json-template
    desc: Shell cwd JSON template
    crit: component
    conf: 0.96
    attack: T1059.004
    mbc: E1059.004
    if:
      type: text
      exact: '{"type":"shell_out","output":"CWD Updated"}'

  - id: cwd-shell-wrapper
    desc: CWD preserving shell wrapper
    crit: component
    conf: 0.93
    attack: T1059.004
    mbc: E1059.004
    if:
      type: text
      exact: 'cd "%s" && %s'

  - id: hostinfo-json-template
    desc: Bot hostinfo JSON template
    crit: component
    conf: 0.95
    attack: T1082
    mbc: E1082
    if:
      type: text
      exact: '{"pc_name":"%s","arch":"%s","os":"%s"}'

  - id: runtime-stats-json-template
    desc: Runtime stats JSON template
    crit: component
    conf: 0.95
    attack: T1082
    mbc: E1082
    if:
      type: text
      exact: '{"ram_total":"%lluGB","ram_usage":"%d%%","cpu_usage":"%d%%"}'

  - id: pong-json-template
    desc: Bot pong JSON template
    crit: component
    conf: 0.9
    if:
      type: text
      exact: '{"type":"pong"}'

composite_rules:
  - id: android-json-bot-telemetry
    desc: Android bot telemetry protocol
    crit: suspicious
    conf: 0.96
    all:
      - id: hostinfo-json-template
      - id: runtime-stats-json-template
      - id: pong-json-template
    any:
      - id: micro-behaviors/communications/socket/send::send
      - id: micro-behaviors/communications/socket/receive::receive

  - id: android-tcp-shell-backdoor
    desc: Android TCP shell backdoor
    crit: hostile
    conf: 0.98
    attack: T1059.004
    mbc: B0022
    all:
      - id: shell-command-prefix
      - id: shell-output-json-template
      - id: micro-behaviors/process/create/popen::c-popen
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/communications/socket/receive::receive
      - id: micro-behaviors/communications/socket/send::send
    any:
      - id: cwd-shell-wrapper
      - id: shell-cwd-json-template
      - id: micro-behaviors/fs/directory/mkdir::chdir-symbol
