# Service-installing socket backdoor detection for Windows PE.
# Combines service installation + event-driven Winsock + Telnet protocol
# + Run-key persistence. This combination is essentially a backdoor
# signature: legitimate service hosts don't contain Run-key paths or
# Telnet tokens, and legitimate Run-key persistors don't contain the
# full SCM dispatcher triad.
#
# Fingerprints the SDBot/Rbot/IRCBot lineage of classic Windows bots.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1543.003
  mbc: B0030

composite_rules:
  - id: service-winsock-telnet-backdoor
    desc: Service-installing socket backdoor with Telnet C2
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/service/control::service-dispatch-triad
      - id: micro-behaviors/communications/socket/multiplex::winsock-event-loop
      - id: micro-behaviors/communications/socket/telnet::telnet
    any:
      - id: objectives/persistence/login/registry/autostart::run-key
      - id: micro-behaviors/os/service/control::create-service
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-marker

  - id: service-install-runkey-backdoor
    desc: Service-installing binary with Run-key persistence
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/os/service/control::service-dispatch-triad
      - id: objectives/persistence/login/registry/autostart::run-key
    any:
      - id: micro-behaviors/communications/socket/multiplex::winsock-event-loop
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
      - id: micro-behaviors/communications/socket/telnet::telnet
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/vendor::microsoft-corp-marker
