# Managed TCP backdoor indicators.
# The individual APIs are dual-use; the composites require a focused
# remote-control method cluster plus encrypted transport and hidden execution.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1071
  mbc: B0030

traits:
  - id: managed-remote-stage
    desc: Managed remote stage method
    crit: component
    conf: 0.9
    if:
      type: text
      word: ApplyRemoteBinary

  - id: managed-register-payload
    desc: Managed registration payload method
    crit: component
    conf: 0.9
    if:
      type: text
      word: SendRegistrationPayload

  - id: managed-plugin-slot
    desc: Managed plugin slot method
    crit: component
    conf: 0.9
    if:
      type: text
      word: AssignPluginSlot

  - id: managed-module-channel
    desc: Managed module channel method
    crit: component
    conf: 0.9
    if:
      type: text
      word: RunModuleChannelAsync

  - id: managed-pulse-channel
    desc: Managed pulse channel method
    crit: component
    conf: 0.9
    if:
      type: text
      word: RunPulseChannelAsync

  - id: managed-child-channel
    desc: Managed child channel method
    crit: component
    conf: 0.9
    if:
      type: text
      word: CreateChildChannelAsync

  - id: managed-subchannel-connect
    desc: Managed subchannel connection method
    crit: component
    conf: 0.9
    if:
      type: text
      word: ConnectSubSockAsync

  - id: managed-diagnostics
    desc: Managed diagnostics request method
    crit: component
    conf: 0.9
    if:
      type: text
      word: HandleDiagnosticsRequest

  - id: managed-authentication
    desc: Managed authentication method
    crit: component
    conf: 0.9
    if:
      type: text
      word: AuthenticateAsync

  - id: managed-task-cleanup
    desc: Managed scheduled-task cleanup method
    crit: component
    conf: 0.9
    if:
      type: text
      word: ClearScheduledTasksAsync

composite_rules:
  - id: managed-remote-control-method-cluster
    desc: Managed remote-control method cluster
    crit: component
    conf: 0.92
    any:
      - id: managed-remote-stage
      - id: managed-register-payload
      - id: managed-plugin-slot
      - id: managed-module-channel
      - id: managed-pulse-channel
      - id: managed-child-channel
      - id: managed-subchannel-connect
      - id: managed-diagnostics
      - id: managed-authentication
      - id: managed-task-cleanup
    needs: 2

  - id: managed-encrypted-plugin-c2-backdoor
    desc: Encrypted managed plugin C2 backdoor
    crit: hostile
    conf: 0.98
    attack: T1071,T1059,T1620
    all:
      - id: metadata/binary/framework::dotnet-metadata
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel
      - id: managed-remote-control-method-cluster
      - id: micro-behaviors/data/embedded/payload/resource::assemblyresolve-hook
      - id: micro-behaviors/crypto/symmetric/aes/library::dotnet-create-decryptor
    any:
      - id: micro-behaviors/process/create/spawn::redirect-standard-output-dotnet
      - id: objectives/evasion/process/hidden/execution::dotnet-hidden-process-launch
      - id: micro-behaviors/os/privilege/check::is-user-an-admin
    needs: 2
    unless:
      - id: metadata/signed/platform/
