# Text-based variant of service-winsock-telnet-backdoor for PEs whose
# import directory is malformed/non-standard so the symbol-based atoms
# in micro-behaviors/communications/socket/multiplex don't fire.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1543.003
  mbc: B0030
traits:
  - id: wsa-create-event-text
    desc: WSACreateEvent referenced as text
    crit: component
    conf: 0.94
    if:
      type: text
      word: WSACreateEvent
  - id: wsa-event-select-text
    desc: WSAEventSelect referenced as text
    crit: component
    conf: 0.94
    if:
      type: text
      word: WSAEventSelect
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: wsa-wait-multiple-events-text
    desc: WSAWaitForMultipleEvents referenced as text
    crit: component
    conf: 0.94
    if:
      type: text
      word: WSAWaitForMultipleEvents
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: wsa-enum-network-events-text
    desc: WSAEnumNetworkEvents referenced as text
    crit: component
    conf: 0.94
    if:
      type: text
      word: WSAEnumNetworkEvents
    unless:
      - id: well-known/app/
      - id: well-known/lib/
      - id: well-known/tool/
  - id: ipv4-port-format-string
    desc: IPv4 colon-port format string %u.%u.%u.%u:%u
    crit: component
    conf: 0.95
    if:
      type: text
      exact: '%u.%u.%u.%u:%u'
  - id: telnet-bare-token
    desc: Standalone Telnet protocol token in PE
    crit: component
    conf: 0.85
    if:
      type: text
      exact: Telnet
  - id: odbc32-exe-install-path
    desc: Bot install path WINDOWS odbc32.exe
    crit: suspicious
    conf: 0.99
    if:
      type: text
      regex: \\WINDOWS\\(system32|SysWOW64)\\odbc32\.exe$
      case_insensitive: true
  - id: network-services-display-name
    desc: 'Network Services service display name'
    crit: component
    conf: 0.92
    if:
      type: text
      exact: Network Services
composite_rules:
  - id: winsock-event-loop-text
    desc: Event-driven Winsock loop (text fallback)
    crit: notable
    conf: 0.92
    all:
      - id: wsa-create-event-text
      - id: wsa-event-select-text
      - id: wsa-wait-multiple-events-text
      - id: wsa-enum-network-events-text
    unless:
      - id: metadata/signed/leaf::qihu-360-software-co.-limited
      - id: metadata/lang/compiler/managed::borland-section-code
  - id: service-winsock-telnet-backdoor-text
    desc: Service-installing Winsock+Telnet backdoor (text imports)
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/os/service/control::service-dispatch-triad
      - id: winsock-event-loop-text
      - id: ipv4-port-format-string
      - id: telnet-bare-token
    any:
      - id: objectives/persistence/login/registry/autostart::run-key
      - id: micro-behaviors/os/service/control::create-service
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor/
  - id: bot-odbc32-service-install
    desc: Bot install at odbc32.exe with SCM service install
    crit: hostile
    conf: 0.98
    attack: T1036.005,T1543.003
    all:
      - id: odbc32-exe-install-path
      - id: micro-behaviors/os/service/control::create-service
    any:
      - id: micro-behaviors/os/service/control::service-dispatch-triad
      - id: network-services-display-name
      - id: objectives/persistence/login/registry/autostart::run-key
