defaults:
  for:
    - pe
  platforms:
    - windows
  attack: T1071
  mbc: B0025
traits:
  - id: x-exe-drop-name
    desc: x.exe drop filename marker
    crit: component
    conf: 0.92
    if:
      type: text
      exact: x.exe
  - id: pyd-extension-basename
    desc: Python extension module basename
    crit: component
    conf: 0.95
    if:
      type: basename
      regex: '(?i)\.pyd$'
  - id: webview2loader-basename
    desc: WebView2 loader basename
    crit: component
    conf: 0.95
    if:
      type: basename
      exact: WebView2Loader.dll
  - id: oleaut32-import-reference
    desc: OLE automation DLL import
    crit: component
    conf: 0.9
    if:
      type: text
      exact: OLEAUT32.dll
  # OLEAUT32 ordinal imports — VB6 COM automation.
  - id: oleaut-ordinal-2
    desc: oleaut32 ordinal 2
    crit: component
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 2"
  - id: oleaut-ordinal-15
    desc: oleaut32 ordinal 15
    crit: component
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 15"
  - id: oleaut-ordinal-201
    desc: oleaut32 ordinal 201
    crit: component
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 201"
  - id: oleaut-ordinal-200
    desc: oleaut32 ordinal 200
    crit: component
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 200"
  - id: oleaut-ordinal-150
    desc: oleaut32 ordinal 150
    crit: component
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 150"
  - id: oleaut-ordinal-202
    desc: oleaut32 ordinal 202
    crit: component
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 202"
  - id: oleaut-ordinal-27
    desc: oleaut32 ordinal 27
    crit: component
    if:
      type: symbol
      kind: import
      exact: "ORDINAL 27"
  # Window / GDI atoms used by the shellobject-window-gdi-cluster composite.
  - id: get-window-text-import
    desc: GetWindowText import (ANSI or wide)
    crit: component
    if:
      type: symbol
      kind: import
      regex: ^GetWindowText[AW]$
    unless:
      - id: metadata/lang/compiler/managed::delphi
  - id: create-region-import
    desc: CreateRectRgn/PolygonRgn/RoundRectRgn import
    crit: component
    if:
      type: symbol
      kind: import
      regex: ^Create(Rect|Polygon|RoundRect)Rgn$
    unless:
      - id: metadata/lang/compiler/managed::delphi
  - id: frame-region-import
    desc: FrameRgn import
    crit: component
    if:
      type: symbol
      kind: import
      exact: FrameRgn
    unless:
      - id: metadata/lang/compiler/managed::delphi
  - id: get-window-rect-import
    desc: GetWindow / GetWindowRect import
    crit: component
    if:
      type: symbol
      kind: import
      regex: ^GetWindow(Rect)?$
    unless:
      - id: metadata/lang/compiler/managed::delphi
  - id: is-window-state-import
    desc: IsWindowVisible / IsWindowEnabled import
    crit: component
    if:
      type: symbol
      kind: import
      regex: ^IsWindow(Visible|Enabled)$
    unless:
      - id: metadata/lang/compiler/managed::delphi
composite_rules:
  - id: shellobject-com-automation-cluster
    desc: COM registration automation cluster
    crit: component
    conf: 0.92
    all:
      - id: oleaut-ordinal-2
      - id: oleaut-ordinal-15
      - id: oleaut-ordinal-201
    any:
      - id: oleaut-ordinal-200
      - id: oleaut-ordinal-150
      - id: oleaut-ordinal-202
      - id: oleaut-ordinal-27
    needs: 3
  - id: shellobject-window-gdi-cluster
    desc: Window text and GDI cluster
    crit: component
    conf: 0.9
    all:
      - id: get-window-text-import
      - id: micro-behaviors/hardware/display/screen::gdi-create-compatible-bitmap
      - id: micro-behaviors/hardware/display/screen::gdi-create-compatible-dc
    any:
      - id: create-region-import
      - id: micro-behaviors/ui/window/manage::combine-rgn
      - id: frame-region-import
      - id: get-window-rect-import
      - id: is-window-state-import
    needs: 4
  - id: version-resource-ip-port
    desc: Endpoint plus version resource metadata
    crit: suspicious
    conf: 0.96
    all:
      - id: metadata/binary/framework::vb6-application-framework
      - id: micro-behaviors/communications/ip::external-ipv4-port-binary-literal
      - id: metadata/package/versioning::pe-version-resource
    unless:
      - id: pyd-extension-basename
      - id: webview2loader-basename
  - id: recycler-x-exe-pair
    desc: RECYCLER and x.exe payload pair
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/fs/path/system::recycler-literal
      - id: x-exe-drop-name
  - id: vb6-recycler-shell-backdoor
    desc: VB6 recycler-hidden shell backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/framework::vb6-application-framework
      - id: micro-behaviors/process/create/shell::vb6-rtcshell
      - id: micro-behaviors/dylib/lookup::vb6-runtime-api-dispatch
      - id: recycler-x-exe-pair
      - id: version-resource-ip-port
    any:
      - id: micro-behaviors/fs/directory/readdir::vb6-rtcdir
      - id: micro-behaviors/fs/path/check::vb6-rtcgetfileattr
      - id: micro-behaviors/fs/file/read::vb6-file-length-query
      - id: objectives/anti-static/obfuscation/string::long-mixedcase-identifiers
      - id: objectives/anti-static/obfuscation/payload::sparse-vb6-loader-profile
    needs: 2
  - id: vb6-hidden-dropper-c2-profile
    desc: VB6 hidden dropper with hardcoded C2
    crit: suspicious
    conf: 0.95
    all:
      - id: recycler-x-exe-pair
      - id: version-resource-ip-port
      - id: objectives/anti-static/obfuscation/payload::sparse-vb6-loader-profile
    any:
      - id: micro-behaviors/dylib/lookup::vb6-dll-function-call
      - id: objectives/anti-static/obfuscation/string::long-mixedcase-identifiers
      - id: micro-behaviors/process/create/shell::vb6-rtcshell
  - id: packed-com-shellobject-gui-profile
    desc: Packed COM ShellObject GUI profile
    crit: hostile
    conf: 0.96
    attack: T1027
    all:
      - id: oleaut32-import-reference
      - id: shellobject-com-automation-cluster
      - id: shellobject-window-gdi-cluster
      - id: metadata/binary/layout::overlay-dominates-third
      - id: objectives/anti-static/obfuscation/binary-metrics::high-entropy-overlay-raw
    any:
      - id: objectives/anti-static/obfuscation/payload::unusual-alignment-pe
      - id: micro-behaviors/os/clipboard/access::empty-clipboard
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/fs/memory/mmap::win32-file-mapping
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: pyd-extension-basename
      - id: webview2loader-basename
