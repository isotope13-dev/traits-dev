# Go-compiled connect-back implants that launch fileless via memfd_create.
# Not a reverse-shell (no stdio plumbing, no shell exec) — pure C2 implant.
defaults:
  attack: T1071.001
  platforms: [unix, windows, macos]
  for: [elf, macho, pe]

composite_rules:
  - id: go-fileless-connectback-c2
    desc: Go connect-back malware with fileless memory launch
    crit: hostile
    conf: 0.98
    mbc: C0002
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-list
      - id: objectives/evasion/fileless/memory::memfd-fileless-runtime-flow
    any:
      - id: objectives/anti-analysis/vm-detect/instruction::cpuid-instruction
  - id: go-aggressive-behavior
    desc: Go malware with aggressive function naming and persistence
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: micro-behaviors/data/source/function/names::aggressive-go-punishment
    any:
      - id: objectives/persistence/login/registry/run-key/
      - id: objectives/anti-analysis/vm-detect/instruction::cpuid-instruction
