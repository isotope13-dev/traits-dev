defaults:
  platforms: [linux]
  for: [systemd]
  attack: "T1021.004,T1543.002"
  mbc: E1037
traits:
- id: sidedoor-execstart
  desc: systemd starts sidedoor tunnel
  crit: suspicious
  conf: 0.94
  if:
    type: value
    path: service.exec_start
    regex: '(^|/)(sidedoor)\b'
- id: reverse-tunnel-description
  desc: Reverse tunnel service description
  crit: suspicious
  conf: 0.9
  if:
    type: value
    path: unit.description
    regex: '(?i)reverse tunnel'
- id: bico-bind-service
  desc: Bico bind backdoor service
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(?i)Backdoor Service - Bico|ExecStart=.{0,80}/bico_bind\b'
- id: sided00r-root-local-service
  desc: SideD00r root local service
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(?i)Description=SideD00r|ExecStart=.{0,80}/root/\.local/start\.sh'
composite_rules:
- id: sidedoor-reverse-tunnel-service
  desc: Sidedoor reverse tunnel service
  crit: hostile
  conf: 0.97
  all:
  - id: sidedoor-execstart
  any:
  - id: reverse-tunnel-description
  - id: micro-behaviors/os/service/config::install-wanted-by-exists
- id: bico-bind-backdoor-service
  desc: Bico bind backdoor systemd service
  crit: hostile
  conf: 0.98
  all:
  - id: bico-bind-service
  any:
  - id: objectives/persistence/system/service/systemd::restart-always
  - id: micro-behaviors/os/service/config::install-wanted-by-exists
- id: sided00r-root-local-backdoor-service
  desc: SideD00r root-local systemd backdoor
  crit: hostile
  conf: 0.98
  all:
  - id: sided00r-root-local-service
  any:
  - id: objectives/persistence/system/service/install::systemd-sudo-root-local-script
  - id: micro-behaviors/os/service/config::install-wanted-by-exists
