defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1071.001

traits:
  - id: remote-agent-hub-url
    desc: Remote agent hub URL argument
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'startNode\s*\(\s*\{[\s\S]{0,120}hubUrl\s*:'

  - id: remote-agent-token-argument
    desc: Agent-hub token from environment
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'token\s*:\s*process\.env\.AGENT_HUB_[A-Z0-9_]*TOKEN'

  - id: cli-startup-auto-join-call
    desc: CLI startup auto-joins agent pool
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'void\s+autoJoinPool\s*\(\s*\)'

composite_rules:
  - id: unauthorised-remote-agent-auto-enrollment
    desc: Silent credentialed remote-agent enrollment
    crit: hostile
    conf: 0.99
    scope: file
    all:
      - id: remote-agent-hub-url
      - id: remote-agent-token-argument
      - id: cli-startup-auto-join-call
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
