# Daemon-based Shell Backdoor (Linux)
# GAP #1: HOSTILE composite rule for daemon + shell execution + obfuscation
# This pattern has NO legitimate use - it's always malware
# ATT&CK: T1059 (Command and Scripting Interpreter), T1543 (Create or Modify System Process)
defaults:
  for: [elf]
  platforms: [unix]
  attack: "T1059"
  mbc: "B0009"
composite_rules:
  # PTY grant+unlock + dup2 + execve + daemonization + outbound connect.
  # This is the canonical interactive reverse shell pattern: allocate a PTY,
  # redirect stdin/stdout/stderr via dup2, execve a shell, then daemonize and
  # connect outbound. No legitimate binary does all of this together.
  - id: pty-daemonized-backdoor
    desc: PTY reverse shell with daemon and network
    crit: hostile
    conf: 0.97
    attack: T1059.004,T1543.002
    mbc: B0009,B0022
    all:
      - id: micro-behaviors/process/tty/pty::grantpt
      - id: micro-behaviors/process/tty/pty::unlockpt
      - id: micro-behaviors/process/fd/dup::dup2
      - id: micro-behaviors/process/create/direct::execve-import
      - id: micro-behaviors/communications/socket/connect::connect
    any:
      - id: micro-behaviors/process/create/setsid::import
      - id: objectives/persistence/system/daemon/init::daemon-fork

  # GAP #1: Linux version of the critical missing rule
  # Combines: daemon (fork+setsid) + shell exec (popen/system) + obfuscation
  # Precision: all(3) + for(1) + any(2 min 1) = 5 (well above 4.0 threshold)
  - id: linux-daemon-shell-backdoor
    desc: "Daemon-based shell command backdoor"
    crit: hostile
    conf: 0.95
    attack: "T1059,T1543"
    mbc: "B0009,F0006"
    all:
      # Daemon persistence
      - id: objectives/persistence/system/daemon/init::daemon-fork
      - id: micro-behaviors/process/create/setsid::import
      # Shell command execution
      - id: micro-behaviors/process/create/shell/
    # Obfuscation or frequency indicators
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::tiny-cstring
      - id: micro-behaviors/process/create/shell::excessive-popen
      - id: objectives/anti-static/obfuscation/payload/section::high-entropy-data-section
  # Includes XOR-encoded commands
  - id: linux-obfuscated-daemon-backdoor
    desc: "Obfuscated daemon backdoor with encoded"
    crit: hostile
    conf: 0.98
    attack: "T1027,T1059,T1543"
    all:
      - id: objectives/persistence/system/daemon/init::daemon-fork
      - id: micro-behaviors/process/create/setsid::import
      - id: micro-behaviors/process/create/shell/
    any:
      - id: objectives/anti-static/obfuscation/payload/encrypted::tiny-cstring
      - id: objectives/anti-static/obfuscation/payload/section::high-entropy-data-section
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-payload-section
  # Extreme case: high-volume command execution
  - id: linux-command-orchestration-backdoor
    desc: "Command orchestration backdoor daemon"
    crit: hostile
    conf: 0.98
    attack: "T1059,T1543"
    all:
      - id: linux-daemon-shell-backdoor
      - id: micro-behaviors/process/create/shell::extreme-popen
  # Data-heavy backdoor with encoded payload
  - id: linux-payload-dropper-daemon
    desc: "Payload dropper daemon backdoor"
    crit: hostile
    conf: 0.95
    attack: "T1059,T1543,T1105"
    all:
      - id: linux-daemon-shell-backdoor
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-payload-section
