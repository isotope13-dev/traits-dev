# Daemon-based Shell Backdoor (macOS)
# GAP #1: HOSTILE composite rule for daemon + shell execution + obfuscation
# This pattern has NO legitimate use - it's always malware
# ATT&CK: T1059 (Command and Scripting Interpreter), T1543 (Create or Modify System Process)
defaults:
  for: [macho]
  platforms: [macos]
  attack: "T1059"
  mbc: "B0009"
composite_rules:
  # GAP #1: The critical missing rule - this is ALWAYS hostile
  # Combines: daemon (fork+setsid) + shell exec (popen/system) + obfuscation (tiny strings)
  # No legitimate software has this exact combination
  # Precision: all(3) + for(1) + any(2 min 1) = 5 (well above 4.0 threshold)
  - id: daemon-shell-backdoor
    desc: "Daemon-based shell command backdoor"
    crit: hostile
    conf: 0.95
    attack: "T1059,T1543"
    mbc: "B0009,F0006"
    all:
      # Daemon persistence
      - id: micro-behaviors/process/daemonize/detach::fork-new-session
      - id: micro-behaviors/process/daemonize/detach::setsid-import
      # Shell command execution
      - id: micro-behaviors/process/create/shell/
    # Obfuscation or frequency indicators
    any:
      - id: metadata/binary/section/metrics::tiny-cstring-section
      - id: micro-behaviors/process/create/shell/timing::excessive-popen
      - id: objectives/anti-static/obfuscation/payload/section::high-entropy-data-section
    # Must be unsigned (legitimate apps are signed)
    unless:
      - id: metadata/signed/platform::apple
      # Go programs (e.g. minikube, Docker, k8s tools) routinely use fork+setsid
      # as standard process management, and embed curl|sh for component installs.
      - id: metadata/lang/compiler/systems::go-version-string
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: well-known/lib/benign-runtime-bundles/
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports
        - id: metadata/lang/compiler/systems/
  # Even more severe: includes XOR-encoded commands or encrypted payload
  - id: obfuscated-daemon-backdoor
    desc: "Obfuscated daemon backdoor with encoded payload"
    crit: hostile
    conf: 0.98
    attack: "T1027,T1059,T1543"
    all:
      - id: micro-behaviors/process/daemonize/detach::fork-new-session
      - id: micro-behaviors/process/daemonize/detach::setsid-import
      - id: micro-behaviors/process/create/shell/
    any:
      # Require intentional string-decrypt / payload obfuscation — not the
      # entire xor/ tree (which includes baseline x86 LOOP helpers that fire
      # on nearly every native Node/Electron runtime).
      - id: objectives/anti-static/obfuscation/encoding/xor::xor-decode-loop
      - id: objectives/anti-static/obfuscation/encoding/xor::string-decrypt
      - id: metadata/binary/section/metrics::tiny-cstring-section
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-payload-section
      - id: objectives/anti-static/obfuscation/payload/section::high-entropy-data-section
    unless:
      - id: metadata/signed/platform::apple
      - id: metadata/signed/developer
      - id: metadata/lang/compiler/systems/
      - id: well-known/tool/reverse-engineering/frida/
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/lib/slint/
    downgrade:
      any:
        - id: metadata/binary/metrics/structural::many-imports
  # Extreme case: all the indicators
  - id: advanced-daemon-backdoor
    desc: "Advanced daemon backdoor (all indicators)"
    crit: hostile
    conf: 0.99
    attack: "T1027,T1059,T1543"
    all:
      - id: daemon-shell-backdoor
    any:
      - id: micro-behaviors/process/create/shell/timing::extreme-popen
      - id: objectives/anti-static/obfuscation/encoding/shell::encoded-shell-pattern
      - id: objectives/anti-static/obfuscation/payload/section::encrypted-payload-section
  # Generic name + daemon backdoor = masquerading
  - id: masquerading-daemon-backdoor
    desc: "Masquerading daemon backdoor malware"
    crit: hostile
    conf: 0.99
    attack: "T1036,T1059,T1543"
    all:
      - id: daemon-shell-backdoor
      - id: objectives/evasion/masquerade/naming/placeholder::suspicious-generic-naming
