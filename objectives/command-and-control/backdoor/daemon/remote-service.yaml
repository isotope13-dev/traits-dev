# Remote Shell Backdoor Installation
# Detects telnet and SSH services exposed for persistent remote shell access.
# ATT&CK: T1021.004 (Remote Services: SSH)
# MBC: E1037 (Communication)
defaults:
  attack: T1021.004
  platforms: [unix, android, ios]
  for: [elf, shell]
traits:
  - id: telnet-basename
    desc: Filename is telnet client
    crit: notable
    conf: 0.9
    if:
      type: path
      basename: true
      exact: telnet
  - id: telnetd-basename
    desc: Filename is telnet daemon
    crit: notable
    conf: 0.9
    if:
      type: path
      basename: true
      exact: telnetd

composite_rules:
  - id: dropbear-lightweight-ssh
    desc: "Dropbear SSH server"
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/os/service/remote::dropbear-ref
      - id: micro-behaviors/os/service/remote::dropbear-server-args
    unless:
      - id: well-known/app/dropbear::source-tree

  - id: ssh-service-setup
    desc: "SSH service setup"
    crit: notable
    conf: 0.8
    all:
      - id: micro-behaviors/os/service/remote::sshd-ref
    any:
      - id: micro-behaviors/os/service/remote::sshd-path
      - id: micro-behaviors/os/service/remote::ssh-service
    # Suppress when /usr/sbin/sshd appears alongside a bundled Linux
    # daemon allowlist — that's a rival-process killer's skip list, not
    # a binary that's actually setting up SSH.
    unless:
      - id: objectives/impact/degrade/rival-bot/competitor/
      - id: well-known/app/dropbear::source-tree

  - id: telnet-service
    desc: "Telnet service for remote access"
    crit: notable
    conf: 0.8
    all:
      - id: micro-behaviors/communications/socket/telnet::telnet
    any:
      - id: micro-behaviors/communications/socket/listen::listen-sym
      - id: micro-behaviors/communications/socket/listen::accept-sym
      - id: micro-behaviors/communications/socket/listen::accept64-sym
      - id: micro-behaviors/os/service/daemon::telnetd
    unless:
      - id: micro-behaviors/communications/http/download/curl::curl-easy-init
      - id: telnet-basename
    downgrade:
      any:
        - id: metadata/binary/metrics/size::massive-executable

  - id: telnetd-daemon
    desc: "Telnet daemon for remote access"
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/os/service/daemon::telnetd
    any:
      - id: micro-behaviors/communications/socket/listen::listen-sym
      - id: micro-behaviors/communications/socket/listen::accept-sym
      - id: micro-behaviors/communications/socket/listen::accept64-sym
    unless:
      - id: telnetd-basename

  - id: telnet-backdoor-setup
    desc: "Telnet backdoor setup"
    crit: suspicious
    conf: 0.9
    mbc: "E1037"
    any:
      - id: telnet-service
      - id: telnetd-daemon

  - id: ssh-backdoor-setup
    desc: "SSH service setup"
    crit: notable
    conf: 0.9
    mbc: "E1037"
    any:
      - id: ssh-service-setup
      - id: dropbear-lightweight-ssh
    unless:
      - id: well-known/app/nvidia-nvcf::multi-node-sample-container

  - id: remote-shell-backdoor
    desc: "Remote shell backdoor"
    crit: suspicious
    conf: 0.9
    mbc: "E1037"
    unless:
      - id: well-known/app/openssh/
    any:
      - id: telnet-backdoor-setup
      - id: ssh-backdoor-setup
  - id: iot-telnet-service-backdoor
    desc: IoT telnet service backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: telnetd-daemon
      - id: objectives/command-and-control/botnet/iot::busybox
      - id: micro-behaviors/fs/proc/info/path::proc-net-tcp
    unless:
      - id: telnetd-basename
