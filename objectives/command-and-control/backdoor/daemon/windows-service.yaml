# Service-Based Implant Detection - Windows PE
# Composites for PE binaries that install as a service with C2 and crypto capabilities
defaults:
  platforms: [windows]
  for: [pe]
composite_rules:
  - id: service-implant-with-c2
    desc: Service-installing binary with HTTP and crypto
    crit: suspicious
    conf: 0.85
    attack: T1543.003
    all:
      - id: objectives/persistence/system/service/install::service-install-and-start
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
      - id: micro-behaviors/crypto/library/
    any:
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
      - id: micro-behaviors/os/network/connections::get-tcp-table
    downgrade:
      any:
        - id: metadata/binary/installer/
        - id: metadata/binary/vendor::microsoft-corp-marker
  - id: service-winhttp-updater
    desc: Service-managing WinHTTP updater implant
    crit: hostile
    conf: 0.96
    attack: T1071.001,T1105,T1543.003
    all:
      - id: micro-behaviors/os/service/control::service-admin-import-cluster
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
    any:
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-open
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-connect
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
      - id: micro-behaviors/time/schedule/waitable::create-and-set-waitable-timer
      - id: micro-behaviors/os/service/host::service-config-change
    downgrade:
      any:
        - id: metadata/binary/installer/
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: metadata/signed/platform::microsoft
