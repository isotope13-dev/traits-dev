defaults:
  platforms: [unix]
  for: [c, html]
composite_rules:
  - id: port-knock-inetd-shell-backdoor
    desc: port-knock activated inetd shell
    crit: hostile
    conf: 0.99
    attack: "T1059.004,T1205"
    mbc: "B0022"
    all:
      - id: objectives/command-and-control/trigger/activation::port-knock-activation
      - id: micro-behaviors/fs/write/file::inetd-shell-config-source
      - id: micro-behaviors/os/service/daemon::inetd
    any:
      - id: micro-behaviors/process/daemonize/background::double-fork-stealth
      - id: micro-behaviors/communications/capture/pcap::stealth-listener
