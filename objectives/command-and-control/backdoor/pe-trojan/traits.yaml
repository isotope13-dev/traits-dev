# Windows PE Trojan/Backdoor Detection
# Composites detecting common Windows trojan behavior patterns
# ATT&CK: T1071.001 (Application Layer Protocol: Web Protocols)
# MBC: B0030 (Command and Control)

defaults:
  for: [pe, dll]
  platforms: [windows]

traits:
  - id: winsock-library-reference
    desc: Winsock library string marker
    crit: component
    conf: 0.78
    attack: "T1071"
    if:
      type: string
      regex: "(?i)^WS2_32\\.dll$"
      section: ".rdata"

composite_rules:

  # PE with dynamic WinInet + command execution = C2 backdoor
  - id: dynamic-wininet-c2
    desc: Dynamic WinInet loading with command execution
    crit: hostile
    conf: 0.95
    attack: "T1071.001"
    all:
      - id: micro-behaviors/communications/http/get::wininet-dynamic-load
      - id: objectives/execution/reflection/class::dynamic-load-pattern
    any:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/exec::winexec

  # PE with dynamically loaded HTTP + process kill = trojan
  - id: pe-trojan-indicators
    desc: Dynamic HTTP loading with process termination
    crit: suspicious
    conf: 0.9
    attack: "T1071.001"
    all:
      - id: objectives/evasion/security-product-targeting/enumerate::process-enumeration-terminate
      - id: micro-behaviors/communications/http/get::wininet-dynamic-load

  # Pipe-based command capture with dynamic HTTP loading
  - id: pipe-command-capture-c2
    desc: Pipe command capture with dynamic HTTP loading
    crit: suspicious
    conf: 0.9
    attack: "T1059"
    all:
      - id: micro-behaviors/communications/ipc/pipe::pipe-io-redirect
      - id: micro-behaviors/communications/http/get::wininet-dynamic-load

  - id: wininet-mac-fingerprint-beacon
    desc: WinInet beacon with MAC fingerprint parameter
    crit: suspicious
    conf: 0.92
    attack: "T1071.001"
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/os/network/interface::get-adapters-info
      - id: micro-behaviors/communications/http/url::mac-query-param-format

  - id: winhttp-token-kill-chain
    desc: WinHTTP C2 with tokenized spawn and process-kill evasion
    crit: hostile
    conf: 0.93
    attack: "T1071.001"
    all:
      - id: micro-behaviors/communications/http/client::winhttp-request-flow
      - id: micro-behaviors/os/privilege/escalation::token-spawn-api-chain
      - id: objectives/evasion/security-product-targeting/enumerate::process-enumeration-terminate
    any:
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
    needs: 1

  - id: winhttp-staged-loader-profile
    desc: WinHTTP C2 with staged loader host integration profile
    crit: suspicious
    conf: 0.94
    attack: "T1071.001"
    all:
      - id: micro-behaviors/communications/http/client::winhttp-request-flow
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
    any:
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: objectives/evasion/security-product-targeting/enumerate::process-enumeration-terminate
      - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
      - id: micro-behaviors/crypto/context/capi::capi-keyed-buffer-crypto-chain
      - id: micro-behaviors/os/persistence/startup::startup-folder-shell-path-composition-chain
    needs: 2
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/vendor/microsoft::is-defender-named
        - id: objectives/evasion/masquerade/version-resource::microsoft-corp-versioninfo

  - id: pe-winsock-evasive-loader
    desc: Winsock-linked PE with evasive loader profile
    crit: suspicious
    conf: 0.9
    attack: "T1071"
    all:
      - id: winsock-library-reference
      - id: objectives/anti-analysis/debugger/detect::debugger-api
    any:
      - id: objectives/anti-analysis/timing/evasion::timing-delta-check
      - id: objectives/execution/reflection/class::dynamic-load-pattern
      - id: metadata/format::no-functions
    needs: 2
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/vendor/microsoft::is-defender-named
        - id: objectives/evasion/masquerade/version-resource::microsoft-corp-versioninfo
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/purpose/debug-tool::debug-event-loop
        - id: metadata/purpose/debug-tool::ida-debugger-server

  # PE loader with WinInet HTTP, hardcoded C2 IPs, machine fingerprinting,
  # and process injection capability
  - id: wininet-c2-loader
    desc: WinInet HTTP loader with C2 and injection
    crit: hostile
    conf: 0.93
    attack: "T1071.001"
    all:
      - id: micro-behaviors/communications/http/get::internet-open
      - id: micro-behaviors/communications/http/get::internet-connect
      - id: micro-behaviors/communications/infrastructure/hardcoded/ip-port::hardcoded-ipv4-port
    any:
      - id: objectives/discovery/host/fingerprint/machine-id::machineguid
      - id: objectives/evasion/process/injection::process-hollowing-context-hijack
      - id: objectives/anti-analysis/debugger/detect::win-anti-analysis-suite
      - id: micro-behaviors/os/persistence/startup::startup-folder-shell-path-composition-chain
    needs: 2
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/vendor/microsoft::is-defender-named
        - id: objectives/evasion/masquerade/version-resource::microsoft-corp-versioninfo

  - id: winsock-proxy-connect-command-backdoor
    desc: Winsock proxy CONNECT C2 with command backdoor
    crit: hostile
    conf: 0.94
    attack: "T1071.001"
    all:
      - id: winsock-library-reference
      - id: micro-behaviors/communications/http/request::http-proxy-connect-auth-tunnel
    any:
      - id: micro-behaviors/process/create/shell::cmd-slash-c
      - id: micro-behaviors/os/registry/access::windows-firewall-authorizedapps-write-chain
      - id: micro-behaviors/process/sync/mutex::mutex-instance-check
    needs: 2
    downgrade:
      any:
        - id: metadata/vendor/microsoft::is-microsoft-named
        - id: metadata/vendor/microsoft::is-defender-named
        - id: objectives/evasion/masquerade/version-resource::microsoft-corp-versioninfo
