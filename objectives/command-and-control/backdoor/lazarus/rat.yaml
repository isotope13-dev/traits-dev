# Lazarus Group Modular RAT Detection
# Detects combinations of behaviors typical of the DPRK modular RAT used in supply chain attacks.
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [scripts, binaries]
traits:
  - id: clipboard-steal-custom
    desc: Steals clipboard content (Get-Clipboard)
    crit: suspicious
    conf: 1.0
    if:
      type: raw
      substr: "Get-Clipboard"
  - id: data-exfiltration-path
    desc: Exfiltration via HTTP POST to /upload
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: "/upload"
composite_rules:
  - id: lazarus-modular-rat
    desc: Lazarus Group modular RAT behavior detected
    crit: hostile
    conf: 1.0
    mbc: "C0032"
    attack: "T1071.001"
    all:
      - id: data-exfiltration-path
    any:
      - id: objectives/collection/clipboard/monitor::js-pbpaste
      - id: clipboard-steal-custom
      - id: micro-behaviors/fs/path/sensitive/credentials::aws-credentials-dup
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-dir
