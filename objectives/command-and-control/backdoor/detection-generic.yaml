defaults:
  for: [source]
  platforms:
    - unix
    - windows
traits:
  - id: webshell-ref
    desc: Web shell terminology reference
    crit: notable
    conf: 0.9
    attack: T1505.003
    if:
      type: text
      regex: w[3e]b[_\s]*sh[e3]ll
      case_insensitive: true
  - id: fd-redirect-socket
    desc: File descriptor redirection to socket (reverse shell)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '[0-9]+<>\s*/dev/(tcp|udp)/'
  - id: stdin-redirect-dup
    desc: Stdin redirection (reverse shell indicator)
    crit: suspicious
    conf: 0.7
    attack: T1059
    for: [shell, python, ruby, php, perl]
    if:
      type: text
      substr: 0>&1
  - id: nc-pipe
    desc: Netcat with pipe
    crit: suspicious
    conf: 0.7
    attack: T1059
    platforms:
      - unix
    for:
      - shell
    if:
      type: string_literal
      regex: \|\s*nc\s
  - id: reverse-connect
    desc: Reverse connect keyword
    crit: notable
    conf: 0.3
    if:
      type: text
      regex: (?i)reverse[-_]?(connect)
  - id: reverse-conn
    desc: Reverse conn abbreviation
    crit: notable
    conf: 0.3
    if:
      type: text
      regex: (?i)reverse[-_]?(conn)
  - id: reverse-tcp
    desc: Reverse TCP indicator
    crit: notable
    conf: 0.3
    if:
      type: text
      regex: (?i)reverse[-_]?(tcp)
  - id: reverse-shell
    desc: Reverse shell keyword
    crit: notable
    conf: 0.3
    if:
      type: text
      regex: (?i)reverse[-_]?(shell)
  - id: reverse-backdoor
    desc: Reverse backdoor reference
    crit: notable
    conf: 0.3
    if:
      type: text
      regex: (?i)reverse[-_]?(backdoor)
  - id: reverse-proxy
    desc: Reverse proxy keyword
    crit: notable
    conf: 0.3
    if:
      type: text
      regex: (?i)reverse[-_]?(proxy)
    unless:
      - type: text
        substr: '"comment":"buildkit.dockerfile.v0"'
  - id: reverse-tunnel
    desc: Reverse tunnel keyword
    crit: notable
    conf: 0.3
    for: [shell, python, javascript, php, powershell]
    if:
      type: text
      regex: (?i)reverse[-_]?(tunnel)
  - id: ruby-tcpsocket-spawn
    desc: Ruby TCPSocket with spawn (reverse
    crit: suspicious
    conf: 0.9
    attack: T1059.006
    for:
      - ruby
    if:
      type: string_literal
      regex: spawn\(["']/bin/sh["'],.{0,64}TCPSocket
  - id: ruby-tcpsocket-popen
    desc: Ruby TCPSocket with popen (reverse
    crit: suspicious
    conf: 0.9
    attack: T1059.006
    for:
      - ruby
    if:
      type: string_literal
      regex: TCPSocket.{0,64}\.gets.{0,64}IO.popen
  - id: go-child-stdin
    desc: Go exec.Cmd.childStdin
    crit: component
    conf: 0.7
    for: [go]
    if:
      type: text
      substr: os/exec.(*Cmd).childStdin
composite_rules:
  - id: perl-socket-open
    desc: Perl socket with open (reverse
    crit: suspicious
    conf: 0.8
    attack: T1059.006
    mbc: B0022
    for:
      - perl
    all:
      - id: micro-behaviors/communications/socket/create::socket-call
      - id: micro-behaviors/communications/socket/create::open-call
      - id: micro-behaviors/communications/socket/create::fd-redirect
      - id: micro-behaviors/process/create/shell::sh-interactive
  - id: mkfifo-netcat-shell
    desc: Reverse shell via mkfifo and
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    mbc: B0022
    platforms:
      - unix
    for:
      - shell
    all:
      - id: micro-behaviors/fs/pipe/fifo::mkfifo-cmd
      - id: micro-behaviors/process/create/shell::sh-interactive
      - id: nc-pipe
  - id: go-reverse-shell
    desc: Go reverse shell pattern
    crit: suspicious
    conf: 0.9
    attack: T1059
    mbc: B0022
    any:
      - id: micro-behaviors/process/create/shell::bin-shell
      - id: micro-behaviors/process/create/shell::bin-sh
    all:
      - id: micro-behaviors/process/create/shell/lang::exec-cmd-run
      - id: go-child-stdin
      - id: micro-behaviors/communications/socket/connect::dial-tcp
  - id: reverse-keyword
    desc: Reverse keyword reference
    crit: notable
    conf: 0.3
    any:
      - id: reverse-connect
      - id: reverse-conn
      - id: reverse-tcp
      - id: reverse-shell
      - id: reverse-backdoor
      - id: reverse-proxy
      - id: reverse-tunnel
  - id: generic-reverse-shell
    desc: Generic reverse shell pattern (socket
    crit: suspicious
    conf: 0.8
    attack: T1059
    all:
      - id: reverse-keyword
      - id: micro-behaviors/communications/socket/listen::socket-sym
    any:
      - id: micro-behaviors/process/create/shell::bin-shell
      - id: micro-behaviors/process/create/shell::bin-sh
