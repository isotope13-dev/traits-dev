defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.007

traits:
  - id: websocket-task-request-message
    desc: WebSocket daemon accepts task requests
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'message\.type\s*===\s*["'']task_request["'']'

  - id: websocket-shell-tool-schema
    desc: Agent tool exposes shell command execution
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'name:\s*["'']terminal\.exec["'']'

composite_rules:
  - id: node-websocket-task-agent-shell
    desc: WebSocket task agent exposes local shell
    crit: hostile
    conf: 0.99
    attack: "T1059.004,T1059.007"
    scope: archive
    all:
      - id: websocket-task-request-message
      - id: websocket-shell-tool-schema
      - id: micro-behaviors/communications/http/websocket::websocket-constructor-call
      - id: micro-behaviors/process/create/shell/spawn::bash-exec
      - id: micro-behaviors/process/create/shell/bridge::spawn-call
