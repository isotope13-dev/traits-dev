defaults:
  platforms: [openbsd, bsd, unix]
  for: [kotlin, class]
  attack: T1071

traits:
  - id: kotlin-c2-register-message
    desc: Kotlin C2 register message
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: REGISTER|$agentId

  - id: kotlin-c2-poll-message
    desc: Kotlin C2 poll message
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: POLL|$agentId

  - id: kotlin-c2-cmd-prefix
    desc: Kotlin C2 CMD prefix
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: parts[0] == "CMD"

composite_rules:
  - id: kotlin-socket-botnet-tasking
    desc: Kotlin socket botnet tasking
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-c2-register-message
      - id: kotlin-c2-poll-message
      - id: kotlin-c2-cmd-prefix

