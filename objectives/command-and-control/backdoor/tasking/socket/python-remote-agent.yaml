# Socket.IO agents that turn a remotely supplied task into local command
# execution.  These are attack-context markers, not generic Socket.IO usage.
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1059.006,T1071.001

traits:
  - id: python-remote-command-event-handler
    desc: Remote command event handler
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '@(self\.)?sio\.on\(\s*["''](execute_command|run_command|command)["'']\s*\)'

  - id: python-remote-task-executor-handoff
    desc: Remote task executor handoff
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'TaskExecutor\s*\(\s*\)'

  - id: python-remote-task-execute-call
    desc: Remote task execute call
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\.execute_task\s*\('

  - id: python-shell-task-routing
    desc: Shell task routing
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '(task_type\s*=\s*["'']shell["'']|create_subprocess_exec\([\s\S]{0,420}["'']-c["''])'

composite_rules:
  - id: python-socketio-remote-command-dispatch
    desc: Socket.IO agent dispatches remote tasks for local execution
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/library/socketio::python-client-import
      - id: python-remote-command-event-handler
      - id: python-remote-task-executor-handoff
      - id: python-remote-task-execute-call
      - id: python-shell-task-routing
