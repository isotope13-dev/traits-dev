defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1059

traits:
  - id: native-socket-beacon-record
    desc: Native socket beacon record
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: BEACON|host=

  - id: native-socket-command-shell
    desc: Native socket command shell
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: "recv(_line)?\\s*\\([\\s\\S]{0,260}/bin/sh -c"

composite_rules:
  - id: native-socket-shell-tasking
    desc: Native socket shell tasking
    crit: hostile
    conf: 0.98
    all:
      - id: native-socket-beacon-record
      - id: native-socket-command-shell
