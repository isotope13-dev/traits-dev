defaults:
  platforms: [netscaler, appliance, unix]
  for: [elf]
  attack: T1059

traits:
  - id: native-netscaler-cmd-token
    desc: Native NetScaler CMD token
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "[CMD] Received:"

composite_rules:
  - id: native-netscaler-socket-tasking
    desc: Native NetScaler socket tasking
    crit: hostile
    conf: 0.98
    all:
      - id: native-netscaler-cmd-token
      - id: objectives/persistence/system/daemon/hidden::native-hidden-service-path
    any:
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
