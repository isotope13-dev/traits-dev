defaults:
  platforms: [unix, appliance]
  for: [rust, elf]
  attack: T1059
  mbc: B0030

traits:
  - id: rust-binary-beacon-magic
    desc: Rust binary beacon magic
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: HEARTBEAT_MAGIC

  - id: rust-framed-rx-fx-protocol
    desc: Rust framed RX FX protocol
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'b''R''[\s\S]{0,120}b''X''[\s\S]{0,220}b''F'''

  - id: rust-rx-fx-header-bytes
    desc: Rust RX FX header bytes
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'b''R''[\s\S]{0,120}b''X'''

  - id: rust-fx-header-bytes
    desc: Rust FX header bytes
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "b'F'"

  - id: rust-exfil-command-token
    desc: Rust EXFIL command token
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "EXFIL:"

  # Spawning `sh -c` is a generic process-execution capability — notable, not
  # suspicious alone. The socket-tasking intent is the composite (beacon magic
  # + RX/FX framing + exfil/shell-exec together).
  - id: rust-shell-command-exec
    desc: Rust spawns sh -c (shell command execution)
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'Command::new\("sh"\)[\s\S]{0,120}\.arg\("-c"\)'
    unless:
      - type: text
        regex: 'ATOMCODE_HOOK_EVENT|HookContext|hook\.command'
      - type: text
        regex: 'pub struct BashTool|ToolDef|ToolContext'
      - type: text
        regex: 'ApprovalRequirement|Destructive commands require user confirmation'
      - type: text
        regex: 'fn run_shell_command\(cmd: &str\)[\s\S]{0,260}suppress_console_window_sync'

composite_rules:
  - id: rust-framed-socket-tasking
    desc: Rust framed socket tasking
    crit: hostile
    conf: 0.98
    all:
      - id: rust-binary-beacon-magic
      - id: rust-rx-fx-header-bytes
      - id: rust-fx-header-bytes
    any:
      - id: rust-exfil-command-token
      - id: rust-shell-command-exec
      - id: micro-behaviors/communications/socket/connect::tcpstream-connect-timeout
