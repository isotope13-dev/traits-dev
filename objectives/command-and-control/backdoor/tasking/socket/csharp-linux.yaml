defaults:
  platforms: [unix]
  for: [csharp]
  attack: T1059
  mbc: B0022

traits:
  - id: csharp-tcp-command-loop
    desc: C# TCP command loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: stream.Read(buffer

  - id: csharp-bash-command-exec
    desc: C# bash command exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'FileName = "/bin/bash"[\s\S]{0,120}-c \\"'

  - id: csharp-command-result-write
    desc: C# writes command result
    crit: component
    conf: 0.92
    if:
      type: text
      substr: 'WriteLine($"RESULT:'

composite_rules:
  - id: csharp-tcp-command-backdoor
    desc: C# TCP command backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-tcp-command-loop
      - id: csharp-bash-command-exec
      - id: csharp-command-result-write
