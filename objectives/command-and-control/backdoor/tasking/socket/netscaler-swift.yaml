defaults:
  platforms: [netscaler, appliance, unix]
  for: [swift]
  attack: T1059

traits:
  - id: swift-netscaler-cmd-token
    desc: Swift NetScaler CMD token
    crit: suspicious
    conf: 0.92
    if:
      type: literal
      exact: "CMD:"

  - id: swift-netscaler-result-token
    desc: Swift NetScaler RESULT token
    crit: suspicious
    conf: 0.92
    if:
      type: literal
      exact: "RESULT:"

  - id: swift-process-shell-c
    desc: Swift Process shell -c
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Process\(\)[\s\S]{0,180}/bin/sh[\s\S]{0,80}-c'

composite_rules:
  - id: swift-netscaler-socket-tasking
    desc: Swift NetScaler socket tasking
    crit: hostile
    conf: 0.98
    all:
      - id: swift-netscaler-cmd-token
      - id: swift-netscaler-result-token
      - id: swift-process-shell-c
