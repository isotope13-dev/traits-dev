defaults:
  platforms: [routeros, appliance, unix]
  for: [python, pyc]
  attack: T1059
  mbc: B0022

traits:
- id: routeros-python-api-login
  desc: Python RouterOS API login
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(/login[\s\S]{0,160}=(name|password)=|=(name|password)=[\s\S]{0,160}/login)'
  unless:
  - id: well-known/tool/sysadmin/nmap::nmap-source-tree

- id: routeros-python-api-response
  desc: Python RouterOS response auth
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: =response=0x

- id: routeros-python-command-sender
  desc: Python RouterOS command sender
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'cmd\.split\(\)[\s\S]{0,260}_write_packet\(sock'

- id: routeros-python-command-loop
  desc: Python command iteration loop
  crit: component
  conf: 0.75
  if:
    type: text
    substr: for cmd in commands

- id: routeros-python-api-port--8728
  desc: Python RouterOS API port (8728)
  crit: component
  conf: 0.88
  if:
    type: text
    word: '8728'
- id: routeros-python-api-port--8729
  desc: Python RouterOS API port (8729)
  crit: component
  conf: 0.88
  if:
    type: text
    word: '8729'
composite_rules:
- id: routeros-python-api-port
  desc: Python RouterOS API port
  crit: component
  conf: 0.88
  any:
  - id: routeros-python-api-port--8728
  - id: routeros-python-api-port--8729
- id: routeros-python-api-socket-tasking
  desc: Python RouterOS API tasking
  crit: hostile
  conf: 0.98
  all:
  - id: routeros-python-api-login
  - id: routeros-python-api-response
  - id: routeros-python-command-sender
  any:
  - id: routeros-python-command-loop
  - id: micro-behaviors/communications/socket/receive::socket-data-transfer

- id: routeros-python-api-c2-channel
  desc: Python RouterOS API C2 channel
  crit: hostile
  conf: 0.96
  all:
  - id: routeros-python-api-login
  - id: routeros-python-api-port
  - id: micro-behaviors/communications/socket/connect::connect-python
  - id: micro-behaviors/communications/socket/receive::socket-data-transfer
