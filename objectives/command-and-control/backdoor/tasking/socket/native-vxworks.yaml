defaults:
  platforms: [appliance, unix]
  for: [c, cpp, objc, elf]
  attack: T1059
  mbc: B0030

traits:
  - id: pipe-beacon-record
    desc: Pipe-delimited BEACON record
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "BEACON|"

  - id: pipe-exfil-record
    desc: Pipe-delimited EXFIL record
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "EXFIL|"

  - id: pipe-result-record
    desc: Pipe-delimited RESULT record
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "RESULT|"

  - id: pipe-file-record
    desc: Pipe-delimited FILE record
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "FILE|"

  - id: native-line-c2-records
    desc: Native line-delimited C2 records
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'EXFIL (passwd|shadow|environ)|BEACON completed'

  - id: native-exec-read-task-tokens
    desc: Native exec read task tokens
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(^|[^/[:alnum:]])(EXEC|READ):'
    unless:
      - id: well-known/app/drivers::linux-driver-core-library-basename
      - id: well-known/app/drivers::arch-nvidia-utils-package


  - id: native-destructive-task-tokens
    desc: Native destructive task tokens
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\b(WIPEDRIVE|REINSTALL|BEAT)\b'

  - id: vxworks-image-discovery
    desc: VxWorks image discovery
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\*\.vxe|/etc/vxWorks|\bvxWorks\b'

composite_rules:
  - id: native-pipe-delimited-c2-records
    desc: Native pipe-delimited C2 records
    crit: suspicious
    conf: 0.94
    any:
      - id: pipe-beacon-record
      - id: pipe-exfil-record
      - id: pipe-result-record
      - id: pipe-file-record
    needs: 2

  - id: vxworks-native-socket-tasking
    desc: VxWorks socket tasking
    crit: hostile
    conf: 0.98
    all:
      - id: native-pipe-delimited-c2-records
      - id: micro-behaviors/communications/socket/connect::connect
    any:
      - id: native-exec-read-task-tokens
      - id: native-destructive-task-tokens

  - id: vxworks-destructive-socket-tasking
    desc: VxWorks destructive tasking
    crit: hostile
    conf: 0.98
    all:
      - id: native-line-c2-records
      - id: native-destructive-task-tokens
      - id: micro-behaviors/communications/socket/connect::connect
