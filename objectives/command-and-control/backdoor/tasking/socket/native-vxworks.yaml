defaults:
  platforms: [appliance, unix]
  for: [c, cpp, objc, elf]
  attack: T1059
  mbc: B0030

traits:
- id: pipe-beacon-record
  desc: Pipe-delimited BEACON record
  crit: component
  conf: 0.88
  if:
    type: text
    substr: "BEACON|"

- id: pipe-exfil-record
  desc: Pipe-delimited EXFIL record
  crit: component
  conf: 0.88
  if:
    type: text
    substr: "EXFIL|"

- id: pipe-result-record
  desc: Pipe-delimited RESULT record
  crit: component
  conf: 0.88
  if:
    type: text
    substr: "RESULT|"

- id: pipe-file-record
  desc: Pipe-delimited FILE record
  crit: component
  conf: 0.92
  if:
    type: text
    substr: "FILE|"

- id: native-line-c2-records
  desc: Native line-delimited C2 records
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'EXFIL (passwd|shadow|environ)|BEACON completed'

- id: native-exec-read-task-tokens
  desc: Native exec read task tokens
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '(^|[^/[:alnum:]])(EXEC|READ):'
  unless:
  - id: well-known/app/drivers::linux-driver-core-library-basename
  - id: well-known/app/drivers::arch-nvidia-utils-package
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename


- id: vxworks-image-discovery
  desc: VxWorks image discovery
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: '\*\.vxe|/etc/vxWorks|\bvxWorks\b'

- id: native-destructive-task-tokens--wipedrive
  desc: Native destructive task tokens (WIPEDRIVE)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    word: WIPEDRIVE
- id: native-destructive-task-tokens--reinstall
  desc: Native destructive task tokens (REINSTALL)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    word: REINSTALL
- id: native-destructive-task-tokens--beat
  desc: Native destructive task tokens (BEAT)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    word: BEAT
composite_rules:
  # "FILE|" and "RESULT|" are extremely common substrings (table headers, enums,
  # bat's syntax grammars), so "2 pipe-delimited tokens" is not suspicious on its
  # own. Building block for the hostile socket-tasking composite below, which adds
  # socket connect + EXEC/destructive task tokens.
- id: native-destructive-task-tokens
  desc: Native destructive task tokens
  crit: suspicious
  conf: 0.92
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename

  any:
  - id: native-destructive-task-tokens--wipedrive
  - id: native-destructive-task-tokens--reinstall
  - id: native-destructive-task-tokens--beat
- id: native-pipe-delimited-c2-records
  desc: Native pipe-delimited C2 records
  crit: component
  conf: 0.94
  any:
  - id: pipe-beacon-record
  - id: pipe-exfil-record
  - id: pipe-result-record
  - id: pipe-file-record
  needs: 2

- id: vxworks-native-socket-tasking
  desc: VxWorks socket tasking
  crit: hostile
  conf: 0.98
  all:
  - id: native-pipe-delimited-c2-records
  - id: micro-behaviors/communications/socket/connect::connect
  any:
  - id: native-exec-read-task-tokens
  - id: native-destructive-task-tokens
  unless:
  - id: well-known/tool/sysadmin/alpine-packages::alpine-parseable-binary
  - id: well-known/app/tabby::tabby-release-binary
  - id: well-known/tool/sysadmin/alpine-packages::parseable-binary-name

- id: vxworks-destructive-socket-tasking
  desc: VxWorks destructive tasking
  crit: hostile
  conf: 0.98
  all:
  - id: native-line-c2-records
  - id: native-destructive-task-tokens
  - id: micro-behaviors/communications/socket/connect::connect
