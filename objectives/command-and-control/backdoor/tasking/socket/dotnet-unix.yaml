defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1059

traits:
  - id: dotnet-botnet-register
    desc: .NET botnet register
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: BOTNET_REGISTER|agent|

  - id: dotnet-sh-command-exec
    desc: .NET sh command exec
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/app/aks-engine/
      - type: path
        substr: aks-engine-
    if:
      type: text
      regex: '/bin/sh[\s\S]{0,120}-c '

composite_rules:
  - id: dotnet-tcp-command-backdoor
    desc: .NET TCP command backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-botnet-register
      - id: objectives/command-and-control/backdoor/tasking/socket::csharp-tcp-command-loop
      - id: dotnet-sh-command-exec
