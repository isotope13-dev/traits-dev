defaults:
  platforms: [netbsd, unix]
  for: [go, elf]
  attack: T1059

traits:
  - id: go-cmd-line-protocol
    desc: Go CMD line protocol
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'HasPrefix\(line, "CMD "\)[\s\S]{0,260}/bin/sh'

  - id: go-cmd-shell-protocol-elf
    desc: Go CMD shell protocol ELF
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CMD [\s\S]{0,220}/bin/sh'

  - id: go-c2-result-line
    desc: Go C2 result line
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: RESULT %s

  - id: go-http-c2-result-path
    desc: Go HTTP C2 result path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /c2/result

composite_rules:
  - id: go-netbsd-cmd-shell-c2
    desc: Go NetBSD CMD shell C2
    crit: hostile
    conf: 0.98
    all:
      - id: go-cmd-line-protocol
    any:
      - id: go-c2-result-line
      - id: go-http-c2-result-path

  - id: go-netbsd-cmd-shell-c2-elf
    desc: Go NetBSD CMD shell C2 ELF
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/encoded::bin-sh-binary-text
    any:
      - id: go-c2-result-line
      - id: go-http-c2-result-path
