defaults:
  platforms: [routeros, appliance, unix]
  for: [rust, elf]
  attack: T1059

traits:
  - id: rust-routeros-commands-path
    desc: Rust RouterOS commands path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /commands

  - id: rust-routeros-trigger-path
    desc: Rust RouterOS trigger path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /trigger

  - id: rust-shell-command-runner
    desc: Rust shell command runner
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Command::new\("(sh|/bin/sh)"\)|/bin/sh -c'

  - id: rust-command-result-report
    desc: Rust command result report
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(/report|/api/v1/result|result=\{\})'

  - id: rust-c2-command-response-strings
    desc: Rust C2 command responses
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'injection attempted[\s\S]{0,160}persistence established|uploaded successfully'

  - id: rust-backdoor-listener-string
    desc: Rust backdoor listener string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'backdoor (bind failed|listening)'

  - id: rust-command-type-dispatch
    desc: Rust command type dispatch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '"shell"[\s\S]{0,220}"download"[\s\S]{0,220}"upload"'

composite_rules:
  - id: rust-routeros-http-command-tasking
    desc: Rust RouterOS HTTP tasking
    crit: hostile
    conf: 0.98
    all:
      - id: rust-shell-command-runner
    any:
      - id: rust-routeros-commands-path
      - id: rust-routeros-trigger-path
      - id: rust-command-type-dispatch
      - id: rust-command-result-report
      - id: rust-c2-command-response-strings
    needs: 2

  - id: rust-routeros-backdoor-tasking
    desc: Rust RouterOS backdoor tasking
    crit: hostile
    conf: 0.98
    all:
      - id: rust-backdoor-listener-string
      - id: rust-routeros-commands-path
      - id: rust-command-result-report
