defaults:
  platforms: [routeros, appliance, unix]
  for: [rust, elf]
  attack: T1059

traits:
  - id: rust-commands-path-literal
    desc: Rust commands endpoint path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']/[A-Za-z0-9_]{0,32}commands([^A-Za-z0-9.-]|$)'

  - id: rust-commands-request-line
    desc: Rust commands HTTP request
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(GET|POST) /[A-Za-z0-9_]{0,32}commands'

  - id: rust-routeros-trigger-path
    desc: Rust RouterOS trigger path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'RouterOS[\s\S]{0,260}/trigger|/trigger[\s\S]{0,260}RouterOS'

  - id: rust-shell-command-runner
    desc: Rust shell command runner
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Command::new\("(sh|/bin/sh)"\)|/bin/sh -c'
    unless:
      - type: text
        regex: 'ATOMCODE_HOOK_EVENT|HookContext|hook\.command'
      - type: text
        regex: 'pub struct BashTool|ToolDef|ToolContext'
      - type: text
        regex: 'ApprovalRequirement|Destructive commands require user confirmation'
      - type: text
        regex: 'fn run_shell_command\(cmd: &str\)[\s\S]{0,260}suppress_console_window_sync'
      - type: text
        regex: 'ParallelEditTool|build_detect|Build command failed|Build timed out'
      - type: text
        regex: 'script_parity|shell_script_matches_rust|--print-manifest'

  - id: rust-report-path-literal
    desc: Rust report endpoint path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '["'']/[A-Za-z0-9_]{0,32}report([^A-Za-z0-9.-]|$)'

  - id: rust-report-request-line
    desc: Rust report HTTP request
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(GET|POST) /[A-Za-z0-9_]{0,32}report'

  - id: rust-api-result-path
    desc: Rust API result path
    crit: component
    conf: 0.88
    if:
      type: text
      substr: /api/v1/result

  - id: rust-result-format-token
    desc: Rust result format token
    crit: component
    conf: 0.86
    if:
      type: text
      substr: 'result={}'

  - id: rust-c2-command-response-strings
    desc: Rust C2 command responses
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'injection attempted[\s\S]{0,160}persistence established'

  - id: rust-backdoor-listener-string
    desc: Rust backdoor listener string
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'backdoor (bind failed|listening)'

  - id: rust-command-type-dispatch
    desc: Rust command type dispatch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '"shell"[\s\S]{0,220}"download"[\s\S]{0,220}"upload"'

composite_rules:
  - id: rust-command-endpoint-path
    desc: Rust command endpoint path
    crit: component
    conf: 0.9
    any:
      - id: rust-commands-path-literal
      - id: rust-commands-request-line

  - id: rust-command-result-report
    desc: Rust command result report
    crit: component
    conf: 0.9
    any:
      - id: rust-report-path-literal
      - id: rust-report-request-line
      - id: rust-api-result-path
      - id: rust-result-format-token

  - id: rust-http-command-tasking
    desc: Rust HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: rust-shell-command-runner
      - id: rust-command-endpoint-path
      - id: rust-command-result-report
    any:
      - id: rust-command-type-dispatch
      - id: rust-c2-command-response-strings
      - id: rust-routeros-trigger-path
      - id: rust-backdoor-listener-string

  - id: rust-http-backdoor-tasking
    desc: Rust HTTP backdoor tasking
    crit: hostile
    conf: 0.98
    all:
      - id: rust-backdoor-listener-string
      - id: rust-command-endpoint-path
      - id: rust-command-result-report
