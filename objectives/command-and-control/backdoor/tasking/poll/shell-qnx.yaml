defaults:
  platforms: [qnx, unix]
  for: [shell]
  attack: T1059

traits:
  - id: qnx-shell-http-command-fetch
    desc: QNX shell HTTP command fetch
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "http://$C2_HOST/api/command"

  - id: qnx-shell-command-file-exec
    desc: QNX shell command file exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'chmod \+x "\$cmd_file"[\s\S]{0,80}sh "\$cmd_file"'

  - id: qnx-shell-ssh-command-fetch
    desc: QNX shell SSH command fetch
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: cat /tmp/cmd_payload.sh

  - id: qnx-shell-ssh-command-exec
    desc: QNX shell SSH command exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'c2_ssh_commands\.sh"[\s\S]{0,140}sh "\$WORK/c2_ssh_commands\.sh"'

composite_rules:
  - id: qnx-shell-http-command-tasking
    desc: QNX shell HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-shell-http-command-fetch
      - id: qnx-shell-command-file-exec

  - id: qnx-shell-ssh-command-tasking
    desc: QNX shell SSH command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-shell-ssh-command-fetch
      - id: qnx-shell-ssh-command-exec
