defaults:
  platforms:
    - windows
  for:
    - c
traits:
  - id: encryptpass-call
    desc: Admin password hash call
    crit: suspicious
    conf: 0.93
    attack: T1071
    if:
      type: string_literal
      exact: invoke  EncryptPass, addr lpBuf
  - id: password-compare
    desc: Admin password compare
    crit: suspicious
    conf: 0.93
    attack: T1071
    if:
      type: string_literal
      exact: .IF     eax != Password
  - id: hidden-winexec
    desc: Hidden WinExec payload launch
    crit: suspicious
    conf: 0.92
    attack: T1106
    if:
      type: string_literal
      exact: invoke  WinExec, addr lpBuf, SW_HIDE
  - id: hidden-shellexecute
    desc: Hidden ShellExecute payload launch
    crit: suspicious
    conf: 0.92
    attack: T1106
    if:
      type: string_literal
      exact: invoke  ShellExecute, 0, offset szTextOpen, addr lpBuf, offset ExeUpdParam, NULL, SW_HIDE
  - id: updater-drop-path
    desc: Upldf updater drop path
    crit: suspicious
    conf: 0.95
    attack: T1105
    if:
      type: string_literal
      regex: (?i)\\upldf(\\|/|[A-Za-z0-9._-])
  - id: updater-arg
    desc: Upldf updater argument
    crit: suspicious
    conf: 0.95
    attack: T1105
    if:
      type: string_literal
      regex: ExeUpdParam\s+db\s+" -upd",0
  - id: url-download-call
    desc: URLDownloadToFile call
    crit: suspicious
    conf: 0.93
    attack: T1105
    if:
      type: string_literal
      substr: URLDownloadToFile
    unless:
      - id: metadata/lang/source/
      - id: metadata/lang/source/
  - id: socks4-admin-channel
    desc: SOCKS4 admin control channel
    crit: suspicious
    conf: 0.9
    attack: T1090
    if:
      type: string_literal
      word: SOCKS4_HEAD
composite_rules:
  - id: infection-notify-http
    desc: HTTP infection notify channel
    crit: component
    conf: 0.9
    attack: T1071.001
    all:
      - id: micro-behaviors/communications/http/get::wininet-open-url-src
    unless:
      - id: metadata/lang/source/
      - id: metadata/lang/source/
  - id: password-gated-handler
    desc: Password-gated admin handler
    crit: suspicious
    conf: 0.95
    attack: T1071
    all:
      - id: encryptpass-call
      - id: password-compare
  - id: hidden-update-dropper
    desc: Hidden updater drop and exec
    crit: suspicious
    conf: 0.96
    attack: T1105
    all:
      - id: updater-drop-path
      - id: updater-arg
    any:
      - id: hidden-winexec
      - id: hidden-shellexecute
  - id: url-download-execute
    desc: URL download then execute
    crit: suspicious
    conf: 0.95
    attack: T1105
    all:
      - id: url-download-call
    any:
      - id: hidden-winexec
      - id: hidden-shellexecute
  - id: authenticated-download-exec-backdoor
    desc: Authenticated backdoor with update execution
    crit: hostile
    conf: 0.97
    attack: T1071,T1105
    all:
      - id: password-gated-handler
      - id: hidden-update-dropper
    any:
      - id: url-download-execute
      - id: socks4-admin-channel
      - id: infection-notify-http
