defaults:
  platforms: [unix, windows]
  for: [ruby]
  attack: T1071.001

traits:
  - id: ruby-api-v1-exfil-path
    desc: Ruby C2 exfil path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/exfil

  - id: ruby-octet-stream-post
    desc: Ruby octet-stream HTTP POST
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: "Net::HTTP::Post[\\s\\S]{0,260}application/octet-stream"

composite_rules:
  - id: ruby-beacon-exfil-c2
    desc: Ruby beacon and exfil C2 client
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/command-and-control/backdoor/tasking/poll::ruby-routeros-beacon-path
      - id: ruby-api-v1-exfil-path
    any:
      - id: ruby-octet-stream-post
      - id: micro-behaviors/communications/http/lib/netlib::net-http
