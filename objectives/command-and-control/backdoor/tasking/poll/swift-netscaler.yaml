defaults:
  platforms: [netscaler, appliance, unix]
  for: [swift]
  attack: T1102

traits:
  - id: swift-report-api-post
    desc: Swift report API POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/v1/report[\s\S]{0,180}request\.httpMethod = "POST"'

  - id: swift-command-poll-api
    desc: Swift command poll API
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/v1/commands

  - id: swift-payload-batch-json
    desc: Swift payload batch JSON
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'payloads\.map[\s\S]{0,160}JSONSerialization'

composite_rules:
  - id: swift-netscaler-http-tasking
    desc: Swift NetScaler HTTP tasking
    crit: hostile
    conf: 0.98
    all:
      - id: swift-report-api-post
      - id: swift-command-poll-api
    any:
      - id: swift-payload-batch-json
