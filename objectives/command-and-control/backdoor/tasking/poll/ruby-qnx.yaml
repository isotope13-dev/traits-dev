defaults:
  platforms: [qnx, unix]
  for: [ruby]
  attack: T1059

traits:
  - id: qnx-ruby-beacon-api
    desc: QNX Ruby beacon API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/beacon/

  - id: qnx-ruby-result-api
    desc: QNX Ruby result API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/result/

  - id: qnx-ruby-backtick-command-result
    desc: QNX Ruby backtick command result
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'execute_command\(cmd\)[\s\S]{0,180}`#\{cmd\} 2>&1`'

composite_rules:
  - id: qnx-ruby-beacon-command-tasking
    desc: QNX Ruby beacon command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-ruby-beacon-api
      - id: qnx-ruby-result-api
      - id: qnx-ruby-backtick-command-result
