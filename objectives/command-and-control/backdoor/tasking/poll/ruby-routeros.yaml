defaults:
  platforms: [routeros, appliance, unix]
  for: [ruby]
  attack: T1059

traits:
  - id: ruby-routeros-beacon-path
    desc: Ruby RouterOS beacon path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/v1/beacon

  - id: ruby-c2-command-types
    desc: Ruby C2 command types
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'when ''shell''[\s\S]{0,220}when ''download''[\s\S]{0,220}when ''upload'''

  - id: ruby-c2-backtick-result
    desc: Ruby C2 backtick result
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'def execute_shell_command[\s\S]{0,120}`\#\{command\} 2>&1`'

  - id: ruby-command-result-path
    desc: Ruby command result path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/result

composite_rules:
  - id: ruby-routeros-beacon-tasking
    desc: Ruby RouterOS beacon tasking
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-routeros-beacon-path
      - id: ruby-c2-command-types
      - id: ruby-c2-backtick-result
      - id: ruby-command-result-path
