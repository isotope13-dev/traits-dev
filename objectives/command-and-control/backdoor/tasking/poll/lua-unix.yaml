defaults:
  platforms: [routeros, appliance, unix]
  for: [lua]
  attack: T1059
  mbc: B0022

traits:
  - id: lua-http-command-poll-path
    desc: Lua HTTP command poll path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/(commands|task|cmd)\?bot_id='

  - id: lua-http-result-post-path
    desc: Lua HTTP result post path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/(result|report)\?bot_id='

  - id: lua-action-dispatch-labels
    desc: Lua C2 action dispatch labels
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'action == "(execute|scan|exfil|recon)"'

  - id: lua-http-command-get
    desc: Lua HTTP command GET endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/command[\s\S]{0,260}https\.request[\s\S]{0,120}method\s*=\s*"GET"'

  - id: lua-http-result-post
    desc: Lua HTTP result POST endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/result[\s\S]{0,260}https\.request[\s\S]{0,160}method\s*=\s*"POST"'

  - id: lua-exec-response-dispatch
    desc: Lua exec response dispatch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'response:match\("exec:"\)[\s\S]{0,320}execute_command\(cmd\)'

composite_rules:
  - id: lua-http-command-tasking
    desc: Lua HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: lua-http-command-poll-path
      - id: lua-http-result-post-path
      - id: lua-action-dispatch-labels
      - id: micro-behaviors/process/create/shell/invoke::lua-io-popen

  - id: lua-http-exec-command-tasking
    desc: Lua HTTP exec command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: lua-http-command-get
      - id: lua-http-result-post
      - id: lua-exec-response-dispatch
      - id: micro-behaviors/process/create/shell/invoke::lua-io-popen
