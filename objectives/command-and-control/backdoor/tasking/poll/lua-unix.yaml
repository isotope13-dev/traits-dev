defaults:
  platforms: [routeros, appliance, unix]
  for: [lua]
  attack: T1059
  mbc: B0022

traits:
  - id: lua-http-command-poll-path
    desc: Lua HTTP command poll path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/(commands|task|cmd)\?bot_id='

  - id: lua-http-result-post-path
    desc: Lua HTTP result post path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/(result|report)\?bot_id='

  - id: lua-action-dispatch-labels
    desc: Lua C2 action dispatch labels
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'action == "(execute|scan|exfil|recon)"'

composite_rules:
  - id: lua-http-command-tasking
    desc: Lua HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: lua-http-command-poll-path
      - id: lua-http-result-post-path
      - id: lua-action-dispatch-labels
      - id: micro-behaviors/process/create/shell/invoke::lua-io-popen
