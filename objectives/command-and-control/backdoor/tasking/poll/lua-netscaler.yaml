defaults:
  platforms: [netscaler, appliance, unix]
  for: [lua]
  attack: T1102

traits:
  - id: lua-netscaler-c2-register
    desc: Lua NetScaler C2 register
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /register?

  - id: lua-netscaler-c2-commands
    desc: Lua NetScaler C2 commands
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /commands?server=

  - id: lua-txn-response-control
    desc: Lua txn response control
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'txn\.set_http_response_(status|header|body)'

composite_rules:
  - id: lua-netscaler-http-tasking
    desc: Lua NetScaler HTTP tasking
    crit: hostile
    conf: 0.98
    all:
      - id: lua-netscaler-c2-register
      - id: lua-netscaler-c2-commands
    any:
      - id: lua-txn-response-control
