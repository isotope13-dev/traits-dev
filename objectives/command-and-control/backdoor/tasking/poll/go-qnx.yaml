defaults:
  platforms: [qnx, unix]
  for: [go, elf]
  attack: T1059

traits:
  # The /api/commands and /api/upload REST endpoint paths are generic web-API
  # capabilities — relocated to micro-behaviors/communications/http/endpoints and
  # referenced cross-directory by the tasking composites below. Tasking intent
  # comes from the QNX-specific legs (exec.Command sh -c payload, QNXSystemMonitor
  # UA, hidden sysmon path).
  - id: qnx-go-shell-command-action
    desc: QNX Go shell command action
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: exec.Command("sh", "-c", cmd.Payload)

  - id: qnx-go-systemmonitor-ua
    desc: QNX Go system monitor UA
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: QNXSystemMonitor/1.0

  - id: qnx-go-https-file-query
    desc: QNX Go HTTPS file query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: https://%s%s?file=%s

composite_rules:
  - id: qnx-go-http-command-tasking
    desc: QNX Go HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::api-commands-endpoint
      - id: micro-behaviors/communications/http/endpoints::api-upload-endpoint
      - id: qnx-go-shell-command-action

  - id: qnx-go-systemmonitor-tasking
    desc: QNX Go system monitor tasking
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::api-commands-endpoint
      - id: micro-behaviors/communications/http/endpoints::api-upload-endpoint
      - id: qnx-go-systemmonitor-ua
    any:
      - id: qnx-go-https-file-query

  - id: qnx-go-sysmon-agent-tasking
    desc: QNX Go sysmon agent tasking
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::api-commands-endpoint
      - id: micro-behaviors/communications/http/endpoints::api-upload-endpoint
      - id: objectives/persistence/login/shell/config::qnx-go-hidden-sysmon-path
