defaults:
  platforms: [qnx, unix]
  for: [go, elf]
  attack: T1059

traits:
  # Generic REST endpoint paths — /api/commands and /api/upload appear in many
  # cloud/sync tools (rclone) and web servers. No standalone signal; building
  # blocks for the tasking composites, which require the specific implant legs
  # (exec.Command("sh","-c",cmd.Payload), QNXSystemMonitor UA, hidden sysmon path).
  - id: qnx-go-api-commands-path
    desc: QNX Go API commands path
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /api/commands

  - id: qnx-go-api-upload-path
    desc: QNX Go API upload path
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /api/upload

  - id: qnx-go-shell-command-action
    desc: QNX Go shell command action
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: exec.Command("sh", "-c", cmd.Payload)

  - id: qnx-go-systemmonitor-ua
    desc: QNX Go system monitor UA
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: QNXSystemMonitor/1.0

  - id: qnx-go-https-file-query
    desc: QNX Go HTTPS file query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: https://%s%s?file=%s

composite_rules:
  - id: qnx-go-http-command-tasking
    desc: QNX Go HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-api-commands-path
      - id: qnx-go-api-upload-path
      - id: qnx-go-shell-command-action

  - id: qnx-go-systemmonitor-tasking
    desc: QNX Go system monitor tasking
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-api-commands-path
      - id: qnx-go-api-upload-path
      - id: qnx-go-systemmonitor-ua
    any:
      - id: qnx-go-https-file-query

  - id: qnx-go-sysmon-agent-tasking
    desc: QNX Go sysmon agent tasking
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-api-commands-path
      - id: qnx-go-api-upload-path
      - id: objectives/persistence/login/shell/config::qnx-go-hidden-sysmon-path
