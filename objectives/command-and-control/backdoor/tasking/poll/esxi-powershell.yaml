defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1059.001

traits:
  - id: powershell-api-tasks-poll
    desc: PowerShell API tasks poll
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "api/tasks?host="

  - id: powershell-task-command-iex
    desc: PowerShell task command IEX
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Invoke-Expression\s+\$[A-Za-z_]\w*\.command'

composite_rules:
  - id: powershell-c2-task-execution
    desc: PowerShell C2 task execution
    crit: hostile
    conf: 0.98
    all:
      - id: powershell-api-tasks-poll
      - id: powershell-task-command-iex
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::irm-name
