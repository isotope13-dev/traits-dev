defaults:
  platforms: [routeros, appliance]
  for: [javascript]
  attack: T1059

traits:
  - id: routeros-js-c2-command-poll
    desc: RouterOS JS C2 command poll
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'GET /commands\?id=|parseC2Commands'

  - id: routeros-js-script-command-exec
    desc: RouterOS JS script command exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'cmd\.startsWith\("run:"\)[\s\S]{0,260}system\.runScript'

composite_rules:
  - id: routeros-js-http-tasking
    desc: RouterOS JS HTTP tasking
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-js-c2-command-poll
      - id: routeros-js-script-command-exec
    any:
      - id: micro-behaviors/communications/http/post::post-request-line
      - id: micro-behaviors/communications/http/post::http-post-call
