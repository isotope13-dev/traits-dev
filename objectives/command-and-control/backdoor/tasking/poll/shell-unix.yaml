defaults:
  platforms: [unix, appliance]
  for: [shell]
  attack: T1059

traits:
  - id: shell-command-download-file
    desc: Shell downloads command file
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(wget\s+-q\s+-O|curl\s+-s\s+-o)\s*"\$.{0,80}(cmd|command).{0,80}\.sh"'
      case_insensitive: true

  - id: shell-exec-cmdfile-variable
    desc: Shell executes cmd file var
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'chmod \+x "\$[A-Z_]*CMD[A-Z_]*"[\s\S]{0,180}sh "\$[A-Z_]*CMD[A-Z_]*"'

  - id: shell-c2-response-eval
    desc: Shell evals C2 response
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'echo "\$_resp"[\s\S]{0,180}eval "\$_cmd"'


composite_rules:
  - id: shell-downloaded-command-tasking
    desc: Shell downloaded command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: shell-command-download-file
    any:
      - id: shell-exec-cmdfile-variable

  - id: shell-c2-eval-tasking
    desc: Shell C2 eval tasking
    crit: hostile
    conf: 0.98
    all:
      - id: shell-c2-response-eval
    any:
      - id: micro-behaviors/communications/http/download/curl::wget-cmd
      - id: micro-behaviors/communications/http/download/curl::curl-silent
