defaults:
  platforms: [qnx, unix]
  for: [typescript, javascript]
  attack: T1059

traits:
  - id: qnx-ts-automation-cmd-log
    desc: QNX TS automation cmd log
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: '[AUTOMATION] CMD'

  - id: qnx-ts-https-collect-post
    desc: QNX TS HTTPS collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'path:\s*"/collect"[\s\S]{0,900}(https\.request|https_1\.default\.request)'

  - id: qnx-ts-http-fallback-post
    desc: QNX TS HTTP fallback POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'fallbackExfiltrate[\s\S]{0,900}(http\.request|http_1\.default\.request)'

composite_rules:
  - id: qnx-ts-automation-result-post
    desc: QNX TS automation result POST
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/bridge::js-execsync-cmd-arg
      - id: qnx-ts-automation-cmd-log
      - id: qnx-ts-https-collect-post
      - id: qnx-ts-http-fallback-post

  - id: qnx-js-compiled-automation-result-post
    desc: QNX JS compiled automation POST
    crit: hostile
    conf: 0.98
    for: [javascript]
    all:
      - id: micro-behaviors/process/create/shell/bridge::js-compiled-execsync-cmd-arg
      - id: qnx-ts-automation-cmd-log
      - id: qnx-ts-https-collect-post
      - id: qnx-ts-http-fallback-post
