defaults:
  platforms: [unix, appliance, windows]
  for: [javascript, typescript]
  attack: T1059

traits:
  - id: js-json-command-field
    desc: JS parses command field
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'parsed\.command[\s\S]{0,80}parsed\.cmd'

  - id: js-execute-command-function
    desc: JS execute command function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: function executeCommand
    unless:
      - id: metadata/library/structure/
      - id: metadata/package/files/dependency::node-modules-path
      - id: micro-behaviors/process/create/shell/host/
      - id: well-known/tool/offensive/sic-security/

  - id: js-execsync-cmd-call
    desc: JS execSync command call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'execSync\)?\s*\(\s*((cmd|command)\b|`\$\{(cmd|command)\})'
    unless:
      - type: text
        regex: 'vscode[\s\S]{0,260}DaemonProcess|findBundledDaemon|which atomcode|where atomcode'
      - id: metadata/library/structure/
      - id: metadata/package/files/dependency::node-modules-path
      - id: micro-behaviors/process/create/shell/host/
      - id: well-known/tool/offensive/sic-security/
      - type: text
        substr: "import sys; print(sys.version_info.major"

  - id: js-command-array-dispatch
    desc: JS dispatches command array
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Array\.isArray\(.{0,80}\.commands\)[\s\S]{0,260}executeCommand\(.{0,80}\.command'

composite_rules:
  - id: js-api-command-tasking
    desc: JS API command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::api-command-path
      - id: micro-behaviors/communications/http/endpoints::api-response-path
      - id: js-json-command-field
    any:
      - id: micro-behaviors/process/create/shell/bridge::js-execsync-cmd-arg
      - id: micro-behaviors/process/create/shell/bridge::js-compiled-execsync-cmd-arg

  - id: js-command-poll-exec
    desc: JS command poll exec
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::api-command-path
      - id: micro-behaviors/communications/http/endpoints::api-response-path
      - id: js-execute-command-function
      - id: js-execsync-cmd-call

  - id: js-api-commands-tasking
    desc: JS API commands tasking
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::api-commands-path
      - id: js-command-array-dispatch
      - id: js-execute-command-function
      - id: js-execsync-cmd-call
    any:
      - id: objectives/command-and-control/infrastructure/keywords::node-command-results-post
      - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
