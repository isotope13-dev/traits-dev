defaults:
  platforms: [windows, unix]
  for: [csharp]
  attack: T1071.004
  mbc: B0030

traits:
  - id: csharp-dns-server-query-event
    desc: C# DNS server query event
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'DnsServer[\s\S]{0,220}QueryReceived'
  - id: csharp-dns-txt-job-response
    desc: C# DNS TXT job response
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'TxtRecord\([^;\n]{0,160}(createdJob\.Id|signalResult|result)'
  - id: csharp-dns-job-dispatch
    desc: C# DNS job dispatch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'DispatchAsync\(job,\s*parameters\)'
  - id: csharp-dns-signal-dispatch
    desc: C# DNS signal dispatch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'DispatchAsync\(agent,\s*signalType,\s*parameters\)'

composite_rules:
  - id: csharp-dns-c2-tasking-server
    desc: C# DNS C2 tasking server
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-dns-server-query-event
      - id: csharp-dns-txt-job-response
      - id: csharp-dns-job-dispatch
    any:
      - id: csharp-dns-signal-dispatch
