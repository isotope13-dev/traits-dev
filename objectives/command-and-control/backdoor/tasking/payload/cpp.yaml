defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
  mbc: B0030
  attack: T1071
traits:
  - id: cxx-send-post-symbol
    desc: C++ SendPost payload routine
    crit: component
    conf: 0.94
    size_min: 500000
    size_max: 8000000
    if:
      type: text
      exact: _Z8SendPostP11_POST_PARAMPhPjS2_
      section: .strtab
  - id: cxx-send-payload-symbol
    desc: C++ SendPayload routine symbol
    crit: component
    conf: 0.94
    size_min: 500000
    size_max: 8000000
    if:
      type: text
      exact: _Z11SendPayloadPhj
      section: .strtab
  - id: cxx-recv-payload-symbol
    desc: C++ RecvPayload routine symbol
    crit: component
    conf: 0.94
    size_min: 500000
    size_max: 8000000
    if:
      type: text
      exact: _Z11RecvPayloadPhPj
      section: .strtab
  - id: cxx-accept-request-symbol
    desc: C++ AcceptRequest routine symbol
    crit: component
    conf: 0.9
    size_min: 500000
    size_max: 8000000
    if:
      type: text
      exact: _Z13AcceptRequestv
      section: .strtab
  - id: cxx-post-param-builder
    desc: C++ post parameter builder
    crit: component
    conf: 0.9
    size_min: 500000
    size_max: 8000000
    if:
      type: text
      exact: _Z12MakeOptionalP11_POST_PARAMPhPj
      section: .strtab
  - id: cxx-crypt-payload-symbol
    desc: C++ CryptPayload routine symbol
    crit: component
    conf: 0.93
    size_min: 500000
    size_max: 8000000
    if:
      type: text
      exact: _Z12CryptPayloadPhjS_Pj
      section: .strtab
  - id: cxx-decrypt-payload-symbol
    desc: C++ DecryptPayload routine symbol
    crit: component
    conf: 0.93
    size_min: 500000
    size_max: 8000000
    if:
      type: text
      exact: _Z14DecryptPayloadPhjS_Pj
      section: .strtab
composite_rules:
  - id: native-payload-transport-routines
    desc: Native C2 payload transport routines
    crit: suspicious
    conf: 0.94
    needs: 3
    any:
      - id: cxx-send-post-symbol
      - id: cxx-send-payload-symbol
      - id: cxx-recv-payload-symbol
      - id: cxx-accept-request-symbol
      - id: cxx-post-param-builder
  - id: native-payload-command-tasking
    desc: Native payload transport with command execution
    crit: hostile
    conf: 0.97
    all:
      - id: native-payload-transport-routines
      - id: micro-behaviors/process/create/popen::c-popen
    any:
      - id: micro-behaviors/communications/socket/connect::connect-symbol
      - id: micro-behaviors/communications/socket/send::send-symbol
      - id: micro-behaviors/communications/socket/receive::recv-symbol
  - id: native-encrypted-payload-tasking
    desc: Native encrypted C2 payload routines
    crit: hostile
    conf: 0.97
    all:
      - id: native-payload-transport-routines
      - id: cxx-crypt-payload-symbol
      - id: cxx-decrypt-payload-symbol
