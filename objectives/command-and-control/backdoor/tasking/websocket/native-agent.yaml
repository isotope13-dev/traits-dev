# Native WebSocket remote-agent tasking: plaintext public-IP C2, framed
# download/upload tokens, and host inventory shoved over the same channel.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1071.001,T1105
  mbc: C0002

traits:
  - id: c2-framed-download-token
    desc: Framed C2 download command token
    crit: component
    conf: 0.94
    if:
      type: text
      exact: "__DOWNLOAD__"

  - id: c2-framed-upload-token
    desc: Framed C2 upload command token
    crit: component
    conf: 0.94
    if:
      type: text
      exact: "__UPLOAD__"

  - id: agent-heartbeat-json-basename
    desc: Agent heartbeat JSON staging basename
    crit: component
    conf: 0.93
    if:
      type: text
      exact: agent_heartbeat.json

  - id: inventory-required-marker
    desc: Agent inventory_required protocol marker
    crit: component
    conf: 0.92
    if:
      type: text
      exact: inventory_required

  - id: inventory-snapshot-sent-marker
    desc: Inventory snapshot sent to server marker
    crit: component
    conf: 0.94
    if:
      type: text
      exact: Inventory snapshot sent to server

composite_rules:
  - id: websocket-agent-powershell-inventory-exfil
    desc: WebSocket agent exfiltrates PowerShell host inventory
    crit: hostile
    conf: 0.97
    attack: T1071.001,T1082,T1059.001
    all:
      - id: micro-behaviors/communications/http/websocket::ws-public-ipv4-endpoint
      - id: objectives/discovery/system/fingerprint/network::ipify-org
      - id: inventory-snapshot-sent-marker
    any:
      - id: objectives/execution/interpreter/powershell::hidden-bypass-file-command
      - id: objectives/execution/interpreter/powershell::hidden-bypass-file-command-noprofile
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
