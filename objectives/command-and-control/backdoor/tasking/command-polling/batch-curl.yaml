defaults:
  platforms: [windows]
  for: [batch]
  attack: T1059.003

traits:
  - id: curl-downloads-command-file
    desc: curl downloads command file
    crit: suspicious
    conf: 0.9
    attack: T1105
    if:
      type: text
      regex: '(?i)\bcurl(\.exe)?\b[^\r\n]{0,160}\s-o\s+[A-Za-z0-9._-]*cmd[A-Za-z0-9._-]*\.txt\b'

  - id: batch-reads-command-file-variable
    desc: Batch reads command file into variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?im)^\s*set\s+/p\s+[A-Za-z0-9_]+\s*=<\s*[A-Za-z0-9._-]*cmd[A-Za-z0-9._-]*\.txt\b'

  - id: batch-executes-variable-command
    desc: Batch executes variable-backed command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?im)^\s*%[A-Za-z0-9_]+%\s*>[A-Za-z0-9._-]*output[A-Za-z0-9._-]*\.txt\b'

  - id: curl-posts-command-output
    desc: curl sends command output data
    crit: suspicious
    conf: 0.92
    attack: T1041
    if:
      type: text
      regex: '(?i)(-d|--data)\s+"?[A-Za-z0-9_ -]{1,30}=!?[A-Za-z0-9_]+!?'
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - type: path
        regex: '(^|[!/])info/recipe/parent/build_base\.bat$'

  - id: curl-post-request
    desc: curl uses POST request
    crit: suspicious
    conf: 0.88
    attack: T1041
    if:
      type: text
      regex: '(?i)\bcurl(\.exe)?\b[^\r\n]{0,120}(-X\s+POST|--request\s+POST)'

  - id: batch-command-loop-label
    desc: Batch command loop label
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?im)^:[A-Za-z0-9_]*(CHECK|CMD|COMMAND)[A-Za-z0-9_]*\s*$'

  - id: batch-goto-command-loop
    desc: Batch jumps to command loop
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?i)\bgoto\s+[A-Za-z0-9_]*(CHECK|CMD|COMMAND)[A-Za-z0-9_]*\b'

composite_rules:
  - id: batch-curl-command-polling-backdoor
    desc: Batch curl command polling backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/download/curl::batch-curl-call
      - id: curl-downloads-command-file
      - id: batch-reads-command-file-variable
      - id: batch-executes-variable-command
      - id: curl-posts-command-output
      - id: curl-post-request
    any:
      - id: batch-command-loop-label
      - id: batch-goto-command-loop
      - id: micro-behaviors/time/sleep/interval::batch-silent-timeout-delay
