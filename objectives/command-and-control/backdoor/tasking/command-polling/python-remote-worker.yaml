# A package that polls a service for work, launches server-selected Python
# widgets, and reports task results is a remote task worker.
defaults:
  platforms: [unix, windows]
  for: [python, whl]
  attack: T1059.006,T1071.001
  mbc: B0030

traits:
  - id: python-task-polling-api
    desc: Python task polling API
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: '(?is)\b(getTask|pollTask)\b'

  - id: python-task-id-field
    desc: Python task identifier field
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      word: taskUUID

  - id: python-widget-process-arguments
    desc: Python widget process arguments
    crit: notable
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '(?is)sys\.executable.{0,220}["'']--run["''].{0,220}["'']--out["'']'

  - id: python-task-result-callback
    desc: Python task result callback
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      word: TaskNotify

composite_rules:
  - id: python-remote-widget-task-worker
    desc: Remote Python widget task worker
    crit: hostile
    conf: 0.99
    for: [whl]
    scope: archive
    all:
      - id: python-task-polling-api
      - id: python-task-id-field
      - id: python-widget-process-arguments
      - id: python-task-result-callback
      - id: micro-behaviors/process/create/subprocess::process-execution
      - id: micro-behaviors/communications/http/request/client::request-python
