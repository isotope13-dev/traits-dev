defaults:
  platforms: [macos]
  for: [macho, go]
  attack: T1071.001,T1105
  mbc: B0030
  crit: component
  conf: 0.86
traits:
  - id: http-file-download-route
    desc: HTTP file download endpoint
    if:
      type: text
      exact: /file/download
  - id: http-file-upload-route
    desc: HTTP file upload endpoint
    if:
      type: text
      exact: /file/upload
  - id: http-file-exists-route
    desc: HTTP file exists endpoint
    if:
      type: text
      exact: /file/exists
  - id: upload-session-start-route
    desc: Upload session start endpoint
    if:
      type: text
      exact: /file/upload-session-start/
  - id: upload-session-append-route
    desc: Upload session append endpoint
    if:
      type: text
      exact: /file/upload-session-append
  - id: upload-session-finish-route
    desc: Upload session finish endpoint
    if:
      type: text
      exact: /file/upload-session-finish
  - id: task-file-path-field
    desc: JSON or Go task file path field
    if:
      type: text
      regex: '(json:\s*["'']file_path["'']|["'']file_path["'']\s*:)'
  - id: task-local-path-field
    desc: JSON or Go task local path field
    if:
      type: text
      regex: '(json:\s*["'']local_path["'']|["'']local_path["'']\s*:)'
  - id: task-server-path-field
    desc: JSON or Go task server path field
    if:
      type: text
      regex: '(json:\s*["'']server_path["'']|["'']server_path["'']\s*:)'
  - id: action-json-task-file
    desc: action.json tasking channel file
    if:
      type: text
      word: action.json
  - id: info-json-profile-file
    desc: info.json enrollment profile file
    if:
      type: text
      word: info.json
  - id: task-executed-state-field
    desc: Task executed state field
    if:
      type: text
      regex: '["'']executed["'']\s*:'
  - id: task-last-access-field
    desc: Task last access field
    if:
      type: text
      word: last_access
  - id: task-command-field
    desc: Task command field
    if:
      type: text
      regex: '["'']command["'']\s*:'
composite_rules:
  - id: c2-file-transfer-routes
    desc: C2 file transfer endpoint cluster
    crit: notable
    conf: 0.82
    needs: 2
    any:
      - id: http-file-download-route
      - id: http-file-upload-route
      - id: http-file-exists-route
      - id: upload-session-start-route
      - id: upload-session-append-route
      - id: upload-session-finish-route
  - id: chunked-upload-session-routes
    desc: Chunked upload session endpoints
    crit: notable
    conf: 0.88
    needs: 2
    any:
      - id: upload-session-start-route
      - id: upload-session-append-route
      - id: upload-session-finish-route
  - id: c2-file-task-path-fields
    desc: C2 file task path fields
    crit: notable
    conf: 0.86
    all:
      - id: task-file-path-field
      - id: task-local-path-field
      - id: task-server-path-field
  - id: c2-json-task-files
    desc: JSON C2 task channel files
    crit: notable
    conf: 0.88
    all:
      - id: action-json-task-file
      - id: info-json-profile-file
  - id: c2-task-state-fields
    desc: C2 task state fields
    crit: notable
    conf: 0.84
    all:
      - id: task-command-field
      - id: task-executed-state-field
      - id: task-last-access-field
  - id: c2-file-tasking-channel
    desc: C2 file tasking channel
    crit: suspicious
    conf: 0.92
    all:
      - id: c2-file-transfer-routes
      - id: c2-file-task-path-fields
      - id: c2-json-task-files
    any:
      - id: c2-task-state-fields
      - id: chunked-upload-session-routes
