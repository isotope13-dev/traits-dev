defaults:
  platforms: [unix]
  for: [csharp]
  attack: T1059
  mbc: B0022

traits:
  - id: csharp-trigger-file-watcher
    desc: C# trigger file watcher
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'new FileSystemWatcher[\s\S]{0,120}Filter = \$"\{TriggerPattern\}\*"'

  - id: csharp-trigger-command-exec
    desc: C# executes trigger command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'payload\.StartsWith\("CMD:"\)[\s\S]{0,260}ExecuteCommand'

  - id: csharp-beacon-postasync
    desc: C# beacon PostAsync call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/beacon[\s\S]{0,220}PostAsync'

composite_rules:
  - id: csharp-trigger-file-tasking
    desc: C# trigger-file tasking
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-trigger-file-watcher
      - id: csharp-trigger-command-exec
      - id: csharp-beacon-postasync
