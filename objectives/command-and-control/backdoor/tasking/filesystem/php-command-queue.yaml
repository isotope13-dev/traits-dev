defaults:
  platforms: [windows, unix]
  for: [php]
  attack: T1105
  mbc: B0030

traits:
  - id: php-commander-file-literal
    desc: PHP commander queue filename
    crit: component
    conf: 0.88
    if:
      type: literal
      kind: string
      exact: commander

  - id: php-request-text-parameter
    desc: PHP request text parameter
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '\$_(GET|POST|REQUEST)\s*\[\s*[''"]text[''"]'

  - id: php-append-mode-open
    desc: PHP append-mode file open
    crit: component
    conf: 0.82
    if:
      type: text
      regex: "fopen\\s*\\([^\\n;]{1,80},\\s*['\"]a['\"]\\s*\\)"

composite_rules:
  - id: php-http-command-queue-writer
    desc: PHP HTTP command queue writer
    crit: suspicious
    conf: 0.95
    all:
      - id: php-commander-file-literal
      - id: php-request-text-parameter
      - id: php-append-mode-open
      - id: micro-behaviors/fs/write/file/direct::fwrite
