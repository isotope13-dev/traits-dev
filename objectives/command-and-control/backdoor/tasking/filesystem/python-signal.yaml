defaults:
  platforms: [unix, windows]
  for: [whl, python-sdist]
  attack: T1105
  mbc: B0022

composite_rules:
  - id: python-signal-remote-file-tasking
    desc: Python signal agent provides remote file tasking
    crit: hostile
    conf: 0.99
    scope: archive
    attack: T1105,T1071.001
    all:
      - id: objectives/command-and-control/backdoor/rat/multi::python-signal-client-import
      - id: objectives/command-and-control/backdoor/rat/multi::python-remote-command-handler-import
      - id: objectives/command-and-control/backdoor/rat/multi::python-file-transfer-protocol
      - id: objectives/command-and-control/backdoor/rat/multi::python-file-transfer-mode
      - id: objectives/command-and-control/backdoor/rat/multi::python-transfer-helper-import
      - id: micro-behaviors/fs/file/write/direct::python-pathlib-write-bytes-call
