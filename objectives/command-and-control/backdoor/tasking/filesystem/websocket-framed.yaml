# Framed download/upload tokens over a public-IP WebSocket — classic remote
# agent file-transfer tasking, independent of inventory/exfil composites.
defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1105
  mbc: C0002

composite_rules:
  - id: websocket-public-ip-file-transfer-agent
    desc: Public-IP WebSocket agent with framed file transfer
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/websocket::ws-public-ipv4-endpoint
      - id: objectives/command-and-control/backdoor/tasking/websocket::c2-framed-download-token
      - id: objectives/command-and-control/backdoor/tasking/websocket::c2-framed-upload-token
    any:
      - id: objectives/command-and-control/backdoor/tasking/websocket::agent-heartbeat-json-basename
      - id: objectives/command-and-control/backdoor/tasking/websocket::inventory-required-marker
      - id: micro-behaviors/process/create/spawn::create-process-w
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/signed/developer/
