defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
  mbc: B0030
  attack: T1105
traits:
  - id: fileop-delete
    desc: FileOPDeleteFile symbol
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: FileOPDeleteFile\b
  - id: fileop-create
    desc: FileOPCreateNewFile symbol
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: FileOPCreateNewFile\b
  - id: fileop-send-dir
    desc: FileOPSendDirData symbol
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: FileOPSendDirData\b
  - id: fileop-rename
    desc: FileOPRename symbol
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: FileOPRename\b
  - id: onreceive-fileop
    desc: OnReceive...FileOP symbol
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: OnReceive.{0,30}FileOP
composite_rules:
  - id: file-op-functions
    desc: Remote file operation functions
    crit: suspicious
    conf: 0.85
    any:
      - id: fileop-delete
      - id: fileop-create
      - id: fileop-send-dir
      - id: fileop-rename
      - id: onreceive-fileop
