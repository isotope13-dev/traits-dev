defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1105
  mbc: B0030
traits:
  - id: rust-agent-hello-schema
    desc: Rust agent hello schema
    crit: component
    conf: 0.9
    if:
      type: text
      substr: AgentHello
  - id: rust-task-result-schema
    desc: Rust task result schema
    crit: component
    conf: 0.9
    if:
      type: text
      substr: TaskResult
  - id: rust-read-file-chunk-task
    desc: Rust read file chunk task
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: read_file_chunk
  - id: rust-write-file-task
    desc: Rust write file task
    crit: component
    conf: 0.95
    if:
      type: text
      substr: write_file
  - id: rust-delete-dir-task
    desc: Rust delete directory task
    crit: component
    conf: 0.95
    if:
      type: text
      substr: delete_dir
  - id: rust-scan-files-task
    desc: Rust scan files task
    crit: component
    conf: 0.95
    if:
      type: text
      substr: scan_files
  - id: rust-pwd-task-function
    desc: Rust pwd task function
    crit: component
    conf: 0.92
    attack: T1083
    if:
      type: symbol
      exact: pwd
  - id: rust-ls-task-function
    desc: Rust ls task function
    crit: component
    conf: 0.92
    attack: T1083
    if:
      type: symbol
      exact: ls
  - id: rust-change-dir-task-function
    desc: Rust change directory task
    crit: component
    conf: 0.94
    attack: T1083
    if:
      type: symbol
      exact: change_dir
  - id: rust-search-task-function
    desc: Rust file search task
    crit: component
    conf: 0.94
    attack: T1083
    if:
      type: symbol
      exact: search
  - id: rust-current-dir-error-string
    desc: Current directory error string
    crit: component
    conf: 0.94
    attack: T1083
    if:
      type: string_literal
      exact: "Failed to get current directory: "
  - id: rust-change-dir-error-string
    desc: Change directory error string
    crit: component
    conf: 0.94
    attack: T1083
    if:
      type: string_literal
      exact: "Failed to change directory: "
composite_rules:
  - id: rust-filesystem-websocket-backdoor
    desc: Rust filesystem tasking backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: rust-agent-hello-schema
      - id: rust-task-result-schema
      - id: rust-read-file-chunk-task
      - id: rust-write-file-task
      - id: rust-delete-dir-task
      - id: rust-scan-files-task
  - id: rust-directory-tasking-module
    desc: Rust remote directory tasking
    crit: suspicious
    conf: 0.9
    attack: T1083
    all:
      - id: rust-pwd-task-function
      - id: rust-ls-task-function
      - id: rust-change-dir-task-function
    any:
      - id: rust-current-dir-error-string
      - id: rust-change-dir-error-string
      - id: objectives/anti-static/obfuscation/string/conceal::obfuscate-macro-pair
  - id: rust-filesystem-search-tasking
    desc: Rust directory search tasking
    crit: suspicious
    conf: 0.92
    attack: T1083
    all:
      - id: rust-directory-tasking-module
      - id: rust-search-task-function
      - id: micro-behaviors/fs/directory/readdir::rust-read-dir
    any:
      - id: micro-behaviors/fs/directory/traverse::rust-recursive-search
      - id: objectives/anti-static/obfuscation/string/conceal::obfuscate-macro-pair
