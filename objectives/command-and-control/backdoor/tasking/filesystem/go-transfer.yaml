defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe, go]
  mbc: B0030
  attack: T1105
traits:
  - id: go-file-utils
    desc: Go file transfer utilities
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])utils\.(Upload|Download|SendDataByPost)\s*\('
  - id: go-rat-file-builder-symbols
    desc: Go RAT file command builders
    crit: component
    conf: 0.88
    count_min: 5
    if:
      type: function
      regex: '^Build(Ls|Cat|Cp|Rm|Mkdir|Mv|Pwd|Cd)Command$'
  - id: go-rat-file-command-templates
    desc: Go RAT file command templates
    crit: component
    conf: 0.88
    count_min: 5
    if:
      type: string_literal
      kind: string
      regex: '^(ls|cat|rm|mkdir|cd) --dst %s$|^(cp|mv) --src %s --dst %s$|^pwd$'
  - id: go-rat-process-builder-symbols
    desc: Go RAT process command builders
    crit: component
    conf: 0.87
    count_min: 2
    if:
      type: function
      regex: '^Build(Ps|Kill)Command$'
  - id: go-rat-process-command-templates
    desc: Go RAT process command templates
    crit: component
    conf: 0.87
    count_min: 5
    if:
      type: string_literal
      kind: string
      regex: '^ps$|^%s --(pid %d|user %s|name %s|cmdline %s)$|^kill %s$'
  - id: go-rat-agent-control-builders
    desc: Go RAT agent control builders
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: function
      regex: '^Build(NetHelper|Suicide)Command$'
  - id: go-rat-agent-control-commands
    desc: Go RAT agent control commands
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: string_literal
      kind: string
      regex: '^(net_helper|suicide)$'
composite_rules:
  - id: go-agent-remote-file-tasking
    desc: Go agent combines remote file transfer with execution
    crit: hostile
    conf: 0.98
    attack: T1059,T1105
    all:
      - id: objectives/command-and-control/backdoor/rat/multi::dispatcher-loop
      - id: objectives/command-and-control/backdoor/rat/multi::dispatcher-file-transfer-handlers
      - id: objectives/command-and-control/backdoor/rat/multi::dispatcher-exec-handler
  - id: go-rat-filesystem-command-roster
    desc: Go RAT filesystem task roster
    crit: suspicious
    conf: 0.93
    all:
      - id: go-rat-file-builder-symbols
      - id: go-rat-file-command-templates
  - id: go-rat-process-control-command-roster
    desc: Go RAT process task roster
    crit: suspicious
    conf: 0.92
    all:
      - id: go-rat-process-builder-symbols
      - id: go-rat-process-command-templates
  - id: go-rat-agent-control-command-roster
    desc: Go RAT agent control roster
    crit: suspicious
    conf: 0.93
    all:
      - id: go-rat-agent-control-builders
      - id: go-rat-agent-control-commands
  - id: go-rat-full-tasking-command-roster
    desc: Go RAT full tasking roster
    crit: hostile
    conf: 0.96
    attack: T1105,T1059
    all:
      - id: go-rat-filesystem-command-roster
      - id: go-rat-process-control-command-roster
      - id: go-rat-agent-control-command-roster
