defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe, go]
  mbc: B0030
  attack: T1105
traits:
  - id: go-file-utils
    desc: Go file transfer utilities
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])utils\.(Upload|Download|SendDataByPost)\s*\('
