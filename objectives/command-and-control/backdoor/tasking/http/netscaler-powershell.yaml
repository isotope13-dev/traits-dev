defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1102

traits:
  - id: ps-netscaler-encoded-remote-cmd
    desc: PowerShell NetScaler encoded command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: powershell.exe -NoProfile -EncodedCommand

composite_rules:
  - id: ps-netscaler-agent-http-tasking
    desc: PowerShell NetScaler HTTP tasking
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::agent-register-path
      - id: micro-behaviors/communications/http/endpoints::agent-beacon-path
    any:
      - id: micro-behaviors/communications/http/endpoints::agent-task-result-path
      - id: ps-netscaler-encoded-remote-cmd

  - id: ps-netscaler-task-result-channel
    desc: PowerShell NetScaler task result
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/endpoints::agent-task-result-path
      - id: ps-netscaler-encoded-remote-cmd
