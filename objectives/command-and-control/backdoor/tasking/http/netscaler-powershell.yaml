defaults:
  platforms: [netscaler, appliance, windows]
  for: [powershell]
  attack: T1102

traits:
  - id: ps-netscaler-agent-register-api
    desc: PowerShell NetScaler register API
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/v1/agents/register

  - id: ps-netscaler-agent-beacon-api
    desc: PowerShell NetScaler beacon API
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/v1/agents/.{1,80}/beacon'

  - id: ps-netscaler-task-result-api
    desc: PowerShell NetScaler task result
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/v1/agents/.{1,80}/tasks/.{1,80}/result'

  - id: ps-netscaler-encoded-remote-cmd
    desc: PowerShell NetScaler encoded command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: powershell.exe -NoProfile -EncodedCommand

composite_rules:
  - id: ps-netscaler-agent-http-tasking
    desc: PowerShell NetScaler HTTP tasking
    crit: hostile
    conf: 0.98
    all:
      - id: ps-netscaler-agent-register-api
      - id: ps-netscaler-agent-beacon-api
    any:
      - id: ps-netscaler-task-result-api
      - id: ps-netscaler-encoded-remote-cmd

  - id: ps-netscaler-task-result-channel
    desc: PowerShell NetScaler task result
    crit: hostile
    conf: 0.97
    all:
      - id: ps-netscaler-task-result-api
      - id: ps-netscaler-encoded-remote-cmd
