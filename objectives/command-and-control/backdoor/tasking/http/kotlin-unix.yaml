defaults:
  platforms: [unix]
  for: [kotlin, class, jar]
  attack: T1059

traits:
  - id: kotlin-c2-epoch-header
    desc: Kotlin C2 epoch header
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: X-Epoch

  - id: kotlin-activate-token
    desc: Kotlin activation command token
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '["'']activate["'']'
    unless:
      - id: metadata/package/files/system-package::julia-runtime-path

  - id: jvm-c2-epoch-header
    desc: JVM C2 epoch header
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 58 2D 45 70 6F 63 68

  # Raw bytes "activate" — a ubiquitous word (matched Wine's import-lib
  # RtlActivateActivationContext exports). Generic on its own; only meaningful
  # paired with jvm-c2-epoch-header in the hostile composite, so component tier.
  - id: jvm-activate-token
    desc: JVM "activate" C2 command token
    crit: component
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 61 63 74 69 76 61 74 65

composite_rules:
  - id: kotlin-http-command-tasking
    desc: Kotlin HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-c2-epoch-header
      - id: kotlin-activate-token
    any:
      - id: micro-behaviors/communications/http/client/library::java-http-url-connection
      - id: micro-behaviors/communications/http/lib/urlconnection::request-java
      - id: objectives/command-and-control/trigger/activation::kotlin-commands-endpoint
      - id: objectives/command-and-control/trigger/activation::kotlin-trigger-endpoint
    needs: 1

  - id: jvm-http-command-tasking
    desc: JVM HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-c2-epoch-header
      - id: jvm-activate-token
    any:
      - id: objectives/command-and-control/backdoor/tasking/http::jvm-c2-command-path
      - id: objectives/command-and-control/trigger/activation::kotlin-trigger-endpoint
    needs: 1
