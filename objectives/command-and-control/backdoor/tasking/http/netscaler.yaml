defaults:
  platforms: [netscaler, appliance, unix]
  for: [scripts, binaries, go, java, kotlin, csharp, swift]
  attack: T1102

traits:
  - id: netscaler-agent-register-api
    desc: NetScaler agent register API
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/v1/agents/register

  - id: netscaler-agent-beacon-api
    desc: NetScaler agent beacon API
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/v1/agents/.{1,80}/beacon'

  - id: netscaler-task-result-api
    desc: NetScaler task result API
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/v1/agents/.{1,80}/tasks/.{1,80}/result'

  - id: netscaler-remote-command-token
    desc: NetScaler remote command token
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(EncodedCommand|command_id|CMD:)'

composite_rules:
  - id: netscaler-agent-http-tasking
    desc: NetScaler agent HTTP tasking
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-agent-register-api
      - id: netscaler-agent-beacon-api
    any:
      - id: netscaler-task-result-api
      - id: netscaler-remote-command-token

  - id: netscaler-task-result-channel
    desc: NetScaler task result channel
    crit: hostile
    conf: 0.97
    all:
      - id: netscaler-task-result-api
      - id: netscaler-remote-command-token
