defaults:
  platforms: [unix]
  for: [scripts, binaries, go, java, kotlin, csharp, swift]
  attack: T1102

traits:
  - id: encoded-command-token
    desc: EncodedCommand token
    crit: component
    conf: 0.86
    if:
      type: text
      substr: EncodedCommand

  - id: command-id-token
    desc: command_id token
    crit: component
    conf: 0.86
    if:
      type: text
      substr: command_id
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename


composite_rules:
  - id: netscaler-remote-command-token
    desc: NetScaler remote command token
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/communications/http/endpoints::agent-api-path
    any:
      - id: encoded-command-token
      - id: command-id-token

  - id: netscaler-agent-http-tasking
    desc: NetScaler agent HTTP tasking
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::agent-register-path
      - id: micro-behaviors/communications/http/endpoints::agent-beacon-path
    any:
      - id: micro-behaviors/communications/http/endpoints::agent-task-result-path
      - id: netscaler-remote-command-token

  - id: netscaler-task-result-channel
    desc: NetScaler task result channel
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/endpoints::agent-task-result-path
      - id: netscaler-remote-command-token
