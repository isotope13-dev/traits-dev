defaults:
  platforms: [unix]
  for: [shell]
  attack: T1059

traits:
  - id: shell-api-commands-path
    desc: Shell API commands path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/commands

  - id: shell-bash-stdin-pipe
    desc: Shell bash stdin pipe
    crit: notable
    conf: 0.94
    if:
      type: text
      substr: '| bash -s'
    downgrade:
      # `curl <installer>.sh | bash -s <args>` is the standard "pass version to
      # the install script" idiom. The shell-api-command-tasking composite keys
      # the real C2 signal on /api/v1/commands, which an installer URL lacks.
      any:
      - id: micro-behaviors/os/service/legitimate::install-script-pipe
      - id: micro-behaviors/os/service/legitimate::getter-script-pipe

composite_rules:
  - id: shell-api-command-tasking
    desc: Shell API command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: shell-api-commands-path
      - id: shell-bash-stdin-pipe
    any:
      - id: micro-behaviors/communications/http/download/curl::curl-silent
      - id: micro-behaviors/communications/http/upload::octet-stream-upload-header
