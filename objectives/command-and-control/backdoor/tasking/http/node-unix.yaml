defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1059

traits:
  - id: node-c2-execute-action
    desc: Node C2 execute action
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: parsed.action === "execute"

  - id: node-c2-result-post
    desc: Node C2 result POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /result
  - id: node-api-beacon-path
    desc: Node API beacon path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/beacon
  - id: node-api-register-path
    desc: Node API register path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/register
  - id: node-child-process-command
    desc: Node child process command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'child_process[\s\S]{0,160}\.exec\((cmd|command)'
  - id: node-command-results-post
    desc: Node command results POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/api/v1/(result|beacon|collect)[\s\S]{0,300}POST'

composite_rules:
  - id: node-http-command-tasking
    desc: Node HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: node-c2-execute-action
      - id: micro-behaviors/process/create/shell/bridge::js-execsync-cmd-arg
      - id: node-c2-result-post
  - id: node-api-command-tasking
    desc: Node API command tasking
    crit: hostile
    conf: 0.98
    needs: 2
    all:
      - id: node-child-process-command
    any:
      - id: node-api-beacon-path
      - id: node-api-register-path
      - id: node-command-results-post
      - id: node-c2-result-post
