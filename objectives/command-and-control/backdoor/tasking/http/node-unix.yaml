defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1059

composite_rules:
  - id: node-http-command-tasking
    desc: Node HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/infrastructure/keywords::node-c2-execute-action
      - id: micro-behaviors/process/create/shell/bridge::js-execsync-cmd-arg
      - id: micro-behaviors/communications/http/endpoints::result-endpoint-path
  - id: node-api-command-tasking
    desc: Node API command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/script/file::node-child-process-command
    any:
      - id: objectives/command-and-control/infrastructure/keywords::node-c2-execute-action
      - id: objectives/command-and-control/infrastructure/keywords::node-command-results-post
      - id: objectives/command-and-control/infrastructure/keywords::node-api-register-path
