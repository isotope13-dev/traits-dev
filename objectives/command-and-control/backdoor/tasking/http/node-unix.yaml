defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1059

composite_rules:
  - id: node-http-command-tasking
    desc: Node HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/text/keywords/c2::node-c2-execute-action
      - id: micro-behaviors/process/create/shell/bridge::js-execsync-cmd-arg
      - id: micro-behaviors/data/text/keywords/c2::result-path-string
  - id: node-api-command-tasking
    desc: Node API command tasking
    crit: hostile
    conf: 0.98
    needs: 2
    all:
      - id: micro-behaviors/process/create/script/file::node-child-process-command
    any:
      - id: micro-behaviors/data/text/keywords/c2
