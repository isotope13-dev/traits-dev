defaults:
  platforms: [unix]
  for: [rust]
  attack: T1059

traits:
  - id: rust-command-endpoint-url
    desc: Rust command endpoint URL
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'https?://[^"''\s]{1,120}/command\b'

  - id: rust-ureq-post-command
    desc: Rust ureq command POST
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ureq::post\(C2_ENDPOINT\)'

  # Spawning `sh -c` is a generic process-execution capability used by build
  # tools, CLIs, and coding agents — notable, not suspicious on its own. The
  # backdoor intent is the composite below (C2 endpoint + command POST +
  # result exfil together).
  - id: rust-sh-c-output-command
    desc: Rust spawns sh -c (shell command execution)
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'Command::new\("sh"\)[\s\S]{0,140}\.arg\("-c"\)'
    unless:
      - type: text
        regex: 'ATOMCODE_HOOK_EVENT|HookContext|hook\.command'
      - type: text
        regex: 'pub struct BashTool|ToolDef|ToolContext'
      - type: text
        regex: 'ApprovalRequirement|Destructive commands require user confirmation'
      - type: text
        regex: 'fn run_shell_command\(cmd: &str\)[\s\S]{0,260}suppress_console_window_sync'

  - id: rust-command-result-exfil
    desc: Rust command result exfil
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'cmd_result:'

composite_rules:
  - id: rust-http-command-tasking
    desc: Rust HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: rust-command-endpoint-url
      - id: rust-ureq-post-command
      - id: rust-sh-c-output-command
      - id: rust-command-result-exfil
