defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1071.001
  mbc: B0030

traits:
  - id: vbs-reversed-session-token
    desc: VBScript reverses session token
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'S\x00t\x00r\x00R\x00e\x00v\x00e\x00r\x00s\x00e'

  - id: vbs-encoded-session-token
    desc: VBScript encodes session token
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'B\x00a\x00s\x00e\x006\x004\x00E\x00n\x00c'

  - id: vbs-command-response-decode
    desc: VBScript decodes command response
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'B\x00a\x00s\x00e\x006\x004\x00D\x00e\x00c'

  - id: vbs-remote-config-command
    desc: VBScript remote config command
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'S\x00e\x00t\x00N\x00e\x00w\x00C\x00o\x00n\x00f'

  - id: vbs-module-task-command
    desc: VBScript module task command
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '/\x00D\x00o\x00w\x00n\x00M\x00o\x00d'

  - id: vbs-hidden-curl-post
    desc: VBScript hidden curl POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'c\x00m\x00d\x00 \x00/\x00C\x00 \x00s\x00t\x00a'

  - id: vbs-execmd-curl-launch
    desc: VBScript execmd curl launch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'e\x00x\x00e\x00c\x00m\x00d\x00 \x00c\x00u\x00r\x00l'

composite_rules:
  - id: vbs-http-session-tasking-backdoor
    desc: VBScript HTTP session tasking backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: vbs-reversed-session-token
      - id: vbs-encoded-session-token
      - id: vbs-command-response-decode
      - id: vbs-hidden-curl-post
    any:
      - id: vbs-remote-config-command
      - id: vbs-module-task-command
      - id: vbs-execmd-curl-launch
    needs: 1

  - id: vbs-curl-module-tasking-backdoor
    desc: VBScript curl module tasking backdoor
    crit: hostile
    conf: 0.97
    all:
      - id: vbs-command-response-decode
      - id: vbs-module-task-command
      - id: vbs-execmd-curl-launch
