defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1059
  mbc: B0022

traits:
  - id: csharp-http-command-poll
    desc: C# HTTP command poll
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/api/v1/commands|/poll\?agent='

  - id: csharp-http-result-post
    desc: C# HTTP result POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'C2Client\.Beacon\([\s\S]{0,180}Encoding\.UTF8\.GetBytes'

  - id: csharp-sh-c-remote-command
    desc: C# sh -c remote command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'FileName = "/bin/sh"[\s\S]{0,220}Arguments = \$?"-c'

composite_rules:
  - id: csharp-http-command-tasking
    desc: C# HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-http-command-poll
      - id: csharp-http-result-post
      - id: csharp-sh-c-remote-command
