defaults:
  platforms: [unix]
  for: [zig, elf]
  attack: T1059
  mbc: B0022

traits:
  - id: zig-http-beacon-get
    desc: Zig HTTP beacon GET
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'GET /beacon HTTP/1\.1[\s\S]{0,220}C2_HOST'

  - id: zig-http-body-command
    desc: Zig uses HTTP body command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'body_start[\s\S]{0,220}executeCommand\(body\)'

  - id: zig-sh-c-command-exec
    desc: Zig executes sh -c command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'args\.append\("sh"\)[\s\S]{0,160}args\.append\("-c"\)'

composite_rules:
  - id: zig-http-command-backdoor
    desc: Zig HTTP command backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: zig-http-beacon-get
      - id: zig-http-body-command
      - id: zig-sh-c-command-exec
