defaults:
  platforms: [ios]
  for: [javascript, typescript]
  attack: T1071.001

traits:
  - id: react-native-command-poll
    desc: React Native native-module command poll marker
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?is)(NativeModules[\s\S]{0,240}processCommands|processCommands[\s\S]{0,240}NativeModules)'

  - id: react-native-shell-command-bridge
    desc: React Native shell command bridge
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'NativeModules[\s\S]{0,120}Shell[\s\S]{0,120}\.exec'

  - id: react-native-c2-result-post
    desc: React Native C2 result POST
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'fetch\(`http://\$\{host\}\$\{C2_PATH\}/result'

composite_rules:
  - id: react-native-ios-http-backdoor
    desc: React Native iOS HTTP backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: react-native-command-poll
      - id: react-native-shell-command-bridge
      - id: react-native-c2-result-post
