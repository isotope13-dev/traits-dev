defaults:
  platforms: [netscaler, appliance, unix]
  for: [class, jar]
  attack: T1102

traits:
  - id: jvm-api-beacon-hex
    desc: JVM API beacon hex
    crit: suspicious
    conf: 0.94
    if:
      type: hex
      pattern: "2F 61 70 69 2F 76 31 2F 62 65 61 63 6F 6E"
    unless:
      - type: basename
        regex: '\.zip$'

  - id: jvm-api-report-hex
    desc: JVM API report hex
    crit: suspicious
    conf: 0.94
    if:
      type: hex
      pattern: "2F 61 70 69 2F 76 31 2F 72 65 70 6F 72 74"
    unless:
      - type: basename
        regex: '\.zip$'

  - id: jvm-api-config-hex
    desc: JVM API config hex
    crit: suspicious
    conf: 0.92
    if:
      type: hex
      pattern: "2F 61 70 69 2F 76 31 2F 63 6F 6E 66 69 67"
    unless:
      - type: basename
        regex: '\.zip$'

composite_rules:
  - id: jvm-netscaler-bytecode-tasking
    desc: JVM NetScaler bytecode tasking
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-api-beacon-hex
    any:
      - id: jvm-api-report-hex
      - id: jvm-api-config-hex
