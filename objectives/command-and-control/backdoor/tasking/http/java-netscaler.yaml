defaults:
  platforms: [netscaler, appliance, unix]
  for: [java, class, jar]
  attack: T1102

traits:
  - id: java-netscaler-c2-paths
    desc: Java NetScaler C2 paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'BEACON_PATH[\s\S]{0,140}COMMAND_PATH[\s\S]{0,140}REPORT_PATH'

  - id: java-netscaler-agent-ua
    desc: Java NetScaler agent UA
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: NetScaler-Client/11.1

  - id: java-encrypted-command-report
    desc: Java encrypted command report
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'executeRemoteCommand[\s\S]{0,260}encrypt\(result\)'

  - id: jvm-netscaler-tasking-bytecode
    desc: JVM NetScaler tasking bytecode
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: raw
      regex: '/api/v1/beacon[\s\S]{0,999}/api/v1/report'

composite_rules:
  - id: java-netscaler-http-tasking
    desc: Java NetScaler HTTP tasking
    crit: hostile
    conf: 0.98
    all:
      - id: java-netscaler-c2-paths
      - id: java-netscaler-agent-ua
    any:
      - id: java-encrypted-command-report

  - id: jvm-netscaler-http-tasking
    desc: JVM NetScaler HTTP tasking
    crit: hostile
    conf: 0.97
    for: [class, jar]
    all:
      - id: jvm-netscaler-tasking-bytecode
      - id: objectives/command-and-control/backdoor/tasking/http::jvm-c2-command-path
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
