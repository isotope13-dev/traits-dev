defaults:
  platforms: [unix, openwrt]
  for: [perl]
  attack: T1059.006
  mbc: B0022

traits:
  - id: perl-cmd-response-marker
    desc: Perl CMD response marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "CMD:"

composite_rules:
  - id: perl-raw-http-eval-c2
    desc: Perl raw HTTP eval C2
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/tcp::sock-stream
      - id: micro-behaviors/communications/http/post::post-request-line
      - id: micro-behaviors/communications/socket/receive::perl-socket-recv
      - id: micro-behaviors/process/interpreter/eval::perl-eval-variable
    any:
      - id: perl-cmd-response-marker
      - id: micro-behaviors/process/create/shell/lang::backticks-exec
