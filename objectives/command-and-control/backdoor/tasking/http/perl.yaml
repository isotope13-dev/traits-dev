defaults:
  platforms: [unix, openwrt]
  for: [perl]
  attack: T1059.006
  mbc: B0022

traits:
  - id: perl-http-command-poll
    desc: Perl HTTP command poll
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'fetch_c2_commands[\s\S]{0,700}/commands'

  - id: perl-backtick-command-output
    desc: Perl backtick command output
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'sub execute_command[\s\S]{0,180}`\$cmd 2>&1`'

composite_rules:
  - id: perl-raw-http-eval-c2
    desc: Perl raw HTTP eval C2
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/tcp::sock-stream
      - id: micro-behaviors/communications/http/post::post-request-line
      - id: micro-behaviors/communications/socket/receive::perl-socket-recv
      - id: micro-behaviors/process/interpreter/eval::perl-eval-variable
      - id: micro-behaviors/process/create/shell/lang::backticks-exec

  - id: perl-http-command-tasking
    desc: Perl HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: perl-http-command-poll
      - id: perl-backtick-command-output
    any:
      - id: objectives/exfiltration/http/upload::generic-http-exfil-endpoint
