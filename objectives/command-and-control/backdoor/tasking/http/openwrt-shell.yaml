defaults:
  platforms: [openwrt]
  for: [shell]
  attack: T1071.001
  mbc: B0030

traits:
  - id: openwrt-release-probe
    desc: OpenWrt release file probe
    crit: component
    conf: 0.88
    if:
      type: text
      substr: /etc/openwrt_release

  - id: openwrt-beacon-api-path
    desc: OpenWrt implant beacon API path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/v1/beacon

  - id: openwrt-session-header
    desc: OpenWrt implant session HTTP header
    crit: component
    conf: 0.84
    if:
      type: text
      substr: "X-Session:"

  - id: json-command-field-extract
    desc: JSON command field extraction in shell
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '"command":".{0,120}"'

  - id: eval-cmd-variable
    desc: eval of parsed command variable
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\beval\s+"\$cmd"'

composite_rules:
  - id: openwrt-shell-c2-tasking
    desc: OpenWrt shell implant HTTP tasking loop
    crit: hostile
    conf: 0.96
    all:
      - id: openwrt-beacon-api-path
      - id: json-command-field-extract
      - id: eval-cmd-variable
    any:
      - id: openwrt-release-probe
      - id: openwrt-session-header
