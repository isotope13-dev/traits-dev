defaults:
  platforms: [windows]
  for: [ruby]
  attack: T1071.001

traits:
  - id: ruby-bot-id-header
    desc: Ruby Bot-ID HTTP header
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: X-Bot-ID

  - id: ruby-api-beacon-endpoint
    desc: Ruby API beacon endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/beacon

  - id: ruby-c2-commands-json
    desc: Ruby C2 commands JSON field
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "body\\['commands'\\][\\s\\S]{0,180}execute_commands"

  - id: ruby-shell-command-backtick
    desc: Ruby shell command backtick
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'execute_shell_command[\s\S]{0,220}`#\{command\} 2>&1`'

composite_rules:
  - id: ruby-http-command-tasking
    desc: Ruby HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-bot-id-header
      - id: ruby-api-beacon-endpoint
      - id: ruby-c2-commands-json
      - id: ruby-shell-command-backtick
