defaults:
  platforms: [openwrt]
  for: [python, pyc]
  attack: T1059.006

traits:
  - id: python-http-command-endpoint
    desc: Python HTTP command endpoint marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/cmd\b|fetch_commands|execute_remote_command'
  - id: python-json-command-response
    desc: Python JSON command response fields
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '(exit_code|stderr|stdout|returncode)'

composite_rules:
  - id: openwrt-python-http-command-tasking
    desc: OpenWrt Python HTTP command tasking
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: python-http-command-endpoint
    any:
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: micro-behaviors/process/create/subprocess::subprocess-shell-pyc
    needs: 1
