defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1059.007

traits:
  - id: node-c2-command-response
    desc: Node command-response dispatch candidate
    crit: component
    conf: 0.7
    if:
      type: text
      regex: 'response\.commands|processCommand\s*\('
    unless:
      - id: well-known/lib/pdfjs/
      - id: metadata/library/structure/
      - id: metadata/package/files/dependency::node-modules-path
      - id: well-known/app/tabby/
      - id: well-known/app/vlc::windows-portable-archive
      - type: text
        substr: sendVLMCmd
      - id: metadata/package/files/ecosystem::openclaw-evolver-package-member
      - id: metadata/package/testing/presence/harness::spec-test-filename
      - id: well-known/tool/development/aube::aube-package-test-fixture
  - id: node-c2-action-vocabulary
    desc: Exfiltration or deployment command label
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'case ["''](exfil|deploy)["'']'

composite_rules:
  - id: node-http-command-response-tasking
    desc: Node HTTP command response tasking
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/request/client::https-request
      - id: node-c2-command-response
    any:
      - id: node-c2-action-vocabulary
      - id: micro-behaviors/process/create/spawn::child-process-member-spawn
      - id: micro-behaviors/process/create/shell/spawn::sh-c-exec
    needs: 1
    scope: file
    near_bytes: 1024

  - id: node-request-body-to-exec
    desc: Routes request body to exec
    crit: suspicious
    conf: 0.98
    mbc: B0030
    all:
      - id: micro-behaviors/communications/http/server/request::http-request-body-field
      - id: micro-behaviors/process/create/shell/bridge::js-exec
    scope: file
    near_bytes: 256

  - id: node-public-post-command-shell
    desc: Public POST command shell
    crit: hostile
    conf: 0.99
    mbc: B0030
    attack: "T1059.007,T1505.003"
    all:
      - id: micro-behaviors/communications/http/server/route::express-post-endpoint
      - id: node-request-body-to-exec
      - id: micro-behaviors/communications/socket/bind/address::bind-all-interfaces
    scope: file
    near_bytes: 1024
