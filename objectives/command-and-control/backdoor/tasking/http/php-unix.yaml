defaults:
  platforms: [unix]
  for: [php]
  attack: T1059

traits:
  - id: php-fsockopen-gate-beacon
    desc: PHP fsockopen gate beacon
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'fsockopen\(C2_HOST[\s\S]{0,360}POST /gate HTTP/1\.1'

  - id: php-gate-post-marker
    desc: PHP gate POST marker
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: POST /gate HTTP/1.1

  - id: php-c2-command-exec-loop
    desc: PHP C2 command exec loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\$decoded\[''commands''\][\s\S]{0,520}exec\(\$cmd'

  - id: php-config-action-loop
    desc: PHP config action loop
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/api/config[\s\S]{0,520}config\.get\("action"\)|config\(\)[\s\S]{0,520}"harvest"'

composite_rules:
  - id: php-http-command-tasking
    desc: PHP HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: php-c2-command-exec-loop
    any:
      - id: php-fsockopen-gate-beacon
      - id: php-gate-post-marker

  - id: php-http-config-tasking
    desc: PHP HTTP config tasking
    crit: hostile
    conf: 0.97
    any:
      - id: php-config-action-loop
      - id: php-fsockopen-gate-beacon
