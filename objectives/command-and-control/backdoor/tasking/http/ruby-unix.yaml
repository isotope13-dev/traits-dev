defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1059

traits:
  - id: ruby-beacon-checkin-path
    desc: Ruby beacon checkin path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/beacon/checkin

  - id: ruby-c2-execute-action
    desc: Ruby C2 execute action
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'cmd\[''action''\] == ''execute''[\s\S]{0,260}Open3\.capture2e'
  - id: ruby-remote-command-executor
    desc: Ruby remote command executor
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'def execute_remote_command\(cmd\)[\s\S]{0,200}Open3\.capture2e'

  - id: ruby-beacon-results-post
    desc: Ruby beacon results POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/beacon/results

composite_rules:
  - id: ruby-http-beacon-tasking
    desc: Ruby HTTP beacon tasking
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-beacon-checkin-path
      - id: ruby-beacon-results-post
    any:
      - id: ruby-c2-execute-action
      - id: ruby-remote-command-executor
