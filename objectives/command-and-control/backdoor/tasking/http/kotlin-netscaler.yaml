defaults:
  platforms: [netscaler, appliance, unix]
  for: [kotlin, class, jar]
  attack: T1102

traits:
  - id: kotlin-netscaler-config-post
    desc: Kotlin NetScaler config POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/v1/config[\s\S]{0,180}requestMethod = "POST"'

  - id: kotlin-citrix-adc-agent-ua
    desc: Kotlin Citrix ADC agent UA
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Citrix-ADC-Agent/14.1

  - id: kotlin-dynamic-payload-post
    desc: Kotlin dynamic payload POST
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/v1/payload[\s\S]{0,180}dynamic-payload'

  - id: kotlin-forwarded-for-header
    desc: Kotlin forwarded-for header
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: X-Forwarded-For
    unless:
      - id: metadata/package/files/included::jsii-metadata-basename

composite_rules:
  - id: kotlin-netscaler-http-tasking
    desc: Kotlin NetScaler HTTP tasking
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-netscaler-config-post
      - id: kotlin-citrix-adc-agent-ua
    any:
      - id: kotlin-dynamic-payload-post
      - id: kotlin-forwarded-for-header
