defaults:
  platforms: [netscaler, appliance, unix]
  for: [python]
  attack: T1102

traits:
  - id: python-netscaler-rpc-path
    desc: Python NetScaler RPC path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: C2_PATH = "/rpc"

  - id: python-execute-command-dispatch
    desc: Python command dispatch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "def execute_command(data: dict)"

  - id: python-subprocess-shell-result
    desc: Python execute_shell subprocess
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'def execute_shell\(cmd: str\)[\s\S]{0,260}subprocess\.run'

  - id: python-session-token-header
    desc: Python session token header
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: X-Session-Token

composite_rules:
  - id: python-netscaler-rpc-backdoor
    desc: Python NetScaler RPC backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: python-netscaler-rpc-path
    any:
      - id: python-execute-command-dispatch
      - id: python-session-token-header

  - id: python-netscaler-command-exec
    desc: Python NetScaler command exec
    crit: hostile
    conf: 0.98
    all:
      - id: python-execute-command-dispatch
      - id: python-subprocess-shell-result
      - id: python-session-token-header
