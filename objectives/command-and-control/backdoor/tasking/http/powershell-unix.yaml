defaults:
  platforms: [unix, netbsd, windows]
  for: [powershell]
  attack: T1071.001

traits:
  - id: ps-obfuscated-exfil-uri
    desc: PS obfuscated exfil URI
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'uploadUri[\s\S]{0,260}/exfil'

composite_rules:
  - id: ps-obfuscated-webclient-c2
    desc: PS obfuscated WebClient C2
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::webclient-download
      - id: ps-obfuscated-exfil-uri
    any:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::webclient-upload
      - id: objectives/execution/interpreter/eval/invoke::encoded-iex
