defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, npm]
  attack: T1059.007
  mbc: B0024

traits:
  - id: telemetry-command-poll-endpoint
    desc: HTTP telemetry command-poll endpoint
    crit: component
    conf: 0.98
    if:
      type: text
      substr: /api/telemetry/poll-command

  - id: telemetry-command-result-endpoint
    desc: HTTP telemetry command-result endpoint
    crit: component
    conf: 0.98
    if:
      type: text
      regex: /api/telemetry/(command-result|directory-scan-result|upload-download)

composite_rules:
  - id: http-polled-command-agent
    desc: HTTP-polled agent executes remote commands
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: telemetry-command-poll-endpoint
      - id: telemetry-command-result-endpoint
      - id: micro-behaviors/communications/http/request/client::node-http-request-stream-body
      - id: micro-behaviors/process/create/shell/bridge::js-execsync-cmd-arg
