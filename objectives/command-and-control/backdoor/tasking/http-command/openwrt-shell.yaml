defaults:
  platforms: [openwrt]
  for: [shell]
  attack: T1071.001
  mbc: B0030

traits:
  - id: openwrt-release-probe
    desc: OpenWrt release file probe
    crit: component
    conf: 0.88
    if:
      type: text
      substr: /etc/openwrt_release

  - id: http-beacon-api-path
    desc: HTTP beacon API path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/v1/beacon

  - id: implant-session-header
    desc: Implant session HTTP header
    crit: component
    conf: 0.84
    if:
      type: text
      substr: "X-Session:"

  - id: json-command-field-extract
    desc: JSON command field extraction in shell
    crit: notable
    conf: 0.88
    if:
      type: text
      # Require shell-oriented extraction syntax.  A JSON object containing a
      # field named command is common in Python/Node APIs and is not shell C2.
      regex: 'jq.{0,40}[.]command'

  - id: eval-cmd-variable
    desc: eval of parsed command variable
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'cmd=.{0,80}"command"[\s\S]{0,240}\beval\s+"\$cmd"'

composite_rules:
  - id: openwrt-shell-c2-tasking
    desc: OpenWrt shell implant HTTP tasking loop
    crit: hostile
    conf: 0.96
    all:
      - id: openwrt-release-probe
      - id: http-beacon-api-path
      - id: implant-session-header
      - id: json-command-field-extract
      - id: eval-cmd-variable
