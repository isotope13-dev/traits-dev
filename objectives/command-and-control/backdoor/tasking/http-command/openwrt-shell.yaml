defaults:
  platforms: [openwrt]
  for: [shell]
  attack: T1071.001
  mbc: B0030

traits:
  - id: openwrt-release-probe
    desc: OpenWrt release file probe
    crit: component
    conf: 0.88
    if:
      type: text
      substr: /etc/openwrt_release

  - id: http-beacon-api-path
    desc: HTTP beacon API path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /api/v1/beacon

  - id: implant-session-header
    desc: Implant session HTTP header
    crit: component
    conf: 0.84
    if:
      type: text
      substr: "X-Session:"

  - id: eval-cmd-variable
    desc: eval of parsed command variable
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'cmd=.{0,80}"command"[\s\S]{0,240}\beval\s+"\$cmd"'

composite_rules:
  - id: openwrt-shell-c2-tasking
    desc: OpenWrt shell implant HTTP tasking loop
    crit: hostile
    conf: 0.96
    all:
      - id: openwrt-release-probe
      - id: http-beacon-api-path
      - id: implant-session-header
      - id: micro-behaviors/data/parse/json::jq-json-command-field-extract
      - id: eval-cmd-variable
