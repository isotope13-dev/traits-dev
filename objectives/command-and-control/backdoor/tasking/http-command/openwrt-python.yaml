defaults:
  platforms: [openwrt]
  for: [python, pyc]
  attack: T1059.006

traits:
  - id: python-http-command-path
    desc: Python command endpoint path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_.-])/(cmd|command)([?&\s"''`]|$)'
  - id: python-fetch-commands-name
    desc: Python command polling name
    crit: component
    conf: 0.9
    if:
      type: text
      word: fetch_commands
  - id: python-remote-command-name
    desc: Python remote command name
    crit: component
    conf: 0.9
    if:
      type: text
      word: execute_remote_command


composite_rules:
  - id: python-http-command-endpoint
    desc: Python command tasking endpoint
    crit: component
    conf: 0.9
    any:
      - id: python-http-command-path
      - id: python-fetch-commands-name
      - id: python-remote-command-name

  - id: openwrt-python-http-command-tasking
    desc: OpenWrt Python HTTP command tasking
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/persistence/system/network-appliance::openwrt-rc-common-init
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: python-http-command-endpoint
    any:
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: micro-behaviors/process/create/subprocess::subprocess-shell-pyc
    needs: 1
