defaults:
  platforms: [openwrt]
  for: [c, cpp, objc, rust, elf]
  attack: T1059
  mbc: B0030

traits:
  - id: native-api-command-path
    desc: Native API command path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '/api/commands?\b'
  - id: native-command-url
    desc: Native command URL path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'https?://[^\s"]{1,120}/commands?\b'
  - id: native-format-command-path
    desc: Native formatted command path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\{\}/commands?\b'
  - id: native-command-get-line
    desc: Native command GET line
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'GET /commands? HTTP/1\.[01]'
  - id: native-http-command-request-line
    desc: Native HTTP command request line
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'GET /(api/)?commands? HTTP/1\.[01]|http://\{\}/command'
  - id: native-exec-command-marker
    desc: Native received remote command marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'Received remote command'

composite_rules:
  - id: native-http-command-endpoint
    desc: Native HTTP command endpoint
    crit: component
    conf: 0.9
    any:
      - id: native-api-command-path
      - id: native-command-url
      - id: native-format-command-path
      - id: native-command-get-line

  - id: openwrt-native-http-command-tasking
    desc: OpenWrt native HTTP command tasking
    crit: hostile
    conf: 0.97
    all:
      - id: native-http-command-endpoint
    any:
      - id: native-http-command-request-line
      - id: native-exec-command-marker
      - id: micro-behaviors/process/create/shell/spawn::system-fn
      - id: micro-behaviors/process/create/direct::rust-bin-sh-c
    needs: 2
