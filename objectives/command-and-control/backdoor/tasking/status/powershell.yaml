---
defaults:
  platforms:
  - windows
  for:
  - powershell
  size_max: 5242880
  attack: T1059.001
traits:
- id: ps1-status-beacon-uri
  desc: Launch-status beacon URI path
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: "(?i)https?://[0-9a-z.\\[\\]-]{3,120}/stuk-phase\\b"
- id: ps1-status-beacon-message--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.97
  count_min: 2
  if:
    type: text
    substr: RFATAL DOWNLOAD ERROR
  count_max: 1015070
- id: ps1-status-beacon-message--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.97
  count_min: 2
  if:
    type: text
    substr: GFILE FOUND ON PC
  count_max: 1015071
- id: ps1-status-beacon-message--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.97
  count_min: 2
  if:
    type: text
    substr: GLAUNCH SUCCESS
  count_max: 1015072
- id: ps1-status-beacon-message--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.97
  count_min: 2
  if:
    type: text
    substr: GSESSION CLOSED
  count_max: 1015073
- id: ps1-status-beacon-message--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.97
  count_min: 2
  if:
    type: text
    substr: RDOWNLOAD ERROR
  count_max: 1015074
- id: ps1-status-beacon-message--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.97
  count_min: 2
  if:
    type: text
    substr: RLAUNCH FAILED
  count_max: 1015075
- id: ps1-status-beacon-post--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Invoke-RestMethod
  count_max: 1015076
- id: ps1-status-beacon-post--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: message
  count_max: 1015077
- id: ps1-status-beacon-post--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Body
  count_max: 1015078
- id: ps1-status-beacon-post--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Post
  count_max: 1015079
- id: ps1-started-launch-branch
  desc: Started branch posts launch result
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: "(?is)if\\s*\\(\\s*\\$started\\s*\\).{0,240}GLAUNCH SUCCESS.{0,240}else.{0,240}RLAUNCH FAILED"
composite_rules:
- id: ps1-launch-status-beacon
  desc: PowerShell loader posts launch status beacons
  crit: hostile
  conf: 0.98
  attack: T1071.001
  near_lines: 40
  all:
  - id: ps1-status-beacon-uri
  - id: ps1-status-beacon-message
  - id: ps1-status-beacon-post
  any:
  - id: ps1-started-launch-branch
  - id: micro-behaviors/communications/http/lib/invoke-webrequest::ps-post
  - id: micro-behaviors/process/create::start-process-dup
- id: ps1-status-beacon-message
  desc: Launch-status beacon message family
  crit: suspicious
  conf: 0.97
  any:
  - id: ps1-status-beacon-message--rx-1
  - id: ps1-status-beacon-message--rx-2
  - id: ps1-status-beacon-message--rx-3
  - id: ps1-status-beacon-message--rx-4
  - id: ps1-status-beacon-message--rx-5
  - id: ps1-status-beacon-message--rx-6
- id: ps1-status-beacon-post
  desc: Invoke-RestMethod status POST body
  crit: suspicious
  conf: 0.94
  all:
  - id: ps1-status-beacon-post--rx-7
  - id: ps1-status-beacon-post--rx-8
  - id: ps1-status-beacon-post--rx-9
  - id: ps1-status-beacon-post--rx-10
  near_bytes: 4096
