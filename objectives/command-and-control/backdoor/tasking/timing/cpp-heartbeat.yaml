defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
  mbc: B0030
traits:
  - id: heartbeat-send
    desc: SendHeart function symbol
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    if:
      type: text
      regex: SendHeart\b
  - id: heartbeat-set
    desc: setHeart function symbol
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    if:
      type: text
      regex: setHeart\b
  - id: heartbeat-thread
    desc: Heartbeat thread procedure
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: ThreadProc.{0,20}HeartBeat|HeartBeatThread
  - id: heartbeat-loop
    desc: HeartBeatLoop function symbol
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: HeartBeatLoop\b
  - id: heartbeat-task
    desc: heartbeat_task symbol
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: heartbeat_task\b
  - id: heartbeat-lower-loop
    desc: heartbeat_loop symbol
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: heartbeat_loop\b
  - id: heartbeat-string
    desc: C2 heartbeat string
    crit: notable
    conf: 0.7
    if:
      type: text
      word: heartbeat
    unless:
      - id: micro-behaviors/communications/socket/framing::libp2p-library-reference
  - id: checkin-string
    desc: C2 checkin string
    crit: notable
    conf: 0.7
    if:
      type: text
      word: checkin
composite_rules:
  - id: heartbeat-function
    desc: C2 heartbeat function
    crit: suspicious
    conf: 0.95
    any:
      - id: heartbeat-send
      - id: heartbeat-set
      - id: heartbeat-thread
      - id: heartbeat-loop
      - id: heartbeat-task
      - id: heartbeat-lower-loop
