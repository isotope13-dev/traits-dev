---
defaults:
  platforms:
  - unix
  - android
  for:
  - elf
  mbc: B0030
  attack: T1071.001
traits:
- id: curl-basename
  desc: curl command-line client filename
  crit: component
  conf: 0.98
  if:
    type: basename
    regex: '^curl(\.exe)?$'
composite_rules:
- id: native-libcurl-timing-backdoor
  desc: Native libcurl backdoor with timing and heartbeat behavior
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/communications/http/download/curl::libcurl-http
  - id: objectives/anti-analysis/timing/evasion::delay-with-network
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-string
  any:
  - id: micro-behaviors/crypto/asymmetric/ecdh
  - id: micro-behaviors/communications/http/headers::auth-header
  - id: micro-behaviors/communications/proxy/socks::socks4-proto
  - id: micro-behaviors/communications/proxy/socks::socks5-proto
- id: native-libcurl-proxy-auth-client
  desc: Native libcurl client with proxy and authorization support
  crit: suspicious
  conf: 0.88
  all:
  - id: micro-behaviors/communications/http/download/curl::libcurl-version
  - id: micro-behaviors/communications/http/headers::auth-header
  - id: micro-behaviors/communications/socket/connect::connect
  any:
  - id: micro-behaviors/communications/proxy/socks::socks4-proto
  - id: micro-behaviors/communications/proxy/socks::socks5-proto
  unless:
  - id: curl-basename
  - id: metadata/package/help::documented-cli-binary
- id: native-libcurl-heartbeat-proxy
  desc: Native libcurl implant-style heartbeat over proxy-capable client
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/communications/http/download/curl::libcurl-version
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-string
  any:
  - id: micro-behaviors/communications/proxy/socks::socks4-proto
  - id: micro-behaviors/communications/proxy/socks::socks5-proto
- id: native-libcurl-heartbeat-command-runner
  desc: Native libcurl heartbeat client with command execution
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/communications/http/download/curl::libcurl-version
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-string
  - id: micro-behaviors/communications/socket/connect::connect
  any:
  - id: micro-behaviors/process/create/popen::c-popen
  - id: micro-behaviors/process/create/execv::c-exec-variants
