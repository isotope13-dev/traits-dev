# Source-level backdoor self-labels.
defaults:
  platforms: [windows, unix]
  for: [c, cpp]
traits:
  - id: backdoor-macro-def
    desc: C macro defining a backdoor constant
    crit: suspicious
    if:
      type: text
      regex: '#define\s+[A-Z0-9_]*BACKDOOR(_[A-Z0-9_]+)?\s+'
    not:
      - regex: '#define\s+VMW(ARE)?_BACKDOOR(_[A-Z0-9_]+)?\s+'
