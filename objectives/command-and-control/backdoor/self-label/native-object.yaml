defaults:
  platforms: [linux]
  for: [elf]
  crit: suspicious
  conf: 0.9

composite_rules:
  - id: elf-object-backdoor-self-label
    desc: ELF object file self-labels backdoor
    all:
      - id: metadata/binary/metrics/structural::elf-relocatable-object
      - id: objectives/command-and-control/backdoor/keywords::backdoor-word
  - id: elf-object-backdoor-rwx-hints
    desc: Backdoor-labeled object carries RWX constants
    all:
      - id: metadata/binary/metrics/structural::elf-relocatable-object
      - id: objectives/command-and-control/backdoor/keywords::backdoor-word
      - id: micro-behaviors/mem/protect/modify::rwx-prot-bytes
