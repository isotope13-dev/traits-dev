defaults:
  platforms: [unix, windows]
  for: [composer.json]
  crit: suspicious
  conf: 0.9

traits:
  - id: composer-name-backdoor
    desc: Composer package name says backdoor
    if:
      type: value
      path: name
      regex: '(^|[-_/])php[-_]?backdoors?($|[-_/])'
      case_insensitive: true

  - id: composer-description-backdoor-collection
    desc: Composer backdoor description
    if:
      type: value
      path: description
      regex: '\bPHP backdoors?\b|\bbackdoor collection\b'
      case_insensitive: true

  - id: cargo-name-backdoored
    desc: Cargo package name says backdoored
    for: [cargo.toml]
    if:
      type: value
      path: package.name
      regex: '\bbackdoored[-_](crate|lib)\b'
      case_insensitive: true

  - id: cargo-name-malicious-macro
    desc: Cargo package name says malicious macro
    for: [cargo.toml]
    if:
      type: value
      path: package.name
      regex: '\bmalicious[-_]macro\b'
      case_insensitive: true

  - id: cargo-name-reverse-shell
    desc: Cargo package name says reverse shell
    for: [cargo.toml]
    if:
      type: value
      path: package.name
      regex: '(^|[-_])reverse[-_]shell($|[-_])'
      case_insensitive: true

  - id: cargo-dep-malicious-macro
    desc: Cargo depends on malicious macro
    for: [cargo.toml]
    if:
      type: value
      path: dependencies.malicious_macro
      exists: true

  - id: cargo-dep-backdoored-crate
    desc: Cargo depends on backdoored crate
    for: [cargo.toml]
    if:
      type: text
      regex: '(?m)^\s*backdoored_(crate|lib)\s*='

  - id: cargo-dep-tokio-backdoor
    desc: Cargo depends on tokio-backdoor
    for: [cargo.toml]
    if:
      type: value
      path: dependencies.tokio-backdoor
      exists: true

  - id: cargo-credential-extractor-features
    desc: Cargo credential features
    for: [cargo.toml]
    if:
      type: text
      regex: 'extract_(cookies|passwords|tokens|wallets)'
      case_insensitive: true

  - id: cargo-stealer-extractor-package
    desc: Cargo package names extractor
    for: [cargo.toml]
    if:
      type: value
      path: package.name
      regex: '(^|[-_])(extractor|stealer)($|[-_])'
      case_insensitive: true

  - id: cargo-offensive-technique-name
    desc: Cargo offensive package name
    for: [cargo.toml]
    if:
      type: value
      path: package.name
      regex: 'process[-_]?injection|threadless[-_]?injection|patch[-_]?(amsi|etw)'
      case_insensitive: true

  - id: cargo-name-cve-exploit
    desc: Cargo CVE package name
    for: [cargo.toml]
    if:
      type: value
      path: package.name
      regex: '^cve[-_][0-9]{4}[-_][0-9]{4,}$'
      case_insensitive: true

  - id: cargo-name-postex-wasm
    desc: Cargo postex package name
    for: [cargo.toml]
    if:
      type: value
      path: package.name
      regex: '\b(browser[-_]native[-_])?postex\b'
      case_insensitive: true

  - id: cargo-windows-injection-api-set
    desc: Cargo declares Win32 memory/debug API bindings
    crit: notable
    for: [cargo.toml]
    # Win32_System_Threading alone is generic (any threaded/process-spawning
    # crate needs it); process-injection requires the memory/debug write APIs.
    if:
      type: text
      regex: 'Win32_System_(Memory|Diagnostics_Debug)'
      case_insensitive: true
    unless:
      - id: metadata/package/manifest/workspace/

  - id: cargo-windows-amsi-patch-api-set
    desc: Cargo Windows loader memory features
    crit: notable
    for: [cargo.toml]
    if:
      type: text
      regex: 'Win32_System_LibraryLoader.{0,160}Win32_System_Memory'
      case_insensitive: true
    unless:
      - id: metadata/package/manifest/workspace/

  - id: cargo-windows-delete-self-api-set
    desc: Cargo Windows filesystem memory features
    crit: notable
    for: [cargo.toml]
    if:
      type: text
      regex: 'Win32_Storage_FileSystem.{0,240}Win32_System_Memory'
      case_insensitive: true
    unless:
      - id: metadata/package/manifest/workspace/

  - id: cargo-wasm-bindgen-browser-payload
    desc: Cargo WASM browser payload
    for: [cargo.toml]
    if:
      type: text
      regex: 'wasm-bindgen.{0,320}web-sys|web-sys.{0,320}wasm-bindgen'
      case_insensitive: true

    unless:
    - id: metadata/package/files/system-package::debian-missing-sources-vendored-crate
composite_rules:
  - id: composer-backdoor-package
    desc: Composer backdoor package self-label
    crit: hostile
    all:
      - id: composer-name-backdoor
      - id: composer-description-backdoor-collection

  - id: cargo-backdoored-macro-package
    desc: Cargo backdoored macro package
    crit: hostile
    for: [cargo.toml]
    all:
      - id: cargo-name-backdoored
      - id: cargo-dep-malicious-macro

  - id: cargo-credential-extractor-package
    desc: Cargo credential extractor package
    crit: hostile
    for: [cargo.toml]
    all:
      - id: cargo-stealer-extractor-package
      - id: cargo-credential-extractor-features

  - id: cargo-offensive-windows-tool
    desc: Cargo offensive Windows API tool manifest
    crit: hostile
    for: [cargo.toml]
    all:
      - id: cargo-offensive-technique-name
    any:
      - id: cargo-windows-injection-api-set
      - id: cargo-windows-amsi-patch-api-set
      - id: cargo-windows-delete-self-api-set

  - id: cargo-cve-exploit-payload-package
    desc: Cargo CVE exploit payload package manifest
    crit: hostile
    for: [cargo.toml]
    all:
      - id: cargo-name-cve-exploit
      - id: metadata/build/ecosystem::cargo-cdylib-crate

  - id: cargo-postex-wasm-payload-package
    desc: Cargo browser post-exploitation WASM payload package
    crit: hostile
    for: [cargo.toml]
    all:
      - id: cargo-name-postex-wasm
      - id: metadata/build/ecosystem::cargo-cdylib-crate
      - id: cargo-wasm-bindgen-browser-payload
