defaults:
  platforms: [windows]
  for: [go]
composite_rules:
  - id: go-windows-rat-capabilities
    desc: Go binary with multiple Windows RAT capabilities
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/evasion/anti-av/blinding::go-av-process-list
      - id: objectives/discovery/system/hardware::go-physical-drive-access
    any:
      - id: objectives/impact/degrade/system::go-netsh-wifi-disable
      - id: objectives/persistence/login/account/create::go-net-user-add
      - id: objectives/persistence/login/scheduled-task/masquerade::schtasks-create
