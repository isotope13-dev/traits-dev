defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1219
  mbc: B0022

traits:
  - id: csharp-client-task-wrapper
    desc: C# client task wrapper
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'new\s+[A-Za-z0-9_]*Task\s*\(\s*tcpClient'
  - id: csharp-client-ui-registration
    desc: C# client UI registration
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: 'RemoteEndPoint[\s\S]{0,240}\.Add\('
    unless:
      - type: path
        regex: '(^|[\\/])Robust\.Shared[\\/]Network[\\/]NetManager\.cs$'

composite_rules:
  - id: csharp-tcp-rat-tasking-server
    desc: C# TCP RAT tasking server
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/create::tcplistener-create
      - id: micro-behaviors/communications/socket/create::accept-tcpclient-async
      - id: csharp-client-task-wrapper
      - id: csharp-client-ui-registration
