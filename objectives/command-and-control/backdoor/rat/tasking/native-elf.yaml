defaults:
  platforms: [unix, android]
  for: [elf]
  mbc: B0030
  attack: T1059

traits:
  - id: c2-command-vocabulary
    desc: C2 attack, scan, shell vocabulary
    crit: suspicious
    conf: 0.97
    count_min: 3
    if:
      type: text
      regex: '(?i)\bC2\s+(ATTACK|SHELL|SCAN)\s+command'

  - id: c2-client-entry-symbol
    desc: Native C2 client startup entry point
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: start_c2_client

  - id: c2-heartbeat-and-retry
    desc: Native C2 heartbeat and reconnect logic
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)C2\s+(heartbeat|connection|client)|reconnect'

composite_rules:
  - id: native-c2-tasking-client
    desc: C2 client with attack and shell tasking
    crit: hostile
    conf: 0.99
    all:
      - id: c2-command-vocabulary
      - id: c2-client-entry-symbol
      - id: micro-behaviors/communications/socket/connect::connect
    any:
      - id: c2-heartbeat-and-retry
      - id: micro-behaviors/process/threading/concurrency::pthread
