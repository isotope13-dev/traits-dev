defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1059
  mbc: B0022

traits:
  - id: csharp-handle-shell-class
    desc: C# HandleShell class
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "class HandleShell"

  - id: csharp-msgpack-shell-param
    desc: C# MsgPack shell parameter
    crit: component
    conf: 0.82
    if:
      type: text
      substr: "MsgPack unpack_msgpack"

  - id: csharp-shell-form-key
    desc: C# shell form key
    crit: component
    conf: 0.86
    if:
      type: literal
      exact: "shell:"

  - id: csharp-msgpack-readinput-field
    desc: C# MsgPack ReadInput field
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      exact: "ReadInput"
  - id: csharp-msgpack-writeinput-field
    desc: C# MsgPack WriteInput field
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      exact: "WriteInput"
  - id: csharp-msgpack-shellwriteinput-packet
    desc: C# MsgPack shell input packet
    crit: suspicious
    conf: 0.92
    if:
      type: literal
      exact: "shellWriteInput"

  - id: csharp-shell-output-append
    desc: C# appends shell output
    crit: suspicious
    conf: 0.84
    if:
      type: text
      substr: ".AppendText("

  - id: csharp-shellhandler-chunked-result
    desc: C# ShellHandler chunk result
    crit: suspicious
    conf: 0.82
    if:
      type: text
      substr: "class ShellHandler : ChunkedResultHandler"

  - id: csharp-receivechunk-call
    desc: C# ReceiveChunk call
    crit: component
    conf: 0.82
    if:
      type: text
      substr: ".ReceiveChunk("

  - id: csharp-job-completed-result
    desc: C# job completed result
    crit: suspicious
    conf: 0.84
    if:
      type: text
      substr: "JobStatus.Completed"

  - id: csharp-result-utf8-decode
    desc: C# result UTF8 decode
    crit: component
    conf: 0.84
    if:
      type: text
      substr: "Encoding.UTF8.GetString"

composite_rules:
  - id: csharp-msgpack-rat-shell-handler
    desc: C# RAT shell handler via MsgPack
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-handle-shell-class
      - id: csharp-msgpack-shell-param
      - id: csharp-shell-form-key
      - id: csharp-msgpack-readinput-field
      - id: csharp-shell-output-append

  - id: csharp-msgpack-rat-shell-input-form
    desc: C# RAT shell input form
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-msgpack-writeinput-field
      - id: csharp-msgpack-shellwriteinput-packet
      - id: objectives/command-and-control/backdoor/control/file-manager::msgpack-encoded-send-bytes
      - id: objectives/command-and-control/backdoor/control/file-manager::client-threadpool-send

  - id: csharp-chunked-shell-task-result
    desc: C# chunked shell task result
    crit: hostile
    conf: 0.97
    all:
      - id: csharp-shellhandler-chunked-result
      - id: csharp-receivechunk-call
      - id: csharp-job-completed-result
      - id: csharp-result-utf8-decode
