defaults:
  platforms: [windows]
  for: [pe]
  attack: T1219,T1105,T1113
  mbc: B0030

traits:
  - id: remote-screenshot-tasking-marker
    desc: Remote screenshot tasking message marker
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: '{"type":"screenshot","data":'
  - id: remote-file-tasking-marker
    desc: Remote file listing or download tasking marker
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\{"type":"(files|download)","data":'
  - id: remote-mouse-lock-marker
    desc: Remote mouse-lock tasking marker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      word: mouse_locked
  - id: remote-click-marker
    desc: Remote click tasking marker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      word: click_sent
  - id: remote-scroll-marker
    desc: Remote scroll tasking marker
    crit: suspicious
    conf: 0.92
    if:
      type: text
      word: scroll_sent

composite_rules:
  - id: rat-remote-file-surveillance-tasking
    desc: RAT combines remote screenshot and file tasking over HTTP
    crit: hostile
    conf: 0.995
    attack: T1105,T1113,T1219
    all:
      - id: remote-screenshot-tasking-marker
      - id: remote-file-tasking-marker
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
  - id: rat-remote-surveillance-input-tasking
    desc: RAT combines screen capture with remote input control
    crit: hostile
    conf: 0.99
    attack: T1113,T1056.002,T1219
    all:
      - id: remote-screenshot-tasking-marker
      - id: micro-behaviors/hardware/input/keyboard/hook::set-windows-hook
    any:
      - id: remote-mouse-lock-marker
      - id: remote-click-marker
      - id: remote-scroll-marker
