defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1059.003
  mbc: B0022

traits:
  - id: hidden-copy-c2-loop-log
    desc: Hidden copy enters C2 command loop
    crit: component
    conf: 0.99
    if:
      type: text
      exact: hidden copy running, entering c2_loop

  - id: received-command-log
    desc: Remote-command receipt log prefix
    crit: component
    conf: 0.9
    if:
      type: text
      exact: 'recv cmd:'

  - id: screenshot-response-envelope
    desc: JSON screenshot response envelope
    crit: component
    conf: 0.96
    if:
      type: text
      exact: '{"type":"screenshot","data":"'

  - id: stream-start-command
    desc: Remote desktop stream-start command token
    crit: component
    conf: 0.9
    if:
      type: text
      exact: stream_start

  - id: stream-stop-command
    desc: Remote desktop stream-stop command token
    crit: component
    conf: 0.9
    if:
      type: text
      exact: stream_stop

composite_rules:
  - id: native-screen-stream-command-rat
    desc: Hidden Windows RAT receives commands for screenshots and live streaming
    crit: hostile
    conf: 0.99
    attack: T1059.003,T1113
    mbc: B0022,C0014
    all:
      - id: hidden-copy-c2-loop-log
      - id: received-command-log
      - id: screenshot-response-envelope
      - id: stream-start-command
      - id: stream-stop-command
      - id: micro-behaviors/communications/socket/init::winsock-client-lifecycle
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/sysadmin/
