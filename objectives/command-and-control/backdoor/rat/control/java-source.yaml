defaults:
  platforms: [windows, unix, android]
  for: [java]
  attack: T1219
  mbc: B0022

traits:
  - id: java-rat-shell-command-method
    desc: Java RAT shell command method
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: sendShellCommand
  - id: java-rat-keylogger-method
    desc: Java RAT keylogger method
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: function
      regex: '^startKey(log|logger)'
  - id: java-rat-filesystem-view-method
    desc: Java RAT filesystem view method
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: function
      exact: getFileSystemView
  - id: java-rat-filesystem-update-method
    desc: Java RAT filesystem update method
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: function
      exact: onFileSystemInfoUpdate
  - id: java-rat-filesystem-root-method
    desc: Java RAT filesystem root method
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: function
      exact: onFilesystemRootInfoReceived
  - id: java-rat-desktop-image-method
    desc: Java RAT desktop image method
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: function
      exact: onDesktopImageReceived
  - id: java-rat-desktop-config-method
    desc: Java RAT desktop config method
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: function
      exact: onDesktopConfigInfoReceived
  - id: java-rat-process-stop-method
    desc: Java RAT process stop method
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: function
      exact: stopProcessMonitor
  - id: java-rat-process-info-method
    desc: Java RAT process info method
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: function
      exact: onProcessInfoReceived
  - id: java-rat-process-session-method
    desc: Java RAT process session method
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: function
      exact: onProcessSessionClosed
  - id: java-rat-power-control-method
    desc: Java RAT power control method
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: function
      regex: '^start(Reboot|ShutDown|LogOff|Lock)'
  - id: java-rat-reverse-shell-subject
    desc: Java RAT reverse shell subject
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: member
      exact: Subject.REVERSE_SHELL
  - id: java-rat-controller-socket-source
    desc: Java RAT controller socket source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: import
      exact: java.net.Socket
  - id: java-rat-shell-senddata-source
    desc: Java RAT shell command sender
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'SendData\([^,\n]{0,80},\s*(shell|cmd|command|exec)'
      case_insensitive: true
  - id: java-rat-reverse-shell-ui-text
    desc: Java RAT reverse shell UI text
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)reverse shell (output|closed)|shell input'
  - id: java-rat-file-response-protocol
    desc: Java RAT file response protocol
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'startsWith\("(FILE|SCREENSHOT|KEYLOG|MIC)'
  - id: java-rat-screenshot-download-text
    desc: Java RAT screenshot download text
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)screenshots?.{0,160}(download|received|FileOutputStream)'
  - id: java-rat-keylog-download-text
    desc: Java RAT keylog download text
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)keylogs?.{0,160}(download|received|FileOutputStream)'
  - id: java-rat-mic-download-text
    desc: Java RAT mic recording download text
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)mic recording.{0,160}(download|received|FileOutputStream)'
  - id: java-rat-accept-loop-source
    desc: Java RAT accepts inbound client sockets
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '\.accept\(\)'
  - id: java-rat-tsocket-worker-source
    desc: Java RAT per-socket worker source
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'new\s+TSocket\([^)]{0,80}\)\.start\(\)'
  - id: java-rat-master-agent-registration
    desc: Java RAT master and agent registration text
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\((Master|Agent)\) Connection established|addAgent:'
  - id: java-rat-restart-all-sockets
    desc: Java RAT restart all sockets command
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: restartSocket
  - id: java-rat-screenshot-request
    desc: Java RAT screenshot request source
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: 'screenshot:'
  - id: java-c2-operation-console-history
    desc: Java C2 operation console command history
    crit: component
    conf: 0.84
    if:
      type: text
      substr: commandHistory
  - id: java-c2-common-handler-command
    desc: Java C2 common command handler dispatch
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'CommonHandler\([^,\n]{0,80},\s*this'
  - id: java-c2-task-killer-source
    desc: Java C2 task killer source
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: TaskKiller
  - id: java-rat-agentdata-source
    desc: Java RAT agent data source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: identifier
      exact: AgentData

composite_rules:
  - id: java-rat-filesystem-method
    desc: Java RAT filesystem methods
    crit: notable
    conf: 0.88
    any:
      - id: java-rat-filesystem-view-method
      - id: java-rat-filesystem-update-method
      - id: java-rat-filesystem-root-method
  - id: java-rat-screen-method
    desc: Java RAT screen methods
    crit: notable
    conf: 0.88
    any:
      - id: java-rat-desktop-image-method
      - id: java-rat-desktop-config-method
  - id: java-rat-process-method
    desc: Java RAT process methods
    crit: notable
    conf: 0.88
    any:
      - id: java-rat-process-stop-method
      - id: java-rat-process-info-method
      - id: java-rat-process-session-method
  - id: java-rat-collected-artifact-download
    desc: Java RAT artifact download handler
    crit: notable
    conf: 0.88
    any:
      - id: java-rat-screenshot-download-text
      - id: java-rat-keylog-download-text
      - id: java-rat-mic-download-text
  - id: java-source-rat-controller-surface
    desc: Java source RAT controller surface
    crit: suspicious
    conf: 0.95
    any:
      - id: java-rat-shell-command-method
      - id: java-rat-keylogger-method
      - id: java-rat-filesystem-method
      - id: java-rat-screen-method
      - id: java-rat-process-method
      - id: java-rat-power-control-method
      - id: java-rat-reverse-shell-subject
      - id: java-rat-controller-socket-source
    needs: 4
  - id: java-rat-reverse-shell-ui
    desc: Java RAT reverse shell UI command sender
    crit: suspicious
    conf: 0.93
    all:
      - id: java-rat-controller-socket-source
      - id: java-rat-reverse-shell-ui-text
      - id: java-rat-shell-senddata-source
  - id: java-rat-socket-artifact-collector
    desc: Java RAT socket artifact collector
    crit: suspicious
    conf: 0.94
    all:
      - id: java-rat-controller-socket-source
      - id: objectives/execution/exploit/gadget::java-process-output-capture-source
      - id: micro-behaviors/fs/file/copy::java-stream-copy
    any:
      - id: java-rat-file-response-protocol
      - id: java-rat-collected-artifact-download
    needs: 1
  - id: java-rat-server-broker
    desc: Java RAT server broker
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/communications/socket/create::java-serversocket-create
      - id: java-rat-accept-loop-source
    any:
      - id: java-rat-master-agent-registration
      - id: java-rat-restart-all-sockets
      - id: java-rat-tsocket-worker-source
    needs: 1
  - id: java-rat-screenshot-receiver
    desc: Java RAT screenshot receiver
    crit: suspicious
    conf: 0.93
    all:
      - id: java-rat-screenshot-request
      - id: objectives/command-and-control/dropper/staged-loader::java-base64-decode-source
      - id: micro-behaviors/fs/write/file/direct::java-fileoutputstream-source
  - id: java-c2-operation-console
    desc: Java C2 operation console
    crit: suspicious
    conf: 0.93
    all:
      - id: java-c2-operation-console-history
      - id: java-c2-common-handler-command
    any:
      - id: java-c2-task-killer-source
      - id: java-rat-controller-socket-source
    needs: 1
  - id: java-rat-registration-handler
    desc: Java RAT master/agent registration handler
    crit: suspicious
    conf: 0.92
    all:
      - id: java-rat-controller-socket-source
      - id: java-rat-master-agent-registration
  - id: java-rat-agent-management-ui
    desc: Java RAT agent management UI
    crit: suspicious
    conf: 0.92
    all:
      - id: java-rat-restart-all-sockets
      - id: java-rat-agentdata-source
