# Python remote-management agents with an HTTP command queue.
defaults:
  platforms: [unix, windows]
  for: [python, pyc]
  attack: T1071.001

traits:
  - id: python-agent-command-queue-endpoint
    desc: Python agent command queue endpoint
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: /api/command-queue

  - id: python-agent-exec-command-prefix
    desc: Agent command protocol exec prefix
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: '(?i)startswith\(\s*["'']exec:|["'']exec["'']\s*:\s*\{'

  - id: python-agent-systemd-service-path
    desc: Agent systemd service path
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: /etc/systemd/system/

  - id: python-agent-systemctl-enable
    desc: Agent systemctl enable command
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '(?i)systemctl\s+enable(\s+--now)?'

  - id: python-terminal-frame-rpc
    desc: Python uploads terminal frames remotely
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: mc_terminal_frame_push

  - id: python-terminal-input-rpc
    desc: Python pulls remote terminal input
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: mc_terminal_input_pull

  - id: python-terminal-input-default-on
    desc: Python enables remote input by default
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: 'os.environ.get("MESHCODE_TERMINAL_INPUT", "1")'

composite_rules:
  - id: python-agent-shell-command-channel
    desc: Shell=True agent command channel
    crit: notable
    conf: 0.98
    near_bytes: 12000
    all:
      - id: micro-behaviors/process/create/shell/spawn::python-agent-execute-command-function
      - id: micro-behaviors/process/create/subprocess::shell-true-call

  - id: python-agent-systemd-install-marker
    desc: Agent systemd service marker
    crit: notable
    conf: 0.95
    any:
      - id: python-agent-systemd-service-path
      - id: python-agent-systemctl-enable

  - id: python-remote-terminal-control
    desc: Python remote PTY control channel
    crit: hostile
    conf: 0.995
    scope: archive
    attack: "T1059,T1071.001"
    all:
      - id: python-terminal-frame-rpc
      - id: python-terminal-input-rpc
      - id: python-terminal-input-default-on
      - id: micro-behaviors/process/tty/pty::python-pty-fork
      - id: micro-behaviors/process/tty/pty::python-pty-master-write
      - id: micro-behaviors/process/create/subprocess::os-execvp

  - id: python-remote-agent-shell-channel
    desc: Python HTTP agent remote shell channel
    crit: hostile
    conf: 0.99
    scope: archive
    unless:
      - id: well-known/app/remotepower::documented-rmm-release-context
    attack: "T1059.004,T1071.001"
    all:
      - id: micro-behaviors/communications/http/server/route::python-heartbeat-route
      - id: python-agent-command-queue-endpoint
      - id: python-agent-exec-command-prefix
      - id: python-agent-shell-command-channel
    any:
      - id: python-agent-systemd-install-marker
      - id: micro-behaviors/os/service/config::systemd-etc-service-path
