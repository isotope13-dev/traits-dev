# Python Linux C2 Agent — /proc Recon, Hidden Tmp Drop, base64-JSON Beacon
# Detects the Linux Python RAT pattern: /proc filesystem process enumeration with
# /etc/passwd UID resolution, arbitrary payload drop to hidden /tmp path with chmod,
# and a base64-encoded JSON polling beacon over HTTP with 60-second sleep interval.
# Covers: C2-pushed Python code execution, fixed /tmp/ld.py staging path,
# initial home directory tree recon, and 60-second beacon poll.
# ATT&CK: T1059.006 (Python), T1057 (Process Discovery), T1071.001 (HTTP)
defaults:
  platforms:
  - unix
  for:
  - python
  attack: T1059.006
traits:
- id: proc-pid-cmdline-doc-placeholder
  desc: /proc pid cmdline documentation placeholder
  crit: component
  conf: 0.85
  if:
    type: text
    substr: "/proc/<pid>/cmdline"
- id: tmp-hidden-chmod-777
  desc: Drop to hidden /tmp path, chmod 0777
  crit: suspicious
  conf: 0.9
  attack: T1222.002
  if:
    type: text
    regex: '/tmp.{0,40}(os\.)?chmod.{0,20}0o777|0o777.{0,20}(os\.)?chmod.{0,40}/tmp'
  unless:
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness/
- id: python3-inline-code-exec
  desc: subprocess python3 -c code execution
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: subprocess\.run\s*\(\s*\["python3",\s*"-c"
composite_rules:
- id: proc-fs-walk-cmdline
  desc: /proc filesystem process walk with sensitive path joins
  crit: suspicious
  conf: 0.85
  attack: T1057
  all:
  - id: micro-behaviors/fs/proc/info/listing::python-proc-enumerate
  - id: micro-behaviors/fs/proc/info/path::python-proc-path-join
  near_bytes: 400
  unless:
  - id: well-known/lib/psutil/
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/app/context/
  - id: well-known/tool/detection/ai-guardrail/
  - id: proc-pid-cmdline-doc-placeholder
- id: python-linux-c2-agent
  desc: Python /proc-recon Linux C2 agent
  crit: hostile
  conf: 0.97
  all:
  - id: proc-fs-walk-cmdline
  - id: tmp-hidden-chmod-777
  - id: micro-behaviors/communications/http/post::python-base64-json-body
  any:
  - id: micro-behaviors/fs/path/config/accounts::etc-passwd
  - id: objectives/evasion/masquerade/identity/user-agent::user-agent-msie8
- id: python-c2-full-stack
  desc: Python C2 agent with recon and exec
  crit: hostile
  conf: 0.97
  all:
  - id: python-linux-c2-agent
  - id: micro-behaviors/time/sleep/interval::sleep-60-seconds
  any:
  - id: python3-inline-code-exec
  - id: micro-behaviors/fs/path/location::home-config-documents-reference
