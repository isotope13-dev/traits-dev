defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
  mbc: B0024
traits:
  - id: go-system-recon-method-name
    desc: Go RAT system information method name
    crit: component
    conf: 0.85
    attack: T1082
    if:
      type: text
      regex: (getSystemInfo|UpdateSysteminfo|makeSystemInfo)
  - id: go-dir-enum-get-dir-list
    desc: Directory enumeration method name
    crit: suspicious
    conf: 0.8
    attack: T1083
    if:
      type: text
      exact: GetDirList
  - id: go-dir-enum-list-directory
    desc: Directory enumeration method name
    crit: component
    conf: 0.8
    attack: T1083
    if:
      type: text
      exact: ListDirectory
  - id: go-dir-enum-read-dir
    desc: Go directory enumeration
    crit: suspicious
    conf: 0.8
    attack: T1083
    for:
      - go
    if:
      type: string_literal
      exact: ReadDir
  - id: socket-quick-control
    desc: Socket quick control functions
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: socket_quick_(start|stop)
composite_rules:
  - id: go-system-recon
    desc: Go RAT system information gathering
    crit: suspicious
    conf: 0.85
    attack: T1082
    all:
      - id: go-system-recon-method-name
    any:
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::go-version-string
      - id: metadata/lang/compiled::go-runtime-marker
  - id: go-rat-shell-proxy
    desc: Go RAT with shell and SOCKS proxy
    crit: hostile
    conf: 0.98
    attack: T1059.004
    all:
      - id: objectives/command-and-control/backdoor/dispatch/shell::interactive-shell-string
      - id: objectives/command-and-control/backdoor/proxy/socks::go-socks-proxy-module
      - id: micro-behaviors/process/create/shell/invoke::go-shell-strings
  - id: go-rat-full
    desc: Go RAT with full C2 capabilities
    crit: hostile
    conf: 0.98
    attack: T1059.004
    all:
      - id: objectives/command-and-control/backdoor/dispatch/shell::interactive-shell-string
      - id: objectives/command-and-control/backdoor/tasking/filesystem::go-file-utils
      - id: go-system-recon
      - id: micro-behaviors/process/create/shell/invoke::go-shell-strings
  - id: go-rat-antiforensics
    desc: Go RAT with anti-forensics capabilities
    crit: hostile
    conf: 0.98
    attack: T1070
    all:
      - id: objectives/command-and-control/backdoor/dispatch/shell::interactive-shell-string
      - id: objectives/evasion/indicator-removal/history::go-clean-history
      - id: micro-behaviors/process/create/shell/invoke::go-shell-strings
  - id: go-rat-timestomp
    desc: Go RAT with timestomping
    crit: hostile
    conf: 0.98
    attack: T1070.006
    all:
      - id: objectives/command-and-control/backdoor/dispatch/shell::interactive-shell-string
      - id: objectives/evasion/indicator-removal/timestamps::go-timestomp
      - id: micro-behaviors/process/create/shell/invoke::go-shell-strings
  - id: go-implant-proxy-transfer
    desc: Go implant with proxy and file transfer
    crit: hostile
    conf: 0.95
    mbc: B0030
    attack: T1090.001
    all:
      - id: objectives/command-and-control/backdoor/proxy/socks::go-socks-proxy-module
      - id: objectives/command-and-control/backdoor/tasking/filesystem::go-file-utils
      - id: micro-behaviors/process/create/shell/invoke::go-shell-strings
  - id: go-dir-enum
    desc: Go directory enumeration
    crit: suspicious
    conf: 0.8
    attack: T1083
    any:
      - id: go-dir-enum-get-dir-list
      - id: go-dir-enum-list-directory
      - id: go-dir-enum-read-dir
