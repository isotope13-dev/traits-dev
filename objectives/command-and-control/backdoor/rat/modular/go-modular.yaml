defaults:
  platforms: [windows, unix]
  for: [binaries]
  attack: T1105
traits:
- id: surveillance-modules
  desc: Go RAT surveillance modules
  crit: suspicious
  conf: 0.94
  count_min: 2
  if:
    type: text
    regex: \b(KeyloggerModule|ClipboardModule|ScreenshotModule|FingerprintModule)\b
- id: operator-module-set--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    regex: \b(CredStealerModule|FileOpsModule)\b
  count_max: 1013828
- id: operator-module-set--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    regex: \b(InjectorModule|PersistModule)\b
  count_max: 1013829
- id: operator-module-set--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.94
  count_min: 3
  if:
    type: text
    regex: \b(UACModule)\b
  count_max: 1013830
- id: register-heartbeat-protocol--sendregister
  desc: Go RAT register heartbeat (SendRegister)
  crit: component
  conf: 0.92
  if:
    type: text
    word: SendRegister
- id: register-heartbeat-protocol--sendheartbeat
  desc: Go RAT register heartbeat (SendHeartbeat)
  crit: component
  conf: 0.92
  if:
    type: text
    word: SendHeartbeat
- id: module-command-handler--executemodulecommand
  desc: Go RAT module command (executeModuleCommand)
  crit: component
  conf: 0.92
  if:
    type: text
    word: executeModuleCommand
- id: module-command-handler--module-cmd
  desc: Go RAT module command handler (module_cmd)
  crit: component
  conf: 0.92
  if:
    type: text
    word: module_cmd
- id: module-command-handler--registermodule
  desc: Go RAT module command handler (RegisterModule)
  crit: component
  conf: 0.92
  if:
    type: text
    word: RegisterModule
- id: shell-command-handler--executeshellcommand
  desc: Go RAT shell command (executeShellCommand)
  crit: component
  conf: 0.92
  if:
    type: text
    word: executeShellCommand
- id: shell-command-handler--sendoutput
  desc: Go RAT shell command handler (SendOutput)
  crit: component
  conf: 0.92
  if:
    type: text
    word: SendOutput
composite_rules:
- id: register-heartbeat-protocol
  desc: Go RAT register heartbeat protocol
  crit: component
  conf: 0.92
  any:
  - id: register-heartbeat-protocol--sendregister
  - id: register-heartbeat-protocol--sendheartbeat
- id: module-command-handler
  desc: Go RAT module command handler
  crit: component
  conf: 0.92
  any:
  - id: module-command-handler--executemodulecommand
  - id: module-command-handler--module-cmd
  - id: module-command-handler--registermodule
- id: shell-command-handler
  desc: Go RAT shell command handler
  crit: component
  conf: 0.92
  any:
  - id: shell-command-handler--executeshellcommand
  - id: shell-command-handler--sendoutput
- id: go-modular-rat-implant
  desc: Go modular RAT implant
  crit: hostile
  conf: 0.98
  all:
  - id: register-heartbeat-protocol
  - id: module-command-handler
  - id: shell-command-handler
  any:
  - id: surveillance-modules
  - id: operator-module-set
- id: operator-module-set
  desc: Go RAT operator module set
  crit: suspicious
  conf: 0.94
  any:
  - id: operator-module-set--rx-1
  - id: operator-module-set--rx-2
  - id: operator-module-set--rx-3
