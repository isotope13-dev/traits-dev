# A RAT-like Rust module set is an objective inference. The source-path
# observations themselves live in neutral compiler metadata.
defaults:
  for: [pe, elf, macho]
  platforms: [windows, linux, macos]
  mbc: B0030
  attack: T1059

composite_rules:
  - id: rust-rat-module-pattern
    desc: Rust binary with keylogging plus a second RAT module
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/lang/compiler/systems::rust-source-module-keylogging
    any:
      - id: metadata/lang/compiler/systems::rust-source-module-port-scanning
      - id: metadata/lang/compiler/systems::rust-source-module-injection
    needs: 1
