# Generic Rust RAT Module Fingerprinting
# Rust binaries retain source file paths from compilation.
# RATs have distinctive module patterns: shell, keylog, portscan, etc.
# These are generic patterns NOT specific to any malware family.
defaults:
  for: [pe, elf, macho]
  platforms: [windows, linux, macos]
  mbc: B0030
  attack: T1059
traits:
  - id: rust-rat-shell-mod
    desc: Rust source module for shell execution
    crit: component
    conf: 0.7
    if:
      type: text
      regex: src[\\/]shell\.rs
  - id: rust-rat-keylog-mod
    desc: Rust source module for keylogging
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (^|[\\/_-])src[\\/](keylog(ger)?|keystroke(s)?|keys)\.rs$
  - id: rust-rat-portscan-mod
    desc: Rust source module for port scanning
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: src[\\/]port_?scan(ner)?\.rs
  - id: rust-rat-download-mod
    desc: Rust source module for file download
    crit: component
    conf: 0.7
    if:
      type: text
      regex: src[\\/]download\.rs
  - id: rust-rat-upload-mod
    desc: Rust source module for file upload
    crit: component
    conf: 0.7
    if:
      type: text
      regex: src[\\/]upload\.rs
  - id: rust-rat-screenshot-mod
    desc: Rust source module for screenshot
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (^|[\\/_-])src[\\/](screenshot|capture_screen)\.rs$
  - id: rust-rat-inject-mod
    desc: Rust source module for process injection
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: src[\\/]inject(or)?\.rs
  - id: rust-rat-persist-mod
    desc: Rust source module for persistence
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: src[\\/]persist(ence)?\.rs
composite_rules:
  - id: rust-rat-module-pattern
    desc: Rust binary with RAT-like source module set
    crit: suspicious
    conf: 0.88
    needs: 3
    any:
      - id: rust-rat-shell-mod
      - id: rust-rat-keylog-mod
      - id: rust-rat-portscan-mod
      - id: rust-rat-download-mod
      - id: rust-rat-upload-mod
      - id: rust-rat-screenshot-mod
      - id: rust-rat-inject-mod
      - id: rust-rat-persist-mod
