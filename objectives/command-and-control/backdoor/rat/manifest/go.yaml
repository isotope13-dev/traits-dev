defaults:
  platforms: [linux, macos, windows]
  for: [go.mod]
  attack: T1219
  size_min: 64
  size_max: 1048576

traits:
  - id: go-mod-shred-dep
    desc: Go module secure deletion dependency
    crit: suspicious
    conf: 0.88
    attack: T1070.004
    if:
      type: text
      regex: 'github\.com/[A-Za-z0-9_.-]+/(shred|securedelete|secure-delete)\b'

  - id: go-mod-screenshot-dep
    desc: Go module screenshot dependency
    crit: suspicious
    conf: 0.86
    attack: T1113
    if:
      type: text
      regex: 'github\.com/[A-Za-z0-9_.-]+/(screenshot|go-screenshot)\b'

  - id: go-mod-operator-shell-dep
    desc: Go module operator shell dependency
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: "github.com/abiosoft/ishell"

composite_rules:
  - id: go-rat-tor-escalation-surveillance-manifest
    desc: Go RAT Tor elevation surveillance manifest
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/channel/tor/client::bine-string
      - id: objectives/privilege-escalation/elevation-control/uac-bypass/library::go-escalate-dependency
    needs: 4
    any:
      - id: go-mod-shred-dep
      - id: go-mod-screenshot-dep
      - id: go-mod-operator-shell-dep
      - id: objectives/discovery/network/scan/utility::go-mod-host-info-dep

  - id: go-rat-operator-surveillance-manifest
    desc: Go RAT operator surveillance manifest
    crit: suspicious
    conf: 0.92
    all:
      - id: go-mod-operator-shell-dep
    needs: 3
    any:
      - id: objectives/command-and-control/channel/tor/client::bine-string
      - id: objectives/privilege-escalation/elevation-control/uac-bypass/library::go-escalate-dependency
      - id: go-mod-screenshot-dep
      - id: objectives/discovery/network/scan/utility::go-mod-host-info-dep
