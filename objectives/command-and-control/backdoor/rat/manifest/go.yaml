defaults:
  platforms: [linux, macos, windows]
  for: [go.mod]
  attack: T1219
  size_min: 64
  size_max: 1048576

traits:
  - id: go-mod-reverse-shell-name
    desc: Go module reverse shell naming
    crit: suspicious
    conf: 0.94
    attack: T1059
    size_min: 16
    if:
      type: text
      regex: '(?m)^module\s+\S*(shell[_-]?reverse[_-]?tcp|reverse[_-]?shell)\S*$'

  - id: go-mod-bind-shell-name
    desc: Go module bind shell naming
    crit: suspicious
    conf: 0.92
    attack: T1059
    if:
      type: text
      regex: '(?m)^module\s+\S*(pty[_-]?bind[_-]?shell|bind[_-]?shell)\S*$'

  - id: go-mod-ssh-pty-file-transfer
    desc: Go SSH PTY dependency manifest
    crit: component
    conf: 0.9
    attack: T1021.004
    if:
      type: text
      substr: "github.com/gliderlabs/ssh"

  - id: go-mod-sftp-dep
    desc: Go SFTP dependency manifest
    crit: component
    conf: 0.88
    attack: T1021.004
    if:
      type: text
      substr: "github.com/pkg/sftp"

  - id: go-mod-fileless-exec-name
    desc: Go fileless execution module name
    crit: suspicious
    conf: 0.9
    attack: T1620
    if:
      type: text
      regex: '(?m)^module\s+\S*fileless[_-]?xec\S*$'

  - id: go-mod-memfd-quic-pty-manifest
    desc: Go memfd dependency manifest
    crit: component
    conf: 0.91
    attack: T1620
    if:
      type: text
      substr: "github.com/justincormack/go-memfd"

  - id: go-mod-quic-dep
    desc: Go QUIC dependency manifest
    crit: component
    conf: 0.86
    if:
      type: text
      regex: "github\\.com/(quic-go|lucas-clemente)/quic-go"

  - id: go-mod-shred-dep
    desc: Go module secure deletion dependency
    crit: suspicious
    conf: 0.88
    attack: T1070.004
    if:
      type: text
      regex: 'github\.com/[A-Za-z0-9_.-]+/(shred|securedelete|secure-delete)\b'

  - id: go-mod-screenshot-dep
    desc: Go module screenshot dependency
    crit: notable
    conf: 0.86
    attack: T1113
    if:
      type: text
      regex: 'github\.com/[A-Za-z0-9_.-]+/(screenshot|go-screenshot)\b'

  - id: go-mod-c2-module-name
    desc: Go module C2 client naming
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?im)^module\s+\S*\b(c2|rat)(client|agent|server)?\b'

  - id: go-mod-dns-dep
    desc: Go module DNS dependency
    crit: component
    conf: 0.88
    attack: T1071.004
    if:
      type: text
      substr: "github.com/miekg/dns"

  - id: go-mod-clipboard-dep
    desc: Go module clipboard dependency
    crit: component
    conf: 0.88
    attack: T1115
    if:
      type: text
      substr: "github.com/atotto/clipboard"

  - id: go-mod-operator-shell-dep
    desc: Go module operator shell dependency
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: "github.com/abiosoft/ishell"

composite_rules:
  - id: go-pty-bind-shell-manifest
    desc: Go PTY bind shell manifest
    crit: hostile
    conf: 0.98
    attack: T1059,T1021.004
    all:
      - id: go-mod-bind-shell-name
      - id: go-mod-ssh-pty-file-transfer
      - id: go-mod-sftp-dep
      - id: micro-behaviors/process/tty/pty::go-creack-pty

  - id: go-fileless-pty-c2-manifest
    desc: Go fileless PTY C2 manifest
    crit: hostile
    conf: 0.97
    attack: T1620,T1059
    all:
      - id: go-mod-fileless-exec-name
      - id: go-mod-memfd-quic-pty-manifest
      - id: go-mod-quic-dep
      - id: micro-behaviors/process/tty/pty::go-creack-pty

  - id: go-rat-tor-escalation-surveillance-manifest
    desc: Go RAT Tor elevation surveillance manifest
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/channel/tor/client::bine-string
      - id: objectives/privilege-escalation/elevation-control/uac-bypass/library::go-escalate-dependency
    needs: 4
    any:
      - id: go-mod-shred-dep
      - id: go-mod-screenshot-dep
      - id: go-mod-operator-shell-dep
      - id: objectives/discovery/network/scan/utility::go-mod-host-info-dep

  - id: go-rat-operator-surveillance-manifest
    desc: Go RAT operator surveillance manifest
    crit: suspicious
    conf: 0.92
    all:
      - id: go-mod-operator-shell-dep
    needs: 3
    any:
      - id: objectives/command-and-control/channel/tor/client::bine-string
      - id: objectives/privilege-escalation/elevation-control/uac-bypass/library::go-escalate-dependency
      - id: go-mod-screenshot-dep
      - id: objectives/discovery/network/scan/utility::go-mod-host-info-dep

  - id: go-c2-dns-client-manifest
    desc: Go C2 client with DNS dependency
    crit: suspicious
    conf: 0.93
    attack: T1071.004
    all:
      - id: go-mod-c2-module-name
      - id: go-mod-dns-dep

  - id: go-rat-clipboard-surveillance-manifest
    desc: Go RAT clipboard and screenshot manifest
    crit: suspicious
    conf: 0.94
    all:
      - id: go-mod-screenshot-dep
      - id: go-mod-clipboard-dep
    any:
      - id: go-mod-dns-dep
      - id: objectives/discovery/network/scan/utility::go-mod-host-info-dep

  - id: go-pty-websocket-surveillance-manifest
    desc: Go PTY WebSocket screenshot manifest
    crit: hostile
    conf: 0.96
    attack: T1059,T1071.001,T1113
    all:
      - id: micro-behaviors/process/tty/pty::go-creack-pty
      - id: micro-behaviors/communications/websocket/library::go-websocket-library
      - id: go-mod-screenshot-dep
    unless:
      - id: well-known/app/inference-gateway::source-tree

  - id: go-keylogger-screenshot-manifest
    desc: Go keylogger and screenshot manifest
    crit: hostile
    conf: 0.96
    attack: T1056.001,T1113
    all:
      - id: micro-behaviors/hardware/input/keyboard/listener::keylogger-package-import
      - id: go-mod-screenshot-dep
