---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - binaries
  - scripts
  - source
traits:
- id: remote-desktop-word
  desc: '"remote_desktop" feature word'
  if:
    type: text
    substr: remote_desktop
- id: file-browser-word
  desc: '"file_browser" feature word'
  if:
    type: text
    substr: file_browser
- id: keylogger-word
  desc: '"keylogger" feature word'
  if:
    type: text
    substr: keylogger
