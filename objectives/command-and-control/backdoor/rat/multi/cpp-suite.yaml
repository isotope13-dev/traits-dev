defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
  mbc: B0030
traits:
- id: dir-op-functions
  desc: Remote directory operations
  crit: suspicious
  conf: 0.85
  attack: T1083
  if:
    type: text
    regex: (DirOp(Directory|GetDirectoryData|DirectoryDelete)|OnReceiveDirOPTypeCmd)
- id: task-dispatch
  desc: C2 task dispatch functions
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (OnReceivedPacket.{0,20}Task|RunChildTask|OnReceive.{0,20}NewTask)
- id: register-to-server--registerselftoserver
  desc: C2 registration function (RegisterSelfToServer)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    word: RegisterSelfToServer
- id: register-to-server--registertoserver
  desc: C2 registration function (RegisterToServer)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    word: RegisterToServer
- id: session-id-mgmt--g-szsessionid
  desc: C2 session management (g_szSessionID)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    word: g_szSessionID
- id: session-id-mgmt--getsessionid
  desc: C2 session management (GetSessionID)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    word: GetSessionID
  unless:
  - id: well-known/tool/development/ipsw
  - id: well-known/tool/sysadmin/vhdxtool::vhdxtool-signed-executable
  - id: well-known/lib/nlog::nlog-dll-basename
  - id: well-known/lib/nlog::nlog-embedded-member
  - id: well-known/app/windows-desktop-tools::bouncycastle-crypto-library
  - id: well-known/app/windows-desktop-tools::steamkit2-library
  - id: well-known/tool/sysadmin/virtualization::lima-virtualization-tool
  - type: basename
    exact: limactl-mcp.exe
- id: session-id-mgmt--sessionudfromserver
  desc: C2 session management (SessionUDFromServer)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    word: SessionUDFromServer
- id: session-id-mgmt--m-sessionid
  desc: C2 session management (m_SessionID)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    word: m_SessionID
- id: server-config-vars--g-tagsockaddrinserver
  desc: C2 server config (g_tagSockAddrInServer)
  crit: suspicious
  conf: 0.8
  if:
    type: text
    word: g_tagSockAddrInServer
- id: server-config-vars--g-lplinuxclienthostcfg
  desc: C2 server config (g_lpLinuxClientHostCfg)
  crit: suspicious
  conf: 0.8
  if:
    type: text
    word: g_lpLinuxClientHostCfg
- id: server-config-vars--g-lplinuxclientdefaultcfg
  desc: C2 server config (g_lpLinuxClientDefaultCfg)
  crit: suspicious
  conf: 0.8
  if:
    type: text
    word: g_lpLinuxClientDefaultCfg
- id: packet-data-struct--tag-packet-to-send
  desc: C2 packet structures (TAG_PACKET_TO_SEND)
  crit: notable
  conf: 0.8
  if:
    type: text
    word: TAG_PACKET_TO_SEND
- id: packet-data-struct--listpackettosend
  desc: C2 packet structures (ListPacketToSend)
  crit: notable
  conf: 0.8
  if:
    type: text
    word: ListPacketToSend
composite_rules:
- id: register-to-server
  desc: C2 registration function
  crit: suspicious
  conf: 0.9
  attack: T1071.001
  any:
  - id: register-to-server--registerselftoserver
  - id: register-to-server--registertoserver
- id: session-id-mgmt
  desc: C2 session management
  crit: suspicious
  conf: 0.85
  any:
  - id: session-id-mgmt--g-szsessionid
  - id: session-id-mgmt--getsessionid
  - id: session-id-mgmt--sessionudfromserver
  - id: session-id-mgmt--m-sessionid
- id: server-config-vars
  desc: C2 server config variables
  crit: suspicious
  conf: 0.8
  any:
  - id: server-config-vars--g-tagsockaddrinserver
  - id: server-config-vars--g-lplinuxclienthostcfg
  - id: server-config-vars--g-lplinuxclientdefaultcfg
- id: packet-data-struct
  desc: C2 packet structures
  crit: notable
  conf: 0.8
  any:
  - id: packet-data-struct--tag-packet-to-send
  - id: packet-data-struct--listpackettosend
- id: cpp-rat-rshell-beacon
  desc: C++ RAT with remote shell
  crit: hostile
  conf: 0.95
  attack: T1059.004 - elf - macho - pe
  all:
  - id: objectives/command-and-control/backdoor/dispatch/shell::rshell-function
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-function
  - id: micro-behaviors/process/create/shell/spawn::shell-symbols
- id: cpp-rat-full-implant
  desc: Full C++ RAT implant
  crit: hostile
  conf: 0.95
  attack: T1071.001 - elf - macho - pe
  all:
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-function
  - id: register-to-server
  - id: objectives/command-and-control/backdoor/rat/recon::basic-info-gather-class
  - id: micro-behaviors/process/create/shell/spawn::shell-symbols
- id: cpp-rat-c2-registration
  desc: C++ RAT with C2 registration
  crit: hostile
  conf: 0.95
  attack: T1071.001 - elf - macho - pe
  all:
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-function
  - id: register-to-server
  - id: micro-behaviors/communications/socket/create/
- id: cpp-rat-file-mgmt
  desc: C++ RAT with file management
  crit: hostile
  conf: 0.93
  attack: T1105 - elf - macho - pe
  all:
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-function
  - id: objectives/command-and-control/backdoor/tasking/filesystem::file-op-functions
  - id: dir-op-functions
  - id: micro-behaviors/communications/socket/create/
- id: cpp-rat-with-profiling
  desc: C++ RAT with victim profiling
  crit: hostile
  conf: 0.95
  attack: T1082 - elf - macho - pe
  all:
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-function
  - id: objectives/command-and-control/backdoor/rat/recon::basic-info-gather-class
  - id: objectives/command-and-control/backdoor/rat/recon::victim-profile-format
  any:
  - id: register-to-server
  - id: objectives/command-and-control/backdoor/dispatch/shell::rshell-function
  - id: objectives/persistence/system/cron/schedule::crontab-string
- id: cpp-rat-command-control
  desc: C++ RAT command and control
  crit: hostile
  conf: 0.92
  mbc: B0030 - elf - macho - pe
  all:
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-function
  - id: session-id-mgmt
  - id: task-dispatch
  - id: micro-behaviors/communications/socket/create/
