defaults:
  platforms: [windows, unix]
  for: [go]
  mbc: B0024
  attack: T1195.002
traits:
  - id: embedded-binary-blob
    desc: Large embedded binary blob
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: //go:embed.{0,50}\.(exe|elf|bin)|embeddedBinary
  - id: hidden-init-function
    desc: Hidden initialization in init()
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?s)\bfunc\s+init\s*\(\s*\)\s*\{.{0,80}\bgo\s+connect\s*\('
  - id: goroutine-connect
    desc: Go goroutine launches connect call
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '\bgo\s+([A-Za-z_]\w*\.)?connect\s*\('
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: well-known/tool/development/go-toolchain::go-module-source-path
  - id: goroutine-beacon
    desc: Go goroutine launches beacon call
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: '\bgo\s+([A-Za-z_]\w*\.)?beacon\s*\('
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: goroutine-dial
    desc: Go goroutine launches dial call
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: '\bgo\s+([A-Za-z_]\w*\.)?dial\s*\('
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: well-known/tool/development/go-toolchain::go-module-source-path
composite_rules:
  - id: obfuscated-c2-config
    desc: Obfuscated C2 configuration
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/anti-static/obfuscation/config
    any:
      - id: micro-behaviors/communications/socket/connect::dial
      - id: objectives/command-and-control/channel/tor/client::bine-import
    unless:
      # crypto/tls test shims carry base64 ECH (Encrypted Client Hello) config
      # lists and dial a test server — a TLS feature, not a C2 config.
      - id: well-known/tool/development/go-toolchain::go-toolchain-source-path
  - id: goroutine-backdoor
    desc: Goroutine backdoor patterns
    crit: suspicious
    conf: 0.8
    any:
      - id: goroutine-connect
      - id: goroutine-beacon
      - id: goroutine-dial
    unless:
      - id: well-known/tool/development/go-toolchain::go-module-source-path
  - id: rat-shell-access
    desc: RAT with remote shell execution
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: micro-behaviors/process/create/direct::exec-command
    any:
      - id: micro-behaviors/communications/socket/connect::dial
      - id: objectives/command-and-control/channel/tor/client::bine-import
  - id: rat-screenshot
    desc: RAT with screen capture
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/hardware/display/screen::screenshot-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
    any:
      - id: micro-behaviors/communications/socket/connect::dial
      - id: objectives/command-and-control/channel/tor/client::bine-import
  - id: rat-network-recon
    desc: RAT with network scanning
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/discovery/network/scan/port::gomap-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
    any:
      - id: micro-behaviors/communications/socket/connect::dial
      - id: objectives/command-and-control/channel/tor/client::bine-import
  - id: tor-rat
    desc: Tor-based Remote Access Trojan
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/channel/tor/client::bine-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: micro-behaviors/process/create/direct::exec-command
    any:
      - id: micro-behaviors/hardware/display/screen::screenshot-import
      - id: objectives/discovery/network/scan/port::gomap-import
      - id: micro-behaviors/fs/delete/secure::shred-import
  - id: tor-rat-persistent
    desc: Tor RAT with persistence mechanisms
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/channel/tor/client::bine-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: micro-behaviors/process/create/direct::exec-command
    any:
      - id: objectives/persistence/login/registry/run-key::run-key-persistence
      - id: objectives/persistence/login/scheduled-task/masquerade::schtask-persistence
      - id: objectives/persistence/system/wmi/subscription::wmi-persistence
      - id: objectives/persistence/login/xdg::xdg-persistence
  - id: supply-chain-rat-init
    desc: RAT functionality hidden in init()
    crit: hostile
    conf: 0.95
    all:
      - id: hidden-init-function
      - id: goroutine-backdoor
    any:
      - id: micro-behaviors/communications/socket/connect::dial
      - id: objectives/command-and-control/channel/tor/client::bine-import
  - id: supply-chain-rat-antiforensics
    desc: RAT with anti-forensic capabilities
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/delete/secure::shred-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: micro-behaviors/process/create/direct::exec-command
    any:
      - id: micro-behaviors/communications/socket/connect::dial
      - id: objectives/command-and-control/channel/tor/client::bine-import
  - id: full-rat-profile
    desc: Full-featured Remote Access Trojan
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: micro-behaviors/process/create/direct::exec-command
    any:
      - id: micro-behaviors/communications/socket/connect::dial
      - id: objectives/command-and-control/channel/tor/client::bine-import
      - id: micro-behaviors/hardware/display/screen::screenshot-import
      - id: objectives/discovery/network/scan/port::gomap-import
      - id: micro-behaviors/fs/delete/secure::shred-import
      - id: objectives/persistence/login/registry/run-key::run-key-persistence
      - id: objectives/persistence/login/scheduled-task/masquerade::schtask-persistence
      - id: objectives/persistence/system/wmi/subscription::wmi-persistence
      - id: objectives/persistence/login/xdg::xdg-persistence
    needs: 3
