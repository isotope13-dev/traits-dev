defaults:
  platforms: [windows, unix, android]
  for:
    - java
    - class
    - jar
    - zip
traits:
  - id: remote-cmd-string
    desc: Remote command execution indicator
    crit: suspicious
    conf: 0.95
    mbc: B0024
    attack: T1059
    if:
      type: text
      substr: remote-cmd
  - id: power-shell-string
    desc: PowerShell execution command
    crit: suspicious
    conf: 0.95
    mbc: B0024
    attack: T1059.001
    if:
      type: text
      substr: power-shell
  - id: down-n-exec-string
    desc: Download and execute command
    crit: suspicious
    conf: 0.98
    mbc: B0025
    attack: T1105
    if:
      type: text
      substr: down-n-exec
  - id: up-n-exec-string
    desc: Upload and execute command
    crit: suspicious
    conf: 0.98
    mbc: B0025
    attack: T1105
    if:
      type: text
      substr: up-n-exec
  - id: remote-screen-string
    desc: Remote screen access command
    crit: suspicious
    conf: 0.95
    mbc: B0022
    attack: T1113
    if:
      type: text
      substr: remote-screen
  - id: hrdp-new-string
    desc: Hidden RDP session command
    crit: suspicious
    conf: 0.95
    mbc: B0022
    attack: T1021.001
    if:
      type: text
      substr: hrdp-new
  - id: hrdp-res-string
    desc: Hidden RDP resume command
    crit: suspicious
    conf: 0.95
    mbc: B0022
    attack: T1021.001
    if:
      type: text
      substr: hrdp-res
  - id: file-manager-string
    desc: File manager command
    crit: suspicious
    conf: 0.9
    mbc: E1083
    attack: T1083
    if:
      type: text
      substr: file-manager
  - id: rev-proxy-string
    desc: Reverse proxy command
    crit: suspicious
    conf: 0.95
    mbc: B0026
    attack: T1090
    if:
      type: text
      substr: rev-proxy
  - id: rw-encrypt-string
    desc: Ransomware encrypt command
    crit: suspicious
    conf: 0.95
    mbc: B0031
    attack: T1486
    if:
      type: text
      substr: rw-encrypt
  - id: rw-decrypt-string
    desc: Ransomware decrypt command
    crit: suspicious
    conf: 0.95
    mbc: B0031
    attack: T1486
    if:
      type: text
      substr: rw-decrypt
  - id: c2-nonstandard-ports
    desc: Java hardcoded C2 endpoints with non-standard ports
    crit: suspicious
    conf: 0.85
    mbc: C0002
    attack: T1071.001
    count_min: 2
    unless:
      - type: text
        substr: "127.0.0.1:"
      - type: text
        substr: "192.168."
      - type: text
        regex: '172\.(1[6-9]|2[0-9]|3[01])\.'
      - type: text
        regex: '(^|[^0-9])10\.'
    if:
      type: text
      regex: '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]{4,5}'
      is: external_ip
  - id: base64-network-endpoints
    desc: Base64-encoded network endpoints in Java bytecode
    crit: suspicious
    conf: 0.9
    mbc: B0032
    attack: T1140
    count_min: 1
    if:
      type: encoded
      encoding: base64
      regex: '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]{4,5}'
  - id: multiple-c2-endpoints
    desc: Java application with multiple hardcoded C2 endpoints
    crit: suspicious
    conf: 0.8
    mbc: C0002
    attack: T1071.001
    count_min: 3
    unless:
      - type: text
        substr: "127.0.0.1:"
      - type: text
        substr: "192.168."
      - type: text
        regex: '172\.(1[6-9]|2[0-9]|3[01])\.'
      - type: text
        regex: '(^|[^0-9])10\.'
    if:
      type: text
      regex: '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]+'
      is: external_ip
composite_rules:
  - id: rat-comprehensive
    desc: Comprehensive Java RAT with multiple capabilities
    crit: suspicious
    mbc: B0022
    attack: T1219
    conf: 0.98
    needs: 4
    any:
      - id: micro-behaviors/hardware/input/keyboard/label::keylogger-string
      - id: remote-cmd-string
      - id: power-shell-string
      - id: down-n-exec-string
      - id: up-n-exec-string
      - id: remote-screen-string
      - id: objectives/impact/system/rce::reboot-string
      - id: objectives/impact/system/rce::uninstall-string
  - id: keylogger
    desc: Java keylogging capability
    crit: suspicious
    mbc: T1056.001
    attack: T1056.001
    conf: 0.95
    any:
      - id: micro-behaviors/hardware/input/keyboard/label::keylogger-string
      - id: objectives/credential-access/browser/loot::o-keylogger-string
  - id: remote-access
    desc: Java remote access capability
    crit: suspicious
    mbc: B0022
    attack: T1021
    conf: 0.95
    needs: 2
    any:
      - id: remote-screen-string
      - id: hrdp-new-string
      - id: hrdp-res-string
      - id: remote-cmd-string
      - id: power-shell-string
  - id: dropper-comp
    desc: Java download and execute capability
    crit: suspicious
    mbc: B0025
    attack: T1105
    conf: 0.95
    any:
      - id: down-n-exec-string
      - id: up-n-exec-string
  - id: ransomware
    desc: Java ransomware capability
    crit: suspicious
    mbc: B0031
    attack: T1486
    conf: 0.95
    all:
      - id: rw-encrypt-string
      - id: rw-decrypt-string
  - id: classloader-dropper
    desc: Obfuscated Java class loader dropper
    crit: hostile
    mbc: B0032
    attack: T1140
    conf: 0.92
    for: [jar, zip]
    all:
      - id: objectives/command-and-control/backdoor/loader/classloader::dynamic-bytecode-loader
      - id: objectives/command-and-control/backdoor/loader/classloader::context-classloader-handoff
      - id: objectives/command-and-control/backdoor/loader/classloader::encrypted-loader-payload
      - id: objectives/command-and-control/backdoor/loader/archive::staged-classloader-archive
  - id: manifest-classloader-chain
    desc: Manifest-driven encrypted classloader chain
    crit: hostile
    conf: 0.95
    mbc: B0032
    attack: T1140
    for: [jar, zip]
    all:
      - id: objectives/command-and-control/backdoor/loader/archive::nested-jar-unpack
      - id: objectives/command-and-control/backdoor/loader/classloader::dynamic-bytecode-loader
      - id: objectives/command-and-control/backdoor/loader/classloader::context-classloader-handoff
      - id: objectives/command-and-control/backdoor/loader/classloader::encrypted-loader-payload
    unless:
      - id: well-known/lib/spring-boot::executable-jar
  - id: adwind-c2-infrastructure
    desc: Java Adwind RAT C2 infrastructure pattern
    crit: hostile
    conf: 0.92
    mbc: C0002
    attack: T1071.001
    all:
      - id: multiple-c2-endpoints
    any:
      - id: base64-network-endpoints

  - id: java-rat-socket-command-automation
    desc: Java RAT combines socket command automation
    crit: hostile
    conf: 0.97
    mbc: B0022
    attack: T1219
    for: [class, jar, zip]
    all:
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode
      - id: micro-behaviors/communications/socket/create::java-socket-bytecode-reference
    any:
      - id: remote-cmd-string
      - id: power-shell-string
      - id: down-n-exec-string
      - id: up-n-exec-string
      - id: objectives/command-and-control/backdoor/loader/classloader::encrypted-loader-payload
      - id: objectives/impact/system/rce::reboot-string
    unless:
      - id: objectives/collection/screenshot/capture::java-awt-robot-ref
