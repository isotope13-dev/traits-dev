defaults:
  platforms: [unix, windows]
  for: [python, pyc]
  attack: T1071.001
  mbc: B0030

traits:
  - id: python-checkin-endpoint
    desc: Python C2 check-in endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/checkin
  - id: python-result-endpoint
    desc: Python C2 result endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/result
  - id: python-upload-endpoint
    desc: Python C2 upload endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/v1/upload
  - id: python-beacon-id-header
    desc: Python X-Beacon-ID header
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: X-Beacon-ID
  - id: python-rat-task-verbs
    desc: Python RAT task verb cluster
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'shell[\s\S]{0,900}download[\s\S]{0,900}upload[\s\S]{0,900}execute[\s\S]{0,900}pivot'
  - id: python-shell-task-string
    desc: Python shell task string
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '["'']shell["'']'
  - id: python-download-task-string
    desc: Python download task string
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '["'']download["'']'
  - id: python-upload-task-string
    desc: Python upload task string
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '["'']upload["'']'
  - id: python-execute-task-string
    desc: Python execute task string
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '["'']execute["'']'
  - id: python-pivot-task-string
    desc: Python pivot task string
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '["'']pivot["'']'
  - id: python-payload-bin-path
    desc: Python staged payload path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/payload.bin
  - id: python-task-socket-pivot
    desc: Python task opens pivot socket
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'socket\.socket[\s\S]{0,180}\.connect\(\(target_host,\s*target_port\)\)'

composite_rules:
  - id: python-tasking-rat-dispatch
    desc: Python RAT tasking dispatch loop
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/infrastructure/tracking::c2-tasking-schema
      - id: objectives/command-and-control/beacon/network/json::result-base64-chunking
      - id: objectives/command-and-control/backdoor/rat/recon::proc-fs-walk-cmdline
    any:
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: objectives/execution/interpreter/eval/invoke::eval-call-python
      - id: micro-behaviors/process/hook/interception::sys-meta-path-mutation
    needs: 2
  - id: python-rat-action-cluster
    desc: Python RAT action cluster
    crit: component
    conf: 0.94
    any:
      - id: python-rat-task-verbs
      - id: python-shell-task-string
      - id: python-download-task-string
      - id: python-upload-task-string
      - id: python-execute-task-string
      - id: python-pivot-task-string
    needs: 3
  - id: python-http-tasking-rat
    desc: Python HTTP tasking RAT
    crit: hostile
    conf: 0.98
    all:
      - id: python-checkin-endpoint
      - id: python-result-endpoint
      - id: python-beacon-id-header
      - id: python-rat-action-cluster
    any:
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: python-payload-bin-path
      - id: python-task-socket-pivot
  - id: python-tasking-upload-channel
    desc: Python tasking upload channel
    crit: hostile
    conf: 0.96
    all:
      - id: python-http-tasking-rat
      - id: python-upload-endpoint
  - id: python-pyc-http-tasking-rat
    desc: Python bytecode HTTP tasking RAT
    crit: hostile
    conf: 0.96
    for: [pyc]
    all:
      - id: python-checkin-endpoint
      - id: python-result-endpoint
      - id: python-upload-endpoint
      - id: python-payload-bin-path
