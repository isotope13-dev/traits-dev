defaults:
  platforms: [unix, windows]
  for: [python, pyc]
  attack: T1071.001
  mbc: B0030

traits:
  - id: python-checkin-endpoint
    desc: Python C2 check-in endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/checkin
  - id: python-result-endpoint
    desc: Python C2 result endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/result
    unless:
    - id: metadata/package/testing/presence/harness::test-directory
  - id: python-beacon-id-header
    desc: Python X-Beacon-ID header
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: X-Beacon-ID
  - id: python-rat-task-verbs
    desc: Python RAT task verb cluster
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'shell[\s\S]{0,500}download[\s\S]{0,500}upload[\s\S]{0,500}execute[\s\S]{0,500}pivot'
  - id: python-payload-bin-path
    desc: Python staged payload path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/payload.bin
  - id: python-task-socket-pivot
    desc: Python task opens pivot socket
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'socket\.socket[\s\S]{0,180}\.connect\(\(target_host,\s*target_port\)\)'

  - id: python-remote-command-routing-protocol
    desc: Python remote command routing protocol
    crit: notable
    conf: 0.96
    if:
      type: text
      regex: 'RemoteCommandHandler|_process_command_request|"remote-command-result"'

  - id: python-file-transfer-protocol
    desc: Python remote file transfer protocol
    crit: notable
    conf: 0.96
    attack: T1105
    if:
      type: text
      regex: '["'']file-transfer["'']|\bfile_transfer\s*[:=(]'

  - id: python-file-transfer-mode
    desc: Python file transfer upload or download mode
    crit: notable
    conf: 0.94
    attack: T1105
    if:
      type: text
      regex: '["'']mode["'']\s*:\s*["''](upload|download)["'']'
  - id: python-signal-client-import
    desc: Python signal client import
    crit: notable
    conf: 0.94
    if:
      type: symbol
      kind: import
      exact: SignalClient
  - id: python-remote-command-handler-import
    desc: Python remote command handler import
    crit: notable
    conf: 0.96
    if:
      type: symbol
      kind: import
      exact: RemoteCommandHandler
  - id: python-send-command-call
    desc: Python remote send_command call
    crit: notable
    conf: 0.97
    attack: T1059.004
    if:
      type: symbol
      kind: call
      exact: sender.send_command
  - id: python-transfer-helper-import
    desc: Python remote transfer helper import
    crit: notable
    conf: 0.94
    attack: T1105
    if:
      type: symbol
      kind: import
      exact: transfer_utils.transfer

  - id: python-command-dispatch-handler-cluster
    desc: Python remote command handler cluster
    crit: notable
    conf: 0.98
    attack: T1059.006
    if:
      type: function
      regex: '^_handle_(command|exec|upload|download|info|ping|disconnect)$'
    count_min: 4

composite_rules:
  - id: python-tcp-rat-collection-suite
    desc: Python TCP RAT combines shell, file, screen, and host control
    crit: hostile
    conf: 0.995
    for: [whl, python-sdist]
    scope: archive
    attack: T1059.006,T1105,T1113,T1082
    all:
      - id: objectives/command-and-control/backdoor/rat/remote-agent::python-tcp-shell-command-agent
      - id: micro-behaviors/communications/socket/bind/address::bind-all-interfaces
      - id: micro-behaviors/communications/socket/connect::socket-accept-call
      - id: micro-behaviors/communications/http/upload::upload-file-method-call
      - id: micro-behaviors/communications/http/download/helper::download-file-method-call
      - id: micro-behaviors/hardware/display/screen::mss-screenshot
      - id: objectives/discovery/system/profile::python-device-host-profile-fields
  - id: python-unauthenticated-remote-control-rat
    desc: Unauthenticated Python RAT controls shell tunnel and user input
    crit: hostile
    conf: 0.99
    for: [whl, python-sdist]
    scope: archive
    all:
      - id: objectives/command-and-control/backdoor/shell/socket::python-websocket-remote-shell-server
      - id: objectives/command-and-control/backdoor/proxy/reverse::python-websocket-arbitrary-port-tunnel
      - id: micro-behaviors/hardware/input/synthesize::windows-sendinput-call
  - id: python-tasking-rat-dispatch
    desc: Python RAT tasking dispatch loop
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/infrastructure/tracking::c2-tasking-schema
      - id: objectives/command-and-control/beacon/network/json::result-base64-chunking
      - id: micro-behaviors/fs/proc/info/listing::python-proc-enumerate-cmdline
    any:
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: micro-behaviors/process/interpreter/python::eval-builtin
      - id: micro-behaviors/process/hook/interception::sys-meta-path-mutation
    needs: 2
  - id: python-http-tasking-rat
    desc: Python HTTP tasking RAT
    crit: hostile
    conf: 0.98
    all:
      - id: python-checkin-endpoint
      - id: python-result-endpoint
      - id: python-beacon-id-header
      - id: python-rat-task-verbs
    any:
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: python-payload-bin-path
      - id: python-task-socket-pivot
  - id: python-tasking-upload-channel
    desc: Python tasking upload channel
    crit: hostile
    conf: 0.96
    all:
      - id: python-http-tasking-rat
      - id: micro-behaviors/communications/http/endpoints::ingest-api-path
  - id: python-pyc-http-tasking-rat
    desc: Python bytecode HTTP tasking RAT
    crit: hostile
    conf: 0.96
    for: [pyc]
    all:
      - id: python-checkin-endpoint
      - id: python-result-endpoint
      - id: micro-behaviors/communications/http/endpoints::ingest-api-path
      - id: python-payload-bin-path

  - id: python-websocket-remote-shell-agent
    desc: Python WebSocket agent executes remote shell commands
    crit: hostile
    conf: 0.995
    for: [whl, python-sdist]
    scope: archive
    attack: T1059.004,T1059.006
    mbc: B0022
    all:
      - id: micro-behaviors/communications/websocket/library::python-websockets-client
      - id: python-remote-command-routing-protocol
      - id: micro-behaviors/process/create/subprocess::variable-command-shell-true

  - id: python-signal-remote-command-rat
    desc: Python signal agent routes commands through a remote handler
    crit: hostile
    conf: 0.99
    for: [whl, python-sdist]
    scope: archive
    attack: T1059.004,T1071.001
    mbc: B0022
    all:
      - id: python-signal-client-import
      - id: python-remote-command-handler-import
      - id: python-send-command-call
      - id: python-remote-command-routing-protocol

  - id: python-detached-encrypted-command-agent
    desc: Detached Python agent polls a public document service for encrypted shell tasks
    crit: hostile
    conf: 0.995
    for: [whl, python-sdist]
    scope: package
    attack: T1059.006,T1071.001,T1027
    mbc: B0022
    all:
      - id: python-command-dispatch-handler-cluster
      - id: objectives/command-and-control/infrastructure/paste::npoint
      - id: micro-behaviors/crypto/symmetric/aes/library::cryptography-aesgcm-api
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: micro-behaviors/process/daemonize/detach::python-fork-new-session
      - id: micro-behaviors/communications/http/post::python-httpclient-post-transport
