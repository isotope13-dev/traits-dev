defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
- id: socket-data-transfer-dup
  desc: Socket data transfer capability
  crit: suspicious
  conf: 0.6
  if:
    type: text
    substr: SocketReadAll
- id: command-execution
  desc: RAT shell-socket command execution marker
  crit: suspicious
  conf: 0.65
  if:
    type: text
    # Match the protocol marker as its own token.  A substring search also
    # fires on benign Rust completion tables containing "shellsocket".
    word: shellsoc
- id: script-exec
  desc: Script execution capability
  crit: suspicious
  conf: 0.65
  # `ScriptExecute` is also a benign language type/constructor name (e.g. Haskell
  # Stack's `data ScriptExecute`, C# ScriptExecute). Require the RAT command-token
  # form and exclude language symbol/type/import/export syntax so a source
  # identifier named ScriptExecute does not trip a RAT script-exec signal.
  if:
    type: text
    word: ScriptExecute
  not:
    - regex: \bdata\s+ScriptExecute\b
    - regex: ScriptExecute\s*\(\.\.\)
    - regex: '(import|module)\b[^\n]{0,80}ScriptExecute'
- id: server-component
  desc: RAT server component
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: Trojan[_\s]Server|Server[_\s]1\\.1
- id: rat-generic-cond-1--inline-15190
  desc: Regex component marker
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: network.mojom.
  count_max: 1015191
composite_rules:
- id: rat-generic
  desc: Remote Access Trojan behavior
  crit: suspicious
  conf: 0.8
  attack: T1219
  mbc: B0022
  all:
  - id: micro-behaviors/communications/socket/listen::socket-listen-api
  any:
  - id: command-execution
  - id: script-exec
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: rat-generic-cond-1--inline-15190
- id: rat-server
  desc: Remote Access Trojan server component
  crit: suspicious
  conf: 0.85
  attack: T1219
  mbc: B0022
  all:
  - id: micro-behaviors/communications/socket/listen::socket-listen-api
  - id: server-component
  any:
  - id: command-execution
  - id: script-exec
