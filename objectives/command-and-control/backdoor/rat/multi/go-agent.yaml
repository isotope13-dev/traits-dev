defaults:
  platforms: [linux]
  for: [elf]
  attack: T1059,T1090,T1105,T1070.004
  mbc: B0022

traits:
  - id: dispatcher-loop
    desc: Go agent dispatcher loop
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'Dispatcher\)\.Dispatch$'
  - id: dispatcher-exec-handler
    desc: Go agent remote execution handler
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'Dispatcher\)\.handle(Exec|MemExec|RawExec)$'
  - id: dispatcher-persistence-handler
    desc: Go agent persistence handler
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'Dispatcher\)\.handlePersistence$'
  - id: dispatcher-proxy-handler
    desc: Go agent SOCKS proxy handler
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'Dispatcher\)\.handle(ProxyStart|ProxyStop|SOCKS5)$'
  - id: dispatcher-self-destruct-handler
    desc: Go agent self-destruct handler
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'Dispatcher\)\.handleSelfDestruct$'
  - id: fileless-exec-handler
    desc: Go agent fileless execution handler
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'loader\.execFileless$'

composite_rules:
  - id: go-agent-command-set
    desc: Go agent remote-control command set
    crit: hostile
    conf: 0.99
    attack: T1059,T1090,T1543,T1070.004
    all:
      - id: dispatcher-loop
      - id: dispatcher-exec-handler
      - id: dispatcher-persistence-handler
      - id: dispatcher-proxy-handler
      - id: dispatcher-self-destruct-handler
