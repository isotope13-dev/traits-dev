defaults:
  platforms: [unix]
  for: [go, elf]
  attack: T1071.001
  mbc: B0030

traits:
  - id: go-commands-agent-endpoint
    desc: Go commands agent endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /commands?agent=
  - id: go-cmdresult-endpoint
    desc: Go command result endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /cmdresult
  - id: go-beacon-agent-endpoint
    desc: Go beacon agent endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /beacon?agent=
  - id: go-shell-c-command-exec
    desc: Go shell command execution helper
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'exec\.Command\("sh",\s*"-c",\s*command\)'
  - id: go-default-task-commands
    desc: Go default task command set
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'whoami[\s\S]{0,120}\bid\b[\s\S]{0,120}uname -a'

composite_rules:
  - id: go-http-shell-tasking-rat
    desc: Go HTTP shell tasking RAT
    crit: hostile
    conf: 0.98
    all:
      - id: go-commands-agent-endpoint
      - id: go-cmdresult-endpoint
      - id: go-beacon-agent-endpoint
    any:
      - id: go-shell-c-command-exec
      - id: go-default-task-commands
  - id: go-compiled-http-tasking-rat
    desc: Go compiled HTTP tasking RAT
    crit: hostile
    conf: 0.95
    for: [elf]
    all:
      - id: go-commands-agent-endpoint
      - id: go-cmdresult-endpoint
      - id: go-default-task-commands
