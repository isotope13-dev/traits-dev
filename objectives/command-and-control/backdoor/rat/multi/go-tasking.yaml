defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105,T1059.003,T1071.001
  mbc: B0030
traits:
  - id: read-file-token
    desc: RAT read file task token
    crit: component
    conf: 0.98
    if:
      type: text
      exact: read_fil
  - id: send-email-token
    desc: RAT send email task token
    crit: component
    conf: 0.98
    if:
      type: text
      exact: send_ema
  - id: create-file-token
    desc: RAT create file task token
    crit: component
    conf: 0.98
    if:
      type: text
      exact: create_ff
  - id: delete-file-token
    desc: RAT delete file task token
    crit: component
    conf: 0.98
    if:
      type: text
      exact: delete_f
  - id: run-command-token
    desc: RAT run command task token
    crit: notable
    conf: 0.98
    if:
      type: text
      exact: run_comm
  - id: close-process-token
    desc: RAT close process task token
    crit: component
    conf: 0.98
    if:
      type: text
      exact: close_pr
  - id: backup-drive-token
    desc: RAT backup drive task token
    crit: component
    conf: 0.98
    if:
      type: text
      exact: backup_d
  - id: list-directory-token
    desc: RAT list directory task token
    crit: component
    conf: 0.98
    if:
      type: text
      exact: list_dirf
  - id: system-profile-token
    desc: RAT system profile task token
    crit: component
    conf: 0.98
    if:
      type: text
      exact: get_systf
composite_rules:
  - id: go-rat-tasking-roster
    desc: Windows Go RAT tasking roster
    crit: hostile
    conf: 0.99
    needs: 5
    any:
      - id: read-file-token
      - id: send-email-token
      - id: create-file-token
      - id: delete-file-token
      - id: run-command-token
      - id: close-process-token
      - id: backup-drive-token
      - id: list-directory-token
      - id: system-profile-token
