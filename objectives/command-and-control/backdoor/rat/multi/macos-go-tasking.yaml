defaults:
  platforms: [macos]
  for: [macho]
  attack: T1071.001,T1059.004,T1105
  mbc: B0030
composite_rules:
  - id: macos-go-rat-json-tasking
    desc: macOS Go RAT JSON tasking
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: objectives/command-and-control/backdoor/tasking/filesystem::c2-file-tasking-channel
      - id: objectives/command-and-control/backdoor/tasking/filesystem::c2-task-state-fields
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
    any:
      - id: micro-behaviors/communications/http/request/client::auth-header-dup
      - id: micro-behaviors/communications/http/lib/nsurlsession::content-type-json
  - id: macos-go-rat-host-profile-tasking
    desc: macOS Go RAT host profiling
    crit: hostile
    conf: 0.98
    attack: T1071.001,T1082,T1105
    all:
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: objectives/command-and-control/backdoor/tasking/filesystem::c2-file-tasking-channel
      - id: objectives/discovery/system/fingerprint/machine-id::macos-command-host-fingerprint
      - id: objectives/discovery/network/scan/external::external-recon-service
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
  - id: macos-go-rat-persistent-tasking
    desc: macOS Go RAT persistent tasking
    crit: hostile
    conf: 0.98
    attack: T1543.001,T1546.004,T1071.001
    all:
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: objectives/command-and-control/backdoor/tasking/filesystem::c2-file-tasking-channel
      - id: objectives/persistence/system/launchd::launchctl-submit-command
    any:
      - id: objectives/persistence/system/launchd::launchd
      - id: objectives/persistence/system/launchd::launchctl-submit-zsh
      - id: objectives/persistence/system/launchd::launchctl-submit-profiler
      - id: objectives/evasion/masquerade/binary::launchagents-fake-apple
  - id: macos-go-rat-vm-gated-tasking
    desc: macOS Go RAT VM-gated tasking
    crit: hostile
    conf: 0.98
    attack: T1497.001,T1071.001,T1105
    all:
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: objectives/command-and-control/backdoor/tasking/filesystem::c2-file-tasking-channel
      - id: objectives/anti-analysis/vm-detect/artifact::macos-vm-hardware-check
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
  - id: macos-go-rat-encrypted-config
    desc: macOS Go RAT encrypted config
    crit: hostile
    conf: 0.98
    attack: T1573,T1071.001,T1105
    all:
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: objectives/command-and-control/backdoor/tasking/filesystem::c2-file-tasking-channel
      - id: micro-behaviors/crypto/symmetric/aes/payload::json-ciphertext-iv-fields
    any:
      - id: micro-behaviors/crypto/symmetric/aes/library::go-new-cipher-string
      - id: micro-behaviors/crypto/symmetric/aes/library::go-cbc-mode-string
  - id: macos-go-rat-aes-tasking
    desc: macOS Go RAT AES tasking
    crit: hostile
    conf: 0.97
    attack: T1573,T1071.001,T1105
    all:
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: objectives/command-and-control/backdoor/tasking/filesystem::c2-file-tasking-channel
      - id: micro-behaviors/crypto/symmetric/aes/library::go-cbc-mode-string
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
