defaults:
  for:
    - php
  platforms:
    - unix
    - windows
traits:
  - id: shell-interactive
    desc: Interactive shell shell spawn
    crit: suspicious
    conf: 0.9
    attack: T1059.004
    if:
      type: string_literal
      regex: shell\s+-i
  - id: socket-to-proc-descriptor
    desc: Socket used as process descriptor
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: string_literal
      regex: array\s*\(\s*\$socket\s*,\s*\$socket\s*,\s*\$socket\s*\)
  - id: kworker-masquerade
    desc: Masquerade as kernel worker thread
    crit: suspicious
    conf: 0.95
    mbc: F0004
    attack: T1036.004
    if:
      type: string_literal
      regex: \[kworker/
  - id: while-true-loop
    desc: Infinite loop (C2 beacon pattern)
    crit: suspicious
    conf: 0.5
    if:
      type: string_literal
      regex: while\s*\(\s*1\s*\)|while\s*\(\s*true\s*\)
      case_insensitive: true
    not:
      - regex: while\s*\(\s*true\s*\)[\s\S]{0,160}if\s*\(\s*done\s*\)\s*break
    unless:
      - id: metadata/library/web-frameworks::service-worker-stream-drain-loop
      - id: well-known/app/zealphp/
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
  - id: file-get-contents-url-dup
    desc: HTTP fetch content
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: file_get_contents\s*\([^)]{0,120}https?://
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: well-known/lib/benign-runtime-bundles::php-runtime-package
  - id: com-wscript-shell
    desc: WScript.Shell via PHP COM object
    crit: suspicious
    conf: 0.9
    attack: T1059
    platforms:
      - windows
    if:
      type: string_literal
      exact: WScript.shell
composite_rules:
  - id: reverse-shell-socket
    desc: PHP reverse shell via socket
    crit: hostile
    conf: 0.95
    attack: T1059.004
    mbc: B0033 - php
    all:
      - id: micro-behaviors/communications/socket/connect::php-stream-socket-client
      - id: micro-behaviors/process/create/shell/interactive::sh-interactive
  - id: rat-masquerading
    desc: PHP RAT with process masquerading
    crit: hostile
    conf: 0.95
    attack: T1219
    mbc: B0022 - php
    all:
      - id: micro-behaviors/process/control/signal::cli-set-process-title
      - id: micro-behaviors/process/control/signal::posix-setsid
      - id: micro-behaviors/communications/socket/connect::php-stream-socket-client
  - id: rat-remote-eval
    desc: PHP RAT with remote code execution
    crit: hostile
    conf: 0.95
    attack: T1219
    mbc: B0022 - php
    all:
      - id: objectives/anti-static/obfuscation/encoding/
      - id: micro-behaviors/communications/socket/connect::php-stream-socket-client
    any:
      - id: micro-behaviors/process/create/shell/
      - id: objectives/evasion/security-bypass/runtime::function-exists-exec
    unless:
      - id: micro-behaviors/communications/socket/connect::localhost-socket-uri
      - id: metadata/package/testing/harness/unit::php-test-runner
  - id: rat-file-operations
    desc: PHP RAT with file transfer capabilities
    crit: suspicious
    conf: 0.9
    attack: T1219 - php
    all:
      - id: micro-behaviors/communications/socket/connect::php-stream-socket-client
      - id: micro-behaviors/fs/read/file/
    any:
      - id: micro-behaviors/fs/write/file/
      - id: objectives/anti-static/obfuscation/encoding/
    unless:
      - id: micro-behaviors/communications/socket/connect::localhost-socket-uri
      - id: metadata/package/testing/harness/unit::php-test-runner
  - id: rat-full
    desc: Full PHP RAT implementation
    crit: hostile
    conf: 0.98
    attack: T1219
    mbc: B0022 - php
    all:
      - id: micro-behaviors/communications/socket/connect::php-stream-socket-client
      - id: objectives/anti-static/obfuscation/encoding/
      - id: micro-behaviors/process/create/shell/
    any:
      - id: kworker-masquerade
      - id: micro-behaviors/process/control/signal::cli-set-process-title
      - id: micro-behaviors/process/control/signal::posix-setsid
  - id: multi-method-exec
    desc: Multi-method command execution fallback
    crit: suspicious
    conf: 0.9
    attack: T1059 - php
    needs: 3
    any:
      - id: micro-behaviors/process/create/shell/
      - id: objectives/evasion/security-bypass/runtime::function-exists-exec
      - id: socket-to-proc-descriptor
  - id: rat-com-shell
    desc: PHP RAT with Windows COM shell
    crit: hostile
    conf: 0.95
    attack: T1059
    mbc: B0022 - php
    all:
      - id: com-wscript-shell
      - id: micro-behaviors/communications/socket/connect::php-stream-socket-client
  - id: rat-socket-c2
    desc: PHP RAT with hardcoded C2 endpoints
    crit: suspicious
    conf: 0.9
    attack: T1071 - php
    all:
      - id: micro-behaviors/communications/socket/connect::php-stream-socket-client
    any:
      - id: micro-behaviors/communications/socket/uri::tcp-socket-uri
      - id: micro-behaviors/communications/socket/uri::udp-socket-uri
    unless:
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
      - id: micro-behaviors/communications/socket/connect::localhost-socket-uri
      - id: metadata/package/testing/harness/unit::php-test-runner
