defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: rsa-public-key
    desc: RSA public key embedded
    crit: suspicious
    conf: 0.85
    attack: T1059
    if:
      type: string_literal
      regex: 'BEGIN (RSA )?PUBLIC KEY'
  - id: cookie-session-extract
    desc: Cookie session extraction
    crit: suspicious
    conf: 0.8
    attack: T1190
    if:
      type: string_literal
      regex: __session|HTTP_COOKIE.{0,50}match
  - id: json-parse
    desc: Ruby parses JSON command data
    crit: suspicious
    conf: 0.8
    attack: T1190
    unless:
      - id: metadata/package/files::ruby-vendor-bundle-gem-path
      - type: text
        substr: "module RuboCop"
    if:
      type: string_literal
      regex: JSON\.parse
  - id: timestamp-validation
    desc: Timestamp validation check
    crit: component
    conf: 0.75
    attack: T1070
    if:
      type: string_literal
      regex: Time\.now|timestamp|to_i
  - id: faraday-http
    desc: Faraday HTTP client
    crit: suspicious
    conf: 0.7
    attack: T1071
    if:
      type: string_literal
      regex: Faraday\.(post|get|request)
  - id: thread-background
    desc: Background thread execution
    crit: suspicious
    conf: 0.8
    attack: T1059
    if:
      type: string_literal
      regex: Thread\.new|Thread\.start
  - id: remote-code-download
    desc: Download code from remote URL
    crit: suspicious
    conf: 0.9
    attack: T1059
    if:
      type: string_literal
      regex: open\(.{0,50}https?.{0,50}\)\.read|pastebin|raw\.github
  - id: rails-env-check
    desc: Rails environment check
    crit: suspicious
    conf: 0.7
    attack: T1190
    unless:
      - id: metadata/package/files::ruby-vendor-bundle-gem-path
      - type: text
        substr: "module RuboCop"
    if:
      type: string_literal
      regex: Rails\.env|Rails\.env\[0\]
  - id: exception-swallow-func
    desc: Exception swallowing function
    crit: suspicious
    conf: 0.75
    attack: T1070
    if:
      type: string_literal
      regex: def _!|rescue Exception.{0,50}nil|begin.{0,50}yield.{0,50}rescue
composite_rules:
  - id: signed-cookie-backdoor
    desc: Signed cookie backdoor with RSA verification
    crit: suspicious
    conf: 0.95
    attack: T1059
    needs: 4
    any:
      - id: rsa-public-key
      - id: cookie-session-extract
      - id: micro-behaviors/crypto/certificate/usage::signature-verify
      - id: json-parse
      - id: timestamp-validation
      - id: objectives/command-and-control/backdoor/webshell/intercept::rack-sendfile-hook
  - id: remote-code-execution
    desc: Remote code execution via download
    crit: suspicious
    conf: 0.94
    attack: T1059
    needs: 4
    any:
      - id: thread-background
      - id: micro-behaviors/time/sleep/interval::ruby-sleep-call
      - id: remote-code-download
      - id: rails-env-check
      - id: micro-behaviors/process/interpreter/eval::ruby-eval
  - id: remote-eval-backdoor
    desc: Eval of code downloaded from a URL (backdoor)
    crit: hostile
    conf: 0.96
    attack: T1059
    # `eval(open('http…').read)` is the rest-client/strong_password-style
    # supply-chain backdoor: runtime eval of code fetched from a URL has no
    # legitimate use. The anchor is the download-and-eval primitive; a second
    # leg (background-thread persistence, a production-env gate, or an explicit
    # remote-code-download string) confirms a deliberate planted backdoor.
    all:
      - id: micro-behaviors/process/interpreter/eval::eval-remote-fetch
    any:
      - id: thread-background
      - id: rails-env-check
      - id: remote-code-download
