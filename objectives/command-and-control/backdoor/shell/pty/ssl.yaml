# SSL PTY Backdoor
# Detects interactive PTY shells over SSL
# MBC: B0022 (Backdoor)
# ATT&CK: T1059
defaults:
  platforms: [linux, unix, android, macos, ios]
  mbc: "B0022"
  attack: "T1059"
composite_rules:
  # SSL PTY Backdoor
  # Complexity: all(3) = 3 >= 2 SUSPICIOUS
  - id: ssl-pty-backdoor
    desc: Interactive PTY shell over SSL connection
    crit: suspicious
    conf: 0.9
    for: [elf, macho]
    all:
      - id: micro-behaviors/process/tty/pty::interactive-shell
      - id: micro-behaviors/process/create/shell/
    any:
      - id: micro-behaviors/communications/socket/ssl::openssl-ssl-functions
    unless:
      - id: micro-behaviors/dylib/library/family/
      - id: micro-behaviors/dylib/library/family/
