defaults:
  platforms: [linux, macos]
  mbc: "B0022"
  attack: "T1059"
  for: [elf, macho]
composite_rules:
  - id: go-pty-backdoor
    desc: Interactive PTY shell in Go binary
    crit: notable
    conf: 0.8
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: micro-behaviors/process/tty/pty::go-creack-pty
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
  - id: go-ssh-pty-command-backdoor
    desc: Go SSH server exposes PTY-backed remote command execution
    crit: hostile
    conf: 0.99
    attack: "T1021.004,T1059"
    all:
      - id: metadata/lang/compiler/systems::go-binary
      - id: micro-behaviors/communications/ssh/server::go-ssh-server-implementation
      - id: micro-behaviors/communications/ssh/server::go-ssh-session-handler
      - id: micro-behaviors/communications/ssh/server::go-ssh-open-client-policy
      - id: micro-behaviors/process/tty/pty::go-creack-pty
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
