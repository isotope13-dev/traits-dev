defaults:
  for: [source]
  platforms:
    - unix
    - windows
traits:
  - id: webshell-ref
    desc: Web shell terminology reference
    crit: suspicious
    conf: 0.9
    attack: T1505.003
    if:
      type: text
      regex: w[3e]b[_\s]*sh[e3]ll
      case_insensitive: true
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
  - id: fd-redirect-socket
    desc: 'File descriptor redirection to socket'
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: '[0-9]+<>\s*/dev/(tcp|udp)/'
    unless:
      - type: text
        substr: 'timeout 3 bash -c "exec 3<>/dev/tcp/'
      - id: well-known/app/openai-codex/
  - id: stdin-redirect-dup
    # Standalone `0>&1` is a 4-character bash redirection idiom that appears
    # in documentation, scanner pattern databases, shell tutorials, and any
    # discussion of file descriptors. Only meaningful when paired with other
    # reverse-shell evidence — see the composite at
    # objectives/command-and-control/reverse-shell/dup/sh.yaml which
    # consumes it alongside socket/exec primitives.
    desc: Stdin redirection (reverse shell indicator)
    crit: component
    conf: 0.7
    attack: T1059
    for: [scripts]
    if:
      type: text
      substr: 0>&1
  - id: reverse-tcp
    desc: Reverse TCP indicator
    crit: suspicious
    conf: 0.3
    if:
      type: text
      regex: (?i)reverse[-_]?(tcp)
    unless:
      - id: well-known/lib/wine::wine-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
  - id: reverse-shell
    desc: Reverse shell keyword
    crit: component
    conf: 0.3
    if:
      type: text
      regex: (?i)reverse[-_]?(shell)
  - id: reverse-backdoor
    desc: Reverse backdoor reference
    crit: suspicious
    conf: 0.3
    if:
      type: text
      regex: (?i)reverse[-_]?(backdoor)
  - id: ruby-tcpsocket-spawn
    desc: Ruby TCPSocket with spawn (reverse
    crit: suspicious
    conf: 0.9
    attack: T1059.006
    for:
      - ruby
    if:
      type: string_literal
      regex: spawn\(["']/bin/sh["'],.{0,64}TCPSocket
  - id: ruby-tcpsocket-popen
    desc: Ruby TCPSocket with popen (reverse
    crit: suspicious
    conf: 0.9
    attack: T1059.006
    for:
      - ruby
    if:
      type: string_literal
      regex: TCPSocket.{0,64}\.gets.{0,64}IO.popen
  - id: go-child-stdin
    desc: Go exec.Cmd.childStdin
    crit: component
    conf: 0.7
    for: [go]
    if:
      type: text
      substr: os/exec.(*Cmd).childStdin
composite_rules:
  - id: perl-socket-open
    desc: Perl socket with open (reverse
    crit: suspicious
    conf: 0.8
    attack: T1059.006
    mbc: B0022
    for:
      - perl
    all:
      - id: micro-behaviors/communications/socket/create::socket-call
      - id: micro-behaviors/communications/socket/create::open-call
      - id: micro-behaviors/communications/socket/create::fd-redirect
      - id: micro-behaviors/process/create/shell/interactive::sh-interactive
  - id: mkfifo-netcat-shell
    desc: Reverse shell via mkfifo and
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    mbc: B0022
    platforms:
      - unix
    for:
      - shell
    all:
      - id: micro-behaviors/fs/pipe/fifo::mkfifo-cmd
      - id: micro-behaviors/process/create/shell/interactive::sh-interactive
      - id: micro-behaviors/communications/socket/netcat::nc-pipe
  - id: go-reverse-shell
    desc: Go reverse shell pattern
    crit: suspicious
    conf: 0.9
    attack: T1059
    mbc: B0022
    any:
      - id: micro-behaviors/process/create/shell/spawn::bin-shell
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
    all:
      - id: micro-behaviors/process/create/shell/lang::exec-cmd-run
      - id: go-child-stdin
      - id: micro-behaviors/communications/socket/connect::dial-tcp
  - id: reverse-keyword
    desc: Reverse keyword reference
    crit: suspicious
    conf: 0.3
    any:
      - id: micro-behaviors/communications/proxy/reverse::reverse-connection-term
      - id: reverse-tcp
      - id: reverse-shell
      - id: reverse-backdoor
      - id: micro-behaviors/communications/proxy/tunnel::reverse-tunnel-term
  - id: generic-reverse-shell
    desc: Generic reverse shell pattern (socket
    crit: suspicious
    conf: 0.8
    attack: T1059
    all:
      - id: reverse-keyword
      - id: micro-behaviors/communications/socket/listen::socket-sym
    any:
      - id: micro-behaviors/process/create/shell/spawn::bin-shell
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
