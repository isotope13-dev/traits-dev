# Persistent IoT shell exposed through Telnet and a reverse tunnel.
defaults:
  platforms: [linux, unix]
  for: [shell]
  attack: T1059.004,T1090,T1053.003
  mbc: B0030,C0002

composite_rules:
  - id: persistent-telnet-reverse-shell
    desc: Persistent Telnet shell with reverse tunnel and root cron
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/os/service/daemon::telnetd
      - id: micro-behaviors/communications/proxy/tunnel::reverse-tunnel-term
      - id: micro-behaviors/fs/path/config/system::root-crontab-spool-path
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
