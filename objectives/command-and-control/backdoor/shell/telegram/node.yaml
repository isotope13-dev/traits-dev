defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059
  mbc: C0017
composite_rules:
  - id: node-telegram-remote-shell-backdoor
    desc: Node Telegram remote shell backdoor
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/channel/messaging::node-telegram-hardcoded-shell-c2
      - id: objectives/command-and-control/channel/messaging::telegram-file-command-vocab
      - id: objectives/command-and-control/channel/messaging::telegram-process-command-vocab
    any:
      - id: micro-behaviors/process/create/shell/invoke::bash-exec
      - id: micro-behaviors/process/create/shell/invoke::bash-keyword
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
