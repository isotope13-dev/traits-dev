# Simple POSIX Backdoor Logic
# Detects minimal bind shells that use socket+bind+dup2+shell-launch pattern
defaults:
  platforms: [linux, unix, macos]
  for: [elf, macho, c, cpp]
  crit: hostile
  conf: 0.9
  attack: "T1059.004"
  mbc: "B0022"

composite_rules:
  - id: posix-bind-shell-source
    desc: C source bind shell (bind+dup2+shell)
    for: [c, cpp]
    all:
      - id: micro-behaviors/communications/socket/bind/function::bind
      - id: micro-behaviors/communications/socket/listen::listen
      - id: micro-behaviors/process/fd/dup::dup2
    any:
      - id: micro-behaviors/process/create/shell/spawn::system-fn
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
      - id: objectives/command-and-control/reverse-shell/dup::c-source-shell-path
