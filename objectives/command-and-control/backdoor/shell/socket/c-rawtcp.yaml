defaults:
  platforms: [unix]
  for: [c]
  attack: "T1059.004,T1095,T1205"
traits:
  - id: rawtcp-c2-protocol
    desc: RawTCP C2 protocol constants
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bCC_PROT_(SYN|ACK|MSG|FIN)'
    count_min: 3
  - id: remote-request-log
    desc: Remote command request logging
    crit: component
    conf: 0.75
    if:
      type: string_literal
      exact: "Received request: %s"
  - id: command-result-log
    desc: Command result logging
    crit: component
    conf: 0.75
    if:
      type: string_literal
      exact: "RESULT OF COMMAND: %s"
composite_rules:
  - id: rawtcp-command-backdoor
    desc: RawTCP remote command backdoor
    crit: hostile
    conf: 0.98
    mbc: B0022
    all:
      - id: micro-behaviors/communications/socket/raw::rawtcp-sniff-and-send
      - id: micro-behaviors/process/create/shell/spawn::c-popen-call
    any:
      - id: rawtcp-c2-protocol
      - id: remote-request-log
      - id: command-result-log
