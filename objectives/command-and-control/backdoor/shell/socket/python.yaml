defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
- id: listen-socket
  desc: Socket listening capability
  crit: suspicious
  conf: 0.7
  if:
    type: text
    word: SocketListen
  unless:
  - type: text
    substr: network.mojom.
- id: socket-data-transfer-dup
  desc: Socket data transfer capability
  crit: suspicious
  conf: 0.6
  if:
    type: text
    substr: SocketReadAll
- id: command-execution
  desc: Command execution capability
  crit: suspicious
  conf: 0.65
  if:
    type: text
    substr: shellsoc
- id: script-exec
  desc: Script execution capability
  crit: suspicious
  conf: 0.65
  if:
    type: text
    word: ScriptExecute
- id: server-component
  desc: RAT server component
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: Trojan[_\s]Server|Server[_\s]1\\.1
- id: python-bind-call
  desc: Python socket bind call
  crit: component
  conf: 0.8
  for: [python]
  if:
    type: text
    substr: ".bind(("
- id: python-listen-call
  desc: Python socket listen call
  crit: component
  conf: 0.75
  for: [python]
  if:
    type: text
    substr: ".listen("
- id: python-connect-call
  desc: Python socket connect call
  crit: component
  conf: 0.8
  for: [python]
  if:
    type: text
    substr: ".connect(("
- id: python-recv-call--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  for: [python]
  if:
    type: text
    substr: client
  count_max: 1015185
- id: python-recv-call--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  for: [python]
  if:
    type: text
    substr: socket
  count_max: 1015186
- id: python-recv-call--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.75
  for: [python]
  if:
    type: text
    substr: conn
  count_max: 1015187
- id: python-recv-call--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.75
  for: [python]
  if:
    type: text
    substr: recv
  count_max: 1015188
- id: python-send-output
  desc: Python socket send encoded command output
  crit: suspicious
  conf: 0.9
  for: [python]
  if:
    type: text
    regex: \.(send|sendall)\(.{0,40}(stdout|output).{0,20}\.encode
- id: python-env-trigger-secret
  desc: Secret env trigger for backdoor activation
  crit: suspicious
  conf: 0.88
  for: [python]
  if:
    type: text
    regex: os\.environ\.get\(["'](SECRET|TRIGGER)[A-Z0-9_]*["']\)
- id: rat-generic-cond-1--inline-15190
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: network.mojom.
  count_max: 1015191
composite_rules:
- id: rat-generic
  desc: Remote Access Trojan behavior
  crit: suspicious
  conf: 0.8
  attack: T1219
  mbc: B0022
  all:
  - id: listen-socket
  any:
  - id: command-execution
  - id: script-exec
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: rat-generic-cond-1--inline-15190
- id: rat-server
  desc: Remote Access Trojan server component
  crit: suspicious
  conf: 0.85
  attack: T1219
  mbc: B0022
  all:
  - id: listen-socket
  - id: server-component
  any:
  - id: command-execution
  - id: script-exec
- id: python-bind-shell-command-channel
  desc: Python bind shell command channel
  crit: hostile
  conf: 0.97
  attack: T1059.006
  mbc: B0022
  for: [python]
  near_lines: 30
  all:
  - id: python-bind-call
  - id: python-listen-call
  - id: micro-behaviors/communications/socket/connect::socket-accept-call
  - id: python-recv-call
  - id: micro-behaviors/process/create/subprocess::process-execution
  any:
  - id: python-send-output
  - id: micro-behaviors/communications/socket/bind::bind-all-interfaces
  - id: micro-behaviors/process/create/thread::python-daemon-thread
- id: python-env-triggered-reverse-shell
  desc: Python env-triggered reverse shell
  crit: hostile
  conf: 0.96
  attack: T1059.006
  mbc: B0022
  for: [python]
  near_lines: 35
  all:
  - id: python-connect-call
  - id: python-recv-call
  - id: micro-behaviors/process/create/subprocess::process-execution
  - id: python-env-trigger-secret
  any:
  - id: python-send-output
  - id: micro-behaviors/os/env/access::os-environ-symbol
- id: python-recv-call
  desc: Python socket recv call
  crit: component
  conf: 0.75
  for: [python]
  any:
  - id: python-recv-call--rx-1
  - id: python-recv-call--rx-2
  - id: python-recv-call--rx-3
  - id: python-recv-call--rx-4
