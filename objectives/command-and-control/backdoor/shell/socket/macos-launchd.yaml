# macOS Native C2 Agent — curl + osascript + codesign resign + C2 protocol
# Detects a compiled macOS C2 agent that drops payloads to /private/tmp, re-signs
# them ad-hoc with codesign to satisfy Gatekeeper, and executes AppleScript via
# osascript. Combined with a legacy IE8 User-Agent and standard C2 JSON protocol.
# Also detects nlohmann::json embedded C++ library (toolchain fingerprint) and
# POSIX ps process enumeration, both present in the axios/NukeSped Mach-O.
# ATT&CK: T1071.001 (HTTP), T1059.002 (AppleScript), T1553.001 (Code Signing)
defaults:
  platforms:
  - macos
  for:
  - macho
  attack: T1071.001
composite_rules:
- id: macos-bind-shell-launchd-backdoor
  desc: macOS bind shell with launchd persistence
  crit: hostile
  conf: 0.96
  attack: T1059,T1547
  mbc: B0030.003
  all:
  - id: micro-behaviors/communications/socket/bind/function::bind
  - id: micro-behaviors/communications/socket/listen::listen
  - id: micro-behaviors/communications/socket/listen::accept-sym
  - id: micro-behaviors/process/create/shell/invoke::system-fn
  - id: objectives/persistence/system/launchd::launchd
  any:
  - id: micro-behaviors/process/tty/pty::tcgetattr
  - id: micro-behaviors/process/create/popen::c-popen
  - id: objectives/discovery/network/scan/external::external-recon-service
  - id: micro-behaviors/process/create/execv::c-exec-variants
  unless:
  - id: metadata/signed/platform::apple
  - id: micro-behaviors/dylib/library/app::terminal-editor-marker
  - id: micro-behaviors/dylib/library/family::debugger-tool-marker
  - id: metadata/binary/framework::terminal-emulator
- id: macos-pty-socket-shell-backdoor
  desc: macOS PTY socket shell backdoor
  crit: hostile
  conf: 0.98
  attack: T1059,T1071
  mbc: B0009,C0001
  all:
  - id: micro-behaviors/process/tty/pty::openpty-call
  - id: micro-behaviors/process/create/execv::c-exec-variants
  - id: micro-behaviors/process/fork/clone::fork
  - id: micro-behaviors/process/fd/dup::dup2
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/communications/socket/send::send-symbol
  - id: micro-behaviors/communications/socket/receive::recv-symbol
  unless:
  - id: micro-behaviors/dylib/library/app::terminal-editor-marker
  - id: micro-behaviors/dylib/library/family::debugger-tool-marker
  - id: metadata/binary/framework::terminal-emulator
  - id: micro-behaviors/communications/ssh/client::libssh
  - id: micro-behaviors/communications/ssh/client::ssh-version
  - id: micro-behaviors/communications/ssh/client::ssh-userauth
