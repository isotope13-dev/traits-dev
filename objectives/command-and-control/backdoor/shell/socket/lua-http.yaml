defaults:
  platforms: [unix, openwrt]
  for: [lua]
  attack: T1059
  mbc: B0022

traits:
  - id: lua-c2-command-loop-label
    desc: Lua C2 command loop label
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: execute_c2_commands
  - id: lua-c2-exec-result-label
    desc: Lua C2 exec result label
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: exec_result

composite_rules:
  - id: lua-http-socket-command-loop
    desc: Lua HTTP socket command loop
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/connect::lua-tcp-connect
      - id: micro-behaviors/process/create/shell/invoke::lua-io-popen
    any:
      - id: lua-c2-command-loop-label
      - id: lua-c2-exec-result-label
      - id: micro-behaviors/communications/http/post::post-request-line
    needs: 2
