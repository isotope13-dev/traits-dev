defaults:
  platforms: [unix, fortios]
  for: [perl]
  attack: T1059

traits:
  - id: perl-iosocket-listener
    desc: Perl IO::Socket listener
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'IO::Socket::INET->new\([\s\S]{0,180}LocalPort[\s\S]{0,120}Listen'
    unless:
      - id: well-known/app/openssl/
      - id: metadata/package/files/system-package::os-vendored-perl-module

  - id: perl-backdoor-command-dispatch
    desc: Perl backdoor command dispatch
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\$cmd =~ /\^exec\\s\+\(\.\+\)\$/i[\s\S]{0,260}`\$1 2>&1`'

composite_rules:
  - id: perl-socket-command-backdoor
    desc: Perl socket command backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: perl-iosocket-listener
      - id: perl-backdoor-command-dispatch
