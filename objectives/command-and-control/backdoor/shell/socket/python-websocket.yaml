defaults:
  platforms: [windows, unix]
  for: [python, whl, python-sdist]
  attack: T1059.006
  mbc: B0022

composite_rules:
  - id: python-websocket-remote-shell-server
    desc: WebSocket server exposes interactive remote shell
    crit: hostile
    conf: 0.98
    for: [whl, python-sdist]
    scope: archive
    all:
      - id: micro-behaviors/communications/websocket/server::websockets-asyncio-serve-call
      - id: micro-behaviors/communications/socket/bind/address::bind-all-interfaces
      - id: micro-behaviors/process/create/subprocess::asyncio-create-subprocess-exec
      - id: micro-behaviors/process/create/shell/interactive::python-shell-session-dispatch
      - id: micro-behaviors/communications/http/server/auth::python-empty-auth-remote-agent
