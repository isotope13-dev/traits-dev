defaults:
  for: [c]
  platforms: [linux, unix]

composite_rules:
  - id: ebpf-port-knock-credential-backdoor
    desc: Port-knock eBPF credential backdoor
    crit: suspicious
    conf: 0.99
    attack: T1205
    all:
      - id: micro-behaviors/os/bpf/program/maps::trigger-ports-map
      - id: micro-behaviors/os/bpf/program/maps::map-max-entries-8
      - id: micro-behaviors/os/bpf/program/maps::auth-elem-map
      - id: micro-behaviors/os/bpf/program/maps::files-elem-map
    any:
      - id: micro-behaviors/os/bpf/program/maps::map-key-ushort
      - id: micro-behaviors/os/bpf/program/maps::bpf-map-hash
