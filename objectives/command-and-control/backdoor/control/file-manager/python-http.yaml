defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1219
  mbc: B0022

traits:
  - id: python-remote-admin-user-control
    desc: Python remote user control
    crit: notable
    conf: 0.9
    ref: sha256:a978ee4e489697d548b6eb4922c592307a9a38c7ad778bb0c8598fb3739c56db
    count_min: 4
    if:
      type: text
      regex: '\bdef\s+(get_users|add_user|change_user|remove_user|update_config|get_config)\s*\('

composite_rules:
  - id: python-http-remote-file-manager-control
    desc: Python HTTP remote file manager control
    crit: hostile
    conf: 0.98
    ref: sha256:a978ee4e489697d548b6eb4922c592307a9a38c7ad778bb0c8598fb3739c56db
    all:
      - id: micro-behaviors/communications/http/auth::python-authenticated-session-client
      - id: micro-behaviors/communications/http/endpoints::rest-file-manager-endpoint-matrix
      - id: micro-behaviors/fs/file/read-write::python-remote-file-manager-functions
    any:
      - id: python-remote-admin-user-control
      - id: micro-behaviors/communications/http/endpoints::rest-admin-config-user-endpoints
    needs: 1
