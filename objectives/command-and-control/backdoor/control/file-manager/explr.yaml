defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1219
  mbc: B0022

traits:
  - id: explr-pdb
    desc: Explr server PDB marker
    crit: component
    conf: 0.98
    if:
      type: value
      path: pe.debug.pdb.path
      exact: explr_server.pdb

  - id: explr-server-banner
    desc: Explr web server banner
    crit: component
    conf: 0.98
    if:
      type: hex
      pattern: "45 78 70 6C 72 20 57 65 62 20 53 65 72 76 65 72"
      section: .rdata

  - id: explr-api-invoke-route
    desc: Explr invoke API route
    crit: component
    conf: 0.96
    if:
      type: text
      substr: /api/invoke

  - id: explr-api-download-route
    desc: Explr download API route
    crit: component
    conf: 0.96
    if:
      id: micro-behaviors/communications/http/download/handler::api-download-route

  - id: explr-ui-auth-env
    desc: Explr UI auth token env
    crit: component
    conf: 0.95
    if:
      type: text
      substr: EXPLR_UIAUTH_TOKEN

  - id: explr-public-host-hint
    desc: Explr public host hint
    crit: component
    conf: 0.98
    if:
      type: hex
      pattern: "56 50 53 2F 70 75 62 6C 69 63 20 49 50"
      section: .rdata

  - id: explr-command-exec-source
    desc: Explr command execution module
    crit: component
    conf: 0.98
    if:
      type: text
      substr: src-tauri\src\commands\command_exec_commands.rs

  - id: explr-command-exec-verbs
    desc: Explr command execution verbs
    crit: component
    conf: 0.96
    if:
      type: text
      substr: execute_command_with_timeout

  - id: explr-file-operation-verbs
    desc: Explr file operation verbs
    crit: component
    conf: 0.96
    if:
      type: text
      substr: move_to_trash

  - id: explr-sftp-operation-verbs
    desc: Explr SFTP operation verbs
    crit: component
    conf: 0.96
    if:
      type: text
      substr: delete_file_sftp

  - id: explr-volume-metadata-verbs
    desc: Explr host metadata verbs
    crit: component
    conf: 0.95
    if:
      type: hex
      pattern: "61 6C 6C 5F 76 6F 6C 75 6D 65 73 5F 77 69 74 68 5F 69 6E 66 6F 72 6D 61 74 69 6F 6E"
      section: .rdata

composite_rules:
  - id: web-file-manager-command-server
    desc: Web file manager command server
    crit: suspicious
    conf: 0.94
    all:
      - id: explr-api-invoke-route
      - id: explr-command-exec-verbs
      - id: explr-file-operation-verbs
      - id: micro-behaviors/communications/socket/listen::winsock-listener-imports
    any:
      - id: explr-api-download-route
      - id: explr-sftp-operation-verbs
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/fs/file/delete::delete-win
      - id: micro-behaviors/fs/file/rename::any-rename

  - id: explr-remote-file-manager
    desc: Explr remote file manager
    crit: suspicious
    conf: 0.98
    all:
      - id: explr-pdb
      - id: explr-api-invoke-route
      - id: explr-file-operation-verbs
    any:
      - id: explr-server-banner
      - id: explr-api-download-route
      - id: explr-sftp-operation-verbs
      - id: micro-behaviors/fs/file/delete::delete-win
      - id: micro-behaviors/fs/file/rename::any-rename
      - id: micro-behaviors/fs/file/copy::copy

  - id: explr-remote-command-server
    desc: Explr remote command server
    crit: suspicious
    conf: 0.98
    all:
      - id: explr-remote-file-manager
      - id: explr-command-exec-source
      - id: explr-command-exec-verbs
    any:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/process/create/shell/spawn::shell-execution-comp
      - id: micro-behaviors/os/network/interface::powershell-get-netipaddress

  - id: explr-public-remote-control-server
    desc: Public Explr remote control server
    crit: suspicious
    conf: 0.99
    all:
      - id: explr-remote-command-server
      - id: explr-public-host-hint
      - id: micro-behaviors/communications/socket/listen::winsock-listener-imports
    any:
      - id: explr-ui-auth-env
      - id: explr-volume-metadata-verbs
      - id: micro-behaviors/communications/http/download/handler::api-download-route
      - id: micro-behaviors/communications/ssh/client/
