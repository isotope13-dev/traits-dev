defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1219
  mbc: B0022

traits:
  - id: dotnet-download-user-control
    desc: .NET download user control
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      regex: 'DownloadUserControl'

  - id: dotnet-temp-file-append-stream
    desc: .NET temp file append stream
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'FileStream\(.{0,160}FileMode\.Append\)'

  - id: dotnet-temp-path-file-assembly
    desc: .NET temp path file assembly
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)GetTempPath$'

  - id: dotnet-transfer-waiting-download-control
    desc: .NET waiting download control
    crit: component
    conf: 0.88
    if:
      type: text
      word: WaitingDownload

  - id: dotnet-transfer-progress-bar-control
    desc: .NET transfer progress bar
    crit: component
    conf: 0.88
    if:
      type: text
      word: ProgressBar

  - id: dotnet-transfer-size-file-control
    desc: .NET transfer size field
    crit: component
    conf: 0.88
    if:
      type: text
      word: SizeFile

  - id: dotnet-transfer-title-file-control
    desc: .NET transfer title field
    crit: component
    conf: 0.88
    if:
      type: text
      word: TitleFile
  - id: msgpack-file-upload-command
    desc: MsgPack file upload command
    crit: component
    conf: 0.92
    if:
      type: literal
      exact: "UploadFile"
  - id: file-manager-packet-literal
    desc: File manager packet literal
    crit: component
    conf: 0.88
    if:
      type: literal
      exact: "fileManager"
  - id: file-chunk-bytefield
    desc: File chunk byte payload field
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: msgPack.ForcePathObject().SetAsBytes
  - id: bytefile-field-literal
    desc: ByteFile message field
    crit: component
    conf: 0.88
    if:
      type: literal
      exact: "ByteFile"
  - id: msgpack-encoded-send-bytes
    desc: MsgPack encoded byte send
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: msgPack.Encode2Bytes
  - id: client-threadpool-send
    desc: Client ThreadPool send dispatch
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '^ThreadPool\.QueueUserWorkItem$'

composite_rules:
  - id: dotnet-transfer-progress-controls
    desc: .NET transfer progress controls
    crit: component
    conf: 0.9
    any:
      - id: dotnet-transfer-waiting-download-control
      - id: dotnet-transfer-progress-bar-control
      - id: dotnet-transfer-size-file-control
      - id: dotnet-transfer-title-file-control

  - id: dotnet-rat-temp-download-control
    desc: .NET RAT temp download control
    crit: suspicious
    conf: 0.94
    all:
      - id: dotnet-temp-file-append-stream
      - id: dotnet-temp-path-file-assembly
    any:
      - id: dotnet-download-user-control
      - id: dotnet-transfer-progress-controls
  - id: dotnet-rat-file-upload-control
    desc: .NET RAT file upload control
    crit: suspicious
    conf: 0.95
    all:
      - id: msgpack-file-upload-command
      - id: file-manager-packet-literal
      - id: file-chunk-bytefield
      - id: bytefile-field-literal
      - id: client-threadpool-send
    any:
      - id: dotnet-transfer-progress-controls
      - id: msgpack-encoded-send-bytes
