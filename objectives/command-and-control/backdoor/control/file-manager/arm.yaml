defaults:
  platforms: [linux]
  for: [elf]
  arch: [arm]
  attack: T1105,T1070.004

composite_rules:
  - id: arm-eabi-socket-file-management-backdoor
    desc: ARM TCP backdoor combines remote file transfer and file renaming
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/socket/syscall::arm-eabi-listening-server
      - id: micro-behaviors/os/syscall/invoke::svc-read
      - id: micro-behaviors/os/syscall/invoke::svc-write
      - id: micro-behaviors/fs/file/rename::arm-eabi-rename
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
