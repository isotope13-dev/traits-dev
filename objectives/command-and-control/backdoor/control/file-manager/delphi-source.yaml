defaults:
  for: [c]
  platforms: [windows]
  attack: "T1105"
traits:
  - id: delphi-remote-local-file-views
    desc: Delphi remote/local file views
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "RemoteView: TListView"
  - id: delphi-file-transfer-buttons
    desc: Delphi upload download buttons
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "DownloadBtn: TSpeedButton"
  - id: delphi-remote-path-edit
    desc: Delphi remote path edit
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "RemotePathEdit: TEdit"
  - id: delphi-remote-delete-new-buttons
    desc: Delphi remote file actions
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "RemoteDelBtn: TSpeedButton"
  - id: delphi-server-client-thread
    desc: Delphi server client thread
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "TServerClientThread"
  - id: delphi-server-socket-form
    desc: Delphi server socket form
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "BusServer: TServerSocket"
composite_rules:
  - id: delphi-rat-file-manager-source
    desc: Delphi RAT file manager source
    crit: hostile
    conf: 0.97
    all:
      - id: delphi-remote-local-file-views
      - id: delphi-file-transfer-buttons
    any:
      - id: delphi-remote-path-edit
      - id: delphi-remote-delete-new-buttons
    needs: 2
  - id: delphi-threaded-listener-source
    desc: Delphi threaded listener source
    crit: suspicious
    conf: 0.94
    all:
      - id: delphi-server-client-thread
      - id: delphi-server-socket-form
