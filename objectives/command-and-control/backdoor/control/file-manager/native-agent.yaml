defaults:
  platforms: [linux]
  for: [elf]
  attack: T1105
  mbc: B0022

traits:
  - id: native-remote-archive-transfer-errors
    desc: Remote archive transfer errors
    crit: component
    conf: 0.97
    if:
      type: raw
      regex: 'file not uploaded[\s\S]{0,32}unzip failed[\s\S]{0,32}too large'
      section: .rodata

  - id: native-remote-file-mutation-schema
    desc: Remote file mutation fields
    crit: component
    conf: 0.95
    if:
      type: raw
      regex: 'new_path[\s\S]{0,32}old_path[\s\S]{0,32}content[\s\S]{0,32}args'
      section: .rodata

composite_rules:
  - id: native-remote-file-manager-tasking
    desc: Native remote file manager tasking
    crit: hostile
    conf: 0.99
    all:
      - id: native-remote-archive-transfer-errors
      - id: native-remote-file-mutation-schema
      - id: objectives/command-and-control/backdoor/dispatch/shell::native-remote-job-schema
      - id: micro-behaviors/fs/directory/delete::rm-rf
