defaults:
  platforms: [unix, windows]
  for: [wasm]
  conf: 0.9
traits:
  - id: wasm-browser-repl-export
    desc: WASM browser REPL export surface
    crit: suspicious
    if:
      type: value
      path: wasm.exports[*]
      substr: browserrepl_
  - id: wasm-repl-state-export
    desc: WASM REPL state export surface
    crit: component
    if:
      type: value
      path: wasm.exports[*]
      substr: wasmrepl_
  - id: eldritch-wasm-agent-stdlib-source
    desc: Eldritch WASM agent stdlib source path
    crit: suspicious
    if:
      type: text
      substr: lib/eldritch/stdlib/eldritch-libagent/src/lib.rs
  - id: eldritch-wasm-process-stdlib-source
    desc: Eldritch WASM process stdlib source path
    crit: suspicious
    if:
      type: text
      substr: lib/eldritch/stdlib/eldritch-libprocess/src/lib.rs
  - id: eldritch-wasm-pivot-stdlib-source
    desc: Eldritch WASM pivot stdlib source path
    crit: suspicious
    if:
      type: text
      substr: lib/eldritch/stdlib/eldritch-libpivot/src/lib.rs
  - id: wasm-reverse-shell-pivot-api-cluster
    desc: WASM agent reverse shell and pivot APIs
    crit: suspicious
    conf: 0.96
    attack: T1059
    mbc: B0022
    if:
      type: text
      substr: pivotreverse_shell_ptyreverse_shell_replcreate_portalssh_execssh_copyport_scanarp_scanncat
  - id: wasm-system-exec-dll-api-cluster
    desc: WASM agent system execution and DLL APIs
    crit: suspicious
    conf: 0.95
    attack: T1059
    if:
      type: text
      substr: sysdll_injectdll_reflectexecget_envget_ipget_osget_pidget_regget_userhostname
  - id: wasm-credential-reporting-api-cluster
    desc: WASM agent credential and screenshot report APIs
    crit: suspicious
    conf: 0.95
    attack: T1005
    if:
      type: text
      substr: reportfileprocess_listssh_keyuser_passwordntlm_hashscreenshot
  - id: wasm-process-netstat-fixture-cluster
    desc: WASM agent process and netstat data model
    crit: suspicious
    if:
      type: text
      substr: fake-processprotocoltcplocal_address127.0.0.1local_portremote_address0.0.0.0remote_portstateLISTEN
composite_rules:
  - id: wasm-offensive-browser-agent-repl
    desc: Offensive WASM browser agent REPL
    crit: hostile
    conf: 0.97
    attack: T1059
    mbc: B0022
    all:
      - id: wasm-browser-repl-export
      - id: wasm-reverse-shell-pivot-api-cluster
    any:
      - id: eldritch-wasm-agent-stdlib-source
      - id: wasm-repl-state-export
  - id: wasm-agent-postex-api-surface
    desc: WASM agent post-exploitation API surface
    crit: hostile
    conf: 0.96
    attack: T1005
    all:
      - id: wasm-system-exec-dll-api-cluster
      - id: wasm-credential-reporting-api-cluster
    any:
      - id: wasm-process-netstat-fixture-cluster
      - id: eldritch-wasm-process-stdlib-source
  - id: wasm-agent-pivot-stdlib
    desc: WASM agent pivot and process toolkit
    crit: hostile
    conf: 0.95
    attack: T1090
    all:
      - id: eldritch-wasm-pivot-stdlib-source
      - id: wasm-reverse-shell-pivot-api-cluster
    any:
      - id: eldritch-wasm-agent-stdlib-source
      - id: eldritch-wasm-process-stdlib-source
