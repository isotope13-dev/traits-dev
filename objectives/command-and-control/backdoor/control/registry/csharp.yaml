defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1112
  mbc: E1112

traits:
  - id: remote-registry-value-model
    desc: Remote registry value model
    crit: component
    conf: 0.9
    if:
      type: text
      substr: RegistrySeeker.RegValueData
  - id: registry-value-kind-ui
    desc: Registry value kind editor UI
    crit: notable
    conf: 0.9
    count_min: 3
    if:
      type: symbol
      kind: member
      regex: '^RegistryValueKind\.(Binary|DWord|ExpandString|MultiString|QWord|String)'
  - id: registry-edit-wire-command
    desc: Registry edit wire command
    crit: component
    conf: 0.9
    if:
      type: literal
      regex: '^R[GED]$'
  - id: registry-value-data-write-field
    desc: Registry value data assignment
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "_value.Data"
  - id: registry-hex-editor-data-field
    desc: Registry hex editor data field
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "hexEditor.HexTable"
  - id: registry-value-text-data-field
    desc: Registry text data field
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: "valueDataTxtBox.Text"
  - id: registry-save-dialog-ok
    desc: Registry save dialog OK
    crit: component
    conf: 0.86
    if:
      type: text
      substr: "DialogResult.OK"
  - id: encoded-registry-message-send
    desc: Encoded registry message send
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: Module0.smethod_6
  - id: registry-client-send-call
    desc: Registry client send call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)method_1$'

composite_rules:
  - id: dotnet-remote-registry-editor-command
    desc: .NET remote registry editor command
    crit: suspicious
    conf: 0.95
    all:
      - id: registry-value-kind-ui
      - id: encoded-registry-message-send
      - id: registry-client-send-call
    any:
      - id: registry-edit-wire-command
  - id: dotnet-remote-registry-value-editor
    desc: .NET remote registry value editor
    crit: suspicious
    conf: 0.93
    all:
      - id: remote-registry-value-model
      - id: registry-save-dialog-ok
    any:
      - id: registry-value-data-write-field
      - id: registry-hex-editor-data-field
      - id: registry-value-text-data-field
