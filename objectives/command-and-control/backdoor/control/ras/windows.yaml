defaults:
  platforms: [windows]
  for: [pe]
  attack: T1219
  mbc: B0030
composite_rules:
- id: windows-ras-remote-control
  desc: Windows RAS remote-control profile
  crit: suspicious
  conf: 0.96
  all:
  - id: micro-behaviors/communications/socket/connect::ras-session-control
  any:
  - id: micro-behaviors/communications/socket/connect::rasdial2-controller
  - id: micro-behaviors/os/module/load::dynamic-self-resolution-imports
  - id: micro-behaviors/process/info/commandline::command-line-argument-parsing
  - id: micro-behaviors/os/env/access::environment-block-enumeration
  needs: 2
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/package/versioning::pe-version-resource
    - id: well-known/lib/wine::wine-runtime-component
- id: evasive-ras-backdoor
  desc: Evasive RAS backdoor profile
  crit: hostile
  conf: 0.97
  all:
  - id: windows-ras-remote-control
  any:
  - id: objectives/anti-analysis/debugger-detect/check::win-comprehensive
  - id: objectives/anti-analysis/debugger-detect/check::win-anti-analysis-suite
  - id: objectives/anti-analysis/self-terminate::debugger-check-terminate-process
  - id: objectives/anti-analysis/self-terminate::timing-vm-check-self-terminate
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/package/versioning::pe-version-resource
    - id: well-known/lib/wine::wine-runtime-component
