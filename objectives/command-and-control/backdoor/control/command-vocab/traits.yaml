# Generic RPC command-name vocabulary used by various npm-published
# extension and backdoor implants. Each atom is deliberately a single
# substring — these are too generic to mean anything individually; their
# signal comes from co-occurrence in a small window (handled by the
# consuming family composite). Hosting them here keeps family attribution
# out of generic trait IDs.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: cmd-vocab-websocket-control
    desc: '"websocket_control" command keyword'
    crit: component
    conf: 0.6
    if:
      type: text
      substr: websocket_control
  - id: cmd-vocab-delete-cache
    desc: '"delete_cache" command keyword'
    crit: component
    conf: 0.6
    if:
      type: text
      substr: delete_cache
  - id: cmd-vocab-screenshot
    desc: '"screenshot" command keyword'
    crit: component
    conf: 0.5
    if:
      type: text
      substr: screenshot
  - id: cmd-vocab-open-uri
    desc: '"open_uri" command keyword'
    crit: component
    conf: 0.6
    if:
      type: text
      substr: open_uri
