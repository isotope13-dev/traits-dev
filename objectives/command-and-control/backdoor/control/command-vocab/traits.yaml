# Generic RPC command-name vocabulary used by various npm-published
# extension and backdoor implants. Each atom is deliberately a single
# substring — these are too generic to mean anything individually; their
# signal comes from co-occurrence in a small window (handled by the
# consuming family composite). Hosting them here keeps family attribution
# out of generic trait IDs.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: cmd-vocab-websocket-control
    desc: '"websocket_control" command keyword'
    crit: component
    conf: 0.6
    if:
      type: text
      substr: websocket_control
  - id: cmd-vocab-delete-cache
    desc: '"delete_cache" command keyword'
    crit: component
    conf: 0.6
    if:
      type: text
      substr: delete_cache
  - id: cmd-vocab-screenshot
    desc: '"screenshot" command keyword'
    crit: component
    conf: 0.5
    if:
      type: text
      substr: screenshot
  - id: cmd-vocab-open-uri
    desc: '"open_uri" command keyword'
    crit: component
    conf: 0.6
    if:
      type: text
      substr: open_uri

  - id: cmd-vocab-install-skill
    desc: '"INSTALL_SKILL" command keyword'
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: INSTALL_SKILL

  - id: cmd-vocab-update-skill
    desc: '"UPDATE_SKILL" command keyword'
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: UPDATE_SKILL

  - id: cmd-vocab-uninstall-skill
    desc: '"UNINSTALL_SKILL" command keyword'
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: UNINSTALL_SKILL

  - id: cmd-vocab-install-expert
    desc: '"INSTALL_EXPERT" command keyword'
    crit: component
    conf: 0.9
    if:
      type: literal
      kind: string
      exact: INSTALL_EXPERT

composite_rules:
  - id: remote-agent-skill-management-commands
    desc: Remote agent skill-management command set
    crit: suspicious
    conf: 0.98
    needs: 3
    any:
      - id: cmd-vocab-install-skill
      - id: cmd-vocab-update-skill
      - id: cmd-vocab-uninstall-skill
      - id: cmd-vocab-install-expert
