# hVNC (Hidden Virtual Network Computing) browser injection detection.
# Detects the hVNC technique where browsers are launched in a hidden desktop
# context with injected DLLs for screen capture via DXGI.
# Used by Overlord RAT and other remote access tools.
defaults:
  platforms: [windows]
  for: [go, pe, dll, c, cpp]
  attack: T1219
  mbc: B0025
traits:
  - id: hvnc-inject-log-prefix
    desc: hVNC injection log message prefix
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'hvnc inject:'
  - id: hvnc-browser-log-prefix
    desc: hVNC browser operation log prefix
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'hvnc \w+: '
  - id: hvnc-clone-prefix
    desc: hVNC browser profile clone directory prefix
    crit: component
    conf: 0.9
    if:
      type: text
      exact: 'hvnc_'
  - id: hvnc-browser-profile-clone
    desc: hVNC browser profile cloning message
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'cloned profile'
  - id: hvnc-gpu-capture
    desc: hVNC GPU/DXGI capture reference
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'DXGI (capture|injection|active)'
  - id: hvnc-browser-sandbox-bypass
    desc: hVNC browser launch with sandbox bypass
    crit: component
    conf: 0.9
    if:
      type: text
      regex: --window-position=0,0.{0,40}--no-sandbox
composite_rules:
  - id: hvnc-browser-injection
    desc: hVNC browser injection with reflective DLL loading
    crit: hostile
    conf: 0.95
    all:
      - id: hvnc-inject-log-prefix
    any:
      - id: hvnc-browser-profile-clone
      - id: hvnc-gpu-capture
      - id: hvnc-browser-sandbox-bypass
      - id: micro-behaviors/communications/ipc/file-mapping::hvnc-shared-memory-section
      - id: micro-behaviors/data/embedded/payload/rdi-env::rdi-env-var-cluster
    needs: 2
