defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1219
  mbc: B0025
traits:
- id: hvnc-viewer-title
  desc: HVNC viewer title string
  crit: component
  conf: 0.9
  if:
    type: text
    exact: "HVNC Viewer"
- id: hvnc-managed-methods
  desc: HVNC managed method names
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: '^(ServeMjpeg|HandleInputJson|BuildWindowsJson|RunHttpServer)$'
- id: browser-input-fetch-ui
  desc: Browser input fetch UI
  crit: component
  conf: 0.84
  if:
    type: text
    substr: "fetch('/input'"
composite_rules:
- id: dotnet-local-hvnc-bridge
  desc: .NET local HVNC bridge
  crit: hostile
  conf: 0.97
  all:
  - id: metadata/binary/framework::dotnet-assembly
  - id: micro-behaviors/communications/http/server/managed::dotnet-mjpeg-viewer-server
  - id: micro-behaviors/hardware/display/screen::printwindow-capture-primitives
  - id: micro-behaviors/hardware/input/mouse/message::postmessage-input-injection
  any:
  - id: objectives/evasion/process/hidden/window::alternate-desktop-hidden-window-control
  - id: hvnc-viewer-title
  - id: hvnc-managed-methods
- id: dotnet-hidden-desktop-hvnc
  desc: .NET hidden desktop HVNC
  crit: hostile
  conf: 0.98
  all:
  - id: dotnet-local-hvnc-bridge
  - id: objectives/evasion/process/hidden/window::alternate-desktop-hidden-window-control
  any:
  - id: objectives/command-and-control/backdoor/control/hvnc::browser-data-url-launch
  - id: objectives/command-and-control/backdoor/control/hvnc::browser-input-fetch-ui
  - id: objectives/command-and-control/backdoor/control/hvnc::browser-profile-directory-copy
  - id: objectives/command-and-control/backdoor/control/hvnc::browser-user-data-dir-launch
  - id: objectives/command-and-control/backdoor/control/hvnc::hvnc-browser-log-prefix
  - id: objectives/command-and-control/backdoor/control/hvnc::hvnc-browser-profile-clone
  - id: objectives/command-and-control/backdoor/control/hvnc::hvnc-browser-sandbox-bypass
  - id: objectives/command-and-control/backdoor/control/hvnc::hvnc-browser-title-source
  - id: objectives/command-and-control/backdoor/control/hvnc::hvnc-clone-prefix
  - id: objectives/command-and-control/backdoor/control/hvnc::hvnc-gpu-capture
  - id: objectives/command-and-control/backdoor/control/hvnc::hvnc-inject-log-prefix
  - id: objectives/command-and-control/backdoor/control/hvnc::hvnc-managed-methods
  - id: objectives/command-and-control/backdoor/control/hvnc::hvnc-viewer-title
  - id: objectives/command-and-control/backdoor/control/hvnc::process-resume-control
  - id: objectives/command-and-control/backdoor/control/hvnc::process-suspend-control
