defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1219
  mbc: B0025

traits:
  - id: hvnc-browser-title-source
    desc: HVNC browser window title
    crit: component
    conf: 0.95
    if:
      type: literal
      exact: "Welcome to HVNC !"
  - id: browser-user-data-dir-launch
    desc: Browser alternate user-data profile launch
    crit: notable
    conf: 0.9
    if:
      type: literal
      substr: "--user-data-dir="
  - id: browser-profile-directory-copy
    desc: Browser profile directory copy
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)CopyDirectory$'
  - id: process-suspend-control
    desc: Process suspend control
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)SuspendProcess$'
  - id: process-resume-control
    desc: Process resume control
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)ResumeProcess$'
  - id: browser-data-url-launch
    desc: Browser launched with data URL
    crit: notable
    conf: 0.85
    if:
      type: literal
      substr: "data:text/html"

composite_rules:
  - id: process-suspend-resume-control
    desc: Process suspend and resume control
    crit: notable
    conf: 0.92
    all:
      - id: process-suspend-control
      - id: process-resume-control
  - id: dotnet-hvnc-hidden-browser-launcher
    desc: .NET HVNC hidden browser launcher
    crit: suspicious
    conf: 0.97
    all:
      - id: hvnc-browser-title-source
      - id: browser-user-data-dir-launch
      - id: micro-behaviors/ui/window/manage/control::set-window-pos-source
    any:
      - id: browser-profile-directory-copy
      - id: process-suspend-resume-control
      - id: browser-data-url-launch
      - id: micro-behaviors/process/create/spawn::start
    needs: 2
