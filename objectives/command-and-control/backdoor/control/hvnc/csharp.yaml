defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1219
  mbc: B0025

traits:
  - id: hvnc-browser-title-source
    desc: HVNC browser window title
    crit: component
    conf: 0.95
    if:
      type: literal
      exact: "Welcome to HVNC !"
  - id: browser-user-data-dir-launch
    desc: Browser alternate user-data profile launch
    crit: notable
    conf: 0.9
    if:
      type: literal
      substr: "--user-data-dir="
  - id: browser-profile-directory-copy
    desc: Browser profile directory copy
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?is)\bCopyDirectory\s*\([^)]{0,240}\b(profile|user\s*data)\b'
  - id: process-suspend-control
    desc: Process suspend control
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)SuspendProcess$'
  - id: process-resume-control
    desc: Process resume control
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)ResumeProcess$'
  - id: browser-data-url-launch
    desc: Browser launched with data URL
    crit: notable
    conf: 0.85
    if:
      type: literal
      substr: "data:text/html"
  - id: msgpack-open-browser-packet
    desc: MsgPack open browser packet
    crit: component
    conf: 0.9
    if:
      type: literal
      exact: "OpenBrowser"
  - id: msgpack-keyboard-click-packet
    desc: MsgPack keyboard click packet
    crit: component
    conf: 0.9
    if:
      type: literal
      exact: "keyboardClick"
  - id: msgpack-move-cursor-packet
    desc: MsgPack cursor movement packet
    crit: component
    conf: 0.9
    if:
      type: literal
      exact: "MoveCursor"
  - id: msgpack-left-down-packet
    desc: MsgPack left mouse down packet
    crit: component
    conf: 0.88
    if:
      type: literal
      exact: "LeftDown"
  - id: msgpack-left-up-packet
    desc: MsgPack left mouse up packet
    crit: component
    conf: 0.88
    if:
      type: literal
      exact: "LeftUp"
  - id: msgpack-right-down-packet
    desc: MsgPack right mouse down packet
    crit: component
    conf: 0.88
    if:
      type: literal
      exact: "RightDown"
  - id: msgpack-right-up-packet
    desc: MsgPack right mouse up packet
    crit: component
    conf: 0.88
    if:
      type: literal
      exact: "RightUp"

composite_rules:
  - id: process-suspend-resume-control
    desc: Process suspend and resume control
    crit: notable
    conf: 0.92
    all:
      - id: process-suspend-control
      - id: process-resume-control
  - id: msgpack-mouse-button-packet
    desc: MsgPack mouse button packet
    crit: component
    conf: 0.9
    any:
      - id: msgpack-left-down-packet
      - id: msgpack-left-up-packet
      - id: msgpack-right-down-packet
      - id: msgpack-right-up-packet
  - id: dotnet-hvnc-hidden-browser-launcher
    desc: .NET HVNC hidden browser launcher
    crit: suspicious
    conf: 0.97
    all:
      - id: hvnc-browser-title-source
      - id: browser-user-data-dir-launch
      - id: micro-behaviors/ui/window/manage/control::set-window-pos-source
    any:
      - id: browser-profile-directory-copy
      - id: process-suspend-resume-control
      - id: browser-data-url-launch
      - id: micro-behaviors/process/create/spawn::start
    needs: 2
  - id: dotnet-msgpack-remote-browser-control
    desc: .NET MsgPack remote browser control
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/backdoor/control/file-manager::msgpack-encoded-send-bytes
      - id: objectives/command-and-control/backdoor/control/file-manager::client-threadpool-send
      - id: msgpack-open-browser-packet
      - id: msgpack-keyboard-click-packet
      - id: msgpack-move-cursor-packet
      - id: msgpack-mouse-button-packet
