defaults:
  platforms: [windows, unix]
  for: [javascript, pe, dll]
  attack: T1219
  mbc: B0022

traits:
  - id: remote-desktop-stream-command
    desc: Remote desktop stream command
    crit: component
    conf: 0.94
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    if:
      type: text
      substr: "stream.start"
  - id: remote-thumbnail-capture-command
    desc: Remote thumbnail capture command
    crit: component
    conf: 0.94
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    if:
      type: text
      substr: "thumbnail.capture"
  - id: remote-agent-task-command
    desc: Remote agent task command
    crit: component
    conf: 0.92
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    if:
      type: text
      substr: "agent.task"
  - id: remote-file-transfer-method
    desc: Remote file transfer method
    crit: component
    conf: 0.9
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    if:
      type: text
      regex: "file\\.(send|receive|upload|download)"
  - id: remote-file-transfer-directory
    desc: Remote file transfer directory
    crit: component
    conf: 0.88
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    if:
      type: text
      substr: remoteDirectory
  - id: remote-received-files-label
    desc: Remote received files label
    crit: component
    conf: 0.86
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    if:
      type: text
      substr: received files
  - id: remote-pair-token-manager-cli
    desc: Remote pair-token manager CLI
    crit: notable
    conf: 0.91
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    if:
      type: text
      regex: "--manager <host:port>[\\s\\S]{0,240}--pair <token>|pairing token[\\s\\S]{0,160}Hub"
  - id: dotnet-remote-agent-transport
    desc: .NET remote agent transport
    crit: notable
    conf: 0.93
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    for: [pe, dll]
    if:
      type: text
      regex: "RemoteAgent\\.Fast|TcpRemoteTransport|WebSocketRemoteTransport"
  - id: dotnet-remote-binary-frame-stream
    desc: .NET remote binary frame stream
    crit: component
    conf: 0.91
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    for: [pe, dll]
    if:
      type: text
      substr: "frame.binary"

composite_rules:
  - id: remote-desktop-task-agent
    desc: Remote desktop task agent
    crit: hostile
    conf: 0.97
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    all:
      - id: remote-pair-token-manager-cli
      - id: micro-behaviors/hardware/display/screen::node-screenshots-monitor-capture
    any:
      - id: remote-desktop-stream-command
      - id: remote-thumbnail-capture-command
      - id: remote-agent-task-command
      - id: remote-file-transfer-method
      - id: remote-file-transfer-directory
      - id: remote-received-files-label
    needs: 2
  - id: dotnet-remote-frame-agent
    desc: .NET remote frame agent
    crit: hostile
    conf: 0.97
    ref: sha256:ebd94919c4bb125216d9f757ff7d42e1d20cf3db689919a4c964b17cee148f68
    for: [pe, dll]
    all:
      - id: dotnet-remote-agent-transport
      - id: dotnet-remote-binary-frame-stream
    any:
      - id: micro-behaviors/communications/http/websocket::dotnet-client-websocket
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel
      - id: micro-behaviors/process/create/spawn::process-token-dotnet
