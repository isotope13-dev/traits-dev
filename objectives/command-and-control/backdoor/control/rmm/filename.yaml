defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1219
traits:
  - id: ipv4-clientsetup-filename
    desc: IPv4-prefixed ClientSetup filename
    crit: suspicious
    conf: 0.94
    if:
      type: path
      basename: true
      regex: '^([0-9]{1,3}\.){3}[0-9]{1,3}ClientSetup\.exe$'
    not:
      - regex: '^(10|127)\.'
      - regex: '^172\.(1[6-9]|2[0-9]|3[0-1])\.'
      - regex: '^192\.168\.'
