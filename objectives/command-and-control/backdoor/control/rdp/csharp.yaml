defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1219
  mbc: B0022

traits:
  - id: msgpack-install-rdp-packet
    desc: MsgPack install RDP packet
    crit: suspicious
    conf: 0.92
    if:
      type: literal
      exact: "InstallRDP"
  - id: msgpack-uninstall-rdp-packet
    desc: MsgPack uninstall RDP packet
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      exact: "UnstallRDP"
  - id: msgpack-rdp-url-field
    desc: MsgPack RDP URL field
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      exact: "RdpUrl"
  - id: msgpack-ngrok-token-field
    desc: MsgPack ngrok token field
    crit: suspicious
    conf: 0.88
    if:
      type: literal
      exact: "Token"
  - id: msgpack-create-account-packet
    desc: MsgPack create account packet
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      exact: "CreateAccount"

composite_rules:
  - id: dotnet-msgpack-hidden-rdp-control
    desc: .NET MsgPack hidden RDP control
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/backdoor/control/file-manager::msgpack-encoded-send-bytes
      - id: objectives/command-and-control/backdoor/control/file-manager::client-threadpool-send
      - id: msgpack-install-rdp-packet
      - id: msgpack-uninstall-rdp-packet
      - id: msgpack-rdp-url-field
    any:
      - id: msgpack-ngrok-token-field
      - id: msgpack-create-account-packet
