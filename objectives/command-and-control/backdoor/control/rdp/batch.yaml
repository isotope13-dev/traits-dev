defaults:
  platforms: [windows]
  for: [batch]
  attack: T1219
  mbc: B0022

traits:
  - id: batch-enable-rdp-registry
    desc: Batch enables RDP registry
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)reg\s+add.{0,120}Terminal Server.{0,80}fDenyTSConnections.{0,80}/d\s+0\b'

  - id: batch-netsh-remotedesktop-enable
    desc: Batch enables RDP firewall service
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)netsh\s+firewall\s+set\s+service.{0,80}remotedesktop.{0,80}mode\s*=\s*enable'

  - id: batch-netsh-open-rdp-port
    desc: Batch opens RDP port
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)netsh\s+firewall\s+add\s+portopening.{0,80}\b3389\b'

  - id: ngrok-authtoken-command
    desc: Ngrok auth token command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bngrok\s+authtoken\s+\S{12,}'

  - id: remotespark-joinvnc-url
    desc: RemoteSpark joinvnc URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: remotespark.com/view/joinvnc.html?id=

composite_rules:
  - id: batch-enables-rdp-access
    desc: Batch enables remote desktop access
    crit: hostile
    conf: 0.97
    all:
      - id: batch-enable-rdp-registry
      - id: batch-netsh-remotedesktop-enable
      - id: batch-netsh-open-rdp-port

  - id: batch-ngrok-rdp-backdoor
    desc: Batch exposes RDP through ngrok
    crit: hostile
    conf: 0.98
    all:
      - id: ngrok-authtoken-command
      - id: objectives/command-and-control/channel/tunnel/proxy::ngrok-rdp-tcp-tunnel
