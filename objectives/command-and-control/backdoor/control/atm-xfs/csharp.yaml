# ATM cash dispenser control through XFS/CDM interfaces.
defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1091
  mbc: B0028

traits:
  - id: xfs-cdm-dispense-struct
    desc: XFS cash dispense structure
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "_wfs_cdm_dispense"
  - id: xfs-currency-dispenser-provider
    desc: XFS CurrencyDispenser provider reference
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "CurrencyDispenser1"
  - id: xfs-cdm-service-open
    desc: XFS cash dispenser service open
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "executeOpen((sbyte*)(&@struct), (ushort*)System.Runtime.CompilerServices.Unsafe.AsPointer(ref _003CModule_003E.cdmHS))"
  - id: xfs-startup-success-path
    desc: XFS startup service-provider flow
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "WFSStartUp executed with success"
  - id: atm-cassette-inventory-ui
    desc: ATM cassette inventory controls
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "cashUnitItemsLeftLabel"
  - id: atm-session-key-gate
    desc: ATM session-key access gate
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: "ENTER SESSION KEY TO PROCEED"

composite_rules:
  - id: atm-xfs-cash-dispenser-control
    desc: ATM XFS cash dispenser control source
    crit: hostile
    conf: 0.97
    all:
      - id: xfs-cdm-dispense-struct
    any:
      - id: xfs-currency-dispenser-provider
      - id: xfs-cdm-service-open
      - id: xfs-startup-success-path
      - id: atm-cassette-inventory-ui
      - id: atm-session-key-gate
    needs: 2
