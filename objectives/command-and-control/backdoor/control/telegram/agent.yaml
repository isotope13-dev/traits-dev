defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1102

traits:
  - id: telegram-http-control-route
    desc: Telegram HTTP control route
    crit: suspicious
    conf: 0.96
    attack: T1059.007,T1102
    if:
      type: text
      regex: 'onPOST\s*\(\s*["'']/telegram/(connect|send-message)["'']'

  - id: encoded-telegram-token-fallback
    desc: Obfuscated Telegram token fallback
    crit: suspicious
    conf: 0.95
    attack: T1027,T1102
    if:
      type: text
      regex: '(from\d+|decode[A-Za-z0-9_]*)\s*\(\s*["''][0-9]{40,}["'']\s*\)'

  - id: vscode-internal-command-dispatch
    # Dispatching the extension's OWN namespaced internal command (e.g.
    # `solopreneur.internalRunAgent`) is ordinary extension plumbing, not a
    # standalone attack — notable, not suspicious. The hostile signal comes from
    # the composite below (a Telegram poll loop driving it), which is what
    # distinguishes remote command execution from local command dispatch.
    desc: Dispatches an internal VS Code command
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: vscode.commands.executeCommand
      arg:
        kind: string
        substr: internal

  # Benign opt-in marker: the Telegram bot token / chat id are read from the
  # user's own VS Code configuration (the user pairs their OWN bot). A backdoor
  # hardcodes or obfuscates the token instead (see encoded-telegram-token-fallback
  # / node-telegram-http-control-backdoor). Referenced from the control
  # composite's `unless:` so a documented, user-configured Telegram integration
  # is not mislabeled as attacker remote control.
  - id: telegram-token-from-user-config
    desc: Telegram token read from user configuration
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\.get\s*\(\s*["'']telegram(bottoken|enabled|chatid)'

composite_rules:
  - id: telegram-vscode-agent-control
    desc: Telegram remote control of a local VS Code agent
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/services/telegram::telegram-api-host
      - id: micro-behaviors/communications/http/services/telegram::telegram-get-updates-endpoint
      - id: vscode-internal-command-dispatch
    unless:
      - id: telegram-token-from-user-config

  - id: node-telegram-http-control-backdoor
    desc: HTTP-controlled Node Telegram bot with an obfuscated token
    crit: hostile
    conf: 0.99
    attack: T1059.007,T1102,T1027
    mbc: B0032
    all:
      - id: micro-behaviors/communications/http/services/telegram::node-telegram-bot-api-package
      - id: micro-behaviors/communications/http/services/telegram::node-telegram-api-alias-constructor
      - id: telegram-http-control-route
      - id: encoded-telegram-token-fallback
