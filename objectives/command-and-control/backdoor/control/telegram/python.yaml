defaults:
  platforms: [unix, windows]
  for: [python, whl]
  attack: T1059.006,T1102

traits:
  - id: python-telegram-message-to-agent-job
    desc: Telegram message queues an agent job
    crit: notable
    conf: 0.97
    for: [python]
    if:
      type: text
      regex: 'def\s+handle_message_text\s*\([^)]{0,120}\)[\s\S]{0,700}\.jobs\.put\s*\(\s*BridgeJob'
  - id: python-telegram-input-queue
    desc: Telegram input enters agent queue
    crit: notable
    conf: 0.97
    for: [python]
    if:
      type: text
      regex: 'input_queue\.put\(\s*\{\s*["'']source["'']\s*:\s*["'']telegram["'']'

composite_rules:
  - id: python-telegram-agent-remote-control
    desc: Telegram remote agent control
    crit: hostile
    conf: 0.995
    scope: archive
    for: [whl]
    all:
      - id: micro-behaviors/communications/http/services/telegram::telegram-api-host
      - id: micro-behaviors/communications/http/services/telegram::python-telegram-get-updates
      - id: micro-behaviors/process/create/subprocess::variable-command-shell-true
    any:
      - id: python-telegram-message-to-agent-job
      - id: python-telegram-input-queue
