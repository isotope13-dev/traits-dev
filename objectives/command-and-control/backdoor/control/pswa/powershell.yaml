defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1219

traits:
  - id: pswa-feature-install
    desc: PowerShell Web Access feature install
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: WindowsPowerShellWebAccess

  - id: pswa-webapp-test-certificate
    desc: PowerShell Web Access test certificate gateway
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Install-PswaWebApplication[^\n]{0,120}-UseTestCertificate'

  - id: pswa-wildcard-authorization
    desc: PowerShell Web Access wildcard authorization
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Add-PswaAuthorizationRule[^\n]{0,160}-UserName\s+\*[^\n]{0,160}-ComputerName\s+\*'
  - id: pswa-iis-feature-install
    desc: IIS Web-Server feature install for PSWA gateway
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'Install-WindowsFeature[^\n]{0,80}-Name\s+Web-Server[^\n]{0,80}-IncludeManagementTools'

composite_rules:
  - id: pswa-open-remote-access
    desc: PowerShell Web Access wildcard remote access
    crit: hostile
    conf: 0.97
    all:
      - id: pswa-wildcard-authorization
    any:
      - id: pswa-feature-install
      - id: pswa-webapp-test-certificate
  - id: pswa-test-cert-wildcard-gateway
    desc: PowerShell Web Access test-cert wildcard gateway
    crit: hostile
    conf: 0.96
    all:
      - id: pswa-webapp-test-certificate
      - id: pswa-wildcard-authorization
  - id: pswa-iis-wildcard-remote-gateway
    desc: IIS-hosted PowerShell Web Access wildcard gateway
    crit: hostile
    conf: 0.95
    all:
      - id: pswa-feature-install
      - id: pswa-iis-feature-install
      - id: pswa-wildcard-authorization
