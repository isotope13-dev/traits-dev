defaults:
  platforms: [windows]
  for: [pe]
  mbc: B0030
  attack: T1071.001
traits:
  - id: dotnet-send-command-call
    desc: .NET remote command send call
    crit: notable
    conf: 0.9
    for: [csharp]
    if:
      type: symbol
      kind: call
      regex: '(^|\.)SendCommand$'
    unless:
      - id: well-known/game/mod::bedrockboot-source-repository
      - id: well-known/game/mod::bedrockboot-test-project
  - id: fun-message-command
    desc: Remote fun message command
    crit: component
    conf: 0.88
    for: [csharp]
    if:
      type: text
      substr: '"fun|msg'
  - id: fun-screen-command
    desc: Remote fun screen command
    crit: component
    conf: 0.88
    for: [csharp]
    if:
      type: text
      substr: '"fun|screen'
  - id: fun-window-command
    desc: Remote fun window command
    crit: component
    conf: 0.88
    for: [csharp]
    if:
      type: text
      substr: '"fun|hwnd'
  - id: fun-wallpaper-command
    desc: Remote wallpaper command
    crit: component
    conf: 0.88
    for: [csharp]
    if:
      type: text
      substr: '"fun|wp'
  - id: fun-balloon-command
    desc: Remote balloon-tip command
    crit: component
    conf: 0.88
    for: [csharp]
    if:
      type: text
      substr: '"fun|balloontip'
  - id: remote-mouse-lock-command
    desc: Remote mouse lock command
    crit: component
    conf: 0.9
    for: [csharp]
    if:
      type: text
      substr: '"mouse|lock"'
  - id: remote-mouse-hide-command
    desc: Remote mouse hide command
    crit: component
    conf: 0.9
    for: [csharp]
    if:
      type: text
      substr: '"mouse|hide"'
  - id: remote-window-hide-command
    desc: Remote window hide command
    crit: component
    conf: 0.9
    for: [csharp]
    if:
      type: text
      substr: '"hwnd", "hide"'
  - id: encoded-fun-message-source
    desc: Encoded remote fun message source
    crit: notable
    conf: 0.9
    for: [csharp]
    if:
      type: text
      substr: "clsCrypto.b64E2Str("
  - id: fun-image-base64-source
    desc: Image payload base64 source
    crit: notable
    conf: 0.9
    for: [csharp]
    if:
      type: symbol
      kind: call
      exact: ImageToBase64
  - id: msgpack-active-window-packet
    desc: MsgPack active window packet
    crit: component
    conf: 0.9
    for: [csharp]
    if:
      type: literal
      exact: "Active"
  - id: msgpack-showwindow-field
    desc: MsgPack ShowWindow field
    crit: component
    conf: 0.9
    for: [csharp]
    if:
      type: literal
      exact: "ShowWindow"
  - id: msgpack-gethwnd-packet
    desc: MsgPack GetHWND packet
    crit: component
    conf: 0.9
    for: [csharp]
    if:
      type: literal
      exact: "GetHWND"
  - id: msgpack-remote-window-pid-field
    desc: MsgPack remote window PID field
    crit: component
    conf: 0.86
    for: [csharp]
    if:
      type: literal
      exact: "PID"
composite_rules:
  - id: remote-fun-command-cluster
    desc: Remote fun command cluster
    crit: component
    conf: 0.9
    for: [csharp]
    any:
      - id: fun-message-command
      - id: fun-screen-command
      - id: fun-window-command
      - id: fun-wallpaper-command
      - id: fun-balloon-command
    needs: 2
  - id: dotnet-remote-fun-control-panel
    desc: .NET remote disruptive control panel
    crit: suspicious
    conf: 0.95
    for: [csharp]
    all:
      - id: dotnet-send-command-call
      - id: remote-fun-command-cluster
    any:
      - id: remote-mouse-lock-command
      - id: remote-mouse-hide-command
      - id: remote-window-hide-command
      - id: encoded-fun-message-source
      - id: fun-image-base64-source
  - id: dotnet-msgpack-remote-window-control
    desc: .NET MsgPack remote window control
    crit: hostile
    conf: 0.97
    for: [csharp]
    all:
      - id: objectives/command-and-control/backdoor/control/file-manager::msgpack-encoded-send-bytes
      - id: objectives/command-and-control/backdoor/control/file-manager::client-threadpool-send
      - id: msgpack-active-window-packet
      - id: msgpack-showwindow-field
      - id: msgpack-gethwnd-packet
      - id: msgpack-remote-window-pid-field
  - id: freerdp-winhttp-remote-control
    desc: Packed FreeRDP remote control over WinHTTP
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/service/remote::freerdp-remote-desktop-stack
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-send-request-text
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-receive-response-text
    any:
      - id: objectives/evasion/indicator-removal/timestamps::export-timestamp-maxval
      - id: metadata/binary/section/names::upx-section
      - id: micro-behaviors/os/sysinfo/network::get-adapters-addresses
      - id: micro-behaviors/communications/proxy/socks::socks5-proto
    needs: 2
    unless:
      - id: metadata/signed/platform/
  - id: session-aware-remote-control-suite
    desc: Session-aware remote control capability set
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/command-and-control/channel/http/message::remote-client-session-protocol
    any:
      - id: micro-behaviors/ui/window/station::alternate-desktop-control
      - id: objectives/collection/screenshot/capture::directx-desktop-duplication-capture
      - id: objectives/collection/clipboard/capture::clipboard-session-transfer
      - id: micro-behaviors/hardware/input/mouse/synthesis::comprehensive-user-input-synthesis
      - id: micro-behaviors/dylib/load/wtsapi
      - id: objectives/discovery/system/fingerprint/info::win32-system-profiling
    needs: 3
  - id: windows-remote-control-implant
    desc: Windows remote control implant
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/command-and-control/channel/http/message::remote-client-session-protocol
    any:
      - id: micro-behaviors/ui/window/station::alternate-desktop-control
      - id: objectives/collection/screenshot/capture::directx-desktop-duplication-capture
      - id: objectives/collection/clipboard/capture::clipboard-session-transfer
      - id: micro-behaviors/hardware/input/mouse/synthesis::comprehensive-user-input-synthesis
      - id: micro-behaviors/dylib/load/wtsapi
      - id: objectives/evasion/process/injection/memory::process-inject-api
      - id: objectives/discovery/system/fingerprint/info::win32-system-profiling
    needs: 4
  - id: freerdp-packed-winhttp-implant
    desc: Tampered FreeRDP remote control implant
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/service/remote::freerdp-remote-desktop-stack
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-send-request-text
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-receive-response-text
      - id: objectives/evasion/indicator-removal/timestamps::export-timestamp-maxval
    any:
      - id: metadata/binary/section/names::upx-section
      - id: micro-behaviors/os/sysinfo/network::get-adapters-addresses
      - id: micro-behaviors/communications/proxy/socks::socks5-proto
    needs: 2
    unless:
      - id: metadata/signed/platform/
