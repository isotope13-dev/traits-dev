# Encoded C2 URLs combined with weakened transport security:
# (a) the URL is wrapped behind a decoder (base64/hex/xor/etc.), AND
# (b) certificate or hostname verification is disabled on the request, AND
# (c) the request is actually executed.
# That trio means the operator deliberately accepted self-signed certs
# on an obfuscated endpoint and is sending traffic to it. It has no
# benign explanation in production code; standard webshell uploader and
# supply-chain implant call shape.
defaults:
  platforms: [unix, windows]
  for: [php]
  mbc: B0032
  attack: T1573
composite_rules:
  - id: encoded-c2-ssl-bypass
    desc: Encoded C2 URL with SSL bypass
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/url/encoded::encoded-https-url
      - id: micro-behaviors/communications/http/curl::ssl-verify-disable
      - id: micro-behaviors/communications/http/curl::exec-symbol
    near_bytes: 4096

  - id: encoded-c2-decoder-call
    desc: Decoded URL fed into CURLOPT_URL
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/url/encoded::encoded-https-url
      - id: micro-behaviors/communications/http/curl::url-from-decoder
      - id: micro-behaviors/communications/http/curl::exec-symbol
    near_bytes: 4096

  - id: encoded-c2-method-indirect
    desc: Decoder hidden behind method indirection
    crit: hostile
    conf: 0.93
    all:
      - id: micro-behaviors/data/decode/base64::const-decoder-self
      - id: micro-behaviors/communications/http/curl::url-from-method-call
      - id: micro-behaviors/communications/http/curl::exec-symbol
    near_bytes: 4096
