# C++ Command Execution Backdoor
# Detects C++ binaries with backdoor characteristics
# ATT&CK: T1059.004 (Unix Shell), B0022 (Backdoor)
defaults:
  platforms: [linux, unix, android, macos, ios, windows]
  for: [binaries]
composite_rules:
  # High-confidence backdoor pattern
  - id: cpp-command-backdoor
    desc: C++ command execution backdoor with string concealment
    crit: hostile
    conf: 0.95
    attack: "T1059.004"
    mbc: "B0022"
    all:
      - id: micro-behaviors/process/create/direct::cpp-stdlib
      - id: micro-behaviors/process/create/direct::cpp-string
      - id: micro-behaviors/process/create/direct::cpp-exception
      - id: micro-behaviors/process/create/direct::cpp-command-capture
      - id: objectives/anti-static/obfuscation/payload/encrypted::string-concealment
  # C++ backdoor with full command dispatch symbols
  - id: cpp-backdoor-dispatch-symbols
    desc: C++ backdoor with RunCommand/ProcessRequest/SaveAndExecute symbols
    crit: hostile
    conf: 1.0
    all:
      - id: micro-behaviors/process/create/command-handler::run-command-symbol
      - id: micro-behaviors/process/create/command-handler::generate-uid-symbol
      - id: micro-behaviors/process/create/command-handler::get-response-symbol
      - id: micro-behaviors/process/create/command-handler::write-callback-symbol
      - id: micro-behaviors/process/create/command-handler::process-request-symbol
      - id: micro-behaviors/process/create/command-handler::save-and-execute-symbol
      - id: micro-behaviors/process/create/command-handler::make-status-string-symbol
      - id: micro-behaviors/process/create/command-handler::get-exe-path-symbol
      - id: micro-behaviors/process/create/command-handler::execute-symbol
