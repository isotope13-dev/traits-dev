# Obfuscated WebSocket command dispatchers. The combination of a persistent
# socket surface, decoded dynamic calls, environment access, and Node's local
# filesystem/OS modules identifies a remote command stage rather than a plain
# WebSocket client.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.007,T1071.001,T1027

traits:
  - id: agentto-install-managed-skill
    desc: Managed skill installation handler
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: installManagedSkill

composite_rules:
  - id: node-websocket-agent-skill-writer
    desc: WebSocket-enabled writer for executable agent skills
    crit: hostile
    conf: 0.98
    attack: T1059.007,T1105
    scope: archive
    all:
      - id: objectives/command-and-control/backdoor/dispatch/websocket::agentto-install-managed-skill
      - id: micro-behaviors/fs/file/write/agent-skill::writes-agent-skill-markdown
      - id: micro-behaviors/fs/path/application/config::ai-coding-tool-config-directory-cluster
      - id: micro-behaviors/communications/http/websocket::websocket

  - id: node-websocket-agent-skill-control
    desc: WebSocket commands manage executable agent skills
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/backdoor/control/command-vocab::remote-agent-skill-management-commands
      - id: micro-behaviors/communications/websocket/receive::websocket-message-event-handler
      - id: micro-behaviors/fs/directory/delete::fs-rm-recursive
      - id: micro-behaviors/fs/path/application/config::openclaw-workspace-skills-directory

  - id: obfuscated-node-websocket-command-dispatch
    desc: Obfuscated Node WebSocket command dispatcher
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/websocket::websocket-class
      - id: objectives/anti-static/obfuscation/eval/loader::decoded-property-constructor
      - id: micro-behaviors/data/source/syntax/keyword::js-keyword-function-constructor
      - id: micro-behaviors/crypto/symmetric/xor/loop::xor-modulo-key-loop
      - id: metadata/import/builtin::require-fs
      - id: metadata/import/builtin::require-os
      - id: micro-behaviors/os/env/access::javascript

  # The individual capabilities are useful in legitimate agent software, but
  # this combination is an installable, obfuscated runtime that can receive
  # managed skill instructions and start a hidden detached process. Keep the
  # intent inference here rather than making the neutral process/WebSocket
  # atoms hostile.
  - id: obfuscated-managed-skill-process-loader
    desc: Obfuscated agent installs skills via hidden process
    crit: hostile
    conf: 0.98
    attack: "T1027,T1059.007,T1105,T1564.003"
    mbc: "B0032,B0024,F0011"
    scope: archive
    all:
      - id: agentto-install-managed-skill
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::a0-string-decoder-entrypoint
      - id: micro-behaviors/communications/http/websocket::websocket-headers
      - id: micro-behaviors/process/create/spawn::windowshide-obfuscated-true
      - id: objectives/command-and-control/dropper/execution/network-stage::detached-stdio-obfuscated-options
