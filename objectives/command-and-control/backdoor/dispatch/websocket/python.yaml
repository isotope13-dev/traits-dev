# A Python package that accepts task messages, disables TLS verification, and
# executes decrypted source is a remote task dispatcher, not merely a socket
# client.
defaults:
  platforms: [unix, windows]
  for: [python, whl]
  attack: T1059.006,T1071.001,T1027

traits:
  - id: python-task-execute-message
    desc: Python WebSocket task execution message
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'task[.]execute'
  - id: python-evaluate-action-branch
    desc: Python branches on evaluate action
    crit: notable
    conf: 0.94
    for: [python]
    if:
      type: text
      regex: 'action\s*==\s*["'']evaluate["'']'

composite_rules:
  - id: python-websocket-encrypted-task-worker
    desc: Python package accepts WebSocket tasks and executes decrypted source
    crit: hostile
    conf: 0.99
    for: [whl]
    scope: archive
    all:
      - id: micro-behaviors/communications/websocket/library::python-websockets-client
      - id: python-task-execute-message
      - id: micro-behaviors/process/interpreter/python::compile-exec-mode
      - id: micro-behaviors/communications/socket/ssl::tls-validation-fully-disabled
    any:
      - id: micro-behaviors/crypto/symmetric/decrypt::python-decrypt-method-call
      - id: micro-behaviors/crypto/symmetric/decrypt::python-decrypt-helper-call
  - id: python-websocket-code-command-dispatch
    desc: Python WebSocket command channel executes supplied code
    crit: hostile
    conf: 0.99
    mbc: B0030
    attack: T1059.006,T1071.001
    scope: archive
    all:
      - id: python-evaluate-code-command
      - id: micro-behaviors/data/serialize/json::json-loads-call
      - id: micro-behaviors/process/interpreter/python::eval-builtin
      - id: micro-behaviors/process/interpreter/python::exec-builtin
    any:
      - id: micro-behaviors/communications/websocket/library::python-websockets-client
      - id: micro-behaviors/communications/websocket/library::python-websockets-compat-client
  - id: python-evaluate-code-command
    desc: Python evaluate action reads code
    crit: notable
    conf: 0.96
    near_lines: 20
    all:
      - id: micro-behaviors/data/serialize/json::mapping-get-action-key
      - id: python-evaluate-action-branch
      - id: micro-behaviors/data/serialize/json::mapping-get-code-key

  - id: python-local-socket-code-command-dispatch
    desc: Python socket command channel evaluates supplied code
    crit: hostile
    conf: 0.99
    mbc: B0030
    attack: T1059.006,T1071.001
    for: [whl]
    scope: archive
    all:
      - id: python-evaluate-code-command
      - id: micro-behaviors/data/serialize/json::json-loads-call
      - id: micro-behaviors/process/interpreter/python::eval-builtin
      - id: micro-behaviors/process/interpreter/python::exec-builtin
      - id: micro-behaviors/communications/socket/receive::socket-recv-call
    unless:
      - id: metadata/package/quality/recognized-contexts::h4-debugger-repl-context
