defaults:
  platforms: [linux, macos]
  for: [elf, macho]
  attack: T1071.001,T1059.004
  mbc: B0030

traits:
  - id: websocket-shell-stream-text-marker
    desc: WebSocket shell stream text marker
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?i)\bSHELL stream\b'

  - id: websocket-forkpty-failed-marker
    desc: WebSocket forkpty failure marker
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)\[shell\]\s+forkpty failed'

  - id: websocket-socks-stream-text-marker
    desc: WebSocket SOCKS stream text marker
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?i)\bSOCKS stream\b'

  - id: websocket-socks5-marker
    desc: WebSocket SOCKS5 protocol marker
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?i)\bSOCKS5\b'

  - id: password-json-message-marker
    desc: JSON password message marker
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '(?i)"type":"password","password":'

  - id: password-success-message-marker
    desc: Password success message marker
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '(?i)Password sent successfully'

composite_rules:
  - id: websocket-shell-stream-marker
    desc: WebSocket shell stream marker
    crit: suspicious
    conf: 0.95
    any:
      - id: websocket-shell-stream-text-marker
      - id: websocket-forkpty-failed-marker

  - id: websocket-socks-stream-marker
    desc: WebSocket SOCKS stream marker
    crit: suspicious
    conf: 0.93
    any:
      - id: websocket-socks-stream-text-marker
      - id: websocket-socks5-marker

  - id: password-authenticated-agent-protocol
    desc: Agent password message
    crit: suspicious
    conf: 0.92
    any:
      - id: password-json-message-marker
      - id: password-success-message-marker

  - id: websocket-pty-remote-shell-agent
    desc: Hardcoded-endpoint WebSocket agent with password-authenticated PTY shell tasking
    crit: hostile
    conf: 0.99
    attack: T1071.001,T1059.004,T1105
    all:
      - id: micro-behaviors/communications/http/websocket::websocket-http-upgrade-headers
      - id: micro-behaviors/process/tty/pty::forkpty
      - id: websocket-shell-stream-marker
      - id: password-authenticated-agent-protocol
    any:
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-elf
      - id: micro-behaviors/communications/ip/literal::external-ipv4-port-macho
    unless:
      - id: well-known/app/
      - id: well-known/lib/
