# Node agents that accept a WebSocket command event and hand it to a shell.
# The event names are intentionally protocol-shaped rather than tied to one
# product, so this remains useful for future remote-agent implants.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.007,T1071.001

traits:
  - id: node-command-case-dispatch
    desc: Node command case dispatch
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'case\s*["''](do:exec|do:secure_exec|do:elevated_exec)["'']\s*:'

  - id: node-command-event-handler
    desc: Node command event handler
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(on|once)\(\s*["''](execute_command|do:exec)["'']\s*[,)])'

composite_rules:
  - id: node-remote-command-event-dispatch
    desc: Node remote command event dispatch
    crit: notable
    conf: 0.95
    any:
      - id: node-command-case-dispatch
      - id: node-command-event-handler

  - id: node-websocket-remote-shell-agent
    desc: WebSocket agent dispatches remote commands to a shell
    crit: hostile
    conf: 0.99
    all:
      - id: node-remote-command-event-dispatch
      - id: micro-behaviors/process/create/spawn-minified::shell-bang-true
      - id: micro-behaviors/communications/http/websocket::wss-scheme
