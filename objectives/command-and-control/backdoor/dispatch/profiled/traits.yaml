defaults:
  platforms: [linux, macos, windows, unix]
  for: [scripts]
  attack: T1071.001,T1041,T1105

composite_rules:
  - id: host-profile-exfil-source
    desc: Host profile exfiltration source
    crit: component
    conf: 0.96
    any:
      - id: objectives/exfiltration/stealer/system-info
  - id: remote-fetch-exec-source
    desc: Remote fetched execution source
    crit: component
    conf: 0.96
    any:
      - id: objectives/command-and-control/dropper/staging/memory::applescript-c2-module-exec
      - id: objectives/command-and-control/dropper/execution/eval
      - id: objectives/command-and-control/dropper/delivery/download-execute
      - id: objectives/command-and-control/dropper/delivery/fetch-eval
  - id: profiled-remote-exec-agent
    desc: Profile exfiltration with remote execution
    crit: hostile
    conf: 0.99
    near_lines: 120
    all:
      - id: host-profile-exfil-source
      - id: remote-fetch-exec-source
    unless:
      - id: metadata/library/runtime::update-notifier-npm-client
