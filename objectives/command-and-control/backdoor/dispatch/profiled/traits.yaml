defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1071.001,T1041,T1105

composite_rules:
  - id: host-profile-exfil-source
    desc: Host profile exfiltration source
    crit: component
    conf: 0.96
    any:
      # Require two independent profile/exfiltration indicators. A single
      # `packageVersion` marker is ordinary library metadata, not profiling.
      - id: objectives/exfiltration/stealer/system-info
    needs: 2
  - id: remote-fetch-exec-source
    desc: Remote fetched execution source
    crit: component
    conf: 0.96
    any:
      # Require two execution-capable loader indicators, not merely an
      # absolute URL or remote-response marker.
      - id: objectives/command-and-control/dropper/delivery/fetch-eval
    needs: 2
  - id: profiled-remote-exec-agent
    desc: Profile exfiltration with remote execution
    crit: hostile
    conf: 0.99
    near_lines: 80
    all:
      - id: host-profile-exfil-source
      - id: remote-fetch-exec-source
    unless:
      - id: metadata/library/runtime/
      - id: metadata/library/workerpool/
      - id: metadata/library/ai/
      - id: metadata/library/structure/
      - id: well-known/app/quickemu
