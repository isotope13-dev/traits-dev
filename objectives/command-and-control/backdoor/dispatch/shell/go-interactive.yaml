defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
  mbc: B0030
  attack: T1059.004
traits:
  - id: interactive-shell-string-interactive
    desc: Interactive shell mode strings
    crit: notable
    conf: 0.85
    if:
      type: text
      word: interactive_shell
    unless:
      - id: metadata/file/string/identity::system-shell-basename
  - id: interactive-shell-string-exec-shell
    desc: Interactive shell mode strings
    crit: suspicious
    conf: 0.85
    if:
      type: text
      word: Exec_shell
  - id: interactive-shell-string-execshell
    desc: Interactive shell mode strings
    crit: suspicious
    conf: 0.85
    if:
      type: text
      word: execShell
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
composite_rules:
  - id: interactive-shell-string
    desc: Interactive shell mode strings
    crit: suspicious
    conf: 0.85
    any:
      - id: interactive-shell-string-interactive
      - id: interactive-shell-string-exec-shell
      - id: interactive-shell-string-execshell
