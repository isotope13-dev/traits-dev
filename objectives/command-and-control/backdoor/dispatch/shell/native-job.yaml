defaults:
  platforms: [linux]
  for: [elf]
  attack: T1059.004
  mbc: B0022

traits:
  - id: native-remote-job-schema
    desc: Remote agent job field cluster
    crit: component
    conf: 0.97
    if:
      type: raw
      regex: 'job_id[\s\S]{0,32}command_id[\s\S]{0,32}(status|alive)'
      section: .rodata

  - id: native-terminal-forwarder-rtti
    desc: C++ terminal forwarder marker
    crit: component
    conf: 0.96
    if:
      type: raw
      regex: '(TerminalForwarder|terminal::terminal_thread)'
      section: .rodata

composite_rules:
  - id: native-remote-terminal-tasking
    desc: Native Linux remote terminal tasking
    crit: hostile
    conf: 0.99
    all:
      - id: native-remote-job-schema
      - id: native-terminal-forwarder-rtti
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
