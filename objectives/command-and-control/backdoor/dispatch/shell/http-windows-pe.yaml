---
defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
composite_rules:
- id: dynamic-wininet-c2
  desc: Dynamic WinInet loading with command execution
  crit: hostile
  conf: 0.95
  attack: T1071.001
  all:
  - id: micro-behaviors/communications/http/get::wininet-dynamic-load
  - id: objectives/anti-static/obfuscation/reflection/class::dynamic-load-pattern
  any:
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/process/create/spawn::create-process-a
  - id: micro-behaviors/process/create/exec::winexec
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/package/versioning::pe-version-resource
    - id: well-known/tool/reverse-engineering/windows-debugger/
    - id: well-known/tool/reverse-engineering/ida-debugger::ida-debugger-server
- id: pipe-command-capture-c2
  desc: Pipe command capture with dynamic HTTP loading
  crit: suspicious
  conf: 0.9
  attack: T1059
  all:
  - id: micro-behaviors/communications/ipc/pipe::pipe-io-redirect
  - id: micro-behaviors/communications/http/get::wininet-dynamic-load
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/package/versioning::pe-version-resource
    - id: well-known/tool/reverse-engineering/windows-debugger/
    - id: well-known/tool/reverse-engineering/ida-debugger::ida-debugger-server
- id: winhttp-pipe-command-backdoor
  desc: WinHTTP backdoor with pipe command capture
  crit: hostile
  conf: 0.96
  attack: T1059
  all:
  - id: objectives/command-and-control/infrastructure/blockchain/polygon::polygon-smart-contract-loader-c2
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
  - id: micro-behaviors/communications/ipc/pipe::pipe-io-redirect
  - id: micro-behaviors/process/create/spawn::create-process-w
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
