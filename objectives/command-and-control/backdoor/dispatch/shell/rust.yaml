defaults:
  platforms: [windows]
  for: [rust]
  attack: T1059.003
  mbc: B0030
traits:
  - id: rust-command-handler-signature
    desc: Rust command handler signature
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: pub\s+async\s+fn\s+cmd\s*\(\s*cmd:\s*&str
  - id: rust-command-success-branch
    desc: Rust command success branch
    crit: component
    conf: 0.9
    if:
      type: text
      substr: if output.status.success()
composite_rules:
  - id: rust-windows-command-dispatch
    desc: Rust Windows command dispatch wrapper
    crit: hostile
    conf: 0.97
    all:
      - id: rust-command-handler-signature
      - id: micro-behaviors/process/create/shell/script-host::cmd-exe-c-command
      - id: micro-behaviors/process/create/direct::rust-command-output
      - id: micro-behaviors/process/create/direct::rust-stdout-stderr-return
    any:
      - id: rust-command-success-branch
      - id: micro-behaviors/process/create/direct::rust-process-command
