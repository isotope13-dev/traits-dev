defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
  mbc: B0030
traits:
  - id: rshell-run
    desc: RShellRun function symbol
    crit: notable
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: RShellRun\b
  - id: rshell-init
    desc: RShellInit function symbol
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: RShellInit\b
  - id: rshell-cleanup
    desc: RShellCleanUp function symbol
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: RShellCleanUp\b
  - id: init-rshell-fds
    desc: InitRShellFDS function symbol
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: InitRShellFDS\b
  - id: rshell-packet-handler
    desc: RShell packet handler symbol
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: OnReceivedPacket.{0,30}RShell
  - id: exec-shell-cmd
    desc: ExecShellCmd symbol
    crit: suspicious
    conf: 0.9
    attack: T1059
    if:
      type: text
      regex: ExecShellCmd\b
  - id: run-shell-cmd
    desc: RunShellCmd symbol
    crit: suspicious
    conf: 0.9
    attack: T1059
    if:
      type: text
      regex: RunShellCmd\b
  - id: remote-exec-symbol
    desc: RemoteExec symbol
    crit: suspicious
    conf: 0.9
    attack: T1059
    if:
      type: text
      word: RemoteExec
  - id: exec-command-symbol
    desc: ExecCommand symbol
    crit: suspicious
    conf: 0.9
    attack: T1059
    if:
      type: symbol
      exact: ExecCommand
    unless:
      - id: metadata/binary/framework::dotnet-metadata
  - id: cmd-exec-symbol
    desc: CmdExec remote command symbol
    crit: suspicious
    conf: 0.9
    attack: T1059
    if:
      type: text
      word: CmdExec
composite_rules:
  - id: rshell-function
    desc: Remote shell function pattern
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    any:
      - id: rshell-run
      - id: rshell-init
      - id: rshell-cleanup
      - id: init-rshell-fds
      - id: rshell-packet-handler
  - id: remote-cmd-exec
    desc: Remote command execution pattern
    crit: suspicious
    conf: 0.9
    attack: T1059
    any:
      - id: exec-shell-cmd
      - id: run-shell-cmd
      - id: remote-exec-symbol
      - id: exec-command-symbol
      - id: cmd-exec-symbol
