defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
  mbc: B0030
traits:
  - id: rshell-run
    desc: Runs commands via remote shell
    crit: notable
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: RShellRun\b
  - id: rshell-init
    desc: Initializes remote shell backdoor
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: RShellInit\b
  - id: rshell-cleanup
    desc: Tears down remote shell session
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: RShellCleanUp\b
  - id: init-rshell-fds
    desc: Sets up remote shell I/O FDs
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: InitRShellFDS\b
  - id: rshell-packet-handler
    desc: Handles inbound remote-shell packets
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    if:
      type: text
      regex: OnReceivedPacket.{0,30}RShell
  - id: exec-shell-cmd
    desc: ExecShellCmd shell command routine
    crit: suspicious
    conf: 0.9
    attack: T1059
    if:
      type: text
      regex: ExecShellCmd\b
  - id: run-shell-cmd
    desc: RunShellCmd shell command routine
    crit: suspicious
    conf: 0.9
    attack: T1059
    if:
      type: text
      regex: RunShellCmd\b
  - id: remote-exec-symbol
    desc: Remote command execution routine
    crit: suspicious
    conf: 0.9
    attack: T1059
    if:
      type: text
      word: RemoteExec
  - id: cxx-msg-command-task-symbol
    desc: C++ MsgCmd or MsgRun command task symbol
    crit: component
    conf: 0.98
    attack: T1059.004
    size_min: 500000
    size_max: 8000000
    if:
      type: text
      regex: '_Z6Msg(Cmd|Run)P11_TRANS_INFO'
      section: .strtab
composite_rules:
  - id: rshell-function
    desc: Remote shell function pattern
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    any:
      - id: rshell-run
      - id: rshell-init
      - id: rshell-cleanup
      - id: init-rshell-fds
      - id: rshell-packet-handler
  - id: remote-cmd-exec
    desc: Remote command execution pattern
    crit: suspicious
    conf: 0.9
    attack: T1059
    any:
      - id: exec-shell-cmd
      - id: run-shell-cmd
      - id: remote-exec-symbol
  - id: cxx-rat-command-task-dispatch
    desc: C++ RAT command task dispatch symbols
    crit: hostile
    conf: 0.98
    attack: T1059.004
    all:
      - id: cxx-msg-command-task-symbol
      - id: micro-behaviors/process/create/execv::c-exec-variants
