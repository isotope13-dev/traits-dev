defaults:
  platforms: [android]
  for: [kotlin]
  attack: T1059
  mbc: B0022

traits:
  - id: kotlin-android-js-interface-import
    desc: Kotlin Android JavaScriptInterface import
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: import
      exact: android.webkit.JavascriptInterface
  - id: kotlin-root-shell-helper-import-withnew
    desc: Kotlin withNewRootShell helper import
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: import
      regex: 'withNewRootShell$'
  - id: kotlin-root-shell-helper-import-create
    desc: Kotlin createRootShell helper import
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: import
      regex: 'createRootShell$'
  - id: kotlin-root-shell-helper-import-utils
    desc: Kotlin ShellUtils helper import
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: import
      regex: 'ShellUtils$'
  - id: kotlin-js-exec-bridge-function
    desc: Kotlin JavaScript exec bridge function
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: function
      exact: exec
  - id: kotlin-root-shell-call-withnew
    desc: Kotlin withNewRootShell call
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: withNewRootShell
  - id: kotlin-root-shell-call-create
    desc: Kotlin createRootShell call
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: call
      exact: createRootShell
  - id: kotlin-root-shell-job-call
    desc: Kotlin root shell job execution call
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: newJob
  - id: kotlin-webview-js-callback-loadurl
    desc: Kotlin WebView JavaScript callback loadUrl
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'loadUrl\(\s*jsCode\)|loadUrl\(.{0,120}javascript:'
  - id: kotlin-shell-stdout-stderr-bridge
    desc: Kotlin shell output bridged to JavaScript
    crit: component
    conf: 0.84
    if:
      type: literal
      exact: stdout

composite_rules:
  - id: kotlin-root-shell-helper-import
    desc: Kotlin root shell helper import
    crit: notable
    conf: 0.9
    any:
      - id: kotlin-root-shell-helper-import-withnew
      - id: kotlin-root-shell-helper-import-create
      - id: kotlin-root-shell-helper-import-utils
  - id: kotlin-root-shell-call
    desc: Kotlin root shell call
    crit: notable
    conf: 0.9
    any:
      - id: kotlin-root-shell-call-withnew
      - id: kotlin-root-shell-call-create
  - id: kotlin-webview-root-shell-bridge
    desc: Kotlin WebView exposes root shell bridge
    crit: suspicious
    conf: 0.95
    all:
      - id: kotlin-android-js-interface-import
      - id: kotlin-js-exec-bridge-function
      - id: kotlin-root-shell-call
    any:
      - id: kotlin-root-shell-helper-import
      - id: kotlin-root-shell-job-call
      - id: kotlin-webview-js-callback-loadurl
      - id: kotlin-shell-stdout-stderr-bridge
    needs: 2
  - id: kotlin-webview-root-shell-command-dispatch
    desc: Kotlin WebView dispatches root shell commands
    crit: hostile
    conf: 0.96
    all:
      - id: kotlin-android-js-interface-import
      - id: kotlin-js-exec-bridge-function
      - id: kotlin-root-shell-call
      - id: kotlin-root-shell-helper-import
      - id: kotlin-root-shell-job-call
      - id: kotlin-webview-js-callback-loadurl
