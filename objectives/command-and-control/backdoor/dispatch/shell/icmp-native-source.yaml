defaults:
  platforms: [unix]
  for: [c, cpp]
  attack: T1095

traits:
  - id: icmp-backdoor-banner
    desc: ICMP backdoor source banner
    crit: component
    conf: 0.98
    if:
      type: string_literal
      substr: icmp-backdoor

  - id: raw-icmp-socket-helper
    desc: Raw ICMP socket helper in C/C++
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'socket\s*\(\s*AF_INET\s*,\s*SOCK_RAW\s*,\s*IPPROTO_ICMP\s*\)'

  - id: raw-ip-hdrincl-helper
    desc: Raw socket IP_HDRINCL option in C/C++
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'setsockopt\s*\([^)]{0,120}IP_HDRINCL'

  - id: icmp-sequence-gated-payload
    desc: ICMP payload gated by command sequence number
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'icmp->icmp_seq\s*==\s*(cli|srv)seq'

  - id: icmp-sid-payload-auth
    desc: ICMP payload authenticated with embedded SID
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'strncmp\s*\(\s*payload\s*,\s*SID\s*,\s*strlen\s*\(\s*SID\s*\)\s*\)'

  - id: icmp-ping-pong-session-auth
    desc: ICMP PING/PONG session authentication
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'strcmp\s*\(\s*payload\s*,\s*P(ING|ONG)\s*\)'

  - id: icmp-shell-fd-bridge
    desc: ICMP socket shell FD bridge
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'FD_SET\s*\(\s*rawsock[\s\S]{0,100}FD_SET\s*\(\s*shell'

  - id: icmp-payload-written-to-shell
    desc: ICMP payload written to shell descriptor
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'write\s*\(\s*shell\s*,\s*payload\s*,\s*strlen\s*\(\s*payload\s*\)\s*\)'

  - id: icmp-shell-output-sendpacket
    desc: Shell output over ICMP sendpacket
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'sendpacket\s*\(\s*sbuf\s*,\s*inet_ntoa\s*\(\s*ip->ip_src\s*\)\s*,\s*srvseq\s*\)'

  - id: icmp-stdin-command-sendpacket
    desc: ICMP client reads stdin
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'FD_ISSET\s*\(\s*STDIN_FILENO'

  - id: icmp-command-sendpacket
    desc: ICMP client sends command text
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'sendpacket\s*\(\s*text\s*,\s*host\s*,\s*cliseq\s*\)'

  - id: c-unset-histfile
    desc: C source disables shell history with unsetenv
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'unsetenv\s*\(\s*"HISTFILE"\s*\)'

  - id: popen2-bin-sh-execl
    desc: popen2 /bin/sh execl helper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'execl\s*\(\s*"/bin/sh"\s*,\s*"sh"\s*,\s*"-c"'

  - id: popen2-dup-to-stdin
    desc: popen2 duplicates socket to stdin
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'dup2\s*\(\s*fds\[0\]\s*,\s*STDIN_FILENO\s*\)'

  - id: popen2-stdin-to-stdout
    desc: popen2 duplicates stdin to stdout
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'dup2\s*\(\s*STDIN_FILENO\s*,\s*STDOUT_FILENO\s*\)'

composite_rules:
  - id: icmp-raw-shell-backdoor-server
    desc: Raw ICMP shell backdoor server
    crit: hostile
    conf: 0.98
    all:
      - id: icmp-backdoor-banner
      - id: icmp-sequence-gated-payload
      - id: icmp-sid-payload-auth
      - id: icmp-ping-pong-session-auth
      - id: icmp-shell-fd-bridge
      - id: icmp-payload-written-to-shell
      - id: icmp-shell-output-sendpacket
    any:
      - id: c-unset-histfile
      - id: micro-behaviors/communications/socket/raw::raw-socket-creation-regex

  - id: icmp-raw-shell-backdoor-client
    desc: Raw ICMP shell backdoor client
    crit: hostile
    conf: 0.96
    all:
      - id: icmp-backdoor-banner
      - id: icmp-sequence-gated-payload
      - id: icmp-sid-payload-auth
      - id: icmp-ping-pong-session-auth
      - id: icmp-stdin-command-sendpacket
      - id: icmp-command-sendpacket
    any:
      - id: micro-behaviors/communications/socket/raw::raw-socket-creation-regex
      - id: micro-behaviors/communications/socket/receive::recvfrom-symbol

  - id: raw-icmp-packet-helper
    desc: Raw ICMP packet helper with caller-provided IP header
    crit: suspicious
    conf: 0.95
    all:
      - id: raw-icmp-socket-helper
      - id: raw-ip-hdrincl-helper

  - id: popen2-shell-stdio-bridge
    desc: popen2 shell stdio bridge helper
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/socket/pair::pair
      - id: popen2-bin-sh-execl
      - id: popen2-dup-to-stdin
      - id: popen2-stdin-to-stdout
