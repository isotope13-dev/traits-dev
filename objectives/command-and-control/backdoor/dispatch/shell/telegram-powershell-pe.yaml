defaults:
  platforms: [windows]
  for: [pe]
  attack: T1059.001,T1071.001
  mbc: B0030

composite_rules:
  - id: telegram-powershell-stdio-command-channel
    desc: Telegram bot channel dispatches commands to PowerShell with redirected stdio
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/messaging/send::telegram-bot-send-message
      - id: micro-behaviors/process/create/shell/interpreter::powershell-executable-token
      - id: micro-behaviors/process/create/spawn::dotnet-redirected-stdio
    unless:
      - id: metadata/signed/platform/

