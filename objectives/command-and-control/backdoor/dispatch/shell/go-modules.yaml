defaults:
  platforms: [windows, unix]
  for: [binaries]
  mbc: B0030
traits:
  - id: go-heartbeat-task-loop
    desc: Go HeartBeat/heartbeat worker functions
    crit: suspicious
    conf: 0.95
    for:
      - go
    if:
      type: string_literal
      regex: (heartbeat|HeartBeat)(Task|Loop|Worker)\b
  - id: go-cmd-exec-module-cmd
    desc: Go /cmd. command execution module
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: /cmd\.(ExecShell|execCmd|analysisTask)
  - id: go-cmd-exec-module-v2
    desc: Go v2/cmd command execution module
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: v2/cmd\.(ExecShell|execCmd|analysisTask)
  - id: go-file-transfer
    desc: Go C2 file transfer functions
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (cmd\.(uploadFile|downloadFile|Upload|Download))
  - id: go-xor-encoding
    desc: Go XOR stream operations
    crit: component
    conf: 0.85
    if:
      type: text
      regex: (xorBytes|XORKeyStream)
  - id: go-monitor-worker
    desc: Go monitor worker pattern
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (monitorWorker|workerLoop|TaskLoop)\b
  - id: go-machine-id
    desc: Go machine identification
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (getMachineType|getUuid|GetMachineID)\b
  - id: go-http-post-beacon
    desc: Go HTTP POST beacon pattern
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (DoPost|request\.DoPost|BuildPostData)\b
  - id: go-base64-decode-dup
    desc: Go base64 decode for C2
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: request\.base64Decode|base64\.StdEncoding\.DecodeString
composite_rules:
  - id: go-heartbeat-function
    desc: Go C2 heartbeat function
    crit: suspicious
    conf: 0.95
    any:
      - id: objectives/command-and-control/backdoor/rat/suite::heartbeat-send
      - id: objectives/command-and-control/backdoor/rat/suite::heartbeat-set
      - id: go-heartbeat-task-loop
  - id: go-cmd-exec-module
    desc: Go C2 command execution module
    crit: suspicious
    conf: 0.9
    any:
      - id: go-cmd-exec-module-cmd
      - id: go-cmd-exec-module-v2
  - id: go-c2-implant-heartbeat
    desc: Go C2 implant with heartbeat
    crit: hostile
    conf: 0.95
    attack: T1071.001
    all:
      - id: go-heartbeat-function
      - id: go-cmd-exec-module
      - id: micro-behaviors/process/create/shell/invoke::go-shell-strings
  - id: go-c2-implant-transfer
    desc: Go C2 implant with file transfer
    crit: hostile
    conf: 0.95
    attack: T1105
    all:
      - id: go-heartbeat-function
      - id: go-file-transfer
      - id: micro-behaviors/process/create/shell/invoke::go-shell-strings
  - id: go-c2-implant-monitor
    desc: Go C2 with monitor worker
    crit: hostile
    conf: 0.95
    all:
      - id: go-heartbeat-function
      - id: go-monitor-worker
      - id: go-cmd-exec-module
      - id: micro-behaviors/process/create/shell/invoke::go-shell-strings
  - id: go-c2-implant-full
    desc: Full Go C2 implant
    crit: hostile
    conf: 0.98
    attack: T1071.001
    all:
      - id: go-heartbeat-function
      - id: go-cmd-exec-module
      - id: go-file-transfer
      - id: micro-behaviors/process/create/shell/invoke::go-shell-strings
    any:
      - id: go-xor-encoding
      - id: objectives/evasion/file-hiding/staging::suspicious-hidden-log
      - id: go-machine-id
