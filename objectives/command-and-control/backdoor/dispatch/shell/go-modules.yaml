defaults:
  platforms: [windows, unix]
  for: [binaries]
  mbc: B0030
traits:
- id: go-heartbeat-task-loop
  desc: Go HeartBeat/heartbeat worker functions
  crit: component
  conf: 0.95
  for:
  - go
  if:
    type: string_literal
    regex: (heartbeat|HeartBeat)(Task|Loop|Worker)\b
- id: go-cmd-exec-module-cmd
  desc: Go /cmd. command execution module
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: /cmd\.(ExecShell|execCmd|analysisTask)
- id: go-cmd-exec-module-v2
  desc: Go v2/cmd command execution module
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: v2/cmd\.(ExecShell|execCmd|analysisTask)
- id: go-file-transfer
  desc: Go C2 file transfer functions
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '\bcmd\.(uploadFile|downloadFile|Upload|Download)\b'
  unless:
  - id: well-known/tool/sysadmin/alpine-packages/
  - id: well-known/tool/development/go-toolchain::go-toolchain-distribution
- id: go-http-post-beacon
  desc: Go HTTP POST beacon pattern
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (request\.DoPost|BuildPostData)\b
  unless:
  - id: well-known/tool/sysadmin/alpine-packages::alpine-dogstatsd
  - id: well-known/tool/sysadmin/alpine-packages::alpine-datadog-agent
- id: go-monitor-worker--monitorworker
  desc: Go monitor worker pattern (monitorWorker)
  crit: component
  conf: 0.8
  if:
    type: text
    word: monitorWorker
- id: go-monitor-worker--workerloop
  desc: Go monitor worker pattern (workerLoop)
  crit: component
  conf: 0.8
  if:
    type: text
    word: workerLoop
- id: go-monitor-worker--taskloop
  desc: Go monitor worker pattern (TaskLoop)
  crit: component
  conf: 0.8
  if:
    type: text
    word: TaskLoop
composite_rules:
- id: go-monitor-worker
  desc: Go monitor worker pattern
  crit: component
  conf: 0.8
  any:
  - id: go-monitor-worker--monitorworker
  - id: go-monitor-worker--workerloop
  - id: go-monitor-worker--taskloop
- id: go-heartbeat-function
  desc: Go C2 heartbeat function
  crit: component
  conf: 0.95
  any:
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-send
  - id: objectives/command-and-control/backdoor/tasking/timing::heartbeat-set
  - id: go-heartbeat-task-loop
- id: go-cmd-exec-module
  desc: Go C2 command execution module
  crit: suspicious
  conf: 0.9
  any:
  - id: go-cmd-exec-module-cmd
  - id: go-cmd-exec-module-v2
- id: go-c2-implant-heartbeat
  desc: Go C2 implant with heartbeat
  crit: hostile
  conf: 0.95
  attack: T1071.001
  all:
  - id: go-heartbeat-function
  - id: go-cmd-exec-module
  - id: micro-behaviors/process/create/shell/spawn::go-shell-strings
- id: go-c2-implant-transfer
  desc: Go C2 implant with file transfer
  crit: hostile
  conf: 0.95
  attack: T1105
  all:
  - id: go-heartbeat-function
  - id: go-file-transfer
  - id: micro-behaviors/process/create/shell/spawn::go-shell-strings
- id: go-c2-implant-monitor
  desc: Go C2 with monitor worker
  crit: hostile
  conf: 0.95
  all:
  - id: go-heartbeat-function
  - id: go-monitor-worker
  - id: go-cmd-exec-module
  - id: micro-behaviors/process/create/shell/spawn::go-shell-strings
- id: go-c2-implant-full
  desc: Full Go C2 implant
  crit: hostile
  conf: 0.98
  attack: T1071.001
  all:
  - id: go-heartbeat-function
  - id: go-cmd-exec-module
  - id: go-file-transfer
  - id: micro-behaviors/process/create/shell/spawn::go-shell-strings
  any:
  - id: micro-behaviors/crypto/symmetric/xor/stream
  - id: objectives/evasion/file-hiding/staging::suspicious-hidden-log
  - id: micro-behaviors/os/sysinfo/platform/runtime::go-machine-type-function
- id: go-c2-attack-tasking
  desc: Go heartbeat channel paired with an attack worker
  crit: hostile
  conf: 0.98
  attack: T1071.001,T1498.001
  for: [elf]
  platforms: [linux]
  all:
  - id: objectives/impact/dos/attack/botnet::go-attack-worker-name
  - id: micro-behaviors/data/source/function/names::go-heartbeat-function-name
  - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
