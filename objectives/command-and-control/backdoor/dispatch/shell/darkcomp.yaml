defaults:
  platforms: [windows]
  for: [pe, batch, c, cpp]
  attack: T1059

traits:
  - id: darkcomp-run-cmd-command
    desc: Darkcomp run cmd command
    crit: component
    conf: 0.94
    if:
      type: text
      word: run_cmd
  - id: darkcomp-run-powershell-command
    desc: Darkcomp run powershell command
    crit: component
    conf: 0.94
    if:
      type: text
      word: run_powershell
  - id: darkcomp-upload-chunk-command
    desc: Darkcomp upload chunk command
    crit: component
    conf: 0.94
    if:
      type: text
      word: upload_chunk
  - id: darkcomp-delete-file-command
    desc: Darkcomp delete file command
    crit: component
    conf: 0.94
    if:
      type: text
      word: delete_file
  - id: darkcomp-cmd-start-command
    desc: Darkcomp cmd start command
    crit: component
    conf: 0.94
    if:
      type: text
      word: cmd_start
  - id: darkcomp-cmd-input-command
    desc: Darkcomp cmd input command
    crit: component
    conf: 0.94
    if:
      type: text
      word: cmd_input
  - id: darkcomp-cmd-stop-command
    desc: Darkcomp cmd stop command
    crit: component
    conf: 0.94
    if:
      type: text
      word: cmd_stop
  - id: darkcomp-ps-start-command
    desc: Darkcomp powershell start command
    crit: component
    conf: 0.94
    if:
      type: text
      word: ps_start
  - id: darkcomp-ps-input-command
    desc: Darkcomp powershell input command
    crit: component
    conf: 0.94
    if:
      type: text
      word: ps_input
  - id: darkcomp-ps-stop-command
    desc: Darkcomp powershell stop command
    crit: component
    conf: 0.94
    if:
      type: text
      word: ps_stop
  - id: darkcomp-reregister-command
    desc: Darkcomp reregister command
    crit: component
    conf: 0.94
    if:
      type: text
      word: re_register

composite_rules:
  - id: darkcomp-cmd-session-vocabulary
    desc: Darkcomp cmd session command vocabulary
    crit: component
    conf: 0.94
    all:
      - id: darkcomp-cmd-start-command
      - id: darkcomp-cmd-input-command
      - id: darkcomp-cmd-stop-command

  - id: darkcomp-powershell-session-vocabulary
    desc: Darkcomp PowerShell session command vocabulary
    crit: component
    conf: 0.94
    all:
      - id: darkcomp-ps-start-command
      - id: darkcomp-ps-input-command
      - id: darkcomp-ps-stop-command

  - id: darkcomp-command-vocabulary
    desc: Darkcomp RAT command vocabulary
    crit: suspicious
    conf: 0.98
    all:
      - id: darkcomp-run-cmd-command
      - id: darkcomp-run-powershell-command
      - id: darkcomp-upload-chunk-command
      - id: darkcomp-delete-file-command
      - id: darkcomp-reregister-command
    any:
      - id: darkcomp-cmd-session-vocabulary
      - id: darkcomp-powershell-session-vocabulary
      - id: darkcomp-reregister-command
