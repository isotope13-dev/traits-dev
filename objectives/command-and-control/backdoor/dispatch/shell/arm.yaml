defaults:
  platforms: [linux]
  for: [elf]
  arch: [arm]
  attack: T1059.004
  mbc: E1059.004

composite_rules:
  - id: arm-eabi-socket-shell-backdoor
    desc: ARM TCP backdoor redirects a client to an executable shell
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/socket/syscall::arm-eabi-listening-server
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
      - id: micro-behaviors/process/create/direct::arm-eabi-execve
      - id: micro-behaviors/process/create/direct::arm-eabi-dup2
