defaults:
  platforms: [windows, unix]
  for:
    - go
  mbc: B0024
  attack: T1195.002
traits:
  - id: echo-command-listener-start
    desc: Echo command listener banner
    crit: component
    conf: 0.96
    attack: T1059
    for: [elf]
    platforms: [linux]
    if:
      type: text
      substr: Echo Listener for commands has started
  - id: echo-command-executed
    desc: Echo listener command executed
    crit: component
    conf: 0.96
    attack: T1059
    for: [elf]
    platforms: [linux]
    if:
      type: text
      substr: DEBUG/ECHO_LISTENER/DONE -> Correctly executed command
  - id: echo-command-killed-error
    desc: Echo listener kill error
    crit: component
    conf: 0.9
    attack: T1059
    for: [elf]
    platforms: [linux]
    if:
      type: text
      substr: ECHO_LISTENER/ERROR
composite_rules:
  - id: go-echo-command-backdoor
    desc: Go Echo command backdoor
    crit: hostile
    conf: 0.98
    attack: T1059
    for: [elf]
    platforms: [linux]
    all:
      - id: echo-command-listener-start
      - id: echo-command-executed
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
    any:
      - id: echo-command-killed-error
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
