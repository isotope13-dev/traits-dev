defaults:
  for: [pe, dll]
  platforms: [windows]

composite_rules:
  - id: hardcoded-ip-pipe-command-backdoor
    desc: Hardcoded endpoint with pipe command backdoor
    crit: hostile
    conf: 0.95
    attack: T1059
    all:
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-pe
      - id: micro-behaviors/communications/ipc/pipe::create-pipe
      - id: micro-behaviors/process/create/shell/invoke::cmd-exe-c-command
    any:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/create/exec::shell-execute-a
      - id: objectives/persistence/login/registry/autostart::reg-add-run
      - id: micro-behaviors/fs/file/read::read-file
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor/
