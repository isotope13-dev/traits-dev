defaults:
  platforms:
    - linux
    - unix
    - android
    - macos
    - ios
    - windows
  for: [binaries]
composite_rules:
  - id: cpp-command-backdoor
    desc: C++ command execution backdoor with string concealment
    crit: hostile
    conf: 0.95
    attack: T1059.004
    mbc: B0022
    all:
      - id: micro-behaviors/process/create/direct::cpp-stdlib
      - id: micro-behaviors/process/create/direct::cpp-string
      - id: micro-behaviors/process/create/direct::cpp-exception
      - id: micro-behaviors/process/create/direct::cpp-command-capture
      - id: objectives/anti-static/obfuscation/payload/encrypted::string-concealment
  - id: cpp-backdoor-dispatch-symbols
    desc: C++ backdoor with RunCommand/ProcessRequest/SaveAndExecute symbols
    crit: hostile
    conf: 1.0
    all:
      - id: micro-behaviors/process/create/command-handler::cpp-command-handler-symbols
      - id: micro-behaviors/process/create/command-handler::write-callback-symbol
      - id: micro-behaviors/process/create/command-handler::make-status-string-symbol
      - id: micro-behaviors/process/create/command-handler::get-exe-path-symbol
