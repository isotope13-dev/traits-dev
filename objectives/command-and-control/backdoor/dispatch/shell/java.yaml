defaults:
  platforms: [windows, unix, android]
  for: [java, class]
  attack: T1059
  mbc: B0024

traits:
  - id: remote-command-map-source
    desc: Remote command map source
    crit: component
    conf: 0.88
    if:
      type: text
      word: commandmap
  - id: remote-session-send-source
    desc: Remote session send source
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '(^|\.)Send$'
  - id: android-shell-command-literal
    desc: Android shell command literal
    crit: component
    conf: 0.86
    if:
      type: literal
      exact: shell
  - id: java-commandimpl-class
    desc: Java CommandImpl dispatch class
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: function
      exact: CommandImpl
  - id: java-handlecommand-class
    desc: Java HandleCommand dispatch class
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: function
      exact: HandleCommand
  - id: java-commandinterpreter-class
    desc: Java CommandInterpreter dispatch class
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: function
      exact: CommandInterpreter
  - id: android-do-command-methods
    desc: Android Do-prefixed remote command handlers
    crit: notable
    conf: 0.88
    count_min: 4
    if:
      type: symbol
      kind: function
      regex: '^Do[A-Z]'
  - id: android-root-service-command
    desc: Android service control command literal
    crit: notable
    conf: 0.88
    if:
      type: literal
      regex: '^svc (wifi|power) '
  - id: android-remote-fetch-selectors
    desc: Android remote fetch selector source
    crit: component
    conf: 0.84
    if:
      type: literal
      regex: '^(a\[href\]|\[src\]|link\[href\])$'
  - id: java-utf-command-channel
    desc: Java UTF command channel
    crit: notable
    conf: 0.86
    count_min: 2
    if:
      type: symbol
      kind: call
      regex: '^(writeUTF|readUTF)$'
  - id: java-remote-file-transfer-streams
    desc: Java remote file transfer streams
    crit: notable
    conf: 0.86
    count_min: 2
    if:
      type: symbol
      kind: call
      regex: '^(FileInputStream|FileOutputStream)$'
  - id: java-powershell-recon-command
    desc: Java remote PowerShell recon command literal
    crit: notable
    conf: 0.9
    if:
      type: literal
      regex: '(Invoke-RestMethod|Get-ComputerInfo)'

composite_rules:
  - id: java-command-dispatch-class
    desc: Java command dispatch class
    crit: component
    conf: 0.84
    any:
      - id: java-commandimpl-class
      - id: java-handlecommand-class
      - id: java-commandinterpreter-class
  - id: java-remote-shell-dispatch
    desc: Java remote shell dispatch
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
    any:
      - id: remote-command-map-source
      - id: remote-session-send-source
      - id: android-shell-command-literal
      - id: java-command-dispatch-class
    needs: 2
  - id: android-remote-file-shell-control
    desc: Android remote file shell control
    crit: suspicious
    conf: 0.95
    all:
      - id: java-remote-shell-dispatch
      - id: remote-session-send-source
    any:
      - id: micro-behaviors/fs/directory/readdir::readdir-java
      - id: micro-behaviors/fs/temp/mktemp::mktemp-java
  - id: android-remote-command-surface
    desc: Android remote command surface
    crit: suspicious
    conf: 0.93
    all:
      - id: java-command-dispatch-class
      - id: remote-session-send-source
      - id: android-do-command-methods
    any:
      - id: android-root-service-command
      - id: android-remote-fetch-selectors
      - id: micro-behaviors/fs/directory/readdir::readdir-java
      - id: micro-behaviors/fs/temp/mktemp::mktemp-java
    needs: 2
  - id: java-rat-file-command-channel
    desc: Java RAT file command channel
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/socket/create::java-socket-create
      - id: java-utf-command-channel
    any:
      - id: java-remote-file-transfer-streams
      - id: java-powershell-recon-command
    needs: 1
