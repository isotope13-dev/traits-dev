defaults:
  platforms: [macos]
  for: [macho, dylib, javascript, html]
  attack: T1059,T1071.001
  mbc: B0030

traits:
  - id: update-delay-api-path
    desc: HTTP polling delay API path
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '(?i)/(api/)?(update|poll|refresh)[_-](delay|interval)\b'

composite_rules:
  - id: flutter-webview-remote-command-dispatch
    desc: Flutter WebView remote command dispatch
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/interpreter/webview::flutter-webview-native-invoke-bridge
      - id: micro-behaviors/process/create/shell/runner::remote-execute-symbol
    any:
      - id: update-delay-api-path
      - id: micro-behaviors/process/interpreter/webview::webview-invoke-response-error
      - id: micro-behaviors/process/create/shell/runner
  - id: flutter-webview-generic-remote-command-dispatch
    desc: Flutter WebView generic remote command dispatch
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/interpreter/webview::flutter-webview-js-channel-bridge
      - id: micro-behaviors/process/create/shell/runner::remote-execute-symbol
    any:
      - id: update-delay-api-path
      - id: micro-behaviors/process/interpreter/webview::webview-invoke-response-error
      - id: micro-behaviors/process/create/shell/runner
