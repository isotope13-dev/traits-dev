defaults:
  platforms: [windows, unix]
traits:
  - id: execute-script-class
    desc: Class designed to execute script actions
    crit: suspicious
    conf: 0.85
    for:
      - javascript
      - typescript
    if:
      type: string_literal
      substr: ExecuteScriptAction
composite_rules:
  - id: remote-action-engine
    desc: Remote action/script execution engine
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/process/interpreter/eval::js-function-constructor
    any:
      - id: objectives/execution/interpreter/script/action-engine::action-events-exec
      - id: execute-script-class
