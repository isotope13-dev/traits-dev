# Python Remote Code Execution via Eval
# Detects patterns where remote config/data is executed via eval
# ATT&CK: T1059.006 (Python)
defaults:
  attack: T1059.006
  platforms: [linux, macos, windows, unix, android, ios]
  for: [python]
composite_rules:
- id: remote-config-eval
  desc: Remote configuration executed via eval()
  crit: hostile
  conf: 0.95
  mbc: "E1059"
  all:
  - id: objectives/execution/interpreter/eval/invoke::python-eval
  - id: micro-behaviors/communications/http/client/
  any:
  - id: micro-behaviors/process/interpreter/python::eval-builtin
  - id: objectives/execution/interpreter/eval/remote::eval-config-access
  - id: objectives/execution/interpreter/eval/remote::eval-dict-get
- id: client-config-execution
  desc: HTTP client config execution pattern
  crit: hostile
  conf: 0.93
  mbc: "E1059"
  near_bytes: 500
  all:
  - id: objectives/execution/interpreter/eval/invoke::python-eval
  - id: micro-behaviors/communications/http/lib/urllib::urllib-word
  - id: objectives/execution/interpreter/eval/remote::eval-config-access
- id: config-string-execution
  desc: Configuration string execution
  crit: hostile
  conf: 0.90
  all:
  - id: objectives/execution/interpreter/eval/invoke::python-eval
  any:
  - id: objectives/execution/interpreter/eval/remote::eval-config-access
  - id: objectives/execution/interpreter/eval/remote::eval-client-config
  unless:
  - id: metadata/package/testing/
  downgrade:
    any:
    - id: micro-behaviors/ui/controls/widget::qtwidgets-import
    - id: config-string-execution-cond-1--inline-15152
    - id: config-string-execution-cond-2--inline-15153
traits:
- id: config-string-execution-cond-1--inline-15152
  desc: Regex component marker
  crit: component
  conf: 0.90
  platforms: [unix, windows]
  if:
    type: metrics
    field: "functions.count"
    min: 50
  count_max: 1015153
- id: config-string-execution-cond-2--inline-15153
  desc: Regex component marker
  crit: component
  conf: 0.90
  platforms: [unix, windows]
  if:
    type: metrics
    field: "binary.code_size"
    min: 50000
  count_max: 1015154
