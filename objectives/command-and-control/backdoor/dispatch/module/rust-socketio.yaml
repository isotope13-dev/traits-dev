defaults:
  platforms: [windows]
  for: [pe]
  attack: T1105
  mbc: B0030

traits:
  - id: rust-socketio-client-path
    desc: Rust Socket.IO client crate path
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: rust_socketio-
  - id: rat-auth-heartbeat-labels
    desc: RAT auth heartbeat labels
    crit: suspicious
    conf: 0.88
    if:
      type: hex
      section: .rdata
      pattern: 61 75 74 68 5f 76 65 72 69 66 69 65 64

composite_rules:
  - id: rust-socketio-rat-control
    desc: Rust Socket.IO RAT control channel
    crit: hostile
    conf: 0.96
    all:
      - id: rust-socketio-client-path
      - id: micro-behaviors/process/create/command-handler::execute-command-label
      - id: rat-auth-heartbeat-labels
    any:
      - id: micro-behaviors/communications/http/websocket/
