defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1059.006

traits:
- id: local-http-backdoor-endpoints--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    regex: self\.path\s*==\s*['"]/(probe|stream)['"]

  count_max: 1015130
- id: local-http-backdoor-endpoints--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    regex: self\.path\s*==\s*['"]/(buffer|flush)['"]

  count_max: 1015131
- id: local-http-backdoor-endpoints--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    regex: self\.path\s*==\s*['"]/(commit|capture)['"]

  count_max: 1015132
- id: local-http-backdoor-endpoints--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    regex: self\.path\s*==\s*['"]/(gc)['"]

  count_max: 1015133
- id: localhost-control-port--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.78
  if:
    type: text
    regex: (localhost|127\.0\.0\.1).{0,80}(8000|8001|8002)

  count_max: 1015135
- id: localhost-control-port--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.78
  if:
    type: text
    regex: (8000|8001|8002).{0,80}(localhost|127\.0\.0\.1)

  count_max: 1015136
- id: windows-shell-command-dispatch--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: \b(cmd\.exe|powershell(\.exe)?)\b[\s\S]{0,50}(subprocess\.(Popen|run)|os\.popen)

  count_max: 1015137
- id: windows-shell-command-dispatch--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: \b(cmd\.exe|powershell(\.exe)?)\b[\s\S]{0,50}(subprocess\.(check_output)|os\.popen)

  count_max: 1015138
- id: windows-shell-command-dispatch--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: \b(cmd\.exe|powershell(\.exe)?)\b[\s\S]{0,50}(os\.system)

  count_max: 1015139
- id: capture-route-decorator
  desc: HTTP framework /capture route decorator
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '@(app|api|router)\.(get|post)\([^\n]{0,40}/capture'
- id: capture-add-url-rule
  desc: add_url_rule /capture route
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'add_url_rule\([^\n]{0,40}/capture'
- id: screenshot-capture-api
  desc: Screenshot capture API marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'ImageGrab|\bmss\b|Image\.grab'

composite_rules:
- id: python-injected-code-control-channel
  desc: Injected Python child hook with command code execution
  crit: hostile
  conf: 0.99
  mbc: B0030
  attack: T1059.006,T1546
  for: [whl]
  scope: archive
  all:
  - id: micro-behaviors/process/hook/interception::python-sitecustomize-startup-hook
  - id: micro-behaviors/process/create/subprocess::popen-ast
  - id: micro-behaviors/process/interpreter/python::eval-builtin
  - id: micro-behaviors/process/interpreter/python::exec-builtin
  unless:
  - id: metadata/package/quality/recognized-contexts::h4-debugger-repl-context
  - id: metadata/package/quality/recognized-contexts::h4-debugger-summary
- id: capture-endpoint-screenshot
  desc: Local HTTP capture screenshot handler
  crit: suspicious
  conf: 0.9
  near_lines: 40
  all:
  - id: screenshot-capture-api
  any:
  - id: capture-route-decorator
  - id: capture-add-url-rule
- id: python-local-http-command-backdoor
  desc: Python local HTTP command backdoor
  crit: hostile
  conf: 0.97
  all:
  - id: local-http-backdoor-endpoints
  - id: micro-behaviors/communications/http/server/framework::threaded-python-http-server
  any:
  - id: windows-shell-command-dispatch
  - id: micro-behaviors/process/create/subprocess::process-execution
  - id: capture-endpoint-screenshot
  - id: localhost-control-port
  needs: 2
- id: local-http-backdoor-endpoints
  desc: Local HTTP backdoor endpoints
  crit: component
  conf: 0.9
  any:
  - id: local-http-backdoor-endpoints--rx-1
  - id: local-http-backdoor-endpoints--rx-2
  - id: local-http-backdoor-endpoints--rx-3
  - id: local-http-backdoor-endpoints--rx-4
- id: localhost-control-port
  desc: Localhost control port reference
  crit: component
  conf: 0.78
  any:
  - id: localhost-control-port--rx-5
  - id: localhost-control-port--rx-6
- id: windows-shell-command-dispatch
  desc: Windows shell command dispatch
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  any:
  - id: windows-shell-command-dispatch--rx-7
  - id: windows-shell-command-dispatch--rx-8
  - id: windows-shell-command-dispatch--rx-9
