defaults:
  platforms:
  - macos
  for:
  - macho
  attack: T1071.001
composite_rules:
- id: macos-native-c2-agent
  desc: macOS osascript/codesign C2 agent
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/os/security/gatekeeper::codesign-force-adhoc
  - id: micro-behaviors/process/create/script/osascript::osascript-binary-ref
  - id: micro-behaviors/fs/temp/mktemp::mkstemps-fn
  - id: objectives/evasion/masquerade/identity/user-agent::user-agent-msie8
  any:
  - id: objectives/discovery/host/system::apple-setup-done-ctime
- id: applescript-modular-c2-agent
  desc: AppleScript modular C2 agent
  crit: hostile
  conf: 0.99
  for: [applescript]
  attack: T1071.001,T1059.002,T1105
  all:
  - id: objectives/exfiltration/stealer/system-info::applescript-host-profile-exfil
  - id: objectives/command-and-control/dropper/staging/memory::applescript-c2-module-exec
  any:
  - id: objectives/discovery/host/software::mdfind-bundle-id-query
  - id: objectives/discovery/host/browser/identity::macos-launchservices-default-browser
  - id: objectives/discovery/host/security::csrutil-status-query
- id: applescript-remote-admin-persistence
  desc: AppleScript remote admin persistence backdoor
  crit: hostile
  conf: 0.97
  for: [applescript]
  attack: T1021.004,T1053.003,T1548.004
  all:
  - id: objectives/persistence/system/surface/paths::remote-login-enabled
  - id: objectives/persistence/system/cron/schedule::crontab-file-install
  - id: objectives/privilege-escalation/elevation-control/prompt-escalation::sudo-in-script
  any:
  - id: objectives/credential-access/phishing/lure::hidden-answer
  - id: micro-behaviors/fs/path/config/privesc::etc-sudoers
  - id: micro-behaviors/os/security/directory-service::dscl-cli
  needs: 3
  unless:
  - id: metadata/package/files/ecosystem::conda-shell-activation-layout
