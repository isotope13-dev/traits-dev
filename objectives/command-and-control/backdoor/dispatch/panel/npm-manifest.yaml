defaults:
  platforms: [windows, unix]
  for:
    - package.json
  attack: T1071

traits:
  - id: package-name-server
    desc: Package name identifies server
    crit: component
    conf: 0.75
    if:
      type: value
      path: name
      regex: '[-_]server$'
      case_insensitive: true

composite_rules:
  - id: npm-realtime-rat-control-panel
    desc: npm RAT control panel dependency stack
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/import/npm::msgpack-runtime
      - id: metadata/import/npm::geoip-map-stack
      - id: metadata/import/npm::remote-admin-ui-stack
    any:
      - id: metadata/import/npm::dep-web-push
      - id: metadata/import/npm::dep-adm-zip
      - id: metadata/build/bun::bun-typescript-server
  - id: npm-c2-operator-notification-panel
    desc: npm C2 operator notification panel
    crit: suspicious
    conf: 0.92
    all:
      - id: npm-realtime-rat-control-panel
      - id: metadata/import/npm::dep-web-push
      - id: metadata/import/npm::dep-winston
    any:
      - id: metadata/import/npm::dep-jose
      - id: metadata/package/fields/private::is-private
  - id: npm-compiled-c2-server-panel
    desc: npm compiled C2 server panel
    crit: hostile
    conf: 0.95
    all:
      - id: npm-realtime-rat-control-panel
      - id: metadata/build/bun::bun-cross-platform-compiled-server
      - id: metadata/package/fields/private::is-private
    needs: 2
    any:
      - id: package-name-server
      - id: metadata/import/npm::dep-winston
      - id: metadata/import/npm::dep-adm-zip
      - id: metadata/import/npm::dep-web-push
