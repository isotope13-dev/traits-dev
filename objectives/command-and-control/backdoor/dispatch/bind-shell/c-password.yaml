defaults:
  platforms: [unix]
  for: [c, cpp]
  attack: T1059.004

traits:
- id: c-bind-listenfd
  desc: C binds listen socket
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'bind(listenfd,'
  unless:
  - id: well-known/lib/hpc
  - type: text
    substr: libfabric
  - type: path
    regex: '(^|[\\/])bin[\\/]named[\\/]fuzz\.c$'

- id: c-listen-listenfd
  desc: C listens on socket
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'listen(listenfd,'
  unless:
  - id: well-known/tool/dual-use/shadowsocks-libev::shadowsocks-libev-source
  - id: well-known/lib/hpc
  - type: text
    substr: libfabric

- id: c-accept-listenfd
  desc: C accepts bind socket
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'accept(listenfd,'
  unless:
  - id: well-known/lib/hpc
  - type: text
    substr: libfabric

- id: c-password-prompt-send
  desc: C sends password prompt
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'send(connfd, pprompt'

- id: c-password-recv-buffer
  desc: C receives password
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'recv(connfd, userpass'

- id: c-passfile-crypt-compare
  desc: C checks crypt password
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'crypt(userpass, salt)'

- id: c-dup2-socket-stdin
  desc: C dup2 socket stdin
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'dup2(connfd, 0)'

- id: c-dup2-socket-stdout
  desc: C dup2 socket stdout
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'dup2(connfd, 1)'

- id: c-dup2-socket-stderr
  desc: C dup2 socket stderr
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: 'dup2(connfd, 2)'

- id: c-execl-shell-after-dup2
  desc: C execl shell after dup2
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: 'execl(shell, shell'

- id: c-argv0-process-rename
  desc: C renames argv0 process
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'strcpy\s*\(\s*argv\s*\[\s*0\s*\]\s*,'

composite_rules:
- id: c-bind-listen-accept-loop
  desc: C bind listen accept loop
  crit: suspicious
  conf: 0.94
  all:
  - id: c-bind-listenfd
  - id: c-listen-listenfd
  - id: c-accept-listenfd

- id: c-socket-dup2-stdio
  desc: C dup2 socket stdio
  crit: suspicious
  conf: 0.94
  all:
  - id: c-dup2-socket-stdin
  - id: c-dup2-socket-stdout
  - id: c-dup2-socket-stderr

- id: c-password-gated-bind-shell
  desc: C password gated bind shell
  crit: hostile
  conf: 0.97
  all:
  - id: c-bind-listen-accept-loop
  - id: c-password-prompt-send
  - id: c-password-recv-buffer
  - id: c-passfile-crypt-compare
  - id: c-socket-dup2-stdio
  - id: c-execl-shell-after-dup2
  any:
  - id: c-argv0-process-rename
  - id: micro-behaviors/communications/socket/listen::server-socket-source
