defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: npm-install-runtime-exec
    desc: Runtime npm install via exec
    crit: suspicious
    conf: 0.85
    attack: T1027.009
    if:
      type: ast
      query: |
        (call_expression
          function: [
            (identifier) @fn
            (member_expression property: (property_identifier) @fn)
          ]
          arguments: (arguments (string) @cmd)
          (#match? @fn "^(exec|execSync)$")
          (#match? @cmd "npm\\s+.{0,50}install.{0,50}(axios|socket\\.io[-\\w]*)"))
  - id: npm-prefix-install
    desc: npm install with --prefix flag
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: npm\s+.{0,50}--prefix
  - id: windows-hide-option
    desc: windowsHide option for stealth
    crit: suspicious
    conf: 0.8
    attack: T1564.003
    if:
      type: string_literal
      regex: windowsHide:\s*true
  - id: module-paths-push
    desc: module.paths.push manipulation
    crit: suspicious
    conf: 0.85
    attack: T1574.007
    if:
      type: symbol
      regex: module\\.paths\\.push
  - id: hidden-node-modules
    desc: Hidden .node_modules directory in home
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      substr: .node_modules
  - id: socket-command-handler
    desc: Socket command event handler
    crit: suspicious
    conf: 0.9
    attack: T1059.007
    if:
      type: ast
      query: "((call_expression\n  function: (member_expression\n    object: (identifier) @socket\n    property: (property_identifier) @method)\n  arguments: (arguments\n    (string) @event_name))\n (#eq? @method \"on\")\n (#match? @socket \"^(socket|sock|client|conn|connection|ws)$\")\n (#match? @event_name \"^['\\\"](command|cmd|exec)['\\\"]$\"))\n"
  - id: client-uuid-pattern
    desc: Client UUID identification field
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      word: clientUuid
  - id: process-id-collection
    desc: Process ID collection
    crit: suspicious
    conf: 0.6
    if:
      type: symbol
      regex: process\\.pid
composite_rules:
  - id: runtime-npm-install
    desc: Runtime npm package installation (dependency evasion)
    crit: hostile
    conf: 0.95
    attack: T1027.009
    mbc: E1027
    all:
      - id: npm-install-runtime-exec
      - id: objectives/execution/interpreter/eval/invoke::shell-eval
      - id: npm-prefix-install
  - id: module-path-tampering
    desc: Node.js module path tampering for persistence
    crit: suspicious
    conf: 0.85
    attack: T1574.007
    all:
      - id: module-paths-push
      - id: hidden-node-modules
  - id: rat-command-execution
    desc: Remote Access Trojan with command execution
    crit: hostile
    conf: 0.95
    attack: T1219
    mbc: B0022
    all:
      - id: socket-command-handler
      - id: objectives/command-and-control/channel/http/listener::socket-io
      - id: micro-behaviors/process/create/system::js-child-process
  - id: advanced-rat-evasion
    desc: Advanced RAT with runtime dependency evasion
    crit: hostile
    conf: 0.95
    attack: T1219
    all:
      - id: runtime-npm-install
      - id: module-path-tampering
    any:
      - id: socket-command-handler
      - id: objectives/command-and-control/channel/http/listener::socket-io
  - id: rat-client-fingerprinting
    desc: RAT client fingerprinting and tracking
    crit: suspicious
    conf: 0.85
    attack: T1082
    all:
      - id: client-uuid-pattern
    any:
      - id: process-id-collection
      - id: micro-behaviors/process/user/query::os-homedir-call
