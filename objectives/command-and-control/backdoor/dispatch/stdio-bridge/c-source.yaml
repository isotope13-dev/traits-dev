defaults:
  platforms: [unix]
  for: [c, cpp]
  attack: T1059.004

traits:
  - id: c-bind-port-from-argv
    desc: C bind port from argv
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'sin_port\s*=\s*htons\s*\(\s*atoi\s*\(\s*argv\s*\['
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/app/apache-httpd::source-tree

  - id: c-select-stdin-fd
    desc: C select monitors stdin
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'FD_SET\s*\(\s*STDIN_FILENO'
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: c-write-to-stdout
    desc: C writes buffer to stdout
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'write\s*\(\s*STDOUT_FILENO\s*,'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: metadata/package/files/dependency::native-vendor-dependency-path

  - id: c-read-from-stdin
    desc: C reads buffer from stdin
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'read\s*\(\s*STDIN_FILENO\s*,'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: c-accepted-socket-selected
    desc: C selects accepted socket
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'FD_SET\s*\(\s*\w+\s*,\s*&rset\s*\)'

composite_rules:
  - id: c-stdio-select-loop
    desc: C stdio socket select loop
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/socket/multiplex::select-multiplex
      - id: c-select-stdin-fd
      - id: c-accepted-socket-selected
    unless:
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree

  - id: c-stdio-bidir-pump
    desc: C bidirectional stdio pump
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/socket/receive::recv-symbol
      - id: micro-behaviors/communications/socket/send::send-symbol
      - id: c-write-to-stdout
      - id: c-read-from-stdin

  - id: c-bind-stdio-bridge
    desc: C bind socket stdio bridge
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/socket/listen::server-socket-source
      - id: c-bind-port-from-argv
      - id: c-stdio-select-loop
      - id: c-stdio-bidir-pump
