defaults:
  platforms: [unix]
  for: [c, cpp]
  attack: T1059.004

traits:
composite_rules:
  - id: c-stdio-select-loop
    desc: C stdio socket select loop
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/socket/multiplex::select-multiplex
      - id: micro-behaviors/process/fd/stdio::c-select-stdin-fd
      - id: micro-behaviors/communications/socket/multiplex::c-accepted-socket-selected
    unless:
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree

  - id: c-stdio-bidir-pump
    desc: C bidirectional stdio pump
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/socket/receive::recv-symbol
      - id: micro-behaviors/communications/socket/send::send-symbol
      - id: micro-behaviors/process/fd/stdio::c-write-to-stdout
      - id: micro-behaviors/process/fd/stdio::c-read-from-stdin

  - id: c-bind-stdio-bridge
    desc: C bind socket stdio bridge
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/socket/listen::server-socket-source
      - id: micro-behaviors/communications/socket/bind/source::c-bind-port-from-argv
      - id: c-stdio-select-loop
      - id: c-stdio-bidir-pump
