defaults:
  platforms: [unix, windows, network-appliance]
  for: [lua]

traits:
  - id: lua-register-command-plugin
    desc: Lua command plugin
    crit: component
    conf: 0.78
    if:
      type: text
      word: register_command

  - id: lua-lhost-lport-params
    desc: Lua lhost lport params
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: 'app\.params\["lhost"\].{0,90}app\.params\["lport"\]'

  - id: lua-python-revshell-payload
    desc: Lua embeds Python revshell
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'socket\.AF_INET.{0,160}os\.dup2.{0,160}/bin/sh'

  - id: lua-msfvenom-generator
    desc: Lua msfvenom generator
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: msfvenom

  - id: lua-lolbas-certutil
    desc: Lua certutil reference
    crit: component
    conf: 0.82
    if:
      type: text
      word: certutil

  - id: lua-lolbas-mshta
    desc: Lua mshta reference
    crit: component
    conf: 0.82
    if:
      type: text
      word: mshta

  - id: lua-lolbas-rundll32
    desc: Lua rundll32 reference
    crit: component
    conf: 0.82
    if:
      type: text
      word: rundll32

  - id: lua-lolbas-wmic
    desc: Lua wmic reference
    crit: component
    conf: 0.82
    if:
      type: text
      word: wmic

  - id: lua-certutil-rundll32-chain
    desc: Lua certutil rundll32 chain
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'certutil.{0,260}rundll32'

  - id: lua-shellcode-generator
    desc: Lua shellcode generator
    crit: suspicious
    conf: 0.88
    unless:
      - id: well-known/app/windows-desktop-tools::cmder-vendor-member
    if:
      type: text
      regex: '(shellcode|reverse shell|/bin/sh|cmd\.exe)'
      case_insensitive: true

  - id: lua-posix-fork-call
    desc: Lua posix fork call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: posix.fork

  - id: lua-infinite-loop-text
    desc: Lua infinite loop
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'while\s+true\s+do'

  - id: lua-safe-gate-marker
    desc: Lua safety gate marker
    crit: component
    conf: 0.75
    if:
      type: text
      regex: 'safety gate|SAFE_TOKEN|SAFETY_MARKER|gate_path'
      case_insensitive: true

  - id: lua-c2-host-symbol
    desc: Lua C2 host symbol
    crit: component
    conf: 0.82
    if:
      type: text
      word: C2_HOST

  - id: lua-exfil-host-symbol
    desc: Lua exfil host symbol
    crit: component
    conf: 0.82
    if:
      type: text
      word: EXFIL_HOST

  - id: lua-c2-url-symbol
    desc: Lua C2 URL symbol
    crit: component
    conf: 0.82
    if:
      type: text
      word: C2_URL

  - id: lua-exfil-url-symbol
    desc: Lua exfil URL symbol
    crit: component
    conf: 0.82
    if:
      type: text
      word: EXFIL_URL

  - id: lua-http-exfil-path-atom
    desc: Lua HTTP exfil path atom
    crit: component
    conf: 0.84
    if:
      type: text
      substr: /exfil

  - id: lua-http-ingest-path-atom
    desc: Lua HTTP ingest path atom
    crit: component
    conf: 0.82
    if:
      type: text
      substr: /ingest

  - id: lua-http-gate-path-atom
    desc: Lua HTTP gate path atom
    crit: component
    conf: 0.8
    if:
      type: text
      substr: /gate

  - id: lua-http-register-path-atom
    desc: Lua HTTP register path atom
    crit: component
    conf: 0.8
    if:
      type: text
      substr: /register

  - id: lua-http-commands-path-atom
    desc: Lua HTTP commands path atom
    crit: component
    conf: 0.8
    if:
      type: text
      substr: /commands

  - id: lua-io-popen-text
    desc: Lua io.popen text
    crit: notable
    conf: 0.86
    if:
      type: text
      word: io.popen

  - id: lua-os-execute-text
    desc: Lua os.execute text
    crit: notable
    conf: 0.86
    if:
      type: text
      word: os.execute

  - id: lua-activexobject-text
    desc: Lua emits ActiveXObject script
    crit: notable
    conf: 0.84
    if:
      type: text
      word: ActiveXObject

  - id: lua-wscript-shell-text
    desc: Lua emits WScript Shell script
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: WScript.Shell

  - id: lua-mshta-javascript-text
    desc: Lua emits mshta JavaScript
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'mshta javascript:'

  - id: lua-response-eval-text
    desc: Lua emits response eval script
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: eval(s.ResponseText)

  - id: lua-wmic-xsl-scriptlet
    desc: Lua emits WMIC XSL scriptlet
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: shell.xsl

  - id: lua-lateral-method-table
    desc: Lua lateral movement method table
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'psexec = true, smbexec = true, wmi = true, winrm = true, ssh = true, nc = true'

  - id: lua-impacket-wmiexec
    desc: Lua emits wmiexec command
    crit: component
    conf: 0.84
    if:
      type: text
      word: wmiexec.py

  - id: lua-impacket-winexec
    desc: Lua emits winexec command
    crit: component
    conf: 0.84
    if:
      type: text
      word: winexec.py

  - id: lua-sshpass-command
    desc: Lua emits sshpass command
    crit: component
    conf: 0.84
    if:
      type: text
      word: sshpass

  - id: lua-kerberos-spn-query
    desc: Lua Kerberos SPN query
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: servicePrincipalName

  - id: lua-getuserspns-tool
    desc: Lua GetUserSPNs tool command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      word: GetUserSPNs.py

  - id: lua-appliance-deface-targets
    desc: Lua appliance deface targets
    crit: suspicious
    conf: 0.88
    if:
      type: text
      word: DEFACE_TARGETS

  - id: lua-appliance-admin-paths
    desc: Lua appliance admin paths
    crit: notable
    conf: 0.82
    if:
      type: text
      word: ADMIN_PATHS

  - id: lua-etc-ssh-path
    desc: Lua ssh config path
    crit: component
    conf: 0.82
    if:
      type: text
      substr: /etc/ssh

  - id: lua-id-rsa-name
    desc: Lua id rsa name
    crit: component
    conf: 0.82
    if:
      type: text
      word: id_rsa

  - id: lua-authorized-keys-name
    desc: Lua authorized keys name
    crit: component
    conf: 0.82
    if:
      type: text
      word: authorized_keys

  - id: lua-uci-export-command
    desc: Lua uci export command
    crit: component
    conf: 0.84
    if:
      type: text
      substr: uci export

  - id: lua-appliance-txn-api
    desc: Lua appliance HTTP API
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: 'txn\.get_http_|txn\.set_http_|http\.call\('

  - id: lua-selenium-name
    desc: Lua selenium name
    crit: component
    conf: 0.8
    if:
      type: text
      word: selenium

  - id: lua-phantomjs-name
    desc: Lua phantomjs name
    crit: component
    conf: 0.8
    if:
      type: text
      word: phantomjs

  - id: lua-headless-name
    desc: Lua headless name
    crit: component
    conf: 0.78
    if:
      type: text
      word: headless

  - id: lua-puppeteer-name
    desc: Lua puppeteer name
    crit: component
    conf: 0.8
    if:
      type: text
      word: puppeteer

  - id: lua-playwright-name
    desc: Lua playwright name
    crit: component
    conf: 0.8
    if:
      type: text
      word: playwright

  - id: lua-webdriver-name
    desc: Lua webdriver name
    crit: component
    conf: 0.8
    if:
      type: text
      word: webdriver

  - id: lua-packed-return-function
    desc: Lua packed return loader
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '^return\(function\(\.\.\.\)return\(function'

  - id: lua-string-permutation-decoder
    desc: Lua string permutation decoder
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'function\([A-Za-z]\)local [A-Za-z],[A-Za-z]=[A-Za-z]\[#'

  - id: lua-long-base64-table
    desc: Lua long encoded table
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: 'local\s+[A-Za-z0-9_]+\s*=\s*\{".{16,80}==?".{0,120}".{16,80}==?"'

composite_rules:
  - id: lua-lolbas-tool-command
    desc: Lua LOLBAS command
    crit: suspicious
    conf: 0.88
    any:
      - id: lua-lolbas-certutil
      - id: lua-lolbas-mshta
      - id: lua-lolbas-rundll32
      - id: objectives/command-and-control/dropper/execution/batch::bitsadmin-cmd
      - id: lua-lolbas-wmic

  - id: lua-c2-host-var
    desc: Lua C2 host variable
    crit: notable
    conf: 0.82
    any:
      - id: lua-c2-host-symbol
      - id: lua-exfil-host-symbol
      - id: lua-c2-url-symbol
      - id: lua-exfil-url-symbol

  - id: lua-http-exfil-path
    desc: Lua HTTP exfil path
    crit: suspicious
    conf: 0.86
    any:
      - id: lua-http-exfil-path-atom
      - id: lua-http-ingest-path-atom
      - id: lua-http-gate-path-atom
      - id: lua-http-register-path-atom
      - id: lua-http-commands-path-atom

  - id: lua-sensitive-files
    desc: Lua sensitive file paths
    crit: suspicious
    conf: 0.88
    any:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: lua-etc-ssh-path
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-dir
      - id: lua-id-rsa-name
      - id: lua-authorized-keys-name
      - id: micro-behaviors/os/service/remote::dropbear-ref
      - id: lua-uci-export-command

  - id: lua-browser-automation-list
    desc: Lua browser automation list
    crit: suspicious
    conf: 0.88
    all:
      - id: lua-selenium-name
    any:
      - id: lua-phantomjs-name
      - id: lua-headless-name
      - id: lua-puppeteer-name
      - id: lua-playwright-name
      - id: lua-webdriver-name

  - id: lua-command-plugin-revshell
    desc: Lua command plugin revshell
    crit: hostile
    conf: 0.97
    all:
      - id: lua-register-command-plugin
    any:
      - id: lua-python-revshell-payload
      - id: lua-msfvenom-generator
      - id: lua-certutil-rundll32-chain
      - id: lua-shellcode-generator

  - id: lua-lolbas-payload-plugin
    desc: Lua LOLBAS payload plugin
    crit: hostile
    conf: 0.96
    all:
      - id: lua-register-command-plugin
      - id: lua-lolbas-tool-command
    any:
      - id: lua-c2-host-var
      - id: lua-lhost-lport-params
      - id: lua-shellcode-generator
      - id: lua-msfvenom-generator
      - id: lua-mshta-javascript-text
      - id: lua-wmic-xsl-scriptlet

  - id: lua-activex-lolbas-plugin
    desc: Lua ActiveX LOLBAS plugin
    crit: hostile
    conf: 0.96
    all:
      - id: lua-register-command-plugin
      - id: lua-lolbas-tool-command
      - id: lua-activexobject-text
    any:
      - id: lua-wscript-shell-text
      - id: lua-response-eval-text
      - id: lua-mshta-javascript-text

  - id: lua-fork-bomb
    desc: Lua fork bomb
    crit: hostile
    conf: 0.98
    all:
      - id: lua-posix-fork-call
      - id: lua-infinite-loop-text

  - id: lua-gated-c2-exfil
    desc: Lua gated C2 exfil
    crit: hostile
    conf: 0.96
    all:
      - id: lua-safe-gate-marker
      - id: lua-c2-host-var
    any:
      - id: lua-http-exfil-path
      - id: lua-sensitive-files
      - id: lua-io-popen-text
      - id: lua-appliance-deface-targets

  - id: lua-appliance-recon-exfil
    desc: Lua appliance recon exfil
    crit: hostile
    conf: 0.95
    all:
      - id: lua-appliance-txn-api
      - id: lua-c2-host-var
    any:
      - id: lua-browser-automation-list
      - id: lua-http-exfil-path
      - id: lua-safe-gate-marker

  - id: lua-lateral-command-plugin
    desc: Lua lateral movement command plugin
    crit: hostile
    conf: 0.96
    all:
      - id: lua-register-command-plugin
      - id: lua-lateral-method-table
    any:
      - id: lua-impacket-wmiexec
      - id: lua-impacket-winexec
      - id: lua-sshpass-command

  - id: lua-kerberos-harvest-plugin
    desc: Lua Kerberos ticket harvest plugin
    crit: hostile
    conf: 0.96
    all:
      - id: lua-register-command-plugin
      - id: lua-kerberos-spn-query
      - id: lua-getuserspns-tool
    any:
      - id: lua-os-execute-text
      - id: lua-sensitive-files

  - id: lua-packed-loader
    desc: Lua packed loader
    crit: hostile
    conf: 0.96
    all:
      - id: lua-packed-return-function
    any:
      - id: lua-string-permutation-decoder
      - id: lua-long-base64-table
