defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, vbs]
traits:
  - id: sig-comment-signature-block
    desc: Script signature block comment marker
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "SIG // Begin signature block"
  - id: sig-comment-double-signature-block
    desc: Multiple script signature block markers
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      substr: "SIG // Begin signature block"
