# BPF/eBPF Backdoor Patterns
# Detects BPF-based backdoor techniques including BPFDoor-style packet filter backdoors
# ATT&CK: T1205 (Traffic Signaling)
defaults:
  platforms: [linux]
composite_rules:
  # BPF filter attachment helper
  - id: bpf-attachment
    desc: BPF filter attachment
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/communications/socket/options::options-filter
      - id: micro-behaviors/os/bpf/program/network::so-attach-bpf
  # Raw socket helper
  - id: raw-socket
    desc: Raw packet socket
    crit: notable
    conf: 0.6
    any:
      - id: micro-behaviors/os/bpf/program/network::af-packet
      - id: micro-behaviors/communications/ip/spoof::sock-raw-constant
  # Magic/knock patterns helper
  - id: magic-knock-patterns
    desc: "Magic packet/knock sequences in BPF"
    crit: notable
    conf: 0.7
    any:
  # BPF backdoor (migrated from YARA)
  - id: backdoor
    desc: BPF packet filtering for backdoor
    crit: suspicious
    conf: 0.8
    attack: "T1205"
    all:
      - id: bpf-attachment
      - id: raw-socket
      - id: magic-knock-patterns
  # BPF packet inspection helper
  # NOTE: Require at least 2 indicators to avoid false positives.
  # Individual functions like recvfrom are common in networking code.
  - id: bpf-packet-inspection
    desc: BPF packet inspection components
    crit: notable
    conf: 0.6
    for: [elf, c]
    needs: 2
    any:
      - id: micro-behaviors/os/bpf/network-infra/
      - id: micro-behaviors/os/bpf/program/network/
      - id: micro-behaviors/os/bpf/program/loader/
  # Shell activation helper
  # NOTE: dup2 + execve is extremely common in legitimate programs.
  # Only suspicious in context of /bin/sh execution with fd redirection.
  - id: shell-activation
    desc: Shell execution components
    crit: baseline
    conf: 0.6
    for: [elf, c]
    all:
      - id: micro-behaviors/process/create/shell::bin-sh
    any:
      - id: micro-behaviors/process/fd/dup::dup2
      - id: micro-behaviors/process/create/execv::c-execve
  # Protocol trigger helper
  - id: protocol-trigger
    desc: ICMP/UDP protocol triggers
    crit: baseline
    conf: 0.6
    for: [elf, c]
    any:
      - id: micro-behaviors/communications/ip/services::ipproto-icmp
      - id: micro-behaviors/communications/socket/udp::ipproto-udp
  # BPFDoor-style helper
  # Requires both shell activation AND protocol trigger to be suspicious
  - id: bpfdoor-activation
    desc: BPFDoor activation components
    crit: notable
    conf: 0.85
    for: [elf, c]
    all:
      - id: shell-activation
      - id: protocol-trigger
  # BPFDoor-style backdoor (migrated from YARA)
  - id: bpfdoor-style
    desc: BPFDoor-style packet filter backdoor
    crit: suspicious
    conf: 0.9
    attack: "T1205"
    for: [elf, c]
    all:
      - id: bpf-packet-inspection
      - id: bpfdoor-activation
