defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - php
  mbc: B0030
traits:
- id: wp-user-creation-1
  desc: WordPress user creation API (wp_create_user)
  crit: suspicious
  conf: 0.7
  attack: T1136.001
  if:
    type: text
    word: wp_create_user
  unless:
  - type: text
    substr: "@package WordPress"
  - type: text
    regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
    - id: metadata/library/web-frameworks::wordpress-core-api-symbols
- id: wp-user-creation-2
  desc: WordPress user creation API (WP_User)
  crit: suspicious
  conf: 0.7
  attack: T1136.001
  if:
    type: text
    word: WP_User
  unless:
  - type: text
    substr: "@package WordPress"
  - type: text
    regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
    - id: metadata/library/web-frameworks::wordpress-core-api-symbols
- id: wp-user-creation-3
  desc: WordPress user creation API (username_exists)
  crit: suspicious
  conf: 0.7
  attack: T1136.001
  if:
    type: text
    word: username_exists
  unless:
  - type: text
    substr: "@package WordPress"
  - type: text
    regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
- id: wp-role-assignment
  desc: WordPress role assignment
  crit: suspicious
  conf: 0.7
  attack: T1098
  if:
    type: text
    substr: set_role
- id: wp-plugin-path
  desc: WordPress plugin directory reference
  crit: suspicious
  conf: 0.5
  if:
    type: text
    substr: wp-content/plugins
- id: wp-plugin-path-encoded
  desc: Base64 encoded WordPress plugin path
  crit: suspicious
  conf: 0.85
  mbc: B0032
  attack: T1027
  if:
    type: text
    substr: d3AtY29udGVudC9wbHVnaW5z

- id: wp-mu-plugin-path
  desc: WordPress Must-Use plugin path reference
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: wp-content/mu-plugins
  unless:
  - type: text
    substr: "@package WordPress"
  - type: text
    regex: "WP_UnitTestCase|@group\\s+[A-Za-z0-9_-]+"
  - type: text
    regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
    - id: metadata/library/web-frameworks::wordpress-core-api-symbols

- id: wp-includes-path
  desc: WordPress core includes path reference
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: wp-includes/
  unless:
  - type: text
    substr: "@package WordPress"
  - type: text
    regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
    - id: metadata/library/web-frameworks::wordpress-core-api-symbols

- id: wp-option-manipulation
  desc: WordPress option storage manipulation
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: (update|get|add)_option\s*\(\s*['"]_

  # Raw string patterns for forward_static_call_array (obfuscation)
- id: wp-admin-privilege-escalation
  desc: Assigns administrator role to WordPress user
  crit: suspicious
  conf: 0.95
  attack: T1098
  if:
    type: text
    regex: set_role\s*\(\s*['"]administrator['"]\s*\)

- id: wp-user-hiding-pre
  desc: pre_user_query hook usage
  crit: component
  if:
    type: text
    word: "pre_user_query"

- id: wp-user-hiding-not-trait
  desc: Inequality check in WordPress user list
  crit: component
  if:
    type: text
    regex: "!=|NOT IN"

- id: wp-user-count-manipulation-views
  desc: views_users hook usage
  crit: component
  if:
    type: text
    word: "views_users"

- id: wp-user-count-manipulation-admin
  desc: administrator role reference
  crit: component
  if:
    type: text
    word: "administrator"

composite_rules:
- id: wp-user-count-manipulation
  desc: Manipulates WordPress user list counts (concealment)
  crit: suspicious
  conf: 0.95
  all:
  - id: wp-user-count-manipulation-views
  - id: wp-user-count-manipulation-admin

- id: wp-user-list-manipulation
  desc: WordPress user list manipulation for concealment
  crit: hostile
  conf: 0.98
  any:
  - id: wp-user-hiding-chain
  - id: wp-user-admin-creation-chain

- id: wp-user-hiding-chain
  desc: WordPress user hiding logic
  crit: component
  all:
  - id: wp-user-hiding
  - id: wp-user-count-manipulation

- id: wp-user-admin-creation-chain
  desc: WordPress user hiding + admin creation
  crit: component
  all:
  - id: wp-user-hiding
  - id: wp-rogue-admin-creation

- id: wp-user-hiding
  desc: Hides users from WordPress administrative interface
  crit: suspicious
  conf: 0.9
  unless:
  - id: metadata/library/web-frameworks::wordpress-core-package-doc
  - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
  - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
  - id: metadata/library/web-frameworks::wordpress-core-api-symbols
  all:
  - id: wp-user-hiding-pre
  - id: micro-behaviors/data/text/keywords/wordpress::wp-user-login-field
  - id: wp-user-hiding-not-trait

- id: wp-obfuscated-user-filter-backdoor
  desc: Obfuscated WordPress user hiding backdoor
  crit: hostile
  conf: 0.98
  attack: T1564
  all:
  - id: micro-behaviors/data/text/keywords/wordpress::wp-user-query-filtering
  - id: objectives/anti-static/obfuscation/string/array::php-escaped-string-table-obfuscation
  any:
  - id: objectives/anti-static/obfuscation/imports::dynamic-function-execution
  - id: objectives/command-and-control/backdoor/webshell/obfuscated-dispatch::error-suppress-prefix
  - id: micro-behaviors/communications/http/request/params::request-dup

- id: wp-rogue-admin-creation
  desc: Automated WordPress administrator account creation
  crit: hostile
  conf: 0.98
  attack: T1136.001
  all:
  - id: wp-user-creation
  - id: wp-admin-privilege-escalation

- id: wp-user-creation
  desc: WordPress user creation API
  crit: suspicious
  conf: 0.7
  attack: T1136.001
  any:
  - id: wp-user-creation-1
  - id: wp-user-creation-2
  - id: wp-user-creation-3
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
    - id: metadata/library/web-frameworks::wordpress-core-api-symbols
