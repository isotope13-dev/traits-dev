defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
  attack: "T1505.003"
  mbc: "B0030"
traits:
  - id: binary-http-tunnel-charset
    desc: Binary HTTP tunnel response charset
    crit: suspicious
    conf: 0.96
    if:
      type: string_literal
      exact: "Content-Type: text/plain; charset=x-user-defined"
  - id: post-query-array-base64-decode
    desc: Base64 decodes POST query array
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: encodeBase64.{0,64}base64_decode\(\$_POST\["q"\]\[\$i\]\)
  - id: navicat-tunnel-ui
    desc: Navicat HTTP tunnel tester title
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: Navicat HTTP Tunnel Tester
  - id: navicat-version-my
    desc: Navicat tunnel custom version comment
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: //version my[0-9]+
  - id: navicat-wire-magic
    desc: Navicat tunnel binary header magic
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: GetLongBinary(1111)
  - id: navicat-query-dispatch
    desc: Dispatches POST actn values C and Q
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: \$_POST\["actn"\]\s*==\s*"(C|Q)"
  - id: apache-mod-security-probe
    desc: Probes Apache modules for mod_security2
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: apache_get_modules\(\).{0,48}mod_security2
  - id: navicat-premiumsoft-copyright
    desc: PremiumSoft copyright retained in UI
    crit: notable
    conf: 0.94
    if:
      type: string_literal
      exact: Copyright &copy; PremiumSoft &trade; CyberTech Ltd. All Rights Reserved.
  - id: navicat-helper-getlong
    desc: Navicat wire helper GetLongBinary
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: GetLongBinary
  - id: navicat-helper-getshort
    desc: Navicat wire helper GetShortBinary
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: GetShortBinary
  - id: navicat-helper-getblock
    desc: Navicat wire helper GetBlock
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: GetBlock
  - id: navicat-helper-echoheader
    desc: Navicat wire helper EchoHeader
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: EchoHeader
  - id: navicat-helper-echoconninfo
    desc: Navicat wire helper EchoConnInfo
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: EchoConnInfo
  - id: navicat-helper-echoresult
    desc: Navicat wire helper EchoResultSetHeader
    crit: component
    conf: 0.95
    if:
      type: symbol
      exact: EchoResultSetHeader
composite_rules:
  - id: navicat-wire-helper-vocabulary
    desc: Navicat tunnel binary helper vocabulary
    crit: suspicious
    conf: 0.97
    any:
      - id: navicat-helper-getlong
      - id: navicat-helper-getshort
      - id: navicat-helper-getblock
      - id: navicat-helper-echoheader
      - id: navicat-helper-echoconninfo
      - id: navicat-helper-echoresult
    needs: 4
  - id: mysql-http-tunnel
    desc: HTTP POST to MySQL binary tunnel
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/request::post-dup
      - id: binary-http-tunnel-charset
      - id: navicat-wire-magic
      - id: navicat-wire-helper-vocabulary
    any:
      - id: micro-behaviors/data/db/conn/mysql::php-mysql-admin-surface
      - id: micro-behaviors/data/db/conn/mysql::php-mysqli-admin-surface
      - id: navicat-query-dispatch
    needs: 2
  - id: mysql-http-tunnel-obfuscated-query-relay
    desc: SQL relay decodes POST base64 queries
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/request::post-dup
      - id: post-query-array-base64-decode
    any:
      - id: micro-behaviors/data/db/conn/mysql::php-mysql-query
      - id: micro-behaviors/data/db/conn/mysql::php-mysqli-query
  - id: mysql-http-tunnel-test-ui
    desc: Database tunnel exposes browser test UI
    crit: suspicious
    conf: 0.96
    all:
      - id: navicat-tunnel-ui
    any:
      - id: apache-mod-security-probe
      - id: navicat-premiumsoft-copyright
      - id: navicat-version-my
