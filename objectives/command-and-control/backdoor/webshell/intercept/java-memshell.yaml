composite_rules:
  - id: java-server-filterchain-inject-target
    desc: Targets servlet request filter chain
    crit: notable
    conf: 0.86
    any:
      - id: tomcat-application-filter-chain
      - id: servlet-internal-dofilter
  - id: java-instrumentation-retransform-memshell
    desc: Agent retransforms filter chain for memshell
    crit: hostile
    conf: 0.95
    for: [java, class, java_class, jar]
    all:
      - id: java-instrumentation-retransform
      - id: java-server-filterchain-inject-target
    any:
      - id: java-agent-dynamic-attach-entry
      - id: java-instrumentation-add-transformer
      - id: javassist-method-body-insert-source
      - id: javassist-bytecode-builder-source
  - id: servlet-mapper-field-source
    desc: Servlet mapper reflective field source
    crit: component
    conf: 0.84
    any:
      - id: servlet-mapper-field-servletmapper
      - id: servlet-mapper-field-webapp
  - id: java-servlet-filter-memshell-injector
    desc: Java servlet filter memshell injector
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
      - id: java-reflection-accessible-source
      - id: servlet-filter-register-source
    any:
      - id: servlet-filter-manager-source
      - id: webapp-runtime-context-reflect-source
      - id: servlet-context-reflect-field-source
    needs: 2
  - id: java-runtime-filter-memshell-registration
    desc: Java runtime filter memshell registration
    crit: suspicious
    conf: 0.94
    all:
      - id: servlet-filter-register-source
