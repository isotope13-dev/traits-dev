defaults:
  platforms: [windows, unix]
  for: [java, class]
  attack: T1505.003
  mbc: B0030

traits:
  - id: java-reflection-accessible-source
    desc: Java reflection accessibility override
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: setAccessible
  - id: servlet-filter-register-source
    desc: Servlet filter registration source
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: registerFilter
  - id: servlet-filter-manager-source
    desc: Servlet filter manager source
    crit: component
    conf: 0.88
    if:
      type: literal
      exact: getFilterManager
  - id: webapp-runtime-context-reflect-source
    desc: WebApp runtime context reflection
    crit: component
    conf: 0.88
    if:
      type: literal
      exact: WebAppRuntimeMBeanImpl
  - id: servlet-context-reflect-field-source
    desc: Servlet context reflective field
    crit: component
    conf: 0.86
    if:
      type: literal
      exact: context
  - id: servlet-listener-register-source
    desc: Servlet listener runtime registration source
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: addApplicationEventListener
  - id: servlet-listener-array-source
    desc: Servlet listener array replacement source
    crit: notable
    conf: 0.88
    if:
      type: literal
      exact: setApplicationEventListeners
  - id: tomcat-valve-add-source
    desc: Tomcat valve runtime add source
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: addValve
  - id: tomcat-pipeline-source
    desc: Tomcat pipeline reflection source
    crit: component
    conf: 0.86
    if:
      type: literal
      exact: getPipeline
  - id: weblogic-servlet-mapping-source
    desc: WebLogic servlet mapping mutation source
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: getServletMapping
  - id: weblogic-servlet-stub-source
    desc: WebLogic servlet stub construction source
    crit: component
    conf: 0.9
    if:
      type: literal
      exact: weblogic.servlet.internal.ServletStubImpl
  - id: servlet-add-source
    desc: Servlet runtime add source
    crit: notable
    conf: 0.88
    if:
      type: literal
      exact: addServlet
  - id: servlet-mapping-add-source
    desc: Servlet mapping runtime add source
    crit: notable
    conf: 0.88
    if:
      type: literal
      exact: addMapping
  - id: servlet-mapper-field-servletmapper
    desc: ServletMapper reflective field source
    crit: component
    conf: 0.84
    if:
      type: literal
      exact: servletMapper
  - id: servlet-mapper-field-webapp
    desc: Webapp reflective field source
    crit: component
    conf: 0.84
    if:
      type: literal
      exact: webapp
  - id: websocket-command-endpoint-source
    desc: WebSocket command endpoint source
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: import
      exact: javax.websocket.Endpoint
  - id: websocket-message-handler-source
    desc: WebSocket message handler source
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: import
      exact: javax.websocket.MessageHandler
  - id: websocket-sendtext-source
    desc: WebSocket remote sendText source
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      exact: sendText
  - id: websocket-onmessage-source
    desc: WebSocket message callback source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: function
      exact: onMessage
  - id: websocket-inputstream-dispatch-source
    desc: WebSocket input stream command dispatch source
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: function
      exact: getInputStream
  - id: javassist-bytecode-builder-source
    desc: Javassist bytecode builder source
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: import
      regex: '^javassist(\.|$)'
  - id: javassist-method-body-source
    desc: Javassist method body patch source
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: setBody
  - id: javassist-remove-sourcefile-source
    desc: Javassist source file attribute removal source
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: removeSourceFileAttribute
  - id: java-agent-manifest-source
    desc: Java agent manifest entry source
    crit: notable
    conf: 0.9
    if:
      type: literal
      regex: '^(Premain-Class|Agent-Class)$'
  - id: java-bcel-loader-builder-source
    desc: Java BCEL loader builder source
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: generatorBCELoaderClass

composite_rules:
  - id: servlet-mapper-field-source
    desc: Servlet mapper reflective field source
    crit: component
    conf: 0.84
    any:
      - id: servlet-mapper-field-servletmapper
      - id: servlet-mapper-field-webapp
  - id: java-servlet-filter-memshell-injector
    desc: Java servlet filter memshell injector
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
      - id: java-reflection-accessible-source
      - id: servlet-filter-register-source
    any:
      - id: servlet-filter-manager-source
      - id: webapp-runtime-context-reflect-source
      - id: servlet-context-reflect-field-source
    needs: 2
  - id: java-servlet-listener-memshell-injector
    desc: Java servlet listener memshell injector
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
      - id: java-reflection-accessible-source
    any:
      - id: servlet-listener-register-source
      - id: servlet-listener-array-source
      - id: webapp-runtime-context-reflect-source
      - id: servlet-context-reflect-field-source
    needs: 2
  - id: java-tomcat-valve-memshell-injector
    desc: Java Tomcat valve memshell injector
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
      - id: java-reflection-accessible-source
      - id: tomcat-valve-add-source
    any:
      - id: tomcat-pipeline-source
      - id: servlet-context-reflect-field-source
    needs: 1
  - id: java-weblogic-servlet-memshell-injector
    desc: Java WebLogic servlet memshell injector
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
      - id: java-reflection-accessible-source
      - id: weblogic-servlet-mapping-source
    any:
      - id: weblogic-servlet-stub-source
      - id: webapp-runtime-context-reflect-source
      - id: servlet-context-reflect-field-source
    needs: 2
  - id: java-servlet-mapping-memshell-injector
    desc: Java servlet mapping memshell injector
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
      - id: java-reflection-accessible-source
      - id: servlet-add-source
      - id: servlet-mapping-add-source
    any:
      - id: servlet-mapper-field-source
      - id: servlet-context-reflect-field-source
    needs: 1
  - id: java-websocket-command-memshell
    desc: Java WebSocket command memshell
    crit: suspicious
    conf: 0.93
    all:
      - id: websocket-command-endpoint-source
      - id: websocket-sendtext-source
      - id: websocket-onmessage-source
      - id: websocket-inputstream-dispatch-source
    any:
      - id: websocket-message-handler-source
      - id: objectives/command-and-control/backdoor/dispatch/shell::java-command-dispatch-class
      - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
    needs: 1
  - id: java-memshell-bytecode-generator
    desc: Java memshell bytecode generator
    crit: suspicious
    conf: 0.93
    all:
      - id: javassist-bytecode-builder-source
    any:
      - id: javassist-method-body-source
      - id: javassist-remove-sourcefile-source
      - id: java-bcel-loader-builder-source
      - id: java-agent-manifest-source
    needs: 1
