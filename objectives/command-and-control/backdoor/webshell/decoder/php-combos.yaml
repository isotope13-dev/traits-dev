---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - php
  mbc: B0030
  attack: T1505.003
traits:
- id: eval-base64-large-payload
  desc: Decodes a large embedded payload (base64)
  crit: suspicious
  conf: 0.99
  if:
    type: text
    regex: base64_decode\s*\(["'][A-Za-z0-9+/=]{500,}
  unless:
  - id: well-known/lib/benign-runtime-bundles::php-source-tree
composite_rules:
- id: php-decoder-eval-webshell
  desc: PHP decoder eval webshell
  crit: hostile
  conf: 0.97
  all:
  - id: objectives/command-and-control/backdoor/webshell/decoder::eval-decoder-chain
  any:
  - id: objectives/command-and-control/backdoor/webshell/decoder::hardcoded-urldecode-payload
  - id: eval-base64-large-payload
  - id: micro-behaviors/process/interpreter/eval::eval-gzinflate-base64
  - id: micro-behaviors/process/interpreter/eval::eval-gzuncompress-base64
  - id: micro-behaviors/process/interpreter/eval::eval-user-input
  - id: micro-behaviors/communications/http/request/params::get-dup
  - id: micro-behaviors/communications/http/request/params::post-dup
  - id: micro-behaviors/communications/http/request/params::request-dup
  unless:
  - id: metadata/lang/source::yara-rule-source
