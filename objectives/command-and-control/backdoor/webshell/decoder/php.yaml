defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: B0030
  attack: T1505.003
traits:
- id: eval-decoder-chain--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\beval\s*\(\s*(base64_decode|str_rot13)\s*\('
  count_max: 1016136
- id: eval-decoder-chain--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\beval\s*\(\s*(gzinflate|gzuncompress)\s*\('
  count_max: 1016137
- id: eval-decoder-chain--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\beval\s*\(\s*(gzdecode|strrev)\s*\('
  count_max: 1016138
- id: hardcoded-urldecode-payload
  desc: Hardcoded URL-decoded payload
  crit: suspicious
  conf: 0.92
  attack: T1027
  if:
    type: text
    regex: 'urldecode\s*\(\s*[''"](%[0-9A-Fa-f]{2}){4,}[''"]\s*\)'
  unless:
  - id: well-known/lib/benign-runtime-bundles::php-source-tree
- id: php-fopo-eval-marker
  desc: FOPO obfuscated eval marker
  crit: suspicious
  conf: 0.96
  attack: T1027
  if:
    type: text
    substr: '";@eval('
- id: encoded-dangerous-php-base64--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(ZXZhbCg|c3lzdGVt)'
  count_max: 1016141
- id: encoded-dangerous-php-base64--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(cHJlZ19yZXBsYWNl|ZXhlYyg)'
  count_max: 1016142
- id: encoded-dangerous-php-base64--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(Y21kLmV4ZQ|cG93ZXJzaGVsbC5leGU)'
  count_max: 1016143
- id: escaped-hex-dangerous-php
  desc: Hex escaped PHP danger keywords
  crit: suspicious
  conf: 0.92
  attack: T1027
  if:
    type: text
    regex: '(\\x65\\x76\\x61\\x6[cC]|\\x65\\x78\\x65\\x63|\\x73\\x79\\x73\\x74\\x65\\x6d)'
- id: hpack-dangerous-php
  desc: Hpack hex PHP danger keywords
  crit: suspicious
  conf: 0.88
  attack: T1027
  if:
    type: text
    regex: '(6576616[cC]28|73797374656d|707265675f7265706c616365|61736536345f6465636f6465)'
- id: reversed-dangerous-php--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(slabolg|ecalper_gerp)'
  count_max: 1016146
- id: reversed-dangerous-php--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(edoced_46esab|etalfnizg)'
  count_max: 1016147
- id: reversed-dangerous-php--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(metsys|urhtssap)'
  count_max: 1016148
- id: cookie-sourced-payload-decoder
  desc: Cookie value decoded via gzinflate/base64
  crit: suspicious
  conf: 0.94
  attack: T1027
  if:
    type: text
    regex: str_replace[\s\S]{0,240}\$_COOKIE[\s\S]{0,240}(gzinflate|base64_decode)
composite_rules:
- id: eval-decoder-chain
  desc: eval decoder execution chain
  crit: suspicious
  conf: 0.95
  attack: T1059.006
  any:
  - id: eval-decoder-chain--rx-1
  - id: eval-decoder-chain--rx-2
  - id: eval-decoder-chain--rx-3
  unless:
  - id: metadata/lang/source::yara-rule-source
  - id: well-known/tool/detection/security-scanner::anteumbra-package-tree-member
- id: encoded-dangerous-php-base64
  desc: Base64 encoded PHP danger keywords
  crit: suspicious
  conf: 0.9
  attack: T1027
  any:
  - id: encoded-dangerous-php-base64--rx-4
  - id: encoded-dangerous-php-base64--rx-5
  - id: encoded-dangerous-php-base64--rx-6
- id: reversed-dangerous-php
  desc: Reversed PHP danger keywords
  crit: suspicious
  conf: 0.9
  attack: T1027
  any:
  - id: reversed-dangerous-php--rx-7
  - id: reversed-dangerous-php--rx-8
  - id: reversed-dangerous-php--rx-9
