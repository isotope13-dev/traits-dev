---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
  attack: T1505.003
traits:
- id: sensitive-path-panel--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: "(/etc/(passwd|shadow|resolv\\.conf)|\\.ssh/authorized_keys)"
  count_max: 1016576
- id: sensitive-path-panel--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: "(id_rsa|\\.bash_history)"
  count_max: 1016577
- id: sensitive-path-panel--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: "(\\.mysql_history|/proc/cpuinfo)"
  count_max: 1016578
- id: sensitive-path-panel--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: "(/var/log/lastlog)"
  count_max: 1016579
- id: recon-command-panel--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: "(whoami|uname -a)"
  count_max: 1016580
- id: recon-command-panel--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: "(ipconfig|netstat -an)"
  count_max: 1016581
- id: recon-command-panel--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: "(ps -aux|ls -la)"
  count_max: 1016582
- id: recon-command-panel--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: "(find \\. -type f|cmd\\.exe)"
  count_max: 1016583
- id: recon-command-panel--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: "(powershell\\.exe|nc -l)"
  count_max: 1016584
composite_rules:
- id: sensitive-path-panel
  desc: Sensitive server path panel
  crit: suspicious
  conf: 0.9
  attack: T1083
  any:
  - id: sensitive-path-panel--rx-6
  - id: sensitive-path-panel--rx-7
  - id: sensitive-path-panel--rx-8
  - id: sensitive-path-panel--rx-9
  unless:
  - id: metadata/package/quality/false-positives::phpstan-phar-path
  - id: metadata/package/quality/recognized-contexts::wordpress-w3-ftp-configuration-context
  - id: metadata/lang/source::yara-rule-source
  - id: well-known/tool/detection/security-scanner::anteumbra-package-tree-member
  - id: metadata/package/testing/presence/fixture::php-security-test-context
- id: recon-command-panel
  desc: Server recon command panel
  crit: suspicious
  conf: 0.88
  attack: T1082
  any:
  - id: recon-command-panel--rx-10
  - id: recon-command-panel--rx-11
  - id: recon-command-panel--rx-12
  - id: recon-command-panel--rx-13
  - id: recon-command-panel--rx-14
  unless:
  - id: metadata/package/quality/false-positives::phpstan-phar-path
  - id: metadata/lang/source::yara-rule-source
  - id: well-known/tool/detection/security-scanner::anteumbra-package-tree-member
  - id: metadata/package/testing/presence/fixture::php-security-test-context
