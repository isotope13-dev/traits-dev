# .NET Web Shell Objectives
#
# Detects .NET-based web shells by combining HTTP interception capabilities.
#
# MBC: B0030 (C2 Communication)
# ATT&CK: T1505.003 (Server Software Component: Web Shell)

defaults:
  platforms: [windows]
  for: [binaries, scripts]

composite_rules:
  - id: dotnet-header-webshell
    desc: .NET header-driven reflective web shell
    crit: hostile
    conf: 0.95
    attack: T1505.003
    all:
      - id: micro-behaviors/communications/http/server/managed::http-context
      - id: micro-behaviors/communications/http/server/managed::http-headers-access
      - id: objectives/anti-static/obfuscation/reflection/class::dotnet-assembly-load
    any:
      - id: micro-behaviors/communications/http/server/managed::http-request-get
      - id: micro-behaviors/communications/http/server/managed::http-response-get
      - id: micro-behaviors/communications/http/server/managed::name-value-collection
    unless:
      - id: metadata/binary/framework::dotnet-system-diagnostics-process-bcl

  - id: dotnet-reflective-webshell
    desc: .NET reflective memory web shell
    crit: hostile
    conf: 0.98
    attack: T1505.003
    all:
      - id: micro-behaviors/communications/http/server/managed::http-context
      - id: objectives/anti-static/obfuscation/reflection/invoke::dotnet-assembly-load-invoke

  - id: dotnet-deserialization-payload
    desc: .NET constructor-based deserialization payload
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/binary/framework::constructor-execution
      - id: metadata/binary/metrics::tiny-dotnet
    any:
      - id: micro-behaviors/communications/http/server/managed::http-context
      - id: objectives/evasion/process/injection::module-stomping-target

  - id: tiny-dotnet-web-interceptor
    desc: Unusually small .NET binary with web interception capabilities
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/communications/http/server/managed::http-context
      - id: metadata/binary/metrics::tiny-dotnet
