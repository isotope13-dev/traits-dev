defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: rack-sendfile-hook
    desc: Rack Sendfile hook
    crit: component
    conf: 0.85
    attack: T1059
    if:
      type: string_value
      regex: rack/sendfile|Rack::Sendfile
  - id: rails-production-env
    desc: Rails production check
    crit: notable
    conf: 0.65
    attack: T1190
    if:
      type: string_value
      regex: Rails\.env\.production|env\.production\?
  - id: alias-method-call
    desc: Method aliasing
    crit: component
    conf: 0.7
    attack: T1059
    if:
      type: string_value
      regex: alias_method
  - id: http-cookie-access
    desc: HTTP cookie access (lowercase form)
    crit: notable
    conf: 0.75
    attack: T1190
    if:
      type: string_value
      substr: http_cookie
  - id: cookie-pattern-extract
    desc: Cookie pattern extraction
    crit: suspicious
    conf: 0.8
    attack: T1190
    if:
      type: string_value
      regex: __cfduid|cookie.{0,50}scan|scan.{0,50}cookie
  - id: rescue-exception-nil
    desc: Exception swallowing
    crit: suspicious
    conf: 0.75
    attack: T1070
    if:
      type: string_value
      regex: rescue Exception
composite_rules:
  - id: rack-middleware-backdoor
    desc: Rack middleware backdoor
    crit: suspicious
    conf: 0.95
    attack: T1059
    needs: 4
    any:
      - id: rack-sendfile-hook
      - id: http-cookie-access
      - id: micro-behaviors/data/decode/base64::base64-urlsafe-decode
      - id: objectives/execution/interpreter/eval/dynamic::eval-call-ruby
      - id: alias-method-call
  - id: cookie-code-injection
    desc: Cookie-based code injection
    crit: suspicious
    conf: 0.93
    attack: T1059
    needs: 3
    any:
      - id: http-cookie-access
      - id: cookie-pattern-extract
      - id: micro-behaviors/data/decode/base64::base64-urlsafe-decode
      - id: objectives/execution/interpreter/eval/dynamic::eval-call-ruby
