defaults:
  platforms: [unix, windows]
  for: [php]
  size_min: 1000
  size_max: 2000000
  attack: "T1505.003"
  mbc: "B0030"
traits:
  - id: family-banner
    desc: Cyber Shell version banner
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: "<center>.:Cyber Shell (v 1.0):.<br>Copyright"
  - id: family-lite
    desc: Lite php web shell banner
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: "*   Lite version of php web shell"
  - id: family-author
    desc: Pixcher author marker
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: "*   Coded by Pixcher"
  - id: family-domain
    desc: Cyber Lords domain marker
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: "http://www.cyberlords.net"
  - id: default-password
    desc: Default shell password
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: "$aupassword=\"test\";"
  - id: hidden-mode
    desc: Hidden mode toggle
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: "$hiddenmode=\"true\","
  - id: session-auth
    desc: Session md5 auth
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: "$_SESSION[aupass]=md5($aupassword);"
  - id: image-endpoint
    desc: Self image endpoint
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "echo base64_decode($img[$imgname]);"
  - id: tracker-gmail
    desc: Hidden tracking mailbox
    crit: suspicious
    conf: 0.99
    if:
      type: text
      exact: "john.barker446@gmail.com"
  - id: tracker-remote-addr
    desc: Tracks client remote address
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "$c87 = $_SERVER['REMOTE_ADDR'];"
  - id: tracker-script-path
    desc: Tracks script filename path
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "$d23 = $_SERVER['SCRIPT_FILENAME'];"
  - id: tracker-server-addr
    desc: Tracks server local address
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "$e09 = $_SERVER['SERVER_ADDR'];"
  - id: tracker-server-software
    desc: Tracks server software banner
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "$f23 = $_SERVER['SERVER_SOFTWARE'];"
  - id: tracker-php-self
    desc: Tracks PHP self route
    crit: component
    conf: 0.95
    if:
      type: text
      exact: "$h65 = $_SERVER['PHP_SELF'];"
  - id: file-download
    desc: Download action
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: "if (!empty($_GET[downloadfile])) downloadfile($_GET[downloadfile]);"
  - id: mail-exfil
    desc: File mail exfil action
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: "if (!empty($_GET[mailfile])) anonim_mail($email,$email,$_GET[mailfile],'File: '.$_GET[mailfile],$_GET[mailfile]);"
  - id: file-upload
    desc: File upload action
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: "move_uploaded_file($userfile, $dest);"
  - id: file-rename
    desc: File rename action
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "rename($fr1,$to1);"
  - id: file-mkdir
    desc: Directory creation action
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "mkdir($newdir,\"7777\");"
  - id: file-unlink
    desc: File deletion action
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "$deleted = unlink(\"$delfile\");"
  - id: file-recursive-delete
    desc: Recursive deletion
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: "deletedir($directory.\"/\".$file);"
  - id: dir-listing
    desc: Directory listing loop
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "while (($file=readdir($dir))!==false) {"
  - id: bind-socket
    desc: Perl bind socket
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: "bind(S, sockaddr_in(\\$port, INADDR_ANY));"
  - id: bind-shell
    desc: Perl shell spawn
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: "exec(\\\"/bin/sh\\\");"
  - id: bind-updatedb
    desc: updatedb masquerade
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: "$0 = \"updatedb\" . \" \" x100;"
  - id: bind-launch
    desc: Perl bind launch
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: "system(\"perl $d/$bfileneme\");"
  - id: recon-uname
    desc: Uname reconnaissance
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "$os=exec(\"uname\");"
  - id: recon-cpu-ghz
    desc: CPU GHz reconnaissance
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "$ghz=exec(\"cat /proc/cpuinfo | grep GHz\");"
  - id: recon-cpu-mhz
    desc: CPU MHz reconnaissance
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "$mhz=exec(\"cat /proc/cpuinfo | grep MHz\");"
  - id: recon-id
    desc: User id reconnaissance
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "$my_id=exec(\"id\");"
  - id: mysql-connect
    desc: MySQL connection routine
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: "mysql_connect($db_server, $db_user, $db_pass) or die(\""
  - id: mysql-show-dbs
    desc: MySQL show databases action
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "$re=mysql_query(\"show databases\");"
  - id: mysql-show-tables
    desc: MySQL show tables action
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "$re=mysql_query(\"SHOW TABLES FROM $showtables\");"
  - id: mysql-insert
    desc: MySQL insert query
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "mysql_query(\"INSERT INTO $table ($xvar) values ($xval)\");"
  - id: mysql-update
    desc: MySQL update query
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "mysql_query(\"update $mtable set $var='$textofmysql' where $pixidname=$pixid\");"
  - id: mysql-delete
    desc: MySQL delete query
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "mysql_query(\"delete from $mtable where $pixidname='$pixid'\");"
  - id: russian-ui
    desc: Russian UI marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: "<a href='$PHP_SELF?d=$d&show&tupload'>Íàçàä ê êàòàëîãó</a>"
  - id: short-open-tag
    desc: Short PHP open tag
    crit: suspicious
    conf: 0.8
    if:
      type: text
      exact: "<?\r\n"
composite_rules:
  - id: family-detected
    desc: Cyber Shell backdoor family
    crit: suspicious
    conf: 0.995
    all:
      - id: family-banner
      - id: family-author
    any:
      - id: family-lite
      - id: family-domain
      - id: default-password
  - id: hidden-phone-home
    desc: Cyber Shell hidden phone-home
    crit: suspicious
    conf: 0.995
    all:
      - id: tracker-gmail
      - id: micro-behaviors/communications/email/send::gmail-phone-home-subject
      - id: micro-behaviors/communications/email/send::phone-home-server-fingerprint
      - id: tracker-remote-addr
      - id: tracker-script-path
      - id: tracker-server-addr
      - id: tracker-server-software
      - id: tracker-php-self
  - id: bind-shell-backdoor
    desc: Cyber Shell Perl bind shell
    crit: suspicious
    conf: 0.995
    all:
      - id: bind-socket
      - id: bind-shell
      - id: bind-updatedb
      - id: bind-launch
  - id: operator-surface
    desc: Cyber Shell operator surface
    crit: suspicious
    conf: 0.99
    all:
      - id: file-download
      - id: mail-exfil
      - id: file-upload
      - id: dir-listing
    any:
      - id: file-rename
      - id: file-mkdir
      - id: file-unlink
      - id: file-recursive-delete
  - id: mysql-admin-surface
    desc: Cyber Shell MySQL admin surface
    crit: suspicious
    conf: 0.99
    all:
      - id: mysql-connect
      - id: mysql-show-dbs
      - id: mysql-show-tables
    any:
      - id: mysql-insert
      - id: mysql-update
      - id: mysql-delete
  - id: structural-profile
    desc: Cyber Shell structural profile
    crit: suspicious
    conf: 0.97
    all:
      - id: short-open-tag
      - id: russian-ui
    any:
      - id: image-endpoint
      - id: hidden-mode
  - id: detected
    desc: Cyber Shell full-featured PHP backdoor
    crit: suspicious
    conf: 0.999
    all:
      - id: family-detected
      - id: hidden-phone-home
      - id: bind-shell-backdoor
    any:
      - id: operator-surface
      - id: mysql-admin-surface
      - id: structural-profile
