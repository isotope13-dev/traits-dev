defaults:
  platforms: [unix, windows]
  for: [php, text]
  attack: T1505.003
  mbc: B0030

traits:
  - id: breeze-gravatar-cache-path
    desc: Breeze gravatar cache upload path
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: wp-content/cache/breeze-extra/gravatars
  - id: wordpress-generated-string-function-name
    desc: WordPress generated string-function name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bwp-(strlen|array_merge|trim)-[a-z]{6}\.php\b'
  - id: wordpress-generated-hash-function-name
    desc: WordPress generated hash-function name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bwp-(md5|sha1)-[a-z]{6}\.php\b'
  - id: wordpress-generated-value-function-name
    desc: WordPress generated value-function name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\bwp-(count|time|date)-[a-z]{6}\.php\b'
  - id: php-variadic-variable-function-call
    desc: PHP variadic variable function
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '\$\w+\s*\(\s*\.\.\.\$\w+\s*\)'
    unless:
      - id: well-known/lib/guzzle
      - type: text
        regex: '(callable\s+\$\w+|Closure\s+\$\w+|\$\w+\s*instanceof\s+callable)'
  - id: php-dropper-self-delete
    desc: PHP dropper self-delete
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(unlink|@unlink)\s*\(\s*__FILE__\s*\)'
    unless:
      - id: well-known/app/wordpress-plugins::known-wordpress-plugin
  - id: wordpress-theme-path-reference
    desc: WordPress theme directory path reference
    crit: component
    conf: 0.9
    if:
      type: text
      substr: wp-content/themes/
composite_rules:
  - id: wordpress-cache-uploaded-webshell
    desc: WordPress cache uploaded webshell
    crit: hostile
    conf: 0.99
    all:
      - id: breeze-gravatar-cache-path
    any:
      - id: wordpress-generated-string-function-name
      - id: wordpress-generated-hash-function-name
      - id: wordpress-generated-value-function-name
  - id: php-request-variadic-self-delete-backdoor
    desc: PHP request variadic self-delete backdoor
    crit: hostile
    conf: 0.99
    all:
      - id: php-variadic-variable-function-call
      - id: php-dropper-self-delete
    any:
      - id: micro-behaviors/communications/http/request/params::post-dup
      - id: micro-behaviors/communications/http/request/params::request-dup
  - id: wordpress-theme-upload-webshell
    desc: PHP uploader writes into WordPress theme path
    crit: hostile
    conf: 0.97
    all:
      - id: wordpress-theme-path-reference
      - id: micro-behaviors/fs/file/copy::php-upload-temp-file-access
      - id: micro-behaviors/communications/http/request/params::files
    near_bytes: 4096
