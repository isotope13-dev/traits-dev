defaults:
  platforms: [windows, unix]
  for: [php, java, class, html, csharp]
  mbc: B0030
  attack: T1505.003
traits:
- id: php-tag
  desc: PHP opening tag
  crit: component
  conf: 0.3
  if:
    type: text
    substr: <?php
    case_insensitive: true
- id: php-exec
  desc: PHP exec() from request data
  crit: component
  conf: 0.7
  for:
  - php
  if:
    type: text
    regex: \bexec\s*\(\s*\$_(GET|POST|REQUEST)\b
- id: php-shell-exec
  desc: PHP shell_exec() from request data
  crit: component
  conf: 0.7
  for:
  - php
  if:
    type: text
    regex: \bshell_exec\s*\(\s*\$_(GET|POST|REQUEST)\b
- id: php-get
  desc: PHP $_GET parameter access
  crit: component
  conf: 0.4
  if:
    type: text
    substr: $_GET[
- id: php-post
  desc: PHP $_POST parameter access
  crit: component
  conf: 0.4
  if:
    type: text
    substr: $_POST[
- id: php-request
  desc: PHP $_REQUEST parameter access
  crit: component
  conf: 0.4
  if:
    type: text
    substr: $_REQUEST[
- id: jsp-runtime
  desc: Java Runtime.getRuntime() call
  crit: suspicious
  conf: 0.6
  for: [java, class]
  if:
    type: text
    substr: Runtime.getRuntime()
- id: jsp-exec
  desc: Java .exec() method call
  crit: suspicious
  conf: 0.5
  for: [java, class]
  if:
    type: text
    substr: .exec(
- id: jsp-get-param
  desc: JSP request.getParameter call
  crit: suspicious
  conf: 0.4
  for: [java, class]
  if:
    type: text
    substr: request.getParameter
- id: jsp-runtime-exec-request-param--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [java, class, html]
  if:
    type: text
    substr: Runtime.getRuntime().exec
- id: jsp-runtime-exec-request-param--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.98
  for: [java, class, html]
  if:
    type: text
    substr: request.getParameter
- id: aspnet-request-processstartinfo--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.96
  for: [csharp, html]
  if:
    type: text
    substr: ProcessStartInfo
- id: aspnet-request-processstartinfo--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.96
  for: [csharp, html]
  if:
    type: text
    substr: powershell.exe
- id: aspnet-request-processstartinfo--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.96
  for: [csharp, html]
  if:
    type: text
    substr: Process.Start
- id: aspnet-request-processstartinfo--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.96
  for: [csharp, html]
  if:
    type: text
    substr: QueryString
- id: aspnet-request-processstartinfo--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.96
  for: [csharp, html]
  if:
    type: text
    substr: cmd.exe
- id: aspnet-request-processstartinfo--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.96
  for: [csharp, html]
  if:
    type: text
    substr: Request
- id: aspnet-request-processstartinfo--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.96
  for: [csharp, html]
  if:
    type: text
    substr: Form
- id: aspnet-process-output-response--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [csharp, html]
  if:
    type: text
    substr: StandardOutput.ReadToEnd
- id: aspnet-process-output-response--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [csharp, html]
  if:
    type: text
    substr: RedirectStandardOutput
- id: aspnet-process-output-response--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [csharp, html]
  if:
    type: text
    substr: ProcessStartInfo
- id: aspnet-process-output-response--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [csharp, html]
  if:
    type: text
    substr: powershell.exe
- id: aspnet-process-output-response--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [csharp, html]
  if:
    type: text
    substr: Response.Write
- id: aspnet-process-output-response--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [csharp, html]
  if:
    type: text
    substr: Process.Start
- id: aspnet-process-output-response--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [csharp, html]
  if:
    type: text
    substr: cmd.exe
- id: jsp-socket-exec-loop
  desc: Java socket command execution loop
  crit: suspicious
  conf: 0.9
  for: [java, class]
  if:
    type: text
    regex: (?s)new\s+Socket.{0,240}in\.read.{0,240}exec\(
- id: jsp-socket-whoami-banner
  desc: Java socket sends whoami banner
  crit: suspicious
  conf: 0.88
  for: [java, class]
  if:
    type: text
    regex: (?s)getOutputStream.{0,160}exec\("whoami"\)
- id: jsp-url-openconnection-download
  desc: Java URL openConnection primitive
  crit: component
  conf: 0.85
  for: [java, class]
  if:
    type: text
    regex: new\s+URL\(.{0,80}\)\.openConnection\(\)
- id: jsp-temp-download-exec-delete
  desc: Java temp download execute cleanup
  crit: suspicious
  conf: 0.92
  for: [java, class]
  if:
    type: text
    regex: (?s)java\.io\.tmpdir.{0,240}download\(.{0,240}\.delete\(
- id: jsp-config-host-port-shell
  desc: Java config driven shell connection
  crit: suspicious
  conf: 0.9
  for: [java, class]
  if:
    type: text
    regex: (?s)config\.properties.{0,240}getProperty\("host"\)
- id: jsp-cat-download-shell-methods
  desc: Java webshell toolkit methods
  crit: suspicious
  conf: 0.9
  for: [java, class]
  if:
    type: text
    regex: (?s)String\s+cat\(.{0,320}void\s+download\(.{0,320}void\s+shell\(
- id: identifier
  desc: Webshell-related terminology
  crit: suspicious
  conf: 0.6
  if:
    type: text
    word: webshell
    case_insensitive: true
- id: c99shell
  desc: c99shell webshell family
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: c99shell
    case_insensitive: true
- id: r57shell
  desc: r57shell webshell family
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: r57shell
    case_insensitive: true
- id: b374k
  desc: b374k webshell family
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: b374k
    case_insensitive: true
- id: b374k-default-hash
  desc: b374k default password hash
  crit: suspicious
  conf: 0.98
  if:
    type: text
    exact: 0de664ecd2be02cdd54234a0d1229b43
- id: pbot-class
  desc: pBot PHP IRC bot class
  crit: suspicious
  conf: 0.98
  for: [php]
  if:
    type: text
    substr: class pBot
- id: pbot-irc-loop
  desc: pBot IRC command loop
  crit: suspicious
  conf: 0.95
  for: [php]
  if:
    type: text
    regex: 'fsockopen[\s\S]{0,500}(PRIVMSG|PING|PONG)[\s\S]{0,500}eval\s*\('
- id: pas-tool-cookie-loader
  desc: PAS tool cookie loader
  crit: suspicious
  conf: 0.94
  for: [php]
  if:
    type: text
    regex: 'str_replace[\s\S]{0,240}\$_COOKIE[\s\S]{0,240}(gzinflate|base64_decode)'
- id: webshell-admin-terms--rx-17
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: '(?i)(backdoor|cmd shell)'
- id: webshell-admin-terms--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: '(?i)(web shell|reverse shell)'
- id: webshell-admin-terms--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: '(?i)(rootkit|meterpreter)'
- id: webshell-admin-terms--rx-20
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: '(?i)(hashcrack|safe_mode bypass)'
- id: webshell-admin-terms--rx-21
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: '(?i)(open_basedir bypass|deface)'
- id: phpspy
  desc: phpspy webshell family
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: phpspy
    case_insensitive: true
- id: wso-shell
  desc: WSO Shell webshell family
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: WSO Shell
- id: wso-version
  desc: WSO webshell version marker
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: WSO_VERSION
- id: filesman
  desc: FilesMan webshell family
  crit: suspicious
  conf: 0.95
  size_max: 1000000
  if:
    type: text
    word: FilesMan
- id: china-chopper
  desc: China Chopper webshell family
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: China Chopper
- id: weevely
  desc: weevely webshell family
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: weevely
- id: indoxploit
  desc: IndoXploit webshell family
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: IndoXploit
    case_insensitive: true
- id: http-403-forbidden
  desc: HTTP 403 forbidden response
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (?i)(403.{0,20}forbidden|http\s+error\s+403)
- id: http-401-unauthorized
  desc: HTTP 401 unauthorized response
  crit: component
  conf: 0.75
  if:
    type: text
    regex: (?i)(401.{0,20}unauthorized|http\s+error\s+401)
- id: http-access-denied-page
  desc: HTTP access denied page text
  crit: component
  conf: 0.7
  for:
  - scripts
  - html
  if:
    type: text
    regex: (?i)(access\s+is\s+denied|you\s+do\s+not\s+have\s+permission)
composite_rules:
- id: access-denied-response
  desc: HTTP access denied response page
  crit: suspicious
  conf: 0.8
  all:
  - id: http-access-denied-page
  any:
  - id: http-403-forbidden
  - id: http-401-unauthorized
- id: php-shell-comp
  desc: PHP webshell implementation patterns
  crit: suspicious
  conf: 0.9
  all:
  - id: php-tag
  - id: php-get
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
- id: php-shell-post
  desc: PHP webshell POST execution pattern
  crit: suspicious
  conf: 0.9
  all:
  - id: php-tag
  - id: php-post
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
- id: php-shell-request
  desc: PHP webshell REQUEST execution pattern
  crit: suspicious
  conf: 0.9
  all:
  - id: php-tag
  - id: php-request
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
- id: jsp-shell
  desc: JSP webshell implementation patterns
  crit: suspicious
  conf: 0.9
  all:
  - id: jsp-runtime
  - id: jsp-exec
  - id: jsp-get-param
- id: jsp-request-command-webshell
  desc: JSP request command webshell
  crit: hostile
  conf: 0.99
  all:
  - id: jsp-runtime-exec-request-param
  any:
  - id: jsp-runtime
  - id: jsp-exec
  - id: jsp-get-param
- id: aspnet-request-command-webshell
  desc: ASP.NET request command webshell
  crit: hostile
  conf: 0.98
  all:
  - id: aspnet-request-processstartinfo
  any:
  - id: aspnet-process-output-response
  - id: micro-behaviors/process/create/spawn::start-info
  - id: micro-behaviors/process/create/spawn::start
- id: jsp-reverse-shell
  desc: JSP reverse shell command loop
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/communications/socket/create::java-socket-create
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: jsp-socket-exec-loop
  any:
  - id: jsp-socket-whoami-banner
  - id: jsp-config-host-port-shell
- id: jsp-download-exec-cleanup
  desc: JSP download execute cleanup
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: jsp-url-openconnection-download
  - id: jsp-temp-download-exec-delete
- id: jsp-post-exploitation-toolkit
  desc: JSP post exploitation toolkit
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: micro-behaviors/communications/socket/create::java-socket-create
  - id: micro-behaviors/fs/file/copy::fileinputstream-class
  - id: jsp-url-openconnection-download
  - id: jsp-cat-download-shell-methods
- id: jsp-file-browser
  desc: JSP file browser webshell
  crit: suspicious
  conf: 0.97
  for: [none]
  all:
  - id: micro-behaviors/data/text/keywords/malware::servlet-class
  - id: micro-behaviors/data/text/keywords/malware::servlet-getparameter
  - id: micro-behaviors/data/text/keywords/malware::directory-title
  any:
  - id: micro-behaviors/data/text/keywords/malware::file-query-link
  - id: micro-behaviors/data/text/keywords/malware::path-banner
  - id: micro-behaviors/data/text/keywords/malware::read-error
- id: jsp-file-browser-servlet
  desc: Servlet file browser webshell
  crit: hostile
  conf: 0.99
  for: [none]
  all:
  - id: micro-behaviors/data/text/keywords/malware::servlet-class
  - id: micro-behaviors/data/text/keywords/malware::servlet-getparameter
  - id: micro-behaviors/data/text/keywords/malware::directory-title
  - id: micro-behaviors/data/text/keywords/malware::file-query-link
  - id: micro-behaviors/data/text/keywords/malware::servlet-file-browser-ui
- id: jsp-file-read-browser-servlet
  desc: Servlet file browser with file read
  crit: hostile
  conf: 0.995
  for: [none]
  all:
  - id: micro-behaviors/data/text/keywords/malware::servlet-class
  - id: micro-behaviors/data/text/keywords/malware::servlet-getparameter
  - id: micro-behaviors/data/text/keywords/malware::file-query-link
  - id: micro-behaviors/fs/directory/readdir::readdir-java
  - id: micro-behaviors/fs/file/copy::fileinputstream-class
  - id: micro-behaviors/data/text/keywords/malware::servlet-file-browser-ui
- id: specific-family
  desc: Known webshell family identifier
  crit: suspicious
  conf: 0.9
  any:
  - id: c99shell
  - id: r57shell
  - id: b374k
  - id: b374k-default-hash
  - id: pbot-class
  - id: pas-tool-cookie-loader
  - id: phpspy
  - id: wso-shell
  - id: wso-version
  - id: filesman
  - id: china-chopper
  - id: weevely
  - id: indoxploit
  - id: webshell-admin-terms
- id: pbot-irc-webshell
  desc: pBot IRC webshell backdoor
  crit: hostile
  conf: 0.99
  all:
  - id: pbot-class
  - id: pbot-irc-loop
- id: family-identified
  desc: Webshell family identified with generic
  crit: suspicious
  conf: 0.85
  size_max: 100000
  all:
  - id: identifier
  - id: specific-family
- id: detected
  desc: Webshell implementation detected
  crit: suspicious
  conf: 0.95
  for: [none]
  any:
  - id: php-shell-comp
  - id: php-shell-post
  - id: php-shell-request
  - id: jsp-shell
  - id: jsp-file-browser
  - id: jsp-file-browser-servlet
  - id: jsp-file-read-browser-servlet
  - id: family-identified
  - id: pbot-irc-webshell
  downgrade:
    any:
    - id: http-access-denied-page
- id: jsp-runtime-exec-request-param
  desc: JSP Runtime.exec request parameter
  crit: suspicious
  conf: 0.98
  for: [java, class, html]
  all:
  - id: jsp-runtime-exec-request-param--rx-1
  - id: jsp-runtime-exec-request-param--rx-2
  near_bytes: 4096
- id: aspnet-request-processstartinfo
  desc: ASP.NET request launches process
  crit: suspicious
  conf: 0.96
  for: [csharp, html]
  any:
  - id: aspnet-request-processstartinfo--rx-3
  - id: aspnet-request-processstartinfo--rx-4
  - id: aspnet-request-processstartinfo--rx-5
  - id: aspnet-request-processstartinfo--rx-6
  - id: aspnet-request-processstartinfo--rx-7
  - id: aspnet-request-processstartinfo--rx-8
  - id: aspnet-request-processstartinfo--rx-9
  needs: 1
- id: aspnet-process-output-response
  desc: ASP.NET process output response
  crit: suspicious
  conf: 0.94
  for: [csharp, html]
  any:
  - id: aspnet-process-output-response--rx-10
  - id: aspnet-process-output-response--rx-11
  - id: aspnet-process-output-response--rx-12
  - id: aspnet-process-output-response--rx-13
  - id: aspnet-process-output-response--rx-14
  - id: aspnet-process-output-response--rx-15
  - id: aspnet-process-output-response--rx-16
  needs: 1
- id: webshell-admin-terms
  desc: Webshell administrative terms
  crit: suspicious
  conf: 0.78
  any:
  - id: webshell-admin-terms--rx-17
  - id: webshell-admin-terms--rx-18
  - id: webshell-admin-terms--rx-19
  - id: webshell-admin-terms--rx-20
  - id: webshell-admin-terms--rx-21
  needs: 1
