defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  mbc: B0030
  attack: T1505.003
traits:
  - id: php-tag
    desc: PHP opening tag
    crit: notable
    conf: 0.3
    if:
      type: string_value
      substr: <?php
      case_insensitive: true
  - id: php-exec
    desc: PHP exec() function call
    crit: notable
    conf: 0.7
    for:
      - php
    if:
      type: raw
      substr: exec(
  - id: php-shell-exec
    desc: PHP shell_exec() function call
    crit: notable
    conf: 0.7
    for:
      - php
    if:
      type: raw
      substr: shell_exec(
  - id: php-get
    desc: PHP $_GET parameter access
    crit: notable
    conf: 0.4
    if:
      type: string_value
      substr: $_GET[
  - id: php-post
    desc: PHP $_POST parameter access
    crit: notable
    conf: 0.4
    if:
      type: string_value
      substr: $_POST[
  - id: php-request
    desc: PHP $_REQUEST parameter access
    crit: notable
    conf: 0.4
    if:
      type: string_value
      substr: $_REQUEST[
  - id: jsp-runtime
    desc: Java Runtime.getRuntime() call
    crit: notable
    conf: 0.6
    for:
      - java
      - class
      - html
    if:
      type: raw
      substr: Runtime.getRuntime()
  - id: jsp-exec
    desc: Java .exec() method call
    crit: notable
    conf: 0.5
    for:
      - java
      - class
      - html
    if:
      type: raw
      substr: .exec(
  - id: jsp-get-param
    desc: JSP request.getParameter call
    crit: notable
    conf: 0.4
    for:
      - java
      - class
      - html
    if:
      type: string_value
      substr: request.getParameter
  - id: identifier
    desc: Webshell-related terminology
    crit: notable
    conf: 0.6
    if:
      type: string_value
      word: webshell
      case_insensitive: true
  - id: c99shell
    desc: c99shell webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      word: c99shell
      case_insensitive: true
  - id: r57shell
    desc: r57shell webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      word: r57shell
      case_insensitive: true
  - id: b374k
    desc: b374k webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      word: b374k
      case_insensitive: true
  - id: phpspy
    desc: phpspy webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      word: phpspy
      case_insensitive: true
  - id: wso-shell
    desc: WSO Shell webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: WSO Shell
  - id: wso-version
    desc: WSO webshell version marker
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      substr: WSO_VERSION
  - id: filesman
    desc: FilesMan webshell family
    crit: suspicious
    conf: 0.95
    size_max: 1000000
    if:
      type: string_value
      word: FilesMan
  - id: china-chopper
    desc: China Chopper webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: China Chopper
  - id: weevely
    desc: weevely webshell family
    crit: notable
    conf: 0.95
    if:
      type: string_value
      substr: weevely
  - id: indoxploit
    desc: IndoXploit webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      word: IndoXploit
      case_insensitive: true
  - id: http-403-forbidden
    desc: HTTP 403 forbidden response
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: (?i)(403.{0,20}forbidden|http\s+error\s+403)
  - id: http-401-unauthorized
    desc: HTTP 401 unauthorized response
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: (?i)(401.{0,20}unauthorized|http\s+error\s+401)
  - id: http-access-denied-page
    desc: HTTP access denied page text
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (?i)(access\s+is\s+denied|you\s+do\s+not\s+have\s+permission)
composite_rules:
  - id: php-shell-comp
    desc: PHP webshell implementation patterns
    crit: suspicious
    conf: 0.9
    all:
      - id: php-tag
    any:
      - id: micro-behaviors/process/create/shell::system-call-word
      - id: php-exec
      - id: php-shell-exec
      - id: php-get
      - id: php-post
      - id: php-request
    needs: 1
  - id: jsp-shell
    desc: JSP webshell implementation patterns
    crit: suspicious
    conf: 0.9
    all:
      - id: jsp-runtime
      - id: jsp-exec
      - id: jsp-get-param
  - id: specific-family
    desc: Known webshell family identifier
    crit: notable
    conf: 0.9
    any:
      - id: c99shell
      - id: r57shell
      - id: b374k
      - id: phpspy
      - id: wso-shell
      - id: wso-version
      - id: filesman
      - id: china-chopper
      - id: weevely
      - id: indoxploit
  - id: family-identified
    desc: Webshell family identified with generic
    crit: suspicious
    conf: 0.85
    size_max: 100000
    all:
      - id: identifier
      - id: specific-family
  - id: detected
    desc: Webshell implementation detected
    crit: suspicious
    conf: 0.95
    any:
      - id: php-shell-comp
      - id: jsp-shell
      - id: family-identified
