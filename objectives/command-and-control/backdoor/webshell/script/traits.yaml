defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [php, java, class, html]
  mbc: B0030
  attack: T1505.003
traits:
  - id: php-tag
    desc: PHP opening tag
    crit: component
    conf: 0.3
    if:
      type: text
      substr: <?php
      case_insensitive: true
  - id: php-exec
    desc: PHP exec() from request data
    crit: component
    conf: 0.7
    for:
      - php
    if:
      type: text
      regex: \bexec\s*\(\s*\$_(GET|POST|REQUEST)\b
  - id: php-shell-exec
    desc: PHP shell_exec() from request data
    crit: component
    conf: 0.7
    for:
      - php
    if:
      type: text
      regex: \bshell_exec\s*\(\s*\$_(GET|POST|REQUEST)\b
  - id: php-get
    desc: PHP $_GET parameter access
    crit: component
    conf: 0.4
    if:
      type: text
      substr: $_GET[
  - id: php-post
    desc: PHP $_POST parameter access
    crit: component
    conf: 0.4
    if:
      type: text
      substr: $_POST[
  - id: php-request
    desc: PHP $_REQUEST parameter access
    crit: component
    conf: 0.4
    if:
      type: text
      substr: $_REQUEST[
  - id: jsp-runtime
    desc: Java Runtime.getRuntime() call
    crit: notable
    conf: 0.6
    for: [java, class]
    if:
      type: text
      substr: Runtime.getRuntime()
  - id: jsp-exec
    desc: Java .exec() method call
    crit: notable
    conf: 0.5
    for: [java, class]
    if:
      type: text
      substr: .exec(
  - id: jsp-get-param
    desc: JSP request.getParameter call
    crit: notable
    conf: 0.4
    for: [java, class]
    if:
      type: text
      substr: request.getParameter
  - id: jsp-servlet-class
    desc: Java HttpServlet class reference
    crit: component
    conf: 0.75
    for: [class]
    if:
      type: raw
      substr: javax/servlet/http/HttpServlet
  - id: jsp-getparameter-method
    desc: Java servlet parameter getter
    crit: component
    conf: 0.65
    for: [class]
    if:
      type: raw
      word: getParameter
  - id: jsp-directory-listing-title
    desc: Directory listing web UI title
    crit: suspicious
    conf: 0.92
    for: [class]
    if:
      type: raw
      substr: <TITLE>Directory Listing</TITLE>
  - id: jsp-file-query-link
    desc: File query hyperlink pattern
    crit: suspicious
    conf: 0.88
    for: [class]
    if:
      type: raw
      substr: HRef='?file=
  - id: jsp-read-error-banner
    desc: File read error banner
    crit: suspicious
    conf: 0.86
    for: [class]
    if:
      type: raw
      substr: Can't Read file<BR>
  - id: identifier
    desc: Webshell-related terminology
    crit: notable
    conf: 0.6
    if:
      type: text
      word: webshell
      case_insensitive: true
  - id: c99shell
    desc: c99shell webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: c99shell
      case_insensitive: true
  - id: r57shell
    desc: r57shell webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: r57shell
      case_insensitive: true
  - id: b374k
    desc: b374k webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: b374k
      case_insensitive: true
  - id: phpspy
    desc: phpspy webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: phpspy
      case_insensitive: true
  - id: wso-shell
    desc: WSO Shell webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: WSO Shell
  - id: wso-version
    desc: WSO webshell version marker
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: WSO_VERSION
  - id: filesman
    desc: FilesMan webshell family
    crit: suspicious
    conf: 0.95
    size_max: 1000000
    if:
      type: text
      word: FilesMan
  - id: china-chopper
    desc: China Chopper webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: China Chopper
  - id: weevely
    desc: weevely webshell family
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: weevely
  - id: indoxploit
    desc: IndoXploit webshell family
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: IndoXploit
      case_insensitive: true
  - id: http-403-forbidden
    desc: HTTP 403 forbidden response
    crit: component
    conf: 0.75
    if:
      type: text
      regex: (?i)(403.{0,20}forbidden|http\s+error\s+403)
  - id: http-401-unauthorized
    desc: HTTP 401 unauthorized response
    crit: component
    conf: 0.75
    if:
      type: text
      regex: (?i)(401.{0,20}unauthorized|http\s+error\s+401)
  - id: http-access-denied-page
    desc: HTTP access denied page text
    crit: component
    conf: 0.7
    for:
      - scripts
      - html
    if:
      type: text
      regex: (?i)(access\s+is\s+denied|you\s+do\s+not\s+have\s+permission)
composite_rules:
  - id: access-denied-response
    desc: HTTP access denied response page
    crit: notable
    conf: 0.8
    all:
      - id: http-access-denied-page
    any:
      - id: http-403-forbidden
      - id: http-401-unauthorized
  - id: php-shell-comp
    desc: PHP webshell implementation patterns
    crit: suspicious
    conf: 0.9
    all:
      - id: php-tag
      - id: php-get
    any:
      - id: php-exec
      - id: php-shell-exec
      - id: micro-behaviors/process/create/shell/lang::exec-user-input
  - id: php-shell-post
    desc: PHP webshell POST execution pattern
    crit: suspicious
    conf: 0.9
    all:
      - id: php-tag
      - id: php-post
    any:
      - id: php-exec
      - id: php-shell-exec
      - id: micro-behaviors/process/create/shell/lang::exec-user-input
  - id: php-shell-request
    desc: PHP webshell REQUEST execution pattern
    crit: suspicious
    conf: 0.9
    all:
      - id: php-tag
      - id: php-request
    any:
      - id: php-exec
      - id: php-shell-exec
      - id: micro-behaviors/process/create/shell/lang::exec-user-input
  - id: jsp-shell
    desc: JSP webshell implementation patterns
    crit: suspicious
    conf: 0.9
    all:
      - id: jsp-runtime
      - id: jsp-exec
      - id: jsp-get-param
  - id: jsp-file-browser
    desc: JSP file browser webshell
    crit: suspicious
    conf: 0.97
    all:
      - id: jsp-servlet-class
      - id: jsp-getparameter-method
      - id: micro-behaviors/fs/directory/readdir::readdir-java
      - id: micro-behaviors/fs/file/copy::fileinputstream-class
    any:
      - id: jsp-directory-listing-title
      - id: jsp-file-query-link
      - id: jsp-read-error-banner
  - id: specific-family
    desc: Known webshell family identifier
    crit: notable
    conf: 0.9
    any:
      - id: c99shell
      - id: r57shell
      - id: b374k
      - id: phpspy
      - id: wso-shell
      - id: wso-version
      - id: filesman
      - id: china-chopper
      - id: weevely
      - id: indoxploit
  - id: family-identified
    desc: Webshell family identified with generic
    crit: suspicious
    conf: 0.85
    size_max: 100000
    all:
      - id: identifier
      - id: specific-family
  - id: detected
    desc: Webshell implementation detected
    crit: suspicious
    conf: 0.95
    any:
      - id: php-shell-comp
      - id: php-shell-post
      - id: php-shell-request
      - id: jsp-shell
      - id: jsp-file-browser
      - id: family-identified
    downgrade:
      any:
        - id: http-access-denied-page
