defaults:
  attack: T1059
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: web-shell-cmd-param
    desc: Web shell command parameter
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      regex: cmd=|command=|exec=|run=
  - id: php-shell-function
    desc: PHP exec function in URL
    crit: suspicious
    conf: 0.92
    if:
      type: string_literal
      regex: shell_exec|passthru|popen\(
    unless:
      - id: micro-behaviors/process/create/shell/lang::ruby-shell-exec
  - id: shell-prompt-string
    desc: Shell prompt marker
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: shell\$|sh\$|zsh\$
composite_rules:
  - id: web-shell-client
    desc: Web shell client for remote command execution
    crit: suspicious
    conf: 0.92
    needs: 3
    any:
      - id: web-shell-cmd-param
      - id: php-shell-function
      - id: micro-behaviors/data/control-flow/analysis::ruby-while-true
      - id: micro-behaviors/process/create/system::ruby-system
  - id: interactive-shell-client
    desc: Interactive shell with user input
    crit: suspicious
    conf: 0.88
    needs: 4
    any:
      - id: micro-behaviors/os/console/io::stdin-gets
      - id: shell-prompt-string
      - id: micro-behaviors/os/console/io::exit-command-check
      - id: micro-behaviors/data/control-flow/analysis::ruby-while-true
      - id: micro-behaviors/communications/http/lib/netlib::open-uri
      - id: micro-behaviors/process/create/system::ruby-system
