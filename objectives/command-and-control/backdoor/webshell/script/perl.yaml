defaults:
  for: [perl]
  platforms: [unix]
  mbc: B0030
  attack: T1505.003
traits:
  - id: password-form
    desc: HTML password form in Perl
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '<input[^>\n]{0,80}name="password"[^>\n]{0,80}type="password"'
  - id: command-form
    desc: HTML command input form
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '<input[^>\n]{0,80}name="command"[^>\n]{0,80}type="text"'
  - id: browse-action-link
    desc: Browse action path link
    crit: suspicious
    conf: 0.84
    if:
      type: text
      substr: 'action=browse&path='
  - id: execute-frame
    desc: Execute action iframe
    crit: suspicious
    conf: 0.82
    if:
      type: text
      regex: 'iframe\s+name="output".{0,80}action=execute'
  - id: webshell-cookie-name
    desc: Web shell cookie name pattern
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: "WebShell-[A-Za-z]{3,16}"
composite_rules:
  - id: perl-cgi-command-webshell
    desc: Perl CGI command webshell
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/open3::shell-exec
      - id: micro-behaviors/communications/http/request/cgi::request-handling
      - id: command-form
    any:
      - id: objectives/command-and-control/backdoor::webshell-ref
      - id: objectives/command-and-control/backdoor/webshell/script::identifier
      - id: execute-frame
  - id: perl-cgi-file-browser-webshell
    desc: Perl CGI file browser webshell
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/fs/directory/readdir::directory-browser
      - id: micro-behaviors/communications/http/request/cgi::cookie-session
    any:
      - id: browse-action-link
      - id: webshell-cookie-name
      - id: execute-frame
  - id: perl-cgi-auth-webshell
    desc: Password-gated Perl webshell
    crit: suspicious
    conf: 0.95
    all:
      - id: password-form
      - id: micro-behaviors/communications/http/request/cgi::cookie-session
    any:
      - id: webshell-cookie-name
      - id: execute-frame
