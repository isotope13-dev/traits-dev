defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: B0030
  attack: T1505.003
traits:
- id: php-security-setting-probe--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: 'ini_(get|set|restore)\s*\(\s*[''"](safe_mode|open_basedir)'
- id: php-security-setting-probe--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: 'ini_(get|set|restore)\s*\(\s*[''"](disable_functions|allow_url_include)'
- id: htaccess-handler-directives--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(Add(Type|Handler).{0,80}(x-httpd-php|\.php)|php_value\s+auto_prepend_file)'
- id: htaccess-handler-directives--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(Add(OutputFilter).{0,80}(x-httpd-php|\.php)|php_value\s+auto_prepend_file)'
- id: htaccess-handler-directives--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(SecFilterEngine\s+Off)'
- id: sensitive-path-panel--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: '(/etc/(passwd|shadow|resolv\.conf)|\.ssh/authorized_keys)'
- id: sensitive-path-panel--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: '(id_rsa|\.bash_history)'
- id: sensitive-path-panel--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: '(\.mysql_history|/proc/cpuinfo)'
- id: sensitive-path-panel--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 2
  if:
    type: text
    regex: '(/var/log/lastlog)'
- id: recon-command-panel--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: '(whoami|uname -a)'
- id: recon-command-panel--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: '(ipconfig|netstat -an)'
- id: recon-command-panel--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: '(ps -aux|ls -la)'
- id: recon-command-panel--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: '(find \. -type f|cmd\.exe)'
- id: recon-command-panel--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 3
  if:
    type: text
    regex: '(powershell\.exe|nc -l)'
- id: sqlserver-xp-command-shell
  desc: SQL Server xp_cmdshell usage
  crit: suspicious
  conf: 0.94
  attack: T1059
  if:
    type: text
    regex: '\bxp_(cmdshell|execresultset|regenumkeys|filelist)\b'
- id: dangerous-php-function-cluster--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: '\b(assert|call_user_func)\b'
- id: dangerous-php-function-cluster--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: '\b(eval|exec)\b'
- id: dangerous-php-function-cluster--rx-17
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: '\b(fsockopen|php_uname)\b'
- id: dangerous-php-function-cluster--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: '\b(phpinfo|posix_get(euid|uid|gid))\b'
- id: dangerous-php-function-cluster--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: '\b(proc_open|popen)\b'
- id: dangerous-php-function-cluster--rx-20
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: '\b(shell_exec|show_source)\b'
- id: php-irc-command-set--rx-21
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: '\b(USER|PASS)\b'
- id: php-irc-command-set--rx-22
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: '\b(PRIVMSG|MODE)\b'
- id: php-irc-command-set--rx-23
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: '\b(PING|PONG)\b'
- id: php-irc-command-set--rx-24
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: '\b(JOIN|PART)\b'
composite_rules:
- id: php-security-setting-probe
  desc: PHP security setting probe
  crit: suspicious
  conf: 0.86
  any:
  - id: php-security-setting-probe--rx-1
  - id: php-security-setting-probe--rx-2
  needs: 1
- id: htaccess-handler-directives
  desc: htaccess PHP handler directives
  crit: suspicious
  conf: 0.9
  any:
  - id: htaccess-handler-directives--rx-3
  - id: htaccess-handler-directives--rx-4
  - id: htaccess-handler-directives--rx-5
  needs: 1
- id: sensitive-path-panel
  desc: Sensitive server path panel
  crit: suspicious
  conf: 0.9
  attack: T1083
  any:
  - id: sensitive-path-panel--rx-6
  - id: sensitive-path-panel--rx-7
  - id: sensitive-path-panel--rx-8
  - id: sensitive-path-panel--rx-9
  needs: 1
- id: recon-command-panel
  desc: Server recon command panel
  crit: suspicious
  conf: 0.88
  attack: T1082
  any:
  - id: recon-command-panel--rx-10
  - id: recon-command-panel--rx-11
  - id: recon-command-panel--rx-12
  - id: recon-command-panel--rx-13
  - id: recon-command-panel--rx-14
  needs: 1
- id: dangerous-php-function-cluster
  desc: Clustered dangerous PHP functions
  crit: suspicious
  conf: 0.88
  any:
  - id: dangerous-php-function-cluster--rx-15
  - id: dangerous-php-function-cluster--rx-16
  - id: dangerous-php-function-cluster--rx-17
  - id: dangerous-php-function-cluster--rx-18
  - id: dangerous-php-function-cluster--rx-19
  - id: dangerous-php-function-cluster--rx-20
  needs: 1
  unless:
  - type: text
    regex: 'escapeshell(cmd|arg)'
- id: php-irc-command-set
  desc: PHP IRC bot command set
  crit: suspicious
  conf: 0.88
  attack: T1095
  any:
  - id: php-irc-command-set--rx-21
  - id: php-irc-command-set--rx-22
  - id: php-irc-command-set--rx-23
  - id: php-irc-command-set--rx-24
  needs: 1
