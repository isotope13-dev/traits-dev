defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: B0030
  attack: T1505.003
traits:
  - id: php-security-setting-probe
    desc: PHP security setting probe
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'ini_(get|set|restore)\s*\(\s*[''"](safe_mode|open_basedir|disable_functions|allow_url_include)'
  - id: htaccess-handler-directives
    desc: htaccess PHP handler directives
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(Add(Type|Handler|OutputFilter).{0,80}(x-httpd-php|\.php)|php_value\s+auto_prepend_file|SecFilterEngine\s+Off)'
  - id: sensitive-path-panel
    desc: Sensitive server path panel
    crit: suspicious
    conf: 0.9
    attack: T1083
    count_min: 2
    if:
      type: text
      regex: '(/etc/(passwd|shadow|resolv\.conf)|\.ssh/authorized_keys|id_rsa|\.bash_history|\.mysql_history|/proc/cpuinfo|/var/log/lastlog)'
  - id: recon-command-panel
    desc: Server recon command panel
    crit: suspicious
    conf: 0.88
    attack: T1082
    count_min: 3
    if:
      type: text
      regex: '(whoami|uname -a|ipconfig|netstat -an|ps -aux|ls -la|find \. -type f|cmd\.exe|powershell\.exe|nc -l)'
  - id: sqlserver-xp-command-shell
    desc: SQL Server xp_cmdshell usage
    crit: suspicious
    conf: 0.94
    attack: T1059
    if:
      type: text
      regex: '\bxp_(cmdshell|execresultset|regenumkeys|filelist)\b'
  - id: dangerous-php-function-cluster
    desc: Clustered dangerous PHP functions
    crit: suspicious
    conf: 0.88
    count_min: 5
    if:
      type: text
      regex: '\b(assert|call_user_func|eval|exec|fsockopen|php_uname|phpinfo|posix_get(euid|uid|gid)|proc_open|popen|shell_exec|show_source)\b'
    unless:
      - type: text
        regex: 'escapeshell(cmd|arg)'
  - id: php-irc-command-set
    desc: PHP IRC bot command set
    crit: suspicious
    conf: 0.88
    attack: T1095
    count_min: 5
    if:
      type: text
      regex: '\b(USER|PASS|PRIVMSG|MODE|PING|PONG|JOIN|PART)\b'
