defaults:
  platforms: [windows]
  for: [xml, text]
  attack: T1505.003

traits:
  - id: iis-config-asp-handler-remap
    desc: IIS web.config maps config files to ASP
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'path="*.config"'

  - id: iis-webconfig-unhides-config
    desc: IIS web.config removes web.config hiding
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'remove segment="web.config"'

  - id: asp-wscript-shell-createobject
    desc: ASP creates WScript Shell object
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'CreateObject("WScript.Shell")'

  - id: asp-shell-exec-command-call
    desc: ASP shell Exec command call
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'shell.Exec(command)'

  - id: asp-request-cmd-parameter
    desc: ASP reads Request cmd parameter
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'Request("cmd")'

composite_rules:
  - id: asp-commented-request-cmd-exec
    desc: Commented ASP executes Request cmd parameter
    crit: suspicious
    conf: 0.96
    all:
      - id: asp-wscript-shell-createobject
      - id: asp-shell-exec-command-call
      - id: asp-request-cmd-parameter
    near_bytes: 620

  - id: iis-webconfig-asp-command-webshell
    desc: IIS web.config ASP command webshell
    crit: hostile
    conf: 0.99
    all:
      - id: iis-config-asp-handler-remap
      - id: iis-webconfig-unhides-config
      - id: asp-commented-request-cmd-exec
