defaults:
  platforms: [windows, unix]
  for: [json]
  attack: T1505.003
traits:
- id: b4tm4n-tools-json-catalog
  desc: b4tm4n webshell tool catalog marker
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: b4tm4n_t00lz
- id: adminer-php-filename
  desc: Adminer PHP filename
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'adminer-[0-9][^"''\s<>]{0,80}\.php'
composite_rules:
- id: raw-github-adminer-php-entry
  desc: Raw GitHub Adminer PHP entry
  crit: suspicious
  conf: 0.92
  near_bytes: 260
  all:
  - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-any
  - id: adminer-php-filename
- id: webshell-tool-catalog-raw-php
  desc: Webshell tool catalog raw PHP
  crit: suspicious
  conf: 0.96
  all:
  - id: b4tm4n-tools-json-catalog
  - id: raw-github-adminer-php-entry
