---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
  attack: T1505.003
traits:
- id: htaccess-handler-directives--rx-3
  desc: Adds a PHP handler or auto-prepend directive
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(Add(Type|Handler).{0,80}(x-httpd-php|\\.php)|php_value\\s+auto_prepend_file)"
  count_max: 1016573
- id: htaccess-handler-directives--rx-4
  desc: Adds PHP output filter or auto-prepend
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(Add(OutputFilter).{0,80}(x-httpd-php|\\.php)|php_value\\s+auto_prepend_file)"
  count_max: 1016574
- id: htaccess-handler-directives--rx-5
  desc: Disables an Apache security filter
  crit: component
  conf: 0.9
  if:
    type: text
    regex: "(SecFilterEngine\\s+Off)"
  count_max: 1016575
composite_rules:
- id: htaccess-handler-directives
  desc: htaccess PHP handler directives
  crit: suspicious
  conf: 0.9
  any:
  - id: htaccess-handler-directives--rx-3
  - id: htaccess-handler-directives--rx-4
  - id: htaccess-handler-directives--rx-5
