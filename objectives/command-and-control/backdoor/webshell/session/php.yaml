defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - php
traits:
  - id: start-dup
    desc: PHP session initialization for state
    crit: notable
    conf: 0.7
    mbc: B0028
    if:
      type: string_literal
      substr: session_start
  - id: destroy
    desc: PHP session destruction
    crit: component
    conf: 0.7
    if:
      type: string_literal
      substr: session_destroy
  - id: regenerate
    desc: PHP session ID regeneration
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      substr: session_regenerate_id
  - id: id-access
    desc: Direct session ID manipulation
    crit: suspicious
    conf: 0.8
    mbc: B0028
    if:
      type: string_literal
      regex: session_id\s*\(
  - id: ignore-abort
    desc: Ignores client abort (webshell indicator)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: ignore_user_abort
  - id: error-reporting-off
    desc: Disables error reporting (stealth)
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: error_reporting
  - id: display-errors-off
    desc: Disables error display (stealth)
    crit: notable
    conf: 0.8
    if:
      type: ast
      node: member_call_expression
      exact: ini_set
  - id: referer-accept-lang-c2-pair
    desc: Referer+Accept-Language as covert C2 channel pair
    crit: suspicious
    conf: 0.9
    attack: T1071.001
    mbc: C0002
    if:
      type: string_literal
      regex: REFER.{1,100}LANG
  - id: gz-base64-encode-response
    desc: gzcompress+base64_encode response encoding in code string
    crit: suspicious
    conf: 0.88
    attack: T1573.001
    if:
      type: string_literal
      regex: gz\w*compress.{0,60}base64_\w*encode
composite_rules:
  - id: session-lifecycle
    desc: PHP session lifecycle management (login/logout flow)
    crit: notable
    conf: 0.75
    all:
      - id: start-dup
      - id: destroy
