defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - php
traits:
  - id: start-dup
    desc: PHP session initialization for state
    crit: notable
    conf: 0.7
    mbc: B0028
    if:
      type: string_value
      substr: session_start
  - id: destroy
    desc: PHP session destruction
    crit: component
    conf: 0.7
    if:
      type: string_value
      substr: session_destroy
  - id: regenerate
    desc: PHP session ID regeneration
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: session_regenerate_id
  - id: id-access
    desc: Direct session ID manipulation
    crit: suspicious
    conf: 0.8
    mbc: B0028
    if:
      type: string_value
      regex: session_id\s*\(
  - id: ignore-abort
    desc: Ignores client abort (webshell indicator)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: ignore_user_abort
  - id: error-reporting-off
    desc: Disables error reporting (stealth)
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: error_reporting
  - id: display-errors-off
    desc: Disables error display (stealth)
    crit: notable
    conf: 0.8
    if:
      type: ast
      node: member_call_expression
      exact: ini_set
composite_rules:
  - id: session-lifecycle
    desc: PHP session lifecycle management (login/logout flow)
    crit: notable
    conf: 0.75
    all:
      - id: start-dup
      - id: destroy
