defaults:
  platforms:
  - windows
  - unix
  for:
  - php
traits:
- id: ignore-abort
  desc: Ignores client abort (webshell indicator)
  crit: suspicious
  conf: 0.85
  if:
    type: symbol
    exact: ignore_user_abort
- id: ignore-abort-true-call
  desc: Ignores client disconnects for background PHP execution
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '@?ignore_user_abort\s*\(\s*true\s*\)'
- id: unlimited-runtime-call
  desc: Removes PHP script execution time limit
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '@?set_time_limit\s*\(\s*0\s*\)'
- id: temp-host-log-path
  desc: Writes host-derived PHP log path under /tmp
  crit: suspicious
  conf: 0.82
  if:
    type: text
    regex: '/tmp/.{0,120}HTTP_HOST.{0,120}(log|error)'
- id: referer-accept-lang-c2-pair
  desc: Referer+Accept-Language as covert C2 channel pair
  crit: suspicious
  conf: 0.9
  attack: T1071.001
  mbc: C0002
  if:
    type: string_literal
    regex: REFER.{1,100}LANG
- id: gz-base64-encode-response
  desc: gzcompress+base64_encode response encoding in code string
  crit: suspicious
  conf: 0.88
  attack: T1573.001
  if:
    type: string_literal
    regex: gz\w*compress.{0,60}base64_\w*encode
composite_rules:
- id: background-php-webshell-runner
  desc: Background PHP webshell runner setup
  crit: hostile
  conf: 0.96
  all:
  - id: ignore-abort-true-call
  - id: unlimited-runtime-call
  any:
  - id: temp-host-log-path
  - id: micro-behaviors/process/io/buffer::ob-end-flush
- id: detached-temp-php-webshell-session
  desc: Detached PHP webshell session writes host-scoped temp log
  crit: hostile
  conf: 0.96
  all:
  - id: ignore-abort-true-call
  - id: temp-host-log-path
  any:
  - id: unlimited-runtime-call
  - id: micro-behaviors/process/io/buffer::ob-end-flush
