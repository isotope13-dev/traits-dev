defaults:
  platforms: [windows, unix]
  for: [scripts, html]
  mbc: B0030
  attack: T1562
traits:
- id: imunify-bypass-claim
  desc: Imunify360 bypass claim
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: Bypass.{0,50}Imunify
- id: security-bypass-claim-403
  desc: 403 Forbidden bypass claim
  crit: suspicious
  conf: 0.82
  if:
    type: text
    regex: Bypass.{0,50}403
  unless:
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/package/quality/recognized-contexts-extra::hashed-text-record
