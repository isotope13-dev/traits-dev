defaults:
  platforms:
  - windows
  - unix
  for:
  - scripts
  - html
  mbc: B0030
  attack: T1505.003
traits:
- id: http-403-forbidden
  desc: HTTP 403 forbidden response
  crit: component
  conf: 0.75
  if:
    type: text
    regex: "(?i)(403.{0,20}forbidden|http\\s+error\\s+403)"
- id: http-401-unauthorized
  desc: HTTP 401 unauthorized response
  crit: component
  conf: 0.75
  if:
    type: text
    regex: "(?i)(401.{0,20}unauthorized|http\\s+error\\s+401)"
- id: http-access-denied-page
  desc: HTTP access denied page text
  crit: component
  conf: 0.7
  if:
    type: text
    regex: "(?i)(access\\s+is\\s+denied|you\\s+do\\s+not\\s+have\\s+permission)"
- id: fastapi-http-exception-context
  desc: FastAPI HTTPException context
  crit: component
  conf: 0.9
  for:
  - python
  if:
    type: text
    regex: "raise\\s+HTTPException|status\\.HTTP_403_FORBIDDEN"
- id: fastapi-caller-permission-context
  desc: FastAPI caller permission context
  crit: component
  conf: 0.9
  for:
  - python
  if:
    type: text
    substr: caller_permission
- id: fastapi-allowed-routes-context
  desc: FastAPI allowed routes context
  crit: component
  conf: 0.9
  for:
  - python
  if:
    type: text
    substr: allowed_routes
- id: fastapi-team-model-access-context
  desc: FastAPI team model access context
  crit: component
  conf: 0.9
  for:
  - python
  if:
    type: text
    substr: can_team_access_model
composite_rules:
- id: access-denied-response
  desc: HTTP access denied response page
  crit: suspicious
  conf: 0.8
  all:
  - id: http-access-denied-page
  any:
  - id: http-403-forbidden
  - id: http-401-unauthorized
  unless:
  - id: micro-behaviors/process/create/shell/host/
  - id: metadata/file/magic/identity::php-archive
  - id: well-known/tool/detection/sast/
  - id: well-known/app/posh-ovirt/
  - id: fastapi-authorization-check-context
- id: fastapi-authorization-check-context
  desc: FastAPI authorization check context
  crit: component
  conf: 0.92
  all:
  - id: fastapi-http-exception-context
  any:
  - id: fastapi-caller-permission-context
  - id: fastapi-allowed-routes-context
  - id: fastapi-team-model-access-context
