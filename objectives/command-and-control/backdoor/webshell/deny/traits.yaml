defaults:
  platforms:
  - windows
  - unix
  for:
  - scripts
  - html
  mbc: B0030
  attack: T1505.003
traits:
- id: http-403-forbidden
  desc: HTTP 403 forbidden response
  crit: component
  conf: 0.75
  if:
    type: text
    regex: "(?i)(403.{0,20}forbidden|http\\s+error\\s+403)"
- id: http-401-unauthorized
  desc: HTTP 401 unauthorized response
  crit: component
  conf: 0.75
  if:
    type: text
    regex: "(?i)(401.{0,20}unauthorized|http\\s+error\\s+401)"
- id: http-access-denied-page
  desc: HTTP access denied page text
  crit: component
  conf: 0.7
  if:
    type: text
    regex: "(?i)(access\\s+is\\s+denied|you\\s+do\\s+not\\s+have\\s+permission)"
- id: fastapi-http-exception-marker
  desc: FastAPI HTTPException marker
  crit: notable
  conf: 0.9
  for:
  - python
  if:
    type: text
    regex: "raise\\s+HTTPException|status\\.HTTP_403_FORBIDDEN"
- id: fastapi-caller-permission-marker
  desc: FastAPI caller permission marker
  crit: notable
  conf: 0.9
  for:
  - python
  if:
    type: text
    substr: caller_permission
- id: fastapi-allowed-routes-marker
  desc: FastAPI allowed routes marker
  crit: notable
  conf: 0.9
  for:
  - python
  if:
    type: text
    substr: allowed_routes
- id: fastapi-team-model-access-marker
  desc: FastAPI team model access marker
  crit: notable
  conf: 0.9
  for:
  - python
  if:
    type: text
    substr: can_team_access_model
- id: drf-response-call
  desc: Django REST Framework Response call
  crit: component
  conf: 0.85
  for:
  - python
  if:
    type: symbol
    exact: Response
- id: drf-forbidden-status
  desc: Django REST Framework 403 status
  crit: component
  conf: 0.85
  for:
  - python
  if:
    type: text
    regex: 'status\s*=\s*(status|drf_status)\.HTTP_403_FORBIDDEN|status\s*=\s*403'
composite_rules:
- id: drf-authorization-response-marker
  desc: Django REST Framework authorization response
  crit: notable
  conf: 0.9
  all:
  - id: drf-response-call
  - id: drf-forbidden-status
- id: access-denied-response
  desc: HTTP access denied response page
  crit: suspicious
  conf: 0.8
  all:
  - id: http-access-denied-page
  any:
  - id: http-403-forbidden
  - id: http-401-unauthorized
  unless:
  - id: micro-behaviors/process/create/shell/host/
  - id: well-known/app/stirling-pdf::source-tree
  - id: metadata/file/magic/identity::php-archive
  - id: metadata/library/web-frameworks::wordpress-plugin-dir-constants
  - id: well-known/tool/detection/sast/
  - id: well-known/app/posh-ovirt/
  - id: fastapi-authorization-check-marker
  - id: drf-authorization-response-marker
  - id: metadata/library/structure::vscode-vendor-output-path
- id: fastapi-authorization-check-marker
  desc: FastAPI authorization check marker
  crit: notable
  conf: 0.92
  all:
  - id: fastapi-http-exception-marker
  any:
  - id: fastapi-caller-permission-marker
  - id: fastapi-allowed-routes-marker
  - id: fastapi-team-model-access-marker
