defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1505.003
  mbc: B0030

traits:
  - id: webshell-deployment-instructions
    desc: Webshell upload and execution instructions
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'webshell.{0,180}(upload|execution)'

  - id: webshell-target-command
    desc: Webshell command accepts a target URL
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '/webshell.{0,100}(url|target)'

  - id: webshell-polyglot-bypass-technique
    desc: Webshell upload bypass technique reference
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(GIF polyglot|image polyglot).{0,100}webshell'

composite_rules:
  - id: automated-webshell-deployment-client
    desc: Automated webshell deployment client
    crit: hostile
    conf: 0.98
    all:
      - id: webshell-deployment-instructions
      - id: webshell-target-command
      - id: webshell-polyglot-bypass-technique
