defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1505.003
  mbc: B0030
traits:
  - id: python-behinder-jsp-session
    desc: Python Behinder JSP session class
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: JSPWebshellBehinderAES
  - id: python-behinder-session-type
    desc: Behinder JSP AES session type
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: BEHINDER_JSP_AES
  - id: behinder-payload-java-builder
    desc: Behinder Payload.java compiler
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Payload\.java[\s\S]{0,240}javac[\s\S]{0,240}Payload\.class'
  - id: behinder-aes-ecb-payload
    desc: Behinder AES ECB payload wrapper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'AES\.new\s*\(\s*key\s*,\s*AES\.MODE_ECB\s*\)[\s\S]{0,160}base64\.b64encode'
  - id: behinder-send-http-request-bridge
    desc: Behinder sendHttpRequest bridge
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      exact: sendHttpRequest
  - id: webshell-run-command-payload
    desc: Webshell execute command method
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      kind: function
      exact: execute_cmd
  - id: webshell-list-dir-method
    desc: Webshell list directory method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: list_dir
  - id: webshell-read-file-method
    desc: Webshell file read method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: get_file_contents
  - id: webshell-write-file-method
    desc: Webshell file write method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: put_file_contents
  - id: webshell-delete-file-method
    desc: Webshell delete file method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: delete_file
  - id: webshell-upload-file-method
    desc: Webshell upload file method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: upload_file
  - id: webshell-download-file-method
    desc: Webshell download file method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: download_file
  - id: retaindb-file-api-context
    desc: RetainDB file API context
    crit: component
    conf: 0.9
    if:
      type: text
      substr: retaindb_upload_file
  - id: storage-backend-file-api-context
    desc: Storage backend file API context
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'Base storage backend interface|Azure Blob Storage|storage backend'
composite_rules:
  - id: webshell-file-manager-payloads
    desc: Webshell file manager payload builders
    crit: suspicious
    conf: 0.94
    needs: 2
    any:
      - id: webshell-list-dir-method
      - id: webshell-read-file-method
      - id: webshell-write-file-method
      - id: webshell-delete-file-method
      - id: webshell-upload-file-method
      - id: webshell-download-file-method
    unless:
      - id: well-known/app/calvyn-code
      - id: retaindb-file-api-context
      - id: storage-backend-file-api-context
      - id: metadata/library/data::distlib-package-index
      - id: metadata/library/data::vendored-python-library-source
  - id: python-behinder-jsp-webshell-client
    desc: Python Behinder JSP webshell client
    crit: hostile
    conf: 0.99
    all:
      - id: python-behinder-jsp-session
      - id: python-behinder-session-type
      - id: webshell-run-command-payload
      - id: webshell-file-manager-payloads
  - id: python-behinder-aes-command-channel
    desc: Python Behinder AES command channel
    crit: hostile
    conf: 0.98
    all:
      - id: python-behinder-session-type
      - id: webshell-run-command-payload
      - id: micro-behaviors/crypto/symmetric/aes/library::pycrypto-aes-import
      - id: micro-behaviors/crypto/symmetric/aes/library::pycrypto-aes-ecb-mode
      - id: micro-behaviors/communications/http/request/client::python-json-post-method
    any:
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/crypto/symmetric/aes/library::pycrypto-aes-new
    needs: 1
  - id: python-webshell-file-manager-client
    desc: Python webshell file manager client
    crit: hostile
    conf: 0.97
    all:
      - id: webshell-run-command-payload
      - id: webshell-file-manager-payloads
      - id: micro-behaviors/communications/http/request/client::python-json-post-method
  - id: python-behinder-jsp-aes-payload-client
    desc: Python Behinder JSP AES payload client
    crit: hostile
    conf: 0.98
    all:
      - id: python-behinder-jsp-session
      - id: python-behinder-session-type
      - id: behinder-payload-java-builder
      - id: behinder-aes-ecb-payload
    any:
      - id: behinder-send-http-request-bridge
      - id: micro-behaviors/communications/http/request/client::python-json-post-method
