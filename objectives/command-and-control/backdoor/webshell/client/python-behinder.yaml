defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1505.003
  mbc: B0030
traits:
  - id: python-behinder-jsp-session
    desc: Python Behinder JSP session class
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: JSPWebshellBehinderAES
  - id: python-behinder-session-type
    desc: Behinder JSP AES session type
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: BEHINDER_JSP_AES
  - id: behinder-payload-java-builder
    desc: Behinder Payload.java compiler
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Payload\.java[\s\S]{0,240}javac[\s\S]{0,240}Payload\.class'
  - id: behinder-aes-ecb-payload
    desc: Behinder AES ECB payload wrapper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'AES\.new\s*\(\s*key\s*,\s*AES\.MODE_ECB\s*\)[\s\S]{0,160}base64\.b64encode'
  - id: behinder-send-http-request-bridge
    desc: Behinder sendHttpRequest bridge
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      exact: sendHttpRequest
  - id: retaindb-file-api-marker
    desc: RetainDB file API marker
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: retaindb_upload_file
composite_rules:
  - id: webshell-file-manager-payloads
    desc: Webshell file manager payload builders
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/fs/file/read-write::python-remote-file-manager-functions
    unless:
      - id: metadata/file/extension/identity::declaration-file-extension
      - id: well-known/app/calvyn-code
      - id: retaindb-file-api-marker
      - id: metadata/library/python-tooling::python-storage-backend-interface
      - id: metadata/library/data::distlib-package-index
      - id: metadata/library/data::vendored-python-library-source
      - id: well-known/lib/praisonaiagents::managed-compute-protocol
      - id: well-known/lib/praisonaiagents::approved-file-tool-source
  - id: python-behinder-jsp-webshell-client
    desc: Python Behinder JSP webshell client
    crit: hostile
    conf: 0.99
    all:
      - id: python-behinder-jsp-session
      - id: python-behinder-session-type
      - id: webshell-file-manager-payloads
  - id: python-behinder-aes-command-channel
    desc: Python Behinder AES command channel
    crit: hostile
    conf: 0.98
    all:
      - id: python-behinder-session-type
      - id: micro-behaviors/crypto/symmetric/aes/library::pycrypto-aes-import
      - id: micro-behaviors/crypto/symmetric/aes/library::pycrypto-aes-ecb-mode
      - id: micro-behaviors/communications/http/request/client::python-json-post-method
    any:
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/crypto/symmetric/aes/library::pycrypto-aes-new
    needs: 1
  - id: python-webshell-file-manager-client
    desc: Python webshell file manager client
    crit: hostile
    conf: 0.97
    all:
      - id: webshell-file-manager-payloads
      - id: micro-behaviors/communications/http/request/client::python-json-post-method
  - id: python-behinder-jsp-aes-payload-client
    desc: Python Behinder JSP AES payload client
    crit: hostile
    conf: 0.98
    all:
      - id: python-behinder-jsp-session
      - id: python-behinder-session-type
      - id: behinder-payload-java-builder
      - id: behinder-aes-ecb-payload
    any:
      - id: behinder-send-http-request-bridge
      - id: micro-behaviors/communications/http/request/client::python-json-post-method
