defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1505.003
  mbc: B0030
traits:
  - id: python-behinder-jsp-session
    desc: Python Behinder JSP session class
    crit: suspicious
    conf: 0.98
    if:
      type: symbol
      kind: identifier
      exact: JSPWebshellBehinderAES
  - id: python-behinder-session-type
    desc: Behinder JSP AES session type
    crit: suspicious
    conf: 0.96
    if:
      type: literal
      exact: BEHINDER_JSP_AES
  - id: webshell-run-command-payload
    desc: Webshell execute command method
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      kind: function
      exact: execute_cmd
  - id: webshell-list-dir-method
    desc: Webshell list directory method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: list_dir
  - id: webshell-read-file-method
    desc: Webshell file read method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: get_file_contents
  - id: webshell-write-file-method
    desc: Webshell file write method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: put_file_contents
  - id: webshell-delete-file-method
    desc: Webshell delete file method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: delete_file
  - id: webshell-upload-file-method
    desc: Webshell upload file method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: upload_file
  - id: webshell-download-file-method
    desc: Webshell download file method
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: download_file
composite_rules:
  - id: webshell-file-manager-payloads
    desc: Webshell file manager payload builders
    crit: suspicious
    conf: 0.94
    needs: 2
    any:
      - id: webshell-list-dir-method
      - id: webshell-read-file-method
      - id: webshell-write-file-method
      - id: webshell-delete-file-method
      - id: webshell-upload-file-method
      - id: webshell-download-file-method
  - id: python-behinder-jsp-webshell-client
    desc: Python Behinder JSP webshell client
    crit: hostile
    conf: 0.99
    all:
      - id: python-behinder-jsp-session
      - id: python-behinder-session-type
      - id: webshell-run-command-payload
      - id: webshell-file-manager-payloads
