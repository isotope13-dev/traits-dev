defaults:
  platforms: [windows, unix]
  for: [java]
  attack: T1505.003
  mbc: B0030

traits:
  - id: java-webshell-shell-entry-source
    desc: Java webshell shell entry model source
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: identifier
      exact: ShellEntry
  - id: java-webshell-test-connection-source
    desc: Java webshell test connection task source
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: identifier
      exact: TestConnectionTask
  - id: java-webshell-url-type-fields
    desc: Java webshell URL and shell type fields
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: identifier
      exact: shellTypeComboBox
  - id: java-webshell-communication-key-field
    desc: Java webshell communication key field
    crit: component
    conf: 0.86
    if:
      type: literal
      exact: 通信密钥
  - id: java-webshell-header-editor
    desc: Java webshell request header editor
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: call
      exact: setHeaders
  - id: java-webshell-shell-registry-source
    desc: Java webshell shell registry source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: member
      exact: getInstance().shells

composite_rules:
  - id: java-webshell-manager-ui
    desc: Java webshell manager UI
    crit: suspicious
    conf: 0.93
    all:
      - id: java-webshell-shell-entry-source
      - id: java-webshell-test-connection-source
      - id: java-webshell-url-type-fields
    any:
      - id: java-webshell-communication-key-field
      - id: java-webshell-header-editor
      - id: java-webshell-shell-registry-source
    needs: 2
