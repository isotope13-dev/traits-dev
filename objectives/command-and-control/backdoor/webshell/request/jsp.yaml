---
defaults:
  platforms:
  - windows
  - unix
  for:
  - java
  - class
  - html
  mbc: B0030
  attack: T1505.003
traits:
- id: jsp-runtime
  desc: Java Runtime.getRuntime() call
  crit: component
  conf: 0.6
  if:
    type: symbol
    exact: getRuntime
- id: jsp-exec
  desc: Java .exec() method call
  crit: component
  conf: 0.5
  if:
    type: text
    regex: '(Runtime\.getRuntime\(\)|getRuntime\(\))\s*\.\s*exec\s*\('
- id: jsp-get-param
  desc: JSP request.getParameter call
  crit: suspicious
  conf: 0.4
  if:
    type: text
    substr: request.getParameter
- id: jsp-runtime-exec-request-param--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.98
  if:
    type: text
    substr: request.getParameter
  count_max: 1016006
composite_rules:
- id: jsp-shell
  desc: JSP webshell implementation patterns
  crit: suspicious
  conf: 0.9
  all:
  - id: jsp-runtime
  - id: jsp-exec
  - id: jsp-get-param
- id: jsp-request-command-webshell
  desc: JSP request command webshell
  crit: hostile
  conf: 0.99
  all:
  - id: jsp-runtime-exec-request-param
  any:
  - id: jsp-runtime
  - id: jsp-exec
  - id: jsp-get-param
- id: jsp-runtime-exec-request-param
  desc: JSP Runtime.exec request parameter
  crit: suspicious
  conf: 0.98
  all:
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: jsp-runtime-exec-request-param--rx-2
  near_bytes: 4096
