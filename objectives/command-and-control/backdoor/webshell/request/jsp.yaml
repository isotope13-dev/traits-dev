defaults:
  platforms:
  - windows
  - unix
  for:
  - java
  - class
  - html
  mbc: B0030
  attack: T1505.003
traits:
- id: jsp-get-param
  desc: Reads attacker-controlled request parameter
  crit: suspicious
  conf: 0.4
  if:
    type: text
    substr: request.getParameter
composite_rules:
- id: jsp-shell
  desc: JSP webshell implementation patterns
  crit: suspicious
  conf: 0.9
  all:
  - id: jsp-get-param
  any:
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-bytecode-symbol
- id: jsp-request-command-webshell
  desc: JSP request command webshell
  crit: hostile
  conf: 0.99
  all:
  - id: jsp-runtime-exec-request-param
  - id: jsp-get-param
- id: jsp-runtime-exec-request-param
  desc: JSP Runtime.exec request parameter
  crit: suspicious
  conf: 0.98
  all:
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: objectives/command-and-control/backdoor/webshell/request::jsp-get-param
  near_bytes: 4096
