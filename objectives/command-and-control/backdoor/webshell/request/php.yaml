defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
  attack: T1505.003
traits:
# exec/shell_exec applied *directly* to request input is attack-context-specific
# (no benign use), so these fragments belong here. Bare superglobal access
# ($_GET/$_POST/$_REQUEST) is a neutral capability and lives in
# micro-behaviors/communications/http/request/params — the composites below
# reference it there rather than duplicating it (single-trait rule, TAXONOMY.md).
- id: php-exec
  desc: PHP exec() called directly on $_GET/$_POST/$_REQUEST input
  crit: component
  conf: 0.7
  if:
    type: text
    regex: "\\bexec\\s*\\(\\s*\\$_(GET|POST|REQUEST)\\b"
- id: php-shell-exec
  desc: PHP shell_exec() called directly on $_GET/$_POST/$_REQUEST input
  crit: component
  conf: 0.7
  if:
    type: text
    regex: "\\bshell_exec\\s*\\(\\s*\\$_(GET|POST|REQUEST)\\b"
- id: php-page-switch-dispatch
  desc: switch() dispatch on $page variable
  crit: component
  conf: 0.9
  if:
    type: text
    exact: switch($page)
composite_rules:
- id: php-shell-comp
  desc: PHP $_GET-driven command execution (webshell pattern)
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/lang/scripted::php-open-tag
  - id: micro-behaviors/communications/http/request/params::get-dup
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
  near_bytes: 4096
- id: php-shell-post
  desc: PHP $_POST-driven command execution (webshell pattern)
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/lang/scripted::php-open-tag
  - id: micro-behaviors/communications/http/request/params::post-dup
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
  near_bytes: 4096
- id: php-shell-request
  desc: PHP $_REQUEST-driven command execution (webshell pattern)
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/lang/scripted::php-open-tag
  - id: micro-behaviors/communications/http/request/params::request-dup
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
  near_bytes: 4096
