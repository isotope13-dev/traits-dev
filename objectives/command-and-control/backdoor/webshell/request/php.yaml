defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
  attack: T1505.003
traits:
- id: php-exec
  desc: PHP exec() called directly on $_GET/$_POST/$_REQUEST input
  crit: component
  conf: 0.7
  if:
    type: text
    regex: "\\bexec\\s*\\(\\s*\\$_(GET|POST|REQUEST)\\b"
- id: php-shell-exec
  desc: PHP shell_exec() called directly on $_GET/$_POST/$_REQUEST input
  crit: component
  conf: 0.7
  if:
    type: text
    regex: "\\bshell_exec\\s*\\(\\s*\\$_(GET|POST|REQUEST)\\b"
- id: php-get
  desc: PHP $_GET[...] superglobal access
  crit: component
  conf: 0.4
  if:
    type: text
    substr: "$_GET["
- id: php-post
  desc: PHP $_POST[...] superglobal access
  crit: component
  conf: 0.4
  if:
    type: text
    substr: "$_POST["
- id: php-request
  desc: PHP $_REQUEST[...] superglobal access
  crit: component
  conf: 0.4
  if:
    type: text
    substr: "$_REQUEST["
composite_rules:
- id: php-shell-comp
  desc: PHP $_GET-driven command execution (webshell pattern)
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/lang/scripted::php-open-tag
  - id: php-get
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
  near_bytes: 4096
- id: php-shell-post
  desc: PHP $_POST-driven command execution (webshell pattern)
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/lang/scripted::php-open-tag
  - id: php-post
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
  near_bytes: 4096
- id: php-shell-request
  desc: PHP $_REQUEST-driven command execution (webshell pattern)
  crit: suspicious
  conf: 0.9
  all:
  - id: metadata/lang/scripted::php-open-tag
  - id: php-request
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
  near_bytes: 4096
