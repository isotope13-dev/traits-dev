defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - php
  mbc: B0030
  attack: T1505.003
traits:
- id: raw-json-post-cmd-field--rx-8
  desc: json_decode (deserialise POST body)
  crit: component
  conf: 0.94
  if:
    type: text
    substr: json_decode
  count_max: 1015635
- id: raw-json-post-cmd-field--rx-10
  desc: '">cmd" JSON field accessor'
  crit: component
  conf: 0.94
  if:
    type: text
    substr: '>cmd'
  count_max: 1015637
- id: json-command-response
  desc: JSON command execution response
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: 'json_encode\s*\(\s*\[[\s\S]{0,240}[''"]status[''"][\s\S]{0,240}[''"]response[''"]'
composite_rules:
- id: raw-json-post-cmd-field
  desc: JSON POST command field
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/fs/read/file::file-get-contents
  - id: raw-json-post-cmd-field--rx-8
  - id: micro-behaviors/communications/http/request/form-input::php-input
  - id: raw-json-post-cmd-field--rx-10
  near_bytes: 4096
- id: php-json-terminal-command-webshell
  desc: PHP JSON terminal command webshell
  crit: hostile
  conf: 0.99
  all:
  - id: raw-json-post-cmd-field
  - id: objectives/command-and-control/backdoor/webshell/exec::shell-exec-command-wrapper
  any:
  - id: objectives/command-and-control/backdoor/webshell/ui::browser-terminal-fetch-cmd
  - id: objectives/command-and-control/backdoor/webshell/ui::interactive-terminal-ui
  - id: json-command-response
