defaults:
  platforms: [windows]
  for: [vbs, html]
  attack: T1505.003
  mbc: B0030

traits:
  - id: asp-decoded-execute
    desc: Classic ASP decoded execute
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)execute\s*\(\s*decode\s*\('

  - id: asp-request-eval-decoder
    desc: Classic ASP request eval decoder
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)Function\s+DeCode\s*\(.{0,80}|Asc\s*\(\s*Curchar\s*\)\s*-\s*3'
    unless:
      - id: metadata/library/structure::vscode-source-map-file
      - id: well-known/lib/deb-package::firefox-omni-basename

composite_rules:
  - id: classic-asp-decoded-eval-webshell
    desc: Classic ASP decoded eval webshell
    crit: hostile
    conf: 0.98
    all:
      - id: asp-decoded-execute
      - id: asp-request-eval-decoder
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-execute-dynamic
  - id: classic-asp-request-execute-webshell
    desc: Classic ASP request execute webshell
    crit: hostile
    conf: 0.97
    all:
      - id: asp-request-eval-decoder
      - id: asp-decoded-execute
    any:
      - id: objectives/execution/interpreter/vbscript/interpreter::vbs-execute-dynamic
