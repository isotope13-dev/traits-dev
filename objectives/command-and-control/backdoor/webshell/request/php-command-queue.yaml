defaults:
  platforms: [windows, unix]
  for: [php]
  attack: T1505.003
  mbc: B0030

composite_rules:
  - id: php-request-command-drop-endpoint
    desc: PHP request-fed command drop endpoint
    crit: suspicious
    conf: 0.93
    all:
      - id: objectives/command-and-control/backdoor/tasking/filesystem::php-commander-file-literal
      - id: objectives/command-and-control/backdoor/tasking/filesystem::php-request-text-parameter
      - id: micro-behaviors/communications/http/request/params::get-dup
      - id: micro-behaviors/fs/write/file/direct::fwrite
