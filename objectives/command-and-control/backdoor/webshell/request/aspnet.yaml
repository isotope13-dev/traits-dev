defaults:
  platforms:
  - windows
  for:
  - html
  - csharp
  mbc: B0030
  attack: T1505.003
traits:
- id: aspnet-request-processstartinfo--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    regex: \b(Request|HttpContext\s*\.\s*Current\s*\.\s*Request)\s*\.\s*QueryString\b
  count_max: 1016010
- id: aspnet-request-processstartinfo--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: Request.Form
- id: aspnet-test-file
  desc: ASP.NET test harness filename
  crit: notable
  conf: 0.98
  if:
    type: path
    basename: true
    regex: '.*Test.*\.cs$'
- id: aspnet-process-output-response--rx-10
  desc: Regex component marker
  crit: notable
  conf: 0.94
  if:
    type: text
    substr: StandardOutput.ReadToEnd
  unless:
  - type: text
    substr: NumberFormatInfo
- id: aspnet-process-output-response--rx-11
  desc: Regex component marker
  crit: notable
  conf: 0.94
  if:
    type: text
    substr: RedirectStandardOutput
  count_max: 1016015
- id: aspnet-process-output-response--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: powershell.exe
  count_max: 1016017
- id: aspnet-process-output-response--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Response.Write
  count_max: 1016018
- id: aspnet-process-output-response--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Process.Start
  count_max: 1016019
- id: aspnet-default-recon-command
  desc: ASP.NET webshell default recon command
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: whoami /all && hostname && ipconfig
- id: dnn-portals-health-check-webshell
  desc: DNN Portals health-check webshell path
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '/Portals/0/health_check_t\.aspx|health_check_t\.aspx'
composite_rules:
- id: aspnet-request-command-webshell
  desc: ASP.NET request command webshell
  crit: hostile
  conf: 0.98
  all:
  - id: aspnet-request-processstartinfo
  any:
  - id: aspnet-process-output-response
  - id: micro-behaviors/process/create/spawn::start-info
  - id: micro-behaviors/process/create/spawn::start
  unless:
  - id: aspnet-test-file
- id: aspnet-default-recon-webshell
  desc: ASP.NET default recon webshell
  crit: hostile
  conf: 0.99
  all:
  - id: aspnet-request-command-webshell
  - id: aspnet-default-recon-command
- id: aspnet-request-processstartinfo
  desc: ASP.NET request launches process
  crit: suspicious
  conf: 0.96
  all:
  - id: objectives/command-and-control/backdoor/webshell/request::aspnet-process-output-response--rx-15
  # ProcessStart/Info plus cmd.exe is common in benign helpers and wrappers.
  # For a webshell objective, require an actual ASP.NET request source.
  any:
  - id: aspnet-request-processstartinfo--rx-6
  - id: aspnet-request-processstartinfo--rx-9
  unless:
  - id: aspnet-test-file
- id: aspnet-process-output-capture
  desc: ASP.NET process output capture
  crit: notable
  conf: 0.9
  all:
  - id: aspnet-process-output-response--rx-15
  any:
  - id: aspnet-process-output-response--rx-10
  - id: aspnet-process-output-response--rx-11
- id: aspnet-process-output-response
  desc: ASP.NET process output response
  crit: notable
  conf: 0.94
  all:
  - id: aspnet-process-output-response--rx-15
  # Output capture alone is common in benign wrappers. For an ASP.NET
  # response signal, require a response sink or explicit PowerShell launcher.
  any:
  - id: aspnet-process-output-response--rx-13
  - id: aspnet-process-output-response--rx-14
  unless:
  - id: aspnet-test-file
