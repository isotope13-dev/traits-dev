defaults:
  platforms:
  - windows
  for:
  - html
  - csharp
  mbc: B0030
  attack: T1505.003
traits:
- id: aspnet-request-processstartinfo--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: powershell.exe
  count_max: 1016008
- id: aspnet-request-processstartinfo--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: Process.Start
  count_max: 1016009
- id: aspnet-request-processstartinfo--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: QueryString
  count_max: 1016010
- id: aspnet-request-processstartinfo--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: cmd.exe
  count_max: 1016011
- id: aspnet-request-processstartinfo--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: Request
  unless:
  - type: text
    substr: NumberFormatInfo
- id: aspnet-request-processstartinfo--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.96
  if:
    type: text
    substr: Request.Form
- id: aspnet-process-output-response--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: StandardOutput.ReadToEnd
  unless:
  - type: text
    substr: NumberFormatInfo
- id: aspnet-process-output-response--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: RedirectStandardOutput
  count_max: 1016015
- id: aspnet-process-output-response--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: powershell.exe
  count_max: 1016017
- id: aspnet-process-output-response--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Response.Write
  count_max: 1016018
- id: aspnet-process-output-response--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: Process.Start
  count_max: 1016019
- id: aspnet-process-output-response--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.94
  if:
    type: text
    substr: cmd.exe
  count_max: 1016020
- id: aspnet-default-recon-command
  desc: ASP.NET webshell default recon command
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: whoami /all && hostname && ipconfig
- id: dnn-portals-health-check-webshell
  desc: DNN Portals health-check webshell path
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '/Portals/0/health_check_t\.aspx|health_check_t\.aspx'
composite_rules:
- id: aspnet-request-command-webshell
  desc: ASP.NET request command webshell
  crit: hostile
  conf: 0.98
  all:
  - id: aspnet-request-processstartinfo
  any:
  - id: aspnet-process-output-response
  - id: micro-behaviors/process/create/spawn::start-info
  - id: micro-behaviors/process/create/spawn::start
- id: aspnet-default-recon-webshell
  desc: ASP.NET default recon webshell
  crit: hostile
  conf: 0.99
  all:
  - id: aspnet-request-command-webshell
  - id: aspnet-default-recon-command
- id: aspnet-request-processstartinfo
  desc: ASP.NET request launches process
  crit: suspicious
  conf: 0.96
  all:
  - id: aspnet-request-processstartinfo--rx-5
  # ProcessStartInfo alone is too common in any C# app that launches a
  # process; require HTTP request context or a command shell.
  any:
  - id: aspnet-request-processstartinfo--rx-4
  - id: aspnet-request-processstartinfo--rx-6
  - id: aspnet-request-processstartinfo--rx-7
  - id: aspnet-request-processstartinfo--rx-8
  - id: aspnet-request-processstartinfo--rx-9
- id: aspnet-process-output-response
  desc: ASP.NET process output response
  crit: suspicious
  conf: 0.94
  all:
  - id: aspnet-process-output-response--rx-15
  # ProcessStartInfo (rx-12) removed — too common in any C# app.
  # Require output capture (ReadToEnd, RedirectStandardOutput, Response.Write)
  # or a command shell.
  any:
  - id: aspnet-process-output-response--rx-10
  - id: aspnet-process-output-response--rx-11
  - id: aspnet-process-output-response--rx-13
  - id: aspnet-process-output-response--rx-14
  - id: aspnet-process-output-response--rx-16
