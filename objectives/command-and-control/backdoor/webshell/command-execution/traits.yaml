composite_rules:
- id: php-xpath-reflection-webshell
  desc: XPath reflection webshell with command execution
  crit: hostile
  conf: 0.98
  attack: T1505.003
  all:
  - id: xpath-php-function-rce
  any:
  - id: reflection-class-instantiation
  - id: register-php-functions
  - id: micro-behaviors/communications/http/request/params::get-dup
  - id: micro-behaviors/communications/http/request/params::request-dup
  needs: 2

- id: php-decoder-eval-webshell
  desc: PHP decoder eval webshell
  crit: hostile
  conf: 0.97
  attack: T1505.003
  all:
  - id: objectives/command-and-control/backdoor/webshell/decoder::eval-decoder-chain
  any:
  - id: objectives/command-and-control/backdoor/webshell/decoder::hardcoded-urldecode-payload
  - id: eval-base64-large-payload
  - id: micro-behaviors/process/interpreter/eval::eval-gzinflate-base64
  - id: micro-behaviors/process/interpreter/eval::eval-gzuncompress-base64
  - id: micro-behaviors/process/interpreter/eval::eval-user-input
  - id: micro-behaviors/communications/http/request/params::get-dup
  - id: micro-behaviors/communications/http/request/params::post-dup
  - id: micro-behaviors/communications/http/request/params::request-dup

- id: php-header-backdoor
  desc: PHP backdoor using custom HTTP headers for input
  crit: hostile
  conf: 0.98
  attack: T1505.003
  all:
  - id: custom-header-input
  any:
  - id: micro-behaviors/process/create/shell/lang/
  - id: micro-behaviors/process/interpreter/eval::eval-symbol

- id: php-dynamic-user-input-backdoor
  desc: PHP backdoor executing user input directly (AST)
  crit: hostile
  conf: 0.99
  attack: T1505.003
  any:
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
  - id: micro-behaviors/process/interpreter/eval::eval-user-input

- id: dynamic-user-input-call
  desc: User input used as function
  crit: suspicious
  conf: 0.98
  attack: T1505.003
  any:
  - id: dynamic-user-input-call-1
  - id: dynamic-user-input-call-2
- id: php-execution-fallback-chain
  desc: Falls back through multiple PHP execution functions
  crit: suspicious
  conf: 0.95
  any:
  - id: php-execution-fallback-chain--rx-16
  - id: php-execution-fallback-chain--rx-17
  - id: php-execution-fallback-chain--rx-18
  - id: php-execution-fallback-chain--rx-19
  - id: php-execution-fallback-chain--rx-20
  - id: php-execution-fallback-chain--rx-21
  - id: php-execution-fallback-chain--rx-22
  - id: php-execution-fallback-chain--rx-23
  - id: php-execution-fallback-chain--rx-24
- id: xpath-php-function-rce
  desc: XPath php:functionString for command execution
  crit: suspicious
  conf: 0.97
  attack: T1505.003
  any:
  - id: xpath-php-function-rce--rx-25
  - id: xpath-php-function-rce--rx-26
  - id: xpath-php-function-rce--rx-27
