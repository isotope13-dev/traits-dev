defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - php
  mbc: B0030
traits:
- id: shell-exec-command-wrapper
  desc: shell_exec command wrapper function
  crit: suspicious
  conf: 0.95
  attack: T1505.003
  if:
    type: text
    regex: 'function\s+exec_command\s*\(\s*\$cmd[^)]{0,120}\)[\s\S]{0,240}shell_exec\s*\(\s*\$cmd\s*\)'
- id: custom-header-input
  desc: Custom HTTP header input access (HTTP_X_*)
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: \$_SERVER\s*\[\s*["']HTTP_X_[A-Z0-9_-]+["']\s*\]

- id: dynamic-user-input-call-1
  desc: User input used as function (GET/POST/REQUEST)
  crit: suspicious
  conf: 0.98
  attack: T1505.003
  if:
    type: ast
    kind: call
    regex: \$_(GET|POST|REQUEST)\s*\[[^]]+\]\s*\(
- id: dynamic-user-input-call-2
  desc: User input used as function (COOKIE/SERVER)
  crit: suspicious
  conf: 0.98
  attack: T1505.003
  if:
    type: ast
    kind: call
    regex: \$_(COOKIE|SERVER)\s*\[[^]]+\]\s*\(
- id: eval-base64-large-payload
  desc: Decodes a large embedded payload (base64)
  crit: suspicious
  conf: 0.99
  attack: T1505.003
  if:
    type: text
    regex: base64_decode\s*\(["'][A-Za-z0-9+/=]{500,}
- id: reflection-class-instantiation
  desc: PHP ReflectionClass instantiation
  crit: component
  conf: 0.85
  attack: T1059.004
  if:
    type: symbol
    exact: ReflectionClass
- id: xpath-php-function-rce--rx-25
  desc: Regex component marker
  crit: component
  conf: 0.97
  if:
    type: text
    regex: "php:function.{0,30}(system|exec)"

  count_max: 1015694
- id: xpath-php-function-rce--rx-26
  desc: Regex component marker
  crit: component
  conf: 0.97
  if:
    type: text
    regex: "php:function.{0,30}(passthru|shell_exec)"

  count_max: 1015695
- id: xpath-php-function-rce--rx-27
  desc: Regex component marker
  crit: component
  conf: 0.97
  if:
    type: text
    regex: "php:function.{0,30}(popen)"

  count_max: 1015696
- id: register-php-functions
  desc: DOMXPath registerPHPFunctions call
  crit: component
  conf: 0.85
  attack: T1059.004
  if:
    type: text
    substr: registerPHPFunctions

- id: php-execution-fallback-chain--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '["''](shell_exec|exec)["''].{0,100}["''](shell_exec|exec)["'']'

