defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  - java
  - class
  - html
  - csharp
  mbc: B0030
  attack: T1505.003
traits:
- id: php-tag
  desc: PHP opening tag
  crit: component
  conf: 0.3
  if:
    type: text
    substr: "<?php"
    case_insensitive: true
- id: php-exec
  desc: PHP exec() from request data
  crit: component
  conf: 0.7
  for:
  - php
  if:
    type: text
    regex: "\\bexec\\s*\\(\\s*\\$_(GET|POST|REQUEST)\\b"
- id: php-shell-exec
  desc: PHP shell_exec() from request data
  crit: component
  conf: 0.7
  for:
  - php
  if:
    type: text
    regex: "\\bshell_exec\\s*\\(\\s*\\$_(GET|POST|REQUEST)\\b"
- id: php-get
  desc: PHP $_GET parameter access
  crit: component
  conf: 0.4
  if:
    type: text
    substr: "$_GET["
- id: php-post
  desc: PHP $_POST parameter access
  crit: component
  conf: 0.4
  if:
    type: text
    substr: "$_POST["
- id: php-request
  desc: PHP $_REQUEST parameter access
  crit: component
  conf: 0.4
  if:
    type: text
    substr: "$_REQUEST["
composite_rules:
- id: php-shell-comp
  desc: PHP webshell implementation patterns
  crit: suspicious
  conf: 0.9
  all:
  - id: php-tag
  - id: php-get
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
- id: php-shell-post
  desc: PHP webshell POST execution pattern
  crit: suspicious
  conf: 0.9
  all:
  - id: php-tag
  - id: php-post
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
- id: php-shell-request
  desc: PHP webshell REQUEST execution pattern
  crit: suspicious
  conf: 0.9
  all:
  - id: php-tag
  - id: php-request
  any:
  - id: php-exec
  - id: php-shell-exec
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
