defaults:
  platforms:
  - windows
  - unix
  for:
  - html
  - php
  - perl
  mbc: B0030
  attack: T1505.003
traits:
- id: identifier
  desc: Explicit web-shell panel or command terminology
  crit: suspicious
  conf: 0.82
  if:
    type: text
    regex: '(?i)webshell.{0,40}(panel|manager)'
  unless:
  - id: well-known/app/browser-extension-known/
  - id: well-known/tool/detection/
  - id: well-known/tool/detection/security-scanner::cloud-sdk-api-model
  - id: metadata/library/cloud-sdk::huaweicloud-python-model
  - id: metadata/package/documentation::webshell-policy-doc-marker
  - type: path
    regex: '(?i)\.yar(a)?$'
- id: webshell-admin-terms--rx-17
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: "(?i)(backdoor|cmd shell)"
- id: webshell-admin-terms--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: "(?i)(web shell|reverse shell)"
- id: filesman-file-manager-label
  desc: 'FilesMan file-manager panel label'
  crit: suspicious
  conf: 0.95
  for: [php, java, class, html, csharp]
  size_max: 1000000
  if:
    type: text
    word: FilesMan
  unless:
  - id: well-known/tool/detection/
- id: webshell-admin-terms--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: "(?i)(rootkit|meterpreter)"
- id: webshell-admin-terms--rx-20
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: "(?i)(hashcrack|safe_mode bypass)"
- id: webshell-admin-terms--rx-21
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: "(?i)(open_basedir bypass|deface)"
composite_rules:
- id: webshell-admin-terms
  desc: Webshell administrative terms
  crit: suspicious
  conf: 0.78
  any:
  - id: webshell-admin-terms--rx-17
  - id: webshell-admin-terms--rx-18
  - id: webshell-admin-terms--rx-19
  - id: webshell-admin-terms--rx-20
  - id: webshell-admin-terms--rx-21
  unless:
  - id: metadata/library/syntaxhighlighter/
  - id: metadata/library/structure/
- id: admin-terms-identified
  desc: Generic webshell admin terminology
  crit: suspicious
  conf: 0.82
  all:
  - id: identifier
  - id: webshell-admin-terms
  unless:
  - id: well-known/tool/detection/
  - id: well-known/tool/detection/security-scanner::cloud-sdk-api-model
  - id: metadata/library/cloud-sdk::huaweicloud-python-model
