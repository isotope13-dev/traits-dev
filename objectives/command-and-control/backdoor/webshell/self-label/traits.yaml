defaults:
  platforms:
  - windows
  - unix
  for:
  - scripts
  - html
  mbc: B0030
  attack: T1505.003
traits:
- id: identifier
  desc: Webshell-related terminology
  crit: suspicious
  conf: 0.6
  if:
    type: text
    word: webshell
    case_insensitive: true
  unless:
  - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
- id: webshell-admin-terms--rx-17
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: "(?i)(backdoor|cmd shell)"
  count_max: 1016035
- id: webshell-admin-terms--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: "(?i)(web shell|reverse shell)"
  count_max: 1016036
- id: webshell-admin-terms--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: "(?i)(rootkit|meterpreter)"
  count_max: 1016037
- id: webshell-admin-terms--rx-20
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: "(?i)(hashcrack|safe_mode bypass)"
  count_max: 1016038
- id: webshell-admin-terms--rx-21
  desc: Regex component marker
  crit: component
  conf: 0.78
  count_min: 3
  if:
    type: text
    regex: "(?i)(open_basedir bypass|deface)"
  count_max: 1016039
composite_rules:
- id: webshell-admin-terms
  desc: Webshell administrative terms
  crit: suspicious
  conf: 0.78
  any:
  - id: webshell-admin-terms--rx-17
  - id: webshell-admin-terms--rx-18
  - id: webshell-admin-terms--rx-19
  - id: webshell-admin-terms--rx-20
  - id: webshell-admin-terms--rx-21
- id: admin-terms-identified
  desc: Generic webshell admin terminology
  crit: suspicious
  conf: 0.82
  all:
  - id: identifier
  - id: webshell-admin-terms
  unless:
  - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
