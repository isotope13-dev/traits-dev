---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
composite_rules:
- id: php-proxy
  desc: PHP proxy/SSRF webshell for fetching
  crit: suspicious
  conf: 0.9
  attack: T1090
  all:
  - id: micro-behaviors/communications/http/curl::init
  any:
  - id: micro-behaviors/communications/http/request/
  - id: micro-behaviors/communications/http/curl::ssl-verify-disable
  - id: micro-behaviors/communications/http/curl::ssl-host-disable
- id: php-seo-tool
  desc: PHP SEO spam tool with remote fetch
  crit: suspicious
  conf: 0.85
  attack: T1505.003
  all:
  - id: objectives/command-and-control/backdoor/webshell/fetch::google-search-scrape
  - id: micro-behaviors/communications/http/curl::init
