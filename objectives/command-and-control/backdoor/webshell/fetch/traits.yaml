defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - php
  mbc: B0030
traits:
- id: ssrf-pattern
  desc: Server-side request forgery fetch pattern
  crit: suspicious
  conf: 0.85
  attack: T1090
  if:
    type: text
    regex: curl_init\s*\(.{0,50}\$_(GET|POST|REQUEST)
- id: google-search-scrape
  desc: Google search results scraping
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    regex: 'google\.[a-z.]+/search\?.{0,50}site:'
- id: url-param-fetch
  desc: URL parameter fetched and executed
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: (curl_init|file_get_contents|fopen)\s*\(.{0,50}\$_(GET|POST)
  unless:
  - id: well-known/app/egroupware/
  - id: metadata/lang/source::yara-rule-source
  - id: well-known/tool/detection/security-scanner::anteumbra-package-tree-member
  - id: well-known/app/wordpress-plugins::bitfire-plugin-path
composite_rules:
