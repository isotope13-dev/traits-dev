defaults:
  platforms: [windows, unix]
  for: [jpeg, png]
  attack: T1505.003
  mbc: B0030
composite_rules:
  - id: php-code-in-image
    desc: PHP code embedded in image
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/embedded/payload::embedded-php-open-tag
      - id: metadata/file/magic
