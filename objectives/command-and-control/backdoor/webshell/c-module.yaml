# Apache module webshell detection (C source)
# Detects malicious Apache modules that act as webshell backdoors
# by combining HTTP request parameter parsing with command execution
# MBC: B0030 (C2 Communication)
# ATT&CK: T1505.003 (Server Software Component: Web Shell)
defaults:
  for: [c, cpp]
  platforms: [linux, unix]
composite_rules:
  - id: apache-module-webshell
    desc: "Apache module webshell backdoor"
    crit: hostile
    conf: 0.95
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: micro-behaviors/communications/http/server::apache-hook-handler
      - id: micro-behaviors/communications/http/server::apache-request-param
    any:
      - id: micro-behaviors/process/create/popen/
      - id: micro-behaviors/process/create/shell/
