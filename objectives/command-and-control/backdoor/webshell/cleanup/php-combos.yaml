---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: F0006
composite_rules:
- id: php-self-destruct
  desc: PHP webshell with self-deletion capability
  crit: suspicious
  conf: 0.95
  attack: T1070.004
  all:
  - id: objectives/evasion/self-delete/file/script::script-self-delete
  - id: micro-behaviors/communications/http/request/
- id: php-timestomp
  desc: PHP webshell with timestamp manipulation
  crit: suspicious
  conf: 0.9
  attack: T1070.006
  all:
  - id: objectives/evasion/indicator-removal/timestamps::timestomp
  - id: micro-behaviors/fs/write/
