defaults:
  platforms: [unix]
  for: [php]
  size_min: 8000
  size_max: 50000
  attack: T1505.003
  mbc: B0030

traits:
  - id: title-banner
    desc: R57 page title banner
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: '<title>r57shell</title>'

  - id: rush-credit
    desc: RusH security team credit
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: 'RusH security team'

  - id: basic-auth-realm
    desc: Basic auth webshell gate
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: 'WWW-Authenticate: Basic realm="r57shell"'

  - id: unauthorized-response
    desc: Unauthorized response header
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "HTTP/1.0 401 Unauthorized"

  - id: default-user
    desc: Hardcoded r57 username
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: '$name="r57";'

  - id: default-pass
    desc: Hardcoded r57 password
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: '$pass="r57";'

  - id: windows1251-charset
    desc: Windows-1251 charset marker
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'charset=windows-1251'

  - id: windows1251-eng-text
    desc: English command label text
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "'eng_text1' => 'Executed command'"

  - id: windows1251-ru-text
    desc: Russian operator label text
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "'ru_text1' => "

  - id: html-tag-present
    desc: HTML tag in script body
    crit: component
    conf: 0.92
    if:
      type: text
      substr: '<html>'

  - id: bind-socket-source
    desc: Embedded AF_INET bind socket
    crit: notable
    conf: 0.95
    attack: T1095
    if:
      type: text
      substr: 'socket(AF_INET,SOCK_STREAM,0);'

  - id: bind-listen-call
    desc: Bind shell listen call
    crit: component
    conf: 0.95
    attack: T1095
    if:
      type: text
      substr: 'listen(sockfd, 5);'

  - id: bind-accept-call
    desc: Bind shell accept call
    crit: component
    conf: 0.95
    attack: T1095
    if:
      type: text
      substr: 'newfd=accept(sockfd,0,0);'

  - id: bind-dup2-stdin
    desc: Socket dup2 to stdin
    crit: component
    conf: 0.97
    attack: T1095
    if:
      type: text
      substr: 'dup2(newfd,0);'

  - id: bind-dup2-stdout
    desc: Socket dup2 to stdout
    crit: component
    conf: 0.97
    attack: T1095
    if:
      type: text
      substr: 'dup2(newfd,1);'

  - id: bind-dup2-stderr
    desc: Socket dup2 to stderr
    crit: component
    conf: 0.97
    attack: T1095
    if:
      type: text
      substr: 'dup2(newfd,2);'

  - id: bind-password-prompt
    desc: Bind shell password prompt
    crit: component
    conf: 0.98
    attack: T1078
    if:
      type: text
      substr: 'write(newfd,\"Password:\",10);'

  - id: bind-password-check
    desc: Bind shell password check
    crit: component
    conf: 0.98
    attack: T1078
    if:
      type: text
      substr: 'if (!chpass(argv[2],buf))'

composite_rules:
  - id: windows1251-ui
    desc: Windows-1251 bilingual operator UI
    crit: suspicious
    conf: 0.95
    all:
      - id: windows1251-charset
      - id: windows1251-eng-text
      - id: windows1251-ru-text

  - id: bind-listen-source
    desc: Embedded listen accept loop
    crit: notable
    conf: 0.95
    attack: T1095
    all:
      - id: bind-listen-call
      - id: bind-accept-call

  - id: bind-stdio-redirect
    desc: Redirects accepted socket to stdio
    crit: notable
    conf: 0.97
    attack: T1095
    all:
      - id: bind-dup2-stdin
      - id: bind-dup2-stdout
      - id: bind-dup2-stderr

  - id: bind-password-gate
    desc: Password gated bind shell
    crit: suspicious
    conf: 0.98
    attack: T1078
    all:
      - id: bind-password-prompt
      - id: bind-password-check

  - id: auth-gated-r57-console
    desc: Auth gated R57 control panel
    crit: suspicious
    conf: 0.995
    all:
      - id: title-banner
      - id: rush-credit
      - id: basic-auth-realm
      - id: unauthorized-response
      - id: default-user
      - id: default-pass
    any:
      - id: windows1251-ui
      - id: html-tag-present
    needs: 1

  - id: passworded-bind-shell-source
    desc: Embedded passworded bind shell
    crit: hostile
    conf: 0.998
    attack: T1095
    all:
      - id: bind-socket-source
      - id: bind-listen-call
      - id: bind-accept-call
      - id: bind-dup2-stdin
      - id: bind-dup2-stdout
      - id: bind-dup2-stderr
      - id: bind-password-prompt
      - id: bind-password-check
      - id: micro-behaviors/process/create/shell/webshell::bind-shell-compile-launch
      - id: micro-behaviors/process/create/shell/webshell::interactive-bash-bind

  - id: r57-legacy-webshell
    desc: R57 legacy PHP webshell
    crit: hostile
    conf: 0.999
    all:
      - id: auth-gated-r57-console
      - id: micro-behaviors/process/create/shell/webshell::post-command-passthru
      - id: micro-behaviors/fs/write/file::legacy-http-post-files-copy
    any:
      - id: micro-behaviors/fs/write/file::tmp-bind-source-drop
      - id: objectives/discovery/system/fingerprint::inline-host-recon
      - id: objectives/discovery/system/fingerprint::privilege-surface-enumeration
      - id: passworded-bind-shell-source
    needs: 2
