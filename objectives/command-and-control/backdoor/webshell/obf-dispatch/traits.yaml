defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
traits:
- id: comment-split-assert-rebuild
  desc: Comment-split assert rebuilt at runtime
  crit: suspicious
  conf: 0.98
  attack: T1027
  if:
    type: text
    substr: '@$_=/*-/*-*/"a"./*-/*-*/$_./*-/*-*/"t"'
- id: comment-split-post-superglobal
  desc: Comment-split POST superglobal rebuild
  crit: suspicious
  conf: 0.98
  attack: T1505.003
  if:
    type: text
    substr: '{"_P"./*-/*-*/"OS"./*-/*-*/"T"}['
- id: arithmetic-post-key-minus-seven
  desc: Arithmetic derived POST key -7
  crit: suspicious
  conf: 0.94
  attack: T1027
  mbc: B0032
  if:
    type: text
    substr: '0/*-/*-*/-/*-/*-*/2/*-/*-*/-/*-/*-*/5'
- id: request-to-dynamic-dispatch
  desc: HTTP request reaches dynamic dispatch
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\$_REQUEST.{0,120}\$GLOBALS\[["''][A-Za-z0-9_]+["'']\]'
- id: php-static-string-table
  desc: PHP static string table
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'self::$_it = array('
- id: php-chr-ord-xor-loop
  desc: PHP chr/ord XOR byte loop
  crit: component
  conf: 0.93
  if:
    type: text
    substr: 'chr(ord('
- id: php-xor-ord-operand
  desc: PHP ord XOR operand
  crit: component
  conf: 0.9
  if:
    type: text
    substr: '^ ord('
- id: php-decoded-request-key
  desc: PHP decoded request key
  crit: component
  conf: 0.93
  if:
    type: text
    substr: 'isset($_REQUEST[_'
- id: php-request-reparse-from-decoder
  desc: PHP reparses decoded request data
  crit: component
  conf: 0.94
  if:
    type: text
    substr: 'parse_str(bor($_REQUEST['
- id: php-unlink-call
  desc: PHP unlink call
  crit: component
  conf: 0.88
  if:
    type: symbol
    exact: unlink
- id: php-popen-call
  desc: PHP popen call
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: popen
- id: php-proc-open-call
  desc: PHP proc_open call
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: proc_open
- id: php-fsockopen-call
  desc: PHP fsockopen call
  crit: component
  conf: 0.88
  if:
    type: symbol
    exact: fsockopen

composite_rules:
- id: php-stealth-output-control
  desc: Disables error reporting and clears output buffers (stealth)
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/os/stdio::error-reporting-off
  - id: micro-behaviors/process/io/buffer::ob-end-clean

- id: php-obfuscated-request-dispatch-backdoor
  desc: Obfuscated PHP request dispatch backdoor
  crit: hostile
  conf: 0.98
  attack: T1505.003
  all:
  - id: micro-behaviors/communications/http/request/params::request-dup
  - id: objectives/anti-static/obfuscation/string/array::php-packed-string-table-dispatch
  - id: micro-behaviors/process/interpreter/eval::dynamic-function-execution
  any:
  - id: request-to-dynamic-dispatch
  - id: micro-behaviors/os/stdio::error-suppress-prefix
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers::php-webshell-pattern

- id: php-obfuscated-request-dispatch
  desc: Obfuscated PHP request dispatcher
  crit: suspicious
  conf: 0.95
  attack: T1505.003
  all:
  - id: micro-behaviors/communications/http/request/params::request-dup
  - id: objectives/anti-static/obfuscation/string/array::php-escaped-string-table-obfuscation
  any:
  - id: request-to-dynamic-dispatch
  - id: micro-behaviors/os/stdio::error-suppress-prefix

- id: php-xor-string-table-decoder
  desc: PHP XOR-decoded string table
  crit: component
  conf: 0.94
  all:
  - id: php-static-string-table
  - id: php-chr-ord-xor-loop
  - id: php-xor-ord-operand
- id: php-decoded-request-router
  desc: PHP decoded request-key router
  crit: component
  conf: 0.95
  all:
  - id: php-decoded-request-key
  - id: php-request-reparse-from-decoder
- id: php-decoded-request-file-write
  desc: PHP decoded request writes server file
  crit: component
  conf: 0.94
  all:
  - id: php-decoded-request-key
  - id: micro-behaviors/fs/write/file/direct::file-put-contents
- id: php-decoded-request-file-delete
  desc: PHP decoded request deletes server file
  crit: component
  conf: 0.94
  all:
  - id: php-decoded-request-key
  - id: php-unlink-call
- id: php-decoded-request-process-exec
  desc: PHP decoded request process execution
  crit: component
  conf: 0.95
  all:
  - id: php-decoded-request-key
  any:
  - id: php-popen-call
  - id: php-proc-open-call
- id: php-decoded-request-socket-client
  desc: PHP decoded request socket client
  crit: component
  conf: 0.92
  all:
  - id: php-decoded-request-key
  any:
  - id: php-fsockopen-call
  - id: micro-behaviors/communications/socket/connect::php-stream-socket-client

- id: php-xor-request-dispatch-webshell
  desc: PHP XOR-decoded request dispatcher webshell
  crit: hostile
  conf: 0.98
  attack: T1505.003
  all:
  - id: php-xor-string-table-decoder
  - id: php-decoded-request-router
  any:
  - id: php-decoded-request-process-exec
  - id: php-decoded-request-file-write
  - id: php-decoded-request-socket-client
- id: php-obfuscated-file-operation-webshell
  desc: PHP obfuscated request file-operation webshell
  crit: hostile
  conf: 0.98
  attack: T1505.003
  all:
  - id: php-xor-string-table-decoder
  - id: php-decoded-request-file-write
  - id: php-decoded-request-file-delete
  any:
  - id: php-decoded-request-router
  - id: micro-behaviors/communications/http/request/params::files
- id: php-obfuscated-process-webshell
  desc: PHP obfuscated request process webshell
  crit: hostile
  conf: 0.98
  attack: T1059.004
  all:
  - id: php-xor-string-table-decoder
  - id: php-decoded-request-router
  - id: php-decoded-request-process-exec
  any:
  - id: php-decoded-request-socket-client
  - id: micro-behaviors/process/control/signal::ignore-user-abort
  - id: micro-behaviors/process/control/signal::set-time-limit

- id: php-comment-split-assert-post-backdoor
  desc: PHP webshell rebuilds assert and POST
  crit: hostile
  conf: 0.99
  attack: T1505.003
  all:
  - id: metadata/lang/scripted::php-open-tag
  - id: comment-split-assert-rebuild
  - id: comment-split-post-superglobal
  any:
  - id: arithmetic-post-key-minus-seven
  - id: micro-behaviors/os/stdio::error-suppress-prefix
