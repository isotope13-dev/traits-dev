defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - php
  mbc: B0030
traits:
- id: error-suppress-prefix
  desc: Error suppression operator usage (@)
  crit: component
  conf: 0.7
  mbc: B0032
  if:
    type: ast
    node: error_suppression_expression
    regex: .{1,120}
- id: comment-split-assert-rebuild
  desc: Comment-split assert rebuilt at runtime
  crit: suspicious
  conf: 0.98
  attack: T1027
  if:
    type: text
    substr: '@$_=/*-/*-*/"a"./*-/*-*/$_./*-/*-*/"t"'
- id: comment-split-post-superglobal
  desc: Comment-split POST superglobal rebuild
  crit: suspicious
  conf: 0.98
  attack: T1505.003
  if:
    type: text
    substr: '{"_P"./*-/*-*/"OS"./*-/*-*/"T"}['
- id: arithmetic-post-key-minus-seven
  desc: Arithmetic derived POST key -7
  crit: suspicious
  conf: 0.94
  attack: T1027
  mbc: B0032
  if:
    type: text
    substr: '0/*-/*-*/-/*-/*-*/2/*-/*-*/-/*-/*-*/5'
- id: forward-static-call-array-raw
  desc: forward_static_call_array in raw content
  crit: suspicious
  conf: 0.8
  if:
    type: text
    exact: forward_static_call_array
- id: forward-static-call-concat-pattern
  desc: forward_static_call_array with string concat (obfuscation)
  crit: suspicious
  conf: 0.9
  attack: T1027
  if:
    type: text
    regex: forward_static_call_array.{0,80}\.

- id: request-to-dynamic-dispatch
  desc: HTTP request reaches dynamic dispatch
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\$_REQUEST.{0,120}\$GLOBALS\[["''][A-Za-z0-9_]+["'']\]'

composite_rules:
- id: php-stealth-output-control
  desc: Disables error reporting and clears output buffers (stealth)
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/os/stdio::error-reporting-off
  - id: micro-behaviors/process/io/buffer::ob-end-clean

- id: php-obfuscated-request-dispatch-backdoor
  desc: Obfuscated PHP request dispatch backdoor
  crit: hostile
  conf: 0.98
  attack: T1505.003
  all:
  - id: micro-behaviors/communications/http/request/params::request-dup
  - id: objectives/anti-static/obfuscation/string/array::php-packed-string-table-dispatch
  - id: objectives/anti-static/obfuscation/imports::dynamic-function-execution
  any:
  - id: request-to-dynamic-dispatch
  - id: objectives/command-and-control/backdoor/webshell/obf-dispatch::error-suppress-prefix
  - id: objectives/anti-static/obfuscation/code-metrics::php-webshell-pattern

- id: php-obfuscated-request-dispatch
  desc: Obfuscated PHP request dispatcher
  crit: suspicious
  conf: 0.95
  attack: T1505.003
  all:
  - id: micro-behaviors/communications/http/request/params::request-dup
  - id: objectives/anti-static/obfuscation/string/array::php-escaped-string-table-obfuscation
  any:
  - id: request-to-dynamic-dispatch
  - id: objectives/command-and-control/backdoor/webshell/obf-dispatch::error-suppress-prefix

- id: php-comment-split-assert-post-backdoor
  desc: PHP webshell rebuilds assert and POST
  crit: hostile
  conf: 0.99
  attack: T1505.003
  all:
  - id: objectives/command-and-control/backdoor/webshell/param-php::php-tag
  - id: comment-split-assert-rebuild
  - id: comment-split-post-superglobal
  any:
  - id: arithmetic-post-key-minus-seven
  - id: error-suppress-prefix

  # Obfuscated webshell: forward_static_call_array with dynamic execution
- id: forward-static-call-webshell
  desc: Obfuscated webshell with forward_static_call_array
  crit: suspicious
  conf: 0.9
  attack: T1505.003
  all:
  - id: forward-static-call-array-raw
  - id: micro-behaviors/communications/http/request::request
  any:
  - id: objectives/command-and-control/backdoor/webshell/exec::dynamic-user-input-call
  - id: forward-static-call-concat-pattern
  needs: 2

