---
defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - php
  mbc: B0030
traits:
- id: dynamic-user-input-call-1
  desc: User input used as function (GET/POST/REQUEST)
  crit: suspicious
  conf: 0.98
  attack: T1505.003
  if:
    type: text
    regex: "\\$_(GET|POST|REQUEST)\\s*\\[[^]]+\\]\\s*\\("
  unless:
  - id: well-known/app/egroupware/
- id: dynamic-user-input-call-2
  desc: User input used as function (COOKIE/SERVER)
  crit: suspicious
  conf: 0.98
  attack: T1505.003
  if:
    type: text
    regex: "\\$_(COOKIE|SERVER)\\s*\\[[^]]+\\]\\s*\\("
  unless:
  - id: well-known/app/moodle-stubs/
  - id: well-known/app/egroupware/
- id: reflection-class-instantiation
  desc: PHP ReflectionClass instantiation
  crit: component
  conf: 0.85
  attack: T1059.004
  if:
    type: symbol
    exact: ReflectionClass
- id: xpath-php-function-rce--rx-25
  desc: Regex component marker
  crit: component
  conf: 0.97
  if:
    type: text
    regex: php:function.{0,30}(system|exec)
  count_max: 1015694
- id: xpath-php-function-rce--rx-26
  desc: Regex component marker
  crit: component
  conf: 0.97
  if:
    type: text
    regex: php:function.{0,30}(passthru|shell_exec)
  count_max: 1015695
- id: xpath-php-function-rce--rx-27
  desc: Regex component marker
  crit: component
  conf: 0.97
  if:
    type: text
    regex: php:function.{0,30}(popen)
  count_max: 1015696
- id: register-php-functions
  desc: DOMXPath registerPHPFunctions call
  crit: component
  conf: 0.85
  attack: T1059.004
  if:
    type: text
    substr: registerPHPFunctions
composite_rules:
- id: php-xpath-reflection-webshell
  desc: XPath reflection webshell with command execution
  crit: hostile
  conf: 0.98
  attack: T1505.003
  all:
  - id: xpath-php-function-rce
  any:
  - id: reflection-class-instantiation
  - id: register-php-functions
  - id: micro-behaviors/communications/http/request/params::get-dup
  - id: micro-behaviors/communications/http/request/params::request-dup
  needs: 2
- id: php-header-backdoor
  desc: PHP backdoor using custom HTTP headers for input
  crit: hostile
  conf: 0.98
  attack: T1505.003
  all:
  - id: micro-behaviors/communications/http/header/custom-trigger::http-x-custom-header
  any:
  - id: micro-behaviors/process/create/shell/lang/
  - id: micro-behaviors/process/interpreter/eval::eval-symbol
- id: php-dynamic-user-input-backdoor
  desc: PHP backdoor executing user input directly (AST)
  crit: hostile
  conf: 0.99
  attack: T1505.003
  any:
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
  - id: micro-behaviors/process/interpreter/eval::eval-user-input
- id: dynamic-user-input-call
  desc: User input used as function
  crit: suspicious
  conf: 0.98
  attack: T1505.003
  any:
  - id: dynamic-user-input-call-1
  - id: dynamic-user-input-call-2
  unless:
  - id: well-known/app/moodle-stubs/
  - id: well-known/app/egroupware/
- id: xpath-php-function-rce
  desc: XPath php:functionString for command execution
  crit: suspicious
  conf: 0.97
  attack: T1505.003
  any:
  - id: xpath-php-function-rce--rx-25
  - id: xpath-php-function-rce--rx-26
  - id: xpath-php-function-rce--rx-27
