defaults:
  platforms:
    - linux
    - macos
    - windows
  for:
    - php
  mbc: B0030
traits:
  - id: password-form
    desc: HTML password form in PHP
    crit: notable
    conf: 0.85
    attack: T1505.003
    if:
      type: string_literal
      regex: <input[^>]{0,120}type=['"]password['"]
    unless:
      - type: text
        substr: "@package WordPress"
      - type: text
        regex: "WP_UnitTestCase|@group\\s+[A-Za-z0-9_-]+"
      - type: text
        regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
        - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
        - id: metadata/library/web-frameworks::wordpress-core-api-symbols
  - id: ajax-handler
    desc: AJAX request handler pattern
    crit: notable
    conf: 0.7
    if:
      type: ast
      node: subscript_expression
      regex: \$_(GET|POST)
    unless:
      - type: text
        substr: "@package WordPress"
      - type: text
        regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
        - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
        - id: metadata/library/web-frameworks::wordpress-core-api-symbols
  - id: json-response
    desc: JSON API response pattern
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: call
      exact: json_encode
  - id: hardcoded-hash-auth
    desc: Hardcoded MD5 hash authentication (backdoor)
    crit: suspicious
    conf: 0.95
    attack: T1505.003
    if:
      type: ast
      kind: binary_op
      exact: md5
  - id: substr-hash-compare
    desc: Partial hash comparison (weak authentication)
    crit: suspicious
    conf: 0.9
    attack: T1505.003
    if:
      type: ast
      kind: call
      exact: substr
  - id: error-suppress-prefix
    desc: Error suppression operator usage (@)
    crit: component
    conf: 0.7
    mbc: B0032
    if:
      type: ast
      node: error_suppression_expression
      regex: .{1,120}
  - id: comment-split-assert-rebuild
    desc: Comment-split assert rebuilt at runtime
    crit: suspicious
    conf: 0.98
    attack: T1027
    if:
      type: text
      substr: '@$_=/*-/*-*/"a"./*-/*-*/$_./*-/*-*/"t"'
  - id: comment-split-post-superglobal
    desc: Comment-split POST superglobal rebuild
    crit: suspicious
    conf: 0.98
    attack: T1505.003
    if:
      type: text
      substr: '{"_P"./*-/*-*/"OS"./*-/*-*/"T"}['
  - id: arithmetic-post-key-minus-seven
    desc: Arithmetic derived POST key -7
    crit: suspicious
    conf: 0.94
    attack: T1027
    mbc: B0032
    if:
      type: text
      substr: '0/*-/*-*/-/*-/*-*/2/*-/*-*/-/*-/*-*/5'
  - id: port-30000
    desc: Port 30000
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: '30000'
  - id: port-31337-php
    desc: Port 31337 (leet)
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      word: '31337'
  - id: port-4444-php
    desc: Port 4444 (Metasploit)
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      word: '4444'
  - id: port-5555
    desc: Port 5555
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: '5555'
  - id: port-6666
    desc: Port 6666
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: '6666'
  - id: port-8080-php
    desc: Port 8080 (HTTP alt)
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      word: '8080'
  - id: port-9999
    desc: Port 9999
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      word: '9999'
  # Security tool bypass claims in comments — strongly indicative of webshell authors
  - id: imunify-bypass-claim
    desc: Imunify360 security suite bypass claim
    crit: suspicious
    conf: 0.97
    attack: T1562.001
    if:
      type: text
      regex: Bypass.{0,50}Imunify

  - id: security-bypass-claim-403
    desc: 403 Forbidden bypass claim (webshell indicator)
    crit: notable
    conf: 0.82
    attack: T1562
    if:
      type: text
      regex: Bypass.{0,50}403

  - id: ssrf-pattern
    desc: Server-Side Request Forgery pattern (URL
    crit: suspicious
    conf: 0.85
    attack: T1090
    if:
      type: ast
      kind: call
      regex: curl_init\s*\(.{0,50}\$_(GET|POST|REQUEST)
  - id: google-search-scrape
    desc: Google search results scraping
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: 'google\.[a-z.]+/search\?.{0,50}site:'
  - id: url-param-fetch
    desc: URL parameter fetched and executed
    crit: suspicious
    conf: 0.8
    if:
      type: ast
      kind: call
      regex: (curl_init|file_get_contents|fopen)\s*\(.{0,50}\$_(GET|POST)
  - id: dynamic-user-input-call-1
    desc: User input used as function (GET/POST/REQUEST)
    crit: suspicious
    conf: 0.98
    attack: T1505.003
    if:
      type: ast
      kind: call
      regex: \$_(GET|POST|REQUEST)\s*\[[^]]+\]\s*\(
  - id: dynamic-user-input-call-2
    desc: User input used as function (COOKIE/SERVER)
    crit: suspicious
    conf: 0.98
    attack: T1505.003
    if:
      type: ast
      kind: call
      regex: \$_(COOKIE|SERVER)\s*\[[^]]+\]\s*\(
  - id: eval-base64-large-payload
    desc: Large base64 payload decode
    crit: suspicious
    conf: 0.99
    attack: T1505.003
    if:
      type: text
      regex: base64_decode\s*\(["'][A-Za-z0-9+/=]{500,}
  - id: wp-user-creation-1
    desc: WordPress user creation API (wp_create_user)
    crit: notable
    conf: 0.7
    attack: T1136.001
    if:
      type: text
      word: wp_create_user
    unless:
      - type: text
        substr: "@package WordPress"
      - type: text
        regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
        - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
        - id: metadata/library/web-frameworks::wordpress-core-api-symbols
  - id: wp-user-creation-2
    desc: WordPress user creation API (WP_User)
    crit: notable
    conf: 0.7
    attack: T1136.001
    if:
      type: text
      word: WP_User
    unless:
      - type: text
        substr: "@package WordPress"
      - type: text
        regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
        - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
        - id: metadata/library/web-frameworks::wordpress-core-api-symbols
  - id: wp-user-creation-3
    desc: WordPress user creation API (username_exists)
    crit: notable
    conf: 0.7
    attack: T1136.001
    if:
      type: text
      word: username_exists
    unless:
      - type: text
        substr: "@package WordPress"
      - type: text
        regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
  - id: wp-role-assignment
    desc: WordPress role assignment
    crit: notable
    conf: 0.7
    attack: T1098
    if:
      type: text
      substr: set_role
  - id: wp-plugin-path
    desc: WordPress plugin directory reference
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: wp-content/plugins
  - id: wp-plugin-path-encoded
    desc: Base64 encoded WordPress plugin path
    crit: suspicious
    conf: 0.85
    mbc: B0032
    attack: T1027
    if:
      type: text
      substr: d3AtY29udGVudC9wbHVnaW5z

  - id: wp-mu-plugin-path
    desc: WordPress Must-Use plugin path reference
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: wp-content/mu-plugins
    unless:
      - type: text
        substr: "@package WordPress"
      - type: text
        regex: "WP_UnitTestCase|@group\\s+[A-Za-z0-9_-]+"
      - type: text
        regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
        - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
        - id: metadata/library/web-frameworks::wordpress-core-api-symbols

  - id: wp-includes-path
    desc: WordPress core includes path reference
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: wp-includes/
    unless:
      - type: text
        substr: "@package WordPress"
      - type: text
        regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
        - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
        - id: metadata/library/web-frameworks::wordpress-core-api-symbols

  - id: wp-option-manipulation
    desc: WordPress option storage manipulation
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (update|get|add)_option\s*\(\s*['"]_

  # Raw string patterns for forward_static_call_array (obfuscation)
  - id: forward-static-call-array-raw
    desc: forward_static_call_array in raw content
    crit: notable
    conf: 0.8
    if:
      type: text
      exact: forward_static_call_array
  - id: forward-static-call-concat-pattern
    desc: forward_static_call_array with string concat (obfuscation)
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: text
      regex: forward_static_call_array.{0,80}\.

  - id: custom-header-input
    desc: Custom HTTP header input access (HTTP_X_*)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: \$_SERVER\s*\[\s*["']HTTP_X_[A-Z0-9_-]+["']\s*\]

  - id: request-to-dynamic-dispatch
    desc: HTTP request reaches dynamic dispatch
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\$_REQUEST.{0,120}\$GLOBALS\[["''][A-Za-z0-9_]+["'']\]'

  - id: wp-admin-privilege-escalation
    desc: Assigns administrator role to WordPress user
    crit: suspicious
    conf: 0.95
    attack: T1098
    if:
      type: text
      regex: set_role\s*\(\s*['"]administrator['"]\s*\)

  - id: wp-user-hiding-pre
    desc: pre_user_query hook usage
    crit: component
    if:
      type: text
      word: "pre_user_query"

  - id: wp-user-hiding-not-trait
    desc: Inequality check in WordPress user list
    crit: component
    if:
      type: text
      regex: "!=|NOT IN"

  - id: php-execution-fallback-chain
    desc: Falls back through multiple PHP execution functions
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '["''](shell_exec|exec|system|passthru|proc_open|popen)["''].{0,100}["''](shell_exec|exec|system|passthru|proc_open|popen)["'']'

  - id: reflection-class-instantiation
    desc: PHP ReflectionClass instantiation
    crit: component
    conf: 0.85
    attack: T1059.004
    if:
      type: symbol
      exact: ReflectionClass
  - id: xpath-php-function-rce
    desc: XPath php:functionString for command execution
    crit: suspicious
    conf: 0.97
    attack: T1505.003
    if:
      type: text
      regex: "php:function.{0,30}(system|exec|passthru|shell_exec|popen)"

  - id: register-php-functions
    desc: DOMXPath registerPHPFunctions call
    crit: component
    conf: 0.85
    attack: T1059.004
    if:
      type: text
      substr: registerPHPFunctions

  - id: wp-user-count-manipulation-views
    desc: views_users hook usage
    crit: component
    if:
      type: text
      word: "views_users"

  - id: wp-user-count-manipulation-admin
    desc: administrator role reference
    crit: component
    if:
      type: text
      word: "administrator"

composite_rules:
  - id: php-xpath-reflection-webshell
    desc: XPath reflection webshell with command execution
    crit: hostile
    conf: 0.98
    attack: T1505.003
    all:
      - id: xpath-php-function-rce
    any:
      - id: reflection-class-instantiation
      - id: register-php-functions
      - id: micro-behaviors/communications/http/request/params::get-dup
      - id: micro-behaviors/communications/http/request/params::request-dup
    needs: 2

  - id: php-stealth-output-control
    desc: Disables error reporting and clears output buffers (stealth)
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/stdio::error-reporting-off
      - id: micro-behaviors/process/io/buffer::ob-end-clean

  - id: wp-user-count-manipulation
    desc: Manipulates WordPress user list counts (concealment)
    crit: suspicious
    conf: 0.95
    all:
      - id: wp-user-count-manipulation-views
      - id: wp-user-count-manipulation-admin

  - id: wp-user-list-manipulation
    desc: WordPress user list manipulation for concealment
    crit: hostile
    conf: 0.98
    any:
      - id: wp-user-hiding-chain
      - id: wp-user-admin-creation-chain

  - id: wp-user-hiding-chain
    desc: WordPress user hiding logic
    crit: component
    all:
      - id: wp-user-hiding
      - id: wp-user-count-manipulation

  - id: wp-user-admin-creation-chain
    desc: WordPress user hiding + admin creation
    crit: component
    all:
      - id: wp-user-hiding
      - id: wp-rogue-admin-creation

  - id: wp-user-hiding
    desc: Hides users from WordPress administrative interface
    crit: suspicious
    conf: 0.9
    unless:
      - id: metadata/library/web-frameworks::wordpress-core-package-doc
      - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
      - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
      - id: metadata/library/web-frameworks::wordpress-core-api-symbols
    all:
      - id: wp-user-hiding-pre
      - id: micro-behaviors/data/text/keywords/wordpress::wp-user-login-field
      - id: wp-user-hiding-not-trait

  - id: wp-obfuscated-user-filter-backdoor
    desc: Obfuscated WordPress user hiding backdoor
    crit: hostile
    conf: 0.98
    attack: T1564
    all:
      - id: micro-behaviors/data/text/keywords/wordpress::wp-user-query-filtering
      - id: objectives/anti-static/obfuscation/string/array::php-escaped-string-table-obfuscation
    any:
      - id: objectives/anti-static/obfuscation/imports::dynamic-function-execution
      - id: objectives/command-and-control/backdoor/webshell::error-suppress-prefix
      - id: micro-behaviors/communications/http/request/params::request-dup

  - id: php-obfuscated-request-dispatch-backdoor
    desc: Obfuscated PHP request dispatch backdoor
    crit: hostile
    conf: 0.98
    attack: T1505.003
    all:
      - id: micro-behaviors/communications/http/request/params::request-dup
      - id: objectives/anti-static/obfuscation/string/array::php-packed-string-table-dispatch
      - id: objectives/anti-static/obfuscation/imports::dynamic-function-execution
    any:
      - id: request-to-dynamic-dispatch
      - id: objectives/command-and-control/backdoor/webshell::error-suppress-prefix
      - id: objectives/anti-static/obfuscation/code-metrics::php-webshell-pattern

  - id: php-obfuscated-request-dispatch
    desc: Obfuscated PHP request dispatcher
    crit: suspicious
    conf: 0.95
    attack: T1505.003
    all:
      - id: micro-behaviors/communications/http/request/params::request-dup
      - id: objectives/anti-static/obfuscation/string/array::php-escaped-string-table-obfuscation
    any:
      - id: request-to-dynamic-dispatch
      - id: objectives/command-and-control/backdoor/webshell::error-suppress-prefix

  - id: php-header-backdoor
    desc: PHP backdoor using custom HTTP headers for input
    crit: hostile
    conf: 0.98
    attack: T1505.003
    all:
      - id: custom-header-input
    any:
      - id: micro-behaviors/process/create/shell/lang/
      - id: micro-behaviors/process/interpreter/eval::eval-symbol

  - id: wp-rogue-admin-creation
    desc: Automated WordPress administrator account creation
    crit: hostile
    conf: 0.98
    attack: T1136.001
    all:
      - id: wp-user-creation
      - id: wp-admin-privilege-escalation

  - id: php-dynamic-user-input-backdoor
    desc: PHP backdoor executing user input directly (AST)
    crit: hostile
    conf: 0.99
    attack: T1505.003
    any:
      - id: micro-behaviors/process/create/shell/lang::exec-user-input
      - id: micro-behaviors/process/interpreter/eval::eval-user-input

  - id: php-comment-split-assert-post-backdoor
    desc: PHP webshell rebuilds assert and POST
    crit: hostile
    conf: 0.99
    attack: T1505.003
    all:
      - id: objectives/command-and-control/backdoor/webshell/script::php-tag
      - id: comment-split-assert-rebuild
      - id: comment-split-post-superglobal
    any:
      - id: arithmetic-post-key-minus-seven
      - id: error-suppress-prefix

  # Obfuscated webshell: forward_static_call_array with dynamic execution
  - id: forward-static-call-webshell
    desc: Obfuscated webshell with forward_static_call_array
    crit: suspicious
    conf: 0.9
    attack: T1505.003
    all:
      - id: forward-static-call-array-raw
      - id: micro-behaviors/communications/http/request::request
    any:
      - id: dynamic-user-input-call
      - id: forward-static-call-concat-pattern
    needs: 2

  - id: dynamic-user-input-call
    desc: User input used as function
    crit: suspicious
    conf: 0.98
    attack: T1505.003
    any:
      - id: dynamic-user-input-call-1
      - id: dynamic-user-input-call-2
  - id: wp-user-creation
    desc: WordPress user creation API
    crit: notable
    conf: 0.7
    attack: T1136.001
    any:
      - id: wp-user-creation-1
      - id: wp-user-creation-2
      - id: wp-user-creation-3
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
        - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
        - id: metadata/library/web-frameworks::wordpress-core-api-symbols
  - id: proxy-port
    desc: High port number (proxy/backdoor indicator)
    crit: suspicious
    conf: 0.8
    any:
      - id: port-30000
      - id: port-31337-php
      - id: port-4444-php
      - id: port-5555
      - id: port-6666
      - id: port-8080-php
      - id: port-9999
