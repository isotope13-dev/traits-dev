---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
  attack: T1505.003
traits:
- id: sqlserver-xp-command-shell
  desc: SQL Server xp_cmdshell usage
  crit: suspicious
  conf: 0.94
  attack: T1059
  if:
    type: text
    regex: "\\bxp_(cmdshell|execresultset|regenumkeys|filelist)\\b"
  unless:
  - id: metadata/lang/source::yara-rule-source
  - id: well-known/tool/detection/security-scanner::anteumbra-package-tree-member
composite_rules:
- id: dangerous-php-function-cluster
  desc: PHP eval combined with execution or probing
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/process/interpreter/eval::eval-symbol
  any:
  - id: micro-behaviors/data/control-flow/assert::php-assert-call
  - id: micro-behaviors/fs/file/read::php-show-source
  - id: micro-behaviors/process/create/shell/spawn::php-exec
  - id: micro-behaviors/communications/socket/connect::fsockopen-call
  - id: micro-behaviors/os/sysinfo/platform/runtime::php-uname-call
  - id: objectives/discovery/system/fingerprint/info::phpinfo-call
  - id: micro-behaviors/process/create/shell/lang::proc-open
  - id: micro-behaviors/process/create/shell/lang::popen
  - id: micro-behaviors/process/create/shell/spawn::php-shell-exec
  needs: 1
  unless:
  - id: well-known/app/matomo/
  - id: well-known/lib/phpseclib/
  - id: well-known/lib/symfony::package-doc
  - id: micro-behaviors/process/create/shell/spawn::php-shell-argument-escaping
  - id: well-known/tool/detection/security-scanner::php-threat-scanner-context
