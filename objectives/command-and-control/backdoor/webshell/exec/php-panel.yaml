---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
  attack: T1505.003
traits:
- id: sqlserver-xp-cmdshell-invocation
  desc: SQL Server xp_cmdshell execution
  crit: suspicious
  conf: 0.94
  attack: T1059
  if:
    type: text
    regex: '(?i)\bexec(ute)?\s+xp_cmdshell\b'
  unless:
  - id: metadata/lang/source::yara-rule-source
  - id: well-known/tool/detection/security-scanner::anteumbra-package-tree-member
- id: sqlserver-xp-execresultset-invocation
  desc: SQL Server xp_execresultset execution
  crit: suspicious
  conf: 0.94
  attack: T1059
  if:
    type: text
    regex: '(?i)\bexec(ute)?\s+xp_execresultset\b'
  unless:
  - id: metadata/lang/source::yara-rule-source
  - id: well-known/tool/detection/security-scanner::anteumbra-package-tree-member
- id: sqlserver-xp-regenumkeys-invocation
  desc: SQL Server xp_regenumkeys execution
  crit: suspicious
  conf: 0.94
  attack: T1059
  if:
    type: text
    regex: '(?i)\bexec(ute)?\s+xp_regenumkeys\b'
  unless:
  - id: metadata/lang/source::yara-rule-source
  - id: well-known/tool/detection/security-scanner::anteumbra-package-tree-member
- id: sqlserver-xp-filelist-invocation
  desc: SQL Server xp_filelist execution
  crit: suspicious
  conf: 0.94
  attack: T1059
  if:
    type: text
    regex: '(?i)\bexec(ute)?\s+xp_filelist\b'
  unless:
  - id: metadata/lang/source::yara-rule-source
  - id: well-known/tool/detection/security-scanner::anteumbra-package-tree-member

composite_rules:
- id: sqlserver-xp-command-shell
  desc: SQL Server extended procedure invocation
  crit: suspicious
  conf: 0.94
  any:
  - id: sqlserver-xp-cmdshell-invocation
  - id: sqlserver-xp-execresultset-invocation
  - id: sqlserver-xp-regenumkeys-invocation
  - id: sqlserver-xp-filelist-invocation
- id: dangerous-php-function-cluster
  desc: PHP HTTP-request eval combined with execution or probing
  crit: suspicious
  conf: 0.92
  all:
  - id: micro-behaviors/process/interpreter/eval::eval-symbol
  - id: micro-behaviors/communications/http/request/
  any:
  - id: micro-behaviors/data/control-flow/assert::php-assert-call
  - id: micro-behaviors/fs/file/read::php-show-source
  - id: micro-behaviors/process/create/shell/spawn::php-exec
  - id: micro-behaviors/communications/socket/connect::fsockopen-call
  - id: micro-behaviors/os/sysinfo/platform/runtime::php-uname-call
  - id: micro-behaviors/os/sysinfo/config::phpinfo-call
  - id: micro-behaviors/process/create/shell/lang::proc-open
  - id: micro-behaviors/process/create/shell/lang::popen
  - id: micro-behaviors/process/create/shell/spawn::php-shell-exec
  needs: 1
  unless:
  - id: well-known/app/matomo/
  - id: well-known/lib/phpseclib/
  - id: well-known/lib/symfony::package-doc
  - id: micro-behaviors/process/create/shell/spawn::php-shell-argument-escaping
  - id: well-known/tool/detection/security-scanner::php-threat-scanner-context
