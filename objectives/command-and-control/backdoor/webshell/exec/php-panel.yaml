---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
  attack: T1505.003
traits:
- id: sqlserver-xp-command-shell
  desc: SQL Server xp_cmdshell usage
  crit: suspicious
  conf: 0.94
  attack: T1059
  if:
    type: text
    regex: "\\bxp_(cmdshell|execresultset|regenumkeys|filelist)\\b"
- id: dangerous-php-function-cluster--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: "\\b(assert|call_user_func)\\b"
  count_max: 1016586
- id: dangerous-php-function-cluster--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: "\\b(eval|exec)\\b"
  count_max: 1016587
- id: dangerous-php-function-cluster--rx-17
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: "\\b(fsockopen|php_uname)\\b"
  count_max: 1016588
- id: dangerous-php-function-cluster--rx-18
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: "\\b(phpinfo|posix_get(euid|uid|gid))\\b"
  count_max: 1016589
- id: dangerous-php-function-cluster--rx-19
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: "\\b(proc_open|popen)\\b"
  count_max: 1016590
- id: dangerous-php-function-cluster--rx-20
  desc: Regex component marker
  crit: component
  conf: 0.88
  count_min: 5
  if:
    type: text
    regex: "\\b(shell_exec|show_source)\\b"
  count_max: 1016591
- id: dangerous-php-function-cluster-cond-0--inline-16595
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: escapeshell(cmd|arg)
  count_max: 1016596
composite_rules:
- id: dangerous-php-function-cluster
  desc: Clustered dangerous PHP functions
  crit: suspicious
  conf: 0.88
  any:
  - id: dangerous-php-function-cluster--rx-15
  - id: dangerous-php-function-cluster--rx-16
  - id: dangerous-php-function-cluster--rx-17
  - id: dangerous-php-function-cluster--rx-18
  - id: dangerous-php-function-cluster--rx-19
  - id: dangerous-php-function-cluster--rx-20
  needs: 2
  unless:
  - id: dangerous-php-function-cluster-cond-0--inline-16595
  - id: objectives/discovery/system/fingerprint/info::rendered-phpinfo-dump
  - id: well-known/tool/detection/security-scanner::defensive-wordpress-security-plugin
  - id: well-known/tool/detection/security-scanner::defensive-threat-signatures
