defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: B0030
  attack: T1505.003
traits:
  - id: laravel-password-post-route
    desc: Laravel route reads password
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Route::post[\s\S]{0,500}input\(['"]password['"]\)

  - id: laravel-hardcoded-password-secret
    desc: Laravel route hardcoded password
    crit: component
    conf: 0.86
    if:
      type: text
      regex: \$expected\s*=\s*['"][^'"\n]{6,64}['"]

composite_rules:
  - id: laravel-hardcoded-password-gate
    desc: Laravel route hardcoded password gate
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/command-and-control/backdoor/webshell/auth::password-form
      - id: laravel-password-post-route
      - id: laravel-hardcoded-password-secret

  - id: laravel-destructive-route-backdoor
    desc: Laravel password-gated destructive route
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/backdoor/webshell/auth::password-form
      - id: laravel-password-post-route
      - id: micro-behaviors/process/create/shell
      - id: micro-behaviors/fs/path/application/webapp::laravel-base-path
    any:
      - id: micro-behaviors/fs/chmod/modify::php-shell-chmod-recursive-777
      - id: micro-behaviors/fs/chmod/modify::php-shell-chown-recursive
      - id: micro-behaviors/fs/chmod/modify::chmod-call
      - id: micro-behaviors/fs/delete/directory::laravel-delete-directory
      - id: micro-behaviors/fs/delete/directory::php-rmdir
      - id: micro-behaviors/fs/delete/file::php-unlink
    needs: 2
