---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
traits:
- id: shell-exec-command-wrapper
  desc: shell_exec command wrapper function
  crit: suspicious
  conf: 0.95
  attack: T1505.003
  if:
    type: text
    regex: function\s+exec_command\s*\(\s*\$cmd[^)]{0,120}\)[\s\S]{0,240}shell_exec\s*\(\s*\$cmd\s*\)
- id: custom-header-input
  desc: Custom HTTP header input access (HTTP_X_*)
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: \$_SERVER\s*\[\s*["']HTTP_X_[A-Z0-9_-]+["']\s*\]
- id: fallback-shell-exec-name
  desc: shell_exec fallback function name
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: shell_exec
- id: fallback-system-name
  desc: system fallback function name
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: system
- id: fallback-passthru-name
  desc: passthru fallback function name
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: passthru
- id: fallback-proc-open-name
  desc: proc_open fallback function name
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: proc_open
- id: fallback-popen-name
  desc: popen fallback function name
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: popen
composite_rules:
- id: php-execution-fallback-chain
  desc: Falls back through multiple PHP execution functions
  crit: suspicious
  conf: 0.95
  needs: 2
  near_bytes: 512
  any:
  - id: fallback-shell-exec-name
  - id: fallback-system-name
  - id: fallback-passthru-name
  - id: fallback-proc-open-name
  - id: fallback-popen-name
