---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
traits:
- id: shell-exec-command-wrapper
  desc: shell_exec command wrapper function
  crit: suspicious
  conf: 0.95
  attack: T1505.003
  if:
    type: text
    regex: function\s+exec_command\s*\(\s*\$cmd[^)]{0,120}\)[\s\S]{0,240}shell_exec\s*\(\s*\$cmd\s*\)
- id: htaccess-cgi-self-handler
  desc: .htaccess enables itself as CGI
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'Options\s+\+ExecCGI[\s\S]{0,160}AddHandler\s+cgi-script\s+\.htaccess'
- id: php-query-string-command-param
  desc: PHP extracts command from QUERY_STRING
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'preg_match\s*\(\s*["'']?/c=\(\.\*\)\$/["'']?[\s\S]{0,120}QUERY_STRING'
composite_rules:
- id: php-execution-fallback-chain
  desc: Falls back through multiple PHP execution functions
  crit: suspicious
  conf: 0.95
  needs: 2
  near_bytes: 512
  any:
  - id: micro-behaviors/process/create/exec::shell-exec-availability-check
  - id: micro-behaviors/process/create/exec::system-passthru-availability-check
  - id: micro-behaviors/process/create/exec::proc-open-popen-availability-check
  unless:
  - id: well-known/app/wordpress-plugins::known-wordpress-plugin
- id: htaccess-cgi-query-command-webshell
  desc: .htaccess CGI QUERY_STRING command webshell
  crit: hostile
  conf: 0.98
  all:
  - id: htaccess-cgi-self-handler
  - id: php-query-string-command-param
  - id: micro-behaviors/process/create/shell/lang::exec-variable-argument
