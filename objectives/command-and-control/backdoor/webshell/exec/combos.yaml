---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
composite_rules:
- id: php-memory-webshell
  desc: 'PHP memory webshell: self-delete + remote eval'
  crit: hostile
  conf: 0.99
  mbc: B0030
  attack: T1505.003
  all:
  - id: objectives/evasion/self-delete/file/script::script-self-delete
  - id: micro-behaviors/process/interpreter/eval::eval-symbol
  any:
  - id: micro-behaviors/process/control/signal::ignore-user-abort
  - id: micro-behaviors/process/control/signal::set-time-limit
  - id: micro-behaviors/fs/read/file::file-get-contents
  - id: micro-behaviors/process/interpreter/eval::error-suppressed-eval
  needs: 2
- id: php-backdoor
  desc: 'PHP webshell: session-based backdoor'
  crit: hostile
  conf: 0.95
  mbc: B0030
  attack: T1505.003
  all:
  - id: objectives/command-and-control/backdoor/webshell/session/
  - id: micro-behaviors/communications/http/request/
  any:
  - id: objectives/anti-static/obfuscation/
  - id: micro-behaviors/fs/write/
  - id: micro-behaviors/process/create/shell/
  unless:
  - id: well-known/app/wordpress-plugins::wordpress-maintenance-plugin
- id: php-shell-functional
  desc: 'PHP: functional webshell (exec + user input)'
  crit: suspicious
  conf: 0.98
  mbc: B0030
  attack: T1505.003
  all:
  - id: micro-behaviors/process/create/shell/
  - id: micro-behaviors/communications/http/request/
  any:
  - id: micro-behaviors/communications/http/request/form-input::php-input
  - id: objectives/command-and-control/backdoor/webshell/session/
  - id: micro-behaviors/process/create/shell/lang::exec-user-input
  unless:
  - id: metadata/package/testing/harness/unit::php-test-runner
  - id: micro-behaviors/communications/socket/connect::localhost-socket-uri
  - id: well-known/tool/detection/security-scanner::php-threat-scanner-context
  - id: well-known/app/zealphp
  - id: well-known/lib/symfony::package-doc
- id: php-backtick-rce
  desc: 'PHP webshell: backtick RCE from user input'
  crit: suspicious
  conf: 0.98
  mbc: E1059
  attack: T1059.004
  all:
  - id: micro-behaviors/process/create/shell/lang::backtick
  - id: micro-behaviors/communications/http/request/
  any:
  - id: micro-behaviors/communications/http/request/form-input::php-input
  - id: micro-behaviors/process/create/shell/
  - id: micro-behaviors/fs/write/
  - id: objectives/command-and-control/backdoor/webshell/session/
  unless:
  - id: well-known/app/matomo/
  - id: well-known/app/zealphp
  - id: well-known/app/egroupware/
  - id: well-known/tool/sysadmin/munin/
  - id: well-known/app/wordpress-plugins::known-wordpress-plugin
  - id: metadata/file/magic/identity::php-archive
  - id: well-known/app/egroupware::rpm-build-checkout-path
  - id: well-known/lib/benign-runtime-bundles::php-source-tree
  - id: well-known/lib/benign-runtime-bundles::php-runtime-package
- id: php-full-webshell
  desc: Full-featured PHP webshell
  crit: suspicious
  conf: 0.98
  mbc: B0030
  attack: T1505.003
  all:
  - id: micro-behaviors/process/create/shell/
  - id: micro-behaviors/communications/http/request/
  - id: micro-behaviors/fs/write/
  - id: objectives/command-and-control/backdoor/webshell/
  - id: micro-behaviors/process/create/shell/lang::backtick
  unless:
  - id: well-known/app/zealphp
  - id: well-known/app/egroupware/
  - id: well-known/tool/sysadmin/munin/
  - id: well-known/app/wordpress-plugins::known-wordpress-plugin
  - id: metadata/file/magic/identity::php-archive
  - id: well-known/lib/benign-runtime-bundles::php-source-tree
  - id: well-known/lib/benign-runtime-bundles::php-runtime-package
