defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: B0030
traits:
- id: wp-user-creation-1
  desc: WordPress user creation API (wp_create_user)
  crit: suspicious
  conf: 0.7
  attack: T1136.001
  if:
    type: text
    word: wp_create_user
  unless:
  - id: metadata/library/web-frameworks::wordpress-core-package-doc
  - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
  - id: well-known/tool/detection/security-scanner/
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
    - id: metadata/library/web-frameworks::wordpress-core-api-symbols
- id: wp-user-creation-2
  desc: WordPress user object API reference
  crit: component
  conf: 0.7
  attack: T1136.001
  if:
    type: text
    word: WP_User
  unless:
  - id: metadata/library/web-frameworks::wordpress-core-package-doc
  - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
    - id: metadata/library/web-frameworks::wordpress-core-api-symbols
- id: wp-user-creation-3
  desc: WordPress username existence check
  crit: component
  conf: 0.7
  attack: T1136.001
  if:
    type: text
    word: username_exists
  unless:
  - id: metadata/library/web-frameworks::wordpress-core-package-doc
  - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
- id: wp-role-assignment
    # Generic role change — routine in membership/role-manager plugins; the
    # 'administrator' variant below carries the privilege-escalation signal.
  desc: WordPress role assignment
  crit: notable
  conf: 0.7
  attack: T1098
  if:
    type: text
    regex: '->set_role\s*\('
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
- id: wp-admin-privilege-escalation
  desc: Assigns administrator role to WordPress user
  crit: suspicious
  conf: 0.95
  attack: T1098
  if:
    type: text
    regex: set_role\s*\(\s*['"]administrator['"]\s*\)
  unless:
  - id: metadata/library/web-frameworks::wordpress-core-package-doc
  - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
    - id: metadata/library/web-frameworks::wordpress-core-api-symbols
- id: wp-usermeta-admin-capability-insert
  desc: WordPress administrator capability value
  crit: component
  conf: 0.96
  attack: T1098
  if:
    type: text
    regex: "['\"]administrator['\"]\\s*=>\\s*true"
- id: wp-user-creation-wordpress-email
  desc: WordPress user creation with WordPress.org email
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: 'wp_(create|insert)_user.{0,200}@wordpress\.org'
- id: wp-usermeta-capability-keys--usermeta
  desc: WordPress usermeta capability keys (usermeta)
  crit: component
  conf: 0.9
  if:
    type: text
    word: usermeta
- id: wp-usermeta-capability-keys--capabilities
  desc: WordPress usermeta capability (capabilities)
  crit: component
  conf: 0.9
  if:
    type: text
    word: capabilities
composite_rules:
- id: wp-usermeta-capability-keys
  desc: WordPress usermeta capability keys
  crit: component
  conf: 0.9
  attack: T1098
  any:
  - id: wp-usermeta-capability-keys--usermeta
  - id: wp-usermeta-capability-keys--capabilities
- id: wp-user-creation
  desc: WordPress user creation API
  crit: notable
  conf: 0.7
  attack: T1136.001
  any:
  - id: wp-user-creation-1
  - id: wp-user-creation-2
  - id: wp-user-creation-3
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
    - id: metadata/library/web-frameworks::wordpress-core-api-symbols
- id: wp-rogue-admin-creation
  desc: Automated WordPress administrator account creation
  crit: hostile
  conf: 0.98
  attack: T1136.001
  all:
  - id: wp-user-creation
  - id: wp-admin-privilege-escalation
- id: wp-direct-admin-capability-insert
  desc: Direct WordPress administrator capability insert
  crit: hostile
  conf: 0.99
  attack: T1098
  all:
  - id: wp-usermeta-admin-capability-insert
  - id: wp-usermeta-capability-keys
  any:
  - id: wp-user-creation-wordpress-email
  - id: wp-user-creation
  unless:
  - id: well-known/app/wordpress-plugins::wordpress-security-plugin
