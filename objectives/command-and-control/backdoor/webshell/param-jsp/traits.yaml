defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  - java
  - class
  - html
  - csharp
  mbc: B0030
  attack: T1505.003
traits:
- id: jsp-runtime
  desc: Java Runtime.getRuntime() call
  crit: suspicious
  conf: 0.6
  for:
  - java
  - class
  if:
    type: symbol
    exact: getRuntime
- id: jsp-exec
  desc: Java .exec() method call
  crit: suspicious
  conf: 0.5
  for:
  - java
  - class
  if:
    type: text
    substr: ".exec("
- id: jsp-get-param
  desc: JSP request.getParameter call
  crit: suspicious
  conf: 0.4
  for:
  - java
  - class
  if:
    type: text
    substr: request.getParameter
- id: jsp-runtime-exec-request-param--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.98
  for:
  - java
  - class
  - html
  if:
    type: text
    substr: Runtime.getRuntime().exec
  count_max: 1016005
- id: jsp-runtime-exec-request-param--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.98
  for:
  - java
  - class
  - html
  if:
    type: text
    substr: request.getParameter
  count_max: 1016006
- id: jsp-socket-exec-loop
  desc: Java socket command execution loop
  crit: suspicious
  conf: 0.9
  for:
  - java
  - class
  if:
    type: text
    regex: "(?s)new\\s+Socket.{0,240}in\\.read.{0,240}exec\\("
- id: jsp-socket-whoami-banner
  desc: Java socket sends whoami banner
  crit: suspicious
  conf: 0.88
  for:
  - java
  - class
  if:
    type: text
    regex: (?s)getOutputStream.{0,160}exec\("whoami"\)
- id: jsp-url-openconnection-download
  desc: Java URL openConnection primitive
  crit: component
  conf: 0.85
  for:
  - java
  - class
  if:
    type: text
    regex: new\s+URL\(.{0,80}\)\.openConnection\(\)
- id: jsp-temp-download-exec-delete
  desc: Java temp download execute cleanup
  crit: suspicious
  conf: 0.92
  for:
  - java
  - class
  if:
    type: text
    regex: "(?s)java\\.io\\.tmpdir.{0,240}download\\(.{0,240}\\.delete\\("
- id: jsp-config-host-port-shell
  desc: Java config driven shell connection
  crit: suspicious
  conf: 0.9
  for:
  - java
  - class
  if:
    type: text
    regex: (?s)config\.properties.{0,240}getProperty\("host"\)
- id: jsp-cat-download-shell-methods
  desc: Java webshell toolkit methods
  crit: suspicious
  conf: 0.9
  for:
  - java
  - class
  if:
    type: text
    regex: "(?s)String\\s+cat\\(.{0,320}void\\s+download\\(.{0,320}void\\s+shell\\("
composite_rules:
- id: jsp-shell
  desc: JSP webshell implementation patterns
  crit: suspicious
  conf: 0.9
  all:
  - id: jsp-runtime
  - id: jsp-exec
  - id: jsp-get-param
- id: jsp-request-command-webshell
  desc: JSP request command webshell
  crit: hostile
  conf: 0.99
  all:
  - id: jsp-runtime-exec-request-param
  any:
  - id: jsp-runtime
  - id: jsp-exec
  - id: jsp-get-param
- id: jsp-reverse-shell
  desc: JSP reverse shell command loop
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/communications/socket/create::java-socket-create
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: jsp-socket-exec-loop
  any:
  - id: jsp-socket-whoami-banner
  - id: jsp-config-host-port-shell
- id: jsp-download-exec-cleanup
  desc: JSP download execute cleanup
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: jsp-url-openconnection-download
  - id: jsp-temp-download-exec-delete
- id: jsp-post-exploitation-toolkit
  desc: JSP post exploitation toolkit
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: micro-behaviors/communications/socket/create::java-socket-create
  - id: micro-behaviors/fs/file/copy::fileinputstream-class
  - id: jsp-url-openconnection-download
  - id: jsp-cat-download-shell-methods
- id: jsp-file-browser
  desc: JSP file browser webshell
  crit: suspicious
  conf: 0.97
  for:
  - none
  all:
  - id: micro-behaviors/data/text/keywords/malware::servlet-class
  - id: micro-behaviors/data/text/keywords/malware::servlet-getparameter
  - id: micro-behaviors/data/text/keywords/malware::directory-title
  any:
  - id: micro-behaviors/data/text/keywords/malware::file-query-link
  - id: micro-behaviors/data/text/keywords/malware::path-banner
  - id: micro-behaviors/data/text/keywords/malware::read-error
- id: jsp-file-browser-servlet
  desc: Servlet file browser webshell
  crit: hostile
  conf: 0.99
  for:
  - none
  all:
  - id: micro-behaviors/data/text/keywords/malware::servlet-class
  - id: micro-behaviors/data/text/keywords/malware::servlet-getparameter
  - id: micro-behaviors/data/text/keywords/malware::directory-title
  - id: micro-behaviors/data/text/keywords/malware::file-query-link
  - id: micro-behaviors/data/text/keywords/malware::servlet-file-browser-ui
- id: jsp-file-read-browser-servlet
  desc: Servlet file browser with file read
  crit: hostile
  conf: 0.995
  for:
  - none
  all:
  - id: micro-behaviors/data/text/keywords/malware::servlet-class
  - id: micro-behaviors/data/text/keywords/malware::servlet-getparameter
  - id: micro-behaviors/data/text/keywords/malware::file-query-link
  - id: micro-behaviors/fs/directory/readdir::readdir-java
  - id: micro-behaviors/fs/file/copy::fileinputstream-class
  - id: micro-behaviors/data/text/keywords/malware::servlet-file-browser-ui
- id: jsp-runtime-exec-request-param
  desc: JSP Runtime.exec request parameter
  crit: suspicious
  conf: 0.98
  for:
  - java
  - class
  - html
  all:
  - id: jsp-runtime-exec-request-param--rx-1
  - id: jsp-runtime-exec-request-param--rx-2
  near_bytes: 4096
