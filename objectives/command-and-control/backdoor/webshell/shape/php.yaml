defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: B0030
  attack: T1505.003
traits:
  - id: single-file-webshell-metrics
    desc: "PHP file 12-22KB"
    # Component-only — file size 12-22KB alone matches any medium-sized CMS
    # file (WordPress blocks, Drupal modules, library tests). Only meaningful
    # as a component of single-file-php-webshell-shape. We additionally exclude
    # namespaced/composer'd code because real webshells are standalone scripts
    # with no `namespace` declaration.
    crit: component
    conf: 0.9
    size_min: 12000
    size_max: 22000
    unless:
      # Composer-managed PHP is always namespaced; PHPUnit tests extend
      # TestCase. The remaining hits in this 12-22KB size band are bare
      # procedural scripts — the actual webshell shape.
      - type: text
        regex: '^namespace\s+[A-Z]'
      - type: text
        regex: 'extends\s+(PHPUnit\\Framework\\)?TestCase'
      - id: metadata/package/fields/composer::composer-package-manifest
  - id: dense-embedded-ui-strings
    desc: PHP file 150-320 embedded strings
    # component-only — pure string-count metric matches many moderately complex
    # templates. Only meaningful paired with single-file-webshell-metrics.
    crit: component
    conf: 0.88
    if:
      type: metrics
      field: binary.string_count
      min: 150
      max: 320
composite_rules:
  - id: single-file-php-webshell-shape
    desc: Single-file procedural PHP script of webshell size and string density
    crit: component
    conf: 0.9
    all:
      - id: single-file-webshell-metrics
      - id: dense-embedded-ui-strings
