defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: B0030
  attack: T1505.003
traits:
  - id: request-md5-hardcoded-auth
    desc: Request parameter MD5 auth gate
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'md5\s*\(\s*\$_(GET|POST|REQUEST|COOKIE)[^)]{0,120}\)\s*={2,3}\s*[''"][0-9a-fA-F]{32}[''"]'
  - id: request-sha1-hardcoded-auth
    desc: Request parameter SHA1 auth gate
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'sha1\s*\(\s*\$_(GET|POST|REQUEST|COOKIE)[^)]{0,120}\)\s*={2,3}\s*[''"][0-9a-fA-F]{40}[''"]'
  - id: extract-superglobal
    desc: Extracts HTTP superglobal variables
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '\bextract\s*\(\s*\$_(GET|POST|REQUEST|COOKIE)'
  - id: dangerous-callback-registration
    desc: Registers dangerous PHP callback
    crit: suspicious
    conf: 0.9
    attack: T1059.006
    if:
      type: text
      regex: 'register_[a-z_]+_function\s*\(\s*[''"]\s*(eval|assert|passthru|exec|system|shell_exec)'
