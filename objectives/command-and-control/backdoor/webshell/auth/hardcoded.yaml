defaults:
  platforms:
    - windows
    - unix
  for:
    - php
  crit: suspicious
  mbc: B0030
  attack: T1505.003
traits:
  - id: hardcoded-auth-variable
    desc: Hardcoded password variable assignment
    conf: 0.85
    if:
      type: string_literal
      regex: \$PASSWORD\s*=\s*["'][^"'\s]{4,}["']
  - id: input-password-compare
    desc: "Comparison of password var with request input"
    conf: 0.9
    if:
      type: string_literal
      regex: \$_(POST|GET)\[["']password["']\].{1,50}===\s*\$PASSWORD
composite_rules:
  - id: webshell-hardcoded-auth-flow
    desc: Webshell hardcoded authentication flow
    crit: hostile
    conf: 0.95
    all:
      - id: hardcoded-auth-variable
      - id: input-password-compare
