defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - php
  mbc: B0030
  attack: T1505.003
traits:
- id: password-form
  desc: HTML password form in PHP
  crit: suspicious
  conf: 0.85
  attack: T1505.003
  if:
    type: text
    regex: <input[^>]{0,120}type=['"]password['"]
  unless:
  - type: text
    substr: "@package WordPress"
  - type: text
    regex: "WP_UnitTestCase|@group\\s+[A-Za-z0-9_-]+"
  - type: text
    regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
    - id: metadata/library/web-frameworks::wordpress-core-api-symbols
- id: hardcoded-hash-auth
  desc: Hardcoded MD5 hash authentication (backdoor)
  crit: suspicious
  conf: 0.95
  attack: T1505.003
  if:
    type: ast
    kind: binary_op
    exact: md5
- id: substr-hash-compare
  desc: Partial hash comparison (weak authentication)
  crit: suspicious
  conf: 0.9
  attack: T1505.003
  if:
    type: ast
    kind: call
    exact: substr
composite_rules:
- id: php-request-hash-auth-backdoor
  desc: PHP hardcoded request-auth backdoor
  crit: hostile
  conf: 0.98
  attack: T1505.003
  any:
  - id: objectives/command-and-control/backdoor/webshell/auth::request-md5-hardcoded-auth
  - id: objectives/command-and-control/backdoor/webshell/auth::request-sha1-hardcoded-auth
  all:
  - id: objectives/command-and-control/backdoor/webshell/script::php-tag
