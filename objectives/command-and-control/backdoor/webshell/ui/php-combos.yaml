---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
  attack: T1505.003
composite_rules:
- id: php-get-command-webshell
  desc: PHP GET command webshell
  crit: hostile
  conf: 0.99
  all:
  - id: micro-behaviors/process/create/shell/lang::exec-user-input-get-text
  - id: objectives/command-and-control/backdoor/webshell/ui::command-input-form
  any:
  - id: objectives/command-and-control/backdoor/webshell/ui::command-output-pre-block
  - id: objectives/command-and-control/backdoor/webshell/ui::execute-submit-label
  - id: micro-behaviors/process/create/shell/lang::shell-stderr-redirect
- id: php-web-ui
  desc: PHP webshell with web-based user
  crit: suspicious
  conf: 0.85
  all:
  - id: objectives/command-and-control/backdoor/webshell/auth::password-form
  any:
  - id: objectives/command-and-control/backdoor/webshell/session/
  - id: objectives/command-and-control/backdoor/webshell/exec/
  - id: objectives/command-and-control/backdoor/webshell/request::raw-json-post-cmd-field
  - id: objectives/command-and-control/backdoor/webshell/ui::command-input-form
  - id: objectives/command-and-control/backdoor/webshell/ui::browser-terminal-fetch-cmd
- id: php-mysql-admin-webshell
  desc: PHP MySQL admin webshell
  crit: suspicious
  conf: 0.97
  all:
  - id: micro-behaviors/data/db/conn/mysql::php-mysql-admin-surface
  - id: micro-behaviors/data/db/conn/mysql::php-mysql-query-console
  - id: micro-behaviors/communications/http/request/params::extract-legacy-http-input
  - id: micro-behaviors/communications/http/cookies::setcookie-call
  any:
  - id: objectives/command-and-control/backdoor/webshell/auth::password-form
  - id: micro-behaviors/os/stdio::error-suppress-prefix
  - id: micro-behaviors/data/db/conn/mysql::php-mysql-dump-export
