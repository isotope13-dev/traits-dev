defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - php
  mbc: B0030
traits:
- id: command-input-form
  desc: Web command input form
  crit: suspicious
  conf: 0.92
  attack: T1505.003
  if:
    type: text
    regex: '<form[^>]{0,160}method=["'']GET["''][\s\S]{0,240}<input[^>]{0,160}name=["'']cmd["'']'
- id: execute-submit-label
  desc: Execute submit button label
  crit: suspicious
  conf: 0.82
  attack: T1505.003
  if:
    type: text
    regex: '<input[^>]{0,160}type=["'']SUBMIT["''][^>]{0,160}value=["'']Execute["'']'
- id: command-output-pre-block
  desc: Command output preformatted block
  crit: suspicious
  conf: 0.78
  attack: T1505.003
  if:
    type: text
    regex: '<pre>[\s\S]{0,240}<\?php[\s\S]{0,240}(system|exec|shell_exec|passthru)\s*\('
- id: self-named-get-form--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: basename($_SERVER[
  count_max: 1015628
- id: self-named-get-form--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: PHP_SELF
  count_max: 1015629
- id: self-named-get-form--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: method=
  count_max: 1015630
- id: self-named-get-form--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: $_SERVER[
  count_max: 1015631
- id: self-named-get-form--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: "name\\s*=\\s*['\"]cmd['\"]"
  count_max: 1015632
- id: browser-terminal-fetch-cmd--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: document.location.href
  count_max: 1015640
- id: browser-terminal-fetch-cmd--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: "JSON\\.stringify\\s*\\(.{0,160}\\b(cmd|command)\\b"
  count_max: 1015641
- id: browser-terminal-fetch-cmd--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: "\\bmethod\\s*:\\s*['\"]POST['\"]"
  count_max: 1015642
- id: browser-terminal-fetch-cmd--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: "\\bfetch\\s*\\(.{0,160}\\b(cmd|command|terminal)\\b"
  count_max: 1015643
- id: browser-terminal-fetch-cmd--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: "\\bPOST\\b.{0,120}\\b(cmd|command)\\b|\\b(cmd|command)\\b.{0,120}\\bPOST\\b"
  count_max: 1015644
- id: interactive-terminal-ui
  desc: Interactive web terminal UI
  crit: suspicious
  conf: 0.92
  attack: T1505.003
  if:
    type: text
    regex: 'class\s+Terminal\b.{0,500}commandHistory.{0,500}ps1\s*\('
composite_rules:
- id: php-admin-webshell-ui
  desc: PHP administrative webshell UI
  crit: hostile
  conf: 0.97
  attack: T1505.003
  any:
  - id: command-input-form
  - id: execute-submit-label
  - id: command-output-pre-block
  - id: interactive-terminal-ui
  - id: self-named-get-form
  - id: browser-terminal-fetch-cmd
  - id: objectives/command-and-control/backdoor/webshell/request::raw-json-post-cmd-field
  - id: objectives/command-and-control/backdoor/webshell/recon::sensitive-path-panel
  - id: objectives/command-and-control/backdoor/webshell/recon::recon-command-panel
  needs: 2
  unless:
  - id: objectives/discovery/system/fingerprint/info::rendered-phpinfo-dump
  - id: metadata/package/quality/false-positives::phpstan-phar-path
  - id: metadata/lang/source::yara-rule-source
  - id: well-known/tool/detection/security-scanner::anteumbra-package-tree-member
  - id: metadata/package/testing/presence/fixture::php-security-test-context

- id: php-decoy-exec-webshell-ui
  desc: PHP decoy execution webshell UI
  crit: hostile
  conf: 0.98
  attack: T1505.003
  all:
  - id: objectives/command-and-control/backdoor/webshell/exec::php-execution-fallback-chain
  - id: objectives/command-and-control/backdoor/webshell/exec::dangerous-php-function-cluster
  - id: objectives/evasion/decoy/http-error::fake-404-decoy
  any:
  - id: micro-behaviors/communications/http/header/custom-trigger::http-x-custom-header
  - id: micro-behaviors/communications/http/request/params::get-post-param-access
  - id: objectives/evasion/security-bypass/runtime::security-restriction-probe

- id: self-named-get-form
  desc: GET form posts to same PHP
  crit: suspicious
  conf: 0.86
  attack: T1505.003
  all:
  - id: self-named-get-form--rx-1
  - id: self-named-get-form--rx-2
  - id: self-named-get-form--rx-3
  - id: self-named-get-form--rx-4
  - id: self-named-get-form--rx-5
  near_bytes: 4096
- id: browser-terminal-fetch-cmd
  desc: Browser terminal posts commands
  crit: suspicious
  conf: 0.95
  attack: T1505.003
  all:
  - id: browser-terminal-fetch-cmd--rx-11
  - id: browser-terminal-fetch-cmd--rx-12
  - id: browser-terminal-fetch-cmd--rx-13
  - id: browser-terminal-fetch-cmd--rx-14
  - id: browser-terminal-fetch-cmd--rx-15
  near_bytes: 4096
