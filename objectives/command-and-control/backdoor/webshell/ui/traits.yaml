defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - php
  mbc: B0030
traits:
- id: ajax-handler
  desc: AJAX request handler pattern
  crit: suspicious
  conf: 0.7
  if:
    type: ast
    node: subscript_expression
    regex: \$_(GET|POST)
  unless:
  - type: text
    substr: "@package WordPress"
  - type: text
    regex: "ABSPATH\\s*\\.\\s*(WPINC|['\"]wp-admin/)"
  downgrade:
    any:
    - id: metadata/library/web-frameworks::wordpress-core-package-doc
    - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
    - id: metadata/library/web-frameworks::wordpress-core-api-symbols
- id: command-input-form
  desc: Web command input form
  crit: suspicious
  conf: 0.92
  attack: T1505.003
  if:
    type: text
    regex: '<form[^>]{0,160}method=["'']GET["''][\s\S]{0,240}<input[^>]{0,160}name=["'']cmd["'']'
- id: execute-submit-label
  desc: Execute submit button label
  crit: suspicious
  conf: 0.82
  attack: T1505.003
  if:
    type: text
    regex: '<input[^>]{0,160}type=["'']SUBMIT["''][^>]{0,160}value=["'']Execute["'']'
- id: command-output-pre-block
  desc: Command output preformatted block
  crit: suspicious
  conf: 0.78
  attack: T1505.003
  if:
    type: text
    regex: '<pre>[\s\S]{0,240}<\?php[\s\S]{0,240}(system|exec|shell_exec|passthru)\s*\('
