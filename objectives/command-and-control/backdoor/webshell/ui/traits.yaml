composite_rules:
- id: php-admin-webshell-panel
  desc: PHP administrative webshell panel
  crit: hostile
  conf: 0.97
  attack: T1505.003
  any:
  - id: objectives/command-and-control/backdoor/webshell/panel
  needs: 2

- id: php-decoy-exec-webshell-panel
  desc: PHP decoy execution webshell panel
  crit: hostile
  conf: 0.98
  attack: T1505.003
  all:
  - id: objectives/command-and-control/backdoor/webshell/exec::php-execution-fallback-chain
  - id: objectives/command-and-control/backdoor/webshell/panel::dangerous-php-function-cluster
  - id: objectives/evasion/decoy/http-error::fake-404-decoy
  any:
  - id: objectives/command-and-control/backdoor/webshell/exec::custom-header-input
  - id: ajax-handler
  - id: objectives/command-and-control/backdoor/webshell/panel::php-security-setting-probe

