defaults:
  platforms:
  - linux
  - macos
  - windows
  for:
  - php
  mbc: B0030
traits:
- id: port-30000
  desc: Webshell listens on port 30000
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    word: '30000'
- id: port-31337-php
  desc: Port 31337 (leet)
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    word: '31337'
- id: port-4444-php
  desc: Port 4444 (Metasploit)
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    word: '4444'
- id: port-5555
  desc: Webshell listens on port 5555
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    word: '5555'
- id: port-6666
  desc: Webshell listens on port 6666
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    word: '6666'
- id: port-8080-php
  desc: Port 8080 (HTTP alt)
  crit: suspicious
  conf: 0.5
  if:
    type: string_literal
    word: '8080'
- id: port-9999
  desc: Webshell listens on port 9999
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    word: '9999'
  # Security tool bypass claims in comments — strongly indicative of webshell authors
- id: imunify-bypass-claim
  desc: Imunify360 security suite bypass claim
  crit: suspicious
  conf: 0.97
  attack: T1562.001
  if:
    type: text
    regex: Bypass.{0,50}Imunify

- id: security-bypass-claim-403
  desc: 403 Forbidden bypass claim (webshell indicator)
  crit: suspicious
  conf: 0.82
  attack: T1562
  if:
    type: text
    regex: Bypass.{0,50}403

- id: ssrf-pattern
  desc: Server-Side Request Forgery pattern (URL
  crit: suspicious
  conf: 0.85
  attack: T1090
  if:
    type: ast
    kind: call
    regex: curl_init\s*\(.{0,50}\$_(GET|POST|REQUEST)
- id: google-search-scrape
  desc: Google search results scraping
  crit: suspicious
  conf: 0.85
  if:
    type: string_literal
    regex: 'google\.[a-z.]+/search\?.{0,50}site:'
- id: url-param-fetch
  desc: URL parameter fetched and executed
  crit: suspicious
  conf: 0.8
  if:
    type: ast
    kind: call
    regex: (curl_init|file_get_contents|fopen)\s*\(.{0,50}\$_(GET|POST)
composite_rules:
- id: proxy-port
  desc: High port number (proxy/backdoor indicator)
  crit: suspicious
  conf: 0.8
  any:
  - id: port-30000
  - id: port-31337-php
  - id: port-4444-php
  - id: port-5555
  - id: port-6666
  - id: port-8080-php
  - id: port-9999
