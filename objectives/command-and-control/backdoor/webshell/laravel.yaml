defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: B0030
  attack: T1505.003
traits:
  - id: laravel-password-post-route
    desc: Laravel route reads password
    crit: component
    conf: 0.9
    if:
      type: text
      regex: Route::post[\s\S]{0,500}input\(['"]password['"]\)

composite_rules:
  - id: laravel-destructive-route-backdoor
    desc: Laravel password-gated destructive route
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/backdoor/webshell::password-form
      - id: laravel-password-post-route
      - id: micro-behaviors/process/create/shell/lang::shell-exec
      - id: micro-behaviors/fs/path/application::laravel-base-path
    any:
      - id: micro-behaviors/fs/chmod/commands::php-shell-chmod-recursive-777
      - id: micro-behaviors/fs/chmod/commands::php-shell-chown-recursive
      - id: micro-behaviors/fs/delete/file::php-unlink
    needs: 2

