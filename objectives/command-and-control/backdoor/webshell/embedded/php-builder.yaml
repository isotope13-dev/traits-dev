# PHP web shell payload embedded in non-PHP source — i.e. a web shell
# *builder/generator*. Frameworks like GODZILLA and Behinder ship Java/C#
# client modules whose `generate()` method emits a full PHP web shell as a
# string literal (`<?php ... eval($payload) ... $_POST[$pass] ...`). The host
# language's own PHP detectors never run on these literals, so the builder
# escapes detection. These component atoms are the PHP web shell core; alone in
# arbitrary source they are meaningless, so the hostile signal is the composite.
defaults:
  platforms: [windows, unix]
  # Python, Java, and other source files can generate the PHP payload as a
  # string.  Keep the source group for compiled/source languages and include
  # Python explicitly; it is a script type, not a member of the source group.
  for: [source, python]
  attack: T1505.003
  mbc: B0030
traits:
  - id: php-open-tag-literal
    desc: PHP open tag in source string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '<?php'
  - id: php-eval-variable
    desc: Embedded PHP eval of a variable
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '@?eval\s*\(\s*\$[A-Za-z_][A-Za-z0-9_]*'
  - id: php-request-superglobal
    desc: PHP request superglobal access
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\$_(POST|GET|REQUEST|COOKIE)\s*\['
composite_rules:
  - id: php-webshell-builder
    desc: PHP web shell payload embedded in source (builder)
    crit: hostile
    conf: 0.96
    all:
      - id: php-open-tag-literal
      - id: php-eval-variable
      - id: php-request-superglobal
    # Go unit tests commonly embed vulnerable PHP/HTTP fixtures so Yaklang's
    # analyzer can test its web-shell rules.  Those strings are not a PHP
    # builder in the Go test itself; keep the actual PHP source detection live.
    unless:
      - id: metadata/package/testing/harness/unit::go-test
