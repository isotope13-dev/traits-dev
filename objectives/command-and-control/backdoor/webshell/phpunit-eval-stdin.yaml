defaults:
  platforms: [linux, windows, macos]
  for: [php]
  attack: T1505.003
traits:
  - id: phpunit-eval-stdin-path
    desc: Targeting vulnerable PHPUnit RCE path
    crit: notable
    conf: 1.0
    if:
      type: basename
      exact: phpunit_src_Util_PHP_eval-stdin.php

  - id: php-document-root-access
    desc: Retrieves web server document root path
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: '$_SERVER["DOCUMENT_ROOT"]'

  - id: php-webshell-upload-path
    desc: Target path includes suspicious webshell name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /fm_40400.php

composite_rules:
  - id: php-file-manager-payload
    desc: Payload includes file management features (upload, list, delete)
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/fs/write/file::move-uploaded-file
      - id: micro-behaviors/fs/enumerate/directory::php-scandir
      - id: micro-behaviors/fs/delete/file::php-unlink
    any:
      - id: objectives/command-and-control/backdoor/webshell::eval-base64-large-payload
      - id: objectives/anti-static/obfuscation/string::long-base64-in-strings

  - id: phpunit-rce-dropper
    desc: Exploits PHPUnit vulnerability to drop a payload
    crit: hostile
    conf: 0.99
    all:
      - id: phpunit-eval-stdin-path
      - id: micro-behaviors/fs/write/file::file-put-contents
      - id: objectives/command-and-control/backdoor/webshell::eval-base64-large-payload

  - id: php-webroot-webshell-dropper
    desc: Injects a webshell directly into the web document root
    crit: hostile
    conf: 0.98
    all:
      - id: php-document-root-access
      - id: micro-behaviors/fs/write/file::file-put-contents
      - id: objectives/command-and-control/backdoor/webshell::eval-base64-large-payload

  - id: php-stealthy-file-manager-stager
    desc: Stealthy file manager stager (uses error suppression)
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/backdoor/webshell::error-suppress-prefix
      - id: micro-behaviors/fs/write/file::file-put-contents
      - id: php-file-manager-payload
