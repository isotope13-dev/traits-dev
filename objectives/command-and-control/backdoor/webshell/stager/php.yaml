defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: B0030
traits:
- id: embedded-admin-password-preamble
  desc: Embedded admin password preamble
  crit: suspicious
  conf: 0.98
  attack: T1505.003
  if:
    type: text
    substr: JHBhc3N3b3JkPSdBRE1JTi0tJzsKZXJyb3JfcmVwb3J0aW5nLyoqLygwKTsKQHNldF90aW1lX2xpbWl0
- id: embedded-hex-decoder-routine
  desc: Embedded Class UC key decoder
  crit: suspicious
  conf: 0.95
  attack: T1027
  if:
    type: text
    substr: IENsYXNzX1VDX2tleS8qKi8oJHN0cmluZyl7
- id: embedded-create-function-launcher
  desc: Embedded Create Function launcher
  crit: suspicious
  conf: 0.98
  attack: T1505.003
  if:
    type: text
    substr: Q3JlYXRlX0Z1bmN0aW9uLyoqLygnJywkZmlsZW5hbWUvKiovKTskUEhQLyoqLygpOyAg
composite_rules:
- id: authenticated-admin-webshell
  desc: Embedded staged admin webshell
  crit: hostile
  conf: 0.995
  attack: T1505.003
  all:
  - id: embedded-admin-password-preamble
  - id: embedded-create-function-launcher
  any:
  - id: embedded-hex-decoder-routine
  - id: micro-behaviors/process/interpreter/eval::staged-eval-loader
