defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  mbc: B0030
  attack: T1105
traits:
- id: write-executable-target-ext
  desc: PHP executable extension string
  crit: component
  if:
    type: text
    regex: '["''][^"'']{0,160}\.(php|phtml|phar|php[0-9])["'']'
  unless:
  - type: basename
    regex: '\.php$'
  - type: text
    regex: '(require|include)(_once)?\s*\(.{0,80}\.php|vendor/autoload\.php|Text Domain:'

composite_rules:
# Keep payload-obfuscation evidence explicit: broad anti-static directory
# references also contain benign source fragments such as PLATFORM and TARGET.
- id: php-payload-obfuscation
  desc: PHP encoded or obfuscated payload present
  crit: component
  any:
  - id: micro-behaviors/data/decode/base64::php-base64-decode-call
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers::php-encoded-strings
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers::php-obfuscated-vars
  - id: objectives/anti-static/obfuscation/code-metrics/identifiers::php-high-non-ascii-ratio
  - id: micro-behaviors/data/decode/hex::chr-hexdec-call
- id: php-dropper
  desc: 'PHP dropper: obfuscation and HTTP input write an executable target'
  crit: suspicious
  conf: 0.95
  all:
  - id: php-payload-obfuscation
  - id: micro-behaviors/fs/write/
  - id: micro-behaviors/communications/http/request/
  - id: write-executable-target
  any:
  - id: micro-behaviors/communications/http/request/form-input::php-input
  - id: objectives/command-and-control/backdoor/webshell/session/
  unless:
  - id: well-known/app/wordpress-plugins::known-wordpress-plugin
# Writing to a PHP/executable extension is the webshell-distinguishing signal:
# legitimate upload handlers ($_FILES + fwrite) save user content to media/data
# paths, not to a server-executable .php/.phtml/.phar destination.
- id: write-executable-target
  desc: Write targets a server-executable PHP extension
  crit: component
  conf: 0.8
  all:
  - id: micro-behaviors/fs/write/file/direct/
  - id: write-executable-target-ext
  near_lines: 10
- id: php-uploader
  desc: PHP webshell uploads to executable target
  crit: suspicious
  conf: 0.9
  all:
  - id: write-executable-target
  any:
  - id: micro-behaviors/communications/http/request/params::files
  - id: micro-behaviors/communications/http/curl::file-upload
  - id: micro-behaviors/communications/http/request/form-input::php-input
