defaults:
  platforms: [linux, windows, macos]
  for: [php]
  attack: T1505.003
traits:
  - id: phpunit-eval-stdin-path
    desc: Targeting vulnerable PHPUnit RCE path
    crit: suspicious
    conf: 1.0
    if:
      type: path
      basename: true
      exact: phpunit_src_Util_PHP_eval-stdin.php

  - id: phpunit-eval-stdin-collected-path
    desc: Collected PHPUnit RCE path
    crit: suspicious
    conf: 0.98
    if:
      type: path
      basename: true
      regex: '(?i)_vendor_phpunit_phpunit_src_Util_PHP_eval-stdin\.php\.bin$'

  - id: php-webshell-upload-path
    desc: Target path includes suspicious webshell name
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /fm_40400.php

  - id: source-import-file-put-contents
    desc: PHP source imports file_put_contents
    crit: component
    conf: 0.9
    if:
      type: function
      exact: file_put_contents

  - id: near-zero-whitespace
    desc: Near-zero whitespace script
    crit: component
    conf: 0.84
    if:
      type: metrics
      field: text.whitespace_ratio
      max: 0.02

  - id: very-long-string
    desc: Very long embedded string
    crit: component
    conf: 0.86
    if:
      type: metrics
      field: strings.max_length
      min: 500

  - id: get-directory-param
    desc: GET directory parameter
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\$_GET\s*\[\s*["'']d["'']\s*\]'

  - id: get-delete-param
    desc: GET delete parameter
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\$_GET\s*\[\s*["'']del["'']\s*\]'

  - id: get-download-param
    desc: GET download parameter
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\$_GET\s*\[\s*["'']dl["'']\s*\]'

  - id: content-disposition-download
    desc: Content-Disposition download response
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 'Content-Disposition.{0,40}filename'

  - id: readfile-output
    desc: PHP readfile output function
    crit: component
    conf: 0.84
    if:
      type: text
      word: readfile

  - id: php-file-manager-path-router
    desc: PHP file manager path router
    crit: component
    conf: 0.9
    for: [php, html, data, text]
    if:
      type: text
      regex: '\$_GET\s*\[\s*["''](p|q)["'']\s*\]'

  - id: php-file-manager-encoded-paths
    desc: PHP file manager encoded paths
    crit: component
    conf: 0.92
    for: [php, html, data, text]
    if:
      type: text
      regex: 'function\s+(en|de)codePath\s*\(.{0,80}\)'

  - id: php-file-manager-scandir-panel
    desc: PHP file manager directory panel
    crit: suspicious
    conf: 0.93
    for: [php, html, data, text]
    if:
      type: text
      regex: 'scandir\s*\(\s*PATH\s*\)'

  - id: php-file-manager-upload-form
    desc: PHP file manager upload form
    crit: component
    conf: 0.9
    for: [php, html, data, text]
    if:
      type: text
      substr: 'enctype="multipart/form-data"'

  - id: php-file-manager-edit-handler
    desc: PHP file manager edit handler
    crit: suspicious
    conf: 0.94
    for: [php, html, data, text]
    if:
      type: text
      regex: 'file_get_contents\s*\(\s*PATH\s*\.\s*["'']/["'']\s*\.\s*\$_GET'

  - id: php-file-manager-rename-handler
    desc: PHP file manager rename handler
    crit: suspicious
    conf: 0.93
    for: [php, html, data, text]
    if:
      type: text
      regex: 'rename\s*\([^)]{0,120}PATH\s*\.\s*["'']/["'']\s*\.\s*\$_POST'

composite_rules:
  - id: php-file-action-triad
    desc: PHP file action triad
    crit: suspicious
    conf: 0.92
    all:
      - id: get-directory-param
      - id: get-delete-param
      - id: get-download-param
      - id: micro-behaviors/fs/enumerate/directory::php-scandir

  - id: php-file-download-handler
    desc: PHP file download handler
    crit: suspicious
    conf: 0.9
    all:
      - id: get-download-param
      - id: readfile-output
      - id: content-disposition-download

  - id: php-file-manager-payload
    desc: Payload includes file management features (upload, list, delete)
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/fs/write/file/direct::move-uploaded-file
      - id: micro-behaviors/fs/enumerate/directory::php-scandir
      - id: micro-behaviors/fs/delete/file::php-unlink
    any:
      - id: micro-behaviors/data/decode/base64::php-large-literal-base64-decode
      - id: micro-behaviors/data/encode/payload::large-base64-string-literals

  - id: php-file-manager-control-panel
    desc: PHP file manager control panel
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/request/params::document-root-access
      - id: micro-behaviors/fs/write/file/direct::move-uploaded-file
      - id: micro-behaviors/fs/enumerate/directory::php-scandir
      - id: micro-behaviors/fs/delete/file::php-unlink
      - id: micro-behaviors/communications/http/request/params::get-post-param-access
    any:
      - id: micro-behaviors/communications/http/request/params::files
      - id: micro-behaviors/communications/http/post::post-form
      - id: micro-behaviors/communications/http/post::multipart-form

  - id: php-file-manager-with-download
    desc: PHP file manager with download
    crit: hostile
    conf: 0.98
    all:
      - id: php-file-manager-control-panel
      - id: php-file-download-handler

  - id: php-get-file-action-webshell
    desc: GET-controlled PHP file webshell
    crit: hostile
    conf: 0.98
    all:
      - id: php-file-action-triad
      - id: micro-behaviors/fs/delete/file::php-unlink
      - id: readfile-output

  - id: php-web-file-manager-webshell
    desc: PHP web file manager webshell
    crit: hostile
    conf: 0.99
    for: [php, html, data, text]
    all:
      - id: php-file-manager-path-router
      - id: php-file-manager-scandir-panel
      - id: php-file-manager-upload-form
      - id: micro-behaviors/fs/write/file/direct::move-uploaded-file
      - id: micro-behaviors/fs/delete/file::php-variable-name-delete-call
    any:
      - id: php-file-manager-edit-handler
      - id: php-file-manager-rename-handler
      - id: php-file-manager-encoded-paths

  - id: php-stealth-file-manager-webshell
    desc: Stealthy PHP file manager webshell
    crit: hostile
    conf: 0.98
    all:
      - id: php-file-manager-control-panel
      - id: micro-behaviors/os/stdio::error-suppress-prefix

  - id: encoded-php-file-manager-webshell
    desc: Encoded PHP file manager webshell
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/lang/encoded/base64::php
      - id: php-file-manager-control-panel

  - id: one-line-encoded-webroot-writer
    desc: One-line encoded webroot writer
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/file/metrics::file-one-liner
      - id: near-zero-whitespace
      - id: very-long-string
      - id: micro-behaviors/communications/http/request/params::document-root-access
      - id: micro-behaviors/data/decode/base64::php-base64-decode-call
      - id: source-import-file-put-contents

  - id: phpunit-rce-dropper
    desc: Exploits PHPUnit vulnerability to drop a payload
    crit: hostile
    conf: 0.99
    any:
      - id: phpunit-eval-stdin-path
      - id: phpunit-eval-stdin-collected-path
    all:
      - id: micro-behaviors/fs/write/file/direct::file-put-contents
      - id: micro-behaviors/data/decode/base64::php-large-literal-base64-decode

  - id: php-webroot-webshell-dropper
    desc: Injects a webshell directly into the web document root
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/request/params::document-root-access
      - id: micro-behaviors/fs/write/file/direct::file-put-contents
      - id: micro-behaviors/data/decode/base64::php-large-literal-base64-decode

  - id: php-stealthy-file-manager-stager
    desc: Stealthy file manager stager (uses error suppression)
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/stdio::error-suppress-prefix
      - id: micro-behaviors/fs/write/file/direct::file-put-contents
      - id: php-file-manager-payload
