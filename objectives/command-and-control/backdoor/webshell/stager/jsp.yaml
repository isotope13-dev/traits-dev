---
defaults:
  platforms:
  - windows
  - unix
  for:
  - java
  - class
  mbc: B0030
  attack: T1505.003
traits:
- id: jsp-url-openconnection-download
  desc: Java URL openConnection primitive
  crit: component
  conf: 0.85
  if:
    type: text
    regex: new\s+URL\(.{0,80}\)\.openConnection\(\)
- id: jsp-temp-download-exec-delete
  desc: Java temp download execute cleanup
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: "(?s)java\\.io\\.tmpdir.{0,240}download\\(.{0,240}\\.delete\\("
composite_rules:
- id: jsp-download-exec-cleanup
  desc: JSP download execute cleanup
  crit: hostile
  conf: 0.97
  all:
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: jsp-url-openconnection-download
  - id: jsp-temp-download-exec-delete
