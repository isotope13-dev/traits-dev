defaults:
  platforms: [windows, unix]
  for: [php]
  mbc: B0030
  attack: T1505.003
traits:
  - id: xor-built-request-superglobal
    desc: XOR-built request superglobal name
    crit: suspicious
    conf: 0.98
    attack: T1027
    mbc: B0032
    if:
      type: text
      substr: '"~+d()"^"!{+{}"'
  - id: variable-variable-array-deref
    desc: Variable-variable array dereference
    crit: suspicious
    conf: 0.92
    attack: T1027
    mbc: B0032
    if:
      type: text
      regex: '\$\{\$[A-Za-z_][A-Za-z0-9_]*\}\s*\[\s*[A-Za-z_][A-Za-z0-9_]*\s*\]'
  - id: eval-leading-bareword-prefix
    desc: eval with bareword prefix bypass
    crit: suspicious
    conf: 0.98
    attack: T1059.001
    mbc: E1059
    if:
      type: text
      regex: "eval\\s*\\(\\s*['\\\"][A-Za-z]['\\\"]\\s*\\.\\s*\\$[A-Za-z_][A-Za-z0-9_]*\\s*\\)"
composite_rules:
  - id: obfuscated-request-eval-stager
    desc: Obfuscated request-driven eval stager
    crit: suspicious
    conf: 0.98
    all:
      - id: objectives/execution/interpreter/eval/remote::eval-symbol
      - id: variable-variable-array-deref
    any:
      - id: xor-built-request-superglobal
      - id: eval-leading-bareword-prefix
    needs: 1
  - id: php71-bareword-bypass-webshell
    desc: PHP webshell using bareword eval bypass
    crit: hostile
    conf: 0.995
    all:
      - id: objectives/execution/interpreter/eval/remote::eval-symbol
      - id: xor-built-request-superglobal
      - id: variable-variable-array-deref
      - id: eval-leading-bareword-prefix
    any:
      - id: metadata/file/text::tiny-stager-profile
      - id: micro-behaviors/process/interpreter/eval::eval-symbol
    needs: 1
