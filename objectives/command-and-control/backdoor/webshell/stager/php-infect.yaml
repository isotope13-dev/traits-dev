defaults:
  platforms: [windows, unix]
  for: [php]
  attack: T1505.003
  mbc: B0030
traits:
  - id: php-patch-payload-function
    desc: PHP PatchPayload function
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "function PatchPayload"
  - id: php-rawurldecode-payload-prefix
    desc: PHP rawurldecode payload prefix
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "rawurldecode($payload)"
  - id: php-preserve-mtime-touch
    desc: PHP preserves file mtime
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "@touch($path"
  - id: php-remote-shell-code-comment
    desc: PHP remote shell code comment
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)(5h3ll|shell code link|shell location)'
  - id: php-home-public-html-target
    desc: PHP writes public_html path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/home/[^"''\s]{1,80}/public_html/[^"''\s]{1,80}\.php'
  - id: php-http-file-fetch
    desc: PHP fetches remote file URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'file_get_contents\s*\(\s*["'']http://'
    unless:
      - id: well-known/app/egroupware/
      - id: well-known/lib/benign-runtime-bundles::php-source-tree
  - id: php-fwrite-downloaded-data
    desc: PHP writes downloaded variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'fwrite\s*\(\s*\$nf\s*,\s*\$li\s*\)'
composite_rules:
  - id: php-webroot-payload-infector
    desc: PHP injects payload into writable web files
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/check::php-is-writable-call
      - id: php-patch-payload-function
      - id: php-rawurldecode-payload-prefix
      - id: php-preserve-mtime-touch
  - id: php-remote-shell-webroot-writer
    desc: PHP downloads shell into webroot
    crit: hostile
    conf: 0.97
    all:
      - id: php-http-file-fetch
      - id: php-fwrite-downloaded-data
      - id: php-home-public-html-target
    any:
      - id: php-remote-shell-code-comment
      - id: objectives/command-and-control/backdoor/webshell/stager::write-executable-target-ext
