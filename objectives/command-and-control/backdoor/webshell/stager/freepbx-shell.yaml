defaults:
  platforms: [unix]
  for: [shell]
  attack: T1505.003
traits:
- id: freepbx-ajax-webshell-path
  desc: FreePBX ajax.php webshell path
  crit: suspicious
  conf: 0.94
  if:
    type: text
    substr: /var/www/html/admin/views/ajax.php
- id: freepbx-module-webshell-spread
  desc: FreePBX module webshell spread
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: 'admin/modules/(h|fpbxphones|phones)/(ajax|config|index)\.php'
  count_min: 4
- id: asterisk-ampusers-admin-reset
  desc: Asterisk ampusers admin reset
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'DELETE FROM ampusers[\s\S]{0,240}INSERT INTO ampusers'
- id: freepbx-ha-license-webshell
  desc: FreePBX HA license webshell
  crit: suspicious
  conf: 0.93
  if:
    type: text
    substr: /var/www/html/admin/modules/freepbx_ha/license.php
- id: freepbx-immutable-webshell-command
  desc: FreePBX webshell made immutable
  crit: suspicious
  conf: 0.96
  if:
    type: text
    regex: 'chattr\s+\+[ia]*i[ia]*\s+/var/www/html/(admin/views/ajax|h)\.php'
- id: asterisk-ha-trigger-marker
  desc: Asterisk HA trigger marker
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '/usr/local/asterisk/ha_triggers?'
composite_rules:
- id: freepbx-base64-webshell-stage
  desc: FreePBX base64 webshell stage
  crit: hostile
  conf: 0.97
  all:
  - id: freepbx-ajax-webshell-path
  - id: objectives/anti-static/obfuscation/encoding/base64::base64-decode-exec
  any:
  - id: freepbx-module-webshell-spread
  - id: freepbx-ha-license-webshell
- id: freepbx-immutable-webshell-persistence
  desc: FreePBX immutable webshell persistence
  crit: hostile
  conf: 0.98
  all:
  - id: freepbx-ajax-webshell-path
  - id: freepbx-immutable-webshell-command
- id: freepbx-webshell-account-takeover
  desc: FreePBX webshell account takeover
  crit: hostile
  conf: 0.98
  all:
  - id: freepbx-ajax-webshell-path
  - id: asterisk-ampusers-admin-reset
  any:
  - id: asterisk-ha-trigger-marker
  - id: freepbx-module-webshell-spread
