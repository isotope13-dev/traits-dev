# PHP Webshell Composite Detection Rules
# These rules combine multiple traits to identify webshell behavior patterns
# MBC: B0030 (C2 Communication)
# ATT&CK: T1505.003 (Server Software Component: Web Shell)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [php]
composite_rules:
  # Memory webshell: self-deletes from disk, persists in process memory,
  # fetches and evals remote code in a loop
  - id: php-memory-webshell
    desc: "PHP memory webshell: self-delete + remote eval"
    crit: hostile
    conf: 0.99
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: objectives/evasion/self-delete/file::script-self-delete
      - id: micro-behaviors/process/interpreter/eval::eval-symbol
    any:
      - id: objectives/command-and-control/backdoor/webshell/session::ignore-abort
      - id: micro-behaviors/process/control/signal::set-time-limit
      - id: micro-behaviors/fs/read/file::file-get-contents
      - id: objectives/execution/interpreter/eval/remote::eval-error-suppressed
    needs: 2
  # High-confidence webshell detection
  - id: php-backdoor
    desc: "PHP webshell: session-based backdoor with"
    crit: suspicious
    conf: 0.95
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: objectives/command-and-control/backdoor/webshell/session/
      - id: micro-behaviors/communications/http/request/
    any:
      - id: objectives/anti-static/obfuscation/
      - id: micro-behaviors/fs/write/
      - id: micro-behaviors/process/create/shell/
  # Dropper webshell (writes decoded payloads)
  - id: php-dropper
    desc: "PHP dropper: decodes and writes"
    crit: suspicious
    conf: 0.95
    mbc: "B0030"
    attack: "T1105"
    all:
      - id: objectives/anti-static/obfuscation/
      - id: micro-behaviors/fs/write/
    any:
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/http/request/
  # Self-destructing webshell
  - id: php-self-destruct
    desc: "PHP webshell with self-deletion capability"
    crit: suspicious
    conf: 0.95
    mbc: "F0006"
    attack: "T1070.004"
    all:
      - id: objectives/evasion/self-delete/file::script-self-delete
      - id: micro-behaviors/communications/http/request/
  # SSRF/Proxy webshell
  - id: php-proxy
    desc: "PHP proxy/SSRF webshell for fetching"
    crit: suspicious
    conf: 0.9
    mbc: "B0030"
    attack: "T1090"
    all:
      - id: micro-behaviors/communications/http/curl::init
    any:
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/http/curl::ssl-verify-disable
      - id: micro-behaviors/communications/http/curl::ssl-host-disable
    needs: 1
  # Timestamp manipulation (anti-forensic)
  - id: php-timestomp
    desc: "PHP webshell with timestamp manipulation"
    crit: suspicious
    conf: 0.9
    mbc: "F0006"
    attack: "T1070.006"
    all:
      - id: objectives/evasion/indicator-removal/timestamps::timestomp
      - id: micro-behaviors/fs/write/
  # Hardcoded authentication backdoor
  - id: php-hardcoded-auth
    desc: "PHP webshell with hardcoded hash"
    crit: notable
    conf: 0.95
    mbc: "B0030"
    attack: "T1505.003"
    any:
      - id: objectives/command-and-control/backdoor/webshell::hardcoded-hash-auth
      - id: objectives/command-and-control/backdoor/webshell::substr-hash-compare
  # File upload webshell
  - id: php-uploader
    desc: "PHP webshell with file upload"
    crit: notable
    conf: 0.9
    mbc: "B0030"
    attack: "T1105"
    any:
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/communications/http/curl::file-upload
      - id: micro-behaviors/fs/write/
      - id: micro-behaviors/fs/write/
  # Command execution webshell
  - id: php-rce
    desc: "PHP webshell with remote command"
    crit: notable
    conf: 0.95
    mbc: "E1059"
    attack: "T1059.004"
    any:
      - id: micro-behaviors/process/create/shell/
      - id: objectives/anti-static/obfuscation/
      - id: micro-behaviors/communications/http/request/
  # HOSTILE: eval(base64_decode(...)) pattern - classic PHP backdoor
  # This pattern has no legitimate use and is a hallmark of PHP webshells
  - id: php-eval-base64-backdoor
    desc: "PHP backdoor: eval of base64 payload"
    crit: suspicious
    conf: 0.99
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: objectives/command-and-control/backdoor/webshell::eval-base64-large-payload
      - id: objectives/anti-static/obfuscation/code-metrics::php-webshell-pattern
  # Web UI webshell (has HTML interface)
  - id: php-web-ui
    desc: "PHP webshell with web-based user"
    crit: suspicious
    conf: 0.85
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: objectives/command-and-control/backdoor/webshell::password-form
    any:
      - id: objectives/command-and-control/backdoor/webshell/session/
      - id: micro-behaviors/communications/http/request/
  # Google scraping webshell (SEO spam tool)
  - id: php-seo-tool
    desc: "PHP SEO spam tool with"
    crit: suspicious
    conf: 0.85
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: objectives/command-and-control/backdoor/webshell::google-search-scrape
      - id: micro-behaviors/communications/http/curl::init
  # Obfuscated payload webshell
  - id: php-obfuscated
    desc: "PHP webshell with heavily obfuscated"
    crit: notable
    conf: 0.9
    mbc: "B0032"
    attack: "T1027"
    all:
      - id: objectives/anti-static/obfuscation/
        #  # Decompressed code execution
        #  - id: php-gz-eval
        #    desc: "PHP: decompresses and executes code"
        #    crit: suspicious
        #    conf: 0.98
        #    mbc: "B0032"
        #    attack: "T1027"
        #    any:
        #      - id: objectives/anti-static/obfuscation/encoding/decode_eval::php-ast-gz-eval-chain
        #      - id: objectives/anti-static/obfuscation/encoding/decode_eval::eval-gzinflate-base64-encoded
        #  - id: php-preg-replace-e-obfuscated-loader
        #    desc: "PHP obfuscated loader via preg_replace /e"
        #    crit: suspicious
        #    conf: 0.99
        #    mbc: "B0030"
        #    attack: "T1505.003"
        #    all:
        #      - id: objectives/anti-static/obfuscation/encoding/decode_eval::preg-replace-e-encoded
        #      - id: objectives/anti-static/obfuscation/encoding/decode_eval::eval-gzinflate-base64-encoded
  # Obfuscated dynamic backdoor
  - id: php-obfuscated-dynamic-backdoor
    desc: "PHP: obfuscated dynamic backdoor (dynamic"
    crit: suspicious
    conf: 0.98
    mbc: "B0032"
    attack: "T1027"
    all:
      - id: micro-behaviors/process/create/shell/
    any:
      - id: objectives/anti-static/obfuscation/code-metrics::php-obfuscated-vars
      - id: objectives/anti-static/obfuscation/code-metrics::php-encoded-strings
      - id: objectives/anti-static/obfuscation/encoding/
  # Non-ASCII dynamic backdoor
  - id: php-non-ascii-backdoor
    desc: "PHP: non-ASCII dynamic backdoor (dynamic"
    crit: suspicious
    conf: 0.98
    mbc: "B0032"
    attack: "T1027"
    all:
      - id: micro-behaviors/process/create/shell/
      - id: objectives/anti-static/obfuscation/code-metrics::php-high-non-ascii-ratio
  - id: php-non-ascii-identifiers-backdoor
    desc: "PHP: backdoor using non-ASCII identifiers"
    crit: notable
    conf: 0.98
    mbc: "B0032"
    attack: "T1027"
    any:
      - id: objectives/anti-static/obfuscation/code-metrics::php-high-non-ascii-ratio
      - id: objectives/anti-static/obfuscation/code-metrics::php-non-ascii-variable
      - id: objectives/anti-static/obfuscation/code-metrics::php-non-ascii-name
  - id: php-shell-functional
    desc: "PHP: functional webshell (exec + user input)"
    crit: suspicious
    conf: 0.98
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/communications/http/request/
    any:
      - id: objectives/anti-static/obfuscation/
      - id: micro-behaviors/fs/read/file/
      - id: micro-behaviors/fs/write/file/
    unless:
      - id: metadata/package/testing/harness::php-test-runner
      - id: objectives/command-and-control/backdoor/script::localhost-socket-uri
  # Functional PHP shell
  - id: php-shell
    desc: "PHP: functional webshell (exec +"
    crit: suspicious
    conf: 0.98
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/communications/http/request/
    any:
      - id: micro-behaviors/fs/read/file/
      - id: micro-behaviors/fs/write/file/
      - id: objectives/anti-static/obfuscation/encoding/
  # Hostile: Direct user input used as function call (variable function)
  # This pattern has no legitimate use - user input directly calls arbitrary functions
  - id: php-variable-function-backdoor
    # === HOSTILE: Full-featured webshell with direct RCE ===
    # Combines direct user input execution + multiple shell methods + webshell family indicators

    desc: "PHP webshell: user input as function call"
    crit: suspicious
    conf: 0.99
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: objectives/command-and-control/backdoor/webshell::dynamic-user-input-call # $_POST['x']() pattern
      - id: micro-behaviors/process/create/shell/ # has shell execution capability
    any:
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/fs/write/
      - id: micro-behaviors/fs/read/
  # Hostile: Webshell with backtick RCE from user input
  - id: php-backtick-rce
    desc: "PHP webshell: backtick RCE from user input"
    crit: suspicious
    conf: 0.98
    mbc: "E1059"
    attack: "T1059.004"
    all:
      - id: micro-behaviors/process/create/shell/lang::backtick
      - id: micro-behaviors/communications/http/request/
    any:
      - id: micro-behaviors/process/create/shell/
      - id: micro-behaviors/fs/write/
      - id: objectives/command-and-control/backdoor/webshell/session/
  # Hostile: WSO webshell family with command execution
  - id: wso-webshell
    desc: "WSO webshell family detected"
    crit: suspicious
    conf: 0.99
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: objectives/command-and-control/backdoor/webshell/script::wso-version
      - id: micro-behaviors/process/create/shell/
    any:
      - id: micro-behaviors/communications/http/request/
      - id: micro-behaviors/fs/write/
      - id: objectives/command-and-control/backdoor/webshell/session/
  # Hostile: Full-featured webshell (multiple indicators)
  # File manager + shell execution + user input + multiple exec methods
  - id: php-full-webshell
    desc: "Full-featured PHP webshell"
    crit: suspicious
    conf: 0.98
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: micro-behaviors/process/create/shell/ # shell execution
      - id: micro-behaviors/communications/http/request/ # user input handling
      - id: micro-behaviors/fs/write/ # file write capability
      - id: objectives/command-and-control/backdoor/webshell/ # webshell family indicators (includes dynamic-user-input-call)
      - id: micro-behaviors/process/create/shell/lang::backtick # backtick RCE
        #  # WordPress CMS backdoor - creates admin user with obfuscated code
        #  - id: php-wordpress-backdoor
        #    desc: "WordPress backdoor: admin user creation"
        #    crit: suspicious
        #    conf: 0.95
        #    mbc: "B0030"
        #    attack: "T1505.003"
        #    all:
        #      - id: objectives/command-and-control/backdoor/webshell/backdoor::wp-user-creation
        #      - id: objectives/command-and-control/backdoor/webshell/backdoor::wp-role-assignment
        #    any:
        #      - id: objectives/anti-static/obfuscation/encoding/decode_eval::strrev-chained
        #      - id: objectives/anti-static/obfuscation/encoding/decode_eval::base64-admin-role
        #      - id: objectives/command-and-control/backdoor/webshell/backdoor::wp-plugin-path-encoded
  - id: php-mysql-admin-webshell
    desc: "PHP MySQL admin webshell"
    crit: suspicious
    conf: 0.97
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: micro-behaviors/data/db/conn/mysql::php-mysql-admin-surface
      - id: micro-behaviors/data/db/conn/mysql::php-mysql-query-console
      - id: micro-behaviors/communications/http/request/params::extract-legacy-http-input
      - id: micro-behaviors/communications/http/cookies::setcookie-call
    any:
      - id: objectives/command-and-control/backdoor/webshell::password-form
      - id: objectives/command-and-control/backdoor/webshell::error-suppress-prefix
      - id: micro-behaviors/data/db/conn/mysql::php-mysql-dump-export
  # Hostile: Junk-injection str_replace webshell - assembles PHP code from junk-obfuscated
  # string fragments, reconstructs create_function via str_replace, uses HTTP headers for C2
  - id: php-junk-str-replace-webshell
    desc: "PHP webshell: junk-injection str_replace code assembly"
    crit: hostile
    conf: 0.99
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: objectives/anti-static/obfuscation/string::str-replace-func-name-deob
      - id: objectives/execution/interpreter/eval/remote::create-function-junk-injected
    any:
      - id: objectives/command-and-control/backdoor/webshell/session::referer-accept-lang-c2-pair
      - id: objectives/execution/interpreter/eval/remote::ob-start-eval-capture
      - id: objectives/execution/interpreter/eval/remote::eval-gz-b64-chain-in-string
  # Hostile: PHP webshell using hex-encoded function name array + dynamic dispatch
  # Encodes shell_exec/file_put_contents/etc. as hex strings, decodes via chr(hexdec()),
  # dispatches all calls through integer-indexed $func[] array to evade static analysis.
  - id: php-hex-dispatch-webshell
    desc: "PHP webshell: hex-encoded function names with dynamic dispatch"
    crit: suspicious
    conf: 0.98
    mbc: "B0030"
    attack: "T1505.003"
    all:
      - id: objectives/anti-static/obfuscation/encoding/hex::hexdec-chr-decode
      - id: objectives/anti-static/obfuscation/encoding/hex::integer-indexed-func-dispatch
      - id: micro-behaviors/communications/http/request/
    any:
      - id: objectives/anti-static/obfuscation/encoding/hex::hex-string-func-array
      - id: micro-behaviors/fs/write/
      - id: micro-behaviors/fs/chmod/modify/
