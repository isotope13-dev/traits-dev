# GitHub Actions C2 Implant Detection
# Detects shell-based C2 backdoors in GitHub Actions composite actions
# ATT&CK: T1059.004 (Unix Shell), T1071.001 (Web Protocols)
defaults:
  platforms: [linux, unix, macos]
  for: [github-actions]
  attack: "T1059.004"
traits:
  # === Structural markers (kv — match within YAML run: blocks) ===
  - id: composite-action-type
    desc: GitHub Actions composite action
    crit: component
    conf: 1.0
    if:
      type: kv
      path: "runs.using"
      exact: "composite"
  - id: run-block-eval-var
    desc: eval of variable in run block
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: "runs.steps[*].run"
      regex: 'eval\s+\\?"?\$\w+'
  - id: run-block-curl-tls-skip
    desc: curl TLS skip in run block
    crit: suspicious
    conf: 0.85
    if:
      type: kv
      path: "runs.steps[*].run"
      regex: 'curl\s+[^\n]{0,60}-[a-zA-Z]*k[a-zA-Z ]*'
  # === Content patterns (raw) ===
  - id: curl-tls-skip
    desc: curl with TLS verification disabled
    crit: notable
    conf: 0.8
    attack: T1573
    if:
      type: raw
      regex: 'curl\s+[^\n]{0,80}(-[a-zA-Z]*k\b|--insecure\b)'
  - id: eval-shell-var
    desc: eval of shell variable
    crit: suspicious
    conf: 0.88
    if:
      type: raw
      regex: '\beval\s+\\?"?\$[{(]?\w+'
  - id: c2-jitter-sleep
    desc: Random sleep interval (C2 jitter)
    crit: notable
    conf: 0.85
    attack: T1071.001
    if:
      type: raw
      regex: 'sleep\s+\$\(\(RANDOM\s*%'
  - id: background-subshell
    desc: Background subshell execution
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: '\)\s*&\s*$'
  - id: gha-debug-disguise
    desc: "::debug:: disguising C2 output"
    crit: notable
    conf: 0.88
    if:
      type: raw
      regex: '::debug::'
  - id: sys-info-collect
    desc: Hostname/user/OS collection
    crit: suspicious
    conf: 0.9
    attack: T1082
    if:
      type: raw
      regex: 'hostname.{0,40}id\s+-un|id\s+-un.{0,40}uname|hostname.{0,80}uname'
  - id: zlib-base64-c2-encode
    desc: zlib+base64 pipeline for C2 output
    crit: suspicious
    conf: 0.9
    attack: T1027
    if:
      type: raw
      regex: 'zlib\b.{0,80}base64\b.{0,80}(compress|encode)'
  - id: c2-poll-endpoint
    desc: Short-path HTTP C2 endpoint
    crit: suspicious
    conf: 0.82
    attack: T1071.001
    if:
      type: raw
      regex: 'https?://[^\s"]{4,80}/[a-z]{1,3}/[a-z]{1,3}\b'
composite_rules:
  # curl -k composite (kv for standard, raw as fallback)
  - id: action-run-curl-tls-skip
    desc: curl TLS skip in Actions run block
    crit: suspicious
    conf: 0.85
    any:
      - id: run-block-curl-tls-skip
      - id: curl-tls-skip
  # C2 polling loop: curl fetch + eval + sleep jitter
  - id: shell-c2-poll-exec
    desc: Shell C2 poll-and-execute loop
    crit: hostile
    conf: 0.95
    attack: T1071.001
    all:
      - id: eval-shell-var
      - id: c2-jitter-sleep
    any:
      - id: action-run-curl-tls-skip
      - id: run-block-eval-var
      - id: c2-poll-endpoint
  # Full GHA C2 implant
  - id: gha-c2-implant
    desc: GitHub Actions C2 implant
    crit: hostile
    conf: 0.97
    attack: T1071.001
    mbc: "B0001"
    all:
      - id: shell-c2-poll-exec
    any:
      - id: composite-action-type
      - id: sys-info-collect
      - id: gha-debug-disguise
      - id: zlib-base64-c2-encode
      - id: objectives/command-and-control/infrastructure/domain/tunnel::nip-io-ip-tunnel
