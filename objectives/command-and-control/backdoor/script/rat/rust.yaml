defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1105
  mbc: B0030
traits:
  - id: rust-agent-hello-schema
    desc: Rust agent hello schema
    crit: component
    conf: 0.9
    if:
      type: text
      substr: AgentHello
  - id: rust-task-result-schema
    desc: Rust task result schema
    crit: component
    conf: 0.9
    if:
      type: text
      substr: TaskResult
  - id: rust-read-file-chunk-task
    desc: Rust read file chunk task
    crit: component
    conf: 0.95
    if:
      type: text
      substr: read_file_chunk
  - id: rust-write-file-task
    desc: Rust write file task
    crit: component
    conf: 0.95
    if:
      type: text
      substr: write_file
  - id: rust-delete-dir-task
    desc: Rust delete directory task
    crit: component
    conf: 0.95
    if:
      type: text
      substr: delete_dir
  - id: rust-scan-files-task
    desc: Rust scan files task
    crit: component
    conf: 0.95
    if:
      type: text
      substr: scan_files
composite_rules:
  - id: rust-filesystem-websocket-backdoor
    desc: Rust filesystem tasking backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: rust-agent-hello-schema
      - id: rust-task-result-schema
      - id: rust-read-file-chunk-task
      - id: rust-write-file-task
      - id: rust-delete-dir-task
      - id: rust-scan-files-task
