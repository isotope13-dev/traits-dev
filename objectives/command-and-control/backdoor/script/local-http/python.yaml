defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1059.006

traits:
- id: local-http-backdoor-endpoints--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    regex: self\.path\s*==\s*['"]/(probe|stream)['"]

- id: local-http-backdoor-endpoints--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    regex: self\.path\s*==\s*['"]/(buffer|flush)['"]

- id: local-http-backdoor-endpoints--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    regex: self\.path\s*==\s*['"]/(commit|capture)['"]

- id: local-http-backdoor-endpoints--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    regex: self\.path\s*==\s*['"]/(gc)['"]

- id: threaded-python-http-server
  desc: Threaded Python HTTP server
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: socketserver\.ThreadingMixIn|ThreadedTCPServer|serve_forever\s*\(

- id: localhost-control-port--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.78
  if:
    type: text
    regex: (localhost|127\.0\.0\.1).{0,80}(8000|8001|8002)

- id: localhost-control-port--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.78
  if:
    type: text
    regex: (8000|8001|8002).{0,80}(localhost|127\.0\.0\.1)

- id: windows-shell-command-dispatch--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: \b(cmd\.exe|powershell(\.exe)?)\b[\s\S]{0,50}(subprocess\.(Popen|run)|os\.popen)

- id: windows-shell-command-dispatch--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: \b(cmd\.exe|powershell(\.exe)?)\b[\s\S]{0,50}(subprocess\.(check_output)|os\.popen)

- id: windows-shell-command-dispatch--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  platforms: [windows]
  if:
    type: text
    regex: \b(cmd\.exe|powershell(\.exe)?)\b[\s\S]{0,50}(os\.system)

- id: capture-endpoint-screenshot
  desc: Capture endpoint screenshot action
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: /capture[\s\S]{0,500}(screenshot|ImageGrab|mss|grab\(\))

composite_rules:
- id: python-local-http-command-backdoor
  desc: Python local HTTP command backdoor
  crit: hostile
  conf: 0.97
  all:
  - id: local-http-backdoor-endpoints
  - id: threaded-python-http-server
  any:
  - id: windows-shell-command-dispatch
  - id: micro-behaviors/process/create/subprocess::process-execution
  - id: capture-endpoint-screenshot
  - id: localhost-control-port
  needs: 2
- id: local-http-backdoor-endpoints
  desc: Local HTTP backdoor endpoints
  crit: component
  conf: 0.9
  any:
  - id: local-http-backdoor-endpoints--rx-1
  - id: local-http-backdoor-endpoints--rx-2
  - id: local-http-backdoor-endpoints--rx-3
  - id: local-http-backdoor-endpoints--rx-4
  needs: 1
- id: localhost-control-port
  desc: Localhost control port reference
  crit: component
  conf: 0.78
  any:
  - id: localhost-control-port--rx-5
  - id: localhost-control-port--rx-6
  needs: 1
- id: windows-shell-command-dispatch
  desc: Windows shell command dispatch
  crit: suspicious
  conf: 0.9
  platforms: [windows]
  any:
  - id: windows-shell-command-dispatch--rx-7
  - id: windows-shell-command-dispatch--rx-8
  - id: windows-shell-command-dispatch--rx-9
  needs: 1
