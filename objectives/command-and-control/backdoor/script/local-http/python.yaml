defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1059.006

traits:
  - id: local-http-backdoor-endpoints
    desc: Local HTTP backdoor endpoints
    crit: component
    conf: 0.9
    count_min: 4
    if:
      type: text
      regex: self\.path\s*==\s*['"]/(probe|stream|buffer|flush|commit|capture|gc)['"]

  - id: threaded-python-http-server
    desc: Threaded Python HTTP server
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: socketserver\.ThreadingMixIn|ThreadedTCPServer|serve_forever\s*\(

  - id: localhost-control-port
    desc: Localhost control port reference
    crit: component
    conf: 0.78
    if:
      type: text
      regex: (localhost|127\.0\.0\.1).{0,80}(8000|8001|8002)|(8000|8001|8002).{0,80}(localhost|127\.0\.0\.1)

  - id: windows-shell-command-dispatch
    desc: Windows shell command dispatch
    crit: suspicious
    conf: 0.9
    platforms: [windows]
    if:
      type: text
      regex: \b(cmd\.exe|powershell(\.exe)?)\b[\s\S]{0,220}(subprocess\.(Popen|run|check_output)|os\.popen|os\.system)

  - id: capture-endpoint-screenshot
    desc: Capture endpoint screenshot action
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: /capture[\s\S]{0,500}(screenshot|ImageGrab|mss|grab\(\))

composite_rules:
  - id: python-local-http-command-backdoor
    desc: Python local HTTP command backdoor
    crit: hostile
    conf: 0.97
    all:
      - id: local-http-backdoor-endpoints
      - id: threaded-python-http-server
    any:
      - id: windows-shell-command-dispatch
      - id: micro-behaviors/process/create/subprocess::process-execution
      - id: capture-endpoint-screenshot
      - id: localhost-control-port
    needs: 2
