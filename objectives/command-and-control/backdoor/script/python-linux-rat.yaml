# Python Linux C2 Agent — /proc Recon, Hidden Tmp Drop, base64-JSON Beacon
# Detects the Linux Python RAT pattern: /proc filesystem process enumeration with
# /etc/passwd UID resolution, arbitrary payload drop to hidden /tmp path with chmod,
# and a base64-encoded JSON polling beacon over HTTP with 60-second sleep interval.
# Covers: C2-pushed Python code execution, fixed /tmp/ld.py staging path,
# initial home directory tree recon, and 60-second beacon poll.
# ATT&CK: T1059.006 (Python), T1057 (Process Discovery), T1071.001 (HTTP)
defaults:
  platforms:
    - linux
    - unix
  for:
    - python
  attack: T1059.006
traits:
  - id: proc-fs-walk-cmdline
    desc: /proc filesystem walk reading cmdline and stat
    crit: notable
    conf: 0.85
    attack: T1057
    if:
      type: text
      regex: /proc.{0,30}cmdline
  - id: etc-passwd-uid-resolution
    desc: /etc/passwd UID-to-username resolution
    crit: notable
    conf: 0.8
    attack: T1033
    if:
      type: text
      substr: /etc/passwd
    not:
      - substr: file:///etc/passwd
  - id: tmp-hidden-chmod-777
    desc: Drop to hidden /tmp path, chmod 0777
    crit: suspicious
    conf: 0.9
    attack: T1222.002
    if:
      type: text
      substr: "0o777"
  - id: http-base64-json-post
    desc: base64 JSON body for HTTP POST beacon
    crit: suspicious
    conf: 0.9
    attack: T1071.001
    if:
      type: text
      regex: base64\.b64encode.{0,120}json\.dumps|json\.dumps.{0,120}base64\.b64encode
  - id: sixty-second-python-sleep
    desc: 60-second C2 polling interval
    crit: notable
    conf: 0.7
    attack: T1071.001
    if:
      type: text
      substr: "time.sleep(60)"
  - id: python3-inline-code-exec
    desc: subprocess python3 -c code execution
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: subprocess\.run\s*\(\s*\["python3",\s*"-c"
  - id: init-dir-home-config-recon
    desc: Home .config Documents Desktop dir recon
    crit: notable
    conf: 0.78
    attack: T1083
    if:
      type: text
      regex: (home_dir|Path\.home\(\)).{0,200}(Documents|Desktop|\.config)
composite_rules:
  - id: python-linux-c2-agent
    desc: Python /proc-recon Linux C2 agent
    crit: hostile
    conf: 0.97
    all:
      - id: proc-fs-walk-cmdline
      - id: tmp-hidden-chmod-777
      - id: http-base64-json-post
    any:
      - id: etc-passwd-uid-resolution
      - id: objectives/evasion/masquerade/identity::user-agent-msie8
      - id: well-known/malware/supply-chain/axios-hijack::rsp-peinject-protocol
    needs: 1
  - id: python-c2-full-stack
    desc: Python C2 agent with recon and exec
    crit: hostile
    conf: 0.97
    all:
      - id: python-linux-c2-agent
      - id: sixty-second-python-sleep
    any:
      - id: python3-inline-code-exec
      - id: init-dir-home-config-recon
    needs: 1
