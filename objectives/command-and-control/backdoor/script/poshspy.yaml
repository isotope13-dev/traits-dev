defaults:
  for: [powershell]
  platforms: [windows]
  attack: T1071.001
traits:
  - id: auth-cookie-hash-chain
    desc: Cookie auth SHA1 hash chain
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: getSha1Hash ((getSha1Hash $clnPass) + $aToken)
  - id: query-camouflage-params
    desc: Query camouflage parameter wordlist
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      substr: "@('id', 's', 'session', 'user', 'uid', 'ssid', 'data', 'search', 'str', 'query', 'filter')"
composite_rules:
  - id: cookie-backed-powershell-backdoor
    desc: Cookie-backed PowerShell backdoor transport
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/client::cookie-auth-http-client
      - id: micro-behaviors/process/create/hidden::hidden-powershell-execution
      - id: micro-behaviors/crypto/library::hybrid-crypto-payload-wrapper
      - id: auth-cookie-hash-chain
    any:
      - id: query-camouflage-params
      - id: micro-behaviors/fs/write/file::dropped-executable-with-timestomp
    needs: 1
