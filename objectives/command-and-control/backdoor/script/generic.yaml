defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: listen-socket
    desc: Socket listening capability
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: SocketListen
    unless:
      - type: text
        substr: network.mojom.
  - id: socket-data-transfer-dup
    desc: Socket data transfer capability
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: SocketReadAll
  - id: command-execution
    desc: Command execution capability
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: shellsoc
  - id: script-exec
    desc: Script execution capability
    crit: notable
    conf: 0.65
    if:
      type: text
      substr: ScriptExecute
  - id: server-component
    desc: RAT server component
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: Trojan[_\s]Server|Server[_\s]1\\.1
composite_rules:
  - id: rat-generic
    desc: Remote Access Trojan behavior
    crit: suspicious
    conf: 0.8
    attack: T1219
    mbc: B0022
    all:
      - id: listen-socket
    any:
      - id: command-execution
      - id: script-exec
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - type: text
          substr: network.mojom.
  - id: rat-server
    desc: Remote Access Trojan server component
    crit: suspicious
    conf: 0.85
    attack: T1219
    mbc: B0022
    all:
      - id: listen-socket
      - id: server-component
    any:
      - id: command-execution
      - id: script-exec
