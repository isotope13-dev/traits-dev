# SSL PTY Backdoor
# Detects interactive PTY shells over SSL
# MBC: B0022 (Backdoor)
# ATT&CK: T1059
defaults:
  platforms: [linux, unix, android, macos, ios]
  mbc: "B0022"
  attack: "T1059"
composite_rules:
  # SSL PTY Backdoor
  # Complexity: all(3) = 3 >= 2 SUSPICIOUS
  - id: ssl-pty-backdoor
    desc: Interactive PTY shell over SSL connection
    crit: suspicious
    conf: 0.9
    for: [elf, macho]
    all:
      - id: micro-behaviors/process/tty/pty::interactive-shell
      - id: micro-behaviors/process/create/shell
    any:
      - id: objectives/collection/network/ssl-intercept::ssl-openssl-fn-a
      - id: objectives/collection/network/ssl-intercept::ssl-openssl-fn-b
      - id: well-known/malware/backdoor/fdm::elf-ssl
    none:
      - id: micro-behaviors/dylib/library::network-lib-marker
      - id: micro-behaviors/dylib/library::system-lib-marker
