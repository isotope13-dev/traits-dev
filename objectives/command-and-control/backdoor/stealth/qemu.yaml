defaults:
  platforms: [windows, linux]
  for: [pe, shell, batch, powershell]
  attack: T1090
traits:
  - id: qemu-system-binary
    desc: QEMU system emulator binary reference
    crit: component
    if:
      type: text
      regex: (?i)\bqemu-system-(x86_64|i386|arm|aarch64)(\.exe)?\b
  - id: qemu-nographic-flag
    desc: QEMU -nographic flag
    crit: component
    if:
      type: text
      regex: (?i)-nographic\b
  - id: qemu-monitor-none-flag
    desc: QEMU -monitor none flag
    crit: component
    if:
      type: text
      regex: (?i)-monitor\s+none\b
  - id: qemu-malicious-port-fwd
    desc: QEMU port forwarding to internal SSH/RDP
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)hostfwd=tcp::\d+-:(22|3389)\b
  - id: qemu-misleading-disk-ext
    desc: QEMU loading disk image with misleading extension
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (?i)-drive\s+.*?file=.*?\.(db|dll|txt|log)\b
composite_rules:
  - id: qemu-headless-args
    desc: QEMU headless execution arguments
    crit: notable
    all:
      - id: qemu-nographic-flag
      - id: qemu-monitor-none-flag
  - id: qemu-hidden-vm-backdoor
    desc: QEMU used as a hidden virtualized backdoor
    crit: hostile
    conf: 0.95
    all:
      - id: qemu-system-binary
      - id: qemu-headless-args
    any:
      - id: qemu-malicious-port-fwd
      - id: qemu-misleading-disk-ext
