defaults:
  platforms: [windows, unix]
  for: [python]
  crit: suspicious
  conf: 0.95
  attack: T1546

traits:
  - id: comfyui-custom-node-backdoor
    desc: ComfyUI custom node backdoor path
    if:
      type: string_literal
      substr: 'custom_nodes/comfyui_perf_monitor'
  - id: comfyui-perf-monitor-init
    desc: ComfyUI performance monitor initialization
    if:
      type: string_literal
      word: 'comfyui_perf_monitor'
  - id: comfyui-reinfection-cycle
    desc: ComfyUI 6-hour re-infection cycle (AST)
    if:
      type: ast
      query: |
        (call
          function: (attribute
            object: (identifier) @obj (#eq? @obj "time")
            attribute: (identifier) @attr (#eq? @attr "sleep"))
          arguments: (argument_list (integer) @val (#eq? @val "21600")))
  - id: comfyui-reboot-manager
    desc: ComfyUI remote reboot management
    if:
      type: string_literal
      substr: '/manager/reboot'
  - id: comfyui-clear-history
    desc: ComfyUI history clearing
    crit: component
    if:
      type: string_literal
      exact: '/history'
  - id: comfyui-api-history
    desc: ComfyUI /api/history endpoint
    crit: component
    if:
      type: string_literal
      substr: '/api/history'
  - id: inotify-guard-watchdog
    desc: inotify_guard watchdog process (ComfyUI)
    if:
      type: string_literal
      regex: 'inotify_guard_([0-9a-f]{8}|\$\{?_hhex\}?)'
  - id: comfyui-rootkit-lib
    desc: ComfyUI rootkit shared library name
    if:
      type: string_literal
      word: 'libpam_cache.so'
  - id: comfyui-c2-ip
    desc: ComfyUI botnet C2 IP address
    crit: suspicious
    conf: 1.0
    if:
      type: string_literal
      substr: '77.110.96.200'

  - id: comfyui-torch-masquerade
    desc: ComfyUI backdoor masquerading as image tensor
    if:
      type: text
      substr: 'dummy_img = torch.zeros'

composite_rules:
  - id: comfyui-hostile-torch-backdoor
    desc: ComfyUI hostile torch node backdoor
    crit: hostile
    conf: 0.95
    all:
      - id: comfyui-torch-masquerade
      - id: objectives/command-and-control/dropper/compat::cross-platform-git-bash-exe
  - id: comfyui-hostile-manager
    desc: ComfyUI remote management (reboot + history clear)
    crit: hostile
    conf: 0.95
    all:
      - id: comfyui-reboot-manager
    any:
      - id: comfyui-clear-history
      - id: comfyui-api-history
  - id: comfyui-botnet
    desc: Known ComfyUI botnet indicator
    crit: hostile
    conf: 0.98
    any:
      - id: comfyui-c2-ip
      - id: comfyui-custom-node-backdoor
      - id: comfyui-reinfection-cycle
      - id: comfyui-reboot-manager
      - id: comfyui-hostile-manager
      - id: micro-behaviors/communications/proxy::hy2-uri
