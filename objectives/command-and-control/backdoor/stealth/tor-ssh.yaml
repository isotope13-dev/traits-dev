defaults:
  platforms: [windows, unix]
  for: [powershell, shell, batch, pe, elf]
  attack: T1021.004
traits:
  - id: sshd-appdata-authorized-keys
    desc: SSH authorized keys in AppData
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: (?i)AuthorizedKeysFile\s+.{0,120}(AppData|%AppData%)[\\\/].{0,160}
  - id: sshd-appdata-sftp-subsystem
    desc: SSH SFTP subsystem in AppData
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)Subsystem\s+sftp\s+.{0,120}(AppData|%AppData%)[\\\/].{0,160}\.exe\b
composite_rules:
  - id: loopback-ssh-publickey-backdoor
    desc: Loopback SSH public-key backdoor
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/ssh/server::sshd-listen-loopback
      - id: micro-behaviors/communications/ssh/server::sshd-publickey-only
    any:
      - id: sshd-appdata-authorized-keys
      - id: sshd-appdata-sftp-subsystem
  - id: tor-ssh-hidden-service-backdoor
    desc: Tor SSH hidden service backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/channel/tor/hidden-service::tor-hidden-service-backdoor-channel
      - id: loopback-ssh-publickey-backdoor
