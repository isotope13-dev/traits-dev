defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
traits:
  - id: asm-resolve-relocs-label
    conf: 0.93
    crit: suspicious
    desc: Relocation resolver routine in ASM
    if:
      type: text
      word: ResolveRelocs
  - id: asm-resolve-imports-label
    conf: 0.93
    crit: suspicious
    desc: Import resolver routine in ASM
    if:
      type: text
      word: ResolveImports
  - id: asm-pe-loader-label
    conf: 0.92
    crit: notable
    desc: PE loader function label in ASM
    if:
      type: text
      word: PeLoader
  - id: asm-map-sections-label
    conf: 0.9
    crit: notable
    desc: Section mapping label in ASM
    if:
      type: text
      word: MapAllSections
composite_rules:
  - id: asm-manual-pe-loader
    conf: 0.96
    crit: suspicious
    desc: Manual PE loader in assembly source
    attack: T1620
    needs: 2
    any:
      - id: asm-resolve-relocs-label
      - id: asm-resolve-imports-label
      - id: asm-pe-loader-label
      - id: asm-map-sections-label
