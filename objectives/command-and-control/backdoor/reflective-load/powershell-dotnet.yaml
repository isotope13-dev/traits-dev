defaults:
  mbc: E1059
  attack: T1059.001
  for:
    - pe
    - dll
    - csharp
  platforms:
    - windows
traits:
  - id: sma-namespace
    desc: System.Management.Automation import
    crit: component
    conf: 0.85
    if:
      type: text
      substr: System.Management.Automation
  - id: sma-host
    desc: System.Management.Automation.Host import
    crit: component
    conf: 0.85
    if:
      type: text
      substr: System.Management.Automation.Host
  - id: sma-runspaces
    desc: Runspaces namespace import
    crit: component
    conf: 0.85
    if:
      type: text
      substr: System.Management.Automation.Runspaces
  - id: runspace-factory
    desc: RunspaceFactory class
    crit: component
    conf: 0.85
    if:
      type: text
      substr: RunspaceFactory
  - id: create-runspace
    desc: CreateRunspace method
    crit: component
    conf: 0.85
    if:
      type: text
      substr: CreateRunspace
  - id: powershell-create
    desc: PowerShell.Create method
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: PowerShell\.Create|System\.Management\.Automation\.PowerShell
  - id: add-script
    desc: AddScript method
    crit: component
    conf: 0.8
    if:
      type: text
      substr: AddScript
  - id: add-command
    desc: AddCommand method (PowerShell execution)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\.AddCommand\('
  - id: add-parameter
    desc: AddParameter method (PowerShell execution)
    crit: component
    conf: 0.8
    if:
      type: text
      substr: AddParameter
    not:
      - substr: AddParameterBlock
  - id: add-argument
    desc: AddArgument method (PowerShell execution)
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: AddArgument
    unless:
      - type: string_value
        substr: "Ilrun::"
      - type: string_value
        substr: "SignatureHelper::"
      - type: string_value
        substr: "AddArguments"
  - id: invoke-method
    desc: Invoke method (execute pipeline)
    crit: component
    conf: 0.6
    if:
      type: text
      regex: \.Invoke\(
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft::microsoft-corp-marker-rsrc
        - type: metrics
          field: binary.function_count
          min: 1000
  - id: embedded-ps1
    desc: Embedded .ps1 script reference
    crit: component
    conf: 0.8
    if:
      type: text
      regex: \w+\.ps1
composite_rules:
  - id: dotnet-powershell-host
    desc: .NET PowerShell execution host
    crit: notable
    conf: 0.9
    all:
      - id: sma-namespace
    any:
      - id: powershell-create
      - id: invoke-method
    needs: 1
  - id: dotnet-powershell-exec
    desc: .NET PowerShell script executor
    crit: suspicious
    conf: 0.9
    all:
      - id: dotnet-powershell-host
    any:
      - id: add-script
      - id: add-command
      - id: add-parameter
      - id: add-argument
      - id: create-runspace
      - id: sma-host
      - id: sma-runspaces
      - id: embedded-ps1
    needs: 2
