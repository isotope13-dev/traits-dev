defaults:
  platforms: [windows]
composite_rules:
  - id: suspicious-rust-loader
    desc: "Rust binary with manual API resolution and anti-debug"
    crit: suspicious
    conf: 0.9
    for: [pe, dll]
    all:
      # Context: It is Rust
      - id: metadata/lang::rustc-compiler
      # Anomaly: Low imports (hiding capabilities)
      - id: metadata/binary/metrics::no-imports
    any:
      # Malicious Indicators
      - id: micro-behaviors/os/exception/error-handling::unhandled-exception-filter
      - id: objectives/command-and-control/backdoor/reflective-load::custom-pe-loader
