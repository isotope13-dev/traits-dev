defaults:
  platforms:
    - windows
  for:
    - pe
    - dll
traits:
  - id: custom-pe-loader
    desc: Manual PE header verification and parsing
    crit: suspicious
    conf: 0.9
    mbc: B0005
    if:
      type: hex
      section: .text
      pattern: 66 81 ?? 4d 5a 75 ?? ?? ?? ?? 3c ?? ?? ?? ?? ?? 50 45 00 00
    unless:
      - type: string_value
        substr: PyInit_
      - type: string_value
        substr: 'Mingw-w64 runtime failure:'
  - id: loader-api-surface
    desc: Native loader API surface pattern
    crit: suspicious
    conf: 0.86
    mbc: B0005
    attack: T1620
    if:
      type: import_combination
      required:
        - VirtualAlloc
        - LoadLibraryA
        - GetProcAddress
      suspicious:
        - VirtualProtect
        - FreeLibrary
        - fopen
        - fread
      min_suspicious: 2
      max_total: 60
    unless:
      - type: metrics
        field: binary.import_count
        min: 80
      - id: metadata/binary/symbols::standard-com-server-exports
      - id: well-known/tools/reverse-engineering::human-oep-finder
      - id: well-known/tools/reverse-engineering::debug-event-loop
      - id: well-known/tools/reverse-engineering::nanomite-patcher
composite_rules:
  - id: native-loader-obfuscated
    desc: Native reflective loader with packer profile
    crit: suspicious
    conf: 0.9
    all:
      - id: loader-api-surface
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
  - id: resource-backed-native-loader
    desc: Resource-backed native memory loader chain
    crit: suspicious
    conf: 0.92
    mbc: B0005
    attack: T1620
    all:
      - id: loader-api-surface
      - id: micro-behaviors/data/embedded/payload::pe-resource-load-lock-chain
    any:
      - id: objectives/anti-analysis/timing/evasion::timing-delta-check
      - id: objectives/anti-analysis/environment-detect/runtime::environment-adaptive-behavior
      - id: micro-behaviors/time/timing/delay::sleep-dup
    downgrade:
      any:
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
  - id: hardcoded-endpoint-memory-loader
    desc: Hardcoded endpoint memory loader
    crit: hostile
    conf: 0.93
    mbc: B0005
    attack: T1105
    all:
      - id: objectives/command-and-control/infrastructure/ip-port::serialized-single-ipv4-endpoint
      - id: objectives/anti-analysis/environment-detect/checks::command-line-gated-loader-activation
      - id: micro-behaviors/mem/protect/modify::virtual-alloc
    any:
      - id: objectives/anti-static/obfuscation/payload/section::oversized-data-section
      - id: metadata/binary/metrics::single-complex-function
      - id: objectives/anti-static/obfuscation/binary-metrics::import-count-under-40
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/package/versioning::pe-version-resource
