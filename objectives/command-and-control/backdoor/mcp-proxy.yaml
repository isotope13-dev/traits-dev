defaults:
  for: [javascript, typescript]
  platforms: [unix, windows]
  attack: T1557
traits:
  - id: jsonrpc-envelope
    desc: JSON-RPC 2.0 protocol envelope
    crit: component
    conf: 0.7
    if:
      type: text
      regex: jsonrpc.{0,10}2\.0
  - id: readline-stdin-interface
    desc: readline interface on process.stdin
    crit: component
    conf: 0.7
    if:
      type: text
      regex: readline\.createInterface\(
  - id: stdin-line-handler
    desc: Handles stdin lines via event
    crit: component
    conf: 0.6
    if:
      type: text
      regex: \.on\(\s*["']line["']
composite_rules:
  - id: stdin-http-relay
    desc: Stdin-to-HTTP relay proxy
    crit: suspicious
    conf: 0.9
    all:
      - id: jsonrpc-envelope
      - id: objectives/supply-chain/impersonation::process-stdin-read
    any:
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: objectives/supply-chain/impersonation::fetch-post-call
      - id: objectives/supply-chain/impersonation::http-request-post
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
  - id: mcp-mitm-proxy
    desc: MCP man-in-the-middle proxy
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/ipc::mcp-call-tool-response
      - id: readline-stdin-interface
    any:
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: objectives/supply-chain/impersonation::fetch-post-call
      - id: objectives/supply-chain/impersonation::http-request-post
  - id: mcp-tunnel-exfil
    desc: MCP proxy via tunnel service
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/ipc::mcp-call-tool-response
      - id: stdin-line-handler
    any:
      - id: objectives/command-and-control/infrastructure/domain::ngrok-tunnel
      - id: objectives/command-and-control/infrastructure/domain::ngrok-free-app-endpoint
      - id: objectives/command-and-control/infrastructure/domain::ngrok-io-endpoint
