defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
- id: libcurl-basename
  desc: libcurl library filename
  crit: component
  conf: 1.0
  if:
    type: basename
    exact: libcurl.dll
composite_rules:
- id: packed-registry-network-backdoor
  desc: Packed Windows backdoor capability profile
  crit: suspicious
  conf: 0.93
  attack: "T1071"
  all:
  - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
  - id: objectives/anti-static/obfuscation/reflection/class::dynamic-load-pattern
  - id: micro-behaviors/os/registry/access::registry-create-key-api
  - id: objectives/anti-static/obfuscation/payload/section::custom-packed-pe-layout
  any:
  - id: micro-behaviors/os/privilege/manifest::admin-manifest
  - id: micro-behaviors/process/control/affinity::affinity-mask-control
  - id: micro-behaviors/ui/window/station::window-station-query-chain
  unless:
  - id: libcurl-basename
- id: upx-packed-network-shell-trojan
  desc: UPX packed PE with networking and shell execution
  crit: suspicious
  conf: 0.92
  attack: "T1071"
  all:
  - id: metadata/binary/section/names::upx-section
  - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
  - id: micro-behaviors/process/create/exec::shell-execute-a
  any:
  - id: micro-behaviors/dylib/load::load-library-a
  - id: micro-behaviors/os/network/interface::get-if-table
  - id: micro-behaviors/os/registry/manipulate::sh-delete-key-a
- id: upx-admin-network-fingerprint-loader
  desc: UPX admin network fingerprinting loader
  crit: suspicious
  conf: 0.93
  attack: "T1071"
  size_max: 614400
  all:
  - id: metadata/binary/section/names::upx-section-pair
  - id: micro-behaviors/os/privilege/manifest::admin-manifest
  - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
  - id: micro-behaviors/os/network/interface::get-adapters-info
  - id: micro-behaviors/os/module/load::get-proc-address-import
- id: upx-admin-dynamic-network-loader
  desc: UPX admin dynamic network loader
  crit: hostile
  conf: 0.96
  attack: "T1071"
  size_max: 614400
  all:
  - id: upx-admin-network-fingerprint-loader
  - id: metadata/binary/section/metrics::pe-nonstandard-entry
  - id: metadata/binary/metrics::no-functions
  any:
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/mem/protect/modify::virtual-free
  needs: 2
  unless:
  - id: metadata/signed/platform::microsoft
- id: upx-private-http-shell-self-delete
  desc: UPX private HTTP self-deleting backdoor
  crit: hostile
  conf: 0.97
  attack: "T1071.001"
  all:
  - id: metadata/binary/section/names::upx-section-pair
  - id: micro-behaviors/communications/ip::repeated-private-192-http-url
  - id: micro-behaviors/process/create/exec::cmd-exe-slash-c
  - id: micro-behaviors/process/create/exec::winexec
  - id: objectives/evasion/self-delete/file::ping-self-delete
  any:
  - id: objectives/anti-analysis/sandbox-detect/environment::sandbox-user-profile
  - id: micro-behaviors/process/create/shell::rundll32-exec
  - id: micro-behaviors/data/embedded/payload::pe-resource-load-lock-chain
  unless:
  - id: metadata/signed/developer/
- id: signed-nsis-packed-loader
  desc: Signed NSIS-masqueraded packed loader with service probing
  crit: hostile
  conf: 0.98
  attack: "T1027"
  size_min: 524288
  all:
  - id: metadata/binary/section/metrics::synthetic-packed-entry-layout
  - id: metadata/binary/installer/script::nsis-manifest-exehead
  - id: micro-behaviors/process/control/affinity::affinity-mask-control
  - id: micro-behaviors/os/service/control::open-sc-manager
  - id: micro-behaviors/os/service/control::open-service
  - id: micro-behaviors/os/service/control::query-service-config
  any:
  - id: micro-behaviors/process/create/exec::shell-execute
  - id: micro-behaviors/process/enumerate/psapi::get-module-basename-w
