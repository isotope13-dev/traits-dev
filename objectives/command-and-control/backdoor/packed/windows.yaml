defaults:
  for: [pe, dll]
  platforms: [windows]
traits:
  - id: libcurl-basename
    desc: libcurl library filename
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: libcurl.dll
composite_rules:
  - id: packed-registry-network-backdoor
    desc: Packed Windows backdoor capability profile
    crit: suspicious
    conf: 0.93
    attack: "T1071"
    all:
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
      - id: objectives/execution/reflection/class::dynamic-load-pattern
      - id: micro-behaviors/os/registry/access::registry-create-key-api
      - id: objectives/anti-static/obfuscation/payload/section::custom-packed-pe-layout
    any:
      - id: micro-behaviors/os/privilege/manifest::admin-manifest
      - id: micro-behaviors/process/control/affinity::affinity-mask-control
      - id: micro-behaviors/ui/window/station::window-station-query-chain
    none:
      - id: libcurl-basename
