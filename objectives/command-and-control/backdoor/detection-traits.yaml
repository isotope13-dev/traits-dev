defaults:
  platforms: [windows, unix]
  for: [pe, elf, shell, python, javascript]
  attack: T1543
traits:
  - id: backdoor-ref
    desc: Backdoor keyword reference
    crit: notable
    conf: 0.5
    count_min: 3
    if:
      type: text
      regex: \b[bB]ackdoor\b
    unless:
      - id: metadata/package::virtualbox-platform-component
      - id: metadata/signed/developer::vmware
    not:
      - regex: (?i)\b(backdoor\s+pe\s+compress\s+protector|oep\s+finder|unpacker|packer|script)\b
      - regex: (?i)\b(apic|vmmdev(?:\s+timesync)?)\s+backdoor(?:\s+(?:activated|closed|logging))?\b
  - id: vcpu-backdoor
    desc: VCPU backdoor (VMware legitimate)
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: VCPUInfoBackdoor
  - id: guest-backdoor-ops
    desc: Guest backdoor ops (VMware legitimate)
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: gGuestBackdoorOps
  - id: backdoor-comment
    desc: Backdoor comment (documentation)
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: '# backdoor:'
  - id: backdoor-upgrade-check
    desc: Backdoor upgrade check (benign context)
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: \bbackdoor upgrade check\b
      case_insensitive: true
  - id: backdoor-shell-ref
    desc: Backdoor shell keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \b[bB]ackdoor[_.\s-]?[sS]hell\b
  - id: backdoor-leet
    desc: Backdoor leet speak (backd00r)
    crit: notable
    conf: 0.5
    count_min: 2
    if:
      type: text
      regex: \b[bB][a4]ckd00r\b
  - id: hidden-backdoor
    desc: Hidden backdoor keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bhidden[_ ]backdoor\b
      case_insensitive: true
  - id: hide-backdoor
    desc: Hide backdoor keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bhide[_ ]backdoor\b
      case_insensitive: true
  - id: icmp-backdoor
    desc: ICMP backdoor keyword
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bicmp[_ ]backdoor\b
      case_insensitive: true
  - id: pam-backdoor
    desc: PAM backdoor keyword
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bpam[_ ]backdoor\b
      case_insensitive: true
  - id: ssh-backdoor
    desc: SSH backdoor keyword
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bssh[_ ]backdoor\b
      case_insensitive: true
  - id: sshd-backdoor
    desc: SSHD backdoor keyword
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bsshd[_ ]backdoor\b
      case_insensitive: true
  - id: backdoor-task
    desc: Backdoor task keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bbackdoor[_ ]task\b
      case_insensitive: true
  - id: backdoor-process
    desc: Backdoor process keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bbackdoor[_ ]process\b
      case_insensitive: true
  - id: backdoor-shell-ctx
    desc: Backdoor shell context keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bbackdoor[_ ]shell\b
      case_insensitive: true
  - id: backdoor-login
    desc: Backdoor login keyword
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bbackdoor[_ ]login\b
      case_insensitive: true
  - id: backdoor-pass
    desc: Backdoor password keyword
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bbackdoor[_ ]pass\b
      case_insensitive: true
composite_rules:
  - id: backdoor-comp
    desc: References a backdoor
    crit: notable
    conf: 0.66
    all:
      - id: backdoor-ref
    unless:
      - type: trait
        id: metadata/package::virtualbox-platform-component
      - type: trait
        id: metadata/signed/developer::vmware
      - type: trait
        id: vcpu-backdoor
      - type: trait
        id: guest-backdoor-ops
      - type: trait
        id: backdoor-comment
      - type: trait
        id: backdoor-upgrade-check
  - id: backdoor-shell
    desc: References a backdoor shell
    crit: suspicious
    conf: 0.66
    any:
      - id: backdoor-shell-ref
      - id: backdoor-leet
  - id: backdoor-hidden
    desc: Suspicious backdoor reference
    crit: notable
    conf: 0.66
    any:
      - id: hidden-backdoor
      - id: hide-backdoor
      - id: icmp-backdoor
      - id: pam-backdoor
      - id: ssh-backdoor
      - id: sshd-backdoor
      - id: backdoor-task
      - id: backdoor-process
      - id: backdoor-shell-ctx
      - id: backdoor-login
      - id: backdoor-pass
