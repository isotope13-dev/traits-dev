defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, javascript]
  attack: T1059

traits:
  - id: routeros-fetch-command-script
    desc: RouterOS fetches command script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/tool fetch[\s\S]{0,420}(cmd|payload|update|post-install)[A-Za-z0-9_.-]*\.rsc'

  - id: routeros-import-rsc
    desc: RouterOS imports RSC script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/import\s+["''][A-Za-z0-9_.-]+\.rsc["'']'

  - id: routeros-script-add-payload
    desc: RouterOS script from payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/system script add[\s\S]{0,260}source=\$payload'

  - id: routeros-execute-variable
    desc: RouterOS executes variable
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: ':execute\s+\$[A-Za-z0-9_]+'

  - id: routeros-file-contents-exec
    desc: RouterOS file contents exec
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/file get[\s\S]{0,120}contents[\s\S]{0,180}:execute'

  - id: routeros-reverse-shell-path
    desc: RouterOS reverse shell path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/tool fetch[\s\S]{0,320}/reverse-shell'

  - id: routeros-command-path
    desc: RouterOS command path fetch
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/tool fetch[\s\S]{0,320}/(cmd|command)'

composite_rules:
  - id: routeros-fetched-script-exec
    desc: RouterOS fetched script execution
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-fetch-command-script
    any:
      - id: routeros-import-rsc
      - id: routeros-script-add-payload
      - id: routeros-execute-variable
      - id: routeros-file-contents-exec

  - id: routeros-http-command-tasking
    desc: RouterOS HTTP command tasking
    crit: hostile
    conf: 0.98
    any:
      - id: routeros-reverse-shell-path
      - id: routeros-command-path
    all:
      - id: routeros-execute-variable
