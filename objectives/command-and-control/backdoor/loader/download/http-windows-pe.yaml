---
defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
composite_rules:
- id: stack-built-http-memory-loader
  desc: Stack-built HTTP URL and payload executed from memory
  crit: hostile
  conf: 0.99
  attack: T1027,T1105,T1620
  all:
  - id: micro-behaviors/communications/http/url/build::stack-built-https-url-x64
  - id: micro-behaviors/os/module/load::get-proc-address-reference
  - id: micro-behaviors/mem/alloc/executable::virtualalloc-readwrite-commit-resolved-x64
  - id: micro-behaviors/mem/protect/modify::virtualprotect-executable-resolved-x64
  - id: micro-behaviors/process/thread/create::create-thread-buffer-resolved-x64-stack-args
- id: wininet-direct-ip-payload-loader
  desc: WinInet loader downloads direct IP payloads
  crit: hostile
  conf: 0.985
  attack: T1105
  all:
  - id: objectives/command-and-control/backdoor/loader/evasive::wininet-obfuscated-loader
  - id: micro-behaviors/communications/ip/literal::http-ip-url
  - id: micro-behaviors/communications/http/get::url-download-to-file-str
  any:
  - id: objectives/command-and-control/channel/http-beacon::chrome-spoof-user-agent-pe
  - id: micro-behaviors/process/create/spawn::create-process-w
  - id: micro-behaviors/process/create/exec::shell-execute
