defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1027.007,T1620

composite_rules:
- id: custom-resolver-network-loader
  desc: Custom resolver network loader with TLS callback
  crit: hostile
  conf: 0.96
  all:
  - id: objectives/anti-static/obfuscation/imports::pe-loader-manual-export-resolver-x64
  - id: micro-behaviors/communications/socket/init::connect-api
  - id: metadata/binary/layout::pe-tls-callback-table
  - id: metadata/binary/section/metrics::high-entropy-exec-section
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
