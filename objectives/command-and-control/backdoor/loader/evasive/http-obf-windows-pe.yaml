---
defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
  attack: T1071.001
composite_rules:
- id: wininet-obfuscated-loader
  desc: WinInet loader with concealed API resolution and anti-analysis
  crit: suspicious
  conf: 0.94
  all:
  - id: micro-behaviors/communications/http/get::internet-open
  - id: objectives/anti-static/obfuscation/imports::x64-loader-api-concealment-profile
  any:
  - id: objectives/anti-analysis/debugger-detect/check::win-comprehensive
  - id: micro-behaviors/os/exception/error-handling::exception-filter-pair-imports
  - id: micro-behaviors/process/terminate/kill::terminate-process
  needs: 2
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/package/versioning::pe-version-resource
- id: gpu-aware-obfuscated-loader
  desc: Obfuscated loader with WinInet and host fingerprinting
  crit: suspicious
  conf: 0.95
  all:
  - id: wininet-obfuscated-loader
  - id: objectives/anti-static/obfuscation/payload/section::packed-loader-largest-section-dominates
  any:
  - id: micro-behaviors/hardware/display/directx/calls::directx-factory-api
  - id: objectives/anti-analysis/vm-detect/processor-features::is-processor-feature-present
  - id: metadata/binary/layout::low-overall-entropy
  needs: 2
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: winhttp-crypto-admin-trojan
  desc: WinHTTP C2 with crypto, admin elevation, and anti-analysis
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
  - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-aes-cbc
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: metadata/signed/trust-level::unsigned
  any:
  - id: micro-behaviors/crypto/kdf/algorithm::pbkdf2
  - id: objectives/anti-analysis/debugger-detect/check::debugger-check-with-guards
  - id: objectives/evasion/self-delete/file/script::module-path-delete
  - id: micro-behaviors/os/privilege/check::admin-sid-check
  needs: 2
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::is-microsoft-named
