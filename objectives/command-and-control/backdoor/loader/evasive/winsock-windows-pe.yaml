---
defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
  attack: T1071
composite_rules:
- id: pe-winsock-evasive-loader
  desc: Winsock-linked PE with evasive loader profile
  crit: suspicious
  conf: 0.9
  unless:
  - id: metadata/binary/metrics/structural::many-imports
  all:
  - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
  - id: objectives/anti-analysis/debugger-detect/check::debugger-api
  any:
  - id: objectives/anti-analysis/timing/evasion::timing-delta-check
  - id: objectives/anti-static/obfuscation/reflection/class::dynamic-load-pattern
  - id: metadata/binary/metrics/structural::no-functions
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: well-known/app/defender/
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: well-known/tool/reverse-engineering/windows-debugger/
    - id: metadata/signed/certificate/identity::bitdefender-brand-text
    - id: metadata/binary/resource/
- id: dual-role-winsock-tls-implant
  desc: Dual-role Winsock implant with TLS callbacks
  crit: suspicious
  conf: 0.93
  all:
  - id: micro-behaviors/communications/socket/init::winsock-dual-role-lifecycle
  - id: objectives/anti-analysis/debugger-detect/tls::pe-tls-multi-callbacks
  any:
  - id: micro-behaviors/communications/ip/resolve::resolve-getaddrinfo-import
  - id: micro-behaviors/process/thread/create::create-thread
  - id: micro-behaviors/communications/socket/init::select-api
  needs: 2
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/signed/platform/
    - id: metadata/binary/vendor::is-microsoft-named
    - id: well-known/tool/dual-use/aria2::aria2c-basename
- id: unsigned-mingw-dual-role-winsock-implant
  desc: Unsigned MinGW Winsock implant with multi TLS callbacks
  crit: hostile
  conf: 0.95
  all:
  - id: metadata/lang/compiler/native::mingw-built-pe
  - id: metadata/signed/trust-level::unsigned
  - id: micro-behaviors/communications/socket/init::winsock-dual-role-lifecycle
  - id: objectives/anti-analysis/debugger-detect/tls::pe-tls-multi-callbacks
  any:
  - id: micro-behaviors/communications/ip/resolve::resolve-getaddrinfo-import
  - id: micro-behaviors/process/thread/create::create-thread
  - id: micro-behaviors/communications/socket/init::select-api
  needs: 2
  unless:
  - id: metadata/package/versioning::pe-version-resource
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
- id: signed-mingw-winsock-process-stager
  desc: Signed MinGW Winsock process stager with inline PE checks
  crit: hostile
  conf: 0.94
  attack: T1105
  size_max: 131072
  all:
  - id: metadata/lang/compiler/native::mingw-runtime-marker
  - id: micro-behaviors/communications/socket/init::winsock-client-lifecycle
  - id: micro-behaviors/process/create/shell/spawn::win-createprocess
  - id: micro-behaviors/fs/file/pe-inspect::inline-pe-signature-check
  - id: objectives/anti-analysis/debugger-detect/tls::pe-tls-multi-callbacks
  any:
  - id: micro-behaviors/communications/ip/resolve::resolve-getaddrinfo-import
  - id: micro-behaviors/process/thread/create::create-thread
  - id: metadata/binary/resource::pe-version-and-manifest-only
  needs: 2
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/vendor/
- id: signed-mingw-inline-pe-network-loader
  desc: Signed MinGW inline-PE network loader
  crit: hostile
  conf: 0.93
  attack: T1105
  size_max: 131072
  all:
  - id: signed-mingw-winsock-process-stager
  - id: micro-behaviors/communications/socket/init::winsock-client-lifecycle
  - id: micro-behaviors/fs/file/pe-inspect::inline-pe-signature-check
  any:
  - id: micro-behaviors/process/create/shell/spawn::win-createprocess
  - id: micro-behaviors/communications/socket/init::ws2-connect-api-string
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/vendor/
