  - id: metadata/binary/installer/family/
  - id: metadata/binary/vendor/
- id: pe-network-clock-tamper-anti-debug-loader
  desc: WinInet/Winsock PE loader with clock tampering and anti-debugging
  crit: hostile
  conf: 0.97
  attack: T1071.001,T1497.003
  mbc: B0030
  all:
  - id: micro-behaviors/communications/socket/init::wsa-startup
  - id: micro-behaviors/communications/http/get::internet-open
  - id: objectives/anti-analysis/debugger-detect/check::debugger-api
  - id: objectives/command-and-control/backdoor/evasive::set-system-time-api
  - id: metadata/binary/layout::pe-multiple-tls-callbacks
  - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
