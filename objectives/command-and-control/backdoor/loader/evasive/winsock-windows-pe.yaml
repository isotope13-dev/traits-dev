  attack: T1071,T1620,T1622
  all:
  - id: metadata/binary/layout::pe-no-signature-record
  - id: micro-behaviors/communications/socket/init::wsa-socket
  - id: micro-behaviors/communications/ip/resolve::resolve-getaddrinfo-import
  - id: micro-behaviors/process/debug/detect::is-debugger-present-import
  - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-validation-sequence
  any:
  - id: micro-behaviors/mem/alloc/executable::page-execute-readwrite-arg-x64
  - id: micro-behaviors/mem/alloc/executable::page-execute-read-arg-x64
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/installer/family/
  - id: metadata/binary/framework/
  - id: well-known/app/
  - id: well-known/lib/
  - id: well-known/tool/
