---
defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
  attack: T1071.001
composite_rules:
- id: evasive-wininet-backdoor
  desc: WinInet backdoor with anti-analysis and syscalls
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/communications/http/get::wininet-dynamic-load
  - id: objectives/anti-analysis/debugger-detect/check::win-basic
  any:
  - id: objectives/evasion/anti-av/syscall::syscall-evasion-windows
  - id: objectives/evasion/anti-av/syscall::windows-direct-syscalls
  - id: micro-behaviors/os/syscall/raw::direct-syscall-pattern
  - id: micro-behaviors/os/syscall/raw::nt-query-info-ssn
  - id: objectives/anti-analysis/debugger-detect/check::win-comprehensive
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: well-known/app/defender::is-defender-named
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/signed/platform::microsoft
- id: pe-trojan-indicators
  desc: Dynamic HTTP loading with process termination
  crit: suspicious
  conf: 0.9
  all:
  - id: objectives/impact/degrade/edr/enumerate::process-enumeration-terminate
  - id: micro-behaviors/communications/http/get::wininet-dynamic-load
  downgrade:
    any:
    - id: metadata/binary/metrics/structural::many-imports
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/binary/vendor::microsoft-corp-marker-rsrc
    - id: metadata/binary/vendor::microsoft-corp-marker-rdata
- id: winhttp-token-kill-chain
  desc: WinHTTP C2 with tokenized spawn and process-kill evasion
  crit: hostile
  conf: 0.93
  all:
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
  - id: objectives/privilege-escalation/token-manipulation::token-spawn-api-chain
  - id: objectives/impact/degrade/edr/enumerate::process-enumeration-terminate
  any:
  - id: micro-behaviors/process/sync/mutex::mutex-instance-check
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  - id: micro-behaviors/data/embedded/payload/resource::pe-resource-full-extraction
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
