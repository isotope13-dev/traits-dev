defaults:
  platforms:
    - unix
    - windows
  for: [scripts, source]
traits:
  - id: asm-resolve-relocs-label
    conf: 0.93
    crit: suspicious
    desc: Relocation resolver routine in ASM
    if:
      type: text
      regex: '(?m)^\s*ResolveRelocs\s*:'
  - id: asm-resolve-imports-label
    conf: 0.93
    crit: suspicious
    desc: Import resolver routine in ASM
    if:
      type: text
      regex: '(?m)^\s*ResolveImports\s*:'
  - id: asm-pe-loader-label
    conf: 0.92
    crit: suspicious
    desc: PE loader function label in ASM
    if:
      type: text
      regex: '(?m)^\s*PeLoader\s*:'
  - id: asm-map-sections-label
    conf: 0.9
    crit: suspicious
    desc: Section mapping label in ASM
    if:
      type: text
      regex: '(?m)^\s*MapAllSections\s*:'
composite_rules:
  - id: asm-manual-pe-loader
    conf: 0.96
    crit: suspicious
    desc: Manual PE loader in assembly source
    attack: T1620
    needs: 2
    any:
      - id: asm-resolve-relocs-label
      - id: asm-resolve-imports-label
      - id: asm-pe-loader-label
      - id: asm-map-sections-label
