defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1620"
  mbc: "B0032"

traits:
  - id: csharp-pe-loader-class
    desc: C# PE loader class
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: PELoader
  - id: csharp-virtualalloc-sizeofimage
    desc: C# VirtualAlloc SizeOfImage
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'VirtualAlloc\([^;\n]{0,120}SizeOfImage'
    unless:
      - id: well-known/game/mod::bedrockboot-memory-module-context
  - id: csharp-pe-section-marshal-copy
    desc: C# PE section marshal copy
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'NumberOfSections[\s\S]{0,500}Marshal\.Copy'
  - id: csharp-entrypoint-createthread
    desc: C# entrypoint CreateThread
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'AddressOfEntryPoint[\s\S]{0,260}CreateThread'

composite_rules:
  - id: csharp-in-memory-pe-loader
    desc: C# in-memory PE loader
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-pe-loader-class
      - id: csharp-virtualalloc-sizeofimage
      - id: csharp-pe-section-marshal-copy
      - id: csharp-entrypoint-createthread
