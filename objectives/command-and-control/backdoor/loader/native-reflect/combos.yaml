defaults:
  platforms: [unix, windows, macos]
  mbc: B0005
composite_rules:
  - id: reflective-pe-loader
    desc: Reflective PE loading with encrypted payload
    crit: hostile
    conf: 0.95
    all:
      - id: custom-pe-loader
    any:
      # NB: the Rust `object` crate is NOT evidence of a loader — it is the
      # benign backtrace symbolizer that *causes* the custom-pe-loader FP, so it
      # was removed from this positive `any:` and moved into `unless:` below.
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: metadata/binary/section/names::high-entropy-rdata
    unless:
      - id: metadata/lang/compiler/native::mingw-pseudo-reloc-runtime
      - id: micro-behaviors/data/db/postgresql/
      - id: well-known/app/sq::go-module-path
      - id: well-known/app/mcu-ai-debug/
      - id: well-known/lib/ffmpeg/
      - id: well-known/lib/benign-runtime-bundles/
      - id: metadata/lang/compiled::rust-backtrace-symbolizer
  - id: reflective-loader-with-shellcode-thread
    desc: Reflective loader stages executable thread
    crit: hostile
    conf: 0.97
    attack: "T1620, T1055"
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: custom-pe-loader
      - id: objectives/evasion/process/injection/shellcode::w-xor-x-injection-x64
      - id: micro-behaviors/process/thread/create::create-thread
    unless:
      - id: well-known/app/mcu-ai-debug/
      - id: metadata/lang/compiled::rust-backtrace-symbolizer
  - id: native-loader-with-anti-analysis
    desc: Native loader combines anti-analysis gates
    crit: hostile
    conf: 0.97
    attack: "T1620, T1497, T1622"
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: custom-pe-loader
      - id: objectives/anti-analysis/emulator-detect/vendor-strings::comprehensive
      - id: objectives/anti-analysis/sandbox-detect/tool-references::analyst-tool-name-cluster
    unless:
      - id: metadata/lang/compiled::rust-backtrace-symbolizer
  - id: in-memory-pe-loader-with-decryption
    desc: In-memory PE loader with AES-CBC decryption
    crit: suspicious
    conf: 0.95
    attack: T1620
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: micro-behaviors/crypto/symmetric/aes/cng::bcrypt-aes-cbc
      - id: micro-behaviors/mem/protect/modify::virtual-protect
    any:
      - id: micro-behaviors/mem/alloc/heap::heap-alloc
      - id: micro-behaviors/os/module/load::get-proc-address-import
    needs: 2
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: well-known/tool/offensive/mimikatz/
  - id: encrypted-pe-loader-with-analyst-tool-catalog
    desc: Encrypted PE loader catalogs debuggers
    crit: hostile
    conf: 0.99
    attack: "T1027, T1497, T1518.001, T1620"
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: in-memory-pe-loader-with-decryption
      - id: micro-behaviors/data/embedded/payload/header::inline-pe-header-validation-sequence
      - id: objectives/anti-analysis/tool-detect/process::x64dbg-process
      - id: objectives/anti-analysis/tool-detect/process::procmon-process
      - id: objectives/anti-analysis/tool-detect/process::ollydbg-process
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
      - id: well-known/tool/reverse-engineering/
  - id: windows-persistent-aes-loader
    desc: Windows persistent AES loader chain
    crit: hostile
    conf: 0.97
    attack: "T1620, T1547.001"
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: in-memory-pe-loader-with-decryption
      - id: objectives/persistence/login/registry/autostart::run-key
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-rdata-pair
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
