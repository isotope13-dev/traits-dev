defaults:
  platforms: [windows]
  for: [java]
  attack: T1620
  mbc: E1055

traits:
  - id: java-reflective-dll-inject-method
    desc: Java reflective DLL inject method
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: DLLInject
  - id: java-reflective-dll-operator-text
    desc: Java reflective DLL injection operator text
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: Reflective DLL Injection
  - id: java-remote-dll-send-command
    desc: Java remote DLL send command
    crit: notable
    conf: 0.9
    if:
      type: literal
      exact: fdll
  - id: java-socket-get-output-stream-source
    desc: Java socket output stream source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: call
      exact: getOutputStream
  - id: java-socket-write-source
    desc: Java socket write source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: call
      exact: write

composite_rules:
  - id: java-remote-reflective-dll-injection
    desc: Java remote reflective DLL injection
    crit: suspicious
    conf: 0.95
    all:
      - id: java-reflective-dll-inject-method
      - id: micro-behaviors/communications/socket/create::java-socket-create
      - id: micro-behaviors/fs/file/copy::fileinputstream-class
      - id: java-remote-dll-send-command
    any:
      - id: java-reflective-dll-operator-text
      - id: java-socket-output-write-source
  - id: java-socket-output-write-source
    desc: Java socket output write source
    crit: component
    conf: 0.84
    any:
      - id: java-socket-get-output-stream-source
      - id: java-socket-write-source
