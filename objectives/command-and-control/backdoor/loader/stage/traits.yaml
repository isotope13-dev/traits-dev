defaults:
  platforms: [unix, windows]
  attack: T1129
  mbc: B0032
  for:
    - java
    - class
traits:
composite_rules:
  - id: socket-fed-classloader-stage
    desc: Socket-fed in-memory Java stage loader
    crit: hostile
    conf: 0.98
    for: [class]
    all:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::streamed-jar-bytecode-loader
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::classloader-string
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::getdeclaredconstructor-string
      - type: trait
        id: micro-behaviors/communications/socket/create::java-socket-slash-reference
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-invoke
    any:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::loadclassfrombytes-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::urlclassloader-string
  - id: decoy-socket-jar-classloader
    desc: Decoy-tagged socket JAR classloader
    crit: hostile
    conf: 0.99
    for: [class]
    all:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::gson-loader-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::jarinputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::getnextjarentry-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::getdeclaredconstructor-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::invoke-string
    any:
      - type: trait
        id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::loadclassfrombytes-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::urlclassloader-string
