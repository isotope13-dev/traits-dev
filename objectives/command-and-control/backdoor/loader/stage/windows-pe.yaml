---
defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
composite_rules:
- id: staged-pe-loader-plumbing
  desc: Staged PE loader plumbing profile
  crit: suspicious
  conf: 0.91
  all:
  - id: metadata/binary/metrics/structural::high-entropy-data
  - id: micro-behaviors/communications/ipc/named-pipe::create-named-pipe
  any:
  - id: micro-behaviors/process/sync/mutex::open-mutex
  - id: micro-behaviors/fs/file/move::move-file
  - id: micro-behaviors/fs/config/system::legacy-profile-api
  - id: micro-behaviors/os/sysinfo/directories::get-system-windows-directory
  - id: micro-behaviors/os/sysinfo/directories::get-system-wow64-directory
  - id: micro-behaviors/mem/protect/modify::virtual-alloc
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: metadata/signed/platform/
- id: ip-port-obfuscated-pe
  desc: External IP:port with obfuscation techniques
  crit: suspicious
  conf: 0.88
  attack: T1071.001
  all:
  - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-binary
  any:
  - id: objectives/anti-static/obfuscation/control-flow/logic::stack-string-construction
  - id: micro-behaviors/crypto/symmetric/xor/loop::native-byte-xor-loop
  - id: objectives/anti-static/obfuscation/imports::pe-header-walk
  - id: objectives/anti-static/obfuscation/imports::peb-access-x64
  needs: 3
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/installer/database/
    - id: well-known/tool/development/jetbrains/
- id: embedded-ip-c2-loader-suite
  desc: Embedded IP C2 loader with anti-analysis
  crit: hostile
  conf: 0.96
  attack: T1071.001
  all:
  - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-rdata-list
  - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
  - id: micro-behaviors/mem/protect/modify::virtual-protect
  - id: micro-behaviors/dylib/load/runtime::load-library-a
  - id: micro-behaviors/os/module/load::get-proc-address-import
  any:
  - id: micro-behaviors/fs/enumerate/directory::find-first-file-ex
  - id: micro-behaviors/fs/file/write/direct::write-file
  - id: micro-behaviors/os/exception/error-handling::set-unhandled-exception-filter-import
  - id: objectives/anti-static/obfuscation/binary-structure::fptable-section
  needs: 2
  downgrade:
    any:
    - id: metadata/signed/platform/
    - id: metadata/binary/vendor::is-microsoft-named
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/package/versioning::pe-version-resource
    - id: well-known/game/mod/
- id: direct-ip-x64-shellcode-stager
  desc: Direct-IP x64 shellcode stager
  crit: hostile
  conf: 0.99
  attack: T1071.001,T1105,T1140,T1620
  all:
  - id: objectives/anti-static/obfuscation/payload/loader::x64-decoded-shellcode-loader
  - id: micro-behaviors/communications/ip/literal::encoded-external-ipv4-binary
  - id: micro-behaviors/communications/http/user-agent::legacy-msie-ua-encoded
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/framework/
  - id: metadata/binary/installer/family/
- id: pyinstaller-obfuscated-watchdog-downloader
  desc: XOR-obfuscated PyInstaller watchdog with URL download capability
  crit: hostile
  conf: 0.98
  attack: T1027,T1059.006,T1105,T1071.001
  for: [pe]
  scope: outer
  all:
  - id: micro-behaviors/fs/temp/pyinstaller::archive-watchdog-entrypoint
  - id: micro-behaviors/fs/temp/pyinstaller::onefile-temp-extraction
  - id: micro-behaviors/data/decode/xor::python-xor-string-decoder-bytecode
  - id: metadata/binary/layout::overlay-over-90pct
  - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
- id: evasive-trojan-dll
  desc: Evasive DLL with anti-debug, registry access, and C2 capability
  crit: hostile
  conf: 0.93
  attack: T1071.001
  all:
  - id: objectives/anti-analysis/debugger-detect/check::anti-debug-api-pair
  - id: micro-behaviors/os/registry/access::registry-read-api-chain
  - id: objectives/anti-static/obfuscation/binary-metrics/imports::max-50-imports
  any:
  - id: micro-behaviors/process/create/shell/
  - id: micro-behaviors/communications/http/client/
  - id: objectives/anti-static/obfuscation/imports::pe-header-walk
  needs: 2
  unless:
  - id: metadata/signed/platform/
  - id: metadata/binary/vendor::is-microsoft-named
  - id: metadata/binary/metrics/structural::many-imports
