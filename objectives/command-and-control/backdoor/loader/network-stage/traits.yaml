defaults:
  platforms: [unix, windows]
  for:
    - java
    - class
traits:
  - id: httpclient-string
    desc: Java HttpClient API reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      substr: java/net/http/HttpClient
  - id: http-bodyhandler-bytearray-string
    desc: HTTP response byte-array handler
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      substr: ofByteArray
  - id: socket-string
    desc: Java socket API reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: java/net/Socket
  - id: nothing-to-see-here-string
    desc: Decoy visibility suppression string
    crit: suspicious
    conf: 0.97
    for: [class, jar, zip]
    if:
      type: text
      exact: nothing_to_see_here
composite_rules:
  - id: socket-fed-classloader-stage
    desc: Socket-fed in-memory Java stage loader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [class]
    all:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::streamed-jar-bytecode-loader
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::classloader-string
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-defineclass
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::getdeclaredconstructor-string
      - type: trait
        id: socket-string
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-invoke
    any:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::loadclassfrombytes-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::urlclassloader-string
  - id: decoy-socket-jar-classloader
    desc: Decoy-tagged socket JAR classloader
    crit: hostile
    conf: 0.99
    mbc: B0032
    attack: T1129
    for: [class]
    all:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::gson-loader-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::jarinputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::getnextjarentry-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::getdeclaredconstructor-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::invoke-string
    any:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::defineclass-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::loadclassfrombytes-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/classloader::urlclassloader-string
