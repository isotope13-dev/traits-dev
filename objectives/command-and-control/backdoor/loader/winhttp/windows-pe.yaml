---
defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
composite_rules:
- id: winhttp-pipe-command-backdoor
  desc: WinHTTP backdoor with pipe command capture
  crit: hostile
  conf: 0.96
  attack: T1059
  all:
  - id: objectives/command-and-control/infrastructure/blockchain/polygon::polygon-smart-contract-loader-c2
  - id: micro-behaviors/communications/http/client::winhttp-request-flow
  - id: micro-behaviors/communications/ipc/pipe::pipe-io-redirect
  - id: micro-behaviors/process/create/spawn::create-process-w
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: winhttp-token-kill-chain
  desc: WinHTTP C2 with tokenized spawn and process-kill evasion
  crit: hostile
  conf: 0.93
  attack: T1071.001
  all:
  - id: micro-behaviors/communications/http/client::winhttp-request-flow
  - id: objectives/privilege-escalation/token-manipulation::token-spawn-api-chain
  - id: objectives/impact/degrade/edr/enumerate::process-enumeration-terminate
  any:
  - id: micro-behaviors/process/sync/mutex::mutex-instance-check
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
  downgrade:
    any:
    - id: metadata/package/versioning::pe-version-resource
- id: winhttp-staged-loader-profile
  desc: WinHTTP C2 with staged loader host integration profile
  crit: suspicious
  conf: 0.94
  attack: T1071.001
  all:
  - id: micro-behaviors/communications/http/client::winhttp-request-flow
  - id: micro-behaviors/process/sync/mutex::mutex-instance-check
  any:
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
  - id: objectives/impact/degrade/edr/enumerate::process-enumeration-terminate
  - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
  - id: micro-behaviors/crypto/library::capi-keyed-buffer-crypto-chain
  - id: objectives/persistence/login/startup/folder::startup-folder-shell-path-composition-chain
  needs: 3
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: well-known/app/defender::is-defender-named
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/package/versioning::pe-version-resource
- id: winhttp-pipe-resource-loader
  desc: WinHTTP loader with pipe IPC and resource unpacking
  crit: suspicious
  conf: 0.95
  attack: T1071.001
  all:
  - id: micro-behaviors/communications/http/client::winhttp-request-flow
  - id: micro-behaviors/communications/ipc/named-pipe::named-pipe-client-server
  - id: micro-behaviors/data/embedded/payload::pe-resource-full-extraction
  any:
  - id: micro-behaviors/process/sync/mutex::mutex-instance-check
  - id: objectives/impact/degrade/edr/enumerate::process-enumeration-terminate
  - id: micro-behaviors/os/security/descriptor::acl-rewrite-cluster
  - id: micro-behaviors/crypto/library::capi-keyed-buffer-crypto-chain
  needs: 3
  unless:
  - id: metadata/signed/platform::microsoft
- id: winhttp-ip-c2-loader
  desc: WinHTTP IP C2 loader profile
  crit: suspicious
  conf: 0.93
  attack: T1071.001
  all:
  - id: micro-behaviors/communications/http/client::winhttp-read-data
  - id: micro-behaviors/communications/ip::external-ipv4-port-binary
  any:
  - id: objectives/anti-analysis/debugger-detect/check::debugger-api
  - id: objectives/anti-analysis/timing/evasion::timing-anti-debug
  - id: micro-behaviors/communications/ipc/named-pipe::create-named-pipe
  - id: micro-behaviors/process/sync/mutex::open-mutex
  - id: metadata/binary/metrics::high-entropy-data
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/signed/platform::microsoft
- id: winhttp-crypto-admin-trojan
  desc: WinHTTP C2 with crypto, admin elevation, and anti-analysis
  crit: hostile
  conf: 0.95
  attack: T1071.001
  all:
  - id: micro-behaviors/communications/http/client::winhttp-request-flow
  - id: micro-behaviors/crypto/symmetric/aes::bcrypt-aes-cbc
  - id: micro-behaviors/os/privilege/manifest::require-administrator
  - id: metadata/signed::unsigned
  any:
  - id: micro-behaviors/crypto/kdf::pbkdf2
  - id: objectives/anti-analysis/debugger-detect/check::debugger-check-with-guards
  - id: objectives/evasion/self-delete/file::module-path-delete
  - id: micro-behaviors/os/privilege/check::admin-sid-check
  needs: 2
  unless:
  - id: metadata/signed/platform::microsoft
  - id: metadata/binary/vendor::is-microsoft-named
