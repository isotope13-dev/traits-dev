defaults:
  platforms: [unix, windows]
  for:
    - java
    - class
traits:
  - id: jarinputstream-string
    desc: JarInputStream API reference
    crit: component
    conf: 0.9
    for: [java, class, jar, zip]
    if:
      type: text
      substr: java/util/jar/JarInputStream
  - id: getnextjarentry-string
    desc: JarInputStream entry iteration
    crit: component
    conf: 0.9
    for: [java, class, jar, zip]
    if:
      type: text
      substr: getNextJarEntry
  - id: jar-manifest-string
    desc: JAR manifest API reference
    crit: component
    conf: 0.88
    for: [java, class, jar, zip]
    if:
      type: text
      substr: java/util/jar/Manifest
  - id: main-class-string
    desc: MAIN_CLASS manifest key
    crit: component
    conf: 0.88
    for: [java, class, jar, zip]
    if:
      type: text
      substr: MAIN_CLASS
  - id: currentthread-string
    desc: Thread.currentThread reference
    crit: component
    conf: 0.88
    for: [java, class, jar, zip]
    if:
      type: text
      substr: currentThread
  - id: context-classloader-string
    desc: Context classloader setter reference
    crit: component
    conf: 0.9
    for: [java, class, jar, zip]
    if:
      type: text
      substr: setContextClassLoader
  - id: invoke-string
    desc: Java invoke reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: invoke
  - id: messagedigest-string
    desc: MessageDigest API reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: java/security/MessageDigest
  - id: secretkeyspec-string
    desc: SecretKeySpec API reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: javax/crypto/spec/SecretKeySpec
  - id: cipher-string
    desc: Cipher API reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: javax/crypto/Cipher
  - id: dofinal-string
    desc: doFinal method reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: doFinal
  - id: classloader-string
    desc: ClassLoader API reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: java/lang/ClassLoader
  - id: urlclassloader-string
    desc: URLClassLoader API reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: java/net/URLClassLoader
  - id: getdeclaredconstructor-string
    desc: Java getDeclaredConstructor reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: getDeclaredConstructor
  - id: bytearrayoutputstream-string
    desc: ByteArrayOutputStream API reference
    crit: component
    conf: 0.88
    for: [class, jar, zip]
    if:
      type: text
      substr: java/io/ByteArrayOutputStream
  - id: socket-string
    desc: Java socket API reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: java/net/Socket
  - id: loadclassfrombytes-string
    desc: Custom byte-array class loader helper
    crit: component
    conf: 0.92
    for: [class, jar, zip]
    if:
      type: text
      exact: loadClassFromBytes
  - id: defineclass-string
    desc: defineClass method reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: defineClass
  - id: getresourceasstream-string
    desc: Resource stream staging reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: getResourceAsStream
  - id: staged-loader-member-set
    desc: Staged loader max member name length
    crit: suspicious
    conf: 0.88
    for: [jar]
    unless:
      - type: basename
        regex: '\.(zip|lottie)$'
    if:
      type: metrics
      field: archive.max_filename_length
      min: 30
      max: 30
  - id: staged-loader-six-files
    desc: Staged loader six file archive
    crit: suspicious
    conf: 0.95
    for: [jar]
    unless:
      - type: basename
        regex: '\.(zip|lottie)$'
    if:
      type: metrics
      field: archive.file_count
      min: 6
      max: 6
  - id: staged-loader-high-uncompressed-span
    desc: Staged loader high archive span
    crit: suspicious
    conf: 0.94
    for: [jar]
    unless:
      - type: basename
        regex: '\.(zip|lottie)$'
      - type: basename
        regex: '\.graffle$'
    if:
      type: metrics
      field: archive.total_uncompressed
      min: 1500000
      max: 1600000
  - id: staged-loader-upper-mid-ratio
    desc: Staged loader upper-mid compression ratio (0.62-0.64)
    # Building block: a narrow ratio window is a statistical fingerprint of a
    # specific malware family. Only meaningful inside `minecraft-staged-loader-archive`
    # which also demands the 6-file, high-span, 39-char-name signatures.
    crit: component
    conf: 0.94
    for: [jar]
    unless:
      - type: basename
        regex: '\.(zip|lottie)$'
      - type: basename
        regex: '\.graffle$'
    if:
      type: metrics
      field: archive.compression_ratio
      min: 0.62
      max: 0.64
  - id: staged-loader-longest-member-thirty-nine
    desc: Staged loader max member length
    crit: suspicious
    conf: 0.93
    for: [jar]
    unless:
      - type: basename
        regex: '\.(zip|lottie)$'
    if:
      type: metrics
      field: archive.max_filename_length
      min: 39
      max: 39
  - id: fabric-mod-metadata
    desc: Fabric mod manifest present
    crit: notable
    conf: 0.86
    for: [jar, zip]
    if:
      type: basename
      exact: fabric.mod.json
  - id: forge-eventhandler-ref
    desc: Forge event handler annotation reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: net/minecraftforge/fml/common/Mod$EventHandler
  - id: forge-preinit-ref
    desc: Forge preinit event reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: net/minecraftforge/fml/common/event/FMLPreInitializationEvent
  - id: minecraft-client-ref
    desc: Minecraft client singleton reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: net/minecraft/class_310
  - id: minecraft-session-ref
    desc: Minecraft session object reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: net/minecraft/class_320
  - id: minecraft-name-getter-ref
    desc: Minecraft name getter reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: method_1676
composite_rules:
  - id: nested-jar-unpack
    desc: Nested JAR manifest staging
    crit: suspicious
    conf: 0.93
    for: [java, class, jar, zip]
    all:
      - type: trait
        id: jarinputstream-string
      - type: trait
        id: getnextjarentry-string
      - type: trait
        id: jar-manifest-string
      - type: trait
        id: main-class-string
  - id: context-classloader-handoff
    desc: Thread context classloader activation
    crit: suspicious
    conf: 0.92
    for: [jar, zip]
    all:
      - type: trait
        id: currentthread-string
      - type: trait
        id: context-classloader-string
      - type: trait
        id: urlclassloader-string
      - type: trait
        id: getdeclaredconstructor-string
      - type: trait
        id: invoke-string
  - id: encrypted-loader-payload
    desc: Encrypted Java loader payload
    crit: suspicious
    conf: 0.92
    for: [jar, zip]
    all:
      - type: trait
        id: messagedigest-string
      - type: trait
        id: secretkeyspec-string
      - type: trait
        id: cipher-string
      - type: trait
        id: dofinal-string
  - id: dynamic-bytecode-loader
    desc: Dynamic bytecode class definition
    crit: suspicious
    conf: 0.93
    for: [jar, zip]
    all:
      - type: trait
        id: classloader-string
      - type: trait
        id: defineclass-string
      - type: trait
        id: getresourceasstream-string
  - id: streamed-jar-bytecode-loader
    desc: Streamed JAR bytecode class staging
    crit: suspicious
    conf: 0.95
    for: [class]
    all:
      - type: trait
        id: jarinputstream-string
      - type: trait
        id: getnextjarentry-string
      - type: trait
        id: micro-behaviors/data/compress/library::bytearrayinputstream
      - type: trait
        id: bytearrayoutputstream-string
    any:
      - type: trait
        id: loadclassfrombytes-string
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-defineclass
  - id: socket-fed-classloader-stage
    desc: Socket-fed in-memory Java stage loader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [class]
    all:
      - type: trait
        id: streamed-jar-bytecode-loader
      - type: trait
        id: classloader-string
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-defineclass
      - type: trait
        id: getdeclaredconstructor-string
      - type: trait
        id: micro-behaviors/communications/socket/create::java-socket-create
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-invoke
    any:
      - type: trait
        id: loadclassfrombytes-string
      - type: trait
        id: urlclassloader-string
  - id: fabric-reflective-remote-loader
    desc: Fabric mod reflective remote loader
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-mod-metadata
      - type: trait
        id: urlclassloader-string
      - type: trait
        id: getdeclaredconstructor-string
      - type: trait
        id: invoke-string
      - type: trait
        id: minecraft-session-access
  - id: forge-mod-entrypoint
    desc: Forge mod event entrypoint
    crit: notable
    conf: 0.9
    for: [class, jar, zip]
    all:
      - type: trait
        id: forge-eventhandler-ref
      - type: trait
        id: forge-preinit-ref
  - id: minecraft-session-access
    desc: Minecraft session name access
    crit: notable
    conf: 0.91
    for: [class, jar, zip]
    all:
      - type: trait
        id: minecraft-client-ref
      - type: trait
        id: minecraft-session-ref
      - type: trait
        id: minecraft-name-getter-ref
  - id: fabric-account-forwarding-loader
    desc: Fabric mod account forwarding loader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-reflective-remote-loader
      - type: trait
        id: minecraft-session-access
  - id: minecraft-account-forwarding-classloader
    desc: Minecraft account forwarding classloader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [class]
    all:
      - type: trait
        id: urlclassloader-string
      - type: trait
        id: getdeclaredconstructor-string
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-loadclass
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-getmethod
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-invoke
      - type: trait
        id: minecraft-session-access
  - id: forge-staged-account-loader
    desc: Forge mod staged account loader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: metadata/package/config::forge-mcmod-info
      - type: trait
        id: forge-mod-entrypoint
      - type: trait
        id: socket-string
      - type: trait
        id: jarinputstream-string
      - type: trait
        id: getnextjarentry-string
      - type: trait
        id: bytearrayoutputstream-string
      - type: trait
        id: classloader-string
      - type: trait
        id: defineclass-string
      - type: trait
        id: getdeclaredconstructor-string
      - type: trait
        id: invoke-string
  - id: staged-classloader-archive
    desc: Staged Java classloader loader archive
    crit: hostile
    conf: 0.94
    mbc: B0032
    attack: T1140
    for: [jar, zip]
    all:
      - type: trait
        id: staged-loader-member-set
      - type: trait
        id: metadata/package/metrics::compact-jar-archive
      - type: trait
        id: metadata/package/metrics::jar-low-compression-ratio
      - type: trait
        id: metadata/package/metrics::jar-mid-uncompressed-span
      - type: trait
        id: context-classloader-handoff
  - id: minecraft-staged-loader-archive
    desc: Minecraft staged loader archive
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: staged-loader-six-files
      - type: trait
        id: staged-loader-high-uncompressed-span
      - type: trait
        id: staged-loader-upper-mid-ratio
      - type: trait
        id: staged-loader-longest-member-thirty-nine
  - id: staged-flat-classloader-archive
    desc: Flat staged Java loader archive
    crit: hostile
    conf: 0.95
    mbc: B0032
    attack: T1140
    for: [jar, zip]
    all:
      - type: trait
        id: staged-classloader-archive
      - type: trait
        id: metadata/package/metrics::jar-single-directory-layout
      - type: trait
        id: dynamic-bytecode-loader
  - id: opaque-flat-classloader-archive
    desc: Opaque flat staged Java loader
    crit: hostile
    conf: 0.97
    mbc: B0032
    attack: T1140
    for: [jar, zip]
    all:
      - type: trait
        id: staged-loader-member-set
      - type: trait
        id: metadata/package/metrics::jar-thirteen-files
      - type: trait
        id: metadata/package/metrics::jar-single-directory-layout
      - type: trait
        id: metadata/package/metrics::jar-mid-compression-ratio
      - type: trait
        id: metadata/package/metrics::jar-tight-uncompressed-span
      - type: trait
        id: dynamic-bytecode-loader
