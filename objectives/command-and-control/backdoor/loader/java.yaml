defaults:
  platforms: [unix, windows]
  for:
    - java
    - class
traits:
  - id: jarinputstream-string
    desc: JarInputStream API reference
    crit: component
    conf: 0.9
    for: [java, class, jar, zip]
    if:
      type: text
      substr: java/util/jar/JarInputStream
  - id: getnextjarentry-string
    desc: JarInputStream entry iteration
    crit: component
    conf: 0.9
    for: [java, class, jar, zip]
    if:
      type: text
      substr: getNextJarEntry
  - id: jar-manifest-string
    desc: JAR manifest API reference
    crit: component
    conf: 0.88
    for: [java, class, jar, zip]
    if:
      type: text
      substr: java/util/jar/Manifest
  - id: main-class-string
    desc: MAIN_CLASS manifest key
    crit: component
    conf: 0.88
    for: [java, class, jar, zip]
    if:
      type: text
      substr: MAIN_CLASS
  - id: currentthread-string
    desc: Thread.currentThread reference
    crit: component
    conf: 0.88
    for: [java, class, jar, zip]
    if:
      type: text
      substr: currentThread
  - id: context-classloader-string
    desc: Context classloader setter reference
    crit: component
    conf: 0.9
    for: [java, class, jar, zip]
    if:
      type: text
      substr: setContextClassLoader
  - id: invoke-string
    desc: Java invoke reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: invoke
  - id: messagedigest-string
    desc: MessageDigest API reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: java/security/MessageDigest
  - id: secretkeyspec-string
    desc: SecretKeySpec API reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: javax/crypto/spec/SecretKeySpec
  - id: cipher-string
    desc: Cipher API reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: javax/crypto/Cipher
  - id: dofinal-string
    desc: doFinal method reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: doFinal
  - id: classloader-string
    desc: ClassLoader API reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: java/lang/ClassLoader
  - id: urlclassloader-string
    desc: URLClassLoader API reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: java/net/URLClassLoader
  - id: getdeclaredconstructor-string
    desc: Java getDeclaredConstructor reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: getDeclaredConstructor
  - id: defineclass-string
    desc: defineClass method reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: defineClass
  - id: getresourceasstream-string
    desc: Resource stream staging reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: text
      substr: getResourceAsStream
  - id: staged-loader-member-set
    desc: Staged loader max member name length
    crit: suspicious
    conf: 0.88
    for: [jar, zip]
    if:
      type: metrics
      field: archive.max_filename_length
      min: 30
      max: 30
  - id: compact-staged-loader-archive
    desc: Compact staged loader archive size
    crit: suspicious
    conf: 0.9
    for: [jar, zip]
    unless:
      - type: basename
        regex: '\.whl$'
      - type: basename
        regex: '\.zip$'
      - type: basename
        regex: '\.graffle$'
    if:
      type: metrics
      field: archive.file_count
      min: 10
      max: 20
  - id: staged-loader-thirteen-files
    desc: Staged loader thirteen file archive
    crit: suspicious
    conf: 0.93
    for: [jar, zip]
    if:
      type: metrics
      field: archive.file_count
      min: 13
      max: 13
  - id: staged-loader-low-ratio
    desc: Staged loader archive compression ratio
    crit: suspicious
    conf: 0.9
    for: [jar]
    unless:
      - type: basename
        regex: '\.whl$'
      - type: basename
        regex: '\.zip$'
      - type: basename
        regex: '\.graffle$'
    if:
      type: metrics
      field: archive.compression_ratio
      max: 0.6
  - id: staged-loader-mid-ratio
    desc: Staged loader mid compression ratio
    crit: suspicious
    conf: 0.92
    for: [jar]
    unless:
      - type: basename
        regex: '\.graffle$'
    if:
      type: metrics
      field: archive.compression_ratio
      min: 0.45
      max: 0.5
  - id: staged-loader-uncompressed-span
    desc: Staged loader uncompressed archive span
    crit: suspicious
    conf: 0.9
    for: [jar, zip]
    unless:
      - type: basename
        regex: '\.graffle$'
    if:
      type: metrics
      field: archive.total_uncompressed
      min: 700000
      max: 900000
  - id: staged-loader-tight-uncompressed-span
    desc: Staged loader tight archive span
    crit: suspicious
    conf: 0.93
    for: [jar, zip]
    if:
      type: metrics
      field: archive.total_uncompressed
      min: 780000
      max: 800000
  - id: staged-loader-single-directory
    desc: Staged loader single directory layout
    crit: suspicious
    conf: 0.91
    for: [jar, zip]
    if:
      type: metrics
      field: archive.directory_count
      min: 1
      max: 1
  - id: staged-loader-six-files
    desc: Staged loader six file archive
    crit: suspicious
    conf: 0.95
    for: [jar, zip]
    if:
      type: metrics
      field: archive.file_count
      min: 6
      max: 6
  - id: staged-loader-high-uncompressed-span
    desc: Staged loader high archive span
    crit: suspicious
    conf: 0.94
    for: [jar, zip]
    unless:
      - type: basename
        regex: '\.graffle$'
    if:
      type: metrics
      field: archive.total_uncompressed
      min: 1500000
      max: 1600000
  - id: staged-loader-upper-mid-ratio
    desc: Staged loader upper mid ratio
    crit: suspicious
    conf: 0.94
    for: [jar, zip]
    unless:
      - type: basename
        regex: '\.graffle$'
    if:
      type: metrics
      field: archive.compression_ratio
      min: 0.62
      max: 0.64
  - id: staged-loader-longest-member-thirty-nine
    desc: Staged loader max member length
    crit: suspicious
    conf: 0.93
    for: [jar, zip]
    if:
      type: metrics
      field: archive.max_filename_length
      min: 39
      max: 39
  - id: fabric-mod-metadata
    desc: Fabric mod manifest present
    crit: notable
    conf: 0.86
    for: [jar, zip]
    if:
      type: basename
      exact: fabric.mod.json
  - id: minecraft-client-ref
    desc: Minecraft client singleton reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: net/minecraft/class_310
  - id: minecraft-session-ref
    desc: Minecraft session object reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: net/minecraft/class_320
  - id: minecraft-name-getter-ref
    desc: Minecraft name getter reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: text
      substr: method_1676
composite_rules:
  - id: nested-jar-unpack
    desc: Nested JAR manifest staging
    crit: suspicious
    conf: 0.93
    for: [java, class, jar, zip]
    all:
      - type: trait
        id: jarinputstream-string
      - type: trait
        id: getnextjarentry-string
      - type: trait
        id: jar-manifest-string
      - type: trait
        id: main-class-string
  - id: context-classloader-handoff
    desc: Thread context classloader activation
    crit: suspicious
    conf: 0.92
    for: [jar, zip]
    all:
      - type: trait
        id: currentthread-string
      - type: trait
        id: context-classloader-string
      - type: trait
        id: urlclassloader-string
      - type: trait
        id: getdeclaredconstructor-string
      - type: trait
        id: invoke-string
  - id: encrypted-loader-payload
    desc: Encrypted Java loader payload
    crit: suspicious
    conf: 0.92
    for: [jar, zip]
    all:
      - type: trait
        id: messagedigest-string
      - type: trait
        id: secretkeyspec-string
      - type: trait
        id: cipher-string
      - type: trait
        id: dofinal-string
  - id: dynamic-bytecode-loader
    desc: Dynamic bytecode class definition
    crit: suspicious
    conf: 0.93
    for: [jar, zip]
    all:
      - type: trait
        id: classloader-string
      - type: trait
        id: defineclass-string
      - type: trait
        id: getresourceasstream-string
  - id: fabric-reflective-remote-loader
    desc: Fabric mod reflective remote loader
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-mod-metadata
      - type: trait
        id: urlclassloader-string
      - type: trait
        id: getdeclaredconstructor-string
      - type: trait
        id: invoke-string
      - type: trait
        id: minecraft-session-access
  - id: minecraft-session-access
    desc: Minecraft session name access
    crit: notable
    conf: 0.91
    for: [class, jar, zip]
    all:
      - type: trait
        id: minecraft-client-ref
      - type: trait
        id: minecraft-session-ref
      - type: trait
        id: minecraft-name-getter-ref
  - id: fabric-account-forwarding-loader
    desc: Fabric mod account forwarding loader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: fabric-reflective-remote-loader
      - type: trait
        id: minecraft-session-access
  - id: minecraft-account-forwarding-classloader
    desc: Minecraft account forwarding classloader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [class]
    all:
      - type: trait
        id: urlclassloader-string
      - type: trait
        id: getdeclaredconstructor-string
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-loadclass
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-getmethod
      - type: trait
        id: objectives/anti-static/obfuscation/reflection/class::java-invoke
      - type: trait
        id: minecraft-session-access
  - id: staged-classloader-archive
    desc: Staged Java classloader loader archive
    crit: hostile
    conf: 0.94
    mbc: B0032
    attack: T1140
    for: [jar, zip]
    all:
      - type: trait
        id: staged-loader-member-set
      - type: trait
        id: compact-staged-loader-archive
      - type: trait
        id: staged-loader-low-ratio
      - type: trait
        id: staged-loader-uncompressed-span
  - id: minecraft-staged-loader-archive
    desc: Minecraft staged loader archive
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1129
    for: [jar, zip]
    all:
      - type: trait
        id: staged-loader-six-files
      - type: trait
        id: staged-loader-high-uncompressed-span
      - type: trait
        id: staged-loader-upper-mid-ratio
      - type: trait
        id: staged-loader-longest-member-thirty-nine
  - id: staged-flat-classloader-archive
    desc: Flat staged Java loader archive
    crit: hostile
    conf: 0.95
    mbc: B0032
    attack: T1140
    for: [jar, zip]
    all:
      - type: trait
        id: staged-classloader-archive
      - type: trait
        id: staged-loader-single-directory
  - id: opaque-flat-classloader-archive
    desc: Opaque flat staged Java loader
    crit: hostile
    conf: 0.97
    mbc: B0032
    attack: T1140
    for: [jar, zip]
    all:
      - type: trait
        id: staged-loader-member-set
      - type: trait
        id: staged-loader-thirteen-files
      - type: trait
        id: staged-loader-single-directory
      - type: trait
        id: staged-loader-mid-ratio
      - type: trait
        id: staged-loader-tight-uncompressed-span
