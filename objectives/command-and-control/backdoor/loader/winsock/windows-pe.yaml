---
defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
traits:
- id: winsock-library-reference
  desc: Winsock library string marker
  crit: component
  conf: 0.78
  attack: T1071
  if:
    type: text
    regex: "(?i)^WS2_32\\.dll$"
    section: ".rdata"
composite_rules:
- id: pe-winsock-evasive-loader
  desc: Winsock-linked PE with evasive loader profile
  crit: suspicious
  conf: 0.9
  attack: T1071
  unless:
  - id: metadata/binary/metrics::many-imports
  all:
  - id: winsock-library-reference
  - id: objectives/anti-analysis/debugger-detect/check::debugger-api
  any:
  - id: objectives/anti-analysis/timing/evasion::timing-delta-check
  - id: objectives/anti-static/obfuscation/reflection/class::dynamic-load-pattern
  - id: metadata/binary/metrics::no-functions
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: well-known/app/defender::is-defender-named
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: well-known/tool/reverse-engineering::debug-event-loop
    - id: metadata/signed/certificate::bitdefender-brand-text
    - id: metadata/binary/resource::resource-only-dll
- id: winsock-proxy-connect-command-backdoor
  desc: Winsock proxy CONNECT C2 with command backdoor
  crit: hostile
  conf: 0.94
  attack: T1071.001
  all:
  - id: winsock-library-reference
  - id: micro-behaviors/communications/http/request::http-proxy-connect-auth-tunnel
  any:
  - id: micro-behaviors/process/create/shell/invoke::cmd-slash-c
  - id: micro-behaviors/os/registry/access::windows-firewall-authorizedapps-write-chain
  - id: micro-behaviors/process/sync/mutex::mutex-instance-check
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: well-known/app/defender::is-defender-named
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
