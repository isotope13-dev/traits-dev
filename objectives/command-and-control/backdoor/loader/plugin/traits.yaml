defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: notable
  conf: 0.9
  attack: T1546

traits:
  - id: plugin-path-fragment-1
    desc: Generic plugin/extension path (plugins/extensions)
    crit: component
    if:
      type: text
      regex: '(?i)(plugins|extensions)/.{0,40}(plugin|addon|ext).{0,10}/'
  - id: plugin-path-fragment-2
    desc: Generic plugin/extension path (custom_nodes/addons)
    crit: component
    if:
      type: text
      regex: '(?i)(custom_nodes|addons)/.{0,50}/'
  - id: plugin-path-fragment-3
    desc: Generic plugin/extension path (modules/middleware)
    crit: component
    if:
      type: text
      regex: '(?i)(modules|middleware)/.{0,30}/(plugin|addon|extensions?)/'
    not:
      - substr: "/node_modules/"
  - id: python-plugin-init
    desc: Python plugin initialization
    # Component-only: `__init__.py` / `setup.py` appear as string literals in
    # any Python script that builds, inspects, or templates a package — tests,
    # package builders, docgen, sample generators. Only meaningful paired with
    # a fetch-and-execute pattern inside `plugin-fetch-exec-hostile`.
    crit: component
    for: [python]
    if:
      type: string_literal
      regex: '(__init__\.py|setup\.py)'

composite_rules:
  - id: plugin-fetch-exec-hostile
    desc: Hostile fetch-and-execute in plugin context
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/command-and-control/backdoor/loader/plugin
    any:
      - id: objectives/command-and-control/dropper/execution/network-stage::fetch-write-exec
      - id: objectives/command-and-control/dropper/execution/network-stage::write-exec-delete
      - id: objectives/command-and-control/dropper/execution/network-stage::obfuscated-node-hidden-stage-exec
      - id: objectives/command-and-control/dropper/execution/eval/
      - id: objectives/command-and-control/dropper/execution/download-exec/
