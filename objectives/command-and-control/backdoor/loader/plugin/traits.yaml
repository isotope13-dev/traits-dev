defaults:
  platforms: [windows, unix]
  for: [scripts]
  crit: notable
  conf: 0.9
  attack: T1546

traits:
  - id: plugin-path-fragment-1
    desc: "Generic plugin/extension path"
    crit: component
    if:
      type: text
      regex: '(?i)(plugins|extensions)/[^/\n]{0,40}(plugin|addon|ext)([^A-Za-z0-9_/][^/\n]{0,20})?/'
    not:
      - substr: "/node_modules/"
      - substr: "node_modules/.pnpm/"
  - id: plugin-path-fragment-2
    desc: 'Generic plugin/extension path'
    crit: component
    if:
      type: text
      regex: '(?i)(custom_nodes|addons)/.{0,50}/'
  - id: plugin-path-fragment-3
    desc: "Generic plugin/extension path"
    crit: component
    if:
      type: text
      regex: '(?i)(modules|middleware)/.{0,30}/(plugin|addon|extensions?)/'
    not:
      - substr: "/node_modules/"
      - substr: "node_modules/.pnpm/"
composite_rules:
  - id: plugin-fetch-exec-hostile
    desc: Hostile fetch-and-execute in plugin context
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/command-and-control/backdoor/loader/plugin::plugin-path-fragment-1
      - id: objectives/command-and-control/backdoor/loader/plugin::plugin-path-fragment-2
      - id: objectives/command-and-control/backdoor/loader/plugin::plugin-path-fragment-3
    any:
      - id: objectives/command-and-control/dropper/execution/network-stage::fetch-write-exec
      - id: objectives/command-and-control/dropper/execution/network-stage::write-exec-delete
      - id: objectives/command-and-control/dropper/execution/network-stage::obfuscated-node-hidden-stage-exec
      - id: objectives/command-and-control/dropper/execution/eval/
      - id: objectives/command-and-control/dropper/execution/download-exec/
    unless:
      - id: well-known/app/cloudflare/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/build/pip::python-packaging-tool-tests
      - id: metadata/package/testing/presence/harness::python-static-path-inventory
