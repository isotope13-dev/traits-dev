# Go PE agent configuration combining an endpoint, weakened TLS validation,
# HTTP/2 transport, and periodic scheduling.  The individual observations are
# neutral; this combination is an agent-like C2 configuration.
defaults:
  platforms: [windows]
  for: [pe]
  attack: T1071.001,T1573.001
  mbc: B0032

composite_rules:
  - id: go-configured-http2-agent
    desc: Go PE embeds HTTP/2 agent endpoint
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/lang/compiler/systems::go-pe-binary-context
      - id: micro-behaviors/communications/http/message::configured-https-endpoint
      - id: micro-behaviors/communications/http/message::http2-preface
      - id: micro-behaviors/communications/socket/ssl::insecure-skip-verify
      - id: micro-behaviors/time/schedule/waitable::set-waitable-timer
    unless:
      - id: metadata/package/testing/
      - id: metadata/signed/platform/
      - id: well-known/tool/reverse-engineering/
