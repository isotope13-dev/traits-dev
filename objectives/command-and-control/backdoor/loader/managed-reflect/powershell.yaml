# PowerShell Reflective Loading
# Detects PowerShell reflective code loading patterns
# ATT&CK: T1620 (Reflective Code Loading)
defaults:
  attack: T1620
  mbc: E1620
  platforms: [linux, macos, windows, unix, android, ios]
  for: [powershell]
composite_rules:
  - id: ps-decode-and-load
    desc: PowerShell decode and reflective load
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/interpreter/reflection/resolve::powershell-assembly-load
      - id: micro-behaviors/data/decode/base64::dotnet-frombase64string-text
  - id: ps-reflective-load
    desc: PowerShell reflective assembly loading
    crit: hostile
    conf: 0.93
    all:
      - id: micro-behaviors/process/interpreter/reflection/resolve::powershell-assembly-load
    any:
      - id: micro-behaviors/process/interpreter/reflection/runtime::powershell-assembly-entrypoint-invoke
      - id: micro-behaviors/process/interpreter/reflection/runtime::powershell-assembly-method-invoke
