---
defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
  attack: T1071.001
composite_rules:
- id: wininet-c2-loader
  desc: WinInet HTTP loader with C2 and injection
  crit: hostile
  conf: 0.93
  all:
  - id: micro-behaviors/communications/http/get::internet-open
  - id: micro-behaviors/communications/http/get::internet-connect
  - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-dup
  any:
  - id: objectives/discovery/system/fingerprint/machine-id::machineguid
  - id: objectives/evasion/process/injection/toolkit::process-hollowing-context-hijack
  - id: objectives/anti-analysis/debugger-detect/check::win-anti-analysis-suite
  - id: objectives/persistence/login/startup/folder::startup-folder-shell-path-composition-chain
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: well-known/app/defender/
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
- id: winhttp-ip-c2-loader
  desc: WinHTTP IP C2 loader profile
  crit: suspicious
  conf: 0.93
  all:
  - id: micro-behaviors/communications/http/client/winhttp::winhttp-read-data
  - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-binary
  any:
  - id: objectives/anti-analysis/debugger-detect/check::debugger-api
  - id: objectives/anti-analysis/timing/evasion::timing-anti-debug
  - id: micro-behaviors/communications/ipc/named-pipe::create-named-pipe
  - id: micro-behaviors/process/sync/mutex::open-mutex
  - id: metadata/binary/metrics/structural::high-entropy-data
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/signed/platform/
