defaults:
  platforms: [unix, windows]
  for:
  - java
  - class
traits:
- id: loadclassfrombytes-string
  desc: Custom byte-array class loader helper
  crit: component
  conf: 0.92
  for: [class, jar, zip]
  if:
    type: text
    exact: loadClassFromBytes
- id: gson-loader-string--ensuregsonloaded
  desc: Gson loader helper reference (ensureGsonLoaded)
  crit: component
  conf: 0.93
  for: [class, jar, zip]
  if:
    type: text
    word: ensureGsonLoaded
- id: gson-loader-string--gsonclassloader
  desc: Gson loader helper reference (gsonClassLoader)
  crit: component
  conf: 0.93
  for: [class, jar, zip]
  if:
    type: text
    word: gsonClassLoader
- id: gson-loader-string--loadgson
  desc: Gson loader helper reference (loadGson)
  crit: component
  conf: 0.93
  for: [class, jar, zip]
  if:
    type: text
    word: loadGson
composite_rules:
- id: gson-loader-string
  desc: Gson loader helper reference
  crit: component
  conf: 0.93
  for: [class, jar, zip]
  any:
  - id: gson-loader-string--ensuregsonloaded
  - id: gson-loader-string--gsonclassloader
  - id: gson-loader-string--loadgson
- id: context-classloader-handoff
  desc: Thread context classloader activation
  crit: notable
  conf: 0.92
  for: [jar, zip]
  unless:
  - id: well-known/lib/jruby::package-path
  - id: well-known/lib/jruby::module-marker
  - id: well-known/lib/jruby::jruby-home-path
  - id: well-known/lib/jline/
  - id: well-known/lib/scala-compiler
  all:
  - type: trait
    id: micro-behaviors/process/thread/lifecycle::java-current-thread-reference
  - type: trait
    id: micro-behaviors/data/source/dynamic/reflect::java-context-classloader-setter
  - type: trait
    id: micro-behaviors/data/source/dynamic/reflect::java-urlclassloader-bytecode
  - type: trait
    id: micro-behaviors/data/source/dynamic/reflect::java-getdeclaredconstructor
  - type: trait
    id: micro-behaviors/data/source/dynamic/reflect::java-method-invoke-bytecode
  any:
  - type: trait
    id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
  - type: trait
    id: micro-behaviors/data/embedded/payload/resource::java-getresourceasstream
  - type: trait
    id: micro-behaviors/data/source/dynamic/reflect::java-class-forname-bytecode
- id: encrypted-loader-payload
  desc: Encrypted Java loader payload
  crit: component
  conf: 0.92
  for: [jar, zip]
  unless:
  - id: well-known/lib/jruby::package-path
  - id: well-known/lib/jruby::module-marker
  - id: well-known/lib/jruby::jruby-home-path
  - id: well-known/lib/jline/
  all:
  - type: trait
    id: micro-behaviors/crypto/library/provider::jvm-security-class-ref
  - type: trait
    id: micro-behaviors/crypto/library/provider::secretkeyspec
  - type: trait
    id: micro-behaviors/crypto/library/provider::dofinal-method
- id: dynamic-bytecode-loader
  desc: Dynamic bytecode class definition
  crit: notable
  conf: 0.93
  for: [jar, zip]
  unless:
  - id: well-known/lib/jruby::package-path
  - id: well-known/lib/jruby::module-marker
  - id: well-known/lib/jruby::jruby-home-path
  all:
  - type: trait
    id: micro-behaviors/data/source/dynamic/reflect::jvm-classloader-class-ref
  - type: trait
    id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
  - type: trait
    id: micro-behaviors/data/embedded/payload/resource::java-getresourceasstream
- id: encrypted-in-memory-jar-loader
  desc: Encrypted in-memory JAR classloader
  crit: hostile
  conf: 0.98
  mbc: B0032
  attack: T1140
  for: [jar, zip]
  all:
  - type: trait
    id: encrypted-loader-payload
  - type: trait
    id: objectives/command-and-control/backdoor/loader/archive::nested-jar-unpack
  - type: trait
    id: dynamic-bytecode-loader
  - type: trait
    id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
  - type: trait
    id: micro-behaviors/data/source/dynamic/reflect::java-method-invoke-bytecode
  unless:
  - id: well-known/lib/spring-boot::executable-jar
- id: encrypted-resource-classloader
  desc: Encrypted resource Java classloader
  crit: hostile
  conf: 0.98
  mbc: B0032
  attack: T1140
  for: [jar, zip]
  all:
  - type: trait
    id: encrypted-loader-payload
  - type: trait
    id: dynamic-bytecode-loader
  - type: trait
    id: objectives/command-and-control/backdoor/loader/archive::many-numbered-meta-inf-res-members
  any:
  - type: trait
    id: objectives/command-and-control/backdoor/loader/archive::meta-inf-res-index-member
  - type: trait
    id: micro-behaviors/data/compress/library::bytearrayinputstream
  - type: trait
    id: micro-behaviors/data/compress/library::gzip-inputstream
- id: staged-loader-variant
  desc: Staged loader implementation variant
  crit: component
  conf: 0.88
  any:
  - type: trait
    id: micro-behaviors/data/source/dynamic/reflect::java-defineclass
  - type: trait
    id: loadclassfrombytes-string
  - type: trait
    id: micro-behaviors/data/source/dynamic/reflect::java-urlclassloader-bytecode
  - type: trait
    id: gson-loader-string
