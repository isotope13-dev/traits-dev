defaults:
  platforms: [unix, windows]
  for:
    - java
    - class
traits:
  - id: currentthread-string
    desc: Thread.currentThread reference
    crit: component
    conf: 0.88
    for: [java, class, jar, zip]
    if:
      type: raw
      substr: currentThread
  - id: context-classloader-string
    desc: Context classloader setter reference
    crit: component
    conf: 0.9
    for: [java, class, jar, zip]
    if:
      type: raw
      substr: setContextClassLoader
  - id: invoke-string
    desc: Java invoke reference
    crit: component
    conf: 0.88
    for: [class, jar, zip]
    if:
      type: raw
      substr: invoke
  - id: getmethod-string
    desc: Java getMethod reference
    crit: component
    conf: 0.88
    for: [class, jar, zip]
    if:
      type: raw
      exact: getMethod
  - id: forname-string
    desc: Java forName reference
    crit: component
    conf: 0.88
    for: [class, jar, zip]
    if:
      type: raw
      exact: forName
  - id: messagedigest-string
    desc: MessageDigest API reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: raw
      substr: java/security/MessageDigest
  - id: secretkeyspec-string
    desc: SecretKeySpec API reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: raw
      substr: javax/crypto/spec/SecretKeySpec
  - id: dofinal-string
    desc: doFinal method reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: raw
      substr: doFinal
  - id: classloader-string
    desc: Exact ClassLoader API reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      substr: java/lang/ClassLoader
  - id: urlclassloader-string
    desc: URLClassLoader API reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      substr: java/net/URLClassLoader
  - id: getdeclaredconstructor-string
    desc: Java getDeclaredConstructor reference
    crit: component
    conf: 0.9
    for: [class, jar, zip]
    if:
      type: raw
      substr: getDeclaredConstructor
  - id: loadclassfrombytes-string
    desc: Custom byte-array class loader helper
    crit: component
    conf: 0.92
    for: [class, jar, zip]
    if:
      type: raw
      exact: loadClassFromBytes
  - id: defineclass-string
    desc: defineClass method reference
    crit: component
    conf: 0.88
    for: [class, jar, zip]
    if:
      type: raw
      substr: defineClass
  - id: gson-loader-string
    desc: Gson loader helper reference
    crit: component
    conf: 0.93
    for: [class, jar, zip]
    if:
      type: raw
      regex: (ensureGsonLoaded|gsonClassLoader|loadGson)
  - id: getresourceasstream-string
    desc: Resource stream staging reference
    crit: component
    conf: 0.88
    for: [jar, zip]
    if:
      type: raw
      substr: getResourceAsStream
composite_rules:
  - id: context-classloader-handoff
    desc: Thread context classloader activation
    crit: suspicious
    conf: 0.92
    for: [jar, zip]
    all:
      - type: trait
        id: currentthread-string
      - type: trait
        id: context-classloader-string
      - type: trait
        id: urlclassloader-string
      - type: trait
        id: getdeclaredconstructor-string
      - type: trait
        id: invoke-string
    any:
      - type: trait
        id: defineclass-string
      - type: trait
        id: getresourceasstream-string
      - type: trait
        id: forname-string
  - id: encrypted-loader-payload
    desc: Encrypted Java loader payload
    crit: notable
    conf: 0.92
    for: [jar, zip]
    all:
      - type: trait
        id: messagedigest-string
      - type: trait
        id: secretkeyspec-string
      - type: trait
        id: dofinal-string
  - id: dynamic-bytecode-loader
    desc: Dynamic bytecode class definition
    crit: notable
    conf: 0.93
    for: [jar, zip]
    all:
      - type: trait
        id: classloader-string
      - type: trait
        id: defineclass-string
      - type: trait
        id: getresourceasstream-string
  - id: encrypted-in-memory-jar-loader
    desc: Encrypted in-memory JAR classloader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1140
    for: [jar, zip]
    all:
      - type: trait
        id: encrypted-loader-payload
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::nested-jar-unpack
      - type: trait
        id: dynamic-bytecode-loader
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayoutputstream-string
      - type: trait
        id: invoke-string
    unless:
      - id: well-known/lib/spring-boot::executable-jar
  - id: encrypted-resource-classloader
    desc: Encrypted resource Java classloader
    crit: hostile
    conf: 0.98
    mbc: B0032
    attack: T1140
    for: [jar, zip]
    all:
      - type: trait
        id: encrypted-loader-payload
      - type: trait
        id: dynamic-bytecode-loader
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::many-numbered-meta-inf-res-members
    any:
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::meta-inf-res-index-member
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::bytearrayinputstream-string
      - type: trait
        id: objectives/command-and-control/backdoor/loader/archive::gzipinputstream-string
  - id: staged-loader-variant
    desc: Staged loader implementation variant
    crit: component
    conf: 0.88
    any:
      - type: trait
        id: defineclass-string
      - type: trait
        id: loadclassfrombytes-string
      - type: trait
        id: urlclassloader-string
      - type: trait
        id: gson-loader-string
