defaults:
  platforms: [netscaler, appliance, unix]
  for: [kotlin, class, jar]
  attack: T1055

traits:
  - id: kotlin-isolated-classloader
    desc: Kotlin isolated classloader
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: IsolatedClassLoader

  - id: kotlin-payload-class-bytes
    desc: Kotlin payload class bytes
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Payload.class

  - id: kotlin-reflective-payload-exec
    desc: Kotlin reflective payload exec
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'getMethod\("execute"[\s\S]{0,120}invoke'

composite_rules:
  - id: kotlin-classloader-payload-exec
    desc: Kotlin classloader payload exec
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-isolated-classloader
      - id: kotlin-payload-class-bytes
    any:
      - id: kotlin-reflective-payload-exec
