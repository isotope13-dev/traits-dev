defaults:
  platforms: [windows, unix]
  for: [pe, elf, shell, python, javascript]
  attack: T1543
traits:
- id: backdoor-comp
  desc: Repeated backdoor keyword
  crit: notable
  conf: 0.66
  count_min: 3
  if:
    type: text
    regex: \b[bB]ackdoor\b
  unless:
  - type: trait
    id: metadata/package/manifest/compat::virtualbox-platform-component
  - type: trait
    id: well-known/tool/detection/llm-scanner/
  - type: trait
    id: metadata/signed/developer::vmware
  - type: trait
    id: backdoor-comment
  - type: trait
    id: backdoor-upgrade-check
  - type: trait
    id: well-known/tool/detection/
  - type: trait
    id: well-known/app/aws-vault/
  - type: trait
    id: well-known/tool/sysadmin/unix-benign::flipper-firmware-elf
  - type: trait
    id: metadata/signed/platform::microsoft
  not:
  - regex: (?i)\b(backdoor\s+pe\s+compress\s+protector|oep\s+finder|unpacker|packer|script)\b
  - regex: (?i)\b(apic|vmmdev(\s+timesync)?)\s+backdoor(\s+(activated|closed|logging))?\b
  - regex: (?i)\b(core file tampering / backdoor heuristic check|known backdoor / tampering paths|vendor backdoor patterns)\b
  # "Backdoor" is also standard causal-inference terminology (the backdoor
  # criterion, adjustment sets, and backdoor paths). Do not treat repeated
  # occurrences in that scientific context as a command-and-control signal.
  - regex: '(?is)\bback[- ]?door\b.{0,220}\b(causal|criterion|adjustment|confounder|d-separation|do-calculus|estimator|path)\b'
  # Keyboard-layout blob strings that also mention "backdoor". Containment is
  # the signal: the ordered-gap regex this replaces exceeded the engine's
  # compile limit and never matched.
  - substr: qwertydvorakkeypad
  - regex: 'from \.\.?models import .{0,120}Finding'
- id: vcpu-backdoor
  desc: VCPU backdoor (VMware legitimate)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: VCPUInfoBackdoor
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: guest-backdoor-ops
  desc: Guest backdoor ops (VMware legitimate)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: gGuestBackdoorOps
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: backdoor-comment
  desc: Backdoor comment (documentation)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: '# backdoor:'
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: backdoor-upgrade-check
  desc: Backdoor upgrade-check phrase
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: \bbackdoor upgrade check\b
    case_insensitive: true
- id: backdoor-shell-ref
  desc: Backdoor shell keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \b[bB]ackdoor[_.\s-]?[sS]hell\b
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: well-known/lib/zxcvbn::zxcvbn-password-strength-library
- id: backdoor-leet
  desc: Backdoor leet speak (backd00r)
  crit: suspicious
  conf: 0.5
  count_min: 2
  if:
    type: text
    regex: \b[bB][a4]ckd00r\b
  unless:
  - id: well-known/app/bitwarden::bitwarden-app
  - id: well-known/app/bitwarden::bitwarden-text-marker
  - id: well-known/lib/zxcvbn::zxcvbn-password-strength-library
- id: hidden-backdoor
  desc: Hidden backdoor keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \bhidden[_ ]backdoor\b
    case_insensitive: true
- id: hide-backdoor
  desc: Hide backdoor keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \bhide[_ ]backdoor\b
    case_insensitive: true
- id: icmp-backdoor
  desc: ICMP backdoor keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bicmp[_ ]backdoor\b
    case_insensitive: true
- id: pam-backdoor
  desc: PAM backdoor keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bpam[_ ]backdoor\b
    case_insensitive: true
  unless:
  - id: metadata/file/profile/identity::generated-attack-map-context
- id: ssh-backdoor
  desc: SSH backdoor keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bssh[_ ]backdoor\b
    case_insensitive: true
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/tool/detection/security-scanner/
- id: sshd-backdoor
  desc: SSHD backdoor keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bsshd[_ ]backdoor\b
    case_insensitive: true
- id: backdoor-task
  desc: Backdoor task keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \bbackdoor[_ ]task\b
    case_insensitive: true
- id: backdoor-process
  desc: Backdoor process keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \bbackdoor[_ ]process\b
    case_insensitive: true
- id: backdoor-shell-ctx
  desc: Backdoor shell context keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \bbackdoor[_ ]shell\b
    case_insensitive: true
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: backdoor-login
  desc: Backdoor login keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bbackdoor[_ ]login\b
    case_insensitive: true
- id: backdoor-pass
  desc: Backdoor password keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bbackdoor[_ ]pass\b
    case_insensitive: true
composite_rules:
- id: backdoor-shell
  desc: References a backdoor shell
  crit: suspicious
  conf: 0.66
  any:
  - id: backdoor-shell-ref
  - id: backdoor-leet
  unless:
  - id: well-known/lib/zxcvbn::zxcvbn-password-strength-library
- id: backdoor-hidden
  desc: Suspicious backdoor reference
  crit: suspicious
  conf: 0.66
  any:
  - id: hidden-backdoor
  - id: hide-backdoor
  - id: icmp-backdoor
  - id: pam-backdoor
  - id: ssh-backdoor
  - id: sshd-backdoor
  - id: backdoor-task
  - id: backdoor-process
  - id: backdoor-shell-ctx
  - id: backdoor-login
  - id: backdoor-pass
