defaults:
  platforms: [windows, unix]
  for: [pe, elf, shell, python, javascript]
  attack: T1543
traits:
- id: backdoor-operational-shell
  desc: Backdoor shell keyword
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: '(?i)\bbackdoor[_ -]?shell\b'
- id: backdoor-operational-service
  desc: Backdoor service keyword
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: '(?i)\bbackdoor[_ -]?(server|client|agent|c2)\b'
- id: backdoor-operational-payload
  desc: Backdoor payload keyword
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: '(?i)\bbackdoor[_ -]?(payload|process|task|login)\b'
- id: backdoor-operational-account
  desc: Backdoor account keyword
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: '(?i)\bbackdoor[_ -]?(user|passwd|root|command)\b'
- id: vcpu-backdoor
  desc: VCPU backdoor (VMware legitimate)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: VCPUInfoBackdoor
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: guest-backdoor-ops
  desc: Guest backdoor ops (VMware legitimate)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: gGuestBackdoorOps
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: backdoor-comment
  desc: Backdoor comment (documentation)
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: '# backdoor:'
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: backdoor-upgrade-check
  desc: Backdoor upgrade-check phrase
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: \bbackdoor upgrade check\b
    case_insensitive: true
- id: backdoor-shell-ref
  desc: Backdoor shell keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \b[bB]ackdoor[_.\s-]?[sS]hell\b
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: well-known/lib/zxcvbn::zxcvbn-password-strength-library
- id: backdoor-leet
  desc: Backdoor leet speak (backd00r)
  crit: suspicious
  conf: 0.5
  count_min: 2
  if:
    type: text
    regex: \b[bB][a4]ckd00r\b
  unless:
  - id: well-known/app/bitwarden::bitwarden-app
  - id: well-known/app/bitwarden::bitwarden-text-marker
  - id: well-known/lib/zxcvbn::zxcvbn-password-strength-library
- id: hidden-backdoor
  desc: Hidden backdoor keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \bhidden[_ ]backdoor\b
    case_insensitive: true
- id: hide-backdoor
  desc: Hide backdoor keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \bhide[_ ]backdoor\b
    case_insensitive: true
- id: icmp-backdoor
  desc: ICMP backdoor keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bicmp[_ ]backdoor\b
    case_insensitive: true
- id: pam-backdoor
  desc: PAM backdoor keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bpam[_ ]backdoor\b
    case_insensitive: true
  unless:
  - id: metadata/file/profile/identity::generated-attack-map-context
- id: ssh-backdoor
  desc: SSH backdoor keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bssh[_ ]backdoor\b
    case_insensitive: true
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/tool/detection/security-scanner/
- id: sshd-backdoor
  desc: SSHD backdoor keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bsshd[_ ]backdoor\b
    case_insensitive: true
- id: backdoor-task
  desc: Backdoor task keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \bbackdoor[_ ]task\b
    case_insensitive: true
- id: backdoor-process
  desc: Backdoor process keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \bbackdoor[_ ]process\b
    case_insensitive: true
- id: backdoor-shell-ctx
  desc: Backdoor shell context keyword
  crit: suspicious
  conf: 0.5
  if:
    type: text
    regex: \bbackdoor[_ ]shell\b
    case_insensitive: true
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: backdoor-login
  desc: Backdoor login keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bbackdoor[_ ]login\b
    case_insensitive: true
- id: backdoor-pass
  desc: Backdoor password keyword
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: \bbackdoor[_ ]pass\b
    case_insensitive: true
composite_rules:
- id: backdoor-comp
  desc: Operational backdoor keyword
  crit: notable
  conf: 0.8
  any:
  - id: backdoor-operational-shell
  - id: backdoor-operational-service
  - id: backdoor-operational-payload
  - id: backdoor-operational-account
  unless:
  - type: trait
    id: metadata/package/manifest/compat::virtualbox-platform-component
  - type: trait
    id: well-known/tool/detection/llm-scanner/
  - type: trait
    id: metadata/signed/developer::vmware
  - type: trait
    id: backdoor-comment
  - type: trait
    id: backdoor-upgrade-check
  - type: trait
    id: well-known/tool/detection/
  - type: trait
    id: well-known/app/aws-vault/
  - type: trait
    id: well-known/tool/sysadmin/unix-benign::flipper-firmware-elf
  - type: trait
    id: metadata/signed/platform::microsoft
- id: backdoor-shell
  desc: References a backdoor shell
  crit: suspicious
  conf: 0.66
  any:
  - id: backdoor-shell-ref
  - id: backdoor-leet
  unless:
  - id: well-known/lib/zxcvbn::zxcvbn-password-strength-library
- id: backdoor-hidden
  desc: Suspicious backdoor reference
  crit: suspicious
  conf: 0.66
  any:
  - id: hidden-backdoor
  - id: hide-backdoor
  - id: icmp-backdoor
  - id: pam-backdoor
  - id: ssh-backdoor
  - id: sshd-backdoor
  - id: backdoor-task
  - id: backdoor-process
  - id: backdoor-shell-ctx
  - id: backdoor-login
  - id: backdoor-pass
