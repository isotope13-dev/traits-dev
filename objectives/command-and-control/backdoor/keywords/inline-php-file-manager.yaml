defaults:
  platforms: [unix, windows]
  for: [php, html, text, data]
  attack: T1505.003
  mbc: B0030

traits:
  - id: php-get-path-router-p
    desc: PHP GET p path router
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "if (isset($_GET['p']))"
  - id: php-get-path-router-q
    desc: PHP GET q path router
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "elseif (isset($_GET['q']))"
  - id: php-encode-path-function
    desc: PHP encode path helper
    crit: component
    conf: 0.92
    if:
      type: text
      substr: 'function encodePath($path)'
  - id: php-decode-path-function
    desc: PHP decode path helper
    crit: component
    conf: 0.92
    if:
      type: text
      substr: 'function decodePath($path)'
  - id: php-path-scandir-panel
    desc: PHP PATH scandir file panel
    crit: component
    conf: 0.94
    if:
      type: text
      substr: 'scandir(PATH)'
  - id: php-path-file-read-edit-form
    desc: PHP PATH file read edit form
    crit: component
    conf: 0.94
    if:
      type: text
      substr: 'file_get_contents(PATH."/"'
  - id: php-path-file-write-edit-form
    desc: PHP PATH file write edit form
    crit: component
    conf: 0.94
    if:
      type: text
      substr: 'fwrite($open,$data)'
  - id: php-path-upload-handler
    desc: PHP PATH upload handler
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'move_uploaded_file($_FILES'
  - id: php-path-unlink-handler
    desc: PHP PATH unlink handler
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'if(unlink($name))'
  - id: php-path-rmdir-handler
    desc: PHP PATH rmdir handler
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'if(rmdir($name)'

composite_rules:
  - id: inline-php-file-manager-router
    desc: Inline PHP file manager router
    crit: suspicious
    conf: 0.96
    all:
      - id: php-get-path-router-p
      - id: php-get-path-router-q
      - id: php-encode-path-function
      - id: php-decode-path-function
      - id: php-path-scandir-panel
  - id: inline-php-file-edit-handler
    desc: Inline PHP file edit handler
    crit: suspicious
    conf: 0.96
    all:
      - id: php-path-file-read-edit-form
      - id: php-path-file-write-edit-form
  - id: inline-php-delete-handler
    desc: Inline PHP file delete handler
    crit: suspicious
    conf: 0.96
    all:
      - id: php-path-unlink-handler
      - id: php-path-rmdir-handler
  - id: inline-php-upload-edit-webshell
    desc: Inline PHP upload/edit file-manager webshell
    crit: hostile
    conf: 0.98
    all:
      - id: inline-php-file-manager-router
      - id: php-path-upload-handler
      - id: inline-php-file-edit-handler
  - id: inline-php-destructive-file-manager-webshell
    desc: Inline PHP destructive file-manager webshell
    crit: hostile
    conf: 0.98
    all:
      - id: inline-php-file-manager-router
      - id: inline-php-delete-handler
    any:
      - id: php-path-upload-handler
      - id: inline-php-file-edit-handler
