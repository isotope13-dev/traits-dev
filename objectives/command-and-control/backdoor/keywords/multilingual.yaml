# Non-English generic malware-category labels — the multilingual companions to
# the English malware/trojan/backdoor/stealer vocabulary in generic-malware.yaml.
# Only the category nouns that name "what the malware is" live here; terms that
# name a *specific* objective are filed with that objective (keylogger →
# keyboard/label, ransomware → impact/ransom, botnet → c2/botnet, RAT →
# c2/remote-command, spyware → exfiltration/stealer/surveillance, AV-evasion →
# evasion/security-bypass, phishing/scam → credential-access/phishing).
#
# Matching: CJK has no word boundaries → substr; Cyrillic → case-insensitive
# substr (catches inflected forms); Arabic/Vietnamese phrases → substr.
defaults:
  platforms: [unix, windows, android]
  for: [scripts, source, binaries, documents]
  conf: 0.7

traits:
  # --- "malware" / "malicious code" (notable, rare outside the sample) -------
  - id: ru-malware-term
    desc: Russian malware term (вредонос)
    crit: notable
    if:
      type: text
      substr: вредонос
      case_insensitive: true
  - id: fa-malware-term
    desc: Farsi malware term (بدافزار)
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: بدافزار
  - id: ko-malware-term
    desc: Korean malware term (악성코드)
    crit: notable
    if:
      type: text
      substr: 악성코드
  - id: vi-malware-term
    desc: Vietnamese malware term (mã độc)
    crit: notable
    if:
      type: text
      substr: mã độc
  - id: tr-malware-term
    desc: Turkish malware term (zararlı yazılım)
    crit: notable
    if:
      type: text
      substr: zararlı yazılım
  - id: ar-malware-term
    desc: Arabic malware term (برمجية خبيثة)
    crit: notable
    if:
      type: text
      substr: برمجية خبيثة
  - id: es-malicious-code-term
    desc: Spanish 'malicious code' term (código malicioso)
    crit: notable
    if:
      type: text
      regex: 'c[oó]digo\s+malicioso'
      case_insensitive: true

  # --- "backdoor" — transliterations are security-specific (notable) --------
  - id: ru-backdoor-term
    desc: Russian backdoor term (бэкдор)
    crit: notable
    if:
      type: text
      substr: бэкдор
      case_insensitive: true
  - id: ko-backdoor-term
    desc: Korean backdoor term (백도어)
    crit: notable
    if:
      type: text
      substr: 백도어

  # --- "stealer" (notable transliteration) ----------------------------------
  - id: ru-stealer-term
    desc: Russian infostealer term (стилер)
    crit: notable
    attack: T1555
    if:
      type: text
      substr: стилер
      case_insensitive: true

  # --- "backdoor" — literal "back door" calques (component, collision) ------
  - id: cn-backdoor-term
    desc: Chinese backdoor term (后门)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: 后门
  - id: vi-backdoor-term
    desc: Vietnamese backdoor term (cửa hậu)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: cửa hậu
  - id: tr-backdoor-term
    desc: Turkish backdoor term (arka kapı)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: arka kapı
  - id: ar-backdoor-term
    desc: Arabic backdoor term (باب خلفي)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: باب خلفي

  # --- "trojan" (component — collides with mythology / proxy protocols) -----
  - id: cn-trojan-term
    # 木马 also forms 旋转木马 "carousel" (common in front-end UI code), excluded.
    desc: Chinese trojan term (木马)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: 木马
    not:
      - substr: 旋转木马
  - id: ru-trojan-term
    desc: Russian trojan term (троян)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: троян
      case_insensitive: true
  - id: fa-trojan-term
    desc: Farsi trojan term (تروجان)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: تروجان
  - id: ko-trojan-term
    desc: Korean trojan-horse term (트로이목마)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: 트로이목마
  - id: tr-trojan-term
    desc: Turkish trojan term (truva)
    crit: notable
    conf: 0.45
    if:
      type: text
      substr: truva
      case_insensitive: true
  - id: ar-trojan-term
    desc: Arabic trojan-horse term (حصان طروادة)
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: حصان طروادة
  - id: pt-trojan-term
    desc: Portuguese trojan-horse term (cavalo de troia)
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: 'cavalo de tr[oó]ia'
      case_insensitive: true
  - id: es-trojan-term
    desc: Spanish trojan term (troyano)
    crit: notable
    conf: 0.45
    if:
      type: text
      substr: troyano
      case_insensitive: true

  # --- "stealer/thief" calques (component — also everyday "thief") ----------
  - id: pt-stealer-term
    desc: Portuguese thief/stealer term (ladrão)
    crit: notable
    conf: 0.4
    if:
      type: text
      substr: ladrão
      case_insensitive: true
  - id: es-stealer-term
    desc: Spanish thief/stealer term (ladrón)
    crit: notable
    conf: 0.4
    if:
      type: text
      substr: ladrón
      case_insensitive: true

composite_rules:
  # Several unambiguous malware-category labels co-occurring in one file is a
  # strong "operator-facing malware tooling" signal. Restricted to the notable
  # terms (not the collision-prone calques) and guarded against multilingual
  # AV/SAST products that legitimately enumerate these words.
  - id: multilingual-malware-lexicon-cluster
    desc: Multiple non-English malware category labels
    crit: suspicious
    conf: 0.8
    needs: 3
    any:
      - id: ru-malware-term
      - id: fa-malware-term
      - id: ko-malware-term
      - id: vi-malware-term
      - id: tr-malware-term
      - id: ar-malware-term
      - id: es-malicious-code-term
      - id: ru-backdoor-term
      - id: ko-backdoor-term
      - id: ru-stealer-term
    unless:
      - id: well-known/tool/detection/

  # Neutral grouping for the collision-prone calques. Component-only (no verdict
  # weight); exists so these building blocks are referenced for triage and stay
  # available to behavioral composites that pair them with intent.
  - id: multilingual-malware-lexicon-context
    desc: Non-English malware lexicon calque present
    crit: notable
    conf: 0.4
    any:
      - id: cn-backdoor-term
      - id: vi-backdoor-term
      - id: tr-backdoor-term
      - id: ar-backdoor-term
      - id: cn-trojan-term
      - id: ru-trojan-term
      - id: fa-trojan-term
      - id: ko-trojan-term
      - id: tr-trojan-term
      - id: ar-trojan-term
      - id: pt-trojan-term
      - id: es-trojan-term
      - id: pt-stealer-term
      - id: es-stealer-term
