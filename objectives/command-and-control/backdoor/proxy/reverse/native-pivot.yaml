defaults:
  platforms: [linux]
  for: [elf]
  attack: T1090.001
  mbc: B0022

traits:
  - id: native-pivot-routing-schema
    desc: Native pivot routing fields
    crit: component
    conf: 0.97
    if:
      type: raw
      regex: 'channel_id[\s\S]{0,64}tunnel_id[\s\S]{0,128}pivot_id'
      section: .rodata

  - id: native-agent-control-state
    desc: Native agent crypto state
    crit: notable
    conf: 0.95
    if:
      type: raw
      regex: 'rootkit_scheme[\s\S]{0,64}encrypt_key'
      section: .rodata

  - id: native-agent-connection-state
    desc: Native agent connection state
    crit: component
    conf: 0.94
    if:
      type: raw
      regex: '(elevated|ipaddr)[\s\S]{0,512}(sleep_delay|conn_count|conn_timeout)'
      section: .rodata

composite_rules:
  - id: native-routed-agent-control
    desc: Native routed agent control
    crit: hostile
    conf: 0.99
    all:
      - id: native-pivot-routing-schema
      - id: native-agent-control-state
      - id: native-agent-connection-state
      - id: objectives/command-and-control/backdoor/dispatch/shell::native-remote-job-schema
