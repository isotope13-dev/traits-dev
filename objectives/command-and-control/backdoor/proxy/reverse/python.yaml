defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1090
  mbc: B0030

composite_rules:
  - id: python-anonymous-ssh-reverse-proxy
    desc: Python anonymous SSH reverse proxy
    crit: hostile
    conf: 0.98
    all:
      - id: well-known/lib/paramiko::paramiko-python-library
      - id: micro-behaviors/communications/ssh/client::python-empty-password-auth
      - id: micro-behaviors/communications/ssh/connect::python-ssh-request-port-forward
      - id: micro-behaviors/communications/proxy/tunnel::python-loopback-socket-bridge

  - id: python-unverified-anonymous-ssh-reverse-proxy
    desc: Python unverified anonymous SSH reverse proxy
    crit: hostile
    conf: 0.99
    attack: T1021.004,T1090
    all:
      - id: well-known/lib/paramiko::paramiko-python-library
      - id: micro-behaviors/communications/ssh/client::python-empty-password-auth
      - id: micro-behaviors/communications/ssh/client::python-auto-add-host-key-policy
      - id: micro-behaviors/communications/ssh/connect::python-ssh-request-port-forward

  - id: python-websocket-arbitrary-port-tunnel
    desc: WebSocket backdoor forwards arbitrary TCP connections
    crit: hostile
    conf: 0.98
    for: [whl, python-sdist]
    scope: archive
    all:
      - id: objectives/command-and-control/backdoor/shell/socket::python-websocket-remote-shell-server
      - id: micro-behaviors/communications/socket/tcp::asyncio-open-connection-call
      - id: micro-behaviors/communications/socket/listen::asyncio-start-server-call
      - id: objectives/command-and-control/channel/tunnel/proxy::python-websocket-tunnel-verbs
