defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1090
  mbc: B0030

composite_rules:
  - id: python-anonymous-ssh-reverse-proxy
    desc: Python anonymous SSH reverse proxy
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/ssh/client::paramiko
      - id: micro-behaviors/communications/ssh/client::python-empty-password-auth
      - id: micro-behaviors/communications/ssh/connect::python-ssh-request-port-forward
      - id: micro-behaviors/communications/proxy/tunnel::python-loopback-socket-bridge
