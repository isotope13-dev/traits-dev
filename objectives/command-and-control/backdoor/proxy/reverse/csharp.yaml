defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1090
  mbc: B0030

traits:
  - id: csharp-tcp-listener-any
    desc: C# TCP listener on any address
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '(^|\.)TcpListener$'

  - id: csharp-accept-tcp-client-loop
    desc: C# accepts TCP clients
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)AcceptTcpClient$'

  - id: csharp-rproxy-marker
    desc: C# reverse proxy command marker
    crit: component
    conf: 0.93
    if:
      type: string_literal
      exact: RProxy

  - id: csharp-http-header-read-terminator
    desc: C# HTTP header read terminator
    crit: component
    conf: 0.88
    if:
      type: string_literal
      exact: "\\r\\n\\r\\n"

  - id: csharp-client-key-reattachment
    desc: C# client key reattachment
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: Operators.CompareString

composite_rules:
  - id: csharp-rproxy-listener
    desc: C# reverse proxy listener
    crit: suspicious
    conf: 0.95
    all:
      - id: csharp-tcp-listener-any
      - id: csharp-accept-tcp-client-loop
      - id: csharp-rproxy-marker
    any:
      - id: csharp-http-header-read-terminator
      - id: csharp-client-key-reattachment
