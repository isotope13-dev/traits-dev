defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1090
  mbc: B0030

traits:
  - id: csharp-rproxy-marker
    desc: C# reverse proxy command marker
    crit: component
    conf: 0.93
    if:
      type: string_literal
      exact: RProxy

  - id: csharp-http-header-read-terminator
    desc: C# HTTP header read terminator
    crit: component
    conf: 0.88
    if:
      type: string_literal
      exact: "\\r\\n\\r\\n"

  - id: csharp-client-key-reattachment
    desc: C# client key reattachment
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: Operators.CompareString

composite_rules:
  - id: csharp-rproxy-listener
    desc: C# reverse proxy listener
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/socket/create::tcp-listener-create
      - id: micro-behaviors/communications/socket/create::accept-tcp-client
      - id: csharp-rproxy-marker
    any:
      - id: csharp-http-header-read-terminator
      - id: csharp-client-key-reattachment
