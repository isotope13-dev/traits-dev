defaults:
  platforms: [windows, linux]
  for: [pe, elf, macho, batch, powershell]
  attack: T1090.003
traits:
  - id: tor-rdp-mapping
    desc: Torrc mapping to local RDP port
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: (?i)HiddenServicePort\s+.{0,50}\b127\.0\.0\.1:3389\b
  - id: tor-rdp-task-name
    desc: Scheduled task name for Tor RDP backdoor
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (?i)\\Windows Timer\b
  - id: torrc-custom-path
    desc: Custom torrc file path reference
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)\\Windows\\wintne\\torrc\b
composite_rules:
  - id: tor-rdp-backdoor
    desc: Tor Hidden Service RDP Backdoor detected
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: tor-rdp-mapping
      - id: tor-rdp-task-name
      - id: torrc-custom-path
