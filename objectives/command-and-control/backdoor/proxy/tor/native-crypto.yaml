---
defaults:
  platforms:
  - unix
  - android
  for:
  - elf
  mbc: B0030
traits:
- id: onion-domain-handling
  desc: Tor onion domain handling
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: "[a-z2-7A-Z0-9][\\w-]*\\.onion$"
composite_rules:
- id: native-tor-implant
  desc: Native C2 implant with Tor
  crit: hostile
  conf: 0.95
  attack: T1572
  all:
  - id: micro-behaviors/communications/proxy/socks::socks5h-proto
  - id: onion-domain-handling
  - id: micro-behaviors/communications/http/download/curl::libcurl-version
  - id: micro-behaviors/crypto/asymmetric/ecdh::ecdh-key-exchange
- id: native-crypto-proxy-implant
  desc: Native crypto proxy implant
  crit: hostile
  conf: 0.92
  attack: T1573
  all:
  - id: micro-behaviors/communications/http/download/curl::libcurl-version
  - id: micro-behaviors/crypto/asymmetric/ecdh::ecdh-key-exchange
  - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
  any:
  - id: micro-behaviors/communications/proxy/socks::socks5h-proto
  - id: micro-behaviors/communications/proxy/socks::socks4a-proto
  - id: onion-domain-handling
  - id: micro-behaviors/communications/http/request/client::http-connect-proxy
