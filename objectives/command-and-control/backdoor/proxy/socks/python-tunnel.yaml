# Python SOCKS5 Reverse Tunnel Backdoor
# Detects Python scripts that implement SOCKS5 proxy tunnels for C2 pivoting.
# Covers VIPERTUNNEL, custom reverse SOCKS proxies, and similar tools.
# ATT&CK: T1572 (Protocol Tunneling), T1090.001 (Internal Proxy)
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1572

traits:
- id: socket-monkey-patch
  desc: socket.socket class replacement (monkey-patch)
  crit: notable
  conf: 0.94
  if:
    type: text
    regex: 'socket\.socket\s*=\s*\w+'
  unless:
  - id: metadata/package/testing/presence/harness::python-test-file
  - id: metadata/package/testing/presence/harness/

- id: struct-unpack-bbb
  desc: SOCKS5 handshake version/method parse
  crit: component
  conf: 0.88
  if:
    type: text
    regex: "struct\\.unpack\\(.{0,10}BBB"

- id: hardcoded-proxy-creds--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.93
  count_min: 2
  if:
    type: text
    regex: '(Any(User|Login)|auth_(user|pass))\b'

  count_max: 1015035
- id: hardcoded-proxy-creds--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.93
  count_min: 2
  if:
    type: text
    regex: '(Any(Password)|auth_(user|pass))\b'

  count_max: 1015036
- id: hardcoded-proxy-creds--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.93
  count_min: 2
  if:
    type: text
    regex: '(proxy_(user|pass))\b'

  count_max: 1015037
- id: bridge-relay-method
  desc: Bridge/relay data forwarding method
  crit: component
  conf: 0.85
  if:
    type: symbol
    regex: ^_?bridge$

- id: custom-connection-exceptions
  desc: Custom connection exception classes
  crit: component
  conf: 0.88
  count_min: 2
  if:
    type: text
    regex: 'class\s+(Connection\w+Error|Exit\w*Exception|Close\w*Exception)\b'

composite_rules:
- id: socks5-reverse-tunnel
  desc: Python SOCKS5 reverse tunnel proxy
  crit: suspicious
  conf: 0.94
  size_max: 32768
  all:
  - id: micro-behaviors/communications/proxy/socks::socks5-proto
  any:
  - id: socket-monkey-patch
  - id: hardcoded-proxy-creds
  - id: struct-unpack-bbb
  - id: bridge-relay-method

- id: python-proxy-backdoor
  desc: Python proxy backdoor with credentials
  crit: suspicious
  conf: 0.95
  size_max: 32768
  all:
  - id: micro-behaviors/communications/proxy/socks::socks
  - id: hardcoded-proxy-creds
  any:
  - id: socket-monkey-patch
  - id: custom-connection-exceptions
  - id: micro-behaviors/communications/socket/connect::socket-connect-call
- id: hardcoded-proxy-creds
  desc: Hardcoded proxy authentication credentials
  crit: component
  conf: 0.93
  any:
  - id: hardcoded-proxy-creds--rx-1
  - id: hardcoded-proxy-creds--rx-2
  - id: hardcoded-proxy-creds--rx-3
