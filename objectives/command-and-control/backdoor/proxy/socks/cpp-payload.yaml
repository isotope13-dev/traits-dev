defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
  mbc: B0030
  attack: T1090
traits:
  - id: cxx-proxy-connect-symbol
    desc: C++ proxy connect routine
    crit: component
    conf: 0.9
    size_min: 500000
    size_max: 8000000
    if:
      type: text
      exact: _Z13FConnectProxyv
      section: .strtab
composite_rules:
  - id: native-payload-proxy-tasking
    desc: Native payload proxy tasking
    crit: hostile
    conf: 0.96
    all:
      - id: cxx-proxy-connect-symbol
      - id: objectives/command-and-control/backdoor/tasking/payload::native-payload-transport-routines
    any:
      - id: micro-behaviors/communications/proxy/socks::socks4-proto
      - id: micro-behaviors/communications/proxy/socks::socks5-proto
