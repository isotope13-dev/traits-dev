---
defaults:
  platforms:
  - unix
  - android
  for:
  - elf
  mbc: B0030
traits:
- id: musl-libc-triple
  desc: musl libc target triple
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: x86_64-[a-z]+-linux-musl
  unless:
  - id: metadata/lang/compiler/systems::rust-binary
- id: alpine-gcc
  desc: Alpine GCC compiler build string
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'GCC: \(Alpine [0-9]+\.[0-9]+\.[0-9]+\)'
composite_rules:
- id: native-alpine-implant
  desc: Alpine static implant with SOCKS
  crit: hostile
  conf: 0.93
  attack: T1090
  all:
  - id: musl-libc-triple
  - id: alpine-gcc
  - id: micro-behaviors/communications/proxy/socks::socks5h-proto
  - id: micro-behaviors/crypto/asymmetric/ecdh::ecdh-key-exchange
