# C++ SOCKS proxy and tunnel source
defaults:
  for: [cpp]
  platforms: [windows]
  attack: "T1090"
  mbc: "B0030"
traits:
  - id: cpp-socks5-greeting-read
    desc: SOCKS5 greeting read
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "recv(sock,szBuffer,2,0)"
  - id: cpp-socks5-version-reject
    desc: SOCKS5 version byte reject
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "if(szBuffer[0]!=5) return(false);"
  - id: cpp-socks5-auth-offer
    desc: SOCKS5 auth method offer
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: 'send(sock,"\x05\x02",2,0)'
  - id: cpp-socks5-login-read
    desc: SOCKS5 username read
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "recv(sock,szLogin"
  - id: cpp-socks5-success-reply
    desc: SOCKS5 success reply construction
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: 'send(sock,"\x05\x00\x00\x01",4,0)'
  - id: cpp-socks5-request-read
    desc: SOCKS5 request struct read
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "recv(sock,(char*)&req,4,0)"
  - id: cpp-socks5-address-switch
    desc: SOCKS5 address type switch
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "switch(req.uAddrType)"
  - id: cpp-socks5-tcp-relay-read
    desc: TCP relay socket read
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "recv(sockr,szBuffer,1023,0)"
  - id: cpp-socks5-tcp-relay-send
    desc: TCP relay socket write
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "send(sockw,szBuffer+uwrote"
  - id: cpp-socks5-udp-associate-relay
    desc: UDP associate relay loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'recvfrom\s*\(\s*sdest\s*,[\s\S]{0,260}sendto\s*\(\s*sres\s*,'
composite_rules:
  - id: cpp-socks5-authenticated-proxy-source
    desc: C++ authenticated SOCKS5 proxy source
    crit: hostile
    conf: 0.97
    all:
      - id: cpp-socks5-greeting-read
      - id: cpp-socks5-version-reject
      - id: cpp-socks5-success-reply
    any:
      - id: cpp-socks5-auth-offer
      - id: cpp-socks5-login-read
      - id: cpp-socks5-request-read
      - id: cpp-socks5-address-switch
      - id: cpp-socks5-tcp-relay-read
      - id: cpp-socks5-tcp-relay-send
    needs: 2
  - id: cpp-socks5-relay-source
    desc: C++ SOCKS5 TCP/UDP relay source
    crit: hostile
    conf: 0.96
    all:
      - id: cpp-socks5-tcp-relay-read
      - id: cpp-socks5-tcp-relay-send
    any:
      - id: cpp-socks5-greeting-read
      - id: cpp-socks5-udp-associate-relay
      - id: cpp-socks5-request-read
