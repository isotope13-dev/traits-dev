defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1090

composite_rules:
  - id: socks5-screen-clipboard-collection
    desc: SOCKS5 proxy with screen and clipboard collection
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/proxy/socks::socks5-version-greeting-bytes
      - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
      - id: objectives/anti-analysis/debugger-detect/check::nt-process-debug-port-info-class
      - id: objectives/anti-analysis/debugger-detect/check::nt-process-debug-flags-info-class
    unless:
      - id: well-known/app/
      - id: well-known/lib/

  - id: socks5-encrypted-memory-loader
    desc: SOCKS5 proxy with encrypted in-memory stage
    crit: hostile
    conf: 0.97
    attack: T1090,T1027,T1620
    all:
      - id: micro-behaviors/communications/proxy/socks::socks5-version-greeting-bytes
      - id: micro-behaviors/crypto/library/provider::capi-keyed-buffer-crypto-chain
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/
      - id: well-known/lib/

  - id: socks5-authenticated-tunnel-beacon
    desc: SOCKS5 tunnel with authenticated HTTP beaconing
    crit: hostile
    conf: 0.98
    attack: T1090,T1071.001
    all:
      - id: micro-behaviors/communications/proxy/socks::socks5-string
      - id: objectives/command-and-control/infrastructure/domain/tunnel::ngrok-io-endpoint
      - id: micro-behaviors/communications/http/headers::auth-header
      - id: micro-behaviors/communications/http/post::post-string-pe
    unless:
      - id: well-known/tool/reverse-engineering/
      - id: well-known/tool/sysadmin/

  - id: socks5-obfuscated-rwx-loader
    desc: High-entropy PE with SOCKS5 negotiation and executable staging
    crit: hostile
    conf: 0.99
    attack: T1090,T1027,T1055
    all:
      - id: micro-behaviors/communications/proxy/socks::socks5-version-greeting-bytes
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
      - id: metadata/binary/anomaly/signing::small-high-entropy-data-section
      - id: metadata/binary/anomaly/signing::high-entropy-rdata-section
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/framework/
      - id: metadata/binary/installer/
      - id: well-known/app/
      - id: well-known/tool/
