defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1090

composite_rules:
  - id: socks5-screen-clipboard-collection
    desc: SOCKS5 proxy with screen and clipboard collection
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/proxy/socks::socks5-version-greeting-bytes
      - id: micro-behaviors/hardware/display/screen::gdi-screen-capture-primitives
      - id: micro-behaviors/os/clipboard/access::win32-clipboard-read-write
      - id: micro-behaviors/mem/alloc/executable::executable-allocation-indicator
      - id: objectives/anti-analysis/debugger-detect/check::nt-process-debug-port-info-class
      - id: objectives/anti-analysis/debugger-detect/check::nt-process-debug-flags-info-class
    unless:
      - id: well-known/app/
      - id: well-known/lib/

  - id: socks5-encrypted-memory-loader
    desc: SOCKS5 proxy with encrypted in-memory stage
    crit: hostile
    conf: 0.97
    attack: T1090,T1027,T1620
    all:
      - id: micro-behaviors/communications/proxy/socks::socks5-version-greeting-bytes
      - id: micro-behaviors/crypto/library/provider::capi-keyed-buffer-crypto-chain
      - id: micro-behaviors/mem/protect/modify::virtual-protect
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/
      - id: well-known/lib/
