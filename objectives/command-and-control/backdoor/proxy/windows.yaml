defaults:
  attack: T1090
  mbc: B0022
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: service-proxy-backdoor
    desc: Windows service proxy backdoor
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/persistence/service/install::service-install-and-start
      - id: micro-behaviors/communications/socket/init::wsa-startup
      - id: micro-behaviors/communications/socket/listen::listen
      - id: micro-behaviors/communications/socket/connect::connect
    any:
      - id: micro-behaviors/process/create/exec::firewall-allowedprogram-cli
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/os/service/control::service-control-dispatch
