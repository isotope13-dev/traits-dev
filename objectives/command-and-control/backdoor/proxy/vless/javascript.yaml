# VLESS-over-WebSocket backdoor proxy
# Detects Node.js packages implementing VLESS proxy over WebSocket,
# a common pattern in supply-chain malware that turns deployed hosts
# into outbound proxy nodes for the attacker.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1090
  mbc: B0030
composite_rules:
  - id: vless-ws-proxy
    desc: VLESS-over-WebSocket proxy server implementation
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/proxy/vless::vless-url-scheme
      - id: micro-behaviors/communications/websocket/library::ws
      - id: micro-behaviors/communications/http/server/listener::http-createserver-call
    any:
      - id: micro-behaviors/communications/proxy/vless::vless-sni-masquerade
      - id: micro-behaviors/communications/proxy/vless::vless-tls-ws-template
  - id: vless-ws-proxy-sni-hiding
    desc: VLESS proxy with SNI masquerade (decoy domain)
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/proxy/vless::vless-sni-masquerade
      - id: micro-behaviors/communications/websocket/library::ws
