defaults:
  platforms: [linux, macos]
  for: [elf, macho]
  attack: T1090,T1071.001
  mbc: B0030

composite_rules:
  - id: websocket-pty-socks-agent
    desc: WebSocket agent multiplexes interactive PTY and SOCKS proxy streams
    crit: hostile
    conf: 0.99
    attack: T1090,T1071.001,T1059.004
    all:
      - id: micro-behaviors/communications/http/websocket::websocket-http-upgrade-headers
      - id: micro-behaviors/process/tty/pty::forkpty
      - id: objectives/command-and-control/backdoor/dispatch/websocket::websocket-shell-stream-marker
      - id: objectives/command-and-control/backdoor/dispatch/websocket::websocket-socks-stream-marker
      - id: micro-behaviors/communications/proxy/socks::socks5-string
    any:
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-elf
      - id: micro-behaviors/communications/ip/literal::external-ipv4-port-macho
    unless:
      - id: well-known/app/
      - id: well-known/tool/
  - id: websocket-pty-socks-endpoint-agent
    desc: External-endpoint WebSocket agent with interactive PTY and SOCKS proxy
    crit: hostile
    conf: 0.99
    attack: T1090,T1071.001,T1059.004,T1105
    all:
      - id: micro-behaviors/communications/http/websocket::websocket-http-upgrade-headers
      - id: micro-behaviors/process/tty/pty::forkpty
      - id: micro-behaviors/communications/proxy/socks::socks5-string
      - id: micro-behaviors/communications/ip/literal::external-ipv4-port-macho
      - id: micro-behaviors/process/create/execv::c-exec-variants
    unless:
      - id: well-known/app/
      - id: well-known/tool/
