defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1071.001,T1059.003
  mbc: B0030

composite_rules:
  - id: native-websocket-process-agent
    desc: Unsigned Windows native WebSocket agent with child-process tasking
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/websocket::websocket-http-upgrade-headers
      - id: micro-behaviors/communications/socket/init::socket-api-ordinal
      - id: micro-behaviors/communications/socket/init::connect-api-ordinal
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/process/debug/detect::is-debugger-present-import
    unless:
      - id: metadata/signed/platform/
      - id: well-known/app/
      - id: well-known/tool/
