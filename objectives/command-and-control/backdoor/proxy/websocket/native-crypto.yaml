---
defaults:
  platforms:
  - unix
  - android
  for:
  - elf
  mbc: B0030
composite_rules:
- id: native-vless-websocket-forward-proxy
  desc: Native VLESS WebSocket forwarding proxy
  crit: hostile
  conf: 0.97
  attack: T1090
  all:
  - id: micro-behaviors/communications/proxy/vless::native-vless-websocket-marker
  - id: micro-behaviors/communications/http/websocket::websocket-headers
  - id: micro-behaviors/communications/socket/listen::server-api-surface
  - id: micro-behaviors/communications/socket/connect::connect-symbol
  - id: objectives/evasion/masquerade/extension-mismatch::binary-content-as-text-extension
- id: native-websocket-implant
  desc: Native WebSocket C2 implant
  crit: hostile
  conf: 0.9
  attack: T1071.001
  all:
  - id: micro-behaviors/communications/http/websocket::websocket-headers
  - id: micro-behaviors/communications/http/download/curl::libcurl-version
  - id: micro-behaviors/crypto/asymmetric/ecdh
  any:
  - id: micro-behaviors/communications/proxy/socks::socks5h-proto
  - id: objectives/command-and-control/backdoor/proxy/tor::onion-domain-handling
  - id: micro-behaviors/crypto/symmetric/stream::openssl-chacha-poly
  unless:
  - id: well-known/tool/sysadmin/network::curl-basename
- id: rust-proxy-websocket-c2
  desc: Rust proxy-aware WebSocket C2
  crit: suspicious
  conf: 0.91
  attack: T1071.001
  platforms:
  - linux
  all:
  - id: micro-behaviors/communications/http/websocket::websocket-headers
  - id: micro-behaviors/communications/http/lib/crate::ureq-user-agent
  - id: micro-behaviors/communications/proxy/socks::socks4-proto
  - id: micro-behaviors/crypto/symmetric/stream::rust-stream-cipher
  unless:
  - id: micro-behaviors/ui/help/
  - id: metadata/signed/platform/
  - id: metadata/signed/platform::apple
- id: rust-pty-proxy-websocket-backdoor
  desc: Rust PTY proxy WebSocket backdoor
  crit: hostile
  conf: 0.96
  attack: T1059
  platforms:
  - linux
  all:
  - id: micro-behaviors/communications/http/websocket::websocket-headers
  - id: micro-behaviors/communications/http/lib/crate::ureq-user-agent
  - id: micro-behaviors/communications/proxy/socks::socks4-proto
  - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
  - id: micro-behaviors/process/tty/pty::openpty-call
  - id: micro-behaviors/fs/path/device/terminal::dev-ptmx
  any:
  - id: micro-behaviors/fs/path/config/accounts::etc-passwd
  - id: micro-behaviors/fs/proc/mounts::mounts-mountinfo
  unless:
  - id: micro-behaviors/ui/help/
  - id: metadata/signed/platform/
  - id: metadata/signed/platform::apple
