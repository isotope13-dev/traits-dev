defaults:
  platforms: [unix, windows, macos]
# Generic Stealth Backdoor Patterns
# Detects combinations of anti-analysis and evasive behaviors
# NOTE: Requires debugger detection + obfuscation + self-modify to avoid false positives
# from legitimate software (Node.js, etc.) that use timing functions or mprotect normally
composite_rules:
  - id: stealth-behavior
    desc: "Stealth backdoor behavior (Anti-analysis +"
    crit: hostile
    conf: 0.85
    attack: "T1027"
    mbc: "B0001"
    for: [elf, macho, so, dylib]
    all:
      # Require explicit anti-analysis: debugger/VM detection
      - id: objectives/anti-analysis/debugger-detect/check::process-inspection
      # Plus string obfuscation (indicates intent to hide)
      - id: objectives/anti-static/obfuscation/string/
      # Plus memory protection manipulation (indicates self-modification)
      - id: micro-behaviors/mem/protect/modify::mprotect-import
    unless:
      - id: well-known/app/drivers/
      - id: well-known/lib/nvidia-cudnn/
      - id: well-known/lib/deb-package/
      - id: well-known/tool/reverse-engineering/frida/
      - id: well-known/lib/benign-runtime-bundles/
      - id: metadata/binary/framework::dotnet-ilasm-coreclr-binary
  # System profiling backdoor with fake user agent
  - id: system-profiling-backdoor
    desc: Backdoor with old browser UA spoofing and system fingerprinting
    crit: hostile
    conf: 0.95
    attack: "T1071.001"
    for: [macho]
    platforms: [macos]
    all:
      - id: objectives/evasion/masquerade/identity/user-agent::user-agent-old-browser
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
      - id: objectives/discovery/system/hardware/sysctl::system-profiling-comp
  # System profiling backdoor with specific IE8 user agent
  - id: system-profiling-backdoor-ie8
    desc: Backdoor with MSIE 8.0 UA spoofing and macOS system enumeration
    crit: hostile
    conf: 1.0
    attack: "T1071.001"
    for: [macho]
    platforms: [macos]
    all:
      - id: objectives/evasion/masquerade/identity/user-agent::user-agent-msie8
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
      - id: objectives/discovery/system/install::install-log-grep
      - id: objectives/discovery/system/hardware/sysctl::sysctl-hw-model-dup
      - id: objectives/discovery/system/hardware/sysctl::sysctl-cpu-brand-dup
      - id: objectives/discovery/system/hardware/sysctl::sw-vers-product
  - id: covert-proc-inspection-backdoor
    desc: Covert C2 process-inspection backdoor
    crit: hostile
    conf: 0.96
    attack: "T1071,T1057"
    mbc: "B0030,E1057"
    all:
      - id: objectives/command-and-control/channel/covert::covert-protocol-markers
      - id: micro-behaviors/fs/proc/info/path::process-maps-cmdline-fragment-cluster
