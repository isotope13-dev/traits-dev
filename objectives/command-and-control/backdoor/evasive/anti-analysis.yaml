defaults:
  platforms: [unix, windows, macos]
# Generic backdoor patterns
composite_rules:
  # System profiling backdoor with fake user agent
  - id: system-profiling-backdoor
    desc: Backdoor with old browser UA spoofing and system fingerprinting
    crit: hostile
    conf: 0.95
    attack: "T1071.001"
    for: [macho]
    platforms: [macos]
    all:
      - id: objectives/evasion/masquerade/identity/user-agent::user-agent-old-browser
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
      - id: objectives/discovery/system/hardware/sysctl::system-profiling-comp
  # System profiling backdoor with specific IE8 user agent
  - id: system-profiling-backdoor-ie8
    desc: Backdoor with MSIE 8.0 UA spoofing and macOS system enumeration
    crit: hostile
    conf: 1.0
    attack: "T1071.001"
    for: [macho]
    platforms: [macos]
    all:
      - id: objectives/evasion/masquerade/identity/user-agent::user-agent-msie8
      - id: micro-behaviors/fs/path/temp::tmp-hidden-file
      - id: objectives/discovery/system/install::install-log-grep
      - id: objectives/discovery/system/hardware/sysctl::sysctl-hw-model-dup
      - id: objectives/discovery/system/hardware/sysctl::sysctl-cpu-brand-dup
      - id: objectives/discovery/system/hardware/sysctl::sw-vers-product
  - id: covert-proc-inspection-backdoor
    desc: Covert C2 process-inspection backdoor
    crit: hostile
    conf: 0.96
    attack: "T1071,T1057"
    mbc: "B0030,E1057"
    all:
      - id: objectives/command-and-control/channel/covert::covert-protocol-markers
      - id: micro-behaviors/fs/proc/info/path::process-maps-cmdline-fragment-cluster
  - id: covert-c2-process-fingerprint-backdoor
    desc: Covert C2 with procfs process fingerprinting
    crit: hostile
    conf: 0.97
    attack: "T1071,T1057,T1082"
    mbc: "B0030,E1057"
    for: [elf]
    all:
      - id: objectives/command-and-control/channel/covert::covert-protocol-markers
      - id: micro-behaviors/fs/proc/info/path::proc-net-tcp
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
      - id: micro-behaviors/fs/proc/info/path::process-pid-exe-template
    any:
      - id: micro-behaviors/os/syscall/invoke::svc-read
      - id: micro-behaviors/os/syscall/invoke::svc-write
  - id: native-self-locating-shell-direct-syscall
    desc: Native self-locating shell launcher using direct MIPS syscalls
    crit: hostile
    conf: 0.96
    attack: T1059.004,T1105
    mbc: B0028
    for: [elf]
    platforms: [linux]
    arch: [mips]
    all:
      - id: micro-behaviors/fs/proc/info/path::process-self-exe-path
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
      - id: micro-behaviors/os/syscall/raw::mips-direct-syscall-instruction
    unless:
      - id: well-known/tool/reverse-engineering/frida::frida-server-native
      - id: well-known/tool/reverse-engineering/frida::frida-inject-native
      - id: well-known/tool/reverse-engineering/frida::frida-agent-native
      - id: well-known/tool/reverse-engineering/frida::frida-gadget-native
      - id: well-known/app/meshcentral::meshcentral-agent-binary-context
