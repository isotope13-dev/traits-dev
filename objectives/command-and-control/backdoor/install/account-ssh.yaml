# Complete Backdoor Installation Chains
# Detects multi-step attack sequences combining account creation with persistent access
# Generic indicator for comprehensive system compromise
defaults:
  mbc: E1015
  platforms: [linux, unix, android, macos, ios]
  for: [elf, shell]
composite_rules:
  - id: account-ssh-access-setup
    desc: Account creation with SSH access setup
    crit: notable
    conf: 0.92
    attack: "T1098.004"
    all:
      - id: micro-behaviors/os/user/account::useradd-command
      - id: micro-behaviors/os/user/account::useradd-login-shell
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
  - id: password-set-privilege-escalation
    desc: Password setting with privilege escalation
    crit: hostile
    conf: 0.90
    attack: "T1136.001"
    all:
      - id: micro-behaviors/os/user/account::chpasswd-command
      - id: objectives/persistence/login/account/create::privilege-escalation-setup
    unless:
      - id: metadata/package/quality/recognized-contexts::pvetui-ansible-bootstrap-context
      - id: well-known/app/gns3::gns3-remote-install-context
  - id: complete-backdoor-installation
    desc: Complete backdoor account and SSH setup
    crit: hostile
    conf: 0.95
    attack: "T1098.004"
    all:
      - id: objectives/persistence/login/account/create::account-creation
      - id: objectives/persistence/login/account/create::privilege-escalation-setup
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
      - id: objectives/lateral-movement/ssh/backdoor-deploy::sshd-restart
