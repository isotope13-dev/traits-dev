defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: "T1113, T1071"

composite_rules:
  - id: native-screen-network-cleanup
    desc: Native screen access with network cleanup
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/hardware/display/screen::gdi-create-compatible-dc
      - id: micro-behaviors/hardware/display/screen::get-desktop-window
      - id: micro-behaviors/communications/socket/init::wsa-startup
      - id: micro-behaviors/fs/file/delete::deletefile-w
    any:
      - id: micro-behaviors/fs/sync/fsync::set-file-time
      - id: micro-behaviors/process/create/exec::shell-execute
      - id: micro-behaviors/communications/ipc/named-pipe::pipe-path-prefix
    unless:
      - id: well-known/lib/videolan::videolan-codec-lib

  - id: native-desktop-context-loader
    desc: Native loader samples desktop context
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/command-and-control/backdoor/loader/native-reflect::custom-pe-loader
      - id: micro-behaviors/hardware/display/screen::gdi-create-compatible-dc
      - id: micro-behaviors/hardware/display/screen::get-desktop-window
    any:
      - id: micro-behaviors/communications/socket/init::wsa-startup
      - id: micro-behaviors/process/create/exec::shell-execute
