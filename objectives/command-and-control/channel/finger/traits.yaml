defaults:
  platforms: [windows]
  for: [batch, powershell, javascript, html]
  attack: T1071
  mbc: B0030

traits:
  - id: for-f-skip-delims-loop
    desc: for-f skip delims loop
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)\bfor\s+/f\s+"skip=\d{1,3}\s+delims="\s+%{1,2}[A-Za-z]\s+in\s+\('
  - id: for-f-finger-loop
    desc: for-f loops over finger output
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bfor\s+/f\b.{0,160}\bfinger(\.exe)?\s+[A-Za-z0-9._-]{2,64}@'
  - id: call-for-variable-line
    desc: calls command from loop variable
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bdo\s+call\s+%{1,2}[A-Za-z]\b'
  - id: minimized-finger-start
    desc: minimized finger retrieval window
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bstart\s+(""\s+)?/min\b.{0,220}\bfinger(\.exe)?\b'
  - id: verify-human-echo-prompt
    desc: fake verify-human echo prompt
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)echo\s+["'']?\s*-{2,}\s*Verify\s+you\s+are\s+human.{0,80}press\s+ENTER'
  - id: cmd-k-minimized-finger-loop
    desc: cmd-k minimized finger loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?i)\bcmd\s+/k\b.{0,120}\bstart\b.{0,80}/min\b.{0,180}\bfinger(\.exe)?\b'

composite_rules:
  - id: finger-output-command-execution
    desc: Executes commands returned by finger
    crit: hostile
    conf: 0.98
    all:
      - id: for-f-finger-loop
      - id: call-for-variable-line
    any:
      - id: for-f-skip-delims-loop
      - id: minimized-finger-start
      - id: cmd-k-minimized-finger-loop
  - id: clickfix-finger-lolbin-command
    desc: ClickFix finger LOLBin C2 command
    crit: hostile
    conf: 0.99
    all:
      - id: finger-output-command-execution
    any:
      - id: verify-human-echo-prompt
      - id: objectives/execution/lure/clipboard::browser-clipboard-write
      - id: objectives/execution/lure/clipboard::encoded-browser-clipboard-write
      - id: objectives/execution/lure/clipboard::generic-windows-command-clipboard-lure
