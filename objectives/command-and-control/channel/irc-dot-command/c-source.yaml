defaults:
  platforms: [windows, unix]
  for: [c, cpp]
traits:
  - id: dot-login-command
    desc: IRC bot login command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ":.login"
  - id: dot-upgrade-command
    desc: IRC bot upgrade command
    crit: suspicious
    conf: 0.95
    attack: T1105
    if:
      type: text
      substr: ":.upgrade"
  - id: dot-scan-command
    desc: IRC bot scan command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ":.scan"
  - id: dot-advscan-command
    desc: IRC bot advscan command
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: ":.advscan"
  - id: dot-synflood-command
    desc: IRC bot SYN flood command
    crit: suspicious
    conf: 0.97
    attack: T1498
    if:
      type: text
      substr: ":.synflood"
  - id: irc-wget-chmod-upgrade
    desc: IRC bot wget chmod upgrade
    crit: suspicious
    conf: 0.96
    attack: T1105
    if:
      type: text
      substr: "wget %s/%s -P /var/tmp && chmod +x"
composite_rules:
  - id: dot-command-irc-bot-control
    desc: Dot-command IRC bot control
    crit: hostile
    conf: 0.98
    attack: T1071.001,T1105,T1498
    all:
      - id: objectives/command-and-control/channel/irc/bot::privmsg
    any:
      - id: objectives/command-and-control/channel/irc-dot-command
    needs: 4
