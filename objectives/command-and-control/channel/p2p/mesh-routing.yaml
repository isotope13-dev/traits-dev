defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
  attack: T1090.003
  mbc: B0030
traits:
  - id: peer-connected-message
    desc: Peer connection diagnostic message
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '\bconnected to peer\b[^\n]{0,40}%s'
  - id: peer-removed-message
    desc: Peer removal diagnostic message
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: '\bpeer\b\s+%s\s+(removed|not found|already exists)'
  - id: peer-route-added-message
    desc: Mesh routing table add message
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\broute added\b[^\n]{0,40}%s\s+via\s+%s'
  - id: peer-max-reached-message
    desc: Mesh peer cap diagnostic message
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\bmax peers reached\b'
  - id: peers-routes-json
    desc: JSON peers and routes table
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\{"peers":\s*\['
composite_rules:
  - id: agent-mesh-router
    desc: Implant relays C2 via peer-to-peer
    crit: hostile
    conf: 0.96
    needs: 2
    any:
      - id: peer-connected-message
      - id: peer-removed-message
      - id: peer-route-added-message
      - id: peer-max-reached-message
      - id: peers-routes-json
