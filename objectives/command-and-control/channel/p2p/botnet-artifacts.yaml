defaults:
  platforms:
    - unix
    - android
  for:
    - elf
traits:
  - id: storm-str
    desc: Storm P2P protocol term
    crit: component
    if:
      type: text
      regex: '(?i)\bipstorm\b|\bstorm[-_ ]?(dht|p2p|peer)\b'
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - id: well-known/app/drivers/
      - id: metadata/binary/section/name::fwimage-section
  - id: mozi-artifact
    desc: Mozi botnet identifier string
    crit: notable
    conf: 0.7
    if:
      type: text
      word: mozi
      case_insensitive: true
  - id: dht-node-str
    desc: dht_node string
    crit: component
    if:
      type: text
      substr: dht_node
  - id: netgear-str
    desc: Netgear vendor string
    crit: component
    if:
      type: text
      substr: netgear
      case_insensitive: true
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: huawei-str
    desc: Huawei vendor string
    crit: component
    if:
      type: text
      substr: huawei
      case_insensitive: true
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - id: well-known/app/drivers/
      - id: well-known/app/drivers::gsp-firmware-binary-path
      - id: well-known/app/drivers::arch-nvidia-utils-package
      - id: metadata/binary/section/name::fwimage-section
  - id: find-node-str
    desc: find_node DHT operation
    crit: component
    if:
      type: text
      word: find_node
  - id: store-value-str
    desc: store_value DHT operation
    crit: component
    if:
      type: text
      substr: store_value
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: get-peers-str
    desc: get_peers DHT operation
    crit: component
    if:
      type: text
      substr: get_peers
  - id: announce-peer-str
    desc: announce_peer DHT operation
    crit: component
    if:
      type: text
      substr: announce_peer
  - id: info-hash-str
    desc: info_hash DHT/BitTorrent field
    crit: component
    if:
      type: text
      substr: info_hash
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: bencode-d1
    desc: 'Bencode d1: dictionary marker'
    crit: component
    if:
      type: text
      substr: 'd1:'
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: bencode-e1
    desc: 'Bencode e1: marker'
    crit: component
    if:
      type: text
      substr: 'e1:'
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: fritzfrog-name
    desc: FritzFrog malware name
    crit: component
    if:
      type: text
      word: fritzfrog
      case_insensitive: true
  - id: ifrit-name
    desc: Ifrit malware name
    crit: component
    if:
      type: text
      word: ifrit
  - id: p2p-word
    desc: P2P word reference
    crit: component
    if:
      type: text
      word: P2P
    unless:
      - id: well-known/app/drivers/
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: ssh-pass-str
    desc: ssh_pass string
    crit: component
    if:
      type: text
      substr: ssh_pass
  - id: brute-str
    desc: Brute force reference
    crit: component
    if:
      type: text
      substr: brute
      case_insensitive: true
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: bencoded-get-peers-query
    desc: BitTorrent-style DHT get_peers query frame
    crit: notable
    conf: 0.95
    if:
      type: text
      exact: 'e1:q9:get_peers1:t2:'
  - id: pipe-delimited-host-report
    desc: Pipe-delimited host report format
    crit: component
    conf: 0.96
    if:
      type: text
      substr: 'R%s|%s|%s|%ld|%ld|%ld|'
composite_rules:
  - id: signed-dht-command-channel
    desc: Signed DHT channel with compact host-report framing
    crit: suspicious
    conf: 0.98
    attack: T1090.003
    all:
      - id: bencoded-get-peers-query
      - id: pipe-delimited-host-report
  - id: signed-dht-shell-bot
    desc: Signed DHT command bot with system-shell execution capability
    crit: hostile
    conf: 0.99
    attack: T1059.004,T1090.003
    mbc: B0022
    all:
      - id: signed-dht-command-channel
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
      - id: micro-behaviors/process/create/shell/spawn::system-fn
      - id: micro-behaviors/communications/socket/connect::connect-symbol
  - id: ipfs-libp2p
    desc: IPFS and libp2p combination
    crit: component
    all:
      - id: micro-behaviors/communications/url/scheme::ipfs-str
      - id: micro-behaviors/communications/socket/framing::libp2p-library-reference
  - id: storm-dht
    desc: Storm and DHT combination
    crit: component
    all:
      - id: storm-str
      - id: micro-behaviors/communications/socket/framing::go-libp2p-kad-dht-reference
  - id: libp2p-peer
    desc: libp2p and peer.ID combination
    crit: component
    all:
      - id: micro-behaviors/communications/socket/framing::libp2p-library-reference
      - id: micro-behaviors/communications/socket/framing::libp2p-peer-id-reference
  - id: ipstorm
    desc: IPStorm P2P botnet indicators
    crit: suspicious
    conf: 0.95
    attack: T1090.003
    any:
      - id: ipfs-libp2p
      - id: storm-dht
      - id: libp2p-peer
  - id: iot-vendor
    desc: IoT vendor reference
    crit: component
    any:
      - id: netgear-str
      - id: huawei-str
  - id: dht-iot-bootstrap
    desc: P2P DHT bootstrapping for IoT
    crit: suspicious
    conf: 0.8
    attack: T1090.003
    all:
      - id: dht-node-str
      - id: iot-vendor
  - id: dht-find-store
    desc: DHT find_node and store_value
    crit: component
    all:
      - id: find-node-str
      - id: store-value-str
  - id: dht-operation-any
    desc: Any DHT operation string
    crit: component
    any:
      - id: get-peers-str
      - id: announce-peer-str
      - id: find-node-str
      - id: info-hash-str
      - id: store-value-str
      - id: dht-node-str
  - id: dht-operations-3plus
    desc: Three or more distinct DHT operation strings
    crit: component
    needs: 3
    any:
      - id: get-peers-str
      - id: announce-peer-str
      - id: find-node-str
      - id: info-hash-str
      - id: store-value-str
      - id: dht-node-str
  - id: bencode-dict-markers
    desc: Bencode dictionary/list markers
    crit: component
    any:
      - id: bencode-d1
      - id: bencode-e1
  - id: dht-network
    desc: Kademlia DHT networking
    crit: notable
    conf: 0.5
    any:
      - id: micro-behaviors/communications/socket/framing::kademlia-dht-reference
      - id: micro-behaviors/communications/socket/framing::go-libp2p-kad-dht-reference
      - id: dht-find-store
  - id: ssh-brute-indicators
    desc: SSH brute force indicators
    crit: component
    any:
      - id: ssh-pass-str
      - id: brute-str
  - id: p2p-ssh-brute
    desc: P2P SSH brute force pattern
    crit: component
    all:
      - id: p2p-word
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
      - id: ssh-brute-indicators
  - id: fritzfrog
    desc: FritzFrog P2P SSH worm
    crit: suspicious
    conf: 0.95
    attack: T1110
    any:
      - id: fritzfrog-name
      - id: ifrit-name
      - id: p2p-ssh-brute
