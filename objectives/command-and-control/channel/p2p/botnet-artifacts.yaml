defaults:
  platforms:
    - unix
    - android
  for:
    - elf
traits:
  - id: libp2p-str
    desc: libp2p library reference
    crit: component
    if:
      type: text
      substr: libp2p
  - id: storm-str
    desc: Storm string reference
    crit: component
    if:
      type: text
      substr: storm
      case_insensitive: true
  - id: kad-dht-str
    desc: go-libp2p-kad-dht reference
    crit: component
    if:
      type: text
      substr: github.com/libp2p/go-libp2p-kad-dht
  - id: peer-id-str
    desc: peer.ID reference
    crit: component
    if:
      type: text
      substr: peer.ID
  - id: mozi-artifact
    desc: Mozi botnet identifier string
    crit: notable
    conf: 0.7
    if:
      type: text
      word: mozi
      case_insensitive: true
  - id: dht-node-str
    desc: dht_node string
    crit: component
    if:
      type: text
      substr: dht_node
  - id: bootstrap-str
    desc: bootstrap string
    crit: component
    if:
      type: text
      word: bootstrap
  - id: netgear-str
    desc: Netgear vendor string
    crit: component
    if:
      type: text
      substr: netgear
      case_insensitive: true
  - id: huawei-str
    desc: Huawei vendor string
    crit: component
    if:
      type: text
      substr: huawei
      case_insensitive: true
  - id: kademlia-str
    desc: Kademlia protocol reference
    crit: component
    if:
      type: text
      substr: kademlia
      case_insensitive: true
  - id: kad-dht-hyphen
    desc: kad-dht string
    crit: component
    if:
      type: text
      substr: kad-dht
  - id: libp2p-kad-dht
    desc: go-libp2p-kad-dht string
    crit: component
    if:
      type: text
      substr: go-libp2p-kad-dht
  - id: find-node-str
    desc: find_node DHT operation
    crit: component
    if:
      type: text
      word: find_node
  - id: store-value-str
    desc: store_value DHT operation
    crit: component
    if:
      type: text
      substr: store_value
  - id: fritzfrog-name
    desc: FritzFrog malware name
    crit: component
    if:
      type: text
      word: fritzfrog
      case_insensitive: true
  - id: ifrit-name
    desc: Ifrit malware name
    crit: component
    if:
      type: text
      word: ifrit
  - id: p2p-word
    desc: P2P word reference
    crit: component
    if:
      type: text
      word: P2P
  - id: ssh-pass-str
    desc: ssh_pass string
    crit: component
    if:
      type: text
      substr: ssh_pass
  - id: brute-str
    desc: Brute force reference
    crit: component
    if:
      type: text
      substr: brute
      case_insensitive: true
composite_rules:
  - id: ipfs-libp2p
    desc: IPFS and libp2p combination
    crit: component
    all:
      - id: micro-behaviors/communications/url/scheme::ipfs-str
      - id: libp2p-str
  - id: storm-dht
    desc: Storm and DHT combination
    crit: component
    all:
      - id: storm-str
      - id: kad-dht-str
  - id: libp2p-peer
    desc: libp2p and peer.ID combination
    crit: component
    all:
      - id: libp2p-str
      - id: peer-id-str
  - id: ipstorm
    desc: IPStorm P2P botnet indicators
    crit: suspicious
    conf: 0.95
    attack: T1090.003
    any:
      - id: ipfs-libp2p
      - id: storm-dht
      - id: libp2p-peer
  - id: iot-vendor
    desc: IoT vendor reference
    crit: component
    any:
      - id: netgear-str
      - id: huawei-str
  - id: dht-iot-bootstrap
    desc: P2P DHT bootstrapping for IoT
    crit: suspicious
    conf: 0.8
    attack: T1090.003
    all:
      - id: dht-node-str
      - id: bootstrap-str
      - id: iot-vendor
  - id: dht-find-store
    desc: DHT find_node and store_value
    crit: component
    all:
      - id: find-node-str
      - id: store-value-str
  - id: dht-network
    desc: Kademlia DHT networking
    crit: notable
    conf: 0.5
    any:
      - id: kademlia-str
      - id: kad-dht-hyphen
      - id: libp2p-kad-dht
      - id: dht-find-store
  - id: ssh-brute-indicators
    desc: SSH brute force indicators
    crit: component
    any:
      - id: ssh-pass-str
      - id: brute-str
  - id: p2p-ssh-brute
    desc: P2P SSH brute force pattern
    crit: component
    all:
      - id: p2p-word
      - id: objectives/credential-access/ssh/key::authorized-keys
      - id: ssh-brute-indicators
  - id: fritzfrog
    desc: FritzFrog P2P SSH worm
    crit: suspicious
    conf: 0.95
    attack: T1110
    any:
      - id: fritzfrog-name
      - id: ifrit-name
      - id: p2p-ssh-brute
