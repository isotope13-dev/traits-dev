defaults:
  platforms: [windows]
  for: [pe]
  crit: component
  conf: 0.8
  attack: T1095

traits:
  - id: mack-protocol
    desc: "MACK protocol acknowledgment artifact"
    if:
      type: text
      substr: awaitingMACK

  - id: mack-timer
    desc: MACK timer for reliable delivery
    if:
      type: text
      substr: MACKTimer

  - id: socket-send-method
    desc: Custom socket send method in .NET
    if:
      type: text
      substr: SocketSend

  - id: msg-rcvd-method
    desc: Custom message received handler in .NET
    if:
      type: text
      substr: MsgRcvd

  - id: password-protected-channel
    desc: Password-protected communication channel
    if:
      type: text
      substr: isPasswordProtected

  - id: broadcast-port-hardcoded
    desc: Hardcoded UDP broadcast port in error string
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "Broadcast Port [0-9]{4}"

composite_rules:
  - id: mack-reliable-udp
    desc: MACK reliable delivery over UDP
    crit: suspicious
    conf: 0.85
    all:
      - id: mack-protocol
      - id: mack-timer
    any:
      - id: socket-send-method
      - id: msg-rcvd-method

  - id: xor-encrypted-udp-chat
    desc: XOR-encrypted UDP broadcast peer chat
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/crypto/symmetric/xor/term::xor-message-method
      - id: micro-behaviors/communications/socket/udp::udp-broadcast-peer-comm
      - id: mack-reliable-udp
      - id: password-protected-channel
