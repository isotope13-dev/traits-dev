defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: fallback-exfil-channels
    desc: "Contains fallback HTTP POST and WebSocket exfiltration capabilities"
    conf: 0.85
    crit: notable
    attack: T1041
    for: [javascript, typescript]
    near_lines: 40
    all:
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/communications/http/websocket::websocket-class
    unless:
      - id: metadata/library::rxjs-websocket-constructor-error
      - id: metadata/library::rxjs-cold-observable-offset-error
      - id: metadata/format/magic::pe-dos-stub
      - id: objectives/command-and-control/infrastructure/domain::repl-co
    downgrade:
      any:
        - {id: 'metadata/dev/testing::is-test'}
        - {id: 'metadata/dev/testing::test-basename-pattern'}
