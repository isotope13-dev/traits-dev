# Hardcoded C2 Authentication Headers
# Detects hardcoded secret/auth headers in HTTP requests
# Used by OtterCookie (x-secret-key) and other malware for C2 auth
# ATT&CK: T1071.001 (Application Layer Protocol: Web Protocols)
defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1071.001
  mbc: C0002
traits:
- id: x-secret-key-header
  desc: Hardcoded x-secret-key header
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: "\"x-secret-key\"\\s*:\\s*\"[^\"]{1,100}\""
- id: x-api-secret-header
  desc: Hardcoded x-api-secret header
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: "\"x-api-secret\"\\s*:\\s*\"[^\"]{1,100}\""
- id: x-auth-token-hardcoded
  desc: Hardcoded x-auth-token header
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: "\"x-auth-token\"\\s*:\\s*\"[A-Za-z0-9+/=]{8,}\""
- id: headers-with-hardcoded-secret
  desc: Headers object with secret value
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: "headers\\s*:\\s*\\{.{0,200}\"secret\"\\s*:\\s*\"[^\"]{1,100}\""
  not:
  - regex: test
  - regex: spec
  - regex: mock
  - regex: fixture
  - regex: example

# NOTE: an `x-admin-token` header carrying a token from a config object, sent
# to an IP-literal host (sslip.io/nip.io), is the ordinary shape of a client
# for a *self-hosted* backend — the token authenticates the operator to their
# own server, and IP-literal wildcard DNS is how bare VPS deployments obtain a
# TLS certificate without owning a domain. Shipping that credential in a
# published artifact is a credential-hygiene weakness, not a C2 channel; it is
# already reported by the `hardcoded-token-config-field` and
# `x-admin-token-header` micro-behaviors. A hostile verdict needs the channel
# to carry executable tasking or stolen data, which the extension-RAT and
# remote-eval composites cover.
