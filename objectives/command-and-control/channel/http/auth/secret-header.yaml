# Hardcoded C2 Authentication Headers
# Detects hardcoded secret/auth headers in HTTP requests
# Used by OtterCookie (x-secret-key) and other malware for C2 auth
# ATT&CK: T1071.001 (Application Layer Protocol: Web Protocols)
defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
  for:
    - javascript
    - typescript
    - python
  attack: T1071.001
  mbc: C0002
traits:
  - id: x-secret-key-header
    desc: Hardcoded x-secret-key header
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: "\"x-secret-key\"\\s*:\\s*\"[^\"]{1,100}\""
  - id: x-api-secret-header
    desc: Hardcoded x-api-secret header
    crit: notable
    conf: 0.8
    if:
      type: raw
      regex: "\"x-api-secret\"\\s*:\\s*\"[^\"]{1,100}\""
  - id: x-auth-token-hardcoded
    desc: Hardcoded x-auth-token header
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: "\"x-auth-token\"\\s*:\\s*\"[A-Za-z0-9+/=]{8,}\""
  - id: headers-with-hardcoded-secret
    desc: Headers object with secret value
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: "headers\\s*:\\s*\\{.{0,200}\"secret\"\\s*:\\s*\"[^\"]{1,100}\""
    not:
      - regex: (test|spec|mock|fixture|example)
composite_rules:
  - id: hardcoded-secret-header
    desc: Hardcoded secret auth header
    crit: suspicious
    conf: 0.85
    any:
      - id: x-secret-key-header
      - id: x-api-secret-header
      - id: x-auth-token-hardcoded
      - id: headers-with-hardcoded-secret
