# Hardcoded C2 Authentication Headers
# Detects hardcoded secret/auth headers in HTTP requests
# Used by OtterCookie (x-secret-key) and other malware for C2 auth
# ATT&CK: T1071.001 (Application Layer Protocol: Web Protocols)
defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1071.001
  mbc: C0002
traits:
- id: x-secret-key-header
  desc: Hardcoded x-secret-key header
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: "\"x-secret-key\"\\s*:\\s*\"[^\"]{1,100}\""
- id: x-api-secret-header
  desc: Hardcoded x-api-secret header
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: "\"x-api-secret\"\\s*:\\s*\"[^\"]{1,100}\""
- id: x-auth-token-hardcoded
  desc: Hardcoded x-auth-token header
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: "\"x-auth-token\"\\s*:\\s*\"[A-Za-z0-9+/=]{8,}\""
- id: headers-with-hardcoded-secret
  desc: Headers object with secret value
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: "headers\\s*:\\s*\\{.{0,200}\"secret\"\\s*:\\s*\"[^\"]{1,100}\""
  not:
  - regex: test
  - regex: spec
  - regex: mock
  - regex: fixture
  - regex: example

composite_rules:
  - id: browser-extension-hardcoded-admin-control-channel
    desc: Extension hardcoded admin channel to tunnel endpoint
    crit: hostile
    conf: 0.98
    for: [javascript, xpi, crx]
    scope: archive
    all:
      - id: micro-behaviors/communications/http/request/client::hardcoded-token-config-field
      - id: micro-behaviors/communications/http/request/client::x-admin-token-header
      - id: objectives/command-and-control/infrastructure/domain/tunnel::sslip-io-ip-tunnel
      - id: micro-behaviors/communications/http/request/client::http-post-json
