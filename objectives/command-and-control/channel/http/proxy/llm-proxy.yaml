defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, scripts, binaries]
  attack: T1071.001
composite_rules:
  - id: llm-api-proxy-channel
    desc: LLM API proxy channel
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/llm::gpt-proxy-log-prefix
    any:
      - id: micro-behaviors/communications/http/llm::llm-chat-completions-path
      - id: micro-behaviors/communications/http/llm::llm-responses-path
      - id: micro-behaviors/communications/http/llm::llm-messages-path
      - id: micro-behaviors/communications/http/websocket::websocket
      - id: micro-behaviors/communications/http/server/listener::listenandserve-call
      - id: micro-behaviors/communications/http/server/listener::listenandservetls-call
      - id: micro-behaviors/communications/proxy::reverse-proxy
      - id: objectives/command-and-control/channel/tunnel/proxy::hidden-config-proxy-tunnel
    needs: 2
  - id: hidden-config-llm-proxy-tunnel
    desc: Hidden encrypted config with LLM proxy tunnel
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/command-and-control/infrastructure/config::hidden-encrypted-runtime-config
      - id: micro-behaviors/communications/http/llm::gpt-proxy-log-prefix
    any:
      - id: micro-behaviors/communications/http/llm::llm-chat-completions-path
      - id: micro-behaviors/communications/http/llm::llm-responses-path
      - id: micro-behaviors/communications/http/llm::llm-messages-path
      - id: objectives/command-and-control/channel/tunnel/proxy::hidden-config-proxy-tunnel
      - id: micro-behaviors/communications/proxy/tunnel::go-reverse-socks-tunnel-help
      - id: micro-behaviors/communications/proxy/tunnel::go-ngrok-tunnel-stack
      - id: micro-behaviors/communications/proxy/socks::socks
    needs: 2
