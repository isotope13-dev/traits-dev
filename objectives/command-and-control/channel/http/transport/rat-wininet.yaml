defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
  attack: T1071.001
traits:
  - id: security-themed-user-agent
    desc: Security-themed RAT user agent
    crit: component
    conf: 0.86
    if:
      type: text
      substr: SecurityNotifier
  - id: notify-heartbeat-endpoint
    desc: RAT heartbeat notify endpoint
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /notify?event=heartbeat
  - id: notify-log-endpoint
    desc: RAT log notify endpoint
    crit: component
    conf: 0.88
    if:
      type: text
      substr: /notify?event=log
  - id: user-public-ip-query
    desc: User and public IP C2 query
    crit: component
    conf: 0.86
    if:
      type: text
      substr: public_ip=
  - id: upload-monitoring-endpoint
    desc: Monitoring upload C2 endpoint
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '/upload-(screen|keylog|webcam|audio)\b'
  - id: upload-data-endpoint
    desc: Data upload C2 endpoint
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '/upload-(tokens|clipboard|sysinfo)\b'
  - id: shell-io-endpoint
    desc: Remote shell I/O endpoint
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '/(upload-shell-output|get-shell-input)\b'
  - id: client-file-transfer-endpoint
    desc: Client file transfer endpoint
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '/client-(download|upload)\?user='
  - id: rat-action-log-format
    desc: RAT action status log format
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'Action:\s*\[[A-Z_]+'
composite_rules:
  - id: wininet-heartbeat-notify-c2
    desc: WinINet RAT heartbeat C2
    crit: suspicious
    conf: 0.94
    all:
      - id: notify-heartbeat-endpoint
      - id: user-public-ip-query
    any:
      - id: security-themed-user-agent
      - id: micro-behaviors/communications/http/get::wininet-http-flow
      - id: micro-behaviors/communications/http/get::wininet-http-client-src
  - id: multi-capability-upload-c2
    desc: Multi-capability RAT upload C2
    crit: hostile
    conf: 0.96
    any:
      - id: upload-monitoring-endpoint
      - id: upload-data-endpoint
      - id: shell-io-endpoint
      - id: client-file-transfer-endpoint
      - id: notify-log-endpoint
      - id: rat-action-log-format
    needs: 3
    all:
      - id: security-themed-user-agent
  - id: remote-shell-file-transfer-c2
    desc: Remote shell with file transfer C2
    crit: hostile
    conf: 0.95
    all:
      - id: shell-io-endpoint
      - id: client-file-transfer-endpoint
    any:
      - id: security-themed-user-agent
      - id: micro-behaviors/communications/http/get::wininet-http-flow
      - id: micro-behaviors/communications/http/get::wininet-http-client-src
