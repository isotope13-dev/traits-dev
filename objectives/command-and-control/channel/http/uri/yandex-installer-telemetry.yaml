defaults:
  platforms: [windows]
  for: [pe]
  attack: T1071.001

composite_rules:
  - id: yandex-installer-telemetry-injector
    desc: Yandex telemetry query in injector
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/communications/http/url/query::yandex-installer-telemetry-query
      - id: objectives/discovery/process/targeting::taskhostw-target
      - id: micro-behaviors/os/syscall/invoke::ntdll-direct-memory-op-a
      - id: micro-behaviors/os/syscall/invoke::ntdll-direct-process-op
