defaults:
  platforms: [android]
  for: [apk, zip, java, kotlin]
  crit: suspicious
  conf: 0.9
  attack: T1071.001

traits:
  - id: android-v3-gettype-command
    desc: Android v3 command polling endpoint
    if:
      type: text
      substr: "v3/getType"
  - id: android-v3-status-endpoints
    desc: Android v3 status endpoints
    if:
      type: text
      regex: "v3/(setStatus|setEvent)"
  - id: android-v3-media-endpoints
    desc: Android v3 media upload endpoints
    if:
      type: text
      regex: "v3/(images|videos|audios)"
  - id: android-v3-document-endpoints
    desc: Android v3 document upload endpoints
    if:
      type: text
      regex: "v3/(docs|archives)"
  - id: android-v3-message-endpoints
    desc: Android v3 message upload endpoints
    if:
      type: text
      regex: "v3/(contacts|sms)"

composite_rules:
  - id: android-v3-spyware-c2-workflow
    desc: Android v3 spyware C2 workflow
    crit: hostile
    conf: 0.98
    all:
      - id: android-v3-gettype-command
      - id: android-v3-status-endpoints
    any:
      - id: android-v3-media-endpoints
      - id: android-v3-document-endpoints
      - id: android-v3-message-endpoints
    needs: 2
  - id: android-v3-file-exfil-spyware
    desc: Android v3 file exfiltration spyware
    crit: hostile
    conf: 0.985
    all:
      - id: android-v3-spyware-c2-workflow
      - id: objectives/collection/file-targeting/filter::android-mime-file-exfil-targeting
    any:
      - id: objectives/collection/file-targeting/filter::android-backup-and-recent-file-sweep
      - id: objectives/exfiltration/stealer/credential/sms::android-sms-otp-exfil
