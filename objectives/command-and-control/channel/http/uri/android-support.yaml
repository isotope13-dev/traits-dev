defaults:
  platforms: [android, unix, windows]
  for: [apk, zip]
  crit: component
  conf: 0.9
  attack: "T1071.001"

traits:
  - id: android-support-client-checkin
    desc: Android support API check-in
    if:
      type: text
      substr: "/api/support/client.html?language=%s&packagename=%s"

  - id: android-support-request-url
    desc: Android support API requests URL
    if:
      type: text
      substr: "/api/support/requestUrl/%s"

  - id: android-support-install-status
    desc: Android support API install status
    if:
      type: text
      substr: "/api/support/setInstalled/%s/%b/%s"

  - id: android-support-success-status
    desc: Android support API success status
    if:
      type: text
      substr: "/api/support/setSuccess/%s/%b"

  - id: android-support-activity-status
    desc: Android support API activity status
    if:
      type: text
      substr: "/api/support/isActivityOpen/%s/%b"

  - id: android-support-file-transfer
    desc: Android support API file transfer
    if:
      type: text
      substr: "/api/support/sendFileTo/%s/%s"

composite_rules:
  - id: android-support-c2-workflow
    desc: Android support API C2 workflow
    crit: suspicious
    conf: 0.95
    all:
      - id: android-support-client-checkin
      - id: android-support-request-url
    any:
      - id: android-support-install-status
      - id: android-support-success-status
      - id: android-support-activity-status
      - id: android-support-file-transfer
    needs: 2
