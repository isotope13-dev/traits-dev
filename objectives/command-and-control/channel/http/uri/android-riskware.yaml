defaults:
  platforms: [android]
  for: [apk, zip]
  crit: component
  conf: 0.9

traits:
  - id: wanbans-api-host
    desc: Wanbans cleaner API host
    if:
      type: text
      substr: "https://api.wanbans.com/"

  - id: yx-club-tool-api-host
    desc: 9665yx tool API host
    if:
      type: text
      substr: "http://hw-tool-api.9665yx.club/"

  - id: cleaner-api-signing-salt
    desc: Cleaner API signing salt
    conf: 0.94
    if:
      type: text
      substr: "ca239895db3465d563b933262974e5c0"

  - id: cleaner-device-init-flow
    desc: Cleaner device init flow
    conf: 0.86
    if:
      type: text
      substr: "deviceInitAndLogin"

composite_rules:
  - id: android-cleaner-signed-backend-channel
    desc: Android cleaner signed backend channel
    crit: suspicious
    conf: 0.96
    all:
      - id: cleaner-api-signing-salt
      - id: cleaner-device-init-flow
    any:
      - id: wanbans-api-host
      - id: yx-club-tool-api-host
