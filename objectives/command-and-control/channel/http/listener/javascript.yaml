defaults:
  platforms: [windows, unix]
  attack: T1071.001
  for:
    - javascript
traits:
  - id: express-router
    desc: Express Router creation (potential C2
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: express\.Router
  - id: express-post-endpoint
    desc: Express POST endpoint (potential command
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: (app|router)\.post\s*\(
    downgrade:
      any:
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - id: metadata/library/structure::js-large-module-bundle
  - id: express-get-endpoint
    desc: Express GET endpoint
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: (app|router)\.get\s*\(\s*['"/]
  - id: http-createServer
    desc: Node.js HTTP server creation
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
    if:
      id: micro-behaviors/communications/http/server/listener::nodejs-http-server
  - id: socket-io
    desc: Socket.io server (real-time C2 potential)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: require\s*\(\s*['\"]socket\.io['\"]\s*\)
    unless:
      - id: metadata/library/socketio::client
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/harness/runtime::test-basename-pattern
