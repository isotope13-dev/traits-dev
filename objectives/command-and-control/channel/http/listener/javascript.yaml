defaults:
  attack: T1071.001
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
traits:
  - id: express-router
    desc: Express Router creation (potential C2
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: express\.Router
  - id: express-post-endpoint
    desc: Express POST endpoint (potential command
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: (app|router)\.post\s*\(
  - id: express-get-endpoint
    desc: Express GET endpoint
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (app|router)\.get\s*\(\s*['"/]
  - id: http-createServer
    desc: Node.js HTTP server creation
    crit: notable
    conf: 0.7
    unless:
      - id: metadata/package/testing/harness::is-test
    if:
      id: micro-behaviors/communications/http/server::nodejs-http-server
  - id: socket-io
    desc: Socket.io server (real-time C2 potential)
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: require\s*\(\s*['\"]socket\.io['\"]\s*\)
    unless:
      - id: metadata/library/socketio::client
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/harness::test-basename-pattern
