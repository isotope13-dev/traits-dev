defaults:
  platforms: [windows, unix]
  for: [binaries, scripts]
  attack: T1071.001
traits:
  - id: gmail-cookie-key
    desc: Gmail cookie key marker
    crit: component
    conf: 0.94
    if:
      type: text
      exact: "S=Gmail"
  - id: compass-gmail-cookie
    desc: COMPASS Gmail cookie marker
    crit: component
    conf: 0.94
    if:
      type: text
      exact: "COMPASS=Gmail"
  - id: gmail-imp-cookie
    desc: GMAIL_IMP cookie marker
    crit: component
    conf: 0.9
    if:
      type: text
      exact: GMAIL_IMP
  - id: google-notifications-referer
    desc: Google notifications Referer
    crit: component
    conf: 0.86
    if:
      type: text
      exact: "https://notifications.google.com/"
  - id: google-ogbui-js-start
    desc: Google OgbUi JS wrapper start
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "this.social_NotificationsOgbUi=this.social_NotificationsOgbUi"
  - id: google-ogbui-js-footer
    desc: Google OgbUi JS wrapper footer
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '}).call(this,this.social_NotificationsOgbUi); // Google Inc.'
  - id: apisid-sapisid-cookie-pair
    desc: APISID and SAPISID cookies
    crit: component
    conf: 0.84
    if:
      type: text
      regex: "APISID.{0,80}SAPISID|SAPISID.{0,80}APISID"
composite_rules:
  - id: google-ad-cookie-c2-camouflage
    desc: C2 disguised as Google ad cookies
    crit: suspicious
    conf: 0.95
    all:
      - id: gmail-cookie-key
      - id: compass-gmail-cookie
    any:
      - id: gmail-imp-cookie
      - id: google-notifications-referer
      - id: google-ogbui-js-start
      - id: google-ogbui-js-footer
      - id: apisid-sapisid-cookie-pair
    needs: 3
