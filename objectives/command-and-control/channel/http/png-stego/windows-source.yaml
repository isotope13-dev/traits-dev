defaults:
  platforms: [windows]
  for: [c, cpp]
  attack: T1071.001
  mbc: B0030

traits:
  - id: png-get-path-pattern
    desc: PNG image path C2 pattern
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: "/assets/static/img/%s_%0?2d\\.png"

  - id: php-post-endpoint
    desc: PHP POST command endpoint
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "\\.php(\\?|$)"

  - id: location-header-query
    desc: HTTP Location header query
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: "(?i)\\b(Location:|HTTP_QUERY_LOCATION|HTTP_QUERY_RAW_HEADERS_CRLF)\\b"
    unless:
      - id: metadata/lang/source/

  - id: redirect-status-handling
    desc: 302 redirect command gating
    crit: component
    conf: 0.94
    if:
      type: text
      regex: "HTTP_STATUS_(MOVED|REDIRECT)"

  - id: ok-status-kill-switch
    desc: HTTP 200 kill switch logic
    crit: component
    conf: 0.94
    if:
      type: text
      word: HTTP_STATUS_OK

  - id: xxtea-marker
    desc: XXTEA encrypted transport marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "(?i)\\bxxtea\\b"

  - id: custom-base64-alphabet
    desc: Custom Base64 alphabet marker
    crit: component
    conf: 0.88
    if:
      type: text
      regex: "(?i)(custom base64|base64 alphabet|alphabet rotates)"

composite_rules:
  - id: png-stego-http-channel
    desc: PNG disguised HTTP C2 channel
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/get::wininet-http-client-src
    any:
      - id: png-get-path-pattern
      - id: php-post-endpoint
      - id: location-header-query
      - id: redirect-status-handling
    needs: 2

  - id: redirect-staged-png-c2
    desc: Redirect-staged PNG stego C2
    crit: hostile
    conf: 0.98
    all:
      - id: png-stego-http-channel
      - id: location-header-query
    any:
      - id: redirect-status-handling
      - id: ok-status-kill-switch
      - id: xxtea-marker
      - id: custom-base64-alphabet
    needs: 2
