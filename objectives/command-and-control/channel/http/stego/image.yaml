defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp, csharp]
  attack: T1071.001
  mbc: B0030

traits:
  - id: jpeg-http-content-type
    desc: HTTP declares JPEG image content
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(?i)Content-Type:\s*image/(jpeg|jpg)'
  - id: jfif-response-marker
    desc: JFIF image response marker
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\b(JFIF|image/jpeg)\b'
  - id: api-init-route
    desc: API initialization route path
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)/api/(init|checkin|register)/'
  - id: uuid-format-route-segment
    desc: URL-path UUID route segment
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '(?i)/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}(/|[?"''\s]|$)'
  - id: printf-route-placeholder
    desc: Printf route placeholder segment
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '(?i)/api/[^"''\s]{0,80}/%s|/%s[^"''\s]{0,80}/api/'
  - id: uuid-string-conversion-api
    desc: UUID string conversion API
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\bUuidFromString[AW]?\b'

composite_rules:
  - id: api-init-uuid-route
    desc: API init route with UUID
    crit: suspicious
    conf: 0.92
    all:
      - id: api-init-route
    any:
      - id: uuid-format-route-segment
      - id: printf-route-placeholder
  - id: jfif-http-c2-transport
    desc: JFIF image C2 transport
    crit: hostile
    conf: 0.98
    all:
      - id: jpeg-http-content-type
      - id: api-init-uuid-route
    any:
      - id: jfif-response-marker
      - id: uuid-string-conversion-api
      - id: micro-behaviors/crypto/library/encoding::crypt-binary-to-string
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-write-data
    needs: 2
