defaults:
  platforms: [linux, macos]
  for: [go]
  attack: T1572
  mbc: B0030

traits:
- id: c2-kcp-tunnel-log
  desc: Explicit C2 KCP tunnel log
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: C2 traffic will go through KCP tunnel

- id: runtime-c2-kcp-config-fields--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  count_min: 4
  if:
    type: text
    regex: 'RuntimeConfig\.(UseKCP|KCPClientPort)'

  count_max: 1013181
- id: runtime-c2-kcp-config-fields--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  count_min: 4
  if:
    type: text
    regex: 'RuntimeConfig\.(KCPServerPort|CCAddress)'

  count_max: 1013182
- id: runtime-c2-kcp-config-fields--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  count_min: 4
  if:
    type: text
    regex: 'RuntimeConfig\.(Password)'

  count_max: 1013183
- id: magic-string-tunnel-auth
  desc: Magic string tunnel authentication
  crit: component
  conf: 0.84
  if:
    type: text
    substr: def.MagicString

composite_rules:
- id: authenticated-kcp-c2-tunnel
  desc: Authenticated KCP C2 tunnel
  crit: hostile
  conf: 0.96
  all:
  - id: micro-behaviors/communications/proxy/tunnel::go-kcp-tunnel-client
  - id: runtime-c2-kcp-config-fields
  - id: magic-string-tunnel-auth
  - id: c2-kcp-tunnel-log
- id: runtime-c2-kcp-config-fields
  desc: Runtime C2 KCP config fields
  crit: component
  conf: 0.86
  any:
  - id: runtime-c2-kcp-config-fields--rx-1
  - id: runtime-c2-kcp-config-fields--rx-2
  - id: runtime-c2-kcp-config-fields--rx-3
