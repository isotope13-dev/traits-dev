defaults:
  platforms: [linux]
  for: [shell, systemd, scripts]
  attack: "T1090,T1572,T1543.002"
traits:
- id: ligolo-hidden-systemd-helper--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: systemd-helper
  count_max: 1013185
- id: ligolo-hidden-systemd-helper--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: BINARY_NAME
  count_max: 1013187
- id: ligolo-hidden-systemd-helper--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: ignore-cert
  count_max: 1013188
- id: ligolo-hidden-systemd-helper--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: INSTALL_DIR
  count_max: 1013189
- id: ligolo-hidden-systemd-helper--rx-6
  desc: systemd ExecStart directive marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: ExecStart=
  count_max: 1013190
- id: ligolo-hidden-systemd-helper--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    regex: '(?i)ligolo.{0,120}connect|connect.{0,120}ligolo'
  count_max: 1013191
- id: tun-to-ligolo-forwarding
  desc: TUN interface forwards Ligolo traffic
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: 'ip\s+tuntap\s+add[\s\S]{0,240}ligolo[0-9A-Za-z_-]*[\s\S]{0,600}iptables\s+-I\s+FORWARD'
composite_rules:
- id: ligolo-persistent-pivot-service
  desc: Ligolo installs persistent pivot service
  crit: hostile
  conf: 0.99
  all:
  - id: ligolo-hidden-systemd-helper
  - id: tun-to-ligolo-forwarding
- id: ligolo-hidden-systemd-helper
  desc: Hidden Ligolo systemd helper service
  crit: suspicious
  conf: 0.99
  all:
  - id: ligolo-hidden-systemd-helper--rx-7
  any:
  - id: ligolo-hidden-systemd-helper--rx-1
  - id: micro-behaviors/fs/path/binary::usr-local-bin-dir
  - id: ligolo-hidden-systemd-helper--rx-3
  - id: ligolo-hidden-systemd-helper--rx-4
  - id: ligolo-hidden-systemd-helper--rx-5
  - id: ligolo-hidden-systemd-helper--rx-6
