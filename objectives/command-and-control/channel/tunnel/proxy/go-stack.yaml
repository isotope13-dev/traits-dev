defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, go]
  attack: T1572
composite_rules:
  - id: go-socks-websocket-tunnel
    desc: Go SOCKS-over-WebSocket tunnel
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/proxy/tunnel::go-socks-websocket-bridge
      - id: micro-behaviors/communications/proxy/tunnel::go-tunnel-forwarding
  - id: go-ngrok-socks-websocket-tunnel
    desc: Go ngrok SOCKS WebSocket tunnel
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/communications/proxy/tunnel::go-ngrok-tunnel-stack
      - id: micro-behaviors/communications/proxy/tunnel::go-socks-websocket-bridge
  - id: go-reverse-socks-tunnel
    desc: Go reverse SOCKS tunnel
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/proxy/tunnel::go-reverse-socks-tunnel-help
    any:
      - id: micro-behaviors/communications/proxy/tunnel::go-tunnel-forwarding
      - id: micro-behaviors/communications/proxy/tunnel::go-socks-websocket-bridge
      - id: micro-behaviors/communications/proxy/tunnel::go-ngrok-tunnel-stack
  - id: multi-protocol-go-tunnel
    desc: Multi-protocol Go tunnel stack
    crit: suspicious
    conf: 0.92
    any:
      - id: micro-behaviors/communications/proxy/tunnel::go-tunnel-forwarding
      - id: micro-behaviors/communications/proxy/tunnel::go-socks-websocket-bridge
      - id: micro-behaviors/communications/proxy/tunnel::go-ngrok-tunnel-stack
      - id: go-reverse-socks-tunnel
      - id: micro-behaviors/communications/ssh/server::go-ssh-server-implementation
    needs: 3
  - id: encrypted-hidden-go-tunnel
    desc: Encrypted hidden Go tunnel config
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/command-and-control/infrastructure/config::hidden-encrypted-runtime-config
      - id: micro-behaviors/communications/proxy/tunnel::go-tunnel-forwarding
    any:
      - id: go-socks-websocket-tunnel
      - id: go-ngrok-socks-websocket-tunnel
      - id: go-reverse-socks-tunnel
      - id: micro-behaviors/communications/proxy/tunnel::go-ngrok-tunnel-stack
  - id: hidden-config-remote-access-stack
    desc: Hidden config remote access stack
    crit: suspicious
    conf: 0.93
    all:
      - id: objectives/command-and-control/infrastructure/config::hidden-encrypted-runtime-config
    any:
      - id: go-socks-websocket-tunnel
      - id: go-ngrok-socks-websocket-tunnel
      - id: go-reverse-socks-tunnel
      - id: multi-protocol-go-tunnel
      - id: objectives/command-and-control/remote-command/control::go-ssh-server-command-channel
      - id: objectives/command-and-control/channel/http/proxy::llm-api-proxy-channel
    needs: 2
  - id: hidden-config-proxy-tunnel
    desc: Hidden config proxy tunnel
    crit: hostile
    conf: 0.94
    all:
      - id: objectives/command-and-control/infrastructure/config::hidden-encrypted-runtime-config
    any:
      - id: objectives/anti-static/obfuscation/config::go-decryption-key-symbol
      - id: micro-behaviors/communications/proxy/tunnel::go-socks-config-name
      - id: micro-behaviors/communications/proxy/tunnel::go-ngrok-config-name
      - id: micro-behaviors/communications/proxy/tunnel::go-reverse-socks-tunnel-help
      - id: micro-behaviors/communications/proxy/reverse::reverse-proxy
      - id: micro-behaviors/communications/proxy/socks::socks
      - id: objectives/command-and-control/channel/tunnel/proxy::ngrok-name
      - id: micro-behaviors/communications/http/websocket::websocket-headers
      - id: micro-behaviors/communications/http/request/proxy::http-connect-proxy
      - id: objectives/anti-static/obfuscation/obfuscator/garble::go-garbled-backdoor
    needs: 3
