defaults:
  platforms: [windows, unix]
traits:
  - id: go-socks-auth
    desc: Go socksUsernamePassword string
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: socksUsernamePassword
  - id: go-socks-dialer
    desc: Go socksNewDialer string
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: socksNewDialer
  - id: go-socks-cmd
    desc: Go socksCommand string
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: socksCommand
  - id: go-socks-addr
    desc: Go socksAddr string
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: socksAddr
  - id: go-pty-startwithsize
    desc: Go PTY StartWithSize function
    crit: component
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      substr: StartWithSize
  - id: go-pty-setsize
    desc: Go PTY Setsize function
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: Setsize
  - id: go-ptmx
    desc: Go ptmx device reference
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      exact: ptmx
composite_rules:
  - id: go-socks-proxy
    desc: Go SOCKS5 proxy implementation
    crit: suspicious
    conf: 0.8
    for:
      - go
    any:
      - id: go-socks-auth
      - id: go-socks-dialer
      - id: go-socks-cmd
      - id: go-socks-addr
  - id: go-pty-strings
    desc: Go PTY library strings
    any:
      - id: go-pty-startwithsize
      - id: go-pty-setsize
      - id: go-ptmx
    crit: component
  - id: go-pty-with-shell
    desc: Go PTY with shell execution
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    all:
      - id: go-pty-strings
      - id: micro-behaviors/process/create/shell::bin-sh
  - id: go-reverse-socks
    desc: Go-based Reverse Shell with SOCKS
    crit: hostile
    conf: 0.9
    attack: T1090
    mbc: B0022
    for:
      - elf
      - macho
    all:
      - id: go-pty-with-shell
      - id: go-socks-proxy
      - id: micro-behaviors/communications/socket/connect::dial
