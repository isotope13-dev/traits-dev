defaults:
  platforms: [windows, linux, macos]
  for: [binaries]
traits:
  - id: soso-socks-server
    desc: Go soso SOCKS server module
    crit: suspicious
    conf: 0.96
    for: [pe, elf, macho]
    if:
      type: text
      substr: soso.(*Server).ServeConn
  - id: soso-auth-module
    desc: Go soso authenticator module
    crit: component
    conf: 0.88
    for: [pe, elf, macho]
    if:
      type: text
      substr: soso.(*UserPassAuthenticator).Authenticate
  - id: armon-server-listen
    desc: Armon SOCKS5 server listener
    crit: suspicious
    conf: 0.96
    for: [pe, elf, macho]
    if:
      type: text
      substr: github.com/armon/go-socks5.(*Server).ListenAndServe
  - id: armon-server-serveconn
    desc: Armon SOCKS5 connection handler
    crit: component
    conf: 0.92
    for: [pe, elf, macho]
    if:
      type: text
      substr: github.com/armon/go-socks5.(*Server).ServeConn
  - id: bitvise-client-marker
    desc: Bitvise client identity marker
    crit: component
    conf: 0.84
    for: [pe]
    platforms: [windows]
    if:
      type: text
      word: Bitvise
  - id: bitvise-original-filename
    desc: Bitvise original filename marker
    crit: component
    conf: 0.9
    for: [pe]
    platforms: [windows]
    if:
      type: text
      word: bitssh
  - id: mimux-session-module
    desc: Go mimux session module
    crit: suspicious
    conf: 0.96
    for: [pe, elf, macho]
    if:
      type: text
      substr: mimux.(*Session).AcceptStream
  - id: go-socks-auth
    desc: Go socksUsernamePassword string
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: socksUsernamePassword
  - id: go-socks-dialer
    desc: Go socksNewDialer string
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: socksNewDialer
  - id: go-socks-cmd
    desc: Go socksCommand string
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: socksCommand
  - id: go-socks-addr
    desc: Go socksAddr string
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: socksAddr
  - id: go-pty-startwithsize
    desc: Go PTY StartWithSize function
    crit: component
    conf: 0.75
    for: [scripts, binaries]
    if:
      type: text
      substr: StartWithSize
  - id: go-pty-setsize
    desc: Go PTY Setsize function
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      substr: Setsize
  - id: go-ptmx
    desc: Go ptmx device reference
    crit: component
    conf: 0.7
    for: [scripts, binaries]
    if:
      type: text
      exact: ptmx

  - id: custom-socks5-package
    desc: References custom-socks5 Go package
    crit: component
    conf: 1.0
    if:
      type: text
      substr: github.com/custom-socks5
composite_rules:
  - id: custom-socks5-staged-agent
    desc: Custom-SOCKS5 proxy agent with staged C2 config
    crit: hostile
    conf: 0.99
    all:
      - id: custom-socks5-package
      - id: objectives/command-and-control/infrastructure/config::go-linker-staged-c2-config
  - id: go-socks-proxy
    desc: Go SOCKS5 proxy implementation
    crit: suspicious
    conf: 0.9
    for:
      - pe
      - elf
      - macho
    all:
      - id: soso-socks-server
    any:
      - id: soso-auth-module
      - id: go-socks-auth
      - id: go-socks-dialer
      - id: go-socks-cmd
      - id: go-socks-addr
  - id: armon-socks5-server
    desc: Armon Go SOCKS5 proxy server
    crit: suspicious
    conf: 0.96
    attack: T1090
    mbc: B0022
    for: [pe, elf, macho]
    all:
      - id: micro-behaviors/communications/proxy/library::armon-go-socks5
    any:
      - id: armon-server-listen
      - id: armon-server-serveconn
    needs: 1
  - id: masqueraded-goproxy-process-killer
    desc: Masqueraded Go SOCKS5 process killer
    crit: hostile
    conf: 0.97
    attack: T1090
    mbc: B0022
    for: [pe]
    platforms: [windows]
    all:
      - id: armon-socks5-server
      - id: micro-behaviors/process/enumerate/snapshot::process32-next
      - id: micro-behaviors/process/terminate/kill::go-xsys-terminate-process
    any:
      - id: bitvise-client-marker
      - id: bitvise-original-filename
    needs: 1
  - id: go-pty-strings
    desc: Go PTY library strings
    any:
      - id: go-pty-startwithsize
      - id: go-pty-setsize
      - id: go-ptmx
    crit: component
  - id: go-pty-with-shell
    desc: Go PTY with shell execution
    crit: suspicious
    conf: 0.8
    for: [scripts, binaries]
    all:
      - id: go-pty-strings
      - id: micro-behaviors/process/create/shell::bin-sh
  - id: go-reverse-socks
    desc: Go-based Reverse Shell with SOCKS
    crit: hostile
    conf: 0.9
    attack: T1090
    mbc: B0022
    for:
      - elf
      - macho
    all:
      - id: go-pty-with-shell
      - id: go-socks-proxy
      - id: micro-behaviors/communications/socket/connect::dial
  - id: go-windows-service-socks-tunnel
    desc: Go Windows service SOCKS tunnel
    crit: hostile
    conf: 0.98
    attack: T1572
    mbc: B0022
    for: [pe]
    platforms: [windows]
    all:
      - id: go-socks-proxy
      - id: mimux-session-module
      - id: micro-behaviors/os/service/control::create-service
      - id: micro-behaviors/os/service/control::service-control-dispatch
    any:
      - id: objectives/persistence/system/service/install::service-install-dispatch-chain
      - id: micro-behaviors/os/service/control::open-service
      - id: micro-behaviors/os/service/control::open-sc-manager
