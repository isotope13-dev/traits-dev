# Obfuscated rotating-SOCKS-proxy / IP-rotation engine.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. This module anonymizes the toolkit's outbound scan
# and mail traffic: it bootstraps an IP-rotation pool, hands out the current
# SOCKS proxy per request, probes proxy liveness against fixed destinations, and
# masks proxy URLs in logs. These identifiers are attack-context-specific
# fragments of that toolkit; convicts only when several co-occur inside
# obfuscator.io-obfuscated code (T1090 proxy / IP rotation for evasion).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1090
  mbc: E1090

traits:
  - id: bootstrap-ip-rotation
    desc: bootstrapIpRotation proxy-pool bootstrap
    crit: component
    conf: 0.8
    if:
      type: text
      substr: bootstrapIpRotation
  - id: bootstrap-redirect-ip-rotation
    desc: bootstrapRedirectIpRotation pool bootstrap
    crit: component
    conf: 0.8
    if:
      type: text
      substr: bootstrapRedirectIpRotation
  - id: get-current-proxy
    desc: getCurrentProxy per-request proxy selector
    crit: component
    conf: 0.8
    if:
      type: text
      substr: getCurrentProxy
  - id: is-ip-rotation-enabled
    desc: isIpRotationEnabled rotation toggle
    crit: component
    conf: 0.8
    if:
      type: text
      substr: isIpRotationEnabled
  - id: redirect-socks-probe-destinations
    desc: REDIRECT_SOCKS_PROBE_DESTINATIONS liveness list
    crit: component
    conf: 0.8
    if:
      type: text
      substr: REDIRECT_SOCKS_PROBE_DESTINATIONS

composite_rules:
  - id: ip-rotation-proxy-api
    desc: Private rotating-SOCKS-proxy / IP-rotation API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: bootstrap-ip-rotation
      - id: bootstrap-redirect-ip-rotation
      - id: get-current-proxy
      - id: is-ip-rotation-enabled
      - id: redirect-socks-probe-destinations
  - id: obfuscated-ip-rotation-proxy
    desc: Obfuscated rotating-SOCKS-proxy IP-rotation engine
    crit: hostile
    conf: 0.95
    all:
      - id: ip-rotation-proxy-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
