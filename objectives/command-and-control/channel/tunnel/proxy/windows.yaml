defaults:
  attack: T1090
  mbc: B0022
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  - id: service-proxy-backdoor
    desc: Windows service proxy backdoor
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/persistence/system/service/install::service-install-and-start
      - id: micro-behaviors/communications/socket/init::wsa-startup
      - id: micro-behaviors/communications/socket/listen::listen
      - id: micro-behaviors/communications/socket/connect::connect
    any:
      - id: micro-behaviors/process/create/exec::firewall-allowedprogram-cli
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/os/service/control::service-control-dispatch
  - id: firefox-proxy-aware-c2
    desc: C2 reuses Firefox proxy configuration
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/fs/path/application/browser::firefox-proxy-config-reference
    any:
      - id: objectives/command-and-control/channel/http/message::hardcoded-request
      - id: micro-behaviors/communications/http/request/client::user-agent-header
      - id: objectives/command-and-control/channel/http/message::google-ad-cookie-c2-camouflage
    needs: 2
