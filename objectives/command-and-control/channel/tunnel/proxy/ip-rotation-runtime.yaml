# Obfuscated IP-rotation proxy runtime engine.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. This is the core proxy runtime the other modules
# delegate to: it initializes/activates an IP-rotation pool from a report,
# rotates the active SOCKS proxy internally, live-probes proxy health, fails over
# on error, and exports the selected proxy into the global environment for all
# outbound traffic. These identifiers are attack-context-specific fragments of
# that toolkit; convicts only when several co-occur inside obfuscator.io-
# obfuscated code (T1090 proxy / IP rotation for evasion).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1090
  mbc: E1090

traits:
  - id: init-ip-rotation
    desc: initIpRotation proxy-pool initializer
    crit: component
    conf: 0.8
    if:
      type: text
      substr: initIpRotation
  - id: activate-ip-rotation-from-report
    desc: activateIpRotationFromReport pool activator
    crit: component
    conf: 0.8
    if:
      type: text
      substr: activateIpRotationFromReport
  - id: rotate-ip-internal
    desc: rotateIpInternal active-proxy rotator
    crit: component
    conf: 0.8
    if:
      type: text
      substr: rotateIpInternal
  - id: set-global-proxy-env
    desc: setGlobalProxyEnv global proxy exporter
    crit: component
    conf: 0.8
    if:
      type: text
      substr: setGlobalProxyEnv

composite_rules:
  - id: ip-rotation-runtime-api
    desc: Private IP-rotation proxy runtime engine API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: init-ip-rotation
      - id: activate-ip-rotation-from-report
      - id: rotate-ip-internal
      - id: set-global-proxy-env
  - id: obfuscated-ip-rotation-runtime
    desc: Obfuscated IP-rotation proxy runtime engine
    crit: hostile
    conf: 0.95
    all:
      - id: ip-rotation-runtime-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
