# Obfuscated SMTP-over-SOCKS proxy router (rotating proxy pool).
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. The delivery module survives with a distinctive,
# un-encrypted private API that routes outbound SMTP through a validated, health-
# checked pool of rotating SOCKS proxies (with probe destinations) to anonymize
# and load-balance bulk mailing past IP-based blocks. These identifiers are
# attack-context-specific fragments of that toolkit; convicts only when several
# co-occur inside obfuscator.io-obfuscated code (T1090 proxy routing).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1090
  mbc: E1090

traits:
  - id: smtp-proxy-router
    desc: SmtpProxyRouter SMTP-over-SOCKS router
    crit: component
    conf: 0.8
    if:
      type: text
      substr: SmtpProxyRouter
  - id: resolve-smtp-socks-sources
    desc: resolveSmtpSocksSources proxy-list resolver
    crit: component
    conf: 0.8
    if:
      type: text
      substr: resolveSmtpSocksSources
  - id: smtp-probe-destinations
    desc: DEFAULT_SMTP_PROBE_DESTINATIONS probe list
    crit: component
    conf: 0.8
    if:
      type: text
      substr: DEFAULT_SMTP_PROBE_DESTINATIONS
  - id: proxy-engine-pool
    desc: ProxyEnginePool rotating proxy pool
    crit: component
    conf: 0.8
    if:
      type: text
      substr: ProxyEnginePool
  - id: connect-tcp-via-proxy
    desc: connectTcpViaProxy SOCKS tunnel connect
    crit: component
    conf: 0.8
    if:
      type: text
      substr: connectTcpViaProxy

composite_rules:
  - id: smtp-socks-proxy-router-api
    desc: Private SMTP-over-SOCKS proxy-pool router API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: smtp-proxy-router
      - id: resolve-smtp-socks-sources
      - id: smtp-probe-destinations
      - id: proxy-engine-pool
      - id: connect-tcp-via-proxy
  - id: obfuscated-smtp-socks-proxy-router
    desc: Obfuscated SMTP-over-SOCKS rotating-proxy mail router
    crit: hostile
    conf: 0.95
    all:
      - id: smtp-socks-proxy-router-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
