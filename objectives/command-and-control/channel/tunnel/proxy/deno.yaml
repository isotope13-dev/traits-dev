defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1090
  mbc: B0030

traits:
  - id: connect-endpoint
    desc: Connect endpoint path
    crit: component
    conf: 0.86
    if:
      type: literal
      exact: /connect
  - id: send-endpoint
    desc: Send endpoint path
    crit: component
    conf: 0.86
    if:
      type: literal
      exact: /send
  - id: close-socket-endpoint
    desc: Close socket endpoint path
    crit: component
    conf: 0.86
    if:
      type: literal
      exact: /closesocket
  - id: socket-id-field
    desc: Socket identifier field
    crit: component
    conf: 0.84
    if:
      type: text
      word: socketId

composite_rules:
  - id: socket-control-endpoints
    desc: Socket relay control endpoints
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: connect-endpoint
      - id: send-endpoint
      - id: close-socket-endpoint
  - id: deno-http-tcp-relay
    desc: Deno HTTP-controlled TCP relay
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/server/listener::deno-serve-call
      - id: micro-behaviors/communications/socket/connect::deno-connect-call
      - id: socket-control-endpoints
      - id: socket-id-field
