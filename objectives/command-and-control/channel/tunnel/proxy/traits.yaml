defaults:
  platforms: [linux, macos, windows]
  for: [shell, python, javascript, php, powershell, go]
  attack: T1572
traits:
- id: ew-ssocksd
  desc: Earthworm ssocksd component
  crit: notable
  conf: 0.7
  for: [c, cpp, go, elf, pe, macho]
  if:
    type: text
    substr: ssocksd
- id: ew-rcsocks
  desc: Earthworm rcsocks component
  crit: notable
  conf: 0.7
  for: [c, cpp, go, elf, pe, macho]
  if:
    type: text
    substr: rcsocks
- id: ew-rssocks
  desc: Earthworm rssocks component
  crit: notable
  conf: 0.7
  for: [c, cpp, go, elf, pe, macho]
  if:
    type: text
    word: rssocks
- id: ew-lcx-listen
  desc: Earthworm lcx_listen function
  crit: notable
  conf: 0.8
  for: [c, cpp, go, elf, pe, macho]
  if:
    type: text
    substr: lcx_listen
- id: ew-lcx-tran
  desc: Earthworm lcx_tran function
  crit: notable
  conf: 0.8
  for: [c, cpp, go, elf, pe, macho]
  if:
    type: text
    substr: lcx_tran
- id: ew-lcx-slave
  desc: Earthworm lcx_slave function
  crit: notable
  conf: 0.8
  for: [c, cpp, go, elf, pe, macho]
  if:
    type: text
    substr: lcx_slave
- id: ew-rootkiter
  desc: Earthworm author domain
  crit: suspicious
  conf: 0.95
  for: [c, cpp, go, elf, pe, macho]
  if:
    type: text
    substr: rootkiter.com
- id: lcx-tran-func
  desc: LCX lcx_tran with -tran flag
  crit: notable
  conf: 0.7
  for: [c, cpp, go, elf, pe, macho]
  if:
    type: text
    regex: (lcx_tran|-tran.{0,20}lcx|lcx.{0,20}-tran)
- id: lcx-slave-func
  desc: LCX lcx_slave with -slave flag
  crit: notable
  conf: 0.7
  for: [c, cpp, go, elf, pe, macho]
  if:
    type: text
    regex: (lcx_slave|-slave.{0,20}lcx|lcx.{0,20}-slave)
- id: lcx-listen-func
  desc: LCX lcx_listen with -listen flag
  crit: notable
  conf: 0.7
  for: [c, cpp, go, elf, pe, macho]
  if:
    type: text
    regex: (lcx_listen|-listen.{0,20}lcx|lcx.{0,20}-listen)
- id: listen-port
  desc: Port forwarding listenport config
  crit: component
  conf: 0.5
  if:
    type: text
    regex: (?i)\blistenport\b\s*["']?\s*[:=]
- id: conn-port
  desc: Port forwarding connport config
  crit: component
  conf: 0.5
  if:
    type: text
    regex: (?i)\bconnport\b\s*["']?\s*[:=]
- id: regeorg-name
  desc: reGeorg tool name
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: reGeorg
    case_insensitive: true
- id: tunna-name
  desc: Tunna tool name
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: Tunna
- id: neo-regeorg
  desc: neo-reGeorg tool name
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: neo-reGeorg
- id: xcmd-header
  desc: Web tunnel X-CMD header
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: X-CMD
- id: regeorg-aspx-page
  desc: reGeorg ASPX page marker
  crit: component
  conf: 0.85
  for: [csharp, html]
  if:
    type: text
    substr: '<%@ Page Language="C#"'
- id: regeorg-strtr-token
  desc: reGeorg StrTr token
  crit: component
  conf: 0.85
  for: [csharp, html]
  if:
    type: text
    substr: StrTr
- id: regeorg-target-str
  desc: reGeorg target string parameter
  crit: component
  conf: 0.85
  for: [csharp, html]
  if:
    type: text
    substr: target_str
- id: regeorg-ipeendpoint
  desc: reGeorg IPEndPoint socket use
  crit: notable
  conf: 0.85
  for: [csharp, html]
  if:
    type: text
    substr: System.Net.IPEndPoint
- id: regeorg-response-addheader
  desc: reGeorg response header control
  crit: component
  conf: 0.85
  for: [csharp, html]
  if:
    type: text
    substr: Response.AddHeader
- id: regeorg-socket-token
  desc: reGeorg socket token
  crit: component
  conf: 0.75
  for: [csharp, html]
  if:
    type: text
    word: Socket
- id: chisel-client
  desc: Chisel client mode
  crit: notable
  conf: 0.7
  for: [go, elf, pe, macho]
  if:
    type: text
    substr: chisel client
- id: chisel-server
  desc: Chisel server mode
  crit: notable
  conf: 0.7
  for: [go, elf, pe, macho]
  if:
    type: text
    substr: chisel server
- id: source-rportfwd-command
  desc: Reverse port forwarding command in source
  crit: notable
  conf: 0.93
  platforms: [windows]
  for: [c, cpp]
  if:
    type: text
    regex: \brportfwd\b|reverse port forwarding
- id: source-socks5-proxy-command
  desc: SOCKS5 proxy server command in source
  crit: notable
  conf: 0.93
  platforms: [windows]
  for: [c, cpp]
  if:
    type: text
    regex: socks5 proxy|list all socks5 proxy servers
- id: source-pivot-agent-command
  desc: Pivoting agent command module in source
  crit: notable
  conf: 0.92
  platforms: [windows]
  for: [c, cpp]
  if:
    type: text
    regex: pivoting module|connect to a pivoting agent
- id: gost-name
  desc: GOST tunnel tool string
  crit: component
  conf: 0.78
  for: [shell, python, javascript, php, powershell]
  if:
    type: text
    word: gost
  not:
  - substr: August
  - substr: GOST28147
  - substr: GOST R
  - substr: Hashing Engines
  - substr: gost-crypto
  unless:
  - type: text
    substr: Hashing Engines
  - type: text
    substr: gost-crypto
- id: gost-listener-flag
  desc: GOST listener flag syntax
  crit: suspicious
  conf: 0.86
  for: [shell, python, javascript, php, powershell]
  if:
    type: text
    regex: \bgost\b.{0,80}\s-L\s+\S+
- id: gost-forward-flag
  desc: GOST forward flag syntax
  crit: suspicious
  conf: 0.85
  for: [shell, python, javascript, php, powershell]
  if:
    type: text
    regex: \bgost\b.{0,80}\s-F\s+\S+
- id: gost-scheme--rx-1
  desc: socks5:// proxy URL scheme
  crit: component
  conf: 0.5
  for: [shell, python, javascript, php, powershell]
  if:
    type: string_literal
    substr: socks5://
  count_max: 1013407
- id: gost-scheme--rx-2
  desc: http2:// proxy URL scheme
  crit: component
  conf: 0.5
  for: [shell, python, javascript, php, powershell]
  if:
    type: string_literal
    substr: http2://
  count_max: 1013408
- id: gost-scheme--rx-3
  desc: grpc:// proxy URL scheme
  crit: component
  conf: 0.5
  for: [shell, python, javascript, php, powershell]
  if:
    type: string_literal
    substr: grpc://
  count_max: 1013409
- id: gost-scheme--rx-4
  desc: quic:// proxy URL scheme
  crit: component
  conf: 0.5
  for: [shell, python, javascript, php, powershell]
  if:
    type: string_literal
    substr: quic://
  count_max: 1013410
- id: gost-scheme--rx-5
  desc: rtcp:// proxy URL scheme
  crit: component
  conf: 0.5
  for: [shell, python, javascript, php, powershell]
  if:
    type: string_literal
    substr: rtcp://
  count_max: 1013411
- id: gost-scheme--rx-6
  desc: rudp:// proxy URL scheme
  crit: component
  conf: 0.5
  for: [shell, python, javascript, php, powershell]
  if:
    type: string_literal
    substr: rudp://
  count_max: 1013412
- id: ngrok-name
  desc: Ngrok tool name
  crit: notable
  conf: 0.6
  for: [go, c, cpp, elf, pe, macho]
  if:
    type: text
    word: ngrok
    case_insensitive: true
  unless:
  - id: metadata/package/testing/
  - id: metadata/library/qt
  - id: well-known/app/telegram::telegram-desktop-signed-client-context
  - type: text
    substr: ngrok
    case_insensitive: true
    section: .rsrc
- id: ngrok-io
  desc: Ngrok tunnel domain (ngrok.io)
  crit: notable
  conf: 0.85
  count_min: 2
  for: [go, c, cpp, elf, pe, macho]
  if:
    type: text
    word: ngrok.io
  unless:
  - id: metadata/package/testing/
  - id: metadata/library/qt
  - id: well-known/app/telegram::telegram-desktop-signed-client-context
  - type: text
    substr: ngrok.io
    section: .rsrc
- id: ngrok-com
  desc: Ngrok service domain
  crit: notable
  conf: 0.7
  for: [go, c, cpp, elf, pe, macho]
  if:
    type: text
    substr: ngrok.com
  unless:
  - id: metadata/package/testing/
  - id: metadata/library/qt
- id: ngrok-cli-name
  desc: Ngrok CLI invocation
  crit: notable
  conf: 0.85
  for: [batch, shell, powershell]
  if:
    type: text
    regex: (?i)(^|[;&|\r\n])\s*ngrok(\.exe)?\b
- id: ngrok-authtoken-config
  desc: Ngrok auth token configured
  crit: suspicious
  conf: 0.94
  for: [batch, shell, powershell]
  if:
    type: text
    # Match an executed command, not the documented command in a setup
    # comment or heredoc.
    regex: '(?im)(^|[;&|]\s*)(sudo\s+)?ngrok\s+config\s+add-authtoken\b'
- id: ngrok-rdp-tcp-tunnel
  desc: Ngrok TCP tunnel to RDP
  crit: suspicious
  conf: 0.96
  for: [batch, shell, powershell]
  if:
    type: text
    regex: (?i)\bngrok\s+tcp\s+3389\b
- id: socks-default-port
  desc: SOCKS default port 1080
  crit: component
  conf: 0.4
  if:
    type: text
    substr: :1080
  not:
  - regex: '[\\/].*:1080'
composite_rules:
- id: earthworm
  desc: Earthworm tunneling tool (APT lateral
  crit: suspicious
  conf: 0.95
  for: [c, cpp, go, elf, pe, macho]
  any:
  - id: ew-rootkiter
  - id: ew-ssocksd
  - id: ew-rcsocks
  - id: ew-rssocks
  - id: ew-lcx-listen
  - id: ew-lcx-tran
  - id: ew-lcx-slave
  needs: 3
- id: lcx
  desc: LCX-style port forwarding tool
  crit: suspicious
  conf: 0.85
  for: [c, cpp, go, elf, pe, macho]
  needs: 2
  any:
  - id: ew-lcx-listen
  - id: ew-lcx-tran
  - id: ew-lcx-slave
  - id: lcx-tran-func
  - id: lcx-slave-func
  - id: lcx-listen-func
- id: lcx-config
  desc: LCX-style port forwarding configuration
  crit: notable
  conf: 0.8
  all:
  - id: listen-port
  - id: conn-port
  downgrade:
    any:
    - id: objectives/anti-static/obfuscation/code-metrics/structure/
    - id: metadata/library/structure::js-large-module-bundle
- id: regeorg
  desc: reGeorg/Tunna web tunneling
  crit: notable
  conf: 0.9
  any:
  - id: regeorg-name
  - id: tunna-name
  - id: neo-regeorg
  - id: xcmd-header
- id: regeorg-variant-webshell
  desc: reGeorg variant web tunnel shell
  crit: hostile
  conf: 0.99
  for: [csharp, html]
  any:
  - id: regeorg-aspx-page
  - id: regeorg-strtr-token
  - id: regeorg-target-str
  - id: regeorg-ipeendpoint
  - id: regeorg-response-addheader
  - id: regeorg-socket-token
  needs: 5
- id: chisel
  desc: Chisel HTTP tunneling tool
  crit: notable
  conf: 0.9
  any:
  - id: chisel-client
  - id: chisel-server
  needs: 2
- id: frp
  desc: FRP client/server source references
  crit: notable
  conf: 0.9
  for: [shell, python, javascript, php, powershell]
  any:
  - id: well-known/tool/dual-use/frp::frp-server-source-name
  - id: well-known/tool/dual-use/frp::frp-client-source-name
  needs: 2
- id: gost
  desc: GOST proxy tunneling tool
  crit: suspicious
  conf: 0.92
  for: [shell, python, javascript, php, powershell]
  any:
  - id: gost-listener-flag
  - id: gost-forward-flag
  - id: gost-name
  - id: gost-scheme
  needs: 2
- id: ngrok-comp
  desc: Ngrok tunneling service
  crit: notable
  conf: 0.85
  any:
  - id: ngrok-name
  - id: ngrok-io
  - id: ngrok-com
  - id: ngrok-cli-name
- id: ngrok-rdp-tunnel-script
  desc: Ngrok RDP tunnel script
  crit: hostile
  conf: 0.98
  for: [batch, shell, powershell]
  all:
  - id: ngrok-cli-name
  - id: ngrok-authtoken-config
  - id: ngrok-rdp-tcp-tunnel
- id: binary-socks-listener
  desc: Binary SOCKS proxy listener
  crit: suspicious
  conf: 0.9
  for: [elf, macho, pe]
  all:
  - id: micro-behaviors/communications/proxy/socks::socks5-server-symbol
  - id: micro-behaviors/communications/socket/listen::listen
  unless:
  - id: metadata/signed/platform::apple
- id: source-pivot-proxy-tasking
  desc: Source code implements pivot, SOCKS, and reverse forwarding
  crit: suspicious
  conf: 0.96
  attack: T1090
  platforms: [windows]
  for: [c, cpp]
  all:
  - id: source-pivot-agent-command
  any:
  - id: source-rportfwd-command
  - id: source-socks5-proxy-command
  needs: 2
- id: gost-scheme
  desc: GOST protocol scheme
  crit: component
  conf: 0.5
  for: [shell, python, javascript, php, powershell]
  any:
  - id: gost-scheme--rx-1
  - id: gost-scheme--rx-2
  - id: gost-scheme--rx-3
  - id: gost-scheme--rx-4
  - id: gost-scheme--rx-5
  - id: gost-scheme--rx-6
