defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  attack: T1572
traits:
  - id: ew-ssocksd
    desc: Earthworm ssocksd component
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: ssocksd
  - id: ew-rcsocks
    desc: Earthworm rcsocks component
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: rcsocks
  - id: ew-rssocks
    desc: Earthworm rssocks component
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: rssocks
  - id: ew-lcx-listen
    desc: Earthworm lcx_listen function
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: lcx_listen
  - id: ew-lcx-tran
    desc: Earthworm lcx_tran function
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: lcx_tran
  - id: ew-lcx-slave
    desc: Earthworm lcx_slave function
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: lcx_slave
  - id: ew-rootkiter
    desc: Earthworm author domain
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: rootkiter.com
  - id: lcx-tran-func
    desc: LCX lcx_tran with -tran flag
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (lcx_tran|-tran.{0,20}lcx|lcx.{0,20}-tran)
  - id: lcx-slave-func
    desc: LCX lcx_slave with -slave flag
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (lcx_slave|-slave.{0,20}lcx|lcx.{0,20}-slave)
  - id: lcx-listen-func
    desc: LCX lcx_listen with -listen flag
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (lcx_listen|-listen.{0,20}lcx|lcx.{0,20}-listen)
  - id: listen-port
    desc: Port forwarding listenport config
    crit: component
    conf: 0.5
    if:
      type: string_value
      regex: (?i)\blistenport\b\s*["']?\s*[:=]
  - id: conn-port
    desc: Port forwarding connport config
    crit: component
    conf: 0.5
    if:
      type: string_value
      regex: (?i)\bconnport\b\s*["']?\s*[:=]
  - id: local-port
    desc: Port forwarding localport config
    crit: component
    conf: 0.5
    if:
      type: string_value
      regex: (?i)\blocalport\b\s*["']?\s*[:=]
  - id: remote-host
    desc: Port forwarding remotehost config
    crit: component
    conf: 0.5
    if:
      type: string_value
      regex: (?i)\bremotehost\b\s*["']?\s*[:=]
  - id: regeorg-name
    desc: reGeorg tool name
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: reGeorg
      case_insensitive: true
  - id: tunna-name
    desc: Tunna tool name
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: Tunna
  - id: neo-regeorg
    desc: neo-reGeorg tool name
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: neo-reGeorg
  - id: xcmd-header
    desc: Web tunnel X-CMD header
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: X-CMD
  - id: chisel-client
    desc: Chisel client mode
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: chisel client
  - id: chisel-server
    desc: Chisel server mode
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: chisel server
  - id: ngrok-name
    desc: Ngrok tool name
    crit: notable
    conf: 0.6
    if:
      type: string_value
      exact: ngrok
      case_insensitive: true
    unless:
      - id: metadata/package::has-tests
      - type: string_value
        substr: ngrok
        case_insensitive: true
        section: .rsrc
  - id: ngrok-io
    desc: Ngrok tunnel domain (ngrok.io)
    crit: notable
    conf: 0.85
    count_min: 2
    if:
      type: string_value
      exact: ngrok.io
    unless:
      - id: metadata/package::has-tests
      - type: string_value
        substr: ngrok.io
        section: .rsrc
  - id: ngrok-com
    desc: Ngrok service domain
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: ngrok.com
    unless:
      - id: metadata/package::has-tests
  - id: socks-default-port
    desc: SOCKS default port 1080
    crit: component
    conf: 0.4
    if:
      type: string_value
      substr: :1080
    not:
      - regex: '[\\/].*:1080'
  - id: socks-server-ref
    desc: SOCKS server terminology
    crit: notable
    conf: 0.6
    if:
      type: string_value
      substr: socks server
      case_insensitive: true
    not:
      - regex: (?i)socks server (sent|reported|refused|wanted|asked)
      - regex: (?i)can't complete socks[45]? connection
      - regex: (?i)request rejected
composite_rules:
  - id: earthworm
    desc: Earthworm tunneling tool (APT lateral
    crit: suspicious
    conf: 0.95
    any:
      - id: ew-rootkiter
      - id: ew-ssocksd
      - id: ew-rcsocks
      - id: ew-rssocks
      - id: ew-lcx-listen
      - id: ew-lcx-tran
      - id: ew-lcx-slave
    needs: 3
  - id: lcx
    desc: LCX-style port forwarding tool
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: ew-lcx-listen
      - id: ew-lcx-tran
      - id: ew-lcx-slave
      - id: lcx-tran-func
      - id: lcx-slave-func
      - id: lcx-listen-func
  - id: lcx-config
    desc: LCX-style port forwarding configuration
    crit: suspicious
    conf: 0.8
    any:
      - id: listen-port
      - id: local-port
      - id: conn-port
      - id: remote-host
    needs: 2
  - id: regeorg
    desc: reGeorg/Tunna web tunneling
    crit: notable
    conf: 0.9
    any:
      - id: regeorg-name
      - id: tunna-name
      - id: neo-regeorg
      - id: xcmd-header
  - id: chisel
    desc: Chisel HTTP tunneling tool
    crit: suspicious
    conf: 0.9
    any:
      - id: well-known/tools/dual-use/chisel::repo
      - id: chisel-client
      - id: chisel-server
  - id: ngrok-comp
    desc: Ngrok tunneling service
    crit: notable
    conf: 0.85
    any:
      - id: ngrok-name
      - id: ngrok-io
      - id: ngrok-com
  - id: socks-server
    desc: SOCKS proxy server implementation
    crit: suspicious
    conf: 0.8
    size_max: 500000
    all:
      - id: socks-server-ref
    any:
      - id: micro-behaviors/communications/proxy/socks::socks4-proto
      - id: micro-behaviors/communications/proxy/socks::socks5-proto
      - id: socks-default-port
    unless:
      - id: metadata/signed/platform::apple
      - id: micro-behaviors/dylib/library::libcurl-ref
      - id: micro-behaviors/communications/http/download/curl::curl-easy-init
      - id: micro-behaviors/communications/http/request::http-client
