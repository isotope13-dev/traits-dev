defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe]
  attack: T1090
  mbc: B0030
traits:
  - id: socks5-version-greeting-bytes
    desc: SOCKS5 client greeting first bytes
    crit: component
    conf: 0.9
    if:
      type: hex
      pattern: "05 01 00"
      section: text
  - id: socks-server-label
    desc: SOCKS proxy server status label
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'SOCKS\s*(Proxy|server|started|listening)'
  - id: socks5-bind-command-byte
    desc: SOCKS5 BIND command byte
    crit: component
    conf: 0.6
    if:
      type: hex
      pattern: "05 02 00"
      section: text
  - id: socks5-udp-associate-byte
    desc: SOCKS5 UDP ASSOCIATE command byte
    crit: component
    conf: 0.6
    if:
      type: hex
      pattern: "05 03 00"
      section: text
composite_rules:
  - id: socket-server-api
    desc: Socket server API lifecycle
    crit: component
    conf: 0.88
    any:
      - id: micro-behaviors/communications/socket/listen::listen
      - id: micro-behaviors/communications/socket/syscall::server-comp
      - id: micro-behaviors/communications/socket/init::winsock-server-symbol-lifecycle
  - id: socks-server-implementation
    desc: Implant implements SOCKS proxy server
    crit: hostile
    conf: 0.94
    all:
      - id: socks-server-label
      - id: socket-server-api
    any:
      - id: socks5-version-greeting-bytes
      - id: socks5-bind-command-byte
      - id: socks5-udp-associate-byte
