defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe]
  attack: T1090
  mbc: B0030
traits:
  - id: ftp-client-basename
    desc: FTP-named executable
    crit: component
    conf: 0.98
    for: [elf]
    if:
      type: basename
      exact: ftp
  - id: socks-server-label
    desc: SOCKS proxy server status label
    crit: notable
    conf: 0.7
    if:
      type: text
      # Keep lifecycle words on the same printable string.  APT's FTP method
      # contains client-side SOCKS error text and socket APIs, but does not
      # report a SOCKS listener being started or bound.
      regex: '(?i)\bSOCKS[ \t]+(server|proxy)[ \t]+(started|listening|bound)\b'
composite_rules:
  - id: socket-server-api
    desc: Socket server API lifecycle
    crit: component
    conf: 0.88
    any:
      - id: micro-behaviors/communications/socket/listen::listen
      - id: micro-behaviors/communications/socket/syscall::server-comp
      - id: micro-behaviors/communications/socket/init::winsock-server-symbol-lifecycle
  - id: socks-server-implementation
    desc: Implant implements SOCKS proxy server
    crit: hostile
    conf: 0.94
    all:
      - id: socket-server-api
    any:
      - id: socks-server-label
      - id: objectives/command-and-control/channel/tunnel/proxy::socks-default-port
      - id: micro-behaviors/communications/proxy/socks::socks5-version-greeting-bytes
      - id: micro-behaviors/communications/proxy/socks::socks5-bind-command-byte
      - id: micro-behaviors/communications/proxy/socks::socks5-udp-associate-byte
    unless:
      - id: objectives/command-and-control/channel/tunnel/proxy::ftp-client-basename
