defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1572

traits:
- id: python-websocket-json-base64--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: websockets
  count_max: 1013369
- id: python-websocket-json-base64--rx-3
  desc: Base64 encode call marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: b64encode
  count_max: 1013371
- id: python-websocket-json-base64--rx-4
  desc: Base64 keyword marker
  crit: component
  conf: 0.9
  if:
    id: micro-behaviors/data/text/encoded::base64-token
  count_max: 1013372
- id: python-socks-data-message
  desc: Python SOCKS data message
  crit: component
  conf: 0.88
  if:
    type: text
    regex: socks_(connect|data|close)|SOCKS5

composite_rules:
- id: python-websocket-socks-tunnel
  desc: Python WebSocket SOCKS tunnel
  crit: suspicious
  conf: 0.95
  unless:
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  all:
  - id: python-websocket-json-base64
  any:
  - id: python-socks-data-message
  - id: micro-behaviors/communications/proxy/socks::socks5-proto
- id: python-websocket-json-base64
  desc: Python WebSocket JSON base64 tunnel
  crit: notable
  conf: 0.9
  all:
  - id: python-websocket-json-base64--rx-1
  any:
  - id: micro-behaviors/data/decode/base64::b64decode-string
  - id: python-websocket-json-base64--rx-3
  - id: python-websocket-json-base64--rx-4
  - id: python-json-loads-and-dumps
- id: python-json-loads-and-dumps
  desc: Python JSON loads and dumps
  crit: component
  conf: 0.85
  all:
  - id: micro-behaviors/data/serialize/json::json-dumps-pyc-name
  - id: micro-behaviors/data/serialize/json::json-loads-pyc-name
