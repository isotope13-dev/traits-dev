defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1572

traits:
- id: python-websocket-tunnel-verbs
  desc: WebSocket tunnel open data close protocol
  crit: notable
  conf: 0.94
  if:
    type: text
    regex: 'tunnel_open[\s\S]{0,160}tunnel_data[\s\S]{0,160}tunnel_close'
- id: python-socks-data-message
  desc: Python SOCKS data message
  crit: component
  conf: 0.88
  if:
    type: text
    regex: socks_(connect|data|close)|SOCKS5

composite_rules:
- id: python-websocket-socks-tunnel
  desc: Python WebSocket SOCKS tunnel
  crit: suspicious
  conf: 0.95
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: well-known/tool/detection/security-scanner/
  all:
  - id: python-websocket-json-base64
  any:
  - id: python-socks-data-message
  - id: micro-behaviors/communications/proxy/socks::socks5-proto
- id: python-websocket-json-base64
  desc: Python WebSocket JSON base64 use
  crit: component
  conf: 0.9
  all:
  - id: micro-behaviors/communications/http/websocket::websockets-python-lib
  any:
  - id: micro-behaviors/data/decode/base64::b64decode-string
  - id: micro-behaviors/data/encode/base64::b64encode-call
  - id: micro-behaviors/data/encoded::base64-token
  - id: python-json-loads-and-dumps
- id: python-json-loads-and-dumps
  desc: Python JSON loads and dumps
  crit: component
  conf: 0.85
  all:
  - id: micro-behaviors/data/serialize/json::json-dumps-pyc-name
  - id: micro-behaviors/data/serialize/json::json-loads-pyc-name
