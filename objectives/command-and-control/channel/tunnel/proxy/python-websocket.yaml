defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1572

traits:
  - id: python-websocket-json-base64
    desc: Python WebSocket JSON base64 tunnel
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: (websockets|websocket)[\s\S]{0,900}json\.(dumps|loads)[\s\S]{0,900}base64\.(b64encode|b64decode)|base64\.(b64encode|b64decode)[\s\S]{0,900}json\.(dumps|loads)[\s\S]{0,900}(websockets|websocket)

  - id: python-socks-data-message
    desc: Python SOCKS data message
    crit: component
    conf: 0.88
    if:
      type: text
      regex: socks_(connect|data|close)|SOCKS5

composite_rules:
  - id: python-websocket-socks-tunnel
    desc: Python WebSocket SOCKS tunnel
    crit: suspicious
    conf: 0.95
    all:
      - id: python-websocket-json-base64
    any:
      - id: python-socks-data-message
      - id: micro-behaviors/communications/proxy/socks::socks5-proto
    needs: 1
