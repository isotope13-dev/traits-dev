defaults:
  platforms: [linux]
  for: [shell, systemd, scripts]
  attack: "T1090,T1572,T1543.002"
traits:
- id: ligolo-hidden-systemd-helper--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: systemd-helper
- id: ligolo-hidden-systemd-helper--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: usr/local/bin
- id: ligolo-hidden-systemd-helper--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: BINARY_NAME
- id: ligolo-hidden-systemd-helper--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: ignore-cert
- id: ligolo-hidden-systemd-helper--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: INSTALL_DIR
- id: ligolo-hidden-systemd-helper--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: ExecStart=
- id: ligolo-hidden-systemd-helper--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.99
  if:
    type: text
    substr: connect
- id: tun-to-ligolo-forwarding
  desc: TUN interface forwards Ligolo traffic
  crit: suspicious
  conf: 0.97
  if:
    type: text
    regex: 'ip\s+tuntap\s+add[\s\S]{0,240}ligolo[0-9A-Za-z_-]*[\s\S]{0,600}iptables\s+-I\s+FORWARD'
composite_rules:
- id: ligolo-persistent-pivot-service
  desc: Ligolo installs persistent pivot service
  crit: hostile
  conf: 0.99
  all:
  - id: ligolo-hidden-systemd-helper
  - id: tun-to-ligolo-forwarding
- id: ligolo-hidden-systemd-helper
  desc: Hidden Ligolo systemd helper service
  crit: suspicious
  conf: 0.99
  any:
  - id: ligolo-hidden-systemd-helper--rx-1
  - id: ligolo-hidden-systemd-helper--rx-2
  - id: ligolo-hidden-systemd-helper--rx-3
  - id: ligolo-hidden-systemd-helper--rx-4
  - id: ligolo-hidden-systemd-helper--rx-5
  - id: ligolo-hidden-systemd-helper--rx-6
  - id: ligolo-hidden-systemd-helper--rx-7
  needs: 1
