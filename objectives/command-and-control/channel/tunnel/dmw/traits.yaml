defaults:
  platforms: [windows]
  for: [pe, batch, powershell]
  attack: T1572
traits:
  - id: dmw-tunnel-exe
    desc: DMW custom SSH tunneling tool filename
    crit: component
    if:
      type: text
      regex: (?i)dmw\.exe\b
  - id: dmw-tunnel-port
    desc: "DMW custom SSH tunneling tool remoteport"
    crit: component
    if:
      type: text
      word: remoteport
  - id: dmw-task-name
    desc: Scheduled task name for DMW tunnel
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)\\WindowsUpdateZ\b
composite_rules:
  - id: dmw-tunnel-tool
    desc: DMW custom SSH tunneling tool components
    crit: suspicious
    conf: 0.95
    all:
      - id: dmw-tunnel-exe
      - id: micro-behaviors/data/text/keywords/lexicon::password
      - id: dmw-tunnel-port
  - id: dmw-ssh-tunnel
    desc: Persistent DMW SSH tunnel detected
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: dmw-tunnel-tool
      - id: dmw-task-name
