defaults:
  platforms: [unix, windows]
  attack: T1071.004
  crit: suspicious
  conf: 0.8
  for: [scripts, binaries]
traits:
  - id: dns-tunneling-long-subdomain
    desc: Long subdomain reference
    # DNS labels are case-insensitive and normalized to lowercase — real
    # subdomains don't have internal uppercase runs. Restrict to lowercase +
    # digits + hyphen and require at least one digit (encoded payloads have
    # high digit density, English prose does not) to reject concatenated
    # symbol runs like `CreateFileWDeleteFileW...closesocket.dll` in
    # Go/Rust/C binaries.
    crit: component
    if:
      type: text
      regex: '[a-z0-9-]{50,}\.[a-z0-9.-]+\.[a-z]{2,}'
    not:
      # Require a digit somewhere in the long label (encoded payload signal).
      - regex: '^[a-z-]+$'
  - id: dns-txt-query-flag
    desc: DNS TXT record query flag
    if:
      type: text
      substr: "-Type TXT"
  - id: dns-txt-query-fn
    desc: DNS TXT record query function
    for: [powershell]
    if:
      type: symbol
      exact: "Resolve-DnsName"
composite_rules:
  - id: dns-txt-query
    desc: DNS TXT record query
    crit: notable
    any:
      - id: dns-txt-query-flag
      - id: dns-txt-query-fn
  - id: dns-tunneling-txt
    desc: Potential DNS tunneling via TXT records
    crit: suspicious
    conf: 0.95
    all:
      - id: dns-tunneling-long-subdomain
      - id: dns-txt-query
