defaults:
  platforms: [unix, windows]
  attack: T1071.004
  crit: suspicious
  conf: 0.8
  for: [scripts, binaries]
traits:
  - id: dns-txt-query-flag
    desc: DNS TXT record query flag
    if:
      type: text
      substr: "-Type TXT"
  - id: dns-txt-query-fn
    desc: DNS TXT record query function
    for: [powershell]
    if:
      type: symbol
      exact: "Resolve-DnsName"
composite_rules:
  - id: dns-txt-query
    desc: DNS TXT record query
    crit: notable
    any:
      - id: dns-txt-query-flag
      - id: dns-txt-query-fn
