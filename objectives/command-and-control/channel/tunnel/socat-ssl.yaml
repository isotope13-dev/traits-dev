defaults:
  for:
    - shell
  platforms:
    - linux
    - unix
    - macos
traits:
  - id: socat-openssl-connect
    desc: Socat SSL tunnel outbound connection
    crit: suspicious
    conf: 0.9
    attack: T1572
    if:
      type: raw
      substr: "openssl-connect:"
  - id: socat-openssl-listen
    desc: Socat SSL tunnel listener
    crit: notable
    conf: 0.85
    attack: T1572
    if:
      type: raw
      substr: "openssl-listen:"
  - id: socat-tcp4-forward
    desc: Socat TCP port forwarding
    crit: notable
    conf: 0.75
    attack: T1572
    if:
      type: raw
      regex: "tcp4:(127\\.0\\.0\\.1|localhost):\\d+"
  - id: socat-tcp4-listen
    desc: Socat TCP listen port forwarder
    crit: notable
    conf: 0.75
    attack: T1572
    if:
      type: raw
      substr: "tcp4-listen:"
  - id: socat-mutual-tls
    desc: Socat mutual TLS authentication
    crit: notable
    conf: 0.8
    attack: T1573.002
    if:
      type: raw
      regex: "cert=.{1,40}cafile="
composite_rules:
  - id: socat-ssl-tunnel
    desc: Socat encrypted tunnel pattern
    crit: suspicious
    conf: 0.95
    attack: T1572
    any:
      - id: socat-openssl-connect
      - id: socat-openssl-listen
    all:
      - id: socat-mutual-tls
