defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1090, T1572"
  mbc: "B0030"
traits:
  - id: node-workers-default-registry
    desc: Node tunnel default Cloudflare Workers registry
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'DEFAULT_REGISTRY\s*=\s*["'']https://.{1,120}\.workers\.dev'
  - id: node-default-registry-token
    desc: Node tunnel embeds default registry token
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'const\s+DEFAULT_TOKEN\s*=\s*["''][A-Za-z0-9_-]{16,}["'']'
  - id: node-registers-tunnel-endpoint
    desc: Node tunnel posts endpoint registration
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'fetch\s*\([\s\S]{0,500}/register["'']'
  - id: node-bearer-registry-token
    desc: Node tunnel sends bearer token to registry
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'authorization\s*:\s*["'']Bearer ["'']\s*\+\s*\w+\.token'
  - id: node-cli-no-mode-daemon-gate
    desc: Node CLI no-mode daemon gate
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '!mode\s*&&\s*!daemon\s*&&\s*!foreground'
  - id: node-cli-worker-env-flag
    desc: Node CLI worker environment guard
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'process\.env\.[A-Z0-9_]+_WORKER'
  - id: node-cli-quiet-respawn-default
    desc: Node CLI defaults to quiet respawn daemon
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'daemon\s*=\s*true;\s*quiet\s*=\s*true;\s*respawn\s*=\s*true'
  - id: node-ngrok-package-require
    desc: Node ngrok package import
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'require\s*\(\s*["'']@ngrok/ngrok["'']\s*\)'
  - id: node-ngrok-forward-call
    desc: Node ngrok forward call
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\bngrok\.forward\s*\('
composite_rules:
  - id: node-cli-default-silent-daemon
    desc: Node CLI defaults to silent respawning daemon
    crit: component
    conf: 0.86
    near_lines: 8
    all:
      - id: node-cli-no-mode-daemon-gate
      - id: node-cli-worker-env-flag
      - id: node-cli-quiet-respawn-default
  - id: node-ngrok-forward-api
    desc: Node ngrok forward API
    crit: component
    conf: 0.86
    all:
      - id: node-ngrok-package-require
      - id: node-ngrok-forward-call
  - id: node-public-tunnel-self-registering-daemon
    desc: Node public tunnel self-registering daemon
    crit: suspicious
    conf: 0.92
    all:
      - id: node-workers-default-registry
      - id: node-registers-tunnel-endpoint
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
    any:
      - id: micro-behaviors/communications/proxy/tunnel::cloudflared-node-quick-tunnel
      - id: node-ngrok-forward-api
      - id: node-cli-default-silent-daemon
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
  - id: node-public-tunnel-default-registry-auth
    desc: Node public tunnel posts to authenticated default registry
    crit: suspicious
    conf: 0.9
    all:
      - id: node-workers-default-registry
      - id: node-default-registry-token
      - id: node-registers-tunnel-endpoint
      - id: node-bearer-registry-token
    any:
      - id: micro-behaviors/communications/proxy/tunnel::cloudflared-node-quick-tunnel
      - id: node-ngrok-forward-api
