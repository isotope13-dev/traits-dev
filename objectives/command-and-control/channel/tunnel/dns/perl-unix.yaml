defaults:
  platforms: [unix]
  for: [perl]
  attack: T1071.004

traits:
  - id: perl-dns-cmd-label
    desc: Perl DNS cmd label
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '["'']cmd\.["'']\s*\.\s*\$[A-Za-z_]'

  - id: perl-dns-beacon-label
    desc: Perl DNS beacon label
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '["'']beacon\.["'']\s*\.\s*encode_hex'

composite_rules:
  - id: perl-dns-txt-tasking
    desc: Perl DNS TXT tasking
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/dns/client::perl-udp-dns-socket
      - id: micro-behaviors/communications/dns/client::perl-dns-txt-qtype
      - id: perl-dns-cmd-label

  - id: perl-dns-beacon-channel
    desc: Perl DNS beacon channel
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/dns/client::perl-udp-dns-socket
      - id: micro-behaviors/data/encode/hex::perl-byte-hex-loop
      - id: perl-dns-beacon-label

