defaults:
  platforms: [unix, openwrt]
  for: [ruby]
  attack: T1071.004

traits:
  - id: ruby-dns-c2-labels
    desc: Ruby DNS C2 labels
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'dns_c2_(beacon|check_commands)'
  - id: ruby-dns-work-domain-labels
    desc: Ruby DNS work domain labels
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '(work|config|task)\.\#\{C2_HOST\}'

composite_rules:
  - id: ruby-dns-c2-beacon
    desc: Ruby DNS C2 beacon
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/dns/lookup/resolver::dns-resolve
      - id: micro-behaviors/data/encode/base64::ruby-base64-urlsafe-encode
    any:
      - id: ruby-dns-c2-labels
      - id: ruby-dns-work-domain-labels
      - id: objectives/exfiltration/dns/tunnel::dns-c2
    needs: 1
