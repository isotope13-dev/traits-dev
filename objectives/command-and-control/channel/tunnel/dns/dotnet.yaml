defaults:
  platforms: [android, windows]
  for: [csharp, pe]
  attack: T1071.004

traits:
  - id: dotnet-udp-socket-token
    desc: .NET UDP socket token
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'UdpClient|System\.Net\.Sockets'

  - id: dotnet-dns-context-token
    desc: .NET DNS query context token
    # Anchor to concrete .NET DNS query-type APIs; bare `AddressFamily` and the
    # number `53` matched ordinary socket code and unrelated numeric strings.
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'System\.Net\.Dns|DnsClient|QueryType|Dns\.Resolve'

  - id: dotnet-dns-txt-record
    desc: .NET DNS TXT record handling
    crit: suspicious
    conf: 0.92
    # Anchor BOTH the numeric (16) and symbolic (TXT) query-type tokens to the
    # queryType context; a bare "TXT" alternative matched ASN.1/text substrings
    # in unrelated native libraries (e.g. OpenSSL libcrypto).
    if:
      type: text
      regex: 'queryType.{0,40}(16|TXT)'

  - id: dotnet-base64-subdomain
    desc: .NET Base64 subdomain encoding
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'ToBase64String.{0,80}(Replace|subdomain)'

  - id: dotnet-dns-task-labels
    desc: .NET DNS task labels
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '"(auth|cmd|report)"'

composite_rules:
  - id: dotnet-udp-dns-client
    desc: .NET UDP DNS client
    crit: suspicious
    conf: 0.9
    all:
      - id: dotnet-udp-socket-token
      - id: dotnet-dns-context-token
    unless:
      - id: well-known/lib/spectre-console::spectre-console-library

  - id: dotnet-dns-c2-channel
    desc: .NET DNS C2 channel
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-udp-dns-client
      - id: dotnet-dns-txt-record
    any:
      - id: dotnet-base64-subdomain
      - id: dotnet-dns-task-labels

  - id: dotnet-dns-login-tasking
    desc: .NET DNS login tasking
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-dns-c2-channel
      - id: dotnet-dns-task-labels
