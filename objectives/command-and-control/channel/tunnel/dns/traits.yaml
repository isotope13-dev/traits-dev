defaults:
  platforms: [unix, windows]
  attack: T1071.004
  crit: suspicious
  conf: 0.8
  for: [scripts, binaries]
traits:
  - id: mail-auth-record-lookup-marker
    desc: Mail authentication DNS TXT lookup marker
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: '\b(DKIM|DMARC|v=spf1)\b'
  - id: dns-txt-query-flag
    desc: DNS TXT record query flag
    if:
      type: text
      substr: "-Type TXT"
    unless:
      - id: mail-auth-record-lookup-marker
  - id: dns-txt-query-fn
    desc: DNS TXT record query function
    for: [powershell]
    if:
      type: symbol
      exact: "Resolve-DnsName"
