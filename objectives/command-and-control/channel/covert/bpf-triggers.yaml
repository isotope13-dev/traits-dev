defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1205
traits:
  - id: magic-packet
    desc: magic_packet string
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: magic_packet
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: trigger-packet
    desc: trigger_packet string
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: trigger_packet
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
  - id: port-knock
    desc: port_knock string
    crit: suspicious
    conf: 0.75
    if:
      type: text
      word: port_knock
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/fields/vendor::bitdefender-ecnet-telemetry
