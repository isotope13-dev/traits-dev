# BPF Covert Channel Trigger Patterns
# Magic packet, trigger packet, and port knock strings in BPF context
# ATT&CK: T1205 (Traffic Signaling)
defaults:
  platforms: [unix, windows, macos]
  for: [scripts, binaries]
  attack: T1205
traits:
  - id: magic-packet
    desc: magic_packet string
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      substr: magic_packet
  - id: trigger-packet
    desc: trigger_packet string
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      substr: trigger_packet
  - id: port-knock
    desc: port_knock string
    crit: suspicious
    conf: 0.75
    if:
      type: string_value
      substr: port_knock
