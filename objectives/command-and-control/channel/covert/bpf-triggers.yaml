defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
  attack: T1205
traits:
  - id: magic-packet
    desc: Covert activation via crafted packet
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: magic_packet
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: section
        exact: .modinfo
  - id: trigger-packet
    desc: Packet-triggered backdoor activation
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: trigger_packet
    unless:
      - id: metadata/package/testing/harness/runtime/
  - id: port-knock
    desc: Port-knock covert activation sequence
    crit: suspicious
    conf: 0.75
    if:
      type: text
      word: port_knock
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
