defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  attack: T1205
traits:
  - id: magic-packet
    desc: magic_packet string
    crit: suspicious
    conf: 0.8
    for:
      - binaries
      - scripts
      - manifests
      - documents
      - media
      - data
    if:
      type: text
      substr: magic_packet
  - id: trigger-packet
    desc: trigger_packet string
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: trigger_packet
  - id: port-knock
    desc: port_knock string
    crit: suspicious
    conf: 0.75
    if:
      type: text
      word: port_knock
    unless:
      - id: metadata/package::bitdefender-ecnet-telemetry
