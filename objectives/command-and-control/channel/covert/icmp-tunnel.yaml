defaults:
  platforms: [unix]
  for: [elf, c]
  attack: T1095
  mbc: C0014

traits:
  - id: hip-routing-field
    desc: HIP routing field reference
    crit: component
    conf: 0.62
    if:
      type: raw
      regex: (?i)\b(hip|hidden[_-]?ip)\b

composite_rules:
  - id: icmp-seq-1234-channel
    desc: ICMP sequence 1234 covert channel
    crit: suspicious
    conf: 0.86
    all:
      - id: micro-behaviors/os/bpf/program/icmp::icmp-sequence-1234
    any:
      - id: micro-behaviors/communications/socket/options::options-filter-native
      - id: objectives/command-and-control/backdoor::raw-socket
      - id: micro-behaviors/os/bpf/program/icmp::icmp-parsing

  - id: pid-derived-icmp-filter-channel
    desc: PID-derived ICMP packet filter
    crit: notable
    conf: 0.86
    all:
      - id: micro-behaviors/os/bpf/program/icmp::pid-derived-icmp-bpf-filter
    any:
      - id: micro-behaviors/communications/ip/services::services-icmp
      - id: micro-behaviors/os/bpf/program/icmp::icmp-parsing

  - id: hip-routing-bpf-channel
    desc: Hidden IP routing in BPF channel
    crit: notable
    conf: 0.84
    all:
      - id: hip-routing-field
    any:
      - id: objectives/command-and-control/backdoor::bpf-attachment
      - id: micro-behaviors/communications/socket/options::options-filter-native
      - id: objectives/command-and-control/backdoor::bpf-packet-inspection

  - id: rc4-icmp-tunnel
    desc: RC4-protected ICMP tunnel
    crit: hostile
    conf: 0.94
    all:
      - id: micro-behaviors/crypto/symmetric/stream::rc4-bytecode
    any:
      - id: micro-behaviors/os/bpf/program/icmp::icmp-sequence-1234
      - id: micro-behaviors/os/bpf/program/icmp::pid-derived-icmp-bpf-filter
      - id: micro-behaviors/os/bpf/program/icmp::icmp-parsing
      - id: objectives/command-and-control/channel/covert::icmp-indicators
