# XDP ICMP Covert Channel Detection
# Detects XDP programs used for ICMP-based covert channels
# ATT&CK: T1095 (Non-Application Layer Protocol)
defaults:
  attack: T1095
  platforms: [linux, macos, windows, unix, android, ios]
  for: [c, elf]
traits:
  - id: icmp-pingback
    desc: ICMP pingback covert channel marker
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: (?i)icmp[_-]?ping[_-]?back|ping[_-]?back
composite_rules:
  # XDP program + ICMP manipulation + packet reflection = ICMP covert channel
  - id: xdp-icmp-covert
    desc: XDP ICMP covert channel
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/bpf/program/loader::sec-xdp
      - id: micro-behaviors/os/bpf/program/icmp::icmp-parsing
      - id: micro-behaviors/os/bpf/program/network::xdp-tx
  # XDP loader with ICMP covert channel markers
  # Userspace loader that attaches XDP program for ICMP manipulation
  - id: xdp-icmp-loader
    desc: XDP ICMP covert channel loader
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/bpf/program/network::xdp-attach
      - id: objectives/command-and-control/channel/covert::icmp-indicators
    any:
      - id: micro-behaviors/os/bpf/program/network::bpf-skeleton-include
      - id: micro-behaviors/communications/ip/services::services-icmp

  # Moved from micro-behaviors/os/bpf/program/icmp (tier violation — references objectives)
  - id: icmp-indicators
    desc: ICMP covert channel indicators
    crit: notable
    conf: 0.8
    for: [c, elf]
    any:
      - id: objectives/command-and-control/channel/covert::icmp-pingback
      - id: micro-behaviors/os/bpf/program/icmp::icmp-prog-reply
      - id: micro-behaviors/communications/ip/services::services-icmp
