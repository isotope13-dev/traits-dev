# Covert communication protocol marker strings
# High-entropy strings used as C2 protocol identifiers, user-agents, or beacon markers
defaults:
  platforms: [unix, windows]
  for: [binaries]
  crit: component
  conf: 0.95
  attack: T1071
  mbc: B0030
traits:
  - id: covert-marker-hlLjztqZ
    desc: Covert protocol marker string hlLjztqZ
    if:
      type: text
      word: hlLjztqZ
  - id: covert-marker-npxXoudifFeEgGaACScs
    desc: "Covert protocol artifact npxXoudifFeEgGaACScs"
    if:
      type: text
      word: npxXoudifFeEgGaACScs
composite_rules:
  - id: covert-protocol-markers
    desc: Covert C2 protocol marker strings
    crit: suspicious
    conf: 0.95
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
    all:
      - id: covert-marker-hlLjztqZ
      - id: covert-marker-npxXoudifFeEgGaACScs
  - id: covert-proc-inspection-c2
    desc: Covert C2 with proc inspection
    crit: hostile
    conf: 0.96
    all:
      - id: covert-protocol-markers
      - id: micro-behaviors/fs/proc/info/path::process-maps-cmdline-fragment-cluster
