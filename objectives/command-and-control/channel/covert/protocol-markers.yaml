# Covert communication protocol markers (attack-context-specific).
# The legacy compatibility ID below is retained because other composites
# reference it, but its uClibc input is only a library/static-link artifact.
# It must not itself claim C2 or ATT&CK network behavior.
defaults:
  platforms: [unix, windows]
  for: [binaries]
  crit: component
  conf: 0.95
  attack: T1071
  mbc: B0030
composite_rules:
  - id: covert-protocol-markers
    desc: Legacy uClibc static-link compatibility marker
    crit: baseline
    conf: 0.95
    all:
      - id: well-known/lib/uclibc::printf-conversion-specifiers
      - id: well-known/lib/uclibc::locale-class-bitmap
  - id: covert-proc-inspection-c2
    desc: Static uClibc ELF with proc inspection
    crit: suspicious
    conf: 0.9
    all:
      - id: covert-protocol-markers
      - id: micro-behaviors/fs/proc/info/path::process-maps-cmdline-fragment-cluster
  - id: covert-proc-template-c2
    desc: Static uClibc ELF with proc cmdline/maps templates
    crit: suspicious
    conf: 0.9
    for: [elf]
    all:
      - id: covert-protocol-markers
      - id: micro-behaviors/fs/proc/info/path::process-pid-cmdline-format
      - id: micro-behaviors/fs/proc/info/memory::c-procfs-maps-template
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/tool/sysadmin/unix-benign/
  - id: covert-tcp-state-c2
    desc: Static uClibc ELF with TCP state inspection
    crit: suspicious
    conf: 0.9
    for: [elf]
    all:
      - id: covert-protocol-markers
      - id: micro-behaviors/fs/proc/info/path::proc-net-tcp
    any:
      - id: metadata/binary/anomaly/format::elf-executable-stack
      - id: micro-behaviors/os/syscall/invoke::svc-read
      - id: micro-behaviors/os/syscall/invoke::svc-write
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/tool/sysadmin/unix-benign/
  - id: http-proc-fingerprint-c2
    desc: HTTP-masquerading C2 with procfs fingerprinting
    crit: hostile
    conf: 0.97
    attack: T1071.001,T1057
    mbc: B0030,E1057
    for: [elf]
    all:
      - id: covert-protocol-markers
      - id: micro-behaviors/fs/proc/info/path::proc-net-tcp
      - id: micro-behaviors/fs/proc/info/path::process-pid-exe-template
      - id: micro-behaviors/communications/http/user-agent::browser-mozilla-5-0
      - id: micro-behaviors/communications/http/header/content-type::json-header
    any:
      - id: micro-behaviors/communications/http/cookies::ascii-cookie-header-binary
      - id: metadata/binary/anomaly/format::elf-executable-stack
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/tool/sysadmin/unix-benign/
  - id: covert-iot-reflection-bot-protocol
    desc: IoT reflection bot with static uClibc tables
    crit: hostile
    conf: 0.97
    attack: T1071,T1498.002
    for: [elf]
    all:
      - id: covert-protocol-markers
      - id: objectives/impact/dos/amplification::service-discovery-reflection
    any:
      - id: micro-behaviors/fs/path/binary::bin-busybox-path
      - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-runtime-wordlist
      - id: micro-behaviors/communications/http/request/ssdp::spoofed-browser-ssdp
  - id: covert-elf-shell-resolver-c2
    desc: Static uClibc ELF with shell and resolver access
    crit: suspicious
    conf: 0.9
    attack: T1071,T1059.004
    for: [elf]
    all:
      - id: covert-protocol-markers
      - id: micro-behaviors/fs/path/config/system
    any:
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
      - id: micro-behaviors/process/create/shell/spawn::system-fn
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/tool/sysadmin/unix-benign/
