# Covert communication protocol marker strings
# High-entropy strings used as C2 protocol identifiers, user-agents, or beacon markers
defaults:
  platforms: [unix, windows]
  for: [binaries]
  crit: component
  conf: 0.95
  attack: T1071
  mbc: B0030
traits:
  - id: covert-marker-hlLjztqZ
    desc: Covert protocol marker string hlLjztqZ
    if:
      type: text
      substr: hlLjztqZ
  - id: covert-marker-npxXoudifFeEgGaACScs
    desc: "Covert protocol artifact npxXoudifFeEgGaACScs"
    if:
      type: text
      substr: npxXoudifFeEgGaACScs
composite_rules:
  - id: covert-protocol-markers
    desc: Covert C2 protocol marker strings
    crit: notable
    conf: 0.95
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
    all:
      - id: covert-marker-hlLjztqZ
      - id: covert-marker-npxXoudifFeEgGaACScs
  - id: covert-proc-inspection-c2
    desc: Covert C2 with proc inspection
    crit: hostile
    conf: 0.96
    all:
      - id: covert-protocol-markers
      - id: micro-behaviors/fs/proc/info/path::process-maps-cmdline-fragment-cluster
  - id: covert-iot-reflection-bot-protocol
    desc: Covert C2 markers in IoT reflection bot
    crit: hostile
    conf: 0.97
    attack: T1071,T1498.002
    for: [elf]
    all:
      - id: covert-protocol-markers
      - id: objectives/impact/dos/amplification::service-discovery-reflection
    any:
      - id: objectives/command-and-control/botnet/iot::busybox
      - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-runtime-wordlist
  - id: covert-elf-shell-resolver-c2
    desc: ELF covert protocol with shell and resolver access
    crit: hostile
    conf: 0.97
    attack: T1071,T1059.004
    for: [elf]
    all:
      - id: covert-protocol-markers
      - id: micro-behaviors/fs/path/config/system
    any:
      - id: micro-behaviors/process/create/shell/spawn::bin-sh
      - id: micro-behaviors/process/create/shell/encoded::bin-sh-binary-text
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - id: well-known/tool/sysadmin/unix-benign/
