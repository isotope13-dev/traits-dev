defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts]
  attack: T1090.003
  mbc: B0030

traits:
  - id: tor-expert-bundle
    # The Tor Project distributes its standalone headless proxy as the archive
    # "tor-expert-bundle-<version>-<platform>". Malware embeds this name to
    # silently download and self-host a Tor client so C2/exfil traffic rides an
    # onion circuit with no system Tor required. Legitimate apps integrate Tor
    # through tor-browser bundles or libtor linkage, not by referencing the
    # expert-bundle download artifact at runtime.
    desc: "refs bundled Tor Expert for stealth"
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: tor-expert-bundle-

composite_rules:
  - id: credential-stealer-tor-exfil
    # A multi-application credential stealer that also pulls down the Tor Expert
    # Bundle is routing its theft out through a self-hosted onion circuit to
    # anonymize the operator — a complete steal-and-anonymized-send chain.
    desc: Tunnels exfiltration via self-hosted Tor
    crit: hostile
    conf: 0.97
    attack: T1041
    all:
      - id: tor-expert-bundle
    any:
      - id: objectives/credential-access/theft/multi-app::multi-app-credential-stealer
      - id: objectives/credential-access/theft/multi-app::browser-wallet-stealer
      - id: objectives/credential-access/discord/token::native-discord-token-grabber
