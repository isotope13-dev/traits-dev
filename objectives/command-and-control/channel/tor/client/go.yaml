defaults:
  platforms: [windows, linux, macos]
  mbc: C0026
  attack: T1090.003
traits:
  - id: bine-import
    desc: cretz/bine Tor library import
    crit: suspicious
    conf: 0.95
    for:
      - go
    if:
      type: symbol
      kind: import
      regex: github\.com/cretz/bine
  - id: bine-string
    desc: cretz/bine Tor library in binary
    crit: suspicious
    conf: 0.9
    for: [go, elf, macho, pe]
    if:
      type: text
      regex: github\.com/cretz/bine
  - id: tor-dialer
    desc: Tor Dialer creation
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: call
      regex: tor\.(Dialer|NewDialer)
  - id: tor-start
    desc: Tor process start
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: symbol
      kind: call
      exact: tor.Start
  - id: listen-hidden-service
    desc: Tor hidden service listener
    crit: suspicious
    conf: 0.95
    for:
      - go
    if:
      type: string_literal
      word: HiddenServicePort
  - id: onion-key
    desc: Tor onion service key handling
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      exact: hs_private
  - id: onion-address-v3
    desc: Tor v3 onion address
    crit: notable
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      regex: '[a-z2-7]{56}\.onion'
    not:
      - substr: listen.onion
    unless:
      - id: well-known/app/onion-mirror
      - id: well-known/app/blockstream::native-extension-init
  - id: onion-address-v2
    desc: Tor v2 onion address (deprecated)
    crit: notable
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      regex: '\b[a-z2-7]{16}\.onion\b'
    not:
      # Go stdlib net package concatenates "telnet"+"listen"+".onion" in its string table
      - substr: listen.onion
  - id: go-libtor
    desc: go-libtor embedded Tor
    crit: suspicious
    conf: 0.95
    for: [scripts, binaries]
    if:
      type: text
      substr: go-libtor
  - id: ntor-handshake-suite
    desc: Tor NTOR handshake suite
    crit: suspicious
    conf: 0.94
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: ntor-curve25519-sha256-1
  - id: tor-cell-runtime
    desc: Tor cell transport runtime
    crit: suspicious
    conf: 0.92
    for: [pe]
    platforms: [windows]
    if:
      type: text
      regex: tor_socket::(send_cell|recv_cell)\(
  - id: tor-ntor-circuit
    desc: Tor NTOR circuit operations
    crit: suspicious
    conf: 0.92
    for: [pe]
    platforms: [windows]
    if:
      type: text
      regex: circuit::(create|extend)_ntor\(
  - id: consensus-directory-path
    desc: Tor consensus directory path
    crit: notable
    conf: 0.9
    for: [pe]
    platforms: [windows]
    if:
      type: text
      exact: /tor/status-vote/current/consensus
composite_rules:
  - id: tor-library
    desc: Tor library usage
    crit: suspicious
    conf: 0.9
    any:
      - id: bine-import
      - id: bine-string
      - id: go-libtor
  - id: tor-operations
    desc: Tor network operations
    crit: notable
    conf: 0.85
    any:
      - id: tor-dialer
      - id: tor-start
  - id: hidden-service-setup
    desc: Hidden service configuration
    crit: suspicious
    conf: 0.9
    any:
      - id: listen-hidden-service
      - id: onion-key
  - id: tor-client
    desc: Tor client connectivity
    crit: suspicious
    conf: 0.9
    all:
      - id: tor-library
      - id: tor-operations
  - id: tor-hidden-service
    desc: Tor hidden service setup
    crit: suspicious
    conf: 0.95
    all:
      - id: tor-library
      - id: hidden-service-setup
  - id: tor-hidden-service-runtime
    desc: Tor hidden service client runtime
    crit: suspicious
    conf: 0.95
    for: [pe]
    platforms: [windows]
    all:
      - id: ntor-handshake-suite
    any:
      - id: tor-cell-runtime
      - id: tor-ntor-circuit
      - id: consensus-directory-path
