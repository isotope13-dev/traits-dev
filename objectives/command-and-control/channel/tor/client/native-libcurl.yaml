defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1090.003
  mbc: B0030
traits:
  - id: onion-fragment
    desc: Onion hidden-service fragment
    crit: component
    conf: 0.95
    if:
      type: text
      substr: .onion
composite_rules:
  - id: native-libcurl-onion-socks
    desc: Native libcurl Tor client over SOCKS
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/download/curl::libcurl-version
      - id: micro-behaviors/communications/proxy/socks::socks5-proto
      - id: onion-fragment
