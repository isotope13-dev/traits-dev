# Script/command-line Tor client: routes HTTP to a hidden service through the
# local Tor SOCKS proxy (e.g. `curl --socks5-hostname localhost:9050 http://<x>.onion/...`).
# The native libcurl variant lives in native-libcurl.yaml; this covers scripts
# and command-line invocations where the curl/flag adjacency is broken up by
# string concatenation.
defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1090.003
  mbc: B0030
composite_rules:
  # An onion hidden-service address combined with a local Tor SOCKS proxy (the
  # default 9050/9051 port, or curl's --socks5-hostname flag) is the textbook
  # Tor C2 pattern; legitimate software almost never hardcodes both.
  - id: script-tor-onion-socks-c2
    desc: Tor C2 over SOCKS to onion service
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/proxy/tor::onion-domain-reference
    any:
      - id: micro-behaviors/communications/proxy/socks::tor-socks-proxy-port
      - id: micro-behaviors/communications/proxy/socks::curl-socks5-hostname
    needs: 1
