defaults:
  platforms: [windows, unix]
  for: [powershell, shell, batch, pe, elf]
  attack: T1090.003
traits:
  - id: tor-hidden-service-dir
    desc: Tor hidden service directory
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?mi)^\s*HiddenServiceDir\s+\S+
  - id: tor-hidden-service-loopback-port
    desc: Tor hidden service loopback port
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: (?mi)^\s*HiddenServicePort\s+\d+\s+127\.0\.0\.1:\d+
  - id: tor-hidden-service-admin-port
    desc: Tor hidden service exposes admin port
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: (?mi)^\s*HiddenServicePort\s+\d+\s+127\.0\.0\.1:(22|445|3389)\b
  - id: tor-hidden-service-many-loopback-ports
    desc: Multiple Tor loopback service forwards
    crit: suspicious
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: (?mi)^\s*HiddenServicePort\s+\d+\s+127\.0\.0\.1:\d+
  - id: tor-obfs4-client-bridges
    desc: Tor obfs4 bridge configuration
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: (?is)ClientTransportPlugin\s+obfs4\s+exec.{0,400}\bBridge\s+obfs4\b
composite_rules:
  - id: tor-hidden-service-backdoor-channel
    desc: Tor hidden service backdoor channel
    crit: hostile
    conf: 0.97
    all:
      - id: tor-hidden-service-dir
      - id: tor-hidden-service-admin-port
    any:
      - id: tor-hidden-service-many-loopback-ports
      - id: tor-obfs4-client-bridges
  - id: tor-onion-socks-beacon
    desc: Tor SOCKS onion beacon
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/proxy/socks::curl-socks5-hostname
      - id: objectives/command-and-control/channel/tor/client::onion-address-v3
