defaults:
  platforms: [windows, linux, macos]
  mbc: B0030
  attack: T1090.003
traits:
  - id: embedded-onion-endpoint
    desc: Embedded .onion service endpoint
    crit: suspicious
    conf: 0.9
    for: [go, elf, macho, pe]
    if:
      type: text
      regex: '[a-z2-7]{56}\.onion:[0-9]+'
    unless:
    - id: well-known/app/blockstream::native-extension-init
    - id: well-known/app/cryptographic-triangles::cryptographic-triangles-tor-wallet-context
    - type: text
      substr: "blockstream/green/gdk"
  - id: onion-port-1337
    desc: Onion service on port 1337
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      substr: .onion:1337
  - id: onion-port-4444
    desc: Onion service on port 4444
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      substr: .onion:4444
  - id: onion-port-9001
    desc: Onion service on port 9001
    crit: suspicious
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      substr: .onion:9001
  - id: hidden-service-listener
    desc: Tor hidden service listener setup
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: string_literal
      regex: Listen.{0,20}onion|onion.{0,20}Listen
  - id: create-hidden-service
    desc: Creates Tor onion C2 service
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: string_literal
      word: CreateHiddenService
composite_rules:
  - id: onion-c2-port
    desc: Tor C2 with common RAT ports
    crit: suspicious
    conf: 0.85
    for: [scripts, binaries]
    any:
      - id: onion-port-1337
      - id: onion-port-4444
      - id: onion-port-9001
  - id: hidden-service-setup-comp
    desc: Hidden service setup operations
    crit: suspicious
    conf: 0.9
    for:
      - go
    any:
      - id: hidden-service-listener
      - id: create-hidden-service
  - id: tor-c2-infrastructure
    desc: Tor hidden service C2 infrastructure
    crit: suspicious
    conf: 0.95
    for:
      - go
    all:
      - id: objectives/command-and-control/channel/tor/client::bine-import
    any:
      - id: embedded-onion-endpoint
      - id: onion-c2-port
      - id: hidden-service-setup-comp
  - id: tor-rpc-c2
    desc: Tor hidden service with RPC C2
    crit: hostile
    conf: 0.98
    for:
      - go
    all:
      - id: objectives/command-and-control/channel/tor/client::bine-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: micro-behaviors/communications/proxy/tor::onion-domain-reference
  - id: tor-c2-binary
    desc: Compiled binary with Tor C2 infrastructure
    crit: hostile
    conf: 0.95
    for: [scripts, binaries]
    all:
      - id: objectives/command-and-control/channel/tor/client::bine-string
      - id: micro-behaviors/communications/proxy/tor::onion-domain-reference
      - id: micro-behaviors/communications/socket/rpc::rpc-register-string

  - id: tor-wallet-c2-binary
    desc: Tor C2 binary targets Bitcoin wallets
    crit: hostile
    conf: 0.98
    for: [elf]
    all:
      - id: embedded-onion-endpoint
      - id: objectives/impact/crypto-manipulation/keystore::native-bitcoin-wallet-paths
  - id: onion-service-socket-shell-backdoor
    desc: Native binary combines an onion endpoint with socket shell redirection
    crit: hostile
    conf: 0.995
    attack: T1090.003,T1059.004
    for: [elf]
    scope: leaf
    all:
      - id: embedded-onion-endpoint
      - id: objectives/command-and-control/reverse-shell/dup::unix-dual-mode-socket-exec-redirect
