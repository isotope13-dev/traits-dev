defaults:
  platforms: [windows, linux, macos]
  mbc: B0030
  attack: T1090.003
traits:
  - id: embedded-onion-c2
    desc: Embedded .onion C2 address
    crit: suspicious
    conf: 0.9
    for: [go, elf, macho, pe]
    if:
      type: text
      regex: '[a-z2-7]{56}\.onion:[0-9]+'
  - id: onion-port-1337
    desc: Onion service on port 1337
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      substr: .onion:1337
  - id: onion-port-4444
    desc: Onion service on port 4444
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries]
    if:
      type: text
      substr: .onion:4444
  - id: onion-port-9001
    desc: Onion service on port 9001
    crit: suspicious
    conf: 0.85
    for: [scripts, binaries]
    if:
      type: text
      substr: .onion:9001
  - id: hidden-service-listener
    desc: Tor hidden service listener setup
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: string_literal
      regex: Listen.{0,20}onion|onion.{0,20}Listen
  - id: create-hidden-service
    desc: CreateHiddenService call
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: string_literal
      word: CreateHiddenService
composite_rules:
  - id: onion-c2-port
    desc: Tor C2 with common RAT ports
    crit: suspicious
    conf: 0.85
    for: [scripts, binaries]
    any:
      - id: onion-port-1337
      - id: onion-port-4444
      - id: onion-port-9001
  - id: hidden-service-setup-comp
    desc: Hidden service setup operations
    crit: suspicious
    conf: 0.9
    for:
      - go
    any:
      - id: hidden-service-listener
      - id: create-hidden-service
  - id: tor-c2-infrastructure
    desc: Tor hidden service C2 infrastructure
    crit: suspicious
    conf: 0.95
    for:
      - go
    all:
      - id: objectives/command-and-control/channel/tor::bine-import
    any:
      - id: embedded-onion-c2
      - id: onion-c2-port
      - id: hidden-service-setup-comp
  - id: tor-rpc-c2
    desc: Tor hidden service with RPC C2
    crit: hostile
    conf: 0.98
    for:
      - go
    all:
      - id: objectives/command-and-control/channel/tor::bine-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: objectives/command-and-control/channel/tor::onion-address-v3
  - id: tor-c2-binary
    desc: Compiled binary with Tor C2 infrastructure
    crit: hostile
    conf: 0.95
    for: [scripts, binaries]
    all:
      - id: objectives/command-and-control/channel/tor::bine-string
      - id: objectives/command-and-control/channel/tor::onion-address-v3
      - id: micro-behaviors/communications/socket/rpc::rpc-register-string
