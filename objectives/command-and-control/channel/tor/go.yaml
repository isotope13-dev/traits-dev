defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  mbc: C0026
  attack: T1090.003
traits:
  - id: bine-import
    desc: cretz/bine Tor library import
    crit: suspicious
    conf: 0.95
    for:
      - go
    if:
      type: ast
      kind: import
      regex: github\.com/cretz/bine
  - id: bine-string
    desc: cretz/bine Tor library in binary
    crit: suspicious
    conf: 0.9
    for:
      - elf
      - macho
      - pe
    if:
      type: string_value
      regex: github\.com/cretz/bine
  - id: tor-dialer
    desc: Tor Dialer creation
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: ast
      kind: call
      regex: \btor\.(Dialer|NewDialer)\b
  - id: tor-start
    desc: Tor process start
    crit: suspicious
    conf: 0.9
    for:
      - go
    if:
      type: ast
      kind: call
      exact: tor.Start
  - id: listen-hidden-service
    desc: Tor hidden service listener
    crit: suspicious
    conf: 0.95
    for:
      - go
    if:
      type: string_value
      word: HiddenServicePort
  - id: onion-key
    desc: Tor onion service key handling
    crit: suspicious
    conf: 0.9
    for:
      - go
      - elf
      - macho
      - pe
    if:
      type: string_value
      exact: hs_private
  - id: onion-address-v3
    desc: Tor v3 onion address
    crit: suspicious
    conf: 0.85
    for:
      - go
      - elf
      - macho
      - pe
    if:
      type: string_value
      regex: '[a-z2-7]{56}\.onion'
  - id: onion-address-v2
    desc: Tor v2 onion address (deprecated)
    crit: suspicious
    conf: 0.85
    for:
      - go
      - elf
      - macho
      - pe
    if:
      type: string_value
      regex: '[a-z2-7]{16}\.onion'
  - id: go-libtor
    desc: go-libtor embedded Tor
    crit: suspicious
    conf: 0.95
    for:
      - go
      - elf
      - macho
      - pe
    if:
      type: string_value
      substr: go-libtor
composite_rules:
  - id: tor-library
    desc: Tor library usage
    crit: suspicious
    conf: 0.9
    any:
      - id: bine-import
      - id: bine-string
      - id: go-libtor
  - id: tor-operations
    desc: Tor network operations
    crit: notable
    conf: 0.85
    any:
      - id: tor-dialer
      - id: tor-start
  - id: hidden-service-setup
    desc: Hidden service configuration
    crit: suspicious
    conf: 0.9
    any:
      - id: listen-hidden-service
      - id: onion-key
  - id: tor-client
    desc: Tor client connectivity
    crit: suspicious
    conf: 0.9
    all:
      - id: tor-library
      - id: tor-operations
  - id: tor-hidden-service
    desc: Tor hidden service setup
    crit: suspicious
    conf: 0.95
    all:
      - id: tor-library
      - id: hidden-service-setup
