defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1071.001
  mbc: B0030
traits:
  - id: chrome-spoof-user-agent-pe
    desc: Chrome User-Agent in non-Chrome PE
    crit: suspicious
    conf: 0.9
    size_max: 5242880
    if:
      type: text
      regex: 'Mozilla/5\.0 \(.{0,80}\) AppleWebKit/[0-9.]{1,12} \(KHTML, like Gecko\) Chrome/[0-9.]{3,16}'
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/developer::google-llc
      - type: text
        regex: '(?i)\b(google ?chrome|chromium|chrome\.exe)\b'
        section: .rsrc
  - id: chrome-spoof-user-agent-script
    desc: Chrome User-Agent in script source
    crit: notable
    conf: 0.75
    for: [powershell, python, javascript, vbs, batch]
    platforms: [linux, macos, windows]
    if:
      type: text
      regex: 'Mozilla/5\.0 \(.{0,80}\) AppleWebKit/[0-9.]{1,12} \(KHTML, like Gecko\) Chrome/[0-9.]{3,16}'
  - id: rest-telemetry-endpoint
    desc: Generic REST telemetry/beacon endpoint path
    crit: component
    conf: 0.85
    size_max: 5242880
    if:
      type: text
      regex: '/api/v[0-9]+/(telemetry|beacon|check[-_]?in|heartbeat|tasks?|cmd|command)'
  - id: http-content-type-json
    desc: HTTP Content-Type application/json
    crit: component
    conf: 0.7
    size_max: 5242880
    if:
      type: text
      substr: 'Content-Type: application/json'
  - id: http-connection-close-header
    desc: HTTP Connection close header
    crit: component
    conf: 0.6
    size_max: 5242880
    if:
      type: text
      exact: 'Connection: close'
  - id: hardcoded-localhost-c2
    desc: Hardcoded loopback IP (likely test C2)
    crit: suspicious
    conf: 0.7
    size_max: 5242880
    if:
      type: text
      regex: '\b127\.0\.0\.1\b'
    unless:
      - id: metadata/binary/framework::dotnet-metadata
composite_rules:
  - id: raw-tcp-http-cluster
    desc: Raw Winsock TCP with HTTP semantics
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: http-content-type-json
      - id: http-connection-close-header
      - id: rest-telemetry-endpoint
      - id: chrome-spoof-user-agent-pe
      - id: chrome-spoof-user-agent-script
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: c2-http-beacon-pattern
    desc: Custom C2 HTTP beacon over raw Winsock
    crit: hostile
    conf: 0.95
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: micro-behaviors/communications/socket/init::ws2-connect-api-string
      - id: raw-tcp-http-cluster
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
  - id: loopback-c2-test-deployment
    desc: Loopback-targeted C2 (operational test deployment)
    crit: hostile
    conf: 0.92
    arch: [x86-64]
    size_max: 5242880
    all:
      - id: hardcoded-localhost-c2
      - id: raw-tcp-http-cluster
      - id: micro-behaviors/communications/socket/init::ws2-connect-api-string
    unless:
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/binary/framework::dotnet-assembly
      - id: metadata/binary/installer::known-benign-installer
