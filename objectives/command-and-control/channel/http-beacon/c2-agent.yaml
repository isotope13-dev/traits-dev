defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1071.001
  mbc: B0030
traits:
- id: chrome-spoof-user-agent-pe--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  size_max: 5242880
  if:
    type: text
    substr: like Gecko) Chrome
  count_max: 1010703
- id: chrome-spoof-user-agent-pe--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  size_max: 5242880
  if:
    type: text
    substr: ) AppleWebKit
  count_max: 1010704
- id: chrome-spoof-user-agent-pe--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  size_max: 5242880
  if:
    type: text
    substr: (KHTML
  count_max: 1010706
- id: rest-telemetry-endpoint--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.85
  size_max: 5242880
  if:
    type: text
    regex: '/api/v[0-9]+/(telemetry|beacon)'
  count_max: 1010711
- id: rest-telemetry-endpoint--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.85
  size_max: 5242880
  if:
    type: text
    regex: '/api/v[0-9]+/(check[-_]?in|heartbeat)'
  count_max: 1010712
- id: rest-telemetry-endpoint--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.85
  size_max: 5242880
  if:
    type: text
    regex: '/api/v[0-9]+/(tasks?|cmd)'
  count_max: 1010713
- id: rest-telemetry-endpoint--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.85
  size_max: 5242880
  if:
    type: text
    regex: '/api/v[0-9]+/(command)'
  count_max: 1010714
- id: rest-telemetry-endpoint--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [javascript, typescript, powershell, python, shell]
  platforms: [linux, macos, windows]
  size_max: 5242880
  if:
    type: literal
    kind: string
    substr: /api/urls?url=
  count_max: 1010715
- id: http-content-type-json
  desc: HTTP Content-Type application/json
  crit: component
  conf: 0.7
  size_max: 5242880
  if:
    type: text
    substr: 'Content-Type: application/json'
- id: http-connection-close-header
  desc: HTTP Connection close header
  crit: component
  conf: 0.6
  size_max: 5242880
  if:
    type: text
    exact: 'Connection: close'
- id: hardcoded-localhost-c2
  desc: Hardcoded loopback IP address
  crit: notable
  conf: 0.7
  size_max: 5242880
  if:
    type: text
    regex: '\b127\.0\.0\.1\b'
  unless:
  - id: metadata/binary/framework::dotnet-metadata
- id: spaced-chrome-user-agent-pe--rx-1
  desc: Spaced Mozilla Chrome User-Agent prefix
  crit: component
  conf: 0.9
  size_max: 5242880
  if:
    type: text
    substr: 'Mozilla / 5.0'
- id: spaced-chrome-user-agent-pe--rx-2
  desc: Spaced Chrome User-Agent token
  crit: component
  conf: 0.9
  size_max: 5242880
  if:
    type: text
    substr: 'Chrome / '
- id: chrome-spoof-user-agent-pe-cond-2--inline-10717
  desc: Regex component marker
  crit: component
  conf: 0.9
  size_max: 5242880
  if:
    type: text
    regex: '(?i)\b(google ?chrome|chromium|chrome\.exe)\b'
    section: .rsrc
  count_max: 1010718
composite_rules:
- id: raw-tcp-http-cluster
  desc: Raw Winsock TCP with HTTP semantics
  crit: notable
  conf: 0.92
  needs: 2
  any:
  - id: http-content-type-json
  - id: http-connection-close-header
  - id: rest-telemetry-endpoint
  - id: chrome-spoof-user-agent-pe
  - id: chrome-spoof-user-agent-script
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework/
  - id: well-known/lib/youtube-dl/
  - id: well-known/lib/youtube-dl::youtube-dl-package-context
- id: c2-http-beacon-pattern
  desc: Custom C2 HTTP beacon over raw Winsock
  crit: hostile
  conf: 0.95
  arch: [x86-64]
  size_max: 5242880
  all:
  - id: micro-behaviors/communications/socket/init::ws2-connect-api-string
  - id: raw-tcp-http-cluster
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework/
- id: loopback-c2-test-deployment
  desc: Loopback-targeted C2 (operational test deployment)
  crit: hostile
  conf: 0.92
  arch: [x86-64]
  size_max: 5242880
  all:
  - id: hardcoded-localhost-c2
  - id: raw-tcp-http-cluster
  - id: micro-behaviors/communications/socket/init::ws2-connect-api-string
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/binary/framework/
  - id: metadata/binary/installer/family/
- id: spaced-chrome-spoof-user-agent-pe
  desc: Spaced Chrome User-Agent in non-Chrome PE
  crit: suspicious
  conf: 0.9
  size_max: 5242880
  all:
  - id: spaced-chrome-user-agent-pe--rx-1
  - id: spaced-chrome-user-agent-pe--rx-2
  - id: chrome-spoof-user-agent-pe--rx-1
  - id: chrome-spoof-user-agent-pe--rx-4
  near_bytes: 4096
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/signed/developer::google-llc
  - id: chrome-spoof-user-agent-pe-cond-2--inline-10717
  - id: well-known/lib/youtube-dl/
  - id: well-known/lib/youtube-dl::youtube-dl-package-context
- id: http-post-cookie-referer-pe
  desc: PE HTTP POST with Cookie and Referer headers
  crit: suspicious
  conf: 0.9
  size_max: 5242880
  all:
  - id: micro-behaviors/communications/http/post::post-string-pe
  - id: micro-behaviors/communications/http/cookies::utf16-cookie-header-pe
  - id: micro-behaviors/communications/http/headers::utf16-referer-header-pe
  any:
  - id: chrome-spoof-user-agent-pe
  - id: spaced-chrome-spoof-user-agent-pe
  unless:
  - id: metadata/binary/installer/family/
- id: chrome-spoof-user-agent-pe
  desc: Chrome User-Agent in non-Chrome PE
  crit: suspicious
  conf: 0.9
  size_max: 5242880
  all:
  - id: chrome-spoof-user-agent-pe--rx-1
  - id: chrome-spoof-user-agent-pe--rx-2
  - id: micro-behaviors/communications/http/user-agent::browser-mozilla-5-0
  - id: chrome-spoof-user-agent-pe--rx-4
  near_bytes: 4096
  unless:
  - id: metadata/binary/framework::dotnet-metadata
  - id: metadata/signed/developer::google-llc
  - id: chrome-spoof-user-agent-pe-cond-2--inline-10717
  - id: well-known/lib/youtube-dl/
  - id: well-known/lib/youtube-dl::youtube-dl-package-context
- id: chrome-spoof-user-agent-script
  desc: Chrome User-Agent in script source
  crit: notable
  conf: 0.75
  for: [powershell, python, javascript, vbs, batch]
  platforms: [linux, macos, windows]
  all:
  - id: objectives/command-and-control/channel/http-beacon::chrome-spoof-user-agent-pe--rx-1
  - id: objectives/command-and-control/channel/http-beacon::chrome-spoof-user-agent-pe--rx-2
  - id: micro-behaviors/communications/http/user-agent::browser-mozilla-5-0
  - id: objectives/command-and-control/channel/http-beacon::chrome-spoof-user-agent-pe--rx-4
  near_bytes: 4096
  unless:
  - id: well-known/app/svtplay-dl
- id: js-hardcoded-ip-post-telemetry
  desc: Hardcoded IP POST telemetry endpoint
  crit: suspicious
  conf: 0.92
  for: [javascript, typescript]
  platforms: [linux, macos, windows]
  near_bytes: 768
  all:
  - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-js-ip-port-endpoint
  - id: rest-telemetry-endpoint
  - id: micro-behaviors/communications/http/request/client::post-method-text
- id: rest-telemetry-endpoint
  desc: Generic REST telemetry/beacon endpoint path
