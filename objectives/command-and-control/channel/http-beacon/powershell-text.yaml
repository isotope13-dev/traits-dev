defaults:
  for: [powershell, text]
  platforms: [windows]
  attack: "T1071.001"
traits:
  - id: ps-seeded-work-url-generation
    desc: PowerShell seeded work URL
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "function generateWorkUrl"
  - id: ps-dateparam-dga
    desc: PowerShell dateparam DGA
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "function getDateParam"
  - id: ps-random-setseed-hostparts
    desc: PowerShell seeded host parts
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "Get-Random -SetSeed ($dateparam"
  - id: ps-webclient-cookie-auth
    desc: WebClient cookie auth channel
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: '$wc.Headers.Add("Cookie"'
  - id: ps-webclient-user-agent
    desc: WebClient User-Agent header
    crit: component
    conf: 0.86
    if:
      type: text
      substr: '$wc.Headers.Add("User-Agent"'
  - id: ps-addtype-embedded-crypto
    desc: Add-Type embedded crypto class
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "Add-Type -TypeDefinition $vCsLib"
  - id: ps-rsa-aes-hybrid-crypto
    desc: PowerShell RSA AES hybrid crypto
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "RSACryptoServiceProvider prov"
composite_rules:
  - id: powershell-seeded-http-beacon
    desc: PowerShell seeded HTTP beacon
    crit: hostile
    conf: 0.98
    all:
      - id: ps-seeded-work-url-generation
      - id: ps-dateparam-dga
    any:
      - id: ps-random-setseed-hostparts
      - id: ps-webclient-cookie-auth
      - id: ps-webclient-user-agent
      - id: ps-addtype-embedded-crypto
      - id: ps-rsa-aes-hybrid-crypto
    needs: 3
