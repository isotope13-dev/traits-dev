# WAMP (Web Application Messaging Protocol) C2 channel detection
# WAMP is a WebSocket subprotocol providing RPC and pub/sub messaging.
# The autobahn C++ library embedded in PE DLLs is highly unusual and
# strongly associated with malware C2 channels.
# ATT&CK: T1071.001 (Web Protocols)
# MBC: B0030 (C2 Communication)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1071.001
  mbc: B0030

traits:
  - id: wamp-session-rtti
    desc: WAMP session RTTI type descriptor
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: wamp_session@autobahn

  - id: wamp-transport-rtti
    desc: WAMP TCP transport RTTI descriptor
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: wamp_tcp_transport@autobahn

  - id: wamp-error-strings
    desc: WAMP protocol error namespace
    crit: notable
    conf: 0.92
    if:
      type: string_value
      substr: "wamp.error."

  - id: wampcra-auth
    desc: WAMP-CRA authentication protocol
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: wampcra

  - id: wamp-message-rtti
    desc: WAMP message RTTI type descriptor
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: wamp_message@autobahn

  - id: wamp-invocation-rtti
    desc: WAMP RPC invocation RTTI descriptor
    crit: component
    conf: 0.85
    if:
      type: string_value
      substr: wamp_invocation

composite_rules:
  - id: wamp-c2-channel
    desc: WAMP C2 communication channel
    crit: suspicious
    conf: 0.92
    all:
      - id: wamp-session-rtti
    any:
      - id: wamp-transport-rtti
      - id: wamp-error-strings
      - id: wampcra-auth
      - id: wamp-message-rtti
      - id: wamp-invocation-rtti

  - id: wamp-autobahn-c2-implant
    desc: Autobahn WAMP C2 implant in DLL
    crit: hostile
    conf: 0.95
    all:
      - id: wamp-c2-channel
      - id: metadata/binary/metrics::many-imports
    any:
      - id: objectives/evasion/process/injection/runtime::queue-user-apc
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
      - id: micro-behaviors/crypto/library::openssl-evp-encrypt
