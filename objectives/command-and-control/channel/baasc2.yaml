# Backend-as-a-Service C2 Channel
# Detects malware using cloud BaaS platforms (Parse/Back4App, Firebase, etc.) as C2 infrastructure
# Provides persistent, hosted C2 without attacker-maintained servers
# ATT&CK: T1102 (Web Service)
defaults:
  platforms: [windows, unix]
  for: [binaries, javascript, typescript, java, go]
  crit: suspicious
  conf: 0.85
  attack: "T1102"

traits:
  - id: back4app-parse-endpoint
    desc: Back4App Parse REST API endpoint
    conf: 0.9
    if:
      type: text
      substr: "parseapi.back4app.com"

  - id: parse-command-result
    desc: Parse query COMMAND_SUCCESSFUL constant
    crit: component
    conf: 0.75
    if:
      type: text
      exact: "COMMAND_SUCCESSFUL"

  - id: parse-key-results
    desc: Parse response KEY_RESULTS constant
    crit: component
    conf: 0.75
    if:
      type: text
      exact: "KEY_RESULTS"

  - id: onesignal-subscription
    desc: OneSignal push notification C2 subscription
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: "ONESIGNAL_SUBSCRIPTION"

composite_rules:
  - id: parse-baasc2-channel
    desc: Parse/Back4App cloud backend used for C2 tasking
    crit: suspicious
    conf: 0.9
    all:
      - id: back4app-parse-endpoint
    any:
      - id: parse-command-result
      - id: parse-key-results
