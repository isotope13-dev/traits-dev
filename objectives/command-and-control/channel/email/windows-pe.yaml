# A compiled Windows executable that directly speaks SMTP to deliver a
# coercive message. The protocol and message semantics are both required.
defaults:
  platforms: [windows]
  for: [pe, dll]

composite_rules:
  - id: pe-smtp-sextortion-mailer
    desc: PE direct-SMTP sextortion mailer
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/email/send/direct::pe-direct-smtp-client
      - id: micro-behaviors/communications/socket/init::socket-api-ordinal
      - id: micro-behaviors/communications/socket/init::connect-api-ordinal
      - id: objectives/impact/ransom/extortion::pe-camera-sextortion-threat
      - id: objectives/impact/ransom/extortion::pe-bitcoin-extortion-demand
