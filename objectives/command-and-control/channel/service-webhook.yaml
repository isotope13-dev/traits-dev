defaults:
  attack: T1567.002
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: discord-webhook-url
    desc: Hardcoded Discord webhook URL
    crit: suspicious
    conf: 1.0
    if:
      type: string_value
      regex: (?i)https://discord(app)?\.com/api/webhooks/\d+/[a-zA-Z0-9_-]+
    unless:
      - id: metadata/quality::has-tests
  - id: telegram-bot-api-token
    desc: Telegram Bot API usage with token
    crit: suspicious
    conf: 1.0
    if:
      type: string_value
      regex: (?i)api\.telegram\.org/bot\d+:[a-zA-Z0-9_-]+/
  - id: telegram-send-document
    desc: Telegram Bot sendDocument endpoint (file exfiltration)
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: (?i)api\.telegram\.org/bot.{0,60}/sendDocument
  - id: telegram-send-message
    desc: Telegram Bot sendMessage endpoint
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: (?i)api\.telegram\.org/bot.{0,60}/sendMessage
composite_rules:
  - id: telegram-file-exfil
    desc: Telegram Bot API used for file exfiltration
    crit: hostile
    conf: 0.95
    any:
      - id: telegram-send-document
      - id: telegram-bot-api-token
