defaults:
  attack: T1567.002
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: discord-webhook-url
    desc: Discord webhook URL with a long token
    crit: suspicious
    conf: 1.0
    for: [scripts, python, pyc, go, csharp, rust, java]
    if:
      type: literal
      regex: '(?i)https://discord(app)?\.com/api/webhooks/\d{15,20}/[a-zA-Z0-9_-]{40,}'
    unless:
      - id: metadata/package/testing/
      - id: objectives/exfiltration/messaging/webhook/
      - type: text
        regex: '(?i)(submit|send)[-_ ]feedback.{0,700}(title|subject).{0,700}(body|message)'
    not:
      - substr: "discord.com/api/webhooks/123456/"
  - id: telegram-bot-api-token
    desc: Telegram Bot API usage with token
    crit: suspicious
    conf: 1.0
    if:
      type: literal
      regex: (?i)api\.telegram\.org/bot\d+:[a-zA-Z0-9_-]+/
    unless:
      - id: metadata/package/testing/
    not:
      - substr: alphanumeric_characters
  - id: telegram-send-document
    desc: Telegram Bot sendDocument endpoint
    crit: component
    conf: 0.95
    if:
      type: text
      regex: (?i)api\.telegram\.org/bot.{0,60}/sendDocument
  - id: telegram-send-message
    desc: Telegram Bot sendMessage endpoint
    crit: notable
    conf: 0.85
    downgrade:
      any:
        - id: well-known/tool/sysadmin/rustdesk/
        - id: well-known/tool/sysadmin/rustdesk/
    if:
      type: text
      regex: (?i)api\.telegram\.org/bot.{0,60}/sendMessage
    unless:
      - id: well-known/tool/detection/malware-config-parser
      - id: well-known/tool/sysadmin/rustdesk/
      - id: well-known/tool/sysadmin/rustdesk/
      - id: micro-behaviors/communications/http/services/telegram/
composite_rules:
  - id: telegram-file-exfil
    desc: Telegram Bot API file upload with token
    crit: hostile
    conf: 0.95
    all:
      - id: telegram-send-document
      - id: telegram-bot-api-token
