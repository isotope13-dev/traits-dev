# TOX peer-to-peer messaging — ransomware ransom-channel.
#
# TOX (and the qTox client) is an end-to-end-encrypted P2P messenger
# without centralized servers. A small but growing set of ransomware
# operators direct victims to qTox for ransom negotiation, since:
#   - There's no provider to take down or subpoena.
#   - Victims who already have qTox installed can contact directly.
#   - The TOX-ID format (76 hex chars) is operator-public.
# The combination of "TOX ID" + qTox download URL + a victim
# identifier in the same string blob is a textbook ransomware
# ransom-channel signature.
defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts]
  attack: T1219
  mbc: B0030

traits:
  - id: qtox-download-url
    desc: qTox download URL (ransom-channel reference)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 'github.com/qTox/qTox'

  - id: tox-verb-before-id
    desc: TOX-ID verb-before instruction
    # The phrase "TOX ID" combined with a "send" / "contact" /
    # "add" verb is the typical ransom-note shape (in either
    # order — "send TOX ID" or "TOX ID and send"). Standalone
    # "TOX" mentions in benign software are rare enough that
    # the verb-pairing keeps this specific.
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)(send|contact|provide|add).{0,80}TOX[ -]?ID'

  - id: tox-id-before-verb
    desc: TOX-ID before contact verb
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)TOX[ -]?ID.{0,80}(send|contact|provide)'

  - id: tox-ransom-id-marker
    desc: Ransom-ID with TOX channel marker
    # "Ransom-ID" / "victim ID" / "<family>-ID" terminology in the
    # same blob as TOX. Distinctive ransomware ransom-channel shape.
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '(?i)TOX[ -]?ID.{0,200}[''"][A-Za-z0-9_-]{2,16}-ID[''"]'

composite_rules:
  - id: tox-id-instruction
    desc: TOX-ID instruction text
    crit: suspicious
    conf: 0.92
    any:
      - id: tox-verb-before-id
      - id: tox-id-before-verb

  - id: tox-ransom-channel
    desc: TOX-based ransom-payment channel
    crit: hostile
    conf: 0.97
    all:
      - id: qtox-download-url
      - id: tox-id-instruction
