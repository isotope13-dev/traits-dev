defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1102
traits:
  - id: py-telebot-handler
    desc: Python telebot message handler
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "@bot.message_handler"
  - id: py-telebot-polling
    desc: Python telebot polling loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(bot|telebot)\.infinity_polling\s*\('
composite_rules:
  - id: telegram-bot-shell-command
    desc: Telegram bot executes shell commands
    crit: hostile
    conf: 0.99
    all:
      - id: py-telebot-handler
      - id: py-telebot-polling
      - id: micro-behaviors/process/create/subprocess::check-output
      - id: micro-behaviors/process/create/subprocess::shell-true
