defaults:
  platforms: [windows, unix]
  for: [elf, macho, pe]
traits:
  - id: discord-invite
    desc: Discord invite URL (potential command-and-control/support)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: discord\.gg/[a-zA-Z0-9]+
    not:
      - substr: "discord.gg/Vn7BjmzhtF"
  - id: dns-query-symbol
    desc: DNS query symbol (potential C2 channel)
    crit: notable
    mbc: B0030
    attack: T1071.004
    conf: 0.4
    if:
      type: symbol
      exact: dns_query
composite_rules:
  - id: http-post-comp
    desc: HTTP POST requests (potential C2)
    crit: notable
    mbc: B0030
    attack: T1071.001
    conf: 0.5
    any:
      - id: micro-behaviors/communications/http/post/
  - id: dns-query
    desc: DNS queries (potential C2 channel)
    crit: notable
    mbc: B0030
    attack: T1071.004
    conf: 0.4
    any:
      - id: micro-behaviors/communications/dns/lookup::lookup-res-query
      - id: dns-query-symbol
