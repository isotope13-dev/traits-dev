defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
traits:
  - id: discord-invite
    desc: Discord invite URL (potential command-and-control/support)
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: discord\.gg/[a-zA-Z0-9]+
    not:
      - substr: "discord.gg/Vn7BjmzhtF"
  - id: dns-query-symbol
    desc: DNS query symbol (potential C2 channel)
    crit: notable
    mbc: B0030
    attack: T1071.004
    conf: 0.4
    if:
      type: symbol
      exact: dns_query
  - id: telegram-session-store
    desc: Telegram local session store
    crit: notable
    conf: 0.88
    platforms: [windows]
    for: [pe]
    if:
      type: text
      exact: telegram.session
  - id: telegram-auth-command-set
    desc: Telegram auth command handlers
    crit: suspicious
    conf: 0.96
    count_min: 2
    platforms: [windows]
    for: [pe]
    if:
      type: text
      regex: 'cmd_auth_(request_code|sign_in|check_password)'
  - id: telegram-auth-method-set
    desc: Telegram MTProto auth methods
    crit: suspicious
    conf: 0.93
    count_min: 2
    platforms: [windows]
    for: [pe]
    if:
      type: text
      regex: 'auth\.(sendCode|signIn|checkPassword)'
  - id: telegram-list-download-command-set
    desc: Telegram list and download commands
    crit: suspicious
    conf: 0.95
    count_min: 2
    platforms: [windows]
    for: [pe]
    if:
      type: text
      regex: 'cmd_(get_files|download_file)'
  - id: telegram-upload-move-command-set
    desc: Telegram upload and move commands
    crit: suspicious
    conf: 0.95
    count_min: 2
    platforms: [windows]
    for: [pe]
    if:
      type: text
      regex: 'cmd_(upload_file|move_files)'
  - id: telegram-folder-command-set
    desc: Telegram create and delete folder commands
    crit: suspicious
    conf: 0.96
    count_min: 2
    platforms: [windows]
    for: [pe]
    if:
      type: text
      regex: 'cmd_(create_folder|delete_folder)'
  - id: telegram-drive-folder-tag
    desc: Telegram drive folder workflow tag
    crit: component
    conf: 0.92
    platforms: [windows]
    for: [pe]
    if:
      type: text
      exact: "[telegram-drive-folder]"
  - id: telegram-state-command
    desc: Telegram state command handler
    crit: component
    conf: 0.9
    platforms: [windows]
    for: [pe]
    if:
      type: text
      substr: app_lib::commands::TelegramState
composite_rules:
  - id: http-post-comp
    desc: HTTP POST requests (potential C2)
    crit: suspicious
    mbc: B0030
    attack: T1071.001
    conf: 0.5
    any:
      - id: micro-behaviors/communications/http/post/
  - id: dns-query
    desc: DNS queries (potential C2 channel)
    crit: suspicious
    mbc: B0030
    attack: T1071.004
    conf: 0.4
    any:
      - id: micro-behaviors/communications/dns/lookup/native::lookup-res-query
      - id: dns-query-symbol
  - id: telegram-remote-file-command-matrix
    desc: Telegram remote file command matrix
    crit: suspicious
    conf: 0.96
    platforms: [windows]
    for: [pe]
    any:
      - id: telegram-list-download-command-set
      - id: telegram-upload-move-command-set
      - id: telegram-folder-command-set
    needs: 2
  - id: telegram-mtproto-remote-file-workflow
    desc: Telegram MTProto remote file workflow
    crit: suspicious
    conf: 0.96
    platforms: [windows]
    for: [pe]
    all:
      - id: telegram-remote-file-command-matrix
      - id: telegram-folder-command-set
    any:
      - id: telegram-auth-command-set
      - id: telegram-auth-method-set
  - id: telegram-mtproto-file-c2
    desc: Telegram MTProto remote file C2
    crit: hostile
    conf: 0.98
    platforms: [windows]
    for: [pe]
    all:
      - id: telegram-mtproto-remote-file-workflow
    any:
      - id: telegram-session-store
      - id: telegram-state-command
      - id: telegram-drive-folder-tag
      - id: micro-behaviors/process/create/exec::tauri-shell-open-plugin
    needs: 2
  - id: telegram-mtproto-surveillance-c2
    desc: Telegram remote file and surveillance C2
    crit: hostile
    conf: 0.98
    platforms: [windows]
    for: [pe]
    all:
      - id: telegram-mtproto-file-c2
    any:
      - id: objectives/collection/keylog/capture::windows-rawinput
      - id: objectives/collection/screenshot/capture::gdi-dib-capture
      - id: micro-behaviors/process/create/shell/lang::powershell-keyword
