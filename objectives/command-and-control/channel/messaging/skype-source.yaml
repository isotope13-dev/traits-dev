defaults:
  platforms: [windows]
  for: [c, cpp]
traits:
  - id: skype-api-attach
    desc: Skype Control API attach
    crit: notable
    conf: 0.98
    if:
      type: string_literal
      exact: SkypeControlAPIAttach
  - id: skype-api-discover
    desc: Skype Control API discover
    crit: notable
    conf: 0.98
    if:
      type: string_literal
      exact: SkypeControlAPIDiscover
  - id: skype-search-users
    desc: Skype user search command
    crit: notable
    conf: 0.99
    if:
      type: string_literal
      exact: SEARCH USERS %s
  - id: skype-chat-create
    desc: Skype chat creation command
    crit: notable
    conf: 0.99
    if:
      type: string_literal
      exact: CHAT CREATE %s
  - id: skype-chatmessage-url
    desc: Skype chat message with URL
    crit: suspicious
    conf: 0.99
    if:
      type: string_literal
      regex: ^CHATMESSAGE %s [^"]{0,48}https?://
  - id: skype-install-registry-key
    desc: Skype install registry path
    crit: notable
    conf: 0.96
    if:
      type: string_literal
      exact: SOFTWARE\\Skype\\Phone
  - id: skype-path-registry-value
    desc: SkypePath registry value
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      exact: SkypePath
  - id: skype-authorization-prompt
    desc: Prompt to allow Skype access
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: Allow this program in skype!
composite_rules:
  - id: skype-control-api-source
    desc: Skype Control API messaging
    crit: suspicious
    conf: 0.98
    all:
      - id: skype-api-attach
      - id: skype-api-discover
      - id: micro-behaviors/ui/window/manage/message::window-message-ipc-source
  - id: skype-client-launch
    desc: Launch installed Skype client
    crit: notable
    conf: 0.93
    all:
      - id: micro-behaviors/process/create/spawn::create-process-source
      - id: micro-behaviors/os/registry/access::reg-open-key-ex-a-symbol
      - id: micro-behaviors/os/registry/access::reg-query-value-ex-a-symbol
    any:
      - id: skype-install-registry-key
      - id: skype-path-registry-value
  - id: skype-contact-enumeration
    desc: Automated Skype contact enumeration
    crit: suspicious
    conf: 0.97
    all:
      - id: skype-control-api-source
      - id: skype-search-users
      - id: micro-behaviors/process/thread/create::create-thread-source
      - id: micro-behaviors/time/timing/delay::sleep-source
  - id: skype-url-message-delivery
    desc: Skype chat URL delivery
    crit: suspicious
    conf: 0.98
    all:
      - id: skype-chat-create
      - id: skype-chatmessage-url
      - id: skype-control-api-source
