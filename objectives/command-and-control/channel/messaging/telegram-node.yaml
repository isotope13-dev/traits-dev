defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1102
  mbc: C0002
traits:
  - id: hardcoded-telegram-bot-token-literal
    desc: Hardcoded Telegram bot token literal
    crit: suspicious
    conf: 0.96
    if:
      type: literal
      kind: string
      regex: '\b\d{8,12}:[A-Za-z0-9_-]{30,60}\b'
    not:
      - substr: 0123456789:ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefgh
      - regex: '\b\d{8,12}:[0-9a-f]{24,35}\b'
      - regex: '\b\d{8,12}:0x[0-9a-f]{30,60}\b'
    unless:
      - id: well-known/app/browser-extension-known/
      - type: text
        substr: TELEGRAM_BUG_REPORTER_API_ENDPOINT
      - id: well-known/lib/aws-sdk-js/
  - id: telegram-slash-exec-command
    desc: Telegram slash exec command
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '/exec\s+<cmd>|\\/exec\s+\(\.\+\)'
  - id: telegram-ls-command-token
    desc: Telegram ls command token
    crit: component
    conf: 0.82
    if:
      type: text
      substr: /ls
  - id: telegram-cat-command-token
    desc: Telegram cat command token
    crit: component
    conf: 0.82
    if:
      type: text
      substr: /cat
  - id: telegram-find-command-token
    desc: Telegram find command token
    crit: component
    conf: 0.82
    if:
      type: text
      substr: /find
  - id: telegram-tail-command-token
    desc: Telegram tail command token
    crit: component
    conf: 0.82
    if:
      type: text
      substr: /tail
  - id: telegram-ps-command-token
    desc: Telegram ps command token
    crit: component
    conf: 0.82
    if:
      type: text
      substr: /ps
  - id: telegram-kill-command-token
    desc: Telegram kill command token
    crit: component
    conf: 0.82
    if:
      type: text
      substr: /kill
  - id: telegram-pkill-command-token
    desc: Telegram pkill command token
    crit: component
    conf: 0.82
    if:
      type: text
      substr: /pkill
composite_rules:
  - id: telegram-file-command-vocab
    desc: Telegram file-management command vocabulary
    crit: component
    conf: 0.86
    any:
      - id: telegram-ls-command-token
      - id: telegram-cat-command-token
      - id: telegram-find-command-token
      - id: telegram-tail-command-token
    needs: 3
  - id: telegram-process-command-vocab
    desc: Telegram process-control command vocabulary
    crit: component
    conf: 0.86
    any:
      - id: telegram-ps-command-token
      - id: telegram-kill-command-token
      - id: telegram-pkill-command-token
    needs: 2
  - id: node-telegram-command-bot
    desc: Node Telegram command bot
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/services/telegram::node-telegram-bot-api-client
      - id: micro-behaviors/communications/http/services/telegram::node-telegram-ontext-handler
    any:
      - id: micro-behaviors/communications/http/services/telegram::node-telegram-polling-enabled
      - id: micro-behaviors/communications/http/services/telegram::node-telegram-sendmessage-method
  - id: node-telegram-shell-command
    desc: Node Telegram bot shell command handler
    crit: suspicious
    conf: 0.94
    all:
      - id: node-telegram-command-bot
      - id: telegram-slash-exec-command
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
    any:
      - id: micro-behaviors/process/create/shell/spawn::bash-exec
      - id: micro-behaviors/process/create/shell/spawn::bash-keyword
  - id: node-telegram-hardcoded-shell-c2
    desc: Hardcoded Telegram controller for Node shell bot
    crit: hostile
    conf: 0.97
    all:
      - id: node-telegram-shell-command
      - id: hardcoded-telegram-bot-token-literal
    any:
      - id: telegram-file-command-vocab
      - id: telegram-process-command-vocab
      - id: micro-behaviors/process/create/spawn::detached-ignored-unref-spawn
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
