defaults:
  platforms: [unix, windows, macos]
# Composite C2 Channel Capabilities
composite_rules:
  - id: telegram
    desc: Data exfiltration via Telegram
    crit: suspicious
    mbc: "B0030.001"
    attack: "T1567.001"
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/services/telegram::telegram-api-host
      - id: http-post
  - id: recon-telegram-download-exfil
    desc: .NET downloader sends system reconnaissance through Telegram
    crit: hostile
    conf: 0.97
    attack: "T1041,T1105"
    all:
      - id: objectives/exfiltration/stealer/surveillance::recon-telegram-exfil
      - id: micro-behaviors/communications/http/client/managed::dotnet-downloadfile-token
      - id: micro-behaviors/communications/http/client/managed::httpclient
