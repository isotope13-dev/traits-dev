# Session decentralized messenger — ransom/C2 contact channel.
#
# Session is an end-to-end-encrypted messenger whose account IDs are a
# 66-char hex string with a 05 prefix (operator-public, like a TOX ID).
# Malware/ransomware operators embed a Session account ID so victims can
# contact them with no provider to subpoena. The ID *format* is generic
# (any Session ID matches) — it's a contact-channel indicator, not a
# specific IOC — so family composites gate it with their own markers.
defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
  attack: T1219
  mbc: B0030
traits:
  - id: session-messenger-account-id
    desc: Session messenger 05-prefix account ID
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\b05[0-9a-f]{64}\b'
      section: rdata
