defaults:
  attack: T1546
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: mirc-script-event-join
    desc: Detects mIRC JOIN event
    crit: suspicious
    if:
      type: text
      regex: 'ON ([*]|1):JOIN:'
      case_insensitive: true
  - id: mirc-script-event-text
    desc: Detects mIRC TEXT event
    crit: suspicious
    if:
      type: text
      regex: 'ON ([*]|1):TEXT:'
      case_insensitive: true
  - id: mirc-script-event-part
    desc: Detects mIRC PART event
    crit: suspicious
    if:
      type: text
      regex: 'ON ([*]|1):PART:'
      case_insensitive: true
  - id: mirc-script-event-quit
    desc: Detects mIRC QUIT event
    crit: suspicious
    if:
      type: text
      regex: 'ON ([*]|1):QUIT:'
      case_insensitive: true
  - id: mirc-script-cmd-dcc-send
    desc: Detects mIRC dcc send command
    crit: suspicious
    if:
      type: text
      case_insensitive: true
      substr: /dcc send
  - id: mirc-script-cmd-dcc-send-bare
    desc: Bare mIRC dcc send command
    crit: suspicious
    for: [scripts]
    if:
      type: text
      case_insensitive: true
      regex: '(^|[^a-z0-9_/])dcc\s+send\b'
  - id: mirc-script-cmd-msg-chan
    desc: Detects mIRC channel message command
    crit: suspicious
    if:
      type: text
      case_insensitive: true
      substr: /msg $chan
  - id: mirc-script-cmd-ignore-nick
    desc: Detects mIRC ignore nickname command
    crit: suspicious
    if:
      type: text
      case_insensitive: true
      substr: /ignore $nick
  - id: mirc-script-cmd-writeini
    desc: Detects mIRC writeini command
    crit: suspicious
    if:
      type: text
      case_insensitive: true
      substr: /writeini
  - id: mirc-script-cmd-nick
    desc: Detects mIRC $nick variable
    crit: notable
    if:
      type: text
      case_insensitive: true
      regex: \$nick\b
    unless:
      - id: metadata/library/structure::js-large-minified-bundle
  - id: mirc-script-cmd-script
    desc: Detects [script] block marker
    crit: suspicious
    for: [scripts]
    if:
      type: text
      case_insensitive: true
      exact: "[script]"
    unless:
      - id: well-known/app/homebrew::source-tree
composite_rules:
  - id: mirc-script-event
    desc: Detects mIRC scripting events used by worms
    crit: suspicious
    any:
      - id: mirc-script-event-join
      - id: mirc-script-event-text
      - id: mirc-script-event-part
      - id: mirc-script-event-quit
  - id: mirc-script-cmd
    desc: Detects mIRC scripting commands used by worms
    crit: suspicious
    any:
      - id: mirc-script-cmd-dcc-send
      - id: mirc-script-cmd-dcc-send-bare
      - id: mirc-script-cmd-msg-chan
      - id: mirc-script-cmd-ignore-nick
      - id: mirc-script-cmd-writeini
      - id: mirc-script-cmd-script
