defaults:
  platforms:
    - unix
    - windows
  for: [binaries, scripts]
  attack: T1071.001
traits:
  - id: irc-privmsg
    desc: IRC PRIVMSG command
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?m)^(:\S+\s+)?PRIVMSG\s+\S+
    unless:
      - type: text
        substr: ftplib
      - type: text
        substr: urllib
  - id: irc-nick
    desc: IRC NICK command
    crit: notable
    conf: 0.4
    if:
      type: text
      regex: (?m)^(:\S+\s+)?NICK\s+\S+
    unless:
      - type: text
        substr: ftplib
      - type: text
        substr: urllib
  - id: irc-user
    desc: IRC USER registration command with numeric mode
    crit: notable
    conf: 0.4
    if:
      type: text
      regex: (?mi)^(:\S+\s+)?USER\s+\S+\s+[0-9]{1,3}\s+\S+\s+:[^\r\n]{1,80}$
      case_insensitive: true
    unless:
      - type: text
        substr: ftplib
      - type: text
        substr: urllib
  - id: irc-pong
    desc: IRC PONG keepalive command
    crit: notable
    conf: 0.45
    if:
      type: text
      regex: '(?m)^PONG\s+:'
    unless:
      - type: text
        substr: ftplib
      - type: text
        substr: urllib
  - id: irc-dcc-send
    desc: IRC DCC SEND command
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \bDCC\s+SEND\b
      case_insensitive: true
  - id: cmd-login
    desc: Bot login command
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)^\.login(\s+\S+)?$
    unless:
      - type: text
        substr: ftplib
      - type: text
        substr: urllib
  - id: cmd-udp
    desc: Bot UDP attack command
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)^\.udp(\s+\S+)?$
  - id: cmd-tcp
    desc: Bot TCP attack command
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (?i)^\.tcp(\s+\S+)?$
  - id: cmd-shell
    desc: IRC bot shell command with argument
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)^\s*\.shell\s+[A-Za-z0-9_./:-]{1,80}\s*$'
  - id: tsunami-name
    desc: Tsunami bot-name keyword fragment
    crit: component
    conf: 0.7
    count_min: 2
    if:
      type: text
      word: tsunami
      case_insensitive: true
    unless:
      - id: metadata/file/profile/identity::static-html-shell
  - id: kaiten-name
    desc: Kaiten bot-name keyword fragment
    crit: component
    conf: 0.7
    if:
      type: text
      word: kaiten
      case_insensitive: true
  - id: attack-pan
    desc: PAN attack type indicator
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: (?i)(pan[_-]?(attack|flood)|\bpan[_-]?ddos)
  - id: attack-udp
    desc: UDP attack type indicator
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bUDP[_-]?ATTACK\b|\bUDP[_-]?FLOOD\b
      case_insensitive: true
    unless:
      - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
composite_rules:
  - id: irc-protocol
    desc: IRC protocol commands
    any:
      - id: irc-privmsg
      - id: irc-nick
      - id: irc-user
      - id: irc-pong
  - id: ddos-attack-terms
    desc: DDoS attack terminology
    any:
      - id: attack-pan
      - id: attack-udp
      - id: objectives/impact/dos/attack/flood::flood-types
      - id: objectives/impact/dos/attack/flood::ddos-attack-terminology
    crit: suspicious
  - id: tsunami-artifact
    desc: Tsunami/Kaiten bot-name keyword cluster
    crit: component
    conf: 0.7
    any:
      - id: tsunami-name
      - id: kaiten-name
  - id: bot-logic
    desc: IRC-based command and control logic
    crit: suspicious
    conf: 0.8
    all:
      - id: irc-protocol
    needs: 2
    any:
      - id: cmd-login
      - id: cmd-udp
      - id: cmd-tcp
      - id: cmd-shell
      - id: irc-dcc-send
  - id: irc-ddos
    desc: IRC-controlled DDoS attack logic
    crit: suspicious
    conf: 0.9
    all:
      - id: irc-protocol
      - id: ddos-attack-terms
  - id: tsunami-irc-bot
    desc: Tsunami/Kaiten IRC bot with C2
    crit: suspicious
    conf: 0.85
    all:
      - id: objectives/command-and-control/channel/irc/bot::tsunami-artifact
      - id: bot-logic
  - id: tsunami-ddos-bot
    desc: Tsunami/Kaiten IRC bot with DDoS
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/command-and-control/channel/irc/bot::tsunami-artifact
      - id: objectives/command-and-control/channel/irc/bot::irc-ddos
  - id: irc-bot-ddos
    desc: IRC bot with DDoS attack
    crit: suspicious
    conf: 0.85
    all:
      - id: bot-logic
      - id: objectives/command-and-control/channel/irc/bot::irc-ddos
