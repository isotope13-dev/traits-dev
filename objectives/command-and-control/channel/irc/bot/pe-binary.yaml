# IRC bot/backdoor traits for PE binaries (Delphi, C++, etc.)
# Detects bare IRC command strings and bot remote-control commands
# commonly found in compiled IRC backdoors/trojans
defaults:
  for: [pe, dll]
  platforms: [windows]

traits:
  - id: pe-irc-privmsg
    desc: IRC PRIVMSG command in binary
    crit: notable
    conf: 0.8
    attack: T1071.001
    if:
      type: text
      exact: PRIVMSG

  - id: pe-irc-nick
    desc: IRC NICK command in binary
    crit: component
    conf: 0.7
    if:
      type: text
      exact: NICK

  - id: pe-irc-join
    desc: IRC channel JOIN command
    crit: component
    conf: 0.65
    if:
      type: text
      regex: '\bJOIN\s+[#&+!][^\s,]{1,50}'

  - id: pe-irc-pong
    desc: IRC PONG keepalive in binary
    crit: component
    conf: 0.7
    if:
      type: text
      exact: PONG

  - id: pe-irc-quit
    desc: IRC QUIT command in binary
    crit: component
    conf: 0.5
    if:
      type: text
      exact: QUIT

  - id: pe-irc-motd
    desc: IRC MOTD command in binary
    crit: component
    conf: 0.6
    if:
      type: text
      exact: MOTD

  - id: pe-irc-nick-collision
    desc: IRC nickname collision error string
    crit: notable
    conf: 0.95
    attack: T1071.001
    if:
      type: text
      substr: Nickname is already in use

  - id: bot-cmd-killprocess
    desc: Bot KILLPROCESS remote command
    crit: suspicious
    conf: 0.9
    attack: T1059
    if:
      type: text
      exact: KILLPROCESS

  - id: bot-cmd-execute
    desc: Bot EXECUTE remote command
    crit: component
    conf: 0.6
    attack: T1059
    if:
      type: text
      exact: EXECUTE

  - id: bot-cmd-download
    desc: Bot DOWNLOAD remote command
    crit: component
    conf: 0.55
    if:
      type: text
      exact: DOWNLOAD

  - id: bot-cmd-disconnect
    desc: Bot DISCONNECT remote command
    crit: component
    conf: 0.7
    if:
      type: text
      exact: DISCONNECT

  - id: bot-cmd-httpserver
    desc: Bot HTTPSERVER remote command
    crit: notable
    conf: 0.9
    attack: T1071.001
    if:
      type: text
      exact: HTTPSERVER

  - id: download-finished-msg
    desc: Download completion status message
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "Download finished"

  - id: execute-completed-msg
    desc: Execution completion status message
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "Execute completed"

composite_rules:
  - id: pe-irc-protocol
    desc: IRC protocol commands in PE binary
    crit: suspicious
    conf: 0.92
    attack: T1071.001
    all:
      - id: pe-irc-privmsg
    needs: 2
    any:
      - id: pe-irc-nick
      - id: pe-irc-join
      - id: pe-irc-pong
      - id: pe-irc-quit
      - id: pe-irc-motd
      - id: pe-irc-nick-collision

  - id: pe-bot-remote-commands
    desc: Bot remote-control command vocabulary
    crit: notable
    conf: 0.93
    attack: T1059
    needs: 3
    any:
      - id: bot-cmd-killprocess
      - id: bot-cmd-execute
      - id: bot-cmd-download
      - id: bot-cmd-disconnect
      - id: bot-cmd-httpserver
      - id: download-finished-msg
      - id: execute-completed-msg
    unless:
      - id: micro-behaviors/data/db/sql/
      - id: micro-behaviors/data/db/postgresql/

  - id: irc-backdoor-trojan
    desc: IRC C2 backdoor with remote commands
    crit: hostile
    conf: 0.95
    attack: T1071.001
    all:
      - id: pe-irc-protocol
      - id: pe-bot-remote-commands
    any:
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/communications/http/get::url-download-to-file-str
      - id: micro-behaviors/os/registry/access::registry-write-api-chain
      - id: micro-behaviors/fs/file/delete::deletefile-a
    downgrade:
      any:
        - id: metadata/signed/platform/
        - id: metadata/binary/vendor::microsoft-corp-versioninfo

  - id: irc-bot-downloader-startup
    desc: IRC bot stages payload and persists at startup
    crit: hostile
    conf: 0.99
    attack: T1071.001,T1105,T1547.001
    all:
      - id: pe-irc-protocol
      - id: objectives/command-and-control/dropper/delivery/download::wininet-download-write-stage
      - id: objectives/persistence/login/startup/registry::windows-startup-folder
    any:
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/process/create/spawn::create-process-a
