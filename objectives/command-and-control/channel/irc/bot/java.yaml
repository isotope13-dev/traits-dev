defaults:
  platforms: [windows, unix]
  for: [java, class]
  attack: T1071.001

traits:
  - id: java-irc-nick-config
    desc: Java IRC persistent nick config
    crit: component
    conf: 0.86
    if:
      type: literal
      exact: PERM_NICK
  - id: java-irc-socket-class
    desc: Java IRC socket class
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: function
      exact: IRCSocket
  - id: java-socket-connect-method
    desc: Java socket connect method
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: Socket
  - id: java-irc-protocol-literals
    desc: Java IRC protocol literals
    crit: notable
    conf: 0.88
    count_min: 2
    if:
      type: literal
      regex: '^(PRIVMSG ?|NICK |USER |JOIN |PASS |PING|PONG)$'
  - id: java-irc-sendraw-method
    desc: Java IRC raw-send wrapper source
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: function
      exact: sendRaw
  - id: java-irc-socket-accessor
    desc: Java IRC socket accessor source
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: call
      exact: getSocket

composite_rules:
  - id: java-irc-bot-transport
    desc: Java IRC bot transport
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/communications/socket/create::java-socket-create
      - id: java-irc-nick-config
    any:
      - id: java-irc-socket-class
      - id: java-socket-connect-method
      - id: java-irc-protocol-literals
    needs: 2
  - id: java-irc-protocol-wrapper
    desc: Java IRC protocol wrapper
    crit: suspicious
    conf: 0.9
    all:
      - id: java-irc-protocol-literals
      - id: java-irc-sendraw-method
      - id: java-irc-socket-accessor
