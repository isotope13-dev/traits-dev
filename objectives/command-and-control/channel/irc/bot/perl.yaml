defaults:
  platforms:
    - linux
    - unix
    - windows
  for:
    - perl
  attack: T1071.001
traits:
  - id: cmd-back
    desc: Bot reverse shell command
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: \^back\\s\+\(\.\*\)\\s\+\(\\d\+\)
  - id: cmd-down
    desc: Bot file download command
    crit: suspicious
    conf: 0.75
    if:
      type: raw
      regex: \^down\\s\+\(\.\*\)\\s\+\(\.\*\)
  - id: cmd-portscan
    desc: Bot port scan command
    crit: suspicious
    conf: 0.75
    if:
      type: raw
      regex: \^(ps|nmap)\\s
  - id: cmd-raw
    desc: Bot raw IRC relay command
    crit: suspicious
    conf: 0.7
    if:
      type: raw
      regex: \^raw\\s\+\(\.\*\)
  - id: cmd-eval
    desc: Bot eval command
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: \^eval\\s\+\(\.\*\)
  - id: version-spoof-mainstream
    desc: Mainstream IRC client spoof
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: (mIRC|BitchX|xchat)
  - id: version-spoof-alt
    desc: Alternate IRC client spoof
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: (HydraIRC|irssi)
  - id: operator-channel
    desc: IRC operator channel
    crit: notable
    conf: 0.7
    if:
      type: string_value
      exact: '#x'
  - id: operator-nick-darkness
    desc: IRC operator nick darkness
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      exact: darkness
  - id: operator-nick-quad
    desc: IRC operator nick QuaD
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      exact: QuaD
composite_rules:
  - id: irc-protocol-perl
    desc: Perl IRC protocol commands
    crit: notable
    conf: 0.8
    any:
      - id: objectives/command-and-control/channel/irc/bot::irc-privmsg
      - id: objectives/command-and-control/channel/irc/bot::irc-user
      - id: objectives/command-and-control/channel/irc/bot::irc-pong
  - id: bot-logic-perl
    desc: Perl IRC command and control logic
    crit: suspicious
    conf: 0.9
    all:
      - id: irc-protocol-perl
    any:
      - id: objectives/command-and-control/channel/irc/bot::irc-dcc-send
      - id: cmd-back
      - id: cmd-down
      - id: cmd-portscan
      - id: cmd-raw
      - id: cmd-eval
  - id: operator-controlled-bot-perl
    desc: Perl operator gated IRC bot
    crit: suspicious
    conf: 0.9
    all:
      - id: irc-protocol-perl
      - id: operator-nick-pair
    any:
      - id: operator-channel
      - id: version-spoof-mainstream
      - id: version-spoof-alt
  - id: operator-nick-pair
    desc: IRC operator nickname pair
    crit: suspicious
    conf: 0.9
    all:
      - id: operator-nick-darkness
      - id: operator-nick-quad
