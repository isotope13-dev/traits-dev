defaults:
  platforms:
  - unix
  - windows
  for:
  - perl
  attack: T1071.001
traits:
- id: cmd-back
  desc: Bot reverse shell command
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: ^back\s+(.*)\s+(\d+)
- id: cmd-down
  desc: Bot file download command
  crit: suspicious
  conf: 0.75
  if:
    type: text
    substr: ^down\s+(.*)\s+(.*)
- id: cmd-portscan
  desc: Bot port scan command
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: \^(ps|nmap)\\s
- id: cmd-raw
  desc: Bot raw IRC relay command
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: ^raw\s+(.*)
- id: cmd-eval
  desc: Bot eval command
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: ^eval\s+(.*)
- id: version-spoof-mainstream--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (?i)\b(VERSION|CTCP)\b.{0,80}\b(mIRC|BitchX|xchat)\b
  count_max: 1013066
- id: version-spoof-mainstream--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: \b(mIRC|BitchX|xchat)\b.{0,80}\b(VERSION|CTCP)\b
  count_max: 1013067
- id: version-spoof-alt--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: (?i)\b(VERSION|CTCP)\b.{0,80}\b(HydraIRC|irssi)\b
  count_max: 1013068
- id: version-spoof-alt--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: \b(HydraIRC|irssi)\b.{0,80}\b(VERSION|CTCP)\b
  count_max: 1013069
- id: operator-nick-darkness
  desc: IRC operator nick darkness
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    exact: darkness
- id: operator-nick-quad
  desc: IRC operator nick QuaD
  crit: suspicious
  conf: 0.8
  if:
    type: string_literal
    exact: QuaD
composite_rules:
- id: irc-protocol-perl
  desc: Perl IRC protocol commands
  crit: notable
  conf: 0.8
  any:
  - id: objectives/command-and-control/channel/irc/bot::irc-privmsg
  - id: objectives/command-and-control/channel/irc/bot::irc-user
  - id: objectives/command-and-control/channel/irc/bot::irc-pong
- id: bot-logic-perl
  desc: Perl IRC command and control logic
  crit: suspicious
  conf: 0.9
  all:
  - id: irc-protocol-perl
  any:
  - id: objectives/command-and-control/channel/irc/bot::irc-dcc-send
  - id: cmd-back
  - id: cmd-down
  - id: cmd-portscan
  - id: cmd-raw
  - id: cmd-eval
- id: operator-controlled-bot-perl
  desc: Perl operator gated IRC bot
  crit: suspicious
  conf: 0.9
  all:
  - id: irc-protocol-perl
  - id: operator-nick-pair
  any:
  - id: version-spoof-mainstream
  - id: version-spoof-alt
- id: operator-nick-pair
  desc: IRC operator nickname pair
  crit: suspicious
  conf: 0.9
  all:
  - id: operator-nick-darkness
  - id: operator-nick-quad
- id: version-spoof-mainstream
  desc: Mainstream IRC client token
  crit: component
  conf: 0.85
  any:
  - id: version-spoof-mainstream--rx-1
  - id: version-spoof-mainstream--rx-2
- id: version-spoof-alt
  desc: Alternate IRC client token
  crit: component
  conf: 0.8
  any:
  - id: version-spoof-alt--rx-3
  - id: version-spoof-alt--rx-4
