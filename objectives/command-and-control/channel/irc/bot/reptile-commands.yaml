defaults:
  attack: T1071.001
  for:
    - c
    - cpp
  platforms:
    - windows
traits:
  - id: advscan-command
    desc: Reptile advscan IRC command
    crit: suspicious
    conf: 0.96
    if:
      type: string_literal
      exact: advscan
  - id: scanall-command
    desc: Reptile scanall IRC command
    crit: suspicious
    conf: 0.96
    if:
      type: string_literal
      exact: scanall
    unless:
      - id: well-known/app/wazuh/
  - id: sniffer-command
    desc: Reptile sniffer IRC command
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: sniffer
  - id: pstore-command
    desc: Reptile pstore IRC command
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      exact: pstore
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: clearlogs-command
    desc: Reptile clearlogs IRC command
    crit: suspicious
    conf: 0.96
    if:
      type: string_literal
      exact: clearlogs
  - id: hidepid-command
    desc: hidepid command or mount option string
    crit: notable
    conf: 0.97
    if:
      type: string_literal
      exact: hidepid
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
      - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: aim-command
    desc: Reptile AIM spread command
    crit: component
    conf: 0.94
    if:
      type: string_literal
      exact: aim
  - id: server-list-command
    desc: Reptile server list command
    crit: component
    conf: 0.95
    if:
      type: text
      regex: server.{0,8}list
  - id: server-jump-command
    desc: Reptile server jump command
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: server.{0,8}jump
composite_rules:
  - id: reptile-irc-command-set
    desc: Reptile IRC operator command set
    crit: hostile
    conf: 0.99
    needs: 4
    any:
      - id: advscan-command
      - id: scanall-command
      - id: sniffer-command
      - id: pstore-command
      - id: clearlogs-command
      - id: hidepid-command
      - id: aim-command
      - id: server-list-command
      - id: server-jump-command
