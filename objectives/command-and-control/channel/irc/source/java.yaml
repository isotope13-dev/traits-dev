defaults:
  platforms: [windows, unix]
  for: [java, class]
  attack: T1071.001

traits:
  - id: java-irc-socket-class-suffix
    desc: Java IRC socket class suffix
    crit: component
    conf: 0.86
    if:
      type: symbol
      kind: function
      regex: '^[A-Za-z0-9_]*IRCSocket$'
  - id: java-irc-pass-call
    desc: Java IRC PASS call
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: pass
  - id: java-irc-nick-call
    desc: Java IRC NICK call
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: nick
  - id: java-irc-user-call
    desc: Java IRC USER call
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: user
  - id: java-irc-join-call
    desc: Java IRC JOIN call
    crit: notable
    conf: 0.86
    if:
      type: symbol
      kind: call
      exact: join
  - id: java-irc-identify-call
    desc: Java IRC identify call
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: call
      exact: identify
  - id: java-irc-register-call
    desc: Java IRC register call
    crit: component
    conf: 0.84
    if:
      type: symbol
      kind: call
      exact: register

composite_rules:
  - id: java-irc-registration-methods
    desc: Java IRC registration calls
    crit: notable
    conf: 0.88
    any:
      - id: java-irc-pass-call
      - id: java-irc-nick-call
      - id: java-irc-user-call
      - id: java-irc-join-call
      - id: java-irc-identify-call
      - id: java-irc-register-call
    needs: 4
  - id: java-irc-registration-transport
    desc: Java IRC registration transport
    crit: suspicious
    conf: 0.92
    all:
      - id: objectives/command-and-control/channel/irc/bot::java-socket-connect-method
      - id: java-irc-registration-methods
    any:
      - id: objectives/command-and-control/channel/irc/bot::java-irc-socket-class
      - id: java-irc-socket-class-suffix
      - id: objectives/command-and-control/channel/irc/bot::java-irc-socket-accessor
    needs: 1
