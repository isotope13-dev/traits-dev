defaults:
  platforms: [windows]
  for: [vbs]
traits:
  - id: mirc-join-handler-vb6
    desc: mIRC join event handler
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: (?i)\bn1=\s*on\s+1:JOIN:#:\{
  - id: mirc-dcc-send-vb6
    desc: mIRC DCC send command
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: (?i)/dcc\s+send\s+-c\s+\$nick\s+&\s+mpath
  - id: mirc-msg-lure-vb6
    desc: mIRC private message lure
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: /msg $nick Hi! Check out this program
composite_rules:
  - id: mirc-dcc-worm-script-vb6
    desc: VB6 mIRC worm script
    crit: suspicious
    conf: 0.99
    all:
      - id: mirc-join-handler-vb6
      - id: mirc-dcc-send-vb6
      - id: mirc-msg-lure-vb6
