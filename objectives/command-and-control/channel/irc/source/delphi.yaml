defaults:
  for: [pe]
  platforms: [windows]
traits:
  - id: script-ini-write-source
    desc: Writes mIRC script ini
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: "AssignFile(scriptm,mxa + 'script.ini');"
  - id: mirc-join-hook-source
    desc: mIRC join hook script
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(?i)On 1:JOIN:#:'
  - id: mirc-dcc-send-source
    desc: mIRC DCC send command
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(?i)/dcc\s+Send\s+-c\s+\$nick'
  - id: mirc-privmsg-nick-source
    desc: mIRC private message lure
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\.privmsg\s+\$nick'
  - id: delphi-irc-user-nick-join
    desc: Delphi IRC USER/NICK/JOIN flow
    crit: suspicious
    conf: 0.93
    for: [c]
    if:
      type: text
      substr: "SendData('USER '+ident+' '+ident+'@'+randomname+'.com"
  - id: delphi-irc-ping-pong
    desc: Delphi IRC PING response handler
    crit: suspicious
    conf: 0.92
    for: [c]
    if:
      type: text
      substr: "If Pos('PING :', Params1[i]) > 0"
  - id: delphi-irc-privmsg-command-dispatch
    desc: Delphi IRC PRIVMSG command dispatch
    crit: suspicious
    conf: 0.94
    for: [c]
    if:
      type: text
      substr: "If UpperCase(Params2[1]) = 'PRIVMSG '"
  - id: delphi-irc-login-prefix
    desc: Delphi IRC prefix login command
    crit: notable
    conf: 0.88
    for: [c]
    if:
      type: text
      substr: "prefix+'login'"
composite_rules:
  - id: mirc-dcc-worm-script-source
    desc: mIRC DCC worm script
    crit: suspicious
    conf: 0.99
    all:
      - id: script-ini-write-source
      - id: mirc-join-hook-source
      - id: mirc-dcc-send-source
  - id: delphi-irc-bot-command-source
    desc: Delphi IRC bot command loop source
    crit: hostile
    conf: 0.96
    for: [c]
    all:
      - id: delphi-irc-user-nick-join
      - id: delphi-irc-ping-pong
      - id: delphi-irc-privmsg-command-dispatch
    any:
      - id: delphi-irc-login-prefix
