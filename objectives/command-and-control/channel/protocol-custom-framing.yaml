defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
traits:
  - id: text_headers
    desc: Custom text-based C2 protocol framing
    crit: suspicious
    conf: 0.8
    attack: T1071
    if:
      type: text
      regex: Bytes == %d|iDataSize == %d
