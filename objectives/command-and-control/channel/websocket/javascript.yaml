# WebSocket C2 Patterns - JavaScript/Node.js
# Detects socket.io-client and WebSocket C2 patterns
# ATT&CK: T1071.001 (Web Protocols)
# MBC: B0030 (C2 Communication)
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: socketio-client-require
    desc: socket.io-client module import
    crit: notable
    conf: 0.85
    mbc: "B0030"
    attack: "T1071.001"
    if:
      type: text
      regex: "require\\s*\\(\\s*['\"]socket\\.io-client['\"]\\)"
  - id: socketio-reconnect-attempts
    desc: Socket.io reconnection attempts config
    crit: notable
    conf: 0.8
    attack: "T1071.001"
    if:
      type: text
      substr: "reconnectionAttempts"
  - id: socketio-reconnect-delay
    desc: Socket.io reconnection delay config
    crit: notable
    conf: 0.8
    attack: "T1071.001"
    if:
      type: text
      substr: "reconnectionDelay"
  - id: npm-install-socketio
    desc: Dynamic npm install of socket.io-client
    crit: suspicious
    conf: 0.95
    mbc: "B0030"
    attack: "T1059.007"
    if:
      type: text
      regex: "npm\\s+install\\s+socket\\.io-client"
  - id: socketio-exec-event
    desc: Socket.io exec event handler
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\.on\(\s*[''"]exec[''"]'
  - id: socketio-exec-event-name
    desc: Socket.io exec event name
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: exec
composite_rules:
  - id: socketio-remote-client-context
    desc: Socket.io remote client context
    crit: component
    conf: 0.9
    any:
      - id: socketio-client-require
      - id: socketio-c2-pattern
      - id: socketio-reconnect-attempts
      - id: npm-install-socketio
  - id: socketio-c2-pattern
    desc: Socket.io-based C2 communication
    crit: suspicious
    conf: 0.92
    mbc: "B0030"
    attack: "T1071.001"
    all:
      - id: socketio-client-require
    any:
      - id: socketio-reconnect-attempts
      - id: socketio-reconnect-delay
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
