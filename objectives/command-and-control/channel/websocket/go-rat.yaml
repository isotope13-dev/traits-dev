defaults:
  platforms: [windows]
  for: [pe, go]
  attack: T1071.001
  mbc: B0030

traits:
- id: websocket-json-rpc-io
  desc: WebSocket JSON message IO
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'websocket\.\(\*Conn\)\.(WriteJSON|ReadMessage)'

- id: rat-command-file-manager--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'fm:(ls|download|mkdir|del)'

  count_max: 1013275
- id: rat-command-file-manager--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: fm_result
  count_max: 1013276
- id: rat-command-shell-output
  desc: Remote shell command output
  crit: component
  conf: 0.9
  if:
    type: text
    substr: cmd_output

- id: rat-command-task-manager
  desc: Task manager command channel
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'taskmgr:(kill|processes)|taskmgr_result'

- id: rat-command-proxy
  desc: Proxy control command channel
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'proxy:(socks5|portfwd):(start|stop)'

- id: rat-command-media-capture--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: webcam_frame
  count_max: 1013280
- id: rat-command-media-capture--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: mic_data
  count_max: 1013281
- id: rat-command-media-capture--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: rd_frame
  count_max: 1013282
composite_rules:
- id: go-websocket-rat-channel
  desc: Go WebSocket RAT command channel
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/communications/websocket/library::gorilla-websocket
  needs: 2
  any:
  - id: rat-command-file-manager
  - id: rat-command-shell-output
  - id: rat-command-task-manager
  - id: rat-command-proxy
  - id: rat-command-media-capture
  - id: websocket-json-rpc-io
- id: rat-command-file-manager
  desc: File manager command channel
  crit: component
  conf: 0.9
  any:
  - id: rat-command-file-manager--rx-1
  - id: rat-command-file-manager--rx-2
- id: rat-command-media-capture
  desc: Remote media capture channel
  crit: component
  conf: 0.9
  any:
  - id: rat-command-media-capture--rx-3
  - id: rat-command-media-capture--rx-4
  - id: rat-command-media-capture--rx-5
  - id: objectives/command-and-control/backdoor/control/command-vocab::cmd-vocab-screenshot
