defaults:
  platforms: [windows]
  for: [pe, go]
  attack: T1071.001
  mbc: B0030

traits:
- id: gorilla-websocket-package
  desc: Gorilla WebSocket C2 library
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: github.com/gorilla/websocket

- id: websocket-conn-type
  desc: Go WebSocket connection type
  crit: component
  conf: 0.75
  if:
    type: text
    substr: "*websocket.Conn"

- id: websocket-json-rpc-io
  desc: WebSocket JSON message IO
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'websocket\.\(\*Conn\)\.(WriteJSON|ReadMessage)'

- id: rat-command-file-manager--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'fm:(ls|download|mkdir|del)'

- id: rat-command-file-manager--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'fm_result'

- id: rat-command-shell-output
  desc: Remote shell command output
  crit: component
  conf: 0.9
  if:
    type: text
    substr: cmd_output

- id: rat-command-task-manager
  desc: Task manager command channel
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'taskmgr:(kill|processes)|taskmgr_result'

- id: rat-command-proxy
  desc: Proxy control command channel
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'proxy:(socks5|portfwd):(start|stop)'

- id: rat-command-media-capture--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: webcam_frame

- id: rat-command-media-capture--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: mic_data

- id: rat-command-media-capture--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: rd_frame

- id: rat-command-media-capture--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: screenshot

composite_rules:
- id: go-websocket-rat-channel
  desc: Go WebSocket RAT command channel
  crit: hostile
  conf: 0.95
  all:
  - id: gorilla-websocket-package
  needs: 2
  any:
  - id: rat-command-file-manager
  - id: rat-command-shell-output
  - id: rat-command-task-manager
  - id: rat-command-proxy
  - id: rat-command-media-capture
  - id: websocket-json-rpc-io
  - id: websocket-conn-type
- id: rat-command-file-manager
  desc: File manager command channel
  crit: component
  conf: 0.9
  any:
  - id: rat-command-file-manager--rx-1
  - id: rat-command-file-manager--rx-2
  needs: 1
- id: rat-command-media-capture
  desc: Remote media capture channel
  crit: component
  conf: 0.9
  any:
  - id: rat-command-media-capture--rx-3
  - id: rat-command-media-capture--rx-4
  - id: rat-command-media-capture--rx-5
  - id: rat-command-media-capture--rx-6
  needs: 1
