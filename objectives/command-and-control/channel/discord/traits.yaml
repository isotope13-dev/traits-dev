defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: discord-invite-string
    desc: Discord invite link string
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: https?://discord\.gg/[a-zA-Z0-9]+
    not:
      - substr: "discord.gg/Vn7BjmzhtF"
  - id: discord-fake-email
    desc: Discord URL masquerading as email
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (discord\.gg|discordapp\.com|discord\.com)[^\s@]{0,20}@[A-Za-z0-9.-]+\.[A-Za-z]{2,}
  - id: discord-string
    desc: String "discord" (generic)
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?i)discord\.gg/[a-z0-9]+|discord(app)?\.com/api/webhooks/
    not:
      - substr: "discord.gg/Vn7BjmzhtF"
  - id: discord-cdn-url
    desc: Discord CDN attachment URL
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: https?://(cdn\.discordapp\.com|media\.discordapp\.net)/attachments/\d+/\d+/
  - id: discord-api-url
    desc: Discord API URL
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: https?://(discord\.com|discordapp\.com)/api/webhooks/\d+/
    unless:
      - id: metadata/package::has-tests
  - id: discord-cdn-executable
    desc: Discord CDN URL pointing to executable
    crit: suspicious
    conf: 1.0
    if:
      type: raw
      regex: https?://cdn\.discordapp\.com/attachments/\d+/\d+/.{1,80}\.(exe|dll|sh)
composite_rules: []
