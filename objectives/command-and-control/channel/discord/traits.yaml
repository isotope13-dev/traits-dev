defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries, csharp]
traits:
  - id: discord-invite-string
    desc: Discord invite link string
    crit: component
    conf: 0.8
    if:
      type: text
      regex: https?://discord\.gg/[a-zA-Z0-9]+
    not:
      - substr: "discord.gg/Vn7BjmzhtF"
  - id: discord-fake-email
    desc: Discord URL masquerading as email
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (discord\.gg|discordapp\.com|discord\.com)[^\s@]{0,20}@[A-Za-z0-9.-]+\.[A-Za-z]{2,}
  - id: discord-string
    desc: String "discord" (generic)
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (?i)discord\.gg/[a-z0-9]+|discord(app)?\.com/api/webhooks/\d{7,}
    not:
      - substr: "discord.gg/Vn7BjmzhtF"
      - substr: "discord.com/api/webhooks/123456"
      - substr: "discord.com/api/webhooks/123456/"
    unless:
      - id: objectives/exfiltration/messaging/webhook::webhook-notification-settings-context
  - id: discord-cdn-url
    desc: Discord CDN attachment URL
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: https?://(cdn\.discordapp\.com|media\.discordapp\.net)/attachments/\d+/\d+/
  - id: discord-api-url
    desc: Discord API URL
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: https?://(discord\.com|discordapp\.com)/api/webhooks/\d+/
    unless:
      - id: metadata/package/quality::has-tests
      - id: objectives/exfiltration/messaging/webhook::webhook-notification-settings-context
    not:
      - substr: "discord.com/api/webhooks/123456/"
  - id: discord-cdn-executable
    desc: Discord CDN URL pointing to executable
    crit: suspicious
    conf: 1.0
    if:
      type: text
      regex: https?://cdn\.discordapp\.com/attachments/\d+/\d+/.{1,80}\.(exe|dll|sh)
  - id: discord-gateway-message-content-intent
    desc: Discord bot reads message content
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '\bGatewayIntents\.MessageContent\b|\bMessageContent\b.{0,80}\bGuildMessages\b'
  - id: discord-gateway-guild-messages-intent
    desc: Discord bot reads guild messages
    crit: notable
    conf: 0.84
    if:
      type: text
      regex: '\bGatewayIntents\.GuildMessages\b|\bGuildMessages\b.{0,80}\bMessageContent\b'
  - id: discord-restore-manifest-marker
    desc: Discord restore manifest marker
    crit: component
    conf: 0.9
    if:
      type: text
      word: restore_manifest
  - id: discord-restore-chunk-marker
    desc: Discord restore chunk marker
    crit: component
    conf: 0.9
    if:
      type: text
      word: restore_chunk
  - id: discord-restore-complete-marker
    desc: Discord restore complete marker
    crit: component
    conf: 0.9
    if:
      type: text
      word: restore_complete
  - id: discord-agent-relay-manager
    desc: Discord agent relay manager
    crit: suspicious
    conf: 0.92
    if:
      type: text
      word: AgentRelayManager
  - id: discord-python-bot-import
    desc: Python Discord bot import
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'from\s+discord\.ext\s+import\s+commands|commands\.Bot\s*\('
  - id: discord-bot-token-literal
    desc: Hardcoded Discord bot token
    crit: suspicious
    conf: 0.96
    for: [python, javascript, typescript]
    if:
      type: string_literal
      regex: '(mfa\.[A-Za-z0-9_-]{80,}|[MN][A-Za-z0-9_-]{23,25}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27,})'
    not:
      - regex: '^eyJ'
  - id: discord-bot-start-token
    desc: Discord bot starts with token
    crit: suspicious
    conf: 0.94
    for: [python]
    if:
      type: text
      regex: '\bbot\.start\s*\(\s*TOKEN\s*\)|\bbot\.run\s*\(\s*TOKEN\s*\)'
  - id: discord-command-decorator
    desc: Discord bot command handler
    crit: notable
    conf: 0.88
    for: [python]
    if:
      type: text
      regex: '@bot\.command\s*\('
composite_rules:
  - id: discord-chunked-payload-restore
    desc: Discord chunked payload restore
    crit: hostile
    conf: 0.98
    all:
      - id: discord-restore-manifest-marker
      - id: discord-restore-chunk-marker
      - id: discord-restore-complete-marker
    any:
      - id: discord-api-url
      - id: discord-cdn-url
      - id: discord-gateway-message-content-intent
      - id: discord-gateway-guild-messages-intent
  - id: discord-python-bot-c2
    desc: Python Discord bot C2 channel
    crit: suspicious
    conf: 0.96
    for: [python]
    all:
      - id: discord-python-bot-import
    any:
      - id: discord-bot-token-literal
      - id: discord-bot-start-token
      - id: discord-command-decorator
    needs: 2
  - id: discord-hardcoded-bot-token-c2
    desc: Hardcoded Discord bot token C2
    crit: suspicious
    conf: 0.97
    for: [python]
    all:
      - id: discord-python-bot-import
      - id: discord-bot-token-literal
      - id: discord-bot-start-token
