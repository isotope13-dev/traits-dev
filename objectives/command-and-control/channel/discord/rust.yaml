defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1102
traits:
  - id: serenity-async-trait
    desc: Rust serenity Discord import
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: use serenity::async_trait;
  - id: message-sender-trait
    desc: Discord message sender trait
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'trait\s+MessageSender:\s+Send\s+\+\s+Sync'
  - id: outbound-message-call
    desc: Outbound bot message call
    crit: component
    conf: 0.86
    if:
      type: kv
      path: source.imports
      exact: bot.message
  - id: outbound-upload-call
    desc: Outbound bot upload call
    crit: component
    conf: 0.86
    if:
      type: kv
      path: source.imports
      exact: bot.upload
  - id: discord-chunk-limit-split
    desc: Discord chunked output split
    crit: component
    conf: 0.9
    if:
      type: text
      substr: start + 2000
composite_rules:
  - id: rust-discord-command-relay
    desc: Rust Discord command relay
    crit: suspicious
    conf: 0.95
    all:
      - id: serenity-async-trait
      - id: message-sender-trait
      - id: outbound-message-call
      - id: outbound-upload-call
    any:
      - id: discord-chunk-limit-split
      - id: objectives/anti-static/obfuscation/string/conceal::obfuscate-macro-pair
