defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
  attack: T1029
composite_rules:
  - id: ras-connect-notify-pipe-reporting
    desc: RAS connect notify pipe reporting
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/communications/socket/connect::ras-add-connect-notify
      - id: micro-behaviors/communications/ipc/named-pipe::pipe-path-prefix
    any:
      - id: micro-behaviors/communications/ipc/named-pipe::named-pipe-server
      - id: micro-behaviors/communications/ipc/named-pipe::named-pipe-api-usage
      - id: micro-behaviors/communications/ipc/named-pipe::create-named-pipe
