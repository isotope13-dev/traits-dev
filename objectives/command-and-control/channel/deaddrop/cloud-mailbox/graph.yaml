defaults:
  platforms: [linux, macos, windows]
  for: [scripts, binaries]
  attack: T1102,T1071.001
  crit: suspicious
  conf: 0.88

traits: []

composite_rules:
- id: microsoft-graph-mailbox-client
  desc: Microsoft Graph mailbox client
  crit: notable
  conf: 0.9
  all:
  - id: micro-behaviors/communications/http/oauth::microsoft-graph
  any:
  - id: micro-behaviors/communications/http/oauth::microsoft-graph-mail-api
  - id: micro-behaviors/communications/http/oauth::odata-query-marker
- id: graph-mailbox-command-channel
  desc: Graph mailbox command channel
  crit: hostile
  conf: 0.97
  mbc: C0002,C0021,C0026,E1059
  attack: T1102,T1071.001,T1059
  all:
  - id: microsoft-graph-mailbox-client
  - id: micro-behaviors/crypto/symmetric/aes/library::go-new-cipher-string
  - id: micro-behaviors/data/encode/base64::go-base64-decode
  - id: micro-behaviors/process/create/system::go-os-exec-pclntab
  unless:
  - id: well-known/tool/dual-use/rclone::rclone-tool

- id: graph-mailbox-task-cleanup
  desc: Graph mailbox task cleanup
  crit: notable
  conf: 0.9
  all:
  - id: microsoft-graph-mailbox-client
  - id: micro-behaviors/fs/file/delete::os-Remove-string
  any:
  - id: micro-behaviors/communications/http/delete::delete
  - id: micro-behaviors/communications/http/lib/netlib::go-http-client-do-string
