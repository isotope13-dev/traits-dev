# URL Indirection / Dead Drop Detection
# ATT&CK: T1102.001 (Web Service: Dead Drop Resolver)
# Detects pattern where fetched content is used as a URL for subsequent requests
# This hides the real C2 infrastructure from static analysis
defaults:
  platforms: [windows, unix]
  crit: suspicious
  attack: "T1102.001"
traits:
  # === Go: Fetch then use result as URL ===
  - id: go-http-get-readall-post
    desc: http.Get body read before POST
    crit: notable
    conf: 0.85
    for: [go]
    if:
      type: text
      regex: 'http\.Get\([\s\S]{0,200}(ReadAll|\.Body)[\s\S]{0,200}http\.Post\('
  - id: go-http-get-string-post
    desc: http.Get content reused in POST
    crit: notable
    conf: 0.85
    for: [go]
    if:
      type: text
      regex: 'http\.Get\([\s\S]{0,200}(String\(|string\()[\s\S]{0,200}http\.Post\('
  - id: go-get-then-get
    desc: HTTP GET result used in second GET
    crit: notable
    conf: 0.75
    for: [go]
    if:
      # The qualifier is what makes this an HTTP pattern vs. a generic getter.
      # Bare `.Get(name).String()...Get(` matched any Go code with two getter
      # calls — Twitch bot argument parsers (`ArgsParser.Get(arg).String()`),
      # `url.Values.Get`, `http.Header.Get`, map-of-strings wrappers, config
      # libraries, etc. The leading `http.Get` or `<ident>Client.Get` anchor
      # narrows it to actual HTTP clients (stdlib + custom typed clients like
      # `restyClient`, `httpClient`, `apiClient`) without losing real deaddrops.
      type: text
      regex: '(http|\w+[Cc]lient)\.Get\s*\(\s*[^,\n()]{1,120}\s*\)\.String\s*\(\)[\s\S]{0,250}\.Get\s*\('
  # === Python: requests chaining ===
  - id: py-requests-chain
    desc: requests.get result used as URL
    crit: suspicious
    conf: 0.8
    for: [python]
    if:
      type: text
      regex: 'requests\.get\s*\(.{1,50}\)\.text[\s\S]{0,100}requests\.(get|post)\s*\('
  - id: py-urllib-chain
    desc: urllib result used as URL
    crit: suspicious
    conf: 0.8
    for: [python]
    if:
      type: text
      regex: 'urlopen\s*\(.{1,50}\)\.read\(\)[\s\S]{0,100}urlopen\s*\('
  # === JavaScript: fetch chaining ===
  - id: js-fetch-chain
    desc: fetch result used as URL
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    if:
      # The SECOND fetch must take a bare identifier (the variable holding the
      # first fetch's .text() result) — a real dead-drop fetches the retrieved
      # URL. Requiring `fetch(<var>` excludes independent calls that both hit a
      # fixed endpoint, e.g. an AO/RPC client's get()/post() both doing
      # `fetch(this.url …)` (cwao).
      type: text
      regex: 'fetch\(.{1,50}\)[\s\S]{0,90}\.text\(\)[\s\S]{0,90}fetch\(\s*[A-Za-z_$]\w*\s*[,)]'
    not:
      - substr: 'fetch("config.json").text()'
    unless:
      - id: objectives/supply-chain/trojanized/app/context::nextchat-prompt-fetch-script
      - id: metadata/package/testing/harness/runtime::is-test
      # A fetch→.text()→fetch sequence is ubiquitous app logic in minified
      # SPA/extension bundles (login-then-follow, paginated APIs). The real
      # dead-drop signal is the *chained URL reuse*, which this weak atom
      # cannot prove; gate it out of known bundler output to avoid flagging
      # legitimate front-end bundles (e.g. Vite/Rollup) as C2.
      - id: metadata/library/structure::js-known-bundler-output
      # Font importers commonly fetch a stylesheet, then fetch each referenced
      # font file and convert it to a data: URL. That is URL-following app
      # logic, not a remote dead-drop resolver.
      - id: js-font-import-fetch-context
  - id: js-axios-chain
    desc: axios result used as URL
    crit: suspicious
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: 'axios\.get\s*\(.{1,50}\)[\s\S]{0,100}\.data[\s\S]{0,100}axios\.(get|post)\s*\('
    unless:
      - id: js-vite-api-url-context
  - id: js-axios-app-api-context
    desc: Axios application API context
    crit: baseline
    conf: 0.8
    for: [javascript, typescript]
    if:
      type: text
      regex: '(API_URL|apiUrl|baseURL).{0,120}axios\.'
  - id: js-vite-api-url-context
    desc: Vite API URL context
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: import.meta.env.VITE_API_URL
  - id: js-font-stylesheet-fetch-context
    desc: Font stylesheet fetch context
    crit: component
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      substr: Failed to fetch stylesheet
  - id: js-font-file-fetch-context
    desc: Font file fetch context
    crit: component
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      substr: Failed to fetch font file
  - id: js-font-mime-context
    desc: Font MIME type context
    crit: component
    conf: 0.85
    for: [javascript, typescript]
    if:
      type: text
      regex: 'font/(woff2?|ttf|otf)'
  - id: security-rule-runtime-script-floating-url
    desc: Security rule quotes floating script URL
    crit: component
    conf: 0.95
    for: [rust, shell]
    if:
      type: text
      substr: 'id: "runtime_script_fetched_from_floating_url"'
  # === Shell: curl/wget result used as URL ===
  - id: shell-curl-to-shell
    desc: curl output piped to shell
    crit: suspicious
    conf: 0.85
    for: [shell]
    if:
      type: text
      regex: '\$\(curl.{1,120}\)\s*(bash|sh)'
    unless:
      - id: security-rule-runtime-script-floating-url
  - id: shell-curl-to-python
    desc: curl output piped to Python
    crit: suspicious
    conf: 0.85
    for: [shell]
    if:
      type: text
      regex: '\$\(curl.{1,120}\)\s*(python|perl|ruby)'
  - id: shell-curl-to-script-host
    desc: curl output piped to script host
    crit: suspicious
    conf: 0.85
    for: [shell]
    if:
      type: text
      regex: '\$\(curl.{1,120}\)\s*(php|powershell|cmd|nc)'
  - id: shell-backtick-curl-chain
    desc: backtick curl output reused
    crit: suspicious
    conf: 0.8
    for: [shell]
    if:
      type: text
      regex: '`curl.{1,120}`\s*(bash|sh|python)'
    unless:
      - id: security-rule-runtime-script-floating-url
  - id: shell-wget-to-interpreter
    desc: wget result piped to interpreter
    crit: suspicious
    conf: 0.85
    for: [shell]
    if:
      type: text
      regex: '`wget[^`]{1,80}`\s*(bash|sh|python)'
    unless:
      - id: security-rule-runtime-script-floating-url
  # === Ruby: Net::HTTP chaining ===
  - id: ruby-http-get-assign
    desc: Net::HTTP.get response assignment
    crit: component
    conf: 0.8
    for: [ruby]
    if:
      type: text
      regex: '[a-z_]\w*\s*=\s*Net::HTTP\.get'

  - id: ruby-http-uri-followup
    desc: Net::HTTP follow-up via URI variable
    crit: component
    conf: 0.8
    for: [ruby]
    if:
      type: text
      regex: 'Net::HTTP\.(get|post)\s*\(\s*URI\([a-z_]\w*'
    not:
      - regex: "Net::HTTP\\.get_print\\s+URI\\('http://www\\.example\\.com/"
composite_rules:
  - id: js-font-import-fetch-context
    desc: Font import fetch context
    crit: baseline
    conf: 0.9
    for: [javascript, typescript]
    needs: 2
    any:
      - id: js-font-stylesheet-fetch-context
      - id: js-font-file-fetch-context
      - id: js-font-mime-context
  # === URL Dead Drop Pattern ===
  - id: url-deaddrop-go
    desc: Go URL dead drop pattern
    crit: hostile
    conf: 0.9
    mbc: "C0002"
    any:
      - id: go-http-get-readall-post
      - id: go-http-get-string-post
      - id: go-get-then-get
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test
  - id: url-deaddrop-python
    desc: Python URL dead drop pattern
    crit: hostile
    conf: 0.9
    any:
      - id: py-requests-chain
      - id: py-urllib-chain
  - id: url-deaddrop-javascript
    desc: JavaScript URL dead drop pattern
    crit: hostile
    conf: 0.9
    any:
      - id: js-fetch-chain
      - id: js-axios-chain
    unless:
      - id: js-font-import-fetch-context
      - id: well-known/app/browser-extension::equatio-browser-extension-bundle
      - id: objectives/supply-chain/trojanized/app/context::nextchat-prompt-fetch-script
  - id: url-deaddrop-shell
    desc: Shell URL dead drop pattern
    crit: hostile
    conf: 0.9
    any:
      - id: shell-curl-to-shell
      - id: shell-curl-to-python
      - id: shell-curl-to-script-host
      - id: shell-backtick-curl-chain
      - id: shell-wget-to-interpreter
    unless:
      - id: security-rule-runtime-script-floating-url
  - id: ruby-http-chain
    desc: HTTP response used as URL
    crit: suspicious
    conf: 0.8
    for: [ruby]
    all:
      - id: ruby-http-get-assign
      - id: ruby-http-uri-followup
  - id: url-deaddrop
    desc: URL dead drop / indirection pattern
    crit: hostile
    conf: 0.95
    mbc: "C0002"
    any:
      - id: url-deaddrop-go
      - id: url-deaddrop-python
      - id: url-deaddrop-javascript
      - id: url-deaddrop-shell
      - id: ruby-http-chain
    unless:
      - id: js-font-import-fetch-context
      - id: objectives/supply-chain/trojanized/app/context::nextchat-prompt-fetch-script
      - id: security-rule-runtime-script-floating-url
