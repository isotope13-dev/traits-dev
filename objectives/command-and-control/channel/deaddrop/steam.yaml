# Steam Community Profile Dead Drop
# Malware (especially stealers like Vidar) embeds C2 server addresses in
# Steam profile descriptions. The binary fetches the profile page and parses
# the HTML/JSON to extract the current C2 URL — enabling C2 rotation without
# recompiling the malware.
# ATT&CK: T1102.001 (Web Service: Dead Drop Resolver)
defaults:
  platforms: [windows, linux, unix, android, macos, ios]
  crit: suspicious
  attack: "T1102.001"
  for: [pe, dll, elf, macho]
traits:
  - id: steam-profile-url
    desc: steamcommunity.com profile URL
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: 'steamcommunity\.com/(profiles|id)/'
  - id: steam-profile-fetch
    desc: HTTP request to fetch Steam community profile
    crit: notable
    conf: 0.9
    if:
      type: string_value
      regex: '(?i)\b(get|fetch|request)\b.{0,60}steamcommunity\.com'
  - id: steam-summary-field
    desc: Steam profile summary/description field access
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: "(?i)(summary|description|profile).{0,30}steam"
composite_rules:
  - id: steam-deaddrop
    desc: Steam community profile used as C2 dead drop
    crit: hostile
    conf: 0.9
    mbc: "C0002"
    any:
      - id: steam-profile-url
      - id: steam-profile-fetch
