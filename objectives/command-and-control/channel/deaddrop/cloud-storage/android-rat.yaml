defaults:
  platforms: [android]
  for: [apk, zip, java, kotlin]
  attack: T1102.002
  mbc: B0030
traits:
- id: android-okhttp-client-reference
  desc: Android OkHttp client reference
  crit: notable
  conf: 0.84
  if:
    type: text
    regex: 'okhttp3|Lokhttp3/'
- id: android-cloud-client-token-fields
  desc: Android cloud client token fields
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\\?"(cid|client_id|cst|client_secret)\\?"\s*:'
- id: android-cloud-auth-token-fields
  desc: Android cloud auth token fields
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\\?"(rt|refresh_token|at|access_token)\\?"\s*:'
- id: android-cloud-folder-token-fields
  desc: Android cloud folder token fields
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\\?"(fid|folder_id)\\?"\s*:'
- id: android-surveillance-command-prefix
  desc: Android surveillance command prefix
  crit: component
  conf: 0.9
  count_min: 4
  if:
    type: text
    substr: MP_
- id: android-surveillance-set-commands
  desc: Android surveillance set commands
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'MP_SET_(FILESEARCH_EXTENTION|THREADS|CLOUD|PROXY)'
- id: android-surveillance-action-commands
  desc: Android surveillance action commands
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'MP_(ACTION_(FILE_OR_DIRECTORY|DOWNLOAD_COMMAND)|GET_(DATA|TREES))'
- id: android-surveillance-send-commands
  desc: Android surveillance send commands
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'MP_SEND_(FILE|SHELL)'
- id: android-surveillance-media-config-flags
  desc: Android surveillance media config flags
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\\?"(scr|rec|extentions)\\?"\s*:'
- id: android-surveillance-control-config-flags
  desc: Android surveillance control config flags
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '\\?"(bd_version|cloud|kill)\\?"\s*:'
- id: android-private-key-document-filter
  desc: Android private-key document filter
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '\.hwp;.{0,80}\.p12;|\.p12;.{0,80}\.hwp;'
composite_rules:
- id: android-cloud-token-config-fields
  desc: Android cloud token config fields
  crit: suspicious
  conf: 0.92
  any:
  - id: android-cloud-client-token-fields
  - id: android-cloud-auth-token-fields
  - id: android-cloud-folder-token-fields
  needs: 2
- id: android-surveillance-command-names
  desc: Android surveillance command names
  crit: suspicious
  conf: 0.94
  all:
  - id: android-surveillance-command-prefix
  any:
  - id: android-surveillance-set-commands
  - id: android-surveillance-action-commands
  - id: android-surveillance-send-commands
- id: android-surveillance-config-flags
  desc: Android surveillance config flags
  crit: suspicious
  conf: 0.9
  any:
  - id: android-surveillance-media-config-flags
  - id: android-surveillance-control-config-flags
- id: android-cloud-storage-command-rat
  desc: Android cloud-storage command RAT
  crit: hostile
  conf: 0.98
  all:
  - id: android-okhttp-client-reference
  - id: android-cloud-token-config-fields
  any:
  - id: android-surveillance-command-names
  - id: android-surveillance-config-flags
  - id: micro-behaviors/communications/http/url/cloud::zoho-workdrive-api-url
  - id: micro-behaviors/communications/http/url/cloud::pcloud-api-url
  - id: micro-behaviors/communications/http/url/cloud::yandex-disk-api-url
- id: android-cloud-surveillance-stealer
  desc: Android cloud surveillance stealer
  crit: hostile
  conf: 0.99
  all:
  - id: android-cloud-storage-command-rat
  - id: android-private-key-document-filter
  any:
  - id: android-surveillance-config-flags
  - id: objectives/exfiltration/stealer/credential/sms::sms-collection-primitives
  - id: objectives/collection/file-targeting/filter::android-mime-file-exfil-targeting
  - id: micro-behaviors/hardware/input/audio::android-audio-recording-capability
  - id: micro-behaviors/hardware/display/screen::android-media-projection-screen-capture
