defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  attack: T1102.001
  for: [binaries, scripts]
traits:
  - id: telegram-profile-scrape
    desc: Fetch and scrape Telegram profile page
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: curl.{1,60}t\.me/
  - id: telegram-fallback-domain-lookup
    desc: Telegram fallback domain lookup
    crit: suspicious
    conf: 0.94
    platforms: [macos]
    for: [applescript, shell]
    # Require a fetch verb acting on the t.me handle — the dead-drop mechanic
    # is "scrape the Telegram profile, extract a fallback C2 domain". The old
    # `http`/`domain` triggers matched any documentation comment that listed a
    # t.me community link next to other https:// links (e.g. VictoriaMetrics'
    # MOTD banner), so anchor on the scraping verb instead.
    if:
      type: text
      regex: '(curl|wget|fetch)[\s\S]{0,80}t\.me/[\w-]{3,80}'
composite_rules:
  - id: telegram-deaddrop
    desc: Telegram profile used as C2 dead drop
    crit: hostile
    conf: 0.9
    mbc: C0002
    all:
      - id: micro-behaviors/communications/http/services/telegram::telegram-profile-url
    any:
      - id: telegram-profile-scrape
      - id: telegram-fallback-domain-lookup
      - id: objectives/command-and-control/channel/deaddrop/steam::steam-profile-url
