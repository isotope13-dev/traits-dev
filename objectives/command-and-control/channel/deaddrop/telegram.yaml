defaults:
  platforms:
    - unix
    - windows
  crit: suspicious
  attack: T1102.001
  for: [binaries, scripts]
traits:
  - id: telegram-profile-url
    desc: Telegram profile URL (t.me)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: https?://t\.me/\w+
    not:
      - substr: t.me/joinchat
      - substr: t.me/addstickers
  - id: telegram-profile-scrape
    desc: Fetch and scrape Telegram profile page
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: curl.{1,60}t\.me/
  - id: telegram-fallback-domain-lookup
    desc: Telegram fallback domain lookup
    crit: suspicious
    conf: 0.94
    platforms: [macos]
    for: [applescript, shell]
    if:
      type: text
      regex: 't\.me/[\w-]{3,80}[\s\S]{0,500}(curl|domain|http)'
composite_rules:
  - id: telegram-deaddrop
    desc: Telegram profile used as C2 dead drop
    crit: hostile
    conf: 0.9
    mbc: C0002
    all:
      - id: telegram-profile-url
    any:
      - id: telegram-profile-scrape
      - id: telegram-fallback-domain-lookup
      - id: objectives/command-and-control/channel/deaddrop::steam-profile-url
