defaults:
  platforms:
    - windows
    - linux
    - unix
    - android
    - macos
    - ios
  crit: suspicious
  attack: T1102.001
  for: [binaries, scripts]
traits:
  - id: telegram-profile-url
    desc: Telegram profile URL (t.me)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: https?://t\.me/\w+
    not:
      - substr: t.me/joinchat
      - substr: t.me/addstickers
  - id: telegram-profile-scrape
    desc: Fetch and scrape Telegram profile page
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: curl.{1,60}t\.me/
composite_rules:
  - id: telegram-deaddrop
    desc: Telegram profile used as C2 dead drop
    crit: hostile
    conf: 0.9
    mbc: C0002
    all:
      - id: telegram-profile-url
    any:
      - id: telegram-profile-scrape
      - id: objectives/command-and-control/channel/deaddrop::steam-profile-url
