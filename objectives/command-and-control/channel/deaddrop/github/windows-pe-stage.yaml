---
defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
composite_rules:
- id: github-wininet-stage
  desc: GitHub raw dead-drop with WinInet staging
  crit: suspicious
  conf: 0.94
  attack: T1105
  all:
  - id: micro-behaviors/communications/http/get::wininet-dynamic-load
  - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-any
  any:
  - id: micro-behaviors/communications/http/get::internet-open
  - id: micro-behaviors/communications/http/get::internet-connect
  - id: micro-behaviors/communications/http/user-agent::browser-mozilla-5-0
  - id: micro-behaviors/process/sync/mutex::global-mutex-single-instance
  - id: objectives/anti-analysis/debugger-detect/check::win-basic
  - id: objectives/evasion/masquerade/identity/user-agent::user-agent-malformed-windows-wow64
  needs: 2
  downgrade:
    any:
    - id: metadata/binary/vendor::is-microsoft-named
    - id: metadata/binary/vendor::microsoft-corp-versioninfo
    - id: metadata/package/versioning::pe-version-resource
    - id: metadata/signed/platform/
