# Matcher is the generic `obj.files[idx].content` property path (GitHub Gist
# API response shape, but not GitHub-specific by itself). Intent comes from
# composites that also require api.github.com/gists/.
- id: gist-api-files-content
  desc: Indexed .files[].content property access
  crit: component
  conf: 0.9
  for: [javascript, typescript, archives]
  if:
    type: text
    regex: '\b\w+\.files\s*\[[^\]]{1,80}\]\s*\.content\b'
- id: gist-raw-url--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: gist\.githubusercontent\.com/.{1,80}/raw/.{1,80}\.(txt|ps1)\b
  count_max: 1013504
- id: gist-raw-url--rx-2
