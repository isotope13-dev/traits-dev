defaults:
  platforms: [windows, unix]
  crit: suspicious
  attack: T1102
  for: [scripts, binaries]
traits:
- id: official-flamegraph-script-url
  desc: Official FlameGraph script URL
  crit: component
  conf: 0.95
  if:
    type: text
    substr: raw.githubusercontent.com/brendangregg/FlameGraph/master/flamegraph.pl
- id: github-api-contents
  desc: GitHub API contents endpoint
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: api\.github\.com/repos/.{1,80}/contents/
- id: gist-raw-url--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: gist\.githubusercontent\.com/.{1,80}/raw/.{1,80}\.(txt|ps1)\b
  count_max: 1013504
- id: gist-raw-url--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: gist\.githubusercontent\.com/.{1,80}/raw/.{1,80}\.(js|vbs)\b
  count_max: 1013505
- id: gist-raw-url--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: gist\.githubusercontent\.com/.{1,80}/raw/.{1,80}\.(hta)\b
  count_max: 1013506
- id: fetch-github-raw-curl
  desc: curl request to GitHub raw content
  crit: component
  conf: 0.85
  if:
    type: text
    regex: curl.{0,50}raw\.githubusercontent\.com
  not:
  - substr: /home/build/melange-out/
  - substr: docker-library/
- id: fetch-github-raw-wget
  desc: wget request to GitHub raw content
  crit: component
  conf: 0.85
  if:
    type: text
    regex: wget.{0,50}raw\.githubusercontent\.com
  not:
  - substr: /home/build/melange-out/
  - substr: docker-library/
- id: thirdparty-vendor-update-script
  desc: Third-party vendoring update script
  crit: component
  conf: 0.9
  for: [shell]
  if:
    type: path
    regex: '(^|[\\/])3rdparty[\\/][^\\/]*update[^\\/]*\.sh$'
- id: github-commit-search-api
  desc: GitHub commit search API
  crit: notable
  conf: 0.86
  for: [python, javascript, typescript, shell]
  if:
    type: string_literal
    substr: api.github.com/search/commits
- id: github-commit-search-preview
  desc: GitHub commit search preview media type
  crit: component
  conf: 0.84
  for: [python, javascript, typescript, shell]
  if:
    type: string_literal
    exact: application/vnd.github.cloak-preview+json
- id: github-contents-write-api
  desc: GitHub contents write API endpoint
  crit: notable
  conf: 0.86
  for: [python, javascript, typescript, shell]
  if:
    type: string_literal
    regex: 'api\.github\.com/repos/.{1,120}/contents/'
- id: python-rsa-sha256-verify-helper-symbol
  desc: Python RSA SHA256 verify helper symbol
  crit: notable
  conf: 0.9
  for: [python]
  if:
    type: symbol
    regex: '(?i)(rsa.*verify.*sha256|verify.*rsa.*sha256)'
- id: raw-github-doc-url
  desc: GitHub raw documentation URL
  crit: baseline
  conf: 0.9
  if:
    type: text
    regex: raw\.githubusercontent\.com/.{1,100}/docs?/.{0,100}\.(html|txt|php)
composite_rules:
- id: fetch-github-raw-browser
  desc: Browser fetch of GitHub raw script content
  crit: notable
  conf: 0.82
  for: [javascript, typescript, html]
  # A dead-drop pulls an executable/script payload, not data — restrict the URL
  # leg to script/web extensions (.sh/.py/.ps1/.rb/.pl/.js/.html/.php) so that
  # fetching a published data file (openapi.json, a YAML config, a manifest)
  # from raw.githubusercontent is not treated as a C2 channel. near_bytes keeps
  # the URL and the fetch() call adjacent.
  near_bytes: 800
  all:
  - id: raw-githubusercontent-url
  - id: micro-behaviors/communications/http/request/client::fetch-string
- id: github-raw-fetch
  desc: Fetches from GitHub raw content
  crit: notable
  conf: 0.85
  any:
  - id: fetch-github-raw-curl
  - id: fetch-github-raw-wget
  - id: fetch-github-raw-browser
- id: raw-githubusercontent-url
  desc: raw.githubusercontent.com URL with executable file extension
  crit: notable
  conf: 0.8
  any:
  - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-web-file
  - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-script-file
  - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-scripting-lang
- id: github-c2-deaddrop
  desc: GitHub raw URL used for C2 indirection
  crit: hostile
  conf: 0.9
  mbc: C0002
  near_lines: 30
  all:
  - id: github-raw-fetch
  - id: micro-behaviors/process/create/shell/invoke::shell-execution
- id: suspicious-github-fetch
  desc: Fetches GitHub raw content from mutable ref
  crit: suspicious
  conf: 0.85
  unless:
  - id: metadata/file/extension::markdown-file-basename
  - id: thirdparty-vendor-update-script
  all:
  - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-refs
  - id: github-raw-fetch
- id: gist-raw-url
  desc: GitHub Gist raw content URL
  crit: suspicious
  conf: 0.8
  any:
  - id: gist-raw-url--rx-1
  - id: gist-raw-url--rx-2
  - id: gist-raw-url--rx-3
# base64-decode + RSA-SHA256-verify is generic signed-payload verification —
# exactly what legitimate inbound-webhook / license / update-signature checks do
# (the defensive opposite of C2). It only indicates a GitHub dead-drop when paired
# with github-commit-search-api in the hostile composites below, so it is glue, not
# a standalone signal. The RSA-verify capability itself is already surfaced as
# notable by micro-behaviors/crypto/asymmetric/rsa.
- id: github-signed-payload-verify
  desc: Base64 payload verified with RSA SHA256
  crit: component
  conf: 0.92
  for: [python]
  all:
  - id: micro-behaviors/data/decode/base64::b64decode-call
  any:
  - id: python-rsa-sha256-verify-helper-symbol
  - id: micro-behaviors/crypto/asymmetric/rsa::rsa-sha256-public-verify
- id: github-signed-commit-deaddrop
  desc: GitHub commit search deaddrop with signed payload verification
  crit: hostile
  conf: 0.97
  for: [python]
  near_lines: 90
  all:
  - id: github-commit-search-api
  - id: github-signed-payload-verify
  any:
  - id: github-commit-search-preview
  - id: micro-behaviors/communications/http/lib/urllib::urllib-request-object
  - id: micro-behaviors/communications/http/lib/requests::requests-get
- id: github-signed-commit-exec-deaddrop
  desc: GitHub signed commit deaddrop executes payload
  crit: hostile
  conf: 0.98
  for: [python]
  near_lines: 140
  all:
  - id: github-commit-search-api
  - id: github-signed-payload-verify
  - id: objectives/command-and-control/dropper/delivery/http::download-and-execute-func-1
  any:
  - id: micro-behaviors/process/create/subprocess::run-content
  - id: micro-behaviors/process/create/subprocess::popen-content
- id: github-token-backed-exfil-fallback
  desc: Harvested GitHub token used for repository contents exfiltration
  crit: hostile
  conf: 0.98
  for: [python, archives]
  scope: archive
  all:
  - id: github-contents-write-api
  - id: github-pat-pattern-literal
  - id: objectives/exfiltration/http/upload::python-hybrid-encrypted-secret-exfil
- id: github-pat-pattern-literal
  desc: GitHub personal access token pattern literal
  crit: component
  conf: 0.9
  any:
  - id: objectives/credential-access/cloud/token/files::github-classic-pat
  - id: objectives/credential-access/cloud/token/files::github-fine-grained-pat
# Dead-drop resolver: a raw.githubusercontent URL fetched at runtime to resolve
# the real C2, paired with a DETACHED, output-suppressed shell spawn that runs
# the resolved command. Legitimate code that reads a GitHub-hosted config does
# not then launch a hidden /bin/sh; the pairing is the loader shape. Anchors the
# @403name/ether-js typosquat (fetches c2.txt from nyx-deploy/config, then
# detached-spawns curl|bash).
# Language-AGNOSTIC: a raw.githubusercontent dead-drop fetched to resolve C2,
# paired with a process-exec API spawning a shell. The `process/create/` leg
# matches Node child_process / Ruby system / Python subprocess / Go os/exec, so
# the loader is caught in any host language (the original required Node-only
# detached spawn). The any-leg keeps it specific to spawning a SHELL (or a
# backgrounded/hidden child) rather than any benign subprocess.
- id: github-deaddrop-detached-shell-loader
  desc: GitHub dead-drop resolves C2 for hidden shell
  crit: hostile
  conf: 0.95
  attack: "T1102, T1059.004"
  for: [scripts, source]
  # Exclude raw.githubusercontent links into a project's doc/ tree: legitimate
  # tools (e.g. xdg-screensaver) cite a rendered .html doc page in a comment;
  # that is a documentation reference, not a C2 config the loader fetches and
  # pipes to a shell. The real dead-drop pulls a payload from a config/ path
  # (e.g. nyx-deploy/config/c2.txt), which contains no doc/ path segment.
  unless:
  - id: raw-github-doc-url
  all:
  - id: micro-behaviors/communications/http/url/github::raw-githubusercontent-web-file
  - id: micro-behaviors/process/create/
  any:
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  - id: micro-behaviors/process/create/shell/invoke::bash-exec
  - id: micro-behaviors/process/daemonize/detach::background-ampersand-hidden
  - id: micro-behaviors/process/create/shell/lang::go-exec-command-bin-sh
