# base64-decode + RSA-SHA256-verify is generic signed-payload verification —
# exactly what legitimate inbound-webhook / license / update-signature checks do
# (the defensive opposite of C2). It only indicates a GitHub dead-drop when paired
# with github-commit-search-api in the hostile composites below, so it is glue, not
# a standalone signal. The RSA-verify capability itself is already surfaced as
# notable by micro-behaviors/crypto/asymmetric/rsa.
- id: github-signed-payload-verify
  desc: Base64 payload verified with RSA SHA256
  crit: component
  conf: 0.92
  for: [python]
  all:
  - id: micro-behaviors/data/decode/base64::b64decode-call
  any:
  - id: python-rsa-sha256-verify-helper-symbol
  - id: micro-behaviors/crypto/asymmetric/rsa::rsa-sha256-public-verify
- id: github-signed-commit-deaddrop
  desc: GitHub commit search deaddrop with signed payload verification
  crit: hostile
  conf: 0.97
