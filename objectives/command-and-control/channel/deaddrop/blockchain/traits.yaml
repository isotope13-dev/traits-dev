# Blockchain Dead-Drop C2
# MBC: B0025 (Remote Command Execution)
# ATT&CK: T1102 (Web Service)
defaults:
  attack: T1102
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: canisterworm-canister-id
    desc: CanisterWorm C2 canister ID
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "tdtqy-oyaaa-aaaae-af2dq-cai"

    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: eth-l2-explorer-url
    desc: Ethereum L2 explorer transaction URL
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "(?i)(basescan\\.org|optimistic\\.etherscan\\.io|polygonscan\\.com|arbiscan\\.io)/tx/"

  - id: eth-jsonrpc-method
    desc: 'eth jsonrpc method'
    crit: component
    conf: 0.9
    if:
      type: text
      regex: "eth_(getLogs|getTransactionByHash|getTransactionReceipt)"

  - id: ton-blockchain-reference
    desc: TON blockchain reference
    crit: component
    conf: 0.72
    if:
      type: text
      regex: "(?i)\\b(TON|The Open Network|toncenter|tonapi)\\b"

  - id: ton-smart-contract-reference
    desc: TON smart-contract reference
    crit: component
    conf: 0.78
    if:
      type: text
      regex: "(?i)(ton.{0,32}smart.?contract|smart.?contract.{0,32}ton)"

composite_rules:
  - id: eth-l2-rpc-transaction-lookup
    desc: Ethereum L2 transaction lookup over explorer/RPC
    crit: suspicious
    conf: 0.82
    all:
      - id: eth-jsonrpc-method
      - id: eth-l2-explorer-url
    unless:
      - id: well-known/app/wordpress-plugins::known-wordpress-plugin
  - id: blockchain-dead-drop-c2
    desc: Blockchain-based command retrieval dead drop
    crit: suspicious
    conf: 0.9
    any:
      - id: canisterworm-canister-id
      - id: ton-c2-fallback-over-doh

  - id: ton-c2-fallback-over-doh
    desc: TON smart-contract C2 fallback over DNS-over-HTTPS
    crit: suspicious
    conf: 0.88
    all:
      - id: ton-blockchain-reference
      - id: micro-behaviors/communications/dns/doh::doh-cloudflare-ip-1-1-1-1
    any:
      - id: ton-smart-contract-reference
      - id: micro-behaviors/communications/dns/doh::doh-query-path
    needs: 1
