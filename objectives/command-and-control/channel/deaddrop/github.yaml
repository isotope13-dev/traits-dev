defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: suspicious
  attack: T1102
  for: [scripts, binaries]
traits:
  - id: raw-githubusercontent-web-file
    desc: raw.githubusercontent.com URL with web file extension
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: raw\.githubusercontent\.com/.{1,100}\.(html|txt|php)
  - id: raw-githubusercontent-script-file
    desc: raw.githubusercontent.com URL with script file extension
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: raw\.githubusercontent\.com/.{1,100}\.(sh|py|ps1)
  - id: raw-githubusercontent-scripting-lang
    desc: raw.githubusercontent.com URL with scripting language extension
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: raw\.githubusercontent\.com/.{1,100}\.(rb|pl|js)\b
    not:
      - substr: .schema.
      - substr: angular-resource.js
      - substr: code.angularjs.org
      - substr: bower_components/angular
  - id: raw-githubusercontent-any
    desc: raw.githubusercontent.com URL (any path)
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: raw\.githubusercontent\.com/[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+/
  - id: raw-githubusercontent-refs
    desc: GitHub raw URL with refs/heads path
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: raw\.githubusercontent\.com/.{1,80}/refs/heads/
  - id: github-api-contents
    desc: GitHub API contents endpoint
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: api\.github\.com/repos/.{1,80}/contents/
  - id: gist-raw-url
    desc: GitHub Gist raw content URL
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: gist\.githubusercontent\.com/.{1,80}/raw/
  - id: fetch-github-raw-curl
    desc: curl request to GitHub raw content
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: curl.{0,50}raw\.githubusercontent\.com
    not:
      - substr: /home/build/melange-out/
      - substr: docker-library/
  - id: fetch-github-raw-wget
    desc: wget request to GitHub raw content
    crit: notable
    conf: 0.85
    if:
      type: raw
      regex: wget.{0,50}raw\.githubusercontent\.com
    not:
      - substr: /home/build/melange-out/
      - substr: docker-library/
composite_rules:
  - id: github-raw-fetch
    desc: Fetches from GitHub raw content
    crit: notable
    conf: 0.85
    any:
      - id: fetch-github-raw-curl
      - id: fetch-github-raw-wget
  - id: raw-githubusercontent-url
    desc: raw.githubusercontent.com URL with executable file extension
    crit: notable
    conf: 0.8
    any:
      - id: raw-githubusercontent-web-file
      - id: raw-githubusercontent-script-file
      - id: raw-githubusercontent-scripting-lang
  - id: github-c2-deaddrop
    desc: GitHub raw URL used for C2 indirection
    crit: hostile
    conf: 0.9
    mbc: C0002
    near_lines: 30
    all:
      - id: github-raw-fetch
      - id: micro-behaviors/process/create/shell::shell-execution
  - id: suspicious-github-fetch
    desc: Suspicious GitHub raw content fetch
    crit: suspicious
    conf: 0.85
    any:
      - id: raw-githubusercontent-refs
      - id: gist-raw-url
