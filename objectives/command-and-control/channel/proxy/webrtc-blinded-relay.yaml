# A JS bundle that overrides the WebRTC stack (Object.defineProperty on
# RTCPeerConnection) to hide the client's real IP, writes browser cookies, and
# tunnels over an outbound WebSocket. Blinding WebRTC while proxying cookie-bearing
# traffic through a socket is the anti-attribution relay a covert web proxy uses so
# the hijacked victim cannot be de-anonymized — not something a legitimate library
# does. Structure-based (override + cookie + socket), independent of C2 hostnames.
defaults:
  platforms: [unix, windows, android]
  for: [javascript, typescript]
  attack: "T1090, T1539"
composite_rules:
  - id: webrtc-blinded-cookie-socket-relay
    desc: WebRTC-blinded cookie relay to socket
    crit: hostile
    conf: 0.88
    mbc: B0030
    all:
      - id: objectives/evasion/security-bypass/anti-bot::browser-webrtc-api-neutralization
      - id: micro-behaviors/communications/http/cookies::document-cookie-write
      - id: micro-behaviors/communications/http/websocket::websocket-constructor-call
