# Hardcoded Shadowsocks credential fake-VPN pattern.
#
# A Windows binary that bundles a hardcoded `ss://` Shadowsocks URL
# (single shared credential across all installs) AND ships
# Shadowsocks tooling (sslocal-rust, tun2socks, wintun) is the
# textbook profile of a residential-proxy / traffic-interception
# fake-VPN: every victim funnels traffic through the same proxy
# server, where the operator either monetises bandwidth (residential
# proxy SaaS) or inspects/MITM's traffic.
#
# Legitimate VPN clients ship per-account credentials fetched after
# auth — never one shared `ss://` URL embedded in the binary. The
# combination of hardcoded ss:// + Shadowsocks tooling fingerprints
# is the high-precision signal.
defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1090.003"
  mbc: "B0030"

traits:
  - id: hardcoded-ss-url
    desc: Hardcoded ss:// Shadowsocks URL in binary
    crit: suspicious
    conf: 0.95
    attack: "T1573.001"
    if:
      type: text
      regex: "ss://[A-Za-z0-9+/=]{20,}@[0-9a-zA-Z.-]+:[0-9]+"

  - id: shadowsocks-outline-prefix-token
    desc: Outline VPN prefix-obfuscation parameter
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "outline=1&prefix="

  - id: ss-chacha20-poly1305-cipher
    desc: chacha20-ietf-poly1305 Shadowsocks cipher
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: chacha20-ietf-poly1305

composite_rules:
  - id: shared-shadowsocks-fake-vpn
    desc: Shared-credential Shadowsocks fake-VPN binary
    crit: hostile
    conf: 0.97
    all:
      - id: hardcoded-ss-url
    any:
      - id: micro-behaviors/communications/proxy/tunnel::windows-virtual-tunnel-adapter
      - id: shadowsocks-outline-prefix-token
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
