defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, csharp]
  attack: T1102
  mbc: B0030

traits:
  - id: mqtt-remoteadmin-commands-topic
    desc: MQTT remoteadmin command topic
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '\bremoteadmin/commands(/|$)'
  - id: mqtt-remoteadmin-results-topic
    desc: MQTT remoteadmin results topic
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '\bremoteadmin/results(/|$)'
  - id: mqtt-remoteadmin-status-topic
    desc: MQTT remoteadmin status topic
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bremoteadmin/(status|heartbeat|logs)(/|$)'
  - id: mqtt-ra-agent-client-id
    desc: MQTT RAT agent client ID
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bra-agent-[A-Za-z0-9_.-]*\{?(MachineName|short-guid|MachineGuid)?\}?'
  - id: mqtt-hivemq-cloud-broker
    desc: HiveMQ Cloud broker endpoint
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '(?i)\b[a-z0-9.-]*hivemq\.cloud\b|\bbroker\.hivemq\.com\b'

composite_rules:
  - id: mqtt-remoteadmin-tasking-channel
    desc: MQTT remoteadmin tasking channel
    crit: suspicious
    conf: 0.96
    all:
      - id: mqtt-remoteadmin-commands-topic
      - id: mqtt-remoteadmin-results-topic
    any:
      - id: mqtt-remoteadmin-status-topic
      - id: mqtt-ra-agent-client-id
      - id: mqtt-hivemq-cloud-broker
      - id: micro-behaviors/os/sysinfo/machine-id::machineguid
  - id: mqtt-public-broker-rat-channel
    desc: MQTT public broker RAT channel
    crit: hostile
    conf: 0.98
    all:
      - id: mqtt-remoteadmin-tasking-channel
      - id: mqtt-hivemq-cloud-broker
    any:
      - id: mqtt-ra-agent-client-id
      - id: micro-behaviors/os/sysinfo/machine-id::machineguid
  - id: mcp-shell-and-mqtt-tasking
    desc: MCP arbitrary shell tool combined with MQTT tasking
    crit: hostile
    conf: 0.98
    for: [python]
    scope: archive
    all:
      - id: objectives/command-and-control/remote-command/control::python-mcp-cwd-shell-execution
      - id: micro-behaviors/communications/messaging/mqtt::paho-mqtt-subscriber
