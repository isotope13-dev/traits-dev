defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1573
traits:
  - id: encrypted-c2-message-types
    desc: Agent message-type tokens
    crit: component
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: \b(module_cmd|file_data|get_output)\b
composite_rules:
  - id: encrypted-json-c2-framing
    desc: Potential encrypted JSON command channel
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/socket/framing::big-endian-length-prefix-json
      - id: encrypted-c2-message-types
      - id: micro-behaviors/communications/socket/connect::socket-connect-call
      - id: micro-behaviors/communications/socket/receive::socket-recv-call
    any:
      - id: micro-behaviors/communications/socket/framing::aesgcm-length-prefixed-socket
