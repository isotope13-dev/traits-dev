defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1573
traits:
  - id: encrypted-c2-message-types
    desc: Encrypted channel message type strings
    crit: notable
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: \b(module_cmd|file_data|get_output)\b
composite_rules:
  - id: encrypted-json-c2-framing
    desc: Encrypted JSON C2 framing
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/framing::big-endian-length-prefix-json
      - id: encrypted-c2-message-types
    any:
      - id: micro-behaviors/communications/socket/framing::aesgcm-length-prefixed-socket
      - id: micro-behaviors/communications/socket/send::python-sendall
