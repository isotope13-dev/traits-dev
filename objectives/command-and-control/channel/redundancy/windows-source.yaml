defaults:
  platforms: [windows]
  for: [c, cpp]
  attack: T1071
  mbc: B0030

traits:
  - id: http-transport-selector-token
    desc: HTTP transport selector token
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (?i)\b(TRANSPORT|PROTO|CHANNEL)_(HTTPS?|WEB)\b
  - id: tcp-transport-selector-token
    desc: TCP transport selector token
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (?i)\b(TRANSPORT|PROTO|CHANNEL)_TCP\b
  - id: udp-transport-selector-token
    desc: UDP transport selector token
    crit: component
    conf: 0.86
    if:
      type: text
      regex: (?i)\b(TRANSPORT|PROTO|CHANNEL)_UDP\b
  - id: c2-command-shell-token
    desc: C2 shell command token
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)\bCMD_(SHELL|EXEC)\b
  - id: c2-command-file-token
    desc: C2 file command token
    crit: component
    conf: 0.88
    if:
      type: text
      regex: (?i)\bCMD_(UPLOAD|DOWNLOAD)\b
  - id: c2-command-beacon-token
    desc: C2 beacon command token
    crit: component
    conf: 0.86
    if:
      type: text
      regex: (?i)\bCMD_(SLEEP|BEACON)\b

composite_rules:
  - id: c2-command-enum-token
    desc: C2 command enum token
    crit: component
    conf: 0.9
    any:
      - id: c2-command-shell-token
      - id: c2-command-file-token
      - id: c2-command-beacon-token
  - id: c2-multi-transport-selectors
    desc: C2 multi-transport selector tokens
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: http-transport-selector-token
      - id: tcp-transport-selector-token
      - id: udp-transport-selector-token
    unless:
      - id: well-known/lib/hpc
      - id: well-known/tool/reverse-engineering/radare2::radare2-go-module-source-path
  - id: multi-transport-backdoor-source
    desc: Multi-transport command backdoor source
    crit: hostile
    conf: 0.98
    all:
      - id: c2-multi-transport-selectors
      - id: c2-command-enum-token
      - id: micro-behaviors/communications/http/get::wininet-http-client-src
      - id: micro-behaviors/communications/socket/listen::socket-sym
      - id: micro-behaviors/communications/socket/connect::connect-symbol
    any:
      - id: micro-behaviors/communications/socket/send::send-symbol
      - id: micro-behaviors/communications/socket/receive::recv-symbol
