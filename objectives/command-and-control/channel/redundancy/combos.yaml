defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: redundant-exfil-channels
    desc: "Contains redundant HTTP POST and WebSocket capabilities"
    conf: 0.85
    crit: suspicious
    attack: T1041
    for: [javascript, typescript]
    near_lines: 40
    all:
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/communications/http/websocket::websocket
      - id: objectives/exfiltration/sensitive-data::js-sensitive-data-exfiltration
    unless:
      - id: metadata/library/runtime::rxjs-websocket-constructor-error
      - id: metadata/library/runtime::rxjs-cold-observable-offset-error
      - id: metadata/library/socketio::client
      - id: metadata/file/magic/identity::pe-dos-stub
      - id: micro-behaviors/communications/http/endpoints::repl-co
    downgrade:
      any:
        - {id: 'metadata/package/testing/harness/runtime/'}
        - {id: 'metadata/package/testing/harness/runtime/'}
