# Multi-Channel C2 Infrastructure
# Detects malware with multiple hardcoded C2 addresses
# Indicates redundancy planning for resilience against blocking
defaults:
  platforms: [unix, windows]
  attack: "T1071"
  mbc: "B0030"
composite_rules:
  - id: redundant-c2-infrastructure
    desc: Multiple C2 communication channels (failover/redundancy)
    crit: suspicious
    conf: 0.9
    for: [pe, elf, shell, python]
    needs: 3
    any:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: micro-behaviors/communications/ip/literal::encoded-external-ipv4-binary
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-list
    unless:
      - id: well-known/lib/pyaigis/
      - id: metadata/package/versioning::version-number-ipv4-metadata
      - id: metadata/lang/compiler/generated::f2py-python-extension
      - id: micro-behaviors/dylib/library/family::system-lib-marker
  - id: multi-channel-diversity
    desc: C2 infrastructure using multiple communication methods
    crit: notable
    conf: 0.85
    for: [pe, elf, shell]
    size_max: 200000
    needs: 2
    any:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: micro-behaviors/communications/ip/literal::encoded-external-ipv4-binary
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-list
    unless:
      - id: well-known/lib/pyaigis/
      - id: metadata/package/versioning::version-number-ipv4-metadata
      - id: metadata/lang/compiler/generated::f2py-python-extension
    downgrade:
      any:
        - id: metadata/package/quality/profile::versioned
      none:
        - id: metadata/file/extension/identity::shell
