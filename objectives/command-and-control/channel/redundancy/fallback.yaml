defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: fallback-exfil-channels
    desc: Nearby HTTP POST, WebSocket, and upload markers
    conf: 0.85
    crit: notable
    attack: T1041
    for: [javascript, typescript]
    near_bytes: 1600
    all:
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/communications/http/websocket::websocket-class
      - id: objectives/exfiltration
    unless:
      - id: metadata/library/runtime::rxjs-websocket-constructor-error
      - id: metadata/library/runtime::rxjs-cold-observable-offset-error
      - id: metadata/file/magic/identity::pe-dos-stub
      - id: objectives/command-and-control/infrastructure/domain/malicious::repl-co
      - id: well-known/lib/tina4ruby::frond-js
      - id: metadata/library/structure::js-vite-rollup-vendor-chunk
    downgrade:
      any:
        - {id: 'metadata/package/testing/harness/runtime/'}
