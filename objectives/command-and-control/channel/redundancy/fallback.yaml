defaults:
  platforms: [linux, macos, windows, unix, android, ios]
composite_rules:
  - id: fallback-exfil-channels
    desc: "Contains fallback HTTP POST and WebSocket exfiltration capabilities"
    conf: 0.85
    crit: suspicious
    attack: T1041
    for: [javascript, typescript]
    near_bytes: 1600
    all:
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/communications/http/websocket::websocket-class
      - id: objectives/exfiltration
    unless:
      - id: metadata/library/runtime::rxjs-websocket-constructor-error
      - id: metadata/library/runtime::rxjs-cold-observable-offset-error
      - id: metadata/file/magic::pe-dos-stub
      - id: objectives/command-and-control/infrastructure/domain/malicious::repl-co
    downgrade:
      any:
        - {id: 'metadata/package/testing/harness/runtime::is-test'}
        - {id: 'metadata/package/testing/harness/runtime::test-basename-pattern'}
