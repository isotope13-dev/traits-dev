defaults:
  platforms: [windows, linux, macos]
  for: [binaries, pe, elf, macho, text]

traits:
  - id: msquic-library-reference
    desc: MsQuic library reference
    crit: component
    conf: 0.82
    if:
      type: text
      substr: msquic.dll

  - id: wolfssl-library-reference
    desc: WolfSSL library reference
    crit: component
    conf: 0.82
    if:
      type: text
      substr: wolfSSL

  - id: http3-protocol-reference
    desc: HTTP/3 protocol reference
    crit: component
    conf: 0.8
    if:
      type: text
      substr: HTTP/3

  - id: quic-protocol-reference
    desc: QUIC protocol reference
    crit: component
    conf: 0.8
    if:
      type: text
      substr: QUIC

composite_rules:
  - id: msquic-wolfssl-combo
    desc: MsQuic with WolfSSL
    crit: notable
    conf: 0.88
    all:
      - id: msquic-library-reference
      - id: wolfssl-library-reference

  - id: multi-protocol-quic-rat-stack
    desc: Multi-protocol QUIC RAT stack
    crit: suspicious
    conf: 0.9
    all:
      - id: msquic-wolfssl-combo
    any:
      - id: http3-protocol-reference
      - id: quic-protocol-reference
    needs: 1
