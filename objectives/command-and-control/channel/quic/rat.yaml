defaults:
  platforms: [windows, linux, macos]
  for: [binaries, pe, elf, macho, text]

traits:
  - id: msquic-library-reference
    desc: MsQuic library reference
    crit: component
    conf: 0.82
    if:
      type: text
      substr: msquic.dll

  - id: wolfssl-library-reference
    desc: WolfSSL library reference
    crit: component
    conf: 0.82
    if:
      type: text
      substr: wolfSSL

  - id: http3-protocol-reference
    desc: HTTP/3 protocol reference
    crit: component
    conf: 0.8
    if:
      type: text
      substr: HTTP/3

  - id: quic-protocol-reference
    desc: QUIC protocol reference
    crit: component
    conf: 0.8
    if:
      type: text
      substr: QUIC

  - id: quic-go-library-reference
    desc: quic-go library reference
    crit: component
    conf: 0.82
    for: [go, pe, elf, macho, text]
    if:
      type: text
      regex: "github\\.com/(quic-go|lucas-clemente)/quic-go"

composite_rules:
  - id: msquic-wolfssl-combo
    desc: MsQuic with WolfSSL
    crit: notable
    conf: 0.88
    all:
      - id: msquic-library-reference
      - id: wolfssl-library-reference

  - id: multi-protocol-quic-rat-stack
    desc: Multi-protocol QUIC RAT stack
    crit: suspicious
    conf: 0.9
    all:
      - id: msquic-wolfssl-combo
    any:
      - id: http3-protocol-reference
      - id: quic-protocol-reference
    needs: 1

  - id: go-quic-rat-transport
    desc: Go QUIC transport with RAT channel context
    crit: suspicious
    conf: 0.88
    all:
      - id: quic-go-library-reference
    any:
      - id: objectives/command-and-control/channel/websocket::go-websocket-rat-channel
      - id: objectives/command-and-control/remote-command/protocol::go-websocket-rat-remote-control
    needs: 1
