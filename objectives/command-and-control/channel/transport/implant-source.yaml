defaults:
  platforms: [windows, unix]
  for: [c, cpp]
  attack: "T1071"
  mbc: "B0030"
traits:
  - id: magic-value-protocol-const
    desc: C2 protocol magic value constant
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: DEMON_MAGIC_VALUE
  - id: indirect-win32-api-struct
    desc: Indirect Win32 API via struct pointer
    crit: suspicious
    conf: 0.9
    attack: T1106
    if:
      type: text
      substr: "Win32.LocalAlloc"
  - id: transport-send-call
    desc: TransportSend C2 exfiltration call
    crit: suspicious
    conf: 0.9
    attack: T1041
    if:
      type: symbol
      exact: TransportSend
  - id: aes-xcrypt-c2-traffic
    desc: AesXCryptBuffer C2 traffic encryption
    crit: suspicious
    conf: 0.9
    attack: T1573
    if:
      type: text
      substr: AesXCryptBuffer
  - id: session-agent-id-field
    desc: Session AgentID C2 beacon field
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: "Session.AgentID"
  - id: transport-smb-pipe-mode
    desc: SMB transport build-flag reference
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '(?m)^\s*#\s*(if|ifdef|ifndef|define)\s+TRANSPORT_SMB\b'
  - id: package-transmit-function
    desc: PackageTransmit C2 queued send function
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      exact: PackageTransmit
  - id: config-aes-key-iv
    desc: AES Key/IV C2 encryption config
    crit: suspicious
    conf: 0.9
    attack: T1573
    if:
      type: text
      substr: "Config.AES"
composite_rules:
  - id: c2-encrypted-transport-source
    desc: Encrypted C2 transport with magic value
    crit: hostile
    conf: 0.98
    all:
      - id: magic-value-protocol-const
      - id: indirect-win32-api-struct
    any:
      - id: aes-xcrypt-c2-traffic
      - id: transport-send-call
  - id: c2-aes-encrypted-transport
    desc: AES-encrypted C2 traffic with agent ID
    crit: suspicious
    conf: 0.95
    attack: T1573
    all:
      - id: aes-xcrypt-c2-traffic
      - id: transport-send-call
    any:
      - id: config-aes-key-iv
      - id: session-agent-id-field
  - id: c2-smb-pipe-transport
    desc: SMB named pipe C2 transport channel
    crit: suspicious
    conf: 0.9
    all:
      - id: transport-smb-pipe-mode
    any:
      - id: transport-send-call
      - id: package-transmit-function
