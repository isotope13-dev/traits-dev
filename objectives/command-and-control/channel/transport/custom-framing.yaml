defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: text_headers
    desc: Custom text-based C2 protocol framing
    crit: suspicious
    conf: 0.8
    attack: T1071
    if:
      type: text
      regex: Bytes == %d|iDataSize == %d
  - id: go-net-c2-endpoint
    desc: go_net hardcoded C2 endpoint
    crit: notable
    conf: 0.99
    platforms: [linux]
    for: [elf]
    if:
      type: text
      substr: '87.106.146.245:6703'
  - id: go-net-attack-status
    desc: go_net attack status marker
    crit: component
    conf: 0.96
    platforms: [linux]
    for: [elf]
    if:
      type: text
      substr: ': status=ATTACKING'
  - id: go-net-c2-responses
    desc: go_net C2 response strings
    crit: component
    conf: 0.96
    platforms: [linux]
    for: [elf]
    count_min: 2
    if:
      type: text
      regex: 'INFO: (Attack stopped\.|Rebooting\.\.\.)'
composite_rules:
  - id: go-net-c2-tasking-channel
    desc: go_net C2 tasking channel
    crit: hostile
    conf: 0.99
    platforms: [linux]
    for: [elf]
    all:
      - id: go-net-c2-endpoint
      - id: objectives/impact/dos/attack::go-net-attack-package
    any:
      - id: go-net-attack-status
      - id: go-net-c2-responses
      - id: objectives/impact/dos/attack::go-net-command-core
      - id: objectives/impact/dos/attack::go-net-command-volume
      - id: objectives/impact/dos/attack::go-net-command-game
    needs: 2
