# gRPC-based C2 Channel Detection
# Detects use of gRPC (Google Remote Procedure Call) as a C2 channel.
# gRPC provides bidirectional streaming that is difficult to inspect, making it
# attractive for malware C2. Used by JaskaGO, Sliver, and custom Go RATs.
# ATT&CK: T1071.001 (C2: Application Layer Protocol: Web Protocols)
defaults:
  platforms:
    - linux
    - macos
    - windows
  for:
    - macho
    - elf
    - pe
  attack: T1071.001
  crit: notable

traits:
  - id: grpc-process-responses-stream
    desc: "gRPC ProcessResponses stream"
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ProcessResponsesServer

  - id: grpc-command-processor-client
    desc: 'gRPC CommandProcessorClient type'
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: proto.CommandProcessorClient

  - id: grpc-command-processor-server
    desc: 'gRPC CommandProcessorServer type'
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: proto.CommandProcessorServer

  - id: grpc-proto-main
    desc: Compiled proto/main.proto build artifact path
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: proto/main\.(proto|pb\.go)

  - id: proto-c2-service-definition
    desc: Protobuf C2 service definition
    for: [kotlin, text, data]
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'service\s+C2Service\s*\{'

  - id: proto-implant-registration-rpc
    desc: Protobuf implant registration RPC
    for: [kotlin, text, data]
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'rpc\s+Register\s*\(\s*RegistrationRequest\s*\)'

  - id: proto-beaconstream-rpc-name
    desc: Protobuf BeaconStream RPC name
    for: [kotlin, text, data]
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'rpc\s+BeaconStream\s*\('
  - id: proto-beacon-message-stream
    desc: Protobuf BeaconMessage stream
    for: [kotlin, text, data]
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'stream\s+BeaconMessage\s*\)'
  - id: proto-command-message-stream
    desc: Protobuf CommandMessage return stream
    for: [kotlin, text, data]
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'returns\s*\(\s*stream\s+CommandMessage'

  - id: proto-c2-file-transfer-rpc
    desc: Protobuf C2 file transfer RPC
    for: [kotlin, text, data]
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'rpc\s+(UploadFile|DownloadFile)\s*\('

  - id: proto-c2-task-result-rpc
    desc: Protobuf C2 task result RPC
    for: [kotlin, text, data]
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'rpc\s+(GetTasks|SubmitResult|SendCommand|GetCommandResult)\s*\('

  - id: proto-commandtype-enum
    desc: Protobuf CommandType enum
    for: [kotlin, text, data]
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'enum\s+CommandType\s*\{'
  - id: proto-shell-enum-value
    desc: Protobuf SHELL enum value
    for: [kotlin, text, data]
    crit: component
    conf: 0.9
    if:
      type: text
      word: SHELL
  - id: proto-powershell-enum-value
    desc: Protobuf POWERSHELL enum value
    for: [kotlin, text, data]
    crit: component
    conf: 0.9
    if:
      type: text
      word: POWERSHELL
  - id: proto-screenshot-enum-value
    desc: Protobuf SCREENSHOT enum value
    for: [kotlin, text, data]
    crit: component
    conf: 0.9
    if:
      type: text
      word: SCREENSHOT
  - id: proto-keylog-enum-value
    desc: Protobuf KEYLOG enum value
    for: [kotlin, text, data]
    crit: component
    conf: 0.9
    if:
      type: text
      word: KEYLOG
  - id: proto-process-list-enum-value
    desc: Protobuf PROCESS_LIST enum value
    for: [kotlin, text, data]
    crit: component
    conf: 0.9
    if:
      type: text
      word: PROCESS_LIST

composite_rules:
  - id: proto-beacon-command-stream-rpc
    desc: Protobuf beacon command stream RPC
    crit: notable
    conf: 0.9
    for: [kotlin, text, data]
    near_bytes: 300
    all:
      - id: proto-beaconstream-rpc-name
      - id: proto-beacon-message-stream
      - id: proto-command-message-stream
  - id: proto-c2-command-enum
    desc: Protobuf C2 command enum
    crit: notable
    conf: 0.9
    for: [kotlin, text, data]
    near_bytes: 800
    all:
      - id: proto-commandtype-enum
    any:
      - id: proto-shell-enum-value
      - id: proto-powershell-enum-value
      - id: proto-screenshot-enum-value
      - id: proto-keylog-enum-value
      - id: proto-process-list-enum-value
    needs: 3
  - id: grpc-c2-channel
    desc: gRPC-based C2 channel (bidirectional command stream)
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/grpc::grpc-go-import
    any:
      - id: grpc-process-responses-stream
      - id: grpc-command-processor-client

  - id: grpc-c2-with-proto
    desc: gRPC C2 with compiled protobuf command dispatch service
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/grpc::grpc-go-import
      - id: grpc-proto-main
    any:
      - id: grpc-process-responses-stream
      - id: grpc-command-processor-client

  - id: protobuf-c2-control-schema
    desc: Protobuf schema defines C2 control channel
    for: [kotlin, text, data]
    crit: suspicious
    conf: 0.96
    all:
      - id: proto-c2-service-definition
      - id: proto-implant-registration-rpc
      - id: proto-beacon-command-stream-rpc
    any:
      - id: proto-c2-file-transfer-rpc
      - id: proto-c2-task-result-rpc
      - id: proto-c2-command-enum
    needs: 2
