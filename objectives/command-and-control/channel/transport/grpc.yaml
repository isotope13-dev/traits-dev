# gRPC-based C2 Channel Detection
# Detects use of gRPC (Google Remote Procedure Call) as a C2 channel.
# gRPC provides bidirectional streaming that is difficult to inspect, making it
# attractive for malware C2. Used by JaskaGO, Sliver, and custom Go RATs.
# ATT&CK: T1071.001 (C2: Application Layer Protocol: Web Protocols)
defaults:
  platforms:
    - linux
    - macos
    - windows
  for:
    - macho
    - elf
    - pe
  attack: T1071.001
  crit: notable

traits:
  - id: grpc-go-import
    desc: google.golang.org/grpc Go import path in binary
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: google.golang.org/grpc

  - id: grpc-process-responses-stream
    desc: gRPC bidirectional ProcessResponses stream type
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: ProcessResponsesServer

  - id: grpc-command-processor-client
    desc: 'gRPC CommandProcessorClient type'
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: proto.CommandProcessorClient

  - id: grpc-command-processor-server
    desc: 'gRPC CommandProcessorServer type'
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: proto.CommandProcessorServer

  - id: grpc-go-version
    desc: grpc-go version string in binary
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: grpc-go/\d+\.\d+

  - id: grpc-proto-main
    desc: Compiled proto/main.proto build artifact path
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: proto/main\.(proto|pb\.go)

composite_rules:
  - id: grpc-c2-channel
    desc: gRPC-based C2 channel (bidirectional command stream)
    crit: suspicious
    conf: 0.9
    all:
      - id: grpc-go-import
    any:
      - id: grpc-process-responses-stream
      - id: grpc-command-processor-client

  - id: grpc-c2-with-proto
    desc: gRPC C2 with compiled protobuf command dispatch service
    crit: suspicious
    conf: 0.95
    all:
      - id: grpc-go-import
      - id: grpc-proto-main
    any:
      - id: grpc-process-responses-stream
      - id: grpc-command-processor-client
