# C2 Command Dispatch Protocol Detection
# Detects command-to-byte/int mappings used in C2 frameworks
# ATT&CK: T1071 (Application Layer Protocol)
# MBC: B0030 (C2 Communication)
defaults:
  platforms: [windows, unix]
  for: [python, ruby, perl]
  crit: notable
  conf: 0.7
  attack: "T1071"
  mbc: "B0030"
traits:
  # === Command name to byte constant mappings ===
  - id: cmd-byte-shell
    desc: Shell command byte mapping
    if:
      type: text
      regex: '(?i)(create_shell|open_shell|spawn_shell)\s*=\s*b"'
  - id: cmd-byte-shell-generic
    desc: Shell/cmd_shell byte mapping
    if:
      type: text
      regex: '(?i)(cmd_shell|shell)\s*=\s*b"'
  - id: cmd-byte-exec
    desc: Exec command byte mapping
    if:
      type: text
      regex: '(?i)(exec_command|execute|run_command|cmd_exec)\s*=\s*b"'
  - id: cmd-byte-upload
    desc: Upload command byte mapping
    if:
      type: text
      regex: '(?i)(upload|file_upload|send_file)\s*=\s*b"'
  - id: cmd-byte-check
    desc: Check/heartbeat command byte mapping
    if:
      type: text
      regex: '(?i)(check|heartbeat|ping)\s*=\s*b"'
  - id: cmd-byte-beacon
    desc: Beacon/alive command byte mapping
    if:
      type: text
      regex: '(?i)(beacon|alive)\s*=\s*b"'
  - id: cmd-byte-sleep
    desc: Sleep/interval command byte mapping
    if:
      type: text
      regex: '(?i)(set_sleep|sleep|interval|jitter)\s*=\s*b"'
composite_rules:
  # C2 command dispatch table: multiple command byte mappings
  - id: c2-command-dispatch
    desc: C2 command dispatch byte table
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: cmd-byte-shell
      - id: cmd-byte-shell-generic
      - id: cmd-byte-exec
      - id: cmd-byte-upload
      - id: cmd-byte-check
      - id: cmd-byte-beacon
      - id: cmd-byte-sleep
      - id: micro-behaviors/communications/ipc/message::python-command-byte-map
