defaults:
  for: [csharp]
  platforms: [windows]
  attack: T1071
  mbc: B0030

traits:
  - id: msgpack-client-info-packet
    desc: MsgPack client info packet
    crit: component
    conf: 0.9
    if:
      type: literal
      exact: "ClientInfo"
  - id: msgpack-host-fingerprint-fields
    desc: MsgPack host fingerprint fields
    crit: notable
    conf: 0.9
    count_min: 5
    if:
      type: literal
      regex: '^(HWID|User|OS|Path|Admin|Performance|Pastebin|Antivirus|Installed|Pong|Group)$'
  - id: msgpack-encode-bytes-call
    desc: MsgPack encode bytes call
    crit: notable
    conf: 0.9
    if:
      type: symbol
      kind: call
      regex: '(^|\.)Encode2Bytes$'
  - id: active-window-title-fingerprint
    desc: Active window title fingerprint
    crit: notable
    conf: 0.88
    if:
      type: symbol
      kind: call
      regex: '(^|\.)GetActiveWindowTitle$'

composite_rules:
  - id: msgpack-client-fingerprint-registration
    desc: MsgPack client fingerprint registration
    crit: suspicious
    conf: 0.95
    all:
      - id: msgpack-client-info-packet
      - id: msgpack-host-fingerprint-fields
      - id: msgpack-encode-bytes-call
    any:
      - id: active-window-title-fingerprint
