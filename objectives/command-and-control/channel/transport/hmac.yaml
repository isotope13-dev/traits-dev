defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
composite_rules:
  - id: hmac-signed-request
    desc: HMAC-signed API request pattern
    crit: notable
    conf: 0.6
    all:
      - id: micro-behaviors/crypto/library/provider::crypto-js-hmacsha256
      - id: micro-behaviors/communications/http/request/client::http-client
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation
        - id: metadata/binary/framework/
    unless:
      - id: well-known/app/tencent-codebuddy::codebuddy-marker
      - id: metadata/library/structure::js-large-module-bundle
      - id: metadata/library/structure::js-webpack-bundle
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
