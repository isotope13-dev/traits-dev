defaults:
  platforms: [netscaler, appliance, unix]
  for: [csharp]
  attack: T1102

traits:
  - id: dotnet-netscaler-beacon-id
    desc: .NET NetScaler beacon ID
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/v1/beacon/{beaconId}

  - id: dotnet-netscaler-task-poll
    desc: .NET NetScaler task poll
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/v1/tasks/\{beaconId\}'

  - id: dotnet-c2-archive-base64
    desc: .NET C2 archive base64
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Convert\.ToBase64String\(archive\)'

composite_rules:
  - id: dotnet-netscaler-botnet-tasking
    desc: .NET NetScaler botnet tasking
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-netscaler-beacon-id
      - id: dotnet-netscaler-task-poll
    any:
      - id: dotnet-c2-archive-base64
