defaults:
  platforms: [unix, android]
  for: [scripts, binaries]
traits:
  - id: reboot-lockdown-command
    desc: chmod 000 on reboot tools
    crit: suspicious
    conf: 0.98
    attack: T1222
    if:
      type: text
      regex: \bchmod\s+0{3,4}\s+/(usr/)?s?bin/(reboot|shutdown|poweroff|halt)\b
composite_rules:
  - id: multi-fetch-multi-arch-dropper
    desc: Multi-fetch multi-arch payload dropper
    crit: suspicious
    conf: 0.93
    attack: T1105
    all:
      - id: objectives/command-and-control/botnet/iot::multi-protocol
      - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-runtime-wordlist
  - id: runtime-lockdown
    desc: Runtime watchdog and reboot lockdown
    crit: suspicious
    conf: 0.96
    all:
      - id: reboot-lockdown-command
    any:
      - id: objectives/impact/degrade/system/watchdog::watchdog-recovery-targeting
      - id: micro-behaviors/fs/path/device::watchdog-device
      - id: micro-behaviors/fs/path/system::sbin-watchdog-text
      - id: micro-behaviors/fs/path/config::config-watchdog-default-text
  - id: appliance-botnet-persistence
    desc: Network appliance botnet persistence
    crit: suspicious
    conf: 0.98
    attack: T1105
    all:
      - id: multi-fetch-multi-arch-dropper
      - id: runtime-lockdown
