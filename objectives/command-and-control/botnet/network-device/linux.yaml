defaults:
  platforms: [unix, android]
  for: [shell, scripts, binaries]
traits:
  - id: reboot-lockdown-command
    desc: chmod 000 on reboot tools
    crit: suspicious
    conf: 0.98
    attack: T1222
    if:
      type: text
      regex: \bchmod\s+0{3,4}\s+/(usr/)?s?bin/(reboot|shutdown|poweroff|halt)\b
  - id: bins-url-variable-arch-loop
    desc: Raw-IP bins URL variable loop
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'url="http://\d{1,3}(\.\d{1,3}){3}/bins/\$bin"'
  - id: curl-wget-busybox-var-fallback
    desc: curl wget busybox variable fallback
    crit: component
    conf: 0.95
    if:
      type: text
      substr: 'busybox wget -q -O "$bin" "$url"'
composite_rules:
  - id: multi-fetch-multi-arch-dropper
    desc: Multi-fetch multi-arch payload dropper
    crit: suspicious
    conf: 0.93
    attack: T1105
    all:
      - id: objectives/command-and-control/botnet/iot::multi-protocol
      - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-runtime-wordlist
  - id: runtime-lockdown
    desc: Runtime watchdog and reboot lockdown
    crit: suspicious
    conf: 0.96
    all:
      - id: reboot-lockdown-command
    any:
      - id: objectives/impact/degrade/system/watchdog::watchdog-recovery-targeting
      - id: micro-behaviors/fs/path/device/special::watchdog-device
      - id: micro-behaviors/fs/path/system::sbin-watchdog-text
      - id: micro-behaviors/fs/path/config/system::config-watchdog-default-text
  - id: appliance-botnet-persistence
    desc: Network appliance botnet persistence
    crit: suspicious
    conf: 0.98
    attack: T1105
    all:
      - id: multi-fetch-multi-arch-dropper
      - id: runtime-lockdown
  - id: raw-ip-bins-var-multiarch-runner
    desc: Raw-IP bins variable multiarch runner
    crit: hostile
    conf: 0.98
    attack: "T1105, T1059.004"
    all:
      - id: bins-url-variable-arch-loop
      - id: curl-wget-busybox-var-fallback
      - id: micro-behaviors/process/create/local-exec::background-local-exec
  - id: raw-ip-multiarch-native-payload-dropper
    desc: Raw-IP multi-architecture native payload dropper
    crit: hostile
    conf: 0.98
    attack: "T1105, T1059.004"
    mbc: B0024
    all:
      - id: objectives/command-and-control/dropper/delivery/fetch-exec::raw-ip-multiarch-wildcard-download-execution
    any:
      - id: micro-behaviors/os/sysinfo/platform/arch::multi-arch-target
      - id: micro-behaviors/os/sysinfo/platform/string::multi-arch-runtime-wordlist
