defaults:
  platforms: [linux, android]
  for: [elf]
  attack: T1071.001
  mbc: B0030

traits:
  - id: bot-heartbeat-endpoint
    desc: Bot heartbeat API endpoint
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /api/bot_heartbeat

  - id: bot-command-poll-endpoint
    desc: Bot command polling endpoint
    crit: component
    conf: 0.95
    if:
      type: text
      substr: /api/get_command

  - id: bot-json-heartbeat-fields
    desc: Bot heartbeat JSON fields
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\{"bot_id":"%s","os":"%s","status":"%s"'

  - id: bot-command-id-field
    desc: Bot command identifier field
    crit: component
    conf: 0.75
    if:
      type: text
      exact: cmd_id

composite_rules:
  - id: rest-api-bot-command-channel
    desc: REST API bot command channel
    crit: hostile
    conf: 0.96
    all:
      - id: bot-heartbeat-endpoint
      - id: bot-command-poll-endpoint
    any:
      - id: bot-json-heartbeat-fields
      - id: bot-command-id-field
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-binary
    needs: 2
