defaults:
  platforms:
    - unix
    - windows
    - macos
  for:
    - elf
    - shell
traits:
  - id: busybox
    desc: BusyBox reference (IoT device targeting)
    crit: notable
    conf: 0.5
    attack: T1059.004
    platforms:
      - linux
    for: [elf]
    if:
      type: text
      substr: /bin/busybox
  - id: busybox-shell
    desc: BusyBox command in shell script
    crit: notable
    conf: 0.7
    attack: T1059.004
    platforms:
      - linux
    for: [shell]
    if:
      type: text
      regex: '\bbusybox\s+\w'
  - id: telnet-target
    desc: Telnet service targeting
    crit: suspicious
    conf: 0.8
    attack: T1021.007
    platforms:
      - linux
    if:
      type: text
      regex: telnetadmin|([0-9]{1,3}\.){3}[0-9]{1,3}:23\b|[a-z0-9.-]{4,}:23\b
    not:
      - substr: column:23
      - substr: line:23
    unless:
      - type: text
        section: ident
        regex: :\d{2}:\d{2}
  - id: http-prefix-dup
    desc: http:// protocol prefix
    crit: notable
    if:
      id: micro-behaviors/communications/http/protocol::http-prefix
composite_rules:
  - id: curl-http-download
    desc: Curl command with HTTP URL
    crit: notable
    conf: 0.5
    attack: T1105
    platforms:
      - linux
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: objectives/command-and-control/botnet/iot::http-prefix-dup
  - id: curl-http-download-exec
    desc: Curl HTTP download piped/executed by shell
    crit: suspicious
    conf: 0.9
    attack: T1059.004
    platforms:
      - linux
    all:
      - id: curl-http-download
      - id: pipe-sh-or-shell-comp
  - id: pipe-sh-or-shell-comp
    desc: Pipe to shell (sh or shell)
    crit: notable
    conf: 0.6
    platforms:
      - linux
    any:
      - id: objectives/command-and-control/dropper/delivery/pipe::pipe-sh-dup
      - id: objectives/command-and-control/dropper/delivery/pipe::pipe-shell-dup
  - id: download-pipe-shell
    desc: Download command piped to shell
    crit: suspicious
    conf: 0.9
    mbc: B0024
    attack: T1059.004
    platforms:
      - linux
    all:
      - id: micro-behaviors/communications/http/download/curl/
      - id: pipe-sh-or-shell-comp
  - id: send-or-download
    desc: Send functions or download tools
    crit: notable
    conf: 0.3
    platforms:
      - linux
    any:
      - id: micro-behaviors/communications/socket/send/
      - id: micro-behaviors/communications/http/download/tftp::command
      - id: micro-behaviors/communications/http/download/curl/
  - id: self-propagate
    desc: Read own executable for propagation
    crit: suspicious
    conf: 0.8
    mbc: E1036
    attack: T1105
    platforms:
      - linux
    all:
      - id: micro-behaviors/fs/proc/info::process-self-exe
      - id: send-or-download
  - id: mirai-variant
    desc: Mirai-like IoT botnet (credential brute-force targeting)
    crit: suspicious
    conf: 0.95
    mbc: B0030
    attack: T1110.001
    platforms:
      - linux
    needs: 2
    any:
      - id: objectives/lateral-movement/brute-force/iot-creds::mirai-cred-admin
      - id: objectives/command-and-control/botnet/iot::busybox
      - id: objectives/command-and-control/botnet/iot::telnet-target
  - id: multi-protocol
    desc: Multi-protocol payload dropper (wget/tftp/ftpget/curl)
    crit: suspicious
    conf: 0.9
    mbc: B0024
    attack: T1105
    platforms:
      - linux
    needs: 2
    any:
      - id: micro-behaviors/communications/http/download/curl::wget-output-file
      - id: micro-behaviors/communications/http/download/busybox::tftp
      - id: micro-behaviors/communications/http/download/busybox::ftpget
      - id: micro-behaviors/communications/http/download/busybox::wget
      - id: micro-behaviors/communications/http/download/tftp::command
  - id: shellcode-stager-botnet
    desc: Shellcode stager with botnet self-propagation
    crit: suspicious
    conf: 0.85
    mbc: B0030
    attack: T1105
    platforms:
      - linux
    all:
      - id: micro-behaviors/fs/proc/info::process-self-exe
      - id: micro-behaviors/mem/protect/modify::rwx-prot-bytes
      - id: objectives/evasion/process/injection::register-transfer
