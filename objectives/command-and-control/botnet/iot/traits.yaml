defaults:
  platforms: [unix, windows, macos]
  for: [elf]
traits:
  - id: busybox
    desc: BusyBox reference (IoT device targeting)
    crit: notable
    conf: 0.5
    attack: T1059.004
    platforms:
      - linux
    if:
      type: string_value
      substr: /bin/busybox
  - id: telnet-target
    desc: Telnet service targeting
    crit: suspicious
    conf: 0.8
    attack: T1021.007
    platforms:
      - linux
    if:
      type: string_value
      regex: telnetadmin|:23[^0-9]
  - id: http-prefix-dup
    desc: http:// protocol prefix
    crit: notable
    if:
      id: micro-behaviors/communications/http/protocol::http-prefix
composite_rules:
  - id: curl-http-download
    desc: Curl command with HTTP URL
    crit: notable
    conf: 0.5
    attack: T1105
    platforms:
      - linux
    all:
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: objectives/command-and-control/botnet/iot::http-prefix-dup
  - id: curl-http-download-exec
    desc: Curl HTTP download piped/executed by shell
    crit: suspicious
    conf: 0.9
    attack: T1059.004
    platforms:
      - linux
    all:
      - id: curl-http-download
      - id: pipe-sh-or-shell
  - id: download-cmd
    desc: curl or wget download command
    crit: notable
    conf: 0.3
    platforms:
      - linux
    any:
      - id: micro-behaviors/communications/http/download/curl
  - id: pipe-sh-or-shell-comp
    desc: Pipe to shell (sh or shell)
    crit: notable
    conf: 0.6
    platforms:
      - linux
    any:
      - id: micro-behaviors/process/create/shell/from-pipe::pipe-sh-dup
      - id: micro-behaviors/process/create/shell/from-pipe::pipe-shell-dup
  - id: download-pipe-shell
    desc: Download command piped to shell
    crit: suspicious
    conf: 0.9
    mbc: B0024
    attack: T1059.004
    platforms:
      - linux
    all:
      - id: download-cmd
      - id: pipe-sh-or-shell
  - id: pipe-to-shell
    desc: Download and pipe to shell
    crit: suspicious
    conf: 0.95
    mbc: B0024
    attack: T1059.004
    platforms:
      - linux
    any:
      - id: download-pipe-shell
      - id: micro-behaviors/process/create/shell/from-pipe::output-pipe-sh
  - id: send-or-download
    desc: Send functions or download tools
    crit: notable
    conf: 0.3
    platforms:
      - linux
    any:
      - id: micro-behaviors/communications/socket/send/
      - id: micro-behaviors/communications/http/download/tftp::command
      - id: micro-behaviors/communications/http/download/curl
  - id: self-propagate
    desc: Read own executable for propagation
    crit: suspicious
    conf: 0.8
    mbc: E1036
    attack: T1105
    platforms:
      - linux
    all:
      - id: micro-behaviors/fs/proc/info::process-self-exe
      - id: send-or-download
  - id: mirai-variant
    desc: Mirai-like IoT botnet (credential brute-force targeting)
    crit: suspicious
    conf: 0.95
    mbc: B0030
    attack: T1110.001
    platforms:
      - linux
    needs: 2
    any:
      - id: objectives/lateral-movement/brute-force/iot-creds::mirai-cred-admin
      - id: busybox
      - id: pipe-to-shell
  - id: multi-protocol
    desc: Multi-protocol payload dropper (wget/tftp/ftpget/curl)
    crit: suspicious
    conf: 0.9
    mbc: B0024
    attack: T1105
    platforms:
      - linux
    needs: 2
    any:
      - id: micro-behaviors/communications/http/download/curl::wget
      - id: micro-behaviors/communications/http/download/busybox::tftp
      - id: micro-behaviors/communications/http/download/busybox::ftpget
      - id: curl-http-download
  - id: shellcode-stager-botnet
    desc: Shellcode stager with botnet self-propagation
    crit: suspicious
    conf: 0.85
    mbc: B0030
    attack: T1105
    platforms:
      - linux
    all:
      - id: micro-behaviors/fs/proc/info::process-self-exe
      - id: micro-behaviors/mem/protect/modify::rwx-prot-bytes
      - id: objectives/evasion/process/injection::register-transfer
