defaults:
  platforms: [linux, android]
  for: [elf]
  attack: T1071.004

traits:
  - id: getinfo-handshake
    desc: Bot getinfo handshake command
    crit: component
    conf: 0.92
    if:
      type: text
      exact: getinfo xyz

  - id: packet-split-delimiter
    desc: Bot packet split delimiter
    crit: component
    conf: 0.95
    if:
      type: text
      exact: FrshPckBnnnSplit

composite_rules:
  - id: doh-botnet-command-protocol
    desc: DoH botnet command protocol
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/dns/doh::doh-wireformat-client
    any:
      - id: getinfo-handshake
      - id: packet-split-delimiter
    needs: 2
