defaults:
  platforms: [linux]
  for: [elf]
  attack: T1110.001,T1021.007,T1105,T1059.004
  mbc: B0030

composite_rules:
  - id: embedded-telnet-credential-spray
    desc: IoT Telnet credential spray with router login handling
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/socket/telnet::embedded-telnet-server-banner
      - id: micro-behaviors/communications/socket/telnet::router-telnet-auth-failure-cluster
      - id: objectives/lateral-movement/brute-force/iot-creds::mirai-credential-access
      - id: micro-behaviors/communications/http/download/busybox::busybox-wget-http-reference

  - id: busybox-fallback-download-execute
    desc: BusyBox multi-protocol download and shell execution chain
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/download/busybox::busybox-wget-http-reference
      - id: micro-behaviors/communications/ftp/download/busybox::ftpget-elf-reference
      - id: micro-behaviors/communications/ftp/download/tftp::tftp-elf-reference
      - id: micro-behaviors/process/create/script/file::shell-pipes-downloaded-script
      - id: micro-behaviors/fs/chmod/executable/dangerous::busybox-chmod-plus-x
