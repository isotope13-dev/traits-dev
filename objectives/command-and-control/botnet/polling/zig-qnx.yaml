defaults:
  platforms: [qnx, unix]
  for: [zig]
  attack: T1059

traits:
  - id: qnx-zig-bot-beacon
    desc: QNX Zig C2 connect send
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'getaddrinfo[\s\S]{0,900}libc\.connect[\s\S]{0,900}libc\.send'

  - id: qnx-zig-c2-command-vocab
    desc: QNX Zig C2 command vocab
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'EXEC:[\s\S]{0,160}EXFIL:[\s\S]{0,160}KILL'

  - id: qnx-zig-execve-c2-shell
    desc: QNX Zig execve C2 shell
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'execute_c2_command[\s\S]{0,420}posix\.execve'

composite_rules:
  - id: qnx-zig-botnet-command-loop
    desc: QNX Zig botnet command loop
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-zig-bot-beacon
      - id: qnx-zig-c2-command-vocab
      - id: qnx-zig-execve-c2-shell
