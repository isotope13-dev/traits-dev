defaults:
  platforms: [macos]
  for: [swift]
  attack: T1071.001
traits:
  - id: botnet-beacon-verbs
    desc: Botnet beacon protocol verbs
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      regex: '(?i)(REGISTER|HEARTBEAT|RESULT)\|'
composite_rules:
  - id: swift-botnet-beacon
    desc: Swift botnet beaconing and command execution
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/process/create/shell/invoke::c-popen-call
      - id: botnet-beacon-verbs
