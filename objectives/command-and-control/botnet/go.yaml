defaults:
  platforms: [linux]
  for: [elf]
  mbc: B0030
  attack: T1071

traits:
  - id: apex2-cnc-connect-banner
    desc: Apex2 CNC connection banner
    crit: component
    conf: 0.97
    if:
      type: text
      substr: Connecting to CNC...
  - id: apex2-cnc-register
    desc: Apex2 CNC registration string
    crit: component
    conf: 0.98
    if:
      type: text
      exact: REGISTER linux 386
  - id: apex2-cnc-disconnect-banner
    desc: Apex2 CNC disconnect banner
    crit: component
    conf: 0.96
    if:
      type: text
      substr: Disconnected from CNC.
  - id: apex2-attack-control-symbols
    desc: Apex2 attack control symbols
    crit: component
    conf: 0.98
    count_min: 3
    if:
      type: symbol
      regex: 'main\.(startAttack|activeFloods|activeFloodsMu)'
  - id: apex2-command-parser-symbols
    desc: Apex2 command parser symbols
    crit: component
    conf: 0.9
    count_min: 3
    if:
      type: symbol
      regex: '(bufio\.\(\*Scanner\)\.Scan|strings\.Fields|context\.WithTimeout)'

composite_rules:
  - id: apex2-line-oriented-cnc
    desc: Apex2 line-oriented CNC client
    crit: suspicious
    conf: 0.98
    all:
      - id: apex2-cnc-register
      - id: apex2-attack-control-symbols
    any:
      - id: apex2-cnc-connect-banner
      - id: apex2-cnc-disconnect-banner
      - id: apex2-command-parser-symbols
    needs: 2
