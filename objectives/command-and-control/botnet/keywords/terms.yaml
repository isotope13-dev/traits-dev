defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: c2-server-term
    desc: C2 server keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bc2[_.\s-]?server\b
      case_insensitive: true
  - id: command-control-term
    desc: Command and control keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bcommand[_.\s-]?and[_.\s-]?control\b
      case_insensitive: true
  - id: zombie-bot-bot
    desc: Zombie bot keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bzombie[_\s]?bot\b
      case_insensitive: true
  - id: zombie-bot-net
    desc: Zombie bot keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bzombie[_\s]?net\b
      case_insensitive: true
  - id: zombie-bot-army
    desc: Zombie bot keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bzombie[_\s]?army\b
      case_insensitive: true
  - id: zombie-bot-horde
    desc: Zombie bot keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bzombie[_\s]?horde\b
      case_insensitive: true
  - id: zombie-bot-node
    desc: Zombie bot keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bzombie[_\s]?node\b
      case_insensitive: true
  - id: bot-zombie
    desc: Bot zombie keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bbot[_\s]?zombie\b
      case_insensitive: true
  - id: bot-agent
    desc: Bot agent keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bbot[_.\s-]?agent\b
      case_insensitive: true
  - id: agent-bot
    desc: Botnet agent term in control context
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\b(botnet|zombie)\b.{0,50}\bagent[_.\s-]?bot\b'
      case_insensitive: true
  - id: agent-bot-context-reverse
    desc: Botnet agent term before control context
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '\bagent[_.\s-]?bot\b.{0,50}\b(botnet|zombie)\b'
      case_insensitive: true
  - id: slave-term
    desc: Botnet slave role keyword
    crit: notable
    conf: 0.58
    if:
      type: text
      regex: \b(bot|zombie)[_.\s-]?slaves?\b|\bslaves?[_.\s-]?(bot|zombie)\b
      case_insensitive: true
    unless:
      - id: micro-behaviors/data/db/sql::sql-keyword-table
      - id: micro-behaviors/communications/modbus::protocol-usage
  - id: master-node
    desc: Master node keyword
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bmaster[_.\s-]?node\b
      case_insensitive: true
composite_rules:
  - id: zombie-bot
    desc: Zombie bot keyword
    crit: notable
    conf: 0.5
    any:
      - id: zombie-bot-bot
      - id: zombie-bot-net
      - id: zombie-bot-army
      - id: zombie-bot-horde
      - id: zombie-bot-node
