defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: c2-polling-param-prefix-a
    desc: Common C2 status/task query key
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (\?|&)(status|task)=[0-9a-zA-Z]
    unless:
      - id: metadata/file/catalog/identity/
  - id: c2-polling-param-prefix-b
    desc: Common C2 status/task query key
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (\?|&)(job|cmd)=[0-9a-zA-Z]
    unless:
      - id: metadata/file/catalog/identity/
  - id: c2-polling-param-command
    desc: "Common HTTP parameter for C2 task polling"
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (\?|&)command=[0-9a-zA-Z]
    unless:
      - id: metadata/file/catalog/identity/
composite_rules:
  - id: c2-polling-params
    desc: Common HTTP parameter for C2 status/task checks
    crit: notable
    conf: 0.6
    needs: 2
    any:
      - id: c2-polling-param-prefix-a
      - id: c2-polling-param-prefix-b
      - id: c2-polling-param-command
