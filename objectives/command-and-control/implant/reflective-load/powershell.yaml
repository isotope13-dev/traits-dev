# PowerShell Reflective Loading
# Detects PowerShell reflective code loading patterns
# ATT&CK: T1620 (Reflective Code Loading)
defaults:
  attack: T1620
  mbc: E1620
  platforms: [linux, macos, windows, unix, android, ios]
  for: [powershell]
composite_rules:
  - id: ps-decode-and-load
    desc: PowerShell decode and reflective load
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/command-and-control/implant/reflective-load/memory::ps-assembly-load
      - id: micro-behaviors/data/encode/base64::from-base64-string
  - id: ps-reflective-load
    desc: PowerShell reflective assembly loading
    crit: hostile
    conf: 0.93
    all:
      - id: objectives/command-and-control/implant/reflective-load/memory::ps-assembly-load
      - id: objectives/command-and-control/implant/reflective-load/memory::ps-assembly-invoke
