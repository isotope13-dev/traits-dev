defaults:
  platforms: [windows]
  for: [pe, dll]
traits:
  - id: custom-pe-loader
    desc: Manual PE header verification and parsing
    crit: suspicious
    conf: 0.9
    mbc: "B0005" # Reflective Code Loading
    if:
      type: hex
      section: ".text"
      # Patterns for MZ header check, e_lfanew offset (0x3c), and PE header check
      pattern: "66 81 ?? 4d 5a 75 ?? ?? ?? ?? 3c ?? ?? ?? ?? ?? 50 45 00 00"
    unless:
      # MinGW/GCC runtime includes PE validation for pseudo-relocation
      - type: string
        substr: "PyInit_"
      # MinGW-w64 CRT pseudo-relocation runtime
      - type: string
        substr: "Mingw-w64 runtime failure:"
  - id: loader-api-surface
    desc: Native loader API surface pattern
    crit: suspicious
    conf: 0.86
    mbc: "B0005"
    attack: "T1620"
    if:
      type: import_combination
      required:
        - VirtualAlloc
        - LoadLibraryA
        - GetProcAddress
      suspicious:
        - IsBadReadPtr
        - VirtualProtect
        - GetModuleFileNameA
        - fopen
        - fread
      min_suspicious: 2
    unless:
      # Large import tables indicate a normal application, not a reflective loader
      # Reflective loaders resolve APIs dynamically and typically have compact
      # import tables; debugger helpers and unpacking tools often do not.
      - type: metrics
        field: binary.import_count
        min: 80
      - id: metadata/purpose/debug-tool::human-oep-finder
composite_rules:
  - id: native-loader-obfuscated
    desc: Native reflective loader with packer profile
    crit: suspicious
    conf: 0.9
    all:
      - id: loader-api-surface
      - id: objectives/anti-static/obfuscation/binary-metrics::dominant-section
  - id: resource-backed-native-loader
    desc: Resource-backed native memory loader chain
    crit: suspicious
    conf: 0.92
    mbc: "B0005"
    attack: "T1620"
    all:
      - id: loader-api-surface
      - id: micro-behaviors/data/embedded/payload::pe-resource-load-lock-chain
    any:
      - id: objectives/anti-analysis/timing/evasion::timing-delta-check
      - id: objectives/anti-analysis/environment-detection/runtime::environment-adaptive-behavior
      - id: micro-behaviors/time/timing/delay::sleep-dup
    downgrade:
      any:
        - id: metadata/quality/versioning::pe-version-resource
        - id: metadata/vendor/microsoft::is-microsoft-named
