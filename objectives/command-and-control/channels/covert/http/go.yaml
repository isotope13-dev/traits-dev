defaults:
  for: [go]
  platforms: [linux, macos, windows, unix, android, ios]
  attack: T1071.001
traits:
  - id: request-dump-opsec
    desc: Dumps crafted HTTP request
    crit: notable
    conf: 0.82
    if:
      type: symbol
      exact: "httputil.DumpRequest"
  - id: request-send
    desc: Sends crafted HTTP request
    crit: notable
    conf: 0.86
    if:
      type: raw
      substr: "client.Do(req)"
composite_rules:
  - id: fixed-width-user-agent-channel
    desc: Fixed-width User-Agent covert channel
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/post::http-new-request
      - id: micro-behaviors/communications/http/user-agent::go-user-agent-header-set
      - id: request-send
    any:
      - id: micro-behaviors/data/encode/custom::fixed-width-page-index-encoding
      - id: micro-behaviors/data/encode/custom::fixed-width-ip-port-encoding
      - id: micro-behaviors/data/encode/custom::fixed-width-file-watch-encoding
  - id: fixed-width-user-agent-channel-opsec
    desc: Fixed-width User-Agent channel with request scrubbing
    crit: suspicious
    conf: 0.97
    all:
      - id: fixed-width-user-agent-channel
      - id: request-dump-opsec
