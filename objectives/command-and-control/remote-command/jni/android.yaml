defaults:
  for: [elf, so]
  platforms: [android]
  attack: "T1059"

traits:
  - id: java-jni-native-runcmd-symbol
    desc: Java JNI native runcmd symbol
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(^|[_\x00])Java_[A-Za-z0-9_]+_Native_runcmd(\x00|$)'
  - id: native-runcmd-symbol
    desc: Native runcmd symbol
    crit: suspicious
    conf: 0.90
    if:
      type: text
      substr: "Native_runcmd"
  - id: runcmd-simple-symbol
    desc: runcmd simple symbol
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: "runcmd_simple"

composite_rules:
  - id: android-jni-runcmd-popen
    desc: Android JNI command runner captures output
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/popen::c-popen
      - id: micro-behaviors/process/create/shell/invoke::system-fn
    any:
      - id: java-jni-native-runcmd-symbol
      - id: native-runcmd-symbol
      - id: runcmd-simple-symbol
    needs: 1
