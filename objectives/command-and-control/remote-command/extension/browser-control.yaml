# Browser-extension remote-command channel: a persistent WebSocket that drives
# chrome.debugger / CDP against arbitrary tabs. Full remote browser control —
# the extension-RAT pattern.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1219,T1059.007,T1185

traits:
  - id: extension-remote-dispatch-kind
    # Generic tasking marker used by extension RATs and AI browser agents that
    # accept remote "dispatch" commands over WS/native messaging.
    desc: Extension remote dispatch message kind
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\b(kind|type)\s*[:=]\s*["'']dispatch["'']'

  - id: extension-cdp-execute-command
    desc: Extension exposes CDP execute command
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bcdp[_-]?execute\b|["'']cdp_execute["'']'

composite_rules:
  - id: extension-websocket-cdp-backdoor
    desc: Extension WebSocket remotely drives CDP debugger
    crit: hostile
    conf: 0.97
    mbc: B0022
    scope: archive
    all:
      - id: micro-behaviors/communications/http/websocket::wss-scheme
      - id: micro-behaviors/process/attach/webextension::chrome-debugger-attach
      - id: micro-behaviors/process/attach/webextension::chrome-debugger-send-command
      - id: metadata/permission/manifest::host-permission-all-urls
    any:
      - id: extension-remote-dispatch-kind
      - id: extension-cdp-execute-command
      - id: metadata/permission/debugger::permission-debugger
    unless:
      - id: well-known/app/ibb8::ibb8-browser-extension-context
