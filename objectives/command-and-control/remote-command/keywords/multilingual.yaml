# Non-English remote-access-trojan slang. 远控 is the standard Chinese
# abbreviation of 远程控制 ("remote control") used in the RAT/operator scene; the
# full benign phrase is not abbreviated this way in legitimate remote-admin docs.
defaults:
  platforms: [unix, windows, android]
  for: [scripts, source, binaries, documents]
  crit: notable
  conf: 0.65
  attack: T1219
traits:
  - id: cn-rat-term
    desc: Chinese RAT/remote-control slang (远控)
    if:
      type: text
      substr: 远控
