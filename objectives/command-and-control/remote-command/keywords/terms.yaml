---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - scripts
  - source
traits:
- id: command-result-word
  desc: cmd/command/result vocabulary word
  crit: component
  conf: 0.4
  if:
    type: text
    regex: "(?i)\\b(cmd|command|result)\\b"
- id: command-dup
  desc: command keyword
  if:
    type: text
    substr: command
- id: pipe
  desc: pipe keyword
  if:
    type: text
    word: pipe
- id: output
  desc: output keyword
  if:
    type: text
    substr: output
- id: getlocalip-command
  desc: 'Bot command verb: GETLOCALIP'
  crit: component
  conf: 0.35
  for:
  - binaries
  if:
    type: text
    word: GETLOCALIP
    section: ".text"
- id: file-op-command-verbs
  desc: File-operation command verb cluster
  crit: component
  conf: 0.3
  for:
  - binaries
  count_min: 4
  if:
    type: text
    regex: "^(MOVE|COPY|DELETE|EXECUTE)$"
    section: ".rdata"
