---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - scripts
  - source
traits:
- id: command-result-word
  desc: Command/result vocabulary pair
  crit: component
  conf: 0.4
  for: [scripts, javascript, typescript, shell, rust, java, csharp, groovy, json]
  if:
    type: text
    regex: "(?i)\\b(cmd|command)\\b[\\s\\S]{0,200}\\bresult\\b|\\bresult\\b[\\s\\S]{0,200}\\b(cmd|command)\\b"
- id: command-dup
  desc: Command word for remote-command composites
  for: [shell]
  if:
    type: text
    word: command
- id: pipe
  desc: pipe keyword
  if:
    type: text
    word: pipe
- id: output
  desc: Output word for remote-command composites
  for: [javascript, typescript]
  count_min: 2
  if:
    type: text
    word: output
- id: getlocalip-command
  desc: 'Bot command verb: GETLOCALIP'
  crit: component
  conf: 0.35
  for:
  - binaries
  if:
    type: text
    word: GETLOCALIP
    section: ".text"
- id: file-op-command-verbs
  desc: File-operation command verb cluster
  crit: component
  conf: 0.3
  for:
  - binaries
  count_min: 4
  if:
    type: text
    regex: "^(MOVE|COPY|DELETE|EXECUTE)$"
    section: ".rdata"
