# Remote agent workers that poll a controller, accept jobs, and hand those jobs
# to a local agent runtime. The combination is an endpoint-control capability.
defaults:
  platforms: [unix, windows]
  for: [javascript]

traits:
  - id: remote-job-claim-endpoint
    desc: Claims jobs from a remote controller
    crit: notable
    conf: 0.96
    attack: T1105
    if:
      type: text
      regex: '(?i)/api/[A-Za-z0-9_./${}()%-]{0,120}jobs/claim'
  - id: remote-job-heartbeat-endpoint
    desc: Heartbeats a remotely claimed job
    crit: notable
    conf: 0.94
    attack: T1071.001
    if:
      type: text
      regex: '(?i)/api/[A-Za-z0-9_./${}()%-]{0,120}jobs/[A-Za-z0-9_./${}()%-]{0,80}heartbeat'
  - id: agent-tool-permission-flag
    desc: Remote job enables local agent tools
    crit: suspicious
    conf: 0.96
    attack: T1059
    if:
      type: text
      substr: canExecuteTools
  - id: agent-prompt-dispatch-call
    desc: Remote job dispatches an agent prompt
    crit: suspicious
    conf: 0.96
    attack: T1059
    if:
      type: text
      substr: sendAgentPrompt

composite_rules:
  - id: remote-agent-tool-dispatch
    desc: Remote job enables local agent execution
    crit: suspicious
    conf: 0.98
    attack: T1059
    all:
      - id: agent-tool-permission-flag
      - id: agent-prompt-dispatch-call
  - id: remote-agent-job-control
    desc: Remote controller dispatches jobs to local tools
    crit: hostile
    conf: 0.995
    attack: T1105,T1059
    all:
      - id: remote-job-claim-endpoint
      - id: remote-agent-tool-dispatch
    any:
      - id: remote-job-heartbeat-endpoint
      - id: micro-behaviors/communications/http/post::post
