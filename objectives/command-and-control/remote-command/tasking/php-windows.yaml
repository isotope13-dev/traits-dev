defaults:
  platforms: [windows]
  for: [php]
  attack: T1059
  mbc: B0030

traits:
  - id: php-api-v1-beacon-path
    desc: PHP API v1 beacon path
    crit: component
    conf: 0.92
    if:
      type: literal
      substr: /api/v1/beacon

  - id: php-api-v1-report-path
    desc: PHP API v1 report path
    crit: component
    conf: 0.92
    if:
      type: literal
      substr: /api/v1/report

  - id: php-command-result-payload
    desc: PHP command result payload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'command_id[\s\S]{0,120}base64_encode\(\$output\)'

  - id: php-remote-command-exec-loop
    desc: PHP remote command exec loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\$cmdStr[\s\S]{0,260}exec\(\$cmdStr'

composite_rules:
  - id: php-http-command-tasking-windows
    desc: PHP HTTP command tasking
    crit: hostile
    conf: 0.98
    all:
      - id: php-api-v1-beacon-path
      - id: objectives/command-and-control/remote-command/control::php-api-v1-exec-path
      - id: php-command-result-payload
      - id: php-remote-command-exec-loop
    any:
      - id: php-api-v1-report-path
      - id: micro-behaviors/communications/http/post::php-stream-context-post
