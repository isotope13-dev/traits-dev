defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1059
  mbc: B0030

traits:
  - id: start-conversation-v2-event
    desc: Start conversation v2 event
    crit: component
    conf: 0.9
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    if:
      type: literal
      exact: StartConversationV2

  - id: run-prompt-v2-event
    desc: Run prompt v2 event
    crit: component
    conf: 0.9
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    if:
      type: literal
      exact: RunPromptV2

  - id: remote-host-admin-verbs
    desc: Remote host administration verbs
    crit: suspicious
    conf: 0.94
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    if:
      type: literal
      regex: '^(UpdateHost|RecycleHost|RequestLogs)$'
    count_min: 2

  - id: remote-model-management-verbs
    desc: Remote model management verbs
    crit: suspicious
    conf: 0.94
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    if:
      type: literal
      regex: '^(PinModel|UnpinModel|InstallModel|RemoveModel)$'
    count_min: 3

  - id: remote-llm-token-return
    desc: Remote LLM token return
    crit: notable
    conf: 0.88
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    if:
      type: literal
      exact: EmitToken

composite_rules:
  - id: remote-llm-prompt-dispatch
    desc: Remote LLM prompt dispatch
    crit: suspicious
    conf: 0.92
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    all:
      - id: start-conversation-v2-event
      - id: run-prompt-v2-event

  - id: remote-llm-host-tasking
    desc: Remote LLM host tasking
    crit: hostile
    conf: 0.97
    ref: sha256:3f2651fb0b5bf7b4a9991637f2b3ef6cf01101803747f84b87bbe6f5891c571c
    all:
      - id: micro-behaviors/communications/websocket/signalr::microsoft-signalr-client-import
      - id: remote-llm-prompt-dispatch
      - id: remote-host-admin-verbs
      - id: remote-model-management-verbs
    any:
      - id: remote-llm-token-return
      - id: micro-behaviors/communications/websocket/signalr::signalr-hub-connection-builder
