defaults:
  platforms: [windows]
  for: [scripts, binaries, csharp]
  attack: T1105
  mbc: B0030

traits:
  - id: rat-ad-user-discovery-command
    desc: RAT AD user discovery command
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(ad_users|ad_user|local_users)\b'
  - id: rat-ad-session-discovery-command
    desc: RAT AD session discovery command
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(user_logons|dc_logons|enum_sessions)\b'
  - id: rat-ad-object-discovery-command
    desc: RAT AD object discovery command
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(enum_spns|enum_gpo|enum_shares)\b'
  - id: rat-network-scan-command
    desc: RAT network scanning command
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '\b(netscan|smbscan)\b'
  - id: rat-kerberos-roast-command
    desc: RAT Kerberos roasting command
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(kerberoast|asrep_roast|kerbrenew)\b'
  - id: rat-kerberos-ticket-command
    desc: RAT Kerberos ticket command
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(asktgt|asktgs|golden_ticket|silver_ticket)\b'
  - id: rat-domain-abuse-command
    desc: RAT domain abuse command
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(dcsync|rbcd)\b'
  - id: rat-process-injection-command
    desc: RAT process injection command
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(process_hollow|apc_inject)\b'
  - id: rat-process-spoof-command
    desc: RAT process spoofing command
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(ppid_spoof|pe_stomp)\b'
  - id: rat-anti-av-patch-command
    desc: RAT anti-AV patch command
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\b(amsi_bypass|etw_patch)\b'
  - id: rat-screen-capture-command
    desc: RAT screen capture command
    crit: component
    conf: 0.86
    # snake_case RAT command names only — bare "screenshot" is camelCase test
    # tooling (Cypress) vocabulary; the command-vocab bag still carries that word.
    if:
      type: text
      regex: '\b(screen_cap|screen_capture|screen_record|record_screen)\b'
  - id: rat-live-stream-command
    desc: RAT live stream command
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(stream_start|stream_stop)\b'
  - id: rat-camera-capture-command
    desc: RAT camera capture command
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(cam_start|cam_stop|webcam_snap)\b'
  - id: rat-input-capture-command
    desc: RAT input capture command
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(keylog|keylog_start|clipboard_get)\b'
  - id: rat-microphone-record-command
    desc: RAT microphone recording command
    crit: component
    conf: 0.86
    if:
      type: text
      word: mic_record
  - id: rat-lateral-admin-command
    desc: RAT lateral admin command
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\b(psexec|wmiexec|winrmexec|smb_exec)\b'
  - id: rat-agent-deploy-command
    desc: RAT agent deployment command
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '\b(deploy_agent|copy_admin_share)\b'
  - id: rat-interactive-shell-command
    desc: RAT interactive shell command
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '\b(shell_start|shell_input|shell_stop)\b'
  - id: rat-operator-disruption-command
    desc: RAT operator disruption command
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '\b(input_lock|blackout)\b'
  - id: rat-tunnel-control-command
    desc: RAT tunnel control command
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '\b(wireguard_start|wireguard_stop|AgentRelayManager)\b'

composite_rules:
  - id: rat-ad-discovery-command
    desc: RAT Active Directory discovery command
    crit: component
    conf: 0.86
    needs: 2
    any:
      - id: rat-ad-user-discovery-command
      - id: rat-ad-session-discovery-command
      - id: rat-ad-object-discovery-command
      - id: rat-network-scan-command
  - id: rat-kerberos-attack-command
    desc: RAT Kerberos attack command
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: rat-kerberos-roast-command
      - id: rat-kerberos-ticket-command
      - id: rat-domain-abuse-command
  - id: rat-process-evasion-command
    desc: RAT process evasion command
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: rat-process-injection-command
      - id: rat-process-spoof-command
      - id: rat-anti-av-patch-command
  - id: rat-surveillance-command
    desc: RAT surveillance operator command
    crit: component
    conf: 0.86
    needs: 2
    any:
      - id: rat-screen-capture-command
      - id: rat-live-stream-command
      - id: rat-camera-capture-command
      - id: rat-input-capture-command
      - id: rat-microphone-record-command
  - id: rat-lateral-deploy-command
    desc: RAT lateral deployment command
    crit: component
    conf: 0.88
    any:
      - id: rat-lateral-admin-command
      - id: rat-agent-deploy-command
  - id: rat-operator-control-command
    desc: RAT operator control command
    crit: component
    conf: 0.84
    needs: 2
    any:
      - id: rat-interactive-shell-command
      - id: rat-operator-disruption-command
      - id: rat-tunnel-control-command
  - id: windows-rat-broad-tasking-vocabulary
    desc: Windows RAT tasking vocabulary
    crit: suspicious
    conf: 0.94
    needs: 3
    any:
      - id: rat-ad-discovery-command
      - id: rat-kerberos-attack-command
      - id: rat-process-evasion-command
      - id: rat-surveillance-command
      - id: rat-lateral-deploy-command
      - id: rat-operator-control-command
  - id: windows-rat-domain-takeover-tasking
    desc: Windows RAT domain takeover tasking
    crit: hostile
    conf: 0.98
    all:
      - id: rat-ad-discovery-command
      - id: rat-kerberos-attack-command
    any:
      - id: rat-lateral-deploy-command
      - id: rat-process-evasion-command
      - id: rat-surveillance-command
