defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

composite_rules:
  - id: node-pty-network-control
    desc: Node PTY exposed over network channel
    crit: suspicious
    conf: 0.9
    attack: T1059.007
    all:
      - id: micro-behaviors/process/tty/pty/
    any:
      - id: micro-behaviors/communications/socket/connect::net-socket-connect-method
      - id: micro-behaviors/communications/socket/connect::socket-connect-dup-node
      - id: micro-behaviors/communications/http/websocket::websocket-class
    unless:
      - id: well-known/app/codeplane/
      - id: well-known/lib/opentui/
      - id: well-known/app/qwen-code::qwen-code-bundle-text
