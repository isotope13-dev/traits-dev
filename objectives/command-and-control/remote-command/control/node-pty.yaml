defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

composite_rules:
  - id: node-pty-websocket-input-control
    desc: WebSocket input reaches Node PTY
    crit: suspicious
    conf: 0.9
    attack: T1059.007
    all:
      - id: micro-behaviors/process/tty/pty::node-pty-usage
      - id: objectives/command-and-control/backdoor/shell/pty::websocket-pty-input-write
    any:
      - id: micro-behaviors/communications/http/websocket::websocket-constructor-call
      - id: micro-behaviors/communications/http/websocket::websocket-class
    unless:
      - id: well-known/tool/offensive/pentestkit/
      - id: well-known/app/codeplane/
      - id: well-known/lib/opentui/
      - id: well-known/app/qwen-code::qwen-code-bundle-text
      - id: well-known/app/codeam-cli::codeam-cli-benign-remote-agent
      # ADHDev local-dashboard daemon: a 127.0.0.1-bound, Bearer-auth-gated web
      # terminal, not a reverse shell.
      - id: well-known/app/adhdev::adhdev-daemon-package
