defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.007,T1071.001

composite_rules:
  - id: http-relay-remote-terminal-command
    desc: HTTP relay injects commands into a local PTY
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: objectives/command-and-control/backdoor/shell/pty::http-command-relay-pending-stream
      - id: micro-behaviors/process/tty/pty::node-terminal-write-parsed-data
      - id: micro-behaviors/process/tty/pty::node-pty-module-ref
    unless:
      - id: well-known/app/codeam-cli::codeam-cli-benign-remote-agent
