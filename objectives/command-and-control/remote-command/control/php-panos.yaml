defaults:
  platforms: [windows, unix, appliance]
  for: [php]
  attack: T1059

traits:
  - id: php-api-v1-exec-path
    desc: PHP API v1 exec path
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /api/v1/exec

  - id: php-action-exec-body
    desc: PHP action exec body
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "'action'    => 'exec'"

composite_rules:
  - id: php-api-exec-request
    desc: PHP API exec request
    crit: hostile
    conf: 0.98
    all:
      - id: php-api-v1-exec-path
      - id: php-action-exec-body
