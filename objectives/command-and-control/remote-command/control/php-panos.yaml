defaults:
  platforms: [panos, appliance, unix]
  for: [php]
  attack: T1059

traits:
  - id: php-panos-exec-api-path
    desc: PHP PAN-OS exec API path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/exec

  - id: php-panos-exec-command-body
    desc: PHP PAN-OS exec command body
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "'action'    => 'exec'"

composite_rules:
  - id: php-panos-exec-api-request
    desc: PHP PAN-OS exec API request
    crit: hostile
    conf: 0.98
    all:
      - id: php-panos-exec-api-path
      - id: php-panos-exec-command-body
