defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1059.007
  mbc: B0022

traits:
  - id: socketio-command-event
    desc: Socket.io command event handler
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\.on\(\s*[''"]command[''"]'

  - id: socketio-command-event-name
    desc: Socket.io command event name
    crit: component
    conf: 0.82
    if:
      type: string_literal
      exact: command

  - id: socketio-terminal-events
    desc: Socket.io terminal control events
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: string_literal
      regex: '^(start-terminal|terminal-input|terminal-output|terminal-resize)$'

  - id: socketio-mouse-events
    desc: Socket.io mouse control events
    crit: component
    conf: 0.92
    count_min: 2
    if:
      type: string_literal
      regex: '^(mouseMove|mouseClick|mouseScroll)$'

  - id: socketio-keyboard-events
    desc: Socket.io keyboard control events
    crit: component
    conf: 0.92
    count_min: 2
    if:
      type: string_literal
      regex: '^(keyTap|keyCombo|pressKey|releaseKey)$'

  - id: socketio-clipboard-events
    desc: Socket.io clipboard control events
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: string_literal
      regex: '^(copyClipboard|pasteText)$'

  - id: socketio-capture-event
    desc: Socket.io screenshot capture event
    crit: component
    conf: 0.86
    if:
      type: string_literal
      exact: capture

  - id: socketio-ssh-io-events
    desc: Socket.io SSH IO events
    crit: component
    conf: 0.9
    count_min: 2
    if:
      type: string_literal
      regex: '^(start_ssh|ssh_input|ssh_output)$'

  - id: socketio-ssh-status-events
    desc: Socket.io SSH status events
    crit: component
    conf: 0.86
    if:
      type: string_literal
      regex: '^(ssh_connected|ssh_disconnected)$'

composite_rules:
  - id: node-socketio-remote-command-execution
    desc: Node socket.io remote command execution
    crit: hostile
    conf: 0.97
    all:
      - id: socketio-remote-channel-context
      - id: socketio-command-channel
    any:
      - id: micro-behaviors/process/create/shell/bridge::js-exec
      - id: micro-behaviors/process/create/shell/bridge::child-process-exec
      - id: micro-behaviors/process/create/shell/bridge::child-process-require
      - id: micro-behaviors/process/create/spawn/

  - id: node-socketio-remote-control-rat
    desc: Node socket.io remote control RAT
    crit: hostile
    conf: 0.98
    all:
      - id: socketio-remote-channel-context
      - id: socketio-terminal-events
    needs: 2
    any:
      - id: node-socketio-remote-command-execution
      - id: socketio-remote-input-events
      - id: socketio-ssh-terminal-events
      - id: micro-behaviors/process/tty/pty::node-pty-module-ref

  - id: socketio-command-channel
    desc: Socket.io command channel
    crit: component
    conf: 0.88
    any:
      - id: socketio-command-event
      - id: socketio-command-event-name

  - id: socketio-remote-channel-context
    desc: Socket.io remote channel context
    crit: component
    conf: 0.9
    any:
      - id: objectives/command-and-control/channel/websocket::socketio-c2-pattern
      - id: objectives/command-and-control/channel/websocket::socketio-reconnect-attempts
      - id: objectives/command-and-control/channel/websocket::npm-install-socketio
      - id: socketio-terminal-events

  - id: socketio-remote-input-events
    desc: Socket.io remote input controls
    crit: component
    conf: 0.9
    needs: 2
    any:
      - id: socketio-mouse-events
      - id: socketio-keyboard-events
      - id: socketio-clipboard-events
      - id: socketio-capture-event

  - id: socketio-ssh-terminal-events
    desc: Socket.io SSH terminal controls
    crit: component
    conf: 0.9
    any:
      - id: socketio-ssh-io-events
      - id: socketio-ssh-status-events
