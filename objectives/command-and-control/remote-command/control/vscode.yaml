defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1219

traits:
  - id: ide-command-stream-endpoint
    desc: Remote IDE command stream endpoint
    crit: component
    conf: 0.95
    if:
      type: literal
      exact: /api/commands/pending/stream

  - id: remote-terminal-write-action
    desc: Remote terminal input action
    crit: component
    conf: 0.92
    if:
      type: literal
      exact: terminal_write

  - id: remote-git-push-action
    desc: Remote Git push action
    crit: component
    conf: 0.92
    if:
      type: literal
      exact: git_push

composite_rules:
  - id: remote-ide-privileged-control
    desc: Remote IDE control with privileged actions
    crit: suspicious
    conf: 0.96
    all:
      - id: ide-command-stream-endpoint
    any:
      - id: micro-behaviors/fs/file/read-write::agent-write-file-tool
      - id: remote-terminal-write-action
      - id: remote-git-push-action
    needs: 2
    unless:
      - id: well-known/app/codeam-cli::codeam-cli-benign-remote-agent
