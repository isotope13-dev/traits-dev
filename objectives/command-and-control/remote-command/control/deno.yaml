defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1059.007
  mbc: B0022

traits:
  - id: deno-cmd-shell-argument
    desc: Deno command uses cmd shell
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'Deno\.Command\s*\(\s*["'']cmd["''][\s\S]{0,180}["'']/c["'']'
  - id: command-json-field
    desc: Command JSON field
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\bbody\.command\b|(["'']command["'']|\bcommand)\s*:'

composite_rules:
  - id: deno-http-command-endpoint
    desc: Deno HTTP command execution endpoint
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/server/listener::deno-serve-call
      - id: micro-behaviors/process/create/direct::deno-command-call
      - id: deno-cmd-shell-argument
    any:
      - id: micro-behaviors/communications/http/endpoints::exec-path
      - id: command-json-field
  - id: deno-posts-command-tasking
    desc: Deno posts command tasking
    crit: suspicious
    conf: 0.92
    unless:
      - id: well-known/app/remotepower::documented-rmm-release-context
    all:
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: command-json-field
    any:
      - id: micro-behaviors/communications/http/endpoints::exec-path
      - id: objectives/persistence/login/registry/autostart::reg-add-run
  - id: deno-websocket-rat-controller
    desc: Deno WebSocket RAT controller
    crit: hostile
    conf: 0.97
    all:
      - id: deno-posts-command-tasking
      - id: micro-behaviors/communications/http/websocket::websocket
    any:
      - id: micro-behaviors/process/create/hidden::conhost-headless
      - id: objectives/persistence/login/registry/autostart::reg-add-run
