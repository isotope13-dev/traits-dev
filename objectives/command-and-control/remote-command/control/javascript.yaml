defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  attack: T1059.007
traits:
  - id: eval-response-data
    desc: eval() of response data property
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'eval\(\s*(resp(onse)?|reply|xhr|request)\.data\s*\)'
  - id: eval-http-response-data-bracket
    desc: eval() of bracketed response data
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: "eval(g['data']"
  - id: eval-response-body
    desc: eval() of response body variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'eval\(\w+\.body\)'
composite_rules:
  - id: js-c2-response-eval
    desc: Remote code execution via eval of HTTP response (JS C2 callback)
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/request/client::http-client-usage
    any:
      - id: eval-response-data
      - id: eval-http-response-data-bracket
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
