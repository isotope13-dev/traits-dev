defaults:
  platforms: [linux, macos, windows]
  for: [go]
  attack: T1059
  mbc: B0022

traits:
- id: agent-job-status-enum
  desc: Agent job status state constants
  crit: component
  conf: 0.75
  count_min: 3
  if:
    type: text
    regex: '\bJobStatus(Pending|Running|Completed|Failed)\b'

- id: agent-job-target-field
  desc: Agent job target field
  crit: component
  conf: 0.6
  if:
    type: text
    word: AgentTag

- id: agent-job-exec-modules
  desc: Agent job command modules
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '"exec_(cmd|shell)"'

- id: agent-job-cbor-schema-fields--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 8
  if:
    type: text
    regex: 'cbor:"(1|2),keyasint"'

  count_max: 1017150
- id: agent-job-cbor-schema-fields--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 8
  if:
    type: text
    regex: 'cbor:"(3|4),keyasint"'

  count_max: 1017151
- id: agent-job-cbor-schema-fields--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 8
  if:
    type: text
    regex: 'cbor:"(5|6),keyasint"'

  count_max: 1017152
- id: agent-job-cbor-schema-fields--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 8
  if:
    type: text
    regex: 'cbor:"(7|8),keyasint"'

  count_max: 1017153
- id: agent-job-cbor-schema-fields--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 8
  if:
    type: text
    regex: 'cbor:"(9|10),keyasint"'

  count_max: 1017154
- id: agent-job-output-paths
  desc: Agent job output log paths
  crit: component
  conf: 0.65
  if:
    type: text
    regex: '\bOutputPaths\b.{0,80}\bjobs/'

- id: agent-job-operator-task-examples
  desc: Agent job operator task examples
  crit: component
  conf: 0.7
  count_min: 2
  if:
    type: text
    regex: '"(nmap scan|interactive shell|get root)"'

composite_rules:
- id: go-cbor-agent-job-remote-command
  desc: Go CBOR agent remote command jobs
  crit: suspicious
  conf: 0.93
  near_lines: 40
  all:
  - id: micro-behaviors/data/serialize/cbor::keyasint-tag
  - id: agent-job-cbor-schema-fields
  - id: agent-job-status-enum
  - id: agent-job-target-field
  - id: agent-job-exec-modules
  - id: agent-job-output-paths

- id: go-agent-operator-command-tasking
  desc: Go agent operator command tasking
  crit: suspicious
  conf: 0.9
  near_lines: 40
  all:
  - id: agent-job-status-enum
  - id: agent-job-target-field
  - id: agent-job-exec-modules
  - id: agent-job-operator-task-examples
- id: agent-job-cbor-schema-fields
  desc: Agent job CBOR integer schema
  crit: component
  conf: 0.85
  any:
  - id: agent-job-cbor-schema-fields--rx-1
  - id: agent-job-cbor-schema-fields--rx-2
  - id: agent-job-cbor-schema-fields--rx-3
  - id: agent-job-cbor-schema-fields--rx-4
  - id: agent-job-cbor-schema-fields--rx-5
