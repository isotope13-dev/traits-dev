defaults:
  platforms: [windows]
  for: [pe]
  attack: T1059
  mbc: B0022

traits:
  - id: go-websocket-fragment
    desc: Go WebSocket string fragment
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '\bwebsocket[A-Z]?\b'

  - id: webrat-go-module
    desc: WebRAT Go module path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: webrat-go-api

composite_rules:
  - id: go-webrat-remote-command-execution
    desc: Go WebRAT remote command execution
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
      - id: webrat-go-module

  - id: go-websocket-rat-remote-control
    desc: Go WebSocket RAT remote control
    crit: hostile
    conf: 0.96
    all:
      - id: go-websocket-fragment
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
    needs: 2
    any:
      - id: objectives/collection/monitor/capture::go-rat-remote-desktop-control
      - id: objectives/collection/monitor/capture::go-rat-webcam-microphone-capture
      - id: objectives/collection/keylog/capture::go-rat-keylogging
      - id: micro-behaviors/os/clipboard/access::go-clipboard-with-process-exec
      - id: objectives/impact/ui/manipulation::windows-prankware-ui-disruption
      - id: webrat-go-module

  - id: go-webrat-websocket-backdoor
    desc: Go WebRAT WebSocket backdoor
    crit: hostile
    conf: 0.97
    all:
      - id: webrat-go-module
      - id: micro-behaviors/communications/websocket/library::gorilla-websocket
    any:
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
      - id: objectives/credential-access/cloud/token/files::go-func-steal-tokens
