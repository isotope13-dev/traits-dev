defaults:
  platforms: [linux, macos, windows]
  for: [elf, macho, pe, go]
  attack: T1059.004
traits:
  - id: large-binary-https-ip-port-endpoint
    desc: Large binary HTTPS IP endpoint
    crit: component
    conf: 0.9
    for: [elf, macho, pe]
    size_min: 1048576
    size_max: 83886080
    if:
      type: text
      regex: 'https://([0-9]{1,3}\.){3}[0-9]{1,3}:[1-9][0-9]{1,4}'
      is: external_ip
    not:
      - regex: 'https://8\.8\.[84]\.[84]:'
      - regex: 'https://1\.1\.1\.1:'
      - regex: 'https://9\.9\.9\.9:'
      - regex: 'https://169\.254\.169\.254:'
composite_rules:
  - id: go-binary-identity
    desc: Go binary identity
    crit: component
    conf: 0.95
    any:
      - id: metadata/lang/compiler/systems::go-binary
      - id: metadata/lang/compiler/systems::go-binary-macho
      - id: metadata/lang/compiler/systems::go-binary-comp
      - id: metadata/lang/compiler/systems::go-buildinfo
      - id: metadata/lang/compiler/systems::go-pe-symtab
  - id: go-garbled-remote-tasking-capability
    desc: Garbled Go remote tasking capability
    crit: component
    conf: 0.94
    any:
      - id: objectives/anti-static/obfuscation/tools/garble/
      - id: objectives/impact/dos/attack::go-ddos-indicators
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
      - id: go-ssh-server-command-channel
    needs: 2
  - id: go-ssh-server-command-channel
    desc: Go SSH server command channel
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/ssh/server::go-ssh-server-implementation
    any:
      - id: micro-behaviors/process/tty/pty::pty-open-call
      - id: micro-behaviors/fs/path/device/terminal::dev-ptmx
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
      - id: micro-behaviors/process/tty/pty::winpty-bundled-console
      - id: micro-behaviors/process/create/shell/lang::stdin-pipe
      - id: micro-behaviors/process/create/shell/lang::stdout-pipe
      - id: micro-behaviors/process/create/shell/lang::stderr-pipe
      - id: micro-behaviors/communications/proxy/tunnel::go-tunnel-forwarding
      - id: micro-behaviors/communications/proxy/tunnel::go-reverse-socks-tunnel-help
    needs: 2
  - id: go-ssh-sftp-admin-channel
    desc: Go SSH SFTP admin channel
    crit: suspicious
    conf: 0.9
    all:
      - id: go-ssh-server-command-channel
      - id: micro-behaviors/communications/ssh/server::go-sftp-server-support
    any:
      - id: micro-behaviors/process/tty/pty::pty-open-call
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
      - id: micro-behaviors/communications/proxy/tunnel::go-tunnel-forwarding
      - id: micro-behaviors/communications/proxy/tunnel::go-reverse-socks-tunnel-help
  - id: hidden-config-ssh-backdoor
    desc: Hidden config SSH backdoor
    crit: hostile
    conf: 0.96
    all:
      - id: objectives/command-and-control/infrastructure/config::hidden-encrypted-runtime-config
      - id: go-ssh-server-command-channel
    any:
      - id: micro-behaviors/communications/proxy/tunnel::go-reverse-socks-tunnel-help
      - id: micro-behaviors/communications/proxy/tunnel::go-tunnel-forwarding
      - id: micro-behaviors/communications/proxy/tunnel::go-socks-websocket-bridge
      - id: micro-behaviors/communications/ssh/server::go-sftp-server-support
  - id: go-ssh-pam-command-backdoor
    desc: Go SSH PAM command backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: go-ssh-server-command-channel
      - id: micro-behaviors/communications/ssh/server::permissive-go-ssh-server-auth
      - id: micro-behaviors/os/pam/auth::client-comp
    any:
      - id: micro-behaviors/process/tty/pty::pty-open-call
      - id: micro-behaviors/fs/path/device/terminal::dev-ptmx
      - id: micro-behaviors/process/create/shell/lang::stdin-pipe
      - id: micro-behaviors/process/create/shell/lang::stdout-pipe
      - id: micro-behaviors/process/create/shell/lang::stderr-pipe
  - id: go-garbled-ssh-c2-backdoor
    desc: Garbled Go SSH C2 backdoor
    crit: hostile
    conf: 0.98
    for: [elf, macho, pe]
    scope: leaf
    all:
      - id: go-binary-identity
      - id: large-binary-https-ip-port-endpoint
      - id: micro-behaviors/communications/ssh/server::permissive-go-ssh-server-auth
      - id: go-garbled-remote-tasking-capability
  - id: go-ssh-exec-c2-backdoor
    desc: Go SSH exec C2 backdoor
    crit: hostile
    conf: 0.97
    for: [elf, macho, pe]
    scope: leaf
    all:
      - id: go-binary-identity
      - id: large-binary-https-ip-port-endpoint
      - id: micro-behaviors/communications/ssh/server::permissive-go-ssh-server-auth
      - id: micro-behaviors/process/create/system::go-os-exec-pclntab
  - id: go-ssh-ddos-c2-bot
    desc: Go SSH DDoS C2 bot
    crit: hostile
    conf: 0.97
    for: [elf, macho, pe]
    scope: leaf
    all:
      - id: go-binary-identity
      - id: large-binary-https-ip-port-endpoint
      - id: micro-behaviors/communications/ssh/server::permissive-go-ssh-server-auth
      - id: objectives/impact/dos/attack::go-ddos-indicators
  - id: go-garbled-ddos-c2-bot
    desc: Garbled Go DDoS C2 bot
    crit: hostile
    conf: 0.97
    for: [elf, macho, pe]
    scope: leaf
    all:
      - id: go-binary-identity
      - id: large-binary-https-ip-port-endpoint
      - id: objectives/anti-static/obfuscation/tools/garble/
      - id: objectives/impact/dos/attack::go-ddos-indicators
