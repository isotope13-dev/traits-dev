defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1059.006
traits:
  - id: python-run-command-tool-name
    desc: Defines run_command function
    crit: component
    conf: 0.9
    if:
      type: symbol
      kind: function
      exact: run_command
  - id: python-arbitrary-command-description
    desc: Describes arbitrary command execution
    crit: component
    conf: 0.9
    if:
      type: string_literal
      regex: '执行任意系统命令|arbitrary\s+(system\s+)?command'
      case_insensitive: true
composite_rules:
  - id: python-mcp-run-command-tool
    desc: Python MCP exposes run_command tool
    crit: notable
    conf: 0.96
    all:
      - id: micro-behaviors/communications/ipc/mcp::fastmcp-import
      - id: micro-behaviors/communications/ipc/mcp::python-tool-decorator
      - id: python-run-command-tool-name
    any:
      - id: python-arbitrary-command-description
      - id: micro-behaviors/process/create/subprocess::variable-command-shell-true
    unless:
      - id: metadata/package/testing/presence/harness::test-fixture-directory-name

  - id: python-mcp-interpreter-tool
    desc: Python MCP tool executes supplied Python code
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/communications/ipc/mcp::fastmcp-import
      - id: micro-behaviors/communications/ipc/mcp::python-tool-decorator
      - id: micro-behaviors/process/create/subprocess::python-interpreter-code-argument
    unless:
      - id: metadata/package/testing/presence/harness::test-fixture-directory-name

  - id: python-mcp-file-interpreter-tool
    desc: Python MCP tool executes a caller-supplied Python file
    # A caller-controlled file passed to a Python interpreter is a distinct
    # remote code-execution surface from inline `python -c` evaluation.
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/communications/ipc/mcp::fastmcp-import
      - id: micro-behaviors/communications/ipc/mcp::python-tool-decorator
      - id: micro-behaviors/process/create/subprocess::python-interpreter-file-argument
    unless:
      - id: metadata/package/testing/presence/harness::test-fixture-directory-name
  - id: python-mcp-shell-command-execution
    desc: Python MCP tool executes shell commands
    crit: suspicious
    conf: 0.98
    all:
      - id: python-mcp-run-command-tool
      - id: micro-behaviors/process/create/subprocess::shell-true
    any:
      - id: micro-behaviors/process/create/subprocess::asyncio-create-subprocess-exec
      - id: micro-behaviors/process/create/subprocess::run-content
      - id: micro-behaviors/process/create/subprocess::popen-content
      - id: micro-behaviors/communications/ipc/mcp::fastmcp-stdio-transport
    unless:
      - id: metadata/package/testing/presence/harness::test-fixture-directory-name
      # Prefer the more-specific cwd-parameter composite when both apply;
      # they describe the same MCP shell surface, not two independent risks.
      - id: python-mcp-cwd-shell-execution
  - id: python-mcp-cwd-shell-execution
    desc: MCP shell tool with caller-controlled cwd
    # FastMCP + shell=True + cwd is the standard shape of a disclosed agent shell
    # MCP server (Claude Desktop, Cursor tools, amanda-IA, etc.), not C2 intent.
    crit: notable
    conf: 0.99
    all:
      - id: micro-behaviors/communications/ipc/mcp::fastmcp-import
      - id: micro-behaviors/communications/ipc/mcp::python-tool-decorator
      - id: micro-behaviors/process/create/subprocess::shell-true
      - id: micro-behaviors/process/create/subprocess::run-ast
      - id: micro-behaviors/process/create/subprocess::python-command-and-cwd-parameters
