defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1059.006
  mbc: B0030

traits:
  - id: python-code-host-admin-header
    desc: References X-Admin-Token header
    crit: component
    conf: 0.95
    if:
      type: literal
      exact: X-Admin-Token

composite_rules:
  - id: python-remote-code-host-admin-update
    desc: Python updates remotely hosted executable code
    crit: hostile
    conf: 0.99
    near_bytes: 8000
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-put
      - id: python-code-host-admin-header
      - id: micro-behaviors/data/serialize/json::mapping-get-code-key
      - id: micro-behaviors/process/interpreter/python::exec-builtin
