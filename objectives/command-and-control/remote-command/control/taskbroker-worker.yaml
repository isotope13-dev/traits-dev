defaults:
  platforms: [windows]
  for: [pe]
  attack: T1059

traits:
  - id: remote-terminal-activate-method
    desc: Remote terminal activation method
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: ".TerminalActivate"

  - id: remote-terminal-input-method
    desc: Remote terminal input method
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: ".TerminalInput"

  - id: remote-terminal-output-method
    desc: Remote terminal output method
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: ".TerminalOutput"

  - id: remote-terminal-close-method
    desc: Remote terminal close method
    crit: notable
    conf: 0.97
    if:
      type: text
      substr: ".TerminalClose"

  - id: local-terminal-runner
    desc: Local terminal runner
    crit: notable
    conf: 0.96
    if:
      type: text
      substr: ".RunTerminal"

  - id: remote-terminal-http-route
    desc: Remote terminal HTTP route
    crit: notable
    conf: 0.98
    if:
      type: text
      substr: "/api/v1/workers/terminal/"

composite_rules:
  - id: remote-interactive-terminal-control
    desc: Remote interactive terminal control
    crit: hostile
    conf: 0.99
    all:
      - id: remote-terminal-activate-method
      - id: remote-terminal-input-method
      - id: remote-terminal-output-method
      - id: remote-terminal-close-method
      - id: local-terminal-runner
      - id: remote-terminal-http-route
