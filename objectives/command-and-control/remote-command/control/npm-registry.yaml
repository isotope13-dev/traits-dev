defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.004

composite_rules:
  - id: npm-dist-tag-shell-tasking
    desc: npm distribution tags deliver shell commands
    crit: hostile
    conf: 0.995
    all:
      - id: micro-behaviors/communications/http/services/registry::npm-registry-package-request
      - id: micro-behaviors/communications/http/services/registry::npm-dist-tags-read
      - id: micro-behaviors/data/decode/base64::buffer-from-base64-to-utf8
      - id: micro-behaviors/process/create/shell/bridge::js-spawnsync-bash-command
