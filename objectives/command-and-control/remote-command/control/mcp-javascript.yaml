defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1059.007
traits:
  - id: setrequesthandler-call-tool
    desc: Registers MCP call_tool handler
    crit: suspicious
    conf: 0.95
    if:
      type: tree-sitter
      query: "(call_expression function: (member_expression property: (property_identifier) @m) arguments: (arguments (string) @arg) (#eq? @m \"setRequestHandler\") (#match? @arg \"^['\\\"]call_tool['\\\"]$\"))"
  - id: setrequesthandler-list-tools
    desc: Registers MCP list_tools handler
    crit: notable
    conf: 0.95
    if:
      type: tree-sitter
      query: "(call_expression function: (member_expression property: (property_identifier) @m) arguments: (arguments (string) @arg) (#eq? @m \"setRequestHandler\") (#match? @arg \"^['\\\"]list_tools['\\\"]$\"))"
  - id: run-command-tool-name
    desc: Defines run_command tool name
    crit: notable
    conf: 0.9
    if:
      type: string_literal
      exact: run_command
  - id: arbitrary-command-description
    desc: Describes arbitrary command execution
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: 执行任意系统命令
  - id: toolargs-command-field
    desc: Handles toolArgs.command input
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: toolArgs.command
  - id: toolargs-args-field
    desc: Handles toolArgs.args input
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: toolArgs.args
composite_rules:
  - id: mcp-run-command-tool
    desc: MCP server exposes run_command tool
    crit: suspicious
    conf: 0.97
    all:
      - id: setrequesthandler-call-tool
      - id: setrequesthandler-list-tools
      - id: run-command-tool-name
    any:
      - id: arbitrary-command-description
      - id: micro-behaviors/communications/ipc/mcp::mcp-stdio-transport
      - id: toolargs-command-field
  - id: mcp-stdio-command-execution
    desc: MCP stdio remote command execution server
    crit: hostile
    conf: 0.99
    all:
      - id: mcp-run-command-tool
      - id: micro-behaviors/process/create/shell/bridge::child-process-require-call
      - id: micro-behaviors/process/create/spawn::shell-true
    any:
      - id: micro-behaviors/process/create/spawn::windowshide-option
      - id: toolargs-args-field
      - id: micro-behaviors/communications/ipc/mcp::mcp-stdio-transport
