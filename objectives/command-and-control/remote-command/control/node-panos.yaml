defaults:
  platforms: [panos, appliance, unix]
  for: [javascript, typescript]
  attack: T1059

traits:
  - id: panos-node-result-upload
    desc: PAN-OS Node result upload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/api/v1/(result|upload|exfil)'

composite_rules:
  - id: panos-node-http-command-tasking
    desc: PAN-OS Node HTTP tasking
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/infrastructure/keywords::node-api-beacon-path
      - id: micro-behaviors/process/create/shell/bridge::js-execsync-cmd-arg
      - id: panos-node-result-upload
