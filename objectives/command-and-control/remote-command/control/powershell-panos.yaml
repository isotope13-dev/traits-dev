defaults:
  platforms: [panos, appliance, windows]
  for: [powershell]
  attack: T1059.001

traits:
  - id: ps-panos-beacon-loop-comment
    desc: PS PAN-OS beacon loop comment
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: C2 beacon loop with remote command execution

  - id: ps-panos-invoke-post
    desc: PS PAN-OS Invoke-WebRequest POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Invoke-WebRequest[\s\S]{0,120}-Method POST'

  - id: ps-panos-cmd-poll-endpoint
    desc: PS PAN-OS command poll endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v2/cmd/poll

  - id: ps-panos-invoke-expression-command
    desc: PS PAN-OS Invoke-Expression cmd
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Invoke-Expression -Command

composite_rules:
  - id: ps-panos-http-remote-command
    desc: PS PAN-OS HTTP remote command
    crit: hostile
    conf: 0.98
    all:
      - id: ps-panos-beacon-loop-comment
      - id: ps-panos-invoke-post

  - id: ps-panos-poll-execute-command
    desc: PS PAN-OS poll execute command
    crit: hostile
    conf: 0.98
    all:
      - id: ps-panos-cmd-poll-endpoint
      - id: ps-panos-invoke-expression-command
