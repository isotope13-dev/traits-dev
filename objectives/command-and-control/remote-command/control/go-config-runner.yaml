defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1059

traits:
  - id: dynamic-procedure-exec-modes
    desc: Dynamic procedure exec modes
    crit: component
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      regex: 'switch\s+proc\.Mode[\s\S]{0,260}case\s+"exec-tty":[\s\S]{0,120}case\s+"exec":'

  - id: procedure-data-to-argv
    desc: Procedure data becomes argv
    crit: component
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: text
      substr: "InterfaceToStringSlice(proc.Data)"

  - id: process-manager-run-call
    desc: Process manager run call
    crit: notable
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    if:
      type: symbol
      kind: call
      exact: "sc.processManager.Run"

composite_rules:
  - id: config-driven-process-runner
    desc: Config driven process runner
    crit: hostile
    conf: 0.92
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    near_lines: 40
    all:
      - id: dynamic-procedure-exec-modes
      - id: procedure-data-to-argv
      - id: process-manager-run-call

  - id: yaml-procedure-command-execution
    desc: YAML procedure command execution
    crit: hostile
    conf: 0.9
    ref: sha256:dc2981c909ec86d6ef30dc45ff57383b19532eb26fe0e2827474b4e59e821701
    all:
      - id: config-driven-process-runner
      - id: micro-behaviors/data/config/schema::yaml-command-procedure-schema
      - id: micro-behaviors/data/config/schema::yaml-command-run-mode-schema
