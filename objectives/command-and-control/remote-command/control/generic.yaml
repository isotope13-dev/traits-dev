defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: generic-dup
    desc: Function to execute remote commands
    crit: component
    conf: 0.2
    if:
      type: text
      regex: (?i)\bexecuteCommand\b
    not:
      - regex: (?i)executeCommand(:|Configuration)
      - regex: (?i)executeCommandProvider
