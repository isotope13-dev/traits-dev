# Go ishell Interactive RAT Operator Console
# The abiosoft/ishell library provides readline-style interactive shells.
# When combined with RPC-based remote command dispatch, it forms the operator
# console side of a Go RAT (pattern seen in ToRat, custom Go RATs).
# ATT&CK: T1059.004 (Unix Shell), T1021.004 (Remote Services: SSH — analogy via RPC)
# MBC: B0022 (C2 Communication)
defaults:
  platforms: [windows, unix]
  for: [go]
  attack: T1071.001
  mbc: B0022

traits:
  # abiosoft/ishell is a readline-style interactive shell library.
  # Legitimate use exists (CLI tools), but combined with RPC dispatch it's RAT.
  - id: go-ishell-import
    desc: abiosoft/ishell interactive shell import
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: abiosoft/ishell

  # shell.AddCmd() in a loop is how RAT operators register commands
  - id: go-ishell-addcmd
    desc: ishell shell.AddCmd command registration
    crit: component
    conf: 0.7
    if:
      type: text
      substr: "shell.AddCmd("

  # SetPrompt with dynamic client name is characteristic of multi-session RATs
  - id: go-ishell-setprompt
    desc: ishell SetPrompt dynamic session prompt
    crit: component
    conf: 0.7
    if:
      type: text
      substr: "shell.SetPrompt("

  # NotFound handler that runs unrecognized input as shell commands is RAT catch-all
  - id: go-ishell-notfound-shell
    desc: ishell NotFound catch-all command handler
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "shell.NotFound("

composite_rules:
  - id: go-ishell-rat-console
    desc: Go ishell interactive RAT operator console
    crit: suspicious
    conf: 0.88
    attack: T1059.004
    all:
      - id: go-ishell-import
      - id: go-ishell-notfound-shell
    any:
      - id: go-ishell-addcmd
      - id: go-ishell-setprompt
