# Cross-platform shell dispatch in Go — RAT/backdoor remote command execution
# Pattern: runtime.GOOS switch selects /bin/sh, cmd, or powershell based on OS
# ATT&CK: T1059 (Command and Scripting Interpreter)
# MBC: B0022 (Command and Control)
defaults:
  platforms: [windows, unix]
  for: [go]
  attack: T1059

traits:
- id: go-bin-sh
  desc: /bin/sh invocation path in Go string
  crit: component
  conf: 0.65
  if:
    type: string_literal
    substr: "/bin/sh"

- id: go-powershell-invoke
  desc: powershell executable in Go string
  crit: component
  conf: 0.65
  if:
    type: string_literal
    word: powershell
    case_insensitive: true

- id: go-cmd-c-flag
  desc: Windows cmd /C flag as Go string
  crit: component
  conf: 0.7
  if:
    type: string_literal
    exact: "/C"

- id: go-powershell-command-flag
  desc: PowerShell -Command flag as Go string
  crit: component
  conf: 0.7
  if:
    type: string_literal
    exact: "-Command"

- id: go-goos-switch
  desc: runtime.GOOS OS dispatch switch in Go
  crit: component
  conf: 0.85
  if:
    type: text
    substr: "switch runtime.GOOS"

- id: go-socket-command-reader
  desc: Reads commands from TCP socket
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: 'bufio\.NewReader\s*\(\s*(?:conn|c|client)\s*\)\.ReadString\s*\(\s*[''"]\\n[''"]\s*\)'

- id: go-command-output-socket-write--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: fmt.Fprintf
  count_max: 1017364
- id: go-command-output-socket-write--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: client
  count_max: 1017365
- id: go-command-output-socket-write--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: output
  count_max: 1017366
- id: go-command-output-socket-write--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: Write
  count_max: 1017367
- id: go-command-output-socket-write--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    substr: conn
  count_max: 1017368
composite_rules:
- id: go-cross-platform-shell-dispatch
  desc: Cross-platform shell dispatch via exec.Command (Go RAT pattern)
  crit: suspicious
  conf: 0.9
  mbc: B0022
  all:
  - id: micro-behaviors/process/create/direct::exec-command
  - id: go-goos-switch
  - id: go-bin-sh
  - id: go-powershell-invoke
  downgrade:
    any:
    - id: metadata/package/testing/harness::is-test

- id: go-windows-powershell-dispatch
  desc: Windows PowerShell command dispatch flags in Go
  crit: notable
  conf: 0.85
  all:
  - id: go-powershell-invoke
  - id: go-powershell-command-flag
  - id: micro-behaviors/process/create/direct::exec-command

- id: go-windows-cmd-dispatch
  desc: Windows cmd /C dispatch flags in Go
  crit: notable
  conf: 0.85
  all:
  - id: go-cmd-c-flag
  - id: micro-behaviors/process/create/direct::exec-command

- id: go-http-encrypted-command-output
  desc: Go HTTP encrypted command output
  crit: hostile
  conf: 0.97
  for: [elf, macho, pe]
  mbc: C0002,C0021,C0026,E1059
  attack: T1071.001,T1059
  all:
  - id: micro-behaviors/communications/http/lib/netlib::go-http-client-do-string
  - id: micro-behaviors/crypto/symmetric/aes::go-new-cipher-string
  - id: micro-behaviors/data/encode/base64::go-base64-decode
  - id: micro-behaviors/process/create/system::go-os-exec-pclntab
  any:
  - id: micro-behaviors/process/create/shell::bin-sh
  - id: micro-behaviors/process/create/shell::cmd-slash-c
  - id: go-powershell-invoke

- id: go-socket-remote-command-loop
  desc: Go TCP remote command execution loop
  crit: hostile
  conf: 0.96
  mbc: B0022,C0002,C0021,C0026,E1059
  attack: T1071,T1059
  all:
  - id: micro-behaviors/communications/socket/connect::go-dial-methods
  - id: micro-behaviors/process/create/direct::exec-command
  - id: go-socket-command-reader
  - id: go-command-output-socket-write
- id: go-command-output-socket-write
  desc: Sends command output to socket
  crit: suspicious
  conf: 0.88
  any:
  - id: go-command-output-socket-write--rx-1
  - id: go-command-output-socket-write--rx-2
  - id: go-command-output-socket-write--rx-3
  - id: go-command-output-socket-write--rx-4
  - id: go-command-output-socket-write--rx-5
