defaults:
  platforms: [panos, appliance, unix]
  for: [cpp, elf]
  attack: T1059

traits:
  - id: cpp-panos-api-report-path
    desc: C++ PAN-OS API report path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/report
    unless:
      - id: well-known/tool/reverse-engineering/frida::frida-tool-context

  - id: cpp-panos-cmd-output-marker
    desc: C++ PAN-OS CMD output marker
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "CMD_OUTPUT:"

composite_rules:
  - id: cpp-panos-c2-command-output
    desc: C++ PAN-OS C2 command output
    crit: hostile
    conf: 0.98
    all:
      - id: cpp-panos-api-report-path
      - id: cpp-panos-cmd-output-marker
      - id: micro-behaviors/process/create/shell/invoke::c-popen-call
