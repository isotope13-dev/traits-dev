defaults:
  platforms: [aix, unix]
  for: [zig, elf]
  attack: T1059.004
  mbc: B0022
traits:
  - id: zig-token-exec-keyword
    desc: Zig token interpreter exec keyword
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'TokenType[\s\S]{0,260}exec'
  - id: zig-child-run-shell-c
    desc: Zig runs /bin/sh -c command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'std\.process\.Child\.run[\s\S]{0,180}/bin/sh[\s\S]{0,80}-c'
composite_rules:
  - id: zig-token-shell-interpreter
    desc: Zig token shell interpreter
    crit: hostile
    conf: 0.97
    all:
      - id: zig-token-exec-keyword
      - id: zig-child-run-shell-c
