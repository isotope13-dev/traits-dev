defaults:
  platforms: [windows, unix]
  for: [class, jar, zip]
  attack: T1059
  mbc: B0022
traits:
  - id: terminal-command-message
    desc: Terminal command message type
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: TERMINAL_COMMAND
  - id: terminal-session-message
    desc: Terminal session message type
    crit: component
    conf: 0.86
    if:
      type: raw
      substr: TERMINAL
  - id: file-get-socks-message
    desc: File get SOCKS message type
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: FILE_GET_SOCKS
  - id: file-put-socks-message
    desc: File put SOCKS message type
    crit: component
    conf: 0.92
    if:
      type: raw
      substr: FILE_PUT_SOCKS
  - id: update-message
    desc: Update message type
    crit: component
    conf: 0.78
    if:
      type: raw
      substr: UPDATE
  - id: java-process-stdio-bridge
    desc: Java process stdio bridge
    crit: component
    conf: 0.84
    if:
      type: raw
      regex: 'java/lang/Process.{0,180}(getInputStream|getOutputStream)'
  - id: java-nio-input-stream
    desc: Java NIO input stream
    crit: component
    conf: 0.72
    if:
      type: raw
      substr: newInputStream
  - id: java-nio-output-stream
    desc: Java NIO output stream
    crit: component
    conf: 0.72
    if:
      type: raw
      substr: newOutputStream
  - id: java-terminal-thread-entries
    desc: Java terminal handler class entries
    crit: component
    conf: 0.86
    for: [jar, zip]
    count_min: 2
    if:
      type: raw
      regex: 'main/threads/(TerminalCommandThread|TerminalThread)\.class'
  - id: java-socks-file-thread-entries
    desc: Java SOCKS file handler class entries
    crit: component
    conf: 0.86
    for: [jar, zip]
    count_min: 3
    if:
      type: raw
      regex: 'main/threads/(ReadFileThread|WriteFileThread|Socks5Thread)\.class'
  - id: java-websocket-core-entries
    desc: Java WebSocket control class entries
    crit: component
    conf: 0.84
    for: [jar, zip]
    count_min: 2
    if:
      type: raw
      regex: 'main/(WebSocket|Tunnel)\.class'
  - id: java-update-thread-entry
    desc: Java update handler class entry
    crit: component
    conf: 0.82
    for: [jar, zip]
    if:
      type: raw
      substr: main/threads/UpdateThread.class
  - id: java-string-protection-entries
    desc: Java protected string class entries
    crit: component
    conf: 0.82
    for: [jar, zip]
    count_min: 2
    if:
      type: raw
      regex: 'main/crypto/(Protection|RC4)\.class'
composite_rules:
  - id: java-terminal-process-handler
    desc: Java terminal process handler
    crit: suspicious
    conf: 0.92
    all:
      - id: terminal-session-message
      - id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
    any:
      - id: terminal-command-message
      - id: java-process-stdio-bridge
  - id: java-file-get-socks-handler
    desc: Java SOCKS file read handler
    crit: suspicious
    conf: 0.9
    all:
      - id: file-get-socks-message
      - id: java-nio-input-stream
  - id: java-file-put-socks-handler
    desc: Java SOCKS file write handler
    crit: suspicious
    conf: 0.9
    all:
      - id: file-put-socks-message
      - id: java-nio-output-stream
  - id: java-rat-file-transfer-protocol
    desc: Java RAT file transfer protocol
    crit: suspicious
    conf: 0.93
    any:
      - id: java-file-get-socks-handler
      - id: java-file-put-socks-handler
      - id: file-get-socks-message
      - id: file-put-socks-message
      - id: micro-behaviors/communications/proxy/socks::socks5-proto
    needs: 2
  - id: java-websocket-rat-control
    desc: Java WebSocket RAT control protocol
    crit: hostile
    conf: 0.97
    all:
      - id: java-terminal-process-handler
      - id: java-rat-file-transfer-protocol
      - id: micro-behaviors/communications/websocket/library::tyrus-client-manager
    any:
      - id: update-message
      - id: objectives/anti-static/obfuscation/string/crypto::java-custom-rc4-class
  - id: java-websocket-rat-archive
    desc: Java WebSocket RAT archive layout
    crit: hostile
    conf: 0.96
    all:
      - id: java-terminal-thread-entries
      - id: java-socks-file-thread-entries
      - id: java-websocket-core-entries
      - id: java-update-thread-entry
      - id: java-string-protection-entries
      - id: micro-behaviors/communications/websocket/library::tyrus-client-manager
