defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: generic-dup
    desc: Function to execute remote commands
    crit: notable
    conf: 0.2
    if:
      type: string_value
      regex: (?i)\bexecuteCommand\b
    not:
      - regex: (?i)executeCommand(:|Configuration)
