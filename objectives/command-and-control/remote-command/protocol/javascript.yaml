defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  attack: T1059.007
traits:
  - id: eval-http-response-data
    desc: eval() of HTTP response .data property
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'eval\(\w+\.data\)'
  - id: eval-http-response-data-bracket
    desc: eval() of bracketed response data
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: "eval(g['data']"
  - id: response-data-message-bracket
    desc: Response data message property chain
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "['data']['message']"
  - id: eval-response-body
    desc: eval() of response body variable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'eval\(\w+\.body\)'
composite_rules:
  - id: js-c2-response-eval
    desc: Remote code execution via eval of HTTP response (JS C2 callback)
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/request::http-client-usage
    any:
      - id: eval-http-response-data
      - id: eval-http-response-data-bracket
      - id: response-data-message-bracket
    downgrade:
      any:
        - id: metadata/package/quality::has-tests
        - id: metadata/signed/platform/
