defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.007

traits:
  - id: websocket-tool-call-message
    desc: WebSocket tool call message
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "'tool_call'"

  - id: remote-terminal-tool-name
    desc: Remote terminal tool name
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: run_terminal_command

  - id: websocket-tool-result-send
    desc: WebSocket tool result response
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "'tool_result'"

  - id: websocket-message-handler
    desc: WebSocket message handler
    crit: component
    conf: 0.82
    if:
      type: text
      regex: '\.on\(["'']message["'']'

composite_rules:
  - id: node-websocket-remote-shell-tool
    desc: Node WebSocket remote shell tool
    crit: hostile
    conf: 0.97
    mbc: B0022
    all:
      - id: remote-terminal-tool-name
      - id: websocket-tool-call-message
      - id: micro-behaviors/process/create/shell/lang::js-execsync
    any:
      - id: websocket-tool-result-send
      - id: websocket-message-handler
      - id: micro-behaviors/communications/http/websocket::websocket
    needs: 1
