defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.007

traits:
  - id: websocket-tool-call-message
    desc: WebSocket tool call message
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "'tool_call'"

  - id: remote-terminal-tool-name
    desc: Remote terminal tool name
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: run_terminal_command
    downgrade:
      any:
        - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
        - id: metadata/library/structure::js-large-module-bundle

  - id: websocket-tool-result-send
    desc: WebSocket tool result response
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "'tool_result'"

  - id: websocket-message-handler
    desc: WebSocket message handler
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(ws|socket|conn)\.on\(["'']message["'']'

  - id: socksmsg-type-enum
    desc: SOCKS RAT message enum
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'SOCKS5.{0,80}TERMINAL_COMMAND.{0,80}SLEEP'

  - id: socksmsg-file-transfer-enum
    desc: SOCKS RAT file message enum
    crit: component
    conf: 0.96
    if:
      type: text
      regex: 'FILE_GET_SOCKS.{0,80}FILE_PUT_SOCKS'

  - id: socksmsg-update-init-enum
    desc: SOCKS RAT update init enum
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'UPDATE.{0,80}INITIALIZE'

  - id: socksmsg-framing-class
    desc: SOCKS message framing class
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'class\s+SocksMsg\b.{0,160}HEADER_SIZE'

  - id: terminal-thread-class
    desc: Terminal thread handler class
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'class\s+Terminal(Command)?Thread\s+extends\s+SocksThread'

  - id: file-thread-classes
    desc: File transfer thread classes
    crit: component
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: 'class\s+(ReadFile|WriteFile|Update)Thread\s+extends\s+SocksThread'

  - id: current-script-update-respawn
    desc: Current script update handler
    crit: suspicious
    conf: 0.94
    attack: T1105
    if:
      type: text
      regex: 'class\s+UpdateThread\b.{0,1200}__filename'

composite_rules:
  - id: node-websocket-remote-shell-tool
    desc: Node WebSocket remote shell tool
    crit: hostile
    conf: 0.97
    mbc: B0022
    all:
      - id: remote-terminal-tool-name
      - id: websocket-tool-call-message
      - id: micro-behaviors/process/create/shell/lang::js-execsync
    any:
      - id: websocket-tool-result-send
      - id: websocket-message-handler
      - id: micro-behaviors/communications/ipc::js-event-on-message
      - id: micro-behaviors/communications/http/websocket::websocket

    needs: 1

  - id: node-socks-rat-file-transfer
    desc: Node SOCKS RAT file transfer
    crit: suspicious
    conf: 0.94
    attack: T1105
    all:
      - id: socksmsg-file-transfer-enum
      - id: file-thread-classes
    any:
      - id: socksmsg-framing-class
      - id: micro-behaviors/fs/file/read::create-read-stream
      - id: micro-behaviors/fs/write/file::create-write-stream

  - id: node-websocket-socks-rat
    desc: Node WebSocket SOCKS RAT
    crit: hostile
    conf: 0.98
    mbc: B0022
    attack: T1219
    all:
      - id: socksmsg-type-enum
      - id: socksmsg-file-transfer-enum
      - id: terminal-thread-class
      - id: micro-behaviors/process/create/shell/lang::child-process-require
    any:
      - id: micro-behaviors/communications/http/websocket::websocket
      - id: micro-behaviors/communications/proxy/socks::socks5-proto
      - id: socksmsg-framing-class
      - id: socksmsg-update-init-enum
      - id: current-script-update-respawn
    needs: 2
