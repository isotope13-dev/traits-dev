defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
traits:
  - id: remote-switch-endpoint-switcher
    desc: Remote switcher endpoint
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: https?://.{1,200}/switcher\b
  - id: remote-switch-endpoint-toggle
    desc: Remote toggle or switch endpoint
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: https?://.{1,200}/(switch|toggle)\b
  - id: remote-switch-endpoint-config
    desc: Remote feature config endpoint
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: https?://.{1,200}/(feature-?flag|config)\b
    unless:
      - type: string_literal
        substr: docs.aws.amazon.com
  - id: requests-get-remote-switcher
    desc: requests.get switcher poll
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: requests\.get\([^\n]{0,200}switcher
  - id: requests-get-remote-toggle
    desc: requests.get switch or toggle poll
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: requests\.get\([^\n]{0,200}(switch|toggle)
  - id: requests-get-remote-config
    desc: requests.get feature config poll
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: requests\.get\([^\n]{0,200}(feature-?flag|config)
  - id: response-json-gating-not
    desc: Negative JSON response gate
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: if\s+not\s+[A-Za-z_][A-Za-z0-9_]*\.json\(\)
  - id: response-json-gating-positive
    desc: Positive JSON response gate
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: if\s+[A-Za-z_][A-Za-z0-9_]*\.json\(\)
composite_rules:
  - id: remote-switch-endpoint
    desc: Remote switch or config endpoint
    crit: notable
    conf: 0.8
    any:
      - id: remote-switch-endpoint-switcher
      - id: remote-switch-endpoint-toggle
      - id: remote-switch-endpoint-config
  - id: requests-remote-switch
    desc: HTTP-polled remote switch
    crit: suspicious
    conf: 0.9
    all:
      - id: remote-switch-endpoint
    any:
      - id: requests-get-remote-switcher
      - id: requests-get-remote-toggle
      - id: requests-get-remote-config
  - id: remote-switch-gating
    desc: Remote switch gates behavior
    crit: suspicious
    conf: 0.95
    all:
      - id: requests-remote-switch
    any:
      - id: response-json-gating-not
      - id: response-json-gating-positive
