defaults:
  for: [go]
  platforms: [linux, macos, windows]
traits:
  - id: envelope-plugin-id-extractor
    desc: Extracts pluginId from generic envelope
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\["pluginId"\]\.\(string\)'

  - id: envelope-plugin-event-extractor
    desc: Extracts event from generic envelope
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\["event"\]\.\(string\)'

  - id: envelope-plugin-payload-extractor
    desc: Extracts payload from generic envelope
    crit: component
    conf: 0.9
    if:
      type: text
      word: '["payload"]'

  - id: env-plugins-dispatch-method
    desc: Calls Dispatch method on env.Plugins
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\.Plugins\.Dispatch\('

composite_rules:
  - id: dynamic-plugin-event-dispatcher
    desc: Dynamic plugin event dispatcher from generic envelope
    crit: suspicious
    conf: 0.9
    all:
      - id: envelope-plugin-id-extractor
      - id: envelope-plugin-event-extractor
      - id: envelope-plugin-payload-extractor
      - id: env-plugins-dispatch-method
