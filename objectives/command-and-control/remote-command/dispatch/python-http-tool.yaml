defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1059.006

traits:
  - id: remote-tool-invoke-path
    desc: Remote tool invocation request
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(?is)(/tools/invoke|["'']tool["'']\s*:).{0,900}["'']args["'']\s*:'
  - id: privileged-tool-scope
    desc: Administrative scope for remote tools
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '(?is)(operator\.admin|x-openclaw-scopes).{0,300}(\bfs\b|\bruntime\b)'

composite_rules:
  - id: python-privileged-remote-tool-control
    desc: Python remote tools with admin scope
    crit: hostile
    conf: 0.98
    scope: file
    all:
      - id: micro-behaviors/communications/http/lib/httpx::httpx-async-client-post
      - id: remote-tool-invoke-path
      - id: privileged-tool-scope
