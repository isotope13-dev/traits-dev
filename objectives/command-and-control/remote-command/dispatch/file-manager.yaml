defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
  attack: T1059
  mbc: B0011
traits:
  - id: action-dispatch-invalid-pid
    desc: Dispatcher rejects invalid PID arg
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\binvalid PID\b\s*:\s*%s'
  - id: action-dispatch-invalid-port
    desc: Dispatcher rejects invalid port arg
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\binvalid port\b\s*:\s*%s'
  - id: action-dispatch-unknown-action
    desc: Dispatcher rejects unknown action ID
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\bunknown\s+(action|hiding action|injection method)\b'
    unless:
      - id: well-known/app/terraform-provider::terraform-provider-binary
      - id: well-known/app/terraform-provider::ibm-cloud-terraform-provider
  - id: action-dispatch-invalid-action
    desc: Dispatcher rejects invalid named action
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: '\bInvalid (PAM|hiding|inject)[A-Za-z ]{0,20}\b'
  - id: file-too-large-message
    desc: File-read 10MB cap diagnostic message
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: 'File too large \(>\s*\d+\s*MB\)'
  - id: shell-exited-message
    desc: Spawned shell exited diagnostic
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\[Shell exited\]|\[Failed to start shell\]'
composite_rules:
  - id: command-dispatcher-implant
    desc: Implant has multi-action C2 dispatcher
    crit: hostile
    conf: 0.95
    needs: 4
    any:
      - id: objectives/command-and-control/remote-command/dispatch
