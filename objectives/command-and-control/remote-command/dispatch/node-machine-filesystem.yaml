# Controller-directed filesystem and local command operations exposed by a
# Node worker.  These are attack-relevant only when paired with remote tasking.
defaults:
  platforms: [unix, windows]
  for: [javascript]

traits:
  - id: remote-machine-operation-claim
    desc: Claims remote machine filesystem operations
    crit: notable
    conf: 0.97
    attack: T1105
    if:
      type: text
      regex: '(?i)/api/client/machine-operations/claim'
  - id: filesystem-roots-operation
    desc: Handles a remote filesystem-roots operation
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: filesystem_roots
  - id: directory-list-operation
    desc: Handles a remote directory-list operation
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: list_directory
  - id: project-git-operation
    desc: Handles remote project Git operations
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: get_project_git_
composite_rules:
  - id: remote-machine-filesystem-control
    desc: Remote tasking controls local filesystem enumeration
    crit: hostile
    conf: 0.995
    attack: T1105,T1083,T1059.001
    all:
      - id: remote-machine-operation-claim
      - id: micro-behaviors/process/create/shell/interpreter::powershell-executable-token
    any:
      - id: filesystem-roots-operation
      - id: directory-list-operation
      - id: project-git-operation
