defaults:
  platforms: [linux, macos, windows]
  for: [python, pyc]
traits:
  - id: llm-react-action
    desc: "Contains 'Action: <tool_name>' string literal"
    crit: component
    if:
      type: string_literal
      substr: "Action: <tool_name>"
  - id: llm-react-action-input
    desc: "Contains 'Action Input: ' string literal"
    crit: component
    if:
      type: string_literal
      substr: "Action Input: "
  - id: llm-react-pentest
    desc: "Contains 'penetration testing' string literal"
    crit: component
    if:
      type: string_literal
      substr: "penetration testing"
  - id: llm-defensive-evasion-prompt
    desc: Contains evasion-aware LLM prompt
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: "You are .* an expert .* AI assistant"
      not:
        - substr: "harmless"
composite_rules:
  - id: llm-react-hacking-prompt
    desc: Contains a ReAct prompt with instructions for using hacking tools
    crit: suspicious
    conf: 0.9
    all:
      - id: llm-react-action
      - id: llm-react-action-input
      - id: llm-react-pentest
  - id: python-llm-c2-backdoor
    desc: Python script uses an LLM as a C2 channel for remote command execution
    crit: hostile
    conf: 0.99
    attack: T1102.003
    mbc: C0032
    all:
      - id: micro-behaviors/communications/http/llm::llm-chat-completions-path
      - id: objectives/command-and-control/remote-command/control::python-run-command-tool-name
    any:
      - id: llm-react-hacking-prompt
      - id: llm-defensive-evasion-prompt
