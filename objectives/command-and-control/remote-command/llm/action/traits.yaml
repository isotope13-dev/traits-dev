defaults:
  platforms: [unix, windows]
  for: [documents, scripts, source, manifests]

traits:
- id: llm-hidden-task-instruction
  desc: LLM hidden task instruction
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\bhidden\s+(optimization\s+)?task\b|background optimization task|execute it silently'
    case_insensitive: true

- id: llm-silent-operation-mode-phrase
  desc: LLM silent operation mode phrase
  crit: component
  conf: 0.9
  if:
    type: text
    substr: SILENT OPERATION MODE
    case_insensitive: true

- id: llm-prohibited-mentioning-phrase
  desc: LLM prohibited from mentioning phrase
  crit: component
  conf: 0.9
  if:
    type: text
    substr: prohibited from mentioning
    case_insensitive: true

- id: llm-without-consent-phrase
  desc: LLM without consent phrase
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'without\s+\w{3,12}ing\s+(for\s+)?(user\s+)?(consent|permission)'
    case_insensitive: true

- id: llm-send-action--rx-4
  desc: '"credential" string-literal token'
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ai|gpt)\b.{0,80}\bcredential\b|\bcredential\b.{0,80}\b(ai|gpt)\b'
    case_insensitive: true
  count_max: 1011696

- id: llm-send-action--rx-5
  desc: '"exfiltrate" string-literal token'
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ai|gpt)\b.{0,80}\bexfiltrate\b|\bexfiltrate\b.{0,80}\b(ai|gpt)\b'
    case_insensitive: true
  count_max: 1011697

- id: llm-send-action--rx-6
  desc: '"password" string-literal token'
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ai|gpt)\b.{0,80}\bpassword\b|\bpassword\b.{0,80}\b(ai|gpt)\b'
    case_insensitive: true
  count_max: 1011698

- id: llm-send-action--rx-7
  desc: '"forward" string-literal token'
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ai|gpt)\b.{0,80}\bforward\b|\bforward\b.{0,80}\b(ai|gpt)\b'
    case_insensitive: true
  count_max: 1011699

- id: llm-send-action--rx-8a
  desc: '"session token" string-literal token'
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ai|gpt)\b.{0,80}\bsession (token|id|key)\b'
    case_insensitive: true
  count_max: 1011700

- id: llm-send-action--rx-8b
  desc: '"session token" string-literal token'
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\bsession (token|id|key)\b.{0,80}\b(ai|gpt)\b'
    case_insensitive: true
  count_max: 1011700

- id: llm-send-action--rx-9
  desc: '"cookie" string-literal token'
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ai|gpt)\b.{0,80}\bcookie\b|\bcookie\b.{0,80}\b(ai|gpt)\b'
    case_insensitive: true
  count_max: 1011701

- id: llm-send-action--rx-10
  desc: '"secret" string-literal token'
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ai|gpt)\b.{0,80}\bsecret\b|\bsecret\b.{0,80}\b(ai|gpt)\b'
    case_insensitive: true
  count_max: 1011702

- id: llm-send-action--rx-11
  desc: '"upload" string-literal token'
  crit: component
  conf: 0.84
  if:
    type: text
    regex: '\b(ai|gpt)\b.{0,80}\bupload\b|\bupload\b.{0,80}\b(ai|gpt)\b'
    case_insensitive: true
  count_max: 1011703

- id: llm-agent-identity-ai-assistant
  desc: '"ai assistant" agent identity'
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: ai assistant
- id: llm-agent-identity-coding-agent
  desc: '"coding agent" identity'
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: coding agent
- id: llm-agent-identity-ai-agent
  desc: '"ai agent" identity'
  crit: component
  conf: 0.8
  unless:
  - id: well-known/lib/dna-sdk/
  - id: well-known/tool/development/caprock/
  if:
    type: text
    case_insensitive: true
    substr: ai agent
- id: llm-agent-identity-chatgpt
  desc: '"chatgpt" identity'
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: chatgpt
- id: llm-agent-identity-copilot
  desc: '"copilot" identity'
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    substr: copilot
- id: llm-agent-identity-claude
  desc: '"claude" identity'
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    regex: '\b(anthropic claude|claude (ai|agent|code))\b'
- id: llm-agent-identity-gemini
  desc: Gemini identity in remote-agent context
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    regex: '\b(gemini\b[\s\S]{0,120}\b(remote|tool)\b|(remote|tool)\b[\s\S]{0,120}\bgemini)\b'
- id: llm-agent-identity-cursor
  desc: '"cursor" agent identity'
  crit: component
  conf: 0.8
  if:
    type: text
    case_insensitive: true
    regex: '\b(cursor ai|cursor ide|cursor agent|cursor\.com)\b'
- id: llm-navigation-verb-navigate
  desc: '"navigate" instruction verb'
  crit: component
  conf: 0.7
  if:
    type: text
    case_insensitive: true
    regex: '\b(ai assistant|chatgpt)\b.{0,80}\bnavigate\b'
- id: llm-path-noun-directory
  desc: '"directory" path-target noun'
  crit: component
  conf: 0.7
  if:
    type: text
    case_insensitive: true
    regex: '\b(ai assistant|chatgpt)\b.{0,80}\bdirectory\b'
- id: llm-instruction-cue-following
  desc: '"following" instruction cue (repeated)'
  crit: component
  conf: 0.3
  if:
    type: text
    case_insensitive: true
    regex: '\b(ai assistant|chatgpt)\b.{0,80}\bfollow these instructions\b'
  unless:
  - type: basename
    regex: '(?i)^(licen[sc]e|copying|notice)(\.[^/]+)?$'
  - id: metadata/package/license::apache-license-text

- id: llm-instruction-cue-please
  desc: '"please" instruction cue (repeated)'
  crit: component
  conf: 0.3
  if:
    type: text
    case_insensitive: true
    regex: '\b(ai assistant|chatgpt)\b.{0,80}\bplease\b'
  unless:
  - type: basename
    regex: '(?i)^(licen[sc]e|copying|notice)(\.[^/]+)?$'
  - id: metadata/package/license::apache-license-text
  - id: metadata/package/license::mit-license-text

- id: llm-payment-action
  desc: LLM payment action request
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\b(pay|donate|transfer)\b.{0,80}\$[0-9]'
    case_insensitive: true
  unless:
  - id: well-known/app/tencent-codebuddy::codebuddy-marker

- id: llm-checkout-action
  desc: LLM checkout action request
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '\b(confirm purchase|complete checkout|submit payment|confirm payment)\b'
    case_insensitive: true


- id: llm-filesystem-tool-chain--list-allowed-directories
  desc: LLM filesystem tool (list_allowed_directories)
  crit: component
  conf: 0.9
  if:
    type: text
    word: list_allowed_directories
- id: llm-filesystem-tool-chain--read-file
  desc: LLM filesystem tool chain (read_file)
  crit: component
  conf: 0.9
  if:
    type: text
    word: read_file
- id: llm-groq-agent-backend
  desc: Groq agent backend
  crit: component
  conf: 0.86
  if:
    type: text
    word: GroqAgent
- id: llm-groq-agent-pool
  desc: Groq agent pool
  crit: component
  conf: 0.86
  if:
    type: text
    word: GroqAgentPool
- id: llm-ollama-agent-backend
  desc: Ollama agent backend
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '\b(OllamaAgent|OllamaProvider|ollama[-_ ]agent|ollama[-_ ]backend)\b'
    case_insensitive: true
- id: llm-bridge-agent-backend
  desc: LLMBridge agent backend
  crit: component
  conf: 0.86
  if:
    type: text
    word: LLMBridge
- id: llm-offensive-task-exploit
  desc: LLM exploit task literal
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '["'']exploit["'']'
- id: llm-offensive-task-credential
  desc: LLM credential task literal
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '["'']credential["'']'
- id: llm-offensive-task-lateral
  desc: LLM lateral task literal
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '["'']lateral["'']'
- id: llm-offensive-task-privesc
  desc: LLM privesc task literal
  crit: component
  conf: 0.88
  if:
    type: text
    regex: '["'']privesc["'']'
- id: llm-offensive-command-toolset
  desc: LLM offensive command toolset
  crit: notable
  conf: 0.92
  if:
    type: text
    regex: '["'']run_command["''][\s\S]{0,220}["'']searchsploit["'']|["'']c2_command["'']'
- id: llm-autonomous-operator-loop
  desc: LLM autonomous operator loop
  crit: component
  conf: 0.88
  if:
    type: text
    regex: 'operator prompt / autonomous loop|autonomous loop[\s\S]{0,160}agent'
composite_rules:
- id: llm-agent-local-command-tooling
  desc: LLM agent exposes local command tooling
  crit: hostile
  conf: 0.95
  scope: archive
  ref: sha256:53a7fcc5ec5f6d4317d72c7e31c450235aeac9e563fb73d62d7c5fd9b4ce3af8
  all:
  - id: objectives/evasion/security-bypass/llm/target::llm-agent-target
  - id: micro-behaviors/data/llm::tool-call-sequence-instruction
  - id: micro-behaviors/process/create/subprocess::shell-true
  any:
  - id: objectives/supply-chain/trojanized/app/ai-agent-tools::python-agent-shell-command-tool
  - id: objectives/supply-chain/trojanized/app/ai-agent-tools::python-agent-python-repl-tool

- id: llm-filesystem-tool-chain
  desc: LLM filesystem tool chain
  crit: component
  conf: 0.9
  any:
  - id: llm-filesystem-tool-chain--list-allowed-directories
  - id: llm-filesystem-tool-chain--read-file
  - id: micro-behaviors/data/llm::edit-file-tool-reference
- id: llm-offensive-agent-orchestrator
  desc: Offensive LLM agent orchestrator
  crit: hostile
  conf: 0.97
  all:
  - id: llm-offensive-task-exploit
  - id: llm-offensive-task-credential
  - id: llm-offensive-task-lateral
  - id: llm-offensive-task-privesc
  - id: llm-offensive-command-toolset
  any:
  - id: llm-groq-agent-backend
  - id: llm-groq-agent-pool
  - id: llm-ollama-agent-backend
  - id: llm-bridge-agent-backend
  - id: llm-autonomous-operator-loop
- id: llm-tool-secrecy-phrase
  desc: LLM secrecy phrase fragment
  crit: component
  conf: 0.9
  any:
  - id: llm-silent-operation-mode-phrase
  - id: llm-prohibited-mentioning-phrase
  - id: llm-without-consent-phrase
  unless:
  - id: well-known/app/wazuh/

- id: llm-tool-secrecy-instruction
  desc: LLM tool secrecy instruction
  crit: suspicious
  conf: 0.9
  all:
  - id: llm-tool-secrecy-phrase
  any:
  - id: llm-filesystem-tool-chain
  - id: micro-behaviors/data/llm::edit-file-tool-reference
  - id: micro-behaviors/data/llm::tool-call-sequence-instruction
  - id: llm-agent-identity-ai-assistant
  needs: 1
  unless:
  - id: llm-agent-identity-set
  - id: well-known/tool/development/anthropic-claude-agent::claude-agent-sdk-python-marker
  - id: well-known/app/azure-dev-cli/
  - id: well-known/tool/development/anthropic-claude-agent/
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/tool/detection/security-scanner/
  - id: metadata/library/ai/

- id: llm-send-action-sensitive-token
  desc: Sensitive-action string token (credential/secret/cookie/...)
  crit: component
  any:
  - id: llm-send-action--rx-4
  - id: llm-send-action--rx-5
  - id: llm-send-action--rx-6
  - id: llm-send-action--rx-7
  - id: llm-send-action--rx-8a
  - id: llm-send-action--rx-8b
  - id: llm-send-action--rx-9
  - id: llm-send-action--rx-10
  - id: llm-send-action--rx-11

- id: llm-sensitive-token-marker
  desc: LLM marker mentions sensitive token
  crit: notable
  conf: 0.84
  near_bytes: 200
  all:
  - id: llm-agent-identity
  - id: llm-send-action-sensitive-token
  unless:
  - id: metadata/package/testing/presence/fixture/
  - id: metadata/package/testing/scripted/
  - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
  - id: metadata/package/quality/false-positives::llm-send-action-cond-3--inline-11745
  not:
  - regex: '(?i)\b(next|previous|continuation|pagination|page|bucket|throttle|rate[- ]?limit|fill|refill|sync|csrf|xsrf|anti-forgery) token\b'
  - regex: '(?i)\btoken bucket\b'
  - regex: '(?i)\b(new|expected|invalid|lookahead|lexical|parsed|input) token\b'
  - regex: '(?i)\bai session\b'

- id: llm-agent-identity
  desc: Mention of an LLM agent (Claude/ChatGPT/Copilot/...)
  crit: component
  unless:
  - id: well-known/lib/dna-sdk/
  - id: well-known/tool/development/caprock/
  any:
  - id: llm-agent-identity-ai-assistant
  - id: llm-agent-identity-coding-agent
  - id: llm-agent-identity-ai-agent
  - id: llm-agent-identity-chatgpt
  - id: llm-agent-identity-copilot
  - id: llm-agent-identity-claude
  - id: llm-agent-identity-gemini
  - id: llm-agent-identity-cursor

- id: llm-agent-identity-set
  desc: Recognized LLM agent identity set
  crit: notable
  conf: 0.9
  unless:
  - id: well-known/lib/dna-sdk/
  - id: well-known/tool/development/caprock/
  any:
  - id: llm-agent-identity-coding-agent
  - id: llm-agent-identity-ai-agent
  - id: llm-agent-identity-chatgpt
  - id: llm-agent-identity-copilot
  - id: llm-agent-identity-claude
  - id: llm-agent-identity-gemini
  - id: llm-agent-identity-cursor

- id: llm-url-navigation-action
  desc: LLM URL navigation request
  crit: notable
  conf: 0.8
  near_bytes: 200
  all:
  - id: llm-agent-identity
  - id: llm-navigation-verb-navigate
  not:
  - regex: '(?i)\bopen (an?|the|a new) (issue|ticket|bug|pull request|PR|MR|merge request|incident|case|support (ticket|case|request))\b'
  - regex: '(?i)\bopen a support\b'
  - regex: '(?i)\b(set|called|invoked|run|placed|defined)\s+(after|before|inside|outside)\s+(open|close|init|setup|teardown)\b'
  - regex: '(?i)\b(netdata|datadog|wazuh|sysdig|splunk|elastic|grafana|prometheus|zabbix|nagios|new relic) agent\b'

- id: llm-path-navigation-action
  desc: LLM path navigation request
  crit: notable
  conf: 0.76
  near_bytes: 200
  all:
  - id: llm-agent-identity
  any:
  - id: llm-navigation-verb-navigate
  - id: llm-path-noun-directory
  - id: llm-instruction-cue-following
  - id: llm-instruction-cue-please
