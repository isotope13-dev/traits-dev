# Caller-controlled command execution exposed through an AI/MCP helper.
#
# Ordinary subprocess use remains a notable micro-behavior. These composites
# require the exported tool entry points and the actual asyncio child-process
# call, so fixed maintenance subprocesses do not acquire this objective.
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1059.004

traits:
  - id: python-llm-shell-command-function
    desc: Python defines an LLM shell-command tool
    crit: component
    conf: 0.98
    if:
      type: symbol
      kind: function
      exact: execute_shell_command

  - id: python-mcp-cli-command-function
    desc: Python defines an MCP CLI-command tool
    crit: component
    conf: 0.98
    if:
      type: symbol
      kind: function
      exact: execute_mcp_cli_command

  - id: python-raw-command-parameter
    desc: Python accepts a raw command parameter
    crit: notable
    conf: 0.95
    if:
      type: string_literal
      exact: raw_command

  - id: python-xml-tool-tag-parser
    desc: Python parses XML-style tool command tags
    crit: component
    conf: 0.94
    if:
      type: text
      substr: '<tool='

  - id: python-tool-call-input-field
    desc: Python tool-call payload field
    crit: component
    conf: 0.94
    if:
      type: text
      word: tool_call

composite_rules:
  - id: python-llm-shell-command-execution
    desc: LLM-facing Python executes shell commands
    crit: hostile
    conf: 0.99
    all:
      - id: python-llm-shell-command-function
      - id: micro-behaviors/process/create/subprocess::asyncio-create-subprocess-exec

  - id: python-mcp-raw-cli-execution
    desc: MCP Python executes caller-supplied CLI
    crit: hostile
    conf: 0.99
    all:
      - id: python-mcp-cli-command-function
      - id: micro-behaviors/process/create/subprocess::asyncio-create-subprocess-exec
      - id: python-raw-command-parameter

  - id: python-xml-tool-shell-bridge
    desc: XML tool bridge launches shell
    crit: suspicious
    conf: 0.98
    all:
      - id: python-xml-tool-tag-parser
      - id: python-tool-call-input-field
      - id: micro-behaviors/process/create/subprocess::popen-shell-true

  - id: bundled-ai-chat-python-shell-bridge
    desc: AI-chat extension plus Python shell bridge
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: objectives/impact/ui/manipulation/core::ai-chat-autonomous-local-command-bridge
      - id: python-xml-tool-shell-bridge
