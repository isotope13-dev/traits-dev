# Go-flavored stdio-to-connection wiring for reverse shells:
#   cmd.Stdin / cmd.Stdout = conn
defaults:
  for: [go]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030

traits:
  - id: process-stream-on-conn
    desc: process stdio attached to socket
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(cmd|proc)\.(Stdin|StandardInput)\s*=\s*(conn|socket)'
