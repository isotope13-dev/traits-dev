# Shell pipeline into /bin/sh stdin.
defaults:
  for: [shell]
  platforms: [linux, macos]
  attack: T1059
  mbc: B0030

traits:
  - id: pipe-to-shell-stdin
    desc: pipe stream into /bin/sh stdin
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\|\s*/bin/(ba)?sh\b'
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
      - id: metadata/file/text/catalog::elastic-license-v2
      - type: basename
        regex: '(METADATA|PKG-INFO|README(\..*)?)$'
      - type: text
        substr: "Description-Content-Type: text/markdown"

composite_rules:
  - id: stdio-reopen-revshell
    desc: STDIN reopen on socket plus shell exec
    crit: hostile
    conf: 0.97
    all:
      - id: stdio-reopen-socket
      - id: objectives/command-and-control/reverse-shell/dup::any-shell-exec

  - id: process-stream-revshell
    desc: process stdio attached to conn plus shell exec
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/reverse-shell/dup::any-shell-exec
    any:
      - id: process-stream-on-conn
      - id: process-inputstream-on-conn
