# Shell pipeline into /bin/sh stdin.
defaults:
  for: [shell]
  platforms: [linux, macos]
  attack: T1059
  mbc: B0030

traits:
  - id: pipe-to-shell-stdin
    desc: pipe stream into /bin/sh stdin
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\|\s*/bin/(ba)?sh\b'
    unless:
      - id: metadata/lang/source::linux-kernel-secondary-tree-path
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
      - id: metadata/lang/source::linux-kernel-primary-tree-path
      - id: well-known/tool/detection/llm-scanner/
      - id: metadata/file/catalog/identity::elastic-license-v2
      - type: basename
        regex: '(METADATA|PKG-INFO|README(\..*)?)$'
      - id: metadata/package/manifest/freeform::pkg-description-content-type-markdown

composite_rules:
  - id: stdio-reopen-revshell
    desc: STDIN reopen on socket plus shell exec
    crit: hostile
    conf: 0.97
    all:
      - id: stdio-reopen-socket
      - id: objectives/command-and-control/reverse-shell/dup::any-shell-exec

  - id: process-stream-revshell
    desc: process stdio attached to conn plus shell exec
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/command-and-control/reverse-shell/dup::any-shell-exec
    any:
      - id: process-stream-on-conn
      - id: process-inputstream-on-conn
