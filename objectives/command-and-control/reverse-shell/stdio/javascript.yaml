defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.003
composite_rules:
  - id: js-reverse-shell-spawn
    desc: Node.js reverse shell using net and spawn
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/bridge::spawn-call
      - id: micro-behaviors/communications/socket/connect::net-connect
      - id: micro-behaviors/process/create/shell/spawn::bin-sh

  - id: js-fetched-command-reverse-shell
    desc: Fetched command execution bridged to socket stdio
    crit: hostile
    conf: 0.99
    mbc: B0030.002
    attack: T1059.007
    all:
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/process/create/exec::js-object-exec-call
      - id: micro-behaviors/communications/socket/connect::node-net-socket-connect
      - id: micro-behaviors/process/fd/stdio::node-stream-to-stdin-pipe
      - id: micro-behaviors/process/fd/stdio::node-child-output-to-stream-pipe
    near_bytes: 2048
