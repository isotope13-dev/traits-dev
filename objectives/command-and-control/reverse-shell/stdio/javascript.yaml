defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.003
composite_rules:
  - id: js-reverse-shell-spawn
    desc: Node.js reverse shell using net and spawn
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/shell/bridge::js-spawn
      - id: micro-behaviors/communications/socket/connect::net-connect
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
