# Java/Groovy-flavored stdio-to-connection wiring:
#   p.inputStream = sock
defaults:
  for: [java, groovy, kotlin, scala]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030

traits:
  - id: process-inputstream-on-conn
    desc: inputStream attached to socket
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(p|process)\.inputStream\s*=\s*(s|sock|client)'
