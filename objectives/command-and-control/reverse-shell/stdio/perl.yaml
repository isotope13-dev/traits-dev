# Perl-flavored stdio reopen onto socket: open STDIN, ">&S"
defaults:
  for: [perl]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030

traits:
  - id: stdio-reopen-socket
    desc: STDIN/STDOUT/STDERR reopened onto socket
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bopen\s*\(\s*STD(IN|OUT|ERR)\s*,\s*["''][>&]'
