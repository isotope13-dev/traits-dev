defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1059.007

composite_rules:
  - id: node-websocket-pty-reverse-shell
    desc: WebSocket agent relays PTY input and output
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/backdoor/shell/pty::websocket-pty-remote-command-relay
      - id: objectives/command-and-control/backdoor/shell/pty::websocket-pty-output-handler
      - id: objectives/command-and-control/backdoor/shell/pty::websocket-agent-role-query
    any:
      - id: micro-behaviors/communications/socket/send::javascript-socket-send
      - id: micro-behaviors/communications/http/websocket::websocket
    unless:
      - id: well-known/app/codeplane/
      - id: well-known/lib/opentui/
