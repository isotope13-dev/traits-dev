# PTY Backdoor Detection - C/C++ Source Code
# Detects PTY-based backdoor patterns in C source (openpty + socket + dup2 + /bin/sh)
# ATT&CK: T1059.004 (Unix Shell)
# MBC: B0024 (Remote Access)
defaults:
  platforms: [linux, unix, macos]
  for: [c, cpp]
  mbc: "B0024"
  attack: "T1059.004"
traits:
  - id: port-31337
    desc: Default backdoor port 31337
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '3133[67]\b'
  - id: reverse-remote-shell
    desc: Reverse Remote Shell description
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: "Reverse Remote Shell"
composite_rules:
  # Source-level PTY reverse shell: openpty + socket + dup2 + /bin/sh
  # Complexity: all(3) + any(needs 1) + for(1) = 5 >= 4 HOSTILE
  - id: source-pty-reverse-shell
    desc: PTY reverse shell in C source
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/tty/pty::openpty
      - id: micro-behaviors/communications/socket/connect::connect-symbol
      - id: micro-behaviors/process/fd/dup::dup2
    any:
      - id: micro-behaviors/process/create/shell::bin-sh
      - id: micro-behaviors/process/create/execv::execl-source
      - id: micro-behaviors/process/create/execv::c-exec-variants
    needs: 1
