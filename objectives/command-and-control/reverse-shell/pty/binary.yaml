defaults:
  platforms:
    - linux
    - macos
  for:
    - elf
    - macho
  mbc: B0024
  attack: T1059.004
traits:
  - id: termios-cfmakeraw
    desc: cfmakeraw terminal attribute control symbol
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: cfmakeraw
  - id: termios-cfsetispeed
    desc: cfsetispeed terminal attribute control symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: cfsetispeed
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
      - type: basename
        exact: bindings.node
      - type: basename
        regex: ^node\.napi\.armv[678]\.node$
      - type: basename
        regex: ^node\.napi\.(glibc|musl)\.node$
  - id: termios-cfsetospeed
    desc: cfsetospeed terminal attribute control symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: cfsetospeed
    unless:
      - type: basename
        regex: ^(node-pty|pty)\.node$
      - type: basename
        exact: bindings.node
      - type: basename
        regex: ^node\.napi\.armv[678]\.node$
      - type: basename
        regex: ^node\.napi\.(glibc|musl)\.node$
  - id: pty-device-string
    desc: PTY device path string
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: /dev/pt[msy]
  - id: terminal-type-vt102
    desc: Terminal type vt102 identifier
    crit: component
    conf: 0.8
    if:
      type: text
      regex: ^vt10[02]$
  - id: terminal-type-ansi
    desc: Terminal type ansi identifier
    crit: component
    conf: 0.8
    if:
      type: text
      exact: ansi
  - id: terminal-type-linux
    desc: Terminal type linux identifier
    crit: component
    conf: 0.8
    if:
      type: text
      exact: linux
  - id: terminal-type-dumb
    desc: Terminal type dumb identifier
    crit: component
    conf: 0.8
    if:
      type: text
      exact: dumb
  - id: terminal-type-screen
    desc: Terminal type screen identifier
    crit: component
    conf: 0.8
    if:
      type: text
      exact: screen
composite_rules:
  - id: pty-alloc-symbols
    desc: PTY allocation symbol set
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/process/tty/pty/
  - id: termios-symbols
    desc: Terminal attribute control symbols
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/process/tty/pty::tcgetattr
      - id: micro-behaviors/process/tty/pty::tcsetattr
      - id: termios-cfmakeraw
      - id: termios-cfsetispeed
      - id: termios-cfsetospeed
  - id: terminal-type-string
    desc: Terminal type identifier string (legacy wrapper)
    crit: notable
    conf: 0.8
    any:
      - id: terminal-type-vt102
      - id: micro-behaviors/process/tty/terminal::xterm-ref
      - id: terminal-type-ansi
      - id: terminal-type-linux
      - id: terminal-type-dumb
      - id: terminal-type-screen
  - id: pty-backdoor
    desc: PTY backdoor (interactive remote shell)
    crit: hostile
    conf: 0.95
    for:
      - elf
    all:
      - id: pty-alloc-symbols
      - id: micro-behaviors/communications/socket/
      - id: micro-behaviors/process/fd/dup::dup2
  - id: pty-backdoor-full
    desc: Full PTY backdoor with terminal control
    crit: hostile
    conf: 0.98
    for:
      - elf
    all:
      - id: pty-alloc-symbols
      - id: termios-symbols
      - id: micro-behaviors/communications/socket/
  - id: pty-bind-shell
    desc: PTY bind shell (listens for connections)
    crit: hostile
    conf: 0.95
    for:
      - elf
    all:
      - id: pty-alloc-symbols
      - id: micro-behaviors/communications/socket/
      - id: micro-behaviors/process/fd/dup::dup2
      - id: micro-behaviors/process/create/shell::shell-symbols

  # PTY shell supporting both reverse (connect) and bind (accept) modes in
  # a single ELF binary. Legitimate PTY programs pick one direction:
  # terminal emulators never connect outbound; sshd listens but uses
  # posix_openpt not grantpt+unlockpt; tmux/screen allocate PTYs but
  # never connect. A binary with all of these is an implant.
  # Downgrade on usage/help strings — implants don't ship user-facing docs.
  - id: pty-dual-mode-backdoor
    desc: PTY shell with both reverse and bind shell modes
    crit: hostile
    conf: 0.93
    for: [elf]
    size_min: 32768
    mbc: B0022,B0024
    all:
      - id: micro-behaviors/process/tty/pty::grantpt
      - id: micro-behaviors/process/tty/pty::unlockpt
      - id: micro-behaviors/process/fd/dup::dup2
      - id: micro-behaviors/process/create/direct::execve-import
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/communications/socket/listen::accept-func
      - id: micro-behaviors/communications/socket/bind::bind
    any:
      - id: micro-behaviors/process/create/setsid::import
      - id: objectives/persistence/system/daemon/init::daemon-fork
    downgrade:
      any:
        - type: text
          regex: '[Uu]sage:\s'
        - type: text
          substr: --help
        - type: symbol
          regex: getopt
        - id: metadata/signed/platform::apple
        - id: metadata/signed/platform::microsoft
