defaults:
  platforms:
  - linux
  - macos
  for:
  - elf
  - macho
  mbc: B0024
  attack: T1059.004
traits:
- id: terminal-type-vt102
  desc: Terminal type vt102 identifier
  crit: component
  conf: 0.8
  if:
    type: text
    regex: ^vt10[02]$
- id: terminal-type-ansi
  desc: Terminal type ansi identifier
  crit: component
  conf: 0.8
  if:
    type: text
    exact: ansi
- id: terminal-type-linux
  desc: Terminal type linux identifier
  crit: component
  conf: 0.8
  if:
    type: text
    exact: linux
- id: terminal-type-dumb
  desc: Terminal type dumb identifier
  crit: component
  conf: 0.8
  if:
    type: text
    exact: dumb
- id: terminal-type-screen
  desc: Terminal type screen identifier
  crit: component
  conf: 0.8
  if:
    type: text
    exact: screen
- id: pty-dual-mode-backdoor-cond-0--inline-10025
  desc: Regex component marker
  crit: component
  conf: 0.93
  size_min: 32768
  for: [elf]
  if:
    type: text
    regex: '[Uu]sage:\s'
  count_max: 1010026
- id: pty-dual-mode-backdoor-cond-1--inline-10026
  desc: Regex component marker
  crit: component
  conf: 0.93
  size_min: 32768
  for: [elf]
  if:
    type: text
    substr: --help
  count_max: 1010027
- id: pty-dual-mode-backdoor-cond-2--inline-10027
  desc: Regex component marker
  crit: component
  conf: 0.93
  size_min: 32768
  for: [elf]
  if:
    type: symbol
    substr: getopt
  count_max: 1010028
composite_rules:
- id: terminal-type-string
  desc: Terminal type identifier string (legacy wrapper)
  crit: component
  conf: 0.8
  any:
  - id: terminal-type-vt102
  - id: micro-behaviors/process/tty/terminal::xterm-ref
  - id: terminal-type-ansi
  - id: terminal-type-linux
  - id: terminal-type-dumb
  - id: terminal-type-screen
- id: pty-backdoor
  desc: PTY backdoor (interactive remote shell)
  crit: hostile
  conf: 0.95
  for:
  - elf
  all:
  - id: micro-behaviors/process/tty/pty::pty-allocation-symbols
  - id: micro-behaviors/communications/socket/
  - id: micro-behaviors/process/fd/dup::dup2
- id: pty-backdoor-full
  desc: Full PTY backdoor with terminal control
  crit: hostile
  conf: 0.98
  for:
  - elf
  all:
  - id: micro-behaviors/process/tty/pty::pty-allocation-symbols
  - id: micro-behaviors/process/tty/pty::terminal-attribute-control
  - id: micro-behaviors/communications/socket/
  any:
  - id: micro-behaviors/process/fd/dup::dup2
  - id: micro-behaviors/process/create/shell::shell-symbols
- id: pty-bind-shell
  desc: PTY bind shell (listens for connections)
  crit: hostile
  conf: 0.95
  for:
  - elf
  all:
  - id: micro-behaviors/process/tty/pty::pty-allocation-symbols
  - id: micro-behaviors/communications/socket/
  - id: micro-behaviors/process/fd/dup::dup2
  - id: micro-behaviors/process/create/shell::shell-symbols

  # PTY shell supporting both reverse (connect) and bind (accept) modes in
  # a single ELF binary. Legitimate PTY programs pick one direction:
  # terminal emulators never connect outbound; sshd listens but uses
  # posix_openpt not grantpt+unlockpt; tmux/screen allocate PTYs but
  # never connect. A binary with all of these is an implant.
  # Downgrade on usage/help strings — implants don't ship user-facing docs.
- id: pty-dual-mode-backdoor
  desc: PTY shell with both reverse and bind shell modes
  crit: hostile
  conf: 0.93
  for: [elf]
  size_min: 32768
  mbc: B0022,B0024
  all:
  - id: micro-behaviors/process/tty/pty::grantpt
  - id: micro-behaviors/process/tty/pty::unlockpt
  - id: micro-behaviors/process/fd/dup::dup2
  - id: micro-behaviors/process/create/direct::execve-import
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/communications/socket/listen::accept-func
  - id: micro-behaviors/communications/socket/bind::bind
  any:
  - id: micro-behaviors/process/create/setsid::import
  - id: objectives/persistence/system/daemon/init::daemon-fork
  downgrade:
    any:
    - id: pty-dual-mode-backdoor-cond-0--inline-10025
    - id: pty-dual-mode-backdoor-cond-1--inline-10026
    - id: pty-dual-mode-backdoor-cond-2--inline-10027
    - id: metadata/signed/platform::apple
    - id: metadata/signed/platform::microsoft
