defaults:
  platforms:
    - linux
    - unix
    - macos
    - android
    - ios
    - windows
traits:
  - id: python-socket
    desc: socket module reference
    crit: component
    conf: 0.4
    for:
      - python
    if:
      type: string_value
      substr: socket
  - id: socket-connect-dup
    desc: .connect( socket method
    crit: component
    conf: 0.6
    for:
      - python
    if:
      type: raw
      regex: \.connect\s*\(
    unless:
      - id: metadata/import/python::peewee
      - id: micro-behaviors/data/db/conn/orm::sqlalchemy
      - id: metadata/format/magic::sqlite3
      - id: micro-behaviors/data/db/conn/mongodb::pymongo
      - id: micro-behaviors/data/db/conn/postgresql::psycopg2
      - id: micro-behaviors/data/db/conn/mysql::mysql
  - id: py-stdin-pipe
    desc: stdin= pipe argument (Python)
    crit: component
    conf: 0.6
    for:
      - python
    if:
      type: raw
      regex: stdin\s*=
  - id: py-stdout-pipe
    desc: stdout= pipe argument (Python)
    crit: component
    conf: 0.4
    for:
      - python
    if:
      type: raw
      regex: stdout\s*=
  - id: py-stderr-pipe
    desc: stderr= pipe argument (Python)
    crit: component
    conf: 0.4
    for:
      - python
    if:
      type: raw
      regex: stderr\s*=
  - id: pty-node-module-ref
    desc: node-pty module reference
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: node-pty
  - id: pty-spawn-node
    desc: pty.spawn call (Node.js)
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: pty.spawn
  - id: pty-js-require
    desc: require('pty.js') call
    crit: notable
    conf: 0.7
    attack: T1059.007
    for:
      - javascript
      - typescript
    if:
      type: raw
      substr: require('pty.js')
  - id: net-socket-node
    desc: net.Socket reference
    crit: notable
    conf: 0.4
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: new net.Socket
  - id: socket-connect-dup-node
    desc: socket.connect call
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: socket.connect
  - id: dot-pipe
    desc: .pipe( method call
    crit: notable
    conf: 0.4
    for:
      - python
      - javascript
      - typescript
    if:
      type: raw
      substr: .pipe(
  - id: pipe-constant
    desc: PIPE constant reference
    crit: component
    conf: 0.4
    for:
      - python
    if:
      type: raw
      regex: \.PIPE\b
  - id: socat-exec-sh
    desc: socat EXEC shell pattern
    crit: notable
    conf: 0.8
    for:
      - shell
      - package.json
    if:
      type: string_value
      regex: socat\s+.{0,50}EXEC.{0,20}sh
  - id: socat-tcp-exec
    desc: socat TCP EXEC pattern
    crit: notable
    conf: 0.8
    for:
      - shell
      - package.json
    if:
      type: string_value
      regex: socat\s+.{0,50}TCP.{0,30}EXEC
  - id: socat-pty
    desc: socat PTY pattern
    crit: notable
    conf: 0.8
    for:
      - shell
      - package.json
    if:
      type: string_value
      regex: socat\s+.{0,50}PTY
  - id: telnet-pipe
    desc: telnet piped reverse shell pattern
    crit: notable
    conf: 0.8
    for:
      - shell
      - package.json
    if:
      type: string_value
      regex: telnet\s+\S+\s+\d+\s*\|.{0,50}\|\s*telnet
  - id: mknod-telnet
    desc: mknod telnet reverse shell pattern
    crit: notable
    conf: 0.8
    for:
      - shell
      - package.json
    if:
      type: string_value
      regex: mknod.{0,30}telnet
composite_rules:
  - id: python-pty-module
    desc: Python pty module usage
    crit: notable
    conf: 0.7
    for:
      - python
    any:
      - id: micro-behaviors/process/tty/pty::pty-spawn
      - id: micro-behaviors/process/tty/pty::import-pty
  - id: py-shell-path
    desc: Shell executable path (Python)
    crit: notable
    conf: 0.5
    any:
      - id: micro-behaviors/process/create/shell::bin-sh
      - id: micro-behaviors/process/create/shell::bin-shell
  - id: python-pty
    desc: Python PTY spawn reverse shell
    crit: suspicious
    conf: 0.95
    attack: T1059.006
    for:
      - python
    all:
      - id: python-pty-module
    any:
      - id: py-shell-path
      - id: python-socket
  - id: python-pipe
    desc: Python subprocess pipe arguments
    crit: notable
    conf: 0.6
    for:
      - python
    any:
      - id: py-stdin-pipe
      - id: py-stdout-pipe
      - id: py-stderr-pipe
  - id: python-socket-shell
    desc: Python socket-based reverse shell
    crit: suspicious
    conf: 0.95
    attack: T1059.006
    for:
      - python
    all:
      - id: micro-behaviors/communications/socket/connect::socket-socket-call
      - id: objectives/command-and-control/reverse-shell/pty::socket-connect-dup
      - id: objectives/evasion/fileless/memory::subprocess-mod
      - id: python-pipe
    downgrade:
      any:
        - type: raw
          substr: subprocess.PIPE
  - id: node-pty-module
    desc: Node.js PTY module usage
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    any:
      - id: pty-node-module-ref
      - id: pty-spawn-node
      - id: pty-js-require
  - id: node-socket
    desc: Node.js socket connection
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
    any:
      - id: net-socket-node
      - id: objectives/command-and-control/reverse-shell/pty::socket-connect-dup-node
      - id: micro-behaviors/communications/http/websocket::websocket-class
  - id: node-pty
    desc: Node.js PTY-based reverse shell
    crit: suspicious
    conf: 0.95
    attack: T1059.007
    for:
      - javascript
      - typescript
    all:
      - id: node-pty-module
      - id: node-socket
  - id: pipe-methods
    desc: Pipe methods
    crit: notable
    conf: 0.5
    any:
      - id: dot-pipe
      - id: pipe-constant
  - id: socket-connection
    desc: Socket connection pattern
    crit: notable
    conf: 0.6
    any:
      - id: python-socket
      - id: objectives/command-and-control/reverse-shell/pty::socket-connect-dup
  - id: stdio-socket
    desc: Stdin/stdout piped to socket (reverse
    crit: suspicious
    conf: 0.9
    attack: T1059
    for:
      - python
      - javascript
      - typescript
    all:
      - id: micro-behaviors/process/fd/stdio::stdio-refs
      - id: pipe-methods
      - id: socket-connection
    downgrade:
      any:
        - id: metadata/quality/testing::unittest-module
        - type: raw
          substr: subprocess.PIPE
  - id: interactive-markers
    desc: Interactive shell session markers
    crit: notable
    conf: 0.7
    attack: T1059
    for:
      - python
      - javascript
      - shell
    needs: 2
    any:
      - id: micro-behaviors/process/tty/terminal/
      - id: micro-behaviors/fs/path/device/terminal::dev-tty
  - id: socat
    desc: Socat reverse shell pattern
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    for:
      - shell
      - package.json
    any:
      - id: socat-exec-sh
      - id: socat-tcp-exec
      - id: socat-pty
  - id: telnet-comp
    desc: Telnet-based reverse shell
    crit: suspicious
    conf: 0.95
    attack: T1059.004
    for:
      - shell
      - package.json
    any:
      - id: telnet-pipe
      - id: mknod-telnet
  - id: python-reverse-shell-c2
    desc: Python reverse shell with hardcoded C2 IP
    crit: hostile
    conf: 0.99
    attack: T1059.006
    for:
      - python
    all:
      - id: python-socket-shell
      - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
