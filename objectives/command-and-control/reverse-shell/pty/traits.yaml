defaults:
  platforms:
  - linux
  - windows
  - macos
traits:
- id: python-socket
  desc: socket module reference
  crit: component
  conf: 0.4
  for:
  - python
  if:
    type: string_literal
    substr: socket
- id: socket-connect-dup
  desc: .connect( socket method
  crit: component
  conf: 0.6
  for:
  - python
  if:
    type: text
    regex: \.connect\s*\(
  unless:
  - id: metadata/import/python::peewee
  - id: micro-behaviors/data/db/conn/orm::sqlalchemy
  - id: metadata/file/magic::sqlite3
  - id: micro-behaviors/data/db/conn/mongodb::pymongo
  - id: micro-behaviors/data/db/conn/postgresql::psycopg2
  - id: micro-behaviors/data/db/conn/mysql::mysql
- id: py-stdin-pipe
  desc: stdin= pipe argument (Python)
  crit: component
  conf: 0.6
  for:
  - python
  - pyc
  if:
    type: text
    regex: stdin\s*=
- id: py-stdout-pipe
  desc: stdout= pipe argument (Python)
  crit: component
  conf: 0.4
  for:
  - python
  - pyc
  if:
    type: text
    regex: stdout\s*=
- id: py-stderr-pipe
  desc: stderr= pipe argument (Python)
  crit: component
  conf: 0.4
  for:
  - python
  - pyc
  if:
    type: text
    regex: stderr\s*=
- id: pyc-magic-raw
  desc: Python bytecode magic bytes
  crit: component
  conf: 0.95
  for:
  - pyc
  if:
    type: hex
    pattern: ?? 0D 0D 0A
    offset: 0
- id: pyc-module-marker-raw
  desc: Python bytecode module marker
  crit: component
  conf: 0.8
  for:
  - pyc
  if:
    type: text
    substr: <module>
- id: py-popen-pipe-block
  desc: Popen PIPE communicate block
  crit: notable
  conf: 0.8
  for:
  - python
  - pyc
  if:
    type: raw
    regex: Popen.{0,24}PIPE.{0,24}communicate
- id: py-shell-cwd-block
  desc: stdout stderr shell cwd block
  crit: suspicious
  conf: 0.8
  for:
  - python
  - pyc
  if:
    type: text
    regex: stdout.{0,16}stderr.{0,16}shell.{0,16}cwd
- id: py-first-connection-banner
  desc: First Connection banner string
  crit: suspicious
  conf: 0.8
  for:
  - python
  - pyc
  if:
    type: text
    substr: First Connection
- id: py-bytecode-external-ip
  desc: External IPv4 in Python bytecode
  crit: notable
  conf: 0.85
  for:
  - pyc
  if:
    type: raw
    regex: ([0-9]{1,3}\.){3}[0-9]{1,3}
    is: external_ip
- id: socket-connect-dup-node
  desc: socket.connect call
  crit: notable
  conf: 0.6
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    substr: socket.connect
- id: dot-pipe
  desc: .pipe( method call
  crit: notable
  conf: 0.4
  for:
  - python
  if:
    type: text
    substr: .pipe(
- id: pipe-constant
  desc: PIPE constant reference
  crit: component
  conf: 0.4
  for:
  - python
  if:
    type: text
    regex: \.PIPE\b
- id: socat-exec-sh
  desc: socat EXEC shell pattern
  crit: notable
  conf: 0.8
  for:
  - shell
  - package.json
  if:
    type: text
    regex: socat\s+.{0,50}EXEC.{0,20}sh
- id: shell-python-pty-spawn-bash
  desc: Shell promotes Python PTY bash
  crit: suspicious
  conf: 0.96
  attack: T1059.006
  for:
  - shell
  - text
  if:
    type: text
    regex: 'python3?\s+-c\s+[''"]import\s+pty;\s*pty\.spawn\([''"]/bin/bash'
- id: shell-python-c-option
  desc: Shell runs Python command string
  crit: component
  conf: 0.9
  attack: T1059.006
  for:
  - shell
  - text
  if:
    type: text
    regex: 'python3?\s+-c\s+'
- id: socat-tcp-exec
  desc: socat TCP EXEC pattern
  crit: notable
  conf: 0.8
  for:
  - shell
  - package.json
  if:
    type: text
    regex: socat\s+.{0,50}TCP.{0,30}EXEC
- id: socat-pty
  desc: socat PTY pattern
  crit: notable
  conf: 0.8
  for:
  - shell
  - package.json
  if:
    type: text
    regex: socat\s+.{0,50}PTY
- id: telnet-pipe
  desc: telnet piped reverse shell pattern
  crit: notable
  conf: 0.8
  for:
  - shell
  - package.json
  if:
    type: text
    regex: telnet\s+\S+\s+\d+\s*\|.{0,50}\|\s*telnet
- id: mknod-telnet
  desc: mknod telnet reverse shell pattern
  crit: notable
  conf: 0.8
  for:
  - shell
  - package.json
  if:
    type: text
    regex: mknod.{0,30}telnet
- id: af-unix-socket
  desc: AF_UNIX socket reference
  crit: component
  for: [python]
  if:
    type: text
    substr: socket.AF_UNIX
- id: python-socket-shell-cond-0--inline-10052
  desc: Regex component marker
  crit: component
  conf: 0.95
  for:
  - python
  if:
    type: text
    substr: subprocess.PIPE
  count_max: 1010053
- id: stdio-socket-cond-1--inline-10054
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [scripts, binaries]
  if:
    type: text
    substr: subprocess.PIPE
  count_max: 1010055
composite_rules:
- id: python-pty-module
  desc: Python pty module usage
  crit: notable
  conf: 0.7
  for:
  - python
  any:
  - id: micro-behaviors/process/tty/pty::pty-spawn
  - id: micro-behaviors/process/tty/pty::import-pty
- id: py-shell-path
  desc: Shell executable path (Python)
  crit: notable
  conf: 0.5
  any:
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  - id: micro-behaviors/process/create/shell/invoke::bin-shell
  - id: micro-behaviors/process/create/shell/invoke::python-bash-path
- id: python-pty
  desc: Python PTY spawn reverse shell
  crit: suspicious
  conf: 0.95
  attack: T1059.006
  for:
  - python
  all:
  - id: python-pty-module
  - id: python-socket
  any:
  - id: py-shell-path
- id: python-pipe
  desc: Python subprocess pipe arguments
  crit: notable
  conf: 0.6
  for:
  - python
  - pyc
  any:
  - id: py-stdin-pipe
  - id: py-stdout-pipe
  - id: py-stderr-pipe
- id: python-socket-shell
  desc: Python socket-based reverse shell
  crit: suspicious
  conf: 0.95
  attack: T1059.006
  for:
  - python
  all:
  - id: micro-behaviors/communications/socket/connect::socket-socket-call
  - id: objectives/command-and-control/reverse-shell/pty::socket-connect-dup
  - id: objectives/evasion/fileless/memory::subprocess-mod
  - id: python-pipe
  - id: py-shell-path
  unless:
  - id: af-unix-socket
  downgrade:
    any:
    - id: python-socket-shell-cond-0--inline-10052
- id: python-command-loop-shell
  desc: Python socket command loop shell
  crit: suspicious
  conf: 0.96
  attack: T1059.006
  for:
  - pyc
  all:
  - id: pyc-magic-raw
  - id: pyc-module-marker-raw
  - id: py-popen-pipe-block
  - id: py-shell-cwd-block
  - id: py-first-connection-banner
- id: node-pty-module
  desc: Node.js PTY module usage
  crit: component
  conf: 0.7
  for:
  - javascript
  - typescript
  any:
  - id: micro-behaviors/process/tty/pty::node-pty-module-ref
  - id: micro-behaviors/process/tty/pty::node-pty-spawn
  - id: micro-behaviors/process/tty/pty::pty-js-require
- id: node-socket
  desc: Node.js socket connection
  crit: notable
  conf: 0.6
  for:
  - javascript
  - typescript
  any:
  - id: objectives/command-and-control/reverse-shell/dup::new-net-socket
  - id: objectives/command-and-control/reverse-shell/pty::socket-connect-dup-node
  - id: micro-behaviors/communications/http/websocket::websocket-class
- id: node-pty
  desc: Node.js PTY-based reverse shell
  crit: suspicious
  conf: 0.95
  attack: T1059.007
  for:
  - javascript
  - typescript
  all:
  - id: node-pty-module
  - id: node-socket
  unless:
  - id: well-known/app/codeplane::runtime-context
  - id: well-known/lib/opentui::runtime-context
- id: pipe-methods
  desc: Pipe methods
  crit: notable
  conf: 0.5
  any:
  - id: dot-pipe
  - id: pipe-constant
- id: socket-connection
  desc: Socket connection pattern
  crit: notable
  conf: 0.6
  any:
  - id: micro-behaviors/communications/socket/connect::socket-connect-call
  - id: objectives/command-and-control/reverse-shell/pty::socket-connect-dup
- id: stdio-socket
  desc: Stdin/stdout piped to socket (reverse
  crit: suspicious
  conf: 0.9
  attack: T1059
  for: [scripts, binaries]
  all:
  - id: micro-behaviors/process/fd/stdio::stdio-refs
  - id: pipe-methods
  - id: socket-connection
  downgrade:
    any:
    - id: metadata/package/testing/presence/harness::python-test-file
    - id: metadata/package/testing/presence/harness::unittest-module
    - id: stdio-socket-cond-1--inline-10054
    - id: objectives/anti-static/obfuscation/payload/container::source-map-extension
    - id: metadata/file/text/format::sourcemap-sources-content
- id: interactive-markers
  desc: Interactive shell session markers
  crit: baseline
  conf: 0.7
  attack: T1059
  for: [scripts, binaries]
  needs: 2
  any:
  - id: micro-behaviors/process/tty/terminal/
  - id: micro-behaviors/fs/path/device/terminal::dev-tty
  unless:
  - id: well-known/app/sq::go-module-path
- id: socat
  desc: Socat reverse shell pattern
  crit: suspicious
  conf: 0.95
  attack: T1059.004
  for:
  - shell
  - package.json
  any:
  - id: socat-exec-sh
  - id: socat-tcp-exec
  - id: socat-pty
- id: shell-python-pty-promotion
  desc: Python PTY shell promotion
  crit: hostile
  conf: 0.98
  attack: T1059.006
  for:
  - shell
  - text
  all:
  - id: shell-python-c-option
  - id: shell-python-pty-spawn-bash
- id: telnet-comp
  desc: Telnet-based reverse shell
  crit: suspicious
  conf: 0.95
  attack: T1059.004
  for:
  - shell
  - package.json
  any:
  - id: telnet-pipe
  - id: mknod-telnet
- id: python-reverse-shell-c2
  desc: Python reverse shell with hardcoded C2 IP
  crit: hostile
  conf: 0.99
  attack: T1059.006
  for:
  - python
  all:
  - id: python-socket-shell
  - id: objectives/command-and-control/infrastructure/ip::hardcoded-ipv4-script
- id: python-command-loop-c2
  desc: Python socket command shell with hardcoded C2
  crit: hostile
  conf: 0.99
  attack: T1059.006
  for:
  - pyc
  all:
  - id: python-command-loop-shell
  - id: py-bytecode-external-ip
