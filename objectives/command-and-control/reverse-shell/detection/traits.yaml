defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: revshell-string
    desc: revshell string
    crit: suspicious
    conf: 0.7
    attack: T1059
    if:
      type: text
      word: revshell
  - id: elastic-license
    desc: Elastic License v2 (detection rule
    crit: notable
    conf: 0.3
    if:
      type: text
      substr: '"license": "Elastic License v2"'
composite_rules:
  - id: reverse-shell-match
    desc: Matches reverse shell string patterns
    crit: notable
    conf: 0.7
    attack: T1059
    any:
      - id: micro-behaviors/data/text/malware/terms::generic-term-reverse-shell
      - id: revshell-string
  - id: reverse-shell-comp
    desc: References a reverse shell
    crit: suspicious
    conf: 0.66
    attack: T1059
    all:
      - id: reverse-shell-match
    unless:
      - id: elastic-license
  - id: combo-reverse-shell
    desc: Classic reverse shell pattern (socket
    crit: hostile
    mbc: B0030.002
    attack: T1059
    conf: 0.95
    platforms:
      - unix
    all:
      - id: micro-behaviors/communications/socket/connect::connect
      - id: objectives/command-and-control/reverse-shell/socket::python-dup2
    any:
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
      - id: micro-behaviors/process/create/shell/invoke::bin-shell
    downgrade:
      any:
        - id: micro-behaviors/dylib/library/family::system-lib-marker
        - id: micro-behaviors/dylib/library/family::shell-interpreter
        - id: micro-behaviors/dylib/library/family::debugger-tool-marker
  - id: bind-shell
    desc: Bind shell pattern with socket listener and shell launch
    crit: suspicious
    mbc: B0030.003
    attack: T1059
    conf: 0.95
    for: [scripts, binaries, c, cpp]
    size_max: 500000
    near_lines: 80
    all:
      - id: micro-behaviors/communications/socket/bind/function::bind
      - id: micro-behaviors/communications/socket/listen::listen
    any:
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
      - id: micro-behaviors/process/create/shell/invoke::bin-shell
      - id: micro-behaviors/process/create/shell/invoke::system-fn
    unless:
      - id: micro-behaviors/process/fork/clone::daemon-dup
    downgrade:
      any:
        - id: metadata/signed/platform::apple
        - id: micro-behaviors/dylib/library/family::debugger-tool-marker
        - id: micro-behaviors/dylib/library/family::system-lib-marker
        - id: micro-behaviors/dylib/library/family::shell-interpreter
        - id: objectives/persistence/system/daemon/init::unix-daemon-persistence
        - id: metadata/package/help::documented-cli-binary
  - id: python-redirection
    desc: Python shell redirection (pty/dup2)
    crit: suspicious
    any:
      - id: objectives/command-and-control/reverse-shell/socket::python-pty-spawn
      - id: objectives/command-and-control/reverse-shell/socket::python-dup2
  - id: syscall-reverse-shell-linux
    desc: Linux syscall reverse shell (socket+dup+execve)
    crit: hostile
    mbc: B0030.002
    attack: T1059
    conf: 0.9
    platforms: [linux]
    for: [elf]
    all:
      - id: micro-behaviors/communications/socket/create::socket-create
      - id: micro-behaviors/communications/socket/create::socket-connect
      - id: micro-behaviors/process/create/shell/fd::syscall-dup-redirect-linux
      - id: micro-behaviors/process/create/shell/fd::syscall-execve-linux
  - id: syscall-reverse-shell-macos
    desc: macOS syscall reverse shell (socket+dup+execve)
    crit: hostile
    mbc: B0030.002
    attack: T1059
    conf: 0.9
    platforms: [macos]
    for: [macho]
    all:
      - id: micro-behaviors/communications/socket/create::socket-socket-macos
      - id: micro-behaviors/communications/socket/create::socket-connect-macos
      - id: micro-behaviors/process/create/shell/fd::syscall-dup-redirect-macos
      - id: micro-behaviors/process/create/shell/fd::syscall-execve-macos
  - id: python-reverse-shell
    desc: Python reverse shell detected (socket
    crit: hostile
    mbc: B0022
    attack: T1059
    conf: 0.98
    near_lines: 20
    all:
      - id: objectives/command-and-control/reverse-shell/socket::python-socket-connect
      - id: python-redirection
  - id: python-fd-redirect-shell
    desc: Python socket shell FD redirection
    crit: hostile
    mbc: B0030
    attack: T1059.006
    conf: 0.98
    platforms: [unix]
    for: [python]
    near_lines: 80
    all:
      - id: micro-behaviors/process/create/system::python-os-system
      - id: micro-behaviors/process/create/shell/invoke::bin-sh-interactive
      - id: micro-behaviors/process/create/shell/fd::shell-stdin-fd-redirect
      - id: objectives/command-and-control/reverse-shell/socket::python-fileno
    any:
      - id: objectives/command-and-control/backdoor/shell/socket::python-connect-call
      - id: objectives/command-and-control/backdoor/shell/socket::python-bind-call
