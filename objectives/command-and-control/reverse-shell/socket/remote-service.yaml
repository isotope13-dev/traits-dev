# Remote Shell Backdoor Installation
# Detects installation of telnet and SSH backdoors for persistent access
# ATT&CK: T1021.004 (Remote Services: SSH)
# MBC: E1037 (Communication)
defaults:
  attack: T1021.004
  platforms: [unix, android, ios]
  for: [elf, shell]
traits:
  - id: telnet-basename
    desc: Filename is telnet client
    crit: component
    if:
      type: basename
      exact: telnet
  - id: telnetd-basename
    desc: Filename is telnet daemon
    crit: component
    if:
      type: basename
      exact: telnetd
  # === SSH Backdoor ===
  # Removed sshd-service duplicate - use micro-behaviors/os/service/remote::sshd-ref (same pattern, canonical location)
  - id: dropbear-lightweight-ssh
    desc: "Dropbear SSH server"
    crit: suspicious
    conf: 0.85
    if:
      id: micro-behaviors/os/service/remote::dropbear-ref
      # === Shell Access ===
composite_rules:
  - id: telnet-service
    desc: "Telnet service for remote access"
    crit: notable
    conf: 0.8
    all:
      - id: micro-behaviors/communications/socket/telnet::telnet
    any:
      # Service-side telnet should also expose server socket behavior.
      - id: micro-behaviors/communications/socket/listen::listen-sym
      - id: micro-behaviors/communications/socket/listen::accept-sym
      - id: micro-behaviors/communications/socket/listen::accept64-sym
      - id: micro-behaviors/os/service/daemon::telnetd
    unless:
      # Exclude curl/libcurl which supports telnet as a client protocol.
      - id: micro-behaviors/communications/http/download/curl::curl-easy-init
      - id: telnet-basename
    downgrade:
      any:
        # Large service mesh / infrastructure binaries legitimately reference telnet.
        - id: metadata/binary/metrics::massive-executable
  - id: telnetd-daemon
    desc: "Telnet daemon for remote access"
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/os/service/daemon::telnetd
    any:
      # Escalate only when the binary also looks like a socket service rather
      # than a client or help text bundle that mentions telnetd.
      - id: micro-behaviors/communications/socket/listen::listen-sym
      - id: micro-behaviors/communications/socket/listen::accept-sym
      - id: micro-behaviors/communications/socket/listen::accept64-sym
    unless:
      # A real telnetd binary should stay notable via the daemon capability,
      # not escalate to a reverse-shell objective on name alone.
      - id: telnetd-basename
  - id: telnet-backdoor-setup
    desc: "Telnet backdoor setup"
    crit: suspicious
    conf: 0.9
    mbc: "E1037"
    any:
      - id: telnet-service
      - id: telnetd-daemon
  - id: ssh-backdoor-setup
    desc: "SSH backdoor setup"
    crit: suspicious
    conf: 0.9
    mbc: "E1037"
    any:
      - id: micro-behaviors/os/service/remote::sshd-ref
      - id: dropbear-lightweight-ssh
  - id: remote-shell-backdoor
    desc: "Remote shell backdoor"
    crit: suspicious
    conf: 0.9
    mbc: "E1037"
    all:
      - id: telnet-backdoor-setup
      - id: ssh-backdoor-setup
  - id: mirai-telnet-ssh-backdoor
    desc: "Mirai remote shell backdoor"
    crit: hostile
    conf: 0.95
    mbc: "E1037"
    all:
      - id: well-known/malware/botnet/mirai/
      - id: remote-shell-backdoor
