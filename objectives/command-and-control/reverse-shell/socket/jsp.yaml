---
defaults:
  platforms:
  - windows
  - unix
  for:
  - php
  - java
  - class
  - html
  - csharp
  mbc: B0030
  attack: T1505.003
traits:
- id: jsp-socket-exec-loop
  desc: Java socket command execution loop
  crit: suspicious
  conf: 0.9
  for:
  - java
  - class
  if:
    type: text
    regex: "(?s)new\\s+Socket.{0,240}in\\.read.{0,240}exec\\("
- id: jsp-socket-whoami-banner
  desc: Java socket sends whoami banner
  crit: suspicious
  conf: 0.88
  for:
  - java
  - class
  if:
    type: text
    regex: (?s)getOutputStream.{0,160}exec\("whoami"\)
- id: jsp-config-host-port-shell
  desc: Java config driven shell connection
  crit: suspicious
  conf: 0.9
  for:
  - java
  - class
  if:
    type: text
    regex: (?s)config\.properties.{0,240}getProperty\("host"\)
composite_rules:
- id: jsp-reverse-shell
  desc: JSP reverse shell command loop
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/communications/socket/create::java-socket-create
  - id: micro-behaviors/process/create/spawn::java-runtime-exec-source
  - id: jsp-socket-exec-loop
  any:
  - id: jsp-socket-whoami-banner
  - id: jsp-config-host-port-shell
