defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  attack: T1059
traits:
  - id: new-net-socket
    desc: new net.Socket creation
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: new net.Socket
  - id: on-data-event
    desc: Socket data event handler
    crit: component
    conf: 0.78
    if:
      type: text
      regex: '\.on\(["'']data["'']'
  - id: exec-function
    desc: child_process exec reference
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\b(exec|execSync)\s*\('
  - id: cmd-exe-string
    desc: cmd.exe shell string
    crit: component
    conf: 0.75
    if:
      type: text
      word: cmd.exe
  - id: rfc1918-host-string
    desc: RFC1918 host string
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)'
composite_rules:
  - id: socket-with-exec
    desc: Socket combined with command execution
    crit: suspicious
    conf: 0.9
    all:
      - id: new-net-socket
      - id: exec-function
    any:
      - id: on-data-event
      - id: micro-behaviors/data/text/keywords::pipe
  - id: cmd-shell-rfc1918-bridge
    desc: cmd.exe shell to hardcoded RFC1918 host
    crit: hostile
    conf: 0.95
    all:
      - id: socket-with-exec
      - id: cmd-exe-string
      - id: rfc1918-host-string
