composite_rules:
  - id: net-socket
    desc: Net socket creation (potential reverse
    crit: notable
    conf: 0.8
    for:
      - javascript
      - typescript
    any:
      - id: net-socket-string
      - id: new-net-socket
      - id: net-createConnection
      - id: net-connect
  - id: exec-function
    desc: Command execution function
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    any:
      - id: micro-behaviors/process/create/shell/lang::js-spawn
      - id: objectives/command-and-control/reverse-shell/socket::exec-call-dup
      - id: objectives/command-and-control/reverse-shell/socket::execSync-call-dup
      - id: spawnSync-call
  - id: on-data-event
    desc: Data event handler
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
    any:
      - id: on-data-event-single
      - id: on-data-event-double
  - id: lock-pattern
    desc: Lock file pattern
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
    any:
      - id: dot-lock-string
      - id: lockfile-string
  - id: http-response-pattern
    desc: HTTP response data handling (not
    crit: notable
    conf: 0.5
    for:
      - javascript
      - typescript
    any:
      - id: res-on-data
      - id: response-on-data
      - id: https-get-call
      - id: http-get-call
  - id: node-comp
    desc: Node.js reverse shell pattern (net
    crit: suspicious
    conf: 0.85
    for:
      - javascript
      - typescript
    all:
      - id: net-socket
      - id: micro-behaviors/process/create/shell/lang::child-process-require
      - id: exec-function
      - id: micro-behaviors/data/text/keywords::pipe
  - id: socket-with-exec
    desc: Socket combined with command execution
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1059
    for:
      - javascript
      - typescript
    all:
      - id: net-socket
      - id: exec-function
  - id: lock-file
    desc: Lock file for single instance
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    all:
      - id: lock-pattern
      - id: existsSync-call
      - id: writeFileSync-call
  - id: data-event-exec
    desc: Socket data event with command
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1059
    for:
      - javascript
      - typescript
    all:
      - id: net-socket
      - id: on-data-event
      - id: exec-function
    none:
      - id: http-response-pattern
  - id: ngrok-tunnel-comp
    desc: Ngrok tunnel endpoint (C2 tunneling)
    crit: suspicious
    conf: 0.95
    mbc: C0002
    attack: T1572
    for:
      - javascript
      - typescript
    any:
      - id: objectives/command-and-control/infrastructure/domain::ngrok-io-endpoint
      - id: objectives/command-and-control/infrastructure/domain::ngrok-free-app-endpoint
      - id: tcp-ngrok
  - id: tunnel-service-comp
    desc: Tunneling service endpoint
    crit: suspicious
    conf: 0.85
    attack: T1572
    for:
      - javascript
      - typescript
    any:
      - id: objectives/command-and-control/infrastructure/domain/tunnel/
