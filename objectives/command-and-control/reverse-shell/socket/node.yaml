defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
traits:
  - id: net-socket-string
    desc: net.Socket string reference
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: net.Socket
  - id: new-net-socket
    desc: new net.Socket creation
    crit: notable
    conf: 0.7
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]node_modules[\\/]
    if:
      type: text
      substr: new net.Socket
  - id: net-createConnection
    desc: net.createConnection call
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: net.createConnection
  - id: net-createServer
    desc: net.createServer call
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: net.createServer
  - id: net-connect
    desc: net.connect call
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: call
      exact: net.connect
  - id: connect-port-host
    desc: connect call with port and host
    crit: notable
    conf: 0.9
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            property: (property_identifier) @meth
          )
          arguments: (arguments
            (number) @port
            (string (string_fragment) @host)
          )
          (#eq? @meth "connect")
        )
  - id: connect-rfc1918-host
    desc: connect call to RFC1918 host
    crit: notable
    conf: 0.92
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            property: (property_identifier) @meth
          )
          arguments: (arguments
            (number)
            (string (string_fragment) @host)
          )
          (#eq? @meth "connect")
          (#match? @host "^(10\\.|192\\.168\\.|172\\.(1[6-9]|2[0-9]|3[0-1])\\.)")
        )
  - id: listen-call
    desc: listen() call
    crit: notable
    conf: 0.7
    unless:
      - type: basename
        regex: (^|[\\/])builtin-plugins[\\/]tabby-ssh[\\/]node_modules[\\/]
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-fixtures
      - type: basename
        regex: (^|[\\/])node_modules[\\/]node-pty[\\/]
      - type: basename
        regex: '^test-(server|client)\.js$'
      - type: text
        substr: "server.listen(0, 'localhost'"
    not:
      - regex: \.listen\(0,\s*['"](127\.0\.0\.1|localhost)['"]
      - substr: ".listen(0,"
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            property: (property_identifier) @meth
          )
          (#eq? @meth "listen")
        )
  - id: shell-platform-switch
    desc: Platform-switched shell selection
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: process\.platform\.match\(.{0,40}\).{0,80}cmd\.exe
  - id: argv-length-3
    desc: argv length equals three
    crit: component
    conf: 0.95
    if:
      type: text
      substr: argv.length==3

  - id: argv-length-4
    desc: argv length equals four
    crit: component
    conf: 0.95
    if:
      type: text
      substr: argv.length==4
  - id: exec-cmd-exe
    desc: exec launches cmd.exe
    crit: notable
    conf: 0.95
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (identifier) @fn
          arguments: (arguments
            (string (string_fragment) @cmd)
          )
          (#eq? @fn "exec")
          (#eq? @cmd "cmd.exe")
        )
  - id: pipe-to-shell-stdin
    desc: Pipes socket into shell stdin
    crit: component
    conf: 0.95
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            property: (property_identifier) @pipe
          )
          arguments: (arguments
            (member_expression
              property: (property_identifier) @fd
            )
          )
          (#eq? @pipe "pipe")
          (#eq? @fd "stdin")
        )
  - id: shell-stdin-resume
    desc: Resumes shell stdin stream
    crit: component
    conf: 0.9
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (member_expression
              property: (property_identifier) @fd
            )
            property: (property_identifier) @meth
          )
          (#eq? @fd "stdin")
          (#eq? @meth "resume")
        )
  - id: shell-stdout-pipe
    desc: Pipes shell stdout to socket
    crit: component
    conf: 0.95
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (member_expression
              property: (property_identifier) @fd
            )
            property: (property_identifier) @pipe
          )
          (#eq? @fd "stdout")
          (#eq? @pipe "pipe")
        )
  - id: shell-stdout-write-bridge
    desc: Shell stdout writes to socket
    crit: component
    conf: 0.98
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (member_expression
              property: (property_identifier) @fd
            )
            property: (property_identifier) @on
          )
          arguments: (arguments
            (string (string_fragment) @event)
            (function_expression
              parameters: (formal_parameters (identifier) @chunk)
              body: (statement_block
                (expression_statement
                  (call_expression
                    function: (member_expression
                      object: (identifier) @sock
                      property: (property_identifier) @write
                    )
                    arguments: (arguments (identifier) @chunk2)
                  )
                )
              )
            )
          )
          (#eq? @fd "stdout")
          (#eq? @on "on")
          (#eq? @event "data")
          (#eq? @write "write")
          (#eq? @chunk @chunk2)
        )
  - id: shell-stderr-pipe
    desc: Pipes shell stderr to socket
    crit: component
    conf: 0.95
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (member_expression
              property: (property_identifier) @fd
            )
            property: (property_identifier) @pipe
          )
          (#eq? @fd "stderr")
          (#eq? @pipe "pipe")
        )
  - id: shell-stderr-write-bridge
    desc: Shell stderr writes to socket
    crit: component
    conf: 0.98
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (member_expression
              property: (property_identifier) @fd
            )
            property: (property_identifier) @on
          )
          arguments: (arguments
            (string (string_fragment) @event)
            (function_expression
              parameters: (formal_parameters (identifier) @chunk)
              body: (statement_block
                (expression_statement
                  (call_expression
                    function: (member_expression
                      object: (identifier) @sock
                      property: (property_identifier) @write
                    )
                    arguments: (arguments (identifier) @chunk2)
                  )
                )
              )
            )
          )
          (#eq? @fd "stderr")
          (#eq? @on "on")
          (#eq? @event "data")
          (#eq? @write "write")
          (#eq? @chunk @chunk2)
        )
  - id: socket-data-to-stdin-write
    desc: Socket data written to stdin
    crit: component
    conf: 0.98
    if:
      type: ast
      language: javascript
      query: |
        (call_expression
          function: (member_expression
            object: (identifier) @sock
            property: (property_identifier) @on
          )
          arguments: (arguments
            (string (string_fragment) @event)
            (function_expression
              parameters: (formal_parameters (identifier) @chunk)
              body: (statement_block
                (expression_statement
                  (call_expression
                    function: (member_expression
                      object: (member_expression
                        property: (property_identifier) @fd
                      )
                      property: (property_identifier) @write
                    )
                    arguments: (arguments (identifier) @chunk2)
                  )
                )
              )
            )
          )
          (#eq? @on "on")
          (#eq? @event "data")
          (#eq? @fd "stdin")
          (#eq? @write "write")
          (#eq? @chunk @chunk2)
        )
  - id: shell-banner-write
    desc: Shell connected banner write
    crit: component
    conf: 0.9
    if:
      type: string_literal
      substr: "shell : connected"
  - id: execSync-call-dup
    desc: execSync function call
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: call
      exact: execSync
  - id: spawnSync-call
    desc: spawnSync function call
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: call
      exact: spawnSync
  - id: on-data-event-single
    desc: .on('data' event handler
    crit: component
    conf: 0.5
    if:
      type: text
      substr: .on('data'
  - id: on-data-event-double
    desc: .on("data" event handler
    crit: component
    conf: 0.5
    if:
      type: text
      substr: .on("data"
  - id: dot-lock-string
    desc: .lock file extension
    crit: component
    conf: 0.5
    if:
      type: string_literal
      substr: .lock
  - id: lockfile-string
    desc: lockfile string
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      substr: lockfile
  - id: existsSync-call
    desc: existsSync function call
    crit: notable
    conf: 0.5
    if:
      type: ast
      kind: call
      exact: existsSync
  - id: writeFileSync-call
    desc: writeFileSync function call
    crit: notable
    conf: 0.5
    if:
      type: ast
      kind: call
      exact: writeFileSync
  - id: tcp-ngrok
    desc: tcp.ngrok endpoint
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      substr: tcp.ngrok
  - id: res-on-data
    desc: res.on('data' HTTP response pattern
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: res.on('data'
  - id: response-on-data
    desc: response.on('data' HTTP response pattern
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: response.on('data'
  - id: https-get-call
    desc: https.get call
    crit: notable
    conf: 0.5
    if:
      type: ast
      kind: call
      exact: https.get
  - id: http-get-call
    desc: http.get call
    crit: notable
    conf: 0.5
    if:
      type: ast
      kind: call
      exact: http.get
composite_rules:
  - id: net-socket
    desc: Net socket creation (potential reverse
    crit: notable
    conf: 0.8
    any:
      - id: net-socket-string
      - id: new-net-socket
      - id: net-createConnection
      - id: net-createServer
      - id: net-connect
      - id: connect-port-host
  - id: exec-function
    desc: Command execution function
    crit: notable
    conf: 0.7
    any:
      - id: micro-behaviors/process/create/shell/lang::js-spawn
      - id: micro-behaviors/process/create/shell/lang::exec-call
      - id: objectives/command-and-control/reverse-shell/socket::execSync-call-dup
      - id: spawnSync-call
  - id: on-data-event
    desc: Data event handler
    crit: notable
    conf: 0.5
    any:
      - id: on-data-event-single
      - id: on-data-event-double
  - id: lock-pattern
    desc: Lock file pattern
    crit: notable
    conf: 0.5
    any:
      - id: dot-lock-string
      - id: lockfile-string
  - id: http-response-pattern
    desc: HTTP response data handling (not
    crit: notable
    conf: 0.5
    any:
      - id: res-on-data
      - id: response-on-data
      - id: https-get-call
      - id: http-get-call
  - id: node-comp
    desc: Node.js reverse shell pattern (net
    crit: suspicious
    conf: 0.85
    all:
      - id: net-socket
      - id: micro-behaviors/process/create/shell/lang::child-process-require
      - id: exec-function
      - id: micro-behaviors/data/text/keywords::pipe
  - id: socket-with-exec
    desc: Socket combined with command execution
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1059
    all:
      - id: net-socket
      - id: exec-function
  - id: stdio-bridge-pipe
    desc: Shell pipe-based socket bridge
    crit: suspicious
    conf: 0.98
    all:
      - id: pipe-to-shell-stdin
      - id: shell-stdout-pipe
      - id: shell-stderr-pipe
  - id: stdio-bridge-write
    desc: Shell write-based socket bridge
    crit: suspicious
    conf: 0.98
    all:
      - id: socket-data-to-stdin-write
      - id: shell-stdout-write-bridge
      - id: shell-stderr-write-bridge
  - id: stdio-bridge
    desc: Shell stdio bridged over socket
    crit: suspicious
    conf: 0.98
    any:
      - id: stdio-bridge-pipe
      - id: stdio-bridge-write
    unless:
      - id: objectives/anti-static/obfuscation/payload::source-map-extension
      - id: objectives/anti-static/obfuscation/payload::sources-content-json
  - id: shell-session-bridge
    desc: Interactive shell session bridged
    crit: suspicious
    conf: 0.98
    all:
      - id: stdio-bridge
      - id: shell-stdin-resume
    any:
      - id: micro-behaviors/process/create/shell::bin-shell
      - id: micro-behaviors/process/create/shell::bin-sh
      - id: exec-cmd-exe
  - id: dual-argv-mode
    desc: Dual argv mode dispatch
    crit: suspicious
    conf: 0.95
    all:
      - id: argv-length-3
      - id: argv-length-4
  - id: node-backconnect-shell
    desc: Node.js backconnect shell bridge
    crit: hostile
    conf: 0.99
    attack: T1059
    all:
      - id: net-createConnection
      - id: shell-stdin-resume
      - id: socket-data-to-stdin-write
      - id: shell-stdout-write-bridge
      - id: shell-stderr-write-bridge
      - id: micro-behaviors/process/create/shell/lang::child-process-require
      - id: micro-behaviors/process/create/shell/lang::spawn-call
    any:
      - id: micro-behaviors/process/create/shell::bin-sh
      - id: exec-cmd-exe
  - id: node-bind-shell
    desc: Node.js bind shell bridge
    crit: hostile
    conf: 0.99
    attack: T1059
    all:
      - id: net-createServer
      - id: listen-call
      - id: shell-stdin-resume
      - id: socket-data-to-stdin-write
      - id: shell-stdout-write-bridge
      - id: shell-stderr-write-bridge
      - id: micro-behaviors/process/create/shell/lang::child-process-require
      - id: micro-behaviors/process/create/shell/lang::spawn-call
    any:
      - id: micro-behaviors/process/create/shell::bin-sh
      - id: exec-cmd-exe
  - id: dual-mode-network-shell
    desc: Dual-mode Node network shell
    crit: hostile
    conf: 0.99
    all:
      - id: dual-argv-mode
      - id: shell-platform-switch
      - id: shell-banner-write
    any:
      - id: node-backconnect-shell
      - id: node-bind-shell
  - id: cmd-shell-socket-bridge
    desc: cmd.exe shell bridged over socket
    crit: hostile
    conf: 0.99
    attack: T1059
    all:
      - id: net-socket
      - id: exec-cmd-exe
      - id: stdio-bridge
  - id: cmd-shell-rfc1918-bridge
    desc: cmd.exe shell to hardcoded RFC1918 host
    crit: hostile
    conf: 0.99
    attack: T1059
    all:
      - id: cmd-shell-socket-bridge
      - id: connect-rfc1918-host
  - id: lock-file
    desc: Lock file for single instance
    crit: notable
    conf: 0.7
    all:
      - id: lock-pattern
      - id: existsSync-call
      - id: writeFileSync-call
  - id: data-event-exec
    desc: Socket data event with command
    crit: suspicious
    conf: 0.95
    mbc: B0032
    attack: T1059
    all:
      - id: net-socket
      - id: on-data-event
      - id: exec-function
    unless:
      - id: http-response-pattern
  - id: ngrok-tunnel-comp
    desc: Ngrok tunnel endpoint (C2 tunneling)
    crit: suspicious
    conf: 0.95
    mbc: C0002
    attack: T1572
    any:
      - id: objectives/command-and-control/infrastructure/domain::ngrok-io-endpoint
      - id: objectives/command-and-control/infrastructure/domain::ngrok-free-app-endpoint
      - id: tcp-ngrok
  - id: tunnel-service-comp
    desc: Tunneling service endpoint
    crit: suspicious
    conf: 0.85
    attack: T1572
    any:
      - id: objectives/command-and-control/infrastructure/domain/tunnel/
