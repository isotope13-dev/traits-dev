defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: net-socket-string
    desc: net.Socket string reference
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: string
      substr: net.Socket
  - id: new-net-socket
    desc: new net.Socket creation
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: ast
      query: "((new_expression
  constructor: (member_expression
    object: (identifier) @obj
    property: (property_identifier) @prop))\n (#eq? @obj \"net\")\n (#eq? @prop \"Socket\"))\n"
  - id: net-createConnection
    desc: net.createConnection call
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: ast
      kind: call
      exact: net.createConnection
  - id: net-connect
    desc: net.connect call
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: ast
      kind: call
      exact: net.connect
  - id: exec-call-dup
    desc: exec function call
    crit: notable
    conf: 0.7
    for:
      - javascript
      - typescript
    if:
      type: ast
      kind: call
      exact: .exec(
  - id: execSync-call-dup
    desc: execSync function call
    crit: notable
    conf: 0.7
    for:
