defaults:
  platforms: [windows]
  for: [powershell, scripts]
  attack: "T1059.001,T1105"
traits:
  - id: powershell-tcpclient-stream
    desc: PowerShell TcpClient stream channel
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'New-Object\s+System\.Net\.Sockets\.TcpClient[\s\S]{0,500}\.GetStream\s*\(\s*\)'
  - id: powershell-command-output-loop
    desc: PowerShell command output socket loop
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'powershell\s+-c[\s\S]{0,500}Out-String[\s\S]{0,500}\.Write\s*\('
composite_rules:
  - id: powershell-tcpclient-command-loop
    desc: PowerShell TcpClient reverse command loop
    crit: hostile
    conf: 0.99
    all:
      - id: powershell-tcpclient-stream
      - id: powershell-command-output-loop
