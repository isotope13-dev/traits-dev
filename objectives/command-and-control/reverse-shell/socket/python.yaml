# Remote Shell Detection
# MBC: OB0004 (Command & Control) → B0030 (C2 Communication)
# ATT&CK: T1059 (Command and Scripting Interpreter)
# NOTE: Socket connect/bind/listen are defined in communications/socket/*/unix.yaml
defaults:
  platforms: [unix, windows]
  for: [python]
traits:
  # Python-specific reverse shell patterns
  - id: python-socket-connect
    desc: Python socket connection
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: ".connect("
  - id: python-dup2
    desc: Python file descriptor duplication (os.dup2)
    crit: notable
    conf: 0.85
    if:
      type: symbol
      exact: "os.dup2"
  - id: python-fileno
    desc: Python socket fileno() FD extraction
    crit: component
    conf: 0.7
    if:
      type: text
      substr: ".fileno()"
  - id: python-bash-interactive
    desc: Interactive bash shell in Python (-i flag)
    crit: notable
    conf: 0.9
    attack: T1059.004
    if:
      type: string_literal
      regex: "/bin/bash.{0,10}-i|-i.{0,10}/bin/bash"
  - id: python-pty-spawn
    desc: Python PTY spawn (interactive shell)
    crit: suspicious
    conf: 0.9
    if:
      type: ast
      kind: call
      exact: "pty.spawn"
  - id: inline-python-socket-dup2
    desc: Inline Python socket dup2 redirection
    crit: suspicious
    conf: 0.95
    size_max: 50000
    if:
      type: text
      regex: 'socket\.socket[\s\S]{0,600}\.connect\s*\([\s\S]{0,600}os\.dup2\s*\(.{0,120}\.fileno\(\)'
  - id: inline-python-subprocess-shell
    desc: Inline Python interactive shell launch
    crit: suspicious
    conf: 0.95
    size_max: 50000
    if:
      type: text
      regex: 'subprocess\.(call|Popen)\s*\(.{0,120}/bin/(sh|bash).{0,80}-i'
  - id: inline-python-connect-ip-port
    desc: Inline Python connect IP port
    crit: suspicious
    conf: 0.96
    size_max: 50000
    if:
      type: text
      regex: '\.connect\s*\(\s*\(\s*["'']([0-9]{1,3}\.){3}[0-9]{1,3}["'']\s*,\s*[0-9]{2,5}\s*\)\s*\)'
      is: external_ip

composite_rules:
  - id: python-dup2-io-redirect
    desc: Python os.dup2 socket FD redirect (stdin/stdout/stderr)
    crit: suspicious
    conf: 0.9
    attack: T1059.006
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
    all:
      - id: python-dup2
      - id: python-fileno
      - id: micro-behaviors/communications/socket/connect::connect-python
  - id: python-dup2-shell
    desc: Python reverse shell via os.dup2 FD hijack
    crit: suspicious
    conf: 0.95
    attack: T1059.006
    all:
      - id: python-dup2-io-redirect
      - id: micro-behaviors/process/create/subprocess::call
    any:
      - id: micro-behaviors/process/create/shell/invoke::python-bash-path
      - id: objectives/command-and-control/reverse-shell/pty::py-shell-path
  - id: python-dup2-c2
    desc: Python dup2 reverse shell with hardcoded C2 IP
    crit: hostile
    conf: 0.99
    attack: T1059.006
    mbc: "OB0004"
    all:
      - id: python-dup2-shell
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
  - id: inline-python-reverse-shell
    desc: Inline Python socket dup2 reverse shell
    crit: hostile
    conf: 0.99
    attack: T1059.006
    mbc: "B0030.002"
    all:
      - id: inline-python-socket-dup2
      - id: inline-python-subprocess-shell
    any:
      - id: micro-behaviors/process/create/shell/lang::python-c-flag
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
      - id: micro-behaviors/process/create/shell/invoke::bin-shell
  - id: inline-python-reverse-shell-c2
    desc: Inline Python reverse shell with C2
    crit: hostile
    conf: 0.995
    attack: T1059.006
    mbc: "B0030.002"
    all:
      - id: inline-python-reverse-shell
      - id: inline-python-connect-ip-port
