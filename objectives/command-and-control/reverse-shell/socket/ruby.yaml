defaults:
  attack: T1059
  platforms:
    - unix
    - windows
  for:
    - ruby
traits:
  - id: tcpsocket-new
    desc: TCPSocket.new call
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: call
      exact: TCPSocket.new
  - id: spawn-sh
    desc: spawn with /bin/sh
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: spawn\(["']/bin/sh["']
  - id: while-loop-cmd
    desc: While loop processing commands
    crit: notable
    conf: 0.75
    if:
      type: ast
      node: while
      regex: while.{0,50}gets|while.{0,50}sock
  - id: socket-gets
    desc: Socket gets call
    crit: notable
    conf: 0.7
    if:
      type: ast
      kind: call
      regex: sock.gets|socket.gets
  - id: copy-stream-socket
    desc: Copy stream to socket
    crit: suspicious
    conf: 0.85
    unless:
      - id: well-known/lib/jruby/
    if:
      type: ast
      kind: call
      regex: copy_stream\s*\([^\)]{0,200}\b(socket|tcpsocket)\b
    not:
      - regex: 'IO\.copy_stream\((f|file), sock\)'
      - substr: file.binmode
  - id: open3-popen
    desc: Open3 popen call
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: Open3\.popen|popen2e|popen3
  - id: open3-popen-ast
    desc: Open3 popen AST pattern
    crit: notable
    conf: 0.8
    if:
      type: ast
      kind: call
      exact: Open3.popen
composite_rules:
  - id: spawn-tcpsocket
    desc: spawn shell with TCPSocket
    crit: suspicious
    conf: 0.85
    all:
      - id: spawn-sh
      - id: micro-behaviors/communications/socket/listen::ruby-tcp-socket
  - id: tcpsocket-popen
    desc: TCPSocket with IO.popen
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: micro-behaviors/communications/socket/listen::ruby-tcp-socket
      - id: tcpsocket-new
      - id: micro-behaviors/process/create/shell/lang::ruby-popen
  - id: tcpsocket-sh-i
    desc: TCPSocket with interactive shell
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/communications/socket/listen::ruby-tcp-socket
      - id: micro-behaviors/process/create/shell/invoke::bin-sh-interactive
  - id: ruby-cmd-loop-shell
    desc: Ruby command loop reverse shell
    crit: suspicious
    conf: 0.9
    needs: 3
    unless:
      - id: well-known/lib/jruby::archive-basename
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::embedded-runtime-path
      - id: well-known/lib/jruby::jruby-home-path
      - id: well-known/lib/jruby::module-marker
      - id: well-known/lib/jruby::nested-member-path
      - id: well-known/lib/jruby::stdlib-archive-marker
    any:
      - id: tcpsocket-new
      - id: micro-behaviors/communications/socket/listen::ruby-tcp-socket
      - id: while-loop-cmd
      - id: socket-gets
      - id: micro-behaviors/process/create/shell/lang::ruby-popen
      - id: open3-popen
      - id: open3-popen-ast
      - id: copy-stream-socket
  - id: ruby-syscall-reverse-shell
    desc: Ruby reverse shell using raw syscalls (dup2)
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/kernel/syscall::ruby-syscall
      - id: micro-behaviors/process/create/shell/interactive::sh-interactive
      - id: objectives/discovery/network/scan/port::sym-connect
  - id: reverse-shell-ruby
    desc: Reverse shell in Ruby
    crit: suspicious
    conf: 0.66
    mbc: B0033
    unless:
      - id: well-known/lib/jruby::archive-basename
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::embedded-runtime-path
      - id: well-known/lib/jruby::jruby-home-path
      - id: well-known/lib/jruby::module-marker
      - id: well-known/lib/jruby::nested-member-path
      - id: well-known/lib/jruby::stdlib-archive-marker
    any:
      - id: spawn-tcpsocket
      - id: tcpsocket-popen
      - id: tcpsocket-sh-i
      - id: ruby-cmd-loop-shell
      - id: ruby-syscall-reverse-shell
