defaults:
  for: [pe]
  platforms: [windows]
  attack: T1059.003
composite_rules:
  - id: windows-cmd-pipe-socket-shell
    desc: Windows reverse shell (cmd.exe + pipe + Winsock)
    crit: hostile
    conf: 0.95
    mbc: B0030.002
    all:
      - id: micro-behaviors/process/create/exec::cmd-exe-reference
      - id: micro-behaviors/process/create/spawn::create-process-a
      - id: micro-behaviors/communications/ipc/pipe::create-pipe
      - id: micro-behaviors/communications/socket/init::ws2-32-dll-marker
      - id: micro-behaviors/communications/socket/init::winsock-client-lifecycle
    unless:
      - id: metadata/signed/platform::microsoft

  - id: sparse-iat-cmd-pipe-reverse-shell
    desc: Sparse-IAT cmd.exe pipe reverse shell
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/exec::cmd-exe-reference
      - id: micro-behaviors/communications/ipc/pipe::create-pipe
      - id: micro-behaviors/communications/ipc/pipe::peek-named-pipe
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-rdata-pair
    any:
      - id: objectives/anti-static/obfuscation/binary-metrics/sparse-imports::sparse-import-evasive-pe
      - id: micro-behaviors/process/create/spawn::create-process-a
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/certificate::pe-signature-verified
      - id: metadata/binary/installer/family::known-benign-installer

  - id: dual-hardcoded-ipv4-cmd-pipe
    desc: Dual hardcoded IPv4 with cmd pipe relay
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-rdata-pair
      - id: micro-behaviors/process/create/exec::cmd-exe-reference
      - id: micro-behaviors/communications/ipc/pipe::create-pipe
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer

  - id: sparse-iat-self-delete-implant
    desc: Sparse-IAT implant with module self-delete
    crit: suspicious
    conf: 0.9
    all:
      - id: objectives/anti-static/obfuscation/binary-metrics/sparse-imports::sparse-import-evasive-pe
      - id: objectives/evasion/self-delete/file/script::module-path-delete
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
      - id: well-known/app/swifttunnel_vpn::swifttunnel

  - id: locale-window-station-c2-gating
    desc: Locale window-station gating in C2 implant
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/os/sysinfo/platform/locale::locale-environment-fingerprint
      - id: micro-behaviors/ui/window/station::get-process-window-station
      - id: micro-behaviors/communications/ip/endpoint::external-ipv4-port-rdata-pair
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
