# Reverse Shell Detection - C/C++ POSIX
# ATT&CK: T1059.004
defaults:
  for: [c, cpp, elf, so]
  platforms: [unix]
traits:
  - id: port-4444-htons-source
    desc: Hardcoded port 4444 in source
    crit: notable
    conf: 0.8
    for: [c, cpp]
    if:
      type: raw
      regex: htons\s*\(\s*4444\s*\)
composite_rules:
  - id: posix-fd-redirect-shell-source
    desc: POSIX reverse shell in C source
    crit: hostile
    conf: 0.98
    mbc: "B0030.002"
    attack: "T1059.004"
    for: [c, cpp]
    size_max: 500000
    near_lines: 80
    all:
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/process/fd/dup::dup2
    any:
      - id: micro-behaviors/process/create/execv::c-execve
      - id: micro-behaviors/process/create/execv::c-execve-raw
      - id: micro-behaviors/process/create/execv::c-exec-variants
      - id: micro-behaviors/process/create/shell::usr-bin-sh
      - id: micro-behaviors/process/create/shell::bin-sh
      - id: micro-behaviors/process/create/shell::system-fn
  - id: loopback-shell-c2-source
    desc: Loopback shell C2 configuration
    crit: notable
    conf: 0.92
    for: [c, cpp]
    all:
      - id: micro-behaviors/communications/ip::loopback-ipv4-source
      - id: port-4444-htons-source
      - id: micro-behaviors/process/create/shell::usr-bin-sh
  - id: posix-fd-redirect-shell
    desc: POSIX shell with socket fd redirection
    crit: hostile
    conf: 0.95
    mbc: "B0022"
    attack: "T1059.004"
    for: [elf, so]
    size_max: 20000000
    near_lines: 80
    all:
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/process/fd/dup::dup2
    any:
      - id: micro-behaviors/process/create/execv
      - id: micro-behaviors/process/create/shell
      - id: objectives/evasion/fileless/memory::execve-fn
