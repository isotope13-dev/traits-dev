# Reverse Shell Detection - C/C++ POSIX
# ATT&CK: T1059.004
defaults:
  for: [c, cpp, elf, so]
  platforms: [unix]
composite_rules:
  - id: posix-fd-redirect-shell
    desc: POSIX shell with socket fd redirection
    crit: suspicious
    conf: 0.95
    mbc: "B0022"
    attack: "T1059.004"
    all:
      - id: micro-behaviors/communications/socket/connect::connect
      - id: micro-behaviors/process/fd/dup::dup2
      - id: objectives/evasion/fileless/memory::execve-fn
    any:
      - id: micro-behaviors/process/create/shell::bin-sh
      - id: micro-behaviors/process/create/shell::usr-bin-sh
      - id: micro-behaviors/process/create/shell::bin-shell
