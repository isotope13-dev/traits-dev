defaults:
  platforms:
    - unix
    - windows
  for:
    - perl
traits:
  - id: perl-redir
    desc: Perl file descriptor redirect
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: '>&[A-Za-z_][A-Za-z0-9_]*'
  - id: sockaddr-in-connect
    desc: Perl sockaddr_in socket connect
    crit: notable
    conf: 0.92
    attack: T1095
    if:
      type: text
      regex: 'connect\s*\(\w+\s*,\s*sockaddr_in\('
  - id: inet-aton-arg
    desc: inet_aton on runtime host
    crit: notable
    conf: 0.88
    attack: T1095
    if:
      type: text
      regex: 'inet_aton\s*\(\s*\$ARGV\['
  - id: stdin-socket-redir
    desc: STDIN redirected to socket
    crit: component
    conf: 0.96
    if:
      type: text
      regex: 'open\s*\(\s*STDIN\s*,\s*"?>&[A-Z_]'
  - id: stdout-socket-redir
    desc: STDOUT redirected to socket
    crit: component
    conf: 0.96
    if:
      type: text
      regex: 'open\s*\(\s*STDOUT\s*,\s*"?>&[A-Z_]'
  - id: stderr-socket-redir
    desc: STDERR redirected to socket
    crit: component
    conf: 0.96
    if:
      type: text
      regex: 'open\s*\(\s*STDERR\s*,\s*"?>&[A-Z_]'
  - id: connectback-banner
    desc: ConnectBack backdoor banner string
    crit: suspicious
    conf: 0.99
    attack: T1587
    if:
      type: string_literal
      substr: ConnectBack Backdoor
  - id: history-wipe-prelude
    desc: History wipe shell prelude
    crit: suspicious
    conf: 0.95
    attack: T1070.003
    if:
      type: string_literal
      substr: unset HISTFILE; unset SAVEHIST
  - id: recon-shell-prelude
    desc: System recon shell prelude
    crit: suspicious
    conf: 0.93
    attack: T1082
    if:
      type: string_literal
      regex: 'uname -a;.{0,50}id;.{0,50}pwd;'
composite_rules:
  - id: stdio-socket-redirect
    desc: Redirects stdio to socket
    crit: notable
    conf: 0.98
    all:
      - id: stdin-socket-redir
      - id: stdout-socket-redir
      - id: stderr-socket-redir
  - id: connectback-recon-prelude
    desc: Connect-back recon shell prelude
    crit: suspicious
    conf: 0.97
    all:
      - id: history-wipe-prelude
      - id: recon-shell-prelude
  - id: reverse-shell-perl
    desc: Reverse shell in Perl
    crit: suspicious
    conf: 0.66
    mbc: B0033
    attack: T1059
    all:
      - id: micro-behaviors/communications/socket/create::socket-call
      - id: micro-behaviors/communications/socket/create::open-call
      - id: perl-redir
    any:
      - id: micro-behaviors/process/create/shell::sh-interactive
      - id: micro-behaviors/process/create/shell::bin-sh-interactive
  - id: connectback-system-shell
    desc: Perl connect-back system shell
    crit: hostile
    conf: 0.995
    mbc: B0030.002
    attack: T1095
    all:
      - id: micro-behaviors/communications/socket/create::socket-call
      - id: sockaddr-in-connect
      - id: inet-aton-arg
      - id: stdio-socket-redirect
      - id: micro-behaviors/process/create/shell::system-call
      - id: micro-behaviors/process/create/shell::bin-sh
    any:
      - id: connectback-banner
      - id: connectback-recon-prelude
