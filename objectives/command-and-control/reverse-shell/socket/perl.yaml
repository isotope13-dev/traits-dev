# Reverse Shell Detection - Perl
# MBC: B0033 (Adversary-in-the-Middle)
# ATT&CK: T1059
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [perl]
traits:
  # === Perl redirect micro-trait ===
  - id: perl-redir
    desc: Perl file descriptor redirect
    crit: notable
    conf: 0.75
    if:
      type: string
      regex: '>&[A-Za-z_][A-Za-z0-9_]*'
composite_rules:
  # Perl reverse shell (migrated from YARA)
  - id: reverse-shell-perl
    desc: Reverse shell in Perl
    crit: suspicious
    conf: 0.66
    mbc: "B0033"
    attack: "T1059"
    all:
      - id: micro-behaviors/communications/socket/create::socket-call
      - id: micro-behaviors/communications/socket/create::open-call
      - id: perl-redir
    any:
      - id: micro-behaviors/process/create/shell::sh-interactive
      - id: micro-behaviors/process/create/shell::bin-sh-interactive
      - id: micro-behaviors/process/create/shell::sh-interactive
