# netcat reverse shell via FIFO pipeline.
defaults:
  for: [shell, source]
  platforms: [linux, macos]
  attack: T1059.004
  mbc: B0030

composite_rules:
  - id: nc-fifo-revshell
    desc: netcat FIFO reverse shell pipeline
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/pipe/fifo::mkfifo-cmd
      - id: micro-behaviors/communications/socket/netcat/
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
      - id: metadata/file/catalog/identity::notepadpp-keyword-catalog

  - id: nc-fifo-sh-pipe-revshell
    desc: mkfifo + nc + shell pipe (classic nc revshell)
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/fs/pipe/fifo::mkfifo-cmd
      - id: micro-behaviors/communications/socket/netcat/
      - id: objectives/command-and-control/reverse-shell/stdio::pipe-to-shell-stdin
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
      - id: metadata/file/catalog/identity::notepadpp-keyword-catalog

  - id: nc-host-port-shell
    desc: nc with explicit host:port + shell pipeline
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/netcat/
      - id: objectives/command-and-control/reverse-shell/stdio::pipe-to-shell-stdin
      - id: micro-behaviors/fs/pipe/fifo::mkfifo-cmd
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
      - id: metadata/file/catalog/identity::notepadpp-keyword-catalog
