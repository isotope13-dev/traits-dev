defaults:
  platforms: [linux]
  for: [elf]
  attack: T1059.004
  mbc: B0030.002

composite_rules:
  - id: native-address-stdio-shell
    desc: Native network address redirected to shell stdio
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/ip/parse::inet-pton-symbol
      - id: micro-behaviors/communications/ip/parse::htons-symbol
      - id: micro-behaviors/communications/socket/create-wrapper::native-socket-wrapper-symbol
      - id: micro-behaviors/communications/socket/connect-wrapper::native-connect-wrapper-symbol
      - id: micro-behaviors/process/fd/dup-wrapper::native-dup2-wrapper-symbol
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
      - id: micro-behaviors/process/create/execv::exec-variant-symbol-text
