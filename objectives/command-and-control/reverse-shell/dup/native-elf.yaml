defaults:
  platforms: [linux]
  for: [elf]
  attack: T1059.004
  mbc: B0030.002

composite_rules:
  - id: native-address-stdio-shell
    desc: Native network address redirected to shell stdio
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/ip/parse::inet-pton-symbol
      - id: micro-behaviors/communications/ip/parse::htons-symbol
      - id: micro-behaviors/communications/socket/create-wrapper::native-socket-wrapper-symbol
      - id: micro-behaviors/communications/socket/connect-wrapper::native-connect-wrapper-symbol
      - id: micro-behaviors/process/fd/dup-wrapper::native-dup2-wrapper-symbol
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
      - id: micro-behaviors/process/create/execv::exec-variant-symbol-text
  # Fork/clone before connect+dup2+/bin/sh is the classic detached reverse
  # shell shape. Catches stripped static GetShell/Trojan.Linux variants that
  # background before dialing out — not covered by symbol-based native-address-stdio-shell.
  - id: static-forked-reverse-shell-linux
    desc: Stripped static forked reverse shell
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/fork/clone::x86-64-clone-syscall
      - id: micro-behaviors/communications/socket/create::x86-64-socket-syscall
      - id: micro-behaviors/communications/socket/create::x86-64-connect-syscall
      - id: micro-behaviors/process/create/shell/fd::x86-64-syscall-dup2
      - id: micro-behaviors/process/create/shell/fd::x86-64-syscall-execve
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
