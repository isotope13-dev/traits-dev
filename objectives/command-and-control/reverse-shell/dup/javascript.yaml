# Remote Execution - JavaScript/Node.js
# ATT&CK: T1059.003 (Command and Scripting Interpreter: Windows Command Shell)
# Generic command/output identifiers are neutral stdio facts; the composite
# below adds the command-and-control context.
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
  # Output/command variable composite - references neutral capability facts.
  - id: js-output-command-var
    desc: Variable names suggesting command output
    crit: component
    conf: 0.3
    all:
      - id: micro-behaviors/process/fd/stdio::js-output-identifier
      - id: micro-behaviors/process/fd/stdio::js-command-identifier
  - id: js-http-backdoor
    desc: Remote shell backdoor (Poll C2
    crit: suspicious
    conf: 0.98
    attack: "T1059.003"
    all:
      - id: micro-behaviors/communications/http/get::axios-get-call
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: js-output-command-var
