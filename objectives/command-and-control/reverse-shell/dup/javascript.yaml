# Remote Execution - JavaScript/Node.js
# ATT&CK: T1059.003 (Command and Scripting Interpreter: Windows Command Shell)
# A concrete stdout/stderr result object is used as the command-output leg;
# bare UI/schema identifiers are not sufficient evidence of shell I/O.
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
composite_rules:
  - id: js-http-backdoor
    desc: Remote shell backdoor (Poll C2
    crit: suspicious
    conf: 0.98
    attack: "T1059.003"
    all:
      - id: micro-behaviors/communications/http/get::axios-get-call
      - id: micro-behaviors/process/create/shell/bridge::js-execsync
      - id: micro-behaviors/communications/http/post::axios-post-call
      - id: micro-behaviors/process/fd/stdio::js-command-output-result-object
