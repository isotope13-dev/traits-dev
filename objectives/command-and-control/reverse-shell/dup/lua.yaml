# Lua reverse shell: socket.tcp + connect + io.popen + send/receive loop.
defaults:
  for: [lua]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030.002

traits:
  - id: lua-socket-tcp-connect-host-port
    desc: Lua socket TCP connect with host literal
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: ':connect\s*\(\s*"[^"]{1,80}"\s*,\s*\d{2,5}'
  - id: lua-popen-with-receive
    desc: "Lua io.popen invoked on socket-received cmd"
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'io\.popen\s*\(\s*cmd'

composite_rules:
  - id: lua-revshell
    desc: Lua reverse shell (socket connect + io.popen + send loop)
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/socket/connect::lua-tcp-connect
      - id: lua-socket-tcp-connect-host-port
      - id: lua-popen-with-receive
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: lua-socket-popen-shell
    desc: Lua socket.tcp paired with io.popen-driven shell loop
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/connect::lua-tcp-connect
      - id: lua-popen-with-receive
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: lua-tcp-host-popen-shell
    desc: Lua TCP connect with host literal + io.popen
    crit: hostile
    conf: 0.97
    all:
      - id: lua-socket-tcp-connect-host-port
      - id: lua-popen-with-receive
    unless:
      - id: well-known/tool/detection/llm-scanner/
