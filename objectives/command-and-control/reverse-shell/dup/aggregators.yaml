# Cross-language reverse-shell aggregator composites.
# Other reverse-shell technique dirs reference any-shell-exec / any-socket-dial
# to express "<this technique> + a shell exec / a socket dial".
defaults:
  for: [scripts, source]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030

composite_rules:
  - id: any-socket-dial
    desc: any language socket dial primitive
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/communications/socket/connect/
      - id: micro-behaviors/communications/socket/create/
      - id: micro-behaviors/communications/socket/listen::ruby-tcp-socket
      - id: micro-behaviors/process/create/shell/lang::tcpsocket-new

  - id: any-shell-exec
    desc: any interactive shell exec
    crit: notable
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/shell/interactive::sh-interactive
      - id: micro-behaviors/process/create/shell/invoke::bin-sh
      - id: micro-behaviors/process/create/shell/invoke::bin-sh-interactive
      - id: micro-behaviors/process/create/shell/invoke::bash-exec
      - id: micro-behaviors/process/create/shell/lang/
      - id: objectives/command-and-control/reverse-shell/stdio::pipe-to-shell-stdin

  - id: socket-plus-shell-exec
    desc: socket dial plus interactive shell exec
    crit: hostile
    conf: 0.96
    scope: file
    near_lines: 80
    all:
      - id: any-socket-dial
      - id: any-shell-exec
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
      - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
      - id: micro-behaviors/data/text/app::clawmetry-observability-dashboard
      - id: well-known/lib/jruby::runtime-context
      - id: well-known/lib/jruby::bundler-thor-open-uri-helper
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test

  - id: dup2-plus-shell-exec
    desc: dup2 stdio plus shell exec
    crit: hostile
    conf: 0.97
    scope: file
    all:
      - id: micro-behaviors/process/fd/dup::dup2
      - id: any-shell-exec
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
      - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
      - id: micro-behaviors/data/text/app::clawmetry-observability-dashboard

  - id: socket-dup2-shell-exec
    desc: socket dial plus dup2 plus shell exec (classic revshell triple)
    crit: hostile
    conf: 0.99
    scope: file
    all:
      - id: any-socket-dial
      - id: micro-behaviors/process/fd/dup::dup2
      - id: any-shell-exec
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
      - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
      - id: micro-behaviors/data/text/app::clawmetry-observability-dashboard

  - id: socket-plus-interactive-shell
    desc: socket dial plus /bin/sh -i interactive shell
    crit: hostile
    conf: 0.98
    scope: file
    all:
      - id: any-socket-dial
      - id: micro-behaviors/process/create/shell/interactive::sh-interactive
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
      - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
      - id: micro-behaviors/data/text/app::clawmetry-observability-dashboard

  - id: socket-shell-exec-malware-term
    desc: socket + shell exec near reverse-shell keyword
    crit: hostile
    conf: 0.96
    scope: file
    all:
      - id: any-socket-dial
      - id: any-shell-exec
      - id: micro-behaviors/data/text/malware/terms::reverse-shell-comp
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
      - id: micro-behaviors/data/text/security/scanner::defensive-threat-signatures
      - id: micro-behaviors/data/text/app::clawmetry-observability-dashboard
