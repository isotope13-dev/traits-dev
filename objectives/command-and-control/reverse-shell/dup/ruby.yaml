defaults:
  attack: T1059
  platforms:
    - unix
    - windows
  for:
    - ruby
traits:
  - id: spawn-sh
    desc: spawn with /bin/sh
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: spawn\(["']/bin/sh["']
  - id: socket-gets
    desc: Socket gets call
    crit: notable
    conf: 0.7
    if:
      type: symbol
      kind: call
      regex: sock.gets|socket.gets
  - id: socket-gets-text
    desc: Socket gets call text
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: '\b(sock|socket)\.gets\b'
  - id: copy-stream-socket
    desc: Copy stream to socket
    crit: suspicious
    conf: 0.85
    unless:
      - id: well-known/lib/jruby/
    if:
      type: text
      regex: copy_stream\s*\([^\)]{0,200}\b(socket|tcpsocket)\b
    not:
      - regex: 'IO\.copy_stream\((f|file), sock\)'
      - substr: file.binmode
  - id: open3-popen
    desc: Open3 popen call
    crit: notable
    conf: 0.75
    if:
      type: string_literal
      regex: Open3\.popen|popen2e|popen3
  - id: open3-popen-ast
    desc: Open3 popen AST pattern
    crit: notable
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: Open3.popen
composite_rules:
  - id: spawn-tcpsocket
    desc: spawn shell with TCPSocket
    crit: suspicious
    conf: 0.85
    all:
      - id: spawn-sh
      - id: micro-behaviors/communications/socket/listen::ruby-tcp-socket
  - id: tcpsocket-popen
    desc: TCPSocket with IO.popen
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: micro-behaviors/communications/socket/listen::ruby-tcp-socket
      - id: micro-behaviors/communications/socket/connect::ruby-socket-connect
      - id: micro-behaviors/process/create/shell/lang::ruby-popen
    unless:
      - id: well-known/app/homebrew::source-tree
      # The native-body test passes a denied socket-plus-popen probe to a
      # child Ruby interpreter; it is not a reverse shell implementation.
      - id: metadata/package/testing/presence/harness::test-directory-path
  - id: tcpsocket-sh-i
    desc: TCPSocket with interactive shell
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/communications/socket/listen::ruby-tcp-socket
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-interactive
  - id: ruby-cmd-loop-shell
    desc: Ruby command loop reverse shell
    crit: suspicious
    conf: 0.9
    needs: 3
    unless:
      - id: well-known/lib/jruby::archive-basename
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::embedded-runtime-path
      - id: well-known/lib/jruby::jruby-home-path
      - id: well-known/lib/jruby::module-marker
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::stdlib-archive-marker
    any:
      - id: micro-behaviors/communications/socket/listen::ruby-tcp-socket
      - id: socket-gets
      - id: micro-behaviors/process/create/shell/lang::ruby-popen
      - id: open3-popen
      - id: open3-popen-ast
      - id: copy-stream-socket
  - id: ruby-syscall-reverse-shell
    desc: Ruby reverse shell using raw syscalls (dup2)
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/kernel/syscall::ruby-syscall
      - id: micro-behaviors/process/create/shell/interactive::sh-interactive
      - id: micro-behaviors/communications/socket/connect/
  - id: reverse-shell-ruby
    desc: Reverse shell in Ruby
    crit: suspicious
    conf: 0.66
    mbc: B0033
    unless:
      - id: well-known/lib/jruby::archive-basename
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::embedded-runtime-path
      - id: well-known/lib/jruby::jruby-home-path
      - id: well-known/lib/jruby::module-marker
      - id: well-known/lib/jruby::embedded-runtime-member
      - id: well-known/lib/jruby::stdlib-archive-marker
    any:
      - id: spawn-tcpsocket
      - id: tcpsocket-popen
      - id: tcpsocket-sh-i
      - id: ruby-cmd-loop-shell
      - id: ruby-syscall-reverse-shell

  - id: ruby-stdin-reopen-socket-revshell
    desc: Ruby $stdin reopen onto TCPSocket + exec /bin/sh
    crit: hostile
    conf: 0.99
    mbc: B0030.002
    all:
      - id: micro-behaviors/communications/socket/connect::ruby-socket-connect
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-interactive
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/lib/net-ssh/

  - id: ruby-tcpsocket-exec-shell
    desc: Ruby TCPSocket + exec interactive shell
    crit: hostile
    conf: 0.97
    mbc: B0030.002
    all:
      - id: spawn-tcpsocket
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-interactive
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: ruby-tcpsocket-shell-lang-exec
    desc: Ruby TCPSocket + Kernel exec
    crit: hostile
    conf: 0.96
    mbc: B0030.002
    all:
      - id: micro-behaviors/communications/socket/connect::ruby-socket-connect
      - id: micro-behaviors/process/create/shell/lang::ruby-exec
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/lib/net-ssh/
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/app/homebrew::source-tree

  - id: ruby-tcpsocket-loop-shell
    desc: Ruby TCPSocket + shell exec + interactive flag
    crit: hostile
    conf: 0.96
    mbc: B0030.002
    all:
      - id: micro-behaviors/communications/socket/connect::ruby-socket-connect
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-interactive
      - id: micro-behaviors/process/create/shell/lang::ruby-exec
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: ruby-tcpsocket-open3-command-loop
    desc: Ruby TCPSocket Open3 command loop
    crit: hostile
    conf: 0.98
    mbc: B0030.002
    near_lines: 30
    all:
      - id: micro-behaviors/communications/socket/connect::ruby-socket-connect
      - id: socket-gets-text
      - id: micro-behaviors/process/create/shell/open3::capture-command
      - id: micro-behaviors/communications/socket/send::ruby-socket-write-call
    unless:
      - id: well-known/tool/detection/llm-scanner/
