# Kotlin reverse shell: Socket + ProcessBuilder("/bin/sh","-i") + stream copying.
defaults:
  for: [kotlin]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030.002

traits:
  - id: kotlin-socket-host-port
    desc: Kotlin Socket constructor with host literal
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'Socket\s*\(\s*"[^"]{1,80}"\s*,\s*\d{2,5}\s*\)'
  - id: kotlin-processbuilder-shell
    desc: Kotlin ProcessBuilder with shell command
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'ProcessBuilder\s*\(\s*"/bin/(ba)?sh"\s*,\s*"-[ic]"'
  - id: kotlin-stream-copy-to
    desc: Kotlin Stream.copyTo bridges stdio
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '\.copyTo\s*\([a-zA-Z_]\w*\.(outputStream|inputStream)'

composite_rules:
  - id: kotlin-revshell
    desc: Kotlin reverse shell (Socket + ProcessBuilder shell + stream copy bridge)
    crit: hostile
    conf: 0.99
    all:
      - id: kotlin-socket-host-port
      - id: kotlin-processbuilder-shell
      - id: kotlin-stream-copy-to
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: kotlin-socket-processbuilder
    desc: Kotlin Socket constructor paired with ProcessBuilder shell
    crit: hostile
    conf: 0.97
    all:
      - id: kotlin-socket-host-port
      - id: kotlin-processbuilder-shell
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: kotlin-processbuilder-stream-bridge
    desc: Kotlin ProcessBuilder shell + Stream.copyTo bridge
    crit: hostile
    conf: 0.97
    all:
      - id: kotlin-processbuilder-shell
      - id: kotlin-stream-copy-to
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
