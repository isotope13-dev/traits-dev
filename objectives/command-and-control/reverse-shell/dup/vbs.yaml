# VBScript reverse shell launcher: WScript.Shell .Run invokes base64'd
# PowerShell TCPClient payload.
defaults:
  for: [vbs]
  platforms: [windows]
  attack: T1059.001
  mbc: B0030.002

traits:
  - id: vbs-powershell-enc-cmd
    desc: "VBScript constructs powershell.exe -enc cmd"
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'powershell(\.exe)?\s[^"]{0,80}-enc\b'
  - id: vbs-wscript-shell-run
    desc: VBScript WScript.Shell.Run launch
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\.Run\s+[a-zA-Z_]\w*\s*,\s*0\s*,\s*(False|True)'

composite_rules:
  - id: vbs-powershell-tcpclient-launcher
    desc: VBScript launcher invokes base64 PowerShell TCPClient revshell
    crit: hostile
    conf: 0.99
    all:
      - id: vbs-powershell-enc-cmd
      - id: vbs-wscript-shell-run
      - id: objectives/command-and-control/reverse-shell/encoded::tcpclient-base64-payload
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context

  - id: vbs-encoded-powershell-launcher
    desc: VBScript runs base64'd PowerShell command via WScript.Shell
    crit: hostile
    conf: 0.97
    all:
      - id: vbs-powershell-enc-cmd
      - id: vbs-wscript-shell-run
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
