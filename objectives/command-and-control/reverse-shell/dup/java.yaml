# Java reverse shell: java.net.Socket + Runtime.exec + transferTo streams.
defaults:
  for: [java]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030.002

traits:
  - id: java-runtime-exec-shell-array
    desc: Java Runtime.exec with shell command array
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'Runtime\.getRuntime\(\)\.exec\s*\(\s*new\s+String\[\]\s*\{\s*"/bin/(ba)?sh"'
  - id: java-process-streams-pair
    desc: Java captures process stdout/stderr and stdin
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'p\.get(Input|Output|Error)Stream\s*\(\)'

composite_rules:
  - id: java-revshell
    desc: Java reverse shell (Socket + Runtime.exec shell + stream piping)
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/socket/connect::new-socket-host-port
      - id: java-runtime-exec-shell-array
      - id: java-process-streams-pair
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: java-socket-runtime-exec
    desc: Java Socket constructor paired with Runtime.exec shell
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/connect::new-socket-host-port
      - id: java-runtime-exec-shell-array
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
