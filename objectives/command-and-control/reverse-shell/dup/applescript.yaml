# AppleScript reverse shell: do shell script "bash -i >& /dev/tcp/...".
defaults:
  for: [applescript]
  platforms: [macos]
  attack: T1059
  mbc: B0030.002

traits:
  - id: applescript-do-shell-bash-i
    desc: AppleScript do shell script with interactive bash
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'do\s+shell\s+script\s+"(/bin/)?(ba)?sh\s+-i'
  - id: applescript-do-shell-dev-tcp
    desc: AppleScript do shell script wrapping /dev/tcp
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'do\s+shell\s+script\s+"[^"]{0,160}/dev/tcp/'

composite_rules:
  - id: applescript-revshell
    desc: AppleScript reverse shell (do shell script wrapping bash /dev/tcp)
    crit: hostile
    conf: 0.99
    all:
      - id: applescript-do-shell-bash-i
      - id: applescript-do-shell-dev-tcp
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: applescript-do-shell-revshell
    desc: AppleScript do shell script with reverse-shell shell command
    crit: hostile
    conf: 0.98
    all:
      - id: applescript-do-shell-bash-i
    any:
      - id: applescript-do-shell-dev-tcp
      - id: micro-behaviors/communications/socket/connect::dev-tcp-path
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: applescript-dev-tcp-shell
    desc: AppleScript do-shell-script embeds /dev/tcp reverse shell
    crit: hostile
    conf: 0.97
    all:
      - id: applescript-do-shell-dev-tcp
    any:
      - id: micro-behaviors/communications/socket/connect::dev-tcp-path
      - id: micro-behaviors/communications/socket/connect::dev-tcp-external-ip
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: applescript-bash-i-dev-tcp-pair
    desc: AppleScript bash -i wrapper paired with dev-tcp atom
    crit: hostile
    conf: 0.97
    all:
      - id: applescript-do-shell-bash-i
      - id: micro-behaviors/communications/socket/connect::dev-tcp-path
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: applescript-event-shell-revshell
    desc: AppleScript do-shell-script + bash -i + dev-tcp embed
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/create/script/apple-event::shell-dup-cmd
      - id: applescript-do-shell-bash-i
      - id: applescript-do-shell-dev-tcp
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
