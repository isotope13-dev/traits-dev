# Reverse Shell Detection - C/C++ POSIX
# ATT&CK: T1059.004
defaults:
  for: [c, cpp, elf, so]
  platforms: [unix]
traits:
- id: c-source-shell-path
  desc: C source references shell path
  crit: component
  conf: 0.8
  for: [c, cpp]
  if:
    type: text
    regex: /(usr/)?bin/(ba|z|k|c)?sh\b
- id: hardcoded-htons-port-source
  desc: Hardcoded network port in source
  crit: notable
  conf: 0.8
  for: [c, cpp]
  if:
    type: text
    regex: htons\s*\(\s*[1-9][0-9]{2,4}\s*\)
  unless:
    - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
- id: libssh-proxycommand-source
  desc: libssh ProxyCommand socket implementation
  crit: notable
  conf: 0.98
  for: [c, cpp]
  if:
    type: text
    substr: ProxyCommand connection pipe
composite_rules:
- id: p2p-bot-socket-stdio-shell
  desc: P2P bot redirects socket I/O into a spawned system shell
  crit: hostile
  conf: 0.99
  mbc: "B0030.002"
  attack: "T1059.004,T1090.003"
  for: [elf, so]
  all:
  - id: objectives/command-and-control/channel/p2p::signed-dht-command-channel
  - id: micro-behaviors/communications/socket/connect::connect-symbol
  - id: micro-behaviors/process/create/direct::child-stdio-pipe-redirect
  - id: micro-behaviors/process/create/execv::c-exec-variants
  - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
- id: source-socket-fd-redirect
  desc: C source redirects stdio over a socket
  crit: suspicious
  conf: 0.9
  for: [c, cpp]
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/process/fd/dup::source-dup2-stdio
  near_lines: 50
  unless:
  - id: micro-behaviors/os/container/oci/
  - id: micro-behaviors/communications/socket/vsock/
  - id: metadata/package/testing/compiled::c-test-framework-marker
- id: source-shell-exec-with-fixed-port
  desc: C source executes shell with fixed C2 port
  crit: suspicious
  conf: 0.88
  for: [c, cpp]
  all:
  - id: micro-behaviors/process/create/direct::execve-import
  - id: c-source-shell-path
  - id: hardcoded-htons-port-source
- id: posix-fd-redirect-shell-source
  desc: POSIX reverse shell in C source
  crit: hostile
  conf: 0.98
  mbc: "B0030.002"
  attack: "T1059.004"
  for: [c, cpp]
  # Daemons commonly contain all three pieces hundreds of lines apart
  # (TCP connect, dup2 stdio→/dev/null in daemonize, system() in handlers).
  # The reverse-shell pattern itself co-locates them; require proximity.
  near_lines: 50
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/process/fd/dup::source-dup2-stdio
  any:
  - id: c-source-shell-path
  - id: micro-behaviors/process/create/shell/spawn::system-fn
  unless:
  - id: libssh-proxycommand-source
  - id: micro-behaviors/os/container/oci/
  - id: micro-behaviors/communications/socket/vsock/
- id: source-execve-fd-redirect-shell
  desc: C source reverse shell with execve and fd redirection
  crit: hostile
  conf: 0.98
  mbc: "B0030.002"
  attack: "T1059.004"
  for: [c, cpp]
  all:
  - id: source-socket-fd-redirect
  - id: micro-behaviors/process/create/direct::execve-import
  - id: c-source-shell-path
  unless:
  - id: libssh-proxycommand-source
  - id: micro-behaviors/os/container/oci/
  - id: micro-behaviors/communications/socket/vsock/
- id: loopback-shell-c2-source
  desc: Loopback shell C2 configuration
  crit: suspicious
  conf: 0.92
  for: [c, cpp]
  all:
  - id: micro-behaviors/communications/ip/literal::loopback-ipv4-source
  - id: hardcoded-htons-port-source
  - id: micro-behaviors/process/create/shell/spawn::usr-bin-sh
- id: posix-fd-redirect-shell
  desc: POSIX shell with socket fd redirection
  crit: suspicious
  conf: 0.85
  mbc: "B0022"
  attack: "T1059.004"
  for: [elf, so]
  scope: leaf
  size_max: 20000000
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/process/fd/dup::dup2
  - id: micro-behaviors/process/create/execv::execve-fn
  any:
  - id: micro-behaviors/process/create/shell
  downgrade:
    any:
    - id: micro-behaviors/process/fd/dup::posix-fd-redirect-shell-benign-context
  unless:
  - id: metadata/binary/layout::shared-object-type
  - id: well-known/app/systemd::container-runtime-component-basename
  - id: well-known/app/dropbear::server-binary
  - id: metadata/binary/metrics/threshold::rich-sentence-strings-20pct
  - id: well-known/lib/mozilla-nspr::nspr-unix-library
  - id: well-known/lib/guile::libguile-shared-library
  - id: well-known/lib/systemd::systemd-shared-library
- id: unix-dual-mode-socket-exec-redirect
  desc: Unix binary supports bind and reverse shell stdio redirection
  crit: hostile
  conf: 0.96
  mbc: "B0022"
  attack: "T1059.004"
  for: [elf, so]
  scope: leaf
  size_max: 20000000
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/communications/socket/listen::listen
  - id: micro-behaviors/communications/socket/listen::accept-sym
  - id: micro-behaviors/communications/socket/bind/function::bind
  - id: micro-behaviors/process/fd/dup::dup2
  - id: micro-behaviors/process/create/execv::c-exec-variants
  unless:
  - id: micro-behaviors/process/fd/dup::unix-dual-mode-socket-exec-benign-context
  # A shared object commonly exports these generic socket and exec APIs for
  # its host process. This executable-level composite must not treat a
  # library's accumulated imports as a standalone reverse shell.
  - id: well-known/lib/dbus::libdbus-shared-library
  - id: well-known/tool/sysadmin/network::socat-utility
  - id: well-known/lib/mozilla-nspr::nspr-unix-library
  - id: well-known/lib/guile::libguile-shared-library
  - id: well-known/lib/systemd::systemd-shared-library
  - id: well-known/app/clamav::clamd-service-context
  - id: well-known/app/clamav::clamav-milter-service-context
  - id: well-known/app/frr::frr-native-routing-context
- id: xor18-ddos-reverse-shell-bot
  desc: XOR18 DDoS bot with reverse shell redirection
  crit: hostile
  conf: 0.98
  mbc: "B0022"
  attack: "T1059.004,T1498.001"
  for: [elf, so]
  size_max: 20000000
  all:
  - id: unix-dual-mode-socket-exec-redirect
  - id: objectives/impact/dos/attack/botnet::xor18-source-query-shell-ddos-bot
- id: unix-terminal-socket-exec-backdoor
  desc: Unix socket command backdoor with terminal control
  crit: hostile
  conf: 0.94
  mbc: "B0022,B0024"
  attack: "T1059.004"
  for: [elf, so]
  scope: leaf
  size_max: 20000000
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/process/fd/dup::dup2
  - id: micro-behaviors/process/create/execv::c-exec-variants
  - id: micro-behaviors/process/tty/pty::terminal-attribute-control
  any:
  - id: micro-behaviors/fs/path/device/terminal::dev-tty
  - id: micro-behaviors/process/tty/terminal::tty-markers
  unless:
  - id: micro-behaviors/process/fd/dup::unix-terminal-socket-exec-benign-context
  - id: well-known/app/catgirl::catgirl-client
  - id: well-known/tool/sysadmin/network::socat-utility
  - id: well-known/lib/mozilla-nspr::nspr-unix-library
  - id: well-known/lib/guile::libguile-shared-library
  - id: well-known/lib/systemd::systemd-shared-library
  - id: well-known/lib/deb-package::rustdesk-sciter-library
  - id: well-known/lib/deb-package::libssh-shared-library
  - id: micro-behaviors/os/event/library/libuv::uv-pipe-connect-symbol
- id: unix-socket-popen-redirect-backdoor
  desc: Unix socket backdoor with popen and stdio redirection
  crit: hostile
  conf: 0.93
  mbc: "B0022"
  attack: "T1059.004"
  for: [elf, so]
  size_max: 20000000
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/process/fd/dup::dup2
  - id: micro-behaviors/process/create/popen::c-popen
  - id: micro-behaviors/process/create/execv::c-exec-variants
  any:
  - id: micro-behaviors/os/console/io::null-redirect-stdout-stderr
  - id: micro-behaviors/communications/http/headers::auth-header
  unless:
  - id: micro-behaviors/ui/help/
  # Large documented benchmark/admin tools (e.g. fio) legitimately combine
  # connect+dup2+popen+execvp with /dev/null redirect or an S3 Authorization
  # header. A compact popen reverse-shell implant has almost no prose strings,
  # so a high sentence-string ratio distinguishes the benign tool.
  - id: metadata/binary/metrics/threshold::rich-sentence-strings-20pct
  - id: micro-behaviors/communications/ssh/client/
  - id: objectives/evasion/hijack-execution-flow/linker/
  - id: micro-behaviors/dylib/library/libc::glibc-versioned-libc
  - id: objectives/supply-chain/trojanized/backdoor::glibc-runtime-basename
- id: c-revshell-execve-shell-fd-redirect
  desc: C/C++ socket + dup2 + execve("/bin/sh") reverse shell skeleton
  crit: hostile
  conf: 0.99
  mbc: B0030.002
  attack: T1059.004
  for: [c, cpp]
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/process/fd/dup::source-dup2-stdio
  - id: micro-behaviors/process/create/direct::execve-import
  - id: c-source-shell-path
  unless:
  - id: well-known/tool/detection/llm-scanner/
