# Reverse Shell Detection - C/C++ POSIX
# ATT&CK: T1059.004
defaults:
  for: [c, cpp, elf, so]
  platforms: [unix]
traits:
- id: dup2-stdio-source--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [c, cpp]
  if:
    type: text
    substr: STDERR_FILENO
  count_max: 1009696
- id: dup2-stdio-source--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [c, cpp]
  if:
    type: text
    substr: STDOUT_FILENO
  count_max: 1009697
- id: dup2-stdio-source--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [c, cpp]
  if:
    type: text
    substr: STDIN_FILENO
  count_max: 1009698
- id: dup2-stdio-source--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [c, cpp]
  if:
    type: text
    substr: dup2
  count_max: 1009699
- id: dup2-stdio-fd-literal
  desc: dup2 second arg is stdio fd
  crit: component
  conf: 0.9
  for: [c, cpp]
  if:
    type: text
    regex: dup2\s*\([^,()]{1,40},\s*[0-2]\s*\)
- id: c-test-framework-context
  desc: C/C++ unit test framework markers
  crit: component
  conf: 0.9
  for: [c, cpp]
  if:
    type: text
    regex: \b(ASSERT_SYS|ASSERT_EQ|EXPECT_EQ|EXPECT_TRUE)\b
- id: c-source-shell-path
  desc: C source references shell path
  crit: component
  conf: 0.8
  for: [c, cpp]
  if:
    type: text
    regex: /(usr/)?bin/(ba|z|k|c)?sh\b
- id: hardcoded-htons-port-source
  desc: Hardcoded network port in source
  crit: notable
  conf: 0.8
  for: [c, cpp]
  if:
    type: text
    regex: htons\s*\(\s*[1-9][0-9]{2,4}\s*\)
- id: libssh-proxycommand-source
  desc: libssh ProxyCommand socket implementation
  crit: component
  conf: 0.98
  for: [c, cpp]
  if:
    type: text
    substr: ProxyCommand connection pipe
- id: posix-fd-redirect-shell-cond-0--inline-9702
  desc: Regex component marker
  crit: component
  conf: 0.85
  size_max: 20000000
  for: [elf, so]
  if:
    type: basename
    exact: sulogin
  count_max: 1009703
composite_rules:
- id: source-socket-fd-redirect
  desc: C source redirects stdio over a socket
  crit: suspicious
  conf: 0.9
  for: [c, cpp]
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: dup2-stdio-source
  near_lines: 50
  unless:
  - id: micro-behaviors/os/container/oci::oci-guest-init
  - id: micro-behaviors/communications/socket/vsock::af-vsock-client
  - id: c-test-framework-context
- id: source-shell-exec-with-fixed-port
  desc: C source executes shell with fixed C2 port
  crit: suspicious
  conf: 0.88
  for: [c, cpp]
  all:
  - id: micro-behaviors/process/create/direct::execve-import
  - id: c-source-shell-path
  - id: hardcoded-htons-port-source
- id: posix-fd-redirect-shell-source
  desc: POSIX reverse shell in C source
  crit: hostile
  conf: 0.98
  mbc: "B0030.002"
  attack: "T1059.004"
  for: [c, cpp]
  # Daemons commonly contain all three pieces hundreds of lines apart
  # (TCP connect, dup2 stdio→/dev/null in daemonize, system() in handlers).
  # The reverse-shell pattern itself co-locates them; require proximity.
  near_lines: 50
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: dup2-stdio-source
  any:
  - id: c-source-shell-path
  - id: micro-behaviors/process/create/shell/invoke::system-fn
  unless:
  - id: libssh-proxycommand-source
  - id: micro-behaviors/os/container/oci::oci-guest-init
  - id: micro-behaviors/communications/socket/vsock::af-vsock-client
- id: source-execve-fd-redirect-shell
  desc: C source reverse shell with execve and fd redirection
  crit: hostile
  conf: 0.98
  mbc: "B0030.002"
  attack: "T1059.004"
  for: [c, cpp]
  all:
  - id: source-socket-fd-redirect
  - id: micro-behaviors/process/create/direct::execve-import
  - id: c-source-shell-path
  unless:
  - id: libssh-proxycommand-source
  - id: micro-behaviors/os/container/oci::oci-guest-init
  - id: micro-behaviors/communications/socket/vsock::af-vsock-client
- id: loopback-shell-c2-source
  desc: Loopback shell C2 configuration
  crit: suspicious
  conf: 0.92
  for: [c, cpp]
  all:
  - id: micro-behaviors/communications/ip/literal::loopback-ipv4-source
  - id: hardcoded-htons-port-source
  - id: micro-behaviors/process/create/shell/invoke::usr-bin-sh
- id: posix-fd-redirect-shell
  desc: POSIX shell with socket fd redirection
  crit: suspicious
  conf: 0.85
  mbc: "B0022"
  attack: "T1059.004"
  for: [elf, so]
  size_max: 20000000
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/process/fd/dup::dup2
  - id: objectives/evasion/fileless/memory::execve-fn
  any:
  - id: micro-behaviors/process/create/shell
  downgrade:
    any:
    - id: posix-fd-redirect-shell-cond-0--inline-9702
    - id: metadata/package/help::documented-cli-binary
    - id: metadata/binary/metrics/threshold::rich-sentence-strings-20pct
    - id: micro-behaviors/dylib/library/family::debugger-tool-marker
    - id: micro-behaviors/dylib/library/family::system-lib-marker
    - id: micro-behaviors/dylib/library/family::shell-interpreter
    - id: micro-behaviors/communications/ssh/client::full-implementation
- id: unix-dual-mode-socket-exec-redirect
  desc: Unix binary supports bind and reverse shell stdio redirection
  crit: hostile
  conf: 0.96
  mbc: "B0022"
  attack: "T1059.004"
  for: [elf, so]
  size_max: 20000000
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/communications/socket/listen::listen
  - id: micro-behaviors/communications/socket/listen::accept-sym
  - id: micro-behaviors/communications/socket/bind/function::bind
  - id: micro-behaviors/process/fd/dup::dup2
  - id: micro-behaviors/process/create/execv::c-exec-variants
  unless:
  - id: metadata/package/help::documented-cli-binary
  - id: micro-behaviors/communications/ssh/client::full-implementation
  - id: objectives/evasion/hijack-execution-flow/linker::standard-dynamic-linker
  - id: objectives/supply-chain/trojanized/backdoor::glibc-runtime-basename
  - id: micro-behaviors/dylib/library/libc::glibc-versioned-libc
  - id: micro-behaviors/dylib/library/family::system-lib-marker
- id: unix-terminal-socket-exec-backdoor
  desc: Unix socket command backdoor with terminal control
  crit: hostile
  conf: 0.94
  mbc: "B0022,B0024"
  attack: "T1059.004"
  for: [elf, so]
  size_max: 20000000
  all:
  - id: micro-behaviors/communications/socket/connect::connect
  - id: micro-behaviors/process/fd/dup::dup2
  - id: micro-behaviors/process/create/execv::c-exec-variants
  - id: micro-behaviors/process/tty/pty::terminal-attribute-control
  any:
  - id: micro-behaviors/fs/path/device/terminal::dev-tty
  - id: micro-behaviors/process/tty/terminal::tty-markers
  unless:
  - id: metadata/package/help::documented-cli-binary
  - id: micro-behaviors/communications/ssh/client::full-implementation
  - id: objectives/evasion/hijack-execution-flow/linker::standard-dynamic-linker
  - id: objectives/supply-chain/trojanized/backdoor::glibc-runtime-basename
  - id: micro-behaviors/dylib/library/libc::glibc-versioned-libc
  - id: micro-behaviors/dylib/library/family::system-lib-marker
- id: unix-socket-popen-redirect-backdoor
  desc: Unix socket backdoor with popen and stdio redirection
  crit: hostile
