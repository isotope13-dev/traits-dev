# Rust reverse shell: TcpStream::connect + libc::dup + Command + /bin/sh.
defaults:
  for: [rust]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030.002

traits:
  - id: rust-tcpstream-connect-literal
    desc: Rust TcpStream::connect with host literal
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'TcpStream::connect\s*\(\s*"[^"]{1,80}:\d{2,5}"\s*\)'
  - id: rust-libc-dup-fd
    desc: Rust libc::dup over a raw socket fd
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'libc::dup\s*\(\s*fd\s*\)'
  - id: rust-command-bin-sh
    desc: "Rust cmd::new(\"/bin/sh\") with interactive arg"
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'Command::new\s*\(\s*"/bin/(ba)?sh"\s*\)\s*\n?\s*\.arg\s*\(\s*"-[ic]"'
  - id: rust-stdio-from-raw-fd
    desc: Rust Stdio::from_raw_fd wires stdio
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'Stdio::from_raw_fd\s*\('

composite_rules:
  - id: rust-revshell
    desc: Rust reverse shell (TcpStream + libc::dup + Command shell + raw-fd stdio)
    crit: hostile
    conf: 0.99
    all:
      - id: rust-tcpstream-connect-literal
      - id: rust-libc-dup-fd
      - id: rust-stdio-from-raw-fd
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context

  - id: rust-tcpstream-shell-command
    desc: Rust TcpStream paired with Command shell and raw-fd stdio
    crit: hostile
    conf: 0.98
    all:
      - id: rust-tcpstream-connect-literal
      - id: rust-command-bin-sh
      - id: rust-stdio-from-raw-fd
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context

  - id: rust-tcpstream-libc-dup-shell
    desc: Rust TcpStream + libc::dup + shell Command
    crit: hostile
    conf: 0.97
    all:
      - id: rust-tcpstream-connect-literal
      - id: rust-libc-dup-fd
      - id: rust-command-bin-sh
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
