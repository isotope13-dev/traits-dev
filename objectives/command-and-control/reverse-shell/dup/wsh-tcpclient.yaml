# Native WSH/HTA reverse shell: VBScript (or JScript) instantiates the .NET
# System.Net.Sockets.TCPClient through CreateObject, bridges its NetworkStream
# to a WScript.Shell-spawned cmd.exe/powershell via StandardInput/Output, and
# loops. Distinct from dup/vbs.yaml, which only catches a VBScript launcher
# that shells out to a base64 PowerShell payload — here the socket-to-shell
# bridge lives entirely in the script. Using .NET socket and stream classes
# from a Windows Script Host language has no legitimate purpose; pairing them
# with a shell exec is an unambiguous reverse shell.
defaults:
  platforms: [windows]
  for: [vbs, html, javascript]
  attack: T1059
  mbc: B0030.002
traits:
  - id: wsh-dotnet-tcpclient
    desc: WSH instantiates .NET TCPClient
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(?i)CreateObject\s*\(\s*["'']System\.Net\.Sockets\.TCPClient'
  - id: wsh-dotnet-stream-io
    desc: WSH instantiates .NET stream reader/writer
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)CreateObject\s*\(\s*["'']System\.IO\.Stream(Reader|Writer)'
  - id: wsh-shell-exec-shell
    desc: WSH shell Exec of cmd/powershell
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\.Exec\s*\(\s*["''](cmd|powershell)'
composite_rules:
  - id: wsh-tcpclient-shell-bridge
    desc: WSH TCPClient stream bridged to shell (reverse shell)
    crit: hostile
    conf: 0.98
    all:
      - id: wsh-dotnet-tcpclient
      - id: wsh-shell-exec-shell
      - id: wsh-dotnet-stream-io
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
