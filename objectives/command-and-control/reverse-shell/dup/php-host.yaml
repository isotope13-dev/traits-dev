# PHP reverse shell: fsockopen + proc_open + descriptorspec on socket.
defaults:
  for: [php]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030.002

traits:
  - id: php-fsockopen-host-port
    desc: PHP fsockopen with host literal and port
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'fsockopen\s*\(\s*"[^"]{1,80}"\s*,\s*\d{2,5}'
  - id: php-proc-open-shell
    desc: PHP proc_open invoking a shell
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'proc_open\s*\(\s*"/bin/(ba)?sh'
  - id: php-descriptorspec-socket
    desc: PHP descriptorspec mapping stdio onto socket
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '0\s*=>\s*\$sock'

composite_rules:
  - id: php-revshell-hostile
    desc: PHP reverse shell (fsockopen + proc_open shell + stdio descriptors)
    crit: hostile
    conf: 0.99
    all:
      - id: php-fsockopen-host-port
      - id: php-proc-open-shell
      - id: php-descriptorspec-socket
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: php-fsockopen-shell
    desc: PHP fsockopen paired with proc_open shell
    crit: hostile
    conf: 0.97
    all:
      - id: php-fsockopen-host-port
      - id: php-proc-open-shell
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: php-fsockopen-descriptor-shell
    desc: PHP fsockopen + socket-mapped descriptors
    crit: hostile
    conf: 0.97
    all:
      - id: php-fsockopen-host-port
      - id: php-descriptorspec-socket
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
