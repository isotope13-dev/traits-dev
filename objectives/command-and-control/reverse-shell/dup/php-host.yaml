# PHP reverse shell: fsockopen + proc_open + descriptorspec on socket.
defaults:
  for: [php]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030.002

traits:
  - id: php-fsockopen-host-port
    desc: PHP fsockopen with host literal and port
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'fsockopen\s*\(\s*"[^"]{1,80}"\s*,\s*\d{2,5}'
  - id: php-proc-open-shell
    desc: PHP proc_open invoking a shell
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'proc_open\s*\(\s*"/bin/(ba)?sh'
  - id: php-descriptorspec-socket
    desc: PHP descriptorspec mapping stdio onto socket
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '0\s*=>\s*\$sock'
  - id: php-length-prefix-unpack
    desc: PHP network length unpack
    crit: component
    conf: 0.9
    if:
      type: text
      substr: Nlen
  - id: php-stream-socket-client-string
    desc: PHP stream socket client string
    crit: component
    conf: 0.9
    if:
      type: text
      substr: stream_socket_client
  - id: php-fsockopen-string
    desc: PHP fsockopen function string
    crit: component
    conf: 0.88
    if:
      type: text
      substr: fsockopen
  - id: php-socket-create-string
    desc: PHP socket_create function string
    crit: component
    conf: 0.88
    if:
      type: text
      substr: socket_create
  - id: php-buffer-read-loop
    desc: PHP socket buffer read loop
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'while\s*\(\s*strlen\s*\(\s*\$[A-Za-z_][A-Za-z0-9_]*\s*\)\s*<\s*\$len'
  - id: php-suhosin-eval-bypass
    desc: PHP suhosin eval bypass branch
    crit: suspicious
    conf: 0.9
    unless:
      - id: well-known/app/matomo/
    if:
      type: text
      substr: suhosin.executor.disable_eval
  - id: php-eval-socket-buffer
    desc: PHP eval of socket-read buffer
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      kind: call
      exact: eval
      arg:
        kind: identifier
        name: "$b"
    unless:
      - id: well-known/lib/php-cs-fixer::php-cs-fixer-source-tree

composite_rules:
  - id: php-revshell-hostile
    desc: PHP reverse shell (fsockopen + proc_open shell + stdio descriptors)
    crit: hostile
    conf: 0.99
    all:
      - id: php-fsockopen-host-port
      - id: php-proc-open-shell
      - id: php-descriptorspec-socket
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: php-fsockopen-shell
    desc: PHP fsockopen paired with proc_open shell
    crit: hostile
    conf: 0.97
    all:
      - id: php-fsockopen-host-port
      - id: php-proc-open-shell
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: php-fsockopen-descriptor-shell
    desc: PHP fsockopen + socket-mapped descriptors
    crit: hostile
    conf: 0.97
    all:
      - id: php-fsockopen-host-port
      - id: php-descriptorspec-socket
    unless:
      - id: well-known/tool/detection/llm-scanner/
  - id: php-socket-eval-stage
    desc: PHP socket-delivered eval stage
    crit: hostile
    conf: 0.98
    all:
      - id: php-length-prefix-unpack
      - id: php-buffer-read-loop
      - id: php-eval-socket-buffer
    any:
      - id: micro-behaviors/communications/socket/connect::php-stream-socket-client
      - id: php-stream-socket-client-string
      - id: php-fsockopen-string
      - id: php-socket-create-string
      - id: php-suhosin-eval-bypass
      - id: micro-behaviors/communications/socket/connect::php-socket-connect
    needs: 2
    unless:
      - id: well-known/tool/detection/llm-scanner/
