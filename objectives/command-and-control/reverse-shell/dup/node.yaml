defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  attack: T1059
traits:
- id: new-net-socket
  desc: new net.Socket creation
  crit: notable
  conf: 0.75
  if:
    type: text
    substr: new net.Socket
- id: on-data-event
  desc: Socket data event handler
  crit: component
  conf: 0.78
  if:
    type: text
    regex: '\.on\(["'']data["'']'
- id: exec-function
  desc: child_process exec reference
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\b(exec|execSync)\s*\('
- id: cmd-exe-string
  desc: cmd.exe shell string
  crit: component
  conf: 0.75
  if:
    type: text
    word: cmd.exe
- id: rfc1918-host-string--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(10\.|192\.168\.)'
  count_max: 1009711
- id: rfc1918-host-string--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(172\.(1[6-9]|2[0-9]|3[0-1])\.)'
  count_max: 1009712
composite_rules:
- id: socket-with-exec
  desc: Socket combined with command execution
  crit: suspicious
  conf: 0.9
  near_bytes: 2048
  all:
  - id: new-net-socket
  - id: exec-function
  any:
  - id: on-data-event
  - id: micro-behaviors/data/text/keywords/lexicon::pipe
- id: cmd-shell-rfc1918-bridge
  desc: cmd.exe shell to hardcoded RFC1918 host
  crit: hostile
  conf: 0.95
  all:
  - id: socket-with-exec
  - id: cmd-exe-string
  - id: rfc1918-host-string
- id: rfc1918-host-string
  desc: RFC1918 host string
  crit: component
  conf: 0.75
  any:
  - id: rfc1918-host-string--rx-1
  - id: rfc1918-host-string--rx-2

- id: node-net-connect-spawn-shell
  desc: Node net.connect + spawn shell + pipe
  crit: hostile
  conf: 0.99
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/bridge/
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  unless:
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

- id: node-pipe-shell-stdio-to-socket
  desc: Node sock.pipe to child stdio
  crit: hostile
  conf: 0.98
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  any:
  - id: micro-behaviors/process/create/shell/bridge/
  - id: exec-function
  unless:
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

- id: node-net-connect-shell-pipe-bridge
  desc: Node net.connect + child stdio + shell bridge
  crit: hostile
  conf: 0.97
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/bridge/
  unless:
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

- id: node-spawn-bin-sh-pipe-net
  desc: Node spawn /bin/sh paired with socket pipe
  crit: hostile
  conf: 0.97
  mbc: B0030.002
  all:
  - id: micro-behaviors/process/create/shell/bridge/
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  unless:
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

- id: node-revshell-quadruple
  desc: Node net.connect + require child_process + spawn + bin-sh
  crit: hostile
  conf: 0.99
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/bridge/
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  - id: exec-function
  unless:
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
