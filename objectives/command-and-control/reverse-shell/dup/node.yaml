defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  attack: T1059
traits:
- id: new-net-socket
  desc: new net.Socket creation
  crit: notable
  conf: 0.75
  if:
    type: text
    substr: new net.Socket
- id: on-data-event
  desc: Socket data event handler
  crit: component
  conf: 0.78
  if:
    type: text
    regex: '\.on\(["'']data["'']'
- id: node-net-create-connection
  desc: Node net.createConnection call
  crit: notable
  conf: 0.86
  platforms: [openwrt]
  if:
    type: text
    substr: net.createConnection
- id: node-socket-pipe-shell-stdin
  desc: Node socket piped into spawned shell stdin
  crit: suspicious
  conf: 0.92
  platforms: [openwrt]
  if:
    type: text
    substr: sock.pipe(shell.stdin)
- id: node-shell-stdout-pipe-socket
  desc: Spawned shell stdout piped to Node socket
  crit: suspicious
  conf: 0.92
  platforms: [openwrt]
  if:
    type: text
    substr: shell.stdout.pipe(sock)
- id: cmd-exe-string
  desc: cmd.exe shell string
  crit: component
  conf: 0.75
  if:
    type: text
    word: cmd.exe
- id: rfc1918-host-string--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(10\.|192\.168\.)'
  count_max: 1009711
- id: rfc1918-host-string--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(172\.(1[6-9]|2[0-9]|3[0-1])\.)'
  count_max: 1009712
composite_rules:
- id: socket-with-exec
  desc: Socket combined with command execution
  crit: suspicious
  conf: 0.9
  near_bytes: 2048
  all:
  - id: new-net-socket
  - id: micro-behaviors/process/create/exec::exec-api-call
  any:
  - id: on-data-event
  - id: objectives/command-and-control/remote-command/keywords::pipe
- id: cmd-shell-rfc1918-bridge
  desc: cmd.exe shell to hardcoded RFC1918 host
  crit: hostile
  conf: 0.95
  all:
  - id: socket-with-exec
  - id: cmd-exe-string
  - id: rfc1918-host-string
- id: rfc1918-host-string
  desc: RFC1918 host string
  crit: component
  conf: 0.75
  any:
  - id: rfc1918-host-string--rx-1
  - id: rfc1918-host-string--rx-2

- id: node-net-connect-spawn-shell
  desc: Node net.connect + spawn shell + pipe
  crit: hostile
  conf: 0.99
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/bridge/
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context

- id: node-pipe-shell-stdio-to-socket
  desc: Node sock.pipe to child stdio
  crit: hostile
  conf: 0.98
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  any:
  - id: micro-behaviors/process/create/shell/bridge/
  - id: micro-behaviors/process/create/exec::exec-api-call
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context

- id: node-net-connect-shell-pipe-bridge
  desc: Node net.connect + child stdio + shell bridge
  crit: hostile
  conf: 0.97
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/bridge/
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context
  - id: metadata/package/testing/harness/runtime::is-test

- id: node-spawn-bin-sh-pipe-net
  desc: Node spawn /bin/sh paired with socket pipe
  crit: hostile
  conf: 0.97
  mbc: B0030.002
  all:
  - id: micro-behaviors/process/create/shell/bridge/
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context

- id: node-revshell-quadruple
  desc: Node socket child-process shell
  crit: hostile
  conf: 0.99
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/bridge/
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  - id: micro-behaviors/process/create/exec::exec-api-call
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context

- id: node-createconnection-stdio-reverse-shell
  desc: Node net.createConnection stdio reverse shell
  crit: hostile
  conf: 0.98
  mbc: B0030.002
  platforms: [openwrt]
  all:
  - id: node-net-create-connection
  - id: node-socket-pipe-shell-stdin
  - id: node-shell-stdout-pipe-socket
  - id: micro-behaviors/process/create/shell/invoke::bin-sh
  unless:
  - id: well-known/tool/detection/llm-scanner::llm-scanner-context
