defaults:
  platforms: [linux, macos, windows]
  for: [javascript, typescript]
  attack: T1059
traits:
- id: node-socket-pipe-shell-stdin
  desc: Node socket piped into spawned shell stdin
  crit: suspicious
  conf: 0.92
  platforms: [openwrt]
  if:
    type: text
    substr: sock.pipe(shell.stdin)
- id: node-shell-stdout-pipe-socket
  desc: Spawned shell stdout piped to Node socket
  crit: suspicious
  conf: 0.92
  platforms: [openwrt]
  if:
    type: text
    substr: shell.stdout.pipe(sock)
- id: cmd-exe-string
  desc: cmd.exe shell string
  crit: component
  conf: 0.75
  if:
    type: text
    word: cmd.exe
- id: rfc1918-host-string--rx-1
  desc: RFC1918 private IP prefix (10./192.168.)
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(10\.|192\.168\.)'
  count_max: 1009711
- id: rfc1918-host-string--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '(172\.(1[6-9]|2[0-9]|3[0-1])\.)'
  count_max: 1009712
- id: node-exec-inline-python-socket-dup2
  desc: Node exec runs inline Python
  crit: component
  conf: 0.96
  if:
    type: text
    regex: '\bexec\s*\(.{0,120}python\s+-c'
- id: inline-python-socket-create
  desc: Inline Python socket creation
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'socket\.socket\s*\('
- id: inline-python-socket-connect
  desc: Inline Python socket connect
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '\.connect\s*\(\s*\('
- id: inline-python-dup2-fileno
  desc: Inline Python dup2 fileno redirect
  crit: suspicious
  unless:
  - id: well-known/tool/offensive/pentestkit::local-storage-panel
  conf: 0.96
  if:
    type: text
    regex: 'os\.dup2\s*\(.{0,80}\.fileno\s*\(\s*\)'
- id: node-exec-inline-python-pty-shell
  desc: Node exec embeds Python PTY shell
  crit: suspicious
  unless:
    - id: well-known/tool/offensive/pentestkit/
  conf: 0.96
  if:
    type: text
    regex: 'pty\.spawn\s*\(\s*\\?["'']/bin/(sh|bash)\\?["'']'
composite_rules:
- id: node-dev-tcp-bash-reverse-shell
  desc: Node Bash reverse shell over dev-tcp
  crit: hostile
  conf: 0.99
  mbc: B0030.002
  all:
  - id: micro-behaviors/process/create/shell/spawn::node-spawn-bash-shell
  - id: micro-behaviors/communications/socket/connect::dev-tcp-path
  - id: micro-behaviors/process/create/shell/spawn::bash-interactive-fd-bridge
  near_bytes: 1200
- id: socket-with-exec
  desc: Socket combined with command execution
  crit: suspicious
  conf: 0.9
  near_bytes: 2048
  all:
  - id: micro-behaviors/communications/socket/connect::net-socket-connect-method
  - id: micro-behaviors/process/create/exec::exec-api-call
  any:
  - id: micro-behaviors/communications/socket/receive::node-socket-data-event
  - id: micro-behaviors/process/fd/stdio::node-stream-pipe
- id: cmd-shell-rfc1918-bridge
  desc: cmd.exe shell to hardcoded RFC1918 host
  crit: hostile
  conf: 0.95
  all:
  - id: socket-with-exec
  - id: cmd-exe-string
  - id: rfc1918-host-string
- id: rfc1918-host-string
  desc: RFC1918 host string
  crit: component
  conf: 0.75
  any:
  - id: rfc1918-host-string--rx-1
  - id: rfc1918-host-string--rx-2

- id: node-exec-inline-python-reverse-shell
  desc: Node exec inline Python reverse shell
  crit: hostile
  conf: 0.99
  mbc: B0030.002
  near_bytes: 1200
  all:
  - id: inline-python-dup2-fileno
  - id: node-exec-inline-python-pty-shell
  - id: micro-behaviors/process/create/shell/bridge::js-exec
  any:
  - id: node-exec-inline-python-socket-dup2
  - id: inline-python-socket-create
  - id: inline-python-socket-connect
  - id: micro-behaviors/process/create/shell/spawn::bin-sh
  unless:
  - id: well-known/tool/detection/llm-scanner/

- id: node-net-connect-spawn-shell
  desc: Node net.connect + spawn shell + pipe
  crit: hostile
  conf: 0.99
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/bridge/
  - id: micro-behaviors/process/create/shell/spawn::bin-sh
  unless:
  - id: well-known/tool/detection/llm-scanner/

- id: node-pipe-shell-stdio-to-socket
  desc: Node sock.pipe to child stdio
  crit: hostile
  conf: 0.98
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/spawn::bin-sh
  any:
  - id: micro-behaviors/process/create/shell/bridge/
  - id: micro-behaviors/process/create/exec::exec-api-call
  unless:
  - id: well-known/tool/detection/llm-scanner/

- id: node-net-connect-shell-pipe-bridge
  desc: Node net.connect + child stdio + shell bridge
  crit: hostile
  conf: 0.97
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/bridge/
  unless:
  - id: well-known/tool/detection/llm-scanner/

- id: node-spawn-bin-sh-pipe-net
  desc: Node spawn /bin/sh paired with socket pipe
  crit: hostile
  conf: 0.97
  mbc: B0030.002
  all:
  - id: micro-behaviors/process/create/shell/bridge/
  - id: micro-behaviors/process/create/shell/spawn::bin-sh
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  unless:
  - id: well-known/tool/detection/llm-scanner/

- id: node-revshell-quadruple
  desc: Node socket child-process shell
  crit: hostile
  conf: 0.99
  mbc: B0030.002
  all:
  - id: micro-behaviors/communications/socket/connect::net-connect-port
  - id: micro-behaviors/process/create/shell/bridge/
  - id: micro-behaviors/process/create/shell/spawn::bin-sh
  - id: micro-behaviors/process/create/exec::exec-api-call
  unless:
  - id: well-known/tool/detection/llm-scanner/

- id: node-createconnection-stdio-reverse-shell
  desc: Node net.createConnection stdio reverse shell
  crit: hostile
  conf: 0.98
  mbc: B0030.002
  platforms: [openwrt]
  all:
  - id: micro-behaviors/communications/socket/connect::net-create-connection-call
  - id: node-socket-pipe-shell-stdin
  - id: node-shell-stdout-pipe-socket
  - id: micro-behaviors/process/create/shell/spawn::bin-sh
  unless:
  - id: well-known/tool/detection/llm-scanner/

- id: node-dynamic-import-reverse-shell
  desc: Node dynamically imported command shell bridged to socket
  crit: hostile
  conf: 0.99
  mbc: B0030.002
  attack: T1059.007
  all:
  - id: micro-behaviors/os/module/load::dynamic-import-expression
  - id: micro-behaviors/process/create/exec::js-object-exec-call
  - id: micro-behaviors/communications/socket/connect::node-net-socket-connect
  - id: micro-behaviors/process/fd/stdio::node-stream-to-stdin-pipe
  - id: micro-behaviors/process/fd/stdio::node-child-output-to-stream-pipe
  near_bytes: 2048
  unless:
  - id: well-known/tool/detection/llm-scanner/
