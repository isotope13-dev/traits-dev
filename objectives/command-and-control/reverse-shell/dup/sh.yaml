defaults:
  platforms:
    - unix
    - windows
  attack: T1059.004
traits:
  - id: reverse-shell-shell-complete
    desc: Bash reverse shell via /dev/tcp
    crit: suspicious
    conf: 0.98
    for:
      - shell
      - package.json
      - javascript
    if:
      type: text
      regex: (/bin/)?(ba)?sh\s+-i\b.{0,40}/dev/tcp/
    unless:
      - id: well-known/tool/detection/security-scanner
  - id: reverse-shell-shell
    desc: Bash reverse shell via /dev/tcp
    crit: suspicious
    conf: 0.95
    for:
      - shell
      - package.json
      - javascript
    if:
      type: text
      regex: (/bin/)?(ba)?sh\s+-i\b.{0,80}/dev/tcp/
    unless:
      - id: well-known/tool/detection/security-scanner
  - id: shell-dev-tcp-fd
    desc: Bash fd redirect to /dev/tcp
    crit: suspicious
    conf: 0.95
    for:
      - shell
    if:
      type: text
      regex: exec\s+[0-9]+<>"?/dev/tcp/
    not:
      # Loopback port probes are local health checks, not reverse shells.
      - regex: 'exec\s+[0-9]+<>"?/dev/tcp/(127\.0\.0\.1|localhost|::1)/'
    unless:
      - type: text
        substr: 'timeout 3 bash -c "exec 3<>/dev/tcp/'
      - type: text
        substr: 'port_busy()'
      - type: text
        substr: '/dev/tcp/127.0.0.1/'
      - id: well-known/app/stirling-pdf::source-tree
  - id: dev-tcp-http-get
    desc: HTTP GET via /dev/tcp socket
    crit: suspicious
    conf: 0.95
    for:
      - shell
    if:
      type: string_literal
      regex: /dev/tcp/.{0,64}GET\s+/
  - id: dev-tcp-http-host
    desc: HTTP Host header via /dev/tcp
    crit: suspicious
    conf: 0.9
    for:
      - shell
    if:
      type: string_literal
      regex: '/dev/tcp/.{0,50}Host:'
  - id: nc-pipe-dup
    desc: Netcat with pipe
    crit: notable
    conf: 0.5
    for:
      - shell
      - package.json
    if:
      type: text
      regex: '\| {0,2}nc '
    unless:
      - type: text
        regex: \becho\b.{0,16}\|\s*nc\b
  - id: reverse-shell-python
    desc: Python reverse shell pattern
    crit: suspicious
    conf: 0.95
    attack: T1059.006
    for:
      - shell
      - package.json
      - python
    if:
      type: text
      regex: python[23]?\s+-c\s+['"]import socket.{0,50}subprocess.{0,50}connect
  - id: sh-reverse-shell-perl
    desc: Perl socket reverse shell
    crit: suspicious
    conf: 0.95
    attack: T1059
    for:
      - shell
      - package.json
    if:
      type: text
      regex: perl\s+-e\s+['"].{0,50}socket.{0,50}connect.{0,50}exec
  - id: nc-exec-sh
    desc: nc -e shell execution
    crit: suspicious
    conf: 0.9
    for:
      - shell
      - package.json
      - javascript
      - typescript
    if:
      type: text
      regex: '\bnc\s+[-\w. ]{0,90}-e\s+(/usr/bin/|/bin/)?(ba)?sh\b'
    unless:
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
  - id: ncat-exec-sh
    desc: ncat -e shell execution
    crit: suspicious
    conf: 0.9
    for:
      - shell
      - package.json
      - javascript
      - typescript
    if:
      type: text
      regex: '\bncat\s+[-\w. ]{0,90}-e\s+(/usr/bin/|/bin/)?(ba)?sh\b'
  - id: netcat-exec-sh
    desc: netcat -e shell execution
    crit: suspicious
    conf: 0.9
    for:
      - shell
      - package.json
      - javascript
      - typescript
    if:
      type: text
      regex: '\bnetcat\s+[-\w. ]{0,90}-e\s+(/usr/bin/|/bin/)?(ba)?sh\b'
  - id: php-cli-fsockopen
    desc: PHP CLI fsockopen reverse-shell setup
    crit: component
    conf: 0.9
    attack: T1059
    for:
      - shell
      - package.json
      - php
    if:
      type: text
      regex: php\s+-r\s+['"].{0,80}fsockopen
  - id: php-var-fsockopen
    desc: PHP fsockopen socket variable
    crit: component
    conf: 0.9
    attack: T1059
    for:
      - shell
      - package.json
      - php
    if:
      type: text
      regex: '\$sock\s*=\s*fsockopen'
  - id: php-shell-exec-func-a
    desc: PHP shell execution function
    crit: component
    conf: 0.85
    attack: T1059
    for:
      - shell
      - package.json
      - php
    if:
      type: text
      regex: \b(shell_exec|exec|system)\s*\(
  - id: php-shell-exec-func-b
    desc: PHP process execution function
    crit: component
    conf: 0.85
    attack: T1059
    for:
      - shell
      - package.json
      - php
    if:
      type: text
      regex: \b(popen|proc_open)\s*\(
  - id: sh-reverse-shell-ruby-1
    desc: Ruby socket reverse shell (cli execution)
    crit: suspicious
    conf: 0.95
    attack: T1059
    for:
      - shell
      - package.json
      - ruby
    if:
      type: text
      regex: ruby\s+-rsocket\s+-e.{0,80}(exec|spawn|system)
  - id: sh-reverse-shell-ruby-2
    desc: Ruby socket reverse shell (cli path)
    crit: suspicious
    conf: 0.95
    attack: T1059
    for:
      - shell
      - package.json
      - ruby
    if:
      type: text
      regex: ruby\s+-rsocket\s+-e.{0,80}(/bin/sh|/bin/shell)
  - id: sh-reverse-shell-ruby-3
    desc: Ruby socket reverse shell (TCPSocket)
    crit: suspicious
    conf: 0.95
    attack: T1059
    for:
      - shell
      - package.json
      - ruby
    if:
      type: text
      regex: ruby\s+-rsocket\s+-e.{0,160}TCPSocket\.open.{0,160}(exec|spawn|system)
composite_rules:
  - id: reverse-shell-dev-tcp
    desc: Interactive shell reverse shell
    crit: hostile
    conf: 0.99
    mbc: B0022
    for:
      - shell
      - package.json
      - javascript
    all:
      - id: micro-behaviors/communications/socket/connect::dev-tcp-external-ip
      - id: micro-behaviors/process/create/shell/interactive::sh-interactive
      - id: objectives/command-and-control/backdoor/shell/reverse::stdin-redirect-dup
  - id: sh-reverse-shell-ruby
    desc: Ruby socket reverse shell
    crit: suspicious
    conf: 0.95
    attack: T1059
    for:
      - shell
      - package.json
      - ruby
    any:
      - id: sh-reverse-shell-ruby-1
      - id: sh-reverse-shell-ruby-2
      - id: sh-reverse-shell-ruby-3
  - id: reverse-shell-php
    desc: PHP reverse shell pattern
    crit: suspicious
    conf: 0.95
    attack: T1059
    for:
      - shell
      - package.json
      - php
    all:
      - id: php-fsockopen-socket
      - id: php-shell-exec-function
  - id: php-fsockopen-socket
    desc: PHP fsockopen socket setup
    crit: component
    conf: 0.9
    attack: T1059
    for:
      - shell
      - package.json
      - php
    any:
      - id: php-cli-fsockopen
      - id: php-var-fsockopen
  - id: php-shell-exec-function
    desc: PHP shell execution function
    crit: component
    conf: 0.9
    attack: T1059
    for:
      - shell
      - package.json
      - php
    any:
      - id: php-shell-exec-func-a
      - id: php-shell-exec-func-b
  - id: reverse-shell-mkfifo
    desc: Reverse shell using mkfifo and
    crit: hostile
    conf: 0.95
    for:
      - shell
      - package.json
    all:
      - id: micro-behaviors/fs/pipe/fifo::mkfifo-cmd
      - id: micro-behaviors/process/create/shell/interactive::sh-interactive
      - id: objectives/command-and-control/reverse-shell/dup::nc-pipe-dup
  - id: reverse-shell-netcat
    desc: Netcat reverse shell pattern
    crit: hostile
    conf: 0.96
    for:
      - shell
      - package.json
      - javascript
      - typescript
    all:
      - id: micro-behaviors/communications/socket/netcat/
      - id: micro-behaviors/process/create/shell/spawn/
    any:
      - id: nc-exec-sh
      - id: ncat-exec-sh
      - id: netcat-exec-sh
    unless:
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
  - id: shell-dev-tcp-http
    desc: Bash /dev/tcp HTTP client
    crit: hostile
    conf: 0.95
    for:
      - shell
    all:
      - id: shell-dev-tcp-fd
    any:
      - id: dev-tcp-http-get
      - id: dev-tcp-http-host
