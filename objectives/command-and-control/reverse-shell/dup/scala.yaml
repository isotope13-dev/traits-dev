# Scala reverse shell: java.net.Socket + ProcessBuilder shell + stream bridge.
defaults:
  for: [scala]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030.002

traits:
  - id: scala-processbuilder-shell
    desc: Scala ProcessBuilder with shell binary
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'new\s+ProcessBuilder\s*\(\s*"/bin/(ba)?sh"\s*,\s*"-[ic]"'
  - id: scala-stream-loop-bridge
    desc: Scala Socket-Process stream copy loop
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'getInputStream;.{0,80}getOutputStream'

composite_rules:
  - id: scala-revshell
    desc: Scala reverse shell (Socket + ProcessBuilder shell + stream bridge)
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/socket/connect::new-socket-host-port
      - id: scala-processbuilder-shell
      - id: scala-stream-loop-bridge
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context

  - id: scala-socket-processbuilder
    desc: Scala Socket constructor paired with ProcessBuilder shell
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/connect::new-socket-host-port
      - id: scala-processbuilder-shell
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context

  - id: scala-processbuilder-stream-bridge
    desc: Scala ProcessBuilder shell + stream bridge loop
    crit: hostile
    conf: 0.97
    all:
      - id: scala-processbuilder-shell
      - id: scala-stream-loop-bridge
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
