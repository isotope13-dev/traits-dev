# Groovy reverse shell: Socket + ["/bin/sh","-i"].execute() + stream wiring.
defaults:
  for: [groovy]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030.002

traits:
  - id: groovy-list-shell-execute
    desc: Groovy list-literal shell .execute()
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\[\s*"/bin/[a-z]+"\s*,\s*"-[ic]"\s*\]\.execute\s*\('
  - id: groovy-consume-process-output-socket
    desc: 'groovy consume process output socket'
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\.consumeProcessOutput\s*\(\s*[a-zA-Z_]\w*\.outputStream'
  - id: groovy-netcat-list-command
    desc: Groovy netcat command list
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\[\s*["'']nc["'']\s*,'
  - id: groovy-netcat-e-shell-arg
    desc: Groovy netcat -e shell arg
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '["'']-e["'']\s*,\s*["'']/bin/(sh|bash)["'']'
  - id: groovy-processbuilder-start
    desc: Groovy ProcessBuilder start
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'new\s+ProcessBuilder\s*\(.{0,80}\)\.start\s*\('
  - id: groovy-python-c-command
    desc: Groovy Python command string
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'python3?\s+-c\s+["'']'
  - id: groovy-python-socket-connect
    desc: Python socket connect string
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: s.connect((
  - id: groovy-python-dup2-stdio
    desc: Python dup2 stdio redirect
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: os.dup2(s.fileno()
  - id: groovy-python-pty-shell
    desc: Python pty shell spawn
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: pty.spawn(

composite_rules:
  - id: groovy-revshell
    desc: Groovy reverse shell (Socket + .execute shell + stream plumbing)
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/socket/connect::new-socket-host-port
      - id: groovy-list-shell-execute
      - id: groovy-consume-process-output-socket
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: groovy-socket-shell-execute
    desc: Groovy Socket constructor paired with shell .execute()
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/connect::new-socket-host-port
      - id: groovy-list-shell-execute
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: groovy-consume-output-execute
    desc: Groovy shell .execute() + socket stream consume
    crit: hostile
    conf: 0.97
    all:
      - id: groovy-list-shell-execute
      - id: groovy-consume-process-output-socket
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: groovy-netcat-reverse-shell
    desc: Groovy Netcat reverse shell
    crit: hostile
    conf: 0.98
    all:
      - id: groovy-netcat-list-command
      - id: groovy-netcat-e-shell-arg
      - id: groovy-processbuilder-start
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: groovy-python-reverse-shell
    desc: Groovy Python reverse shell
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/infrastructure/ci-abuse::groovy-shell-lc-execute
      - id: groovy-python-c-command
      - id: groovy-python-socket-connect
      - id: groovy-python-dup2-stdio
      - id: groovy-python-pty-shell
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: groovy-python-reverse-shell-payload
    desc: Groovy embeds Python reverse-shell payload
    crit: hostile
    conf: 0.97
    all:
      - id: groovy-python-c-command
      - id: groovy-python-socket-connect
      - id: groovy-python-dup2-stdio
      - id: groovy-python-pty-shell
    unless:
      - id: well-known/tool/detection/llm-scanner/
