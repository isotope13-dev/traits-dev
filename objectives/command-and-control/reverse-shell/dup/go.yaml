defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [go]
  attack: T1059
composite_rules:
  - id: go-reverse-shell-comp
    desc: Go reverse shell implementation patterns
    crit: suspicious
    conf: 0.85
    mbc: B0033
    all:
      - id: micro-behaviors/communications/socket/connect::go-dial-methods
    any:
      - id: micro-behaviors/process/create/shell/lang::go-exec-command-bin-sh
      - id: objectives/command-and-control/reverse-shell/stdio::process-stream-on-conn
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit/

  - id: go-revshell
    desc: Go reverse shell (net.Dial + exec.Command shell + stdio wiring)
    crit: hostile
    conf: 0.99
    mbc: B0030.002
    all:
      - id: micro-behaviors/communications/socket/dial::go-net-dial-literal-endpoint
      - id: micro-behaviors/process/create/shell/lang::go-exec-command-bin-sh
      - id: objectives/command-and-control/reverse-shell/stdio::process-stream-on-conn
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: go-net-dial-shell-exec
    desc: Go net.Dial paired with exec.Command shell
    crit: hostile
    conf: 0.97
    mbc: B0030.002
    all:
      - id: micro-behaviors/communications/socket/dial::go-net-dial-literal-endpoint
      - id: micro-behaviors/process/create/shell/lang::go-exec-command-bin-sh
    unless:
      - id: well-known/tool/detection/llm-scanner/
