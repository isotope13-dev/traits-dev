defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [go]
traits:
  - id: go-net-dial-host-port
    desc: Go net.Dial with host literal and port
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'net\.Dial\s*\(\s*"tcp"\s*,\s*"[^"]{1,80}:\d{2,5}"'
  - id: go-exec-command-bin-sh
    desc: Go exec.Command with /bin/sh
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'exec\.Command\s*\(\s*"/bin/(ba)?sh"'

composite_rules:
  - id: go-reverse-shell-comp
    desc: Go reverse shell implementation patterns
    crit: suspicious
    conf: 0.85
    mbc: B0033
    attack: T1059
    all:
      - id: micro-behaviors/communications/socket/
    any:
      - id: micro-behaviors/process/create/system::go-os-exec
      - id: micro-behaviors/process/create/shell/lang::exec-cmd-start
      - id: micro-behaviors/process/create/shell/lang::exec-cmd-run
      - id: micro-behaviors/process/create/direct::exec-command
      - id: micro-behaviors/process/create/shell/lang::pipe-redirection
      - id: micro-behaviors/process/create/shell/
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test

  - id: go-revshell
    desc: Go reverse shell (net.Dial + exec.Command shell + stdio wiring)
    crit: hostile
    conf: 0.99
    mbc: B0030.002
    attack: T1059
    all:
      - id: go-net-dial-host-port
      - id: go-exec-command-bin-sh
      - id: objectives/command-and-control/reverse-shell/stdio::process-stream-on-conn
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: go-net-dial-shell-exec
    desc: Go net.Dial paired with exec.Command shell
    crit: hostile
    conf: 0.97
    mbc: B0030.002
    attack: T1059
    all:
      - id: go-net-dial-host-port
      - id: go-exec-command-bin-sh
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
