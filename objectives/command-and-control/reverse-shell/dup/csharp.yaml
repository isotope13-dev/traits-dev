# C# reverse shell: TcpClient + Process redirect stdio + cmd.exe/sh.
defaults:
  for: [csharp]
  platforms: [linux, macos, windows]
  attack: T1059
  mbc: B0030.002

traits:
  - id: csharp-tcpclient-host-port
    desc: C# TcpClient with host and port literal
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'new\s+TcpClient\s*\(\s*"[^"]{1,80}"\s*,\s*\d{2,5}\s*\)'
  - id: csharp-process-redirect-stdio
    desc: C# Process redirects standard input/output
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'RedirectStandard(Input|Output|Error)\s*=\s*true'
  - id: csharp-getstream-on-tcpclient
    desc: C# GetStream() on TcpClient
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\.GetStream\s*\(\s*\)'
  - id: csharp-cmd-exe-startinfo
    desc: C# StartInfo.FileName set to cmd.exe
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'StartInfo\.FileName\s*=\s*"cmd\.exe"'
  - id: csharp-process-start-shell
    desc: C# Process.Start with shell binary
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bnew\s+Process\s*\('

composite_rules:
  - id: csharp-revshell
    desc: C# reverse shell (TcpClient + redirected Process stdio + shell)
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-tcpclient-host-port
      - id: csharp-process-redirect-stdio
      - id: csharp-getstream-on-tcpclient
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context

  - id: csharp-cmd-revshell
    desc: C# TcpClient + cmd.exe Process redirection
    crit: hostile
    conf: 0.99
    all:
      - id: csharp-tcpclient-host-port
      - id: csharp-process-redirect-stdio
      - id: csharp-cmd-exe-startinfo
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context

  - id: csharp-tcpclient-process-shell
    desc: C# TcpClient + Process + cmd.exe shell
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-tcpclient-host-port
      - id: csharp-process-start-shell
      - id: csharp-cmd-exe-startinfo
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
