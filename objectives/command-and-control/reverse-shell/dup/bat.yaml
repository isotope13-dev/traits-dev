# Batch reverse shell launcher: cmd.exe spawns powershell with -enc TCPClient.
defaults:
  for: [batch]
  platforms: [windows]
  attack: T1059.001
  mbc: B0030.002

traits:
  - id: bat-powershell-hidden-launcher
    desc: Batch invokes hidden powershell
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'powershell(\.exe)?\s+-nop\s+(-w\s+hidden\s+)?-(c|enc|e)\b'
  - id: bat-powershell-tcpclient-inline
    desc: 'bat PS tcpclient inline'
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: 'Net.Sockets.TCPClient'

composite_rules:
  - id: bat-powershell-revshell
    desc: Batch launcher containing inline PowerShell TCPClient revshell
    crit: hostile
    conf: 0.99
    all:
      - id: bat-powershell-hidden-launcher
      - id: bat-powershell-tcpclient-inline
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: bat-powershell-hidden-tcpclient
    desc: Batch launches hidden PowerShell with TCPClient payload
    crit: hostile
    conf: 0.98
    all:
      - id: bat-powershell-hidden-launcher
    any:
      - id: bat-powershell-tcpclient-inline
      - id: objectives/command-and-control/reverse-shell/encoded::tcpclient-base64-payload
    unless:
      - id: well-known/tool/detection/llm-scanner/
