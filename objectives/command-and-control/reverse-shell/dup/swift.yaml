# Swift reverse shell: NWConnection + Process + /bin/sh.
defaults:
  for: [swift]
  platforms: [macos, ios]
  attack: T1059
  mbc: B0030.002

traits:
  - id: swift-nwendpoint-host-port
    desc: Swift NWEndpoint with host literal
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'NWEndpoint\.Host\s*\(\s*"[^"]{1,80}"\s*\)'
  - id: swift-nwendpoint-port-literal
    desc: Swift NWEndpoint.Port with raw port value
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: 'NWEndpoint\.Port\s*\(\s*rawValue\s*:\s*\d{2,5}'
  - id: swift-process-launchpath-bin-sh
    desc: Swift Process.launchPath set to /bin/sh
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '\.launchPath\s*=\s*"/bin/(ba)?sh"'
  - id: swift-pipe-handle-wires-stdio
    desc: Swift FileHandle wires Process stdio
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'standard(Input|Output|Error)\s*=\s*stdin|standardError\s*=\s*stdout'

composite_rules:
  - id: swift-revshell
    desc: Swift reverse shell (NWConnection + Process /bin/sh + stdio piping)
    crit: hostile
    conf: 0.99
    all:
      - id: swift-nwendpoint-host-port
      - id: swift-nwendpoint-port-literal
      - id: swift-process-launchpath-bin-sh
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: swift-nwconnection-shell
    desc: Swift NWConnection paired with Process shell
    crit: hostile
    conf: 0.97
    all:
      - id: swift-nwendpoint-host-port
      - id: swift-process-launchpath-bin-sh
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: swift-nwendpoint-process-pipe
    desc: Swift NWEndpoint + Process shell + stdio pipe
    crit: hostile
    conf: 0.98
    all:
      - id: swift-nwendpoint-port-literal
      - id: swift-process-launchpath-bin-sh
      - id: swift-pipe-handle-wires-stdio
    unless:
      - id: well-known/tool/detection/llm-scanner/
