defaults:
  platforms: [windows]
  for: [powershell, scripts]
  attack: "T1059.001,T1105"
traits:
  - id: powershell-tcpclient-stream
    desc: PowerShell TcpClient stream channel
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(?i)New-Object\s+(System\.)?Net\.Sockets\.TCPClient[\s\S]{0,500}\.GetStream\s*\(\s*\)'
  - id: powershell-command-output-loop
    desc: PowerShell command output socket loop
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '(?i)Out-String[\s\S]{0,500}\.Write\s*\('
  - id: powershell-tcpclient-host-port
    desc: PowerShell TCPClient with host literal
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)New-Object\s+(System\.)?Net\.Sockets\.TCPClient\s*\(\s*"[^"]{1,80}"\s*,\s*\d{2,5}\s*\)'
  - id: powershell-iex-on-stream-read
    desc: PowerShell iex consumes stream-read bytes
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: '(?i)\(iex\s+\$\w+(\s+2>&1)?\s*\|\s*Out-String\)'
composite_rules:
  - id: powershell-tcpclient-command-loop
    desc: PowerShell TcpClient reverse command loop
    crit: hostile
    conf: 0.99
    all:
      - id: powershell-tcpclient-stream
      - id: powershell-command-output-loop
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: powershell-tcpclient-iex-revshell
    desc: PowerShell TCPClient + iex consumer = reverse shell
    crit: hostile
    conf: 0.99
    all:
      - id: powershell-tcpclient-host-port
      - id: powershell-iex-on-stream-read
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: powershell-tcpclient-revshell
    desc: PowerShell TCPClient reverse-shell skeleton
    crit: hostile
    conf: 0.97
    all:
      - id: powershell-tcpclient-host-port
      - id: powershell-tcpclient-stream
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
