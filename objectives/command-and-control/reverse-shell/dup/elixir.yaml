# Elixir reverse shell: :gen_tcp.connect + System.cmd to /bin/sh.
defaults:
  for: [elixir]
  platforms: [linux, macos]
  attack: T1059
  mbc: B0030.002

traits:
  - id: elixir-system-cmd-sh
    desc: Elixir System.cmd invocation of a shell binary
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'System\.cmd\s*\(\s*"[^"]{0,80}/?(sh|bash|zsh)"'
  - id: elixir-gen-tcp-host-port
    desc: 'elixir gen tcp host port'
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: ':gen_tcp\.connect\s*\(\s*~c"[^"]{1,80}"\s*,\s*\d{2,5}'

composite_rules:
  - id: elixir-revshell
    desc: Elixir reverse shell (gen_tcp + System.cmd shell)
    crit: hostile
    conf: 0.98
    all:
      - id: elixir-gen-tcp-host-port
      - id: elixir-system-cmd-sh
      - id: micro-behaviors/communications/socket/connect::gen-tcp-connect
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context

  - id: elixir-gen-tcp-shell-recv-loop
    desc: Elixir gen_tcp recv loop pairs with System.cmd shell
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/socket/connect::gen-tcp-connect
      - id: elixir-system-cmd-sh
    any:
      - id: elixir-gen-tcp-host-port
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context

  - id: elixir-gen-tcp-host-shell
    desc: Elixir gen_tcp host literal + shell exec
    crit: hostile
    conf: 0.97
    all:
      - id: elixir-gen-tcp-host-port
      - id: elixir-system-cmd-sh
    unless:
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
