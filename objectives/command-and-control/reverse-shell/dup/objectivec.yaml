# Objective-C reverse shell: BSD socket + dup2 + NSTask /bin/sh.
defaults:
  for: [objc]
  platforms: [linux, macos]
  attack: T1059
  mbc: B0030.002

traits:
  - id: nstask-launch-bin-sh
    desc: NSTask launchPath set to /bin/sh
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'setLaunchPath\s*:\s*@"/bin/(ba)?sh"'
  - id: nstask-interactive-args
    desc: NSTask interactive shell args (-i)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'setArguments\s*:\s*@\[\s*@"-i"\s*\]'
  - id: objc-socket-af-inet
    desc: BSD socket(AF_INET) call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bsocket\s*\(\s*AF_INET\b'
  - id: objc-dup2-fd-stdio
    desc: dup2 socket fd onto stdio slot
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bdup2\s*\(\s*\w+\s*,\s*[0-2]\s*\)'
  - id: objc-connect-call
    desc: BSD connect() call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bconnect\s*\(\s*\w+\s*,\s*\(struct\s+sockaddr'

composite_rules:
  - id: objc-revshell
    desc: Objective-C reverse shell (socket + dup2 + NSTask /bin/sh -i)
    crit: hostile
    conf: 0.99
    all:
      - id: objc-socket-af-inet
      - id: objc-dup2-fd-stdio
      - id: nstask-launch-bin-sh
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: objc-nstask-interactive-shell
    desc: Objective-C NSTask launches interactive shell after socket dup2
    crit: hostile
    conf: 0.98
    all:
      - id: nstask-launch-bin-sh
      - id: nstask-interactive-args
      - id: objc-dup2-fd-stdio
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: objc-bsd-socket-revshell-triple
    desc: BSD socket + connect + dup2 + NSTask shell
    crit: hostile
    conf: 0.99
    all:
      - id: objc-socket-af-inet
      - id: objc-connect-call
      - id: objc-dup2-fd-stdio
      - id: nstask-launch-bin-sh
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
