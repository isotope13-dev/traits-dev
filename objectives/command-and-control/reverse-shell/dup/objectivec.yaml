# Objective-C reverse shell: BSD socket + dup2 + NSTask /bin/sh.
defaults:
  for: [objc]
  platforms: [linux, macos]
  attack: T1059
  mbc: B0030.002

traits:
  - id: nstask-launch-bin-sh
    desc: NSTask launchPath set to /bin/sh
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'setLaunchPath\s*:\s*@"/bin/(ba)?sh"'
  - id: nstask-interactive-args
    desc: NSTask interactive shell args (-i)
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'setArguments\s*:\s*@\[\s*@"-i"\s*\]'
  - id: objc-dup2-fd-stdio
    desc: dup2 socket fd onto stdio slot
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bdup2\s*\(\s*\w+\s*,\s*[0-2]\s*\)'
  - id: objc-dup2-symbolic-stdio
    desc: dup2 socket fd onto stdio macro
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bdup2\s*\(\s*\w+\s*,\s*STD(IN|OUT|ERR)_FILENO\s*\)'
  - id: objc-connect-call
    desc: BSD connect() call
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: '\bconnect\s*\(\s*\w+\s*,\s*\(struct\s+sockaddr'
  - id: objc-posix-spawn-shell
    desc: Objective-C posix_spawn shell
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'posix_spawn\s*\([^;]{0,220}"/bin/(ba)?sh"'
  - id: objc-posix-spawn-shell-var
    desc: Objective-C posix_spawn shell var
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'const char \*shell = "/bin/(ba)?sh"[\s\S]{0,260}posix_spawn\s*\([^;]{0,120}\bshell\b'
  - id: objc-systemd-revshell-unit
    desc: ObjC systemd revshell unit
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'revshell\.service[\s\S]{0,360}/dev/tcp/%s/4444'
  - id: objc-systemd-wantedby-default
    desc: ObjC systemd WantedBy default
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: WantedBy=default.target
  - id: objc-systemd-restart-always
    desc: ObjC systemd restart always
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Restart=always

composite_rules:
  - id: objc-dup2-stdio
    desc: Objective-C dup2 stdio redirect
    crit: notable
    conf: 0.92
    any:
      - id: objc-dup2-fd-stdio
      - id: objc-dup2-symbolic-stdio

  - id: objc-shell-spawn
    desc: Objective-C shell spawn
    crit: notable
    conf: 0.92
    any:
      - id: nstask-launch-bin-sh
      - id: objc-posix-spawn-shell
      - id: objc-posix-spawn-shell-var

  - id: objc-revshell
    desc: Objective-C socket dup2 reverse shell
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/socket/create::objc-ipv4-tcp-socket-source
      - id: nstask-launch-bin-sh
      - id: objc-dup2-stdio
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: objc-nstask-interactive-shell
    desc: Objective-C NSTask dup2 shell
    crit: hostile
    conf: 0.98
    all:
      - id: nstask-launch-bin-sh
      - id: nstask-interactive-args
      - id: objc-dup2-stdio
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: objc-bsd-socket-revshell-triple
    desc: BSD socket dup2 shell
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/socket/create::objc-ipv4-tcp-socket-source
      - id: objc-connect-call
      - id: objc-dup2-stdio
      - id: objc-shell-spawn
    unless:
      - id: well-known/tool/detection/llm-scanner/

  - id: objc-systemd-reverse-shell
    desc: ObjC systemd reverse shell
    crit: hostile
    conf: 0.98
    all:
      - id: objc-systemd-revshell-unit
      - id: objc-systemd-wantedby-default
      - id: objc-systemd-restart-always
