# Zig reverse shell: tcpConnectToHost + dup2 + execveZ /bin/sh.
defaults:
  for: [zig]
  platforms: [linux, macos]
  attack: T1059
  mbc: B0030.002

traits:
  - id: zig-tcp-connect-host-literal
    desc: "Zig tcpConnectToHost with host and port"
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'tcpConnectToHost\s*\(\s*\w+\s*,\s*"[^"]{1,80}"\s*,\s*\d{2,5}'
  - id: zig-os-dup2-fd-stdio
    desc: Zig os.dup2 over fd onto stdio slot
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'os\.dup2\s*\(\s*fd\s*,\s*[0-2]\s*\)'
  - id: zig-execveZ-bin-sh
    desc: Zig execveZ with /bin/sh path
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: 'execveZ\s*\(\s*"/bin/(ba)?sh"'

composite_rules:
  - id: zig-revshell
    desc: Zig reverse shell (tcpConnectToHost + dup2 + execveZ /bin/sh)
    crit: hostile
    conf: 0.99
    all:
      - id: zig-tcp-connect-host-literal
      - id: zig-os-dup2-fd-stdio
      - id: zig-execveZ-bin-sh
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: zig-tcp-shell-exec
    desc: Zig tcpConnectToHost paired with execveZ shell
    crit: hostile
    conf: 0.97
    all:
      - id: zig-tcp-connect-host-literal
      - id: zig-execveZ-bin-sh
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context

  - id: zig-dup2-execve-shell
    desc: Zig os.dup2 + execveZ shell skeleton
    crit: hostile
    conf: 0.97
    all:
      - id: zig-os-dup2-fd-stdio
      - id: zig-execveZ-bin-sh
    unless:
      - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
