defaults:
  platforms:
    - linux
  for:
    - source
    - binaries
    - c
composite_rules:
  - id: lkm-reverse-shell-bash
    desc: LKM reverse shell via bash /dev/tcp
    crit: hostile
    conf: 0.99
    attack: T1014
    mbc: B0022
    all:
      - id: micro-behaviors/process/create/exec::call-usermodehelper
      - id: micro-behaviors/communications/socket/connect::dev-tcp-path
