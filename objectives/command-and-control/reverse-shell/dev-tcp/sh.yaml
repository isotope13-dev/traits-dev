# Bash /dev/tcp magic-fd reverse shell redirect.
defaults:
  for: [scripts, source]
  platforms: [linux, macos]
  attack: T1059.004
  mbc: B0030

composite_rules:
  - id: dev-tcp-revshell
    desc: bash /dev/tcp reverse shell redirect
    crit: hostile
    conf: 0.99
    scope: outer
    all:
      - id: objectives/command-and-control/reverse-shell/dup::reverse-shell-shell-complete
    any:
      - id: micro-behaviors/communications/socket/connect::dev-tcp-path
      - id: micro-behaviors/communications/socket/connect::dev-tcp-external-ip
    unless:
      - id: well-known/tool/offensive/pentestkit/
      - id: well-known/tool/detection/llm-scanner/

  - id: dev-tcp-bash-interactive-shell
    desc: bash -i redirected onto /dev/tcp socket (full one-liner skeleton)
    crit: hostile
    conf: 0.98
    scope: outer
    all:
      - id: objectives/command-and-control/reverse-shell/dup::reverse-shell-shell-complete
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/tool/offensive/pentestkit/

  - id: dev-tcp-bash-stdin-redirect
    desc: Bash interactive reverse shell with stdin redirection
    crit: hostile
    conf: 0.99
    scope: outer
    all:
      - id: objectives/command-and-control/reverse-shell/dup::reverse-shell-shell-complete
      - id: objectives/command-and-control/backdoor/shell/reverse::stdin-redirect-dup
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: well-known/tool/offensive/pentestkit/
