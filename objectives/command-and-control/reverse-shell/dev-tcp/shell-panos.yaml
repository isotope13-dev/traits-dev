defaults:
  platforms: [panos, appliance, unix]
  for: [shell]
  attack: T1059

traits:
  - id: panos-shell-devtcp-c2-fd
    desc: PAN-OS shell devtcp C2 FD
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'exec 3<>/dev/tcp/${C2_HOST}/4443'

  - id: panos-shell-devtcp-eval-loop
    desc: PAN-OS shell devtcp eval loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'cat <&3[\s\S]{0,120}eval "\$cmd"'

composite_rules:
  - id: panos-shell-devtcp-reverse-shell
    desc: PAN-OS devtcp reverse shell
    crit: hostile
    conf: 0.98
    all:
      - id: panos-shell-devtcp-c2-fd
      - id: panos-shell-devtcp-eval-loop
