defaults:
  platforms: [panos, appliance, windows]
  for: [csharp, pe]
  attack: T1059

traits:
  - id: csharp-panos-devtcp-fd
    desc: C# PAN-OS devtcp FD shell
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: exec 5<>/dev/tcp/{BEACON_HOST}/4443

  - id: csharp-panos-reverse-shell-script
    desc: C# PAN-OS reverse shell script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "# Reverse shell payload"

composite_rules:
  - id: csharp-panos-devtcp-reverse-shell
    desc: C# PAN-OS devtcp reverse shell
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-panos-devtcp-fd
      - id: csharp-panos-reverse-shell-script
