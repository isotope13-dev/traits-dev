# Base64-encoded Python reverse-shell payloads: a base64 blob that decodes to a
# socket-connected interactive shell — the decoded code imports both socket and
# subprocess AND references a native shell (cmd.exe / sh). This identifies the
# RAT/backdoor behavior hidden inside an obfuscated payload, e.g. a jsonschema
# typosquat whose validators.py exec()s a base64 ShellManager that pipes cmd.exe
# over a socket to a hardcoded C2. Generalizes across packers — it keys on the
# decoded socket+subprocess+shell combination, not any specific host/key.
defaults:
  for: [python]
  platforms: [windows, unix]
  attack: T1059.006,T1071
  mbc: B0030

composite_rules:
  - id: encoded-python-socket-shell-payload
    desc: Encoded payload is a socket-backed shell
    crit: hostile
    conf: 0.97
    scope: outer
    all:
      - id: objectives/anti-static/obfuscation/payload/encoded::decoded-python-import-a
      - id: objectives/anti-static/obfuscation/payload/encoded::decoded-python-import-b
      - id: objectives/anti-static/obfuscation/encoding/content::encoded-cmd-exe
