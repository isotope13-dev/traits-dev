# PowerShell base64-encoded TCPClient reverse shell launchers.
defaults:
  for: [powershell, batch, vbs]
  platforms: [windows]
  attack: T1059.001
  mbc: B0030

traits:
  - id: powershell-enc-launcher
    desc: powershell -enc / -e launcher flag
    crit: notable
    conf: 0.85
    for: [powershell]
    if:
      type: tree-sitter
      kind: call
      regex: '(?i)powershell(\.exe)?\s+.{0,60}\s-(enc|encodedcommand|e)\b'
  - id: tcpclient-base64-payload
    desc: base64-encoded TCPClient revshell payload
    crit: notable
    conf: 0.95
    if:
      type: encoded
      encoding: base64
      substr: 'Net.Sockets.TCPClient'

composite_rules:
  - id: powershell-encoded-tcpclient-launcher
    desc: launcher invokes base64-encoded TCPClient revshell
    crit: hostile
    conf: 0.98
    all:
      - id: powershell-enc-launcher
      - id: tcpclient-base64-payload
