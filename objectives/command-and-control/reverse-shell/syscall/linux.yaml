# Linux syscall reverse shell: socket + dup + execve sequence.
defaults:
  platforms: [linux]
  for: [elf]
  attack: T1059
  mbc: B0030

composite_rules:
  - id: syscall-reverse-shell-linux
    desc: Linux syscall reverse shell (socket+dup+execve)
    crit: hostile
    mbc: B0030.002
    conf: 0.9
    all:
      - id: micro-behaviors/communications/socket/create::socket-create
      - id: micro-behaviors/communications/socket/create::socket-connect
      - id: micro-behaviors/process/create/shell/fd::syscall-dup-redirect-linux
      - id: micro-behaviors/process/create/shell/fd::syscall-execve-linux
