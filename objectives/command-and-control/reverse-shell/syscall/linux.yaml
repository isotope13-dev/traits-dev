# Linux syscall reverse shell: socket + dup + execve sequence.
defaults:
  platforms: [linux]
  for: [elf]
  attack: T1059
  mbc: B0030

composite_rules:
  - id: syscall-reverse-shell-linux
    desc: Linux syscall reverse shell (socket+dup+execve)
    crit: hostile
    mbc: B0030.002
    conf: 0.9
    all:
      - id: micro-behaviors/communications/socket/create::socket-create
      - id: micro-behaviors/communications/socket/create::socket-connect
      - id: micro-behaviors/process/create/shell/fd::syscall-dup-redirect-linux
      - id: micro-behaviors/process/create/shell/fd::syscall-execve-linux
  - id: static-syscall-reverse-shell-linux
    desc: Stripped Linux static reverse shell
    crit: hostile
    mbc: B0030.002
    conf: 0.98
    all:
      - id: micro-behaviors/communications/socket/create::x86-64-socket-syscall
      - id: micro-behaviors/communications/socket/create::x86-64-connect-syscall
      - id: micro-behaviors/process/create/shell/fd::x86-64-syscall-dup2
      - id: micro-behaviors/process/create/shell/fd::x86-64-syscall-execve
      - id: micro-behaviors/process/create/shell/spawn::bin-sh-binary-text
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
