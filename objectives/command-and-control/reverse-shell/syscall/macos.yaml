# macOS syscall reverse shell: socket + dup + execve sequence.
defaults:
  platforms: [macos]
  for: [macho]
  attack: T1059
  mbc: B0030

composite_rules:
  - id: syscall-reverse-shell-macos
    desc: macOS syscall reverse shell (socket+dup+execve)
    crit: hostile
    mbc: B0030.002
    conf: 0.9
    all:
      - id: micro-behaviors/communications/socket/create::socket-socket-macos
      - id: micro-behaviors/communications/socket/create::socket-connect-macos
      - id: micro-behaviors/process/create/shell/fd::syscall-dup-redirect-macos
      - id: micro-behaviors/process/create/shell/fd::syscall-execve-macos
