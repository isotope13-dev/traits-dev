# Generic C2 Client Markers
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
traits:
  - id: marker
    desc: "Explicit 'c2-client' string marker"
    crit: suspicious
    conf: 1.0
    if:
      type: string_value
      regex: "c2-client"
