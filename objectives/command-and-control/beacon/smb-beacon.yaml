defaults:
  for: [pe, dll]
  platforms: [windows]
composite_rules:
  - id: cobalt-strike-smb-beacon-pattern
    desc: Detects a Cobalt Strike SMB beacon pattern based on specific traits
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/hardening::unsigned-pe-executable
      - id: metadata/binary/anomaly::named-pipe-api-usage
      - id: metadata/binary/anomaly::token-privilege-api-usage
      - id: metadata/binary/anomaly::pdb-masquerading-64bitmapibroker
      - id: metadata/binary/section/metrics::elevated-text-entropy-section
    unless:
      - id: metadata/binary/anomaly::has-internet-communication-apis
