defaults:
  for: [pe, dll]
  platforms: [windows]
composite_rules:
  - id: cobalt-strike-smb-beacon-pattern
    desc: Detects a Cobalt Strike SMB beacon pattern based on specific traits
    crit: hostile
    conf: 0.98
    all:
      - id: metadata/signed::unsigned-pe-executable
      - id: micro-behaviors/communications/ipc/named-pipe::named-pipe-api-usage
      - id: micro-behaviors/os/privilege/token::token-privilege-api-usage
      - id: objectives/evasion/masquerade/debug::pdb-masquerading-64bitmapibroker
      - id: metadata/binary/section/metrics::elevated-text-entropy-section
    unless:
      - id: micro-behaviors/communications/http::has-internet-communication-apis
