defaults:
  platforms: [linux, macos, windows]
  for: [binaries]
  attack: T1071
  mbc: B0030
traits:
  - id: beacon-json-host-port-format
    desc: JSON beacon host/port/last_seen format
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\{"id"\s*:\s*"%s"\s*,\s*"host"\s*:\s*"%s"\s*,\s*"port"\s*:\s*%d'
  - id: beacon-json-last-seen-field
    desc: JSON beacon last_seen heartbeat field
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '"last_seen"\s*:\s*%(ld|d|llu)'
  - id: beacon-json-kernel-bpf-survey
    desc: JSON survey reports kernel/BPF state
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\{"kernel"\s*:\s*"%s"\s*,\s*"bpf_supported"'
composite_rules:
  - id: structured-json-beacon
    desc: Implant beacons structured JSON heartbeat
    crit: hostile
    conf: 0.95
    needs: 1
    any:
      - id: beacon-json-host-port-format
      - id: beacon-json-kernel-bpf-survey
    all:
      - id: micro-behaviors/communications/http/post::post-request-line
