defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [elf, macho, pe]
traits:
  - id: http-client-dup
    desc: http.Client type
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: http.Client
  - id: time-ticker
    desc: time.Ticker periodic execution
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: time.Ticker
composite_rules:
  - id: objectives/evasion/fileless/memory::http-client-dup-funcs
    desc: HTTP client functions
    any:
      - id: micro-behaviors/communications/http/lib/netlib::net-http-import
      - id: objectives/evasion/fileless/memory::http-client-dup
    crit: suspicious
  - id: interval-funcs
    desc: Periodic execution functions
    any:
      - id: time-ticker
      - id: micro-behaviors/time/sleep/interval::go-time-sleep
    crit: suspicious
  - id: encoding-imports
    desc: Encoding package imports
    crit: component
    any:
      - id: micro-behaviors/data/encode/base64::encoding-base64-import
      - id: micro-behaviors/data/serialize/json::encoding-json-import
  - id: http-customization
    desc: HTTP request customization
    any:
      - id: micro-behaviors/communications/http/request/client::user-agent-header
      - id: micro-behaviors/communications/http/user-agent::go-user-agent-header-set
      - id: micro-behaviors/communications/http/lib/netlib::go-http-header-auth
    crit: suspicious
  - id: c2-beacon
    desc: HTTP C2 beacon pattern
    crit: suspicious
    conf: 0.7
    attack: T1071.001
    all:
      - id: objectives/evasion/fileless/memory::http-client-dup-funcs
      - id: time-ticker
      - id: http-customization
      - id: encoding-imports
    unless:
      # Large binaries (>50MB) are infrastructure/platform tools, not C2 agents
      - id: metadata/binary/metrics/size::massive-executable
      - id: metadata/package/testing/harness/unit::go-test
