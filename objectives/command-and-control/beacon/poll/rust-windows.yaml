defaults:
  platforms: [windows]
  for: [rust]
  attack: T1071.001

traits:
  - id: rust-agent-id-header
    desc: Rust agent ID HTTP header
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: X-Agent-ID

  - id: rust-agent-data-marker
    desc: Rust agent data marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: AGENT_DATA

  - id: rust-beacon-path-token
    desc: Rust beacon endpoint path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /beacon

composite_rules:
  - id: rust-agent-http-beacon
    desc: Rust agent HTTP beacon
    crit: hostile
    conf: 0.98
    all:
      - id: rust-agent-id-header
      - id: rust-agent-data-marker
      - id: rust-beacon-path-token
