defaults:
  platforms: [qnx, unix, windows]
  for: [csharp, pe]
  attack: T1071.001

traits:
  - id: csharp-cli-config-path
    desc: C# CLI config path
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /config

composite_rules:
  - id: csharp-cli-multi-path-beacon
    desc: C# CLI multi-path beacon
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/endpoints::beacon-path-token
      - id: csharp-cli-config-path
      - id: objectives/execution/lolbin/os::csharp-unix-http-lolbin-exec
