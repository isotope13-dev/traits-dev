defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  # curl-cmd-dup lives in micro-behaviors/communications/http/download/curl.
  - id: wget-cmd-dup
    desc: wget command
    crit: component
    conf: 0.3
    if:
      type: text
      regex: \bwget(\s+-|\s+http|\s+--)
    unless:
      - type: text
        substr: github.com/google/protobuf/releases
      - id: metadata/package/testing/harness/runtime/
  - id: curl-post-x
    desc: curl sends explicit POST request
    crit: component
    conf: 0.5
    mbc: C0002
    if:
      type: text
      regex: \bcurl(\.exe)?\s+.{0,80}-X\s+POST\s+.{0,80}-H
  - id: curl-user-header
    desc: curl with user header
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: '\bcurl(\.exe)?.{0,80}-H.{0,30}user:'
  - id: curl-buildid-header
    desc: curl with BuildID header
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: \bcurl(\.exe)?.{0,80}-H.{0,30}BuildID
  - id: curl-form-upload
    desc: curl -F form upload
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bcurl(\.exe)?\s+.{0,120}-F\s+
  - id: curl-form-file-attach
    desc: curl -F uploads a local file
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \bcurl(\.exe)?\s+.{0,160}-F\s+["']?[\w.-]{1,40}=@
    unless:
    - id: well-known/app/omarchy::source-tree
  - id: curl-data-binary
    desc: curl --data-binary
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bcurl(\.exe)?\b.{0,120}--data-binary\b
    unless:
      # Legitimate pastebin/file-share upload utilities post to a fixed,
      # well-known paste host rather than an attacker-controlled endpoint.
      - type: text
        regex: \bpaste\.cachyos\.org\b
      - id: well-known/app/calvyn-code
      - type: text
        substr: paste.rs
      - type: text
        substr: termbin.com
      - type: text
        regex: 'upload_url\?access_token|Package release binaries|Homebrew-cask'
  - id: curl-at-tmp
    desc: curl @/tmp/ file upload
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bcurl(\.exe)?.{0,80}@/tmp/
  - id: shell-env-block-dump
    desc: Shell env block dump via group command
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '\{\s*env\s*[;|]'
composite_rules:
  - id: curl-post
    desc: curl POST with custom headers
    crit: suspicious
    conf: 0.7
    mbc: C0002
    any:
      - id: curl-post-x
      - id: curl-user-header
      - id: curl-buildid-header
  - id: curl-upload
    desc: curl file upload
    crit: notable
    conf: 0.6
    any:
      - id: curl-form-upload
      - id: curl-data-binary
      - id: curl-at-tmp
  - id: curl-post-exfil
    desc: curl POST exfiltrates data to external endpoint
    crit: hostile
    conf: 0.95
    mbc: C0002
    for: [shell]
    all:
      - id: curl-data-binary
    any:
      - id: shell-env-block-dump
      - id: objectives/supply-chain/recon-exfil/oast/env::shell-env-dump
      - id: objectives/supply-chain/recon-exfil/oast/env::oast-fun-url
      - id: objectives/command-and-control/infrastructure/domain/hosting::workers-dev-domain
      - id: objectives/credential-access/cloud/token/files::aws-imds-access
      - id: objectives/credential-access/cloud/token/files::gcp-metadata-host
  # Uploading a named local file (-F field=@path) to an ephemeral tunnel
  # endpoint is data exfiltration: legitimate software does not push local
  # files into a throwaway ngrok/localtunnel/serveo URL.
  - id: curl-file-upload-to-tunnel
    desc: curl uploads a local file to an OOB tunnel
    crit: hostile
    conf: 0.95
    mbc: C0002
    attack: T1567.002
    all:
      - id: curl-form-file-attach
    any:
      - id: objectives/command-and-control/infrastructure/domain/tunnel/
      - id: objectives/exfiltration/oob/endpoint::ngrok-free
