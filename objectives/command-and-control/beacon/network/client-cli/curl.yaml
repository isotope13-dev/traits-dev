defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  # curl-invoked-with-url-or-option lives in micro-behaviors/communications/http/download/curl.
  - id: wget-cmd-dup
    desc: wget command
    crit: component
    conf: 0.3
    if:
      type: text
      regex: \bwget(\s+-|\s+http|\s+--)
    unless:
      - type: text
        substr: github.com/google/protobuf/releases
      - id: metadata/package/testing/harness/runtime/
  - id: curl-form-upload
    desc: curl -F form upload
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bcurl(\.exe)?\s+.{0,120}-F\s+
  - id: curl-form-file-attach
    desc: curl -F uploads a local file
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: \bcurl(\.exe)?\s+.{0,160}-F\s+["']?[\w.-]{1,40}=@
    unless:
    - id: well-known/app/omarchy::source-tree
  - id: curl-at-tmp
    desc: curl @/tmp/ file upload
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: \bcurl(\.exe)?.{0,80}@/tmp/
  - id: shell-env-block-dump
    desc: Shell env block dump via group command
    crit: component
    conf: 0.9
    for: [shell]
    if:
      type: text
      regex: '\{\s*env\s*[;|]'
composite_rules:
  - id: curl-upload
    desc: curl file upload
    crit: notable
    conf: 0.6
    any:
      - id: curl-form-upload
      - id: micro-behaviors/communications/http/upload::curl-data-binary
      - id: curl-at-tmp
  - id: curl-post-exfil
    desc: curl POST exfiltrates data to external endpoint
    crit: hostile
    conf: 0.95
    mbc: C0002
    for: [shell]
    all:
      - id: micro-behaviors/communications/http/upload::curl-data-binary
    any:
      - id: shell-env-block-dump
      - id: objectives/supply-chain/recon-exfil/oast/env::shell-env-dump
      - id: objectives/supply-chain/recon-exfil/oast/env::oast-fun-url
      - id: micro-behaviors/communications/http/url/domain::workers-dev-domain
      - id: objectives/credential-access/cloud/token/files::aws-imds-access
      - id: objectives/credential-access/cloud/token/files::gcp-metadata-access
  # Uploading a named local file (-F field=@path) to an ephemeral tunnel
  # endpoint is data exfiltration: legitimate software does not push local
  # files into a throwaway ngrok/localtunnel/serveo URL.
  - id: curl-file-upload-to-tunnel
    desc: curl uploads a local file to an OOB tunnel
    crit: hostile
    conf: 0.95
    mbc: C0002
    attack: T1567.002
    all:
      - id: curl-form-file-attach
    any:
      - id: objectives/command-and-control/infrastructure/domain/tunnel/
      - id: objectives/exfiltration/oob/endpoint::ngrok-free
