defaults:
  crit: suspicious
  attack: T1036.005
  mbc: B0030
  for: [python, javascript, shell, pe, elf, macho]
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: typosquat-git-hub-domain
    desc: Git typosquat domain
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: git-hub\.[a-z]{2,}
  - id: typosquat-githab-domain
    desc: Githab typosquat domain
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: githab\.[a-z]{2,}
  - id: typosquat-githup-domain
    desc: Githup typosquat domain
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: githup\.[a-z]{2,}
  - id: typosquat-double-letter
    desc: Double letter typosquat
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (giithub|githhub|githuub|githubb)\.[a-z]{2,}
  - id: typosquat-letter-swap-1
    desc: Letter swap typosquat 1
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (githuk\.|gihhub\.|gituhb\.)[a-z]{2,}
  - id: typosquat-letter-swap-2
    desc: Letter swap typosquat 2
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (githbu\.|githyb\.)[a-z]{2,}
  - id: typosquat-google-domain
    desc: Google typosquat domain
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \b(gooogle|googel|goggle)\.[a-z]{2,}\b
    unless:
      - type: text
        substr: buyaple.com
      - type: text
        substr: apple.cm
      - type: text
        regex: \b(gooogle|googel|goggle)\.[a-z]{2,}\b
        section: .rsrc
      - id: metadata/package::embedded-domain-reputation-catalog
  - id: typosquat-apple-domain
    desc: Apple typosquat domain
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: \b(appple|aple|applee)\.[a-z]{2,}\b
    unless:
      - type: text
        substr: buyaple.com
      - type: text
        substr: apple.cm
      - type: text
        regex: \b(appple|aple|applee)\.[a-z]{2,}\b
        section: .rsrc
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: typosquat-microsoft-domain
    desc: Microsoft typosquat domain
    crit: notable
    conf: 0.95
    if:
      type: text
      regex: (microsof|microsft|micrsoft)\.[a-z]{2,}
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: metadata/signed/platform::microsoft
  - id: c2-view-php-endpoint
    desc: C2 view.php endpoint
    crit: component
    conf: 0.75
    if:
      type: text
      regex: view\.php\?
  - id: c2-gate-php-endpoint
    desc: C2 gate.php endpoint
    crit: component
    conf: 0.75
    if:
      type: text
      regex: gate\.php
  - id: c2-panel-php-endpoint
    desc: C2 panel.php endpoint
    crit: component
    conf: 0.75
    if:
      type: text
      regex: panel\.php
composite_rules:
  - id: github-typosquat
    desc: GitHub typosquatting domain
    crit: suspicious
    conf: 0.95
    any:
      - id: typosquat-git-hub-domain
      - id: typosquat-githab-domain
      - id: typosquat-githup-domain
      - id: typosquat-double-letter
      - id: typosquat-letter-swap-1
      - id: typosquat-letter-swap-2
  - id: popular-service-typosquat
    desc: Popular service typosquatting
    crit: suspicious
    conf: 0.95
    any:
      - id: typosquat-google-domain
      - id: typosquat-apple-domain
      - id: typosquat-microsoft-domain
  - id: c2-php-endpoint
    desc: C2 PHP endpoint pattern
    crit: component
    conf: 0.8
    attack: T1071.001
    any:
      - id: c2-view-php-endpoint
      - id: c2-gate-php-endpoint
      - id: c2-panel-php-endpoint
  - id: typosquat-c2-combo
    desc: Typosquat domain with C2 endpoint
    crit: suspicious
    conf: 0.98
    all:
      - id: github-typosquat
      - id: c2-php-endpoint
