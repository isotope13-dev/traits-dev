# Sleep + Jitter Beacon Pattern (Binary C2 Implants)
# Professional C2 implants use configurable sleep intervals with
# randomized jitter to evade network detection.
# Pattern seen in Cobalt Strike, Sliver, BurrowShell, and many RATs.
defaults:
  for: [pe, elf, macho]
  platforms: [windows, linux, macos]
  attack: T1029
  mbc: B0030
traits:
  - id: sleep-time-field
    desc: Configurable sleep time field in binary
    crit: component
    conf: 0.7
    if:
      type: text
      regex: sleep[_-]?time
      case_insensitive: true
  - id: jitter-field
    desc: Configurable jitter field in binary
    crit: suspicious
    conf: 0.75
    for: [pe, macho]
    if:
      type: text
      regex: \b(sleep|beacon|callback)[_-]?jitter\b
      case_insensitive: true
  - id: beacon-interval-field
    desc: Beacon interval configuration field
    crit: component
    conf: 0.7
    if:
      type: text
      regex: beacon[_-]?(interval|period|delay)
      case_insensitive: true
composite_rules:
  - id: sleep-jitter-beacon
    desc: C2 beacon with sleep and jitter configuration
    crit: suspicious
    conf: 0.88
    size_max: 10485760
    all:
      - id: jitter-field
    any:
      - id: sleep-time-field
      - id: beacon-interval-field
    downgrade:
      any:
        - id: metadata/binary/metrics::many-exports
