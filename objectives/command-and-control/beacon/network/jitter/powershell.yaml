# PowerShell C2 Beacon With Randomized Sleep Jitter
# Detects PowerShell scripts that sleep for a randomized interval
# inside a request loop — the classic jittered-beacon evasion pattern.
# ATT&CK: T1029 (Scheduled Transfer), T1071.001 (Web Protocols)
defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1029
  mbc: B0030
traits:
  - id: start-sleep-get-random
    desc: Start-Sleep with Get-Random value
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: Start-Sleep\b[^\n]{0,120}Get-Random\b|Get-Random\b[^\n]{0,120}Start-Sleep\b
      case_insensitive: true
  - id: get-random-minimum-maximum
    desc: Get-Random bounded by Minimum/Maximum
    crit: component
    conf: 0.7
    if:
      type: text
      regex: Get-Random\b[^\n]{0,80}-Minimum\s+\d+[^\n]{0,40}-Maximum\s+\d+
      case_insensitive: true
  - id: while-true-beacon-body
    desc: PowerShell while ($true) loop body
    crit: component
    conf: 0.7
    if:
      type: text
      regex: while\s*\(\s*\$true\s*\)\s*\{
      case_insensitive: true
composite_rules:
  - id: ps-jittered-beacon
    desc: PowerShell jittered C2 beacon loop
    crit: suspicious
    conf: 0.92
    all:
      - id: start-sleep-get-random
      - id: while-true-beacon-body
    any:
      - id: get-random-minimum-maximum
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::httpwebrequest
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::request-powershell
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::ps-post
