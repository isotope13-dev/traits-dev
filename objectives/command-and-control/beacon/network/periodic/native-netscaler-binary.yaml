defaults:
  platforms: [netscaler, appliance, unix]
  for: [elf]
  attack: T1102

traits:
  - id: native-ns-cache-path
    desc: Native ns cache path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /tmp/.ns_cache

  - id: native-beacon-time-token
    desc: Native beacon time token
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "--- beacon t="

composite_rules:
  - id: native-netscaler-periodic-beacon
    desc: Native NetScaler periodic beacon
    crit: hostile
    conf: 0.98
    all:
      - id: native-ns-cache-path
      - id: native-beacon-time-token
    any:
      - id: micro-behaviors/communications/http/upload::octet-stream-upload-header
