defaults:
  platforms: [macos, linux]
  for: [c, objc, elf]
  attack: T1071.001

traits:
  - id: libcurl-api-v1-beacon-path
    desc: libcurl API beacon path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/beacon

  - id: libcurl-api-v1-payload-path
    desc: libcurl API payload path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/payload

  - id: libcurl-api-v1-exfil-path
    desc: libcurl API exfil path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/exfil

  - id: libcurl-api-v1-poll-sleep
    desc: libcurl API poll sleep loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/api/v1/poll[\s\S]{0,120}sleep 300'

composite_rules:
  - id: libcurl-api-c2-agent
    desc: libcurl API C2 agent
    crit: hostile
    conf: 0.97
    all:
      - id: libcurl-api-v1-beacon-path
      - id: libcurl-api-v1-exfil-path
      - id: micro-behaviors/communications/http/download/curl::libcurl-http
    any:
      - id: libcurl-api-v1-payload-path
      - id: libcurl-api-v1-poll-sleep
      - id: micro-behaviors/communications/http/upload::octet-stream-upload-header
