# Delayed host-profile callbacks in Python packages.
# A long, host-derived activation delay is not malicious by itself; the
# objective requires it to gate host profiling and an outbound JSON POST.
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1071.001
  mbc: E1041

traits:
  - id: delayed-collection-call
    desc: Deferred collection function call
    crit: component
    conf: 0.96
    if:
      type: symbol
      kind: call
      exact: _run_collection

composite_rules:
  - id: delayed-host-profile-http-beacon
    desc: Delayed host-profile HTTP beacon
    crit: hostile
    conf: 0.995
    near_bytes: 5000
    all:
      - id: micro-behaviors/time/query::py-time-call
      - id: micro-behaviors/os/sysinfo/hostname::python-socket-gethostname
      - id: delayed-collection-call
      - id: micro-behaviors/time/schedule/waitable::event-wait-call
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/communications/http/post::python-post-method-literal
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key-filename-enum
      - id: objectives/discovery/system/fingerprint/os::platform-profiling
      - id: micro-behaviors/data/decode/base64::b64decode-call
