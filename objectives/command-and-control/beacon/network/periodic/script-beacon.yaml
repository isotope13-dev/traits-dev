# C2 Script Beacon Patterns
# Detects scripting language C2 beacons (PowerShell, shell, etc.)
# ATT&CK: T1071.001 (Web Protocols), T1059 (Command and Scripting Interpreter)
# MBC: B0030 (C2 Communication)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: suspicious
  attack: "T1071.001"
  mbc: "B0030"
composite_rules:
  # PowerShell C2 beacon - HTTP POST to suspicious infrastructure
  # Complexity: all(2) + any(1) + file_types(1) = 4
  - id: powershell-http-beacon
    desc: PowerShell HTTP POST to suspicious domain
    crit: hostile
    conf: 0.95
    for: [powershell]
    all:
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: objectives/command-and-control/infrastructure/domain/malicious::c2-domain
      - id: micro-behaviors/communications/http/request/
  # PowerShell C2 exfil beacon - POST with body to suspicious domain
  # Complexity: all(3) + file_types(1) = 4
  - id: powershell-exfil-beacon
    desc: PowerShell data exfil to suspicious domain
    crit: hostile
    conf: 0.95
    attack: "T1041"
    for: [powershell]
    all:
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::http-post-method
      - id: micro-behaviors/communications/http/lib/invoke-webrequest::http-body-param
      - id: objectives/command-and-control/infrastructure/domain/malicious::c2-domain
  # Generic script HTTP beacon to suspicious infrastructure
  # Complexity: all(2) + any(1) + file_types(1) = 4
  - id: script-http-c2-beacon
    desc: Script HTTP request to C2 infrastructure
    crit: suspicious
    conf: 0.90
    for: [powershell, shell, python, javascript]
    all:
      - id: objectives/command-and-control/infrastructure/domain/malicious::c2-domain
      - id: micro-behaviors/communications/http/post::post
      - id: micro-behaviors/communications/http/request/
  # An extension offscreen worker that performs a timestamped, uncached
  # cleartext request is a strong C2/beaconing combination.
  - id: extension-offscreen-timestamped-cleartext-beacon
    desc: Browser extension timestamped cleartext beacon
    crit: hostile
    conf: 0.99
    for: [xpi]
    scope: archive
    all:
      - id: metadata/file/format::web-extension-root-manifest
      - id: micro-behaviors/browser-extension/lifecycle::offscreen-document-creation
      - id: micro-behaviors/process/create/workers::worker-constructor-call
      - id: micro-behaviors/communications/http/request/url::fetch-timestamped-url
      - id: micro-behaviors/communications/http/request/url::fetch-no-store-cache
      - id: micro-behaviors/communications/http/url/domain::js-insecure-remote-http-url
