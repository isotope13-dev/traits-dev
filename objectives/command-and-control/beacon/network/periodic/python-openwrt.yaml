defaults:
  platforms: [openwrt]
  for: [python]
  attack: T1071.001
  mbc: B0030

traits:
  - id: python-http-beacon-path
    desc: Python HTTP beacon path
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '/(report|heartbeat|beacon)\b'
    unless:
      - id: well-known/tool/detection/
      - id: micro-behaviors/crypto/library/blockchain/
  - id: python-beacon-interval-name
    desc: Python beacon interval variable
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: '(BEACON_INTERVAL|INTERVAL\s*=\s*[0-9]{2,4})'
  - id: python-openwrt-marker
    desc: Python OpenWrt marker
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '/etc/(config|crontabs/root)|openwrt'

composite_rules:
  - id: openwrt-python-http-beacon
    desc: OpenWrt Python periodic HTTP beacon
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/communications/http/request/client::python-json-post-method
      - id: python-http-beacon-path
      - id: python-openwrt-marker
    any:
      - id: python-beacon-interval-name
      - id: objectives/persistence/system/network-appliance::openwrt-root-crontab-path
    needs: 1
