defaults:
  platforms: [qnx, unix]
  for: [java, class, java_class, jar]
  attack: T1071.001

traits:
  - id: qnx-java-checkin-path
    desc: QNX Java checkin path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/checkin

  - id: qnx-java-agent-form-body
    desc: QNX Java agent form body
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'agent=[A-Za-z0-9._-]{3,48}&os=qnx(&arch=[A-Za-z0-9._-]{2,32})?'

  - id: qnx-java-session-header
    desc: QNX Java session header
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: X-Session-ID

  - id: qnx-java-bytecode-checkin
    desc: QNX Java bytecode checkin
    crit: suspicious
    conf: 0.94
    for: [class, java_class, jar]
    if:
      type: hex
      pattern: 2f 61 70 69 2f 76 31 2f 63 68 65 63 6b 69 6e

composite_rules:
  - id: qnx-java-periodic-checkin
    desc: QNX Java periodic checkin
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-java-checkin-path
      - id: qnx-java-agent-form-body
      - id: qnx-java-session-header

  - id: qnx-java-bytecode-periodic-checkin
    desc: QNX Java class periodic checkin
    crit: hostile
    conf: 0.98
    for: [class, java_class, jar]
    all:
      - id: qnx-java-bytecode-checkin
      - id: qnx-java-agent-form-body
