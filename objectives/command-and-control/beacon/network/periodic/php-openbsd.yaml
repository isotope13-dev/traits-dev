defaults:
  platforms: [openbsd, bsd, unix]
  for: [php]
  attack: T1071.001

traits:
  - id: php-beacon-register-call
    desc: PHP beacon register call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: beacon_register

  - id: php-beacon-heartbeat-loop
    desc: PHP beacon heartbeat loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: beacon_heartbeat\(\)[\s\S]{0,160}\$beacons\+\+

  - id: php-beacon-checkin-call
    desc: PHP beacon checkin call
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: beacon_checkin

composite_rules:
  - id: php-openbsd-periodic-beacon
    desc: PHP OpenBSD periodic beacon
    crit: hostile
    conf: 0.98
    all:
      - id: php-beacon-register-call
      - id: php-beacon-heartbeat-loop
      - id: php-beacon-checkin-call
