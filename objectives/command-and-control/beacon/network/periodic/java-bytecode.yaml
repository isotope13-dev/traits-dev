defaults:
  platforms: [unix, windows]
  for: [java, class, jar, zip]
  attack: T1071.001
  mbc: B0030

traits:
  - id: java-https-post-client
    desc: Java HTTPS POST client
    crit: component
    conf: 0.84
    if:
      type: text
      regex: 'HttpsURLConnection.{0,240}POST'
  - id: java-octet-stream-upload
    desc: Java octet stream upload
    crit: component
    conf: 0.82
    if:
      type: text
      substr: application/octet-stream

composite_rules:
  - id: java-periodic-https-beacon
    desc: Java periodic HTTPS beacon
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/time/schedule/interval::java-schedule-at-fixed-rate
      - id: micro-behaviors/communications/http/endpoints::beacon-path-token
    any:
      - id: micro-behaviors/communications/http/post::java-urlconnection-post-source
      - id: java-https-post-client
      - id: java-octet-stream-upload
