defaults:
  platforms: [unix]
  for: [kotlin, class, jar]
  attack: T1071.001

traits:
  - id: kotlin-heartbeat-path
    desc: Kotlin heartbeat path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/api/(v[0-9]{1,2}/)?heartbeat'

  - id: kotlin-beacon-sleep-loop
    desc: Kotlin beacon sleep loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sleep 120

  - id: jvm-heartbeat-path
    desc: JVM heartbeat path
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 2F 61 70 69 2F 68 65 61 72 74 62 65 61 74

  - id: jvm-beacon-sleep-loop
    desc: JVM beacon sleep loop
    crit: suspicious
    conf: 0.94
    for: [class, jar]
    if:
      type: hex
      pattern: 73 6C 65 65 70 20 31 32 30

composite_rules:
  - id: kotlin-periodic-http-beacon
    desc: Kotlin periodic HTTP beacon
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-heartbeat-path
      - id: kotlin-beacon-sleep-loop

  - id: jvm-periodic-http-beacon
    desc: JVM periodic HTTP beacon
    crit: hostile
    conf: 0.98
    all:
      - id: jvm-heartbeat-path
      - id: jvm-beacon-sleep-loop
