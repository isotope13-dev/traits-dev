defaults:
  platforms: [openbsd, bsd, unix]
  for: [shell]
  attack: T1071.001
  mbc: C0002

traits:
  - id: shell-hidden-beacon-counter
    desc: Shell hidden beacon counter
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '_BCN_PATH=.{0,80}"/\.\$?\([^)]{0,40}BN'

composite_rules:
  - id: openbsd-shell-obfuscated-beacon
    desc: OpenBSD shell obfuscated beacon
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-static/obfuscation/encoding/xor::shell-xor-byte-loop
      - id: shell-hidden-beacon-counter
      - id: objectives/anti-static/obfuscation/encoding/xor::shell-eval-decoded-command
