defaults:
  crit: suspicious
  attack: T1071.001
  mbc: B0030
  for: [binaries]
  platforms: [unix, windows, macos]
traits:
  - id: http-versions
    desc: HTTP protocol versions in strings
    crit: component
    conf: 0.75
    if:
      type: string_value
      regex: HTTP/(1\.0|1\.1|2\.0)
  - id: http-methods-main
    desc: HTTP method (PUT)
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: '^PUT\s+\S+\s+HTTP/[0-9.]+$'
  - id: http-method-head
    desc: HTTP method (HEAD)
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: '^HEAD\s+\S+\s+HTTP/[0-9.]+$'
  - id: http-method-delete
    desc: HTTP method (DELETE)
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: '^DELETE\s+\S+\s+HTTP/[0-9.]+$'
  - id: http-method-patch
    desc: HTTP method (PATCH)
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: '^PATCH\s+\S+\s+HTTP/[0-9.]+$'
  - id: go-dial-string
    desc: Network dial pattern in strings
    crit: notable
    conf: 0.85
    if:
      id: micro-behaviors/communications/socket/connect/go::go-dial-methods
  # go-listen-string removed - use micro-behaviors/communications/socket/listen/go composite instead
  - id: domain-keyword
    desc: Domain configuration keyword
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      substr: ; Domain
  - id: http-config-keyword
    desc: HTTP configuration keyword
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      substr: ; HttpOnL
  - id: callback-pattern
    desc: Callback function pattern
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: (callback|Callback|CallBack).{0,50}Handler
  - id: polling-pattern-a
    desc: Polling/beacon loop pattern
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (poll|beacon|heartbeat|tick).{0,50}loop
      case_insensitive: true
  - id: polling-pattern-b
    desc: Polling/beacon loop pattern
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: loop.{0,50}(poll|beacon|heartbeat)
      case_insensitive: true
  - id: c2-marker
    desc: C2 identifier in strings
    crit: suspicious
    conf: 0.75
    if:
      type: string_value
      regex: (?i)\b(c2Handler|c2Server|c2Beacon)\b|c2\s*=\s*https?://
  - id: go-http-do
    desc: "Go http.Do call"
    if:
      type: string_value
      substr: "http.Do"
composite_rules:
  - id: go-http-client
    desc: Go HTTP client pattern
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/communications/http/get::http-get
      - id: objectives/command-and-control/channel/messaging::http-post
      - id: objectives/evasion/fileless/memory::http-client-dup
      - id: go-http-do
  - id: http-methods-comp
    desc: HTTP methods (GET, POST, HEAD)
    crit: notable
    conf: 0.6
    any:
      - id: http-methods-main
      - id: http-method-head
      - id: http-method-delete
      - id: http-method-patch
  - id: polling-pattern
    desc: Polling/beacon loop pattern
    crit: notable
    conf: 0.7
    any:
      - id: polling-pattern-a
      - id: polling-pattern-b
  - id: http-beacon-network
    desc: HTTP beacon network comms
    crit: suspicious
    conf: 0.9
    all:
      - id: http-versions
      - id: go-dial-string
  - id: http-beacon-configured
    desc: HTTP beacon C2 config
    crit: suspicious
    conf: 0.92
    all:
      - id: http-versions
      - id: domain-keyword
  - id: http-c2-beacon-detected
    desc: HTTP-based C2 beacon
    crit: hostile
    conf: 0.95
    all:
      - id: http-beacon-network
      - id: go-http-client
