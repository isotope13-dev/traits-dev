defaults:
  platforms:
    - macos
    - ios
  crit: suspicious
  attack: T1071.001
  mbc: B0030
  for:
    - macho
traits:
  - id: nsurl-http-body
    desc: NSURLRequest HTTP body
    crit: notable
    conf: 0.7
    if:
      type: symbol
      regex: setHTTPBody
  - id: json-sdf-payload
    desc: JSON sdf/wsx payload
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      substr: '{"sdf":'
  - id: json-info-field
    desc: JSON info field data
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: '"info":'
  - id: nstask-launch
    desc: NSTask process execution
    crit: suspicious
    conf: 0.85
    if:
      type: symbol
      exact: launch
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: command-execution-response
    desc: Command execution response handling
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      substr: Command executed successfully
  - id: command-failure-handling
    desc: Command failure error handling
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: 'Failed to execute command:'
composite_rules:
  - id: objc-http-c2-beacon
    desc: Objective-C HTTP C2 beacon
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/time/schedule/interval::nstimer-scheduled
      - id: micro-behaviors/communications/http/lib/nsurlsession::nsurlsession-http-request
      - id: micro-behaviors/communications/http/post::post
      - id: objectives/command-and-control/beacon/network/periodic::json-sdf-payload
  - id: objc-c2-command-execution
    desc: Objective-C C2 RAT
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/command-and-control/beacon/network/periodic::objc-http-c2-beacon
      - id: objectives/command-and-control/beacon/network/periodic::nstask-launch
      - id: objectives/command-and-control/beacon/network/periodic::command-execution-response
