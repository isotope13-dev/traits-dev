defaults:
  platforms: [unix]
  for: [python]
  attack: T1071.001
  mbc: B0030

traits:
  - id: python-api-checkin-path
    desc: Python API checkin path
    crit: suspicious
    conf: 0.9
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    if:
      type: text
      regex: 'https?://[^"''\s]{1,200}/api/checkin\b|["'']/api/checkin["'']'

  - id: python-sleep-interval
    desc: Python sleeps on interval
    crit: notable
    conf: 0.84
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    if:
      type: text
      regex: 'time\.sleep\s*\(\s*interval'

  - id: python-send-checkin-function
    desc: Python send_checkin function
    crit: suspicious
    conf: 0.9
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    if:
      type: function
      exact: send_checkin

composite_rules:
  - id: python-periodic-checkin-loop
    desc: Python periodic checkin loop
    crit: suspicious
    conf: 0.93
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    all:
      - id: micro-behaviors/data/control-flow/loop::python-while-true
      - id: python-sleep-interval
      - id: python-send-checkin-function

  - id: python-periodic-http-checkin
    desc: Python periodic HTTP checkin
    crit: hostile
    conf: 0.98
    ref: "sha256:f1f60b5798395491f3f3773dc6690460f2ca20f564161746f28e22439ced5438"
    all:
      - id: python-api-checkin-path
      - id: python-periodic-checkin-loop
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlopen-call
      - id: micro-behaviors/communications/http/request/client::python-json-post-method
