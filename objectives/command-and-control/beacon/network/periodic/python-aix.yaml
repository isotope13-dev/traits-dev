defaults:
  platforms: [aix, unix]
  for: [python, pyc]
  attack: T1071.001
  mbc: B0030
traits:
  - id: python-post-beacon-request
    desc: Python POST beacon request
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: POST /beacon HTTP/1.1
composite_rules:
  - id: aix-python-socket-http-beacon
    desc: AIX Python socket HTTP beacon
    crit: hostile
    conf: 0.96
    all:
      - id: python-post-beacon-request
      - id: micro-behaviors/communications/socket/connect::connect-python
    any:
      - id: micro-behaviors/communications/socket/send::python-sendall
      - id: micro-behaviors/communications/socket/send::python-sendall-pyc-name
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/os/sysinfo/hostname::python-socket-gethostname
    needs: 1
