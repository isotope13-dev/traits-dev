defaults:
  platforms: [unix]
  for: [perl]
  attack: T1071.001

traits:
  - id: perl-host-sys-beacon-query
    desc: Perl host sys beacon query
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "GET /beacon?host=$hostname&sys=$uname_out"

composite_rules:
  - id: perl-raw-socket-http-beacon
    desc: Perl raw socket HTTP beacon
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/socket/tcp::sock-stream
      - id: perl-host-sys-beacon-query
