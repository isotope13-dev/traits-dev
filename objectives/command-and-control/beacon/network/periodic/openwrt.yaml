defaults:
  platforms: [openwrt]
  for: [c, cpp, elf, php, shell]
  attack: T1071.001
  mbc: B0030

traits:
  - id: curl-http-beacon-path
    desc: Curl HTTP beacon path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'curl\s+.{0,80}/(ping|beacon)\b'

  - id: openwrt-beacon-context
    desc: OpenWrt beacon context
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'openwrt_release|BOARD_NAME|ifstatus wan|uci '

  - id: openwrt-while-true-loop
    desc: OpenWrt service infinite loop
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'while true; do[\s\S]{0,240}(/etc/rc\.common|/etc/init\.d|uci|openwrt)'

composite_rules:
  - id: openwrt-hidden-service-beacon
    desc: OpenWrt hidden service periodic HTTP beacon
    crit: hostile
    conf: 0.96
    all:
      - id: curl-http-beacon-path
      - id: openwrt-beacon-context
      - id: micro-behaviors/time/sleep/interval::five-minute-sleep-command
    any:
      - id: openwrt-while-true-loop
      - id: objectives/persistence/system/cron/schedule::cron-hidden-tmp-entry
  - id: openwrt-hidden-polyglot-curl-beacon
    desc: OpenWrt hidden polyglot curl beacon
    crit: hostile
    conf: 0.96
    all:
      - id: curl-http-beacon-path
      - id: openwrt-beacon-context
    any:
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
      - id: micro-behaviors/communications/http/download/curl::curl-silent
      - id: micro-behaviors/process/create/shell/spawn::embedded-shebang-sh
      - id: objectives/evasion/file-hiding/binary::hidden-tmp-binary
      - id: metadata/lang/shebang::sh
    needs: 2
