defaults:
  platforms: [openwrt]
  for: [javascript, typescript]
  attack: T1071.001
  mbc: B0030

traits:
  - id: node-heartbeat-path
    desc: Node.js heartbeat route marker
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'heartbeatPath|/(heartbeat|telemetry)\b'

  - id: node-etc-config-context
    desc: Node /etc/config context
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: /etc/config
  - id: node-openwrt-agent-user-agent
    desc: Node OpenWrt agent User-Agent string
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: 'OpenWrt[^"'']{0,40}Agent|openwrt-agent'

composite_rules:
  - id: openwrt-node-http-beacon
    desc: OpenWrt Node periodic HTTP beacon
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/http/request/client::https-request
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: node-heartbeat-path
      - id: node-etc-config-context
    any:
      - id: node-openwrt-agent-user-agent
      - id: micro-behaviors/time/schedule/interval::setTimeout
      - id: objectives/command-and-control/backdoor/tasking/http::node-c2-command-response
    needs: 1
