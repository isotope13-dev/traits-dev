defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1071.001

traits:
  - id: csharp-beacon-endpoint
    desc: C# beacon endpoint
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/beacon

  - id: csharp-beacon-sleep-interval
    desc: C# beacon sleep interval
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: BEACON_INTERVAL_MS

  - id: csharp-sendbeacon-call
    desc: C# SendBeacon call
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: SendBeacon(payload)

composite_rules:
  - id: csharp-periodic-http-beacon
    desc: C# periodic HTTP beacon
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-beacon-endpoint
      - id: csharp-beacon-sleep-interval
      - id: csharp-sendbeacon-call
