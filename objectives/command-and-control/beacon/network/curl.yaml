defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  # curl-cmd-dup removed — duplicate of objectives/command-and-control/dropper/execution/batch::curl-cmd-dup
  # and micro-behaviors/communications/http/download/curl::curl-cmd
  - id: wget-cmd-dup
    desc: wget command
    crit: component
    conf: 0.3
    if:
      type: text
      regex: \bwget(\s+-|\s+http|\s+--)
    unless:
      - type: text
        substr: github.com/google/protobuf/releases
      - id: metadata/package/testing/harness::is-test
  - id: curl-post-x
    desc: curl sends explicit POST request
    crit: suspicious
    conf: 0.5
    mbc: C0002
    if:
      type: text
      regex: \bcurl(\.exe)?\s+.{0,80}-X\s+POST\s+.{0,80}-H
  - id: curl-user-header
    desc: curl with user header
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: '\bcurl(\.exe)?.{0,80}-H.{0,30}user:'
  - id: curl-buildid-header
    desc: curl with BuildID header
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: \bcurl(\.exe)?.{0,80}-H.{0,30}BuildID
  - id: curl-form-upload
    desc: curl -F form upload
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: \bcurl(\.exe)?\s+.{0,120}-F\s+
  - id: curl-data-binary
    desc: curl --data-binary
    crit: suspicious
    conf: 0.5
    if:
      type: text
      regex: \bcurl(\.exe)?\b.{0,120}--data-binary\b
  - id: curl-at-tmp
    desc: curl @/tmp/ file upload
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: \bcurl(\.exe)?.{0,80}@/tmp/
composite_rules:
  - id: client-comp
    desc: HTTP client command line tool
    crit: suspicious
    conf: 0.5
    any:
      - id: objectives/command-and-control/dropper/execution/batch::curl-cmd-dup
      - id: objectives/command-and-control/beacon/network::wget-cmd-dup
  - id: curl-post
    desc: curl POST with custom headers
    crit: suspicious
    conf: 0.7
    mbc: C0002
    any:
      - id: curl-post-x
      - id: curl-user-header
      - id: curl-buildid-header
  - id: curl-upload
    desc: curl file upload
    crit: suspicious
    conf: 0.6
    any:
      - id: curl-form-upload
      - id: curl-data-binary
      - id: curl-at-tmp
