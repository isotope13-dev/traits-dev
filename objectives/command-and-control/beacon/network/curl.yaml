defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: curl-cmd-dup
    desc: curl command
    crit: notable
    conf: 0.3
    if:
      type: text
      regex: \bcurl(\s+http|\s+--|\s+-[A-CE-Za-ce-z])
    not:
      - exact: "curl http://npmjs.org/install.sh | sh"
  - id: wget-cmd-dup
    desc: wget command
    crit: notable
    conf: 0.3
    if:
      type: text
      regex: \bwget(\s+-|\s+http|\s+--)
  - id: curl-post-x
    desc: curl -X POST
    crit: notable
    conf: 0.5
    mbc: C0002
    if:
      type: text
      regex: curl\s+-X\s+POST\s+-H
  - id: curl-user-header
    desc: curl with user header
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: 'curl.{0,50}-H.{0,30}user:'
  - id: curl-buildid-header
    desc: curl with BuildID header
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: curl.{0,50}-H.{0,30}BuildID
  - id: curl-form-upload
    desc: curl -F form upload
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: curl\s+.{0,50}-F\s+
  - id: curl-data-binary
    desc: curl --data-binary
    crit: notable
    conf: 0.5
    if:
      type: text
      regex: \bcurl\b.{0,120}--data-binary\b
  - id: curl-at-tmp
    desc: curl @/tmp/ file upload
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: curl.{0,50}@/tmp/
composite_rules:
  - id: client-comp
    desc: HTTP client command line tool
    crit: notable
    conf: 0.5
    any:
      - id: objectives/command-and-control/dropper/execution/script::curl-cmd-dup
      - id: objectives/command-and-control/beacon/network::wget-cmd-dup
  - id: curl-post
    desc: curl POST with custom headers
    crit: notable
    conf: 0.7
    mbc: C0002
    any:
      - id: curl-post-x
      - id: curl-user-header
      - id: curl-buildid-header
  - id: curl-upload
    desc: curl file upload
    crit: notable
    conf: 0.6
    any:
      - id: curl-form-upload
      - id: curl-data-binary
      - id: curl-at-tmp
