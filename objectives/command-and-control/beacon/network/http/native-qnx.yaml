defaults:
  platforms: [qnx, unix]
  for: [c, cpp, elf]
  attack: T1071.001

traits:
  - id: qnx-native-firmware-beacon-path
    desc: QNX native firmware beacon path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /beacon?host=%s&pid=%d&uid=%d&fw=1&svc=1

  - id: qnx-native-firmware-user-agent
    desc: QNX native firmware user agent
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "User-Agent: firmware-update"

composite_rules:
  - id: qnx-native-firmware-http-beacon
    desc: QNX native firmware HTTP beacon
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-firmware-beacon-path
      - id: qnx-native-firmware-user-agent
