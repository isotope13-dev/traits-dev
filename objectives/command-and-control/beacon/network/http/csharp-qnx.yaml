defaults:
  platforms: [qnx, unix, windows]
  for: [csharp, pe]
  attack: T1071.001

traits:
  - id: qnx-dotnet-session-header
    desc: QNX .NET session header
    crit: component
    conf: 0.94
    if:
      type: text
      substr: X-Session-Id

  - id: qnx-dotnet-nto-user-agent
    desc: QNX .NET NTO user agent
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "Mozilla/5.0 (compatible; NTO/7.1)"

composite_rules:
  - id: qnx-dotnet-telemetry-beacon
    desc: QNX .NET telemetry beacon
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-dotnet-session-header
      - id: qnx-dotnet-nto-user-agent
      - id: objectives/exfiltration/stealer/host-profile/http::qnx-dotnet-telemetry-path
