defaults:
  platforms: [unix, windows, appliance]
  for: [typescript, javascript]
  attack: T1071.001

traits:
  - id: ts-action-register-beacon
    desc: TS registers beacon action
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '_registerAction\(\s*["'']beacon["'']'

  - id: ts-action-register-exfil
    desc: TS registers exfil action
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '_registerAction\(\s*["'']exfil["'']'

  - id: ts-api-collect-post
    desc: TS posts to collect API
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'path:\s*["'']/api/v1/collect["''][\s\S]{0,220}method:\s*["'']POST["'']'

composite_rules:
  - id: ts-action-http-beacon
    desc: TS action HTTP beacon
    crit: hostile
    conf: 0.98
    all:
      - id: ts-action-register-beacon
      - id: ts-action-register-exfil
      - id: ts-api-collect-post
