defaults:
  platforms: [linux, android]
  for: [elf]
  attack: T1071.001
  mbc: B0030

composite_rules:
  - id: direct-ip-tiny-elf-http-stager
    desc: Direct IP tiny ELF HTTP stager
    crit: hostile
    conf: 0.97
    size_max: 4096
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
      - id: micro-behaviors/communications/http/request/client::http-version
    any:
      - id: metadata/binary/anomaly/format::elf-entry-in-last-segment
      - id: metadata/binary/anomaly/section-header::elf-no-section-headers
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/sysadmin/unix-benign/
  - id: sectionless-tiny-elf-http-request
    desc: Sectionless tiny ELF HTTP request
    crit: suspicious
    conf: 0.92
    size_max: 2048
    all:
      - id: metadata/binary/anomaly/section-header::elf-no-section-headers
      - id: micro-behaviors/communications/http/request/client::http-version
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/sysadmin/unix-benign/
  - id: sectionless-syscall-tiny-elf-http-stager
    desc: Sectionless syscall tiny ELF HTTP stager
    crit: hostile
    conf: 0.96
    size_max: 512
    all:
      - id: metadata/binary/anomaly/section-header::elf-no-section-headers
      - id: metadata/binary/anomaly/format::elf-entry-in-last-segment
      - id: micro-behaviors/communications/http/request/client::http-version
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/sysadmin/unix-benign/
  - id: arm-direct-syscall-http-stager
    desc: ARM ELF combines raw network syscalls with an HTTP retrieval path
    crit: hostile
    conf: 0.98
    attack: "T1071.001, T1105"
    mbc: "B0030, B0032"
    size_max: 51200
    all:
      - id: micro-behaviors/communications/socket/syscall::arm-direct-network-syscalls
      - id: micro-behaviors/communications/http/get::binary-get-path
      - id: metadata/hardening/missing::stripped-binary
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/sysadmin/unix-benign/
  - id: elf-http-host-profile-c2
    desc: Native ELF with direct-IP HTTP C2 and host profiling
    crit: hostile
    conf: 0.97
    attack: T1071.001,T1016,T1082
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
      - id: micro-behaviors/communications/http/get::get
      - id: micro-behaviors/communications/http/message::http-header-field-delimiter
      - id: micro-behaviors/fs/path/config/system::config-resolv
      - id: micro-behaviors/fs/path/config/system::config-hosts
      - id: micro-behaviors/fs/proc/system::system-cpuinfo
      - id: micro-behaviors/os/sysinfo/cpu::sys-devices
      - id: metadata/hardening/missing::stripped-binary
    unless:
      - id: metadata/package/testing/
      - id: well-known/tool/sysadmin/unix-benign/
