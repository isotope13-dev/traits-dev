defaults:
  platforms: [panos, appliance, unix]
  for: [shell]
  attack: T1071.001

traits:
  - id: panos-shell-beacon-cmd-poll
    desc: PAN-OS shell beacon command poll
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'beacon\?host=\$\{local_ip\}[\s\S]{0,520}/cmd\?subnet=\$\{subnet\}'

  - id: panos-shell-c2-ping-gate
    desc: PAN-OS shell C2 ping gate
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'http://${REMOTE_HOST}:80/ping'

composite_rules:
  - id: panos-shell-http-c2-poll
    desc: PAN-OS shell HTTP C2 poll
    crit: hostile
    conf: 0.98
    all:
      - id: panos-shell-beacon-cmd-poll
      - id: panos-shell-c2-ping-gate
