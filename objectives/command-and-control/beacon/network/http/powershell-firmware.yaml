defaults:
  platforms: [windows, unix, appliance]
  for: [powershell]
  attack: T1071.001

traits:
  - id: ps-firmware-beacon-status-url
    desc: PowerShell firmware beacon URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: status=active&host=

composite_rules:
  - id: ps-startup-firmware-http-beacon
    desc: PowerShell startup HTTP beacon
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/persistence/firmware/boot/config::ps-vxworks-startup-script
      - id: ps-firmware-beacon-status-url
