defaults:
  platforms: [windows]
  for: [c, cpp, pe, dll]
  attack: T1071.001

traits:
  - id: winhttp-json-beacon-path
    desc: WinHTTP JSON beacon path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /api/beacon

  - id: json-host-user-pid-beacon
    desc: JSON host user PID beacon
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'type\\":\\"beacon[\s\S]{0,220}host\\":\\"%s[\s\S]{0,120}user\\":\\"%s'

composite_rules:
  - id: winhttp-json-beacon
    desc: WinHTTP JSON beacon
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-send-request
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-receive-response
      - id: winhttp-json-beacon-path
      - id: json-host-user-pid-beacon
