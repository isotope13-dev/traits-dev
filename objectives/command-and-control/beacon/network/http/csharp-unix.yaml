defaults:
  platforms: [unix, appliance, windows]
  for: [csharp]
  attack: T1071.001

traits:
  - id: dotnet-webclient-post-beacon
    desc: .NET WebClient POST beacon
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'client.UploadData(url, "POST", data)'

  - id: dotnet-runtime-profile-payload
    desc: .NET runtime profile payload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Environment\.MachineName[\s\S]{0,260}OSDescription'

composite_rules:
  - id: dotnet-runtime-profile-http-beacon
    desc: .NET runtime profile HTTP beacon
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-webclient-post-beacon
      - id: dotnet-runtime-profile-payload
