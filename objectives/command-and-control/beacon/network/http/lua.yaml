defaults:
  platforms: [windows, unix, appliance]
  for: [lua]
  attack: T1071.001

traits:
  - id: lua-beacon-host-field
    desc: Reports victim hostname to C2
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: hostname=

  - id: lua-webclient-http-method
    desc: WebClient download/upload to C2
    crit: suspicious
    conf: 0.92
    if:
      type: literal
      regex: 'WebClient[\s\S]{0,180}(DownloadString|UploadString|UploadData)'

composite_rules:
  - id: lua-socket-http-beacon
    desc: Lua socket HTTP beacon
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/endpoints::beacon-path-token
      - id: lua-beacon-host-field
      - id: micro-behaviors/communications/socket/connect::lua-tcp-connect
      - id: micro-behaviors/communications/socket/send::lua-socket-send

  - id: lua-webclient-http-beacon
    desc: Lua WebClient HTTP beacon
    crit: suspicious
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/endpoints::beacon-path-token
      - id: lua-webclient-http-method
    any:
      - id: micro-behaviors/process/create/shell/spawn::lua-os-execute
      - id: micro-behaviors/process/create/shell/spawn::lua-io-popen
