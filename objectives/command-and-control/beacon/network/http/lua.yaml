defaults:
  platforms: [unix, appliance]
  for: [lua]
  attack: T1071.001

traits:
  - id: lua-beacon-path-payload
    desc: Lua beacon path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /beacon

  - id: lua-beacon-host-field
    desc: Lua beacon host field
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: hostname=

composite_rules:
  - id: lua-socket-http-beacon
    desc: Lua socket HTTP beacon
    crit: hostile
    conf: 0.97
    all:
      - id: lua-beacon-path-payload
      - id: lua-beacon-host-field
      - id: micro-behaviors/communications/socket/connect::lua-tcp-connect
      - id: micro-behaviors/communications/socket/send::lua-socket-send
