defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1071.001

composite_rules:
  - id: native-vm-aware-http-beacon
    desc: Native VM-aware HTTP beacon
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/get::manual-http10-dynamic-get
      - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname
    any:
      - id: objectives/anti-analysis/vm-detect/dmi::dmi-vm-fingerprint
      - id: objectives/anti-analysis/vm-detect/vendor::comprehensive-evasion
