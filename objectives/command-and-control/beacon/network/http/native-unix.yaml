defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1071.001

traits:
  - id: native-status-http-beacon-post
    desc: Native status HTTP beacon POST
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "POST /beacon HTTP/1.1\\r\\n"

composite_rules:
  - id: native-status-http-beacon
    desc: Native status HTTP beacon
    crit: hostile
    conf: 0.97
    all:
      - id: native-status-http-beacon-post
      - id: micro-behaviors/communications/http/response::native-status-field-pair

  - id: native-vm-aware-http-beacon
    desc: Native VM-aware HTTP beacon
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/get::manual-http10-dynamic-get
      - id: micro-behaviors/communications/ip/resolve::resolve-gethostbyname
    any:
      - id: objectives/anti-analysis/vm-detect/dmi::dmi-vm-fingerprint
      - id: objectives/anti-analysis/vm-detect/vendor::comprehensive-evasion
