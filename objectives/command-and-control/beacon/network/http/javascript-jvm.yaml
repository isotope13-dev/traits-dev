defaults:
  platforms: [routeros, appliance]
  for: [javascript]
  attack: T1071.001

traits:
  - id: js-jvm-url-openconnection
    desc: JS JVM URL openConnection
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: new java.net.URL(url).openConnection()

  - id: js-jvm-beacon-get-method
    desc: JS JVM beacon GET method
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: setRequestMethod("GET")

  - id: js-jvm-beacon-path
    desc: JS JVM beacon path
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      exact: /beacon

composite_rules:
  - id: js-jvm-http-beacon
    desc: JS JVM HTTP beacon
    crit: hostile
    conf: 0.98
    all:
      - id: js-jvm-url-openconnection
      - id: js-jvm-beacon-get-method
      - id: js-jvm-beacon-path
