defaults:
  platforms: [windows, unix]
  for: [perl]
  attack: T1071.001

traits:
  - id: perl-beacon-url-path
    desc: Perl HTTP beacon path
    crit: component
    conf: 0.86
    if:
      type: text
      substr: /beacon

composite_rules:
  - id: perl-lwp-beacon-post
    desc: Perl LWP beacon POST
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/communications/http/lib/lwp::perl-lwp-useragent
      - id: perl-beacon-url-path
      - id: micro-behaviors/communications/http/lib/lwp::perl-lwp-post-call

  - id: perl-lwp-beacon-get
    desc: Perl LWP beacon GET
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/communications/http/lib/lwp::perl-lwp-useragent
      - id: perl-beacon-url-path
      - id: micro-behaviors/communications/http/lib/lwp::perl-lwp-get-call

  - id: perl-lwp-host-beacon
    desc: Perl LWP host beacon
    crit: suspicious
    conf: 0.96
    any:
      - id: perl-lwp-beacon-post
      - id: perl-lwp-beacon-get
    needs: 1
    all:
      - id: micro-behaviors/os/sysinfo/hostname::perl-win32-node
      - id: micro-behaviors/process/user/query::perl-win32-login-name
