defaults:
  platforms: [windows, unix, appliance]
  for: [powershell]
  attack: T1071.001

traits:
  - id: ps-c2-channel-function
    desc: PowerShell C2 channel function
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: function New-C2Channel

  - id: ps-api-beacon-rest-post
    desc: PowerShell REST beacon POST
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/api/v1/beacon[\s\S]{0,420}Invoke-RestMethod[\s\S]{0,180}-Method POST'

  - id: ps-fallback-c2-url
    desc: PowerShell fallback C2 URL
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/fallback

composite_rules:
  - id: ps-rest-c2-beacon
    desc: PowerShell REST C2 beacon
    crit: hostile
    conf: 0.98
    all:
      - id: ps-c2-channel-function
      - id: ps-api-beacon-rest-post
    any:
      - id: ps-fallback-c2-url
      - id: micro-behaviors/data/encode/base64::to-base64-string
