defaults:
  attack: T1071.001
  mbc: B0030
  platforms:
    - unix
    - windows
traits:
  - id: libksba-ocsp-context
    desc: libksba OCSP validation context
    crit: baseline
    conf: 0.94
    for: [binaries]
    if:
      type: text
      substr: ksba_ocsp_

  - id: compact-beacon-a
    desc: Dense C2 patterns in compact binary
    crit: suspicious
    conf: 0.88
    for: [binaries]
    size_max: 100000
    count_min: 3
    per_kb_min: 0.3
    unless:
      - type: text
        substr: "->read_response_header"
    if:
      type: text
      regex: (User-Agent:\s|Host:\s|Content-Type:\s|HTTP/1\.[01])
  - id: php-geoip-country-code-field
    desc: PHP GeoIP country code field
    crit: baseline
    conf: 0.9
    for: [php]
    if:
      type: text
      regex: '(?i)country_?code'
  - id: php-geoip-ip2long-call
    desc: PHP GeoIP ip2long call
    crit: baseline
    conf: 0.9
    for: [php]
    if:
      type: text
      word: ip2long
composite_rules:
  - id: php-geoip-range-table-context
    desc: PHP GeoIP range table context
    crit: baseline
    conf: 0.9
    all:
      - id: php-geoip-ip2long-call
      - id: php-geoip-country-code-field
  - id: direct-c2-ip-address
    desc: Direct C2 IP address indicator
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-list
  - id: direct-http-c2
    desc: Direct HTTP C2 infrastructure
    crit: suspicious
    conf: 0.95
    size_max: 1500000
    any:
      - id: direct-http-c2-binary-ip
      - id: direct-http-c2-script-ip
      - id: direct-http-c2-ip-port
      - id: direct-http-c2-ip-url
    downgrade:
      any:
        - id: metadata/binary/resource::kernel-driver-init
        - id: metadata/binary/resource::kernel-driver-idata
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/resource::resource-only-dll
        - id: metadata/package/testing/presence/platform_suites::autoconf-testsuite
        - id: metadata/package/testing/presence/platform_suites::gnu-coreutils-test
        - id: metadata/library/structure::js-known-bundler-output
  - id: direct-http-c2-binary-ip
    desc: Direct HTTP C2 infrastructure with binary IP
    crit: suspicious
    conf: 0.9
    size_max: 1500000
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
    any:
      - id: micro-behaviors/communications/http/request/
      - id: compact-beacon-a
      - id: micro-behaviors/communications/http/message::http-url-literal
    unless:
      - id: objectives/discovery/cloud/metadata::ssrf-metadata-blocklist-context
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
      - id: micro-behaviors/crypto/library/blockchain::managed-hot-wallet-client-context
      - id: php-geoip-range-table-context
      - id: micro-behaviors/communications/ip/literal::geoip-range-table-context
      # libksba X.509 OCSP/CRL validation context (e.g. GnuPG dirmngr):
      # the hardcoded IPv4 values are DNS root-server addresses and the
      # http:// literals are keyserver/CRL URLs, not C2 infrastructure.
      - id: libksba-ocsp-context
  - id: direct-http-c2-dropper
    desc: Direct IP HTTP C2 with staged dropper
    crit: hostile
    conf: 0.96
    size_max: 5242880
    all:
      - id: direct-http-c2-binary-ip
      - id: objectives/command-and-control/dropper/download::winhttp-temp-dropper
      - id: objectives/evasion/security-bypass/policy/execution::bypass-execution-policy
    any:
      - id: micro-behaviors/communications/http/headers::auth-header
      - id: micro-behaviors/communications/http/post::post-string-pe
      - id: metadata/build/manifest::pe-requires-admin
      - id: objectives/anti-analysis/emulator-detect/vendor-strings::comprehensive
  - id: direct-http-c2-script-ip
    desc: Direct HTTP C2 infrastructure with script IP
    crit: suspicious
    conf: 0.9
    size_max: 1500000
    all:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-script
    any:
      - id: micro-behaviors/communications/http/request/
      - id: compact-beacon-a
      - id: micro-behaviors/communications/http/message::http-url-literal
    unless:
      - id: objectives/discovery/cloud/metadata::ssrf-metadata-blocklist-context
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
      - id: micro-behaviors/crypto/library/blockchain::managed-hot-wallet-client-context
      - id: php-geoip-range-table-context
  - id: direct-http-c2-ip-port
    desc: Direct HTTP C2 infrastructure with IP port
    crit: component
    conf: 0.9
    size_max: 1500000
    all:
      - id: objectives/command-and-control/infrastructure/ip-port::hardcoded-ipv4-port-list
    any:
      - id: micro-behaviors/communications/http/request/
      - id: compact-beacon-a
    unless:
      - id: objectives/discovery/cloud/metadata::ssrf-metadata-blocklist-context
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
      - id: micro-behaviors/crypto/library/blockchain::managed-hot-wallet-client-context
  - id: direct-http-c2-ip-url
    desc: Direct HTTP C2 infrastructure with IP URL
    crit: component
    conf: 0.9
    size_max: 1500000
    all:
      - id: micro-behaviors/communications/ip/literal::http-ip-url
    any:
      - id: micro-behaviors/communications/http/request/
      - id: compact-beacon-a
      - id: micro-behaviors/communications/http/download/curl::curl-cmd
    unless:
      - id: well-known/tool/detection/security-scanner::defensive-evidence-collector
      - id: objectives/discovery/cloud/metadata::ssrf-metadata-blocklist-context
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness::test-directory
      - id: micro-behaviors/crypto/library/blockchain::managed-hot-wallet-client-context
