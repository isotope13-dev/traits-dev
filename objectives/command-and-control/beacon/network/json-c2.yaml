defaults:
  crit: notable
  attack: T1071.001
  mbc: B0030
  for:
    - python
    - javascript
    - shell
  platforms:
    - unix
    - windows
    - macos
traits:
  - id: json-charset-utf8
    desc: JSON with UTF-8 charset
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: application/json.{0,50}charset=utf-8
  - id: requests-json-headers
    desc: requests with JSON headers
    crit: notable
    conf: 0.8
    size_max: 5000
    if:
      type: string_value
      regex: headers.{0,50}json|json.{0,50}headers
  - id: http-post-json-dup
    desc: HTTP POST with JSON
    crit: notable
    conf: 0.8
    size_max: 5000
    if:
      type: string_value
      regex: post.{0,50}json|json.{0,50}post
  - id: json-data-post
    desc: JSON data POST exfiltration
    crit: suspicious
    conf: 0.85
    size_max: 5000
    if:
      type: string_value
      regex: requests\.post.{0,50}data.{0,50}json|post.{0,50}data=.{0,50}b64
  - id: base64-json-payload
    desc: Base64 in JSON payload
    crit: suspicious
    conf: 0.85
    size_max: 5000
    if:
      type: string_value
      regex: json.{0,50}b64encode|b64encode.{0,50}data
  - id: http-response-text
    desc: HTTP response text extraction
    crit: component
    conf: 0.65
    if:
      type: raw
      regex: response\.text[^a-z]|text[^a-z].{0,30}response
composite_rules:
  - id: json-c2-headers
    desc: JSON C2 communication headers
    crit: notable
    conf: 0.85
    needs: 3
    any:
      - id: micro-behaviors/communications/http/request::application-json
      - id: json-charset-utf8
      - id: requests-json-headers
      - id: http-response-text
  - id: json-exfiltration
    desc: JSON data exfiltration
    crit: suspicious
    conf: 0.9
    attack: T1041
    for:
      - python
      - javascript
    size_max: 5000
    needs: 3
    any:
      - id: json-data-post
      - id: base64-json-payload
      - id: objectives/command-and-control/beacon/network::http-post-json-dup
    all:
      - id: micro-behaviors/communications/http/request::application-json
  - id: json-c2-protocol
    desc: JSON C2 communication protocol
    crit: suspicious
    conf: 0.95
    for:
      - python
      - javascript
    all:
      - id: json-c2-headers
      - id: json-exfiltration
