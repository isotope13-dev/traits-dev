defaults:
  attack: T1071.001
  mbc: B0030
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: compact-beacon-a
    desc: Dense C2 patterns in compact binary
    crit: suspicious
    conf: 0.88
    for:
      - elf
      - macho
      - pe
    size_max: 100000
    count_min: 3
    per_kb_min: 0.3
    if:
      type: string_value
      regex: (User-Agent:\s|Host:\s|Content-Type:\s|HTTP/1\.[01])
composite_rules:
  - id: direct-http-c2
    desc: Direct HTTP C2 infrastructure
    crit: notable
    conf: 0.95
    size_max: 1500000
    all:
      - id: objectives/command-and-control/infrastructure/ip/
    any:
      - id: micro-behaviors/communications/http/request/
      - id: objectives/command-and-control/infrastructure/ip::port-number-constant
      - id: compact-beacon-a
      - id: micro-behaviors/communications/http/protocol::http-url-literal
    downgrade:
      any:
        - id: metadata/binary/resource::kernel-driver-init
        - id: metadata/binary/resource::kernel-driver-idata
        - id: metadata/package/versioning::pe-version-resource
        - id: metadata/binary/resource::resource-only-dll
        - id: metadata/package/testing::autoconf-testsuite
        - id: metadata/package/testing::gnu-coreutils-test
