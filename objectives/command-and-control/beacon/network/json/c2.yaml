defaults:
  crit: notable
  attack: T1071.001
  mbc: B0030
  for: [scripts, binaries, powershell]
  platforms:
    - unix
    - windows
traits:
  - id: base64-json-payload
    desc: Base64 data preceding an HTTP JSON submission
    # Encoding a JSON request is common application behavior. C2/exfiltration
    # escalation is provided by the composites below, not this atom alone.
    crit: notable
    conf: 0.85
    size_max: 5000
    if:
      # A URL fragment, API metadata string, or a standalone encoder is not
      # C2. Require encoded data to precede a JSON-bearing HTTP submission.
      type: text
      regex: '(?is)(base64|b64).{0,180}\b(post|put)\b.{0,100}\bjson\b'
    unless:
      - id: well-known/app/homebrew::source-tree
      - id: metadata/package/testing/presence/harness::tests-data-directory-path
  - id: beacon-start-victim-profile
    desc: Beacon start victim profile
    crit: component
    conf: 0.9
    if:
      type: text
      substr: BEACON_START
  - id: c2-command-result-endpoints
    desc: Hard-coded HTTP command endpoint URL
    crit: notable
    conf: 0.88
    if:
      type: text
      # Require /cmd as a terminal path segment (not /cmd/pkg docs such as
      # http://golang.org/cmd/5a from the Go toolchain docs / open-uri tests).
      regex: "https?://[^\\s\"/]{1,120}/cmd([\"'?&\\s]|$)"
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: basename
        regex: '(^|[-_.])(test|spec)\.[cm]?[jt]sx?$'
  - id: c2-result-endpoint
    desc: Hard-coded HTTP result endpoint URL
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'https?://[^\s"]{1,120}/result[/"?\s]'
  - id: base64-chunk-word
    desc: Base64 chunk sizing word
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)base64.{0,80}(1500|chunk)|(1500|chunk).{0,80}base64
composite_rules:
  # The size-gated "JSON POST from a small script" shape lives with the other
  # HTTP-client micro-behaviors as
  # micro-behaviors/communications/http/request/client::http-post-json-small-script
  # — it is a neutral protocol shape, so filing it here labelled it as a C2
  # beacon on every benign script that posts JSON. C2 intent comes from the
  # json-exfiltration / json-c2-protocol composites that pair it with payload
  # signals.
  # Both legs are plain-English word proximity: `command`/`result` near
  # `base64`/`chunk`. That co-occurrence carries no behavior on its own — it
  # fires on any prose or code that chunks base64 (MIME encoders, upload
  # helpers), so it stays a component. The C2 reading comes from
  # python-tasking-rat-dispatch, which pairs it with a tasking schema and
  # process enumeration.
  - id: result-base64-chunking
    desc: Command/result near base64-chunk wording
    crit: component
    conf: 0.9
    all:
      - id: objectives/command-and-control/remote-command/keywords::command-result-word
      - id: base64-chunk-word
    near_bytes: 256
  - id: json-c2-headers
    desc: JSON HTTP header handling
    crit: component
    conf: 0.85
    unless:
      - id: metadata/package/testing/harness/runtime/
      # Bundled HTTP libraries (jQuery ajax, axios) and inline source maps
      # (data:application/json;base64) carry these JSON-over-HTTP tokens too.
      - id: metadata/library/structure/
    needs: 3
    any:
      - id: micro-behaviors/communications/http/header/content-type::application-json
      - id: micro-behaviors/communications/http/headers::json-content-type-charset
      - id: micro-behaviors/communications/http/client/response-body::js-response-text-read
  - id: json-exfiltration
    desc: JSON data exfiltration
    crit: suspicious
    conf: 0.9
    attack: T1041
    for:
      - python
      - javascript
    size_max: 5000
    unless:
      - id: metadata/package/testing/harness/runtime/
    needs: 2
    any:
      - id: base64-json-payload
      - id: micro-behaviors/communications/http/request/client::http-post-json-small-script
    all:
      - id: micro-behaviors/communications/http/header/content-type::application-json
  - id: json-c2-protocol
    desc: JSON C2 communication protocol
    crit: suspicious
    conf: 0.95
    for:
      - python
      - javascript
    all:
      - id: json-c2-headers
      - id: json-exfiltration
  - id: flat-file-json-beacon-c2
    desc: Flat-file JSON beacon C2
    crit: hostile
    conf: 0.98
    for:
      - python
      - powershell
    all:
      - id: beacon-start-victim-profile
      - id: c2-command-result-endpoints
      - id: c2-result-endpoint
