defaults:
  crit: notable
  attack: T1071.001
  mbc: B0030
  for: [scripts, binaries, powershell]
  platforms:
    - unix
    - windows
traits:
  - id: requests-json-headers
    desc: requests with JSON headers
    # A JSON Content-Type header is a neutral protocol element; standalone it is
    # not C2. Only meaningful inside the needs:3 json-c2-headers composite.
    crit: component
    conf: 0.8
    size_max: 5000
    if:
      type: string_literal
      regex: headers.{0,50}json|json.{0,50}headers
  - id: json-data-post
    desc: JSON data POST exfiltration
    crit: suspicious
    conf: 0.85
    size_max: 5000
    if:
      type: string_literal
      regex: requests\.post.{0,50}data.{0,50}json|post.{0,50}data=.{0,50}b64
  - id: base64-json-payload
    desc: Base64 data in HTTP JSON request
    crit: suspicious
    conf: 0.85
    size_max: 5000
    if:
      # A URL fragment, API metadata string, or a standalone encoder is not
      # C2. Require encoded data to precede a JSON-bearing HTTP submission.
      type: text
      regex: '(?is)(base64|b64).{0,180}\b(post|put)\b.{0,100}\bjson\b'
  - id: http-response-text
    desc: HTTP response text extraction
    crit: component
    conf: 0.65
    if:
      type: text
      regex: response\.text[^a-z]|text[^a-z].{0,30}response
    unless:
    - type: trait
      id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: beacon-start-victim-profile
    desc: Beacon start victim profile
    crit: component
    conf: 0.9
    if:
      type: text
      substr: BEACON_START
  - id: c2-command-result-endpoints
    desc: Hard-coded HTTP command endpoint URL
    crit: notable
    conf: 0.88
    if:
      type: text
      # Require /cmd as a terminal path segment (not /cmd/pkg docs such as
      # http://golang.org/cmd/5a from the Go toolchain docs / open-uri tests).
      regex: "https?://[^\\s\"/]{1,120}/cmd([\"'?&\\s]|$)"
    unless:
      - id: metadata/package/testing/harness/runtime/
      - type: basename
        regex: '(^|[-_.])(test|spec)\.[cm]?[jt]sx?$'
  - id: c2-result-endpoint
    desc: Hard-coded HTTP result endpoint URL
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'https?://[^\s"]{1,120}/result[/"?\s]'
  - id: base64-chunk-word
    desc: Base64 chunk sizing word
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)base64.{0,80}(1500|chunk)|(1500|chunk).{0,80}base64
composite_rules:
  - id: http-post-json-dup
    desc: HTTP POST with JSON
    crit: suspicious
    conf: 0.8
    size_max: 5000
    unless:
      - id: metadata/package/testing/harness/runtime/
    any:
      - id: micro-behaviors/communications/http/request/client::http-post-json
      - id: micro-behaviors/communications/http/request/client::requests-post-json-payload
  - id: result-base64-chunking
    desc: Base64 result chunking
    crit: notable
    conf: 0.9
    all:
      - id: objectives/command-and-control/remote-command/keywords::command-result-word
      - id: base64-chunk-word
    near_bytes: 256
  - id: json-c2-headers
    desc: JSON HTTP header handling
    crit: component
    conf: 0.85
    unless:
      - id: metadata/package/testing/harness/runtime/
      # Bundled HTTP libraries (jQuery ajax, axios) and inline source maps
      # (data:application/json;base64) carry these JSON-over-HTTP tokens too.
      - id: metadata/library/structure/
    needs: 3
    any:
      - id: micro-behaviors/communications/http/header/content-type::application-json
      - id: micro-behaviors/communications/http/headers::json-content-type-charset
      - id: requests-json-headers
      - id: http-response-text
  - id: json-exfiltration
    desc: JSON data exfiltration
    crit: suspicious
    conf: 0.9
    attack: T1041
    for:
      - python
      - javascript
    size_max: 5000
    unless:
      - id: metadata/package/testing/harness/runtime/
    needs: 3
    any:
      - id: json-data-post
      - id: base64-json-payload
      - id: objectives/command-and-control/beacon/network/json::http-post-json-dup
    all:
      - id: micro-behaviors/communications/http/header/content-type::application-json
  - id: json-c2-protocol
    desc: JSON C2 communication protocol
    crit: suspicious
    conf: 0.95
    for:
      - python
      - javascript
    all:
      - id: json-c2-headers
      - id: json-exfiltration
  - id: flat-file-json-beacon-c2
    desc: Flat-file JSON beacon C2
    crit: hostile
    conf: 0.98
    for:
      - python
      - powershell
    all:
      - id: beacon-start-victim-profile
      - id: c2-command-result-endpoints
      - id: c2-result-endpoint
