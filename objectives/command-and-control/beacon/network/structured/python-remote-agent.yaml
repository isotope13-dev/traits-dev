# A persistent Socket.IO command channel.  The command-handler marker is
# defined with the dispatch objective so the two detections share one precise
# protocol observation.
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1059.006,T1071.001

composite_rules:
  - id: python-socketio-command-beacon
    desc: Persistent Socket.IO beacon accepts remote command events
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/backdoor/tasking/socket::python-remote-command-event-handler
      - id: metadata/library/socketio::python-client-import
      - id: micro-behaviors/communications/websocket/send::python-socketio-connect-call
      - id: micro-behaviors/time/sleep/interval::python-periodic-loop
