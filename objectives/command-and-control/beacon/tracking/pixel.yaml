defaults:
  platforms: [unix, windows, macos]
# C2 Beaconing to tracking/logging services
# Detects malware that uses tracking pixels or IP loggers for beaconing
# ATT&CK: T1071 (Application Layer Protocol)
composite_rules:
  - id: ruby-tracking-pixel-beacon
    desc: Ruby HTTP request to tracking/logging service (beaconing)
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/lib/netlib::request-ruby
    any:
      - id: objectives/discovery/network/ip-tracker/
      - id: objectives/discovery/system/fingerprint/network::iplogger-keyword
      - id: objectives/discovery/system/fingerprint/network::iplogger-ru-host
      - id: objectives/discovery/system/fingerprint/network::iplogger-encoded
  - id: python-tracking-pixel-beacon
    desc: Python HTTP request to tracking/logging service (beaconing)
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/request/client::request-python
    any:
      - id: objectives/discovery/network/ip-tracker/
      - id: objectives/discovery/system/fingerprint/network::iplogger-keyword
      - id: objectives/discovery/system/fingerprint/network::iplogger-ru-host
      - id: objectives/discovery/system/fingerprint/network::iplogger-encoded
  - id: generic-tracking-pixel-beacon
    desc: HTTP request to tracking/logging service (beaconing)
    crit: suspicious
    conf: 0.9
    # Require the HTTP client and tracker marker in the same local
    # neighborhood. File-wide coincidence of a filter-engine domain table
    # plus unrelated fetch/XHR elsewhere is not beaconing.
    near_lines: 25
    unless:
      - id: well-known/app/browser-extension::adblock-extension-bundle
      - id: well-known/app/browser-extension::adblock-marker-easylist
      - id: well-known/app/browser-extension::adblock-marker-ublock
      - id: micro-behaviors/process/hook/webextension::dnr-block-request-rules
    all:
      - id: micro-behaviors/communications/http/request/
    any:
      - id: objectives/discovery/network/ip-tracker/
      - id: objectives/discovery/system/fingerprint/network::iplogger-keyword
      - id: objectives/discovery/system/fingerprint/network::iplogger-ru-host
      - id: objectives/discovery/system/fingerprint/network::iplogger-encoded
