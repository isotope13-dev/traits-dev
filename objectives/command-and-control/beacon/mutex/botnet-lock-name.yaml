defaults:
  platforms: [unix]
  for: [elf]
  attack: T1027
  mbc: B0030
traits:
  - id: tmp-bot-lock
    desc: /tmp bot lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/tmp/\.bot_?lock\b'}
  - id: tmp-client-lock
    desc: /tmp client lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/tmp/\.client_?lock\b'}
  - id: tmp-implant-lock
    desc: /tmp implant lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/tmp/\.implant_?lock\b'}
  - id: tmp-node-lock
    desc: /tmp node lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/tmp/\.node_?lock\b'}
  - id: tmp-agent-lock
    desc: /tmp agent lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/tmp/\.agent_?lock\b'}
  - id: tmp-miner-lock
    desc: /tmp miner lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/tmp/\.miner_?lock\b'}
  - id: tmp-stealer-lock
    desc: /tmp stealer lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/tmp/\.stealer_?lock\b'}
  - id: var-bot-lock
    desc: /var bot lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/var/(run|tmp)/\.bot_?lock\b'}
  - id: var-client-lock
    desc: /var client lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/var/(run|tmp)/\.client_?lock\b'}
  - id: var-implant-lock
    desc: /var implant lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/var/(run|tmp)/\.implant_?lock\b'}
  - id: var-node-lock
    desc: /var node lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/var/(run|tmp)/\.node_?lock\b'}
  - id: var-agent-lock
    desc: /var agent lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/var/(run|tmp)/\.agent_?lock\b'}
  - id: var-miner-lock
    desc: /var miner lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/var/(run|tmp)/\.miner_?lock\b'}
  - id: var-stealer-lock
    desc: /var stealer lock path
    crit: suspicious
    conf: 0.9
    if: {type: text, regex: '/var/(run|tmp)/\.stealer_?lock\b'}
composite_rules:
  - id: bot-lock-tmp-path
    desc: /tmp botnet lock path
    crit: suspicious
    conf: 0.95
    any:
      - id: tmp-bot-lock
      - id: tmp-client-lock
      - id: tmp-implant-lock
      - id: tmp-node-lock
      - id: tmp-agent-lock
      - id: tmp-miner-lock
      - id: tmp-stealer-lock
  - id: bot-lock-var-path
    desc: /var botnet lock path
    crit: suspicious
    conf: 0.95
    any:
      - id: var-bot-lock
      - id: var-client-lock
      - id: var-implant-lock
      - id: var-node-lock
      - id: var-agent-lock
      - id: var-miner-lock
      - id: var-stealer-lock
