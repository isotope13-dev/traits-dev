# Mutex/named-pipe GUID + crypto + HTTP — coordinated-malware shape.
#
# A small/medium PE that:
#   - declares a GUID-formatted mutex or `\\.\pipe\{...}` for
#     single-instance coordination,
#   - imports or references symmetric crypto primitives, and
#   - reaches the network over HTTP
#
# is the textbook profile of a campaign-coordinated implant
# (backdoor, beacon, infostealer launcher). Each leg in isolation has
# legitimate uses; the three-way coincidence does not.
#
# Excludes Microsoft platform binaries, Electron apps, and known
# service binaries that legitimately combine these capabilities.
defaults:
  platforms: [windows]
  for: [pe]
  size_max: 5242880
  attack: "B0030"

composite_rules:
  - id: mutex-guid-crypto-http-coordination
    desc: GUID mutex with crypto and network
    crit: suspicious
    conf: 0.93
    all:
      - id: micro-behaviors/process/sync/mutex::guid-mutex
    needs: 2
    any:
      - id: micro-behaviors/crypto/symmetric/aes
      - id: micro-behaviors/crypto/symmetric/stream
      - id: micro-behaviors/crypto/symmetric/des
      - id: micro-behaviors/communications/http/get::internet-open-url
      - id: micro-behaviors/communications/http/client
      - id: micro-behaviors/communications/http/post::post-string-pe
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/framework::electron-desktop-runtime
      - id: metadata/binary/installer/family::known-benign-installer
      - id: well-known/lib/wmi
      - id: well-known/lib/node-notifier::snoretoast-helper
      - id: well-known/app
    downgrade:
      any:
        - id: metadata/binary/framework::dotnet-assembly
