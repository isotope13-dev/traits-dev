# C2 beacon timing evasion via traffic padding and jitter.
# Detects configuration fields that control random padding added
# to C2 protocol frames and jitter applied to beacon intervals,
# making traffic patterns harder to detect by statistical analysis.
# Used by emp3r0r and similar Go implants.
# ATT&CK: T1071.001 (Application Layer Protocol: Web Protocols)
defaults:
  platforms: [linux, macos, windows]
  for: [go]
  attack: T1071.001
  mbc: B0030

traits:
  - id: c2-frame-padding-config
    desc: C2 frame random padding configuration
    crit: notable
    conf: 0.85
    if:
      type: text
      word: PaddingMin

composite_rules:
  - id: c2-beacon-timing-evasion
    desc: C2 beacon timing evasion (frame padding + jittered interval)
    crit: suspicious
    conf: 0.88
    # The distinctive evasion behavior is random C2-frame padding; a jittered
    # or polled interval alone is ubiquitous backoff. Require the padding
    # anchor plus a timing field so benign Jitter+PollInterval backoff config
    # (every resilient Go client) does not trip this.
    all:
      - id: c2-frame-padding-config
    any:
      - id: micro-behaviors/time/schedule/interval::jitter-config-field
      - id: micro-behaviors/time/schedule/interval::poll-interval-config-field
