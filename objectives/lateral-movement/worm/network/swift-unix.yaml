defaults:
  platforms: [unix]
  for: [swift]
  attack: T1105

traits:
  - id: swift-subnet-port-scan
    desc: Swift subnet port scan
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'for i in 1\.\.\.254[\s\S]{0,260}socket\(AF_INET'

  - id: swift-ssh-rpc-propagation
    desc: Swift SSH RPC propagation
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'attemptSSHPropagation[\s\S]{0,260}attemptRPCPropagation'

  - id: swift-remote-payload-install
    desc: Swift remote payload install
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: cat > \(PERSIST_PATH) && chmod +x

composite_rules:
  - id: swift-network-worm-propagation
    desc: Swift network worm propagation
    crit: hostile
    conf: 0.98
    all:
      - id: swift-subnet-port-scan
      - id: swift-ssh-rpc-propagation
    any:
      - id: swift-remote-payload-install
