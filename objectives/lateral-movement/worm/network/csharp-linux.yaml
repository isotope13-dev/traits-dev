defaults:
  platforms: [unix]
  for: [csharp]
  attack: T1105

traits:
  - id: csharp-subnet-port-scan-loop
    desc: C# subnet port scan loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'for \(int i = 1; i <= 254; i\+\+\)[\s\S]{0,260}IsHostAlive'

  - id: csharp-ssh-scp-propagation
    desc: C# SSH SCP propagation
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'scp \{exePath\} \{targetIp\}:\{remotePath\}[\s\S]{0,120}ssh \{targetIp\}'

  - id: csharp-smbclient-propagation
    desc: C# smbclient propagation
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'smbclient \{remotePath\} -c'

composite_rules:
  - id: csharp-linux-network-worm
    desc: C# Linux network worm
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-subnet-port-scan-loop
    any:
      - id: csharp-ssh-scp-propagation
      - id: csharp-smbclient-propagation
    needs: 1
