defaults:
  platforms: [openbsd, bsd, unix]
  for: [javascript]
  attack: T1105

traits:
  - id: node-user-cache-copy
    desc: Node copies into user cache
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /home/${user}/.cache/

  - id: node-worm-socket-send
    desc: Node sends worm over socket
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: client.write(selfCode)

composite_rules:
  - id: node-openbsd-network-worm-copy
    desc: Node OpenBSD network worm copy
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/file/read::read-own-source
      - id: node-user-cache-copy
      - id: node-worm-socket-send
    unless:
      - id: metadata/package/files/ecosystem::openclaw-evolver-binary-build-pipeline
