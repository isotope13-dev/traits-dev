defaults:
  platforms: [unix, appliance]
  for: [perl]
  attack: T1105

traits:
  - id: perl-subnet-port-worm-scan
    desc: Perl subnet port worm scan
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'for my \$subnet[\s\S]{0,240}for my \$host \(1\.\.254\)'

  - id: perl-http-telnet-worm-delivery
    desc: Perl HTTP telnet worm delivery
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'install?payload=$worm_b64'

  - id: perl-xxd-worm-rebuild
    desc: Perl xxd worm rebuild
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: xxd -r -p

composite_rules:
  - id: perl-network-worm-propagation
    desc: Perl network worm propagation
    crit: hostile
    conf: 0.98
    all:
      - id: perl-subnet-port-worm-scan
      - id: perl-http-telnet-worm-delivery
      - id: perl-xxd-worm-rebuild
