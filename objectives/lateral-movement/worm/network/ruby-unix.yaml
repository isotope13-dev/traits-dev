defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1105

traits:
  - id: ruby-scp-self-copy
    desc: Ruby SCP self-copy
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "scp #{@payload_path}"

  - id: ruby-rsh-self-copy
    desc: Ruby RSH self-copy
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "rsh #{target} 'cat > ~/.cache_update.rb'"

  - id: ruby-remote-self-exec
    desc: Ruby remote self exec
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "ssh #{target} 'ruby ~/.cache_update.rb &'"

composite_rules:
  - id: ruby-scp-rsh-self-propagation
    desc: Ruby SCP RSH self propagation
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: ruby-scp-self-copy
      - id: ruby-rsh-self-copy
      - id: ruby-remote-self-exec
