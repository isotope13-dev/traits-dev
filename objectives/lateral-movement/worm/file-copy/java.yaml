defaults:
  platforms: [unix]
  for: [java, class, kotlin]
  attack: T1210
traits:
  - id: java-ssh-propagation-command
    desc: Java/Kotlin SSH propagation command
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\bssh\s+.{0,100}root@'
  - id: java-rcp-propagation-command
    desc: Java/Kotlin RCP propagation command
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: '\brcp\s+.{0,160}root@'
composite_rules:
  - id: java-worm-propagation
    desc: Java agent attempting propagation via SSH or RCP
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/process/create/shell/spawn::java-runtime-exec
    any:
      - id: java-ssh-propagation-command
      - id: java-rcp-propagation-command
    needs: 1
