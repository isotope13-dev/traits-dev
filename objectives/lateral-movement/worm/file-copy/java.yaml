defaults:
  platforms: [unix]
  for: [java, class, kotlin]
  attack: T1210
composite_rules:
  - id: java-worm-propagation
    desc: Java agent attempting propagation via SSH or RCP
    crit: hostile
    conf: 0.95
    any:
      - id: micro-behaviors/process/create/shell/invoke::java-runtime-exec
      - id: micro-behaviors/communications/socket/connect::java-socket-connect
      - id: micro-behaviors/data/text/keywords/lexicon::ssh-string
      - id: micro-behaviors/data/text/keywords/lexicon::rcp-string
    needs: 2
