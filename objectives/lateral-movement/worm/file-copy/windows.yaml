# Win32 File-Copy Worm Behavior
# Detects the pattern of enumerating directories + copying self
# ATT&CK: T1091 (Replication Through Removable Media) / T1570 (Lateral Tool Transfer)
defaults:
  attack: T1091
  for: [pe]
  platforms: [windows]
composite_rules:
  - id: win32-file-copy-worm
    desc: Win32 file-copy worm pattern
    crit: suspicious
    conf: 0.85
    size_max: 500000
    all:
      - id: micro-behaviors/fs/enumerate/directory
      - id: micro-behaviors/fs/file/copy
      - id: micro-behaviors/process/info/current::get-module-filename
    any:
      - id: micro-behaviors/os/info/directories::get-windows-directory
      - id: micro-behaviors/os/info/directories::get-system-directory
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
        - id: micro-behaviors/os/service/export::win-service-export
        - id: micro-behaviors/os/service/control::register-service-handler
        - id: metadata/format/installer::nsis
        - id: metadata/format/installer::inno-setup
        - id: metadata/lang/compiler::borland-rtl-regkey
        - id: metadata/lang/compiler
  - id: win32-drive-spread-worm
    desc: Drive enumeration with file write pattern
    crit: suspicious
    conf: 0.85
    size_max: 500000
    all:
      - id: micro-behaviors/fs/traversal/drives::get-logical-drive-strings
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
      - id: micro-behaviors/fs/enumerate/directory
    any:
      - id: micro-behaviors/io/console/output::write-file
      - id: micro-behaviors/fs/file/operations::file-create-win
      - id: micro-behaviors/process/info/current::get-module-filename
    downgrade:
      any:
        - id: metadata/format/installer::nsis
        - id: metadata/format/installer::inno-setup
        - id: metadata/lang/compiler::borland-rtl-regkey
        - id: metadata/lang/compiler
        - id: metadata/purpose/debug-tool::debug-event-loop
        - id: metadata/purpose/debug-tool::ida-debugger-server
        - id: micro-behaviors/communications/ssh/connect::openssh
