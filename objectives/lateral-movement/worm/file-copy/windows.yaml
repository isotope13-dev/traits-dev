# Win32 File-Copy Worm Behavior
# Detects the pattern of enumerating directories + copying self
# ATT&CK: T1091 (Replication Through Removable Media) / T1570 (Lateral Tool Transfer)
defaults:
  attack: T1091
  for: [pe]
  platforms: [windows]
composite_rules:
  - id: win32-file-copy-worm
    desc: Win32 file-copy worm pattern
    crit: suspicious
    conf: 0.85
    size_max: 500000
    all:
      - id: micro-behaviors/fs/enumerate/directory/
      - id: micro-behaviors/fs/file/copy/
      - id: micro-behaviors/process/info/current::get-module-filename
    any:
      - id: micro-behaviors/os/sysinfo/directories::get-windows-directory
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
    downgrade:
      any:
        - id: metadata/vendor/microsoft/
        - id: metadata/binary/installer/
        - id: metadata/lang/compiler/
        - id: metadata/package/versioning::pe-version-resource
        - id: micro-behaviors/data/embedded/certificate::pkcs7-signeddata-oid
  - id: win32-drive-spread-worm
    desc: Drive enumeration with file write pattern
    crit: suspicious
    conf: 0.85
    size_max: 500000
    all:
      - id: micro-behaviors/fs/traversal/drives::get-logical-drive-strings
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
      - id: micro-behaviors/fs/enumerate/directory/
    any:
      - id: micro-behaviors/fs/file/write::write-file
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/process/info/current::get-module-filename
    downgrade:
      any:
        - id: metadata/binary/installer/
        - id: metadata/lang/compiler/
        - id: well-known/tools/reverse-engineering/
        - id: micro-behaviors/communications/ssh/connect::openssh
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft/
  - id: drive-worm-registry-persistence
    desc: Drive-spreading worm with registry persistence
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/traversal/drives::get-logical-drive-strings
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
      - id: objectives/persistence/login/registry/autostart::run-key
    any:
      - id: micro-behaviors/fs/file/write::write-file
      - id: micro-behaviors/fs/file/read::read-file
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: micro-behaviors/fs/path/extension::exe-dup
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/vendor/microsoft/
        - id: metadata/binary/installer/
        - id: metadata/package/versioning::pe-version-resource
