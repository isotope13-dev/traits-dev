# Delphi P2P worm propagation
# Registers shared directories with P2P clients and populates with lure files
defaults:
  platforms: [windows]
  attack: T1091
composite_rules:
  - id: p2p-share-disable-worm
    desc: P2P worm forcing file sharing enabled
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/application/p2p::p2p-share-registration
