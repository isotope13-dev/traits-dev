defaults:
  platforms:
    - windows
  for:
    - csharp
  attack: T1091
traits:
  - id: dcplusplus-share-config
    desc: DC++ share configuration access
    crit: notable
    conf: 0.95
    if:
      type: string_value
      exact: DCPlusPlus.xml
  - id: dcplusplus-registry-key
    desc: DC++ installation registry key
    crit: component
    conf: 0.95
    if:
      type: string_value
      exact: SOFTWARE\DC++
  - id: edonkey-share-path
    desc: eDonkey shared downloads path
    crit: notable
    conf: 0.95
    if:
      type: string_value
      exact: eDonkey2000 Downloads\
  - id: kazaa-share-key
    desc: Kazaa shared content registry key
    crit: notable
    conf: 0.95
    if:
      type: string_value
      exact: SOFTWARE\Kazaa\LocalContent
  - id: kazaa-fragment
    desc: Kazaa application string fragment
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: "Kazaa L"
  - id: edonkey-fragment
    desc: eDonkey/eMule application fragment
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: "CQ 4"
  - id: deceptive-image-exe-lures
    desc: Multiple deceptive .jpg.exe lure names
    crit: suspicious
    conf: 0.98
    count_min: 4
    if:
      type: string_value
      substr: .jpg.exe
composite_rules:
  - id: p2p-share-worm-spread
    desc: P2P worm propagation through shared folders and lure filenames
    crit: hostile
    conf: 0.99
    all:
      - id: deceptive-image-exe-lures
    any:
      - id: dcplusplus-share-config
      - id: dcplusplus-registry-key
      - id: edonkey-share-path
      - id: kazaa-share-key
      - id: kazaa-fragment
      - id: edonkey-fragment
    needs: 2

  - id: p2p-fragment-indicator
    desc: P2P application fragment detected in packed binary
    crit: component
    conf: 0.85
    for: [pe, dll]
    any:
      - id: kazaa-fragment
      - id: edonkey-fragment
    unless:
      - type: metrics
        field: binary.function_count
        min: 3
