defaults:
  platforms:
    - windows
  for:
    - csharp
  attack: T1091
traits:
  - id: csharp-self-copy-p2p-share
    desc: C# self-copy to P2P share
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'File\.Copy[\s\S]{0,120}(ExecutablePath|FullyQualifiedName|MainModule)'

  - id: csharp-p2p-share-target
    desc: C# P2P share target
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(Kazaa\\\\LocalContent|eMule\\\\Incoming|Program Files)'
    unless:
      - id: well-known/app/windows-desktop-tools::playnite-source-file
      - id: well-known/app/windows-desktop-tools::playnite-source-path

  - id: csharp-p2p-lure-exe
    desc: C# P2P lure executable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(-crack\.exe|Teen Sex\.exe|\.jpg\.exe)'

  - id: dcplusplus-share-config
    desc: DC++ share configuration access
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: DCPlusPlus.xml
  - id: dcplusplus-registry-key
    desc: DC++ installation registry key
    crit: component
    conf: 0.95
    if:
      type: string_literal
      exact: SOFTWARE\DC++
  - id: edonkey-share-path
    desc: eDonkey shared downloads path
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: eDonkey2000 Downloads\
  - id: kazaa-share-key
    desc: Kazaa shared content registry key
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      exact: SOFTWARE\Kazaa\LocalContent
  - id: kazaa-fragment
    desc: Kazaa application string fragment
    crit: component
    conf: 0.8
    if:
      type: string_literal
      substr: "Kazaa L"
  - id: edonkey-fragment
    desc: eDonkey/eMule application fragment
    crit: component
    conf: 0.8
    if:
      type: string_literal
      substr: "CQ 4"
  - id: deceptive-image-exe-lures
    desc: Multiple deceptive .jpg.exe lure names
    crit: suspicious
    conf: 0.98
    count_min: 4
    if:
      type: string_literal
      substr: .jpg.exe
composite_rules:
  - id: p2p-share-worm-spread
    desc: P2P worm propagation through shared folders and lure filenames
    crit: hostile
    conf: 0.99
    all:
      - id: deceptive-image-exe-lures
    any:
      - id: dcplusplus-share-config
      - id: dcplusplus-registry-key
      - id: edonkey-share-path
      - id: kazaa-share-key
      - id: kazaa-fragment
      - id: edonkey-fragment
    needs: 2

  - id: p2p-fragment-indicator
    desc: P2P application fragment detected in packed binary
    crit: component
    conf: 0.85
    for: [pe, dll]
    any:
      - id: kazaa-fragment
      - id: edonkey-fragment
    unless:
      - id: metadata/binary/metrics/threshold::few-functions-3

  - id: csharp-p2p-self-copy-worm
    desc: C# self-copy P2P worm
    crit: hostile
    conf: 0.97
    all:
      - id: csharp-self-copy-p2p-share
    any:
      - id: csharp-p2p-share-target
      - id: csharp-p2p-lure-exe
      - id: kazaa-share-key
      - id: edonkey-share-path
