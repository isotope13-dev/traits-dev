defaults:
  platforms: [freebsd, unix]
  for: [java, class]
  attack: T1021.004

traits:
  - id: java-ssh-stricthostkey-disabled
    desc: Java SSH disables host key checks
    crit: suspicious
    conf: 0.9
    if:
      type: hex
      pattern: 53 74 72 69 63 74 48 6F 73 74 4B 65 79 43 68 65 63 6B 69 6E 67 3D 6E 6F

  - id: java-ssh-default-user-loop
    desc: Java SSH default user loop
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '"(root|admin|freebsd)"'

  - id: java-ssh-service-user-loop
    desc: Java SSH service user loop
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '"(oracle|postgres)"'

  - id: java-ssh-http-payload-deploy
    desc: Java SSH deploys HTTP shell payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: curl -s http://

composite_rules:
  - id: java-ssh-worm-http-payload
    desc: Java SSH worm deploys HTTP payload
    crit: hostile
    conf: 0.98
    all:
      - id: java-ssh-stricthostkey-disabled
      - id: java-ssh-http-payload-deploy
    any:
      - id: java-ssh-default-user-loop
      - id: java-ssh-service-user-loop
      - id: micro-behaviors/communications/socket/connect::java-socket-connect
