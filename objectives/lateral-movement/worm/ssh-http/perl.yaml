defaults:
  platforms: [unix, fortios]
  for: [perl]
  attack: T1105

traits:
  - id: perl-ssh-http-propagation
    desc: Perl SSH and HTTP propagation
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: 'propagate_worm[\s\S]{0,620}PeerPort\s*=>\s*22[\s\S]{0,620}POST \$ep HTTP/1\.1'
