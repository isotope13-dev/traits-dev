# NNTP newsgroup worm propagation
defaults:
  platforms: [unix, windows, macos]
  for: [source, scripts]
  attack: "T1566.001"
composite_rules:
  - id: nntp-worm-propagation
    desc: NNTP newsgroup worm propagation
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/email/nntp::nntp-posting-client
    any:
      - id: micro-behaviors/data/encode/uuencode::uuencode-header
      - id: micro-behaviors/communications/email/mime::mime-base64-attachment
