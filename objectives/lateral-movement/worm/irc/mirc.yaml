defaults:
  platforms: [unix, windows, macos]
  attack: T1571
composite_rules:
  - id: mirc-worm
    description: "Detects mIRC worm behavior modifying script.ini to spread via IRC"
    crit: hostile
    all:
      - id: micro-behaviors/fs/path/application/config::mirc-config-file
      - id: objectives/command-and-control/channel/irc/client::mirc-script-cmd
      - id: objectives/command-and-control/channel/irc/client::mirc-script-event
  - id: mirc-dcc-scriptini-worm
    description: "Detects mIRC DCC spreading behavior targeting script.ini"
    crit: hostile
    all:
      - id: micro-behaviors/fs/path/application/config::mirc-config-file
      - id: objectives/command-and-control/channel/irc/client::mirc-script-event
    any:
      - id: objectives/command-and-control/channel/irc/client::mirc-script-cmd-dcc-send
      - id: objectives/command-and-control/channel/irc/client::mirc-script-cmd-dcc-send-bare
