defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: mirc-worm
    description: "Detects mIRC worm behavior modifying script.ini to spread via IRC"
    crit: hostile
    attack: T1571
    all:
      - id: micro-behaviors/fs/path/application::mirc-config-file
      - id: objectives/command-and-control/channel/irc::mirc-script-cmd
      - id: objectives/command-and-control/channel/irc::mirc-script-event
