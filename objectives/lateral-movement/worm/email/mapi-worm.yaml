# MAPI-based email worm propagation
# Harvests contacts from MAPI inbox and WAB, sends via SMTP relay
defaults:
  platforms: [windows]
  attack: T1566
composite_rules:
  - id: mapi-smtp-relay-worm
    desc: MAPI harvest with SMTP relay mass mailer
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/collection/email-harvest::mapi-inbox-harvest
      - id: micro-behaviors/communications/email/send::smtp-relay-server-component
  - id: wab-smtp-relay-worm
    desc: WAB harvest with SMTP relay mass mailer
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/collection/email-harvest::wab-registry-path
      - id: micro-behaviors/communications/email/send::smtp-relay-server-component
  - id: mapi-wab-email-harvest
    desc: Multi-source email address harvesting
    crit: suspicious
    conf: 0.96
    any:
      - id: objectives/collection/email-harvest::mapi-inbox-harvest
      - id: objectives/collection/email-harvest::wab-registry-path
    needs: 2
