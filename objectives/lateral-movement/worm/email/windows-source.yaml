# Windows email worm propagation from source code
defaults:
  platforms: [windows]
composite_rules:
  - id: outlook-email-worm
    desc: Outlook address-harvesting email worm
    crit: hostile
    conf: 0.98
    attack: T1566
    all:
      - id: micro-behaviors/communications/email/send::outlook-mapi-automation
      - id: micro-behaviors/communications/email/send::address-book-recipient-harvest
      - id: micro-behaviors/communications/email/send::attached-mail-send
    any:
      - id: micro-behaviors/fs/read/self::self-copy-routine
      - id: well-known/malware/worm/serab::winpof-path
      - id: well-known/malware/worm/serab::sera-vbs-path
  - id: vbs-mailer-dropper
    desc: Drops VBS mass-mailer script
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/communications/email/send::outlook-mapi-automation
      - id: well-known/malware/worm/serab::sera-vbs-path
    any:
      - id: micro-behaviors/fs/read/self::self-copy-routine
      - id: well-known/malware/worm/serab::iniwir-path
