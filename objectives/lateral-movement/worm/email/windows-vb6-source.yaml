defaults:
  platforms: [windows]
composite_rules:
  - id: vb6-outlook-mail-worm
    desc: VB6 Outlook mass mailing worm
    crit: hostile
    conf: 0.99
    attack: T1566
    all:
      - id: micro-behaviors/communications/email/send/outlook::attached-mail-send-vb6
      - id: objectives/collection/email-harvest::filesystem-email-harvest-vb6
    any:
      - id: micro-behaviors/fs/write/copy::patch-lure-copy
      - id: micro-behaviors/fs/write/copy::self-copy-fanout-vb6
      - id: micro-behaviors/communications/email/send/outlook::deceptive-patch-subject
