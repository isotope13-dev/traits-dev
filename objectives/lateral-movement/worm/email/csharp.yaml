# C# email worm patterns
defaults:
  platforms: [windows]
  for: [csharp]
  attack: "T1566.001"
composite_rules:
  - id: smtp-email-worm
    desc: Email worm with address harvesting
    crit: hostile
    conf: 0.98
    any:
      - id: micro-behaviors/communications/email/send::email-harvest-regex
      - id: objectives/collection/email-harvest::internet-cache-mailto-harvest
    all:
      - id: micro-behaviors/communications/email/send::legacy-smtp-mass-mailer
      - id: micro-behaviors/communications/email/send::smtp-ssl-mail-exfil
      - id: micro-behaviors/communications/email/send/direct::raw-smtp-protocol
    needs: 2
  - id: raw-smtp-email-worm
    desc: Raw SMTP email worm propagation
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/email/send/direct::raw-smtp-protocol
    any:
      - id: micro-behaviors/communications/email/mime::mime-executable-attachment
      - id: micro-behaviors/communications/email/send/direct::mime-base64-self-attachment
      - id: objectives/collection/email-harvest::internet-cache-mailto-harvest
    needs: 2
