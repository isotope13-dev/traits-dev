# C# email worm patterns
defaults:
  platforms: [windows]
  for: [csharp]
  attack: "T1566.001"
composite_rules:
  - id: csharp-outlook-vbs-mail-worm
    desc: C# emits Outlook VBS mail worm
    crit: hostile
    conf: 0.97
    all:
      - id: csharp-vbs-mailitem-write
      - id: csharp-starts-generated-vbs

  - id: smtp-email-worm
    desc: Email worm with address harvesting
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/email/send/smtp::email-harvest-regex
    any:
      - id: micro-behaviors/communications/email/send/smtp::legacy-smtp-mass-mailer
      - id: micro-behaviors/communications/email/send/smtp::smtp-ssl-mail-exfil
      - id: micro-behaviors/communications/email/send/direct::raw-smtp-protocol
  - id: raw-smtp-email-worm
    desc: Raw SMTP email worm propagation
    crit: hostile
    conf: 0.96
    all:
      - id: micro-behaviors/communications/email/send/direct::raw-smtp-protocol
      - id: micro-behaviors/communications/email/mime::mime-executable-attachment

traits:
  - id: csharp-vbs-mailitem-write
    desc: C# writes Outlook VBS mailer
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'WriteLine\("[^"]{0,40}CreateItem\(0\)'

  - id: csharp-starts-generated-vbs
    desc: C# starts generated VBS
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Process\.Start\("[^"]{0,80}\.vbs"\)'
