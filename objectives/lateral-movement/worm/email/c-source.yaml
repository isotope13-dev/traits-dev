# Direct SMTP mass-mailing worm in C source code
# Worms that implement their own SMTP engine and email harvesting
defaults:
  platforms: [windows]
  attack: T1566
composite_rules:
  - id: direct-smtp-mass-mailer
    desc: Direct SMTP mass-mailing worm
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/email/send/direct::direct-smtp-c-source
      - id: objectives/collection/email-harvest/
  - id: wab-direct-smtp-worm
    desc: WAB harvesting with direct SMTP sending
    crit: hostile
    conf: 0.97
    any:
      - id: objectives/collection/email-harvest::wab-registry-path
      - id: objectives/collection/email-harvest::wab-registry-path-rot13
    all:
      - id: micro-behaviors/communications/dns/lookup/mx::mx-list-function
