# PE compiled email worm propagation (e.g., VB6 mass-mailers)
defaults:
  platforms: [windows]
  for: [pe]
traits:
  - id: outlook-createitem-pe
    desc: Outlook CreateItem method in PE binary
    crit: component
    conf: 0.88
    if:
      type: text
      exact: CreateItem
  - id: outlook-recipients-pe
    desc: Outlook Recipients method in PE binary
    crit: component
    conf: 0.85
    if:
      type: text
      exact: Recipients
  - id: format-autotest-flag
    desc: Destructive format /autotest flag in binary
    crit: suspicious
    conf: 0.97
    attack: T1485
    mbc: E1485
    if:
      type: text
      substr: /q /autotest
composite_rules:
  - id: vb6-pe-outlook-mass-mailer
    desc: VB6 PE Outlook mass-mailing worm
    crit: hostile
    conf: 0.98
    attack: T1566
    all:
      - id: micro-behaviors/os/com/object::outlook-application-progid
      - id: metadata/binary/framework::vb6-runtime-dll
    any:
      - id: outlook-createitem-pe
      - id: outlook-recipients-pe
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: micro-behaviors/os/com/object::mapi-namespace-progid
    needs: 2
