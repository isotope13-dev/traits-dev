# PE compiled email worm propagation (e.g., VB6 mass-mailers)
defaults:
  platforms: [windows]
  for: [pe]

traits:
  - id: format-autotest-flag
    desc: Destructive format /autotest flag in binary
    crit: suspicious
    conf: 0.97
    attack: T1485
    mbc: E1485
    if:
      type: text
      substr: /q /autotest

composite_rules:
  - id: pe-mime-executable-worm
    desc: PE embeds executable email worm attachment
    crit: hostile
    conf: 0.97
    attack: T1566.001
    near_bytes: 8192
    all:
      - id: micro-behaviors/communications/email/mime::mime-executable-attachment-pe
      - id: objectives/command-and-control/backdoor/keywords::worm-marker
    any:
      - id: micro-behaviors/fs/file/copy::copyfile-a
      - id: micro-behaviors/process/create/exec::winexec
      - id: micro-behaviors/os/sysinfo/directories::get-system-directory
    needs: 2
  - id: vb6-pe-outlook-mass-mailer
    desc: VB6 PE Outlook mass-mailing worm
    crit: hostile
    conf: 0.98
    attack: T1566
    all:
      - id: micro-behaviors/os/com/object::outlook-application-progid
      - id: metadata/binary/framework::vb6-runtime-dll
    any:
      - id: micro-behaviors/communications/email/send/outlook::outlook-mailitem-create
      - id: micro-behaviors/os/com/object::filesystemobject-progid
      - id: micro-behaviors/os/com/object::mapi-namespace-access
    needs: 2
  - id: pe-smtp-zip-attachment-worm
    desc: PE sends ZIP attachments through direct SMTP
    crit: hostile
    conf: 0.98
    attack: T1566.001
    all:
      - id: micro-behaviors/communications/email/send/direct::pe-direct-smtp-client
      - id: micro-behaviors/communications/email/mime::mime-zip-attachment-pe
      - id: micro-behaviors/communications/http/ip-discovery::icanhazip
