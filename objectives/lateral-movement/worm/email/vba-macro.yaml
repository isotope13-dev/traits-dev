defaults:
  platforms: [windows]
  for: [vbs, text, oledoc, ooxml]
  attack: T1566.001

traits:
  - id: vba-outlook-mapi-address-loop
    desc: VBA loops Outlook address book
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'GetNameSpace\("MAPI"\)[\s\S]{0,260}AddressLists\.Count'

  - id: vba-mails-active-document
    desc: VBA mails active document
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'Attachments\.Add\s+ActiveDocument\.FullName[\s\S]{0,80}\.Send'

  - id: vba-disables-macro-security
    desc: VBA disables macro security
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'CommandBars\("Macro"\)[\s\S]{0,180}VirusProtection'

  - id: vba-normaltemplate-replication
    desc: VBA references NormalTemplate VBProject
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'NormalTemplate\.VBProject\.VBComponents'

  - id: vba-active-document-replication
    desc: VBA references ActiveDocument VBProject
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'ActiveDocument\.VBProject\.VBComponents'

  - id: vba-codemodule-insertlines
    desc: VBA inserts lines into code module
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'CodeModule\.InsertLines\s+[A-Za-z0-9_]+,\s*[A-Za-z0-9_]+\.CodeModule\.Lines'

composite_rules:
  - id: vba-word-outlook-mail-worm
    desc: VBA Word macro mails active document
    crit: hostile
    conf: 0.98
    all:
      - id: vba-outlook-mapi-address-loop
      - id: vba-mails-active-document
    any:
      - id: vba-disables-macro-security
      - id: vba-normaltemplate-replication
      - id: vba-active-document-replication

  - id: vba-word-template-infector
    desc: VBA Word template infector
    crit: hostile
    conf: 0.98
    all:
      - id: vba-normaltemplate-replication
      - id: vba-active-document-replication
      - id: vba-codemodule-insertlines
    any:
      - id: vba-disables-macro-security
      - id: vba-mails-active-document
