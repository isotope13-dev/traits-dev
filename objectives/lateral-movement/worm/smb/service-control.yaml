defaults:
  platforms: [windows]
  for: [pe, dll, c, cpp]
  attack: T1021.002
traits:
- id: scm-wormlet-vocabulary--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.96
  count_min: 3
  if:
    type: text
    regex: \b(scm_wormlet|scm_copy_payload)\b
- id: scm-wormlet-vocabulary--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.96
  count_min: 3
  if:
    type: text
    regex: \b(propagate_system|install_worm)\b
- id: scm-wormlet-vocabulary--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.96
  count_min: 3
  if:
    type: text
    regex: \b(start_worm|worm_install_failure_action)\b
- id: admin-share-service-drop
  desc: Admin share service drop path
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: (?i)\\\\[^\\]{1,80}\\(ADMIN\$|C\$)\\.{0,120}\.(exe|dll|sys)\b
composite_rules:
- id: smb-scm-service-worm
  desc: SMB SCM service worm
  crit: hostile
  conf: 0.98
  all:
  - id: scm-wormlet-vocabulary
  any:
  - id: admin-share-service-drop
  - id: objectives/lateral-movement/smb::smb-share-propagation-primitives
  - id: micro-behaviors/os/service/control::service-admin-import-cluster
  - id: objectives/persistence/system/service/install::create-service-api
  needs: 1
- id: scm-wormlet-vocabulary
  desc: SCM wormlet propagation vocabulary
  crit: suspicious
  conf: 0.96
  any:
  - id: scm-wormlet-vocabulary--rx-1
  - id: scm-wormlet-vocabulary--rx-2
  - id: scm-wormlet-vocabulary--rx-3
  needs: 1
