defaults:
  platforms: [windows]
  for: [lua]
  attack: T1021.002

composite_rules:
  - id: lua-smb-share-worm-propagation
    desc: Lua SMB share worm propagation
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/network/share::lua-hex-net-use-command
      - id: micro-behaviors/process/create/shell/hex::lua-hex-encoded-copy-command
      - id: micro-behaviors/os/network/share::lua-admin-share-path
    any:
      - id: micro-behaviors/os/network/share::lua-hex-net-view-command
      - id: micro-behaviors/os/network/share::lua-wmic-logicaldisk-command
