defaults:
  for: [c, cpp]
  platforms: [windows]
composite_rules:
  - id: smb-user-enum-bruteforce
    desc: SMB null session user probing
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/service/remote::net-user-enum-source
      - id: micro-behaviors/os/service/remote::ipc-null-session-path
    any:
      - id: micro-behaviors/os/service/remote::wnet-add-connection2-source
      - id: objectives/lateral-movement/smb::smb-share-propagation-primitives
  - id: smb-worm-propagation
    desc: SMB worm propagation and execution
    crit: hostile
    conf: 0.99
    attack: "T1021.002,T1105,T1053.005"
    mbc: "OB0004"
    all:
      - id: micro-behaviors/os/service/remote::wnet-add-connection2-source
      - id: micro-behaviors/os/service/remote::net-schedule-job-add-source
      - id: objectives/lateral-movement/smb::local-payload-stager
    any:
      - id: objectives/lateral-movement/smb::remote-drop-or-enum
