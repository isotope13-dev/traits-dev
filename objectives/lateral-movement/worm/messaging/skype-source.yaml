defaults:
  platforms: [windows]
  for: [c, cpp]
composite_rules:
  - id: skype-im-worm-source
    desc: Skype IM worm propagation
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/channel/messaging::skype-contact-enumeration
      - id: objectives/command-and-control/channel/messaging::skype-url-message-delivery
    any:
      - id: objectives/command-and-control/channel/messaging::skype-client-launch
      - id: objectives/command-and-control/channel/messaging::skype-authorization-prompt
      - id: micro-behaviors/process/terminate/kill::exit-process-source
