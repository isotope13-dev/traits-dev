defaults:
  platforms: [windows]
  for: [vbs]

traits:
  - id: skype4com-object
    desc: Skype4COM automation object
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'CreateObject\("Skype4com\.Skype"'

  - id: skype-friends-message-loop
    desc: Skype friends message loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'For Each [A-Za-z]+ In Skype\.Friends[\s\S]{0,160}Skype\.SendMessage'

composite_rules:
  - id: skype4com-friends-spam
    desc: Skype4COM messages all friends
    crit: hostile
    conf: 0.97
    all:
      - id: skype4com-object
      - id: skype-friends-message-loop

  - id: skype-im-worm-source
    desc: Skype IM worm propagation
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/command-and-control/channel/messaging::skype-contact-enumeration
      - id: objectives/command-and-control/channel/messaging::skype-url-message-delivery
    any:
      - id: objectives/command-and-control/channel/messaging::skype-client-launch
      - id: objectives/command-and-control/channel/messaging::skype-authorization-prompt
      - id: micro-behaviors/process/terminate/kill::exit-process-source
