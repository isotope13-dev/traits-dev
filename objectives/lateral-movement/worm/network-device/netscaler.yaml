defaults:
  platforms: [netscaler, appliance, unix]
  for: [scripts, binaries, go, java, kotlin, csharp, swift]
  attack: T1210

traits:
  - id: netscaler-nitro-config-api
    desc: NetScaler NITRO config API
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /nitro/v1/config

  - id: netscaler-nitro-cli-script
    desc: NetScaler NITRO CLI script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /nitro/v1/config/cli_script

  - id: netscaler-nitro-fileupload
    desc: NetScaler NITRO file upload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /nitro/v1/config/fileupload

  - id: netscaler-responder-policy-api
    desc: NetScaler responder policy API
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /nitro/v1/config/responderpolicy

  - id: netscaler-worm-spread-api
    desc: NetScaler worm spread API
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '/api/v1/worm/(spread|status)'

composite_rules:
  - id: netscaler-nitro-delivery
    desc: NetScaler NITRO payload delivery
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-nitro-config-api
    any:
      - id: netscaler-nitro-cli-script
      - id: netscaler-nitro-fileupload
      - id: netscaler-responder-policy-api

  - id: netscaler-api-worm-spread
    desc: NetScaler API worm spread
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-worm-spread-api
    any:
      - id: netscaler-nitro-config-api
