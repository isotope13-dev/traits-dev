defaults:
  platforms: [iosxe, appliance, windows]
  for: [ruby, batch]
  attack: T1021.004

traits:
  - id: iosxe-cdp-lldp-neighbor-discovery
    desc: IOS-XE CDP/LLDP neighbor discovery
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(show cdp neighbors|show lldp neighbors|Cisco-IOS-XE-(cdp|lldp))'

  - id: iosxe-bootflash-self-copy
    desc: IOS-XE bootflash self-copy
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(scp|copy tftp://)[\s\S]{0,120}bootflash:'

  - id: iosxe-neighbor-backdoor-user
    desc: IOS-XE neighbor backdoor user
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ssh [^''"\n]{0,120}username [A-Za-z0-9_.-]{1,32} privilege 15 secret'

composite_rules:
  - id: iosxe-neighbor-worm-propagation
    desc: IOS-XE neighbor worm propagation
    crit: hostile
    conf: 0.97
    all:
      - id: iosxe-cdp-lldp-neighbor-discovery
    any:
      - id: iosxe-bootflash-self-copy
      - id: iosxe-neighbor-backdoor-user
      - id: objectives/persistence/system/network-appliance::iosxe-priv15-user
