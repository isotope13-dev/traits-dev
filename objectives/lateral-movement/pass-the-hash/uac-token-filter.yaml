# Disabling LocalAccountTokenFilterPolicy to enable Pass-the-Hash from any
# local administrator (not just RID 500). Setting this DWORD to 1 under
# HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System removes
# UAC remote token filtering, letting attackers reuse hashed creds for any
# local admin account over WMI/SMB/WinRM. Observed in SHADOW-EARTH-053.
defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell, csharp]
  attack: T1550.002
  mbc: E1078
traits:
  - id: localaccount-token-filter-name
    desc: LocalAccountTokenFilterPolicy registry value
    crit: notable
    conf: 0.95
    if:
      type: text
      word: LocalAccountTokenFilterPolicy
  - id: localaccount-token-filter-set
    desc: LocalAccountTokenFilterPolicy set to 1
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: 'LocalAccountTokenFilterPolicy.{0,80}(/d\s+1\b|=\s*1\b|dword:0+1\b)'
composite_rules:
  - id: uac-remote-token-filter-disabled
    desc: UAC remote token filter disabled (PtH)
    crit: hostile
    conf: 0.97
    any:
      - id: localaccount-token-filter-set
      - id: localaccount-token-filter-name
