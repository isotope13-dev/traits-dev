defaults:
  platforms: [freebsd, unix, windows]
  for: [c, cpp, elf, pe]
  attack: T1550.002

traits:
  - id: native-ntlmssp-auth-marker
    desc: Native NTLMSSP auth marker
    crit: suspicious
    conf: 0.94
    if:
      # Crafted on-wire NTLMSSP message header: "NTLMSSP\0" signature followed by
      # a little-endian MessageType (1=Negotiate, 2=Challenge, 3=Authenticate).
      # Hand-built PtH tools embed these message bytes; benign NTLM clients
      # (openvpn/rpcclient/proxy auth) only carry the bare library signature string.
      type: hex
      section: data
      pattern: 4E 54 4C 4D 53 53 50 00 (01|02|03) 00 00 00

  - id: native-ntlm-hmac-md5
    desc: Native NTLM HMAC-MD5 response
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'HMAC[\s\S]{0,80}EVP_md5|EVP_md5[\s\S]{0,80}HMAC'

  - id: native-smb-445-target-port
    desc: Native SMB target port 445
    crit: component
    conf: 0.9
    if:
      type: text
      substr: TARGET_PORT = 445

  - id: native-pass-the-hash-status
    desc: Native pass-the-hash status text
    crit: component
    conf: 0.95
    if:
      type: text
      substr: Pass-the-hash

composite_rules:
  - id: native-ntlm-pass-the-hash
    desc: Native NTLM pass-the-hash attempt
    crit: hostile
    conf: 0.98
    all:
      - id: native-ntlmssp-auth-marker
      - id: native-ntlm-hmac-md5
    any:
      - id: native-smb-445-target-port
      - id: native-pass-the-hash-status
