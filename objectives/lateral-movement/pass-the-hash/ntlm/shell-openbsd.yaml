defaults:
  platforms: [openbsd, bsd, unix]
  for: [shell]
  attack: T1550.002
  mbc: E1550

traits:
  - id: shell-ntlmssp-probe-bytes
    desc: Shell writes NTLMSSP probe bytes
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: "\\xffSMBNTLMSSP\\x00"

  - id: shell-smb-port-probe
    desc: Shell probes SMB port 445
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\bnc\s+[^#\n]{0,80}\s445\b'

composite_rules:
  - id: shell-ntlm-pass-the-hash-probe
    desc: Shell NTLM pass-the-hash probe
    crit: hostile
    conf: 0.98
    all:
      - id: shell-ntlmssp-probe-bytes
      - id: shell-smb-port-probe

