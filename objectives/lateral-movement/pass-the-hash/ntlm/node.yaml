defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1550.002
  mbc: B0030
traits:
  - id: node-ntlm-md4-hash
    desc: Node computes NTLM MD4 hash
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: crypto.createHash
      arg:
        kind: string
        exact: md4
  - id: node-ntlm-auth-payload
    desc: Node builds NTLM auth payload
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'ntlm(Type1|_type1_sent)|NTLMSSP'
  - id: node-pth-report-marker
    desc: Pass-the-hash report marker
    crit: component
    conf: 0.95
    if:
      type: literal
      kind: string
      regex: 'pass_the_hash|lateral_movement_pass_the_hash|/api/pth'
  - id: node-auth-port-sweep
    desc: Auth service port sweep
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\[\s*445\s*,\s*139\s*,\s*389\s*,\s*636\s*,\s*88\s*,\s*80\s*,\s*443\s*\]'
composite_rules:
  - id: node-pass-the-hash-auth-attempt
    desc: Node pass-the-hash authentication attempt
    crit: hostile
    conf: 0.98
    all:
      - id: node-ntlm-md4-hash
      - id: node-ntlm-auth-payload
      - id: node-pth-report-marker
      - id: micro-behaviors/communications/socket/connect::net-create-connection-call
    any:
      - id: node-auth-port-sweep
      - id: micro-behaviors/communications/http/post::post
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/library/structure/
