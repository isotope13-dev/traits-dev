defaults:
  platforms: [openbsd, bsd, unix]
  for: [kotlin, class]
  attack: T1550.002

traits:
  - id: kotlin-pth-client-banner
    desc: Kotlin pass-the-hash banner
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: SSH-2.0-PassTheHash

  - id: kotlin-pth-auth-payload
    desc: Kotlin pass-the-hash auth payload
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: AUTH|$key|$value

composite_rules:
  - id: kotlin-ssh-pass-the-hash-replay
    desc: Kotlin SSH pass-the-hash replay
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-pth-client-banner
      - id: kotlin-pth-auth-payload

