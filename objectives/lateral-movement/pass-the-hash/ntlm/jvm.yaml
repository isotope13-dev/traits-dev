defaults:
  platforms: [unix, appliance, windows]
  for: [java, kotlin, class, java_class, jar]
  attack: T1550.002

traits:
  - id: ntlmssp-negotiate-marker
    desc: NTLMSSP negotiate marker
    crit: suspicious
    conf: 0.94
    for: [java, kotlin, class, java_class, jar, python, pyc]
    if:
      type: text
      substr: NTLMSSP

  - id: jvm-smb-hash-replay-ports
    desc: JVM SMB hash replay ports
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'port 445[\s\S]{0,220}port 139|445[\s\S]{0,120}NetBIOS'

  - id: jvm-shadow-hash-material
    desc: JVM shadow hash material
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,220}/etc/passwd'

composite_rules:
  - id: jvm-smb-hash-replay
    desc: JVM SMB hash replay
    crit: hostile
    conf: 0.98
    all:
      - id: ntlmssp-negotiate-marker
      - id: jvm-smb-hash-replay-ports
      - id: jvm-shadow-hash-material
