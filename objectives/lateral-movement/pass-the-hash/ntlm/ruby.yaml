defaults:
  platforms: [junos, appliance, unix]
  for: [ruby]
  attack: T1550.002
  mbc: B0030

traits:
  - id: ruby-ntlmssp-message-builder
    desc: Ruby builds NTLMSSP messages
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'def ntlm_type[13]_message[\s\S]{0,360}NTLMSSP\\0'

  - id: ruby-lm-nt-hash-fields
    desc: Ruby LM and NT hash fields
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '\b(lm_hash|nt_hash|lm_hash_hex|nt_hash_hex)\b'
    count_min: 4

  - id: ruby-ntlm-smb-ports
    desc: Ruby NTLM over SMB ports
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '\[\s*445\s*,\s*139\s*\][\s\S]{0,180}attempt_ntlm_auth'

  - id: ruby-pass-the-hash-status
    desc: Ruby pass-the-hash status text
    crit: component
    conf: 0.94
    if:
      type: text
      regex: 'pass-the-hash|PT-H SUCCESS'

composite_rules:
  - id: ruby-ntlm-pass-the-hash
    desc: Ruby NTLM pass-the-hash
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-ntlmssp-message-builder
      - id: ruby-lm-nt-hash-fields
      - id: ruby-ntlm-smb-ports
    any:
      - id: ruby-pass-the-hash-status
      - id: micro-behaviors/communications/socket/connect::ruby-socket-connect
