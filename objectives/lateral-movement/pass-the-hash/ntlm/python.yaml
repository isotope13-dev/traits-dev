defaults:
  platforms: [unix, appliance, windows]
  for: [python, pyc]
  attack: T1550.002

traits:
  - id: python-shadow-hash-harvest
    desc: Python shadow hash harvest
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,220}/etc/master\.passwd'

  - id: python-master-passwd-path
    desc: Python BSD master.passwd path marker
    crit: component
    conf: 0.92
    if:
      type: text
      substr: /etc/master.passwd

  - id: python-pass-hash-text
    desc: Python pass-the-hash text
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: pass-the-hash
    not:
      - substr: not vulnerable to pass-the-hash
    unless:
      - id: well-known/lib/requests-ntlm::requests-ntlm-library-context
      - id: metadata/file/profile/identity::generated-attack-map-context

      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: python-smb-445-target
    desc: Python SMB 445 target
    crit: suspicious
    conf: 0.91
    for: [python]
    if:
      type: text
      regex: 'port = 445[\s\S]{0,220}sock\.connect'

composite_rules:
  - id: python-ntlm-pass-the-hash
    desc: Python NTLM pass-the-hash
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/security/auth/ntlm::ntlmssp-marker
      - id: python-pass-hash-text
    any:
      - id: python-shadow-hash-harvest
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: python-master-passwd-path
      - id: python-smb-445-target
