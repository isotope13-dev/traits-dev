defaults:
  platforms:
    - unix
  for:
    - elf
  attack: T1550.002
  mbc: C0027
traits:
  - id: smbhash-format-hint
    desc: SMBHASH LM NTLM format hint
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: SMBHASH="_LM_HASH_:_NTLM_HASH_"
  - id: hash-pass-substitution
    desc: User supplied hash substitution string
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: HASH PASS:\s+Substituting user supplied (NTLM|LM) HASH
      section: .rodata
  - id: samba-hook-init
    desc: Samba hook constructor export
    crit: suspicious
    conf: 0.98
    if:
      type: symbol
      exact: pth_samba_init
composite_rules:
  - id: samba-pass-the-hash-library
    desc: Samba pass the hash library
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/env/vars/credentials::smbhash
      - id: well-known/app/samba::samba-md4-hash-export
      - id: well-known/app/samba::samba-des-hash-export
      - id: samba-hook-init
    any:
      - id: hash-pass-substitution
      - id: smbhash-format-hint
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: micro-behaviors/os/env/vars/access::getenv
