# Samba Pass-the-Hash
# Detects Linux shared libraries that hook Samba authentication routines and
# accept NTLM/LM material through the SMBHASH environment variable.
defaults:
  platforms: [linux, unix]
  for: [elf]
  attack: "T1550.002"
  mbc: "C0027"
traits:
  - id: smbhash-format-hint
    desc: SMBHASH LM NTLM format hint
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: 'SMBHASH="_LM_HASH_:_NTLM_HASH_"'
  - id: hash-pass-substitution
    desc: User supplied hash substitution string
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: 'HASH PASS:\s+Substituting user supplied (NTLM|LM) HASH'
      section: .rodata
  - id: samba-auth-hook-md4
    desc: Samba MD4 auth hook export
    crit: notable
    conf: 0.98
    if:
      type: symbol
      exact: "E_md4hash"
  - id: samba-auth-hook-des
    desc: Samba DES auth hook export
    crit: notable
    conf: 0.98
    if:
      type: symbol
      exact: "E_deshash"
  - id: samba-hook-init
    desc: Samba hook constructor export
    crit: notable
    conf: 0.98
    if:
      type: symbol
      exact: "pth_samba_init"
composite_rules:
  - id: samba-auth-hook-exports
    desc: Samba authentication hook exports
    crit: suspicious
    conf: 0.98
    all:
      - id: samba-auth-hook-md4
      - id: samba-auth-hook-des
  - id: samba-pass-the-hash-library
    desc: Samba pass the hash library
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/env/vars/credentials::smbhash
      - id: samba-auth-hook-exports
      - id: samba-hook-init
    any:
      - id: hash-pass-substitution
      - id: smbhash-format-hint
      - id: micro-behaviors/dylib/lookup::dlsym-symbol
      - id: micro-behaviors/os/env/vars::getenv
