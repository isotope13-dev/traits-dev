defaults:
  platforms: [openwrt, windows]
  for: [csharp, pe, dll]
  attack: T1021.004
traits:
  - id: dotnet-ssh-lateral-method
    desc: .NET SSH lateral method name
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: SSHLateralMovement
  - id: csharp-ssh-lateral-label
    desc: C# SSH probe log label
    crit: notable
    conf: 0.88
    for: [csharp]
    if:
      type: text
      substr: "[ssh] attempting ssh auth"
  - id: csharp-ssh-version-token
    desc: C# SSH protocol version
    crit: notable
    conf: 0.86
    for: [csharp]
    if:
      type: text
      substr: SSH-2.0
  - id: csharp-ssh-client-options
    desc: C# OpenSSH client options
    crit: notable
    conf: 0.9
    for: [csharp]
    if:
      type: text
      regex: 'ssh\s+-o\s+BatchMode=yes'
composite_rules:
  - id: dotnet-ssh-lateral-marker
    desc: .NET SSH lateral marker
    crit: notable
    conf: 0.9
    any:
      - id: dotnet-ssh-lateral-method
      - id: csharp-ssh-lateral-label
  - id: dotnet-ssh-protocol-marker
    desc: .NET SSH protocol marker
    crit: notable
    conf: 0.88
    any:
      - id: micro-behaviors/communications/ssh/client::ssh-version
      - id: csharp-ssh-version-token
  - id: dotnet-ssh-lateral-probe
    desc: .NET SSH lateral probe
    crit: hostile
    conf: 0.97
    all:
      - id: dotnet-ssh-lateral-marker
      - id: dotnet-ssh-protocol-marker
    any:
      - id: csharp-ssh-client-options
      - id: micro-behaviors/communications/socket/create::dotnet-tcpclient-channel
      - id: micro-behaviors/communications/socket/create::tcpclient-connect
      - id: micro-behaviors/process/create/spawn::dotnet-redirected-stdio
      - id: micro-behaviors/process/create/spawn::start
      - id: micro-behaviors/process/create/spawn::start-info
