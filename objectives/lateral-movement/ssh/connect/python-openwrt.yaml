defaults:
  platforms: [openwrt]
  for: [python, pyc]
  attack: T1021.004

traits:
  - id: python-ssh-batch-mode-option
    desc: Python SSH BatchMode option
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: BatchMode=yes
  - id: python-ssh-root-target
    desc: Python SSH root target command
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'root@|username"\)\s*@|user}@'
  - id: python-ssh-identity-option
    desc: Python SSH identity-file option
    crit: notable
    conf: 0.86
    if:
      type: text
      # `-i` is also a common argparse flag (for example, --interactive).
      # Require SSH tooling or the SSH-specific IdentityFile option so an
      # unrelated command-line parser is not labeled as lateral movement.
      regex: '(?i)(ssh.{0,80}-i|-i.{0,80}ssh|IdentityFile)'
    unless:
      - id: metadata/library/python-stdlib
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - type: path
        regex: '(^|[/\\])pydoc_data[/\\]'

composite_rules:
  - id: python-ssh-key-lateral-probe
    desc: Python SSH key lateral probe
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/ssh/client::strict-host-disable
      - id: python-ssh-identity-option
    any:
      - id: python-ssh-batch-mode-option
      - id: python-ssh-root-target
      - id: objectives/lateral-movement/ssh/connect::connect-timeout
    needs: 2
