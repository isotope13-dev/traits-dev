defaults:
  platforms: [openwrt]
  for: [python, pyc]
  attack: T1021.004

traits:
  - id: python-ssh-root-target
    desc: Python SSH root target command
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'root@|username"\)\s*@|user}@'
  - id: python-ssh-identity-option
    desc: Python SSH command uses identity-file option
    crit: notable
    conf: 0.86
    if:
      type: text
      # Match an option on an actual subprocess SSH command. A loose
      # `ssh...-i` search fires on prose such as "SSH build ... idle".
      regex: '(?i)subprocess.{0,100}["'']ssh["''].{0,60}["'']-i["'']'
    unless:
      - id: metadata/library/python-stdlib
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
      - type: path
        regex: '(^|[/\\])pydoc_data[/\\]'

composite_rules:
  - id: python-ssh-key-lateral-probe
    desc: Python SSH key lateral probe
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/ssh/client::strict-host-disable
      - id: python-ssh-identity-option
    any:
      - id: micro-behaviors/communications/ssh/client::ssh-batch-mode-option
      - id: python-ssh-root-target
      - id: objectives/lateral-movement/ssh/connect::connect-timeout
    needs: 2
