defaults:
  platforms: [unix, fortios]
  for: [lua]
  attack: T1021.004

traits:
  - id: lua-ssh-default-user-loop
    desc: Lua SSH default-user loop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'ssh -o StrictHostKeyChecking=no[\s\S]{0,220}(root|admin|fortinet|fortios)@'

