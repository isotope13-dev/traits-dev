defaults:
  platforms: [unix, openwrt]
  for: [lua]
  attack: T1021.004

traits:
  - id: lua-ssh-root-target-command
    desc: Lua SSH root target command
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bssh\s+.{0,160}root@'
  - id: lua-ssh-batch-mode-option
    desc: Lua SSH BatchMode option
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: BatchMode=yes

composite_rules:
  - id: lua-ssh-key-lateral-probe
    desc: Lua SSH key lateral probe
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
      - id: micro-behaviors/communications/ssh/client::strict-host-disable
    any:
      - id: lua-ssh-root-target-command
      - id: lua-ssh-batch-mode-option
      - id: objectives/lateral-movement/ssh/connect::connect-timeout
    needs: 2
