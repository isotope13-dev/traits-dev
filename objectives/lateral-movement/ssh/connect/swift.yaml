defaults:
  platforms: [esxi, unix]
  for: [swift]
  attack: T1021.004

traits:
  - id: swift-ssh-binary-path
    desc: Swift SSH binary path
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '"/(usr/bin|bin|usr/lib/vmware/openssh/bin)/ssh"'

composite_rules:
  - id: swift-ssh-lateral-command
    desc: Swift SSH lateral command
    crit: hostile
    conf: 0.97
    all:
      - id: swift-ssh-binary-path
      - id: objectives/credential-access/ssh/key::swift-ssh-hostkey-disabled
    any:
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/os/sysinfo/platform/kernel::uname
