defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1021.004

traits:
  - id: native-ssh-batch-no-hostcheck
    desc: Native SSH hostcheck disabled
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'ssh -o StrictHostKeyChecking=no[\s\S]{0,120}(BatchMode=yes|ConnectTimeout=)'

  - id: native-scp-sensitive-copy
    desc: Native SCP sensitive copy
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'scp -o StrictHostKeyChecking=no[\s\S]{0,160}/etc/(passwd|shadow)'

composite_rules:
  - id: native-ssh-sensitive-file-copy
    desc: Native SSH sensitive copy
    crit: hostile
    conf: 0.98
    all:
      - id: native-ssh-batch-no-hostcheck
      - id: native-scp-sensitive-copy
