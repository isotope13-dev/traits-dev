defaults:
  platforms: [unix]
  for: [class, jar]
  attack: T1021.004

traits:
  - id: jvm-ssh-admin-target
    desc: JVM SSH command targets admin account
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '\bssh(\.exe)?\s+[^\r\n]{0,120}\badmin@[^ \r\n]{4,120}'
    unless:
      - id: well-known/app/civicrm/
      - id: well-known/app/gitea::wolfi-gitea-package

composite_rules:
  - id: jvm-ssh-lateral-admin
    desc: JVM SSH lateral admin
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/lateral-movement/worm/ssh-http::java-ssh-stricthostkey-disabled
      - id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
      - id: jvm-ssh-admin-target
