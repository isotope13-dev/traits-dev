defaults:
  platforms: [unix]
  for: [class, jar]
  attack: T1021.004

traits:
  - id: jvm-ssh-admin-target
    desc: JVM SSH admin target
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: 'admin@[^ \r\n]{4,160}'

composite_rules:
  - id: jvm-ssh-lateral-admin
    desc: JVM SSH lateral admin
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/lateral-movement/worm/ssh-http::java-ssh-stricthostkey-disabled
      - id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
      - id: jvm-ssh-admin-target
