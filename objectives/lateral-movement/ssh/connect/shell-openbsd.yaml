defaults:
  platforms: [openbsd, bsd, unix]
  for: [shell]
  attack: T1021.004

traits:
  - id: shell-ssh-harvested-key-paths
    desc: Shell iterates SSH private keys
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'for\s+\w+\s+in\s+[^#\n]{0,120}\.ssh/id_(rsa|ed25519|ecdsa)(["''\s]|$)'

  - id: shell-ssh-key-auth-command
    desc: Shell SSH key auth command
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\bssh\s+-i\s+["$A-Za-z_{][^#\n]{0,120}BatchMode=yes'

  - id: shell-ssh-root-target
    desc: Shell SSH root target login
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'root@["{][$A-Za-z_][A-Za-z0-9_}]*'

composite_rules:
  - id: shell-harvested-key-ssh-lateral
    desc: Shell reuses SSH keys laterally
    crit: hostile
    conf: 0.98
    all:
      - id: shell-ssh-harvested-key-paths
      - id: shell-ssh-key-auth-command
    any:
      - id: shell-ssh-root-target
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
