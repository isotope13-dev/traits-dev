defaults:
  for: [scripts, binaries]
  platforms:
    - linux
    - unix
    - windows
    - macos
    - ios
    - android
traits:
  - id: ssh-attack-suffix
    desc: SSH attack function/variable (ssh_attack, ssh-attack,
    crit: notable
    conf: 0.8
    attack: T1021.004
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: '[Ss][Ss][Hh][_\-]?[Aa]ttack'
  - id: attack-ssh-prefix
    desc: Attack SSH function/variable (attack_ssh, attack-ssh,
    crit: notable
    conf: 0.8
    attack: T1021.004
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: '[Aa]ttack[_\-]?[Ss][Ss][Hh]'
  - id: ssh-boom
    desc: SSH boom function/variable reference
    crit: notable
    conf: 0.8
    attack: T1021.004
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: ssh[_\-]?boom
  - id: strict-host-disable
    desc: StrictHostKeyChecking reference (bypass host verification)
    crit: notable
    conf: 0.7
    attack: T1021.004
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      substr: StrictHostKeyChecking
    downgrade:
      any:
        - type: basename
          exact: ssh
        - type: basename
          exact: scp
        - type: basename
          exact: sftp
        - id: metadata/signed/platform::apple
  - id: known-hosts-bypass
    desc: UserKnownHostsFile reference (bypass known hosts)
    crit: notable
    conf: 0.75
    attack: T1021.004
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      substr: UserKnownHostsFile
    downgrade:
      any:
        - type: basename
          exact: ssh
        - type: basename
          exact: scp
        - type: basename
          exact: sftp
        - type: basename
          exact: remotectl
        - id: metadata/signed/platform::apple
  - id: connect-timeout
    desc: ConnectTimeout reference (scripted SSH)
    crit: notable
    conf: 0.6
    attack: T1021.004
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      exact: ConnectTimeout
  - id: key-pem
    desc: References .pem key file
    crit: notable
    conf: 0.6
    attack: T1552.004
    platforms:
      - unix
      - windows
    if:
      type: string_value
      regex: \.pem
    not:
      - exact: .pem
      - regex: (?i)temp\.pem
      - regex: (?i)keybinding\.pem
      - regex: (?i)ok_cert\.pem
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/legacy::chromium-junk-strings
  - id: key-identity-file
    desc: IdentityFile SSH config option
    crit: notable
    conf: 0.6
    attack: T1552.004
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      substr: IdentityFile
  - id: ssh-config-parse
    desc: Parses SSH config for hostnames
    crit: suspicious
    conf: 0.8
    attack: T1021.004
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      regex: grep.{0,30}HostName.{0,30}/\.ssh/config
  - id: ssh-shell-history
    desc: ssh with bash_history
    crit: notable
    conf: 0.7
    attack: T1021.004
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      regex: ssh.{2,64}bash_history
  - id: scp-shell-history
    desc: scp with bash_history
    crit: notable
    conf: 0.7
    attack: T1021.004
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      regex: scp.{2,64}bash_history
  - id: getent-hosts
    desc: Uses getent for host discovery
    crit: suspicious
    conf: 0.75
    attack: T1018
    platforms:
      - linux
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    if:
      type: string_value
      substr: getent ahostsv4
composite_rules:
  - id: attack-ref
    desc: SSH attack function/variable reference
    crit: suspicious
    conf: 0.9
    attack: T1021.004
    platforms:
      - unix
      - windows
    any:
      - id: ssh-attack-suffix
      - id: attack-ssh-prefix
      - id: ssh-boom
  - id: shell-history-ssh
    desc: Extracts SSH targets from shell
    crit: suspicious
    conf: 0.85
    attack: T1021.004
    platforms:
      - unix
    for:
      - shell
      - python
      - javascript
      - elf
    any:
      - id: ssh-shell-history
      - id: scp-shell-history
