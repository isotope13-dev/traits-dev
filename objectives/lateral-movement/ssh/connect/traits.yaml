defaults:
  for: [shell, python, javascript, elf, macho, pe]
  platforms:
    - linux
    - macos
    - windows
traits:
  - id: ssh-attack-suffix
    desc: "SSH attack func/var (ssh_attack, ssh-attack,"
    crit: suspicious
    conf: 0.8
    attack: T1021.004
    if:
      type: text
      regex: '[Ss][Ss][Hh][_\-]?[Aa]ttack'
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: attack-ssh-prefix
    desc: "Attack SSH func/var (attack_ssh, attack-ssh,"
    crit: suspicious
    conf: 0.8
    attack: T1021.004
    if:
      type: text
      regex: '[Aa]ttack[_\-]?[Ss][Ss][Hh]'
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: ssh-boom
    desc: SSH boom function/variable reference
    crit: suspicious
    conf: 0.8
    attack: T1021.004
    if:
      type: text
      regex: ssh[_\-]?boom
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: connect-timeout
    desc: ConnectTimeout token for SSH composites
    crit: component
    conf: 0.6
    attack: T1021.004
    platforms:
      - unix
    for: [scripts, binaries]
    if:
      type: text
      exact: ConnectTimeout
    unless:
      - type: path
        regex: '(^|[/\\])requests[/\\]'
  - id: key-pem
    desc: References .pem key file
    crit: suspicious
    conf: 0.6
    attack: T1552.004
    if:
      type: text
      regex: \.pem
    not:
      - exact: .pem
      - regex: (?i)temp\.pem
      - regex: (?i)keybinding\.pem
      - regex: (?i)ok_cert\.pem
    downgrade:
      any:
        - id: objectives/anti-static/obfuscation/string/junking/
  - id: ssh-config-parse
    desc: Parses SSH config for hostnames
    crit: suspicious
    conf: 0.8
    attack: T1021.004
    platforms:
      - unix
    for: [scripts, binaries]
    if:
      type: text
      regex: grep.{0,30}HostName.{0,30}/\.ssh/config
  - id: ssh-shell-history
    desc: SSH command references bash history
    crit: suspicious
    conf: 0.7
    attack: T1021.004
    platforms:
      - unix
    for: [scripts, binaries]
    if:
      type: text
      # Keep the command and its history path on one physical line.  A
      # dot-all match can join unrelated regex-catalog entries in defensive
      # scanners and report an SSH operation that is never executed.
      regex: '(?m)\bssh\s+[^\r\n]{2,64}\bbash_history\b'
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
  - id: scp-shell-history
    desc: SCP command references bash history
    crit: suspicious
    conf: 0.7
    attack: T1021.004
    platforms:
      - unix
    for: [scripts, binaries]
    if:
      type: text
      regex: '(?m)\bscp\s+[^\r\n]{2,64}\bbash_history\b'
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
composite_rules:
  - id: go-native-ssh-attack-client
    desc: Go client with SSH attack tasking
    crit: hostile
    conf: 0.98
    attack: T1110.001,T1021.004
    for: [elf]
    all:
      - id: ssh-attack-suffix
      - type: trait
        id: objectives/lateral-movement/brute-force/ssh::native-ssh-client-banner
      - type: trait
        id: micro-behaviors/communications/proxy/socks::socks4-string

  - id: attack-ref
    desc: SSH attack function/variable reference
    crit: suspicious
    conf: 0.9
    attack: T1021.004
    any:
      - id: ssh-attack-suffix
      - id: attack-ssh-prefix
      - id: ssh-boom
  - id: shell-history-ssh
    desc: Extracts SSH targets from shell
    crit: suspicious
    conf: 0.85
    attack: T1021.004
    platforms:
      - unix
    for: [scripts, binaries]
    any:
      - id: ssh-shell-history
      - id: scp-shell-history
