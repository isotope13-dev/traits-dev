defaults:
  platforms: [routeros, appliance, unix]
  for: [objc, elf]
  attack: T1021.004

traits:
  - id: objc-scp-root-temp-agent
    desc: ObjC scp root temp agent
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'scp -o StrictHostKeyChecking=no[\s\S]{0,180}root@%s:/tmp/'

  - id: objc-ssh-root-temp-exec
    desc: ObjC ssh root temp exec
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ssh -o StrictHostKeyChecking=no[\s\S]{0,220}chmod \+x /tmp/'

  - id: objc-ssh-port-sweep
    desc: ObjC SSH port sweep
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'checkSSHPort\(host, 22\)[\s\S]{0,120}checkSSHPort\(host, 2222\)'

composite_rules:
  - id: objc-ssh-agent-propagation
    desc: ObjC SSH agent propagation
    crit: hostile
    conf: 0.98
    all:
      - id: objc-scp-root-temp-agent
      - id: objc-ssh-root-temp-exec
      - id: objc-ssh-port-sweep
