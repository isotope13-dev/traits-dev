defaults:
  platforms: [netbsd, unix]
  for: [c, cpp, objc, elf]
  attack: T1021.004

traits:
  - id: native-scp-no-hostcheck
    desc: Native SCP disables host check
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'scp -o StrictHostKeyChecking=no[\s\S]{0,180}UserKnownHostsFile=/dev/null'

  - id: native-ssh-backdoor-script
    desc: Native SSH backdoor script
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/tmp/\.backdoor\.sh[\s\S]{0,260}/dev/tcp/'

  - id: native-authorized-key-backdoor
    desc: Native authorized key backdoor
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ssh-keygen -t rsa[\s\S]{0,320}authorized_keys'
  - id: native-backdoor-user-name
    desc: Native backdoor user name
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: svc_backup
    unless:
      - id: metadata/lang/source::linux-kernel-primary-tree-path
composite_rules:
  - id: native-scp-reverse-shell-deploy
    desc: Native SCP reverse shell deploy
    crit: hostile
    conf: 0.98
    all:
      - id: native-scp-no-hostcheck
      - id: native-ssh-backdoor-script

  - id: native-ssh-authorized-key-backdoor
    desc: Native SSH authorized key backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: native-authorized-key-backdoor
      - id: native-backdoor-user-name
