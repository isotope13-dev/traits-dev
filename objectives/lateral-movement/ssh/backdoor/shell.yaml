# SSH Lateral Movement Detection for Shell Scripts
# Detects shell scripts that spread via SSH to other hosts
# ATT&CK: T1021.004 (Remote Services: SSH), T1210 (Exploitation of Remote Services)
# MBC: B0040 (Lateral Movement)
defaults:
  platforms: [unix, android, ios]
  crit: suspicious
  attack: "T1021.004"
  mbc: "B0040"
  for: [shell]
traits:
  # === Known Hosts Harvesting ===
- id: known-hosts-ip-extract--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.90
  if:
    type: text
      # Extracts IP addresses from known_hosts
    regex: "grep\\s+-oE\\s*['\"]([^'\"\\n]{0,50}(\\d{1,3}\\.){3}\\d{1,3}[^'\"\\n]{0,50})['\"]\\s+known_hosts"
  count_max: 1029448
- id: known-hosts-ip-extract--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.90
  if:
    type: text
      # Extracts IP addresses from known_hosts
    regex: "awk\\s+['\"][^'\"\\n]{0,100}\\$1[^'\"\\n]{0,100}['\"]\\s+known_hosts"
  count_max: 1029449
  # === SSH Worm Spreading ===
- id: ssh-batch-mode
  desc: SSH batch mode for automation
  crit: notable
  conf: 0.85
  if:
    type: text
      # SSH options commonly used by worms
    regex: "ssh\\s+[^\\n]{0,50}-o\\s*(BatchMode=yes|StrictHostKeyChecking=no|ConnectTimeout=)"
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - type: path
    basename: true
    exact: rpostback-gitssh
  - type: text
    substr: GIT_SSH_COMMAND
  - type: path
    regex: '(^|[!/])modules/libfabric/fabtests/scripts/runfabtests\.sh$'
- id: ssh-spread-loop
  desc: SSH spreading loop pattern
  crit: suspicious
  conf: 0.95
  if:
    type: text
      # for h in $(grep ... known_hosts); do ssh $h pattern
    regex: "for\\s+\\w+\\s+in\\s+\\$\\([^)]{0,80}known_hosts[^)]{0,30}\\)[^;]{0,10};\\s*do\\s+ssh"
- id: ssh-curl-spread
  desc: SSH spreading with curl payload
  crit: suspicious
  conf: 0.95
  attack: "T1210"
  if:
    type: text
      # ssh $host 'curl URL | shell' pattern
    regex: "ssh\\s+[^']{0,50}'[^']{0,30}(curl|wget)[^']{0,50}\\|\\s*shell"
- id: known-hosts-ip-extract-cond-0--inline-29455
  desc: Regex component marker
  crit: notable
  conf: 0.90
  if:
    type: text
    substr: "~/.freerdp/known_hosts"
  # === SSH Key Detection ===
  count_max: 1029456
composite_rules:
  # Full SSH worm pattern: harvests hosts, has keys, spreads
  # Complexity: all(4) + for(1) = 5 >= 4 HOSTILE
- id: ssh-worm-spread
  desc: SSH worm spreading behavior
  crit: hostile
  conf: 0.95
  attack: "T1210"
  all:
  - id: micro-behaviors/fs/path/sensitive/credentials::ssh-known-hosts-read-command
  - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key-existence-check
  - id: ssh-batch-mode
  - id: micro-behaviors/communications/ssh/client::ssh-remote-command
  # SSH curl/wget dropper spread
  # Complexity: all(3) + for(1) = 4 >= 4 HOSTILE
- id: ssh-dropper-spread
  desc: SSH dropper spreading
  crit: hostile
  conf: 0.95
  attack: "T1210"
  all:
  - id: micro-behaviors/fs/path/sensitive/credentials::ssh-known-hosts-read-command
  - id: ssh-batch-mode
  - id: ssh-curl-spread
  # SSH spread loop detection
  # Complexity: all(2) + for(1) = 3 < 4, SUSPICIOUS
- id: ssh-loop-spread
  desc: SSH loop-based spreading
  crit: suspicious
  conf: 0.90
  attack: "T1210"
  all:
  - id: ssh-spread-loop
  - id: ssh-batch-mode
- id: known-hosts-ip-extract
  desc: Extracts IPs from known_hosts
  crit: suspicious
  conf: 0.90
  any:
  - id: known-hosts-ip-extract--rx-1
  - id: known-hosts-ip-extract--rx-2
  unless:
  - id: known-hosts-ip-extract-cond-0--inline-29455
