defaults:
  platforms:
    - unix
    - android
    - ios
  for:
    - elf
    - shell
traits:
  - id: sshd-config-path
    desc: SSH daemon configuration file
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: /etc/ssh/sshd_config
    downgrade:
      any:
        - type: text
          substr: UseDNS no
  - id: ssh-key-generation
    desc: SSH key generation pattern
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: ssh-keygen
    not:
      - substr: complete -c ssh-keygen
    attack: T1098.004
  - id: sshd-restart
    desc: SSH daemon restart or reload
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (systemctl restart sshd|service sshd restart|sshd -t|sshd\s+-t)
    attack: T1547.002
  - id: sshd-config-backup
    desc: SSH config backup pattern
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (sshd_config\.bak|sshd_config\.backup|sshd_config\.bak\.[0-9])
  - id: ssh-permit-root
    desc: PermitRootLogin configuration
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: PermitRootLogin
    attack: T1021.004
    downgrade:
      any:
        - type: text
          substr: PermitRootLogin no
  - id: ssh-password-auth
    desc: SSH password authentication
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: (PasswordAuthentication yes|PubkeyAuthentication no)
    unless:
      - id: metadata/package/testing/harness::is-test
    attack: T1021.004
  - id: ssh-port-config
    desc: SSH port configuration
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: (?m)(^|\n)\s*Port\s+[1-9][0-9]{1,4}\s*(#[^\n]{0,120})?($|\n)
  - id: trojan-password-macro
    desc: SSH trojan password comparison
    crit: suspicious
    conf: 0.98
    for: [c]
    if:
      type: text
      substr: strncmp(password,TROJAN_PASSWORD
    attack: T1021.004
  - id: hidden-ssh-log-path
    desc: Hidden SSH password log path
    crit: suspicious
    conf: 0.96
    for: [c]
    if:
      type: text
      substr: /usr/lib/libfl.so
    attack: T1564.001
  - id: source-port-trigger-bypass
    desc: Source port SSH backdoor trigger
    crit: suspicious
    conf: 0.92
    for: [c]
    if:
      type: text
      substr: REMOTE_TROJAN_PORT 31337
    attack: T1205
  - id: source-port-compare
    desc: SSH source port trigger compare
    crit: suspicious
    conf: 0.9
    for: [c]
    if:
      type: text
      substr: get_remote_port()==REMOTE_TROJAN_PORT
    attack: T1205
  - id: root-login-sumz-bypass
    desc: Root login bypass gate
    crit: suspicious
    conf: 0.92
    for: [c]
    if:
      type: text
      substr: options.permit_root_login == 0 && !SUMZ
    attack: T1021.004
  - id: root-login-sumz-check
    desc: SSH root login SUMZ check
    crit: suspicious
    conf: 0.9
    for: [c]
    if:
      type: text
      substr: options.permit_root_login == 1 && !SUMZ
    attack: T1021.004
  - id: server-password-log-write
    desc: SSH server password log write
    crit: suspicious
    conf: 0.94
    for: [c]
    if:
      type: text
      substr: 'fprintf(fp,"%s [%s]\n",user,password);'
    attack: T1556
  - id: client-password-log-write
    desc: SSH client password log write
    crit: suspicious
    conf: 0.94
    for: [c]
    if:
      type: text
      substr: 'fprintf(fp,"%s@%s [%s]\n",server_user,host,password);'
    attack: T1556
composite_rules:
  - id: ssh-config-modification
    desc: SSH daemon configuration modification
    crit: suspicious
    conf: 0.85
    attack: T1021.004
    needs: 2
    any:
      - id: sshd-config-path
      - id: sshd-restart
      - id: ssh-permit-root
      - id: ssh-password-auth
  - id: ssh-backdoor-installation
    desc: SSH backdoor installation
    crit: hostile
    conf: 0.9
    attack: T1098.004
    mbc: C0027
    all:
      - id: ssh-config-modification
      - id: objectives/credential-access/ssh/key::authorized-keys
  - id: ssh-key-theft
    desc: SSH credential harvesting
    crit: suspicious
    conf: 0.85
    attack: T1552.004
    near_lines: 40
    all:
      - id: ssh-key-generation
      - id: objectives/credential-access/ssh/key::private-key-material
  - id: ssh-password-harvest-source
    desc: SSH password harvesting backdoor source
    crit: hostile
    conf: 0.98
    attack: T1556
    for: [c]
    all:
      - id: hidden-ssh-log-path
    any:
      - id: server-password-log-write
      - id: client-password-log-write
  - id: source-port-stealth-backdoor
    desc: SSH source-port stealth backdoor
    crit: hostile
    conf: 0.98
    attack: T1021.004
    mbc: B0030
    for: [c]
    all:
      - id: trojan-password-macro
      - id: source-port-trigger-bypass
      - id: source-port-compare
      - id: root-login-sumz-bypass
      - id: root-login-sumz-check
  - id: trojanized-ssh-source
    desc: Trojanized SSH daemon source
    crit: hostile
    conf: 0.99
    attack: T1021.004
    mbc: B0030
    for: [c]
    all:
      - id: source-port-stealth-backdoor
      - id: ssh-password-harvest-source
