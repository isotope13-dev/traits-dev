defaults:
  platforms:
  - unix
  - android
  - ios
  for:
  - elf
  - shell
traits:
- id: ganeti-vcluster-qa-basename
  desc: Ganeti vcluster QA test basename
  crit: notable
  conf: 0.95
  if:
    type: path
    basename: true
    exact: vcluster-qa
- id: ssh-key-generation
  desc: SSH key generation pattern
  crit: notable
  conf: 0.75
  if:
    type: symbol
    kind: call
    exact: ssh-keygen
  attack: T1098.004
  unless:
  - type: text
    substr: run_rc_command
  - id: well-known/tool/sysadmin/container/
  - id: well-known/app/github-cli/
- id: sshd-restart
  desc: SSH daemon restart or reload
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: (systemctl restart sshd|service sshd restart|sshd -t|sshd\s+-t)
  unless:
  - type: text
    substr: run_rc_command
  - id: well-known/tool/sysadmin/automatedlab/
  - id: well-known/tool/sysadmin/alpine-packages::alpine-ansible-core-package
  attack: T1547.002
- id: sshd-config-backup
  desc: SSH config backup pattern
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: (sshd_config\.bak|sshd_config\.backup|sshd_config\.bak\.[0-9])
- id: ssh-permit-root
  desc: PermitRootLogin configuration
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: PermitRootLogin
  attack: T1021.004
  unless:
  - type: text
    regex: PermitRootLogin\s+(no|prohibit-password|without-password)
  - id: objectives/lateral-movement/ssh/backdoor-deploy/
  - id: well-known/tool/sysadmin/alpine-packages::alpine-ansible-core-package
  - id: metadata/file/profile/identity::ansible-python-package-path
  - type: text
    substr: install_pip
- id: ssh-password-auth
  desc: SSH password authentication
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: (PasswordAuthentication yes|PubkeyAuthentication no)
  unless:
  - id: metadata/package/testing/
  - id: objectives/lateral-movement/ssh/backdoor-deploy/
  - id: well-known/tool/sysadmin/automatedlab/
  attack: T1021.004
- id: sshd-config-sed-edit
  desc: SSH config edited with sed
  crit: suspicious
  conf: 0.9
  for: [shell]
  if:
    type: text
    regex: 'sed\s+-i.{0,80}/etc/ssh/sshd_config'
  attack: T1021.004
  unless:
  - id: objectives/lateral-movement/ssh/backdoor-deploy/
- id: sshd-disabled-root-login-token
  desc: SSH disabled root-login token
  crit: component
  conf: 0.9
  for: [shell]
  if:
    type: text
    regex: 'PermitRootLogin\s+(no|prohibit-password|without-password)'
- id: sshd-enabled-root-login-token
  desc: SSH enabled root-login token
  crit: notable
  conf: 0.9
  for: [shell]
  if:
    type: text
    substr: PermitRootLogin yes
  unless:
  - type: text
    substr: install_pip
  - id: metadata/file/profile/identity::ansible-python-package-path
  - id: well-known/app/openssh/
- id: vm-image-build-context--rx-2
  desc: Regex component marker
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: '\b(vm_extra_pre_umount|metalog_add_data)\b'
  count_max: 1029674
- id: vm-image-build-context--rx-3
  desc: Regex component marker
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: '\b(\$\{?DESTDIR\}?/etc|^#cloud-config\b)\b'
  count_max: 1029675
- id: vm-image-build-context--rx-4
  desc: Regex component marker
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: '\b(cloud_config_modules|NANO_[A-Z_]+)\b'
  count_max: 1029676
- id: ssh-port-config
  desc: SSH port configuration
  crit: suspicious
  conf: 0.6
  if:
    type: text
    regex: (?m)(^|\n)\s*Port\s+[1-9][0-9]{1,4}\s*(#[^\n]{0,120})?($|\n)
- id: trojan-password-macro
  desc: SSH trojan password comparison
  crit: suspicious
  conf: 0.98
  for: [c]
  if:
    type: text
    substr: strncmp(password,TROJAN_PASSWORD
  attack: T1021.004
- id: hidden-ssh-log-path
  desc: Hidden SSH password log path
  crit: suspicious
  conf: 0.96
  for: [c]
  if:
    type: text
    substr: /usr/lib/libfl.so
  attack: T1564.001
- id: hidden-ssh-agent-dir
  desc: Hidden SSH agent temp directory
  crit: suspicious
  conf: 0.9
  platforms: [openwrt]
  for: [c, cpp, objc, elf, shell]
  if:
    type: text
    substr: /tmp/.ssh_agent
- id: source-ssh-keygen-command
  desc: Source ssh-keygen command
  crit: suspicious
  conf: 0.9
  platforms: [openwrt]
  for: [c, cpp, objc]
  if:
    type: text
    regex: 'ssh-keygen\s+-t\s+(rsa|ecdsa|ed25519|dsa)'
- id: ssh-copy-id-root-target
  desc: ssh-copy-id to root target
  crit: suspicious
  conf: 0.9
  platforms: [openwrt]
  for: [c, cpp, objc, elf, shell]
  if:
    type: text
    regex: 'ssh-copy-id[^"''\n]{0,120}root@'
- id: ssh-scp-backdoor-script
  desc: SCP backdoor script to target
  crit: suspicious
  conf: 0.9
  platforms: [openwrt]
  for: [c, cpp, objc, elf, shell]
  if:
    type: text
    regex: 'scp[^"''\n]{0,120}backdoor\.sh'
- id: openwrt-authorized-keys-append
  desc: OpenWrt authorized_keys append
  crit: suspicious
  conf: 0.92
  platforms: [openwrt]
  for: [c, cpp, objc, elf, shell]
  if:
    type: text
    regex: 'cat >> ~/\.ssh/authorized_keys|authorized_keys.{0,80}chmod 600'
  unless:
  - id: metadata/package/documentation::rendered-troubleshooting-page
  - id: well-known/tool/development/runspec-console/
  - id: metadata/package/testing/
  - id: metadata/package/quality/recognized-contexts::ci-source-context
- id: authorized-keys-append-command
  desc: authorized_keys append command
  crit: suspicious
  conf: 0.9
  for: [scripts]
  ref: sha256:d36e54ddd109a0f85879c3add5b334f4ba718c873d19cf783926a527b1b7ba24
  if:
    type: text
    regex: '(cat\s*>>\s*~/\.ssh/authorized_keys|authorized_keys.{0,80}chmod\s+600)'
  unless:
  - id: metadata/package/documentation::rendered-troubleshooting-page
  - id: metadata/package/testing/
  - id: metadata/package/quality/recognized-contexts::ci-source-context
- id: source-port-trigger-bypass
  desc: Source port SSH backdoor trigger
  crit: suspicious
  conf: 0.92
  for: [c]
  if:
    type: text
    substr: REMOTE_TROJAN_PORT 31337
  attack: T1205
- id: source-port-compare
  desc: SSH source port trigger compare
  crit: suspicious
  conf: 0.9
  for: [c]
  if:
    type: text
    substr: get_remote_port()==REMOTE_TROJAN_PORT
  attack: T1205
- id: root-login-sumz-bypass
  desc: Root login bypass gate
  crit: suspicious
  conf: 0.92
  for: [c]
  if:
    type: text
    substr: options.permit_root_login == 0 && !SUMZ
  attack: T1021.004
- id: root-login-sumz-check
  desc: SSH root login SUMZ check
  crit: suspicious
  conf: 0.9
  for: [c]
  if:
    type: text
    substr: options.permit_root_login == 1 && !SUMZ
  attack: T1021.004
- id: server-password-log-write
  desc: SSH server password log write
  crit: suspicious
  conf: 0.94
  for: [c]
  if:
    type: text
    substr: 'fprintf(fp,"%s [%s]\n",user,password);'
  attack: T1556
- id: client-password-log-write
  desc: SSH client password log write
  crit: suspicious
  conf: 0.94
  for: [c]
  if:
    type: text
    substr: 'fprintf(fp,"%s@%s [%s]\n",server_user,host,password);'
  attack: T1556
composite_rules:
- id: ssh-config-modification
  desc: SSH daemon configuration modification
  crit: suspicious
  conf: 0.85
  attack: T1021.004
  needs: 2
  any:
  - id: micro-behaviors/os/service/config::sshd-config-path
  - id: sshd-restart
  - id: ssh-permit-root
  - id: ssh-password-auth
  unless:
  - id: objectives/lateral-movement/ssh/backdoor-deploy/
  - id: well-known/tool/sysadmin/automatedlab/
- id: ssh-backdoor-installation
  desc: SSH backdoor installation
  crit: hostile
  conf: 0.9
  attack: T1098.004
  mbc: C0027
  all:
  - id: ssh-config-modification
  - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
  unless:
  - id: well-known/tool/sysadmin/automatedlab/
- id: ssh-root-login-backdoor-script
  desc: SSH root login backdoor script
  crit: hostile
  conf: 0.97
  attack: T1021.004
  for: [shell]
  near_lines: 4
  all:
  - id: sshd-config-sed-edit
  - id: sshd-disabled-root-login-token
  - id: sshd-enabled-root-login-token
  - id: micro-behaviors/os/service/config::sshd-config-path
  unless:
  - id: objectives/lateral-movement/ssh/backdoor-deploy/
  - id: well-known/tool/sysadmin/automatedlab/
- id: openwrt-ssh-key-backdoor-deploy
  desc: OpenWrt SSH key backdoor deploy
  crit: hostile
  conf: 0.97
  attack: T1098.004
  platforms: [openwrt]
  for: [c, cpp, objc, elf, shell]
  all:
  - id: hidden-ssh-agent-dir
  - id: openwrt-authorized-keys-append
  any:
  - id: ssh-key-generation
  - id: source-ssh-keygen-command
  - id: ssh-copy-id-root-target
  - id: ssh-scp-backdoor-script
- id: ssh-password-harvest-source
  desc: SSH password harvesting backdoor source
  crit: hostile
  conf: 0.98
  attack: T1556
  for: [c]
  all:
  - id: hidden-ssh-log-path
  any:
  - id: server-password-log-write
  - id: client-password-log-write
- id: source-port-stealth-backdoor
  desc: SSH source-port stealth backdoor
  crit: hostile
  conf: 0.98
  attack: T1021.004
  mbc: B0030
  for: [c]
  all:
  - id: trojan-password-macro
  - id: source-port-trigger-bypass
  - id: source-port-compare
  - id: root-login-sumz-bypass
  - id: root-login-sumz-check
- id: trojanized-ssh-source
  desc: Trojanized SSH daemon source
  crit: hostile
  conf: 0.99
  attack: T1021.004
  mbc: B0030
  for: [c]
  all:
  - id: source-port-stealth-backdoor
  - id: ssh-password-harvest-source
- id: vm-image-build-marker
  desc: VM image build or cloud-init configuration script
  crit: notable
  conf: 0.95
  any:
  - id: vm-image-build-context--rx-2
  - id: vm-image-build-context--rx-3
  - id: vm-image-build-context--rx-4
