defaults:
  platforms: [unix, windows]
composite_rules:
  - id: php-appender
    desc: "Detects PHP file infector appending malicious code to other files"
    crit: hostile
    attack: T1554
    all:
      - id: micro-behaviors/fs/directory/traverse::php-dir-traverse
      - id: micro-behaviors/fs/file/write::php-file-write
    any:
      - id: objectives/impact/infect::php-payload-include
      - id: objectives/impact/infect/script::reinfection-marker-check
      - id: objectives/impact/infect/script::php-extension-filter
