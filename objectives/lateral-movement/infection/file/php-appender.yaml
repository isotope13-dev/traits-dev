defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: php-appender
    desc: PHP file infector appender
    crit: hostile
    attack: T1554
    # A file infector reads its OWN source body (fopen(__FILE__)) and appends it
    # to victim scripts it discovers. Without the self-read anchor the other
    # three legs — directory traversal, file write, and a fixed-size substr
    # extract — are generic PHP filesystem operations that pool across any large
    # project/archive (the FP this closes). Framework contexts are excluded to
    # match the sibling infector composites (php-prepender-virus, *-full).
    all:
      - id: micro-behaviors/fs/read/self::fopen-self-file
      - id: micro-behaviors/fs/directory/traverse::php-dir-traverse
      - id: micro-behaviors/fs/file/write/direct::php-file-write
      - id: objectives/impact/infect/script::payload-body-extraction
    unless:
      - id: metadata/library/web-frameworks::wordpress-context
      - id: metadata/library/web-frameworks::laravel-context
      - id: metadata/library/web-frameworks::symfony-context
      - id: metadata/package/testing/harness/unit::phpunit-test-context
      - id: metadata/file/magic::php-archive
