defaults:
  platforms: [windows]
  for: [pe]
  attack: T1554

composite_rules:
  - id: pe-resource-drive-infector
    desc: Executable resource infector across drives
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/impact/infect/resource::delphi-resource-appender
      - id: micro-behaviors/fs/traversal/drives::logical-drive-type-enumeration
      - id: micro-behaviors/fs/enumerate/directory::find-file-walker
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
