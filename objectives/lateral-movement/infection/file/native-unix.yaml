defaults:
  platforms: [unix, appliance]
  for: [c, cpp, objc, elf]
  attack: T1105

traits:
  - id: native-self-exe-copy
    desc: Native self exe hidden copy
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '/proc/self/exe[\s\S]{0,260}/tmp/\.'

  - id: native-hidden-copy-target
    desc: Native hidden copy target
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/tmp/\.[A-Za-z0-9_-]+'

  - id: native-temp-propagation-scan
    desc: Native temp propagation scan
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/tmp[\s\S]{0,120}/var/tmp[\s\S]{0,220}readdir'

composite_rules:
  - id: native-hidden-self-copy-infection
    desc: Native hidden self-copy infection
    crit: hostile
    conf: 0.98
    all:
      - id: native-self-exe-copy
      - id: native-hidden-copy-target
      - id: native-temp-propagation-scan
