defaults:
  platforms: [windows]
  for: [powershell, batch, scripts, pe]
  attack: "T1484.001"
traits:
  - id: new-gpo-cmdlet
    desc: Creates new Group Policy
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: New-GPO
      case_insensitive: true
    unless:
      - id: well-known/lib/ace-editor
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
      - id: metadata/file/profile/identity::generated-attack-map-context
  - id: new-gplink-cmdlet
    desc: Links Group Policy object
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: New-GPLink
      case_insensitive: true
    unless:
      - id: well-known/lib/ace-editor
  - id: sysvol-scheduledtasks-path
    desc: SYSVOL scheduled task staging
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: SYSVOL.{0,120}Policies.{0,120}ScheduledTasks
      case_insensitive: true
  - id: immediate-task-v2-clsid
    desc: GPP ImmediateTaskV2 CLSID
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 9756B581-76EC-4169-9AFC-0CA8D43ADB5F
      case_insensitive: true
  - id: scheduledtasks-clsid
    desc: GPP ScheduledTasks CLSID
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: CC63F200-7309-4ba0-B154-A71CD118DBCC
      case_insensitive: true
  - id: netlogon-payload-copy
    desc: Copies payload to NETLOGON
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: Copy-Item.{0,120}\\NETLOGON\\
      case_insensitive: true
  - id: invoke-gpupdate-force
    desc: Forces remote GPUpdate
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: Invoke-GPUpdate.{0,80}-Force|gpupdate\s+/force
      case_insensitive: true
composite_rules:
  - id: gpo-scheduled-task-deploy
    desc: GPO scheduled task deployment
    crit: suspicious
    conf: 0.93
    all:
      - id: new-gpo-cmdlet
      - id: new-gplink-cmdlet
    any:
      - id: sysvol-scheduledtasks-path
      - id: immediate-task-v2-clsid
      - id: scheduledtasks-clsid
      - id: invoke-gpupdate-force
  - id: gpo-ransomware-mass-deploy
    desc: Ransomware GPO mass deployment
    crit: hostile
    conf: 0.97
    all:
      - id: gpo-scheduled-task-deploy
      - id: netlogon-payload-copy
      - id: invoke-gpupdate-force
    any:
      - id: micro-behaviors/os/module/load::powershell-ad-gpo-module
      - id: objectives/impact/ransom/encrypt/cli::password-gated-ransomware-cli
      - id: objectives/impact/ransom/encrypt/cli::password-gated-spread-locker
