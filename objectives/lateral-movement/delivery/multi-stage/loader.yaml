composite_rules:
  - id: dynamic-library-loading-dup
    desc: Dynamic library loading capability
    crit: suspicious
    conf: 0.85
    platforms:
      - windows
      - linux
      - macos
    for: [pe, elf, macho]
    attack: T1129
    mbc: C0007
    all:
      - id: micro-behaviors/dylib/load/runtime::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
  - id: remote-code-injection-recognized-marker
    desc: Recognized remote injection marker
    crit: notable
    conf: 0.9
    platforms: [windows]
    any:
      - id: metadata/binary/metrics/structural::many-imports
      - id: metadata/binary/vendor::microsoft-corp-marker
      - id: well-known/tool/sysadmin/jvm::jdk-attach-library
      - id: well-known/tool/sysadmin/console::ansicon-console-hook-component
      - id: objectives/evasion/process/injection/memory::geta-oep-helper-marker
      - id: well-known/game/steam/
      - id: well-known/tool/sysadmin/chroot-win::chroot-windows-component
  - id: remote-code-injection
    desc: Remote process code injection capability
    crit: suspicious
    conf: 0.85
    platforms:
      - windows
    for: [pe, dll]
    attack: T1055
    mbc: C0041
    needs: 2
    any:
      - id: micro-behaviors/process/inject/dll::create-remote-thread
      - id: micro-behaviors/process/inject/runtime/call::write-process-memory-dup
      - id: micro-behaviors/mem/protect/modify::virtual-alloc-ex
    unless:
      - id: objectives/lateral-movement/delivery/multi-stage/
#      - id: metadata/binary/symbols/plugin/
#      - id: well-known/tool/reverse-engineering/oep-finder::get-oep-export
    downgrade:
      any:
        - id: well-known/game/mod/
  - id: multi-stage-loader
    desc: Multi-stage malware loader with obfuscation and injection
    crit: hostile
    conf: 0.9
    attack: T1545
    mbc: B0024
    platforms:
      - windows
    for: [pe]
    all:
      - id: micro-behaviors/data/encode/payload::embedded-obfuscated-payload
      - id: objectives/lateral-movement/delivery/multi-stage::dynamic-library-loading-dup
      - id: remote-code-injection
    downgrade:
      any:
        - id: well-known/game/steam/
        - id: metadata/binary/section/names::upx-section
        - id: metadata/binary/installer/family/
        - id: well-known/app/crayens/
  - id: obfuscated-network-bootstrap-loader
    desc: Obfuscated loader with host fingerprinting
    crit: hostile
    conf: 0.94
    attack: T1105
    mbc: B0024
    platforms:
      - windows
    for: [pe]
    size_max: 450000
    unless:
      - id: metadata/signed/platform/
      - id: metadata/package/versioning::pe-version-resource
    all:
      - id: metadata/binary/section/metrics::high-entropy-exec-section
      - id: objectives/anti-analysis/debugger-detect/check::anti-debug-network-bootstrap-loader
      - id: micro-behaviors/os/module/load::get-proc-address-import
  - id: flexible-execution-framework
    desc: Flexible malware execution with multiple deployment methods
    crit: suspicious
    conf: 0.85
    attack: T1055
    mbc: B0024
    platforms:
      - windows
    for: [pe]
    any:
      - id: objectives/evasion/process/injection/memory::process-inject-api
      - id: objectives/evasion/process/injection/toolkit::remote-thread-pattern
      - id: objectives/evasion/process/injection/toolkit::dotnet-split-winapi-injection-loader
      - id: objectives/evasion/process/injection/hollowing::process-hollowing-alloc-write-marker
      - id: objectives/evasion/process/injection/atom-bombing::atom-bombing-capable
      - id: objectives/evasion/process/injection/syscall::syscall-injection-trinity
    unless:
      - id: well-known/game/steam/
      - id: metadata/lang/compiled/
      - id: metadata/lang/compiler/systems::go-pe-symtab
      - id: metadata/binary/installer/family/
    downgrade:
      any:
        - id: well-known/game/steam/
