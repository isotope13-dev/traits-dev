traits:
  - id: dynamic-library-loading-dup
    desc: Dynamic library loading capability
    crit: notable
    conf: 0.85
    platforms:
      - windows
      - linux
      - macos
    for: [pe, elf, macho]
    if:
      type: import_combination
      required:
        - LoadLibrary
        - GetProcAddress
      min_suspicious: 2
    attack: T1129
    mbc: C0007
composite_rules:
  - id: remote-code-injection
    desc: Staged remote code injection capability
    crit: suspicious
    conf: 0.88
    platforms:
      - windows
    for:
      - pe
      - dll
    all:
      - id: objectives/evasion/process/injection/memory::process-inject-api
      - id: micro-behaviors/data/encode/payload::embedded-obfuscated-payload
    attack: T1055
    mbc: C0041
    unless:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
      - id: metadata/vendor/valve/
      - id: metadata/vendor/jetbrains/
      - id: well-known/tools/sysadmin/jvm::jdk-attach-library
      - id: well-known/tools/reverse-engineering/
      - id: objectives/evasion/masquerade/wrapper::autohotkey-version-string
  - id: multi-stage-loader
    desc: Multi-stage malware loader with obfuscation and injection
    crit: hostile
    conf: 0.9
    attack: T1545
    mbc: B0024
    platforms:
      - windows
    for: [pe]
    all:
      - id: micro-behaviors/data/encode/payload::embedded-obfuscated-payload
      - id: objectives/lateral-movement/delivery/multi-stage::dynamic-library-loading-dup
      - id: remote-code-injection
    downgrade:
      any:
        - id: metadata/vendor/valve::valve-corp-binary
  - id: flexible-execution-framework
    desc: Flexible malware execution with multiple deployment methods
    crit: suspicious
    conf: 0.85
    attack: T1055
    mbc: B0024
    platforms:
      - windows
    for: [pe]
    needs: 2
    any:
      - id: objectives/evasion/process/injection/
      - id: objectives/evasion/process/injection/atom-bombing::atom-bombing-capable
    downgrade:
      any:
        - id: metadata/vendor/valve::valve-corp-binary
