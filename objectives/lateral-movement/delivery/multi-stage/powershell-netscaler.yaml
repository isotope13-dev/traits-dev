defaults:
  platforms: [netscaler, appliance, windows]
  for: [powershell]
  attack: T1105

traits:
  - id: ps-netscaler-nsupdate-fetch
    desc: PS NetScaler nsupdate fetch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /nitro/v1/config/nsupdate

  - id: ps-netscaler-fileupload
    desc: PS NetScaler file upload
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /nitro/v1/config/fileupload

  - id: ps-netscaler-cli-script
    desc: PS NetScaler CLI script
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /nitro/v1/config/cli_script

composite_rules:
  - id: ps-netscaler-multistage-delivery
    desc: PS NetScaler staged delivery
    crit: hostile
    conf: 0.98
    all:
      - id: ps-netscaler-nsupdate-fetch
      - id: ps-netscaler-fileupload
    any:
      - id: ps-netscaler-cli-script
