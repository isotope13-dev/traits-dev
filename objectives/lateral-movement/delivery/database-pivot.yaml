defaults:
  platforms: [unix]
  attack: T1534
  for: [shell, python, javascript, ruby]
traits:
  - id: psql-remote-connect
    desc: PostgreSQL remote connection via psql
    crit: notable
    if:
      type: symbol
      exact: "psql"
  - id: redis-remote-auth
    desc: Redis authentication via AUTH command
    crit: notable
    if:
      type: text
      regex: 'AUTH\s+\S{1,50}'
  - id: redis-select
    desc: Redis SELECT command
    crit: notable
    if:
      type: text
      regex: 'SELECT\s+[0-9]+'
  - id: redis-scan
    desc: Redis SCAN command
    crit: notable
    if:
      type: text
      regex: 'SCAN\s+[0-9]+'
composite_rules:
  - id: redis-enumeration
    desc: Redis database enumeration (SCAN/GET)
    crit: suspicious
    conf: 0.8
    all:
      - id: redis-select
      - id: redis-scan
