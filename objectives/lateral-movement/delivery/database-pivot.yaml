defaults:
  platforms: [unix]
  attack: T1534
  for: [shell, python, javascript, ruby]
traits:
- id: psql-remote-connect
  desc: PostgreSQL remote connection via psql
  crit: suspicious
  if:
    type: symbol
    exact: "psql"
- id: redis-remote-auth
  desc: Redis authentication via AUTH command
  crit: suspicious
  unless:
  - id: metadata/lang/source::windows-generated-def-path
  - id: metadata/lang/source::windows-generated-def-table
  if:
    type: text
    regex: '(?m)(^|[;&|]\s*|["''])(redis-cli\s+)?AUTH\s+["'']?[^"''\s=|]{1,50}'
- id: redis-select--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: redis-cli
  count_max: 1027228
- id: redis-select--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: SELECT
  count_max: 1027229
- id: redis-select--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: AUTH
  count_max: 1027230
- id: redis-select--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: KEYS
  count_max: 1027231
- id: redis-select--rx-5
  desc: Regex component marker
  crit: component
  if:
    type: text
    substr: SCAN
  count_max: 1027232
- id: redis-scan
  desc: Redis SCAN command
  crit: suspicious
  if:
    type: text
    regex: 'SCAN\s+[0-9]+'
composite_rules:
- id: redis-enumeration
  desc: Redis database enumeration (SCAN/GET)
  crit: suspicious
  conf: 0.8
  all:
  - id: redis-select
  - id: redis-scan
- id: redis-select
  desc: Redis SELECT command
  crit: suspicious
  conf: 1.0
  any:
  - id: redis-select--rx-1
  - id: redis-select--rx-2
  - id: redis-select--rx-3
  - id: redis-select--rx-4
  - id: redis-select--rx-5
