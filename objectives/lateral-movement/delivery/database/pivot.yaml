defaults:
  platforms: [unix]
  attack: T1534
  for: [shell, python, javascript, ruby]
traits:
- id: redis-remote-auth
  desc: Redis authentication via AUTH command
  crit: suspicious
  unless:
  - id: metadata/lang/source::windows-generated-def-path
  - id: metadata/lang/source/
  if:
    type: text
    regex: '(?m)(^|[;&|]\s*["''])(redis-cli\s+)?AUTH\s+["'']?[A-Za-z0-9_./:$-]{1,50}(?=["'']?\s|$)'
    not:
    - regex: '(?i)\bAUTH\s+(TLS|SSL|PLAIN)\b'
    - regex: '(?i)\bAUTH\s*\(expires_in\b'
- id: redis-cli-marker
  desc: redis-cli command-line client invocation
  crit: component
  if:
    type: text
    substr: redis-cli
- id: redis-keys-glob
  desc: Redis KEYS '*' full-keyspace enumeration
  crit: component
  if:
    type: text
    regex: '\bKEYS\s+\*'
- id: redis-scan-cursor
  desc: Redis SCAN cursor iteration command
  crit: component
  if:
    type: text
    regex: '\bSCAN\s+[0-9]+'
composite_rules:
# SELECT <db> is intentionally not modeled: switching the active Redis database
# is routine, and a `SELECT <n>` matcher also collides with ordinary SQL
# `SELECT 1` health-checks — neither indicates a pivot. The enumeration verbs
# below (full-keyspace KEYS, SCAN cursor walks) are the actual recon tell when
# paired with a redis-cli invocation.
- id: redis-enumeration
  desc: Redis database enumeration
  crit: suspicious
  conf: 0.8
  any:
  - id: redis-scan
  - id: redis-keys
- id: redis-keys
  desc: Redis KEYS enumeration command
  crit: suspicious
  conf: 0.9
  all:
  - id: redis-cli-marker
  - id: redis-keys-glob
  unless:
  - id: well-known/app/jinicode::benign-read-only-database-tool-context
- id: redis-scan
  desc: Redis SCAN command
  crit: suspicious
  conf: 0.9
  all:
  - id: redis-cli-marker
  - id: redis-scan-cursor
