defaults:
  platforms: [unix]
  attack: T1534
  for: [shell, python, javascript, ruby]
traits:
- id: redis-remote-auth
  desc: Redis authentication via AUTH command
  crit: suspicious
  unless:
  - id: metadata/lang/source::windows-generated-def-path
  - id: metadata/lang/source::windows-generated-def-table
  if:
    type: text
    regex: '(?m)(^|[;&|]\s*["''])(redis-cli\s+)?AUTH\s+["'']?[^"''\s=|]{1,50}'
    not:
    - regex: '(?i)\bAUTH\s+(TLS|SSL|PLAIN)\b'
- id: redis-select--rx-1
  desc: Redis CLI command context
  crit: component
  if:
    type: text
    substr: redis-cli
  count_max: 1027228
- id: redis-select--rx-2
  desc: Redis SELECT database command
  crit: component
  if:
    type: text
    regex: '\bSELECT\s+[0-9]+\b'
  count_max: 1027229
- id: redis-select--rx-4
  desc: Redis KEYS glob command
  crit: component
  if:
    type: text
    regex: '\bKEYS\s+\*'
  count_max: 1027231
- id: redis-select--rx-5
  desc: SCAN keyword (Redis cursor iteration command)
  crit: component
  if:
    type: text
    regex: '\bSCAN\s+[0-9]+'
  count_max: 1027232
composite_rules:
- id: redis-enumeration
  desc: Redis database enumeration
  crit: suspicious
  conf: 0.8
  any:
  - id: redis-scan
  - id: redis-keys
- id: redis-select
  desc: Redis SELECT command
  crit: suspicious
  conf: 1.0
  all:
  - id: redis-select--rx-1
  - id: redis-select--rx-2
- id: redis-keys
  desc: Redis KEYS enumeration command
  crit: suspicious
  conf: 0.9
  all:
  - id: redis-select--rx-1
  - id: redis-select--rx-4
- id: redis-scan
  desc: Redis SCAN command
  crit: suspicious
  conf: 0.9
  all:
  - id: redis-select--rx-1
  - id: redis-select--rx-5
