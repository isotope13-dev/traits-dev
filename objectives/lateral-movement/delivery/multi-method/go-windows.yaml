defaults:
  platforms: [windows]
  for: [go, pe]
  attack: T1021

traits:
  - id: go-smb-admin-share-net-use
    desc: Go maps admin share with net use
    crit: suspicious
    conf: 0.95
    for: [go]
    if:
      type: text
      regex: 'net",\s*"use"[\s\S]{0,180}"\\\\\\\\%s\\\\C\$"'

  - id: go-wmic-remote-process-create
    desc: Go WMIC remote process create
    crit: suspicious
    conf: 0.95
    for: [go]
    if:
      type: text
      regex: '"wmic",\s*"/node:"[\s\S]{0,120}"process",\s*"call",\s*"create"'

  - id: go-psexec-remote-command
    desc: Go PsExec remote command
    crit: suspicious
    conf: 0.95
    for: [go]
    if:
      type: text
      regex: 'exec\.Command\("psexec"[\s\S]{0,160}"-accepteula"'

  - id: go-lateral-delivery-functions-pe
    desc: Go PE lateral delivery functions
    crit: suspicious
    conf: 0.94
    for: [pe]
    if:
      type: text
      regex: 'main\.lateralDelivery[\s\S]{0,260}main\.psExecDelivery'

composite_rules:
  - id: go-windows-multi-lateral-delivery
    desc: Go Windows multi lateral delivery
    crit: hostile
    conf: 0.98
    for: [go]
    needs: 2
    any:
      - id: go-smb-admin-share-net-use
      - id: go-wmic-remote-process-create
      - id: go-psexec-remote-command

  - id: go-pe-windows-lateral-delivery
    desc: Go PE Windows lateral delivery
    crit: hostile
    conf: 0.97
    for: [pe]
    all:
      - id: go-lateral-delivery-functions-pe
    any:
      - id: objectives/exfiltration/dns/tunnel::go-dns-c2-functions-pe
      - id: objectives/exfiltration/dns/tunnel::go-dns-txt-mx-c2-lookups
