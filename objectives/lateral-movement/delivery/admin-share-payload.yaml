# Cross-host payload deployment via admin shares + remote execution.
# Ransomware affiliates routinely write a copy of their payload to
# `\\<host>\C$\ProgramData\` (or admin$) on each enumerated host,
# then trigger execution via WMI/CIM/sc.exe/schtasks/Invoke-Command.
# The shape — path string with credential variable + remote-exec
# command in proximity — is hostile in its own right; observed in
# VECT, Conti, BlackBasta, Akira, LockBit, Qilin.
defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell]
  attack: T1021.002
  mbc: B0030
traits:
  - id: admin-share-c-programdata
    desc: Admin share C$\ProgramData payload path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\\\\[`$\w]{1,40}\\C[`]?\$\\ProgramData\\'
  - id: schtasks-cross-host
    desc: schtasks remote /s flag
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'schtasks\s+/create\s+/s\s+\$?\w{1,40}'
      case_insensitive: true
  - id: sc-exe-cross-host-create
    desc: sc.exe remote service create
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'sc(\.exe)?\s+\\\\\$?\w{1,40}\s+create\s+\$?\w{1,40}\s+binPath'
      case_insensitive: true
  - id: invoke-cim-win32-process
    desc: Invoke-CimMethod Win32_Process Create
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'Invoke-CimMethod[^\n]{0,200}Win32_Process[^\n]{0,200}Create'
      case_insensitive: true
  - id: invoke-wmi-win32-process
    desc: Invoke-WmiMethod Win32_Process Create
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: 'Invoke-WmiMethod[^\n]{0,200}Win32_Process[^\n]{0,200}Create'
      case_insensitive: true
  - id: invoke-command-remote
    desc: Invoke-Command -ComputerName remote
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'Invoke-Command\s+-ComputerName\s+\$?\w{1,40}'
      case_insensitive: true
composite_rules:
  - id: admin-share-payload-deployment
    desc: Cross-host payload via admin share + exec
    crit: hostile
    conf: 0.97
    needs: 1
    any:
      - id: admin-share-c-programdata
    all:
      - id: lateral-exec-method
  - id: lateral-exec-method
    desc: Remote-host execution method
    crit: suspicious
    conf: 0.92
    any:
      - id: schtasks-cross-host
      - id: sc-exe-cross-host-create
      - id: invoke-cim-win32-process
      - id: invoke-wmi-win32-process
      - id: invoke-command-remote
