defaults:
  platforms: [unix, windows]
  crit: notable
  attack: T1584
  for: [scripts, binaries]
traits:
  - id: hf-space-reference
    desc: Reference to Hugging Face Spaces
    if:
      type: text
      regex: '(?i)[a-zA-Z0-9.-]+\.hf\.space'
    unless:
    - id: metadata/library/data/
  - id: hf-download-pattern
    desc: Payload download pattern from hf.space
    if:
      type: text
      regex: '(?i)(curl|wget|fetch).{0,100}\.hf\.space'
composite_rules:
  - id: hf-space-download-cmd
    desc: Payload download from Hugging Face Spaces (cmd)
    crit: suspicious
    conf: 0.9
    all:
      - id: hf-space-reference
      - id: hf-download-pattern
  - id: hf-space-download-generic
    desc: Payload download from Hugging Face Spaces (generic)
    crit: suspicious
    conf: 0.8
    all:
      - id: hf-space-reference
      - id: micro-behaviors/communications/http/download/
  - id: hf-space-download
    desc: Payload download from Hugging Face Spaces
    crit: suspicious
    any:
      - id: hf-space-download-cmd
      - id: hf-space-download-generic
