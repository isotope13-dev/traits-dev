defaults:
  platforms: [unix, windows]
  crit: notable
  attack: T1584
  for: [scripts, binaries]
traits:
  - id: hf-download-pattern
    desc: Hugging Face Space download command pattern
    if:
      type: text
      # A command-line downloader is staging evidence.  A JavaScript
      # fetch() plus a browser download is also the normal shape of document,
      # image, and AI-service converters, so it is kept in the neutral service
      # composite below.
      regex: '(?im)(^|[;&|][ \t]*)(curl|wget|fetch)[ \t]+[^\n]{0,160}\.hf\.space'
composite_rules:
  - id: hf-space-download-cmd
    desc: Payload download from Hugging Face Spaces (cmd)
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/services/huggingface::hf-space-reference
      - id: hf-download-pattern
    unless:
      - id: well-known/app/pinokio::app-bundle
      - id: well-known/app/restylist::extension-context
      - id: well-known/app/restylist::workflow-script-context
