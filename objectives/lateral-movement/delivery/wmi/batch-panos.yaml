defaults:
  platforms: [panos, appliance, windows]
  for: [batch]
  attack: T1047

traits:
  - id: batch-panos-wmic-remote-create
    desc: Batch PAN-OS WMIC remote create
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: wmic /node:"%TARGET%" process call create

  - id: batch-panos-admin-share-map
    desc: Batch PAN-OS admin share map
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: \\%TARGET%\admin$

composite_rules:
  - id: batch-panos-wmi-admin-remote-exec
    desc: Batch PAN-OS WMI admin exec
    crit: hostile
    conf: 0.98
    all:
      - id: batch-panos-wmic-remote-create
      - id: batch-panos-admin-share-map
