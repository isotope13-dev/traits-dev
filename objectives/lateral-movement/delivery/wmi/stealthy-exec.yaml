defaults:
  platforms: [windows]
  conf: 1.0
composite_rules:
  - id: wmi-service-hijack-lolbin
    desc: Hijacks service path via WMI using LOLBin
    crit: suspicious
    attack: "T1543.003"
    all:
      - id: micro-behaviors/os/wmi/manipulate::modify-service-wmi
      - id: objectives/execution/lolbin/os::scriptrunner-execution
  - id: wmi-service-hijack-share
    desc: Hijacks service path via WMI using network share
    crit: suspicious
    attack: "T1543.003"
    all:
      - id: micro-behaviors/os/wmi/manipulate::modify-service-wmi
      - id: micro-behaviors/os/wmi/manipulate::unc-path-reference
  - id: wmi-service-hijack
    desc: Hijacks service path via WMI
    crit: suspicious
    any:
      - id: wmi-service-hijack-lolbin
      - id: wmi-service-hijack-share
  - id: stealthy-wmi-exec
    desc: Stealthy lateral movement via WMI
    crit: hostile
    attack: "T1047"
    all:
      - id: wmi-service-hijack
      - id: micro-behaviors/os/wmi/manipulate::start-service-wmi
    any:
      - id: objectives/evasion/security-bypass/policy/uac::low-risk-file-types
      - id: objectives/evasion/security-bypass/policy/uac::allow-insecure-guest-auth
