defaults:
  platforms: [qnx, unix]
  for: [go, elf]
  attack: T1021.002

traits:
  - id: qnx-go-smb-session
    desc: QNX Go SMB session
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: smb.NewSession

  - id: qnx-go-smb-auth-loop
    desc: QNX Go SMB auth loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: session.Authenticate

  - id: qnx-go-smb-default-creds
    desc: QNX Go SMB default creds
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: administrator", "password

  # Bare NETLOGON is a standard SMB share/RPC name present in benign Samba C
  # tools (nmblookup, rpcclient), so on its own it is only a building block.
  - id: qnx-go-smb-netlogon-token
    desc: SMB NETLOGON share name string
    crit: component
    conf: 0.94
    if:
      type: text
      substr: NETLOGON

composite_rules:
  # Suspicious "share list" finding now requires the NETLOGON token to
  # co-occur with the Go SMB session marker, so it no longer fires on
  # native Samba C tools that merely reference the NETLOGON share/RPC API.
  - id: qnx-go-smb-share-list
    desc: QNX Go SMB share list
    crit: suspicious
    conf: 0.94
    all:
      - id: qnx-go-smb-netlogon-token
      - id: qnx-go-smb-session

  - id: qnx-go-smb-default-credential-spray
    desc: QNX Go SMB default cred spray
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-smb-session
      - id: qnx-go-smb-auth-loop
      - id: qnx-go-smb-default-creds
      - id: qnx-go-smb-share-list
