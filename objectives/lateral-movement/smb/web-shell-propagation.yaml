# Web shell propagation via Windows administrative shares.
# Observed in SHADOW-EARTH-053 where a compromised Exchange front-end
# was used to copy charcode.aspx onto additional internal Exchange
# servers via \\IP\c$\inetpub\wwwroot\aspnet_client\system_web\.
# This expands web-shell coverage without dropping new tooling.
defaults:
  platforms: [windows]
  for: [pe, dll, batch, powershell]
  attack: T1021.002
traits:
  - id: aspx-to-admin-share
    desc: ASPX/ASHX copied to admin share
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '\\\\\S{1,80}\\[a-zA-Z]\$\\\S{0,200}\.(aspx|ashx|jsp|jspx|php)'
  - id: aspx-to-inetpub-unc
    desc: Web shell copied to remote inetpub
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '\\\\\S{1,80}\\[a-zA-Z]\$\\inetpub\\'
  - id: aspx-to-exchange-unc
    desc: Web shell copied to remote Exchange
    crit: suspicious
    conf: 0.97
    if:
      type: text
      regex: '\\\\\S{1,80}\\[a-zA-Z]\$\\Program Files\\Microsoft\\Exchange'
      case_insensitive: true
composite_rules:
  - id: web-shell-admin-share-propagation
    desc: Web shell propagated across admin shares
    crit: hostile
    conf: 0.97
    any:
      - id: aspx-to-admin-share
      - id: aspx-to-inetpub-unc
      - id: aspx-to-exchange-unc
