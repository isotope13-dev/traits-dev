defaults:
  for:
    - c
    - cpp
  platforms:
    - windows
  attack: T1021.002
traits:
  - id: admin-share-drop-path
    desc: Admin share payload path
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: Admin\\$\\\\system32\\\\GT\\.exe
  - id: legacy-system-drop-path
    desc: WinNT share payload path
    crit: suspicious
    conf: 0.98
    if:
      type: text
      regex: c\\$\\\\winnt\\\\system32\\\\GT\\.exe
  - id: local-payload-stager
    desc: Local payload staging file
    crit: suspicious
    conf: 0.98
    if:
      type: string_literal
      exact: moo.dat
composite_rules:
  - id: smb-share-propagation-primitives
    desc: SMB propagation API chain
    crit: suspicious
    conf: 0.96
    needs: 3
    any:
      - id: admin-share-drop-path
      - id: legacy-system-drop-path
      - id: local-payload-stager
      - id: micro-behaviors/os/service/remote::wnet-add-connection2-source
      - id: micro-behaviors/os/service/remote::net-schedule-job-add-source
  - id: remote-drop-or-enum
    desc: Remote share drop or enumeration
    crit: suspicious
    conf: 0.96
    any:
      - id: admin-share-drop-path
      - id: legacy-system-drop-path
      - id: micro-behaviors/os/service/remote::net-user-enum-source
      - id: micro-behaviors/os/service/remote::ipc-null-session-path
