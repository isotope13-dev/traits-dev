defaults:
  for:
    - c
    - cpp
  platforms:
    - windows
  attack: T1021.002
traits:
  - id: admin-share-drop-path
    desc: Admin share payload path
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: Admin\\$\\\\system32\\\\GT\\.exe
  - id: legacy-system-drop-path
    desc: WinNT share payload path
    crit: suspicious
    conf: 0.98
    if:
      type: raw
      regex: c\\$\\\\winnt\\\\system32\\\\GT\\.exe
  - id: local-payload-stager
    desc: Local payload staging file
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      exact: moo.dat
composite_rules:
  - id: smb-share-propagation-primitives
    desc: SMB propagation API chain
    crit: suspicious
    conf: 0.96
    needs: 3
    any:
      - id: micro-behaviors/os/network/share/
      - id: admin-share-drop-path
      - id: legacy-system-drop-path
      - id: local-payload-stager
  - id: remote-drop-or-enum
    desc: Remote share drop or enumeration
    crit: suspicious
    conf: 0.96
    any:
      - id: admin-share-drop-path
      - id: legacy-system-drop-path
      - id: micro-behaviors/os/network/share::net-user-enum-source
      - id: micro-behaviors/os/network/share::ipc-null-session-path
