defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1021.002

traits:
  - id: python-smbclient-null-session
    desc: Python smbclient null session
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/tool/offensive/decepticon::package-tree-member
    if:
      type: text
      regex: '"smbclient"[\s\S]{0,180}"-N"'

  - id: python-nmap-smb-scan
    desc: Python nmap SMB scan
    crit: suspicious
    conf: 0.94
    unless:
      - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    if:
      type: text
      substr: '"nmap", "-p", "445"'

  - id: python-smb-payload-put
    desc: Python SMB payload put
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'put \{payload_path\} \{remote_name\}'

composite_rules:
  - id: python-smb-lateral-payload
    desc: Python SMB lateral payload
    crit: hostile
    conf: 0.98
    all:
      - id: python-smbclient-null-session
      - id: python-nmap-smb-scan
    any:
      - id: python-smb-payload-put
