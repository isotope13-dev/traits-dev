defaults:
  platforms: [unix, appliance, windows]
  for: [ruby]
  attack: T1021.002

traits:
  - id: ruby-smb-tcp-port
    desc: Ruby SMB TCP port
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'TCPSocket\.new[\s\S]{0,120}SMB_PORT'

  - id: ruby-smb-header-bytes
    desc: Ruby SMB header bytes
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: '0xff, 0x53, 0x4d, 0x42'

composite_rules:
  - id: ruby-smb-lateral-probe
    desc: Ruby SMB lateral probe
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-smb-tcp-port
      - id: ruby-smb-header-bytes
