defaults:
  platforms: [netscaler, appliance, unix]
  for: [swift]
  attack: T1021.002

traits:
  - id: swift-smb-magic-bytes
    desc: Swift SMB magic bytes
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 0xFF, 0x53, 0x4D, 0x42

  - id: swift-smb-port-445
    desc: Swift SMB port 445
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "port: Int32 = 445"

  - id: swift-smb-ntlm-dialect
    desc: Swift SMB NTLM dialect
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: NT LM 0.12

composite_rules:
  - id: swift-smb-lateral-packet
    desc: Swift SMB lateral packet
    crit: hostile
    conf: 0.98
    all:
      - id: swift-smb-magic-bytes
      - id: swift-smb-port-445
    any:
      - id: swift-smb-ntlm-dialect
