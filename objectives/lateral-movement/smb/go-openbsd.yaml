defaults:
  platforms: [openbsd, bsd, unix]
  for: [go, elf]
  attack: T1021.002

traits:
  - id: go-smb2-dialer
    desc: Go SMB2 dialer use
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: smb2.NewDialer

  - id: go-smb-list-shares
    desc: Go SMB lists shares
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: sess.ListShares()

  - id: go-smb-drops-beacon-exe
    desc: Go SMB drops beacon exe
    crit: suspicious
    conf: 0.95
    if:
      type: text
      # Path/quoted drop name — keeps CS bare `beacon.exe` family ID orthogonal
      # and avoids metric tokens like "beacon.executed_blocks".
      regex: '(?i)([\\/]|["''])beacon\.exe\b'

composite_rules:
  - id: go-smb-share-beacon-drop
    desc: Go SMB share beacon drop
    crit: hostile
    conf: 0.98
    all:
      - id: go-smb2-dialer
      - id: go-smb-list-shares
      - id: go-smb-drops-beacon-exe

