defaults:
  platforms: [routeros, appliance, unix]
  for: [text, shell, python, javascript]
  attack: T1021.002

traits:
  - id: routeros-smb-fetch
    desc: RouterOS SMB fetch
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/tool fetch[\s\S]{0,220}smb://'

  - id: routeros-smb-client-add
    desc: RouterOS SMB client add
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /ip smb client add

  - id: routeros-smb-share-enum
    desc: RouterOS SMB share enum
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tool smb enum-shares

  - id: routeros-smb-upload
    desc: RouterOS SMB data upload
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'smb://[\s\S]{0,260}upload-data='

composite_rules:
  - id: routeros-smb-lateral-transfer
    desc: RouterOS SMB lateral transfer
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-smb-fetch
      - id: routeros-smb-client-add
    any:
      - id: routeros-smb-share-enum
      - id: routeros-smb-upload
