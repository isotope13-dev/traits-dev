defaults:
  platforms: [ios]
  for: [rust]
  attack: T1021.002

traits:
  - id: rust-smb-port-445-connect
    desc: Rust connects to SMB port 445
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'format!\([\s\S]{0,80}:445'

  - id: rust-smb2-negotiate-builder
    desc: Rust builds SMB2 negotiate packet
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: build_smb2_negotiate

  - id: rust-smb2-session-builder
    desc: Rust builds SMB2 session packet
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: build_smb2_session_setup

composite_rules:
  - id: rust-ios-smb-lateral-probe
    desc: Rust iOS SMB lateral probe
    crit: hostile
    conf: 0.98
    all:
      - id: rust-smb-port-445-connect
      - id: rust-smb2-negotiate-builder
      - id: rust-smb2-session-builder
