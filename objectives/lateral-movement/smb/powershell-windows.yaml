defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1021.002

traits:
  - id: ps-remote-sam-admin-path
    desc: PowerShell remote SAM admin path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: \Windows\System32\config\SAM

composite_rules:
  - id: ps-smb-admin-share-sensitive-probe
    desc: PowerShell SMB SAM share probe
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/network/share::ps-admin-c-share-path
      - id: micro-behaviors/os/network/share::ps-unc-path-test
      - id: ps-remote-sam-admin-path

  - id: ps-smb-share-enumeration
    desc: PowerShell SMB share enumeration
    crit: suspicious
    conf: 0.95
    any:
      - id: micro-behaviors/os/network/share::ps-get-smbshare-cimsession
      - id: micro-behaviors/os/network/share::ps-net-view-unc-host
    all:
      - id: micro-behaviors/os/network/share::ps-admin-share-list

  - id: ps-smb-remote-command-workflow
    desc: PowerShell SMB remote command flow
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/socket/port::smb-port-pair
      - id: ps-smb-share-enumeration
      - id: objectives/lateral-movement/delivery/admin-share::lateral-exec-method

  - id: ps-smb-cim-lateral-probe
    desc: PowerShell SMB CIM lateral probe
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/network/share::ps-smb-tcpclient-probe
      - id: micro-behaviors/os/network/share::ps-cim-remote-session
      - id: ps-smb-share-enumeration
