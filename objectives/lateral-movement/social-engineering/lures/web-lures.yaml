defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.85
traits:
  - id: fake-software-update
    desc: Social engineering system update lure
    if:
      type: text
      regex: '(?i)\b(critical|required|security|urgent)\b.{0,50}\b(update|upgrade|patch)\b.{0,50}\b(required|available|now)\b'
    unless:
      - id: metadata/lang/source::windows-generated-def-path
      - type: text
        substr: "Upgrade Required"
      - type: text
        substr: "required_keys.update"
      - type: text
        substr: "required.element"
    not:
      - substr: "key_updated"
      - substr: "RequiredUpgrade"
      - substr: "RequiredPayloadTooLarge"
      - substr: "Required Directly update"
      - substr: "StatusUpgradeRequired"
      - substr: "requiredStatusCheckContexts"
  - id: fake-java-update
    desc: Java-specific social engineering lure
    if:
      type: text
      regex: '(?i)\b(Java|JRE|OpenJDK)\b.{0,20}\b(update|outdated)\b'
    unless:
      - type: text
        substr: "Java applet in this web page requires"
      - type: text
        substr: "SOFTWARE\\JavaSoft\\Java Update"
      - id: metadata/signed/leaf::oracle-america-inc.
    not:
      - regex: '(?i)\bjava[- _]?db\b'
      - regex: '(?i)\bjava[- _].{0,20}skip'
      - regex: '(?i)\bskip[- _].{0,20}java'
      - regex: '(?i)javascript'
  - id: software-update-social-engineering
    desc: Generic software update warning language
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: '(?i)\b(severely outdated|security breach|known vulnerabilities|outdated environment)\b'
  - id: update-now-pattern
    desc: Social engineering update button
    if:
      type: text
      regex: '(?i)(chrome|firefox|edge|safari).{0,40}update\s*now'
composite_rules:
  - id: web-fake-update-overlay
    desc: Social engineering fake update overlay
    crit: hostile
    all:
      - id: fake-software-update
      - id: update-now-pattern
  - id: web-fake-java-overlay
    desc: Social engineering fake Java overlay
    crit: hostile
    all:
      - id: fake-java-update
      - id: update-now-pattern
