defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.85
traits:
- id: fake-software-update--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)\b(critical|required)\b.{0,50}\b(update|upgrade)\b.{0,50}\b(required|available)\b'
  count_max: 1028785
- id: fake-software-update--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)\b(critical|required)\b.{0,50}\b(patch)\b.{0,50}\b(required|available)\b'
  count_max: 1028786
- id: fake-software-update--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)\b(critical|required)\b.{0,50}\b(update|upgrade|patch)\b.{0,50}\b(now)\b'
  count_max: 1028787
- id: fake-software-update--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)\b(security|urgent)\b.{0,50}\b(update|upgrade)\b.{0,50}\b(required|available)\b'
  count_max: 1028788
- id: fake-software-update--rx-5
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)\b(security|urgent)\b.{0,50}\b(patch)\b.{0,50}\b(required|available)\b'
  count_max: 1028789
- id: fake-software-update--rx-6
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: '(?i)\b(security|urgent)\b.{0,50}\b(update|upgrade|patch)\b.{0,50}\b(now)\b'
  count_max: 1028790
- id: fake-java-update
  desc: Java-specific social engineering lure
  crit: notable
  if:
    type: text
    regex: '(?i)\b(Java|JRE|OpenJDK)\b.{0,40}\b(outdated|update available)\b'
  unless:
  - type: text
    substr: "Java applet in this web page requires"
  - type: text
    substr: "SOFTWARE\\JavaSoft\\Java Update"
  - type: text
    substr: "Oracle America, Inc."
  - id: metadata/signed/leaf::oracle-america-inc.
  not:
  - regex: '(?i)\bjava[- _]?db\b'
  - regex: '(?i)\bjava[- _].{0,20}skip'
  - regex: '(?i)\bskip[- _].{0,20}java'
  - regex: '(?i)javascript'
- id: software-update-social-engineering
  desc: Generic software update warning language
  crit: suspicious
  conf: 0.7
  if:
    type: text
    # "security breach" is ordinary defensive prose in source comments and
    # documentation.  Keep only wording that is itself an update warning.
    regex: '(?i)\b(severely outdated|outdated environment)\b'
  not:
    - regex: '(?i)\b(no|catch|scan|scans?|scanner|found|finding|findings|detect|reports?|audit|audits?)\b.{0,80}\bknown vulnerabilities\b'
    - regex: '(?i)\bknown vulnerabilities\b.{0,80}\b(found|in installed packages|installed packages|dependencies|dependency|deps|audit|audits?|scanner|scan|scans?)\b'
  unless:
    - id: well-known/app/browser-extension-known/
    - id: metadata/file/string/identity::tool-identity-putty
    - id: well-known/app/winscp/
    - id: metadata/library/structure::vscode-packaged-native-tool
    - id: micro-behaviors/process/interpreter/vm/
    - id: well-known/tool/detection/tyre-kicker/
    - id: well-known/tool/detection/sast/
    - id: well-known/tool/detection/llm-scanner/
- id: update-now-pattern
  desc: Social engineering update button
  if:
    type: text
    regex: '(?i)(chrome|firefox|edge|safari).{0,40}update\s*now'
composite_rules:
- id: web-fake-update-overlay
  desc: Social engineering fake update overlay
  crit: hostile
  all:
  - id: fake-software-update
  - id: update-now-pattern
- id: web-fake-java-overlay
  desc: Social engineering fake Java overlay
  crit: hostile
  all:
  - id: fake-java-update
  - id: update-now-pattern
- id: fake-software-update
  desc: Social engineering system update lure
  crit: baseline
  conf: 1.0
  any:
  - id: fake-software-update--rx-1
  - id: fake-software-update--rx-2
  - id: fake-software-update--rx-3
  - id: fake-software-update--rx-4
  - id: fake-software-update--rx-5
  - id: fake-software-update--rx-6
  unless:
  - id: metadata/lang/source::windows-generated-def-path
  - id: metadata/file/string/form-validation::upgrade-required-message
  - id: metadata/file/string/form-validation::required-keys-update-string
  - id: metadata/file/string/form-validation::required-element-string
  downgrade:
    any:
    - id: objectives/anti-static/obfuscation/code-metrics/structure/
    - id: metadata/library/structure::js-large-module-bundle
    - id: metadata/package/quality/false-positives::benign-build-tooling-context
  not:
  - substr: 'required:!1,allowMultiple:!1'
  - substr: "key_updated"
  - substr: "RequiredUpgrade"
  - substr: "RequiredPayloadTooLarge"
  - substr: "Required Directly update"
  - substr: "StatusUpgradeRequired"
  - substr: "requiredStatusCheckContexts"
