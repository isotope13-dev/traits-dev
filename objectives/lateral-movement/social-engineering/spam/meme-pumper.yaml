defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
traits:
  - id: meme-pumper-raid-kit
    desc: Meme-pumper 'raid_kit' keyword
    crit: component
    if:
      type: text
      substr: raid_kit

composite_rules:
  - id: meme-pumper-marketing-automation
    desc: Automated meme-pumping / spam-raid coordination
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/anti-static/obfuscation/string/recovery::chained-replace-calls
      - id: meme-pumper-raid-kit
