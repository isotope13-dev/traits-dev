# Outlook COM contact spam automation
defaults:
  for: [csharp, pe, dll]
  platforms: [windows]
  attack: T1566.001
composite_rules:
  - id: outlook-com-contact-spammer
    desc: Outlook COM spam using local contacts and account context
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/email/send/outlook::outlook-com-mail-send
      - id: micro-behaviors/communications/email/send/outlook::outlook-contacts-folder
    any:
      - id: micro-behaviors/communications/email/send/outlook::outlook-sendusingaccount
      - id: objectives/collection/email-harvest::mapi-inbox-harvest
