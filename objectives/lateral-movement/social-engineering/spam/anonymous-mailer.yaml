defaults:
  for: [perl]
  platforms: [unix]
traits:
- id: spoofed-from-input
  desc: Email From header set from user input
  crit: suspicious
  conf: 0.88
  attack: T1566.001
  if:
    type: text
    regex: 'From:.{0,120}\$input'
- id: spoofed-reply-to-input
  desc: Reply-To header set from user input
  crit: suspicious
  conf: 0.88
  attack: T1566.001
  if:
    type: text
    regex: 'Reply-To:.{0,120}\$input'
composite_rules:
- id: perl-anonymous-mailer
  desc: Perl CGI anonymous email sending tool
  crit: hostile
  conf: 0.95
  attack: T1566.001
  all:
  - id: micro-behaviors/communications/email/send::sendmail-pipe
  - id: micro-behaviors/communications/http/request/cgi::request-method-env
  any:
  - id: spoofed-from-input
  - id: spoofed-reply-to-input
  - id: micro-behaviors/communications/email/send::x-mailer-header
- id: sendmail-web-tool
  desc: Web-accessible sendmail email tool
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/communications/email/send::sendmail-pipe
  - id: micro-behaviors/communications/http/request/cgi::content-type-response
  any:
  - id: micro-behaviors/communications/http/request/cgi::html-form-output
  - id: micro-behaviors/communications/http/request/cgi::request-method-env
