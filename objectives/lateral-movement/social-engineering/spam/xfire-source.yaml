defaults:
  platforms: [windows]
  for: [c, cpp]

traits:
  - id: xfire-chat-window-class
    desc: Xfire chat window class
    crit: component
    conf: 0.98
    if:
      type: string_literal
      exact: ChatSkinWnd
  - id: xfire-rich-edit-control
    desc: Xfire chat edit control
    crit: component
    conf: 0.98
    if:
      type: string_literal
      exact: RichEdit20W
  - id: picture-url-lure-message
    desc: Picture URL lure message
    crit: component
    conf: 0.96
    if:
      type: string_literal
      regex: "^It's you! https?://.{1,120}\\.(JPG|JPEG|PNG|GIF)$"
      case_insensitive: true

composite_rules:
  - id: xfire-chat-window-targeting
    desc: Xfire chat window targeting
    crit: suspicious
    conf: 0.97
    all:
      - id: xfire-chat-window-class
      - id: xfire-rich-edit-control
      - id: micro-behaviors/ui/window/manage::find-window-a-source
      - id: micro-behaviors/ui/window/manage::find-window-ex-a-source
  - id: xfire-chat-url-spam
    desc: Xfire chat URL spam
    crit: hostile
    conf: 0.98
    all:
      - id: xfire-chat-window-targeting
      - id: picture-url-lure-message
      - id: micro-behaviors/ui/window/manage::send-message-a-source
      - id: micro-behaviors/ui/window/manage::wm-settext-source
      - id: micro-behaviors/ui/window/manage::wm-ime-keydown-source
