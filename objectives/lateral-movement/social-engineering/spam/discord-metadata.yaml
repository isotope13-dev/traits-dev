defaults:
  platforms: [unix, windows]
traits:
  - id: electron-discord-license-invite
    desc: Electron license Discord invite
    crit: notable
    conf: 0.98
    platforms: [macos]
    for: [macho, javascript]
    if:
      type: text
      substr: https://discord.gg/electronjs
# Discord Metadata Spam Detection
# Detects packages that exist solely to spam Discord invites
# ATT&CK: T1566.002 (Spearphishing Link)
composite_rules:
  - id: discord-spam-email
    desc: Discord URL masquerading as email address
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/command-and-control/channel/discord::discord-fake-email
      - id: objectives/command-and-control/channel/discord::discord-string
  - id: discord-spam-typosquat
    desc: Typosquatting package advertising Discord
    crit: hostile
    conf: 0.95
    all:
      - id: metadata/package/keywords/identity::typosquatting-keyword
      - id: objectives/command-and-control/channel/discord::discord-string
  - id: discord-spam-license
    desc: License or documentation contains Discord invite
    crit: suspicious
    conf: 0.8
    for: [scripts, manifests, documents]
    all:
      - id: objectives/command-and-control/channel/discord::discord-invite-string
      - id: metadata/package/license
    near_bytes: 2048
    unless:
      - id: electron-discord-license-invite
      - id: well-known/app/verdaccio/
      - id: metadata/package/quality/false-positives::benign-app-fp-context
      - id: metadata/library/runtime::acquire-vscode-api
      - id: micro-behaviors/process/create/shell/host/
      - id: well-known/app/kg-up::kg-up-community-context
