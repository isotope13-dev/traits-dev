# MAPI-based email spammer in PE binaries
# Combines extended MAPI session with named pipe IPC and embedded PE payload
# Detects multi-stage MAPI spam tools masquerading as legitimate software
defaults:
  for: [pe]
  platforms: [windows]
composite_rules:
  - id: mapi-pe-spammer
    desc: Extended MAPI email spammer binary
    crit: hostile
    conf: 0.95
    attack: T1566.001
    all:
      - id: micro-behaviors/communications/email/send::mapi-email-send-capability
      - id: micro-behaviors/communications/ipc/named-pipe::named-pipe-server
    any:
      - id: micro-behaviors/communications/email/send::outlook-get-addrs
      - id: objectives/privilege-escalation/token-manipulation::token-manipulation-cluster
      - id: objectives/anti-analysis/debugger-detect/check::is-debugger-present
    needs: 1
