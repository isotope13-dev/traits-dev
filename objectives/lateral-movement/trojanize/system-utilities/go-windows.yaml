defaults:
  platforms: [windows]
  for: [go]
  attack: T1027.009

traits:
  - id: go-system32-utility-source
    desc: Go reads System32 utilities
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'System32[\s\S]{0,180}(notepad|calc|taskmgr|mspaint)\.exe'
    count_min: 2

  - id: go-path-shadow-utility-write
    desc: Go writes PATH-shadow utilities
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'os\.WriteFile\(filepath\.Join\((\.|localAppData), target\)'

composite_rules:
  - id: go-windows-system-utility-trojanize
    desc: Go Windows utility trojanize
    crit: hostile
    conf: 0.98
    all:
      - id: go-system32-utility-source
      - id: go-path-shadow-utility-write
    any:
      - id: micro-behaviors/fs/file/write/direct::os-write-file
      - id: micro-behaviors/fs/path/system::system32-substr
