defaults:
  platforms: [unix]
  for: [go]
  attack: T1027.009

traits:
  - id: go-ssh-target
    desc: Go references SSH system utility
    crit: component
    conf: 0.94
    if:
      type: text
      exact: /usr/bin/ssh
    unless:
      - type: path
        basename: true
        exact: busybox_versions.go
      - type: path
        regex: 'github\.com[\\/]canonical[\\/]lxd@[^\\/]+[\\/]'

  - id: go-sudo-target
    desc: Go references sudo system utility
    crit: component
    conf: 0.94
    if:
      type: text
      exact: /usr/bin/sudo
    unless:
      - type: path
        basename: true
        exact: busybox_versions.go
      - type: path
        regex: 'github\.com[\\/]canonical[\\/]lxd@[^\\/]+[\\/]'

  - id: go-passwd-target
    desc: Go references passwd system utility
    crit: component
    conf: 0.94
    if:
      type: text
      exact: /usr/bin/passwd
    unless:
      - type: path
        basename: true
        exact: busybox_versions.go
      - type: path
        regex: 'github\.com[\\/]canonical[\\/]lxd@[^\\/]+[\\/]'

  - id: go-original-binary-backup
    desc: Go backs up original binary
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'backupPath := t\.path \+ "\.orig"'

  - id: go-credential-wrapper-script
    desc: Go writes credential wrapper
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'credential capture:[\s\S]{0,120}exec %s\.orig "\$@"'

composite_rules:
  - id: go-system-utility-targets
    desc: Go references multiple system utilities
    crit: suspicious
    conf: 0.94
    needs: 2
    any:
      - id: go-ssh-target
      - id: go-sudo-target
      - id: go-passwd-target

  - id: go-trojanized-system-utilities
    desc: Go trojanized utilities
    crit: hostile
    conf: 0.98
    all:
      - id: go-system-utility-targets
      - id: go-original-binary-backup
      - id: go-credential-wrapper-script
