defaults:
  platforms: [openbsd, bsd, unix]
  for: [python]
  attack: T1554

traits:
  - id: python-system-wrapper-exfil
    desc: Python system wrapper exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: trojan wrapper[\s\S]{0,180}/exfil

  - id: python-openbsd-utility-map
    desc: Python OpenBSD utility map
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: /bin/ls[\s\S]{0,260}/usr/bin/netstat

composite_rules:
  - id: python-openbsd-system-utility-trojanize
    desc: Python utility trojanization
    crit: hostile
    conf: 0.98
    all:
      - id: python-system-wrapper-exfil
      - id: python-openbsd-utility-map
