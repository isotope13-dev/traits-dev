# Trojanized GNU Utilities Detection
# Spirit malware family trojanizes legitimate coreutils binaries
# ATT&CK: T1027.009 (Embedded Payloads)
defaults:
  platforms: [unix, android]
traits:
  - id: swift-apt-wrapper-script
    desc: Swift writes apt wrapper script
    crit: suspicious
    conf: 0.92
    for: [swift]
    if:
      type: text
      substr: "Impersonating: /usr/bin/apt"

  - id: swift-ld-wrapper-script
    desc: Swift writes ld wrapper script
    crit: suspicious
    conf: 0.92
    for: [swift]
    if:
      type: text
      substr: "Impersonating: /usr/bin/ld"

  - id: swift-path-prepend-wrapper-dir
    desc: Swift prepends wrapper directory
    crit: suspicious
    conf: 0.9
    for: [swift]
    if:
      type: text
      substr: 'export PATH="\('

composite_rules:
  # Trojanized GNU utility: legitimate coreutils + obfuscation marker + embedded payload
  # Spirit malware family drops trojanized versions of timeout, dd, etc.
  - id: trojanized-coreutils
    desc: Trojanized GNU utility with embedded payload
    crit: hostile
    conf: 0.92
    mbc: "F0001.006"
    attack: "T1027.009"
    for: [elf]
    all:
      - id: micro-behaviors/data/embedded/payload/compression::lzma-magic
      - id: objectives/anti-static/obfuscation/payload/encrypted::xixa-marker
      - id: micro-behaviors/dylib/library/family::system-lib-marker

  - id: swift-trojanized-system-utilities
    desc: Swift trojanized system utilities
    crit: hostile
    conf: 0.98
    for: [swift]
    all:
      - id: swift-path-prepend-wrapper-dir
    any:
      - id: swift-apt-wrapper-script
      - id: swift-ld-wrapper-script
    needs: 1
