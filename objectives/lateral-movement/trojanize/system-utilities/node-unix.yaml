defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1554

traits:
  - id: node-system-binary-targets
    desc: Node system binary targets
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/usr/bin/(su|passwd|ssh)[\s\S]{0,220}/usr/sbin/useradd'

  - id: node-binary-backup-wrapper
    desc: Node copies a Unix system executable
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'copyFileSync\s*\(.{0,220}(/usr/|/bin/|/sbin/).{0,120}\)'

  - id: node-shell-header-inject
    desc: Node shell header inject
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: trojanHeader

composite_rules:
  - id: node-system-utility-trojanize
    desc: Node system utility trojanize
    crit: hostile
    conf: 0.98
    all:
      - id: node-system-binary-targets
    any:
      - id: node-binary-backup-wrapper
      - id: node-shell-header-inject
