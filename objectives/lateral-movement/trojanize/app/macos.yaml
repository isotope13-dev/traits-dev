defaults:
  for:
    - macho
    - python
    - shell
  attack: T1574.001
  platforms:
    - macos
  crit: suspicious
traits:
  - id: cfbundle-exe-key
    desc: CFBundleExecutable key reference
    crit: suspicious
    conf: 0.7
    count_min: 2
    if:
      type: text
      substr: CFBundleExecutable
  - id: app-contents-path
    desc: .app/Contents/ bundle path access
    crit: component
    conf: 0.6
    if:
      type: text
      substr: .app/Contents/
  - id: ledger-app-path
    desc: Ledger Live application path reference
    conf: 0.85
    if:
      type: text
      substr: /Applications/Ledger Live.app
  - id: pkill-ledger-live
    desc: pkill Ledger Live
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: pkill.{0,30}Ledger Live
  - id: killall-ledger
    desc: Kills Ledger desktop wallet app
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: killall.{0,30}Ledger
  - id: rm-applications-dir
    desc: rm -r /Applications/
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: rm\s+-r.{0,50}"/Applications/
  - id: sudo-rm-app
    desc: sudo removes macOS application bundle
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: sudo.{0,30}rm.{0,50}\.app
  - id: unzip-to-applications
    desc: unzip to /Applications
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: unzip.{0,50}/Applications
  - id: unzip-d-applications
    desc: unzip -d /Applications
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: unzip.{0,30}-d.{0,30}/Applications
  - id: curl-app-zip
    desc: curl .app.zip download
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: curl.{0,50}\.app\.zip
  - id: curl-app-archive
    desc: curl app.zip download
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: curl.{0,50}app\.zip
  - id: wget-app-zip
    desc: wget .app.zip download
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: wget.{0,50}\.app\.zip
  - id: rm-app-unzip
    desc: rm .app && unzip pattern
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: rm.{0,50}\.app.{0,30}&&.{0,30}unzip
  - id: rm-app-cp
    desc: rm .app && cp pattern
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: rm.{0,50}\.app.{0,30}&&.{0,30}cp
composite_rules:
  - id: pkill-ledger
    desc: Kill Ledger Live process
    conf: 0.9
    any:
      - id: pkill-ledger-live
      - id: killall-ledger
  - id: rm-applications
    desc: Remove application from /Applications
    crit: suspicious
    conf: 0.9
    any:
      - id: rm-applications-dir
      - id: sudo-rm-app
  - id: unzip-applications
    desc: Unzip to /Applications directory
    crit: suspicious
    conf: 0.85
    any:
      - id: unzip-to-applications
      - id: unzip-d-applications
  - id: download-app-zip
    desc: Download application archive
    crit: suspicious
    conf: 0.85
    any:
      - id: curl-app-zip
      - id: curl-app-archive
      - id: wget-app-zip
  - id: app-replacement
    desc: Application replacement pattern
    crit: suspicious
    conf: 0.8
    any:
      - id: rm-app-unzip
      - id: rm-app-cp
  - id: app-termination
    desc: App termination or removal
    crit: suspicious
    conf: 0.8
    any:
      - id: pkill-ledger
      - id: rm-applications
  - id: app-replace-action
    desc: App replacement action
    crit: suspicious
    conf: 0.8
    any:
      - id: unzip-applications
      - id: download-app-zip
  - id: ledger-trojanize
    desc: Ledger Live application replacement attack
    crit: hostile
    conf: 0.95
    all:
      - id: ledger-app-path
      - id: app-termination
      - id: app-replace-action
  - id: app-bundle-hijack
    desc: macOS app bundle executable hijacking
    crit: suspicious
    conf: 0.85
    all:
      - id: cfbundle-exe-key
      - id: app-contents-path
      - id: app-replace-action
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: watchdog-relaunch
    desc: Process watchdog with app relaunch
    crit: hostile
    conf: 0.9
    attack: T1547.001
    all:
      - id: micro-behaviors/process/info/query::get-process-for-pid
      - id: micro-behaviors/process/create/launch::nsworkspace-app-launch
      - id: micro-behaviors/time/query::sleep
  - id: app-trojanize
    desc: macOS application replacement attack
    crit: suspicious
    conf: 0.9
    all:
      - id: rm-applications
      - id: unzip-applications
