defaults:
  platforms: [windows, linux, macos]
  for: [pe, elf, macho]
  attack: T1110.001

traits:
  - id: bubbletea-tui-import
    desc: charmbracelet bubbletea TUI import
    crit: component
    conf: 0.97
    if:
      type: text
      substr: "github.com/charmbracelet/bubbletea"

  - id: denisenkom-go-mssqldb-import
    desc: denisenkom go-mssqldb driver import
    crit: component
    conf: 0.99
    if:
      type: text
      substr: "github.com/denisenkom/go-mssqldb"

  - id: golang-sql-sqlexp-import
    desc: golang-sql sqlexp driver import
    crit: component
    conf: 0.97
    if:
      type: text
      substr: "github.com/golang-sql/sqlexp"

  - id: x-net-socks-import
    desc: golang.org/x/net SOCKS client import
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "golang.org/x/net/internal/socks"

composite_rules:
  - id: go-mssql-pentest-tui
    desc: Go MSSQL pentest TUI binary
    crit: suspicious
    conf: 0.95
    size_min: 1048576
    all:
      - id: denisenkom-go-mssqldb-import
      - id: bubbletea-tui-import
    any:
      - id: golang-sql-sqlexp-import
      - id: x-net-socks-import
    unless:
      - id: metadata/signed/platform/

  - id: go-mssql-socks-attack-tui
    desc: Go MSSQL SOCKS-tunneled attack TUI
    crit: hostile
    conf: 0.97
    size_min: 1048576
    all:
      - id: denisenkom-go-mssqldb-import
      - id: bubbletea-tui-import
      - id: x-net-socks-import
    unless:
      - id: metadata/signed/platform/
      - id: metadata/binary/installer/family/
