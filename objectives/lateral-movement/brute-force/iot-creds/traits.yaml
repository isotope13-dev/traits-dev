defaults:
  platforms:
    - unix
    - android
  for:
    - elf
traits:
  - id: mirai-cred-admin
    desc: Mirai credential variant (7ujMko0admin)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: text
      substr: 7ujMko0admin
  - id: mirai-cred-vizxv
    desc: Mirai credential variant (7ujMko0vizxv)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: text
      substr: 7ujMko0vizxv
  - id: mirai-cred-juantech
    desc: Mirai credential variant (juantech)
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: text
      substr: juantech
  - id: mirai-cred-xc3511
    desc: Mirai credential variant (xc3511)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: text
      substr: xc3511
  - id: mirai-cred-jvbzd
    desc: Mirai credential variant (jvbzd)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: text
      substr: jvbzd
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: mirai-cred-smcadmin
    desc: Mirai credential variant (smcadmin)
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: text
      substr: smcadmin
  - id: mirai-cred-gm8182
    desc: Mirai credential variant (GM8182)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: text
      substr: GM8182
  - id: mirai-cred-oelinux
    desc: Mirai credential variant (oelinux123)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: text
      substr: oelinux123
  - id: mirai-cred-hi3518
    desc: Mirai credential variant (hi3518)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: text
      substr: hi3518
  - id: camera-cred-vizxv
    desc: IP camera credential (vizxv)
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: text
      substr: vizxv
  - id: camera-cred-xmhdipc
    desc: IP camera credential (xmhdipc)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: text
      substr: xmhdipc
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: router-cred-zte
    desc: Router credential (Zte521)
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: text
      substr: Zte521
  - id: router-cred-huawei
    desc: Router credential (telecomadmin)
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: text
      substr: telecomadmin
  - id: telnet-connect-str
    desc: Telnet connect string
    crit: notable
    conf: 0.6
    attack: T1110.001
    if:
      type: text
      regex: (?i)telnet connect
  - id: telnet-scanner-str
    desc: Telnet scanner string
    crit: notable
    conf: 0.6
    attack: T1110.001
    if:
      type: text
      regex: (?i)telnet scanner
  - id: telnet-brute-str
    desc: Telnet brute string
    crit: notable
    conf: 0.6
    attack: T1110.001
    if:
      type: text
      regex: (?i)telnet brute
  - id: mirai-cred-prefix
    desc: Mirai credential prefix (7ujMko0)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: text
      substr: 7ujMko0
  - id: telnet-port-scan
    desc: Telnet port 23 scanning indicator
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: text
      substr: port 23 open
      case_insensitive: true
  - id: router-shell-enable
    desc: Router shell enable sequence
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: text
      substr: 'enable

        shell

        sh'
composite_rules:
  - id: telnet-connect
    desc: Telnet connection string
    crit: suspicious
    conf: 0.7
    attack: T1110.001
    any:
      - id: telnet-connect-str
      - id: telnet-scanner-str
      - id: telnet-brute-str
  - id: busybox-download
    desc: BusyBox download exploitation
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    any:
      - id: micro-behaviors/communications/http/download/curl::wget
      - id: micro-behaviors/communications/ftp/download/tftp::tftp
  - id: mirai-credential-access
    desc: Mirai botnet default credential list
    crit: suspicious
    conf: 0.95
    attack: T1110.001
    mbc: E1017
    needs: 3
    any:
      - id: mirai-cred-admin
      - id: mirai-cred-vizxv
      - id: mirai-cred-juantech
      - id: mirai-cred-xc3511
      - id: mirai-cred-jvbzd
      - id: mirai-cred-smcadmin
      - id: mirai-cred-gm8182
      - id: mirai-cred-oelinux
      - id: mirai-cred-hi3518
  - id: mirai-credential-busybox-stager
    desc: Mirai credential list with BusyBox payload stager
    crit: hostile
    conf: 0.97
    attack: T1110.001,T1105
    mbc: E1017
    all:
      - id: mirai-cred-admin
      - id: mirai-cred-vizxv
      - id: mirai-cred-xc3511
      - id: objectives/lateral-movement/brute-force/iot::admin1234
      - id: micro-behaviors/fs/proc/info/path::proc-net-tcp
    any:
      - id: micro-behaviors/communications/http/download/busybox::wget
      - id: micro-behaviors/communications/http/download/busybox::busybox-wget-http-reference
      - id: micro-behaviors/communications/ftp/download/busybox::ftpget
      - id: micro-behaviors/communications/ftp/download/tftp::tftp
      - id: objectives/lateral-movement/brute-force/iot::iot-credential-spray
  - id: mirai-credential-covert-c2
    desc: Mirai credential list with covert C2 protocol markers
    crit: hostile
    conf: 0.98
    attack: T1110.001,T1071
    mbc: E1017
    all:
      - id: mirai-credential-access
      - id: objectives/command-and-control/channel/covert::covert-protocol-markers
    any:
      - id: micro-behaviors/communications/ip/literal::external-ipv4-binary
      - id: micro-behaviors/fs/proc/info/path::process-pid-cmdline-format
  - id: mirai-telnet-credential-spray
    desc: Mirai credential spray with Telnet status and procfs scan
    crit: hostile
    conf: 0.98
    attack: T1110.001,T1046
    mbc: E1017
    platforms: [linux]
    all:
      - id: mirai-credential-access
      - id: micro-behaviors/communications/socket/telnet::telnet-deployment-status
      - id: micro-behaviors/fs/proc/info/path::process-pid-exe-template

  - id: mirai-credential-shell-stager
    desc: Mirai credentials paired with Telnet shell injection
    crit: hostile
    conf: 0.99
    attack: T1110.001,T1059.004,T1021.007
    mbc: E1017
    platforms: [linux]
    all:
      - id: mirai-credential-access
      - id: objectives/lateral-movement/brute-force/iot::shell-injection-pattern-1
      - id: objectives/command-and-control/botnet/iot::telnet-target
  - id: telnet-attack
    desc: IoT telnet attack patterns
    crit: suspicious
    conf: 0.95
