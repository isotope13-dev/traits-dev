defaults:
  platforms:
    - linux
    - unix
    - android
  for:
    - elf
traits:
  - id: mirai-cred-admin
    desc: Mirai credential variant (7ujMko0admin)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: string_value
      substr: 7ujMko0admin
  - id: mirai-cred-vizxv
    desc: Mirai credential variant (7ujMko0vizxv)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: string_value
      substr: 7ujMko0vizxv
  - id: mirai-cred-juantech
    desc: Mirai credential variant (juantech)
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: string_value
      substr: juantech
  - id: mirai-cred-xc3511
    desc: Mirai credential variant (xc3511)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: string_value
      substr: xc3511
  - id: mirai-cred-jvbzd
    desc: Mirai credential variant (jvbzd)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: string_value
      substr: jvbzd
  - id: mirai-cred-smcadmin
    desc: Mirai credential variant (smcadmin)
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: string_value
      substr: smcadmin
  - id: mirai-cred-gm8182
    desc: Mirai credential variant (GM8182)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: string_value
      substr: GM8182
  - id: mirai-cred-oelinux
    desc: Mirai credential variant (oelinux123)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: string_value
      substr: oelinux123
  - id: mirai-cred-hi3518
    desc: Mirai credential variant (hi3518)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: string_value
      substr: hi3518
  - id: camera-cred-vizxv
    desc: IP camera credential (vizxv)
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: string_value
      substr: vizxv
  - id: camera-cred-xmhdipc
    desc: IP camera credential (xmhdipc)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: string_value
      substr: xmhdipc
  - id: router-cred-zte
    desc: Router credential (Zte521)
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: string_value
      substr: Zte521
  - id: router-cred-huawei
    desc: Router credential (telecomadmin)
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: string_value
      substr: telecomadmin
  - id: telnet-connect-str
    desc: Telnet connect string
    crit: notable
    conf: 0.6
    attack: T1110.001
    if:
      type: string_value
      regex: (?i)telnet connect
  - id: telnet-scanner-str
    desc: Telnet scanner string
    crit: notable
    conf: 0.6
    attack: T1110.001
    if:
      type: string_value
      regex: (?i)telnet scanner
  - id: telnet-brute-str
    desc: Telnet brute string
    crit: notable
    conf: 0.6
    attack: T1110.001
    if:
      type: string_value
      regex: (?i)telnet brute
  - id: mirai-cred-prefix
    desc: Mirai credential prefix (7ujMko0)
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: string_value
      substr: 7ujMko0
  - id: telnet-port-scan
    desc: Telnet port 23 scanning indicator
    crit: suspicious
    conf: 0.75
    attack: T1110.001
    if:
      type: string_value
      regex: port 23 open
      case_insensitive: true
  - id: router-shell-enable
    desc: Router shell enable sequence
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    if:
      type: string_value
      substr: 'enable

        shell

        sh'
composite_rules:
  - id: telnet-connect
    desc: Telnet connection string
    crit: suspicious
    conf: 0.7
    attack: T1110.001
    any:
      - id: telnet-connect-str
      - id: telnet-scanner-str
      - id: telnet-brute-str
  - id: busybox-download
    desc: BusyBox download exploitation
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    any:
      - id: micro-behaviors/communications/http/download/curl::wget
      - id: micro-behaviors/communications/http/download/busybox::tftp
  - id: mirai-credential-access
    desc: Mirai botnet default credential list
    crit: suspicious
    conf: 0.95
    attack: T1110.001
    mbc: E1017
    needs: 3
    any:
      - id: mirai-cred-admin
      - id: mirai-cred-vizxv
      - id: mirai-cred-juantech
      - id: mirai-cred-xc3511
      - id: mirai-cred-jvbzd
      - id: mirai-cred-smcadmin
      - id: mirai-cred-gm8182
      - id: mirai-cred-oelinux
      - id: mirai-cred-hi3518
  - id: telnet-attack
    desc: IoT telnet attack patterns
    crit: notable
    conf: 0.95
