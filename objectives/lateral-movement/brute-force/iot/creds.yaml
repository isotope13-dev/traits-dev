defaults:
  platforms: [unix, windows]
  crit: suspicious
  attack: T1110.001
  mbc: B0028
  for: [scripts, binaries]
traits:
  - id: admin1234
    desc: Default admin credential admin1234
    if:
      type: text
      word: "admin1234"
  - id: busybox-command-injection-1
    desc: Busybox command injection (Bot names)
    if:
      type: text
      regex: /bin/busybox\s+(FASTCAT|ECCHI|MIRAI)
  - id: busybox-applet-probe
    desc: Busybox probe via non-existent applet
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: /bin/busybox\s+[A-Z]{5,10}\b
  - id: shell-injection-pattern-1
    desc: Shell injection pattern (1)
    if:
      type: text
      regex: ^(ping; sh|; sh|/bin/sh;|enable\nshell)$
  - id: shell-injection-pattern-2
    desc: Shell injection pattern (2)
    if:
      type: text
      exact: "system\nshell"
  - id: shell-injection-pattern-3
    desc: Linux shell injection marker
    if:
      type: text
      exact: linuxshell
  - id: dahua-shell-escape
    desc: Dahua DVR shell escape sequence
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: enable\n+system\n+shell\n+sh
composite_rules:
  - id: go-iot-default-credential-bruteforce
    desc: IoT default-credential brute-force workflow
    crit: hostile
    conf: 0.98
    mbc: E1110
    for: [go]
    all:
      - id: micro-behaviors/data/parse/vocabulary::go-credential-list-initializer
      - id: micro-behaviors/data/parse/vocabulary::go-login-field-initializer
      - id: micro-behaviors/data/parse/vocabulary::go-password-field-initializer
      - id: micro-behaviors/data/control-flow/analysis::go-range-over-credential-map
      - id: micro-behaviors/data/parse/vocabulary::go-setauth-credential-call
  - id: busybox-command-injection
    desc: Busybox command injection pattern
    crit: suspicious
    conf: 0.95
    any:
      - id: busybox-command-injection-1
      - id: busybox-applet-probe
  - id: shell-injection-pattern
    desc: Shell injection via service prompt
    crit: suspicious
    conf: 0.9
    any:
      - id: shell-injection-pattern-1
      - id: shell-injection-pattern-2
      - id: shell-injection-pattern-3
      - id: dahua-shell-escape
  - id: iot-credential-spray
    desc: IoT default credential collection
    crit: hostile
    conf: 0.98
    platforms: [linux]
    for: [elf]
    all:
      - id: admin1234
      - id: micro-behaviors/fs/proc/info/path::proc-net-tcp
      - id: objectives/lateral-movement/brute-force/iot-creds::mirai-cred-admin
      - id: micro-behaviors/fs/path/binary::bin-busybox-path
