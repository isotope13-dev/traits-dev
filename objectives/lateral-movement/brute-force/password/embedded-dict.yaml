# Embedded password dictionary in brute-forcer/scanner binaries.
#
# Lateral-spread modules in Linux ransomware (and IoT botnets like
# Mirai variants) embed their password lists as a packed array of
# `&str`s. Stripped from a Go binary, this surfaces as a contiguous
# run of high-frequency weak passwords adjacent to typical brute-force
# username strings (`root`, `admin`, `tomcat`, `redis`). A single
# weak password is ambiguous; 5+ adjacent in a single binary's data
# section is conclusive credential-spraying intent.
defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts]
  attack: T1110.001
  mbc: E1110

traits:
  - id: weak-pass-set-numeric
    desc: Adjacent numeric weak password tokens
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '123456789?.{0,40}111111|111111.{0,40}123456789?'
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      # US keyboard row dump (keylogger keymap), not a password list:
      # "1234567890" sits above "qwertyuiop" on a US layout.
      - type: raw
        regex: '1234567890[\-=\s\t]{0,8}qwerty'
      # Go strconv floating-point precomputed digits table:
      # "...000000000011111111112222012345678901234567890123..." (powers of 5).
      - type: raw
        regex: '00000000001111111111222201234567890'
      - id: well-known/lib/seedfaker::ffi-native-library

  - id: weak-pass-master
    desc: Weak-password token master
    crit: component
    conf: 0.4
    if:
      type: text
      word: master
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - id: well-known/app/drivers/
      - id: well-known/lib/seedfaker::ffi-native-library
      - type: basename
        regex: '^lib(nvidia|nvoptix|cuda|cudadebugger)'
      - id: well-known/app/drivers::gsp-firmware-binary-path
      - id: well-known/app/drivers::arch-nvidia-utils-package
      - id: well-known/app/drivers::ngx-dll-basename
      - id: well-known/lib/regula-facesdk/

  - id: weak-pass-monkey
    desc: Weak-password token monkey
    crit: component
    conf: 0.4
    if:
      type: text
      substr: monkey
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - id: well-known/app/drivers/
      - id: well-known/lib/seedfaker::ffi-native-library
      - id: well-known/lib/regula-facesdk/

  - id: weak-pass-dragon
    desc: Weak-password token dragon
    crit: component
    conf: 0.4
    if:
      type: text
      word: dragon
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - id: well-known/app/drivers/
      - id: well-known/lib/seedfaker::ffi-native-library
      - id: well-known/app/drivers::gsp-firmware-binary-path
      - id: metadata/binary/section/name::fwimage-section
      - id: well-known/lib/regula-facesdk/

  - id: weak-pass-qwerty
    desc: Weak-password token qwerty
    crit: component
    conf: 0.6
    if:
      type: text
      substr: qwerty
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context

  - id: weak-pass-abc123
    desc: Weak-password token abc123
    crit: component
    conf: 0.85
    if:
      type: text
      substr: abc123
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context

  - id: weak-pass-letmein
    desc: Weak-password token letmein
    crit: component
    conf: 0.85
    if:
      type: text
      substr: letmein
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context

  - id: service-account-mysql
    desc: Contains the "mysql" service-account candidate
    crit: component
    conf: 0.85
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - id: metadata/lang/compiler/systems::go-buildinfo
      - type: text
        regex: '(?i)(_SYMBOL_CAPS|_CAPABILITY_HINTS)'
    if:
      type: text
      substr: mysql

  - id: service-account-oracle
    desc: Service-account token oracle
    crit: component
    conf: 0.85
    if:
      type: text
      substr: oracle
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - type: text
        regex: '(?i)(_SYMBOL_CAPS|_CAPABILITY_HINTS)'

  - id: service-account-postgres
    desc: Service-account token postgres
    crit: component
    conf: 0.85
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
      - type: text
        regex: '(?i)(_SYMBOL_CAPS|_CAPABILITY_HINTS)'
    if:
      type: text
      substr: postgres

  - id: service-account-tomcat
    desc: Service-account token tomcat
    crit: component
    conf: 0.85
    if:
      type: text
      substr: tomcat
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename

  - id: service-account-redis
    desc: Service-account token redis
    crit: component
    conf: 0.85
    unless:
      - id: well-known/tool/detection/llm-scanner/
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
    if:
      type: text
      substr: redis

  - id: service-account-ubuntu
    desc: Service-account token ubuntu
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ubuntu
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context

composite_rules:
  - id: weak-pass-set-words
    desc: Adjacent dictionary weak passwords
    crit: notable
    conf: 0.92
    near_bytes: 160
    needs: 3
    any:
      - id: weak-pass-master
      - id: weak-pass-monkey
      - id: weak-pass-dragon
      - id: weak-pass-qwerty
      - id: weak-pass-abc123
      - id: weak-pass-letmein
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - id: well-known/tool/detection/
      - id: well-known/tool/detection/security-scanner/
      - id: metadata/binary/resource/
      - id: micro-behaviors/fs/path/sensitive/credentials::syntax-bundle-context
      - id: well-known/app/aws-vault/
      - id: micro-behaviors/os/security/auth/password::common-password-policy-text
      - id: well-known/lib/regula-facesdk/
      - id: metadata/file/format::web-extension-root-manifest

  - id: weak-pass-set-services
    desc: Adjacent service-account names
    crit: component
    conf: 0.9
    near_bytes: 120
    needs: 3
    any:
      - id: service-account-mysql
      - id: service-account-oracle
      - id: service-account-postgres
      - id: service-account-tomcat
      - id: service-account-redis
      - id: service-account-ubuntu
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - id: micro-behaviors/process/interpreter/vm/
      - id: well-known/tool/detection/sast/
      - id: well-known/tool/detection/llm-scanner/
      - id: metadata/lang/scripted::dts-declaration-file
      - id: metadata/binary/resource/
      - id: micro-behaviors/fs/path/sensitive/credentials::syntax-bundle-context
      - id: well-known/lib/seedfaker::ffi-native-library

  - id: embedded-bruteforce-dictionary
    desc: Embedded brute-force credential dictionary
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: weak-pass-set-numeric
      - id: weak-pass-set-words
      - id: weak-pass-set-services
    unless:
      - id: well-known/tool/detection/security-scanner/
      - id: well-known/tool/detection/security-scanner::wordpress-strong-password-validator
      - id: well-known/tool/detection/security-scanner::wordpress-password-security-scanner
      - id: well-known/app/aws-vault/
      - id: metadata/binary/resource/
      - id: micro-behaviors/fs/path/sensitive/credentials::syntax-bundle-context
      - id: well-known/app/browser-extension-known/
      - id: metadata/package/quality/false-positives::benign-app-fp-context
      - id: well-known/app/kilocode::kilo-code-native-runtime
