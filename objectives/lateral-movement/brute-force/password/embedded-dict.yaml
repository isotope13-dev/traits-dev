# Embedded password dictionary in brute-forcer/scanner binaries.
#
# Lateral-spread modules in Linux ransomware (and IoT botnets like
# Mirai variants) embed their password lists as a packed array of
# `&str`s. Stripped from a Go binary, this surfaces as a contiguous
# run of high-frequency weak passwords adjacent to typical brute-force
# username strings (`root`, `admin`, `tomcat`, `redis`). A single
# weak password is ambiguous; 5+ adjacent in a single binary's data
# section is conclusive credential-spraying intent.
defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts]
  attack: T1110.001
  mbc: E1110

traits:
  - id: weak-pass-set-numeric
    desc: Adjacent numeric weak password tokens
    crit: component
    conf: 0.9
    if:
      type: raw
      regex: '123456789?.{0,40}111111|111111.{0,40}123456789?'
    unless:
      # US keyboard row dump (keylogger keymap), not a password list:
      # "1234567890" sits above "qwertyuiop" on a US layout.
      - type: raw
        regex: '1234567890[\-=\s\t]{0,8}qwerty'
      # Go strconv floating-point precomputed digits table:
      # "...000000000011111111112222012345678901234567890123..." (powers of 5).
      - type: raw
        regex: '00000000001111111111222201234567890'

  - id: weak-pass-master
    desc: Weak password master
    crit: component
    conf: 0.4
    if:
      type: text
      substr: master

  - id: weak-pass-monkey
    desc: Weak password monkey
    crit: component
    conf: 0.4
    if:
      type: text
      substr: monkey

  - id: weak-pass-dragon
    desc: Weak password dragon
    crit: component
    conf: 0.4
    if:
      type: text
      substr: dragon

  - id: weak-pass-qwerty
    desc: Weak password qwerty
    crit: component
    conf: 0.6
    if:
      type: text
      substr: qwerty

  - id: weak-pass-abc123
    desc: Weak password abc123
    crit: component
    conf: 0.85
    if:
      type: text
      substr: abc123

  - id: weak-pass-letmein
    desc: Weak password letmein
    crit: component
    conf: 0.85
    if:
      type: text
      substr: letmein

  - id: service-account-mysql
    desc: Service account mysql
    crit: component
    conf: 0.85
    if:
      type: text
      substr: mysql
    unless:
      - id: metadata/lang/compiler/systems::go-buildinfo

  - id: service-account-oracle
    desc: Service account oracle
    crit: component
    conf: 0.85
    if:
      type: text
      substr: oracle

  - id: service-account-postgres
    desc: Service account postgres
    crit: component
    conf: 0.85
    if:
      type: text
      substr: postgres

  - id: service-account-tomcat
    desc: Service account tomcat
    crit: component
    conf: 0.85
    if:
      type: text
      substr: tomcat

  - id: service-account-redis
    desc: Service account redis
    crit: component
    conf: 0.85
    if:
      type: text
      substr: redis

  - id: service-account-ubuntu
    desc: Service account ubuntu
    crit: component
    conf: 0.85
    if:
      type: text
      substr: ubuntu

composite_rules:
  - id: weak-pass-set-words
    desc: Adjacent dictionary weak passwords
    crit: suspicious
    conf: 0.92
    near_bytes: 160
    needs: 3
    any:
      - id: weak-pass-master
      - id: weak-pass-monkey
      - id: weak-pass-dragon
      - id: weak-pass-qwerty
      - id: weak-pass-abc123
      - id: weak-pass-letmein
    unless:
      - id: objectives/supply-chain/trojanized/app/context::zxcvbn-password-strength-library
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector

  - id: weak-pass-set-services
    desc: Adjacent service-account names
    crit: component
    conf: 0.9
    near_bytes: 120
    needs: 3
    any:
      - id: service-account-mysql
      - id: service-account-oracle
      - id: service-account-postgres
      - id: service-account-tomcat
      - id: service-account-redis
      - id: service-account-ubuntu
    unless:
    - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    - id: well-known/tool/detection/sast::sast-scanner-integration
    - id: well-known/tool/detection/sast::secret-scanner-named-regex
    - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
    - id: metadata/lang/scripted::dts-declaration-file

  - id: embedded-bruteforce-dictionary
    desc: Embedded brute-force credential dictionary
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: weak-pass-set-numeric
      - id: weak-pass-set-words
      - id: weak-pass-set-services
