defaults:
  platforms: [netscaler, appliance, unix]
  for: [scripts, binaries, go, java, kotlin, csharp, swift]
  attack: T1110.001

traits:
  - id: netscaler-default-users
    desc: NetScaler default users
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(nsroot|citrix|nsadmin|superadmin)'

  - id: netscaler-default-passwords
    desc: NetScaler default passwords
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(Citrix123|NetScaler1|nsroot123|welcome1)'

  - id: netscaler-login-path
    desc: NetScaler login path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(/nsconfig/auth/login|/vpn/index\.html|/nitro/v1/config/systemuser/)'

  - id: netscaler-basic-auth-loop
    desc: NetScaler basic auth loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(Authorization|Basic)[\s\S]{0,180}(COMMON_PASSWORDS|COMMON_USERNAMES)'

composite_rules:
  - id: netscaler-default-login-bruteforce
    desc: NetScaler default login brute force
    crit: hostile
    conf: 0.98
    all:
      - id: netscaler-default-users
      - id: netscaler-default-passwords
      - id: netscaler-login-path
    any:
      - id: netscaler-basic-auth-loop
