defaults:
  platforms: [netscaler, appliance, unix]
  for: [scripts, binaries, go, java, kotlin, csharp, swift]
  attack: T1110.001

traits:
  # Bare username words (citrix, superadmin, nsroot) appear in password-cracking
  # wordlists (john) and generic docs — no standalone signal. Building block for
  # the brute-force composite, which also requires the default passwords + the
  # NetScaler login path.
- id: netscaler-login-path
  desc: NetScaler login path
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(/nsconfig/auth/login|/vpn/index\.html|/nitro/v1/config/systemuser/)'

- id: netscaler-basic-auth-loop
  desc: NetScaler basic auth loop
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(Authorization|Basic)[\s\S]{0,180}(COMMON_PASSWORDS|COMMON_USERNAMES)'

- id: netscaler-default-users--nsroot
  desc: NetScaler default users (nsroot)
  crit: component
  conf: 0.9
  if:
    type: text
    word: nsroot
- id: netscaler-default-users--citrix
  desc: NetScaler default users (citrix)
  crit: component
  conf: 0.9
  if:
    type: text
    word: citrix
- id: netscaler-default-users--nsadmin
  desc: NetScaler default users (nsadmin)
  crit: component
  conf: 0.9
  if:
    type: text
    word: nsadmin
- id: netscaler-default-users--superadmin
  desc: NetScaler default users (superadmin)
  crit: component
  conf: 0.9
  if:
    type: text
    word: superadmin
- id: netscaler-default-passwords--citrix123
  desc: NetScaler default passwords (Citrix123)
  crit: component
  conf: 0.9
  if:
    type: text
    word: Citrix123
- id: netscaler-default-passwords--netscaler1
  desc: NetScaler default passwords (NetScaler1)
  crit: component
  conf: 0.9
  if:
    type: text
    word: NetScaler1
- id: netscaler-default-passwords--nsroot123
  desc: NetScaler default passwords (nsroot123)
  crit: component
  conf: 0.9
  if:
    type: text
    word: nsroot123
- id: netscaler-default-passwords--welcome1
  desc: NetScaler default passwords (welcome1)
  crit: component
  conf: 0.9
  if:
    type: text
    word: welcome1
composite_rules:
- id: netscaler-default-users
  desc: NetScaler default users
  crit: component
  conf: 0.9
  any:
  - id: netscaler-default-users--nsroot
  - id: netscaler-default-users--citrix
  - id: netscaler-default-users--nsadmin
  - id: netscaler-default-users--superadmin
- id: netscaler-default-passwords
  desc: NetScaler default passwords
  crit: component
  conf: 0.9
  any:
  - id: netscaler-default-passwords--citrix123
  - id: netscaler-default-passwords--netscaler1
  - id: netscaler-default-passwords--nsroot123
  - id: netscaler-default-passwords--welcome1
- id: netscaler-default-login-bruteforce
  desc: NetScaler default login brute force
  crit: hostile
  conf: 0.98
  all:
  - id: netscaler-default-users
  - id: netscaler-default-passwords
  - id: netscaler-login-path
  any:
  - id: netscaler-basic-auth-loop
