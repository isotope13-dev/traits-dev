defaults:
  platforms: [windows]
  for: [pe]
  attack: T1110

traits:
  - id: portainer-brute-worker-module
    desc: Portainer credential brute worker
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "virtualworkers/portainerbrut"

  - id: portainer-credential-check-module
    desc: Portainer credential check worker
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: "virtualworkers/portainercheck"

  - id: portainer-valid-credential-result
    desc: Portainer valid credential result
    crit: suspicious
    conf: 0.99
    if:
      type: text
      substr: "portainerBrut valid credentials"

composite_rules:
  - id: portainer-credential-brute-force
    desc: Portainer credential brute force
    crit: hostile
    conf: 0.99
    all:
      - id: portainer-brute-worker-module
      - id: portainer-credential-check-module
      - id: portainer-valid-credential-result
