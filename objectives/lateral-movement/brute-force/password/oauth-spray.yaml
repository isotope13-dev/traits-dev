defaults:
  platforms: [unix, windows]
  for: [python, shell]
  attack: T1110.003
  mbc: E1110

traits:
  - id: oauth-user-password-fields
    desc: OAuth username/password fields
    # A single auth client request body with username/password fields is normal
    # API-client behavior. The spray objective is the composite below, where the
    # fields are paired with password-grant and spray list evidence.
    crit: component
    conf: 0.92
    for: [python]
    if:
      type: text
      regex: 'username["'']?\s*:\s*user[\s\S]{0,120}password["'']?\s*:\s*password'

  - id: spray-user-password-list-env
    desc: Spray user/password list environment
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'SPRAY_USERS_FILE[\s\S]{0,220}SPRAY_PASSES_FILE'

  - id: spray-delay-env
    desc: Password-spray delay environment
    crit: component
    conf: 0.9
    if:
      type: text
      substr: SPRAY_DELAY

  - id: spray-jitter-env
    desc: Password-spray jitter environment
    crit: component
    conf: 0.9
    if:
      type: text
      substr: SPRAY_JITTER

  - id: spray-randomized-round-wait
    desc: Password-spray randomized round wait
    crit: component
    conf: 0.9
    for: [python]
    if:
      type: text
      regex: 'delay\s*\+\s*random\.randint\(\s*-jitter'

  - id: trevorspray-dispatch
    desc: TREVORspray credential attack dispatch
    crit: suspicious
    conf: 0.95
    for: [shell]
    if:
      type: text
      regex: '\btrevorspray\b[\s\S]{0,240}--users[\s\S]{0,120}--passlist'

composite_rules:
  - id: oauth-password-grant-spray
    desc: OAuth password-grant credential spray
    crit: hostile
    conf: 0.98
    for: [python]
    all:
      - id: micro-behaviors/communications/http/oauth::password-grant-type
      - id: oauth-user-password-fields
      - id: micro-behaviors/communications/http/oauth::access-token-presence-check
      - id: spray-user-password-list-env
    any:
      - id: spray-randomized-round-wait
      - id: micro-behaviors/communications/socket/ssl::tls-validation-fully-disabled

  - id: credential-spray-orchestrator
    desc: Credential-spray orchestrator
    crit: hostile
    conf: 0.98
    for: [shell]
    all:
      - id: spray-user-password-list-env
      - id: spray-delay-env
      - id: spray-jitter-env
    any:
      - id: trevorspray-dispatch
      - id: spray-randomized-round-wait
