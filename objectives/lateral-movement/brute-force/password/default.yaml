defaults:
  platforms:
    - unix
    - android
  for:
    - elf
traits:
  - id: numeric-123456
    desc: 'Default credential: 123456'
    crit: component
    conf: 0.8
    attack: T1110.001
    count_min: 2
    if:
      type: text
      exact: '123456'
  - id: literal-password
    desc: 'Default credential: password'
    crit: notable
    conf: 0.4
    attack: T1110.001
    if:
      type: text
      regex: ([\x00-\x1f]password[\x00-\x1f]?)
  - id: admin123
    desc: 'Default credential: admin123'
    crit: suspicious
    conf: 0.85
    attack: T1110.001
    if:
      type: text
      substr: admin123
  - id: qwerty123-script
    desc: 'Default credential: qwerty123'
    crit: suspicious
    conf: 0.55
    attack: T1110.001
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: '(^|[^A-Za-z0-9])qwerty123([^A-Za-z0-9]|$)'
  - id: qwerty-script
    desc: 'Default credential: qwerty'
    crit: suspicious
    conf: 0.5
    attack: T1110.001
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: '(^|[^A-Za-z0-9])qwerty([^A-Za-z0-9]|$)'
  - id: literal-default
    desc: 'Default credential: default'
    crit: suspicious
    conf: 0.5
    attack: T1110.001
    size_max: 5242880
    if:
      type: text
      regex: '[\x00-\x1f]default[\x00-\x1f]?'
  - id: guest
    desc: 'Default credential: guest'
    crit: suspicious
    conf: 0.7
    attack: T1110.001
    if:
      type: text
      regex: ([\x00-\x1f]guest[\x00-\x1f]?)
  - id: iot-pte521
    desc: 'Default IoT credential: Pte521'
    crit: suspicious
    conf: 0.9
    attack: T1110.001
    if:
      type: text
      substr: Pte521
  - id: iot-pon521
    desc: 'Default IoT credential: Pon521'
    crit: suspicious
    conf: 0.9
    attack: T1110.001
    if:
      type: text
      substr: Pon521
  - id: iot-zxic521
    desc: 'Default IoT credential: Zxic521'
    crit: suspicious
    conf: 0.9
    attack: T1110.001
    if:
      type: text
      substr: Zxic521
  - id: credential-wordlist-1
    desc: Dense credential wordlist (admin/root/password/default)
    crit: notable
    conf: 0.7
    count_min: 8
    if:
      type: text
      regex: '[\x00-\x1f](admin|root|password|default)[\x00-\x1f]?'
  - id: credential-wordlist-2
    desc: Dense credential wordlist (guest/user/1234/qwerty)
    crit: suspicious
    conf: 0.7
    count_min: 8
    if:
      type: text
      regex: '[\x00-\x1f](guest|user|1234|qwerty)[\x00-\x1f]?'
composite_rules:
  - id: credential-wordlist
    desc: Dense credential wordlist (brute-force dictionary)
    crit: suspicious
    conf: 0.92
    attack: T1110.001
    size_max: 200000
    unless:
      - id: metadata/package/help::usage-help
    any:
      - id: credential-wordlist-1
      - id: credential-wordlist-2
  - id: iot-zte
    desc: 'Default IoT credential: ZTE router'
    crit: suspicious
    conf: 0.95
    attack: T1110.001
    any:
      - id: objectives/lateral-movement/brute-force/iot-creds::router-cred-zte
      - id: iot-pte521
      - id: iot-pon521
      - id: iot-zxic521
  - id: dictionary
    desc: Embedded credential brute-force dictionary
    crit: suspicious
    conf: 0.9
    mbc: E1040
    attack: T1110.001
    needs: 4
    any:
      - id: micro-behaviors/data/text/keywords/username
      - id: guest
      - id: numeric-123456
      - id: literal-password
      - id: admin123
      - id: literal-default
      - id: qwerty123-script
      - id: qwerty-script
  - id: telnet-combo
    desc: Telnet username:password combo format
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    size_max: 100000
    unless:
      - id: micro-behaviors/communications/http/download/curl::curl-easy-init
      - id: credential-wordlist
