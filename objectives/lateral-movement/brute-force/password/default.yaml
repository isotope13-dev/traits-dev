defaults:
  platforms:
    - unix
    - android
  for:
    - elf
traits:
  - id: numeric-123456
    desc: 'Default credential: 123456'
    crit: component
    conf: 0.8
    attack: T1110.001
    count_min: 2
    if:
      type: text
      exact: '123456'
  - id: literal-password
    desc: 'Default credential: password'
    crit: component
    conf: 0.4
    attack: T1110.001
    if:
      type: text
      regex: ([\x00-\x1f]password[\x00-\x1f]?)
  - id: admin123
    desc: 'Default credential literal: admin123'
    crit: component
    conf: 0.65
    attack: T1110.001
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])admin123([^A-Za-z0-9_]|$)'
  # A lone common-password literal is a building block, not standalone intent:
  # it appears identically in brute-force wordlists, config defaults, test
  # fixtures, password-strength blocklists, and API docstring examples. Brute-force
  # intent comes from the `dictionary` composite (needs 4 creds), matching the
  # sibling `qwerty-script`/`admin123` atoms.
  - id: qwerty123-script
    desc: 'Default credential literal: qwerty123'
    crit: component
    conf: 0.55
    attack: T1110.001
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: '(^|[^A-Za-z0-9])qwerty123([^A-Za-z0-9]|$)'
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - id: well-known/lib/web-ui-vendors::redoc-library
      - type: text
        regex: 'COMMON_PASSWORDS[\s\S]{0,1200}qwerty123'
      - type: text
        regex: 'checkPasswordStrength[\s\S]{0,1600}qwerty123'
  - id: qwerty-script
    desc: 'Default credential: qwerty'
    crit: component
    conf: 0.5
    attack: T1110.001
    for:
      - python
      - javascript
    if:
      type: string_literal
      regex: '(^|[^A-Za-z0-9])qwerty([^A-Za-z0-9]|$)'
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
      - id: well-known/lib/web-ui-vendors::redoc-library
      - id: metadata/package/testing/presence/harness::python-test-file
      - id: metadata/package/testing/presence/harness/
  - id: literal-default
    desc: 'Default credential: default'
    crit: component
    conf: 0.5
    attack: T1110.001
    size_max: 5242880
    if:
      type: text
      regex: '[\x00-\x1f]default[\x00-\x1f]?'
    unless:
      - id: well-known/tool/sysadmin/busybox::busybox-binary
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: guest
    desc: 'Default credential: guest'
    crit: suspicious
    conf: 0.7
    attack: T1110.001
    if:
      type: text
      regex: ([\x00-\x1f]guest[\x00-\x1f]?)
    unless:
      # Samba/SMB share-permission vocabulary ("guest ok", "guest_ok=",
      # "usershare allow guests", "lp_guest_account") is not a brute-force
      # credential token. A real dictionary embeds bare "guest", never these.
      - type: text
        regex: 'guest[ _]ok|guest_account|allow_guests'
      - type: text
        regex: 'allow guests|Guest user'
      - id: well-known/app/aws-vault/
      - id: well-known/tool/sysadmin/virtualization::lima-virtualization-tool
      - id: well-known/tool/sysadmin/alpine-packages::alpine-filebrowser-binary
  - id: iot-pte521
    desc: 'Default IoT credential: Pte521'
    crit: suspicious
    conf: 0.9
    attack: T1110.001
    if:
      type: text
      substr: Pte521
  - id: iot-pon521
    desc: 'Default IoT credential: Pon521'
    crit: suspicious
    conf: 0.9
    attack: T1110.001
    if:
      type: text
      substr: Pon521
  - id: iot-zxic521
    desc: 'Default IoT credential: Zxic521'
    crit: suspicious
    conf: 0.9
    attack: T1110.001
    if:
      type: text
      substr: Zxic521
  - id: credential-wordlist-1
    desc: "Dense cred wordlist"
    crit: component
    conf: 0.7
    count_min: 8
    if:
      type: text
      regex: '[\x00-\x1f](admin|root|password|default)[\x00-\x1f]?'
  - id: credential-wordlist-2
    desc: "Dense credential wordlist"
    crit: component
    conf: 0.7
    count_min: 8
    if:
      type: text
      regex: '[\x00-\x1f](guest|user|1234|qwerty)[\x00-\x1f]?'
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::go-binary
  - id: weak-pass-admin123-upper
    desc: Weak password Admin123
    crit: notable
    conf: 0.5
    attack: T1110.001
    for:
      - python
      - javascript
    if:
      type: string_literal
      substr: Admin123
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
  - id: weak-pass-passw0rd
    desc: Weak password Passw0rd
    crit: notable
    conf: 0.7
    attack: T1110.001
    for:
      - python
      - javascript
    if:
      type: string_literal
      substr: Passw0rd
    unless:
      - id: metadata/package/quality/profile::password-strength-blocklist-context
composite_rules:
  - id: credential-wordlist
    desc: Dense credential wordlist (brute-force dictionary)
    crit: suspicious
    conf: 0.92
    attack: T1110.001
    size_max: 200000
    unless:
      - id: micro-behaviors/ui/help::usage-help
    any:
      - id: credential-wordlist-1
      - id: credential-wordlist-2
  - id: iot-zte
    desc: 'Default IoT credential: ZTE router'
    crit: suspicious
    conf: 0.95
    attack: T1110.001
    any:
      - id: objectives/lateral-movement/brute-force/iot-creds::router-cred-zte
      - id: iot-pte521
      - id: iot-pon521
      - id: iot-zxic521
  - id: dictionary
    desc: Embedded credential brute-force dictionary
    crit: suspicious
    conf: 0.9
    mbc: E1040
    attack: T1110.001
    needs: 4
    unless:
      - id: well-known/app/aws-vault/
      - id: well-known/tool/sysadmin/alpine-packages::alpine-filebrowser-binary
    any:
      - id: objectives/discovery/account/keywords
      - id: guest
      - id: numeric-123456
      - id: literal-password
      - id: admin123
      - id: literal-default
      - id: qwerty123-script
      - id: qwerty-script
  - id: telnet-combo
    desc: Telnet username:password combo format
    crit: suspicious
    conf: 0.8
    attack: T1110.001
    size_max: 100000
    unless:
      - id: micro-behaviors/communications/http/download/curl::curl-easy-init
      - id: objectives/lateral-movement/brute-force/password/
