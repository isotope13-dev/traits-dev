defaults:
  platforms: [qnx, unix]
  for: [cpp]
  attack: T1110.001

traits:
  - id: qnx-cpp-xor-cred-store
    desc: QNX C++ XOR credential store
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "static const unsigned char cred_store[]"

  - id: qnx-cpp-cred-table
    desc: QNX C++ credential offset table
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "static const cred_entry cred_table[]"

  - id: qnx-cpp-decodes-root-password
    desc: QNX C++ decodes root/password
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'decode_cred\(&cred_table\[0\][\s\S]{0,180}decode_cred\(&cred_table\[5\]'

  - id: qnx-cpp-bruteforce-phase-decl
    desc: QNX C++ bruteforce phase decl
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "void brute_force_attack(void);"

  - id: qnx-cpp-phase2-call
    desc: QNX C++ phase[2] call
    crit: component
    conf: 0.95
    if:
      type: text
      substr: "phases[2]();"

composite_rules:
  - id: qnx-cpp-encoded-cred-table
    desc: QNX C++ encoded credential table
    crit: suspicious
    conf: 0.96
    all:
      - id: qnx-cpp-xor-cred-store
      - id: qnx-cpp-cred-table

  - id: qnx-cpp-bruteforce-phase
    desc: QNX C++ bruteforce phase call
    crit: suspicious
    conf: 0.96
    all:
      - id: qnx-cpp-bruteforce-phase-decl
      - id: qnx-cpp-phase2-call

  - id: qnx-cpp-encoded-bruteforce
    desc: QNX C++ encoded bruteforce phase
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-cpp-encoded-cred-table
      - id: qnx-cpp-decodes-root-password
      - id: qnx-cpp-bruteforce-phase
