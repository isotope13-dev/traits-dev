defaults:
  platforms: [unix, windows, macos]
composite_rules:
  - id: custom-wordlist-pdf-bigram
    desc: Helper for custom wordlist generator (PDF + Bigram)
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/data/format/pdf
      - id: micro-behaviors/data/parse/analysis::bigram-generation
  - id: custom-wordlist-secondary
    desc: Helper for custom wordlist generator (Dict override OR PDF+Bigram)
    crit: suspicious
    conf: 0.8
    any:
      - id: micro-behaviors/fs/path/system::suspicious-dict-override
      - id: custom-wordlist-pdf-bigram
  - id: custom-wordlist-generator
    desc: Custom wordlist generator using document analysis
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/data/parse/analysis::nlp-tokenization
      - id: custom-wordlist-secondary
