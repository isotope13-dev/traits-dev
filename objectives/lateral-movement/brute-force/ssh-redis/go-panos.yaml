defaults:
  platforms: [panos, appliance, unix]
  for: [go, elf]
  attack: T1110.001

traits:
  - id: go-panos-ssh-admin-password
    desc: Go PAN-OS SSH admin password
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'admin[\s\S]{0,120}password'

  - id: go-panos-redis-authorized-keys
    desc: Go PAN-OS Redis authorized keys
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: CONFIG SET dbfilename authorized_keys

  - id: go-panos-ssh-brute-force-func
    desc: Go PAN-OS SSH brute force func
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sshBruteForce

  - id: go-panos-redis-exploit-func
    desc: Go PAN-OS Redis exploit func
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: exploitRedis

composite_rules:
  - id: go-panos-ssh-credential-spread
    desc: Go PAN-OS SSH credential spread
    crit: hostile
    conf: 0.98
    all:
      - id: go-panos-ssh-admin-password
      - id: go-panos-redis-authorized-keys

  - id: go-panos-ssh-redis-spread
    desc: Go PAN-OS SSH Redis spread
    crit: hostile
    conf: 0.98
    all:
      - id: go-panos-ssh-brute-force-func
      - id: go-panos-redis-exploit-func
