defaults:
  platforms: [unix]
  for: [perl]
  attack: T1110.001

traits:
  - id: perl-common-user-list
    desc: Perl common user list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: my @common_users = qw(

  - id: perl-common-password-list
    desc: Perl common password list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: my @common_passwords = qw(

  - id: perl-ssh-port-socket-loop
    desc: Perl SSH port socket loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'IO::Socket::INET->new\([\s\S]{0,200}PeerPort => \$TARGET_PORT'

  - id: perl-ssh-userauth-packet
    desc: Perl SSH userauth packet
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: userauth-request

composite_rules:
  - id: perl-raw-ssh-bruteforce
    desc: Perl raw SSH brute force
    crit: hostile
    conf: 0.98
    all:
      - id: perl-common-user-list
      - id: perl-common-password-list
      - id: perl-ssh-port-socket-loop
      - id: perl-ssh-userauth-packet
