defaults:
  platforms: [openwrt]
  for: [c, cpp, objc, elf]
  attack: T1110.001
  mbc: E1110

traits:
  - id: native-ssh-bruteforcer-class
    desc: Native SSH brute forcer class
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: SSHBruteForcer
  - id: native-ssh-attempt-limit
    desc: Native SSH attempt limit
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: MAX_SSH_ATTEMPTS
  - id: native-ssh-client-banner
    desc: Native SSH client banner
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: SSH-2.0-OpenSSH
  - id: native-router-users-list
    desc: Native router user list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '"root".{0,80}"admin".{0,80}"ubnt"'
  - id: native-router-passwords-list
    desc: Native router password list
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '"password".{0,80}"admin".{0,80}"root"'

composite_rules:
  - id: openwrt-native-ssh-bruteforce
    desc: OpenWrt native SSH brute force
    crit: hostile
    conf: 0.97
    all:
      - id: native-ssh-bruteforcer-class
      - id: native-ssh-attempt-limit
      - id: native-ssh-client-banner
      - id: native-router-users-list
      - id: native-router-passwords-list
