defaults:
  attack: T1021.004
  mbc: B0040
  for: [binaries]
  platforms: [linux, unix]

traits:
  - id: spirit-scanner-binary
    desc: Spirit scanner binary staged
    crit: suspicious
    conf: 0.96
    for: [none]
    if:
      type: string
      exact: "spirit/tar/usr/spirit/spirit"

  - id: spirit-scanner-arm-binary
    desc: Spirit ARM scanner staged
    crit: suspicious
    conf: 0.96
    for: [none]
    if:
      type: string
      exact: "spirit/tar/usr/spirit/spirit-arm"

  - id: spirit-sshpass-binary
    desc: Spirit sshpass binary staged
    crit: suspicious
    conf: 0.95
    for: [none]
    if:
      type: string
      exact: "spirit/tar/usr/spirit/sshpass"

  - id: spirit-sshpass-arm-binary
    desc: Spirit ARM sshpass staged
    crit: suspicious
    conf: 0.95
    for: [none]
    if:
      type: string
      exact: "!spirit/tar/usr/spirit/sshpass-arm"

  - id: spirit-password-list
    desc: Spirit password list staging
    crit: suspicious
    conf: 0.93
    for: [none]
    if:
      type: string
      exact: "spirit/tar/usr/spirit/typical"

  - id: spirit-installer-script
    desc: Spirit installer script staging
    crit: notable
    conf: 0.92
    for: [none]
    if:
      type: string
      exact: "spirit/tar/usr/spirit/spirit.sh"

composite_rules:
  - id: spirit-ssh-bruteforce-bundle
    desc: Spirit SSH brute-force propagation bundle
    crit: hostile
    conf: 0.98
    for: [none]
    all:
      - id: spirit-scanner-binary
      - id: spirit-scanner-arm-binary
      - id: spirit-sshpass-binary
      - id: spirit-sshpass-arm-binary
      - id: spirit-password-list
      - id: spirit-installer-script
