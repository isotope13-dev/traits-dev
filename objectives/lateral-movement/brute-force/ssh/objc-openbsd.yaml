defaults:
  platforms: [openbsd, bsd, unix]
  for: [objc, elf]
  attack: T1110.001

traits:
  - id: objc-ssh-brute-force-call
    desc: ObjC SSH brute force call
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: ssh_brute_force

  - id: objc-ssh-password-auth-line
    desc: ObjC SSH password auth line
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: userauth-password %s %s

  - id: objc-openbsd-ssh-client-banner
    desc: ObjC OpenBSD SSH client banner
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: SSH-2.0-OpenSSH_9.4

  - id: objc-openbsd-default-passwords
    desc: ObjC OpenBSD default passwords
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: 'password[\s\S]{0,120}admin[\s\S]{0,120}root[\s\S]{0,120}letmein'

composite_rules:
  - id: objc-openbsd-ssh-brute-force
    desc: ObjC SSH brute force
    crit: hostile
    conf: 0.98
    all:
      - id: objc-ssh-brute-force-call
      - id: objc-ssh-password-auth-line
      - id: objc-openbsd-ssh-client-banner

  - id: objc-openbsd-ssh-password-spray
    desc: ObjC SSH password spray
    crit: hostile
    conf: 0.98
    all:
      - id: objc-openbsd-ssh-client-banner
      - id: objc-ssh-password-auth-line
      - id: objc-openbsd-default-passwords
