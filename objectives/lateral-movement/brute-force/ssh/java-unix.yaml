defaults:
  platforms: [unix]
  for: [java, class, jar]
  attack: T1110.001

traits:
  - id: java-sshpass-password-loop
    desc: Java sshpass password loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'sshpass[\s\S]{0,220}StrictHostKeyChecking=no[\s\S]{0,220}echo SUCCESS'

  - id: java-ssh-users-passwords
    desc: Java SSH user password lists
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'String\[\]\s+users[\s\S]{0,420}String\[\]\s+passwords'

  - id: java-ssh-authorized-key-write
    desc: Java writes SSH authorized key
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'authorized_keys[\s\S]{0,260}ssh-rsa'

composite_rules:
  - id: java-sshpass-bruteforce
    desc: Java sshpass brute force
    crit: hostile
    conf: 0.98
    all:
      - id: java-sshpass-password-loop
    any:
      - id: java-ssh-users-passwords
      - id: objectives/lateral-movement/brute-force/password::weak-pass-set-words

  - id: java-ssh-bruteforce-key-backdoor
    desc: Java SSH brute force backdoor
    crit: hostile
    conf: 0.98
    all:
      - id: java-sshpass-bruteforce
      - id: java-ssh-authorized-key-write
