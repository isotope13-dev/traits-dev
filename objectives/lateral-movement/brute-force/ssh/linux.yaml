defaults:
  platforms: [unix, android]
  for: [scripts, binaries]
traits:
- id: ssh-scanner-name
  desc: ssh_scanner identifier
  crit: suspicious
  conf: 0.8
  attack: T1046
  if:
    type: text
    substr: ssh_scanner
- id: scanner-target-name
  desc: scanner_target identifier
  crit: suspicious
  conf: 0.8
  attack: T1046
  if:
    type: text
    substr: scanner_target
  unless:
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/tool/detection/security-scanner/
- id: india-at-123
  desc: India@123 credential string
  crit: component
  conf: 0.95
  attack: T1110.001
  if:
    type: text
    exact: India@123
- id: weak-login-pair-set--rx-1
  desc: postgres in credential/user collection
  crit: component
  conf: 0.82
  if:
    type: text
    regex: "\\b(credential|user|login)\\w*\\s*[:=]\\s*[\\[(][^\\n]{0,160}['\"]postgres['\"]"
  count_max: 1029409
- id: weak-login-pair-set--rx-2
  desc: ubuntu in credential/user collection
  crit: component
  conf: 0.82
  if:
    type: text
    regex: "\\b(credential|user|login)\\w*\\s*[:=]\\s*[\\[(][^\\n]{0,160}['\"]ubuntu['\"]"
  count_max: 1029410
- id: weak-login-pair-set--rx-3
  desc: admin in credential/user collection
  crit: component
  conf: 0.82
  if:
    type: text
    regex: "\\b(credential|user|login)\\w*\\s*[:=]\\s*[\\[(][^\\n]{0,160}['\"]admin['\"]"
  count_max: 1029411
- id: weak-login-pair-set--rx-4
  desc: root in credential/user collection
  crit: component
  conf: 0.82
  if:
    type: text
    regex: "\\b(credential|user|login)\\w*\\s*[:=]\\s*[\\[(][^\\n]{0,160}['\"]root['\"]"
  count_max: 1029412
composite_rules:
- id: embedded-ssh-credential-set
  desc: Embedded SSH brute-force credential set
  crit: suspicious
  conf: 0.92
  attack: T1110.001
  any:
  - id: objectives/lateral-movement/brute-force/password::dictionary
  - id: objectives/lateral-movement/brute-force/ssh::iot-credential-access
  - id: india-at-123
  - id: weak-login-pair-set
  unless:
  - id: well-known/app/kilocode::kilo-code-native-runtime
  - id: well-known/tool/sysadmin/alpine-packages::alpine-filebrowser-binary
- id: ssh-scanner-telemetry
  desc: SSH scanner telemetry
  crit: suspicious
  conf: 0.84
  any:
  - id: ssh-scanner-name
  - id: scanner-target-name
  - id: objectives/lateral-movement/brute-force/ssh::scanner-comp
- id: internet-ssh-scanner
  desc: Internet SSH brute-force scanner
  crit: suspicious
  conf: 0.95
  attack: T1110.001
  all:
  - id: micro-behaviors/communications/ssh/connect::connect-comp
  - id: ssh-scanner-telemetry
  - id: embedded-ssh-credential-set
  - id: micro-behaviors/communications/ssh/connect::port-22-ref
- id: weak-login-pair-set
  desc: Weak login usernames cluster
  crit: component
  conf: 0.82
  attack: T1110.001
  any:
  - id: weak-login-pair-set--rx-1
  - id: weak-login-pair-set--rx-2
  - id: weak-login-pair-set--rx-3
  - id: weak-login-pair-set--rx-4
  - id: objectives/discovery/account/keywords::root-keyword
  needs: 3
  unless:
  - id: micro-behaviors/process/interpreter/vm/
  - id: well-known/tool/detection/sast/
