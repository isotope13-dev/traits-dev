defaults:
  platforms: [unix, android]
  for: [scripts, binaries]
traits:
- id: ssh-scanner-name
  desc: ssh_scanner identifier
  crit: suspicious
  conf: 0.8
  attack: T1046
  if:
    type: text
    substr: ssh_scanner
- id: scanner-target-name
  desc: scanner_target identifier
  crit: suspicious
  conf: 0.8
  attack: T1046
  if:
    type: text
    substr: scanner_target
  unless:
  - id: well-known/tool/detection/security-scanner::defensive-wordpress-security-plugin
  - id: well-known/tool/detection/security-scanner::wordpress-suspicious-file-patterns
- id: india-at-123
  desc: India@123 credential string
  crit: component
  conf: 0.95
  attack: T1110.001
  if:
    type: text
    exact: India@123
- id: weak-login-pair-set--rx-1
  desc: postgres in credential list literal
  crit: component
  conf: 0.82
  if:
    type: text
    regex: "['\"]postgres['\"]\\s*(=>|,|\\]|\\))"
  count_max: 1029409
- id: weak-login-pair-set--rx-2
  desc: ubuntu in credential list literal
  crit: component
  conf: 0.82
  if:
    type: text
    regex: "['\"]ubuntu['\"]\\s*(=>|,|\\]|\\))"
  count_max: 1029410
- id: weak-login-pair-set--rx-3
  desc: admin in credential list literal
  crit: component
  conf: 0.82
  if:
    type: text
    regex: "['\"]admin['\"]\\s*(=>|,|\\]|\\))"
  count_max: 1029411
- id: weak-login-pair-set--rx-4
  desc: root in credential list literal
  crit: component
  conf: 0.82
  if:
    type: text
    regex: "['\"]root['\"]\\s*(=>|,|\\]|\\))"
  count_max: 1029412
composite_rules:
- id: embedded-ssh-credential-set
  desc: Embedded SSH brute-force credential set
  crit: suspicious
  conf: 0.92
  attack: T1110.001
  any:
  - id: objectives/lateral-movement/brute-force/password::dictionary
  - id: objectives/lateral-movement/brute-force/ssh::iot-credential-access
  - id: india-at-123
  - id: weak-login-pair-set
- id: ssh-scanner-telemetry
  desc: SSH scanner telemetry
  crit: suspicious
  conf: 0.84
  any:
  - id: ssh-scanner-name
  - id: scanner-target-name
  - id: objectives/lateral-movement/brute-force/ssh::scanner-comp
- id: internet-ssh-scanner
  desc: Internet SSH brute-force scanner
  crit: suspicious
  conf: 0.95
  attack: T1110.001
  all:
  - id: micro-behaviors/communications/ssh/connect::connect-comp
  - id: ssh-scanner-telemetry
  - id: embedded-ssh-credential-set
  - id: micro-behaviors/communications/ssh/connect::port-22-ref
- id: weak-login-pair-set
  desc: Weak login usernames cluster
  crit: component
  conf: 0.82
  attack: T1110.001
  any:
  - id: weak-login-pair-set--rx-1
  - id: weak-login-pair-set--rx-2
  - id: weak-login-pair-set--rx-3
  - id: weak-login-pair-set--rx-4
  - id: objectives/discovery/account/keywords::root-keyword
  needs: 3
  unless:
  - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
  - id: well-known/tool/detection/sast::sast-scanner-integration
