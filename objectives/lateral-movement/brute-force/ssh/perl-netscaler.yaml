defaults:
  platforms: [netscaler, appliance, unix]
  for: [perl]
  attack: T1110.001

traits:
  - id: perl-netscaler-ssh-users
    desc: Perl NetScaler SSH users
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'qw\(admin root nsroot citrix operator\)'

  - id: perl-netscaler-ssh-passwords
    desc: Perl NetScaler SSH passwords
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'qw\([\s\S]{0,160}(Citrix123|P@ssw0rd|changeme)'

  - id: perl-ssh-banner-auth-send
    desc: Perl SSH auth send
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: userauth

composite_rules:
  - id: perl-netscaler-ssh-bruteforce
    desc: Perl NetScaler SSH brute force
    crit: hostile
    conf: 0.98
    all:
      - id: perl-netscaler-ssh-users
      - id: perl-netscaler-ssh-passwords
    any:
      - id: perl-ssh-banner-auth-send
