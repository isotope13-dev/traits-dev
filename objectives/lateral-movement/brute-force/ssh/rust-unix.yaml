defaults:
  platforms: [unix]
  for: [rust, macho, elf]
  attack: T1021.004

traits:
  - id: rust-ssh-key-pivot
    desc: Rust SSH key pivot
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: StrictHostKeyChecking=no

  - id: rust-private-key-list
    desc: Rust private key list
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'id_rsa[\s\S]{0,120}id_ecdsa[\s\S]{0,120}id_ed25519'
    unless:
      - type: text
        substr: is_sensitive_input_path
      - type: text
        substr: SENSITIVE_FILENAMES
      - type: text
        substr: approval_for_sensitive_read
      - type: text
        substr: sensitive read outside workspace

composite_rules:
  - id: rust-ssh-key-lateral-pivot
    desc: Rust SSH key lateral pivot
    crit: hostile
    conf: 0.98
    all:
      - id: rust-ssh-key-pivot
      - id: rust-private-key-list
