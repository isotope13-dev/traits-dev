defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1021.004

traits:
  - id: ruby-net-ssh-root-password
    desc: Ruby Net::SSH root password
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Net::SSH\.start[\s\S]{0,260}root[\s\S]{0,260}password:'

  - id: ruby-remote-recon-commands
    desc: Ruby remote recon commands
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'cat /etc/passwd[\s\S]{0,220}cat /etc/shadow[\s\S]{0,220}find / -perm -4000'

  - id: ruby-remote-reverse-shell-drop
    desc: Ruby drops remote reverse shell
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/tmp/\.update_agent\.sh[\s\S]{0,260}bash -i >& /dev/tcp'

composite_rules:
  - id: ruby-ssh-lateral-recon
    desc: Ruby SSH lateral recon
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-net-ssh-root-password
      - id: ruby-remote-recon-commands
    any:
      - id: ruby-remote-reverse-shell-drop
