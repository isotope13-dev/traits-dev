defaults:
  platforms: [freebsd, unix, windows]
  for: [csharp, pe]
  attack: T1110.001

traits:
  - id: dotnet-renci-password-connection
    desc: .NET Renci SSH password login
    crit: suspicious
    conf: 0.93
    platforms: [iosxe, unix, windows]
    if:
      type: text
      regex: 'Renci\.SshNet[\s\S]{0,900}PasswordConnectionInfo'

  - id: dotnet-sshclient-connect-loop
    desc: .NET SSH client connect loop
    crit: suspicious
    conf: 0.91
    platforms: [iosxe, unix, windows]
    if:
      type: text
      substr: new SshClient(connInfo)

  - id: dotnet-network-device-ssh-commands
    desc: .NET network device SSH commands
    crit: suspicious
    conf: 0.93
    platforms: [iosxe, unix, windows]
    if:
      type: text
      regex: 'show running-config[\s\S]{0,800}show (version|ip interface brief)'

  - id: dotnet-raw-ssh-auth-packets
    desc: .NET raw SSH auth packet strings
    crit: component
    conf: 0.94
    if:
      type: trait
      id: micro-behaviors/communications/ssh/client::ssh2-userauth-request

  - id: dotnet-ssh-bruteforce-function
    desc: .NET SSH brute-force function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: BruteForceSSH

  # Bare uppercase USERNAMES / PASSWORDS tokens appear in ordinary resource
  # strings and dialog identifiers (e.g. WinRAR's ORGPASSWORDS,
  # IDC_INFOPASSWORDSTEXT). They carry SSH-brute-force intent only alongside the
  # SSH-specific markers below, so they are component-level building blocks, not
  # standalone suspicious findings.
  - id: dotnet-ssh-username-dictionary
    desc: .NET SSH username dictionary
    crit: component
    conf: 0.92
    if:
      type: text
      substr: USERNAMES

  - id: dotnet-ssh-password-dictionary
    desc: .NET SSH password dictionary
    crit: component
    conf: 0.92
    if:
      type: text
      substr: PASSWORDS

composite_rules:
  - id: dotnet-raw-ssh-bruteforce
    desc: .NET raw SSH brute-force loop
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-raw-ssh-auth-packets
      - id: dotnet-ssh-bruteforce-function
    any:
      - id: dotnet-ssh-username-dictionary
      - id: dotnet-ssh-password-dictionary
      - id: objectives/lateral-movement/brute-force/password::weak-pass-set-words

  - id: dotnet-renci-ssh-bruteforce
    desc: .NET Renci SSH brute-force
    crit: hostile
    conf: 0.97
    platforms: [iosxe, unix, windows]
    all:
      - id: dotnet-renci-password-connection
      - id: dotnet-sshclient-connect-loop
    any:
      - id: dotnet-network-device-ssh-commands
      - id: objectives/lateral-movement/brute-force/password::weak-pass-set-words
      - id: objectives/credential-access/files/config::iosxe-running-config-read
