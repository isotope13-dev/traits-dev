defaults:
  platforms: [unix]
  for: [ruby]
  attack: T1021.004

traits:
  - id: ruby-open3-ssh-key-attempt
    desc: Ruby Open3 SSH key attempt
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "'ssh', '-o', 'BatchMode=yes'"

  - id: ruby-sshpass-attempt
    desc: Ruby sshpass attempt
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: "'sshpass', '-p', password"

  - id: ruby-net-ssh-root-start
    desc: Ruby Net::SSH root start
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Net::SSH.start(TARGET_HOST, 'root'

composite_rules:
  - id: ruby-macos-ssh-lateral-attempt
    desc: Ruby macOS SSH lateral attempt
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: ruby-open3-ssh-key-attempt
      - id: ruby-sshpass-attempt
      - id: ruby-net-ssh-root-start
