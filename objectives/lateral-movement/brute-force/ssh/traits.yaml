defaults:
  platforms:
  - unix
  - windows
  for: [python, javascript, powershell, pe, elf]
traits:
- id: python-common-users-list
  desc: Python common SSH username list
  crit: component
  conf: 0.98
  for: [python]
  if:
    type: symbol
    kind: bind
    exact: COMMON_USERS
- id: python-common-passwords-list
  desc: Python common SSH password list
  crit: component
  conf: 0.98
  for: [python]
  if:
    type: symbol
    kind: bind
    exact: COMMON_PASSWORDS
- id: password-auth
  desc: SSH password authentication
  crit: component
  conf: 0.6
  if:
    type: text
    regex: (ssh[_-]?)?password[_-]?(auth(entication)?|method)
- id: too-many-auth-failures
  desc: Too many authentication failures error
  crit: component
  conf: 0.6
  if:
    type: text
    substr: Too many authentication failures
- id: admin-admin-cred
  desc: admin:admin credential pair literal
  # A bare default-credential pair is an attack-context fragment, not proof
  # of brute force.  Keep it available to the IoT credential composite while
  # avoiding a suspicious finding on security checklists and documentation.
  crit: component
  conf: 0.7
  if:
    type: text
    regex: '(^|[^A-Za-z0-9_])admin:admin([^A-Za-z0-9_]|$)'
  unless:
  - id: well-known/tool/offensive/pentestkit/
  - id: well-known/tool/offensive/bbot::package-tree-member
  - id: well-known/tool/offensive/decepticon::package-tree-member
  - id: well-known/tool/sysadmin/nmap::nmap-source-tree
  - id: well-known/tool/sysadmin/netdoc-collector::netdoc-collector-library
  - id: metadata/package/testing/presence/harness::python-test-file
  - type: text
    substr: 'Defaulting to admin:admin'
  - type: text
    substr: 'default admin:admin'
- id: root-root-cred
  desc: Default credential root:root
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: '["''\\]root:root'
  unless:
  - type: text
    regex: 'user\s*=\s*["'']root:root'
  - type: text
    regex: '["'']owner["'']\s*:\s*["'']root:root'
  - type: text
    regex: '\bowner\s*:\s*[^\n]{0,100}["'']root:root'
  - type: text
    regex: '["'']chown["'']\s*(?:if|,|:|\\])?.{0,80}["'']root:root'
  - type: text
    regex: '(?i)default_owner\s*=\s*["'']root:root'
  - type: text
    regex: '(?i)syslog_fix_perms.{0,120}root:root'
  - type: text
    regex: '(?i)\bOWNER\s*=\s*["'']root:root'
  - id: well-known/tool/offensive/bbot::package-tree-member
- id: admin-1234-cred
  desc: Default credential admin:1234
  crit: suspicious
  unless:
    - id: well-known/tool/offensive/pentestkit/
  conf: 0.7
  if:
    type: text
    regex: '(^|[^A-Za-z0-9_])admin:1234([^A-Za-z0-9_]|$)'
- id: ubnt-ubnt-cred
  desc: Default Ubiquiti credential ubnt:ubnt
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: ubnt:ubnt
- id: pi-raspberry-cred
  desc: Default Raspberry Pi credential pi:raspberry
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: pi:raspberry
- id: admin-password-cred
  desc: Default credential admin:password
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: '(^|[^A-Za-z0-9_])admin:password([^A-Za-z0-9_]|$)'
  not:
  - regex: ://admin:password@(localhost|127\.0\.0\.1|\[::1\])(?::\d+)?\b
  - regex: 'curl\s+-u\s+admin:password.{0,120}(localhost|127\.0\.0\.1|\[::1\])'
  - regex: '["'']admin:password[_A-Za-z0-9]'
  unless:
  - id: well-known/tool/offensive/pentestkit/
  - id: well-known/tool/offensive/bbot::package-tree-member
  # A documented PostgreSQL admin DSN example is configuration guidance, not
  # a credential in a brute-force wordlist.
  - type: text
    regex: '(?i)--admin-dsn\s+postgresql(?:\+\w+)?://admin:password@'
  # OpenAPI-generated client documentation commonly embeds a local curl
  # example using the service's illustrative default credentials.
  - type: text
    regex: 'curl -u admin:password.*(localhost|127\.0\.0\.1|\[::1\])'
  # Bruno ships this credential only in a package-test fixture; it is not an
  # SSH spraying dictionary or a runtime login attempt.
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/lang/source::openapi-generator-source-banner
  - id: well-known/tool/offensive/decepticon::package-tree-member
- id: guest-guest-cred
  desc: Default credential guest:guest
  crit: suspicious
  unless:
    - id: well-known/tool/offensive/pentestkit/
    - id: well-known/tool/offensive/bbot::package-tree-member
  conf: 0.7
  if:
    type: text
    substr: guest:guest
  not:
  # `amqp://guest:guest@host` etc. is a connection-string client config (the
  # well-known RabbitMQ default), not a brute-force wordlist entry. A spraying
  # dictionary lists the pair bare, not inside a scheme://user:pass@ authority.
  - regex: '://guest:guest@'
- id: support-support-cred
  desc: Default credential support:support
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: '["''\\]support:support'
  unless:
  - type: text
    substr: 'app-namespaced talent'
  - type: text
    substr: 'OUTBOUND_TALENTS = {"support"}'
- id: root-vizxv-cred
  desc: Telnet default credential root:vizxv
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: root:vizxv
- id: root-xc3511-cred
  desc: Telnet default credential root:xc3511
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: root:xc3511
- id: root-888888-cred
  desc: Telnet default credential root:888888
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: root:888888
- id: root-juantech-cred
  desc: Telnet default credential root:juantech
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: root:juantech
- id: admin-admin1234-cred
  desc: Camera default credential admin:admin1234
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: admin:admin1234
- id: admin-smcadmin-cred
  desc: SMC default credential admin:smcadmin
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: admin:smcadmin
- id: user-user-cred
  desc: Standalone default credential user:user
  crit: suspicious
  conf: 0.7
  if:
    type: text
    # Do not treat JavaScript object properties such as user:user={} as
    # credential pairs; attack dictionaries and credential literals are
    # still matched when the pair is standalone or quoted.
    regex: '(^|[^A-Za-z0-9_])user:user($|[^A-Za-z0-9_=-])'
  unless:
  - id: well-known/tool/offensive/decepticon::package-tree-member
  - id: well-known/tool/offensive/sqlmap::source-tree-member
  - id: well-known/lib/wine/
  - id: well-known/app/deno::deno-runtime-binary
  - id: well-known/tool/sysadmin/nmap::nmap-source-tree
  - id: well-known/tool/sysadmin/netdoc-collector::netdoc-collector-library
  - id: metadata/file/format::sourcemap-sources-content
  - id: metadata/lang/compiler/generated::pulumi-language-python-generated
- id: scanner-keyword-1
  desc: SSH scanner-related keyword reference
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: \b(port|network|ssh)[_-]?scanner\b
    case_insensitive: true
- id: scanning-keyword-1
  desc: scanning keyword (port/network)
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: \b(port|network)[_-]?scanning\b
    case_insensitive: true
  unless:
  - id: metadata/file/format::asn1-module-definition
  - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: well-known/tool/sysadmin/nmap::nmap-source-tree
- id: scanning-keyword-2
  desc: scanning keyword (port/target/thread)
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: \bscanning[_-]?(port|target|thread)\b
    case_insensitive: true
- id: auth-spray-cond-6--inline-29439
  desc: Regex component marker
  crit: notable
  conf: 0.85
  for: [elf, shell]
  if:
    type: path
    basename: true
    regex: ^(ssh|sshd|ssh_config)$
  count_max: 1029440
composite_rules:
- id: scanning-keyword
  desc: scanning keyword
  crit: suspicious
  any:
  - id: scanning-keyword-1
  - id: scanning-keyword-2
  unless:
  - id: metadata/file/format::asn1-module-definition
  - id: well-known/tool/sysadmin/nmap::nmap-source-tree
- id: ssh-auth-methods
  desc: SSH authentication methods
  any:
  - id: password-auth
  - id: micro-behaviors/communications/ssh/client::keyboard-interactive
  crit: notable
  unless:
  - id: well-known/tool/development/ipsw
  - id: well-known/app/kilocode::kilo-code-js-bundle
  - id: well-known/app/winscp/
  - id: metadata/library/data::paramiko-source
  - id: well-known/app/wireshark/
  - id: metadata/package/files/dependency::node-modules-path
  - id: metadata/package/quality/false-positives::benign-app-fp-context
  - id: well-known/app/terraform::terraform-core-binary
- id: ssh-auth-errors
  desc: SSH authentication error messages
  any:
  - id: micro-behaviors/communications/ssh/client::auth-failed
  - id: too-many-auth-failures
  crit: notable
  unless:
  - id: well-known/app/kilocode::kilo-code-js-bundle
  - id: micro-behaviors/crypto/library/blockchain/
  - id: metadata/library/data::paramiko-source
  - id: well-known/tool/sysadmin/busybox::mingit-busybox-basename
  - id: well-known/tool/development/git-for-windows::mingit-gcmcore-dll
  - id: well-known/tool/development/git-for-windows::mingit-github-dll
- id: scanner-keywords
  desc: Network scanner keywords
  any:
  - id: scanner-keyword-1
  - id: scanning-keyword
  crit: suspicious
  unless:
  - id: well-known/tool/sysadmin/netdoc-collector::netdoc-collector-library
- id: ssh-with-auth
  desc: SSH protocol with authentication methods
  all:
  - id: micro-behaviors/communications/ssh/client::protocol
  - id: ssh-auth-methods
  crit: component
- id: auth-spray
  desc: SSH authentication credential spraying
  crit: suspicious
  conf: 0.85
  mbc: E1110
  attack: T1110.001
  all:
  - id: micro-behaviors/communications/ssh/client::protocol
  - id: ssh-auth-errors
  any:
  - id: ssh-auth-methods
  - id: ssh-with-auth
  - id: scanner-keywords
  - id: iot-credential-access
  unless:
  - id: well-known/app/
  - id: well-known/lib/
  downgrade:
    any:
    - id: micro-behaviors/os/pam/auth/
    - id: micro-behaviors/os/pam/auth::libpam-string
    - id: metadata/signed/platform::apple
    - id: metadata/binary/vendor/
    - id: metadata/library/react::library
    - id: micro-behaviors/communications/ssh/client/
    - id: auth-spray-cond-6--inline-29439
- id: iot-credential-access
  desc: Default IoT device credentials for brute-force
  crit: suspicious
  conf: 0.9
  mbc: E1110
  attack: T1078.001
  unless:
  - id: well-known/tool/offensive/pentestkit/
  - id: well-known/tool/offensive/decepticon::package-tree-member
  - id: well-known/tool/offensive/bbot::package-tree-member
  needs: 3
  any:
  - id: admin-admin-cred
  - id: root-root-cred
  - id: admin-1234-cred
  - id: ubnt-ubnt-cred
  - id: pi-raspberry-cred
  - id: admin-password-cred
  - id: guest-guest-cred
  - id: support-support-cred
  - id: root-vizxv-cred
  - id: root-xc3511-cred
  - id: root-888888-cred
  - id: root-juantech-cred
  - id: admin-admin1234-cred
  - id: admin-smcadmin-cred
  - id: user-user-cred
- id: ssh-port-scanner
  desc: SSH port with scanner keywords
  all:
  - id: micro-behaviors/communications/ssh/connect::port-22-ref
  - id: scanner-keywords
  crit: suspicious
  unless:
  - id: well-known/tool/sysadmin/netdoc-collector::netdoc-collector-library
- id: ssh-port-threaded
  desc: SSH port with threading
  all:
  - id: micro-behaviors/communications/ssh/connect::port-22-ref
  - id: micro-behaviors/process/threading/concurrency
  - id: micro-behaviors/communications/socket/connect::connect
  crit: suspicious
  unless:
  - id: well-known/tool/sysadmin/netdoc-collector::netdoc-collector-library
- id: scanner-comp
  desc: SSH network scanner for brute-force
  crit: suspicious
  conf: 0.8
  mbc: E1110
  attack: T1046
  needs: 2
  any:
  - id: ssh-port-scanner
  - id: ssh-port-threaded
  unless:
  - id: well-known/tool/sysadmin/netdoc-collector::netdoc-collector-library
- id: botnet
  desc: SSH brute-force botnet detected
  crit: hostile
  conf: 0.9
  mbc: E1110
  attack: T1110.001
  for:
  - elf
  all:
  - id: scanner-comp
  - id: iot-credential-access
  - id: auth-spray
- id: python-ssh-password-bruteforce
  desc: Python SSH password brute-force workflow
  crit: hostile
  conf: 0.99
  mbc: E1110
  attack: T1110.001
  for: [python]
  # Keep username/password lists, Paramiko login, and SSHClient evidence in
  # the same source member; package-level aggregation would mislabel a wheel
  # that merely ships a reusable SSH helper beside unrelated code.
  scope: leaf
  near_lines: 120
  all:
  - id: python-common-users-list
  - id: python-common-passwords-list
  - id: micro-behaviors/communications/ssh/connect::paramiko-sshclient-connect
  - id: well-known/lib/paramiko::paramiko-python-library
  - id: micro-behaviors/communications/ssh/connect::ssh-client
