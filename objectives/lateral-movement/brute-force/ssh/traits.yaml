defaults:
  platforms:
  - unix
  - windows
  for: [python, javascript, powershell, pe, elf]
traits:
- id: password-auth
  desc: SSH password authentication
  crit: component
  conf: 0.6
  if:
    type: text
    regex: (ssh[_-]?)?password[_-]?(auth(entication)?|method)
- id: too-many-auth-failures
  desc: Too many authentication failures error
  crit: component
  conf: 0.6
  if:
    type: text
    substr: Too many authentication failures
- id: admin-admin-cred
  desc: Default credential admin:admin
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: admin:admin
- id: root-root-cred
  desc: Default credential root:root
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: '["''\\]root:root'
  unless:
  - type: text
    regex: 'user\s*=\s*["'']root:root'
- id: admin-1234-cred
  desc: Default credential admin:1234
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: admin:1234
- id: ubnt-ubnt-cred
  desc: Default Ubiquiti credential ubnt:ubnt
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: ubnt:ubnt
- id: pi-raspberry-cred
  desc: Default Raspberry Pi credential pi:raspberry
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: pi:raspberry
- id: admin-password-cred
  desc: Default credential admin:password
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: admin:password
  not:
  - regex: ://admin:password@(localhost|127\.0\.0\.1|\[::1\])(?::\d+)?\b
- id: guest-guest-cred
  desc: Default credential guest:guest
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: guest:guest
  not:
  # `amqp://guest:guest@host` etc. is a connection-string client config (the
  # well-known RabbitMQ default), not a brute-force wordlist entry. A spraying
  # dictionary lists the pair bare, not inside a scheme://user:pass@ authority.
  - regex: '://guest:guest@'
- id: support-support-cred
  desc: Default credential support:support
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: '["''\\]support:support'
- id: root-vizxv-cred
  desc: Telnet default credential root:vizxv
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: root:vizxv
- id: root-xc3511-cred
  desc: Telnet default credential root:xc3511
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: root:xc3511
- id: root-888888-cred
  desc: Telnet default credential root:888888
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: root:888888
- id: root-juantech-cred
  desc: Telnet default credential root:juantech
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: root:juantech
- id: admin-admin1234-cred
  desc: Camera default credential admin:admin1234
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: admin:admin1234
- id: admin-smcadmin-cred
  desc: SMC default credential admin:smcadmin
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: admin:smcadmin
- id: user-user-cred
  desc: Default credential user:user
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: user:user
- id: scanner-keyword-1
  desc: SSH scanner-related keyword reference
  crit: notable
  conf: 0.75
  if:
    type: text
    regex: \b(port|network|ssh)[_-]?scanner\b
    case_insensitive: true
- id: scanner-keyword-2
  desc: scanner keyword (thread/target/port)
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: \bscanner[_-]?(thread|target|port)\b
    case_insensitive: true
- id: scanning-keyword-1
  desc: scanning keyword (port/network)
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: \b(port|network)[_-]?scanning\b
    case_insensitive: true
  unless:
  - id: metadata/package/manifest/vendor::bitdefender-ecnet-telemetry
- id: scanning-keyword-2
  desc: scanning keyword (port/target/thread)
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: \bscanning[_-]?(port|target|thread)\b
    case_insensitive: true
- id: auth-spray-cond-6--inline-29439
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [elf, shell]
  if:
    type: path
    basename: true
    regex: ^(ssh|sshd|ssh_config)$
  count_max: 1029440
composite_rules:
- id: scanner-keyword
  desc: scanner keyword
  crit: suspicious
  any:
  - id: scanner-keyword-1
  - id: scanner-keyword-2
- id: scanning-keyword
  desc: scanning keyword
  crit: suspicious
  any:
  - id: scanning-keyword-1
  - id: scanning-keyword-2
- id: ssh-auth-methods
  desc: SSH authentication methods
  any:
  - id: password-auth
  - id: micro-behaviors/communications/ssh/client::keyboard-interactive
  crit: suspicious
  unless:
  - id: well-known/tool/development/ipsw
  - id: well-known/app/kilocode::kilo-code-js-bundle
  - id: well-known/app/winscp/
  - id: metadata/library/data::paramiko-source
  - id: well-known/app/wireshark/
  - id: well-known/app/wireshark::wireshark-artifact-path
- id: ssh-auth-errors
  desc: SSH authentication error messages
  any:
  - id: micro-behaviors/communications/ssh/client::auth-failed
  - id: too-many-auth-failures
  crit: suspicious
  unless:
  - id: well-known/app/kilocode::kilo-code-js-bundle
  - id: micro-behaviors/crypto/library/blockchain/
  - id: metadata/library/data::paramiko-source
- id: scanner-keywords
  desc: Network scanner keywords
  needs: 2
  any:
  - id: scanner-keyword
  - id: scanning-keyword
  - id: micro-behaviors/communications/ssh/connect::port-22-ref
  - id: micro-behaviors/communications/socket/connect::connect
  crit: suspicious
- id: ssh-with-auth
  desc: SSH protocol with authentication methods
  all:
  - id: micro-behaviors/communications/ssh/client::protocol
  - id: ssh-auth-methods
  crit: component
- id: auth-spray
  desc: SSH authentication credential spraying
  crit: suspicious
  conf: 0.85
  mbc: E1110
  attack: T1110.001
  all:
  - id: micro-behaviors/communications/ssh/client::protocol
  - id: ssh-auth-errors
  any:
  - id: ssh-auth-methods
  - id: ssh-with-auth
  - id: scanner-keywords
  - id: iot-credential-access
  downgrade:
    any:
    - id: micro-behaviors/os/pam/auth/
    - id: micro-behaviors/os/pam/auth::libpam-string
    - id: metadata/signed/platform::apple
    - id: metadata/binary/vendor/
    - id: metadata/library/react::library
    - id: micro-behaviors/communications/ssh/client/
    - id: auth-spray-cond-6--inline-29439
- id: iot-credential-access
  desc: Default IoT device credentials for brute-force
  crit: suspicious
  conf: 0.9
  mbc: E1110
  attack: T1078.001
  needs: 3
  any:
  - id: admin-admin-cred
  - id: root-root-cred
  - id: admin-1234-cred
  - id: ubnt-ubnt-cred
  - id: pi-raspberry-cred
  - id: admin-password-cred
  - id: guest-guest-cred
  - id: support-support-cred
  - id: root-vizxv-cred
  - id: root-xc3511-cred
  - id: root-888888-cred
  - id: root-juantech-cred
  - id: admin-admin1234-cred
  - id: admin-smcadmin-cred
  - id: user-user-cred
- id: ssh-port-scanner
  desc: SSH port with scanner keywords
  all:
  - id: micro-behaviors/communications/ssh/connect::port-22-ref
  - id: scanner-keywords
  crit: suspicious
- id: ssh-port-threaded
  desc: SSH port with threading
  all:
  - id: micro-behaviors/communications/ssh/connect::port-22-ref
  - id: micro-behaviors/process/threading/concurrency
  - id: micro-behaviors/communications/socket/connect::connect
  crit: suspicious
- id: scanner-comp
  desc: SSH network scanner for brute-force
  crit: suspicious
  conf: 0.8
  mbc: E1110
  attack: T1046
  needs: 2
  any:
  - id: ssh-port-scanner
  - id: ssh-port-threaded
- id: botnet
  desc: SSH brute-force botnet detected
  crit: hostile
  conf: 0.9
  mbc: E1110
  attack: T1110.001
  for:
  - elf
  all:
  - id: scanner-comp
  - id: iot-credential-access
  - id: auth-spray
