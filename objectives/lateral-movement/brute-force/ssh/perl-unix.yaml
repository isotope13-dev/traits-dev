defaults:
  platforms: [unix]
  for: [perl]
  attack: T1110.001

traits:
  - id: perl-sshpass-empty-password
    desc: Perl sshpass empty password
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: sshpass -p ''

  - id: perl-harvested-key-ssh
    desc: Perl SSH with harvested key
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ssh -i \$tmp_key[\s\S]{0,160}StrictHostKeyChecking=no'

  - id: perl-local-ssh-target-scan
    desc: Perl scans SSH targets
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'PeerAddr => "\$target_ip:22"'

composite_rules:
  - id: perl-ssh-lateral-bruteforce
    desc: Perl SSH lateral brute force
    crit: hostile
    conf: 0.98
    all:
      - id: perl-local-ssh-target-scan
    any:
      - id: perl-sshpass-empty-password
      - id: perl-harvested-key-ssh
