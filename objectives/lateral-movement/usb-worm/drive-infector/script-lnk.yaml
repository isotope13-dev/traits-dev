# LNK-replacement worm in Windows Script Host (JScript/VBScript). The worm hides
# the victim's documents and drops same-named .lnk shortcuts that launch the
# payload via `cmd /c start <payload> && start <decoy>`, so the real file still
# opens. Generic across families that use the shortcut-replacement technique on
# removable/network drives.
defaults:
  platforms: [windows]
  for: [javascript, vbs, html]
  attack: T1091
  mbc: B0017
composite_rules:
  - id: lnk-replacement-drive-worm
    desc: LNK-replacement removable drive worm
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/os/wsh/file::create-shortcut
      - id: micro-behaviors/os/wsh/file::lnk-arguments-cmd-start
    any:
      - id: micro-behaviors/fs/file/attributes::fso-set-hidden-attribute
      - id: micro-behaviors/fs/traversal/drives::fso-drive-enumeration
      - id: objectives/collection/file-targeting/filter::document-extension-literal
    needs: 1
