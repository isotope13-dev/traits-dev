defaults:
  platforms: [unix]
  for: [perl]
  attack: T1091

traits:
  - id: perl-removable-mount-globs
    desc: Perl removable mount globs
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "'/media/*', '/mnt/*', '/removable/*'"

  - id: perl-self-copy-to-mount
    desc: Perl self-copy to mount
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: copy($SELF, $dest)

  - id: perl-usb-profile-autorun
    desc: Perl USB profile autorun
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "$mp/.profile"

composite_rules:
  - id: perl-usb-profile-worm
    desc: Perl USB profile worm
    crit: hostile
    conf: 0.98
    all:
      - id: perl-removable-mount-globs
      - id: perl-self-copy-to-mount
      - id: perl-usb-profile-autorun
