# USB/network drive infector worm pattern in source code
# ATT&CK: T1091 (Replication Through Removable Media)
defaults:
  for: [c, cpp]
  platforms: [windows]
  attack: T1091
traits:
  - id: infect-function-name
    desc: Infection-named function in source
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      regex: ^(Infect|infect_)
  - id: payload-write-function
    desc: Payload write function in source
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      regex: '^Write(Payload|Virus|Worm)'
composite_rules:
  - id: infection-write-source
    desc: Infection-oriented source semantics
    crit: suspicious
    conf: 0.9
    any:
      - id: infect-function-name
      - id: payload-write-function
  - id: usb-drive-infector-source
    desc: USB drive infection worm in source
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/traversal/drives::get-logical-drives
      - id: micro-behaviors/fs/traversal/drives::drive-type-removable-source
      - id: infection-write-source
    any:
      - id: micro-behaviors/fs/file/write::write-file-source
      - id: micro-behaviors/fs/memory/mmap::create-file-w-source
      - id: objectives/evasion/file-hiding/attributes::file-attribute-hidden-source
  - id: network-drive-spreader-source
    desc: Network drive spreading in source
    crit: hostile
    conf: 0.93
    all:
      - id: micro-behaviors/fs/traversal/drives::get-logical-drives
      - id: micro-behaviors/fs/traversal/drives::drive-type-remote-source
      - id: infection-write-source
    any:
      - id: micro-behaviors/fs/file/write::write-file-source
      - id: micro-behaviors/fs/memory/mmap::create-file-w-source
      - id: objectives/evasion/file-hiding/attributes::file-attribute-hidden-source
