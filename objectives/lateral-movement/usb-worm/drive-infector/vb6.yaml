defaults:
  platforms: [windows]
  for: [pe]
  attack: "T1091"
  mbc: "B0017"
  size_max: 52428800

traits:
  - id: vb6-get-drive-type-w
    desc: Windows drive type query
    crit: component
    conf: 0.88
    if:
      type: symbol
      substr: GetDriveTypeW
    unless:
      - id: metadata/signed/platform::microsoft-windows
      - id: metadata/binary/metrics/threshold::many-exports-200
      - id: metadata/signed/developer::oracle-america
      - id: metadata/binary/installer/family::known-benign-installer
      - type: text
        substr: Software\Microsoft\Advanced INF Setup

  - id: vb6-get-disk-free-space
    desc: VB6 disk free space check GetDiskFreeSpaceExW
    crit: component
    conf: 0.86
    if:
      type: symbol
      substr: GetDiskFreeSpaceExW
    unless:
      - id: metadata/binary/metrics/threshold::many-exports-200
      - id: well-known/lib/psutil::windows-extension
      - id: metadata/binary/installer/family::known-benign-installer
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft-corporation

composite_rules:
  - id: vb6-usb-worm-propagation
    desc: VB6 USB/removable media worm propagation
    crit: hostile
    conf: 0.93
    all:
      - id: micro-behaviors/fs/traversal/drives::get-logical-drives
      - id: vb6-get-drive-type-w
      - id: vb6-get-disk-free-space
    any:
      - id: micro-behaviors/fs/shell-ops::shell-get-special-folder-path
      - id: micro-behaviors/fs/directory/readdir::vb6-rtcdir
    needs: 2
