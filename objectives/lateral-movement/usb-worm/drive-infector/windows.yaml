defaults:
  for: [pe]
  platforms: [windows]
  attack: T1091
  mbc: B0017

composite_rules:
  - id: pe-removable-drive-infector
    desc: PE infects removable/network drives
    crit: hostile
    conf: 0.95
    size_max: 1048576
    all:
      - id: micro-behaviors/fs/traversal/drives::get-logical-drive-strings
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
      - id: micro-behaviors/fs/enumerate/directory::find-file-walker-wide
      - id: micro-behaviors/process/thread/create::create-thread
      - id: micro-behaviors/fs/file/write/direct::write-file
    any:
      - id: objectives/impact/infect/binary/rewrite::cts-prepending-pe-infector
      - id: objectives/impact/infect/binary/rewrite::cts-trailer-marker
      - id: micro-behaviors/os/random/generator::crypt-gen-random
    needs: 2
    unless:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/installer/family::known-benign-installer
  - id: logical-drive-copy-worm
    desc: Logical-drive copy worm workflow
    crit: hostile
    conf: 0.95
    size_max: 1048576
    all:
      - id: micro-behaviors/fs/traversal/drives::logical-drive-enumeration
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
      - id: micro-behaviors/fs/enumerate/directory::find-file-walker
      - id: micro-behaviors/fs/file/copy::windows-shell-copy-command
    any:
      - id: objectives/persistence/login/registry/autostart::reg-add-run
      - id: micro-behaviors/process/create/shell/invoke::cmd-exe-c-command
      - id: micro-behaviors/process/create/spawn::create-process-a
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
        - id: metadata/binary/installer/family::known-benign-installer
