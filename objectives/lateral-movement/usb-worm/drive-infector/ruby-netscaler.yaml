defaults:
  platforms: [netscaler, appliance, unix]
  for: [ruby]
  attack: T1091

traits:
  - id: ruby-usb-mount-discovery
    desc: Ruby USB mount discovery
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'mount 2>/dev/null[\s\S]{0,160}/dev/'

  - id: ruby-hidden-usb-drop
    desc: Ruby hidden USB drop
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.system_update_check\.sh|libupdate\.so'

  - id: ruby-usb-self-copy
    desc: Ruby USB self copy
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'File\.read\(SELF_PATH\)[\s\S]{0,200}File\.write'

composite_rules:
  - id: ruby-usb-worm-propagation
    desc: Ruby USB worm propagation
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-usb-mount-discovery
      - id: ruby-hidden-usb-drop
      - id: ruby-usb-self-copy
