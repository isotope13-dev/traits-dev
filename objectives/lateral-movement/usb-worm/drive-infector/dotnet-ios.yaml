defaults:
  platforms: [ios, unix, windows]
  for: [csharp, pe, elf]
  attack: T1091

traits:
  - id: dotnet-usb-payload-write
    desc: .NET writes USB payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'WriteAllBytes.{0,120}(worm_|payload_)|File\.WriteAllBytes'

  - id: dotnet-usb-mount-points
    desc: .NET USB mount-point scan
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/private/var/mobile/Media|/sys/bus/usb/devices|/proc/mounts'

composite_rules:
  - id: dotnet-ios-usb-drive-infector
    desc: .NET iOS USB drive infector
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/anti-analysis/self-modify/runtime::dotnet-getexecutingassembly-token
      - id: dotnet-usb-payload-write
    any:
      - id: dotnet-usb-mount-points
      - id: micro-behaviors/fs/path/config/autorun::autorun-inf-string
