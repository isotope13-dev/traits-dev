defaults:
  platforms: [ios, unix, windows]
  for: [csharp, pe, elf]
  attack: T1091

traits:
  - id: dotnet-usb-payload-write
    desc: Writes named worm/payload bytes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)WriteAllBytes.{0,120}(worm_|payload_)'

composite_rules:
  - id: dotnet-ios-usb-drive-infector
    desc: .NET iOS USB drive infector
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/process/info/current::dotnet-getexecutingassembly-token
      - id: dotnet-usb-payload-write
    any:
      - id: micro-behaviors/fs/volume/mount::usb-device-sysfs-path
      - id: micro-behaviors/fs/volume/mount::ios-media-directory
      - id: micro-behaviors/fs/proc/mounts::mounts
      - id: micro-behaviors/fs/path/config/autorun::autorun-inf-string
