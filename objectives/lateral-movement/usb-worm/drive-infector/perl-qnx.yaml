defaults:
  platforms: [qnx, unix]
  for: [perl]
  attack: T1091

traits:
  - id: qnx-perl-usb-mount-root
    desc: QNX Perl USB mount root
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: $USB_MOUNTS = '/media'

  - id: qnx-perl-autorun-copy
    desc: QNX Perl autorun copy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .autorun.pl

  - id: qnx-perl-usb-infect-beacon
    desc: QNX Perl USB infect beacon
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: usb_infect

  - id: qnx-perl-autorun-script-name
    desc: QNX Perl autorun script name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: AUTORUN.pl

composite_rules:
  - id: qnx-perl-usb-worm-propagation
    desc: QNX Perl USB worm propagation
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-usb-mount-root
      - id: qnx-perl-autorun-copy
      - id: qnx-perl-usb-infect-beacon

  - id: qnx-perl-usb-autorun-chain
    desc: QNX Perl USB autorun chain
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-usb-mount-root
      - id: qnx-perl-autorun-copy
      - id: qnx-perl-autorun-script-name
