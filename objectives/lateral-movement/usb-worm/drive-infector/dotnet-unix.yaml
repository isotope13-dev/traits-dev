defaults:
  platforms: [unix, windows]
  for: [csharp, pe]
  attack: T1091

traits:
  - id: dotnet-removable-mount-dirs
    desc: .NET removable mount dirs
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/media[\s\S]{0,120}/run/media[\s\S]{0,120}/removable'

  - id: dotnet-media-mount-path
    desc: .NET media mount path
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: /media

  - id: dotnet-removable-mount-path
    desc: .NET removable mount path
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: /removable

  - id: dotnet-hidden-agent-copy
    desc: .NET hidden agent copy
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: .hidden_agent.exe

  - id: dotnet-autostart-script
    desc: .NET autostart script
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: .autostart.sh

composite_rules:
  - id: dotnet-usb-drive-infector
    desc: .NET USB drive infector
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-removable-mount-dirs
      - id: dotnet-hidden-agent-copy
      - id: dotnet-autostart-script

  - id: dotnet-pe-usb-drive-infector
    desc: .NET PE USB drive infector
    crit: hostile
    conf: 0.98
    all:
      - id: dotnet-media-mount-path
      - id: dotnet-removable-mount-path
      - id: dotnet-hidden-agent-copy
      - id: dotnet-autostart-script
