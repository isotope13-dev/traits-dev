defaults:
  platforms: [qnx, unix]
  for: [ruby]
  attack: T1091

traits:
  - id: qnx-ruby-mnttab-usb-scan
    desc: QNX Ruby mnttab USB scan
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/mnttab

  - id: qnx-ruby-hidden-usb-copy
    desc: QNX Ruby hidden USB copy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'hidden_target[\s\S]{0,220}FileUtils\.cp\(SELF_PATH'

  - id: qnx-ruby-autorun-shell
    desc: QNX Ruby autorun shell
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .autorun.sh

composite_rules:
  - id: qnx-ruby-usb-worm-propagation
    desc: QNX Ruby USB worm propagation
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-ruby-mnttab-usb-scan
      - id: qnx-ruby-hidden-usb-copy
      - id: qnx-ruby-autorun-shell
