defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1091
traits:
  - id: usb-disk-exe-lure
    desc: Fake removable-drive filename lure
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: USB Disk.exe
  - id: cd-drive-exe-lure
    desc: Fake optical-drive filename lure
    crit: suspicious
    conf: 0.97
    if:
      type: text
      exact: CD Drive.exe
  - id: temp-ready-marker
    desc: Temporary staging readiness marker
    crit: notable
    conf: 0.82
    if:
      type: text
      exact: _READY_TEMP_
  - id: explorer-drive-open-path
    desc: Explorer handoff path for drive-opening illusion
    crit: component
    conf: 0.9
    if:
      type: text
      exact: C:\Windows\explorer.exe
  - id: staged-vdfvm17-dll
    desc: Hardcoded staged DLL module name
    crit: notable
    conf: 0.88
    if:
      type: text
      exact: vdfvm17.dll
  - id: global-wdsadf-once-mutex
    desc: Hardcoded Global wdsadf_once mutex
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "Global\\wdsadf_once"
      section: .rdata
  - id: global-sdjsalk-once-mutex
    desc: Hardcoded Global sdjsalk_once mutex
    crit: component
    conf: 0.98
    if:
      type: text
      exact: "Global\\sdjsalk_once"
      section: .rdata
composite_rules:
  - id: removable-drive-lure-names
    desc: Multiple removable-drive lure filenames
    crit: suspicious
    conf: 0.98
    all:
      - id: usb-disk-exe-lure
      - id: cd-drive-exe-lure
  - id: removable-drive-lure-packaging
    desc: Drive-lure executable with icon-heavy resources
    crit: suspicious
    conf: 0.95
    all:
      - id: usb-disk-exe-lure
      - id: cd-drive-exe-lure
      - id: metadata/binary/resource::oversized-low-entropy-rsrc
  - id: removable-drive-open-illusion
    desc: Removable-drive lure backed by Explorer handoff
    crit: suspicious
    conf: 0.95
    all:
      - id: removable-drive-lure-names
      - id: explorer-drive-open-path
  - id: usb-worm-mutex-pair
    desc: Hardcoded USB worm mutex pair
    crit: suspicious
    conf: 0.98
    all:
      - id: global-wdsadf-once-mutex
      - id: global-sdjsalk-once-mutex
  - id: removable-drive-lure-worm
    desc: USB worm using drive-icon lure names
    crit: hostile
    conf: 0.97
    all:
      - id: removable-drive-lure-packaging
      - id: usb-worm-mutex-pair
    any:
      - id: micro-behaviors/fs/file/open::file-create-win
      - id: micro-behaviors/process/create/spawn::create-process-w
      - id: objectives/evasion/decoy/lure::console-game-decoy
      - id: temp-ready-marker
      - id: removable-drive-open-illusion
      - id: staged-vdfvm17-dll
    downgrade:
      any:
        - id: metadata/vendor/microsoft/
        - id: metadata/signed/platform::microsoft
