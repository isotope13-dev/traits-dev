defaults:
  platforms: [windows]
  for: [pe, batch, powershell, vbs]
  attack: T1091
composite_rules:
  - id: autorun-worm
    desc: USB worm Autorun infection pattern
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/path/config/autorun::autorun-indicators
    any:
      - id: micro-behaviors/fs/path/config/autorun::found-dir-indicator
      - id: micro-behaviors/fs/path/config/autorun::found-dir-wide
      - id: micro-behaviors/fs/path/system::recycler-path
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
  - id: autorun-drive-worm
    desc: Autorun worm with drive enumeration
    crit: hostile
    conf: 0.92
    all:
      - id: micro-behaviors/fs/path/config/autorun::autorun-section
      - id: micro-behaviors/fs/traversal/drives::get-drive-type
    any:
      - id: micro-behaviors/fs/path/config/autorun::autorun-inf-string
      - id: micro-behaviors/fs/path/config/autorun::autorun-open
      - id: micro-behaviors/fs/path/system::recycler-path
      - id: micro-behaviors/os/registry/autostart::reg-add-run
