defaults:
  platforms: [windows]
  for: [pe, batch, powershell, vbs]
  attack: T1091
composite_rules:
- id: autorun-worm
  desc: USB worm Autorun infection pattern
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/fs/path/config/autorun::autorun-inf-string
  - id: micro-behaviors/fs/path/config/autorun::autorun-open
  any:
  - id: micro-behaviors/fs/path/config/autorun::found-dir-indicator
  - id: micro-behaviors/fs/path/config/autorun::found-dir-wide
  - id: micro-behaviors/fs/path/system::recycler-path
  - id: micro-behaviors/fs/traversal/drives::get-drive-type
- id: autorun-drive-worm
  desc: Autorun worm with drive enumeration
  crit: hostile
  conf: 0.92
  all:
  - id: micro-behaviors/fs/path/config/autorun::autorun-open
  - id: micro-behaviors/fs/traversal/drives::get-drive-type
  any:
  - id: micro-behaviors/fs/path/config/autorun::autorun-inf-string
  - id: micro-behaviors/fs/path/system::recycler-path
  - id: objectives/persistence/login/registry/autostart::reg-add-run
- id: mountpoint-autorun-worm
  desc: MountPoint autorun worm propagation
  crit: hostile
  conf: 0.96
  all:
  - id: micro-behaviors/fs/traversal/drives::mountpoint-manager-device
  - id: micro-behaviors/fs/traversal/drives::mountpoints2-volume-key
  - id: micro-behaviors/fs/path/config/autorun::autorun-inf-string
  - id: micro-behaviors/fs/path/location::path-suspicious-root-exe
  any:
  - id: micro-behaviors/fs/traversal/drives::mountmgr-ioctl-log
  - id: micro-behaviors/process/inject/runtime/call::create-remote-thread-dup
  - id: objectives/persistence/login/winlogon/userinit::winlogon-path
  - id: micro-behaviors/os/registry/access::registry-write-api-chain
- id: vb6-usb-worm
  desc: VB6 USB worm with reversed strings and Autorun.inf
  crit: hostile
  conf: 0.95
  all:
  - id: objectives/lateral-movement/usb-worm/autorun::autorun-worm
  - id: objectives/anti-static/obfuscation/string/reverse::vb6-reversed-strings
