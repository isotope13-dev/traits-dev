# C# USB worm spreading via autorun
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1091"
traits:
  - id: drivetype-removable
    desc: DriveType.Removable check
    crit: notable
    conf: 0.88
    if:
      type: raw
      substr: "DriveType.Removable"
  - id: getdrives-enum
    desc: DriveInfo.GetDrives enumeration
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: "DriveInfo.GetDrives()"
  - id: usb-infection-class
    desc: USB infection helper class
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'class\s+USB\w*(Infection|Infect|Spread)'
  - id: file-copy-to-drive
    desc: File.Copy to removable drive with hidden attr
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: "File.Copy(Configuration"
composite_rules:
  - id: usb-worm-csharp
    desc: USB worm spreading via removable drives
    crit: hostile
    conf: 0.96
    all:
      - id: drivetype-removable
    any:
      - id: usb-infection-class
      - id: file-copy-to-drive
      - id: getdrives-enum
