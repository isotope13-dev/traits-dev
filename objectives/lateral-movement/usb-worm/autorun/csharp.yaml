# C#/VB.NET USB worm spreading via autorun
defaults:
  for: [csharp]
  platforms: [windows]
  attack: "T1091"
traits:
  - id: drivetype-removable
    desc: DriveType.Removable check
    crit: notable
    conf: 0.88
    if:
      type: raw
      substr: "DriveType.Removable"
  - id: getdrives-enum
    desc: DriveInfo.GetDrives enumeration
    crit: notable
    conf: 0.85
    if:
      type: raw
      substr: "DriveInfo.GetDrives"
  - id: usb-infection-class
    desc: USB infection helper class (class named USB*)
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'Class\s+USB\b'
  - id: file-copy-to-drive
    desc: File.Copy to removable drive with hidden attr
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: "File.Copy(Configuration"
  - id: usb-lnk-wscript-lure
    desc: WScript shortcut creation for USB lure
    crit: suspicious
    conf: 0.92
    if:
      type: raw
      regex: 'CreateShortcut\(.{0,80}\.lnk'
composite_rules:
  - id: usb-worm-dotnet
    desc: .NET USB worm spreading via removable drives
    crit: hostile
    conf: 0.96
    all:
      - id: drivetype-removable
    any:
      - id: usb-infection-class
      - id: file-copy-to-drive
      - id: getdrives-enum
  - id: usb-lnk-lure-spreader
    desc: USB worm using LNK shortcuts as lures to hide real files
    crit: hostile
    conf: 0.97
    all:
      - id: drivetype-removable
      - id: usb-lnk-wscript-lure
    any:
      - id: getdrives-enum
      - id: usb-infection-class
