defaults:
  platforms: [windows]
  for: [batch]
  attack: T1091

traits:
  - id: batch-wmic-removable-drive-check
    desc: Batch WMIC removable drive check
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'wmic\s+logicaldisk\s+where.{0,80}DriveType.{0,40}findstr\s+"2"'
      case_insensitive: true

  - id: batch-drive-letter-loop
    desc: Batch drive-letter loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'for\s+%%D\s+in\s+\(C D E F G'
      case_insensitive: true

composite_rules:
  - id: batch-wmic-autorun-usb-worm
    desc: Batch WMIC autorun USB worm
    crit: hostile
    conf: 0.98
    all:
      - id: batch-wmic-removable-drive-check
      - id: batch-drive-letter-loop
      - id: micro-behaviors/fs/path/config/autorun::autorun-open
    any:
      - id: micro-behaviors/fs/path/config/autorun::autorun-shellexecute
      - id: micro-behaviors/fs/path/config/autorun::autorun-section
