defaults:
  platforms: [windows]
  for: [c, cpp, pe, dll]
  attack: T1091

traits:
  - id: native-removable-drive-enum
    desc: Native removable drive enum
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'GetLogicalDrives[\s\S]{0,420}GetDriveTypeA[\s\S]{0,180}DRIVE_REMOVABLE'

    unless:
    - id: well-known/lib/wine::wine-source-tree
    - id: well-known/tool/reverse-engineering/radare2::radare2-release-source-tree
  - id: native-autorun-inf-write
    desc: Native autorun.inf write
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'autorun\.inf[\s\S]{0,320}\[autorun\][\s\S]{0,160}open='
      case_insensitive: true

composite_rules:
  - id: native-removable-drive-autorun-copy
    desc: Native removable drive autorun copy
    crit: suspicious
    conf: 0.94
    all:
      - id: native-removable-drive-enum
      - id: micro-behaviors/fs/file/copy::copyfile-a

  - id: native-windows-autorun-usb-worm
    desc: Native Windows autorun USB worm
    crit: hostile
    conf: 0.98
    all:
      - id: native-removable-drive-autorun-copy
      - id: native-autorun-inf-write
    any:
      - id: native-autorun-inf-write
      - id: micro-behaviors/fs/path/config/autorun::autorun-open
      - id: micro-behaviors/fs/path/config/autorun::autorun-section
