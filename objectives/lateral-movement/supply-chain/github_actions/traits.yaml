# GitHub Actions Supply Chain Attack Patterns
traits:
  - id: github-actions-targeting-shell
    desc: Targets GitHub Actions (Shell)
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: string
      regex: 'isSecret":true'
  - id: python-sudo-execution
    desc: Executes python via sudo
    crit: notable
    conf: 0.9
    for: [shell, python]
    if:
      type: raw
      regex: "sudo python3?"
  - id: double-base64-encode
    desc: Double base64 encoding pattern
    crit: suspicious
    conf: 0.8
    for: [shell]
    if:
      type: raw
      regex: '\|\s*base64\b.{0,50}\|\s*base64\b'
composite_rules:
  - id: github-actions-targeting
    desc: Targets GitHub Actions environment
    crit: notable
    conf: 0.9
    any:
      - id: metadata/builder/github-actions::github-actions
      - id: metadata/builder/github-actions::github-runner-worker
      - id: metadata/builder/github-actions::github-runner-listener
      - id: github-actions-targeting-shell
  - id: github-runner-memory-dumper
    desc: Dumps GitHub Actions Runner memory
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell, rust, go]
    all:
      - id: github-actions-targeting
      - id: micro-behaviors/fs/proc/info::process-pid-mem
      - id: micro-behaviors/fs/proc/info::process-pid-maps
  - id: github-actions-secret-marker-helper
    desc: Helper for secret or memory access
    any:
      - id: objectives/anti-analysis/naming/intent/posix::secret
      - id: micro-behaviors/fs/proc/info::process-pid-mem
      - id: github-actions-targeting-shell
    crit: notable
  - id: github-actions-secret-harvest
    desc: Harvests secrets from GitHub Actions
    crit: hostile
    conf: 0.95
    for: [shell, python, javascript]
    all:
      - id: github-actions-targeting
      - id: github-actions-secret-marker-helper
      - id: micro-behaviors/process/create/shell::shell-platform-check
    any:
      - id: micro-behaviors/process/create/shell::curl-pipe-exec
      - id: micro-behaviors/process/create/shell::sudo-piped-exec
      - id: double-base64-encode
      - id: python-sudo-execution
