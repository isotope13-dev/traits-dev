defaults:
  platforms: [unix, windows, macos]
  attack: T1195.002
  mbc: B0024
  for: [javascript, typescript]
  crit: suspicious
traits:
  - id: asar-extract
    desc: ASAR archive extraction
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: asar\.extract(All)?\s*\(
  - id: asar-create
    desc: ASAR archive creation
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: asar\.(createPackage|pack)\s*\(
  - id: asar-reference
    desc: app.asar file reference
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: app.asar
  - id: electron-resources-path
    desc: Electron resources directory
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: resources
    unless:
      - id: metadata/dev/testing
  - id: electron-dist-path
    desc: Electron dist directory
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: dist/electron
  - id: fs-copyfile
    desc: File copy operation
    crit: notable
    conf: 0.5
    if:
      type: raw
      regex: fs\.copyFile(Sync)?\s*\(
  - id: fs-rm-recursive-dup
    desc: Recursive file/directory removal
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: fs\.rm(Sync)?\s*\([^)]{1,120}recursive
    downgrade:
      any:
        - id: metadata/dev/testing::raw-token-test
  - id: install-status-beacon
    desc: Install status C2 beacon
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: set-install-status
composite_rules:
  - id: asar-manipulation
    desc: ASAR archive extract and repack
    crit: suspicious
    conf: 0.9
    all:
      - id: asar-extract
      - id: asar-create
  - id: wallet-targeting
    desc: Crypto wallet path targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: objectives/credential-access/wallet/desktop::atomic
      - id: objectives/credential-access/wallet/desktop::exodus
      - id: objectives/credential-access/wallet/desktop::ledger
  - id: file-replacement
    desc: File replacement with cleanup
    crit: suspicious
    conf: 0.8
    all:
      - id: fs-copyfile
      - id: objectives/lateral-movement/supply-chain/electron::fs-rm-recursive-dup
  - id: c2-beacon-comp
    desc: C2 installation beacon
    crit: suspicious
    conf: 0.85
    any:
      - id: install-status-beacon
      - id: micro-behaviors/communications/ip::http-ip-url
  - id: electron-trojan
    desc: Electron app trojanization
    crit: hostile
    conf: 0.95
    mbc: B0024 - javascript - typescript
    all:
      - id: asar-reference
      - id: wallet-targeting
      - id: fs-copyfile
      - id: c2-beacon
  - id: asar-supply-chain
    desc: ASAR supply chain attack
    crit: hostile
    conf: 0.95
    attack: T1195.002 - javascript - typescript
    all:
      - id: asar-manipulation
      - id: fs-copyfile
      - id: c2-beacon
