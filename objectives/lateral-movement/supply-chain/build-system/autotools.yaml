# Build System Manipulation Detection - Autotools
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects suspicious patterns in configure.ac, Makefile.am, and m4 macros
# Inspired by XZ Utils backdoor techniques

defaults:
  for: [text, shell]
  crit: suspicious
  attack: "T1195.002"

traits:
  # ============================================================
  # CONFIGURE.AC / CONFIGURE SCRIPT TROJANS
  # ============================================================

  - id: configure-curl-exec
    desc: curl downloads and pipes to shell
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'curl.{0,120}(\|\s*(sh|bash)\b|\b(sh|bash)\s+-c\b)'

  - id: configure-curl-eval
    desc: curl downloads and evals
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'curl.{0,120}\|\s*eval\b|eval.{0,120}curl'

  - id: configure-wget-exec
    desc: wget downloads and pipes to shell
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'wget.{0,120}(\|\s*(sh|bash)\b|\b(sh|bash)\s+-c\b)'

  - id: configure-wget-eval
    desc: wget downloads and evals
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'wget.{0,120}\|\s*eval\b|eval.{0,120}wget'

  - id: configure-hidden-cmd
    desc: configure with hidden command execution
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: 'AC_INIT[\s\S]{0,500}(system|exec|popen)\s*\('

  # Atomic: Environment dump commands
  - id: env-cmd
    desc: env command for environment listing
    crit: notable
    conf: 0.5
    if:
      type: raw
      regex: '(^|[;&(|\s])env(\s|-|$)'

  # NOTE: printenv detection moved to micro-behaviors/os/env/vars::printenv
  # Referenced in composite rules below

  # Atomic: Network exfiltration tools
  - id: nc-cmd
    desc: netcat command
    crit: notable
    conf: 0.5
    if:
      type: raw
      regex: '\bnc\s'

  # ============================================================
  # M4 MACRO INJECTION - ATOMIC TRAITS
  # ============================================================

  # Atomic: M4 macro definition keywords
  - id: m4-define-keyword
    desc: m4_define macro keyword
    crit: notable
    conf: 0.6
    if:
      type: raw
      word: 'm4_define'

  - id: ac-defun-keyword
    desc: AC_DEFUN macro keyword
    crit: notable
    conf: 0.6
    if:
      type: raw
      word: 'AC_DEFUN'

  # Atomic: Dangerous operations in M4 context
  - id: m4-system-call
    desc: system() call in M4 macro context
    crit: suspicious
    conf: 0.75
    if:
      type: raw
      regex: '\bsystem\s*\('

  - id: m4-exec-call
    desc: exec call in M4 macro context
    crit: component
    conf: 0.75
    if:
      type: raw
      regex: '\bexec\s*\('

  - id: m4-popen-call
    desc: popen call in M4 macro context
    crit: suspicious
    conf: 0.75
    if:
      type: raw
      regex: '\bpopen\s*\('

  - id: m4-esyscmd
    desc: M4 esyscmd (shell execution)
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: 'm4_esyscmd\s*\('

  # Atomic: Encoding tools in M4 context
  - id: m4-base64-tool
    desc: base64 tool reference
    crit: notable
    conf: 0.6
    if:
      type: raw
      word: 'base64'

  - id: m4-xxd-tool
    desc: xxd tool reference
    crit: notable
    conf: 0.6
    if:
      type: raw
      word: 'xxd'

  - id: m4-od-tool
    desc: od tool with decode flags
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: '\bod\s+-'

  # ============================================================
  # MAKEFILE.AM TROJANS
  # ============================================================

  - id: makefile-am-curl
    desc: Makefile.am with curl/wget
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: '(curl|wget)\s+.{0,50}(http|ftp)://'

  - id: makefile-am-hidden-target
    desc: Makefile.am hidden target
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: '^\.PHONY:.{0,50}\.'

  - id: makefile-install-hook
    desc: Suspicious install hook
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: 'install-(exec|data)-hook.{0,100}(curl|wget|sh\s+-c)'

  # ============================================================
  # TEST FIXTURE ABUSE
  # ============================================================

  - id: test-fixture-binary-common
    desc: Binary blob in test fixtures (common extensions)
    crit: notable
    conf: 0.7
    for: [all]
    if:
      type: raw
      regex: 'tests?/(fixtures?|data).{0,30}\.(bin|dat|raw)'

  - id: test-fixture-binary-compressed
    desc: Compressed blob in test fixtures
    crit: notable
    conf: 0.7
    for: [all]
    if:
      type: raw
      regex: 'tests?/(fixtures?|data).{0,30}\.(xz|gz|bz2)'

  - id: test-samples-binary
    desc: Binary blob in test samples
    crit: notable
    conf: 0.7
    for: [all]
    if:
      type: raw
      regex: 'tests?/samples?.{0,30}\.(bin|dat|raw)'

  - id: test-samples-compressed
    desc: Compressed blob in test samples
    crit: notable
    conf: 0.7
    for: [all]
    if:
      type: raw
      regex: 'tests?/samples?.{0,30}\.(xz|gz|bz2)'

  - id: test-fixture-exec-xz
    desc: Test fixture decompressed with xz and executed
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: 'test.{0,50}xz[\s\S]{0,100}(sh|bash|\|)'

  - id: test-fixture-exec-gzip
    desc: Test fixture decompressed with gzip/gunzip and executed
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: 'test.{0,50}(gzip|gunzip)[\s\S]{0,100}(sh|bash|\|)'

  - id: test-fixture-exec-bzcat
    desc: Test fixture decompressed with bzcat and executed
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: 'test.{0,50}bzcat[\s\S]{0,100}(sh|bash|\|)'

  # ============================================================
  # OBJECT FILE / LIBRARY INJECTION
  # ============================================================

  - id: object-file-in-source-unix
    desc: Pre-compiled Unix object in source tree
    crit: suspicious
    conf: 0.8
    for: [text, shell]
    if:
      type: string
      regex: '[/\\]\w+\.(o|lo|a)\s*$'

  - id: object-file-in-source-win
    desc: Pre-compiled Windows object in source tree
    crit: suspicious
    conf: 0.8
    # This is meant for checked-in build inputs, not linker library names
    # embedded in compiled binaries.
    for: [text, shell, batch]
    if:
      type: string
      regex: '[/\\][^/\\\s]{1,80}\.(obj|lib)\s*$'

  - id: libtool-la-injection
    desc: Suspicious .la file manipulation
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: '\.la.{0,50}(dlopen|RTLD_)'

composite_rules:
  # === Environment Exfiltration ===
  # Composite: Environment dump command present
  - id: env-dump-cmd
    desc: Environment dump command
    crit: notable
    conf: 0.6
    any:
      - id: env-cmd
      - id: micro-behaviors/os/env/vars::printenv

  # Composite: Network exfil tool present
  - id: network-exfil-tool
    desc: Network exfiltration tool
    crit: notable
    conf: 0.6
    any:
      - id: configure-curl-exec
      - id: configure-wget-exec
      - id: nc-cmd

  # Composite: Configure script exfiltrates environment
  - id: configure-env-exfil
    desc: Configure script exfiltrates environment
    crit: suspicious
    conf: 0.9
    all:
      - id: env-dump-cmd
      - id: network-exfil-tool

  # === Configure Script Trojan ===
  # NOTE: This is 'suspicious' not 'hostile' because a single curl|bash pattern
  # alone is not definitively malicious. Hostile requires multiple indicators.
  - id: configure-trojan
    desc: Trojanized configure script
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    any:
      - id: configure-curl-exec
      - id: configure-curl-eval
      - id: configure-wget-exec
      - id: configure-wget-eval
      - id: configure-env-exfil
      - id: configure-hidden-cmd

  # === M4 Macro Definition ===
  # Composite: Any M4 macro definition keyword
  - id: m4-macro-def
    desc: M4 macro definition keyword
    crit: notable
    conf: 0.6
    any:
      - id: m4-define-keyword
      - id: ac-defun-keyword

  # === M4 Command Execution ===
  # Composite: Any dangerous command execution call
  - id: m4-cmd-exec
    desc: Command execution in M4 context
    crit: suspicious
    conf: 0.8
    any:
      - id: m4-system-call
      - id: m4-exec-call
      - id: m4-popen-call

  # === M4 Encoding Tools ===
  # Composite: Any encoding tool reference
  - id: m4-encoding-tool
    desc: Encoding tool reference
    crit: notable
    conf: 0.6
    any:
      - id: m4-base64-tool
      - id: m4-xxd-tool
      - id: m4-od-tool

  # === M4 Macro with Command Execution ===
  # Replaces old m4-define-exec regex with composition
  - id: m4-define-exec
    desc: M4 macro with command execution
    crit: suspicious
    conf: 0.85
    all:
      - id: m4-macro-def
      - id: m4-cmd-exec

  # === M4 Macro with Encoded Payload ===
  # Replaces old m4-hidden-payload regex with composition
  - id: m4-hidden-payload
    desc: M4 macro with encoded payload
    crit: suspicious
    conf: 0.85
    all:
      - id: m4-macro-def
      - id: m4-encoding-tool

  # === M4 Macro Backdoor ===
  - id: m4-backdoor
    desc: Backdoored M4 macro
    crit: hostile
    conf: 0.9
    any:
      - id: m4-define-exec
      - id: m4-hidden-payload
    all:
      - id: m4-esyscmd

  # === Test Fixture Binary Groups ===
  - id: test-fixture-binary
    desc: Any binary blob in test directory
    crit: notable
    conf: 0.7
    any:
      - id: test-fixture-binary-common
      - id: test-fixture-binary-compressed
      - id: test-samples-binary
      - id: test-samples-compressed

  # === Test Fixture Exec Groups ===
  - id: test-fixture-exec
    desc: Any test fixture execution pattern
    crit: suspicious
    conf: 0.85
    any:
      - id: test-fixture-exec-xz
      - id: test-fixture-exec-gzip
      - id: test-fixture-exec-bzcat

  # === Test Fixture Attack (XZ-style) ===
  - id: test-fixture-attack
    desc: Malicious test fixture pattern (XZ-style)
    crit: hostile
    conf: 0.9
    attack: "T1195.002"
    all:
      - id: test-fixture-binary
      - id: test-fixture-exec

  # === Build System Attack ===
  # NOTE: Changed to 'suspicious' - single indicator alone is not hostile.
  # Hostile requires multiple independent indicators (e.g., configure-trojan + m4-backdoor).
  - id: autotools-supply-chain-attack
    desc: Autotools build system supply chain attack
    crit: suspicious
    conf: 0.9
    attack: "T1195.002"
    any:
      - id: configure-trojan
      - id: m4-backdoor
      - id: test-fixture-attack
