# Supply Chain RAT Detection
# Composite rules for detecting RAT-like functionality in Go packages
# Designed to catch surreptitiously inserted RAT capabilities
# MBC: B0024 (Remote Access)
# ATT&CK: T1195.002 (Supply Chain Compromise: Software Supply Chain)
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [go]
  mbc: "B0024"
  attack: "T1195.002"
traits:
  # Supply chain insertion indicators
  - id: obfuscated-c2-config
    desc: Obfuscated C2 configuration
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: "config.{0,30}base64|decode.{0,30}server|xor.{0,30}addr"
  - id: embedded-binary-blob
    desc: Large embedded binary blob
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: "//go:embed.{0,50}\\.(exe|elf|bin)|embeddedBinary"
  - id: hidden-init-function
    desc: Hidden initialization in init()
    crit: notable
    conf: 0.7
    if:
      type: ast
      query: |
        (function_declaration
          name: (identifier) @name
          (#eq? @name "init"))
  - id: goroutine-connect
    desc: Goroutine connect pattern
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: "go\\s+connect"
  - id: goroutine-beacon
    desc: Goroutine beacon pattern
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: "go\\s+beacon"
  - id: goroutine-dial
    desc: Goroutine dial pattern
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: "go\\s+dial"
composite_rules:
  # === Helper Composites ===

  # Goroutine backdoor pattern
  - id: goroutine-backdoor
    desc: Goroutine backdoor patterns
    crit: suspicious
    conf: 0.8
    any:
      - id: goroutine-connect
      - id: goroutine-beacon
      - id: goroutine-dial
  # Network connectivity options
  - id: network-connectivity
    desc: Network connectivity method
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/communications/socket/connect::dial
      - id: objectives/command-and-control/channel/tor::bine-import
  # RAT capabilities
  - id: rat-capabilities
    desc: RAT additional capabilities
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/hardware/display/screen::screenshot-import
      - id: objectives/discovery/network/scan/port::gomap-import
      - id: micro-behaviors/fs/delete/secure::shred-import
  # Persistence mechanisms
  - id: persistence-mechanism
    desc: Persistence mechanism
    crit: suspicious
    conf: 0.85
    any:
      - id: objectives/persistence/login/registry/run-key::run-key-persistence
      - id: objectives/persistence/login/scheduled-task/masquerade::schtask-persistence
      - id: objectives/persistence/system/wmi/subscription::wmi-persistence
      - id: objectives/persistence/login/xdg::xdg-persistence
  # Execution methods
  - id: execution-method
    desc: Execution method
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/process/create/direct::exec-command
      - id: objectives/privilege-escalation/elevation-control/uac-bypass::go-escalate-import
  # C2 backend
  - id: c2-backend
    desc: C2 communication backend
    crit: notable
    conf: 0.85
    any:
      - id: micro-behaviors/process/create/direct::exec-command
      - id: micro-behaviors/communications/socket/rpc::rpc-register
  # RAT with shell access
  # Complexity: all(3) + for(1) = 4 >= 4 HOSTILE
  - id: rat-shell-access
    # === Basic RAT Profiles ===

    desc: RAT with remote shell execution
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: micro-behaviors/process/create/direct::exec-command
      - id: network-connectivity
  # RAT with screenshot capability
  # Complexity: all(3) + for(1) = 4 >= 4 HOSTILE
  - id: rat-screenshot
    desc: RAT with screen capture
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/hardware/display/screen::screenshot-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: network-connectivity
  # RAT with network reconnaissance
  # Complexity: all(3) + for(1) = 4 >= 4 HOSTILE
  - id: rat-network-recon
    desc: RAT with network scanning
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/discovery/network/scan/port::gomap-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: c2-backend
  # Tor RAT (ToRat-style)
  # Complexity: all(4) + for(1) = 5 >= 4 HOSTILE
  - id: tor-rat
    # === Tor-Based RAT ===

    desc: Tor-based Remote Access Trojan
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/channel/tor::bine-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: micro-behaviors/process/create/direct::exec-command
      - id: rat-capabilities
  # Tor RAT with persistence
  # Complexity: all(4) + for(1) = 5 >= 4 HOSTILE
  - id: tor-rat-persistent
    desc: Tor RAT with persistence mechanisms
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/command-and-control/channel/tor::bine-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: persistence-mechanism
      - id: execution-method
  # Hidden RAT in package init()
  # Complexity: all(4) + for(1) = 5 >= 4 HOSTILE
  - id: supply-chain-rat-init
    # === Supply Chain Specific ===

    desc: RAT functionality hidden in init()
    crit: hostile
    conf: 0.95
    all:
      - id: hidden-init-function
      - id: goroutine-backdoor
      - id: network-connectivity
      - id: c2-backend
  # Supply chain with anti-forensics
  # Complexity: all(4) + for(1) = 5 >= 4 HOSTILE
  - id: supply-chain-rat-antiforensics
    desc: RAT with anti-forensic capabilities
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/delete/secure::shred-import
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: network-connectivity
      - id: execution-method
  # Complete RAT profile (ToRat-like)
  # Complexity: all(5) + for(1) = 6 >= 4 HOSTILE
  - id: full-rat-profile
    # === Full-Featured RAT ===

    desc: Full-featured Remote Access Trojan
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/socket/rpc::rpc-register
      - id: micro-behaviors/process/create/direct::exec-command
      - id: network-connectivity
      - id: rat-capabilities
      - id: persistence-mechanism
