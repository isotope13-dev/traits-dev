defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - javascript
    - typescript
  attack: T1195.002
traits:
  - id: constructor-cacheoptions
    desc: Constructor accepts cache options
    crit: notable
    conf: 0.82
    if:
      type: raw
      substr: constructor(cacheOptions)
  - id: logcacheinit-call
    desc: Cache init logging call
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: logCacheInit(
  - id: cacheoptions-engine-ref
    desc: Cache engine passed to logger
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: cacheOptions.engine
  - id: logcacheinit-name
    desc: logCacheInit identifier
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      exact: logCacheInit
  - id: sendlogtoendpoint-name
    desc: sendLogToEndpoint identifier
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      exact: sendLogToEndpoint
  - id: cache-init-console-cover
    desc: Cache banner conceals telemetry
    crit: notable
    conf: 0.88
    if:
      type: string_value
      substr: '[simple-cache-mongoose] Cache initialized:'
composite_rules:
  - id: constructor-auto-init-beacon
    desc: Constructor triggers cache init beacon
    crit: suspicious
    conf: 0.97
    all:
      - id: constructor-cacheoptions
      - id: logcacheinit-call
      - id: cacheoptions-engine-ref
  - id: logging-disguise-identifiers
    desc: Telemetry disguised as logging
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: logcacheinit-name
      - id: sendlogtoendpoint-name
      - id: micro-behaviors/communications/http/webhook::fixed-webhook-endpoints-array
  - id: npm-cache-init-telemetry
    desc: NPM package hides telemetry in cache init
    crit: hostile
    conf: 0.995
    mbc: E1041
    all:
      - id: constructor-auto-init-beacon
      - id: logging-disguise-identifiers
      - id: objectives/exfiltration/http/query::ip-telemetry-get-exfil
  - id: npm-cache-init-telemetry-camouflage
    desc: Cache init telemetry camouflaged as logs
    crit: hostile
    conf: 0.995
    mbc: E1041
    all:
      - id: npm-cache-init-telemetry
      - id: cache-init-console-cover
