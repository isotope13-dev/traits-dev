defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
traits:
  - id: has-build-output
    desc: Package has build output directory
    crit: notable
    conf: 0.85
    for:
      - package.json
    if:
      type: string_value
      regex: '"main":\\s*"(dist/|lib/|build/|out/)'
  - id: has-src-directory
    desc: Package has src directory structure
    crit: notable
    conf: 0.8
    for:
      - package.json
    if:
      type: string_value
      regex: '"[^"]{0,120}src/|"files":[^]]*"src"'
  - id: has-examples
    desc: Package has examples directory
    crit: notable
    conf: 0.85
    for:
      - package.json
    if:
      type: string_value
      regex: '"examples"|"example"|"demo"|"demos"'
  - id: mocks-directory
    desc: /__mocks__/ directory
    crit: notable
    conf: 0.6
    for:
      - javascript
      - typescript
    if:
      type: string_value
      substr: /__mocks__/
