# npm Lifecycle Hook Script Detection
# Detects JavaScript files that serve as npm lifecycle hooks (preinstall.js, postinstall.js)
# and exhibit supply-chain dropper behavior
# ATT&CK: T1195.002 (Compromise Software Supply Chain)

defaults:
  for: [javascript]
  attack: "T1195.002"

traits:
  # === Hook Script Filename Detection ===
  - id: preinstall-js-filename
    desc: File named preinstall.js (npm hook)
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: "^preinstall\\.(js|cjs|mjs)$"

  - id: postinstall-js-filename
    desc: File named postinstall.js (npm hook)
    crit: component
    conf: 0.9
    if:
      type: basename
      regex: "^postinstall\\.(js|cjs|mjs)$"

  - id: install-js-filename
    desc: File named install.js (npm hook)
    crit: component
    conf: 0.85
    if:
      type: basename
      exact: "install.js"

  # === Cross-platform script execution indicators ===
  - id: shell-script-ref
    desc: References shell script file (.sh)
    crit: component
    conf: 0.7
    for: [javascript, typescript]
    if:
      type: string
      regex: "[a-zA-Z0-9_-]+\\.sh[\"' )]"

  - id: batch-script-ref
    desc: References batch script file (.bat/.cmd)
    crit: component
    conf: 0.7
    for: [javascript, typescript]
    if:
      type: string
      regex: "[a-zA-Z0-9_-]+\\.(bat|cmd)[\"' )]"

composite_rules:
  # === Hook script filename detection ===
  - id: hook-script-filename
    desc: npm lifecycle hook script filename
    crit: component
    conf: 0.9
    any:
      - id: preinstall-js-filename
      - id: postinstall-js-filename
      - id: install-js-filename

  # === Cross-platform script dropper ===
  - id: cross-platform-script-exec
    desc: Executes both shell and batch scripts
    crit: suspicious
    conf: 0.85
    for: [javascript, typescript]
    all:
      - id: shell-script-ref
      - id: batch-script-ref

  # === Supply chain hook dropper composite ===
  - id: hook-script-dropper
    desc: npm hook script executes platform-specific payloads
    crit: suspicious
    conf: 0.90
    mbc: "B0024"
    size_max: 10240
    all:
      - id: hook-script-filename
      - id: metadata/import/builtin::require-child-process
    any:
      - id: cross-platform-script-exec
      - id: objectives/execution/condition/platform::os-specific-execution
      - id: objectives/discovery/host/system/os-fingerprint::multi-os-targeting
