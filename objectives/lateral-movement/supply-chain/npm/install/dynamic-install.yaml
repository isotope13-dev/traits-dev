# Dynamic NPM Install from Code
# Detects runtime npm install executed via child_process
# ATT&CK: T1059.007 (JavaScript), T1195.002 (Supply Chain)
defaults:
  for: [javascript, typescript]
traits:
  - id: exec-npm-install
    desc: Dynamic npm install via exec/spawn
    crit: suspicious
    conf: 0.9
    attack: "T1059.007"
    if:
      type: raw
      regex: "(exec|spawn)\\s*\\([^)]{0,60}npm\\s+install"
  - id: npm-install-save
    desc: npm install with --save flag from code
    crit: suspicious
    conf: 0.92
    attack: "T1195.002"
    if:
      type: raw
      regex: "npm\\s+install\\s+[a-z@][a-z0-9._@/-]{1,60}\\s+--save"
composite_rules:
  - id: runtime-npm-install-comp
    desc: Runtime npm package installation
    crit: suspicious
    conf: 0.93
    attack: "T1059.007"
    for: [javascript, typescript]
    all:
      - id: metadata/import/builtin/node::require-child-process
    any:
      - id: exec-npm-install
      - id: npm-install-save
