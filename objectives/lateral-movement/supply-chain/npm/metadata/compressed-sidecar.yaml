# Compressed npm metadata sidecars
# These files appear in malware corpora as registry metadata snapshots rather than
# unpacked package.json files. Without structured decompression support, we focus on
# the unusual artifact shape that still carries analytical value.
defaults:
  for: [all]
traits:
  - id: meta-json-zstd-basename
    desc: npm metadata sidecar basename
    crit: component
    conf: 1.0
    if:
      type: basename
      exact: "meta.json.zst"
  - id: tiny-sidecar
    desc: Tiny compressed metadata sidecar
    crit: notable
    conf: 0.8
    size_max: 1536
    if:
      type: basename
      substr: "meta.json.zst"
  - id: high-entropy-sidecar
    desc: High entropy compressed sidecar
    crit: notable
    conf: 0.8
    size_max: 1536
    if:
      type: metrics
      field: "binary.overall_entropy"
      min: 7.5
  - id: non-ascii-heavy-sidecar
    desc: Non-ASCII heavy compressed sidecar
    crit: notable
    conf: 0.75
    if:
      type: metrics
      field: "text.non_ascii_ratio"
      min: 0.7
composite_rules:
  - id: zstd-json-sidecar
    desc: ZSTD-compressed JSON metadata sidecar
    crit: notable
    conf: 0.9
    all:
      - id: meta-json-zstd-basename
      - id: metadata/format/json::zstd-json
  - id: minimal-zstd-json-sidecar
    desc: Tiny ZSTD JSON metadata sidecar
    crit: suspicious
    conf: 0.92
    all:
      - id: zstd-json-sidecar
      - id: tiny-sidecar
