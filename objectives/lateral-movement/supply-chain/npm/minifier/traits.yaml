# Minifier Output Patterns
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
traits:
  - id: use-strict-quote
    desc: use strict directive string
    crit: component
    conf: 0.6
    if:
      type: string
      substr: "use strict"
  - id: void-zero
    desc: void 0 minifier output pattern
    crit: baseline
    conf: 0.6
    if:
      type: string
      substr: "void 0"
  - id: esmodule-export
    desc: __esModule property
    crit: component
    conf: 0.6
    if:
      type: string
      substr: "__esModule"
