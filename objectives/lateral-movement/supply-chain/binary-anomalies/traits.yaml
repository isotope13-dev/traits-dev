# Supply Chain - Binary Anomalies
# Detects suspicious binary files embedded in script-based packages
# NPM and Python packages shouldn't normally contain .exe, .dll files
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [shell, python, javascript, powershell, pe, elf]
composite_rules:
  # === NPM Package with Binaries (container-level cross-file detection) ===
  - id: npm-package-with-exe
    desc: NPM package contains Windows executable
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/quality/files::package-json-basename
    any:
      - id: metadata/quality/files::exe-extension-basename
  - id: npm-package-with-dll
    desc: NPM package contains Windows DLL
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/quality/files::package-json-basename
    any:
      - id: metadata/quality/files::dll-extension-basename
  - id: npm-package-with-native-binary
    desc: NPM package contains native binary (exe/dll/so/dylib)
    crit: suspicious
    conf: 0.85
    all:
      - id: metadata/quality/files::package-json-basename
    any:
      - id: metadata/quality/files::exe-extension-basename
      - id: metadata/quality/files::dll-extension-basename
      - id: metadata/quality/files::so-extension-basename
      - id: metadata/quality/files::dylib-extension-basename
  - id: npm-package-with-image
    desc: NPM package contains PNG image (potential steganography)
    crit: notable
    conf: 0.7
    all:
      - id: metadata/quality/files::package-json-basename
    any:
      - id: metadata/quality/files::png-extension-basename
      - id: metadata/quality/files::ico-extension-basename
  # === Python Package with Binaries (container-level cross-file detection) ===
  - id: python-package-with-exe
    desc: Python package contains Windows executable
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/quality/files::setup-py-basename
    any:
      - id: metadata/quality/files::exe-extension-basename
  - id: python-package-with-exe-pyproject
    desc: Python package (pyproject.toml) contains Windows executable
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/quality/files::pyproject-toml-basename
    any:
      - id: metadata/quality/files::exe-extension-basename
  - id: python-package-with-dll
    desc: Python package contains Windows DLL
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/quality/files::setup-py-basename
    any:
      - id: metadata/quality/files::dll-extension-basename
  - id: python-package-with-dll-pyproject
    desc: Python package (pyproject.toml) contains Windows DLL
    crit: suspicious
    conf: 0.9
    all:
      - id: metadata/quality/files::pyproject-toml-basename
    any:
      - id: metadata/quality/files::dll-extension-basename
  - id: python-package-with-native-binary
    desc: Python package contains native binary (exe/dll)
    crit: suspicious
    conf: 0.85
    any:
      - id: python-package-with-exe
      - id: python-package-with-exe-pyproject
      - id: python-package-with-dll
      - id: python-package-with-dll-pyproject
  - id: python-package-with-image
    desc: Python package contains PNG image (potential steganography)
    crit: notable
    conf: 0.7
    all:
      - id: metadata/quality/files::setup-py-basename
    any:
      - id: metadata/quality/files::png-extension-basename
      - id: metadata/quality/files::ico-extension-basename
  # === Combined package binary detection ===
  - id: script-package-with-windows-binary
    desc: Script-based package contains Windows binary (highly suspicious)
    crit: suspicious
    conf: 0.9
    any:
      - id: npm-package-with-exe
      - id: npm-package-with-dll
      - id: python-package-with-exe
      - id: python-package-with-exe-pyproject
      - id: python-package-with-dll
      - id: python-package-with-dll-pyproject
