# GitHub Actions Supply Chain Attack Patterns
defaults:
  platforms: [linux, unix, macos, android, ios, windows]
traits:
  - id: github-actions-targeting-shell
    desc: Targets GitHub Actions (Shell)
    crit: notable
    conf: 0.9
    for: [shell]
    if:
      type: string_value
      regex: 'isSecret":true'
  - id: python-sudo-execution
    desc: Executes python via sudo
    crit: notable
    conf: 0.9
    for: [shell, python]
    if:
      type: raw
      regex: "sudo python3?"
  - id: double-base64-encode
    desc: Double base64 encoding pattern
    crit: suspicious
    conf: 0.8
    for: [shell]
    if:
      type: raw
      regex: '\|\s*base64\b.{0,50}\|\s*base64\b'
  - id: github-actions-token-regex
    desc: GitHub Actions token regex pattern
    crit: notable
    conf: 0.95
    for: [shell, python]
    if:
      type: raw
      regex: "ghs_[0-9A-Za-z]{20,}"
  - id: memdump-py-download
    desc: Downloads known GitHub Actions memory dumper (memdump.py)
    crit: suspicious
    conf: 0.97
    attack: T1003
    for: [shell]
    if:
      type: raw
      regex: 'curl.{0,150}memdump\.py'
composite_rules:
  - id: github-actions-targeting
    desc: Targets GitHub Actions environment
    crit: notable
    conf: 0.9
    any:
      - id: metadata/builder/github-actions::github-actions
      - id: metadata/builder/github-actions::github-runner-worker
      - id: metadata/builder/github-actions::github-runner-listener
      - id: github-actions-targeting-shell
      - id: github-actions-token-regex
  - id: github-actions-memdump-downloader
    desc: Downloads and executes GitHub Actions memory dumper
    crit: hostile
    conf: 0.97
    attack: T1003
    for: [shell]
    all:
      - id: memdump-py-download
      - id: micro-behaviors/process/create/shell::sudo-piped-script-exec
  - id: github-runner-memory-dumper
    desc: Dumps GitHub Actions Runner memory
    crit: suspicious
    conf: 0.95
    for: [python, javascript, shell, rust, go]
    any:
      - id: github-actions-memdump-downloader
    all:
      - id: github-actions-targeting
  - id: github-actions-secret-marker-helper
    desc: Helper for secret or memory access
    any:
      - id: objectives/evasion/masquerade/naming/posix::secret
      - id: micro-behaviors/fs/proc/info::process-pid-mem
      - id: github-actions-targeting-shell
    crit: notable
  - id: github-actions-secret-harvest
    desc: Harvests secrets from GitHub Actions
    crit: hostile
    conf: 0.95
    for: [shell, python, javascript]
    any:
      - id: github-actions-memdump-downloader
    all:
      - id: github-actions-targeting
      - id: github-actions-secret-marker-helper
