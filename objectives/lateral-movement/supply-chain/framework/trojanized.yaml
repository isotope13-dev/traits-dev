defaults:
  platforms: [linux, macos, windows, unix, android, ios]
traits:
  - id: lodash-lib
    desc: lodash library
    crit: component
    for: [package.json]
    if:
      type: string_value
      word: lodash
      case_insensitive: true
  - id: express-lib
    desc: express library
