composite_rules:
  - id: popular-libs
    desc: Popular library names
    crit: component
    for: [package.json]
    any:
      - id: lodash-lib
      - id: micro-behaviors/communications/http/lib/axios::axios
      - id: express-lib
      - id: react-lib
      - id: discord-lib
      - id: telegram-word
      - id: winston-lib
      - id: pino-lib
  - id: install-hooks
    desc: NPM install hooks
    crit: component
    for: [package.json]
    any:
      - id: preinstall-hook
      - id: postinstall-hook
  - id: network-cmds
    desc: Network download commands
    crit: component
    for: [package.json]
    any:
      - id: objectives/command-and-control/dropper/execution/script::curl-cmd-dup
      - id: objectives/command-and-control/beacon/network::wget-cmd-dup
  - id: popular-lib-with-hooks
    desc: Popular library with unusual install hooks
    crit: suspicious
    conf: 0.85
    attack: T1195.001
    for: [package.json]
    all:
      - id: popular-libs
      - id: install-hooks
      - id: network-cmds
  - id: legit-requires
    desc: Legitimate library requires
    crit: component
    for: [javascript]
    any:
      - id: metadata/library/web-frameworks::uses-express
      - id: require-lodash
      - id: require-axios
  - id: suspicious-requires
    desc: Suspicious module requires
    crit: component
    for: [javascript]
    any:
      - id: objectives/lateral-movement/supply-chain/framework::require-child-process-dup
      - id: require-os
      - id: require-https
      - id: objectives/lateral-movement/supply-chain/framework::require-fs-dup
  - id: network-patterns
    desc: Network call patterns
    crit: component
    for: [javascript]
    any:
      - id: micro-behaviors/communications/http/request::fetch-string
      - id: micro-behaviors/process/interpreter/vm::request-method-call
  - id: two-suspicious-requires
    desc: Two or more suspicious requires
    crit: component
    for: [javascript]
    needs: 2
    any:
      - id: objectives/lateral-movement/supply-chain/framework::require-child-process-dup
      - id: require-os
      - id: require-https
      - id: objectives/lateral-movement/supply-chain/framework::require-fs-dup
  - id: additional-requires
    desc: Library clone with suspicious additional requires
    crit: suspicious
    conf: 0.85
    attack: T1195.001
    for: [javascript]
    all:
      - id: legit-requires
      - id: two-suspicious-requires
      - id: network-patterns
  - id: discord-indicators
    desc: Discord library indicators
    crit: component
    for: [javascript, typescript]
    any:
      - id: discord-js
      - id: discord-io
      - id: discord-client
  - id: discord-tokens
    desc: Discord token indicators
    crit: component
    for: [javascript, typescript]
    any:
      - id: objectives/credential-access/env/secrets::discord-token
      - id: dot-token
  - id: steal-indicators
    desc: Data theft indicators
    crit: component
    for: [javascript, typescript]
    any:
      - id: localstorage-str
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
  - id: exfil-indicators-comp
    desc: Exfiltration indicators
    crit: component
    for: [javascript, typescript]
    any:
      - id: webhook-str
      - id: steal-indicators
      - id: micro-behaviors/communications/http/post::post
  - id: discord-library
    desc: Trojanized Discord library patterns
    crit: suspicious
    conf: 0.9
    attack: T1195.001
    mbc: B0024
    for: [javascript, typescript]
    all:
      - id: discord-indicators
      - id: discord-tokens
      - id: exfil-indicators
  - id: telegram-indicators
    desc: Telegram library indicators
    crit: component
    for: [javascript, typescript]
    any:
      - id: telegram-word
      - id: telegraf-str
      - id: micro-behaviors/data/text/malware::malware-bot-tool-suffix
  - id: malicious-process-calls
    desc: Malicious process execution calls
    crit: component
    for: [javascript, typescript]
    any:
      - id: micro-behaviors/process/create/shell/lang::child-process-require
      - id: micro-behaviors/process/create/shell/lang::spawn-call
      - id: objectives/lateral-movement/supply-chain/dropper/builder::exec-paren
  - id: oob-exfil-indicators
    desc: Out-of-band exfiltration indicators
    crit: component
    for: [javascript, typescript]
    any:
      - id: oast-str
      - id: webhook-site-str
  - id: telegram-library
    desc: Trojanized Telegram library patterns
    crit: suspicious
    conf: 0.9
    attack: T1195.001
    mbc: B0024
    for: [javascript, typescript]
    all:
      - id: telegram-indicators
      - id: malicious-process-calls
      - id: oob-exfil-indicators
  - id: logging-indicators
    desc: Logging library indicators
    crit: component
    for: [javascript, typescript]
    any:
      - id: winston-str
      - id: pino-str
      - id: bunyan-str
      - id: log4js-str
  - id: logging-suspicious-additions
    desc: Suspicious additions for logging library
    crit: component
    for: [javascript, typescript]
    any:
      - id: micro-behaviors/process/create/shell/lang::child-process-require
      - id: spawn-word
      - id: objectives/anti-static/obfuscation/payload/bytecode::exec-word
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
  - id: two-logging-suspicious
    desc: Two or more suspicious additions in logging library
    crit: component
    for: [javascript, typescript]
    needs: 2
    any:
      - id: micro-behaviors/process/create/shell/lang::child-process-require
      - id: spawn-word
      - id: objectives/anti-static/obfuscation/payload/bytecode::exec-word
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
  - id: logging-library
    desc: Trojanized logging library patterns
    crit: suspicious
    conf: 0.85
    attack: T1195.001
    for: [javascript, typescript]
    all:
      - id: logging-indicators
      - id: two-logging-suspicious
  - id: sdk-indicators
    desc: SDK/API client indicators
    crit: component
    for: [javascript, typescript, package.json]
    any:
      - id: sdk-suffix
      - id: client-suffix
      - id: api-suffix
      - id: client-word
  - id: sdk-install-hooks
    desc: SDK install hooks
    crit: component
    for: [javascript, typescript, package.json]
    any:
      - id: preinstall-hook
      - id: postinstall-hook
  - id: sdk-suspicious-activity
    desc: SDK suspicious activity
    crit: component
    for: [javascript, typescript, package.json]
    any:
      - id: objectives/command-and-control/dropper/execution/script::curl-cmd-dup
      - id: objectives/command-and-control/beacon/network::wget-cmd-dup
      - id: os-userinfo-str
  - id: sdk-client
    desc: Trojanized SDK or API client
    crit: suspicious
    conf: 0.8
    attack: T1195.001
    for: [javascript, typescript, package.json]
    all:
      - id: sdk-indicators
      - id: sdk-install-hooks
      - id: sdk-suspicious-activity
  - id: crypto-library-indicators
    desc: Cryptocurrency library indicators
    crit: component
    for: [javascript, typescript]
    any:
      - id: ethers-str
      - id: web3-str
      - id: objectives/impact/cryptojacking/miner::wallet-ref
      - id: objectives/impact/ransom/encrypt::bitcoin-word
      - id: solana-str
  - id: key-theft-indicators
    desc: Key theft patterns
    crit: component
    for: [javascript, typescript]
    any:
      - id: privatekey-str
      - id: objectives/credential-access/wallet/mnemonic::mnemonic-word
      - id: seedphrase-str
      - id: keystore-str
  - id: crypto-exfil-indicators
    desc: Crypto exfiltration indicators
    crit: component
    for: [javascript, typescript]
    any:
      - id: webhook-str
      - id: micro-behaviors/communications/http/post::post
      - id: oast-str
  - id: crypto-library
    desc: Trojanized cryptocurrency library
    crit: suspicious
    conf: 0.9
    attack: T1195.001
    mbc: B0024
    for: [javascript, typescript]
    size_max: 262144
    all:
      - id: crypto-library-indicators
      - id: key-theft-indicators
      - id: crypto-exfil-indicators
  - id: suspicious-trojanized-framework
    desc: Likely trojanized framework with embedded payload and suspicious capabilities
    crit: suspicious
    conf: 0.9
    attack: T1195.001
    mbc: B0024
    for: [macho, dylib, elf, so]
    all:
      - id: framework-binary-marker
      - id: micro-behaviors/data/embedded/payload::lzma-magic
      - id: micro-behaviors/communications/http/delete::delete
  - id: trojanized-framework-networked
    desc: Trojanized framework with network and payload capabilities
    crit: suspicious
    conf: 0.92
    attack: T1195.001
    mbc: B0024
    for: [macho, dylib, elf, so]
    all:
      - id: suspicious-trojanized-framework
      - id: micro-behaviors/communications/socket/bind::bind
  - id: trojanized-framework-with-c2
    desc: Trojanized framework with command & control indicators
    crit: hostile
    conf: 0.95
    attack: T1195.001
    mbc: B0024
    for: [macho, dylib, elf, so]
    all:
      - id: trojanized-framework-networked
      - id: objectives/command-and-control/infrastructure/domain::http-url-binary
  - id: nanopb-with-ios-injection
    desc: Protobuf library with iOS code injection framework
    crit: suspicious
    conf: 0.85
    attack: T1195.001
    mbc: B0024
    for: [macho, dylib, ipa]
    all:
      - id: nanopb-framework
      - id: objectives/evasion/process/injection/runtime::cbinjection-framework
