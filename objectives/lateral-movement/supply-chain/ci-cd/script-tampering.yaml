# CI/CD Script Tampering Detection
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects patterns similar to Codecov shell uploader attack
# Malicious code injected into CI scripts that exfiltrate secrets
defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  for: [shell]
  crit: suspicious
  attack: "T1195.002"
traits:
  # ============================================================
  # CODECOV-STYLE PATTERNS
  # ============================================================
  - id: git-remote-url-capture
    desc: Captures git remote URL
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: 'git\s+(remote|config).{0,30}(url|origin)'
  - id: env-to-curl-post
    desc: Environment sent to external URL
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '(env|printenv|set).{0,30}\|.{0,30}curl.{0,30}-X\s*POST'
  # Atomic traits for sensitive variable grepping (grep/sed + TOKEN/SECRET)
  - id: grep-token-var
    desc: grep for TOKEN variable
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: 'grep.{0,50}TOKEN'
  - id: grep-secret-var
    desc: grep for SECRET variable
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: 'grep.{0,50}SECRET'
  - id: sed-token-var
    desc: sed for TOKEN variable
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: 'sed.{0,50}TOKEN'
  - id: sed-secret-var
    desc: sed for SECRET variable
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: 'sed.{0,50}SECRET'
  - id: sensitive-var-grep-key
    desc: Greps for KEY variables
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: '(grep|awk|sed).{0,50}KEY'
  - id: sensitive-var-grep-pass
    desc: Greps for PASS variables
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: '(grep|awk|sed).{0,50}PASS'
  - id: sensitive-var-grep-cred
    desc: Greps for CRED variables
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: '(grep|awk|sed).{0,50}CRED'
  - id: curl-with-env-data
    desc: curl with environment in data
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'curl.{0,50}(-d|--data).{0,30}\$'
  # ============================================================
  # COVERAGE TOOL IMPERSONATION
  # ============================================================
  - id: coverage-tool-exfil
    desc: Coverage tool with suspicious exfil
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: '(codecov|coveralls|codeclimate)[\s\S]{0,300}(curl|wget).{0,50}\$'
  # Atomic traits for shell uploader pattern (decomposed to avoid overlaps)
  - id: sh-curl-process-sub-env
    desc: sh with curl process substitution accessing env
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: 'sh.{0,30}<\(curl[\s\S]{0,200}env[^a-z]'
  - id: sh-curl-process-sub-var
    desc: curl process substitution accessing shell variables
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: 'sh.{0,30}<\(curl[\s\S]{0,200}\$[A-Z_]+'
  # ============================================================
  # GITHUB ACTIONS INJECTION
  # ============================================================
  - id: gha-run-curl-secrets
    desc: GitHub Actions run with curl and secrets
    crit: suspicious
    conf: 0.95
    for: [github-actions]
    if:
      type: raw
      regex: 'run:.{0,50}curl.{0,50}\$\{\{\s*secrets\.'
  - id: gha-env-dump
    desc: GitHub Actions dumps environment
    crit: suspicious
    conf: 0.85
    for: [github-actions]
    if:
      type: raw
      regex: 'run:.{0,30}(env|printenv|set)'
  - id: gha-base64-secrets
    desc: GitHub Actions base64 encodes secrets
    crit: suspicious
    conf: 0.95
    for: [github-actions]
    if:
      type: raw
      regex: 'base64.{0,50}\$\{\{\s*secrets\.'
  # ============================================================
  # CI CONFIG FILE PATTERNS
  # ============================================================
  - id: travis-env-curl
    desc: Travis CI with env exfiltration
    crit: suspicious
    conf: 0.9
    for: [text, shell]
    if:
      type: raw
      regex: '(script|after_success|before_install)[\s\S]{0,200}(env|printenv).{0,30}curl'
  - id: circleci-env-curl
    desc: CircleCI with env exfiltration
    crit: suspicious
    conf: 0.9
    for: [text, shell]
    if:
      type: raw
      regex: '(run:|command:)[\s\S]{0,100}(env|printenv).{0,30}(curl|wget)'
  # ============================================================
  # ARTIFACT POISONING
  # ============================================================
  - id: artifact-mv-dist-build
    desc: mv to dist or build directory
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: 'mv\s.{0,50}(dist|build)/.{0,30}(\.|$)'
  - id: artifact-cp-dist-build
    desc: cp to dist or build directory
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: 'cp\s.{0,50}(dist|build)/.{0,30}(\.|$)'
  - id: artifact-cat-dist-build
    desc: cat redirect to dist or build directory
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: 'cat\s*>.{0,50}(dist|build)/.{0,30}(\.|$)'
  - id: artifact-mv-out-target
    desc: mv to out or target directory
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: 'mv\s.{0,50}(out|target)/.{0,30}(\.|$)'
  - id: artifact-cp-out-target
    desc: cp to out or target directory
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: 'cp\s.{0,50}(out|target)/.{0,30}(\.|$)'
  - id: artifact-cat-out-target
    desc: cat redirect to out or target directory
    crit: notable
    conf: 0.7
    if:
      type: raw
      regex: 'cat\s*>.{0,50}(out|target)/.{0,30}(\.|$)'
  - id: download-replace-artifact-curl
    desc: curl downloads to artifact directory
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: 'curl.{0,100}(dist|build|out|target)/'
  - id: download-replace-artifact-wget
    desc: wget downloads to artifact directory
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: 'wget.{0,100}(dist|build|out|target)/'
composite_rules:
  # === Sensitive Variable Grepping (TOKEN/SECRET) ===
  - id: sensitive-var-grep-token-secret
    desc: Greps for TOKEN or SECRET variables
    crit: suspicious
    conf: 0.85
    any:
      - id: grep-token-var
      - id: grep-secret-var
      - id: sed-token-var
      - id: sed-secret-var
  # === Sensitive Variable Grepping (KEY/PASS/CRED) ===
  - id: sensitive-var-grep-key-pass-cred
    desc: Greps for KEY, PASS, or CRED variables
    crit: suspicious
    conf: 0.85
    any:
      - id: sensitive-var-grep-key
      - id: sensitive-var-grep-pass
      - id: sensitive-var-grep-cred
  # === Bash Uploader Pattern ===
  - id: shell-uploader-pattern
    desc: Bash uploader with env access
    crit: suspicious
    conf: 0.85
    any:
      - id: sh-curl-process-sub-env
      - id: sh-curl-process-sub-var
  # === Codecov-style Attack ===
  - id: codecov-style-attack
    desc: Codecov-style CI secret exfiltration
    crit: hostile
    conf: 0.98
    attack: "T1552.001"
    mbc: "E1552"
    any:
      - id: env-to-curl-post
      - id: curl-with-env-data
      - id: coverage-tool-exfil
      - id: shell-uploader-pattern
  # === GitHub Actions Secret Theft ===
  - id: gha-secret-theft
    desc: GitHub Actions secret theft
    crit: hostile
    conf: 0.95
    attack: "T1552.001"
    any:
      - id: gha-run-curl-secrets
      - id: gha-base64-secrets
    all:
      - id: gha-env-dump
  # === CI Config Injection ===
  - id: ci-config-injection
    desc: CI configuration injection attack
    crit: hostile
    conf: 0.95
    any:
      - id: travis-env-curl
      - id: circleci-env-curl
  # === Artifact Poisoning ===
  - id: download-replace-artifact
    desc: Download to artifact directory
    crit: suspicious
    conf: 0.9
    any:
      - id: download-replace-artifact-curl
      - id: download-replace-artifact-wget
  - id: artifact-replace-dist-build
    desc: Replace dist or build artifacts
    crit: suspicious
    conf: 0.8
    any:
      - id: artifact-mv-dist-build
      - id: artifact-cp-dist-build
      - id: artifact-cat-dist-build
  - id: artifact-replace-out-target
    desc: Replace out or target artifacts
    crit: suspicious
    conf: 0.8
    any:
      - id: artifact-mv-out-target
      - id: artifact-cp-out-target
      - id: artifact-cat-out-target
  - id: artifact-replace-target
    desc: Replace build artifacts
    crit: suspicious
    conf: 0.8
    any:
      - id: artifact-replace-dist-build
      - id: artifact-replace-out-target
  - id: artifact-poisoning
    desc: Build artifact poisoning
    crit: hostile
    conf: 0.9
    all:
      - id: download-replace-artifact
      - id: artifact-replace-target
  # === Any CI/CD Attack ===
  - id: ci-cd-supply-chain-attack
    desc: CI/CD supply chain attack
    crit: hostile
    conf: 0.98
    any:
      - id: codecov-style-attack
      - id: gha-secret-theft
      - id: ci-config-injection
      - id: artifact-poisoning
