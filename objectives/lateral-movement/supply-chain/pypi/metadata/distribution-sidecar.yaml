defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1195.002"
  for: [python]
traits:
  - id: wheel-filename
    desc: PyPI wheel filename in metadata
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "urls[*].filename"
      regex: "\\.whl$"
  - id: wheel-filename-raw
    desc: PyPI wheel filename in raw metadata
    crit: baseline
    conf: 0.9
    for: [text]
    if:
      type: raw
      substr: '.whl"'
  - id: sdist-filename
    desc: PyPI source distribution filename
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "urls[*].filename"
      regex: "\\.tar\\.gz$"
  - id: sdist-filename-raw
    desc: PyPI sdist filename in raw metadata
    crit: baseline
    conf: 0.9
    for: [text]
    if:
      type: raw
      substr: '.tar.gz"'
  - id: wheel-packagetype
    desc: Wheel package type metadata
    crit: component
    conf: 0.95
    if:
      type: kv
      path: "urls[*].packagetype"
      exact: "bdist_wheel"
  - id: wheel-packagetype-raw
    desc: Wheel package type in raw metadata
    crit: baseline
    conf: 0.9
    for: [text]
    if:
      type: raw
      substr: '"packagetype": "bdist_wheel"'
  - id: tiny-wheel-size
    desc: Tiny wheel payload size
    crit: suspicious
    conf: 0.9
    if:
      type: kv
      path: "urls[*].size"
      regex: "^[0-9]{1,3}$|^10[0-9]{2}$|^11[0-9]{2}$|^12[0-9]{2}$"
  - id: tiny-wheel-size-raw-10xx
    desc: Tiny wheel size prefix 10xx
    crit: component
    conf: 0.9
    for: [text]
    if:
      type: raw
      substr: '"size": 10'
  - id: tiny-wheel-size-raw-11xx
    desc: Tiny wheel size prefix 11xx
    crit: component
    conf: 0.9
    for: [text]
    if:
      type: raw
      substr: '"size": 11'
  - id: tiny-wheel-size-raw-12xx
    desc: Tiny wheel size prefix 12xx
    crit: component
    conf: 0.9
    for: [text]
    if:
      type: raw
      substr: '"size": 12'
  - id: empty-wheel-dist-info-only
    desc: Wheel contains only dist-info files
    crit: component
    conf: 0.95
    if:
      type: string_count
      max: 6
composite_rules:
  - id: tiny-wheel-with-sdist-kv
    desc: Tiny wheel paired with source sdist
    crit: suspicious
    conf: 0.93
    for: [text]
    all:
      - id: wheel-filename
      - id: sdist-filename
      - id: wheel-packagetype
      - id: tiny-wheel-size
  - id: tiny-wheel-size-raw
    desc: Tiny wheel size in raw metadata
    crit: suspicious
    conf: 0.9
    for: [text]
    any:
      - id: tiny-wheel-size-raw-10xx
      - id: tiny-wheel-size-raw-11xx
      - id: tiny-wheel-size-raw-12xx
  - id: tiny-wheel-with-sdist-raw
    desc: Tiny wheel paired with source sdist
    crit: suspicious
    conf: 0.93
    for: [text]
    all:
      - id: wheel-filename-raw
      - id: sdist-filename-raw
      - id: wheel-packagetype-raw
      - id: tiny-wheel-size-raw
  - id: tiny-bdist-wheel-sidecar
    desc: Tiny bdist wheel in sidecar
    crit: suspicious
    conf: 0.91
    for: [text]
    all:
      - id: wheel-filename-raw
      - id: wheel-packagetype-raw
      - id: tiny-wheel-size-raw
  - id: wheel-and-sdist-sidecar
    desc: Wheel and sdist pair in sidecar
    crit: suspicious
    conf: 0.88
    for: [text]
    all:
      - id: objectives/lateral-movement/supply-chain/npm/metadata::registry-metadata-json
      - id: wheel-filename-raw
      - id: sdist-filename-raw
  - id: tiny-wheel-with-sdist
    desc: Tiny wheel paired with source sdist
    crit: suspicious
    conf: 0.93
    for: [text]
    all:
      - id: objectives/lateral-movement/supply-chain/npm/metadata::registry-metadata-json
    any:
      - id: tiny-wheel-with-sdist-kv
      - id: tiny-wheel-with-sdist-raw
  - id: dist-info-only-wheel
    desc: Wheel distribution is dist-info only
    crit: suspicious
    conf: 0.92
    for: [text]
    all:
      - id: wheel-filename
      - id: empty-wheel-dist-info-only
