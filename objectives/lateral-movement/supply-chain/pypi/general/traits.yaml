defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: notable
  attack: T1036.005
  mbc: F0004
  for:
    - python
    - package.json
    - pkginfo
traits:
  - id: empty-classifiers
    desc: Empty classifiers list
    crit: notable
    conf: 0.5
    for:
      - python
    if:
      type: string_value
      regex: classifiers.{0,50}=.{0,50}\[\]
  - id: unknown-license
    desc: PKG-INFO has UNKNOWN license
    crit: notable
    conf: 0.75
    if:
      type: kv
      path: license
      exact: UNKNOWN
  - id: unknown-platform
    desc: PKG-INFO has UNKNOWN platform
    crit: notable
    conf: 0.7
    if:
      type: kv
      path: platform
      exact: UNKNOWN
  - id: is-pkginfo-file
    desc: Python PKG-INFO metadata file
    crit: notable
    conf: 1.0
    if:
      type: kv
      path: metadata-version
  - id: setup-py-file
    desc: Python setup.py file
    crit: notable
    conf: 0.9
    for:
      - python
    if:
      type: string_value
      regex: \bsetup\s*\(
  - id: pkginfo-tiny
    desc: Extremely small PKG-INFO file
    crit: notable
    conf: 0.7
    size_max: 200
    if:
      type: kv
      path: metadata-version
