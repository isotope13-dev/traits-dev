defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  attack: "T1195.002"
  for: [python, pkginfo]
traits:
  - id: tiny-init-module
    desc: Tiny Python module payload
    crit: notable
    conf: 0.9
    for: [python]
    size_max: 256
    if:
      type: basename
      regex: __init__\.py$
composite_rules:
  - id: init-network-pingback
    desc: Import time network pingback
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/lateral-movement/supply-chain/pypi/install-patterns::init-py-file
      - id: micro-behaviors/communications/http/lib/requests::requests-get
      - id: objectives/exfiltration/channel/callback::interact-sh-me-fun
    any:
      - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
      - id: tiny-init-module
      - id: micro-behaviors/communications/http/request::url-literal
  - id: init-encoded-url-callback
    desc: Init-time base64 encoded URL callback
    crit: suspicious
    conf: 0.95
    all:
      - id: objectives/lateral-movement/supply-chain/pypi/install-patterns::init-py-file
      - id: micro-behaviors/data/decode/base64::b64decode-call
      - id: micro-behaviors/communications/http/request::request-python
    any:
      - id: objectives/exfiltration/channel/oob::https-b64
      - id: objectives/anti-static/obfuscation/encoding::encoded-http-url
      - id: objectives/exfiltration/channel/callback/
  - id: init-oob-callback
    desc: Init-time OOB domain callback
    crit: suspicious
    conf: 0.94
    all:
      - id: objectives/lateral-movement/supply-chain/pypi/install-patterns::init-py-file
      - id: micro-behaviors/communications/http/request::request-python
    any:
      - id: objectives/exfiltration/channel/callback/
      - id: objectives/exfiltration/channel/oob::oob-domains
  - id: dependency-confusion-pingback
    desc: Dependency confusion package with OAST pingback
    crit: hostile
    conf: 0.97
    all:
      - id: objectives/lateral-movement/supply-chain/pypi/version::pkginfo-inflated-version
      - id: objectives/lateral-movement/supply-chain/pypi/depconf::summary-poc-research
      - id: init-network-pingback
    any:
      - id: micro-behaviors/data/control-flow/error-handling::silent-exception-pass
      - id: micro-behaviors/communications/http/request::url-literal
