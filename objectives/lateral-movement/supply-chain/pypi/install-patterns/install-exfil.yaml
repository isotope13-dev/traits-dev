defaults:
  platforms: [unix, windows, macos]
  for:
    - python
  attack: T1195.002
traits:
  - id: print-installed-string
    desc: Prints "installed" confirmation
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: \bprint\s*\(\s*["'][^"']{0,50}\binstalled\b[^"']{0,20}["']\s*\)
    unless:
      - type: raw
        substr: not installed
      - type: raw
        substr: is installed
      - type: raw
        substr: pip install
  - id: placeholder-ellipsis
    desc: Placeholder ellipsis string
    crit: notable
    conf: 0.75
    if:
      type: string
      regex: ^\.{2,}$
  - id: tiny-python-file
    desc: Tiny Python file
    crit: notable
    conf: 0.8
    size_max: 100
    if:
      type: basename
      regex: \.py$
    unless:
      - type: raw
        regex: ^(from\s+\S+\s+import|import\s+\S+)
  - id: small-no-imports
    desc: Small Python file with no imports
    crit: notable
    conf: 0.75
    size_max: 500
    unless:
      - type: raw
        substr: 'import '
  - id: empty-file
    desc: Empty file (0 bytes)
    crit: notable
    conf: 1.0
    for:
      - python
      - text
    size_max: 0
  - id: webhook-package-name
    desc: Package name contains webhook
    crit: notable
    conf: 0.9
    if:
      type: string
      exact: webhook
      case_insensitive: true
  - id: init-py-file
    desc: __init__.py file
    crit: notable
    conf: 1.0
    for: [shell, python, javascript, powershell, pe, elf]
    if:
      type: basename
      exact: __init__.py
  - id: setup-py-file-dup
    desc: setup.py file
    crit: notable
    conf: 1.0
    for: [shell, python, javascript, powershell, pe, elf]
    if:
      type: basename
      regex: (^|_)setup\.py$
  - id: setuptools-setup-call
    desc: setuptools setup() call
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: setup
  - id: probe-print-test
    desc: Probe print with test prefix string
    crit: notable
    conf: 0.75
    if:
      type: string
      regex: ^test\s
  - id: suspicious-php-endpoint
    desc: PHP endpoint URL with beacon parameters
    crit: suspicious
    conf: 0.85
    if:
      type: string
      substr: .php?live=
    unless: null
  - id: version-check-url
    desc: Suspicious version check URL
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: https?://[^/]{1,120}/[Vv]ersion\.php|https?://[^/]{1,120}/[Cc]heck\.php
  - id: atexit-register-callback
    desc: atexit.register deferred execution callback
    crit: notable
    conf: 0.85
    size_max: 10000
    if:
      type: raw
      regex: atexit\.register\s*\(
  - id: triple-hash-delimiter
    desc: Triple hash data delimiter
    crit: notable
    conf: 0.85
    size_max: 5000
    if:
      type: string
      exact: '###'
  - id: data-concat-pattern
    desc: String concatenation with delimiter
    crit: notable
    conf: 0.75
    if:
      type: raw
      regex: =\s*\w+\s*\+\s*['"]###['"]\s*\+\s*\w+
  - id: urlopen-with-data
    desc: urllib.urlopen with data parameter
    crit: suspicious
    conf: 0.85
    if:
      type: raw
      regex: urlopen\s*\([^)]{0,120}\bdata\s*=
  - id: vid-parameter
    desc: vid= POST parameter
    crit: suspicious
    conf: 0.9
    if:
      type: string
      exact: vid=
composite_rules:
  - id: empty-init-webhook-package
    desc: Empty __init__.py in webhook-focused package
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    all:
      - id: empty-file
      - id: webhook-package-name
  - id: tiny-py-by-name
    desc: Tiny .py file (by extension)
    crit: notable
    conf: 0.8
    for: [shell, python, javascript, powershell, pe, elf]
    attack: T1195.002
    all:
      - id: metadata/format/extension::py
      - id: empty-file
  - id: init-py-no-code
    desc: Empty __init__.py stub module
    crit: notable
    conf: 0.8
    for: [shell, python, javascript, powershell, pe, elf]
    attack: T1195.002
    all:
      - id: init-py-file
      - id: metadata/format/extension::py
      - id: empty-file
  - id: empty-init-py
    desc: Empty __init__.py in published package
    crit: notable
    conf: 0.85
    attack: T1195.002
    for: [shell, python, javascript, powershell, pe, elf]
    all:
      - id: init-py-file
      - id: empty-file
  - id: decoy-init-py
    desc: Decoy __init__.py with install confirmation
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    all:
      - id: init-py-file
      - id: tiny-python-file
      - id: print-installed-string
  - id: stub-placeholder-file
    desc: Stub Python file with placeholder content
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    all:
      - id: tiny-python-file
      - id: placeholder-ellipsis
  - id: stub-squatter-module
    desc: Stub Python module with no imports
    crit: suspicious
    conf: 0.85
    attack: T1195.002
    size_max: 500
    all:
      - id: small-no-imports
      - id: micro-behaviors/data/control-flow/analysis::for-loop-ast
  - id: fingerprint-payload-concat
    desc: Fingerprint data concatenation
    crit: suspicious
    conf: 0.9
    all:
      - id: triple-hash-delimiter
    any:
      - id: objectives/discovery/system/
  - id: pypi-install-exfil
    desc: PyPI install-time system exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/lateral-movement/supply-chain/pypi/install-patterns::setup-py-file-dup
      - id: objectives/discovery/host/system/hardware-fingerprint::python-sysinfo-multi
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request::request-python
  - id: pypi-atexit-exfil
    desc: PyPI atexit deferred system exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/lateral-movement/supply-chain/pypi/install-patterns::setup-py-file-dup
      - id: atexit-register-callback
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request::request-python
  - id: python-sysinfo-exfil
    desc: Python system info exfiltration
    crit: hostile
    conf: 0.92
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/discovery/host/system/hardware-fingerprint::python-sysinfo-multi
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request::request-python
  - id: python-envvar-exfil
    desc: Python environment variable exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request::request-python
  - id: pypi-vid-exfil
    desc: PyPI VID exfiltration pattern
    crit: suspicious
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: vid-parameter
      - id: micro-behaviors/data/encode/base64::b64encode-call
      - id: micro-behaviors/communications/http/request::request-python
  - id: pypi-oob-user-exfil
    desc: PyPI OOB callback exfiltrating user info
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1195.002
    all:
      - id: objectives/exfiltration/channel/oob::oob-domains
      - id: micro-behaviors/communications/http/lib/requests::requests-post
      - id: objectives/discovery/host/user::username-env
  - id: pypi-install-beacon
    desc: PyPI install-time system beacon
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: robust-setup-py
      - id: suspicious-php-endpoint
      - id: micro-behaviors/communications/http/request::request-python
      - id: objectives/lateral-movement/supply-chain/pypi/install-patterns::windows-computername-env
  - id: pypi-probe-package
    desc: PyPI typosquat probe package
    crit: suspicious
    conf: 0.9
    attack: T1195.002
    all:
      - id: objectives/lateral-movement/supply-chain/pypi/install-patterns::setup-py-file-dup
      - id: micro-behaviors/communications/http/request::request-python
      - id: probe-print-test
  - id: python-envvar-urlencode-exfil
    desc: Python environment variable urlencoded exfiltration
    crit: hostile
    conf: 0.95
    mbc: E1041
    attack: T1020
    all:
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
      - id: micro-behaviors/communications/http/request::request-python
  - id: pypi-system-env-exfil
    desc: PyPI install-time system and environment exfiltration SPECIAL_UNIQUE_STRING
    crit: hostile
    conf: 0.98
    mbc: E1041
    attack: T1020
    all:
      - id: objectives/lateral-movement/supply-chain/pypi/install-patterns::setup-py-file-dup
      - id: objectives/discovery/host/system/hardware-fingerprint::python-sysinfo-multi
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: micro-behaviors/communications/http/lib/urllib::urllib-urlencode
      - id: micro-behaviors/communications/http/request::request-python
    any:
      - id: micro-behaviors/os/admin/check::os-getuid-admin
      - id: micro-behaviors/os/admin/check::ctypes-is-admin
      - id: objectives/discovery/network/scan::geo-lookup-service
