# JavaScript Supply Chain Attack Detection - Package Impersonation
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects JavaScript packages that masquerade as legitimate packages
defaults:
  for: [javascript, typescript]
  crit: suspicious
  attack: "T1195.002"
traits:
  # === readline/prompt Interception ===
  - id: readline-question-wrapper
    desc: Wraps readline.question
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: 'readline\.question\s*\('
  - id: prompt-wrapper-def
    desc: Custom prompt function definition
    crit: notable
    conf: 0.5
    if:
      type: raw
      regex: '(function|const|let|var)\s+prompt\s*[=(]'
  - id: process-stdin-read
    desc: Reads from process.stdin
    crit: component
    conf: 0.5
    if:
      type: raw
      substr: "process.stdin"
  # === crypto Module Interception ===
  - id: crypto-wrapper-export
    desc: Exports crypto-like interface
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: 'module\.exports\s*=\s*\{.{0,200}(encrypt|decrypt|hash)'
  - id: require-real-crypto
    desc: Requires real crypto module
    crit: component
    conf: 0.5
    if:
      type: raw
      regex: 'require\s*\(\s*["\''](crypto|node:crypto)["\'']'
  # === File Exfiltration ===
  - id: fs-write-sensitive
    desc: Writes to sensitive path
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: 'fs\.(writeFile|appendFile)Sync?\s*\(.{0,50}(password|cred|key)'
      case_insensitive: true
  - id: fs-append-hidden
    desc: Appends to hidden file
    crit: suspicious
    conf: 0.75
    if:
      type: raw
      regex: 'fs\.(appendFile|writeFile)Sync?\s*\(\s*["\'']/.{0,50}/\..{1,30}'
  # === HTTP Exfiltration ===
  - id: fetch-post-call
    desc: fetch with POST method
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: 'fetch\s*\(.{0,100}method:\s*["\''](POST|PUT)'
  - id: axios-post-call
    desc: axios.post call
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: 'axios\.(post|put)\s*\('
  - id: http-request-post
    desc: http.request with POST
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: 'http\.request\(.{0,100}method:\s*["\''](POST|PUT)'
  # === Dynamic Execution ===
  - id: eval-variable
    desc: eval with variable input
    crit: suspicious
    conf: 0.8
    size_max: 102400
    if:
      type: raw
      regex: 'eval\s*\(\s*[a-zA-Z_][a-zA-Z0-9_]*\s*\)'
  - id: new-function-literal
    desc: new Function from literal string
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: 'new\s+Function\s*\(\s*["''][^,)]{1,200}["'']\s*\)'
  - id: new-function-variable
    desc: new Function from variable
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: 'new\s+Function\s*\(\s*[a-zA-Z_$][a-zA-Z0-9_$]{0,80}\s*\)'
composite_rules:
  # === Input Capture Wrapper ===
  - id: input-capture-wrapper
    desc: Wrapper capturing user input
    crit: suspicious
    conf: 0.85
    any:
      - id: readline-question-wrapper
      - id: prompt-wrapper-def
    all:
      - id: process-stdin-read
  # === Crypto Wrapper ===
  - id: crypto-module-wrapper
    desc: Wrapper around crypto module
    crit: suspicious
    conf: 0.85
    all:
      - id: crypto-wrapper-export
      - id: require-real-crypto
  # === HTTP Exfiltration ===
  - id: js-http-exfil
    desc: HTTP exfiltration capability
    crit: notable
    conf: 0.7
    any:
      - id: fetch-post-call
      - id: axios-post-call
      - id: http-request-post
  # === File Exfiltration ===
  - id: js-file-exfil
    desc: File exfiltration capability
    crit: notable
    conf: 0.7
    any:
      - id: fs-write-sensitive
      - id: fs-append-hidden
  # === Dynamic Code Execution ===
  - id: dynamic-exec
    desc: Dynamic code execution
    crit: suspicious
    conf: 0.8
    any:
      - id: eval-variable
      - id: new-function-literal
      - id: new-function-variable
  # === Input Capture with Exfil ===
  - id: js-input-intercept-exfil
    desc: Input interception with exfiltration
    crit: hostile
    conf: 0.95
    attack: "T1056"
    mbc: "E1056"
    all:
      - id: input-capture-wrapper
    any:
      - id: js-http-exfil
      - id: js-file-exfil
  # === Crypto Wrapper with Exfil ===
  - id: crypto-intercept-exfil
    desc: Crypto wrapper with exfiltration
    crit: hostile
    conf: 0.95
    attack: "T1056"
    all:
      - id: crypto-module-wrapper
    any:
      - id: js-http-exfil
      - id: js-file-exfil
  # === Full Supply Chain Pattern ===
  - id: js-credential-supply-chain
    desc: JavaScript credential interception supply chain attack
    crit: hostile
    conf: 0.98
    attack: "T1195.002"
    mbc: "E1056"
    any:
      - id: js-input-intercept-exfil
      - id: crypto-intercept-exfil
