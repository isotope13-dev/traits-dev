# Deprecated Package Impersonation Detection
# ATT&CK: T1195.002 (Compromise Software Supply Chain)
# Detects packages that impersonate deprecated stdlib packages
# Attackers target deprecated paths because:
# 1. Users searching for old imports find malicious packages
# 2. Automated tools may still reference old paths
# 3. Less scrutiny on "deprecated" code
defaults:
  crit: suspicious
  attack: "T1195.002"
traits:
  # ============================================================
  # GO: Deprecated package impersonation
  # ============================================================

  # --- crypto/ssh/terminal (deprecated -> golang.org/x/term) ---
  - id: go-pkg-terminal-deprecated
    desc: Package named terminal (deprecated path)
    crit: notable
    conf: 0.7
    for: [go]
    if:
      type: raw
      regex: '^package terminal\s*$'
  # --- ioutil (deprecated -> io and os) ---
  - id: go-pkg-ioutil-deprecated
    desc: Package named ioutil (deprecated)
    crit: notable
    conf: 0.7
    for: [go]
    if:
      type: raw
      regex: '^package ioutil\s*$'
  - id: go-imports-io-os
    desc: Imports io or os packages
    crit: component
    conf: 0.4
    for: [go]
    if:
      type: raw
      regex: 'import\s*\(.{0,100}"(io|os)"'
  # --- syscall (deprecated -> golang.org/x/sys) ---
  - id: go-pkg-syscall-wrapper
    desc: Package wrapping syscall
    crit: notable
    conf: 0.7
    for: [go]
    if:
      type: raw
      regex: '^package syscall\s*$'
  # --- imp (deprecated -> importlib) ---
  - id: py-mod-imp-deprecated
    # ============================================================
    # PYTHON: Deprecated module impersonation
    # ============================================================

    desc: Module named imp (deprecated)
    crit: notable
    conf: 0.7
    for: [python]
    if:
      type: raw
      regex: '^# .{0,50}\bimp\b.{0,30}module|^""".{0,30}\bimp\b'
  - id: py-imports-importlib
    desc: Imports importlib
    crit: component
    conf: 0.5
    for: [python]
    if:
      type: string
      substr: "import importlib"
  # --- optparse (deprecated -> argparse) ---
  - id: py-mod-optparse-wrapper
    desc: Module wrapping optparse
    crit: notable
    conf: 0.65
    for: [python]
    if:
      type: raw
      regex: 'from optparse import|import optparse'
  # --- commands (deprecated -> subprocess) ---
  - id: py-mod-commands-wrapper
    desc: Module wrapping commands
    crit: notable
    conf: 0.7
    for: [python]
    if:
      type: raw
      regex: 'from commands import|import commands'
  # --- request (deprecated -> got, axios, node-fetch) ---
  - id: js-pkg-request-wrapper
    # ============================================================
    # JAVASCRIPT/NODE: Deprecated package patterns
    # ============================================================

    desc: Package wrapping deprecated request
    crit: notable
    conf: 0.6
    for: [javascript, typescript]
    if:
      type: raw
      regex: 'require\s*\(\s*["\''](request|request-promise)["\'']'
  # --- crypto (old patterns) ---
  - id: js-crypto-createcipher
    desc: Uses deprecated createCipher
    crit: notable
    conf: 0.7
    for: [javascript, typescript]
    if:
      type: raw
      substr: "createCipher("
composite_rules:
  # === Go Terminal Wrapper (the exact pattern from 2026.midd) ===
  - id: go-terminal-wrapper-deprecated
    desc: Go terminal package wrapping x/term
    crit: suspicious
    conf: 0.9
    all:
      - id: go-pkg-terminal-deprecated
      - id: objectives/lateral-movement/supply-chain/impersonation::wraps-x-term
  # === Go ioutil Wrapper ===
  - id: go-ioutil-wrapper-deprecated
    desc: Go ioutil package wrapping io/os
    crit: suspicious
    conf: 0.85
    all:
      - id: go-pkg-ioutil-deprecated
      - id: go-imports-io-os
  # === Python imp Wrapper ===
  - id: python-imp-wrapper-deprecated
    desc: Python imp module wrapping importlib
    crit: suspicious
    conf: 0.85
    all:
      - id: py-mod-imp-deprecated
      - id: py-imports-importlib
  # === Deprecated Package Attack ===
  - id: deprecated-package-attack
    desc: Deprecated package impersonation attack
    crit: hostile
    conf: 0.9
    attack: "T1195.002"
    any:
      - id: go-terminal-wrapper-deprecated
      - id: go-ioutil-wrapper-deprecated
      - id: python-imp-wrapper-deprecated
    all:
      - id: objectives/lateral-movement/supply-chain/impersonation::function-shadow-attack
