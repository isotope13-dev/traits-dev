# VSCode Tasks Persistence
# Detects malicious use of tasks.json for automatic code execution.
traits:
  - id: tasks-run-on-open
    desc: VSCode task runs on folder open
    crit: suspicious
    conf: 1.0
    for: [all, -binaries]
    if:
      type: raw
      regex: '"runOn":\s*"folderOpen"'
  - id: tasks-shell-command
    desc: VSCode task executing a shell command
    crit: notable
    conf: 0.8
    for: [all, -binaries]
    if:
      type: raw
      regex: '"type":\s*"shell"'
  - id: tasks-node-execution
    desc: VSCode task executing node.js
    crit: suspicious
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      regex: '"command":\s*"node\s+'
    unless:
      # Exclude wireit build tool commands in package.json
      - type: raw
        substr: '"wireit"'
  - id: tasks-hidden
    desc: VSCode task with hidden presentation
    crit: notable
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      regex: '"hide":\s*true'
  - id: tasks-reveal-never
    desc: VSCode task with reveal set to never
    crit: notable
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      regex: '"reveal":\s*"never"'
  - id: tasks-echo-disabled
    desc: VSCode task with echo disabled
    crit: component
    conf: 0.9
    for: [all, -binaries]
    if:
      type: raw
      regex: '"echo":\s*false'
composite_rules:
  - id: vscode-task-persistence
    desc: Malicious VSCode task persistence (run on folder open)
    crit: hostile
    conf: 1.0
    mbc: "C0032"
    attack: "T1547"
    for: [all, -binaries]
    all:
      - id: tasks-run-on-open
    any:
      - id: tasks-node-execution
      - id: tasks-shell-command
  - id: vscode-task-concealment
    desc: VSCode task with concealment properties
    crit: suspicious
    conf: 0.9
    for: [all, -binaries]
    all:
      - id: tasks-run-on-open
    any:
      - id: tasks-hidden
      - id: tasks-reveal-never
      - id: tasks-echo-disabled
    needs: 2
