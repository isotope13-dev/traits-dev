defaults:
  platforms: [qnx, unix]
  for: [typescript, javascript]
  attack: T1552.003

traits:
  - id: qnx-ts-shell-history-cat
    desc: QNX TS shell history cat
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'cat ~/\.(bash|zsh)_history'

composite_rules:
  - id: qnx-ts-shell-history-exfil
    desc: QNX TS shell history exfil
    crit: hostile
    conf: 0.96
    all:
      - id: qnx-ts-shell-history-cat
      - id: objectives/command-and-control/backdoor/tasking/poll::qnx-ts-automation-cmd-log
      - id: objectives/command-and-control/backdoor/tasking/poll::qnx-ts-https-collect-post
