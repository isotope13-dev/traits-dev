defaults:
  attack: T1552.003
  for:
  - shell
  - python
  - elf
  - macho
  - go
  - c
  - cpp
  - objc
  platforms:
  - unix
traits:
- id: jvm-bash-history-bytecode-path
  desc: JVM bytecode bash history path
  crit: notable
  conf: 0.86
  for: [class, jar, zip]
  if:
    type: hex
    pattern: 2F 2E 62 61 73 68 5F 68 69 73 74 6F 72 79
- id: jvm-zsh-history-bytecode-path
  desc: JVM bytecode zsh history path
  crit: notable
  conf: 0.86
  for: [class, jar, zip]
  if:
    type: hex
    pattern: 2F 2E 7A 73 68 5F 68 69 73 74 6F 72 79
- id: shell-history
  desc: Bash shell history file access
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: "(^|[~/\\\\'\"`=\\s])\\.bash_history\\b|/commandhistory/\\.bash_history\\b"
  unless:
  - type: basename
    regex: ^(bash|test_.*)\.py$
  - id: shell-history-unless-cond-1--rx-helper-6
  - id: metadata/file/text/string::system-shell-basename
  - id: micro-behaviors/data/text/llm/scanner::llm-scanner-context
  downgrade:
    any:
    - type: basename
      regex: ^(shell|sh)$
    - type: text
      substr: $("$fuzzy" < "$hist_file")
- id: zsh-history
  desc: Zsh shell history file access
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: "(^|[~/\\\\'\"`=\\s])\\.zsh_history\\b"
  unless:
  - type: basename
    exact: zsh.py
  - type: basename
    regex: ^test_.*\.py$
  - id: zsh-history-unless-cond-2--rx-helper-10
  downgrade:
    any:
    - type: basename
      exact: zsh
    - type: basename
      regex: n?vim
    - type: text
      substr: $("$fuzzy" < "$hist_file")
    - type: text
      regex: com\.apple\.[a-z][a-z0-9.-]+
- id: fish-history
  desc: Fish shell history file access
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: .local/share/fish/fish_history
  downgrade:
    any:
    - type: basename
      exact: fish
    - type: text
      substr: $("$fuzzy" < "$hist_file")
- id: mysql-history
  desc: MySQL client history file access
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: "(^|[~/\\\\'\"`=\\s])\\.mysql_history\\b"
  unless:
  - type: basename
    exact: mysql
  - type: basename
    regex: ^n?vim$
- id: psql-history
  desc: PostgreSQL psql history file access
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: "(^|[~/\\\\'\"`=\\s])\\.psql_history\\b"
  unless:
  - type: basename
    exact: psql
- id: python-history
  desc: Python REPL history file access
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: "(^|[~/\\\\'\"`=\\s])\\.python_history\\b"
  unless:
  - type: basename
    regex: '^python\d?(\.\d)?$'
- id: history-cmd
  desc: Shell `history` command invocation
    # Use the shell symbol table (cleave extracts command invocations as
    # symbols) — avoids collisions with `"history"` dict keys, attribute
    # access (`resp.history`), type annotations (`history: List[…]`), etc.
  crit: suspicious
  conf: 0.82
  for: [shell]
  if:
    type: symbol
    exact: history
- id: shell-history-unless-cond-1--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\{\s*glob = "\.bash_history"\s*\}'
  count_max: 1014198
- id: shell-history-unless-cond-1--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: export HISTFILE=/commandhistory/.bash_history
  count_max: 1014199
- id: shell-history-unless-cond-1--rx-3
  desc: 'Benign context: deny/block-list word'
  crit: component
  conf: 0.3
  if:
    type: text
    regex: '(?i)(deny|block)(list|patterns)\b'
  count_max: 1014200
- id: shell-history-unless-cond-1--rx-4
  desc: 'Benign context: allow/whitelist word'
  crit: component
  conf: 0.3
  if:
    type: text
    regex: '(?i)(allow|white)(list|patterns)\b'
  count_max: 1014201
- id: shell-history-unless-cond-1--rx-5
  desc: 'Benign context: blacklist word'
  crit: component
  conf: 0.3
  if:
    type: text
    regex: '(?i)(black)(list|patterns)\b'
  count_max: 1014202
- id: zsh-history-unless-cond-2--rx-7
  desc: 'Benign context: deny/block-list word'
  crit: component
  conf: 0.3
  if:
    type: text
    regex: '(?i)(deny|block)(list|patterns)\b'
  count_max: 1014203
- id: zsh-history-unless-cond-2--rx-8
  desc: 'Benign context: allow/whitelist word'
  crit: component
  conf: 0.3
  if:
    type: text
    regex: '(?i)(allow|white)(list|patterns)\b'
  count_max: 1014204
- id: zsh-history-unless-cond-2--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(black)(list|patterns)\b'
  count_max: 1014205
composite_rules:
- id: history-theft
  desc: Shell history file theft
  crit: suspicious
  conf: 0.8
  mbc: E1552
  any:
  - id: shell-history
  - id: zsh-history
  - id: fish-history
  - id: mysql-history
  - id: psql-history
  - id: python-history
  - id: history-cmd
  - id: objectives/credential-access/shell/history::powershell-history-theft
  downgrade:
    any:
    - id: metadata/binary/vendor::system-component
    - id: metadata/binary/provenance::project-marker
- id: shell-history-unless-cond-1--rx-helper-6
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: shell-history-unless-cond-1--rx-1
  - id: shell-history-unless-cond-1--rx-2
  - id: shell-history-unless-cond-1--rx-3
  - id: shell-history-unless-cond-1--rx-4
  - id: shell-history-unless-cond-1--rx-5
- id: zsh-history-unless-cond-2--rx-helper-10
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: zsh-history-unless-cond-2--rx-7
  - id: zsh-history-unless-cond-2--rx-8
  - id: zsh-history-unless-cond-2--rx-9
