defaults:
  attack: T1552.003
  for:
    - shell
    - python
    - elf
    - macho
    - go
  platforms:
    - linux
    - macos
traits:
  - id: shell-history
    desc: Bash shell history file access
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: "(^|[~/\\\\'\"`=\\s])\\.bash_history\\b|/commandhistory/\\.bash_history\\b"
    unless:
      - type: basename
        regex: ^(bash|test_.*)\.py$
      - type: text
        regex: '\{\s*glob = "\.bash_history"\s*\}|export HISTFILE=/commandhistory/\.bash_history'
      - id: metadata/file::system-shell-basename
      - type: text
        regex: '(?i)(deny|block|allow|white|black)(list|patterns)\b'
    downgrade:
      any:
        - type: basename
          regex: ^(shell|sh)$
        - type: text
          substr: $("$fuzzy" < "$hist_file")
  - id: zsh-history
    desc: Zsh shell history file access
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: "(^|[~/\\\\'\"`=\\s])\\.zsh_history\\b"
    unless:
      - type: basename
        exact: zsh.py
      - type: basename
        regex: ^test_.*\.py$
      - type: text
        regex: '(?i)(deny|block|allow|white|black)(list|patterns)\b'
    downgrade:
      any:
        - type: basename
          exact: zsh
        - type: basename
          regex: n?vim
        - type: text
          substr: $("$fuzzy" < "$hist_file")
        - type: text
          regex: com\.apple\.[a-z][a-z0-9.-]+
  - id: fish-history
    desc: Fish shell history file access
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: \.local/share/fish/fish_history
    downgrade:
      any:
        - type: basename
          exact: fish
        - type: text
          substr: $("$fuzzy" < "$hist_file")
  - id: history-cmd
    desc: Shell `history` command invocation
    # Use the shell symbol table (cleave extracts command invocations as
    # symbols) — avoids collisions with `"history"` dict keys, attribute
    # access (`resp.history`), type annotations (`history: List[…]`), etc.
    crit: suspicious
    conf: 0.82
    for: [shell]
    if:
      type: symbol
      exact: history
composite_rules:
  - id: history-theft
    desc: Shell history file theft
    crit: suspicious
    conf: 0.8
    mbc: E1552
    any:
      - id: shell-history
      - id: zsh-history
      - id: fish-history
      - id: history-cmd
      - id: objectives/credential-access/shell/history::powershell-history-theft
    downgrade:
      any:
        - id: metadata/binary/vendor::system-component
        - id: metadata/binary/provenance::project-marker
