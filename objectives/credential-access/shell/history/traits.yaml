defaults:
  attack: T1552.003
  for:
  - shell
  - python
  - elf
  - macho
  - go
  - c
  - cpp
  - objc
  platforms:
  - unix
traits:
- id: jvm-bash-history-bytecode-path
  desc: JVM bytecode bash history path
  crit: notable
  conf: 0.86
  for: [class, jar, zip]
  if:
    type: hex
    pattern: 2F 2E 62 61 73 68 5F 68 69 73 74 6F 72 79
- id: jvm-zsh-history-bytecode-path
  desc: JVM bytecode zsh history path
  crit: notable
  conf: 0.86
  for: [class, jar, zip]
  if:
    type: hex
    pattern: 2F 2E 7A 73 68 5F 68 69 73 74 6F 72 79
- id: shell-history
  desc: Bash shell history file access
  crit: notable
  conf: 0.8
  if:
    type: literal
    regex: "(^|[~/\\\\'\"`=\\s])\\.bash_history\\b|/commandhistory/\\.bash_history\\b"
  unless:
  - type: basename
    regex: ^(bash|test_.*)\.py$
  - id: objectives/credential-access/shell/history/
  - id: metadata/file/string/identity::system-shell-basename
  - id: well-known/tool/detection/llm-scanner/
  downgrade:
    any:
    - type: basename
      regex: ^shell$
    - type: basename
      regex: ^sh$
    - type: text
      substr: $("$fuzzy" < "$hist_file")
- id: zsh-history
  desc: Zsh shell history file access
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: "(^|[~/\\\\'\"`=\\s])\\.zsh_history\\b"
  unless:
  - type: basename
    regex: ^(zsh|test_.*)\.py$
  # Terminal-emulator shell integration (VS Code, Qt Creator, iTerm2) configures
  # HISTFILE to the canonical history path via ZDOTDIR — that is setup, not theft.
  - type: text
    regex: 'HISTFILE=[^\n]{0,40}\.zsh_history'
  - id: objectives/credential-access/shell/history/
  downgrade:
    any:
    - type: basename
      exact: zsh
    - type: basename
      regex: n?vim
    - type: text
      substr: $("$fuzzy" < "$hist_file")
    - type: text
      regex: com\.apple\.[a-z][a-z0-9.-]+
- id: fish-history
  desc: Fish shell history file access
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: .local/share/fish/fish_history
  unless:
  - id: metadata/package/testing/presence/harness::go-test-file
  - type: text
    substr: "github.com/boostsecurityio/bagel"
  downgrade:
    any:
    - type: basename
      exact: fish
    - type: text
      substr: $("$fuzzy" < "$hist_file")
- id: mysql-history
  desc: MySQL client history file access
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: '(?i)\\b(c(at|p)|rm|grep)\\b[^\\n]{0,80}\\.mysql_history\\b'
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - type: basename
    exact: mysql
  - type: basename
    exact: mariadb
  - type: basename
    regex: ^n?vim$
- id: psql-history
  desc: PostgreSQL psql history file access
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: "(^|[~/\\\\'\"`=\\s])\\.psql_history\\b"
  unless:
  - type: basename
    exact: psql
  - id: well-known/app/postgresql::postgresql-source-tree
  - id: metadata/package/testing/presence/harness::go-test-file
  - type: text
    substr: "github.com/boostsecurityio/bagel"
- id: python-history
  desc: Python REPL history file access
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: "(^|[~/\\\\'\"`=\\s])\\.python_history\\b"
  unless:
  - type: basename
    regex: '^python\d?(\.\d)?$'
- id: history-cmd
  desc: Shell history builtin invocation
    # Use the shell symbol table (cleave extracts command invocations as
    # symbols) — avoids collisions with `"history"` dict keys, attribute
    # access (`resp.history`), type annotations (`history: List[…]`), etc.
  crit: notable
  conf: 0.78
  for: [shell]
  unless:
  - id: metadata/package/testing/presence/harness/
  - id: metadata/build/package::cloud-marketplace-cleanup-script
  - id: well-known/app/egroupware/
  if:
    type: symbol
    exact: history
- id: shell-history-unless-cond-1--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\{\s*glob = "\.bash_history"\s*\}'
  count_max: 1014198
- id: shell-history-unless-cond-1--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    substr: export HISTFILE=/commandhistory/.bash_history
  count_max: 1014199
- id: deny-block-list-vocabulary
  desc: Deny/block list vocabulary
  crit: component
  conf: 0.3
  if:
    type: text
    regex: '(?i)(deny|block)(list|patterns)\b'
  count_max: 1014200
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
  - id: well-known/app/drivers::linux-driver-core-library-basename
  - id: well-known/app/drivers::linux-driver-gl-library-basename
  - id: well-known/app/drivers::linux-driver-cli-basename
- id: allow-list-vocabulary
  desc: Allow-list vocabulary
  crit: component
  conf: 0.3
  if:
    type: text
    regex: '(?i)(allow|white)(list|patterns)\b'
  count_max: 1014201
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
  - id: well-known/app/drivers::linux-driver-core-library-basename
  - id: well-known/app/drivers::linux-driver-gl-library-basename
  - id: well-known/app/drivers::linux-driver-cli-basename
- id: blocklist-vocabulary
  desc: Blocklist vocabulary
  crit: component
  conf: 0.3
  if:
    type: text
    regex: '(?i)(black)(list|patterns)\b'
  count_max: 1014202
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  - id: well-known/app/drivers/
  - id: well-known/app/drivers::linux-driver-core-library-basename
  - id: well-known/app/drivers::linux-driver-gl-library-basename
  - id: well-known/app/drivers::linux-driver-cli-basename
composite_rules:
- id: history-theft
  desc: Shell history file theft
  crit: suspicious
  conf: 0.8
  mbc: E1552
  any:
  - id: shell-history
  - id: zsh-history
  - id: fish-history
  - id: mysql-history
  - id: psql-history
  - id: python-history
  - id: objectives/credential-access/shell/history::powershell-history-theft
  downgrade:
    any:
    - id: metadata/binary/vendor/
    - id: metadata/binary/provenance::project-marker
- id: shell-history-unless-cond-1--rx-helper-6
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: shell-history-unless-cond-1--rx-1
  - id: shell-history-unless-cond-1--rx-2
  - id: deny-block-list-vocabulary
  - id: allow-list-vocabulary
  - id: blocklist-vocabulary
- id: zsh-history-unless-cond-2--rx-helper-10
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: objectives/credential-access/shell/history::deny-block-list-vocabulary
  - id: objectives/credential-access/shell/history::allow-list-vocabulary
  - id: objectives/credential-access/shell/history::blocklist-vocabulary
