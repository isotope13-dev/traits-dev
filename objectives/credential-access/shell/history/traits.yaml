defaults:
  attack: T1552.003
  for:
    - shell
    - python
    - elf
    - macho
    - go
  platforms:
    - unix
    - macos
    - linux
traits:
  - id: shell-history
    desc: Bash shell history file access
    crit: suspicious
    conf: 0.8
    if:
      type: text
      word: bash_history
    unless:
      - type: basename
        exact: bash.py
      - type: basename
        regex: ^test_.*\.py$
      - type: text
        substr: import pytest
      - type: text
        substr: '{ glob = ".bash_history" }'
    downgrade:
      any:
        - type: basename
          exact: shell
        - type: basename
          exact: sh
        - type: text
          regex: com\.apple\.[a-z][a-z0-9.-]+
  - id: zsh-history
    desc: Zsh shell history file access
    crit: suspicious
    conf: 0.8
    if:
      type: text
      word: zsh_history
    unless:
      - type: basename
        exact: zsh.py
      - type: basename
        regex: ^test_.*\.py$
      - type: text
        substr: import pytest
    downgrade:
      any:
        - type: basename
          exact: zsh
        - type: basename
          regex: n?vim
        - type: text
          regex: com\.apple\.[a-z][a-z0-9.-]+
  - id: fish-history
    desc: Fish shell history file access
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: \.local/share/fish/fish_history
    downgrade:
      any:
        - type: basename
          exact: fish
composite_rules:
  - id: history-theft
    desc: Shell history file theft
    crit: suspicious
    conf: 0.8
    mbc: E1552
    any:
      - id: shell-history
      - id: zsh-history
      - id: fish-history
      - id: objectives/credential-access/shell/history::powershell-history-theft
    downgrade:
      any:
        - id: metadata/vendor/apple::system-component
        - id: metadata/vendor/apple::project-marker
