defaults:
  attack: T1552.003
  for:
  - shell
  - python
  - elf
  - macho
  - go
  platforms:
  - linux
  - macos
traits:
- id: shell-history
  desc: Bash shell history file access
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: "(^|[~/\\\\'\"`=\\s])\\.bash_history\\b|/commandhistory/\\.bash_history\\b"
  unless:
  - type: basename
    regex: ^(bash|test_.*)\.py$
  - id: shell-history-unless-cond-1--rx-helper-6
  - id: metadata/file::system-shell-basename
  downgrade:
    any:
    - type: basename
      regex: ^(shell|sh)$
    - type: text
      substr: $("$fuzzy" < "$hist_file")
- id: zsh-history
  desc: Zsh shell history file access
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: "(^|[~/\\\\'\"`=\\s])\\.zsh_history\\b"
  unless:
  - type: basename
    exact: zsh.py
  - type: basename
    regex: ^test_.*\.py$
  - id: zsh-history-unless-cond-2--rx-helper-10
  downgrade:
    any:
    - type: basename
      exact: zsh
    - type: basename
      regex: n?vim
    - type: text
      substr: $("$fuzzy" < "$hist_file")
    - type: text
      regex: com\.apple\.[a-z][a-z0-9.-]+
- id: fish-history
  desc: Fish shell history file access
  crit: suspicious
  conf: 0.8
  if:
    type: text
    regex: \.local/share/fish/fish_history
  downgrade:
    any:
    - type: basename
      exact: fish
    - type: text
      substr: $("$fuzzy" < "$hist_file")
- id: history-cmd
  desc: Shell `history` command invocation
    # Use the shell symbol table (cleave extracts command invocations as
    # symbols) — avoids collisions with `"history"` dict keys, attribute
    # access (`resp.history`), type annotations (`history: List[…]`), etc.
  crit: suspicious
  conf: 0.82
  for: [shell]
  if:
    type: symbol
    exact: history
- id: shell-history-unless-cond-1--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\{\s*glob = "\.bash_history"\s*\}'
- id: shell-history-unless-cond-1--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'export HISTFILE=/commandhistory/\.bash_history'
- id: shell-history-unless-cond-1--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(deny|block)(list|patterns)\b'
- id: shell-history-unless-cond-1--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(allow|white)(list|patterns)\b'
- id: shell-history-unless-cond-1--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(black)(list|patterns)\b'
- id: zsh-history-unless-cond-2--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(deny|block)(list|patterns)\b'
- id: zsh-history-unless-cond-2--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(allow|white)(list|patterns)\b'
- id: zsh-history-unless-cond-2--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '(?i)(black)(list|patterns)\b'
composite_rules:
- id: history-theft
  desc: Shell history file theft
  crit: suspicious
  conf: 0.8
  mbc: E1552
  any:
  - id: shell-history
  - id: zsh-history
  - id: fish-history
  - id: history-cmd
  - id: objectives/credential-access/shell/history::powershell-history-theft
  downgrade:
    any:
    - id: metadata/binary/vendor::system-component
    - id: metadata/binary/provenance::project-marker
- id: shell-history-unless-cond-1--rx-helper-6
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: shell-history-unless-cond-1--rx-1
  - id: shell-history-unless-cond-1--rx-2
  - id: shell-history-unless-cond-1--rx-3
  - id: shell-history-unless-cond-1--rx-4
  - id: shell-history-unless-cond-1--rx-5
  needs: 1
- id: zsh-history-unless-cond-2--rx-helper-10
  desc: Regex component marker
  crit: component
  conf: 1.0
  any:
  - id: zsh-history-unless-cond-2--rx-7
  - id: zsh-history-unless-cond-2--rx-8
  - id: zsh-history-unless-cond-2--rx-9
  needs: 1
