# Credential Access - Shell History Files
# ATT&CK: T1552.003 (Unsecured Credentials: Bash History)
defaults:
  attack: T1552.003
  for: [shell, python, elf, macho, go]
  platforms: [unix, macos, linux]
traits:
  # === Atomic: Bash History ===
  - id: shell-history
    desc: Bash shell history file access
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      word: "bash_history"
    downgrade:
      any:
        # Shell binaries legitimately reference their own history files
        - type: basename
          exact: "shell"
        - type: basename
          exact: "sh"
        # Apple system components
        - type: string_value
          regex: "com\\.apple\\.[a-z][a-z0-9.-]+"
  # === Atomic: Zsh History ===
  - id: zsh-history
    desc: Zsh shell history file access
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      word: "zsh_history"
    downgrade:
      any:
        # Zsh binary legitimately references its own history file
        - type: basename
          exact: "zsh"
        # Apple system components
        - type: string_value
          regex: "com\\.apple\\.[a-z][a-z0-9.-]+"
  # === Atomic: Fish History ===
  - id: fish-history
    desc: Fish shell history file access
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: "\\.local/share/fish/fish_history"
    downgrade:
      any:
        # Fish shell legitimately references its own history file
        - type: basename
          exact: "fish"
          # NOTE: Shell RC files (.bashrc, .zshrc, .profile) are defined in persist/shell/config/traits.yaml
composite_rules:
  - id: history-theft
    desc: Shell history file theft
    crit: suspicious
    conf: 0.8
    mbc: "E1552"
    any:
      - id: shell-history
      - id: zsh-history
      - id: fish-history
    # Downgrade for Apple system components (e.g., /bin/shell, /bin/zsh)
    downgrade:
      any:
        - id: metadata/apple::system-component
        - id: metadata/apple::project-marker
