# Windows Shell History Theft
# Detects access to PowerShell ConsoleHost_history and similar files
# ATT&CK: T1552.003 (Credentials from Password Stores: Bash History)
# Used by: OtterCookie, various infostealers
defaults:
  attack: T1552.003
  for:
  - scripts
  - binaries
  platforms:
  - windows
  - unix
traits:
- id: consolehost-history
  desc: ConsoleHost_history.txt access
  crit: component
  conf: 0.85
  if:
    type: text
    substr: ConsoleHost_history.txt
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/harness/
  - type: basename
    regex: ^test_.*\.py$
  - type: text
    substr: import pytest
  - type: text
    substr: export async function fetchPwshHistory
- id: consolehost-history-path
  desc: PSReadLine history directory
  crit: component
  conf: 0.85
  if:
    type: text
    regex: PSReadLine.{0,10}ConsoleHost_history
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/harness/
  - type: text
    substr: export async function fetchPwshHistory
- id: psreadline-history-path
  desc: PSReadLine history save path
  crit: component
  conf: 0.8
  if:
    type: text
    regex: PowerShell.{0,10}PSReadLine
  unless:
  - id: metadata/package/testing/
  - id: metadata/package/testing/presence/harness/
  - type: basename
    regex: ^test_.*\.py$
  - type: text
    substr: export async function fetchPwshHistory
composite_rules:
- id: powershell-history-path
  desc: PowerShell history path marker
  crit: component
  conf: 0.85
  any:
  - id: consolehost-history-path
  - id: psreadline-history-path
- id: powershell-history-theft
  desc: PowerShell command history theft
  crit: suspicious
  conf: 0.85
  mbc: E1552
  all:
  - id: consolehost-history
  - id: powershell-history-path
  any:
  - id: objectives/exfiltration/stealer/
  - id: objectives/exfiltration/sensitive-data/
  - id: objectives/exfiltration/messaging/
  - id: micro-behaviors/communications/http/upload/
  unless:
  - id: metadata/file/profile/identity::generated-attack-map-context
