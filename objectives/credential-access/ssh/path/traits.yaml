defaults:
  platforms: [android, unix, windows]
  for: [swift]
  attack: T1552.004

traits:
  - id: swift-ssh-rsa-key-path
    desc: SSH RSA key filename token
    crit: component
    conf: 0.93
    if:
      type: text
      substr: "id_rsa"

  - id: swift-ssh-ed25519-key-path
    desc: SSH Ed25519 key filename token
    crit: component
    conf: 0.93
    if:
      type: text
      substr: "id_ed25519"

  - id: swift-ssh-ecdsa-key-path
    desc: SSH ECDSA key filename token
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "id_ecdsa"

  - id: swift-ssh-dsa-key-path
    desc: SSH DSA key filename token
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "id_dsa"
