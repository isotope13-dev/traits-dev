defaults:
  platforms: [linux, macos]
  for: [binaries]
  attack: T1556.003
  mbc: B0028
traits:
  - id: sshd-process-name-check
    desc: Branches on sshd process name
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'strcmp\s*\(\s*[A-Za-z_][A-Za-z0-9_]{0,40}\s*,\s*"sshd"\s*\)'
  - id: ssh-client-process-name-check
    desc: Branches on ssh/scp/su/sudo names
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'strcmp\s*\(\s*[A-Za-z_][A-Za-z0-9_]{0,40}\s*,\s*"(ssh|scp|su|sudo)"\s*\)'
  - id: dlopen-libpam-runtime
    desc: Runtime dlopen of libpam.so.0
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'dlopen\s*\(\s*"libpam\.so(\.0)?"'
  - id: dlopen-libdl-runtime
    desc: Runtime dlopen of libdl.so
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'dlopen\s*\(\s*"libdl\.so(\.2)?"'
  - id: ssh-credential-log-format
    desc: SSH credential capture log format
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'USER:-->\s*%s\s*<--[^\n]{0,40}PASS:-->\s*%s\s*<--'
  - id: tty-read-fd-check
    desc: Reads /dev/tty file descriptor name
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: 'strncmp\s*\([^,]{1,40}\s*,\s*"/dev/tty"\s*,\s*8\s*\)'
composite_rules:
  - id: sshd-runtime-credential-hook
    desc: In-process sshd/ssh credential hook
    crit: hostile
    conf: 0.97
    needs: 2
    any:
      - id: objectives/credential-access/ssh/runtime-hook::dlopen-libdl-runtime
      - id: objectives/credential-access/ssh/runtime-hook::dlopen-libpam-runtime
      - id: objectives/credential-access/ssh/runtime-hook::ssh-client-process-name-check
      - id: objectives/credential-access/ssh/runtime-hook::ssh-credential-log-format
      - id: objectives/credential-access/ssh/runtime-hook::sshd-process-name-check
      - id: objectives/credential-access/ssh/runtime-hook::tty-read-fd-check
