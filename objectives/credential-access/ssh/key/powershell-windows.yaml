defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1552.004
  mbc: B0028

traits:
  - id: powershell-userprofile-ssh-dir
    desc: PowerShell USERPROFILE ssh dir
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Join-Path\s+\$env:USERPROFILE\s+["'']\.ssh["'']'

  - id: powershell-ssh-key-name-set
    desc: PowerShell SSH key name set
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'id_rsa.{0,80}id_ed25519.{0,80}id_ecdsa.{0,80}id_dsa'

  - id: powershell-private-key-read
    desc: PowerShell private key read
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Get-Content[\s\S]{0,260}PRIVATE KEY'

composite_rules:
  - id: powershell-ssh-private-key-harvest
    desc: PowerShell SSH key harvest
    crit: hostile
    conf: 0.98
    all:
      - id: powershell-userprofile-ssh-dir
      - id: powershell-ssh-key-name-set
      - id: powershell-private-key-read
