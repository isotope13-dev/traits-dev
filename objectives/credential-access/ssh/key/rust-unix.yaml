defaults:
  platforms: [unix]
  for: [rust, elf]
  attack: T1552.004

traits:
- id: openssh-tool-basename
  desc: OpenSSH tool basename
  crit: baseline
  conf: 0.95
  if:
    type: basename
    regex: '^(ssh|ssh-add|ssh-keygen|ssh-keyscan)$'

- id: openssh-service-basename
  desc: OpenSSH service basename
  crit: baseline
  conf: 0.95
  if:
    type: basename
    regex: '^(ssh-agent|sshd|scp|sftp)$'

- id: dev-shell-tool-basename
  desc: Developer shell tool basename
  crit: baseline
  conf: 0.95
  if:
    type: basename
    regex: '^(fzf|curl|fish(_[a-z_]+)?)$'

- id: rust-known-hosts-path
  desc: Rust known_hosts path
  crit: suspicious
  conf: 0.92
  if:
    type: text
    substr: .ssh/known_hosts
  unless:
      # OpenSSH suite and Rust toolchain/utilities legitimately reference the
      # canonical known_hosts path; exclude them so only non-SSH-tool binaries
      # (e.g. a renamed Rust credential stealer) surface this signal.
  - id: openssh-tool-basename
  - id: openssh-service-basename
  - id: objectives/credential-access/ssh/key/
  - id: dev-shell-tool-basename
  - id: metadata/package/testing/presence/harness::rust-crate-bench-path
  - id: well-known/tool/development/ipsw

- id: rust-host-ssh-key-paths
  desc: Rust host SSH key paths
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: '/etc/ssh/ssh_host_rsa_key[\s\S]{0,220}/etc/ssh/ssh_host_ed25519_key'

- id: rust-toolchain-basename--cargo
  desc: Rust toolchain basename (cargo)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: cargo
- id: rust-toolchain-basename--rustc
  desc: Rust toolchain basename (rustc)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: rustc
- id: rust-toolchain-basename--rustup
  desc: Rust toolchain basename (rustup)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: rustup
composite_rules:
- id: rust-toolchain-basename
  desc: Rust toolchain basename
  crit: baseline
  conf: 0.95
  any:
  - id: rust-toolchain-basename--cargo
  - id: rust-toolchain-basename--rustc
  - id: rust-toolchain-basename--rustup
- id: rust-ssh-key-sweep
  desc: Rust SSH key sweep
  crit: hostile
  conf: 0.97
  all:
  - id: rust-known-hosts-path
  - id: rust-host-ssh-key-paths
