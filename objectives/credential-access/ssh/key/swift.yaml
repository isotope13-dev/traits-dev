defaults:
  platforms: [android, unix, windows]
  for: [swift]
  attack: T1552.004

traits:
  - id: swift-ssh-hostkey-disabled
    desc: Swift SSH hostkey disabled
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "StrictHostKeyChecking=no"

  - id: swift-ssh-dir-enumeration
    desc: Swift SSH directory enumeration
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\.ssh[\s\S]{0,220}contentsOfDirectory'

composite_rules:
  - id: swift-ssh-key-harvest
    desc: Swift SSH key harvest
    crit: hostile
    conf: 0.98
    all:
      - id: swift-ssh-hostkey-disabled
    any:
      - id: objectives/credential-access/ssh/path

  - id: swift-ssh-key-file-harvest
    desc: Swift SSH key file harvest
    crit: hostile
    conf: 0.98
    all:
      - id: swift-ssh-dir-enumeration
      - id: micro-behaviors/fs/file/read::swift-data-file-read
    needs: 2
    any:
      - id: objectives/credential-access/ssh/path
