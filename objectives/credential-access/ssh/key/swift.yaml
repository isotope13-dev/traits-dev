defaults:
  platforms: [android, unix, windows]
  for: [swift]
  attack: T1552.004

traits:
  - id: swift-ssh-rsa-key-path
    desc: Swift SSH RSA key path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "id_rsa"

  - id: swift-ssh-ed25519-key-path
    desc: Swift SSH Ed25519 key path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "id_ed25519"

  - id: swift-ssh-ecdsa-key-path
    desc: Swift SSH ECDSA key path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "id_ecdsa"

  - id: swift-ssh-dsa-key-path
    desc: Swift SSH DSA key path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "id_dsa"

  - id: swift-ssh-hostkey-disabled
    desc: Swift SSH hostkey disabled
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "StrictHostKeyChecking=no"

  - id: swift-ssh-dir-enumeration
    desc: Swift SSH directory enumeration
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\.ssh[\s\S]{0,220}contentsOfDirectory'

composite_rules:
  - id: swift-ssh-key-harvest
    desc: Swift SSH key harvest
    crit: hostile
    conf: 0.98
    all:
      - id: swift-ssh-hostkey-disabled
    any:
      - id: swift-ssh-rsa-key-path
      - id: swift-ssh-ed25519-key-path
      - id: swift-ssh-ecdsa-key-path
      - id: swift-ssh-dsa-key-path

  - id: swift-ssh-key-file-harvest
    desc: Swift SSH key file harvest
    crit: hostile
    conf: 0.98
    all:
      - id: swift-ssh-dir-enumeration
      - id: micro-behaviors/fs/file/read::swift-data-file-read
    needs: 2
    any:
      - id: swift-ssh-rsa-key-path
      - id: swift-ssh-ed25519-key-path
      - id: swift-ssh-ecdsa-key-path
      - id: swift-ssh-dsa-key-path
