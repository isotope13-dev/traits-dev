defaults:
  platforms: [qnx, unix]
  for: [go, elf]
  attack: T1552.004

traits:
  - id: qnx-go-ssh-private-key-path
    desc: QNX home SSH private-key path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/home[^[:space:]]{0,120}/\.ssh/id_ed25519\b'

  - id: qnx-go-ssh-key-patterns
    desc: QNX Go SSH key patterns
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/var/home[\s\S]{0,500}id_ed25519|id_ed25519[\s\S]{0,500}/var/home'

  - id: qnx-go-credential-read-loop
    desc: QNX Go credential read loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Found potential credential

composite_rules:
  - id: qnx-go-ssh-key-harvest
    desc: QNX Go SSH key harvest
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-go-ssh-private-key-path
      - id: qnx-go-ssh-key-patterns
      - id: qnx-go-credential-read-loop
