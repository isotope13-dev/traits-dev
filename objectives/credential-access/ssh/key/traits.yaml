defaults:
  for: [shell, python, javascript, powershell, c, cpp]
  platforms:
  - linux
  - macos
  - windows
traits:
- id: slash-dot-ssh
  desc: SSH config or known_hosts path reference
  crit: component
  conf: 0.5
  attack: T1552.004
  if:
    type: text
    regex: /(\.ssh/(config|known_hosts))\b
  unless:
  - id: metadata/package/testing/
  - id: well-known/tool/detection/llm-scanner/
  - id: well-known/lib/jruby
  downgrade:
    any:
    - id: micro-behaviors/communications/ssh/connect::openssh
    - id: well-known/tool/sysadmin/kubernetes
    - type: text
      regex: '(?i)~?/\.ssh/config'
- id: dot-dot-ssh
  desc: Path traversal to .ssh directory
  crit: suspicious
  conf: 0.5
  attack: T1552.004
  if:
    type: text
    substr: ..ssh/
- id: ssh-deploy-key-provisioning
  desc: CI provisions SSH deploy key from secret
  crit: component
  conf: 0.9
  for: [shell, powershell]
  # `echo "$SSH_DEPLOY_KEY" > ~/.ssh/id_rsa` writes a key supplied by a CI
  # secret INTO the keystore — provisioning, the inverse of theft (theft reads
  # the key OUT and exfiltrates it). Standard pattern in *.github/sync scripts.
  if:
    type: text
    regex: '(echo|printf)\s+"?\$\w*(DEPLOY|SSH)\w*"?\s*>+\s*~?/?\.ssh/id_[a-z0-9]+'
- id: id-rsa
  desc: SSH id_rsa key filename reference
  crit: notable
  conf: 0.6
  attack: T1552.004
  if:
    type: text
    regex: '(\.ssh[/\\]|[/\\])id_rsa(\.pub)?$|^id_rsa(\.pub)?$'
  downgrade:
    any:
    - id: micro-behaviors/communications/ssh/connect::openssh
    - id: ssh-deploy-key-provisioning
    - id: well-known/tool/detection/ai-guardrail/
    - type: basename
      regex: ^ssh(-.{1,32})?(\.exe)?$
- id: id-dsa
  desc: SSH id_dsa key filename reference
  crit: notable
  conf: 0.6
  attack: T1552.004
  if:
    type: text
    regex: (\.ssh[/\\]|[/\\])id_dsa(\.pub)?$|^id_dsa$
  downgrade:
    any:
    - id: micro-behaviors/communications/ssh/connect::openssh
    - type: basename
      regex: ^ssh(-.{1,32})?(\.exe)?$
- id: id-ecdsa
  desc: SSH id_ecdsa key filename reference
  crit: notable
  conf: 0.6
  attack: T1552.004
  if:
    type: text
    regex: (\.ssh[/\\]|[/\\])id_ecdsa(\.pub)?$|^id_ecdsa$
  downgrade:
    any:
    - id: micro-behaviors/communications/ssh/connect::openssh
    - type: basename
      regex: ^ssh(-.{1,32})?(\.exe)?$
- id: id-ed25519
  desc: SSH id_ed25519 key filename reference
  crit: notable
  conf: 0.6
  attack: T1552.004
  if:
    type: text
    regex: (\.ssh[/\\]|[/\\])id_ed25519(\.pub)?$|^id_ed25519$
  downgrade:
    any:
    - id: micro-behaviors/communications/ssh/connect::openssh
    - type: basename
      regex: ^ssh(-.{1,32})?(\.exe)?$
- id: ln-symlink-ssh-private-key
  desc: Symlinks SSH private key into staging path
  crit: suspicious
  conf: 0.97
  attack: T1552.004
  for: [shell]
  if:
    type: text
    regex: '\bln\s+-s\s+\S{0,80}\.ssh/id_(rsa|dsa|ecdsa|ed25519)'
- id: known-hosts
  desc: SSH known_hosts file reference
  crit: component
  conf: 0.5
  attack: T1552.004
  if:
    type: text
    substr: known_hosts
  downgrade:
    any:
    - type: text
      substr: sublime-syntax
    - id: micro-behaviors/communications/ssh/connect::openssh
    - type: basename
      regex: ^ssh(-.{1,32})?(\.exe)?$
- id: putty-sessions
  desc: PuTTY sessions registry reference
  crit: suspicious
  conf: 0.8
  attack: T1552.004
  platforms:
  - windows
  for:
  - pe
  - python
  - powershell
  if:
    type: text
    substr: Software\SimonTatham\PuTTY\Sessions
  downgrade:
    any:
    - id: metadata/signed/certificate/identity::simon-tatham-cert
    - type: basename
      regex: (?i)^putty
    - id: well-known/tool/development/runspec-console/
    - id: well-known/app/winscp/
- id: sshd-net-bracket
  desc: sshd net worker process title
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: 'sshd: [net]'
- id: sshd-accepted-bracket
  desc: sshd accepted-connection process title
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: 'sshd: [accepted]'
- id: sshd-proc-ref
  desc: sshd_proc identifier reference
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: sshd_?proc
- id: sniff-ssh-lower
  desc: SSH traffic sniffer routine (lowercase)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: sniff_ssh
- id: sniff-ssh-title
  desc: SSH traffic sniffer routine (titlecase)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: Sniff_ssh
- id: sniff-ssh-upper
  desc: SSH traffic sniffer constant (uppercase)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: SNIFF_SSH
- id: ssh-sniff-lower
  desc: SSH traffic sniffer routine (lowercase)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: ssh_sniff
- id: ssh-sniff-title
  desc: SSH traffic sniffer routine (titlecase)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: Ssh_sniff
- id: ssh-sniff-upper
  desc: SSH traffic sniffer constant (uppercase)
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: SSH_SNIFF
- id: ssh-password-identifier
  desc: SSH password identifier
  crit: notable
  conf: 0.85
  if:
    type: text
    substr: ssh_password
- id: ssh-cred-identifier
  desc: SSH credential identifier
  crit: notable
  conf: 0.85
  unless:
  - id: metadata/package/testing/
  if:
    type: text
    substr: ssh_cred
- id: sshpass-txt-file
  desc: Harvested SSH password drop file
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: sshpass\d?\.txt
- id: ssh-pass-log-file
  desc: SSH password capture log file
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: ssh_pass.log
- id: password-txt-file
  desc: Plaintext password dump file
  crit: component
  conf: 0.75
  if:
    type: text
    substr: password.txt
- id: credentials-txt-file
  desc: Plaintext credentials dump file
  crit: component
  conf: 0.75
  if:
    type: text
    substr: credentials.txt
- id: password-pattern-1b
  desc: password_steal/dump identifier
  crit: suspicious
  conf: 0.3
  if:
    type: text
    regex: passw(or)?d[_-]?(steal|dump)
- id: password-pattern-2
  desc: steal/dump_password identifier
  crit: component
  conf: 0.3
  if:
    type: text
    regex: (steal|dump)[_-]?passw(or)?d
- id: ssh-key-tooling-ref
  desc: SSH key tooling reference
  crit: component
  conf: 0.8
  if:
    type: text
    regex: ssh-keygen|docker-machine|libmachine|vagrant
- id: ssh-xor-fixture-ref
  desc: SSH XOR fixture reference
  crit: component
  conf: 0.8
  if:
    type: text
    substr: stng::xor::classify
- id: ssh-fixture-key-ref
  desc: SSH fixture key reference
  crit: component
  conf: 0.8
  if:
    type: text
    regex: sshpk-(sign|verify)|eg id_rsa|id_rsa\.pub
- id: private-key-path-rsa
  desc: SSH RSA private key path
  crit: notable
  conf: 0.6
  unless:
  - id: well-known/tool/detection/security-scanner/
  if:
    type: text
    regex: \.ssh/id_rsa([^A-Za-z0-9_.]|$)
- id: private-key-path-dsa
  desc: SSH DSA private key path
  crit: notable
  conf: 0.6
  unless:
  - id: well-known/tool/detection/security-scanner/
  if:
    type: text
    regex: \.ssh/id_dsa([^A-Za-z0-9_.]|$)
- id: private-key-path-ecdsa
  desc: SSH ECDSA private key path
  crit: notable
  conf: 0.6
  unless:
  - id: well-known/tool/detection/security-scanner/
  if:
    type: text
    regex: \.ssh/id_ecdsa([^A-Za-z0-9_.]|$)
- id: private-key-path-ed25519
  desc: SSH Ed25519 private key path
  crit: notable
  conf: 0.6
  unless:
  - id: well-known/tool/detection/security-scanner/
  if:
    type: text
    regex: \.ssh/id_ed25519([^A-Za-z0-9_.]|$)
composite_rules:
- id: password-pattern
  desc: Password pattern reference
  crit: component
  conf: 0.3
  any:
  - id: password-pattern-1b
  - id: password-pattern-2
- id: sniff-ssh-variants
  desc: sniff_ssh case variants
  any:
  - id: sniff-ssh-lower
  - id: sniff-ssh-title
  - id: sniff-ssh-upper
  crit: suspicious
- id: ssh-sniff-variants
  desc: ssh_sniff case variants
  any:
  - id: ssh-sniff-lower
  - id: ssh-sniff-title
  - id: ssh-sniff-upper
  crit: suspicious
- id: ssh-sniffing-indicators
  desc: SSH sniffing function identifiers
  any:
  - id: sniff-ssh-variants
  - id: ssh-sniff-variants
  crit: suspicious
  unless:
  - id: well-known/tool/sysadmin/alpine-packages::alpine-ansible-core-package
- id: ssh-password-files
  desc: SSH password file patterns
  crit: component
  any:
  - id: sshpass-txt-file
  - id: ssh-pass-log-file
  - id: password-txt-file
  - id: credentials-txt-file
- id: ssh-key-recognized-marker
  desc: SSH key recognized marker
  crit: component
  conf: 0.85
  any:
  - id: micro-behaviors/os/env/vars/credentials::ssh-private-key-dup
  - id: ssh-key-tooling-ref
  - id: ssh-xor-fixture-ref
  - id: ssh-fixture-key-ref
  - id: ssh-deploy-key-provisioning
- id: private-key-path
  desc: SSH private key path reference
  crit: notable
  conf: 0.6
  any:
  - id: private-key-path-rsa
  - id: private-key-path-dsa
  - id: private-key-path-ecdsa
  - id: private-key-path-ed25519
- id: private-key-material
  desc: SSH private key material paths
  crit: component
  conf: 0.7
  attack: T1552.004
  any:
  - id: id-rsa
  - id: id-dsa
  - id: id-ecdsa
  - id: id-ed25519
- id: sshd-net-proc
  desc: SSHD network process reference
  crit: suspicious
  conf: 0.8
  any:
  - id: sshd-net-bracket
  - id: sshd-accepted-bracket
- id: private-key-theft
  desc: SSH private key theft
  crit: suspicious
  conf: 0.85
  attack: T1552.004
  mbc: E1552
  all:
  - id: private-key-path
  any:
  - id: id-rsa
  - id: id-dsa
  - id: id-ecdsa
  - id: id-ed25519
  unless:
  - id: objectives/credential-access/ssh/key/
  downgrade:
    any:
    - id: metadata/signed/platform::apple
    - id: micro-behaviors/communications/ssh/client/
    - id: micro-behaviors/process/interpreter/vm/
    - id: micro-behaviors/os/service/remote::sshd-ref
    - id: objectives/credential-access/ssh/key/
- id: sshd-password-trace
  desc: SSHD memory tracing for passwords
  crit: suspicious
  conf: 0.85
  attack: T1552.004 - linux
  all:
  - id: objectives/anti-analysis/debugger-detect/check::tracerpid-string
  - id: password-pattern
  - id: micro-behaviors/os/service/remote::sshd-ref
- id: credential-theft
  desc: SSH key credential theft
  crit: suspicious
  unless:
    - id: well-known/tool/offensive/pentestkit/
  conf: 0.95
  attack: T1556
  mbc: E1056 - linux
  any:
  - id: ssh-sniffing-indicators
  - id: ssh-password-files
  all:
  - id: micro-behaviors/os/service/remote::sshd-ref
