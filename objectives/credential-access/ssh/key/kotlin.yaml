defaults:
  platforms: [freebsd, unix]
  for: [kotlin, class]
  attack: T1552.004

traits:
  - id: kotlin-ssh-private-key-paths
    desc: Kotlin reads SSH private key paths
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: 'id_(rsa|ecdsa|ed25519|dsa)'
    unless:
      - type: path
        basename: true
        regex: '^kubectl-.*\.1$'

  - id: kotlin-ssh-known-auth-files
    desc: Kotlin reads SSH known and auth files
    crit: component
    conf: 0.92
    if:
      type: text
      substr: known_hosts

  - id: kotlin-known-hosts-bytecode
    desc: Kotlin bytecode SSH known hosts path
    crit: component
    conf: 0.92
    for: [class]
    if:
      type: hex
      pattern: 6B 6E 6F 77 6E 5F 68 6F 73 74 73

composite_rules:
  - id: kotlin-ssh-credential-collection
    desc: Kotlin collects SSH credential files
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-ssh-private-key-paths
    any:
      - id: kotlin-ssh-known-auth-files
      - id: micro-behaviors/os/env/vars/ssh::ssh-auth-sock-var
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys

  - id: kotlin-bytecode-ssh-credential-collection
    desc: Kotlin bytecode collects SSH key files
    crit: hostile
    conf: 0.98
    for: [class]
    all:
      - id: kotlin-ssh-private-key-paths
    any:
      - id: kotlin-known-hosts-bytecode
      - id: micro-behaviors/os/env/vars/ssh::ssh-auth-sock-var
