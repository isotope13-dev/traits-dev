defaults:
  platforms: [unix]
  for: [php]
  attack: T1552.004
composite_rules:
  - id: php-ssh-key-harvesting
    desc: PHP script harvesting SSH private keys
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-dir
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
      - id: micro-behaviors/fs/read/file::file-get-contents
