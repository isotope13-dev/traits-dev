defaults:
  platforms: [freebsd, netbsd, unix]
  for: [c, cpp, objc, elf]
  attack: T1552.004

traits:
  - id: native-dotssh-private-key-path
    desc: Native .ssh private key path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\.ssh[/\\]id_(rsa|ed25519)$'

  - id: native-private-key-path-name
    desc: Native private key path name
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '[/\\]id_(rsa|ed25519)$'

  - id: native-private-key-basename
    desc: Native private key basename
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '^id_(rsa|ed25519)$'

composite_rules:
  - id: native-ssh-private-key-paths
    desc: Native SSH private key paths
    crit: suspicious
    conf: 0.92
    any:
      - id: native-dotssh-private-key-path
      - id: native-private-key-path-name
      - id: native-private-key-basename
    downgrade:
      any:
        - id: micro-behaviors/communications/ssh/connect::openssh
        - type: basename
          regex: ^ssh(-.{1,32})?$
