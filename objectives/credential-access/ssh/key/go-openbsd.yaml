defaults:
  platforms: [openbsd, bsd, unix]
  for: [go, elf]
  attack: T1552.004

traits:
  - id: go-ssh-key-prefix-filter
    desc: Go filters SSH key prefixes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: targetPrefixes

  - id: go-ssh-payload-field
    desc: Go sets SSH payload field
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: payload.Set("ssh"

composite_rules:
  - id: go-ssh-key-harvest-post
    desc: Go harvests SSH keys for POST
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/directory/readdir::go-readdir-ssh-directory
      - id: go-ssh-key-prefix-filter
      - id: go-ssh-payload-field
