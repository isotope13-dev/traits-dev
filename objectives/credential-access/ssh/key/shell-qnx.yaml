defaults:
  platforms: [qnx, unix]
  for: [shell]
  attack: T1552.004

traits:
  - id: qnx-shell-ssh-key-copy-loop
    desc: QNX shell SSH key copy loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'for keyfile in "\$ssh_dir"/id_rsa[\s\S]{0,260}cp "\$keyfile"'

  - id: qnx-shell-ssh-c2-key-auth
    desc: QNX shell SSH C2 key auth
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'ssh -i "\$keyfile"[\s\S]{0,220}"\$C2_HOST"'

  - id: qnx-shell-knownhosts-copy
    desc: QNX shell SSH config copy
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'for conf in known_hosts config authorized_keys[\s\S]{0,160}cp "\$ssh_dir/\$conf"'

composite_rules:
  - id: qnx-shell-ssh-key-harvest-c2
    desc: QNX shell SSH key harvest C2
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-shell-ssh-key-copy-loop
      - id: qnx-shell-ssh-c2-key-auth

  - id: qnx-shell-ssh-config-harvest
    desc: QNX shell SSH config harvest
    crit: hostile
    conf: 0.97
    all:
      - id: qnx-shell-ssh-key-copy-loop
      - id: qnx-shell-knownhosts-copy
