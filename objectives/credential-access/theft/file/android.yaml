defaults:
  platforms: [android, unix]
  for: [scripts, source, binaries]
  attack: T1552

traits:
  - id: android-keystore-file-path
    desc: Android keystore file path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/data/(misc/keystore|system/(password|gesture|credentials)\.key)'

  - id: android-wifi-credential-path
    desc: Android Wi-Fi credential path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/(data/misc|system/etc)/wifi/(wpa_supplicant|wifi)\.conf'

  - id: android-account-store-path
    desc: Android account store path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/data/(misc/user/0/accounts_ce\.xml|system/users/)'

  - id: android-browser-secret-path
    desc: Android browser secret path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/data/data/com\.android\.chrome.{0,80}(Cookies|Login Data)'

  - id: android-firefox-secret-path
    desc: Android Firefox secret path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/data/data/org\.mozilla\.firefox.{0,80}webappsstore\.sqlite'

  - id: android-browser-db-path
    desc: Android browser DB path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/data/data/com\.android\.browser.{0,80}browser2\.db'

  - id: android-discord-secret-path
    desc: Android Discord secret path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '/data/data/com\.discord/(shared_prefs|databases|cache)'

  - id: android-discord-webview-path
    desc: Android Discord webview path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '/data/data/com\.discord/(app_webview|files)'

  - id: discord-token-field
    desc: Discord token field parser
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'discord_(auth|db|cache)_token|auth_token'

composite_rules:
  - id: android-credential-store-targeting
    desc: Android credential store targeting
    crit: hostile
    conf: 0.97
    any:
      - id: android-keystore-file-path
      - id: android-wifi-credential-path
      - id: android-account-store-path
      - id: android-browser-secret-path
      - id: android-firefox-secret-path
      - id: android-browser-db-path
      - id: android-discord-secret-path
      - id: android-discord-webview-path
    needs: 2

  - id: android-discord-token-harvest
    desc: Android Discord token harvest
    crit: hostile
    conf: 0.98
    all:
      - id: android-discord-secret-path
    any:
      - id: discord-token-field
