defaults:
  platforms: [openwrt]
  for: [lua]
  attack: T1552.001
traits:
  - id: lua-openwrt-luci-session-access
    desc: Lua LuCI session file access
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /tmp/luci-sessions
composite_rules:
  - id: openwrt-lua-credential-config-harvest
    desc: OpenWrt Lua credential config harvest
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/path/config/system::openwrt-uci-config-access
    any:
      - id: lua-openwrt-luci-session-access
      - id: micro-behaviors/fs/path/sensitive/credentials::dropbear-key-path
      - id: micro-behaviors/fs/proc/info/path::lua-process-var-environ
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
    needs: 2
