# macOS Information Stealer Detection
# Detects macOS-specific information stealer patterns
# Combines hardware fingerprinting, credential targeting, and network exfiltration
defaults:
  platforms: [macos]

traits:
  - id: copy-directory-with-exclusions
    desc: Custom directory copying with exclusion logic
    crit: suspicious
    conf: 0.9
    mbc: E1083
    for: [macho]
    if:
      type: symbol
      substr: "copyDirectoryWithExclusions"

composite_rules:
  # Full stealer pattern: fingerprint + targeting + obfuscation + network
  - id: comprehensive-stealer-macos
    desc: "Comprehensive macOS information stealer"
    crit: hostile
    conf: 0.98
    attack: "T1555"
    mbc: "B0028"
    for: [macho]
    all:
      - id: objectives/discovery/system/fingerprint::macos-hardware-uuid
      - id: objectives/anti-static/obfuscation/encoding/xor::string-decrypt
      - id: objectives/credential-access/validation/check::csidentity-password-auth
      - id: objectives/collection/file-targeting/filter::credential-files
  # macOS C++ stealer with custom directory copying logic
  - id: macos-cpp-stealer-copy-logic
    desc: "MacOS C++ Stealer with custom directory copy"
    crit: hostile
    conf: 0.95
    for: [macho]
    all:
      - id: objectives/credential-access/theft/file::copy-directory-with-exclusions
    any:
      - id: micro-behaviors/process/create/shell::shell-execution
      - id: objectives/persistence/system/daemon/init::unix-daemon-persistence
      - id: objectives/evasion/masquerade/naming::generic-bundle-id-pattern
      - id: metadata/signed/id::com.utils.application
      - id: metadata/entitlements::highly-privileged
  # AppleScript-based browser credential stealer
  - id: applescript-browser-stealer
    desc: AppleScript-based browser credential stealer
    crit: hostile
    conf: 0.95
    attack: "T1555.003"
    for: [applescript, macho]
    all:
      - id: objectives/evasion/tcc-manipulation::tcc-db-alias
      - id: micro-behaviors/fs/path/sensitive/browser/access::browser-data-theft
  # TCC bypass with browser data theft
  - id: tcc-browser-theft
    desc: TCC database access for browser credential theft
    crit: hostile
    conf: 0.95
    attack: "T1555.003"
    for: [applescript, macho]
    needs: 2
    all:
      - id: objectives/evasion/tcc-manipulation::tcc-db-alias
    any:
      - id: micro-behaviors/fs/path/sensitive/browser/access::extension-settings-path
      - id: micro-behaviors/fs/path/sensitive/browser/access::cookies-path-concat
      - id: micro-behaviors/fs/path/sensitive/browser/access::login-data-path-concat
      - id: objectives/evasion/tcc-manipulation::tccclickjack-string

  - id: exceptions-file-reader
    desc: MacOS shell stealer with root file system read access
    crit: suspicious
    conf: 0.95
    for: [macho]
    attack: T1059.004
    all:
      - id: metadata/entitlements::temporary-exception-files-read
    any:
      - id: micro-behaviors/process/create/shell::system-fn
      - id: micro-behaviors/process/create/popen::c-popen
