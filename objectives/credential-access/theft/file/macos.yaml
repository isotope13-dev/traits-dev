# macOS Information Stealer Detection
# Detects macOS-specific information stealer patterns
# Combines hardware fingerprinting, credential targeting, and network exfiltration
defaults:
  platforms: [macos]
traits:
  - id: copy-directory-with-exclusions
    desc: Custom directory copying with exclusion logic
    crit: suspicious
    conf: 0.9
    mbc: E1083
    for: [macho]
    if:
      type: symbol
      substr: "copyDirectoryWithExclusions"
composite_rules:
  # Full stealer pattern: fingerprint + targeting + obfuscation + network
  - id: comprehensive-stealer-macos
    desc: "Comprehensive macOS information stealer"
    crit: hostile
    conf: 0.98
    attack: "T1555"
    mbc: "B0028"
    for: [macho]
    all:
      - id: objectives/discovery/system/fingerprint::macos-hardware-uuid
      - id: objectives/anti-static/obfuscation/encoding/xor::string-decrypt
      - id: objectives/credential-access/validation/check::csidentity-password-auth
      - id: objectives/collection/file-targeting/filter::credential-files
  # macOS C++ stealer with custom directory copying logic
  - id: macos-cpp-stealer-copy-logic
    desc: "MacOS C++ Stealer with custom directory copy"
    crit: hostile
    conf: 0.95
    for: [macho]
    all:
      - id: objectives/credential-access/theft/file::copy-directory-with-exclusions
    any:
      - id: micro-behaviors/process/create/shell::shell-execution
      - id: objectives/persistence/system/daemon/init::unix-daemon-persistence
      - id: objectives/evasion/masquerade/naming::generic-bundle-id-pattern
      - id: metadata/signed/id::com.utils.application
      - id: metadata/signed/entitlements::highly-privileged
  # AppleScript-based browser credential stealer
  - id: applescript-browser-stealer
    desc: AppleScript-based browser credential stealer
    crit: hostile
    conf: 0.95
    attack: "T1555.003"
    for: [applescript, macho]
    all:
      - id: objectives/evasion/tcc-manipulation::tcc-db-alias
      - id: micro-behaviors/fs/path/sensitive/browser::browser-data-theft
  # TCC bypass with browser data theft
  - id: tcc-browser-theft
    desc: TCC database access for browser credential theft
    crit: hostile
    conf: 0.95
    attack: "T1555.003"
    for: [applescript, macho]
    needs: 2
    all:
      - id: objectives/evasion/tcc-manipulation::tcc-db-alias
    any:
      - id: micro-behaviors/fs/path/sensitive/browser::extension-settings-path
      - id: micro-behaviors/fs/path/sensitive/browser::cookies-path-concat
      - id: micro-behaviors/fs/path/sensitive/browser::login-data-path-concat
      - id: objectives/evasion/tcc-manipulation::tccclickjack-string
  - id: exceptions-file-reader
    desc: MacOS shell stealer with root file system read access
    crit: suspicious
    conf: 0.95
    for: [macho]
    attack: T1059.004
    all:
      - id: metadata/signed/entitlements::temporary-exception-files-read
    any:
      - id: micro-behaviors/process/create/shell::system-fn
      - id: micro-behaviors/process/create/popen::c-popen
  - id: obfuscated-exceptions-shell-stealer
    desc: Obfuscated macOS entitlement shell stealer
    crit: hostile
    conf: 0.97
    for: [macho]
    attack: T1555
    all:
      - id: objectives/credential-access/theft/file::exceptions-file-reader
      - id: objectives/anti-static/obfuscation/payload::concealed-shell-execution-macho
      - id: metadata/signed/trust-level::adhoc
    any:
      - id: metadata/signed/entitlements::temporary-exception-mach-lookup
      - id: metadata/signed/entitlements::highly-privileged
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: entitled-daemon-screen-capture-stealer
    desc: Entitled daemon captures screen through shell
    crit: hostile
    conf: 0.97
    for: [macho]
    attack: T1113
    all:
      - id: exceptions-file-reader
      - id: objectives/persistence/system/daemon/init::macos-double-fork-daemon
      - id: objectives/collection/screenshot/capture::macos-ffmpeg-stealth-screenshot
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: obfuscated-cpp-file-stealer
    desc: Obfuscated C++ filesystem stealer
    crit: hostile
    conf: 0.97
    for: [macho]
    attack: T1005
    all:
      - id: objectives/credential-access/theft/file::exceptions-file-reader
      - id: objectives/anti-static/obfuscation/payload::concealed-command-capture-macho
    any:
      - id: objectives/credential-access/theft/file::copy-directory-with-exclusions
      - id: micro-behaviors/fs/directory/traverse::cpp-recursive-copy-scaffold
    downgrade:
