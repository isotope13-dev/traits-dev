defaults:
  platforms: [openwrt]
  for: [php]
  attack: T1552.001

composite_rules:
  - id: openwrt-php-credential-config-harvest
    desc: OpenWrt PHP credential config harvest
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/path/config/system::openwrt-uci-config-access
    any:
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/sensitive/credentials::dropbear-key-path
      - id: micro-behaviors/communications/ftp/client::php-ftp-client-session
    needs: 2
