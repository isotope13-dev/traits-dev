defaults:
  platforms: [openwrt]
  for: [python, pyc]
  attack: T1552.001

composite_rules:
  - id: openwrt-python-credential-config-harvest
    desc: OpenWrt Python credential config harvest
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/fs/path/config/system::openwrt-uci-config-access
    any:
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/os/privilege/paths::etc-shadow-bytecode
      - id: micro-behaviors/os/privilege/paths::etc-shadow-pyc
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-bytecode
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd-pyc
      - id: micro-behaviors/fs/path/sensitive/credentials::dropbear-key-path
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
    needs: 2
