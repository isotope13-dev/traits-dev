defaults:
  platforms: [unix, appliance]
  for: [lua]
  attack: T1552.001

traits:
  - id: lua-vxworks-ini-path
    desc: Lua VxWorks ini path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /etc/vxworks.ini

  - id: lua-inetd-conf-path
    desc: Lua inetd config path
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: /etc/inetd.conf

  - id: lua-ssh-key-filenames
    desc: Lua SSH key filenames
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'id_rsa[\s\S]{0,120}id_ed25519'

composite_rules:
  - id: lua-unix-credential-file-sweep
    desc: Lua Unix credential file sweep
    crit: hostile
    conf: 0.98
    all:
      - id: lua-vxworks-ini-path
      - id: lua-inetd-conf-path
      - id: lua-ssh-key-filenames
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/sensitive/credentials::netrc
