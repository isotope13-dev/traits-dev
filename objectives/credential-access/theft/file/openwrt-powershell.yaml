defaults:
  platforms: [openwrt, windows]
  for: [powershell]
  attack: T1552.001

traits:
  - id: openwrt-powershell-uci-config-dir-harvest
    desc: OpenWrt PowerShell UCI config harvest
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\$[A-Za-z0-9_]*\s*=\s*["'']/etc/config["'']|Get-ChildItem\s+\$[A-Za-z0-9_]*ConfigDir'

composite_rules:
  - id: openwrt-powershell-credential-config-harvest
    desc: OpenWrt PowerShell credential config harvest
    crit: hostile
    conf: 0.97
    all:
      - id: openwrt-powershell-uci-config-dir-harvest
    any:
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-private-key
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
      - id: micro-behaviors/fs/path/sensitive/credentials::netrc
    needs: 2
