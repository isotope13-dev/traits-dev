defaults:
  platforms: [unix, windows]
  for: [scripts, source]
  crit: component
  conf: 0.45
traits:
- id: password-upper
  desc: Uppercase password-like identifier
  if:
    type: literal
    regex: '[A-Z][A-Z0-9_]{0,48}(PASSWORD|PASS)(_[A-Z0-9_]{1,48})?\b'
- id: secret-upper
  desc: SECRET credential label
  if:
    type: text
    substr: SECRET
- id: token-upper
  desc: TOKEN credential label
  if:
    type: text
    regex: '\bTOKEN(_[A-Z0-9_]{1,48})?\s*[:=]'
- id: cred-upper
  desc: CRED credential label
  if:
    type: text
    substr: CRED
- id: auth-upper
  desc: AUTH authentication label
  if:
    type: text
    regex: '\bAUTH(_[A-Z0-9_]{1,48})?\s*[:=]'
- id: aws-credential-management-phrase
  desc: '"AWS credential management" docstring phrase'
  crit: baseline
  if:
    type: text
    substr: AWS credential management
- id: kiro-auth-token-filename
  desc: Kiro auth token filename
  conf: 0.9
  if:
    type: text
    substr: kiro-auth-token.json
  # Generic hardcoded-credential, auth-bypass and credential-logging markers
  # common to authentication backdoors. Component building blocks: standalone
  # they carry no signal; backdoor composites in other directories gate on
  # several of them co-occurring.
- id: hardcoded-master-password
  desc: master_password hardcoded credential marker
  for: [scripts, binaries]
  if:
    type: text
    substr: master_password
    section: .text
- id: hardcoded-backdoor-pass
  desc: backdoor_pass hardcoded credential marker
  for: [scripts, binaries]
  if:
    type: text
    substr: backdoor_pass
    section: .text
- id: hardcoded-magic-password
  desc: magic_password hardcoded credential marker
  for: [scripts, binaries]
  if:
    type: text
    substr: magic_password
    section: .text
- id: auth-bypass-marker
  desc: auth_bypass function marker
  for: [scripts, binaries]
  if:
    type: text
    substr: auth_bypass
    section: .text
- id: skip-auth-marker
  desc: skip_auth function marker
  for: [scripts, binaries]
  if:
    type: text
    substr: skip_auth
    section: .text
- id: password-log-marker
  desc: password_log credential-logging marker
  for: [scripts, binaries]
  if:
    type: text
    substr: password_log
    section: .text
- id: cred-log-marker
  desc: cred_log credential-logging marker
  for: [scripts, binaries]
  if:
    type: text
    substr: cred_log
    section: .text
- id: weak-default-password-qwerty
  desc: Password=qwerty weak default credential
  for: [scripts, source, binaries]
  conf: 0.7
  if:
    type: text
    substr: Password=qwerty
- id: default-config-port-1234
  desc: Port=1234 default config value
  for: [scripts, source, binaries]
  conf: 0.5
  if:
    type: text
    substr: Port=1234
- id: get-tokens-fn
    # Relocated from objectives/credential-access/discord/token — `getTokens(`
    # is a generic function name (auth SDKs read credential tokens; parsers/
    # lexers return *lexical* tokens), not Discord-specific. The discord
    # token-theft composites reference it cross-tier alongside Discord/storage
    # context.
  desc: Generic token getter function
  for: [javascript, typescript, python]
  conf: 0.65
  size_max: 1000000
  unless:
  - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
  - id: objectives/credential-access/discord/token::clerk-token-bridge
  if:
    type: text
    regex: \bgetTokens?\(
- id: credential-field--password
  desc: Password value field assignment
  conf: 0.84
  if:
    type: text
    regex: '(?i)\b(password|passphrase|api[_-]?key)\b\s*[:=]\s*[^,\n]{1,160}'
    not:
      - regex: '(?i)\bpassword\s*[:=]\s*True\b'
      - regex: '(?i)\bpassword\s*[:=]\s*False\b'
      - regex: '(?i)\bpassword\s*[:=]\s*None\b'
      - regex: '(?i)\bpassphrase\s*[:=]\s*None\b'
      - regex: '(?i)\bapi[_-]?key\s*[:=]\s*None\b'
composite_rules:
- id: credential-field
  desc: password/token/api_key field keyword
  conf: 0.84
  any:
  - id: password-upper
  - id: credential-field--password
  - id: objectives/credential-access/theft/keywords::token
