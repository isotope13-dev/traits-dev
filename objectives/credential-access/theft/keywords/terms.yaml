---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - scripts
  - source
traits:
- id: two-factor-auth-keyword
  desc: 'Bare keyword: 2fa'
  conf: 0.3
  if:
    type: string_literal
    exact: 2fa
- id: token
  desc: token keyword
  crit: component
  conf: 0.3
  count_min: 2
  if:
    type: text
    word: token
    case_insensitive: true
  unless:
  - type: text
    substr: windows.Token
  - type: text
    substr: windows.TOKEN_
  - type: text
    substr: windows.OpenProcessToken
- id: password
  desc: password keyword
  crit: component
  conf: 0.5
  if:
    type: text
    substr: password
    case_insensitive: true
- id: password-weak
  desc: weak password keyword (password12345678)
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: password12345678
- id: pwd
  desc: pwd keyword
  if:
    type: text
    word: pwd
- id: secret
  desc: secret keyword
  crit: component
  conf: 0.3
  if:
    type: text
    regex: "(?i)[a-z]*secret[a-z]*"
  not:
  - regex: "(?i)libsecret"
- id: credential
  desc: credential keyword
  crit: component
  conf: 0.3
  if:
    type: text
    word: credential
    case_insensitive: true
- id: keystore
  desc: keystore keyword
  crit: component
  conf: 0.4
  if:
    type: text
    substr: keystore
    case_insensitive: true
- id: private-word
  desc: '"private" word inside a string literal'
  crit: component
  conf: 0.5
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    word: private
    case_insensitive: true
composite_rules:
- id: credential-keywords
  desc: Credential-related keyword present
  crit: component
  conf: 0.3
  any:
  - id: token
  - id: secret
  - id: password
  - id: credential
  - id: keystore
