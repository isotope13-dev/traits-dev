---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - scripts
  - source
traits:
- id: two-factor-auth-keyword
  desc: 'Bare keyword: 2fa'
  conf: 0.3
  if:
    type: string_literal
    exact: 2fa
- id: token
  desc: "Credential-access vocabulary word: token"
  crit: component
  conf: 0.3
  count_min: 2
  if:
    type: text
    word: token
    case_insensitive: true
  unless:
  - type: text
    substr: windows.Token
  - type: text
    substr: windows.TOKEN_
  - type: text
    substr: windows.OpenProcessToken
- id: password
  desc: "Credential-access vocabulary word: password"
  crit: component
  conf: 0.5
  if:
    type: text
    substr: password
    case_insensitive: true
  unless:
  - id: metadata/package/testing/
  - type: text
    regex: '\bparsed\.username\s*!==\s*""\s*\|\|\s*parsed\.password\s*!==\s*""'
  - type: text
    regex: '\bURL\.password\b.{0,160}\bSSRF\b|\bSSRF\b.{0,160}\bURL\.password\b'
  - type: text
    regex: '"password"\s*:\s*"123"[\s\S]{0,240}"database"\s*:'
  - type: text
    regex: '"password"\s*:\s*"123"'
- id: password-weak
  desc: weak password keyword (password12345678)
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: password12345678
- id: pwd
  desc: "Credential-access vocabulary word: pwd"
  if:
    type: text
    word: pwd
- id: secret
  desc: "Credential-access vocabulary word: secret"
  crit: component
  conf: 0.3
  if:
    type: text
    regex: "(?i)[a-z]*secret[a-z]*"
  not:
  - regex: "(?i)libsecret"
- id: credential
  desc: "Credential-access vocabulary word: credential"
  crit: component
  conf: 0.3
  if:
    type: text
    word: credential
    case_insensitive: true
- id: keystore
  desc: "Credential-access vocabulary word: keystore"
  crit: component
  conf: 0.4
  if:
    type: text
    substr: keystore
    case_insensitive: true
- id: private-word
  desc: '"private" word inside a string literal'
  crit: component
  conf: 0.5
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    word: private
    case_insensitive: true
composite_rules:
- id: credential-keywords
  desc: Credential-access vocabulary component
  crit: component
  conf: 0.3
  any:
  - id: token
  - id: secret
  - id: password
  - id: credential
  - id: keystore
