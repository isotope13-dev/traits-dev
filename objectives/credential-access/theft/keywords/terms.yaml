---
defaults:
  platforms:
  - windows
  - unix
  crit: component
  conf: 0.2
  for:
  - scripts
  - source
traits:
- id: stealer-word
  desc: "Infostealer 'stealer' term"
  crit: notable
  conf: 0.75
  if:
    type: text
    word: stealer
    case_insensitive: true
  not:
  - regex: 'Stealer\$LT\$|rayon_core[\s\S]{0,160}Stealer'
  unless:
  - id: metadata/lang/source::linux-kernel-secondary-tree-path
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-scripts
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-extra
  - id: micro-behaviors/os/syscall/invoke::linux-kernel-tree-path-mmfs
  - id: metadata/lang/source::linux-kernel-primary-tree-path
  - id: metadata/file/catalog/identity/
- id: two-factor-auth-keyword
  desc: 'Bare keyword: 2fa'
  conf: 0.3
  if:
    type: string_literal
    exact: 2fa
- id: token
  desc: Credential token targeted by theft action
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '\b(steal|harvest|dump)\b.{0,40}\btoken\b'
    case_insensitive: true
  unless:
  - id: well-known/app/google-web::official-google-web-asset
  - id: metadata/lang/compiler/generated::pulumi-language-python-generated
  - type: text
    substr: windows.Token
  - type: text
    substr: windows.TOKEN_
  - type: text
    substr: windows.OpenProcessToken
- id: password
  desc: Password targeted by theft action
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '\b(steal|harvest|dump)\b.{0,40}\bpassword\b'
    case_insensitive: true
  unless:
  - id: metadata/package/testing/
  - type: text
    regex: '\bparsed\.username\s*!==\s*""\s*\|\|\s*parsed\.password\s*!==\s*""'
  - type: text
    regex: '\bURL\.password\b.{0,160}\bSSRF\b|\bSSRF\b.{0,160}\bURL\.password\b'
  - type: text
    regex: '"password"\s*:\s*"123"[\s\S]{0,240}"database"\s*:'
  - type: text
    regex: '"password"\s*:\s*"123"'
- id: password-weak
  desc: weak password keyword (password12345678)
  crit: suspicious
  conf: 0.8
  if:
    type: literal
    kind: string
    substr: password12345678
  unless:
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
- id: secret
  desc: Secret targeted by theft action
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '\b(steal|harvest|dump)\b.{0,40}\bsecret\b'
  not:
  - regex: "(?i)libsecret"
  unless:
  - id: metadata/lang/compiler/generated::pulumi-language-python-generated
- id: credential
  desc: Credential targeted by theft action
  crit: component
  conf: 0.75
  if:
    type: text
    regex: '\b(steal|harvest|dump)\b.{0,40}\bcredential\b'
    case_insensitive: true
  unless:
  - id: well-known/tool/detection/security-scanner::auditr-defensive-signature-catalog
- id: keystore
  desc: "Credential-access term: keystore"
  crit: component
  conf: 0.4
  if:
    type: text
    substr: keystore
    case_insensitive: true
  unless:
  - id: metadata/package/config::secret-file-classifier-function
- id: private-word
  desc: '"private" word inside a string literal'
  crit: component
  conf: 0.5
  for:
  - javascript
  - typescript
  if:
    type: string_literal
    word: private
    case_insensitive: true
composite_rules:
- id: credential-keywords
  desc: Credential-access vocabulary component
  crit: component
  conf: 0.3
  any:
  - id: token
  - id: secret
  - id: password
  - id: credential
  - id: keystore
