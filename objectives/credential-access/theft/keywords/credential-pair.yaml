# Username/password credential pair assembled into a single dict literal.
# Neutral capability: secure credential vaults, auth clients, and login helpers
# all structure a {"username": ..., "password": ...} record this way. The
# phishing intent is inferred by objectives/credential-access/phishing/, whose
# composite pairs this capability with an input() password prompt and an
# outbound HTTP POST — none of which this matcher checks for on its own.
defaults:
  platforms: [windows, unix]
  for: [python]
  crit: component
  conf: 0.85
traits:
  - id: credential-dict-username-var
    desc: Username variable assigned in dict literal
    unless:
      - type: text
        substr: 'return cls(scheme, {"username": username, "password": password})'
      - type: text
        substr: "proxy_username"
    if:
      type: text
      regex: '"username":\s*username'
  - id: credential-dict-password-var
    desc: Password variable assigned in dict literal
    unless:
      - type: text
        substr: 'return cls(scheme, {"username": username, "password": password})'
      - type: text
        substr: "proxy_password"
    if:
      type: text
      regex: '"password":\s*password'
composite_rules:
  - id: credential-dict-pair
    desc: Username and password packed together in a dict literal
    crit: notable
    conf: 0.85
    # Require the two fields to sit in the *same* dict literal. Without proximity
    # this fires on any API client/SDK that merely has separate username and
    # password methods in one module.
    near_lines: 2
    all:
      - id: credential-dict-username-var
      - id: credential-dict-password-var
    unless:
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/presence/harness::python-test-file
