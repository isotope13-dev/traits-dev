defaults:
  attack: T1555
  mbc: B0028
  platforms:
    - linux
    - unix
    - macos
    - windows
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
composite_rules:
  - id: browser-wallet-stealer
    desc: Browser data with wallet targeting
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    all:
      - id: objectives/discovery/host/browser/identity::browser-data-files
    any:
      - id: objectives/credential-access/wallet/desktop/
      - id: micro-behaviors/fs/file/open::wallet-dat-path
      - id: objectives/credential-access/wallet/extension/
    unless:
      - id: well-known/tool/detection/
      - id: well-known/tool/detection/security-scanner/
      - id: well-known/lib/pyaigis/
      - id: well-known/tool/sysadmin/container/
      - id: well-known/lib/jvm
      - id: well-known/lib/glibc
  - id: multi-app-credential-stealer
    desc: Harvests credentials from multiple target apps
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: objectives/discovery/host/browser/identity::browser-data-files
      - id: objectives/credential-access/wallet/desktop/
      - id: objectives/credential-access/discord/token/
      - id: objectives/credential-access/messaging/telegram/
      - id: objectives/credential-access/ftp/filezilla/
      - id: objectives/credential-access/gaming/steam/
      - id: objectives/credential-access/email/thunderbird/
    unless:
      - id: well-known/tool/detection/
      - id: well-known/app/
      - id: objectives/credential-access/shell/history/
      - id: objectives/credential-access/browser/safari/
      - id: objectives/credential-access/keychain/
      - id: objectives/credential-access/ssh/key/
      - id: objectives/credential-access/vpn/config/
  - id: cis-geofenced-credential-stealer
    desc: CIS-geofenced credential stealer
    crit: hostile
    conf: 0.95
    attack: T1614.001
    all:
      - id: objectives/anti-analysis/geofencing/region/cluster::cis-geofencing
    any:
      - id: objectives/credential-access/wallet/desktop/
      - id: objectives/discovery/host/browser/identity::browser-data-files
      - id: objectives/collection/file-targeting/
      - id: objectives/credential-access/discord/token/
    unless:
      - id: well-known/tool/detection/
  - id: obfuscated-multi-app-credential-stealer
    desc: Obfuscated multi-app credential stealer
    crit: hostile
    conf: 0.98
    attack: "T1555,T1027"
    all:
      - id: multi-app-credential-stealer
    any:
      - id: objectives/anti-static/obfuscation/string/dynamic/
      - id: objectives/anti-static/obfuscation/syntax::js-fragmented-prop-single
      - id: objectives/anti-static/obfuscation/string/array::computed-array-access
      - id: objectives/supply-chain/hidden-payload/trojan::computed-child-process-destructure-text
      - id: objectives/evasion/anti-av/platform/defender::defender-exclusionpath-raw
    unless:
      - id: well-known/tool/detection/
  - id: browser-wallet-chromium-key-access
    desc: Browser wallet stealer extracts Chromium credential keys
    crit: component
    conf: 0.96
    all:
      - id: browser-wallet-stealer
      - id: objectives/credential-access/browser/chromium::master-decrypt
    any:
      - id: objectives/credential-access/browser/chromium::password-sql
      - id: objectives/credential-access/browser/chromium::logins-table
      - id: objectives/credential-access/wallet/extension::multi-wallet-targeting
      - id: objectives/credential-access/wallet/extension::browser-wallet-extensions
    needs: 2
  - id: javascript-stealer-obfuscation
    desc: JavaScript stealer obfuscation
    crit: component
    conf: 0.94
    for: [javascript]
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::strong-js-obfuscation
      - id: objectives/anti-static/obfuscation/string/array::computed-array-access
      - id: objectives/anti-static/obfuscation/syntax::js-fragmented-prop-single
  - id: obfuscated-browser-wallet-credential-stealer
    desc: Obfuscated browser and wallet credential stealer
    crit: hostile
    conf: 0.98
    attack: "T1555,T1555.003,T1027"
    all:
      - id: browser-wallet-chromium-key-access
      - id: javascript-stealer-obfuscation
    unless:
      - id: well-known/tool/detection/
      - id: well-known/app/
      - id: well-known/lib/youtube-dl/
  - id: surveillance-multi-app-credential-stealer
    desc: Surveillance-enabled multi-app credential stealer
    crit: hostile
    conf: 0.98
    attack: "T1555,T1056.001,T1113"
    platforms: [windows]
    for: [pe, dll]
    all:
      - id: multi-app-credential-stealer
    any:
      - id: objectives/exfiltration/stealer/surveillance::recon-screenshot-socket-exfil
      - id: objectives/collection/keylog/hook::windows-hook-registry-persistence-keylogger
      - id: objectives/command-and-control/dropper/download::winhttp-temp-dropper
    unless:
      - id: well-known/tool/detection/
  - id: browser-key-multi-app-credential-stealer
    desc: Multi-app stealer extracts browser credential keys
    crit: hostile
    conf: 0.98
    attack: "T1555.003,T1555"
    all:
      - id: multi-app-credential-stealer
      - id: objectives/credential-access/browser/chromium::master-decrypt
    any:
      - id: objectives/credential-access/browser/chromium::password-sql
      - id: objectives/credential-access/browser/chromium::logins-table
      - id: objectives/credential-access/browser/firefox::key4-db
      - id: objectives/credential-access/browser/firefox::nss-private
    unless:
      - id: well-known/tool/detection/
      - id: well-known/app/
      - id: well-known/lib/youtube-dl/
  - id: wallet-messaging-session-stealer
    desc: Stealer targets wallets, messaging, and gaming sessions
    crit: hostile
    conf: 0.98
    attack: "T1555,T1555.003"
    all:
      - id: multi-app-credential-stealer
      - id: objectives/credential-access/wallet/desktop/
      - id: objectives/credential-access/messaging/telegram::telegram-stealer
    any:
      - id: objectives/credential-access/gaming/steam/profile::steam-cred-theft
      - id: objectives/credential-access/browser/chromium::password-sql
      - id: objectives/credential-access/browser/firefox::key4-db
      - id: objectives/discovery/host/browser/identity::local-storage
    unless:
      - id: well-known/tool/detection/
      - id: well-known/app/
  - id: macos-multi-app-wallet-session-stealer
    desc: macOS app bundle targets wallets and messaging sessions
    crit: hostile
    conf: 0.98
    attack: "T1555,T1056.001,T1115"
    platforms: [macos]
    for: [macho, archives]
    scope: archive
    all:
      - id: multi-app-credential-stealer
      - id: objectives/credential-access/wallet/extension::multi-wallet-targeting
    any:
      - id: objectives/credential-access/messaging/telegram::telegram-stealer
      - id: objectives/impact/ui/manipulation/core::macos-spy-detected
      - id: objectives/collection/keylog/capture::macos-eventtap
      - id: micro-behaviors/os/clipboard/access::macos-nspasteboard-access
      - id: micro-behaviors/hardware/display/camera::avfoundation-capture
    unless:
      - id: well-known/tool/detection/
      - id: well-known/app/browser-extension/
