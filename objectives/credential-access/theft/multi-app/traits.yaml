defaults:
  attack: T1555
  mbc: B0028
  platforms:
    - linux
    - unix
    - macos
    - windows
    - android
    - ios
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
composite_rules:
  - id: browser-wallet-stealer
    desc: Browser credentials with wallet targeting
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    all:
      - id: objectives/discovery/host/browser/identity::browser-data-files
    any:
      - id: objectives/credential-access/wallet/desktop/
      - id: micro-behaviors/fs/file/open::wallet-dat-path
      - id: objectives/credential-access/wallet/extension/
    unless:
      - id: well-known/tool/detection/
      - id: well-known/tool/detection/security-scanner::defensive-evidence-collector
      - id: well-known/lib/pyaigis/
      - id: well-known/tool/sysadmin/container/
      - id: well-known/lib/jvm
      - id: well-known/lib/glibc
  - id: multi-app-credential-stealer
    desc: Harvests credentials from multiple target apps
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: objectives/discovery/host/browser/identity::browser-data-files
      - id: objectives/credential-access/wallet/desktop/
      - id: objectives/credential-access/discord/token/
      - id: objectives/credential-access/messaging/telegram/
      - id: objectives/credential-access/ftp/filezilla/
      - id: objectives/credential-access/gaming/steam/
      - id: objectives/credential-access/email/thunderbird/
      - id: objectives/credential-access/shell/history::history-theft
      - id: objectives/credential-access/browser/safari/
      - id: objectives/credential-access/keychain/
      - id: objectives/credential-access/ssh/key::private-key-material
      - id: objectives/credential-access/ssh/key::private-key-theft
      - id: objectives/credential-access/ssh/key::ssh-dir-enum
      - id: objectives/credential-access/vpn/config/
    unless:
      - id: well-known/tool/detection/security-scanner::multi-app-stealer-benign-context
  - id: cis-geofenced-credential-stealer
    desc: CIS-geofenced credential stealer
    crit: hostile
    conf: 0.95
    attack: T1614.001
    all:
      - id: objectives/anti-analysis/geofencing/region/cluster::cis-geofencing
    any:
      - id: objectives/credential-access/wallet/desktop/
      - id: objectives/discovery/host/browser/identity::browser-data-files
      - id: objectives/collection/file-targeting/
      - id: objectives/credential-access/discord/token/
    unless:
      - id: well-known/tool/detection/
