# Validated-SMTP-credential result store.
#
# The persistence side of an SMTP combo checker: it maintains a deduplicated,
# on-disk store of the credentials that were confirmed to work ("valid_smtp"
# result files), keyed so re-runs don't re-add the same account, and builds a
# backend object around that store. Amassing a growing file of confirmed,
# reusable SMTP logins is the payoff of the credential-checking operation.
#
# Atoms are notable on their own (a results file, a dedupe key, a backend
# constructor). The hostile verdict is the composite, which additionally
# requires obfuscator.io packing so it will not fire on a benign
# mail-account store.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1552.001
  mbc: E1552

traits:
  - id: valid-smtp-results-file
    desc: Names a validated-SMTP results file
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bVALID_SMTPS?_FILE\b'

  - id: smtp-credential-dedupe-key
    desc: Builds a credential dedupe key
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: credentialDedupeKey

  - id: smtp-load-existing-valid-keys
    desc: Loads existing validated-SMTP keys
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: loadExistingValidSmtpKeys

  - id: valid-smtp-backend-class
    desc: Defines a validated-SMTP backend class
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ValidSmtpBackend

  - id: valid-smtp-backend-factory
    desc: Constructs a validated-SMTP backend
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: createValidSmtpBackend

  - id: valid-smtp-file-writer
    desc: Defines a validated-SMTP file writer
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ValidSmtpFileWriter

  - id: valid-result-folder-writer
    desc: Defines a validated-result folder writer
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: ValidResultFolderWriter

composite_rules:
  - id: obfuscated-smtp-valid-credential-store
    desc: Obfuscated validated-SMTP credential store
    crit: hostile
    conf: 0.95
    all:
      - id: valid-smtp-results-file
      - id: objectives/supply-chain/hidden-payload/runtime::obfuscator-io-toolkit-bundle
    any:
      - id: smtp-credential-dedupe-key
      - id: smtp-load-existing-valid-keys
      - id: valid-smtp-backend-class
      - id: valid-smtp-backend-factory
      - id: valid-smtp-file-writer
      - id: valid-result-folder-writer
