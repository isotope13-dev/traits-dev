defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: auth-hook-ruby
    desc: Authentication method hook
    crit: suspicious
    conf: 0.9
    attack: T1056
    if:
      type: string_literal
      regex: Identity\.prepend|prepend.{0,50}Module
  - id: password-theft-ruby
    desc: Password theft pattern
    crit: suspicious
    conf: 0.92
    attack: T1056
    if:
      type: string_literal
      regex: password.{0,50}rescue
  - id: global-var-storage
    desc: Global variable for credential storage
    crit: suspicious
    conf: 0.75
    attack: T1552
    if:
      type: string_literal
      regex: \$[a-zA-Z_][a-zA-Z0-9_]*\s*<<|global.{0,50}credential
  - id: credential-append
    desc: Credential field string marker
    crit: component
    conf: 0.85
    attack: T1056
    if:
      type: string_literal
      regex: email.{0,50}password|<<.{0,50}rescue
composite_rules:
  - id: auth-credential-theft
    desc: Authentication credential theft
    crit: suspicious
    conf: 0.93
    attack: T1056
    needs: 3
    any:
      - id: auth-hook-ruby
      - id: password-theft-ruby
      - id: global-var-storage
      - id: credential-append
      - id: objectives/command-and-control/backdoor/rat/multi::faraday-http
