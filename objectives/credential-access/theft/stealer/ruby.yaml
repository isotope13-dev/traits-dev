defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: auth-hook-ruby
    desc: Authentication method hook
    crit: suspicious
    conf: 0.9
    attack: T1056
    if:
      type: string_literal
      regex: Identity\.prepend|prepend.{0,50}Module
  - id: password-theft-ruby
    desc: Password theft pattern
    crit: suspicious
    conf: 0.92
    attack: T1056
    if:
      type: string_literal
      regex: password.{0,50}rescue
  - id: global-variable-append
    desc: Ruby global variable append operation
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\$[A-Za-z_][A-Za-z0-9_]*\s*<<'
  - id: credential-append
    desc: Credential field string marker
    crit: component
    conf: 0.85
    attack: T1056
    if:
      type: string_literal
      regex: email.{0,50}password|<<.{0,50}rescue
composite_rules:
  - id: global-credential-buffer
    desc: Global variable receives credential data
    crit: suspicious
    conf: 0.75
    attack: T1552
    all:
      - id: global-variable-append
    any:
      - id: objectives/credential-access/theft/keywords::credential-field--password
      - id: micro-behaviors/data/parse/vocabulary::credential-field
      - id: micro-behaviors/data/parse/vocabulary::secret
      - id: micro-behaviors/data/parse/vocabulary::token-word
    near_bytes: 160
  - id: auth-credential-theft
    desc: Authentication credential theft
    crit: suspicious
    conf: 0.93
    attack: T1056
    needs: 3
    any:
      - id: auth-hook-ruby
      - id: password-theft-ruby
      - id: global-credential-buffer
      - id: credential-append
      - id: objectives/command-and-control/backdoor/rat/multi::faraday-http
