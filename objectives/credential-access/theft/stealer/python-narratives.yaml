# Python Infostealer Narratives
# High-confidence rules for identifying stealing behavior
#
# Note: Cross-directory references use directory paths which match ANY trait
# within that directory.
defaults:
  platforms: [windows, unix]
  crit: suspicious
  for: [python]
traits:
  # System info collection with credential intent
- id: system-info-with-browser
  desc: System info with browser targeting
  conf: 0.7
  if:
    type: text
    regex: "(platform[.(]|uname).{0,50}browser"
  unless:
  - id: metadata/lang/javascript-features::sourcemap-sources-content
- id: system-info-with-wallet
  desc: System info with crypto wallet
  conf: 0.8
  if:
    type: text
    regex: "(platform|uname).{0,50}(wallet|exodus)"
  unless:
  - id: micro-behaviors/crypto/library/blockchain/
- id: facebook-business-api-targeting--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: graph\.facebook\.com/.{0,160}(adaccounts|facebook_pages|businesses)
  count_max: 1006139
- id: facebook-business-api-targeting--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: business.facebook.com/latest/settings/business_info
  count_max: 1006140
- id: facebook-cookie-loot-file
  desc: Facebook cookie loot file
  conf: 0.9
  attack: T1539
  if:
    type: text
    word: Facebook_Cookies.txt
- id: facebook-access-token-scrape
  desc: Facebook access token scrape
  conf: 0.93
  attack: T1539
  if:
    type: text
    exact: window.__accessToken=
- id: browser-credential-report-format
  desc: Browser credential report fields
  crit: component
  conf: 0.88
  if:
    type: text
    regex: URL:\s*\{.{0,80}Username:\s*\{.{0,80}Password:\s*\{
- id: credit-card-report-format
  desc: Credit card report fields
  crit: component
  conf: 0.86
  if:
    type: text
    regex: "Card:.{0,120}CVC:"

composite_rules:
- id: python-browser-data-telegram-stealer
  desc: Python browser data Telegram stealer
  crit: hostile
  conf: 0.97
  attack: T1567
  all:
  - id: objectives/exfiltration/messaging/telegram::telegram-archive-exfil
  - id: objectives/credential-access/browser/chromium::password-sql
  any:
  - id: objectives/credential-access/browser/chromium/
  - id: objectives/credential-access/browser/firefox::nss-private
- id: python-appbound-telegram-stealer
  desc: Python app-bound browser Telegram stealer
  crit: hostile
  conf: 0.98
  attack: T1555.003
  all:
  - id: objectives/credential-access/browser/chromium::browser-app-bound-key-injection
  - id: objectives/exfiltration/messaging/telegram::telegram-archive-exfil
- id: python-facebook-business-stealer
  desc: Python Facebook business cookie stealer
  crit: hostile
  conf: 0.96
  attack: T1539
  all:
  - id: facebook-business-api-targeting
  - id: facebook-cookie-loot-file
  any:
  - id: facebook-access-token-scrape
  - id: objectives/credential-access/browser/chromium::cookie-sql
  - id: objectives/credential-access/browser/firefox::cookies-dup
  - id: objectives/exfiltration/messaging/telegram::telegram-archive-exfil
- id: python-credential-report-stealer
  desc: Python credential report stealer
  crit: hostile
  conf: 0.95
  attack: T1555
  all:
  - id: browser-credential-report-format
  any:
  - id: objectives/credential-access/browser/chromium::password-sql
  - id: objectives/credential-access/browser/firefox::nss-private
  - id: objectives/exfiltration/messaging/telegram::telegram-archive-exfil
- id: python-payment-card-stealer
  desc: Python payment card stealer
  crit: hostile
  conf: 0.95
  attack: T1555.003
  all:
  - id: credit-card-report-format
  - id: micro-behaviors/fs/path/sensitive/browser::browser-credit-cards
  any:
  - id: objectives/credential-access/browser/chromium::credit-card-sql
  - id: objectives/exfiltration/messaging/telegram::telegram-archive-exfil
- id: facebook-business-api-targeting
  desc: Facebook business API targeting
  crit: baseline
  conf: 0.95
  attack: T1555
  any:
  - id: facebook-business-api-targeting--rx-1
  - id: facebook-business-api-targeting--rx-2
