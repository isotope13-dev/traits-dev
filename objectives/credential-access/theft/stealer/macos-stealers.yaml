defaults:
  for:
    - macho
    - objc
    - swift
    - applescript
  platforms:
    - macos
traits:
  - id: macos-stealer-v2-id
    desc: macOS Stealer v2 identifier
    crit: suspicious
    conf: 1.0
    mbc: E1083
    if:
      type: text
      regex: macos-stealer-v2-[a-f0-8]{40}
  - id: openclaw-lure
    desc: OpenClaw malware lure
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: openclaw-core
