defaults:
  for:
    - macho
    - objc
    - swift
    - applescript
  platforms:
    - macos
traits:
  - id: macos-stealer-v2-id
    desc: macOS Stealer v2 identifier
    crit: suspicious
    conf: 1.0
    mbc: E1083
    if:
      type: text
      regex: "macos-stealer-v2-[a-f0-9]{40}"
  - id: openclaw-lure
    desc: OpenClaw malware lure
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: openclaw-core
composite_rules:
  - id: macos-stealer-v2-obfuscated-collector
    desc: macOS Stealer v2 obfuscated collector
    crit: hostile
    conf: 0.98
    for: [macho]
    attack: T1555
    all:
      - id: macos-stealer-v2-id
      - id: objectives/credential-access/theft/file::obfuscated-cpp-file-stealer
    any:
      - id: objectives/credential-access/theft/file::devnull-command-file-collector
      - id: objectives/credential-access/theft/file::commoncrypto-file-stealer
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: stealer-word-obfuscated-macos-collector
    desc: Stealer keyword obfuscated macOS collector
    crit: hostile
    conf: 0.95
    for: [macho]
    attack: T1555
    all:
      - id: objectives/credential-access/theft/keywords::stealer-word
      - id: objectives/credential-access/theft/file::stealer-labeled-obfuscated-collector
    downgrade:
      any:
        - id: metadata/signed/platform::apple
