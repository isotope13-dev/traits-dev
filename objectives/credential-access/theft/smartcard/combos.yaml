# Smart Card Credential Theft
# Detecting smart card access combined with other suspicious indicators
# ATT&CK: T1552.004 (Unsecured Credentials: Private Keys)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1552.004"
composite_rules:
  - id: smartcard-credential-theft
    desc: Smart card access with suspicious indicators
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/hardware/smartcard/access::smartcard-access
    any:
      - id: micro-behaviors/dylib/load/runtime::load-library-a
      - id: micro-behaviors/dylib/lookup::get-proc-address
      - id: micro-behaviors/mem/protect/modify::virtual-protect-ex
      - id: micro-behaviors/fs/temp/directory::get-temp-path-dup
      - id: metadata/file/profile/locale::locale-ru-ru-dash
      - id: metadata/file/profile/locale::locale-ru-ru-underscore
    needs: 2
    downgrade:
      any:
        - id: metadata/signed/platform/
