defaults:
  attack: T1555
  mbc: B0028
  platforms:
    - unix
    - windows
  for:
    - binaries
    - scripts
    - source
    - manifests
    - documents
    - media
    - data
composite_rules:
  - id: browser-wallet-stealer
    desc: Browser credentials with wallet targeting
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    all:
      - id: objectives/discovery/host/browser::browser-data-files
    any:
      - id: objectives/credential-access/wallet/desktop/
      - id: objectives/impact/crypto-manipulation/clipboard::wallet-dat-access
      - id: objectives/credential-access/wallet/extension/
    unless:
      - id: well-known/tools/detection/
      - id: well-known/tools/detection/stng::xor-classify-corpus
  - id: multi-app-credential-stealer
    desc: Multi-application credential harvesting
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: objectives/discovery/host/browser::browser-data-files
      - id: objectives/credential-access/wallet/desktop/
      - id: objectives/credential-access/discord/token/
      - id: objectives/credential-access/messaging/telegram/
      - id: objectives/credential-access/ftp/filezilla/
      - id: objectives/credential-access/gaming/steam/
      - id: objectives/credential-access/email/thunderbird/
      - id: objectives/credential-access/shell/history/
      - id: objectives/credential-access/browser/safari/
      - id: objectives/credential-access/keychain/
      - id: objectives/credential-access/ssh/key/
      - id: objectives/credential-access/vpn/config/
    unless:
      - id: well-known/tools/detection/
  - id: cis-geofenced-credential-stealer
    desc: CIS-geofenced credential stealer
    crit: hostile
    conf: 0.95
    attack: T1614.001
    all:
      - id: objectives/anti-analysis/geofencing/location::cis-geofencing
    any:
      - id: objectives/credential-access/wallet/desktop/
      - id: objectives/discovery/host/browser::browser-data-files
      - id: objectives/collection/file-targeting/
      - id: objectives/credential-access/discord/token/
    unless:
      - id: well-known/tools/detection/
  - id: remote-shell-dotenv-ssh-harvest
    desc: Remote shell probes dotenv and SSH secrets
    crit: suspicious
    conf: 0.94
    needs: 3
    any:
      - id: objectives/discovery/account::active-enum-cmds
      - id: objectives/credential-access/env/dotenv::dotenv-credentials-theft
      - id: objectives/credential-access/env/dotenv::dotenv-file-access
      - id: objectives/credential-access/ssh/key::slash-dot-ssh
      - id: objectives/persistence/login/ssh/backdoor::home-ssh-path
  - id: remote-shell-pty-history-harvest
    desc: PTY shell probes history after recon
    crit: suspicious
    conf: 0.93
    all:
      - id: objectives/discovery/account::active-enum-cmds
      - id: objectives/credential-access/shell/history::history-theft
    any:
      - id: micro-behaviors/process/tty/pty::pty-spawn
      - id: micro-behaviors/process/tty/pty::openpty
      - id: objectives/command-and-control/reverse-shell/socket::python-pty-spawn
  - id: remote-shell-multi-secret-harvest
    desc: Interactive shell hunts multiple secret stores
    crit: hostile
    conf: 0.97
    needs: 2
    any:
      - id: remote-shell-dotenv-ssh-harvest
      - id: remote-shell-pty-history-harvest
      - id: objectives/credential-access/env/dotenv::dotenv-credentials-theft
      - id: objectives/credential-access/ssh/key::slash-dot-ssh
      - id: objectives/credential-access/shell/history::history-theft
  - id: recon-egress-validation
    desc: Interactive recon followed by network egress
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: objectives/discovery/account::active-enum-cmds
      - id: micro-behaviors/process/user/query::hostname-pwd-whoami
      - id: micro-behaviors/communications/http/request::request-python
      - id: objectives/command-and-control/channel/websocket::socketio-c2-pattern
  - id: recon-persistence-progression
    desc: Shell recon followed by SSH persistence setup
    crit: hostile
    conf: 0.96
    needs: 2
    any:
      - id: objectives/discovery/account::active-enum-cmds
      - id: micro-behaviors/process/user/query::hostname-pwd-whoami
      - id: objectives/persistence/login/ssh/backdoor::ssh-backdoor-comp
      - id: objectives/persistence/login/ssh/backdoor::ssh-persistence-setup
  - id: developer-secret-sweep
    desc: Shell hunts dotenv compose and SSH secrets
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: objectives/credential-access/env/dotenv::dotenv-file-access
      - id: objectives/credential-access/env/dotenv::dotenv-credentials-theft
      - id: objectives/credential-access/ssh/key::slash-dot-ssh
      - id: objectives/persistence/login/ssh/backdoor::home-ssh-path
      - id: well-known/malware/exploit/marimo::notebook-compose-targets
  - id: operator-secret-playbook
    desc: Operator style secret hunting playbook
    crit: hostile
    conf: 0.97
    needs: 2
    any:
      - id: recon-egress-validation
      - id: remote-shell-dotenv-ssh-harvest
      - id: remote-shell-pty-history-harvest
      - id: developer-secret-sweep
      - id: recon-persistence-progression
