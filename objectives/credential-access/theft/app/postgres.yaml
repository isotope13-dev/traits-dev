defaults:
  platforms:
  - unix
  - windows
  for:
  - go
  size_max: 500000000
traits:
- id: postgres-hash-exfil-string
  desc: PostgreSQL password hashes exfiltration string
  crit: notable
  conf: 1.0
  if:
    type: text
    substr: "exfiltrate Postgresql password hashes"

composite_rules:
- id: postgres-hash-exfil
  desc: Exfiltration of PostgreSQL password hashes
  crit: hostile
  conf: 1.0
  all:
  - id: postgres-hash-exfil-string
  unless:
  - id: metadata/file/catalog/identity/
