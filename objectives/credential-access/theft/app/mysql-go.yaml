defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1552.001
traits:
  - id: go-hardcoded-admin-password-args
    desc: Go hardcoded admin password args
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\(\s*"(\d{1,3}\.){3}\d{1,3}",\s*"admin",\s*"password.{0,40}"'
composite_rules:
  - id: go-mysql-hardcoded-credential-access
    desc: Go MySQL hardcoded credential access
    crit: hostile
    conf: 0.98
    near_lines: 60
    all:
      - id: micro-behaviors/data/db/sql::go-sql-open-mysql
      - id: micro-behaviors/data/db/sql::go-mysql-credential-dsn-format
      - id: objectives/discovery/network/scan/library::anvie-port-scanner-import
      - id: objectives/discovery/network/scan/library::go-new-portscanner-call
      - id: objectives/discovery/network/scan/library::go-get-opened-port-call
      - id: go-hardcoded-admin-password-args
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/harness/unit::go-test

  - id: mysql-credentialed-port-scan-binary
    desc: MySQL credentialed port scan binary
    crit: hostile
    conf: 0.96
    for: [binaries]
    all:
      - id: objectives/discovery/network/scan/library::anvie-port-scanner-package-binary
      - id: micro-behaviors/data/db/sql::go-mysql-credential-dsn-format
      - id: micro-behaviors/communications/ip/literal::private-ipv4-192168-binary
    unless:
      - id: metadata/package/testing/
