defaults:
  attack: T1555.001
  mbc: T1555.001
  platforms:
    - macos
    - ios
  for:
    - shell
    - python
    - javascript
    - applescript
    - lua
  crit: suspicious
traits:
  - id: find-generic-password
    desc: Find generic password via security utility
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      substr: security find-generic-password
    unless:
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: find-internet-password
    desc: Find internet password via security utility
    conf: 0.8
    if:
      type: string_literal
      substr: security find-internet-password
    unless:
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: dump-keychain
    desc: Dump keychain via security utility
    conf: 0.8
    if:
      type: string_literal
      substr: security dump-keychain
    unless:
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: export-keychain
    desc: Export items from keychain via security utility
    conf: 0.8
    if:
      type: string_literal
      substr: security export
    unless:
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
