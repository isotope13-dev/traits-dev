defaults:
  attack: T1555.001
  mbc: T1555.001
  platforms:
    - macos
    - ios
  for:
    - shell
    - python
    - javascript
    - typescript
    - applescript
    - lua
    - ruby
  crit: suspicious
traits:
  - id: find-generic-password
    desc: Find generic password via security utility
    crit: suspicious
    conf: 0.8
    for:
      - shell
      - javascript
      - typescript
      - applescript
      - lua
      - ruby
    if:
      type: string_literal
      substr: security find-generic-password
    unless:
      - id: well-known/tool/detection/security-scanner/
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
  - id: python-find-generic-password
    desc: Python reads a named macOS Keychain item
    crit: notable
    conf: 0.9
    for: [python]
    if:
      type: tree-sitter
      kind: call
      regex: 'subprocess\.run\([\s\S]{0,260}find-generic-password'
    unless:
      - id: well-known/tool/detection/security-scanner/
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
  - id: find-internet-password
    desc: Find internet password via security utility
    for: [javascript, typescript]
    conf: 0.8
    if:
      type: symbol
      kind: call
      exact: exec.quiet
      arg:
        kind: string
        exact: security find-internet-password -s github.com -w
    unless:
      - id: well-known/tool/detection/security-scanner/
      - id: metadata/package/quality/false-positives::cadence-update-tool-context
  - id: dump-keychain
    desc: Dump keychain via security utility
    conf: 0.8
    if:
      type: string_literal
      substr: security dump-keychain
    unless:
      - id: well-known/tool/detection/security-scanner/
  - id: export-keychain
    desc: "Export items keychain via security utility"
    conf: 0.8
    if:
      type: string_literal
      substr: security export
    unless:
      - id: well-known/tool/detection/security-scanner/
