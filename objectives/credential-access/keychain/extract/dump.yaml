defaults:
  attack: T1555.001
  mbc: T1555.001
  platforms:
    - macos
    - ios
  for:
    - shell
    - python
    - javascript
    - typescript
    - applescript
    - lua
    - ruby
  crit: suspicious
traits:
  - id: find-generic-password
    desc: Find generic password via security utility
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      substr: security find-generic-password
    unless:
      - id: well-known/tool/detection/security-scanner::defensive-evidence-collector
      - id: objectives/supply-chain/trojanized/app/context::selenium-engflow-credential-helper
  - id: find-internet-password
    desc: Find internet password via security utility
    conf: 0.8
    if:
      type: string_literal
      substr: security find-internet-password
    unless:
      - id: well-known/tool/detection/security-scanner::defensive-evidence-collector
  - id: dump-keychain
    desc: Dump keychain via security utility
    conf: 0.8
    if:
      type: string_literal
      substr: security dump-keychain
    unless:
      - id: well-known/tool/detection/security-scanner::defensive-evidence-collector
  - id: export-keychain
    desc: "Export items keychain via security utility"
    conf: 0.8
    if:
      type: string_literal
      substr: security export
    unless:
      - id: well-known/tool/detection/security-scanner::defensive-evidence-collector
