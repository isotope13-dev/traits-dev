defaults:
  platforms: [macos]
traits:
  - id: go-dump-keychain-symbol
    desc: Go keychain dump routine
    crit: suspicious
    conf: 0.95
    for: [macho]
    if:
      type: text
      exact: DumpKeyChain
  - id: go-decrypt-keychain-symbol
    desc: Go keychain decrypt routine
    crit: suspicious
    conf: 0.95
    for: [macho]
    if:
      type: text
      exact: DecryptKeychain
  - id: go-safe-storage-password-symbol
    desc: Chrome Safe Storage extractor
    crit: suspicious
    conf: 0.95
    for: [macho]
    if:
      type: text
      exact: ExtractSafeStoragePassword
  - id: go-upload-keychain-symbol
    desc: Go keychain upload routine
    crit: suspicious
    conf: 0.95
    for: [macho]
    if:
      type: text
      exact: UploadKeychain

composite_rules:
  - id: keychain-dumping
    desc: Dump or export macOS keychain credentials
    crit: suspicious
    conf: 0.95
    mbc: T1555.001
    attack: T1555.001
    for: [macho, objc, swift]
    all:
      - id: micro-behaviors/process/create/shell::shell-execution
      - id: micro-behaviors/os/security/keychain/
  - id: go-keychain-theft-routines
    desc: Go keychain theft routines
    crit: hostile
    conf: 0.98
    for: [macho]
    all:
      - id: go-dump-keychain-symbol
      - id: go-decrypt-keychain-symbol
      - id: go-safe-storage-password-symbol
    any:
      - id: go-upload-keychain-symbol
