defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  crit: suspicious
  conf: 0.9
  attack: T1555.001
  for: [shell, applescript, macho]
composite_rules:
  - id: keychain-theft
    desc: macOS Keychain file collection
    any:
      - id: micro-behaviors/fs/path/sensitive/apple::keychain-data
    all:
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
