defaults:
  platforms: [linux, unix, macos, android, ios, windows]
  crit: suspicious
  conf: 0.9
  attack: T1555.001
  for: [shell, applescript, macho, python]
composite_rules:
  - id: keychain-theft
    desc: macOS Keychain file collection
    any:
      - id: micro-behaviors/fs/path/sensitive/apple::keychain-data
    all:
      - id: micro-behaviors/fs/directory/traverse::traverse-walk
  # Login keychain DB exfiltrated together with a phished+validated password.
  # The login.keychain-db holds every saved credential/cert; on its own it is a
  # sensitive path, but combined with a `dscl . authonly`-validated password
  # (the secret needed to unlock it) plus staging/exfil/phishing it is a full
  # keychain compromise — the AMOS keychain-steal step, independent of carrier.
  - id: login-keychain-phished-theft
    desc: Login keychain stolen with phished password
    crit: hostile
    conf: 0.96
    for: [applescript, shell]
    platforms: [macos]
    all:
      - id: objectives/collection/stealer/workflow::login-keychain-db-target
      - id: objectives/credential-access/validation/check::dscl-authonly-comp
    any:
      - id: objectives/collection/stealer/workflow::applescript-staging-layout
      - id: objectives/collection/stealer/workflow::applescript-buildid-databinary-exfil
      - id: objectives/credential-access/phishing/lure::hidden-answer
