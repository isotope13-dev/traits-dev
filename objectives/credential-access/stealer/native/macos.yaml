# macOS Information Stealer Detection
# Detects macOS-specific information stealer patterns
# Combines hardware fingerprinting, credential targeting, and network exfiltration
composite_rules:
  # Hardware fingerprint + network = tracking/identification
  - id: fingerprint-with-exfil
    desc: "macOS hardware fingerprinting network exfiltration"
    crit: suspicious
    conf: 0.9
    attack: "T1082"
    mbc: "B0001.009"
    for: [macho]
    all:
      - id: objectives/discovery/host/fingerprint::macos-hardware-uuid
    any:
      - id: micro-behaviors/communications/socket/create
      - id: micro-behaviors/communications/download/curl
  # Credential targeting + hardware fingerprinting = stealer
  - id: credential-stealer-macos
    desc: "macOS credential stealer"
    crit: hostile
    conf: 0.95
    attack: "T1555"
    mbc: "B0028"
    for: [macho]
    all:
      - id: objectives/discovery/host/fingerprint::macos-hardware-uuid
      - id: objectives/credential-access/validation/check::csidentity-password-auth
      - id: objectives/collection/file-targeting/filter::credential-files
      - id: micro-behaviors/communications/socket/create
  # Full stealer pattern: fingerprint + targeting + obfuscation + network
  - id: comprehensive-stealer-macos
    desc: "Comprehensive macOS information stealer"
    crit: hostile
    conf: 0.98
    attack: "T1555"
    mbc: "B0028"
    for: [macho]
    all:
      - id: objectives/discovery/host/fingerprint::macos-hardware-uuid
      - id: objectives/anti-static/obfuscation/encoding/xor::string-decrypt
      - id: objectives/credential-access/validation/check::csidentity-password-auth
      - id: objectives/collection/file-targeting/filter::credential-files
  # macOS C++ stealer with custom directory copying logic
  - id: macos-cpp-stealer-copy-logic
    desc: "MacOS C++ Stealer with custom directory copy"
    crit: hostile
    conf: 0.95
    for: [macho]
    platforms: [macos]
    all:
      - id: objectives/credential-access/stealer/native/symbols::copy-directory-with-exclusions
    any:
      - id: micro-behaviors/process/create/shell::shell-execution
      - id: objectives/persistence/daemon/init::unix-daemon-persistence
      - id: objectives/lateral-movement/social-engineering/masquerading::generic-bundle-id-pattern
      - id: metadata/signed/id::com.utils.application
      - id: metadata/entitlements::highly-privileged
  # AppleScript-based browser credential stealer
  - id: applescript-browser-stealer
    desc: AppleScript-based browser credential stealer
    crit: hostile
    conf: 0.95
    attack: "T1555.003"
    for: [applescript, macho]
    platforms: [macos]
    all:
      - id: micro-behaviors/data/tcc/database::tcc-db-alias
      - id: micro-behaviors/data/browser/access::browser-data-theft
  # TCC bypass with browser data theft
  - id: tcc-browser-theft
    desc: TCC database access for browser credential theft
    crit: hostile
    conf: 0.95
    attack: "T1555.003"
    for: [applescript, macho]
    platforms: [macos]
    needs: 2
    all:
      - id: micro-behaviors/data/tcc/database::tcc-db-alias
    any:
      - id: micro-behaviors/data/browser/access::extension-settings-path
      - id: micro-behaviors/data/browser/access::cookies-path-concat
      - id: micro-behaviors/data/browser/access::login-data-path-concat
      - id: micro-behaviors/data/tcc/database::tccclickjack-string
