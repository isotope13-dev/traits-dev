# Windows Native Information Stealer Detection
# Detects Windows PE infostealers via credential theft + collection + exfiltration signal chains
# ATT&CK: T1555 (Credentials from Password Stores), T1113 (Screen Capture), T1041 (Exfiltration)
defaults:
  attack: T1555
  mbc: B0028
  platforms: [windows]
  for: [pe, dll]
composite_rules:
  # DPAPI + screen capture canvas + HTTP read = credential/screenshot stealer
  - id: windows-stealer-dpapi-screen-exfil
    desc: Windows credential theft with screen capture and HTTP exfil
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/crypto/dpapi/decrypt::crypt-unprotect-data
      - id: micro-behaviors/hardware/display/screen::gdi-bitblt
    any:
      - id: micro-behaviors/hardware/display/screen::gdi-create-compatible-dc
      - id: micro-behaviors/hardware/display/screen::gdi-create-compatible-bitmap
    none:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
  # DPAPI + registry credential read + process enumeration + HTTP = infostealer
  - id: windows-infostealer-registry-enum
    desc: Windows infostealer with registry harvest and process recon
    crit: hostile
    conf: 0.92
    all:
      - id: micro-behaviors/crypto/dpapi/decrypt::crypt-unprotect-data
      - id: micro-behaviors/os/registry/access::reg-open-key-ex-w-symbol
      - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
    any:
      - id: micro-behaviors/communications/http/get::wininet-read-file-src
      - id: micro-behaviors/communications/http/get::internet-read-file
      - id: micro-behaviors/communications/http/get::wininet-http-flow
    none:
      - id: metadata/vendor/microsoft::microsoft-corp-marker
