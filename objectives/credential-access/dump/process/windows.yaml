defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
  attack: T1003.001
  mbc: B0005
traits:
- id: lsass-system-path
  desc: LSASS system path reference
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: (?i)systemroot[/\\]+system32[/\\]+lsass\.exe
- id: minidump-write-dump
  desc: MiniDumpWriteDump dump API fragment
  crit: component
  conf: 0.85
  if:
    type: symbol
    exact: MiniDumpWriteDump
composite_rules:
- id: lsass-memory-target
  desc: LSASS memory access target
  crit: suspicious
  conf: 0.94
  any:
  - id: objectives/privilege-escalation/process-injection::lsass-target
  - id: lsass-system-path
- id: lsass-memory-scrape
  desc: LSASS process memory credential scraping
  crit: suspicious
  conf: 0.97
  all:
  - id: lsass-system-path
  - id: micro-behaviors/process/enumerate/snapshot::create-toolhelp32-snapshot
  - id: micro-behaviors/process/create/spawn::open-process
  - id: micro-behaviors/process/inject/runtime::read-process-memory
  unless:
  - id: metadata/signed/platform::microsoft
- id: minidump-admin-process-dump
  desc: Elevated MiniDump process dumping
  crit: suspicious
  conf: 0.95
  all:
  - id: minidump-write-dump
  - id: micro-behaviors/os/privilege/manifest::admin-manifest
  any:
  - id: lsass-memory-target
  - id: micro-behaviors/process/create/spawn::open-process
  unless:
  - id: metadata/signed/platform::microsoft
- id: lsass-memory-scrape-loader
  desc: LSASS scraping loader behavior
  crit: hostile
  conf: 0.99
  all:
  - id: lsass-memory-scrape
  any:
  - id: objectives/evasion/process/injection/hollowing::mstsc-ppid-loader
  - id: objectives/anti-static/obfuscation/payload/section::encrypted-loader-data-geometry
  - id: micro-behaviors/crypto/library/provider::capi-keyed-buffer-crypto-chain
