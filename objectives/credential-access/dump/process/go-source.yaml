# Windows process memory dumping primitives in Go source.
# MiniDumpWriteDump is the canonical credential-dumping API on Windows
# (T1003.001). When a Go file resolves it via kernel32/dbghelp NewLazyDLL +
# NewProc and combines it with PROCESS_ALL_ACCESS OpenProcess, that's a
# classic Go-based credential dumper pattern (emp3r0r, Nimplant, GoStealer,
# RustyNail-Go variants).
defaults:
  for: [go]
  platforms: [windows, unix]
  attack: T1003.001
  mbc: B0005
traits:
  - id: minidump-write-dump-go-source
    desc: MiniDumpWriteDump referenced in Go source
    crit: suspicious
    conf: 0.92
    if:
      type: text
      word: MiniDumpWriteDump
  - id: minidump-write-dump-go-proc-call
    desc: procMiniDumpWriteDump.Call invocation in Go
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      exact: procMiniDumpWriteDump.Call
  - id: minidump-full-memory-flag-go-source
    desc: "MiniDumpWithFullMemory flag constant in Go src"
    crit: component
    conf: 0.9
    if:
      type: text
      word: MiniDumpWithFullMemory
  - id: dbghelp-lazydll-go-source
    desc: "Dbghelp.dll loaded via syscall.NewLazyDLL Go"
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: NewLazyDLL\("[Dd]bghelp\.dll"\)
  - id: process-all-access-flag-go-source
    desc: PROCESS_ALL_ACCESS access mask in Go source
    crit: component
    conf: 0.85
    if:
      type: text
      word: PROCESS_ALL_ACCESS
composite_rules:
  - id: minidump-process-dumper-go
    desc: Go-source MiniDumpWriteDump process dumper
    crit: suspicious
    conf: 0.95
    all:
      - id: minidump-write-dump-go-source
    any:
      - id: minidump-write-dump-go-proc-call
      - id: minidump-full-memory-flag-go-source
      - id: dbghelp-lazydll-go-source
  - id: full-process-memory-dump-go
    desc: Go-source full process memory dump primitives
    crit: hostile
    conf: 0.97
    attack: T1003
    all:
      - id: minidump-process-dumper-go
      - id: micro-behaviors/mem/read/cross-process::read-process-memory-go-source
    any:
      - id: process-all-access-flag-go-source
      - id: minidump-write-dump-go-proc-call
      - id: micro-behaviors/mem/read/cross-process::read-process-memory-go-proc-call
