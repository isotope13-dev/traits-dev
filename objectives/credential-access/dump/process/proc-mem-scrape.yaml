# Process Memory/Environment Scraping via /proc
# Reads /proc/PID/maps+mem to dump process memory, or /proc/PID/environ
# to harvest environment variables. Used to extract secrets from CI runners.
# ATT&CK: T1003.007 (Proc Filesystem)
defaults:
  for: [python, shell, javascript]
  platforms: [linux, unix]
  attack: T1003.007
composite_rules:
  - id: proc-memory-cmdline-credential-dump
    desc: Walks /proc cmdline and dumps process memory
    crit: hostile
    conf: 0.96
    all:
      - id: proc-memory-credential-dump
      - id: objectives/command-and-control/backdoor/rat/recon::proc-fs-walk-cmdline
  - id: proc-environ-cmdline-harvest
    desc: Harvests both process environ and cmdline
    crit: hostile
    conf: 0.95
    all:
      - id: micro-behaviors/fs/proc/info/path::process-environ-targeting
      - id: micro-behaviors/fs/proc/info/path::proc-pid-cmdline-glob
  - id: proc-environ-exfil-c2
    desc: Harvests process environ and contacts HTTP C2
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/proc/info/path::process-environ-targeting
      - id: objectives/command-and-control/beacon/network/http::direct-http-c2-ip-url
  - id: proc-enumeration-memory-credential-dump
    desc: Enumerates Linux processes and dumps process memory
    crit: hostile
    conf: 0.95
    all:
      - id: proc-memory-credential-dump
      - id: micro-behaviors/fs/proc/info/listing::python-proc-enumerate
      - id: micro-behaviors/fs/proc/info/path::python-proc-path-join
  - id: proc-memory-credential-dump
    desc: Dumps process memory via /proc for credential theft
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/fs/proc/info/path::process-memory-dumper
      - id: micro-behaviors/fs/proc/info/path::process-pid-mem-any
    all:
      - id: micro-behaviors/fs/proc/info/path::process-arbitrary
    unless:
      # AI-agent observability tools read /proc to monitor agent processes;
      # security scanners reference these paths as signatures.
      - id: well-known/tool/detection/ai-guardrail/
  - id: proc-environ-harvest
    desc: Targets process environ with secret context
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/fs/proc/info/path::process-environ-targeting
    any:
      - id: objectives/credential-access/env/secrets/keywords/
      - id: objectives/credential-access/env/secrets/filtered-access/
      - id: objectives/credential-access/env/secrets/script::python-env-key
    unless:
      - id: well-known/tool/detection/ai-guardrail/
      - id: well-known/app/walinuxagent::source-tree
