# Process Memory/Environment Scraping via /proc
# Reads /proc/PID/maps+mem to dump process memory, or /proc/PID/environ
# to harvest environment variables. Used to extract secrets from CI runners.
# ATT&CK: T1003.007 (Proc Filesystem)
defaults:
  for: [python, shell]
  platforms: [linux, unix]
  attack: T1003.007
composite_rules:
  - id: proc-memory-cmdline-credential-dump
    desc: Walks /proc cmdline and dumps process memory
    crit: hostile
    conf: 0.96
    all:
      - id: proc-memory-credential-dump
      - id: objectives/command-and-control/backdoor/script::proc-fs-walk-cmdline
  - id: proc-enumeration-memory-credential-dump
    desc: Enumerates Linux processes and dumps process memory
    crit: hostile
    conf: 0.95
    all:
      - id: proc-memory-credential-dump
      - id: micro-behaviors/fs/proc/info::python-proc-enumerate
      - id: micro-behaviors/fs/proc/info::python-proc-path-join
  - id: proc-memory-credential-dump
    desc: Dumps process memory via /proc for credential theft
    crit: suspicious
    conf: 0.9
    any:
      - id: micro-behaviors/fs/proc/info::process-memory-dumper
      - id: micro-behaviors/fs/proc/info::process-pid-mem-any
    all:
      - id: micro-behaviors/fs/proc/info::process-arbitrary
  - id: proc-environ-harvest
    desc: Harvests process environment variables via /proc
    crit: suspicious
    conf: 0.88
    any:
      - id: micro-behaviors/fs/proc/info::process-pid-environ
      - id: micro-behaviors/fs/proc/info::process-var-environ
    all:
      - id: micro-behaviors/fs/proc/info::process-arbitrary
