defaults:
  platforms: [panos, appliance, windows]
  for: [csharp, pe]
  attack: T1003

traits:
  - id: csharp-panos-shadow-read
    desc: C# PAN-OS shadow read
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: File.ReadAllText("/etc/shadow")

  - id: csharp-panos-shadow-copy
    desc: C# PAN-OS shadow copy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: cat /etc/shadow > /tmp/.shadow_copy

composite_rules:
  - id: csharp-panos-shadow-dump
    desc: C# PAN-OS shadow dump
    crit: hostile
    conf: 0.98
    all:
      - id: csharp-panos-shadow-read
      - id: csharp-panos-shadow-copy
