defaults:
  attack: "T1555"
  mbc: "B0028"
  for: [c, cpp]
  platforms: [windows]
traits:
  - id: pstore-create-instance
    desc: Protected Storage COM factory
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '\b(fPStoreCreateInstance|PStoreCreateInstance)\b'
  - id: enum-pstorage
    desc: Protected Storage enumeration routine
    crit: suspicious
    conf: 0.96
    if:
      type: string_value
      exact: "EnumPStorage"
  - id: protected-storage-text
    desc: Protected Storage credential text
    crit: notable
    conf: 0.9
    if:
      type: string_value
      substr: "Protected Storage"
  - id: ipstore-interface
    desc: IPStore credential interface
    crit: notable
    conf: 0.9
    if:
      type: raw
      regex: '\bIPStore(Ptr)?\b'
composite_rules:
  - id: protected-storage-credential-theft
    desc: Windows Protected Storage credential theft
    crit: suspicious
    conf: 0.98
    needs: 2
    any:
      - id: pstore-create-instance
      - id: enum-pstorage
      - id: protected-storage-text
      - id: ipstore-interface
