defaults:
  attack: T1555
  mbc: B0028
  for:
  - pe
  - dll
  - c
  - cpp
  platforms:
  - windows
traits:
- id: enum-pstorage
  desc: Protected Storage enumeration routine
  crit: suspicious
  conf: 0.96
  if:
    type: string_literal
    exact: EnumPStorage
- id: protected-storage-text
  desc: Protected Storage credential text
  crit: suspicious
  conf: 0.9
  if:
    type: string_literal
    substr: Protected Storage
- id: ipstore-interface
  desc: IPStore credential interface
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \bIPStore(Ptr)?\b
  unless:
  - id: metadata/lang/source/
  - id: well-known/lib/wine/
  - id: metadata/file/string/file::wine-include-source-path
- id: pstore-create-instance--fpstorecreateinstance
  desc: Protected Storage COM (fPStoreCreateInstance)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: fPStoreCreateInstance
- id: pstore-create-instance--pstorecreateinstance
  desc: Protected Storage COM (PStoreCreateInstance)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: PStoreCreateInstance
  unless:
  - id: well-known/lib/wine/
  - id: metadata/file/string/file::wine-include-source-path
- id: cached-password-enumeration-marker
  desc: Cached password enumeration marker
  crit: suspicious
  conf: 0.96
  for:
  - pe
  - dll
  if:
    type: text
    word: WNetEnumCachedPasswords
- id: ie-password-autocomplete-marker
  desc: Internet Explorer saved-password marker
  crit: suspicious
  conf: 0.94
  for:
  - pe
  - dll
  if:
    type: text
    exact: FormSuggest Passwords
composite_rules:
- id: pstore-create-instance
  desc: Protected Storage COM factory
  crit: suspicious
  conf: 0.95
  unless:
  - id: metadata/binary/vendor/
  - id: well-known/tool/sysadmin/sandboxie/
  - id: metadata/lang/source/
  any:
  - id: pstore-create-instance--fpstorecreateinstance
  - id: pstore-create-instance--pstorecreateinstance
- id: protected-storage-credential-theft
  desc: Windows Protected Storage credential theft
  crit: suspicious
  conf: 0.98
  needs: 2
  any:
  - id: pstore-create-instance
  - id: enum-pstorage
  - id: protected-storage-text
  - id: ipstore-interface
  unless:
  - id: well-known/tool/sysadmin/sandboxie/
  - id: metadata/lang/source/
  - id: well-known/lib/wine/
- id: legacy-ie-protected-storage-stealer
  desc: Legacy IE Protected Storage credential theft
  crit: hostile
  conf: 0.99
  attack: T1555.003,T1003
  for:
  - pe
  - dll
  all:
  - id: pstore-create-instance--pstorecreateinstance
  - id: cached-password-enumeration-marker
  - id: ie-password-autocomplete-marker
  unless:
  - id: well-known/lib/wine/
