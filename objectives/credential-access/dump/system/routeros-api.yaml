defaults:
  platforms: [routeros, appliance]
  for: [python, pyc]
  attack: T1003

traits:
  - id: routeros-api-user-print
    desc: RouterOS API user print
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])/user(/print)?($|[^A-Za-z0-9_-])'

  - id: routeros-api-key-generate
    desc: RouterOS API key generate
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /user/apikey/generate

  - id: routeros-api-sensitive-flag
    desc: RouterOS API sensitive-output flag
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: show-sensitive

composite_rules:
  - id: routeros-api-user-credential-dump
    desc: RouterOS API user credential dump
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-api-user-print
      - id: routeros-api-sensitive-flag

  - id: routeros-api-key-credential-dump
    desc: RouterOS API key credential dump
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-api-key-generate
      - id: routeros-api-sensitive-flag
