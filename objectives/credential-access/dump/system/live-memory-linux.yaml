# Linux live-memory credential dumping
# Detects tools that read other processes via procfs, mine auth-memory markers,
# and validate candidate passwords against shadow hashes.
defaults:
  for: [elf]
  platforms: [linux, unix]
composite_rules:
  - id: live-auth-memory-credential-dump
    desc: Live auth memory credential dump
    crit: hostile
    conf: 0.96
    attack: "T1003"
    mbc: "E1003"
    all:
      - id: objectives/credential-access/dump/system::crypt-password-verify
      - id: micro-behaviors/fs/proc/info/memory::procfs-live-memory-paths
    any:
      - id: micro-behaviors/fs/proc/info/auth-memory/
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/config/groups::etc-gshadow
