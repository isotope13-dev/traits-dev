defaults:
  platforms: [routeros, appliance]
  for: [java, kotlin]
  attack: T1552.001

traits:
  - id: routeros-jvm-mikrotik-backup-path
    desc: RouterOS JVM backup path
    crit: suspicious
    conf: 0.93
    if:
      type: string_literal
      regex: '^/(var|opt|etc)/mikrotik/backup\.rsc$'

  - id: routeros-jvm-hidden-backup-path
    desc: RouterOS JVM hidden backup path
    crit: suspicious
    conf: 0.93
    if:
      type: string_literal
      regex: '^/(home/|root/)?\.mikrotik/backup\.rsc$'

  - id: routeros-jvm-config-script-path
    desc: RouterOS JVM config script path
    crit: suspicious
    conf: 0.92
    if:
      type: string_literal
      substr: /.config/scripts/

  - id: routeros-jvm-backups-dir-path
    desc: RouterOS JVM backups dir path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /var/mikrotik/backups/backup.rsc

  - id: routeros-jvm-config-backup-path
    desc: RouterOS JVM config backup path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /.config/backup.rsc

  - id: routeros-jvm-password-filter
    desc: RouterOS JVM password filter
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'contains\("password"\)[\s\S]{0,100}contains\("passphrase"\)'

composite_rules:
  - id: routeros-jvm-config-credential-harvest
    desc: RouterOS JVM config cred harvest
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-jvm-password-filter
    any:
      - id: routeros-jvm-mikrotik-backup-path
      - id: routeros-jvm-hidden-backup-path
      - id: routeros-jvm-config-script-path
      - id: routeros-jvm-backups-dir-path
      - id: routeros-jvm-config-backup-path
    needs: 1
