defaults:
  platforms: [unix]
  for: [elf]
# Credential Dumping - Unix
# MBC: E1003 (OS Credential Dumping)
# ATT&CK: T1003 (OS Credential Dumping)
#
# NOTE: Basic user lookup functions (getpwnam, getpwuid) are defined in
# objectives/discovery/user/traits.yaml as they're legitimate user discovery.
# This file focuses on actual credential/shadow file access.
traits:
  # getpwnam/getpwuid removed - they're legitimate user lookup functions
  # used by countless system utilities. See objectives/discovery/user/traits.yaml.
- id: getspnam
  desc: Read shadow password file (getspnam)
  crit: notable
  conf: 0.8
  mbc: "E1003.008"
  attack: "T1003.008"
  if:
    type: import
    regex: "getspnam"
- id: crypt-password-verify
  desc: Unix password hash verification
  crit: component
  conf: 0.72
  if:
    type: symbol
    exact: "crypt"
- id: account-tool-basename-core--passwd
  desc: Unix account tool basename (passwd)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: passwd
- id: account-tool-basename-core--usermod
  desc: Unix account tool basename (usermod)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: usermod
- id: account-tool-basename-core--useradd
  desc: Unix account tool basename (useradd)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: useradd
- id: account-tool-basename-core--userdel
  desc: Unix account tool basename (userdel)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: userdel
- id: account-tool-basename-core--chpasswd
  desc: Unix account tool basename (chpasswd)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: chpasswd
- id: account-tool-basename-core--chage
  desc: Unix account tool basename (chage)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: chage
- id: account-tool-basename-shadow--vipw
  desc: Unix shadow tool basename (vipw)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: vipw
- id: account-tool-basename-shadow--vigr
  desc: Unix shadow tool basename (vigr)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: vigr
- id: account-tool-basename-shadow--newusers
  desc: Unix shadow tool basename (newusers)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: newusers
- id: account-tool-basename-shadow--gpasswd
  desc: Unix shadow tool basename (gpasswd)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: gpasswd
- id: account-tool-basename-shadow--groupmod
  desc: Unix shadow tool basename (groupmod)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: groupmod
- id: account-tool-basename-shadow--groupadd
  desc: Unix shadow tool basename (groupadd)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: groupadd
- id: account-tool-basename-check--groupdel
  desc: Unix account check basename (groupdel)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: groupdel
- id: account-tool-basename-check--pwck
  desc: Unix account check basename (pwck)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: pwck
- id: account-tool-basename-check--grpck
  desc: Unix account check basename (grpck)
  crit: baseline
  conf: 0.95
  if:
    type: basename
    exact: grpck
- id: account-tool-basename-check--pwconv
