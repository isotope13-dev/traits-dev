composite_rules:
  # NOTE: For ELF binaries, shadow file access is common in system utilities
  # Real credential dumping detection requires additional context
  # shadow file composite
- id: account-tool-basename-core
  desc: Unix account tool basename
  crit: baseline
  conf: 0.95
  any:
  - id: account-tool-basename-core--passwd
  - id: account-tool-basename-core--usermod
  - id: account-tool-basename-core--useradd
  - id: account-tool-basename-core--userdel
  - id: account-tool-basename-core--chpasswd
  - id: account-tool-basename-core--chage
- id: account-tool-basename-shadow
  desc: Unix shadow tool basename
  crit: baseline
  conf: 0.95
  any:
  - id: account-tool-basename-shadow--vipw
  - id: account-tool-basename-shadow--vigr
  - id: account-tool-basename-shadow--newusers
  - id: account-tool-basename-shadow--gpasswd
  - id: account-tool-basename-shadow--groupmod
  - id: account-tool-basename-shadow--groupadd
- id: account-tool-basename-check
  desc: Unix account check basename
  crit: baseline
  conf: 0.95
  any:
  - id: account-tool-basename-check--groupdel
  - id: account-tool-basename-check--pwck
  - id: account-tool-basename-check--grpck
  - id: account-tool-basename-check--pwconv
  - id: account-tool-basename-check--grpconv
  - id: account-tool-basename-check--pwunconv
- id: account-tool-basename-convert
  desc: Unix account convert basename
  crit: baseline
  conf: 0.95
  any:
  - id: account-tool-basename-convert--grpunconv
  - id: account-tool-basename-convert--chgpasswd
- id: shadow-file
  desc: Access to system shadow password
  crit: suspicious
  conf: 0.9
  attack: "T1003.008"
  any:
  - id: micro-behaviors/os/privilege/paths::etc-shadow
  - id: micro-behaviors/fs/path/config/groups::etc-gshadow
- id: unix-account-management-tool
  desc: Unix account management tool
  crit: baseline
  conf: 0.97
  any:
  - id: account-tool-basename-core
  - id: account-tool-basename-shadow
  - id: account-tool-basename-check
  - id: account-tool-basename-convert
- id: shadow-extraction
  desc: Shadow file credential extraction
  crit: suspicious
  conf: 0.9
  attack: "T1003.008"
  mbc: "E1003.008"
  all:
  - id: getspnam
  - id: shadow-file
  unless:
      # Canonical account-management utilities (shadow-utils / passwd pkg)
      # legitimately import getspnam and write /etc/shadow & /etc/gshadow.
  - id: unix-account-management-tool
  downgrade:
    any:
    - id: objectives/command-and-control/botnet/iot::busybox
- id: procfs-shadow-credential-dump
  desc: Procfs shadow credential dumping
  crit: hostile
  conf: 0.95
  attack: "T1003.007"
  mbc: "E1003"
  all:
  - id: shadow-file
  - id: micro-behaviors/fs/proc/info/path::process-memory-dumper
  - id: micro-behaviors/fs/proc/info/path::process-cmdline-targeting
  - id: crypt-password-verify
