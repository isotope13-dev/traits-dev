defaults:
  platforms: [unix]
  for: [elf]
# Credential Dumping - Unix
# MBC: E1003 (OS Credential Dumping)
# ATT&CK: T1003 (OS Credential Dumping)
#
# NOTE: Basic user lookup functions (getpwnam, getpwuid) are defined in
# objectives/discovery/user/traits.yaml as they're legitimate user discovery.
# This file focuses on actual credential/shadow file access.
traits:
  # getpwnam/getpwuid removed - they're legitimate user lookup functions
  # used by countless system utilities. See objectives/discovery/user/traits.yaml.
  - id: getspnam
    desc: Read shadow password file (getspnam)
    crit: notable
    conf: 0.8
    mbc: "E1003.008"
    attack: "T1003.008"
    if:
      type: import
      regex: "getspnam"
  - id: crypt-password-verify
    desc: Unix password hash verification
    crit: component
    conf: 0.72
    if:
      type: symbol
      exact: "crypt"
  - id: account-tool-basename-core
    desc: Unix account tool basename
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: '^(passwd|usermod|useradd|userdel|chpasswd|chage)$'
  - id: account-tool-basename-shadow
    desc: Unix shadow tool basename
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: '^(vipw|vigr|newusers|gpasswd|groupmod|groupadd)$'
  - id: account-tool-basename-check
    desc: Unix account check basename
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: '^(groupdel|pwck|grpck|pwconv|grpconv|pwunconv)$'
  - id: account-tool-basename-convert
    desc: Unix account convert basename
    crit: baseline
    conf: 0.95
    if:
      type: basename
      regex: '^(grpunconv|chgpasswd)$'
composite_rules:
  # NOTE: For ELF binaries, shadow file access is common in system utilities
  # Real credential dumping detection requires additional context
  # shadow file composite
  - id: shadow-file
    desc: Access to system shadow password
    crit: suspicious
    conf: 0.9
    attack: "T1003.008"
    any:
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/config/groups::etc-gshadow
  - id: unix-account-management-tool
    desc: Unix account management tool
    crit: baseline
    conf: 0.97
    any:
      - id: account-tool-basename-core
      - id: account-tool-basename-shadow
      - id: account-tool-basename-check
      - id: account-tool-basename-convert
  - id: shadow-extraction
    desc: Shadow file credential extraction
    crit: suspicious
    conf: 0.9
    attack: "T1003.008"
    mbc: "E1003.008"
    all:
      - id: getspnam
      - id: shadow-file
    unless:
      # Canonical account-management utilities (shadow-utils / passwd pkg)
      # legitimately import getspnam and write /etc/shadow & /etc/gshadow.
      - id: unix-account-management-tool
    downgrade:
      any:
        - id: objectives/command-and-control/botnet/iot::busybox
  - id: procfs-shadow-credential-dump
    desc: Procfs shadow credential dumping
    crit: hostile
    conf: 0.95
    attack: "T1003.007"
    mbc: "E1003"
    all:
      - id: shadow-file
      - id: micro-behaviors/fs/proc/info/path::process-memory-dumper
      - id: micro-behaviors/fs/proc/info/path::process-cmdline-targeting
      - id: crypt-password-verify
