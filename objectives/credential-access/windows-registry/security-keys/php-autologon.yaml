defaults:
  platforms: [windows]
  for: [php]
  attack: T1552.002

traits:
  - id: php-winlogon-registry-path
    desc: PHP Winlogon registry path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon'
  - id: php-default-password-value
    desc: PHP Winlogon DefaultPassword query
    crit: suspicious
    conf: 0.94
    if:
      type: literal
      kind: string
      exact: DefaultPassword
  - id: php-cmdkey-list
    desc: PHP cmdkey credential listing
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: cmdkey /list

composite_rules:
  - id: php-autologon-credential-query
    desc: PHP AutoLogon credential query
    crit: hostile
    conf: 0.97
    all:
      - id: php-winlogon-registry-path
      - id: php-default-password-value
