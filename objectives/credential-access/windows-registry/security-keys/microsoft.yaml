defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  size_min: 1000
  size_max: 10000000
composite_rules:
  - id: microsoft-security-key-access
    desc: Accesses Microsoft security keys in the registry
    crit: suspicious
    conf: 0.8
    all:
      - id: microsoft-security-key-access-string
    downgrade:
      any:
        - id: metadata/signed/platform::microsoft
traits:
  - id: microsoft-security-key-access-string
    desc: Microsoft security key access string
    crit: component
    if:
      type: string_value
      substr: Software\\Microsoft\\Security
      section: .rsrc
