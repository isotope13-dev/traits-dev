defaults:
  for:
  - pe
  - dll
  platforms:
  - windows
  size_min: 1000
  size_max: 10000000
composite_rules: []
traits:
- id: microsoft-security-key-access
  desc: "Accesses MS security keys in the registry"
  crit: suspicious
  if:
    type: text
    substr: Software\\Microsoft\\Security
    section: .rsrc
  conf: 0.8
  downgrade:
    any:
    - id: metadata/signed/platform::microsoft
