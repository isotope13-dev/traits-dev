defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1552.002
  mbc: B0028

traits:
  - id: ps-lsa-secrets-registry-path
    desc: PowerShell LSA secrets registry path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'HKLM:\SECURITY\Policy\Secrets'

  - id: ps-lsa-get-childitem
    desc: PowerShell enumerates LSA secrets
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Get-ChildItem\s+\$lsaPath'

  - id: ps-winlogon-secret-values
    desc: PowerShell Winlogon secret values
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'DefaultPassword.{0,80}DefaultUserName'

composite_rules:
  - id: ps-lsa-secrets-registry-access
    desc: PowerShell LSA secrets access
    crit: suspicious
    conf: 0.95
    all:
      - id: ps-lsa-secrets-registry-path
      - id: ps-lsa-get-childitem

  - id: ps-winlogon-autologon-secrets
    desc: PowerShell Winlogon secrets access
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/os/registry/keys::winlogon-registry-path
      - id: ps-winlogon-secret-values
