defaults:
  platforms: [windows]
  for: [scripts, binaries]
  attack: T1003.002

traits:
  - id: reg-save-sam-hive
    desc: Saves Windows SAM registry hive
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)\breg(\.exe)?\s+save\s+HKLM\\SAM\b'
  - id: reg-save-system-hive
    desc: Saves Windows SYSTEM registry hive
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)\breg(\.exe)?\s+save\s+HKLM\\SYSTEM\b'
  - id: reg-save-security-hive
    desc: Saves Windows SECURITY registry hive
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)\breg(\.exe)?\s+save\s+HKLM\\SECURITY\b'
  - id: windows-temp-sam-hive-staging
    desc: Stages SAM hive in Temp
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)C:\\Windows\\Temp\\SAM(\.save|\.hiv|\.bak)?\b'
  - id: windows-temp-system-hive-staging
    desc: Stages SYSTEM hive in Temp
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)C:\\Windows\\Temp\\SYSTEM(\.save|\.hiv|\.bak)?\b'
  - id: windows-temp-security-hive-staging
    desc: Stages SECURITY hive in Temp
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)C:\\Windows\\Temp\\SECURITY(\.save|\.hiv|\.bak)?\b'

composite_rules:
  - id: sam-system-hive-extraction
    desc: SAM and SYSTEM hive extraction
    crit: hostile
    conf: 0.99
    all:
      - id: reg-save-sam-hive
      - id: reg-save-system-hive
    any:
      - id: windows-temp-sam-hive-staging
      - id: windows-temp-system-hive-staging
      - id: windows-temp-security-hive-staging
      - id: objectives/command-and-control/backdoor/webshell/request::aspnet-request-command-webshell
  - id: sam-system-security-hive-dump
    desc: SAM SYSTEM SECURITY hive dump
    crit: hostile
    conf: 0.99
    all:
      - id: reg-save-sam-hive
      - id: reg-save-system-hive
      - id: reg-save-security-hive
