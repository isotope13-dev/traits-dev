defaults:
  platforms: [windows, unix]
  for: [c, php]
  attack: T1005

traits:
  - id: magstripe-luhn-pan-validator-source
    desc: Magnetic-stripe PAN Luhn validator
    crit: suspicious
    conf: 0.94
    for: [c]
    if:
      type: text
      regex: 'getValidPANLength[\s\S]{0,260}checkDigit[\s\S]{0,260}sum\s*\*\s*9'

  - id: magstripe-track1-track2-parser-source
    desc: Magnetic-stripe track parser
    crit: suspicious
    conf: 0.95
    for: [c]
    if:
      type: text
      regex: 'getValidTrack1Length[\s\S]{0,900}getValidTrack2Length'

  - id: process-memory-track-finder-source
    desc: Process memory card-track finder
    crit: suspicious
    conf: 0.98
    for: [c]
    if:
      type: text
      regex: 'ReadProcessMemory[\s\S]{0,260}findTracks'

  - id: virtualquery-process-memory-card-sweep
    desc: VirtualQueryEx card memory sweep
    crit: suspicious
    conf: 0.97
    for: [c]
    if:
      type: text
      regex: 'VirtualQueryEx[\s\S]{0,260}MEM_COMMIT[\s\S]{0,260}scanProcMemoryRegion'

  - id: toolhelp-process-vmread-scanner
    desc: Toolhelp process VM_READ scanner
    crit: suspicious
    conf: 0.94
    for: [c]
    if:
      type: text
      regex: 'CreateToolhelp32Snapshot\(TH32CS_SNAPPROCESS[\s\S]{0,900}OpenProcess\(PROCESS_VM_READ'

  - id: encrypted-card-track-http-report
    desc: Encrypted card-track HTTP report
    crit: suspicious
    conf: 0.98
    for: [c]
    if:
      type: text
      regex: 'rc4\(.{0,80}trackArr[\s\S]{0,260}trackArrLength'

  - id: card-track-report-buffer-source
    desc: Card-track report buffer source
    crit: suspicious
    conf: 0.94
    for: [c]
    if:
      type: text
      regex: 'dumpsHolder \*tracksArr;[\s\S]{0,220}recordTrack'

  - id: card-track-report-encrypt-source
    desc: Card-track report encryption source
    crit: suspicious
    conf: 0.96
    for: [c]
    if:
      type: text
      regex: 'pirateCodeEncrypt[\s\S]{0,160}rc4Encrypted = rc4'

  - id: card-track-report-post-param
    desc: Card-track report POST parameter
    crit: suspicious
    conf: 0.96
    for: [c]
    if:
      type: text
      substr: 'combineStackArrs(POSTData, "report=", 7, rc4Encrypted'

  - id: php-card-track-report-decrypt
    desc: PHP card-track report decryptor
    crit: suspicious
    conf: 0.98
    for: [php]
    if:
      type: text
      regex: 'pirateCodeDecrypt[\s\S]{0,160}rc4\(.{0,80}\$_POST\["report"\]'

  - id: php-card-track-db-insert
    desc: PHP card-track database insert
    crit: suspicious
    conf: 0.98
    for: [php]
    if:
      type: text
      regex: 'INSERT INTO tracks \(track, type, exePath, PID, botID'

  - id: php-card-track-db-schema
    desc: PHP card-track database schema
    crit: suspicious
    conf: 0.94
    for: [php]
    if:
      type: text
      regex: 'CREATE TABLE IF NOT EXISTS `tracks`[\s\S]{0,260}`track` varchar'

composite_rules:
  - id: process-memory-card-track-scraper-source
    desc: Process memory card-track scraper
    crit: hostile
    conf: 0.99
    all:
      - id: magstripe-track1-track2-parser-source
      - id: process-memory-track-finder-source
      - id: virtualquery-process-memory-card-sweep
    any:
      - id: magstripe-luhn-pan-validator-source
      - id: toolhelp-process-vmread-scanner

  - id: encrypted-card-track-exfil-source
    desc: Encrypted card-track report exfiltration
    crit: hostile
    conf: 0.99
    all:
      - id: card-track-report-buffer-source
      - id: card-track-report-encrypt-source
      - id: card-track-report-post-param

  - id: process-memory-card-track-scanner-source
    desc: Process memory card-track scanner
    crit: hostile
    conf: 0.99
    all:
      - id: process-memory-track-finder-source
      - id: virtualquery-process-memory-card-sweep
      - id: toolhelp-process-vmread-scanner

  - id: php-card-track-collection-gate
    desc: PHP card-track collection gate
    crit: hostile
    conf: 0.99
    all:
      - id: php-card-track-report-decrypt
      - id: php-card-track-db-insert
