defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: emergency-buffer
    desc: Financial decoy keyword 'emergency buffer'
    crit: notable
    if:
      type: text
      substr: emergency buffer
      case_insensitive: true
  - id: budget-overruns
    desc: Financial decoy keyword 'budget overruns'
    crit: notable
    if:
      type: text
      substr: budget overruns
      case_insensitive: true
    unless:
      - id: metadata/package/manifest/compat::virtualbox-platform-component
      - id: well-known/tool/detection/llm-scanner::llm-scanner-context
    not:
      - regex: (?i)\bbudget overruns and allocation errors\b
      - regex: (?i)attested manifest\) and budget overruns fire once
  - id: freelancer-negotiation
    desc: 'freelancer negotiation'
    crit: notable
    if:
      type: text
      substr: FreelancerNegotiationEngine
  - id: expense-breakdown
    desc: Financial decoy keyword 'EXPENSE BREAKDOWN'
    crit: notable
    if:
      type: text
      substr: EXPENSE BREAKDOWN
  - id: submit-proposal
    desc: Financial decoy phrase 'Submit Proposal'
    crit: notable
    if:
      type: text
      regex: '\bSubmit\s+Proposal\b'
  - id: bargainingplat
    desc: Financial decoy namespace 'BargainingPlat'
    crit: notable
    if:
      type: text
      substr: BargainingPlat
  - id: forecast-start-picker
    desc: Financial forecast date picker control
    crit: notable
    if:
      type: text
      substr: DateTimePickerForecastStart
  - id: forecast-summary-group
    desc: Financial forecast summary control
    crit: notable
    if:
      type: text
      substr: GroupBoxForecastSummary
  - id: ai-analysis-tab
    desc: Financial AI analysis tab control
    crit: notable
    if:
      type: text
      substr: TabPageAIAnalysis
  - id: generate-forecast-button
    desc: Financial forecast action control
    crit: notable
    if:
      type: text
      substr: ButtonGenerateForecast
  - id: bankofchina-token
    desc: Bank of China text token
    crit: notable
    conf: 0.86
    if:
      type: text
      regex: '(?i)\bBank(of)?China\b'
  - id: hdfc-bank-token
    desc: HDFC Bank text token
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: HDFC Bank
      case_insensitive: true
    unless:
      - id: metadata/library/data::public-suffix-list-content
      - id: metadata/file/format::sourcemap-sources-content
  - id: bank-info-token
    desc: Bank info text token
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: '(?i)\bH?Bank_Info\b'
  - id: bankofchina-export-symbol
    desc: Bank of China export symbol
    crit: notable
    conf: 0.84
    for: [pe, dll]
    if:
      type: export
      regex: '(?i)^Bank(of)?China'
  - id: unionpay-export-symbol
    desc: UnionPay export symbol
    crit: notable
    conf: 0.84
    for: [pe, dll]
    if:
      type: export
      regex: '(?i)UnionPay'
  - id: bank-routine-export-symbol
    desc: Bank routine export symbol
    crit: notable
    conf: 0.78
    for: [pe, dll]
    if:
      type: export
      regex: '(?i)(^|_)Bank(_|$|Info)'
composite_rules:
  - id: finance-decoy-cluster
    desc: Financial decoy theme cluster
    crit: notable
    conf: 0.95
    needs: 3
    any:
      - id: emergency-buffer
      - id: budget-overruns
      - id: freelancer-negotiation
      - id: expense-breakdown
      - id: submit-proposal
  - id: finance-ui-decoy-cluster
    desc: Financial decoy UI scaffold cluster
    crit: notable
    conf: 0.97
    needs: 3
    any:
      - id: bargainingplat
      - id: forecast-start-picker
      - id: forecast-summary-group
      - id: ai-analysis-tab
      - id: generate-forecast-button
  - id: finance-decoy-rich-cluster
    desc: Financial decoy theme with UI
    crit: suspicious
    conf: 0.98
    all:
      - id: finance-decoy-cluster
      - id: finance-ui-decoy-cluster
