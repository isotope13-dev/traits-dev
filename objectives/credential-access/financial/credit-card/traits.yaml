defaults:
  platforms: [windows, unix]
  for:
    - python
    - javascript
    - php
    - html
  attack: T1005
  mbc: B0030
traits:
  - id: luhn-algorithm
    desc: Luhn algorithm implementation
    crit: notable
    conf: 0.85
    if:
      type: text
      word: luhn
      case_insensitive: false
    unless:
      - id: metadata/file/text::uproc-tools-catalog
  - id: mod10-check
    desc: Modulo 10 check (Luhn)
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)\bmod[_\-\s]?10\b
  - id: checksum-digit
    desc: Checksum digit validation
    crit: baseline
    conf: 0.6
    if:
      type: text
      regex: (?i)check.?sum.?digit
  - id: visa-detection
    desc: Visa card detection
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type).{0,20}visa\b
    downgrade:
      any:
        - id: metadata/package/testing/presence::faker-word
    unless:
      - id: metadata/file/text::uproc-tools-catalog
  - id: mastercard-detection
    desc: Mastercard detection
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type).{0,20}(master|mastercard)\b
    downgrade:
      any:
        - id: metadata/package/testing/presence::faker-word
    unless:
      - id: metadata/file/text::uproc-tools-catalog
  - id: mastercard-brand
    desc: Mastercard brand reference
    crit: component
    conf: 0.4
    if:
      type: text
      word: mastercard
  - id: amex-detection
    desc: American Express detection
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type).{0,20}(amex|american.?express)\b
    downgrade:
      any:
        - id: metadata/package/testing/presence::faker-word
  - id: discover-detection
    desc: Discover card detection
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type).{0,20}discover\b
    downgrade:
      any:
        - id: metadata/package/testing/presence::faker-word
  - id: cc-regex-16digit
    desc: 16-digit card number regex
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \[0-9\]\{16\}
  - id: visa-bin
    desc: Visa BIN range (starts with 4)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: startsWith.{0,20}"4"
  - id: mastercard-bin
    desc: Mastercard BIN range (51-55, 2221-2720)
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type|master.?card|bin).{0,60}starts(?:With)?[^A-Za-z0-9]{0,20}["'']?(5[1-5]|2[2-7])
  - id: cvv-field
    desc: CVV/CVC field reference
    crit: component
    conf: 0.7
    if:
      type: text
      regex: (?i)\b(cvv|cvc|cv2)\b
    unless:
      - id: metadata/package::n8n-stripe-card-token-description
      - id: metadata/package::has-tests
      - type: text
        substr: ").registerCommand("
      - type: metrics
        field: text.non_ascii_ratio
        min: 0.8
  - id: expiry-field
    desc: Card expiry field reference
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (?i)\b(exp_month|exp_year|exp_date)\b
  - id: expiry-field-ru
    desc: Card expiry field reference (Russian)
    crit: component
    conf: 0.6
    if:
      type: text
      regex: "Срок\\s+действия"
  - id: expiry-field-short
    desc: Short card expiry field reference
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (?i)\b(card_exp|mm/yy)\b
  - id: card-number-field
    desc: Credit card number field reference
    crit: component
    conf: 0.5
    if:
      type: text
      regex: (?i)\b(card.?number|cc.?num)\b
    unless:
      - id: metadata/file/text::uproc-tools-catalog
      - id: metadata/package::n8n-stripe-card-token-description
  - id: card-number-field-ru
    desc: Credit card number field reference (Russian)
    crit: component
    conf: 0.5
    if:
      type: text
      regex: "Номер\\s+карты"
  - id: credit-card-form-capture
    desc: Credit card form capture path
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?is)\b(cvv|cvc|card.?number|cc.?num|card_exp|mm/yy|expiry|expiration)\b.{0,500}(\bfetch\s*\(|\bXMLHttpRequest\b|\bFormData\b|method\s*[:=]\s*['"]?POST|<form[^>]{0,300}\baction\s*=|\$_POST\b|php://input|axios\.post|http\.post|\.post\()|(\bfetch\s*\(|\bXMLHttpRequest\b|\bFormData\b|method\s*[:=]\s*['"]?POST|<form[^>]{0,300}\baction\s*=|\$_POST\b|php://input|axios\.post|http\.post|\.post\().{0,500}\b(cvv|cvc|card.?number|cc.?num|card_exp|mm/yy|expiry|expiration)\b
  - id: autofill-db
    desc: Chromium autofill table names
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: \bautofill_profiles?\b
  - id: storybook-story-file
    desc: Storybook story file
    crit: baseline
    conf: 0.9
    if:
      type: basename
      regex: '(?i)\.stories\.[jt]sx?$'
  - id: fake-stripe-checkout-demo
    desc: Fake Stripe Checkout demo text
    crit: baseline
    conf: 0.9
    if:
      type: text
      substr: "Fake Stripe Checkout"
composite_rules:
  - id: card-type-detection
    desc: Credit card type detection
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: visa-detection
      - id: mastercard-detection
      - id: amex-detection
      - id: discover-detection
    downgrade:
      any:
        - id: metadata/package/testing/presence::faker-word
    unless:
      - id: metadata/file/text::uproc-tools-catalog
  - id: mod10-regex-combo
    desc: Mod10 check with card regex
    all:
      - id: mod10-check
      - id: cc-regex-16digit
  - id: card-validation
    desc: Credit card validation logic
    crit: suspicious
    conf: 0.9
    any:
      - id: luhn-algorithm
      - id: mod10-regex-combo
  - id: credit-card-stealer
    desc: Credit card data stealer
    crit: hostile
    conf: 0.95
    all:
      - id: card-type-detection
      - id: cvv-field
    unless:
      - id: metadata/package/testing/presence::faker-word
  - id: credit-card-form-fields
    desc: Credit card form fields collection
    crit: suspicious
    conf: 0.9
    all:
      - id: cvv-field
      - id: credit-card-form-capture
    any:
      - id: expiry-field
      - id: expiry-field-ru
      - id: expiry-field-short
      - id: card-number-field
      - id: card-number-field-ru
      - id: luhn-algorithm
      - id: mastercard-brand
    unless:
      - id: metadata/package::n8n-stripe-card-token-description
      - id: metadata/package::has-tests
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-filename-pattern
      - id: storybook-story-file
      - id: fake-stripe-checkout-demo
    downgrade:
      any:
        - id: metadata/package/testing/presence::faker-word
