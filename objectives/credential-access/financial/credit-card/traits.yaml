defaults:
  platforms: [windows, unix]
  for:
  - python
  - javascript
  - php
  - html
  attack: T1005
  mbc: B0030
traits:
- id: luhn-algorithm
  desc: Luhn algorithm implementation
  crit: suspicious
  conf: 0.85
  if:
    type: text
    word: luhn
    case_insensitive: false
  unless:
  - id: metadata/file/text/catalog::uproc-tools-catalog
  - id: objectives/supply-chain/trojanized/app/context::zxcvbn-password-strength-library
- id: mod10-check
  desc: Modulo 10 check (Luhn)
  crit: component
  conf: 0.7
  if:
    type: text
    regex: (?i)\bmod[_\-\s]?10\b
- id: checksum-digit
  desc: Checksum digit validation
  crit: baseline
  conf: 0.6
  if:
    type: text
    regex: (?i)check.?sum.?digit
- id: visa-detection
  desc: Visa card detection
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type).{0,20}visa\b
  downgrade:
    any:
    - id: metadata/package/testing/presence/scripted::faker-word
  unless:
  - id: metadata/file/text/catalog::uproc-tools-catalog
  - id: metadata/lang/scripted::dts-declaration-file
- id: mastercard-detection
  desc: Mastercard detection
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type).{0,20}(master|mastercard)\b
  downgrade:
    any:
    - id: metadata/package/testing/presence/scripted::faker-word
  unless:
  - id: metadata/file/text/catalog::uproc-tools-catalog
- id: mastercard-brand
  desc: Mastercard brand reference
  crit: component
  conf: 0.4
  if:
    type: text
    word: mastercard
- id: amex-detection
  desc: American Express detection
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type).{0,20}(amex|american.?express)\b
  downgrade:
    any:
    - id: metadata/package/testing/presence/scripted::faker-word
- id: discover-detection
  desc: Discover card detection
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (?i)(card.?type|credit.?card\b|cc[_\-\s]?type).{0,20}discover\b
  downgrade:
    any:
    - id: metadata/package/testing/presence/scripted::faker-word
- id: cc-regex-16digit
  desc: 16-digit card number regex
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: '[0-9]{16}'
  downgrade:
    any:
    - id: metadata/library/structure::js-large-module-bundle
    - id: metadata/package/testing/presence/scripted::faker-word
- id: visa-bin
  desc: Visa BIN range (starts with 4)
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: startsWith.{0,20}"4"
- id: mastercard-bin--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    substr: credit
    case_insensitive: true
  count_max: 1014410
- id: mastercard-bin--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.75
  if:
    type: text
    substr: master
    case_insensitive: true
  count_max: 1014411
- id: mastercard-bin--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.75
