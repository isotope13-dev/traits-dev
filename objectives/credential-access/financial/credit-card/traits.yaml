  count_max: 1014414
- id: cvv-field
  desc: CVV/CVC field reference
  crit: component
  conf: 0.7
  if:
    type: text
    regex: (?i)\b(cvv|cvc|cv2)\b
  unless:
  - id: metadata/package/quality::n8n-stripe-card-token-description
  - id: metadata/package/quality::has-tests
  - type: text
    substr: ").registerCommand("
  - type: metrics
    field: text.non_ascii_ratio
    min: 0.8
- id: expiry-field
  desc: Card expiry field reference
  crit: component
  conf: 0.6
  if:
    type: text
    regex: (?i)\b(exp_month|exp_year|exp_date)\b
- id: expiry-field-ru
