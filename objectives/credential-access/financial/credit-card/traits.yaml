composite_rules:
- id: card-type-detection
  desc: Credit card type detection
  crit: suspicious
  conf: 0.9
  needs: 2
  any:
  - id: visa-detection
  - id: mastercard-detection
  - id: amex-detection
  - id: discover-detection
  downgrade:
    any:
    - id: metadata/package/testing/presence/scripted::faker-word
  unless:
  - id: metadata/file/text/catalog::uproc-tools-catalog
- id: mod10-regex-combo
  desc: Mod10 check with card regex
  all:
  - id: mod10-check
  - id: cc-regex-16digit
- id: card-validation
  desc: Credit card validation logic
  crit: suspicious
  conf: 0.9
  any:
  - id: luhn-algorithm
  - id: mod10-regex-combo
- id: credit-card-stealer
  desc: Credit card data stealer
  crit: hostile
  conf: 0.95
  all:
  - id: card-type-detection
  - id: cvv-field
  unless:
  - id: metadata/package/testing/presence/scripted::faker-word
- id: credit-card-form-fields
  desc: Credit card form fields collection
  crit: suspicious
  conf: 0.9
  all:
  - id: cvv-field
  - id: credit-card-form-capture
  any:
  - id: expiry-field
  - id: expiry-field-ru
  - id: expiry-field-short
  - id: card-number-field
  - id: card-number-field-ru
  - id: luhn-algorithm
  - id: mastercard-brand
  unless:
  - id: credit-card-form-fields-exceptions
  downgrade:
    any:
    - id: metadata/package/testing/presence/scripted::faker-word
- id: credit-card-form-fields-exceptions
  desc: Benign credit-card form-field contexts
  crit: component
  conf: 0.9
  any:
  - id: metadata/package/quality::n8n-stripe-card-token-description
  - id: metadata/package/quality::has-tests
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/presence/harness::test-directory
  - id: metadata/lang/scripted::dts-declaration-file
  - id: storybook-story-file
  - id: fake-stripe-checkout-demo
  - id: objectives/supply-chain/trojanized/app/context::definitely-typed-namespace-import
- id: mastercard-bin
  desc: Mastercard BIN range (51-55, 2221-2720)
  crit: suspicious
