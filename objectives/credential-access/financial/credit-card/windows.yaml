# Credit card phishing form detection in PE resource dialogs
# Detects payment/credit card UI strings embedded in PE binaries,
# typically used for credential harvesting overlays or phishing forms.
# ATT&CK: T1056.002 (GUI Input Capture)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1056.002

traits:
  - id: pe-payment-info-dialog
    desc: Payment information dialog string
    crit: suspicious
    conf: 0.88
    if:
      type: string_value
      substr: "Payment Information"
      section: rsrc

  - id: pe-credit-card-info-dialog
    desc: Credit card information dialog string
    crit: suspicious
    conf: 0.88
    if:
      type: string_value
      substr: "Credit Card Information"
      section: rsrc

  - id: pe-card-number-field
    desc: Card number field in PE resource
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: "Card Number:"
      section: rsrc

  - id: pe-payment-account-field
    desc: Payment account field in PE resource
    crit: component
    conf: 0.8
    if:
      type: string_value
      substr: "Payment Account:"
      section: rsrc

composite_rules:
  - id: pe-payment-phishing-form
    desc: Payment phishing form in PE resources
    crit: hostile
    conf: 0.93
    all:
      - id: pe-payment-info-dialog
    any:
      - id: pe-credit-card-info-dialog
      - id: pe-card-number-field
      - id: pe-payment-account-field
