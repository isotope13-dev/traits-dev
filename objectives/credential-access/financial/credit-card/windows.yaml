# Credit card phishing form detection in PE resource dialogs
# Detects payment/credit card UI strings embedded in PE binaries,
# typically used for credential harvesting overlays or phishing forms.
# ATT&CK: T1056.002 (GUI Input Capture)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: T1056.002

traits:
  - id: pe-payment-info-dialog
    desc: Payment information dialog string
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: "Payment Information"
      section: rsrc
    not:
      - substr: "Royalty Payment Information"

  - id: pe-credit-card-info-dialog
    desc: Credit card information dialog string
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: "Credit Card Information"
      section: rsrc

  - id: pe-card-number-field
    desc: Card number field in PE resource
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "Card Number:"
      section: rsrc

  - id: pe-payment-account-field
    desc: Payment account field in PE resource
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "Payment Account:"
      section: rsrc

  - id: pe-atm-pin-prompt
    desc: ATM PIN prompt in PE resource
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "Please, enter your ATM PIN"

  - id: pe-cvv2-prompt
    desc: CVV2 prompt in PE resource
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: "Please, enter your CVV2 (3-digit code on back of card)"

  - id: pe-card-number-prompt
    desc: Card number prompt in PE resource
    crit: suspicious
    conf: 0.94
    if:
      type: text
      exact: "Please, enter your Card Number"

  - id: pe-card-brand-choice
    desc: Card brand chooser in PE resource
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: "Please, select Card (Visa/MasterCard)"

  - id: pe-auth-failed-banking-lure
    desc: Authorization failure banking lure
    crit: suspicious
    conf: 0.9
    if:
      type: text
      exact: "Unable to authorize. ATM PIN-Code is required to complete the transaction."

composite_rules:
  - id: pe-payment-phishing-form
    desc: Payment phishing form in PE resources
    crit: hostile
    conf: 0.93
    all:
      - id: pe-payment-info-dialog
    any:
      - id: pe-credit-card-info-dialog
      - id: pe-card-number-field
      - id: pe-payment-account-field

  - id: pe-card-verification-phish
    desc: Card verification phishing resource set
    crit: hostile
    conf: 0.98
    all:
      - id: pe-atm-pin-prompt
      - id: pe-cvv2-prompt
      - id: pe-card-number-prompt
    any:
      - id: pe-card-brand-choice
      - id: pe-auth-failed-banking-lure
