# Card-data field access and skimmer exfil in compiled/managed binaries. The
# field atoms are format- and case-tolerant (cardNumber, card_number,
# card-number, CardNumber, CARD_NUMBER) so a future skimmer that renames the
# fields is still caught. Handling card data is notable on its own; the hostile
# signal is card fields serialized and shipped to a hardcoded external endpoint.
#
# Sample: Braintree.Net NuGet typosquat (Socket, 2026). An injected
# CardOperationLogger copies each card request into a JSON body and POSTs it to
# https://api.348672-shakepay.com/api/card (X-Api-Key auth) before the genuine
# gateway call, inside an empty catch. Real processor SDKs send card data to
# their own typed API, never a flat JSON blob at an unrelated host.
defaults:
  platforms: [windows, linux, macos]
  for: [pe, dll, macho, elf]
  attack: T1005
  mbc: B0030

traits:
  # The skimmer authenticates to its C2 with a hardcoded key; the exact token is
  # a campaign IOC, distinctive enough to strengthen the exfil composites.
  - id: skimmer-c2-static-api-key
    desc: Hardcoded skimmer C2 API key
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: 2523-5235-8564-2683-2386

composite_rules:
  - id: dotnet-card-skimmer-exfil
    desc: Compiled SDK exfiltrates card data
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/data/parse/payment::managed-card-data-fields
      - id: micro-behaviors/communications/http/client/managed::httpclient
    any:
      - id: objectives/command-and-control/infrastructure/domain/malicious::numeric-lookalike-c2-host
      - id: skimmer-c2-static-api-key
