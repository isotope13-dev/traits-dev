defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1005
traits:
  - id: php-hardcoded-login-postfields
    desc: PHP hardcoded username/password login POST fields
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'CURLOPT_POSTFIELDS\s*=>\s*[''"]username=[''"]?\s*\.\s*[A-Z_][A-Z0-9_]*\s*\.\s*[''"]&password='
  - id: php-account-get-parameter
    desc: PHP account number GET parameter
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\$_GET\[[''"]acc[''"]\]'
  - id: php-range-account-statement-request
    desc: PHP range account statement request
    crit: component
    conf: 0.93
    if:
      type: text
      regex: 'accNumber=.{0,180}rangeWiseAccountStatement'
  - id: php-customer-transaction-json
    desc: PHP customer transaction JSON response fields
    crit: component
    conf: 0.88
    if:
      type: text
      substr: "'customer_info'"
composite_rules:
  - id: php-hardcoded-account-statement-scraper
    desc: PHP hardcoded-login account statement scraper
    crit: suspicious
    conf: 0.97
    all:
      - id: php-hardcoded-login-postfields
      - id: php-account-get-parameter
      - id: php-range-account-statement-request
      - id: php-customer-transaction-json
