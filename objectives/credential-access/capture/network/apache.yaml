defaults:
  platforms: [linux]
  for: [elf]
  attack: T1056.003

traits:
  - id: apache-check-user-id-hook
    desc: Apache check user hook
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: ap_hook_check_user_id
  - id: apache-basic-auth-password-api
    desc: Apache basic auth password API
    crit: notable
    conf: 0.86
    if:
      type: symbol
      exact: ap_get_basic_auth_pw
  - id: bigip-apache-server-banner
    desc: BIG-IP customized Apache banner
    crit: component
    conf: 0.92
    if:
      type: text
      regex: BIG-IP .{0,80}customized Apache

composite_rules:
  - id: apache-auth-interception-surface
    desc: Apache auth interception surface
    crit: notable
    conf: 0.92
    all:
      - id: apache-check-user-id-hook
      - id: apache-basic-auth-password-api
    any:
      - id: micro-behaviors/communications/http/server::httpd-keyword
      - id: micro-behaviors/communications/http/server::httpd-conf-path
  - id: bigip-apache-auth-interception-surface
    desc: BIG-IP Apache auth interception
    crit: suspicious
    conf: 0.95
    all:
      - id: apache-auth-interception-surface
      - id: bigip-apache-server-banner
