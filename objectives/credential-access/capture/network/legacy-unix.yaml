defaults:
  platforms: [unix]
  for: [c]
  crit: suspicious
  conf: 0.88
  attack: T1040
  mbc: C0010
traits:
  - id: nit-device
    desc: Uses legacy NIT capture device
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      exact: /dev/nit
    unless:
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
  - id: promiscuous-capture-flag
    desc: Enables NI_PROMISC capture mode
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: NI_PROMISC
    unless:
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
      - id: micro-behaviors/os/syscall/invoke::linux-kernel-source-context
  - id: nit-bind-ioctl
    desc: Binds interface with NIOCBIND
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: NIOCBIND
    unless:
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
  - id: login-service-decoder
    desc: Maps plaintext login service ports
    crit: component
    conf: 0.9
    if:
      type: text
      regex: IPPORT_(LOGINSERVER|TELNET|SMTP|FTP)
  - id: tcp-log-banner
    desc: Emits TCP session log banner
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: 'TCP/IP LOG -- TM:'
composite_rules:
  - id: legacy-nit-sniffer
    desc: Promiscuous STREAMS network sniffer
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: nit-device
      - id: promiscuous-capture-flag
      - id: nit-bind-ioctl
      - id: tcp-log-banner
    unless:
      - id: well-known/tool/sysadmin/nmap::nmap-source-tree
  - id: plaintext-credential-sniffer
    desc: Sniffer targets plaintext login traffic
    crit: hostile
    conf: 0.97
    all:
      - id: legacy-nit-sniffer
      - id: login-service-decoder
