defaults:
  platforms: [macos]
  for: [macho, swift, objc]
  attack: T1056.001

traits:
  - id: swiftui-secure-field-change-callback
    desc: SwiftUI secure field change callback
    crit: suspicious
    conf: 0.92
    if:
      type: symbol
      substr: EnterKeySecureField.controlTextDidChange
  - id: swiftui-enter-key-secure-field
    desc: SwiftUI EnterKey secure field
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: EnterKeySecureField
  - id: arm64-selector-resolution-sequence
    desc: ARM64 selector resolution sequence
    crit: component
    conf: 0.72
    arch: [aarch64]
    if:
      type: hex
      pattern: "?? ?? ?? F0 ?? ?? ?? 91 01 06 80 52 E2 00 80 52"
      section: .text

composite_rules:
  - id: swiftui-secure-field-input-intercept
    desc: SwiftUI secure field input intercept
    crit: suspicious
    conf: 0.96
    all:
      - id: micro-behaviors/ui/window/form-input::macos-secure-text-field-control
      - id: swiftui-enter-key-secure-field
      - id: objectives/credential-access/phishing/lure::app-authentication-password-prompt
    any:
      - id: swiftui-secure-field-change-callback
      - id: arm64-selector-resolution-sequence
      - id: objectives/credential-access/phishing/lure::app-authentication-lure
  - id: swiftui-password-intercept-telegram-exfil
    desc: SwiftUI password intercept Telegram exfil
    crit: hostile
    conf: 0.995
    all:
      - id: swiftui-secure-field-input-intercept
      - id: objectives/exfiltration/messaging/telegram::swift-telegram-json-exfil
