defaults:
  platforms: [unix, windows]
  for: [go]
  crit: suspicious
  attack: T1056
traits:
  - id: readpassword-call
    desc: ReadPassword function call
    crit: suspicious
    conf: 0.6
    if:
      type: symbol
      exact: ReadPassword
    unless:
      - id: password-management-cli-context
  - id: term-readpassword
    desc: term.ReadPassword call
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: term.ReadPassword(
    not:
      - regex: 'passphrase[\s\S]{0,200}ReadPassword|ReadPassword[\s\S]{0,200}passphrase'
    unless:
      - id: password-management-cli-context
  - id: terminal-readpassword
    desc: terminal.ReadPassword call
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: terminal.ReadPassword(
    not:
      - regex: 'passphrase[\s\S]{0,200}ReadPassword|ReadPassword[\s\S]{0,200}passphrase'
    unless:
      - id: password-management-cli-context
  - id: passphrase-prompt
    desc: Passphrase entry prompt
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: "Enter passphrase"
  - id: password-config-management-field
    desc: Password hash config field
    crit: component
    conf: 0.75
    if:
      type: text
      substr: password_hash
composite_rules:
  - id: password-management-cli-context
    desc: Password management CLI context
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/crypto/kdf/algorithm::bcrypt
      - id: password-config-management-field
  - id: password-reading
    desc: Password reading function
    crit: suspicious
    conf: 0.6
    any:
      - id: readpassword-call
      - id: term-readpassword
      - id: terminal-readpassword
  - id: file-write-operation
    desc: File write operation
    crit: component
    conf: 0.6
    any:
      - id: micro-behaviors/fs/file/write/direct::go-append-file-method-call
      - id: micro-behaviors/fs/file/write/direct::go-write-file-method-call
      - id: micro-behaviors/fs/file/write/direct::os-write-file
  - id: http-exfil-operation
    desc: HTTP exfiltration operation
    crit: component
    conf: 0.6
    any:
      - id: micro-behaviors/communications/http/post::http-post
      - id: micro-behaviors/communications/http/post::http-post-form
      - id: micro-behaviors/communications/http/post::go-http-post-method
      - id: micro-behaviors/communications/http/lib/netlib::go-http-client-do
  - id: password-exfil-file
    desc: Password captured and written to file
    crit: hostile
    conf: 0.95
    mbc: E1056
    all:
      - id: password-reading
      - id: file-write-operation
    unless:
      - id: passphrase-prompt
    downgrade:
      any:
        - id: micro-behaviors/os/container/runtime::kubernetes
  - id: credential-capture
    desc: Credential input capture capability
    crit: suspicious
    conf: 0.85
    any:
      - id: password-reading
      - id: password-exfil-file
