defaults:
  platforms: [unix, windows]
  for: [go]
  crit: suspicious
  attack: T1056
traits:
  - id: password-config-management-field
    desc: Password hash config or JSON field
    crit: component
    conf: 0.75
    if:
      type: text
      regex: '(json:\s*["'']password_hash["'']|["'']password_hash["'']\s*:)'
  - id: registry-auth-password-login
    desc: Registry password authentication client
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'auth-with-password|registryURL.{0,80}(password|login|auth)'
      case_insensitive: true
  - id: vault-root-token-path
    desc: Vault root-token utility path
    crit: component
    conf: 0.9
    if:
      type: path
      regex: 'vault[\\/]gen_root_token[\\/]'
  - id: vault-encrypted-unseal-key-prompt
    desc: Vault encrypted unseal key prompt
    crit: component
    conf: 0.9
    if:
      type: text
      substr: "Enter the encrypted unseal key"
composite_rules:
  - id: password-management-cli-marker
    desc: Password management CLI marker
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/crypto/kdf/algorithm::bcrypt
      - id: password-config-management-field
  - id: password-reading
    desc: Password reading function
    crit: notable
    conf: 0.6
    all:
      - id: micro-behaviors/ui/terminal::go-readpassword-call
    unless:
      - id: micro-behaviors/ui/terminal::passphrase-entry-prompt
  - id: registry-auth-password-client
    desc: Registry auth password client marker
    crit: component
    conf: 0.92
    all:
      - id: password-reading
      - id: registry-auth-password-login
  - id: file-write-operation
    desc: File write operation
    crit: component
    conf: 0.6
    any:
      - id: micro-behaviors/fs/file/write/direct::go-append-file-method-call
      - id: micro-behaviors/fs/file/write/direct::go-write-file-method-call
      - id: micro-behaviors/fs/file/write/direct::os-write-file
  - id: http-exfil-operation
    desc: HTTP exfiltration operation
    crit: component
    conf: 0.6
    any:
      - id: micro-behaviors/communications/http/post::http-post
      - id: micro-behaviors/communications/http/post::http-post-form
      - id: micro-behaviors/communications/http/post::go-http-post-method
      - id: micro-behaviors/communications/http/lib/netlib::go-http-client-do
  - id: password-exfil-file
    desc: Password captured and written to file
    crit: hostile
    conf: 0.95
    mbc: E1056
    all:
      - id: password-reading
      - id: file-write-operation
    unless:
      - id: micro-behaviors/ui/terminal::passphrase-entry-prompt
      - id: objectives/credential-access/capture/input/
    downgrade:
      any:
        - id: micro-behaviors/os/container/runtime/
  - id: vault-root-token-unseal-key-tool-marker
    desc: Vault root-token unseal key utility marker
    crit: baseline
    conf: 0.94
    all:
      - id: vault-root-token-path
      - id: vault-encrypted-unseal-key-prompt
  - id: credential-capture
    desc: Credential input capture capability
    crit: notable
    conf: 0.85
    any:
      - id: password-reading
      - id: password-exfil-file
