defaults:
  platforms: [unix, windows, macos]
  for: [go]
  crit: suspicious
  attack: T1056
traits:
  - id: readpassword-call
    desc: ReadPassword function call
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: ReadPassword\s*\(
  - id: term-readpassword
    desc: term.ReadPassword call
    crit: notable
    conf: 0.6
    if:
      type: raw
      substr: term.ReadPassword(
  - id: terminal-readpassword
    desc: terminal.ReadPassword call
    crit: notable
    conf: 0.6
    if:
      type: raw
      substr: terminal.ReadPassword(
  - id: appendfile-call
    desc: AppendFile method call
    crit: notable
    conf: 0.7
    if:
      type: raw
      substr: .AppendFile(
  - id: writefile-call
    desc: WriteFile method call
    crit: notable
    conf: 0.5
    if:
      type: raw
      substr: .WriteFile(
  - id: os-writefile
    desc: os.WriteFile call
    crit: notable
    conf: 0.5
    if:
      type: raw
      substr: os.WriteFile(
  - id: ioutil-writefile
    desc: ioutil.WriteFile call
    crit: notable
    conf: 0.5
    if:
      type: raw
      substr: ioutil.WriteFile(
  - id: http-post-call-dup
    desc: HTTP POST method call
    crit: notable
    conf: 0.6
    if:
      type: raw
      regex: \.(Post|PostForm)\s*\(
  - id: http-client-do
    desc: http.Client.Do call
    crit: notable
    conf: 0.5
    if:
      type: raw
      substr: .Do(
composite_rules:
  - id: password-reading
    desc: Password reading function
    crit: notable
    conf: 0.6
    any:
      - id: readpassword-call
      - id: term-readpassword
      - id: terminal-readpassword
  - id: file-write-operation
    desc: File write operation
    crit: notable
    conf: 0.6
    any:
      - id: appendfile-call
      - id: writefile-call
      - id: os-writefile
      - id: ioutil-writefile
  - id: http-exfil-operation
    desc: HTTP exfiltration operation
    crit: notable
    conf: 0.6
    any:
      - id: objectives/credential-access/capture/input::http-post-call-dup
      - id: http-client-do
  - id: password-exfil-file
    desc: Password captured and written to file
    crit: hostile
    conf: 0.95
    mbc: E1056
    all:
      - id: password-reading
      - id: file-write-operation
  - id: credential-capture
    desc: Credential input capture capability
    crit: suspicious
    conf: 0.85
    any:
      - id: password-reading
      - id: password-exfil-file
