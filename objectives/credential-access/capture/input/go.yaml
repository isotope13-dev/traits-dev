defaults:
  platforms: [unix, windows]
  for: [go]
  crit: suspicious
  attack: T1056
traits:
  - id: readpassword-call
    desc: ReadPassword function call
    crit: notable
    conf: 0.6
    if:
      type: symbol
      exact: ReadPassword
  - id: term-readpassword
    desc: term.ReadPassword call
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: term.ReadPassword(
    not:
      - regex: 'passphrase[\s\S]{0,200}ReadPassword|ReadPassword[\s\S]{0,200}passphrase'
  - id: terminal-readpassword
    desc: terminal.ReadPassword call
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: terminal.ReadPassword(
    not:
      - regex: 'passphrase[\s\S]{0,200}ReadPassword|ReadPassword[\s\S]{0,200}passphrase'
  - id: appendfile-call
    desc: AppendFile method call
    crit: notable
    conf: 0.7
    if:
      type: text
      substr: .AppendFile(
  - id: writefile-call
    desc: WriteFile method call
    crit: component
    conf: 0.5
    if:
      type: text
      substr: .WriteFile(
  - id: os-writefile
    desc: os.WriteFile call
    crit: component
    conf: 0.5
    if:
      type: text
      substr: os.WriteFile(
  - id: ioutil-writefile
    desc: ioutil.WriteFile call
    crit: notable
    conf: 0.5
    if:
      type: text
      substr: ioutil.WriteFile(
  - id: http-post-stdlib
    desc: stdlib HTTP POST call
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: http\.Post(Form)?\s*\(
  - id: http-post-client
    desc: HTTP client POST call
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: client\.Post(Form)?\s*\(
  - id: http-post-req
    desc: Request POST call
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: req\.Post(Form)?\s*\(
  - id: http-client-do
    desc: http.Client.Do call
    crit: component
    conf: 0.5
    if:
      type: text
      substr: .Do(
  - id: passphrase-prompt
    desc: Passphrase entry prompt
    crit: baseline
    conf: 0.7
    if:
      type: text
      substr: "Enter passphrase"
composite_rules:
  - id: password-reading
    desc: Password reading function
    crit: notable
    conf: 0.6
    any:
      - id: readpassword-call
      - id: term-readpassword
      - id: terminal-readpassword
  - id: file-write-operation
    desc: File write operation
    crit: notable
    conf: 0.6
    any:
      - id: appendfile-call
      - id: writefile-call
      - id: os-writefile
      - id: ioutil-writefile
  - id: http-exfil-operation
    desc: HTTP exfiltration operation
    crit: notable
    conf: 0.6
    any:
      - id: http-post-stdlib
      - id: http-post-client
      - id: http-post-req
      - id: http-client-do
  - id: password-exfil-file
    desc: Password captured and written to file
    crit: hostile
    conf: 0.95
    mbc: E1056
    all:
      - id: password-reading
      - id: file-write-operation
    unless:
      - id: passphrase-prompt
    downgrade:
      any:
        - id: micro-behaviors/os/container/runtime::kubernetes
  - id: credential-capture
    desc: Credential input capture capability
    crit: suspicious
    conf: 0.85
    any:
      - id: password-reading
      - id: password-exfil-file
