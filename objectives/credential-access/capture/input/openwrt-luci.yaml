defaults:
  platforms: [openwrt]
  for: [shell, javascript]
  attack: T1056.001

traits:
  - id: luci-sendbeacon-creds
    desc: LuCI credential beacon endpoint
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'navigator\.sendBeacon.{0,80}/api/v1/creds'

composite_rules:
  - id: luci-submit-listener-single
    desc: LuCI form submit listener
    crit: notable
    conf: 0.86
    all:
      - id: micro-behaviors/communications/http/form::document-submit-listener
      - id: objectives/impact/deface/web::luci-static-resource-path
  - id: luci-submit-listener-doublequote
    desc: LuCI form submit listener
    crit: notable
    conf: 0.86
    all:
      - id: micro-behaviors/communications/http/form::document-submit-listener-doublequote
      - id: objectives/impact/deface/web::luci-static-resource-path
  - id: luci-submit-listener
    desc: LuCI form submit listener
    crit: notable
    conf: 0.86
    any:
      - id: luci-submit-listener-single
      - id: luci-submit-listener-doublequote

  - id: openwrt-luci-credential-interceptor
    desc: OpenWrt LuCI credential interception script
    crit: hostile
    conf: 0.96
    all:
      - id: luci-submit-listener
      - id: micro-behaviors/communications/http/upload::form-data-new
      - id: luci-sendbeacon-creds
    any:
      - id: objectives/impact/deface/web::luci-static-resource-path
      - id: objectives/impact/deface/web::uhttpd-redirect-uci
