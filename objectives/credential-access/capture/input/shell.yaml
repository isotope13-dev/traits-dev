defaults:
  for:
    - shell
  attack: T1056.002
traits:
  - id: read-silent-password
    desc: Silent password input capture
    crit: suspicious
    conf: 0.9
    mbc: F0004
    if:
      type: string
      regex: read\s+-s\s+\w*password
  - id: password-variable
    desc: Password variable reference
    crit: notable
    conf: 0.4
    if:
      type: string
      regex: \$\{?password\}?
  - id: base64-encode-dup
    desc: base64 encoding command
    crit: notable
    conf: 0.4
    if:
      type: raw
      regex: \|\s*base64
composite_rules:
  - id: password-capture-encode
    desc: Capture and encode password
    crit: hostile
    conf: 0.95
    mbc: F0004
    all:
      - id: read-silent-password
      - id: password-variable
      - id: objectives/credential-access/capture/input::base64-encode-dup
