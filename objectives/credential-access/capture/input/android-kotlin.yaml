defaults:
  platforms: [android]
  for: [kotlin, class]
  attack: T1056

traits:
  - id: kotlin-username-field
    desc: Kotlin username field
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "usernameField"
    unless:
      - id: metadata/package/files/included::jsii-metadata-basename

  - id: kotlin-password-field
    desc: Kotlin password field
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "passwordField"
    unless:
      - id: well-known/app/macos-benign::dbeaver-app-bundle
      - id: well-known/app/macos-benign::dbeaver-plugin-jar
      - id: well-known/app/macos-benign::dbeaver-java-package
      - id: metadata/package/files/included::jsii-metadata-basename

  - id: kotlin-password-edit-id
    desc: Kotlin password edit ID
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: "password_edit"
    unless:
      - id: metadata/package/files/included::jsii-metadata-basename

  - id: kotlin-store-credential-call
    desc: Kotlin store credential call
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "storeCredential"
    unless:
      - id: metadata/package/files/included::jsii-metadata-basename

  - id: kotlin-captured-creds-field
    desc: Kotlin captured creds field
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: "captured_credentials"
    unless:
      - id: metadata/package/files/included::jsii-metadata-basename

  - id: kotlin-login-success-lure
    desc: Kotlin login success lure
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Login successful|Registration successful'
    unless:
      - id: metadata/package/files/included::jsii-metadata-basename

composite_rules:
  - id: kotlin-login-credential-capture
    desc: Kotlin login credential capture
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-store-credential-call
    any:
      - id: kotlin-username-field
      - id: kotlin-password-field
      - id: kotlin-password-edit-id
      - id: kotlin-login-success-lure
