defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1056
traits:
- id: hidden-autofill-form-fields
  desc: "hidden autofill credential fields"
  crit: component
  conf: 0.93
  if:
    type: text
    regex: autocomplete=['"](on|username|current-password)['"]
- id: body-append-credential-form
  desc: "document.body appends credential form"
  crit: component
  conf: 0.88
  # Building block for hidden-autofill-click-credential-theft. Match full
  # credential tokens, not the substrings user/pass/cred, which collide with
  # benign UI ids like userInfo/loginView/compass and inflate false positives.
  if:
    type: text
    regex: document\.body\.appendChild.{0,120}(autocomplete|username|password|credential)
- id: body-click-credential-read--rx-1
  desc: document.body click handler reads user/pass
  crit: component
  conf: 0.94
  if:
    type: text
    regex: document\.body\.(on|addEventListener\(\s*['"])click.{0,120}(user|pass)
- id: body-click-credential-read--rx-2
  desc: document.body click handler reads cred/login
  crit: component
  conf: 0.94
  if:
    type: text
    regex: document\.body\.(on|addEventListener\(\s*['"])click.{0,120}(cred|login)
- id: username-password-read--rx-7
  desc: '"username" string literal (form field name)'
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: username
- id: password-selector-exclusion
  desc: Password selector exclusion
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'not([type="password"])'
- id: password-filter-return
  desc: Password filter returns true
  crit: component
  conf: 0.85
  if:
    type: text
    regex: \bpassword\b.{0,80}return\s*!?0
- id: password-helper-ui-context-primary
  desc: Password helper UI marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'autoGeneratePassword|toggle-password|togglePassword'
- id: password-helper-ui-context-secondary
  desc: Password helper UI marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: 'pass-strength-result|lostpasswordform'
- id: getelementbyid-symbol
  desc: "getElementById username/password lookup"
  crit: component
  conf: 0.78
  if:
    type: text
    regex: getElementById\(['"](username|password)['"]\)
- id: credential-base64-or-formdata
  desc: "FormData packages username/password"
  crit: component
  conf: 0.86
  if:
    type: text
    regex: \.append\(\s*['"](username|password)['"]

composite_rules:
- id: password-helper-ui-marker
  desc: Password helper UI marker
  crit: component
  conf: 0.9
  any:
  - id: password-helper-ui-context-primary
  - id: password-helper-ui-context-secondary
- id: hidden-autofill-click-credential-theft
  desc: Hidden autofill click-based credential theft
  crit: hostile
  conf: 0.97
  all:
  - id: hidden-autofill-form-fields
  - id: micro-behaviors/ui/window/manage/dom::browser-create-form-element
  - id: body-append-credential-form
  - id: body-click-credential-read
  - id: micro-behaviors/ui/window/manage/dom::dom-element-value-read
  - id: username-password-field-marker
  any:
  - id: getelementbyid-symbol
  - id: credential-base64-or-formdata
  - id: micro-behaviors/data/encode/base64::btoa-symbol
  - id: micro-behaviors/communications/http/post::formdata-class
- id: body-click-credential-read
  desc: Reads credentials on body click
  crit: suspicious
  conf: 0.94
  any:
  - id: body-click-credential-read--rx-1
  - id: body-click-credential-read--rx-2
- id: credential-field-exclusion-filter
  desc: Credential exclusion filter
  crit: component
  conf: 0.9
  any:
  - id: password-selector-exclusion
  - id: password-filter-return
- id: username-password-field-marker
  desc: Username or password field marker
  crit: component
  conf: 0.86
  any:
  - id: username-password-read--rx-7
  - id: getelementbyid-symbol
  - id: credential-base64-or-formdata
