# Android Cordova/Ionic WebView Phishing APK
# Detects Android apps that wrap an external website in a WebView as a phishing lure
# Cordova/Ionic hybrid apps that load a remote domain are used to mimic legitimate financial apps
# Specificity is achieved through Cordova-specific class/plugin name patterns
# ATT&CK: T1566 (Phishing), T1411 (User Interface Spoofing)
defaults:
  platforms: [android]
  for: [binaries]
  crit: notable
  conf: 0.8
  attack: "T1566"

traits:
  - id: cordova-namespace
    desc: Apache Cordova manifest namespace
    conf: 0.75
    if:
      type: text
      substr: "cordova.apache.org/ns/1.0"

  - id: ionic-webview-plugin
    desc: Ionic/Cordova IonicWebView plugin loaded
    conf: 0.8
    if:
      type: text
      substr: "com.ionicframework.cordova.webview"

  - id: cordova-background-mode
    desc: Cordova BackgroundMode plugin runs app in background
    conf: 0.85
    if:
      type: text
      substr: "de.appplant.cordova.plugin.background"

  - id: cordova-external-origin
    desc: Cordova config allows external domain origin
    crit: component
    conf: 0.85
    for: [apk]
    if:
      type: text
      regex: "https?://[a-z0-9.-]+\\.[a-z]{2,}/"
    not:
      - regex: "(w3\\.org|apache\\.org|example-cmdline\\.test|symantec\\.com)"

  - id: cordova-http-plugin
    desc: CordovaHttpPlugin for arbitrary HTTP from WebView JS
    conf: 0.8
    if:
      type: text
      substr: "com.synconset.cordovahttp"

  - id: cordova-local-notification
    desc: Cordova local notification plugin push delivery
    crit: component
    conf: 0.7
    if:
      type: text
      substr: "de.appplant.cordova.plugin.localnotification"

composite_rules:
  - id: cordova-external-domain-webview
    desc: Cordova/Ionic app loads external domain as main content
    crit: suspicious
    conf: 0.88
    all:
      - id: cordova-namespace
      - id: cordova-external-origin

  - id: cordova-phishing-apk
    desc: Cordova hybrid APK wrapping external site with JS bridge and background persistence
    crit: hostile
    conf: 0.9
    mbc: "B0030"
    all:
      - id: cordova-namespace
      - id: cordova-external-origin
    any:
      - id: cordova-background-mode
      - id: cordova-http-plugin
      - id: cordova-local-notification
      - id: micro-behaviors/process/interpreter/webview::add-javascript-interface
      - id: micro-behaviors/os/privilege/paths::android-root-check
      - id: micro-behaviors/process/create/loader::dynamic-dex-loading
