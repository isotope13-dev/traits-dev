defaults:
  platforms: [android]
  for: [apk, zip]
  crit: notable
  conf: 0.88
  attack: "T1566"

traits:
  - id: capacitor-config-json
    desc: Capacitor app config bundled
    conf: 0.9
    if:
      type: text
      substr: "assets/capacitor.config.json"

  - id: accessibility-enable-html-asset
    desc: Bundled accessibility enable lure
    crit: component
    conf: 0.9
    if:
      type: raw
      substr: "assets/enable.html"

  - id: next-login-chunk
    desc: Next.js login page chunk
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "assets/public/_next/static/chunks/pages/login-"

  - id: next-verify-chunk
    desc: Next.js verify page chunk
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "assets/public/_next/static/chunks/pages/verify-"

  - id: next-otp-chunk
    desc: Next.js OTP page chunk
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "assets/public/_next/static/chunks/pages/onetime-"

  - id: next-invalid-chunk
    desc: Next.js invalid OTP chunk
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "assets/public/_next/static/chunks/pages/invalid-"

  - id: login-page
    desc: Bundled login phishing page
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "assets/public/login.html"

  - id: account-page
    desc: Bundled account phishing page
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "assets/public/account.html"

  - id: verify-page
    desc: Bundled card phishing page
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "assets/public/verify.html"

  - id: onetime-page
    desc: Bundled OTP phishing page
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "assets/public/onetime.html"

  - id: invalid-page
    desc: Bundled invalid OTP page
    crit: component
    conf: 0.94
    if:
      type: text
      substr: "assets/public/invalid.html"

  - id: processing-page
    desc: Bundled processing lure page
    crit: component
    conf: 0.92
    if:
      type: text
      substr: "assets/public/processing.html"

  - id: fake-captcha-asset
    desc: Fake captcha image asset
    crit: component
    conf: 0.84
    if:
      type: text
      substr: "assets/public/ct.png"

  - id: fake-trust-seal
    desc: Fake trust seal asset
    crit: component
    conf: 0.84
    if:
      type: text
      substr: "assets/public/v.png"

composite_rules:
  - id: staged-phish-pages
    desc: Bundled staged phishing page set
    crit: suspicious
    conf: 0.98
    all:
      - id: login-page
      - id: account-page
      - id: verify-page
      - id: onetime-page
      - id: invalid-page
      - id: processing-page

  - id: next-static-phish-bundle
    desc: Next.js static export phishing bundle
    crit: suspicious
    conf: 0.96
    all:
      - id: next-login-chunk
      - id: next-verify-chunk
      - id: next-otp-chunk
    any:
      - id: next-invalid-chunk
      - id: processing-page

  - id: bundled-bank-phish-apk
    desc: APK bundles staged bank phishing workflow
    crit: hostile
    conf: 0.995
    mbc: "B0006"
    all:
      - id: capacitor-config-json
      - id: staged-phish-pages
      - id: next-static-phish-bundle
    any:
      - id: fake-captcha-asset
      - id: fake-trust-seal

  - id: obfuscated-accessibility-lure-apk
    desc: Obfuscated APK bundles accessibility lure
    crit: hostile
    conf: 0.98
    all:
      - id: accessibility-enable-html-asset
      - id: objectives/command-and-control/dropper/staging/encrypted::apk-obfuscated-resource-pack
    any:
      - id: objectives/command-and-control/dropper/staging/encrypted::apk-okhttp-publicsuffix-data
      - id: metadata/package/files::apk-secondary-dex

  - id: android-accessibility-transaction-capture-dex
    desc: Android accessibility transaction capture DEX
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/hardware/input/accessibility::android-accessibility-service-class
      - id: micro-behaviors/hardware/display/screen::android-media-projection-manager
      - id: objectives/command-and-control/backdoor/rat/protocol::android-transaction-control-protocol
