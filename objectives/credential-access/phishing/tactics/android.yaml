# Android Cordova/Ionic WebView Phishing APK
# Detects Android apps that wrap an external website in a WebView as a phishing lure
# Cordova/Ionic hybrid apps that load a remote domain are used to mimic legitimate financial apps
# Specificity is achieved through Cordova-specific class/plugin name patterns
# ATT&CK: T1566 (Phishing), T1411 (User Interface Spoofing)
defaults:
  platforms: [android]
  for: [apk, binaries]
  crit: notable
  conf: 0.8
  attack: "T1566"

traits:
  - id: cordova-access-origin
    desc: Cordova access origin allows external domain
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '<access[^>]{0,80}origin="https?://'

  - id: cordova-allow-navigation
    desc: "Cordova allow-navigation external domain"
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '<allow-navigation[^>]{0,80}href="https?://'

composite_rules:
  - id: cordova-external-origin
    desc: Cordova external domain origin
    crit: component
    conf: 0.88
    any:
      - id: cordova-access-origin
      - id: cordova-allow-navigation

  - id: cordova-external-domain-webview
    desc: Cordova/Ionic app loads external domain as main content
    crit: suspicious
    conf: 0.88
    all:
      - id: objectives/credential-access/phishing/workflow::cordova-namespace
      - id: cordova-external-origin

  - id: cordova-phishing-apk
    desc: Cordova hybrid APK wrapping external site with JS bridge and background persistence
    crit: hostile
    conf: 0.9
    mbc: "B0030"
    all:
      - id: objectives/credential-access/phishing/workflow::cordova-namespace
      - id: cordova-external-origin
    any:
      - id: objectives/credential-access/phishing/workflow::cordova-background-mode
      - id: objectives/credential-access/phishing/workflow::cordova-http-plugin
      - id: objectives/credential-access/phishing/workflow::cordova-local-notification
      - id: micro-behaviors/process/interpreter/webview::add-javascript-interface
      - id: micro-behaviors/os/privilege/paths::android-root-check
      - id: micro-behaviors/process/create/loader::dynamic-dex-loading
