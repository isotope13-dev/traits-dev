  - id: micro-behaviors/ui/window/manage/dom::browser-location-external-assign
- id: web-phishing-kit-redirect
  desc: Phishing kit with credit card capture and redirect
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/ui/window/manage/navigation::browser-meta-refresh-external-url
  - id: objectives/credential-access/financial/credit-card::cvv-field
- id: web-phishing-kit-exfil
