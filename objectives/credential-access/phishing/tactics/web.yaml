- id: cvv-field-token
  desc: CVV field token
  crit: component
  conf: 0.86
  for: [php, html]
  if:
    type: text
    word: cvv
- id: csc-number-field-token
  desc: CSC number field token
  crit: component
  conf: 0.86
  for: [php, html]
  if:
