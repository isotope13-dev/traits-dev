defaults:
  platforms: [unix, windows]
  for:
    - html
    - php
    - javascript
  attack: T1566.002
  mbc: B0030
traits:
  - id: meta-refresh-redirect
    desc: Meta refresh redirect to external URL
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: (?i)http-equiv=['\"]Refresh['\"].{0,50}URL=https?://
  - id: js-location-redirect
    desc: JavaScript redirect via window.location
    crit: notable
    conf: 0.7
    for:
      - javascript
      - html
    if:
      type: text
      regex: "window\\.location\\.(href|replace)\\s*=\\s*['\\\"]https?://"
  - id: js-location-assign-redirect
    desc: JavaScript redirect via window.location assignment
    crit: notable
    conf: 0.72
    for:
      - javascript
      - html
    if:
      type: text
      regex: "window\\.location\\s*=\\s*['\\\"]https?://"
  - id: js-dynamic-location-href-redirect
    desc: JavaScript redirects to dynamic URL
    crit: notable
    conf: 0.76
    for:
      - javascript
      - html
    if:
      type: text
      regex: "window\\.(top\\.)?location\\.href\\s*=\\s*[a-zA-Z_$]"
  - id: unpkg-cdn-asset-load
    desc: Loads assets from unpkg npm CDN
    crit: notable
    conf: 0.7
    for:
      - html
    if:
      type: text
      regex: "unpkg\\.com/[a-z]"
  - id: php-ip-logger-include
    desc: PHP include of IP-logging sidecar script
    crit: component
    conf: 0.8
    for: [php]
    if:
      type: string_literal
      regex: (?i)\bip\b.{0,20}\.php
  - id: php-login-redirect
    desc: PHP header redirect to login page
    crit: component
    conf: 0.75
    for: [php]
    if:
      type: string_literal
      regex: (?i)Location:\s*login\.(html|php)
  - id: php-real-ip-headers
    desc: PHP reads proxy-bypass IP headers
    crit: notable
    conf: 0.8
    for: [php]
    if:
      type: string_literal
      substr: HTTP_CLIENT_IP
  - id: php-forwarded-ip-header
    desc: PHP reads X-Forwarded-For header
    crit: notable
    conf: 0.8
    for: [php]
    if:
      type: string_literal
      substr: HTTP_X_FORWARDED_FOR
  - id: php-credential-label-account
    desc: PHP writes Account label for credentials
    crit: component
    conf: 0.9
    for: [php]
    if:
      type: string_literal
      substr: "Account: "
  - id: php-credential-label-pass
    desc: PHP writes Pass label for credentials
    crit: component
    conf: 0.9
    for: [php]
    if:
      type: string_literal
      substr: " Pass: "
  - id: js-ajax-social-login-intercept
    desc: AJAX intercept of social media login form
    crit: notable
    conf: 0.85
    for: [javascript, html]
    if:
      type: text
      regex: data-action=.{0,5}(instagram|facebook|twitter|tiktok)_login
  - id: php-mock-fixture
    desc: PHP mock fixture basename
    crit: component
    conf: 0.8
    for: [php]
    if:
      type: basename
      exact: mock.php
composite_rules:
  - id: php-credential-exfiltration
    desc: PHP script writing POST data to local file
    crit: notable
    conf: 0.85
    all:
      - id: micro-behaviors/communications/http/request/params::post-dup
      - id: micro-behaviors/fs/file/write::php-file-write-func
    unless:
      - id: php-mock-fixture
      - id: metadata/package::php-manual-empty-function-stubs
      - id: metadata/package::has-tests
      - id: metadata/library/web-frameworks::wordpress-core-package-doc
      - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
      - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
      - id: metadata/library/web-frameworks::wordpress-core-api-symbols
  - id: suspicious-brand-redirect
    desc: Redirect to known financial brand
    crit: suspicious
    conf: 0.8
    all:
      - id: meta-refresh-redirect
      - id: objectives/credential-access/financial/credit-card::mastercard-detection
  - id: ssrf-bypass-redirect
    desc: Meta-refresh redirect to SSRF bypass service
    crit: hostile
    conf: 0.97
    attack: T1599
    all:
      - id: meta-refresh-redirect
      - id: objectives/exfiltration/oob::bypass-eu-org
  - id: js-oast-redirect
    desc: JavaScript redirect to OAST callback
    crit: suspicious
    conf: 0.92
    attack: T1599
    all:
      - id: objectives/exfiltration/oob::oastify
    any:
      - id: js-location-redirect
      - id: js-location-assign-redirect
  - id: web-phishing-kit-redirect
    desc: Phishing kit with credit card capture and redirect
    crit: hostile
    conf: 0.95
    all:
      - id: meta-refresh-redirect
      - id: objectives/credential-access/financial/credit-card::cvv-field
  - id: web-phishing-kit-exfil
    desc: Phishing kit with credit card capture and PHP exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: php-credential-exfiltration
      - id: objectives/credential-access/financial/credit-card::cvv-field
  - id: php-ip-harvester
    desc: PHP script logging visitor IP and user-agent
    crit: suspicious
    conf: 0.88
    all:
      - id: php-real-ip-headers
      - id: micro-behaviors/fs/file/write::php-file-write-func
    any:
      - id: php-forwarded-ip-header
      - id: micro-behaviors/communications/http/request/params::server-dup
  - id: php-phishing-kit-entry
    desc: Phishing kit entry page logs IP then redirects to login
    crit: suspicious
    conf: 0.9
    all:
      - id: php-ip-logger-include
      - id: php-login-redirect
  - id: php-labeled-credential-harvest
    desc: PHP writes labeled social media credentials to file
    crit: hostile
    conf: 0.95
    all:
      - id: php-credential-label-account
      - id: php-credential-label-pass
      - id: php-credential-exfiltration
  - id: php-social-media-phishing-kit
    desc: PHP social media credential phishing kit
    crit: hostile
    conf: 0.97
    any:
      - id: php-labeled-credential-harvest
      - id: php-phishing-kit-entry
