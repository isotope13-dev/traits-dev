- id: php-mock-fixture
  desc: PHP mock fixture basename
  crit: component
  conf: 0.8
  for: [php]
  if:
    type: path
    basename: true
    exact: mock.php
- id: php-post-file-write-flow
  desc: PHP POST data written with fwrite
  crit: component
  conf: 0.86
  for: [php]
  if:
    type: text
    regex: '\$_POST.{0,120}fwrite\s*\('
- id: php-post-file-write-flow-fputs
  desc: PHP POST data written with fputs
  crit: component
  conf: 0.86
  for: [php]
  if:
    type: text
    regex: '\$_POST.{0,120}fputs\s*\('
- id: php-post-file-write-flow-put-contents
  desc: PHP POST data written with file_put_contents
  crit: component
  conf: 0.86
  for: [php]
  if:
    type: text
    regex: '\$_POST.{0,120}file_put_contents\s*\('
- id: php-post-file-write-flow-open
  desc: PHP POST data followed by writable fopen
  crit: component
  conf: 0.84
  for: [php]
  if:
    type: text
    regex: '\$_POST.{0,120}fopen\s*\(.{0,80},\s*["''][wa]'
- id: paypal-obfuscated-brand-text
  desc: PayPal brand HTML entities
  crit: component
  conf: 0.9
  for: [php, html]
  if:
    type: text
    substr: "&#80;&#97;y&#80;&#97;l"
- id: card-number-input-field
  desc: Card number input field
  crit: component
  conf: 0.86
  for: [php, html]
  if:
    type: text
