defaults:
  platforms: [unix, windows]
  for:
  - html
  - php
  - javascript
  attack: T1566.002
  mbc: B0030
traits:
- id: php-ip-logger-include
  desc: PHP include of IP-logging sidecar script
  crit: component
  conf: 0.8
  for: [php]
  if:
    type: string_literal
    regex: (?i)\bip\b.{0,20}\.php
- id: php-login-redirect
  desc: PHP header redirect to login page
  crit: component
  conf: 0.75
  for: [php]
  if:
    type: string_literal
    regex: (?i)Location:\s*login\.(html|php)
- id: php-credential-label-account
  desc: PHP writes Account label for credentials
  crit: component
  conf: 0.9
  for: [php]
  if:
    type: string_literal
    substr: "Account: "
- id: php-credential-label-pass
  desc: PHP writes Pass label for credentials
  crit: component
  conf: 0.9
  for: [php]
  if:
    type: string_literal
    substr: " Pass: "
- id: js-ajax-social-login-intercept
  desc: AJAX intercept of social media login form
  crit: suspicious
  conf: 0.85
  for: [javascript, html]
  if:
    type: text
    regex: data-action=.{0,5}(instagram|facebook|twitter|tiktok)_login
- id: full-window-iframe-shell--rx-2
  desc: References the CSS position property
  crit: component
  conf: 0.9
  for: [javascript, html]
  if:
    type: text
    substr: style.position
  count_max: 1008371
- id: full-window-iframe-shell--rx-5
  desc: Contains the word fixed
  crit: component
  conf: 0.9
  for: [javascript, html]
  if:
    type: text
    substr: fixed
  count_max: 1008374
- id: firebug-lite-basename
  desc: Firebug Lite script basename
  crit: component
  conf: 0.95
  for: [javascript, html]
  if:
    type: path
    basename: true
    regex: '^firebugx?\.js$'
- id: iframe-url-cookie-mirror--rx-7
  desc: iframe location mirror marker
  crit: component
  conf: 0.88
  for: [javascript, html]
  if:
    type: text
    substr: iframe.contentDocument.location.href
  count_max: 1008376
- id: console-firebug-marker
  desc: console.firebug developer marker
  crit: component
  conf: 0.9
  for: [javascript, html]
  if:
    type: text
    substr: console.firebug
- id: console-methods-poisoned--rx-10
  desc: Console method noop poisoning pair
  crit: component
  conf: 0.78
  for: [javascript, html]
  if:
    type: text
    regex: console\.(log|warn)\s*=\s*noop[\s\S]{0,260}console\.(log|warn)\s*=\s*noop
