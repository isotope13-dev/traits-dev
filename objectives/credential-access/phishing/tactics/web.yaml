defaults:
  platforms: [unix, windows]
  for:
  - html
  - php
  - javascript
  attack: T1566.002
  mbc: B0030
traits:
- id: meta-refresh-redirect
  desc: Meta refresh redirect to external URL
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: (?i)http-equiv=['\"]Refresh['\"].{0,50}URL=https?://
- id: js-location-redirect
  desc: JavaScript redirect via window.location
  crit: suspicious
  conf: 0.7
  for:
  - javascript
  - html
  if:
    type: text
    regex: "window\\.location\\.(href|replace)\\s*=\\s*['\\\"]https?://"
- id: js-location-assign-redirect
  desc: JavaScript redirect via window.location assignment
  crit: suspicious
  conf: 0.72
  for:
  - javascript
  - html
  if:
    type: text
    regex: "window\\.location\\s*=\\s*['\\\"]https?://"
- id: js-dynamic-location-href-redirect
  desc: JavaScript redirects to dynamic URL
  crit: suspicious
  conf: 0.76
  for:
  - javascript
  - html
  if:
    type: text
    regex: "window\\.(top\\.)?location\\.href\\s*=\\s*[a-zA-Z_$]"
- id: unpkg-cdn-asset-load
  desc: Loads assets from unpkg npm CDN
  crit: suspicious
  conf: 0.7
  for:
  - html
  if:
    type: text
    regex: "unpkg\\.com/[a-z]"
- id: php-ip-logger-include
  desc: PHP include of IP-logging sidecar script
  crit: component
  conf: 0.8
  for: [php]
  if:
    type: string_literal
    regex: (?i)\bip\b.{0,20}\.php
- id: php-login-redirect
  desc: PHP header redirect to login page
  crit: component
  conf: 0.75
  for: [php]
  if:
    type: string_literal
    regex: (?i)Location:\s*login\.(html|php)
- id: php-real-ip-headers
  desc: PHP reads proxy-bypass IP headers
  crit: suspicious
  conf: 0.8
  for: [php]
  if:
    type: string_literal
    substr: HTTP_CLIENT_IP
- id: php-forwarded-ip-header
  desc: PHP reads X-Forwarded-For header
  crit: notable
  conf: 0.8
  for: [php]
  if:
    type: string_literal
    substr: HTTP_X_FORWARDED_FOR
- id: php-credential-label-account
  desc: PHP writes Account label for credentials
  crit: component
  conf: 0.9
  for: [php]
  if:
    type: string_literal
    substr: "Account: "
- id: php-credential-label-pass
  desc: PHP writes Pass label for credentials
  crit: component
  conf: 0.9
  for: [php]
  if:
    type: string_literal
    substr: " Pass: "
- id: js-ajax-social-login-intercept
  desc: AJAX intercept of social media login form
  crit: suspicious
  conf: 0.85
  for: [javascript, html]
  if:
    type: text
    regex: data-action=.{0,5}(instagram|facebook|twitter|tiktok)_login
- id: full-window-iframe-shell--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
