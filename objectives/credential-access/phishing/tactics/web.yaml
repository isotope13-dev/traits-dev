composite_rules:
- id: php-credential-exfiltration
  desc: PHP script writing POST data to local file
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/communications/http/request/params::post-dup
  - id: micro-behaviors/fs/file/write/direct::php-file-write-func
  unless:
  - id: php-mock-fixture
  - id: metadata/package/fields/compat::php-manual-empty-function-stubs
  - id: metadata/package/quality::has-tests
  - id: metadata/library/web-frameworks::wordpress-core-package-doc
  - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
  - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
  - id: metadata/library/web-frameworks::wordpress-core-api-symbols
- id: suspicious-brand-redirect
  desc: Redirect to known financial brand
  crit: suspicious
  conf: 0.8
  all:
  - id: meta-refresh-redirect
  - id: objectives/credential-access/financial/credit-card::mastercard-detection
- id: ssrf-bypass-redirect
  desc: Meta-refresh redirect to SSRF bypass service
  crit: hostile
  conf: 0.97
  attack: T1599
  all:
  - id: meta-refresh-redirect
  - id: objectives/exfiltration/oob/endpoint::bypass-eu-org
- id: js-oast-redirect
  desc: JavaScript redirect to OAST callback
  crit: suspicious
  conf: 0.92
  attack: T1599
  all:
  - id: objectives/exfiltration/oob/endpoint::oastify
  any:
  - id: js-location-redirect
  - id: js-location-assign-redirect
- id: web-phishing-kit-redirect
  desc: Phishing kit with credit card capture and redirect
  crit: hostile
  conf: 0.95
  all:
  - id: meta-refresh-redirect
  - id: objectives/credential-access/financial/credit-card::cvv-field
- id: web-phishing-kit-exfil
  desc: Phishing kit with credit card capture and PHP exfiltration
  crit: hostile
  conf: 0.95
  all:
  - id: php-credential-exfiltration
  - id: objectives/credential-access/financial/credit-card::cvv-field
- id: php-ip-harvester
  desc: PHP script logging visitor IP and user-agent
  crit: suspicious
  conf: 0.88
  all:
  - id: php-real-ip-headers
  - id: micro-behaviors/fs/file/write/direct::php-file-write-func
  any:
  - id: php-forwarded-ip-header
  - id: micro-behaviors/communications/http/request/params::server-dup
- id: php-phishing-kit-entry
  desc: Phishing kit entry page logs IP then redirects to login
  crit: suspicious
  conf: 0.9
  all:
  - id: php-ip-logger-include
  - id: php-login-redirect
- id: php-labeled-credential-harvest
  desc: PHP writes labeled social media credentials to file
  crit: hostile
  conf: 0.95
  all:
  - id: php-credential-label-account
  - id: php-credential-label-pass
  - id: php-credential-exfiltration
- id: php-social-media-phishing-kit
  desc: PHP social media credential phishing kit
  crit: hostile
  conf: 0.97
  any:
  - id: php-labeled-credential-harvest
  - id: php-phishing-kit-entry
- id: iframe-cookie-phishing-shell
  desc: Iframe phishing shell preserves target URL
  crit: hostile
  conf: 0.97
  all:
