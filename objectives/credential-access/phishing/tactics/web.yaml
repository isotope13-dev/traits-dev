- id: three-ds-password-field
  desc: 3DS password input field
  crit: component
  conf: 0.88
  for: [php, html]
  if:
    type: text
    regex: '(type=["'']password["'']|crd_3ds)'
- id: bank-account-sort-code-field
  desc: Bank account sort code field
  crit: component
  conf: 0.86
  for: [php, html]
  if:
    type: text
    regex: '(Sort code|crd_srt|crd_acc|account)'
composite_rules:
- id: cvv-input-field
  desc: CVV input field
  crit: component
  conf: 0.88
  any:
  - id: cvv-field-token
  - id: csc-number-field-token
  - id: crd-cv-field-token
  - id: crd-ttcv-field-token
- id: php-credential-exfiltration
  desc: PHP script writing POST data to local file
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/communications/http/request/params::post-dup
  any:
  - id: php-post-file-write-flow
  - id: php-post-file-write-flow-fputs
  - id: php-post-file-write-flow-put-contents
  - id: php-post-file-write-flow-open
  unless:
  - id: php-mock-fixture
  - id: metadata/package/manifest/compat::php-manual-empty-function-stubs
  - id: metadata/package/testing/
  - id: metadata/library/web-frameworks::wordpress-core-package-doc
  - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
  - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
  - id: metadata/library/web-frameworks::wordpress-core-api-symbols
  - id: metadata/lang/source::yara-rule-source
  - id: well-known/tool/detection/security-scanner::anteumbra-package-tree-member
- id: suspicious-brand-redirect
  desc: Redirect to known financial brand
  crit: suspicious
  conf: 0.8
  all:
  - id: micro-behaviors/ui/window/manage/navigation::browser-meta-refresh-external-url
  - id: micro-behaviors/data/format/card::mastercard-detection
- id: ssrf-bypass-redirect
  desc: Meta-refresh redirect to SSRF bypass service
  crit: hostile
  conf: 0.97
  attack: T1599
  all:
  - id: micro-behaviors/ui/window/manage/navigation::browser-meta-refresh-external-url
  - id: objectives/exfiltration/oob/endpoint::bypass-eu-org
- id: js-oast-redirect
  desc: JavaScript redirect to OAST callback
