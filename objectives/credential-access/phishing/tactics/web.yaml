  - id: card-number-input-field
  - id: cvv-input-field
  - id: three-ds-password-field
  any:
  - id: bank-account-sort-code-field
  - id: micro-behaviors/communications/http/request/client::post-method-text
- id: php-paypal-session-logged-card-phish
  desc: PayPal card phish with session-hashed logging
