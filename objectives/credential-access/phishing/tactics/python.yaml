# Credential phishing behavior - Python
# Detects Python scripts that collect credentials via input() and forward them
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1056.002
composite_rules:
  - id: oauth-password-grant-token-client
    desc: OAuth password-grant token client
    crit: exception
    conf: 0.9
    all:
      - id: micro-behaviors/communications/http/oauth::password-grant-type
      - id: micro-behaviors/communications/http/oauth::access-token
  # NOTE: the "username+password packed in a dict literal" capability is a
  # neutral credential-structuring pattern (every vault/auth client does it), so
  # it lives at objectives/credential-access/theft/keywords::credential-dict-pair
  # and is referenced cross-tier by the phishing composite below.
  - id: python-credential-phishing
    desc: Python script collects and forwards credentials
    crit: hostile
    conf: 0.95
    attack: T1556
    all:
      - id: micro-behaviors/ui/dialog/prompt::python-password-input-prompt
      - id: objectives/credential-access/theft/keywords::credential-dict-pair
    any:
      - id: micro-behaviors/communications/http/post::session-post
      - id: micro-behaviors/communications/http/post::session-post
      - id: micro-behaviors/communications/http/lib/requests::requests-post
    unless:
      - id: oauth-password-grant-token-client
