# Credential phishing behavior - Python
# Detects Python scripts that collect credentials via input() and forward them
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1056.002
traits:
  - id: input-password-prompt
    desc: Python input() prompts for password
    crit: notable
    conf: 0.9
    unless:
      - type: text
        substr: "Please enter the password of nacos"
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])input\([^)]{0,40}[Pp]assword'
  - id: input-username-prompt
    desc: Python input() prompts for username
    crit: component
    conf: 0.85
    unless:
      - type: text
        substr: "Please enter the username of nacos"
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_])input\([^)]{0,40}[Uu]sername'
composite_rules:
  # NOTE: the "username+password packed in a dict literal" capability is a
  # neutral credential-structuring pattern (every vault/auth client does it), so
  # it lives at micro-behaviors/data/text/keywords/credential::credential-dict-pair
  # and is referenced cross-tier by the phishing composite below.
  - id: python-credential-phishing
    desc: Python script collects and forwards credentials
    crit: hostile
    conf: 0.95
    attack: T1556
    all:
      - id: input-password-prompt
      - id: micro-behaviors/data/text/keywords/credential::credential-dict-pair
    any:
      - id: micro-behaviors/communications/http/post::session-post
      - id: micro-behaviors/communications/http/post::session-post-raw
      - id: micro-behaviors/communications/http/lib/requests::requests-post
  - id: python-credential-input-pair
    desc: Python prompts for both username and password
    crit: suspicious
    conf: 0.9
    all:
      - id: input-password-prompt
      - id: input-username-prompt
