# macOS JXA Phishing UI Traits
# Detects UI elements used for credential theft (fake password prompts)
# ATT&CK: T1056.002 (GUI Input Capture)
defaults:
  platforms: [macos]
  for: [javascript, applescript, shell, python, ruby, macho]
traits:
  - id: jxa-password-prompt
    desc: "JXA hidden-answer dialog option"
    crit: component
    conf: 0.9
    mbc: "B0032" # Obfuscation/UI
    if:
      type: text
      word: hiddenAnswer
composite_rules:
  - id: jxa-dialog-icon
    desc: "JXA dialog with custom icon option"
    crit: notable
    conf: 0.75
    near_bytes: 240
    all:
      - id: micro-behaviors/ui/dialog/apple::display-dialog-method-call
      - id: micro-behaviors/ui/dialog/apple::dialog-custom-icon-option
      - id: micro-behaviors/process/create/script/automation::include-standard-additions
