# macOS JXA Phishing UI Traits
# Detects UI elements used for credential theft (fake password prompts)
# ATT&CK: T1056.002 (GUI Input Capture)
defaults:
  platforms: [macos]
  for: [javascript, applescript, shell, python, ruby, macho]
traits:
  - id: jxa-password-prompt
    desc: "JXA dialog requesting hidden input (password)"
    crit: suspicious
    conf: 0.9
    mbc: "B0032" # Obfuscation/UI
    if:
      type: text
      substr: "hiddenAnswer"
  - id: jxa-dialog-icon-option
    desc: "JXA dialog custom icon option"
    crit: component
    conf: 0.7
    downgrade:
      any:
        - id: well-known/lib/xml2
        - id: well-known/lib/xslt
    if:
      type: text
      word: withIcon
  - id: jxa-display-dialog
    desc: "JXA displayDialog (UI creation)"
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: "\\bdisplayDialog\\s*\\("

composite_rules:
  - id: jxa-dialog-icon
    desc: "JXA dialog with custom icon (spoofing)"
    crit: notable
    conf: 0.75
    near_bytes: 240
    all:
      - id: jxa-display-dialog
      - id: jxa-dialog-icon-option
