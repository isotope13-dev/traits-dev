defaults:
  platforms: [macos]
  for: [macho]
  attack: T1056.002
  mbc: B0028
traits:
  - id: wait-screen-text
    desc: Waiting-screen decoy text
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: Please wait...
  - id: prompt-symbol
    desc: Credential prompt handler symbol
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: main\.\(\*[A-Za-z0-9_]{4,}\)\.Prompt
  - id: verify-symbol
    desc: Credential verify handler symbol
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: main\.\(\*[A-Za-z0-9_]{4,}\)\.Verify
  - id: password-string
    desc: Password collection string
    crit: notable
    conf: 0.85
    if:
      type: text
      word: Password
  - id: keychain-workflow-symbol
    desc: Keychain workflow handler symbol
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: main\.\(\*[A-Za-z0-9_]{4,}\)\.Kch
composite_rules:
  - id: compiled-password-prompt
    desc: Native password prompt flow
    crit: suspicious
    conf: 0.95
    all:
      - id: prompt-symbol
      - id: verify-symbol
      - id: password-string
  - id: wait-screen-decoy
    desc: Native wait-screen decoy
    crit: suspicious
    conf: 0.92
    all:
      - id: wait-screen-text
      - id: metadata/binary/framework::wails-compiled-ui
  - id: compiled-keychain-password-flow
    desc: Keychain-themed password harvest flow
    crit: suspicious
    conf: 0.96
    all:
      - id: compiled-password-prompt
      - id: keychain-workflow-symbol
