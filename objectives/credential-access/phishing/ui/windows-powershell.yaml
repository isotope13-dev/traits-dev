# Windows PowerShell credential phishing UI
defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1056.002
traits:
  - id: ps-system-credential-prompt-title
    desc: System operation credential prompt title
    crit: suspicious
    conf: 0.92
    if:
      type: string_literal
      exact: "Credentials are required to perform this operation"
  - id: ps-username-password-prompt-message
    desc: Username and password prompt message
    crit: notable
    conf: 0.85
    if:
      type: string_literal
      exact: "Please enter your user name and password."
  - id: ps-credential-output-username
    desc: Username output label
    crit: component
    conf: 0.85
    if:
      type: string_literal
      exact: "Username: "
  - id: ps-credential-output-password
    desc: Password output label
    crit: suspicious
    conf: 0.9
    if:
      type: string_literal
      exact: " Password: "
  - id: ps-credential-output-domain
    desc: Domain output label
    crit: component
    conf: 0.8
    if:
      type: string_literal
      exact: " Domain:"
  - id: ps-get-network-credential
    desc: Extracts prompted network credential
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bGetNetworkCredential\s*\('
composite_rules:
  - id: ps-credential-phish-output
    desc: PowerShell credential phishing output
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/ui/dialog/prompt::powershell-prompt-for-credential
      - id: ps-system-credential-prompt-title
      - id: ps-username-password-prompt-message
      - id: ps-credential-output-username
      - id: ps-credential-output-password
      - id: ps-credential-output-domain
  - id: ps-validated-credential-phish
    desc: PowerShell validated credential phishing
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/ui/dialog/prompt::powershell-prompt-for-credential
      - id: ps-get-network-credential
      - id: ps-credential-output-password
      - id: micro-behaviors/os/security/auth/verify::directoryservices-credential-validation
    any:
      - id: ps-system-credential-prompt-title
      - id: ps-username-password-prompt-message
