defaults:
  platforms: [windows, unix]
  for: [javascript, html]
  attack: T1566.002
  mbc: B0030
  crit: suspicious
  conf: 0.9

traits:
  - id: click-endpoint-with-email
    desc: Click redirect carries email
    conf: 0.94
    if:
      type: text
      regex: 'https?://.{1,160}/click\?.{0,240}[&?]email='

  - id: dating-campaign-click-params
    desc: Dating campaign click parameters
    conf: 0.9
    if:
      type: text
      regex: '[?&]s1=[a-z0-9]{2,16}.{0,180}[?&]s3=[a-z0-9:]{4,40}.{0,180}[?&]v=dating'

  - id: query-propagated-to-redirect
    desc: URL query propagated into redirect
    conf: 0.92
    if:
      type: text
      regex: 'window\.location\.search[\s\S]{0,240}(redirectURL|location\s*=)'

  - id: browser-profile-query-fields
    desc: Browser profile query fields
    conf: 0.93
    if:
      type: text
      regex: '[?&](ph|vd|fp|ft|tz|lg|ua|sc|gyro)='
    count_min: 5
    unless:
      - type: text
        substr: 'ft=music'

  - id: parklogic-router-endpoint
    desc: ParkLogic traffic router endpoint
    conf: 0.92
    if:
      type: text
      substr: "https://router.parklogic.com/"

  - id: browser-profile-router-fields
    desc: Browser profile fields posted to traffic router
    conf: 0.93
    if:
      type: text
      regex: 'adBlockingDetected[\s\S]{0,500}timezoneBrowser[\s\S]{0,500}webdriver[\s\S]{0,500}gpu'

  - id: xhr-response-location-redirect
    desc: XHR response-driven browser redirect
    conf: 0.93
    if:
      type: text
      regex: 'responseText\.startsWith\(["'']http["'']\)[\s\S]{0,400}window\.location\.replace\s*\('

  - id: constructed-location-redirect
    desc: Constructed window location redirect
    conf: 0.92
    if:
      type: text
      regex: 'redirectURL\s*=[\s\S]{0,600}window\.location\s*=\s*redirectURL'

  - id: fake-compliance-link-cluster
    desc: Fake compliance link cluster
    conf: 0.9
    if:
      type: text
      regex: 'href=["''].{1,180}/privacy["''][\s\S]{0,600}href=["''].{1,180}/unsub\?'

composite_rules:
  - id: profiled-click-redirect
    desc: Browser-profiled click redirect
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/discovery/system/fingerprint/browser::browser-encoded-fingerprint-profile
      - id: click-endpoint-with-email
      - id: browser-profile-query-fields
    any:
      - id: objectives/credential-access/phishing/tactics::js-location-assign-redirect
      - id: objectives/credential-access/phishing/tactics::js-location-redirect
      - id: constructed-location-redirect

  - id: propagated-query-click-redirect
    desc: Propagated query click redirect
    crit: hostile
    conf: 0.98
    all:
      - id: query-propagated-to-redirect
      - id: click-endpoint-with-email
      - id: dating-campaign-click-params
    any:
      - id: objectives/credential-access/phishing/tactics::js-location-assign-redirect
      - id: objectives/credential-access/phishing/tactics::js-location-redirect
      - id: constructed-location-redirect

  - id: traffic-broker-profile-harvest
    desc: Traffic broker profile harvest
    crit: hostile
    conf: 0.99
    all:
      - id: objectives/discovery/system/fingerprint/browser::browser-encoded-fingerprint-profile
      - id: browser-profile-query-fields
      - id: fake-compliance-link-cluster
    any:
      - id: click-endpoint-with-email
      - id: dating-campaign-click-params

  - id: parklogic-profiled-response-redirect
    desc: ParkLogic profiled response redirect
    crit: suspicious
    conf: 0.96
    all:
      - id: parklogic-router-endpoint
      - id: browser-profile-router-fields
      - id: xhr-response-location-redirect
    any:
      - id: objectives/anti-static/obfuscation/payload/encoded::js-base64-blob
      - id: micro-behaviors/data/encoded::base64-token
