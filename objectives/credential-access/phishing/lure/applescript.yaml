defaults:
  for:
    - applescript
    - shell
    - python
    - javascript
    - macho
  platforms:
    - macos
  attack: T1056.002
traits:
  - id: display-dialog-password
    desc: Display dialog asking for password
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?si)display dialog.{0,100}password
  - id: default-answer-password-dup
    desc: Default answer field for password
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?si)default answer.{0,100}password
  - id: icon-caution
    desc: Dialog with caution icon
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: with icon caution
  - id: icon-stop
    desc: Dialog with stop icon
    crit: suspicious
    conf: 0.7
    if:
      type: text
      substr: with icon stop
  - id: title-system-preferences
    desc: Dialog title mimicking System Preferences
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: with title "System Preferences"
  - id: enter-password-prompt
    desc: Prompts user to enter password
    crit: suspicious
    conf: 0.85
    for:
      - applescript
      - macho
      - shell
    if:
      type: text
      regex: (?i)(please\\s+)?enter(\\s+your)?\\s+password\\b
    downgrade:
      any:
        - id: metadata/import/ruby::highline
        - id: metadata/binary/vendor::system-component
        - id: metadata/signed/platform::apple
  - id: enter-admin-password-prompt
    desc: Prompts user to enter admin password
    crit: suspicious
    conf: 0.85
    for:
      - applescript
      - macho
      - shell
    if:
      type: text
      regex: (?i)enter(\\s+your)?\\s+admin\\s+password\\b
    downgrade:
      any:
        - id: metadata/import/ruby::highline
        - id: metadata/binary/vendor::system-component
        - id: metadata/signed/platform::apple
  - id: enter-system-password-prompt
    desc: Prompts user to enter system password
    crit: suspicious
    conf: 0.85
    for:
      - applescript
      - macho
      - shell
    if:
      type: text
      regex: (?i)enter(\\s+your)?\\s+system\\s+password\\b
    downgrade:
      any:
        - id: metadata/import/ruby::highline
        - id: metadata/binary/vendor::system-component
        - id: metadata/signed/platform::apple
  - id: enter-login-password-prompt
    desc: Prompts user to enter login password
    crit: suspicious
    conf: 0.85
    for:
      - applescript
      - macho
      - shell
    if:
      type: text
      regex: (?i)enter(\\s+your)?\\s+login\\s+password\\b
    downgrade:
      any:
        - id: metadata/import/ruby::highline
        - id: metadata/binary/vendor::system-component
        - id: metadata/signed/platform::apple
  - id: enter-account-password-prompt
    desc: Prompts user to enter account password
    crit: suspicious
    conf: 0.85
    for:
      - applescript
      - macho
      - shell
    if:
      type: text
      regex: (?i)enter(\\s+your)?\\s+account\\s+password\\b
    downgrade:
      any:
        - id: metadata/import/ruby::highline
        - id: metadata/binary/vendor::system-component
        - id: metadata/signed/platform::apple
  - id: enter-keychain-password-prompt
    desc: Prompts user to enter keychain password
    crit: suspicious
    conf: 0.85
    for:
      - applescript
      - macho
      - shell
    if:
      type: text
      regex: (?i)enter(\\s+your)?\\s+keychain\\s+password\\b
    downgrade:
      any:
        - id: metadata/import/ruby::highline
        - id: metadata/binary/vendor::system-component
        - id: metadata/signed/platform::apple
  - id: keychain-password
    desc: Asks for keychain password
    crit: suspicious
    conf: 0.9
    attack: T1555.001
    for:
      - applescript
      - shell
    if:
      type: text
      regex: (?i)\bkeychain password\b
  - id: admin-password-dup
    desc: Admin password phrase
    crit: component
    conf: 0.85
    for:
      - applescript
      - shell
    if:
      type: text
      regex: (?i)\badmin(istrator)?\s+password\b
    unless:
      - type: text
        regex: (?i)admin password required to install
      - id: metadata/file/text/format::sourcemap-sources-content
      - id: metadata/lang/javascript-features::sourcemap-sources-content
      # Provisioning/status output ("Admin user: X (password set: yes)") is not a
      # credential prompt — a lure asks for the password, it doesn't report one was
      # set/configured. `unless:` (scope-level) is required here; a `not:` only
      # filters the trait's own regex match, which ends at "password".
      - type: text
        regex: (?i)password\s+(set|configured)
      - id: admin-password-form-fixture-context
  - id: admin-password-form-fixture-context
    desc: Admin email password form fixture context
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: (?is)admin@[A-Za-z0-9._%+-]+\.[A-Za-z]{2,}.{0,80}password
  - id: hidden-answer
    desc: AppleScript hidden answer (password masking)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: with hidden answer
composite_rules:
  - id: password-prompt-pattern
    desc: Password dialog prompt
    crit: suspicious
    conf: 0.8
    any:
      - id: display-dialog-password
      - id: objectives/credential-access/phishing/lure::default-answer-password-dup
      - id: enter-password-prompt
      - id: enter-admin-password-prompt
      - id: enter-system-password-prompt
      - id: enter-login-password-prompt
      - id: enter-account-password-prompt
      - id: enter-keychain-password-prompt
    downgrade:
      any:
        - id: metadata/import/ruby::highline
  - id: fake-dialog-ui
    desc: Fake dialog UI element
    crit: suspicious
    conf: 0.7
    any:
      - id: hidden-answer
      - id: icon-caution
      - id: icon-stop
      - id: title-system-preferences
  - id: system-cred-prompt
    desc: System credential prompt
    crit: suspicious
    conf: 0.85
    any:
      - id: keychain-password
      - id: objectives/credential-access/phishing/lure::admin-password-dup
  - id: password-phishing-comp
    desc: AppleScript password phishing dialog
    crit: suspicious
    conf: 0.95
    all:
      - id: password-prompt-pattern
      - id: fake-dialog-ui
  - id: fake-system-prompt
    desc: Fake system password prompt (credential
    crit: suspicious
    conf: 0.9
    all:
      - id: system-cred-prompt
      - id: fake-dialog-ui
