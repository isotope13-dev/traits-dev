defaults:
  for: [shell, python, javascript, macho]
  platforms:
    - macos
  attack: T1056.002
traits:
  - id: display-dialog-password
    desc: Display dialog asking for password
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: (?si)display dialog.{0,100}password
  - id: default-answer-password-dup
    desc: Default answer field for password
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: (?si)default answer.{0,100}password
  - id: icon-caution
    desc: Dialog with caution icon
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: with icon caution
  - id: icon-stop
    desc: Dialog with stop icon
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: with icon stop
  - id: title-system-preferences
    desc: Dialog title mimicking System Preferences
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: with title "System Preferences"
  - id: enter-password-prompt
    desc: Prompts user to enter password
    crit: suspicious
    conf: 0.85
    for: [applescript]
    if:
      type: string_value
      regex: (?i)enter.{0,15}password
    downgrade:
      any:
        - id: metadata/import/ruby::highline
  - id: keychain-password
    desc: Asks for keychain password
    crit: suspicious
    conf: 0.9
    attack: T1555.001
    for: [applescript, shell]
    if:
      type: string_value
      regex: (?i)keychain.{0,30}password
  - id: admin-password-dup
    desc: Asks for admin password
    crit: suspicious
    conf: 0.85
    for: [applescript, shell]
    if:
      type: string_value
      regex: (?i)\badmin\b.{0,30}password
  - id: hidden-answer
    desc: AppleScript hidden answer (password masking)
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: with hidden answer
composite_rules:
  - id: password-prompt-pattern
    desc: Password dialog prompt
    crit: suspicious
    conf: 0.8
    any:
      - id: display-dialog-password
      - id: objectives/credential-access/phishing/lure::default-answer-password-dup
      - id: enter-password-prompt
    downgrade:
      any:
        - id: metadata/import/ruby::highline
  - id: fake-dialog-ui
    desc: Fake dialog UI element
    crit: notable
    conf: 0.7
    any:
      - id: hidden-answer
      - id: icon-caution
      - id: icon-stop
      - id: title-system-preferences
  - id: system-cred-prompt
    desc: System credential prompt
    crit: suspicious
    conf: 0.85
    any:
      - id: keychain-password
      - id: objectives/credential-access/phishing/lure::admin-password-dup
  - id: password-phishing-comp
    desc: AppleScript password phishing dialog
    crit: suspicious
    conf: 0.95
    all:
      - id: password-prompt-pattern
      - id: fake-dialog-ui
  - id: fake-system-prompt
    desc: Fake system password prompt (credential
    crit: suspicious
    conf: 0.9
    all:
      - id: system-cred-prompt
      - id: fake-dialog-ui
