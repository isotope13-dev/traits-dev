defaults:
  platforms: [macos, linux]
  for: [c, objc, elf, shell]
  attack: T1056.002

traits:
  - id: apple-id-shell-prompt
    desc: Apple ID shell prompt
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "read -p 'Apple ID:"

  - id: apple-password-shell-prompt
    desc: Apple password shell prompt
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: "read -sp 'Password:"

  - id: apple-creds-post-path
    desc: Apple creds POST path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/creds

composite_rules:
  - id: apple-id-shell-phishing-lure
    desc: Apple ID shell phishing lure
    crit: hostile
    conf: 0.98
    all:
      - id: apple-id-shell-prompt
      - id: apple-password-shell-prompt
      - id: apple-creds-post-path
