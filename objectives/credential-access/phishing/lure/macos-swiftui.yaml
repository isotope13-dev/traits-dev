defaults:
  platforms: [macos]
  for: [macho, swift, objc]
  attack: T1056.002

traits:
  - id: app-authentication-password-prompt
    desc: App authentication password prompt
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Enter your password to allow this.
  - id: app-authentication-lure
    desc: App authentication lure text
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: is trying to authenticate
  - id: fake-update-success
    desc: Fake update completion dialog
    crit: suspicious
    conf: 0.88
    if:
      type: text
      substr: Update Completed

composite_rules:
  - id: macos-password-phishing-prompt
    desc: macOS password phishing prompt
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/ui/window/form-input::macos-secure-text-field-control
      - id: app-authentication-password-prompt
    any:
      - id: app-authentication-lure
      - id: fake-update-success
  - id: macos-fake-update-password-phish
    desc: Fake update password phishing flow
    crit: hostile
    conf: 0.98
    all:
      - id: macos-password-phishing-prompt
      - id: fake-update-success
