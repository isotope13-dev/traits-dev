defaults:
  platforms: [routeros, appliance, windows]
  for: [powershell]
  attack: T1566.002

traits:
  - id: ps-network-auth-phish-title
    desc: PS network auth phish title
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: Network Authentication Required

  - id: ps-credential-expired-lure
    desc: PS credential expired lure
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: credentials have expired

  - id: ps-image-credential-collect
    desc: PS image credential collect
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /collect?u=

composite_rules:
  - id: ps-routeros-credential-phish-page
    desc: PS RouterOS credential phish
    crit: hostile
    conf: 0.98
    all:
      - id: ps-network-auth-phish-title
      - id: ps-credential-expired-lure
      - id: ps-image-credential-collect
      - id: micro-behaviors/fs/file/write/direct::powershell-set-content-call
