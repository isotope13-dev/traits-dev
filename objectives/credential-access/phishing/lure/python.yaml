# Social media follower scam lure - Python
# Detects scripts posing as Instagram/social follower tools
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1204.002
traits:
  - id: follower-tool-lure
    desc: Social media follower tool lure text
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: (?i)follower.{0,20}(login|send|boost)
  - id: instagram-keyword
    desc: Instagram lure text in script
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: (?i)\binsta(?:gram)?\b.{0,24}\b(login|verify|follower|boost)\b
  - id: takipci-domain
    desc: Turkish follower service domain
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: (?i)takip(ci|88)
