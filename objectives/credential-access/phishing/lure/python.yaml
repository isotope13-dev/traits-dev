# Social media follower scam lure - Python
# Detects scripts posing as Instagram/social follower tools
defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1204.002
traits:
  - id: follower-tool-lure
    desc: Social media follower tool lure text
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: (?i)follower.{0,20}(login|send|boost)
    unless:
      - type: path
        regex: '(^|[!/])torch/distributed/rpc/api\.py$'
  - id: instagram-keyword
    # Require the follower-scam promise verb (boost/free/hack), not bare
    # "login"/"verify"/"follower": those appear in every legitimate Instagram
    # API client (aiograpi, instagrapi) and error/redirect text, so anchoring on
    # them flags real clients. A phishing lure promises to boost/hack followers.
    desc: Instagram follower-scam lure text
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: (?i)\binsta(gram)?\b.{0,24}\b(boost|hack|free)\b
  - id: takipci-domain
    desc: Turkish follower service domain
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      regex: (?i)takip(ci|88)
