defaults:
  platforms: [unix]
  for: [swift]
  attack: T1566

traits:
  - id: swift-appleid-login-form
    desc: Swift Apple ID login form
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: POST /auth/verify

  - id: swift-appleid-redirect
    desc: Swift Apple ID redirect
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: https://appleid.apple.com

composite_rules:
  - id: swift-appleid-phishing-server
    desc: Swift Apple ID phishing server
    crit: hostile
    conf: 0.98
    all:
      - id: swift-appleid-login-form
      - id: swift-appleid-redirect
