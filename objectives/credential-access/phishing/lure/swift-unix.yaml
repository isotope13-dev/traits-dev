defaults:
  platforms: [unix]
  for: [swift]
  attack: T1566

traits:
  - id: swift-security-alert-phish
    desc: Swift security alert phish
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Critical Security Alert

  - id: swift-ssh-credential-harvest
    desc: Swift SSH credential harvest
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SSH SECURITY NOTICE

  - id: swift-deliver-phishing-post
    desc: Swift phishing POST
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /deliver/phishing

composite_rules:
  - id: swift-credential-phishing-lure
    desc: Swift credential phishing lure
    crit: hostile
    conf: 0.98
    all:
      - id: swift-security-alert-phish
      - id: swift-ssh-credential-harvest
    any:
      - id: swift-deliver-phishing-post
