defaults:
  platforms: [unix]
  for: [shell]
  attack: T1566

traits:
  - id: shell-account-verify-lure
    desc: Shell account verify lure
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(Verify Account Access|verify your account|account suspension)'

  - id: shell-sendmail-lure-loop
    desc: Shell sendmail lure loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'sendmail[\s\S]{0,220}wall'

  - id: shell-wall-verify-lure
    desc: Shell wall verify lure
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'verify your account[\s\S]{0,260}wall'

composite_rules:
  - id: shell-credential-phishing-lure
    desc: Shell credential phishing lure
    crit: hostile
    conf: 0.97
    all:
      - id: shell-account-verify-lure
    any:
      - id: shell-sendmail-lure-loop
      - id: shell-wall-verify-lure
