# Non-English phishing / scam lure vocabulary. These are collision-prone everyday
# words (钓鱼 is also literally "fishing"; golpe is also "a blow"; boleto is a
# legitimate Brazilian payment slip that banking trojans weaponize), so each is
# component-only — a triage hint surfaced for the analyst, never a verdict. The
# grouping composite exists so the building blocks are referenced and available
# to behavioral phishing composites that pair them with credential-capture intent.
defaults:
  platforms: [unix, windows, android]
  for: [scripts, source, binaries, documents]
  crit: component
  conf: 0.45
traits:
  - id: cn-phishing-term
    desc: Chinese phishing term (钓鱼)
    if:
      type: text
      substr: 钓鱼
  - id: es-scam-term
    desc: Spanish scam term (estafa)
    if:
      type: text
      substr: estafa
      case_insensitive: true
  - id: pt-scam-term
    desc: Portuguese scam term (golpe)
    conf: 0.4
    if:
      type: text
      word: golpe
      case_insensitive: true
  - id: pt-boleto-fraud-term
    desc: Brazilian boleto payment-slip lure (boleto)
    conf: 0.4
    if:
      type: text
      substr: boleto
      case_insensitive: true
composite_rules:
  - id: multilingual-phishing-scam-lexicon
    desc: Non-English phishing/scam lure term present
    crit: component
    conf: 0.45
    any:
      - id: cn-phishing-term
      - id: es-scam-term
      - id: pt-scam-term
      - id: pt-boleto-fraud-term
