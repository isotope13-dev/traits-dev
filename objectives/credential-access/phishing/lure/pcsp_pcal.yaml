defaults:
  platforms: [all]
  for: [pdf]
  attack: T1566
traits:
  - id: pcsp-pcal-lure-metadata
    desc: PCSP/PCAL phishing lure title metadata
    crit: hostile
    conf: 0.98
    if:
      type: hex
      pattern: "FE FF 00 4F 00 46 00 CD 00 43 00 49 00 4F 00 20 00 52 00 45 00 51 00 55 00 49 00 53 00 49 00 54 00 D3 00 52 00 49 00 4F 00 20 00 2D 00 20 00 50 00 43 00 53 00 50 00 2F 00 50 00 43 00 41 00 4C"

  - id: pcsp-pcal-lure-text
    desc: PCSP/PCAL phishing lure text
    crit: hostile
    conf: 0.98
    if:
      type: raw
      substr: "Liberação exclusiva mediante autenticação institucional"

  - id: pcsp-pcal-lure-target-real-pb
    desc: PCSP/PCAL lure target REAL P.B
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: "REAL P.B SOLUCOES E TECNOLOGIA LTDA"

  - id: pcsp-pcal-lure-target-lesley
    desc: PCSP/PCAL lure target Lesley Bezerra
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      substr: "Lesley Bezerra"
