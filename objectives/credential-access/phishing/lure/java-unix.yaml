defaults:
  platforms: [unix]
  for: [java, class, jar]
  attack: T1566

traits:
  - id: java-account-suspension-lure
    desc: Java account suspension lure
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Account Suspension Notice

  - id: java-login-verify-html
    desc: Java login verify HTML
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /tmp/.login_verify.html

  - id: java-collect-credentials-post
    desc: Java credential collect POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/collect[\s\S]{0,180}user=admin&pass='

composite_rules:
  - id: java-credential-phishing-lure
    desc: Java credential phishing lure
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: java-account-suspension-lure
      - id: java-login-verify-html
      - id: java-collect-credentials-post
