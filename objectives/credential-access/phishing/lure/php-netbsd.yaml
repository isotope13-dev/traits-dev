defaults:
  platforms: [netbsd, unix]
  for: [php]
  attack: T1566

traits:
  - id: php-root-password-label
    desc: PHP root password label
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(root|superuser)[^<\n]{0,100}(password|passwd)'

  - id: php-password-root-label
    desc: PHP password label names root
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)(password|passwd)[^<\n]{0,100}(root|superuser)'

  - id: php-curl-exfil-url
    desc: PHP cURL exfil URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: CURLOPT_URL            => "http://$TARGET_HOST/exfil"

composite_rules:
  - id: php-root-password-form
    desc: PHP root password form
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/ui/window/form-input::password-input-field-script
    any:
      - id: php-root-password-label
      - id: php-password-root-label
    near_lines: 60
  - id: php-root-password-phishing-exfil
    desc: PHP root password phishing exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-root-password-form
      - id: php-curl-exfil-url
