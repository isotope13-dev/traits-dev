defaults:
  platforms: [netbsd, unix]
  for: [php]
  attack: T1566

traits:
  - id: php-root-password-form
    desc: PHP root password form
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'name="password"[\s\S]{0,220}autocomplete="off"'

  - id: php-curl-exfil-url
    desc: PHP cURL exfil URL
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: CURLOPT_URL            => "http://$TARGET_HOST/exfil"

composite_rules:
  - id: php-root-password-phishing-exfil
    desc: PHP root password phishing exfil
    crit: hostile
    conf: 0.98
    all:
      - id: php-root-password-form
      - id: php-curl-exfil-url
