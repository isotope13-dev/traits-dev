defaults:
  platforms: [routeros, appliance]
  for: [javascript]
  attack: T1566

traits:
  - id: routeros-js-auth-portal-title
    desc: RouterOS JS auth portal title
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: RouterOS Authentication

  - id: routeros-js-password-input
    desc: RouterOS JS password input
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: input[type='password']

  - id: routeros-js-auth-action
    desc: RouterOS JS auth action
    crit: suspicious
    conf: 0.91
    if:
      type: text
      substr: action='/auth'

  - id: routeros-js-captive-portal-write
    desc: RouterOS JS captive portal write
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'file\.write\("/flash/captive-portal\.html"'

composite_rules:
  - id: routeros-js-auth-phishing-portal
    desc: RouterOS JS auth phishing portal
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-js-auth-portal-title
      - id: routeros-js-password-input
      - id: routeros-js-captive-portal-write
