defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: js-microsoft-logo
    desc: Microsoft logo reference
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      substr: Microsoft_logo.svg
    unless:
      - id: metadata/library/microsoft-auth::ests-login-runtime
  - id: js-microsoft-login-text
    desc: Microsoft login branding
    # Branding alone is incomplete phishing evidence (for example, a normal
    # connected-apps picker may contain "Microsoft 365").
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: Microsoft\s+(account|login|sign.?in|365)
    unless:
      - type: string_literal
        substr: Microsoft Visual
      - type: string_literal
        substr: Microsoft Corporation
      - id: well-known/app/vscode-marketplace::m365-agents-toolkit-vsix
      - id: metadata/library/microsoft-auth::ests-login-runtime
  - id: js-fake-login
    desc: Paired email and password form identifiers
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: 'emailInput.{0,400}passwordInput|passwordInput.{0,400}emailInput'
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::ruby-test-file
        - id: metadata/package/testing/presence/harness::ruby-integration-test
  - id: js-mfa-code-field-read
    desc: Reads page MFA or verification code field
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'auth[-_]?mfa[-_]?otp.{0,100}(load|value)'
      case_insensitive: true

  - id: js-sensitive-mfa-report
    desc: Reports a sensitive verification value
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'report\s*\(.{0,400}["'']sensitive["'']'
      case_insensitive: true
  - id: js-password-retry-error
    desc: Password retry error lure
    crit: suspicious
    conf: 0.82
    if:
      type: string_literal
      substr: Verify your password and try again
  - id: headlesschrome-match
    desc: Checks UA for HeadlessChrome bot
    crit: component
    conf: 0.8
    if:
      type: text
      regex: HeadlessChrome[\s\S]{0,80}(includes|indexOf|match)
  - id: is-headless-check
    desc: Headless browser detection call
    crit: component
    conf: 0.75
    if:
      type: text
      regex: isHeadless\s*[:=(]|detect.{0,20}headless
  - id: js-honeypot-field
    desc: Honeypot form field (anti-bot)
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: honeypot-field|class="honeypot"
  - id: js-document-lure
    desc: Document sharing/preview lure
    crit: component
    conf: 0.8
    unless:
      - type: basename
        regex: '\.po$'
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
    if:
      type: string_literal
      regex: Recent Files|RFQ\.pdf|CloudFiles|Specification\.pdf
composite_rules:
  - id: js-ms-branding-indicators
    desc: Microsoft branding indicators
    crit: component
    unless:
      - id: metadata/library/microsoft-auth::ests-login-runtime
    any:
      - id: js-microsoft-logo
      - id: js-microsoft-login-text
  - id: headlesschrome-checks
    desc: HeadlessChrome detection checks
    crit: component
    conf: 0.85
    any:
      - id: objectives/anti-analysis/sandbox-detect/tool-references::js-headlesschrome-ua-check
      - id: headlesschrome-match
  - id: js-bot-detection
    desc: Browser bot detection logic
    crit: component
    conf: 0.9
    any:
      - id: objectives/anti-analysis/sandbox-detect/tool-references::js-navigator-webdriver
      - id: headlesschrome-checks
      - id: is-headless-check
  - id: js-microsoft-phishing-page
    desc: Microsoft credential phishing page
    crit: hostile
    conf: 0.98
    attack: T1566.002
    all:
      - id: js-ms-branding-indicators
      - id: js-webmail-login-form
    any:
      - id: js-bot-detection
      - id: js-document-lure
      - id: js-honeypot-field
      - id: micro-behaviors/ui/window/manage/dom::session-sign-in-required-message
      - id: js-password-retry-error
  - id: js-webmail-login-form
    desc: Webmail login credential form
    crit: component
    conf: 0.9
    near_lines: 120
    all:
      - id: micro-behaviors/ui/window/manage/dom::email-input-field
      - id: micro-behaviors/ui/window/manage/dom::password-input-field
    any:
      - id: micro-behaviors/ui/window/manage/dom::signin-submit-label
      - id: js-fake-login

  - id: extension-mfa-code-collection
    desc: Extension reads and reports page MFA codes
    crit: hostile
    conf: 0.98
    attack: T1056.002
    scope: archive
    all:
      - id: metadata/permission/runtime::is-extension
      - id: js-mfa-code-field-read
      - id: js-sensitive-mfa-report
