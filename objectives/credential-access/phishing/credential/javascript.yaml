defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: js-microsoft-logo
    desc: Microsoft logo reference
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      substr: Microsoft_logo.svg
  - id: js-microsoft-login-text
    desc: Microsoft login branding
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: Microsoft\s+(account|login|sign.?in|365)
    unless:
      - type: string_literal
        substr: Microsoft Visual
      - type: string_literal
        substr: Microsoft Corporation
  - id: js-fake-login
    desc: Fake login form logic
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      regex: id="emailInput"|id="passwordInput"|name="login-password"|id="login_form"
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::ruby-test-file
        - id: metadata/package/testing::ruby-integration-test
  - id: js-email-input-field
    desc: Email input form field
    crit: component
    conf: 0.8
    if:
      type: text
      substr: type="email"
  - id: js-password-input-field
    desc: Password input form field
    crit: component
    conf: 0.82
    if:
      type: text
      substr: type="password"
  - id: js-signin-submit-button
    desc: Sign-in submit button
    crit: component
    conf: 0.78
    if:
      type: string_literal
      substr: Sign in
  - id: js-auth-timeout-lure
    desc: Session timeout login lure
    crit: suspicious
    conf: 0.82
    if:
      type: string_literal
      substr: Please sign in again to continue
  - id: js-password-retry-error
    desc: Password retry error lure
    crit: suspicious
    conf: 0.82
    if:
      type: string_literal
      substr: Verify your password and try again
  - id: webdriver-check
    desc: navigator.webdriver check
    crit: component
    conf: 0.9
    if:
      type: text
      regex: navigator\.webdriver
  - id: headlesschrome-match
    desc: HeadlessChrome string match
    crit: component
    conf: 0.8
    if:
      type: text
      regex: HeadlessChrome[\s\S]{0,80}(includes|indexOf|match)
  - id: is-headless-check
    desc: isHeadless or detect headless
    crit: component
    conf: 0.75
    if:
      type: text
      regex: isHeadless\s*[:=(]|detect.{0,20}headless
  - id: js-honeypot-field
    desc: Honeypot form field (anti-bot)
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: honeypot-field|class="honeypot"
  - id: js-document-lure
    desc: Document sharing/preview lure
    crit: suspicious
    conf: 0.8
    unless:
      - id: objectives/supply-chain/trojanized/app/context::cloud-storage-provider-config-ui
    if:
      type: string_literal
      regex: Recent Files|RFQ\.pdf|CloudFiles|Specification\.pdf
composite_rules:
  - id: js-ms-branding-indicators
    desc: Microsoft branding indicators
    crit: suspicious
    any:
      - id: js-microsoft-logo
      - id: js-microsoft-login-text
  - id: headlesschrome-checks
    desc: HeadlessChrome detection checks
    crit: component
    conf: 0.85
    any:
      - id: objectives/anti-analysis/sandbox-detect/heuristics::js-headlesschrome-ua-check
      - id: headlesschrome-match
  - id: js-bot-detection
    desc: Browser bot detection logic
    crit: component
    conf: 0.9
    any:
      - id: webdriver-check
      - id: headlesschrome-checks
      - id: is-headless-check
  - id: js-microsoft-phishing-page
    desc: Microsoft credential phishing page
    crit: hostile
    conf: 0.98
    attack: T1566.002
    all:
      - id: js-ms-branding-indicators
      - id: js-webmail-login-form
    any:
      - id: js-bot-detection
      - id: js-document-lure
      - id: js-honeypot-field
      - id: js-auth-timeout-lure
      - id: js-password-retry-error
  - id: js-webmail-login-form
    desc: Webmail login credential form
    crit: suspicious
    conf: 0.9
    all:
      - id: js-email-input-field
      - id: js-password-input-field
    any:
      - id: js-signin-submit-button
      - id: js-fake-login
