defaults:
  platforms: [windows, unix]
  for:
    - javascript
traits:
  - id: js-microsoft-logo
    desc: Microsoft logo reference
    crit: suspicious
    conf: 0.85
    if:
      type: string_literal
      substr: Microsoft_logo.svg
    unless:
      - id: metadata/library/microsoft-auth::ests-login-runtime
  - id: js-microsoft-login-text
    desc: Microsoft login branding
    # Branding alone is incomplete phishing evidence (for example, a normal
    # connected-apps picker may contain "Microsoft 365").
    crit: component
    conf: 0.8
    if:
      type: string_literal
      regex: Microsoft\s+(account|login|sign.?in|365)
    unless:
      - type: string_literal
        substr: Microsoft Visual
      - type: string_literal
        substr: Microsoft Corporation
      - id: well-known/app/vscode-marketplace::m365-agents-toolkit-vsix
      - id: metadata/library/microsoft-auth::ests-login-runtime
  - id: js-mfa-code-field-read
    desc: Reads page MFA or verification code field
    crit: suspicious
    conf: 0.94
    if:
      # Require an actual value read of the OTP field (.value / .val()), i.e.
      # capturing the code the user typed. Parsing server-response HTML to
      # merely *detect* the MFA form (cheerio `.load(html)("#auth-mfa-otpcode")`)
      # is login-flow step detection, not code theft, so `load` is excluded.
      type: text
      regex: 'auth[-_]?mfa[-_]?otp[\s\S]{0,100}\.(value\b|val\s*\()'
      case_insensitive: true

  - id: extension-remote-auth-endpoint
    desc: Calls remote auth endpoint
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: 'https?://[^"''\s]{1,180}/api/chrome-ext/auth|\$\{[^}]{1,160}\}/api/chrome-ext/auth'
      case_insensitive: true

  - id: extension-page-secret-selector
    desc: References Amazon MFA secret selector
    crit: component
    conf: 0.98
    if:
      type: text
      substr: '#sia-auth-app-formatted-secret'

  - id: extension-page-secret-value-read
    desc: Reads text following secret selector
    crit: component
    conf: 0.95
    if:
      type: text
      regex: 'secret[\s\S]{0,80}textContent'

  - id: js-sensitive-mfa-report
    desc: Report call tagged sensitive category
    # Matcher only proves a report()/log call passes a "sensitive" category
    # argument — a generic telemetry idiom (a seller tool reporting a
    # "needs verification code" status event tags it sensitive too). It is a
    # supporting fragment: theft intent comes from the paired OTP value-read
    # leg in the extension-mfa-code-collection composite, not this atom.
    crit: component
    conf: 0.8
    if:
      type: text
      regex: 'report\s*\(.{0,400}["'']sensitive["'']'
      case_insensitive: true
  - id: js-password-retry-error
    desc: Password retry error lure
    crit: suspicious
    conf: 0.82
    if:
      type: string_literal
      substr: Verify your password and try again
  - id: headlesschrome-match
    desc: Checks UA for HeadlessChrome bot
    crit: component
    conf: 0.8
    if:
      type: text
      regex: HeadlessChrome[\s\S]{0,80}(includes|indexOf|match)
  - id: is-headless-check
    desc: Headless browser detection call
    crit: component
    conf: 0.75
    if:
      type: text
      regex: isHeadless\s*[:=(]|detect.{0,20}headless
  - id: js-honeypot-field
    desc: Honeypot form field (anti-bot)
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: honeypot-field|class="honeypot"
  - id: js-document-lure
    desc: Document sharing/preview lure
    crit: component
    conf: 0.8
    unless:
      - type: basename
        regex: '\.po$'
      - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
    if:
      type: string_literal
      regex: Recent Files|RFQ\.pdf|CloudFiles|Specification\.pdf
composite_rules:
  - id: js-ms-branding-indicators
    desc: Microsoft branding indicators
    crit: component
    unless:
      - id: metadata/library/microsoft-auth::ests-login-runtime
    any:
      - id: js-microsoft-logo
      - id: js-microsoft-login-text
  - id: headlesschrome-checks
    desc: HeadlessChrome detection checks
    crit: component
    conf: 0.85
    any:
      - id: objectives/anti-analysis/sandbox-detect/tool-references::js-headlesschrome-ua-check
      - id: headlesschrome-match
  - id: js-bot-detection
    desc: Browser bot detection logic
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/os/sysinfo/platform/browser::navigator-webdriver-read
      - id: headlesschrome-checks
      - id: is-headless-check
  - id: js-microsoft-phishing-page
    desc: Microsoft credential phishing page
    crit: hostile
    conf: 0.98
    attack: T1566.002
    all:
      - id: js-ms-branding-indicators
      - id: js-webmail-login-form
    any:
      - id: js-bot-detection
      - id: js-document-lure
      - id: js-honeypot-field
      - id: micro-behaviors/ui/window/manage/dom::session-sign-in-required-message
      - id: js-password-retry-error
  - id: js-webmail-login-form
    desc: Webmail login credential form
    crit: component
    conf: 0.9
    near_lines: 120
    all:
      - id: micro-behaviors/ui/window/manage/dom::email-input-field
      - id: micro-behaviors/ui/window/form-input::password-input-field-script
    any:
      - id: micro-behaviors/ui/window/manage/dom::signin-submit-label
      - id: micro-behaviors/ui/window/manage/dom::js-paired-email-password-identifiers

  - id: extension-mfa-code-collection
    desc: Extension reads and reports page MFA codes
    crit: hostile
    conf: 0.98
    attack: T1056.002
    scope: archive
    all:
      - id: metadata/permission/runtime::is-extension
      - id: js-mfa-code-field-read
      - id: js-sensitive-mfa-report

  - id: extension-mfa-credential-phishing
    desc: MFA credential phishing in extension
    crit: hostile
    conf: 0.99
    attack: T1056.002,T1056.003,T1041
    scope: archive
    for: [crx, zip, archives]
    all:
      - id: metadata/permission/manifest::is-chrome-manifest
      - id: metadata/permission/host::host-shopping-sites
      - id: micro-behaviors/process/inject/webextension::webextension-scripting-execute
      - id: metadata/permission/manifest::permission-scripting
      - id: metadata/permission/active-tab::permission-active-tab
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: extension-remote-auth-endpoint
      - id: micro-behaviors/data/serialize/json::username-password-json-body
      - id: micro-behaviors/ui/window/manage/dom::dom-element-lookup--queryselector
      - id: extension-page-secret-selector
      - id: extension-page-secret-value-read

  - id: extension-page-mfa-secret-extraction
    desc: Reads MFA secret from page
    crit: suspicious
    conf: 0.98
    near_lines: 30
    all:
      - id: micro-behaviors/process/inject/webextension::webextension-scripting-execute
      - id: micro-behaviors/ui/window/manage/dom::dom-element-lookup--queryselector
      - id: extension-page-secret-selector
      - id: extension-page-secret-value-read
