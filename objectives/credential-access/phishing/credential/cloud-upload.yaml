defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript]
  attack: T1566.002
  mbc: B0030

traits:
- id: cloud-put-upload
  desc: Browser PUT upload request
  crit: suspicious
  conf: 0.84
  if:
    type: text
    regex: \bfetch\s*\([^)]{0,500}\bmethod\s*:\s*['"]PUT['"]

- id: aws-s3-browser-upload--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: \bfetch\s*\([^)]{0,500}s3\.[a-z0-9-]+\.amazonaws\.com

- id: aws-s3-browser-upload--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.88
  if:
    type: text
    regex: s3\.[a-z0-9-]+\.amazonaws\.com[\s\S]{0,500}\bfetch\s*\(

- id: credential-form-fields--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: type\s*=\s*["']email["'][\s\S]{0,900}type\s*=\s*["']password["']

- id: credential-form-fields--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: type\s*=\s*["']password["'][\s\S]{0,900}type\s*=\s*["']email["']

- id: password-retry-lure--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    substr: incorrect
- id: password-retry-lure--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    substr: try again
- id: password-retry-lure--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    substr: password
- id: password-retry-lure--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    substr: invalid
- id: password-retry-lure--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.84
  if:
    type: text
    substr: verify
- id: mailbox-repair-lure--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: (?i)(mailbox|email|outlook).{0,80}(repair|sync)
- id: mailbox-repair-lure--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: (?i)(mailbox|email|outlook).{0,80}(spam filter|health check)
- id: mailbox-repair-lure--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: (?i)(mailbox|email|outlook).{0,80}(configuration)
composite_rules:
- id: cloud-credential-upload
  desc: Credential phishing cloud upload
  crit: hostile
  conf: 0.96
  all:
  - id: credential-form-fields
  - id: cloud-put-upload
  any:
  - id: aws-s3-browser-upload
  - id: objectives/exfiltration/cloud::s3-amazonaws-domain
  - id: objectives/exfiltration/cloud::s3-regional-bucket-domain
  - id: password-retry-lure
  - id: mailbox-repair-lure
  needs: 2
- id: aws-s3-browser-upload
  desc: Browser upload to S3
  crit: suspicious
  conf: 0.88
  any:
  - id: aws-s3-browser-upload--rx-1
  - id: aws-s3-browser-upload--rx-2
  needs: 1
- id: credential-form-fields
  desc: Email password form fields
  crit: component
  conf: 0.86
  any:
  - id: credential-form-fields--rx-3
  - id: credential-form-fields--rx-4
  needs: 1
- id: password-retry-lure
  desc: Password retry phishing lure
  crit: component
  conf: 0.84
  any:
  - id: password-retry-lure--rx-5
  - id: password-retry-lure--rx-6
  - id: password-retry-lure--rx-7
  - id: password-retry-lure--rx-8
  - id: password-retry-lure--rx-9
  needs: 1
- id: mailbox-repair-lure
  desc: Mailbox repair phishing lure
  crit: suspicious
  conf: 0.86
  any:
  - id: mailbox-repair-lure--rx-10
  - id: mailbox-repair-lure--rx-11
  - id: mailbox-repair-lure--rx-12
  needs: 1
  unless:
  - id: metadata/library/structure::js-large-module-bundle

