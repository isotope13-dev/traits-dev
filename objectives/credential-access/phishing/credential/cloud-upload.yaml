defaults:
  platforms: [unix, windows]
  for: [html, javascript, typescript]
  attack: T1566.002
  mbc: B0030

traits:
  - id: cloud-put-upload
    desc: Browser PUT upload request
    crit: suspicious
    conf: 0.84
    if:
      type: text
      regex: \bfetch\s*\([^)]{0,500}\bmethod\s*:\s*['"]PUT['"]

  - id: aws-s3-browser-upload
    desc: Browser upload to S3
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: \bfetch\s*\([^)]{0,500}s3\.[a-z0-9-]+\.amazonaws\.com|s3\.[a-z0-9-]+\.amazonaws\.com[\s\S]{0,500}\bfetch\s*\(

  - id: credential-form-fields
    desc: Email password form fields
    crit: component
    conf: 0.86
    if:
      type: text
      regex: type\s*=\s*["']email["'][\s\S]{0,900}type\s*=\s*["']password["']|type\s*=\s*["']password["'][\s\S]{0,900}type\s*=\s*["']email["']

  - id: password-retry-lure
    desc: Password retry phishing lure
    crit: component
    conf: 0.84
    if:
      type: text
      regex: '["''][a-zA-Z0-9_ \-]{0,50}(?:incorrect|invalid|verify).{0,50}password[a-zA-Z0-9_ \-]{0,50}["'']|["''][a-zA-Z0-9_ \-]{0,50}password.{0,50}(?:incorrect|invalid|try again)[a-zA-Z0-9_ \-]{0,50}["'']'

  - id: mailbox-repair-lure
    desc: Mailbox repair phishing lure
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: (?i)(mailbox|email|outlook).{0,80}(repair|sync|spam filter|health check|configuration)
    unless:
      - id: metadata/library/structure::js-large-module-bundle

composite_rules:
  - id: cloud-credential-upload
    desc: Credential phishing cloud upload
    crit: hostile
    conf: 0.96
    all:
      - id: credential-form-fields
      - id: cloud-put-upload
    any:
      - id: aws-s3-browser-upload
      - id: objectives/exfiltration/cloud::s3-amazonaws-domain
      - id: objectives/exfiltration/cloud::s3-regional-bucket-domain
      - id: password-retry-lure
      - id: mailbox-repair-lure
    needs: 2
