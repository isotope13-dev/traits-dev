defaults:
  platforms: [unix, appliance]
  for: [ruby]
  attack: T1566.002

traits:
  - id: ruby-fake-login-form
    desc: Ruby fake login form
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '<form method="POST" action="/collect">[\s\S]{0,260}name="password"'

composite_rules:
  - id: ruby-phishing-credential-post
    desc: Ruby phishing credential POST
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-fake-login-form
      - id: objectives/exfiltration/stealer/credential/platform::ruby-net-http-collect-post
