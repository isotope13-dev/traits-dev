defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
    - html
traits:
  - id: verify-human-text
    desc: Text prompting user to verify
    crit: component
    conf: 0.5
    if:
      type: text
      substr: Verify you are human
      case_insensitive: true
  - id: completing-action-text
    desc: Text about completing action below
    crit: suspicious
    conf: 0.4
    if:
      type: text
      substr: completing the action below
  - id: verifying-text
    desc: Verifying progress text
    crit: component
    conf: 0.3
    if:
      type: text
      substr: Verifying...
  - id: spinner-i-element
    desc: Spinner UI element identifier
    crit: suspicious
    conf: 0.4
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_-])spinner-i([^A-Za-z0-9_-]|$)'
  - id: vfclick-element
    desc: Verification click element identifier
    crit: suspicious
    conf: 0.5
    if:
      type: text
      substr: vfclick
  - id: not-a-robot-text
    desc: CAPTCHA "not a robot" checkbox text
    crit: component
    conf: 0.6
    if:
      type: text
      regex: I('m|\s+am)\s+not\s+a\s+robot
      case_insensitive: true
  - id: just-a-moment-title
    desc: Cloudflare challenge page title
    crit: component
    conf: 0.7
    if:
      type: text
      substr: Just a moment...
  - id: checking-human-text
    desc: Challenge text checks for humanity
    crit: suspicious
    conf: 0.78
    if:
      type: text
      substr: Checking if you are human. This may take a few seconds.
  - id: review-security-connection-text
    desc: Review security of connection text
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: review the security of your connection before proceeding
  - id: cloudflare-footer-branding
    desc: Cloudflare security footer branding
    crit: suspicious
    conf: 0.78
    if:
      type: text
      regex: Platform performance and security.{0,40}Cloudflare
  - id: cloudflare-ray-id
    desc: Cloudflare Ray ID marker
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: Ray ID:\s*<code class=\"ray-id\">[a-z0-9]{12,20}</code>
  - id: fake-cloudflare-copyright
    desc: Fraudulent Cloudflare copyright notice
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: "&copy;.{0,10}20[0-9]{2}.{0,10}Cloudflare"
  - id: checking-browser-text
    desc: Fake browser verification progress text
    crit: component
    conf: 0.65
    if:
      type: text
      regex: "[Cc]hecking your browser"
  - id: security-check-heading
    desc: Security check heading in HTML
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: <h1>Security Check</h1>
  - id: bot-check-element
    desc: Bot-widget marker fragment
    # `botCheck` is also used by legitimate in-app bot/help widgets.  It is
    # only phishing evidence when combined with verification UI and flow
    # markers in checkbox-verification-flow below.
    crit: component
    conf: 0.6
    if:
      type: text
      substr: botCheck
  - id: verification-box-element
    desc: Verification box identifier fragment
    # A verification-box class is also used by legitimate KYC/account
    # verification widgets.  It is only a phishing component when combined
    # with the other fake-CAPTCHA flow markers below.
    crit: component
    conf: 0.55
    if:
      type: text
      substr: verification-box
  - id: loading-spinner-element
    desc: Loading spinner element identifier
    crit: component
    conf: 0.5
    unless:
      - id: metadata/lang/scripted::dts-declaration-file
    if:
      type: text
      word: loadingSpinner
  - id: captcha-click-handler
    desc: CAPTCHA click opens redirect tab
    crit: component
    conf: 0.92
    if:
      type: text
      substr: handleCaptchaClick
  - id: captcha-window-open-blank
    desc: CAPTCHA opens redirect tab
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'window\.open\(\s*[A-Za-z_$][\w$]*\s*,\s*[''"]_blank[''"]'
composite_rules:
  - id: captcha-click-window-open
    desc: CAPTCHA click opens redirect tab
    crit: suspicious
    conf: 0.92
    all:
      - id: captcha-click-handler
      - id: captcha-window-open-blank
    near_bytes: 2500
  - id: turnstile-ui-elements
    desc: Cloudflare Turnstile UI elements present
    crit: suspicious
    conf: 0.6
    any:
      - id: spinner-i-element
      - id: vfclick-element
  - id: turnstile-text-patterns
    desc: Multiple Turnstile verification text patterns
    crit: suspicious
    conf: 0.7
    needs: 3
    any:
      - id: verify-human-text
      - id: completing-action-text
      - id: well-known/app/cloudflare::turnstile-integration-url
      - id: micro-behaviors/ui/keywords::success-message-literal
      - id: verifying-text
  - id: turnstile-verify-with-ui
    desc: Verify human text with UI
    crit: suspicious
    conf: 0.8
    all:
      - id: verify-human-text
      - id: turnstile-ui-elements
  - id: cloudflare-turnstile
    desc: Fake Cloudflare Turnstile implementation (social
    crit: suspicious
    conf: 0.95
    mbc: B0021
    attack: T1204.001
    any:
      - id: turnstile-text-patterns
      - id: turnstile-verify-with-ui
  - id: cloudflare-turnstile-camouflaged
    desc: Cloudflare Turnstile lure with explicit Cloudflare branding
    crit: suspicious
    conf: 0.92
    all:
      - id: cloudflare-turnstile
    any:
      - id: objectives/evasion/masquerade/brand/keywords::cloudflare-html-title
      - id: well-known/app/cloudflare::turnstile-integration-url
  - id: cloudflare-turnstile-click-redirect
    desc: Cloudflare Turnstile click redirect
    crit: hostile
    conf: 0.96
    mbc: B0021
    attack: T1204.001
    all:
      - id: cloudflare-turnstile-camouflaged
      - id: captcha-click-window-open
  - id: cloudflare-style-verification-page
    desc: Cloudflare styled human verification page
    crit: suspicious
    conf: 0.94
    any:
      - id: verify-human-text
      - id: checking-human-text
      - id: review-security-connection-text
      - id: just-a-moment-title
      - id: cloudflare-footer-branding
      - id: cloudflare-ray-id
    needs: 4
  - id: fake-captcha-with-redirect
    desc: Fake CAPTCHA page with phishing redirect
    crit: hostile
    conf: 0.95
    mbc: B0021
    attack: T1204.001
    all:
      - id: not-a-robot-text
    any:
      - id: objectives/evasion/masquerade/brand/keywords::cloudflare-html-title
      - id: fake-cloudflare-copyright
      - id: checking-browser-text
      - id: security-check-heading
    needs: 2
  - id: recaptcha
    desc: Fake Google reCAPTCHA implementation
    crit: suspicious
    conf: 0.9
    mbc: B0021
    attack: T1204.001
    all:
      - id: not-a-robot-text
      - id: well-known/app/google-web::google-recaptcha-checkbox-element
      - id: well-known/app/google-web::google-recaptcha-url-fragment
    unless:
      - id: metadata/library/structure::google-tag-manager-bundle
      - id: well-known/app/google-web::google-recaptcha-api-loader
      - id: well-known/app/google-web::google-recaptcha-api-script
      - id: well-known/app/google-web::google-recaptcha-runtime
  - id: checkbox-verification-flow
    desc: Checkbox verification flow indicators
    crit: suspicious
    conf: 0.86
    needs: 3
    any:
      - id: bot-check-element
      - id: verification-box-element
      - id: loading-spinner-element
      - id: micro-behaviors/ui/keywords::success-message-literal
  - id: fake-verification-deaddrop-redirect
    desc: Fake verification redirects via GitHub deaddrop
    crit: hostile
    conf: 0.96
    mbc: B0021
    attack: T1204.001
    all:
      - id: checkbox-verification-flow
      - id: micro-behaviors/communications/http/download/github::github-raw-mutable-fetch
      - id: micro-behaviors/ui/window/manage/dom::browser-location-href-assign
