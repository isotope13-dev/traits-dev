defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript]
  crit: notable
  conf: 0.9
  attack: "T1566"

traits:
  - id: base64-c2-submit
    desc: Base64 hidden fetch submit
    crit: suspicious
    conf: 0.97
    if:
      type: raw
      regex: 'fetch\(window\.atob\(.{0,40}\)\+"\?id="'

  - id: base64-form-post
    desc: Base64 encoded form body
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'JSON\.stringify.{0,120}toString\("base64"'
    not:
      - substr: "JSON.stringify(this.sourcemap"

  - id: bank-login-copy
    desc: Bank login phishing copy
    conf: 0.92
    if:
      type: raw
      substr: "Login Online Banking"

  - id: pan-kyc-copy
    desc: PAN KYC banking lure
    conf: 0.9
    if:
      type: raw
      substr: "PAN KYC"

  - id: account-number-copy
    desc: Account number harvest field
    conf: 0.9
    if:
      type: raw
      substr: "Account Number"

  - id: cif-number-copy
    desc: CIF number harvest field
    conf: 0.9
    if:
      type: raw
      substr: "CIF Number"

  - id: date-of-birth-copy
    desc: Date of birth harvest field
    conf: 0.9
    if:
      type: raw
      substr: "Date of Birth"

  - id: card-number-copy
    desc: Card number harvest field
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      substr: "Card Number"

  - id: cvv-copy
    desc: CVV harvest field
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      word: "CVV"

  - id: atm-pin-copy
    desc: ATM PIN harvest field
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      substr: "ATM Pin"

  - id: one-time-password-copy
    desc: OTP harvest field copy
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      substr: "One Time Password"

  - id: otp-timer-copy
    desc: OTP countdown timer string
    crit: component
    conf: 0.88
    if:
      type: raw
      substr: "03:00"

  - id: invalid-otp-copy
    desc: Invalid OTP retry lure
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      substr: "Invalid one time password"

composite_rules:
  - id: account-identity-copy
    desc: Account identity harvest copy
    crit: suspicious
    conf: 0.96
    all:
      - id: account-number-copy
      - id: cif-number-copy
      - id: date-of-birth-copy

  - id: card-pin-copy
    desc: Card and ATM PIN copy
    crit: suspicious
    conf: 0.97
    all:
      - id: card-number-copy
      - id: cvv-copy
      - id: atm-pin-copy

  - id: otp-countdown-copy
    desc: OTP countdown phishing copy
    crit: suspicious
    conf: 0.96
    all:
      - id: one-time-password-copy
      - id: otp-timer-copy

  - id: staged-form-harvest-js
    desc: Banking credential harvest workflow in JS
    crit: hostile
    conf: 0.99
    all:
      - id: base64-c2-submit
      - id: base64-form-post
    any:
      - id: bank-login-copy
      - id: pan-kyc-copy
      - id: account-identity-copy
      - id: card-pin-copy
      - id: otp-countdown-copy
      - id: invalid-otp-copy

  - id: otp-phish-submit-js
    desc: OTP phishing submit flow in JS
    crit: hostile
    conf: 0.98
    all:
      - id: base64-c2-submit
      - id: base64-form-post
    any:
      - id: otp-countdown-copy
      - id: invalid-otp-copy
