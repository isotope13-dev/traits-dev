# Web-based phishing behaviors
# Detects suspicious redirects and credential collection patterns
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [html, php, javascript]
  attack: "T1566.002" # Phishing: Spearphishing Link
  mbc: "B0030"
traits:
  - id: meta-refresh-redirect
    desc: Meta refresh redirect to external URL
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: "(?i)http-equiv=['\\\"]Refresh['\\\"].{0,50}URL=https?://"
composite_rules:
  - id: php-credential-exfiltration
    desc: PHP script writing POST data to local file
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/data/user-input/request::post-dup
      - id: micro-behaviors/fs/file/write::php-file-write-func
    unless:
      - id: metadata/quality::has-tests
  - id: suspicious-brand-redirect
    desc: Redirect to known financial brand
    crit: suspicious
    conf: 0.8
    all:
      - id: meta-refresh-redirect
      - id: objectives/collection/financial/credit-card::mastercard-detection
  - id: web-phishing-kit-redirect
    desc: Phishing kit with credit card capture and redirect
    crit: hostile
    conf: 0.95
    all:
      - id: meta-refresh-redirect
      - id: objectives/collection/financial/credit-card::cvv-field
  - id: web-phishing-kit-exfil
    desc: Phishing kit with credit card capture and PHP exfiltration
    crit: hostile
    conf: 0.95
    all:
      - id: php-credential-exfiltration
      - id: objectives/collection/financial/credit-card::cvv-field
