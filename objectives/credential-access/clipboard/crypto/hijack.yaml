# Cryptocurrency Clipboard Hijacking
# Detects clipboard monitoring and crypto address replacement
# ATT&CK: T1115 (Clipboard Data)
defaults:
  for: [text, shell, ruby, python, javascript, php, powershell, vbs, applescript]
  attack: "T1115"
  mbc: "E1510"
traits:
  # Cryptocurrency address regex patterns (detecting regex in code)
  - id: btc-address-regex
    desc: Bitcoin address regex pattern
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: "\\^\\(bc1\\|\\[13\\]\\)"
  - id: btc-bech32-regex
    desc: Bitcoin bech32 address regex
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: "bc1[a-zA-HJ-NP-Z0-9]\\{25"
  - id: eth-address-regex
    desc: Ethereum address regex pattern
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: "0x[a-fA-F0-9]\\{40\\}"
  - id: xmr-address-regex
    desc: Monero address regex pattern
    crit: suspicious
    conf: 0.9
    if:
      type: string
      regex: "\\[48\\]\\[0-9AB\\]"
  - id: ltc-address-regex
    desc: Litecoin address regex pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: "\\^[LM3][a-km-zA-HJ-NP-Z1-9]\\{2"
  - id: doge-address-regex
    desc: Dogecoin address regex pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: "\\^D[5-9A-HJ-NP-U].{0,50}\\{2"
  - id: sol-address-regex
    desc: Solana address regex pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: "[1-9A-HJ-NP-Za-km-z]\\{32,44\\}"
  - id: xrp-address-regex
    desc: XRP address regex pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string
      regex: "\\^r[0-9a-zA-Z]\\{24"
  # Hardcoded crypto addresses (attacker wallets)
  - id: hardcoded-btc-addr
    desc: Hardcoded Bitcoin address
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: "\\b(bc1[ac-hj-np-z02-9]{38,58}|[13][a-km-zA-HJ-NP-Z1-9]{25,34})\\b"
    not:
      - regex: "^[0-9a-fA-F]+$"
      - regex: "^[13][A-Z0-9]+$"
      - regex: "^[13][a-z0-9]+$"
  # hardcoded-eth-addr: use canonical version from crypto-theft/clipboard/address-swap
  # (removed to avoid duplicate pattern)
  - id: hardcoded-xmr-addr
    desc: Hardcoded Monero address
    crit: notable
    conf: 0.7
    if:
      type: string
      regex: "\\b[48][0-9AB][1-9A-HJ-NP-Za-km-z]{93}\\b"
composite_rules:
  # Clipboard read/write capability
  - id: clipboard-rw
    desc: Clipboard read and write operations
    crit: notable
    conf: 0.8
    for: [pe, dll]
    all:
      - id: micro-behaviors/hardware/clipboard/access::get-clipboard-data
      - id: micro-behaviors/hardware/clipboard/access::set-clipboard-data
  # Crypto address patterns (any crypto)
  - id: crypto-address-patterns
    desc: Cryptocurrency address regex patterns
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: btc-address-regex
      - id: btc-bech32-regex
      - id: eth-address-regex
      - id: xmr-address-regex
      - id: ltc-address-regex
      - id: doge-address-regex
      - id: sol-address-regex
      - id: xrp-address-regex
  # Multiple hardcoded addresses
  - id: multi-wallet-addresses
    desc: Multiple hardcoded wallet addresses
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: hardcoded-btc-addr
      - id: objectives/impact/crypto-theft/clipboard::eth-address-hardcoded
      - id: hardcoded-xmr-addr
  # Clipboard crypto hijacker
  - id: clipboard-hijacker
    desc: Cryptocurrency clipboard hijacker
    crit: hostile
    conf: 0.95
    for: [pe, dll]
    all:
      - id: clipboard-rw
      - id: crypto-address-patterns
