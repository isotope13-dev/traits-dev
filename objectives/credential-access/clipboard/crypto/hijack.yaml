defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1115
  mbc: E1510
traits: []
composite_rules:
  - id: clipboard-rw
    desc: Clipboard read and write APIs
    crit: component
    conf: 0.8
    all:
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
      - id: micro-behaviors/os/clipboard/access::set-clipboard-data
  - id: clipboard-hijacker
    desc: Cryptocurrency clipboard hijacker
    crit: hostile
    conf: 0.95
    all:
      - id: clipboard-rw
      - id: micro-behaviors/data/format/crypto-address
