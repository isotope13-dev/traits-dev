defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  attack: T1115
  mbc: E1510
traits:
  - id: btc-address-regex
    desc: Bitcoin address regex pattern
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: \^\(bc1\|\[13\]\)
  - id: btc-bech32-regex
    desc: Bitcoin bech32 address regex
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: bc1[a-zA-HJ-NP-Z0-9]\{25
  - id: btc-chaos-regex
    desc: Chaos-style Bitcoin address regex pattern
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: '[a-km-zA-HJ-NP-Z1-9]{26,33}'
  - id: eth-address-regex
    desc: Ethereum address regex pattern
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: 0x[a-fA-F0-9]\{40\}
  - id: xmr-address-regex
    desc: Monero address regex pattern
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: \[48\]\[0-9AB\]
  - id: ltc-address-regex
    desc: Litecoin address regex pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: \^[LM3][a-km-zA-HJ-NP-Z1-9]\{2
  - id: doge-address-regex
    desc: Dogecoin address regex pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: \^D[5-9A-HJ-NP-U].{0,50}\{2
  - id: sol-address-regex
    desc: Solana address regex pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: '[1-9A-HJ-NP-Za-km-z]\{32,44\}'
  - id: xrp-address-regex
    desc: XRP address regex pattern
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: \^r[0-9a-zA-Z]\{24
  - id: hardcoded-btc-addr
    desc: Hardcoded Bitcoin address
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: \b(bc1[ac-hj-np-z02-9]{38,58}|[13][a-km-zA-HJ-NP-Z1-9]{25,34})\b
    not:
      - regex: ^[0-9a-fA-F]+$
      - regex: ^[13][A-Z0-9]+$
      - regex: ^[13][a-z0-9]+$
      - regex: ^[13](?:[A-Z][a-z0-9]+){2,}$
      - regex: (.)\1\1\1
  - id: hardcoded-xmr-addr
    desc: Hardcoded Monero address
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: \b[48][0-9AB][1-9A-HJ-NP-Za-km-z]{93}\b
composite_rules:
  - id: clipboard-rw
    desc: Clipboard read and write operations
    crit: notable
    conf: 0.8
    all:
      - id: micro-behaviors/os/clipboard/access::get-clipboard-data
      - id: micro-behaviors/os/clipboard/access::set-clipboard-data
  - id: crypto-address-patterns
    desc: Cryptocurrency address regex patterns
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: btc-address-regex
      - id: btc-bech32-regex
      - id: btc-chaos-regex
      - id: eth-address-regex
      - id: xmr-address-regex
      - id: ltc-address-regex
      - id: doge-address-regex
      - id: sol-address-regex
      - id: xrp-address-regex
  - id: multi-wallet-addresses
    desc: Multiple hardcoded wallet addresses
    crit: suspicious
    conf: 0.85
    needs: 2
    any:
      - id: hardcoded-btc-addr
      - id: objectives/impact/crypto-manipulation/clipboard::eth-address-hardcoded
      - id: hardcoded-xmr-addr
  - id: clipboard-hijacker
    desc: Cryptocurrency clipboard hijacker
    crit: hostile
    conf: 0.95
    all:
      - id: clipboard-rw
      - id: crypto-address-patterns
