# macOS Clipboard Monitoring/Stealing
# ATT&CK: T1115 (Clipboard Data)
defaults:
  attack: T1115
  for: [macho]
  platforms: [macos]
traits:
# Placeholder for macos specific atomic traits if needed
composite_rules:
  - id: macos-clipboard-monitor
    desc: macOS clipboard monitoring
    crit: suspicious
    conf: 0.8
    all:
      - id: micro-behaviors/hardware/clipboard/access::macos-nspasteboard
      - id: micro-behaviors/hardware/clipboard/access::macos-pasteboard-items
    downgrade:
      any:
        - id: metadata/apple::system-component
        - id: metadata/signed/platform::apple
  - id: macos-clipboard-context-stealer
    desc: macOS clipboard stealing with context (window watching)
    crit: hostile
    conf: 0.95
    mbc: "B0042" # System Information Discovery
    all:
      - id: objectives/impact/ui/manipulation::window-watcher
      - id: macos-clipboard-monitor
    downgrade:
      any:
        - id: metadata/apple::system-component
        - id: metadata/signed/platform::apple
