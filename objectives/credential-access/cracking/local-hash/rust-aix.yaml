defaults:
  platforms: [aix, unix]
  for: [rust]
  attack: T1110.002
traits:
  - id: rust-aix-security-passwd-read
    desc: Rust reads AIX security passwd
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/security/passwd
  - id: rust-password-dictionary-core
    desc: Rust core password dictionary
    crit: suspicious
    conf: 0.9
    count_min: 3
    if:
      type: text
      regex: '"(password|passw0rd|letmein|changeme)"'
    unless:
      - type: text
        regex: 'ResponseValidationHook::new|test_response_validation|detects_sensitive_content'
  - id: rust-password-dictionary-aix
    desc: Rust AIX password dictionary
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '"(db2inst1|c2admin|qwerty)"'
  - id: rust-bruteforce-password-loop
    desc: Rust brute-force password loop
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'attempt_brute_force[\s\S]{0,260}simple_hash'
composite_rules:
  - id: rust-aix-local-hash-cracking
    desc: Rust AIX local hash cracking
    crit: hostile
    conf: 0.97
    all:
      - id: rust-aix-security-passwd-read
      - id: rust-password-dictionary-core
    any:
      - id: rust-password-dictionary-aix
      - id: rust-bruteforce-password-loop
    needs: 1
