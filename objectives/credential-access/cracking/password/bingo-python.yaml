defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1110.002

traits:
  - id: hash-extraction-helper
    desc: Hash extraction helper
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: extract_hashes_from_text

  - id: hash-cracker-class
    desc: Password hash cracker implementation
    crit: notable
    conf: 0.95
    if:
      type: text
      substr: HashCracker

  - id: public-hash-cracking-service
    desc: Public hash-cracking service integration
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(crackstation|hashes\.com)'

  - id: hash-cracking-command-handler
    desc: Interactive password-cracking command handler
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'def\s+_cmd_crack\s*\('

composite_rules:
  - id: automated-password-hash-cracker
    desc: Automated password hash-cracking workflow
    crit: hostile
    conf: 0.98
    all:
      - id: hash-extraction-helper
      - id: hash-cracker-class
      - id: public-hash-cracking-service
      - id: hash-cracking-command-handler
