defaults:
  platforms: [qnx, unix]
  for: [perl]
  attack: T1110.002

traits:
  - id: qnx-perl-shadow-md5-crack
    desc: QNX Perl shadow MD5 crack
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,900}md5_hex'

  - id: qnx-perl-wordlist-crack
    desc: QNX Perl wordlist crack
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'password admin root toor qnx[\s\S]{0,260}123456'

  - id: qnx-perl-creds-exfil-api
    desc: QNX Perl creds exfil API
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/creds

  - id: qnx-perl-md5-word-crack-loop
    desc: QNX Perl MD5 word crack loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: my $md5 = md5_hex("$word")

composite_rules:
  - id: qnx-perl-shadow-credential-cracking
    desc: QNX Perl shadow credential cracking
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-shadow-md5-crack
      - id: qnx-perl-wordlist-crack
      - id: qnx-perl-creds-exfil-api

  - id: qnx-perl-wordlist-creds-exfil
    desc: QNX Perl wordlist creds exfil
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-perl-wordlist-crack
      - id: qnx-perl-md5-word-crack-loop
      - id: qnx-perl-creds-exfil-api
