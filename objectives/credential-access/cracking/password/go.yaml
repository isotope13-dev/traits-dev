defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1110.002

traits:
  - id: vault-wordlist-inputs
    desc: Vault and wordlist file inputs
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '(?i)wordlist file[\s\S]{0,120}vault file|vault file[\s\S]{0,120}wordlist file'

  - id: recovered-seed-password-output
    desc: Outputs recovered seed and password
    crit: notable
    conf: 0.96
    if:
      type: literal
      regex: 'Seed Phrase:[\s\S]{0,80}Vault Password'

composite_rules:
  - id: metamask-vault-wordlist-cracking
    desc: Wordlist-cracks MetaMask vault credentials
    crit: suspicious
    conf: 0.97
    all:
      - id: recovered-seed-password-output
      - id: vault-wordlist-inputs
      - id: objectives/credential-access/wallet/keywords::metamask-word
      - id: micro-behaviors/crypto/kdf/algorithm::pbkdf2
      - id: micro-behaviors/crypto/library/provider::aes-new-cipher
