# Credential Cracking Tools
# Detects tools used for credential cracking or hash manipulation
defaults:
  platforms: [windows, unix]
  for: [python]
traits:
  - id: kerberoast-function
    desc: Kerberoast function entrypoint
    crit: suspicious
    conf: 0.98
    for: [powershell]
    if:
      type: text
      substr: Invoke-Kerberoast
  - id: kerberos-requestor-token
    desc: Kerberos requestor token usage
    crit: notable
    conf: 0.97
    for: [powershell]
    if:
      type: text
      substr: KerberosRequestorSecurityToken
  - id: kerberoast-hash-output
    desc: Kerberoast ticket hash output
    crit: suspicious
    conf: 0.99
    for: [powershell]
    if:
      type: text
      substr: $krb5tgs$
  - id: domain-spn-ticket-function
    desc: Request domain SPN ticket helper
    crit: notable
    conf: 0.97
    for: [powershell]
    if:
      type: text
      substr: Get-DomainSPNTicket
composite_rules:
  - id: gui-hash-parser
    desc: "GUI-based Hash Parser/Generator"
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/ui/framework/tkinter::tkinter-init
      - id: micro-behaviors/data/text/parse::hash-algo-strings
      - id: micro-behaviors/os/clipboard/access::tkinter-clipboard-append
  - id: powershell-kerberoast-tooling
    desc: PowerShell Kerberoast credential cracking
    crit: hostile
    conf: 0.99
    attack: T1558.003
    for: [powershell]
    all:
      - id: kerberoast-function
      - id: kerberos-requestor-token
      - id: kerberoast-hash-output
    any:
      - id: domain-spn-ticket-function
      - id: objectives/discovery/account/lookup::powerview-ps1-header
    needs: 1
