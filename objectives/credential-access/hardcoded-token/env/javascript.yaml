# Hardcoded credential planting via environment variable assignment
# ATT&CK: T1552.001 (Credentials In Files)
defaults:
  for: [javascript, typescript]
  platforms: [linux, macos, windows, unix]
  attack: T1552.001
composite_rules:
  - id: env-credential-plant
    desc: Hardcoded secret token planted in process.env
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/env/vars::js-process-env-write
      - id: micro-behaviors/data/text/secrets
