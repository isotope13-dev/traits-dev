# admin username string
# Standard admin/administrator reference
defaults:
  for: [text, shell, ruby, python, javascript, php, powershell, vbs, applescript]
traits:
  - id: detected-dup
    desc: admin keyword
    crit: notable
    conf: 0.2
    attack: "T1110.001"
    mbc: "B0028"
    if:
      type: string
      word: "admin"
      case_insensitive: true
    unless:
      # Build/source path context (e.g. onecoreuap\admin\...\*.cpp) is not credential usage
      - type: string
        regex: '(?i)[\\/]admin[\\/]'
      - type: string
        regex: '(?i)[\\/]administrator[\\/]'
      - type: string
        regex: '(?i)onecoreuap\\\\admin\\\\'
