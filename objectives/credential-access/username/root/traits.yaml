# root username string
# Standard Unix root user reference
defaults:
  platforms: [linux, unix, macos, android, ios, windows]
traits:
  - id: detected-dup
    desc: root keyword
    crit: component
    conf: 0.2
    attack: "T1110.001"
    mbc: "B0028"
    for: [shell, python, c, cpp, go, rust]
    if:
      type: string
      exact: "root"
