defaults:
  platforms: [unix, windows]
  for: [php]
  crit: suspicious
  conf: 0.95
traits:
  - id: wp-set-auth-cookie
    desc: Sets WordPress auth cookie
    if:
      type: symbol
      exact: "wp_set_auth_cookie"
  - id: wp-set-current-user
    desc: Sets current WordPress user session
    if:
      type: symbol
      exact: "wp_set_current_user"
  - id: wp-get-users-admin
    desc: Queries WordPress for administrators
    if:
      type: text
      regex: 'get_users\s*\(\s*.{0,50}administrator'
  - id: wp-load-bootstrap
    desc: Bootstraps WordPress environment
    if:
      type: text
      regex: 'dirname\s*\(__FILE__\).{0,50}wp-load\.php'
composite_rules:
  - id: wp-session-hijack-logic
    desc: WordPress session hijacking logic
    all:
      - id: wp-set-auth-cookie
      - id: wp-set-current-user
  - id: wp-auto-login-backdoor
    desc: WordPress auto-login backdoor
    crit: hostile
    attack: T1505.003
    all:
      - id: wp-session-hijack-logic
      - id: wp-get-users-admin
      - id: wp-load-bootstrap
