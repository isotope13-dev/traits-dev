defaults:
  platforms: [unix, windows]
  for: [php]
  crit: suspicious
  conf: 0.95
traits:
  - id: wp-set-auth-cookie
    desc: Sets WordPress auth cookie
    crit: suspicious
    if:
      type: symbol
      exact: "wp_set_auth_cookie"
    unless:
      - id: metadata/library/web-frameworks::wordpress-core-package-doc
      - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
        - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
        - id: metadata/library/web-frameworks::wordpress-core-api-symbols
  - id: wp-set-current-user
    desc: Sets current WordPress user session
    crit: suspicious
    if:
      type: symbol
      exact: "wp_set_current_user"
    unless:
      - id: metadata/library/web-frameworks::wordpress-core-package-doc
      - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
        - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
        - id: metadata/library/web-frameworks::wordpress-core-api-symbols
  - id: wp-session-tokens-admin-marker
    desc: WordPress admin session tokens marker
    crit: baseline
    conf: 0.8
    if:
      type: text
      regex: 'session_tokens.{0,240}administrator'
  - id: wp-get-users-session-tokens-marker
    desc: WordPress get_users session tokens marker
    crit: baseline
    conf: 0.8
    if:
      type: text
      substr: session_tokens
  - id: wp-get-users-admin
    desc: Queries WordPress for administrators
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: 'get_users\s*\(\s*.{0,50}administrator'
    unless:
      - id: wp-session-tokens-admin-marker
      - id: wp-get-users-session-tokens-marker
  - id: wp-load-bootstrap
    desc: Bootstraps WordPress environment
    if:
      type: text
      regex: 'dirname\s*\(__FILE__\).{0,50}wp-load\.php'
composite_rules:
  - id: wp-session-hijack-logic
    desc: WordPress session hijacking logic
    crit: suspicious
    all:
      - id: wp-set-auth-cookie
      - id: wp-set-current-user
    unless:
      - id: metadata/library/web-frameworks::wordpress-core-package-doc
      - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
    downgrade:
      any:
        - id: metadata/library/web-frameworks::wordpress-core-package-doc
        - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
        - id: metadata/library/web-frameworks::wordpress-phpunit-test-case
        - id: metadata/library/web-frameworks::wordpress-core-api-symbols
  - id: wp-auto-login-backdoor
    desc: WordPress auto-login backdoor
    crit: hostile
    attack: T1505.003
    all:
      - id: wp-session-hijack-logic
      - id: wp-get-users-admin
      - id: wp-load-bootstrap
    unless:
      - id: metadata/library/web-frameworks::wordpress-core-package-doc
      - id: metadata/library/web-frameworks::wordpress-core-include-bootstrap
