# AWS SES credential validation ("does this stolen key still send mail?").
#
# The verification stage of an AWS SES credential-abuse tool: it takes parsed
# AWS SES SMTP rows (host / region / user / password) and confirms which ones
# are live and usable by driving a validated-SMTP backend, keeping only the
# working accounts for reuse. This is the step that turns a pile of leaked
# credentials into confirmed, abusable SES sending infrastructure.
#
# The verify atom is a notable capability on its own; the hostile verdict lives
# in the composite, which additionally requires obfuscator.io packing plus the
# validated-SMTP backend, so it will not fire on a benign SES deliverability
# tester or an ordinary mail-config validator.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1110.001
  mbc: E1110

traits:
  # `verifyAwsSesRow`-style entrypoint. `AwsSes` is required in the middle so
  # this does not collide with ordinary `verifySession` / `verifySignature`.
  - id: aws-ses-row-verifier
    desc: Verifies harvested AWS SES SMTP credential rows
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\bverify[A-Za-z0-9]*AwsSes[A-Za-z0-9]*\b'

composite_rules:
  # Obfuscated tool that both verifies AWS SES rows and drives a validated-SMTP
  # backend to keep the working accounts — the credential-validation half of the
  # harvest/validate/store pipeline, packed with javascript-obfuscator.
  - id: obfuscated-aws-ses-credential-validation
    desc: Obfuscated AWS SES SMTP credential verifier
    crit: hostile
    conf: 0.95
    attack: T1110.001,T1552.001,T1027
    all:
      - id: objectives/supply-chain/hidden-payload/runtime::obfuscator-io-toolkit-bundle
      - id: aws-ses-row-verifier
      - id: objectives/credential-access/theft/harvested-store::valid-smtp-backend-factory
    unless:
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
