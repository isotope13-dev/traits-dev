defaults:
  platforms: [unix]
  for: [shell]
  attack: T1552.001

traits:
- id: kubernetes-livez-client-cert-url
  desc: Kubernetes livez client-cert probe
  crit: component
  conf: 0.9
  ref: sha256:e4445eaa3155940f60991241a809409aa70b708303a0d07aa35b2e3d2bf76885
  if:
    type: text
    regex: 'https://.{1,120}:443/livez\?verbose'

composite_rules:
- id: kubernetes-client-cert-mtls-validation
  desc: Kubernetes client certificate validation
  crit: hostile
  conf: 0.99
  ref: sha256:e4445eaa3155940f60991241a809409aa70b708303a0d07aa35b2e3d2bf76885
  all:
  - id: objectives/credential-access/cloud/token/cli::kubernetes-client-cert-bundle-materialization
  - id: micro-behaviors/communications/http/tls::curl-mutual-tls
  - id: kubernetes-livez-client-cert-url
