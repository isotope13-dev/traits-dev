defaults:
  for:
    - shell
    - macho
    - applescript
  attack: T1110
  platforms:
    - macos
  crit: suspicious
traits:
  - id: dscl-dot-authonly
    desc: Validates user password via dscl
    crit: suspicious
    conf: 0.85
    attack: T1110.001
    mbc: E1110
    for:
      - shell
      - applescript
    if:
      type: text
      regex: dscl\s+\.\s+authonly
  - id: dslocal-db
    desc: Local user/password hash database path
    crit: suspicious
    conf: 0.7
    attack: T1003.008
    if:
      type: text
      substr: /var/db/dslocal
    unless:
      - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member
  - id: shadow-hash-data
    desc: macOS password hash blob key
    crit: suspicious
    conf: 0.7
    attack: T1003.008
    if:
      type: text
      substr: ShadowHashData
  - id: csidentity-query-create
    desc: Searches macOS user directory
    crit: suspicious
    conf: 0.75
    attack: T1087.001
    for:
      - macho
    if:
      type: symbol
      regex: CSIdentityQueryCreateForName
  - id: csidentity-query-execute
    desc: Executes macOS directory search
    crit: suspicious
    conf: 0.75
    attack: T1087.001
    for:
      - macho
    if:
      type: symbol
      regex: CSIdentityQueryExecute
  - id: csidentity-query-results
    desc: Retrieves macOS account results
    crit: suspicious
    conf: 0.75
    attack: T1087.001
    for:
      - macho
    if:
      type: symbol
      regex: CSIdentityQueryCopyResults
  - id: csidentity-authority
    desc: Accesses macOS user authority
    crit: suspicious
    conf: 0.7
    attack: T1087.001
    for:
      - macho
    if:
      type: symbol
      regex: CSGetDefaultIdentityAuthority
composite_rules:
  - id: dscl-authonly-comp
    desc: macOS password validation
    crit: suspicious
    conf: 0.95
    attack: T1110.001
    mbc: E1110
    any:
      - id: dscl-dot-authonly
      - id: micro-behaviors/os/security/auth/verify::dscl-authonly
  - id: shadow-hash
    desc: Accesses shadow password hashes
    crit: suspicious
    conf: 0.85
    attack: T1003.008
    for:
      - macho
      - applescript
    any:
      - id: dslocal-db
      - id: shadow-hash-data
      - id: micro-behaviors/os/privilege/paths::etc-shadow
  - id: csidentity-query
    desc: macOS CoreServices user enumeration
    crit: suspicious
    conf: 0.85
    attack: T1087.001
    for:
      - macho
    all:
      - id: csidentity-query-create
    any:
      - id: csidentity-query-execute
      - id: csidentity-query-results
  - id: csidentity-password-auth
    desc: macOS CoreServices password authentication
    crit: suspicious
    conf: 0.95
    attack: T1110.001
    mbc: E1110
    for:
      - macho
    all:
      - id: micro-behaviors/os/security/auth/verify::csidentity-auth
    any:
      - id: csidentity-query-create
      - id: csidentity-authority
  - id: validation-theft
    desc: macOS credential capture validation
    crit: suspicious
    conf: 0.95
    attack: T1110.001
    for:
      - shell
      - applescript
      - python
    all:
      - id: dscl-authonly
      - id: objectives/credential-access/phishing/ui::jxa-password-prompt
    any:
      - id: objectives/evasion/process/hidden/window::password-dialog
