# IMAP account credential checking.
#
# An "email account checker" takes an email/password pair from a combo list,
# auto-discovers the provider's IMAP server by probing/racing several
# candidate hosts, and reports whether the login succeeds — validating stolen
# credentials at scale. A legitimate mail client connects to the one server
# the user configured; racing a set of *candidate* servers to see which login
# takes is the checker discriminator.
#
# The atom matches the harvester's candidate-probe entrypoint. The hostile
# verdict lives in the composite, which also requires the ImapFlow client and
# obfuscator.io packing so it cannot fire on a benign auto-config helper.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1110.001
  mbc: E1110

traits:
  - id: imap-candidate-server-probe
    desc: Probes multiple candidate IMAP servers
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      exact: tryImapCandidates

composite_rules:
  - id: obfuscated-imap-credential-checker
    desc: Obfuscated ImapFlow account credential checker
    crit: hostile
    conf: 0.95
    all:
      - id: imap-candidate-server-probe
      - id: micro-behaviors/communications/email/access/imap::imapflow-library-import
      - id: objectives/supply-chain/hidden-payload/runtime::obfuscator-io-toolkit-bundle
