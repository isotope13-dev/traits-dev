# SMTP credential checking ("valid SMTP" backend).
#
# The results backend of an SMTP combo checker: it parses credential lines
# (host:port:user:pass / email:pass), decides which pairs are complete and
# "actionable", classifies the provider, and skips sandbox mail catchers such
# as Mailtrap so only real, working mail accounts are kept. This is the
# validation stage of harvesting working SMTP credentials from a stolen combo
# list — the raw material spammers use to send from trusted infrastructure.
#
# Each atom is a notable capability on its own. The hostile verdict lives in
# the composite, which also requires obfuscator.io packing, so it will not
# fire on an ordinary mail-config parser or deliverability tester.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1110.001
  mbc: E1110

traits:
  - id: smtp-combo-line-parse
    desc: Parses SMTP host:port:user:pass combo lines
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: parseSmtpLine

  - id: smtp-complete-credential-check
    desc: Tests SMTP credential completeness
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: isCompleteValidCredential

  - id: smtp-actionable-credential-check
    desc: Tests whether SMTP credentials are usable
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: hasActionableCredentials

  - id: smtp-acceptable-credential-check
    desc: Tests SMTP credential acceptability
    crit: notable
    conf: 0.9
    if:
      type: symbol
      exact: isAcceptableSmtpCredential

  - id: mailtrap-sandbox-host-exclusion
    desc: Skips Mailtrap sandbox mail hosts
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: isMailtrapHost

composite_rules:
  - id: smtp-credential-check
    desc: Parses and validates SMTP combo credentials
    crit: suspicious
    conf: 0.9
    all:
      - id: smtp-combo-line-parse
    any:
      - id: smtp-complete-credential-check
      - id: smtp-actionable-credential-check
      - id: smtp-acceptable-credential-check

  - id: obfuscated-smtp-credential-checker
    desc: Obfuscated SMTP combo credential checker
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/supply-chain/hidden-payload/runtime::obfuscator-io-toolkit-bundle
    any:
      - id: smtp-combo-line-parse
      - id: smtp-complete-credential-check
      - id: smtp-actionable-credential-check
      - id: smtp-acceptable-credential-check
      - id: mailtrap-sandbox-host-exclusion
    needs: 3
