# Obfuscated validated-SMTP-credential live-hits writer.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. The results module survives with a distinctive,
# un-encrypted private API that streams confirmed-working ("live") SMTP accounts
# — the validated output of the toolkit's SMTP credential checker — to an append
# file in real time, tagged with provider / smtp-type / verified state. These
# identifiers are attack-context-specific fragments of that toolkit; convicts
# only when several co-occur inside obfuscator.io-obfuscated code. The live
# append-stream / stream-record-write mechanics are the neutral fs atoms in
# micro-behaviors/fs/write/file/stream/, referenced cross-tier below.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1110
  mbc: E1110

traits:
  - id: live-smtp-writer
    desc: LiveSmtpWriter validated-hits writer class
    crit: component
    conf: 0.8
    if:
      type: text
      substr: LiveSmtpWriter
  - id: write-chunk-live
    desc: writeChunkLive live-hits chunk writer
    crit: component
    conf: 0.8
    if:
      type: text
      substr: writeChunkLive

composite_rules:
  # Require the SMTP-specific LiveSmtpWriter class; the write-stream helpers
  # (writeStreamLineLive/writeChunkLive/createLiveAppendStream) are shared across
  # the toolkit's result-writers (leak backend, result-hook, …), so they are
  # only supporting evidence — anchoring on them alone mislabels sibling modules.
  - id: smtp-live-hits-write-api
    desc: Private validated-SMTP live-hits write API
    crit: suspicious
    conf: 0.9
    all:
      - id: live-smtp-writer
    any:
      - id: write-chunk-live
      - id: micro-behaviors/fs/write/file/stream::node-stream-record-write
      - id: micro-behaviors/fs/write/file/stream::node-live-append-stream
  - id: obfuscated-smtp-live-hits-writer
    desc: Obfuscated validated-SMTP-credential live-hits writer
    crit: hostile
    conf: 0.95
    all:
      - id: smtp-live-hits-write-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
