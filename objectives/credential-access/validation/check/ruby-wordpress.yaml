defaults:
  platforms: [unix, windows]
  for: [ruby]
  attack: T1110.001
  mbc: E1110

traits:
  - id: wordpress-xmlrpc-login-method
    desc: WordPress XML-RPC login method
    crit: component
    conf: 0.9
    if:
      type: text
      substr: wp.getUsersBlogs

  - id: ruby-wordlist-password-loop
    desc: Ruby password wordlist iteration
    crit: component
    conf: 0.86
    if:
      type: text
      regex: 'File\.open\(wordlist_path\)[\s\S]{0,900}passwords_from_wordlist'

  - id: xmlrpc-multicall-login-attempts
    desc: XML-RPC multicall login attempts
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'methods\s*<<\s*\[\s*[''"]wp\.getUsersBlogs[''"][\s\S]{0,240}target\.multi_call'

composite_rules:
  - id: wordpress-xmlrpc-credential-validation
    desc: WordPress XML-RPC credential validation
    crit: suspicious
    conf: 0.94
    all:
      - id: wordpress-xmlrpc-login-method
      - id: ruby-wordlist-password-loop
      - id: xmlrpc-multicall-login-attempts
