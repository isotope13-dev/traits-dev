defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.85
  attack: T1555
traits:
  - id: nordvpn-path
    desc: NordVPN application path
    if:
      type: text
      regex: 'NordVPN[/\\]'
  - id: nordvpn-config
    desc: NordVPN user.config file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: NordVPN[/\\].{0,50}user\.config
  - id: protonvpn-path
    desc: ProtonVPN application path
    if:
      type: text
      regex: 'ProtonVPN[/\\]'
  - id: protonvpn-config
    desc: ProtonVPN configuration access
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: ProtonVPN[/\\].{0,50}\.config
  - id: openvpn-path
    desc: OpenVPN application path
    if:
      type: text
      regex: 'OpenVPN[/\\]'
    not:
      - substr: OpenVPN Inc
      - substr: OpenVPN Technologies
    downgrade:
      any:
        - id: metadata/binary/resource/
  - id: openvpn-config-dir
    desc: OpenVPN config directory
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: OpenVPN[/\\]+config
  - id: auth-user-pass
    desc: OpenVPN auth-user-pass directive
    crit: component
    conf: 0.8
    if:
      type: text
      word: auth-user-pass
  - id: globalprotect-config-1
    desc: GlobalProtect VPN configuration path
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: GlobalProtect
    unless:
      - id: metadata/library/win32-bindings::win32more-generated-bindings
composite_rules:
  - id: vpn-credential-stealer
    desc: VPN credential stealer detected
    crit: suspicious
    conf: 0.95
    needs: 2
    any:
      - id: nordvpn-config
      - id: protonvpn-config
      - id: openvpn-config-dir
      - id: auth-user-pass
  - id: multi-vpn-targeting
    desc: Multiple VPN clients targeted
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: nordvpn-path
      - id: protonvpn-path
      - id: openvpn-path
    unless:
      - id: well-known/tool/detection/
      - id: well-known/tool/detection/
      - id: metadata/file/string/identity::pkgbuild-basename
