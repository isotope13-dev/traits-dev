defaults:
  platforms: [unix]
  for: [zig]
  attack: T1552.001

traits:
  - id: zig-vpn-config-path-set
    desc: Zig VPN config path set
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/openvpn/[\s\S]{0,320}/etc/wireguard/'

  - id: zig-vpn-env-secret-set
    desc: Zig VPN secret env set
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'VPN_PASSWORD[\s\S]{0,260}WG_PRIVATE_KEY'

  - id: zig-vpn-credential-markers
    desc: Zig VPN credential markers
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'auth-user-pass[\s\S]{0,260}private_key'

composite_rules:
  - id: zig-vpn-credential-harvest
    desc: Zig VPN credential harvest
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: zig-vpn-config-path-set
      - id: zig-vpn-env-secret-set
      - id: zig-vpn-credential-markers
