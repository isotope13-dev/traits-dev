defaults:
  platforms: [openbsd, bsd, unix]
  for: [shell]
  attack: T1552.001
  mbc: E1552

traits:
  - id: openbsd-ipsec-secret-path
    desc: OpenBSD IPsec secret path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /etc/ipsec.secrets

  - id: openbsd-ppp-config-path
    desc: OpenBSD PPP config path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /etc/ppp/ppp.conf

  - id: openbsd-ssl-private-pem
    desc: OpenBSD SSL private PEM path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /etc/ssl/private/*.pem

composite_rules:
  - id: openbsd-shell-vpn-secret-harvest
    desc: OpenBSD shell harvests VPN secrets
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: openbsd-ipsec-secret-path
      - id: openbsd-ppp-config-path
      - id: openbsd-ssl-private-pem
      - id: objectives/credential-access/vpn/config::openvpn-path

