defaults:
  platforms: [routeros, appliance, unix]
  for: [go]
  attack: T1552.001

traits:
  - id: routeros-go-runinformation
    desc: Go RouterOS RunInformation call
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: client.RunInformation

  - id: routeros-go-vpn-secret-labels
    desc: Go RouterOS VPN secret labels
    crit: suspicious
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: '(ppp-secret|ipsec-secret|ipsec-policy)'

composite_rules:
  - id: routeros-go-vpn-secret-harvest
    desc: Go RouterOS VPN secret harvest
    crit: hostile
    conf: 0.98
    all:
      - id: routeros-go-runinformation
      - id: routeros-go-vpn-secret-labels
