defaults:
  platforms: [routeros, appliance]
  for: [python, pyc]
  attack: T1552.001

traits:
  - id: routeros-api-ppp-secret-query
    desc: RouterOS API PPP secret query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /ppp/secret/print

  - id: routeros-api-ipsec-secret-query
    desc: RouterOS API IPsec secret query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/interface/ipsec/(identity|peer)/print'

  - id: routeros-api-wireless-secret-query
    desc: RouterOS API wireless secret query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /wireless/security-profiles/print

  - id: routeros-api-hotspot-user-query
    desc: RouterOS API hotspot user query
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /ip/hotspot/user/print

composite_rules:
  - id: routeros-api-vpn-secret-query-set
    desc: RouterOS API VPN secret queries
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: routeros-api-ppp-secret-query
      - id: routeros-api-ipsec-secret-query
      - id: routeros-api-wireless-secret-query
      - id: routeros-api-hotspot-user-query
