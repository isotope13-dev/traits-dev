defaults:
  platforms: [openbsd, bsd, unix]
  for: [go, elf]
  attack: T1552.001

traits:
  - id: go-openbsd-mygate-path
    desc: Go OpenBSD mygate path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/mygate
    unless:
      - id: well-known/tool/sysadmin/unix-benign::openbsd-cloud-agent
      - type: basename
        exact: cloud-agent

  - id: go-openbsd-mygate-secret-path
    desc: Go OpenBSD mygate secret path
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: /etc/mygate.secret

  - id: go-openbsd-pf-conf-path
    desc: Go OpenBSD pf.conf path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /etc/pf.conf

composite_rules:
  - id: go-openbsd-vpn-config-theft
    desc: Go OpenBSD VPN config theft
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: go-openbsd-mygate-path
      - id: go-openbsd-mygate-secret-path
      - id: go-openbsd-pf-conf-path
