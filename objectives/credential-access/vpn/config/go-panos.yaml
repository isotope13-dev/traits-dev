defaults:
  platforms: [panos, appliance, unix]
  for: [go, elf]
  attack: T1552

traits:
  - id: go-panos-vpn-secret-paths
    desc: Go PAN-OS VPN secret paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/ipsec\.secrets[\s\S]{0,120}/etc/ppp/chap-secrets'

  - id: go-panos-openvpn-client-key
    desc: Go PAN-OS OpenVPN client key
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: client.key

composite_rules:
  - id: go-panos-vpn-credential-theft
    desc: Go PAN-OS VPN credential theft
    crit: hostile
    conf: 0.98
    all:
      - id: go-panos-vpn-secret-paths
      - id: go-panos-openvpn-client-key
