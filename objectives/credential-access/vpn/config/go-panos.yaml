defaults:
  platforms: [panos, appliance, unix]
  for: [go, elf]
  attack: T1552

traits:
  - id: go-panos-vpn-secret-paths
    desc: Go PAN-OS VPN secret paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/ipsec\.secrets[\s\S]{0,120}/etc/ppp/chap-secrets'

composite_rules:
  # The OpenVPN/TLS client config & key file references are generic path
  # capabilities — relocated to micro-behaviors/fs/path/sensitive/credentials and
  # referenced cross-directory. Theft intent comes from the secret-paths cluster.
  - id: go-panos-openvpn-client-key
    desc: Go PAN-OS OpenVPN client key
    crit: suspicious
    conf: 0.94
    all:
      - id: micro-behaviors/fs/path/sensitive/credentials::vpn-tls-client-cert-refs
      - id: micro-behaviors/fs/path/sensitive/credentials::tls-client-key-path
    near_bytes: 240
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file

  - id: go-panos-vpn-credential-theft
    desc: Go PAN-OS VPN credential theft
    crit: hostile
    conf: 0.98
    all:
      - id: go-panos-vpn-secret-paths
      - id: go-panos-openvpn-client-key
