defaults:
  platforms: [panos, appliance, unix]
  for: [go, elf]
  attack: T1552

traits:
  - id: go-panos-vpn-secret-paths
    desc: Go PAN-OS VPN secret paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/ipsec\.secrets[\s\S]{0,120}/etc/ppp/chap-secrets'

  # Generic VPN/TLS config references — the bare word "openvpn"/".ovpn" and the
  # "client.key" filename appear in OpenVPN itself, NetworkManager (nmcli/nmtui),
  # nvim, git-lfs, etc. No standalone signal; building blocks for the credential-
  # theft composites below, which require the ipsec.secrets/chap-secrets cluster.
  - id: go-panos-openvpn-context
    desc: Go PAN-OS OpenVPN context
    crit: component
    conf: 0.94
    if:
      type: text
      regex: '(?i)openvpn|client\.crt|ca\.crt|\.ovpn'

  - id: go-panos-client-key-path
    desc: Go PAN-OS client key path
    crit: component
    conf: 0.94
    if:
      type: text
      substr: client.key

composite_rules:
  - id: go-panos-openvpn-client-key
    desc: Go PAN-OS OpenVPN client key
    crit: suspicious
    conf: 0.94
    all:
      - id: go-panos-openvpn-context
      - id: go-panos-client-key-path
    near_bytes: 240
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file

  - id: go-panos-vpn-credential-theft
    desc: Go PAN-OS VPN credential theft
    crit: hostile
    conf: 0.98
    all:
      - id: go-panos-vpn-secret-paths
      - id: go-panos-openvpn-client-key
