defaults:
  platforms: [unix, windows]
  for: [scripts]
  attack: T1528
traits:
  - id: token-prefix-ai-cloud
    desc: AI cloud token prefixes
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(sk-ant-|sk-\(proj-\)|dop_v1_)'
  - id: token-prefix-saas
    desc: SaaS token prefixes
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(xox\[baprs\]|SG\\\.|hvs\\\.)'
  - id: secret-env-ai-vault
    desc: AI vault environment secrets
    crit: component
    conf: 0.86
    count_min: 2
    if:
      type: text
      regex: '\b(ANTHROPIC_API_KEY|OPENAI_API_KEY|GRAFANA_CLOUD_API_KEY|VAULT_TOKEN)\b'
  - id: secret-env-digital-discord
    desc: Digital Discord environment secrets
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(DIGITALOCEAN_ACCESS_TOKEN|DISCORD_TOKEN)\b'
    count_min: 2
  - id: secret-env-account-aws
    desc: Account AWS environment secrets
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(OP_SERVICE_ACCOUNT_TOKEN|AWS_SECRET_ACCESS_KEY)\b'
    count_min: 2
  - id: redaction-credentials-marker
    desc: Credential redaction marker
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'redact(ed)?_credentials|RedactionHit|\[REDACTED:'
composite_rules:
  - id: multi-service-secret-service-catalog
    desc: Multi-service API names catalog
    crit: component
    conf: 0.92
    needs: 2
    any:
      - id: metadata/file/catalog/service::ai-vault-service-names
      - id: metadata/file/catalog/service::messaging-mail-service-names
      - id: metadata/file/catalog/service::finance-service-names
      - id: metadata/file/catalog/service::cloud-saas-service-names
    unless:
      - id: redaction-credentials-marker
      - id: metadata/package/quality/false-positives::benign-app-fp-context
  - id: multi-service-api-key-harvest-catalog
    desc: Multi-service API key harvest catalog
    crit: suspicious
    conf: 0.9
    all:
      - id: multi-service-secret-service-catalog
      - id: objectives/credential-access/env/harvesting::credential-access-notable
    any:
      - id: token-prefix-ai-cloud
      - id: token-prefix-saas
      - id: secret-env-ai-vault
      - id: secret-env-digital-discord
      - id: secret-env-account-aws
    unless:
      - id: well-known/tool/detection/sast/
      - id: well-known/tool/detection/sast/
      - id: micro-behaviors/process/interpreter/vm/
      - id: metadata/library/runtime::vscode-webview-bundle
      - id: metadata/library/runtime::acquire-vscode-api
      - id: well-known/tool/detection/llm-scanner/
      - id: redaction-credentials-marker
