defaults:
  platforms: [unix, windows]
  for: [scripts]
  attack: T1528
traits:
  - id: ai-vault-service-names
    desc: AI vault service names
    crit: component
    conf: 0.82
    count_min: 2
    if:
      type: text
      regex: '\b(Anthropic|OpenAI|Vault|Grafana)\b'
  - id: messaging-mail-service-names
    desc: Messaging mail service names
    crit: component
    conf: 0.82
    count_min: 2
    if:
      type: text
      regex: '\b(Slack|SendGrid|Mailgun|Twilio)\b'
  - id: finance-service-names
    desc: Finance crypto service names
    crit: component
    conf: 0.82
    count_min: 2
    if:
      type: text
      regex: '\b(Binance|Coinbase|Kraken|Stripe)\b'
  - id: cloud-saas-service-names
    desc: Cloud SaaS service names
    crit: component
    conf: 0.82
    count_min: 2
    if:
      type: text
      regex: '\b(DigitalOcean|Discord|OnePassword|GitHub)\b'
  - id: token-prefix-ai-cloud
    desc: AI cloud token prefixes
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(sk-ant-|sk-\(proj-\)|dop_v1_)'
  - id: token-prefix-saas
    desc: SaaS token prefixes
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '(xox\[baprs\]|SG\\\.|hvs\\\.)'
  - id: secret-env-ai-vault
    desc: AI vault environment secrets
    crit: component
    conf: 0.86
    count_min: 2
    if:
      type: text
      regex: '\b(ANTHROPIC_API_KEY|OPENAI_API_KEY|GRAFANA_CLOUD_API_KEY|VAULT_TOKEN)\b'
  - id: secret-env-digital-discord
    desc: Digital Discord environment secrets
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(DIGITALOCEAN_ACCESS_TOKEN|DISCORD_TOKEN)\b'
    count_min: 2
  - id: secret-env-account-aws
    desc: Account AWS environment secrets
    crit: component
    conf: 0.86
    if:
      type: text
      regex: '\b(OP_SERVICE_ACCOUNT_TOKEN|AWS_SECRET_ACCESS_KEY)\b'
    count_min: 2
composite_rules:
  - id: multi-service-secret-service-catalog
    desc: Multi-service secret catalog
    crit: suspicious
    conf: 0.92
    needs: 2
    any:
      - id: ai-vault-service-names
      - id: messaging-mail-service-names
      - id: finance-service-names
      - id: cloud-saas-service-names
  - id: multi-service-api-key-harvest-catalog
    desc: Multi-service API key harvest catalog
    crit: hostile
    conf: 0.96
    all:
      - id: multi-service-secret-service-catalog
    any:
      - id: token-prefix-ai-cloud
      - id: token-prefix-saas
      - id: secret-env-ai-vault
      - id: secret-env-digital-discord
      - id: secret-env-account-aws
      - id: objectives/credential-access/env/harvesting::credential-access-notable
