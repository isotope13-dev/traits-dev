defaults:
  platforms: [windows, unix]
  for:
    - python
  attack: T1528
traits:
  - id: wildcard-oauth-scope
    desc: Wildcard OAuth scope request
    crit: suspicious
    conf: 0.88
    for: [scripts]
    ref: sha256:6f3972835d9ebdf69f562a91e68091769d80de62467e6c129d53f810de7f539a
    if:
      type: text
      regex: 'scope\s*=\s*["'']\*:\*:\*["'']|body\s*:\s*`scope=\$\{scope\}`'
composite_rules:
  - id: browser-storage-oauth-token-harvest
    desc: Browser storage OAuth token harvesting
    crit: hostile
    conf: 0.96
    mbc: B0028
    for: [scripts]
    ref: sha256:6f3972835d9ebdf69f562a91e68091769d80de62467e6c129d53f810de7f539a
    all:
      - id: micro-behaviors/data/db/web-storage::window-localstorage-getitem
      - id: micro-behaviors/communications/http/oauth::access-token
    any:
      - id: micro-behaviors/process/create/script/automation::playwright-page-evaluate
      - id: wildcard-oauth-scope
    unless:
      - id: well-known/app/litellm::litellm-package-path
  - id: browser-profile-jwt-token-harvest
    desc: Browser profile JWT token harvesting
    crit: hostile
    conf: 0.97
    mbc: B0028
    for: [scripts]
    ref: sha256:6f3972835d9ebdf69f562a91e68091769d80de62467e6c129d53f810de7f539a
    all:
      - id: micro-behaviors/data/string/search::jwt-compact-regex
      - id: micro-behaviors/fs/path/sensitive/browser::chromium-leveldb-local-storage
    any:
      - id: micro-behaviors/fs/read/file::python-pathlib-read-bytes
      - id: micro-behaviors/fs/enumerate/directory/
