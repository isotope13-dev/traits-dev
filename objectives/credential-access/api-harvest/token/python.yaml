defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
  attack: T1528
traits:
  - id: api-key-parameter
    desc: Function parameter named api_key
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: api_key\s*[:\)]
  - id: bearer-fstring
    desc: Bearer token via f-string interpolation
    crit: notable
    conf: 0.8
    if:
      type: string_value
      regex: Bearer\s*\{[a-z_]+\}
  - id: api-key-in-auth-header
    desc: API key interpolated in Authorization
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: Bearer.{0,20}\{api_key\}
