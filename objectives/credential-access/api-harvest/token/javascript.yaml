defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1528
traits:
  - id: github-pat-regex-harvest
    desc: GitHub PAT regex harvesting
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: ghp_[A-Za-z0-9]{36}
  - id: github-oauth-token-prefix-check
    desc: GitHub OAuth token prefix marker
    crit: notable
    conf: 0.8
    if:
      type: text
      substr: "gho_"
  - id: npm-token-regex-harvest
    desc: npm token regex harvesting
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: npm_[A-Za-z0-9]{36,}
composite_rules:
  - id: github-token-pattern-harvest
    desc: Harvests GitHub token patterns from local data
    crit: suspicious
    conf: 0.95
    any:
      - id: github-pat-regex-harvest
      - id: github-oauth-token-prefix-check
  - id: git-and-registry-token-harvest
    desc: GitHub/npm token regex harvesting
    crit: hostile
    conf: 0.97
    all:
      - id: github-token-pattern-harvest
      - id: npm-token-regex-harvest
