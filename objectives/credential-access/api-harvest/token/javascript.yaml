defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1528
traits:
  - id: trufflehog-filesystem-root-scan
    desc: Runs TruffleHog filesystem root scan
    crit: suspicious
    conf: 0.96
    for: [javascript, typescript, shell]
    platforms: [unix]
    if:
      type: text
      regex: 'trufflehog\s+filesystem\s+/'
  - id: github-pat-regex-harvest
    desc: GitHub PAT regex pattern
    crit: component
    conf: 0.95
    if:
      type: text
      substr: ghp_[A-Za-z0-9]{36}
  - id: github-oauth-token-prefix-check
    desc: GitHub OAuth token prefix marker
    crit: component
    conf: 0.8
    if:
      type: text
      substr: "gho_"
  - id: npm-token-regex-harvest
    desc: npm token regex pattern
    crit: component
    conf: 0.95
    if:
      type: text
      substr: npm_[A-Za-z0-9]{36,}
composite_rules:
  - id: github-token-pattern
    desc: GitHub token pattern marker
    crit: component
    conf: 0.95
    any:
      - id: github-pat-regex-harvest
      - id: github-oauth-token-prefix-check
  - id: github-token-pattern-harvest
    desc: Harvests GitHub token patterns from local data
    crit: suspicious
    conf: 0.95
    near_lines: 40
    all:
      - id: github-token-pattern
    any:
      - id: micro-behaviors/fs/file/read::read-node
      - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
    unless:
      - id: well-known/tool/detection/sast/
      - id: well-known/tool/detection/sast/
      - id: well-known/tool/detection/security-scanner/
      - id: well-known/tool/detection/redaction/
  - id: git-and-registry-token-harvest
    desc: GitHub/npm token regex harvesting
    crit: hostile
    conf: 0.97
    all:
      - id: github-token-pattern-harvest
      - id: npm-token-regex-harvest
