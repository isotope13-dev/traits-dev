# Obfuscated SendGrid API-key harvester + verifier.
#
# Component of an obfuscator.io-protected offensive webmail toolkit whose payload
# strings are RC4-encrypted. This module harvests SendGrid API keys (scraping
# `SG.`-shaped tokens out of text, `isSendgridApiKey`), verifies each stolen key
# live against the SendGrid API (`verifySendgridCredential`), and writes the
# working keys to a result folder — giving the operator hijacked bulk-mail
# sending capacity. These identifiers are attack-context-specific fragments of
# that toolkit; convicts only when several co-occur inside obfuscator.io-
# obfuscated code (T1528 application access-token theft).
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1528
  mbc: E1528

traits:
  - id: extract-sendgrid-from-text
    desc: extractSendgridFromText key scraper
    crit: component
    conf: 0.8
    if:
      type: text
      substr: extractSendgridFromText
  - id: is-sendgrid-api-key
    desc: isSendgridApiKey SG token validator
    crit: component
    conf: 0.8
    if:
      type: text
      substr: isSendgridApiKey
  - id: verify-sendgrid-credential
    desc: verifySendgridCredential live key check
    crit: component
    conf: 0.8
    if:
      type: text
      substr: verifySendgridCredential
  - id: sendgrid-buckets
    desc: SENDGRID_BUCKETS result classifier
    crit: component
    conf: 0.8
    if:
      type: text
      substr: SENDGRID_BUCKETS
  - id: build-sendgrid-result-line
    desc: buildSendgridResultLine hits formatter
    crit: component
    conf: 0.8
    if:
      type: text
      substr: buildSendgridResultLine

composite_rules:
  - id: sendgrid-key-harvest-api
    desc: Private SendGrid API-key harvest/verify API
    crit: suspicious
    conf: 0.9
    needs: 2
    any:
      - id: extract-sendgrid-from-text
      - id: is-sendgrid-api-key
      - id: verify-sendgrid-credential
      - id: sendgrid-buckets
      - id: build-sendgrid-result-line
  - id: obfuscated-sendgrid-key-harvester
    desc: Obfuscated SendGrid API-key harvester and live verifier
    crit: hostile
    conf: 0.95
    all:
      - id: sendgrid-key-harvest-api
    any:
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::string-array-rotation
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling
