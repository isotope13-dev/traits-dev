# Crypto key-handling config labels (serialized fields referencing key
# material). Reusable across families that store/transport encryption keys.
defaults:
  platforms: [unix, windows]
  for: [scripts, source, binaries]
traits:
  - id: encryption-key-label
    desc: encryption_key serialized field label
    crit: notable
    conf: 0.6
    if:
      type: text
      substr: "encryption_key:"
