defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: wallet-token
  desc: Wallet keyword
  crit: component
  conf: 0.4
  if:
    type: text
    word: wallet
  unless:
  - id: well-known/lib/supabase::auth-js-web3-module
- id: metamask-word
  desc: MetaMask wallet keyword
  crit: component
  conf: 0.5
  for: [scripts, binaries, source]
  if:
    type: text
    word: metamask
- id: mnemonic-word
  desc: Mnemonic keyword
  crit: component
  conf: 0.5
  for:
  - python
  - javascript
  - typescript
  - csharp
  - java
  - go
  if:
    type: text
    word: mnemonic
  not:
  - substr: "denotes a mnemonic"
  - substr: "mnemonic -> ("
  - substr: "mnemonicPrefix"
  - substr: "mnemonic (underlined)"
  - substr: "the mnemonic"
  - substr: "mnemonics, which"
  - substr: "byte code into mnemonic"
  - substr: "code into mnemonic"
  unless:
  - id: metadata/library/structure::js-vite-rollup-vendor-chunk
  - id: metadata/library/runtime::acquire-vscode-api
- id: private-key-word
  desc: privateKey credential field reference
  crit: component
  conf: 0.5
  for: [javascript, typescript]
  if:
    type: string_literal
    substr: privateKey
- id: recovery-phrase-view-symbol
  desc: Recovery-phrase wallet UI controller symbol
  crit: component
  conf: 0.5
  for: [macho, swift, objc, javascript, typescript]
  if:
    type: symbol
    substr: RecoveryPhraseViewController
- id: mnemonic-verify-screen-symbol
  desc: Mnemonic-verify wallet UI screen symbol
  crit: component
  conf: 0.5
  for: [macho, swift, objc, javascript, typescript]
  if:
    type: symbol
    substr: MnemonicVerifyScreen
- id: private-key-verify-screen-symbol
  desc: Private-key-verify wallet UI screen symbol
  crit: component
  conf: 0.5
  for: [macho, swift, objc, javascript, typescript]
  if:
    type: symbol
    substr: PrivateKeyVerifyScreen
- id: seed-phrase-word
  desc: seedPhrase credential field reference
  crit: component
  conf: 0.5
  for: [html, javascript, typescript]
  if:
    type: text
    substr: seedPhrase
  unless:
  - id: metadata/file/extension/identity::declaration-file-extension
- id: xrpl-seed-literal
  desc: Hardcoded XRPL seed literal
  crit: suspicious
  conf: 0.92
  for: [javascript, typescript]
  if:
    type: text
    regex: '\bseed\s*:\s*["'']s[A-Za-z0-9]{25,35}["'']'
- id: solana-system-transfer
  desc: Solana SystemProgram fund transfer
  conf: 0.85
  crit: notable
  for: [javascript, typescript]
  if:
    type: text
    substr: SystemProgram.transfer
- id: solana-lamports-per-sol
  desc: Solana LAMPORTS_PER_SOL constant
  conf: 0.8
  crit: baseline
  for: [javascript, typescript]
  if:
    type: text
    substr: LAMPORTS_PER_SOL
