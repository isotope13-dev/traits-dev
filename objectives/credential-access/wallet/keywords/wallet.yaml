defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
traits:
- id: wallet-token
  desc: Wallet keyword
  crit: component
  conf: 0.4
  if:
    type: text
    word: wallet
- id: metamask-word
  desc: MetaMask wallet keyword
  crit: component
  conf: 0.5
  if:
    type: text
    word: metamask
- id: mnemonic-word
  desc: Mnemonic keyword
  crit: component
  conf: 0.5
  for:
  - python
  - javascript
  - csharp
  - java
  - go
  if:
    type: text
    word: mnemonic
  not:
  - substr: "denotes a mnemonic"
  - substr: "mnemonic -> ("
  - substr: "mnemonicPrefix"
  - substr: "mnemonic (underlined)"
  - substr: "the mnemonic"
  - substr: "mnemonics, which"
  - substr: "byte code into mnemonic"
  - substr: "code into mnemonic"
  unless:
  - id: metadata/library/structure::js-vite-rollup-vendor-chunk
  - id: metadata/library/runtime::acquire-vscode-api
- id: private-key-word
  desc: privateKey credential field reference
  crit: component
  conf: 0.5
  for: [javascript, typescript]
  if:
    type: string_literal
    substr: privateKey
- id: recovery-phrase-view-symbol
  desc: Recovery-phrase wallet UI controller symbol
  crit: component
  conf: 0.5
  for: [macho, swift, objc, javascript, typescript]
  if:
    type: symbol
    substr: RecoveryPhraseViewController
- id: mnemonic-verify-screen-symbol
  desc: Mnemonic-verify wallet UI screen symbol
  crit: component
  conf: 0.5
  for: [macho, swift, objc, javascript, typescript]
  if:
    type: symbol
    substr: MnemonicVerifyScreen
- id: private-key-verify-screen-symbol
  desc: Private-key-verify wallet UI screen symbol
  crit: component
  conf: 0.5
  for: [macho, swift, objc, javascript, typescript]
  if:
    type: symbol
    substr: PrivateKeyVerifyScreen
- id: seed-phrase-word
  desc: seedPhrase credential field reference
  crit: component
  conf: 0.5
  for: [html, javascript, typescript]
  if:
    type: text
    substr: seedPhrase
  unless:
  - id: metadata/file/extension/identity::typescript-declaration-extension
- id: xrpl-seed-literal
  desc: Hardcoded XRPL seed literal
  crit: suspicious
  conf: 0.92
  for: [javascript, typescript]
  if:
    type: text
    regex: '\bseed\s*:\s*["'']s[A-Za-z0-9]{25,35}["'']'
- id: solana-keypair-fromsecretkey
  desc: Solana Keypair generation from secret
  conf: 0.8
  crit: notable
  if:
    type: text
    substr: Keypair.fromSecretKey
- id: bip39-validate-mnemonic
  desc: BIP39 Mnemonic validation call
  conf: 0.8
  crit: notable
  if:
    type: text
    substr: validateMnemonic
- id: bs58-decode
  desc: Base58 decode operation
  conf: 0.8
  crit: notable
  if:
    type: text
    substr: bs58.decode
- id: base58-or-cid-conversion--rx-2
  desc: Base58 decode function marker
  crit: component
  conf: 0.8
  for: [python, javascript, typescript]
  if:
    type: text
    substr: b58decode
  count_max: 1011861
- id: base58-or-cid-conversion--rx-3
  desc: Base58 encode function marker
  crit: component
  conf: 0.8
  for: [python, javascript, typescript]
  if:
    type: text
    substr: b58encode
  count_max: 1011862
- id: base58-or-cid-conversion--rx-5
  desc: Base58 keyword marker
  crit: component
  conf: 0.8
  for: [python, javascript, typescript]
  if:
    type: text
    substr: base58
  count_max: 1011864
- id: solana-system-transfer
  desc: Solana SystemProgram fund transfer
  conf: 0.85
  crit: notable
  for: [javascript, typescript]
  if:
    type: text
    substr: SystemProgram.transfer
- id: solana-lamports-per-sol
  desc: Solana LAMPORTS_PER_SOL constant
  conf: 0.8
  crit: baseline
  for: [javascript, typescript]
  if:
    type: text
    substr: LAMPORTS_PER_SOL
composite_rules:
- id: base58-or-cid-conversion
  desc: Base58 or CID conversion
  crit: notable
  conf: 0.8
  for: [python, javascript, typescript]
  any:
  - id: base58-or-cid-conversion--rx-2
  - id: base58-or-cid-conversion--rx-3
  - id: base58-or-cid-conversion--rx-5
  unless:
  - id: metadata/lang/source::windows-generated-def-path
