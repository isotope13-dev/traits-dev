defaults:
  platforms: [windows, unix]
  for: [scripts, source, binaries]

traits:
  - id: rust-wallet-keyword-privatekey
    desc: Rust private key keyword
    crit: component
    conf: 0.85
    if:
      type: text
      word: privatekey
  - id: rust-wallet-keyword-trustwallet
    desc: Rust TrustWallet keyword
    crit: component
    conf: 0.85
    if:
      type: text
      word: trustwallet
