defaults:
  platforms: [windows, unix]
  for: [scripts, source, binaries]

traits:
  - id: phantom-wallet-word
    desc: Phantom wallet name reference
    crit: component
    conf: 0.5
    count_min: 2
    if:
      type: text
      word: phantom
    not:
      - substr: PhantomJS
      - substr: phantomjs
      - substr: phantom_
      - substr: _phantom
      - substr: callPhantom
      - substr: phantom_soft
      - regex: '(?i)phantom (row|rows|sweep|delete|message)'
      - regex: '(?i)phantom:'
  - id: rust-wallet-keyword-privatekey
    desc: Rust private key keyword
    crit: component
    conf: 0.85
    if:
      type: text
      word: privatekey
  - id: rust-wallet-keyword-trustwallet
    desc: Rust TrustWallet keyword
    crit: component
    conf: 0.85
    if:
      type: text
      word: trustwallet
