defaults:
  platforms:
  - macos
  - ios
  crit: suspicious
  attack: T1649
  mbc: B0020
  for:
  - macho
  - dylib
traits:
- id: aave-protocol-targeting
  desc: AAVE lending protocol targeting
  crit: suspicious
  conf: 0.95
  if:
    type: encoded
    encoding: base64
    substr: aave
    case_insensitive: true
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiler/systems::go-binary-macho
- id: compound-protocol-targeting
  desc: Compound lending protocol targeting
  crit: suspicious
  conf: 0.95
  if:
    type: encoded
    encoding: base64
    substr: compound
    case_insensitive: true
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiler/systems::go-binary-macho
- id: dydx-protocol-targeting
  desc: dydx lending protocol targeting
  crit: suspicious
  conf: 0.95
  if:
    type: encoded
    encoding: base64
    substr: dydx
    case_insensitive: true
  unless:
  - id: metadata/lang/compiler/systems::go-binary
  - id: metadata/lang/compiler/systems::go-binary-macho
- id: lending-rpc-endpoint-supply
  desc: Lending RPC supply endpoint
  crit: suspicious
  conf: 0.98
  if:
    type: text
    exact: /rpc/v2/lend/supplyEth
- id: lending-rpc-endpoint-withdraw
  desc: Lending RPC withdrawal endpoint
  crit: suspicious
  conf: 0.98
  if:
    type: text
    exact: /rpc/v2/lend/withdrawEth
- id: lending-rpc-generic-endpoint
  desc: Lending RPC protocol endpoint
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: /rpc/v2/lend/(supply|withdraw|getProvider|getSupportedTokens)
- id: lending-provider-fetch
  desc: Dynamic lending provider configuration
  crit: suspicious
  conf: 0.9
  if:
    type: text
    exact: /rpc/v2/lend/getProvider
- id: wallet-address-monitor
  desc: Wallet address monitoring
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: primaryETHAddressObservable
- id: app-unlock-monitor
  desc: Application unlock status monitoring
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: isAppUnlockedObservable
- id: account-id-capture
  desc: Consumer account ID capture
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: consumerAccountId
- id: interest-harvest
  desc: Interest accrual monitoring
  crit: suspicious
  conf: 0.85
  if:
    type: text
    exact: /rpc/v2/lend/getLifetimeInterestEarned
- id: reactive-data-streaming
  desc: RxSwift reactive data streaming
  crit: suspicious
  conf: 0.8
  if:
    type: symbol
    regex: RxSwift.{0,50}Subject|BehaviorSubject
  unless:
  - id: well-known/app/macos-benign/
- id: lending-injection-marker--cbinjection
  desc: Lending framework dependency (CBInjection)
  crit: suspicious
  conf: 0.95
  if:
    type: symbol
    regex: CBInjection
- id: lending-injection-marker--injectionkeys
  desc: Lending framework dependency (InjectionKeys)
  crit: suspicious
  conf: 0.95
  if:
    type: symbol
    regex: InjectionKeys
- id: lending-injection-marker--getlendrepository
  desc: Lending framework dependency (getLendRepository)
  crit: suspicious
  conf: 0.95
  if:
    type: symbol
    regex: getLendRepository
- id: remote-lending-service--remotelendservice
  desc: Remote lending service class (RemoteLendService)
  crit: suspicious
  conf: 0.95
  if:
    type: symbol
    regex: RemoteLendService
- id: remote-lending-service--ttc7lending17remotelendservice
  desc: Remote lending (_TtC7Lending17RemoteLendService)
  crit: suspicious
  conf: 0.95
  if:
    type: symbol
    regex: _TtC7Lending17RemoteLendService
- id: unsigned-tx-generation--lendrepositoryc
  desc: Unsigned transaction parameter (LendRepositoryC)
  crit: suspicious
  conf: 0.9
  if:
    type: symbol
    regex: LendRepositoryC
- id: unsigned-tx-generation--unsignedtx
  desc: Unsigned transaction parameter (UnsignedTx)
  crit: suspicious
  conf: 0.9
  if:
    type: symbol
    regex: UnsignedTx
- id: unsigned-tx-generation--txparamlistresultdto
  desc: Unsigned transaction (TxParamListResultDTO)
  crit: suspicious
  conf: 0.9
  if:
    type: symbol
    regex: TxParamListResultDTO
- id: lending-dto-classes--lendtokenlistdto
  desc: Lending data transfer object (LendTokenListDTO)
  crit: suspicious
  conf: 0.85
  if:
    type: symbol
    regex: LendTokenListDTO
- id: lending-dto-classes--lendproviderresultdto
  desc: Lending data transfer (LendProviderResultDTO)
  crit: suspicious
  conf: 0.85
  if:
    type: symbol
    regex: LendProviderResultDTO
composite_rules:
- id: lending-injection-marker
  desc: Lending framework dependency injection
  crit: suspicious
  conf: 0.95
  any:
  - id: lending-injection-marker--cbinjection
  - id: lending-injection-marker--injectionkeys
  - id: lending-injection-marker--getlendrepository
- id: remote-lending-service
  desc: Remote lending service class
  crit: suspicious
  conf: 0.95
  any:
  - id: remote-lending-service--remotelendservice
  - id: remote-lending-service--ttc7lending17remotelendservice
- id: unsigned-tx-generation
  desc: Unsigned transaction parameter generation
  crit: suspicious
  conf: 0.9
  any:
  - id: unsigned-tx-generation--lendrepositoryc
  - id: unsigned-tx-generation--unsignedtx
  - id: unsigned-tx-generation--txparamlistresultdto
- id: lending-dto-classes
  desc: Lending data transfer object classes
  crit: suspicious
  conf: 0.85
  any:
  - id: lending-dto-classes--lendtokenlistdto
  - id: lending-dto-classes--lendproviderresultdto
- id: lending-injection-framework
  desc: Lending framework code injection
  crit: suspicious
  conf: 0.95
  all:
  - id: lending-injection-marker
  - id: micro-behaviors/process/hook/interception::objc-runtime-hook
- id: lending-protocol-theft
  desc: Lending protocol fund theft
  crit: hostile
  conf: 0.96
  all:
  - id: aave-protocol-targeting
  - id: lending-rpc-generic-endpoint
  - id: unsigned-tx-generation
- id: transaction-hijacking-pattern
  desc: Lending transaction hijacking
  crit: hostile
  conf: 0.97
  all:
  - id: lending-rpc-endpoint-supply
  - id: lending-rpc-endpoint-withdraw
  - id: unsigned-tx-generation
- id: credential-harvesting-comp
  desc: Wallet credential harvesting
  crit: hostile
  conf: 0.94
  all:
  - id: wallet-address-monitor
  - id: app-unlock-monitor
  - id: account-id-capture
- id: lending-c2-infrastructure
  desc: Lending C2 remote service
  crit: hostile
  conf: 0.93
  mbc: B0030
  all:
  - id: remote-lending-service
  - id: lending-provider-fetch
  - id: lending-rpc-generic-endpoint
- id: trojanized-lending-module
  desc: Trojanized lending module malware
  crit: hostile
  conf: 0.99
  all:
  - id: lending-injection-framework
  - id: credential-harvesting-comp
  - id: lending-c2-infrastructure
  any:
  - id: lending-protocol-theft
  - id: transaction-hijacking-pattern
