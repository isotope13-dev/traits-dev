defaults:
  platforms:
  - unix
  - windows
  crit: suspicious
  attack: T1649
  mbc: B0020
  for:
  - python
traits:
- id: procdump-download
  desc: Procdump tool download
  crit: suspicious
  conf: 0.95
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    - id: metadata/file/profile/identity::generated-attack-map-context
  if:
    type: string_literal
    regex: procdump\.exe|cdn\.discordapp.{0,50}procdump
- id: procdump-execution
  desc: Procdump memory dump execution
  crit: suspicious
  conf: 0.98
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    - id: metadata/file/profile/identity::generated-attack-map-context
  if:
    type: text
    regex: procvesp111.{0,50}procdump|procdump.{0,50}-ma|procvesp.{0,50}-accepteula
- id: dmp-file-creation
  desc: Memory dump file creation
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: \.dmp.{0,50}write|write.{0,50}\.dmp|exodus\.dmp
- id: exodus-process-enum
  desc: Exodus process enumeration
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: Exodus\.exe.{0,50}process_iter|process_iter.{0,50}Exodus
- id: wallet-process-targeting
  desc: Wallet process targeting
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: exodus\.wallet|process.{0,50}Exodus|Exodus.{0,50}pid
- id: atomic-wallet-target
  desc: Atomic wallet targeting
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (?i)\bAtomic\s+Wallet\b|\batomicwallet\b|\.atomicwallet\b
- id: electrum-wallet-target--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: Electrum.exe
  count_max: 1010861
- id: electrum-wallet-target--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    substr: electrum_path
  count_max: 1010862
- id: electrum-wallet-target--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: electrum_wallet.{0,80}(process|pid|kill|terminate)
  count_max: 1010863
- id: electrum-wallet-target--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (process|pid|kill|terminate).{0,80}electrum_wallet
  count_max: 1010864
- id: guarda-wallet-target
  desc: Guarda wallet targeting
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: guarda.{0,50}wallet|GUARDA.{0,50}wallet
- id: bitpay-wallet-target
  desc: BitPay wallet targeting
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: bitpay.{0,50}wallet|B1Tpay.{0,50}wallet
- id: coinomi-wallet-target
  desc: Coinomi wallet targeting
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: coinomi.{0,50}wallet|coinomi.{0,50}path
- id: armory-wallet-target
  desc: Armory wallet targeting
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: armory.{0,50}wallet|armory.{0,50}path
- id: vespy-marker-file-1
  desc: Vespy marker file (procvesp111)
  crit: suspicious
  conf: 0.98
  if:
    type: string_literal
    substr: procvesp111
- id: vespy-marker-file-2
  desc: Vespy marker file (vesp111)
  crit: suspicious
  conf: 0.98
  if:
    type: string_literal
    substr: vesp111
- id: vespy-path-marker
  desc: Vespy path pattern
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: P4THF0LDR|W4ll3ts|Wallets.{0,50}class
composite_rules:
- id: vespy-marker-file
  desc: Vespy marker file
  crit: suspicious
  conf: 0.98
  any:
  - id: vespy-marker-file-1
  - id: vespy-marker-file-2
- id: vespy-wallet-stealer
  desc: Vespy wallet stealer
  crit: hostile
  conf: 0.99
  needs: 3
  any:
  - id: procdump-download
  - id: vespy-marker-file
  - id: exodus-process-enum
- id: crypto-wallet-stealer-suite
  desc: Multi-wallet cryptocurrency stealer
  crit: hostile
  conf: 0.95
  platforms:
  - windows
  needs: 3
  any:
  - id: atomic-wallet-target
  - id: electrum-wallet-target
  - id: guarda-wallet-target
  - id: bitpay-wallet-target
  - id: coinomi-wallet-target
  - id: armory-wallet-target
- id: memory-dump-wallet-theft
  desc: Memory dump wallet theft
  crit: hostile
  conf: 0.98
  attack: T1055
  all:
  - id: procdump-execution
  - id: dmp-file-creation
  - id: wallet-process-targeting
- id: electrum-wallet-target
  desc: Electrum wallet targeting
  crit: suspicious
  conf: 0.85
  any:
  - id: electrum-wallet-target--rx-1
  - id: electrum-wallet-target--rx-2
  - id: electrum-wallet-target--rx-3
  - id: electrum-wallet-target--rx-4
