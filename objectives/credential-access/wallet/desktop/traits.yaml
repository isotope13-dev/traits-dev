defaults:
  for: [scripts, binaries]
  attack: T1555
  mbc: B0028
  crit: suspicious
  platforms:
    - macos
    - windows
    - linux
traits:
  - id: electrum-wallets-dir
    desc: .electrum/wallets directory
    conf: 0.7
    crit: notable
    if:
      type: text
      regex: \.electrum/wallets?
  - id: electrum-wallet-file
    desc: .electrum wallet file
    conf: 0.7
    crit: notable
    if:
      type: text
      regex: \.electrum.{0,30}wallet
  - id: electrum-default
    desc: electrum default_wallet
    conf: 0.7
    crit: notable
    if:
      type: text
      regex: (?i)electrum.{0,80}default_wallet|default_wallet.{0,80}electrum
  - id: coinomi-wallets-dir
    desc: Coinomi/wallets directory
    conf: 0.7
    crit: notable
    if:
      type: text
      regex: Coinomi/wallets?
  - id: coinomi-wallet-dat
    desc: Coinomi wallet.dat
    conf: 0.7
    crit: notable
    if:
      type: text
      regex: Coinomi.{0,30}wallet\.dat
  - id: coinomi-bundle
    desc: com.coinomi bundle
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: com.coinomi
  - id: exodus-wallet-dir
    desc: Exodus exodus.wallet path
    conf: 0.7
    crit: notable
    if:
      id: micro-behaviors/fs/file/open::exodus-wallet-path
  - id: exodus-passphrase
    desc: exodus passphrase
    conf: 0.7
    crit: notable
    if:
      type: text
      regex: exodus.{0,30}passphrase
  - id: exodus-bundle
    desc: com.exodus bundle
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: com.exodus
  - id: atomic-local-storage
    desc: atomic wallet path token
    # Narrow to paths that look like the Atomic Wallet data directory, not any
    # `atomic/` substring (Go's sync/atomic package path hits the raw substr).
    conf: 0.7
    crit: notable
    if:
      type: text
      regex: (?i)(AppData[\\/]Roaming|Application Support|\.config)[\\/]atomic[\\/]
  - id: atomic-wallet-name
    desc: Atomic Wallet name
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: Atomic Wallet
  - id: desktop-wallet-product-list
    desc: Multiple desktop wallet products
    conf: 0.9
    crit: suspicious
    count_min: 4
    if:
      type: text
      regex: Exodus|Atomic Wallet|Ledger Live|Trezor Suite|Monero GUI Wallet
  - id: atomic-bundle
    desc: com.atomicwallet bundle
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: com.atomicwallet
  - id: walletwasabi-lower
    desc: .walletwasabi directory
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: .walletwasabi
  - id: walletwasabi-upper
    desc: .WalletWasabi directory
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: .WalletWasabi
  - id: wasabiwallet-name
    desc: WasabiWallet name
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: WasabiWallet
  - id: binance-app-store
    desc: Binance/app-store.json
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: Binance/app-store.json
  - id: binance-aspect
    desc: '@aspect-binance package'
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: '@aspect-binance'
  - id: binance-bundle
    desc: com.binance bundle
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: com.binance
  - id: tonkeeper-desktop
    desc: '@tonkeeper/desktop package'
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: '@tonkeeper/desktop'
  - id: tonkeeper-config
    desc: tonkeeper config.json
    conf: 0.7
    crit: notable
    if:
      type: text
      regex: tonkeeper.{0,30}config\.json
  - id: tonkeeper-bundle
    desc: com.ton-keeper bundle
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: com.ton-keeper
  - id: ledger-live-dir
    desc: Ledger Live/ directory
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: Ledger Live/
  - id: ledgerhq-package
    desc: '@ledgerhq package'
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: '@ledgerhq'
  - id: ledger-accounts
    desc: ledger accounts
    conf: 0.7
    crit: notable
    if:
      type: text
      regex: ledger.{0,30}accounts
  - id: trezor-desktop
    desc: '@trezor/suite-desktop package'
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: '@trezor/suite-desktop'
  - id: trezor-suite
    desc: trezor suite
    conf: 0.7
    crit: notable
    if:
      type: text
      regex: trezor.{0,30}suite
  - id: guarda-local-storage
    desc: Guarda wallet path token
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: Guarda/
  - id: guarda-bundle
    desc: com.guarda bundle
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: com.guarda
  - id: bitcoin-wallet-dat
    desc: .bitcoin/wallet.dat
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: .bitcoin/wallet.dat
  - id: bitcoin-wallets-dir
    desc: .bitcoin/wallets directory
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: .bitcoin/wallets
  - id: bitcoin-app-wallets
    desc: Bitcoin/wallets directory
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: Bitcoin/wallets
  - id: ethereum-keystore
    desc: Ethereum/keystore
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: Ethereum/keystore
  - id: mist-keystore
    desc: Mist/keystore
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: Mist/keystore
  - id: doteth-keystore
    desc: .ethereum/keystore
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: .ethereum/keystore
  - id: monero-wallets
    desc: Monero/wallets
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: Monero/wallets
  - id: bitmonero-wallets
    desc: .bitmonero/wallets
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: .bitmonero/wallets
  - id: litecoin-wallet-dat
    desc: .litecoin/wallet.dat
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: .litecoin/wallet.dat
  - id: litecoin-wallets
    desc: Litecoin/wallets
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: Litecoin/wallets
  - id: dashcore-wallets
    desc: DashCore/wallets
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: DashCore/wallets
  - id: dash-wallet-dat
    desc: .dashcore/wallet.dat
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: .dashcore/wallet.dat
  - id: electrum-ltc
    desc: Electrum-LTC wallet data path
    conf: 0.85
    crit: notable
    if:
      type: text
      substr: .electrum-ltc/wallets
  - id: electron-cash
    desc: Electron Cash wallet data path
    conf: 0.85
    crit: notable
    if:
      type: text
      substr: .electron-cash/wallets
  - id: dogecoin-wallets
    desc: Dogecoin/wallets
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: Dogecoin/wallets
  - id: dogecoin-wallet-dat
    desc: .dogecoin/wallet.dat
    conf: 0.7
    crit: notable
    if:
      type: text
      substr: .dogecoin/wallet.dat
composite_rules:
  - id: electrum
    desc: Electrum wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: electrum-wallets-dir
      - id: electrum-wallet-file
      - id: electrum-default
  - id: coinomi
    desc: Coinomi wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: coinomi-wallets-dir
      - id: coinomi-wallet-dat
      - id: coinomi-bundle
  - id: exodus
    desc: Exodus wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: exodus-wallet-dir
      - id: exodus-passphrase
      - id: exodus-bundle
  - id: atomic
    desc: Atomic Wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: atomic-local-storage
      - id: atomic-wallet-name
      - id: atomic-bundle
  - id: wasabi
    desc: Wasabi wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: walletwasabi-lower
      - id: walletwasabi-upper
      - id: wasabiwallet-name
  - id: binance
    desc: Binance wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: binance-app-store
      - id: binance-aspect
      - id: binance-bundle
  - id: tonkeeper
    desc: TonKeeper wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: tonkeeper-desktop
      - id: tonkeeper-config
      - id: tonkeeper-bundle
  - id: ledger
    desc: Ledger wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: ledger-live-dir
      - id: ledgerhq-package
      - id: ledger-accounts
  - id: trezor
    desc: Trezor wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: trezor-desktop
      - id: trezor-suite
  - id: guarda
    desc: Guarda wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: guarda-local-storage
      - id: guarda-bundle
  - id: bitcoin-core
    desc: Bitcoin Core wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: bitcoin-wallet-dat
      - id: bitcoin-wallets-dir
      - id: bitcoin-app-wallets
  - id: ethereum
    desc: Ethereum wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: ethereum-keystore
      - id: mist-keystore
      - id: doteth-keystore
  - id: monero
    desc: Monero wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: monero-wallets
      - id: bitmonero-wallets
  - id: litecoin-core
    desc: Litecoin wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: litecoin-wallet-dat
      - id: litecoin-wallets
      - id: electrum-ltc
  - id: dash-core
    desc: Dash wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: dashcore-wallets
      - id: dash-wallet-dat
  - id: dogecoin-core
    desc: Dogecoin wallet targeting
    crit: suspicious
    conf: 0.85
    any:
      - id: dogecoin-wallets
      - id: dogecoin-wallet-dat
  - id: stealer
    desc: Desktop cryptocurrency wallet stealer
    crit: suspicious
    conf: 0.95
    needs: 3
    any:
      - id: electrum
      - id: coinomi
      - id: exodus
      - id: atomic
      - id: wasabi
      - id: binance
      - id: tonkeeper
      - id: ledger
      - id: trezor
      - id: guarda
      - id: bitcoin-core
      - id: ethereum
      - id: monero
      - id: litecoin-core
      - id: dash-core
      - id: dogecoin-core
      - id: electron-cash
    unless:
      - id: well-known/tool/detection/
