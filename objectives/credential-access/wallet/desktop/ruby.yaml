defaults:
  platforms: [freebsd, unix]
  for: [ruby]
  attack: T1555

traits:
  - id: ruby-desktop-wallet-paths-a
    desc: Ruby scans major wallet paths
    crit: suspicious
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: '\.(ethereum|bitcoin|monero)'

  - id: ruby-desktop-wallet-paths-b
    desc: Ruby scans alternate wallet paths
    crit: suspicious
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: '\.(zcash|solana|dashcore)'

  - id: ruby-wallet-harvest-function
    desc: Ruby wallet harvest function
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: harvest_wallets

composite_rules:
  - id: ruby-desktop-wallet-harvest
    desc: Ruby harvests desktop wallet files
    crit: hostile
    conf: 0.98
    all:
      - id: ruby-wallet-harvest-function
    any:
      - id: ruby-desktop-wallet-paths-a
      - id: ruby-desktop-wallet-paths-b
