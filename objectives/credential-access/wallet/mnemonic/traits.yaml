defaults:
  platforms: [windows, linux, macos]
  for: [python, javascript, csharp, go, pe, elf]
  attack: T1555
  mbc: B0028
  crit: suspicious
traits:
- id: derivation-path-word
  desc: HD wallet derivation path (keywords)
  crit: component
  conf: 0.8
  for:
  - python
  - javascript
  - csharp
  - go
  if:
    type: text
    regex: derivation_?path|derivationPath
- id: seed-phrase-underscore
  desc: seed_phrase term
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: seed_phrase
  unless:
  - id: well-known/tool/detection/redaction::sensitive-data-scanner
- id: seedphrase-word
  desc: seedphrase term
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: seedphrase
- id: recovery-phrase-word
  desc: recovery_phrase term
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: recovery_phrase
- id: secret-words-word
  desc: secret_words term
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: secret_words
- id: phantom-word
  desc: Phantom wallet reference
  crit: component
  conf: 0.5
  for:
  - python
  - javascript
  - csharp
  - go
  size_max: 10485760
  count_min: 2
  if:
    id: metadata/library/web3::phantom-wallet-word
  unless:
  - type: text
    substr: paperSize
  - id: objectives/anti-analysis/sandbox-detect/tool-references/
  - id: objectives/credential-access/wallet/mnemonic/
- id: browser-word
  desc: browser wallet marker
  crit: component
  conf: 0.4
  if:
    type: text
    regex: \bbrowser[_-]?(wallet|extension|addon)\b
- id: word-count-check-prefix-mnemonic-token
  desc: Mnemonic word count validation
  conf: 0.85
  crit: notable
  if:
    type: text
    regex: \bmnemonic\b.{0,20}\b(split|len|count)\b
  unless:
  - id: well-known/lib/json-ts/
- id: word-count-check-prefix-seed-phrase
  desc: Seed phrase word count validation
  conf: 0.85
  crit: notable
  if:
    type: text
    regex: \bseed\s*(phrase|words?)\b.{0,40}\b(split|len|count)\b
  unless:
  - id: well-known/lib/json-ts/
- id: word-count-check-prefix-phrase
  desc: Mnemonic word count validation (phrase)
  conf: 0.85
  crit: component
  if:
    type: text
    regex: \bphrase\b.{0,40}\b(split|len|count)\b.{0,20}\bwords?\b
- id: word-count-check-prefix-words
  desc: Mnemonic word count validation (words)
  conf: 0.85
  crit: notable
  if:
    type: text
    regex: \b(secret|seed)_?words\b.{0,40}\b(split|len|count)\b
- id: bip39-wordlist-start-cluster
  desc: BIP-39 wordlist start cluster
  crit: component
  conf: 0.88
  for: [binaries]
  if:
    type: text
    regex: \babandon\b.{0,200}\bability\b.{0,200}\bable\b.{0,200}\babout\b.{0,200}\babove\b
- id: bip39-wordlist-mid-cluster
  desc: BIP-39 wordlist middle cluster
  crit: component
  conf: 0.88
  for: [binaries]
  if:
    type: text
    regex: \bcactus\b.{0,200}\bcage\b.{0,200}\bcake\b.{0,200}\bcall\b.{0,200}\bcalm\b
- id: bip39-wordlist-crypto-cluster
  desc: BIP-39 wordlist later cluster
  crit: component
  conf: 0.88
  for: [binaries]
  if:
    type: text
    regex: \bsaddle\b.{0,200}\bsadness\b.{0,200}\bsafe\b.{0,200}\bsail\b.{0,200}\bsalad\b
- id: bip39-wordlist-end-cluster
  desc: BIP-39 wordlist end cluster
  crit: component
  conf: 0.88
  for: [binaries]
  if:
    type: text
    regex: \byellow\b.{0,200}\byou\b.{0,200}\byoung\b.{0,200}\byouth\b.{0,200}\bzebra\b
- id: bip39-b64-bips-fragment
  desc: Base64 BIP-39 bips fragment
  crit: component
  conf: 0.9
  for: [powershell]
  if:
    type: text
    substr: Ymlwcy9tY
- id: bip39-b64-index-fragment
  desc: Base64 BIP-39 index fragment
  crit: component
  conf: 0.9
  for: [powershell]
  if:
    type: text
    substr: TAwMzkv
- id: bip39-b64-english-fragment
  desc: Base64 BIP-39 english.txt fragment
  crit: component
  conf: 0.9
  for: [powershell]
  if:
    type: text
    substr: ZW5nbGlzaC50eHQ
- id: wordlist-near-mnemonic
  desc: Wordlist near mnemonic terms
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: word_?list.{0,40}(mnemonic|bip-?39)
- id: wordlist-near-recovery
  desc: Wordlist near recovery phrase
  conf: 0.85
  if:
    type: text
    regex: word_?list.{0,40}recovery[_ -]?phrase
- id: mnemonic-near-wordlist
  desc: Mnemonic terms near wordlist
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: (mnemonic|bip-?39).{0,40}word_?list
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
- id: recovery-near-wordlist
  desc: Recovery phrase near wordlist
  conf: 0.85
  if:
    type: text
    regex: recovery[_ -]?phrase.{0,40}word_?list
- id: validation-pattern-validate
  desc: Mnemonic validation logic (validate mnemonic)
  conf: 0.85
  crit: notable
  if:
    type: text
    regex: validate.{0,20}mnemonic|mnemonic.{0,20}valid
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  not:
  - substr: "mnemonics-invalid"
- id: validation-pattern-recovery
  desc: "Mnemonic validation logic"
  conf: 0.85
  crit: suspicious
  if:
    type: text
    regex: verify.{0,20}recovery.{0,20}(phrase|seed|mnemonic|wallet)
- id: private-key-theft-verb
  desc: Private key theft verb
  conf: 0.9
  crit: component
  if:
    type: text
    regex: '(?i)\bprivate_?key\b.{0,80}\b(exfil|steal|harvest)\b'
- id: private-key-collection-verb
  desc: Private key collection verb
  conf: 0.9
  crit: component
  if:
    type: text
    regex: '(?i)\bprivate_?key\b.{0,80}\b(dump|collect)\b'
- id: bitcoin-wif-format
  desc: Bitcoin WIF private key format (word)
  conf: 0.85
  crit: notable
  if:
    type: text
    word: wallet_import_format
- id: bitcoin-wif-pattern
  desc: Bitcoin WIF private key format reference
  conf: 0.85
  crit: notable
  if:
    type: text
    regex: \b(wif|bitcoin)\b.{0,20}\b(wif|key|private)\b
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/runtime::lean-intl-runtime-bundle
  - id: metadata/library/runtime::intl-polyfill-locale-data
- id: bitcoin-wif-uncompressed-literal
  desc: Uncompressed Bitcoin WIF private key literal
  conf: 0.85
  crit: suspicious
  if:
    type: text
    # WIF version bytes encode uncompressed keys as 5H/5J/5K (51 chars).
    # The short context window avoids generated identifiers such as
    # *PrivateAccessArgs that merely begin with a WIF-like character.
    regex: '(?i)(wif|private).{0,12}["'']5[HJK][1-9A-HJ-NP-Za-km-z]{49}["'']'
  unless:
  - id: metadata/package/testing/presence/harness::go-test-file
  - id: metadata/package/testing/presence/harness/
  - id: well-known/app/sidesail/
  - type: path
    regex: '(^|[\\/])testchain([\\/]|$)'
  - type: path
    regex: '(^|[\\/])(internal[\\/](keytestcases|testcli|testchain)|pkg[\\/]neotest)([\\/]|$)'
- id: bitcoin-wif-compressed-literal
  desc: Compressed Bitcoin WIF private key literal
  conf: 0.85
  crit: suspicious
  if:
    type: text
    # Compressed WIF keys start with K/L and contain 52 Base58 characters.
    regex: '(?i)(wif|private).{0,12}["''][KL][1-9A-HJ-NP-Za-km-z]{51}["'']'
  unless:
  - id: metadata/package/testing/presence/harness::go-test-file
  - id: metadata/package/testing/presence/harness/
  - id: well-known/app/sidesail/
  - type: path
    regex: '(^|[\\/])testchain([\\/]|$)'
  - type: path
    regex: '(^|[\\/])(internal[\\/](keytestcases|testcli|testchain)|pkg[\\/]neotest)([\\/]|$)'
- id: keystore-file
  desc: Ethereum UTC keystore filename
  crit: suspicious
  conf: 0.85
  if:
    type: text
    # The UTC--timestamp--address form is the distinctive Ethereum
    # keystore filename; generic `keystore.json` prose is too common.
    regex: '(?i)UTC--[0-9T:+-]+--[a-f0-9]{40}\b'
  unless:
  - id: well-known/tool/detection/
  - id: well-known/app/sidesail/
  - id: well-known/app/go-ethereum::go-ethereum-tool
  - id: metadata/package/testing/presence/harness/
  - id: metadata/package/quality/recognized-contexts::package-context
  - id: metadata/package/quality/recognized-contexts::package-source-path
- id: variable-names-1
  desc: "Mnemonic-related var names (mnemonic, seed)"
  crit: notable
  conf: 0.8
  size_max: 262144
  if:
    type: text
    regex: \b(mnemonic|seed_?phrase)\s*=
  unless:
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: micro-behaviors/crypto/library/blockchain/
- id: variable-names-2
  desc: 'Mnemonic-related variable names'
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: \b(recovery_?phrase|secret_?words|wallet_?words)\s*[=:]
- id: phantom-word-unless-cond-1--rx-1
  desc: _phantom Go zero-size field marker
  crit: component
  conf: 0.5
  for:
  - python
  - csharp
  - go
  size_max: 10485760
  count_min: 2
  if:
    type: text
    substr: _phantom
  count_max: 1009804
- id: phantom-word-unless-cond-1--rx-2
  desc: callPhantom JS bot-detection global
  crit: component
  conf: 0.5
  for:
  - python
  - csharp
  - go
  size_max: 10485760
  count_min: 2
  if:
    type: text
    substr: callPhantom
  count_max: 1009805
- id: phantom-word-unless-cond-1--rx-3
  desc: phantom_soft recognized identifier
  crit: component
  conf: 0.5
  for:
  - python
  - csharp
  - go
  size_max: 10485760
  count_min: 2
  if:
    type: text
    substr: phantom_soft
  count_max: 1009806
composite_rules:
- id: private-key-theft-language
  desc: Private-key theft or collection language
  conf: 0.92
  crit: suspicious
  near_lines: 80
  all:
  - id: micro-behaviors/crypto/asymmetric/key::crypto-private-key-reference
  any:
  - id: private-key-theft-verb
  - id: private-key-collection-verb
- id: derivation-path-with-key-theft
  desc: HD wallet path with private-key theft context
  crit: suspicious
  conf: 0.93
  unless:
  - id: well-known/app/sidesail/
  all:
  - id: private-key-theft-language
  any:
    - id: micro-behaviors/crypto/library/blockchain/wallet::derivation-path-bip
    - id: derivation-path-word
- id: word-count-check-prefix
  desc: Mnemonic word count validation prefix
  crit: notable
  any:
  - id: word-count-check-prefix-mnemonic
  - id: word-count-check-prefix-phrase
  - id: word-count-check-prefix-words
  unless:
  - id: micro-behaviors/crypto/library/blockchain/
- id: word-count-check-prefix-mnemonic
  desc: Mnemonic or seed phrase word count validation
  crit: notable
  any:
  - id: word-count-check-prefix-mnemonic-token
  - id: word-count-check-prefix-seed-phrase
  unless:
  - id: micro-behaviors/crypto/library/blockchain/
- id: bitcoin-wif
  desc: Bitcoin WIF private key format
  conf: 0.85
  crit: notable
  any:
  - id: bitcoin-wif-format
  - id: bitcoin-wif-pattern
  - id: bitcoin-wif-uncompressed-literal
  - id: bitcoin-wif-compressed-literal
- id: bip39-wordlist-ref
  desc: Mnemonic wordlist reference
  crit: notable
  conf: 0.85
  any:
  - id: wordlist-near-mnemonic
  - id: wordlist-near-recovery
  - id: mnemonic-near-wordlist
  - id: recovery-near-wordlist
- id: embedded-bip39-wordlist
  desc: Embedded BIP-39 mnemonic wordlist
  crit: suspicious
  conf: 0.92
  for: [binaries]
  needs: 3
  any:
  - id: bip39-wordlist-start-cluster
  - id: bip39-wordlist-mid-cluster
  - id: bip39-wordlist-crypto-cluster
  - id: bip39-wordlist-end-cluster
- id: bip39-wordlist-encoded-fragments
  desc: Encoded BIP-39 wordlist reference
  crit: suspicious
  conf: 0.95
  for: [powershell]
  all:
  - id: bip39-b64-bips-fragment
  - id: bip39-b64-index-fragment
  - id: bip39-b64-english-fragment
- id: variable-names
  desc: Mnemonic-related variable or function names
  crit: notable
  conf: 0.8
  any:
  - id: variable-names-1
  - id: variable-names-2
  unless:
  - id: micro-behaviors/crypto/library/blockchain/
- id: validation-pattern
  desc: Mnemonic phrase validation logic
  conf: 0.85
  crit: notable
  any:
  - id: validation-pattern-validate
  - id: validation-pattern-recovery
- id: mnemonic-terms
  desc: Mnemonic or seed phrase terminology
  crit: notable
  conf: 0.7
  needs: 2
  any:
  - id: objectives/credential-access/wallet/keywords::mnemonic-word
  - id: seed-phrase-underscore
  - id: seedphrase-word
  - id: recovery-phrase-word
  - id: secret-words-word
- id: wallet-marker
  desc: Wallet or cryptocurrency marker
  crit: notable
  conf: 0.7
  unless:
  - id: metadata/file/catalog/identity/
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/testing/
  needs: 3
  any:
  - id: objectives/impact/cryptojacking/miner/signatures::wallet-ref
  - id: objectives/impact/crypto-manipulation/keywords::crypto-word
  - id: objectives/credential-access/wallet/keywords::metamask-word
  - id: phantom-word
  - id: browser-word
- id: comprehensive-stealer
  desc: Comprehensive wallet credential theft
  crit: hostile
  conf: 0.95
  for:
  - python
  - javascript
  - elf
  - pe
  - macho
  needs: 3
  any:
  - id: mnemonic-terms
  - id: private-key-theft-language
  - id: keystore-file
  - id: derivation-path-with-key-theft
  - id: micro-behaviors/crypto/library/blockchain/wallet::bip39-wordlist-reference
- id: phantom-word-unless-cond-1--rx-helper-4
  desc: Regex component marker
  crit: component
  conf: 1.0
  for:
  - python
  - csharp
  - go
  size_max: 10485760
  any:
  - id: phantom-word-unless-cond-1--rx-1
  - id: phantom-word-unless-cond-1--rx-2
  - id: phantom-word-unless-cond-1--rx-3
