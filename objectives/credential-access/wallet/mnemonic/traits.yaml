defaults:
  platforms: [windows, linux, macos]
  for: [python, javascript, csharp, go, pe, elf]
  attack: T1555
  mbc: B0028
  crit: suspicious
traits:
- id: derivation-path-bip
  desc: HD wallet derivation path (BIP-44/49/84/86)
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: m/(44|49|84|86)'/[0-9]{1,6}'
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - type: text
    substr: Wallet.fromMnemonic(
- id: derivation-path-word
  desc: HD wallet derivation path (keywords)
  conf: 0.8
  for:
  - python
  - javascript
  - csharp
  - go
  if:
    type: text
    regex: derivation_?path|derivationPath
- id: seed-phrase-underscore
  desc: seed_phrase term
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: seed_phrase
- id: seedphrase-word
  desc: seedphrase term
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: seedphrase
- id: recovery-phrase-word
  desc: recovery_phrase term
  crit: notable
  conf: 0.5
  if:
    type: text
    substr: recovery_phrase
- id: secret-words-word
  desc: secret_words term
  crit: suspicious
  conf: 0.5
  if:
    type: text
    substr: secret_words
- id: metamask-word
  desc: MetaMask reference
  crit: notable
  conf: 0.5
  if:
    type: text
    word: metamask
- id: phantom-word
  desc: Phantom wallet reference
  crit: component
  conf: 0.5
  for:
  - python
  - javascript
  - csharp
  - go
  size_max: 10485760
  count_min: 2
  if:
    type: text
    word: phantom
  not:
  - substr: PhantomJS
  - substr: phantomjs
  - substr: phantom_
  - substr: _phantom
  - substr: callPhantom
  - substr: phantom_soft
  unless:
  - type: text
    substr: paperSize
  - id: objectives/anti-analysis/sandbox-detect/heuristics::js-phantom-nightmare-globals
  - id: phantom-word-unless-cond-1--rx-helper-4
- id: browser-word
  desc: browser wallet context
  crit: component
  conf: 0.4
  if:
    type: text
    regex: \bbrowser[_-]?(wallet|extension|addon)\b
- id: word-count-check-prefix-mnemonic-token
  desc: Mnemonic word count validation
  conf: 0.85
  crit: notable
  if:
    type: text
    regex: \bmnemonic\b.{0,20}\b(split|len|count)\b
  unless:
  - id: well-known/lib/json-ts::converter-bundle
- id: word-count-check-prefix-seed-phrase
  desc: Seed phrase word count validation
  conf: 0.85
  crit: notable
  if:
    type: text
    regex: \bseed\s*(phrase|words?)\b.{0,40}\b(split|len|count)\b
  unless:
  - id: well-known/lib/json-ts::converter-bundle
- id: word-count-check-prefix-phrase
  desc: Mnemonic word count validation (phrase)
  conf: 0.85
  crit: component
  if:
    type: text
    regex: \bphrase\b.{0,40}\b(split|len|count)\b.{0,20}\bwords?\b
- id: word-count-check-prefix-words
  desc: Mnemonic word count validation (words)
  conf: 0.85
  crit: suspicious
  if:
    type: text
    regex: \b(secret|seed)_?words\b.{0,40}\b(split|len|count)\b
- id: bip39-wordlist
  desc: BIP-39 wordlist reference
  conf: 0.85
  crit: notable
  if:
    type: text
    regex: bip-?39|english\.txt.{0,30}mnemonic
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: well-known/app/fuel-sway::release-path
  - type: basename
    regex: 'FuelLabs-sway|[\\/]forc-binaries[\\/]'
  downgrade:
    any:
    - id: well-known/app/fuel-sway::release-path
- id: bip39-wordlist-start-cluster
  desc: BIP-39 wordlist start cluster
  crit: component
  conf: 0.88
  for: [binaries]
  if:
    type: raw
    regex: \babandon\b.{0,200}\bability\b.{0,200}\bable\b.{0,200}\babout\b.{0,200}\babove\b
- id: bip39-wordlist-mid-cluster
  desc: BIP-39 wordlist middle cluster
  crit: component
  conf: 0.88
  for: [binaries]
  if:
    type: raw
    regex: \bcactus\b.{0,200}\bcage\b.{0,200}\bcake\b.{0,200}\bcall\b.{0,200}\bcalm\b
- id: bip39-wordlist-crypto-cluster
  desc: BIP-39 wordlist later cluster
  crit: component
  conf: 0.88
  for: [binaries]
  if:
    type: raw
    regex: \bsaddle\b.{0,200}\bsadness\b.{0,200}\bsafe\b.{0,200}\bsail\b.{0,200}\bsalad\b
- id: bip39-wordlist-end-cluster
  desc: BIP-39 wordlist end cluster
  crit: component
  conf: 0.88
  for: [binaries]
  if:
    type: raw
    regex: \byellow\b.{0,200}\byou\b.{0,200}\byoung\b.{0,200}\byouth\b.{0,200}\bzebra\b
- id: bip39-b64-bips-fragment
  desc: Base64 BIP-39 bips fragment
  crit: component
  conf: 0.9
  for: [powershell]
  if:
    type: text
    substr: Ymlwcy9tY
- id: bip39-b64-index-fragment
  desc: Base64 BIP-39 index fragment
  crit: component
  conf: 0.9
  for: [powershell]
  if:
    type: text
    substr: TAwMzkv
- id: bip39-b64-english-fragment
  desc: Base64 BIP-39 english.txt fragment
  crit: component
  conf: 0.9
  for: [powershell]
  if:
    type: text
    substr: ZW5nbGlzaC50eHQ
- id: wordlist-near-mnemonic
  desc: Wordlist near mnemonic terms
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: word_?list.{0,40}(mnemonic|bip-?39)
- id: wordlist-near-recovery
  desc: Wordlist near recovery phrase
  conf: 0.85
  if:
    type: text
    regex: word_?list.{0,40}recovery[_ -]?phrase
- id: mnemonic-near-wordlist
  desc: Mnemonic terms near wordlist
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: (mnemonic|bip-?39).{0,40}word_?list
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
- id: recovery-near-wordlist
  desc: Recovery phrase near wordlist
  conf: 0.85
  if:
    type: text
    regex: recovery[_ -]?phrase.{0,40}word_?list
- id: validation-pattern-validate
  desc: Mnemonic validation logic (validate mnemonic)
  conf: 0.85
  crit: notable
  if:
    type: text
    regex: validate.{0,20}mnemonic|mnemonic.{0,20}valid
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  not:
  - substr: "mnemonics-invalid"
- id: validation-pattern-recovery
  desc: Mnemonic validation logic (verify recovery phrase)
  conf: 0.85
  crit: suspicious
  if:
    type: text
    regex: verify.{0,20}recovery.{0,20}(phrase|seed|mnemonic|wallet)
- id: private-key-hex
  desc: Wallet private-key text reference
  conf: 0.85
  crit: suspicious
  size_max: 1000000
  if:
    type: text
    regex: \b(wallet|eth|btc|crypto)\b.{0,50}\bprivate_?key\b
- id: bitcoin-wif-format
  desc: Bitcoin WIF private key format (word)
  conf: 0.85
  crit: suspicious
  if:
    type: text
    word: wallet_import_format
- id: bitcoin-wif-pattern
  desc: Bitcoin WIF private key format (pattern)
  conf: 0.85
  crit: suspicious
  if:
    type: text
    regex: \b(wif|bitcoin)\b.{0,20}\b(wif|key|private)\b
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/library/runtime::lean-intl-runtime-bundle
  - id: metadata/library/runtime::intl-polyfill-locale-data
- id: keystore-file
  desc: Ethereum keystore file reference
  conf: 0.8
  if:
    type: text
    regex: UTC--.{0,50}--[a-fA-F0-9]{40}|ethereum.{0,30}keystore|\.json.{0,30}wallet
- id: variable-names-1
  desc: Mnemonic-related variable names (mnemonic, seed)
  crit: suspicious
  conf: 0.8
  size_max: 262144
  if:
    type: text
    regex: \b(mnemonic|seed_?phrase)\s*=
  unless:
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
- id: variable-names-2
  desc: Mnemonic-related variable names (recovery, secret, wallet)
  conf: 0.8
  if:
    type: text
    regex: \b(recovery_?phrase|secret_?words|wallet_?words)\s*[=:]
- id: phantom-word-unless-cond-1--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.5
  for:
  - python
  - csharp
  - go
  size_max: 10485760
  count_min: 2
  if:
    type: text
    substr: _phantom
  count_max: 1009804
- id: phantom-word-unless-cond-1--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.5
  for:
  - python
  - csharp
  - go
  size_max: 10485760
  count_min: 2
  if:
    type: text
    substr: callPhantom
  count_max: 1009805
- id: phantom-word-unless-cond-1--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.5
  for:
  - python
  - csharp
  - go
  size_max: 10485760
  count_min: 2
  if:
    type: text
    substr: phantom_soft
  count_max: 1009806
composite_rules:
- id: derivation-path
  desc: HD wallet derivation path (BIP-44/49/84)
  crit: suspicious
  conf: 0.8
  any:
  - id: derivation-path-bip
  - id: derivation-path-word
- id: word-count-check-prefix
  desc: Mnemonic word count validation prefix
  any:
  - id: word-count-check-prefix-mnemonic
  - id: word-count-check-prefix-phrase
  - id: word-count-check-prefix-words
- id: word-count-check-prefix-mnemonic
  desc: Mnemonic or seed phrase word count validation
  any:
  - id: word-count-check-prefix-mnemonic-token
  - id: word-count-check-prefix-seed-phrase
- id: bitcoin-wif
  desc: Bitcoin WIF private key format
  conf: 0.85
  crit: suspicious
  any:
  - id: bitcoin-wif-format
  - id: bitcoin-wif-pattern
- id: bip39-wordlist-ref
  desc: Mnemonic wordlist reference
  crit: notable
  conf: 0.85
  any:
  - id: wordlist-near-mnemonic
  - id: wordlist-near-recovery
  - id: mnemonic-near-wordlist
  - id: recovery-near-wordlist
- id: embedded-bip39-wordlist
  desc: Embedded BIP-39 mnemonic wordlist
  crit: suspicious
  conf: 0.92
  for: [binaries]
  needs: 3
  any:
  - id: bip39-wordlist-start-cluster
  - id: bip39-wordlist-mid-cluster
  - id: bip39-wordlist-crypto-cluster
  - id: bip39-wordlist-end-cluster
- id: bip39-wordlist-encoded-fragments
  desc: Encoded BIP-39 wordlist reference
  crit: suspicious
  conf: 0.95
  for: [powershell]
  all:
  - id: bip39-b64-bips-fragment
  - id: bip39-b64-index-fragment
  - id: bip39-b64-english-fragment
- id: variable-names
  desc: Mnemonic-related variable or function names
  conf: 0.8
  any:
  - id: variable-names-1
  - id: variable-names-2
- id: validation-pattern
  desc: Mnemonic phrase validation logic
  conf: 0.85
  crit: notable
  any:
  - id: validation-pattern-validate
  - id: validation-pattern-recovery
- id: mnemonic-terms
  desc: Mnemonic or seed phrase terminology
  crit: notable
  conf: 0.7
  needs: 2
  any:
  - id: micro-behaviors/data/text/crypto::mnemonic-word
  - id: seed-phrase-underscore
  - id: seedphrase-word
  - id: recovery-phrase-word
  - id: secret-words-word
- id: wallet-context
  desc: Wallet or cryptocurrency context
  crit: notable
  conf: 0.7
  unless:
  - id: metadata/file/text/catalog::uproc-tools-catalog
  - id: metadata/library/structure::js-large-module-bundle
  - id: metadata/package/testing/harness/runtime::is-test
  needs: 3
  any:
  - id: objectives/impact/cryptojacking/miner/context::wallet-ref
  - id: micro-behaviors/data/text/keywords/lexicon::crypto-word
  - id: metamask-word
  - id: phantom-word
  - id: browser-word
- id: comprehensive-stealer
  desc: Comprehensive wallet credential theft
  crit: hostile
  conf: 0.95
  for:
  - python
  - javascript
  - elf
  - pe
  - macho
  needs: 3
  any:
  - id: mnemonic-terms
  - id: private-key-hex
  - id: keystore-file
  - id: derivation-path
  - id: bip39-wordlist
- id: phantom-word-unless-cond-1--rx-helper-4
  desc: Regex component marker
  crit: component
  conf: 1.0
  for:
  - python
  - csharp
  - go
  size_max: 10485760
  any:
  - id: phantom-word-unless-cond-1--rx-1
  - id: phantom-word-unless-cond-1--rx-2
  - id: phantom-word-unless-cond-1--rx-3
