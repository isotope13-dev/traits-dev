defaults:
  platforms: [windows, unix]
  for: [html, javascript]
  attack: T1555
  mbc: B0028
  crit: component
  conf: 0.86
traits:
  - id: recovery-phrase-entry-prompt
    desc: Recovery phrase entry prompt
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'Enter your 12 or 24[- ]word recovery phrase'
  - id: generic-recovery-phrase-entry-prompt
    desc: Generic recovery phrase entry prompt
    crit: suspicious
    conf: 0.88
    for: [html, javascript, archives]
    unless:
      - id: well-known/app/pearl::pearl-wallet-app-context
    if:
      type: text
      substr: Enter your recovery phrase
  - id: twelve-or-twentyfour-phrase
    desc: Twelve or twenty-four word phrase
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: '12 or 24[- ]word recovery phrase'
  - id: optional-passphrase-word
    desc: Optional wallet passphrase field
    crit: suspicious
    conf: 0.86
    if:
      type: text
      substr: 25th word
  - id: restore-from-recovery-copy
    desc: Restore from recovery phrase copy
    crit: component
    conf: 0.82
    if:
      type: text
      substr: Restore from recovery phrase
  - id: numbered-seedword-inputs
    desc: Numbered seedword input grid
    crit: suspicious
    conf: 0.92
    for: [html, javascript, archives]
    count_min: 12
    if:
      type: text
      regex: 'id=["'']seedword[0-9]{1,2}["'']'
  - id: seedword-input-name
    desc: Seedword input identifier
    crit: component
    conf: 0.86
    for: [html, javascript, archives]
    if:
      type: text
      substr: seedword

  - id: wallet-mnemonic-textarea
    desc: Wallet mnemonic textarea input
    crit: suspicious
    conf: 0.96
    for: [html, javascript, archives]
    if:
      type: text
      regex: '<textarea\b[\s\S]{0,500}\bmnemonic\b'

  - id: wallet-seed-textarea
    desc: Wallet seed textarea input
    crit: suspicious
    conf: 0.96
    for: [html, javascript, archives]
    unless:
      - id: well-known/app/pearl::pearl-wallet-app-context
    if:
      type: text
      regex: '<textarea\b[\s\S]{0,500}\bseed\b'

  - id: wallet-recovery-textarea
    desc: Wallet recovery textarea input
    crit: suspicious
    conf: 0.96
    for: [html, javascript, archives]
    unless:
      - id: well-known/app/pearl::pearl-wallet-app-context
    if:
      type: text
      regex: '<textarea\b[\s\S]{0,500}\brecovery\b'

  - id: wallet-seed-phrase-entry-label
    desc: Wallet seed phrase entry label
    crit: notable
    conf: 0.96
    unless:
      - id: well-known/app/did-wallet::did-wallet-extension-context
      - id: well-known/app/did-wallet::did-wallet-secret-safety-warning
      - id: well-known/app/pearl::pearl-wallet-app-context
    if:
      type: literal
      regex: '\b(import|enter|restore|recover)\b.{0,60}\bseed phrase\b'
      case_insensitive: true

  - id: wallet-secret-phrase-entry-label
    desc: Wallet secret phrase entry label
    crit: notable
    conf: 0.96
    unless:
      - id: well-known/app/did-wallet::did-wallet-extension-context
      - id: well-known/app/did-wallet::did-wallet-secret-safety-warning
    if:
      type: literal
      regex: '\b(import|enter|restore|recover)\b.{0,60}\bsecret phrase\b'
      case_insensitive: true

  - id: wallet-recovery-phrase-entry-label
    desc: Wallet recovery phrase entry label
    crit: notable
    conf: 0.96
    unless:
      - id: well-known/app/did-wallet::did-wallet-extension-context
      - id: well-known/app/did-wallet::did-wallet-secret-safety-warning
      - id: well-known/app/pearl::pearl-wallet-app-context
    if:
      type: literal
      regex: '\b(import|enter|restore|recover)\b.{0,60}\brecovery phrase\b'
      case_insensitive: true

  - id: wallet-mnemonic-entry-label
    desc: Wallet mnemonic entry label
    crit: notable
    conf: 0.96
    unless:
      - id: well-known/app/did-wallet::did-wallet-extension-context
      - id: well-known/app/did-wallet::did-wallet-secret-safety-warning
      - id: metadata/package/quality/false-positives::openchamber-credential-import-context
      - id: metadata/package/quality/false-positives::openchamber-assembly-grammar-context
      - id: well-known/app/pearl::pearl-wallet-app-context
    if:
      type: literal
      regex: '\b(import|enter|restore|recover)\b.{0,60}\bmnemonic\b'
      case_insensitive: true

  - id: wallet-private-key-entry-label
    desc: Wallet private-key entry label
    crit: notable
    conf: 0.96
    unless:
      - id: well-known/app/did-wallet::did-wallet-extension-context
      - id: well-known/app/did-wallet::did-wallet-secret-safety-warning
      - id: well-known/lib/aws-sdk-js/
      - id: well-known/lib/bitgo-js::bitgo-js-archive-context
      - id: well-known/app/canopy::canopy-wallet-app-context
    for: [html, javascript, svg, archives]
    if:
      type: literal
      regex: '\b(import|enter|input)\b(\s+[A-Za-z]{1,12})?\s+private[ _-]*key\b'
      case_insensitive: true

  - id: wallet-private-key-recovery-label
    desc: Wallet private-key recovery label
    crit: notable
    conf: 0.96
    unless:
      - id: well-known/app/did-wallet::did-wallet-extension-context
      - id: well-known/app/did-wallet::did-wallet-secret-safety-warning
      - id: well-known/lib/aws-sdk-js/
      - id: well-known/lib/bitgo-js::bitgo-js-archive-context
      - id: well-known/app/canopy::canopy-wallet-app-context
    for: [html, javascript, svg, archives]
    if:
      type: literal
      regex: '\b(restore|recover)\b.{0,60}\bprivate[ _-]*key\b'
      case_insensitive: true

  - id: numbered-wallet-word-inputs
    desc: Numbered wallet word input grid
    crit: suspicious
    conf: 0.95
    count_min: 12
    if:
      type: text
      regex: 'name=["'']word[0-9]{1,2}["'']'

  - id: numbered-seed-word-inputs
    desc: Numbered seed-word input grid
    crit: suspicious
    conf: 0.97
    count_min: 12
    if:
      type: text
      regex: 'name=["'']seed[-_ ]word[-_ ]?[0-9]{1,2}["'']'

  - id: wallet-seed-word-field-code
    desc: Seed-word field code with collected inputs
    crit: suspicious
    conf: 0.96
    unless:
      - id: well-known/app/did-wallet::did-wallet-extension-context
      - id: well-known/app/did-wallet::did-wallet-secret-safety-warning
    if:
      type: text
      regex: '\bseedInputs\b.{0,180}\bseed[-_ ]word\b'

composite_rules:
  - id: web-mnemonic-entry-form
    desc: Web recovery phrase capture form
    crit: suspicious
    conf: 0.93
    all:
      - id: recovery-phrase-entry-prompt
      - id: objectives/credential-access/wallet/keywords::seed-phrase-word
    any:
      - id: twelve-or-twentyfour-phrase
      - id: optional-passphrase-word
      - id: restore-from-recovery-copy
  - id: web-seedword-entry-form
    desc: Web seedword recovery phrase capture form
    crit: suspicious
    conf: 0.94
    for: [html, javascript, archives]
    all:
      - id: generic-recovery-phrase-entry-prompt
      - id: numbered-seedword-inputs
      - id: seedword-input-name

  - id: wallet-credential-entry-page
    desc: Wallet private-key or phrase entry page
    crit: suspicious
    conf: 0.97
    for: [html, javascript, svg, xpi, archives]
    scope: archive
    unless:
      - id: well-known/app/did-wallet::did-wallet-extension-context
      - id: well-known/app/did-wallet::did-wallet-secret-safety-warning
    all:
      - id: wallet-credential-entry-label
      - id: wallet-credential-input-surface
      - id: well-known/app/browser-extension::wallet-extension-marker

  - id: wallet-credential-entry-label
    desc: Wallet secret-entry label
    crit: notable
    conf: 0.97
    for: [html, javascript, svg, archives]
    unless:
      - id: well-known/app/did-wallet::did-wallet-extension-context
      - id: well-known/app/did-wallet::did-wallet-secret-safety-warning
      - id: well-known/app/pearl::pearl-wallet-app-context
      - id: well-known/app/canopy::canopy-wallet-app-context
    any:
      - id: wallet-seed-phrase-entry-label
      - id: wallet-secret-phrase-entry-label
      - id: wallet-recovery-phrase-entry-label
      - id: wallet-mnemonic-entry-label
      - id: wallet-private-key-entry-label
      - id: wallet-private-key-recovery-label

  - id: wallet-credential-input-surface
    desc: Wallet secret input surface
    crit: suspicious
    conf: 0.96
    for: [html, javascript, svg, archives]
    unless:
      - id: well-known/app/did-wallet::did-wallet-extension-context
      - id: well-known/app/did-wallet::did-wallet-secret-safety-warning
      - id: well-known/app/canopy::canopy-wallet-app-context
    all:
      - id: wallet-credential-entry-label
    any:
      - id: numbered-wallet-word-inputs
      - id: numbered-seed-word-inputs
      - id: wallet-secret-textarea
      - id: micro-behaviors/ui/window/manage/dom::password-input-field
      - id: micro-behaviors/ui/window/form-input::password-input-field-script

  - id: wallet-secret-textarea
    desc: Wallet recovery secret textarea input
    crit: suspicious
    conf: 0.96
    for: [html, javascript, archives]
    unless:
      - id: well-known/app/did-wallet::did-wallet-extension-context
      - id: well-known/app/did-wallet::did-wallet-secret-safety-warning
      - id: well-known/app/canopy::canopy-wallet-app-context
      - id: well-known/app/pearl::pearl-wallet-app-context
    any:
      - id: wallet-mnemonic-textarea
      - id: wallet-seed-textarea
      - id: wallet-recovery-textarea

  - id: wallet-credential-http-exfil
    desc: Wallet credential entry data sent over HTTP
    crit: hostile
    conf: 0.99
    attack: T1056.002,T1041
    for: [crx, xpi, archives]
    scope: archive
    all:
      - id: objectives/exfiltration/sensitive-data::js-private-key-input-and-request-field
      - id: micro-behaviors/ui/window/manage/dom::dom-element-value-read
      - id: micro-behaviors/communications/http/request/client::http-post-json

  - id: wallet-seed-http-exfil
    desc: Collected wallet seed words sent in an HTTP request
    crit: hostile
    conf: 0.99
    attack: T1056.002,T1041
    for: [crx, xpi, archives]
    scope: archive
    all:
      - id: wallet-seed-word-field-code
      - id: micro-behaviors/ui/window/manage/dom::dom-element-value-read
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
      - id: micro-behaviors/communications/http/request/client::post-method-text
      - id: micro-behaviors/communications/http/header/content-type::json-header

  - id: wallet-credential-encoded-http-exfil
    desc: Wallet secret entry paired with encoded HTTP exfiltration
    crit: hostile
    conf: 0.99
    attack: T1056.002,T1041,T1027
    for: [crx, xpi, archives]
    scope: archive
    all:
      - id: wallet-credential-entry-page
      - id: objectives/exfiltration/http/encoded::js-xor-base64-http-post-exfil
