      - shell
      - python
      - javascript
      - typescript
    if:
      type: text
      substr: /IndexedDB/
composite_rules:
  - id: browser-wallet-extensions
    desc: Browser-based crypto wallet extension IDs
    any:
      - id: metamask
      - id: phantom
      - id: trust-wallet
      - id: objectives/credential-access/wallet/extension::binance-dup
      - id: coinbase
      - id: tronlink
      - id: nami
      - id: temple
      - id: petra
      - id: martian
      - id: pontem
      - id: objectives/credential-access/wallet/extension::exodus-dup
      - id: keplr
      - id: rabby
      - id: brave
      - id: metamask-edge
      - id: coin98
      - id: mathwallet
      - id: safepal
      - id: solflare
      - id: wombat
    crit: suspicious
    unless:
      - id: well-known/app/microsoft-edge::microsoft-edge-package-context
  - id: desktop-wallets
    desc: Desktop wallet path references
    any:
      - id: objectives/credential-access/wallet/extension::coinomi-dup
      - id: objectives/credential-access/wallet/extension::atomic-dup
      - id: objectives/credential-access/wallet/extension::electrum-dup
    crit: suspicious
  - id: multi-wallet-targeting
    desc: Multiple crypto wallet extensions targeted
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    mbc: B0028
    for:
      - python
      - javascript
      - elf
      - pe
      - macho
    needs: 3
    any:
      - id: metamask
      - id: phantom
      - id: trust-wallet
      - id: objectives/credential-access/wallet/extension::binance-dup
      - id: coinbase
      - id: tronlink
      - id: objectives/credential-access/wallet/extension::exodus-dup
      - id: keplr
      - id: petra
      - id: martian
      - id: pontem
      - id: nami
      - id: temple
      - id: rabby
      - id: brave
      - id: metamask-edge
      - id: coin98
      - id: mathwallet
      - id: safepal
      - id: solflare
      - id: wombat
  - id: wallet-extension-store-targeting
    desc: Wallet extension storage targeting across Local, Sync, or IndexedDB stores
    crit: suspicious
    conf: 0.94
    for:
      - applescript
      - shell
      - python
      - javascript
      - typescript
    all:
      - id: objectives/credential-access/wallet/extension::browser-wallet-extensions
    any:
      - id: objectives/credential-access/wallet/lazarus::wallet-extension-path
      - id: sync-extension-settings-path
      - id: indexeddb-extension-path
  - id: obfuscated-multi-wallet-stealer
    desc: Obfuscated code targets wallets and spawns child processes
    crit: hostile
    conf: 0.98
    attack: "T1027,T1555.003"
    mbc: B0028
    for: [javascript, typescript]
    all:
      - id: multi-wallet-targeting
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::hex-name-mangling-with-string-table-rotation
      - id: micro-behaviors/process/create/shell/bridge::js-spawnsync
  - id: metamask-wallet-profile
    desc: MetaMask wallet data profile
    crit: suspicious
    conf: 0.95
    for: [binaries, scripts]
    all:
      - id: metamask-icon-url
      - id: wallet-name-field
      - id: wallet-address-field
