defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [python, javascript, typescript, elf, macho, pe]
traits:
  - id: metamask
    desc: MetaMask wallet extension ID
    crit: suspicious
    conf: 0.9
    attack: T1555.003
    mbc: B0028
    if:
      type: text
      substr: nkbihfbeogaeaoehlefnkodbefgpgknn
    unless:
    - id: well-known/app/browser-extension-known/
    - id: well-known/app/rabby::rabby-wallet-extension-context
  - id: metamask-icon-url
    desc: MetaMask icon remote URL
    crit: suspicious
    conf: 0.9
    for: [binaries, scripts]
    if:
      type: text
      substr: https://i.ibb.co/VSXvxMr/metamask.png
  - id: wallet-name-field
    desc: Wallet name data field
    crit: component
    conf: 0.75
    for: [binaries, scripts]
    if:
      type: text
      exact: WalletName
  - id: wallet-address-field
    desc: Wallet address data field
    crit: component
    conf: 0.75
    for: [binaries, scripts]
    if:
      type: text
      exact: WalletAddress
  - id: phantom
    desc: Phantom wallet extension ID (Solana)
