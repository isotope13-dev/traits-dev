composite_rules:
  - id: browser-wallet-extensions
    desc: Browser-based crypto wallet extension IDs
    any:
      - id: metamask
      - id: phantom
      - id: trust-wallet
      - id: objectives/credential-access/wallet/extension::binance-dup
      - id: coinbase
      - id: tronlink
      - id: nami
      - id: temple
      - id: petra
      - id: martian
      - id: pontem
      - id: objectives/credential-access/wallet/extension::exodus-dup
      - id: keplr
      - id: rabby
      - id: brave
      - id: metamask-edge
      - id: coin98
      - id: mathwallet
      - id: safepal
      - id: wombat
    crit: notable
  - id: desktop-wallets
    desc: Desktop wallet path references
    any:
      - id: objectives/credential-access/wallet/extension::coinomi-dup
      - id: objectives/credential-access/wallet/extension::atomic-dup
      - id: objectives/credential-access/wallet/extension::electrum-dup
    crit: notable
  - id: multi-wallet-targeting
    desc: Multiple crypto wallet extensions targeted
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    mbc: B0028
    for:
      - python
      - javascript
      - elf
      - pe
      - macho
    needs: 3
    any:
      - id: metamask
      - id: phantom
      - id: trust-wallet
      - id: objectives/credential-access/wallet/extension::binance-dup
      - id: coinbase
      - id: tronlink
      - id: objectives/credential-access/wallet/extension::exodus-dup
      - id: keplr
      - id: petra
      - id: martian
      - id: pontem
      - id: nami
      - id: temple
      - id: rabby
      - id: brave
      - id: metamask-edge
      - id: coin98
      - id: mathwallet
      - id: safepal
      - id: wombat
