# Opaque Go-WASM Solana transaction monitor.
#
# A Go-compiled WebAssembly module whose readable strings reveal both the
# `syscall/js` host bridge (it drives the JavaScript host) and the full
# Solana parsed-transaction RPC schema (accountKeys, innerInstructions,
# programId, logMessages, signer, signature). A module shipped as opaque
# bytecode whose only discernible purpose is watching Solana transactions and
# reaching back into the JS host is the surveillance half of a wallet-drainer
# toolchain, not an editor feature. Delivered by the stealth loader in
# objectives/command-and-control/dropper/execution/loader/go-wasm-stealth.
#
# ATT&CK: T1005 (Data from Local System)
defaults:
  platforms: [windows, unix]
  for: [wasm]
  attack: "T1005"
composite_rules:
  - id: go-wasm-solana-transaction-monitor
    desc: Go-WASM module monitors Solana transactions
    crit: suspicious
    conf: 0.9
    # The Go-WASM JS-host bridge (an import) and the Solana field tags (rodata)
    # sit far apart in the module, so an all: of both would fail proximity;
    # gate the bridge in all: and the schema fields as a needs:-of-any: set
    # (which the notable `solana-parsed-transaction-schema` composite mirrors,
    # but a needs:-based composite can't be referenced as a leg).
    all:
      - id: micro-behaviors/data/runtime/library::go-wasm-syscall-js-bridge
    needs: 2
    any:
      - id: micro-behaviors/communications/http/url/rpc::solana-tx-account-keys-field
      - id: micro-behaviors/communications/http/url/rpc::solana-tx-inner-instructions-field
      - id: micro-behaviors/communications/http/url/rpc::solana-tx-program-id-field

  # Stronger sibling: the module doesn't just read transactions, it carries
  # symmetric crypto (ChaCha20) + host entropy + the JS host bridge — i.e. it
  # encrypts harvested wallet data for exfil through the host. ChaCha20 is the
  # mandatory anchor (a single all: leg avoids the cross-fact proximity gate);
  # the rest corroborate via needs:-of-any:.
  - id: go-wasm-solana-crypto-staging
    desc: Go-WASM stages encrypted Solana wallet data
    crit: suspicious
    conf: 0.93
    attack: "T1027,T1005"
    all:
      - id: micro-behaviors/crypto/symmetric/stream::chacha-salsa-constant
    needs: 2
    any:
      - id: micro-behaviors/data/runtime/library::go-wasm-syscall-js-bridge
      - id: micro-behaviors/communications/http/url/rpc::solana-tx-account-keys-field
      - id: micro-behaviors/communications/http/url/rpc::solana-tx-inner-instructions-field
      - id: micro-behaviors/os/random/crypto::wasi-random-get
