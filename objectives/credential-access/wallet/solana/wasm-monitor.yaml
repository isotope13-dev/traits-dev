# Opaque Go-WASM Solana transaction monitor.
#
# A Go-compiled WebAssembly module whose readable strings reveal both the
# `syscall/js` host bridge (it drives the JavaScript host) and the full
# Solana parsed-transaction RPC schema (accountKeys, innerInstructions,
# programId, logMessages, signer, signature). A module shipped as opaque
# bytecode whose only discernible purpose is watching Solana transactions and
# reaching back into the JS host is the surveillance half of a wallet-drainer
# toolchain, not an editor feature. Delivered by the stealth loader in
# objectives/command-and-control/dropper/execution/loader/go-wasm-stealth.
#
# ATT&CK: T1005 (Data from Local System)
defaults:
  platforms: [windows, unix]
  for: [wasm]
  attack: "T1005"
composite_rules:
  - id: go-wasm-solana-transaction-monitor
    desc: Go-WASM module monitors Solana transactions
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/data/runtime/library::go-wasm-syscall-js-bridge
      - id: micro-behaviors/communications/http/url/rpc::solana-parsed-transaction-schema
