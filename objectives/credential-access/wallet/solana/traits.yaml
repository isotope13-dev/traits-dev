# Credential Access - Solana Wallet
# ATT&CK: T1555 (Credentials from Web Browsers/Wallets)
defaults:
  platforms: [unix, windows]
  attack: "T1555"
  crit: suspicious
traits:
- id: solana-secretkey-json-field--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    regex: '(secretKey|privateKey).{0,120}Array\.from|Array\.from.{0,120}(secretKey|privateKey)'
  count_max: 1010205
- id: solana-keypair-reference
  desc: Solana keypair reference
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    regex: 'solana[\s\S]{0,80}keypair|keypair[\s\S]{0,80}solana'
    case_insensitive: true
  count_max: 1010209
composite_rules:
- id: solana-wallet-collection
  desc: Solana wallet data collection behavior
  conf: 0.95
  all:
  - id: micro-behaviors/communications/http/url/rpc::solana-rpc-method
  - id: micro-behaviors/communications/http/url/rpc::solana-rpc-url
  unless:
  - id: well-known/app/calvyn-code
  - id: well-known/lib/solana-web3/
- id: solana-wallet-drain
  desc: Solana SOL fund transfer from stolen key
  crit: hostile
  conf: 0.95
  for: [javascript, typescript]
  near_lines: 200
  all:
  - id: micro-behaviors/crypto/library/blockchain/wallet::solana-keypair-from-secret-key
  - id: objectives/credential-access/wallet/keywords::solana-system-transfer
  any:
  - id: micro-behaviors/os/env/vars/credentials::javascript-private-key-environment-variable
  - id: micro-behaviors/data/decode/base58::bs58-decode
  unless:
  - id: well-known/lib/solana-web3/
- id: solana-env-drain
  desc: Solana wallet drainer via env credential theft
  crit: hostile
  conf: 0.95
  for: [javascript, typescript]
  all:
  - id: micro-behaviors/os/env/vars/credentials::javascript-private-key-environment-variable
  - id: objectives/credential-access/wallet/keywords::solana-system-transfer
  - id: micro-behaviors/communications/http/url/rpc::solana-rpc-method-2
  unless:
  - id: well-known/lib/solana-web3/
- id: solana-private-key-http-exfil
  desc: Solana private key HTTP exfiltration
  crit: hostile
  conf: 0.96
  for: [javascript, typescript]
  near_lines: 100
  all:
  - id: micro-behaviors/crypto/library/blockchain/wallet::solana-keypair-from-secret-key
  - id: solana-secretkey-serialization
  - id: solana-secretkey-json-field
  any:
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: micro-behaviors/communications/http/post::post-ast
  - id: micro-behaviors/communications/http/post::post-method-detection
  unless:
  - id: well-known/lib/solana-web3/
- id: solana-secretkey-serialization
  desc: Solana secret key serialization markers
  crit: baseline
  conf: 0.9
  for: [javascript, typescript]
  all:
  - id: micro-behaviors/data/source/syntax/credential::secret-key-identifier
  any:
  - id: micro-behaviors/data/buffer::uint8array-from
  - id: micro-behaviors/data/buffer::buffer-from-call
- id: solana-secretkey-json-field
  desc: Labels serialized Solana private key
  crit: baseline
  conf: 0.85
  for: [javascript, typescript]
  all:
  - id: solana-secretkey-json-field--rx-8
  any:
  - id: objectives/credential-access/wallet/keywords::private-key-word
  - id: micro-behaviors/data/source/syntax/credential::secret-key-identifier
  - id: solana-keypair-reference
