# Credential Access - Solana Wallet
# ATT&CK: T1555 (Credentials from Web Browsers/Wallets)
defaults:
  platforms: [unix, windows]
  attack: "T1555"
  crit: suspicious
traits:
- id: solana-secretkey-serialization--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: Uint8Array.from
  count_max: 1010198
- id: solana-secretkey-serialization--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: privateKey
  count_max: 1010200
- id: solana-secretkey-serialization--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: secretKey
  count_max: 1010201
- id: solana-secretkey-serialization--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: toString
  count_max: 1010202
- id: solana-secretkey-serialization--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    substr: base64
  count_max: 1010203
- id: solana-secretkey-json-field--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    substr: Array.from
  count_max: 1010205
- id: solana-secretkey-json-field--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    substr: privateKey
  count_max: 1010206
- id: solana-secretkey-json-field--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    substr: secretKey
  count_max: 1010207
- id: solana-secretkey-json-field--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    substr: encoded
  count_max: 1010208
- id: solana-secretkey-json-field--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    substr: keypair
  count_max: 1010209
- id: solana-secretkey-json-field--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [javascript, typescript]
  if:
    type: text
    substr: payload
  count_max: 1010210
composite_rules:
- id: solana-wallet-collection
  desc: Solana wallet data collection behavior
  conf: 0.95
  all:
  - id: micro-behaviors/communications/http/url/rpc::solana-rpc-method
  - id: micro-behaviors/communications/http/url/rpc::solana-rpc-url
- id: solana-wallet-drain
  desc: Solana SOL fund transfer from stolen key
  crit: hostile
  conf: 0.95
  all:
  - id: micro-behaviors/data/text/crypto::solana-keypair-fromsecretkey
  - id: micro-behaviors/data/text/crypto::solana-system-transfer
  any:
  - id: objectives/credential-access/env/secrets/named-access::env-private-key
  - id: micro-behaviors/data/text/crypto::bs58-decode
- id: solana-env-drain
  desc: Solana wallet drainer via env credential theft
  crit: hostile
  conf: 0.95
  for: [javascript, typescript]
  all:
  - id: objectives/credential-access/env/secrets/named-access::env-private-key
  - id: micro-behaviors/data/text/crypto::solana-system-transfer
  - id: micro-behaviors/communications/http/url/rpc::solana-rpc-method-2
- id: solana-private-key-http-exfil
  desc: Solana private key HTTP exfiltration
  crit: hostile
  conf: 0.96
  for: [javascript, typescript]
  all:
  - id: micro-behaviors/data/text/crypto::solana-keypair-fromsecretkey
  - id: solana-secretkey-serialization
  - id: solana-secretkey-json-field
  any:
  - id: micro-behaviors/communications/http/request/client::fetch-string
  - id: micro-behaviors/communications/http/post::post-ast
  - id: micro-behaviors/communications/http/post::post-method-detection
- id: solana-secretkey-serialization
  desc: Serializes Solana secret key material
  crit: baseline
  conf: 0.9
  for: [javascript, typescript]
  any:
  - id: solana-secretkey-serialization--rx-1
  - id: micro-behaviors/process/interpreter/vm::buffer-from-call
  - id: solana-secretkey-serialization--rx-3
  - id: solana-secretkey-serialization--rx-4
  - id: solana-secretkey-serialization--rx-5
  - id: solana-secretkey-serialization--rx-6
- id: solana-secretkey-json-field
  desc: Labels serialized Solana private key
  crit: baseline
  conf: 0.85
  for: [javascript, typescript]
  any:
  - id: micro-behaviors/process/interpreter/vm::buffer-from-call
  - id: solana-secretkey-json-field--rx-8
  - id: solana-secretkey-json-field--rx-9
  - id: solana-secretkey-json-field--rx-10
  - id: solana-secretkey-json-field--rx-11
  - id: solana-secretkey-json-field--rx-12
  - id: solana-secretkey-json-field--rx-13
