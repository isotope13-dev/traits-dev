defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
traits:
  - id: solidity-files
    desc: Solidity source reference
    crit: baseline
    conf: 0.75
    if:
      type: text
      regex: (["'/][\w\-]+\.sol["',\]]|pragma\s+solidity|\.solidity\b)
    downgrade:
      any:
        - type: text
          substr: sublime-syntax
  - id: solana-config
    desc: Solana config file
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /solana/config.yml
  - id: wallet-extension-path
    desc: Path to wallet extension settings
    crit: suspicious
    conf: 1.0
    if:
      type: text
      substr: /Local Extension Settings/
composite_rules:
  - id: lazarus-crypto-targeting
    desc: Lazarus-style targeting of crypto wallet data
    any:
      - id: objectives/credential-access/wallet/extension::metamask
      - id: objectives/credential-access/wallet/extension::tronlink
      - id: objectives/credential-access/wallet/extension::metamask-edge
      - id: solana-config
      - id: wallet-extension-path
    crit: suspicious
    conf: 0.95
