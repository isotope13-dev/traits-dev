defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1552
traits:
  - id: signed-transaction-field
    desc: Signed crypto transaction field
    crit: component
    conf: 0.92
    if:
      type: text
      regex: 'signedTransaction(Hex|B64)'
  - id: private-key-base58-name
    desc: Base58 private key field name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: PRIVATE_KEY_BASE58
  - id: keyring-get-password
    desc: Python keyring password retrieval
    crit: component
    conf: 0.9
    if:
      type: text
      substr: keyring.get_password
  - id: keyring-set-password
    desc: Python keyring password storage
    crit: component
    conf: 0.9
    if:
      type: text
      substr: keyring.set_password
  - id: mcp-signed-transaction-tool
    desc: MCP signed transaction tool
    crit: component
    conf: 0.9
    if:
      type: text
      substr: FunctionTool(get_signed_transaction)
  - id: wallet-server-name
    desc: Wallet server name
    crit: component
    conf: 0.85
    if:
      type: text
      regex: 'Server\s*\(["''][^"'']{0,80}wallet'
composite_rules:
  - id: wallet-private-key-keyring
    desc: Wallet private key stored in keyring
    crit: suspicious
    conf: 0.95
    all:
      - id: private-key-base58-name
    any:
      - id: keyring-get-password
      - id: keyring-set-password
  - id: mcp-wallet-tool-server
    desc: MCP wallet signing tool server
    crit: suspicious
    conf: 0.95
    all:
      - id: mcp-signed-transaction-tool
      - id: wallet-server-name
  - id: mcp-wallet-transaction-signer
    desc: MCP server exposes wallet transaction signing
    crit: suspicious
    conf: 0.97
    all:
      - id: signed-transaction-field
      - id: mcp-wallet-tool-server
  - id: mcp-wallet-private-key-signer
    desc: MCP wallet signer uses stored private key
    crit: suspicious
    conf: 0.98
    all:
      - id: wallet-private-key-keyring
      - id: mcp-wallet-transaction-signer
