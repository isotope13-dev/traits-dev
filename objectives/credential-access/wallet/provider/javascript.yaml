defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - html
  attack: T1555.003
  crit: suspicious
traits:
  - id: window-dot-ethereum
    desc: window.ethereum access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: window.ethereum
    unless:
      - id: well-known/lib/nextjs::next-server-build-path
      - id: well-known/lib/supabase::auth-js-web3-module
  - id: window-bracket-ethereum
    desc: window["ethereum"] access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: window\[['"]ethereum['"]\]
  - id: ethereum-request-call
    desc: ethereum.request() call
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: ethereum\.request\s*\(
  - id: request-bracket-call
    desc: '["request"]() call pattern'
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      regex: \['"]request['"]\]\s*\(
  - id: eth-request-accounts-method
    desc: eth_requestAccounts method
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: eth_requestAccounts
    unless:
      - id: well-known/lib/nextjs::next-server-build-path
      - id: well-known/lib/supabase::auth-js-web3-module
  - id: eth-accounts-method
    desc: eth_accounts method
    crit: notable
    conf: 0.5
    if:
      type: string_literal
      substr: eth_accounts
  - id: erc20-approve
    desc: ERC-20 token approve function selector
    conf: 0.85
    crit: notable
    if:
      type: string_literal
      substr: '0x095ea7b3'
  - id: erc20-transfer
    desc: ERC-20 token transfer function selector
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      substr: '0xa9059cbb'
    unless:
    - id: well-known/app/browser-extension-known/
  - id: erc20-transferFrom
    desc: ERC-20 token transferFrom function selector
    conf: 0.85
    crit: notable
    if:
      type: string_literal
      substr: '0x23b872dd'
  - id: function-drain
    desc: Wallet draining function name marker
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: 'function\s+drain(Wallet|Account|Funds|Tokens)'
  - id: function-steal
    desc: Wallet-specific steal routine name
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: 'function\s+steal(Wallet|Account|Funds|Tokens?)\w*\s*\('
  - id: function-grab
    desc: Wallet-specific grab routine name
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: 'function\s+grab(Wallet|Account|Funds|Tokens?)\w*\s*\('
  - id: function-hijack
    desc: Wallet-related hijack function definition
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      regex: 'function\s+hijack(Wallet|Account|Eth|Token)\w*\s*\('
  - id: runmask-function
    desc: runmask MetaMask drainer routine
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      substr: runmask
  - id: newdlocal-function
    desc: newdlocal wallet drainer routine
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      substr: newdlocal
  - id: checkethereumw-function
    desc: checkethereumw drainer probe routine
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      substr: checkethereumw
  - id: max-uint256-approval
    desc: MAX_UINT256 constant for unlimited approval
    conf: 0.8
    crit: suspicious
    if:
      type: string_literal
      substr: MAX_UINT256
    unless:
    - id: metadata/library/structure::js-vite-rollup-vendor-chunk
    - id: metadata/library/runtime::acquire-vscode-api
    - id: metadata/library/structure/
  - id: set-approval-for-all
    desc: NFT setApprovalForAll method invocation
    conf: 0.85
    crit: notable
    if:
      type: text
      regex: '\.\s*setApprovalForAll\s*\('
    unless:
      - id: metadata/library/web3/
  - id: xsdk-main-bootstrap
    desc: XSDK bootstrap entrypoint call
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: window?.XSDK?.main
  - id: xsdk-assignment
    desc: Encoded XSDK bootstrap payload
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: window.XSDK = "
  - id: jsdelivr-jh5o-loader
    desc: jsDelivr jh5o drainer loader
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: cdn.jsdelivr.net/npm/jh5o@
  - id: xsdk-wallet-connect-fragment
    desc: XSDK Wallet Connect config fragment
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: Im5hbWUiOiJXYWxsZXQgQ29ubmVj
  - id: xsdk-solana-program-fragment
    desc: XSDK Solana program config fragment
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: InByb2dyYW0iOiJUb2tlbnpRZEJOYkxxUDVWRWhka0FTNkVQ
composite_rules:
  - id: ethereum-provider
    desc: Web3 wallet provider access (window.ethereum)
    crit: notable
    conf: 0.75
    any:
      - id: window-dot-ethereum
      - id: window-bracket-ethereum
  - id: ethereum-request
    desc: Ethereum wallet request API
    crit: notable
    conf: 0.8
    any:
      - id: ethereum-request-call
      - id: request-bracket-call
  - id: ethereum-provider-or-request
    desc: Ethereum provider access or request
    crit: notable
    conf: 0.75
    any:
      - id: ethereum-provider
      - id: ethereum-request
  - id: eth-request-accounts
    desc: Request wallet accounts (eth_requestAccounts)
    crit: notable
    conf: 0.85
    any:
      - id: eth-request-accounts-method
      - id: eth-accounts-method
  - id: wallet-transaction-method
    desc: Wallet transaction methods
    crit: notable
    conf: 0.8
    any:
      - id: micro-behaviors/communications/ipc/rpc::wallet-provider-send-method
      - id: erc20-approve
      - id: erc20-transfer
      - id: erc20-transferFrom
      - id: set-approval-for-all
  - id: drainer-function-names
    desc: Suspicious wallet drainer function names
    conf: 0.9
    crit: suspicious
    any:
      - id: function-drain
      - id: function-steal
      - id: function-grab
      - id: function-hijack
      - id: runmask-function
      - id: newdlocal-function
      - id: checkethereumw-function
  - id: drainer-action-functions
    desc: Drainer action function patterns
    conf: 0.85
    crit: suspicious
    any:
      - id: function-drain
      - id: function-steal
      - id: function-grab
  - id: drainer-indicator
    desc: Wallet drainer indicators
    conf: 0.85
    any:
      - id: drainer-function-names
      - id: max-uint256-approval
      - id: set-approval-for-all
    unless:
    - id: well-known/app/browser-extension-known/
  - id: wallet-connect-bootstrap
    desc: External wallet drainer bootstrap
    crit: suspicious
    conf: 0.96
    all:
      - id: jsdelivr-jh5o-loader
      - id: xsdk-assignment
    any:
      - id: xsdk-main-bootstrap
      - id: xsdk-wallet-connect-fragment
  - id: solana-wallet-drainer-config
    desc: Encoded Solana wallet drainer config
    crit: hostile
    conf: 0.995
    mbc: B0028
    all:
      - id: wallet-connect-bootstrap
      - id: xsdk-wallet-connect-fragment
      - id: xsdk-solana-program-fragment
  - id: wallet-drainer
    desc: Cryptocurrency wallet drainer (provider access
    crit: hostile
    conf: 0.95
    mbc: B0028
    all:
      - id: ethereum-provider-or-request
      - id: wallet-transaction-method
      - id: drainer-indicator
