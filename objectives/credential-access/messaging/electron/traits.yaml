# Electron App OAuth Token Theft via LevelDB
# Detects stealers that read OAuth/session tokens from Electron app Local Storage (LevelDB).
# Electron apps store per-origin key-value pairs in LevelDB under AppData\...\Local Storage\leveldb\.
# ATT&CK: T1539 (Steal Web Session Cookie), T1555 (Credentials from Password Stores)
# MBC: OB0009 (Collection), B0028 (Info Stealer)
defaults:
  platforms: [windows]
  for: [binaries]
  attack: T1539
  mbc: OB0009

traits:
  # YandexMusic-specific LevelDB path. YandexMusic is an Electron app whose Local Storage
  # is targeted by the Satacom stealer to extract OAuth tokens.
  - id: yandex-music-leveldb
    desc: YandexMusic Electron app LevelDB path
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: YandexMusic[/\\]+Local Storage[/\\]+leveldb
      case_insensitive: true

  # The LevelDB key used to store YandexMusic OAuth tokens. Origin is the Electron
  # custom protocol `_music-application://desktop`.
  - id: yandex-music-electron-protocol
    desc: YandexMusic Electron protocol origin key
    crit: suspicious
    conf: 0.98
    if:
      type: string_value
      substr: _music-application://desktop

  # Error string emitted when the OAuth token key is absent from the LevelDB store.
  # Only present in binaries designed to extract YandexMusic OAuth tokens.
  - id: oauthkey-missing-error
    desc: OAuth key missing from LevelDB
    crit: suspicious
    conf: 0.97
    if:
      type: string_value
      substr: oauthkey missing in db

composite_rules:
  # All three indicators together: targeted YandexMusic OAuth token extraction
  - id: yandex-music-oauth-theft
    desc: YandexMusic OAuth token extraction via Electron LevelDB
    crit: hostile
    conf: 0.97
    any:
      - id: yandex-music-leveldb
      - id: yandex-music-electron-protocol
      - id: oauthkey-missing-error
    needs: 2
