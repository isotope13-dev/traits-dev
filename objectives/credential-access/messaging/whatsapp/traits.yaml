# WhatsApp Web's encrypted IndexedDB stores contain live device/session
# material.  A script that reads those stores and decrypts their key records
# is credential access even when it is packaged as an extension.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, xpi]
  attack: T1539

traits:
  - id: whatsapp-web-store-target
    desc: Targets WhatsApp Web session storage
    crit: suspicious
    conf: 0.97
    for: [javascript, typescript]
    if:
      type: text
      regex: '\b(signal-storage|wawc_db_enc|model-storage)\b'

  - id: noise-key-field
    desc: WhatsApp noise key field
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      word: noiseKey

  - id: identity-key-field
    desc: WhatsApp identity key field
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      word: identityKey

  - id: static-key-pair-field
    desc: WhatsApp static key pair field
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      word: staticKeyPair

  - id: registration-id-field
    desc: WhatsApp registration ID field
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      word: registrationId

  - id: me-jid-field
    desc: WhatsApp account JID field
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    if:
      type: text
      word: meJid

composite_rules:
  - id: whatsapp-session-key-fields
    desc: WhatsApp device session key fields
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    any:
      - id: noise-key-field
      - id: identity-key-field
      - id: static-key-pair-field

  - id: whatsapp-session-device-fields
    desc: WhatsApp session device identifiers
    crit: component
    conf: 0.98
    for: [javascript, typescript]
    any:
      - id: registration-id-field
      - id: me-jid-field

  - id: whatsapp-web-session-material-theft
    desc: Extracts and decrypts WhatsApp Web session material
    crit: hostile
    conf: 0.99
    scope: archive
    all:
      - id: whatsapp-web-store-target
      - id: whatsapp-session-key-fields
      - id: whatsapp-session-device-fields
      - id: micro-behaviors/crypto/library/provider::subtle-encrypt-decrypt
