defaults:
  platforms: [unix]
  for: [php]
  attack: T1552.001

traits:
  - id: php-cloud-secret-env-list
    desc: PHP cloud secret env list
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'AWS_SECRET_ACCESS_KEY[\s\S]{0,180}AZURE_CLIENT_SECRET'

  - id: php-cloud-credential-files
    desc: PHP cloud credential files
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\.aws/credentials[\s\S]{0,180}\.kube/config'

  - id: php-cloud-metadata-urls
    desc: PHP cloud metadata URLs
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: 169.254.169.254

composite_rules:
  - id: php-cloud-local-credential-sweep
    desc: PHP cloud credential sweep
    crit: hostile
    conf: 0.98
    all:
      - id: php-cloud-secret-env-list
    any:
      - id: php-cloud-credential-files
      - id: php-cloud-metadata-urls
