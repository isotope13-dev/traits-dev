defaults:
  platforms: [unix]
  for: [rust, elf]
  attack: T1552

traits:
  - id: rust-cloud-metadata-path-set
    desc: Rust cloud metadata paths
    crit: component
    conf: 0.92
    if:
      type: text
      substr: /latest/meta-data/iam/security-credentials/

  - id: rust-gcp-service-account-path
    desc: Rust GCP service account path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /computeMetadata/v1/instance/service-accounts/

  - id: rust-cloud-env-secret-set
    desc: Rust cloud env secret set
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'AWS_SECRET_ACCESS_KEY[\s\S]{0,360}AZURE_CLIENT_SECRET'

  - id: rust-cloud-config-path-set
    desc: Rust cloud config path set
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\.kube/config[\s\S]{0,360}\.docker/config\.json'

composite_rules:
  - id: rust-cloud-credential-sweep
    desc: Rust cloud credential sweep
    crit: hostile
    conf: 0.98
    any:
      - id: rust-cloud-metadata-path-set
      - id: rust-gcp-service-account-path
      - id: rust-cloud-env-secret-set
      - id: rust-cloud-config-path-set
    needs: 2
    unless:
      - id: well-known/lib/deb-package::gdal-shared-library
      - id: well-known/app/vector::vector-observability-agent
      - id: well-known/tool/development/uv::astral-uv-python-tool
