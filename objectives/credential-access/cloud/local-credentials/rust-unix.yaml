defaults:
  platforms: [unix]
  for: [rust, elf]
  attack: T1552

traits:
  - id: rust-cloud-metadata-path-set
    desc: Rust cloud metadata paths
    crit: component
    conf: 0.92
    if:
      type: text
      substr: /latest/meta-data/iam/security-credentials/

  - id: rust-cloud-env-secret-set
    desc: Rust cloud env secret set
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'AWS_SECRET_ACCESS_KEY[\s\S]{0,360}AZURE_CLIENT_SECRET'

  - id: rust-cloud-config-path-set
    desc: Rust cloud config path set
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\.kube/config[\s\S]{0,360}\.docker/config\.json'

composite_rules:
  - id: rust-cloud-metadata-endpoint-set
    desc: Rust cloud metadata endpoint references
    crit: component
    conf: 0.92
    any:
      - id: rust-cloud-metadata-path-set
      - id: metadata/file/string/cloud::gcp-service-accounts-metadata-path

  - id: rust-cloud-credential-sweep
    desc: Rust cloud credential sweep
    crit: hostile
    conf: 0.98
    all:
      - id: rust-cloud-metadata-endpoint-set
    any:
      - id: rust-cloud-env-secret-set
      - id: rust-cloud-config-path-set
    unless:
      - id: well-known/lib/deb-package::gdal-shared-library
      - id: well-known/app/pgbackrest::pgbackrest-backup-tool
      - id: well-known/app/vector/
      - id: well-known/tool/development/uv/
      - id: well-known/lib/benign-runtime-bundles/
      - id: well-known/tool/sysadmin/alpine-packages::alpine-redpanda-binary
