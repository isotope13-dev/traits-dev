defaults:
  platforms: [windows, unix]
  for: [python]

traits:
  - id: python-aws-access-key-env-read
    desc: Python reads AWS access key env
    crit: notable
    conf: 0.88
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    if:
      type: text
      substr: os.environ.get("AWS_ACCESS_KEY_ID")

  - id: python-aws-shared-credentials-env-read
    desc: Python reads AWS shared creds env
    crit: notable
    conf: 0.88
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    if:
      type: text
      substr: os.environ.get("AWS_SHARED_CREDENTIALS_FILE")

  - id: python-gcp-app-credentials-env-read
    desc: Python reads GCP credentials env
    crit: notable
    conf: 0.88
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    if:
      type: text
      substr: os.environ.get("GOOGLE_APPLICATION_CREDENTIALS")

composite_rules:
  - id: python-aws-ambient-credential-probe
    desc: Python probes ambient AWS credentials
    crit: suspicious
    conf: 0.94
    attack: T1552.001
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    all:
      - id: python-aws-access-key-env-read
      - id: python-aws-shared-credentials-env-read
    near_bytes: 1200

  - id: python-gcp-credential-source-check
    desc: Python checks for a GCP credential source
    crit: notable
    conf: 0.94
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    all:
      - id: python-gcp-app-credentials-env-read
      - id: metadata/file/string/cloud::gcp-default-credentials
    near_bytes: 1200
    unless:
      - id: well-known/app/eeg-security/

  - id: python-multi-cloud-ambient-credential-probe
    desc: Python probes multiple cloud credentials
    crit: suspicious
    conf: 0.96
    attack: T1552.001
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    any:
      - id: python-aws-ambient-credential-probe
      - id: python-gcp-credential-source-check
    needs: 2

  - id: python-ai-reviewer-cloud-credential-probe
    desc: AI provider probes cloud credentials
    crit: suspicious
    conf: 0.97
    attack: T1552.001
    ref: sha256:c4174973b48d9d1137461e94456872cb6a8f223eb7740248bc4c16094cdcf93b
    all:
      - id: python-multi-cloud-ambient-credential-probe
      - id: micro-behaviors/communications/http/llm::python-ai-cloud-provider-reference
