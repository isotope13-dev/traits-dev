defaults:
  platforms: [windows, unix]
  for: [swift]
  attack: T1552.001

traits:
  - id: swift-cloud-config-read
    desc: Swift cloud config file read
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'application_default_credentials\.json[\s\S]{0,260}String\(contentsOfFile:'

  - id: swift-container-config-read
    desc: Swift container config read
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\.docker/config\.json[\s\S]{0,260}String\(contentsOfFile:'

  - id: swift-kube-config-read
    desc: Swift Kubernetes config read
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: '\.kube/config[\s\S]{0,260}String\(contentsOfFile:'

composite_rules:
  - id: swift-cloud-file-secret-harvest
    desc: Swift cloud file secret harvest
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: swift-cloud-config-read
      - id: swift-container-config-read
      - id: swift-kube-config-read
