defaults:
  platforms: [panos, appliance, unix]
  for: [objc, c, elf, macho]
  attack: T1552

traits:
  - id: objc-panos-aws-creds-file
    desc: ObjC PAN-OS AWS creds file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .aws/credentials

  - id: objc-panos-azure-msal-cache
    desc: ObjC PAN-OS Azure MSAL cache
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .azure/msal_token_cache.json

  - id: objc-panos-cloud-env-token-set
    desc: ObjC PAN-OS cloud env token set
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'PAN-OS[\s\S]{0,260}AWS_SECRET_ACCESS_KEY[\s\S]{0,260}AZURE_CLIENT_SECRET'

composite_rules:
  - id: objc-panos-cloud-file-token-harvest
    desc: ObjC PAN-OS cloud file token
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-aws-creds-file
      - id: objc-panos-azure-msal-cache

  - id: objc-panos-cloud-token-harvest
    desc: ObjC PAN-OS cloud token harvest
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-cloud-env-token-set
      - id: micro-behaviors/os/container/runtime::serviceaccount-token
