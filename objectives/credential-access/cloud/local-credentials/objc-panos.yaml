defaults:
  platforms: [panos, appliance, unix]
  for: [objc, c, elf, macho]
  attack: T1552

traits:
  - id: objc-panos-aws-creds-home-var
    desc: ObjC AWS creds HOME path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: $HOME/.aws/credentials

  - id: objc-panos-aws-creds-root
    desc: ObjC AWS creds root path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: /root/.aws/credentials

  - id: objc-panos-aws-creds-userhome
    desc: ObjC AWS creds user-home path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '/home/.{1,64}/\.aws/credentials'

  - id: objc-panos-aws-creds-format
    desc: ObjC AWS creds format path
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '%[s@]/\.aws/credentials'

  - id: objc-panos-aws-creds-tilde
    desc: ObjC AWS creds tilde path
    crit: component
    conf: 0.9
    if:
      type: text
      substr: ~/.aws/credentials

  - id: objc-panos-azure-msal-cache
    desc: ObjC PAN-OS Azure MSAL cache
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: .azure/msal_token_cache.json

  - id: objc-panos-cloud-env-token-set
    desc: ObjC PAN-OS cloud env token set
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'PAN-OS[\s\S]{0,260}AWS_SECRET_ACCESS_KEY[\s\S]{0,260}AZURE_CLIENT_SECRET'

composite_rules:
  - id: objc-panos-aws-creds-file
    desc: ObjC PAN-OS AWS creds file
    crit: suspicious
    conf: 0.94
    any:
      - id: objc-panos-aws-creds-home-var
      - id: objc-panos-aws-creds-root
      - id: objc-panos-aws-creds-userhome
      - id: objc-panos-aws-creds-format
      - id: objc-panos-aws-creds-tilde

  - id: objc-panos-cloud-file-token-harvest
    desc: ObjC PAN-OS cloud file token
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-aws-creds-file
      - id: objc-panos-azure-msal-cache

  - id: objc-panos-cloud-token-harvest
    desc: ObjC PAN-OS cloud token harvest
    crit: hostile
    conf: 0.98
    all:
      - id: objc-panos-cloud-env-token-set
      - id: micro-behaviors/os/container/runtime::serviceaccount-token
