defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]

traits:
  - id: aws-ses-marker
    desc: AWS SES result marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: AWS

  - id: aws-credential-parser
    desc: AWS credential parser function
    crit: component
    conf: 0.98
    if:
      type: symbol
      kind: function
      regex: '^(parse|format).*Aws'

  # Matched as text (not a `kind: function` symbol): obfuscator.io call-wrapping
  # rewrites `createAwsSesSaveBackend(x)` into `wrapper(createAwsSesSaveBackend, x)`,
  # so the factory survives only as a call-argument identifier, not a call target.
  # A text regex catches it in both the plain (local function) and packed forms.
  - id: aws-credential-save-backend
    desc: AWS credential save/load backend factory
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '\b(create|load)[A-Za-z0-9]*Aws[A-Za-z0-9]*\b'

  - id: aws-access-key-pattern
    desc: AWS access-key marker
    crit: component
    conf: 0.98
    if:
      type: text
      substr: AKIA

  # Result-file writer that persists harvested SES rows. Survives string-splitting
  # obfuscation (the class identifier stays intact even when `fs.createWriteStream`
  # / `appendFile` are hidden behind hex-escaped bracket access).
  - id: aws-result-writer
    desc: AWS SES credential result-file writer
    crit: component
    conf: 0.95
    if:
      type: text
      regex: '\bAws[A-Za-z0-9]*Writer\b'

composite_rules:
  - id: aws-ses-credential-record
    desc: Parses and persists AWS SES credential records
    crit: suspicious
    conf: 0.98
    attack: T1552.001
    all:
      - id: aws-ses-marker
      - id: aws-credential-parser
      - id: aws-access-key-pattern
    # Persistence proof: a raw stream/record write (plain builds) OR the named
    # AWS result-writer (packed builds where the fs call is obfuscated away).
    any:
      - id: micro-behaviors/fs/write/file/stream::node-stream-record-write
      - id: aws-result-writer
    needs: 1

  - id: obfuscated-aws-ses-credential-autosave
    desc: Obfuscated AWS credential autosave
    crit: hostile
    conf: 0.99
    attack: T1027,T1552.001,T1074.001
    all:
      - id: aws-ses-credential-record
      - id: aws-credential-save-backend
      - id: objectives/anti-static/obfuscation/obfuscator/js-obfuscator::any-name-mangling
    unless:
      - id: metadata/package/testing/harness/runtime::obfuscated-mocked-network-test-harness
