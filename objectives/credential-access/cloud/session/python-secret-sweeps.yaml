defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1552.005
  mbc: E1552

traits:
- id: azure-keyvault-resource
  desc: Azure Key Vault resource URL
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: https://vault.azure.net
- id: azure-keyvault-management-list
  desc: Azure Key Vault management vault listing
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: Microsoft.KeyVault/vaults
- id: azure-keyvault-secret-list-path
  desc: Azure Key Vault secret listing path
  crit: suspicious
  conf: 0.92
  if:
    type: string_literal
    substr: /secrets?api-version=
- id: azure-keyvault-secret-value-path
  desc: Azure Key Vault secret value path
  crit: suspicious
  conf: 0.92
  if:
    type: string_literal
    regex: '/secrets/.{1,80}\?api-version='
- id: azure-cli-token-cache-path
  desc: Azure CLI token cache path
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: .azure/accessTokens.json
- id: gcp-secretmanager-base
  desc: GCP Secret Manager REST API base
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: secretmanager.googleapis.com/v1
- id: gcp-secretmanager-latest-access
  desc: GCP Secret Manager latest version access
  crit: suspicious
  conf: 0.92
  if:
    type: string_literal
    substr: /versions/latest:access
- id: gcp-application-default-credentials-path
  desc: GCP application default credentials path
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: application_default_credentials.json
- id: cloud-secret-value-reader-symbol
  desc: Python secret value reader function
  crit: component
  conf: 0.86
  if:
    type: symbol
    exact: _get_secret_value
- id: cloud-secret-list-symbol
  desc: Python secret listing function
  crit: component
  conf: 0.86
  if:
    type: symbol
    regex: '^_(list_secret_names|list_secrets)$'

composite_rules:
- id: python-azure-keyvault-secret-sweep
  desc: Python Azure Key Vault secret sweep
  crit: hostile
  conf: 0.97
  all:
  - id: azure-keyvault-resource
  - id: azure-keyvault-management-list
  - id: azure-keyvault-secret-list-path
  any:
  - id: azure-keyvault-secret-value-path
  - id: cloud-secret-value-reader-symbol
  - id: cloud-secret-list-symbol
  - id: azure-cli-token-cache-path
  near_lines: 220
- id: python-gcp-secretmanager-secret-sweep
  desc: Python GCP Secret Manager secret sweep
  crit: hostile
  conf: 0.97
  all:
  - id: gcp-secretmanager-base
  - id: gcp-secretmanager-latest-access
  any:
  - id: cloud-secret-value-reader-symbol
  - id: cloud-secret-list-symbol
  - id: gcp-application-default-credentials-path
  - id: objectives/credential-access/cloud/token::gcp-metadata-access
  near_lines: 180
- id: python-multi-cloud-secret-sweep
  desc: Python multi-cloud managed secret sweep
  crit: hostile
  conf: 0.985
  for: [python, archives]
  needs: 2
  any:
  - id: objectives/credential-access/cloud/token::python-aws-imds-secret-inventory
  - id: python-azure-keyvault-secret-sweep
  - id: python-gcp-secretmanager-secret-sweep
  - id: objectives/supply-chain/credential-theft/cloud-kube::python-cloud-kube-secret-harvest
  scope: archive
