defaults:
  platforms: [unix]
  for: [javascript]
  attack: T1552
  crit: component
  conf: 0.9

traits:
  - id: icloud-account-login-endpoint
    desc: iCloud account login endpoint
    if:
      type: text
      substr: https://setup.icloud.com/setup/ws/1/accountLogin

  - id: icloud-findmy-api-endpoint
    desc: iCloud Find My endpoint
    if:
      type: text
      substr: fmipservice/client/web

  - id: apple-id-env-access
    desc: Apple ID environment access
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: process.env.apple_id

  - id: password-env-access
    desc: Password environment access
    crit: notable
    conf: 0.82
    if:
      type: text
      substr: process.env.password

  - id: cookie-env-access
    desc: Cookie environment access
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: process.env.cookie

  - id: alfred-cookie-config-write
    desc: Alfred cookie configuration write
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'set configuration ["'']cookie["''].{0,160}com\.runningwithcrayons\.Alfred'

composite_rules:
  - id: icloud-env-password-login
    desc: iCloud login with env credentials
    crit: suspicious
    conf: 0.92
    all:
      - id: icloud-account-login-endpoint
      - id: icloud-findmy-api-endpoint
      - id: apple-id-env-access
      - id: password-env-access

  - id: icloud-session-cookie-use
    desc: iCloud session cookie use
    crit: notable
    conf: 0.88
    all:
      - id: icloud-findmy-api-endpoint
      - id: cookie-env-access
