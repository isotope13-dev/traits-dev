# Microsoft Teams / M365 session-token target. A developer-credential stealer
# validates harvested Teams session cookies/tokens against the auth service.
#
# Keyed on the AUTH-service subdomain (authsvc.teams.microsoft.com), not the
# generic teams.microsoft.com — the official Teams client, Electron wrappers and
# SSO libraries reference the generic host constantly, but the auth endpoint
# appearing inside a script/binary is a token-harvest tell with little benign
# pressure. Notable: intent comes from co-occurrence with other credential
# theft, not the endpoint alone.
defaults:
  platforms: [unix, windows]
  for: [scripts, binaries]
  attack: T1528

traits:
  - id: teams-auth-service-endpoint
    desc: Microsoft Teams auth service endpoint
    crit: notable
    conf: 0.85
    if:
      type: text
      substr: authsvc.teams.microsoft.com
