defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1552.005
traits:
- id: aws-imds-v2-token-request-python--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: X-aws-ec2-metadata-token-ttl-seconds
- id: aws-imds-v2-token-request-python--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: 169.254.169.254/latest/api/token
- id: aws-imds-v2-token-request-python--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    substr: urllib.request.Request(
- id: aws-secret-inventory-api--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: secretsmanager\.(ListSecrets|GetSecretValue)
- id: aws-secret-inventory-api--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: ssm\.DescribeParameters
- id: aws-secret-inventory-api--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: AmazonSSM\.DescribeParameters
- id: aws-sigv4-manual-signing
  desc: Manual AWS SigV4 signing
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: AWS4-HMAC-SHA256|X-Amz-Target|X-Amz-Security-Token
composite_rules:
- id: python-aws-imds-secret-inventory
  desc: Python AWS credential inventory theft
  crit: hostile
  conf: 0.97
  all:
  - id: aws-imds-v2-token-request-python
  - id: aws-secret-inventory-api
  - id: aws-sigv4-manual-signing
- id: aws-imds-v2-token-request-python
  desc: Python AWS IMDSv2 token request
  crit: suspicious
  conf: 0.95
  all:
  - id: aws-imds-v2-token-request-python--rx-1
  - id: aws-imds-v2-token-request-python--rx-2
  - id: aws-imds-v2-token-request-python--rx-3
  near_bytes: 4096
- id: aws-secret-inventory-api
  desc: AWS secret inventory API
  crit: suspicious
  conf: 0.95
  any:
  - id: aws-secret-inventory-api--rx-4
  - id: aws-secret-inventory-api--rx-5
  - id: aws-secret-inventory-api--rx-6
  needs: 1
