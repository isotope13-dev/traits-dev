defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1552.005
traits:
  - id: aws-imds-v2-token-request-python
    desc: Python AWS IMDSv2 token request
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: urllib\.request\.Request\([\s\S]{0,220}169\.254\.169\.254/latest/api/token[\s\S]{0,220}X-aws-ec2-metadata-token-ttl-seconds
  - id: aws-secret-inventory-api
    desc: AWS secret inventory API
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: secretsmanager\.(ListSecrets|GetSecretValue)|ssm\.DescribeParameters|AmazonSSM\.DescribeParameters
  - id: aws-sigv4-manual-signing
    desc: Manual AWS SigV4 signing
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: AWS4-HMAC-SHA256|X-Amz-Target|X-Amz-Security-Token
composite_rules:
  - id: python-aws-imds-secret-inventory
    desc: Python AWS credential inventory theft
    crit: hostile
    conf: 0.97
    all:
      - id: aws-imds-v2-token-request-python
      - id: aws-secret-inventory-api
      - id: aws-sigv4-manual-signing
