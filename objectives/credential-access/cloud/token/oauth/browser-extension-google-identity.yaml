defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: google-userinfo-endpoint
    desc: Google OAuth userinfo endpoint
    crit: component
    conf: 0.9
    if:
      type: text
      substr: https://www.googleapis.com/oauth2/v3/userinfo

  - id: profile-json-stringify
    desc: JSON body with profile identifiers
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'JSON\.stringify\s*\([^)]{0,260}(email|picture|sub)\s*:'
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern

composite_rules:
  - id: extension-google-identity-harvest
    desc: Extension harvests Google profile identity
    crit: suspicious
    conf: 0.96
    near_bytes: 1200
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/browser-ext::identity-get-auth-token
      - id: google-userinfo-endpoint
      - id: micro-behaviors/communications/http/oauth::bearer-auth-header-template
      - id: profile-json-stringify
      - id: micro-behaviors/communications/http/request/client::fetch-string
