defaults:
  platforms: [unix, windows]
  for: [html, javascript]
  attack: T1528

traits:
- id: google-gmail-scope-auth-prefix
  desc: Google Gmail OAuth scope prefix
  crit: component
  conf: 0.95
  if:
    type: text
    substr: https://www.googleapis.com/auth/gmail.
- id: google-gmail-scope-settings-prefix
  desc: Google Gmail settings scope prefix
  crit: component
  conf: 0.95
  if:
    type: text
    substr: https://www.googleapis.com/auth/gmail.settings.
- id: google-gmail-scope-mail
  desc: Google Mail full-access scope URL
  crit: component
  conf: 0.95
  if:
    # The OAuth full-mail scope is exactly `https://mail.google.com/` terminated
    # by a scope delimiter (quote/space/comma/bracket). Require that delimiter so
    # benign inbox deep-links (https://mail.google.com/mail/u/0#inbox/...) miss.
    type: text
    regex: 'https://mail\.google\.com/(["'']|\s|,|\])'
- id: oauth-consent-prompt-url
  desc: OAuth consent prompt forces approval
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: '[?&]prompt=consent\b|prompt%3Dconsent\b'
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
- id: oauth-redirect-with-target-email--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: '[TARGET EMAIL'
  count_max: 1011126
- id: oauth-redirect-with-target-email--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: GoogleVerify
  count_max: 1011127
- id: oauth-redirect-with-target-email--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: GoogleCert
  count_max: 1011128
composite_rules:
- id: gmail-oauth-consent-persistence
  desc: Gmail OAuth requests persistent mailbox access
  crit: hostile
  conf: 0.98
  all:
  - id: micro-behaviors/communications/http/oauth::google-oauth-authorize-url
  - id: google-gmail-full-scope
  - id: micro-behaviors/communications/http/oauth::oauth-offline-access-url
  any:
  - id: oauth-consent-prompt-url
  - id: oauth-redirect-with-target-email
- id: targeted-google-oauth-consent-phish
  desc: Targeted Google OAuth consent phishing URL
  crit: hostile
  conf: 0.97
  attack: T1566.002
  all:
  - id: micro-behaviors/communications/http/oauth::google-oauth-authorize-url
  - id: oauth-redirect-with-target-email
  - id: google-gmail-full-scope
  any:
  - id: micro-behaviors/communications/http/oauth::oauth-offline-access-url
  - id: oauth-consent-prompt-url
- id: google-basic-identity-offline-consent
  desc: Google OAuth limited identity scopes with offline forced consent
  crit: suspicious
  conf: 0.9
  all:
  - id: micro-behaviors/communications/http/oauth::google-oauth-authorize-url
  - id: micro-behaviors/communications/http/oauth::google-basic-identity-scopes
  - id: micro-behaviors/communications/http/oauth::oauth-offline-access-url
  - id: oauth-consent-prompt-url
- id: google-gmail-full-scope
  desc: Google OAuth requests full Gmail scope
  crit: notable
  conf: 0.92
  any:
  - id: google-gmail-scope-auth-prefix
  - id: google-gmail-scope-settings-prefix
  - id: google-gmail-scope-mail
- id: oauth-redirect-with-target-email
  desc: OAuth redirect carries target email
  crit: suspicious
  conf: 0.86
  any:
  - id: oauth-redirect-with-target-email--rx-7
  - id: oauth-redirect-with-target-email--rx-8
  - id: oauth-redirect-with-target-email--rx-9
