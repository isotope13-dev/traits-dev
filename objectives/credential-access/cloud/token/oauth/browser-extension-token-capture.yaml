defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1550

traits:
  - id: supabase-google-oauth-flow
    desc: Supabase Google OAuth flow
    crit: notable
    conf: 0.95
    ref: sha256:b1b67c99d61609933fd4b7cc7a7a9fa1cdd193cc290590b3d377ab282aae4488
    for: [javascript, typescript]
    if:
      type: text
      regex: 'signInWithOAuth[\s\S]{0,260}provider:\s*[''"]google[''"]'

  - id: oauth-provider-token-storage
    desc: OAuth provider token storage
    crit: notable
    conf: 0.94
    ref: sha256:b1b67c99d61609933fd4b7cc7a7a9fa1cdd193cc290590b3d377ab282aae4488
    for: [javascript, typescript]
    if:
      type: text
      regex: 'provider_(refresh_)?token|persistGoogleCalendarTokens|getFreshGoogleAccessToken'
    unless:
      - id: well-known/lib/supabase::auth-js-web3-module

  - id: google-calendar-bearer-api
    desc: Google calendar bearer API
    crit: notable
    conf: 0.94
    ref: sha256:b1b67c99d61609933fd4b7cc7a7a9fa1cdd193cc290590b3d377ab282aae4488
    for: [javascript, typescript]
    if:
      type: text
      regex: 'googleapis\.com/calendar/v3[\s\S]{0,260}Authorization:\s*`?Bearer'

  - id: supabase-auth-storage-bridge
    desc: Supabase auth storage bridge
    crit: notable
    conf: 0.92
    ref: sha256:b1b67c99d61609933fd4b7cc7a7a9fa1cdd193cc290590b3d377ab282aae4488
    for: [javascript, typescript]
    if:
      type: text
      regex: 'supabaseAuthStorage[\s\S]{0,220}chrome\.storage\.local'

composite_rules:
  - id: extension-oauth-calendar-token-broker
    desc: Extension brokers calendar tokens
    crit: suspicious
    conf: 0.96
    attack: T1528
    ref: sha256:b1b67c99d61609933fd4b7cc7a7a9fa1cdd193cc290590b3d377ab282aae4488
    scope: archive
    all:
      - id: micro-behaviors/os/security/webextension::extension-identity-permission
      - id: metadata/permission/identity::google-calendar-oauth-scope
      - id: supabase-google-oauth-flow
      - id: oauth-provider-token-storage
    any:
      - id: google-calendar-bearer-api
      - id: supabase-auth-storage-bridge
