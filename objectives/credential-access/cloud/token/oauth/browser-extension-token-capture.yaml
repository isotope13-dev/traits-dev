defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1550

composite_rules:
  - id: extension-oauth-token-interceptor
    desc: Extension intercepts OAuth bearer tokens
    crit: suspicious
    conf: 0.95
    scope: archive
    all:
      - id: metadata/permission/runtime::is-extension
      - id: micro-behaviors/process/hook/xhr::request-interceptor
      - id: micro-behaviors/communications/http/oauth::access-token
      - id: micro-behaviors/communications/http/request/client::bearer-authorization-prefix
    unless:
      - id: metadata/package/quality/false-positives::benign-app-fp-context
