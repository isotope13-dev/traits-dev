defaults:
  platforms:
  - windows
  - unix
  for:
  - scripts
  - source
  attack: T1552.001
traits:
- id: gh-auth-token-raw
  desc: GitHub CLI token extraction (gh auth token)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: gh auth token
  unless:
  - id: release-notes-token-tempfile-handoff
  - id: metadata/package/quality::github-cli-auth-helper-context
- id: git-credential-fill
  desc: Git credential helper extraction
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: git credential fill
  unless:
  - type: text
    substr: if there's no password
  - type: text
    substr: fill the provided credential
  - type: text
    substr: sub credential_fill
  - type: text
    substr: 'UsageLine:'
- id: aws-sts-identity
  desc: AWS identity probe (aws sts get-caller-identity)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: aws\s+sts\s+get-caller-identity(\s+\*)?
  not:
  - exact: aws sts get-caller-identity *
  unless:
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
- id: gcloud-auth-list
  desc: GCP active account probe (gcloud auth list)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: gcloud\s+auth\s+list(\s+\*)?
  not:
  - exact: gcloud auth list *
  unless:
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
- id: az-account-show
  desc: Azure identity probe (az account show)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: az\s+account\s+show(\s+\*)?
  not:
  - exact: az account show *
  unless:
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - type: text
    regex: az\s+account\s+show\s+--output\s+tsv\s+--query\s+['"]name['"]
- id: kubectl-config-view
  desc: Kubernetes credential extraction (kubectl config)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: kubectl\s+config\s+view.{0,160}--raw
  unless:
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
- id: vercel-whoami
  desc: Vercel identity probe (vercel whoami)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: vercel whoami
- id: heroku-auth-token
  desc: Heroku token extraction (heroku auth:token)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: heroku auth:token
- id: vault-token-lookup
  desc: Vault token probe (vault token lookup)
  crit: suspicious
  conf: 0.95
  if:
    type: text
    word: vault token lookup
- id: doppler-me
  desc: Doppler secrets manager identity probe
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: \bdoppler\s+me\b
- id: gh-auth-token-split
  desc: GitHub CLI token extraction (split arguments)
  crit: suspicious
  conf: 0.9
  for:
  - go
  - rust
  - java
  - csharp
  if:
    type: text
    regex: '"gh"[,\s]+"auth"[,\s]+"token"'
- id: aws-sts-split
  desc: AWS identity probe (split arguments)
  crit: suspicious
  conf: 0.9
  for:
  - go
  - rust
  - java
  - csharp
  if:
    type: text
    regex: '"aws"[,\s]+"sts"[,\s]+"get-caller-identity"'
- id: gcloud-auth-split
  desc: GCP active account probe (split arguments)
  crit: suspicious
  conf: 0.9
  for:
  - go
  - rust
  - java
  - csharp
  if:
    type: text
    regex: '"gcloud"[,\s]+"auth"[,\s]+"list"'
- id: az-account-split
  desc: Azure identity probe (split arguments)
  crit: suspicious
  conf: 0.9
  for:
  - go
  - rust
  - java
  - csharp
  if:
    type: text
    regex: '"az"[,\\s]+"account"[,\\s]+"show"'
- id: kubectl-config-split
  desc: Kubernetes credential extraction (split arguments)
  crit: suspicious
  conf: 0.9
  for:
  - go
  - rust
  - java
  - csharp
  if:
    type: text
    regex: '"kubectl"[,\s]+"config"[,\s]+"view"(?s:.{0,120})"--raw"'
- id: git-credential-split
  desc: Git credential helper extraction (split arguments)
  crit: suspicious
  conf: 0.9
  for:
  - rust
  - java
  - csharp
  if:
    type: text
    regex: '"git"[,\s]+"credential"[,\s]+"fill"'
- id: docker-config-json
  desc: Docker credential file access
  crit: component
  conf: 0.9
  unless:
  - id: well-known/tool/sysadmin/container/
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: micro-behaviors/os/container/oci::oci-rootfs-builder
  - id: micro-behaviors/os/container/image::container-image-runtime
  - id: micro-behaviors/os/container/image::docker-registry-auth-config
  - id: metadata/lang/source::python-protobuf-stub
  - id: metadata/lang/source::python-mypy-protobuf-generated
  if:
    type: text
    regex: \.docker.{0,10}config\.json
- id: docker-config-auth-evidence
  desc: Docker auth config evidence
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \b(auths|credsStore|credHelpers)\b
- id: gh-auth-tempfile
  desc: GitHub auth token stored in tempfile
  crit: component
  conf: 0.95
  for:
  - shell
  if:
    type: text
    substr: GH_TOKEN=$(mktemp)
- id: gh-auth-cleanup-trap
  desc: GitHub auth token cleanup trap
  crit: component
  conf: 0.95
  for:
  - shell
  if:
    type: text
    substr: trap cleanup_token EXIT
- id: gh-auth-token-path-handoff
  desc: GitHub auth token passed by path
  crit: component
  conf: 0.95
  for:
  - shell
  if:
    type: text
    substr: --token-path "$GH_TOKEN"
composite_rules:
- id: docker-config-auth-context
  desc: Docker config auth field access
  crit: suspicious
  conf: 0.92
  near_bytes: 512
  all:
  - id: docker-config-json
  any:
  - id: docker-config-auth-evidence
- id: release-notes-token-tempfile-handoff
  desc: Release notes passes GitHub token by tempfile
  crit: component
  conf: 0.95
  for:
  - shell
  all:
  - id: gh-auth-tempfile
  - id: gh-auth-cleanup-trap
  - id: gh-auth-token-path-handoff
- id: multi-cloud-credential-harvest
  desc: Multi-cloud credential harvesting (2+ providers)
  crit: suspicious
  conf: 0.95
  needs: 2
  any:
  - id: gh-auth-token-raw
  - id: gh-auth-token-split
  - id: objectives/supply-chain/credential-theft/cli/token::gh-auth-token
  - id: git-credential-fill
  - id: aws-sts-identity
  - id: aws-sts-split
  - id: gcloud-auth-list
  - id: gcloud-auth-split
  - id: az-account-show
  - id: az-account-split
  - id: kubectl-config-view
  - id: kubectl-config-split
  - id: vercel-whoami
  - id: heroku-auth-token
  - id: vault-token-lookup
  - id: doppler-me
- id: registry-token-theft
  desc: Package registry credential file access (2+ registries)
  crit: hostile
  conf: 0.95
  needs: 2
  near_bytes: 8192
  unless:
  - id: well-known/tool/sysadmin/container/
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: micro-behaviors/data/text/security/threat-intel::signatures-db
  - id: metadata/lang/source::python-protobuf-stub
  - id: metadata/lang/source::python-mypy-protobuf-generated
  - id: well-known/tool/detection/agent-sentry::nhi-auditor-context
  any:
  - id: objectives/supply-chain/credential-theft/registry/
  - id: docker-config-json
- id: sandbox-aware-credential-harvest
  desc: Credential harvest with remote environment evasion
  crit: hostile
  conf: 0.95
  all:
  - id: objectives/anti-analysis/environment-detect/runtime::vscode-remote-name-check
  any:
  - id: gh-auth-token-raw
  - id: objectives/supply-chain/credential-theft/cli/token::gh-auth-token
  - id: git-credential-fill
  - id: aws-sts-identity
  - id: gcloud-auth-list
  - id: az-account-show
- id: vscode-cloud-cli-dropper
  desc: VSCode cloud CLI harvest triggers package dropper
  crit: hostile
  conf: 0.99
  all:
  - id: multi-cloud-credential-harvest
  - id: objectives/anti-analysis/environment-detect/runtime::vscode-remote-name-check
  - id: objectives/command-and-control/dropper/delivery/download::package-runner-fallback-dropper
