# Cloud CLI credential harvesting
# Detects programmatic invocation of cloud CLI tools to steal active
# authentication tokens or session identities.
# Uses raw matching to catch both shell commands (bare words) and
# string literals in JS/Python/Ruby/AppleScript shell-outs.
defaults:
  platforms: [linux, macos, windows, unix]
  for: [scripts, source, binaries]
  attack: T1552.001
traits:
  - id: gh-auth-token-raw
    desc: GitHub CLI token extraction (gh auth token)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "gh auth token"

  - id: git-credential-fill
    desc: Git credential helper extraction
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "git credential fill"

  - id: aws-sts-identity
    desc: AWS identity probe (aws sts get-caller-identity)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "aws sts get-caller-identity"

  - id: gcloud-auth-list
    desc: GCP active account probe (gcloud auth list)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "gcloud auth list"

  - id: az-account-show
    desc: Azure identity probe (az account show)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "az account show"

  - id: kubectl-config-view
    desc: Kubernetes credential extraction (kubectl config)
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: 'kubectl\s+config\s+(view|current-context|get-contexts)'

  - id: vercel-whoami
    desc: Vercel identity probe (vercel whoami)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "vercel whoami"

  - id: heroku-auth-token
    desc: Heroku token extraction (heroku auth:token)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "heroku auth:token"

  - id: vault-token-lookup
    desc: Vault token probe (vault token lookup)
    crit: suspicious
    conf: 0.95
    if:
      type: text
      word: "vault token lookup"

  - id: doppler-me
    desc: Doppler secrets manager identity probe
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: '\bdoppler\s+me\b'

  # === Split-argument patterns (Go exec.Command, Python subprocess) ===
  # When CLI args are separate strings: exec.Command("gh", "auth", "token")

  - id: gh-auth-token-split
    desc: GitHub CLI token extraction (split arguments)
    crit: suspicious
    conf: 0.9
    for: [go, rust, java, csharp]
    if:
      type: text
      regex: '"gh"[,\s]+"auth"[,\s]+"token"'

  - id: aws-sts-split
    desc: AWS identity probe (split arguments)
    crit: suspicious
    conf: 0.9
    for: [go, rust, java, csharp]
    if:
      type: text
      regex: '"aws"[,\s]+"sts"[,\s]+"get-caller-identity"'

  - id: gcloud-auth-split
    desc: GCP active account probe (split arguments)
    crit: suspicious
    conf: 0.9
    for: [go, rust, java, csharp]
    if:
      type: text
      regex: '"gcloud"[,\s]+"auth"[,\s]+"list"'

  - id: az-account-split
    desc: Azure identity probe (split arguments)
    crit: suspicious
    conf: 0.9
    for: [go, rust, java, csharp]
    if:
      type: text
      regex: '"az"[,\s]+"account"[,\s]+"show"'
    not:
      - substr: NewAzureCLICredential

  - id: kubectl-config-split
    desc: Kubernetes credential extraction (split arguments)
    crit: suspicious
    conf: 0.9
    for: [go, rust, java, csharp]
    if:
      type: text
      regex: '"kubectl"[,\s]+"config"[,\s]+"(current-context|view|get-contexts)"'

  - id: git-credential-split
    desc: Git credential helper extraction (split arguments)
    crit: suspicious
    conf: 0.9
    for: [go, rust, java, csharp]
    if:
      type: text
      regex: '"git"[,\s]+"credential"[,\s]+"fill"'

  - id: docker-config-json
    desc: Docker credential file access
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\.docker.{0,10}config\.json'

composite_rules:
  - id: multi-cloud-credential-harvest
    desc: Multi-cloud credential harvesting (2+ providers)
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: gh-auth-token-raw
      - id: gh-auth-token-split
      - id: objectives/supply-chain/credential-theft::gh-auth-token
      - id: git-credential-fill
      - id: git-credential-split
      - id: aws-sts-identity
      - id: aws-sts-split
      - id: gcloud-auth-list
      - id: gcloud-auth-split
      - id: az-account-show
      - id: az-account-split
      - id: kubectl-config-view
      - id: kubectl-config-split
      - id: vercel-whoami
      - id: heroku-auth-token
      - id: vault-token-lookup
      - id: doppler-me

  - id: registry-token-theft
    desc: Package registry credential file access (2+ registries)
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: objectives/supply-chain/credential-theft/registry/
      - id: docker-config-json

  - id: sandbox-aware-credential-harvest
    desc: Credential harvest with remote environment evasion
    crit: hostile
    conf: 0.95
    all:
      - id: objectives/anti-analysis/environment-detect/runtime::vscode-remote-name-check
    any:
      - id: gh-auth-token-raw
      - id: objectives/supply-chain/credential-theft::gh-auth-token
      - id: git-credential-fill
      - id: aws-sts-identity
      - id: gcloud-auth-list
      - id: az-account-show
