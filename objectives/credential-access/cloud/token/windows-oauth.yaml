defaults:
  platforms: [windows]
  for: [pe]
  attack: T1528
traits:
  - id: sharex-uploaderslib-assembly
    desc: ShareX uploader library assembly
    crit: component
    conf: 0.95
    if:
      type: text
      substr: ShareX.UploadersLib

  - id: dropbox-oauth-authorize
    desc: Dropbox OAuth authorize endpoint
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: www.dropbox.com/oauth2/authorize
    unless:
      - type: text
        substr: ShareX.UploadersLib

  - id: google-drive-scope
    desc: Google Drive OAuth scope
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: googleapis.com/auth/drive
    unless:
      - type: text
        substr: ShareX.UploadersLib

  - id: google-gmail-compose-scope
    desc: Google Gmail compose scope
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: googleapis.com/auth/gmail.compose

  - id: google-contacts-readonly-scope
    desc: Google Contacts readonly scope
    crit: notable
    conf: 0.88
    if:
      type: text
      substr: googleapis.com/auth/contacts.readonly

  - id: google-userinfo-profile-scope
    desc: Google userinfo profile scope
    crit: notable
    conf: 0.84
    if:
      type: text
      substr: googleapis.com/auth/userinfo.profile

composite_rules:
  - id: google-oauth-credential-scope-pack
    desc: Google OAuth scopes target mailbox and contacts
    crit: suspicious
    conf: 0.95
    all:
      - id: micro-behaviors/communications/http/oauth::google-accounts
    any:
      - id: google-drive-scope
      - id: google-gmail-compose-scope
      - id: google-contacts-readonly-scope
      - id: google-userinfo-profile-scope
    needs: 2
    unless:
      - id: sharex-uploaderslib-assembly

  - id: multi-provider-cloud-oauth-surface
    desc: Multi-provider cloud OAuth token access
    crit: suspicious
    conf: 0.96
    any:
      - id: google-oauth-credential-scope-pack
      - id: dropbox-oauth-authorize
      - id: micro-behaviors/communications/http/oauth::oauth-office365
    needs: 2
    unless:
      - id: sharex-uploaderslib-assembly
