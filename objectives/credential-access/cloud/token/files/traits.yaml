defaults:
  platforms:
  - unix
  - windows
  for: [scripts, binaries]
  attack: T1552.001
  crit: suspicious
traits:
- id: aws-config-dup
  desc: AWS credential directory reference
  crit: suspicious
  conf: 0.75
  for:
  - shell
  - python
  - ruby
  - perl
  - javascript
  - typescript
  if:
    type: string_literal
    exact: .aws
  unless:
  - id: well-known/lib/aws-sdk-ruby
  - id: metadata/library/data::aws-python-sdk-source
  - id: micro-behaviors/data/text/security/scanner::defensive-sensitive-dir-denylist
  - id: well-known/app/crunr::crunr-aws-auth-doc
  - id: well-known/tool/detection/proxy-sandbox
  - id: aws-config-reference-benign-context
  - id: micro-behaviors/data/text/app::akm-stash-safety-sensitive-dirs
- id: aws-access-key
  desc: AWS access key ID pattern
  conf: 0.85
  if:
    type: text
    regex: (^|[^A-Za-z0-9+/=])AKIA[0-9A-Z]{16}([^A-Za-z0-9+/=]|$)
  unless:
  - type: text
    substr: AKIAIOSFODNN7EXAMPLE
  - type: text
    regex: AKIA[0-9A-Z]{12}EXAMPLE
  - type: text
    substr: AKIAI6X4TYCIXM2B7MUQ
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
- id: github-classic-pat
  desc: GitHub classic personal access token literal
  crit: notable
  conf: 0.88
  for: [python, javascript, typescript]
  unless:
  - id: well-known/tool/detection/sast::python-secret-rule-catalog
  - id: objectives/credential-access/api-harvest/catalog::redaction-credentials-context
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  if:
    type: string_literal
    regex: 'ghp_[A-Za-z0-9]{36}'
- id: github-fine-grained-pat
  desc: GitHub fine-grained personal access token literal
  crit: notable
  conf: 0.88
  for: [python, javascript, typescript]
  unless:
  - id: well-known/tool/detection/sast::python-secret-rule-catalog
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/package/testing/presence/harness::test-directory
  if:
    type: string_literal
    regex: 'github_pat_[A-Za-z0-9_]{30,}'
- id: gcp-default-credentials
  desc: GCP default credential file
  crit: notable
  conf: 0.8
  if:
    type: text
    substr: application_default_credentials.json
  downgrade:
    any:
      - id: metadata/library/data::rust-cloud-object-store-sdk
- id: azure-config
  desc: Azure CLI token cache path
  conf: 0.85
  for:
  - shell
  - python
  - ruby
  - perl
  - javascript
  - typescript
  if:
    type: string_literal
    regex: '/\.azure/(accessTokens\.json|msal_token_cache(\.json)?)\b'
- id: dotenv-request
  desc: HTTP request for .env file
  conf: 0.85
  if:
    type: text
    substr: GET /.env
- id: dotenv-file-dup
  desc: Dotenv environment file path reference
  crit: notable
  conf: 0.3
  for:
  - javascript
  - typescript
  - python
  - shell
  if:
    type: string_literal
    regex: '\/\.env\b|read.{0,30}\.env\b|\.env\b.{0,30}read'
  unless:
  - type: text
    substr: "resolveApp('.env')"
  - type: text
    substr: "resolveOwn(`${templatePath}/.env`)"
  - type: text
    substr: path.resolve(process.cwd(), '.env')
  - type: text
    substr: process.env[key] = parsed[key]
  - id: well-known/app/opencode-router
- id: aws-imds-ip
  desc: AWS metadata service IP
  crit: component
  conf: 0.7
  attack: T1552.005
  for:
  - javascript
  - typescript
  - python
  - shell
  - elf
  - go
  if:
    type: text
    substr: 169.254.169.254
  unless:
  - id: metadata/package/quality::has-tests
  - id: metadata/library/data::aws-python-sdk-source
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - type: text
    substr: "must not target link-local IPv4"
  - type: text
    substr: "cloud metadata range"
- id: aws-imds-path
  desc: AWS instance metadata path
  crit: suspicious
  conf: 0.7
  attack: T1552.005
  for:
  - javascript
  - typescript
  - python
  - shell
  if:
    type: string_literal
    substr: instance-data/latest/meta-data
  unless:
  - id: metadata/library/data::aws-python-sdk-source
- id: aws-iam-credential-access-path
  desc: AWS IAM security credentials path
  crit: suspicious
  conf: 0.7
  attack: T1552.005
  for:
  - javascript
  - typescript
  - python
  - shell
  if:
    type: string_literal
    substr: iam/security-credentials
  unless:
  - id: metadata/library/data::aws-python-sdk-source
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
- id: jvm-aws-iam-credential-path
  desc: JVM AWS IAM credential path
  crit: suspicious
  conf: 0.9
  attack: T1552.005
  for:
  - class
  - jar
  if:
    type: hex
    pattern: 69 61 6D 2F 73 65 63 75 72 69 74 79 2D 63 72 65 64 65 6E 74 69 61 6C 73
- id: gcp-metadata-host
  desc: GCP metadata internal hostname
  crit: suspicious
  conf: 0.7
  attack: T1552.005
  for:
  - javascript
  - typescript
  - python
  - shell
  if:
    type: string_literal
    substr: metadata.google.internal
  unless:
  - id: metadata/package/quality::has-tests
  - type: string_literal
    exact: "!metadata.google.internal"
  - type: text
    substr: "**always** blocked"
  - id: objectives/discovery/cloud/metadata::ssrf-metadata-blocklist-context
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
- id: jvm-gcp-metadata-host
  desc: JVM GCP metadata host
  crit: suspicious
  conf: 0.9
  attack: T1552.005
  for:
  - class
  - jar
  if:
    type: hex
    pattern: 6D 65 74 61 64 61 74 61 2E 67 6F 6F 67 6C 65 2E 69 6E 74 65 72 6E 61 6C
- id: gcp-metadata-domain
  desc: GCP metadata service domain
  crit: notable
  conf: 0.7
  attack: T1552.005
  for:
  - javascript
  - typescript
  - python
  - shell
  - elf
  if:
    type: text
    substr: metadata.google
  unless:
  - id: metadata/package/quality::has-tests
  - id: objectives/discovery/cloud/metadata::ssrf-metadata-blocklist-context
  downgrade:
    any:
      - id: metadata/library/data::rust-cloud-object-store-sdk
- id: gcp-compute-metadata
  desc: GCP compute metadata path
  crit: component
  conf: 0.7
  attack: T1552.005
  for:
  - javascript
  - typescript
  - python
  - shell
  if:
    type: string_literal
    substr: computeMetadata/v1
  unless:
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
- id: azure-metadata-identity
  desc: Azure metadata identity path
  crit: suspicious
  conf: 0.7
  attack: T1552.005
  for:
  - javascript
  - typescript
  - python
  - shell
  if:
    type: string_literal
    regex: 169\.254\.169\.254.{0,50}metadata/identity
- id: azure-metadata-header
  desc: Azure Metadata header
  crit: notable
  conf: 0.7
  attack: T1552.005
  for:
  - javascript
  - typescript
  - python
  - shell
  if:
    type: string_literal
    regex: Metadata:\s*true
- id: awsie-import
  desc: youtube-dl AWS helper import
  crit: baseline
  conf: 0.2
  for:
  - python
  if:
    type: text
    substr: "from .aws import AWSIE"
- id: aws-secretsmanager-endpoint
  desc: AWS Secrets Manager endpoint
  crit: notable
  conf: 0.88
  for: [javascript, typescript, python, shell]
  if:
    type: text
    regex: 'secretsmanager\.[a-z0-9-]+\.amazonaws\.com|secretsmanager\.ListSecrets'
- id: aws-ssm-parameters-endpoint
  desc: AWS SSM parameters endpoint
  crit: notable
  conf: 0.86
  for: [javascript, typescript, python, shell]
  if:
    type: text
    regex: 'ssm\.[a-z0-9-]+\.amazonaws\.com|AmazonSSM\.DescribeParameters'
- id: azure-keyvault-token-scope
  desc: Azure Key Vault token scope
  crit: notable
  conf: 0.88
  for: [javascript, typescript, python, shell]
  if:
    type: text
    substr: https://vault.azure.net/.default
- id: gcp-secretmanager-api
  desc: GCP Secret Manager API
  crit: notable
  conf: 0.88
  for: [javascript, typescript, python, shell]
  if:
    type: text
    regex: 'secretmanager\.googleapis\.com|google\.cloud\.secretmanager'
- id: gcp-cloudkms-api
  desc: GCP Cloud KMS API
  crit: notable
  conf: 0.84
  for: [javascript, typescript, python, shell]
  if:
    type: text
    substr: cloudkms.googleapis.com
- id: python-refresh-token-json-get
  desc: Python reads refresh_token JSON key
  crit: component
  conf: 0.94
  attack: T1528
  for: [python]
  if:
    type: text
    regex: '\.get\s*\(\s*["'']refresh_token["'']\s*\)'
- id: python-token-set-add
  desc: Python adds token to set
  crit: component
  conf: 0.82
  for: [python]
  if:
    type: text
    regex: '\.add\s*\(\s*token\s*\)'
- id: python-print-token
  desc: Python prints token variable
  crit: component
  conf: 0.82
  for: [python]
  if:
    type: text
    regex: '\bprint\s*\(\s*token\s*\)'
composite_rules:
- id: multi-cloud-imds-exfil
  desc: Multi-cloud metadata access with HTTP exfiltration
  crit: hostile
  conf: 0.97
  attack: T1552.005
  for: [javascript, typescript, shell, python]
  near_lines: 80
  all:
  - id: aws-imds-access
  - id: micro-behaviors/communications/http/request/client::http-request
  any:
  - id: gcp-metadata-access
  - id: gcp-metadata-host
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
- id: python-json-refresh-token-harvest
  desc: Python harvests refresh tokens from JSON files
  crit: hostile
  conf: 0.97
  attack: T1528
  for: [python]
  all:
  - id: python-refresh-token-json-get
  - id: micro-behaviors/data/serialize/json::json-load-call
  - id: micro-behaviors/fs/enumerate/directory::python-json-glob
  - id: micro-behaviors/fs/file/open::generic-dup
  any:
  - id: python-token-set-add
  - id: python-print-token
- id: aws-imds-access
  desc: AWS instance metadata credential access
  crit: suspicious
  conf: 0.95
  attack: T1552.005
  for:
  - javascript
  - typescript
  - python
  - shell
  - class
  - jar
  any:
  - id: aws-imds-ip
  - id: aws-imds-path
  - id: aws-iam-credential-access-path
  - id: jvm-aws-iam-credential-path
- id: jvm-cloud-metadata-token-harvest
  desc: JVM cloud metadata token harvest
  crit: hostile
  conf: 0.98
  attack: T1552.005
  for: [class, jar]
  all:
  - id: jvm-aws-iam-credential-path
  - id: jvm-gcp-metadata-host
- id: multi-cloud-secret-service-targeting
  desc: Multi-cloud secret service targeting
  crit: hostile
  conf: 0.97
  attack: T1552.005
  mbc: E1552
  needs: 3
  any:
  - id: aws-secretsmanager-endpoint
  - id: aws-ssm-parameters-endpoint
  - id: azure-keyvault-token-scope
  - id: micro-behaviors/communications/http/oauth::microsoft-login
  - id: gcp-secretmanager-api
  - id: gcp-cloudkms-api
  downgrade:
    any:
    - id: objectives/discovery/cloud/metadata::cloud-metadata-benign-context
    - id: metadata/package/quality::has-tests
- id: gcp-metadata-access
  desc: GCP metadata service access (credential
  crit: suspicious
  conf: 0.95
  attack: T1552.005
  for:
  - javascript
  - typescript
  - python
  - shell
  any:
  - id: gcp-metadata-host
  - id: gcp-compute-metadata
  unless:
  - id: objectives/discovery/cloud/metadata::ssrf-metadata-blocklist-context
- id: azure-imds-access
  desc: Azure metadata service access (credential
  crit: suspicious
  conf: 0.95
  attack: T1552.005
  for:
  - javascript
  - typescript
  - python
  - shell
  any:
  - id: azure-metadata-identity
  - id: azure-metadata-header
- id: aws-credential-theft
  desc: AWS credential theft
  conf: 0.85
  any:
  - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
  - id: aws-access-key
  all:
  - id: objectives/credential-access/cloud/token/files::aws-config-dup
  unless:
  - id: aws-config-reference-benign-context
- id: aws-config-reference-benign-context
  desc: Benign AWS config reference context
  crit: component
  conf: 0.88
  any:
  - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
  - id: objectives/credential-access/cloud/aws-token::aws-shared-credentials-config-helper
  - id: metadata/library/structure::vscode-material-icon-map-bundle
  - id: well-known/lib/aws-sdk-ruby
  - id: awsie-import
  - id: micro-behaviors/data/text/security/scanner::defensive-scanner-tool-context
- id: gcp-credential-theft
  desc: GCP credential paths referenced
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/fs/path/sensitive/credentials::gcloud-credentials
  any:
  - id: gcp-default-credentials
  unless:
  - id: objectives/discovery/cloud/metadata::cloud-metadata-benign-context
  - id: metadata/binary/metrics/size::massive-executable
  - id: well-known/lib/google-auth
  - id: well-known/tool/detection/agent-sentry::nhi-auditor-context
- id: kubernetes-serviceaccount-abuse
  desc: Kubernetes token with API access
  crit: suspicious
  conf: 0.96
  attack: T1552.007
  all:
  - id: micro-behaviors/os/container/runtime::serviceaccount-files
  any:
  - id: micro-behaviors/os/container/runtime::api-enumeration
  - id: micro-behaviors/os/container/runtime::pod-exec
