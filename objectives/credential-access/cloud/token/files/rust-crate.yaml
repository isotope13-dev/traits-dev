defaults:
  platforms: [linux, macos, windows]
  for: [crate]
  attack: T1552.001

traits:
  - id: crate-credential-verifier-auth-modules
    desc: Rust crate credential verifier auth modules
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/verify/(auth|aws|credential)\.rs$'

  - id: crate-credential-verifier-flow-modules
    desc: Rust crate credential verifier flow modules
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/verify/(multi_step|request|response)\.rs$'

  - id: crate-oob-credential-verifier
    desc: Rust crate OOB credential verifier
    crit: suspicious
    conf: 0.9
    if:
      type: value
      path: "archive.members[*].path"
      regex: '/src/oob/(client|decrypt|session)\.rs$'
