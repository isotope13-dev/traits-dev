# Go compiled binary credential stealer function names
# Go retains full function names in .gopclntab. Function names like
# checkGitHub, checkAWS, exfil, stealRegistryTokens are high-confidence
# indicators even when individual CLI strings are fragmented.
defaults:
  platforms: [windows, linux, macos]
  for: [elf, macho, pe]
  attack: T1552.001
traits:
  - id: go-func-check-github
    desc: Go function probing GitHub credentials
    crit: suspicious
    conf: 0.9
    if:
      type: text
      # Go retains package-qualified function names such as
      # `main.checkGitHub` in its pclntab. Requiring the qualifier avoids
      # treating Rust/C++ mangled names such as `WebsiteChecker::check_github`
      # as Go credential probes.
      regex: '(?i)(^|[A-Za-z0-9_/-]+\.)check[_-]?git[_-]?hub\b'

  - id: go-func-check-aws
    desc: Go function probing AWS credentials
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bcheck(_|-)?aws\b'

  - id: go-func-check-gcp
    desc: Go function probing GCP credentials
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bcheck(_|-)?g(cp|cloud)\b'
    not:
      - regex: '\.\w{1,4}$'

  - id: go-func-check-azure
    desc: Go function probing Azure credentials
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bcheck(_|-)?azure\b'

  - id: go-func-exfil
    desc: Go function named exfil/exfiltrate
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '(?i)\b[\w/.-]+\.exfil(trate)?\b'

  - id: go-func-steal-tokens
    desc: Go function named stealTokens/stealCredentials
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '(?i)\bsteal[A-Z]\w*(Token|Cred|Secret)'

  - id: go-func-download-stage
    desc: "Go func named downloadStage/downloadPayload"
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(?i)\bdownload[A-Z]\w*(Stage|Payload)'
    not:
      - substr: downloadMerchantPayload

  - id: go-func-inject-config
    desc: Go function injecting IDE/MCP config
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\b(inject[A-Z]|Inject[A-Z])\w*(Mcp|Config|Settings)\b'

composite_rules:
  - id: go-credential-stealer-functions
    desc: Go binary with credential stealer function names
    crit: hostile
    conf: 0.95
    needs: 2
    any:
      - id: go-func-check-github
      - id: go-func-check-aws
      - id: go-func-check-gcp
      - id: go-func-check-azure
      - id: go-func-exfil
      - id: go-func-steal-tokens

  - id: go-stealer-with-exfil
    desc: Go binary with credential check + exfil function
    crit: hostile
    conf: 0.95
    all:
      - id: go-credential-stealer-functions
    any:
      - id: go-func-exfil
      - id: go-func-steal-tokens
      - id: go-func-download-stage
