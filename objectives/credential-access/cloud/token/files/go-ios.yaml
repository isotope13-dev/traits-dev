defaults:
  platforms: [ios]
  for: [go]
  attack: T1528

traits:
  - id: go-cloud-credential-paths
    desc: Go cloud credential path sweep
    crit: suspicious
    conf: 0.93
    # Anchor to the credential DIRECTORY form (`~/.aws/`, `/.azure/`) — a bare
    # `.aws`/`.azure` substring matched Azure service hostnames like
    # `marketplace.azurecr.io` / `*.azurewebsites.net`, which are registries, not
    # credential stores.
    if:
      type: text
      regex: '[~/]\.(aws|azure)/|application_default_credentials\.json'
    unless:
      - type: text
        substr: "github.com/boostsecurityio/bagel"

  - id: go-aws-secret-env-var
    desc: Go AWS secret env var
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: AWS_SECRET_ACCESS_KEY

  - id: go-azure-secret-env-var
    desc: Go Azure secret env var
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: AZURE_CLIENT_SECRET

  - id: go-gcp-credential-env-var
    desc: Go GCP credential env var
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: GOOGLE_APPLICATION_CREDENTIALS

composite_rules:
  - id: go-ios-cloud-token-harvest
    desc: Go iOS cloud token harvest
    crit: hostile
    conf: 0.98
    all:
      - id: go-cloud-credential-paths
    any:
      - id: go-aws-secret-env-var
      - id: go-azure-secret-env-var
      - id: go-gcp-credential-env-var
    needs: 1
    unless:
      - id: well-known/app/aws-vault::aws-vault-archive-member
