defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1528

traits:
  - id: go-cloud-credential-paths
    desc: Go source references cloud credential file paths
    crit: notable
    conf: 0.93
    # Anchor to the credential DIRECTORY form (`~/.aws/`, `/.azure/`) — a bare
    # `.aws`/`.azure` substring matched Azure service hostnames like
    # `marketplace.azurecr.io` / `*.azurewebsites.net`, which are registries, not
    # credential stores.
    if:
      type: text
      regex: '[~/]\.(aws|azure)/|application_default_credentials\.json'
    unless:
      - type: text
        substr: "github.com/boostsecurityio/bagel"
      - id: go-cloud-default-credentials-doc-marker

  - id: go-aws-secret-env-var
    desc: Go reads AWS secret-access-key env
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'os\.(Getenv|LookupEnv)\(\s*["'']AWS_SECRET_ACCESS_KEY["'']'
    unless:
      - id: well-known/app/olares::cli-source-tree
      - id: go-cloud-default-credentials-doc-marker

  - id: go-azure-secret-env-var
    desc: Go reads Azure client-secret env
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'os\.(Getenv|LookupEnv)\(\s*["'']AZURE_CLIENT_SECRET["'']'
    unless:
      - id: go-cloud-default-credentials-doc-marker

  - id: go-gcp-credential-env-var
    desc: Go reads GCP credentials env
    crit: notable
    conf: 0.93
    if:
      type: text
      regex: 'os\.(Getenv|LookupEnv)\(\s*["'']GOOGLE_APPLICATION_CREDENTIALS["'']'
    unless:
      - id: go-cloud-default-credentials-doc-marker
  - id: go-cloud-default-credentials-doc-marker
    desc: Cloud SDK default credentials docs
    crit: baseline
    conf: 0.94
    if:
      type: text
      regex: 'default credential chain|AWS SDK for Go|Shared credentials / config files'
      case_insensitive: true
  - id: go-gcp-default-credentials-doc-marker
    desc: Go GCP default credentials documentation marker
    crit: baseline
    conf: 0.94
    if:
      type: text
      regex: 'gcloud command-line tool|Application Default Credentials'
