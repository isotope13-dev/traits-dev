defaults:
  platforms: [panos, appliance, windows]
  for: [batch]
  attack: T1552

traits:
  - id: batch-panos-gcloud-credential-copy
    desc: Batch PAN-OS gcloud cred copy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: gcloud\credentials.db

  - id: batch-panos-aws-creds-stage
    desc: Batch PAN-OS AWS creds stage
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: aws_creds

  - id: batch-panos-cloud-creds-post
    desc: Batch PAN-OS cloud creds POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /cloud-creds

composite_rules:
  - id: batch-panos-cloud-credential-exfil
    desc: Batch PAN-OS cloud cred exfil
    crit: hostile
    conf: 0.98
    all:
      - id: batch-panos-gcloud-credential-copy
      - id: batch-panos-aws-creds-stage
      - id: batch-panos-cloud-creds-post
