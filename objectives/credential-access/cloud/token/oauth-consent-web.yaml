defaults:
  platforms: [unix, windows]
  for: [html, javascript]
  attack: T1528

traits:
- id: google-oauth-authorize-url
  desc: Google OAuth authorize URL
  crit: suspicious
  conf: 0.9
  if:
    type: text
    substr: accounts.google.com/o/oauth2/
- id: google-gmail-full-scope--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: googleapis.com
- id: google-gmail-full-scope--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: metadata
- id: google-gmail-full-scope--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: readonly
- id: google-gmail-full-scope--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: modify
- id: google-gmail-full-scope--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: gmail
- id: google-gmail-full-scope--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    substr: auth
- id: oauth-offline-access-url
  desc: OAuth URL requests offline access
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '[?&]access_type=offline\b|access_type%3Doffline\b'
- id: oauth-consent-prompt-url
  desc: OAuth consent prompt forces approval
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: '[?&]prompt=consent\b|prompt%3Dconsent\b'
- id: oauth-redirect-with-target-email--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: '[TARGET EMAIL'
- id: oauth-redirect-with-target-email--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: GoogleVerify
- id: oauth-redirect-with-target-email--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: GoogleCert
- id: oauth-redirect-with-target-email--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    substr: html
composite_rules:
- id: gmail-oauth-consent-persistence
  desc: Gmail OAuth requests persistent mailbox access
  crit: hostile
  conf: 0.98
  all:
  - id: google-oauth-authorize-url
  - id: google-gmail-full-scope
  - id: oauth-offline-access-url
  any:
  - id: oauth-consent-prompt-url
  - id: oauth-redirect-with-target-email
- id: targeted-google-oauth-consent-phish
  desc: Targeted Google OAuth consent phishing URL
  crit: hostile
  conf: 0.97
  attack: T1566.002
  all:
  - id: google-oauth-authorize-url
  - id: oauth-redirect-with-target-email
  - id: google-gmail-full-scope
  any:
  - id: oauth-offline-access-url
  - id: oauth-consent-prompt-url
- id: google-gmail-full-scope
  desc: Google OAuth requests full Gmail scope
  crit: suspicious
  conf: 0.92
  any:
  - id: google-gmail-full-scope--rx-1
  - id: google-gmail-full-scope--rx-2
  - id: google-gmail-full-scope--rx-3
  - id: google-gmail-full-scope--rx-4
  - id: google-gmail-full-scope--rx-5
  - id: google-gmail-full-scope--rx-6
  needs: 1
- id: oauth-redirect-with-target-email
  desc: OAuth redirect carries target email
  crit: suspicious
  conf: 0.86
  any:
  - id: oauth-redirect-with-target-email--rx-7
  - id: oauth-redirect-with-target-email--rx-8
  - id: oauth-redirect-with-target-email--rx-9
  - id: oauth-redirect-with-target-email--rx-10
  needs: 1
