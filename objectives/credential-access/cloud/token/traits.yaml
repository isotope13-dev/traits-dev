defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  attack: T1552.001
  crit: suspicious
traits:
  - id: aws-config-dup
    desc: AWS configuration directory
    crit: notable
    conf: 0.75
    for:
      - shell
      - python
      - ruby
      - perl
      - javascript
      - typescript
    if:
      type: string_value
      exact: .aws
  - id: aws-access-key
    desc: AWS access key ID pattern
    conf: 0.85
    if:
      type: string_value
      regex: AKIA[0-9A-Z]{16}
  - id: gcp-default-credentials
    desc: GCP application default credentials
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: application_default_credentials.json
  - id: azure-config
    desc: Azure CLI configuration directory
    conf: 0.75
    for:
      - shell
      - python
      - ruby
      - perl
      - javascript
      - typescript
    if:
      type: string_value
      substr: /.azure
  - id: dotenv-request
    desc: HTTP request for .env file
    conf: 0.85
    if:
      type: string_value
      substr: GET /.env
  - id: dotenv-file-dup
    desc: .env file reference
    crit: notable
    conf: 0.3
    for:
      - javascript
      - typescript
      - python
      - shell
    if:
      type: string_value
      regex: \/.env\b|read.{0,30}\.env|\.env.{0,30}read
  - id: aws-imds-ip
    desc: AWS metadata service IP
    crit: notable
    conf: 0.7
    attack: T1552.005
    for:
      - javascript
      - typescript
      - python
      - shell
      - elf
      - go
    if:
      type: string_value
      substr: 169.254.169.254
    unless:
      - id: metadata/quality::has-tests
  - id: aws-imds-path
    desc: AWS instance metadata path
    crit: notable
    conf: 0.7
    attack: T1552.005
    for:
      - javascript
      - typescript
      - python
      - shell
    if:
      type: string_value
      substr: instance-data/latest/meta-data
  - id: aws-iam-credential-access-path
    desc: AWS IAM security credentials path
    crit: notable
    conf: 0.7
    attack: T1552.005
    for:
      - javascript
      - typescript
      - python
      - shell
    if:
      type: string_value
      substr: iam/security-credentials
  - id: gcp-metadata-host
    desc: GCP metadata internal hostname
    crit: notable
    conf: 0.7
    attack: T1552.005
    for:
      - javascript
      - typescript
      - python
      - shell
    if:
      type: string_value
      substr: metadata.google.internal
    unless:
      - id: metadata/quality::has-tests
  - id: gcp-compute-metadata
    desc: GCP compute metadata path
    crit: notable
    conf: 0.7
    attack: T1552.005
    for:
      - javascript
      - typescript
      - python
      - shell
    if:
      type: string_value
      substr: computeMetadata/v1
  - id: azure-metadata-identity
    desc: Azure metadata identity path
    crit: notable
    conf: 0.7
    attack: T1552.005
    for:
      - javascript
      - typescript
      - python
      - shell
    if:
      type: string_value
      regex: 169\.254\.169\.254.{0,50}metadata/identity
  - id: azure-metadata-header
    desc: Azure Metadata header
    crit: notable
    conf: 0.7
    attack: T1552.005
    for:
      - javascript
      - typescript
      - python
      - shell
    if:
      type: string_value
      regex: Metadata:\s*true
composite_rules:
  - id: aws-imds-access
    desc: AWS metadata service access (credential
    crit: suspicious
    conf: 0.95
    attack: T1552.005
    for:
      - javascript
      - typescript
      - python
      - shell
    any:
      - id: aws-imds-ip
      - id: aws-imds-path
      - id: aws-iam-credential-access-path
  - id: gcp-metadata-access
    desc: GCP metadata service access (credential
    crit: notable
    conf: 0.95
    attack: T1552.005
    for:
      - javascript
      - typescript
      - python
      - shell
    any:
      - id: gcp-metadata-host
      - id: gcp-compute-metadata
  - id: azure-imds-access
    desc: Azure metadata service access (credential
    crit: suspicious
    conf: 0.95
    attack: T1552.005
    for:
      - javascript
      - typescript
      - python
      - shell
    any:
      - id: azure-metadata-identity
      - id: azure-metadata-header
  - id: aws-credential-theft
    desc: AWS credential theft
    conf: 0.85
    any:
      - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
      - id: aws-access-key
    all:
      - id: objectives/credential-access/cloud/token::aws-config-dup
  - id: gcp-credential-theft
    desc: GCP credential theft
    conf: 0.85
    all:
      - id: micro-behaviors/fs/path/sensitive/credentials::gcloud-credentials
    any:
      - id: gcp-default-credentials
