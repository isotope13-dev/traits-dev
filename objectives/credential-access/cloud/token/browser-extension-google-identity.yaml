defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]

traits:
  - id: google-userinfo-endpoint
    desc: Google OAuth userinfo endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: https://www.googleapis.com/oauth2/v3/userinfo

  - id: oauth-bearer-header
    desc: OAuth bearer authorization header
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: Authorization\s*:\s*`Bearer\s+\$\{[A-Za-z_$][\w$]*\}`

  - id: profile-json-stringify
    desc: JSON body with profile identifiers
    crit: component
    conf: 0.88
    if:
      type: text
      regex: 'JSON\.stringify\s*\([^)]{0,260}(email|picture|sub)\s*:'
    unless:
      - id: metadata/package/testing/harness::is-test
      - id: metadata/package/testing/presence::test-filename-pattern

composite_rules:
  - id: extension-google-identity-harvest
    desc: Extension harvests Google profile identity
    crit: suspicious
    conf: 0.96
    all:
      - id: objectives/supply-chain/metadata-anomaly/manifest/markers::identity-get-auth-token
      - id: google-userinfo-endpoint
      - id: oauth-bearer-header
      - id: profile-json-stringify
      - id: micro-behaviors/communications/http/request::fetch-string
