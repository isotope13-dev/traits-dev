defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts]
  attack: T1552.001
composite_rules:
  - id: developer-credential-sweep
    desc: Multi-target developer & cloud credential
    crit: hostile
    conf: 0.96
    mbc: E1552
    needs: 4
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials
    downgrade:
      any:
        - id: metadata/package/testing/presence/harness::test-directory
        - id: metadata/package/tooling::autoconf-generated-script
