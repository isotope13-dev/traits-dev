defaults:
  platforms: [linux, macos, windows]
  for: [binaries, scripts]
  attack: T1552.001
composite_rules:
  - id: developer-credential-sweep
    desc: Developer/cloud credential path cluster
    crit: suspicious
    conf: 0.96
    mbc: E1552
    needs: 3
    any:
      - id: micro-behaviors/fs/path/sensitive/credentials
    unless:
      - id: well-known/tool/detection/
      - id: well-known/lib/
      - id: objectives/credential-access/cloud/container::legitimate-kubernetes-incluster-client-context
      - id: metadata/package/documentation/
      - id: metadata/package/testing/
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: developer-credential-sweep-benign-context
    desc: Benign developer credential context
    crit: baseline
    conf: 0.95
    any:
      - id: well-known/tool/detection/security-scanner::defensive-scanner-tool-context
      - id: well-known/lib/bun-runtime::runtime-context
      - id: well-known/lib/opentui::runtime-context
      - id: well-known/app/codeplane::runtime-context
      - id: metadata/library/ai::ai-coding-assistant-runtime
      - id: metadata/package/documentation::python-doctest-prompt
      - id: metadata/package/documentation/
      - id: metadata/package/testing/
      - id: objectives/credential-access/cloud/container::legitimate-kubernetes-incluster-client-context
      - id: well-known/app/calvyn-code
      - id: well-known/app/kilocode::kilo-code-native-runtime
