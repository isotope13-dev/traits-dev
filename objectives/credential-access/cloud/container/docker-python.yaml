defaults:
  platforms: [unix]
  for: [python]
  attack: T1611
  mbc: E1552

traits:
- id: docker-socket-path-literal
  desc: Docker daemon socket path literal
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    exact: /var/run/docker.sock
- id: docker-container-list-api
  desc: Docker container listing API path
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    substr: /containers/json
- id: docker-container-inspect-api
  desc: Docker container inspect API path
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    regex: '/containers/.{1,80}/json'
- id: docker-config-env-field
  desc: Docker container Config.Env extraction
  crit: notable
  conf: 0.92
  if:
    type: string_literal
    substr: Config.Env
# Docker inspect exposes a container's env at `.Config.Env`. Match that
# key chain specifically (subscript `['Config']['Env']` form) rather than the
# bare words "Config"/"Env", which are ubiquitous and — filed here — would let
# any program mentioning them register a spurious credential-access finding.
- id: docker-config-env-subscript
  desc: Docker Config.Env subscript access
  crit: component
  conf: 0.86
  if:
    type: text
    regex: \[\s*['"]Config['"]\s*\]\s*\[\s*['"]Env['"]\s*\]
- id: docker-inspect-env-format
  desc: docker inspect Config.Env format string
  crit: suspicious
  conf: 0.92
  unless:
  - id: metadata/package/quality/false-positives::luma-infra-package-context
  if:
    type: string_literal
    exact: "{{json .Config.Env}}"

composite_rules:
- id: docker-socket-api-env-harvest
  desc: Docker socket API container env harvest
  crit: hostile
  conf: 0.95
  unless:
  - id: metadata/package/quality/false-positives::luma-infra-package-context
  all:
  - id: docker-socket-path-literal
  - id: docker-container-list-api
  - id: docker-container-inspect-api
  any:
  - id: docker-config-env-field
  - id: docker-config-env-subscript
  near_lines: 90
- id: docker-cli-env-harvest
  desc: Docker CLI container env harvest
  crit: hostile
  conf: 0.95
  unless:
  - id: metadata/package/quality/false-positives::luma-infra-package-context
  all:
  - id: docker-inspect-env-format
  - id: micro-behaviors/process/create/subprocess::run-content
  near_lines: 20
