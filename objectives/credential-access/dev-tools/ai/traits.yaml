defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, python, shell, text]
  attack: T1552.001
traits:
  - id: claude-desktop-local-storage
    desc: Claude Desktop local storage target
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries, source]
    if:
      type: text
      regex: (?i)Claude.{0,24}Local Storage.{0,24}(leveldb|Default)
  - id: claude-code-env-secret-name
    desc: Claude Code secret name
    crit: component
    conf: 0.9
    for: [scripts, binaries, source]
    if:
      type: text
      regex: (?i)claude_code_(credential|secret|token)
  - id: claude-dir-credential-target
    desc: Claude credential file target
    crit: component
    conf: 0.88
    for: [scripts, binaries, source]
    if:
      type: text
      regex: (?i)[/\\]\.claude[/\\].{0,80}credentials?
  - id: claude-dir-token-target
    desc: Claude token file target
    crit: component
    conf: 0.88
    for: [scripts, binaries, source]
    if:
      type: text
      regex: (?i)[/\\]\.claude[/\\].{0,80}tokens?
  - id: claude-dir-secret-target
    desc: Claude secret file target
    crit: component
    conf: 0.88
    for: [scripts, binaries, source]
    if:
      type: text
      regex: (?i)[/\\]\.claude[/\\].{0,80}secrets?
composite_rules:
  - id: claude-code-config-target
    desc: Claude Code credential config target
    crit: notable
    conf: 0.9
    for: [scripts, binaries, source]
    any:
      - id: claude-code-env-secret-name
      - id: claude-dir-credential-target
      - id: claude-dir-token-target
      - id: claude-dir-secret-target
  - id: claude-channels-token-read
    desc: Claude channels token read
    crit: notable
    conf: 0.9
    for: [scripts, binaries, source]
    all:
      - id: micro-behaviors/fs/path/sensitive/credentials::claude-channels-token-file
    any:
      - id: micro-behaviors/fs/read/file::get-content
      - id: micro-behaviors/fs/read/file::read-all-text
      - id: objectives/credential-access/env/secrets/ai-provider::anthropic-api-key
  - id: ai-coding-tool-secret-harvest
    desc: AI coding tool secret harvesting
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/application/config::ai-coding-tool-config-directory-cluster
      - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
    any:
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
      - id: objectives/collection/file-targeting/filter::credential-files
      - id: objectives/collection/file-targeting/filter::pem-extension
      - id: objectives/collection/file-targeting/filter::key-extension
    needs: 2
    unless:
      - id: well-known/tool/detection/sast::sast-scanner-integration
      - id: micro-behaviors/communications/ipc/mcp::mcp-client-config-installer
  - id: claude-leveldb-secret-harvest
    desc: Claude LevelDB secret harvesting
    crit: hostile
    conf: 0.97
    for: [scripts, binaries, source]
    all:
      - id: claude-desktop-local-storage
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
    any:
      - id: objectives/credential-access/env/secrets/ai-provider::anthropic-api-key
      - id: objectives/credential-access/dev-tools/ai::claude-code-config-target
      - id: objectives/credential-access/env/secrets/api-key::api-key-generic
