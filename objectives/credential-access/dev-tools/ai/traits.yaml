defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, python, shell, text]
  attack: T1552.001
traits:
  - id: claude-desktop-local-storage
    desc: Claude Desktop local storage target
    crit: suspicious
    conf: 0.9
    for: [scripts, binaries, source]
    if:
      type: text
      regex: (?i)Claude.{0,24}Local Storage.{0,24}(leveldb|Default)
  - id: claude-code-config-target
    desc: Claude Code config target
    crit: notable
    conf: 0.9
    for: [scripts, binaries, source]
    if:
      type: text
      regex: (?i)(claude_code_config|[/\\]\.claude[/\\].{0,80}(config|settings|credentials))
composite_rules:
  - id: ai-coding-tool-secret-harvest
    desc: AI coding tool secret harvesting
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/fs/path/application/config::ai-coding-tool-config-directory-cluster
    any:
      - id: micro-behaviors/fs/directory/traverse::node-recursive-dirent-walk
      - id: micro-behaviors/fs/enumerate/directory::fs-readdir
      - id: objectives/collection/file-targeting/filter::credential-files
      - id: objectives/collection/file-targeting/filter::pem-extension
      - id: objectives/collection/file-targeting/filter::key-extension
    unless:
      - id: well-known/tool/detection/sast::sast-scanner-integration
      - id: micro-behaviors/communications/ipc/mcp::mcp-client-config-installer
  - id: claude-leveldb-secret-harvest
    desc: Claude LevelDB secret harvesting
    crit: hostile
    conf: 0.97
    for: [scripts, binaries, source]
    all:
      - id: claude-desktop-local-storage
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
    any:
      - id: objectives/credential-access/env/secrets/named-access::anthropic-api-key
      - id: objectives/credential-access/dev-tools/ai::claude-code-config-target
      - id: objectives/credential-access/env/secrets/named-access::api-key-generic
