defaults:
  platforms: [unix]
  for: [python]
  attack: T1552.001
traits:
  - id: process-environ-token-word
    desc: Environment token key word
    crit: component
    conf: 0.98
    if:
      type: string_literal
      word: TOKEN
      case_insensitive: true
  - id: process-environ-secret-word
    desc: Environment secret key word
    crit: component
    conf: 0.98
    if:
      type: string_literal
      word: SECRET
      case_insensitive: true
  - id: process-environ-key-word
    desc: Environment key key word
    crit: component
    conf: 0.98
    if:
      type: string_literal
      word: KEY
  - id: process-environ-auth-word
    desc: Environment auth key word
    crit: component
    conf: 0.98
    if:
      type: string_literal
      word: AUTH
      case_insensitive: true
composite_rules:
  - id: process-environ-token-key
    desc: Searches environment for a token key
    crit: component
    conf: 0.98
    any:
      - id: process-environ-token-word
      - id: process-environ-secret-word
      - id: process-environ-key-word
      - id: process-environ-auth-word
  - id: process-token-auth-header
    desc: Token word near HTTP header addition
    crit: component
    conf: 0.98
    scope: file
    near_bytes: 500
    all:
      - id: micro-behaviors/communications/http/headers::python-request-add-header
      - id: process-environ-token-word
  - id: process-environ-read-bytes
    desc: Reads another process environment bytes
    crit: notable
    conf: 0.98
    scope: file
    near_bytes: 3200
    all:
      - id: micro-behaviors/fs/proc/info/path::process-var-environ
      - id: micro-behaviors/fs/read/file::python-pathlib-read-bytes
  - id: process-environment-token-harvest
    desc: Harvests process token for local API auth
    crit: hostile
    conf: 0.99
    scope: file
    near_bytes: 3200
    all:
      - id: process-environ-read-bytes
      - id: process-environ-token-key
      - id: process-token-auth-header
      - id: micro-behaviors/fs/proc/info/path::process-arbitrary
