defaults:
  platforms: [unix]
  for: [python]
  attack: T1552.001
traits:
  - id: process-environ-path-template
    desc: Targets another process environment
    crit: notable
    conf: 0.98
    if:
      type: text
      regex: '/proc/\{[^}\n]{1,32}\}/environ'
  - id: process-environ-read-bytes
    desc: Reads procfs environment bytes
    crit: notable
    conf: 0.98
    if:
      type: symbol
      kind: call
      exact: Path().read_bytes
  - id: process-environ-token-word
    desc: Environment token key word
    crit: component
    conf: 0.98
    if:
      type: string_literal
      word: TOKEN
      case_insensitive: true
  - id: process-environ-secret-word
    desc: Environment secret key word
    crit: component
    conf: 0.98
    if:
      type: string_literal
      word: SECRET
      case_insensitive: true
  - id: process-environ-key-word
    desc: Environment key key word
    crit: component
    conf: 0.98
    if:
      type: string_literal
      word: KEY
  - id: process-environ-auth-word
    desc: Environment auth key word
    crit: component
    conf: 0.98
    if:
      type: string_literal
      word: AUTH
      case_insensitive: true
  - id: process-token-header-call
    desc: Adds an HTTP header
    crit: component
    conf: 0.98
    if:
      type: symbol
      kind: call
      exact: req.add_header
composite_rules:
  - id: process-environ-token-key
    desc: Searches environment for a token key
    crit: notable
    conf: 0.98
    any:
      - id: process-environ-token-word
      - id: process-environ-secret-word
      - id: process-environ-key-word
      - id: process-environ-auth-word
  - id: process-token-auth-header
    desc: Uses process token in HTTP auth
    crit: notable
    conf: 0.98
    scope: file
    near_bytes: 500
    all:
      - id: process-token-header-call
      - id: process-environ-token-word
  - id: process-environment-token-harvest
    desc: Harvests process token for local API auth
    crit: hostile
    conf: 0.99
    scope: file
    near_bytes: 3200
    all:
      - id: process-environ-path-template
      - id: process-environ-read-bytes
      - id: process-environ-token-key
      - id: process-token-auth-header
      - id: micro-behaviors/fs/proc/info/path::process-arbitrary
