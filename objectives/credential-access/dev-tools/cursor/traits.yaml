defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1552.001

traits:
- id: cursor-auth-access-token-key
  desc: Cursor access token key
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: cursorAuth/accessToken
  unless:
  - id: metadata/package/quality/false-positives::openchamber-credential-import-context
  - id: metadata/package/quality/false-positives::openchamber-extension-manager-context
  - id: well-known/app/vibe-cafe-vibe-usage::vibe-usage-archive-context
  - id: well-known/app/vibe-cafe-vibe-usage::vibe-usage-cursor-source-context

- id: cursor-auth-refresh-token-key
  desc: Cursor refresh token key
  crit: suspicious
  conf: 0.98
  if:
    type: text
    substr: cursorAuth/refreshToken
  unless:
  - id: metadata/package/quality/false-positives::openchamber-credential-import-context
  - id: metadata/package/quality/false-positives::openchamber-extension-manager-context

- id: cursor-state-vscdb-path
  desc: Cursor state database path
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'Cursor[\s\S]{0,160}state\.vscdb'

- id: cursor-itemtable-value-query
  desc: Cursor ItemTable value query
  crit: component
  conf: 0.95
  if:
    type: text
    substr: "SELECT value FROM ItemTable WHERE key="

- id: cursor-machine-id-key
  desc: Cursor machine ID key
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: 'storage\.(serviceMachineId|macMachineId)'

composite_rules:
- id: cursor-auth-token-sqlite-extraction
  desc: Cursor auth token SQLite extraction
  crit: suspicious
  conf: 0.99
  all:
  - id: cursor-auth-access-token-key
  - id: cursor-auth-refresh-token-key
  - id: cursor-state-vscdb-path
  - id: cursor-itemtable-value-query
  any:
  - id: cursor-machine-id-key
  - id: micro-behaviors/data/db/sql::sql-select
  - id: micro-behaviors/process/create/shell/bridge::js-execsync
  unless:
  - id: metadata/package/quality/false-positives::openchamber-credential-import-context
  - id: metadata/package/quality/false-positives::openchamber-extension-manager-context
