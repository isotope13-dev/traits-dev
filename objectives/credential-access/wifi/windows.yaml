defaults:
  platforms: [windows]
  for: [python, batch, powershell, pe]
  attack: T1555
traits:
  - id: netsh-wlan-show-profiles
    desc: Netsh saved Wi-Fi profile enumeration
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'netsh\s+wlan\s+show\s+profiles?\b'
  - id: netsh-wlan-key-clear
    desc: Netsh Wi-Fi key extraction
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'netsh\s+wlan\s+show\s+profile\b[^\n]{0,160}\bkey\s*=\s*clear\b'
  - id: netsh-wlan-key-content-parse
    desc: Parses netsh Wi-Fi key content
    crit: component
    conf: 0.9
    if:
      type: text
      regex: 'Key Content|محتوى المفتاح'
  - id: wlan-profile-plaintext-key-flag
    desc: WLAN plaintext profile key flag
    crit: component
    conf: 0.95
    for: [source, binaries]
    if:
      type: text
      exact: WLAN_PROFILE_GET_PLAINTEXT_KEY
  - id: go-netsh-wlan-show-profiles
    desc: Go netsh saved Wi-Fi profiles
    crit: notable
    conf: 0.9
    for: [go]
    if:
      type: text
      regex: 'exec\.Command\("netsh",\s*"wlan",\s*"show",\s*"profiles?"'
  - id: go-netsh-wlan-key-clear
    desc: Go netsh Wi-Fi key extraction
    crit: suspicious
    conf: 0.94
    for: [go]
    if:
      type: text
      regex: 'exec\.Command\("netsh",\s*"wlan",\s*"show",\s*"profiles?",[\s\S]{0,160}"key=clear"'
composite_rules:
  - id: netsh-wifi-password-extraction
    desc: Netsh saved Wi-Fi password extraction
    crit: suspicious
    conf: 0.96
    all:
      - id: netsh-wlan-key-clear
    any:
      - id: netsh-wlan-key-content-parse
      - id: netsh-wlan-show-profiles
      - id: micro-behaviors/process/create/subprocess::shell-true
  - id: wlan-api-plaintext-profile-key
    desc: Windows WLAN API plaintext profile key retrieval
    crit: suspicious
    conf: 0.96
    for: [source, binaries]
    all:
      - id: micro-behaviors/os/network/interface::wlan-get-profile
      - id: wlan-profile-plaintext-key-flag
  - id: go-netsh-wifi-password-extraction
    desc: Go netsh Wi-Fi password extraction
    crit: suspicious
    conf: 0.96
    for: [go]
    all:
      - id: go-netsh-wlan-show-profiles
      - id: go-netsh-wlan-key-clear
