defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  crit: notable
  conf: 0.85
  attack: T1555
traits:
  - id: application-path
    desc: FileZilla application directory
    crit: component
    if:
      type: text
      substr: FileZilla
  - id: sitemanager-xml
    desc: FileZilla sitemanager.xml config
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)[/\\]sitemanager\.xml\b
  - id: recentservers-xml
    desc: FileZilla recentservers.xml config
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)[/\\]recentservers\.xml\b
  - id: filezilla-xml
    desc: FileZilla main config file
    crit: component
    conf: 0.9
    if:
      type: text
      regex: (?i)[/\\]filezilla\.xml\b
  - id: encoded-password-tag
    desc: FileZilla encoded password XML element
    crit: component
    conf: 0.9
    if:
      type: text
      regex: <Pass encoding="base64">[^<]{4,}</Pass>
composite_rules:
  - id: filezilla-stealer
    desc: FileZilla credential stealer detected
    crit: suspicious
    conf: 0.95
    all:
      - id: application-path
    any:
      - id: sitemanager-xml
      - id: recentservers-xml
      - id: filezilla-xml
      - id: encoded-password-tag
