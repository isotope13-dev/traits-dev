defaults:
  platforms: [qnx, unix]
  for: [python, pyc]
  attack: T1114

traits:
  - id: qnx-python-email-config-paths
    desc: QNX Python email config paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(/etc/postfix/main\.cf|/etc/exim/exim\.conf)[\s\S]{0,260}/etc/dovecot/dovecot\.conf'

  - id: qnx-python-email-creds-func
    desc: QNX Python email creds func
    crit: component
    conf: 0.9
    if:
      type: text
      substr: collect_email_credentials

  - id: qnx-pyc-email-config-paths
    desc: QNX pyc email config paths
    crit: suspicious
    conf: 0.94
    for: [pyc]
    if:
      type: text
      substr: /etc/postfix/main.cf

  - id: qnx-pyc-dovecot-config-path
    desc: QNX pyc dovecot config path
    crit: suspicious
    conf: 0.94
    for: [pyc]
    if:
      type: text
      substr: /etc/dovecot/dovecot.conf

  - id: qnx-pyc-smtp-env-key
    desc: SMTP string reference
    crit: component
    conf: 0.94
    for: [pyc]
    if:
      type: text
      substr: SMTP

  - id: qnx-pyc-imap-env-key
    desc: IMAP string reference
    crit: component
    conf: 0.94
    for: [pyc]
    if:
      type: text
      substr: IMAP

composite_rules:
  - id: qnx-python-email-credential-harvest
    desc: QNX Python email credential harvest
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-python-email-config-paths
      - id: micro-behaviors/os/env/config::python-email-service-env-config
      - id: qnx-python-email-creds-func

  - id: qnx-pyc-email-credential-harvest
    desc: QNX pyc email credential harvest
    crit: hostile
    conf: 0.98
    for: [pyc]
    all:
      - id: qnx-pyc-email-config-paths
      - id: qnx-pyc-dovecot-config-path
      - id: qnx-pyc-smtp-env-key
      - id: qnx-pyc-imap-env-key
      - id: qnx-python-email-creds-func
