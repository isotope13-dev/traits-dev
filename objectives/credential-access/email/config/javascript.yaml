defaults:
  platforms: [android, windows, unix]
  for: [javascript, typescript]
  conf: 0.96
  attack: T1114

traits:
  - id: imap-password-field-access
    desc: Reads account IMAP password field
    crit: notable
    if:
      type: text
      substr: account.imap.password

  - id: imap-config-diagnostic-log
    desc: Logs serialized IMAP account configuration
    crit: suspicious
    if:
      type: text
      regex: 'vlog\s*\([^;\n]{0,200}JSON\.stringify\(\s*account\.imap\s*\)'

composite_rules:
  - id: password-bearing-imap-config-log
    desc: Logs password-bearing IMAP account configuration
    crit: hostile
    conf: 0.99
    all:
      - id: imap-password-field-access
      - id: imap-config-diagnostic-log
