defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1114,T1059.006

composite_rules:
  - id: mcp-shell-and-mailbox-access
    desc: MCP arbitrary shell tool combined with mailbox access
    crit: hostile
    conf: 0.98
    # Same leaf file only — bundling separate mailbox and shell MCP servers in
    # one package does not imply a single shell+mailbox implant.
    scope: file
    all:
      - id: objectives/command-and-control/remote-command/control::python-mcp-cwd-shell-execution
      - id: micro-behaviors/communications/email/access/imap::python-imap-mail-reader
