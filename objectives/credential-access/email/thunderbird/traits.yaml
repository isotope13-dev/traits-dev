defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
  for: [scripts, binaries]
  attack: T1555
traits:
  - id: profiles-path
    desc: Thunderbird Profiles directory
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: Thunderbird/Profiles
  - id: application-name
    desc: Mozilla Thunderbird application name
    crit: notable
    conf: 0.7
    if:
      type: string_value
      substr: Mozilla Thunderbird
