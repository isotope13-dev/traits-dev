defaults:
  platforms: [windows]
  for: [go]
  attack: T1114

traits:
  - id: go-thunderbird-profile-walk
    desc: Go walks Thunderbird profiles
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Thunderbird.{0,80}Profiles[\s\S]{0,220}filepath\.Walk'

  - id: go-mail-file-suffixes
    desc: Go targets mail file suffixes
    crit: component
    conf: 0.9
    if:
      type: text
      regex: '\.(eml|msg)[\s\S]{0,120}mbox'

composite_rules:
  - id: go-thunderbird-mail-harvest
    desc: Go Thunderbird mail harvest
    crit: hostile
    conf: 0.97
    all:
      - id: go-thunderbird-profile-walk
      - id: go-mail-file-suffixes
