defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1098,T1078"

composite_rules:
  - id: google-recovery-account-mutation
    desc: Google account recovery action with security-page context
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/services/google::google-security-account-navigation
    any:
      - id: micro-behaviors/communications/http/services/google::google-recovery-endpoint-reference
      - id: micro-behaviors/communications/http/services/google::google-recovery-phone-action
      - id: micro-behaviors/communications/http/services/google::google-recovery-email-action

  - id: google-two-factor-account-mutation
    desc: Google two-factor action with security-page context
    crit: suspicious
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/services/google::google-security-account-navigation
    any:
      - id: google-two-factor-ui-labels
      - id: micro-behaviors/communications/http/services/google::google-two-step-settings-path

  - id: google-two-factor-ui-labels
    desc: Google two-factor UI action labels
    crit: component
    conf: 0.96
    any:
      - id: micro-behaviors/communications/http/services/google::google-authenticator-ui-label
      - id: micro-behaviors/communications/http/services/google::google-two-factor-action-label

  - id: google-account-security-takeover
    desc: Stealth browser automation changes Google account security
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/library/automation::puppeteer-extra-stealth-plugin-import
      - id: micro-behaviors/communications/http/services/google::google-security-account-navigation
      - id: micro-behaviors/communications/http/cookies::browser-page-cookie-read
      - id: micro-behaviors/ui/window/form-input::browser-password-or-otp-entry
    any:
      - id: google-recovery-account-mutation
      - id: google-two-factor-account-mutation
      - id: micro-behaviors/communications/http/request/client::gmail-session-redirect-interception
