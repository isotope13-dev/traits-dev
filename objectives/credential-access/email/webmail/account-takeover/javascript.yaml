defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1098,T1078"

composite_rules:
  - id: google-account-security-takeover
    desc: Stealth browser automation changes Google account security
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/library/automation::puppeteer-extra-stealth-plugin-import
      - id: micro-behaviors/communications/http/services/google::google-security-account-navigation
      - id: micro-behaviors/communications/http/cookies::browser-page-cookie-read
      - id: micro-behaviors/ui/window/form-input::browser-password-or-otp-entry
    any:
      - id: micro-behaviors/communications/http/services/google::google-recovery-account-mutation
      - id: micro-behaviors/communications/http/services/google::google-two-factor-account-mutation
      - id: micro-behaviors/communications/http/request/client::gmail-session-redirect-interception
