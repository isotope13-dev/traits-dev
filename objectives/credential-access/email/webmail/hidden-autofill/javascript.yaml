defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1056
traits:
  - id: hidden-autofill-form-fields
    desc: Creates hidden autofill credential fields
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: autocomplete=['"](?:on|username|current-password)['"]
  - id: ast-create-form
    desc: Creates form element symbol
    crit: notable
    conf: 0.76
    if:
      type: text
      regex: createElement\(['"]form['"]\)
  - id: body-append-credential-form
    desc: Appends hidden credential form to body
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: document\.body\.appendChild.{0,80}(hidden|autocomplete|user|pass)
  - id: body-click-credential-read
    desc: Reads credentials on body click
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: document\.body\.(?:on|addEventListener\(\s*['"])click.{0,120}(user|pass|cred|login)
  - id: body-click-credential-read-symbol
    desc: Body click handler symbol
    crit: suspicious
    conf: 0.82
    if:
      type: symbol
      exact: document.body.onclick
  - id: username-password-read
    desc: Reads DOM credential field values
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?:(?:document\.)?getElementById\(['"](?:username|password)['"]\)|(?:document\.)?querySelector\(['"].{0,80}(?:user|pass).{0,80}['"]\))\.value
  - id: getelementbyid-symbol
    desc: Reads form fields by id symbol
    crit: notable
    conf: 0.78
    if:
      type: text
      regex: getElementById\(['"](username|password)['"]\)
  - id: credential-base64-or-formdata
    desc: Encodes or packages stolen credentials
    crit: component
    conf: 0.86
    if:
      type: text
      regex: \.append\(\s*['"](username|password)['"]
  - id: btoa-symbol
    desc: Base64 encode symbol
    crit: notable
    conf: 0.78
    if:
      type: symbol
      exact: btoa

composite_rules:
  - id: hidden-autofill-click-credential-theft
    desc: Hidden autofill click-based credential theft
    crit: hostile
    conf: 0.97
    all:
      - id: hidden-autofill-form-fields
      - id: ast-create-form
      - id: body-append-credential-form
      - id: body-click-credential-read
      - id: username-password-read
    any:
      - id: body-click-credential-read-symbol
      - id: getelementbyid-symbol
      - id: credential-base64-or-formdata
      - id: btoa-symbol
      - id: micro-behaviors/communications/http/upload::form-data-new
