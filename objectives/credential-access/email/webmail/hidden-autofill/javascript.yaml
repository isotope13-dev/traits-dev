defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1056
traits:
- id: hidden-autofill-form-fields
  desc: autocomplete=username/current-password attribute
  crit: component
  conf: 0.93
  if:
    type: text
    regex: autocomplete=['"](on|username|current-password)['"]
- id: body-append-credential-form
  desc: document.body.appendChild attaches credential form
  crit: suspicious
  conf: 0.88
  if:
    type: text
    regex: document\.body\.appendChild.{0,120}(autocomplete|user|pass|cred)
- id: body-click-credential-read--rx-1
  desc: document.body click handler reads user/pass
  crit: component
  conf: 0.94
  if:
    type: text
    regex: document\.body\.(on|addEventListener\(\s*['"])click.{0,120}(user|pass)
- id: body-click-credential-read--rx-2
  desc: document.body click handler reads cred/login
  crit: component
  conf: 0.94
  if:
    type: text
    regex: document\.body\.(on|addEventListener\(\s*['"])click.{0,120}(cred|login)
- id: body-click-credential-read-symbol
  desc: document.body.onclick assignment
  crit: suspicious
  conf: 0.82
  if:
    type: symbol
    exact: document.body.onclick
- id: username-password-read--rx-3
  desc: document.getElementById DOM lookup call
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: getElementById
- id: username-password-read--rx-4
  desc: document.querySelector DOM lookup call
  crit: component
  conf: 0.9
  if:
    type: symbol
    exact: querySelector
- id: username-password-read--rx-5
  desc: document.getElement*/querySelector* DOM lookup
  crit: component
  conf: 0.9
  if:
    type: text
    regex: document\.(getElement|querySelector)
- id: username-password-read--rx-7
  desc: '"username" string literal (form field name)'
  crit: component
  conf: 0.9
  if:
    type: string_literal
    exact: username
- id: username-password-read--rx-8
  desc: .value DOM property read on form element
  crit: component
  conf: 0.9
  if:
    type: text
    regex: \.value\b
- id: password-selector-exclusion
  desc: Password selector exclusion
  crit: component
  conf: 0.9
  if:
    type: text
    substr: 'not([type="password"])'
- id: password-filter-return
  desc: Password filter returns true
  crit: component
  conf: 0.85
  if:
    type: text
    regex: \bpassword\b.{0,80}return\s*!?0
- id: getelementbyid-symbol
  desc: getElementById("username"|"password") credential lookup
  crit: component
  conf: 0.78
  if:
    type: text
    regex: getElementById\(['"](username|password)['"]\)
- id: credential-base64-or-formdata
  desc: FormData.append("username"|"password") packaging
  crit: component
  conf: 0.86
  if:
    type: text
    regex: \.append\(\s*['"](username|password)['"]

composite_rules:
- id: hidden-autofill-click-credential-theft
  desc: Hidden autofill click-based credential theft
  crit: hostile
  conf: 0.97
  all:
  - id: hidden-autofill-form-fields
  - id: micro-behaviors/ui/window/manage/dom::browser-create-form-element
  - id: body-append-credential-form
  - id: body-click-credential-read
  - id: username-password-read
  any:
  - id: body-click-credential-read-symbol
  - id: getelementbyid-symbol
  - id: credential-base64-or-formdata
  - id: micro-behaviors/data/encode/base64::btoa-symbol
  - id: micro-behaviors/communications/http/upload::form-data-new
- id: body-click-credential-read
  desc: Reads credentials on body click
  crit: suspicious
  conf: 0.94
  any:
  - id: body-click-credential-read--rx-1
  - id: body-click-credential-read--rx-2
- id: username-password-read
  desc: Reads DOM credential field values
  crit: notable
  conf: 0.9
  near_bytes: 600
  all:
  - id: username-password-dom-field-read
  - id: username-password-field-context
  unless:
  - id: credential-field-exclusion-filter
- id: credential-field-exclusion-filter
  desc: Credential exclusion filter
  crit: component
  conf: 0.9
  any:
  - id: password-selector-exclusion
  - id: password-filter-return
- id: username-password-dom-field-read
  desc: DOM form field lookup or value read
  crit: component
  conf: 0.86
  any:
  - id: username-password-read--rx-3
  - id: username-password-read--rx-4
  - id: username-password-read--rx-5
  - id: username-password-read--rx-8
- id: username-password-field-context
  desc: Username or password field context
  crit: component
  conf: 0.86
  any:
  - id: micro-behaviors/data/text/keywords/lexicon::password
  - id: username-password-read--rx-7
  - id: getelementbyid-symbol
  - id: credential-base64-or-formdata
