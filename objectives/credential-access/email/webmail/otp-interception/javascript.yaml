defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: "T1114,T1078"

composite_rules:
  - id: google-recovery-otp-interception
    desc: Google recovery takeover with external OTP polling
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/services/google::google-security-account-navigation
      - id: micro-behaviors/ui/window/form-input::browser-password-or-otp-entry
      - id: micro-behaviors/communications/http/services/google::google-recovery-account-mutation
      - id: micro-behaviors/communications/http/request/client::sms-api-otp-polling
