defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1556
traits:
  - id: webmail-2fa-settings-fetch
    desc: Fetches webmail 2FA plugin settings
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: _task=settings&_action=plugin\.twofactor_gauthenticator
  - id: domparser-html-parse
    desc: Parses fetched HTML with DOMParser
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: new\s+DOMParser\(|parseFromString\([^)]{0,80}text/html
  - id: domparser-symbol
    desc: DOMParser constructor symbol
    crit: notable
    conf: 0.76
    if:
      type: symbol
      exact: DOMParser
  - id: parsefromstring-symbol
    desc: parseFromString symbol call
    crit: notable
    conf: 0.76
    if:
      type: symbol
      exact: parseFromString
  - id: five-password-fields
    desc: Extracts multiple password fields
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: querySelectorAll\(\s*['"]\[type=["']password["']\]['"]\s*\)|passwordElements\[[0-4]\]
  - id: queryselectorall-symbol
    desc: querySelectorAll symbol call
    crit: notable
    conf: 0.76
    if:
      type: symbol
      exact: querySelectorAll
  - id: secret-recovery-concat
    desc: Concatenates secret and recovery codes
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: passwordElements\[0\]\.value.{0,120}passwordElements\[4\]\.value|secret-code1-code2-code3-code4|no_key
  - id: base64-webmail-exfil
    desc: Base64 encodes harvested webmail secrets
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: (btoa|Buffer\.from).{0,120}(no_key|passwordElements)

composite_rules:
  - id: webmail-2fa-secret-harvester
    desc: Webmail 2FA secret and recovery theft
    crit: hostile
    conf: 0.97
    all:
      - id: webmail-2fa-settings-fetch
      - id: domparser-html-parse
      - id: five-password-fields
      - id: secret-recovery-concat
    any:
      - id: domparser-symbol
      - id: parsefromstring-symbol
      - id: queryselectorall-symbol
      - id: base64-webmail-exfil
      - id: micro-behaviors/communications/http/request::js-fetch-call
      - id: micro-behaviors/communications/http/request::fetch-string
