defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1556
traits:
- id: webmail-2fa-settings-fetch
  desc: Fetches webmail 2FA plugin settings
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: _task=settings&_action=plugin.twofactor_gauthenticator
- id: domparser-html-parse--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: new\s+DOMParser\(\)[\s\S]{0,120}parseFromString\([^)]{0,120}text/html
  count_max: 1005953
- id: domparser-html-parse--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.82
  if:
    type: text
    regex: parseFromString\([^)]{0,80}text/html
  count_max: 1005954
- id: domparser-symbol
  desc: DOMParser constructor symbol
  crit: component
  conf: 0.76
  if:
    type: symbol
    exact: DOMParser
  unless:
  - type: text
    substr: text/xml
- id: parsefromstring-symbol
  desc: parseFromString symbol call
  crit: component
  conf: 0.76
  if:
    type: symbol
    exact: parseFromString
  unless:
  - type: text
    substr: text/xml
- id: five-password-fields
  desc: Extracts multiple password fields
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: querySelectorAll\(\s*['"]\[type=["']password["']\]['"]\s*\)|passwordElements\[[0-4]\]
- id: secret-recovery-concat--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: passwordElements\[0\]\.value.{0,120}passwordElements\[4\]\.value
  count_max: 1005959
- id: secret-recovery-concat--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: secret-code1-code2-code3-code4
  count_max: 1005960
- id: base64-webmail-exfil
  desc: Base64 encodes harvested webmail secrets
  crit: suspicious
  conf: 0.86
  if:
    type: text
    regex: (btoa|Buffer\.from).{0,120}(no_key|passwordElements)

composite_rules:
- id: webmail-2fa-secret-harvester
  desc: Webmail 2FA secret and recovery theft
  crit: hostile
  conf: 0.97
  all:
  - id: webmail-2fa-settings-fetch
  - id: domparser-html-parse
  - id: five-password-fields
  - id: secret-recovery-concat
  any:
  - id: domparser-symbol
  - id: parsefromstring-symbol
  - id: micro-behaviors/data/manipulation::queryselectorall-call
  - id: base64-webmail-exfil
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: micro-behaviors/communications/http/request/client::fetch-string
- id: domparser-html-parse
  desc: Parses fetched HTML with DOMParser
  crit: component
  conf: 0.82
  any:
  - id: domparser-html-parse--rx-1
  - id: domparser-html-parse--rx-2
- id: secret-recovery-concat
  desc: Concatenates secret and recovery codes
  crit: suspicious
  conf: 0.9
  any:
  - id: secret-recovery-concat--rx-3
  - id: secret-recovery-concat--rx-4
  unless:
  - id: well-known/app/tencent-codebuddy::codebuddy-marker
