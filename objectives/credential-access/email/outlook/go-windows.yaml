defaults:
  platforms: [windows]
  for: [go]
  attack: T1114

traits:
  - id: go-outlook-store-path
    desc: Go references Outlook mail store
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'Microsoft.{0,40}Outlook.{0,80}\.(pst|ost)'

  - id: go-outlook-store-read
    desc: Go reads Outlook mail store
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'Microsoft.{0,40}Outlook[\s\S]{0,260}os\.Open\('

composite_rules:
  - id: go-outlook-mail-harvest
    desc: Go Outlook mail harvest
    crit: hostile
    conf: 0.97
    all:
      - id: go-outlook-store-path
      - id: go-outlook-store-read
