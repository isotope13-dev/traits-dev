defaults:
  platforms: [panos, appliance, windows]
  for: [batch]
  attack: T1114

traits:
  - id: batch-panos-outlook-profile-query
    desc: Batch PAN-OS Outlook profile query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Outlook\Profiles\Outlook

  - id: batch-panos-harvested-emails-file
    desc: Batch PAN-OS harvested emails file
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: harvested_emails.txt

  - id: batch-panos-email-exfil-post
    desc: Batch PAN-OS email exfil POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /exfil

composite_rules:
  - id: batch-panos-outlook-email-exfil
    desc: Batch PAN-OS Outlook email exfil
    crit: hostile
    conf: 0.98
    all:
      - id: batch-panos-outlook-profile-query
      - id: batch-panos-harvested-emails-file
      - id: batch-panos-email-exfil-post
