defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, source]
traits:
  - id: openssl-hardcoded-pass
    desc: OpenSSL command with hardcoded password
    crit: suspicious
    conf: 0.8
    if:
      type: raw
      regex: openssl\s+.{0,100}-pass\s+pass:[^\s]{1,100}
    unless:
      - id: metadata/package/documentation::unix-manpage
      - id: metadata/package/testing/presence/harness::example-directory
      - type: basename
        regex: ^.{0,500}[\\/](examples?|demos?)[\\/].{0,500}$
      - type: text
        substr: "Demo to do the rough equivalent"
