defaults:
  platforms: [unix]
  for: [javascript, typescript]
  attack: T1552.001

traits:
  - id: node-env-and-ssh-config-copy
    desc: Node env and SSH config copy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.env\.production[\s\S]{0,260}/etc/ssh/sshd_config'

  - id: node-shadow-environment-copy
    desc: Node shadow environment copy
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,260}/etc/environment'

composite_rules:
  - id: node-unix-config-credential-copy
    desc: Node Unix config credential copy
    crit: hostile
    conf: 0.98
    all:
      - id: node-env-and-ssh-config-copy
      - id: node-shadow-environment-copy
