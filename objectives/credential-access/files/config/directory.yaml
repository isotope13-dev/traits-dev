defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: suspicious
  conf: 0.95
  attack: T1552
  for: [scripts, binaries]
traits:
  - id: credential-files-config
    desc: Multiple credential files in config directories
    count_min: 2
    if:
      type: string_value
      regex: /(Config|etc)/.{0,200}(account|passwd|password)
      case_insensitive: true
    unless:
      - type: string_count
        min: 100
        regex: ^/[a-zA-Z0-9._/-]{1,60}\.php$
    downgrade:
      any:
        - id: metadata/dev/testing/jest::jest-word
