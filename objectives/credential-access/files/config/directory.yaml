defaults:
  platforms: [windows, unix]
  crit: suspicious
  conf: 0.95
  attack: T1552
  for: [scripts, binaries]
traits:
  - id: php-path-corpus
    desc: "Large list of PHP paths"
    crit: component
    conf: 0.85
    count_min: 100
    if:
      type: text
      regex: ^/[a-zA-Z0-9._/-]{1,60}\.php$
  - id: credential-files-config
    desc: "Many credential files in config directories"
    crit: notable
    count_min: 2
    if:
      type: text
      regex: '(^|["''])/[^"'']{0,60}/(Config|etc)/(accounts?|passwd)([./"'']|$)'
      case_insensitive: true
    unless:
      - id: metadata/file/format/
      - id: well-known/lib/jruby
      - type: raw
        regex: '>>>\s+\w+\("(\.\./){1,6}(etc|Config)[/\\](accounts?|passw(d|ords?))"'
        case_insensitive: true
      - id: objectives/credential-access/files/config::php-path-corpus
      - id: metadata/package/testing/
      - id: metadata/package/testing/presence/harness/
      - type: raw
        regex: (DANGEROUS_PATTERNS|BLOCKED_TOOLS|security.*pattern|regex.*\.\*)
    downgrade:
      any:
