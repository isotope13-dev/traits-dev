defaults:
  platforms: [windows, unix]
  crit: suspicious
  conf: 0.95
  attack: T1552
  for: [scripts, binaries]
traits:
  - id: php-path-corpus
    desc: Large list of PHP paths (security-scanner corpus)
    crit: component
    conf: 0.85
    count_min: 100
    if:
      type: text
      regex: ^/[a-zA-Z0-9._/-]{1,60}\.php$
  - id: credential-files-config
    desc: Multiple credential files in config directories
    count_min: 2
    if:
      type: text
      regex: '[/\\](Config|etc)([/\\][^/\\]{1,40}){1,3}[/\\](accounts?|passw(d|ords?))'
      case_insensitive: true
    unless:
      - id: metadata/file/text/format::roff-document
      - id: well-known/lib/jruby::jruby-home-path
      - type: raw
        regex: '>>>\s+\w+\("(\.\./){1,6}(etc|Config)[/\\](accounts?|passw(d|ords?))"'
        case_insensitive: true
      - id: objectives/credential-access/files/config::php-path-corpus
      - id: metadata/package/quality::has-tests
      - type: raw
        regex: (DANGEROUS_PATTERNS|BLOCKED_TOOLS|security.*pattern|regex.*\.\*)
    downgrade:
      any:
        - id: metadata/package/testing/scripted::jest-word
