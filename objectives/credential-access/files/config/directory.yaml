# Credential File Enumeration in Config Directories
# ATT&CK: T1552 (Unsecured Credentials)
# Detects systematic access to multiple credential files
defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  crit: suspicious
  conf: 0.95
  attack: "T1552"
  for: [scripts, binaries]
traits:
  - id: credential-files-config
    desc: Multiple credential files in config directories
    count_min: 2
    if:
      type: string_value
      # Match paths in Config or /etc/ containing credential-related keywords
      regex: '/(Config|etc)/.{0,200}(account|passwd|password)'
      case_insensitive: true
    unless:
      # Skip for HTTP fingerprint/probe databases (e.g., Nmap NSE scripts): these contain
      # /etc/passwd as HTTP path traversal test targets, not as local file access targets.
      # Fingerprint databases have 100+ short web path strings.
      - type: string_value_count
        min: 100
        regex: '^/[a-zA-Z0-9._/-]{1,60}\.php$'
    downgrade:
      # Reduce to notable for Jest test files: test vectors commonly reference /etc/passwd
      # to verify SSRF/path-traversal rejection, not as actual credential access targets.
      any:
        - id: metadata/dev/testing/jest::jest-word
    # Detects patterns like:
    # /etc/passwd, /etc/shadow
    # ~/Library/Application Support/Config/accounts.db, ~/Library/Application Support/Config/passwords.txt
