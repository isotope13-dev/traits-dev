defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  crit: suspicious
  conf: 0.95
  attack: T1552
  for: [scripts, binaries]
traits:
  - id: credential-files-config
    desc: Multiple credential files in config directories
    count_min: 2
    if:
      type: string_value
      regex: '[/\\](Config|etc)([/\\][^/\\]{1,40}){0,3}[/\\](accounts?|passw(?:d|ords?))'
      case_insensitive: true
    unless:
      - type: string_count
        min: 100
        regex: ^/[a-zA-Z0-9._/-]{1,60}\.php$
      - id: metadata/quality::has-tests
      - type: raw
        regex: (DANGEROUS_PATTERNS|BLOCKED_TOOLS|security.*pattern|regex.*\.\*)
    downgrade:
      any:
        - id: metadata/dev/testing/jest::jest-word
