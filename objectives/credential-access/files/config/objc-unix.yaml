defaults:
  platforms: [unix]
  for: [objc, elf]
  attack: T1552.001

traits:
  - id: objc-netrc-path
    desc: netrc credential path format string
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: "%s/.netrc"

  - id: objc-cloud-credential-read
    desc: ObjC reads cloud credentials
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.aws/credentials[\s\S]{0,220}gcloud'

  - id: objc-ssh-key-read
    desc: ObjC reads SSH keys
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '\.ssh/id_rsa[\s\S]{0,180}\.ssh/id_ed25519'

  - id: objc-secret-env-scan
    desc: ObjC scans secret env vars
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'AWS_SECRET_ACCESS_KEY[\s\S]{0,220}DATABASE_URL'

composite_rules:
  - id: objc-netrc-credential-read
    desc: ObjC reads netrc credentials
    crit: suspicious
    conf: 0.93
    all:
      - id: objc-netrc-path
      - id: micro-behaviors/process/interpreter/runtime/dynamic::objc-runtime-msgsend

  - id: objc-unix-credential-collector
    desc: ObjC Unix credential collector
    crit: hostile
    conf: 0.98
    any:
      - id: objc-netrc-credential-read
      - id: objc-cloud-credential-read
      - id: objc-ssh-key-read
      - id: objc-secret-env-scan
    needs: 3
