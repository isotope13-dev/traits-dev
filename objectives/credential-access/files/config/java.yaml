defaults:
  platforms: [unix]
  for: [java, class, jar, zip]
  attack: T1552.001

traits:
  - id: java-shadow-read-command
    desc: Java bytecode reads shadow file
    crit: component
    conf: 0.96
    if:
      type: raw
      substr: "cat /etc/shadow 2>/dev/null"
  - id: java-master-passwd-read-command
    desc: Java bytecode reads BSD password database
    crit: component
    conf: 0.96
    if:
      type: raw
      substr: "cat /etc/master.passwd 2>/dev/null"
  - id: java-ssh-key-search-command
    desc: Java bytecode searches SSH keys
    crit: component
    conf: 0.94
    if:
      type: raw
      substr: "find /home -name 'id_rsa' -o -name 'id_ed25519'"
  - id: java-env-secret-grep-commands
    desc: Java bytecode greps environment secrets
    crit: component
    conf: 0.94
    count_min: 3
    if:
      type: raw
      substr: "env | grep -i "
  - id: java-credential-path-table
    desc: Java bytecode embeds credential paths
    crit: component
    conf: 0.9
    count_min: 3
    if:
      type: raw
      regex: '(\.ssh/(id_rsa|authorized_keys)|\.aws/credentials|\.netrc)'

composite_rules:
  - id: java-processbuilder-command-access
    desc: Java ProcessBuilder command access
    crit: component
    conf: 0.9
    any:
      - id: micro-behaviors/process/create/spawn::java-processbuilder-source
      - id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
  - id: java-developer-credential-sweep
    desc: Java sweeps developer credentials
    crit: hostile
    conf: 0.98
    all:
      - id: java-processbuilder-command-access
    needs: 3
    any:
      - id: java-shadow-read-command
      - id: java-master-passwd-read-command
      - id: java-ssh-key-search-command
      - id: java-env-secret-grep-commands
      - id: java-credential-path-table
