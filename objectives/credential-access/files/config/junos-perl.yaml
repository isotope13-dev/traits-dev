defaults:
  platforms: [junos, appliance, unix]
  for: [perl]
  attack: T1552.001
  mbc: B0029

traits:
  - id: perl-junos-conf-db-path
    desc: Perl Junos conf db path
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: /var/db/config/.conf.db

  - id: perl-junos-config-backups
    desc: Perl Junos config backup paths
    crit: suspicious
    conf: 0.95
    count_min: 2
    if:
      type: text
      regex: '/var/db/config/(backup\.conf|last\.conf|previous\.conf)'

  - id: perl-junos-rollback-path
    desc: Perl Junos rollback path
    crit: component
    conf: 0.94
    if:
      type: text
      substr: /var/db/config/rollback.conf

  - id: perl-junos-password-extract
    desc: Perl extracts Junos passwords
    crit: suspicious
    conf: 0.96
    if:
      type: text
      regex: '\(password\|encrypted-password\)\\s\+'

  - id: perl-var-home-ssh-keys
    desc: Perl /var/home SSH keys
    crit: suspicious
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: '/var/home/\.ssh/id_(rsa|dsa|ecdsa|ed25519)'

  - id: perl-root-ssh-keys
    desc: Perl root SSH key paths
    crit: suspicious
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: '/root/\.ssh/id_(rsa|ed25519)'

composite_rules:
  - id: perl-junos-config-path-cluster
    desc: Perl Junos config path cluster
    crit: suspicious
    conf: 0.96
    any:
      - id: perl-junos-conf-db-path
      - id: perl-junos-config-backups
      - id: perl-junos-rollback-path
    needs: 2

  - id: perl-junos-config-credential-theft
    desc: Perl Junos config credential theft
    crit: hostile
    conf: 0.98
    all:
      - id: perl-junos-password-extract
      - id: perl-junos-config-path-cluster
    any:
      - id: perl-var-home-ssh-keys
      - id: perl-root-ssh-keys
