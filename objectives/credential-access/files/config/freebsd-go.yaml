defaults:
  platforms: [freebsd, unix]
  for: [go]
  attack: T1552.001

traits:
  - id: go-freebsd-master-passwd-read
    desc: Go reads FreeBSD master.passwd
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/master.passwd
    unless:
      - id: well-known/lib/modernc-libc::source-tree

  - id: go-user-secret-dotfiles
    desc: Go references multiple secret dotfiles
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '(?s)\.(netrc.{0,500}(pgpass|my\.cnf)|pgpass.{0,500}netrc|my\.cnf.{0,500}netrc)'

  - id: go-user-ssh-private-key-paths
    desc: Go SSH private key path references
    crit: component
    conf: 0.92
    if:
      type: text
      regex: '(\.ssh[/\\]|[/\\])id_(rsa|ed25519)\b'
    unless:
      - id: metadata/package/testing/presence/harness::go-test-file
      - id: metadata/package/testing/presence/harness::go-test-helper-command-path
      - id: metadata/package/testing/harness/unit::go-test
      - id: well-known/app/olares

composite_rules:
  - id: go-freebsd-credential-sweep
    desc: Go sweeps FreeBSD credentials
    crit: hostile
    conf: 0.98
    all:
      - id: go-freebsd-master-passwd-read
    any:
      - id: go-user-secret-dotfiles
      - id: go-user-ssh-private-key-paths
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
