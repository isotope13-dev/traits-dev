defaults:
  platforms: [freebsd, netbsd, unix]
  for: [c, cpp, objc, elf]
  attack: T1552.001

traits:
  - id: native-master-passwd-read
    desc: Native reads master.passwd
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/master.passwd
    unless:
      - id: well-known/app/john-the-ripper::john-source-context
      - id: well-known/app/john-the-ripper::repository-path-identity

  - id: native-secret-dotfile-netrc
    desc: Native references .netrc credential file
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '\.netrc\b'

  - id: native-secret-dotfile-pgpass
    desc: Native references .pgpass credential file
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '\.pgpass\b'

  - id: native-secret-dotfile-mycnf
    desc: Native references .my.cnf credential file
    crit: component
    conf: 0.6
    if:
      type: text
      regex: '\.my\.cnf\b'

composite_rules:
  - id: native-user-secret-dotfiles
    desc: Native reads secret dotfiles
    crit: suspicious
    conf: 0.92
    any:
      - id: native-secret-dotfile-netrc
      - id: native-secret-dotfile-pgpass
      - id: native-secret-dotfile-mycnf
    needs: 2
    unless:
      - id: well-known/app/terraform::terraform-core-binary
      - id: well-known/app/opentofu::opentofu-core-binary

  - id: native-bsd-credential-sweep
    desc: Native BSD credential sweep
    crit: hostile
    conf: 0.98
    all:
      - id: native-master-passwd-read
    any:
      - id: native-user-secret-dotfiles
      - id: objectives/credential-access/ssh/key::native-ssh-private-key-paths
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
