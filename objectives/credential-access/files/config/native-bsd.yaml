defaults:
  platforms: [freebsd, netbsd, unix]
  for: [c, cpp, objc, elf]
  attack: T1552.001

traits:
  - id: native-master-passwd-read
    desc: Native reads master.passwd
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/master.passwd

  - id: native-user-secret-dotfiles
    desc: Native reads secret dotfiles
    crit: suspicious
    conf: 0.92
    count_min: 2
    if:
      type: text
      regex: '\.(netrc|pgpass|my\.cnf)'

  - id: native-ssh-private-key-paths
    desc: Native SSH private key paths
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'id_(rsa|ed25519)'

composite_rules:
  - id: native-bsd-credential-sweep
    desc: Native BSD credential sweep
    crit: hostile
    conf: 0.98
    all:
      - id: native-master-passwd-read
    any:
      - id: native-user-secret-dotfiles
      - id: native-ssh-private-key-paths
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-authorized-keys
