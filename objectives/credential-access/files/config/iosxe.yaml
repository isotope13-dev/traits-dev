defaults:
  platforms: [iosxe, appliance, windows]
  for: [csharp, ruby, kotlin, java, jar, class, java_class, batch]
  attack: T1552.001

traits:
  - id: iosxe-running-config-read
    desc: IOS-XE running config read
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: '(show running-config|/running-config\b)'

  - id: iosxe-running-config-secret-filter
    desc: Filters running-config for secrets
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'running-config.{0,80}(password|secret|key)'

  - id: iosxe-include-credential-filter
    desc: Greps config for credential lines
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: include password|secret|key|credential

  - id: iosxe-crypto-key-read
    desc: Dumps device RSA public key
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: show crypto key mypubkey rsa

  - id: iosxe-credential-api-path
    desc: IOS-XE credential API path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /api/iosxe-credentials

  - id: jvm-iosxe-running-config-const
    desc: Embedded show running-config bytes
    crit: suspicious
    conf: 0.93
    for: [jar, class, java_class, zip]
    if:
      type: hex
      pattern: 73 68 6F 77 20 72 75 6E 6E 69 6E 67 2D 63 6F 6E 66 69 67

  - id: jvm-iosxe-credential-filter-const
    desc: Embedded credential-filter bytes
    crit: suspicious
    conf: 0.93
    for: [jar, class, java_class, zip]
    if:
      type: hex
      pattern: 69 6E 63 6C 75 64 65 20 70 61 73 73 77 6F 72 64 7C 73 65 63 72 65 74 7C 6B 65 79 7C 63 72 65 64 65 6E 74 69 61 6C

composite_rules:
  - id: iosxe-config-credential-harvest
    desc: IOS-XE config credential harvest
    crit: hostile
    conf: 0.97
    any:
      - id: iosxe-running-config-secret-filter
      - id: iosxe-include-credential-filter
      - id: iosxe-crypto-key-read
      - id: iosxe-credential-api-path
    all:
      - id: iosxe-running-config-read

  - id: jvm-iosxe-config-credential-harvest
    desc: JVM IOS-XE config credential harvest
    crit: hostile
    conf: 0.97
    for: [jar, class, java_class, zip]
    all:
      - id: jvm-iosxe-running-config-const
      - id: jvm-iosxe-credential-filter-const
