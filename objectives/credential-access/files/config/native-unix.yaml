defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1552.001

traits:
  - id: native-unix-secret-path-bundle
    desc: Native Unix secret path bundle
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: '/etc/(passwd|shadow)[\s\S]{0,700}/root/\.ssh/id_(rsa|ed25519)'
