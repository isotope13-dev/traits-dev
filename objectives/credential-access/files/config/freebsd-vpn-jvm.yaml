defaults:
  platforms: [freebsd, unix]
  for: [java, class]
  attack: T1552.001

traits:
  - id: freebsd-vpn-config-paths-jvm
    desc: JVM FreeBSD VPN config paths
    crit: suspicious
    conf: 0.92
    count_min: 3
    if:
      type: text
      regex: '/(etc|usr/local/etc)/(openvpn|ipsec|ppp)'

  - id: openvpn-auth-user-pass-jvm
    desc: JVM OpenVPN auth-user-pass marker
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: auth-user-pass

composite_rules:
  - id: jvm-freebsd-vpn-credential-sweep
    desc: JVM sweeps FreeBSD VPN credentials
    crit: hostile
    conf: 0.98
    all:
      - id: freebsd-vpn-config-paths-jvm
    any:
      - id: openvpn-auth-user-pass-jvm
      - id: objectives/exfiltration/http/upload::jvm-sensitive-http-post-exfil
      - id: objectives/exfiltration/http/upload::jvm-bytecode-sensitive-http-post-exfil
