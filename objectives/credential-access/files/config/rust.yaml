defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1552.001
traits:
  - id: rust-dotenv-file-target
    desc: Rust targets dotenv files
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '".env"'
  - id: rust-document-secret-extensions
    desc: Rust document secret extensions
    crit: component
    conf: 0.85
    if:
      type: text
      substr: 'const DOC_EXTENSIONS'
composite_rules:
  - id: rust-credential-file-scanner
    desc: Rust credential file scanner
    crit: suspicious
    conf: 0.95
    all:
      - id: rust-dotenv-file-target
      - id: rust-document-secret-extensions
    any:
      - id: micro-behaviors/data/text/crypto::metamask-word
      - id: micro-behaviors/data/text/crypto::mnemonic-word
      - id: micro-behaviors/data/text/keywords/wallet::rust-wallet-keyword-privatekey
      - id: micro-behaviors/data/text/keywords/wallet::rust-wallet-keyword-trustwallet
