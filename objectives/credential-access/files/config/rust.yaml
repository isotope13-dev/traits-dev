defaults:
  platforms: [windows, unix]
  for: [rust]
  attack: T1552.001
traits:
  - id: rust-dotenv-file-target
    desc: Rust targets dotenv files
    crit: component
    conf: 0.9
    if:
      type: text
      substr: '".env"'
  - id: rust-wallet-keyword-metamask
    desc: Rust wallet keyword MetaMask
    crit: component
    conf: 0.85
    if:
      type: text
      word: metamask
  - id: rust-wallet-keyword-mnemonic
    desc: Rust wallet keyword mnemonic
    crit: component
    conf: 0.85
    if:
      type: text
      word: mnemonic
  - id: rust-wallet-keyword-privatekey
    desc: Rust private key keyword
    crit: component
    conf: 0.85
    if:
      type: text
      word: privatekey
  - id: rust-wallet-keyword-trustwallet
    desc: Rust TrustWallet keyword
    crit: component
    conf: 0.85
    if:
      type: text
      word: trustwallet
  - id: rust-document-secret-extensions
    desc: Rust document secret extensions
    crit: component
    conf: 0.85
    if:
      type: text
      substr: 'const DOC_EXTENSIONS'
composite_rules:
  - id: rust-credential-file-scanner
    desc: Rust credential file scanner
    crit: suspicious
    conf: 0.95
    all:
      - id: rust-dotenv-file-target
      - id: rust-document-secret-extensions
    any:
      - id: rust-wallet-keyword-metamask
      - id: rust-wallet-keyword-mnemonic
      - id: rust-wallet-keyword-privatekey
      - id: rust-wallet-keyword-trustwallet
