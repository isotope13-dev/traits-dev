defaults:
  platforms: [routeros, appliance, unix]
  for: [c, cpp, objc, rust, go, elf]
  attack: T1552.001

traits:
  - id: routeros-runtime-secret-paths
    desc: RouterOS runtime secret paths
    crit: suspicious
    conf: 0.94
    count_min: 2
    if:
      type: text
      regex: '/var/run/secrets/routeros/(api-token|keys)\b'
