defaults:
  platforms: [unix, windows]
  for: [source, scripts]
  attack: T1552.001
  mbc: B0029

traits:
- id: package-registry-token-paths
  desc: Package registry credential paths
  crit: notable
  conf: 0.9
  if:
    type: text
    regex: '(\.npmrc|\.pypirc|\.netrc)\b'
  unless:
  - type: text
    substr: "UsageLine:"  # Go toolchain help documentation
  - id: metadata/library/runtime::acquire-vscode-api
  - id: micro-behaviors/process/create/shell/host/
  - id: metadata/library/structure/
  - id: micro-behaviors/os/env/vars/access/
  - type: text
    substr: "SCM-context filter"
- id: node-project-secret-file-targets
  desc: "Project credential & manifest file targets"
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  count_min: 3
  if:
    type: string_literal
    regex: "^(\\.env|package\\.json|package-lock\\.json)$"
  unless:
  - id: well-known/lib/json-ts/
  - id: micro-behaviors/process/create/shell/host/
  - id: metadata/library/runtime::acquire-vscode-api
  - id: well-known/tool/detection/sast::vscode-marketplace-publish-script
  - id: well-known/tool/detection/sast/
- id: source-control-token-paths
  desc: Source control credential paths
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(\.git-credentials|\.config/gh/hosts\.yml|\.gitconfig)\b'
  unless:
  - id: metadata/library/structure/
- id: cloud-orchestration-token-paths--rx-1
  desc: AWS or Kubernetes credential path marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(\.aws/(credentials|config)|\.kube/config)\b'
  count_max: 1009229
- id: cloud-orchestration-token-paths--rx-2
  desc: Docker or Vault credential path marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(\.docker/config\.json|\.vault-token)\b'
  count_max: 1009230
- id: cloud-orchestration-token-paths--rx-3
  desc: Terraform credentials path marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(\.terraform\.d/credentials\.tfrc\.json)\b'
  count_max: 1009231
- id: login-secret-file-paths--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(\.ssh/id_(rsa|dsa)|\.ssh/known_hosts)\b'
  count_max: 1009232
- id: login-secret-file-paths--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(\.ssh/id_(ecdsa|ed25519)|\.ssh/known_hosts)\b'
  count_max: 1009233
- id: login-secret-file-paths--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(\.ssh/authorized_keys|/etc/shadow)\b'
  count_max: 1009234
- id: login-secret-file-paths--rx-7
  desc: Shell history file path marker
  crit: component
  conf: 0.9
  if:
    type: text
    regex: '(\.bash_history|\.zsh_history)\b'
  count_max: 1009235
- id: credential-path-table--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 5
  if:
    type: text
    regex: '(\.npmrc|\.pypirc)'
  count_max: 1009236
- id: credential-path-table--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 5
  if:
    type: text
    regex: '(\.git-credentials|\.config/gh/hosts\.yml)'
  count_max: 1009237
- id: credential-path-table--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 5
  if:
    type: text
    regex: '(\.aws/(credentials|config)|\.kube/config)'
  count_max: 1009238
- id: credential-path-table--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 5
  if:
    type: text
    regex: '(\.docker/config\.json|\.vault-token)'
  count_max: 1009239
- id: credential-path-table--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 5
  if:
    type: text
    regex: '(\.terraform\.d/credentials\.tfrc\.json|\.ssh/id_(rsa|dsa))'
  count_max: 1009240
- id: credential-path-table--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 5
  if:
    type: text
    regex: '(\.terraform\.d/credentials\.tfrc\.json|\.ssh/id_(ecdsa|ed25519))'
  count_max: 1009241
- id: credential-path-table--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.9
  count_min: 5
  if:
    type: text
    regex: '(/etc/shadow)'
  count_max: 1009242
- id: clipboard-harvest-tool
  desc: X11 clipboard harvest command
  crit: component
  conf: 0.84
  platforms: [linux]
  if:
    type: text
    regex: '\b(xclip|xsel)\b[\s\S]{0,120}(-selection\s+clipboard|--clipboard|-o\b)'

composite_rules:
- id: npm-credential-http-marker
  desc: NPM credential path with HTTP
  crit: notable
  conf: 0.95
  for: [javascript, typescript]
  any:
  - id: objectives/supply-chain/credential-theft/registry::js-homedir-cred
  - id: objectives/supply-chain/credential-theft/registry::js-env-home-cred
  all:
  - id: objectives/supply-chain/credential-theft/registry::cred-to-http-js
  unless:
  - id: well-known/lib/aws-sdk-ruby
  - id: well-known/app/alist::release-path
  - id: micro-behaviors/process/create/shell/host/
  - id: well-known/lib/urllib3::urllib3-name
- id: developer-credential-sweep
  desc: Sweeps developer and cloud credentials
  crit: hostile
  conf: 0.98
  near_bytes: 32768
  all:
  - id: credential-path-table
  needs: 3
  any:
  - id: package-registry-token-paths
  - id: source-control-token-paths
  - id: cloud-orchestration-token-paths
  - id: login-secret-file-paths
  - id: clipboard-harvest-tool
  unless:
  - id: micro-behaviors/process/create/shell/host/
  - id: metadata/package/testing/
  - id: metadata/library/sandbox-runtime::config-validation
  - id: metadata/library/runtime::acquire-vscode-api
  - id: well-known/tool/detection/
  # js-any-bundle-output subsumes js-large-module-bundle and the minified
  # webview-bundle forms, collapsing two JS-bundle legs into one umbrella.
  - id: metadata/library/structure/
  - id: well-known/tool/detection/agent-sentry/
  - id: well-known/tool/development/aube::aube-lifecycle-scanner-source
- id: cloud-orchestration-token-paths
  desc: Cloud and orchestration credential paths
  crit: suspicious
  conf: 0.9
  any:
  - id: cloud-orchestration-token-paths--rx-1
  - id: cloud-orchestration-token-paths--rx-2
  - id: cloud-orchestration-token-paths--rx-3
  unless:
  - id: well-known/tool/development/runspec-console/
  - id: well-known/app/moodle-stubs/
  - id: well-known/app/moodle-stubs::moodle-stubs-archive-name
- id: login-secret-file-paths
  desc: Login secret file paths
  crit: component
  conf: 0.9
  any:
  - id: login-secret-file-paths--rx-4
  - id: login-secret-file-paths--rx-5
  - id: login-secret-file-paths--rx-6
  - id: login-secret-file-paths--rx-7
- id: credential-path-table
  desc: Credential path table in source
  crit: component
  conf: 0.9
  any:
  - id: credential-path-table--rx-8
  - id: credential-path-table--rx-9
  - id: credential-path-table--rx-10
  - id: credential-path-table--rx-11
  - id: credential-path-table--rx-12
  - id: credential-path-table--rx-13
  - id: credential-path-table--rx-14
