defaults:
  platforms: [linux, macos, windows]
  for: [c, cpp, rust, go, javascript, typescript, python, shell]
  attack: T1552.001
  mbc: B0029

traits:
  - id: package-registry-token-paths
    desc: Package registry credential paths
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(\.npmrc|\.pypirc|\.netrc)\b'
  - id: source-control-token-paths
    desc: Source control credential paths
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(\.git-credentials|\.config/gh/hosts\.yml|\.gitconfig)\b'
  - id: cloud-orchestration-token-paths
    desc: Cloud and orchestration credential paths
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(\.aws/(credentials|config)|\.kube/config|\.docker/config\.json|\.vault-token|\.terraform\.d/credentials\.tfrc\.json)\b'
  - id: login-secret-file-paths
    desc: Login secret file paths
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '(\.ssh/id_(rsa|dsa|ecdsa|ed25519)|\.ssh/known_hosts|\.ssh/authorized_keys|/etc/shadow|\.bash_history|\.zsh_history)\b'
  - id: credential-path-table
    desc: Credential path table in source
    crit: suspicious
    conf: 0.9
    count_min: 5
    if:
      type: text
      regex: '(\.npmrc|\.pypirc|\.git-credentials|\.config/gh/hosts\.yml|\.aws/(credentials|config)|\.kube/config|\.docker/config\.json|\.vault-token|\.terraform\.d/credentials\.tfrc\.json|\.ssh/id_(rsa|dsa|ecdsa|ed25519)|/etc/shadow)'
  - id: clipboard-harvest-tool
    desc: X11 clipboard harvest command
    crit: suspicious
    conf: 0.84
    platforms: [linux]
    if:
      type: text
      regex: '\b(xclip|xsel)\b[\s\S]{0,120}(-selection\s+clipboard|--clipboard|-o\b)'

composite_rules:
  - id: developer-credential-sweep
    desc: Sweeps developer and cloud credentials
    crit: hostile
    conf: 0.98
    all:
      - id: credential-path-table
    needs: 3
    any:
      - id: package-registry-token-paths
      - id: source-control-token-paths
      - id: cloud-orchestration-token-paths
      - id: login-secret-file-paths
      - id: clipboard-harvest-tool
