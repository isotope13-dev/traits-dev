defaults:
  platforms: [freebsd, netbsd, unix]
  for: [objc]
  attack: T1552.001

traits:
- id: objc-bsd-master-passwd-path
  desc: ObjC references BSD master.passwd
  crit: suspicious
  conf: 0.94
  if:
    type: text
    regex: '(/etc/master\.passwd|_PATH_MASTERPASSWD)'

- id: objc-browser-credential-paths
  desc: ObjC references browser credential paths
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(Login Data|logins\.json|key4\.db)'

- id: objc-keychain-gpg-paths
  desc: ObjC references keychain or GPG paths
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(Library/Keychains|secring\.gpg|SSH_AUTH_SOCK)'

- id: objc-bsd-config-paths
  desc: ObjC references BSD config paths
  crit: suspicious
  conf: 0.9
  if:
    type: text
    regex: '(/etc/rc\.conf|/boot/loader\.conf|/var/cron/tabs/root)'

- id: objc-ssh-key-paths--id-rsa
  desc: ObjC references SSH key paths (id_rsa)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    word: id_rsa
- id: objc-ssh-key-paths--id-ed25519
  desc: ObjC references SSH key paths (id_ed25519)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    word: id_ed25519
- id: objc-ssh-key-paths--authorized-keys
  desc: ObjC references SSH key paths (authorized_keys)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    word: authorized_keys
- id: objc-ssh-key-paths--known-hosts
  desc: ObjC references SSH key paths (known_hosts)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    word: known_hosts
composite_rules:
- id: objc-ssh-key-paths
  desc: ObjC references SSH key paths
  crit: suspicious
  conf: 0.92
  any:
  - id: objc-ssh-key-paths--id-rsa
  - id: objc-ssh-key-paths--id-ed25519
  - id: objc-ssh-key-paths--authorized-keys
  - id: objc-ssh-key-paths--known-hosts
- id: objc-bsd-credential-sweep
  desc: ObjC sweeps BSD credentials
  crit: hostile
  conf: 0.98
  all:
  - id: objc-bsd-master-passwd-path
  any:
  - id: objc-ssh-key-paths
  - id: objc-browser-credential-paths
  - id: objc-keychain-gpg-paths
  - id: objc-bsd-config-paths
  - id: micro-behaviors/os/privilege/paths::etc-shadow
  needs: 2
- id: objc-browser-keychain-http-stealer
  desc: ObjC browser keychain HTTP stealer
  crit: hostile
  conf: 0.98
  platforms: [macos]
  attack: T1555.003
  for: [objc, archives]
  scope: archive
  all:
  - id: objc-browser-credential-paths
  - id: objc-keychain-gpg-paths
  any:
  - id: micro-behaviors/communications/http/lib/nsurlsession::nsurlsession-post
  - id: micro-behaviors/communications/http/lib/nsurlsession::nsurlrequest-init
