defaults:
  platforms: [esxi, unix, windows]
  for: [c, cpp, elf, lua, perl, powershell, swift]
  attack: T1552

traits:
  - id: esxi-rui-private-key-path
    desc: ESXi rui private key path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /etc/vmware/ssl/rui.key

  - id: esxi-rui-cert-path
    desc: ESXi rui certificate path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /etc/vmware/ssl/rui.crt

  - id: esxi-vcdb-credential-path
    desc: ESXi VCDB credential path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/(opt/)?vmware[^"''\s]{0,80}vcdb-credentials\.xml'

  - id: esxi-localaccounts-path
    desc: ESXi local accounts path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/localaccounts/localaccounts

  - id: esxi-vpxa-config-path
    desc: ESXi vpxa config path
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: /etc/vmware/vpxa/vpxa.cfg

  - id: powershell-esxi-visorfs-get
    desc: PowerShell ESXi visorfs get
    crit: suspicious
    conf: 0.92
    for: [powershell]
    platforms: [windows]
    if:
      type: text
      regex: 'system\.visorfs\.get\.Invoke[\s\S]{0,160}/etc/(shadow|pam\.d/)'

composite_rules:
  - id: esxi-credential-config-access
    desc: ESXi credential config access
    crit: hostile
    conf: 0.97
    needs: 2
    any:
      - id: esxi-rui-private-key-path
      - id: esxi-vcdb-credential-path
      - id: esxi-localaccounts-path
      - id: esxi-vpxa-config-path
      - id: micro-behaviors/os/privilege/paths::etc-shadow
      - id: micro-behaviors/fs/path/sensitive/credentials::ssh-credentials

  - id: powershell-esxi-credential-read
    desc: PowerShell ESXi credential read
    crit: hostile
    conf: 0.97
    for: [powershell]
    platforms: [windows]
    all:
      - id: powershell-esxi-visorfs-get
    any:
      - id: esxi-credential-config-access
      - id: micro-behaviors/fs/path/config/accounts::etc-passwd
