# Go programs reading multiple sensitive credential files.
# When a single Go program assembles paths under the user's home directory
# and reads .npmrc / .netrc / .ssh keys / cloud creds, it is harvesting
# developer credentials regardless of how the path strings are obfuscated.
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1552.001
  mbc: B0029
traits:
- id: home-dir-read--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'os\.ReadFile\([^)]{0,80}HomeDir'
  count_max: 1009220
- id: home-dir-read--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'filepath\.Join\([^)]{0,40}HomeDir[^)]{0,80}\)\s*\)'
  count_max: 1009221
- id: home-dir-read--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: 'usr\.HomeDir[^)]{0,80}os\.ReadFile'
  count_max: 1009222
- id: home-dir-readfile-helper
  desc: Helper reading homedir files repeatedly
  crit: component
  conf: 0.85
  count_min: 4
  if:
    type: text
    regex: '\b\w*[Rr]ead[Ff]ile\s*\([^)]{0,60}\)'
- id: npmrc-fragment
  desc: .npmrc filename fragment
  crit: suspicious
  conf: 0.85
  if:
    type: text
    word: npmrc
- id: netrc-fragment
  desc: .netrc filename fragment
  crit: suspicious
  conf: 0.85
  if:
    type: text
    word: netrc
  unless:
  - type: text
    substr: "UsageLine:"  # Go toolchain help documentation
- id: kube-fragment
  desc: kube config fragment
  crit: component
  conf: 0.85
  if:
    type: text
    word: kube
  unless:
  # Kubernetes source code is full of "kube" references that have
  # nothing to do with reading ~/.kube/config credential files.
  - type: text
    regex: 'k8s\.io/|kubernetes/|k8s\.io/client-go|"k8s\.'
  - id: metadata/package/testing/harness/runtime::is-test
composite_rules:
- id: go-multi-credential-file-harvest
  desc: Go program harvests multiple developer credential files
  crit: hostile
  conf: 0.96
  all:
  - id: home-dir-readfile-helper
  any:
  - id: micro-behaviors/fs/path/sensitive/credentials
  - id: npmrc-fragment
  - id: netrc-fragment
  - id: kube-fragment
  needs: 2
- id: go-homedir-credential-reader
  desc: Go reads sensitive files joined to user HomeDir
  crit: suspicious
  conf: 0.92
  all:
  - id: home-dir-read
  - id: micro-behaviors/fs/file/read::os-readfile
- id: home-dir-read
  desc: Reads file under user home directory
  crit: suspicious
  conf: 0.85
  any:
  - id: home-dir-read--rx-1
  - id: home-dir-read--rx-2
  - id: home-dir-read--rx-3
