# Detection for npm/JavaScript packages that ship secret-shaped material
# (private keys, certificate keys, PEM bundles) inside the published tarball
# and load it via a __dirname-relative path. The result is that every
# consumer who installs the package gets the same "private" key — the
# secret becomes shared the moment it is published. This is a generic
# supply-chain hygiene failure, not malicious behavior, but it deserves
# a notable signal because:
#   - Defaults pointing at bundled keys turn the package into a shared
#     pre-shared-secret distribution channel.
#   - It indicates the maintainer ships private/* files in the tarball,
#     which often also leaks unrelated material that .npmignore missed.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1552.004
traits:
  - id: private-key-suffix
    desc: Filename suffix matches private-key extension
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\.(key|pem|priv)\b'
  - id: keystore-suffix
    desc: Filename suffix matches keystore extension
    crit: component
    conf: 0.8
    if:
      type: text
      regex: '\.(p12|pfx|p8)\b'
  - id: private-keys-dir-segment
    desc: Path component names private dir
    crit: component
    conf: 0.7
    if:
      type: text
      regex: '/(private|secret|secrets|keys)/'
composite_rules:
  - id: package-bundled-private-key-strong
    desc: Code reads a __dirname-relative private-key-shaped file
    crit: notable
    conf: 0.94
    mbc: B0030
    all:
      - id: micro-behaviors/fs/path/construct::dirname-template-ref
      - id: micro-behaviors/fs/file/read::read-node
    any:
      - id: private-key-suffix
      - id: keystore-suffix
      - id: private-keys-dir-segment
    needs: 1
    unless:
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
