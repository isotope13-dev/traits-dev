defaults:
  for:
  - elf
  platforms:
  - linux
  attack: T1556.003
traits:
- id: tmp-hidden-file-dup--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(/tmp/|/var/tmp/)\.[A-Za-z0-9._-]*(pass|cred)[A-Za-z0-9._-]*\b'
  count_max: 1013884
- id: tmp-hidden-file-dup--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(/tmp/|/var/tmp/)\.[A-Za-z0-9._-]*(login|keylog)[A-Za-z0-9._-]*\b'
  count_max: 1013885
- id: tmp-hidden-file-dup--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  if:
    type: text
    regex: '(/tmp/|/var/tmp/)\.[A-Za-z0-9._-]*(keystroke|pam)[A-Za-z0-9._-]*\b'
  count_max: 1013886
- id: var-log-hidden-file
  desc: Hidden file in /var/log
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: /var/log/\.[a-z]
composite_rules:
- id: pam-with-curl
  desc: PAM module with HTTP client capability
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/os/pam/auth::module
  any:
  - id: metadata/import/curl_easy_perform
  - id: metadata/import/curl_easy_init
  - id: micro-behaviors/dylib/library::libcurl-ref
- id: pam-with-socket
  desc: PAM module with raw socket capability
  crit: suspicious
  conf: 0.85
  all:
  - id: micro-behaviors/os/pam/auth::module
  any:
  - id: metadata/import/socket
  - id: metadata/import/connect
  - id: metadata/import/send
  - id: metadata/import/sendto
  needs: 2
- id: hidden-log-paths
  desc: Hidden log file paths
  crit: suspicious
  conf: 0.85
  any:
  - id: objectives/credential-access/pam/intercept::tmp-hidden-file-dup
  - id: var-log-hidden-file
- id: pam-credential-logger
  desc: PAM module logging credentials to file
  crit: suspicious
  conf: 0.9
  all:
  - id: objectives/credential-access/pam/intercept::interceptor
  any:
  - id: objectives/credential-access/pam/intercept::tmp-hidden-file-dup
  - id: var-log-hidden-file
- id: pam-credential-stealer
  desc: PAM module steals and exfiltrates credentials
  crit: hostile
  conf: 0.95
  mbc: E1003
  all:
  - id: objectives/credential-access/pam/intercept::interceptor
  - id: pam-with-curl
  - id: pam-credential-logger
- id: tmp-hidden-file-dup
  desc: Hidden credential log path
  crit: suspicious
  conf: 0.85
  any:
  - id: tmp-hidden-file-dup--rx-1
  - id: tmp-hidden-file-dup--rx-2
  - id: tmp-hidden-file-dup--rx-3
