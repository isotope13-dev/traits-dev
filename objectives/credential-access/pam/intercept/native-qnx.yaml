defaults:
  platforms: [qnx, unix]
  for: [c, cpp, elf]
  attack: T1556.003

traits:
  - id: qnx-native-pam-login-root
    desc: QNX native PAM login root
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'pam_start\("login",\s*"root"'

  - id: qnx-native-shadow-hash-print
    desc: QNX native shadow hash print
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: user=%s hash=%s

  - id: qnx-native-env-credential-loop
    desc: QNX native env credential loop
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: 'PASS[\s\S]{0,120}TOKEN[\s\S]{0,120}SECRET[\s\S]{0,120}CRED'

composite_rules:
  - id: qnx-native-pam-shadow-harvest
    desc: QNX native PAM shadow harvest
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-pam-login-root
      - id: qnx-native-shadow-hash-print

  - id: qnx-native-pam-env-harvest
    desc: QNX native PAM env harvest
    crit: hostile
    conf: 0.98
    all:
      - id: qnx-native-pam-login-root
      - id: qnx-native-env-credential-loop
