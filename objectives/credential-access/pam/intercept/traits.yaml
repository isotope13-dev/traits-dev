defaults:
  platforms:
    - linux
    - macos
  attack: T1556.003
  for:
    - elf
traits:
  - id: libpam-so-versioned
    desc: libpam.so.0 versioned library
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: libpam\.so\.\d+
  - id: pam-set-item
    desc: pam_set_item function
    crit: notable
    conf: 0.75
    if:
      type: symbol
      exact: pam_set_item
  - id: pam-get-authtok
    desc: pam_get_authtok function
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: pam_get_authtok
  - id: pam-authtok-constant
    desc: PAM_AUTHTOK constant
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: PAM_AUTHTOK
  - id: pam-open-session
    desc: pam_open_session function
    crit: notable
    conf: 0.7
    if:
      type: symbol
      exact: pam_open_session
  - id: libpam-basename
    desc: Filename is libpam.so
    crit: component
    if:
      type: basename
      regex: ^libpam\.so
  - id: sshd-session-basename
    desc: Filename is sshd-session
    crit: component
    if:
      type: basename
      exact: sshd-session
  - id: pam-d-write
    desc: PAM config directory reference with write context
    crit: suspicious
    conf: 0.85
    for: [c, macho, elf, shell, scripts]
    if:
      type: text
      regex: '(^|[^A-Za-z0-9_.-])/etc/pam\.d/[a-z]{1,20}'
  - id: pam-optional-inject
    desc: PAM optional module injection line
    crit: suspicious
    conf: 0.9
    for: [elf, macho, c, cpp, shell, scripts]
    if:
      type: text
      regex: (auth|account)\s+optional\s+[^\s]{5,60}\.so
composite_rules:
  - id: pam-library
    desc: PAM library references
    crit: notable
    any:
      - id: micro-behaviors/os/pam/auth::libpam-so-string
      - id: libpam-so-versioned
  - id: pam-token-access
    desc: PAM token access functions
    crit: notable
    any:
      - id: micro-behaviors/os/pam/auth::pam-get-item
      - id: pam-set-item
      - id: pam-get-authtok
      - id: pam-authtok-constant
  - id: pam-auth-functions
    desc: PAM authentication functions
    crit: notable
    any:
      - id: micro-behaviors/os/pam/auth::pam-authenticate
      - id: pam-open-session
      - id: micro-behaviors/os/pam/auth::pam-acct-mgmt
      - id: micro-behaviors/os/pam/auth::pam-setcred-symbol
  - id: interceptor
    desc: PAM authentication token access
    crit: suspicious
    conf: 0.8
    for: [so, dylib, macho, c, cpp]
    all:
      - id: pam-library
    any:
      # Real PAM interception generally touches credential-bearing token APIs
      # or multiple auth/session control points, not just pam_get_item().
      - id: pam-set-item
      - id: pam-get-authtok
      - id: pam-authtok-constant
      - id: micro-behaviors/os/pam/auth::pam-authenticate
      - id: pam-open-session
      - id: micro-behaviors/os/pam/auth::pam-acct-mgmt
      - id: micro-behaviors/os/pam/auth::pam-setcred-symbol
    needs: 2
    unless:
      - id: sshd-session-basename
      - id: libpam-basename
      - id: micro-behaviors/os/pam/auth::pam-module-api
    downgrade:
      any:
        - id: metadata/vendor/netbsd::base-system-artifact
  - id: pam-config-injector
    desc: Binary that injects a PAM module into /etc/pam.d/ config
    crit: suspicious
    conf: 0.9
    for: [c, macho, elf, scripts]
    all:
      - id: pam-d-write
    any:
      - id: pam-optional-inject
      - id: micro-behaviors/os/pam/auth::pam-optional-control
  - id: pam-module-unix
    desc: Unix PAM module (exports pam_sm_* functions)
    crit: notable
    conf: 0.9
    for: [macho, dylib, so, c, cpp]
    all:
      - id: micro-behaviors/os/pam/auth::pam-module-api
    any:
      - id: micro-behaviors/os/pam/auth::pam-get-user
      - id: micro-behaviors/os/pam/auth::pam-get-item
      - id: micro-behaviors/os/pam/auth::pam-ignore-return
