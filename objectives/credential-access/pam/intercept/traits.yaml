defaults:
  platforms:
  - linux
  - macos
  attack: T1556.003
  for:
  - elf
traits:
- id: libpam-so-versioned
  desc: libpam.so.0 versioned library
  crit: component
  conf: 0.7
  if:
    type: text
    regex: libpam\.so\.\d+
- id: pam-set-item
  desc: pam_set_item function
  crit: component
  conf: 0.75
  if:
    type: symbol
    exact: pam_set_item
- id: pam-get-authtok
  desc: pam_get_authtok function
  crit: suspicious
  conf: 0.8
  if:
    type: symbol
    exact: pam_get_authtok
- id: pam-authtok-constant
  desc: PAM_AUTHTOK constant
  crit: suspicious
  conf: 0.75
  for: [elf, so, c, cpp]
  if:
    type: text
    substr: PAM_AUTHTOK
- id: pam-get-item-source
  desc: pam_get_item token access
  crit: suspicious
  conf: 0.84
  for: [c, cpp]
  if:
    type: symbol
    exact: pam_get_item
- id: pam-open-session
  desc: pam_open_session function
  crit: component
  conf: 0.7
  if:
    type: symbol
    exact: pam_open_session
- id: libpam-basename
  desc: Filename is libpam.so
  crit: component
  if:
    type: basename
    regex: ^libpam\.so
- id: sshd-session-basename
  desc: Filename is sshd-session
  crit: component
  if:
    type: basename
    exact: sshd-session
- id: pam-d-write--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '(>>?|tee\s+-a?).{0,120}/etc/pam\.d/[a-z]{1,20}'
- id: pam-d-write--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '(sed\s+-i|perl\s+-pi).{0,120}/etc/pam\.d/[a-z]{1,20}'
- id: pam-d-write--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '(install\s+-m|cp\s+).{0,120}/etc/pam\.d/[a-z]{1,20}'
- id: pam-d-write--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '(mv\s+|fopen\s*\().{0,120}/etc/pam\.d/[a-z]{1,20}'
- id: pam-d-write--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '(open\s*\(|creat\s*\().{0,120}/etc/pam\.d/[a-z]{1,20}'
- id: pam-d-write--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '/etc/pam\.d/[a-z]{1,20}.{0,120}(>>?|auth\s+optional\s+\S+\.so)'
- id: pam-d-write--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '/etc/pam\.d/[a-z]{1,20}.{0,120}(account\s+optional\s+\S+\.so)'
- id: pam-optional-inject
  desc: PAM optional module injection line
  crit: suspicious
  conf: 0.9
  for: [elf, macho, c, cpp, shell, scripts]
  if:
    type: text
    regex: (auth|account)\s+optional\s+[^\s]{5,60}\.so
- id: pam-credential-log-path
  desc: Hidden PAM credential log path
  crit: suspicious
  conf: 0.95
  for: [elf, so, c, cpp, shell, scripts]
  if:
    type: text
    regex: '/(?:tmp|var/log)/\.(?:pam_cache|[A-Za-z0-9_-]{2,32}-unix)\b'
- id: compile-pam-shared-module--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [elf, c, cpp, shell, scripts]
  if:
    type: text
    regex: '\bgcc\b[\s\S]{0,260}-shared[\s\S]{0,160}-fPIC[\s\S]{0,260}-lpam'
- id: compile-pam-shared-module--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [elf, c, cpp, shell, scripts]
  if:
    type: text
    regex: '/usr/lib/\.[A-Za-z0-9._-]{1,80}\.so[\s\S]{0,260}-lpam'
- id: pam-source-tempfile
  desc: Temporary PAM module source file
  crit: suspicious
  conf: 0.88
  for: [elf, c, cpp, shell, scripts]
  if:
    type: text
    regex: '/tmp/\.(?:pam_src|pcs)_[A-Za-z0-9_*-]{4,48}'
composite_rules:
- id: pam-library
  desc: PAM library references
  crit: notable
  any:
  - id: micro-behaviors/os/pam/auth::libpam-so-string
  - id: libpam-so-versioned
- id: pam-token-access
  desc: PAM token access functions
  crit: suspicious
  for: [elf, so, c, cpp]
  any:
  - id: micro-behaviors/os/pam/auth::pam-get-item
  - id: pam-get-item-source
  - id: pam-set-item
  - id: pam-get-authtok
  - id: pam-authtok-constant
- id: pam-auth-functions
  desc: PAM authentication functions
  crit: suspicious
  any:
  - id: micro-behaviors/os/pam/auth::pam-authenticate
  - id: pam-open-session
  - id: micro-behaviors/os/pam/auth::pam-acct-mgmt
  - id: micro-behaviors/os/pam/auth::pam-setcred-symbol
- id: interceptor
  desc: PAM credential token access
  crit: suspicious
  conf: 0.8
  for: [so, dylib, macho, c, cpp]
  all:
  - id: pam-library
  any:
      # Real credential interception should touch credential-bearing token APIs.
      # Ordinary login tools commonly combine libpam, pam_authenticate,
      # pam_acct_mgmt, pam_open_session, pam_setcred, and pam_set_item.
  - id: pam-get-authtok
  - id: pam-authtok-constant
  unless:
  - id: sshd-session-basename
  - id: libpam-basename
  - id: micro-behaviors/os/pam/auth::pam-module-api
  downgrade:
    any:
    - id: metadata/binary/provenance::netbsd-base-system-artifact
- id: pam-config-injector
  desc: Binary that injects a PAM module into /etc/pam.d/ config
  crit: suspicious
  conf: 0.9
  for: [c, macho, elf, scripts]
  all:
  - id: pam-d-write
  any:
  - id: pam-optional-inject
  - id: micro-behaviors/os/pam/auth::pam-optional-control
- id: pam-module-unix
  desc: Unix PAM module (exports pam_sm_* functions)
  crit: suspicious
  conf: 0.9
  for: [macho, dylib, so, c, cpp]
  all:
  - id: micro-behaviors/os/pam/auth::pam-module-api
  any:
  - id: micro-behaviors/os/pam/auth::pam-get-user
  - id: micro-behaviors/os/pam/auth::pam-get-item
  - id: micro-behaviors/os/pam/auth::pam-ignore-return
- id: pam-token-log-stealer
  desc: PAM module captures authentication tokens
  crit: hostile
  conf: 0.98
  for: [elf, so, c, cpp]
  all:
  - id: pam-token-access
  - id: pam-credential-log-path
  any:
  - id: compile-pam-shared-module
  - id: pam-source-tempfile
  - id: pam-module-unix
- id: pam-d-write
  desc: PAM config directory reference with write context
  crit: notable
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  any:
  - id: pam-d-write--rx-1
  - id: pam-d-write--rx-2
  - id: pam-d-write--rx-3
  - id: pam-d-write--rx-4
  - id: pam-d-write--rx-5
  - id: pam-d-write--rx-6
  - id: pam-d-write--rx-7
  needs: 1
- id: compile-pam-shared-module
  desc: Compiles PAM shared object module
  crit: suspicious
  conf: 0.94
  for: [elf, c, cpp, shell, scripts]
  any:
  - id: compile-pam-shared-module--rx-8
  - id: compile-pam-shared-module--rx-9
  needs: 1
