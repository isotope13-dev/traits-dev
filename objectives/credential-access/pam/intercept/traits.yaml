defaults:
  platforms:
  - unix
  attack: T1556.003
  for:
  - elf
traits:
- id: libpam-so-versioned
  desc: libpam.so.0 versioned library
  crit: component
  conf: 0.7
  if:
    type: text
    regex: libpam\.so\.\d+
- id: pam-set-item
  desc: pam_set_item function
  crit: component
  conf: 0.75
  if:
    type: symbol
    exact: pam_set_item
- id: pam-get-authtok
  desc: pam_get_authtok function
  crit: notable
  conf: 0.8
  if:
    type: symbol
    exact: pam_get_authtok
- id: pam-authtok-constant
  desc: PAM_AUTHTOK constant
  crit: notable
  conf: 0.75
  for: [elf, so, c, cpp]
  if:
    type: text
    substr: PAM_AUTHTOK
- id: pam-get-item-source
  desc: pam_get_item token access
  crit: notable
  conf: 0.84
  for: [c, cpp]
  if:
    type: symbol
    exact: pam_get_item
- id: pam-open-session
  desc: pam_open_session function
  crit: component
  conf: 0.7
  if:
    type: symbol
    exact: pam_open_session
- id: libpam-basename
  desc: Filename is libpam.so
  crit: component
  if:
    type: path
    basename: true
    regex: ^libpam\.so(\.[0-9]+)?$
- id: sshd-session-basename
  desc: Filename is sshd-session
  crit: component
  if:
    type: path
    basename: true
    exact: sshd-session
- id: pam-client-tool-basename
  desc: PAM client tool basename
  crit: baseline
  conf: 0.94
  if:
    type: basename
    regex: '^(vlock|pppd|doas|rlogind|in\.rlogind|ftpd|in\.ftpd)$'
- id: pam-login-tool-basename
  desc: PAM login tool basename
  crit: baseline
  conf: 0.94
  if:
    type: basename
    regex: '^([rs]shd|chsh|login|su(do)?|runuser|passwd|gdm|sddm|lightdm)$'
- id: pam-d-write--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '(>>?|tee\s+-a?).{0,120}/etc/pam\.d/[a-z]{1,20}'
  count_max: 1013872
- id: pam-d-write--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '(sed\s+-i|perl\s+-pi).{0,120}/etc/pam\.d/[a-z]{1,20}'
  count_max: 1013873
- id: pam-d-write--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '(install\s+-m|cp\s+).{0,120}/etc/pam\.d/[a-z]{1,20}'
  count_max: 1013874
- id: pam-d-write--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '(mv\s+|fopen\s*\().{0,120}/etc/pam\.d/[a-z]{1,20}'
  count_max: 1013875
- id: pam-d-write--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '(open\s*\(|creat\s*\().{0,120}/etc/pam\.d/[a-z]{1,20}'
  count_max: 1013876
- id: pam-d-write--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '/etc/pam\.d/[a-z]{1,20}.{0,120}(>>?|auth\s+optional\s+\S+\.so)'
  count_max: 1013877
- id: pam-d-write--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  if:
    type: text
    regex: '/etc/pam\.d/[a-z]{1,20}.{0,120}(account\s+optional\s+\S+\.so)'
  count_max: 1013878
- id: pam-hidden-credential-path
  desc: Hidden PAM credential path
  crit: component
  conf: 0.95
  for: [elf, so, c, cpp, shell, scripts]
  if:
    type: text
    regex: '/(tmp|var/log)/\.pam[A-Za-z0-9_-]{0,32}\b'
- id: sshd-credential-log-path
  desc: Hidden sshd credential log path
  crit: component
  conf: 0.92
  for: [elf, so, c, cpp, shell, scripts]
  if:
    type: text
    regex: '/(tmp|var/log)/\.sshd([-_][A-Za-z0-9_-]{0,24}|\.log)?\b'
- id: login-credential-log-path
  desc: Hidden login credential log path
  crit: component
  conf: 0.9
  for: [elf, so, c, cpp, shell, scripts]
  if:
    type: text
    regex: '/(tmp|var/log)/\.(su(do)?|login)[A-Za-z0-9_-]{0,24}(-unix|\.log)?\b'
- id: auth-credential-log-path
  desc: Hidden auth credential log path
  crit: component
  conf: 0.9
  for: [elf, so, c, cpp, shell, scripts]
  if:
    type: text
    regex: '/(tmp|var/log)/\.(passwd|auth)[A-Za-z0-9_-]{0,24}(-unix|\.log)?\b'
- id: x11-hidden-unix-socket-path
  desc: X11 hidden unix socket path
  crit: component
  conf: 0.95
  for: [elf, so, c, cpp, shell, scripts]
  if:
    type: text
    regex: '/tmp/\.(X[0-9]+-unix|ICE-unix|XIM-unix|font-unix)\b'
- id: compile-pam-shared-module--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [elf, c, cpp, shell, scripts]
  if:
    type: text
    regex: '\bgcc\b[^\n]{0,260}-shared[^\n]{0,160}-fPIC[^\n]{0,260}-lpam'
  count_max: 1013881
- id: compile-pam-shared-module--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.94
  for: [elf, c, cpp, shell, scripts]
  if:
    type: text
    regex: '/usr/lib/\.[A-Za-z0-9._-]{1,80}\.so[\s\S]{0,260}-lpam'
  count_max: 1013882
- id: pam-source-tempfile
  desc: Temporary PAM module source file
  crit: suspicious
  conf: 0.88
  for: [elf, c, cpp, shell, scripts]
  if:
    type: text
    regex: '/tmp/\.(pam_src|pcs|hide_src)_[A-Za-z0-9_*-]{4,48}'
- id: pam-get-item-text
  desc: Embedded pam_get_item C source call
  crit: notable
  conf: 0.85
  for: [elf, macho, c, cpp]
  if:
    type: text
    regex: '\bpam_get_item\s*\('
- id: pam-get-authtok-text
  desc: Embedded pam_get_authtok C source call
  crit: notable
  conf: 0.85
  for: [elf, macho, c, cpp]
  if:
    type: text
    regex: '\bpam_get_authtok\s*\('
- id: pam-authenticate-text
  desc: Embedded pam_authenticate C source call
  crit: notable
  conf: 0.85
  for: [elf, macho, c, cpp]
  if:
    type: text
    regex: '\bpam_authenticate\s*\('
- id: pam-start-text
  desc: Embedded pam_start C source call
  crit: notable
  conf: 0.85
  for: [elf, macho, c, cpp]
  if:
    type: text
    regex: '\bpam_start\s*\('
- id: pam-chauthtok-text
  desc: Embedded pam_chauthtok C source call
  crit: notable
  conf: 0.85
  for: [elf, macho, c, cpp]
  if:
    type: text
    regex: '\bpam_chauthtok\s*\('
- id: pam-conversation-callback-name
  desc: PAM conversation callback name
  crit: notable
  conf: 0.82
  for: [elf, macho, c, cpp]
  if:
    type: text
    word: pam_conv
- id: pam-prompt-echo-source
  desc: PAM echo prompt handling
  crit: notable
  conf: 0.86
  for: [c, cpp]
  if:
    type: text
    regex: 'PAM_PROMPT_ECHO_(OFF|ON)'
  unless:
    - id: well-known/app/openvpn::openvpn-source-tree
    - id: well-known/app/postgresql::postgresql-source-tree
- id: pam-response-copy-source
  desc: PAM response buffer assignment
  crit: suspicious
  conf: 0.88
  for: [c, cpp]
  if:
    type: text
    regex: 'reply\s*\[[A-Za-z0-9_]+\]\.resp'
  unless:
    - id: well-known/app/samba::samba-source-tree
    - id: well-known/app/sudo::source-tree
    - id: well-known/app/postgresql::postgresql-source-tree
    - id: well-known/app/netatalk::netatalk-source-tree
- id: pam-start-root-source
  desc: pam_start targets root account
  crit: suspicious
  conf: 0.9
  for: [c, cpp]
  if:
    type: text
    regex: '\bpam_start\s*\(.{0,80}"root"'
- id: pam-auth-root-success-text
  desc: PAM root authentication message
  crit: suspicious
  conf: 0.84
  for: [elf, macho, c, cpp]
  if:
    type: text
    substr: authentication succeeded for root
composite_rules:
- id: pam-credential-log-path
  desc: Hidden credential log path
  crit: suspicious
  conf: 0.95
  for: [elf, so, c, cpp, shell, scripts]
  any:
  - id: pam-hidden-credential-path
  - id: sshd-credential-log-path
  - id: login-credential-log-path
  - id: auth-credential-log-path
  unless:
  - id: x11-hidden-unix-socket-path
- id: pam-library
  desc: PAM library references
  crit: notable
  any:
  - id: micro-behaviors/os/pam/auth::libpam-so-string
  - id: libpam-so-versioned
- id: pam-token-access
  desc: PAM token access functions
  crit: notable
  for: [elf, so, c, cpp]
  any:
  - id: micro-behaviors/os/pam/auth::pam-get-item
  - id: pam-get-item-source
  - id: pam-set-item
  - id: pam-get-authtok
  - id: pam-authtok-constant
  - id: pam-get-item-text
  - id: pam-get-authtok-text
- id: pam-auth-functions
  desc: PAM authentication functions
  crit: notable
  any:
  - id: micro-behaviors/os/pam/auth::pam-authenticate
  - id: pam-open-session
  - id: micro-behaviors/os/pam/auth::pam-acct-mgmt
  - id: micro-behaviors/os/pam/auth::pam-setcred-symbol
  - id: pam-authenticate-text
  - id: pam-chauthtok-text
- id: pam-start-api
  desc: PAM start API usage
  crit: notable
  conf: 0.86
  for: [elf, macho, c, cpp]
  any:
  - id: pam-start-text
  - id: micro-behaviors/os/pam/auth::pam-start-symbol
- id: pam-authenticate-api
  desc: PAM authenticate API usage
  crit: notable
  conf: 0.88
  for: [elf, macho, c, cpp]
  any:
  - id: pam-authenticate-text
  - id: micro-behaviors/os/pam/auth::pam-authenticate
- id: pam-chauthtok-api
  desc: PAM chauthtok API usage
  crit: notable
  conf: 0.86
  for: [elf, macho, c, cpp]
  any:
  - id: pam-chauthtok-text
  - id: micro-behaviors/os/pam/auth::pam-chauthtok
- id: pam-client-api-sequence
  desc: PAM client authentication API sequence
  crit: notable
  conf: 0.92
  for: [elf, macho, c, cpp]
  all:
  - id: pam-start-api
  - id: pam-authenticate-api
  any:
  - id: pam-chauthtok-api
  - id: pam-conversation-callback-name
  - id: micro-behaviors/os/pam/auth::pam-acct-mgmt
  unless:
  - id: well-known/app/postgresql::postgresql-source-tree
  # Standard system PAM client utilities (interactive login/account tools)
  # legitimately run the full pam_start/pam_authenticate/pam_chauthtok
  # sequence. Credential-harvester detection escalates through the hostile
  # parents (root-auth-target, response-copy, credential-log-path), which a
  # malicious implant satisfies regardless of an impersonated benign name.
  - id: pam-client-tool-basename
  - id: pam-login-tool-basename
  # The basename lists can't enumerate every PAM consumer (login, su, runuser,
  # sshd, postgres, ...); downgrade the bare sequence on documented/licensed
  # userland tools. The hostile parents still fire on real harvesters.
  downgrade:
    any:
    - id: micro-behaviors/ui/help/
- id: pam-prompt-response-copy
  desc: PAM prompt response copying
  crit: suspicious
  conf: 0.92
  for: [c, cpp]
  unless:
  - id: well-known/app/samba::samba-source-tree
  - id: well-known/app/sudo::source-tree
  - id: well-known/app/postgresql::postgresql-source-tree
  - id: well-known/app/netatalk::netatalk-source-tree
  all:
  - id: pam-prompt-echo-source
  - id: pam-response-copy-source
- id: pam-root-auth-target
  desc: PAM authentication targets root
  crit: suspicious
  conf: 0.9
  for: [elf, macho, c, cpp]
  any:
  - id: pam-start-root-source
  - id: pam-auth-root-success-text
- id: pam-local-account-map
  desc: PAM configuration with local account databases
  crit: suspicious
  conf: 0.94
  for: [elf, macho, c, cpp]
  all:
  - id: micro-behaviors/os/pam/auth::pam-config-paths
  - id: micro-behaviors/os/privilege/paths::etc-shadow
  any:
  - id: micro-behaviors/fs/path/config/accounts::etc-passwd
  - id: objectives/exfiltration/http/upload::native-elf-account-file-path
- id: pam-client-root-credential-harvester
  desc: PAM client captures root credential prompts
  crit: hostile
  conf: 0.98
  for: [elf, macho, c, cpp]
  all:
  - id: pam-client-api-sequence
  - id: pam-root-auth-target
  any:
  - id: pam-prompt-response-copy
  - id: pam-conversation-callback-name
  - id: pam-local-account-map
- id: pam-config-and-shadow-harvester
  desc: PAM configuration and shadow database harvesting
  crit: hostile
  conf: 0.97
  for: [elf, macho, c, cpp]
  all:
  - id: pam-local-account-map
  any:
  - id: pam-client-api-sequence
  - id: pam-auth-functions
- id: pam-root-password-change-probe
  desc: PAM root password change probe
  crit: hostile
  conf: 0.97
  for: [elf, macho, c, cpp]
  all:
  - id: pam-root-auth-target
  - id: pam-chauthtok-api
  any:
  - id: objectives/privilege-escalation/elevation-control/setuid/runtime::native-chpasswd-command
  - id: micro-behaviors/os/user/account::chpasswd-command
- id: interceptor
  desc: PAM credential token access
  crit: suspicious
  conf: 0.8
  for: [so, dylib, macho, c, cpp]
  all:
  - id: pam-library
  any:
      # Real credential interception should touch credential-bearing token APIs.
      # Ordinary login tools commonly combine libpam, pam_authenticate,
      # pam_acct_mgmt, pam_open_session, pam_setcred, and pam_set_item.
  - id: pam-get-authtok
  - id: pam-authtok-constant
  unless:
  - id: sshd-session-basename
  - id: libpam-basename
  - id: micro-behaviors/os/pam/auth/
  downgrade:
    any:
    - id: metadata/binary/provenance/
- id: pam-config-injector
  desc: PAM module config injector
  crit: suspicious
  conf: 0.9
  for: [c, macho, elf, scripts]
  unless:
  - id: well-known/app/sudo::source-tree
  - id: well-known/lib/omdev::omdev-library
  all:
  - id: pam-d-write
  any:
  - id: micro-behaviors/os/pam/auth::pam-optional-control
- id: pam-module-unix
  desc: Unix PAM module (exports pam_sm_* functions)
  crit: notable
  conf: 0.9
  for: [macho, dylib, so, c, cpp]
  all:
  - id: micro-behaviors/os/pam/auth::pam-module-api
  any:
  - id: micro-behaviors/os/pam/auth::pam-get-user
  - id: micro-behaviors/os/pam/auth::pam-get-item
  - id: micro-behaviors/os/pam/auth::pam-ignore-return
- id: pam-token-log-stealer
  desc: PAM module captures authentication tokens
  crit: hostile
  conf: 0.98
  for: [elf, so, c, cpp]
  all:
  - id: pam-token-access
  - id: pam-credential-log-path
  any:
  - id: compile-pam-shared-module
  - id: pam-source-tempfile
  - id: pam-module-unix
- id: pam-d-write
  desc: PAM config directory reference with write context
  crit: notable
  conf: 0.85
  for: [c, macho, elf, shell, scripts]
  any:
  - id: pam-d-write--rx-1
  - id: pam-d-write--rx-2
  - id: pam-d-write--rx-3
  - id: pam-d-write--rx-4
  - id: pam-d-write--rx-5
  - id: pam-d-write--rx-6
  - id: pam-d-write--rx-7
- id: compile-pam-shared-module
  desc: Compiles PAM shared object module
  crit: suspicious
  conf: 0.94
  for: [elf, c, cpp, shell, scripts]
  any:
  - id: compile-pam-shared-module--rx-8
  - id: compile-pam-shared-module--rx-9
