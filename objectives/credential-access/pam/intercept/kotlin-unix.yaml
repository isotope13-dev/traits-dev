defaults:
  platforms: [netbsd, unix]
  for: [kotlin]
  attack: T1556

traits:
  - id: kotlin-pam-config-enum
    desc: Kotlin source enumerates PAM config
    crit: suspicious
    conf: 0.92
    unless:
      - id: metadata/package/files/dependency::stock-pam-config-file-path
    if:
      type: text
      regex: 'File\(["'']/etc/pam\.d["'']\)|listFiles\s*\(\s*\)[\s\S]{0,260}/etc/pam\.d'

  - id: kotlin-shadow-master-passwd
    desc: Kotlin reads password stores
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '/etc/shadow[\s\S]{0,320}/etc/master\.passwd'

  - id: kotlin-pam-credential-exfil
    desc: Kotlin PAM data HTTP exfil
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '=== CREDENTIAL DATA ===[\s\S]{0,900}/collect[\s\S]{0,260}HttpsURLConnection'

composite_rules:
  - id: kotlin-pam-store-http-exfil
    desc: Kotlin PAM store HTTP exfil
    crit: hostile
    conf: 0.98
    all:
      - id: kotlin-pam-config-enum
      - id: kotlin-shadow-master-passwd
      - id: kotlin-pam-credential-exfil
