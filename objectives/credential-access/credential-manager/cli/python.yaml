defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1555
  mbc: E1555

traits:
- id: onepassword-cli-name
  desc: 1Password CLI name literal
  crit: component
  conf: 0.88
  if:
    type: tree-sitter
    query: |
      ((call
        arguments: (argument_list
          (string) @cmd))
       (#match? @cmd "^['\"]op['\"]$"))
- id: bitwarden-cli-name
  desc: Bitwarden CLI name literal
  crit: component
  conf: 0.88
  if:
    type: tree-sitter
    query: |
      ((call
        arguments: (argument_list
          (string) @cmd))
       (#match? @cmd "^['\"]bw['\"]$"))
- id: pass-cli-name
  desc: pass CLI name literal
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: pass
- id: gopass-cli-name
  desc: gopass CLI name literal
  crit: component
  conf: 0.88
  if:
    type: string_literal
    exact: gopass
- id: cli-list-literal
  desc: CLI list subcommand literal
  crit: component
  conf: 0.82
  if:
    type: string_literal
    exact: list
- id: cli-item-literal
  desc: CLI item subcommand literal
  crit: component
  conf: 0.82
  if:
    type: string_literal
    exact: item
- id: cli-get-literal
  desc: CLI get subcommand literal
  crit: component
  conf: 0.82
  if:
    type: string_literal
    exact: get
- id: cli-show-literal
  desc: CLI show subcommand literal
  crit: component
  conf: 0.82
  if:
    type: string_literal
    exact: show
- id: cli-items-literal
  desc: CLI items selector literal
  crit: component
  conf: 0.82
  if:
    type: string_literal
    exact: items
- id: cli-format-json-flag
  desc: CLI JSON output flag
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: --format=json
- id: cli-password-flag
  desc: CLI password-only flag
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: --password

composite_rules:
- id: onepassword-item-get-cli
  desc: 1Password CLI item retrieval
  crit: suspicious
  conf: 0.94
  all:
  - id: onepassword-cli-name
  - id: cli-item-literal
  - id: cli-get-literal
  - id: cli-format-json-flag
  near_lines: 20
- id: bitwarden-list-items-cli
  desc: Bitwarden CLI item listing
  crit: suspicious
  conf: 0.94
  all:
  - id: bitwarden-cli-name
  - id: cli-list-literal
  - id: cli-items-literal
  near_lines: 12
- id: pass-show-cli
  desc: pass CLI secret retrieval
  crit: suspicious
  conf: 0.9
  all:
  - id: pass-cli-name
  - id: cli-show-literal
  - id: micro-behaviors/process/create/subprocess::methods
  near_lines: 8
- id: gopass-password-cli
  desc: gopass CLI password retrieval
  crit: suspicious
  conf: 0.92
  all:
  - id: gopass-cli-name
  - id: cli-show-literal
  - id: cli-password-flag
  near_lines: 10
- id: python-password-manager-cli-dump
  desc: Python dumps password manager stores through CLIs
  crit: hostile
  conf: 0.975
  needs: 2
  any:
  - id: onepassword-item-get-cli
  - id: bitwarden-list-items-cli
  - id: pass-show-cli
  - id: gopass-password-cli
  all:
  - id: micro-behaviors/process/create/subprocess::run-content
