defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1555
  mbc: E1555

traits:
# `op`/`bw` are 2-char CLI names — too short for a bare string-literal match
# (FP-prone, and the validator rejects <3-char literal patterns), so these stay
# call-argument-scoped queries. The subcommand literals below are ≥3 chars.
- id: onepassword-cli-name
  desc: 1Password CLI name literal
  crit: component
  conf: 0.88
  if:
    type: tree-sitter
    query: |
      ((call
        arguments: (argument_list
          (string) @cmd))
       (#match? @cmd "^['\"]op['\"]$"))
- id: bitwarden-cli-name
  desc: Bitwarden CLI name literal
  crit: component
  conf: 0.88
  if:
    type: tree-sitter
    query: |
      ((call
        arguments: (argument_list
          (string) @cmd))
       (#match? @cmd "^['\"]bw['\"]$"))
- id: pass-cli-name
  desc: pass CLI name literal
  crit: component
  conf: 0.86
  if:
    type: string_literal
    exact: pass
- id: gopass-cli-name
  desc: gopass CLI name literal
  crit: component
  conf: 0.88
  if:
    type: string_literal
    exact: gopass
# Generic subcommand verbs (list/item/get/show/items) live in the neutral
# micro-behaviors/process/cli/argument tier and are referenced cross-directory
# below — a bare "get"/"list" literal must not register as a credential-access
# finding on its own.
- id: cli-format-json-flag
  desc: CLI JSON output flag
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: --format=json
- id: cli-password-flag
  desc: CLI password-only flag
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: --password

composite_rules:
- id: onepassword-item-get-cli
  desc: 1Password CLI item retrieval
  crit: suspicious
  conf: 0.94
  all:
  - id: onepassword-cli-name
  - id: micro-behaviors/process/argument/subcommand::cli-verb-item
  - id: micro-behaviors/process/argument/subcommand::cli-verb-get
  - id: cli-format-json-flag
  near_lines: 20
- id: bitwarden-list-items-cli
  desc: Bitwarden CLI item listing
  crit: suspicious
  conf: 0.94
  all:
  - id: bitwarden-cli-name
  - id: micro-behaviors/process/argument/subcommand::cli-verb-list
  - id: micro-behaviors/process/argument/subcommand::cli-verb-items
  near_lines: 12
- id: pass-show-cli
  desc: pass CLI secret retrieval
  crit: suspicious
  conf: 0.9
  all:
  - id: pass-cli-name
  - id: micro-behaviors/process/argument/subcommand::cli-verb-show
  - id: micro-behaviors/process/create/subprocess::process-execution
  near_lines: 8
- id: gopass-password-cli
  desc: gopass CLI password retrieval
  crit: suspicious
  conf: 0.92
  all:
  - id: gopass-cli-name
  - id: micro-behaviors/process/argument/subcommand::cli-verb-show
  - id: cli-password-flag
  near_lines: 10
- id: python-password-manager-cli-dump
  desc: Python dumps password manager stores through CLIs
  crit: hostile
  conf: 0.975
  needs: 2
  any:
  - id: onepassword-item-get-cli
  - id: bitwarden-list-items-cli
  - id: pass-show-cli
  - id: gopass-password-cli
  all:
  - id: micro-behaviors/process/create/subprocess::run-content
