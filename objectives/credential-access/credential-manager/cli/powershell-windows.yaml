defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1555.004
  mbc: B0028

traits:
  - id: ps-cmdkey-list-command
    desc: PowerShell cmdkey list command
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: '(?i)\bcmdkey\s+/list\b'

  - id: ps-cmdkey-output-parsing
    desc: PowerShell parses cmdkey output
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: '\^Target:\\s\*\(\.\*\)[\s\S]{0,220}\^Username:\\s\*\(\.\*\)'

composite_rules:
  - id: ps-windows-credential-manager-list
    desc: PowerShell lists Windows credentials
    crit: hostile
    conf: 0.97
    all:
      - id: ps-cmdkey-list-command
      - id: ps-cmdkey-output-parsing
