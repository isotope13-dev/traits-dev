defaults:
  platforms: [windows]
  for: [go]
  attack: T1555

traits:
  - id: go-cmdkey-list-command
    desc: Go runs cmdkey listing
    crit: suspicious
    conf: 0.95
    if:
      type: literal
      exact: cmdkey /list
  - id: go-cmdkey-list-args
    desc: Go runs split cmdkey listing
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'exec\.Command\(.{0,80}"cmdkey",\s*"/list"'

composite_rules:
  - id: go-windows-credential-manager-list
    desc: Go lists Windows credentials
    crit: hostile
    conf: 0.97
    any:
      - id: go-cmdkey-list-command
      - id: go-cmdkey-list-args
