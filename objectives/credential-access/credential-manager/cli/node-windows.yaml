defaults:
  platforms: [windows]
  for: [javascript, typescript]
  attack: T1555

traits:
  - id: node-cmdkey-list-command
    desc: Node cmdkey list command
    crit: suspicious
    conf: 0.94
    if:
      type: literal
      regex: '(?i)\bcmdkey(\.exe)?\s+/list\b'

composite_rules:
  - id: node-cmdkey-list-exec
    desc: Node executes cmdkey list
    crit: suspicious
    conf: 0.96
    all:
      - id: node-cmdkey-list-command
    any:
      - id: micro-behaviors/process/create/shell/bridge
