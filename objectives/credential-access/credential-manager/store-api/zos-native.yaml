defaults:
  platforms: [zos]
  for: [c, cpp, elf]
  attack: T1555

traits:
  - id: zos-racf-users-file
    desc: z/OS RACF users file
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/security/users.cfg

  - id: zos-security-keyring-file
    desc: z/OS security keyring file
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /etc/security/keyring.dat

  - id: zos-ibm-vault-credential-file
    desc: z/OS IBM vault credential file
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /var/ibm/security/vault/credentials.dat

  - id: zos-credmgr-store-file
    desc: z/OS credmgr store file
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /opt/ibm/security/credmgr/store.dat

  - id: zos-racf-secret-envs
    desc: z/OS RACF secret envs
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bRACF_(USERID|PASSWORD)\b'

  - id: zos-cics-secret-envs
    desc: z/OS CICS secret envs
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: '\bCICS_(USERID|PASSWORD)\b'

  - id: zos-db2-mq-secret-envs
    desc: z/OS DB2 MQ secret envs
    crit: suspicious
    conf: 0.9
    count_min: 2
    if:
      type: text
      regex: '\b(DB2|MQ)_(USER|PASS)\b'

composite_rules:
  - id: zos-credential-manager-harvest
    desc: z/OS credential manager harvest
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: zos-racf-users-file
      - id: zos-security-keyring-file
      - id: zos-ibm-vault-credential-file
      - id: zos-credmgr-store-file
      - id: zos-racf-secret-envs
      - id: zos-cics-secret-envs
      - id: zos-db2-mq-secret-envs
