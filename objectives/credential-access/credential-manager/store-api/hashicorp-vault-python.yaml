defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1552.001
  mbc: E1552

traits:
- id: vault-token-header
  desc: HashiCorp Vault token header
  crit: notable
  conf: 0.9
  if:
    type: string_literal
    exact: X-Vault-Token
- id: vault-token-sources
  desc: HashiCorp Vault token source references
  crit: notable
  conf: 0.88
  if:
    type: string_literal
    regex: 'VAULT_(TOKEN|ROLE_ID|SECRET_ID)|\.vault-token'
- id: vault-sys-mounts-api
  desc: HashiCorp Vault sys mounts API
  crit: suspicious
  conf: 0.92
  if:
    type: string_literal
    substr: /v1/sys/mounts
- id: vault-kv-data-api
  desc: HashiCorp Vault KV data API path
  crit: suspicious
  conf: 0.9
  if:
    type: string_literal
    substr: /data/
- id: vault-cli-print-token
  desc: HashiCorp Vault CLI token print
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: vault
- id: vault-cli-print-literal
  desc: HashiCorp Vault CLI print subcommand
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: print
- id: vault-cli-token-literal
  desc: HashiCorp Vault CLI token subcommand
  crit: component
  conf: 0.84
  if:
    type: string_literal
    exact: token

composite_rules:
- id: vault-cli-print-token-command
  desc: HashiCorp Vault CLI token print command
  crit: notable
  conf: 0.9
  all:
  - id: vault-cli-print-token
  - id: vault-cli-print-literal
  - id: vault-cli-token-literal
  near_lines: 8
- id: python-vault-kv-secret-sweep
  desc: Python walks HashiCorp Vault KV secrets
  crit: hostile
  conf: 0.975
  all:
  - id: vault-token-header
  - id: vault-sys-mounts-api
  - id: vault-token-sources
  any:
  - id: vault-kv-data-api
  - id: vault-cli-print-token-command
  - id: micro-behaviors/communications/http/lib/urllib::urllib-request-object
  near_lines: 160
