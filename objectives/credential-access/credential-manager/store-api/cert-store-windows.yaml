defaults:
  platforms: [windows]
  for: [pe]
  attack: T1552.004

traits:
  - id: cert-find-cert-in-store
    desc: CertFindCertificateInStore symbol
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: CertFindCertificateInStore

  - id: cert-duplicate-context
    desc: CertDuplicateCertificateContext symbol
    crit: component
    conf: 0.9
    if:
      type: symbol
      exact: CertDuplicateCertificateContext

composite_rules:
  - id: cert-store-full-enumeration-chain
    desc: Windows cert store full enumeration chain
    crit: suspicious
    conf: 0.85
    all:
      - id: micro-behaviors/crypto/certificate/store::cert-open-store
      - id: micro-behaviors/crypto/certificate/store::cert-enum-certificates
      - id: cert-find-cert-in-store
    any:
      - id: cert-duplicate-context
      - id: micro-behaviors/crypto/certificate/store::cert-close-store
    unless:
      - id: metadata/binary/vendor::windows-system-implementer-dll
      - id: cert-store-benign-context
    downgrade:
      any:
        - id: metadata/lang/compiler/systems::rustc-path
  - id: cert-store-benign-context
    desc: Benign Windows cert-store enumeration context
    crit: component
    conf: 0.9
    any:
      - id: metadata/signed/platform::microsoft
      - id: metadata/binary/framework::dotnet-metadata
      - id: metadata/signed/certificate::pe-signature-verified
      - id: metadata/lang/compiler/systems::rustc-path
      - id: well-known/lib/dioxus::dioxus-runtime
      - id: well-known/app/protected-benign-pe/
      - id: well-known/app/drivers::ngx-dll-basename
      # OpenSSL/pyca-cryptography wraps the Windows cert store to load system CAs.
      - id: well-known/lib/openssl::openssl-cryptogams
