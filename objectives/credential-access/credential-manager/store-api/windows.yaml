# Windows Credential Manager and Vault API Access
# Stealers use these APIs to enumerate and read credentials stored in
# the Windows Credential Manager (Control Panel > Credential Manager).
# ATT&CK: T1555.004 (Credentials from Password Stores: Windows Credential Manager)
# MBC: B0028 (Credential Theft)
defaults:
  platforms: [windows]
  attack: "T1555.004"
  mbc: "B0028"

composite_rules:
  - id: credential-manager-access
    desc: Windows Credential Manager enumeration and reading
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/security/keychain::cred-enumerate
      - id: micro-behaviors/os/security/keychain::cred-read
    unless:
      # Export-heavy provider DLLs legitimately implement these APIs and
      # should not be treated as suspicious credential access clients.
      - id: metadata/binary/metrics/threshold::many-exports-100
      # The keytar native add-on is itself a credential storage library; keep
      # the individual API observations, but don't infer stealer-like access.
      - id: micro-behaviors/os/security/keychain::keytar-native-addon
      - id: well-known/lib/keyring::napi-rs-keyring-native-addon
    downgrade:
      any:
        - id: metadata/binary/vendor/
  - id: vault-credential-access
    desc: Windows Credential Vault access
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/security/keychain::vault-open
    any:
      - id: micro-behaviors/os/security/keychain::vault-enumerate
      - id: micro-behaviors/os/security/keychain::vault-get-item
    unless:
      - id: well-known/lib/windows-vault/
