# Windows Credential Manager and Vault API Access
# Stealers use these APIs to enumerate and read credentials stored in
# the Windows Credential Manager (Control Panel > Credential Manager).
# ATT&CK: T1555.004 (Credentials from Password Stores: Windows Credential Manager)
# MBC: B0028 (Credential Theft)
defaults:
  for: [pe, dll]
  platforms: [windows]
  attack: "T1555.004"
  mbc: "B0028"
  crit: notable
  conf: 0.9
traits:
  # === Windows Credential Manager API ===
  - id: cred-enumerate
    desc: Enumerate stored Windows credentials
    crit: notable
    if:
      type: symbol
      regex: "^CredEnumerate[AW]?$"
  - id: cred-read
    desc: Read a single stored credential
    if:
      type: symbol
      regex: "^CredRead[AW]?$"
  - id: cred-free
    desc: Free credential buffer
    crit: notable
    conf: 0.8
    if:
      type: symbol
      exact: "CredFree"
  - id: cred-write
    desc: Write/store a credential
    if:
      type: symbol
      regex: "^CredWrite[AW]?$"
  - id: cred-delete
    desc: Delete stored credential (post-theft cleanup)
    crit: notable
    if:
      type: symbol
      regex: "^CredDelete[AW]?$"
  # === Windows Credential Vault API (VaultAPI) ===
  - id: vault-open
    desc: Open a Windows credential vault
    if:
      type: symbol
      exact: "VaultOpenVault"
  - id: vault-enumerate
    desc: Enumerate items in a Windows credential vault
    if:
      type: symbol
      exact: "VaultEnumerateItems"
  - id: vault-get-item
    desc: Retrieve a credential from the vault
    if:
      type: symbol
      exact: "VaultGetItem"
  - id: vault-close
    desc: Close a Windows credential vault
    crit: baseline
    conf: 0.8
    if:
      type: symbol
      exact: "VaultCloseVault"
composite_rules:
  - id: credential-manager-access
    desc: Windows Credential Manager enumeration and reading
    crit: suspicious
    conf: 0.9
    all:
      - id: cred-enumerate
      - id: cred-read
    unless:
      # Export-heavy provider DLLs legitimately implement these APIs and
      # should not be treated as suspicious credential access clients.
      - id: metadata/binary/metrics::many-exports-100
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
  - id: vault-credential-access
    desc: Windows Credential Vault access
    crit: suspicious
    conf: 0.9
    all:
      - id: vault-open
    any:
      - id: vault-enumerate
      - id: vault-get-item
