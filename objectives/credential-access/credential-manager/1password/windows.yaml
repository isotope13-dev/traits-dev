defaults:
  platforms: [windows]
  for: [pe]
  attack: T1555
  mbc: B0028

traits:
  - id: browsersupport-native-messaging
    desc: 1Password browser native messaging bridge
    crit: component
    conf: 0.9
    if:
      type: text
      substr: 'native-messaging\op-browser-support\src\main.rs'

  - id: secure-autofill-credential-bundle
    desc: Secure autofill credential bundle marker
    crit: component
    conf: 0.92
    if:
      type: text
      substr: NmSendSecureRemoteAutofillCredentialBundle

  - id: onepassword-vault-taxonomy
    desc: 1Password vault item taxonomy
    crit: component
    conf: 0.86
    if:
      type: text
      substr: vaultGuarded

composite_rules:
  - id: browser-credential-manager-bridge
    desc: 1Password browser credential bridge
    crit: suspicious
    conf: 0.92
    all:
      - id: browsersupport-native-messaging
      - id: secure-autofill-credential-bundle
      - id: onepassword-vault-taxonomy
