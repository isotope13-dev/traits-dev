# FileZilla Credential Access
# Detection of FileZilla FTP client credential file access
# ATT&CK: T1555 (Credentials from Password Stores)
defaults:
  for: [text, shell, ruby, python, javascript, php, powershell, vbs, applescript]
  crit: notable
  conf: 0.85
  attack: "T1555"
traits:
  - id: application-path
    desc: FileZilla application directory
    if:
      type: string
      substr: FileZilla
  - id: sitemanager-xml
    desc: FileZilla sitemanager.xml config
    crit: suspicious
    conf: 0.95
    if:
      type: string
      substr: sitemanager.xml
  - id: recentservers-xml
    desc: FileZilla recentservers.xml config
    crit: suspicious
    conf: 0.95
    if:
      type: string
      substr: recentservers.xml
  - id: filezilla-xml
    desc: FileZilla main config file
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: filezilla.xml
  - id: encoded-password-tag
    desc: FileZilla encoded password XML element
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: '<Pass encoding="base64">'
composite_rules:
  - id: filezilla-stealer
    desc: FileZilla credential stealer detected
    crit: suspicious
    conf: 0.95
    attack: "T1555"
    for: [text, shell, batch, python, ruby, javascript, perl, php, powershell, vbs, applescript, elf, macho, pe]
    all:
      - id: application-path
    any:
      - id: sitemanager-xml
      - id: recentservers-xml
      - id: filezilla-xml
