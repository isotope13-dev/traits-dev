# Telegram Desktop Credential Access
# Detection of Telegram data directory and session file access
# ATT&CK: T1555 (Credentials from Password Stores)
defaults:
  for: [text, shell, ruby, python, javascript, php, powershell, vbs, applescript]
  crit: notable
  conf: 0.85
  attack: "T1555"
traits:
  - id: desktop-path
    desc: Telegram Desktop directory reference
    if:
      type: string
      substr: Telegram Desktop
  - id: tdata-directory
    desc: Telegram tdata directory token
    crit: component
    conf: 0.7
    if:
      type: string
      regex: '(^|[^A-Za-z0-9_.-])tdata([^A-Za-z0-9_.-]|$)'
  - id: tdata-path
    desc: Telegram tdata full path
    crit: suspicious
    conf: 0.95
    if:
      type: string
      regex: 'Telegram Desktop[/\\]+tdata'
  - id: d877f783-file
    desc: Telegram D877F783 session directory
    crit: suspicious
    conf: 0.9
    if:
      type: string
      substr: D877F783
composite_rules:
  - id: telegram-stealer
    desc: Telegram session stealer detected
    crit: suspicious
    conf: 0.95
    attack: "T1555"
    for: [text, shell, batch, python, ruby, javascript, perl, php, powershell, vbs, applescript, elf, macho, pe]
    all:
      - id: desktop-path
    any:
      - id: tdata-directory
      - id: tdata-path
      - id: objectives/collection/messaging/app::telegram-key-datas
