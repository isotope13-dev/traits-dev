# Go bulk environment-variable credential harvesting.
# Detects programs that iterate os.Environ() and filter the keys against
# a credential keyword list (token / key / secret / password / npm / aws /
# github / stripe / kube / docker / api / auth) — a tell-tale stealer pattern.
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1552.001
  mbc: B0029
traits:
- id: go-credential-keyword-filter--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'strings\.(Contains|ContainsAny)\([^)]{0,400}(token|secret)'
    case_insensitive: true
- id: go-credential-keyword-filter--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'strings\.(HasPrefix|EqualFold)\([^)]{0,400}(token|secret)'
    case_insensitive: true
- id: go-credential-keyword-filter--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'strings\.(Contains|ContainsAny)\([^)]{0,400}(password|api[-_]?key)'
    case_insensitive: true
- id: go-credential-keyword-filter--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'strings\.(HasPrefix|EqualFold)\([^)]{0,400}(password|api[-_]?key)'
    case_insensitive: true
- id: go-credential-keyword-filter--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'strings\.(Contains|ContainsAny|HasPrefix|EqualFold)\([^)]{0,400}(auth)'
    case_insensitive: true
- id: go-env-credkeywords-fragments--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(tok|en key)"'
- id: go-env-credkeywords-fragments--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(secr|et pas)"'
- id: go-env-credkeywords-fragments--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(pas|npm)"'
- id: go-env-credkeywords-fragments--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(aw|s git)"'
- id: go-env-credkeywords-fragments--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(hub|stri)"'
- id: go-env-credkeywords-fragments--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(ku|be)"'
- id: go-env-credkeywords-fragments--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(doc|ker)"'
- id: go-env-credkeywords-fragments--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(ap|au)"'
- id: go-env-credkeywords-fragments--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(th)"'
composite_rules:
- id: go-env-credential-harvest
  desc: Go iterates env vars and filters for credentials
  crit: hostile
  conf: 0.96
  near_lines: 30
  all:
  - id: micro-behaviors/os/env/vars::go-environ-iteration
  any:
  - id: go-credential-keyword-filter
  - id: go-env-credkeywords-fragments
- id: go-env-credential-exfil
  desc: Go harvests env credentials and exfiltrates over HTTP
  crit: hostile
  conf: 0.98
  all:
  - id: go-env-credential-harvest
  - id: micro-behaviors/communications/http/lib/netlib::go-http-newrequest
- id: go-credential-keyword-filter
  desc: Filters strings against credential keyword list
  crit: suspicious
  conf: 0.92
  any:
  - id: go-credential-keyword-filter--rx-1
  - id: go-credential-keyword-filter--rx-2
  - id: go-credential-keyword-filter--rx-3
  - id: go-credential-keyword-filter--rx-4
  - id: go-credential-keyword-filter--rx-5
  needs: 1
- id: go-env-credkeywords-fragments
  desc: Concatenated credential-keyword fragments
  crit: component
  conf: 0.85
  any:
  - id: go-env-credkeywords-fragments--rx-6
  - id: go-env-credkeywords-fragments--rx-7
  - id: go-env-credkeywords-fragments--rx-8
  - id: go-env-credkeywords-fragments--rx-9
  - id: go-env-credkeywords-fragments--rx-10
  - id: go-env-credkeywords-fragments--rx-11
  - id: go-env-credkeywords-fragments--rx-12
  - id: go-env-credkeywords-fragments--rx-13
  - id: go-env-credkeywords-fragments--rx-14
  needs: 1
