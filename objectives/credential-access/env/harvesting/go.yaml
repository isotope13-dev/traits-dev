# Go bulk environment-variable credential harvesting.
# Detects programs that iterate os.Environ() and filter the keys against
# a credential keyword list (token / key / secret / password / npm / aws /
# github / stripe / kube / docker / api / auth) — a tell-tale stealer pattern.
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1552.001
  mbc: B0029
traits:
  - id: go-credential-keyword-filter
    desc: Filters strings against credential keyword list
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'strings\.(Contains|ContainsAny|HasPrefix|EqualFold)\([^)]{0,400}(token|secret|password|api[-_]?key|auth)'
      case_insensitive: true
  - id: go-env-credkeywords-fragments
    desc: Concatenated credential-keyword fragments
    crit: component
    conf: 0.85
    count_min: 3
    if:
      type: text
      regex: '"(tok|en key|secr|et pas|pas|npm|aw|s git|hub|stri|ku|be|doc|ker|ap|au|th)"'
composite_rules:
  - id: go-env-credential-harvest
    desc: Go iterates env vars and filters for credentials
    crit: hostile
    conf: 0.96
    near_lines: 30
    all:
      - id: micro-behaviors/os/env/vars::go-environ-iteration
    any:
      - id: go-credential-keyword-filter
      - id: go-env-credkeywords-fragments
  - id: go-env-credential-exfil
    desc: Go harvests env credentials and exfiltrates over HTTP
    crit: hostile
    conf: 0.98
    all:
      - id: go-env-credential-harvest
      - id: micro-behaviors/communications/http/lib/netlib::go-http-newrequest
