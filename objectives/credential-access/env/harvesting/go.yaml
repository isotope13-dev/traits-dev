# Go bulk environment-variable credential harvesting.
# Detects programs that iterate os.Environ() and filter the keys against
# a credential keyword list (token / key / secret / password / npm / aws /
# github / stripe / kube / docker / api / auth) — a tell-tale stealer pattern.
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1552.001
  mbc: B0029
traits:
- id: go-credential-keyword-filter--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'strings\.(Contains|ContainsAny)\([^)]{0,400}(token|secret)'
    case_insensitive: true
  count_max: 1013254
- id: go-credential-keyword-filter--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'strings\.(HasPrefix|EqualFold)\([^)]{0,220}"(token|secret)[A-Z0-9_-]{0,24}"'
    case_insensitive: true
  count_max: 1013255
- id: go-credential-keyword-filter--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'strings\.(Contains|ContainsAny)\([^)]{0,400}(password|api[-_]?key)'
    case_insensitive: true
  count_max: 1013256
- id: go-credential-keyword-filter--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'strings\.(HasPrefix|EqualFold)\([^)]{0,220}"(password|api[-_]?key)[A-Z0-9_-]{0,24}"'
    case_insensitive: true
  count_max: 1013257
- id: go-credential-keyword-filter--rx-5
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'strings\.(Contains|ContainsAny)\([^)]{0,400}(auth)'
    case_insensitive: true
  count_max: 1013258
- id: go-credential-keyword-filter--rx-17
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'strings\.(HasPrefix|EqualFold)\([^)]{0,220}"auth[A-Z0-9_-]{0,24}"'
    case_insensitive: true
  count_max: 1013270
- id: go-env-credkeywords-fragments--rx-6
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(tok|en key)"'
  count_max: 1013259
- id: go-env-credkeywords-fragments--rx-7
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(secr|et pas)"'
  count_max: 1013260
- id: go-env-credkeywords-fragments--rx-8
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(pas|npm)"'
  count_max: 1013261
- id: go-env-credkeywords-fragments--rx-9
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(aw|s git)"'
  count_max: 1013262
- id: go-env-credkeywords-fragments--rx-10
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(hub|stri)"'
  count_max: 1013263
- id: go-env-credkeywords-fragments--rx-11
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(ku|be)"'
  count_max: 1013264
- id: go-env-credkeywords-fragments--rx-12
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(doc|ker)"'
  count_max: 1013265
- id: go-env-credkeywords-fragments--rx-13
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(ap|au)"'
  count_max: 1013266
- id: go-env-credkeywords-fragments--rx-14
  desc: Regex component marker
  crit: component
  conf: 0.85
  count_min: 3
  if:
    type: text
    regex: '"(th)"'
  count_max: 1013267
- id: go-credential-keyword-filter--rx-15
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'ToUpper\([^)]{1,80}\),\s*"(PASSWORD|SECRET|TOKEN)"'
  count_max: 1013268
- id: go-credential-keyword-filter--rx-16
  desc: Regex component marker
  crit: component
  conf: 0.92
  if:
    type: text
    regex: 'ToUpper\([^)]{1,80}\),\s*"(KEY|CREDENTIAL|AUTH)"'
  count_max: 1013269
composite_rules:
- id: go-env-credential-harvest
  desc: Go filters env vars for credentials
  crit: hostile
  conf: 0.96
  near_lines: 30
  all:
  - id: micro-behaviors/os/env/vars/access::go-environ-iteration
  any:
  - id: go-credential-keyword-filter
  - id: go-env-credkeywords-fragments
  # Diagnostic/configuration programs may enumerate their own namespace and
  # mask values before logging; that is not credential theft.
  unless:
  - id: micro-behaviors/os/env/config::go-env-redaction-after-read
- id: go-env-credential-exfil
  desc: Go env credential HTTP exfil
  crit: hostile
  conf: 0.98
  all:
  - id: go-env-credential-harvest
  - id: micro-behaviors/communications/http/lib/netlib::go-http-newrequest
- id: go-credential-keyword-filter
  desc: Filters strings against credential keyword list
  crit: suspicious
  conf: 0.92
  any:
  - id: go-credential-keyword-filter--rx-1
  - id: go-credential-keyword-filter--rx-2
  - id: go-credential-keyword-filter--rx-3
  - id: go-credential-keyword-filter--rx-4
  - id: go-credential-keyword-filter--rx-5
  - id: go-credential-keyword-filter--rx-17
  - id: go-credential-keyword-filter--rx-15
  - id: go-credential-keyword-filter--rx-16
- id: go-env-credkeywords-fragments
  desc: Concatenated credential-keyword fragments
  crit: component
  conf: 0.85
  any:
  - id: go-env-credkeywords-fragments--rx-6
  - id: go-env-credkeywords-fragments--rx-7
  - id: go-env-credkeywords-fragments--rx-8
  - id: go-env-credkeywords-fragments--rx-9
  - id: go-env-credkeywords-fragments--rx-10
  - id: go-env-credkeywords-fragments--rx-11
  - id: go-env-credkeywords-fragments--rx-12
  - id: go-env-credkeywords-fragments--rx-13
  - id: go-env-credkeywords-fragments--rx-14
