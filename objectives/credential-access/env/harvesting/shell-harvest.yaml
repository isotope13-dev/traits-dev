defaults:
  platforms: [unix]
  attack: T1552.001
  for: [shell, python, javascript, ruby]
traits:
- id: env-cmd
  desc: Reference to env command name
  crit: notable
  if:
    type: symbol
    exact: "env"
- id: grep-secrets-pattern--rx-1
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'grep.{0,20}-iE.{0,20}(key|secret)'
  count_max: 1013247
- id: grep-secrets-pattern--rx-2
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'grep.{0,20}-iE.{0,20}(token|api)'
  count_max: 1013248
- id: grep-secrets-pattern--rx-3
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'grep.{0,20}-iE.{0,20}(pass|db)'
  count_max: 1013249
- id: grep-secrets-pattern--rx-4
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'grep.{0,20}-iE.{0,20}(mongo|pg)'
  count_max: 1013250
- id: grep-secrets-pattern--rx-5
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'grep.{0,20}-iE.{0,20}(mysql|openai)'
  count_max: 1013251
- id: grep-secrets-pattern--rx-6
  desc: Regex component marker
  crit: component
  if:
    type: text
    regex: 'grep.{0,20}-iE.{0,20}(anthropic)'
  count_max: 1013252
- id: env-echo-secret-vars
  desc: Echoes credential environment variables
  crit: suspicious
  if:
    type: text
    regex: 'echo\s+\$(AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|OPENAI_API_KEY|DATABASE_URL)'
composite_rules:
- id: env-grep-secrets
  desc: Greps environment variables for secrets
  crit: suspicious
  conf: 0.9
  all:
  - id: env-cmd
  - id: grep-secrets-pattern
- id: grep-secrets-pattern
  desc: Grep pattern for secrets
  crit: suspicious
  conf: 1.0
  any:
  - id: grep-secrets-pattern--rx-1
  - id: grep-secrets-pattern--rx-2
  - id: grep-secrets-pattern--rx-3
  - id: grep-secrets-pattern--rx-4
  - id: grep-secrets-pattern--rx-5
  - id: grep-secrets-pattern--rx-6
