defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  attack: T1552.001
  for: [scripts, binaries]
composite_rules:
  - id: credential-access-notable
    desc: Reads credential environment variables
    crit: notable
    conf: 0.85
    # An imported getenv plus all-caps strings is not enough evidence in a
    # native ELF: libraries commonly contain token/password-like constants
    # unrelated to environment reads. Native harvesting has its own composite
    # requiring an environ[] access and multiple credential-like identifiers.
    for: [scripts]
    all:
      - id: micro-behaviors/os/env/vars/access::getenv
      - id: micro-behaviors/os/env/vars/credentials/
