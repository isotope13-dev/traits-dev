# Hardcoded credential planting via environment variable assignment
# ATT&CK: T1552.001 (Credentials In Files)
defaults:
  for: [javascript, typescript]
  platforms: [unix, windows]
  attack: T1552.001
traits:
  - id: benign-process-env-assignment
    desc: Benign process.env assignment
    crit: baseline
    conf: 0.9
    if:
      type: text
      regex: 'process\.env\.(NODE_ENV|OM_INIT_FLOW|DOTENV_CONFIG_QUIET|PW_CAPTURE_SCREENSHOTS)\s*='
composite_rules:
  - id: env-credential-plant
    desc: Hardcoded secret token planted in process.env
    crit: suspicious
    conf: 0.9
    near_lines: 20
    near_bytes: 500
    all:
      - id: micro-behaviors/os/env/vars/access::js-process-env-write
      - id: objectives/credential-access/env/secrets/
    # Test harnesses routinely set process.env.<TOKEN> = 'fake' to stub
    # credentials before exercising code under test.
    unless:
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/package/testing/harness/runtime::is-test
      - id: benign-process-env-assignment
