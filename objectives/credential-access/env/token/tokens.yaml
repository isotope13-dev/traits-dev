defaults:
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: bearer-token-hex-16
    desc: Hardcoded 16-byte hex Bearer token
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: Bearer [a-fA-F0-9]{24,}\b
    unless:
      - id: well-known/tool/offensive/projectdiscovery/
  - id: x-auth-token-hex-32
    desc: Hardcoded X-Auth-Token hex secret
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: (?i)X-Auth-Token["'\s:=]{0,16}[a-f0-9]{32,}
  - id: slack-xoxp-token
    desc: Hardcoded Slack user OAuth token
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: xoxp-\d{10,}-\d{10,}-\d{10,}-[a-f0-9]{20,}
  - id: slack-xoxb-token
    desc: Hardcoded Slack bot OAuth token
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: xoxb-\d{10,}-\d{10,}-[a-zA-Z0-9]{20,}
    unless:
      - id: well-known/app/atuin::atuin-binary
  - id: vault-service-token
    # HashiCorp Vault token format: hvs.=service, hvb.=batch, hvr.=recovery,
    # each followed by a long base62 body. The prefix+length make a live
    # hardcoded Vault token distinctive (near-zero benign collision).
    desc: Hardcoded HashiCorp Vault token
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: \bhv[sbr]\.[A-Za-z0-9_-]{24,}
  - id: slack-xoxa-token
    desc: Hardcoded Slack app-level token
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: xoxa-\d+-[a-zA-Z0-9]{20,}
  - id: slack-xoxs-token
    desc: Hardcoded Slack session token
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: xoxs-\d+-[a-zA-Z0-9]{20,}
