defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: env-to-hash
    desc: ENV to hash conversion
    crit: suspicious
    conf: 0.85
    attack: T1018
    if:
      type: string_literal
      regex: ENV\.to_hash|ENV\.to_h
  - id: env-serialization
    desc: Environment variable serialization
    crit: suspicious
    conf: 0.8
    attack: T1018
    if:
      type: string_literal
      regex: \bENV(\.\w{1,40}|\[[^\]]{1,80}\]){0,4}\.(to_yaml|to_json|inspect)\b
  - id: env-bracket-access
    desc: ENV bracket access
    crit: suspicious
    conf: 0.65
    attack: T1018
    if:
      type: string_literal
      regex: ENV\[.{0,50}URL_HOST|ENV\[.{0,50}HOST
    unless:
      - id: well-known/lib/aws-sdk-ruby::library
  - id: host-env-check
    desc: Host environment validation
    crit: suspicious
    conf: 0.7
    attack: T1016
    if:
      type: string_literal
      regex: ENV.{0,50}localhost|ENV.{0,50}include\?|ENV\[.{0,50}\]\[0\]
