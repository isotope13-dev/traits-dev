defaults:
  platforms: [windows, unix]
  attack: T1552.001
  for:
  - javascript
traits:
- id: npm-token--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'process\s*\.\s*env\s*(\.\s*NPM_TOKEN|\[\s*[''"]NPM_TOKEN[''"]\s*\])'
  count_max: 1013612
- id: npm-token--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\{\s*.{0,200}\bNPM_TOKEN\b.{0,200}\}\s*=\s*process\s*\.\s*env'
  count_max: 1013613
- id: node-auth-token--rx-3
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: 'process\s*\.\s*env\s*(\.\s*NODE_AUTH_TOKEN|\[\s*[''"]NODE_AUTH_TOKEN[''"]\s*\])'
  count_max: 1013614
- id: node-auth-token--rx-4
  desc: Regex component marker
  crit: component
  conf: 0.95
  if:
    type: text
    regex: '\{\s*.{0,200}\bNODE_AUTH_TOKEN\b.{0,200}\}\s*=\s*process\s*\.\s*env'
  count_max: 1013615
- id: npm-config-token-lower
  desc: npm_config token (lowercase)
  crit: notable
  conf: 0.8
  if:
    type: string_literal
    regex: npm_config.{0,30}token
- id: npm-config-token-upper
  desc: NPM_CONFIG TOKEN (uppercase)
  crit: notable
  conf: 0.8
  if:
    type: string_literal
    regex: NPM_CONFIG.{0,30}TOKEN
- id: npmrc-publishing-version-context
  desc: npmrc package publishing message context
  crit: baseline
  conf: 0.86
  if:
    type: string_literal
    substr: "Publishing version:"
- id: dot-npmrc
  desc: .npmrc file reference
  crit: suspicious
  conf: 0.8
  unless:
  - id: npmrc-benign-context
  if:
    type: string_literal
    substr: .npmrc
- id: npmrc-word
  desc: npmrc word reference
  crit: suspicious
  conf: 0.8
  unless:
  - id: npmrc-benign-context
  if:
    type: string_literal
    substr: npmrc
- id: npmrc-registry-auth-token
  desc: npmrc registry client primary context
  crit: component
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: text
    regex: 'registry-auth-token|ini\.parse\(input\)|setNpmrc'
- id: npmrc-token-to-npmrc-text
  desc: npm token to npmrc writing text context
  crit: component
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: text
    regex: 'npmToken to npmrc|Writing \.npmrc to \$\{basedir\}'
- id: npmrc-tool-config-context
  desc: npmrc package manager config and redaction context
  crit: baseline
  conf: 0.88
  for: [javascript, typescript]
  if:
    type: text
    regex: 'name:\s*[''"]npmrc[''"]|packageFile\.npmrc|redactedFields|configSerializer'
- id: npmrc-file-extension-list-context
  desc: npmrc filename in extension allowlist context
  crit: component
  conf: 0.9
  for: [javascript, typescript]
  if:
    type: text
    regex: '[''"]wgetrc[''"],\s*[''"]npmrc[''"],\s*[''"]yarnrc[''"]'
composite_rules:
- id: npmrc-benign-context
  desc: Benign npmrc reference context
  crit: component
  conf: 0.88
  any:
  - id: npmrc-publishing-version-context
  - id: metadata/library/structure::vscode-icon-theme-catalog
  - id: micro-behaviors/os/env/vars/access::npm-embedded-build-env-dump
  - id: metadata/package/testing/presence/fixture::test-filename-pattern
  - id: metadata/package/testing/harness/runtime::is-test
  - id: metadata/library/runtime::update-notifier-npmrc-context
  - id: metadata/library/structure::vscode-material-icon-map-bundle
  - id: npmrc-registry-client-context
  - id: npmrc-tool-config-context
  - id: npmrc-file-extension-list-context
- id: npmrc-registry-client-context
  desc: npmrc registry client context
  crit: baseline
  conf: 0.88
  for: [javascript, typescript]
  any:
  - id: npmrc-registry-auth-token
  - id: npmrc-token-to-npmrc-text
- id: npm-config-token
  desc: npm_config token access
  crit: suspicious
  conf: 0.9
  any:
  - id: npm-config-token-lower
  - id: npm-config-token-upper
- id: npmrc-access
  desc: .npmrc file access (contains tokens)
  crit: suspicious
  conf: 0.9
  any:
  - id: dot-npmrc
  - id: npmrc-word
- id: npm-token
  desc: NPM_TOKEN environment variable access
  crit: suspicious
  conf: 0.95
  any:
  - id: npm-token--rx-1
  - id: npm-token--rx-2
- id: node-auth-token
  desc: NODE_AUTH_TOKEN environment variable access
  crit: suspicious
  conf: 0.95
  any:
  - id: node-auth-token--rx-3
  - id: node-auth-token--rx-4
