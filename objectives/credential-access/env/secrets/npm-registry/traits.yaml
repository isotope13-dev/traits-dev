defaults:
  platforms: [windows, unix]
  attack: T1552.001
  for:
  - javascript
traits:
- id: npm-config-token-lower
  desc: npm_config token (lowercase)
  crit: notable
  conf: 0.8
  if:
    type: string_literal
    regex: npm_config.{0,30}token
- id: npm-config-token-upper
  desc: NPM_CONFIG TOKEN (uppercase)
  crit: notable
  conf: 0.8
  if:
    type: string_literal
    regex: NPM_CONFIG.{0,30}TOKEN
- id: npmrc-access
  desc: JavaScript directly reads .npmrc file
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: '(readFile(Sync)?|createReadStream)\s*\([^)]{0,80}\.npmrc\b'
  unless:
  - id: metadata/lang/scripted::dts-declaration-file
composite_rules:
- id: npm-config-token
  desc: npm_config token access
  crit: suspicious
  conf: 0.9
  any:
  - id: npm-config-token-lower
  - id: npm-config-token-upper
- id: npm-token
  desc: NPM_TOKEN environment variable access
  crit: suspicious
  conf: 0.95
  any:
  - id: micro-behaviors/os/env/vars/credentials::npm-token-env-read
  unless:
  - id: well-known/tool/detection/security-scanner::secret-redactor-context
- id: node-auth-token
  desc: NODE_AUTH_TOKEN environment variable access
  crit: suspicious
  conf: 0.95
  any:
  - id: micro-behaviors/os/env/vars/credentials::node-auth-token-env-read
  unless:
  - id: micro-behaviors/os/package-manager/publish::npm-publish-command
