defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
traits:
- id: env-npm-token
  desc: NPM_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.NPM_TOKEN
  unless:
  - id: well-known/tool/detection/security-scanner/
  - id: objectives/credential-access/env/secrets/npm-registry/
- id: node-npm-get-registry-url-marker
  desc: Node npm registry URL helper marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: getRegistryUrl
- id: node-npm-bearer-env-token-marker
  desc: Node npm bearer token header marker
  crit: component
  conf: 0.9
  if:
    type: text
    substr: headers.authorization = `Bearer ${process.env.NPM_TOKEN}`
- id: env-npm-auth-token
  desc: NPM_AUTH_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.NPM_AUTH_TOKEN
- id: env-node-auth-token
  desc: NODE_AUTH_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.NODE_AUTH_TOKEN
composite_rules:
- id: node-npm-registry-client-auth-marker
  desc: Node npm registry client token marker
  crit: baseline
  conf: 0.9
  any:
  - id: micro-behaviors/os/env/vars/access::npmrc-registry-auth-token
  - id: node-npm-get-registry-url-marker
  - id: node-npm-bearer-env-token-marker
- id: node-npm-token
  desc: Accesses NPM authentication tokens
  crit: suspicious
  conf: 0.95
  any:
  - id: env-npm-token
  - id: env-npm-auth-token
  - id: env-node-auth-token
