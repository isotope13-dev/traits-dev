defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
traits:
- id: env-npm-token
  desc: NPM_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.NPM_TOKEN
  unless:
  - id: micro-behaviors/data/text/security/scanner::secret-redactor-context
  - id: node-npm-registry-client-auth-context
- id: node-npm-get-registry-url-context
  desc: Node npm registry URL helper context
  crit: component
  conf: 0.9
  if:
    type: text
    substr: getRegistryUrl
- id: node-npm-bearer-env-token-context
  desc: Node npm bearer token header context
  crit: component
  conf: 0.9
  if:
    type: text
    substr: headers.authorization = `Bearer ${process.env.NPM_TOKEN}`
- id: env-npm-auth-token
  desc: NPM_AUTH_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.NPM_AUTH_TOKEN
- id: env-node-auth-token
  desc: NODE_AUTH_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.NODE_AUTH_TOKEN
composite_rules:
- id: node-npm-registry-client-auth-context
  desc: Node npm registry client token context
  crit: baseline
  conf: 0.9
  any:
  - id: objectives/credential-access/env/secrets/npm-registry::npmrc-registry-auth-token
  - id: node-npm-get-registry-url-context
  - id: node-npm-bearer-env-token-context
- id: node-npm-token
  desc: Accesses NPM authentication tokens
  crit: suspicious
  conf: 0.95
  any:
  - id: env-npm-token
  - id: env-npm-auth-token
  - id: env-node-auth-token
