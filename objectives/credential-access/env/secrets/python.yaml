defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - python
traits:
  - id: keyword-token
    desc: TOKEN keyword in env variable
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: '[''"].{0,120}TOKEN.{0,120}[''"]'
  - id: keyword-key
    desc: KEY keyword in env variable
    crit: notable
    conf: 0.65
    if:
      type: string_value
      regex: '[''"].{0,120}KEY.{0,120}[''"]'
  - id: keyword-secret
    desc: SECRET keyword in env variable
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: '[''"].{0,120}SECRET.{0,120}[''"]'
  - id: keyword-pass
    desc: PASS keyword in env variable
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: '[''"].{0,120}PASS.{0,120}[''"]'
  - id: keyword-auth
    desc: AUTH keyword in env variable
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: '[''"].{0,120}AUTH.{0,120}[''"]'
  - id: keyword-pwd
    desc: PWD keyword in env variable
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: '[''"].{0,120}PWD.{0,120}[''"]'
  - id: keyword-cred
    desc: CRED keyword in env variable
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: '[''"].{0,120}CRED.{0,120}[''"]'
composite_rules:
  - id: sensitive-env-keywords
    desc: Sensitive keywords in env variable
    any:
      - id: keyword-token
      - id: keyword-key
      - id: keyword-secret
      - id: keyword-pass
      - id: keyword-auth
      - id: keyword-pwd
      - id: keyword-cred
    crit: notable
  - id: python-os-getenv
    desc: Accesses sensitive environment variable via os.getenv
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/env/vars::getenv
      - id: sensitive-env-keywords
  - id: python-os-environ
    desc: Accesses sensitive environment variable via os.environ
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: sensitive-env-keywords
  - id: python-env-key
    desc: Accesses sensitive environment variable
    crit: suspicious
    any:
      - id: python-os-getenv
      - id: python-os-environ
  - id: aws-credentials-access
    desc: Accesses AWS credential environment variables
    crit: suspicious
    conf: 0.95
    attack: T1552.001
    all:
      - id: micro-behaviors/os/env/vars::getenv
      - id: micro-behaviors/fs/path/sensitive/credentials::aws-credentials-dup
