defaults:
  platforms: [windows, unix]
  attack: T1552.001
  for:
    - javascript
traits:
  - id: npm-token
    desc: NPM_TOKEN environment variable access
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'process\s*\.\s*env\s*(?:\.\s*NPM_TOKEN|\[\s*[''"]NPM_TOKEN[''"]\s*\])|\{\s*.{0,200}\bNPM_TOKEN\b.{0,200}\}\s*=\s*process\s*\.\s*env'
  - id: node-auth-token
    desc: NODE_AUTH_TOKEN environment variable access
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'process\s*\.\s*env\s*(?:\.\s*NODE_AUTH_TOKEN|\[\s*[''"]NODE_AUTH_TOKEN[''"]\s*\])|\{\s*.{0,200}\bNODE_AUTH_TOKEN\b.{0,200}\}\s*=\s*process\s*\.\s*env'
  - id: npm-config-token-lower
    desc: npm_config token (lowercase)
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: npm_config.{0,30}token
  - id: npm-config-token-upper
    desc: NPM_CONFIG TOKEN (uppercase)
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: NPM_CONFIG.{0,30}TOKEN
  - id: dot-npmrc
    desc: .npmrc file reference
    crit: suspicious
    conf: 0.8
    unless:
      - type: string_literal
        substr: "Publishing version:"
    if:
      type: string_literal
      substr: .npmrc
  - id: npmrc-word
    desc: npmrc word reference
    crit: suspicious
    conf: 0.8
    unless:
      - type: string_literal
        substr: "Publishing version:"
    if:
      type: string_literal
      substr: npmrc
composite_rules:
  - id: npm-config-token
    desc: npm_config token access
    crit: suspicious
    conf: 0.9
    any:
      - id: npm-config-token-lower
      - id: npm-config-token-upper
  - id: npmrc-access
    desc: .npmrc file access (contains tokens)
    crit: suspicious
    conf: 0.9
    any:
      - id: dot-npmrc
      - id: npmrc-word
