defaults:
  platforms: [windows, unix]
  attack: T1552.001
  for:
    - javascript
traits:
  - id: npm-token
    desc: NPM_TOKEN environment variable access
    crit: suspicious
    conf: 0.95
    not:
      - substr: COREPACK_NPM_TOKEN
    if:
      type: string_literal
      substr: NPM_TOKEN
  - id: node-auth-token
    desc: NODE_AUTH_TOKEN environment variable access
    crit: suspicious
    conf: 0.95
    if:
      type: string_literal
      substr: NODE_AUTH_TOKEN
  - id: npm-config-token-lower
    desc: npm_config token (lowercase)
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: npm_config.{0,30}token
  - id: npm-config-token-upper
    desc: NPM_CONFIG TOKEN (uppercase)
    crit: notable
    conf: 0.8
    if:
      type: string_literal
      regex: NPM_CONFIG.{0,30}TOKEN
  - id: dot-npmrc
    desc: .npmrc file reference
    crit: notable
    conf: 0.8
    unless:
      - type: string_literal
        substr: "Publishing version:"
    if:
      type: string_literal
      substr: .npmrc
  - id: npmrc-word
    desc: npmrc word reference
    crit: notable
    conf: 0.8
    unless:
      - type: string_literal
        substr: "Publishing version:"
    if:
      type: string_literal
      substr: npmrc
composite_rules:
  - id: npm-config-token
    desc: npm_config token access
    crit: suspicious
    conf: 0.9
    any:
      - id: npm-config-token-lower
      - id: npm-config-token-upper
  - id: npmrc-access
    desc: .npmrc file access (contains tokens)
    crit: suspicious
    conf: 0.9
    any:
      - id: dot-npmrc
      - id: npmrc-word
