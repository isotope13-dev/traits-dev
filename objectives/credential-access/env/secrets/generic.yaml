composite_rules:
- id: github-token-indicators
  desc: GitHub token variable indicators
  crit: suspicious
  conf: 0.7
  any:
  - id: github-token-var
  - id: gh-token-var
- id: github-token
  desc: GitHub token environment variable access
  crit: suspicious
  conf: 0.7
  all:
  - id: github-token-indicators
  - id: metadata/lang/scripted::env-access
- id: api-key-generic
  desc: Generic API_KEY environment variable access
  crit: suspicious
  conf: 0.8
  any:
  - id: api-key-env-bracket
  - id: api-key-getenv
  - id: api-key-process-env
- id: secret-key-generic
  desc: Generic SECRET_KEY environment variable access
  crit: notable
  conf: 0.8
  any:
  - id: secret-key-generic--rx-1
  - id: secret-key-generic--rx-2
  - id: secret-key-generic--rx-3
  - id: secret-key-generic--rx-4
  - id: secret-key-generic--rx-5
  unless:
  - id: objectives/supply-chain/trojanized/application/context::hcaptcha-siteverify-secret-context
  - id: objectives/supply-chain/credential-theft::legitimate-python-env-config-context
- id: openai-api-key
  desc: OPENAI_API_KEY environment variable access
  crit: notable
  conf: 0.85
  any:
  - id: openai-api-key--rx-6
  - id: openai-api-key--rx-7
  - id: openai-api-key--rx-8
  - id: openai-api-key--rx-9
  - id: openai-api-key--rx-10
