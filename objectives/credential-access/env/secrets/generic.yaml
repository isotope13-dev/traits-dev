defaults:
  attack: T1552.001
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: github-token-var
    desc: GITHUB_TOKEN environment variable
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: GITHUB_TOKEN
  - id: gh-token-var
    desc: GH_TOKEN environment variable
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: GH_TOKEN
  - id: aws-access-key-dup
    desc: AWS_ACCESS_KEY environment variable access
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: ^AWS_ACCESS_KEY
  - id: aws-secret
    desc: AWS_SECRET environment variable access
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: ^AWS_SECRET
  - id: api-key-generic
    desc: Generic API_KEY environment variable access
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: API_KEY
  - id: secret-key-generic
    desc: Generic SECRET_KEY environment variable access
    crit: notable
    conf: 0.8
    if:
      type: string_value
      word: SECRET_KEY
  - id: discord-token
    desc: DISCORD_TOKEN environment variable access
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: DISCORD_TOKEN
  - id: slack-token
    desc: SLACK_TOKEN environment variable access
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: SLACK_TOKEN
  - id: openai-api-key
    desc: OPENAI_API_KEY environment variable access
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: OPENAI_API_KEY
  - id: anthropic-api-key
    desc: ANTHROPIC_API_KEY environment variable access
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: ANTHROPIC_API_KEY
composite_rules:
  - id: github-token-indicators
    desc: GitHub token variable indicators
    crit: notable
    conf: 0.7
    any:
      - id: github-token-var
      - id: gh-token-var
  - id: github-token
    desc: GitHub token environment variable access
    crit: notable
    conf: 0.7
    all:
      - id: github-token-indicators
      - id: metadata/lang::env-access
