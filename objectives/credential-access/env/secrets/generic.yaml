defaults:
  attack: T1552.001
  platforms:
  - windows
  - unix
  for: [scripts, binaries]
traits:
- id: github-token-var
  desc: GITHUB_TOKEN environment variable
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: GITHUB_TOKEN
  not:
  - substr: process.env.GITHUB_TOKEN
- id: gh-token-var
  desc: GH_TOKEN environment variable
  crit: suspicious
  conf: 0.85
  if:
    type: text
    regex: (^|[^A-Z0-9_])GH_TOKEN([^A-Z0-9_]|$)
- id: aws-access-key-dup
  desc: AWS_ACCESS_KEY environment variable access
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: ^AWS_ACCESS_KEY
- id: aws-secret
  desc: AWS_SECRET environment variable access
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: ^AWS_SECRET
- id: api-key-env-bracket
  desc: API_KEY via bracketed env access
  crit: component
  conf: 0.8
  if:
    type: raw
    regex: ENV\[['"]API_KEY['"]\]|os\.environ\[['"]API_KEY['"]\]
- id: api-key-getenv
  desc: API_KEY via getenv access
  crit: component
  conf: 0.8
  if:
    type: raw
    regex: getenv\(['"]API_KEY['"]\)|System\.getenv\(['"]API_KEY['"]\)
- id: api-key-process-env
  desc: API_KEY via process env access
  crit: component
  conf: 0.8
  if:
    type: text
    substr: process.env.API_KEY
- id: secret-key-generic--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.8
  if:
    type: text
