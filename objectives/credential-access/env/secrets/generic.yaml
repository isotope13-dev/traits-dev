defaults:
  attack: T1552.001
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
traits:
  - id: github-token-var
    desc: GITHUB_TOKEN environment variable
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: GITHUB_TOKEN
  - id: gh-token-var
    desc: GH_TOKEN environment variable
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: GH_TOKEN
  - id: aws-access-key-dup
    desc: AWS_ACCESS_KEY environment variable access
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: ^AWS_ACCESS_KEY
  - id: aws-secret
    desc: AWS_SECRET environment variable access
    crit: notable
    conf: 0.85
    if:
      type: string_value
      regex: ^AWS_SECRET
  - id: api-key-env-bracket
    desc: API_KEY via bracketed env access
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: ENV\[['"]API_KEY['"]\]|os\.environ\[['"]API_KEY['"]\]
  - id: api-key-getenv
    desc: API_KEY via getenv access
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: getenv\(['"]API_KEY['"]\)|System\.getenv\(['"]API_KEY['"]\)
  - id: api-key-process-env
    desc: API_KEY via process env access
    crit: component
    conf: 0.8
    if:
      type: raw
      regex: process\.env\.API_KEY
  - id: secret-key-generic
    desc: Generic SECRET_KEY environment variable access
    crit: notable
    conf: 0.8
    if:
      type: string_value
      word: SECRET_KEY
  - id: discord-token
    desc: DISCORD_TOKEN environment variable access
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: (^|[^A-Z0-9_])DISCORD_TOKEN([^A-Z0-9_]|$)
  - id: slack-token
    desc: SLACK_TOKEN environment variable access
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: (^|[^A-Z0-9_])SLACK_TOKEN([^A-Z0-9_]|$)
  - id: openai-api-key
    desc: OPENAI_API_KEY environment variable access
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: OPENAI_API_KEY
  - id: anthropic-api-key
    desc: ANTHROPIC_API_KEY environment variable access
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: ANTHROPIC_API_KEY
composite_rules:
  - id: github-token-indicators
    desc: GitHub token variable indicators
    crit: notable
    conf: 0.7
    any:
      - id: github-token-var
      - id: gh-token-var
  - id: github-token
    desc: GitHub token environment variable access
    crit: notable
    conf: 0.7
    all:
      - id: github-token-indicators
      - id: metadata/lang/scripted::env-access
  - id: api-key-generic
    desc: Generic API_KEY environment variable access
    crit: notable
    conf: 0.8
    any:
      - id: api-key-env-bracket
      - id: api-key-getenv
      - id: api-key-process-env
