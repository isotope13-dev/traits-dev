defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
traits:
- id: env-ctf-flag
  desc: CTF FLAG/flag environment variable access
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: process\.env\.(FLAG|flag)\b
- id: env-ctf-flag-bracket
  desc: CTF FLAG/flag env access (bracket notation)
  crit: suspicious
  conf: 0.92
  if:
    type: text
    regex: process\.env\[\s*['"](FLAG|flag)['"]\s*\]
