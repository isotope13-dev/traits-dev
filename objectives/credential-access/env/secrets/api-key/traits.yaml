defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
  - python
  - ruby
  - java
traits:
- id: api-key-env-bracket
  desc: API_KEY via bracketed env access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: ENV\[['"]API_KEY['"]\]|os\.environ\[['"]API_KEY['"]\]
- id: api-key-getenv
  desc: API_KEY via getenv access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: getenv\(['"]API_KEY['"]\)|System\.getenv\(['"]API_KEY['"]\)
- id: api-key-process-env
  desc: API_KEY via process env access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: '\bprocess\.env\.API_KEY\b'
- id: dev-api-key-base-decode
  desc: DEV_API_KEY base decoder use
  crit: component
  conf: 0.78
  if:
    type: text
    regex: DEV_API_KEY.{0,20}(atob|Buffer\.from)
- id: dev-secret-key-base-decode
  desc: DEV_SECRET_KEY base decoder use
  crit: component
  conf: 0.78
  if:
    type: text
    regex: DEV_SECRET_(KEY|VALUE).{0,20}(atob|Buffer\.from)
- id: secret-key-process-env-dot
  desc: SECRET_KEY via process.env dot access
  crit: component
  conf: 0.8
  if:
    type: text
    substr: process.env.SECRET_KEY
- id: secret-key-process-env-bracket
  desc: SECRET_KEY via process.env bracket access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: process\.env\[['"]SECRET_KEY['"]\]
- id: secret-key-getenv
  desc: SECRET_KEY via getenv access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: getenv\(['"]SECRET_KEY['"]\)
- id: secret-key-os-environ
  desc: SECRET_KEY via os.environ access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: os\.environ\[['"]SECRET_KEY['"]\]
- id: secret-key-system-getenv
  desc: SECRET_KEY via System.getenv access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: System\.getenv\(['"]SECRET_KEY['"]\)
composite_rules:
- id: secret-key-generic
  desc: Generic SECRET_KEY environment variable access
  crit: notable
  conf: 0.8
  any:
  - id: secret-key-process-env-dot
  - id: secret-key-process-env-bracket
  - id: secret-key-getenv
  - id: secret-key-os-environ
  - id: secret-key-system-getenv
  unless:
  - id: metadata/package/quality/false-positives::benign-trojanized-fp-context
  - id: objectives/supply-chain/credential-theft/env/
- id: api-key-generic
  desc: Generic API_KEY environment variable access
  crit: notable
  conf: 0.8
  any:
  - id: api-key-env-bracket
  - id: api-key-getenv
  - id: api-key-process-env
