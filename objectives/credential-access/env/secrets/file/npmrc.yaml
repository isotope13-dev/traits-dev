defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  mbc: E1059
  attack: T1552.001
traits:
  - id: npm-auth-token-extraction
    desc: NPM auth token extraction via string replace
    crit: suspicious
    conf: 1.0
    if:
      type: text
      regex: \.replace\(\s*['"]//registry\.npmjs\.org/:_authToken=['"]\s*,
  - id: npm-auth-token-key-raw
    desc: NPM auth token key string
    crit: notable
    conf: 0.8
    unless:
      - type: text
        substr: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN"
      - type: string_literal
        exact: "Publishing version:"
      - type: basename
        exact: "publish.js"
    if:
      type: string_literal
      exact: "//registry.npmjs.org/:_authToken="
