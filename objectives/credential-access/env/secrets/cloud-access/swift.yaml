defaults:
  platforms: [windows, unix]
  for: [swift]
  attack: T1552.001

traits:
  - id: swift-aws-env-secret-names
    desc: Swift AWS secret env names
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'AWS_ACCESS_KEY_ID[\s\S]{0,220}AWS_SECRET_ACCESS_KEY'

  - id: swift-azure-env-secret-names
    desc: Swift Azure secret env names
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: 'AZURE_CLIENT_ID[\s\S]{0,220}AZURE_CLIENT_SECRET'

  - id: swift-gcp-env-secret-names
    desc: Swift GCP credential env names
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'GOOGLE_APPLICATION_CREDENTIALS[\s\S]{0,220}GOOGLE_CLOUD_PROJECT'

  - id: swift-secret-env-filter
    desc: Swift secret env suffix filter
    crit: suspicious
    conf: 0.86
    if:
      type: text
      regex: 'hasSuffix\("_SECRET"\)[\s\S]{0,220}hasSuffix\("_TOKEN"\)'

composite_rules:
  - id: swift-cloud-env-secret-harvest
    desc: Swift cloud env secret harvest
    crit: suspicious
    conf: 0.96
    needs: 2
    any:
      - id: swift-aws-env-secret-names
      - id: swift-azure-env-secret-names
      - id: swift-gcp-env-secret-names
      - id: swift-secret-env-filter
