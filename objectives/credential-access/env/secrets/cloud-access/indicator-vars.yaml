defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
  - python
  - shell
  - ruby
traits:
- id: aws-access-key-dup
  desc: AWS_ACCESS_KEY environment variable access
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: "^AWS_ACCESS_KEY"
- id: aws-secret
  desc: AWS_SECRET environment variable access
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: "^AWS_SECRET"
