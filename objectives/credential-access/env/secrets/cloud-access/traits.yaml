defaults:
  platforms: [windows, unix]
  for:
  - javascript
  - typescript
  attack: T1552.001
traits:
- id: env-aws-access-key
  desc: AWS_ACCESS_KEY env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.AWS_ACCESS_KEY
  unless:
  - id: well-known/tool/detection/security-scanner/
- id: env-aws-secret
  desc: AWS_SECRET env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.AWS_SECRET
- id: env-aws-session-token
  desc: AWS_SESSION_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.AWS_SESSION_TOKEN
- id: env-cloudflare-token
  desc: CLOUDFLARE token env access
  crit: suspicious
  conf: 0.82
  if:
    type: text
    regex: 'process\.env\.(CLOUDFLARE_API_TOKEN|CF_API_TOKEN)'
  unless:
  - type: text
    regex: 'import\s*\{\s*defineConfig\s*\}\s*from\s*["'']drizzle-kit["'']'
- id: env-r2-access-key--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: 'process\.env\.(R2_ACCESS_KEY_ID|R2_SECRET_ACCESS_KEY)'
  count_max: 1013540
- id: env-r2-access-key--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: 'process\.env\.(CLOUDFLARE_R2_ACCESS_KEY_ID|CLOUDFLARE_R2_SECRET_ACCESS_KEY)'
  count_max: 1013541
- id: env-google-prefix
  desc: GOOGLE_ env prefix access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.GOOGLE_
- id: env-gcp-prefix
  desc: GCP_ env prefix access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.GCP_
- id: env-azure-prefix
  desc: AZURE_ env prefix access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.AZURE_
  unless:
  - id: well-known/tool/detection/security-scanner/
- id: env-digitalocean-prefix
  desc: DIGITALOCEAN_ env prefix access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.DIGITALOCEAN_
- id: env-heroku-api
  desc: HEROKU_API env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.HEROKU_API
composite_rules:
- id: env-r2-access-key
  desc: Cloudflare R2 key env access
  crit: suspicious
  conf: 0.86
  any:
  - id: env-r2-access-key--rx-1
  - id: env-r2-access-key--rx-2
- id: node-aws
  desc: Accesses AWS credentials from environment
  crit: suspicious
  conf: 0.9
  any:
  - id: env-aws-access-key
  - id: env-aws-secret
  - id: env-aws-session-token
- id: node-cloud
  desc: Accesses cloud provider credentials
  crit: suspicious
  conf: 0.9
  any:
  - id: env-google-prefix
  - id: env-gcp-prefix
  - id: env-azure-prefix
  - id: env-digitalocean-prefix
  - id: env-heroku-api
  - id: env-cloudflare-token
  - id: env-r2-access-key
