defaults:
  platforms: [windows, unix]
  for:
  - javascript
  - typescript
  attack: T1552.001
traits:
- id: env-aws-access-key
  desc: AWS_ACCESS_KEY env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.AWS_ACCESS_KEY
  unless:
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/app/neurolink::benign-archive-context
  - id: well-known/app/neurolink::bedrock-provider-context
- id: env-aws-secret
  desc: AWS_SECRET env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.AWS_SECRET
  unless:
  - id: well-known/app/neurolink::benign-archive-context
  - id: well-known/app/neurolink::bedrock-provider-context
- id: env-aws-session-token
  desc: AWS_SESSION_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.AWS_SESSION_TOKEN
  unless:
  - id: well-known/app/neurolink::benign-archive-context
  - id: well-known/app/neurolink::bedrock-provider-context
- id: env-cloudflare-token
  desc: CLOUDFLARE token env access
  crit: notable
  conf: 0.82
  if:
    type: text
    regex: 'process\.env\.(CLOUDFLARE_API_TOKEN|CF_API_TOKEN)'
  unless:
  - type: text
    regex: 'import\s*\{\s*defineConfig\s*\}\s*from\s*["'']drizzle-kit["'']'
- id: env-r2-access-key--rx-1
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: 'process\.env\.(R2_ACCESS_KEY_ID|R2_SECRET_ACCESS_KEY)'
  count_max: 1013540
- id: env-r2-access-key--rx-2
  desc: Regex component marker
  crit: component
  conf: 0.86
  if:
    type: text
    regex: 'process\.env\.(CLOUDFLARE_R2_ACCESS_KEY_ID|CLOUDFLARE_R2_SECRET_ACCESS_KEY)'
  count_max: 1013541
- id: env-google-prefix
  desc: Google credential env access
  crit: notable
  conf: 0.72
  if:
    id: micro-behaviors/os/env/vars/credentials::google-cloud-credential-env-read
  unless:
  - id: metadata/package/documentation::has-jsdoc-example
  - id: metadata/package/documentation::documentation-dir-path
  - id: well-known/app/neurolink::benign-archive-context
  - id: well-known/app/neurolink::bedrock-provider-context
  - id: well-known/lib/policysynth-agents::benign-archive-context
  - id: well-known/app/jinicode::provider-user-agent
- id: env-gcp-prefix
  desc: GCP credential env access
  crit: suspicious
  conf: 0.72
  if:
    type: string_literal
    regex: 'process\.env\.GCP_[A-Z0-9_]*(TOKEN|KEY|SECRET|CREDENTIALS?)\b'
  unless:
  - id: metadata/package/documentation::has-jsdoc-example
  - id: metadata/package/documentation::documentation-dir-path
  - id: well-known/app/neurolink::benign-archive-context
  - id: well-known/app/neurolink::bedrock-provider-context
- id: env-azure-prefix
  desc: Azure credential env access
  crit: notable
  conf: 0.72
  if:
    id: micro-behaviors/os/env/vars/credentials::azure-cloud-credential-env-read
  unless:
  - id: well-known/tool/detection/security-scanner/
  - id: metadata/package/documentation::has-jsdoc-example
  - id: metadata/library/cloud-sdk::azure-identity-js-sdk
  - id: well-known/app/dbcode::extension-context
  - id: well-known/app/vscode-marketplace::m365-agents-toolkit-vsix
  - id: well-known/app/neurolink::benign-archive-context
  - id: well-known/lib/policysynth-agents::benign-archive-context
- id: env-digitalocean-prefix
  desc: DigitalOcean credential env access
  crit: suspicious
  conf: 0.72
  if:
    type: text
    regex: 'process\.env\.DIGITALOCEAN_[A-Z0-9_]*(TOKEN|KEY|SECRET|CREDENTIALS?)\b'
  unless:
  - id: metadata/package/documentation::has-jsdoc-example
- id: env-heroku-api
  desc: HEROKU_API env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.HEROKU_API
composite_rules:
- id: env-r2-access-key
  desc: Cloudflare R2 key env access
  crit: suspicious
  conf: 0.86
  any:
  - id: env-r2-access-key--rx-1
  - id: env-r2-access-key--rx-2
- id: node-aws
  desc: Reads AWS credential environment variables
  crit: notable
  conf: 0.9
  unless:
  - id: metadata/library/data::aws-sdk-js-v3-bundle
  - id: well-known/lib/aws-sdk-js/
  - id: well-known/lib/cline-llms/
  - id: well-known/tool/development/anthropic-claude-agent/
  - id: well-known/tool/development/autohq::autohq-cli-source-marker
  - id: well-known/lib/aws4/
  - id: well-known/lib/uniweb/
  - id: well-known/app/neurolink::benign-archive-context
  any:
  - id: env-aws-access-key
  - id: env-aws-secret
  - id: env-aws-session-token
  - id: node-aws-credential-env-access
- id: node-cloud
  desc: Accesses cloud provider credentials
  crit: notable
  conf: 0.9
  any:
  - id: env-google-prefix
  - id: env-gcp-prefix
  - id: env-azure-prefix
  - id: env-digitalocean-prefix
  - id: env-heroku-api
  - id: env-cloudflare-token
  - id: env-r2-access-key
  unless:
  - id: well-known/app/bruno::app-bundle
  - id: well-known/app/vscode-marketplace::m365-agents-toolkit-vsix
  - id: metadata/library/cloud-sdk::azure-identity-js-sdk
  - id: well-known/app/dbcode::extension-context
  - id: well-known/app/neurolink::benign-archive-context
  - id: well-known/lib/policysynth-agents::benign-archive-context
  - id: well-known/app/jinicode::provider-user-agent
- id: node-aws-credential-env-access
  desc: Reads AWS credential environment variable by name
  crit: notable
  conf: 0.9
  unless:
  - id: metadata/library/data::aws-sdk-js-v3-bundle
  - id: well-known/lib/aws-sdk-js/
  - id: well-known/lib/cline-llms/
  - id: well-known/tool/development/anthropic-claude-agent/
  - id: well-known/tool/development/autohq::autohq-cli-source-marker
  - id: well-known/lib/aws4/
  - id: well-known/lib/uniweb/
  - id: well-known/app/neurolink::benign-archive-context
  all:
  - id: micro-behaviors/os/env/access::javascript
  - id: micro-behaviors/os/env/vars/credentials::aws-secret-access-key-var
