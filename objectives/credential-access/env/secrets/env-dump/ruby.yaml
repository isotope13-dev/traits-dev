defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: env-to-hash
    desc: ENV to hash conversion
    crit: suspicious
    conf: 0.85
    attack: T1018
    count_min: 1
    if:
      id: objectives/credential-access/env/secret-markers::env-to-hash
  - id: env-serialization
    desc: Environment variable serialization
    crit: suspicious
    conf: 0.8
    attack: T1018
    count_min: 1
    if:
      id: objectives/credential-access/env/secret-markers::env-serialization
  - id: env-bracket-access
    desc: ENV bracket access
    crit: suspicious
    conf: 0.65
    attack: T1018
    count_min: 1
    if:
      id: objectives/credential-access/env/secret-markers::env-bracket-access
    unless:
      - id: well-known/lib/aws-sdk-ruby::library
  - id: host-env-check
    desc: Host environment validation
    crit: suspicious
    conf: 0.7
    attack: T1016
    count_min: 1
    if:
      id: objectives/credential-access/env/secret-markers::host-env-check
