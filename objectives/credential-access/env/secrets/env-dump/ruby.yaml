defaults:
  for:
    - ruby
  platforms:
    - unix
    - windows
traits:
  - id: env-to-hash
    desc: ENV to hash conversion
    crit: suspicious
    conf: 0.85
    attack: T1018
    if:
      type: string_literal
      regex: ENV\.to_hash|ENV\.to_h
  - id: env-serialization
    desc: Environment variable serialization
    crit: suspicious
    conf: 0.8
    attack: T1018
    if:
      type: string_literal
      regex: \bENV(\.\w{1,40}|\[[^\]]{1,80}\]){0,4}\.(to_yaml|to_json|inspect)\b
    unless:
      # Native-body tests pass this expression to a child Ruby interpreter as
      # a confinement probe; the package does not dump its runtime environment.
      - id: metadata/package/testing/presence/harness::test-directory-path
  - id: env-bracket-access
    desc: ENV bracket access
    crit: suspicious
    conf: 0.65
    attack: T1018
    if:
      type: string_literal
      regex: ENV\[.{0,50}URL_HOST|ENV\[.{0,50}HOST
    unless:
      - id: well-known/lib/aws-sdk-ruby
      - type: text
        substr: VAGRANT_APPIMAGE_HOST_LD_LIBRARY_PATH
  - id: host-env-check
    desc: Host environment validation
    crit: suspicious
    conf: 0.7
    attack: T1016
    if:
      type: string_literal
      regex: ENV.{0,50}localhost|ENV.{0,50}include\?|ENV\[.{0,50}\]\[0\]
    unless:
      - id: well-known/app/homebrew::source-tree
