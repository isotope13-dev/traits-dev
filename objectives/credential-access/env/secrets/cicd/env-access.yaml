defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
traits:
- id: npm-script-github-actions-oidc-token
  desc: npm script accesses GitHub OIDC token
  crit: suspicious
  conf: 0.97
  for:
  - package.json
  ref: sha256:ba3ce255b31237ae1aa1d759860cdf9737ede413fd6f81abdc5cc7b097489cbb
  if:
    type: value
    path: 'scripts[*]'
    regex: 'ACTIONS_ID_TOKEN_REQUEST_TOKEN\b'
- id: npm-script-github-actions-oidc-vars
  desc: npm script reads GitHub OIDC vars
  crit: suspicious
  conf: 0.97
  for:
  - package.json
  ref: sha256:ba3ce255b31237ae1aa1d759860cdf9737ede413fd6f81abdc5cc7b097489cbb
  if:
    type: value
    path: 'scripts[*]'
    regex: 'ACTIONS_ID_TOKEN_REQUEST_(URL|TOKEN)\b'
- id: npm-script-oidc-bearer-header
  desc: npm script sets OIDC bearer header
  crit: suspicious
  conf: 0.96
  for:
  - package.json
  ref: sha256:ba3ce255b31237ae1aa1d759860cdf9737ede413fd6f81abdc5cc7b097489cbb
  if:
    type: value
    path: 'scripts[*]'
    regex: 'Authorization\s*:\s*["'']Bearer\s*["'']\s*\+'
- id: env-ci-token
  desc: CI_TOKEN env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.CI_TOKEN
- id: env-circle-token
  desc: CIRCLE_TOKEN env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.CIRCLE_TOKEN
- id: env-travis-token
  desc: TRAVIS_TOKEN env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.TRAVIS_TOKEN
- id: env-buildkite-prefix
  desc: BUILDKITE_ env prefix access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.BUILDKITE_
composite_rules:
- id: npm-script-github-actions-oidc-request
  desc: npm script requests GitHub OIDC token
  crit: suspicious
  conf: 0.99
  for: [package.json]
  ref: sha256:ba3ce255b31237ae1aa1d759860cdf9737ede413fd6f81abdc5cc7b097489cbb
  all:
  - id: npm-script-github-actions-oidc-vars
  - id: npm-script-oidc-bearer-header
- id: node-cicd
  desc: Accesses CI/CD pipeline tokens
  crit: suspicious
  conf: 0.85
  any:
  - id: env-ci-token
  - id: env-circle-token
  - id: env-travis-token
  - id: env-buildkite-prefix
- id: npm-github-actions-oidc-token-theft
  desc: npm lifecycle hook steals GitHub OIDC token
  crit: hostile
  conf: 0.99
  for: [package.json]
  ref: sha256:ba3ce255b31237ae1aa1d759860cdf9737ede413fd6f81abdc5cc7b097489cbb
  all:
  - id: npm-script-github-actions-oidc-request
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
  - id: micro-behaviors/communications/http/post::npm-script-http-post
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
