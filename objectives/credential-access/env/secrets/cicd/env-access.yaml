defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
traits:
- id: npm-script-github-actions-oidc-token
  desc: npm script accesses GitHub OIDC token
  crit: suspicious
  conf: 0.97
  for:
  - package.json
  ref: sha256:456f6483c9c64c940c3bb3182a1f2794c4d1d9be5e8d5cd8412e8ef6d45892f6
  if:
    type: value
    path: 'scripts[*]'
    regex: 'ACTIONS_ID_TOKEN_REQUEST_TOKEN\b'
- id: env-ci-token
  desc: CI_TOKEN env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.CI_TOKEN
- id: env-circle-token
  desc: CIRCLE_TOKEN env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.CIRCLE_TOKEN
- id: env-travis-token
  desc: TRAVIS_TOKEN env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.TRAVIS_TOKEN
- id: env-jenkins-prefix
  desc: JENKINS_ env prefix access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.JENKINS_
- id: env-buildkite-prefix
  desc: BUILDKITE_ env prefix access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.BUILDKITE_
composite_rules:
- id: node-cicd
  desc: Accesses CI/CD pipeline tokens
  crit: suspicious
  conf: 0.85
  any:
  - id: env-ci-token
  - id: env-circle-token
  - id: env-travis-token
  - id: env-jenkins-prefix
  - id: env-buildkite-prefix
- id: npm-github-actions-oidc-token-theft
  desc: npm lifecycle hook steals GitHub OIDC token
  crit: hostile
  conf: 0.98
  for: [package.json]
  ref: sha256:456f6483c9c64c940c3bb3182a1f2794c4d1d9be5e8d5cd8412e8ef6d45892f6
  all:
  - id: npm-script-github-actions-oidc-token
  - id: objectives/supply-chain/install-hook/scripts/lifecycle::has-postinstall
  - id: micro-behaviors/communications/http/post::npm-script-http-post
  any:
  - id: objectives/exfiltration/oob/endpoint::oob-endpoint-any
  - id: micro-behaviors/os/env/vars/access::npm-script-full-env-object
