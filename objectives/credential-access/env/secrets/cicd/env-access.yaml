defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
traits:
- id: env-ci-token
  desc: CI_TOKEN env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.CI_TOKEN
- id: env-circle-token
  desc: CIRCLE_TOKEN env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.CIRCLE_TOKEN
- id: env-travis-token
  desc: TRAVIS_TOKEN env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.TRAVIS_TOKEN
- id: env-jenkins-prefix
  desc: JENKINS_ env prefix access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.JENKINS_
- id: env-buildkite-prefix
  desc: BUILDKITE_ env prefix access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.BUILDKITE_
composite_rules:
- id: node-cicd
  desc: Accesses CI/CD pipeline tokens
  crit: suspicious
  conf: 0.85
  any:
  - id: env-ci-token
  - id: env-circle-token
  - id: env-travis-token
  - id: env-jenkins-prefix
  - id: env-buildkite-prefix
