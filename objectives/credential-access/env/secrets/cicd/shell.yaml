# CI/CD Token/Credential Access - Shell
# Detects access to CI/CD tokens in shell scripts
# ATT&CK: T1552.001 (Credentials In Files)
defaults:
  attack: T1552.001
  platforms: [unix, android, ios]
  for: [shell]
  crit: suspicious
traits:
  - id: sh-github-token
    desc: $GITHUB_TOKEN shell environment access
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: "\\$\\{?GITHUB_TOKEN\\}?"
    unless:
      - type: text
        substr: "x-access-token:${GITHUB_TOKEN}@github.com/"
      - type: text
        substr: "https://$GITHUB_TOKEN@github.com/"
      - id: objectives/supply-chain/trojanized/app/context::selenium-engflow-credential-helper
      - id: micro-behaviors/data/text/security/scanner::defensive-evidence-collector
