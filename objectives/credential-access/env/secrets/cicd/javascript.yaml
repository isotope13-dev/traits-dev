# CI/CD Token/Credential Access - JavaScript/Node.js
# Detects access to CI/CD tokens and credentials in npm packages
# ATT&CK: T1552.001 (Credentials In Files)
defaults:
  attack: T1552.001
  platforms: [linux, macos, windows, unix, android, ios]
  for: [javascript, typescript]
  crit: notable
traits:
  - id: process-env-github-token
    desc: process.env.GITHUB_TOKEN access
    conf: 0.9
    if:
      type: string_literal
      regex: "process\\.env\\.GITHUB_TOKEN"
    downgrade:
      any:
        - id: metadata/library/github-actions::actions-sdk
  - id: process-env-npm-token
    desc: process.env.NPM_TOKEN access
    conf: 0.95
    if:
      type: string_literal
      regex: "process\\.env\\.NPM_TOKEN"
composite_rules:
  - id: js-cicd-token-access
    desc: CI/CD token/credential access
    conf: 0.9
    any:
      - id: process-env-github-token
      - id: process-env-npm-token
