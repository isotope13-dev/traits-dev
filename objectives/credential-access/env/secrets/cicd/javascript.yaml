# CI/CD Token/Credential Access - JavaScript/Node.js
# Detects access to CI/CD tokens and credentials in npm packages
# ATT&CK: T1552.001 (Credentials In Files)
defaults:
  platforms: [windows, unix]
  attack: T1552.001
  for: [javascript, typescript]
  crit: notable
composite_rules:
  - id: js-cicd-token-access
    desc: CI/CD token/credential access
    conf: 0.9
    any:
      - id: objectives/credential-access/env/secrets/source-control::env-github-token
      - id: objectives/credential-access/env/secrets/npm-registry::env-npm-token
    downgrade:
      any:
        - id: metadata/library/github-actions::actions-sdk
