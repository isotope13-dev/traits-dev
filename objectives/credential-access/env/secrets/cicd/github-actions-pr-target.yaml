# GitHub Actions credentials exposed to untrusted pull-request code.
defaults:
  platforms: [unix, windows]
  for: [github-actions]
  attack: "T1195.002,T1528"

composite_rules:
- id: pr-target-head-oidc-credential-exposure
  desc: pull_request_target exposes OIDC to PR head
  crit: hostile
  conf: 0.99
  all:
  - id: metadata/build/github-actions::pull-request-head-checkout
  - id: metadata/build/github-actions::pull-request-target-trigger
  - id: metadata/build/github-actions::id-token-write-permission
  unless:
  - id: metadata/build/github-actions::approval-gated-external-pr-checkout
