# A pull_request_target workflow must not pass secrets into repository-local
# actions after checking out the external PR head: the PR controls that action
# and can use the input to steal credentials.
defaults:
  platforms: [unix, windows]
  for: [github-actions]
  attack: "T1195.002,T1552.001"

composite_rules:
  - id: pr-target-head-local-action-secret
    desc: External PR head controls secret-fed local action
    crit: hostile
    conf: 0.99
    all:
      - id: metadata/build/github-actions::pull-request-head-checkout
      - id: metadata/build/github-actions::pull-request-target-trigger
      - id: metadata/build/github-actions::local-composite-action-secret-input
