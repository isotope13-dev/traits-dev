# CI/CD Token/Credential Access - Ruby
# Detects access to CI/CD tokens and credentials in Ruby gems
# ATT&CK: T1552.001 (Credentials In Files)
defaults:
  platforms: [windows, unix]
  attack: T1552.001
  for: [ruby]
  crit: suspicious
traits:
  - id: rb-github-token
    desc: Ruby ENV GITHUB_TOKEN access
    conf: 0.9
    if:
      type: text
      regex: "ENV\\[[\"']GITHUB_TOKEN[\"']\\]"
  - id: rb-gem-credentials
    desc: Ruby ENV for gem credentials
    conf: 0.95
    unless:
      - id: well-known/lib/jruby::package-path
      - id: well-known/lib/jruby::module-marker
      - id: well-known/lib/jruby::jruby-home-path
    if:
      type: text
      regex: "ENV\\[[\"'](GEM_HOST_API_KEY|RUBYGEMS_API_KEY)[\"']\\]"
composite_rules:
  - id: ruby-gem-credential-access
    desc: RubyGems credential access
    conf: 0.9
    any:
      - id: rb-github-token
      - id: rb-gem-credentials
