# CI/CD Token/Credential Access - Ruby
# Detects access to CI/CD tokens and credentials in Ruby gems
# ATT&CK: T1552.001 (Credentials In Files)
defaults:
  platforms: [windows, unix]
  attack: T1552.001
  for: [ruby]
  crit: suspicious
traits:
  - id: rb-github-token
    desc: Ruby ENV GITHUB_TOKEN access
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: "ENV\\[[\"']GITHUB_TOKEN[\"']\\]"
  - id: rb-gem-credentials
    desc: Ruby ENV for gem credentials
    crit: notable
    conf: 0.95
    unless:
      - id: well-known/lib/jruby::embedded-runtime-member
    if:
      type: text
      regex: "ENV\\[[\"'](GEM_HOST_API_KEY|RUBYGEMS_API_KEY)[\"']\\]"
    downgrade:
      any:
        - type: basename
          regex: '(^|[\\/])(Rakefile|[^\\/]+\.rake)$'
        - type: text
          regex: 'RubyGems credentials|rubygems_api_key|\.gem[/\\]credentials|rubygems\.org/api/'
composite_rules:
  - id: ruby-gem-credential-access
    desc: RubyGems credential access
    crit: notable
    conf: 0.9
    any:
      - id: rb-github-token
      - id: rb-gem-credentials
