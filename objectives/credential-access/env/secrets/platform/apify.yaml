defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
traits:
- id: env-apify-user-id
  desc: APIFY_USER_ID env access (Apify platform)
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: process.env.APIFY_USER_ID
- id: env-apify-user-paying
  desc: 'APIFY_USER_IS_PAYING env access'
  crit: suspicious
  conf: 0.8
  if:
    type: text
    substr: process.env.APIFY_USER_IS_PAYING
- id: env-actor-run-id
  desc: ACTOR_RUN_ID env access (Apify actor run)
  crit: suspicious
  conf: 0.65
  if:
    type: text
    substr: process.env.ACTOR_RUN_ID
- id: env-apify-is-at-home
  desc: 'APIFY_IS_AT_HOME env access'
  crit: suspicious
  conf: 0.7
  if:
    type: text
    substr: process.env.APIFY_IS_AT_HOME
composite_rules:
- id: node-apify-platform
  desc: Accesses Apify platform identity env vars
  crit: suspicious
  conf: 0.85
  attack: T1552
  needs: 2
  any:
  - id: env-apify-user-id
  - id: env-apify-user-paying
  - id: env-actor-run-id
  - id: env-apify-is-at-home
