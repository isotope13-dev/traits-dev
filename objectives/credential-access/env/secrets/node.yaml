defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
  attack: T1552.001
traits:
  - id: env-aws-access-key
    desc: AWS_ACCESS_KEY env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.AWS_ACCESS_KEY
  - id: env-aws-secret
    desc: AWS_SECRET env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.AWS_SECRET
  - id: env-aws-session-token
    desc: AWS_SESSION_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.AWS_SESSION_TOKEN
  - id: env-github-token
    desc: GITHUB_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.GITHUB_TOKEN
  - id: env-gitlab-token
    desc: GITLAB_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.GITLAB_TOKEN
  - id: env-gh-token
    desc: GH_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.GH_TOKEN
  - id: env-bitbucket-token
    desc: BITBUCKET_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.BITBUCKET_TOKEN
  - id: env-npm-token
    desc: NPM_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.NPM_TOKEN
  - id: env-npm-auth-token
    desc: NPM_AUTH_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.NPM_AUTH_TOKEN
  - id: env-node-auth-token
    desc: NODE_AUTH_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.NODE_AUTH_TOKEN
  - id: env-discord-token
    desc: DISCORD_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.DISCORD_TOKEN
  - id: env-discord-bot-token
    desc: DISCORD_BOT_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.DISCORD_BOT_TOKEN
  - id: env-discord-client-secret
    desc: DISCORD_CLIENT_SECRET env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.DISCORD_CLIENT_SECRET
  - id: env-slack-token
    desc: SLACK_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.SLACK_TOKEN
  - id: env-slack-bot-token
    desc: SLACK_BOT_TOKEN env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.SLACK_BOT_TOKEN
  - id: env-slack-api-key
    desc: SLACK_API_KEY env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.SLACK_API_KEY
  - id: env-slack-webhook
    desc: SLACK_WEBHOOK env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.SLACK_WEBHOOK
  - id: env-database-url
    desc: DATABASE_URL env access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: process.env.DATABASE_URL
  - id: env-mongodb-uri
    desc: MONGODB_URI env access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: process.env.MONGODB_URI
  - id: env-postgres-prefix
    desc: POSTGRES_ env prefix access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: process\.env\.POSTGRES_
  - id: env-mysql-prefix
    desc: MYSQL_ env prefix access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: process\.env\.MYSQL_
  - id: env-redis-url
    desc: REDIS_URL env access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: process.env.REDIS_URL
  - id: env-wallet-prefix
    desc: WALLET_ env prefix access
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: process\.env\.(WALLET_|[A-Z0-9_]{0,24}ACCOUNT_ADDRESS)
  - id: env-mnemonic
    desc: MNEMONIC env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.MNEMONIC
  - id: env-seed-phrase
    desc: SEED_PHRASE env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      substr: process.env.SEED_PHRASE
  - id: env-private-key
    desc: PRIVATE_KEY env access
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: process\.env\.([A-Z0-9_]{0,24})?PRIVATE_KEY
  - id: env-eth-private
    desc: ETH_PRIVATE env access
    crit: notable
    conf: 0.7
    if:
      type: string_literal
      regex: process\.env\.ETH_PRIVATE
  - id: env-ci-token
    desc: CI_TOKEN env access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: process.env.CI_TOKEN
  - id: env-circle-token
    desc: CIRCLE_TOKEN env access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: process.env.CIRCLE_TOKEN
  - id: env-travis-token
    desc: TRAVIS_TOKEN env access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      substr: process.env.TRAVIS_TOKEN
  - id: env-jenkins-prefix
    desc: JENKINS_ env prefix access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: process\.env\.JENKINS_
  - id: env-buildkite-prefix
    desc: BUILDKITE_ env prefix access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: process\.env\.BUILDKITE_
  - id: env-google-prefix
    desc: GOOGLE_ env prefix access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: process\.env\.GOOGLE_
  - id: env-gcp-prefix
    desc: GCP_ env prefix access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: process\.env\.GCP_
  - id: env-azure-prefix
    desc: AZURE_ env prefix access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: process\.env\.AZURE_
  - id: env-digitalocean-prefix
    desc: DIGITALOCEAN_ env prefix access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: process\.env\.DIGITALOCEAN_
  - id: env-heroku-api
    desc: HEROKU_API env access
    crit: notable
    conf: 0.6
    if:
      type: string_literal
      regex: process\.env\.HEROKU_API
  - id: env-apify-user-id
    desc: APIFY_USER_ID env access (Apify platform)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: process\.env\.APIFY_USER_ID
  - id: env-apify-user-paying
    desc: APIFY_USER_IS_PAYING env access (payment profiling)
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: process\.env\.APIFY_USER_IS_PAYING
  - id: env-actor-run-id
    desc: ACTOR_RUN_ID env access (Apify actor run)
    crit: notable
    conf: 0.65
    if:
      type: text
      regex: process\.env\.ACTOR_RUN_ID
  - id: env-apify-is-at-home
    desc: APIFY_IS_AT_HOME env access (Apify platform detection)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: process\.env\.APIFY_IS_AT_HOME
  - id: json-stringify-env
    desc: JSON.stringify(process.env)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: JSON\.stringify\(\s*process\.env\s*\)
  - id: object-keys-env
    desc: Object.keys(process.env)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: Object\.keys\(process\.env
  - id: object-entries-env
    desc: Object.entries(process.env)
    crit: notable
    conf: 0.7
    if:
      type: text
      regex: Object\.entries\(process\.env
  - id: env-secret-filter-core
    desc: Secret keyword filter over env names
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'process\.env.{0,180}(?:filter|match|includes|test|startsWith).{0,120}(AWS|SECRET|TOKEN|KEY|CRED)|(AWS|SECRET|TOKEN|KEY|CRED).{0,120}(?:filter|match|includes|test|startsWith).{0,180}process\.env'
  - id: env-secret-filter-infra
    desc: Infra secret keyword filter over env names
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'process\.env.{0,180}(?:filter|match|includes|test|startsWith).{0,120}(DOCKER|KUBE|DEPLOY|REGISTRY|VAULT)|(DOCKER|KUBE|DEPLOY|REGISTRY|VAULT).{0,120}(?:filter|match|includes|test|startsWith).{0,180}process\.env'
  - id: env-secret-filter-data
    desc: Data service keyword filter over env names
    crit: notable
    conf: 0.82
    if:
      type: text
      regex: 'process\.env.{0,180}(?:filter|match|includes|test|startsWith).{0,120}(DATABASE|REDIS|MONGO|POSTGRES|AUTH)|(DATABASE|REDIS|MONGO|POSTGRES|AUTH).{0,120}(?:filter|match|includes|test|startsWith).{0,180}process\.env'
composite_rules:
  - id: node-config
    desc: Accessing sensitive configuration files
    crit: suspicious
    conf: 0.7
    any:
      - id: objectives/credential-access/ssh/key::id-rsa
      - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
      - id: micro-behaviors/fs/path/sensitive/credentials::kube-config
  - id: node-aws
    desc: Accesses AWS credentials from environment
    crit: suspicious
    conf: 0.9
    any:
      - id: env-aws-access-key
      - id: env-aws-secret
      - id: env-aws-session-token
  - id: node-git-token
    desc: Accesses Git service tokens from
    crit: suspicious
    conf: 0.9
    any:
      - id: env-github-token
      - id: env-gitlab-token
      - id: env-gh-token
      - id: env-bitbucket-token
  - id: node-npm-token
    desc: Accesses NPM authentication tokens
    crit: suspicious
    conf: 0.95
    any:
      - id: env-npm-token
      - id: env-npm-auth-token
      - id: env-node-auth-token
  - id: node-discord
    desc: Accesses Discord bot/user tokens
    crit: suspicious
    conf: 0.9
    any:
      - id: env-discord-token
      - id: env-discord-bot-token
      - id: env-discord-client-secret
  - id: node-slack
    desc: Accesses Slack tokens from environment
    crit: suspicious
    conf: 0.9
    any:
      - id: env-slack-token
      - id: env-slack-api-key
      - id: env-slack-bot-token
      - id: env-slack-webhook
  - id: node-database
    desc: Accesses database connection strings
    crit: suspicious
    conf: 0.85
    any:
      - id: env-database-url
      - id: env-mongodb-uri
      - id: env-postgres-prefix
      - id: env-mysql-prefix
      - id: env-redis-url
  - id: node-crypto
    desc: Accesses cryptocurrency private keys
    crit: suspicious
    conf: 0.95
    any:
      - id: env-wallet-prefix
      - id: env-mnemonic
      - id: env-seed-phrase
      - id: env-private-key
      - id: env-eth-private
  - id: node-cicd
    desc: Accesses CI/CD pipeline tokens
    crit: suspicious
    conf: 0.85
    any:
      - id: env-ci-token
      - id: env-circle-token
      - id: env-travis-token
      - id: env-jenkins-prefix
      - id: env-buildkite-prefix
  - id: node-cloud
    desc: Accesses cloud provider credentials
    crit: suspicious
    conf: 0.9
    any:
      - id: env-google-prefix
      - id: env-gcp-prefix
      - id: env-azure-prefix
      - id: env-digitalocean-prefix
      - id: env-heroku-api
  - id: node-env-dump
    desc: Accesses entire process.env object
    crit: notable
    conf: 0.85
    any:
      - id: json-stringify-env
      - id: object-keys-env
      - id: object-entries-env
  - id: node-env-secret-filter
    desc: Uses secret keyword filters on env names
    crit: suspicious
    conf: 0.9
    any:
      - id: env-secret-filter-core
      - id: env-secret-filter-infra
      - id: env-secret-filter-data
  - id: node-filtered-secret-scan
    desc: Filters process.env for secret values
    crit: suspicious
    conf: 0.94
    unless:
      - id: micro-behaviors/process/interpreter/vm::yarn-release-bundle
      - id: objectives/credential-access/env/secrets/compat::yarn-debug-env-filter
    all:
      - id: node-env-dump
      - id: node-env-secret-filter
  - id: node-apify-platform
    desc: Accesses Apify platform identity env vars
    crit: suspicious
    conf: 0.85
    attack: T1552
    needs: 2
    any:
      - id: env-apify-user-id
      - id: env-apify-user-paying
      - id: env-actor-run-id
      - id: env-apify-is-at-home
  - id: node-multi-cred
    desc: Accesses multiple credential sources (credential
    crit: hostile
    conf: 0.95
    mbc: B0028
    needs: 3
    any:
      - id: node-aws
      - id: node-git-token
      - id: node-npm-token
      - id: node-discord
      - id: node-database
      - id: node-crypto
