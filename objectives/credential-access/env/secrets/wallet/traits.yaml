defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
traits:
- id: env-wallet-prefix
  desc: WALLET_ env prefix access
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: process\.env\.(WALLET_|[A-Z0-9_]{0,24}ACCOUNT_ADDRESS)
- id: env-mnemonic
  desc: MNEMONIC env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.MNEMONIC
- id: env-seed-phrase
  desc: SEED_PHRASE env access
  crit: notable
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.SEED_PHRASE
- id: env-private-key
  desc: PRIVATE_KEY env access
  crit: notable
  conf: 0.7
  if:
    type: text
    regex: process\.env\.([A-Z0-9_]{0,24})?PRIVATE_KEY
  unless:
  - id: metadata/package/fields/freeform::openclaw-plugin-package
  - id: micro-behaviors/os/env/access::nostr-private-key-env
- id: env-private-key-bracket
  desc: Bracketed PRIVATE_KEY env access
  crit: notable
  conf: 0.72
  if:
    type: text
    regex: process\.env\[\s*['"]([A-Z0-9_]{0,24})?PRIVATE_KEY['"]\s*\]
  unless:
  - id: metadata/package/fields/freeform::openclaw-plugin-package
  - id: micro-behaviors/os/env/access::nostr-private-key-env
- id: env-eth-private
  desc: ETH_PRIVATE env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.ETH_PRIVATE
