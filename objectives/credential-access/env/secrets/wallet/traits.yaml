defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
traits:
- id: env-wallet-prefix
  desc: WALLET_ env prefix access
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: process\.env\.(WALLET_|[A-Z0-9_]{0,24}ACCOUNT_ADDRESS)
- id: env-mnemonic
  desc: MNEMONIC env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.MNEMONIC
- id: env-seed-phrase
  desc: SEED_PHRASE env access
  crit: notable
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.SEED_PHRASE
- id: env-eth-private
  desc: ETH_PRIVATE env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.ETH_PRIVATE
# Stealers harvest wallet secrets by iterating a hardcoded name list with
# bracket access (`process.env[key]`), so the dot-notation matchers above miss
# them. A chain-specific private-key env var name is the tell regardless of how
# it is read: benign code does not reference ETH/BTC/SOLANA_PRIVATE_KEY.
- id: env-chain-private-key-name
  desc: Chain-specific private key env var name
  crit: suspicious
  conf: 0.75
  if:
    type: text
    regex: (ETH|BTC|SOLANA)_PRIVATE_KEY
# Env-key sweepers filter `Object.entries(process.env)` by testing each key name
# for a wallet-secret substring (`k.includes("MNEMONIC")`). The uppercase
# wallet keyword as the argument of a membership test is the crypto-theft tell;
# legit wallet code reads `process.env.MNEMONIC` directly instead of scanning
# every env key for it.
- id: env-wallet-keyword-membership-filter
  desc: Wallet-secret keyword membership test
  crit: notable
  conf: 0.8
  if:
    type: text
    regex: \.(includes|indexOf)\s*\(\s*["'](MNEMONIC|WALLET|SEED_PHRASE)["']
