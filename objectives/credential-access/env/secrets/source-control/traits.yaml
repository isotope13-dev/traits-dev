defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
  - python
  - shell
traits:
- id: env-github-token
  desc: GITHUB_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.GITHUB_TOKEN
  unless:
  - id: well-known/tool/detection/security-scanner/
  - id: micro-behaviors/communications/http/services/github/
- id: env-gitlab-token
  desc: GITLAB_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.GITLAB_TOKEN
- id: env-gh-token
  desc: GH_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.GH_TOKEN
- id: github-app-private-key
  desc: GitHub App private key env access
  crit: notable
  conf: 0.86
  if:
    type: text
    regex: process\.env\.GITHUB_APP_PRIVATE_KEY\b
- id: env-bitbucket-token
  desc: BITBUCKET_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.BITBUCKET_TOKEN
- id: github-token-var
  desc: GITHUB_TOKEN env var name reference
  crit: component
  conf: 0.85
  if:
    type: text
    substr: GITHUB_TOKEN
    case_insensitive: true
  not:
  - substr: process.env.GITHUB_TOKEN
- id: gh-token-var
  desc: GH_TOKEN env var name reference
  crit: component
  conf: 0.85
  if:
    type: text
    regex: "(^|[^A-Z0-9_])GH_TOKEN([^A-Z0-9_]|$)"
composite_rules:
- id: node-git-token
  desc: Source-control token env access
  crit: suspicious
  conf: 0.9
  any:
  - id: env-github-token
  - id: env-gitlab-token
  - id: env-gh-token
  - id: env-bitbucket-token
- id: github-token-indicators
  desc: GitHub token variable indicators
  crit: notable
  conf: 0.7
  any:
  - id: github-token-var
  - id: gh-token-var
- id: github-token
  desc: GitHub token environment variable access
  crit: notable
  conf: 0.7
  all:
  - id: github-token-indicators
  - id: metadata/lang/scripted::env-access
