defaults:
  platforms: [windows, unix]
  for:
  - javascript
  - typescript
  attack: T1552.001
traits:
- id: json-stringify-env
  desc: JSON.stringify(process.env)
  crit: suspicious
  conf: 0.7
  if:
    type: text
    regex: JSON\.stringify\(\s*process\.env\s*\)
- id: object-keys-env
  desc: Object.keys process.env environment enumeration call
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: Object.keys(process.env
- id: object-entries-env
  desc: Object.entries process.env enumeration call
  crit: notable
  conf: 0.7
  if:
    type: text
    substr: Object.entries(process.env
composite_rules:
- id: node-config
  desc: Accessing sensitive configuration files
  crit: suspicious
  conf: 0.7
  any:
  - id: objectives/credential-access/ssh/key::id-rsa
  - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
  - id: micro-behaviors/fs/path/sensitive/credentials::kube-config
- id: node-env-dump
  desc: Accesses entire process.env object
  crit: suspicious
  conf: 0.85
  any:
  - id: json-stringify-env
  - id: object-keys-env
  - id: object-entries-env
