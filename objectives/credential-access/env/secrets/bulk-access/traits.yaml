defaults:
  platforms: [windows, unix]
  for:
  - javascript
  - typescript
  attack: T1552.001
composite_rules:
- id: node-config
  desc: Accessing sensitive configuration files
  crit: notable
  conf: 0.7
  any:
  - id: objectives/credential-access/ssh/key::id-rsa
  - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
  - id: micro-behaviors/fs/path/sensitive/credentials::kube-config
  unless:
  - id: well-known/tool/detection/ai-guardrail/
  - id: well-known/lib/aws-sdk-js/
  - id: well-known/app/macos-benign::podman-desktop-bundle
  - id: well-known/app/macos-benign::podman-desktop-resource
  - id: metadata/lang/scripted::dts-declaration-file
  - id: metadata/file/profile/identity::generated-documentation-page
