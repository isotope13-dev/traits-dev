defaults:
  platforms:
  - windows
  - unix
  for:
  - javascript
  - typescript
  attack: T1552.001
composite_rules:
- id: node-multi-cred
  desc: Accesses multiple credential sources (credential
  crit: hostile
  conf: 0.95
  mbc: B0028
  needs: 3
  any:
  - id: objectives/credential-access/env/secrets/cloud-access::node-aws
  - id: objectives/credential-access/env/secrets/source-control::node-git-token
  - id: objectives/credential-access/env/secrets/npm-registry::node-npm-token
  - id: objectives/credential-access/env/secrets/messaging::node-discord
  - id: objectives/credential-access/env/secrets/database::node-database
  - id: objectives/credential-access/env/secrets/wallet
  unless:
  - id: micro-behaviors/data/text/security/scanner::secret-redactor-context
