defaults:
  platforms: [windows]
  for: [c, cpp, pe, dll]
  attack: T1552.001

traits:
  - id: aws-access-key-env-name
    desc: AWS access key env name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: AWS_ACCESS_KEY_ID

  - id: aws-secret-key-env-name
    desc: AWS secret key env name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: AWS_SECRET_ACCESS_KEY

  - id: aws-session-token-env-name
    desc: AWS session token env name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: AWS_SESSION_TOKEN

  - id: azure-client-secret-env-name
    desc: Azure client secret env name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: AZURE_CLIENT_SECRET

  - id: gcp-credentials-env-name
    desc: GCP credentials env name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: GOOGLE_APPLICATION_CREDENTIALS

  - id: service-account-key-env-name
    desc: Service account key env name
    crit: component
    conf: 0.9
    if:
      type: text
      substr: SERVICE_ACCOUNT_KEY

composite_rules:
  - id: windows-cloud-env-secret-cluster
    desc: Windows cloud secret env name cluster
    crit: notable
    conf: 0.94
    any:
      - id: aws-access-key-env-name
      - id: aws-secret-key-env-name
      - id: aws-session-token-env-name
      - id: azure-client-secret-env-name
      - id: gcp-credentials-env-name
      - id: service-account-key-env-name
    needs: 4

  - id: native-windows-cloud-env-harvest
    desc: Native Windows cloud env harvest
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/env/access::get-environment-variable
      - id: windows-cloud-env-secret-cluster
