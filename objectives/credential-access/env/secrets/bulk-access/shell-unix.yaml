defaults:
  platforms: [unix, appliance]
  for: [shell]
  attack: T1552.001

traits:
  - id: shell-eval-env-var-read
    desc: Shell eval reads env vars
    crit: suspicious
    conf: 0.92
    if:
      type: text
      regex: 'eval echo "\\\$\$var"'

  - id: shell-secret-env-wordlist
    desc: Shell secret env wordlist
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: PASSWORD PASSWD SECRET TOKEN API_KEY

composite_rules:
  - id: shell-bulk-env-secret-collection
    desc: Shell bulk env secret collection
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/os/env/vars/enumeration::shell-enumerates-env-names
      - id: shell-eval-env-var-read
      - id: shell-secret-env-wordlist
