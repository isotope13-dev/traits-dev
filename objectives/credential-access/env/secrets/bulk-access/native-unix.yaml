defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1552.001

traits:
  - id: env-password-marker
    desc: Password environment marker
    crit: component
    conf: 0.82
    if:
      type: text
      word: PASSWORD
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename

  - id: env-token-marker
    desc: Token environment marker
    crit: component
    conf: 0.82
    if:
      type: text
      word: TOKEN
    unless:
      - type: trait
        id: metadata/file/extension/identity::linux-kernel-package-artifact-basename

  - id: env-secret-marker
    desc: Secret environment marker
    crit: component
    conf: 0.82
    if:
      type: text
      word: SECRET

  - id: env-key-marker
    desc: Key environment marker
    crit: component
    conf: 0.82
    if:
      type: text
      word: API_KEY

composite_rules:
  - id: native-env-secret-harvest
    desc: Native environment secret harvest
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/env/access::native-environ-reference
    any:
      - id: env-password-marker
      - id: env-token-marker
      - id: env-secret-marker
      - id: env-key-marker
    needs: 3
    unless:
      - id: well-known/tool/sysadmin/alpine-packages::alpine-juicefs-binary
      - id: well-known/tool/sysadmin/alpine-packages::juicefs-binary-name
      - id: well-known/tool/sysadmin/alpine-packages::alpine-parseable-binary
      - id: well-known/tool/sysadmin/alpine-packages::parseable-binary-name
      - id: well-known/app/kilocode::kilo-cli-binary-name
      - id: well-known/app/vector/
      - id: well-known/app/jan/
