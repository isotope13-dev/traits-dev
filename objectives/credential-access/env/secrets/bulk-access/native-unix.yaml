defaults:
  platforms: [unix]
  for: [c, cpp, objc, elf]
  attack: T1552.001

traits:
  - id: env-password-marker
    desc: Password environment marker
    crit: component
    conf: 0.82
    if:
      type: text
      word: PASSWORD

  - id: env-token-marker
    desc: Token environment marker
    crit: component
    conf: 0.82
    if:
      type: text
      word: TOKEN

  - id: env-secret-marker
    desc: Secret environment marker
    crit: component
    conf: 0.82
    if:
      type: text
      word: SECRET

  - id: env-key-marker
    desc: Key environment marker
    crit: component
    conf: 0.82
    if:
      type: text
      word: API_KEY

composite_rules:
  - id: native-env-secret-harvest
    desc: Native environment secret harvest
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/os/env/access::native-environ-reference
    any:
      - id: env-password-marker
      - id: env-token-marker
      - id: env-secret-marker
      - id: env-key-marker
    needs: 3
