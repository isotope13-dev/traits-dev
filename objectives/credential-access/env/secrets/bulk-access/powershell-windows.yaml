defaults:
  platforms: [windows]
  for: [powershell]
  attack: T1552.001
  mbc: B0028

traits:
  - id: ps-getenvironmentvariable-call
    desc: PowerShell env variable read
    crit: notable
    conf: 0.86
    if:
      type: text
      substr: GetEnvironmentVariable

  - id: ps-cloud-secret-env-names
    desc: PowerShell cloud secret env names
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'AWS_SECRET_ACCESS_KEY.{0,180}AZURE_CLIENT_SECRET.{0,180}GITHUB_TOKEN'

  - id: ps-token-secret-env-names
    desc: PowerShell token secret env names
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: 'NPM_TOKEN.{0,180}DOCKER_PASSWORD.{0,180}DATABASE_URL'

composite_rules:
  - id: ps-bulk-env-secret-harvest
    desc: PowerShell bulk env secret harvest
    crit: hostile
    conf: 0.98
    all:
      - id: ps-getenvironmentvariable-call
    any:
      - id: ps-cloud-secret-env-names
      - id: ps-token-secret-env-names
    needs: 2
