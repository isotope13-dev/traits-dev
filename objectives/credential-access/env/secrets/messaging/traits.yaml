defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
  - python
  - shell
traits:
- id: env-discord-token
  desc: DISCORD_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.DISCORD_TOKEN
  unless:
  - id: micro-behaviors/data/text/security/scanner::secret-redactor-context
- id: env-discord-bot-token
  desc: DISCORD_BOT_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.DISCORD_BOT_TOKEN
- id: env-discord-client-secret
  desc: DISCORD_CLIENT_SECRET env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.DISCORD_CLIENT_SECRET
- id: env-slack-token
  desc: SLACK_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.SLACK_TOKEN
  unless:
  - id: micro-behaviors/data/text/security/scanner::secret-redactor-context
- id: env-slack-bot-token
  desc: SLACK_BOT_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.SLACK_BOT_TOKEN
- id: env-slack-api-key
  desc: SLACK_API_KEY env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.SLACK_API_KEY
- id: env-slack-webhook
  desc: SLACK_WEBHOOK env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.SLACK_WEBHOOK
- id: discord-token
  desc: DISCORD_TOKEN environment variable access
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: "(^|[^A-Z0-9_])DISCORD_TOKEN([^A-Z0-9_]|$)"
  unless:
  - id: objectives/credential-access/api-harvest/catalog::redaction-credentials-context
  - id: micro-behaviors/data/text/security/scanner::secret-pattern-scanner-db
  - id: micro-behaviors/data/text/security/scanner::secret-redactor-context
- id: slack-token
  desc: SLACK_TOKEN environment variable access
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: "(^|[^A-Z0-9_])SLACK_TOKEN([^A-Z0-9_]|$)"
  unless:
  - id: objectives/credential-access/api-harvest/catalog::redaction-credentials-context
  - id: micro-behaviors/data/text/security/scanner::secret-pattern-scanner-db
  - id: micro-behaviors/data/text/security/scanner::secret-redactor-context
composite_rules:
- id: node-discord
  desc: Accesses Discord bot/user tokens
  crit: suspicious
  conf: 0.9
  any:
  - id: env-discord-token
  - id: env-discord-bot-token
  - id: env-discord-client-secret
- id: node-slack
  desc: Accesses Slack tokens from environment
  crit: suspicious
  conf: 0.9
  any:
  - id: env-slack-token
  - id: env-slack-api-key
  - id: env-slack-bot-token
  - id: env-slack-webhook
