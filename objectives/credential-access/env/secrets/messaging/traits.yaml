defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
  - python
  - shell
traits:
- id: env-discord-token
  desc: DISCORD_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.DISCORD_TOKEN
  unless:
  - id: well-known/tool/detection/security-scanner/
- id: env-discord-bot-token
  desc: DISCORD_BOT_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.DISCORD_BOT_TOKEN
- id: env-discord-client-secret
  desc: DISCORD_CLIENT_SECRET env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.DISCORD_CLIENT_SECRET
- id: env-slack-bot-token
  desc: SLACK_BOT_TOKEN env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.SLACK_BOT_TOKEN
  unless:
  - id: well-known/tool/detection/security-scanner/
- id: env-slack-api-key
  desc: SLACK_API_KEY env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.SLACK_API_KEY
  unless:
  - id: well-known/tool/detection/security-scanner/
- id: env-slack-webhook
  desc: SLACK_WEBHOOK env access
  crit: suspicious
  conf: 0.7
  if:
    type: string_literal
    substr: process.env.SLACK_WEBHOOK
  unless:
  - id: well-known/tool/detection/security-scanner/
- id: discord-token
  desc: DISCORD_TOKEN environment variable access
  crit: notable
  conf: 0.95
  if:
    type: text
    regex: "(^|[^A-Z0-9_])DISCORD_TOKEN([^A-Z0-9_]|$)"
  unless:
  - id: objectives/credential-access/api-harvest/catalog::redaction-credentials-marker
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/tool/detection/security-scanner/
  - id: well-known/tool/detection/security-scanner::integration-secret-pattern-catalog
  - id: well-known/tool/detection/redaction::sensitive-data-scanner
  - type: text
    substr: SECRET_ENV_NAMES
composite_rules:
- id: node-discord
  desc: Accesses Discord bot/user tokens
  crit: suspicious
  conf: 0.9
  any:
  - id: env-discord-token
  - id: env-discord-bot-token
  - id: env-discord-client-secret
