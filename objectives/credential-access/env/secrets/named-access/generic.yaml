defaults:
  attack: T1552.001
  platforms:
  - windows
  - unix
  for: [scripts, binaries]
traits:
- id: github-token-var
  desc: GITHUB_TOKEN env var name reference
  crit: component
  conf: 0.85
  if:
    type: text
    substr: GITHUB_TOKEN
    case_insensitive: true
  not:
  - substr: process.env.GITHUB_TOKEN
- id: gh-token-var
  desc: GH_TOKEN env var name reference
  crit: component
  conf: 0.85
  if:
    type: text
    regex: (^|[^A-Z0-9_])GH_TOKEN([^A-Z0-9_]|$)
- id: aws-access-key-dup
  desc: AWS_ACCESS_KEY environment variable access
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: ^AWS_ACCESS_KEY
- id: aws-secret
  desc: AWS_SECRET environment variable access
  crit: notable
  conf: 0.85
  if:
    type: text
    regex: ^AWS_SECRET
- id: api-key-env-bracket
  desc: API_KEY via bracketed env access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: ENV\[['"]API_KEY['"]\]|os\.environ\[['"]API_KEY['"]\]
- id: api-key-getenv
  desc: API_KEY via getenv access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: getenv\(['"]API_KEY['"]\)|System\.getenv\(['"]API_KEY['"]\)
- id: api-key-process-env
  desc: API_KEY via process env access
  crit: component
  conf: 0.8
  if:
    type: text
    substr: process.env.API_KEY
- id: dev-api-key-base-decode
  desc: DEV_API_KEY base decoder use
  crit: component
  conf: 0.78
  if:
    type: text
    regex: DEV_API_KEY.{0,20}(atob|Buffer\.from)
- id: dev-secret-key-base-decode
  desc: DEV_SECRET_KEY base decoder use
  crit: component
  conf: 0.78
  if:
    type: text
    regex: DEV_SECRET_(KEY|VALUE).{0,20}(atob|Buffer\.from)
- id: discord-token
  desc: DISCORD_TOKEN environment variable access
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: (^|[^A-Z0-9_])DISCORD_TOKEN([^A-Z0-9_]|$)
  unless:
  - id: objectives/credential-access/api-harvest/catalog::redaction-credentials-context
  - id: micro-behaviors/data/text/security/scanner::secret-pattern-scanner-db
  - id: micro-behaviors/data/text/security/scanner::secret-redactor-context
- id: slack-token
  desc: SLACK_TOKEN environment variable access
  crit: suspicious
  conf: 0.95
  if:
    type: text
    regex: (^|[^A-Z0-9_])SLACK_TOKEN([^A-Z0-9_]|$)
  unless:
  - id: objectives/credential-access/api-harvest/catalog::redaction-credentials-context
  - id: micro-behaviors/data/text/security/scanner::secret-pattern-scanner-db
  - id: micro-behaviors/data/text/security/scanner::secret-redactor-context
- id: secret-key-process-env-dot
  desc: SECRET_KEY via process.env dot access
  crit: component
  conf: 0.8
  if:
    type: text
    substr: process.env.SECRET_KEY
- id: secret-key-process-env-bracket
  desc: SECRET_KEY via process.env bracket access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'process\.env\[[''"]SECRET_KEY[''"]\]'
- id: secret-key-getenv
  desc: SECRET_KEY via getenv access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'getenv\([''"]SECRET_KEY[''"]\)'
- id: secret-key-os-environ
  desc: SECRET_KEY via os.environ access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'os\.environ\[[''"]SECRET_KEY[''"]\]'
- id: secret-key-system-getenv
  desc: SECRET_KEY via System.getenv access
  crit: component
  conf: 0.8
  if:
    type: text
    regex: 'System\.getenv\([''"]SECRET_KEY[''"]\)'
- id: openai-api-key
  desc: OPENAI_API_KEY environment variable name reference
  crit: component
  conf: 0.85
  for: [scripts, binaries, source]
  if:
    type: text
    substr: OPENAI_API_KEY
- id: anthropic-api-key
  desc: ANTHROPIC_API_KEY environment variable name reference
  crit: component
  conf: 0.85
  for: [scripts, binaries, source]
  if:
    type: text
    substr: ANTHROPIC_API_KEY
composite_rules:
- id: secret-key-generic
  desc: Generic SECRET_KEY environment variable access
  crit: notable
  conf: 0.8
  any:
  - id: secret-key-process-env-dot
  - id: secret-key-process-env-bracket
  - id: secret-key-getenv
  - id: secret-key-os-environ
  - id: secret-key-system-getenv
  unless:
  - id: objectives/supply-chain/trojanized/app/context::hcaptcha-siteverify-secret-context
  - id: objectives/supply-chain/credential-theft/env::legitimate-python-env-config-context
- id: github-token-indicators
  desc: GitHub token variable indicators
  crit: notable
  conf: 0.7
  any:
  - id: github-token-var
  - id: gh-token-var
- id: github-token
  desc: GitHub token environment variable access
  crit: notable
  conf: 0.7
  all:
  - id: github-token-indicators
  - id: metadata/lang/scripted::env-access
- id: api-key-generic
  desc: Generic API_KEY environment variable access
  crit: suspicious
  conf: 0.8
  any:
  - id: api-key-env-bracket
  - id: api-key-getenv
  - id: api-key-process-env
