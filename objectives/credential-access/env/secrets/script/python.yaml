defaults:
  platforms: [windows, unix]
  for:
    - python
# The secret-bearing env-var-name keyword atoms (keyword-token/key/secret/pass/
# auth/pwd/cred) were relocated to
# objectives/credential-access/env/secrets/keywords — a bare keyword is a neutral
# capability, not credential-access intent (TAXONOMY §142). The credential
# objective is the combination below: an actual env read + a secret keyword.
composite_rules:
  - id: python-os-getenv
    desc: Accesses sensitive environment variable via os.getenv
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/os/env/vars/access::getenv
      - id: objectives/credential-access/env/secrets/keywords
    near_lines: 4
  - id: python-os-environ
    desc: Accesses sensitive environment variable via os.environ
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: objectives/credential-access/env/secrets/keywords
    near_lines: 4
    unless:
      - id: micro-behaviors/os/service/legitimate::registry-publish-token-pipeline
      - id: micro-behaviors/os/service/legitimate::github-api-cli-token-helper
      - id: micro-behaviors/os/service/legitimate::github-publish-workflow-token
    downgrade:
      any:
        - id: well-known/lib/pathway::python-package
  - id: python-env-key
    desc: Accesses sensitive environment variable
    crit: notable
    any:
      - id: python-os-getenv
      - id: python-os-environ
  - id: aws-credentials-access
    desc: Accesses AWS credential environment variables
    crit: suspicious
    conf: 0.95
    attack: T1552.001
    all:
      - id: micro-behaviors/os/env/vars/access::getenv
      - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
