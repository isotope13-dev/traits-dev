defaults:
  platforms: [windows, unix]
  for: [python]

# Environment access is a neutral capability. Credential-access objectives
# should add a victim-store or exfiltration context; application configuration
# must not be labeled as theft merely because it contains an API key name.
composite_rules:
  - id: aws-credentials-access
    desc: Accesses AWS credential environment variables
    crit: suspicious
    conf: 0.95
    attack: T1552.001
    all:
      - id: micro-behaviors/os/env/vars/access::getenv
      - id: micro-behaviors/fs/path/sensitive/cloud::aws-credentials
