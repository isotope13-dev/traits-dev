defaults:
  platforms: [windows, unix]
  for:
    - python
traits:
  - id: keyword-token
    desc: TOKEN keyword in env variable
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: '[''"][A-Z][A-Z0-9_]{0,48}TOKEN[A-Z0-9_]{0,48}[''"]'
    not:
      - substr: TIKTOKEN
      - substr: GITHUB_TOKEN
      - substr: GH_TOKEN
      - substr: GITLAB_TOKEN
      - substr: BITBUCKET_TOKEN
      - substr: NUGET_API_KEY
      - substr: PYPI_TOKEN
      - substr: TWINE_PASSWORD
      - substr: SONAR_TOKEN
      - substr: CODECOV_TOKEN
      - substr: COVERALLS_TOKEN
  - id: keyword-key
    desc: KEY keyword in env variable
    crit: suspicious
    conf: 0.65
    if:
      type: string_literal
      regex: '[''"][A-Z][A-Z0-9_]{0,48}KEY_STEALER[A-Z0-9_]{0,48}[''"]'
  - id: keyword-secret
    desc: SECRET keyword in env variable
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: '[''"][A-Z][A-Z0-9_]{0,48}SECRET[A-Z0-9_]{0,48}[''"]'
  - id: keyword-pass
    desc: PASS keyword in env variable
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: '[''"][A-Z][A-Z0-9_]{0,48}(PASS|PASSWORD)[A-Z0-9_]{0,48}[''"]'
  - id: keyword-auth
    desc: AUTH keyword in env variable
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: '[''"][A-Z][A-Z0-9_]{0,48}AUTH[A-Z0-9_]{0,48}[''"]'
  - id: keyword-pwd
    desc: PWD keyword in env variable
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: '[''"][A-Z][A-Z0-9_]{0,48}PWD[A-Z0-9_]{0,48}[''"]'
  - id: keyword-cred
    desc: CRED keyword in env variable
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: '[''"][A-Z][A-Z0-9_]{0,48}CRED(ENTIALS?)?[A-Z0-9_]{0,48}[''"]'
composite_rules:
  - id: python-os-getenv
    desc: Accesses sensitive environment variable via os.getenv
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/os/env/vars/access::getenv
      - id: objectives/credential-access/env/secrets/script
  - id: python-os-environ
    desc: Accesses sensitive environment variable via os.environ
    crit: notable
    conf: 0.9
    all:
      - id: micro-behaviors/os/env/access::os-environ-symbol
      - id: objectives/credential-access/env/secrets/script
    downgrade:
      any:
        - id: well-known/lib/pathway::python-package
  - id: python-env-key
    desc: Accesses sensitive environment variable
    crit: notable
    any:
      - id: python-os-getenv
      - id: python-os-environ
  - id: aws-credentials-access
    desc: Accesses AWS credential environment variables
    crit: suspicious
    conf: 0.95
    attack: T1552.001
    all:
      - id: micro-behaviors/os/env/vars/access::getenv
      - id: micro-behaviors/fs/path/sensitive/credentials::aws-credentials-dup
