# Ruby environment credential harvesting (obfuscated-stealer class).
defaults:
  platforms: [unix, windows]
  for: [ruby]
  attack: T1552.001
traits:
  - id: rb-env-credential-harvest
    desc: ENV filtered by credential keywords
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'ENV\.(select|reject)[\s\S]{0,120}\b(SECRET|TOKEN|KEY)\b'
composite_rules:
  - id: rb-obfuscated-env-credential-harvest
    desc: Obfuscated Ruby env credential harvest
    crit: hostile
    conf: 0.94
    size_max: 262144
    all:
      - id: rb-env-credential-harvest
    any:
      - id: micro-behaviors/data/encode/xor::rb-xor-decode
      - id: micro-behaviors/os/env/vars/cicd::ruby-system-fingerprinting
    needs: 1
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
