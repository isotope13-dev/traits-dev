# PHP environment credential harvesting ($_ENV / getenv filtered by keywords).
defaults:
  platforms: [unix, windows]
  for: [php]
  attack: T1552.001
traits:
  - id: php-env-credential-harvest
    desc: PHP env filtered by credential keywords
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\$_ENV\b[\s\S]{0,160}["''](SECRET|TOKEN|KEY)'
composite_rules:
  - id: php-obfuscated-env-credential-harvest
    desc: Obfuscated PHP env credential harvest
    crit: hostile
    conf: 0.94
    size_max: 262144
    all:
      - id: php-env-credential-harvest
    any:
      - id: micro-behaviors/crypto/symmetric/xor/loop::xor-decode-loop
      - id: micro-behaviors/os/sysinfo/hostname::php-gethostname-call
    needs: 1
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
