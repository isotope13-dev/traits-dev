# PowerShell environment credential harvesting (Get-ChildItem env: | ... -match).
defaults:
  platforms: [unix, windows]
  for: [powershell]
  attack: T1552.001
traits:
  - id: ps-env-credential-harvest
    desc: env drive filtered by credential keywords
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'env:\s*\|[\s\S]{0,80}(KEY|SECRET|TOKEN)'
composite_rules:
  - id: ps-obfuscated-env-credential-harvest
    desc: PowerShell env credential harvest
    crit: hostile
    conf: 0.93
    size_max: 262144
    all:
      - id: ps-env-credential-harvest
      - id: micro-behaviors/os/env/vars/access::env-computername
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
