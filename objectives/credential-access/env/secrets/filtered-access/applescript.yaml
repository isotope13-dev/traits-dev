# AppleScript environment credential harvesting via `do shell script "env|grep"`.
defaults:
  platforms: [macos]
  for: [applescript]
  attack: T1552.001
traits:
  - id: applescript-env-credential-harvest
    desc: do shell script env grep for secrets
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'do shell script[\s\S]{0,40}env[\s\S]{0,30}(KEY|SECRET|TOKEN)'
composite_rules:
  - id: applescript-env-credential-exfil
    desc: AppleScript env harvest and curl exfil
    crit: hostile
    conf: 0.93
    size_max: 262144
    all:
      - id: applescript-env-credential-harvest
      - id: micro-behaviors/communications/http/curl::curl-post-flag
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
