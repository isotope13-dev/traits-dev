# JVM environment credential harvesting (System.getenv filtered by keywords) —
# covers Java and Groovy (Gradle build scripts execute at build time).
defaults:
  platforms: [unix, windows]
  for: [java, groovy]
  attack: T1552.001
traits:
  - id: java-env-credential-harvest
    desc: System.getenv filtered by credential keys
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'System\.getenv\(\)[\s\S]{0,160}["''](SECRET|TOKEN|KEY)'
composite_rules:
  - id: java-obfuscated-env-credential-harvest
    desc: Obfuscated JVM env credential harvest
    crit: hostile
    conf: 0.94
    size_max: 262144
    all:
      - id: java-env-credential-harvest
      - id: micro-behaviors/data/encode/xor::xor-index-modulo-generic
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
