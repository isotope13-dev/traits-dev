# Rust environment credential harvesting (obfuscated-stealer class).
defaults:
  platforms: [unix, windows]
  for: [rust]
  attack: T1552.001
traits:
  - id: rust-env-credential-harvest
    desc: env::vars filtered by credential keywords
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'env::vars\(\)[\s\S]{0,260}(SECRET|TOKEN|KEY|AUTH)'
composite_rules:
  - id: rust-obfuscated-env-credential-harvest
    desc: Obfuscated Rust env credential harvest
    crit: hostile
    conf: 0.94
    size_max: 262144
    all:
      - id: rust-env-credential-harvest
      - id: micro-behaviors/data/encode/xor::xor-index-modulo-generic
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
