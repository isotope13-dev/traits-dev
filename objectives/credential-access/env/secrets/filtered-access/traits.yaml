defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1552.001
traits:
  - id: env-filter-method
    desc: process.env adjacent to filter or match
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 'process\.env.{0,120}(filter|match)|(filter|match).{0,120}process\.env'
  - id: env-secret-filter-keyword-list
    desc: process.env filter regex over credential names
    crit: notable
    conf: 0.88
    if:
      type: text
      regex: 'Object\.keys\(process\.env\)[\s\S]{0,120}/KEY\|SECRET'
  - id: env-filter-pass-secret-regex
    desc: Env filter pass/secret regex
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '/[^/\n]{0,80}(pass|secret)[^/\n]{0,80}/[a-z]*\s*\.\s*(test|exec)\s*\('

  - id: env-filter-key-token-regex
    desc: Env filter key/token regex
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '/[^/\n]{0,80}(key|token)[^/\n]{0,80}/[a-z]*\s*\.\s*(test|exec)\s*\('

  - id: env-filter-auth-cred-regex
    desc: Env filter auth/credential regex
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '/[^/\n]{0,80}(auth|credential)[^/\n]{0,80}/[a-z]*\s*\.\s*(test|exec)\s*\('
  - id: debug-env-filter-marker
    desc: Debug namespace environment filter
    crit: baseline
    conf: 0.95
    if:
      type: text
      regex: 'Object\.keys\(process\.env\)[\s\S]{0,160}/\^?debug_/i?\.test\(\s*key\s*\)'
composite_rules:
  - id: env-secret-filter-credential
    desc: Env filtered for credential-keyword names
    crit: notable
    conf: 0.82
    near_bytes: 200
    all:
      - id: micro-behaviors/os/env/access::process-env
      - id: env-filter-method
    any:
      - id: objectives/credential-access/theft/keywords::secret-upper
      - id: objectives/credential-access/theft/keywords::token-upper
      - id: objectives/credential-access/theft/keywords::cred-upper
    unless:
      - id: well-known/app/opencode-router
      - id: metadata/package/testing/harness/runtime/
      - id: metadata/package/testing/presence/harness/
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/library/structure/
      - id: metadata/package/quality/false-positives::benign-build-tooling-context
  - id: node-env-secret-filter
    desc: Filters env vars for secrets
    crit: notable
    conf: 0.9
    unless:
      - id: well-known/app/opencode-router
    any:
      - id: env-secret-filter-credential
      - id: env-secret-filter-keyword-list
      - id: env-secret-filter-regex-list
  - id: env-secret-filter-regex-list
    desc: process.env secret-name filter regex
    crit: notable
    conf: 0.9
    near_bytes: 240
    all:
      - id: micro-behaviors/os/env/vars/access::js-object-keys-env
    any:
      - id: env-filter-pass-secret-regex
      - id: env-filter-key-token-regex
      - id: env-filter-auth-cred-regex
    unless:
      - id: debug-env-filter-marker
  - id: node-filtered-secret-scan
    desc: Filters process.env for secret values
    crit: suspicious
    conf: 0.94
    unless:
      - id: micro-behaviors/process/interpreter/vm::yarn-release-bundle
      - id: objectives/credential-access/env/secrets/compat::yarn-debug-env-filter
      - id: metadata/library/runtime::acquire-vscode-api
      - id: micro-behaviors/process/interpreter/vm/
    all:
      - id: objectives/credential-access/env/secrets/bulk-access
      - id: node-env-secret-filter

  - id: node-host-identified-env-harvest
    desc: Filters environment variables with host identity
    crit: suspicious
    conf: 0.94
    all:
      - id: env-filter-method
      - id: objectives/discovery/system/fingerprint/user::node-host-user-query-pair
    unless:
      - id: metadata/package/testing/
      - id: metadata/signed/platform/
      - id: well-known/app/salesforce-vscode::salesforce-vscode
      - id: metadata/package/manifest/runtime::vscode-extension
      - id: metadata/library/vscode::require-vscode

  - id: node-persistent-secret-scan
    desc: Node scans credential-named environment variables with persistence
    crit: hostile
    conf: 0.98
    attack: "T1552.001,T1053.003"
    all:
      - id: env-secret-filter-credential
      - id: objectives/persistence/system/cron/job::node-remote-download-cron
