defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1552.001
traits:
  - id: env-filter-method
    desc: process.env adjacent to filter or match
    crit: component
    conf: 0.82
    if:
      type: text
      regex: 'process\.env.{0,120}(filter|match)|(filter|match).{0,120}process\.env'
  - id: env-secret-filter-keyword-list
    desc: process.env filter regex over credential names
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: 'Object\.keys\(process\.env\)[\s\S]{0,120}/KEY\|SECRET'
  - id: env-filter-pass-secret-regex
    desc: Env filter pass/secret regex
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '/.{0,80}(pass|secret)'

  - id: env-filter-key-token-regex
    desc: Env filter key/token regex
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '/.{0,80}(key|token)'

  - id: env-filter-auth-cred-regex
    desc: Env filter auth/credential regex
    crit: component
    conf: 0.88
    if:
      type: text
      regex: '/.{0,80}(auth|credential)'
composite_rules:
  - id: env-secret-filter-credential
    desc: Env filtered for credential-keyword names
    crit: suspicious
    conf: 0.82
    near_bytes: 200
    all:
      - id: micro-behaviors/os/env/access::process-env
      - id: env-filter-method
    any:
      - id: micro-behaviors/data/text/keywords/credential::secret-upper
      - id: micro-behaviors/data/text/keywords/credential::token-upper
      - id: micro-behaviors/data/text/keywords/credential::cred-upper
    unless:
      - id: well-known/app/opencode-router
      - id: metadata/package/testing/harness/runtime::is-test
      - id: metadata/package/testing/presence/harness::test-directory
      - id: metadata/package/testing/presence/fixture::test-filename-pattern
      - id: metadata/library/structure/
      - id: metadata/package/tooling::webpack-bundled
  - id: node-env-secret-filter
    desc: Filters env vars for secrets
    crit: suspicious
    conf: 0.9
    unless:
      - id: well-known/app/opencode-router
    any:
      - id: env-secret-filter-credential
      - id: env-secret-filter-keyword-list
      - id: env-secret-filter-regex-list
  - id: env-secret-filter-regex-list
    desc: process.env secret-name filter regex
    crit: suspicious
    conf: 0.9
    near_bytes: 240
    all:
      - id: micro-behaviors/os/env/vars/access::js-object-keys-env
    any:
      - id: env-filter-pass-secret-regex
      - id: env-filter-key-token-regex
      - id: env-filter-auth-cred-regex
  - id: node-filtered-secret-scan
    desc: Filters process.env for secret values
    crit: suspicious
    conf: 0.94
    unless:
      - id: micro-behaviors/process/interpreter/vm::yarn-release-bundle
      - id: objectives/credential-access/env/secrets/compat::yarn-debug-env-filter
      - id: metadata/library/runtime::acquire-vscode-api
      - id: micro-behaviors/process/create/shell/host::vscode-extension-marker
    all:
      - id: objectives/credential-access/env/secrets/bulk-access
      - id: node-env-secret-filter
