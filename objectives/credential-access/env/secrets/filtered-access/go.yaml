# Go environment credential harvesting (obfuscated-stealer class).
defaults:
  platforms: [unix, windows]
  for: [go]
  attack: T1552.001
traits:
  - id: go-env-credential-harvest
    desc: os.Environ filtered by credential keywords
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'os\.Environ\(\)[\s\S]{0,160}["''](SECRET|TOKEN|KEY)'
composite_rules:
  - id: go-obfuscated-env-credential-harvest
    desc: Obfuscated Go env credential harvest
    crit: hostile
    conf: 0.94
    size_max: 262144
    all:
      - id: go-env-credential-harvest
    any:
      - id: objectives/anti-static/obfuscation/string/recovery::go-static-string-evasion
      - id: micro-behaviors/os/sysinfo/hostname::full-system-recon
    needs: 1
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
