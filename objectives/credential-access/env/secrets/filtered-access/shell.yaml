# Shell environment credential harvesting (`env | grep KEY|SECRET`) — the
# install-hook / dropper form (npm postinstall, setup.py shell-out, PKGBUILD).
defaults:
  platforms: [unix, windows]
  for: [shell]
  attack: T1552.001
traits:
  - id: shell-env-credential-harvest
    desc: env grep filtered by credential keywords
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '\benv\s*\|\s*grep[\s\S]{0,40}(KEY|SECRET|TOKEN)'
composite_rules:
  - id: shell-obfuscated-env-credential-harvest
    desc: Shell env credential harvest and exfil
    crit: hostile
    conf: 0.93
    size_max: 262144
    all:
      - id: shell-env-credential-harvest
    any:
      - id: micro-behaviors/os/sysinfo/process::shell-system-fingerprinting
      - id: micro-behaviors/data/decode/base64::base64-d-cmd
      - id: micro-behaviors/communications/http/curl::curl-post-flag
    needs: 1
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
