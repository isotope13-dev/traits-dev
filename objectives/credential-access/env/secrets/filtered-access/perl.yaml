# Perl environment credential harvesting (grep credential names over keys %ENV).
defaults:
  platforms: [unix, windows]
  for: [perl]
  attack: T1552.001
traits:
  - id: perl-env-credential-harvest
    desc: keys %ENV filtered by credential names
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: '(SECRET|TOKEN|KEY)[\s\S]{0,40}\bkeys\s+%ENV'
composite_rules:
  - id: perl-obfuscated-env-credential-harvest
    desc: Obfuscated Perl env credential harvest
    crit: hostile
    conf: 0.94
    size_max: 262144
    all:
      - id: perl-env-credential-harvest
      - id: micro-behaviors/data/encode/xor::perl-xor-decode
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
