# C#/.NET obfuscated env credential harvest. The env-secret filter and XOR-loop
# atoms already exist (csharp-env-secret-filter / csharp-byte-xor-mod-loop); this
# composite ties them into a hostile verdict.
defaults:
  platforms: [unix, windows]
  for: [csharp]
  attack: T1552.001
composite_rules:
  - id: csharp-obfuscated-env-credential-harvest
    desc: Obfuscated C# env credential harvest
    crit: hostile
    conf: 0.94
    size_max: 262144
    all:
      - id: objectives/exfiltration/http/collect::csharp-env-secret-filter
    any:
      - id: objectives/anti-static/obfuscation/encoding/xor::csharp-byte-xor-mod-loop
      - id: objectives/discovery/system/fingerprint/network::machine-name-read
    needs: 1
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
