# Python environment credential harvesting (obfuscated-stealer class).
# Enumerating os.environ and selecting credential-named vars has no benign use;
# combined with a string decoder or host/user recon it is a credential stealer.
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1552.001
traits:
  - id: py-env-credential-harvest
    desc: os.environ filtered by credential keywords
    crit: notable
    conf: 0.9
    if:
      type: text
      regex: 'in\s+os\.environ[\s\S]{0,100}["''](SECRET|TOKEN|KEY)'
composite_rules:
  - id: py-obfuscated-env-credential-harvest
    desc: Obfuscated Python env credential harvest
    crit: hostile
    conf: 0.94
    size_max: 262144
    all:
      - id: py-env-credential-harvest
    any:
      - id: micro-behaviors/data/encode/xor::xor-decoding-loop
      - id: objectives/discovery/system/fingerprint/hardware::python-getpass-user
    needs: 1
    unless:
      - id: metadata/package/testing/harness/runtime/
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
