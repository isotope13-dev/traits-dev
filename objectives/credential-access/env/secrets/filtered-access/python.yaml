# Python environment credential harvesting (obfuscated-stealer class).
# Filtering os.environ names is a neutral observation because defensive tools
# may use it to redact secrets. The hostile composite requires that observation
# plus XOR decoding or user discovery before it becomes a credential-stealer signal.
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1552.001
traits:
composite_rules:
  - id: py-obfuscated-env-credential-harvest
    desc: Obfuscated Python env credential harvest
    crit: hostile
    conf: 0.94
    size_max: 262144
    all:
      - id: micro-behaviors/os/env/vars/credentials::python-environ-credential-filter
    any:
      - id: micro-behaviors/crypto/symmetric/xor/loop::xor-modulo-key-loop
      - id: objectives/discovery/system/fingerprint/hardware::python-getpass-user
    needs: 1
    unless:
      - id: metadata/package/testing/harness/runtime/
    downgrade:
      any:
        - id: metadata/package/testing/
        - id: metadata/signed/platform/
