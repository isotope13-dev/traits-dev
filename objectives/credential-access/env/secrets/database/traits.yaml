defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
traits:
- id: env-database-url
  desc: Reads DATABASE_URL environment variable
  crit: suspicious
  conf: 0.9
  if:
    type: symbol
    kind: member
    exact: process.env.DATABASE_URL
  unless:
  - id: well-known/tool/detection/security-scanner/
  - id: metadata/package/config::database-url-config-marker
  - id: metadata/library/ai/
- id: env-mongodb-uri
  desc: Reads MONGODB_URI environment variable
  crit: suspicious
  conf: 0.9
  if:
    type: symbol
    kind: member
    exact: process.env.MONGODB_URI
- id: env-postgres-prefix
  desc: Reads POSTGRES_ environment variables
  crit: suspicious
  conf: 0.85
  if:
    type: symbol
    kind: member
    regex: '^process\.env\.POSTGRES_[A-Za-z0-9_]+$'
- id: env-mysql-prefix
  desc: Reads MYSQL_ environment variables
  crit: suspicious
  conf: 0.85
  if:
    type: symbol
    kind: member
    regex: '^process\.env\.MYSQL_[A-Za-z0-9_]+$'
- id: env-redis-url
  desc: Reads REDIS_URL environment variable
  crit: suspicious
  conf: 0.9
  if:
    type: symbol
    kind: member
    exact: process.env.REDIS_URL
composite_rules:
- id: node-database
  desc: Accesses database connection strings
  crit: notable
  conf: 0.85
  any:
  - id: env-database-url
  - id: env-mongodb-uri
  - id: env-postgres-prefix
  - id: env-mysql-prefix
  - id: env-redis-url
