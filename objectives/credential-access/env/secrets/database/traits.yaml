defaults:
  platforms:
  - windows
  - unix
  attack: T1552.001
  for:
  - javascript
  - typescript
traits:
- id: env-database-url
  desc: DATABASE_URL env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.DATABASE_URL
  unless:
  - id: well-known/tool/detection/security-scanner::secret-redactor-context
  - id: env-database-url-app-config-context
  - id: metadata/library/ai::ai-coding-assistant-runtime
- id: env-database-url-app-config-context
  desc: DATABASE_URL application config context
  crit: baseline
  conf: 0.75
  if:
    type: text
    regex: "@mikro-orm/postgresql|DATABASE_URL (must be set|is not set)"
- id: env-mongodb-uri
  desc: MONGODB_URI env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.MONGODB_URI
- id: env-postgres-prefix
  desc: POSTGRES_ env prefix access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.POSTGRES_
- id: env-mysql-prefix
  desc: MYSQL_ env prefix access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.MYSQL_
- id: env-redis-url
  desc: REDIS_URL env access
  crit: suspicious
  conf: 0.6
  if:
    type: string_literal
    substr: process.env.REDIS_URL
composite_rules:
- id: node-database
  desc: Accesses database connection strings
  crit: notable
  conf: 0.85
  any:
  - id: env-database-url
  - id: env-mongodb-uri
  - id: env-postgres-prefix
  - id: env-mysql-prefix
  - id: env-redis-url
