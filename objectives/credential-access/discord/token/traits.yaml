defaults:
  platforms:
    - windows
    - macos
    - linux
  for: [javascript, typescript, python, pe, elf, macho]
  attack: T1555.003
traits:
  - id: regex-standard
    desc: Discord token-shaped string
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (^|[^A-Za-z0-9_-])[A-Za-z0-9_-]{24}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}([^A-Za-z0-9_-]|$)
  - id: regex-mfa
    desc: Discord MFA token regex pattern
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: mfa\.[A-Za-z0-9_-]{84}
  - id: source-pattern-standard
    desc: Source regex for Discord tokens
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: '[\\w-]{24}\\.[\\w-]{6}\\.[\\w-]{27}'
  - id: source-pattern-mfa
    desc: Source regex for MFA tokens
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'mfa\\.[\\w-]{84}'
  - id: literal-pattern
    desc: Discord token in code
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (^|[^\w-])[MN][A-Za-z0-9_-]{23}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}([^\w-]|$)
  - id: localstorage-path
    desc: Discord Local Storage directory access
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)discord(canary|ptb)?[/\\]+Local Storage
    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
      - id: well-known/app/windows-desktop-tools::steamtools-gameaccount-plugin
  - id: local-state-path
    desc: Discord Local State file access
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: (?i)[/\\]discord(canary|ptb)?[/\\]+Local State([^A-Za-z0-9_]|$)
  - id: api-billing
    desc: Discord billing/payment API endpoint
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: discord(app)?\.com/api/(v[0-9]+/)?users/@me/billing
  - id: api-payment-sources
    desc: Discord billing payment-sources endpoint
    crit: suspicious
    conf: 0.95
    if:
      # Anchor to Discord's /billing/ path; bare "payment-sources" also matches
      # unrelated commerce SDKs (Clerk's "commerce-payment-sources", Stripe).
      type: text
      substr: billing/payment-sources
  - id: api-relationships
    desc: Discord relationships API endpoint
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: users/@me/relationships
  - id: api-guilds
    desc: Discord user guilds API endpoint
    crit: component
    conf: 0.85
    if:
      type: text
      substr: users/@me/guilds
  - id: gateway-identify-token
    desc: Discord gateway token identify payload
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: '{"op":2,"d":{"token":"'
  - id: nova-discord-window-class
    desc: Nova Discord window class
    crit: component
    conf: 0.95
    if:
      type: text
      word: NovaDiscordClass
  - id: nova-discord-tool-marker
    desc: Nova Discord tool marker
    crit: component
    conf: 0.95
    if:
      type: text
      word: discord_tool
  - id: discord-path
    desc: Discord application path reference
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)[/\\]discord(canary|ptb)?[/\\]Local Storage
  - id: discord-canary-path
    desc: Discord Canary application path reference
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)discordcanary
  - id: discord-ptb-path
    desc: Discord PTB application path reference
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)discordptb
  - id: ldb-extension
    desc: LevelDB file extension
    crit: component
    conf: 0.6
    if:
      type: text
      exact: .ldb
  - id: appdata-ref
    desc: Windows AppData directory reference
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: (?i)AppData[/\\](Roaming|Local)[/\\]discord(canary|ptb)?
  - id: go-discord-token-stealer-function
    desc: Go Discord token stealer function
    crit: suspicious
    conf: 0.94
    for:
      - pe
      - elf
      - macho
    if:
      type: text
      regex: '(?i)\bsteal[A-Z]\w*Discord[A-Z]\w*Token|\bstealDiscordToken'
  # get-tokens-fn relocated to
  # objectives/credential-access/theft/keywords::get-tokens-fn — `getTokens(`
  # is a generic function name, not Discord-specific. The composites below
  # reference it cross-tier alongside Discord/storage context.
  - id: clerk-token-bridge
    desc: Clerk session token bridge context
    crit: baseline
    conf: 0.9
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: (?i)(window\.Clerk|__clerk_client|__RT_CLERK_TOKEN|clerk\.session\.getToken)
  - id: discord-token-dqw-separator
    desc: "Uses dQw4w9WgXcQ separator to format stolen"
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: "dQw4w9WgXcQ:"
  - id: embed-template-token-field
    desc: Discord credential embed resource
    crit: suspicious
    conf: 0.96
    for: [jar]
    if:
      type: text
      substr: "EmbedTemplate.json"
  - id: embed-template-account-fields
    desc: Discord account embed fields
    crit: component
    conf: 0.9
    for: [jar]
    if:
      type: text
      substr: '"%premium_type"'
  - id: embed-template-mfa-field
    desc: Discord MFA embed field
    crit: component
    conf: 0.9
    for: [jar]
    if:
      type: text
      substr: '"%mfa_enabled"'
  - id: java-crypt32util-dpapi
    desc: Java Crypt32Util DPAPI usage
    crit: component
    conf: 0.95
    for: [jar]
    size_min: 1000
    if:
      type: text
      substr: "win32/Crypt32Util"
  - id: java-crypt-unprotect-data
    desc: Java DPAPI unprotect call
    crit: component
    conf: 0.95
    for: [jar]
    size_min: 1000
    if:
      type: text
      substr: "UnprotectData"
  - id: java-gcm-parameter-spec
    desc: Java AES-GCM parameter spec
    crit: component
    conf: 0.9
    for: [jar]
    size_min: 1000
    if:
      type: text
      substr: "GCMParameterSpec"
  - id: java-okhttp-post-client
    desc: Java OkHttp POST client
    crit: component
    conf: 0.85
    for: [jar]
    size_min: 1000
    if:
      type: text
      substr: "okhttp3/RequestBody"
  - id: java-discord-clients-loot-table
    desc: Java Discord client loot table
    crit: suspicious
    conf: 0.96
    for: [class, java_class, jar, zip]
    if:
      type: text
      exact: DISCORD_CLIENTS
  - id: bouncy-castle-gcm-cipher
    desc: "BouncyCastle GCM block cipher for decrypt"
    crit: suspicious
    conf: 0.85
    for: [csharp]
    if:
      type: text
      substr: GcmBlockCipher
  - id: bouncy-castle-aead-params
    desc: BouncyCastle AeadParameters for GCM
    crit: component
    conf: 0.8
    for: [csharp]
    if:
      type: text
      substr: AeadParameters
  - id: token-skip-5-bytes
    desc: Skip 5 bytes, DPAPI decrypt (Chromium key)
    crit: component
    conf: 0.85
    for: [csharp]
    if:
      type: text
      regex: \.Skip\s*\(\s*5\s*\)\.ToArray\(\)
  - id: gcm-iv-skip-3-take-12
    desc: GCM IV at offset 3 length 12
    crit: component
    conf: 0.8
    for: [csharp]
    if:
      type: text
      regex: \.Skip\s*\(\s*3\s*\)\.Take\s*\(\s*12\s*\)
  - id: python-discord-client-login-patch
    desc: Python patches Discord client login/run
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '\b(discord|disnake)\.Client\.(run|login)\s*='
  - id: python-disnake-library-reference
    desc: Python Disnake library import
    crit: component
    conf: 0.85
    for: [python]
    if:
      type: symbol
      kind: import
      regex: '^disnake(\.|$)'
  - id: python-discord-token-socket-send
    desc: Python sends Discord token over socket
    crit: suspicious
    conf: 0.97
    for: [python]
    if:
      type: text
      regex: '\.sendall\s*\(\s*token\.encode\s*\(\s*\)\s*\)'
composite_rules:
  - id: python-discord-token-arg-hook
    desc: Discord-related Python token argument hook
    crit: component
    conf: 0.94
    for: [python]
    near_bytes: 800
    all:
      - id: python-discord-library-token-reference
    any:
      - id: micro-behaviors/data/source/syntax/keyword::token-parameter-declaration
      - id: micro-behaviors/data/source/syntax/keyword::token-tuple-argument
  - id: python-discord-library-token-reference
    desc: Python Discord library token reference
    crit: component
    conf: 0.85
    for: [python]
    any:
      - id: well-known/lib/discord-py::import
      - id: python-disnake-library-reference
  - id: token-regex-source
    desc: Source includes Discord token regex
    crit: suspicious
    conf: 0.96
    any:
      - id: source-pattern-standard
      - id: source-pattern-mfa
  - id: stealer-detected
    desc: Discord token stealer detected
    crit: suspicious
    conf: 0.98
    mbc: B0030
    all:
      - id: discord-path
    any:
      - id: regex-standard
      - id: token-regex-source
  - id: discord-token-getter
    desc: Discord token getter context
    crit: notable
    conf: 0.82
    for:
      - javascript
      - typescript
      - python
    near_bytes: 1200
    all:
      - id: objectives/credential-access/theft/keywords::get-tokens-fn
    any:
      - id: discord-path
      - id: micro-behaviors/communications/http/oauth::discord-api-users-me-url
      - id: micro-behaviors/communications/http/oauth::discord-users-me-path
      - id: well-known/app/discord::webpack-runtime-global
      - id: token-regex-source
    unless:
      - id: clerk-token-bridge
  - id: browser-grabber
    desc: Discord token grabber targeting multiple
    crit: suspicious
    conf: 0.95
    mbc: B0030
    all:
      - id: discord-path
      - id: objectives/credential-access/theft/keywords::token
  - id: leveldb-harvester
    desc: LevelDB credential harvester
    crit: hostile
    conf: 0.95
    mbc: B0030
    for:
      - javascript
      - typescript
    all:
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
      - id: micro-behaviors/fs/path/sensitive/browser::local-storage-ref
      - id: appdata-ref
      - id: micro-behaviors/process/user/query::os-homedir-call
  - id: windows-leveldb-token-harvester
    desc: Discord token harvester targets LevelDB
    crit: hostile
    conf: 0.97
    mbc: B0030
    all:
      - id: token-regex-source
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
      - id: micro-behaviors/fs/path/sensitive/browser::local-storage-ref
    any:
      - id: discord-path
      - id: appdata-ref
      - id: objectives/credential-access/browser/chromium::brave-path
      - id: objectives/credential-access/browser/chromium::opera-path
      - id: objectives/credential-access/browser/chromium::yandex-path
      - id: metadata/file/string/identity::chrome-browser-name-literal
    unless:
      - id: metadata/package/testing/
  - id: discord-token-exfiltration-chain
    desc: Discord token theft with webhook exfil
    crit: hostile
    conf: 0.98
    mbc: B0030
    all:
      - id: windows-leveldb-token-harvester
    any:
      - id: objectives/exfiltration/messaging/webhook::discord-exfiltration
      - id: micro-behaviors/communications/http/oauth::discord-api-users-me-url
  - id: python-bytecode-discord-token-webhook-stealer
    desc: Python bytecode Discord token webhook stealer
    crit: hostile
    conf: 0.97
    mbc: B0030
    for: [python, pyc, pe]
    all:
      - id: objectives/exfiltration/messaging/webhook::discord-exfiltration
      - id: micro-behaviors/communications/http/oauth::discord-api-users-me-url
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
  - id: firefox-token-stealer
    desc: Firefox Discord token stealer
    crit: hostile
    conf: 0.95
    mbc: B0030
    for:
      - javascript
      - typescript
    all:
      - id: objectives/credential-access/browser/firefox::local-storage-access
      - id: objectives/evasion/hijack-execution-flow/env/profile::appdata-string
      - id: micro-behaviors/process/user/query::os-homedir-call
    any:
      - id: objectives/credential-access/theft/keywords::get-tokens-fn
      - id: micro-behaviors/communications/http/services/discord::domain-regex
  - id: discord-token-dpapi-decrypt
    desc: Discord token DPAPI+AES-GCM decryption (Chromium format)
    crit: hostile
    conf: 0.97
    mbc: B0030
    for: [csharp, source]
    all:
      - id: discord-token-dqw-separator
      - id: objectives/credential-access/browser/dpapi::protected-data-unprotect-src
      - id: bouncy-castle-aead-params
    any:
      - id: bouncy-castle-gcm-cipher
      - id: gcm-iv-skip-3-take-12
      - id: token-skip-5-bytes
  - id: java-browser-dpapi-gcm
    desc: Java Chromium DPAPI AES-GCM decryptor
    crit: suspicious
    conf: 0.96
    mbc: B0030
    for: [jar]
    all:
      - id: java-crypt32util-dpapi
      - id: java-crypt-unprotect-data
      - id: java-gcm-parameter-spec
  - id: discord-credential-embed-template
    desc: Discord credential embed template
    crit: suspicious
    conf: 0.97
    mbc: B0030
    for: [jar]
    any:
      - id: embed-template-token-field
      - id: embed-template-account-fields
      - id: embed-template-mfa-field
  - id: java-discord-dpapi-stealer
    desc: Java Discord DPAPI token stealer
    crit: hostile
    conf: 0.98
    mbc: B0030
    for: [jar]
    all:
      - id: java-crypt32util-dpapi
      - id: java-crypt-unprotect-data
      - id: java-gcm-parameter-spec
      - id: java-okhttp-post-client
    any:
      - id: embed-template-token-field
      - id: micro-behaviors/communications/http/webhook::discord-webhook-path
  - id: java-discord-client-loot-exfil
    desc: Java Discord client loot exfiltration
    crit: hostile
    conf: 0.97
    mbc: B0030
    for: [class, java_class, jar, zip]
    all:
      - id: java-discord-clients-loot-table
      - id: micro-behaviors/communications/http/lib/httpclient::java-httpclient-api
      - id: micro-behaviors/crypto/library/provider::secretkeyspec
    any:
      - id: micro-behaviors/fs/write/file/direct::jvm-fileoutputstream-bytecode
      - id: micro-behaviors/process/create/spawn::java-processbuilder-bytecode
      - id: micro-behaviors/process/create/spawn::java-processbuilder-start-bytecode-symbol
    needs: 1
  - id: discord-users-me-api
    desc: Discord users/@me endpoint
    crit: component
    any:
      - id: micro-behaviors/communications/http/oauth::discord-api-users-me-url
      - id: api-billing
      - id: micro-behaviors/communications/http/services/discord::mfa-totp-endpoint
  - id: discord-api-token-validate
    desc: Discord token validation via /users/@me API
    crit: suspicious
    conf: 0.88
    all:
      - id: micro-behaviors/communications/http/headers::auth-header
      - id: discord-users-me-api
    any:
      - id: token-regex-source
      - id: regex-standard
      - id: regex-mfa
      - id: literal-pattern
      - id: localstorage-path
      - id: local-state-path
  - id: discord-electron-token-interception
    desc: Discord Electron token interception
    crit: hostile
    conf: 0.97
    mbc: B0030
    for: [javascript, typescript]
    all:
      - id: well-known/app/discord::webpack-runtime-global
    any:
      - id: micro-behaviors/process/attach/debugger::electron-webcontents-debugger-attachment
      - id: micro-behaviors/communications/http/oauth::discord-api-users-me-url
      - id: micro-behaviors/communications/http/services/discord::mfa-totp-endpoint
      - id: api-payment-sources
  - id: discord-token-account-automation
    desc: Discord token account automation over WinHTTP
    crit: hostile
    conf: 0.96
    mbc: B0030
    all:
      - id: micro-behaviors/communications/http/oauth::discord-users-me-path
      - id: micro-behaviors/communications/http/headers::auth-header
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
    any:
      - id: micro-behaviors/communications/http/services/discord::user-channels-endpoint
      - id: api-guilds
      - id: micro-behaviors/communications/http/services/discord::invites-api-endpoint
      - id: gateway-identify-token
    needs: 2
  - id: nova-discord-token-utility
    desc: Nova Discord token utility markers
    crit: suspicious
    conf: 0.97
    mbc: B0030
    all:
      - id: nova-discord-window-class
      - id: nova-discord-tool-marker
      - id: micro-behaviors/os/env/config::messaging-service-token-key
    any:
      - id: gateway-identify-token
      - id: micro-behaviors/communications/http/services/discord::user-channels-endpoint
      - id: api-guilds
  - id: python-discord-login-token-hook
    desc: Python Discord login token interception
    crit: suspicious
    conf: 0.97
    mbc: B0030
    for: [python]
    all:
      - id: python-discord-client-login-patch
      - id: python-discord-token-arg-hook
  - id: python-discord-token-socket-exfil
    desc: Python Discord token socket exfiltration
    crit: hostile
    conf: 0.98
    mbc: B0030
    for: [python]
    all:
      - id: python-discord-token-arg-hook
      - id: python-discord-token-socket-send
  - id: python-discord-token-monkeypatch-exfil
    desc: Python Discord client token monkeypatch exfiltration
    crit: hostile
    conf: 0.99
    mbc: B0030
    for: [python]
    all:
      - id: python-discord-login-token-hook
      - id: python-discord-token-socket-send
  - id: native-discord-token-grabber
    # dQw4w9WgXcQ: (the Rick-Astley video id) is the field separator that
    # token-grabber families splice into their multipart exfil payload between
    # the stolen token and account metadata — near-unique to grabbers. In a
    # compiled binary alongside the Discord account API it is a token grabber,
    # not a Discord client (clients never build that separator string).
    desc: Builds payload to exfiltrate Discord tokens
    crit: hostile
    conf: 0.97
    mbc: B0030
    attack: T1528
    for: [elf, macho, pe]
    all:
      - id: discord-token-dqw-separator
    any:
      - id: api-guilds
      - id: micro-behaviors/communications/http/oauth::discord-users-me-path
      - id: gateway-identify-token
  - id: discord-extension-live-token-extraction
    desc: Browser extension extracts a live Discord session token
    crit: hostile
    conf: 0.99
    mbc: B0030
    attack: T1539,T1528
    for: [xpi, crx, zip]
    scope: archive
    all:
      - id: micro-behaviors/data/db/web-storage::browser-storage-token-key-read
      - id: micro-behaviors/process/inject/webextension::chrome-scripting-execute
      - id: metadata/permission/host::host-permission-discord
      - id: metadata/permission/manifest::permission-scripting
