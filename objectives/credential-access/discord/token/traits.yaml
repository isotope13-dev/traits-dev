defaults:
  platforms:
    - windows
    - macos
    - linux
  for: [javascript, typescript, python, pe, elf, macho]
  attack: T1555.003
traits:
  - id: regex-standard
    desc: Discord token-shaped string
    crit: notable
    conf: 0.75
    if:
      type: text
      regex: (^|[^\w-])[\w-]{24}\.[\w-]{6}\.[\w-]{27}([^\w-]|$)
  - id: regex-mfa
    desc: Discord MFA token regex pattern
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: mfa\.[A-Za-z0-9_-]{84}
  - id: source-pattern-standard
    desc: Source regex for Discord tokens
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: '[\\w-]{24}\\.[\\w-]{6}\\.[\\w-]{27}'
  - id: source-pattern-mfa
    desc: Source regex for MFA tokens
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: 'mfa\\.[\\w-]{84}'
  - id: literal-pattern
    desc: Discord token in code
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (^|[^\w-])[MN][A-Za-z0-9_-]{23}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}([^\w-]|$)
  - id: localstorage-path
    desc: Discord Local Storage directory access
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)discord(canary|ptb)?[/\\]+Local Storage
  - id: local-state-path
    desc: Discord Local State file access
    crit: suspicious
    conf: 0.88
    if:
      type: text
      regex: (?i)[/\\]discord(canary|ptb)?[/\\]+Local State([^A-Za-z0-9_]|$)
  - id: api-users-me
    desc: Discord API user validation endpoint
    crit: suspicious
    conf: 0.85
    if:
      type: text
      regex: discord(app)?\.com/api/(v[0-9]+/)?users/@me
  - id: api-billing
    desc: Discord billing/payment API endpoint
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: discord(app)?\.com/api/(v[0-9]+/)?users/@me/billing
  - id: api-payment-sources
    desc: Discord payment sources API endpoint
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: payment-sources
  - id: api-mfa-totp
    desc: Discord MFA TOTP API endpoint
    crit: suspicious
    conf: 0.96
    if:
      type: text
      substr: auth/mfa/totp
  - id: api-relationships
    desc: Discord relationships API endpoint
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: users/@me/relationships
  - id: api-guilds
    desc: Discord user guilds API endpoint
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: users/@me/guilds
  - id: api-invites
    desc: Discord invites API endpoint
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: /api/v10/invites/
  - id: api-channels
    desc: Discord channels API endpoint
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: users/@me/channels
  - id: gateway-identify-token
    desc: Discord gateway token identify payload
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: '{"op":2,"d":{"token":"'
  - id: discord-webpack-chunk-access
    desc: Discord webpack runtime module access
    crit: suspicious
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      substr: webpackChunkdiscord_app
  - id: electron-webcontents-debugger
    desc: Electron webContents debugger attachment
    crit: suspicious
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      substr: webContents.debugger
  - id: nova-discord-window-class
    desc: Nova Discord window class
    crit: component
    conf: 0.95
    if:
      type: text
      word: NovaDiscordClass
  - id: nova-discord-tool-marker
    desc: Nova Discord tool marker
    crit: component
    conf: 0.95
    if:
      type: text
      word: discord_tool
  - id: nova-discord-token-storage
    desc: Nova Discord token storage key
    crit: suspicious
    conf: 0.9
    if:
      type: text
      word: discord_token
  - id: discord-path
    desc: Discord application path reference
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)[/\\]discord(canary|ptb)?[/\\]Local Storage
  - id: discord-canary-path
    desc: Discord Canary application path reference
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)discordcanary
  - id: discord-ptb-path
    desc: Discord PTB application path reference
    crit: suspicious
    conf: 0.7
    if:
      type: text
      regex: (?i)discordptb
  - id: mfa-prefix
    desc: MFA token prefix indicator
    crit: suspicious
    conf: 0.7
    if:
      type: text
      word: mfa.
  - id: mfa-token-type
    desc: MFA token type enumeration
    crit: suspicious
    conf: 0.85
    for:
      - javascript
      - typescript
    if:
      type: text
      regex: (?i)(MFA\s*[=:]\s*[0-9]|TokenType\.MFA|type:\s*MFA)
  - id: users-me-path
    desc: Discord users/@me API path
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: users/@me
  - id: webhook-exfil
    desc: Discord webhook endpoint
    crit: component
    conf: 0.75
    if:
      id: micro-behaviors/communications/http/webhook::discord-webhook-path
  - id: ldb-extension
    desc: LevelDB file extension
    crit: component
    conf: 0.6
    if:
      type: text
      exact: .ldb
  - id: appdata-ref
    desc: Windows AppData directory reference
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: (?i)AppData[/\\](Roaming|Local)[/\\]discord(canary|ptb)?
  - id: go-discord-token-stealer-function
    desc: Go Discord token stealer function
    crit: suspicious
    conf: 0.94
    for:
      - pe
      - elf
      - macho
    if:
      type: raw
      regex: '(?i)\bsteal[A-Z]\w*Discord[A-Z]\w*Token|\bstealDiscordToken'
  - id: extract-tokens-fn
    desc: Token extraction function
    crit: suspicious
    conf: 0.9
    for:
      - javascript
      - typescript
      - python
    if:
      type: text
      regex: \bextractTokens?\(
  - id: get-tokens-fn
    desc: Token getter function
    crit: notable
    conf: 0.85
    size_max: 1000000
    unless:
      - id: objectives/supply-chain/trojanized/app/context::angular-http-xsrf-runtime
    downgrade:
      any:
        - id: well-known/tool/development/vscode-svelte::extension-bundle
    if:
      type: text
      regex: getTokens?\(
  - id: discord-domain-filter
    desc: Discord domain filtering regex
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: discord\(\?:app\)\?
  - id: firefox-webappsstore
    desc: Firefox webappsstore.sqlite database
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: webappsstore.sqlite
  - id: firefox-ls-archive
    desc: Firefox ls-archive.sqlite database
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ls-archive.sqlite
  - id: firefox-storage-default
    desc: Firefox storage/default path
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: storage/default
  - id: firefox-ls-data
    desc: Firefox ls/data.sqlite database
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: ls/data.sqlite
  - id: discord-token-dqw-separator
    desc: Discord token dQw4w9WgXcQ payload separator
    crit: suspicious
    conf: 0.98
    if:
      type: text
      substr: "dQw4w9WgXcQ:"
  - id: embed-template-token-field
    desc: Discord credential embed resource
    crit: suspicious
    conf: 0.96
    for: [jar]
    if:
      type: raw
      substr: "EmbedTemplate.json"
  - id: embed-template-account-fields
    desc: Discord account embed fields
    crit: component
    conf: 0.9
    for: [jar]
    if:
      type: raw
      substr: '"%premium_type"'
  - id: embed-template-mfa-field
    desc: Discord MFA embed field
    crit: component
    conf: 0.9
    for: [jar]
    if:
      type: raw
      substr: '"%mfa_enabled"'
  - id: java-crypt32util-dpapi
    desc: Java Crypt32Util DPAPI usage
    crit: component
    conf: 0.95
    for: [jar]
    size_min: 1000
    if:
      type: raw
      substr: "win32/Crypt32Util"
  - id: java-crypt-unprotect-data
    desc: Java DPAPI unprotect call
    crit: component
    conf: 0.95
    for: [jar]
    size_min: 1000
    if:
      type: raw
      substr: "UnprotectData"
  - id: java-gcm-parameter-spec
    desc: Java AES-GCM parameter spec
    crit: component
    conf: 0.9
    for: [jar]
    size_min: 1000
    if:
      type: raw
      substr: "GCMParameterSpec"
  - id: java-okhttp-post-client
    desc: Java OkHttp POST client
    crit: component
    conf: 0.85
    for: [jar]
    size_min: 1000
    if:
      type: raw
      substr: "okhttp3/RequestBody"
  - id: bouncy-castle-gcm-cipher
    desc: BouncyCastle GCM block cipher for token decrypt
    crit: suspicious
    conf: 0.85
    for: [csharp]
    if:
      type: text
      substr: GcmBlockCipher
  - id: bouncy-castle-aead-params
    desc: BouncyCastle AeadParameters for GCM
    crit: component
    conf: 0.8
    for: [csharp]
    if:
      type: text
      substr: AeadParameters
  - id: token-skip-5-bytes
    desc: Skip 5 bytes, DPAPI decrypt (Chromium key)
    crit: component
    conf: 0.85
    for: [csharp]
    if:
      type: text
      regex: \.Skip\s*\(\s*5\s*\)\.ToArray\(\)
  - id: gcm-iv-skip-3-take-12
    desc: GCM IV at offset 3 length 12
    crit: component
    conf: 0.8
    for: [csharp]
    if:
      type: text
      regex: \.Skip\s*\(\s*3\s*\)\.Take\s*\(\s*12\s*\)
  - id: python-discord-client-login-patch
    desc: Python patches Discord client login/run
    crit: suspicious
    conf: 0.95
    for: [python]
    if:
      type: text
      regex: '\b(discord|disnake)\.Client\.(run|login)\s*='
  - id: python-discord-token-arg-hook
    desc: Python Discord token argument hook
    crit: component
    conf: 0.94
    for: [python]
    if:
      type: text
      regex: 'def\s+\w+\s*\(\s*self\s*,\s*token\b|args\s*=\s*\(\s*token\s*,\s*\)'
  - id: python-discord-token-socket-send
    desc: Python sends Discord token over socket
    crit: suspicious
    conf: 0.97
    for: [python]
    if:
      type: text
      regex: '\.sendall\s*\(\s*token\.encode\s*\(\s*\)\s*\)'
composite_rules:
  - id: token-regex-source
    desc: Source includes Discord token regex
    crit: suspicious
    conf: 0.96
    any:
      - id: source-pattern-standard
      - id: source-pattern-mfa
  - id: stealer-detected
    desc: Discord token stealer detected
    crit: suspicious
    conf: 0.98
    mbc: B0030
    needs: 2
    any:
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
      - id: discord-path
      - id: regex-standard
      - id: token-regex-source
  - id: browser-grabber
    desc: Discord token grabber targeting multiple
    crit: suspicious
    conf: 0.95
    mbc: B0030
    all:
      - id: discord-path
      - id: micro-behaviors/data/text/keywords/lexicon::token
  - id: leveldb-harvester
    desc: LevelDB credential harvester
    crit: hostile
    conf: 0.95
    mbc: B0030
    for:
      - javascript
      - typescript
    all:
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
      - id: micro-behaviors/fs/path/sensitive/browser::local-storage-ref
      - id: appdata-ref
      - id: objectives/discovery/system/fingerprint/hardware::os-homedir-call
  - id: windows-leveldb-token-harvester
    desc: Discord token harvester targets LevelDB
    crit: hostile
    conf: 0.97
    mbc: B0030
    all:
      - id: token-regex-source
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
      - id: micro-behaviors/fs/path/sensitive/browser::local-storage-ref
    any:
      - id: discord-path
      - id: appdata-ref
      - id: objectives/credential-access/browser/chromium::brave-path
      - id: objectives/credential-access/browser/chromium::opera-path
      - id: objectives/credential-access/browser/chromium::yandex-path
      - id: objectives/discovery/host/browser::chrome-name
    unless:
      - id: metadata/package/quality::has-tests
  - id: discord-token-exfiltration-chain
    desc: Discord token theft with webhook exfil
    crit: hostile
    conf: 0.98
    mbc: B0030
    all:
      - id: windows-leveldb-token-harvester
    any:
      - id: webhook-exfil
      - id: objectives/exfiltration/messaging/webhook::discord-exfiltration
      - id: api-users-me
  - id: firefox-storage-access
    desc: Firefox browser storage database access
    crit: suspicious
    conf: 0.9
    for:
      - javascript
      - typescript
      - python
    any:
      - id: firefox-webappsstore
      - id: firefox-ls-archive
      - id: firefox-ls-data
  - id: firefox-token-stealer
    desc: Firefox Discord token stealer
    crit: hostile
    conf: 0.95
    mbc: B0030
    for:
      - javascript
      - typescript
    all:
      - id: firefox-storage-access
      - id: objectives/evasion/hijack-execution-flow/env/profile::appdata-string
      - id: objectives/discovery/system/fingerprint/hardware::os-homedir-call
    any:
      - id: extract-tokens-fn
      - id: get-tokens-fn
      - id: discord-domain-filter
  - id: discord-token-dpapi-decrypt
    desc: Discord token DPAPI+AES-GCM decryption (Chromium format)
    crit: hostile
    conf: 0.97
    mbc: B0030
    for: [csharp, source]
    all:
      - id: discord-token-dqw-separator
      - id: objectives/credential-access/browser/dpapi::protected-data-unprotect-src
      - id: bouncy-castle-aead-params
    any:
      - id: bouncy-castle-gcm-cipher
      - id: gcm-iv-skip-3-take-12
      - id: token-skip-5-bytes
  - id: java-browser-dpapi-gcm
    desc: Java Chromium DPAPI AES-GCM decryptor
    crit: suspicious
    conf: 0.96
    mbc: B0030
    for: [jar]
    all:
      - id: java-crypt32util-dpapi
      - id: java-crypt-unprotect-data
      - id: java-gcm-parameter-spec
  - id: discord-credential-embed-template
    desc: Discord credential embed template
    crit: suspicious
    conf: 0.97
    mbc: B0030
    for: [jar]
    any:
      - id: embed-template-token-field
      - id: embed-template-account-fields
      - id: embed-template-mfa-field
  - id: java-discord-dpapi-stealer
    desc: Java Discord DPAPI token stealer
    crit: hostile
    conf: 0.98
    mbc: B0030
    for: [jar]
    all:
      - id: java-crypt32util-dpapi
      - id: java-crypt-unprotect-data
      - id: java-gcm-parameter-spec
      - id: java-okhttp-post-client
    any:
      - id: embed-template-token-field
      - id: webhook-exfil
  - id: discord-api-token-validate
    desc: Discord token validation via /users/@me API
    crit: suspicious
    conf: 0.88
    any:
      - id: api-users-me
      - id: api-billing
      - id: api-mfa-totp
  - id: discord-electron-token-interception
    desc: Discord Electron token interception
    crit: hostile
    conf: 0.97
    mbc: B0030
    for: [javascript, typescript]
    all:
      - id: discord-webpack-chunk-access
    any:
      - id: electron-webcontents-debugger
      - id: api-users-me
      - id: api-mfa-totp
      - id: api-payment-sources
  - id: discord-token-account-automation
    desc: Discord token account automation over WinHTTP
    crit: hostile
    conf: 0.96
    mbc: B0030
    all:
      - id: users-me-path
      - id: micro-behaviors/communications/http/headers::auth-header
      - id: micro-behaviors/communications/http/client/winhttp::winhttp-request-flow
    any:
      - id: api-channels
      - id: api-guilds
      - id: api-invites
      - id: gateway-identify-token
    needs: 2
  - id: nova-discord-token-utility
    desc: Nova Discord token utility markers
    crit: suspicious
    conf: 0.97
    mbc: B0030
    all:
      - id: nova-discord-window-class
      - id: nova-discord-tool-marker
      - id: nova-discord-token-storage
    any:
      - id: gateway-identify-token
      - id: api-channels
      - id: api-guilds
  - id: python-discord-login-token-hook
    desc: Python Discord login token interception
    crit: suspicious
    conf: 0.97
    mbc: B0030
    for: [python]
    all:
      - id: python-discord-client-login-patch
      - id: python-discord-token-arg-hook
  - id: python-discord-token-socket-exfil
    desc: Python Discord token socket exfiltration
    crit: hostile
    conf: 0.98
    mbc: B0030
    for: [python]
    all:
      - id: python-discord-token-arg-hook
      - id: python-discord-token-socket-send
  - id: python-discord-token-monkeypatch-exfil
    desc: Python Discord client token monkeypatch exfiltration
    crit: hostile
    conf: 0.99
    mbc: B0030
    for: [python]
    all:
      - id: python-discord-login-token-hook
      - id: python-discord-token-socket-send
