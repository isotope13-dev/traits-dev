defaults:
  platforms:
    - unix
    - windows
    - macos
  for: [scripts, binaries]
  attack: T1555.003
traits:
  - id: regex-standard
    desc: Discord token-shaped string
    crit: notable
    conf: 0.75
    if:
      type: string_value
      regex: (^|[^\w-])[\w-]{24}\.[\w-]{6}\.[\w-]{27}([^\w-]|$)
  - id: regex-mfa
    desc: Discord MFA token regex pattern
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: mfa\.[A-Za-z0-9_-]{84}
  - id: source-pattern-standard
    desc: Source regex for Discord tokens
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      substr: '[\\w-]{24}\\.[\\w-]{6}\\.[\\w-]{27}'
  - id: source-pattern-mfa
    desc: Source regex for MFA tokens
    crit: suspicious
    conf: 0.94
    if:
      type: raw
      substr: 'mfa\\.[\\w-]{84}'
  - id: literal-pattern
    desc: Discord token in code
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: '[MN][A-Za-z0-9]{23,}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}'
  - id: localstorage-path
    desc: Discord Local Storage directory access
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: (?i)discord(canary|ptb)?[/\\]+Local Storage
  - id: api-users-me
    desc: Discord API user validation endpoint
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: discord(app)?\.com/api/(v[0-9]+/)?users/@me
  - id: api-billing
    desc: Discord billing/payment API endpoint
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      regex: discord(app)?\.com/api/(v[0-9]+/)?users/@me/billing
  - id: api-payment-sources
    desc: Discord payment sources API endpoint
    crit: suspicious
    conf: 0.95
    if:
      type: string_value
      substr: payment-sources
  - id: api-relationships
    desc: Discord relationships API endpoint
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      regex: users/@me/relationships
  - id: api-channels
    desc: Discord channels API endpoint
    crit: suspicious
    conf: 0.8
    if:
      type: string_value
      regex: users/@me/channels
  - id: discord-path
    desc: Discord application path reference
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (?i)[/\\]discord(canary|ptb)?[/\\]Local Storage
  - id: discord-canary-path
    desc: Discord Canary application path reference
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (?i)discordcanary
  - id: discord-ptb-path
    desc: Discord PTB application path reference
    crit: notable
    conf: 0.7
    if:
      type: string_value
      regex: (?i)discordptb
  - id: mfa-prefix
    desc: MFA token prefix indicator
    crit: notable
    conf: 0.7
    if:
      type: string_value
      exact: mfa.
  - id: mfa-token-type
    desc: MFA token type enumeration
    crit: suspicious
    conf: 0.85
    for:
      - javascript
      - typescript
    if:
      type: raw
      regex: (?i)(MFA\s*[=:]\s*[0-9]|TokenType\.MFA|type:\s*MFA)
  - id: users-me-path
    desc: Discord users/@me API path
    crit: notable
    conf: 0.75
    if:
      type: string_value
      substr: users/@me
  - id: webhook-exfil
    desc: Discord webhook exfiltration endpoint
    crit: suspicious
    conf: 0.9
    if:
      id: micro-behaviors/communications/http/webhook::discord-webhook-path
  - id: ldb-extension
    desc: LevelDB file extension
    crit: notable
    conf: 0.6
    if:
      type: string_value
      exact: .ldb
  - id: appdata-ref
    desc: Windows AppData directory reference
    crit: notable
    conf: 0.6
    if:
      type: string_value
      regex: (?i)AppData[/\\](Roaming|Local)[/\\]discord(canary|ptb)?
  - id: extract-tokens-fn
    desc: Token extraction function
    crit: suspicious
    conf: 0.9
    if:
      type: raw
      regex: extractTokens?\(
  - id: get-tokens-fn
    desc: Token getter function
    crit: notable
    conf: 0.85
    size_max: 1000000
    if:
      type: raw
      regex: getTokens?\(
  - id: discord-domain-filter
    desc: Discord domain filtering regex
    crit: suspicious
    conf: 0.95
    if:
      type: raw
      regex: discord\(\?:app\)\?
  - id: firefox-webappsstore
    desc: Firefox webappsstore.sqlite database
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: webappsstore.sqlite
  - id: firefox-ls-archive
    desc: Firefox ls-archive.sqlite database
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: ls-archive.sqlite
  - id: firefox-storage-default
    desc: Firefox storage/default path
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: storage/default
  - id: firefox-ls-data
    desc: Firefox ls/data.sqlite database
    crit: notable
    conf: 0.85
    if:
      type: string_value
      substr: ls/data.sqlite
composite_rules:
  - id: token-regex-source
    desc: Source includes Discord token regex
    crit: suspicious
    conf: 0.96
    any:
      - id: source-pattern-standard
      - id: source-pattern-mfa
  - id: stealer-detected
    desc: Discord token stealer detected
    crit: suspicious
    conf: 0.98
    mbc: B0030
    for:
      - javascript
      - typescript
      - python
      - elf
      - pe
      - macho
    needs: 2
    any:
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
      - id: discord-path
      - id: regex-standard
      - id: webhook-exfil
  - id: browser-grabber
    desc: Discord token grabber targeting multiple
    crit: suspicious
    conf: 0.95
    mbc: B0030
    for:
      - javascript
      - typescript
      - python
      - elf
      - pe
      - macho
    all:
      - id: discord-path
      - id: micro-behaviors/data/text/keywords::token
  - id: leveldb-harvester
    desc: LevelDB credential harvester
    crit: hostile
    conf: 0.95
    mbc: B0030
    for:
      - javascript
      - typescript
    all:
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
      - id: micro-behaviors/fs/path/sensitive/browser::local-storage-ref
      - id: appdata-ref
      - id: objectives/discovery/system/fingerprint/hardware::os-homedir-call
  - id: windows-leveldb-token-harvester
    desc: Discord token harvester targets LevelDB
    crit: hostile
    conf: 0.97
    mbc: B0030
    for:
      - javascript
      - typescript
      - python
      - elf
      - pe
      - macho
    all:
      - id: token-regex-source
      - id: micro-behaviors/fs/path/sensitive/browser::leveldb-ref
      - id: micro-behaviors/fs/path/sensitive/browser::local-storage-ref
    any:
      - id: discord-path
      - id: appdata-ref
      - id: objectives/credential-access/browser/chromium::brave-path
      - id: objectives/credential-access/browser/chromium::opera-path
      - id: objectives/credential-access/browser/chromium::yandex-path
      - id: objectives/discovery/host/browser::chrome-name
    unless:
      - id: metadata/quality::has-tests
  - id: discord-token-exfiltration-chain
    desc: Discord token theft with webhook exfil
    crit: hostile
    conf: 0.98
    mbc: B0030
    for:
      - javascript
      - typescript
      - python
      - elf
      - pe
      - macho
    all:
      - id: windows-leveldb-token-harvester
    any:
      - id: webhook-exfil
      - id: objectives/exfiltration/messaging::discord-exfiltration
      - id: api-users-me
  - id: firefox-storage-access
    desc: Firefox browser storage database access
    crit: notable
    conf: 0.9
    for:
      - javascript
      - typescript
      - python
    any:
      - id: firefox-webappsstore
      - id: firefox-ls-archive
      - id: firefox-ls-data
  - id: firefox-token-stealer
    desc: Firefox Discord token stealer
    crit: hostile
    conf: 0.95
    mbc: B0030
    for:
      - javascript
      - typescript
    all:
      - id: firefox-storage-access
      - id: objectives/evasion/hijack-execution-flow/env/profile::appdata-string
      - id: objectives/discovery/system/fingerprint/hardware::os-homedir-call
    any:
      - id: extract-tokens-fn
      - id: get-tokens-fn
      - id: discord-domain-filter
