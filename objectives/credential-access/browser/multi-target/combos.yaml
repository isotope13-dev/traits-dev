defaults:
  platforms: [unix, windows, macos]

# Browser Credential Stealer Composite Rules
# Aggregates individual browser data access traits into a high-confidence malware finding
composite_rules:
  - id: composite
    desc: "Comprehensive Browser Data Stealer (Targeting"
    crit: hostile
    conf: 0.95
    mbc: "E1005"
    attack: "T1555.003"
    for: [elf, macho, pe, python, go, javascript]
    needs: 2
    any:
      - id: objectives/credential-access/browser/chromium
      - id: objectives/credential-access/browser/firefox
      - id: objectives/credential-access/browser/safari
  - id: native-dpapi-browser-collector
    desc: Native browser credential collection chain
    crit: suspicious
    conf: 0.92
    attack: "T1555.003"
    mbc: "E1003"
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: micro-behaviors/crypto/dpapi/decrypt::crypt-unprotect-data
      - id: micro-behaviors/fs/file/operations::file-create-win
    any:
      - id: micro-behaviors/fs/enumerate/directory::find-first-file-ex
      - id: micro-behaviors/fs/enumerate/directory::find-next-file
      - id: micro-behaviors/fs/path/check::get-file-attributes
      - id: micro-behaviors/data/encode/base64::alphabet-standard
      - id: micro-behaviors/communications/ipc/named-pipe::rust-anonymous-pipe-path
      - id: micro-behaviors/process/create/spawn::create-process-w
    needs: 2
    downgrade:
      any:
        - id: metadata/vendor/microsoft::microsoft-corp-marker
