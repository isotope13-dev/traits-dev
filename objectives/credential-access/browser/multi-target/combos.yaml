defaults:
  attack: T1555.003
  platforms: [unix, windows, macos]
# Browser Credential Stealer Composite Rules
# Aggregates individual browser data access traits into a high-confidence malware finding
composite_rules:
  - id: composite
    desc: "Comprehensive Browser Data Stealer (Targeting"
    crit: suspicious
    conf: 0.92
    mbc: "E1005"
    for: [elf, macho, pe, python, go, javascript]
    needs: 2
    all:
      - id: objectives/discovery/host/browser/identity::browser-names
    any:
      - id: objectives/credential-access/browser/chromium::master-decrypt
      - id: objectives/credential-access/browser/chromium::password-theft
      - id: objectives/credential-access/browser/chromium::cookie-theft
      - id: objectives/credential-access/browser/firefox::password-theft-comp
      - id: objectives/credential-access/browser/firefox::nss-decrypt
      - id: objectives/credential-access/browser/firefox::moz-logins-sql
      - id: objectives/credential-access/browser/safari::cookies-path
  - id: native-dpapi-browser-collector
    desc: Native browser credential collection chain
    crit: suspicious
    conf: 0.92
    mbc: "E1003"
    for: [pe, dll]
    platforms: [windows]
    all:
      - id: objectives/credential-access/browser/dpapi::dpapi-usage
      - id: micro-behaviors/fs/file/open::file-create-win
    any:
      - id: objectives/credential-access/browser/chromium::master-decrypt
      - id: objectives/credential-access/browser/chromium::password-theft
      - id: objectives/credential-access/browser/chromium::cookie-theft
      - id: objectives/credential-access/browser/firefox::password-theft-comp
      - id: objectives/credential-access/browser/firefox::nss-decrypt
    downgrade:
      any:
        - id: metadata/binary/vendor::microsoft-corp-marker
        - id: metadata/package/versioning::pe-version-resource

  - id: hostile-browser-stealer
    desc: Hostile browser data stealer (multi-targeting + exfil/bypass)
    crit: hostile
    conf: 0.98
    mbc: B0028
    all:
      - id: objectives/discovery/host/browser/identity::multi-browser-profile-targeting
    any:
      - id: micro-behaviors/communications/http/client/
      - id: objectives/exfiltration/
      - id: objectives/credential-access/browser/chromium::abe-bypass-hardware-breakpoint
      - id: objectives/anti-analysis/debugger-detect/hardware-breakpoints/

