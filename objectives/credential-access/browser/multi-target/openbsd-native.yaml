defaults:
  platforms: [openbsd, bsd, unix]
  for: [cpp, elf]
  attack: T1555.003

traits:
  - id: native-firefox-logins-path
    desc: Native Firefox logins path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /logins.json

    unless:
      - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
  - id: native-firefox-key4-path
    desc: Native Firefox key4 path
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: /key4.db
    unless:
      - id: well-known/app/nss::nss-source-tree

  - id: native-chromium-login-data
    desc: Native Chromium Login Data path
    crit: suspicious
    conf: 0.93
    if:
      type: text
      substr: /Default/Login Data

  - id: native-browser-creds-endpoint
    desc: Native browser creds endpoint
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: /api/v1/credentials

composite_rules:
  - id: openbsd-native-browser-credential-theft
    desc: OpenBSD native browser credential theft
    crit: hostile
    conf: 0.98
    all:
      - id: native-browser-creds-endpoint
    needs: 2
    any:
      - id: native-firefox-logins-path
      - id: native-firefox-key4-path
      - id: native-chromium-login-data
