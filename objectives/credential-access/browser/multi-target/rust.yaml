defaults:
  attack: T1555.003
  platforms: [windows, unix]
  for: [rust]
traits:
  - id: browser-dump-command
    desc: Browser dump command route
    crit: component
    conf: 0.94
    if:
      type: string_literal
      exact: /browser_dump
  - id: chromium-dump-call
    desc: Chromium browser dump routine
    crit: component
    conf: 0.94
    if:
      type: text
      substr: browsers::chromium::dump()
  - id: firefox-dump-call
    desc: Firefox browser dump routine
    crit: component
    conf: 0.94
    if:
      type: text
      substr: browsers::firefox::dump()
  - id: chromium-dump-error
    desc: Chromium dump failure text
    crit: component
    conf: 0.95
    if:
      type: string_literal
      exact: "Failed to dump chromium browsers: "
  - id: firefox-dump-error
    desc: Firefox dump failure text
    crit: component
    conf: 0.95
    if:
      type: string_literal
      exact: "Failed to dump firefox browser: "
composite_rules:
  - id: rust-browser-dump-dispatch
    desc: Rust multi-browser dump dispatcher
    crit: suspicious
    conf: 0.97
    all:
      - id: browser-dump-command
      - id: chromium-dump-call
      - id: firefox-dump-call
    any:
      - id: chromium-dump-error
      - id: firefox-dump-error
