# Native macOS browser harvest routines common to info-stealers:
# collectBrowserData / collectExtensions, Firefox logins.json, and
# Full-Disk-Access gated collection followed by encrypt+upload.
defaults:
  platforms: [macos]
  for: [macho]
  attack: "T1555.003"
  mbc: "B0028"

traits:
  - id: collect-browser-data-routine
    desc: collectBrowserData harvest routine
    crit: suspicious
    conf: 0.97
    if:
      type: text
      substr: collectBrowserData

  - id: collect-extensions-routine
    desc: Browser extension collection routine
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: 'collect(Firefox)?Extensions\b'

  - id: collect-software-targets-routine
    desc: Software-target collection routine
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: collectSoftwareTargets

  - id: firefox-logins-json-target
    desc: Firefox logins.json credential target
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '(?i)[/\\]?logins\.json\b'

composite_rules:
  - id: macos-multi-browser-harvest
    desc: Native macOS multi-browser credential harvest
    crit: hostile
    conf: 0.98
    all:
      - id: collect-browser-data-routine
      - id: collect-extensions-routine
      - id: firefox-logins-json-target
      - id: micro-behaviors/data/db/sqlite::sqlite3-open
      - id: micro-behaviors/crypto/library/provider::commoncrypto-pbkdf
