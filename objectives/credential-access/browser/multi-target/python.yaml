defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1555.003
traits:
  - id: browser-libsecret-schema
    desc: Browser libsecret schema reference
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: chrome_libsecret_os_crypt_password_v2
  - id: browser-kwallet-service
    desc: KWallet browser secret service
    crit: component
    conf: 0.92
    if:
      type: text
      substr: org.kde.kwalletd5
  - id: browser-keys-wallet
    desc: Browser Keys keyring labels
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: Chrome Keys|Brave Keys
  - id: browser-safe-storage-label
    desc: Browser safe storage labels
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: Chrome Safe Storage|Brave Safe Storage
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: well-known/app/verbiflow::verbiflow-host-browser-context
composite_rules:
  - id: browser-freedesktop-secrets
    desc: Browser-specific freedesktop secret schema access
    crit: suspicious
    conf: 0.92
    all:
      - id: micro-behaviors/communications/ipc/dbus/secret-service::freedesktop-secret-service-reference
      - id: browser-libsecret-schema

  - id: browser-decryption-imports
    desc: Python browser credential decryption imports
    crit: suspicious
    conf: 0.9
    mbc: B0028
    all:
      - id: metadata/import/python::sqlite3
      - id: metadata/import/python::ctypes
      - id: metadata/import/python::cryptography/hazmat/primitives/ciphers
    any:
      - id: micro-behaviors/data/encode/base64::import-base64
      - id: metadata/import/python::json
      - id: metadata/import/python::requests
      - id: metadata/import/python::tempfile
      - id: metadata/import/python::shutil
    needs: 3
  - id: browser-cookie-export-imports
    desc: Python browser cookie export imports
    crit: suspicious
    conf: 0.88
    attack: T1539
    all:
      - id: metadata/import/python::websocket
      - id: metadata/import/python::requests
      - id: metadata/import/python::subprocess
      - id: objectives/discovery/host/browser/identity::browser-data-files
    any:
      - id: metadata/import/python::json
      - id: metadata/import/python::tempfile
      - id: metadata/import/python::zipfile
      - id: metadata/import/python::time
      - id: metadata/import/python::threading
    needs: 3
    unless:
      - id: metadata/package/quality/false-positives::benign-app-fp-context
  - id: browser-stealer-imports
    desc: Python browser stealer import stack
    crit: suspicious
    conf: 0.92
    mbc: B0028
    all:
      - id: metadata/import/python::sqlite3
      - id: metadata/import/python::ctypes
      - id: metadata/import/python::requests
      - id: metadata/import/python::zipfile
    any:
      - id: metadata/import/python::websocket
      - id: metadata/import/python::cryptography/hazmat/primitives/ciphers
      - id: metadata/import/python::aiohttp
      - id: metadata/import/python::tempfile
      - id: metadata/import/python::subprocess
    needs: 4
  - id: python-browser-keyring-targeting
    desc: Python browser keyring targeting
    crit: suspicious
    conf: 0.95
    all:
      - id: browser-freedesktop-secrets
      - id: browser-libsecret-schema
    any:
      - id: browser-kwallet-service
      - id: browser-keys-wallet
      - id: browser-safe-storage-label
  - id: python-browser-stealer-imports
    desc: Python multi-browser stealer imports
    crit: suspicious
    conf: 0.94
    mbc: B0028
    any:
      - id: browser-decryption-imports
      - id: browser-cookie-export-imports
      - id: browser-stealer-imports
      - id: python-browser-keyring-targeting
