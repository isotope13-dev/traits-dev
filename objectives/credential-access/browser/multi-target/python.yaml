defaults:
  for: [python]
  attack: T1555.003

traits:
  - id: browser-decryption-imports
    desc: Python browser credential decryption imports
    crit: suspicious
    conf: 0.9
    mbc: B0028
    if:
      type: import_combination
      required:
        - "^sqlite3$"
        - "^ctypes$"
        - "^cryptography\\.hazmat\\.primitives\\.ciphers$"
      suspicious:
        - "^base64$"
        - "^json$"
        - "^requests$"
        - "^tempfile$"
        - "^shutil$"
      min_suspicious: 3
      max_total: 30

  - id: browser-cookie-export-imports
    desc: Python browser cookie export imports
    crit: suspicious
    conf: 0.88
    attack: T1539
    if:
      type: import_combination
      required:
        - "^websocket$"
        - "^requests$"
        - "^subprocess$"
      suspicious:
        - "^json$"
        - "^tempfile$"
        - "^zipfile$"
        - "^time$"
        - "^threading$"
      min_suspicious: 3
      max_total: 30

  - id: browser-stealer-imports
    desc: Python browser stealer import stack
    crit: suspicious
    conf: 0.92
    attack: T1555.003
    mbc: B0028
    if:
      type: import_combination
      required:
        - "^sqlite3$"
        - "^ctypes$"
        - "^requests$"
        - "^zipfile$"
      suspicious:
        - "^websocket$"
        - "^cryptography\\.hazmat\\.primitives\\.ciphers$"
        - "^aiohttp$"
        - "^tempfile$"
        - "^subprocess$"
      min_suspicious: 4
      max_total: 30

composite_rules:
  - id: python-browser-stealer-imports
    desc: Python multi-browser stealer imports
    crit: suspicious
    conf: 0.94
    attack: T1555.003
    mbc: B0028
    any:
      - id: browser-decryption-imports
      - id: browser-cookie-export-imports
      - id: browser-stealer-imports
