defaults:
  platforms: [windows, unix]
  for: [python]
  attack: T1555.003
traits:
  - id: browser-freedesktop-secrets
    desc: Freedesktop secrets service reference
    crit: suspicious
    conf: 0.92
    if:
      type: text
      substr: org.freedesktop.secrets
  - id: browser-libsecret-schema
    desc: Browser libsecret schema reference
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: chrome_libsecret_os_crypt_password_v2
  - id: browser-kwallet-service
    desc: KWallet browser secret service
    crit: component
    conf: 0.92
    if:
      type: text
      substr: org.kde.kwalletd5
  - id: browser-keys-wallet
    desc: Browser Keys keyring labels
    crit: suspicious
    conf: 0.93
    if:
      type: text
      regex: Chrome Keys|Brave Keys
  - id: browser-safe-storage-label
    desc: Browser safe storage labels
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: Chrome Safe Storage|Brave Safe Storage
  # Python module imports used by browser stealers.  Each is a neutral module
  # individually; combinations are the actual signal, expressed as composites.
  - id: sqlite3-module-import
    desc: sqlite3 module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: sqlite3
  - id: ctypes-module-import
    desc: ctypes module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: ctypes
  - id: cryptography-hazmat-ciphers-import
    desc: cryptography hazmat ciphers import
    crit: component
    if:
      type: symbol
      kind: import
      exact: cryptography.hazmat.primitives.ciphers
  - id: json-module-import
    desc: json module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: json
  - id: requests-module-import
    desc: requests module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: requests
  - id: tempfile-module-import
    desc: tempfile module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: tempfile
  - id: shutil-module-import
    desc: shutil module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: shutil
  - id: websocket-module-import
    desc: websocket module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: websocket
  - id: subprocess-module-import
    desc: subprocess module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: subprocess
  - id: zipfile-module-import
    desc: zipfile module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: zipfile
  - id: time-module-import
    desc: time module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: time
  - id: threading-module-import
    desc: threading module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: threading
  - id: aiohttp-module-import
    desc: aiohttp module import
    crit: component
    if:
      type: symbol
      kind: import
      exact: aiohttp
composite_rules:
  - id: browser-decryption-imports
    desc: Python browser credential decryption imports
    crit: suspicious
    conf: 0.9
    mbc: B0028
    all:
      - id: sqlite3-module-import
      - id: ctypes-module-import
      - id: cryptography-hazmat-ciphers-import
    any:
      - id: metadata/lang/source::imports-base64
      - id: json-module-import
      - id: requests-module-import
      - id: tempfile-module-import
      - id: shutil-module-import
    needs: 3
  - id: browser-cookie-export-imports
    desc: Python browser cookie export imports
    crit: suspicious
    conf: 0.88
    attack: T1539
    all:
      - id: websocket-module-import
      - id: requests-module-import
      - id: subprocess-module-import
    any:
      - id: json-module-import
      - id: tempfile-module-import
      - id: zipfile-module-import
      - id: time-module-import
      - id: threading-module-import
    needs: 3
  - id: browser-stealer-imports
    desc: Python browser stealer import stack
    crit: suspicious
    conf: 0.92
    mbc: B0028
    all:
      - id: sqlite3-module-import
      - id: ctypes-module-import
      - id: requests-module-import
      - id: zipfile-module-import
    any:
      - id: websocket-module-import
      - id: cryptography-hazmat-ciphers-import
      - id: aiohttp-module-import
      - id: tempfile-module-import
      - id: subprocess-module-import
    needs: 4
  - id: python-browser-keyring-targeting
    desc: Python browser keyring targeting
    crit: suspicious
    conf: 0.95
    all:
      - id: browser-freedesktop-secrets
      - id: browser-libsecret-schema
    any:
      - id: browser-kwallet-service
      - id: browser-keys-wallet
      - id: browser-safe-storage-label
  - id: python-browser-stealer-imports
    desc: Python multi-browser stealer imports
    crit: suspicious
    conf: 0.94
    mbc: B0028
    any:
      - id: browser-decryption-imports
      - id: browser-cookie-export-imports
      - id: browser-stealer-imports
      - id: python-browser-keyring-targeting
