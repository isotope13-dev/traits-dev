defaults:
  platforms: [macos]
  for: [macho]
  attack: T1555.003
  mbc: B0028
traits:
  - id: parse-profile-symbol
    desc: Browser profile parser symbol
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      regex: ^main\.\(\*[A-Za-z0-9_]{4,}\)\.ParseProfile$
  - id: parse-extension-symbol
    desc: Browser extension parser symbol
    crit: suspicious
    conf: 0.95
    if:
      type: symbol
      regex: ^main\.\(\*[A-Za-z0-9_]{4,}\)\.ParseExt$
  - id: profiles-symbol
    desc: Browser profiles enumeration symbol
    crit: notable
    conf: 0.9
    if:
      type: symbol
      regex: ^main\.\(\*[A-Za-z0-9_]{4,}\)\.Profiles$
  - id: cookiesnamed-symbol
    desc: Named cookie access symbol
    crit: component
    conf: 0.95
    if:
      type: symbol
      regex: ^main\.\(\*[A-Za-z0-9_]{4,}\)\.CookiesNamed$
  - id: setcookies-symbol
    desc: Cookie staging setter symbol
    crit: suspicious
    conf: 0.9
    if:
      type: symbol
      regex: ^main\.\(\*[A-Za-z0-9_]{4,}\)\.SetCookies$
  - id: extra-extensions
    desc: Extra browser extensions target
    crit: component
    conf: 0.9
    if:
      type: text
      exact: ExtraExtensions
  - id: vivaldi-target
    desc: Vivaldi browser target reference
    crit: notable
    conf: 0.85
    if:
      type: text
      regex: Vivaldi.{0,20}(Cookies|key4\.db)
  - id: key4-db
    desc: Firefox key4.db target reference
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: key4.db
composite_rules:
  - id: browser-profile-collection
    desc: Native browser profile collection
    crit: suspicious
    conf: 0.95
    all:
      - id: parse-profile-symbol
    any:
      - id: profiles-symbol
      - id: vivaldi-target
      - id: key4-db
  - id: browser-extension-collection
    desc: Native browser extension collection
    crit: suspicious
    conf: 0.95
    all:
      - id: parse-extension-symbol
    any:
      - id: extra-extensions
      - id: vivaldi-target
  - id: browser-cookie-collection
    desc: Native browser cookie collection
    crit: suspicious
    conf: 0.95
    all:
      - id: browser-profile-collection
    any:
      - id: cookiesnamed-symbol
      - id: setcookies-symbol
  - id: native-browser-data-stealer
    desc: Native multi-browser data stealer
    crit: hostile
    conf: 0.98
    all:
      - id: browser-profile-collection
      - id: browser-extension-collection
      - id: browser-cookie-collection
    any:
      - id: key4-db
      - id: vivaldi-target
