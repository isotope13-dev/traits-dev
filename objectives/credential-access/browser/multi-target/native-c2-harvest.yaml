defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1555.003
  mbc: E1003

traits:
  - id: browser-harvest-start-log
    desc: Browser data-harvest operation start log
    crit: suspicious
    conf: 0.98
    if:
      type: text
      exact: 'harvest: starting browser data collection'

  - id: password-loot-json-field
    desc: Outbound JSON password loot field
    crit: component
    conf: 0.9
    if:
      type: text
      exact: '"passwords":"'

  - id: credit-card-loot-json-field
    desc: Outbound JSON payment-card loot field
    crit: component
    conf: 0.94
    if:
      type: text
      exact: '"credit_cards":"'

  - id: firefox-cookie-loot-json-field
    desc: Outbound Firefox cookie loot field
    crit: component
    conf: 0.94
    if:
      type: text
      exact: '"firefox_cookies":"'

composite_rules:
  - id: c2-browser-credential-harvest
    desc: C2 implant harvests browser passwords, payment cards, and cookies
    crit: hostile
    conf: 0.99
    all:
      - id: browser-harvest-start-log
      - id: objectives/command-and-control/backdoor/rat/control::hidden-copy-c2-loop-log
    any:
      - id: password-loot-json-field
      - id: credit-card-loot-json-field
      - id: firefox-cookie-loot-json-field
    needs: 3
    unless:
      - id: metadata/signed/platform/
      - id: well-known/tool/detection/
