- id: script-chromium-credential-theft
  desc: Script reads Chrome profile and queries credential tables
  crit: hostile
  conf: 0.95
  attack: T1555.003
  mbc: B0028
  for: [scripts, source]
  # A script that references the Chrome User Data profile path AND runs SQL
  # against the credential tables (logins/cookies) is a browser credential
  # stealer — there is no legitimate reason to query Chrome's logins table.
  all:
  - id: micro-behaviors/fs/path/application/browser::chrome-user-data
  - id: browser-creds-table-sql
  any:
  - id: micro-behaviors/fs/path/sensitive/browser::login-data
  - id: micro-behaviors/fs/path/sensitive/browser::browser-cookies-file-path
# REMOVED: `node-kimi-browser-session-theft` (hostile) and its `node-kimi-auth-
# cookie-sql` leg. Both were mined from a single package and keyed on one
# vendor's cookie name and host, so they could not fire on any other artifact
# — they detected a named product, not a technique.
#
# They were also mis-described. The legs proved a lookup narrowed to exactly
# one cookie on one first-party domain, which is the shape of a client reusing
# the user's own session with that same service, not of "theft": a stealer
# dumps the cookies table and ships it elsewhere. Calling first-party session
# reuse "theft" in the finding text sends a triager the wrong way.
#
# The generic technique is still covered: `chromium-encrypted-cookie-sql-select`
# above (encrypted cookie-store read), `chrome-safe-storage-keychain-query`,
# and the macOS `chrome-password-theft-macos` composite, which requires the
# Chrome KDF salt plus a keychain/credential-store leg. Genuine theft is
# separated from session reuse by breadth of the query and by the destination
# the recovered secret is sent to.
- id: chromium-profile-session-token-harvest
  desc: Chromium profile session token harvesting
  crit: hostile
  conf: 0.97
  attack: T1555.003
