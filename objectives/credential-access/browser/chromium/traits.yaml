defaults:
  platforms:
    - linux
    - macos
    - windows
  for: [scripts, binaries, source]
traits:
  - id: chrome-path
    desc: Chrome browser profile path (credential access context)
    crit: notable
    conf: 0.7
    attack: T1555.003
    if:
      type: text
      regex: (?i)Google[/\\]Chrome[/\\]User Data[/\\].{0,40}(Login Data|Cookies)
  - id: brave-path
    desc: Brave browser profile path
    crit: notable
    conf: 0.7
    attack: T1555.003
    if:
      type: text
      regex: (?i)BraveSoftware[/\\]Brave-Browser.{0,80}(Login Data|Cookies)
    downgrade:
      any:
        - id: metadata/binary/metrics::massive-executable
  - id: edge-path
    desc: Microsoft Edge browser profile path
    crit: suspicious
    conf: 0.7
    attack: T1555.003
    if:
      type: text
      regex: (?i)Microsoft[/\\]Edge.{0,80}(Login Data|Cookies)
      case_insensitive: true
  - id: opera-macos-path
    desc: Opera macOS profile path
    crit: notable
    conf: 0.6
    attack: T1555.003
    if:
      type: text
      regex: /com\.operasoftware\.Opera/
  - id: opera-windows-path
    desc: Opera Windows profile path
    crit: suspicious
    conf: 0.7
    attack: T1555.003
    if:
      type: text
      regex: (?i)Opera Software[/\\](Opera|Opera GX Stable).{0,80}(Login Data|Cookies)
  - id: operagx-path
    desc: Opera GX browser profile path
    crit: suspicious
    conf: 0.7
    attack: T1555.003
    if:
      type: text
      regex: (?i)(/com\.operasoftware\.OperaGX/|Opera GX Stable.{0,80}(Login Data|Cookies))
  - id: vivaldi-path
    desc: Vivaldi browser profile path
    crit: suspicious
    conf: 0.7
    attack: T1555.003
    if:
      type: text
      substr: User Data/Vivaldi
  - id: yandex-path
    desc: Yandex browser profile path
    crit: suspicious
    conf: 0.7
    attack: T1555.003
    if:
      type: text
      substr: Yandex/YandexBrowser
    downgrade:
      any:
        - id: metadata/binary/metrics::massive-executable
  - id: arc-macos-path
    desc: Arc macOS profile path
    crit: notable
    conf: 0.6
    attack: T1555.003
    if:
      type: text
      substr: /Arc/
  - id: arc-userdata-path
    desc: Arc User Data path
    crit: notable
    conf: 0.6
    attack: T1555.003
    if:
      type: text
      substr: Arc/User Data
  - id: coccoc-path
    desc: Coccoc browser profile path
    crit: suspicious
    conf: 0.7
    attack: T1555.003
    if:
      type: text
      regex: /com\.coccoc\.Coccoc/
  - id: encrypted-key
    desc: Chromium encrypted_key field
    crit: suspicious
    conf: 0.85
    attack: T1555.003
    if:
      type: text
      exact: encrypted_key
    unless:
      - type: text
        substr: JWE Compact Serialization
      - type: text
        substr: Unsupported JWE alg requested
      - type: text
        substr: Overwolf Ltd
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: os-crypt
    desc: Chromium os_crypt structure
    crit: notable
    conf: 0.85
    attack: T1555.003
    if:
      type: text
      substr: os_crypt
    unless:
      - type: text
        substr: Overwolf Ltd
    downgrade:
      any:
        - id: metadata/signed/platform::apple
  - id: logins-table
    desc: Chromium Login Data database reference
    crit: notable
    conf: 0.7
    attack: T1555.003
    if:
      type: text
      regex: (?i)Login\s+Data
  - id: chromium-cookie-sql
    desc: Chromium cookies table SQL query
    crit: notable
    conf: 0.8
    attack: T1555.003
    for: [scripts, source]
    if:
      type: text
      regex: SELECT.{0,30}host_key.{0,30}encrypted_value.{0,30}FROM\s+cookies
      case_insensitive: true
  - id: firefox-cookie-sql
    desc: Firefox moz_cookies table SQL query
    crit: notable
    conf: 0.8
    attack: T1555.003
    if:
      type: text
      regex: SELECT.{0,30}host_key.{0,30}encrypted_value.{0,30}FROM\s+moz_cookies
      case_insensitive: true
  - id: credit-card-sql
    desc: Chromium credit card SQL query
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    mbc: B0028
    if:
      type: text
      regex: SELECT.{0,50}card_number.{0,30}FROM\s+credit_cards
      case_insensitive: true
  - id: password-sql
    desc: Chromium Login Data SQL query
    crit: suspicious
    conf: 0.95
    attack: T1555.003
    mbc: B0028
    if:
      type: text
      regex: SELECT.{0,40}origin_url.{0,40}password_value.{0,40}FROM\s+logins
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/certificate::bitdefender-brand-text
  - id: chromium-abe-marker
    desc: Chromium ABE bypass marker
    crit: suspicious
    conf: 0.95
    if:
      type: text
      substr: "OSCrypt.AppBoundProvider.Decrypt.ResultCode"
  - id: abe-bypass-set-thread-context-setup
    desc: SetThreadContext setup for ABE bypass (DR7=1)
    crit: suspicious
    conf: 0.95
    for: [pe]
    if:
      type: hex
      pattern: "48 c7 84 24 90 00 00 00 01 00 00 00 48 8d 54 24 20"
      section: .text
  - id: abe-bypass-register-extraction
    desc: Register-based ABE key extraction (R14/R15 from CONTEXT)
    crit: suspicious
    conf: 0.95
    for: [pe]
    if:
      type: hex
      # 48 8b 94 24 30 01 00 00 : mov rdx, qword [rsp + 0x130] (R15 in CONTEXT @ 0x20)
      # 85 ed                   : test ebp, ebp
      # 48 0f 45 94 24 28 01 00 : cmovne rdx, qword [rsp + 0x128] (R14 in CONTEXT @ 0x20)
      # 00
      pattern: "48 8b 94 24 30 01 00 00 85 ed 48 0f 45 94 24 28 01 00 00"
      section: .text
  - id: target-browser-library
    desc: Targets Chromium or Edge main library
    crit: component
    conf: 0.8
    if:
      type: text
      regex: "(chrome|msedge)\\.dll"
  - id: suspicious-browser-launch-flags
    desc: Suspicious browser launch flags for stealth execution
    crit: suspicious
    conf: 0.85
    if:
      type: text
      substr: "--no-first-run --disable-default-apps --disable-extensions --disable-gpu --no-sandbox"

composite_rules:
  - id: opera-path
    desc: Opera browser profile path
    crit: suspicious
    conf: 0.7
    attack: T1555.003
    any:
      - id: opera-macos-path
      - id: opera-windows-path
  - id: arc-path
    desc: Arc browser profile path
    crit: notable
    conf: 0.7
    attack: T1555.003
    any:
      - id: arc-macos-path
      - id: arc-userdata-path
  - id: cookie-sql
    desc: Browser cookie SQL query
    crit: suspicious
    conf: 0.9
    attack: T1555.003
    any:
      - id: chromium-cookie-sql
      - id: firefox-cookie-sql
  - id: cookie-theft
    desc: Chrome cookie file access
    crit: suspicious
    conf: 0.85
    attack: T1555.003
    all:
      - id: chrome-path
      - id: objectives/credential-access/browser/chromium::cookies-dup
  - id: shell-cookie-theft
    desc: Chrome cookie theft via shell
    crit: suspicious
    conf: 0.9
    attack: T1555.003
    for:
      - shell
    all:
      - id: chrome-path
      - id: objectives/credential-access/browser/chromium::cookies-dup
    any:
      - id: objectives/command-and-control/dropper/execution/payload::cp-execute
      - id: objectives/command-and-control/dropper/execution/script::curl-cmd-dup
      - id: micro-behaviors/fs/attributes/xattr::xattr-remove
  - id: master-decrypt
    desc: Chromium master password decryption
    crit: suspicious
    conf: 0.9
    attack: T1555.003
    mbc: E1003
    all:
      - id: objectives/credential-access/browser/chromium::local-state
      - id: encrypted-key
      - id: os-crypt
  - id: password-theft
    desc: Chromium password theft detected
    crit: notable
    conf: 0.95
  - id: credit-card-theft
    desc: Chromium credit card data theft
    crit: hostile
    conf: 0.9
    attack: T1555.003
    mbc: B0028
    for:
      - python
      - javascript
      - elf
      - pe
      - macho
    all:
      - id: chrome-path
      - id: objectives/credential-access/browser/chromium::web-data
      - id: micro-behaviors/fs/path/sensitive/browser::browser-credit-cards
  - id: multi-browser
    desc: Multiple Chromium browsers targeted (stealer
    crit: hostile
    conf: 0.95
    attack: T1555.003
    mbc: B0028
    needs: 3
    any:
      - id: chrome-path
      - id: brave-path
      - id: edge-path
      - id: opera-path
      - id: operagx-path
      - id: vivaldi-path
      - id: arc-path
      - id: yandex-path
    downgrade:
      any:
        - id: metadata/binary/metrics::massive-executable
  - id: abe-bypass-hardware-breakpoint
    desc: ABE bypass via hardware breakpoints
    crit: hostile
    conf: 0.95
    attack: T1555.003
    all:
      - id: chromium-abe-marker
      - id: objectives/anti-analysis/debugger-detect/hardware-breakpoints::debugger-attach-loop
      - id: objectives/anti-analysis/debugger-detect/hardware-breakpoints::debug-register-manipulation
  - id: browser-injection-suspended
    desc: Browser injection with suspended process and library targeting
    crit: hostile
    conf: 0.9
    attack: T1055.003
    all:
      - id: target-browser-library
      - id: micro-behaviors/process/create/flags::create-suspended
      - id: micro-behaviors/process/info/thread::resume-thread
  - id: browser-stealer-exfil-chain
    desc: Browser stealer credential theft and exfiltration chain
    crit: hostile
    conf: 0.95
    attack: T1041
    all:
      - id: abe-bypass-hardware-breakpoint
      - id: micro-behaviors/communications/http/client::winhttp-downloader-flow

  - id: hostile-browser-script-stealth
    desc: Hostile browser targeting with script-host execution (stealth)
    crit: hostile
    conf: 0.92
    attack: T1059.005
    all:
      - id: target-browser-library
      - id: objectives/execution/interpreter/vbscript/interpreter::wscript-host-exec
