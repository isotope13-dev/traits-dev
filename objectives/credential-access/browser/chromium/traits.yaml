defaults:
  platforms:
  - linux
  - macos
  - windows
  for: [scripts, binaries, source]
traits:
- id: chrome-path
  desc: "Chrome browser profile path"
  crit: suspicious
  conf: 0.7
  attack: T1555.003
  unless:
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: well-known/app/kopuz::music-player-context
  if:
    type: text
    regex: (?i)Google[/\\]Chrome[/\\]User Data[/\\].{0,40}(Login Data|Cookies)
- id: brave-path
  desc: Brave browser profile path
  crit: suspicious
  conf: 0.7
  attack: T1555.003
  unless:
  - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
  - id: metadata/package/quality/source::kopuz-isolated-cookie-module
  - id: metadata/package/quality/source::kopuz-isolated-cookie-leaf
  - id: well-known/app/kopuz::music-player-context
  if:
    type: text
    regex: (?i)BraveSoftware[/\\]Brave-Browser.{0,80}(Login Data|Cookies)
  downgrade:
    any:
    - id: metadata/binary/metrics/size::massive-executable
- id: edge-path
  desc: Microsoft Edge browser profile path
  crit: suspicious
  conf: 0.7
  attack: T1555.003
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    - id: well-known/app/microsoft-edge::microsoft-edge-package-context
    - id: metadata/package/quality/source::kopuz-isolated-cookie-module
    - id: metadata/package/quality/source::kopuz-isolated-cookie-leaf
    - id: well-known/app/kopuz::music-player-context
  if:
    type: text
    regex: (?i)Microsoft[/\\]Edge.{0,80}(Login Data|Cookies)
    case_insensitive: true
- id: opera-macos-path
  desc: Opera macOS profile path
  crit: suspicious
  conf: 0.6
  attack: T1555.003
  if:
    type: text
    substr: /com.operasoftware.Opera/
  unless:
    - id: metadata/package/quality/source::kopuz-isolated-cookie-module
    - id: metadata/package/quality/source::kopuz-isolated-cookie-leaf
    - id: well-known/app/kopuz::music-player-context
- id: opera-windows-path
  desc: Opera Windows profile path
  crit: suspicious
  conf: 0.7
  attack: T1555.003
  unless:
    - id: well-known/app/anthropic-cybersecurity-skills::defensive-cybersecurity-skills-repository
    - id: metadata/package/quality/source::kopuz-isolated-cookie-module
    - id: metadata/package/quality/source::kopuz-isolated-cookie-leaf
    - id: well-known/app/kopuz::music-player-context
  if:
    type: text
    regex: (?i)Opera Software[/\\](Opera|Opera GX Stable).{0,80}(Login Data|Cookies)
- id: operagx-path
  desc: Opera GX browser profile path
  crit: suspicious
  conf: 0.7
  attack: T1555.003
  if:
    type: text
    regex: (?i)(/com\.operasoftware\.OperaGX/|Opera GX Stable.{0,80}(Login Data|Cookies))
  unless:
    - id: metadata/package/quality/source::kopuz-isolated-cookie-module
    - id: metadata/package/quality/source::kopuz-isolated-cookie-leaf
    - id: well-known/app/kopuz::music-player-context
- id: vivaldi-path
  desc: Vivaldi browser profile path
  crit: suspicious
  conf: 0.7
  attack: T1555.003
  unless:
  - id: well-known/app/kopuz::music-player-context
  if:
    type: text
    substr: User Data/Vivaldi
- id: yandex-path
  desc: Yandex browser profile path
  crit: suspicious
  conf: 0.7
  attack: T1555.003
  unless:
  - id: well-known/app/kopuz::music-player-context
  if:
    type: text
    substr: Yandex/YandexBrowser
  downgrade:
    any:
    - id: metadata/binary/metrics/size::massive-executable
- id: coccoc-path
  desc: Coccoc browser profile path
  crit: suspicious
  conf: 0.7
  attack: T1555.003
  unless:
  - id: well-known/app/kopuz::music-player-context
  if:
    type: text
    substr: /com.coccoc.Coccoc/
- id: encrypted-key
  desc: Chromium encrypted_key field
  crit: component
  conf: 0.85
  attack: T1555.003
  if:
    type: text
    word: encrypted_key
  unless:
  - type: text
    substr: JWE Compact Serialization
  - type: text
    substr: Unsupported JWE alg requested
  - id: metadata/library/data::overwolf-vendor-string
  - id: metadata/lang/scripted::dts-declaration-file
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
  downgrade:
    any:
    - id: metadata/signed/platform::apple
- id: os-crypt
  desc: Chromium os_crypt structure
  crit: notable
  conf: 0.85
  attack: T1555.003
  if:
    type: text
    regex: '(?i)\bos_crypt\s*(::|\.|\()'
  unless:
  - id: metadata/library/data::overwolf-vendor-string
  - id: well-known/lib/electron::electron-chromium-runtime-strong
  downgrade:
    any:
    - id: metadata/signed/platform::apple
- id: login-data-string
  desc: Login Data artifact string
  crit: component
  conf: 0.75
  attack: T1555.003
  if:
    type: text
    regex: (?i)Login\s+Data
  unless:
  - type: trait
    id: metadata/file/extension/identity::linux-kernel-package-artifact-basename
- id: chromium-cookie-sql
  desc: Chromium cookies table SQL query
  crit: suspicious
  conf: 0.8
  attack: T1555.003
  for: [scripts, source, powershell]
  if:
    type: text
    regex: SELECT.{0,30}host_key.{0,30}encrypted_value.{0,30}FROM\s+cookies
    case_insensitive: true
  unless:
    - id: metadata/package/quality/source::kopuz-isolated-cookie-module
    - id: metadata/package/quality/source::kopuz-isolated-cookie-leaf
    - id: well-known/app/kopuz::music-player-context
- id: browser-creds-table-sql
  desc: SQL query against a browser credential table
  crit: suspicious
  conf: 0.9
  attack: T1555.003
  for: [scripts, source, powershell]
  # Matches column-agnostic queries (e.g. `SELECT * FROM `logins``) that the
  # column-specific password-sql/cookie-sql atoms miss. The targeted table name
  # (logins/cookies/credit_cards) carries the credential-theft intent.
  if:
    type: text
    regex: (?i)SELECT\b.{0,80}FROM\s+[`'"]?(logins|cookies|credit_cards)\b
  unless:
  - id: well-known/lib/deb-package::firefox-omni-basename
  - id: metadata/library/automation::google-flow-browser-auth-client
  - id: well-known/app/kombai::kombai-browser-profile-import-context
  - id: well-known/app/theclawbay::theclawbay-zo-byok-cookie-configuration
  - id: metadata/package/quality/source::kopuz-isolated-cookie-module
  - id: metadata/package/quality/source::kopuz-isolated-cookie-leaf
  - id: well-known/app/kopuz::music-player-context
  # Selects a single first-party session cookie, not the cookies table.
  - id: well-known/app/kimi-chat-opencode::kimi-chat-opencode-context
# Renamed from `node-kimi-cookie-sql`: the matcher is a generic Chromium
# cookie-store read and has nothing to do with any one vendor. The sibling
# `node-kimi-auth-cookie-name` and `node-kimi-cookie-host-filter` traits were
# removed outright — they hardcoded a single service's cookie name
# (`kimi-auth`) and host (`kimi.com`), so they could never fire on anything but
# that one package, and what they actually matched was a lookup narrowed to one
# first-party domain, which is evidence *against* harvesting rather than for
# it. Those product-specific strings now live where vendor identifiers belong,
# in well-known/app/kimi-chat-opencode.
- id: chromium-encrypted-cookie-sql-select
  desc: SQL selects encrypted browser cookies
  crit: suspicious
  conf: 0.96
  attack: T1555.003
  mbc: B0028
  for: [javascript, typescript]
  if:
    type: text
    regex: 'SELECT\s+quote\(encrypted_value\)\s+FROM\s+cookies'
  unless:
    - id: well-known/app/kimi-chat-opencode::kimi-chat-opencode-context
- id: powershell-cookie-sql
  desc: PowerShell queries the Chromium cookies table
  crit: suspicious
  conf: 0.95
  for: [powershell]
  platforms: [windows]
  attack: T1555.003
  if:
    type: text
    regex: '(?i)\bSELECT\b.{0,180}\bFROM\s+cookies\b'
- id: firefox-cookie-sql
  desc: Firefox moz_cookies table SQL query
  crit: suspicious
  conf: 0.8
  attack: T1555.003
  if:
    type: text
    regex: SELECT.{0,30}host_key.{0,30}encrypted_value.{0,30}FROM\s+moz_cookies
    case_insensitive: true
- id: credit-card-sql
  desc: Chromium credit card SQL query
  crit: suspicious
  conf: 0.95
  attack: T1555.003
  mbc: B0028
  if:
    type: text
    regex: SELECT.{0,50}card_number.{0,30}FROM\s+credit_cards
    case_insensitive: true
- id: password-sql
  desc: Chromium Login Data SQL query
  crit: suspicious
  conf: 0.95
  attack: T1555.003
  mbc: B0028
  if:
    type: text
    regex: SELECT.{0,40}origin_url.{0,40}password_value.{0,40}FROM\s+logins
    case_insensitive: true
  downgrade:
    any:
    - id: metadata/signed/certificate/identity::bitdefender-brand-text
  unless:
  - id: metadata/package/quality/recognized-contexts::malcontent-defensive-scanner-context
- id: chromium-password-extractor-symbol
  desc: Chromium password extraction routine
  crit: suspicious
  conf: 0.94
  for: [binaries]
  platforms: [windows]
  attack: T1555.003
  if:
    type: text
    word: extractChromiumPasswords
- id: chromium-cookie-extractor-symbol
  desc: Chromium cookie extraction routine
  crit: suspicious
  conf: 0.92
  for: [binaries]
  platforms: [windows]
  attack: T1555.003
  if:
    type: text
    word: extractChromiumCookies
- id: chromium-abe-marker
  desc: Chromium ABE bypass marker
  crit: suspicious
  conf: 0.95
  if:
    type: text
    substr: "OSCrypt.AppBoundProvider.Decrypt.ResultCode"
- id: chromium-app-bound-key-name
  desc: Chromium app-bound key name
  crit: suspicious
  conf: 0.95
  platforms: [windows]
  attack: T1555.003
  if:
    type: text
    substr: Google Chromekey1
- id: chromium-app-bound-key-name-wide
  desc: Chromium app-bound key name in UTF-16
  crit: suspicious
  conf: 0.95
  for: [pe, dll]
  platforms: [windows]
  attack: T1555.003
  if:
    type: encoded
    encoding: wide
    exact: Google Chromekey1
- id: app-bound-encrypted-key-field
  desc: Chromium app-bound encrypted key
  crit: suspicious
  conf: 0.95
  platforms: [windows]
  attack: T1555.003
  if:
    type: text
    word: app_bound_encrypted_key
  unless:
  - id: well-known/app/bitwarden::bitwarden-app
  - id: metadata/package/quality/source::kopuz-isolated-cookie-module
  - id: metadata/package/quality/source::kopuz-isolated-cookie-leaf
  - id: well-known/app/kopuz::music-player-context
- id: edge-ielevator-iid
  desc: Edge IElevator credential interface
  crit: suspicious
  conf: 0.94
  platforms: [windows]
  for: [binaries]
  attack: T1555.003
  if:
    type: text
    exact: '{c9c2b807-7731-4f34-81b7-44ff7779522b}'
- id: cng-ncrypt-decrypt
  desc: Windows CNG NCryptDecrypt call
  crit: suspicious
  conf: 0.9
  for: [python]
  platforms: [windows]
  if:
    type: symbol
    exact: ncrypt.NCryptDecrypt
- id: ncrypt-open-storage-provider-text
  desc: NCryptOpenStorageProvider dynamic resolve
  crit: notable
  conf: 0.9
  platforms: [windows]
  for: [pe, dll]
  if:
    type: text
    substr: NCryptOpenStorageProvider
  unless:
    - id: well-known/app/telegram::telegram-desktop-signed-client-context
- id: ncrypt-open-key-text
  desc: NCryptOpenKey dynamic resolve
  crit: notable
  conf: 0.9
  platforms: [windows]
  for: [pe, dll]
  if:
    type: text
    substr: NCryptOpenKey
- id: browser-key-pipe-tag
  desc: Browser key named pipe tag
  crit: component
  conf: 0.85
  for: [python]
  platforms: [windows]
  if:
    type: text
    regex: pid_to_tag|\\\\\.\\pipe\\
- id: browser-key-pipe-symbol
  desc: Browser key pipe helper symbol
  crit: component
  conf: 0.9
  for: [python]
  platforms: [windows]
  if:
    type: symbol
    exact: pid_to_tag
- id: abe-bypass-set-thread-context-setup
  desc: SetThreadContext setup for ABE bypass (DR7=1)
  crit: suspicious
  conf: 0.95
  for: [pe]
  if:
    type: hex
    pattern: "48 c7 84 24 90 00 00 00 01 00 00 00 48 8d 54 24 20"
    section: .text
- id: abe-bypass-register-extraction
  desc: 'Register-based ABE key extraction'
  crit: suspicious
  conf: 0.95
  for: [pe]
  if:
    type: hex
      # 48 8b 94 24 30 01 00 00 : mov rdx, qword [rsp + 0x130] (R15 in CONTEXT @ 0x20)
      # 85 ed                   : test ebp, ebp
      # 48 0f 45 94 24 28 01 00 : cmovne rdx, qword [rsp + 0x128] (R14 in CONTEXT @ 0x20)
      # 00
    pattern: "48 8b 94 24 30 01 00 00 85 ed 48 0f 45 94 24 28 01 00 00"
    section: .text
- id: target-browser-library
  desc: Targets Chromium or Edge main library
  crit: component
  conf: 0.8
  if:
    type: text
    regex: "(chrome|msedge)\\.dll"
- id: suspicious-browser-launch-flags
  desc: Headless no-sandbox browser launch flags
  crit: suspicious
  conf: 0.85
  if:
    type: text
    substr: "--no-first-run --disable-default-apps --disable-extensions --disable-gpu --no-sandbox"

- id: chromium-master-key-dpapi-symbols--getchromiummasterkey
  desc: DPAPI-decrypts Chromium (getChromiumMasterKey)
  crit: suspicious
  conf: 0.94
  for: [pe, dll]
  platforms: [windows]
  if:
    type: text
    word: getChromiumMasterKey
- id: chromium-master-key-dpapi-symbols--dpapidecrypt
  desc: DPAPI-decrypts Chromium master (dpapiDecrypt)
  crit: suspicious
  conf: 0.94
  for: [pe, dll]
  platforms: [windows]
  if:
    type: text
    word: dpapiDecrypt
- id: chromium-master-key-dpapi-symbols--decryptchromiumpassword
  desc: DPAPI-decrypts (decryptChromiumPassword)
  crit: suspicious
  conf: 0.94
  for: [pe, dll]
  platforms: [windows]
  if:
    type: text
    word: decryptChromiumPassword
- id: native-browser-decrypted-key-log
  desc: Native browser decrypted-key log
  crit: suspicious
  conf: 0.97
  attack: T1555.003
  for: [pe, dll]
  platforms: [windows]
  if:
    type: text
    regex: '(?i)V(10|20)\s+Decrypted\s+Key'
- id: native-browser-key-extraction-log
  desc: Native browser key extraction log
  crit: suspicious
  conf: 0.97
  attack: T1555.003
  for: [pe, dll]
  platforms: [windows]
  if:
    type: text
    regex: '(?i)ExtractDecryptedV(10|20)KeyFromLocalState'
- id: native-browser-key-record-send-log
  desc: Native browser key-record send log
  crit: suspicious
  conf: 0.97
  attack: T1555.003
  for: [pe, dll]
  platforms: [windows]
