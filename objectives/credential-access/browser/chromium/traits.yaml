    regex: '(?i)DecryptChromiumV(10|20)Secret'
- id: native-browser-firefox-key-log
  desc: Native Firefox master-key log
  crit: suspicious
  conf: 0.97
  attack: T1555.003
  for: [pe, dll]
  platforms: [windows]
  if:
    type: text
    regex: '(?i)Firefox\s+Master\s+Key'
- id: native-browser-session-token-log
  desc: Native browser session-token log
  crit: suspicious
  conf: 0.95
  attack: T1555.003
  for: [pe, dll]
  platforms: [windows]
  if:
    type: text
    regex: '(?i)(Session|Sync)\s+Token:'
- id: native-browser-process-discovery-log
  desc: Native browser process discovery log
  crit: notable
  conf: 0.96
  attack: T1555.003
  for: [pe, dll]
  platforms: [windows]
  if:
    type: text
    regex: '(?i)(Found\s+[^\r\n]{0,24}Running\s+Browser\s+Processes|Detected\s+Browser:)'
