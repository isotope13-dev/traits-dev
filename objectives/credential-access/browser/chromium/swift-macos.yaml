defaults:
  platforms: [unix]
  for: [swift]
  attack: T1555.003

traits:
  - id: swift-chrome-login-db
    desc: Swift Chrome Login Data
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: Chrome/Default/Login Data

  - id: swift-chrome-login-query
    desc: Swift Chrome login query
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: SELECT origin_url, username_value, password_value

composite_rules:
  - id: swift-chrome-login-theft
    desc: Swift Chrome login theft
    crit: hostile
    conf: 0.98
    all:
      - id: swift-chrome-login-db
      - id: swift-chrome-login-query
