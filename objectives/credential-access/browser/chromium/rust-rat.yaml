defaults:
  platforms: [windows]
  for: [pe]
  attack: T1555.003
  mbc: B0028

traits:
  - id: rust-browser-login-collector-labels
    desc: Rust browser login collector labels
    crit: suspicious
    conf: 0.9
    if:
      type: hex
      section: .rdata
      pattern: 6c 6f 67 69 6e 73 62 72 6f 77 73 65 72 5f 64 61 74 61
  - id: chromium-profile-target-labels
    desc: Chromium profile target labels
    crit: suspicious
    conf: 0.86
    if:
      type: hex
      section: .rdata
      pattern: 55 53 45 52 50 52 4f 46 49 4c 45 63 68 72 6f 6d 65 65 64 67 65
  - id: browser-userpass-encrypted-labels
    desc: Browser userpass encrypted labels
    crit: suspicious
    conf: 0.88
    if:
      type: hex
      section: .rdata
      pattern: 75 73 65 72 70 61 73 73 5b 45 4e 43 52 59 50 54 45 44 5d

composite_rules:
  - id: rust-chromium-login-collector
    desc: Rust Chromium login collection
    crit: hostile
    conf: 0.96
    all:
      - id: rust-browser-login-collector-labels
      - id: chromium-profile-target-labels
      - id: browser-userpass-encrypted-labels
      - id: objectives/command-and-control/backdoor/dispatch/module::rust-socketio-client-path
      - id: micro-behaviors/process/create/command-handler::execute-command-label
      - id: objectives/command-and-control/backdoor/dispatch/module::rat-auth-heartbeat-labels
    any:
      - id: micro-behaviors/data/db/sqlite::rusqlite
