defaults:
  platforms:
    - linux
    - unix
    - macos
    - android
    - ios
    - windows
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.8
  mbc: OB0003
  attack: T1555.003
traits:
  - id: cookies-dup
    desc: Chromium Cookies database path
    if:
      id: objectives/credential-access/browser/chromium::chromium-cookie-sql
  - id: web-data
    desc: Chromium Web Data database path
    if:
      type: string_value
      substr: Web Data
  - id: local-state
    desc: Chromium Local State file path
    crit: notable
    if:
      type: string_value
      substr: Local State
