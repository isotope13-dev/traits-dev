defaults:
  platforms:
    - linux
    - unix
    - macos
    - android
    - ios
    - windows
  for: [scripts, binaries]
  crit: suspicious
  conf: 0.8
  mbc: OB0003
  attack: T1555.003
traits:
  - id: cookies-dup
    desc: Chromium Cookies database path
    if:
      id: objectives/credential-access/browser/chromium::chromium-cookie-sql
  - id: cookies-copy-db
    desc: Chromium copied Cookies database
    if:
      type: string_value
      regex: '(?i)Cookies_copy\.db'
  - id: web-data
    desc: Chromium Web Data database path
    if:
      type: string_value
      regex: '(?i)(^Web Data$|[\\/](Web Data)([\\/]|$))'
  - id: web-data-copy-db
    desc: Chromium copied Web Data database
    if:
      type: string_value
      regex: '(?i)Web_Data_copy\.db'
  - id: login-data-copy-db
    desc: Chromium copied Login Data database
    if:
      type: string_value
      regex: '(?i)Login_Data_copy\.db'
  - id: history-copy-db
    desc: Chromium copied History database
    if:
      type: string_value
      regex: '(?i)History_copy\.db'
  - id: local-state
    desc: Chromium Local State file path
    crit: notable
    if:
      type: string_value
      substr: Local State
  - id: browsers-info-artifact
    desc: Browser collection artifact name
    crit: notable
    if:
      type: string_value
      exact: BROWSERS_INFO
  - id: appbound-key-artifact
    desc: App-bound key dump artifact
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: '(?i)decrypted_appbound_key\.txt'
  - id: decrypted-browser-key-artifact
    desc: Decrypted browser key artifact
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      regex: '(?i)decrypted_(brave|chrome|edge)_key\.txt'
  - id: browser-headless-launch
    desc: Headless browser launch flags
    crit: suspicious
    conf: 0.85
    if:
      type: string_value
      substr: --headless --no-first-run
  - id: browser-silent-headless-launch
    desc: Silent headless browser launch
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: --silent-launch --headless --no-first-run
