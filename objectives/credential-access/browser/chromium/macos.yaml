defaults:
  for:
    - shell
    - python
    - javascript
    - applescript
  platforms:
    - macos
  attack: T1555.003
traits:
  - id: chrome-keychain-query
    desc: Queries Keychain for Chrome Safe Storage key
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: security\s+find-generic-password\s+-wa.{0,50}'?Chrome'?
    unless:
      - id: well-known/app/kombai::kombai-browser-profile-import-context
      - id: well-known/app/verbiflow::verbiflow-host-browser-context
  - id: chrome-safe-storage-keychain-query
    desc: Queries Keychain for Chrome Safe Storage
    crit: suspicious
    conf: 0.95
    if:
      type: text
      regex: find-generic-password.{0,80}Chrome Safe Storage
    unless:
      - id: well-known/app/kombai::kombai-browser-profile-import-context
      - id: well-known/app/verbiflow::verbiflow-host-browser-context
  - id: chrome-safe-storage-key-string
    desc: Chrome Safe Storage key string reference
    crit: suspicious
    conf: 0.8
    if:
      type: string_literal
      substr: Chrome Safe Storage
    unless:
      - id: metadata/library/automation::google-flow-browser-auth-client
      - id: well-known/app/kombai::kombai-browser-profile-import-context
      - id: well-known/app/verbiflow::verbiflow-host-browser-context
      # Redundant with chrome-safe-storage-keychain-query above, which stays
      # suspicious for this package and carries the signal on its own.
      - id: well-known/app/kimi-chat-opencode::kimi-chat-opencode-context
  - id: openssl-aes-decryption-cmd
    desc: OpenSSL AES decryption for Chrome
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: openssl\s+enc\s+.{0,100}-aes-128-cbc\s+-iv\s+.{0,100}-K\s+
    unless:
      - id: well-known/app/verbiflow::verbiflow-host-browser-context
composite_rules:
  - id: chrome-password-theft-macos
    desc: macOS Chrome credential decryption
    crit: hostile
    conf: 0.95
    mbc: B0028
    all:
      - id: micro-behaviors/crypto/kdf/algorithm::chrome-compatible-kdf-salt
    any:
      - id: chrome-keychain-query
      - id: chrome-safe-storage-keychain-query
      - id: openssl-aes-decryption-cmd
      - id: micro-behaviors/fs/path/sensitive/browser::login-data
      - id: micro-behaviors/fs/path/sensitive/browser::chromium-web-data-file
    unless:
      - id: well-known/app/aleapp::aleapp-source-tree
      - id: metadata/package/testing/presence/harness::test-directory
      - id: well-known/app/kombai::kombai-browser-profile-import-context
      - id: well-known/app/verbiflow::verbiflow-host-browser-context
      # Reads one session cookie scoped to its own service and replays it only
      # to that service; no password store is touched, so "password theft"
      # misdescribes it. The Safe Storage keychain query stays suspicious.
      - id: well-known/app/kimi-chat-opencode::kimi-chat-opencode-context
