defaults:
  attack: T1555.003
  platforms:
    - unix
    - windows
    - macos
  for:
    - shell
    - applescript
    - macho
traits:
  - id: cookies-path
    desc: macOS system cookies path
    crit: component
    conf: 0.8
    platforms:
      - macos
    for:
      - python
      - javascript
      - shell
    if:
      type: string_literal
      substr: /Library/Cookies
  - id: binarycookies
    desc: macOS binary cookies file
    crit: suspicious
    conf: 0.8
    platforms:
      - macos
    if:
      type: text
      substr: .binarycookies
    unless:
      - id: well-known/app/comfy-desktop::comfy-reset-mac-path
      - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member
  - id: cookies-binarycookies
    desc: Safari Cookies.binarycookies file
    crit: suspicious
    conf: 0.85
    platforms:
      - macos
    if:
      type: text
      substr: Cookies.binarycookies
    unless:
      - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member
  - id: history-db
    desc: Safari History.db file
    crit: suspicious
    conf: 0.8
    platforms:
      - macos
    if:
      type: text
      regex: (Safari|WebKit)[/\\\\].{0,50}History\.db|History\.db.{0,30}Safari
  - id: localstorage
    desc: Safari LocalStorage path
    crit: suspicious
    conf: 0.75
    platforms:
      - macos
    if:
      type: text
      substr: Safari/LocalStorage
composite_rules:
  - id: safari-cookie-artifact-reference
    desc: Safari cookie artifact reference
    crit: suspicious
    conf: 0.85
    platforms:
      - macos
    any:
      - id: cookies-path
      - id: binarycookies
      - id: cookies-binarycookies
    unless:
      - id: well-known/app/carbon-copy-cloner::official-carbon-copy-cloner-member
