# Credential Access - Safari Browser Data Theft
# macOS Safari and system cookie theft
# ATT&CK: T1555.003 (Credentials from Password Stores: Credentials from Web Browsers)
defaults:
  attack: T1555.003
  platforms: [unix, windows, macos]
  for: [shell, applescript, macho]
traits:
  # === Path/File References ===
  - id: cookies-path
    desc: macOS system cookies path
    crit: suspicious
    conf: 0.8
    platforms: [macos]
    for: [python, javascript, shell]
    if:
      type: string_value
      substr: "/Library/Cookies"
  - id: binarycookies
    desc: macOS binary cookies file
    crit: suspicious
    conf: 0.8
    platforms: [macos]
    if:
      type: string_value
      substr: ".binarycookies"
  - id: cookies-binarycookies
    desc: Safari Cookies.binarycookies file
    crit: suspicious
    conf: 0.85
    platforms: [macos]
    if:
      type: string_value
      substr: "Cookies.binarycookies"
  - id: history-db
    desc: Safari History.db file
    crit: suspicious
    conf: 0.8
    platforms: [macos]
    if:
      type: string_value
      regex: '(?:Safari|WebKit)[/\\\\].{0,50}History\.db|History\.db.{0,30}Safari'
  - id: localstorage
    desc: Safari LocalStorage path
    crit: suspicious
    conf: 0.75
    platforms: [macos]
    if:
      type: string_value
      substr: "Safari/LocalStorage"
composite_rules:
  - id: cookie-theft-comp
    desc: Safari cookie theft
    crit: suspicious
    conf: 0.85
    platforms: [macos]
    any:
      - id: cookies-path
      - id: binarycookies
      - id: cookies-binarycookies
