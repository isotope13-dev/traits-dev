defaults:
  platforms: [ios]
  for: [scripts, macho]
  attack: T1555.003
  mbc: T1555.003

composite_rules:
  - id: ios-cookie-db-extraction
    desc: iOS browser cookie database extraction
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/fs/path/sensitive/apple::ios-mobile-cookies-db
      - id: micro-behaviors/data/db/sql::sql-select
    any:
      - id: micro-behaviors/data/db/sqlite::sqlite3-cli
      - id: micro-behaviors/data/db/sqlite::sqlite3-open
