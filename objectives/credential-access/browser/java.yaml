defaults:
  platforms: [windows, unix]
  for:
    - class
traits:
  - id: chrome-pass-string
    desc: Chrome password stealing indicator
    crit: suspicious
    conf: 0.95
    mbc: T1555.003
    attack: T1555.003
    if:
      type: text
      substr: chrome-pass
  - id: firefox-pass-string
    desc: Firefox password stealing indicator
    crit: suspicious
    conf: 0.95
    mbc: T1555.003
    attack: T1555.003
    if:
      type: text
      substr: fox-pass
  - id: ie-pass-string
    desc: Internet Explorer password stealing indicator
    crit: suspicious
    conf: 0.95
    mbc: T1555.003
    attack: T1555.003
    if:
      type: text
      substr: ie-pass
  - id: all-pass-string
    desc: All passwords collection indicator
    crit: suspicious
    conf: 0.9
    mbc: T1555
    attack: T1555
    if:
      type: text
      substr: all-pass
  - id: save-all-pass-string
    desc: Save all passwords indicator
    crit: suspicious
    conf: 0.95
    mbc: T1555
    attack: T1555
    if:
      type: text
      substr: save-all-pass
  - id: outlook-pass-string
    desc: Outlook password stealing indicator
    crit: suspicious
    conf: 0.95
    mbc: T1555
    attack: T1555
    if:
      type: text
      substr: outlook-pass
  - id: thunderbird-pass-string
    desc: Thunderbird password stealing indicator
    crit: suspicious
    conf: 0.95
    mbc: T1555
    attack: T1555
    if:
      type: text
      substr: tb-pass
  - id: foxmail-pass-string
    desc: Foxmail password stealing indicator
    crit: suspicious
    conf: 0.95
    mbc: T1555
    attack: T1555
    if:
      type: text
      substr: foxmail-pass
  - id: o-keylogger-string
    desc: Keylogger toggle command
    crit: suspicious
    conf: 0.95
    mbc: T1056.001
    attack: T1056.001
    if:
      type: text
      substr: o-keylogger
  - id: chromium-login-record-fields
    desc: Chromium login record fields
    crit: suspicious
    conf: 0.95
    mbc: B0028
    attack: T1555.003
    for: [class, jar]
    if:
      type: raw
      substr: originUrl;username;password
  - id: chromium-encrypted-key-record
    desc: Chromium encrypted key record
    crit: suspicious
    conf: 0.95
    mbc: B0028
    attack: T1555.003
    for: [class, jar]
    if:
      type: raw
      substr: header;flag;encryptedAesKey;iv;ciphertext;tag
  - id: browser-loot-category-roster
    desc: Browser loot category roster
    crit: suspicious
    conf: 0.9
    mbc: B0028
    attack: T1555.003
    for: [class, jar]
    if:
      type: raw
      substr: CREDIT_CARDS
  - id: discord-extension-loot-categories
    desc: Discord and extension loot categories
    crit: suspicious
    conf: 0.85
    attack: T1555.003
    for: [class, jar]
    if:
      type: raw
      substr: DISCORD
composite_rules:
  - id: complexer-chromium-login-record
    desc: Complexer obfuscated Chromium login record
    crit: hostile
    conf: 0.96
    mbc: B0028
    attack: T1555.003
    for: [class, jar]
    all:
      - id: chromium-login-record-fields
      - id: objectives/anti-static/obfuscation/tools::complexer-marker
  - id: complexer-chromium-key-record
    desc: Complexer obfuscated Chromium key record
    crit: hostile
    conf: 0.96
    mbc: B0028
    attack: T1555.003
    for: [class, jar]
    all:
      - id: chromium-encrypted-key-record
      - id: objectives/anti-static/obfuscation/tools::complexer-marker
  - id: complexer-browser-loot-category
    desc: Complexer obfuscated browser loot category
    crit: suspicious
    conf: 0.92
    mbc: B0028
    attack: T1555.003
    for: [class, jar]
    all:
      - id: browser-loot-category-roster
      - id: objectives/anti-static/obfuscation/tools::complexer-marker
