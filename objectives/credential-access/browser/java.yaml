defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for:
    - class
traits:
  - id: chrome-pass-string
    desc: Chrome password stealing indicator
    crit: suspicious
    conf: 0.95
    mbc: T1555.003
    attack: T1555.003
    if:
      type: string_value
      substr: chrome-pass
  - id: firefox-pass-string
    desc: Firefox password stealing indicator
    crit: suspicious
    conf: 0.95
    mbc: T1555.003
    attack: T1555.003
    if:
      type: string_value
      substr: fox-pass
  - id: ie-pass-string
