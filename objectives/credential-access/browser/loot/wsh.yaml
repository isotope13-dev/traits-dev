defaults:
  platforms: [windows]
  for: [vbs]
  attack: T1555
  mbc: B0028
traits:
- id: passlist-html-source
  desc: Passlist HTML source path
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(?i)passlist\.html'
- id: passlist-text-output
  desc: Passlist text output path
  crit: component
  conf: 0.92
  if:
    type: text
    regex: '(?i)passlist\.txt'
- id: htmlfile-table-parser
  desc: htmlfile table extraction script
  crit: notable
  conf: 0.88
  if:
    type: text
    regex: '(?is)CreateObject\(["'']htmlfile["'']\).{0,300}getElementsByTagName\(["'']table["'']\)'
- id: public-passlist-workdir
  desc: Public passlist working directory
  crit: component
  conf: 0.86
  if:
    type: text
    regex: '(?i)C:\\Users\\Public\\.{1,80}passlist\.(html|txt)'
composite_rules:
- id: wsh-passlist-html-converter
  desc: WSH converts credential passlist table
  crit: suspicious
  conf: 0.92
  all:
  - id: passlist-html-source
  - id: passlist-text-output
  - id: htmlfile-table-parser
  any:
  - id: public-passlist-workdir
  - id: micro-behaviors/fs/write/content::create-text-file-api
