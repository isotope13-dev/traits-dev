defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1555
  mbc: B0028

traits:
  - id: logins-field-literal
    desc: Logins field string literal
    crit: component
    conf: 0.9
    if:
      type: literal
      exact: "Logins"
  - id: cookies-field-literal
    desc: Cookies field string literal
    crit: component
    conf: 0.9
    if:
      type: literal
      exact: "Cookies"
  - id: password-output-name
    desc: Password-prefixed output filename
    crit: notable
    conf: 0.9
    if:
      type: literal
      regex: '^Password_[A-Za-z0-9._-]{1,100}$'
  - id: cookies-output-name-fragment
    desc: Cookies output filename fragment
    crit: component
    conf: 0.9
    if:
      type: literal
      substr: "Cookies_"

composite_rules:
  - id: csharp-browser-credential-recovery-output
    desc: C# browser credential recovery output
    crit: hostile
    conf: 0.97
    all:
      - id: logins-field-literal
      - id: cookies-field-literal
      - id: password-output-name
      - id: cookies-output-name-fragment
