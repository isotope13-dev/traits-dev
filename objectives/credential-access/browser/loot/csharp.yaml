defaults:
  platforms: [windows]
  for: [csharp]
  attack: T1555
  mbc: B0028

traits:
  - id: msgpack-logins-field
    desc: MsgPack recovered logins field
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      exact: "Logins"
  - id: msgpack-cookies-field
    desc: MsgPack recovered cookies field
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      exact: "Cookies"
  - id: recovery-password-output-file
    desc: Recovery password output file
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      substr: "Password_"
  - id: recovery-cookies-output-file
    desc: Recovery cookies output file
    crit: suspicious
    conf: 0.9
    if:
      type: literal
      substr: "Cookies_"

composite_rules:
  - id: csharp-browser-credential-recovery-output
    desc: C# browser credential recovery output
    crit: hostile
    conf: 0.97
    all:
      - id: msgpack-logins-field
      - id: msgpack-cookies-field
      - id: recovery-password-output-file
      - id: recovery-cookies-output-file
