defaults:
  attack: T1555.003
  platforms:
    - unix
    - windows
  for: [scripts, binaries]
traits:
  - id: waterfox-path
    desc: Waterfox browser profile path
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: (?i)Waterfox[/\\]Profiles|/\.waterfox/
  - id: palemoon-path
    desc: Pale Moon browser profile path
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: (?i)Pale Moon[/\\]Profiles|Moonchild Productions[/\\]Pale Moon
  - id: firefox-profiles
    desc: Firefox/Profiles path
    crit: suspicious
    conf: 0.6
    if:
      type: text
      regex: (?i)Mozilla[/\\]Firefox[/\\]Profiles([/\\]|$)
    unless:
      - type: text
        substr: '...\Mozilla\Firefox\Profiles\<ProfileName>\Cache'
  - id: waterfox-profiles
    desc: Waterfox/Profiles path
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: Waterfox/Profiles
  - id: palemoon-profiles
    desc: Pale Moon/Profiles path
    crit: suspicious
    conf: 0.6
    if:
      type: text
      substr: Pale Moon/Profiles
  - id: formhistory-sqlite
    desc: Firefox formhistory.sqlite database
    crit: component
    conf: 0.85
    if:
      type: text
      substr: formhistory.sqlite
  - id: key4-db
    desc: Firefox key4.db (master password database)
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)(Firefox|Waterfox|Pale Moon).{0,80}key4\.db
  - id: cert9-db
    desc: Firefox cert9.db certificate store
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (?i)(Firefox|Waterfox|Pale Moon).{0,64}cert9\.db
  - id: nss-private
    desc: Firefox NSS private key database
    crit: suspicious
    conf: 0.8
    if:
      type: text
      substr: nssPrivate
  - id: nss3-word
    desc: nss3 word reference
    crit: notable
    conf: 0.75
    if:
      type: text
      word: nss3
  - id: libnss3-ref
    desc: libnss3 library reference
    crit: notable
    conf: 0.75
    if:
      type: text
      substr: libnss3
  - id: pk11-decrypt
    desc: Firefox PK11SDR_Decrypt function
    crit: suspicious
    conf: 0.95
    mbc: B0028
    if:
      type: text
      substr: PK11SDR_Decrypt
  - id: pl-base64decode-export
    desc: Firefox NSS base64 export
    crit: component
    conf: 0.84
    for: [scripts, source]
    if:
      type: text
      exact: PL_Base64Decode
    unless:
      - id: well-known/lib/mozilla-nspr::nspr-library
  - id: pr-abort-export
    desc: Firefox NSS PR_Abort export
    crit: component
    conf: 0.84
    for: [scripts, source]
    if:
      type: text
      exact: PR_Abort
    unless:
      - id: well-known/lib/mozilla-nspr::nspr-library
  - id: moz-cookies-sql
    desc: Firefox moz_cookies SQL query
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: SELECT.{0,40}(encrypted_value|originAttributes).{0,40}moz_cookies
      case_insensitive: true
  - id: moz-logins-sql
    desc: Firefox moz_logins SQL query
    crit: suspicious
    conf: 0.95
    mbc: B0028
    if:
      type: text
      regex: SELECT.{0,50}FROM\s+moz_logins
      case_insensitive: true
    downgrade:
      any:
        - id: metadata/signed/certificate::bitdefender-brand-text
  - id: path
    desc: Firefox browser profile path
    crit: notable
    conf: 0.6
    if:
      type: text
      regex: Mozilla[/\\]Firefox[/\\]Profiles|/\.mozilla/firefox/
      case_insensitive: true
composite_rules:
  - id: profiles-path
    desc: Firefox/Gecko Profiles directory
    crit: suspicious
    conf: 0.7
    any:
      - id: firefox-profiles
      - id: waterfox-profiles
      - id: palemoon-profiles
      - id: objectives/credential-access/browser/firefox::profiles-ini
  - id: cookie-theft-comp
    desc: Firefox cookie theft
    crit: suspicious
    conf: 0.85
    all:
      - id: path
      - id: objectives/credential-access/browser/chromium::chromium-cookie-sql
  - id: password-theft-comp
    desc: Firefox password/form history theft
    crit: suspicious
    conf: 0.85
    all:
      - id: path
    any:
      - id: formhistory-sqlite
      - id: nss-private
      - id: objectives/credential-access/browser/firefox::logins
      - id: key4-db
  - id: nss3-lib
    desc: Firefox NSS3 library reference
    crit: notable
    conf: 0.85
    any:
      - id: nss3-word
      - id: libnss3-ref
  - id: nss-export-cluster
    desc: Firefox NSS export pair
    crit: component
    conf: 0.9
    all:
      - id: pl-base64decode-export
      - id: pr-abort-export
    unless:
      - id: well-known/lib/mozilla-nspr::nspr-library
  - id: nss-decrypt
    desc: Firefox NSS database decryption
    for: [scripts, source]
    crit: suspicious
    conf: 0.95
    mbc: B0028
    any:
      - id: pk11-decrypt
      - id: nss3-lib
      - id: nss-export-cluster
    all:
      - id: path
