defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
  mbc: OB0003
  attack: T1555.003
traits:
  - id: logins
    desc: Firefox logins.json file path
    if:
      type: string_value
      regex: (?i)[/\\]logins\.json\b
  - id: cookies-dup
    desc: Firefox cookies.sqlite database path
    if:
      type: string_value
      regex: (?i)[/\\]cookies\.sqlite\b
