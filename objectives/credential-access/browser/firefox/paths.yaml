defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  crit: notable
  conf: 0.8
  mbc: OB0003
  attack: T1555.003
traits:
  - id: logins
    desc: Firefox logins.json file path
    crit: component
    if:
      type: text
      regex: (?i)[/\\]logins\.json\b
  - id: cookies-dup
    desc: Firefox cookies.sqlite database path
    crit: component
    if:
      type: text
      regex: (?i)[/\\]cookies\.sqlite\b
  - id: profiles-ini
    desc: Firefox profiles.ini path
    crit: notable
    if:
      type: text
      regex: (?i)[/\\]profiles\.ini\b
  - id: gecko-info-artifact
    desc: Gecko browser collection artifact
    if:
      type: text
      exact: GECKO_BROWSERS_INFO
