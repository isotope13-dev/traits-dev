defaults:
  platforms: [windows]
  for: [pe, dll]
  attack: T1555.003
  mbc: B0028

traits:
  - id: pstore-browser-pass-sites
    desc: IE Protected Storage pass_sites
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: pass_sites
  - id: pstore-autocomplete-pass
    desc: IE autocomplete password store
    crit: suspicious
    conf: 0.96
    if:
      type: text
      exact: auto_complete_pass
  - id: pstore-password-report-format
    desc: Browser password report format
    crit: suspicious
    conf: 0.94
    if:
      type: text
      regex: "name:\\s*'%s'\\s+pass:\\s*'%s'"
  - id: pstore-browser-http-scheme
    desc: Browser credential HTTP URL scheme
    crit: component
    conf: 0.78
    if:
      type: text
      exact: "http:/"
  - id: pstore-browser-https-scheme
    desc: Browser credential HTTPS URL scheme
    crit: component
    conf: 0.78
    if:
      type: text
      exact: "https:/"

composite_rules:
  - id: pstore-browser-url-schemes
    desc: Browser credential URL schemes
    crit: component
    conf: 0.82
    all:
      - id: pstore-browser-http-scheme
      - id: pstore-browser-https-scheme
  - id: ie-protected-storage-credential-theft
    desc: IE Protected Storage credential theft
    crit: hostile
    conf: 0.98
    all:
      - id: objectives/credential-access/dump/system::pstore-create-instance
    any:
      - id: pstore-browser-pass-sites
      - id: pstore-autocomplete-pass
      - id: pstore-password-report-format
      - id: pstore-browser-url-schemes
    needs: 2
    unless:
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
      - id: metadata/lang/source::windows-compat-api-source
