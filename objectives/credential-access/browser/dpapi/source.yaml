# DPAPI CryptUnprotectData in source code
# Detects credential decryption APIs used in password stealers
defaults:
  for: [source]
  platforms: [windows]
  attack: T1555.003
  mbc: E1555.003
traits:
  - id: crypt-unprotect-data-src
    desc: CryptUnprotectData DllImport declaration
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: CryptUnprotectData
  - id: data-blob-struct-src
    desc: DATA_BLOB struct definition in source
    crit: component
    conf: 0.6
    if:
      type: text
      word: DATA_BLOB
  - id: protected-data-unprotect-src
    desc: .NET ProtectedData.Unprotect managed DPAPI call
    crit: suspicious
    conf: 0.9
    for: [csharp, source]
    if:
      type: text
      substr: ProtectedData.Unprotect
    unless:
      - type: text
        substr: "public static byte[] Unprotect(byte[] data) => ProtectedData.Unprotect(data, additionalEntropy, DataProtectionScope.CurrentUser);"
  - id: dpapi-scope-current-user
    desc: DPAPI DataProtectionScope.CurrentUser
    crit: component
    conf: 0.75
    for: [csharp, source]
    if:
      type: text
      substr: DataProtectionScope.CurrentUser
  - id: dpapi-scope-local-machine
    desc: DPAPI DataProtectionScope.LocalMachine
    crit: component
    conf: 0.75
    for: [csharp, source]
    if:
      type: text
      substr: DataProtectionScope.LocalMachine
composite_rules:
  - id: dpapi-source-usage
    desc: DPAPI credential decryption in source
    crit: suspicious
    conf: 0.9
    all:
      - id: crypt-unprotect-data-src
      - id: data-blob-struct-src
    unless:
      - id: well-known/tool/sysadmin/sandboxie::sandboxie-component
  - id: dotnet-dpapi-source
    desc: .NET managed DPAPI decryption in source
    crit: suspicious
    conf: 0.9
    for: [csharp, source]
    all:
      - id: protected-data-unprotect-src
    any:
      - id: dpapi-scope-current-user
      - id: dpapi-scope-local-machine
