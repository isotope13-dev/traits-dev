# Python DPAPI decryption
# win32crypt.CryptUnprotectData decrypts secrets the OS sealed for the current
# user — the standard primitive for unsealing browser cookies/passwords and
# other DPAPI-protected credential stores from a stealer.
defaults:
  for: [python]
  platforms: [windows]
  attack: T1555.003
  mbc: E1555.003
traits:
  - id: python-dpapi-unprotect
    desc: Python DPAPI unprotect call
    crit: notable
    conf: 0.92
    if:
      type: symbol
      regex: (CryptUnprotectData|windows\.crypto\.dpapi\.unprotect)
