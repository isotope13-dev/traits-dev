defaults:
  for:
    - pe
    - dll
  platforms:
    - windows
  attack: T1555.003
  mbc: E1555.003
traits:
  - id: crypt-unprotect-data
    desc: Decrypts DPAPI-protected secrets
    crit: suspicious
    conf: 0.9
    unless:
      - type: text
        substr: CRYPT32.dll
      - id: well-known/lib/electron::v8-isolate-marker
      - id: well-known/app/bitwarden::bitwarden-app
      - id: metadata/binary/vendor::windows-system-implementer-dll
      - id: well-known/lib/wine/
    if:
      type: symbol
      exact: CryptUnprotectData
  - id: data-blob-struct
    desc: DATA_BLOB structure reference
    crit: component
    conf: 0.6
    if:
      type: text
      regex: (^|[^A-Z0-9_])DATA_BLOB([^A-Z0-9_]|$)
  - id: bcrypt-aes-gcm
    desc: BCrypt AES-GCM algorithm
    crit: suspicious
    conf: 0.75
    if:
      type: text
      substr: BCRYPT_AES_GCM
  - id: chromium-v10-prefix
    desc: Chromium v10 encryption prefix
    crit: component
    conf: 0.7
    if:
      type: text
      exact: v10
  - id: chromium-v11-prefix
    desc: Chromium v11 encryption prefix
    crit: component
    conf: 0.7
    if:
      type: text
      exact: v11
  - id: master-key-path
    desc: DPAPI master key path
    crit: suspicious
    conf: 0.9
    if:
      type: text
      regex: (?i)Protect[/\\]+S-1-
  - id: roaming-credentials
    desc: Roaming credentials path
    crit: suspicious
    conf: 0.75
    if:
      type: text
      regex: (?i)AppData[/\\]+Roaming[/\\]+Microsoft[/\\]+Credentials
composite_rules:
  - id: chromium-encryption-prefix
    desc: Chromium encryption version prefix
    crit: component
    conf: 0.75
    any:
      - id: chromium-v10-prefix
      - id: chromium-v11-prefix
  - id: dpapi-usage
    desc: DPAPI credential decryption
    crit: suspicious
    conf: 0.9
    all:
      - id: crypt-unprotect-data
    any:
      - id: data-blob-struct
      - id: chromium-encryption-prefix
      - id: master-key-path
      - id: roaming-credentials
    unless:
      - id: well-known/lib/wine/
      - id: well-known/app/bitwarden::bitwarden-app
