defaults:
  platforms: [windows, unix]
  for:
    - javascript
    - typescript
traits:
  - id: window-expose-sensitive-1
    desc: 'Exposing sensitive funcs to window'
    crit: suspicious
    conf: 0.7
    if:
      type: string_literal
      regex: window\.(getToken|login|auth)\s*=
      case_insensitive: true
  - id: window-expose-sensitive-2
    desc: 'Exposing sensitive funcs to window'
    crit: suspicious
    conf: 0.75
    if:
      type: string_literal
      regex: window\.(key|secret|token)\s*=
      case_insensitive: true
