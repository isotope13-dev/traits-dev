# Python browser-cookie/session theft tooling.
#
# The retained composite fires on a package that embeds reusable browser
# authentication cookies (cookiejar import + auth-cookie field names + long
# hardcoded cookie values) — a store-and-replay credential artifact.
#
# NOTE: earlier revisions carried `python-browser-session-takeover` and
# `python-browser-session-credential-bridge`, whose legs matched the literal
# function names (`execute_complete_session_hijacking`,
# `browser_hijack_workflow_complete`, `get_user_session_state`) and docstring
# wording of one benign local-first automation suite (Pipulate). Those atoms
# convicted only that project and false-positived on legitimate Selenium/
# Playwright session-reuse automation, so they were removed. Genuine browser
# session theft is caught by the exfil-bearing composites in
# objectives/collection/stealer/browser/ and objectives/exfiltration/.
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1539

composite_rules:
  - id: python-hardcoded-browser-auth-cookies
    desc: Python package embeds reusable browser authentication cookies
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/cookies::python-requests-cookiejar-import
      - id: micro-behaviors/communications/http/cookies::python-auth-cookie-fields
      - id: micro-behaviors/communications/http/cookies::python-long-cookie-values
