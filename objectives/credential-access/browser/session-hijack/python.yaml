# Python browser/session takeover tooling.
#
# The atoms below are deliberately capability-neutral; the hostile verdict is
# reserved for the combination of retrieving application session state, using
# a browser workflow whose purpose is hijacking, and the source explicitly
# describing that operation as a takeover.  This avoids treating ordinary
# Selenium login tests or session-management helpers as theft.
defaults:
  platforms: [unix, windows]
  for: [python]
  attack: T1539

traits:
  - id: python-session-state-reader-call
    desc: Python calls an application session-state reader
    crit: notable
    conf: 0.95
    if:
      type: symbol
      kind: call
      exact: get_user_session_state

  - id: python-browser-hijack-workflow-call
    desc: Python calls a browser workflow hijack routine
    crit: component
    conf: 0.98
    if:
      type: symbol
      kind: call
      exact: browser_hijack_workflow_complete

  - id: python-session-takeover-function
    desc: Python defines a session-takeover tool
    crit: component
    conf: 0.98
    if:
      type: symbol
      kind: function
      exact: execute_complete_session_hijacking

  - id: python-session-hijack-language
    desc: Python source describes session hijacking
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(?i)session\s+hijack'

  - id: python-session-takeover-language
    desc: Python source describes session takeover
    crit: component
    conf: 0.98
    if:
      type: text
      regex: '(?i)session\s+takeover'

  - id: python-auth-token-export-language
    desc: Auth tokens exported for external scripts
    crit: component
    conf: 0.98
    if:
      type: text
      substr: extracting auth tokens for use in external scripts

composite_rules:
  - id: python-hardcoded-browser-auth-cookies
    desc: Python package embeds reusable browser authentication cookies
    crit: hostile
    conf: 0.99
    all:
      - id: micro-behaviors/communications/http/cookies::python-requests-cookiejar-import
      - id: micro-behaviors/communications/http/cookies::python-auth-cookie-fields
      - id: micro-behaviors/communications/http/cookies::python-long-cookie-values

  - id: python-browser-session-takeover
    desc: Python retrieves session state and hijacks the browser workflow
    crit: hostile
    conf: 0.99
    all:
      - id: python-session-takeover-function
      - id: python-session-state-reader-call
      - id: python-browser-hijack-workflow-call
      - id: python-session-hijack-language
      - id: python-session-takeover-language

  - id: python-browser-session-credential-bridge
    desc: Browser session credential bridge
    crit: hostile
    conf: 0.99
    attack: T1539,T1059.007,T1071.001
    all:
      - id: micro-behaviors/communications/http/cookies::playwright-browser-context-cookie-read
      - id: micro-behaviors/communications/http/request/client::playwright-browser-context-request
      - id: micro-behaviors/process/create/script/automation::playwright-page-evaluate-call
      - id: python-auth-token-export-language
