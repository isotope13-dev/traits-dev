defaults:
  platforms: [unix, windows]
  for: [javascript, typescript]
  attack: T1555

traits:
- id: account-page-marker
  desc: Account or channel page context marker
  crit: component
  conf: 0.96
  if:
    type: text
    # A bare `account`/`channel` token is common in dashboards, chat apps, and
    # API clients.  Require a page/navigation-shaped name so UI descriptions
    # such as `ChannelApp` do not become credential-theft evidence.
    regex: '(?i)\b(account|channel)(Page|View|Url)\b'

- id: token-copy-marker
  desc: JWT or token clipboard operation
  crit: component
  conf: 0.96
  if:
    type: text
    # Match an actual clipboard/copy primitive, not prose such as "copy the
    # token" or a component named CopyRow.
    regex: '(?i)\b(JWT|token)\b.{0,180}(clipboard|writeText)'

- id: amazon-contact-us-path
  desc: Amazon contact page path
  crit: component
  conf: 0.95
  if:
    type: text
    substr: /hz/contact-us

- id: primevideo-contact-us-path
  desc: Prime Video contact path
  crit: component
  conf: 0.95
  if:
    type: text
    substr: /help/contact-us/

- id: amazon-contact-email-field
  desc: Amazon contact email field
  crit: notable
  conf: 0.98
  if:
    type: text
    substr: emailOptions.customerEmailAddress

- id: amazon-auth-cookie-map
  desc: Amazon auth cookie map
  crit: notable
  conf: 0.96
  if:
    type: text
    substr: AUTH_COOKIE_BY_DOMAIN

- id: primevideo-auth-cookie-name
  desc: Prime Video auth cookie
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: x-main-av

- id: amazon-regional-auth-cookie
  desc: Amazon regional auth cookie
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: x-acbde

- id: amazon-profile-data-api
  desc: Amazon profile data API
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: /slc/hub/api/getProfileData?

- id: amazon-profile-attributes-api
  desc: Amazon profile attributes API
  crit: notable
  conf: 0.95
  if:
    type: text
    substr: /slc/cpp/attributes-json?model=general&actorId=

composite_rules:
- id: browser-extension-account-token-harvest
  desc: Extension returns an account-page session token
  crit: hostile
  conf: 0.99
  attack: T1539,T1041
  scope: archive
  for: [crx, xpi, zip, archives]
  all:
  - id: account-page-token-flow
  - id: objectives/credential-access/browser/session-hijack::jwt-shaped-value-validator
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-query
  - id: micro-behaviors/browser-extension/tabs::chrome-tabs-update
  - id: micro-behaviors/communications/ipc/message::chrome-runtime-on-message-external
  - id: micro-behaviors/process/inject/webextension::webextension-scripting-execute

- id: account-page-token-flow
  desc: Account-page token capture flow
  crit: suspicious
  conf: 0.98
  all:
  - id: account-page-marker
  - id: token-copy-marker
  near_lines: 80

- id: amazon-contact-page-scrape
  desc: Credentialed Amazon contact page fetch
  crit: notable
  conf: 0.97
  all:
  - id: amazon-contact-us-path
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: micro-behaviors/communications/http/request/credentials::fetch-credentials-include

- id: primevideo-contact-page-scrape
  desc: Credentialed Prime Video contact fetch
  crit: notable
  conf: 0.97
  all:
  - id: primevideo-contact-us-path
  - id: micro-behaviors/communications/http/request/client::js-fetch-call
  - id: micro-behaviors/communications/http/request/credentials::fetch-credentials-include

- id: amazon-auth-cookie-targeting
  desc: Amazon auth cookie targeting
  crit: suspicious
  conf: 0.98
  all:
  - id: amazon-auth-cookie-map
  any:
  - id: primevideo-auth-cookie-name
  - id: amazon-regional-auth-cookie

- id: amazon-account-pii-harvest
  desc: Amazon account contact PII harvest
  crit: hostile
  conf: 0.99
  all:
  - id: amazon-auth-cookie-targeting
  - id: amazon-contact-email-field
  any:
  - id: amazon-contact-page-scrape
  - id: primevideo-contact-page-scrape

- id: amazon-profile-attribute-harvest
  desc: Amazon profile attribute harvest
  crit: hostile
  conf: 0.98
  all:
  - id: amazon-auth-cookie-targeting
  - id: amazon-profile-data-api
  - id: amazon-profile-attributes-api
