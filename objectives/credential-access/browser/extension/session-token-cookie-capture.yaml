# Browser extensions that collect authenticated session material from a
# site-specific page and its extension cookie store.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, zip, archives]
  attack: T1539,T1528

traits:
  - id: extension-session-response-request
    desc: Requests an encrypted session response
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      substr: GET_ENCRYPTED_SESSION

composite_rules:
  - id: extension-authenticated-session-collection
    desc: Extension collects site authentication storage and cookies
    crit: hostile
    conf: 0.99
    attack: T1539,T1528,T1119
    scope: archive
    for: [crx, zip, archives]
    all:
      - id: micro-behaviors/data/db/web-storage::browser-storage-sweep-loop
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-get-all
      - id: metadata/permission/cookie::permission-cookies
    any:
      - id: micro-behaviors/communications/http/oauth::access-token
      - id: micro-behaviors/communications/http/oauth::refresh-token
    needs: 1
