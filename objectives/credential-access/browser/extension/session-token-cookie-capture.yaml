# Browser extensions that collect authenticated session material from a
# site-specific page and its extension cookie store.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, zip, archives]
  attack: T1539,T1528

traits:
  - id: extension-session-response-request
    desc: Requests an encrypted session response
    crit: notable
    conf: 0.92
    for: [javascript, typescript]
    if:
      type: text
      substr: GET_ENCRYPTED_SESSION

  - id: extension-auth-cookie-upload-body
    desc: JSON body includes browser cookies
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: 'body\s*:\s*JSON\.stringify\s*\(\s*\{[^}\r\n]{0,240}\bcookies\b'

composite_rules:
  - id: extension-authenticated-session-collection
    desc: Extension collects site authentication storage and cookies
    crit: hostile
    conf: 0.99
    attack: T1539,T1528,T1119
    scope: archive
    for: [crx, zip, archives]
    all:
      - id: micro-behaviors/data/db/web-storage::browser-storage-sweep-loop
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-get-all
      - id: metadata/permission/cookie::permission-cookies
    any:
      - id: micro-behaviors/communications/http/oauth::access-token
      - id: micro-behaviors/communications/http/oauth::refresh-token
    needs: 1

  - id: extension-google-auth-cookie-exfiltration
    desc: Extension harvests Google authentication cookies and uploads them remotely
    crit: hostile
    conf: 0.99
    attack: T1539,T1041,T1528
    scope: archive
    for: [crx, zip, archives]
    all:
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-get-all-text
      - id: micro-behaviors/communications/http/cookies::google-auth-cookie-name
      - id: metadata/permission/cookie::permission-cookies-text
      - id: extension-auth-cookie-upload-body
    any:
      - id: micro-behaviors/communications/http/request/client::fetch-post-pattern
      - id: micro-behaviors/communications/http/request/client::post-method-text
