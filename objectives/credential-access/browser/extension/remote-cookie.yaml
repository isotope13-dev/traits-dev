# Remote-tasked browser-extension cookie harvest. An all_urls extension that
# both speaks to a remote channel and collects cookies via chrome.debugger CDP
# (Network.getAllCookies) is session theft, not a first-party auth helper. The
# debugger leg must be the cookie-extraction command, not any attach: legit
# seller/automation tools attach the debugger purely for page screenshots or
# input dispatch, which does not read cookies.
defaults:
  platforms: [unix, windows]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1539,T1185

traits:
  - id: extension-get-cookies-command
    desc: Extension exposes get_cookies command
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: '\bget[_-]?cookies\b|["'']get_cookies["'']'

  - id: extension-page-cookie-helper
    desc: Extension exposes page cookie helper
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: text
      regex: 'window\.(Cookies|cookieStore)\s*='

composite_rules:
  - id: extension-remote-page-cookie-control
    desc: Remote extension controls page cookies
    crit: hostile
    conf: 0.99
    attack: T1539,T1059.007,T1185
    scope: archive
    all:
      - id: metadata/permission/manifest::host-permission-all-urls
      - id: micro-behaviors/communications/http/websocket::wss-scheme
      - id: objectives/execution/interpreter/eval/dynamic::js-embedded-interpreter-evaluate
      - id: micro-behaviors/communications/http/cookies::document-cookie-read
      - id: extension-page-cookie-helper

  - id: extension-remote-cookie-control
    desc: Remotely tasked all-site extension harvests cookies
    crit: hostile
    conf: 0.97
    scope: archive
    all:
      - id: metadata/permission/manifest::host-permission-all-urls
      - id: micro-behaviors/communications/http/websocket::wss-scheme
      - id: micro-behaviors/process/attach/webextension::chrome-debugger-cookie-extract
    any:
      - id: micro-behaviors/communications/http/cookies::document-cookie-read
      - id: extension-get-cookies-command
