# LinkedIn session-cookie (li_at) harvest by browser extensions that sync
# cookies to a remote backend (Supabase REST or similar). Distinct from
# first-party LinkedIn integrations that never leave the browser.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1539

traits:
  - id: supabase-rest-v1-endpoint
    desc: Posts to a Supabase REST API path
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)/rest/v1/[A-Za-z_][A-Za-z0-9_]{2,40}'

  - id: chrome-cookies-domain-linkedin
    desc: Reads cookies for the LinkedIn domain
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)cookies\.getAll\s*\(\s*\{[^}]{0,80}linkedin\.com'

  - id: browser-fingerprint-payload
    desc: Collects browser fingerprint for registration
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)browserFingerprint|userAgent.{0,40}platform.{0,40}languages'

composite_rules:
  - id: linkedin-session-cookie-remote-exfil
    desc: Extension exfiltrates LinkedIn li_at cookies to a remote API
    crit: hostile
    conf: 0.99
    attack: T1539,T1041
    scope: archive
    for: [crx, zip, archives]
    all:
      - id: micro-behaviors/communications/http/cookies::linkedin-session-cookie-name
      - id: chrome-cookies-domain-linkedin
      - id: metadata/permission/cookie::permission-cookies
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
    any:
      - id: supabase-rest-v1-endpoint
      - id: micro-behaviors/communications/http/request/client::fetch-post-pattern
    needs: 1
