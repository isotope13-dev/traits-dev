# LinkedIn session-cookie (li_at) harvest by browser extensions that put
# cookie values into a remote request. Distinguish this from first-party
# integrations that only check session presence or use cookies for auth.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, archives]
  attack: T1539

traits:
  - id: chrome-cookies-domain-linkedin
    desc: Reads cookies for the LinkedIn domain
    crit: notable
    conf: 0.97
    for: [javascript, typescript]
    if:
      type: text
      # Minified extensions commonly bind the site domain to a short variable
      # before calling getAll({domain: variable}); accept either source order.
      regex: '(?s)(cookies\.getAll.{0,120}linkedin\.com|linkedin\.com.{0,120}cookies\.getAll)'

  - id: browser-fingerprint-payload
    desc: Collects browser fingerprint for registration
    crit: notable
    conf: 0.9
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)browserFingerprint|userAgent.{0,40}platform.{0,40}languages'

composite_rules:
  - id: linkedin-session-cookie-remote-exfil
    desc: Extension exfiltrates LinkedIn li_at cookies to a remote API
    crit: hostile
    conf: 0.99
    attack: T1539,T1041
    scope: archive
    for: [crx, zip, archives]
    all:
      - id: micro-behaviors/communications/http/cookies::linkedin-session-cookie-name
      - id: chrome-cookies-domain-linkedin
      - id: metadata/permission/cookie::permission-cookies
      - id: micro-behaviors/communications/http/cookies::linkedin-session-cookie-value-request
      - id: micro-behaviors/communications/http/request/client::js-fetch-call
    any:
      - id: micro-behaviors/communications/http/services/supabase::rest-api-endpoint
      - id: micro-behaviors/communications/http/request/client::fetch-post-pattern
    needs: 1
