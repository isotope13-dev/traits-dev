# A browser extension that reads a persisted OAuth refresh token and sends it
# to an HTTP service is materially different from ordinary provider refresh.
# Keep the atoms source-level and make the hostile conclusion require the
# complete storage -> network -> refresh-endpoint flow.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript, chrome-manifest, crx, xpi, archives]
  attack: T1528

traits:
  - id: extension-stored-refresh-token
    desc: Extension reads stored refresh token
    crit: notable
    conf: 0.95
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)storage\.local\.get[\s\S]{0,120}ytv_user'

  - id: extension-form-refresh-token-body
    desc: Extension form body contains refresh token
    crit: notable
    conf: 0.96
    for: [javascript, typescript]
    if:
      type: text
      regex: '(?i)(chrome|browser)\.(storage|runtime).{0,80}URLSearchParams.{0,50}refresh_token'

  - id: extension-refresh-endpoint
    desc: Extension calls refresh-token endpoint
    crit: notable
    conf: 0.94
    for: [javascript, typescript]
    if:
      type: string_literal
      regex: '(?i)https?://.{0,200}refresh[_-]?token'

composite_rules:
  - id: extension-refresh-token-forwarding
    desc: Extension forwards stored refresh token
    crit: hostile
    conf: 0.98
    scope: archive
    all:
      - id: extension-stored-refresh-token
      - id: micro-behaviors/data/serialize/json::refresh-token-field-stringify
      - id: extension-form-refresh-token-body
      - id: extension-refresh-endpoint
