# Browser extensions that enumerate the cookie store and POST the jar to a
# remote API. Covers Avito/Telegram-Ads session helpers (avistorm, tele-scope)
# and similar site-scoped stealers that never request <all_urls>.
defaults:
  platforms: [windows, unix]
  for: [javascript, typescript]
  attack: T1539,T1041

traits:
  - id: extension-cookies-json-body
    desc: JSON body embeds a cookies field
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: 'JSON\.stringify\s*\(\s*\{[\s\S]{0,500}\bcookies\s*:'

  - id: extension-cookies-map-name-value
    desc: Maps cookie name and value fields
    crit: notable
    conf: 0.92
    if:
      type: text
      regex: 'cookies\.map\s*\([^)]{0,80}\{[\s\S]{0,160}\bname\b[\s\S]{0,80}\bvalue\b'

  - id: jquery-post-stringified-cookies
    desc: jQuery POSTs stringified cookies object
    crit: notable
    conf: 0.94
    if:
      type: text
      regex: '\$\.post\s*\(\s*\{[\s\S]{0,400}JSON\.stringify\s*\(\s*cookies\b'

composite_rules:
  - id: extension-cookie-store-remote-post
    desc: Extension POSTs enumerated cookies remotely
    crit: hostile
    conf: 0.98
    all:
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-get-all-text
      - id: micro-behaviors/communications/http/request/client::fetch-post-pattern
      - id: extension-cookies-json-body
      - id: micro-behaviors/communications/http/url/domain::js-remote-host-url
    any:
      - id: extension-cookies-map-name-value
      - id: micro-behaviors/communications/http/request/client::http-post-json-header
    needs: 1

  - id: extension-cookie-jar-jquery-upload
    desc: Extension jQuery-uploads cookie jar remotely
    crit: hostile
    conf: 0.97
    all:
      - id: micro-behaviors/communications/http/cookies::chrome-cookies-get-all-text
      - id: jquery-post-stringified-cookies
      - id: micro-behaviors/communications/http/url/domain::js-remote-host-url
