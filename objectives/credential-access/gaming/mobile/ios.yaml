defaults:
  platforms: [ios]
  for: [scripts, macho]
  attack: T1555

traits:
  - id: gamecenter-string
    desc: GameCenter credential target string
    crit: component
    conf: 0.9
    if:
      type: text
      word: GameCenter

  - id: credential-filename-sweep
    desc: Credential filename sweep patterns
    crit: component
    conf: 0.85
    if:
      type: text
      regex: "-name '(credentials|token|auth|session)\\*'"

composite_rules:
  - id: ios-gamecenter-keychain-targeting
    desc: GameCenter password extraction via keychain
    crit: suspicious
    conf: 0.92
    all:
      - id: gamecenter-string
      - id: objectives/credential-access/keychain/extract::find-generic-password

  - id: ios-game-credential-file-sweep
    desc: iOS gaming credential file sweep
    crit: suspicious
    conf: 0.9
    all:
      - id: micro-behaviors/fs/path/sensitive/apple::ios-mobile-app-data
      - id: micro-behaviors/fs/path/sensitive/apple::ios-mobile-gamekit-data
      - id: credential-filename-sweep

  - id: ios-gaming-credential-targeting
    desc: iOS gaming credential targeting
    crit: hostile
    conf: 0.96
    all:
      - id: ios-gamecenter-keychain-targeting
      - id: ios-game-credential-file-sweep
