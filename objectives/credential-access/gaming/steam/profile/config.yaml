defaults:
  platforms: [windows, unix]
  for: [scripts, binaries]
  attack: T1555
traits:
  - id: loginusers-vdf
    desc: Steam loginusers.vdf file access
    crit: suspicious
    conf: 0.9
    if:
      type: text
      substr: loginusers.vdf
    unless:
      - id: metadata/package/manifest/ecosystem::playnite-steam-plugin
  - id: config-vdf
    desc: Steam localconfig/config.vdf file access
    crit: suspicious
    conf: 0.8
    if:
      type: text
      regex: (^|[^A-Za-z0-9_])(local)?config\.vdf([^A-Za-z0-9_]|$)
    unless:
      - id: well-known/game/steam/
      - id: metadata/package/manifest/ecosystem::playnite-steam-plugin
  - id: steam-tokens-artifact
    desc: Steam token collection artifact
    crit: suspicious
    conf: 0.95
    if:
      type: text
      exact: Soft\Steam\steam_tokens.txt
composite_rules:
  - id: steam-cred-theft
    desc: Steam account config targeting
    crit: suspicious
    conf: 0.8
    all:
      - id: loginusers-vdf
      - id: config-vdf
