defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
    - android
    - ios
  for: [scripts, binaries]
composite_rules:
  - id: steam-stealer-loader
    crit: hostile
    desc: Fake UI or masquerade with Steam extraction
    all:
      - id: objectives/credential-access/gaming/steam/keywords
    any:
      - id: objectives/evasion/masquerade/keywords/spoof::telegram-bypass-tool-string
      - id: objectives/evasion/masquerade/keywords/spoof::telegram-fix-string
      - id: objectives/evasion/masquerade/keywords/spoof::double-extension-svchost
