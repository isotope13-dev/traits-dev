defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
  for: [scripts, binaries]
  attack: T1555
traits:
  - id: loginusers-vdf
    desc: Steam loginusers.vdf file access
    crit: suspicious
    conf: 0.9
    if:
      type: string_value
      substr: loginusers.vdf
  - id: config-vdf
    desc: Steam config.vdf file access
    crit: notable
    conf: 0.8
    if:
      type: string_value
      substr: config.vdf
    unless:
      - id: metadata/vendor/valve/
composite_rules:
  - id: steam-cred-theft
    desc: Steam credential file theft
    crit: suspicious
    conf: 0.95
    all:
      - id: loginusers-vdf
      - id: config-vdf
