defaults:
  platforms:
    - linux
    - macos
    - windows
    - unix
  for: [scripts, binaries]
  attack: T1555
traits:
  - id: loginusers-vdf
    desc: Steam loginusers.vdf file access
    crit: notable
    conf: 0.9
    if:
      type: text
      substr: loginusers.vdf
    unless:
      - id: metadata/package::playnite-steam-plugin
  - id: config-vdf
    desc: Steam localconfig/config.vdf file access
    crit: notable
    conf: 0.8
    if:
      type: text
      regex: (^|[^A-Za-z0-9_])(local)?config\.vdf([^A-Za-z0-9_]|$)
    unless:
      - id: metadata/vendor/valve/
      - id: metadata/package::playnite-steam-plugin
composite_rules:
  - id: steam-cred-theft
    desc: Steam account config targeting
    crit: notable
    conf: 0.8
    all:
      - id: loginusers-vdf
      - id: config-vdf
