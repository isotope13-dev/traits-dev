defaults:
  platforms: [windows, unix]
  for: [scripts, binaries, source]
  attack: T1555
traits:
  - id: epic-games-cache-target
    desc: Epic Games webcache target
    crit: component
    conf: 0.82
    if:
      type: text
      regex: (?i)Epic Games.{0,80}(webcache|config|token)
  - id: battle-net-config-target
    desc: Battle.net config target
    crit: component
    conf: 0.82
    if:
      type: text
      regex: (?i)Battle\.net.{0,80}(config|token|account)
  - id: ea-config-target
    desc: EA config target
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?i)(\bEA\b|Electronic Arts).{0,80}(config|token|account)
  - id: origin-config-target
    desc: Origin config target
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?i)(OriginClientService|Origin Games?).{0,80}(config|token|account)
  - id: ubisoft-connect-target
    desc: Ubisoft Connect config target
    crit: component
    conf: 0.82
    if:
      type: text
      regex: (?i)Ubisoft( Connect)?.{0,80}(config|token|cache)
  - id: gog-galaxy-target
    desc: GOG Galaxy config target
    crit: component
    conf: 0.82
    if:
      type: text
      regex: (?i)GOG Galaxy.{0,80}(config|token|storage)
  - id: riot-games-target
    desc: Riot Games config target
    crit: component
    conf: 0.82
    if:
      type: text
      regex: (?i)Riot Games.{0,80}(config|token|lockfile)
  - id: minecraft-launcher-target
    desc: Minecraft launcher credential target
    crit: component
    conf: 0.82
    if:
      type: text
      regex: (?i)Minecraft.{0,80}(launcher|token|accounts\.json)
  - id: itch-launcher-target
    desc: itch.io launcher config target
    crit: component
    conf: 0.8
    if:
      type: text
      regex: (?i)itch\.io.{0,80}(config|token|cookies)
composite_rules:
  - id: multi-launcher-credential-targeting
    desc: Multi-launcher credential targeting
    crit: suspicious
    conf: 0.94
    needs: 4
    any:
      - id: objectives/credential-access/gaming/launcher::battle-net-config-target
      - id: objectives/credential-access/gaming/launcher::ea-config-target
      - id: objectives/credential-access/gaming/launcher::epic-games-cache-target
      - id: objectives/credential-access/gaming/launcher::gog-galaxy-target
      - id: objectives/credential-access/gaming/launcher::itch-launcher-target
      - id: objectives/credential-access/gaming/launcher::minecraft-launcher-target
      - id: objectives/credential-access/gaming/launcher::origin-config-target
      - id: objectives/credential-access/gaming/launcher::python-discord-leveldb-path
      - id: objectives/credential-access/gaming/launcher::python-epic-config-paths
      - id: objectives/credential-access/gaming/launcher::python-gaming-keychain-dump
      - id: objectives/credential-access/gaming/launcher::python-gaming-report-post
      - id: objectives/credential-access/gaming/launcher::python-steam-loginusers
      - id: objectives/credential-access/gaming/launcher::riot-games-target
      - id: objectives/credential-access/gaming/launcher::ubisoft-connect-target
      - id: objectives/credential-access/gaming/steam/profile::steam-cred-theft
  - id: gaming-session-stealer
    desc: Gaming session credential stealer
    crit: hostile
    conf: 0.97
    all:
      - id: multi-launcher-credential-targeting
    any:
      - id: micro-behaviors/communications/messaging/send::telegram-bot-api-file-upload
      - id: objectives/collection/archive/upload::zip-upload-comp
      - id: micro-behaviors/data/archive/zip::miniz-zip-writer-api
