defaults:
  platforms: [unix]
  for: [python, pyc]
  attack: T1555

traits:
  - id: python-steam-loginusers
    desc: Python Steam credential paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: STEAM_CREDENTIAL_PATHS

  - id: python-epic-config-paths
    desc: Python Epic config paths
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: EpicGamesLauncher

  - id: python-discord-leveldb-path
    desc: Python Discord leveldb path
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: discord/Local Storage/leveldb

  - id: python-gaming-keychain-dump
    desc: Python gaming keychain dump
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: security", "dump-keychain

  - id: python-gaming-report-post
    desc: Python gaming report POST
    crit: suspicious
    conf: 0.94
    if:
      type: text
      substr: /api/v1/report

composite_rules:
  - id: python-gaming-credential-harvest
    desc: Python gaming credential harvest
    crit: hostile
    conf: 0.98
    needs: 2
    any:
      - id: python-steam-loginusers
      - id: python-epic-config-paths
      - id: python-discord-leveldb-path
      - id: python-gaming-keychain-dump

  - id: python-gaming-credential-exfil
    desc: Python gaming credential exfil
    crit: hostile
    conf: 0.98
    all:
      - id: python-gaming-report-post
    any:
      - id: python-gaming-credential-harvest
