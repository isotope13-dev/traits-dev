defaults:
  platforms: [linux, macos, windows, unix, android, ios]
  for: [text, package.json, shell]
  attack: "T1528"
traits:
  - id: gh-auth-token
    desc: gh auth token command
    crit: suspicious
    conf: 0.98
    if:
      type: string
      substr: "gh auth token"
  - id: curl-webhook-post
    desc: curl post to webhook.site
    crit: suspicious
    conf: 0.98
    attack: "T1567.002"
    if:
      type: string
      regex: 'curl\s+-d.{0,200}webhook\.site/[0-9a-f-]{36}'
composite_rules:
  - id: gh-cli-token-webhook-exfil
    desc: GH CLI token exfiltration
    crit: hostile
    conf: 0.99
    mbc: "C0027"
    all:
      - id: gh-auth-token
      - id: curl-webhook-post
      - id: objectives/execution/interpreter/script/npm::npm-preinstall-script
