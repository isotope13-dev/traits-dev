# Validation expectations for `cleave validate`.
#
# These live with the fixtures (not hardcoded in the engine) so that ANY engine
# build validates exactly the fixture set + thresholds a given traits commit
# defines. This is what makes cross-version validation meaningful: an older
# engine reads these expectations and either meets them (compatible) or does not
# (a real incompatibility) — instead of erroring on fixtures it was built before.
#
# hostile/benign caps: current observed score floors/ceilings for stable
# fixtures. does_nothing: scores must stay under default_cap, with per-file
# overrides for samples that legitimately score higher (e.g. shebang notables).
#
# benign min_score: a real benign program still carries its identity and
# functionality notables (signer, usage/help surface, purpose-defining calls
# like readdir/xattr; ~1 score point per notable). The floor catches those
# silently regressing to invisible: a benign binary that renders as nothing
# tells an LLM or a supply-chain diff nothing, and a file wrongly pooled as
# bad could never be graded back out.

[does_nothing]
default_cap = 1

